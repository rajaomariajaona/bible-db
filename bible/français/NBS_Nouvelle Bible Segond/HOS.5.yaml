document_id: HOS.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un avertissement aux prêtres et au roi
  - type: text
    content: ' '
  - type: note
    content: 'C''est à vous que le jugement (le mot correspondant est habituellement traduit par droit ) s''adresse  : autre traduction c''était à vous d''exercer le jugement  ; cf. Dt 1.16s ; Mi 3.1. –  Mitspa ( Poste de guet , nom de plusieurs localités [Jg 10.17n  ; 20.1n] en assonance avec mishpath, jugement ) et Tabor (nom d''une montagne qui domine la plaine de Jizréel [Jg 4.6]) désignent probablement ici des sanctuaires ; on ignore cependant à quels événements précis le prophète fait allusion.'
  - type: text
    content: Ecoutez, prêtres !
  - type: text
    content: Prête attention, maison d'Israël !
  - type: text
    content: Prête l'oreille, maison du roi !
  - type: text
    content: C'est à vous que le jugement s'adresse,
  - type: text
    content: parce que vous avez été un piège à Mitspa,
  - type: text
    content: et un filet tendu sur le Tabor.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Juda 1.7+. –  ceux qui déplacent les bornes Dt 19.14n  ; 27.17 ; Pr 22.28n  ; cf. 1R 15.16-22. –  comme un torrent  : litt. comme les eaux.'
  - type: text
    content: Les princes de Juda sont
  - type: text
    content: comme ceux qui déplacent les bornes ;
  - type: text
    content: je répandrai sur eux
  - type: text
    content: ma colère comme un torrent.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le néant  : traduction incertaine, d''après des versions anciennes ; autre traduction des immondices  ; cf. 12.12 ; Ec 1.17.'
  - type: text
    content: Ephraïm est opprimé,
  - type: text
    content: écrasé par le jugement,
  - type: text
    content: car il a voulu suivre le néant.
  '12':
  - type: text
    content: ' '
  - type: note
    content: mite Es 50.9+ ; Jb 13.28. –  pourriture ou carie  ; Pr 12.4 ; 14.30.
  - type: text
    content: Et moi je serai comme une mite pour Ephraïm,
  - type: text
    content: comme une pourriture pour la maison de Juda.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'des messagers  : sous-entendu dans le texte. –  Yareb  : le mot pourrait signifier en hébreu il fera un procès (cf. 2.4n  ; 4.1) ; il peut aussi être une transcription du titre du roi d’ Assyrie ( le grand roi ) ; cf. 10.6 ; voir aussi 7.11 ; 8.9 ; 12.2 ; 14.4 ; 2R 15.19s ; 16.8.'
  - type: text
    content: Ephraïm voit sa maladie,
  - type: text
    content: et Juda sa plaie ;
  - type: text
    content: Ephraïm se rend en Assyrie
  - type: text
    content: et envoie des messagers au roi Yareb,
  - type: text
    content: mais ce roi ne pourra ni vous guérir,
  - type: text
    content: ni porter remède à votre plaie,
  '14':
  - type: text
    content: ' '
  - type: note
    content: comme un lion 11.10+ ; 13.7 ; Es 5.29 ; Am 3.12 ; Mi 5.7 ; Na 2.12s ; Jb 4.10n. –  je déchirerai 6.1 ; le verbe est souvent traduit par déchiqueter , en parlant d'un animal féroce ; cf. Ps 7.3 ; Jb 16.9n etc. –  personne ne délivrera 2.12+.
  - type: text
    content: car je serai comme un lion pour Ephraïm,
  - type: text
    content: comme un jeune lion pour la maison de Juda ;
  - type: text
    content: moi, moi, je déchirerai, puis je m'en irai,
  - type: text
    content: j'emporterai, et personne ne délivrera.
  - type: heading
    content: Dieu décide de se retirer
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'reconnaissent leurs torts 4.15n  ; autre traduction jusqu''à ce qu''ils aient fait réparation  ; cf. Lv 5.6n. –  me recherchent  : litt. recherchent ma face  ; autre traduction recherchent ma faveur  ; cf. Ps 27.8+. –  dans la détresse  : cf. v. 6 ; 2.9 ; 10.12 ; Jr 29.13 ; Ps 78.34.'
  - type: text
    content: Je m'en irai, je reviendrai à mon lieu,
  - type: text
    content: jusqu'à ce qu'ils reconnaissent leurs torts et me recherchent ;
  - type: text
    content: dans la détresse, ils auront recours à moi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ont mis le comble au (litt. approfondi le , cf. 9.9n) carnage  : traduction incertaine ; on modifie parfois le texte hébreu traditionnel pour lire des dévoyés ont creusé une fosse profonde ou ils ont creusé profondément la fosse de Shittim (cf. Nb 25.1 ; Mi 6.5). –  moi  : le prophète ou Dieu, auquel cas on peut aussi comprendre je prépare une leçon (ou une instruction, une correction  ; cf. 7.12,15n) pour eux tous  ; mais le sens reste incertain ; cf. Es 24.2 ; Rm 3.23.'
  - type: text
    content: Des dévoyés ont mis le comble au carnage ;
  - type: text
    content: moi, je suis une leçon pour eux tous.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ephraïm (4.17n)… prostitué / Israël… impur 6.10.
  - type: text
    content: Moi, je connais Ephraïm,
  - type: text
    content: et Israël ne m'est pas caché ;
  - type: text
    content: oui, maintenant, Ephraïm,
  - type: text
    content: tu t'es prostitué,
  - type: text
    content: et Israël s'est rendu impur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Leurs agissements… 4.9+ ; cf. Jr 13.23 ; Pr 27.22 ; Mt 7.17 ; Jn 8.34 ; Ep 4.18. –  souffle de prostitution 4.12n. –  ils ne connaissent pas… 4.1+.
  - type: text
    content: Leurs agissements ne leur permettent pas de revenir à leur Dieu,
  - type: text
    content: parce qu'un souffle de prostitution est en eux,
  - type: text
    content: 'et parce qu''ils ne connaissent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'L''orgueil d''Israël  : cf. Am 6.8. –  témoigne contre lui (ou sur son visage ) : cf. 7.10 ; Es 3.9. Certains traduisent l''orgueil d''Israël sera humilié publiquement . –  trébucheront (4.5+) sur (autres traductions à cause de ; pour ; par ) leur faute 14.2. –  Juda 1.7+.'
  - type: text
    content: L'orgueil d'Israël témoigne contre lui ;
  - type: text
    content: Israël et Ephraïm trébucheront sur leur faute ;
  - type: text
    content: avec eux Juda aussi trébuchera.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 15 ; Am 5.4,6 ; 8.11s ; Jn 7.34.
  - type: text
    content: 'Ils iront avec leur petit bétail et leur gros bétail rechercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'mais ils ne le trouveront pas :'
  - type: text
    content: il s'est éloigné d'eux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'car ils ont engendré…  : autre traduction puisqu''ils ont engendré… la nouvelle lune les dévorera… –  illégitimes  : litt. étrangers , Jr 2.25n  ; cf. 2.6. –  la nouvelle lune … 2.13 ; d''autres comprennent il suffira d''un mois pour qu''ils soient dévorés . –  leurs biens  : litt. leurs parts.'
  - type: text
    content: 'Ils ont trahi le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: car ils ont engendré des enfants illégitimes ;
  - type: text
    content: maintenant, la nouvelle lune les dévorera avec leurs biens.
  - type: heading
    content: La guerre entre Ephraïm et Juda
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Sonnez de la trompe Jr 4.5 ; Ez 33.3-6 ; Jl 2.1 ; Am 3.6. –  Guibéa / Rama  : villes et sanctuaires du royaume de Juda. –  guerrières  : sous-entendu dans le texte. –  Beth-Aven 4.15n. –  Benjamin est à la frontière des deux royaumes.'
  - type: text
    content: Sonnez de la trompe à Guibéa,
  - type: text
    content: de la trompette à Rama !
  - type: text
    content: Lancez des acclamations guerrières à Beth-Aven !
  - type: text
    content: Derrière toi, Benjamin !
  '9':
  - type: text
    content: ' '
  - type: note
    content: Ephraïm 4.17n. – Cf. 2R 15.29 ; 17.5s.
  - type: text
    content: Ephraïm sera dévasté au jour du châtiment.
  - type: text
    content: Je fais connaître aux tribus d'Israël une chose certaine.
