document_id: 2CH.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joas est sacré roi
  - type: heading
    content: 2R 11.4-16
  - type: text
    content: ' '
  - type: note
    content: 'septième  : un ms de LXX porte huitième . –  passa alliance  : litt. prit avec lui dans l''alliance . –  Azaria / Maaséya / Adaya  : hébreu ‘Azaryahou / Ma‘aséyahou / ‘Adayahou.'
  - type: text
    content: 'La septième année, Joïada devint fort et passa alliance avec les chefs de cent : Azaria, fils de Yeroham, Ismaël, fils de Yohanân, Azaria, fils d''Obed, Maaséya, fils d''Adaya et Elishaphath, fils de Zikri. '
  '10':
  - type: note
    content: armes Né 4.17n  ; autre terme en 2R 11.11.
  - type: text
    content: 'Il plaça tout le peuple, les armes à la main, depuis le côté droit de la Maison jusqu''au côté gauche de la Maison, près de l''autel et près de la Maison, pour entourer le roi. '
  '11':
  - type: note
    content: 'On fit avancer / on mit / on l''investit…  : litt. ils firent sortir / ils donnèrent / ils le firent roi. –  lui conférèrent l''onction 1R 1.34n.'
  - type: text
    content: 'On fit avancer le fils du roi, on mit sur lui le diadème et le Témoignage, et on l''investit de la royauté ; Joïada et ses fils lui conférèrent l''onction et dirent : Vive le roi !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le peuple qui accourait…  : autre traduction le peuple, les gardes du corps, qui louaient  ; voir 2R 11.13n.'
  - type: text
    content: 'Athalie entendit le peuple qui accourait en louant le roi. Elle vint vers le peuple, à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '13':
  - type: note
    content: 'sur son estrade  : l''hébreu peut aussi être rendu par près de sa colonne  ; peut-être s''agirait-il de l''une des deux colonnes formant une sorte de portail devant le vestibule (1R 7.21s). –  près du roi  : autre préposition hébraïque en 2R 11.14. –  et les chantres avec les instruments de musique dirigeaient les louanges  : détail absent de 1R 11.14 ; les Chroniques mettent en valeur la musique en l''honneur de Dieu.'
  - type: text
    content: 'et regarda : le roi se tenait debout sur son estrade à l''entrée ; les chefs et les trompettes étaient près du roi ; tout le peuple du pays était dans la joie et sonnait des trompettes, et les chantres avec les instruments de musique dirigeaient les louanges. Athalie déchira ses vêtements et dit : Conspiration ! Conspiration ! '
  '14':
  - type: note
    content: 'fit sortir  : certains suivent, avec quelques versions anciennes, le texte de 2R 11.15 donna cet ordre.'
  - type: text
    content: 'Alors Joïada, le prêtre, fit sortir les chefs de cent, les commandants de l''armée ; il leur dit : Faites-la sortir en dehors des rangs, et que soit mis à mort par l''épée quiconque la suivra. Car le prêtre avait dit : Ne la mettez pas à mort dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '15':
  - type: note
    content: 'On mit la main sur elle  : litt. ils placèrent deux mains pour elle.'
  - type: text
    content: 'On mit la main sur elle, et elle arriva à la maison du roi par l''entrée de la porte des chevaux : c''est là qu''ils la mirent à mort.'
  - type: heading
    content: Réforme de Joïada
  - type: heading
    content: 2R 11.17-20
  '16':
  - type: text
    content: ' '
  - type: note
    content: Voir alliance.
  - type: text
    content: 'Joïada conclut une alliance entre lui, tout le peuple et le roi, pour qu''ils soient le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'du Baal  : cf. 17.3n.'
  - type: text
    content: 'Tout le peuple entra dans la maison du Baal ; ils la démolirent, ils brisèrent ses autels et ses images et tuèrent devant les autels Mattân, prêtre du Baal. '
  '18':
  - type: note
    content: 'aux prêtres-lévites (cf. 5.5), que David avait répartis en classes (cf. 1Ch 23–26) …  : les v. 18s n''ont pas de parallèle dans 2R 11 ; ils donnent un aperçu d''une réforme liturgique et montrent encore l''intérêt des Chroniques pour le temple et le culte. LXX porte un texte plus long  : il installa les classes des prêtres et des lévites que David avait répartis sur la maison du Seigneur pour qu''ils offrent des holocaustes… –  holocaustes 1.6+. –  comme il est écrit dans la loi de Moïse  : cf. Lv 1.1-14 ; 6.1-6. –  d''après les indications de David  : litt. sur les mains de David, même expression en Esd 3.10 ; cf. 1Ch 25.'
  - type: text
    content: 'Joïada confia la surveillance de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' aux prêtres-lévites, que David avait répartis en classes dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour qu''ils offrent des holocaustes au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme il est écrit dans la loi de Moïse, dans la joie et les chants, d''après les indications de David. '
  '19':
  - type: note
    content: 'impur  : voir pur.'
  - type: text
    content: 'Il plaça les portiers aux portes de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', de sorte qu''il n''y entre personne qui soit impur pour une cause quelconque. '
  '2':
  - type: note
    content: 'les lévites  : les prêtres et les lévites apparaissent clairement comme les principaux acteurs dans l''événement de l''intronisation du roi (cf. v. 4-7), selon l''intérêt des Chroniques pour le culte et le temple  ; comparer avec 2R 11.4ss. –  les chefs de famille d''Israël  : cf. v. 8 ; l''événement prend un caractère plus national que dans le livre des Rois.'
  - type: text
    content: 'Ils parcoururent Juda et rassemblèrent les lévites de toutes les villes de Juda et les chefs de famille d''Israël. Ils arrivèrent à Jérusalem, '
  '20':
  - type: note
    content: 'princes  : cf. Jr 14.3n  ; Né 3.5n. –  dirigeants  : le verbe correspondant est habituellement traduit par dominer ou gouverner. –  la porte  : litt. le milieu de la porte. –  sur le trône royal  : litt. sur le trône de la royauté.'
  - type: text
    content: 'Il prit les chefs de cent, les princes, les dirigeants du peuple et tout le peuple du pays. Il fit descendre le roi de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils arrivèrent à la maison du roi par la porte Haute et firent asseoir le roi sur le trône royal. '
  '21':
  - type: text
    content: Tout le peuple du pays se réjouissait, et la ville était tranquille. Quant à Athalie, on l'avait mise à mort par l'épée.
  '3':
  - type: note
    content: 'Joïada leur dit  : litt. il leur dit. –  comme le Seigneur l''a dit au sujet des fils de David  : cf. 2S 7.13,16.'
  - type: text
    content: 'et toute l''assemblée conclut une alliance avec le roi dans la maison de Dieu. Joïada leur dit : Le fils du roi deviendra roi, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a dit au sujet des fils de David. '
  '4':
  - type: note
    content: 'qui prennent leur service  : litt. qui entrent.'
  - type: text
    content: 'Voici ce que vous ferez : un tiers d''entre vous, ceux qui prennent leur service le jour du sabbat, prêtres et lévites, remplira la fonction de portiers des seuils ; '
  '5':
  - type: note
    content: 'Yesod  : Fondation.'
  - type: text
    content: 'un tiers se tiendra dans la maison du roi, et un tiers à la porte de Yesod. Tout le peuple sera dans les cours de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'excepté les prêtres et les lévites qui officient  : les Chroniques insistent sur le respect de la pureté du temple. –  consacrés ou saints. –  Tout le peuple…  : cf. v. 3. –  assurera le service…  : autre traduction gardera les observances du Seigneur  ; cf. 13.11n  ; voir aussi 2R 11.7.'
  - type: text
    content: 'Que personne n''entre dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', excepté les prêtres et les lévites qui officient : ceux-là pourront entrer, car ils sont consacrés. Tout le peuple assurera le service du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'vous serez près du roi  : plusieurs mss hébreux et des versions anciennes portent et ils seront près du roi (c.-à-d. les lévites). –  où qu''il aille  : cf. 2R 11.8n.'
  - type: text
    content: Les lévites entoureront le roi de toutes parts, chacun les armes à la main, et quiconque entrera dans la Maison sera mis à mort ; vous serez près du roi où qu'il aille.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les lévites et tout Juda  : cf. v. 2n. –  classes  : les prêtres et certains lévites étaient divisés en classes, cf. 1Ch 23–26.'
  - type: text
    content: 'Les lévites et tout Juda firent exactement ce que Joïada, le prêtre, avait ordonné. Chacun prit ses hommes, ceux qui prenaient leur service le jour du sabbat et ceux qui quittaient leur service le jour du sabbat, car Joïada, le prêtre, n''avait exempté aucune des classes. '
  '9':
  - type: note
    content: 'les boucliers et les carquois  : autre traduction les grands boucliers et les petits boucliers  ; cf. 2S 8.7n.'
  - type: text
    content: 'Joïada, le prêtre, remit aux chefs de cent les lances, les boucliers et les carquois qui avaient appartenu au roi David et qui étaient dans la maison de Dieu. '
