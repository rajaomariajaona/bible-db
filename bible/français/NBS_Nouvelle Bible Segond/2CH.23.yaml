    marker-yv: yv-n
  - type: text
    text: 'La septième année, Joïada devint fort et passa alliance avec les chefs de cent : Azaria, fils de Yeroham, Ismaël, fils de Yohanân, Azaria, fils d''Obed, Maaséya, fils d''Adaya et Elishaphath, fils de Zikri. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les prêtres et les lévites apparaissent clairement comme les principaux acteurs dans l''événement de l''intronisation du roi (cf. v. 4-7), selon l''intérêt des Chroniques pour le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: culte
      - type: text
        text: ' et le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: '  ; comparer avec 2R 11.4ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les chefs de famille d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8 ; l''événement prend un caractère plus national que dans le livre des Rois.'
    marker-yv: yv-n
  - type: text
    text: 'Ils parcoururent Juda et rassemblèrent les lévites de toutes les villes de Juda et les chefs de famille d''Israël. Ils arrivèrent à Jérusalem, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joïada leur dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il leur dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comme le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' l''a dit au sujet des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de David'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 7.13,16.'
    marker-yv: yv-n
  - type: text
    text: 'et toute l''assemblée conclut une alliance avec le roi dans la maison de Dieu. Joïada leur dit : Le fils du roi deviendra roi, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''a dit au sujet des fils de David. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui prennent leur service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui entrent.
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que vous ferez : un tiers d''entre vous, ceux qui prennent leur service le jour du sabbat, prêtres et lévites, remplira la fonction de portiers des seuils ; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yesod
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Fondation.
    marker-yv: yv-n
  - type: text
    text: 'un tiers se tiendra dans la maison du roi, et un tiers à la porte de Yesod. Tout le peuple sera dans les cours de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'excepté les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' et les lévites qui officient'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les Chroniques insistent sur le respect de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pureté
      - type: text
        text: ' du temple. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'consacrés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: saints
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tout le peuple…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: assurera le service…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gardera les observances du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 13.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 2R 11.7.'
    marker-yv: yv-n
  - type: text
    text: 'Que personne n''entre dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', excepté les prêtres et les lévites qui officient : ceux-là pourront entrer, car ils sont consacrés. Tout le peuple assurera le service du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous serez près du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : plusieurs mss hébreux et des versions anciennes portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et ils seront près du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. les lévites). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où qu'il aille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 11.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Les lévites entoureront le roi de toutes parts, chacun les armes à la main, et quiconque entrera dans la Maison sera mis à mort ; vous serez près du roi où qu'il aille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les lévites et tout Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: classes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les prêtres et certains lévites étaient divisés en classes, cf. 1Ch 23–26.'
    marker-yv: yv-n
  - type: text
    text: 'Les lévites et tout Juda firent exactement ce que Joïada, le prêtre, avait ordonné. Chacun prit ses hommes, ceux qui prenaient leur service le jour du sabbat et ceux qui quittaient leur service le jour du sabbat, car Joïada, le prêtre, n''avait exempté aucune des classes. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les boucliers et les carquois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les grands boucliers et les petits boucliers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2S 8.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Joïada, le prêtre, remit aux chefs de cent les lances, les boucliers et les carquois qui avaient appartenu au roi David et qui étaient dans la maison de Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'armes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Né 4.17
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; autre terme en 2R 11.11.'
    marker-yv: yv-n
  - type: text
    text: 'Il plaça tout le peuple, les armes à la main, depuis le côté droit de la Maison jusqu''au côté gauche de la Maison, près de l''autel et près de la Maison, pour entourer le roi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'On fit avancer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on mit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on l'investit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils firent sortir / ils donnèrent / ils le firent roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lui conférèrent '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 1.34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On fit avancer le fils du roi, on mit sur lui le diadème et le Témoignage, et on l''investit de la royauté ; Joïada et ses fils lui conférèrent l''onction et dirent : Vive le roi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le peuple qui accourait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple, les gardes du corps, qui louaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; voir 2R 11.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Athalie entendit le peuple qui accourait en louant le roi. Elle vint vers le peuple, à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur son estrade
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''hébreu peut aussi être rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: près de sa colonne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; peut-être s''agirait-il de l''une des deux colonnes formant une sorte de portail devant le vestibule (1R 7.21s). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: près du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre préposition hébraïque en 2R 11.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et les chantres avec les instruments de musique dirigeaient les louanges
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : détail absent de 1R 11.14 ; les Chroniques mettent en valeur la musique en l''honneur de Dieu.'
    marker-yv: yv-n
  - type: text
    text: 'et regarda : le roi se tenait debout sur son estrade à l''entrée ; les chefs et les trompettes étaient près du roi ; tout le peuple du pays était dans la joie et sonnait des trompettes, et les chantres avec les instruments de musique dirigeaient les louanges. Athalie déchira ses vêtements et dit : Conspiration ! Conspiration ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fit sortir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains suivent, avec quelques versions anciennes, le texte de 2R 11.15 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: donna cet ordre.
    marker-yv: yv-n
  - type: text
    text: 'Alors Joïada, le prêtre, fit sortir les chefs de cent, les commandants de l''armée ; il leur dit : Faites-la sortir en dehors des rangs, et que soit mis à mort par l''épée quiconque la suivra. Car le prêtre avait dit : Ne la mettez pas à mort dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
