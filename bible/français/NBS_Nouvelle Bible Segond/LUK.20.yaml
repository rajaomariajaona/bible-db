  - type: text
    text: 'Un de ces jours-là, comme il instruisait le peuple dans le temple et annonçait la bonne nouvelle, les grands prêtres et les scribes, avec les anciens, survinrent '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de quelle autorité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par quel pouvoir, de quel droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 8 ; cf. 4.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Jn 2.18.'
    marker-yv: yv-n
  - type: text
    text: 'et lui dirent : Dis-nous de quelle autorité tu fais cela ; qui est celui qui t''a donné cette autorité ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Mc 10.3 ; Jn 18.19ss.
    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Moi aussi, je vais vous poser une question. Répondez-moi : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ac 5.38s. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: baptême
      - type: text
        text: ' de Jean'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1–3 ; Ac 1.22 ; 10.37 ; 13.24s ; 19.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du ciel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jn 3.27.'
    marker-yv: yv-n
  - type: text
    text: 'le baptême de Jean venait-il du ciel ou des humains ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce raisonnement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas cru
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.28ss ; Mt 21.32.'
    marker-yv: yv-n
  - type: text
    text: 'Mais ils tinrent entre eux ce raisonnement : Si nous répondons : « Du ciel », il dira : « Pourquoi ne l''avez-vous pas cru ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout le peuple… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 19 ; 22.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lapidera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 5.26 ; 14.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jean… '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.76 ; 7.26ss ; Mt 14.5.
    marker-yv: yv-n
  - type: text
    text: 'Et si nous répondons : « Des humains », tout le peuple nous lapidera, car il est persuadé que Jean était un prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'où il venait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'où
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jn 9.29ss.'
    marker-yv: yv-n
  - type: text
    text: 'Ils répondirent donc qu''ils ne savaient pas d''où il venait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 22.67ss.
    marker-yv: yv-n
  - type: text
    text: 'Alors Jésus leur dit : Moi non plus, je ne vous dis pas de quelle autorité je fais cela.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole des mauvais vignerons
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 21.33-46  ; Mc 12.1-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parabole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.36+ ; cf. Mc 12.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'planta une vigne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 5.1s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour longtemps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour un temps assez long '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même expression 8.27 ; 23.8 ; Ac 8.11 ; 14.3 ; 27.9) ; cf. Mt 24.48 ; 25.5,19 ; 2P 3.9.
    marker-yv: yv-n
  - type: text
    text: 'Il se mit à dire au peuple cette parabole : Un homme planta une vigne, la loua à des vignerons et partit en voyage pour longtemps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le moment venu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.42'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un esclave
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un serviteur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 19.15ss ; voir 2Ch 36.15s.'
    marker-yv: yv-n
  - type: text
    text: 'Le moment venu, il envoya un esclave chez les vignerons, pour que ceux-ci lui donnent du fruit de la vigne. Les vignerons le battirent et le renvoyèrent les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Il envoya encore un autre esclave ; ils le battirent et le déshonorèrent, puis ils le renvoyèrent les mains vides. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il en envoya encore un troisième ; ils le blessèrent et le chassèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que vais-je faire… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.17+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' bien-aimé'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.22 ; 9.35.'
    marker-yv: yv-n
  - type: text
    text: 'Le maître de la vigne dit : « Que vais-je faire ? Je vais envoyer mon fils bien-aimé ; peut-être le respecteront-ils ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 19.47s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'héritier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Hé 1.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'héritage…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.12,31.'
    marker-yv: yv-n
  - type: text
    text: 'Mais quand les vignerons le virent, ils raisonnèrent entre eux : « C''est l''héritier ! Tuons-le, afin que l''héritage soit à nous ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hors de la vigne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 24.14ss ; Jn 19.17 ; Ac 7.58 ; Hé 13.12s.'
    marker-yv: yv-n
  - type: text
    text: 'Et ils le chassèrent hors de la vigne et le tuèrent. Comment le maître de la vigne les traitera-t-il donc ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils s'exclamèrent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 19.'
    marker-yv: yv-n
  - type: text
    text: Il viendra, il fera disparaître ces vignerons et il donnera la vigne à d'autres.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'En entendant cela, ils s''exclamèrent : Jamais de la vie ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: regarda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.61. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui est écrit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.31 ; 19.46 ; 21.22 ; 22.37 ; 24.44. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est la pierre… '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ps 118.22
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir aussi Es 28.16 ; Mt 21.42+ ; Ac 4.11.'
    marker-yv: yv-n
  - type: text
    text: 'Il les regarda et dit : Que signifie donc ce qui est écrit :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: C'est la pierre que les constructeurs ont rejetée
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: qui est devenue la principale, celle de l'angle.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Quiconque tombera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.34 ; Es 8.14s ; Rm 9.33 ; 1P 2.4ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui sur qui elle tombera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 23.30 ; Dn 2.34s,44s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'écrasera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe signifie aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vanner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; il est employé dans une des traductions grecques (Théodotion, voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ) de Dn 2.44.
    marker-yv: yv-n
  - type: text
    text: Quiconque tombera sur cette pierre s'y brisera, et celui sur qui elle tombera, elle l'écrasera.
