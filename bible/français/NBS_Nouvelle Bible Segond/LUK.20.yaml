document_id: LUK.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'autorité de Jésus en question
  - type: heading
    content: Mt 21.23-27  ; Mc 11.27-33
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.47+. –  Un de ces jours-là 5.17 ; 8.22. –  instruisait  : le même verbe a été traduit par enseigner en 19.47. –  dans le temple Mc 12.35+. –  grands prêtres (certains mss portent seulement prêtres ) / scribes / anciens 9.22+ ; Mc 8.31n.'
  - type: text
    content: 'Un de ces jours-là, comme il instruisait le peuple dans le temple et annonçait la bonne nouvelle, les grands prêtres et les scribes, avec les anciens, survinrent '
  '10':
  - type: note
    content: 'Le moment venu 12.42n. –  un esclave  : autre traduction un serviteur  ; cf. 19.15ss ; voir 2Ch 36.15s.'
  - type: text
    content: 'Le moment venu, il envoya un esclave chez les vignerons, pour que ceux-ci lui donnent du fruit de la vigne. Les vignerons le battirent et le renvoyèrent les mains vides. '
  '11':
  - type: text
    content: 'Il envoya encore un autre esclave ; ils le battirent et le déshonorèrent, puis ils le renvoyèrent les mains vides. '
  '12':
  - type: text
    content: 'Il en envoya encore un troisième ; ils le blessèrent et le chassèrent. '
  '13':
  - type: note
    content: 'Que vais-je faire… 12.17+. –  mon fils bien-aimé  : cf. 3.22 ; 9.35.'
  - type: text
    content: 'Le maître de la vigne dit : « Que vais-je faire ? Je vais envoyer mon fils bien-aimé ; peut-être le respecteront-ils ! » '
  '14':
  - type: note
    content: 'Cf. 19.47s. –  l''héritier  : cf. Hé 1.2. –  l''héritage…  : cf. 15.12,31.'
  - type: text
    content: 'Mais quand les vignerons le virent, ils raisonnèrent entre eux : « C''est l''héritier ! Tuons-le, afin que l''héritage soit à nous ! » '
  '15':
  - type: note
    content: 'hors de la vigne  : cf. Lv 24.14ss ; Jn 19.17 ; Ac 7.58 ; Hé 13.12s.'
  - type: text
    content: 'Et ils le chassèrent hors de la vigne et le tuèrent. Comment le maître de la vigne les traitera-t-il donc ? '
  '16':
  - type: note
    content: 'ils s''exclamèrent…  : cf. v. 19.'
  - type: text
    content: Il viendra, il fera disparaître ces vignerons et il donnera la vigne à d'autres.
  - type: text
    content: 'En entendant cela, ils s''exclamèrent : Jamais de la vie ! '
  '17':
  - type: note
    content: 'regarda  : cf. 22.61. –  ce qui est écrit 18.31 ; 19.46 ; 21.22 ; 22.37 ; 24.44. –  C''est la pierre… Ps 118.22  ; voir aussi Es 28.16 ; Mt 21.42+ ; Ac 4.11.'
  - type: text
    content: 'Il les regarda et dit : Que signifie donc ce qui est écrit :'
  - type: text
    content: C'est la pierre que les constructeurs ont rejetée
  - type: text
    content: qui est devenue la principale, celle de l'angle.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Quiconque tombera…  : cf. 2.34 ; Es 8.14s ; Rm 9.33 ; 1P 2.4ss. –  celui sur qui elle tombera  : cf. 23.30 ; Dn 2.34s,44s. –  l''écrasera  : le verbe signifie aussi vanner  ; il est employé dans une des traductions grecques (Théodotion, voir LXX) de Dn 2.44.'
  - type: text
    content: Quiconque tombera sur cette pierre s'y brisera, et celui sur qui elle tombera, elle l'écrasera.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '19.47s. –  A ce moment  : litt. en cette heure  ; cf. 22.53. –  scribes / grands prêtres  : cf. v. 1 ; Mt 2.4n  ; Mc 8.31n. –  mettre la main sur lui 21.12 ; 22.53 ; Mc 14.46 ; Jn 7.30,44 ; Ac 4.3n. –  peur du peuple (18.43+) v. 6 ; 19.48 ; 22.2 ; Ac 5.26. –  Ils avaient compris  : autre traduction ils savaient . –  pour eux ou contre eux , cf. 18.9 ; voir aussi 11.53s.'
  - type: text
    content: A ce moment même, les scribes et les grands prêtres cherchèrent à mettre la main sur lui, mais ils eurent peur du peuple. Ils avaient compris que c'était pour eux qu'il avait dit cette parabole.
  - type: heading
    content: L'impôt dû à César
  - type: heading
    content: Mt 22.15-22  ; Mc 12.13-17
  '2':
  - type: note
    content: de quelle autorité ou par quel pouvoir, de quel droit, de même v. 8 ; cf. 4.32n  ; voir aussi Jn 2.18.
  - type: text
    content: 'et lui dirent : Dis-nous de quelle autorité tu fais cela ; qui est celui qui t''a donné cette autorité ? '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'le surveiller  : le même verbe a été traduit par observer en 6.7 ; 14.1 ; certains mss portent s''étant éloignés, ils envoyèrent… –  qui se donnaient l''allure  : le terme grec est apparenté au mot traduit par hypocrisie , cf. Mt 6.2n. –  des justes , cf. 10.29+ ; 16.15 ; 18.9 ; voir aussi 2Co 11.15. –  le prendre… ou le prendre en défaut par l''une de ses paroles , aussi v. 26. –  le livrer…  : cf. 18.32. –  au pouvoir…  : litt. au principat et à l''autorité du gouverneur  ; le mot correspondant à principat , au pluriel, a été traduit par princes en 12.11 ; Ep 1.21+. –  du gouverneur 3.1n  ; 23.2ss.'
  - type: text
    content: 'Ils se mirent à le surveiller ; ils envoyèrent des espions qui se donnaient l''allure d''être des justes, pour le prendre à l''une de ses paroles et le livrer au pouvoir du prince, à l''autorité du gouverneur. '
  '21':
  - type: note
    content: 'Maître 3.12n. –  nous savons…  : cf. Jn 3.2. –  bien  : litt. droitement, correctement  ; même adverbe en 7.43 ; 10.28 ; Mc 7.35. –  tu n''es pas partial  : litt. tu ne reçois pas de face, calque d''une tournure sémitique fréquent dans LXX  ; cf. Ac 10.34n  ; Rm 2.11+ ; comparer avec Mt 22.16n. –  la voie de Dieu  : cf. 3.4n  ; Ps 25.4,9 ; 27.11 ; 51.15 ; voir aussi Ac 9.2+. –  selon la vérité  : cf. 4.25.'
  - type: text
    content: 'Ces gens l''interrogèrent : Maître, nous savons que tu parles et que tu enseignes bien ; tu n''es pas partial, mais tu enseignes la voie de Dieu selon la vérité. '
  '22':
  - type: note
    content: 'l''impôt à César (c.-à-d. à Rome, 3.1n) : cf. 23.2.'
  - type: text
    content: 'Nous est-il permis ou non de payer l''impôt à César ? '
  '23':
  - type: note
    content: denier 7.41n  ; voir mesures, poids et monnaies.
  - type: text
    content: 'Comprenant leur ruse, il leur répondit : Montrez-moi un denier. '
  '24':
  - type: note
    content: Mc 12.16n.
  - type: text
    content: 'De qui porte-t-il l''image et l''inscription ? – De César, répondirent-ils. '
  '25':
  - type: note
    content: Cf. Mc 12.17n  ; Rm 13.6s.
  - type: text
    content: 'Alors il leur dit : Rendez donc à César ce qui est à César, et à Dieu ce qui est à Dieu. '
  '26':
  - type: note
    content: Cf. 23.1s.
  - type: text
    content: Ils furent incapables de le prendre à l'une de ses paroles devant le peuple ; étonnés de sa réponse, ils gardèrent le silence.
  - type: heading
    content: Une question sur la résurrection
  - type: heading
    content: Mt 22.23-33  ; Mc 12.18-27
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'sadducéens  : cf. Mt 3.7+ ; Mc 12.18n  ; Ac 4.1 ; 5.17 ; 23.6ss. –  qui soutiennent  : le verbe grec qui apparaît ici, selon la leçon la plus probable, signifie habituellement contredire, s''opposer à  ; cf. 2.34n  ; certains mss portent simplement qui disent qu''il n''y a pas… –  résurrection 14.14 ; Ac 17.32 ; 23.6ss ; 24.15,21.'
  - type: text
    content: 'Quelques-uns des sadducéens, qui soutiennent qu''il n''y a pas de résurrection, vinrent l''interroger : '
  '28':
  - type: note
    content: 'Maître 3.12n. –  prescrit  : litt. écrit ; Dt 25.5  ; voir aussi Gn 38.8 ; Mc 12.19n.'
  - type: text
    content: 'Maître, voici ce que Moïse nous a prescrit : '
  - type: text
    content: Si quelqu'un meurt,
  - type: text
    content: ' ayant une femme, mais '
  - type: text
    content: pas d'enfant, son frère prendra la femme et suscitera une descendance au défunt
  - type: text
    content: '. '
  '29':
  - type: note
    content: 'sept  : cf. 17.4.'
  - type: text
    content: 'Il y avait donc sept frères. Le premier prit femme et mourut sans enfant. '
  '3':
  - type: note
    content: Cf. Mc 10.3 ; Jn 18.19ss.
  - type: text
    content: 'Il leur répondit : Moi aussi, je vais vous poser une question. Répondez-moi : '
  '30':
  - type: text
    content: 'Le deuxième, '
  '31':
  - type: note
    content: 'prirent la femme  : litt. la prirent.'
  - type: text
    content: 'puis le troisième prirent la femme ; il en fut ainsi des sept, qui moururent sans laisser d''enfants. '
  '32':
  - type: text
    content: 'Après, la femme mourut aussi. '
  '33':
  - type: note
    content: est-elle ou devient-elle.
  - type: text
    content: A la résurrection, duquel est-elle donc la femme ? Car les sept l'ont eue pour femme !
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Dans ce monde-ci…  : litt. les fils de ce monde (ou de ce temps  ; traduction traditionnelle siècle  ; cf. 16.8n) épousent et sont épousés (ou prennent femme et mari , comme au v. 35 qui emploie, d''après les meilleurs mss, un verbe légèrement différent) ; cf. 17.27n  ; certains témoins ont lu sont nés et engendrent . Sur l''opposition entre ce monde-ci et ce monde-là (v. 35), voir Mt 12.32n.'
  - type: text
    content: 'Jésus leur répondit : Dans ce monde-ci, hommes et femmes se marient, '
  '35':
  - type: note
    content: 'ont été / ne prennent  : autre traduction seront / ne prendront. –  jugés dignes…  : cf. 18.30 ; Ac 13.46 ; 2Th 1.5. –  à la résurrection  : cf. 14.14 ; Dn 12.2 ; Ph 3.11.'
  - type: text
    content: 'mais ceux qui ont été jugés dignes d''accéder à ce monde-là et à la résurrection d''entre les morts ne prennent ni femme ni mari. '
  '36':
  - type: note
    content: 'Cf. Mc 12.25n  ; 2 Baruch 51.8ss : « Ils verront le monde qui leur est maintenant invisible et ils verront le temps qui leur est maintenant caché. De plus, le temps ne les fera pas vieillir. Car ils demeureront dans les hauteurs de ce monde-là ; ils seront semblables aux anges et pareils aux étoiles. » Voir aussi anges. –  fils de Dieu  : cf. Mt 5.9 ; Jn 1.12 ; 1Jn 3.1s ; voir aussi Gn 6.2 ; Jb 1.6. –  fils de la résurrection  : cf. 10.6n  ; 1Th 5.5.'
  - type: text
    content: 'Ils ne peuvent pas non plus mourir, parce qu''ils sont semblables à des anges et qu''ils sont fils de Dieu, étant fils de la résurrection. '
  '37':
  - type: note
    content: 'se réveillent ou se relèvent, même changement de terme (7.14n) qu''en Mc 12.26n. –  Moïse… appelle…  : comparer avec d''autres citations v. 42 ; Ac 2.25,34 ; 7.48 ; 8.34. –  signalé  : le même verbe est traduit par aviser en Ac 23.30 et par informer en Jn 11.57 ; 1Co 10.28. –  à propos du buisson  : autre traduction au buisson (c.-à-d. dans le passage relatif au buisson) ; voir Ex 3.2 ; Ac 7.30ss. –  le Seigneur…  : autre traduction possible quand il appelle Seigneur le Dieu d''Abraham… ; Ex 3.6, 15s ; cf. Ac 3.13 ; 7.32.'
  - type: text
    content: 'Que les morts se réveillent, c''est ce que Moïse a signalé à propos du buisson, quand il appelle '
  - type: text
    content: le Seigneur Dieu d'Abraham, Dieu d'Isaac et Dieu de Jacob
  - type: text
    content: '. '
  '38':
  - type: note
    content: 'pour lui (ou peut-être par lui) tous sont vivants  : cf. Rm 14.8s ; 4 Maccabées 7.19 : « Ceux qui croient que, pour Dieu, ils ne meurent pas ; en effet, comme nos ancêtres Abraham, Isaac, Jacob, ils vivent pour Dieu. » 16.25 : « Ceux qui meurent à cause de Dieu vivent pour Dieu ; comme Abraham, Isaac et Jacob, et tous les ancêtres (ou patriarches). »'
  - type: text
    content: Or il n'est pas le Dieu des morts, mais des vivants ; car pour lui tous sont vivants.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'scribes  : cf. v. 1,19 ; 5.21+. –  Maître 3.12n. –  tu as bien parlé  : cf. Mc 12.32.'
  - type: text
    content: 'Quelques-uns des scribes répondirent : Maître, tu as bien parlé. '
  '4':
  - type: note
    content: 'Cf. Ac 5.38s. –  baptême de Jean  : cf. 1–3 ; Ac 1.22 ; 10.37 ; 13.24s ; 19.4. –  du ciel  : cf. 11.16n  ; Jn 3.27.'
  - type: text
    content: 'le baptême de Jean venait-il du ciel ou des humains ? '
  '40':
  - type: note
    content: Cf. Mt 22.46 ; Mc 12.34.
  - type: text
    content: Et ils n'osaient plus lui poser aucune question.
  - type: heading
    content: Le Christ et David
  - type: heading
    content: Mt 22.41-46  ; Mc 12.35-37
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Christ 2.11n  ; voir onction. –  fils de David  : titre messianique ; cf. 1.32 ; 18.38 ; Mt 9.27+ ; Mc 12.35+ ; Jn 7.42.'
  - type: text
    content: 'Il leur dit : Comment peut-on dire que le Christ est le fils de David ? '
  '42':
  - type: note
    content: '1.43 ; Ps 110.1  ; cf. Ac 2.30,34ss. –  Psaumes  : cf. Ac 1.20.'
  - type: text
    content: 'David lui-même dit, dans le livre des Psaumes :'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur :'
  - type: text
    content: Assieds-toi à ma droite,
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''à ce que je fasse…  : autre traduction que je fasse…'
  - type: text
    content: jusqu'à ce que je fasse de tes ennemis ton marchepied
  - type: text
    content: .
  '44':
  - type: text
    content: David, donc, l'appelle Seigneur ; comment peut-il être son fils ?
  - type: heading
    content: Mise en garde contre les scribes
  - type: heading
    content: Mt 23.1,5-7,14  ; Mc 12.37-40
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'le peuple l''écoutait ou l''entendait 18.43+ ; cf. 19.47. –  à ses disciples  : certains mss portent aux disciples  ; cf. 19.39.'
  - type: text
    content: 'Tandis que tout le peuple l''écoutait, il dit à ses disciples : '
  '46':
  - type: note
    content: Cf. Mt 23.5ss ; Mc 12.38n. –  Gardez-vous 12.1n. –  scribes 5.21+. –  premiers sièges… 11.43. –  premières places… 14.7.
  - type: text
    content: 'Gardez-vous des scribes ; ils aiment se promener avec de longues robes, se plaisent à être salués sur les places publiques, à avoir les premiers sièges dans les synagogues et les premières places dans les dîners. '
  '47':
  - type: note
    content: 'Cf. Mc 12.40n. –  veuves 18.2ss. –  jugement (cf. 19.22) ou peine, condamnation  : même terme 23.40 ; 24.20.'
  - type: text
    content: Ils dévorent les maisons des veuves et, pour l'apparence, ils font de longues prières. Ils recevront un jugement particulièrement sévère.
  '5':
  - type: note
    content: 'ce raisonnement  : cf. v. 14. –  pas cru  : cf. 7.28ss ; Mt 21.32.'
  - type: text
    content: 'Mais ils tinrent entre eux ce raisonnement : Si nous répondons : « Du ciel », il dira : « Pourquoi ne l''avez-vous pas cru ? » '
  '6':
  - type: note
    content: 'tout le peuple… v. 19 ; 22.2. –  lapidera  : cf. Ac 5.26 ; 14.19. –  Jean… prophète 1.76 ; 7.26ss ; Mt 14.5.'
  - type: text
    content: 'Et si nous répondons : « Des humains », tout le peuple nous lapidera, car il est persuadé que Jean était un prophète. '
  '7':
  - type: note
    content: 'd''où il venait  : litt. d''où  ; cf. Jn 9.29ss.'
  - type: text
    content: 'Ils répondirent donc qu''ils ne savaient pas d''où il venait. '
  '8':
  - type: note
    content: Cf. 22.67ss.
  - type: text
    content: 'Alors Jésus leur dit : Moi non plus, je ne vous dis pas de quelle autorité je fais cela.'
  - type: heading
    content: La parabole des mauvais vignerons
  - type: heading
    content: Mt 21.33-46  ; Mc 12.1-12
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'parabole 5.36+ ; cf. Mc 12.1n. –  planta une vigne Es 5.1s. –  pour longtemps  : autre traduction pour un temps assez long (même expression 8.27 ; 23.8 ; Ac 8.11 ; 14.3 ; 27.9) ; cf. Mt 24.48 ; 25.5,19 ; 2P 3.9.'
  - type: text
    content: 'Il se mit à dire au peuple cette parabole : Un homme planta une vigne, la loua à des vignerons et partit en voyage pour longtemps. '
