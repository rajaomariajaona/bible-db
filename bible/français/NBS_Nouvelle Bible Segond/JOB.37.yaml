    text: Job, prête l'oreille à cela !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Arrête-toi pour comprendre les actes étonnants de Dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
