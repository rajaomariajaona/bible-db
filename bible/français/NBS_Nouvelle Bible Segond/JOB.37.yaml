document_id: JOB.37,104
type_code: fra
verses:
  '1':
  - type: text
    content: C'est pour cela que mon cœur tremble,
  - type: text
    content: qu'il bondit de sa place.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'souffle  : voir esprit. –  glace 6.16 ; 38.29s. –  l''étendue de l''eau se fige  : litt. la largeur des eaux (est prise) dans un moule (le même terme est traduit par contrainte en 36.16n) ; traduction incertaine.'
  - type: text
    content: Par son souffle Dieu produit la glace,
  - type: text
    content: et l'étendue de l'eau se fige.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Il charge d''humidité…  : traduction incertaine ; quelques-uns modifient le texte hébreu traditionnel pour lire il lance les éclairs (ou la grêle ) depuis les nuages . –  la nuée étincelante  : litt. la nuée de sa lumière , peut-être au sens de chargée de ses éclairs  ; on pourrait aussi comprendre de la nuée il disperse ses éclairs  ; cf. v. 21 ; 36.30n.'
  - type: text
    content: Il charge d'humidité les nuages,
  - type: text
    content: il disperse la nuée étincelante.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine ; cf. Ps 104.4 ; 148.8. –  les fait tournoyer (les nuages ? les éclairs ?) Gn 3.24. –  les dirigeant  : un terme apparenté est traduit par l''art de diriger en Pr 1.5n.'
  - type: text
    content: C'est lui qui les fait tournoyer en tous sens,
  - type: text
    content: les dirigeant pour qu'ils exécutent
  - type: text
    content: tout ce qu'il leur ordonne
  - type: text
    content: dans le monde, sur la terre ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: Litt. si pour bâton, si pour sa terre (ou son pays ) , si pour fidélité, il le fait trouver . Sens incertain. Certains midifient l'expression correspondant à si pour sa terre de façon à lire sa terre dépérit (comme en Ps 6.3) ou il accomplit sa volonté.
  - type: text
    content: c'est comme un bâton dont il frappe sa terre ;
  - type: text
    content: ou c'est comme un signe de sa fidélité qu'il les fait apparaître.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ps 111.2-4.
  - type: text
    content: Job, prête l'oreille à cela !
  - type: text
    content: Arrête-toi pour comprendre les actes étonnants de Dieu !
  '15':
  - type: text
    content: Sais-tu comment Dieu les dirige,
  - type: text
    content: et comment il fait briller la lumière de sa nuée ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: Pr 8.28.
  - type: text
    content: Sais-tu comment les nuages se tiennent en équilibre,
  - type: text
    content: ces œuvres étonnantes de celui dont la connaissance est parfaite ?
  '17':
  - type: text
    content: Toi dont les vêtements sont chauds
  - type: text
    content: quand la terre est tranquille sous le vent du sud,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'peux-tu…  : cf. 38.4. –  étendre une voûte  : le verbe ainsi traduit est de la même racine que le mot rendu par voûte en Gn 1.6n. Cf. 26.8s.'
  - type: text
    content: peux-tu comme lui étendre une voûte de nuées
  - type: text
    content: aussi solides qu'un miroir de fonte ?
  '19':
  - type: text
    content: Fais-nous savoir ce que nous devons lui dire ;
  - type: text
    content: nous ne nous exprimerons plus devant les ténèbres.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'le fracas  : litt. l''agitation . Le mot hébreu pour voix désigne aussi le tonnerre. Cf. 26.14 ; Ex 9.23n  ; Ps 29 ; 68.34 ; Jn 12.28s. –  grondement  : le même terme peut aussi évoquer un murmure.'
  - type: text
    content: Ecoutez, écoutez le fracas de sa voix,
  - type: text
    content: le grondement qui sort de sa bouche !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction  : Lui annonce-t-on : « Je vais parler ! » Un homme va-t-il dire qu''il veut être englouti ? Un homonyme du verbe traduit par informer signifie engloutir (cf. 2S 17.16n).'
  - type: text
    content: Quand je parle, faut-il que cela lui soit rapporté ?
  - type: text
    content: Doit-on lui dire quelque chose pour qu'il soit informé ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'tamisée ou obscurcie  : le mot hébreu correspondant n''apparaît qu''ici et sa traduction est incertaine. –  nettoyées  : litt. purifiées  ; cf. v. 11 ; 26.13.'
  - type: text
    content: Maintenant on ne voit plus la lumière tamisée par les nuées,
  - type: text
    content: car un vent a passé et les a nettoyées,
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'une lueur dorée  : litt. de l''or . – Cf. Ex 24.16s ; 34.29s ; Es 6.5 ; Ez 1.4-28 ; Mt 17.2/ /.'
  - type: text
    content: et du nord survient une lueur dorée.
  - type: text
    content: Oh ! que l'éclat de Dieu est redoutable !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Puissant 5.17n. –  l''équité ou le droit , 32.9n. –  il n''afflige (ou il n''opprime ) personne  : en rattachant le verbe à ce qui précède, on pourrait aussi comprendre  : il n''opprime pas celui qui abonde en justice ou il ne ferait pas obstacle au droit et au triomphe de la justice . D''autres rapportent le verbe à une racine différente et comprennent  : ils ne répond pas (mais il s''agirait d''une forme inhabituelle).'
  - type: text
    content: Nous ne saurions parvenir jusqu'au Puissant ;
  - type: text
    content: il est grand par la force,
  - type: text
    content: 'par l''équité et par une souveraine justice :'
  - type: text
    content: il n'afflige personne.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'il ne porte les regards…  : litt. il ne voit pas tous les sages de cœur  ; cf. 5.11+. En hébreu les verbes pour craindre et voir font assonance.'
  - type: text
    content: C'est pourquoi les hommes doivent le craindre ;
  - type: text
    content: il ne porte les regards sur aucun des sages.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'son éclair…  : litt. sa lumière sur les ailes de la terre  ; cf. Mt 24.27/ /.'
  - type: text
    content: Il le fait rouler sous tout le ciel,
  - type: text
    content: et son éclair brille jusqu'aux extrémités de la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'l''éclair  : sous-entendu ( ?) dans le texte.'
  - type: text
    content: 'Puis éclate un rugissement : il tonne de sa voix majestueuse ;'
  - type: text
    content: il ne retient plus l'éclair dès que sa voix se fait entendre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu tonne…  : litt. Dieu tonne de sa voix…  ; cf. 5.9 ; 40.9.'
  - type: text
    content: Dieu tonne des choses étonnantes ;
  - type: text
    content: il fait de grandes choses que nous ne connaissons pas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'neige 38.22 ; Ps 147.16. –  aux plus fortes averses  : litt. à l''averse des pluies de sa force.'
  - type: text
    content: 'Il dit à la neige : « Tombe sur la terre ! »'
  - type: text
    content: Il le dit à l'averse, à la pluie, aux plus fortes averses.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'que tous se reconnaissent…  : autre lecture possible que tous connaissent son œuvre  ; Ps 100.3 ; 139.14.'
  - type: text
    content: Il ferme d'un sceau la main de tout être humain,
  - type: text
    content: afin que tous se reconnaissent comme son œuvre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 104.22. –  se retire dans son repaire  : autre traduction reste à l''arrêt (en guettant sa proie) ; de même en 38.40.'
  - type: text
    content: L'animal sauvage se retire dans son repaire ;
  - type: text
    content: il demeure dans sa tanière.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'du sud  : litt. de la chambre (cf. 9.9n). –  des vents du nord  : litt. de ceux qui dispersent.'
  - type: text
    content: L'ouragan vient du sud,
  - type: text
    content: et le froid des vents du nord.
