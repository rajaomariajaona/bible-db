    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: Toi dont les vêtements sont chauds
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la terre est tranquille sous le vent du sud,
- type: usfm
  marker: q1
  children:
