- type: usfm
  marker: q1
  children:
  - type: text
    text: les dirigeant pour qu'ils exécutent
- type: usfm
  marker: q1
  children:
  - type: text
    text: tout ce qu'il leur ordonne
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans le monde, sur la terre ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
