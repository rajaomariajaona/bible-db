document_id: PSA.123,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'attente des humiliés
  - type: text
    content: ' '
  - type: note
    content: 'montées 120.1n. –  Je lève les yeux…  : cf. 121.1 ; voir aussi 28.2n  ; Mt 14.19. –  qui habites (ou qui es assis dans , comme un roi, un juge) le ciel 2.4 ; 11.4 ; 103.19 ; 115.3,16 ; Es 40.22 ; Mt 5.34 ; 6.9.'
  - type: text
    content: Chant des montées.
  - type: text
    content: Je lève les yeux vers toi
  - type: text
    content: qui habites le ciel.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '25.15 ; 141.8 ; 145.15. –  se tournent  : sous-entendu dans le texte. –  vers leur maître / vers sa maîtresse  : litt. vers la main de leurs seigneurs / vers la main de sa maîtresse. –  jusqu''à… 69.4 ; cf. Es 40.27. – Voir grâce.'
  - type: text
    content: Comme les yeux des serviteurs
  - type: text
    content: se tournent vers leur maître,
  - type: text
    content: et les yeux de la servante vers sa maîtresse,
  - type: text
    content: 'ainsi nos yeux se tournent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: jusqu'à ce qu'il nous fasse grâce.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '44.14ss ; cf. 42.4+ ; Né 3.36 ; 2P 3.3s. –  par trop (ou plus que ) rassasiés  : cf. v. 4n  ; 120.6.'
  - type: text
    content: 'Fais-nous grâce, '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-nous grâce !'
  - type: text
    content: Car nous sommes par trop rassasiés de mépris ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Texte incertain. –  nous sommes plus que rassasiés  : litt. notre être (ou notre gosier ) est très rassasié (6.4n). –  des gens satisfaits  : même mot en Es 32.9,11 ; Am 6.1 ; Za 1.15 ; cf. Pr 16.18 ; 18.12.'
  - type: text
    content: nous sommes plus que rassasiés
  - type: text
    content: des moqueries des gens satisfaits,
  - type: text
    content: du mépris des gens hautains.
