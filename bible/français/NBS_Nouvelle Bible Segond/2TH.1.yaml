document_id: 2TH.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: Cf. 1Th 1.1+. – Voir Eglise.
  - type: text
    content: 'Paul, Silvain et Timothée, à l''Eglise des Thessaloniciens qui est en Dieu, notre Père, et dans le Seigneur Jésus-Christ : '
  '10':
  - type: note
    content: 'glorifié dans (ou par, parmi, au milieu de) ses saints  : cf. Ps 68.36n  ; 89.8n  ; 1Th 3.13n  ; 2Th 1.12 ; voir aussi Col 3.4. –  reconnu avec étonnement  : autre traduction admiré. –  vous avez cru notre témoignage  : litt. notre témoignage auprès de vous a été cru  ; cf. 1Co 1.6 ; 1Th 1.5. –  en ce jour-là Es 2.11,17,20 ; 1Th 5.2.'
  - type: text
    content: quand il viendra pour être glorifié dans ses saints et reconnu avec étonnement dans tous ceux qui auront cru – or vous avez cru notre témoignage – oui, en ce jour-là.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'nous prions  : cf. Ph 1.9 ; Col 1.3,9 ; 1Th 1.2. –  vous juge (ou, peut-être, vous rende ) dignes  : cf. v. 5. –  son appel 1Co 1.26 ; 7.20 ; Ph 3.14 ; 1Th 2.12+. –  toute intention bonne  : litt. tout bon plaisir (cf. Ph 1.15 ; 2.13n) de bonté  ; d''autres comprennent tout son bon plaisir . –  œuvre de foi 1Th 1.3.'
  - type: text
    content: 'C''est pourquoi nous prions toujours pour vous, afin que notre Dieu vous juge dignes de son appel et qu''il accomplisse, avec puissance, toute intention bonne et toute œuvre de foi, '
  '12':
  - type: note
    content: 'que le nom…  : cf. 3.6 ; Rm 10.13 ; 1Co 1.2,10 ; 5.4 ; 6.11 ; Col 3.17 ; voir aussi Es 66.5 ; Ml 1.11. –  glorifié en vous  : cf. v. 10+ ; Jn 17.10 ; Ga 1.24. –  et vous en lui  : cf. Jn 17.22,24 ; Rm 8.18s ; 2Co 3.18 ; Ph 3.20s. –  selon…  : autre traduction selon la grâce de notre Dieu et Seigneur Jésus-Christ  ; cf. Rm 5.15 ; 1Co 1.4 ; 3.10 ; 15.10 ; 2Co 1.12 ; 6.1 ; voir aussi Jn 20.28 ; Rm 9.5 ; Tt 2.13 ; 2P 1.11.'
  - type: text
    content: de sorte que le nom de notre Seigneur Jésus soit glorifié en vous, et vous en lui, selon la grâce de notre Dieu et du Seigneur Jésus-Christ.
  '2':
  - type: note
    content: 'Grâce et paix… Rm 1.7+. –  Dieu, notre Père  : certains mss portent Dieu, le Père.'
  - type: text
    content: Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !
  - type: heading
    content: Le jugement prévu pour le jour de la venue du Christ
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Nous devons…  : cf. 2.13 ; 1Co 1.4 ; 1Th 1.2 ; 2.13. –  votre foi est en pleine croissance…  : cf. 2Co 10.15 ; Ph 1.25 ; 1Th 1.3 ; 3.6,12. –  foisonne Rm 5.20n.'
  - type: text
    content: 'Nous devons, frères, rendre toujours grâce à Dieu à votre sujet, et ce n''est que juste, puisque votre foi est en pleine croissance et que l''amour que vous avez tous les uns pour les autres foisonne. '
  '4':
  - type: note
    content: 'fiers de vous 2Co 1.14+ ; 7.4 ; 8.24 ; 9.2ss ; cf. 1Th 1.6ss ; 2.19s. –  persévérance ou endurance, 3.5 ; 1Tm 6.11 ; Tt 2.2 ; Ap 13.10. –  persécutions / détresses  : cf. Mc 4.17 ; Rm 8.35 ; 1Th 2.14 ; 3.3n,7 ; Ap 1.9.'
  - type: text
    content: 'Ainsi nous sommes fiers de vous dans les Eglises de Dieu, à cause de votre persévérance et de votre foi dans toutes vos persécutions et dans les détresses que vous supportez. '
  '5':
  - type: note
    content: 'un indice Ph 1.28n. –  juste jugement v. 6,8 ; 2.9-12 ; cf. Rm 2.5ss ; 1Co 3.12ss ; 4.5 ; 2Co 5.10. –  jugés (ou rendus, v. 11) dignes du royaume de Dieu Mt 5.10 ; 1Co 6.9s ; Ga 5.21 ; 1Th 2.12 ; cf. Lc 20.35 ; Ac 5.41 ; 14.22+. –  pour lequel vous souffrez  : litt. pour lequel aussi (ou précisément) vous souffrez  : cf. 1Th 2.14 ; 3.4 ; Hé 12.3ss ; Psaumes de Salomon 13.10 : « Le Seigneur épargnera ses saints, il effacera leurs fautes par un châtiment. » 2 Baruch 78.5 (lettre de Baruch aux exilés) : « Pour que vous estimiez juste le jugement de celui qui vous a condamnés à être emmenés captifs. Car ce que vous souffrez est moindre que ce que vous avez fait, pourvu que vous soyez, aux derniers temps, jugés dignes de vos pères. »'
  - type: text
    content: 'Il y a là un indice du juste jugement de Dieu ; c''est afin que vous soyez jugés dignes du royaume de Dieu, pour lequel vous souffrez '
  '6':
  - type: note
    content: 'juste v. 5+. –  de la part de Dieu  : autre traduction au regard de Dieu. –  rendre de la détresse… 1Th 3.3ns ; cf. Es 66.6 ; Ab 14s ; Rm 12.19 ; Ap 18.6ss.'
  - type: text
    content: '– s''il est vrai qu''il est juste, de la part de Dieu, de rendre de la détresse à ceux qui vous causent de la détresse, '
  '7':
  - type: note
    content: 'avec nous  : cf. 1Co 4.8ss ; 2Co 6.4ss ; 11.21ss. –  lorsque…  : litt. dans la révélation du Seigneur Jésus, cf. 1Co 1.7+ ; voir aussi Rm 2.5 ; 8.18s ; 1Co 3.13 ; 1Th 4.16 ; 2P 3.7ss. –  ses anges puissants  : litt. les anges de sa puissance, sémitisme, cf. Mc 13.26s/ / ; 1Th 3.13+ ; voir aussi Za 14.5 ; Ps 68.18 ; Jd 14.'
  - type: text
    content: 'et de vous donner, à vous qui êtes dans la détresse, du repos avec nous, lorsque le Seigneur Jésus se révélera du ciel avec ses anges puissants, '
  '8':
  - type: note
    content: 'un feu flamboyant  : cf. Ex 3.2 ; Es 29.6 ; 66.15s ; Ps 29.7 ; Dn 7.9ss ; 1Co 3.13,15. –  faire justice…  : litt. donner justice (ou vengeance) à cf. v. 6s ; Rm 12.19. –  qui ne connaissent pas Dieu  : cf. Jr 10.25 ; Ps 79.6 ; Rm 1.18ss,28 ; 1Th 4.5 ; voir aussi Jr 4.22 ; 9.3,6 ; Os 5.4. –  qui n''obéissent pas…  : cf. Es 66.4 ; Rm 1.5 ; 2.8 ; 10.16 ; 11.30ss ; 1P 4.17.'
  - type: text
    content: 'dans un feu flamboyant, pour faire justice contre ceux qui ne connaissent pas Dieu et ceux qui n''obéissent pas à la bonne nouvelle de notre Seigneur Jésus. '
  '9':
  - type: note
    content: 'destruction ou ruine (cf. 1Co 5.5 ; 1Th 5.3 ; 1Tm 6.9) éternelle (ou définitive) ; on retrouve les mêmes termes en 4 Maccabées 10.15 (« la ruine éternelle du tyran »). –  loin du Seigneur  : litt. loin de la face du Seigneur  : cf. Es 2.10,19,21 ; voir aussi 1Th 4.17. –  de sa force glorieuse  : litt. de la gloire de sa force.'
  - type: text
    content: 'Ceux-là auront pour juste châtiment une destruction éternelle, loin du Seigneur et de sa force glorieuse '
