document_id: 2CH.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: HISTOIRE DES ROIS DE JUDA
  - type: heading
    content: L'assemblée de Sichem
  - type: heading
    content: 1R 12.1-15
  - type: text
    content: ' '
  - type: note
    content: Roboam 1R 11.43n  ; 12.
  - type: text
    content: 'Roboam se rendit à Sichem, car tout Israël était venu à Sichem pour l''investir de la royauté. '
  '10':
  - type: text
    content: 'Les jeunes gens qui avaient grandi avec lui lui dirent : Tu parleras ainsi au peuple qui t''a tenu ce langage :'
  - type: text
    content: « Ton père a rendu notre joug pesant ;
  - type: text
    content: toi, allège-le-nous ! »
  - type: text
    content: 'Tu leur parleras ainsi :'
  - type: text
    content: « Mon petit doigt est plus gros que les reins de mon père.
  '11':
  - type: text
    content: Mon père vous a imposé un joug pesant ?
  - type: text
    content: Moi, j'alourdirai encore votre joug !
  - type: text
    content: Mon père vous a corrigés avec des fouets ?
  - type: text
    content: Moi, je vous corrigerai avec des “scorpions” ! »
  '12':
  - type: text
    content: 'Jéroboam et tout le peuple se présentèrent à Roboam le troisième jour, suivant ce qu''avait dit le roi : « Revenez me voir dans trois jours. » '
  '13':
  - type: text
    content: 'Le roi leur répondit avec dureté. Le roi Roboam ne tint pas compte du conseil des anciens, '
  '14':
  - type: note
    content: Je rendrai ou, selon certains mss hébreux, mon père a rendu, comme au v. 11+.
  - type: text
    content: 'et il leur parla ainsi, d''après le conseil des jeunes gens :'
  - type: text
    content: Je rendrai votre joug pesant,
  - type: text
    content: je l'alourdirai moi-même.
  - type: text
    content: Mon père vous a corrigés avec des fouets ?
  - type: text
    content: Moi, ce sera avec des « scorpions » !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'de Dieu  : cf. 1R 12.15 du Seigneur.'
  - type: text
    content: 'Le roi n''écouta pas le peuple ; la tournure prise par les événements venait de Dieu, pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalise la parole qu''il avait dite par l''intermédiaire d''Ahiya de Silo à Jéroboam, fils de Nebath.'
  - type: heading
    content: Division du royaume d'Israël
  - type: heading
    content: 1R 12.16-19
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'tout Israël  : cf. 1R 12.1n. –  vit  : le verbe est rajouté ici d''après plusieurs mss hébreux et versions anciennes ; cf. 1R 12.16. –  Chacun (absent de LXX et 1R 12.16) à ses tentes  : cf. 1R 8.66n.'
  - type: text
    content: 'Lorsque tout Israël vit que le roi ne l''écoutait pas, le peuple répondit au roi :'
  - type: text
    content: Quelle part avons-nous avec David ?
  - type: text
    content: Nous n'avons pas de patrimoine avec le fils de Jessé !
  - type: text
    content: Chacun à ses tentes, Israël !
  - type: text
    content: Maintenant, regarde ta maison, David !
  - type: text
    content: Et tout Israël s'en alla à ses tentes.
  '17':
  - type: text
    content: 'Quant aux Israélites qui habitaient les villes de Juda, Roboam régna sur eux. '
  '18':
  - type: note
    content: 'Hadoram  : certains mss de LXX, Vetus latina (voir Vg), Syr et des versions arabes portent Adoniram. Cf. 1R 4.6n.'
  - type: text
    content: 'Alors le roi Roboam envoya Hadoram, qui était intendant des corvées. Mais les Israélites le lapidèrent, et il mourut. Alors le roi Roboam réussit à monter sur un char pour s''enfuir à Jérusalem. '
  '19':
  - type: note
    content: 'révolté  : c''est le point de vue de la tribu du sud ; cf. 1R 12.20.'
  - type: text
    content: C'est ainsi qu'Israël s'est révolté contre la maison de David jusqu'à ce jour.
  '2':
  - type: note
    content: 'pour échapper au roi Salomon  : litt. de la face du roi Salomon  ; LXX ajoute ici Jéroboam habitait en Egypte, cf. 1R 12.2.'
  - type: text
    content: 'Lorsque Jéroboam, fils de Nebath, l''apprit, il était en Egypte, où il s''était enfui pour échapper au roi Salomon ; et Jéroboam revint d''Egypte. '
  '3':
  - type: note
    content: 'tout Israël  : 1R 12.3 toute l''assemblée d''Israël.'
  - type: text
    content: 'On le fit appeler. Alors Jéroboam et tout Israël arrivèrent et dirent à Roboam : '
  '4':
  - type: text
    content: 'Ton père a rendu notre joug bien dur ; maintenant, allège le dur esclavage que ton père nous a imposé et le joug pesant qu''il a mis sur nous, et nous te servirons. '
  '5':
  - type: note
    content: 'dans trois jours  : cf. v. 12.'
  - type: text
    content: 'Il leur dit : Revenez me voir dans trois jours. Le peuple s''en alla.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Le roi Roboam prit…  : LXX le roi Roboam rassembla les anciens . –  qui s''étaient tenus au service de  : cf. 1R 10.8n.'
  - type: text
    content: 'Le roi Roboam prit conseil des anciens qui s''étaient tenus au service de Salomon, son père, pendant sa vie, et il dit : Que conseillez-vous de répondre à ce peuple ? '
  '7':
  - type: note
    content: 'avec bonté  : litt. de bonnes paroles. –  pour toujours  : litt. tous les jours.'
  - type: text
    content: 'Ils lui dirent : Si tu es bon envers ce peuple, si tu les accueilles favorablement, si tu leur parles avec bonté, ils seront pour toujours tes serviteurs. '
  '8':
  - type: text
    content: 'Mais Roboam ne tint pas compte du conseil que lui donnaient les anciens ; il prit conseil des jeunes gens qui avaient grandi avec lui et qui se tenaient à son service. '
  '9':
  - type: note
    content: 'Allège…  : cf. v. 4,10.'
  - type: text
    content: 'Il leur dit : Que conseillez-vous de répondre à ce peuple qui me tient ce langage : « Allège le joug que ton père a mis sur nous. » '
