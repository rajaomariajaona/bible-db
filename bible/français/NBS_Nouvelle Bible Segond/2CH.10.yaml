  - type: text
    text: HISTOIRE DES ROIS DE JUDA
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'assemblée de Sichem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1R 12.1-15
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Roboam '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.43
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.'
    marker-yv: yv-n
  - type: text
    text: 'Roboam se rendit à Sichem, car tout Israël était venu à Sichem pour l''investir de la royauté. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour échapper au roi Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la face du roi Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoute ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jéroboam habitait en Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1R 12.2.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Jéroboam, fils de Nebath, l''apprit, il était en Egypte, où il s''était enfui pour échapper au roi Salomon ; et Jéroboam revint d''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 1R 12.3 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: toute l'assemblée d'Israël.
    marker-yv: yv-n
  - type: text
    text: 'On le fit appeler. Alors Jéroboam et tout Israël arrivèrent et dirent à Roboam : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ton père a rendu notre joug bien dur ; maintenant, allège le dur esclavage que ton père nous a imposé et le joug pesant qu''il a mis sur nous, et nous te servirons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans trois jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 12.'
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Revenez me voir dans trois jours. Le peuple s''en alla.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le roi Roboam prit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le roi Roboam rassembla les anciens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui s'étaient tenus au service de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 10.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi Roboam prit conseil des anciens qui s''étaient tenus au service de Salomon, son père, pendant sa vie, et il dit : Que conseillez-vous de répondre à ce peuple ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec bonté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de bonnes paroles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour toujours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous les jours.
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Si tu es bon envers ce peuple, si tu les accueilles favorablement, si tu leur parles avec bonté, ils seront pour toujours tes serviteurs. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Mais Roboam ne tint pas compte du conseil que lui donnaient les anciens ; il prit conseil des jeunes gens qui avaient grandi avec lui et qui se tenaient à son service. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Allège…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 4,10.'
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Que conseillez-vous de répondre à ce peuple qui me tient ce langage : « Allège le joug que ton père a mis sur nous. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les jeunes gens qui avaient grandi avec lui lui dirent : Tu parleras ainsi au peuple qui t''a tenu ce langage :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Ton père a rendu notre joug pesant ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: toi, allège-le-nous ! »
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Tu leur parleras ainsi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: « Mon petit doigt est plus gros que les reins de mon père.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: Mon père vous a imposé un joug pesant ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, j'alourdirai encore votre joug !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon père vous a corrigés avec des fouets ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, je vous corrigerai avec des “scorpions” ! »
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Jéroboam et tout le peuple se présentèrent à Roboam le troisième jour, suivant ce qu''avait dit le roi : « Revenez me voir dans trois jours. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Le roi leur répondit avec dureté. Le roi Roboam ne tint pas compte du conseil des anciens, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je rendrai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon certains mss hébreux, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon père a rendu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 11+.'
    marker-yv: yv-n
  - type: text
    text: 'et il leur parla ainsi, d''après le conseil des jeunes gens :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je rendrai votre joug pesant,
- type: usfm
  marker: q1
  children:
  - type: text
    text: je l'alourdirai moi-même.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Mon père vous a corrigés avec des fouets ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi, ce sera avec des « scorpions » !
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 12.15 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi n''écouta pas le peuple ; la tournure prise par les événements venait de Dieu, pour que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' réalise la parole qu''il avait dite par l''intermédiaire d''Ahiya de Silo à Jéroboam, fils de Nebath.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Division du royaume d'Israël
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1R 12.16-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 12.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe est rajouté ici d''après plusieurs mss hébreux et versions anciennes ; cf. 1R 12.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chacun '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(absent de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et 1R 12.16) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à ses tentes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 8.66'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Lorsque tout Israël vit que le roi ne l''écoutait pas, le peuple répondit au roi :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Quelle part avons-nous avec David ?
- type: usfm
  marker: q1
  children:
  - type: text
    text: Nous n'avons pas de patrimoine avec le fils de Jessé !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Chacun à ses tentes, Israël !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Maintenant, regarde ta maison, David !
- type: usfm
  marker: p
  children:
  - type: text
    text: Et tout Israël s'en alla à ses tentes.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Quant aux Israélites qui habitaient les villes de Juda, Roboam régna sur eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hadoram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss de LXX, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Vetus latina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: '), '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et des versions arabes portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Adoniram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. 1R 4.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors le roi Roboam envoya Hadoram, qui était intendant des corvées. Mais les Israélites le lapidèrent, et il mourut. Alors le roi Roboam réussit à monter sur un char pour s''enfuir à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: révolté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c''est le point de vue de la tribu du sud ; cf. 1R 12.20.'
    marker-yv: yv-n
  - type: text
    text: C'est ainsi qu'Israël s'est révolté contre la maison de David jusqu'à ce jour.
