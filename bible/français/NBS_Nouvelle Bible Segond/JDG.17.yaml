        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; le verbe hébreu évoque le séjour de l'immigré dans un pays (ou une région) qui n'est pas le sien (Ex 12.48
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), de même dans la suite ; cf. Dt 12.12,18s ; 18.6.
      marker-yv: yv-n
    - type: text
      text: 'Il y avait un jeune homme de Beth-Léhem de Juda, du clan de Juda, qui était lévite ; il séjournait là en immigré. '
