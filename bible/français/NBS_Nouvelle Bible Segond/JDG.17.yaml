verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: 'LE TEMPS DES JUGES : AUTRES RÉCITS'
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Michée et son sanctuaire privé
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'région montagneuse d''Ephraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.27+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Michée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' apparaît ici sous la forme complète '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mikayehou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qui est comme YHWH ?
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; à partir du v. 5 il sera abrégé en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mika '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même nom que celui du prophète Michée). Les terminaisons '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'yehou, yahou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'yah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: représentent sous diverses formes (souvent interchangeables ou facultatives) le nom de YHWH, le Dieu d'Israël, ainsi inclus dans le nom de la personne.
      marker-yv: yv-n
    - type: text
      text: 'Il y avait un homme de la région montagneuse d''Ephraïm, nommé Michée, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un père et un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.19 ; le sacerdoce revenait primitivement au père de famille (cf. v. 5,11 ; 11.31-39 ; 13.19) ; mais le terme '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est aussi employé dans un sens honorifique plus large (Gn 45.8 ; 1S 24.12 ; 2R 2.12 ; 5.13 ; 6.21 ; 13.14). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dix sicles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : près de 100 g ; voir v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hésita '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''en alla '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (pour revenir ensuite, v. 11) ; traduction incertaine.
      marker-yv: yv-n
    - type: text
      text: 'Michée lui dit : Reste avec moi ; sois pour moi un père et un prêtre, et je te donnerai dix sicles d''argent par an, un assortiment de vêtements et ta nourriture. Le lévite hésita, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 5,10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'puis il accepta de rester avec cet homme ; celui-ci traita le jeune homme comme l''un de ses fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'investit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Michée investit le lévite ; ce jeune homme devint son prêtre ; il vivait chez Michée. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2S 6.12.
      marker-yv: yv-n
    - type: text
      text: 'Michée dit : Maintenant, je sais que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me fera du bien, puisque j''ai ce lévite pour prêtre.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mille cent sicles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ici et dans la suite, l''unité de poids ou de monnaie (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies) est sous-entendue dans le texte ; s''il s''agit bien de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sicles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', il s''agit de plus de 10 kg d''argent ; cf. 16.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fait une adjuration
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prononcé une malédiction (conditionnelle)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 24.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 5.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en ma présence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à mes oreilles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que mon fils soit béni…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ' est sans doute destinée à annuler la malédiction solennelle que la mère avait prononcée sur le voleur, sans savoir qu''il s''agissait de son propre fils ; cf. 1R 8.31s ; Za 5.3s ; Pr 29.24 ; voir aussi 2S 21.3 ; 1R 2.44s.'
      marker-yv: yv-n
    - type: text
      text: 'qui dit à sa mère : Les mille cent sicles d''argent qu''on t''a pris et pour lesquels tu as fait une adjuration, aussi en ma présence, c''est moi qui les ai ; c''est moi qui ai pris cet argent. Sa mère dit alors : Que mon fils soit béni du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : verbe traditionnellement rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sanctifier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maintenant je vais te le rendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains pensent que cette phrase avait primitivement sa place au v. 2, après '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est moi qui ai pris cet argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres l''interprètent, ici, de la mère à son fils'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de cette façon je te le rendrai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . On a proposé d'autres reconstitutions encore pour les v. 2s.
      marker-yv: yv-n
    - type: text
      text: 'Il rendit à sa mère les mille cent sicles d''argent ; sa mère dit alors : Je vais consacrer cet argent au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', afin d''en faire pour mon fils une statue et une idole de métal fondu – maintenant je vais te le rendre. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'deux cents sicles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ≈ 1,9 kg ; voir v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une statue et une idole…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une statue, une idole…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; les deux expressions pourraient se rapporter à un seul et même objet ; cf. 18.17s,20 ; Dt 27.15.'
      marker-yv: yv-n
    - type: text
      text: 'Il rendit donc l''argent à sa mère. Sa mère prit deux cents sicles d''argent qu''elle donna au fondeur. Celui-ci en fit une statue et une idole de métal fondu. On les plaça dans la maison de Michée. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '17.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.14,17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Michée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une maison de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais celle-ci est associée au '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (YHWH, v. 2s ; cf. Gn 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; sur l''expression voir aussi Gn 28.17,22) ; ce détail tend à illustrer la confusion religieuse qui existait en Israël avant la royauté (v. 6+). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des teraphim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un teraphim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; comme l’'
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'éphod '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir 8.26-27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'teraphim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou idoles domestiques (Gn 31.19-35 ; 1S 19.13-16) servaient sans doute à la divination ; cf. 1S 15.23 ; 2R 23.24 ; Ez 21.26 ; Os 3.4 ; Za 10.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: investit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: remplit la main de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Ex 28.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'un de ses fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6-13 ; Nb 3.3 ; 1R 12.31 ; 13.33.'
      marker-yv: yv-n
    - type: text
      text: Ce Michée eut ainsi une maison de Dieu ; il fit un éphod et des teraphim, et il investit l'un de ses fils, qui lui servit de prêtre.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
