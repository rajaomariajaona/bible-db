document_id: JDG.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'LE TEMPS DES JUGES : AUTRES RÉCITS'
  - type: heading
    content: Michée et son sanctuaire privé
  - type: text
    content: ' '
  - type: note
    content: 'région montagneuse d''Ephraïm 3.27+. –  Michée  : le nom apparaît ici sous la forme complète Mikayehou ( Qui est comme YHWH ? ) ; à partir du v. 5 il sera abrégé en Mika (même nom que celui du prophète Michée). Les terminaisons yehou, yahou et yah représentent sous diverses formes (souvent interchangeables ou facultatives) le nom de YHWH, le Dieu d''Israël, ainsi inclus dans le nom de la personne.'
  - type: text
    content: 'Il y avait un homme de la région montagneuse d''Ephraïm, nommé Michée, '
  '10':
  - type: note
    content: 'un père et un prêtre 18.19 ; le sacerdoce revenait primitivement au père de famille (cf. v. 5,11 ; 11.31-39 ; 13.19) ; mais le terme père est aussi employé dans un sens honorifique plus large (Gn 45.8 ; 1S 24.12 ; 2R 2.12 ; 5.13 ; 6.21 ; 13.14). –  dix sicles  : près de 100 g ; voir v. 2n. –  hésita ou s''en alla (pour revenir ensuite, v. 11) ; traduction incertaine.'
  - type: text
    content: 'Michée lui dit : Reste avec moi ; sois pour moi un père et un prêtre, et je te donnerai dix sicles d''argent par an, un assortiment de vêtements et ta nourriture. Le lévite hésita, '
  '11':
  - type: note
    content: Cf. v. 5,10n.
  - type: text
    content: 'puis il accepta de rester avec cet homme ; celui-ci traita le jeune homme comme l''un de ses fils. '
  '12':
  - type: note
    content: investit v. 5n.
  - type: text
    content: 'Michée investit le lévite ; ce jeune homme devint son prêtre ; il vivait chez Michée. '
  '13':
  - type: note
    content: Cf. 2S 6.12.
  - type: text
    content: 'Michée dit : Maintenant, je sais que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me fera du bien, puisque j''ai ce lévite pour prêtre.'
  '2':
  - type: note
    content: 'mille cent sicles  : ici et dans la suite, l''unité de poids ou de monnaie (voir mesures, poids et monnaies) est sous-entendue dans le texte ; s''il s''agit bien de sicles, il s''agit de plus de 10 kg d''argent ; cf. 16.5. –  fait une adjuration  : autre traduction prononcé une malédiction (conditionnelle)  ; cf. Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n. –  en ma présence  : litt. à mes oreilles. –  Que mon fils soit béni…  : cette bénédiction est sans doute destinée à annuler la malédiction solennelle que la mère avait prononcée sur le voleur, sans savoir qu''il s''agissait de son propre fils ; cf. 1R 8.31s ; Za 5.3s ; Pr 29.24 ; voir aussi 2S 21.3 ; 1R 2.44s.'
  - type: text
    content: 'qui dit à sa mère : Les mille cent sicles d''argent qu''on t''a pris et pour lesquels tu as fait une adjuration, aussi en ma présence, c''est moi qui les ai ; c''est moi qui ai pris cet argent. Sa mère dit alors : Que mon fils soit béni du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '3':
  - type: note
    content: 'consacrer  : verbe traditionnellement rendu par sanctifier  ; voir saint. –  maintenant je vais te le rendre  : certains pensent que cette phrase avait primitivement sa place au v. 2, après c''est moi qui ai pris cet argent  ; d''autres l''interprètent, ici, de la mère à son fils  : de cette façon je te le rendrai. On a proposé d''autres reconstitutions encore pour les v. 2s.'
  - type: text
    content: 'Il rendit à sa mère les mille cent sicles d''argent ; sa mère dit alors : Je vais consacrer cet argent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', afin d''en faire pour mon fils une statue et une idole de métal fondu – maintenant je vais te le rendre. '
  '4':
  - type: note
    content: 'deux cents sicles ≈ 1,9 kg ; voir v. 2n. –  une statue et une idole…  : autre traduction une statue, une idole…  ; les deux expressions pourraient se rapporter à un seul et même objet ; cf. 18.17s,20 ; Dt 27.15.'
  - type: text
    content: 'Il rendit donc l''argent à sa mère. Sa mère prit deux cents sicles d''argent qu''elle donna au fondeur. Celui-ci en fit une statue et une idole de métal fondu. On les plaça dans la maison de Michée. '
  '5':
  - type: note
    content: '18.14,17. –  Michée v. 1n. –  une maison de Dieu ou de dieux, mais celle-ci est associée au Seigneur (YHWH, v. 2s ; cf. Gn 1.1n  ; sur l''expression voir aussi Gn 28.17,22) ; ce détail tend à illustrer la confusion religieuse qui existait en Israël avant la royauté (v. 6+). –  des teraphim  : autre traduction un teraphim  ; comme l’éphod (voir 8.26-27n), les teraphim ou idoles domestiques (Gn 31.19-35 ; 1S 19.13-16) servaient sans doute à la divination ; cf. 1S 15.23 ; 2R 23.24 ; Ez 21.26 ; Os 3.4 ; Za 10.2. –  investit  : litt. remplit la main de, voir Ex 28.41n. –  l''un de ses fils  : cf. v. 6-13 ; Nb 3.3 ; 1R 12.31 ; 13.33.'
  - type: text
    content: Ce Michée eut ainsi une maison de Dieu ; il fit un éphod et des teraphim, et il investit l'un de ses fils, qui lui servit de prêtre.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '18.1 ; 19.1 ; 21.25 ; cf. Dt 12.8+ss. –  ce qui lui convenait  : litt. ce qui était droit à ses yeux , cf. 21.25.'
  - type: text
    content: 'En ces jours-là, il n''y avait pas de roi en Israël : chacun faisait ce qui lui convenait. '
  '7':
  - type: note
    content: 'Beth-Léhem de Juda  : cf. 12.8n  ; 19.1s ; 1S 16.4 ; Mi 5.1 ; Rt 1.1 ; Mt 2.1 ; Jn 7.42. – Voir lévite. –  il séjournait là en immigré  : hébreu gar-sham, qui rappelle l''étymologie biblique de Guershom (voir 18.30n  ; Ex 2.22n  ; 18.3n) ; le verbe hébreu évoque le séjour de l''immigré dans un pays (ou une région) qui n''est pas le sien (Ex 12.48n), de même dans la suite ; cf. Dt 12.12,18s ; 18.6.'
  - type: text
    content: 'Il y avait un jeune homme de Beth-Léhem de Juda, du clan de Juda, qui était lévite ; il séjournait là en immigré. '
  '8':
  - type: note
    content: 'là où il pourrait  : litt. où il trouverait (de même au v. 9). –  il arriva… 18.2.'
  - type: text
    content: 'Cet homme partit de la ville de Beth-Léhem de Juda pour aller séjourner en immigré là où il pourrait. En poursuivant son chemin dans la région montagneuse d''Ephraïm, il arriva à la maison de Michée. '
  '9':
  - type: text
    content: 'Michée lui dit : D''où viens-tu ? Il lui répondit : Je suis lévite, de Beth-Léhem de Juda, et je voyage pour aller séjourner en immigré là où je pourrai. '
