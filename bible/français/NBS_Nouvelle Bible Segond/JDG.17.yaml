          text: 'où il trouverait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même au v. 9). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il arriva… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 18.2.
      marker-yv: yv-n
    - type: text
      text: 'Cet homme partit de la ville de Beth-Léhem de Juda pour aller séjourner en immigré là où il pourrait. En poursuivant son chemin dans la région montagneuse d''Ephraïm, il arriva à la maison de Michée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Michée lui dit : D''où viens-tu ? Il lui répondit : Je suis lévite, de Beth-Léhem de Juda, et je voyage pour aller séjourner en immigré là où je pourrai. '
