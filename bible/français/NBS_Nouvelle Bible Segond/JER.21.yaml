document_id: JER.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une réponse du Seigneur au roi Sédécias
  - type: text
    content: ' '
  - type: note
    content: 'Parole 1.2n. –  Sédécias 1.3n. –  Pashhour, fils de Malkiya 38.1 ; cf. 20.1n. –  Sophonie…  : cf. 29.25 ; 37.3 ; 52.24.'
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', lorsque le roi Sédécias lui envoya Pashhour, fils de Malkiya, et Sophonie, fils de Maaséya, le prêtre, pour lui dire : '
  '10':
  - type: note
    content: 'je me tourne vers ou contre…  : cf. 39.16 ; 44.11n  ; Lv 20.3 ; Ez 14.8 ; Am 9.4. –  Elle sera livrée… 32.3,28 ; 34.2 ; 38.3,18.'
  - type: text
    content: 'Car je me tourne vers cette ville, non pas pour son bonheur, mais pour son malheur – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: . Elle sera livrée au roi de Babylone, qui y mettra le feu.
  - type: heading
    content: Message à la famille royale de Juda
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'la maison du roi de Juda  : l''oracle qui commence ici (jusqu''à 22.9) s''adresse peut-être à Joïaqim (1.3n), comme 22.13-19.'
  - type: text
    content: 'A la maison du roi de Juda :'
  - type: text
    content: 'Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'dès le matin ou chaque matin , c.-à-d. avec empressement ou toujours . –  délivrez de la main de l''oppresseur… 22.3,13 ; Ps 82.4 ; Jb 5.15 ; Pr 24.11. –  de peur que… 4.4n. –  personne pour éteindre 7.20+. –  à cause…  : le dernier vers est absent de LXX  ; cf. 23.2.'
  - type: text
    content: 'Maison de David, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Jugez avec équité dès le matin,
  - type: text
    content: délivrez de la main de l'oppresseur celui qu'on dépouille,
  - type: text
    content: de peur que ma fureur n'éclate comme un feu et ne brûle,
  - type: text
    content: sans qu'il y ait personne pour éteindre,
  - type: text
    content: à cause de vos agissements mauvais.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''oppose à toi  : litt. me voici contre toi  ; cf. 23.30ss ; 50.31 ; 51.25 ; Ez 26.3 ; 29.8 ; Na 2.14 ; 3.5. –  habitante de (ou toi qui trônes sur ) la vallée / rocher du plateau  : ces expressions désignent soit la ville de Jérusalem par rapport aux vallées environnantes, soit plus précisément le palais royal en contrebas du temple (d''où peut-être l''expression Qui descendra , 22.1+) ; cf. 22.6s ; 49.4 ; Ab 3. –  Qui descendra…  : certains, en modifiant la vocalisation traditionnelle de l''hébreu, lisent qui nous terrifiera ? cf. Jb 21.13n.'
  - type: text
    content: Je m'oppose à toi,
  - type: text
    content: habitante de la vallée,
  - type: text
    content: du rocher du plateau,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: 'à vous qui dites : Qui descendra contre nous ?'
  - type: text
    content: Qui entrera dans nos repaires ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: Je vous ferai rendre des comptes 5.9+ ; 6.15n. –  selon le fruit… 17.10+. –  la forêt / les alentours litt. sa forêt / ses alentours , le possessif se référant à un féminin, sans doute l’ habitante du v. 13 ; sur le terme forêt , qui peut désigner le palais royal, cf. 22.6s ; 1R 7.2ss ; 10.17,21 ; Es 9.17+ ; 22.8n.
  - type: text
    content: Je vous ferai rendre des comptes
  - type: text
    content: selon le fruit de vos agissements
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Je mettrai le feu à la forêt,
  - type: text
    content: et il dévorera tous les alentours.
  '2':
  - type: note
    content: 'Consulte 37.7 ; cf. 2R 22.13. –  Nabuchodonosor, roi de Babylone (605-562 av. J.-C.) ; son nom est ici orthographié Nevoukadretsar (au lieu de Nevoukadnetsar, forme usuelle en hébreu), ce qui correspond à sa forme babylonienne Nabou-Koudourrou-Outsour, « (le dieu) Nebo protège le fils (ou la frontière) ». La forme Nabuchodonosor, plus connue en français, nous vient de la traduction grecque (LXX) ; cf. 24.1 ; 27.8 ; 28.3 ; 29.1 ; 34.1 ; 35.11 ; 37.1 ; 39.1 ; 43.10 ; 52.4. –  fera-t-il…  : litt. nous fera-t-il selon toutes ses choses étonnantes  ; cf. Ps 86.10 ; 105.2,5. –  afin qu''il s''éloigne 34.21n  ; cf. 2R 19.35s.'
  - type: text
    content: 'Consulte le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour nous, je te prie, car Nabuchodonosor, roi de Babylone, nous fait la guerre ; peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera-t-il pour nous un de ses actes étonnants, afin qu''il s''éloigne de nous.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 27.12ss ; 32.1ss ; 37.5ss.
  - type: text
    content: 'Jérémie leur répondit : Vous direz à Sédécias : '
  '4':
  - type: note
    content: 'les armes  : litt. les instruments de guerre qui sont dans vos mains. –  qui vous assiègent  : le texte hébreu précise de l''extérieur de la muraille  ; l''expression peut s''appliquer aux assiégeants, mais aussi à l''orientation des armes des défenseurs (les armes tournées vers l''extérieur, je les rassemblerai à l''intérieur). –  je les rassemblerai (les Chaldéens ou Babyloniens, cf. Es 23.13n  ; Ez 11.24n  ; ou les armes) : cf. 39.3. –  contre l''intérieur  : autre traduction à l''intérieur.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Je détourne les armes avec lesquelles vous combattez le roi de Babylone et les Chaldéens qui vous assiègent ; je les rassemblerai contre l''intérieur de cette ville. '
  '5':
  - type: note
    content: 'je vous combattrai… Es 63.10 ; cf. Lm 2.4 ; Ap 2.16. –  main étendue…  : cf. 27.5 ; 32.17,21 ; Dt 4.34+ ; Es 62.8 ; Ez 20.33 ; Ps 89.11. –  colère / fureur / irritation 32.37 ; 50.13+ ; Dt 29.27.'
  - type: text
    content: 'Et je vous combattrai moi-même, d''une main étendue, d''un bras fort, avec colère, avec fureur, avec une grande irritation. '
  '6':
  - type: note
    content: 'affreuse  : litt. grande.'
  - type: text
    content: 'Je frapperai les habitants de cette ville, les humains et les bêtes ; ils mourront d''une peste affreuse. '
  '7':
  - type: note
    content: 'je livrerai… 22.25 ; 24.8s ; 34.20s ; 44.30. –  Sédécias  : cf. 32.5 ; 34.5 ; voir aussi Lc 21.24. –  le peuple et ceux…  : quelques mss hébreux et des versions anciennes ont lu le peuple de ceux… –  auront survécu à  : litt. seront restés de. –  qui en veulent à leur vie 11.21n. –  aucune pitié… 13.14+.'
  - type: text
    content: 'Après cela – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – je livrerai Sédécias, roi de Juda, les gens de sa cour, le peuple et ceux qui dans cette ville auront survécu à la peste, à l''épée et à la famine ; je les livrerai à Nabuchodonosor, roi de Babylone, à leurs ennemis, à ceux qui en veulent à leur vie ; il les passera au fil de l''épée, il n''aura aucune pitié pour eux, il n''épargnera personne et il n''aura pas de compassion.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.5+ss ; Dt 30.15+ss ; Siracide 15.17 : « Aux hommes sont proposées la vie et la mort : à chacun sera donné selon son choix. »'
  - type: text
    content: 'Quant à ce peuple, tu lui diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je mets devant vous le chemin de la vie et le chemin de la mort. '
  '9':
  - type: note
    content: 38.2,17. –  épée / famine / peste 14.12+. –  sa vie sera son butin 38.2 ; 39.18 ; 45.5.
  - type: text
    content: 'Celui qui restera dans cette ville mourra par l''épée, par la famine ou par la peste ; mais celui qui sortira pour se rendre aux Chaldéens qui vous assiègent vivra, et sa vie sera son butin. '
