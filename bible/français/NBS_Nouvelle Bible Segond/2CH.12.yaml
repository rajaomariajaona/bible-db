document_id: 2CH.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Shishaq, roi d'Egypte, envahit Juda
  - type: heading
    content: 1R 14.25-28
  - type: text
    content: ' '
  - type: note
    content: 'il abandonna la loi…  : cf. 1R 14.22-24. –  tout Israël  : cf. 21.2n.'
  - type: text
    content: 'Lorsque la royauté de Roboam se fut consolidée et que lui-même fut devenu fort, il abandonna la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et tout Israël l''abandonna avec lui.'
  '10':
  - type: note
    content: gardes du corps v. 11 ; 1S 22.17n.
  - type: text
    content: 'Le roi Roboam fit à leur place des boucliers de bronze et les confia aux chefs des gardes du corps, qui gardaient l''entrée de la maison du roi. '
  '11':
  - type: text
    content: 'Toutes les fois que le roi allait à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', les gardes du corps venaient et les portaient ; puis ils les rapportaient dans la salle des gardes du corps.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'la colère du Seigneur se détourna  : cf. Jr 23.20 ; voir aussi Gn 27.45. –  de bonnes choses en Juda  : cf. 19.3.'
  - type: text
    content: 'Comme Roboam s''était humilié, la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se détourna de lui et ce ne fut pas une destruction totale. Il y avait d''ailleurs de bonnes choses en Juda.'
  - type: heading
    content: Fin du règne de Roboam
  - type: heading
    content: 1R 14.21-24
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'dix-sept ans ≈ 931-913 av. J.-C. –  la ville… choisie  : cf. 1R 11.36+. –  pour y placer son nom  : cf. 1R 9.3+. –  Naama  : cf. 1R 14.31.'
  - type: text
    content: 'Le roi Roboam devint fort à Jérusalem ; il régna. Roboam avait quarante et un ans lorsqu''il devint roi ; il régna dix-sept ans à Jérusalem, la ville que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait choisie parmi toutes les tribus d''Israël pour y placer son nom. Le nom de sa mère était Naama, l''Ammonite. '
  '14':
  - type: note
    content: 'il n''appliqua pas son cœur à chercher le Seigneur  : autre texte en 1R 14.22 ; cf. 2Ch 19.3 ; 30.19.'
  - type: text
    content: 'Il fit du mal, parce qu''il n''appliqua pas son cœur à chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: 1R 14.29-31
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'L''histoire de Roboam…  : cf. 1R 11.41n. –  le début et la fin 9.29+. –  et enregistré  : litt. pour être enregistré  ; cf. Esd 2.62 ; 1Ch 9.1. –  histoire de Shemaya (v. 5n,7 ; 11.2) , le prophète, et d''Iddo… (9.29n  ; 13.22) : écrits inconnus par ailleurs.'
  - type: text
    content: 'L''histoire de Roboam, le début et la fin, cela est écrit et enregistré dans l''histoire de Shemaya, le prophète, et d''Iddo, le visionnaire. Il y eut toujours des guerres entre Roboam et Jéroboam. '
  '16':
  - type: note
    content: se coucha avec ses pères 1R 1.21n. –  dans la Ville de David 9.31+. –  Abiya 11.20n.
  - type: text
    content: Roboam se coucha avec ses pères et fut enseveli dans la Ville de David. Abiya, son fils, devint roi à sa place.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Shishaq 1R 11.40n. –  attaqua ou partit à l''attaque de  : cf. v. 9. –  parce qu''ils avaient commis des sacrilèges  : autre traduction parce qu''ils avaient été infidèles  ; expression fréquente dans les Chroniques, cf. 26.16,18 ; 28.19,22 ; 30.7 ; 36.14 ; 1Ch 2.7 ; 5.25 ; 10.13 ; voir aussi Nb 5.6+.'
  - type: text
    content: 'La cinquième année du roi Roboam, Shishaq, roi d''Egypte, attaqua Jérusalem, parce qu''ils avaient commis des sacrilèges envers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: 'hommes d''équipage (pour les chars) : autres traductions équipages, attelages, chevaux d''attelage. –  Soukkites  : peut-être des nomades apparentés aux Scythes, au nord-est de l''Iran. LXX a traduit Troglodytes, nom donné à plusieurs peuples (dans le Caucase, mais aussi au Soudan). –  Koushites ou Nubiens  ; cf. Gn 2.13n.'
  - type: text
    content: 'Il avait mille deux cents chars et soixante mille hommes d''équipage. Il vint d''Egypte avec lui un peuple innombrable, des Libyens, des Soukkites et des Koushites. '
  '4':
  - type: note
    content: 'villes fortes  : cf. 11.10n.'
  - type: text
    content: 'Il prit les villes fortes qui appartenaient à Juda et arriva jusqu''à Jérusalem. '
  '5':
  - type: note
    content: 'Shemaya  : signifie YHWH a entendu, v. 7 ; voir 11.2. –  à l''approche ou à cause de, ce qui pourrait signifier par crainte de. –  vous m''avez abandonné…  : cf. 15.2.'
  - type: text
    content: 'Alors Shemaya, le prophète, se rendit auprès de Roboam et des princes de Juda qui s''étaient repliés sur Jérusalem à l''approche de Shishaq. Il leur dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Vous, vous m''avez abandonné ; moi aussi, je vous abandonne aux mains de Shishaq. '
  '6':
  - type: note
    content: 'Les princes d''Israël  : cf. v. 1 (tout Israël), 5 (princes de Juda). –  s''humilièrent  : tournure fréquente dans les Chroniques ; cf. v. 7,12 ; 7.14 ; 30.11 ; 32.26 ; 33.19,23 ; 34.27 ; voir aussi 1R 21.29 ; 2R 22.19. –  Le Seigneur est juste  : cf. Es 45.21 ; Jr 12.1 ; So 3.5 ; Ps 11.7+ ; 116.5+ ; 119.137+ ; Dn 9.14 ; Esd 9.15 ; voir aussi Ex 9.27.'
  - type: text
    content: 'Les princes d''Israël et le roi s''humilièrent ; ils dirent : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est juste ! '
  '7':
  - type: note
    content: 'ma fureur ne se répandra pas  : cf. 34.21,25 ; Jr 7.20 ; 42.18 ; Na 1.6 ; même verbe en Dn 9.11.'
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vit qu''ils s''humiliaient, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Shemaya : Ils se sont humiliés, je ne les détruirai pas ; sous peu, je leur donnerai d''échapper, et ma fureur ne se répandra pas sur Jérusalem par l''intermédiaire de Shishaq. '
  '8':
  - type: note
    content: 'esclaves… servir  : ces deux termes traduisent la même racine hébraïque (cf. Lv 25.42n), ce qui établit une correspondance entre esclaves et servir les royaumes… D''autre part, l''expression cultuelle me servir pourrait aussi être traduite me rendre un culte, alors que l''aspect politique de servir les royaumes… pourrait être rendu par être soumis aux royaumes… –  des autres pays  : litt. des pays.'
  - type: text
    content: Toutefois, ils seront ses esclaves, et ainsi ils sauront quelle différence il y a entre me servir et servir les royaumes des autres pays.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Shishaq 1R 11.40n. –  boucliers d''or  : cf. 1R 10.16s.'
  - type: text
    content: 'Shishaq, roi d''Egypte, attaqua Jérusalem. Il prit les trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les trésors de la maison du roi, il prit tout. Il prit les boucliers d''or que Salomon avait faits. '
