document_id: JER.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le péché ineffaçable du peuple de Juda
  - type: text
    content: ' '
  - type: note
    content: LXX omet les v. 1-4 ; cf. 2.22 ; 6.7,29 ; 13.23. – Voir péché. –  avec un stylet de fer 8.8 ; Jb 19.24n. –  la tablette de leur cœur cf. 31.33 ; Dt 6.4-9 ; Ez 36.25-27 ; Pr 3.3 ; 7.3 ; 2Co 3.3. –  les cornes (Ex 27.2n  ; 1R 1.50n) de leurs autels (ou de vos autels , selon certains mss) 11.13.
  - type: text
    content: Le péché de Juda est écrit avec un stylet de fer,
  - type: text
    content: avec une pointe de diamant ;
  - type: text
    content: il est gravé sur la tablette de leur cœur,
  - type: text
    content: sur les cornes de leurs autels.
  '10':
  - type: text
    content: ' '
  - type: note
    content: cœur / reins 11.20+ ; cf. Jb 34.21s ; Hé 4.12s. –  à chacun selon ses voies 25.14 ; 32.19 ; Ez 7.3+ ; Os 12.3+ ; Ap 2.23+.
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), j''examine le cœur,'
  - type: text
    content: je sonde les reins,
  - type: text
    content: pour donner à chacun selon ses voies,
  - type: text
    content: selon le fruit de ses agissements.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'qui couve ce qu''elle n''a pas pondu  : on pourrait aussi comprendre qui couve, mais qui ne mène pas à terme  ; cf. Es 32.6 ; Ps 39.7 ; 55.24 ; Pr 28.8 ; Lc 12.16-21. – Voir justice.'
  - type: text
    content: Comme une perdrix qui couve ce qu'elle n'a pas pondu,
  - type: text
    content: tel est celui qui acquiert des richesses injustement ;
  - type: text
    content: au milieu de ses jours il doit les quitter,
  - type: text
    content: et son avenir est celui d'un fou.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'trône glorieux  : cf. 14.21+ ; Es 6.1 ; Ap 11.19.'
  - type: text
    content: '– Il est un trône glorieux, en haut depuis le commencement :'
  - type: text
    content: c'est le lieu de notre sanctuaire.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'espérance d''Israël 14.8n. –  abandonnent / source d''eau vive 2.13+. –  de moi  : Vg de toi . –  dans la terre ou dans le pays , expression qui désigne vraisemblablement le séjour des morts ; cf. Jon 2.7n  ; Lc 10.20 ; d''autres modifient le texte hébreu traditionnel pour lire seront retranchés du pays ou seront saisis de confusion dans le pays.'
  - type: text
    content: Seigneur
  - type: text
    content: ', espérance d''Israël,'
  - type: text
    content: tous ceux qui t'abandonnent auront honte.
  - type: text
    content: Ceux qui s'écartent de moi seront inscrits dans la terre,
  - type: text
    content: 'car ils abandonnent la source d''eau vive, le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.18+ ; 31.18. –  Guéris Ps 6.3 ; 103.3 ; 147.3 ; cf. 2R 5.3. –  ma louange Dt 10.21n  ; Ps 71.6.
  - type: text
    content: '– Guéris-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', et je serai guéri ;'
  - type: text
    content: sauve-moi, et je serai sauvé ;
  - type: text
    content: car ma louange, c'est toi !
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 5.19 ; Ez 12.27 ; Am 5.18 ; 2P 3.3s.
  - type: text
    content: 'Ils me disent :'
  - type: text
    content: 'Où est la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Qu'elle arrive donc !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'je n''ai pas refusé…  : phrase obscure, diversement comprise par les versions anciennes ; certains modifient le texte hébreu traditionnel pour lire je ne me suis pas empressé de te suivre comme un compagnon ou je n''ai pas abondé à ta suite dans le sens du malheur  ; l''idée serait alors parallèle à je n''ai pas désiré…  : cf. 18.20 ; voir aussi 8.18-22 ; 13.17 ; 14.17 ; 15.11n  ; 20.8. –  ce qui sort…  : cf. Dt 23.23s ; Ps 66.13s ; voir aussi 2Co 2.17 ; 1Th 2.10.'
  - type: text
    content: Quant à moi, je n'ai pas refusé
  - type: text
    content: d'être berger à ta suite ;
  - type: text
    content: 'je n''ai pas désiré ce jour de douleur, tu le sais :'
  - type: text
    content: ce qui sort de mes lèvres est devant toi.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.17.
  - type: text
    content: Ne sois pas pour moi une terreur,
  - type: text
    content: toi, mon abri au jour du malheur !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Que mes persécuteurs…  : cf. 11.20 ; 12.3 ; 15.15 ; 18.21-23 ; 20.11s ; Ps 35.4. –  double 16.18n. –  désastre 4.6n.'
  - type: text
    content: Que mes persécuteurs aient honte,
  - type: text
    content: mais que, moi, je n'aie pas honte !
  - type: text
    content: qu'ils soient terrifiés,
  - type: text
    content: mais que, moi, je ne sois pas terrifié !
  - type: text
    content: Fais venir sur eux le jour du malheur,
  - type: text
    content: frappe-les d'un double désastre !
  - type: heading
    content: Appel à respecter le jour du sabbat
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'la porte des gens (litt. des fils ) du peuple  : peut-être la principale porte du temple (cf. 7.2) où passaient les laïcs (cf. 2Ch 35.5,7,12s). –  entrent et sortent  : cf. Dt 28.6n.'
  - type: text
    content: 'Ainsi m''a parlé le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Va, et tiens-toi à la porte des gens du peuple, par laquelle les rois de Juda entrent et sortent, et à toutes les portes de Jérusalem. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 2.20+ ; cf. Dt 7.5+ ; Jg 3.7n  ; Ez 6.13+.
  - type: text
    content: Ainsi leurs fils se souviendront de leurs autels,
  - type: text
    content: de leurs poteaux cultuels (leurs ashéras) près des arbres verdoyants,
  - type: text
    content: sur les collines élevées.
  '20':
  - type: note
    content: Cf. 19.3 ; 21.11 ; 22.2.
  - type: text
    content: 'Tu leur diras : Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', roi de Juda et tout Juda, et vous tous, habitants de Jérusalem, qui entrez par ces portes !'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'sabbat  : cf. Né 10.32 ; 13.15-22 ; voir aussi Ex 16.23 ; 20.8-11 ; Es 56.2ss ; 58.13 ; Ez 20.12-13+.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Prenez garde à vous-mêmes ; ne portez pas de fardeau le jour du sabbat et n''en introduisez pas par les portes de Jérusalem. '
  '22':
  - type: note
    content: 'sacré  : voir saint.'
  - type: text
    content: 'Ne sortez pas de fardeau de votre maison le jour du sabbat et ne faites aucun ouvrage ; faites du sabbat un jour sacré, comme je l''ai ordonné à vos pères. '
  '23':
  - type: note
    content: pas écouté… 7.26n. –  rétifs 7.26n. –  instruction 5.3+.
  - type: text
    content: 'Ils n''ont pas écouté, ils n''ont pas tendu l''oreille ; ils se sont montrés rétifs, refusant d''écouter et de recevoir l''instruction. '
  '24':
  - type: text
    content: 'Si vous m''écoutez vraiment, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – si vous n''introduisez pas de fardeau par les portes de cette ville le jour du sabbat, si vous faites du sabbat un jour sacré, si vous ne faites aucun travail ce jour-là, '
  '25':
  - type: note
    content: '22.4. –  habitée pour toujours  : cf. 7.7 ; Jl 4.20.'
  - type: text
    content: 'alors entreront par les portes de cette ville des rois et des princes ; ils seront assis sur le trône de David, ils monteront sur des chars et des chevaux, eux et leurs princes, les hommes de Juda et les habitants de Jérusalem, et cette ville sera habitée pour toujours. '
  '26':
  - type: note
    content: Cf. 32.44 ; 33.13. –  la montagne est sans doute la partie centrale de la Judée, par opposition au Bas-Pays (hébreu shephéla), et au Néguev, au sud. –  l'encens Ex 30.34n. –  sacrifices de reconnaissance 30.19n  ; 33.11 ; cf. Lv 7.12n  ; Ps 26.7n  ; 2Ch 29.31 ; sur l'ensemble, voir aussi 1R 8.64.
  - type: text
    content: 'On viendra des villes de Juda et des environs de Jérusalem, du pays de Benjamin, du Bas-Pays, de la montagne et du Néguev, pour apporter des holocaustes, des sacrifices, des offrandes et de l''encens, pour apporter des sacrifices de reconnaissance à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '27':
  - type: note
    content: le feu aux portes… 37.8 ; 39.8 ; 52.13 ; Ez 16.41. –  il dévorera les palais… 6.5 ; Am 2.5. –  ne s'éteindra plus 7.20+.
  - type: text
    content: Mais si vous ne m'écoutez pas, si vous ne faites pas du sabbat un jour sacré en ne portant aucun fardeau, en n'entrant pas par les portes de Jérusalem le jour du sabbat, alors je mettrai le feu aux portes de la ville, il dévorera les palais de Jérusalem et ne s'éteindra plus.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 15.13s. –  Dans les montagnes (autre traduction le montagnard ) , dans la campagne  : expression obscure ; certains y voient une allusion supplémentaire (suite de l''énumération du v. 2) aux cultes de la nature (une version ancienne a lu les montagnes ), d''autres modifient le texte hébreu traditionnel pour lire, p. ex., la montagne de la contestation est dévastée ( ?). –  hauts lieux 48.35 ; Ez 6.3+.'
  - type: text
    content: Dans les montagnes, dans la campagne,
  - type: text
    content: tes biens, tous tes trésors,
  - type: text
    content: je les livre en butin,
  - type: text
    content: ainsi que tes hauts lieux,
  - type: text
    content: à cause de ton péché,
  - type: text
    content: dans tout ton territoire.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Tu lâcheras, de toi-même  : traduction incertaine, suggérée par des versions anciennes ; certains modifient le texte hébreu traditionnel pour lire ta main lâchera , expression proche de celle qui est traduite par tu feras remise en Dt 15.3n  ; quoi qu''il en soit, on peut voir dans l''emploi du même verbe une allusion à la loi (non appliquée, d''où le châtiment) de la remise sabbatique ; voir Dt 15.1ss ; cf. Lv 26.34s ; Jr 34.8-22. –  je te rendrai esclave…  : cf. 15.14n  ; 16.13n.'
  - type: text
    content: Tu lâcheras, de toi-même, le patrimoine que je t'avais donné ;
  - type: text
    content: je te rendrai esclave de ton ennemi
  - type: text
    content: dans un pays que tu ne connais pas ;
  - type: text
    content: car vous avez allumé le feu de ma colère,
  - type: text
    content: et il brûlera pour toujours.
  - type: heading
    content: Fausse et vraie sécurité
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 30.15-20 ; Ps 1 ; Pr 4.18s ; 12.28 ; 15.24. –  Ainsi parle le Seigneur  : LXX omet cette introduction. –  Maudit  : voir bénédiction. –  met sa confiance… 2.37 ; Es 30.15 ; 31.1 ; Ps 146.3-5. –  appui  : litt. bras  ; cf. 2Ch 32.8. – Cf. Instruction d''Aménémopé 6.1ss : « L''impulsif est dans le temple comme un arbre qui pousse en rase campagne. Au bout d''un temps il perd son feuillage ; il finira au chantier naval, ou bien on le flottera loin de son lieu et il aura les flammes pour linceul. Mais l''homme vraiment silencieux se tient à part. Il est comme un arbre qui pousse dans un jardin, qui fleurit et produit double récolte. Il se tient devant son maître, son fruit est doux, son ombre est agréable, et il finit dans le jardin. »'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Maudit soit l'homme qui met sa confiance dans un être humain,
  - type: text
    content: qui prend la chair pour appui,
  - type: text
    content: 'et dont le cœur se détourne du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: genévrier (48.6) et plaine aride (cf. Dt 1.1n) font assonance en hébreu. –  ne voit pas… Ps 34.13. –  désert… Ps 107.33ss ; Jb 39.6 ; cf. Lc 8.6.
  - type: text
    content: Il est comme un genévrier dans la plaine aride,
  - type: text
    content: et ne voit pas arriver le bonheur ;
  - type: text
    content: il demeure dans les lieux brûlés du désert,
  - type: text
    content: sur une terre salée et sans habitants.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 84.13 ; Pr 16.20 ; cf. Es 30.18. –  met sa confiance et assurance traduisent ici deux termes apparentés ; Ps 4.6+,9.
  - type: text
    content: 'Béni soit l''homme qui met sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'celui dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est l''assurance !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'comme un arbre…  : cf. Nb 24.6 ; Es 44.4 ; Ez 47.12 ; Ps 1.3 ; Jb 29.19. –  il ne voit pas venir  : autre lecture traditionnelle il ne craint pas la venue de.'
  - type: text
    content: Il est comme un arbre planté près des eaux,
  - type: text
    content: 'qui étend ses racines vers le cours d''eau :'
  - type: text
    content: il ne voit pas venir la chaleur
  - type: text
    content: et son feuillage reste verdoyant ;
  - type: text
    content: dans l'année de la sécheresse,
  - type: text
    content: il est sans inquiétude
  - type: text
    content: et il ne cesse de porter du fruit.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 6.5.
  - type: text
    content: Le cœur est tortueux par-dessus tout
  - type: text
    content: 'et il est incurable :'
  - type: text
    content: qui peut le connaître ?
