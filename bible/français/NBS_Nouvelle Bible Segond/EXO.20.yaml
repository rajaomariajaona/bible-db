document_id: EXO.20,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le contrat de l''alliance : les Dix paroles'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur les '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: Dix paroles
        - type: text
          text: ' (= « décalogue ») ou '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: Dix commandements
        - type: text
          text: ', cf. 34.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 5.6-21 ; Mt 19.18s/ / ; Rm 13.9 ; voir aussi Jr 7.9 ; Os 4.2. La numérotation des v. diffère selon les mss. Il y a différentes manières traditionnelles de compter '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dix paroles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Dt 4.13 ; 10.4), selon que l'on voit la première au v. 2, au v. 3 ou aux v. 3-6, et la dixième dans la totalité ou seulement dans la deuxième partie du v. 17.
      marker-yv: yv-n
    - type: text
      text: 'Alors Dieu prononça toutes ces paroles :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ni ton serviteur, ni ta servante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ni ton esclave, homme ou femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 17 ; cf. 21.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',20,26s,32 ; Gn 12.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'immigrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans tes villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans tes portes.
      marker-yv: yv-n
    - type: text
      text: 'Mais le septième jour, c''est un sabbat pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu : tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni tes bêtes, ni les immigrés qui sont dans tes villes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 8 ; Gn 2.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car en six jours le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a fait le ciel, la terre, la mer et tout ce qui s''y trouve, et il s''est reposé le septième jour. C''est pourquoi le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a béni le sabbat et en a fait un jour sacré.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Honore
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: glorifie
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ml 1.6 ; voir aussi Lv 19.3,32 ; Dt 27.16 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Mt 15.4/ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; Lc 2.51 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ep 6.2s
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Honore ton père et ta mère, afin que tes jours se prolongent sur la terre que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te donne.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: LXX place ce commandement après celui qui proscrit le vol (ou le rapt, cf. v. 15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). – Autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu ne tueras pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le verbe hébreu s''applique en général au meurtre d''un individu, et plus précisément d''un compatriote ; il est parfois employé pour un homicide involontaire ; cf. Nb 35.12,22-30 ; Jos 20.3,5 ; voir aussi Ex 21.12-15 ; Gn 9.5s ; Lv 24.17 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mt 5.21 ; Jc 2.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1R 21.
      marker-yv: yv-n
    - type: text
      text: Tu ne commettras pas de meurtre.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 20.10 ; Ps 50.18 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mt 5.27
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; Jn 8.1-11 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jc 2.11
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . L'adultère est surtout conçu, dans l'A.T. comme dans l'Antiquité en général, comme une faute de l'homme envers son prochain (le mari trompé) et une faute de la femme envers son propre mari. Comparer la sévérité des peines en Dt 22.22 d'une part et Ex 22.15 ; Dt 22.28s d'autre part. Voir aussi Gn 39.9 ; Jr 9.2 ; 29.23 ; Ml 3.5 ; Jb 24.14s ; Pr 5.1ss.
      marker-yv: yv-n
    - type: text
      text: Tu ne commettras pas d'adultère.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vol
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rapt
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 21.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Gn 37.25-28. Voir aussi Lv 19.11 ; Dt 24.7 ; Ps 50.18.'
      marker-yv: yv-n
    - type: text
      text: Tu ne commettras pas de vol.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu ne répondras pas (en) témoin de mensonge…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 23.1-3 ; Lv 19.15s ; Dt 5.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 50.19s ; voir aussi 1R 21 ; Mt 26.59-62/ /.'
      marker-yv: yv-n
    - type: text
      text: Tu ne porteras pas de faux témoignage contre ton prochain.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Es 5.8 ; Mi 2.2 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Rm 7.7
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; voir aussi Lv 19.35s ; Jos 7.10-26 ; 1R 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'serviteur… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tu ne convoiteras pas la maison de ton prochain ; tu ne convoiteras pas la femme de ton prochain, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni rien de ce qui appartient à ton prochain.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le peuple vit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Smr, LXX, Syr, des mss de Tg et Vg portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'craignirent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 20) au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vit. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certaines formes des verbes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'craindre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se ressemblent beaucoup en hébreu.
      marker-yv: yv-n
    - type: text
      text: 'Tout le peuple voyait : les coups de tonnerre, les éclairs, le son de la trompe, la montagne fumante. Le peuple vit ; ils tremblèrent et se tinrent à distance. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Dt 5.23-31 ; Hé 12.18s.
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent à Moïse : Parle-nous toi-même, et nous écouterons ; mais que Dieu ne nous parle pas, de peur que nous ne mourions. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 19.4s ; Jg 6.8-10 ; Es 43.11 ; Am 2.10 ; Ps 81.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maison des esclaves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.3+.
      marker-yv: yv-n
    - type: text
      text: 'Je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), ton Dieu ; c''est moi qui t''ai fait sortir de l''Egypte, de la maison des esclaves.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'N''ayez pas peur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent deux termes hébreux apparentés. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que vous ayez la crainte de lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que sa crainte soit sur votre face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit au peuple : N''ayez pas peur ; c''est pour vous mettre à l''épreuve que Dieu est venu ; c''est pour que vous ayez la crainte de lui, afin que vous ne péchiez pas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'obscurité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nuée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: épaisse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit ici d''un autre terme que celui qui a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nuée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 13.21+ ; 19.9 ; on le retrouve en Dt 4.11 ; 5.22 ; 2S 22.10 (/ / Ps 18.10) ; 1R 8.12 (/ / 2Ch 6.1) ; Es 60.2 ; Jr 13.16 ; Ez 34.12 ; Jl 2.2 ; So 1.15 ; Ps 97.2 ; Jb 22.13 ; 38.9.
      marker-yv: yv-n
    - type: text
      text: Le peuple se tenait à distance ; mais Moïse s'approcha de l'obscurité épaisse où était Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Loi sur l'autel
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Tu parleras ainsi aux Israélites : Vous avez vu que je vous ai parlé depuis le ciel. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.23 '
      - type: usfm
        marker: fq
