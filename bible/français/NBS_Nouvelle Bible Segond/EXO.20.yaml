document_id: EXO.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Le contrat de l''alliance : les Dix paroles'
  - type: text
    content: ' '
  - type: note
    content: Sur les Dix paroles (= « décalogue ») ou Dix commandements, cf. 34.28n  ; Dt 5.6-21 ; Mt 19.18s/ / ; Rm 13.9 ; voir aussi Jr 7.9 ; Os 4.2. La numérotation des v. diffère selon les mss. Il y a différentes manières traditionnelles de compter dix paroles (Dt 4.13 ; 10.4), selon que l'on voit la première au v. 2, au v. 3 ou aux v. 3-6, et la dixième dans la totalité ou seulement dans la deuxième partie du v. 17.
  - type: text
    content: 'Alors Dieu prononça toutes ces paroles :'
  '10':
  - type: note
    content: 'sabbat 16.29+. –  ni ton serviteur, ni ta servante  : autre traduction ni ton esclave, homme ou femme, de même au v. 17 ; cf. 21.7n,20,26s,32 ; Gn 12.16n. –  immigrés 12.48n. –  dans tes villes  : litt. dans tes portes.'
  - type: text
    content: 'Mais le septième jour, c''est un sabbat pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu : tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni tes bêtes, ni les immigrés qui sont dans tes villes. '
  '11':
  - type: note
    content: V. 8 ; Gn 2.2ns. – Voir bénédiction.
  - type: text
    content: 'Car en six jours le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait le ciel, la terre, la mer et tout ce qui s''y trouve, et il s''est reposé le septième jour. C''est pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a béni le sabbat et en a fait un jour sacré.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Honore  : autre traduction glorifie , cf. Ml 1.6 ; voir aussi Lv 19.3,32 ; Dt 27.16 ; Mt 15.4/  ; Lc 2.51 ; Ep 6.2s . –  sur la terre  : cf. Gn 2.5n.'
  - type: text
    content: 'Honore ton père et ta mère, afin que tes jours se prolongent sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: LXX place ce commandement après celui qui proscrit le vol (ou le rapt, cf. v. 15n). – Autre traduction tu ne tueras pas  ; le verbe hébreu s'applique en général au meurtre d'un individu, et plus précisément d'un compatriote ; il est parfois employé pour un homicide involontaire ; cf. Nb 35.12,22-30 ; Jos 20.3,5 ; voir aussi Ex 21.12-15 ; Gn 9.5s ; Lv 24.17 ; Mt 5.21 ; Jc 2.11  ; cf. 1R 21.
  - type: text
    content: Tu ne commettras pas de meurtre.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Lv 20.10 ; Ps 50.18 ; Mt 5.27  ; Jn 8.1-11 ; Jc 2.11 . L'adultère est surtout conçu, dans l'A.T. comme dans l'Antiquité en général, comme une faute de l'homme envers son prochain (le mari trompé) et une faute de la femme envers son propre mari. Comparer la sévérité des peines en Dt 22.22 d'une part et Ex 22.15 ; Dt 22.28s d'autre part. Voir aussi Gn 39.9 ; Jr 9.2 ; 29.23 ; Ml 3.5 ; Jb 24.14s ; Pr 5.1ss.
  - type: text
    content: Tu ne commettras pas d'adultère.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'vol  : certains comprennent rapt , comme en 21.16n  ; cf. Gn 37.25-28. Voir aussi Lv 19.11 ; Dt 24.7 ; Ps 50.18.'
  - type: text
    content: Tu ne commettras pas de vol.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Litt. tu ne répondras pas (en) témoin de mensonge… , cf. 23.1-3 ; Lv 19.15s ; Dt 5.20n  ; Ps 50.19s ; voir aussi 1R 21 ; Mt 26.59-62/ /.
  - type: text
    content: Tu ne porteras pas de faux témoignage contre ton prochain.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 5.8 ; Mi 2.2 ; Rm 7.7  ; voir aussi Lv 19.35s ; Jos 7.10-26 ; 1R 21. –  serviteur… v. 10n.
  - type: text
    content: Tu ne convoiteras pas la maison de ton prochain ; tu ne convoiteras pas la femme de ton prochain, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni rien de ce qui appartient à ton prochain.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le peuple vit  : Smr, LXX, Syr, des mss de Tg et Vg portent craignirent (cf. v. 20) au lieu de vit. Certaines formes des verbes voir et craindre se ressemblent beaucoup en hébreu.'
  - type: text
    content: 'Tout le peuple voyait : les coups de tonnerre, les éclairs, le son de la trompe, la montagne fumante. Le peuple vit ; ils tremblèrent et se tinrent à distance. '
  '19':
  - type: note
    content: Cf. Dt 5.23-31 ; Hé 12.18s.
  - type: text
    content: 'Ils dirent à Moïse : Parle-nous toi-même, et nous écouterons ; mais que Dieu ne nous parle pas, de peur que nous ne mourions. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 19.4s ; Jg 6.8-10 ; Es 43.11 ; Am 2.10 ; Ps 81.11. –  maison des esclaves 13.3+.
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu ; c''est moi qui t''ai fait sortir de l''Egypte, de la maison des esclaves.'
  '20':
  - type: note
    content: 'N''ayez pas peur et crainte traduisent deux termes hébreux apparentés. –  que vous ayez la crainte de lui  : litt. que sa crainte soit sur votre face. – Voir péché.'
  - type: text
    content: 'Moïse dit au peuple : N''ayez pas peur ; c''est pour vous mettre à l''épreuve que Dieu est venu ; c''est pour que vous ayez la crainte de lui, afin que vous ne péchiez pas. '
  '21':
  - type: note
    content: 'obscurité (ou nuée) épaisse  : il s''agit ici d''un autre terme que celui qui a été traduit par nuée en 13.21+ ; 19.9 ; on le retrouve en Dt 4.11 ; 5.22 ; 2S 22.10 (/ / Ps 18.10) ; 1R 8.12 (/ / 2Ch 6.1) ; Es 60.2 ; Jr 13.16 ; Ez 34.12 ; Jl 2.2 ; So 1.15 ; Ps 97.2 ; Jb 22.13 ; 38.9.'
  - type: text
    content: Le peuple se tenait à distance ; mais Moïse s'approcha de l'obscurité épaisse où était Dieu.
  - type: heading
    content: Loi sur l'autel
  '22':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Tu parleras ainsi aux Israélites : Vous avez vu que je vous ai parlé depuis le ciel. '
  '23':
  - type: note
    content: 'à côté de moi  : litt. avec moi  ; cf. v. 3-4+.'
  - type: text
    content: 'Vous ne ferez pas à côté de moi des dieux d''argent ni des dieux d''or ; vous n''en ferez pas pour vous. '
  '24':
  - type: note
    content: Cf. 27.1+. – Voir sacrifices, paix, nom et bénédiction.
  - type: text
    content: 'Tu me feras un autel de terre, sur lequel tu offriras tes holocaustes, tes sacrifices de paix, ton petit bétail et ton gros bétail. En tout lieu où j''évoquerai mon nom, je viendrai à toi et je te bénirai. '
  '25':
  - type: note
    content: 'autel de pierre Dt 27.5-7 ; Jos 8.31. –  outil  : le mot signifie également épée  ; sur la valeur sacrale associée à l''état brut ou neuf, cf. Dt 21.3s ; 1S 6.7 ; 2R 2.20. –  profanerais  : voir saint.'
  - type: text
    content: 'Si tu fais un autel de pierre, tu ne le bâtiras pas en pierres taillées : en passant ton outil sur la pierre, tu la profanerais. '
  '26':
  - type: note
    content: Voir 28.42 ; sur les vêtements des prêtres, comparer 1S 22.18 avec 2S 6.14,20.
  - type: text
    content: Tu ne monteras pas à mon autel par des marches, afin que ta nudité ne soit pas exposée.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'autres dieux  : cf. v. 23 ; 34.14 ; 1R 11.4-8 ; Jr 4.1n  ; 25.6 ; Os 3.1 ; 13.4 ; Ps 81.10. –  devant moi  : litt. sur ma face  ; on pourrait comprendre contre moi ou en plus de moi, au-dessus de moi.'
  - type: text
    content: Tu n'auras pas d'autres dieux devant moi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 32.1-6 ; voir aussi 34.17 ; Lv 19.4 ; 26.1 ; Dt 4.15-20 ; 27.15 ; 1R 12.26-31. –  statue  : le terme hébreu correspondant désigne normalement une image taillée, de bois ou de pierre (cf. v. 25), mais son sens peut s''étendre aux images de métal fondu (Es 40.19) ; il s''agit en tout cas d''idoles, de représentations de la divinité. –  forme  : cf. Nb 12.8n.'
  - type: text
    content: 'Tu ne te feras pas de statue, ni aucune forme de ce qui est dans le ciel, en haut, de ce qui est sur la terre, en bas, ou de ce qui est au-dessous de la terre, dans les eaux. '
  '5':
  - type: note
    content: 'tu ne les serviras pas, c.-à-d. tu ne leur rendras pas de culte. –  un Dieu à la passion jalouse (hébreu ’El qana’  ; sur ’El, cf. Gn 21.33n) : le terme traduit par passion jalouse évoque, selon les contextes, la jalousie (cf. Gn 26.14 ; 30.1 ; 37.11 ; Nb 5.14ss ; 11.29 etc.) ou la passion (autre traduction traditionnelle le zèle) ; cf. Ex 34.14 ; Dt 4.24 ; 5.9 ; 6.15 ; 1R 19.10 ; Es 9.6 ; Jl 2.18 ; Na 1.2. –  qui fais rendre des comptes  : le même verbe est aussi traduit par intervenir (pour ou contre), cf. 3.16+ ; 32.34n. –  génération  : le terme est de toute évidence sous-entendu en hébreu, de même au v. 6 où on pourrait éventuellement comprendre qui agis avec fidélité envers des milliers. –  de (litt. pour) ceux qui me détestent ou qui me haïssent  : autre traduction mes ennemis  ; comparer 2R 24.3s avec Dt 24.16 ; Jr 31.29s ; Ez 18.4 ; voir aussi Jb 21.19. – Sur l''ensemble, voir 34.7 ; Nb 14.18 ; Dt 7.9s.'
  - type: text
    content: 'Tu ne te prosterneras pas devant ces choses-là et tu ne les serviras pas ; car moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, je suis un Dieu à la passion jalouse, qui fais rendre des comptes aux fils pour la faute des pères, jusqu''à la troisième et la quatrième génération de ceux qui me détestent, '
  '6':
  - type: note
    content: 'commandements  : voir loi.'
  - type: text
    content: mais qui agis avec fidélité jusqu'à la millième génération envers ceux qui m'aiment et qui observent mes commandements.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le nom du Seigneur (YHWH)  : cf. 3.14n,15n. Autres traductions tu ne prendras (ou prononceras ) pas en vain (même formule Jr 2.30 ; 4.30 etc.) le nom du Seigneur  ; tu n''invoqueras pas le Seigneur pour faire du mal  ; on a généralement compris cette expression comme désignant, en particulier, le faux serment ; mais elle a pu avoir une portée plus large ; cf. Ex 22.27 ; Lv 19.12 ; 24.10-16,23 ; Os 10.4 ; Ps 139.20 ; voir aussi Mt 5.33. A partir d''une époque difficile à préciser, ce commandement a été interprété dans le judaïsme comme une interdiction quasi-totale de prononcer le nom YHWH, d''où le remplacement systématique de celui-ci par Seigneur dans les lectures bibliques de la synagogue et dans LXX. Aux IIIe et IIe s. av. J.-C. (cf. Siracide 50.20 : « Alors il redescendait et élevait les mains sur toute l''assemblée des fils d''Israël, pour donner de ses lèvres la bénédiction du Seigneur et avoir l''honneur de prononcer son nom »), il semble que le grand prêtre prononçait ce nom une fois l''an, pour les bénédictions finales du Jour de l''Expiation (cf. Lv 16), ce que rapporte également la Mishna ( Yoma 6.2 ; voir Talmud ).'
  - type: text
    content: 'Tu n''invoqueras pas le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, pour tromper : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne tiendra pas pour innocent celui qui invoquera son nom pour tromper.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: '16.29+. –  en faire un jour sacré ou saint  : litt. le sanctifier , de même au v. 11.'
  - type: text
    content: 'Souviens-toi du sabbat, pour en faire un jour sacré. '
  '9':
  - type: note
    content: 'ouvrage  : le terme hébreu correspondant est traduit par travail au v. 10.'
  - type: text
    content: 'Pendant six jours tu travailleras, et tu feras tout ton ouvrage. '
