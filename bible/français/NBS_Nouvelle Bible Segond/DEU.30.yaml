document_id: DEU.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël reviendra au Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'bénédiction / malédiction (le même terme est ainsi traduit en 29.26n, de même en 30.19) : voir 11.26+ ; 28.1+,15. –  t''aura banni  : cf. v. 17n. –  tu réfléchis  : litt. tu fais revenir vers (ou dans ) ton cœur  ; cf. 4.39n.'
  - type: text
    content: 'Lorsque toutes ces paroles arriveront sur toi, la bénédiction et la malédiction que j''ai placées devant toi, si, parmi toutes les nations où le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura banni, tu réfléchis, '
  '10':
  - type: note
    content: 'lorsque  : autre traduction car, de même dans la suite. –  en observant 4.6n. –  ce livre 17.19+. –  tu reviendras v. 2.'
  - type: text
    content: 'lorsque tu écouteras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en observant ses commandements et ses prescriptions écrits dans ce livre de la loi, lorsque tu reviendras au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, de tout ton cœur et de toute ton âme.'
  - type: heading
    content: La parole de Dieu est toute proche
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ce commandement… 4.2n. –  n''est pas…  : litt. n''est pas trop extraordinaire pour toi et n''est pas éloigné  ; cf. Mt 11.30 ; 1Jn 5.3.'
  - type: text
    content: 'Car ce commandement que j''institue pour toi aujourd''hui n''est pas au-dessus de tes forces ni hors de ta portée. '
  '12':
  - type: note
    content: Rm 10.6-8  ; cf. Jn 3.13.
  - type: text
    content: 'Il n''est pas dans le ciel, pour que tu dises : « Qui montera pour nous au ciel afin de nous l''apporter et de nous le faire entendre, pour que nous le mettions en pratique ? » '
  '13':
  - type: text
    content: 'Il n''est pas de l''autre côté de la mer, pour que tu dises : « Qui passera pour nous de l''autre côté de la mer afin de nous l''apporter et de nous le faire entendre, pour que nous le mettions en pratique ? » '
  '14':
  - type: note
    content: 'tout près (ou toute proche) de toi  : cf. 4.7 ; 29.28 ; Pr 8.31 ; Siracide 51.26 : « C''est tout près qu''on la peut trouver (l''instruction). » Voir aussi Jr 31.31-34 ; Ez 36.25-27. – Voir cœur.'
  - type: text
    content: Cette parole, au contraire, est tout près de toi, dans ta bouche et dans ton cœur, afin que tu la mettes en pratique.
  - type: heading
    content: Choisir la vie
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'devant toi v. 1 ; 11.26-28. –  bonheur / malheur  : autres traductions bon / mauvais ; bien / mal  ; cf. 4.40n  ; Gn 2.9n  ; voir aussi Jr 21.8+ ; Siracide 37.18 : « Il (le cœur) fait pousser quatre rameaux : le bien et le mal, la vie et la mort. »'
  - type: text
    content: 'Regarde, j''ai placé aujourd''hui devant toi la vie et le bonheur, la mort et le malheur. '
  '16':
  - type: note
    content: 'Ce que je t''ordonne…  : LXX a lu si tu écoutes les commandements du Seigneur, ton Dieu, ceux que je t''ordonne aujourd''hui, (c''est-à-dire) aimer…  ; cf. 11.27 ; voir aussi 4.2n. –  aimer le Seigneur 5.10+. –  observer 4.6n. –  afin que tu vives 4.1+. –  prendre possession 1.21+ ; cf. 30.5.'
  - type: text
    content: 'Ce que je t''ordonne aujourd''hui, c''est d''aimer le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, de suivre ses voies et d''observer ses commandements, ses prescriptions et ses règles, afin que tu vives et que tu te multiplies, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénisse dans le pays où tu entres pour en prendre possession. '
  '17':
  - type: note
    content: 'se détourne 29.17. –  si tu n''écoutes pas ou si tu n''obéis pas  ; cf. v. 2. –  tu te laisses entraîner  : cf. 4.19 ; le même verbe hébreu est traduit par bannir au v. 1 ; cf. 13.6,11,14n.'
  - type: text
    content: 'Mais si ton cœur se détourne, si tu n''écoutes pas et si tu te laisses entraîner à te prosterner devant d''autres dieux et à les servir, '
  '18':
  - type: note
    content: 4.26+. –  vous / tu 1.8n.
  - type: text
    content: 'je vous le dis aujourd''hui, vous disparaîtrez ; vous ne prolongerez pas vos jours sur la terre où tu entres pour en prendre possession en passant le Jourdain. '
  '19':
  - type: note
    content: J'en prends aujourd'hui… 4.26+. –  devant toi v. 15. –  bénédiction / malédiction v. 1.
  - type: text
    content: 'J''en prends aujourd''hui à témoin contre vous le ciel et la terre : j''ai mis devant toi la vie et la mort, la bénédiction et la malédiction. Choisis la vie, afin que tu vives, toi et ta descendance, '
  '2':
  - type: note
    content: reviens au Seigneur / écoutes 4.30+. –  de tout ton cœur et de toute ton âme (cf. Gn 1.20n) v. 6,10 ; 4.29+. –  comme je te l'ordonne 4.2n. –  aujourd'hui 1.10+.
  - type: text
    content: 'si tu reviens au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et si tu l''écoutes de tout ton cœur et de toute ton âme, toi et tes fils, exactement comme je te l''ordonne aujourd''hui, '
  '20':
  - type: note
    content: 'en aimant le Seigneur v. 16. –  en l''écoutant v. 2. –  en t''attachant à lui 10.20+. –  la longueur de tes jours  : cf. Ps 21.5n. –  sur la terre 7.13+. –  que le Seigneur a juré… 1.8+.'
  - type: text
    content: 'en aimant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en l''écoutant et en t''attachant à lui : c''est lui qui est ta vie, la longueur de tes jours, pour que tu habites sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a juré de donner à tes pères, Abraham, Isaac et Jacob.'
  '3':
  - type: note
    content: 'rétablira ta situation  : l''expression hébraïque a été souvent traduite par ramènera tes captifs en raison de sa ressemblance avec un mot signifiant captivité (Nb 21.29) ; néanmoins l''ensemble de ses emplois suggère un sens beaucoup plus général de restauration ; autre traduction changera ton sort Jr 29.14n  ; Ez 16.53 ; 29.14 ; 39.25 ; Os 6.11 ; Am 9.14 ; So 2.7 ; 3.20 ; Jb 42.10n  ; Lm 2.14n. –  compassion 4.31+. –  te rassemblera encore  : autre traduction il reviendra et te rassemblera  ; cf. Ez 11.17 ; 28.25 ; 37.21. –  dispersé  : cf. 4.27 ; 28.64.'
  - type: text
    content: 'alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, rétablira ta situation ; il aura compassion de toi, il te rassemblera encore d''entre tous les peuples où le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura dispersé. '
  '4':
  - type: note
    content: extrémités du ciel 4.32 ; cf. Né 1.9 ; Mt 24.31/ /.
  - type: text
    content: 'Quand tu serais banni aux extrémités du ciel, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te rassemblera de là, il te prendra de là. '
  '5':
  - type: note
    content: 'dont tes pères…  : autre traduction que possédaient tes pères  ; cf. 1.21+. –  te fera du bien 4.40n. –  te rendra plus nombreux 1.10+s.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te ramènera dans le pays dont tes pères avaient pris possession, et tu en prendras possession ; il te fera du bien et te rendra plus nombreux que tes pères. '
  '6':
  - type: note
    content: 'circoncira ton cœur 10.16+. –  de ta descendance  : cf. Gn 3.15n. –  que tu aimes… 6.5. –  afin que tu vives v. 16-20 ; 4.1+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, circoncira ton cœur et le cœur de ta descendance, pour que tu aimes le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, de tout ton cœur et de toute ton âme, afin que tu vives.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'malédictions  : le même mot est traduit par adjuration en 29.11n. –  te persécutent  : autre traduction te poursuivent.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, fera tomber toutes ces malédictions sur tes ennemis, sur ceux qui te détestent et qui te persécutent. '
  '8':
  - type: note
    content: V. 2.
  - type: text
    content: 'Et toi, tu reviendras, tu écouteras le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et tu mettras en pratique tous ses commandements, tels que je les institue pour toi aujourd''hui. '
  '9':
  - type: note
    content: te comblera de biens 28.11n. –  le fruit… 28.4+. –  content 28.63.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te comblera de biens en faisant prospérer tout le travail de tes mains, le fruit de ton ventre, le fruit de ton bétail et le fruit de ta terre, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera de nouveau content de ton bonheur, comme il était content de celui de tes pères, '
