  children:
  - type: text
    text: La résurrection de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 28.1-8  ; Mc 16.1-8  ; Lc 24.1-12
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 28.1-10/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: premier jour de la semaine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c.-à-d. le dimanche, lendemain du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbat
      - type: text
        text: '  ; v. 19 ; cf. Mc 16.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 20.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Marie-Madeleine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le premier jour de la semaine, Marie-Madeleine vient au tombeau dès le matin, alors qu''il fait encore sombre, et elle voit que la pierre a été enlevée du tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'ami de Jésus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui que Jésus aimait (d'amitié)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 11.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 13.23+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous ne savons pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 13 ; Mt 28.1/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Elle court trouver Simon Pierre et l''autre disciple, l''ami de Jésus, et elle leur dit : On a enlevé le Seigneur du tombeau, et nous ne savons pas où on l''a mis !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pierre et l''autre disciple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.15+ ; cf. Lc 24.24.
    marker-yv: yv-n
  - type: text
    text: 'Pierre et l''autre disciple sortirent donc pour venir au tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils couraient tous deux ensemble. Mais l''autre disciple courut plus vite que Pierre et arriva le premier au tombeau ; '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.40+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se baisse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: regarde attentivement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 11 ; Lc 24.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le texte grec va employer deux verbes différents, habituellement synonymes, aux v. 6 (où certains discernent une nuance d''insistance et traduisent par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contempler, considérer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') et 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gisent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 6s,12 ; 2.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'il se baisse, voit les bandelettes qui gisent là ; pourtant il n''entra pas. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Simon Pierre, qui le suivait, arrive. Entrant dans le tombeau, il voit les bandelettes qui gisent là '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 11.44. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur la tête de Jésus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur sa tête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il était roulé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'envelopper '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Mt 27.59 ; Lc 23.53. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un autre lieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un (seul) lieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains comprennent, au contraire, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au même endroit.
    marker-yv: yv-n
  - type: text
    text: 'et le linge qui était sur la tête de Jésus ; ce linge ne gisait pas avec les bandelettes, mais il était roulé à part, dans un autre lieu. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il crut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il eut foi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors l''autre disciple, qui était arrivé le premier au tombeau, entra aussi ; il vit et il crut. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.22+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Ecriture, selon laquelle…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'Ecriture selon laquelle…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui suggérerait un texte précis ; cf. Os 6.2 ; Jon 2.1 ; Ps 16.10 ; Lc 24.25ss ; 1Co 15.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se relever…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car ils n''avaient pas encore compris l''Ecriture, selon laquelle il devait se relever d''entre les morts. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: Les disciples s'en retournèrent donc chez eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus apparaît à Marie-Madeleine
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mc 16.9-11
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Mt 28.9s.
    marker-yv: yv-n
  - type: text
    text: 'Cependant Marie se tenait dehors, près du tombeau, et elle pleurait. Tout en pleurant, elle se baissa pour regarder dans le tombeau. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: anges
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.51 ; 12.29 ; Mt 28.2,5/ / ; Hé 1.14 ; voir aussi Ex 25.17-22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vêtus de blanc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mc 16.5s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gisait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 5ss ; 2.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: précédemment
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Elle voit alors deux anges vêtus de blanc, assis là où gisait précédemment le corps de Jésus, l''un à la tête et l''autre aux pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Femme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Parce qu'on a enlevé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on a enlevé… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2+.
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Femme, pourquoi pleures-tu ? Elle leur répondit : Parce qu''on a enlevé mon Seigneur, et je ne sais pas où on l''a mis. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle se retourna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'elle se retourna en arrière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même terme est traduit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'derrière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: debout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot grec est apparenté à celui qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: résurrection
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et au verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se relever
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ressusciter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 19,26). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne savait pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.4 ; Lc 24.16 ; cf. 2Co 5.16.
    marker-yv: yv-n
  - type: text
    text: 'Après avoir dit cela, elle se retourna ; elle voit Jésus, debout ; mais elle ne savait pas que c''était Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le jardinier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 19.41. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'irai le prendre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'enlever '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 1s,13 ; cf. 1.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus lui dit : Femme, pourquoi pleures-tu ? Qui cherches-tu ? Pensant que c''était le jardinier, elle lui dit : Seigneur, si c''est toi qui l''as emporté, dis-moi où tu l''as mis, et moi, j''irai le prendre. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 10.3,5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rabbouni '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.38'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mc 10.51.'
    marker-yv: yv-n
  - type: text
    text: 'Jésus lui dit : Marie ! Elle se retourna et lui dit en hébreu : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Rabbouni !
  - type: text
    text: '  – c''est-à-dire : Maître ! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cesse de t'accrocher à moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cesse de me toucher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon certains, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne me touche pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 16.5-7,20-23 ; 14.28 ; Mt 28.9s ; voir aussi Mc 5.21ss/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'monté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(3.13) '
    - type: usfm
      marker: fq
      children:
      - type: text
