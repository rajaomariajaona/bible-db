        text: '26s (voir aussi ♦) : « Quant à moi (Pierre), j''étais dans l''affliction avec mes compagnons, et, blessés en notre cœur, nous restions cachés, car nous étions recherchés par eux comme des malfaiteurs et comme voulant incendier le Temple. En plus de tout cela, nous jeûnions et nous demeurions assis dans le deuil et dans les larmes, et ce nuit et jour jusqu''au sabbat. » –  '
