document_id: JHN.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La résurrection de Jésus
  - type: heading
    content: Mt 28.1-8  ; Mc 16.1-8  ; Lc 24.1-12
  - type: text
    content: ' '
  - type: note
    content: 'Mt 28.1-10/ /. –  premier jour de la semaine  : c.-à-d. le dimanche, lendemain du sabbat  ; v. 19 ; cf. Mc 16.2n  ; Ac 20.7. –  Marie-Madeleine 19.25n.'
  - type: text
    content: 'Le premier jour de la semaine, Marie-Madeleine vient au tombeau dès le matin, alors qu''il fait encore sombre, et elle voit que la pierre a été enlevée du tombeau. '
  '10':
  - type: text
    content: Les disciples s'en retournèrent donc chez eux.
  - type: heading
    content: Jésus apparaît à Marie-Madeleine
  - type: heading
    content: Mc 16.9-11
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 28.9s.
  - type: text
    content: 'Cependant Marie se tenait dehors, près du tombeau, et elle pleurait. Tout en pleurant, elle se baissa pour regarder dans le tombeau. '
  '12':
  - type: note
    content: 'anges  : cf. 1.51 ; 12.29 ; Mt 28.2,5/ / ; Hé 1.14 ; voir aussi Ex 25.17-22. –  vêtus de blanc  : cf. Mc 16.5s. –  gisait v. 5ss ; 2.6n. –  précédemment  : sous-entendu dans le texte.'
  - type: text
    content: 'Elle voit alors deux anges vêtus de blanc, assis là où gisait précédemment le corps de Jésus, l''un à la tête et l''autre aux pieds. '
  '13':
  - type: note
    content: 'Cf. v. 15. –  Femme 2.4+. –  Parce qu''on a enlevé…  : autre traduction on a enlevé… v. 2+.'
  - type: text
    content: 'Ils lui dirent : Femme, pourquoi pleures-tu ? Elle leur répondit : Parce qu''on a enlevé mon Seigneur, et je ne sais pas où on l''a mis. '
  '14':
  - type: note
    content: 'elle se retourna  : litt. elle se retourna en arrière (le même terme est traduit derrière en 1.15n). –  debout  : le mot grec est apparenté à celui qui est traduit par résurrection et au verbe traduit par se relever, au sens de ressusciter (cf. v. 19,26). –  ne savait pas… 21.4 ; Lc 24.16 ; cf. 2Co 5.16.'
  - type: text
    content: 'Après avoir dit cela, elle se retourna ; elle voit Jésus, debout ; mais elle ne savait pas que c''était Jésus. '
  '15':
  - type: note
    content: 'V. 13+. –  le jardinier  : cf. 19.41. –  j''irai le prendre  : le même verbe a été traduit par enlever aux v. 1s,13 ; cf. 1.29n.'
  - type: text
    content: 'Jésus lui dit : Femme, pourquoi pleures-tu ? Qui cherches-tu ? Pensant que c''était le jardinier, elle lui dit : Seigneur, si c''est toi qui l''as emporté, dis-moi où tu l''as mis, et moi, j''irai le prendre. '
  '16':
  - type: note
    content: Cf. 10.3,5. –  Rabbouni / Maître 1.38n  ; Mc 10.51.
  - type: text
    content: 'Jésus lui dit : Marie ! Elle se retourna et lui dit en hébreu : '
  - type: text
    content: Rabbouni !
  - type: text
    content: '  – c''est-à-dire : Maître ! '
  '17':
  - type: note
    content: 'Cesse de t''accrocher à moi  : litt. cesse de me toucher ou, selon certains, ne me touche pas  ; cf. 16.5-7,20-23 ; 14.28 ; Mt 28.9s ; voir aussi Mc 5.21ss/ /. –  monté (3.13) vers le Père  : certains mss portent vers mon Père  ; cf. 13.1+. –  mes frères Mt 12.48s ; 25.40 ; 28.10 ; Rm 8.29 ; Hé 2.11s. –  mon Père / votre Père 1.12 ; 1Jn 3.1s. –  mon Dieu  : cf. Ap 3.12.'
  - type: text
    content: 'Jésus lui dit : Cesse de t''accrocher à moi, car je ne suis pas encore monté vers le Père. Mais va vers mes frères et dis-leur que je monte vers celui qui est mon Père et votre Père, mon Dieu et votre Dieu.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'annoncer  ; cf. Lc 24.9. –  qu''elle a vu le Seigneur  : litt. j''ai vu le Seigneur  ; v. 20,25,28s ; 21.7,12 ; cf. 12.45 ; 1Co 9.1.'
  - type: text
    content: Marie-Madeleine vient annoncer aux disciples qu'elle a vu le Seigneur et qu'il lui a dit cela.
  - type: heading
    content: Jésus apparaît à ses disciples
  - type: heading
    content: Lc 24.36-49
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 28.16-20. –  premier de la semaine v. 1n. –  fermées  : autre traduction verrouillées , de même v. 26. –  crainte des Juifs 7.13+. Cf. Evangile de Pierre 26s (voir aussi ♦) : « Quant à moi (Pierre), j''étais dans l''affliction avec mes compagnons, et, blessés en notre cœur, nous restions cachés, car nous étions recherchés par eux comme des malfaiteurs et comme voulant incendier le Temple. En plus de tout cela, nous jeûnions et nous demeurions assis dans le deuil et dans les larmes, et ce nuit et jour jusqu''au sabbat. » –  Jésus vint  : cf. 14.3,18-23. –  debout  : cf. v. 14n. –  la paix (14.27+) soit avec vous 20.21,26.'
  - type: text
    content: 'Le soir de ce jour-là, qui était le premier de la semaine, alors que les portes de l''endroit où se trouvaient les disciples étaient fermées, par crainte des Juifs, Jésus vint ; debout au milieu d''eux, il leur dit : Que la paix soit avec vous ! '
  '2':
  - type: note
    content: 'l''ami de Jésus  : litt. celui que Jésus aimait (d''amitié)  ; cf. 11.3n,5n  ; voir aussi 13.23+. –  nous ne savons pas  : cf. v. 13 ; Mt 28.1/ /.'
  - type: text
    content: 'Elle court trouver Simon Pierre et l''autre disciple, l''ami de Jésus, et elle leur dit : On a enlevé le Seigneur du tombeau, et nous ne savons pas où on l''a mis !'
  '20':
  - type: note
    content: côté 19.34+ ; cf. 20.25,27 ; voir aussi Lc 24.39. –  se réjouirent 16.22 ; cf. 15.11+ ; Mt 28.8. –  de voir le Seigneur v. 18+.
  - type: text
    content: 'Quand il eut dit cela, il leur montra ses mains et son côté. Les disciples se réjouirent de voir le Seigneur. '
  '21':
  - type: note
    content: 'la paix… v. 19+. –  Comme le Père… 17.18. –  je vous envoie  : cf. Mt 28.19 ; Lc 24.47 ; Ac 1.8.'
  - type: text
    content: 'Jésus leur dit à nouveau : Que la paix soit avec vous ! Comme le Père m''a envoyé, moi aussi je vous envoie. '
  '22':
  - type: note
    content: Cf. 7.39+ ; 15.26s ; voir aussi Gn 2.7 ; Ez 37.9 ; Lc 24.49 ; Ac 1.8 ; 1Co 15.45. –  Esprit saint 14.26+.
  - type: text
    content: 'Après avoir dit cela, il souffla sur eux et leur dit : Recevez l''Esprit saint. '
  '23':
  - type: note
    content: 'Mt 18.18+. –  ils sont…  : autre traduction ils leur ont été (pardonnés / retenus)  ; certains mss portent ils seront (pardonnés / retenus)  ; cf. Lc 5.20,23 ; 1Jn 2.12.'
  - type: text
    content: A qui vous pardonnerez les péchés, ceux-ci sont pardonnés ; à qui vous les retiendrez, ils sont retenus.
  - type: heading
    content: Thomas et le ressuscité
  '24':
  - type: text
    content: ' '
  - type: note
    content: Thomas… 11.16n.
  - type: text
    content: 'Thomas, celui qu''on appelle le Jumeau, l''un des Douze, n''était pas avec eux lorsque Jésus vint. '
  '25':
  - type: note
    content: 'Nous avons vu v. 18+ ; cf. 19.34+ ; 1Jn 1.1. –  dans ses mains… v. 20. –  la marque ou, selon certains mss, la place (litt. le lieu) ; le terme correspondant à marque est celui qui a donné le mot type (Ac 7.43n  ; Rm 5.14n). –  je ne le croirai jamais  : autres traductions je ne croirai en aucun cas ; je n''aurai pas foi  ; cf. v. 8,27,29,31.'
  - type: text
    content: 'Les autres disciples lui dirent donc : Nous avons vu le Seigneur. Mais lui leur dit : Si je ne vois pas dans ses mains la marque des clous, si je ne mets pas mon doigt dans la marque des clous et ma main dans son côté, je ne le croirai jamais !'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 19. – Voir paix.
  - type: text
    content: 'Huit jours après, ses disciples étaient de nouveau dans la maison, et Thomas avec eux. Jésus vient, alors que les portes étaient fermées ; debout au milieu d''eux, il leur dit : Que la paix soit avec vous ! '
  '27':
  - type: note
    content: 'Cf. Mc 16.14 ; Lc 24.25,39. –  Ne sois pas…  : autres traductions ne deviens pas un incroyant, mais un croyant ; cesse d''être sans foi, deviens un homme de foi  ; le terme correspondant à croyant (comme en Ac 10.45 ; 16.1,15) ou à homme de foi (comme en Ga 3.9n) signifie aussi, dans d''autres contextes, fidèle ou digne de confiance (Mt 24.45+).'
  - type: text
    content: 'Puis il dit à Thomas : Avance ici ton doigt, regarde mes mains, avance ta main et mets-la dans mon côté ! Ne sois pas un incroyant, deviens un homme de foi ! '
  '28':
  - type: note
    content: Cf. Ps 35.23 ; Ap 4.11. –  Mon Seigneur v. 13,18+. –  mon Dieu 1.1,18 ; cf. Rm 9.5.
  - type: text
    content: 'Thomas lui répondit : Mon Seigneur, mon Dieu ! '
  '29':
  - type: note
    content: 'Parce que…  : cf. 1.50 ; 4.48. –  tu es convaincu 6.69n  ; 11.27n. –  croient sans avoir vu  : autre traduction qui n''ont pas vu, et qui pourtant ont foi  ; cf. 17.20 ; 1P 1.8.'
  - type: text
    content: 'Jésus lui dit : Parce que tu m''as vu, tu es convaincu ? Heureux ceux qui croient sans avoir vu !'
  - type: heading
    content: Le but de ce livre
  '3':
  - type: text
    content: ' '
  - type: note
    content: Pierre et l'autre disciple 18.15+ ; cf. Lc 24.24.
  - type: text
    content: 'Pierre et l''autre disciple sortirent donc pour venir au tombeau. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.25. –  ses disciples  : certains mss portent les disciples . –  signes 2.11+ ; cf. 12.37.'
  - type: text
    content: 'Jésus a encore produit, devant ses disciples, beaucoup d''autres signes qui ne sont pas écrits dans ce livre. '
  '31':
  - type: note
    content: 'Cf. 1.12s ; 3.15+ ; 19.35 ; 1Jn 5.13. –  Christ (1.41n) / Fils de Dieu 11.27+ ; Mt 16.16+. –  par cette foi  : litt. croyant. –  en son nom Mt 12.21 ; Lc 24.47.'
  - type: text
    content: Mais ceux-ci sont écrits pour que vous croyiez que Jésus est le Christ, le Fils de Dieu, et que, par cette foi, vous ayez la vie en son nom.
  '4':
  - type: text
    content: 'Ils couraient tous deux ensemble. Mais l''autre disciple courut plus vite que Pierre et arriva le premier au tombeau ; '
  '5':
  - type: note
    content: '19.40+. –  se baisse  : autre traduction regarde attentivement  ; cf. v. 11 ; Lc 24.12n. –  voit  : le texte grec va employer deux verbes différents, habituellement synonymes, aux v. 6 (où certains discernent une nuance d''insistance et traduisent par contempler, considérer) et 8. –  gisent v. 6s,12 ; 2.6n.'
  - type: text
    content: 'il se baisse, voit les bandelettes qui gisent là ; pourtant il n''entra pas. '
  '6':
  - type: text
    content: 'Simon Pierre, qui le suivait, arrive. Entrant dans le tombeau, il voit les bandelettes qui gisent là '
  '7':
  - type: note
    content: 'Cf. 11.44. –  sur la tête de Jésus  : litt. sur sa tête. –  il était roulé  : le même verbe est traduit par envelopper en Mt 27.59 ; Lc 23.53. –  un autre lieu  : litt. un (seul) lieu  ; certains comprennent, au contraire, au même endroit.'
  - type: text
    content: 'et le linge qui était sur la tête de Jésus ; ce linge ne gisait pas avec les bandelettes, mais il était roulé à part, dans un autre lieu. '
  '8':
  - type: note
    content: il crut ou il eut foi 1.7n.
  - type: text
    content: 'Alors l''autre disciple, qui était arrivé le premier au tombeau, entra aussi ; il vit et il crut. '
  '9':
  - type: note
    content: '2.22+. –  l''Ecriture, selon laquelle…  : autre traduction l''Ecriture selon laquelle…, ce qui suggérerait un texte précis ; cf. Os 6.2 ; Jon 2.1 ; Ps 16.10 ; Lc 24.25ss ; 1Co 15.4. –  se relever…  : cf. v. 14n.'
  - type: text
    content: 'Car ils n''avaient pas encore compris l''Ecriture, selon laquelle il devait se relever d''entre les morts. '
