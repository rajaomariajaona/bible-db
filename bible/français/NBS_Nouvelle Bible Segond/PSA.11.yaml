document_id: PSA.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Quand tout semble perdu
  - type: text
    content: ' '
  - type: note
    content: 'je trouve un abri 7.2+. –  Va-t''en…  : texte obscur, litt. allez-vous-en (ou, selon une autre lecture traditionnelle, va-t''en ) votre montagne, oiseau(x)  ; la traduction s''inspire de versions anciennes ; on pourrait aussi comprendre fuyez votre montagne  ; cf. 55.7s ; 1S 22.1 ; le verbe correspondant est traduit par s''échapper en Pr 26.2 et par errer en Pr 27.8 ; cf. 1 Maccabées 2.28 : « (Les Juifs qui refusaient de participer à un culte hellénistique) s''enfuirent dans les montagnes, abandonnant tout ce qu''ils possédaient dans la ville. »'
  - type: text
    content: Du chef de chœur. De David.
  - type: text
    content: 'C''est dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que je trouve un abri.'
  - type: text
    content: 'Comment pouvez-vous me dire :'
  - type: text
    content: Va-t'en dans la montagne, comme un oiseau !
  '2':
  - type: text
    content: ' '
  - type: note
    content: '7.13+,14 ; 37.14 ; 64.4s. –  la corde  : cf. Jg 16.7n.'
  - type: text
    content: Car les méchants bandent l'arc,
  - type: text
    content: ils ajustent leur flèche sur la corde,
  - type: text
    content: pour tirer dans l'obscurité sur ceux qui ont le cœur droit.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'que ferait-il  : certains comprennent qu''a-t-il fait ? peut-être au sens de  : que reste-t-il de son œuvre ?'
  - type: text
    content: Quand les fondations sont rasées,
  - type: text
    content: le juste, que ferait-il ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'est dans son temple (autre traduction palais ) sacré  : autre traduction a sa sainteté dans le temple  ; 5.8 ; cf. 29.9n  ; Mi 1.2 ; Ha 2.20. –  son trône dans le ciel  : cf. 2.4 ; 103.19 ; Mt 5.34 ; Ap 4.2. –  ses yeux regardent…  : cf. 14.2 ; 33.13s ; 53.3 ; 66.7 ; 102.20 ; 113.5s ; Jb 28.24 ; 2Ch 16.9. –  ses regards  : litt. ses paupières  ; cf. 132.4 ; Jb 3.9n  ; Pr 4.25n. –  sondent v. 5 ; 7.10n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est dans son temple sacré,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a son trône dans le ciel ;'
  - type: text
    content: ses yeux regardent,
  - type: text
    content: ses regards sondent les êtres humains.
  '5':
  - type: text
    content: ' '
  - type: note
    content: le juste et le méchant Ec 3.17 ; cf. Jr 20.12.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sonde le juste et le méchant ;'
  - type: text
    content: il déteste celui qui aime la violence.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'des braises  : traduction incertaine ; on a aussi compris des filets  ; cf. 18.13s. –  feu / soufre Gn 19.24 ; Ez 38.22 ; Ap 20.9s. –  brûlant  : cf. 119.53n. –  la coupe  : cf. 16.5 ; voir aussi 75.9 ; Es 51.17-22 ; Jr 25.15+ss ; Ap 14.10.'
  - type: text
    content: Il fait pleuvoir sur les méchants
  - type: text
    content: des braises, du feu et du soufre ;
  - type: text
    content: un vent brûlant, c'est la coupe qu'ils ont en partage.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur est juste 45.8 ; 119.137 ; So 3.5. –  ce qui est fait pour la justice 103.6n. –  ce sont les gens droits…  : autres traductions l''homme droit verra sa face ; sa face voit l''homme droit (ou éventuellement la droiture ) ; cf. 17.15+ ; 27.4 ; 42.3 ; 63.3. –  sa face , d''après des versions anciennes ; leur face , d''après le texte hébreu traditionnel.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est juste, il aime ce qui est fait pour la justice ;'
  - type: text
    content: ce sont les gens droits qui peuvent voir sa face.
