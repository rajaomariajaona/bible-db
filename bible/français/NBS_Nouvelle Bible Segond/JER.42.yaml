document_id: JER.42,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les rescapés consultent Jérémie
  - type: text
    content: ' '
  - type: note
    content: 'Yezania  : cf. 40.8 ; LXX lit ici Azaria (cf. 43.2), fils de Maaseia (cf. 21.1).'
  - type: text
    content: 'Tous les officiers, Yohanân, fils de Qaréah, Yezania, fils de Hoshaya, et tout le peuple, depuis le plus petit jusqu''au plus grand, s''avancèrent '
  '10':
  - type: note
    content: Si vous continuez à habiter ou si vous habitez tranquillement  ; cf. Es 30.15ss. –  je vous bâtirai… 1.10+ ; 24.6. –  je regrette le mal… 18.8+.
  - type: text
    content: 'Si vous continuez à habiter ce pays, je vous bâtirai, je ne raserai pas ; je vous planterai, je ne déracinerai pas ; car je regrette le mal que je vous ai fait. '
  '11':
  - type: note
    content: Cf. 1.8+,17 ; 20.13 ; 30.10.
  - type: text
    content: 'N''ayez pas peur du roi de Babylone ; celui dont vous avez peur, n''ayez pas peur de lui – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – car je suis avec vous pour vous sauver et vous délivrer de sa main. '
  '12':
  - type: note
    content: 'Je vous accorderai de la compassion  : cf. 1R 8.50n. –  il aura compassion  : versions anciennes j''aurai compassion. –  il vous ramènera  : certaines versions anciennes ont lu je vous ferai habiter  ; cf. 16.15 ; 27.11.'
  - type: text
    content: 'Je vous accorderai de la compassion : il aura compassion de vous, et il vous ramènera sur votre terre. '
  '13':
  - type: note
    content: V. 21 ; 41.17 ; 43.4,7.
  - type: text
    content: 'Mais si vous dites : « Nous n''habiterons pas ce pays ! », si vous n''écoutez pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, '
  '14':
  - type: note
    content: 'Cf. 2.31. –  nous irons…  : cf. Nb 14.3s. –  le son de la trompe annonçant la venue de l''ennemi, 4.5+.'
  - type: text
    content: 'si vous dites : « Non, nous irons en Egypte, où nous ne verrons pas de guerre, où nous n''entendrons pas le son de la trompe, où nous ne manquerons pas de pain, et c''est là que nous habiterons », '
  '15':
  - type: note
    content: 'Cf. 44.12,24. –  vous décidez…  : litt. vous tournez votre face pour aller, tournure semblable au v. 17 ; cf. 44.11ns. –  séjourner en immigrés  : cf. Ex 12.48n.'
  - type: text
    content: 'alors écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', reste de Juda ! Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Si vraiment vous décidez de vous rendre en Egypte, si vous allez y séjourner en immigrés, '
  '16':
  - type: note
    content: Cf. 44.27 ; Ez 11.8.
  - type: text
    content: 'l''épée dont vous avez peur vous atteindra là-bas, en Egypte ; la famine, objet de vos inquiétudes, s''attachera à vous là-bas, en Egypte ; c''est là que vous mourrez. '
  '17':
  - type: note
    content: 'épée / famine / peste v. 22 ; 14.12+. –  ni survivant, ni rescapé du malheur (litt. de devant le malheur) : 11.23+ ; 44.14 ; Lm 2.22.'
  - type: text
    content: 'Tous ceux qui décideront de se rendre en Egypte pour y séjourner en immigrés mourront par l''épée, par la famine ou par la peste, et il n''y aura pour eux ni survivant, ni rescapé du malheur que je ferai venir sur eux. '
  '18':
  - type: note
    content: '7.20+ ; 24.9+ ; 29.18n  ; 44.6,12. –  malédiction  : voir bénédiction.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : De même que ma colère et ma fureur se sont répandues sur les habitants de Jérusalem, de même ma fureur se répandra sur vous quand vous entrerez en Egypte ; vous deviendrez une formule d''adjuration, un sujet d''atterrement, de malédiction et d''outrage, et vous ne verrez plus ce lieu. '
  '19':
  - type: note
    content: 43.2 ; Dt 17.16+.
  - type: text
    content: 'Reste de Juda, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous le dit : N''allez pas en Egypte ! Sachez-le bien, je vous ai avertis aujourd''hui. '
  '2':
  - type: note
    content: 'que notre supplication parvienne  : cf. 36.7n. –  pour  : omis par LXX ; cf. 7.16+ ; 37.3. –  un petit reste Dt 28.62 ; Daniel grec 3.37 : « Nous sommes devenus le plus petit de tous les peuples, et nous sommes humiliés aujourd''hui sur toute la terre à cause de nos péchés. » –  le voient  : litt. nous voient.'
  - type: text
    content: 'et dirent à Jérémie, le prophète : S''il te plaît, que notre supplication parvienne devant toi ; prie pour nous le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, pour tout ce reste. Car nous étions beaucoup et nous ne sommes plus qu''un petit reste, ainsi que tes yeux le voient. '
  '20':
  - type: note
    content: Cf. v. 2,5.
  - type: text
    content: 'Vous vous égarez vous-mêmes, car vous m''avez envoyé vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, en disant : « Prie pour nous le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ; tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu dira, dis-le-nous, et nous le ferons ! » '
  '21':
  - type: note
    content: '43.4. –  tout ce qu''il m''a chargé…  : litt. tout ce pour quoi il m''a envoyé vers vous, tournure analogue en 43.1 ; cf. Ag 1.12n.'
  - type: text
    content: 'Je vous l''ai dit aujourd''hui ; mais vous n''écoutez pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, ni tout ce qu''il m''a chargé de vous dire. '
  '22':
  - type: note
    content: V. 16s.
  - type: text
    content: 'Sachez-le bien maintenant : vous mourrez par l''épée, par la famine ou par la peste dans le lieu même où vous voulez aller pour y séjourner en immigrés.'
  '3':
  - type: note
    content: Cf. 7.23+.
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, nous dise la voie que nous devons suivre et ce que nous avons à faire ! '
  '4':
  - type: note
    content: Cf. v. 7 ; 11.18.
  - type: text
    content: 'Jérémie, le prophète, leur dit : Entendu ! Je prie le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, selon vos paroles ; et je vous dirai, sans rien vous cacher, toute parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous répondra. '
  '5':
  - type: note
    content: 'V. 20. –  un témoin loyal (ou vrai) et sûr (ou digne de confiance) : cf. Gn 31.50 ; Jg 11.10 ; 1S 12.5 ; Ap 1.5.'
  - type: text
    content: 'Ils dirent à Jérémie : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit contre nous un témoin loyal et sûr, si nous n''agissons pas exactement selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura envoyée pour nous ! '
  '6':
  - type: note
    content: 38.20. –  Que ce soit bon ou mauvais, c.-à-d. quoi qu'il dise, que cela nous plaise ou non. –  nous écouterons le (ou nous obéirons au) Seigneur (litt. la voix de YHWH, de même dans la suite) ; cf. 3.25n  ; 7.26+ ; 36.8nss.
  - type: text
    content: 'Que ce soit bon ou mauvais, nous écouterons le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, vers qui nous t''envoyons ; nous serons heureux pour avoir écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Dix jours après  : cf. 28.6,12. –  la parole… 1.2n.'
  - type: text
    content: 'Dix jours après, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie. '
  '8':
  - type: text
    content: 'Jérémie appela alors Yohanân, fils de Qaréah, tous les chefs de l''armée qui étaient avec lui et tout le peuple, depuis le plus petit jusqu''au plus grand. '
  '9':
  - type: text
    content: 'Il leur dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, vers qui vous m''avez envoyé pour que je fasse parvenir votre supplication devant lui : '
