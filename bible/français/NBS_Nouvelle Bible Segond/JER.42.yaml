document_id: JER.42,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les rescapés consultent Jérémie
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yezania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 40.8 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' lit ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Azaria '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 43.2), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fils de Maaseia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 21.1).
      marker-yv: yv-n
    - type: text
      text: 'Tous les officiers, Yohanân, fils de Qaréah, Yezania, fils de Hoshaya, et tout le peuple, depuis le plus petit jusqu''au plus grand, s''avancèrent '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Si vous continuez à habiter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si vous habitez tranquillement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Es 30.15ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je vous bâtirai… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.10+ ; 24.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je regrette le mal… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 18.8+.
      marker-yv: yv-n
    - type: text
      text: 'Si vous continuez à habiter ce pays, je vous bâtirai, je ne raserai pas ; je vous planterai, je ne déracinerai pas ; car je regrette le mal que je vous ai fait. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.8+,17 ; 20.13 ; 30.10.
      marker-yv: yv-n
    - type: text
      text: 'N''ayez pas peur du roi de Babylone ; celui dont vous avez peur, n''ayez pas peur de lui – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – car je suis avec vous pour vous sauver et vous délivrer de sa main. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je vous accorderai de la compassion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 8.50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il aura compassion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : versions anciennes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'aurai compassion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il vous ramènera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certaines versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je vous ferai habiter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 16.15 ; 27.11.'
      marker-yv: yv-n
    - type: text
      text: 'Je vous accorderai de la compassion : il aura compassion de vous, et il vous ramènera sur votre terre. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 21 ; 41.17 ; 43.4,7.
      marker-yv: yv-n
    - type: text
      text: 'Mais si vous dites : « Nous n''habiterons pas ce pays ! », si vous n''écoutez pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous irons…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 14.3s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le son de la trompe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: annonçant la venue de l'ennemi, 4.5+.
      marker-yv: yv-n
    - type: text
      text: 'si vous dites : « Non, nous irons en Egypte, où nous ne verrons pas de guerre, où nous n''entendrons pas le son de la trompe, où nous ne manquerons pas de pain, et c''est là que nous habiterons », '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 44.12,24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous décidez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous tournez votre face pour aller
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', tournure semblable au v. 17 ; cf. 44.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: séjourner en immigrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'alors écoutez la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', reste de Juda ! Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : Si vraiment vous décidez de vous rendre en Egypte, si vous allez y séjourner en immigrés, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 44.27 ; Ez 11.8.
      marker-yv: yv-n
    - type: text
      text: 'l''épée dont vous avez peur vous atteindra là-bas, en Egypte ; la famine, objet de vos inquiétudes, s''attachera à vous là-bas, en Egypte ; c''est là que vous mourrez. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'famine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 22 ; 14.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni survivant, ni rescapé du malheur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de devant le malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : 11.23+ ; 44.14 ; Lm 2.22.'
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui décideront de se rendre en Egypte pour y séjourner en immigrés mourront par l''épée, par la famine ou par la peste, et il n''y aura pour eux ni survivant, ni rescapé du malheur que je ferai venir sur eux. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.20+ ; 24.9+ ; 29.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 44.6,12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: malédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : De même que ma colère et ma fureur se sont répandues sur les habitants de Jérusalem, de même ma fureur se répandra sur vous quand vous entrerez en Egypte ; vous deviendrez une formule d''adjuration, un sujet d''atterrement, de malédiction et d''outrage, et vous ne verrez plus ce lieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 43.2 ; Dt 17.16+.
      marker-yv: yv-n
    - type: text
      text: 'Reste de Juda, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vous le dit : N''allez pas en Egypte ! Sachez-le bien, je vous ai avertis aujourd''hui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que notre supplication parvienne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 36.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : omis par LXX ; cf. 7.16+ ; 37.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un petit reste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 28.62 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Daniel
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.37 : « Nous sommes devenus le plus petit de tous les peuples, et nous sommes humiliés aujourd''hui sur toute la terre à cause de nos péchés. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le voient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous voient.
      marker-yv: yv-n
    - type: text
      text: 'et dirent à Jérémie, le prophète : S''il te plaît, que notre supplication parvienne devant toi ; prie pour nous le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, pour tout ce reste. Car nous étions beaucoup et nous ne sommes plus qu''un petit reste, ainsi que tes yeux le voient. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 2,5.
      marker-yv: yv-n
    - type: text
      text: 'Vous vous égarez vous-mêmes, car vous m''avez envoyé vers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, en disant : « Prie pour nous le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu ; tout ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu dira, dis-le-nous, et nous le ferons ! » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout ce qu'il m'a chargé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout ce pour quoi il m'a envoyé vers vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', tournure analogue en 43.1 ; cf. Ag 1.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je vous l''ai dit aujourd''hui ; mais vous n''écoutez pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, ni tout ce qu''il m''a chargé de vous dire. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 16s.
      marker-yv: yv-n
    - type: text
      text: 'Sachez-le bien maintenant : vous mourrez par l''épée, par la famine ou par la peste dans le lieu même où vous voulez aller pour y séjourner en immigrés.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 7.23+.
      marker-yv: yv-n
    - type: text
      text: 'Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, nous dise la voie que nous devons suivre et ce que nous avons à faire ! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 7 ; 11.18.
      marker-yv: yv-n
    - type: text
      text: 'Jérémie, le prophète, leur dit : Entendu ! Je prie le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, selon vos paroles ; et je vous dirai, sans rien vous cacher, toute parole que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vous répondra. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un témoin loyal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vrai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et sûr '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: digne de confiance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. Gn 31.50 ; Jg 11.10 ; 1S 12.5 ; Ap 1.5.'
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent à Jérémie : Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soit contre nous un témoin loyal et sûr, si nous n''agissons pas exactement selon la parole que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''aura envoyée pour nous ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '42.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '38.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que ce soit bon ou mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quoi qu'il dise, que cela nous plaise ou non
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous écouterons le '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous obéirons au
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la voix de YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
