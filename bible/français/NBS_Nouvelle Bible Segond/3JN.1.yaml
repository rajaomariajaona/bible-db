document_id: 3JN.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'L''ancien  : cf. 2Jn 1n. –  Gaïos  : nom très courant (Ac 19.29 ; 20.4 ; Rm 16.23 ; 1Co 1.14) qui ne nous permet pas d''identifier le destinataire.'
  - type: text
    content: L'ancien, à Gaïos, le bien-aimé, que, moi, j'aime dans la vérité.
  '10':
  - type: note
    content: 'Cf. 1Co 4.18-21. –  chasse de l''Eglise  : cf. Jn 9.22+,34.'
  - type: text
    content: C'est pourquoi, si je viens, je rappellerai les œuvres qu'il fait, en répandant contre nous des paroles mauvaises ; non content de cela, lui-même n'accueille pas les frères, et ceux qui souhaitent le faire, il les en empêche et il les chasse de l'Eglise.
  '11':
  - type: text
    content: ' '
  - type: note
    content: mal / bien Rm 12.21 ; 1P 3.11. –  est de Dieu / n'a pas vu Dieu 1Jn 3.6,10.
  - type: text
    content: Bien-aimé, n'imite pas le mal, mais le bien. Celui qui fait le bien est de Dieu ; celui qui fait le mal n'a pas vu Dieu.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'la vérité elle-même v. 8n  ; cf. Pr 22.1 ; 2Co 3.2s ; 1P 2.12. –  Démétrios  : peut-être l''un des frères itinérants évoqués au v. 5, peut-être le porteur de l''épître. –  nous lui rendons témoignage… Jn 19.35 ; 21.24.'
  - type: text
    content: Tous, et la vérité elle-même, rendent témoignage à Démétrios ; nous aussi, nous lui rendons témoignage, et tu sais que notre témoignage est vrai.
  - type: heading
    content: En attendant le revoir
  '13':
  - type: text
    content: ' '
  - type: note
    content: 2Jn 12n.
  - type: text
    content: 'J''aurais beaucoup à t''écrire, mais je ne veux pas le faire avec l''encre et la plume. '
  '14':
  - type: note
    content: 2Jn 12n.
  - type: text
    content: 'J''espère te voir bientôt, et nous parlerons de vive voix. '
  '15':
  - type: note
    content: 'la paix… 1P 5.14. –  chacun par son nom  : cf. Jn 10.3.'
  - type: text
    content: Que la paix soit avec toi ! Les amis te saluent. Salue les amis, chacun par son nom.
  '2':
  - type: text
    content: ' '
  - type: note
    content: comme ton âme prospère , c.-à-d. comme tu prospères spirituellement  ; cf. Jn 10.11n  ; voir aussi esprit.
  - type: text
    content: Bien-aimé, je souhaite que tu prospères à tous égards et que tu sois en bonne santé, tout comme ton âme prospère.
  - type: heading
    content: Gaïos et les missionnaires itinérants
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 6 ; Phm 5-7. –  en effet  : le terme correspondant est absent de certains mss. –  la vérité qui est en toi  : litt. ta vérité  ; cf. 2Jn 4. –  tu vis  : litt. tu marches , de même v. 4.'
  - type: text
    content: 'Je me suis beaucoup réjoui, en effet, lorsque des frères sont venus, et qu''ils ont rendu témoignage à la vérité qui est en toi et à la manière dont, toi, tu vis dans la vérité. '
  '4':
  - type: note
    content: '2Jn 4. –  mes enfants  : cf. 1Jn 2.1+.'
  - type: text
    content: Je n'ai pas de plus grande joie que d'entendre dire que mes enfants vivent dans la vérité.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 10.41s ; Mc 14.6. –  tu agis selon la foi  : autres traductions tu te montres digne de confiance ; tu fais preuve de fidélité.'
  - type: text
    content: 'Bien-aimé, tu agis selon la foi dans tout ce que tu fais pour les frères, même étrangers ; '
  '6':
  - type: note
    content: 'Cf. v. 3. – Voir Eglise. –  leur fournir…  : cf. Rm 15.24n  ; Tt 3.13.'
  - type: text
    content: 'ils ont rendu témoignage à ton amour devant l''Eglise. Tu feras bien de leur fournir, d''une manière digne de Dieu, ce dont ils ont besoin pour leur voyage. '
  '7':
  - type: note
    content: 'le Nom (de Dieu ou du Christ) : cf. Jn 3.18 ; 20.31 ; Ac 5.41n  ; Ph 2.11 ; 1Jn 3.23 ; 5.13. –  sans rien recevoir…  : cf. 1Co 4.12 ; 9.12,15. –  des gens des nations ou des non-Juifs, des païens, expression par laquelle les Juifs désignaient les non-Juifs mais qui s''applique ici à des non-chrétiens ; voir Ac 10.45n  ; 1Co 5.1n  ; Ep 2.11n.'
  - type: text
    content: 'Car c''est pour le Nom qu''ils sont sortis, sans rien recevoir des gens des nations. '
  '8':
  - type: note
    content: 'nous devons 1Jn 4.11 ; cf. Rm 12.13 ; 14.1 ; Hé 13.2 ; 1P 4.9. –  des collaborateurs de la vérité  : autre traduction leurs collaborateurs dans la vérité  ; cf. 1Co 3.9n  ; 1Th 3.2 ; 2Jn 2.'
  - type: text
    content: Nous, donc, nous devons accueillir de telles personnes, pour être des collaborateurs de la vérité.
  - type: heading
    content: Diotrèphe et Démétrios
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'être le premier Mt 20.27/ / ; cf. Ph 2.3 ; 1P 5.3. –  ne nous accueille pas  : cf. v. 8 ; 2Jn 10s.'
  - type: text
    content: 'J''ai écrit quelque chose à l''Eglise ; mais Diotrèphe, qui se plaît à être le premier parmi eux, ne nous accueille pas. '
