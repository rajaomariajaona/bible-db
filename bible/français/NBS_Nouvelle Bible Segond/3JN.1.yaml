document_id: 3JN.1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salutation
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: L'ancien
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2Jn 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gaïos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : nom très courant (Ac 19.29 ; 20.4 ; Rm 16.23 ; 1Co 1.14) qui ne nous permet pas d''identifier le destinataire.'
      marker-yv: yv-n
    - type: text
      text: L'ancien, à Gaïos, le bien-aimé, que, moi, j'aime dans la vérité.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1Co 4.18-21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chasse de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Eglise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 9.22+,34.'
      marker-yv: yv-n
    - type: text
      text: C'est pourquoi, si je viens, je rappellerai les œuvres qu'il fait, en répandant contre nous des paroles mauvaises ; non content de cela, lui-même n'accueille pas les frères, et ceux qui souhaitent le faire, il les en empêche et il les chasse de l'Eglise.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 12.21 ; 1P 3.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'est de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'n''a pas vu Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Jn 3.6,10.
      marker-yv: yv-n
    - type: text
      text: Bien-aimé, n'imite pas le mal, mais le bien. Celui qui fait le bien est de Dieu ; celui qui fait le mal n'a pas vu Dieu.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la vérité elle-même '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Pr 22.1 ; 2Co 3.2s ; 1P 2.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Démétrios
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : peut-être l''un des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'frères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'itinérants évoqués au v. 5, peut-être le porteur de l''épître. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous lui rendons témoignage… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jn 19.35 ; 21.24.
      marker-yv: yv-n
    - type: text
      text: Tous, et la vérité elle-même, rendent témoignage à Démétrios ; nous aussi, nous lui rendons témoignage, et tu sais que notre témoignage est vrai.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: En attendant le revoir
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Jn 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''aurais beaucoup à t''écrire, mais je ne veux pas le faire avec l''encre et la plume. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Jn 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''espère te voir bientôt, et nous parlerons de vive voix. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la paix… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1P 5.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chacun par son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 10.3.'
      marker-yv: yv-n
    - type: text
      text: Que la paix soit avec toi ! Les amis te saluent. Salue les amis, chacun par son nom.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme ton âme prospère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme tu prospères spirituellement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Jn 10.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Bien-aimé, je souhaite que tu prospères à tous égards et que tu sois en bonne santé, tout comme ton âme prospère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Gaïos et les missionnaires itinérants
    marker-yv: yv-h
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 6 ; Phm 5-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en effet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme correspondant est absent de certains mss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la vérité qui est en toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta vérité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 2Jn 4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu vis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu marches
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même v. 4.'
      marker-yv: yv-n
    - type: text
      text: 'Je me suis beaucoup réjoui, en effet, lorsque des frères sont venus, et qu''ils ont rendu témoignage à la vérité qui est en toi et à la manière dont, toi, tu vis dans la vérité. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Jn 4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Jn 2.1+.'
      marker-yv: yv-n
    - type: text
      text: Je n'ai pas de plus grande joie que d'entendre dire que mes enfants vivent dans la vérité.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mt 10.41s ; Mc 14.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu agis selon la foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu te montres digne de confiance ; tu fais preuve de fidélité.
      marker-yv: yv-n
    - type: text
      text: 'Bien-aimé, tu agis selon la foi dans tout ce que tu fais pour les frères, même étrangers ; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 3. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Eglise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur fournir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 15.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Tt 3.13.'
      marker-yv: yv-n
    - type: text
      text: 'ils ont rendu témoignage à ton amour devant l''Eglise. Tu feras bien de leur fournir, d''une manière digne de Dieu, ce dont ils ont besoin pour leur voyage. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de Dieu ou du Christ) : cf. Jn 3.18 ; 20.31 ; Ac 5.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ph 2.11 ; 1Jn 3.23 ; 5.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans rien recevoir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Co 4.12 ; 9.12,15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des gens des nations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: ', des païens'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression par laquelle les Juifs désignaient les non-Juifs mais qui s''applique ici à des non-chrétiens ; voir Ac 10.45'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Co 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ep 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car c''est pour le Nom qu''ils sont sortis, sans rien recevoir des gens des nations. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous devons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Jn 4.11 ; cf. Rm 12.13 ; 14.1 ; Hé 13.2 ; 1P 4.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des collaborateurs de la vérité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs collaborateurs dans la vérité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1Co 3.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Th 3.2 ; 2Jn 2.'
      marker-yv: yv-n
    - type: text
      text: Nous, donc, nous devons accueillir de telles personnes, pour être des collaborateurs de la vérité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Diotrèphe et Démétrios
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'être le premier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 20.27/ / ; cf. Ph 2.3 ; 1P 5.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne nous accueille pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 8 ; 2Jn 10s.'
      marker-yv: yv-n
    - type: text
      text: 'J''ai écrit quelque chose à l''Eglise ; mais Diotrèphe, qui se plaît à être le premier parmi eux, ne nous accueille pas. '
