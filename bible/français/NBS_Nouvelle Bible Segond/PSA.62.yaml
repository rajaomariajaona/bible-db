document_id: PSA.62,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Confiance en Dieu
  - type: text
    content: ' '
  - type: note
    content: Yedoutoun 39.1n.
  - type: text
    content: Du chef de chœur. D'après Yedoutoun. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'êtres humains ou fils d''humain  ; le second mot traduit par hommes (litt. fils d''homme ) désigne les mâles, de sorte que certains voient dans la juxtaposition des deux expressions le sens de petits et grands , comme en 49.3n  ; il peut aussi s''agir d''un simple parallélisme sans nuance particulière (cf. 90.3 ; Nb 23.19). –  vapeur 39.6n. –  mensonge 116.11. –  S''ils montaient…  : autre traduction sur une balance ils monteraient, tous ensemble, plus légers qu''une vapeur  ; Es 40.15 ; Dn 5.27.'
  - type: text
    content: Les êtres humains ne sont qu'une vapeur ;
  - type: text
    content: les hommes, un mensonge.
  - type: text
    content: S'ils montaient sur une balance,
  - type: text
    content: ils seraient, à eux tous, plus légers qu'une vapeur.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'oppression  : cf. Es 30.12 ; Ez 22.29. –  ne placez pas un espoir futile  : le verbe hébreu rappelle le mot traduit par vapeur au v. 10. –  n''y attachez pas votre cœur Jb 31.25 ; Mt 19.22 ; Lc 12.19,20 ; 1Tm 6.17.'
  - type: text
    content: Ne mettez pas votre confiance dans l'oppression,
  - type: text
    content: ne placez pas un espoir futile dans la spoliation ;
  - type: text
    content: quand les richesses s'accroissent,
  - type: text
    content: n'y attachez pas votre cœur.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Dieu a parlé… Jb 33.14 ; cf. Pr 6.16 ; 30.15.
  - type: text
    content: Dieu a parlé une fois ;
  - type: text
    content: 'deux fois j''ai entendu ceci :'
  - type: text
    content: c'est que la force appartient à Dieu.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la fidélité  : cf. 17.7n  ; 25.10+. –  qui paies de retour… 28.4+ ; 1S 26.23 ; Jr 17.10 ; 25.14 ; 32.19 ; Ez 18.30 ; Os 12.3 ; Jb 34.11 ; Pr 24.12 ; Mt 16.27 ; Rm 2.6  ; 1Co 3.8 ; 2Tm 4.14 ; Ap 2.23 ; 22.12.'
  - type: text
    content: 'A toi aussi, Seigneur, la fidélité :'
  - type: text
    content: car c'est toi qui paies de retour chacun selon ses œuvres.
  '2':
  - type: text
    content: ' '
  - type: note
    content: je suis (ou mon âme est  ; cf. 6.4n) tranquille ou en repos , litt. silencieux  ; de même aux v. 6s ; cf. 37.7 ; 42.6ss. –  c'est de lui… Es 12.2.
  - type: text
    content: C'est auprès de Dieu seul que je suis tranquille ;
  - type: text
    content: c'est de lui que vient mon salut.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '89.27. –  rocher 18.3+ ; cf. 27.5. –  citadelle 9.10+. –  je ne vacillerai guère  : certains modifient le texte hébreu traditionnel pour lire je ne vacillerai pas , comme au v. 7 ; 15.5+.'
  - type: text
    content: Lui seul est mon rocher et mon salut,
  - type: text
    content: 'ma citadelle : je ne vacillerai guère.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'chercherez-vous…  : certains modifient légèrement le texte hébreu traditionnel pour lire vous précipiterez-vous (le verbe correspondant est traduit par courir en 59.5+) tous contre lui  ; cf. 18.30 ; voir aussi 3.7 ; 56.2. –  mur et clôture peuvent être comprises comme image des ennemis menaçant de se précipiter sur le juste ou plutôt du juste risquant de succomber à l''assaut.'
  - type: text
    content: Jusqu'à quand vous jetterez-vous sur un homme,
  - type: text
    content: chercherez-vous tous à le tuer,
  - type: text
    content: comme un mur qui penche,
  - type: text
    content: comme une clôture qui se renverse ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Oui, ils projettent de  : autre traduction ils ne tiennent conseil que pour . –  poste élevé  : litt. élévation. –  ils bénissent… 28.3.'
  - type: text
    content: Oui, ils projettent de le renverser de son poste élevé ;
  - type: text
    content: ils se plaisent au mensonge.
  - type: text
    content: De leur bouche, ils bénissent ;
  - type: text
    content: 'au fond d''eux-mêmes, ils maudissent. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2ns. –  de lui…  : cf. 71.5 ; Gn 49.18.'
  - type: text
    content: Qu'auprès de Dieu seul je sois tranquille,
  - type: text
    content: car de lui vient mon espoir.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 3 ; Jb 13.16.
  - type: text
    content: Lui seul est mon rocher et mon salut,
  - type: text
    content: 'ma citadelle : je ne vacillerai pas.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'reposent  : sous-entendu dans le texte. –  ma gloire 3.4+.'
  - type: text
    content: Sur Dieu reposent mon salut et ma gloire ;
  - type: text
    content: le rocher de ma force, mon abri, est en Dieu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'confiance 4.6+ ; cf. Es 26.4. –  en tout temps  : LXX a lu toute l''assemblée du peuple. –  Répandez votre cœur…  : cf. 42.5n  ; voir aussi 7.10+ ; 1S 1.15 ; Lm 2.19. –  abri 7.2+ ; cf. 46.8,12.'
  - type: text
    content: Mets en lui ta confiance en tout temps, peuple !
  - type: text
    content: Répandez votre cœur devant lui !
  - type: text
    content: 'Dieu est un abri pour nous. '
  - type: text
    content: Pause.
