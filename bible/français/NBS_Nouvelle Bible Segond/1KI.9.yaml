      marker-yv: yv-n
    - type: text
      text: 'Le pharaon, le roi d''Egypte, s''était mis en campagne pour prendre Guézer ; il y avait mis le feu et il avait tué les Cananéens qui habitaient la ville. Puis il l''avait donnée pour dot à sa fille, femme de Salomon. '
