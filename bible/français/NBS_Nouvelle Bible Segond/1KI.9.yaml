      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' apparaît de nouveau à Salomon'
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 7.11-22
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Lorsque Salomon eut achevé de bâtir la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', la maison du roi, et tout ce qu''il avait désiré faire selon son bon plaisir, '
