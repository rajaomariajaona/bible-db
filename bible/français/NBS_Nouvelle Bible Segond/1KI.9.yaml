      marker-yv: yv-n
    - type: text
      text: 'Voici ce qui concerne ceux que le roi Salomon astreignit à la corvée pour bâtir la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et sa propre maison, le Millo et la muraille de Jérusalem, Hatsor, Meguiddo et Guézer. '
