document_id: 1KI.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur apparaît de nouveau à Salomon
  - type: heading
    content: 2Ch 7.11-22
  - type: text
    content: 'Lorsque Salomon eut achevé de bâtir la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la maison du roi, et tout ce qu''il avait désiré faire selon son bon plaisir, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Les vingt ans représentent les sept années de la construction du temple (6.38) ajoutées aux treize années de la construction du palais (7.1).
  - type: text
    content: 'Au bout de vingt ans, Salomon avait bâti les deux maisons, la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et la maison du roi. '
  '11':
  - type: note
    content: 'Hiram… avait fourni…  : cf. 5.15ss. –  au pays de Galilée  : cf. Jos 20.7 ; 21.32.'
  - type: text
    content: 'Alors, comme Hiram, roi de Tyr, avait fourni à Salomon du bois de cèdre, du bois de cyprès et de l''or, autant qu''il en avait désiré, le roi Salomon donna à Hiram vingt villes au pays de Galilée. '
  '12':
  - type: text
    content: 'Hiram sortit de Tyr, pour voir les villes que lui donnait Salomon : elles ne lui plurent pas. '
  '13':
  - type: note
    content: 'il les appela…  : autre traduction on les a appelées pays de Kaboul jusqu''à ce jour. Selon Flavius Josèphe, l''expression pays de Kaboul serait méprisante et signifierait pays qui ne vaut rien. Selon d''autres, l''expression signifierait pays de marécage  ; LXX a compris pays-frontière  ; cf. Jos 19.27.'
  - type: text
    content: 'Il dit : Quelles sont ces villes que tu m''as données là, mon frère ? Et il les appela pays de Kaboul ; c''est ainsi qu''on les appelle jusqu''à ce jour. '
  '14':
  - type: note
    content: 'cent vingt talents  : plus de 4 tonnes ; voir mesures, poids et monnaies.'
  - type: text
    content: Hiram avait envoyé au roi cent vingt talents d'or.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce qui concerne  : litt. ceci est la chose , ce qui semble renvoyer aux v. 20-23. –  le Millo  : d''après l''étymologie, le nom pourrait signifier le terre-plein ou le remblai , et désigner des travaux de terrassement ou de fortification entre la « Ville de David » et le mont du Temple ; autre traduction la citadelle  ; cf. v. 24 ; 11.27 ; voir aussi Jg 9.6,20 ; 2S 5.9n  ; 2R 12.21 ; 1Ch 11.8 ; 2Ch 32.5. –  Hatsor Jos 11.1n. –  Meguiddo Jos 17.11n. –  Guézer Jos 10.33n.'
  - type: text
    content: 'Voici ce qui concerne ceux que le roi Salomon astreignit à la corvée pour bâtir la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et sa propre maison, le Millo et la muraille de Jérusalem, Hatsor, Meguiddo et Guézer. '
  '16':
  - type: note
    content: 'Le pharaon  : probablement Psousennès II (≈ 959-945 av. J.-C.) ; cf. 3.1n. –  les Cananéens qui habitaient la ville  : cf. Jg 1.29. –  dot  : ce mot traduit un terme hébreu qui évoque un renvoi ou un congédiement  ; c''est en l''occurrence le don qu''un père fait à sa fille en prenant congé d''elle parce qu''elle se marie (comparer les autres emplois du même mot, dans des sens apparemment différents, en Ex 18.2n  ; Mi 1.14n). –  sa fille, femme de Salomon 3.1n.'
  - type: text
    content: 'Le pharaon, le roi d''Egypte, s''était mis en campagne pour prendre Guézer ; il y avait mis le feu et il avait tué les Cananéens qui habitaient la ville. Puis il l''avait donnée pour dot à sa fille, femme de Salomon. '
  '17':
  - type: note
    content: Guézer v. 15n. –  Beth-Horôn-le-Bas Jos 10.10n  ; 18.13 ; 2Ch 8.5.
  - type: text
    content: 'Salomon bâtit Guézer, Beth-Horôn-le-Bas, '
  '18':
  - type: note
    content: 'Baalath  : cf. Jos 19.8n,44. –  Tamar  : autre lecture traditionnelle Tadmor, cf. 2Ch 8.4 ; voir aussi Ez 47.19 ; 48.28.'
  - type: text
    content: 'Baalath et Tamar au désert dans le pays, '
  '19':
  - type: note
    content: 'villes-entrepôts  : cf. Ex 1.11 ; 2Ch 17.12 ; voir aussi 2Ch 32.28. –  les attelages  : autres traductions les équipages des chars, la cavalerie, cf. v. 22. –  avait eu envie de bâtir  : autre traduction s''était attaché à bâtir  ; litt. s''était épris (cf. Dt 7.7n) de bâtir  : cf. v. 1.'
  - type: text
    content: 'toutes les villes-entrepôts qui appartenaient à Salomon, les villes pour les chars, les villes pour les attelages, et tout ce que Salomon avait eu envie de bâtir à Jérusalem, au Liban et dans tout le pays qu''il dirigeait. '
  '2':
  - type: note
    content: 'le Seigneur apparut à Salomon…  : cf. 3.5.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut à Salomon une seconde fois, comme il lui était apparu à Gabaon. '
  '20':
  - type: note
    content: 'Tout le peuple qui était resté…  : c.-à-d. le reste des populations que les Israélites avaient combattues pour s''installer à leur place en Canaan ; cf. Esd 9.1s ; voir aussi Ex 3.8,17 ; Dt 7.11 ; 20.17 ; Jos 3.10 ; 9.1s ; Jg 3.5.'
  - type: text
    content: 'Tout le peuple qui était resté des Amorites, des Hittites, des Perizzites, des Hivvites et des Jébusites, ceux qui n''étaient pas des Israélites, '
  '21':
  - type: note
    content: 'restés… dans le pays  : cf. Jg 1.19,21,27ss etc. –  anathème  : cf. Dt 2.34n.'
  - type: text
    content: 'leurs fils qui étaient restés après eux dans le pays, ceux que les Israélites n''avaient pu frapper d''anathème, Salomon les astreignit à une corvée d''esclaves – jusqu''à ce jour. '
  '22':
  - type: note
    content: 'n''imposa l''esclavage à personne  : cf. 5.27n. –  ses fonctionnaires  : litt. ses serviteurs. –  de ses chars  : litt. et de ses équipages (de chars) ou et de ses attelages ou et de ses cavaliers, cf. v. 19.'
  - type: text
    content: 'Mais Salomon n''imposa l''esclavage à personne parmi les Israélites, car ils étaient des hommes de guerre, ses fonctionnaires, ses chefs, ses écuyers, les chefs des équipages de ses chars. '
  '23':
  - type: note
    content: Cf. 5.30n.
  - type: text
    content: Les chefs des préfets qui étaient intendants des travaux de Salomon étaient au nombre de cinq cent cinquante ; ils exerçaient leur autorité sur le peuple qui faisait les travaux.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'La fille du pharaon monta  : cf. 3.1+. –  le Millo v. 15+.'
  - type: text
    content: La fille du pharaon monta de la Ville de David dans sa maison, celle qu'il lui avait bâtie. C'est alors qu'il bâtit le Millo.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Voir sacrifices. –  trois fois par an  : sans doute aux trois fêtes de pèlerinage, cf. Ex 23.14-17 ; 34.23 ; Dt 16.16 ; voir calendrier et fêtes.'
  - type: text
    content: 'Salomon offrait trois fois par an des holocaustes et des sacrifices de paix sur l''autel qu''il avait bâti pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et il offrait de l''encens sur celui qui était devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . Il acheva la Maison.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'des bateaux ou une flotte v. 27 ; 10.11,22 ; 22.48s ; 2Ch 9.21 ; 20.36s. –  Etsiôn-Guéber 22.49 ; Nb 33.35s ; Dt 2.8n  ; 2Ch 20.36. –  Eilath  : le texte hébreu traditionnel porte Eloth  ; cf. 2R 14.22 ; 16.6 ; 2Ch 26.2. –  mer des Joncs  : il s''agit ici de la mer Rouge, et plus particulièrement du golfe d''Aqaba ; cf. Ex 13.18n.'
  - type: text
    content: 'Le roi Salomon construisit des bateaux à Etsiôn-Guéber, près d''Eilath, au bord de la mer des Joncs, en Edom. '
  '27':
  - type: note
    content: 'Hiram envoya…  : cf. v. 11s,14.'
  - type: text
    content: 'Hiram envoya sur ces bateaux, avec les hommes de Salomon, ses propres hommes, des matelots qui connaissaient la mer. '
  '28':
  - type: note
    content: 'Ophir 10.11 ; 22.49 ; Gn 10.29n  ; Es 13.12 ; Ps 45.10 ; Jb 22.24 ; 28.16 ; 1Ch 29.4 ; 2Ch 9.10. On la situe habituellement, soit en Arabie, soit sur la côte africaine qui fait face à l''Arabie. –  quatre cent vingt talents  : plus de 14 tonnes, voir mesures, poids et monnaies.'
  - type: text
    content: Ils arrivèrent à Ophir et ils y prirent de l'or, quatre cent vingt talents, qu'ils apportèrent au roi Salomon.
  '3':
  - type: note
    content: 'prière / supplication  : cf. 8.28,38,45,54. –  pour que j''y place mon nom  : cf. 11.36 ; 14.21 ; Dt 12.5,21 ; voir aussi 1R 8.16-20,29. –  mes yeux… seront toujours là  : cf. Dt 11.12. –  toujours  : litt. tous les jours, à la deuxième occurrence.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : J''ai entendu ta prière, la supplication que tu m''as adressée ; je consacre cette maison que tu as bâtie pour que j''y place mon nom pour toujours ; mes yeux et mon cœur seront toujours là. '
  '4':
  - type: note
    content: 'Et toi, si tu marches…  : cf. 3.6. –  cœur intègre  : cf. Gn 20.5s ; Ps 78.72 ; 101.2.'
  - type: text
    content: 'Et toi, si tu marches devant moi comme a marché David, ton père, avec un cœur intègre et avec droiture, pour faire exactement ce que je t''ai ordonné, si tu observes mes prescriptions et mes règles, '
  '5':
  - type: note
    content: Tu auras toujours… 2.4n.
  - type: text
    content: 'j''établirai pour toujours ton trône royal en Israël, selon ce que j''ai dit à David, ton père : « Tu auras toujours un successeur sur le trône d''Israël. » '
  '6':
  - type: note
    content: 'si jamais vous vous détournez de moi  : litt. si vous vous détournez (ou si vous revenez) de derrière moi  ; cf. Nb 14.43n.'
  - type: text
    content: 'Mais si jamais vous vous détournez de moi, vous et vos fils, si vous n''observez pas mes commandements et mes prescriptions que j''ai placés devant vous, si vous allez servir d''autres dieux et vous prosterner devant eux, '
  '7':
  - type: note
    content: 'je retrancherai Israël…  : cf. 2Ch 7.20 (je vous déracinerai). –  consacrée  : voir saint. –  fable / raillerie  : cf. Dt 28.37 ; Jr 24.9.'
  - type: text
    content: 'je retrancherai Israël de la terre que je lui ai donnée, je chasserai de ma vue la maison que j''ai consacrée pour mon nom, et Israël sera un sujet de fable et de raillerie parmi tous les peuples. '
  '8':
  - type: note
    content: 'Et si haut placée qu''ait été cette maison  : la Vetus latina (voir Vg), Syr et Tg ont lu  : et cette maison tombera en ruine. –  sera atterré et sifflera d''horreur  : le verbe rendu ici par sera atterré est habituellement traduit par dévaster  ; d''autres le rattachent à une racine traduite par haleter  ; cf. Lv 26.32n  ; Jr 18.16n  ; 19.8 ; 49.17 ; 50.13. –  On dira : « Pourquoi…  : cf. Dt 29.23 ; Jr 22.8.'
  - type: text
    content: 'Et si haut placée qu''ait été cette maison, quiconque passera près d''elle sera atterré et sifflera d''horreur. On dira : « Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) a-t-il ainsi traité ce pays et cette maison ? » '
  '9':
  - type: note
    content: 'C''est parce qu''ils ont abandonné…  : cf. Dt 29.24-26 ; Jr 22.9.'
  - type: text
    content: 'Et l''on répondra : « C''est parce qu''ils ont abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu, qui a fait sortir d''Egypte leurs pères, parce qu''ils se sont attachés à d''autres dieux, se sont prosternés devant eux et les ont servis ; voilà pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait venir sur eux tout ce malheur. »'
  - type: heading
    content: Activités diverses de Salomon
  - type: heading
    content: 2Ch 8.1-18
