      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vingt ans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: représentent les sept années de la construction du temple (6.38) ajoutées aux treize années de la construction du palais (7.1).
      marker-yv: yv-n
    - type: text
      text: 'Au bout de vingt ans, Salomon avait bâti les deux maisons, la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et la maison du roi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hiram… avait fourni…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.15ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au pays de Galilée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 20.7 ; 21.32.'
      marker-yv: yv-n
    - type: text
      text: 'Alors, comme Hiram, roi de Tyr, avait fourni à Salomon du bois de cèdre, du bois de cyprès et de l''or, autant qu''il en avait désiré, le roi Salomon donna à Hiram vingt villes au pays de Galilée. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Hiram sortit de Tyr, pour voir les villes que lui donnait Salomon : elles ne lui plurent pas. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il les appela…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on les a appelées pays de Kaboul jusqu'à ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Selon Flavius '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Josèphe
        - type: text
          text: ', l''expression '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays de Kaboul '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'serait méprisante et signifierait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pays qui ne vaut rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Selon d''autres, l''expression signifierait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pays de marécage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pays-frontière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jos 19.27.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit : Quelles sont ces villes que tu m''as données là, mon frère ? Et il les appela pays de Kaboul ; c''est ainsi qu''on les appelle jusqu''à ce jour. '
