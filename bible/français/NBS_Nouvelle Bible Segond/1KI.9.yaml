      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le terre-plein '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le remblai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et désigner des travaux de terrassement ou de fortification entre la « Ville de David » et le mont du Temple ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la citadelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
