        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 12.21 ; 1Ch 11.8 ; 2Ch 32.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hatsor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 11.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Meguiddo '
      - type: usfm
        marker: ft
        children:
        - type: text
