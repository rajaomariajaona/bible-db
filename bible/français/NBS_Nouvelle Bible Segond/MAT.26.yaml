    marker-yv: yv-n
  - type: text
    text: 'Alors l''un des Douze, celui qu''on appelle Judas Iscariote, se rendit chez les grands prêtres '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s''agit probablement de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trente '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sicles, la monnaie juive ; cf. 27.3,9 ; Ex 21.32 (cf. Lv 27.2ss) ; Za 11.12. Voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'et dit : Que voulez-vous me donner pour que je vous le livre ? Ils le payèrent trente pièces d''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: A partir de ce moment, il cherchait une occasion pour le livrer.
