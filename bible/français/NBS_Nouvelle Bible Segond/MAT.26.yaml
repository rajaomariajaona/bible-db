    marker-yv: yv-n
  - type: text
    text: 'Comme Jésus était à Béthanie, chez Simon le lépreux, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'une femme s''approcha de lui. Elle tenait un flacon d''albâtre plein d''un parfum de grand prix et, pendant qu''il était à table, elle répandit le parfum sur sa tête. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'En voyant cela, les disciples s''indignèrent : A quoi bon ce gaspillage ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 13.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce parfum
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en donner le prix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: donner.
    marker-yv: yv-n
  - type: text
    text: On aurait pu vendre cela très cher et en donner le prix aux pauvres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
