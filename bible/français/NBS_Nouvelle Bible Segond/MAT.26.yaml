    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.61 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sanctuaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot désigne habituellement le bâtiment comprenant les pièces dites « Sacré » et « Très-Sacré » (27.40). Cf. Jn 2.19-21 ; Ac 6.14.'
    marker-yv: yv-n
  - type: text
    text: 'qui dirent : Il a dit : « Je peux détruire le sanctuaire de Dieu et reconstruire en trois jours. » '
  - type: usfm
    marker: v
    metadata:
      v: '62'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '62'
  - type: usfm
    marker: f
