    marker-yv: yv-n
  - type: text
    text: 'Jésus gardait le silence. Le grand prêtre lui dit : Je t''adjure par le Dieu vivant de nous dire si c''est toi qui es le Christ, le Fils de Dieu. '
  - type: usfm
    marker: v
    metadata:
