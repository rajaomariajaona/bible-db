        text: '26.60 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.28+ ; Dt 19.15 ; Jn 8.17.'
    marker-yv: yv-n
  - type: text
    text: 'Mais ils n''en trouvèrent pas, quoique beaucoup de faux témoins se soient présentés. Enfin il en vint deux '
  - type: usfm
    marker: v
    metadata:
      v: '61'
  - type: usfm
    marker: vlbl
