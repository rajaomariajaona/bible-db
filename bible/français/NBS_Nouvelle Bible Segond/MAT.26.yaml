    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 12.14-20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pâque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
