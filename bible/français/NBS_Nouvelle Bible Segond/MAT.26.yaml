    marker-yv: yv-n
  - type: text
    text: 'Peu après, ceux qui étaient là s''approchèrent et dirent à Pierre : Vraiment, toi aussi tu es de ces gens-là, ta façon de parler le montre bien. '
  - type: usfm
    marker: v
