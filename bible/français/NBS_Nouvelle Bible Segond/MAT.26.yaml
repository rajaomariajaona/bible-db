    marker-yv: yv-n
  - type: text
    text: 'Pierre, lui, était assis dehors, dans la cour. Une servante s''approcha de lui et dit : Toi aussi, tu étais avec Jésus le Galiléen. '
  - type: usfm
    marker: v
    metadata:
