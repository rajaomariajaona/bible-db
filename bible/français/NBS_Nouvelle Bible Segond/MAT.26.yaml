      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tu ne réponds rien aux témoignages que ces gens portent contre toi ?
    marker-yv: yv-n
  - type: text
    text: 'Le grand prêtre se leva et lui dit : Tu ne réponds rien ? Que dis-tu des témoignages que ces gens portent contre toi ? '
  - type: usfm
    marker: v
