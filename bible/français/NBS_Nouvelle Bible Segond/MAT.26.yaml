    marker-yv: yv-n
  - type: text
    text: 'Ceux qui avaient arrêté Jésus l''emmenèrent chez le grand prêtre Caïphe ; là, les scribes et les anciens se rassemblèrent. '
  - type: usfm
    marker: v
