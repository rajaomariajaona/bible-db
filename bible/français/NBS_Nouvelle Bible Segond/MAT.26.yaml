      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus s''en aperçut ; il leur dit : Pourquoi tracassez-vous cette femme ? Elle a accompli une belle œuvre à mon égard ; '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pauvres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 15.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous ne m'avez pas toujours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous ne m''avez pas pour toujours ; vous ne m''aurez pas toujours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.15+.
    marker-yv: yv-n
  - type: text
    text: 'les pauvres, en effet, vous les avez toujours avec vous ; mais moi, vous ne m''avez pas toujours. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jn 19.40.
    marker-yv: yv-n
  - type: text
    text: 'En répandant ce parfum sur mon corps, elle l''a fait pour mon ensevelissement. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cette bonne nouvelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.23+ ; 24.14 ; 28.19 ; cf. 1S 2.30.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, partout où cette bonne nouvelle sera proclamée, dans le monde entier, on racontera aussi, en mémoire de cette femme, ce qu''elle a fait.'
