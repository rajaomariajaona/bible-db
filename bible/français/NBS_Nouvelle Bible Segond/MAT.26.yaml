  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jn 6.70s.
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu''ils mangeaient, il dit : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, l''un de vous me livrera. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Ils furent profondément attristés, et chacun se mit à lui dire : Est-ce moi, Seigneur ? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
