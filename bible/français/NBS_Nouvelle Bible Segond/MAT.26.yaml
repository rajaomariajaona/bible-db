    marker-yv: yv-n
  - type: text
    text: 'Alors les grands prêtres et les anciens du peuple se rassemblèrent dans le palais du grand prêtre appelé Caïphe '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
