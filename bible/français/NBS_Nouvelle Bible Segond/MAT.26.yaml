  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''en aperçut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.15'
      - type: usfm
        marker: ord
        children:
        - type: text
