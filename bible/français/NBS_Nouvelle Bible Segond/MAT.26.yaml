document_id: MAT.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le complot contre Jésus
  - type: heading
    content: Mc 14.1-2  ; Lc 22.1-2  ; Jn 11.47-53
  - type: text
    content: ' '
  - type: note
    content: 7.28+.
  - type: text
    content: 'Lorsque Jésus eut achevé tous ces discours, il dit à ses disciples : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 's''en aperçut 12.15n. –  tracassez  : cf. Lc 11.7n.'
  - type: text
    content: 'Jésus s''en aperçut ; il leur dit : Pourquoi tracassez-vous cette femme ? Elle a accompli une belle œuvre à mon égard ; '
  '11':
  - type: note
    content: 'pauvres Dt 15.11. –  vous ne m''avez pas toujours  : autres traductions vous ne m''avez pas pour toujours ; vous ne m''aurez pas toujours 9.15+.'
  - type: text
    content: 'les pauvres, en effet, vous les avez toujours avec vous ; mais moi, vous ne m''avez pas toujours. '
  '12':
  - type: note
    content: Jn 19.40.
  - type: text
    content: 'En répandant ce parfum sur mon corps, elle l''a fait pour mon ensevelissement. '
  '13':
  - type: note
    content: Amen 5.18n. –  cette bonne nouvelle 4.23+ ; 24.14 ; 28.19 ; cf. 1S 2.30.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, partout où cette bonne nouvelle sera proclamée, dans le monde entier, on racontera aussi, en mémoire de cette femme, ce qu''elle a fait.'
  - type: heading
    content: Judas s'apprête à trahir Jésus
  - type: heading
    content: Mc 14.10-11  ; Lc 22.3-6
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jn 11.57. –  l'un des Douze v. 47. –  prêtres 2.4.
  - type: text
    content: 'Alors l''un des Douze, celui qu''on appelle Judas Iscariote, se rendit chez les grands prêtres '
  '15':
  - type: note
    content: Il s'agit probablement de trente sicles, la monnaie juive ; cf. 27.3,9 ; Ex 21.32 (cf. Lv 27.2ss) ; Za 11.12. Voir mesures, poids et monnaies.
  - type: text
    content: 'et dit : Que voulez-vous me donner pour que je vous le livre ? Ils le payèrent trente pièces d''argent. '
  '16':
  - type: text
    content: A partir de ce moment, il cherchait une occasion pour le livrer.
  - type: heading
    content: Jésus fait préparer la Pâque
  - type: heading
    content: Mc 14.12-17  ; Lc 22.7-14
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 12.14-20. –  Pâque  : voir calendrier et fêtes.'
  - type: text
    content: 'Le premier jour des Pains sans levain, les disciples vinrent dire à Jésus : Où veux-tu que nous te préparions le repas de la Pâque ? '
  '18':
  - type: note
    content: '21.2s. –  maître  : au sens d’enseignant. –  temps Jn 8.20 ; 12.23. –  je célébrerai  : litt. je fais.'
  - type: text
    content: 'Il répondit : Allez à la ville chez Untel, et dites-lui : Le maître dit : « Mon temps est proche, c''est chez toi que je célébrerai la Pâque avec mes disciples. » '
  '19':
  - type: text
    content: Les disciples firent ce que Jésus leur avait ordonné et ils préparèrent la Pâque.
  '2':
  - type: note
    content: '16.21+. –  Pâque  : voir calendrier et fêtes. –  Fils de l''homme 8.20n. –  est sur le point d''être livré  : litt. est livré.'
  - type: text
    content: Vous savez que la Pâque a lieu dans deux jours, et que le Fils de l'homme est sur le point d'être livré pour être crucifié.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 22.14n.
  - type: text
    content: Le soir venu, il était à table avec les Douze.
  - type: heading
    content: Jésus annonce qu'il va être trahi
  - type: heading
    content: Mc 14.18-21  ; Lc 22.21-23  ; Jn 13.21-30
  '21':
  - type: text
    content: ' '
  - type: note
    content: Jn 6.70s.
  - type: text
    content: 'Pendant qu''ils mangeaient, il dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, l''un de vous me livrera. '
  '22':
  - type: text
    content: 'Ils furent profondément attristés, et chacun se mit à lui dire : Est-ce moi, Seigneur ? '
  '23':
  - type: note
    content: Jn 13.18 ; Ps 41.10 ; 55.13-15.
  - type: text
    content: 'Il répondit : Celui qui a mis avec moi la main dans le plat, c''est lui qui me livrera. '
  '24':
  - type: note
    content: '–  Fils de l''homme 8.20n. –  écrit v. 31,56 ; Lc 18.31 ; 24.44 ; Ac 17.2s ; 1P 1.11 ; cf. Es 53.7 ; Za 13.7. –  quel malheur… 11.21n  ; 18.7/ / ; Jn 17.12. Cf. 1 Hénoch 38.2 : « Où sera le séjour de ceux qui ont renié le Seigneur des Esprits ? Mieux vaudrait pour eux ne pas être nés. » Le Pasteur d''Hermas, Vis. IV,2,6 : « Malheur à ceux qui ont entendu ces paroles sans les comprendre. Il vaudrait mieux pour eux ne pas être nés. »'
  - type: text
    content: 'Le Fils de l''homme s''en va, selon ce qui est écrit de lui. Mais quel malheur pour cet homme par qui le Fils de l''homme est livré ! Il aurait mieux valu pour cet homme ne pas être né. '
  '25':
  - type: note
    content: 'C''est toi…  : autre traduction tu l''as dit  ; cf. v. 64 ; 27.11.'
  - type: text
    content: 'Judas, qui le livrait, demanda : Est-ce moi, '
  - type: text
    content: Rabbi ?
  - type: text
    content: ' Il lui répondit : C''est toi qui l''as dit.'
  - type: heading
    content: La Cène
  - type: heading
    content: Mc 14.22-25  ; Lc 22.15-20  ; cf. 1Co 11.23-26
  '26':
  - type: text
    content: ' '
  - type: note
    content: '14.19n  ; Lc 24.30 ; Jn 6.53ss ; 1Co 10.16. –  c''est mon corps  : autres traductions ceci est mon corps ; mon corps, c''est ceci  ; mêmes possibilités v. 28.'
  - type: text
    content: 'Pendant qu''ils mangeaient, Jésus prit du pain ; après avoir prononcé la bénédiction, il le rompit et le donna aux disciples en disant : Prenez, mangez ; c''est mon corps. '
  '27':
  - type: note
    content: 'rendu grâce  : c''est du verbe grec correspondant que vient le mot eucharistie.'
  - type: text
    content: 'Il prit ensuite une coupe ; après avoir rendu grâce, il la leur donna en disant : Buvez-en tous : '
  '28':
  - type: note
    content: sang de l'alliance (certains mss ajoutent nouvelle, cf. Jr 31.31 ; Lc 22.20) Ex 24.8 ; Za 9.11 ; Hé 7.22+. –  d'une multitude ou de beaucoup 20.28 ; Es 53.12 ; Jr 31.34. –  péchés 1.21+.
  - type: text
    content: 'c''est mon sang, le sang de l''alliance, qui est répandu en faveur d''une multitude, pour le pardon des péchés. '
  '29':
  - type: note
    content: Cf. Lc 22.30 ; Ac 10.41.
  - type: text
    content: Je vous le dis, je ne boirai plus désormais de ce produit de la vigne jusqu'au jour où je le boirai avec vous, nouveau, dans le royaume de mon Père.
  - type: heading
    content: Jésus annonce que Pierre le reniera
  - type: heading
    content: Mc 14.26-31  ; Lc 22.31-34  ; Jn 13.37-38
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'grands prêtres (2.4n) / anciens 21.23+. –  le palais  : autre traduction la cour (cf. v. 58n,69), désignant l''espace intérieur entouré des appartements, caractéristique des demeures des grands en Orient (cf. Jn 18.15ss). –  Caïphe Lc 3.2 ; Jn 11.47-52+ ; Ac 4.6.'
  - type: text
    content: 'Alors les grands prêtres et les anciens du peuple se rassemblèrent dans le palais du grand prêtre appelé Caïphe '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'chanté  : probablement les psaumes du Hallel (Ps 113–118 et 136), que les Juifs chantent encore de nos jours après le repas pascal ; le mot Hallel vient du verbe hébreu qui signifie louer ou célébrer  ; on le retrouve dans le terme alléluia (Ps 104.35n). –  mont des Oliviers 21.1+ ; Lc 22.39.'
  - type: text
    content: Après avoir chanté, ils sortirent vers le mont des Oliviers.
  '31':
  - type: text
    content: ' '
  - type: note
    content: cause de chute v. 56 ; 11.6n. –  Za 13.7  ; cf. Mt 9.36 ; Jn 16.32.
  - type: text
    content: 'Alors Jésus leur dit : Je serai pour vous tous, cette nuit, une cause de chute ; car il est écrit :'
  - type: text
    content: Je frapperai le berger,
  - type: text
    content: et les moutons du troupeau seront dispersés
  - type: text
    content: .
  '32':
  - type: text
    content: ' '
  - type: note
    content: après mon réveil , c.-à-d. après ma résurrection  ; le même verbe est traduit par levez-vous v. 46 ; cf. 2.13n  ; 17.9n. –  Galilée 2.22n  ; 28.7,10/ /,16.
  - type: text
    content: 'Mais après mon réveil, je vous précéderai en Galilée. '
  '33':
  - type: text
    content: 'Pierre lui dit : Quand tu serais pour tous une cause de chute, tu ne le seras jamais pour moi. '
  '34':
  - type: note
    content: V. 69ss ; cf. 10.33+.
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je te le dis, cette nuit même, avant qu''un coq ait chanté, tu m''auras renié par trois fois. '
  '35':
  - type: note
    content: Cf. 1R 20.11 ; 1Co 10.12.
  - type: text
    content: 'Pierre lui dit : Même s''il me fallait mourir avec toi, je ne te renierais pas ! Et tous les disciples dirent la même chose.'
  - type: heading
    content: La prière de Jésus à Gethsémani
  - type: heading
    content: Mc 14.32-42  ; Lc 22.40-46
  '36':
  - type: text
    content: ' '
  - type: note
    content: Jn 18.1 ; le nom Gethsémani vient de deux mots hébreux qui signifient pressoir à huile.
  - type: text
    content: 'Là-dessus, Jésus arrive avec eux au lieu dit Gethsémani et il dit aux disciples : Asseyez-vous ici, pendant que je m''éloignerai pour prier. '
  '37':
  - type: note
    content: 17.1+ ; 20.20+.
  - type: text
    content: 'Il prit avec lui Pierre et les deux fils de Zébédée. Il commença alors à éprouver la tristesse et l''angoisse, '
  '38':
  - type: note
    content: 'Je suis triste  : autre traduction mon âme est triste  ; sur le mot qui peut être traduit par je comme par mon âme, voir 10.28n  ; cf. 12.18n  ; voir aussi Es 53.3s ; Ps 42.6s,12 ; 43.5 ; Jn 12.27 ; Hé 5.7s. –  à mourir  : cf. Jon 4.9.'
  - type: text
    content: 'et il leur dit : Je suis triste à mourir ; demeurez ici et veillez avec moi. '
  '39':
  - type: note
    content: coupe 20.22/ / ; Jn 18.11 ; cf. Es 51.17,22. –  comme toi, tu veux Jn 6.38+ ; Ph 2.8.
  - type: text
    content: 'Puis il s''avança un peu, tomba face contre terre et pria ainsi : Mon Père, si c''est possible, que cette coupe s''éloigne de moi ! Toutefois, non pas comme moi, je veux, mais comme toi, tu veux. '
  '4':
  - type: note
    content: Cf. v. 48 ; 21.46 ; Jn 11.53.
  - type: text
    content: 'et ils résolurent de faire arrêter Jésus par ruse et de le tuer. '
  '40':
  - type: note
    content: 25.5 ; cf. Ps 69.21.
  - type: text
    content: 'Il vient vers les disciples, qu''il trouve endormis ; il dit alors à Pierre : Vous n''avez donc pas été capables de veiller une heure avec moi ! '
  '41':
  - type: note
    content: 'Veillez / priez Ep 6.18 ; 1P 4.7 ; 5.8. –  l''épreuve 4.1n  ; 6.13 ; cf. Hé 2.18 ; 4.15. –  ardent  : autres traductions vif, bien disposé. – Voir esprit et chair.'
  - type: text
    content: 'Veillez et priez, afin de ne pas entrer dans l''épreuve ; l''esprit est ardent, mais la chair est faible. '
  '42':
  - type: note
    content: V. 39+ ; 6.10.
  - type: text
    content: 'Il s''éloigna une deuxième fois et pria ainsi : Mon Père, s''il n''est pas possible que cette coupe s''éloigne sans que je la boive, que ta volonté soit faite ! '
  '43':
  - type: note
    content: 'les yeux lourds  : le même terme est traduit par accablé Lc 9.32.'
  - type: text
    content: 'Il revint et les trouva encore endormis ; car ils avaient les yeux lourds. '
  '44':
  - type: note
    content: Cf. 2Co 12.8.
  - type: text
    content: 'Il les quitta, s''éloigna de nouveau et pria pour la troisième fois en répétant les mêmes paroles. '
  '45':
  - type: note
    content: 'Vous dormez…  : autres traductions possibles  : vous dormez et vous vous reposez encore ? continuez à dormir et à vous reposer ! –  heure Jn 17.1. –  s''est approchée  : autre traduction est là  ; même possibilité v. 46 ; même forme verbale 3.2n. –  Fils de l''homme 8.20n. –  livré / pécheurs 17.22+ ; Ac 2.23.'
  - type: text
    content: 'Puis il vient vers les disciples et leur dit : Vous dormez encore, vous vous reposez ! L''heure s''est approchée ; le Fils de l''homme est livré aux pécheurs. '
  '46':
  - type: note
    content: V. 21,32n  ; Jn 14.31.
  - type: text
    content: Levez-vous, allons ; celui qui me livre s'est approché.
  - type: heading
    content: L'arrestation de Jésus
  - type: heading
    content: Mc 14.43-50  ; Lc 22.47-53  ; Jn 18.2-11
  '47':
  - type: text
    content: ' '
  - type: note
    content: l'un des Douze v. 14. –  grands prêtres (2.4n) / anciens 21.23+. – Cf. Ac 1.16.
  - type: text
    content: 'Il parlait encore quand Judas, l''un des Douze, arriva, et avec lui une grande foule armée d''épées et de bâtons, envoyée par les grands prêtres et par les anciens du peuple. '
  '48':
  - type: note
    content: que j'embrasserai ou à qui je donnerai un baiser. Le verbe grec ainsi traduit signifie aussi aimer (d'amitié). Un composé du même verbe est traduit de la même façon au v. 49. – Cf. 2S 20.9.
  - type: text
    content: 'Celui qui le livrait leur avait donné ce signe : Celui que j''embrasserai, c''est lui ; arrêtez-le. '
  '49':
  - type: note
    content: 'Bonjour  : litt. réjouis-toi ! C''est la salutation habituelle en grec, normalement employée le matin mais aussi, dans l''usage courant, à n''importe quel moment ; de même en 27.29 ; 28.9 ; cf. Lc 1.28n. –  il l''embrassa v. 48n  ; Mc 14.45n.'
  - type: text
    content: 'Aussitôt il s''approcha de Jésus et lui dit : Bonjour, '
  - type: text
    content: Rabbi !
  - type: text
    content: ' Et il l''embrassa. '
  '5':
  - type: note
    content: Cf. 21.26,46 ; Lc 22.6.
  - type: text
    content: 'Toutefois ils disaient : Pas en pleine fête, afin qu''il n''y ait pas d''agitation parmi le peuple.'
  - type: heading
    content: L'onction à Béthanie
  - type: heading
    content: Mc 14.3-9  ; cf. Lc 7.36-50  ; Jn 12.1-8
  '50':
  - type: note
    content: 'Mon ami, comme en 20.13n  ; Jn 13.27. –  ce que tu es venu faire…  : autres traductions possibles  : pourquoi es-tu ici ? ou c''est pour cela que tu es ici !'
  - type: text
    content: 'Jésus lui dit : Mon ami, ce que tu es venu faire, fais-le. Alors ces gens s''avancèrent, mirent la main sur Jésus et l''arrêtèrent.'
  '51':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 22.36-38.
  - type: text
    content: 'Un de ceux qui étaient avec Jésus étendit la main, tira son épée, frappa l''esclave du grand prêtre et lui emporta l''oreille. '
  '52':
  - type: note
    content: Jn 18.36. –  disparaîtront ou périront, se perdront, cf. Gn 9.6 ; Ez 35.6 ; Ap 13.10.
  - type: text
    content: 'Alors Jésus lui dit : Remets ton épée à sa place ; car tous ceux qui prennent l''épée disparaîtront par l''épée. '
  '53':
  - type: note
    content: 4.6 ; 2R 6.17 ; Dn 7.10. Cf. Jn 10.18 ; voir aussi anges.
  - type: text
    content: 'Penses-tu que je ne puisse pas supplier mon Père, qui me fournirait à l''instant plus de douze légions d''anges ? '
  '54':
  - type: note
    content: V. 24+.
  - type: text
    content: Comment donc s'accompliraient les Ecritures, d'après lesquelles il doit en être ainsi ?
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'Lc 19.47 ; 21.37s ; Jn 18.20. –  A ce moment  : litt. en cette heure-là  ; cf. Mc 14.35. –  sortis  : cf. v. 30. –  comme si j''étais…  : litt. comme pour un bandit  ; cf. 27.38. –  temple 21.23.'
  - type: text
    content: 'A ce moment, Jésus dit aux foules : Vous êtes sortis pour vous emparer de moi avec des épées et des bâtons, comme si j''étais un bandit. Tous les jours j''étais assis dans le temple pour enseigner, et vous n''êtes pas venus m''arrêter. '
  '56':
  - type: note
    content: V. 24+ ; cf. Ps 88.9,19 ; voir aussi prophètes.
  - type: text
    content: Mais tout cela est arrivé pour que soient accomplies les Ecritures des prophètes.
  - type: text
    content: Alors tous les disciples l'abandonnèrent et prirent la fuite.
  - type: heading
    content: Jésus comparaît devant le sanhédrin
  - type: heading
    content: Mc 14.53-65  ; Lc 22.54-55,63-71  ; Jn 18.12-24
  '57':
  - type: text
    content: ' '
  - type: note
    content: V. 3 ; grand prêtre / scribes / anciens 2.4n.
  - type: text
    content: 'Ceux qui avaient arrêté Jésus l''emmenèrent chez le grand prêtre Caïphe ; là, les scribes et les anciens se rassemblèrent. '
  '58':
  - type: note
    content: 'palais et cour traduisent un seul mot grec ; cf. v. 3n,69ss. –  pour voir comment cela finirait  : litt. pour voir la fin.'
  - type: text
    content: Pierre le suivait de loin, jusqu'au palais du grand prêtre ; il entra dans la cour et s'assit avec les gardes, pour voir comment cela finirait.
  '59':
  - type: text
    content: ' '
  - type: note
    content: Ps 27.12 ; cf. 1R 21.10 ; Ac 6.11.
  - type: text
    content: 'Les grands prêtres et tout le sanhédrin cherchaient un faux témoignage contre Jésus, pour le faire mettre à mort. '
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 7.36-50. –  Béthanie 21.17n.
  - type: text
    content: 'Comme Jésus était à Béthanie, chez Simon le lépreux, '
  '60':
  - type: note
    content: 'deux  : cf. 8.28+ ; Dt 19.15 ; Jn 8.17.'
  - type: text
    content: 'Mais ils n''en trouvèrent pas, quoique beaucoup de faux témoins se soient présentés. Enfin il en vint deux '
  '61':
  - type: note
    content: 'sanctuaire  : le mot désigne habituellement le bâtiment comprenant les pièces dites « Sacré » et « Très-Sacré » (27.40). Cf. Jn 2.19-21 ; Ac 6.14.'
  - type: text
    content: 'qui dirent : Il a dit : « Je peux détruire le sanctuaire de Dieu et reconstruire en trois jours. » '
  '62':
  - type: note
    content: 'On pourrait aussi traduire  : Tu ne réponds rien aux témoignages que ces gens portent contre toi ?'
  - type: text
    content: 'Le grand prêtre se leva et lui dit : Tu ne réponds rien ? Que dis-tu des témoignages que ces gens portent contre toi ? '
  '63':
  - type: note
    content: silence 27.12-14/ / ; Es 53.7 ; Lm 3.28-30. –  Christ 1.16n  ; 16.16+ ; Jn 10.24. –  Fils de Dieu 14.33n.
  - type: text
    content: 'Jésus gardait le silence. Le grand prêtre lui dit : Je t''adjure par le Dieu vivant de nous dire si c''est toi qui es le Christ, le Fils de Dieu. '
  '64':
  - type: note
    content: 'C''est toi qui l''as dit  : cf. v. 25n  ; 27.11. –  le Fils de l''homme… 24.30+ ; Dn 7.13. –  de la Puissance  : c.-à-d. de Dieu, dont on évite de prononcer le nom ; 22.44+ ; Ps 110.1.'
  - type: text
    content: 'Jésus lui répondit : C''est toi qui l''as dit. Mais, je vous le dis, désormais vous verrez '
  - type: text
    content: le Fils de l'homme
  - type: text
    content: ' assis à la droite de la Puissance et '
  - type: text
    content: venant sur les nuées du ciel
  - type: text
    content: '. '
  '65':
  - type: note
    content: 'déchira ses vêtements  : signe de deuil ; cf. Lv 10.6 ; 21.10. –  blasphémé 9.3+.'
  - type: text
    content: 'Alors le grand prêtre déchira ses vêtements en disant : Il a blasphémé. Qu''avons-nous encore besoin de témoins ? Vous venez d''entendre son blasphème. Qu''en pensez-vous ? '
  '66':
  - type: note
    content: Lv 24.16 ; Jn 19.7.
  - type: text
    content: 'Ils répondirent : Il est passible de mort.'
  '67':
  - type: text
    content: ' '
  - type: note
    content: 27.30/ / ; Es 50.6 ; Mi 4.14 ; 1P 2.23.
  - type: text
    content: 'Là-dessus, ils lui crachèrent au visage et lui donnèrent des coups de poing ; d''autres le giflèrent, en disant : '
  '68':
  - type: note
    content: 'Fais le prophète… ou parle-nous en prophète  : cf. 7.22n.'
  - type: text
    content: Fais le prophète pour nous, Christ ! Dis-nous qui t'a frappé !
  - type: heading
    content: Pierre renie Jésus
  - type: heading
    content: Mc 14.66-72  ; Lc 22.56-62  ; Jn 18.17,25-27
  '69':
  - type: text
    content: ' '
  - type: note
    content: V. 58 ; Ac 4.13. –  Galiléen 21.11 ; Jn 7.52.
  - type: text
    content: 'Pierre, lui, était assis dehors, dans la cour. Une servante s''approcha de lui et dit : Toi aussi, tu étais avec Jésus le Galiléen. '
  '7':
  - type: text
    content: 'une femme s''approcha de lui. Elle tenait un flacon d''albâtre plein d''un parfum de grand prix et, pendant qu''il était à table, elle répandit le parfum sur sa tête. '
  '70':
  - type: note
    content: V. 33 ; 10.33n.
  - type: text
    content: 'Mais il le nia devant tous, en disant : Je ne sais pas ce que tu veux dire. '
  '71':
  - type: note
    content: le Nazoréen 2.23n.
  - type: text
    content: 'Comme il se dirigeait vers le porche, une autre le vit et dit à ceux qui se trouvaient là : Il était avec Jésus le Nazoréen. '
  '72':
  - type: text
    content: 'Il le nia encore en jurant : Je ne connais pas cet homme ! '
  '73':
  - type: note
    content: 'ta façon de parler ou ton accent (galiléen)  ; cf. Jg 12.6 ; le même terme est traduit par langage en Jn 8.43. –  le montre bien  : litt. te rend évident, c.-à-d. te trahit, te démasque.'
  - type: text
    content: 'Peu après, ceux qui étaient là s''approchèrent et dirent à Pierre : Vraiment, toi aussi tu es de ces gens-là, ta façon de parler le montre bien. '
  '74':
  - type: note
    content: 'sous peine de malédiction  : cf. Mc 14.71n  ; un terme apparenté est traduit par malédiction en Ap 22.3 ; voir aussi bénédiction.'
  - type: text
    content: 'Alors il se mit à jurer, sous peine de malédiction : Je ne connais pas cet homme ! Aussitôt un coq chanta.'
  '75':
  - type: text
    content: ' '
  - type: note
    content: V. 34/ / ; cf. Es 22.4.
  - type: text
    content: 'Pierre se souvint de la parole que Jésus avait dite : Avant qu''un coq ait chanté, tu m''auras renié par trois fois. Il sortit, et dehors il pleura amèrement.'
  '8':
  - type: text
    content: 'En voyant cela, les disciples s''indignèrent : A quoi bon ce gaspillage ? '
  '9':
  - type: note
    content: '1Co 13.3. –  cela  : certains mss portent ce parfum. –  en donner le prix  : litt. donner.'
  - type: text
    content: On aurait pu vendre cela très cher et en donner le prix aux pauvres.
