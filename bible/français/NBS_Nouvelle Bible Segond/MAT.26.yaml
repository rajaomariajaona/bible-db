      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes.'
    marker-yv: yv-n
  - type: text
    text: 'Le premier jour des Pains sans levain, les disciples vinrent dire à Jésus : Où veux-tu que nous te préparions le repas de la Pâque ? '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au sens d’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: enseignant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'temps '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jn 8.20 ; 12.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je célébrerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je fais.
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : Allez à la ville chez Untel, et dites-lui : Le maître dit : « Mon temps est proche, c''est chez toi que je célébrerai la Pâque avec mes disciples. » '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: Les disciples firent ce que Jésus leur avait ordonné et ils préparèrent la Pâque.
