    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 48 ; 21.46 ; Jn 11.53.
    marker-yv: yv-n
  - type: text
    text: 'et ils résolurent de faire arrêter Jésus par ruse et de le tuer. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 21.26,46 ; Lc 22.6.
    marker-yv: yv-n
  - type: text
    text: 'Toutefois ils disaient : Pas en pleine fête, afin qu''il n''y ait pas d''agitation parmi le peuple.'
- type: usfm
  marker: s1
