document_id: EZR.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les compagnons d'Esdras
  - type: text
    content: ' '
  - type: note
    content: Artaxerxès 7.1n.
  - type: text
    content: Voici les chefs de famille qui furent enregistrés et qui montèrent avec moi de Babylone sous le règne du roi Artaxerxès.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Autre texte, d''après plusieurs mss et 3 Esdras 8.36  : des fils de Bani, Shelomith, fils de Yosiphia… (cf. 2.10 ; Né 7.15).'
  - type: text
    content: des fils de Shelomith, le fils de Yosiphia, et avec lui 160 hommes ;
  '11':
  - type: text
    content: des fils de Bébaï, Zacharie, fils de Bébaï, et avec lui 28 hommes ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: '110  : quelques mss et Syr ont lu 120.'
  - type: text
    content: des fils d'Azgad, Yohanân, fils de Qatân, et avec lui 110 hommes ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les derniers  : sens incertain ; ou bien les cadets, ou bien les derniers restés à Babylone.'
  - type: text
    content: 'des fils d''Adoniqam, les derniers, dont voici les noms : Eliphéleth, Yéiel et Shemaya, et avec eux 60 hommes ;'
  '14':
  - type: text
    content: ' '
  - type: note
    content: avec eux , d'après de nombreux mss hébreux, certains mss de LXX, Syr et Vg  ; le texte hébreu traditionnel porte avec lui ; Zabboud (ou Zakkour , selon une autre tradition) est absent d'un grand ms de LXX ; certains, d'après 3 Esdras 8.40, modifient le texte hébreu traditionnel pour lire Outhaï, fils de Zabboud.
  - type: text
    content: des fils de Bigvaï, Outaï et Zabboud, et avec eux 70 hommes.
  - type: heading
    content: Préparation du voyage vers Jérusalem
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Ahava  : nom d''une localité et du fleuve (peut-être un des canaux de dérivation de l''Euphrate) qui y passait (v. 21,31). –  Je passai en revue  : autre traduction je considérai . –  aucun des fils de Lévi  : cf. 2.40n.'
  - type: text
    content: 'Je les rassemblai près du fleuve qui coule vers Ahava, et nous y campâmes trois jours. Je passai en revue le peuple et les prêtres, et je ne trouvai là aucun des fils de Lévi. '
  '16':
  - type: note
    content: 'Certains pensent que plusieurs de ces noms pourraient être dus à des erreurs de copie. –  instructeurs  : cf. Né 8.7,9.'
  - type: text
    content: 'Alors je fis appeler les chefs Eliézer, Ariel, Shemaya, Elnathan, Yarib, Elnathan, Nathan, Zacharie et Meshoullam, et les instructeurs Yoyarib et Elnathan. '
  '17':
  - type: note
    content: 'Kasiphia  : localisation incertaine, sans doute près de Babylone ; ce nom rappelle le mot souvent traduit par argent, et LXX l''interprète dans ce sens. –  je mis dans leur bouche  : cf. 2S 14.3,19. –  à Iddo et à ses frères, d''après des versions anciennes ; hébreu à Iddo, son frère. –  Netinim 2.43n.'
  - type: text
    content: 'Je leur donnai des ordres au sujet du chef Iddo, qui était à Kasiphia, et je mis dans leur bouche ce qu''ils devaient dire à Iddo et à ses frères les Netinim qui étaient à Kasiphia, afin de nous amener des officiants pour la maison de notre Dieu. '
  '18':
  - type: note
    content: 'la bonne main… 7.6+,9. –  Mahli, fils de Lévi  : cf. Ex 6.19 ; Nb 3.20 ; 1Ch 6.1,4,14.'
  - type: text
    content: 'Et, comme la bonne main de notre Dieu était sur nous, ils nous amenèrent un homme de bon sens d''entre les fils de Mahli, fils de Lévi, fils d''Israël : Shérébia, et avec lui ses fils et ses frères, au nombre de 18 ; '
  '19':
  - type: text
    content: 'Hashabia, et avec lui Esaïe, d''entre les fils de Merari, ses frères et leurs fils au nombre de 20 ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'La liste des 12 familles ( ?) des v. 1-14 varie sensiblement dans LXX  ; la présente traduction suit le texte hébreu traditionnel, où la somme des chiffres (en comptant Esdras et les trois chefs de famille de ce v.) est de 1 500 (cf. 2.3ss,64s ; 10.25ss ; Né 7.8ss ; 10.15ss). –  Phinéas (7.5) / Itamar  : cf. Ex 6.23,25 ; Nb 3.2ss ; 25.7 ; 1Ch 24.4 ; voir aussi 1R 2.26s (Abiathar est de la lignée d''Itamar). –  Daniel  : 3 Esdras 8.29 : « Gamaliel. » –  Hattoush , peut-être à rattacher au v. 3n.'
  - type: text
    content: Des fils de Phinéas, Guershom ;
  - type: text
    content: des fils d'Itamar, Daniel ;
  - type: text
    content: des fils de David, Hattoush ;
  '20':
  - type: note
    content: désignés par leur nom 1Ch 12.32 ; 16.41 ; 2Ch 28.15 ; 31.19.
  - type: text
    content: 'et d''entre les Netinim, que David et les chefs avaient mis au service des lévites, 220 Netinim, tous désignés par leur nom. '
  '21':
  - type: note
    content: 'de l''Ahava  : litt. du fleuve de l''Ahava, de même au v. 31 ; cf. v. 15n. –  proclamai un jeûne 1R 21.9 ; Jr 36.9 ; Jon 3.5 ; 2Ch 20.3. –  d''humiliation ou d''affliction, cf. 9.5n  ; voir aussi Lv 16.29nss ; 23.27,32 ; Es 58.3,5. –  toutes nos familles Gn 34.29n. –  de voyager sans encombre  : litt. un chemin droit.'
  - type: text
    content: 'Là, près de l''Ahava, je proclamai un jeûne d''humiliation devant notre Dieu, afin de lui demander qu''il nous accorde, à nous, à toutes nos familles et à tous nos biens, de voyager sans encombre. '
  '22':
  - type: note
    content: 'escorte  : cf. Né 2.9 ; Ac 23.23ss ; 3 Esdras 5.2 (lors d''un retour antérieur) : « Darius envoya avec eux mille cavaliers, jusqu''à ce qu''ils les aient ramenés à Jérusalem. » –  des chars  : litt. des attelages ou des équipages (de chars). Autre traduction des cavaliers. –  La main… 7.6+. –  qui le cherchent  : cf. v. 23+. –  sa force et sa colère  : autre traduction la force de sa colère  ; cf. Né 13.18 ; 2Ch 28.13 ; voir aussi Na 1.6 ; Ps 6.2 ; 21.10 ; 90.11 ; Lc 21.3 ; Rm 1.18 ; Ep 5.6.'
  - type: text
    content: 'J''aurais eu honte de demander au roi une escorte et des chars pour nous protéger de l''ennemi sur la route, car nous avions dit au roi : « La main de notre Dieu est, pour leur bien, sur tous ceux qui le cherchent, mais sa force et sa colère sont sur tous ceux qui l''abandonnent. » '
  '23':
  - type: note
    content: 'à cause de cela… jeûné  : cf. Es 58.3s ; Jr 14.12 ; Est 4.3,16 ; Dn 9.3 ; Né 9.1 ; Ac 13.2s. –  cherché  : cf. v. 22 ; voir aussi 4.2n (synonyme). –  s''est laissé fléchir  : cf. Gn 25.21n  ; Es 19.22 ; 1Ch 5.20 ; 2Ch 33.13,19.'
  - type: text
    content: 'C''est à cause de cela que nous avons jeûné et cherché notre Dieu, et il s''est laissé fléchir. '
  '24':
  - type: note
    content: 'mis à part  : le même verbe est traduit par séparer en 6.21 ; 9.1 ; 10.8,11 ; de même en 10.16. –  douze  : cf. 1Ch 25.9-21. –  Shérébia… v. 18s. – Sur le rôle des prêtres et des lévites pour le transport, cf. Né 3.8,31 ; 4.7ss ; 1Ch 26.20.'
  - type: text
    content: 'Je mis à part douze d''entre les chefs des prêtres, Shérébia, Hashabia et dix de leurs frères. '
  '25':
  - type: note
    content: 'prélèvement  : cf. Ex 25.2n  ; Né 10.38+. –  par le roi…  : cf. 7.15ss ; 1Ch 26.26.'
  - type: text
    content: 'Je pesai pour eux l''argent, l''or et les objets donnés en prélèvement pour la maison de notre Dieu par le roi, ses conseillers et ses chefs, et par tous les gens d''Israël qui se trouvaient là. '
  '26':
  - type: note
    content: '650 talents  : en poids, plus de 22 tonnes ; 100 talents  : environ 3,4 tonnes ; les correspondances monétaires sont plus difficiles à établir (voir mesures, poids et monnaies). –  des objets d''argent…  : traduction conjecturale, d''après LXX ; l''hébreu pourrait aussi signifier 100 objets d''argent pour ( ?) talents  ; certains modifient la vocalisation traditionnelle pour lire … pour deux talents.'
  - type: text
    content: 'Je posai dans leurs mains 650 talents d''argent, des objets d''argent pour 100 talents, et 100 talents d''or, '
  '27':
  - type: note
    content: 'dariques  : monnaie d''or nommée d''après le nom de Darius. –  beau bronze  : l''identification de ce métal est incertaine.'
  - type: text
    content: '20 coupes d''or valant 1 000 dariques et 2 vases d''un beau bronze, aussi précieux que l''or. '
  '28':
  - type: note
    content: consacrés au Seigneur ou saints pour le Seigneur, cf. 9.2 ; Lv 21.8.
  - type: text
    content: 'Puis je leur dis : Vous êtes consacrés au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ces objets sont sacrés, cet argent et cet or sont une offrande volontaire au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères. '
  '29':
  - type: note
    content: dans les salles 1R 6.5ss ; Ez 41.11ss ; 42.1ss ; Né 13.4ss ; 1Ch 9.26 ; 23.28 ; 28.12 ; 2Ch 31.11s.
  - type: text
    content: 'Soyez vigilants et prenez cela sous votre garde, jusqu''à ce que vous le pesiez devant les chefs des prêtres et les lévites, et devant les chefs des familles d''Israël, à Jérusalem, dans les salles de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'des fils de Shekania  : il semble manquer un nom ; cf. 1Ch 3.21s ; 3 Esdras 8.29 : « Hattoush, fils de Shekania. » –  hommes  : litt. mâles , de même dans la suite.'
  - type: text
    content: des fils de Shekania,
  - type: text
    content: des fils de Paréosh, Zacharie, et avec lui 150 hommes enregistrés ;
  '30':
  - type: note
    content: 'pour les porter  : cf. Nb 3.8,31 ; 4.7-15.'
  - type: text
    content: Les prêtres et les lévites reçurent l'argent, l'or et les objets qui avaient été pesés, pour les porter à Jérusalem, dans la maison de notre Dieu.
  - type: heading
    content: Le voyage et l'arrivée à Jérusalem
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.9n. –  Ahava v. 21n. –  nous préserva  : autre traduction nous délivra ou nous sauva.'
  - type: text
    content: 'Nous partîmes de l''Ahava pour nous rendre à Jérusalem, le douzième jour du premier mois. La main de notre Dieu fut sur nous et nous préserva des attaques de l''ennemi et des embuscades pendant la route. '
  '32':
  - type: note
    content: 'trois jours  : certains supposent que la caravane est arrivée à Jérusalem un vendredi, la veille du sabbat ; cf. Né 2.11.'
  - type: text
    content: 'Arrivés à Jérusalem, nous nous y sommes reposés trois jours. '
  '33':
  - type: note
    content: 'Merémoth  : cf. 2.61s ; Né 3.4,21.'
  - type: text
    content: 'Le quatrième jour, on fit peser l''argent, l''or et les objets dans la maison de notre Dieu, par Merémoth, fils d''Urie, le prêtre ; il y avait avec lui Eléazar, fils de Phinéas, et avec eux les lévites Yozabad, fils de Josué, et Noadia, fils de Binnouï. '
  '34':
  - type: text
    content: 'Le tout ayant été compté et pesé, on mit alors par écrit le poids total. '
  '35':
  - type: note
    content: 'Cf. 1Ch 29.21. –  exilés 4.1n. –  holocaustes Lv 1.3n. –  pour tout Israël 1Ch 29.24. –  soixante-dix-sept agneaux  : 3 Esdras et LXX en ont 72. –  douze boucs… pour le péché 6.17+.'
  - type: text
    content: 'Les exilés qui étaient revenus de la captivité présentèrent des holocaustes au Dieu d''Israël : douze taureaux pour tout Israël, quatre-vingt-seize béliers, soixante-dix-sept agneaux, douze boucs en sacrifice pour le péché – le tout en holocauste pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '36':
  - type: note
    content: 'satrapes  : nom perse des hauts fonctionnaires chargés du gouvernement des grandes régions administratives ou satrapies ; selon la terminologie officielle, il ne pouvait y avoir qu''un seul satrape pour toute la région de Transeuphratène (voir 4.10n). Toutefois, le terme est sans doute utilisé ici dans un sens plus large, comme équivalent de gouverneurs (autre mot qu''en 2.63n  ; équivalent araméen en 5.3n  ; on le trouve également en 1R 10.15n  ; Ag 1.1,14 ; Né 2.7,9 ; 5.14,18). Satrapes et gouverneurs sont aussi associés en Est 3.12 ; 8.9 ; Dn 3.2s,27 ; 6.8.'
  - type: text
    content: Ils transmirent les ordonnances du roi aux satrapes du roi et aux gouverneurs de Transeuphratène, qui aidèrent le peuple et la maison de Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.6n. –  Eliehoénaï  : cf. 10.22,27 ; Né 12.41 ; 1Ch 3.23s ; 4.36 ; 7.8 ; 26.3.'
  - type: text
    content: des fils de Pahath-Moab, Eliehoénaï, fils de Zerahia, et avec lui 200 hommes ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'D''après 3 Esdras 8.32 certains lisent  : des fils de Zattou, Shekania, fils de Mahaziel (cf. 2.8 ; Né 7.13).'
  - type: text
    content: des fils de Shekania, le fils de Mahaziel, et avec lui 300 hommes ;
  '6':
  - type: text
    content: des fils d'Adîn, Ebed, fils de Jonathan, et avec lui 50 hommes ;
  '7':
  - type: text
    content: des fils d'Elam, Esaïe, fils d'Athalia, et avec lui 70 hommes ;
  '8':
  - type: text
    content: des fils de Shephatia, Zebadia, fils de Michel, et avec lui 80 hommes ;
  '9':
  - type: text
    content: des fils de Joab, Abdias, fils de Yehiel, et avec lui 218 hommes ;
