document_id: EZR.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les compagnons d'Esdras
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Artaxerxès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Voici les chefs de famille qui furent enregistrés et qui montèrent avec moi de Babylone sous le règne du roi Artaxerxès.
  '10':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre texte, d''après plusieurs mss et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.36'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des fils de Bani, Shelomith, fils de Yosiphia… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 2.10 ; Né 7.15).
      marker-yv: yv-n
    - type: text
      text: des fils de Shelomith, le fils de Yosiphia, et avec lui 160 hommes ;
  '11':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: des fils de Bébaï, Zacharie, fils de Bébaï, et avec lui 28 hommes ;
  '12':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '110'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : quelques mss et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' ont lu 120.'
      marker-yv: yv-n
    - type: text
      text: des fils d'Azgad, Yohanân, fils de Qatân, et avec lui 110 hommes ;
  '13':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les derniers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sens incertain ; ou bien les cadets, ou bien les derniers restés à Babylone.'
      marker-yv: yv-n
    - type: text
      text: 'des fils d''Adoniqam, les derniers, dont voici les noms : Eliphéleth, Yéiel et Shemaya, et avec eux 60 hommes ;'
  '14':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après de nombreux mss hébreux, certains mss de LXX, Syr et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: '  ; le texte hébreu traditionnel porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec lui ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zabboud '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Zakkour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon une autre tradition) est absent d''un grand ms de LXX ; certains, d''après '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.40, modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Outhaï, fils de Zabboud.
      marker-yv: yv-n
    - type: text
      text: des fils de Bigvaï, Outaï et Zabboud, et avec eux 70 hommes.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Préparation du voyage vers Jérusalem
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ahava
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : nom d''une localité et du fleuve (peut-être un des canaux de dérivation de l''Euphrate) qui y passait (v. 21,31). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je passai en revue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je considérai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aucun des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de Lévi'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je les rassemblai près du fleuve qui coule vers Ahava, et nous y campâmes trois jours. Je passai en revue le peuple et les prêtres, et je ne trouvai là aucun des fils de Lévi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains pensent que plusieurs de ces noms pourraient être dus à des erreurs de copie. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: instructeurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 8.7,9.'
      marker-yv: yv-n
    - type: text
      text: 'Alors je fis appeler les chefs Eliézer, Ariel, Shemaya, Elnathan, Yarib, Elnathan, Nathan, Zacharie et Meshoullam, et les instructeurs Yoyarib et Elnathan. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kasiphia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localisation incertaine, sans doute près de Babylone ; ce nom rappelle le mot souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' l''interprète dans ce sens. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je mis dans leur bouche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 14.3,19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Iddo et à ses frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après des versions anciennes ; hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à Iddo, son frère. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Netinim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je leur donnai des ordres au sujet du chef Iddo, qui était à Kasiphia, et je mis dans leur bouche ce qu''ils devaient dire à Iddo et à ses frères les Netinim qui étaient à Kasiphia, afin de nous amener des officiants pour la maison de notre Dieu. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la bonne main… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.6+,9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mahli, fils de Lévi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 6.19 ; Nb 3.20 ; 1Ch 6.1,4,14.'
      marker-yv: yv-n
    - type: text
      text: 'Et, comme la bonne main de notre Dieu était sur nous, ils nous amenèrent un homme de bon sens d''entre les fils de Mahli, fils de Lévi, fils d''Israël : Shérébia, et avec lui ses fils et ses frères, au nombre de 18 ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hashabia, et avec lui Esaïe, d''entre les fils de Merari, ses frères et leurs fils au nombre de 20 ; '
  '2':
  - type: usfm
    marker: li1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La liste des 12 familles ( ?) des v. 1-14 varie sensiblement dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '  ; la présente traduction suit le texte hébreu traditionnel, où la somme des chiffres (en comptant '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esdras
        - type: text
          text: ' et les trois chefs de famille de ce v.) est de 1 500 (cf. 2.3ss,64s ; 10.25ss ; Né 7.8ss ; 10.15ss). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Phinéas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(7.5) / '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Itamar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 6.23,25 ; Nb 3.2ss ; 25.7 ; 1Ch 24.4 ; voir aussi 1R 2.26s (Abiathar est de la lignée d''Itamar). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Daniel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.29 : « Gamaliel. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hattoush
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', peut-être à rattacher au v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Des fils de Phinéas, Guershom ;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: des fils d'Itamar, Daniel ;
  - type: usfm
    marker: li1
    children:
    - type: text
      text: des fils de David, Hattoush ;
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'désignés par leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Ch 12.32 ; 16.41 ; 2Ch 28.15 ; 31.19.
      marker-yv: yv-n
    - type: text
      text: 'et d''entre les Netinim, que David et les chefs avaient mis au service des lévites, 220 Netinim, tous désignés par leur nom. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'Ahava
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du fleuve de l'Ahava
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 31 ; cf. v. 15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'proclamai un jeûne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1R 21.9 ; Jr 36.9 ; Jon 3.5 ; 2Ch 20.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''humiliation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'affliction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 9.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Lv 16.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss ; 23.27,32 ; Es 58.3,5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toutes nos familles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 34.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de voyager sans encombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un chemin droit.
      marker-yv: yv-n
    - type: text
      text: 'Là, près de l''Ahava, je proclamai un jeûne d''humiliation devant notre Dieu, afin de lui demander qu''il nous accorde, à nous, à toutes nos familles et à tous nos biens, de voyager sans encombre. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: escorte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 2.9 ; Ac 23.23ss ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esdras
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.2 (lors d''un retour antérieur) : « Darius envoya avec eux mille cavaliers, jusqu''à ce qu''ils les aient ramenés à Jérusalem. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des chars
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des attelages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des équipages (de chars)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des cavaliers. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La main… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui le cherchent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa force et sa colère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la force de sa colère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Né 13.18 ; 2Ch 28.13 ; voir aussi Na 1.6 ; Ps 6.2 ; 21.10 ; 90.11 ; Lc 21.3 ; Rm 1.18 ; Ep 5.6.'
      marker-yv: yv-n
    - type: text
      text: 'J''aurais eu honte de demander au roi une escorte et des chars pour nous protéger de l''ennemi sur la route, car nous avions dit au roi : « La main de notre Dieu est, pour leur bien, sur tous ceux qui le cherchent, mais sa force et sa colère sont sur tous ceux qui l''abandonnent. » '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à cause de cela… jeûné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 58.3s ; Jr 14.12 ; Est 4.3,16 ; Dn 9.3 ; Né 9.1 ; Ac 13.2s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cherché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 22 ; voir aussi 4.2'
        - type: usfm
          marker: ord
          children:
