    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.22 ; 17.22.'
    marker-yv: yv-n
  - type: text
    text: 'Alors David dit à ses hommes : Que chacun de vous mette son épée à la ceinture ! Ils mirent chacun son épée à la ceinture. David aussi mit son épée à la ceinture, et environ quatre cents hommes partirent à l''attaque derrière lui. Il en resta deux cents près du matériel.'
