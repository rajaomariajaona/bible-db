      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'désert de Parân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se situe à la limite du pays de Juda et de la péninsule du Sinaï, cf. Nb 10.12 ; 13.26. Ce déplacement de David dans l''extrême sud du pays a déjà surpris les lecteurs d''autrefois, ce qui peut expliquer que certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' parlent du désert de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Maôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 2 et en 23.24s.'
    marker-yv: yv-n
  - type: text
    text: Samuel mourut. Tout Israël se rassembla pour se lamenter sur lui, et on l'ensevelit chez lui, à Rama. C'est alors que David descendit au désert de Parân.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 23.24s) / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Carmel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 15.12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). Il s''agit sans doute d''un riche propriétaire terrien, domicilié à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Maôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui avait une partie de son exploitation au village voisin, à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Carmel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un homme très important
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un homme très grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tonte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'des '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: moutons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au printemps, était l''occasion de réjouissances ; cf. Gn 38.12s ; 2S 13.23s.'
    marker-yv: yv-n
  - type: text
    text: 'Il y avait à Maôn un homme qui avait ses activités à Carmel. C''était un homme très important, il avait trois mille moutons et mille chèvres. Or il se trouvait à Carmel pour la tonte de ses moutons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nabal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: femme de bon sens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Pr 14.1 ; 19.14 ; 31.10-31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'agissements '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jr 4.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il descendait de Caleb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon une tradition de lecture du texte hébreu, l''expression peut signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il était comme son cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', allusion probable au v. 37 ; selon une autre tradition, elle signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il était Calébite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. membre du clan de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Caleb '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Nb 13.6). Le texte hébreu insiste peut-être sur cette origine parce que le mot hébreu (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: kéleb
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') signifie aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (animal méprisé dans l'ancien Israël).
    marker-yv: yv-n
  - type: text
    text: 'Le nom de cet homme était Nabal, et le nom de sa femme était Abigaïl ; c''était une femme de bon sens et fort belle, mais l''homme était dur et mauvais dans ses agissements. Il descendait de Caleb. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'David apprit, au désert, que Nabal tondait ses moutons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dix de ses gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dix jeunes gens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dix serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', parmi les nombreuses personnes qui se sont réfugiées auprès de David (cf. v. 13 ; 22.2). – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comment il va
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour la paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 10.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il lui envoya dix de ses gens, auxquels il dit : Montez à Carmel. Vous irez chez Nabal et, en mon nom, vous lui demanderez comment il va. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pour la vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le vivant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', expression hébraïque dont le sens est très incertain ; on a proposé la signification '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (qu'il en soit ainsi) pour la prochaine année
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ou, en modifiant le texte hébreu traditionnel d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (vous parlerez ainsi) à mon frère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que tout aille bien pour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: paix à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour ta maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 10.5.'
    marker-yv: yv-n
  - type: text
    text: 'Vous lui direz : Pour la vie, que tout aille bien pour toi, pour ta maison et pour tout ce qui t''appartient ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'inquiétés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: molestés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'insulter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 20.34 ; pour un emploi analogue, voir Rt 2.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rien ne leur a été enlevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il n''y a pas eu d''intervention contre eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ni de la part de David, ni de la part de Bédouins dont David les a protégés). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout le temps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous les jours.
    marker-yv: yv-n
  - type: text
    text: 'A présent, j''ai appris que tu as les tondeurs. Or tes bergers ont été avec nous ; nous ne les avons pas inquiétés, et rien ne leur a été enlevé pendant tout le temps qu''ils ont été à Carmel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trouvent donc '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: ' à tes yeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soient accueillis avec bienveillance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 16.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un jour de fête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un jour bon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 2 ; Est 8.17 ; 9.19 ; Né 8.10-12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Donne-nous donc, je te prie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 8.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David, ton fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''emploi métaphorique du mot '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'peut exprimer les idées de soumission et de proximité ; ici c''est une formule de politesse. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce que tu as sous la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce que trouvera ta main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ec 11.2 ; Lc 6.38 ; 16.9.'
    marker-yv: yv-n
  - type: text
    text: Demande-le à tes gens, ils te le diront. Que mes gens trouvent donc grâce à tes yeux, puisque nous venons un jour de fête ! Donne-nous donc, je te prie, pour nous qui sommes tes serviteurs et pour David, ton fils, ce que tu as sous la main.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils se turent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe hébreu correspondant exprime habituellement l''idée d''interruption d''un processus, d''où la traduction présente (= '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils cessèrent de parler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), qui reflète celle de Vg ; on peut aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils se reposèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils attendirent (la réponse de Nabal).
    marker-yv: yv-n
  - type: text
    text: 'Lorsque les gens de David furent arrivés, ils parlèrent exactement ainsi à Nabal, au nom de David. Puis ils se turent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'serviteurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'esclaves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent le même mot hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qui est David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 5.2 ; Jg 9.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le fils de Jessé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: esclaves qui s'enfuient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 2.39s ; Phm 10-19.'
    marker-yv: yv-n
  - type: text
    text: 'Nabal répondit aux serviteurs de David : Qui est David, et qui est le fils de Jessé ? Il y a aujourd''hui beaucoup d''esclaves qui s''enfuient de chez leurs maîtres ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mon eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon vin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; la mention de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la viande que j''ai préparée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les bêtes que j'ai abattues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) indique qu'il s'agit d'un repas de fête.
    marker-yv: yv-n
  - type: text
    text: Je prendrais mon pain, mon eau et la viande que j'ai préparée pour mes tondeurs, et je les donnerais à des gens dont je ne sais même pas d'où ils sont ?
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Les gens de David rebroussèrent chemin ; ils revinrent et, à leur arrivée, ils lui dirent tout. '
