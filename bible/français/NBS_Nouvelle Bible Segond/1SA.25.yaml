      children:
      - type: text
        text: fou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ps 14.1/ / ; 39.9 ; 74.22 ; Jb 30.8 ; Pr 17.21.'
    marker-yv: yv-n
  - type: text
    text: 'Je t''en prie, ne fais pas attention à Nabal ; c''est un homme sans morale, il est comme son nom : son nom, c''est Nabal (« Fou »), et il y a chez lui de la folie. Moi, je n''ai pas vu les gens que tu as envoyés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par la vie du… ta propre vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 14.39'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de verser le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
