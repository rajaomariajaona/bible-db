      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Abigaïl prit vite deux cents pains, deux outres de vin, cinq moutons apprêtés, cinq séas de grain rôti, cent gâteaux de raisins secs et deux cents gâteaux de figues sèches, qu''elle mit sur des ânes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je vous suis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 32.21.'
    marker-yv: yv-n
  - type: text
    text: 'Elle dit à ses serviteurs : Passez devant moi, je vous suis. Elle ne dit rien à Nabal, son mari. '
