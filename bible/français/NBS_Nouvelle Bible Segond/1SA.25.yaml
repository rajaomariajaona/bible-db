          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tombant à ses pieds, elle dit : A moi la faute, mon seigneur ! Laisse-moi te parler, je t''en prie, écoute mes paroles : je suis ta servante. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne fais pas attention à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne place pas son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' sur'
    - type: usfm
      marker: ft
