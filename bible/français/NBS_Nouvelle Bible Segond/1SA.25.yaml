    marker-yv: yv-n
  - type: text
    text: 'David avait dit : C''est bien à tort que j''ai gardé tout ce que cet homme a dans le désert, et que rien n''a été enlevé de tout ce qu''il possède ; il m''a rendu le mal pour le bien. '
