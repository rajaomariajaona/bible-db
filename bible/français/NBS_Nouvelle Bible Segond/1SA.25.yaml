    marker-yv: yv-n
  - type: text
    text: 'Un des serviteurs de Nabal dit à Abigaïl, femme de Nabal : David a envoyé du désert des messagers pour bénir notre maître, qui les a rudoyés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 7.
    marker-yv: yv-n
  - type: text
    text: 'Et pourtant ces hommes ont été très bons pour nous ; nous n''avons pas été inquiétés, et rien ne nous a été enlevé, tout le temps que nous avons fait route avec eux, lorsque nous étions dans la campagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: muraille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : symbole de protection, cf. Za 2.9.'
    marker-yv: yv-n
  - type: text
    text: 'Ils nous ont servi de muraille nuit et jour, tout le temps que nous avons été avec eux, pour faire paître le petit bétail. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A toi maintenant…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maintenant sache et vois ce que tu feras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 18.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: homme sans morale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : allusion à la signification du nom de Nabal, v. 25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Dt 13.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 23.6s.'
    marker-yv: yv-n
  - type: text
    text: 'A toi maintenant de bien voir ce que tu as à faire, car le malheur de notre maître et de toute sa maison est résolu. Quant à lui, c''est un homme sans morale : impossible de lui parler !'
