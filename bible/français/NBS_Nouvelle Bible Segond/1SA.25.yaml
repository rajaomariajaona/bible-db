    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par un versant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'abri
    - type: usfm
      marker: ft
      children:
      - type: text
