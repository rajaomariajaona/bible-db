    - type: usfm
      marker: fqa
      children:
      - type: text
        text: êtres humains masculins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ? Cette tournure se retrouve dans des contextes analogues, au v. 34 et en 1R 14.10 ; 16.11 ; 21.21 ; 2R 9.8.'
    marker-yv: yv-n
  - type: text
    text: Que Dieu fasse ceci à David et qu'il ajoute cela, si je laisse subsister jusqu'au matin un seul mâle de tous ceux qui appartiennent à Nabal !
