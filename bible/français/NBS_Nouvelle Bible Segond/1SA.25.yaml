    - type: usfm
      marker: fq
      children:
      - type: text
        text: Laisse-moi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que ta servante '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ton esclave
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parle à tes oreilles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même à la fin du v., litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les paroles de ta servante '
    - type: usfm
      marker: ft
      children:
