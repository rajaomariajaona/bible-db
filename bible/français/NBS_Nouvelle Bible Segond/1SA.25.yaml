      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Montée sur un âne, elle descendait par un versant de la montagne ; David et ses hommes descendaient en face d''elle, de sorte qu''ils la rencontrèrent. '
