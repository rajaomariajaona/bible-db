document_id: 1SA.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nabal se montre ingrat envers David
  - type: text
    content: ' '
  - type: note
    content: 'Samuel mourut  : cf. 28.3. –  pour se lamenter  : il s''agit des rites de deuil ; cf. 2S 1.12 ; 3.31s ; 19.1-5. –  à Rama 1.1n. – Le désert de Parân se situe à la limite du pays de Juda et de la péninsule du Sinaï, cf. Nb 10.12 ; 13.26. Ce déplacement de David dans l''extrême sud du pays a déjà surpris les lecteurs d''autrefois, ce qui peut expliquer que certains mss de LXX parlent du désert de Maôn , comme au v. 2 et en 23.24s.'
  - type: text
    content: Samuel mourut. Tout Israël se rassembla pour se lamenter sur lui, et on l'ensevelit chez lui, à Rama. C'est alors que David descendit au désert de Parân.
  '10':
  - type: note
    content: 'serviteurs et esclaves traduisent le même mot hébreu. –  Qui est David  : cf. Ex 5.2 ; Jg 9.28. –  le fils de Jessé  : cf. 16.1. –  esclaves qui s''enfuient  : cf. 1R 2.39s ; Phm 10-19.'
  - type: text
    content: 'Nabal répondit aux serviteurs de David : Qui est David, et qui est le fils de Jessé ? Il y a aujourd''hui beaucoup d''esclaves qui s''enfuient de chez leurs maîtres ! '
  '11':
  - type: note
    content: 'mon eau  : LXX mon vin  ; la mention de la viande que j''ai préparée (ou les bêtes que j''ai abattues) indique qu''il s''agit d''un repas de fête.'
  - type: text
    content: Je prendrais mon pain, mon eau et la viande que j'ai préparée pour mes tondeurs, et je les donnerais à des gens dont je ne sais même pas d'où ils sont ?
  '12':
  - type: text
    content: 'Les gens de David rebroussèrent chemin ; ils revinrent et, à leur arrivée, ils lui dirent tout. '
  '13':
  - type: note
    content: 'son épée  : cf. 17.39,45. –  quatre cents… deux cents  : cf. 22.2+. –  près du matériel  : cf. 10.22 ; 17.22.'
  - type: text
    content: 'Alors David dit à ses hommes : Que chacun de vous mette son épée à la ceinture ! Ils mirent chacun son épée à la ceinture. David aussi mit son épée à la ceinture, et environ quatre cents hommes partirent à l''attaque derrière lui. Il en resta deux cents près du matériel.'
  - type: heading
    content: Abigaïl apaise David
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'pour bénir  : autre traduction pour saluer . –  rudoyés  : le verbe hébreu correspondant est rare (cf. 14.32 ; 15.19 se jeter sur ) et son sens n''est pas assuré.'
  - type: text
    content: 'Un des serviteurs de Nabal dit à Abigaïl, femme de Nabal : David a envoyé du désert des messagers pour bénir notre maître, qui les a rudoyés. '
  '15':
  - type: note
    content: Cf. v. 7.
  - type: text
    content: 'Et pourtant ces hommes ont été très bons pour nous ; nous n''avons pas été inquiétés, et rien ne nous a été enlevé, tout le temps que nous avons fait route avec eux, lorsque nous étions dans la campagne. '
  '16':
  - type: note
    content: 'muraille  : symbole de protection, cf. Za 2.9.'
  - type: text
    content: 'Ils nous ont servi de muraille nuit et jour, tout le temps que nous avons été avec eux, pour faire paître le petit bétail. '
  '17':
  - type: note
    content: 'A toi maintenant…  : litt. maintenant sache et vois ce que tu feras  ; cf. Jg 18.14. –  homme sans morale  : allusion à la signification du nom de Nabal, v. 25n  ; cf. Dt 13.14n  ; 2S 23.6s.'
  - type: text
    content: 'A toi maintenant de bien voir ce que tu as à faire, car le malheur de notre maître et de toute sa maison est résolu. Quant à lui, c''est un homme sans morale : impossible de lui parler !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 32.14-16 ; 2S 16.1 ; 17.27-29. –  moutons ou chèvres  ; le terme hébreu désigne du petit bétail. –  cinq séas  : environ 35 litres (voir mesures).'
  - type: text
    content: 'Abigaïl prit vite deux cents pains, deux outres de vin, cinq moutons apprêtés, cinq séas de grain rôti, cent gâteaux de raisins secs et deux cents gâteaux de figues sèches, qu''elle mit sur des ânes. '
  '19':
  - type: note
    content: 'je vous suis  : cf. Gn 32.21.'
  - type: text
    content: 'Elle dit à ses serviteurs : Passez devant moi, je vous suis. Elle ne dit rien à Nabal, son mari. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Maôn (cf. 23.24s) / Carmel (cf. 15.12n). Il s''agit sans doute d''un riche propriétaire terrien, domicilié à Maôn , qui avait une partie de son exploitation au village voisin, à Carmel . –  un homme très important  : litt. un homme très grand . – La tonte des moutons , au printemps, était l''occasion de réjouissances ; cf. Gn 38.12s ; 2S 13.23s.'
  - type: text
    content: 'Il y avait à Maôn un homme qui avait ses activités à Carmel. C''était un homme très important, il avait trois mille moutons et mille chèvres. Or il se trouvait à Carmel pour la tonte de ses moutons. '
  '20':
  - type: note
    content: 'par un versant  : litt. à l''abri  : il semble qu''ici les deux groupes descendent de part et d''autre d''une colline et se trouvent soudain face à face (cf. 23.26n).'
  - type: text
    content: 'Montée sur un âne, elle descendait par un versant de la montagne ; David et ses hommes descendaient en face d''elle, de sorte qu''ils la rencontrèrent. '
  '21':
  - type: note
    content: 'à tort ou en vain. –  rendu le mal pour le bien  : cf. Jr 18.20 ; Ps 35.12 ; 109.5 ; Pr 17.13.'
  - type: text
    content: 'David avait dit : C''est bien à tort que j''ai gardé tout ce que cet homme a dans le désert, et que rien n''a été enlevé de tout ce qu''il possède ; il m''a rendu le mal pour le bien. '
  '22':
  - type: note
    content: 'Que Dieu fasse ceci…  : cf. 3.17n. –  à David (comme la plupart des mss de LXX et Syr) : le texte hébreu traditionnel porte aux ennemis de David  ; il s''agit selon toute vraisemblance d''un ajout des copistes, destiné à éviter l''idée d''une malédiction de David, cf. 20.16n  ; 2S 12.14n. –  un seul mâle  : l''hébreu utilise ici une tournure imagée dont le sens exact nous échappe  : celui qui urine contre un mur  ; s''agit-il, comme on l''a interprété, de chiens, de petits garçons, ou plus généralement de tous les êtres humains masculins  ? Cette tournure se retrouve dans des contextes analogues, au v. 34 et en 1R 14.10 ; 16.11 ; 21.21 ; 2R 9.8.'
  - type: text
    content: Que Dieu fasse ceci à David et qu'il ajoute cela, si je laisse subsister jusqu'au matin un seul mâle de tous ceux qui appartiennent à Nabal !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'tomba face contre terre  : avec humilité, Abigaïl supplie David d''épargner sa famille. Cf. 1R 1.23n.'
  - type: text
    content: 'Lorsque Abigaïl aperçut David, elle s''empressa de descendre de l''âne ; puis elle tomba face contre terre, prosternée, devant David. '
  '24':
  - type: note
    content: 'A moi la faute v. 28 ; cf. Gn 44.33 ; Lv 16.21s ; Nb 18.1 ; 30.16 ; 2S 14.9 ; 1P 2.24. –  Laisse-moi…  : litt. que ta servante (ou ton esclave) parle à tes oreilles  ; de même à la fin du v., litt. les paroles de ta servante ou ton esclave  ; le texte hébreu porte la même formule de politesse aux v. 28,31 ; cf. v. 41n  ; 1.11n.'
  - type: text
    content: 'Tombant à ses pieds, elle dit : A moi la faute, mon seigneur ! Laisse-moi te parler, je t''en prie, écoute mes paroles : je suis ta servante. '
  '25':
  - type: note
    content: 'ne fais pas attention à  : litt. ne place pas son cœur sur, le cœur suggérant ici l''attention. – Voir nom. –  Nabal signifie fou  ; cf. Ps 14.1/ / ; 39.9 ; 74.22 ; Jb 30.8 ; Pr 17.21.'
  - type: text
    content: 'Je t''en prie, ne fais pas attention à Nabal ; c''est un homme sans morale, il est comme son nom : son nom, c''est Nabal (« Fou »), et il y a chez lui de la folie. Moi, je n''ai pas vu les gens que tu as envoyés. '
  '26':
  - type: note
    content: 'par la vie du… ta propre vie  : cf. 1.26n  ; 14.39n. –  de verser le sang  : litt. d’(en) arriver aux sangs, c.-à-d. au sang versé, au meurtre  ; de même au v. 33. –  et d''assurer toi-même ton propre salut  : litt. et que ta main sauve pour toi  ; expression analogue au v. 31. –  Que tes ennemis… soient comme Nabal, c.-à-d. comme le fou qui va être châtié. Cf. 2S 18.32.'
  - type: text
    content: 'Maintenant, par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et par ta propre vie, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui t''a empêché de verser le sang et d''assurer toi-même ton propre salut. Que tes ennemis, que ceux qui cherchent à te faire du mal soient comme Nabal. '
  '27':
  - type: note
    content: 'le cadeau  : litt. la bénédiction  ; cf. 30.26 ; Gn 33.11 ; 2R 5.15.'
  - type: text
    content: 'Maintenant, que le cadeau que je t''apporte soit distribué aux gens qui t''accompagnent. '
  '28':
  - type: note
    content: 'Pardonne…  : autres traductions enlève ma faute ; charge-toi de ma faute  ; cf. Gn 50.17n. –  une maison stable (2.35n) : cf. 24.21 ; 1R 9.5 ; Ps 89.30. –  les guerres du Seigneur  : cf. 18.17n. –  jamais (litt. [en aucun] de tes jours) rien de mauvais en toi  : cf. 24.11 ; 1R 15.5.'
  - type: text
    content: 'Pardonne ma faute, je te prie. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''accordera une maison stable, puisque tu mènes les guerres du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Qu''on ne trouve donc jamais rien de mauvais en toi ! '
  '29':
  - type: note
    content: 'Si un homme…  : litt. si un homme se lève pour te poursuivre et chercher ta vie (cf. Gn 1.20n). –  ta vie… auprès du Seigneur  : litt. l''âme de mon seigneur sera ensachée dans le sachet des vivants auprès du Seigneur, c.-à-d. qu''elle sera conservée, protégée, par les soins de Dieu lui-même ; cf. Ps 34.23 ; Pr 11.19 ; Jn 10.28. –  du creux de la fronde  : le porteur d''une fronde emportait une réserve de cailloux dans un sac (cf. 17.40) ; la vie des hommes est comparée à ces cailloux, dont certains sont à l''abri dans le sachet de Dieu, tandis que d''autres sont lancés au loin (= éliminés) par Dieu ; cf. Jr 10.18.'
  - type: text
    content: 'Si un homme te poursuit et en veut à ta vie, ta vie sera gardée précieusement auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; mais tes ennemis, il les lancera au loin du creux de la fronde. '
  '3':
  - type: note
    content: 'Nabal  : cf. v. 25n. –  femme de bon sens  : cf. Pr 14.1 ; 19.14 ; 31.10-31. –  agissements Jr 4.4+. –  Il descendait de Caleb  : selon une tradition de lecture du texte hébreu, l''expression peut signifier il était comme son cœur, allusion probable au v. 37 ; selon une autre tradition, elle signifie il était Calébite, c.-à-d. membre du clan de Caleb (cf. Nb 13.6). Le texte hébreu insiste peut-être sur cette origine parce que le mot hébreu (kéleb) signifie aussi chien (animal méprisé dans l''ancien Israël).'
  - type: text
    content: 'Le nom de cet homme était Nabal, et le nom de sa femme était Abigaïl ; c''était une femme de bon sens et fort belle, mais l''homme était dur et mauvais dans ses agissements. Il descendait de Caleb. '
  '30':
  - type: note
    content: chef sur Israël 9.16n  ; cf. 15.28 ; 16.1 ; 23.17 ; 24.21.
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''aura fait tout le bien qu''il t''a promis, et qu''il t''aura institué chef sur Israël, '
  '31':
  - type: note
    content: 'tu ne risqueras pas…  : litt. que ce ne soit pas pour toi un chancellement et un trébuchement (ou une occasion de chute, cf. Mt 11.6n) de cœur pour mon seigneur (cf. Es 8.14n  ; Jr 6.21n  ; Ez 3.20n  ; 7.19n  ; Ps 119.165) ; on pourrait aussi comprendre tu n''auras ni remords ni mauvaise conscience d''avoir répandu… –  assurer toi-même ton salut v. 26. –  tu te souviendras ou souviens-toi.'
  - type: text
    content: 'tu ne risqueras pas de chanceler ou de trébucher dans ton cœur pour avoir, sans raison, répandu du sang, et pour avoir voulu assurer toi-même ton salut. Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''aura fait du bien, tu te souviendras de moi !'
  - type: heading
    content: Mort de Nabal ; David épouse Abigaïl
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit le Seigneur  : formule de reconnaissance ; cf. v. 39 ; Gn 24.27 ; Ex 18.10 ; Ps 72.18s ; Esd 7.27. Formule analogue au v. 33.'
  - type: text
    content: 'David dit à Abigaïl : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, qui t''a envoyée à ma rencontre en ce jour ! '
  '33':
  - type: note
    content: mon propre salut v. 26,31.
  - type: text
    content: 'Béni soit ton discernement, et bénie sois-tu, toi qui m''as empêché en ce jour de verser le sang et d''assurer moi-même mon propre salut. '
  '34':
  - type: note
    content: 'Par la vie du Seigneur  : cf. 14.39n. –  l''aube  : litt. la lumière du matin, de même au v. 36. –  un seul des mâles  : cf. v. 22n.'
  - type: text
    content: 'Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, qui m''a empêché de te faire du mal, si tu n''étais pas venue si vite à ma rencontre, d''ici à l''aube, il ne serait pas resté un seul des mâles de Nabal ! '
  '35':
  - type: note
    content: 'Monte chez toi en paix ou retourne en paix chez toi  ; cf. 1.17 ; 20.42. –  je t''ai écoutée  : autres traductions je t''ai entendue ; j''ai acquiescé à ta requête. –  je t''ai accueillie favorablement  : litt. j''ai relevé ton visage, geste par lequel un supérieur exprimait sa bienveillance envers un inférieur prosterné devant lui.'
  - type: text
    content: 'David prit ce qu''elle lui avait apporté et lui dit : Monte chez toi en paix ; regarde, je t''ai écoutée et je t''ai accueillie favorablement.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'un véritable banquet royal  : cf. 2S 13.23-28. –  ivre  : cf. Pr 20.1 ; Lc 21.34 ; Rm 13.13. –  rien  : cf. 20.2n. –  l''aube v. 34n.'
  - type: text
    content: 'Abigaïl arriva auprès de Nabal ; il y avait chez lui un véritable banquet royal ; Nabal avait le cœur content, il était complètement ivre. Elle ne lui raconta rien jusqu''à l''aube. '
  '37':
  - type: note
    content: 'l''ivresse de Nabal s''étant dissipée  : litt. quand le vin fut sorti de Nabal. –  il reçut un coup au cœur  : litt. son cœur mourut en lui  ; c''est sans doute la description d''une attaque d''apoplexie suivie de paralysie (il devint comme une pierre).'
  - type: text
    content: 'Au matin, l''ivresse de Nabal s''étant dissipée, sa femme lui raconta ce qui s''était passé ; il reçut un coup au cœur et il devint comme une pierre. '
  '38':
  - type: note
    content: 'le Seigneur frappa  : cf. 26.10 ; sur le verbe correspondant, qui peut évoquer un fléau, cf. 6.4 ; Ex 7.27n. Voir aussi 2S 12.15 ; 2Ch 13.20 ; Ac 12.23.'
  - type: text
    content: 'Environ dix jours après, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa Nabal, et il mourut.'
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit le Seigneur  : cf. v. 32n. –  défendu ma cause  : cf. 24.16+. –  l''outrage…  : autre traduction le déshonneur que m''avait infligé…  ; cf. 11.2 ; 17.10n. –  à l''écart du mal  : cf. v. 33 ; David attribue à Dieu lui-même l''intervention d''Abigaïl. –  retomber sur la tête  : cf. Jg 9.57 ; 1R 2.44 ; Jl 4.4,7 ; Ab 15 ; Ps 7.17. –  fit demander…  : litt. envoya et parla d''Abigaïl (expression analogue en Ct 8.8n) pour la prendre pour lui pour femme.'
  - type: text
    content: 'David apprit que Nabal était mort et dit : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui a défendu ma cause dans l''outrage que m''avait fait Nabal, et qui m''a tenu à l''écart du mal ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait retomber sur la tête de Nabal le mal qu''il avait fait. David fit demander Abigaïl en mariage.'
  '4':
  - type: text
    content: 'David apprit, au désert, que Nabal tondait ses moutons. '
  '40':
  - type: text
    content: 'Les gens de David arrivèrent chez Abigaïl à Carmel et lui parlèrent ainsi : David nous a envoyés vers toi, afin de te prendre pour femme. '
  '41':
  - type: note
    content: 'esclave (ou servante) : ce terme et celui qui apparaît avant, dans la formule de politesse rendue par Je suis ta servante, sont souvent employés de façon équivalente (voir v. 24n  ; Gn 12.16n). –  pour laver les pieds  : pour accueillir un voyageur, l''hôte lui offrait de l''eau pour se rafraîchir les pieds ; parfois même un esclave pouvait être chargé de cette tâche. Cf. Lc 7.44.'
  - type: text
    content: 'Elle se leva, se prosterna face contre terre et dit : Je suis ta servante ; je serai une esclave pour laver les pieds de tes serviteurs, mon seigneur. '
  '42':
  - type: note
    content: 'Abigaïl s''empressa de se relever  : litt. Abigaïl se hâta et se leva. –  devint sa femme 27.3 ; 30.5 ; 2S 2.2 ; 3.3 ; cf. Pr 18.22 ; 19.14.'
  - type: text
    content: Abigaïl s'empressa de se relever ; elle monta sur un âne et, accompagnée de cinq jeunes filles, elle suivit les messagers de David. Ainsi elle devint sa femme.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Ahinoam…  : cf. 27.3 ; 30.5 ; 2S 2.2 ; 3.2. Jizréel est probablement une localité du pays de Juda, cf. Jos 15.56, et non la ville plus connue, située dans le nord du pays, sur le territoire de la tribu d''Issacar, cf. Jos 19.18.'
  - type: text
    content: 'David avait aussi pris Ahinoam, de Jizréel ; toutes les deux furent ses femmes. '
  '44':
  - type: note
    content: 'Mikal 14.49+. –  Palti  : appelé Paltiel en 2S 3.15. –  Gallim  : localité de Benjamin, proche de Jérusalem ; cf. Es 10.30.'
  - type: text
    content: Quant à Saül, il avait donné sa fille Mikal, femme de David, à Palti de Gallim, fils de Laïsh.
  '5':
  - type: note
    content: 'dix de ses gens  : litt. dix jeunes gens ou dix serviteurs, parmi les nombreuses personnes qui se sont réfugiées auprès de David (cf. v. 13 ; 22.2). – Voir nom. –  comment il va  : litt. pour la paix  ; cf. 10.4n.'
  - type: text
    content: 'Il lui envoya dix de ses gens, auxquels il dit : Montez à Carmel. Vous irez chez Nabal et, en mon nom, vous lui demanderez comment il va. '
  '6':
  - type: note
    content: 'Pour la vie  : litt. pour le vivant, expression hébraïque dont le sens est très incertain ; on a proposé la signification (qu''il en soit ainsi) pour la prochaine année  ; ou, en modifiant le texte hébreu traditionnel d''après Vg  : (vous parlerez ainsi) à mon frère. –  que tout aille bien pour  : litt. paix à. –  pour ta maison  : cf. Lc 10.5.'
  - type: text
    content: 'Vous lui direz : Pour la vie, que tout aille bien pour toi, pour ta maison et pour tout ce qui t''appartient ! '
  '7':
  - type: note
    content: 'inquiétés ou molestés  ; le même verbe est traduit par insulter en 20.34 ; pour un emploi analogue, voir Rt 2.15n. –  rien ne leur a été enlevé  : litt. il n''y a pas eu d''intervention contre eux (ni de la part de David, ni de la part de Bédouins dont David les a protégés). –  tout le temps  : litt. tous les jours.'
  - type: text
    content: 'A présent, j''ai appris que tu as les tondeurs. Or tes bergers ont été avec nous ; nous ne les avons pas inquiétés, et rien ne leur a été enlevé pendant tout le temps qu''ils ont été à Carmel. '
  '8':
  - type: note
    content: 'trouvent donc grâce à tes yeux ou soient accueillis avec bienveillance  ; cf. 16.22n. –  un jour de fête  : litt. un jour bon, cf. v. 2 ; Est 8.17 ; 9.19 ; Né 8.10-12. –  Donne-nous donc, je te prie  : cf. Jg 8.5. –  David, ton fils  : l''emploi métaphorique du mot fils peut exprimer les idées de soumission et de proximité ; ici c''est une formule de politesse. –  ce que tu as sous la main  : litt. ce que trouvera ta main  ; cf. Ec 11.2 ; Lc 6.38 ; 16.9.'
  - type: text
    content: Demande-le à tes gens, ils te le diront. Que mes gens trouvent donc grâce à tes yeux, puisque nous venons un jour de fête ! Donne-nous donc, je te prie, pour nous qui sommes tes serviteurs et pour David, ton fils, ce que tu as sous la main.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'ils se turent  : le verbe hébreu correspondant exprime habituellement l''idée d''interruption d''un processus, d''où la traduction présente (= ils cessèrent de parler ), qui reflète celle de Vg ; on peut aussi comprendre ils se reposèrent ou ils attendirent (la réponse de Nabal).'
  - type: text
    content: 'Lorsque les gens de David furent arrivés, ils parlèrent exactement ainsi à Nabal, au nom de David. Puis ils se turent. '
