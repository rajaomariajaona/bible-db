    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au sang versé, au meurtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et d'assurer toi-même ton propre salut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et que ta main sauve pour toi
    - type: usfm
      marker: ft
      children:
