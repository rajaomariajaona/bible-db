document_id: LEV.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'offrande végétale
  - type: text
    content: ' '
  - type: note
    content: 'quelqu''un  : litt. un être, une vie , de même 4.2,27 ; 5.2 etc. ; cf. 7.18n  ; sur le terme hébreu correspondant, voir Gn 1.20n. –  offrande végétale  : le terme hébreu minha a parfois un sens très général (il est alors traduit simplement par offrande , cf. Gn 4.3nss ; 1S 2.17 ; hors contexte sacrificiel, il peut aussi désigner le tribut imposé par un suzerain à ses vassaux, cf. Jg 3.15n) ; en revanche, dans les textes rituels comme le Lévitique, il désigne précisément une offrande non sanglante à base de végétaux (voir Lv 6.7-11 ; Nb 15.1-16) ; cf. Ex 29.41 ; 30.9 ; 40.29 ; Jos 22.23,29 ; Jg 13.19n  ; Ez 42.13+. –  de l''encens  : il s''agit ici d''une résine particulière, ingrédient du mélange également nommé encens en Ex 30.34nss ; de même dans la suite et en 5.11 ; 6.8 ; 24.7 ; cf. Es 60.6 ; Jr 6.20 ; Mt 2.11 ; Ap 5.8+.'
  - type: text
    content: 'Si quelqu''un offre en présent au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une offrande végétale, son présent sera de fleur de farine ; il versera de l''huile dessus et il y ajoutera de l''encens. '
  '10':
  - type: text
    content: 'Ce qui restera de l''offrande végétale sera pour Aaron et pour ses fils ; c''est une portion très sacrée des offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: levée 6.10 ; 7.13 ; 23.17 ; Ex 12.15+. – L'interdiction du levain et du miel (terme qui pourrait aussi désigner, selon certains, du sirop de fruits) s'opposait peut-être à un rituel cananéen ; cf. 23.5-8 ; Ex 12.15-20 ; Mt 13.33 ; 16.6 ; 1Co 5.6-8.
  - type: text
    content: 'Aucune des offrandes végétales que vous présenterez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne sera levée : vous ne ferez rien fumer qui contienne du levain ou du miel parmi les offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'prémices  : le même mot est traduit par commencement en Gn 1.1n (cf. v. 14n  ; voir aussi 23.10). –  on n''en placera pas  : litt. ils ne monteront pas.'
  - type: text
    content: 'Vous pourrez en présenter au '
  - type: text
    content: Seigneur
  - type: text
    content: ' comme présent de prémices ; mais on n''en placera pas sur l''autel comme une odeur agréable. '
  '13':
  - type: note
    content: 'les offrandes végétales…  : litt. tout présent (1.2n) de ton offrande végétale (v. 1n). – Le sel, parfois utilisé comme conservateur, est considéré comme un agent de purification (2R 2.19-22) ; il joue par ailleurs un rôle essentiel dans la préparation des aliments, notamment pour les repas d’alliance (Nb 18.19 ; 2Ch 13.5) ; cf. Ex 30.35 ; Ez 43.24 ; Mt 5.13 ; Mc 9.49n-50 ; Col 4.6. –  avec  : litt. sur.'
  - type: text
    content: A toutes les offrandes végétales que tu présenteras tu ajouteras du sel ; tu ne laisseras pas ton offrande végétale manquer du sel de l'alliance de ton Dieu ; avec tous tes présents tu présenteras du sel.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'première moisson  : litt. premiers fruits  ; le mot correspondant, qui apparaît aussi en 23.17,20 ( premiers pains  ; cf. les prémices de 2.12n) est apparenté à celui qui désigne les premiers-nés (Ex 13.1-16) ; voir aussi Ex 34.22n,26 ; Nb 13.20n  ; 18.13 ; 28.26 ; 2R 4.42 ; Ez 44.30 ; Né 10.36+.'
  - type: text
    content: 'Si tu présentes au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une offrande végétale de la première moisson, tu présenteras des épis rôtis au feu, du blé nouveau broyé, comme offrande végétale de ta première moisson. '
  '15':
  - type: note
    content: Cf. 5.11.
  - type: text
    content: 'Tu y ajouteras de l''huile et tu y mettras de l''encens ; c''est une offrande végétale. '
  '16':
  - type: note
    content: Cf. v. 2.
  - type: text
    content: 'Le prêtre fera fumer en évocation une portion du grain broyé et de l''huile, avec tout l''encens. C''est une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: note
    content: 'Voir prêtres. –  cette fleur de farine  : litt. sa fleur de farine. –  tout l''encens  : litt. tout son encens (celui de l''offrande végétale). –  en évocation ou en souvenir  : le terme hébreu vient peut-être d''une formule prononcée au moment de l''offrande (je veux évoquer, ou rappeler), soit pour rappeler au souvenir de Dieu celui qui présente l''offrande, afin que Dieu intervienne en sa faveur (cf. Nb 5.26 ; Ac 10.4), soit en commémoration des bienfaits de Dieu, soit pour invoquer le nom de Dieu (cf. Ex 3.15n), soit encore pour signifier que la poignée de farine offerte sur l''autel représente la totalité de l''offrande (cf. Lc 22.19 ; 1Co 11.24s ; voir aussi Rm 11.16). Cf. v. 9,16 ; 5.12 ; 6.8 ; 24.7 ; voir aussi Es 66.3n.'
  - type: text
    content: 'Il l''apportera aux fils d''Aaron, les prêtres ; il prendra une pleine poignée de cette fleur de farine, arrosée d''huile, avec tout l''encens, et le prêtre fera fumer cela sur l''autel, en évocation. C''est une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: pour Aaron… Ex 28.41. –  très sacrée v. 10 ; 6.10,18,22 ; 7.1,6 ; 10.12,17 ; 14.13 ; 21.22 ; 24.9 ; 27.28 ; cf. Ex 29.37n  ; voir saint.
  - type: text
    content: 'Ce qui restera de l''offrande végétale sera pour Aaron et pour ses fils ; c''est une portion très sacrée des offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'sans levain  : voir Ex 12.8n-20 ; seules les offrandes végétales accompagnant les sacrifices de paix et les offrandes de prémices comportaient du levain (Lv 2.11s ; 7.13 ; 23.15-21). –  arrosées d''huile 7.12 ; Ex 29.2n.'
  - type: text
    content: Si tu offres en présent une offrande végétale cuite au four, ce sera de la fleur de farine, des gâteaux sans levain pétris à l'huile et des galettes sans levain arrosées d'huile.
  '5':
  - type: text
    content: ' '
  - type: note
    content: poêle ou plaque , de même en 6.14 ; 7.9 ; Ez 4.3.
  - type: text
    content: 'Si ton présent est une offrande végétale cuite à la poêle, ce sera de la fleur de farine pétrie à l''huile, sans levain. '
  '6':
  - type: text
    content: Tu la rompras en morceaux et tu verseras de l'huile dessus ; c'est une offrande végétale.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'gril  : certains pensent qu''il s''agit plutôt d''un moule ou d''une casserole.'
  - type: text
    content: Si ton présent est une offrande végétale cuite sur le gril, elle sera faite de fleur de farine pétrie à l'huile.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'elle sera présentée  : litt. il la présentera.'
  - type: text
    content: 'Tu apporteras au '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''offrande végétale faite avec ces produits ; elle sera présentée au prêtre, qui l''approchera de l''autel. '
  '9':
  - type: note
    content: en évocation v. 2n.
  - type: text
    content: 'Le prêtre en prélèvera ce qui doit être offert en évocation et le fera fumer sur l''autel. C''est une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
