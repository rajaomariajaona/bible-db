        - type: text
          text: '  ; voir aussi 23.10). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on n'en placera pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ne monteront pas.
      marker-yv: yv-n
    - type: text
      text: 'Vous pourrez en présenter au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' comme présent de prémices ; mais on n''en placera pas sur l''autel comme une odeur agréable. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
