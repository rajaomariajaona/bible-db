        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Si tu offres en présent une offrande végétale cuite au four, ce sera de la fleur de farine, des gâteaux sans levain pétris à l'huile et des galettes sans levain arrosées d'huile.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poêle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: plaque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 6.14 ; 7.9 ; Ez 4.3.'
      marker-yv: yv-n
    - type: text
      text: 'Si ton présent est une offrande végétale cuite à la poêle, ce sera de la fleur de farine pétrie à l''huile, sans levain. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu la rompras en morceaux et tu verseras de l'huile dessus ; c'est une offrande végétale.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gril
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains pensent qu''il s''agit plutôt d''un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'moule '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou d''une '
      - type: usfm
        marker: fqa
        children:
        - type: text
