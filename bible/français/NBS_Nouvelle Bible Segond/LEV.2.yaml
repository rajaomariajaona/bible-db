        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.13 ; 28.26 ; 2R 4.42 ; Ez 44.30 ; Né 10.36+.'
      marker-yv: yv-n
    - type: text
      text: 'Si tu présentes au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' une offrande végétale de la première moisson, tu présenteras des épis rôtis au feu, du blé nouveau broyé, comme offrande végétale de ta première moisson. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 5.11.
      marker-yv: yv-n
    - type: text
      text: 'Tu y ajouteras de l''huile et tu y mettras de l''encens ; c''est une offrande végétale. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 2.
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre fera fumer en évocation une portion du grain broyé et de l''huile, avec tout l''encens. C''est une offrande consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette fleur de farine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa fleur de farine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout l'encens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout son encens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(celui de l''offrande végétale). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en évocation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en souvenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu vient peut-être d''une formule prononcée au moment de l''offrande ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je veux évoquer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rappeler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), soit pour rappeler au souvenir de Dieu celui qui présente l'offrande, afin que Dieu intervienne en sa faveur (cf. Nb 5.26 ; Ac 10.4), soit en commémoration des bienfaits de Dieu, soit pour invoquer le nom de Dieu (cf. Ex 3.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), soit encore pour signifier que la poignée de farine offerte sur l'autel représente la totalité de l'offrande (cf. Lc 22.19 ; 1Co 11.24s ; voir aussi Rm 11.16). Cf. v. 9,16 ; 5.12 ; 6.8 ; 24.7 ; voir aussi Es 66.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il l''apportera aux fils d''Aaron, les prêtres ; il prendra une pleine poignée de cette fleur de farine, arrosée d''huile, avec tout l''encens, et le prêtre fera fumer cela sur l''autel, en évocation. C''est une offrande consumée par le feu, une odeur agréable pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour Aaron… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 28.41. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'très sacrée '
      - type: usfm
        marker: ft
        children:
        - type: text
