        children:
        - type: text
          text: 'de ton offrande végétale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', parfois utilisé comme conservateur, est considéré comme un agent de purification (2R 2.19-22) ; il joue par ailleurs un rôle essentiel dans la préparation des aliments, notamment pour les repas d’'
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Nb 18.19 ; 2Ch 13.5) ; cf. Ex 30.35 ; Ez 43.24 ; Mt 5.13 ; Mc 9.49
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-50 ; Col 4.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur.
      marker-yv: yv-n
    - type: text
      text: A toutes les offrandes végétales que tu présenteras tu ajouteras du sel ; tu ne laisseras pas ton offrande végétale manquer du sel de l'alliance de ton Dieu ; avec tous tes présents tu présenteras du sel.
  '14':
  - type: usfm
