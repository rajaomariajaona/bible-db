        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; en revanche, dans les textes rituels comme le Lévitique, il désigne précisément une offrande non sanglante à base de végétaux (voir Lv 6.7-11 ; Nb 15.1-16) ; cf. Ex 29.41 ; 30.9 ; 40.29 ; Jos 22.23,29 ; Jg 13.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 42.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'encens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit ici d''une résine particulière, ingrédient du mélange également nommé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'encens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Ex 30.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss ; de même dans la suite et en 5.11 ; 6.8 ; 24.7 ; cf. Es 60.6 ; Jr 6.20 ; Mt 2.11 ; Ap 5.8+.
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un offre en présent au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' une offrande végétale, son présent sera de fleur de farine ; il versera de l''huile dessus et il y ajoutera de l''encens. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce qui restera de l''offrande végétale sera pour Aaron et pour ses fils ; c''est une portion très sacrée des offrandes consumées par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'levée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.10 ; 7.13 ; 23.17 ; Ex 12.15+. – L''interdiction du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'levain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'miel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (terme qui pourrait aussi désigner, selon certains, du sirop de fruits) s'opposait peut-être à un rituel cananéen ; cf. 23.5-8 ; Ex 12.15-20 ; Mt 13.33 ; 16.6 ; 1Co 5.6-8.
      marker-yv: yv-n
    - type: text
      text: 'Aucune des offrandes végétales que vous présenterez au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ne sera levée : vous ne ferez rien fumer qui contienne du levain ou du miel parmi les offrandes consumées par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
