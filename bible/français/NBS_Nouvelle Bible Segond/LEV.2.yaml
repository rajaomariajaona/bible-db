        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ce qui restera de l''offrande végétale sera pour Aaron et pour ses fils ; c''est une portion très sacrée des offrandes consumées par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
