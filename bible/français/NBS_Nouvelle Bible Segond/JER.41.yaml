  - type: text
    text: 'Mais, au septième mois, Ismaël, fils de Netania, fils d''Elishama, de la descendance royale, arriva avec des grands du roi et dix hommes auprès de Guedalia, fils d''Ahiqam, au Mitspa. Ils mangèrent ensemble au Mitspa. '
  - type: usfm
    marker: vlbl
