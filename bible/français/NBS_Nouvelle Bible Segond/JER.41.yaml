      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.16 : « L''ennemi peut avoir les larmes aux yeux, mais s''il en trouve l''occasion, il sera insatiable de sang. »'
    marker-yv: yv-n
  - type: text
    text: 'Ismaël, fils de Netania, sortit du Mitspa à leur rencontre ; il marchait en pleurant. Lorsqu''il les atteignit, il leur dit : Venez chez Guedalia, fils d''Ahiqam. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et les jeta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après des versions anciennes ; les mots correspondants sont absents du texte hébreu traditionnel.'
    marker-yv: yv-n
  - type: text
    text: 'Mais quand ils arrivèrent dans la ville, Ismaël, fils de Netania, les égorgea et les jeta dans la citerne, avec l''aide des hommes qui étaient avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au milieu de.
    marker-yv: yv-n
  - type: text
    text: 'Mais il se trouva parmi eux dix hommes qui dirent à Ismaël : Ne nous mets pas à mort, car nous avons des provisions cachées dans les champs, du froment, de l''orge, de l''huile et du miel. Alors il renonça à les mettre à mort avec leurs frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: est la citerne de Guedalia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : légère modification du texte hébreu traditionnel, qui porte'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'il abattit par la main de Guedalia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''autres modifient un peu différemment, d''après LXX'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'était une grande citerne, celle qu''avait faite… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Asa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Basha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 15.16-22.
    marker-yv: yv-n
  - type: text
    text: 'La citerne dans laquelle Ismaël jeta tous les cadavres des hommes qu''il abattit est la citerne de Guedalia, celle qu''avait faite le roi Asa, à cause de Basha, roi d''Israël ; c''est elle qu''Ismaël, fils de Netania, remplit de cadavres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: filles du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 36.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 43.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et tous les gens du peuple qui étaient restés au Mitspa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX n''a pas cette répétition. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nebouzaradân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '39.9+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les emmena captifs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss hébreux et grecs portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se leva de bon matin.
    marker-yv: yv-n
  - type: text
    text: Ismaël emmena captifs tout le reste du peuple qui était au Mitspa, les filles du roi et tous les gens du peuple qui étaient restés au Mitspa, que Nebouzaradân, chef des gardes, avait confiés à Guedalia, fils d'Ahiqam ; Ismaël, fils de Netania, les emmena captifs et partit pour se rendre chez les Ammonites.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les prisonniers d'Ismaël sont délivrés
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Yohanân, fils de Qaréah, et tous les officiers qui étaient avec lui, apprirent tout le mal qu''avait fait Ismaël, fils de Netania. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux Grandes Eaux de Gabaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', à une dizaine de kilomètres au nord-nord-est de Jérusalem ; cf. 28.1 ; 2S 2.12-17 ; voir aussi Jos 9.3ss ; 1R 3.4.'
    marker-yv: yv-n
  - type: text
    text: 'Ils prirent tous les hommes et partirent attaquer Ismaël, fils de Netania. Ils le trouvèrent aux Grandes Eaux de Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Quand tout le peuple qui était avec Ismaël vit Yohanân, fils de Qaréah, et tous les chefs de l''armée avec lui, il s''en réjouit ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'et tout le peuple qu''Ismaël avait emmené captif du Mitspa fit volte-face, il se retourna et vint rejoindre Yohanân, fils de Qaréah. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Mais Ismaël, fils de Netania, échappa à Yohanân avec huit hommes et se rendit chez les Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'familles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'enfants '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '40.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hauts fonctionnaires
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eunuques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 29.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; il pourrait s''agir ici de ceux qui étaient chargés de s''occuper des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: filles du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10+.'
    marker-yv: yv-n
  - type: text
    text: 'Yohanân, fils de Qaréah, ainsi que tous les officiers qui étaient avec lui, prit tout le reste du peuple, qu''il avait ramené du Mitspa, d''auprès d''Ismaël, fils de Netania, lequel avait abattu Guedalia, fils d''Ahiqam. Hommes de guerre, femmes et familles, hauts fonctionnaires, il les ramena depuis Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''hôtellerie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(sens incertain : caravansérail ?) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Kimham
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 19.37-40 ; 1R 2.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 42.14 ; 43.5-7 ; 2R 25.26.
    marker-yv: yv-n
  - type: text
    text: 'Ils se mirent en marche et s''arrêtèrent à l''hôtellerie de Kimham, près de Beth-Léhem, pour se rendre ensuite en Egypte, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '41.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 42.11.
    marker-yv: yv-n
  - type: text
    text: loin des Chaldéens dont ils avaient peur, parce qu'Ismaël, fils de Netania, avait abattu Guedalia, fils d'Ahiqam, que le roi de Babylone avait nommé à la tête du pays.
