    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.10 (lettre des exilés à ceux qui seraient restés à Jérusalem après la destruction du temple) : « Voici, nous vous avons envoyé de l''argent ; avec cette somme, achetez des victimes en vue des holocaustes et des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: ' pour les péchés, achetez de l''encens ; faites des offrandes, présentez des sacrifices sur l''autel du Seigneur notre Dieu. »'
    marker-yv: yv-n
  - type: text
    text: 'arrivèrent de Sichem, de Silo et de Samarie quatre-vingts hommes qui avaient la barbe rasée et les vêtements déchirés, et qui s''étaient fait des incisions ; ils avaient en main des offrandes et de l''encens, pour les présenter à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
