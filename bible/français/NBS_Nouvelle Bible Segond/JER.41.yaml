document_id: JER.41,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'septième mois  : septembre-octobre (cf. 2R 25.25 ; Za 7.5n  ; 8.19). –  de la descendance royale  : litt. de descendance de royauté . –  des grands du roi  : expression absente de LXX.'
  - type: text
    content: 'Mais, au septième mois, Ismaël, fils de Netania, fils d''Elishama, de la descendance royale, arriva avec des grands du roi et dix hommes auprès de Guedalia, fils d''Ahiqam, au Mitspa. Ils mangèrent ensemble au Mitspa. '
  '10':
  - type: note
    content: 'filles du roi  : cf. v. 16n  ; 36.26n  ; 43.6. –  et tous les gens du peuple qui étaient restés au Mitspa  : LXX n''a pas cette répétition. –  Nebouzaradân 39.9+. –  les emmena captifs  : certains mss hébreux et grecs portent se leva de bon matin.'
  - type: text
    content: Ismaël emmena captifs tout le reste du peuple qui était au Mitspa, les filles du roi et tous les gens du peuple qui étaient restés au Mitspa, que Nebouzaradân, chef des gardes, avait confiés à Guedalia, fils d'Ahiqam ; Ismaël, fils de Netania, les emmena captifs et partit pour se rendre chez les Ammonites.
  - type: heading
    content: Les prisonniers d'Ismaël sont délivrés
  '11':
  - type: text
    content: 'Yohanân, fils de Qaréah, et tous les officiers qui étaient avec lui, apprirent tout le mal qu''avait fait Ismaël, fils de Netania. '
  '12':
  - type: note
    content: aux Grandes Eaux de Gabaon, à une dizaine de kilomètres au nord-nord-est de Jérusalem ; cf. 28.1 ; 2S 2.12-17 ; voir aussi Jos 9.3ss ; 1R 3.4.
  - type: text
    content: 'Ils prirent tous les hommes et partirent attaquer Ismaël, fils de Netania. Ils le trouvèrent aux Grandes Eaux de Gabaon. '
  '13':
  - type: text
    content: 'Quand tout le peuple qui était avec Ismaël vit Yohanân, fils de Qaréah, et tous les chefs de l''armée avec lui, il s''en réjouit ; '
  '14':
  - type: text
    content: 'et tout le peuple qu''Ismaël avait emmené captif du Mitspa fit volte-face, il se retourna et vint rejoindre Yohanân, fils de Qaréah. '
  '15':
  - type: text
    content: 'Mais Ismaël, fils de Netania, échappa à Yohanân avec huit hommes et se rendit chez les Ammonites. '
  '16':
  - type: note
    content: 'familles ou enfants 40.7+. –  hauts fonctionnaires  : autre traduction eunuques  ; cf. 29.2n  ; il pourrait s''agir ici de ceux qui étaient chargés de s''occuper des filles du roi  ; cf. v. 10+.'
  - type: text
    content: 'Yohanân, fils de Qaréah, ainsi que tous les officiers qui étaient avec lui, prit tout le reste du peuple, qu''il avait ramené du Mitspa, d''auprès d''Ismaël, fils de Netania, lequel avait abattu Guedalia, fils d''Ahiqam. Hommes de guerre, femmes et familles, hauts fonctionnaires, il les ramena depuis Gabaon. '
  '17':
  - type: note
    content: 'l''hôtellerie (sens incertain : caravansérail ?) de Kimham  : cf. 2S 19.37-40 ; 1R 2.7. –  en Egypte 42.14 ; 43.5-7 ; 2R 25.26.'
  - type: text
    content: 'Ils se mirent en marche et s''arrêtèrent à l''hôtellerie de Kimham, près de Beth-Léhem, pour se rendre ensuite en Egypte, '
  '18':
  - type: note
    content: Cf. 42.11.
  - type: text
    content: loin des Chaldéens dont ils avaient peur, parce qu'Ismaël, fils de Netania, avait abattu Guedalia, fils d'Ahiqam, que le roi de Babylone avait nommé à la tête du pays.
  '2':
  - type: note
    content: 'V. 18 ; 40.5,7. –  tuèrent d''un coup d''épée  : litt. se levèrent et frappèrent de l''épée.'
  - type: text
    content: 'Alors Ismaël, fils de Netania, et les dix hommes qui étaient avec lui, tuèrent d''un coup d''épée Guedalia, fils d''Ahiqam, fils de Shaphân. Ainsi il mit à mort celui que le roi de Babylone avait nommé à la tête du pays. '
  '3':
  - type: note
    content: 'Judéens ou Juifs. –  auprès de Guedalia  : litt. avec lui, avec Guedalia  ; le nom propre est omis par LXX. –  Chaldéens 21.4n.'
  - type: text
    content: Ismaël tua encore tous les Judéens qui étaient auprès de Guedalia au Mitspa, et les Chaldéens, les hommes de guerre, qui se trouvaient là.
  - type: heading
    content: Ismaël assassine quatre-vingts pèlerins
  '4':
  - type: text
    content: 'Le deuxième jour après l''assassinat de Guedalia – personne n''en savait encore rien – '
  '5':
  - type: note
    content: 'Voir Samaritains. –  encens Ex 30.34n. –  à la maison du Seigneur  : ou bien sur les ruines du temple de Jérusalem, ou bien dans un autre sanctuaire au Mitspa ; cf. Baruch 1.10 (lettre des exilés à ceux qui seraient restés à Jérusalem après la destruction du temple) : « Voici, nous vous avons envoyé de l''argent ; avec cette somme, achetez des victimes en vue des holocaustes et des sacrifices pour les péchés, achetez de l''encens ; faites des offrandes, présentez des sacrifices sur l''autel du Seigneur notre Dieu. »'
  - type: text
    content: 'arrivèrent de Sichem, de Silo et de Samarie quatre-vingts hommes qui avaient la barbe rasée et les vêtements déchirés, et qui s''étaient fait des incisions ; ils avaient en main des offrandes et de l''encens, pour les présenter à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'il marchait  : LXX ils marchaient  ; cf. Siracide 12.16 : « L''ennemi peut avoir les larmes aux yeux, mais s''il en trouve l''occasion, il sera insatiable de sang. »'
  - type: text
    content: 'Ismaël, fils de Netania, sortit du Mitspa à leur rencontre ; il marchait en pleurant. Lorsqu''il les atteignit, il leur dit : Venez chez Guedalia, fils d''Ahiqam. '
  '7':
  - type: note
    content: 'et les jeta  : d''après des versions anciennes ; les mots correspondants sont absents du texte hébreu traditionnel.'
  - type: text
    content: 'Mais quand ils arrivèrent dans la ville, Ismaël, fils de Netania, les égorgea et les jeta dans la citerne, avec l''aide des hommes qui étaient avec lui. '
  '8':
  - type: note
    content: 'avec  : litt. au milieu de.'
  - type: text
    content: 'Mais il se trouva parmi eux dix hommes qui dirent à Ismaël : Ne nous mets pas à mort, car nous avons des provisions cachées dans les champs, du froment, de l''orge, de l''huile et du miel. Alors il renonça à les mettre à mort avec leurs frères. '
  '9':
  - type: note
    content: 'est la citerne de Guedalia  : légère modification du texte hébreu traditionnel, qui porte  : qu''il abattit par la main de Guedalia  ; d''autres modifient un peu différemment, d''après LXX  : était une grande citerne, celle qu''avait faite… –  Asa / Basha 1R 15.16-22.'
  - type: text
    content: 'La citerne dans laquelle Ismaël jeta tous les cadavres des hommes qu''il abattit est la citerne de Guedalia, celle qu''avait faite le roi Asa, à cause de Basha, roi d''Israël ; c''est elle qu''Ismaël, fils de Netania, remplit de cadavres. '
