    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se levèrent et frappèrent de l'épée.
    marker-yv: yv-n
  - type: text
    text: 'Alors Ismaël, fils de Netania, et les dix hommes qui étaient avec lui, tuèrent d''un coup d''épée Guedalia, fils d''Ahiqam, fils de Shaphân. Ainsi il mit à mort celui que le roi de Babylone avait nommé à la tête du pays. '
