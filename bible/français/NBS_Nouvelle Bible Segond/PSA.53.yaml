document_id: PSA.53,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu face à la corruption
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce psaume est identique au Ps 14 (voir les notes), à quelques variantes près : notamment la suscription, le v. 6 (/ / 14.5s) et l''emploi des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins (Dieu plutôt que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sur la flûte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine, fondée sur un rapprochement avec une racine verbale signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: percer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; de même en 88.1 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a compris le terme comme un nom propre ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour Mahalath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Gn 28.9) ; autres versions anciennes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour la danse. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Poème '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Du chef de chœur. Sur la flûte. Poème. De David.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: injustices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le fou se dit : Il n''y a pas de Dieu !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont pervertis, ils ont commis d'abominables injustices ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'en est pas un qui agisse bien.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, du ciel, se penche sur les êtres humains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour voir s'il y a quelqu'un qui ait du bon sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui cherche Dieu.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se sont dérobés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 78.57 ; 80.19 ; dans une expression légèrement différente (litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se dérober en arrière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), le même verbe correspond à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'reculer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 35.4 ; 40.15 ; 44.19 etc. ; cf. Pr 14.14.
      marker-yv: yv-n
    - type: text
      text: Tous se sont dérobés, ensemble ils se sont corrompus ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'en est pas un qui agisse bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas même un seul.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Les malfaisants n'ont-ils pas de connaissance ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux qui dévorent mon peuple comme on dévore du pain ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils n'invoquent pas Dieu.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans motif de frayeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'là où il n''y avait pas de frayeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (14.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de celui qui dresse son camp contre toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui t'assiège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains, d''après des versions anciennes, modifient légèrement le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'impie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 141.7 ; Jr 8.1 ; Ez 6.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rejetés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: méprisés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 78.59 ; 1S 8.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: C'est là qu'ils seront saisis de frayeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sans motif de frayeur ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu dispersera les ossements de celui qui dresse son camp contre toi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu les rendras honteux, car Dieu les a rejetés.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '53.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ah ! si… venait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui donnera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression évoquant habituellement un souhait.'
      marker-yv: yv-n
    - type: text
      text: Ah ! si de Sion venait le salut d'Israël !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Quand Dieu rétablira la situation de son peuple,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob sera dans l'allégresse, Israël se réjouira.
