document_id: PSA.53,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu face à la corruption
  - type: text
    content: ' '
  - type: note
    content: 'Ce psaume est identique au Ps 14 (voir les notes), à quelques variantes près : notamment la suscription, le v. 6 (/ / 14.5s) et l''emploi des noms divins (Dieu plutôt que le Seigneur). –  Sur la flûte  : traduction incertaine, fondée sur un rapprochement avec une racine verbale signifiant percer  ; de même en 88.1 ; LXX a compris le terme comme un nom propre ( pour Mahalath  ; cf. Gn 28.9) ; autres versions anciennes pour la danse. –  Poème 32.1n.'
  - type: text
    content: Du chef de chœur. Sur la flûte. Poème. De David.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'injustices  : voir justice.'
  - type: text
    content: 'Le fou se dit : Il n''y a pas de Dieu !'
  - type: text
    content: Ils se sont pervertis, ils ont commis d'abominables injustices ;
  - type: text
    content: il n'en est pas un qui agisse bien.
  '3':
  - type: text
    content: Dieu, du ciel, se penche sur les êtres humains,
  - type: text
    content: pour voir s'il y a quelqu'un qui ait du bon sens,
  - type: text
    content: qui cherche Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'se sont dérobés  : cf. 78.57 ; 80.19 ; dans une expression légèrement différente (litt. se dérober en arrière ), le même verbe correspond à reculer en 35.4 ; 40.15 ; 44.19 etc. ; cf. Pr 14.14.'
  - type: text
    content: Tous se sont dérobés, ensemble ils se sont corrompus ;
  - type: text
    content: il n'en est pas un qui agisse bien,
  - type: text
    content: pas même un seul.
  '5':
  - type: text
    content: Les malfaisants n'ont-ils pas de connaissance ?
  - type: text
    content: Eux qui dévorent mon peuple comme on dévore du pain ;
  - type: text
    content: ils n'invoquent pas Dieu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sans motif de frayeur  : autre traduction là où il n''y avait pas de frayeur (14.5n). –  de celui qui dresse son camp contre toi ou qui t''assiège  ; certains, d''après des versions anciennes, modifient légèrement le texte hébreu traditionnel pour lire de l''impie  ; cf. 141.7 ; Jr 8.1 ; Ez 6.5. –  rejetés ou méprisés  ; cf. 78.59 ; 1S 8.7n.'
  - type: text
    content: C'est là qu'ils seront saisis de frayeur,
  - type: text
    content: sans motif de frayeur ;
  - type: text
    content: Dieu dispersera les ossements de celui qui dresse son camp contre toi ;
  - type: text
    content: tu les rendras honteux, car Dieu les a rejetés.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ah ! si… venait  : litt. qui donnera , expression évoquant habituellement un souhait.'
  - type: text
    content: Ah ! si de Sion venait le salut d'Israël !
  - type: text
    content: Quand Dieu rétablira la situation de son peuple,
  - type: text
    content: Jacob sera dans l'allégresse, Israël se réjouira.
