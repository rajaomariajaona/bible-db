document_id: HOS.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le procès de Dieu avec Israël
  - type: text
    content: ' '
  - type: note
    content: 'litige…  : cf. 2.4n. –  habitants du pays ou de la terre  ; cf. Ap 3.10+. –  loyauté  : le terme hébreu correspondant est apparenté au mot amen (Dt 27.15n) ; il évoque concrètement la solidité (Jr 32.41), la sécurité (2R 20.19 ; Jr 2.21) et correspond parfois à notre mot vérité , l''hébreu n''ayant pas d''autre terme pour évoquer cette notion (Dt 13.15 ; 17.4 ; 22.20 ; 1R 10.6 ; Ps 25.10n  ; 119.43 etc.) ; il est souvent associé à la fidélité ou à la constance (2.21s) ; cf. Gn 47.29 ; Ex 34.6 ; Jos 2.14 ; Ps 86.15 etc ; voir aussi Jg 9.15-19. –  connaissance de Dieu v. 6 ; 5.4 ; 6.6 ; Jr 22.16.'
  - type: text
    content: 'Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', Israélites !'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a un litige avec les habitants du pays,'
  - type: text
    content: parce qu'il n'y a ni loyauté, ni fidélité,
  - type: text
    content: ni connaissance de Dieu dans le pays.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'pas rassasiés Mi 6.14. –  ils se prostitueront ou ils prostitueront , même possibilité au v. 18 ; cf. 1.2n. –  ils ne s''accroîtront pas  : autres traductions ils ne s''étendront pas ou, plus littéralement, ils n''éclateront pas, ils n''exploseront pas  ; cf. Gn 28.14n  ; 30.30 ; Ex 1.12 ; Es 54.3. –  ils ont cessé…  : autre traduction ils ont abandonné le Seigneur pour garder (11) la prostitution.'
  - type: text
    content: Ils mangeront, mais ils ne seront pas rassasiés ;
  - type: text
    content: ils se prostitueront, mais ils ne s'accroîtront pas
  - type: text
    content: '– parce qu''ils ont cessé de prendre garde au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Prostitution du peuple
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'V. 18 ; Es 28.1+,7 ; Pr 26.9. –  le vin nouveau  : le terme est habituellement traduit par vin (le texte emploie vraisemblablement deux synonymes) ; cf. 2.10n. –  font perdre la tête  : litt. prennent le cœur  ; cf. 7.11n.'
  - type: text
    content: La prostitution et le vin, le vin nouveau, font perdre la tête.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'interroge ou consulte . –  son morceau de bois ou son arbre  ; il s''agit soit d''un moyen de divination (cf. 2S 5.24), soit de statues ou de pieux sacrés (cf. v. 13+). –  souffle (ou esprit , v. 19n) de prostitution (comme en 1.2n) 5.4 ; cf. Za 13.2n. –  loin de  : litt. de dessous (cf. Nb 5.19n), ou à la place de , c.-à-d. au lieu de servir leur Dieu.'
  - type: text
    content: Mon peuple interroge son morceau de bois,
  - type: text
    content: c'est son bâton qui lui parle ;
  - type: text
    content: parce qu'un souffle de prostitution les égare,
  - type: text
    content: ils se prostituent loin de leur Dieu.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 12.2 ; 1R 14.23 ; 2R 17.8-11 ; Es 1.29n  ; Jr 2.20.
  - type: text
    content: Ils sacrifient sur le sommet des montagnes,
  - type: text
    content: ils offrent de l'encens sur les collines,
  - type: text
    content: sous un chêne, un peuplier, un térébinthe,
  - type: text
    content: dont l'ombre est plaisante !
  - type: text
    content: C'est pourquoi vos filles se prostitueront,
  - type: text
    content: et vos belles-filles seront adultères.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'prostituées sacrées  : litt. consacrées  ; cf. Gn 38.21ns ; Dt 23.18 ; voir aussi Nb 25.1 ; 1Co 10.8.'
  - type: text
    content: Je ne ferai pas rendre des comptes à vos filles
  - type: text
    content: pour leur prostitution,
  - type: text
    content: ni à vos belles-filles
  - type: text
    content: pour leurs adultères,
  - type: text
    content: puisque eux-mêmes vont à l'écart avec des prostituées
  - type: text
    content: et sacrifient avec des prostituées sacrées.
  - type: text
    content: Un peuple sans intelligence court à sa perte.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Juda 1.7+. –  ne se mette pas en tort ou ne se rende pas coupable  ; même verbe en 5.15 ( reconnaître ses torts ) ; 10.2 ( faire réparation ) ; 13.1 ; 14.1. –  Beth-Aven  : nom d''un village à l''est de Beth-El (Jos 7.2), il est surtout utilisé ici pour son sens ( Maison d''injustice ou de malfaisance , voire de nullité  ; cf. 5.8 ; 6.8n  ; 10.5,8n). Beth-Aven est, comme Beth-El, associé au Guilgal (9.15 ; 12.12n  ; Am 4.4 ; 5.5n  ; cf. Dt 11.30n  ; Jos 4.19–5.9 ; 1S 11.14s) ; on peut donc y voir une désignation satirique du sanctuaire de Beth-El ( Maison d''El ou Maison de Dieu  ; cf. Gn 28.16-19 ; 1R 12.29-33). –  tout en jurant  : litt. ne jurez pas  ; cf. Am 8.14. –  Par la vie du Seigneur  : litt. YHWH est vivant ! formule de serment, cf. Jg 8.19 ; 1S 14.39,45 ; 26.10,16 ; 1R 17.12 ; 18.10 ; Jr 38.16.'
  - type: text
    content: Si tu te prostitues, Israël,
  - type: text
    content: que Juda ne se mette pas en tort ;
  - type: text
    content: n'allez pas au Guilgal,
  - type: text
    content: ne montez pas à Beth-Aven,
  - type: text
    content: 'tout en jurant :'
  - type: text
    content: '« Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! »'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'le fera paître ou, ironiquement, le ferait paître… ? ! –  prés  : sous-entendu dans le texte.'
  - type: text
    content: Parce qu'Israël est rétif comme une vache rétive,
  - type: text
    content: 'maintenant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le fera paître'
  - type: text
    content: comme un mouton dans de vastes prés.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ephraïm , tribu centrale et dominante du Nord, au point que le nom désigne souvent l'ensemble du royaume ; cf. 5.3 ; 6.10 ; 7.1 ; 13.1 ; voir aussi Gn 41.52 ; 48.8-20.
  - type: text
    content: 'Ephraïm est associé aux idoles :'
  - type: text
    content: laisse-le !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'leurs chefs  : litt. ses boucliers  ; cf. Ps 47.10 ; ce terme est sans doute employé ici par dérision. –  aiment le mépris  : texte obscur ; certains modifient l''ensemble de la phrase pour lire ils préfèrent le mépris à leur gloire (cf. v. 7n).'
  - type: text
    content: A peine ont-ils cessé de boire
  - type: text
    content: qu'ils se prostituent ;
  - type: text
    content: leurs chefs aiment le mépris.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Le vent  : le mot hébreu correspondant est traduit par souffle au v. 12 ; cf. 13.15 ; Jr 4.11. –  honte 10.5s ; Es 1.29.'
  - type: text
    content: Le vent les enveloppera de ses ailes,
  - type: text
    content: et ils auront honte de leurs sacrifices.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 20.13-17 ; Lv 19.11-13 ; Dt 5 ; Jr 7.9. –  malédiction  : autre traduction adjuration  ; le terme évoque habituellement les malédictions conditionnelles qui font partie intégrante du serment ou de l''alliance, sans doute ici employées de façon abusive, pour tromper (10.4) ou pour intimider ; sur le terme hébreu correspondant, voir Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; Dt 29.11n  ; Jb 31.30n. –  dissimulation ou tromperie, mensonge, parjure, reniement 7.1,3 ; 10.4,13 ; 12.1s. –  on use de violence  : le verbe signifie d''abord faire éclater, ouvrir une brèche (cf. v. 10n) ; on pourrait aussi le rattacher à l''énumération qui précède et traduire  : (parjures…) abondent ou s''étalent au grand jour . –  on commet meurtre sur meurtre  : litt. les sangs (c.-à-d. les effusions de sang) touchent aux sangs  ; cf. Es 1.15n.'
  - type: text
    content: Il n'y a que malédiction et dissimulation,
  - type: text
    content: assassinats, vols et adultères ;
  - type: text
    content: on use de violence,
  - type: text
    content: on commet meurtre sur meurtre.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.20,23-25 ; Gn 3.17 ; 6.5-7 ; Es 24.4-7 ; 33.8s ; Jr 12.4 ; 23.10 ; So 1.3 ; Ag 1.10s ; Rm 8.19-22.
  - type: text
    content: C'est pourquoi le pays sera en deuil,
  - type: text
    content: tous ceux qui l'habitent dépériront ;
  - type: text
    content: avec eux les animaux sauvages
  - type: text
    content: et les oiseaux du ciel ;
  - type: text
    content: même les poissons de la mer disparaîtront.
  - type: heading
    content: Dieu accuse les prêtres d'Israël
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'comme ceux qui accusent…  : cf. 2.4 ; Dt 17.12. Autre traduction comme ceux qui contestent l''autorité des prêtres . Certains modifient le texte hébreu traditionnel pour lire c''est avec toi, prêtre, que j''ai un litige (cf. v. 1).'
  - type: text
    content: Mais que personne n'accuse,
  - type: text
    content: que personne ne fasse de reproches ;
  - type: text
    content: car ton peuple est comme ceux qui accusent les prêtres.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'trébucheras 5.5 ; 14.2 ; Es 8.15. –  je ferai périr  : autre traduction je réduirai au silence , même possibilité au v. 6 ; 10.7,15. –  ta mère  : cf. 2.4 ; 7.10ss ; 1S 15.33 ; Es 50.1 ; Jr 22.25ss ; 31.15 ; Ps 109.14.'
  - type: text
    content: Tu trébucheras le jour,
  - type: text
    content: le prophète qui est chez toi trébuchera la nuit,
  - type: text
    content: et je ferai périr ta mère.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Mon peuple 11.7. –  périt  : autre traduction est réduit au silence  ; cf. v. 5n. –  rejeté  : autre traduction méprisé . –  la connaissance v. 1+ ; Es 5.13 ; Jr 5.4 ; Jn 4.10. –  de mon sacerdoce  : cf. Ml 2.1-3. – Voir fils.'
  - type: text
    content: Mon peuple périt
  - type: text
    content: parce qu'il n'a pas la connaissance.
  - type: text
    content: Puisque, toi, tu as rejeté la connaissance,
  - type: text
    content: je te rejetterai de mon sacerdoce ;
  - type: text
    content: comme tu as oublié la loi de ton Dieu,
  - type: text
    content: moi, de même, j'oublierai tes fils.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ils se sont multipliés  : autre traduction possible ils se sont élevés , c.-à-d. enorgueillis. –  je changerai  : versions anciennes ils changent . –  leur gloire  : autre lecture traditionnelle ma gloire  ; cf. v. 18n  ; Jr 2.11 ; Ps 106.20 ; Ph 3.19. –  mépris ou ignominie  ; cf. Jr 13.26 ; Pr 3.35+.'
  - type: text
    content: Plus ils se sont multipliés,
  - type: text
    content: 'plus ils ont péché contre moi :'
  - type: text
    content: je changerai leur gloire en mépris.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ils se repaissent…  : litt. ils mangent (même verbe hébreu au v. 10) le péché…  ; les prêtres consommaient une part importante des sacrifices pour le péché ; cf. Lv 6.19-22 ; 7.7 ; voir aussi 1S 2.12-17 ; Es 56.11. –  l''incitent à commettre…  : litt. vers leur faute (leur offrande pour la faute ?) ils soulèvent son être  ; certains mss hébreux et des versions anciennes ont lu leur désir . Autre interprétation  : ils seront chargés de leur faute, au prix de leur vie.'
  - type: text
    content: Ils se repaissent du péché de mon peuple
  - type: text
    content: et l'incitent à commettre la même faute qu'eux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je lui ferai rendre compte  : autre traduction j''interviendrai contre lui , cf. 1.4+. –  ses voies  : autre traduction sa conduite  ; cf. 14.10. –  ses agissements 5.4 ; 7.2 ; 9.15 ; 12.3 ; cf. Jr 4.4+ ; Ps 77.12n.'
  - type: text
    content: Il en sera du prêtre comme du peuple ;
  - type: text
    content: je lui ferai rendre compte de ses voies,
  - type: text
    content: je lui rendrai selon ses agissements.
