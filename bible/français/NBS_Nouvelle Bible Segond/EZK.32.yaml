document_id: EZK.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Complainte sur le pharaon et sur l'Egypte
  - type: text
    content: ' '
  - type: note
    content: 'douzième année…  : 585 av. J.-C. (cf. 1.2n).'
  - type: text
    content: 'La douzième année, le premier jour du douzième mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: '27.35. –  Je dévasterai  : le verbe hébreu traduit par dévaster a aussi été traduit par atterrer (cf. Es 52.14). –  pour sa vie ou pour lui-même  ; cf. Gn 1.20n.'
  - type: text
    content: Je dévasterai une multitude de peuples à cause de toi, et leurs rois seront saisis d'effroi à cause de toi, quand je ferai voler mon épée devant eux ; chacun d'eux tremblera à tout instant pour sa vie au jour de ta chute.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.8+ ; 29.19 ; 30.10s,24.
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : l''épée du roi de Babylone t''atteindra.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ta multitude  : autres traductions ton tumulte ; ton abondance  ; mêmes possibilités dans la suite ( toute sa multitude ) et aux v. 16,18,20,24ss,31s ; cf. 7.11n  ; 31.2n. –  guerriers  : autres traductions vaillants hommes ; héros  ; même terme hébreu aux v. 21,27 ; cf. 39.18. –  les pires brutes 28.7+.'
  - type: text
    content: Je ferai tomber ta multitude par l'épée de guerriers,
  - type: text
    content: toutes les pires brutes des nations ;
  - type: text
    content: ils ravageront l'orgueil de l'Egypte,
  - type: text
    content: et toute sa multitude sera détruite.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 29.11 ; il y a peut-être ici allusion au système d'irrigation de l'Egypte par les grandes eaux (cf. 31.7n) du Nil, Dt 11.10.
  - type: text
    content: Je ferai disparaître toutes ses bêtes
  - type: text
    content: loin des grandes eaux ;
  - type: text
    content: le pied de l'homme ne les troublera plus,
  - type: text
    content: les sabots du bétail ne les troubleront plus.
  '14':
  - type: text
    content: Alors je calmerai leurs eaux
  - type: text
    content: et je ferai couler leurs fleuves comme l'huile
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: Les termes hébreux traduits par dévasté et sera vidé sont apparentés.
  - type: text
    content: Quand je ferai de l'Egypte un lieu dévasté,
  - type: text
    content: et que le pays sera vidé de tout ce qui s'y trouve,
  - type: text
    content: quand je frapperai tous ceux qui l'habitent,
  - type: text
    content: 'ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'les filles des nations  : l''expression pourrait désigner les nations elles-mêmes, personnifiées comme des jeunes filles ; cf. Es 1.8n  ; Jr 4.11n,31n.'
  - type: text
    content: 'C''est là une complainte, et on la chantera ; les filles des nations chanteront cette complainte ; elles la chanteront sur l''Egypte et sur toute sa multitude – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Lamentation sur les peuples voisins
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1n  ; LXX le 15 du premier mois.
  - type: text
    content: 'La douzième année, le quinzième jour du mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'multitude 31.2n. –  magnifiques  : cf. 17.8,23 ; certains modifient le texte hébreu traditionnel pour lire … avec les filles des nations. Je les ferai descendre dans les profondeurs… –  profondeurs / gouffre 26.20+ ; voir Es 14.9-11.'
  - type: text
    content: Humain, gémis sur la multitude d'Egypte et fais-la descendre, elle et les filles des nations magnifiques,
  - type: text
    content: dans les profondeurs de la terre,
  - type: text
    content: avec ceux qui descendent dans le gouffre !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Le texte des v. 19-21 est obscur ; LXX, suivie par de nombreuses éditions modernes, place le v. 19 après séjour des morts au v. 21, c.-à-d. dans la bouche des héros tombés. –  par ta beauté  : le terme hébreu peut signifier beauté ou approbation . –  avec les incirconcis v. 28,32 ; 28.10+ ; voir circoncision.'
  - type: text
    content: Qui surpasses-tu par ta beauté ?
  - type: text
    content: Descends, et qu'on te couche avec les incirconcis !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'complainte 19.14+. –  pharaon… 29.2+. –  Tu ressemblais à  : cf. 19.10 ; 27.32 ; autres traductions possibles en raison des homonymies de l''hébreu  : tu as disparu (cf. Es 15.1) ; tu es réduit au silence (Jr 47.5 ; Ez 27.32 ; Os 4.5ns). –  dragon  : cf. 29.3n  ; voir aussi Jb 40.25–41.26. –  tu jaillissais ou tu faisais jaillir , c.-à-d. tu éclaboussais  ; cf. Jr 46.8. –  dans tes fleuves  : cf. 31.4n  ; certains modifient le texte hébreu traditionnel pour lire avec tes narines (cf. Jb 41.12) ou en t''ébrouant . –  tu troublais… 34.18. –  leurs flots  : litt. leurs fleuves , comme ci-dessus ; LXX tes fleuves.'
  - type: text
    content: 'Humain, entonne une complainte sur le pharaon, le roi d''Egypte ! Tu lui diras : Tu ressemblais à un jeune lion parmi les nations ;'
  - type: text
    content: tu étais comme un dragon dans les mers,
  - type: text
    content: tu jaillissais dans tes fleuves,
  - type: text
    content: tu troublais les eaux avec tes pieds,
  - type: text
    content: tu agitais leurs flots.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'victimes 21.19n  ; 28.8n. –  Une épée est là  : litt. une épée est donnée (ou est placée ) ; le mot correspondant à épée est absent des versions grecque et syriaque ; on pourrait aussi traduire elle (l''Egypte) est livrée (à l''épée)  ; cf. 11.8+. –  emportez l''Egypte  : litt. entraînez-la , ou on l''entraînera  ; à la place de la dernière proposition, LXX a lu et toute sa force se couchera.'
  - type: text
    content: Ils tomberont au milieu des victimes de l'épée.
  - type: text
    content: 'Une épée est là :'
  - type: text
    content: emportez l'Egypte et toute sa multitude !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Les puissants héros  : litt. les béliers des guerriers (ou des vaillants hommes , de même aux v. 12n,27 ; 39.18,20) ; cf. 31.11n  ; voir aussi Gn 6.4n. –  avec ses auxiliaires…  : à la place de la fin du v. LXX lit l''équivalent du v. 19.'
  - type: text
    content: Les puissants héros lui adresseront la parole
  - type: text
    content: dans le séjour des morts,
  - type: text
    content: avec ses auxiliaires.
  - type: text
    content: Ils sont descendus, ils sont couchés,
  - type: text
    content: les incirconcis, victimes de l'épée.
  '22':
  - type: text
    content: ' '
  - type: note
    content: l'Assyrie 16.48 ; 31.3n. On pourrait aussi traduire Voilà Assyrie (en hébreu Ashour ) … et ses tombes sont autour de lui (le féminin et le masculin alternent dans le texte hébreu) ; cf. Gn 10.11n,22.
  - type: text
    content: Voilà l'Assyrie, avec toute son assemblée,
  - type: text
    content: ses tombes sont autour d'elle ;
  - type: text
    content: tous sont tombés,
  - type: text
    content: victimes de l'épée.
  '23':
  - type: text
    content: ' '
  - type: note
    content: profondeurs / gouffre 26.20+ ; cf. Es 14.15.
  - type: text
    content: Ses tombes ont été placées
  - type: text
    content: dans les profondeurs du gouffre,
  - type: text
    content: et son assemblée est autour de sa tombe ;
  - type: text
    content: tous sont tombés,
  - type: text
    content: victimes de l'épée,
  - type: text
    content: eux qui répandaient la terreur sur la terre des vivants.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Elam Gn 10.22n. –  chargés… v. 25,30 ; cf. 16.27n  ; 34.29n.
  - type: text
    content: Voilà Elam avec toute sa multitude,
  - type: text
    content: autour de sa tombe ;
  - type: text
    content: tous sont tombés,
  - type: text
    content: victimes de l'épée ;
  - type: text
    content: ils sont descendus incirconcis
  - type: text
    content: dans les profondeurs de la terre,
  - type: text
    content: eux qui répandaient leur terreur sur la terre des vivants,
  - type: text
    content: et ils ont été chargés de leur confusion
  - type: text
    content: avec ceux qui descendent dans le gouffre.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'leur terreur  : c.-à-d. la terreur qu''ils inspiraient  ; cf. Jos 2.9n.'
  - type: text
    content: On a placé son lit au milieu des victimes
  - type: text
    content: avec toute sa multitude,
  - type: text
    content: et ses tombes sont autour de lui ;
  - type: text
    content: tous ces incirconcis ont été victimes de l'épée,
  - type: text
    content: car leur terreur était répandue sur la terre des vivants,
  - type: text
    content: et ils ont été chargés de leur confusion
  - type: text
    content: avec ceux qui descendent dans le gouffre ;
  - type: text
    content: ils ont été placés au milieu des victimes.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Méshek / Toubal 27.13n  ; Gn 10.2n.
  - type: text
    content: Là sont Méshek, Toubal et toute leur multitude,
  - type: text
    content: et leurs tombes sont autour d'eux ;
  - type: text
    content: tous ces incirconcis ont été victimes de l'épée,
  - type: text
    content: car ils répandaient leur terreur sur la terre des vivants.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'les héros v. 12n,21n. –  d''entre les incirconcis  : à la place de cette expression LXX a lu autrefois  ; cf. Gn 6.4n. –  Mais leurs fautes  : certains croient devoir modifier le texte hébreu traditionnel pour lire et leurs boucliers . –  régnait  : sous-entendu dans le texte.'
  - type: text
    content: Ils ne se sont pas couchés avec les héros,
  - type: text
    content: ceux qui sont tombés d'entre les incirconcis.
  - type: text
    content: Ils sont descendus au séjour des morts
  - type: text
    content: avec leurs armes
  - type: text
    content: et on a mis leurs épées sous leur tête.
  - type: text
    content: Mais leurs fautes sont sur leurs ossements,
  - type: text
    content: car la terreur des guerriers régnait sur la terre des vivants !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 19n. –  te voilà brisé  : est absent de LXX.'
  - type: text
    content: Quant à toi, te voilà brisé, au milieu des incirconcis,
  - type: text
    content: tu es couché avec les victimes de l'épée !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Edom 25.12+ ; cf. Gn 25.30. –  malgré leur vaillance  : litt. dans leur vaillance , terme apparenté à héros (v. 21+), de même au v. 30.'
  - type: text
    content: 'Voilà Edom, ses rois et tous ses princes qui, malgré leur vaillance, ont été placés avec les victimes de l''épée ; ils sont couchés avec les incirconcis, avec ceux qui descendent dans le gouffre. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'mon filet 12.13+. –  ils te tireront  : LXX je te tirerai.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: j'étendrai sur toi mon filet,
  - type: text
    content: dans l'assemblée d'une multitude de peuples,
  - type: text
    content: et ils te tireront dans ma nasse.
  '30':
  - type: note
    content: 'Sidoniens  : cf. 28.22n.'
  - type: text
    content: Voilà tous les princes du nord et tous les Sidoniens, qui sont descendus avec les victimes, honteux, malgré la terreur qu'inspirait leur vaillance ; ces incirconcis sont couchés avec les victimes de l'épée, et ils ont été chargés de leur confusion avec ceux qui descendent dans le gouffre.
  '31':
  - type: text
    content: ' '
  - type: note
    content: sera consolé 14.22+.
  - type: text
    content: 'Le pharaon les verra, et il sera consolé au sujet de toute sa multitude, des gens du pharaon et de toute son armée qui ont été victimes de l''épée – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'ma terreur  : autre lecture traditionnelle, suivie par des versions anciennes, sa terreur  ; cf. v. 25n.'
  - type: text
    content: 'Car je répandrai ma terreur sur la terre des vivants ; on le couchera au milieu des incirconcis, avec les victimes de l''épée, le pharaon et toute sa multitude – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 29.5 ; 31.13. –  Je te laisserai ou je t'abandonnerai.
  - type: text
    content: Je te laisserai sur la terre,
  - type: text
    content: je te jetterai dans les champs ;
  - type: text
    content: je ferai demeurer sur toi tous les oiseaux du ciel
  - type: text
    content: et je rassasierai de toi les animaux de toute la terre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '31.12. –  tes débris  : traduction incertaine ; une version ancienne a lu tes vers  ; cf. Es 14.11 ; Jb 7.5.'
  - type: text
    content: Je mettrai ta chair sur les montagnes
  - type: text
    content: et je remplirai les vallées de tes débris,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le pays où tu nages  : traduction conjecturale ; autre possibilité j''arroserai la terre de ce qui coulera de toi, de ton sang.'
  - type: text
    content: j'arroserai de ton sang le pays où tu nages,
  - type: text
    content: jusqu'aux montagnes,
  - type: text
    content: tu rempliras tes ravins.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 31.15 ; Es 13.10 ; Jl 2.10 ; 4.15 ; Am 8.9 ; Mt 24.29/ / ; Ap 6.12s. –  voilerai  : litt. couvrirai.'
  - type: text
    content: Quand tu t'éteindras, je voilerai le ciel
  - type: text
    content: et j'assombrirai ses étoiles,
  - type: text
    content: je voilerai le soleil d'une nuée,
  - type: text
    content: et la lune ne donnera plus sa lumière.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'les luminaires  : litt. les luminaires de lumière  ; cf. Gn 1.14n.'
  - type: text
    content: A cause de toi j'assombrirai
  - type: text
    content: tous les luminaires du ciel
  - type: text
    content: et je répandrai les ténèbres sur ton pays
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  ton désastre  : LXX tes captifs.'
  - type: text
    content: 'Je contrarierai le cœur d''une multitude de peuples, quand je ferai venir ton désastre chez les nations en des pays que tu ne connaissais pas. '
