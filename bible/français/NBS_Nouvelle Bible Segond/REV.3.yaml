document_id: REV.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Lettre à l'Eglise de Sardes
  - type: text
    content: ' '
  - type: note
    content: 'Voir ange et Eglise . –  Sardes 1.11n. –  sept esprits 1.4+. –  sept étoiles 1.16+. –  Je connais… 2.2+. –  tu es réputé vivant  : litt. tu as un nom (ou le renom ) que tu vis (cf. v. 4s). –  vivant / mort  : cf. 1.18.'
  - type: text
    content: 'A l''ange de l''Eglise de Sardes, écris :'
  - type: text
    content: 'Voici ce que dit celui qui a les sept esprits de Dieu et les sept étoiles : Je connais tes œuvres ; je sais bien que tu es réputé vivant, mais tu es mort. '
  '10':
  - type: note
    content: 'la parole de ma persévérance ou de mon endurance  : on peut comprendre tu as gardé ma parole avec persévérance ou tu as observé mon ordre de persévérer  ; 1.9+ ; Lc 8.15 ; 21.19 ; 2Tm 2.12 ; Hé 10.36. –  épreuve  : cf. 2.2,10 ; Mt 4.1n  ; 2P 2.9. –  la terre habitée 12.9 ; 16.14 ; Mt 24.14n. –  les habitants de la terre 6.10 ; 8.13 ; 11.10 etc. ; Es 24.17 ; 26.21 ; Os 4.1 ; cf. Ph 3.20.'
  - type: text
    content: 'Parce que tu as gardé la parole de ma persévérance, je te garderai moi-même de l''heure de l''épreuve qui va venir sur toute la terre habitée, pour mettre à l''épreuve les habitants de la terre. '
  '11':
  - type: note
    content: 'Je viens bientôt  : cf. 1.1n  ; voir aussi 2.16 ; 22.7,12,20 ; Za 2.14. –  Reste attaché 2.13n. –  ne prenne ou reçoive (à ta place) ta couronne 2.10n  ; cf. Mt 25.28.'
  - type: text
    content: Je viens bientôt. Reste attaché à ce que tu as, pour que personne ne prenne ta couronne.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'une colonne  : cf. Ga 2.9. –  dans le sanctuaire 7.15+. –  le nom de mon Dieu 14.1 ; 22.4. –  la ville de mon Dieu  : cf. Ez 48.35+. –  Jérusalem nouvelle (2.17+) 21.2ss ; cf. Es 51.1-3 ; 60 ; 62 ; 65.18-25 ; Ga 4.26 ; Hé 11.16 ; 12.22. –  mon nom nouveau 2.17+.'
  - type: text
    content: Le vainqueur, j'en ferai une colonne dans le sanctuaire de mon Dieu, et il n'en sortira jamais plus. J'écrirai sur lui le nom de mon Dieu et le nom de la ville de mon Dieu, la Jérusalem nouvelle qui descend du ciel d'auprès de mon Dieu, ainsi que mon nom nouveau.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 2.7+. –  l'Esprit dit 1Tm 4.1+.
  - type: text
    content: Que celui qui a des oreilles entende ce que l'Esprit dit aux Eglises !
  - type: heading
    content: Lettre à l'Eglise de Laodicée
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Laodicée 1.11n. –  l''amen 2Co 1.19-20n  ; cf. Dt 27.15n  ; Es 65.16n. –  le témoin fidèle… 1.5+. –  le commencement même  : c''est le terme qui, dans la Genèse (LXX), ouvre le récit de la création ( au commencement… ), souvent approfondi par la méditation juive et chrétienne ; il est probable que le texte joue sur les divers sens du terme grec correspondant (notamment commencement et principe ) ; cf. 21.6 ; 22.13 ; Gn 1.1n  ; Pr 8.22 ; Jn 1.1-3 ; Col 1.15-18 ; Hé 1.1-3 ; 1Jn 1.1ss ; le même mot est traduit par principat en Ep 1.21+. –  la création de Dieu Mc 10.6 ; 13.19 ; 2P 3.4.'
  - type: text
    content: 'A l''ange de l''Eglise de Laodicée, écris :'
  - type: text
    content: Voici ce que dit l’
  - type: text
    content: amen
  - type: text
    content: ', le témoin fidèle et vrai, le commencement même de la création de Dieu : '
  '15':
  - type: note
    content: 'Je connais… 2.2+. –  bouillant  : cf. Rm 12.11n  ; voir aussi Ap 22.11.'
  - type: text
    content: 'Je connais tes œuvres ; je sais bien que tu n''es ni froid ni bouillant. Si seulement tu étais froid ou bouillant ! '
  '16':
  - type: text
    content: 'Ainsi, parce que tu es tiède et que tu n''es ni bouillant ni froid, je vais te vomir de ma bouche. '
  '17':
  - type: note
    content: 'Je suis riche…  : cf. Os 12.9 ; Za 11.5 ; 1Co 4.8 ; Laodicée était un important centre commercial. –  misérable Rm 7.24. –  pitoyable 1Co 15.19. –  aveugle Jn 9.39ss ; 2P 1.9.'
  - type: text
    content: 'Parce que tu dis : « Je suis riche, je suis devenu riche, je n''ai besoin de rien », sans savoir que, toi-même, tu es misérable, pitoyable, pauvre, aveugle et nu, '
  '18':
  - type: note
    content: 'acheter  : cf. Es 55.1. –  or purifié (voir 1.15n) 1P 1.7. –  vêtements blancs… v. 4+. –  honte 16.15 ; cf. Gn 2.25 ; 3.7ss. – Laine et collyre étaient au nombre des productions locales qui faisaient la réputation de la ville.'
  - type: text
    content: 'je te conseille de m''acheter de l''or purifié par le feu, afin que tu deviennes riche, des vêtements blancs, afin que tu sois habillé et que la honte de ta nudité ne devienne pas manifeste, et un collyre pour t''en oindre les yeux, afin que tu voies. '
  '19':
  - type: note
    content: 'mes amis  : litt. ceux que j''aime (d''amitié), cf. Jn 11.5n. –  je les reprends… Pr 3.12 ; 1Co 11.32 ; Hé 12.6. –  Passionne-toi donc  : le terme peut évoquer la jalousie  ; c''est de lui que vient notre mot zèle  ; cf. Ex 20.5n  ; Rm 10.2n. –  change radicalement 2.5n.'
  - type: text
    content: 'Tous mes amis, moi, je les reprends et je les corrige. Passionne-toi donc, change radicalement ! '
  '2':
  - type: note
    content: 'Sois vigilant  : litt. deviens veillant, c.-à-d. mets-toi (et continue) à veiller 16.15 ; Mt 24.42/ /. –  affermis Lc 22.32 ; cf. Ez 34.4. –  sur le point de mourir  : cf. Jn 4.47.'
  - type: text
    content: 'Sois vigilant et affermis le reste qui est sur le point de mourir, car je n''ai pas trouvé tes œuvres pleinement accomplies devant mon Dieu. '
  '20':
  - type: note
    content: 'à la porte  : cf. Jc 5.9. –  m''entend (litt. entend ma voix ou mon bruit) / ouvre  : cf. Ct 5.2ss ; Lc 12.36 ; Jn 10.3+. –  je dînerai  : cf. Mt 26.26-29 ; Lc 22.20,29s ; Jn 14.23.'
  - type: text
    content: Je me tiens à la porte et je frappe. Si quelqu'un m'entend et ouvre la porte, j'entrerai chez lui, je dînerai avec lui et lui avec moi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'sur mon trône  : cf. 20.4 ; Mt 19.28. –  comme moi-même… 5.5s ; Mt 22.44+/ /.'
  - type: text
    content: Le vainqueur, je lui donnerai de s'asseoir avec moi sur mon trône, comme moi-même j'ai été vainqueur et je me suis assis avec mon Père sur son trône.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 2.7+. –  l'Esprit dit 1Tm 4.1+.
  - type: text
    content: Que celui qui a des oreilles entende ce que l'Esprit dit aux Eglises !
  '3':
  - type: note
    content: 'ce que tu as reçu…  : litt. comment tu as reçu… –  change radicalement 2.5n. –  comme un voleur 16.15 ; cf. Mt 24.43/ / ; 1Th 5.2ss ; 2P 3.10. –  te surprendre  : litt. sur toi  ; Sardes avait jadis été surprise par Cyrus.'
  - type: text
    content: 'Rappelle-toi donc ce que tu as reçu et entendu, garde-le et change radicalement. Si tu ne veilles pas, je viendrai comme un voleur et tu ne sauras pas du tout à quelle heure je viendrai te surprendre. '
  '4':
  - type: note
    content: 'tu en as quelques-uns  : litt. tu as quelques noms. –  souillé leurs vêtements  : cf. Jd 23 ; voir pur, impur. –  vêtements blancs v. 5,18 ; 4.4 ; 6.11 ; 7.9,13s ; 19.14 ; 22.14 ; cf. Dn 7.9 ; Mt 17.2/ / ; 28.3/ /.'
  - type: text
    content: Cependant, tu en as quelques-uns, à Sardes, qui n'ont pas souillé leurs vêtements ; ils marcheront avec moi en vêtements blancs, parce qu'ils en sont dignes.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'livre de la vie 13.8 ; 17.8 ; 20.12,15 ; 21.27 ; cf. Ex 32.32s ; Es 4.3 ; Ml 3.16 ; Ps 69.28s ; Dn 12.1 ; Lc 10.20n  ; Ph 4.3. –  je reconnaîtrai ( publiquement ) : autres traductions je confesserai (Mt 10.32ns ; 1Jn 1.9n) ; je célébrerai (verbe apparenté en Mt 11.25n). – Cf. Odes de Salomon 9.11s : « Tous ceux qui ont vaincu seront inscrits sur son Livre, lors leur livre est la victoire qui est vôtre, elle vous voit devant elle et veut que vous soyez saufs. »'
  - type: text
    content: Ainsi le vainqueur sera habillé de vêtements blancs ; je n'effacerai jamais son nom du livre de la vie, je reconnaîtrai son nom devant mon Père et devant ses anges.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Que celui… 2.7+.
  - type: text
    content: Que celui qui a des oreilles entende ce que l'Esprit dit aux Eglises !
  - type: heading
    content: Lettre à l'Eglise de Philadelphie
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Philadelphie 1.11n. –  Saint / Vrai 6.10 ; cf. 19.11 ; 1Jn 5.20n. –  qui a la clef de David… Es 22.22 ; voir aussi Ap 1.18 ; 5.5 ; Jb 12.14 ; Mt 16.19. –  de telle sorte que  : litt. et.'
  - type: text
    content: 'A l''ange de l''Eglise de Philadelphie, écris :'
  - type: text
    content: 'Voici ce que dit le Saint, le Vrai, celui qui a la clef de David, celui qui ouvre de telle sorte que personne ne ferme, celui qui ferme de telle sorte que personne n''ouvre : '
  '8':
  - type: note
    content: une porte ouverte Ac 14.27 ; 1Co 16.9 ; 2Co 2.12 ; Col 4.3. –  tu as gardé ma parole Jn 8.51+. –  pas renié 2.13.
  - type: text
    content: 'Je connais tes œuvres ; j''ai mis devant toi une porte ouverte que personne ne peut fermer, parce que tu as peu de puissance, que tu as gardé ma parole et que tu n''as pas renié mon nom. '
  '9':
  - type: note
    content: 'synagogue du Satan… 2.9+ ; voir démon, diable, Satan. – Voir juifs. –  qu''ils viennent… Es 45.14 ; 49.23 ; 60.14 ; 66.23 ; Ps 86.9. –  se prosterner à tes pieds  : autres traductions te rendre hommage ou t''adorer  ; même verbe 4.10 ; 5.14 ; 7.11 ; 9.20 ; 11.1,16 ; 13.4,8,12,15 ; 14.7,9,11 ; 15.4 ; 16.2 ; 19.4,10,20 ; 20.4 ; 22.8s ; Mt 2.2+ ; voir culte. –  je t''ai aimé ou je t''aime Es 43.4.'
  - type: text
    content: 'Je te donnerai des gens de la synagogue du Satan, qui se disent juifs et ne le sont pas : ils mentent. Je ferai en sorte qu''ils viennent se prosterner à tes pieds et qu''ils sachent que, moi, je t''ai aimé. '
