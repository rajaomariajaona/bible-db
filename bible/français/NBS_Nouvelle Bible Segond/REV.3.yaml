  - type: text
    text: 'A l''ange de l''Eglise de Philadelphie, écris :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Voici ce que dit le Saint, le Vrai, celui qui a la clef de David, celui qui ouvre de telle sorte que personne ne ferme, celui qui ferme de telle sorte que personne n''ouvre : '
