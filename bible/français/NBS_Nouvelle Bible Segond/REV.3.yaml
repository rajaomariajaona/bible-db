    marker-yv: yv-n
  - type: text
    text: 'Je connais tes œuvres ; j''ai mis devant toi une porte ouverte que personne ne peut fermer, parce que tu as peu de puissance, que tu as gardé ma parole et que tu n''as pas renié mon nom. '
