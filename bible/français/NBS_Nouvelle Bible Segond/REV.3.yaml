  - type: text
    text: 'Rappelle-toi donc ce que tu as reçu et entendu, garde-le et change radicalement. Si tu ne veilles pas, je viendrai comme un voleur et tu ne sauras pas du tout à quelle heure je viendrai te surprendre. '
