  - type: text
    text: 'Je te donnerai des gens de la synagogue du Satan, qui se disent juifs et ne le sont pas : ils mentent. Je ferai en sorte qu''ils viennent se prosterner à tes pieds et qu''ils sachent que, moi, je t''ai aimé. '
