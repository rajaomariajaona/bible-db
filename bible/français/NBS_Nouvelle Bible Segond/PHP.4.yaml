document_id: PHP.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'ma joie 1.4+. –  ma couronne 1Th 2.19s. –  tenez ferme  : autre traduction tenez-vous ainsi , cf. 1.27+ ; 1Co 6.13n. –  mes bien-aimés  : litt. bien-aimés.'
  - type: text
    content: C'est pourquoi, mes frères bien-aimés, vous pour qui j'ai une vive affection, vous qui êtes ma joie et ma couronne, tenez ferme dans le Seigneur, mes bien-aimés !
  - type: heading
    content: Réjouissez-vous dans le Seigneur
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Je me suis grandement réjoui ou je me réjouis grandement 2.25n  ; cf. 1.4+. –  voir enfin refleurir  : litt. voir que vous avez enfin fait refleurir . –  votre intérêt  : litt. votre penser , 1.7n  ; il s''agit ici du soutien matériel apporté à Paul par l''Eglise de Philippes ; cf. v. 15-18 ; 2.25-30 ; 2Co 11.8s.'
  - type: text
    content: 'Je me suis grandement réjoui, dans le Seigneur, de voir enfin refleurir votre intérêt pour moi. Cet intérêt, vous l''aviez bien, mais l''occasion vous manquait. '
  '11':
  - type: note
    content: 'en raison d''un manque  : v. 12 ; 2.30n  ; Mc 12.44n. –  j''ai appris  : cf. v. 12n  ; 2Co 11.23ss ; Hé 5.8n. –  à me contenter  : le contentement (terme apparenté en 1Tm 6.6n, qui a donné notre mot autarcie) faisait partie de l''idéal du sage dans le stoïcisme ; cf. Hé 13.5.'
  - type: text
    content: 'Je ne dis pas cela en raison d''un manque ; moi, en effet, j''ai appris à me contenter de l''état où je me trouve. '
  '12':
  - type: note
    content: 'Cf. 2Co 6.3-10. –  humblement ou dans l''abaissement, cf. 2.8n  ; ici l''expression évoque la pauvreté. –  abondance  : cf. 1.9,26. –  j''ai appris  : litt. j''ai été initié (verbe apparenté au terme habituellement traduit par mystère). –  faim 1Co 4.11. –  manque v. 11.'
  - type: text
    content: 'Je sais vivre humblement comme je sais vivre dans l''abondance. En tout et partout, j''ai appris à être rassasié et à avoir faim, à être dans l''abondance et à être dans le manque. '
  '13':
  - type: note
    content: 'Cf. 3.10,21 ; 2Co 12.9s ; Col 1.11 ; 2Tm 4.17 ; voir aussi Jn 15.5+ ; Sagesse 7.22s : « Il y a en elle (la Sagesse) un esprit intelligent, saint, unique, multiple… indépendant, bienfaisant, ami de l''homme, ferme, assuré, tranquille, qui peut tout, surveille tout, et pénètre tous les esprits. »'
  - type: text
    content: Je peux tout en celui qui me rend puissant.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'vous avez bien fait  : autre traduction vous avez eu la bonté de… , cf. Ac 10.33n. –  prendre part 1.5n,7 ; cf. Rm 12.13 ; Hé 10.33. –  détresse Rm 5.3+.'
  - type: text
    content: 'Cependant vous avez bien fait de prendre part à ma détresse. '
  '15':
  - type: note
    content: 'Philippiens  : cf. 2Co 6.11 ; Ga 3.1. –  au commencement 1.5 ; Ac 16ss. – Voir Eglise. –  ne m''a témoigné sa solidarité…  : litt. n''a eu part avec moi (1.5n) dans un compte (le terme signifie aussi parole) de dons et de recettes, expression commerciale ; cf. 4.10n  ; 1Co 9.11.'
  - type: text
    content: 'Vous le savez vous-mêmes, Philippiens, au commencement de la bonne nouvelle, quand j''ai quitté la Macédoine, aucune Eglise ne m''a témoigné sa solidarité en se mettant en compte avec moi ; vous avez été les seuls à le faire, '
  '16':
  - type: note
    content: 'à Thessalonique  : cf. Ac 17.1ss ; 1Th 2.9. –  plus d''une fois  : litt. et une fois et deux fois, même expression en 1Th 2.18 ; voir aussi 2Co 11.8s.'
  - type: text
    content: 'car à Thessalonique déjà, plus d''une fois, vous m''avez envoyé ce dont j''avais besoin. '
  '17':
  - type: note
    content: 'Ce n''est pas… 2Co 12.14. –  les dons  : litt. le don (au sens de la chose donnée). –  foisonne Rm 5.20n. –  fruit ou produit, cf. v. 19 ; 1.11,22n  ; Rm 15.27-28n.'
  - type: text
    content: 'Ce n''est pas que je recherche les dons ; ce que je recherche, c''est que foisonne le fruit porté à votre compte. '
  '18':
  - type: note
    content: 'Epaphrodite 2.25. –  parfum de bonne odeur  : cf. 2Co 2.14s ; Ep 5.2 ; voir aussi Gn 8.21 ; Ex 29.18 ; Ez 20.41. –  un sacrifice… agréé de lui  : cf. 2.17 ; Rm 12.1+ ; Hé 13.16 ; voir aussi Es 56.7 ; Siracide 35.4 : « Faire l''aumône, c''est offrir un sacrifice de louange. »'
  - type: text
    content: 'J''ai tout ce qu''il me faut et je suis dans l''abondance ; je suis comblé, ayant reçu par Epaphrodite ce qui vient de vous comme un parfum de bonne odeur, un sacrifice que Dieu accepte et qui est agréé de lui. '
  '19':
  - type: note
    content: 'Mon Dieu 1.3. –  dans la gloire  : autre traduction généreusement  ; on pourrait aussi traduire selon la richesse de sa gloire  ; cf. Rm 9.23+ ; Ep 1.7+.'
  - type: text
    content: 'Mon Dieu comblera tous vos besoins selon sa richesse, dans la gloire, en Jésus-Christ. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'J''encourage  : autres traductions j''exhorte ; je supplie  ; cf. 2.1 ; Phm 8-9n. –  Evodie / Syntyque  : noms féminins (cf. Ac 16.13ss ; Rm 16.1ss) qui signifient respectivement bonne voie et rencontre . –  être bien d''accord 2.2n.'
  - type: text
    content: 'J''encourage Evodie et j''encourage Syntyque à être bien d''accord dans le Seigneur. '
  '20':
  - type: note
    content: 1.11+ ; Rm 16.27+.
  - type: text
    content: 'A notre Dieu et Père la gloire à tout jamais ! '
  - type: text
    content: Amen !
  - type: heading
    content: Salutations finales
  '21':
  - type: text
    content: ' '
  - type: note
    content: Rm 1.7n.
  - type: text
    content: 'Saluez tous les saints en Jésus-Christ. Les frères qui sont avec moi vous saluent. '
  '22':
  - type: note
    content: 'ceux de la maison de César  : sans doute des esclaves ou des affranchis au service de César (= l''empereur), soit à Rome, soit dans une ville de province ; cf. 1.13n.'
  - type: text
    content: Tous les saints vous saluent, principalement ceux de la maison de César.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Ga 6.18+. – Certains mss ajoutent, avec diverses variantes, l''indication suivante  : Aux Philippiens, écrite de Rome [ d''Athènes , selon un ms] , par l''entremise d''Epaphrodite.'
  - type: text
    content: Que la grâce du Seigneur Jésus-Christ soit avec votre esprit !
  '3':
  - type: note
    content: 'fidèle  : terme apparenté à celui qui a été traduit par sincère en 2.19n  ; on le retrouve en 2Co 8.8 (sincérité) ; 1Tm 1.2 ; Tt 1.4 (véritable). –  collègue  : litt. qui est sous le même joug  ; certains pensent que le terme ainsi traduit serait en fait un nom propre (Syzygue), mais ce nom n''est attesté nulle part ailleurs. –  qui ont combattu 1.27+. –  collaborateurs 2.25+. –  dont les noms… Lc 10.20+ ; cf. Ps 69.29 ; Ap 3.5+.'
  - type: text
    content: Oui, toi aussi, fidèle collègue, je te demande de les aider, elles qui ont combattu côte à côte avec moi pour la bonne nouvelle, avec Clément et mes autres collaborateurs, dont les noms sont dans le livre de vie.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '1.4+ ; 3.1+. –  je le répète  : litt. je le dirai à nouveau.'
  - type: text
    content: 'Réjouissez-vous toujours dans le Seigneur ; je le répète, réjouissez-vous ! '
  '5':
  - type: note
    content: 'votre attitude conciliante  : autre traduction votre bienveillance  ; même terme en 1Tm 3.3 ; Tt 3.2 ; Jc 3.17 ; 1P 2.18 ; terme apparenté en Ac 24.4 ; 2Co 10.1 (bienveillance) ; un verbe proche est traduit par céder en Ga 2.5. –  Le Seigneur (3.20+) est proche  : cf. Ps 145.18 ; Mt 3.2n  ; Hé 10.37 ; Jc 5.8s ; 1P 4.7 ; Ap 3.11 ; 22.20 ; voir aussi 1Co 16.22n.'
  - type: text
    content: 'Que votre attitude conciliante soit connue de tous. Le Seigneur est proche. '
  '6':
  - type: note
    content: Ne vous inquiétez de rien Mt 6.25-34 ; 1P 5.7. –  par la prière… Rm 12.12+. –  des actions de grâces… 2Co 4.15+.
  - type: text
    content: 'Ne vous inquiétez de rien ; mais, en tout, par la prière et la supplication, avec des actions de grâces, faites connaître à Dieu vos demandes. '
  '7':
  - type: note
    content: 'la paix de Dieu… en Jésus-Christ  : cf. Jn 14.27 ; Col 3.15 ; voir aussi Es 26.3 ; Rm 5.1. –  qui surpasse toute pensée  : cf. 3.8n  ; Ep 3.20 ; 1Jn 3.19s. – Voir cœur. –  votre intelligence  : litt. vos pensées, de même 2Co 3.14 ; 4.4 ; 11.3 ; quelques mss portent vos corps.'
  - type: text
    content: Et la paix de Dieu, qui surpasse toute pensée, gardera votre cœur et votre intelligence en Jésus-Christ.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 12.2 ; 1Th 4.11 ; les termes ici énumérés correspondent aux listes de vertus courantes à l''époque de Paul, notamment dans les milieux influencés par la philosophie stoïcienne (cf. v. 11 ; Ac 17.18n  ; 1Co 8.6n). –  vrai ou véridique 2Co 6.8n. –  digne 1Tm 2.2+. – Voir juste . –  pur 1.17 ; 2Co 6.6. –  qui mérite l''approbation ou est recommandable, de bonne réputation 2Co 6.8. –  moralement bon 2P 1.3n,5. –  soit l''objet de vos pensées  : autre traduction possible soit porté à votre compte , cf. v. 17.'
  - type: text
    content: 'Au reste, mes frères, que tout ce qui est vrai, tout ce qui est digne, tout ce qui est juste, tout ce qui est pur, tout ce qui est aimable, tout ce qui mérite l''approbation, ce qui est moralement bon et digne de louange soit l''objet de vos pensées ; '
  '9':
  - type: note
    content: 3.17 ; 1Th 4.1 ; voir aussi 2Th 2.15. –  Dieu de la paix Rm 15.33+ ; 1Th 5.23.
  - type: text
    content: ce que vous avez appris, reçu, entendu et vu en moi, mettez-le en pratique. Et le Dieu de la paix sera avec vous.
  - type: heading
    content: Votre don, un sacrifice agréé de Dieu
