document_id: JHN.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'entretien de Jésus avec Nicodème
  - type: text
    content: ' '
  - type: note
    content: 'un chef  : le terme est aussi traduit par prince  : on le retrouve en 7.26,48 ; 12.31,42 ; 14.30 ; 16.11 ; voir Mt 9.18n,34n  ; voir aussi pharisiens et Juifs . –  Nicodème 7.48-52 ; 12.42s ; 19.39.'
  - type: text
    content: 'Or il y avait parmi les pharisiens un chef des Juifs du nom de Nicodème ; '
  '10':
  - type: note
    content: '9.30 ; cf. Rm 2.20s. –  maître (au sens d’enseignant) en Israël  : autre traduction le maître d''Israël. –  sais  : autre traduction connais.'
  - type: text
    content: 'Jésus lui répondit : C''est toi qui es maître en Israël, et tu ne sais pas cela ! '
  '11':
  - type: note
    content: Cf. v. 32 ; 5.19 ; 8.26,38,40 ; 15.15 ; 1Jn 1.1-3 ; voir aussi Lc 22.67+ ; 1Co 2.14.
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je te le dis, nous disons ce que nous savons, et nous témoignons de ce que nous avons vu ; et vous ne recevez pas notre témoignage. '
  '12':
  - type: note
    content: 'Cf. 1Co 15.40 ; Sagesse 9.16 : « Déjà nous avons peine à nous représenter les réalités terrestres, même ce qui est à notre portée, nous le découvrons avec effort. Mais les réalités célestes, qui les a explorées ? »'
  - type: text
    content: 'Si vous ne croyez pas alors que je vous ai parlé des choses terrestres, comment croirez-vous si je vous parle des choses célestes ? '
  '13':
  - type: note
    content: V. 31 ; 6.62 ; 20.17 ; cf. Dt 30.12 ; Pr 30.4 ; Rm 10.6 ; Ep 4.9s ; Ph 3.19. –  le Fils de l'homme 1.51+ ; certains mss ajoutent qui est au ciel.
  - type: text
    content: Personne n'est monté au ciel, sinon celui qui est descendu du ciel, le Fils de l'homme.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Nb 21.8-9+. –  élevé 8.28 ; 12.32,33ns ; cf. Es 52.13.
  - type: text
    content: 'Et comme Moïse éleva le serpent dans le désert, il faut, de même, que le Fils de l''homme soit élevé, '
  '15':
  - type: note
    content: 'Autre traduction  : pour que quiconque croit en lui ait la vie éternelle  ; certains mss reproduisent ici la formule du v. 16  : que quiconque met sa foi en lui ne se perde pas, mais ait… –  la vie éternelle  : autre traduction possible une vie éternelle  ; v. 16,36 ; 4.14,36 ; 5.24,39 ; 6.27,40,47,54,68 ; 10.28 ; 12.25,50 ; 17.2s ; cf. 1.4+ ; 10.10 ; 11.25s ; 20.31 ; Dn 12.2n.'
  - type: text
    content: 'pour que quiconque croit ait en lui la vie éternelle. '
  '16':
  - type: note
    content: 'Dieu a tant aimé Rm 5.8 ; 8.32 ; cf. Sagesse 11.24 : « Tu aimes tous les êtres et ne détestes aucune de tes œuvres : aurais-tu haï l''une d''elles, tu ne l''aurais pas créée. » –  son Fils unique  : cf. 1.14,18 ; Gn 22.2,16 ; Mt 21.37 ; 1Jn 4.9s. –  met sa foi ou croit 1.7n. –  ne se perde pas ou ne disparaisse pas, ne périsse pas  ; même verbe 6.12,27,39 ; 10.10n,28 ; 11.50 ; 12.25 ; 17.12 ; 18.9.'
  - type: text
    content: 'Car Dieu a tant aimé le monde qu''il a donné son Fils unique, pour que quiconque met sa foi en lui ne se perde pas, mais ait la vie éternelle. '
  '17':
  - type: note
    content: 'envoyé 5.30 ; 17.18,21 ; cf. Ga 4.4. –  pour juger 8.15 ; 12.47s ; cf. 5.22,27,30 ; Ac 17.31 ; voir aussi Lc 9.55n. –  que par lui le monde (1.10n) soit sauvé  : cf. 4.42 ; 5.34 ; 10.9 ; Lc 19.10 ; 2Co 5.19.'
  - type: text
    content: 'Dieu, en effet, n''a pas envoyé son Fils dans le monde pour juger le monde, mais pour que par lui le monde soit sauvé. '
  '18':
  - type: note
    content: Cf. v. 36 ; 5.24 ; Mc 16.16. –  mis sa foi (ou cru) dans le nom 1.7n,12n  ; cf. Ac 4.12. –  Fils unique v. 16+.
  - type: text
    content: 'Celui qui met sa foi en lui n''est pas jugé ; mais celui qui ne croit pas est déjà jugé, parce qu''il n''a pas mis sa foi dans le nom du Fils unique de Dieu. '
  '19':
  - type: note
    content: 'le jugement 5.29 ; 9.39 ; 12.31+. –  la lumière est venue… 1.4s,9-11 ; 8.12+ ; 9.5 ; 12.46. –  et les humains (autres traductions les hommes ; les gens) …  : cf. 9.39-41 ; 12.37-50. –  parce que leurs œuvres… 7.7 ; Col 1.21.'
  - type: text
    content: 'Et voici le jugement : la lumière est venue dans le monde, et les humains ont aimé les ténèbres plus que la lumière, parce que leurs œuvres étaient mauvaises. '
  '2':
  - type: note
    content: Cf. 9.16 ; Mt 22.16 ; Ac 2.22 ; 10.38. –  venu 5.43 ; 7.28 ; 12.27,47 ; 16.28 ; 18.37. –  produire les signes 2.23n.
  - type: text
    content: 'celui-ci vint le trouver de nuit et lui dit : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' nous savons que tu es un maître venu de la part de Dieu ; car personne ne peut produire les signes que, toi, tu produis, si Dieu n''est avec lui. '
  '20':
  - type: note
    content: dévoilées ou dénoncées  ; le même verbe est traduit par confondre en 8.46 ; 16.8 ; cf. Jb 24.13-17 ; Ep 5.8-13.
  - type: text
    content: 'Car quiconque pratique le mal déteste la lumière ; celui-là ne vient pas à la lumière, de peur que ses œuvres ne soient dévoilées ; '
  '21':
  - type: note
    content: 'qui fait, c.-à-d. qui accomplit, qui réalise ou qui agit selon la vérité  ; cf. 7.17 ; 1Jn 1.6n. –  la vérité 8.32+. –  pour qu''il soit manifeste… Mt 5.14-16. –  accomplies  : le verbe correspondant est apparenté au mot traduit par œuvres  ; cf. 17.6.'
  - type: text
    content: mais celui qui fait la vérité vient à la lumière, pour qu'il soit manifeste que ses œuvres ont été accomplies en Dieu.
  - type: heading
    content: Jésus et Jean le Baptiseur
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'en Judée  : litt. dans le pays (ou la terre ) de Judée 4.3 ; 7.3 ; 11.7. –  baptisait (précision absente des autres évangiles) 3.26 ; 4.1s.'
  - type: text
    content: Après cela, Jésus vint avec ses disciples en Judée ; là, il séjournait avec eux et il baptisait.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Enon ( Sources  ?) / Salim ( Paix  ?) : ces localités, dont il n''est pas question dans les autres évangiles, ne sont pas connues avec certitude ; depuis le IVe s. apr. J.-C. la tradition les a situées ou bien en Pérée (sur la rive est du Jourdain), près de la mer Morte, ou bien beaucoup plus au nord, sur le cours supérieur du Jourdain (sur la rive ouest, près de Beth-Shéân) ; une localisation est aussi possible en Samarie, près de Sichem (= Naplouse) ; cf. Mt 3.6. –  beaucoup d''eau  : d''autres comprennent beaucoup de points d''eau  ; cf. Ap 17.1.'
  - type: text
    content: 'Jean aussi baptisait à Enon, près de Salim, parce qu''il y avait là beaucoup d''eau ; les gens s''y rendaient pour recevoir le baptême. '
  '24':
  - type: note
    content: Mt 4.12+/ /.
  - type: text
    content: Car Jean n'avait pas encore été jeté en prison.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'un débat  : le terme grec est apparenté au verbe traduit par chercher en 1.38+. –  disciples de Jean Lc 7.18. –  un Juif  : plusieurs mss portent des Juifs (cf. 1.19n). –  purification 2.6+.'
  - type: text
    content: 'Or il y eut un débat entre les disciples de Jean et un Juif au sujet de la purification. '
  '26':
  - type: note
    content: 'Rabbi  : cf. v. 32 ; 1.38. –  témoignage 1.6-9,19-35. –  il baptise v. 22+.'
  - type: text
    content: 'Ils vinrent trouver Jean et lui dirent : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' celui qui était avec toi de l''autre côté du Jourdain et à qui, toi, tu as rendu témoignage, voici qu''il baptise et que tous viennent à lui. '
  '27':
  - type: note
    content: 'Cf. 6.65 ; 9.33 ; 19.11 ; Mt 28.18+ ; 1Co 4.7 ; Hé 5.4 ; Jc 1.17 ; Psaumes de Salomon 5.3s : « On ne peut s''emparer du butin d''un héros ; qui donc peut s''emparer de tout ce que tu as créé, si toi-même tu ne le donnes ? L''homme et son lot, tu les as mis dans la balance ; il ne peut ajouter à ce que tu lui as imparti. »'
  - type: text
    content: 'Jean répondit : Un homme ne peut recevoir que ce qui lui a été donné du ciel. '
  '28':
  - type: note
    content: 'vous m''êtes…  : certains mss portent seulement vous êtes… 1.20,30 ; cf. Mt 11.10. –  Christ  : voir onction.'
  - type: text
    content: 'Vous, vous m''êtes vous-mêmes témoins que j''ai dit : Moi, je ne suis pas le Christ, mais c''est devant lui que je suis envoyé. '
  '29':
  - type: note
    content: 'mariée / marié  : cf. Es 62.4s ; Ez 16.8 ; Os 2.21 ; 2Co 11.2 ; Ep 5.25-31 ; Ap 21.2 ; 22.17. –  ami du marié  : l''expression désigne ici l''homme choisi par le fiancé pour veiller au bon déroulement des noces ; cf. Mt 9.15/ / ; 25.1-12 ; Mc 2.19n (autre expression). –  qui l''écoute  : autre traduction qui l''entend. –  à entendre…  : litt. à cause de la voix (ou du bruit) du marié. –  joie… complète 15.11+.'
  - type: text
    content: 'Celui qui a la mariée, c''est le marié ; mais l''ami du marié qui se tient là et qui l''écoute éprouve une grande joie à entendre le marié ; cette joie, qui est la mienne, est donc complète. '
  '3':
  - type: note
    content: 'Amen, amen 1.51n  ; cf. Mt 5.18n. –  naît 1.13+. –  de nouveau  : le terme grec peut aussi signifier d''en haut, voir v. 7n. –  règne  : le même mot est traduit par royaume v. 5, royauté 18.36n  ; il ne revient pas ailleurs chez Jn, mais il trouve sans doute un équivalent dans l''expression vie éternelle, v. 15+ ; cf. Mt 3.2n.'
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je te le dis, si quelqu''un ne naît pas de nouveau, il ne peut voir le règne de Dieu.'
  '30':
  - type: note
    content: 'Cf. 2S 3.1. –  lui  : litt. celui-là, cf. 19.35n.'
  - type: text
    content: Il faut que lui croisse et que, moi, je diminue.
  - type: heading
    content: Celui qui vient d'en haut
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'd''en haut  : voir v. 3n  ; 8.23. –  est au-dessus de tous (ou de tout ) : dans certains mss cette proposition n''est pas répétée à la fin du v. ; cf. Rm 9.5. –  de la terre  : cf. 1Co 15.47 ; 1Jn 4.5. –  sa parole est de la terre  : litt. il parle de (au sens de  : depuis ) la terre . –  Celui qui vient du ciel v. 13+.'
  - type: text
    content: 'Celui qui vient d''en haut est au-dessus de tous ; celui qui est de la terre est de la terre, et sa parole est de la terre. Celui qui vient du ciel est au-dessus de tous, '
  '32':
  - type: note
    content: V. 11.
  - type: text
    content: 'il témoigne de ce qu''il a vu et entendu, et personne ne reçoit son témoignage. '
  '33':
  - type: note
    content: 'certifié  : litt. scellé. –  Dieu est vrai 7.28 ; 8.26 ; cf. 1Jn 5.10.'
  - type: text
    content: 'Celui qui a reçu son témoignage a certifié que Dieu est vrai ; '
  '34':
  - type: note
    content: 'envoyé / paroles 7.16 ; 8.26 ; 12.49 ; 14.24. –  parce qu''il donne l''Esprit  : on peut comprendre, ou bien Dieu donne l''Esprit, ou bien celui que Dieu a envoyé donne l''Esprit  ; cf. 1.32 ; 6.63 ; Ac 2.33.'
  - type: text
    content: 'car celui que Dieu a envoyé dit les paroles de Dieu, parce qu''il donne l''Esprit sans mesure. '
  '35':
  - type: note
    content: Le Père aime le Fils 5.20 ; 10.17 ; 15.9 ; 17.23-26 ; cf. 14.21 ; 16.27. –  tout remis 13.3 ; 17.2 ; Mt 11.27/ / ; 28.18+.
  - type: text
    content: 'Le Père aime le Fils et il a tout remis en sa main. '
  '36':
  - type: note
    content: 'Celui qui met sa foi… v. 15nss. –  qui refuse d''obéir  : autre traduction, selon l''étymologie, qui ne se laisse pas persuader par  ; cf. 1Jn 5.12. –  colère Mt 3.7 ; Rm 1.18 ; 2.8 ; Ep 2.3 ; 5.6. –  demeure  : cf. 9.41.'
  - type: text
    content: Celui qui met sa foi dans le Fils a la vie éternelle ; celui qui refuse d'obéir au Fils ne verra pas la vie, mais la colère de Dieu demeure sur lui.
  '4':
  - type: text
    content: 'Nicodème lui demanda : Comment un homme peut-il naître, quand il est vieux ? Peut-il entrer une seconde fois dans le ventre de sa mère pour naître ? '
  '5':
  - type: note
    content: 'd''eau et d''Esprit  : cf. Ez 36.25-27 ; Rm 6.3s ; 1Co 6.11 ; 12.13 ; Ep 5.26 ; Tt 3.5 ; 1P 1.3. –  entrer dans le royaume  : cf. Mt 5.20 ; 18.3.'
  - type: text
    content: 'Jésus lui répondit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je te le dis, si quelqu''un ne naît pas d''eau et d''Esprit, il ne peut entrer dans le royaume de Dieu. '
  '6':
  - type: note
    content: 'chair  : cf. 1.13n,14n  ; 1Co 15.50. –  chair / esprit 6.63 ; Mt 26.41/ / ; Rm 8.5-9 ; Ga 5.16 ; 6.8.'
  - type: text
    content: 'Ce qui est né de la chair est chair, et ce qui est né de l''Esprit est esprit. '
  '7':
  - type: note
    content: 'de nouveau – d''en haut  : ces deux expressions traduisent un seul mot grec (v. 3n) ; le texte joue sans doute ici sur ces deux sens, cf. v. 12s,31 ; 19.11,23 ; Mc 15.38/ / ; voir aussi Ga 4.9 (à nouveau) ; Jc 1.17+.'
  - type: text
    content: 'Ne t''étonne pas que je t''aie dit : Il faut que vous naissiez de nouveau – d''en haut. '
  '8':
  - type: note
    content: 'vent et Esprit traduisent un même mot grec, qui est aussi apparenté au verbe rendu par souffle(r). –  tu l''entends  : litt. tu entends son bruit (le même mot a aussi le sens de voix, 5.25 etc.). –  tu ne sais… 8.14 ; 14.17 ; Pr 30.4 ; Ec 11.5 ; Mc 4.27 ; 1Co 2.12ss ; 1Jn 3.2. Epître d''Ignace d''Antioche aux Philadelphiens 7.1 : « On ne trompe pas l''esprit, qui vient de Dieu. Car il sait d''où il vient et où il va, et il révèle les secrets (cf. 1Co 2.10ss). »'
  - type: text
    content: Le vent souffle où il veut ; tu l'entends, mais tu ne sais pas d'où il vient ni où il va. Il en est ainsi de quiconque est né de l'Esprit.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 1.34.
  - type: text
    content: 'Nicodème reprit : Comment cela peut-il advenir ? '
