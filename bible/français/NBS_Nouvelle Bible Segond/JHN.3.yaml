      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.16 : « Déjà nous avons peine à nous représenter les réalités terrestres, même ce qui est à notre portée, nous le découvrons avec effort. Mais les réalités célestes, qui les a explorées ? »'
      marker-yv: yv-n
    - type: text
      text: 'Si vous ne croyez pas alors que je vous ai parlé des choses terrestres, comment croirez-vous si je vous parle des choses célestes ? '
