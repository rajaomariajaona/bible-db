document_id: ECC.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Allons !…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.6 (paroles des impies) : « Allons ! Jouissons des biens présents et profitons de la création comme du temps de la jeunesse, avec ardeur. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vais te mettre à l'épreuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je vais goûter la joie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(comme on goûte une boisson). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu verras ce qu'est le bonheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vois le bonheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. v. 24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'futilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.2+.
      marker-yv: yv-n
    - type: text
      text: 'Je me suis dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Allons ! je vais te mettre à l'épreuve par la joie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu verras ce qu'est le bonheur.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eh bien, même cela n'est que futilité.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réclamé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'demandé. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'travail '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: peine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 11,18ss ; 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tout ce que mes yeux ont réclamé, je ne les en ai pas privés ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je n'ai refusé aucune joie à mon cœur ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car mon cœur se réjouissait de tout mon travail ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est la part qui m'est revenue de tout ce travail.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'futilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poursuite… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 17,26 ; 1.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'en résulte aucun avantage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'en reste rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 13 ; 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Et moi, je me suis retourné vers toutes les choses que mes mains avaient faites,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le travail pour lequel j''avais tant peiné :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout n'est que futilité et poursuite du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'en résulte aucun avantage sous le soleil.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que fera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que sera l''homme qui succédera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 18) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au roi ? Ce qu''on '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou, d''après certains mss, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce que lui, le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aura déjà fait de lui. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.9 ; voir aussi 1R 12.
      marker-yv: yv-n
    - type: text
      text: Et moi, je me suis retourné pour voir la sagesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la démence et la folie.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – En effet, que fera celui qui succédera au roi ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce qu'on a déjà fait. –
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''avantage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 1.3+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la sagesse…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il y a plus d'avantage à la sagesse qu'à la folie.
      marker-yv: yv-n
    - type: text
      text: 'Et moi, j''ai vu ceci : l''avantage de la sagesse l''emporte sur celui de la folie,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme l'avantage de la lumière sur celui des ténèbres ;
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans sa tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 10.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'stupide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 15s ; 4.5,13,17 ; 5.2s ; 6.8 ; 7.4ss ; 9.17 ; 10.2,12,15 ; voir aussi 1.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Pr 1.22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'marche dans les ténèbres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jb 12.25 ; Pr 4.19 ; Jn 8.12 ; 1Jn 2.10s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un même sort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.19ss.'
      marker-yv: yv-n
    - type: text
      text: le sage a des yeux pour voir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais l'homme stupide marche dans les ténèbres.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Pourtant je sais, moi, qu'un même sort les attend tous les deux.
  '15':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.8.
      marker-yv: yv-n
    - type: text
      text: 'Je me suis dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le sort de l'homme stupide m'attend, moi aussi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pourquoi aurai-je alors montré, moi, davantage de sagesse ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et je me suis dit que c'est là encore une futilité.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas de souvenir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 49.11 ; Pr 10.7 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.4 (paroles des impies) : « Notre nom sera oublié avec le temps et personne ne se rappellera nos actions. Notre vie aura passé comme un nuage, sans plus de traces, elle se dissipera telle la brume chassée par les rayons du soleil et abattue par sa chaleur. » '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '44.9 : « Il y en a aussi (les impies) dont il ne reste pas de souvenir ; ils ont péri comme s''ils n''avaient pas existé, ils sont comme s''ils n''avaient pas été. »'
      marker-yv: yv-n
    - type: text
      text: Car le sage ne laisse pas de souvenir pour toujours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas plus que l'homme stupide ;
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'à mesure que les jours passent, tout est oublié. Le sage meurt bel et bien comme l''homme stupide ! '
  '17':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'futilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'poursuite… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: J'ai donc détesté la vie, car pour moi l'œuvre qui se fait sous le soleil est mauvaise, puisque tout n'est que futilité et poursuite du vent.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui qui me succédera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.2 ; Ps 39.7 ; Lc 12.19s ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.19 : « Quand il se dit : “J''ai trouvé le repos, maintenant je vais manger de mes propres biens”, il ne sait pas combien de temps s''écoulera, puis il laissera ses biens à d''autres et il mourra. »'
      marker-yv: yv-n
    - type: text
      text: 'J''ai détesté tout le travail que j''ai fait sous le soleil, et que je dois laisser à celui qui me succédera. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui sait s''il sera sage ou fou ? Pourtant, il aura pouvoir sur tout le travail que j''ai fait avec sagesse sous le soleil ! C''est encore là une futilité. '
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Pr 14.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'A quoi bon ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'est-ce que cela fait ?
      marker-yv: yv-n
    - type: text
      text: 'Du rire j''ai dit : C''est de la démence !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et de la joie : A quoi bon ?'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: J'en suis venu à…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je me suis tourné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même en 7.25) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour désespérer mon cœur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'travail '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: J'en suis venu à me décourager de tout le travail que j'avais fait sous le soleil.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Y a-t-il quelqu''un qui a travaillé avec sagesse, connaissance et succès, voilà que sa part est donnée à quelqu''un qui n''y a pas travaillé. C''est encore là une futilité et un grand mal. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la préoccupation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la poursuite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(1.17) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de son cœur.
      marker-yv: yv-n
    - type: text
      text: 'En effet, que revient-il à l''être humain de tout le travail et de la préoccupation qu''il s''est donnés sous le soleil ? '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'contrariétés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'même la nuit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.16 ; Jb 7.1-4 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '40.5s : « Et au moment où l''on repose sur son lit, le sommeil de la nuit ne fait que varier les soucis. Un peu, un rien de repos, et aussitôt, dans ses rêves, il (l''homme) est à la peine, tout comme en plein jour, troublé par les visions de son cœur, il est comme un fuyard échappé du combat. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'a pas de repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne se couche pas.
      marker-yv: yv-n
    - type: text
      text: Tous ses jours ne sont que tourments, ses occupations contrariétés ; même la nuit son cœur n'a pas de repos. C'est encore là une futilité.
