document_id: ECC.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Allons !…  : cf. Sagesse 2.6 (paroles des impies) : « Allons ! Jouissons des biens présents et profitons de la création comme du temps de la jeunesse, avec ardeur. » –  je vais te mettre à l''épreuve  : on a aussi compris je vais goûter la joie (comme on goûte une boisson). –  tu verras ce qu''est le bonheur  : litt. vois le bonheur  ; cf. v. 24. –  futilité 1.2+.'
  - type: text
    content: 'Je me suis dit :'
  - type: text
    content: Allons ! je vais te mettre à l'épreuve par la joie,
  - type: text
    content: tu verras ce qu'est le bonheur.
  - type: text
    content: Eh bien, même cela n'est que futilité.
  '10':
  - type: text
    content: ' '
  - type: note
    content: réclamé ou demandé. –  travail ou peine  ; cf. v. 11,18ss ; 1.3n.
  - type: text
    content: Tout ce que mes yeux ont réclamé, je ne les en ai pas privés ;
  - type: text
    content: je n'ai refusé aucune joie à mon cœur ;
  - type: text
    content: car mon cœur se réjouissait de tout mon travail ;
  - type: text
    content: c'est la part qui m'est revenue de tout ce travail.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'futilité / poursuite… v. 17,26 ; 1.14n. –  il n''en résulte aucun avantage  : autre traduction il n''en reste rien  ; cf. v. 13 ; 1.3n.'
  - type: text
    content: Et moi, je me suis retourné vers toutes les choses que mes mains avaient faites,
  - type: text
    content: 'le travail pour lequel j''avais tant peiné :'
  - type: text
    content: tout n'est que futilité et poursuite du vent,
  - type: text
    content: il n'en résulte aucun avantage sous le soleil.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'que fera…  : autre traduction que sera l''homme qui succédera (cf. v. 18) au roi ? Ce qu''on (ou, d''après certains mss, ce que lui, le roi ) aura déjà fait de lui. Cf. 1.9 ; voir aussi 1R 12.'
  - type: text
    content: Et moi, je me suis retourné pour voir la sagesse,
  - type: text
    content: la démence et la folie.
  - type: text
    content: – En effet, que fera celui qui succédera au roi ?
  - type: text
    content: Ce qu'on a déjà fait. –
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'l''avantage (cf. 1.3+) de la sagesse…  : autre traduction il y a plus d''avantage à la sagesse qu''à la folie.'
  - type: text
    content: 'Et moi, j''ai vu ceci : l''avantage de la sagesse l''emporte sur celui de la folie,'
  - type: text
    content: comme l'avantage de la lumière sur celui des ténèbres ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'pour voir  : litt. dans sa tête  ; cf. 10.2. –  stupide v. 15s ; 4.5,13,17 ; 5.2s ; 6.8 ; 7.4ss ; 9.17 ; 10.2,12,15 ; voir aussi 1.17n  ; Pr 1.22+. –  marche dans les ténèbres Jb 12.25 ; Pr 4.19 ; Jn 8.12 ; 1Jn 2.10s. –  un même sort  : cf. 3.19ss.'
  - type: text
    content: le sage a des yeux pour voir,
  - type: text
    content: mais l'homme stupide marche dans les ténèbres.
  - type: text
    content: Pourtant je sais, moi, qu'un même sort les attend tous les deux.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 6.8.
  - type: text
    content: 'Je me suis dit :'
  - type: text
    content: Le sort de l'homme stupide m'attend, moi aussi ;
  - type: text
    content: pourquoi aurai-je alors montré, moi, davantage de sagesse ?
  - type: text
    content: Et je me suis dit que c'est là encore une futilité.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'pas de souvenir ou de nom  ; cf. 1.11n  ; Ps 49.11 ; Pr 10.7 ; cf. Sagesse 2.4 (paroles des impies) : « Notre nom sera oublié avec le temps et personne ne se rappellera nos actions. Notre vie aura passé comme un nuage, sans plus de traces, elle se dissipera telle la brume chassée par les rayons du soleil et abattue par sa chaleur. » Siracide 44.9 : « Il y en a aussi (les impies) dont il ne reste pas de souvenir ; ils ont péri comme s''ils n''avaient pas existé, ils sont comme s''ils n''avaient pas été. »'
  - type: text
    content: Car le sage ne laisse pas de souvenir pour toujours,
  - type: text
    content: pas plus que l'homme stupide ;
  - type: text
    content: 'à mesure que les jours passent, tout est oublié. Le sage meurt bel et bien comme l''homme stupide ! '
  '17':
  - type: note
    content: futilité / poursuite… 1.14n.
  - type: text
    content: J'ai donc détesté la vie, car pour moi l'œuvre qui se fait sous le soleil est mauvaise, puisque tout n'est que futilité et poursuite du vent.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui me succédera  : cf. v. 12n  ; 6.2 ; Ps 39.7 ; Lc 12.19s ; cf. Siracide 11.19 : « Quand il se dit : “J''ai trouvé le repos, maintenant je vais manger de mes propres biens”, il ne sait pas combien de temps s''écoulera, puis il laissera ses biens à d''autres et il mourra. »'
  - type: text
    content: 'J''ai détesté tout le travail que j''ai fait sous le soleil, et que je dois laisser à celui qui me succédera. '
  '19':
  - type: text
    content: 'Qui sait s''il sera sage ou fou ? Pourtant, il aura pouvoir sur tout le travail que j''ai fait avec sagesse sous le soleil ! C''est encore là une futilité. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. Pr 14.13. –  A quoi bon ? litt. qu'est-ce que cela fait ?
  - type: text
    content: 'Du rire j''ai dit : C''est de la démence !'
  - type: text
    content: 'et de la joie : A quoi bon ?'
  '20':
  - type: note
    content: 'J''en suis venu à…  : litt. je me suis tourné (de même en 7.25) pour désespérer mon cœur. –  travail 1.3n.'
  - type: text
    content: J'en suis venu à me décourager de tout le travail que j'avais fait sous le soleil.
  '21':
  - type: text
    content: 'Y a-t-il quelqu''un qui a travaillé avec sagesse, connaissance et succès, voilà que sa part est donnée à quelqu''un qui n''y a pas travaillé. C''est encore là une futilité et un grand mal. '
  '22':
  - type: note
    content: 'la préoccupation  : litt. la poursuite (1.17) de son cœur.'
  - type: text
    content: 'En effet, que revient-il à l''être humain de tout le travail et de la préoccupation qu''il s''est donnés sous le soleil ? '
  '23':
  - type: note
    content: 'contrariétés 1.18n. –  même la nuit 8.16 ; Jb 7.1-4 ; cf. Siracide 40.5s : « Et au moment où l''on repose sur son lit, le sommeil de la nuit ne fait que varier les soucis. Un peu, un rien de repos, et aussitôt, dans ses rêves, il (l''homme) est à la peine, tout comme en plein jour, troublé par les visions de son cœur, il est comme un fuyard échappé du combat. » –  n''a pas de repos  : litt. ne se couche pas.'
  - type: text
    content: Tous ses jours ne sont que tourments, ses occupations contrariétés ; même la nuit son cœur n'a pas de repos. C'est encore là une futilité.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '3.12s ; 5.17 ; 8.15 ; 9.7 ; 11.9 ; cf. 1R 4.20 ; 1Co 15.32 ; Siracide 14.14-16 : « Ne te prive pas du bonheur d''un jour, ne laisse pas échapper ta part d''une légitime satisfaction. Ne laisseras-tu pas à un autre le fruit de tes peines, celui de tes fatigues au partage du sort ? Donne, prends, et réjouis ton âme, car il n''y a pas, aux enfers, à rechercher le plaisir. » –  voir le bonheur  : expression analogue au v. 1 ; cf. 3.13 ; 6.6. –  dans son travail  : autre traduction par son travail . –  de Dieu  : litt. de la main de Dieu  ; le terme ’Elohim est ici (comme en 3.11,15 ; 4.17 ; 5.1 ; 8.12s etc.) précédé de l''article ; certains traduisent, d''une façon plus abstraite  : la Divinité.'
  - type: text
    content: Il n'y a de bon pour l'être humain que de manger, de boire et de voir le bonheur dans son travail ; moi, je l'ai vu, cela vient de Dieu.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'en dehors de moi  : autre traduction sans moi  ; on pourrait lire ce v. comme un oracle placé dans la bouche de Dieu ; certains mss et LXX portent sans lui  ; cf. Ac 17.28.'
  - type: text
    content: Qui donc peut manger et éprouver du plaisir, en dehors de moi ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'lui est agréable  : litt. (est) bon devant lui  ; de même dans la suite. – Voir pécheur. –  amasser, afin de donner  : cf. Jb 27.1s ; Pr 13.22. –  futilité / poursuite… 1.14n.'
  - type: text
    content: Car à celui qui lui est agréable, il donne la sagesse, la connaissance et la joie ; mais au pécheur il donne pour occupation de recueillir et d'amasser, afin de donner à celui qui est agréable à Dieu. Ce n'est encore là que futilité et poursuite du vent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai résolu…  : litt. j''ai exploré (cf. 1.13n) en mon cœur de traîner ma chair dans le vin ou de flatter ma chair par le vin. –  la folie ou la stupidité , voir 1.17n. –  humains v. 8n. –  le nombre des jours 5.17 ; 6.12 ; cf. Jb 14.5.'
  - type: text
    content: 'J''ai résolu de me faire plaisir avec le vin, tout en me conduisant avec sagesse, et de m''attacher à la folie jusqu''à ce que je voie s''il est bon pour les humains d''agir ainsi sous le soleil pendant le nombre des jours de leur vie. '
  '4':
  - type: note
    content: 'J''ai fait…  : litt. j''ai agrandi mes œuvres (même terme au v. 11). –  maisons  : cf. 1R 7.1-12. –  vignes  : cf. Ct 8.11s ; 1Ch 27.27.'
  - type: text
    content: 'J''ai fait de grandes choses :'
  - type: text
    content: je me suis bâti des maisons ;
  - type: text
    content: je me suis planté des vignes ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'parcs  : hébreu pardésim , apparenté à paradis  ; cf. Ct 4.13n ( verger ) ; Né 2.8n  ; voir aussi 2R 25.4.'
  - type: text
    content: je me suis fait des jardins et des parcs,
  - type: text
    content: et j'y ai planté toutes sortes d'arbres fruitiers ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'réservoirs  : cf. Né 2.14 ; 3.15. –  une pépinière de jeunes arbres  : litt. une forêt faisant pousser des arbres.'
  - type: text
    content: je me suis fait des réservoirs
  - type: text
    content: pour arroser de leur eau une pépinière de jeunes arbres.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'des esclaves et des servantes  : autre traduction des esclaves, hommes et femmes  ; cf. Gn 12.16n. –  leurs fils nés dans la maison  : litt. des fils de maison , ce qui pourrait aussi signifier des domestiques  ; cf. Ex 21.4.'
  - type: text
    content: J'ai acheté des esclaves et des servantes,
  - type: text
    content: et leurs fils nés dans la maison ;
  - type: text
    content: j'ai possédé du gros bétail et du petit bétail en abondance,
  - type: text
    content: plus que tous ceux qui étaient avant moi à Jérusalem.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 9.28–10.29. –  J''ai acquis  : litt. je me suis fait  ; cf. Gn 12.5n. –  délices  : cf. Ct 7.7. –  hommes  : litt. fils de l''homme  ; la même expression est rendue par humains au v. 3 ; cf. 1.13n. –  beaucoup de femmes  : litt. une femme et des femmes , mais le mot hébreu n''apparaît qu''ici et la traduction est incertaine ; on a aussi proposé sommelière(s), coffret(s) remplis d''objets de luxe ; voir cependant 7.28 ; 9.9 ; 1R 11.3 ; Ct 6.8.'
  - type: text
    content: J'ai aussi amassé de l'argent et de l'or,
  - type: text
    content: de précieux trésors des rois et des provinces.
  - type: text
    content: J'ai acquis des chanteurs et des chanteuses,
  - type: text
    content: et, délices des hommes, beaucoup de femmes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Je suis devenu grand… 1.16n. –  ma sagesse demeurait v. 3.
  - type: text
    content: Je suis devenu grand, j'ai surpassé tous ceux qui étaient avant moi à Jérusalem,
  - type: text
    content: et ma sagesse demeurait avec moi.
