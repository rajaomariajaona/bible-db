    marker-yv: yv-n
  - type: text
    text: 'Je regardai, et j''entendis un aigle qui volait au milieu du ciel et qui disait d''une voix forte : Quel malheur, quel malheur, quel malheur pour les habitants de la terre, à cause des autres sons de trompette que les trois anges vont faire retentir !'
