document_id: REV.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le septième sceau et l'encensoir d'or
  - type: text
    content: ' '
  - type: note
    content: silence Ha 2.20 ; So 1.7 ; Za 2.17.
  - type: text
    content: Quand il ouvrit le septième sceau, il y eut dans le ciel un silence d'environ une demi-heure.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ange / trompette v. 2+. –  étoile 9.1 ; 12.4 ; cf. Es 14.12 ; Dn 8.10 ; 1 Hénoch 86.1 (description allégorique du premier des anges déchus) : « J''ai vu le ciel en haut, et voici qu''un astre tomba du ciel. » –  fleuves / sources 16.4.'
  - type: text
    content: 'Le troisième ange sonna de la trompette. Une grande étoile tomba du ciel, brûlant comme un flambeau. Elle tomba sur le tiers des fleuves et sur les sources des eaux. '
  '11':
  - type: note
    content: 'Absinthe  : cf. Dt 29.17 ; Jr 9.14 ; 23.15 ; Am 5.7 ; 6.12 ; Pr 5.4 ; l''absinthe passait, dans la littérature juive, pour une plante vénéneuse. –  amères Ex 15.23. Cf. 4 Esdras 5.9 : « Les eaux douces deviendront salées. Les amis se combattront entre eux. La raison disparaîtra et l''intelligence fuira dans sa demeure. »'
  - type: text
    content: Le nom de cette étoile est Absinthe ; le tiers des eaux fut changé en absinthe et beaucoup d'humains moururent de ces eaux devenues amères.
  '12':
  - type: text
    content: ' '
  - type: note
    content: ange / trompette v. 2+. –  soleil… 6.12+,13 ; cf. Ex 10.21-23 ; Am 8.9.
  - type: text
    content: Le quatrième ange sonna de la trompette. Le tiers du soleil fut frappé, ainsi que le tiers de la lune et le tiers des étoiles, pour que le tiers en soit obscurci, et que le jour perde un tiers de sa clarté, et la nuit de même.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4 Esdras 14.15ss : « Car des maux bien pires que ceux que tu as vécus doivent encore arriver ; plus le monde vieillira et plus les maux s''y multiplieront sur ses habitants. Car la vérité s''éloignera davantage et le mensonge s''approchera. Déjà se hâte de venir l''aigle que tu as vu en vision. » –  volait au milieu du ciel 14.6. –  Quel malheur… 9.12 ; 11.14 (sept fois en tout) ; 12.12 ; 18.10,16,19 (encore sept fois) ; voir Mt 11.21n. –  habitants… 3.10+. –  autres sons 9.1,13 ; 11.15.'
  - type: text
    content: 'Je regardai, et j''entendis un aigle qui volait au milieu du ciel et qui disait d''une voix forte : Quel malheur, quel malheur, quel malheur pour les habitants de la terre, à cause des autres sons de trompette que les trois anges vont faire retentir !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'V. 6,7,8,10,12 ; 9.1,13 ; 10.7 ; 11.15. –  devant Dieu  : cf. 1.4 ; 4.5 ; Tobit 12.15 : « Je suis Raphaël, l''un des sept anges qui se tiennent devant la gloire du Seigneur et pénètrent en sa présence. » –  trompettes  : cf. Mt 24.31 ; 1Co 15.20 ; 1Th 4.16 ; voir aussi Jos 6.4-6.'
  - type: text
    content: Je vis les sept anges qui se tiennent devant Dieu ; sept trompettes leur furent données.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Un autre ange 10.1 ; 18.1. –  sur l''autel 6.9+ ; cf. Am 9.1 ; il s''agit sans doute ici de l''autel de l''encens, peut-être distinct de celui du v. 5 (Ex 30.1-10). –  encensoir  : le terme grec est apparenté au mot traduit par encens en 18.13 ; le mot traduit ici (et au v. 4) et en 5.8 par encens sera rendu par parfums en 18.13. –  encens / prières 5.8+ ; cf. Ps 141.2 ; Tobit 12.12 : « Lorsque tu (Tobit) as prié, ainsi que Sara, c''est moi (Raphaël) qui ai présenté le mémorial de votre prière en présence de la gloire du Seigneur. »'
  - type: text
    content: 'Un autre ange vint se placer sur l''autel ; il tenait un encensoir d''or. On lui donna beaucoup d''encens pour qu''il l''offre avec les prières de tous les saints sur l''autel d''or, devant le trône. '
  '4':
  - type: text
    content: 'La fumée de l''encens monta de la main de l''ange avec les prières des saints, devant Dieu. '
  '5':
  - type: note
    content: 'feu  : cf. Lv 16.12 ; Ez 10.2. –  de l''autel 6.9+ ; cf. 8.3n. –  tonnerres… 4.5+. –  tremblement de terre 11.13,19 ; cf. Es 29.6.'
  - type: text
    content: L'ange prit ensuite l'encensoir, le remplit du feu de l'autel et le jeta sur la terre ; il y eut des tonnerres, des voix, des éclairs et un tremblement de terre.
  - type: heading
    content: Les six premières trompettes
  '6':
  - type: text
    content: ' '
  - type: note
    content: V. 2+.
  - type: text
    content: Alors les sept anges qui tenaient les sept trompettes se préparèrent à en sonner.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 9.23-26 ; Ez 38.22 ; Jl 3.3 ; Siracide 39.29 : « Feu, grêle, famine, mort, tout cela a été créé pour le châtiment. » –  Le tiers  : cf. 6.8 ; voir aussi 8.8-12 ; 9.15,18 ; Ez 5.2,12 ; Za 13.9.'
  - type: text
    content: Le premier sonna de la trompette. Il y eut de la grêle et du feu mêlés de sang, qui furent jetés sur la terre. Le tiers de la terre fut brûlé, le tiers des arbres fut brûlé, et toute herbe verte fut brûlée.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ange / trompette v. 2+. –  montagne embrasée (litt. embrasée par le feu ) : cf. Jr 51.25 ; 1 Hénoch 18.13 : « J''y ai vu (dans le “gouffre béant” réservé aux astres infidèles, c.-à-d. aux anges déchus) sept astres pareils à de grandes montagnes embrasées. » 21.3 : « Là, j''ai observé sept des astres du ciel qui y avaient été précipités et enchaînés, pareils à de grandes montagnes, et qui brûlaient dans le feu. » –  mer / sang 11.6 ; 16.3s ; cf. Ex 7.17-21.'
  - type: text
    content: 'Le deuxième ange sonna de la trompette. Une sorte de grande montagne embrasée fut jetée dans la mer. Le tiers de la mer devint du sang, '
  '9':
  - type: note
    content: 'souffle de vie  : litt. des vies (c''est le terme grec traduit par âme en Mt 10.28n  ; cf. Ap 16.3n).'
  - type: text
    content: le tiers des créatures qui étaient dans la mer et qui avaient souffle de vie mourut, et le tiers des bateaux périt.
