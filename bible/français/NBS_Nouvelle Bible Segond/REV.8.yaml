    marker-yv: yv-n
  - type: text
    text: Le quatrième ange sonna de la trompette. Le tiers du soleil fut frappé, ainsi que le tiers de la lune et le tiers des étoiles, pour que le tiers en soit obscurci, et que le jour perde un tiers de sa clarté, et la nuit de même.
