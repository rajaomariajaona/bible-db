      - type: text
        text: '12.12 : « Lorsque tu (Tobit) as prié, ainsi que Sara, c''est moi (Raphaël) qui ai présenté le mémorial de votre prière en présence de la gloire du Seigneur. »'
    marker-yv: yv-n
  - type: text
    text: 'Un autre ange vint se placer sur l''autel ; il tenait un encensoir d''or. On lui donna beaucoup d''encens pour qu''il l''offre avec les prières de tous les saints sur l''autel d''or, devant le trône. '
