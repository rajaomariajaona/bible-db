        children:
        - type: text
          text: Esdras
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.9 : « Les eaux douces deviendront salées. Les amis se combattront entre eux. La raison disparaîtra et l''intelligence fuira dans sa demeure. »'
    marker-yv: yv-n
  - type: text
    text: Le nom de cette étoile est Absinthe ; le tiers des eaux fut changé en absinthe et beaucoup d'humains moururent de ces eaux devenues amères.
