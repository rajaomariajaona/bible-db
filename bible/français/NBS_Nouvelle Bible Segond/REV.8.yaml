  - type: text
    text: Le premier sonna de la trompette. Il y eut de la grêle et du feu mêlés de sang, qui furent jetés sur la terre. Le tiers de la terre fut brûlé, le tiers des arbres fut brûlé, et toute herbe verte fut brûlée.
