    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 29.17 ; Jr 9.14 ; 23.15 ; Am 5.7 ; 6.12 ; Pr 5.4 ; l''absinthe passait, dans la littérature juive, pour une plante vénéneuse. –  '
    - type: usfm
