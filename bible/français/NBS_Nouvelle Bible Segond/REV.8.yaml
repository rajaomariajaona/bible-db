      - type: text
        text: '4 Esdras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.15ss : « Car des maux bien pires que ceux que tu as vécus doivent encore arriver ; plus le monde vieillira et plus les maux s''y multiplieront sur ses habitants. Car la vérité s''éloignera davantage et le mensonge s''approchera. Déjà se hâte de venir l''aigle que tu as vu en vision. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'volait au milieu du ciel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quel malheur… '
    - type: usfm
      marker: ft
