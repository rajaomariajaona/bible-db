document_id: JOB.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : un tyran implacable'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: le souffle ou l'esprit  ; cf. 34.14s ; Nb 16.22 ; 27.16 ; Dn 5.23.
  - type: text
    content: Il tient dans sa main la vie de tout être,
  - type: text
    content: le souffle de toute chair d'homme.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 34.3. –  discerne 7.18n.
  - type: text
    content: L'oreille ne discerne-t-elle pas les propos,
  - type: text
    content: comme le palais goûte la nourriture ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: '8.8+. –  la longueur des jours  : cf. Ps 21.5+.'
  - type: text
    content: Chez les vieillards se trouve la sagesse,
  - type: text
    content: dans la longueur des jours l'intelligence.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Es 11.2 ; Pr 8.14. –  chez lui ou avec lui , c.-à-d. Dieu.
  - type: text
    content: C'est chez lui que résident la sagesse et la puissance.
  - type: text
    content: C'est à lui qu'appartiennent le conseil et l'intelligence.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 127.1 ; cf. Es 22.22 ; Ap 3.7. –  rase (ou renverse, démolit ) / rebâtir  : cf. Ps 28.5.'
  - type: text
    content: Si c'est lui qui rase, on ne peut rebâtir ;
  - type: text
    content: si c'est lui qui enferme un homme, on ne peut ouvrir.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'retournent  : autres traductions ravagent, détruisent  ; cf. 28.5 ; 37.12 ( faire tournoyer ) ; Gn 19.21n.'
  - type: text
    content: S'il retient les eaux, tout se dessèche ;
  - type: text
    content: s'il les lâche, elles retournent la terre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1R 22.23. –  raison 5.12n.
  - type: text
    content: C'est chez lui que résident la force et la raison ;
  - type: text
    content: c'est à lui qu'appartiennent celui qui s'égare et celui qui égare les autres.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.11+ ; Lc 1.52. –  nu-pieds  : autres traductions dépouillés, captifs, privés de leurs insignes (de même au v. 19 ; cf. Mi 1.8) ; certains modifient ici le texte hébreu traditionnel pour lire il rend les conseillers stupides.'
  - type: text
    content: Il fait aller nu-pieds les conseillers ;
  - type: text
    content: il trouble la raison des juges.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Il desserre…  : litt. il fait ouvrir l''instruction des rois . En lisant différemment le mot correspondant à instruction (ou correction , cf. 4.3n  ; 5.17 ; 20.3 ; 36.10 ; 40.2 ; Pr 1.2n) on pourrait aussi comprendre  : il détache la ceinture des rois (signe de pouvoir) ; il leur met un pagne autour des reins (signe d''humiliation) ; cf. Es 32.11 ; Dn 2.21.'
  - type: text
    content: Il desserre l'emprise des rois ;
  - type: text
    content: il leur passe une ceinture autour des reins.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'nu-pieds v. 17n. –  les autorités les plus stables  : cette expression traduit un mot hébreu qui désigne les cours d''eau pérennes (par opposition à ceux de 6.15n  ; même terme en Ps 74.15, voir aussi Dt 21.4n).'
  - type: text
    content: Il fait aller nu-pieds les prêtres ;
  - type: text
    content: il renverse les autorités les plus stables.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'C''est vrai…  : affirmation ironique. –  le genre humain  : litt. le peuple.'
  - type: text
    content: C'est vrai que le genre humain, c'est vous,
  - type: text
    content: et qu'avec vous doit mourir la sagesse !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'discernement  : le terme peut désigner le sens du goût  ; même terme en 6.6 ; cf. Ps 34.1n.'
  - type: text
    content: Il retire la parole aux gens les plus sûrs ;
  - type: text
    content: il enlève le discernement aux vieillards.
  '21':
  - type: text
    content: ' '
  - type: note
    content: mépris / nobles Ps 107.40. –  relâche le ceinturon Es 45.1. –  des puissants ou des notables , traduction incertaine (par comparaison avec l'arabe ou l'araméen) ; le même terme hébreu, ou un homonyme, désigne le lit d'un oued en 6.15n  ; voir aussi 40.18n  ; 41.7n.
  - type: text
    content: Il répand le mépris sur les nobles ;
  - type: text
    content: il relâche le ceinturon des puissants.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'amène  : litt. fait sortir . –  l''ombre de mort 3.5n.'
  - type: text
    content: Il met à découvert les profondeurs des ténèbres,
  - type: text
    content: il amène l'ombre de mort à la lumière.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 17.26. –  il les fait revenir  : autres traductions il les conduit ; il les égare  ; le même verbe est traduit par guider en 31.18.'
  - type: text
    content: Il fait croître les nations et il les fait disparaître ;
  - type: text
    content: il étend au loin les nations et il les fait revenir.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Il retire l''intelligence…  : litt. il égare le cœur des chefs (le mot a aussi le sens de tête ) du peuple de la terre (ou du pays ). –  chaos sans chemin Ps 107.40 (même expression hébraïque).'
  - type: text
    content: Il retire l'intelligence aux chefs des peuples de la terre,
  - type: text
    content: il les fait errer dans un chaos sans chemin
  '25':
  - type: text
    content: 'et tâtonner dans les ténèbres, sans lumière :'
  - type: text
    content: il les fait errer comme des gens ivres.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'd''intelligence  : litt. un cœur . –  je ne vous suis pas inférieur  : litt. je ne tombe pas en deçà de (ou plus bas que ) vous , de même en 13.2 ; cf. 2Co 11.5. –  Qui d''ailleurs pourrait ignorer  : litt. avec (ou chez ) qui n''y a-t-il pas.'
  - type: text
    content: J'ai autant d'intelligence que vous,
  - type: text
    content: je ne vous suis pas inférieur.
  - type: text
    content: Qui d'ailleurs pourrait ignorer des choses comme celles-là ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'de ses amis  : litt. de son compagnon  ; certains modifient le texte hébreu traditionnel, d''après Syr, pour lire il est la risée de ses amis, l''homme qui invoque Dieu…  ; cf. 17.6 ; 30.1 ; Ps 22.8 ; Mt 27.41/ /. –  intègre 1.1+.'
  - type: text
    content: Je suis l'homme qui est la risée de ses amis,
  - type: text
    content: quand il invoque Dieu pour qu'il lui réponde ;
  - type: text
    content: le juste, l'homme intègre, un objet de risée !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Au malheur le mépris…  : traduction incertaine ; on pourrait aussi comprendre  : une torche de mépris pour la pensée des gens satisfaits… ( ?). –  c''est un coup ou c''est ce qui est préparé . La traduction grecque est très différente ( il est prêt à tomber au temps fixé sous d''autres maisons et à être pillé par les impies ).'
  - type: text
    content: Au malheur le mépris ! Voilà l'opinion des gens satisfaits,
  - type: text
    content: c'est un coup pour ceux qui chancellent sur leurs jambes.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.7 ; Jr 12.1s ; Ml 3.15 ; Ps 73.1-12. –  sécurité  : autre traduction confiance . –  quiconque met Dieu dans sa main  : litt. pour celui qui fait venir Dieu (hébreu ’Eloah , 3.4n) dans sa main , ce qui pourrait signifier qui dispose de Dieu à son gré (par la magie), ou bien pour celui à qui Dieu fait venir dans sa main , c.-à-d. à qui Dieu donne le pouvoir ou la richesse ( ?).'
  - type: text
    content: Il y a insouciance sous la tente des pillards,
  - type: text
    content: sécurité pour ceux qui irritent Dieu,
  - type: text
    content: pour quiconque met Dieu dans sa main.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 35.11 ; 38.39–39.30 ; Mt 6.26.
  - type: text
    content: 'Mais interroge les bêtes, je te prie : elles te l''enseigneront,'
  - type: text
    content: demande aux oiseaux du ciel, ils te le diront ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'parle à la terre  : autre traduction médite au sujet de la terre  ; certains modifient le texte hébreu traditionnel pour lire aux animaux de la terre (ou aux animaux sauvages ).'
  - type: text
    content: parle à la terre, elle te l'enseignera ;
  - type: text
    content: et les poissons de la mer te le raconteront.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'du Seigneur  : c''est le seul endroit des dialogues poétiques de Job où le nom YHWH est prononcé. Quelques mss portent Dieu ( ’Eloah , cf. 3.4n).'
  - type: text
    content: Qui ne sait, parmi eux tous,
  - type: text
    content: 'que c''est la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui a fait tout cela ?'
