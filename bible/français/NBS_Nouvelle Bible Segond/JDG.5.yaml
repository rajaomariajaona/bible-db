document_id: JDG.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le chant de Débora
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 15 ; l'ensemble du poème présente de nombreuses difficultés de traduction.
  - type: text
    content: 'En ce jour-là, Débora chanta avec Baraq, fils d''Abinoam :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'des ânesses blanches (ou fauves ) : les ânes étaient alors les montures de personnages importants, cf. 10.4+ ; Gn 49.11 ; Nb 22.21ss. –  réfléchissez  : autre traduction racontez  ; certains modifient le texte hébreu traditionnel pour lire chantez.'
  - type: text
    content: Vous qui montez des ânesses blanches,
  - type: text
    content: vous qui êtes assis sur des tapis,
  - type: text
    content: vous qui marchez sur la route, réfléchissez !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'les porteurs d''eau  : traduction incertaine (litt. les distributeurs  ?) ; autres possibilités les bergers ; les archers ; ceux qui répartissent le butin  ; autre traduction plus fort que les cris des porteurs d''eau… qu''on célèbre… –  ce que le Seigneur a fait pour la justice  : pluriel du mot habituellement traduit par justice  ; autres traductions les exploits, les hauts faits, les victoires du Seigneur  ; cf. 1S 12.7 ; Es 33.15n  ; Jr 51.10n  ; Ez 3.20+ ; Mi 6.5n  ; Ps 103.6n  ; Dn 9.16,18. –  ce qu''il a fait… à la tête  : autres traductions ce que son commandement (ou ses chefs , ou encore sa puissance ) a fait pour la justice en Israël ; ses victoires pour les villes ouvertes d''Israël (cf. v. 7n) ; il a libéré Israël, il a mis Israël au large . –  aux portes des villes  : litt. aux portes , cf. Gn 22.17n  ; Dt 16.18n  ; Ps 127.5.'
  - type: text
    content: Que par leurs cris les porteurs d'eau, entre les abreuvoirs,
  - type: text
    content: 'célèbrent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait pour la justice,'
  - type: text
    content: ce qu'il a fait pour la justice à la tête d'Israël !
  - type: text
    content: 'Alors le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est descendu aux portes des villes.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'V. 1 ; 4.4n,6n. –  entonne  : le verbe hébreu (litt. parle ) fait assonance avec le nom de Débora . –  Emmène tes captifs  : autres traductions ramène tes captifs ; rétablis ta situation  ; cf. Dt 30.3n  ; certains, d''après Syr, modifient légèrement le texte hébreu traditionnel pour lire emmène captif celui qui te tient captif.'
  - type: text
    content: Eveille-toi, éveille-toi, Débora !
  - type: text
    content: Eveille-toi, éveille-toi, entonne un chant !
  - type: text
    content: Lève-toi, Baraq !
  - type: text
    content: Emmène tes captifs, fils d'Abinoam !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. La traduction, conjecturale, s''appuie notamment sur certains mss de LXX ; le texte hébreu traditionnel porte, notamment, dominer au lieu de descendre et pour moi au lieu de pour lui. Le mot traduit par des survivants (ou un survivant ) est aussi le nom propre d''une famille et d''un village de Zabulon ( Sarid , cf. Jos 19.10,12 ; ou Séred , Gn 46.14 ; Nb 26.26). –  héros  : autres traductions hommes vaillants ; guerriers  ; mêmes possibilités au v. 23.'
  - type: text
    content: Alors des survivants sont descendus vers les braves,
  - type: text
    content: 'le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est descendu pour lui à la rencontre des héros.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ephraïm Jos 16. –  la racine même est en Amalec , ou peut-être contre Amalec  ; certains modifient le texte hébreu traditionnel en lisant le commandement au lieu de la racine  ; d''après des versions anciennes, d''autres lisent dans la vallée au lieu de en Amalec  ; en tout cas la traduction est incertaine (cf. 3.13+ ; voir 12.15n). –  Benjamin Jos 18.11-28. –  tes troupes  : litt. tes peuples . –  Makir , clan de Manassé (Gn 50.23n) ; habituellement situé en Transjordanie (Nb 26.29+ ; 32.39 ; Jos 17.1ss), il apparaît ici parmi des tribus cisjordaniennes. –  des commandants  : cf. v. 9n  ; autre traduction le bâton de commandement , Gn 49.10n. –  Zabulon 1.30. –  ceux qui tiennent…  : on a aussi compris  : des recruteurs, avec le bâton…  ; cf. 4.6n. Le mot traduit par bâton est rendu par sceptre en Gn 49.10 ; au lieu de bâton du scribe on a aussi compris bâton de commandement ; sceptre de bronze.'
  - type: text
    content: D'Ephraïm, la racine même est en Amalec.
  - type: text
    content: Derrière toi, Benjamin est parmi tes troupes.
  - type: text
    content: De Makir, des commandants sont descendus,
  - type: text
    content: et de Zabulon ceux qui tiennent le bâton du scribe.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ruisseaux  : cf. Jb 20.17 ; autre traduction divisions (terme voisin en 2Ch 35.5) ; même possibilité au v. 16. –  résolutions (ou, peut-être, interrogations ) du cœur  : cf. v. 16 ; on comprend habituellement cette expression dans un sens ironique (en fait Ruben n''a pas participé à la guerre), en parallèle avec les reproches du v. 17.'
  - type: text
    content: Les princes d'Issacar sont avec Débora.
  - type: text
    content: Issacar tient pour Baraq ;
  - type: text
    content: il a été envoyé sur ses pas dans la vallée.
  - type: text
    content: Près des ruisseaux de Ruben,
  - type: text
    content: grandes furent les résolutions du cœur !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'entre les parcs  : traduction incertaine ; on a aussi compris entre les deux charges du bât ; assis sur ton arrière-train  ; cf. Gn 49.14n  ; voir aussi Ps 68.14. –  des bergers  : litt. des troupeaux  ; autre traduction les flûtes des bergers.'
  - type: text
    content: Pourquoi es-tu resté entre les parcs
  - type: text
    content: à écouter le sifflement des bergers ?
  - type: text
    content: Auprès des ruisseaux de Ruben,
  - type: text
    content: grandes furent les résolutions du cœur !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'V. 15n. –  Galaad 11.1n  ; Gn 31.21n  ; Nb 32.1. –  en Transjordanie  : cf. 7.25n  ; 10.8 ; Nb 22.1n  ; 32.19n  ; Dt 1.1n  ; Jos 1.14n. –  séjourne-t-il  : le verbe hébreu est généralement utilisé pour qualifier le séjour d''un immigré dans un pays ou un lieu étranger ; cf. 17.7n  ; Ex 12.48n. –  près des bateaux ou sur des bateaux , allusion obscure ; certains ont supposé que des Danites servaient comme marins sur des vaisseaux phéniciens ; cf. Gn 49.13 (sur Dan , cf. 18.1s ; Jos 19.40-51). –  Aser Jos 19.24-31. –  auprès de (ou sur ) ses brisants ou ses ports , traduction incertaine ; le terme hébreu correspondant n''apparaît qu''ici.'
  - type: text
    content: Galaad est resté en Transjordanie.
  - type: text
    content: Pourquoi Dan séjourne-t-il près des bateaux ?
  - type: text
    content: Aser est assis au bord de la mer,
  - type: text
    content: il est resté auprès de ses brisants.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'a affronté la mort  : litt. a méprisé (le verbe correspondant est habituellement traduit par déshonorer, outrager , cf. 8.15) sa vie pour mourir . –  Nephtali 4.6 ; Jos 19.32-39. –  sur les hauteurs  : hébreu meromé , cf. Jos 11.5-9 ; voir aussi 2S 1.21.'
  - type: text
    content: Zabulon est un peuple qui a affronté la mort,
  - type: text
    content: et Nephtali de même,
  - type: text
    content: sur les hauteurs de la campagne.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Taanak / Meguiddo , villes cananéennes au sud de la plaine de Jizréel 1.27 ; Jos 12.21 ; 17.11s ; cf. Ap 16.16n. –  ils n''en ont tiré…  : c.-à-d. ils n''ont pas pris de butin.'
  - type: text
    content: Les rois sont venus, ils ont combattu ;
  - type: text
    content: alors les rois de Canaan ont combattu
  - type: text
    content: à Taanak, aux eaux de Meguiddo ;
  - type: text
    content: ils n'en ont tiré aucun gain d'argent.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'on défait sa chevelure  : le sens de l''hébreu est incertain ; il pourrait s''agir d''un rite associé à la guerre, évoquant une consécration totale des combattants (cf. v. 18 ; 9.17 ; 13.5) et peut-être plus particulièrement des chefs (cf. 5.9,15 ; voir Dt 32.42n) ; autre traduction possible quand on a recouvré la liberté.'
  - type: text
    content: Quand on défait sa chevelure en Israël,
  - type: text
    content: quand un peuple se porte volontaire,
  - type: text
    content: 'bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) !'
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Les étoiles sont associées à la pluie dans certains textes de l''Orient ancien ; voir aussi Jos 10.13. –  de leurs routes  : sur ce sens, cf. 20.31s ; le terme pourrait aussi évoquer ici une rampe d''assaut comme celles que les assaillants construisaient pour prendre une ville assiégée.'
  - type: text
    content: Du ciel les étoiles ont combattu,
  - type: text
    content: de leurs routes elles ont combattu Sisera.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Qishôn 4.7n  ; cf. Gn 26.17n. –  Que je les écrase  : litt. piétine, mon être ! (Gn 1.20n). On pourrait aussi comprendre que je marche avec vigueur ou que je piétine leur vigueur.'
  - type: text
    content: Le Qishôn les a balayés,
  - type: text
    content: l'oued des temps anciens, le Qishôn.
  - type: text
    content: Que je les écrase avec vigueur !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine : LXX alors ont été tranchés (ou entravés , selon d''autres mss) les jarrets du cheval (cf. Jos 11.6,9). –  galop  : autre traduction piaffement  ; terme apparenté en Na 3.2. –  étalons  : sur le terme correspondant, voir Gn 49.24n.'
  - type: text
    content: Alors les sabots des chevaux ont retenti,
  - type: text
    content: au galop effréné de ses étalons.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Méroz  : probablement une localité au sud de Qédesh-Nephtali. –  le messager (ou l''ange ) du Seigneur 2.1n. –  au secours  : autre traduction à l''aide.'
  - type: text
    content: 'Maudissez Méroz, dit le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: maudissez ses habitants !
  - type: text
    content: 'Car ils ne sont pas venus au secours du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'au secours du '
  - type: text
    content: Seigneur
  - type: text
    content: ', parmi les héros.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Bénie soit…  : cf. Lc 1.42 ; Judith 13.18 : « Bénie sois-tu, ma fille (Judith), par le Dieu très haut, plus que toutes les femmes qui sont sur la terre, et béni soit le Seigneur Dieu… qui t''a conduite pour blesser à la tête le chef de nos ennemis (Holopherne). » –  Yaël 4.17+.'
  - type: text
    content: Bénie soit entre les femmes Yaël,
  - type: text
    content: femme de Héber, le Caïnite !
  - type: text
    content: Bénie soit-elle entre les femmes qui habitent sous la tente !
  '25':
  - type: text
    content: ' '
  - type: note
    content: la coupe des braves ou des magnifiques, des princes  ; cf. v. 13 ; 4.19. –  du lait fermenté Gn 18.8n.
  - type: text
    content: Il demandait de l'eau, elle a donné du lait ;
  - type: text
    content: dans la coupe des braves elle a présenté du lait fermenté.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.21. – Les termes traduits par marteau et a frappé sont apparentés.
  - type: text
    content: D'une main elle a saisi le pieu,
  - type: text
    content: de sa main droite le marteau des travailleurs ;
  - type: text
    content: elle a frappé Sisera, elle lui a fendu la tête,
  - type: text
    content: elle lui a fracassé et transpercé la tempe.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'A ses pieds  : autre traduction entre ses jambes.'
  - type: text
    content: A ses pieds il s'est affaissé,
  - type: text
    content: il est tombé, il s'est couché.
  - type: text
    content: A ses pieds il s'est affaissé, il est tombé ;
  - type: text
    content: là où il s'est affaissé, là il est tombé, anéanti.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'persiennes Pr 7.6. –  ses chars  : litt. les pas de ses chars.'
  - type: text
    content: Par la fenêtre, à travers les persiennes,
  - type: text
    content: 'la mère de Sisera regarde et s''exclame :'
  - type: text
    content: Pourquoi son char tarde-t-il à venir ?
  - type: text
    content: Pourquoi ses chars vont-ils si lentement ?
  '29':
  - type: text
    content: Les plus sages d'entre ses princesses lui répondent,
  - type: text
    content: 'elle-même se dit :'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je chanterai (ou je jouerai ) un psaume  : sur le verbe hébreu correspondant, voir Ps 7.18n  ; 47.7 ; 75.10 ; 81.2 ; 1Ch 16.9.'
  - type: text
    content: Rois, écoutez ! Princes, prêtez l'oreille !
  - type: text
    content: 'Moi, pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: oui, moi, je chanterai ;
  - type: text
    content: je chanterai un psaume
  - type: text
    content: 'pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël.'
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Ils ont dû…  : litt. n''ont-ils pas trouvé… ? –  Une fille…  : litt. une matrice, deux matrices par tête d''homme . –  des captives  : litt. du butin  ; certains modifient la vocalisation traditionnelle de l''hébreu de façon à lire pour son cou, pour mon cou ou pour le cou du pilleur.'
  - type: text
    content: Ils ont dû trouver du butin, ils le partagent…
  - type: text
    content: Une fille, deux filles par tête de guerrier ;
  - type: text
    content: 'butin : des vêtements de couleur pour Sisera ;'
  - type: text
    content: 'butin : des vêtements de couleur, brodés,'
  - type: text
    content: un vêtement de couleur, deux vêtements brodés
  - type: text
    content: pour le cou des captives.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Que tous tes ennemis… Ps 9.4,6 ; 92.10. –  disparaissent  : autre traduction périssent . –  Ceux qui l''aiment…  : autre traduction que ceux qui l''aiment soient… –  comme le soleil… 2S 23.4 ; Dn 12.3 ; Mt 13.43 ; 1Co 15.41ss ; Ap 1.16. –  le pays fut tranquille… 3.11+.'
  - type: text
    content: 'Que tous tes ennemis disparaissent ainsi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Ceux qui l'aiment sont comme le soleil,
  - type: text
    content: quand il paraît dans sa puissance.
  - type: text
    content: Et le pays fut tranquille pendant quarante ans.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 20s ; Dt 33.2 ; 2S 22.8 ; Ha 3.3 ; Ps 68.8s. –  Séir ou Edom , au sud de la mer Morte (Gn 14.6n  ; 25.25n).
  - type: text
    content: Seigneur
  - type: text
    content: ', quand tu sortis de Séir,'
  - type: text
    content: quand tu t'avanças depuis le pays d'Edom,
  - type: text
    content: la terre trembla, le ciel ruissela,
  - type: text
    content: les nuages ruisselèrent d'eau ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'les montagnes  : cf. Es 44.23 ; 49.13. –  se liquéfièrent  : litt. coulèrent  ; LXX a lu croulèrent , comme en Es 63.19 ; 64.2 ; cf. Ex 19.16-18 ; 1R 19.11s ; Ha 3.6 ; Ps 29.3-9 ; 46.4 ; 68.9 ; 77.18s ; 97.3-5 ; Hé 12.26. –  ce Sinaï…  : autre traduction possible devant le Seigneur (YHWH), celui du Sinaï (voir noms divins).'
  - type: text
    content: 'les montagnes se liquéfièrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '– ce Sinaï, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Shamgar, fils d''Anath 3.31. –  aux jours de Yaël  : certains modifient le texte hébreu traditionnel pour traduire aux jours du joug (étranger) 4.17+. –  étaient abandonnés  : litt. avaient cessé , de même au v. 7 ; il faut sans doute comprendre que le trafic des caravanes dans les vallées avait été interrompu par l''oppression cananéenne. –  les voyageurs  : litt. ceux qui allaient (sur) les routes  ; cf. Es 33.8.'
  - type: text
    content: Aux jours de Shamgar, fils d'Anath,
  - type: text
    content: aux jours de Yaël,
  - type: text
    content: les sentiers étaient abandonnés,
  - type: text
    content: et les voyageurs prenaient des sentiers détournés.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Les villes ouvertes (c.-à-d. sans murailles) : traduction incertaine, d''après quelques témoins anciens qui lisent ici le même mot qu''en Dt 3.5+ ; autres traductions possibles  : le commandement, la vaillance ou la liberté (avait disparu…)  ; cf. Jg 5.6n  ; même terme v. 11n  ; un terme apparenté est traduit par chefs en Ha 3.14. –  que tu te lèves  : autre traduction possible que je me lève.'
  - type: text
    content: Les villes ouvertes avaient disparu en Israël,
  - type: text
    content: elles avaient disparu,
  - type: text
    content: jusqu'à ce que tu te lèves, Débora,
  - type: text
    content: que tu te lèves comme une mère en Israël.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine. –  nouveaux dieux Dt 32.17. –  des villes  : sous-entendu dans le texte, cf. Dt 16.18n. –  voyait-on…  : autre traduction on ne voyait pas un bouclier, pas une lance…  ; cf. 1S 13.19-22. –  quarante phratries  : autres traductions possibles quarante contingents ; quarante mille hommes  ; sur l''ambiguïté du terme, voir 6.15n  ; Nb 1.16n  ; Jos 4.13n  ; Mi 5.1n.'
  - type: text
    content: 'On avait choisi de nouveaux dieux :'
  - type: text
    content: alors la guerre était aux portes des villes ;
  - type: text
    content: voyait-on un bouclier, une lance,
  - type: text
    content: pour quarante phratries en Israël ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2n. –  commandants  : forme légèrement différente au v. 14 ; cf. Es 33.22n.'
  - type: text
    content: Mon cœur va aux commandants d'Israël,
  - type: text
    content: aux gens du peuple qui se sont portés volontaires.
  - type: text
    content: 'Bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
