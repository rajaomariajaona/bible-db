    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.6 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1Co 10.7. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '– Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Le lendemain, ils se levèrent de bon matin, ils offrirent des holocaustes et présentèrent des sacrifices de paix. Le peuple s'assit pour manger et pour boire ; puis ils se levèrent pour s'amuser.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Va, descends ; car ton peuple, celui que tu as fait monter d''Egypte, s''est perverti. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils se sont bien vite écartés de la voie que je leur avais prescrite ; ils se sont fait un taurillon de métal fondu, ils se sont prosternés devant lui, ils lui ont offert des sacrifices et ils ont dit : Voici tes dieux, Israël, ceux qui t''ont fait monter d''Egypte !'
- type: usfm
  marker: p
  children:
  - type: usfm
