      marker: fr
      children:
      - type: text
        text: '32.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''ouvrage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'œuvre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 34.10.'
    marker-yv: yv-n
  - type: text
    text: 'Les tablettes étaient l''ouvrage de Dieu ; l''écriture était l''écriture de Dieu, gravée sur les tablettes. '
