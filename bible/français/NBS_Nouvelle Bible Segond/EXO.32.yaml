      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; on a vu dans cette expression tantôt l''image d''une bête qui se refuse au joug ou qui résiste à son maître (cf. notre verbe '
    - type: usfm
