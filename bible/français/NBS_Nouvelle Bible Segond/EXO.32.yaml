        - type: text
          text: n
      - type: text
        text: '  ; Dn 9.13 ; 2Ch 33.12. Voir aussi Gn 18.22s ; Nb 14.13-20 ; 1S 12.19,23 ; Es 53.12 ; Am 7.2s ; Ps 99.6 ; 106.23 ; Jb 42.8-10 ; Jn 17.'
    marker-yv: yv-n
  - type: text
    text: 'Moïse chercha à apaiser le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', son Dieu ; il dit : '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', pourquoi te mettre en colère contre ton peuple, alors que tu l''as fait sortir d''Egypte par une grande puissance, par une main forte ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Egyptiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour les faire disparaître
    - type: usfm
      marker: ft
      children:
