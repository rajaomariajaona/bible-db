    marker-yv: yv-n
  - type: text
    text: 'Moïse redescendit de la montagne, les deux tablettes du Témoignage à la main ; les tablettes étaient écrites des deux côtés, elles étaient écrites de part et d''autre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
