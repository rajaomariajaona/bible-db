  - type: text
    text: 'Le peuple vit que Moïse tardait à descendre de la montagne ; alors le peuple se rassembla autour d''Aaron et lui dit : Fais-nous des dieux qui marchent devant nous ! Car ce Moïse, cet homme qui nous a fait monter d''Egypte, nous ne savons pas ce qui est advenu de lui ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aaron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Enlevez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu est souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: arracher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même aux v. 3,24.'
    marker-yv: yv-n
  - type: text
    text: 'Aaron leur dit : Enlevez les anneaux d''or qui sont aux oreilles de vos femmes, de vos fils et de vos filles, et apportez-les-moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Tous les gens du peuple enlevèrent les anneaux d''or qui étaient à leurs oreilles et les apportèrent à Aaron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: burin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot hébreu apparaît en Es 8.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Certains lui donnent ici le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: moule
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', à cause du v. 24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: taurillon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu évoque sans doute un animal plus âgé que celui que nous appelons '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: veau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', quoique certains pensent que le terme est employé ici par dérision. En tout cas, l''image qu''il désigne est bien celle d''un jeune taureau, cf. 1R 12.26-33 ; Os 8.5s ; 10.5 ; Né 9.18. Dans l''ancien Orient, de telles statues ne représentaient généralement pas la divinité, mais elles en constituaient le piédestal. Le taureau était souvent pris pour symbole de la puissance et de la fécondité. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tes dieux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ton Dieu qui t'a fait monter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui-ci prit l''or de leurs mains, le façonna au burin et fit un taurillon de métal fondu. Puis ils dirent : Voici tes dieux, Israël, ceux qui t''ont fait monter d''Egypte ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: devant le taurillon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devant lui.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Aaron vit cela, il bâtit un autel devant le taurillon et s''écria : Demain, il y aura une fête pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! '
  - type: usfm
    marker: vlbl
