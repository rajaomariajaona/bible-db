      - type: text
        text: renâcler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), tantôt l''opposé de l''expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'incliner l''oreille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (pour écouter ou obéir) ; cf. 33.3,5 ; 34.9 ; Dt 9.6,13 ; 10.16 ; Es 48.4 ; Jr 7.26 ; Pr 29.1 ; Né 9.16,29 ; Ac 7.51.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Je vois que ce peuple est un peuple rétif. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une grande nation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 12.2 ; 46.3 ; Nb 14.12 ; cf. Es 60.22.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, laisse-moi faire : je vais me mettre en colère contre eux, je les exterminerai, et je ferai de toi une grande nation.'
