document_id: EXO.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'La faute du peuple : le « veau d''or »'
  - type: text
    content: ' '
  - type: note
    content: 'V. 23 ; Ac 7.40  ; cf. Dt 9.7–10.11 ; Ps 106.19-23. –  se rassembla  : le verbe correspondant évoque habituellement l’ assemblée cultuelle (12.6 ; 16.3) ; de même en 35.1 ; voir Eglise. –  Fais-nous  : litt. lève-toi, fais-nous . –  des dieux…  : autre traduction un dieu (ou un Dieu ) qui marche… , même possibilité dans la suite ; cf. Gn 1.1n  ; 3.5n  ; 1R 12.28 ; 2Ch 13.8. –  monter d''Egypte Gn 12.10n.'
  - type: text
    content: 'Le peuple vit que Moïse tardait à descendre de la montagne ; alors le peuple se rassembla autour d''Aaron et lui dit : Fais-nous des dieux qui marchent devant nous ! Car ce Moïse, cet homme qui nous a fait monter d''Egypte, nous ne savons pas ce qui est advenu de lui ! '
  '10':
  - type: note
    content: une grande nation Gn 12.2 ; 46.3 ; Nb 14.12 ; cf. Es 60.22.
  - type: text
    content: 'Maintenant, laisse-moi faire : je vais me mettre en colère contre eux, je les exterminerai, et je ferai de toi une grande nation.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'chercha à apaiser  : litt. caressa la face , 1R 13.6 ; 2R 13.4 ; Jr 26.19 ; Za 7.2 ; 8.21s ; Ml 1.9 ; Ps 45.13n  ; 119.58 ; Jb 11.19n  ; Pr 19.6n  ; Dn 9.13 ; 2Ch 33.12. Voir aussi Gn 18.22s ; Nb 14.13-20 ; 1S 12.19,23 ; Es 53.12 ; Am 7.2s ; Ps 99.6 ; 106.23 ; Jb 42.8-10 ; Jn 17.'
  - type: text
    content: 'Moïse chercha à apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu ; il dit : '
  - type: text
    content: Seigneur
  - type: text
    content: ', pourquoi te mettre en colère contre ton peuple, alors que tu l''as fait sortir d''Egypte par une grande puissance, par une main forte ? '
  '12':
  - type: note
    content: 'les Egyptiens  : autre traduction l''Egypte. –  pour les faire disparaître  : sous-entendu dans le texte. –  renonce au mal  : autre traduction regrette le mal, de même au v. 14 ; cf. Nb 23.19+. –  au mal…  : litt. au mal(heur) pour ton peuple, cf. v. 14.'
  - type: text
    content: 'Pourquoi les Egyptiens diraient-ils : « C''est pour leur malheur qu''il les a fait sortir : c''est pour les tuer dans les montagnes et pour les exterminer, pour les faire disparaître de la terre ! » Reviens de ta colère ardente, renonce au mal que tu voulais faire à ton peuple ! '
  '13':
  - type: note
    content: Gn 12.7+ ; 15.5,18 ; 17.4-6 ; 22.16s ; 26.3s ; 28.13s.
  - type: text
    content: 'Souviens-toi d''Abraham, d''Isaac et d''Israël, tes serviteurs, auxquels tu as dit, en faisant un serment par toi-même : « Je multiplierai votre descendance comme les étoiles du ciel, je donnerai à votre descendance tout ce pays dont j''ai parlé, et ce sera son patrimoine pour toujours. » '
  '14':
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' renonça au mal qu''il avait parlé de faire à son peuple.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'redescendit  : litt. se tourna et descendit  ; cf. Dt 1.7n  ; 9.15n. –  tablettes du Témoignage 16.34n  ; 31.18.'
  - type: text
    content: 'Moïse redescendit de la montagne, les deux tablettes du Témoignage à la main ; les tablettes étaient écrites des deux côtés, elles étaient écrites de part et d''autre. '
  '16':
  - type: note
    content: 'l''ouvrage (ou l''œuvre) de Dieu  : cf. 34.10.'
  - type: text
    content: 'Les tablettes étaient l''ouvrage de Dieu ; l''écriture était l''écriture de Dieu, gravée sur les tablettes. '
  '17':
  - type: note
    content: 'Josué 17.9+. –  bruit  : le mot signifie également voix, cf. 9.23n  ; Gn 3.8n.'
  - type: text
    content: 'Quand Josué entendit le peuple qui poussait des clameurs, il dit à Moïse : Il y a un bruit de guerre dans le camp ! '
  '18':
  - type: note
    content: 'chœur  : le terme hébreu semble évoquer un chant alterné (apparenté au verbe traduit par répondre en 15.21n) ; c''est une forme légèrement différente du même mot qui est traduite par d''autres chœurs. –  victoire  : litt. vaillance.'
  - type: text
    content: 'Il répondit :'
  - type: text
    content: Ce n'est pas un chœur de victoire,
  - type: text
    content: ce n'est pas un chœur de défaite,
  - type: text
    content: ce sont d'autres chœurs que j'entends !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 34.1. –  il jeta  : litt. il jeta de sa main (ou de ses mains , selon une autre lecture traditionnelle) ; cf. Dt 9.17.'
  - type: text
    content: 'Comme il approchait du camp, il vit le taurillon et les danses. Alors Moïse se mit en colère ; il jeta les tablettes et les brisa au pied de la montagne. '
  '2':
  - type: note
    content: 'Aaron  : voir prêtre. –  Enlevez  : le verbe hébreu est souvent traduit par arracher  ; de même aux v. 3,24.'
  - type: text
    content: 'Aaron leur dit : Enlevez les anneaux d''or qui sont aux oreilles de vos femmes, de vos fils et de vos filles, et apportez-les-moi. '
  '20':
  - type: note
    content: 'Cf. Dt 9.21. –  fit boire  : cf. Nb 5.24.'
  - type: text
    content: Il prit le taurillon qu'ils avaient fait et le brûla au feu ; il le réduisit en une poussière qu'il dissémina sur l'eau, et il le fit boire aux Israélites.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Voir péché.
  - type: text
    content: 'Moïse dit à Aaron : Que t''a fait ce peuple, pour que tu aies fait venir sur lui un si grand péché ? '
  '22':
  - type: note
    content: 'il est porté au mal  : litt. il (est) dans le mal. Smr il est incontrôlable (cf. v. 25).'
  - type: text
    content: 'Aaron répondit : Ne te mets pas en colère, mon seigneur ! Tu connais toi-même ce peuple : il est porté au mal. '
  '23':
  - type: note
    content: V. 1.
  - type: text
    content: 'Ils m''ont dit : « Fais-nous des dieux qui marchent devant nous ! Car ce Moïse, cet homme qui nous a fait monter d''Egypte, nous ne savons pas ce qui est advenu de lui ! » '
  '24':
  - type: note
    content: 'des objets d''or  : litt. de l''or. –  enlèvent  : cf. v. 2n. –  taurillon v. 4n.'
  - type: text
    content: 'Je leur ai dit : Que ceux qui ont des objets d''or les enlèvent ! Ils me les ont donnés ; je les ai jetés au feu, et il en est sorti ce taurillon.'
  - type: heading
    content: Le châtiment
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'la risée  : le mot hébreu correspondant n''apparaît qu''ici dans l''A.T., et sa traduction est incertaine ; autres possibilités  : il allait être exposé aux outrages (ou à la médisance ) de ses adversaires (cf. Jb 4.12 ; 26.14 où un mot ressemblant est traduit par murmure ). LXX joie mauvaise pour ses adversaires . Cf. Dt 28.37 ; 1R 9.7 ; Jr 29.18.'
  - type: text
    content: 'Moïse vit que le peuple était incontrôlable, car Aaron l''avait laissé devenir incontrôlable : il allait être la risée de ses adversaires. '
  '26':
  - type: note
    content: Voir fils.
  - type: text
    content: 'Moïse se tint debout à la porte du camp et dit : Ceux qui sont pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à moi ! Tous les fils de Lévi se rassemblèrent autour de lui. '
  '27':
  - type: note
    content: Cf. Dt 33.9 ; voir aussi Mt 10.37/ /.
  - type: text
    content: 'Il leur dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Que chacun de vous mette son épée au côté ; passez et repassez dans le camp, d''une porte à l''autre, et tuez, qui son frère, qui son ami, qui son parent ! '
  '28':
  - type: text
    content: 'Les fils de Lévi firent ce que Moïse avait dit : ce jour-là, il tomba environ trois mille hommes parmi le peuple. '
  '29':
  - type: note
    content: 'Soyez investis  : litt. remplissez votre main, cf. 28.41n. – Voir bénédiction.'
  - type: text
    content: 'Moïse dit : Soyez investis aujourd''hui pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', chacun même au prix de son fils ou de son frère, afin qu''il vous accorde aujourd''hui une bénédiction.'
  - type: heading
    content: Moïse supplie Dieu de pardonner à Israël
  '3':
  - type: text
    content: 'Tous les gens du peuple enlevèrent les anneaux d''or qui étaient à leurs oreilles et les apportèrent à Aaron. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Voir expiation.
  - type: text
    content: 'Le lendemain, Moïse dit au peuple : Vous avez commis un grand péché. Maintenant, je vais monter vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : peut-être pourrai-je faire l''expiation pour votre péché. '
  '31':
  - type: note
    content: 'des dieux d''or  : autre traduction un dieu d''or  ; cf. v. 1n.'
  - type: text
    content: 'Moïse revint vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dit : S''il te plaît ! Ce peuple a commis un grand péché. Ils se sont fait des dieux d''or. '
  '32':
  - type: note
    content: 'pardonner  : autres traductions enlever ; te charger de ; supporter (leur péché)  ; cf. 10.17n  ; Ez 4.4n. –  efface-moi  : cf. Rm 9.3. –  livre Es 4.3 ; Ez 13.9 ; Ml 3.16 ; Ps 69.29 ; 87.6 ; 139.16 ; Dn 12.1 ; Lc 10.20 ; Ap 3.5 ; 13.8 ; 20.15.'
  - type: text
    content: 'Si maintenant tu voulais bien pardonner leur péché… sinon, je t''en prie, efface-moi de ton livre, celui que tu as écrit. '
  '33':
  - type: note
    content: 'c''est celui qui a péché…  : cf. 20.5+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Celui que j''effacerai de mon livre, c''est celui qui a péché contre moi. '
  '34':
  - type: note
    content: 'Mon messager (autre traduction mon ange) …  : cf. 23.20+. –  j''interviendrai et je… ferai rendre des comptes traduisent le même verbe hébreu ; cf. 20.5n  ; Jr 6.15n.'
  - type: text
    content: 'Maintenant, va ; conduis le peuple où je t''ai dit. Mon messager marchera devant toi ; mais le jour où j''interviendrai, je leur ferai rendre des comptes pour leur péché. '
  '35':
  - type: note
    content: 'Autre traduction ainsi le Seigneur frappa le peuple… –  parce qu''ils avaient fait…  : litt. parce qu''ils avaient fait ce taurillon qu''Aaron avait fait  ; Syr, Targum (Tg) du pseudo-Jonathan : parce qu''ils s''étaient prosternés devant… –  Aaron  : voir prêtre.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa le peuple d''un fléau, parce qu''ils avaient fait ce taurillon, celui qu''Aaron avait fait.'
  '4':
  - type: note
    content: 'burin  : le même mot hébreu apparaît en Es 8.1n. Certains lui donnent ici le sens de moule, à cause du v. 24. –  taurillon  : le terme hébreu évoque sans doute un animal plus âgé que celui que nous appelons veau, quoique certains pensent que le terme est employé ici par dérision. En tout cas, l''image qu''il désigne est bien celle d''un jeune taureau, cf. 1R 12.26-33 ; Os 8.5s ; 10.5 ; Né 9.18. Dans l''ancien Orient, de telles statues ne représentaient généralement pas la divinité, mais elles en constituaient le piédestal. Le taureau était souvent pris pour symbole de la puissance et de la fécondité. –  tes dieux…  : autre traduction ton Dieu qui t''a fait monter, cf. v. 1n.'
  - type: text
    content: 'Celui-ci prit l''or de leurs mains, le façonna au burin et fit un taurillon de métal fondu. Puis ils dirent : Voici tes dieux, Israël, ceux qui t''ont fait monter d''Egypte ! '
  '5':
  - type: note
    content: 'devant le taurillon  : litt. devant lui.'
  - type: text
    content: 'Lorsque Aaron vit cela, il bâtit un autel devant le taurillon et s''écria : Demain, il y aura une fête pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '6':
  - type: note
    content: 1Co 10.7. – Voir sacrifices, paix.
  - type: text
    content: Le lendemain, ils se levèrent de bon matin, ils offrirent des holocaustes et présentèrent des sacrifices de paix. Le peuple s'assit pour manger et pour boire ; puis ils se levèrent pour s'amuser.
  '7':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Va, descends ; car ton peuple, celui que tu as fait monter d''Egypte, s''est perverti. '
  '8':
  - type: text
    content: 'Ils se sont bien vite écartés de la voie que je leur avais prescrite ; ils se sont fait un taurillon de métal fondu, ils se sont prosternés devant lui, ils lui ont offert des sacrifices et ils ont dit : Voici tes dieux, Israël, ceux qui t''ont fait monter d''Egypte !'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX. –  rétif  : litt. à la nuque raide  ; on a vu dans cette expression tantôt l''image d''une bête qui se refuse au joug ou qui résiste à son maître (cf. notre verbe renâcler ), tantôt l''opposé de l''expression incliner l''oreille (pour écouter ou obéir) ; cf. 33.3,5 ; 34.9 ; Dt 9.6,13 ; 10.16 ; Es 48.4 ; Jr 7.26 ; Pr 29.1 ; Né 9.16,29 ; Ac 7.51.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Je vois que ce peuple est un peuple rétif. '
