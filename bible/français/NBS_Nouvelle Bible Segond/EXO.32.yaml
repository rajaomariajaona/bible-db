        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: renonce au mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: regrette le mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 14 ; cf. Nb 23.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au mal…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au mal(heur) pour ton peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 14.'
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi les Egyptiens diraient-ils : « C''est pour leur malheur qu''il les a fait sortir : c''est pour les tuer dans les montagnes et pour les exterminer, pour les faire disparaître de la terre ! » Reviens de ta colère ardente, renonce au mal que tu voulais faire à ton peuple ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 12.7+ ; 15.5,18 ; 17.4-6 ; 22.16s ; 26.3s ; 28.13s.
    marker-yv: yv-n
  - type: text
    text: 'Souviens-toi d''Abraham, d''Isaac et d''Israël, tes serviteurs, auxquels tu as dit, en faisant un serment par toi-même : « Je multiplierai votre descendance comme les étoiles du ciel, je donnerai à votre descendance tout ce pays dont j''ai parlé, et ce sera son patrimoine pour toujours. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Alors le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' renonça au mal qu''il avait parlé de faire à son peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
