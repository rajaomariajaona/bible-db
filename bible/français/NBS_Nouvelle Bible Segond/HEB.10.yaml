document_id: HEB.10,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'ombre 8.5+. –  biens à venir 9.11. –  l''image ou la forme  ; le terme grec a donné le mot icône  ; dans la philosophie d''inspiration platonicienne, elle représente une réalité d''un niveau supérieur à l''ombre . –  accomplissement 2.10n  ; 7.19+. –  ceux qui s''en approchent  : litt. ceux qui s''approchent  ; on peut sous-entendre des sacrifices ou de Dieu (4.16 ; 7.25 ; 11.6 ; 12.18,22).'
  - type: text
    content: 'La loi, en effet, possède une ombre des biens à venir et non pas l''image même de ces choses ; c''est pourquoi elle ne peut jamais, par les mêmes sacrifices qu''on présente perpétuellement, année après année, porter à leur accomplissement ceux qui s''en approchent. '
  '10':
  - type: note
    content: consacrés ou sanctifiés v. 14,19 ; 2.11n. –  par l'offrande… Ep 5.2,25s. –  une fois pour toutes 7.27+.
  - type: text
    content: C'est en vertu de cette volonté que nous sommes consacrés par l'offrande du corps de Jésus-Christ, une fois pour toutes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'se tient à son poste (litt. se tient debout , cf. v. 12) chaque jour 7.27+ ; cf. Dt 10.8 ; 18.7. –  son service 1.14n. –  qui ne peuvent… 7.19+. –  ôter  : verbe apparenté au v. 4.'
  - type: text
    content: 'Tout prêtre se tient à son poste chaque jour pour faire son service et offrir maintes fois les mêmes sacrifices, qui ne peuvent jamais ôter les péchés. '
  '12':
  - type: note
    content: 'un seul sacrifice 9.28+. –  s''est assis 1.3+. –  pour rester à perpétuité  : l''expression pourrait aussi être rattachée à ce qui précède  : après avoir présenté à perpétuité un seul sacrifice, il s''est assis…'
  - type: text
    content: 'Mais lui, après avoir présenté un seul sacrifice pour les péchés, il s''est assis pour rester à perpétuité à la droite de Dieu, '
  '13':
  - type: note
    content: 'que ses ennemis…  : litt. jusqu''à ce que ses ennemis… 1.13n  ; Ps 110.1.'
  - type: text
    content: 'et il attend désormais que ses ennemis lui soient donnés pour marchepied. '
  '14':
  - type: note
    content: V. 10,12.
  - type: text
    content: 'Par une seule offrande, en effet, il a porté à leur accomplissement, à perpétuité, ceux qui sont consacrés. '
  '15':
  - type: note
    content: 'l''Esprit saint 3.7+. –  après avoir dit…  : la suite de la phrase est à chercher au milieu du v. 16 (après ces jours-là, le Seigneur dit) ou au v. 17 (voir la note).'
  - type: text
    content: 'C''est ce que l''Esprit saint nous atteste également. Car après avoir dit :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 8.10n,12 ; Jr 31.33s.
  - type: text
    content: Voici l'alliance que j'établirai
  - type: text
    content: ' avec eux'
  - type: text
    content: 'après ces jours-là, dit le Seigneur :'
  - type: text
    content: je mettrai mes lois dans leur cœur
  - type: text
    content: et je les inscrirai dans leur intelligence ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Certains mss ajoutent au début du v.  : il dit ensuite (cf. v. 15 après avoir dit ). –  désordres  : voir 1.9n.'
  - type: text
    content: je ne me souviendrai plus jamais de leurs péchés
  - type: text
    content: ' ni de leurs désordres.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'des péchés  : litt. de ceux-ci.'
  - type: text
    content: Or là où il y a pardon des péchés, il n'y a plus d'offrande pour le péché.
  - type: heading
    content: Appel à la persévérance
  '19':
  - type: text
    content: ' '
  - type: note
    content: assurance 3.6+. –  accès 9.8+. –  sanctuaire 9.3n,12-14,24 ; Ep 1.7+. –  sang 9.12ss.
  - type: text
    content: 'Ainsi donc, frères, nous avons l''assurance d''un libre accès au sanctuaire par le sang de Jésus, '
  '2':
  - type: note
    content: conscience 9.9+.
  - type: text
    content: 'Sinon, n''aurait-on pas cessé d''en présenter, puisque ceux qui prennent part à ce culte auraient été purifiés une fois pour toutes et n''auraient plus eu aucune conscience des péchés ? '
  '20':
  - type: note
    content: 'chemin  : cf. Jn 14.6. –  voile 6.19+ ; cf. Mt 27.51/ /. –  c''est-à-dire de sa chair  : autre traduction c''est-à-dire sa chair (en identifiant la chair au chemin et non plus au voile) ; cf. 5.7+.'
  - type: text
    content: 'accès qu''il a inauguré pour nous comme un chemin nouveau et vivant au travers du voile, c''est-à-dire de sa chair, '
  '21':
  - type: note
    content: grand prêtre 2.17n  ; cf. Za 3.1n,7 ; 6.11-13. –  sur la maison 3.6+.
  - type: text
    content: 'et nous avons un grand prêtre institué sur la maison de Dieu. '
  '22':
  - type: note
    content: 'Approchons-nous 4.16+. – Voir cœur. –  sincère  : le même terme est traduit par véritable en 8.2 ; 9.24 ; cf. Jn 1.9+. –  pleine foi  : cf. 6.11n. –  conscience 9.9+. –  le corps lavé  : cf. Ex 29.4 ; Lv 16.4 ; Ez 36.25 ; Ep 5.26+.'
  - type: text
    content: 'Approchons-nous donc d''un cœur sincère, avec une pleine foi, le cœur purifié d''une mauvaise conscience et le corps lavé d''une eau pure. '
  '23':
  - type: note
    content: 'Continuons…  : litt. retenons (3.6,14) (l''acte de) reconnaissance (publique) (ou la confession, 3.1n) de l''espérance (6.18+). –  digne de confiance  : autre traduction fidèle  ; un terme apparenté est traduit par foi au v. 22 ; cf. 2.17n  ; 11.11 ; 1Co 1.9+.'
  - type: text
    content: 'Continuons à reconnaître publiquement notre espérance, sans fléchir, car celui qui a fait la promesse est digne de confiance. '
  '24':
  - type: note
    content: belles œuvres Tt 2.14+.
  - type: text
    content: 'Veillons les uns sur les autres pour nous inciter à l''amour et aux belles œuvres. '
  '25':
  - type: note
    content: 'notre assemblée  : même terme (apparenté au mot habituellement transcrit synagogue) en 2Th 2.1 (rassemblement) ; cf. Jc 2.2n  ; voir Eglise. –  encourageons-nous ou exhortons-nous, 3.13+. –  le jour (du jugement) : cf. 4.7 ; Rm 13.12 ; 1Co 3.13 ; 1Th 5.2,4 ; voir aussi Es 2.12 ; Ez 7.10-12 ; Jl 1.15–2.11 ; So 1.14-18 ; Ml 3.19-21.'
  - type: text
    content: N'abandonnons pas notre assemblée, comme quelques-uns en ont coutume, mais encourageons-nous mutuellement, et cela d'autant plus que vous voyez le jour s'approcher.
  '26':
  - type: text
    content: ' '
  - type: note
    content: '6.4-8. –  connaissance de la vérité  : voir Rm 1.28n  ; 1Tm 2.4n  ; 2P 1.2n  ; cf. 2P 2.21. – Voir sacrifice et péchés.'
  - type: text
    content: 'En effet, si nous péchons volontairement après avoir reçu la connaissance de la vérité, il ne reste plus de sacrifice pour les péchés, '
  '27':
  - type: note
    content: 'terrifiante  : autre traduction craintive  ; le même mot est traduit par terrible au v. 31 ; cf. 12.21. –  jugement  : cf. 9.27. –  ardeur  : le même mot est traduit ailleurs par jalousie ou passion jalouse, cf. Es 26.11 ; So 1.18.'
  - type: text
    content: 'mais une attente terrifiante du jugement, l''ardeur du feu qui va dévorer les rebelles. '
  '28':
  - type: note
    content: 'Si quelqu''un…  : cf. Nb 15.30. – Voir loi. –  pitié  : le mot est habituellement traduit par magnanimité, cf. Rm 12.1n. –  deux ou trois témoins Nb 35.30 ; Dt 17.6  ; Mt 18.16 ; 2Co 13.1 ; 1Tm 5.19.'
  - type: text
    content: 'Si quelqu''un a violé la loi de Moïse, '
  - type: text
    content: il est mis à mort
  - type: text
    content: ' sans pitié, '
  - type: text
    content: sur la déposition de deux ou trois témoins
  - type: text
    content: '. '
  '29':
  - type: note
    content: 'Combien pire…  : cf. 2.2s. –  piétiné  : cf. Mt 5.13 ; 7.6 ; Lc 8.5. –  Fils de Dieu 4.14+. –  tenu pour profane ou pour souillé (voir pur, impur ; saint) ; verbe apparenté en 9.13 ; même terme en Mc 7.2,5 ; Ac 10.14,28 ; 11.8 ; Rm 14.14 ; Ap 21.27. –  sang de l''alliance 9.20+. –  consacré ou sanctifié v. 10+. –  outragé l''Esprit  : cf. Mt 12.31/ /. –  de la grâce  : cf. Za 12.10.'
  - type: text
    content: 'Combien pire, ne le pensez-vous pas, sera le châtiment mérité par celui qui aura piétiné le Fils de Dieu, qui aura tenu pour profane le sang de l''alliance par lequel il a été consacré, qui aura outragé l''Esprit de la grâce ! '
  '3':
  - type: note
    content: on rappelle… Lv 16.21,34 ; cf. Nb 5.15.
  - type: text
    content: 'Au contraire, par ces sacrifices, on rappelle année après année le souvenir des péchés. '
  '30':
  - type: note
    content: Dt 32.35s ; Ps 135.14  ; Rm 12.19n. – Voir justice.
  - type: text
    content: 'Car nous connaissons celui qui a dit :'
  - type: text
    content: C'est moi qui fais justice ! C'est moi qui paierai de retour !
  - type: text
    content: 'Et encore :'
  - type: text
    content: Le Seigneur jugera son peuple
  - type: text
    content: .
  '31':
  - type: text
    content: ' '
  - type: note
    content: V. 27n  ; cf. Mt 10.28.
  - type: text
    content: Il est terrible de tomber aux mains du Dieu vivant.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.9s ; 12.4. –  éclairés 6.4+. –  vous avez soutenu…  : litt. vous avez enduré (un terme apparenté est traduit par persévérance au v. 36n  ; 12.1ss) un grand combat de souffrances  ; cf. 1Th 2.14.'
  - type: text
    content: 'Souvenez-vous plutôt de ces premiers jours où, après avoir été éclairés, vous avez soutenu un grand et douloureux combat : '
  '33':
  - type: note
    content: 'tantôt… tantôt…  : autre traduction les uns étaient livrés en spectacle… les autres se rendaient solidaires… –  livrés en spectacle 1Co 4.9 ; cf. Lc 23.48. –  exposés aux insultes…  : autre traduction par les insultes…  ; le même mot est traduit par humiliation en 11.26 ; 13.13. –  détresses Mt 24.9n  ; Rm 5.3+ ; 2Co 1.4n. –  solidaires  : cf. 2.14n  ; Ph 4.14 ; voir aussi 1Co 12.26.'
  - type: text
    content: 'tantôt vous étiez livrés en spectacle, exposés aux insultes et aux détresses, tantôt vous vous rendiez solidaires de ceux qui subissaient pareil traitement. '
  '34':
  - type: note
    content: 'vous avez été sensibles  : autre traduction vous avez accepté de souffrir avec les prisonniers 4.15n. –  prisonniers 11.36 ; 13.3 ; Mt 25.36. –  supérieures ou meilleures, cf. 1.4n.'
  - type: text
    content: 'En effet, vous avez été sensibles au sort des prisonniers, et vous avez accepté avec joie qu''on vous arrache vos biens, sachant que vous aviez des possessions supérieures, qui demeurent. '
  '35':
  - type: note
    content: assurance 3.6+. –  récompense 2.2n  ; cf. 11.6.
  - type: text
    content: 'N''abandonnez donc pas votre assurance, qui comporte une grande récompense ! '
  '36':
  - type: note
    content: 'persévérance ou endurance  : cf. v. 32n  ; 12.1-13 ; Lc 8.15+ ; 21.19. –  la volonté de Dieu v. 7+. –  vous obteniez ce qui a été promis (litt. la promesse) 6.12n  ; cf. 11.13,39.'
  - type: text
    content: Vous avez en effet besoin de persévérance, pour qu'après avoir fait la volonté de Dieu vous obteniez ce qui a été promis.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'encore un peu… Es 26.20n  ; cf. Jn 13.33n. Sur la suite, voir Ha 2.3-4n (l''ordre des propositions est modifié par rapport à LXX et à l''hébreu). –  celui qui doit venir  : litt. celui qui vient , cf. Mt 11.3n. –  ne tardera pas  : cf. Jc 5.8 ; 2P 3.9.'
  - type: text
    content: 'Car encore '
  - type: text
    content: un peu – bien peu ! –
  - type: text
    content: et
  - type: text
    content: ' celui '
  - type: text
    content: 'qui doit venir viendra : il ne tardera pas.'
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 1.17 ; Ga 3.11. –  mon âme ne prend pas plaisir  : autre traduction je ne prends pas plaisir (en considérant la formule traduite par mon âme comme un hébraïsme équivalent à je ) ; voir cependant v. 39n  ; le verbe traduit ici par prend plaisir a été rendu par agréer v. 6,8 ; cf. Mt 12.18n.'
  - type: text
    content: Or mon juste vivra en vertu de la foi
  - type: text
    content: .
  - type: text
    content: 'Mais '
  - type: text
    content: s'il se retire, mon âme ne prend pas plaisir en lui
  - type: text
    content: .
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'de ceux…  : litt. du retrait pour la perdition, mais de la foi (chap. 11) pour l''acquisition (sur le mot correspondant, voir 1Th 5.9n) de l''âme (ou de la vie ) ; cf. Lc 17.33n  ; 21.19 ; Ep 1.14n  ; 1P 1.9.'
  - type: text
    content: Quant à nous, nous ne sommes pas de ceux qui se retirent pour se perdre, mais de ceux qui ont la foi pour sauvegarder l'âme.
  '4':
  - type: note
    content: 7.19+ ; 9.9,12s ; cf. Es 1.11-13 ; Jr 6.20 ; 7.22 ; Os 6.6 ; Am 5.21-25 ; Mi 6.6-8.
  - type: text
    content: Car il est impossible que du sang de taureaux et de boucs ôte les péchés.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'en entrant dans le monde  : cf. Jn 7.27+. –  il dit  : il s''agit du Christ. –  Tu n''as voulu… Ps 40.7n-9  ; cf. Mt 9.13+.'
  - type: text
    content: 'C''est pourquoi, en entrant dans le monde, il dit :'
  - type: text
    content: Tu n'as voulu ni sacrifice, ni offrande,
  - type: text
    content: mais tu m'as formé un corps ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: holocaustes Lv 1.3n. –  sacrifices pour le péché Lv 4.1+ss.
  - type: text
    content: tu n'as agréé ni holocaustes, ni sacrifices pour le péché
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le livre-rouleau  : litt. le rouleau du livre , cf. Ez 2.9n  ; Ps 40.8n  ; le terme grec traduit par rouleau est apparenté à un mot qui peut signifier tête, somme, chef  ; il désignait sans doute à l''origine le renflement de l''axe autour duquel le livre était enroulé. –  ta volonté v. 10,36 ; 13.21 ; cf. Jn 4.34+.'
  - type: text
    content: 'Alors j''ai dit : Je viens'
  - type: text
    content: — dans le livre-rouleau c'est écrit à mon sujet —
  - type: text
    content: pour faire, ô Dieu, ta volonté
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: V. 5s.
  - type: text
    content: 'Il dit d''abord :'
  - type: text
    content: Tu n'as voulu et tu n'as agréé
  - type: text
    content: ni sacrifices, ni offrandes,
  - type: text
    content: ' ni '
  - type: text
    content: holocaustes, ni sacrifices pour le péché
  - type: text
    content: 'qui pourtant sont offerts selon la loi. '
  '9':
  - type: note
    content: 'V. 7. –  premier / second  : cf. 8.7,13.'
  - type: text
    content: 'Puis il dit : '
  - type: text
    content: Je viens pour faire ta volonté
  - type: text
    content: '. Il supprime donc le premier pour établir le second. '
