  - type: text
    text: 'La loi, en effet, possède une ombre des biens à venir et non pas l''image même de ces choses ; c''est pourquoi elle ne peut jamais, par les mêmes sacrifices qu''on présente perpétuellement, année après année, porter à leur accomplissement ceux qui s''en approchent. '
  - type: usfm
    marker: v
