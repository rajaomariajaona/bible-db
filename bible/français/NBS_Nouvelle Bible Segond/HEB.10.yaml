        text: 'conscience '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.9+.
    marker-yv: yv-n
  - type: text
    text: 'Sinon, n''aurait-on pas cessé d''en présenter, puisque ceux qui prennent part à ce culte auraient été purifiés une fois pour toutes et n''auraient plus eu aucune conscience des péchés ? '
