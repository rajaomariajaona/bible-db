document_id: LUK.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ac 1.1. –  beaucoup  : autre traduction plusieurs  ; cf. Jn 20.30 ; Ac 1.3 ; 24.10 ; Hé 1.1. –  entrepris  : même verbe Ac 9.29 ( chercher à ) ; 19.13.'
  - type: text
    content: 'Puisque beaucoup ont entrepris de composer un récit des faits qui se sont accomplis parmi nous, '
  '10':
  - type: note
    content: 'Toute la multitude 8.37n  ; 19.37 ; 23.1n  ; Ac 15.12 ; 25.24. –  peuple v. 21,68,77 ; 2.10,32 ; 3.15,18,21 etc. –  à l''heure de l''encens  : le matin ou le soir Ex 30.7s ; Dn 9.21 ; cf. Ac 3.1.'
  - type: text
    content: 'Toute la multitude du peuple était dehors en prière à l''heure de l''encens. '
  '11':
  - type: note
    content: 'l''ange du Seigneur  : autre traduction un ange du Seigneur  ; cf. v. 19,26ss ; 2.9 ; Ac 5.19 ; 8.26 ; 12.7,23 ; voir Mt 1.20n. –  lui apparut 22.43 ; 24.34 ; Ac 2.3 ; 7.2,26,30,35 ; 13.31+ ; 16.9 ; 26.16 ; cf. Jg 6.12 ; 13.3 etc. –  à droite  : cf. Ez 10.3 ; Ps 110.1 ; Ac 7.55. –  l''autel de l''encens Ex 30.1ss ; 37.25ss ; 1R 6.20s ; 7.48 ; cf. 1S 3 ; Es 6.'
  - type: text
    content: 'Alors l''ange du Seigneur lui apparut, debout à droite de l''autel de l''encens. '
  '12':
  - type: note
    content: la peur s'empara de lui v. 65 ; 2.9 ; 5.26 ; 7.16 ; 8.25,35,37 ; 9.34 ; 24.5,37 ; Ac 2.43 ; 5.5,11 ; 19.17 ; cf. Ex 15.16 ; Jg 6.22 ; 13.6s,20,22 ; Dn 8.17s ; 10.7s,11,16 ; voir aussi crainte.
  - type: text
    content: 'Zacharie fut troublé en le voyant ; la peur s''empara de lui. '
  '13':
  - type: note
    content: 'N''aie pas peur v. 30 ; 2.10 ; 8.50 ; 12.32 ; Ac 18.9 ; 27.24 ; cf. Gn 15.1 ; 21.17 ; 26.24 ; 46.3 ; Jg 6.23 ; Es 41.10+ ; Dn 10.12,19 ; Mt 28.5,10 ; Mc 16.6. –  ta prière a été exaucée ou entendue  : cf. Ac 10.31. –  Ta femme…  : cf. Gn 17.19 ; Jg 13.3,5. –  tu l''appelleras du nom de…  : cf. v. 31,59s ; Gn 16.11 ; 1R 13.2 ; Es 7.14. –  Jean (grec Ioannès) vient du nom hébreu Yohanân qui signifie le Seigneur (YHWH) fait grâce.'
  - type: text
    content: 'Mais l''ange lui dit :'
  - type: text
    content: N'aie pas peur, Zacharie ;
  - type: text
    content: car ta prière a été exaucée.
  - type: text
    content: Ta femme, Elisabeth, te donnera un fils,
  - type: text
    content: et tu l'appelleras du nom de Jean.
  '14':
  - type: text
    content: ' '
  - type: note
    content: V. 58 ; cf. v. 28,44,47+ ; 2.10 ; 10.17,20 ; 13.17 ; 15.7,32 ; Ac 2.46 ; 8.8 ; 12.14 ; 13.52 ; 15.3.
  - type: text
    content: Il sera pour toi un sujet de joie et d'allégresse,
  - type: text
    content: et beaucoup se réjouiront de sa naissance.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'il sera grand devant le Seigneur  : cf. v. 32 ; 7.28 ; Mt 11.11 ; voir aussi Gn 10.9 ; devant le Seigneur peut signifier au service du Seigneur , cf. 1S 2.21 ; 1R 17.1 ; 18.15. –  ni vin ni boisson alcoolisée 7.33/ / ; Lv 10.9n  ; Nb 6.3  ; Jg 13.4,7,14 ; 1S 1.11n. –  rempli d''Esprit saint v. 35,41,67 ; Ac 2.4 ; 4.8,31 ; 9.17 ; 13.9 ; cf. Ep 5.18. –  depuis le ventre de sa mère  : cf. v. 41ss ; voir aussi Jg 13.5 ; 16.17 ; Es 49.1,5 ; Jr 1.4s ; Ga 1.15.'
  - type: text
    content: Car il sera grand devant le Seigneur,
  - type: text
    content: il ne boira ni vin ni boisson alcoolisée,
  - type: text
    content: il sera rempli d'Esprit saint depuis le ventre de sa mère
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'il ramènera beaucoup , ou une multitude  : cf. v. 14 ; Ml 2.6. –  d''Israélites  : litt. des fils d''Israël  ; cette formule sémitique, déjà calquée de l''hébreu dans le grec de LXX, se retrouve en Mt 27.9n  ; Ac 5.21 ; 7.23,37 ; 9.15 ; 10.36 ; Rm 9.27 ; 2Co 3.7,13 ; Hé 11.22 ; Ap 2.14 ; 7.4 ; 21.12.'
  - type: text
    content: et il ramènera beaucoup d'Israélites au Seigneur, leur Dieu.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Il ira devant lui v. 76 ; 7.27 ; Ml 3.1. –  l''esprit et la puissance (v. 35 ; 4.14+ ; Ac 1.8 ; 6.8 ; 10.38) d''Elie 2R 2.9s ; Ml 3.23n  ; Mt 11.14+. –  ramener… Ml 3.24+. –  cœur 1.66n. –  l''intelligence  : autre traduction la façon de penser  ; même terme Ep 1.8. –  former… un peuple préparé (le même verbe est traduit par frayer en 7.27) : cf. v. 76 ; 3.4 ; Ex 19.10s ; 2S 7.24.'
  - type: text
    content: Il ira devant lui avec l'esprit et la puissance d'Elie,
  - type: text
    content: afin de ramener le cœur des pères vers les enfants
  - type: text
    content: et les rebelles à l'intelligence des justes, et de former pour le Seigneur un peuple préparé.
  '18':
  - type: text
    content: ' '
  - type: note
    content: A quoi le saurai-je ? Gn 15.8 ; cf. Ex 4.3ss ; Jg 6.36ss ; 1S 10.2ss ; 2R 20.8ss ; Es 7.11 ; 1Co 1.22. –  je suis vieux… v. 7 ; Gn 17.17 ; 18.11.
  - type: text
    content: 'Zacharie dit à l''ange : A quoi le saurai-je ? Car, moi, je suis vieux, et ma femme est avancée en âge. '
  '19':
  - type: note
    content: 'Gabriel v. 26 ; Dn 8.16n  ; 9.21 ; cf. Tobit 12.15 : « Je suis Raphaël, l''un des sept anges qui se tiennent devant la gloire du Seigneur et pénètrent en sa présence. » –  j''ai été envoyé…  : cf. Hé 1.14. –  annoncer cette bonne nouvelle  : verbe apparenté au mot qui a donné évangile  ; 2.10 ; 3.18 ; 4.18,43.'
  - type: text
    content: 'L''ange lui répondit : Je suis Gabriel, celui qui se tient devant Dieu ; j''ai été envoyé pour te parler et t''annoncer cette bonne nouvelle. '
  '2':
  - type: note
    content: 'transmis  : cf. 1Co 11.2,23 ; 15.1ss,11. –  dès le commencement  : cf. 3.23 ; 23.5 ; 24.47 ; Ac 1.1,22 ; 10.37 ; voir aussi Jn 15.27 ; Hé 2.3. –  en ont été…  : autre traduction sont devenus les témoins oculaires et les serviteurs (même terme traduit par servant 4.20 ; auxiliaire Ac 13.5 ; voir aussi 26.16 ; 1Co 4.1n) ; cf. Ac 1.21s. –  la Parole 8.12ss ; Ac 6.4 ; cf. 8.4 etc.'
  - type: text
    content: 'tels que nous les ont transmis ceux qui, dès le commencement, en ont été les témoins oculaires et sont devenus serviteurs de la Parole, '
  '20':
  - type: note
    content: 'tu seras muet  : cf. v. 64 ; Ac 13.11 ; voir aussi Ez 3.26. –  tu n''as pas cru ou tu n''as pas eu foi à  : cf. v. 45. –  qui s''accompliront  : même verbe 4.21 ; 24.44. –  en leur temps 12.56 ; 18.30 ; 19.44 ; 21.8,24 ; Ac 1.7 ; 3.20 ; 17.26.'
  - type: text
    content: Eh bien, tu seras muet, tu ne pourras plus parler jusqu'au jour où cela se produira, parce que tu n'as pas cru mes paroles, qui s'accompliront en leur temps.
  '21':
  - type: text
    content: ' '
  - type: note
    content: D'après la Mishna ( Talmud, Yoma 5.1), le grand prêtre qui pénétrait dans le sanctuaire le jour de l'Expiation (cf. Lv 16) ne devait pas s'y attarder pour ne pas effrayer Israël.
  - type: text
    content: 'Cependant le peuple attendait Zacharie et s''étonnait qu''il s''attarde dans le sanctuaire. '
  '22':
  - type: note
    content: Cf. Dn 10.7. –  muet, ou peut-être sourd-muet, cf. v. 62.
  - type: text
    content: 'A sa sortie, il ne put leur parler, et ils comprirent qu''il avait eu une vision dans le sanctuaire ; il se mit à leur faire des signes et demeurait muet. '
  '23':
  - type: note
    content: Lorsque ses jours… 2.6,21s ; 9.51 ; Ac 2.1 ; 9.23. –  il rentra chez lui (litt. dans sa maison), v. 38 ; 2.15 (même verbe) ; cf. 1.39 ; voir aussi v. 56 ; 2.20,39,51.
  - type: text
    content: Lorsque ses jours de service furent achevés, il rentra chez lui.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'V. 13,36. –  Quelque temps après  : litt. après ces jours-là.'
  - type: text
    content: 'Quelque temps après, sa femme, Elisabeth, fut enceinte. Elle se cacha pendant cinq mois ; elle disait : '
  '25':
  - type: note
    content: 'Cf. Gn 21.6 ; 30.22s ; sur la honte associée à la stérilité, celle-ci étant parfois regardée comme un châtiment divin (Lv 20.20s ; 2S 6.23), voir aussi 1S 1.11 ; Es 4.1. –  au temps  : litt. aux jours. –  il a décidé de  : litt. il a regardé (pour), cf. Gn 29.31s ; Ex 2.25 ; Ps 10.14 ; 11.4.'
  - type: text
    content: Voilà ce que le Seigneur a fait pour moi au temps où il a décidé de retirer ma honte parmi les humains.
  - type: heading
    content: Annonce de la naissance de Jésus
  '26':
  - type: text
    content: ' '
  - type: note
    content: sixième mois v. 24. –  l'ange Gabriel v. 11,19. –  par Dieu ou de devant Dieu . –  Galilée / Nazareth (cf. 4.16n) Mt 2.22n-23n  ; la ville est en fait une petite bourgade (cf. 2.4,39 ; 4.31 ; 7.11 ; voir aussi Jn 1.46).
  - type: text
    content: 'Au sixième mois, l''ange Gabriel fut envoyé par Dieu dans une ville de Galilée du nom de Nazareth, '
  '27':
  - type: note
    content: 'vierge v. 34 ; voir aussi Mt 25.1ss ; Ac 21.9 ; 1Co 7.25 ; 2Co 11.2 ; Ap 14.4. –  fiancée 2.5 ; Mt 1.18n  ; cf. Dt 22.23. –  Joseph  : sur ce nom, cf. Gn 30.24n  ; Esd 10.42 ; Né 12.14 ; 1Ch 25.2,9. –  de la maison ou de la famille de David  : cf. v. 32s ; 2.4 ; 3.23ss ; cf. 1R 12.19 ; 2Ch 23.3 ; voir aussi Mt 1.1,20 ; Rm 1.3 ; 2Tm 2.8. –  Marie, en grec Mariam, de l''hébreu Miryam (Ex 15.20) ; Lc emploie également la forme Maria, v. 41 etc., comme Mc (6.3 etc.) et Mt (1.16ss etc. ; cf. 13.55n).'
  - type: text
    content: 'chez une vierge fiancée à un homme du nom de Joseph, de la maison de David ; le nom de la vierge était Marie. '
  '28':
  - type: note
    content: 'Réjouis-toi  : c''est la salutation (normalement matinale) courante dans le monde grec, qu''on traduit habituellement par bonjour (on la retrouve, p. ex., en Mt 26.49n  ; 27.29 ; 28.9) ; il est cependant probable que dans ce contexte elle doive être entendue, au-delà de son sens banal, comme un véritable appel à la joie ; cf. v. 14 ; Jl 2.21 ; So 3.14ss ; Za 9.9 ; Lm 4.21. –  toi qui es comblée par la grâce  : le verbe correspondant (qui en grec fait assonance avec la salutation), vient du mot habituellement traduit par grâce (v. 30) ; il revient seulement en Ep 1.6. –  le Seigneur est avec toi Jg 6.12 ; Rt 2.4 ; cf. Gn 26.24 ; 28.15 ; Ex 3.12 ; Jr 1.8,19 ; 15.20.'
  - type: text
    content: 'Il entra chez elle et dit : Réjouis-toi, toi qui es comblée par la grâce ; le Seigneur est avec toi. '
  '29':
  - type: note
    content: 'Très troublée  : cf. v. 12. –  elle se demandait  : le même verbe est traduit par raisonner, et un terme apparenté par raisonnement en 2.35 ; 3.15 ; 5.21s ; 6.8 ; 9.46ns ; 12.17 ; 20.14 ; 24.38n  ; cf. 1.34 ; 2.19.'
  - type: text
    content: 'Très troublée par cette parole, elle se demandait ce que pouvait bien signifier une telle salutation. '
  '3':
  - type: note
    content: 'il m''a semblé bon  : cf. Ac 15.22,25,28. –  après m''être informé…  : litt. après avoir bien suivi, même verbe 1Tm 4.6 ; 2Tm 3.10. –  d''une manière suivie  : même terme 8.1 (par la suite) ; Ac 3.24 (successeurs) ; 11.4 ; 18.23n (successivement). –  très excellent Ac 23.26 ; 24.3 ; 26.25. –  Théophile signifie ami de Dieu  ; c''était un nom assez répandu à l''époque, parmi les Juifs comme parmi les non-Juifs.'
  - type: text
    content: 'il m''a semblé bon, à moi aussi, après m''être informé exactement de tout depuis les origines, de te l''exposer par écrit d''une manière suivie, très excellent Théophile, '
  '30':
  - type: note
    content: 'N''aie pas peur  : cf. v. 13+ ; voir crainte. –  trouvé grâce  : cf. 2.40,52 ; 4.22 ; 6.32nss ; voir Gn 6.8+ ; Ex 33.16 ; 1S 1.18 ; Pr 12.2.'
  - type: text
    content: 'L''ange lui dit :'
  - type: text
    content: N'aie pas peur, Marie ; car tu as trouvé grâce auprès de Dieu.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.21 ; Gn 16.11 ; Jg 13.3 ; Es 7.14 ; Mt 1.21nss.
  - type: text
    content: Tu vas être enceinte ; tu mettras au monde un fils
  - type: text
    content: et tu l'appelleras du nom de Jésus.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Il sera grand  : litt. celui-ci sera grand (cf. v. 15). –  Fils du Très-Haut (v. 35,76 ; 6.35 ; 8.28 ; Ac 7.48 ; 16.17) : cf. 2S 7.14/ / ; Ps 2.7 ; 89.27. –  le trône de David, son père 2S 7.12s,16/ / ; Es 9.6 ; Am 9.11 ; Ps 132.11 ; Mc 11.10. – Un texte apocalyptique araméen très fragmentaire de Qumrân (4Q246) pourrait être reconstitué comme suit : « Il sera grand sur la terre. (…) Il sera appelé Fils de Dieu, et on l''appellera Fils du Très-Haut. (…) Son royaume sera un royaume éternel, et toutes ses voies seront de vérité et de droiture. La terre sera dans la vérité et tous feront la paix. »'
  - type: text
    content: Il sera grand et sera appelé Fils du Très-Haut,
  - type: text
    content: et le Seigneur Dieu lui donnera le trône de David, son père.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Il régnera (cf. 19.14,27,38 ; 23.2s,37s) pour toujours… Mi 4.7. –  la maison de Jacob , c.-à-d. Israël ; cf. Ex 19.3 ; Es 2.5s ; 8.17 ; 48.1. –  son règne n'aura pas de fin Es 9.6 ; Dn 7.14 ; cf. Hé 7.24.
  - type: text
    content: Il régnera pour toujours sur la maison de Jacob ;
  - type: text
    content: son règne n'aura pas de fin.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 18,27. –  je n''ai pas de relations…  : litt. je ne connais pas d''homme , euphémisme d''origine hébraïque, cf. Gn 4.1n  ; 19.8 ; Nb 31.17,35 ; Jg 11.39 ; 21.12 ; Mt 1.25n.'
  - type: text
    content: 'Marie dit à l''ange : Comment cela se produira-t-il, puisque je n''ai pas de relations avec un homme ? '
  '35':
  - type: note
    content: 'L''Esprit saint…  : cf. v. 17 ; Mt 1.18+,20 ; voir aussi Gn 1.2n  ; Es 11.1ss. –  viendra sur toi Ac 1.8 ; cf. Es 32.15. –  la puissance (v. 17+) du Très-Haut (v. 32+) : cf. 5.17. –  te couvrira de son ombre  : même verbe 9.34/ / ; Ac 5.15 (couvrir) ; cf. Ex 40.34s ; Nb 9.15 ; voir aussi Ps 91.1,4. –  l''enfant qui naîtra  : litt. ce qui est engendré  ; autres traductions l''enfant qui naîtra sera appelé saint, Fils de Dieu ; le saint qui sera engendré sera appelé Fils de Dieu. –  saint  : cf. 2.23 ; 4.34 ; Es 4.3 ; Ac 3.14 ; 4.27,30. –  Fils de Dieu (cf. v. 32) 3.22 ; 4.3,9,41 ; 8.28 ; 9.35 ; 10.22 ; 22.70 ; Mc 1.1 ; Jn 10.36 ; Ac 9.20.'
  - type: text
    content: 'L''ange lui répondit :'
  - type: text
    content: L'Esprit saint viendra sur toi, et la puissance du Très-Haut te couvrira de son ombre.
  - type: text
    content: C'est pourquoi l'enfant qui naîtra sera saint ; il sera appelé Fils de Dieu.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 7,24,26.
  - type: text
    content: 'Elisabeth, ta parente, a elle aussi conçu un fils, dans sa vieillesse : celle qu''on appelait femme stérile est dans son sixième mois. '
  '37':
  - type: note
    content: 'rien  : autre traduction aucune parole  ; cf. 18.27/ / ; Gn 18.14 ; Jr 32.17 ; Za 8.6 ; Jb 42.2 ; 2Ch 14.10. –  de la part de Dieu  : certains mss portent pour Dieu.'
  - type: text
    content: 'Car rien n''est impossible de la part de Dieu. '
  '38':
  - type: note
    content: 'l''esclave  : autre traduction la servante  ; dans le grec du Ier s. apr. J.-C. le terme correspondant évoque beaucoup plus la dépendance de l''esclave, son appartenance à son maître (7.2ss ; 12.37ss ; 14.17ss ; 17.7ss etc.) que l''idée d''un service volontaire. Ici, en outre, le style rappelle particulièrement l''A.T., où la politesse hébraïque veut qu''on se désigne par l''expression ton serviteur, ta servante (cf. 1S 1.11 ; 25.41 ; 2S 9.6 ; Rt 3.9). –  qu''il m''advienne…  : cf. 22.42 ; Ac 21.14.'
  - type: text
    content: 'Marie dit : Je suis l''esclave du Seigneur ; qu''il m''advienne selon ta parole.'
  - type: text
    content: Et l'ange s'éloigna d'elle.
  - type: heading
    content: Marie rend visite à Elisabeth
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'En ces jours-là… v. 36 ; cf. 2.1 ; 4.2 ; 5.35 ; 6.12 etc. –  partit  : litt. se leva et partit , tournure sémitique. –  en hâte  : cf. Ex 12.11. –  vers la région montagneuse…  : cf. v. 23,65.'
  - type: text
    content: 'En ces jours-là, Marie partit en hâte vers la région montagneuse et se rendit dans une ville de Juda. '
  '4':
  - type: note
    content: 'que tu connaisses ou que tu reconnaisses (même verbe Ac 19.34). –  la certitude ou la solidité, la valeur  ; terme apparenté Ac 21.34 ; 22.30 (au juste) ; 25.26 (précis). –  des enseignements  : autre traduction possible des informations (litt. des paroles).'
  - type: text
    content: afin que tu connaisses la certitude des enseignements que tu as reçus.
  - type: heading
    content: Annonce de la naissance de Jean le Baptiseur
  '40':
  - type: note
    content: Zacharie / Elisabeth v. 5.
  - type: text
    content: 'Elle entra dans la maison de Zacharie et salua Elisabeth. '
  '41':
  - type: note
    content: 'l''enfant  : le même terme (aussi v. 44) sera traduit par nouveau-né 2.12,16 ; 18.15 ; Ac 7.19 ; voir aussi 2Tm 3.15 ; 1P 2.2. –  tressaillit ou bondit  : cf. v. 44 ; 6.23 ; le verbe grec correspondant est celui qui est employé en Gn 25.22 (LXX), pour se heurter. –  remplie d''Esprit saint v. 15+.'
  - type: text
    content: 'Dès qu''Elisabeth entendit la salutation de Marie, l''enfant tressaillit dans son ventre. Elisabeth fut remplie d''Esprit saint '
  '42':
  - type: note
    content: 'et cria  : autre traduction poussa un grand cri et dit. –  Bénie sois-tu ou es-tu (le verbe est sous-entendu dans le texte) entre les femmes (ou plus que toutes les autres femmes) ; cf. 11.27 ; Jg 5.24n  ; Ct 1.8 ; 2 Baruch 54.10 : « Bienheureuse ma mère parmi celles qui ont enfanté, que soit louée, parmi les femmes, celle qui m''a enfanté ! » –  béni soit le fruit… Dt 7.13 ; 28.4,11 ; 30.9 ; cf. Gn 30.2 ; Mi 6.7 ; Ps 132.11.'
  - type: text
    content: 'et cria :'
  - type: text
    content: Bénie sois-tu entre les femmes,
  - type: text
    content: et béni soit le fruit de ton ventre !
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Comment m''est-il accordé  : litt. d''où (vient) pour moi ceci  ; cf. 2S 6.9 ; 24.21. –  mon Seigneur  : cf. 2.11 ; 20.41ss.'
  - type: text
    content: 'Comment m''est-il accordé que la mère de mon Seigneur vienne me voir ? '
  '44':
  - type: note
    content: tressailli (v. 41n) d'allégresse v. 14,47.
  - type: text
    content: 'Car dès que ta salutation a retenti à mes oreilles, l''enfant a tressailli d''allégresse dans mon ventre. '
  '45':
  - type: note
    content: 'Heureuse  : cf. v. 48 ; 6.20ss/ / ; 7.23 ; 10.23 ; 11.27 ; 14.15. –  qui a cru…  : autre traduction qui a cru que ce qui lui a été dit…  ; cf. v. 20,38 ; Hé 11.11.'
  - type: text
    content: Heureuse celle qui a cru, car ce qui lui a été dit de la part du Seigneur s'accomplira !
  - type: heading
    content: L'hymne de Marie
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1S 2.1-10. –  Marie  : certains mss latins portent Elisabeth  ; cf. v. 41,48s. –  Je magnifie  : litt. mon âme magnifie (même verbe v. 58n  ; Ac 5.13 ; 10.46 ; 19.17), cf. Mc 14.34n/ / ; voir aussi Ps 34.3s ; 69.31.'
  - type: text
    content: 'Et Marie dit :'
  - type: text
    content: Je magnifie le Seigneur,
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'je suis transportée d''allégresse  : litt. mon esprit exulte ou s''est mis à exulter  ; cf. v. 14,44 (terme apparenté) ; 10.21 (même verbe) ; Mt 5.12 ; Jn 8.56 ; Ac 2.26n,46 ; 1P 1.6+ ; Jd 24 ; Ap 19.7 ; cf. Es 61.10 ; Ha 3.18 ; Ps 9.15 ; 13.6 ; 31.8 ; 35.9. –  Dieu, mon Sauveur  : le même titre sera appliqué à Jésus 2.11+ ; cf. Dt 32.15 ; 1S 10.19 ; Es 12.2 ; 17.10 ; Mi 7.7 ; Ps 24.5 ; 25.5 ; 27.1,9 ; 62.2,7.'
  - type: text
    content: je suis transportée d'allégresse en Dieu, mon Sauveur,
  '48':
  - type: text
    content: ' '
  - type: note
    content: il a porté les regards… 9.38 ; 1S 1.11 ; cf. 9.16 ; Gn 16.11 ; 29.32 ; Ps 31.8 ; 113.6s ; Jc 2.3n. –  l'abaissement (ou l'humiliation  ; cf. v. 25) de son esclave (v. 38n), c.-à-d. mon abaissement  ; cf. 2.29n  ; Ac 4.29n. –  Désormais 5.10 ; 12.52 ; 22.18,69 ; Ac 18.6. –  me dira heureuse v. 45 ; Gn 30.13 ; cf. Ml 3.12 ; Ps 72.17 ; Jb 29.10s ; Pr 31.28 ; Ct 6.9.
  - type: text
    content: parce qu'il a porté les regards sur l'abaissement de son esclave.
  - type: text
    content: Désormais, en effet, chaque génération me dira heureuse,
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'le Puissant  : le même terme grec est employé dans la traduction (LXX) de So 3.17 ( héros ) ; Ps 89.9. –  de grandes choses  : cf. Dt 10.21 ; 11.7 ; Jg 2.7 ; Ps 71.19. –  Son nom est sacré ou saint Ps 111.9 ; cf. 1S 2.2 ; Es 57.15.'
  - type: text
    content: parce que le Puissant a fait pour moi de grandes choses.
  - type: text
    content: Son nom est sacré,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Aux jours d''Hérode (le Grand), entre 37 et 4 av. J.-C. ; cf. 2.2 ; Mt 2.1n. –  Judée  : l''expression désigne ici, non seulement la région de Jérusalem, au sud (v. 65 ; 2.4 ; 3.1 ; 21.21 ; Ac 9.31), mais bien l''ensemble du pays des Juifs (cf. 4.44 ; 6.17 ; 7.17 ; 23.5 ; Ac 2.9 ; 10.37). –  un prêtre nommé Zacharie (nom hébreu qui signifie Dieu s''est souvenu ) : cf. Né 11.12 ; 1Ch 15.24 ; 2Ch 35.8 ; le Protévangile de Jacques fera de Zacharie un grand prêtre. –  de la classe d''Abiya , la huitième des 24 classes sacerdotales ; cf. Né 12.4,17 ; 1Ch 24.10. –  une descendante d''Aaron  : litt. d''entre les filles d''Aaron , l''ancêtre des familles sacerdotales ; cf. Lv 21.7,14. –  Elisabeth , forme grecque de l''hébreu Elishéba (cf. Ex 6.23), qui pourrait signifier c''est par mon Dieu qu''est le serment , ou peut-être mon Dieu rassasie.'
  - type: text
    content: 'Aux jours d''Hérode, roi de Judée, il y eut un prêtre nommé Zacharie, de la classe d''Abiya ; sa femme était une descendante d''Aaron, et son nom était Elisabeth. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: Ps 103.17. –  de génération en génération Ps 100.5 ; cf. 61.7 ; 89.2. –  sur ceux qui le craignent Ps 61.6 ; 103.11,13 ; cf. Ac 10.35.
  - type: text
    content: et sa compassion s'étend de génération en génération
  - type: text
    content: sur ceux qui le craignent.
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'le pouvoir ou la force , litt. il a fait force par son bras  ; cf. Ps 89.11. Voir aussi Ex 6.6 ; Dt 4.34 ; Es 40.10 ; 51.5,9 ; 53.1 ; Ps 118.15s. –  ceux qui avaient des pensées orgueilleuses  : litt. les orgueilleux dans la pensée de leurs cœurs (v. 66n) ; cf. 2S 22.28 ; Es 2.12 ; 13.11.'
  - type: text
    content: Il a déployé le pouvoir de son bras ;
  - type: text
    content: il a dispersé ceux qui avaient des pensées orgueilleuses,
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.29ss ; 15.11ss ; 16.19ss ; 18.9ss ; 1S 2.7s ; Es 2.11ss ; Ez 21.26,31 ; Ps 113.7 ; 147.6 ; Jb 5.11 ; 12.19 ; 1Co 1.26ss ; 2Co 8.9 ; Ph 2.6ss ; Siracide 10.14 : « Le Seigneur a culbuté les trônes des princes, il a établi les doux à leur place. »'
  - type: text
    content: il a fait descendre les puissants de leurs trônes,
  - type: text
    content: élevé les humbles,
  '53':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1S 2.5. –  rassasié… Ps 107.9. –  renvoyé… Jb 22.9 ; cf. Gn 31.42 ; Dt 15.13 ; Rt 1.21 ; 3.17 ; Lc 20.11 ; voir aussi 1S 2.7 ; Ps 34.11 ; Jb 15.29.
  - type: text
    content: rassasié de biens les affamés,
  - type: text
    content: renvoyé les riches les mains vides.
  '54':
  - type: text
    content: ' '
  - type: note
    content: 'Il a secouru… Es 41.8s. –  son serviteur  : cf. Es 42.1 ; 44.1 ; 45.4 ; 52.13. –  s''est souvenu… v. 72 ; Ps 25.6 ; 98.3 ; cf. Gn 8.1 ; 9.15 ; Ex 2.24.'
  - type: text
    content: Il a secouru Israël, son serviteur,
  - type: text
    content: et il s'est souvenu de sa compassion
  '55':
  - type: text
    content: ' '
  - type: note
    content: comme il l'avait dit… Mi 7.20 ; cf. Gn 17.7 ; 18.18 ; 22.17s ; 2S 7.11ss. –  envers (autre traduction à ) Abraham et sa descendance Gn 17.9 ; cf. Ps 18.51.
  - type: text
    content: – comme il l'avait dit à nos pères –
  - type: text
    content: envers Abraham et sa descendance, pour toujours.
  '56':
  - type: text
    content: ' '
  - type: note
    content: 'avec Elisabeth  : litt. avec elle  ; cf. v. 46n. –  trois mois  : cf. v. 36. –  Puis elle retourna…  : cf. v. 23,38 ; 1S 1.19 ; voir aussi Lc 1.80 ; 3.20. –  chez elle  : litt. dans sa maison v. 26 ; cf. v. 40.'
  - type: text
    content: Marie demeura avec Elisabeth environ trois mois. Puis elle retourna chez elle.
  - type: heading
    content: Naissance de Jean le Baptiseur
  '57':
  - type: text
    content: ' '
  - type: note
    content: 'V. 13. –  arriva  : litt. fut rempli ou accompli , de même 2.6 ; cf. Gn 25.24.'
  - type: text
    content: 'Le temps où Elisabeth devait accoucher arriva, et elle mit au monde un fils. '
  '58':
  - type: note
    content: 'apprirent  : cf. v. 24,36. –  avait fait preuve…  : litt. avait grandi (ou magnifié, v. 46n) sa compassion envers elle, imitation d''une tournure hébraïque (cf. Gn 19.19). –  ils se réjouirent avec elle v. 14.'
  - type: text
    content: Ses voisins et les gens de sa parenté apprirent que le Seigneur avait fait preuve envers elle d'une grande compassion, et ils se réjouirent avec elle.
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'Le huitième jour 2.21 ; Gn 17.11s ; 21.4 ; Lv 12.3 ; Ac 7.8 ; Ph 3.5. –  ils allaient lui donner (autre traduction ils lui donnaient ) le nom…  : le nom est donné à la circoncision et non plus à la naissance, cf. Gn 4.1 ; 21.3 ; 25.25s.'
  - type: text
    content: 'Le huitième jour, ils vinrent circoncire l''enfant, et ils allaient lui donner le nom de son père, Zacharie. '
  '6':
  - type: note
    content: 'justes 2.25. –  suivaient d''une manière irréprochable tous les commandements  : cf. Gn 26.5 ; Nb 36.13 ; Dt 4.40 ; Ez 36.27 ; Ph 3.6 ; voir aussi loi. –  ordonnances  : cf. Rm 5.18n.'
  - type: text
    content: 'Tous deux étaient justes devant Dieu et suivaient d''une manière irréprochable tous les commandements et les ordonnances du Seigneur. '
  '60':
  - type: note
    content: 'Cf. v. 13n  ; c''est aussi la mère qui donne le nom en 1.31 ; Gn 29.32ss ; 30.6,24 ; 35.18 ; Jg 13.24 ; 1S 1.20 ; 4.21 etc. –  sa mère dit  : litt. ayant pris la parole, sa mère dit, sémitisme.'
  - type: text
    content: 'Mais sa mère dit : Non, il sera appelé Jean. '
  '61':
  - type: note
    content: Sur d'autres emplois du nom Jean ou Yohanân (v. 13n), cf. Né 12.13,42.
  - type: text
    content: 'Ils lui dirent : Il n''y a dans ta parenté personne qui porte ce nom. '
  '62':
  - type: note
    content: Cf. v. 22n. C'est le père qui donne le nom Gn 16.15 ; 17.19 ; 35.18 ; Ex 2.22.
  - type: text
    content: 'Et ils faisaient des signes à son père pour savoir comment il voulait l''appeler. '
  '63':
  - type: note
    content: 'il écrivit  : litt. il écrivit, disant, sémitisme. –  s''étonnèrent  : cf. 8.25,56 ; 9.43 ; 11.14 ; 24.12,41 ; Ac 2.7 ; 3.10.'
  - type: text
    content: 'Zacharie demanda une tablette et il écrivit : Son nom est Jean. Et tous s''étonnèrent. '
  '64':
  - type: note
    content: 'Cf. v. 20. –  A l''instant même 4.39 ; 5.25 ; 8.44,47,55 ; 13.13 ; 18.43 ; 19.11 ; 22.60. –  sa bouche…  : litt. sa bouche fut ouverte, et sa langue  ; cf. Dn 10.16. –  bénir Dieu v. 68 ; 2.28 ; 24.52s ; Rm 1.25 ; 2Co 1.3 ; 11.31 ; Ep 1.3 ; 1P 1.3.'
  - type: text
    content: 'A l''instant même, sa bouche s''ouvrit et sa langue se délia ; il se mit à parler et à bénir Dieu. '
  '65':
  - type: note
    content: 'saisis de crainte  : cf. v. 12 ; 5.26 ; 7.16 ; 8.25,37 ; Ac 2.43+. –  région montagneuse de la Judée v. 39. –  on discutait  : même verbe 6.11. –  ces événements ou ces paroles (sémitisme) ; cf. 2.15,19,51 ; Ac 5.32 ; 10.37.'
  - type: text
    content: 'Tous les habitants des alentours furent saisis de crainte et, dans toute la région montagneuse de la Judée, on discutait de tous ces événements. '
  '66':
  - type: note
    content: 'se mirent à réfléchir  : litt. mettaient dans leur cœur, le cœur étant ici, comme dans l''A.T., considéré comme le lieu de l''intériorité et de la réflexion ; cf. 2.19,35,51 ; 3.15 ; 5.22 ; 9.44n  ; 21.14n  ; Ac 5.4. Voir aussi 1S 21.13 ; Ml 2.2. –  la main du Seigneur Ac 11.21 ; 13.11 ; cf. 1R 18.46 ; 2R 3.15 ; Ez 1.3 ; 3.14,22 ; Ps 80.18 ; 139.5 ; 1Ch 4.10.'
  - type: text
    content: 'Tous ceux qui en entendaient parler se mirent à réfléchir. Ils se demandaient : Que sera donc cet enfant ? Car la main du Seigneur était avec lui.'
  - type: heading
    content: L'hymne de Zacharie
  '67':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 64. –  rempli d''Esprit saint v. 15+. –  parler en prophète  : cf. v. 76 ; 7.27.'
  - type: text
    content: 'Zacharie, son père, fut rempli d''Esprit saint et se mit à parler en prophète, en disant :'
  '68':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit le Seigneur…  : certains mss portent seulement Béni soit le Dieu d''Israël Gn 9.26 ; 14.20 ; 24.27 ; Ex 18.10 ; 1S 25.32 ; 1R 1.48 ; 8.15 ; Ps 41.14 ; 72.18 ; 106.48 ; 1Ch 16.36 ; 2Co 1.3 ; Ep 1.3 ; 1P 1.3. –  d''être intervenu en faveur de ou d''avoir visité son peuple  ; même verbe grec v. 78 ; 7.16 ; terme apparenté 19.44 ; cf. Ac 15.14 ; sur le verbe hébreu sous-jacent, qui évoque le plus souvent une intervention salvatrice, plus rarement une intervention punitive, voir Jr 6.15n  ; cf. Gn 21.1 ; 50.24s ; Ex 3.16 ; 4.31 ; 13.19 ; 32.34 ; Es 10.16 ; Jr 29.10 ; Ps 65.10 ; 80.15 ; 106.4 ; Rt 1.6. –  d''avoir assuré sa rédemption  : litt. d''avoir fait rédemption ou délivrance , même terme 2.38 ; mots apparentés en 21.28+ ; 24.21 ; Ac 7.35 ; cf. Es 63.4 ; Ps 111.9 ; 130.7s ; Tt 2.14 ; Hé 9.12,15 ; 1P 1.18.'
  - type: text
    content: Béni soit le Seigneur, le Dieu d'Israël,
  - type: text
    content: d'être intervenu en faveur de son peuple, d'avoir assuré sa rédemption
  '69':
  - type: text
    content: ' '
  - type: note
    content: 'suscité…  : litt. éveillé ou fait se lever  ; le même terme peut avoir le sens de ressusciter  ; cf. 3.8 ; 5.23s ; 6.8 ; 7.14,16,22 ; 8.54 ; 9.7,22 ; 11.8,31 ; 13.25 ; 20.37 ; 21.10 ; 24.6 ; Mt 2.13n  ; Mc 1.31n  ; Jn 2.19n  ; voir aussi Jg 2.16ss ; 3.9,15 ; Ac 13.22. –  une corne , c.-à-d. une puissance (sémitisme) ; cf. v. 71,77 ; 19.9 ; cf. Ps 18.3 ; voir aussi Dt 33.17 ; 1S 2.1,10 ; Ez 29.21 ; Ps 75.5 ; 89.25 ; 132.17 ; 148.14. –  dans la maison de David 2S 7.12s ; Mt 1.1. –  son serviteur Es 37.35 ; Ps 18.1 ; 1Ch 17.4,24 ; Ac 4.25.'
  - type: text
    content: et de nous avoir suscité une corne de salut
  - type: text
    content: dans la maison de David, son serviteur,
  '7':
  - type: note
    content: stérile Gn 11.30 ; 16.1 ; 25.21 ; 29.31 ; 30.1 ; Jg 13.2s ; 1S 1.5. –  avancés en âge Gn 18.11.
  - type: text
    content: Mais ils n'avaient pas d'enfant, parce qu'Elisabeth était stérile, et ils étaient l'un et l'autre avancés en âge.
  '70':
  - type: text
    content: ' '
  - type: note
    content: de ses saints prophètes d'autrefois ou des saints d'autrefois, ses prophètes  ; cf. 24.44 ; Ac 3.18,21 ; Rm 1.2 ; 2P 3.2 ; Ap 10.7+.
  - type: text
    content: – comme il en a parlé par la bouche de ses saints prophètes d'autrefois –
  '71':
  - type: text
    content: ' '
  - type: note
    content: Ps 18.18 ; 106.10. –  salut v. 69.
  - type: text
    content: un salut qui nous délivre de nos ennemis et de tous ceux qui nous détestent.
  '72':
  - type: text
    content: ' '
  - type: note
    content: 'C''est ainsi qu''il montre (autre traduction pour montrer ) sa compassion envers nos pères Mi 7.20 ; cf. Dt 7.9 ; 1R 8.23. –  il se souvient de son alliance sacrée ou sainte v. 54 ; Ps 105.8s ; 106.45 ; 111.5 ; cf. Gn 17.7 ; Ex 2.24 ; Lv 26.42 ; Ez 16.60 ; Ac 3.25 ; 7.8 ; 1 Maccabées 4.10 : « Crions vers le Ciel ; s''il veut de nous, il se souviendra de l''alliance des pères. »'
  - type: text
    content: C'est ainsi qu'il montre sa compassion envers nos pères
  - type: text
    content: et qu'il se souvient de son alliance sacrée,
  '73':
  - type: text
    content: ' '
  - type: note
    content: 'selon le serment  : autre traduction et du serment  ; cf. Gn 22.16s ; 26.3 ; Jr 11.5 ; Mi 7.20 ; Ps 105.8ss.'
  - type: text
    content: selon le serment qu'il a juré à Abraham, notre père ;
  - type: text
    content: 'ainsi nous accorde-t-il, '
  '74':
  - type: note
    content: 'Mi 4.10 ; Ps 97.10. –  des ennemis  : certains mss portent de nos ennemis. – Voir crainte. –  lui rendre un culte 2.37n.'
  - type: text
    content: après avoir été délivrés des ennemis, de pouvoir sans crainte
  - type: text
    content: 'lui rendre un culte '
  '75':
  - type: note
    content: 'sainteté (ou piété  ; termes de la même famille Ac 2.27 ; 13.34s ; 1Th 2.10 ; 1Tm 2.8 ; Tt 1.8 ; Hé 7.26 ; Ap 15.4 ; 16.5) / justice Ep 4.24n  ; cf. Jos 24.14 ; Tt 2.12. –  tout au long de nos jours  : certains mss portent tous les jours de notre vie  ; cf. 9.23.'
  - type: text
    content: dans la sainteté et la justice,
  - type: text
    content: devant lui, tout au long de nos jours.
  '76':
  - type: text
    content: ' '
  - type: note
    content: 'mon enfant  : litt. enfant . –  prophète du Très-Haut  : cf. v. 32+ ; voir aussi 7.26/ / ; 20.6. –  tu iras…  : cf. v. 17 ; 3.4/ / ; 7.27 ; Es 40.3 ; Ml 3.1. –  le Seigneur  : cf. v. 17,43.'
  - type: text
    content: Et toi, mon enfant, tu seras appelé prophète du Très-Haut ;
  - type: text
    content: car tu iras devant le Seigneur pour préparer ses chemins,
  '77':
  - type: text
    content: ' '
  - type: note
    content: 'connaissance du salut  : cf. v. 71 ; 3.7ss. –  par (ou dans ) le pardon de ses péchés 3.3/ / ; cf. 5.20+ ; Es 55.7 ; Ps 25.18 ; Mt 26.28 ; Ac 5.31.'
  - type: text
    content: pour donner à son peuple la connaissance du salut
  - type: text
    content: par le pardon de ses péchés,
  '78':
  - type: text
    content: ' '
  - type: note
    content: 'la tendre compassion  : litt. les entrailles de compassion , les entrailles étant perçues comme le siège des émotions, notamment de la pitié (Col 3.12n) ; cf. Es 54.7 ; 63.7,15 ; Jr 31.20 ; Za 1.16 ; Ps 79.8 ; 119.77 ; 145.9 ; Mt 9.36n. –  le soleil levant  : autres traductions l''aurore ; un astre levant  ; litt. un levant  ; cf. Nb 24.17 ; Ml 3.20 ; Mt 2.2,9 ; le verbe correspondant peut s''appliquer au lever d''un astre, mais aussi à la pousse d''une graine ; d''ailleurs le terme grec qui apparaît ici est, dans LXX, la traduction du mot hébreu rendu par germe en Jr 23.5 ; Za 3.8 ; 6.12 ; cf. Es 11.1 ; voir aussi 60.1s ; 2P 1.19. –  brillera sur nous  : litt. nous visitera (certains mss ont le passé nous a visités ) ; sur le verbe grec, voir v. 68n. –  d''en haut  : cf. 24.49 ; terme apparenté (superlatif) en 2.14 ( les lieux très hauts ) ; le même terme est traduit par hauteur en Ep 3.18 ; 4.8.'
  - type: text
    content: grâce à la tendre compassion de notre Dieu.
  - type: text
    content: C'est par elle que le soleil levant brillera sur nous d'en haut
  '79':
  - type: text
    content: ' '
  - type: note
    content: 'éclairer  : autre traduction se manifester à (Tt 2.11+). –  ceux qui… Ps 107.10,14 ; cf. Es 9.1 ; 42.7 ; Mt 4.16 ; Ac 26.17s. –  vers (ou sur ) le chemin de la paix (ou un chemin de paix ) : cf. 2.14,29 ; 7.50 ; 8.48 ; 10.5s ; 11.21n  ; 12.51 ; 14.32 ; 19.38,42 ; 24.36 ; Es 59.8 ; Rm 3.17 ; voir aussi Es 9.5s ; Mi 5.4.'
  - type: text
    content: pour éclairer ceux qui sont assis dans les ténèbres et dans l'ombre de la mort
  - type: text
    content: et pour diriger nos pas vers le chemin de la paix.
  - type: heading
    content: La jeunesse de Jean le Baptiseur
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'selon le tour  : litt. dans l''ordre  ; chaque classe de prêtres (v. 5n) servait pendant une semaine, deux fois dans l''année.'
  - type: text
    content: 'Or, dans l''exercice de ses fonctions devant Dieu, selon le tour de sa classe, '
  '80':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.40,52 ; Gn 21.8,20 ; Jg 13.24s ; 1S 2.21,26 ; 3.19. –  et devenait fort par l''Esprit  : autre traduction possible et son esprit se fortifiait  ; cf. v. 15,41,67. –  dans les déserts ou dans les lieux déserts  ; cf. 3.2,4/ / ; 7.24 ; voir Mt 3.1n.'
  - type: text
    content: Or l'enfant grandissait et devenait fort par l'Esprit. Il demeurait dans les déserts, jusqu'au jour où il se présenta devant Israël.
  '9':
  - type: note
    content: 'il fut désigné par le sort  : la Mishna (voir Talmud) évoque cette coutume pour désigner ceux des nombreux prêtres qui devaient officier. –  suivant la coutume du sacerdoce  : cette précision, qui figure au début du v. dans le texte grec, pourrait aussi être rattachée au v. 8. –  dans le sanctuaire v. 21s ; il s''agit en l''occurrence du lieu dit sacré ou saint, où se trouve l''autel de l''encens Ex 30.6ss ; voir temple  ; le même mot désigne peut-être en Lc 23.45 le très-sacré ou saint des saints, où seul le grand prêtre entrait.'
  - type: text
    content: 'il fut désigné par le sort, suivant la coutume du sacerdoce, pour entrer dans le sanctuaire du Seigneur et y offrir l''encens. '
