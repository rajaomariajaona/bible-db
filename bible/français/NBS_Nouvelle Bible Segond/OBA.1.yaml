document_id: OBA.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur annonce la ruine d'Edom
  - type: text
    content: ' '
  - type: note
    content: 'Vision 1S 3.1 ; Es 1.1 ; 2.1 ; 13.1 ; 30.10 ; Am 1.1+ ; Mi 1.1 ; Na 1.1 ; Ha 2.2s ; Ps 89.20. –  Abdias  : hébreu ‘Ovadya, Serviteur de YHWH  ; cf. 1R 18.7. –  Edom ou Esaü (v. 6,8), au sud-est d''Israël (Gn 25.19ss ; 27.41 ; 36 ; Nb 20.14ss ; Jr 49.7 ; Ez 35 ; Jl 4.19 ; Am 1.11 ; Ps 137.7 ; Lm 4.21). –  Nous avons appris une nouvelle (ou nous en avons entendu parler ) : cf. Es 37.7 ; Jr 51.46 (le même mot est traduit par bruit ) ; Jb 42.5 ; LXX j''ai appris  ; cf. Jr 49.14. –  un émissaire Es 18.2 ; 57.9 ; Pr 13.17 ; 25.13. –  contre elle  : il faut peut-être entendre contre la capitale , car le pays d''Edom est désigné dans la suite par un pronom masculin.'
  - type: text
    content: Vision d'Abdias.
  - type: text
    content: 'Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' à Edom :'
  - type: text
    content: Nous avons appris une nouvelle
  - type: text
    content: 'de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'et un émissaire a été envoyé parmi les nations :'
  - type: text
    content: Levez-vous !
  - type: text
    content: Levons-nous contre elle !
  - type: text
    content: Au combat !
  '10':
  - type: text
    content: ' '
  - type: note
    content: Jl 4.19 ; Am 1.11s ; cf. Gn 27.
  - type: text
    content: A cause des violences exercées contre Jacob, ton frère,
  - type: text
    content: tu seras couvert de honte
  - type: text
    content: et tu seras retranché pour toujours.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Sur l''attitude d''Edom lors de la prise de Jérusalem par Babylone (587/6 av. J.-C.), cf. Ez 25.12ss ; 35.5,12ss ; Ps 137.7 ; Lm 4.21s. –  en face ou à l''écart  ; cf. Ps 38.12. –  ce qui faisait sa force  : le terme hébreu peut désigner aussi bien l''armée, emmenée captive, que les richesses, pillées. –  tiraient… au sort pour s''en partager le butin ; cf. Es 34.17 ; Jl 4.3 ; Na 3.10.'
  - type: text
    content: Le jour où tu te tenais en face de lui,
  - type: text
    content: le jour où d'autres emportaient ce qui faisait sa force,
  - type: text
    content: où des étrangers entraient par ses portes
  - type: text
    content: et tiraient Jérusalem au sort,
  - type: text
    content: toi aussi tu étais comme l'un d'eux.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Ne prends pas plaisir à voir  : litt. ne regarde pas dans  ; l''expression comporte, dans certains cas, une nuance affective : parfois d''horreur, ici probablement de plaisir mauvais ; de même au v. 13 ; cf. Mi 4.11 ; Ps 22.18 ; 54.9 ; 92.12 ; 112.8 ; 118.7. –  infortune Jb 31.3. –  ne te réjouis pas Mi 7.8. –  fils de Juda Os 2.2+ ; Jl 4.8. –  n''ouvre pas…  : expression analogue en Ez 35.13 ( s''élever par des discours ) ; cf. 1S 2.1 ; Es 57.4 ; Jr 48.26,42 ; Ps 35.21,26 ; 81.11. –  jour de la détresse Jr 16.19.'
  - type: text
    content: Ne prends pas plaisir à voir le jour de ton frère,
  - type: text
    content: le jour de son infortune,
  - type: text
    content: ne te réjouis pas au sujet des fils de Juda
  - type: text
    content: au jour de leur ruine,
  - type: text
    content: n'ouvre pas tout grand ta bouche
  - type: text
    content: au jour de la détresse !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les villes  : litt. les portes . –  le jour…  : litt. au jour de leur catastrophe… de sa catastrophe… de sa catastrophe  ; cf. Dt 32.35 ; Jb 18.12 ; 21.17,30 ; 30.12 ; Pr 1.26s ; 6.15. –  ne porte pas la main  : traduction conjecturale ; le verbe hébreu est au féminin pluriel, de sorte que certains y ont vu une interpellation des femmes d''Edom. –  ce qui faisait sa force v. 11n.'
  - type: text
    content: N'entre pas dans les villes de mon peuple
  - type: text
    content: le jour où la catastrophe s'abat sur lui !
  - type: text
    content: Ne prends pas plaisir, toi aussi, à voir son malheur
  - type: text
    content: le jour où la catastrophe s'abat sur lui,
  - type: text
    content: et ne porte pas la main sur ce qui faisait sa force
  - type: text
    content: le jour où la catastrophe s'abat sur lui !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'au carrefour  : terme rare et traduction incertaine ; le même mot ( ?) est traduit par violence en Na 3.1. –  Ne livre pas… Am 1.6+,9,11s.'
  - type: text
    content: Ne te tiens pas au carrefour
  - type: text
    content: pour retrancher ses rescapés !
  - type: text
    content: Ne livre pas ses survivants
  - type: text
    content: au jour de la détresse !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'le jour du Seigneur …  : cf. Es 34.8 ; Jl 1.15+ ; 2.1 ; Am 5.18 ; So 1.14ss. –  il te sera fait… Jr 50.15,29 ; Ez 35.11 ; Jl 4.4,7 ; Ap 18.6.'
  - type: text
    content: 'Car le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche,'
  - type: text
    content: pour toutes les nations ;
  - type: text
    content: il te sera fait comme tu as fait,
  - type: text
    content: ce que tu as mérité retombera sur ta tête.
  - type: heading
    content: Israël prendra sa revanche sur Edom
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'vous avez bu / elles boiront Jr 25.15,27s ; 49.12 ; 51.7,17,22s ; Ez 23.31ss ; Ha 2.15s ; Ps 60.5 ; 75.9 ; Lm 4.21 ; Mt 20.22s/ / ; 26.39/ / ; Jn 18.11 ; Ap 14.10 ; 16.19. –  ma montagne sacrée ou sainte Jl 4.17 ; Ps 2.6+. –  elles avaleront  : traduction conjecturale ; certains comprennent elles bégaieront , d''autres modifient le texte hébreu traditionnel pour lire elles vacilleront Es 24.20 ; 29.9 ; Ps 107.27. –  comme si elles n''avaient jamais existé  : certains comprennent comme elles n''ont jamais été  ; cf. Sagesse 2.2 (paroles des méchants) : « Nous sommes nés à l''improviste et après, ce sera comme si nous n''avions pas existé. » Siracide 44.9 : « Il y en a aussi (des gens d''autrefois, qui ne se sont pas distingués par leur justice) dont il ne reste pas de souvenir ; ils ont péri comme s''ils n''avaient pas existé, ils sont comme s''ils n''avaient pas été, ainsi que leurs enfants après eux. »'
  - type: text
    content: En effet, comme vous avez bu sur ma montagne sacrée,
  - type: text
    content: ainsi toutes les nations boiront constamment,
  - type: text
    content: elles boiront, elles avaleront,
  - type: text
    content: et elles seront comme si elles n'avaient jamais existé.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jl 3.5n  ; voir aussi Es 4.3 ; 46.13. –  ce sera de nouveau un lieu sacré  : d''autres comprennent et ils seront saints  ; cf. Jl 4.17.'
  - type: text
    content: Mais au mont Sion il y aura des rescapés ;
  - type: text
    content: ce sera de nouveau un lieu sacré,
  - type: text
    content: et la maison de Jacob reprendra ses possessions.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Jacob désigne ici le pays de Juda (v. 10 ; Jl 4.19), par opposition à Joseph , l''ancien royaume du Nord (Am 5.6 ; Za 10.6). –  un feu…  : cf. Es 5.24 ; 10.17 ; 47.14 ; Za 12.6 ; Ml 3.19. –  aucun survivant Es 34.12 ; Ez 25.13. –  c''est le Seigneur qui parle Jl 4.8+.'
  - type: text
    content: La maison de Jacob sera un feu
  - type: text
    content: et la maison de Joseph une flamme ;
  - type: text
    content: mais la maison d'Esaü sera du chaume,
  - type: text
    content: qu'elles allumeront et dévoreront ;
  - type: text
    content: et il n'y aura aucun survivant pour la maison d'Esaü
  - type: text
    content: '– c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  - type: heading
    content: Conquête des territoires voisins
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur jusqu''à la fin du livre ; ce v. semble décrire une extension de chaque région frontalière de Juda aux dépens de ses voisins immédiats : ainsi le Néguev , au sud (Gn 12.9 ; 13.1 ; 20.1), s''étend sur Edom (= Esaü  ; cf. v. 1n,6,8+ ; Am 9.12), le Bas-Pays (hébreu shephéla ) à l''ouest (Dt 1.7 ; Jr 17.26 ; 32.44) sur les Philistins (Am 1.6nss), Benjamin (rattaché à l''ancien royaume de Juda) sur Ephraïm et Samarie au nord (l''ancien royaume des dix tribus ; cf. Os 4.17n), et sur le Galaad à l''est (Transjordanie, Am 1.3n). Mais on pourrait aussi lire le texte comme une simple énumération  : ils prendront possession du (ou posséderont le ) Néguev, de la région montagneuse d''Esaü, du Bas-Pays, etc. –  du pays des Philistins  : litt. des Philistins.'
  - type: text
    content: 'Le Néguev prendra possession de la région montagneuse d''Esaü, et le Bas-Pays prendra possession du pays des Philistins ; ils prendront possession du pays d''Ephraïm et du pays de Samarie ; et Benjamin prendra possession du Galaad. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Jr 49.15.
  - type: text
    content: Je te rends petit parmi les nations,
  - type: text
    content: te voilà l'objet du plus grand mépris.
  '20':
  - type: note
    content: Traduction conjecturale ; le mot traduit par armée (par ressemblance avec le terme rendu par ce qui faisait sa force au v. 11n) pourrait aussi signifier rempart  ; l'expression prendront possession du pays ne figure pas dans le texte. On pourrait aussi comprendre les exilés, ce rempart des Israélites qui sont des Cananéens, s'étendront jusqu'à… –  Sarepta en Phénicie (1R 17.8s ; Lc 4.26), entre Tyr et Sidon (au nord). –  Sepharad est peut-être Sardes, en Lydie, ou Hespérides, en Afrique du Nord ; dans la tradition juive postérieure le terme désigne l'Espagne et l'Afrique du Nord (à l'ouest par rapport au royaume d'Israël).
  - type: text
    content: Les exilés, cette armée d'Israélites, prendront possession du pays des Cananéens jusqu'à Sarepta, et les exilés de Jérusalem qui sont à Sepharad prendront possession des villes du Néguev.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'sauveurs  : cf. Jg 3.9,15 ; 2R 13.5 ; plusieurs versions anciennes ont lu ceux qui sont sauvés . –  monteront… Es 2.3 ; Ps 120.1n. –  juger  : cf. Jg 2.16n. –  région montagneuse d''Esaü  : cf. v. 8n. –  le règne… Ex 15.18 ; Mi 4.7 ; Za 14.9 ; Ps 22.28ss ; 93.1+ ; 103.19 ; 145.11ss ; Ap 11.15.'
  - type: text
    content: Des sauveurs monteront au mont Sion,
  - type: text
    content: pour juger la région montagneuse d'Esaü ;
  - type: text
    content: 'et le règne appartiendra au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 49.16n. –  arrogance Jr 50.31 ; Ez 7.10 ; Pr 11.2. –  t''a trompé v. 7 ; Gn 3.13 ; Es 36.14 ; 37.10 ; Jr 4.10 ; 29.8. –  dans les creux des rochers (Ct 2.14) ou, si l''on prend le dernier mot comme un nom propre, de Séla (Jg 1.36n  ; 2R 14.7). –  qui te dis  : litt. qui dis en ton cœur.'
  - type: text
    content: L'arrogance de ton cœur t'a trompé,
  - type: text
    content: toi qui demeures dans les creux des rochers,
  - type: text
    content: toi qui habites la hauteur
  - type: text
    content: 'et qui te dis :'
  - type: text
    content: Qui me fera descendre à terre ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Nb 24.21 ; Es 14.13ss ; Jr 51.53 ; Ha 2.9 ; Jb 39.27 ; Mt 11.23.
  - type: text
    content: Quand tu prendrais de la hauteur, tel un aigle,
  - type: text
    content: quand ton nid serait placé parmi les étoiles,
  - type: text
    content: je t'en ferais descendre
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'des pillards  : autre traduction des ravageurs , cf. Es 16.4 ; 21.2 ; 33.1 ; Jr 51.48,56 ; Jb 15.21. –  comment (cf. v. 6n) restes-tu tranquille ? autre traduction comme tu seras ruiné ! Sur le verbe correspondant, qui peut être traduit par périr, être perdu ou être réduit au silence , cf. Es 6.5 ; Os 4.5ns ; 10.15 ; So 1.11. –  grappillage  : cf. Jr 49.9n  ; voir aussi Es 17.6 ; 24.13 ; Mi 7.1.'
  - type: text
    content: Si des voleurs, des pillards nocturnes, viennent chez toi,
  - type: text
    content: comment restes-tu tranquille ?
  - type: text
    content: Ne voleront-ils pas ce qui leur est nécessaire ?
  - type: text
    content: Et si des vendangeurs viennent chez toi,
  - type: text
    content: laisseront-ils autre chose que du grappillage ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 49.10. –  Comment ! ici (cf. v. 5n) le terme rappelle ironiquement les complaintes ; cf. Lm 1.1n. –  Esaü = Edom ; v. 1n. –  cachettes  : cf. Jg 6.2,11.'
  - type: text
    content: Comment ! Esaü est mis à nu !
  - type: text
    content: Ses cachettes sont éventrées !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Tes alliés  : litt. les hommes de ton alliance  ; cf. Ml 2.14n. –  trompent v. 3+. –  tes amis  : litt. les hommes de ta paix  ; cf. Jr 20.10n  ; 38.22 ; Ps 41.10n. –  te possèdent  : autres traductions l''emportent sur toi, t''ont vaincu  ; formule analogue en Gn 30.8 ; 32.26,29 ; Os 12.5 ; Ps 129.2. –  ils se servent…  : litt. ils ont placé ton pain (comme) un piège (sens incertain ; le même mot est traduit par plaie en Os 5.13) sous toi  ; certains modifient le texte hébreu traditionnel pour lire ceux qui mangeaient ton pain ont placé un filet (comme en Jb 19.6) sous tes pas , ou encore ils t''ont fait la guerre, ils ont placé un filet sous tes pas.'
  - type: text
    content: On te chasse de ton territoire.
  - type: text
    content: Tes alliés te trompent, tes amis te possèdent ;
  - type: text
    content: ils se servent de ton pain comme d'un piège pour toi, par-dessous.
  - type: text
    content: – « Il n'y a plus d'intelligence en lui ! »
  - type: heading
    content: Edom a profité du malheur d'Israël
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'en ce jour-là Es 27.1s ; Jr 39.16s ; Jl 4.1 ; Am 2.16+ ; Za 14.9. –  Edom / sages / intelligence Jr 49.7 ; Jb 2.11n  ; 15.1s ; cf. Es 19.11ss ; 29.14 ; voir aussi Es 34.12 ; 1Co 1.19 ; cf. Baruch 3.22s : « On ne l''a pas non plus entendue (la Sagesse) en Canaan ni vue à Témân (v. 9) ; même les fils d''Agar (= les Arabes) qui recherchaient le savoir sur la terre, les marchands de Merrân et de Témân, les conteurs de fables et les chercheurs de savoir, ils n''ont pas connu le chemin de la Sagesse et ne se sont pas souvenus de ses sentiers. » –  région montagneuse (ou montagne ) d''Esaü (v. 1n,6) : v. 9,19,21, également nommée région montagneuse de Séir  ; de même dans la suite ; Gn 36.7ss ; Dt 2.5 ; Ez 35.15.'
  - type: text
    content: N'est-ce pas en ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: que je ferai disparaître d'Edom les sages,
  - type: text
    content: et de la région montagneuse d'Esaü l'intelligence ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 49.22. –  Témân  : ville au nord d''Edom Gn 36.11,15,42 ; Jr 49.7,20 ; Am 1.12 ; Jb 2.11 ; 15.1 ; 1Ch 1.36,53. –  par la tuerie  : LXX et Vg rattachent cette expression au v. 10  : A cause de la tuerie et de la violence…'
  - type: text
    content: Tes guerriers seront terrifiés, Témân,
  - type: text
    content: pour que tout homme soit retranché de la région montagneuse d'Esaü
  - type: text
    content: par la tuerie !
