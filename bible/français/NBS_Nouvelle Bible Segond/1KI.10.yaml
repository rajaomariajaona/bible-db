      marker-yv: yv-n
    - type: text
      text: Elle donna au roi cent vingt talents d'or, une très grande quantité d'essences odoriférantes et des pierres précieuses. Il n'arriva plus autant d'essences odoriférantes que celles que la reine de Saba donna au roi Salomon.
