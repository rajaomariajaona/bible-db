        - type: text
          text: 'reine de Saba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'témoigne, pour l''auteur, de la réputation universelle de Salomon et de sa sagesse ; cf. Mt 12.42 ; Lc 11.31. –  '
