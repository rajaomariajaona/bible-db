document_id: 1KI.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La reine de Saba rend visite à Salomon
  - type: heading
    content: 2Ch 9.1-12
  - type: text
    content: ' '
  - type: note
    content: 'La reine de Saba v. 4,10,13. Saba , en hébreu Sheva’ (Gn 10.7,28 ; 25.3 ; Es 60.6 ; Jr 6.20 ; Ez 27.22s ; Ps 72.10,15 ; Jb 1.15 ; 6.19), est le nom d''un royaume sud-arabique attesté dès l''époque assyrienne et correspondant grosso modo au nord du Yémen. La visite de la reine de Saba témoigne, pour l''auteur, de la réputation universelle de Salomon et de sa sagesse ; cf. Mt 12.42 ; Lc 11.31. –  entendit parler…  : litt. entendit ce qu''on entendait de Salomon . –  pour le nom du Seigneur  : ce complément est absent dans 2Ch 9.1 et Tg. On pourrait comprendre  : entendit parler de la renommée que Salomon devait au nom du Seigneur ou bien entendit ce qu''on disait de Salomon à la gloire du Seigneur . –  énigmes  : cf. Nb 12.8 ; Jg 14.12-18 ; Ha 2.6.'
  - type: text
    content: 'La reine de Saba entendit parler de la réputation de Salomon pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et elle vint le mettre à l''épreuve par des énigmes. '
  '10':
  - type: note
    content: 'Elle donna au roi…  : cf. v. 24s. –  cent vingt talents d''or  : plus de 4 tonnes, cf. v. 14n  ; voir mesures, poids et monnaies. –  Il n''arriva plus…  : cf. v. 12,20.'
  - type: text
    content: Elle donna au roi cent vingt talents d'or, une très grande quantité d'essences odoriférantes et des pierres précieuses. Il n'arriva plus autant d'essences odoriférantes que celles que la reine de Saba donna au roi Salomon.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Les bateaux (9.26n) de Hiram… v. 22. –  Ophir 9.26-28n. –  santal  : hébreu ’almougim , de même au v. 12 ; le sens de ce mot reste incertain (cf. 2Ch 2.7 ; 9.10s ’algoummim ).'
  - type: text
    content: 'Les bateaux de Hiram, qui apportèrent de l''or d''Ophir, amenèrent aussi d''Ophir une très grande quantité de bois de santal et des pierres précieuses. '
  '12':
  - type: note
    content: 'une balustrade  : le terme hébreu correspondant n''apparaît qu''ici ; autres traductions possibles des appuis ; des supports  ; cf. 2Ch 9.11 (voies d''accès). –  Il n''arriva plus…  : cf. v. 10,20.'
  - type: text
    content: 'Le roi fit avec le bois de santal une balustrade pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et pour la maison du roi, ainsi que des lyres et des luths pour les chantres. Il n''arriva plus pareil bois de santal, on n''en a plus vu jusqu''à ce jour.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'tout ce qu''elle souhaita demander  : litt. tout son plaisir qu''elle demanda , ou tout ce qu''il lui plut de demander.'
  - type: text
    content: Le roi Salomon donna à la reine de Saba tout ce qu'elle souhaita demander, et il lui fit bien d'autres présents, comme seul pouvait en faire le roi Salomon. Puis elle s'en retourna dans son pays, elle et les gens de sa cour.
  - type: heading
    content: Les richesses de Salomon
  - type: heading
    content: 2Ch 9.13-28
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'six cent soixante-six talents  : si l''on considère le talent comme une unité de poids , plus de 22 tonnes, cf. v. 10n. Sur la richesse proverbiale de Salomon , cf. Mt 6.29.'
  - type: text
    content: 'Le poids de l''or qui arrivait à Salomon chaque année était de six cent soixante-six talents d''or, '
  '15':
  - type: note
    content: 'ce qui provenait des prospecteurs  : traduction incertaine ; autres possibilités (ce qui provenait) des commerçants itinérants, des colporteurs (le terme semble dérivé d''une forme verbale qui décrit habituellement l''activité des espions) ; certains modifient le texte hébreu traditionnel pour lire la contribution des prospecteurs… (cf. 2R 23.33). –  les rois des populations mêlées  : traduction incertaine ; le texte hébreu, légèrement différent de celui qui apparaît en 2Ch 9.14, emploie le terme qui apparaît en Ex 12.38n  ; ici on a aussi compris des rois de l''Occident. –  gouverneurs  : le mot hébreu qui apparaît ici est peut-être emprunté à l''assyrien ; il est également employé en araméen, et son usage dans la Bible correspond surtout à l''époque perse. LXX le traduit par satrapes (terme d''origine perse), ici et en 2Ch 9.14 ; voir ses autres emplois en 1R 20.24 ; 2R 18.24 ; Jr 51.23,28,57 ; Ez 23.6,12,23 ; Ag 1.1 etc. ; Ml 1.8 ; Est 3.12 etc. ; Dn 3.2s,27 ; 6.8 ; Esd 5.3 etc. ; Né 2.7 etc.'
  - type: text
    content: outre ce qui provenait des prospecteurs et du commerce des marchands, ainsi que de tous les rois des populations mêlées et des gouverneurs du pays.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'deux cents  : LXX a ici trois cents , et deux cents en 2Ch 9.15. –  grands boucliers recouvrant entièrement le corps ; 1S 17.7,41 ; Jr 46.3 ; Ez 23.24 ; 26.8 ; 38.4 ; 39.9 ; Ps 5.13 ; 35.2 ; 91.4 ; 1Ch 12.9,25,35 ; 2Ch 11.12 ; 14.7 ; 25.5. –  d''or battu v. 17. En fait, ces grands boucliers comme les petits boucliers (v. 17n) étaient sans doute en bois recouverts d''or, à l''intérieur et à l''extérieur. –  six cents sicles d''or  : litt. six cents d''or  ; environ 6 kg (voir mesures).'
  - type: text
    content: 'Le roi Salomon fit deux cents grands boucliers d''or battu, pour chacun desquels il employa six cents sicles d''or, '
  '17':
  - type: note
    content: 'petits boucliers ou rondaches, protégeant le haut du corps ; 14.26s ; Jg 5.8 ; 2R 19.32 ; Es 22.6 ; 37.33 ; Jr 46.3,9 ; Ez 23.24 ; 27.10 ; 38.4s ; 39.9 ; Na 2.4 ; Ps 3.4 ; 7.11 ; 18.3,31,36 ; 28.7 etc. ; Jb 15.26 ; 41.7 ; Né 4.10 ; 1Ch 5.18 ; 2Ch 12.9s etc. –  trois mines  : environ 1,7 kg (comparer 2Ch 9.16 trois cents sicles ≈ 3 kg ?). –  la maison-de-la-forêt-du-Liban 7.2n.'
  - type: text
    content: 'et trois cents petits boucliers d''or battu, pour chacun desquels il employa trois mines d''or ; le roi les mit dans la maison-de-la-forêt-du-Liban. '
  '18':
  - type: note
    content: 'd''ivoire  : dans d''autres contextes, le terme signifie également dent(s). Même sens en 22.39 ; Ez 27.6,15 ; Am 3.15 ; 6.4 ; Ps 45.9 ; Ct 5.14 ; 7.5. –  or fin  : le mot hébreu traduit par fin n''apparaît qu''ici avec ce sens ; un terme ressemblant désigne l''or fin en Ps 19.11 ; 21.4 ; 119.127 etc. ; un ms hébreu porte ici or d''Ouphaz (cf. Jr 10.9n  ; Dn 10.5n) ; Syr or d''Ophir (cf. 1R 9.28n). En 2Ch 9.17 il est question d’or pur.'
  - type: text
    content: 'Le roi fit un grand trône d''ivoire et le couvrit d''or fin. '
  '19':
  - type: note
    content: 'la partie supérieure… arrondie  : litt. une tête arrondie  ; LXX des têtes de taurillons.'
  - type: text
    content: 'Ce trône avait six marches, et la partie supérieure en était arrondie par-derrière ; il y avait des bras de chaque côté du siège, deux lions debout à côté des bras, '
  '2':
  - type: note
    content: 'suite  : le mot hébreu correspondant est souvent traduit par armée. –  essences odoriférantes  : cf. Ex 25.6 ; 30.23 ; 35.28 ; Ez 27.22 ; Ct 4.10,14 ; Est 2.12. –  Salomon  : certains mss hébreux, de Tg et de Vg, ainsi que Syr portent le roi Salomon. –  dans le cœur  : autre traduction dans sa pensée.'
  - type: text
    content: 'Elle arriva à Jérusalem avec une suite très importante, des chameaux portant des essences odoriférantes, de l''or en très grande quantité et des pierres précieuses. Elle vint trouver Salomon et lui dit tout ce qu''elle avait dans le cœur. '
  '20':
  - type: text
    content: 'et douze lions debout sur les six marches de part et d''autre. Il ne s''est rien fait de pareil pour aucun royaume. '
  '21':
  - type: note
    content: 'Tout le service  : litt. tous les objets ou les récipients. –  la maison-de-la-forêt-du-Liban 7.2n. –  d''or fin 6.20n. –  on n''en faisait aucun cas  : cf. v. 27.'
  - type: text
    content: 'Tout le service à boissons du roi Salomon était d''or, et toute la vaisselle de la maison-de-la-forêt-du-Liban était d''or fin. Rien n''était d''argent : on n''en faisait aucun cas aux jours de Salomon. '
  '22':
  - type: note
    content: 'des bateaux (9.26n) de Tarsis  : c.-à-d. des navires capables de faire le voyage au long cours (le commerce avec l''Occident en priorité, Es 2.16 ; 23.1,14 ; 60.9), en traversant la Méditerranée, jusqu''à Tarsis (hébreu Tarshish), la Tartessos des Phocéens (royaume centré sur le Guadalquivir), au-delà des Colonnes d''Hercule. L''expression ne désigne pas forcément le royaume de Tartessos mais, en premier lieu, toute région du lointain Occident (Jon 1.3 ; Ps 72.10). Elle désigne également le trafic en mer Rouge (1R 22.49). Voir aussi Ez 27.25 ; Ps 48.8+. –  bateaux de Hiram v. 11. –  des singes et des paons  : traduction incertaine ; il pourrait s''agir de diverses espèces de singes.'
  - type: text
    content: Car le roi avait en mer des bateaux de Tarsis avec les bateaux de Hiram ; tous les trois ans arrivaient les bateaux de Tarsis, apportant de l'or et de l'argent, de l'ivoire, des singes et des paons.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'fut plus grand (ou surpassa ) … par sa richesse  : cf. 3.13. –  par sa sagesse  : cf. 3.12 ; 5.9,14,26.'
  - type: text
    content: 'Le roi Salomon fut plus grand que tous les rois de la terre par sa richesse et par sa sagesse. '
  '24':
  - type: note
    content: 'Toute la terre  : autre traduction tout le pays  ; LXX et Syr, comme 2Ch 9.23, portent tous les rois de la terre. –  recherchait Salomon  : litt. recherchait la face de Salomon  ; autres traductions cherchaient à rencontrer Salomon ou recherchaient la faveur de Salomon  ; cf. 2S 21.1n  ; Os 5.15 ; Ps 24.6 ; 27.8n. –  dans son cœur, c.-à-d. dans son esprit.'
  - type: text
    content: 'Toute la terre recherchait Salomon pour entendre la sagesse que Dieu avait mise dans son cœur. '
  '25':
  - type: note
    content: 'Chacun apportait…  : cf. v. 10. –  présent ou tribut  : cf. 5.1+. La sagesse, plutôt que la force des armes, place Salomon en position de souverain universel et assure la prospérité de son royaume.'
  - type: text
    content: Chacun apportait son présent, des objets d'argent et des objets d'or, des vêtements, des armes, des essences odoriférantes, des chevaux et des mulets. Il en était ainsi chaque année.
  - type: heading
    content: 2Ch 1.14-17  ; 9.25-28
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'mille quatre cents chars  : cf. 2Ch 1.14 ; 12.3 ( mille deux cents ). –  équipages 5.6n. –  qu''il conduisit  : avec une légère modification de la vocalisation traditionnelle on pourrait lire qu''il installa , comme en 2Ch 1.14 ; 9.25.'
  - type: text
    content: 'Salomon rassembla des chars et des équipages ; il avait mille quatre cents chars et douze mille équipages, qu''il conduisit dans des villes de garnison et à Jérusalem, près du roi. '
  '27':
  - type: note
    content: 'aussi commun  : cf. v. 21. –  sycomores… Bas-Pays (hébreu shephéla) : cf. Am 7.14 ; 1Ch 27.28.'
  - type: text
    content: 'Le roi rendit l''argent aussi commun à Jérusalem que les pierres ; il rendit les cèdres aussi nombreux que les sycomores qui sont dans le Bas-Pays. '
  '28':
  - type: note
    content: 'd''Egypte  : certains modifient le texte hébreu traditionnel pour lire de Moutsri (nom d''un royaume de Cilicie, en Asie Mineure ; cf. 2R 7.6n). –  de Qevé  : peut-être un autre royaume de Cilicie ; certains traduisent le mot hébreu par groupe, et lisent … d''Egypte. Un groupe de marchands du roi allait les prendre par groupes… –  les acheter  : litt. les prendre pour un prix.'
  - type: text
    content: 'On amenait les chevaux pour Salomon d''Egypte et de Qevé. Les marchands du roi allaient les acheter à Qevé : '
  '29':
  - type: note
    content: 'montait  : litt. montait et sortait, cf. Gn 12.10n. –  six cents sicles d''argent  : litt. six cents d''argent  ; LXX cent (sicles) d''argent ; cent cinquante sicles  : litt. cent cinquante  ; LXX cinquante (sicles) d''argent. –  Ils en amenaient  : litt. ils faisaient sortir. –  Hittites  : peuple originaire d''Asie Mineure ; cf. Gn 10.15n.'
  - type: text
    content: un char montait d'Egypte pour six cents sicles d'argent, et un cheval pour cent cinquante sicles. Ils en amenaient aussi avec eux pour tous les rois des Hittites et pour les rois d'Aram.
  '3':
  - type: note
    content: 'expliqua  : c''est le même verbe hébreu qui est employé dans le récit de l''énigme de Samson (Jg 14.12-17). –  tout ce qu''elle demandait  : litt. toute sa parole (à elle) ou toute son affaire. –  caché  : autre traduction mystérieux  ; cf. Jb 28.21n.'
  - type: text
    content: Salomon lui expliqua tout ce qu'elle demandait ; il n'y avait rien de caché que le roi ne pût lui expliquer.
  '4':
  - type: text
    content: 'La reine de Saba vit toute la sagesse de Salomon, la maison qu''il avait bâtie, '
  '5':
  - type: note
    content: 'l''habitation  : autres traductions la place, la disposition, le protocole  ; le même terme est traduit par place en 1S 20.18,25. –  gens de sa cour  : litt. ses serviteurs, v. 8 ; cf. Gn 20.8n. –  ses auxiliaires  : ou, selon une autre lecture traditionnelle, son auxiliaire  ; cf. 1.4n. –  holocaustes  : voir sacrifices. –  elle en eut le souffle coupé  : litt. il n''y eut plus de souffle (ou d''esprit) en elle.'
  - type: text
    content: 'les mets de sa table, l''habitation des gens de sa cour, la fonction de ses auxiliaires et leurs vêtements, ses échansons, et les holocaustes qu''il offrait dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : elle en eut le souffle coupé. '
  '6':
  - type: text
    content: 'Elle dit alors au roi : C''était donc vrai, ce que j''ai appris dans mon pays au sujet de tes paroles et de ta sagesse ! '
  '7':
  - type: text
    content: 'Je n''y croyais pas avant d''être venue et de l''avoir vu de mes yeux. Et on ne m''en avait pas dit la moitié ! Tu as plus de sagesse et de prospérité que ta réputation ne me l''avait laissé entendre. '
  '8':
  - type: note
    content: 'Heureux tes hommes  : LXX heureuses tes femmes  ; certains pensent qu''il s''agit ici du texte original et qu''un correcteur aurait voulu éviter de dire bienheureuses les femmes qui ont détourné le cœur de Salomon vers d''autres dieux (cf. 11.1-40). –  qui se tiennent… à ton service  : litt. qui se tiennent… devant toi  ; on retrouve l''expression hébraïque correspondante en 12.8/ / ; 17.1 ; 22.21n  ; Dt 1.38 ; 10.8n.'
  - type: text
    content: 'Heureux tes hommes, heureux tes gens qui se tiennent constamment à ton service et qui entendent ta sagesse ! '
  '9':
  - type: note
    content: 'Béni soit le Seigneur …  : sur cette formule de bénédiction, fréquente en Israël mais étonnante dans la bouche d''une étrangère (voir aussi 17.12,24), cf. Gn 9.26 ; 14.20 ; 24.27 ; Ex 18.10 ; 1S 25.32 ; Rt 4.14 etc. –  qui a pris plaisir en toi Nb 14.8n. –  Parce que le Seigneur aime Israël  : cf. Dt 7.8 ; Jr 31.3 ; Os 3.1. –  fait  : verbe synonyme en 2Ch 9.8. –  agisses selon l''équité et la justice  : cf. Gn 18.19 ; 2S 8.15 ; Jr 9.23 ; 22.3,15 ; 23.5 ; Ez 18.5,21,27 ; 33.14,16,19 ; 45.9 ; Ps 99.4 ; 106.3 ; Pr 21.3.'
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui a pris plaisir en toi et t''a placé sur le trône d''Israël ! Parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aime Israël pour toujours, il t''a fait roi pour que tu agisses selon l''équité et la justice. '
