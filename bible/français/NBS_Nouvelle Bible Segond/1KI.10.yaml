      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'entendit parler de la renommée que Salomon devait au nom du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'entendit ce qu''on disait de Salomon à la gloire du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: énigmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Nb 12.8 ; Jg 14.12-18 ; Ha 2.6.'
      marker-yv: yv-n
    - type: text
      text: 'La reine de Saba entendit parler de la réputation de Salomon pour le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
