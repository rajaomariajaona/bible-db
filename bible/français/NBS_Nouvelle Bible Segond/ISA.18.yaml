document_id: ISA.18
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Avertissements aux ambassadeurs de Koush
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ce discours du prophète s''adresse à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Koush '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 11.11+ ; cf. So 2.10 ; 3.10), c.-à-d. à la dynastie koushite (ou nubienne) qui régnait alors sur l'Egypte (cf. 19.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 37.9). Il invite les ambassadeurs d''Egypte à rentrer dans leur pays (v. 2). Esaïe s''opposait à une alliance entre l''Egypte et Juda, afin qu''il apparaisse que la puissance de Dieu suffisait à repousser les Assyriens (v. 4-6 ; cf. 20.5s ; 30.1-7 ; 31.1-3 ; 36.4-6). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Holà ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'malheur ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 1.4,24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 17.12 ; même traduction en 55.1 ; Za 2.10s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où bruissent des ailes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : allusion aux moustiques du Nil ou à d''autres insectes (criquets ou sauterelles), ou encore à l''emblème dynastique du scarabée ? Autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ombragent les ailes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', allusion possible au dieu soleil, protecteur de l''Egypte, représenté par un disque aux ailes étendues. D''autres ont compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pays des bateaux à deux voiles.
    marker-yv: yv-n
  - type: text
    text: Holà ! pays où bruissent des ailes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: au-delà des fleuves de Koush !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: embarcations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : l''hébreu emploie un terme vague qui désigne toute sorte de chose selon le contexte (instrument, objet, affaire). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de jonc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ex 2.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une nation élancée et luisante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la nation aux corps élancés et luisants. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis qu'il existe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: depuis lui et plus loin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de loin comme de près
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; de même au v. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: puissante…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sens incertain. Autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui attend, liée au cordeau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui balbutie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(l''expression du texte hébreu traditionnel, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qaw-qaw
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ressemble à la formule rendue par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'd. a.-da '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 28.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 34.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: Toi qui envoies sur la mer des émissaires,
- type: usfm
  marker: q1
  children:
  - type: text
    text: dans des embarcations de jonc, sur les eaux !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allez, messagers rapides,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers une nation élancée et luisante,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vers un peuple redoutable depuis qu'il existe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une nation puissante qui écrase tout
- type: usfm
  marker: q1
  children:
  - type: text
    text: et dont le pays est sillonné de fleuves.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bannière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trompe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre signal de guerre : cf. Jos 6.4s ; Jg 3.27 ; 6.34 ; 7.18 ; 1S 13.3 ; 2S 18.16 ; 20.1,22 ; Jr 42.14 ; Os 5.8 ; Am 2.2.'
    marker-yv: yv-n
  - type: text
    text: Vous tous, habitants du monde,
- type: usfm
  marker: q1
  children:
  - type: text
    text: vous qui demeurez sur la terre,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand on dressera la bannière sur les montagnes, vous regarderez ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand on sonnera de la trompe, vous écouterez.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'immobile '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: là où je demeure, à mon poste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 57.15 ; 1R 8.39 ; Ps 33.14 ; 2Ch 6.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rosée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 26.19+.
    marker-yv: yv-n
  - type: text
    text: 'Car ainsi m''a parlé le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je reste tranquille et je contemple, immobile
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme la chaleur des blancs rayons de lumière,
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme un nuage de rosée dans la chaleur de la moisson.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Jr 5.10.
    marker-yv: yv-n
  - type: text
    text: Alors, avant la récolte, quand la floraison est achevée,
- type: usfm
  marker: q1
  children:
  - type: text
    text: quand la fleur devient un raisin qui mûrit,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il coupe les pampres avec des serpes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il enlève, il tranche les pampres…
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils seront…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : il s''agit vraisemblablement des Assyriens dont la défaite ne devra rien aux Koushites. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bêtes sauvages de la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux bêtes de la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; la même expression est traduite simplement par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bêtes sauvages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à la fin du v. Cf. Gn 1.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ils seront tous ensemble abandonnés
- type: usfm
  marker: q1
  children:
  - type: text
    text: aux oiseaux de proie des montagnes
- type: usfm
  marker: q1
  children:
  - type: text
    text: et aux bêtes sauvages de la terre ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: les oiseaux de proie y passeront l'été,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et toutes les bêtes sauvages y passeront l'hiver.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: offrandes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.2-4 ; 19.21-25 ; 45.14 ; 60 ; 62 ; So 3.10 ; Ps 68.30 ; 76.12 ; 87.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un peuple élancé… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elles seront apportées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au lieu où réside le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au lieu du nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Dt 12.5 ; 26.2.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, des offrandes seront apportées au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées par un peuple élancé et luisant, par un peuple redoutable depuis qu''il existe, une nation puissante qui écrase tout et dont le pays est sillonné de fleuves ; elles seront apportées au lieu où réside le nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, au mont Sion.'
