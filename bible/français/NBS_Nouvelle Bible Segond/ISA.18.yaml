document_id: ISA.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Avertissements aux ambassadeurs de Koush
  - type: text
    content: ' '
  - type: note
    content: 'Ce discours du prophète s''adresse à Koush (voir 11.11+ ; cf. So 2.10 ; 3.10), c.-à-d. à la dynastie koushite (ou nubienne) qui régnait alors sur l''Egypte (cf. 19.2n  ; 37.9). Il invite les ambassadeurs d''Egypte à rentrer dans leur pays (v. 2). Esaïe s''opposait à une alliance entre l''Egypte et Juda, afin qu''il apparaisse que la puissance de Dieu suffisait à repousser les Assyriens (v. 4-6 ; cf. 20.5s ; 30.1-7 ; 31.1-3 ; 36.4-6). –  Holà ! autre traduction malheur ! cf. 1.4,24n  ; 17.12 ; même traduction en 55.1 ; Za 2.10s. –  où bruissent des ailes  : allusion aux moustiques du Nil ou à d''autres insectes (criquets ou sauterelles), ou encore à l''emblème dynastique du scarabée ? Autre traduction qu''ombragent les ailes , allusion possible au dieu soleil, protecteur de l''Egypte, représenté par un disque aux ailes étendues. D''autres ont compris pays des bateaux à deux voiles.'
  - type: text
    content: Holà ! pays où bruissent des ailes,
  - type: text
    content: au-delà des fleuves de Koush !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'embarcations  : l''hébreu emploie un terme vague qui désigne toute sorte de chose selon le contexte (instrument, objet, affaire). –  de jonc  : cf. Ex 2.3. –  une nation élancée et luisante  : autre traduction la nation aux corps élancés et luisants. –  depuis qu''il existe  : litt. depuis lui et plus loin  ; autre traduction de loin comme de près  ; de même au v. 7. –  puissante…  : sens incertain. Autre traduction qui attend, liée au cordeau ou qui balbutie (l''expression du texte hébreu traditionnel, qaw-qaw , ressemble à la formule rendue par d. a.-da en 28.10n  ; cf. 34.11n).'
  - type: text
    content: Toi qui envoies sur la mer des émissaires,
  - type: text
    content: dans des embarcations de jonc, sur les eaux !
  - type: text
    content: Allez, messagers rapides,
  - type: text
    content: vers une nation élancée et luisante,
  - type: text
    content: vers un peuple redoutable depuis qu'il existe,
  - type: text
    content: une nation puissante qui écrase tout
  - type: text
    content: et dont le pays est sillonné de fleuves.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'bannière 5.26+. –  trompe  : autre signal de guerre : cf. Jos 6.4s ; Jg 3.27 ; 6.34 ; 7.18 ; 1S 13.3 ; 2S 18.16 ; 20.1,22 ; Jr 42.14 ; Os 5.8 ; Am 2.2.'
  - type: text
    content: Vous tous, habitants du monde,
  - type: text
    content: vous qui demeurez sur la terre,
  - type: text
    content: quand on dressera la bannière sur les montagnes, vous regarderez ;
  - type: text
    content: quand on sonnera de la trompe, vous écouterez.
  '4':
  - type: text
    content: ' '
  - type: note
    content: immobile ou là où je demeure, à mon poste  ; cf. 57.15 ; 1R 8.39 ; Ps 33.14 ; 2Ch 6.30. –  rosée 26.19+.
  - type: text
    content: 'Car ainsi m''a parlé le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je reste tranquille et je contemple, immobile
  - type: text
    content: comme la chaleur des blancs rayons de lumière,
  - type: text
    content: comme un nuage de rosée dans la chaleur de la moisson.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 5.10.
  - type: text
    content: Alors, avant la récolte, quand la floraison est achevée,
  - type: text
    content: quand la fleur devient un raisin qui mûrit,
  - type: text
    content: il coupe les pampres avec des serpes,
  - type: text
    content: il enlève, il tranche les pampres…
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ils seront…  : il s''agit vraisemblablement des Assyriens dont la défaite ne devra rien aux Koushites. –  bêtes sauvages de la terre  : litt. aux bêtes de la terre  ; la même expression est traduite simplement par bêtes sauvages à la fin du v. Cf. Gn 1.24n.'
  - type: text
    content: Ils seront tous ensemble abandonnés
  - type: text
    content: aux oiseaux de proie des montagnes
  - type: text
    content: et aux bêtes sauvages de la terre ;
  - type: text
    content: les oiseaux de proie y passeront l'été,
  - type: text
    content: et toutes les bêtes sauvages y passeront l'hiver.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'offrandes  : cf. 2.2-4 ; 19.21-25 ; 45.14 ; 60 ; 62 ; So 3.10 ; Ps 68.30 ; 76.12 ; 87.4. –  un peuple élancé… v. 2n. –  elles seront apportées  : sous-entendu dans le texte. –  au lieu où réside le nom  : litt. au lieu du nom  ; cf. Dt 12.5 ; 26.2.'
  - type: text
    content: 'En ce temps-là, des offrandes seront apportées au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées par un peuple élancé et luisant, par un peuple redoutable depuis qu''il existe, une nation puissante qui écrase tout et dont le pays est sillonné de fleuves ; elles seront apportées au lieu où réside le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, au mont Sion.'
