document_id: EPH.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: De la mort à la vie
  - type: text
    content: ' '
  - type: note
    content: Cf. Tt 3.3-7. –  morts v. 5 ; 5.14 ; Col 2.13 ; cf. Lc 15.24. – Voir péchés.
  - type: text
    content: 'Quant à vous, vous étiez morts du fait de vos fautes, des péchés '
  '10':
  - type: note
    content: 'créés v. 15 ; 4.24 ; 2Co 5.17 ; Ga 6.15. –  œuvres bonnes  : cf. Ac 9.36 ; 2Co 9.8 ; Col 1.10 ; 2Th 2.17 ; 1Tm 2.10 ; 5.10,25 ; 6.18 ; 2Tm 2.21 ; 3.17 ; Tt 2.7,14 ; 3.8,14 ; Hé 10.24. –  que Dieu a préparées d''avance  : certains comprennent pour lesquelles Dieu nous a préparés d''avance, cf. Rm 9.23 ; voir aussi Lc 1.17,76. –  que nous nous y adonnions  : litt. que nous y marchions, cf. v. 2n  ; 4.1n,17 ; 5.2,8,15.'
  - type: text
    content: Car nous sommes son ouvrage, nous avons été créés en Jésus-Christ pour des œuvres bonnes que Dieu a préparées d'avance, afin que nous nous y adonnions.
  - type: heading
    content: Juifs et non-Juifs réunis dans le Christ
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'autrefois 5.8 ; cf. Rm 11.17. –  les non-Juifs ou les païens, les gens des nations  ; le terme grec, correspondant à l''hébreu goyim , fait allusion à la façon dont les Juifs parlaient des non-Juifs. De même 3.1,6,8 ; 4.17n  ; voir aussi Ac 10.45n. –  traités d''incirconcis  : litt. dits incirconcision par la dite circoncision dans la chair…  ; cf. Ac 11.3 ; Rm 3.30 ; Col 3.11. –  qui se disent  : cf. Rm 2.25ss ; 4.9-12. –  par des mains humaines  : cf. Col 2.11 ; voir aussi Mc 14.58+.'
  - type: text
    content: 'Souvenez-vous donc de ceci : vous qui étiez autrefois les non-Juifs dans la chair, qui étiez traités d''incirconcis par ceux qui se disent circoncis et qui le sont dans la chair et par des mains humaines, '
  '12':
  - type: note
    content: 'Cf. 4.18 ; Rm 9.4s ; Col 1.21. –  alliances de la promesse  : cf. Rm 4.13 ; 15.8 ; Ga 3.16 ; 4.23ss. –  sans espérance 1Th 4.13. –  sans Dieu  : c''est du terme ainsi traduit que vient le mot athée  ; cf. Ac 17.23 ; 1Th 1.9.'
  - type: text
    content: 'vous étiez en ce temps-là sans Christ, privés du droit de cité en Israël, étrangers aux alliances de la promesse, sans espérance et sans Dieu dans le monde. '
  '13':
  - type: note
    content: 'loin  : cf. v. 17 ; Ac 2.39. –  par le sang du Christ 1.7 ; Col 1.20 ; 2.14.'
  - type: text
    content: Mais maintenant, en Jésus-Christ, vous qui autrefois étiez loin, vous êtes devenus proches, par le sang du Christ.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'notre paix v. 17 ; cf. Es 9.5s ; Mi 5.4 ; Lc 2.14. –  qui a fait que les deux soient un  : litt. qui a fait les deux un ; les deux désignent en l''occurrence les catégories Juifs et non-Juifs ; cf. 5.31s ; Ez 37.17,22 ; Ga 3.28. –  le mur  : litt. la cloison ou le mur mitoyen  ; l''expression pourrait être comprise de la séparation entre Dieu et les hommes (cf. v. 2n  ; Hé 10.20) comme de celle entre Juifs et non-Juifs, cf. Ac 21.28n. –  dans sa chair  : l''expression pourrait être rattachée à ce qui précède ( en détruisant… l''hostilité dans sa chair ) ; cf. Col 1.22+.'
  - type: text
    content: 'Car c''est lui qui est notre paix, lui qui a fait que les deux soient un, en détruisant le mur de séparation, l''hostilité. Il a, dans sa chair, '
  '15':
  - type: note
    content: 'réduit à rien  : cf. Rm 3.3+ ; 2Co 3.14n. – Voir loi. –  prescriptions  : le même terme grec est traduit par prescriptions légales en Col 2.14 (terme apparenté en Col 2.20) ; décret(s) en Lc 2.1 ; Ac 17.7 et prescriptions en Ac 16.4 ; c''est lui qui a donné notre mot dogme. –  pour créer v. 10+. –  avec les deux  : cf. v. 14n. –  un seul homme (ou être humain) nouveau 4.24 ; cf. Col 3.10. –  en faisant la paix v. 14 ; Mt 5.9n.'
  - type: text
    content: 'réduit à rien la loi avec ses commandements et leurs prescriptions, pour créer en lui, avec les deux, un seul homme nouveau, en faisant la paix, '
  '16':
  - type: note
    content: 'réconcilier 2Co 5.18+ss ; Col 1.20. –  en un seul corps  : cf. 1Co 12.13 ; Col 1.22. –  par la croix  : cf. Rm 5.10 ; Col 1.21. –  en tuant  : même verbe en Mc 6.19 ; 8.31 ; Ac 3.15 etc. –  par elle (la croix) ; on pourrait aussi comprendre en lui.'
  - type: text
    content: 'et pour réconcilier avec Dieu les deux en un seul corps, par la croix, en tuant par elle l''hostilité. '
  '17':
  - type: note
    content: 'Cf. v. 13s ; Es 52.7 ; 57.19 ; Za 9.10. –  comme une bonne nouvelle  : cf. 6.15+.'
  - type: text
    content: 'Il est venu annoncer, comme une bonne nouvelle, la paix à vous qui étiez loin et la paix à ceux qui étaient proches ; '
  '18':
  - type: note
    content: nous avons… accès 3.12n  ; Jn 14.6+ ; Rm 5.2 ; Hé 10.19s. –  dans (ou par) un même Esprit 4.4 ; cf. Rm 8.15 ; Ga 4.6 ; 1P 3.18.
  - type: text
    content: par lui, en effet, nous avons les uns et les autres accès auprès du Père, dans un même Esprit.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '3.6 ; Os 2.25. –  des étrangers…  : cf. Hé 11.13+. –  exilés ou migrants , cf. 1P 1.17. –  concitoyens des saints  : cf. 1.18 ; 3.5 ; Ga 4.26 ; Ph 3.20 ; Hé 12.22s. –  membres de la maison  : le terme grec est apparenté aux mots traduits par exilés (cf. Ac 7.6n  ; 1P 2.11n), construire (v. 20,22), construction (v. 21), habitation (v. 22) ; cf. Ga 6.10n  ; Hé 3.6.'
  - type: text
    content: 'Ainsi donc, vous n''êtes plus des étrangers ni des exilés ; mais vous êtes concitoyens des saints, membres de la maison de Dieu. '
  '2':
  - type: note
    content: 'auxquels vous vous adonniez (litt. dans lesquels vous marchiez, de même v. 10 ; cf. 4.1,17 ; 5.2,8,15) autrefois v. 11 ; Col 3.7 ; 1P 1.14. –  sous l''empire  : litt. selon l''éon, d''après la transcription classique du terme grec aiôn  ; ce terme, parfois traduit par âge(s), siècle(s), temps (v. 7 ; 3.21n), et souvent synonyme de monde (1.21 ; cf. 2Co 4.4) dans le N.T., désignera dans les systèmes gnostiques des siècles suivants une émanation de la divinité ; selon certains, il évoquerait déjà ici une puissance maléfique (cf. Ep 1.21+ ; 6.12) ; selon d''autres, il aurait plutôt un sens neutre  : le cours de ce monde. –  le prince  : cf. Jn 12.31+. –  autorité 1.21 ; cf. Mc 1.22n  ; Ac 26.18. –  l''air (en grec aèr) correspondait, pour les anciens, au premier étage des cieux, s''étendant de la terre à la lune ; il est ici conçu comme la sphère des puissances qui font écran entre Dieu et les hommes. –  esprit ou souffle. –  chez (litt. dans ou parmi) les rebelles ou les réfractaires, ceux qui refusent d''obéir  ; même expression en 5.6, litt. les fils de la rébellion (ou du refus d''obéir, cf. Rm 11.30ss) ; Règle de la Communauté (Qumrân) 3.20s : « Dans la main de l''Ange des ténèbres est tout l''empire sur les fils de perversion : et dans des voies de ténèbres ils marchent. »'
  - type: text
    content: 'auxquels vous vous adonniez autrefois sous l''empire de ce monde, le prince de l''autorité de l''air, cet esprit qui est maintenant à l''œuvre chez les rebelles. '
  '20':
  - type: note
    content: 'construits ou édifiés 4.12+ ; cf. Rm 15.2+ ; 1Co 3.9n  ; 8.1+ ; 2Co 10.8 ; 1Th 5.11. –  fondations  : cf. 3.17 ; Mt 16.18 ; 1Co 3.9-11 ; Col 2.7 ; Ap 21.14. –  les apôtres (ou envoyés, 1.1n) et prophètes  : autre traduction possible  : les apôtres et les prophètes  ; cf. 3.5 ; 4.11 ; voir aussi 1.1 ; Ac 11.27+. –  pierre de l''angle  : l''image peut être celle d''une pierre fondamentale ou celle d''une clef de voûte, cf. Es 28.16 ; Mc 12.10/ / ; voir aussi Rm 9.33 ; 1Co 3.11 ; 1P 2.4-8.'
  - type: text
    content: 'Vous avez été construits sur les fondations constituées par les apôtres et prophètes, Jésus-Christ lui-même étant la pierre de l''angle. '
  '21':
  - type: note
    content: toute construction ou, selon certains mss, toute la construction (v. 19ns) ; mais peut-être les deux formules sont-elles équivalentes dans le grec de l'épître. –  bien coordonnée 4.16. –  s'élève ou grandit, litt. croît  ; cf. Col 2.19. –  dans le Seigneur ou par le Seigneur. –  un sanctuaire… Jn 2.21 ; 2Co 6.16.
  - type: text
    content: 'C''est en lui que toute construction bien coordonnée s''élève pour être, dans le Seigneur, un sanctuaire saint. '
  '22':
  - type: note
    content: 'dans l''Esprit  : autres traductions par l''Esprit ; en esprit  ; cf. Jn 4.21-24 ; 1Co 3.16s ; 1P 2.5.'
  - type: text
    content: C'est en lui que, vous aussi, vous êtes construits ensemble pour être une habitation de Dieu, dans l'Esprit.
  '3':
  - type: note
    content: 'Nous tous aussi Rm 2–3. –  désirs (4.22 ; Rm 1.24+) de notre chair Ga 5.16+. –  de notre chair…  : litt. de la chair et des pensées Col 1.21. –  par nature  : on a aussi compris tout à fait, vraiment  ; cf. 4.17s ; 5.6 ; même formule Rm 2.14 (naturellement) ; Ga 2.15n (de naissance) ; 4.8 ; voir aussi Rm 5.12. –  voués à la colère (de Dieu) : litt. des enfants de colère  ; cf. Mt 3.7 ; Rm 1.18+ ; 2.5 ; 3.5+ ; Col 3.6 ; 1Th 1.10 ; 5.9 ; 2P 2.14. –  comme les autres 1Th 4.13+.'
  - type: text
    content: 'Nous tous aussi, nous étions de leur nombre et nous nous conduisions autrefois selon les désirs de notre chair, nous faisions les volontés de notre chair et de nos pensées, et nous étions par nature voués à la colère, comme les autres. '
  '4':
  - type: note
    content: 'compassion 1P 1.3. –  grand amour  : cf. Jn 3.16 ; Rm 5.8 ; 8.35ss.'
  - type: text
    content: 'Mais Dieu est riche de compassion et, à cause du grand amour dont il nous a aimés, '
  '5':
  - type: note
    content: 'Cf. Rm 6.1-11. –  qui étions morts v. 1+. –  rendus vivants (verbe dérivé de celui qui est traduit par faire vivre en Jn 5.21+) avec (certains mss portent dans) le Christ Col 2.13 ; cf. Rm 6.13. –  par grâce… v. 8 ; Ac 15.11. –  vous êtes sauvés  : le temps du verbe suppose ici un fait accompli ; cf. Rm 8.24 ; 1Co 1.18n  ; Ph 3.7-11.'
  - type: text
    content: 'nous qui étions morts du fait de nos fautes, il nous a rendus vivants avec le Christ – c''est par grâce que vous êtes sauvés. '
  '6':
  - type: note
    content: réveillés (ou relevés, ressuscités) / fait asseoir ensemble 1.20n  ; Col 2.12+ ; 3.1-4 ; cf. 1Co 4.8. –  dans les lieux célestes 1.3+ ; cf. Ph 3.20.
  - type: text
    content: 'Il nous a réveillés ensemble et fait asseoir ensemble dans les lieux célestes, en Jésus-Christ, '
  '7':
  - type: note
    content: 'montrer  : cf. Rm 9.17 ; 1Tm 1.16. –  dans les temps à venir  : autres traductions dans les mondes à venir ou aux éons à venir, voir v. 2n  ; cf. 3.10. –  la richesse… de sa grâce 1.7+.'
  - type: text
    content: pour montrer dans les temps à venir la richesse surabondante de sa grâce par sa bonté envers nous en Jésus-Christ.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'par la grâce… v. 5 ; Rm 3.24. –  au moyen de la foi ou d''une foi Ga 2.16n. –  pas de vous  : cf. Dt 7.7 ; 8.18 ; 9.4-6 ; Rm 9.16. –  don de Dieu Jn 4.10 ; Hé 6.4.'
  - type: text
    content: 'C''est par la grâce, en effet, que vous êtes sauvés au moyen de la foi. Cela ne vient pas de vous, c''est le don de Dieu. '
  '9':
  - type: note
    content: Rm 3.20,27s ; 4.2 ; 9.12 ; 11.6 ; 1Co 1.29 ; 2Tm 1.9.
  - type: text
    content: 'Ce n''est pas en vertu des œuvres, pour que personne ne puisse faire le fier. '
