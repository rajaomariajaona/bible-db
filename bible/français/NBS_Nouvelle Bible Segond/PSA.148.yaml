document_id: PSA.148,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Louange à Dieu dans le ciel et sur la terre
  - type: text
    content: ' '
  - type: note
    content: 'Ce psaume présente de nombreuses analogies avec le cantique des trois compagnons de Daniel dans la version grecque de ce livre (voir Dn 3.23n). Voir aussi 146.1n. –  Louez le Seigneur (Yah) v. 14 ; 104.35n. –  dans les hauteurs  : cf. Mc 11.10/  ; Lc 2.14.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis le ciel !'
  - type: text
    content: Louez-le dans les hauteurs !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'animaux / bêtes  : autre traduction animaux sauvages / bétail  ; cf. Gn 1.24ss ; 7.21n.'
  - type: text
    content: animaux et vous toutes, bêtes,
  - type: text
    content: bestioles et oiseaux,
  '11':
  - type: text
    content: rois de la terre et tous les peuples,
  - type: text
    content: princes et tous les juges de la terre,
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'jeunes filles  : litt. vierges.'
  - type: text
    content: jeunes gens et jeunes filles,
  - type: text
    content: vieillards et enfants !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.2n  ; 113.1-4 ; Es 12.4. –  il est plus éclatant…  : autre traduction son éclat (ou sa majesté ) est au-dessus de la terre et du ciel (Gn 2.4).'
  - type: text
    content: 'Qu''ils louent le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Car son nom seul est élevé,
  - type: text
    content: il est plus éclatant que la terre et le ciel.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la corne 75.5n,10 ; 89.18,25. –  qui lui est proche  : LXX qui s''approche de lui  ; cf. Lv 1.2n  ; 10.3 ; voir aussi Dt 4.7 ; Es 58.2 ; Ep 2.13. –  Louez le Seigneur 104.35n.'
  - type: text
    content: 'Il a élevé la corne de son peuple :'
  - type: text
    content: louange pour tous ses fidèles,
  - type: text
    content: pour les Israélites, le peuple qui lui est proche !
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'messagers (ou anges ) 103.20 ; 104.4n  ; voir aussi 29.1. –  toutes ses armées  : autre lecture traditionnelle toute son armée  ; cf. 103.21 ; Jos 5.14s ; 1R 22.19 ; Lc 2.13.'
  - type: text
    content: Louez-le, vous tous, ses messagers !
  - type: text
    content: Louez-le, vous toutes, ses armées !
  '3':
  - type: text
    content: Louez-le, soleil et lune !
  - type: text
    content: Louez-le, vous toutes, étoiles lumineuses !
  '4':
  - type: text
    content: ' '
  - type: note
    content: '19.2. –  ciel du ciel Dt 10.14n  ; 1R 8.27 ; Né 9.6. –  au-dessus du ciel  : cf. 29.10 ; Gn 1.6ss.'
  - type: text
    content: Loue-le, ciel du ciel,
  - type: text
    content: et vous, les eaux qui êtes au-dessus du ciel !
  '5':
  - type: text
    content: ' '
  - type: note
    content: Voir nom. –  il a donné un ordre… 33.9 ; 147.15+.
  - type: text
    content: 'Qu''ils louent le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Car il a donné un ordre, et ils ont été créés.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'une prescription  : cf. Jr 31.35s ; 33.25 ( lois ) ; Jb 28.26 ; 38.10. –  qu''il ne violera pas ou, avec une légère modification du texte hébreu traditionnel, qu''ils ne violeront pas ou qu''on ne violera pas  ; cf. 93.1 ; 96.10 ; 111.8 ; Gn 8.22.'
  - type: text
    content: Il les a établis à jamais, pour toujours ;
  - type: text
    content: il a donné une prescription qu'il ne violera pas.
  '7':
  - type: text
    content: ' '
  - type: note
    content: monstres marins 74.13n  ; Gn 1.21n. –  abîmes 36.7+ ; cf. 107.26 ; Gn 1.2.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis la terre,'
  - type: text
    content: monstres marins, et vous tous, abîmes,
  '8':
  - type: text
    content: ' '
  - type: note
    content: '147.16ss ; Jb 37.10ss,22. –  vent… qui exécutes…  : cf. 103.20s ; 104.3s.'
  - type: text
    content: feu et grêle, neige et brouillard,
  - type: text
    content: et toi, vent de tempête, qui exécutes sa parole,
  '9':
  - type: text
    content: ' '
  - type: note
    content: Es 55.12.
  - type: text
    content: montagnes et vous toutes, collines,
  - type: text
    content: arbres fruitiers et vous tous, cèdres,
