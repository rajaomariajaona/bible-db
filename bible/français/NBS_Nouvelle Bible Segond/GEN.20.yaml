document_id: GEN.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Abraham et Abimélek
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble du chap., cf. 12.10ss ; 26. –  Néguev 12.9 ; 13.1s,14n. –  Qadesh 14.7n. –  Shour 16.7n. –  Guérar 10.19n. Ce nom fait assonance avec le verbe traduit par il séjourna en immigré (cf. Ex 12.48n).
  - type: text
    content: 'Abraham partit de là pour le Néguev ; il s''installa entre Qadesh et Shour, puis il séjourna en immigré à Guérar. '
  '10':
  - type: note
    content: 'Quelle intention avais-tu  : litt. qu''as-tu vu  ; certains modifient le texte hébreu traditionnel pour lire qu''as-tu craint.'
  - type: text
    content: 'Puis Abimélek dit à Abraham : Quelle intention avais-tu pour agir de la sorte ? '
  '11':
  - type: note
    content: 12.12 ; cf. Jg 19.12. –  crainte de Dieu 22.12n.
  - type: text
    content: 'Abraham répondit : Je me disais qu''il n''y avait certainement aucune crainte de Dieu en ce lieu et qu''on me tuerait à cause de ma femme. '
  '12':
  - type: note
    content: Cf. Lv 18.9+.
  - type: text
    content: 'De plus, il est vrai qu''elle est ma sœur, fille de mon père ; seulement, elle n''est pas fille de ma mère, et elle est devenue ma femme. '
  '13':
  - type: note
    content: 'Lorsque les dieux m''ont fait errer  : le verbe est ici au pluriel (cf. 1.1n), sauf dans Smr  ; certains interprètent la phrase comme une adaptation d''Abraham au polythéisme d''Abimélek ; d''autres estiment que l''accord au pluriel n''est pas significatif et traduisent lorsque Dieu m''a fait errer  ; d''autres enfin supposent que le pluriel a remplacé un singulier originel pour éviter de faire de Dieu le sujet d''un verbe qui peut évoquer l''errance et l''erreur (voir cependant Ps 107.40 ; Jb 12.24). Cf. Jos 24.2. –  ma famille  : autre traduction la maison de mon père. –  j''ai dit à Sara  : litt. je lui ai dit (à elle). –  Agis avec fidélité envers moi ou accorde-moi une faveur  ; une expression comparable est traduite par montrer (de) la fidélité au v. 23 ; cf. 19.19n.'
  - type: text
    content: 'Lorsque les dieux m''ont fait errer loin de ma famille, j''ai dit à Sara : « Agis avec fidélité envers moi, dans tous les lieux où nous irons : dis que je suis ton frère. »'
  '14':
  - type: text
    content: 'Abimélek prit du petit bétail et du gros bétail, des serviteurs et des servantes, et il les donna à Abraham ; il lui rendit aussi Sara, sa femme. '
  '15':
  - type: text
    content: 'Abimélek dit : Mon pays est devant toi : installe-toi où il te plaira. '
  '16':
  - type: note
    content: 'il dit  : autre traduction il avait dit. –  voile  : le même mot hébreu est traduit par vêtement en Ex 21.10, par couverture en Jb 24.7 ; 26.6 ; 31.19. –  pour tous ceux qui sont avec toi  : on pourrait aussi comprendre pour (que tu ne voies plus) tout ce qui t''est arrivé  ; d''après quelques mss de Smr et LXX, certains modifient le texte hébreu traditionnel pour lire cela sera pour toi et pour tous ceux qui sont avec toi un voile sur les yeux. –  ton honneur sera sauf  : certains modifient le texte pour lire et tu seras justifiée devant tous ou de tout cela.'
  - type: text
    content: 'A Sara, il dit : Je donne à ton frère mille pièces d''argent ; cela te sera un voile sur les yeux pour tous ceux qui sont avec toi ; ainsi ton honneur sera sauf. '
  '17':
  - type: note
    content: guérit Ex 15.26 ; Dt 32.39 ; 2R 20.5.
  - type: text
    content: 'Abraham pria Dieu ; Dieu guérit Abimélek, sa femme et ses servantes, et celles-ci purent avoir des enfants. '
  '18':
  - type: note
    content: '12.17 ; cf. 30.2. –  avait frappé…  : litt. avait fermé toute matrice à la maison d''Abimélek.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait frappé de stérilité toute la maison d''Abimélek à cause de Sara, femme d''Abraham.'
  '2':
  - type: note
    content: 12.10-20 ; 26.1-11.
  - type: text
    content: 'Abraham disait de Sara, sa femme : C''est ma sœur. Abimélek, roi de Guérar, fit prendre Sara. '
  '3':
  - type: note
    content: 'rêve  : c''est la première fois qu''apparaît dans le récit biblique ce mode particulier de révélation divine ; cf. 28.12 ; 31.24 ; Mt 2.13+. –  Tu vas mourir  : autre traduction tu es (comme) mort.'
  - type: text
    content: 'Alors Dieu vint à Abimélek dans un rêve, pendant la nuit, et lui dit : Tu vas mourir à cause de la femme que tu as prise, car elle est mariée. '
  '4':
  - type: note
    content: 'un juste  : litt. une nation même si elle est juste. Le mot hébreu goy (nation) en est venu à désigner aussi bien un païen, c.-à-d. un non-Juif, qu''une nation entière. Beaucoup croient qu''ici il est dû à une erreur de copie.'
  - type: text
    content: 'Abimélek, qui ne s''était pas approché d''elle, répondit : Seigneur, vas-tu vraiment tuer un juste ? '
  '5':
  - type: note
    content: un cœur intègre (6.9+) ; la même expression est traduite par en toute bonne foi en 2S 15.11.
  - type: text
    content: 'Ne m''a-t-il pas dit lui-même : « C''est ma sœur ! », tandis qu''elle-même disait : « C''est mon frère ! » J''avais un cœur intègre et des mains innocentes quand j''ai fait cela. '
  '6':
  - type: note
    content: Cf. 12.17,19.
  - type: text
    content: 'Dieu lui répondit, dans le rêve : Je sais bien, moi aussi, que tu avais un cœur intègre quand tu as fait cela : aussi t''ai-je moi-même empêché de pécher contre moi. C''est pourquoi je n''ai pas permis que tu la touches. '
  '7':
  - type: note
    content: 'prophète  : le mot correspondant n''apparaît qu''ici dans toute la Genèse. Voir Ps 105.14s. –  tout ce qui t''appartient  : autre traduction tous ceux qui t''appartiennent.'
  - type: text
    content: 'Maintenant, rends la femme de cet homme ; c''est un prophète : il priera pour toi, et tu vivras. Mais si tu ne la rends pas, sache que tu mourras, toi et tout ce qui t''appartient.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'les gens de sa cour  : litt. ses serviteurs  ; il ne s''agit pas de domestiques, mais de l''entourage du roi et de ses conseillers ; cette expression revient souvent, dans le même sens, dans tout l''A.T. (cf. 40.20 ; 41.10,37s ; 45.16 ; 50.7). –  leur raconta  : litt. dit à leurs oreilles . –  ils  : litt. les hommes.'
  - type: text
    content: 'Abimélek se leva de bon matin ; il appela tous les gens de sa cour et leur raconta tout cela ; ils eurent très peur. '
  '9':
  - type: note
    content: 'En quoi ai-je péché contre toi  : même expression en Jr 37.18. –  un si grand péché  : autre traduction un si grand châtiment. –  Tu as commis…  : litt. tu as fait avec moi des faits (ou des actes  ; le mot est souvent traduit par œuvres) qui ne se font pas. Cf. 34.7.'
  - type: text
    content: 'Abimélek appela Abraham et lui dit : Qu''est-ce que tu nous as fait ? En quoi ai-je péché contre toi, pour que tu fasses venir sur moi et sur mon royaume un si grand péché ? Tu as commis envers moi des actes inadmissibles. '
