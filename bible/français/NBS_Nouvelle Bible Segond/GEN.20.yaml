document_id: GEN.20,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abraham et Abimélek
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur l''ensemble du chap., cf. 12.10ss ; 26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Néguev '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.9 ; 13.1s,14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qadesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Guérar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Ce nom fait assonance avec le verbe traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il séjourna en immigré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Ex 12.48
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Abraham partit de là pour le Néguev ; il s''installa entre Qadesh et Shour, puis il séjourna en immigré à Guérar. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Quelle intention avais-tu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'as-tu vu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'as-tu craint.
      marker-yv: yv-n
    - type: text
      text: 'Puis Abimélek dit à Abraham : Quelle intention avais-tu pour agir de la sorte ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.12 ; cf. Jg 19.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Abraham répondit : Je me disais qu''il n''y avait certainement aucune crainte de Dieu en ce lieu et qu''on me tuerait à cause de ma femme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 18.9+.
      marker-yv: yv-n
    - type: text
      text: 'De plus, il est vrai qu''elle est ma sœur, fille de mon père ; seulement, elle n''est pas fille de ma mère, et elle est devenue ma femme. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Lorsque les dieux m'ont fait errer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe est ici au pluriel (cf. 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), sauf dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: '  ; certains interprètent la phrase comme une adaptation d''Abraham au polythéisme d''Abimélek ; d''autres estiment que l''accord au pluriel n''est pas significatif et traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lorsque Dieu m'a fait errer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres enfin supposent que le pluriel a remplacé un singulier originel pour éviter de faire de Dieu le sujet d''un verbe qui peut évoquer l''errance et l''erreur (voir cependant Ps 107.40 ; Jb 12.24). Cf. Jos 24.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la maison de mon père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai dit à Sara
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je lui ai dit (à elle)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Agis avec fidélité envers moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: accorde-moi une faveur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; une expression comparable est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'montrer (de) la fidélité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 23 ; cf. 19.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque les dieux m''ont fait errer loin de ma famille, j''ai dit à Sara : « Agis avec fidélité envers moi, dans tous les lieux où nous irons : dis que je suis ton frère. »'
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Abimélek prit du petit bétail et du gros bétail, des serviteurs et des servantes, et il les donna à Abraham ; il lui rendit aussi Sara, sa femme. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Abimélek dit : Mon pays est devant toi : installe-toi où il te plaira. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il avait dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot hébreu est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vêtement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ex 21.10, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'couverture '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Jb 24.7 ; 26.6 ; 31.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour tous ceux qui sont avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour (que tu ne voies plus) tout ce qui t'est arrivé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''après quelques mss de Smr et LXX, certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cela sera pour toi et pour tous ceux qui sont avec toi un voile sur les yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ton honneur sera sauf
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient le texte pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et tu seras justifiée devant tous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de tout cela.
      marker-yv: yv-n
    - type: text
      text: 'A Sara, il dit : Je donne à ton frère mille pièces d''argent ; cela te sera un voile sur les yeux pour tous ceux qui sont avec toi ; ainsi ton honneur sera sauf. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'guérit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 15.26 ; Dt 32.39 ; 2R 20.5.
      marker-yv: yv-n
    - type: text
      text: 'Abraham pria Dieu ; Dieu guérit Abimélek, sa femme et ses servantes, et celles-ci purent avoir des enfants. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.17 ; cf. 30.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait frappé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avait fermé toute matrice à la maison d'Abimélek.
      marker-yv: yv-n
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait frappé de stérilité toute la maison d''Abimélek à cause de Sara, femme d''Abraham.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.10-20 ; 26.1-11.
      marker-yv: yv-n
    - type: text
      text: 'Abraham disait de Sara, sa femme : C''est ma sœur. Abimélek, roi de Guérar, fit prendre Sara. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rêve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c''est la première fois qu''apparaît dans le récit biblique ce mode particulier de révélation divine ; cf. 28.12 ; 31.24 ; Mt 2.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu vas mourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu es (comme) mort.
      marker-yv: yv-n
    - type: text
      text: 'Alors Dieu vint à Abimélek dans un rêve, pendant la nuit, et lui dit : Tu vas mourir à cause de la femme que tu as prise, car elle est mariée. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une nation même si elle est juste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'goy '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') en est venu à désigner aussi bien un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: païen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juif
        - type: text
          text: ', qu''une '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: entière. Beaucoup croient qu'ici il est dû à une erreur de copie.
      marker-yv: yv-n
    - type: text
      text: 'Abimélek, qui ne s''était pas approché d''elle, répondit : Seigneur, vas-tu vraiment tuer un juste ? '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' intègre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(6.9+) ; la même expression est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en toute bonne foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2S 15.11.
      marker-yv: yv-n
    - type: text
      text: 'Ne m''a-t-il pas dit lui-même : « C''est ma sœur ! », tandis qu''elle-même disait : « C''est mon frère ! » J''avais un cœur intègre et des mains innocentes quand j''ai fait cela. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 12.17,19.
      marker-yv: yv-n
    - type: text
      text: 'Dieu lui répondit, dans le rêve : Je sais bien, moi aussi, que tu avais un cœur intègre quand tu as fait cela : aussi t''ai-je moi-même empêché de pécher contre moi. C''est pourquoi je n''ai pas permis que tu la touches. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.7 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant n''apparaît qu''ici dans toute la Genèse. Voir Ps 105.14s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout ce qui t'appartient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous ceux qui t'appartiennent.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, rends la femme de cet homme ; c''est un prophète : il priera pour toi, et tu vivras. Mais si tu ne la rends pas, sache que tu mourras, toi et tout ce qui t''appartient.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les gens de sa cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; il ne s''agit pas de domestiques, mais de l''entourage du roi et de ses conseillers ; cette expression revient souvent, dans le même sens, dans tout l''A.T. (cf. 40.20 ; 41.10,37s ; 45.16 ; 50.7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur raconta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
