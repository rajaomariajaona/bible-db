  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Va acheter une cruche chez un potier, et prends avec toi des anciens du peuple et des anciens des prêtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vallée du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' de Hinnom'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'porte des Tessons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 10s) a souvent été identifiée à la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'porte du Fumier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Né 2.13 ; 3.13s ; 12.31) ; son emplacement précis nous est cependant inconnu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu crieras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.2.
    marker-yv: yv-n
  - type: text
    text: 'Sors vers la vallée du Fils de Hinnom, qui est à l''entrée de la porte des Tessons ; et là, tu crieras les paroles que je te dirai. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ecoutez la parole… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.20+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je fais venir… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en restera abasourdi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses oreilles tinteront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1S 3.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 21.12.'
    marker-yv: yv-n
  - type: text
    text: 'Tu diras : Ecoutez la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', rois de Juda, et vous, habitants de Jérusalem ! Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées, le Dieu d''Israël : Je fais venir sur ce lieu un tel malheur que quiconque en entendra parler en restera abasourdi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abandonné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.13+ ; cf. 22.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: méconnaissable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: étranger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se méprendre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Dt 32.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'offert de l''encens… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que ne connaissaient… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.9+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' des innocents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.6+.
    marker-yv: yv-n
  - type: text
    text: 'Car ils m''ont abandonné, ils ont rendu ce lieu méconnaissable, ils y ont offert de l''encens à d''autres dieux, que ne connaissaient ni eux, ni leurs pères, ni les rois de Juda, et ils ont rempli ce lieu du sang des innocents. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.31-33. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: hauts
      - type: text
        text: ' lieux'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.13 ; 2R 17.2s ; Ps 106.38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'venue au '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils ont bâti les hauts lieux du Baal pour jeter au feu leurs fils en holocaustes au Baal, chose que je n''avais pas ordonnée, dont je n''avais pas parlé et qui ne m''était pas venue au cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s.
    marker-yv: yv-n
  - type: text
    text: 'C''est pourquoi les jours viennent – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – où ce lieu ne sera plus appelé « topheth » et « vallée du Fils de Hinnom », mais « vallée de la Tuerie ». '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''anéantirai '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je rendrai vide
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les projets '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le conseil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. Es 19.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par l''épée… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 26.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui en veulent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux oiseaux… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.33+.
    marker-yv: yv-n
  - type: text
    text: 'En ce lieu j''anéantirai les projets de Juda et de Jérusalem. Quant à eux, je les ferai tomber par l''épée devant leurs ennemis, par la main de ceux qui en veulent à leur vie ; je donnerai leurs cadavres en pâture aux oiseaux du ciel et aux bêtes de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses plaies '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses fléaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 6.7 ; 10.19+.'
    marker-yv: yv-n
  - type: text
    text: 'Je réduirai cette ville en un lieu dévasté, en un objet de sifflement d''horreur. Tous ceux qui passeront près d''elle seront atterrés et siffleront d''horreur à cause de toutes ses plaies. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 26.29 ; 2R 6.29 ; Ez 5.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'détresse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: désarroi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: matsor / matsoq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', assonance ; le premier terme peut aussi désigner le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'siège '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(d''une ville), le second est apparenté au verbe traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: réduiront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en Dt 28.53'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',55,57.'
    marker-yv: yv-n
  - type: text
    text: 'Je leur ferai manger la chair de leurs fils et la chair de leurs filles ; chacun d''eux mangera la chair de son prochain, dans la détresse et le désarroi où les réduiront leurs ennemis et ceux qui en veulent à leur vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.1+.
    marker-yv: yv-n
  - type: text
    text: 'Tu briseras ensuite la cruche, sous les yeux des hommes qui seront allés avec toi, et tu leur diras : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 13.12-14 ; 48.38 ; Es 30.14 ; Ps 2.9 ; Lm 4.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui ne peut plus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sorte qu'elle ne peut plus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: être réparée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'guérir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 17.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on ensevelira… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées : C''est ainsi que je briserai ce peuple et cette ville, comme on brise une poterie qui ne peut plus être réparée. Et on ensevelira même au topheth, faute de place pour ensevelir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à un topheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au topheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 7.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'C''est ainsi que je ferai à ce lieu – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – et à ses habitants ; je rendrai cette ville semblable à un topheth. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impures
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en terrasse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; cf. Dt 22.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Dt 22.8 ; Jr 32.29 ; So 1.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on offrait de l''encens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'armée du ciel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.2+.
    marker-yv: yv-n
  - type: text
    text: Les maisons de Jérusalem et les maisons des rois de Juda seront impures comme le lieu du topheth, toutes ces maisons sur les toits en terrasse desquelles on offrait de l'encens à toute l'armée du ciel et on répandait des libations pour d'autres dieux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la cour… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 26.2 ; cf. 7.2.
    marker-yv: yv-n
