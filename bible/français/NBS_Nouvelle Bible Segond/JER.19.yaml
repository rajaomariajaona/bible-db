document_id: JER.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La cruche brisée
  - type: text
    content: ' '
  - type: note
    content: 'Ainsi parle le Seigneur  : LXX alors le Seigneur m''a dit . –  potier 18.2ss. –  prends avec toi  : d''après des versions anciennes ; les mots correspondants sont absents du texte hébreu traditionnel. –  des anciens n''est pas répété dans LXX.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Va acheter une cruche chez un potier, et prends avec toi des anciens du peuple et des anciens des prêtres. '
  '10':
  - type: note
    content: 13.1+.
  - type: text
    content: 'Tu briseras ensuite la cruche, sous les yeux des hommes qui seront allés avec toi, et tu leur diras : '
  '11':
  - type: note
    content: 'Cf. 13.12-14 ; 48.38 ; Es 30.14 ; Ps 2.9 ; Lm 4.2. –  qui ne peut plus  : autre traduction de sorte qu''elle ne peut plus. –  être réparée  : le verbe correspondant est traduit par guérir en 17.14. –  on ensevelira… 7.31n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : C''est ainsi que je briserai ce peuple et cette ville, comme on brise une poterie qui ne peut plus être réparée. Et on ensevelira même au topheth, faute de place pour ensevelir. '
  '12':
  - type: note
    content: 'à un topheth  : autre traduction au topheth  ; cf. 7.31n.'
  - type: text
    content: 'C''est ainsi que je ferai à ce lieu – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et à ses habitants ; je rendrai cette ville semblable à un topheth. '
  '13':
  - type: note
    content: 'impures  : voir pur. –  en terrasse  : sous-entendu dans le texte ; cf. Dt 22.8n  ; voir aussi Dt 22.8 ; Jr 32.29 ; So 1.5. –  on offrait de l''encens 1.16+. –  armée du ciel 8.2+.'
  - type: text
    content: Les maisons de Jérusalem et les maisons des rois de Juda seront impures comme le lieu du topheth, toutes ces maisons sur les toits en terrasse desquelles on offrait de l'encens à toute l'armée du ciel et on répandait des libations pour d'autres dieux.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Voir prophète. –  dans la cour… 26.2 ; cf. 7.2.
  - type: text
    content: 'Jérémie revint du topheth, où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait envoyé parler en prophète. Puis il se tint dans la cour de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et il dit à tout le peuple : '
  '15':
  - type: note
    content: toutes les villes… 49.13+. –  le malheur que j'ai annoncé 36.31. –  rétifs 7.26n.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je fais venir, sur cette ville et sur toutes les villes qui en dépendent, tout le malheur que j''ai annoncé contre elle, parce qu''ils se sont montrés rétifs, refusant d''écouter mes paroles.'
  '2':
  - type: note
    content: 'vallée du Fils de Hinnom  : cf. 7.31n. – La porte des Tessons (cf. v. 10s) a souvent été identifiée à la porte du Fumier (Né 2.13 ; 3.13s ; 12.31) ; son emplacement précis nous est cependant inconnu. –  tu crieras 2.2.'
  - type: text
    content: 'Sors vers la vallée du Fils de Hinnom, qui est à l''entrée de la porte des Tessons ; et là, tu crieras les paroles que je te dirai. '
  '3':
  - type: note
    content: 'Ecoutez la parole… 17.20+. –  Je fais venir… 6.19+. –  en restera abasourdi  : litt. ses oreilles tinteront  ; cf. 1S 3.11n  ; 2R 21.12.'
  - type: text
    content: 'Tu diras : Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', rois de Juda, et vous, habitants de Jérusalem ! Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je fais venir sur ce lieu un tel malheur que quiconque en entendra parler en restera abasourdi. '
  '4':
  - type: note
    content: 'abandonné 2.13+ ; cf. 22.9. –  méconnaissable  : litt. étranger  ; cf. 2.25n  ; le même verbe est traduit par se méprendre en Dt 32.27. –  offert de l''encens… 1.16+. –  que ne connaissaient… 7.9+. –  sang des innocents 7.6+.'
  - type: text
    content: 'Car ils m''ont abandonné, ils ont rendu ce lieu méconnaissable, ils y ont offert de l''encens à d''autres dieux, que ne connaissaient ni eux, ni leurs pères, ni les rois de Juda, et ils ont rempli ce lieu du sang des innocents. '
  '5':
  - type: note
    content: '7.31-33. – Voir hauts lieux. –  Baal  : cf. 11.13 ; 2R 17.2s ; Ps 106.38. –  venue au cœur 3.16n.'
  - type: text
    content: 'Ils ont bâti les hauts lieux du Baal pour jeter au feu leurs fils en holocaustes au Baal, chose que je n''avais pas ordonnée, dont je n''avais pas parlé et qui ne m''était pas venue au cœur. '
  '6':
  - type: note
    content: 7.31ns.
  - type: text
    content: 'C''est pourquoi les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où ce lieu ne sera plus appelé « topheth » et « vallée du Fils de Hinnom », mais « vallée de la Tuerie ». '
  '7':
  - type: note
    content: 'j''anéantirai (litt. je rendrai vide) les projets (autre traduction le conseil) : cf. Es 19.3n. –  par l''épée… Lv 26.17. –  qui en veulent… 11.21n. –  aux oiseaux… 7.33+.'
  - type: text
    content: 'En ce lieu j''anéantirai les projets de Juda et de Jérusalem. Quant à eux, je les ferai tomber par l''épée devant leurs ennemis, par la main de ceux qui en veulent à leur vie ; je donnerai leurs cadavres en pâture aux oiseaux du ciel et aux bêtes de la terre. '
  '8':
  - type: note
    content: 18.16n. –  ses plaies ou ses fléaux, cf. 6.7 ; 10.19+.
  - type: text
    content: 'Je réduirai cette ville en un lieu dévasté, en un objet de sifflement d''horreur. Tous ceux qui passeront près d''elle seront atterrés et siffleront d''horreur à cause de toutes ses plaies. '
  '9':
  - type: note
    content: 'Lv 26.29 ; 2R 6.29 ; Ez 5.10. –  détresse / désarroi  : hébreu matsor / matsoq, assonance ; le premier terme peut aussi désigner le siège (d''une ville), le second est apparenté au verbe traduit par réduiront, comme en Dt 28.53n,55,57.'
  - type: text
    content: 'Je leur ferai manger la chair de leurs fils et la chair de leurs filles ; chacun d''eux mangera la chair de son prochain, dans la détresse et le désarroi où les réduiront leurs ennemis et ceux qui en veulent à leur vie. '
