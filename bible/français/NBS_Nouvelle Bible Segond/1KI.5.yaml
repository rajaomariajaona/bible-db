  - type: text
    text: Mes hommes les descendront du Liban à la mer, et je les expédierai par la mer en radeaux jusqu'à l'endroit que tu m'indiqueras. Là, je les ferai délier, et toi, tu les prendras en charge. Quant à toi, tu me donneras satisfaction en fournissant des vivres à ma maison.
