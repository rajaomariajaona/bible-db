document_id: 1KI.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'dominait encore…  : cf. 2Ch 9.26. –  depuis le Fleuve  : l''Euphrate. –  le pays des Philistins  : LXX a lu depuis le pays des Philistins , cf. 2.46 ; 10.26. –  le tribut  : cf. 10.25 ; Jg 3.15n  ; 2S 8.2,6 ; 2R 17.3s ; voir également Lv 2.1n ( offrande ). – LXX place les v. 1,4-6 à la fin de 2.46 et dans un ordre légèrement remanié.'
  - type: text
    content: Salomon dominait encore sur tous les royaumes depuis le Fleuve, le pays des Philistins et jusqu'à la frontière d'Egypte ; ils apportaient le tribut. Ils furent soumis à Salomon tous les jours de sa vie.
  '10':
  - type: note
    content: 'Cf. Ac 7.22. –  La sagesse de Salomon  : cf. Siracide 47.14-17 : « Comme tu (Salomon) as été sage en ta jeunesse, rempli d''intelligence comme un fleuve ! Ton esprit a recouvert la terre, tu l''as remplie de paraboles et d''énigmes, ton nom a atteint jusqu''aux îles lointaines et tu fus aimé pour ta paix. Tes chants, tes proverbes, tes paraboles et tes interprétations ont fait l''admiration du monde. » –  surpassait…  : cf. v. 9-14 ; 3.12 ; 10.23 ; 2Ch 9.22. –  fils de l''Orient Gn 29.1n. –  l''Egypte  : autre traduction les Egyptiens.'
  - type: text
    content: 'La sagesse de Salomon surpassait la sagesse de tous les fils de l''Orient et toute la sagesse de l''Egypte. '
  '11':
  - type: note
    content: 'Cf. 1Ch 2.6n. –  Etân  : cf. Ps 89.1+. –  l''Ezrahite  : le mot peut être interprété au sens d’autochtone, indigène. –  Hémân  : cf. Ps 88.1+. –  son nom était connu  : autre traduction sa renommée était répandue  ; cf. Gn 6.4+.'
  - type: text
    content: 'Il était plus sage qu''aucun homme, plus qu''Etân, l''Ezrahite, plus que Hémân, Kalkol et Darda, les fils de Mahol ; son nom était connu dans toutes les nations environnantes. '
  '12':
  - type: note
    content: 'Il a prononcé  : LXX Salomon a prononcé. –  trois mille maximes  : le livre des Proverbes (cf. Pr 1.1n) lui en attribue un peu plus de cinq cents. –  ses chants  : litt. son chant, mais LXX et les autres versions anciennes portent le pluriel. –  mille cinq  : LXX cinq mille. Cf. Ps 72 ; 127 ; Pr 1.1 ; 10.1 ; 25.1 ; Ct 1.1 ; Ec 1.1. En dehors de la Bible hébraïque, plusieurs livres se réclament de Salomon ; ainsi la Sagesse, les Psaumes de Salomon. Voir « La littérature de sagesse »♦.'
  - type: text
    content: 'Il a prononcé trois mille maximes, et ses chants sont au nombre de mille cinq. '
  '13':
  - type: note
    content: 'l''hysope  : plante à feuilles raides et velues, qui pousse sur des terrains rocailleux et atteint une hauteur de 40 à 45 cm. Elle est fréquente dans la région. Cf. Ex 12.22 ; Lv 14.4,49 ; Nb 19.6,18 ; Ps 51.9 ; Jn 19.29 (Mt 27.48 et Mc 15.36 parlent d''un roseau). –  des bestioles Gn 1.24n.'
  - type: text
    content: 'Il a parlé des arbres, depuis le cèdre du Liban jusqu''à l''hysope qui sort du mur ; il a aussi parlé des bêtes, des oiseaux, des bestioles et des poissons. '
  '14':
  - type: note
    content: 'Des gens de tous les peuples…  : LXX tous les peuples venaient pour écouter la sagesse de Salomon, et il reçut des présents de tous les rois de la terre qui avaient entendu parler de sa sagesse.'
  - type: text
    content: Des gens de tous les peuples, envoyés par tous les rois de la terre, qui avaient entendu parler de la sagesse de Salomon, venaient écouter cette sagesse.
  - type: heading
    content: Salomon prépare la construction du temple
  - type: heading
    content: 2Ch 2.2-15
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Hiram (nom signifiant le noble ) , roi de Tyr  : cf. 9.11 ; 2S 5.11 ; 1Ch 14.1 ( Houram, roi de Tyr en 2Ch 2.2,11) ; ne pas confondre avec l''autre Hiram, fils d''une veuve (7.13ns). –  on lui avait conféré l''onction 1.34n,39n. –  Hiram avait toujours (litt. tous les jours ) aimé David  : cf. 2S 5.11 ; 1Ch 14.1 ; 2Ch 2.2,11.'
  - type: text
    content: Hiram, roi de Tyr, envoya les gens de sa cour auprès de Salomon, car il apprit qu'on lui avait conféré l'onction pour qu'il soit roi à la place de son père. Or Hiram avait toujours aimé David.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon fit dire à Hiram  : Syr ajoute  : et le bénit.'
  - type: text
    content: 'Salomon fit dire à Hiram : '
  '17':
  - type: note
    content: 'bâtir une maison pour le nom du Seigneur  : cf. v. 19 ; 3.2. –  ses pieds  : litt. son pied, ou, selon une autre lecture traditionnelle, mes pieds  ; plusieurs versions anciennes ont lu ses pieds. Cf. 1Ch 28.3.'
  - type: text
    content: 'Tu as connu David, mon père ; il n''a pas pu bâtir une maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), son Dieu, à cause de la guerre qu''on lui a faite de toutes parts, jusqu''à ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ait mis ses ennemis sous ses pieds. '
  '18':
  - type: note
    content: 'accordé le repos de tous côtés  : cf. 2Ch 14.6 ; 15.15 ; 20.30. Siracide 47.13 : « Salomon régna en un temps de paix, Dieu lui accorda le repos alentour afin qu''il élève une Maison pour son nom et prépare un sanctuaire pour l''éternité. » –  adversaire  : hébreu satân (voir démon, diable, Satan). –  malheur  : litt. coup mauvais (cf. Ec 9.11n).'
  - type: text
    content: 'Maintenant, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, m''a accordé le repos de tous côtés ; plus d''adversaire, plus de malheur ! '
  '19':
  - type: note
    content: 'comme le Seigneur l''a dit  : LXX comme le Seigneur Dieu l''a dit. Cf. 8.17-19 ; 2S 7.13 ; 1Ch 22.10 ; 2Ch 1.18.'
  - type: text
    content: 'J''ai l''intention de bâtir une maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a dit à David, mon père : « C''est ton fils, celui que je mettrai à ta place sur ton trône, qui bâtira une maison pour mon nom. » '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Chaque jour  : litt. pour un jour . –  les vivres  : litt. le pain (ou la nourriture ) ; cf. v. 23 ; Né 5.18. –  kors  : mesure habituellement employée pour les liquides, ici, exceptionnellement, pour de la farine ; trente kors sont environ 6 300 l, soixante kors 12 600 l ; cf. v. 25n  ; voir aussi Esd 7.22.'
  - type: text
    content: 'Chaque jour les vivres de Salomon étaient de trente kors de fleur de farine et soixante kors de farine, '
  '20':
  - type: note
    content: 'des cèdres  : LXX des arbres. –  Mes hommes…  : litt. mes serviteurs, de même dans la suite. –  les Sidoniens  : le terme désigne ici les Phéniciens en général. Cf. 11.5,33 ; Dt 3.9 ; Jg 3.3 ; 18.7 etc.'
  - type: text
    content: 'Et maintenant, ordonne que l''on coupe pour moi des cèdres du Liban. Mes hommes seront avec les tiens, et je te donnerai tout ce que tu voudras pour leur salaire : tu sais qu''il n''y a personne parmi nous qui sache couper les arbres comme les Sidoniens.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.8s ; 2Ch 1.10. –  Béni soit aujourd''hui le Seigneur  : certains mss de LXX omettent aujourd''hui et rajoutent le Dieu d''Israël  ; d''autres portent béni soit Dieu, aujourd''hui.'
  - type: text
    content: 'Lorsque Hiram entendit les paroles de Salomon, il eut une grande joie ; il dit : Béni soit aujourd''hui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui a donné à David un fils sage pour diriger ce peuple nombreux ! '
  '22':
  - type: note
    content: 'Je te donnerai entière satisfaction  : litt. je ferai tout ton plaisir. Cf. v. 24.'
  - type: text
    content: 'Hiram fit répondre à Salomon : J''ai entendu ce que tu m''as fait dire. Je te donnerai entière satisfaction en ce qui concerne le bois de cèdre et le bois de cyprès. '
  '23':
  - type: note
    content: 'par la mer  : absent de LXX. –  des vivres  : litt. du pain  ; cf. v. 5n  ; Esd 3.7 ; 2Ch 2.14.'
  - type: text
    content: Mes hommes les descendront du Liban à la mer, et je les expédierai par la mer en radeaux jusqu'à l'endroit que tu m'indiqueras. Là, je les ferai délier, et toi, tu les prendras en charge. Quant à toi, tu me donneras satisfaction en fournissant des vivres à ma maison.
  '24':
  - type: text
    content: 'Hiram donnait à Salomon du bois de cèdre et du bois de cyprès autant qu''il en désirait. '
  '25':
  - type: note
    content: 'Cf. v. 2n  ; voir mesures. –  vingt mille kors de froment  : plus de 4 millions de litres. –  vingt kors  : plus de 4 000 l ; LXX vingt mille baths (420 000 l). –  huile vierge Ex 27.20n.'
  - type: text
    content: Salomon donnait à Hiram vingt mille kors de froment pour l'entretien de sa maison et vingt kors d'huile vierge ; voilà ce que Salomon donnait chaque année à Hiram.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Voir alliance.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné de la sagesse à Salomon, comme il le lui avait dit. Il y eut la paix entre Hiram et Salomon, et ils conclurent tous les deux une alliance.'
  - type: heading
    content: Salomon organise les corvées
  - type: heading
    content: 2Ch 2.1,16-17
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon  : absent de LXX. –  corvée 4.6 ; 9.15 ; 12.18 ; 2S 20.24n  ; Est 10.1 ; 2Ch 10.18. –  dans tout Israël  : cf. 9.20-22 ; 2Ch 8.7-9 ; voir aussi 12.4.'
  - type: text
    content: 'Le roi Salomon astreignit des gens à la corvée dans tout Israël ; ils étaient au nombre de trente mille. '
  '28':
  - type: note
    content: Adoniram 4.6n. –  intendant des corvées 4.6.
  - type: text
    content: 'Il les envoya au Liban, dix mille par mois alternativement ; ils étaient un mois au Liban et deux mois chez eux. Adoniram était intendant des corvées. '
  '29':
  - type: note
    content: 'porteurs de fardeaux  : cf. 11.28n.'
  - type: text
    content: 'Salomon avait encore soixante-dix mille porteurs de fardeaux et quatre-vingt mille tailleurs de pierre dans la montagne, '
  '3':
  - type: note
    content: 'chevreuils  : terme hébreu rare qui n''apparaît qu''ici et en Dt 14.5. –  volailles  : le mot n''apparaît qu''ici et est traduit d''après LXX qui porte  : et des oiseaux choisis, engraissés  ; autre traduction coucous. La tradition juive traduit coqs ou poules.'
  - type: text
    content: dix bœufs gras, vingt bœufs de pâturage, et cent têtes de petit bétail, outre les cerfs, les gazelles, les chevreuils et les volailles engraissées.
  '30':
  - type: note
    content: 'les chefs 4.2n. –  des préfets  : cf. v. 7 ; 4.5,7 ; 22.48 ; 1S 10.5n  ; 2Ch 8.10n. –  trois mille trois cents  : LXX trois mille six cents  ; cf. 2Ch 2.1 ; voir aussi 1R 9.23 ; 2Ch 8.10.'
  - type: text
    content: 'sans compter les chefs des préfets de Salomon qui étaient intendants des travaux : trois mille trois cents ; ils exerçaient leur autorité sur ceux qui faisaient les travaux. '
  '31':
  - type: note
    content: 'pierres magnifiques (7.9-11) : la même expression hébraïque, au singulier, est traduite par pierre(s) précieuse(s) 2S 12.30 ; 1R 10.2,10s ; Ez 27.22 ; 28.13 ; Dn 11.38 ; 1Ch 20.2 ; 29.2 ; 2Ch 3.6 ; 9.1,9 ; 32.27. –  les fondations  : cf. 6.37.'
  - type: text
    content: 'Le roi ordonna d''extraire de grandes pierres, des pierres magnifiques, pour poser les fondations de la Maison en pierres de taille. '
  '32':
  - type: note
    content: 'Guébalites  : habitants de Guébal ou Byblos, au nord de Beyrouth ; cf. Jos 13.5.'
  - type: text
    content: Les bâtisseurs de Salomon, les bâtisseurs de Hiram et les Guébalites les taillèrent et préparèrent le bois et les pierres pour bâtir la Maison.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'toute la Transeuphratène  : litt. tout l''au-delà du fleuve (l''Euphrate), désignation de la région englobant la Syrie et le pays d''Israël dans la terminologie de l''empire assyrien ou perse (cf. 14.15 ; Esd 4.10n,20) ; il s''agit de la région s''étendant de l''Euphrate ( Tiphsah ) à la Méditerranée ( Gaza ). –  tous les pays environnants  : certains mss portent avec tous ses serviteurs (c.-à-d. tous ses vassaux) des environs (une lettre remplacée par une autre, très proche par la forme) ; cf. v. 11.'
  - type: text
    content: 'Il exerçait son autorité sur toute la Transeuphratène, depuis Tiphsah jusqu''à Gaza, sur tous les rois de la Transeuphratène ; et il était en paix avec tous les pays environnants. '
  '5':
  - type: note
    content: 'depuis Dan…  : c.-à-d. du nord au sud ; cf. Jg 20.1 ; 1S 3.20 ; 2S 17.11 ; 24.2. –  habitèrent en sécurité  : cf. Lv 25.18s ; 26.5 ; Dt 12.10 ; Ez 28.26 ; 34.25,28 ; 38.8,11 ; 39.6 ; Za 14.11. –  sous sa vigne et sous son figuier  : cf. 2R 18.31 ; Os 2.14+ ; Mi 4.4 ; Za 3.10 ; voir aussi Nb 20.5 ; Dt 8.8.'
  - type: text
    content: Juda et Israël, depuis Dan jusqu'à Bersabée, habitèrent en sécurité, chacun sous sa vigne et sous son figuier, tous les jours de Salomon.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'quarante mille stalles pour les chevaux  : LXX quatre mille  ; cf. 2Ch 9.25. –  douze mille équipages de chars (autres traductions hommes d''équipage, attelages, chevaux d''attelage ) ; cf. 10.26+ ; 2Ch 1.14.'
  - type: text
    content: 'Salomon avait quarante mille stalles pour les chevaux de ses chars et douze mille équipages de chars. '
  '7':
  - type: note
    content: 'préfets 4.5n. –  pourvoyaient à tous les besoins 4.7+. –  chacun pendant son mois  : cf. 4.7.'
  - type: text
    content: 'Les préfets pourvoyaient à tous les besoins du roi Salomon et de tous ceux qui se présentaient devant la table du roi Salomon, chacun pendant son mois ; ils veillaient à ce que rien ne manque. '
  '8':
  - type: note
    content: 'chacun…  : d''après LXX, certains comprennent au lieu où se trouvait le roi, chacun selon sa consigne  ; sur le mot traduit ici par consigne, et ailleurs par règle ou droit, cf. Jg 13.12n.'
  - type: text
    content: Ils faisaient aussi venir de l'orge et de la paille pour les chevaux et les coursiers, chacun au lieu où il se trouvait, selon sa consigne.
  - type: heading
    content: Salomon surpasse tous les hommes en sagesse
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : LXX porte le Seigneur . –  donna à Salomon…  : cf. 3.5-14 ; 10.1-9,23s ; Ec 1.16 ; 2Ch 1.12. –  un esprit…  : litt. une largeur de cœur comme le sable…  ; même expression hébraïque rare traduite différemment en Es 60.5 ; Ps 100.5 ; Pr 21.4 ; voir aussi Os 7.11 ; Ps 139.23 ; Jb 34.10,34. –  le sable…  : cf. 4.20n.'
  - type: text
    content: 'Dieu donna à Salomon de la sagesse, une très grande intelligence, un esprit aussi vaste que le sable qui est au bord de la mer. '
