document_id: GAL.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Porter les fardeaux les uns des autres
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 18.15+ ; 2Th 3.14s ; Jc 5.19s. –  les spirituels  : autre traduction les gens de l''Esprit , cf. 1Co 2.14ns ; 14.37n. –  aidez-le à se rétablir  : litt. rétablissez un tel homme  ; autre traduction aidez-le à se perfectionner , cf. 2Co 13.9n,11. –  un esprit de douceur 5.22-23+ ; 1Co 4.21. –  Prends garde… 1Co 10.12. –  mis à l''épreuve 4.14n.'
  - type: text
    content: 'Mes frères, si quelqu''un vient à être surpris en une faute, quelle qu''elle soit, vous, les spirituels, aidez-le à se rétablir avec un esprit de douceur. Prends garde à toi-même, de peur que, toi aussi, tu ne sois mis à l''épreuve. '
  '10':
  - type: note
    content: 'l''occasion ou le temps, comme au v. 9 (en temps voulu) ; le mot grec correspondant désigne le temps propice ou favorable, le moment de faire quelque chose ; il a aussi le sens de saison (4.10 ; cf. l''image des semailles et des moissons, v. 7-9) ; voir Rm 3.26n. –  la maison de la foi  : cf. 2P 1.7.'
  - type: text
    content: Ainsi donc, pendant que nous en avons l'occasion, œuvrons pour le bien de tous, en particulier pour la maison de la foi.
  - type: heading
    content: Derniers avertissements et salutations
  '11':
  - type: text
    content: ' '
  - type: note
    content: Litt. voyez avec quelles grandes lettres je vous ai écrit… Certains pensent que cette remarque s'applique à toute la fin de l'épître (v. 11-18) et que les grandes lettres mettent en valeur cette conclusion, écrite de la propre main de Paul (cf. 1Co 16.21+).
  - type: text
    content: 'Voyez les grandes lettres avec lesquelles je vous écris de ma propre main. '
  '12':
  - type: note
    content: 'Cf. 2.3 ; 3.3 ; voir aussi Ph 3.18s ; Col 2.18. –  dans la chair  : cf. v. 13. –  pas persécutés 5.11+.'
  - type: text
    content: 'Tous ceux qui, dans la chair, veulent se faire bien voir, voilà ceux qui vous contraignent à vous faire circoncire, à seule fin de n''être pas persécutés pour la croix du Christ. '
  '13':
  - type: note
    content: 'eux-mêmes, qui se font circoncire ou qui pratiquent la circoncision  : certains mss portent ces circoncis. –  n''observent pas la loi  : cf. 3.10+ ; 5.3 ; Rm 2.21. –  leur fierté  : cf. 2Co 11.18+ ; voir aussi Mt 23.15.'
  - type: text
    content: Car eux-mêmes, qui se font circoncire, n'observent pas la loi ; mais ils veulent que vous vous fassiez circoncire pour pouvoir mettre leur fierté dans votre chair.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'jamais je ne mettrai ma fierté… Rm 3.27 ; 1Co 1.23,31 ; 2.2 ; Ph 3.3ss. –  le monde est crucifié pour moi…  : cf. 1.4 ; 2.19+.'
  - type: text
    content: 'Quant à moi, jamais je ne mettrai ma fierté en rien d''autre que dans la croix de notre Seigneur Jésus-Christ, par qui le monde est crucifié pour moi, comme je le suis pour le monde ! '
  '15':
  - type: note
    content: 'qui importe  : litt. qui est quelque chose, cf. v. 3n. –  circoncision / incirconcision 5.6+. –  une création nouvelle 2Co 5.17n.'
  - type: text
    content: 'Car ce qui importe, ce n''est ni la circoncision ni l''incirconcision, c''est une création nouvelle. '
  '16':
  - type: note
    content: 'qui suivront…  : litt. qui avanceront (Ph 3.16) selon cette règle (le terme grec a donné notre mot canon). –  paix…  : cf. Ps 125.5 ; 128.6 ; ici la formulation rappelle particulièrement une bénédiction liturgique de la synagogue. –  comme (litt. et) sur l''Israël de Dieu  : cf. 1Co 10.18 ; selon certains, l''expression s''appliquerait plus particulièrement aux chrétiens d''origine juive, voire à ceux de Jérusalem (pour autant qu''ils ne s''opposent pas à la règle énoncée précédemment par Paul) ; selon d''autres, elle inclurait tous les chrétiens sans distinction d''origine ; dans la seconde hypothèse, on pourrait aussi traduire sur eux, sur l''Israël de Dieu ou sur eux, comme sur tout l''Israël de Dieu (cf. Rm 9–11).'
  - type: text
    content: Sur tous ceux qui suivront cette règle, paix et compassion, comme sur l'Israël de Dieu !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Désormais  : autres traductions au reste, dès lors . –  que personne ne me tracasse  : cf. Mt 26.10+. –  les marques  : le terme grec a donné notre mot stigmates  ; il s''appliquait à l''origine à la marque d''un propriétaire sur un esclave ou d''une divinité sur un adorateur (cf. Ap 13.16) ; il s''agit sans doute ici des cicatrices, au sens propre ou figuré, que Paul a gardées des persécutions qu''il a subies pour le nom du Christ et qu''il oppose peut-être à la circoncision, le signe d''appartenance à Dieu recommandé par ses adversaires ; cf. 1Co 15.32 ; 2Co 4.10 ; 6.4s ; 11.23-28 ; Ph 3.10 ; Col 1.24.'
  - type: text
    content: Désormais, que personne ne me tracasse ; car moi, je porte sur mon corps les marques de Jésus.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ph 4.23 ; 2Tm 4.22 ; Phm 25. – Certains mss portent, avec diverses variantes, l''indication suivante  : Aux Galates, écrite de Rome par Paul et les frères.'
  - type: text
    content: 'Que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit, mes frères ! '
  - type: text
    content: Amen !
  '2':
  - type: note
    content: Portez les fardeaux Rm 15.1n. –  la loi du Christ 1Co 9.21 ; cf. Jn 13.34+ ; Rm 3.27 ; 8.2 ; Ph 2.5-8.
  - type: text
    content: 'Portez les fardeaux les uns des autres, et vous accomplirez ainsi la loi du Christ. '
  '3':
  - type: note
    content: 'quelqu''un d''important  : litt. quelque chose  ; cf. 2.6n  ; 1Co 3.18 ; 4.4-7 ; 8.2 ; voir aussi Ac 5.36. –  il n''est rien 2Co 12.11. –  s''illusionne  : cf. Tt 1.10 (terme apparenté).'
  - type: text
    content: 'Celui qui se considère comme quelqu''un d''important, alors qu''il n''est rien, s''illusionne lui-même. '
  '4':
  - type: note
    content: 'Que chacun examine (ou discerne, éprouve  ; sur le verbe correspondant, voir Rm 1.28n) son œuvre  : cf. 1Co 3.10-15 ; 11.28 ; 2Co 13.5n. –  être fier v. 14s ; cf. Rm 2.17n  ; 2Co 1.14+.'
  - type: text
    content: 'Que chacun examine son œuvre propre, et alors il aura de quoi être fier par rapport à lui-même, et non par rapport à quelqu''un d''autre ; '
  '5':
  - type: note
    content: Cf. v. 7-10 ; Rm 14.12 ; 1Co 3.8.
  - type: text
    content: car chacun portera sa propre charge.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'celui à qui l''on enseigne  : le terme grec ainsi traduit a donné le mot catéchumène . –  fasse participer  : le verbe grec est apparenté au mot traduit par communion, solidarité  ; cf. 2.9n  ; Rm 15.26ns ; 1Co 9.11-14 ; 2Co 8.4n. –  à tous ses biens  : litt. en toutes bonnes choses.'
  - type: text
    content: Que celui à qui l'on enseigne la Parole fasse participer à tous ses biens celui qui l'enseigne.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ne vous égarez pas ou ne vous laissez pas égarer 1Co 6.9+. –  Ce qu''un homme aura semé…  : cf. Os 8.7 ; Jb 4.8 ; Pr 22.8.'
  - type: text
    content: 'Ne vous égarez pas : on ne se moque pas de Dieu. Ce qu''un homme aura semé, c''est aussi ce qu''il moissonnera. '
  '8':
  - type: note
    content: 5.16+ ; Rm 6.21s ; 8.6,13 ; voir aussi Jn 3.6 ; 6.27,63. – Voir chair. –  la pourriture ou la décomposition, l'existence périssable, la corruption  ; cf. 1Co 9.25+ ; 15.42n,50ss ; 2P 2.12. –  vie éternelle Rm 2.7 ; 5.21 ; 6.22s ; cf. 1Tm 1.16 ; 6.12 ; Tt 1.2 ; 3.7 ; voir aussi Jn 3.15+.
  - type: text
    content: 'Celui qui sème pour sa propre chair récoltera la moisson de la chair : la pourriture ; mais celui qui sème pour l''Esprit récoltera la moisson de l''Esprit : la vie éternelle. '
  '9':
  - type: note
    content: 'Ne nous lassons pas… 2Th 3.13 ; voir aussi 2Co 4.1n. –  en temps voulu v. 10n  ; cf. 1Tm 6.14. –  si nous ne nous relâchons pas  : cf. Ph 2.12 ; 3.12-14.'
  - type: text
    content: 'Ne nous lassons pas de faire ce qui est bien, car nous moissonnerons en temps voulu, si nous ne nous relâchons pas. '
