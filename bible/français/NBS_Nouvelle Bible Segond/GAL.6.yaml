        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mt 18.15+ ; 2Th 3.14s ; Jc 5.19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les spirituels
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les gens de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1Co 2.14'
        - type: usfm
          marker: ord
          children:
          - type: text
