        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aidez-le à se rétablir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rétablissez un tel homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aidez-le à se perfectionner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2Co 13.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un esprit de douceur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.22-23+ ; 1Co 4.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Prends garde… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 10.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mis à l''épreuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mes frères, si quelqu''un vient à être surpris en une faute, quelle qu''elle soit, vous, les spirituels, aidez-le à se rétablir avec un esprit de douceur. Prends garde à toi-même, de peur que, toi aussi, tu ne sois mis à l''épreuve. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''occasion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le temps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 9 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en temps voulu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; le mot grec correspondant désigne le temps propice ou favorable, le moment de faire quelque chose ; il a aussi le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'saison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (4.10 ; cf. l'image des semailles et des moissons, v. 7-9) ; voir Rm 3.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la maison de la foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2P 1.7.'
      marker-yv: yv-n
    - type: text
      text: Ainsi donc, pendant que nous en avons l'occasion, œuvrons pour le bien de tous, en particulier pour la maison de la foi.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Derniers avertissements et salutations
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voyez avec quelles grandes lettres je vous ai écrit… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains pensent que cette remarque s''applique à toute la fin de l''épître (v. 11-18) et que les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grandes lettres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'mettent en valeur cette conclusion, écrite de la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'propre main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Paul (cf. 1Co 16.21+).
      marker-yv: yv-n
    - type: text
      text: 'Voyez les grandes lettres avec lesquelles je vous écris de ma propre main. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.3 ; 3.3 ; voir aussi Ph 3.18s ; Col 2.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas persécutés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.11+.
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui, dans la chair, veulent se faire bien voir, voilà ceux qui vous contraignent à vous faire circoncire, à seule fin de n''être pas persécutés pour la croix du Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'eux-mêmes, qui se font circoncire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui pratiquent la circoncision
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ces circoncis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'observent pas la loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.10+ ; 5.3 ; Rm 2.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur fierté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Co 11.18+ ; voir aussi Mt 23.15.'
      marker-yv: yv-n
    - type: text
      text: Car eux-mêmes, qui se font circoncire, n'observent pas la loi ; mais ils veulent que vous vous fassiez circoncire pour pouvoir mettre leur fierté dans votre chair.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jamais je ne mettrai ma fierté… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 3.27 ; 1Co 1.23,31 ; 2.2 ; Ph 3.3ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le monde est crucifié pour moi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.4 ; 2.19+.'
      marker-yv: yv-n
    - type: text
      text: 'Quant à moi, jamais je ne mettrai ma fierté en rien d''autre que dans la croix de notre Seigneur Jésus-Christ, par qui le monde est crucifié pour moi, comme je le suis pour le monde ! '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui importe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui est quelque chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'circoncision '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'incirconcision '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une création nouvelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 5.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car ce qui importe, ce n''est ni la circoncision ni l''incirconcision, c''est une création nouvelle. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui suivront…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui avanceront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Ph 3.16) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'selon cette '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'règle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le terme grec a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: canon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: paix…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 125.5 ; 128.6 ; ici la formulation rappelle particulièrement une bénédiction liturgique de la synagogue. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur l'Israël de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Co 10.18 ; selon certains, l''expression s''appliquerait plus particulièrement aux chrétiens d''origine juive, voire à ceux de Jérusalem (pour autant qu''ils ne s''opposent pas à la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'règle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'énoncée précédemment par Paul) ; selon d''autres, elle inclurait tous les chrétiens sans distinction d''origine ; dans la seconde hypothèse, on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur eux, sur l''Israël de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur eux, comme sur tout l''Israël de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Rm 9–11).
      marker-yv: yv-n
    - type: text
      text: Sur tous ceux qui suivront cette règle, paix et compassion, comme sur l'Israël de Dieu !
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Désormais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au reste, dès lors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que personne ne me tracasse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Mt 26.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les marques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme grec a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: stigmates
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; il s'appliquait à l'origine à la marque d'un propriétaire sur un esclave ou d'une divinité sur un adorateur (cf. Ap 13.16) ; il s'agit sans doute ici des cicatrices, au sens propre ou figuré, que Paul a gardées des persécutions qu'il a subies pour le nom du Christ et qu'il oppose peut-être à la circoncision, le signe d'appartenance à Dieu recommandé par ses adversaires ; cf. 1Co 15.32 ; 2Co 4.10 ; 6.4s ; 11.23-28 ; Ph 3.10 ; Col 1.24.
      marker-yv: yv-n
    - type: text
      text: Désormais, que personne ne me tracasse ; car moi, je porte sur mon corps les marques de Jésus.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ph 4.23 ; 2Tm 4.22 ; Phm 25. – Certains mss portent, avec diverses variantes, l'indication suivante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aux Galates, écrite de Rome par Paul et les frères.
      marker-yv: yv-n
    - type: text
      text: 'Que la grâce de notre Seigneur Jésus-Christ soit avec votre esprit, mes frères ! '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen !
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Portez les fardeaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 15.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' du Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 9.21 ; cf. Jn 13.34+ ; Rm 3.27 ; 8.2 ; Ph 2.5-8.
      marker-yv: yv-n
    - type: text
      text: 'Portez les fardeaux les uns des autres, et vous accomplirez ainsi la loi du Christ. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quelqu'un d'important
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quelque chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Co 3.18 ; 4.4-7 ; 8.2 ; voir aussi Ac 5.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il n''est rien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Co 12.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'illusionne
      - type: usfm
        marker: ft
        children:
        - type: text
