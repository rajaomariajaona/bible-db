document_id: ISA.57,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 53.8 ; Mi 7.2 ; Ps 12.2. – Voir justice. –  personne ne réfléchit ou personne n''y fait attention  ; cf. v. 11 ; 42.25n. –  hommes fidèles  : litt. hommes de fidélité , comme en Pr 20.6 ; cf. 54.8n,10. –  pour échapper au malheur  : litt. de devant le mal (cf. 39.8 ; 2Ch 34.27s), ce qui pourrait aussi signifier à cause du mal.'
  - type: text
    content: Le juste disparaît,
  - type: text
    content: et personne ne réfléchit ;
  - type: text
    content: les hommes fidèles sont ensevelis,
  - type: text
    content: et personne ne comprend
  - type: text
    content: que le juste est enseveli pour échapper au malheur.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'J''y renonce  : formule analogue en Jr 2.25 ( la cause est perdue ) ; 18.12 ( c''est sans espoir ). –  de la vigueur  : litt. la vie de ta main.'
  - type: text
    content: A force de marcher tu te fatigues
  - type: text
    content: 'et tu ne dis pas : J''y renonce !'
  - type: text
    content: 'Tu trouves encore de la vigueur :'
  - type: text
    content: aussi tu n'es pas abattue.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ne pas te souvenir de moi  : cf. v. 8n. –  réfléchir v. 1+. –  silence 42.14+. – Voir crainte.'
  - type: text
    content: De qui donc t'inquiétais-tu,
  - type: text
    content: qui craignais-tu, pour mentir,
  - type: text
    content: pour ne pas te souvenir de moi,
  - type: text
    content: pour ne pas réfléchir ?
  - type: text
    content: Est-ce que je ne garde pas le silence,
  - type: text
    content: et ce depuis toujours ?
  - type: text
    content: Aussi, moi, tu ne me crains pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'annoncer ta justice  : expression ironique.'
  - type: text
    content: Je vais annoncer ta justice
  - type: text
    content: et tes œuvres,
  - type: text
    content: elles ne te profiteront pas.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ton attirail  : le mot hébreu correspondant vient de la racine signifiant regrouper, rassembler (comme 40.11+) ; il s''agit probablement d''un terme méprisant pour désigner les idoles. –  te délivre Jg 10.14 ; Jr 2.28. –  trouve… un abri  : même verbe en Ps 7.2+ ; 36.8 ; 57.2 ; 61.5. –  aura le pays (ou la terre ) pour patrimoine 60.21 ; 65.9 ; Ps 37.9,11,29,34 ; Mt 5.5. –  ma montagne sacrée 11.9+ ; 56.7.'
  - type: text
    content: Quand tu crieras,
  - type: text
    content: que ton attirail te délivre !
  - type: text
    content: Tout cela, un vent l'enlèvera,
  - type: text
    content: un souffle le prendra.
  - type: text
    content: Mais celui qui trouve en moi un abri
  - type: text
    content: aura le pays pour patrimoine,
  - type: text
    content: il entrera en possession de ma montagne sacrée.
  - type: heading
    content: Le Seigneur va guérir son peuple
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Frayez 40.3+ ; 62.10. –  obstacle  : le même terme a été traduit qui cause la chute en 8.14n.'
  - type: text
    content: 'Il dira :'
  - type: text
    content: Frayez, frayez,
  - type: text
    content: préparez un chemin,
  - type: text
    content: enlevez tout obstacle
  - type: text
    content: du chemin de mon peuple !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui est haut placé, élevé  : comme en 2.13n  ; 6.1 ; 52.13 ; voir aussi 57.7 (autre terme pour haute ). –  dont le nom est sacré  : autre traduction dont le nom est « Le Saint  ». –  une hauteur sacrée  : autres traductions un lieu élevé et saint ; dans la hauteur et la sainteté. –  celui qui est écrasé… abaissé 53.5,10 ; 66.2 ; Ps 34.19 ; 51.19 ; 138.6 ; Pr 29.23. –  dont l''esprit est abaissé  : litt. l''abaissé d''esprit ou de souffle , cf. Mt 5.3. –  ranimer  : litt. faire vivre . –  l''esprit abaissé / le cœur écrasé  : litt. l''esprit des abaissés / le cœur des écrasés.'
  - type: text
    content: Car ainsi parle celui qui est haut placé, élevé,
  - type: text
    content: qui demeure à jamais
  - type: text
    content: 'et dont le nom est sacré :'
  - type: text
    content: C'est dans une hauteur sacrée que je demeure,
  - type: text
    content: et avec celui qui est écrasé
  - type: text
    content: et dont l'esprit est abaissé,
  - type: text
    content: afin de ranimer l'esprit abaissé
  - type: text
    content: et de ranimer le cœur écrasé.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Je n''accuserai pas toujours 54.7-9 ; 60.10 ; Jr 3.5,12 ; Ps 103.9. –  irrité 47.6+. –  car  : autre traduction quand . –  l''esprit…  : litt. l''esprit (terme souvent traduit par souffle ) et les souffles (ou haleines , même terme en Gn 2.7n) que j''ai faits (Es 42.5).'
  - type: text
    content: Je n'accuserai pas toujours,
  - type: text
    content: je ne serai pas irrité à jamais,
  - type: text
    content: car devant moi défaillirait l'esprit,
  - type: text
    content: le souffle des êtres que j'ai faits.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '56.11. –  son avidité coupable  : litt. la faute de son avidité . –  la voie de son cœur Jr 3.17 ; 7.24.'
  - type: text
    content: A cause de son avidité coupable,
  - type: text
    content: je me suis irrité
  - type: text
    content: et je l'ai frappé,
  - type: text
    content: je me suis caché dans mon irritation ;
  - type: text
    content: mais il a suivi, rebelle,
  - type: text
    content: la voie de son cœur.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'je le guérirai Jr 3.22 ; Os 6.1. –  je le conduirai  : LXX je l''ai consolé , cf. 40.1+. –  je le comblerai  : le verbe hébreu correspondant peut évoquer une récompense, un châtiment ou une compensation pour un tort subi. –  deuil v. 19n  ; cf. 60.20 ; 61.2s ; 66.10.'
  - type: text
    content: J'ai vu ses voies,
  - type: text
    content: mais je le guérirai ;
  - type: text
    content: je le conduirai
  - type: text
    content: et je le comblerai de consolations,
  - type: text
    content: lui et ceux qui mènent deuil sur lui.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'le fruit des lèvres  : expression désignant la louange ; cf. Os 14.3 ; Hé 13.15. Autre traduction pour ceux qui menaient deuil sur lui (v. 18) je crée le fruit des lèvres. –  Paix… Ep 2.17. –  loin / proche 33.13 ; cf. Jr 25.26 ; Ez 6.12 ; 22.5 ; Ac 2.39. –  Je les guérirai  : litt. je le guérirai.'
  - type: text
    content: Je crée le fruit des lèvres.
  - type: text
    content: Paix, paix à celui qui est loin
  - type: text
    content: comme à celui qui est proche !
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Je les guérirai !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Il entrera dans la paix  : autre traduction la paix arrive. –  il reposera…  : litt. ils reposeront sur leurs lits  ; le vocabulaire de ce v. évoque vraisemblablement la mort ; cf. Ez 32.25 ; Jb 3.13,17 ; 2Ch 16.14.'
  - type: text
    content: Il entrera dans la paix,
  - type: text
    content: il reposera sur son lit,
  - type: text
    content: celui qui suit le droit chemin.
  - type: heading
    content: Le Seigneur avertit les idolâtres
  '20':
  - type: text
    content: Mais les méchants sont comme la mer agitée,
  - type: text
    content: 'qui ne peut rester tranquille :'
  - type: text
    content: ses eaux agitent la vase et le limon.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 48.22+.
  - type: text
    content: Il n'y a pas de paix,
  - type: text
    content: dit mon Dieu, pour les méchants.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'approchez  : autre traduction présentez-vous . –  cherche des présages 2.6n  ; cf. Ml 3.5. –  descendance adultère, qui se prostitue  : autre traduction descendance de l''adultère et de la prostituée  ; cf. Jr 3.9 ; Ez 16 ; Os 2.4.'
  - type: text
    content: Mais vous, approchez ici,
  - type: text
    content: fils de la femme qui cherche des présages,
  - type: text
    content: descendance adultère, qui se prostitue !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'De qui et Contre qui (cf. 37.23) traduisent la même locution hébraïque. –  vous moquez-vous ou vous amusez-vous. –  ouvrez-vous grand la bouche  : signe d''hostilité Ps 35.21 ; Lm 2.16. –  enfants révoltés 1.4.'
  - type: text
    content: De qui vous moquez-vous ?
  - type: text
    content: Contre qui ouvrez-vous grand la bouche
  - type: text
    content: et tirez-vous la langue ?
  - type: text
    content: N'êtes-vous pas des enfants révoltés,
  - type: text
    content: une génération de mensonge,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Allusions à des pratiques cananéennes. –  térébinthes 1.29n  ; autre traduction pour des dieux , hébreu ’élim , pluriel de ’el (40.18n), terme à peu près homonyme de celui qui désigne les térébinthes . –  arbre verdoyant Dt 12.2 ; 1R 14.23 ; 2R 17.10 ; Jr 2.20 ; Ez 6.13. –  égorgeant les enfants  : cf. Lv 18.21 ; Dt 12.31 ; Jr 7.31 ; Ez 16.21. –  oueds  : cf. 15.7 ; 27.12 ; 30.28 ; 34.9 ; Gn 26.17n  ; Jb 6.15n.'
  - type: text
    content: s'enflammant près des térébinthes,
  - type: text
    content: sous tout arbre verdoyant,
  - type: text
    content: égorgeant les enfants dans les oueds,
  - type: text
    content: sous les fentes des rochers ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: pierres polies et part traduisent le même mot hébreu pris dans deux acceptions différentes ; dans le second cas, la pierre représente sans doute le sort jeté dans le choix d'une divinité tutélaire (d'où la traduction part , en parallèle avec lot , cf. 17.14+ ; Ps 16.5) ; dans le premier, les pierres désignent soit le lit des torrents d'hiver où la divinité était censée demeurer (comme dans les lieux évoqués au v. 5), soit des stèles dressées (symboles phalliques, comme peut-être dans la suite et en 2R 17.10s).
  - type: text
    content: C'est dans les pierres polies de l'oued
  - type: text
    content: qu'est ta part,
  - type: text
    content: voilà, voilà ton lot ;
  - type: text
    content: c'est pour elles que tu verses des libations,
  - type: text
    content: que tu fais des offrandes en holocauste ;
  - type: text
    content: puis-je me consoler de tout cela ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'haute et élevée  : cf. v. 15n. –  tu dresses ton lit  : sous-entendu : pour t''y prostituer (v. 3+).'
  - type: text
    content: C'est sur une montagne haute et élevée
  - type: text
    content: que tu dresses ton lit ;
  - type: text
    content: c'est aussi là que tu montes
  - type: text
    content: pour offrir des sacrifices.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'montants  : cf. Ex 12.7 ; Dt 6.9 ; Ez 41.21. –  ton évocation  : autre traduction ton souvenir (cf. v. 11) ; il s''agit peut-être ici d''un emblème ou d''une stèle érotique ; cf. Ex 12.14n. –  tu t''exposes…  : autre traduction tu exposes ton lit, tu y montes… –  tu y fais de la place  : litt. tu élargis ta couche. –  tu pactises avec des hommes  : traduction incertaine, litt. tu tranches (cf. Gn 15.17-18n) d''eux pour toi  ; certains modifient le texte hébreu traditionnel pour traduire tu achètes (des hommes). –  coucher avec eux  : litt. leur lit. –  tu les regardes  : litt. tu as regardé (la) main , terme qui pourrait désigner ici une stèle (l’ évocation  ? cf. 56.5n) ou, par euphémisme, le sexe des hommes évoqués précédemment.'
  - type: text
    content: Derrière la porte et ses montants
  - type: text
    content: tu mets ton évocation ;
  - type: text
    content: car, loin de moi, tu t'exposes,
  - type: text
    content: tu montes sur ton lit et tu y fais de la place,
  - type: text
    content: tu pactises avec des hommes,
  - type: text
    content: tu aimes coucher avec eux,
  - type: text
    content: tu les regardes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'roi  : hébreu mélek  : il s''agit peut-être ici d''un dieu ; cf. Lv 18.21n  ; 20.2-5 ; 1R 11.7 ; Jr 32.35. –  huile Mi 6.7. –  parfums  : cf. Ex 30.35. – Voir séjour des morts.'
  - type: text
    content: Tu fais le voyage auprès du roi avec de l'huile,
  - type: text
    content: tu prodigues tes parfums,
  - type: text
    content: tu envoies au loin tes émissaires,
  - type: text
    content: tu les fais s'enfoncer
  - type: text
    content: jusqu'au séjour des morts.
