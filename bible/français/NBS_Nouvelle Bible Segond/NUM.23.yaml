document_id: NUM.23,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'sept taureaux / sept béliers  : on retrouve le même type de rituels dans des récits mésopotamiens ; cf. v. 14s,29s.'
  - type: text
    content: 'Balaam dit à Balaq : Bâtis-moi ici sept autels et prépare-moi ici sept taureaux et sept béliers. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'des nuées  : cf. v. 13 ; 22.41 ; cependant le mot hébreu pourrait aussi signifier le nuage de poussière , en accord avec le parallélisme ; cf. Gn 13.16 ; 28.14 ; 2Ch 1.9 ; voir aussi Gn 15.5. –  Que je meure  : cf. 31.8 ; Gn 15.15 ; Ap 14.13 ; voir aussi Gn 12.3n. –  des gens droits  : hébreu yesharim  ; cf. l''emploi du nom apparenté Yeshouroun en Dt 32.15n  ; 33.5,26. –  ma fin  : autres traductions possibles mon avenir ; ma postérité  ; même terme en 24.20.'
  - type: text
    content: Qui peut compter la poussière de Jacob
  - type: text
    content: et dire le nombre des nuées d'Israël ?
  - type: text
    content: Que je meure de la mort des gens droits,
  - type: text
    content: que ma fin soit semblable à la leur !
  '11':
  - type: text
    content: ' '
  - type: note
    content: malédiction / bénis v. 25 ; 24.10.
  - type: text
    content: 'Balaq dit à Balaam : Qu''est-ce que tu m''as fait ? Je t''ai fait venir pour vouer mes ennemis à la malédiction, et tu les bénis ! '
  '12':
  - type: note
    content: V. 5,26 ; 22.38.
  - type: text
    content: 'Il répondit : Ne dois-je pas veiller à dire ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' met dans ma bouche ?'
  - type: heading
    content: Deuxième bénédiction de Balaam
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'autre lieu v. 27s. –  tu n''en verras…  : autre traduction car tu n''en voyais qu''une partie, tu n''en voyais pas la totalité  ; cf. 22.41n  ; 24.2,5.'
  - type: text
    content: 'Balaq lui dit : Viens avec moi, je te prie, en un autre lieu d''où tu les verras ; tu n''en verras qu''une partie, tu n''en verras pas la totalité. De là, voue-le pour moi à la malédiction !'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'l''Aire des Guetteurs (hébreu Tsophim ) : sans doute un poste d''observation particulièrement avantageux. –  Pisga 21.20n. –  il bâtit… v. 1ss.'
  - type: text
    content: 'Il le mena sur l''Aire des Guetteurs, au sommet du Pisga ; il bâtit sept autels et offrit un taureau et un bélier en holocauste sur chaque autel. '
  '15':
  - type: note
    content: 'Balaam  : le sujet n''est exprimé que par quelques mss hébreux et des versions anciennes. –  ton holocauste v. 3n. –  j''irai à la rencontre  : LXX j''irai interroger Dieu.'
  - type: text
    content: 'Balaam dit à Balaq : Poste-toi ici, près de ton holocauste ; moi, j''irai à la rencontre. '
  '16':
  - type: note
    content: V. 5+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vint à la rencontre de Balaam ; il mit une parole dans sa bouche et il lui dit : Retourne vers Balaq, et tu parleras ainsi. '
  '17':
  - type: note
    content: 'vers Balaq  : litt. vers lui.'
  - type: text
    content: 'Il retourna vers Balaq, qui était posté près de son holocauste, avec les princes de Moab. Balaq lui dit : Qu''est-ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit ? '
  '18':
  - type: note
    content: 'poème v. 7n. –  Lève-toi  : cf. Jg 3.20. –  Prête l''oreille à ce que je dis  : expression inhabituelle ; certains, d''après LXX, l''interprètent  : prête l''oreille à mon témoignage ou à mon témoin  ; cf. Gn 4.23. –  fils de Tsippor 22.2,4.'
  - type: text
    content: 'Balaam prononça son poème :'
  - type: text
    content: Lève-toi, Balaq, écoute !
  - type: text
    content: Prête l'oreille à ce que je dis, fils de Tsippor !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El , de même aux v. 22s ; cf. Gn 21.33n. –  pour mentir… 1S 15.29 ; Es 31.2 ; Os 11.9 ; Jb 9.32 ; Rm 11.29 ; Tt 1.2 ; Hé 6.18 ; Jc 1.17 ; cf. Ml 3.6 ; Ps 12.3 ; 62.5 ; 116.11 ; voir aussi Ps 77.11. –  un être humain  : litt. un fils d''humain ou un fils d''Adam , cf. Gn 1.26n. –  avoir du regret  : autres traductions changer d''avis ; renoncer  ; sur les regrets de Dieu, cf. Gn 6.6s ; Ex 32.12,14 ; Jg 2.18 ; 1S 15.11,29,35 ; 2S 24.16 ; Jr 4.28 ; 15.6 ; 18.8,10 ; 26.3,13,19 ; 42.10 ; Ez 24.14 ; Os 13.14n  ; Jl 2.13s ; Am 7.3,6 ; Jon 3.9s ; 4.2 ; Za 8.14 ; Ps 90.13n  ; 106.45 ; 110.4 ; 1Ch 21.15.'
  - type: text
    content: Dieu n'est pas un homme pour mentir,
  - type: text
    content: il n'est pas un être humain pour avoir du regret.
  - type: text
    content: Ce qu'il a dit, ne le fera-t-il pas ?
  - type: text
    content: Ce qu'il a déclaré, ne le réalisera-t-il pas ?
  '2':
  - type: note
    content: 'Balaq et Balaam  : les mots correspondants sont absents de plusieurs mss hébreux et de LXX, cf. v. 30 ; le verbe qui suit est au singulier (il offrit, litt. il fit monter, terme technique pour l''holocauste v. 3 ; Lv 1.3n) ; cf. Jg 6.25 ; voir sacrifices.'
  - type: text
    content: 'Balaq fit ce que Balaam avait dit. Balaq et Balaam offrirent un taureau et un bélier en holocauste sur chaque autel. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai pris la bénédiction  : traduction incertaine ; on pourrait comprendre j''ai choisi de bénir ; il a béni et j''ai saisi (la bénédiction)  ; LXX, Syr, Vg ont lu j''ai été pris pour bénir , ce qui pourrait correspondre à une autre vocalisation du texte hébreu ; cf. v. 7-10 – il a béni  : Smr et LXX ont lu je bénis . –  je ne révoquerai pas son arrêt  : litt. je ne le ferai pas revenir  ; autres traductions je ne m''y opposerai pas ; je ne le contredirai pas  ; cf. Am 1.3n.'
  - type: text
    content: 'J''ai pris la bénédiction :'
  - type: text
    content: il a béni, je ne révoquerai pas son arrêt.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''aperçoit pas / il ne voit pas  : Smr, Syr je n''aperçois pas / je ne vois pas . –  mal / oppression  : ces termes (cf. Es 10.1 ; Ps 7.15+) peuvent s''entendre d''un mal commis ou d''un malheur subi ; cf. Judith 5.20s (discours des ennemis d''Israël) : « S''il y a un manquement dans ce peuple, s''ils pèchent contre leur Dieu et que nous observions chez eux cette cause de chute, nous monterons leur faire la guerre. Mais s''il n''y a pas d''injustice dans leur nation, que mon seigneur passe outre, de peur que leur Seigneur et leur Dieu ne les protège. » –  l''acclamation (10.5n) royale (litt. d''un roi ) retentit (sous-entendu dans le texte) chez lui , c.-à-d. en Israël  ; cf. 24.7 ; Ex 15.18 ; Dt 33.5 ; voir aussi Jg 8.23 ; 1S 4.4ss ; 8.7 ; 10.24 ; 12.12 ; 2S 16.16 ; 1R 1.25,34,39 ; 2R 11.12 ; Es 6.5 ; 33.22 ; Jr 8.19 ; Ps 24.7ss ; 93.1 ; 96.10 ; 97.1 ; 98.4ss ; 99.1.'
  - type: text
    content: Il n'aperçoit pas de mal en Jacob,
  - type: text
    content: il ne voit pas d'oppression en Israël ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, est avec lui ;'
  - type: text
    content: l'acclamation royale retentit chez lui.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : cf. v. 19n. –  le fait sortir  : autre traduction l''a fait sortir  ; même forme verbale en 24.8 ; Lv 22.33 ; cf. Lv 11.45. –  pour eux  : litt. pour lui , cf. v. 21 ; on pourrait aussi comprendre car il possède les cornes (autres traductions la vigueur, la force ) d''un aurochs (LXX licorne , Vg rhinocéros ) ; cf. Dt 33.17 ; Ps 92.11+.'
  - type: text
    content: Dieu le fait sortir d'Egypte,
  - type: text
    content: il est pour eux comme les cornes de l'aurochs.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''y a pas…  : autre traduction la divination ne peut rien contre Jacob, ni la magie contre Israël  ; cf. v. 6,17 ; voir aussi Ex 22.17 ; Lv 19.26,31 ; 20.6,27 ; Dt 18.9ss ; 1S 15.23. –  en son temps  : autre traduction car maintenant . –  Dieu  : cf. v. 19n.'
  - type: text
    content: Il n'y a pas de divination en Jacob,
  - type: text
    content: ni de magie en Israël ;
  - type: text
    content: en son temps, il sera dit à Jacob et à Israël
  - type: text
    content: quelle est l'action de Dieu.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'lionne / lion  : cf. 24.9 ; Gn 49.9n  ; Dt 33.20 ; Mi 5.7.'
  - type: text
    content: C'est un peuple qui se lève comme une lionne,
  - type: text
    content: il se dresse comme un lion ;
  - type: text
    content: il ne se couche pas avant d'avoir dévoré sa proie
  - type: text
    content: et bu le sang de ses victimes.
  '25':
  - type: text
    content: 'Balaq dit à Balaam : Si tu ne le voues pas à la malédiction, au moins ne le bénis pas ! '
  '26':
  - type: note
    content: V. 12 ; 22.20,35,38.
  - type: text
    content: 'Balaam répondit à Balaq : Ne t''ai-je pas dit : « Je ferai tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dira ! »'
  - type: heading
    content: Troisième bénédiction de Balaam
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 1-6,13-17. –  Viens  : litt. va , de même en 24.14. –  conviendra-t-il à Dieu  : litt. sera-t-il droit aux yeux de Dieu.'
  - type: text
    content: 'Balaq dit à Balaam : Viens, je te prie, je te mènerai dans un autre lieu ; peut-être conviendra-t-il à Dieu que, de là, tu le voues pour moi à la malédiction ! '
  '28':
  - type: note
    content: 'Péor  : cf. 25.3 ; Dt 3.29 ; 4.46 ; 34.6 ; Jos 13.20 ; Os 9.10. –  qui domine…  : voir 21.20n.'
  - type: text
    content: 'Balaq mena Balaam au sommet du Péor, qui domine la terre aride. '
  '29':
  - type: note
    content: Bâtis-moi ici… v. 1ss.
  - type: text
    content: 'Balaam dit à Balaq : Bâtis-moi ici sept autels, et prépare-moi ici sept taureaux et sept béliers. '
  '3':
  - type: note
    content: 'ton holocauste  : Smr et Syr ont lu tes holocaustes, de même dans la suite (v. 6,15,17 ; cf. v. 1). –  viendra-t-il à ma rencontre ou se présentera-t-il à moi  ; cf. v. 15s. –  ce qu''il me montrera  : litt. la chose (ou la parole) qu''il me fera voir  ; cf. v. 12 ; 22.20,38. –  une crête dénudée  : le même terme est traduit par piste en Jr 3.2n  ; il pourrait aussi signifier ici un sommet  ; les versions anciennes l''ont ici rendu très diversement (LXX il s''en alla tout droit).'
  - type: text
    content: 'Balaam dit à Balaq : Poste-toi près de ton holocauste, et je m''éloignerai ; peut-être le '
  - type: text
    content: Seigneur
  - type: text
    content: ' viendra-t-il à ma rencontre ; alors je te dirai ce qu''il me montrera. Il s''éloigna sur une crête dénudée. '
  '30':
  - type: text
    content: Balaq fit ce que Balaam avait dit ; il offrit un taureau et un bélier en holocauste sur chaque autel.
  '4':
  - type: note
    content: 'vint à la rencontre de  : cf. v. 16 ; Ex 3.18 ; 5.3. –  qui lui dit  : litt. et il lui dit  ; LXX et Balaam lui dit.'
  - type: text
    content: 'Dieu vint à la rencontre de Balaam, qui lui dit : J''ai disposé sept autels et j''ai offert un taureau et un bélier sur chaque autel.'
  - type: heading
    content: Balaam bénit le peuple d'Israël
  '5':
  - type: text
    content: ' '
  - type: note
    content: une parole… v. 16 ; cf. 22.38+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' mit une parole dans la bouche de Balaam ; il lui dit : Retourne vers Balaq, et tu parleras ainsi. '
  '6':
  - type: note
    content: 'vers Balaq  : litt. vers lui. –  son holocauste  : voir v. 3n  ; LXX ajoute et l''Esprit (= le souffle) de Dieu fut sur lui, cf. 24.2 ; voir sacrifices.'
  - type: text
    content: 'Il retourna vers Balaq, qui était posté près de son holocauste avec tous les chefs de Moab. '
  '7':
  - type: note
    content: 'Cf. Dt 33. –  poème  : le mot hébreu mashal, habituellement traduit par sentence, maxime, proverbe, parabole, pourrait avoir ici le sens plus précis d’incantation, de même en 24.3,15,20s ; cf. 21.27 les poètes. –  d''Aram ou de Syrie, mais la Mésopotamie s''appelle aussi Aram-Naharaïm (Aram des deux fleuves) en hébreu ; cf. 22.5ns ; certains modifient le texte hébreu traditionnel pour lire d''Edom. –  Jacob / Israël v. 10,21,23 ; 24.5,17,18s ; cf. Gn 32.29 ; Ex 19.3 ; Dt 33.4s,10.'
  - type: text
    content: 'Balaam prononça son poème :'
  - type: text
    content: Balaq m'a fait venir d'Aram,
  - type: text
    content: le roi de Moab m'a fait venir des montagnes de l'est.
  - type: text
    content: Va, maudis Jacob pour moi !
  - type: text
    content: Va, répands la fureur contre Israël !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 22.12,18,38 ; Gn 12.1ss. –  vouerais-je à la malédiction / voué à la malédiction 22.11n. –  Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: Comment vouerais-je à la malédiction celui que Dieu n'a pas voué à la malédiction ?
  - type: text
    content: 'Comment répandrais-je la fureur quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''est pas en fureur ?'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Je le vois  : autre traduction car je le vois  ; cf. 24.17. –  des rochers  : autre traduction des montagnes . –  à part  : cf. Dt 33.28 ; terme plus souvent traduit par solitaire (Mi 7.14n  ; Lm 3.28) ou seul (Ps 4.9) ; cf. Ex 34.11ss ; Lv 20.24 ; Dt 4.32ss ; 7.1ss ; 33.28 ; Esd 9.2. –  compté ou considéré  ; autre verbe au v. 10.'
  - type: text
    content: Je le vois du sommet des rochers,
  - type: text
    content: 'je le contemple depuis les collines :'
  - type: text
    content: c'est un peuple qui a sa demeure à part,
  - type: text
    content: et qui n'est pas compté parmi les nations.
