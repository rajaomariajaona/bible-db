document_id: NUM.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La cendre de la vache rousse
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '10':
  - type: note
    content: 'impur  : le terme pourrait s''entendre ici de la mise hors des activités courantes résultant d''un contact, non avec une chose à proprement parler impure, mais avec une chose sacrée ; cf. v. 7 ; Lv 6.11,18ss ; 11.25. –  et pour les immigrés 9.14 ; 15.29 ; cf. Ex 12.48n.'
  - type: text
    content: Celui qui aura recueilli la cendre de la vache lavera ses vêtements, et il sera impur jusqu'au soir. C'est une prescription perpétuelle pour les Israélites et pour les immigrés qui séjournent au milieu d'eux.
  - type: heading
    content: Loi sur la purification
  '11':
  - type: text
    content: ' '
  - type: note
    content: V. 16 ; 5.2nss ; 6.6ss ; 9.6ss ; 31.19ss ; Lv 21.1ss,11 ; 22.4 ; Ez 44.25.
  - type: text
    content: 'Celui qui touche un mort – un corps humain, quel qu''il soit – sera impur pendant sept jours. '
  '12':
  - type: note
    content: 'Cf. v. 18s ; 6.9ss ; Lv 5.2ss ; 14.10ss. –  Il ôtera son péché v. 13,20 ; 8.21n. –  avec cette eau  : litt. avec elle ou avec lui, avec cela  ; le terme correspondant porte un accent distinctif assez rare dans le texte hébreu traditionnel, et il est omis par LXX  ; cf. 31.23.'
  - type: text
    content: 'Il ôtera son péché avec cette eau le troisième jour et le septième jour, et il sera pur ; s''il n''ôte pas son péché le troisième jour et le septième jour, il ne sera pas pur. '
  '13':
  - type: note
    content: 'rend impure la demeure…  : cf. v. 20 ; Lv 15.31. –  sera retranché  : cf. v. 20 ; 15.31 ; Ex 31.14 ; Lv 7.20n.'
  - type: text
    content: 'Quiconque touche un mort – un être humain qui est mort – et n''ôte pas son péché rend impure la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; celui-là sera retranché d''Israël. Comme il n''a pas été aspergé d''eau lustrale, il est impur : son impureté est encore sur lui.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'la loi  : cf. Lv 14.2. –  tente  : LXX maison . –  sept jours v. 11.'
  - type: text
    content: 'Voici la loi : Lorsqu''un être humain meurt dans une tente, quiconque entre dans la tente et quiconque se trouve dans la tente sera impur pendant sept jours. '
  '15':
  - type: note
    content: couvercle attaché, sans doute par un cordon, d'après le sens probable du terme hébreu.
  - type: text
    content: 'Tout récipient ouvert, sur lequel il n''y a pas de couvercle attaché, est impur. '
  '16':
  - type: note
    content: 'le cadavre…  : litt. un transpercé d''épée (autre traduction une victime de l''épée) ou un mort. –  une tombe Lc 11.14.'
  - type: text
    content: 'Quiconque touche, dans la campagne, le cadavre d''une personne morte de mort violente ou de mort naturelle, des ossements humains ou une tombe, sera impur pendant sept jours. '
  '17':
  - type: note
    content: 'Cf. 8.7s ; 31.21ss. –  On prendra… et on mettra  : litt. ils prendront… et il mettra, mais Smr et plusieurs versions anciennes lisent le second verbe au pluriel. –  de la cendre  : autre mot qu''au v. 9 ; c''est celui qui est traduit par poussière en 5.17. –  pour le péché v. 9. –  eau vive Lv 14.5s.'
  - type: text
    content: 'On prendra, pour l''impur, de la cendre du sacrifice pour le péché qui a été brûlé, et on mettra dessus, dans un récipient, de l''eau vive. '
  '18':
  - type: note
    content: 'Un homme pur  : cf. v. 9s ; Lv 21.1ss. –  hysope v. 6+ ; Ex 12.22. –  le cadavre…  : litt. un transpercé ou un mort.'
  - type: text
    content: 'Un homme pur prendra de l''hysope et la trempera dans l''eau ; puis il en fera l''aspersion sur la tente, sur tous les objets et les gens qui sont là, sur celui qui a touché des ossements, le cadavre d''un homme mort de mort violente ou de mort naturelle, ou une tombe. '
  '19':
  - type: note
    content: V. 12ns ; cf. Dt 23.12.
  - type: text
    content: 'Le pur fera l''aspersion sur l''impur, le troisième jour et le septième jour, et il ôtera son péché le septième jour. Il lavera ses vêtements et se lavera avec de l''eau ; le soir, il sera pur. '
  '2':
  - type: note
    content: 'Cf. Hé 9.13s. –  ce que prescrit la loi  : autre traduction une prescription de la loi. –  qu''ils t''amènent  : autre traduction qu''on t''amène. –  rousse  : le terme hébreu correspondant est habituellement traduit par rouge  ; cf. Za 1.8 ; 6.2. –  qui n''ait jamais porté…  : cf. Dt 21.3s ; 1S 6.7 ; voir aussi Ex 20.25 ; Mc 11.2 ; Lc 19.30.'
  - type: text
    content: 'Voici ce que prescrit la loi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a instituée : Parle aux Israélites ; qu''ils t''amènent une vache rousse, sans malformation, sans défaut, qui n''ait jamais porté le joug. '
  '20':
  - type: note
    content: 'de l''assemblée  : litt. du milieu de l''assemblée.'
  - type: text
    content: 'L''homme qui est impur et qui n''ôte pas son péché sera retranché de l''assemblée, car il a rendu impur le sanctuaire du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; comme il n''a pas été aspergé d''eau lustrale, il est impur. '
  '21':
  - type: note
    content: 'V. 7s,10. –  pour eux  : versions anciennes pour vous.'
  - type: text
    content: 'C''est une prescription perpétuelle pour eux. Celui qui fait l''aspersion d''eau lustrale lavera ses vêtements ; celui qui touche l''eau lustrale sera impur jusqu''au soir. '
  '22':
  - type: note
    content: Lv 5.2 ; Ag 2.14.
  - type: text
    content: Tout ce que l'impur touche deviendra impur ; celui qui le touche sera impur jusqu'au soir.
  '3':
  - type: note
    content: 'Vous la remettrez  : LXX tu la remettras. –  Eléazar, le prêtre  : cf. 17.2+ss. –  qui la fera sortir  : LXX et ils la feront sortir, ce qui pourrait signifier on la fera sortir (v. 5n). –  du camp Lv 4.12,21 ; 16.27 ; Hé 13.11s ; LXX dans un lieu pur. –  on (cf. v. 9s,18+) l''immolera devant lui  : cf. Lv 4.4.'
  - type: text
    content: 'Vous la remettrez à Eléazar, le prêtre, qui la fera sortir du camp ; on l''immolera devant lui. '
  '4':
  - type: note
    content: fera sept fois l'aspersion Lv 14.7 ; 16.14. –  vers le devant de la tente, situé à l'est (3.38) ; cf. Lv 4.4ss,16s.
  - type: text
    content: 'Avec son doigt, Eléazar, le prêtre, prendra du sang de la vache et il fera sept fois l''aspersion de ce sang vers le devant de la tente de la Rencontre. '
  '5':
  - type: note
    content: 'On brûlera  : litt. il brûlera  ; LXX ils brûleront.'
  - type: text
    content: 'On brûlera la vache sous ses yeux ; on brûlera sa peau, sa chair et son sang, avec ses excréments. '
  '6':
  - type: note
    content: 'bois de cèdre / hysope / écarlate  : cf. v. 18 ; Lv 14.4-7,49ss ; Hé 9.19.'
  - type: text
    content: 'Le prêtre prendra du bois de cèdre, de l''hysope et de l''écarlate, et il les jettera au milieu des flammes qui brûleront la vache. '
  '7':
  - type: note
    content: Cf. v. 10n  ; Lv 11.24s ; 14.8 ; 15.4-8 ; 16.28 ; Dt 23.12.
  - type: text
    content: 'Le prêtre lavera ses vêtements et son corps avec de l''eau, puis il rentrera dans le camp ; le prêtre sera impur jusqu''au soir. '
  '8':
  - type: note
    content: 'lavera…  : litt. lavera ses vêtements avec de l''eau et lavera sa chair avec de l''eau  ; cf. 8.7n.'
  - type: text
    content: 'Celui qui aura brûlé la vache lavera ses vêtements et son corps avec de l''eau, et il sera impur jusqu''au soir. '
  '9':
  - type: note
    content: 'V. 17s ; cf. Hé 9.13s. –  dans un lieu pur Lv 4.11s ; 6.4. –  conservée 17.25n. –  eau lustrale  : litt. eau de souillure, ou peut-être d''aspersion, cf. 8.7n  ; 31.23 ; le terme hébreu employé ici s''applique ailleurs à l''impureté des règles, cf. Lv 12.2ns ; 15.19 ; le même terme est traduit par souillure en Ez 7.19ns ; Za 13.1 ; cf. Règle de la Communauté (Qumrân) 3.8s : « C''est par l''Esprit de droiture et d''humilité que sera expié son péché. Et c''est par l''humilité de son âme à l''égard de tous les préceptes de Dieu que sera purifiée sa chair, quand on l''aspergera avec l''eau lustrale et qu''il se sanctifiera dans l''eau courante. » –  C''est un sacrifice pour le péché  : autre traduction pour ôter le péché  ; cf. Lv 4.1.'
  - type: text
    content: 'Un homme pur recueillera la cendre de la vache et la déposera hors du camp, dans un lieu pur ; elle sera conservée dans la communauté des Israélites pour la préparation de l''eau lustrale. C''est un sacrifice pour le péché. '
