      marker: ft
      children:
      - type: text
        text: 'Cf. Hé 9.13s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce que prescrit la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une prescription de la loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils t'amènent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'on t'amène
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rousse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu correspondant est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rouge
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Za 1.8 ; 6.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui n'ait jamais porté…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 21.3s ; 1S 6.7 ; voir aussi Ex 20.25 ; Mc 11.2 ; Lc 19.30.'
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que prescrit la loi que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a instituée : Parle aux Israélites ; qu''ils t''amènent une vache rousse, sans malformation, sans défaut, qui n''ait jamais porté le joug. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vous la remettrez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu la remettras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eléazar, le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.2+ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui la fera sortir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et ils la feront sortir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui pourrait signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on la fera sortir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du camp '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 4.12,21 ; 16.27 ; Hé 13.11s ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans un lieu pur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 9s,18+) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'immolera devant lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 4.4.'
    marker-yv: yv-n
  - type: text
    text: 'Vous la remettrez à Eléazar, le prêtre, qui la fera sortir du camp ; on l''immolera devant lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fera sept fois l''aspersion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 14.7 ; 16.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vers le devant de la tente
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', situé à l''est (3.38) ; cf. Lv 4.4ss,16s.'
    marker-yv: yv-n
  - type: text
    text: 'Avec son doigt, Eléazar, le prêtre, prendra du sang de la vache et il fera sept fois l''aspersion de ce sang vers le devant de la tente de la Rencontre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On brûlera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il brûlera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils brûleront.
    marker-yv: yv-n
  - type: text
    text: 'On brûlera la vache sous ses yeux ; on brûlera sa peau, sa chair et son sang, avec ses excréments. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bois de cèdre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hysope '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: écarlate
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 18 ; Lv 14.4-7,49ss ; Hé 9.19.'
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre prendra du bois de cèdre, de l''hysope et de l''écarlate, et il les jettera au milieu des flammes qui brûleront la vache. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lv 11.24s ; 14.8 ; 15.4-8 ; 16.28 ; Dt 23.12.'
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre lavera ses vêtements et son corps avec de l''eau, puis il rentrera dans le camp ; le prêtre sera impur jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lavera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lavera ses vêtements avec de l''eau et lavera sa '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
      - type: text
        text: ' avec de l''eau'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 8.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui aura brûlé la vache lavera ses vêtements et son corps avec de l''eau, et il sera impur jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 17s ; cf. Hé 9.13s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans un lieu '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 4.11s ; 6.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'conservée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: eau lustrale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eau de souillure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou peut-être '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'aspersion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 8.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 31.23 ; le terme hébreu employé ici s''applique ailleurs à l''impureté des règles, cf. Lv 12.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's ; 15.19 ; le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'souillure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Ez 7.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's ; Za 13.1 ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Règle de la Communauté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ') 3.8s : « C''est par l''Esprit de droiture et d''humilité que sera expié son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '. Et c''est par l''humilité de son âme à l''égard de tous les préceptes de Dieu que sera purifiée sa chair, quand on l''aspergera avec l''eau lustrale et qu''il se sanctifiera dans l''eau courante. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ' pour le péché'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour ôter le péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lv 4.1.'
    marker-yv: yv-n
  - type: text
    text: 'Un homme pur recueillera la cendre de la vache et la déposera hors du camp, dans un lieu pur ; elle sera conservée dans la communauté des Israélites pour la préparation de l''eau lustrale. C''est un sacrifice pour le péché. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme pourrait s''entendre ici de la mise hors des activités courantes résultant d''un contact, non avec une chose à proprement parler impure, mais avec une chose sacrée ; cf. v. 7 ; Lv 6.11,18ss ; 11.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et pour les immigrés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.14 ; 15.29 ; cf. Ex 12.48
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Celui qui aura recueilli la cendre de la vache lavera ses vêtements, et il sera impur jusqu'au soir. C'est une prescription perpétuelle pour les Israélites et pour les immigrés qui séjournent au milieu d'eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Loi sur la purification
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 16 ; 5.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss ; 6.6ss ; 9.6ss ; 31.19ss ; Lv 21.1ss,11 ; 22.4 ; Ez 44.25.
    marker-yv: yv-n
  - type: text
    text: 'Celui qui touche un mort – un corps humain, quel qu''il soit – sera impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 18s ; 6.9ss ; Lv 5.2ss ; 14.10ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il ôtera son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 13,20 ; 8.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec cette eau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avec elle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec lui, avec cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme correspondant porte un accent distinctif assez rare dans le texte hébreu traditionnel, et il est omis par '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '  ; cf. 31.23.'
    marker-yv: yv-n
  - type: text
    text: 'Il ôtera son péché avec cette eau le troisième jour et le septième jour, et il sera pur ; s''il n''ôte pas son péché le troisième jour et le septième jour, il ne sera pas pur. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rend impure la demeure…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20 ; Lv 15.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sera retranché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20 ; 15.31 ; Ex 31.14 ; Lv 7.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quiconque touche un mort – un être humain qui est mort – et n''ôte pas son péché rend impure la demeure du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; celui-là sera retranché d''Israël. Comme il n''a pas été aspergé d''eau lustrale, il est impur : son impureté est encore sur lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lv 14.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tente
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sept jours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 11.
    marker-yv: yv-n
  - type: text
    text: 'Voici la loi : Lorsqu''un être humain meurt dans une tente, quiconque entre dans la tente et quiconque se trouve dans la tente sera impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: couvercle attaché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sans doute par un cordon, d''après le sens probable du terme hébreu.'
    marker-yv: yv-n
  - type: text
    text: 'Tout récipient ouvert, sur lequel il n''y a pas de couvercle attaché, est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le cadavre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un transpercé d''épée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une victime de l'épée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ou un mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une tombe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 11.14.
    marker-yv: yv-n
  - type: text
    text: 'Quiconque touche, dans la campagne, le cadavre d''une personne morte de mort violente ou de mort naturelle, des ossements humains ou une tombe, sera impur pendant sept jours. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 8.7s ; 31.21ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On prendra… et on mettra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils prendront… et il mettra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Smr
      - type: text
        text: ' et plusieurs versions anciennes lisent le second verbe au pluriel. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la cendre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre mot qu''au v. 9 ; c''est celui qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'poussière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 5.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour le péché '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'eau vive '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 14.5s.
    marker-yv: yv-n
  - type: text
    text: 'On prendra, pour l''impur, de la cendre du sacrifice pour le péché qui a été brûlé, et on mettra dessus, dans un récipient, de l''eau vive. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Un homme '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 9s ; Lv 21.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hysope '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 6+ ; Ex 12.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le cadavre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un transpercé ou un mort.
    marker-yv: yv-n
  - type: text
    text: 'Un homme pur prendra de l''hysope et la trempera dans l''eau ; puis il en fera l''aspersion sur la tente, sur tous les objets et les gens qui sont là, sur celui qui a touché des ossements, le cadavre d''un homme mort de mort violente ou de mort naturelle, ou une tombe. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; cf. Dt 23.12.
    marker-yv: yv-n
  - type: text
    text: 'Le pur fera l''aspersion sur l''impur, le troisième jour et le septième jour, et il ôtera son péché le septième jour. Il lavera ses vêtements et se lavera avec de l''eau ; le soir, il sera pur. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du milieu de l'assemblée.
    marker-yv: yv-n
  - type: text
    text: 'L''homme qui est impur et qui n''ôte pas son péché sera retranché de l''assemblée, car il a rendu impur le sanctuaire du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; comme il n''a pas été aspergé d''eau lustrale, il est impur. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 7s,10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : versions anciennes '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour vous.
    marker-yv: yv-n
  - type: text
    text: 'C''est une prescription perpétuelle pour eux. Celui qui fait l''aspersion d''eau lustrale lavera ses vêtements ; celui qui touche l''eau lustrale sera impur jusqu''au soir. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lv 5.2 ; Ag 2.14.
    marker-yv: yv-n
  - type: text
    text: Tout ce que l'impur touche deviendra impur ; celui qui le touche sera impur jusqu'au soir.
