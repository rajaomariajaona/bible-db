    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il sortira devant nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', expression qui évoque souvent les campagnes militaires.'
    marker-yv: yv-n
  - type: text
    text: 'et nous aussi nous serons comme toutes les nations ; notre roi sera notre juge, il conduira nos armées et mènera nos guerres. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Un homme comme intermédiaire entre le peuple et Dieu : cf. Ex 18.19s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en présence du '
      - type: usfm
        marker: nd
        children:
