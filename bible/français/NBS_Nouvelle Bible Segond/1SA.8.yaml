    marker-yv: yv-n
  - type: text
    text: 'Samuel entendit toutes les paroles du peuple et les dit en présence du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
