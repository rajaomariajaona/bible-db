      children:
      - type: text
        text: ' : cf. 12.12.'
    marker-yv: yv-n
  - type: text
    text: 'Le peuple refusa d''écouter Samuel. Tant pis ! dirent-ils ; il y aura un roi sur nous, '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme toutes les nations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
