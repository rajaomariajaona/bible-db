    marker-yv: yv-n
  - type: text
    text: 'Le nom de son fils premier-né était Joël ; le nom du second, Abiya ; ils étaient juges à Bersabée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne suivirent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n'allèrent pas sur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils ne se comportèrent pas comme il l''avait fait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Jr 22.15-17) ; de même dans la suite du récit (v. 5). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils avaient un penchant pour le profit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils penchaient derrière le gain illicite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même verbe hébreu, à une autre forme, est utilisé à la fin du v., où il est rendu par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: portaient atteinte au droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faisaient pencher le droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pots-de-vin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 23.8+.
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Samuel ne suivirent pas sa voie ; ils avaient un penchant pour le profit, acceptaient des pots-de-vin et portaient atteinte au droit. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rama
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : lieu de résidence habituel de Samuel, cf. 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.17.'
    marker-yv: yv-n
  - type: text
    text: 'Tous les anciens d''Israël se rassemblèrent et vinrent trouver Samuel à Rama. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ac 13.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 17.14ss ; cf. Os 13.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui soit notre juge
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour nous juger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour nous gouverner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même aux v. 6,20 ; cf. 7.6+ ; Jg 2.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rt 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme en ont toutes les nations
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ez 20.32 ; Est 3.8.'
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Toi, tu es vieux, et tes fils ne suivent pas tes voies ; maintenant, donne-nous un roi qui soit notre juge, comme en ont toutes les nations. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Samuel fut mécontent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la chose était mauvaise aux yeux de Samuel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 12.17.'
    marker-yv: yv-n
  - type: text
    text: 'Samuel fut mécontent de les entendre dire : « Donne-nous un roi pour qu''il soit notre juge » ; Samuel pria le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rejettent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe hébreu est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mépriser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 10.19 ; Lv 26.44 ; Nb 11.20 ; 14.31) ; voir Ex 16.8 ; Lc 10.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils ne veulent plus que je sois roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que je règne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.12 ; Ps 5.3 ; 10.16 ; 93.1.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Samuel : Ecoute le peuple en tout ce qu''il te dira ; ce n''est pas toi qu''ils rejettent, c''est moi qu''ils rejettent ; ils ne veulent plus que je sois roi sur eux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme ils ont toujours agi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoute '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à mon égard
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'monter d''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils m'ont abandonné
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 31.16 ; Jos 24.16 ; Jg 10.13 ; Ps 78.8,17,40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour servir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour rendre un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: culte
      - type: text
        text: ' à'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'autres dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 3.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils agissent à ton égard comme ils ont toujours agi depuis que je les ai fait monter d''Egypte jusqu''à ce jour : ils m''ont abandonné pour servir d''autres dieux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avertis-les '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sois témoin contre eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 19.21,23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les droits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu ainsi traduit (cf. v. 11) a été rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comment agissaient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 2.13 ; cf. Mt 20.25-28.
    marker-yv: yv-n
  - type: text
    text: Maintenant donc, écoute-les ; mais avertis-les et fais-leur connaître les droits du roi qui régnera sur eux.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les droits du roi
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: demandait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',20'
      - type: usfm
        marker: ord
        children:
        - type: text
