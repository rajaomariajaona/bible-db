  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Samuel : Ecoute-les : tu leur donneras un roi. Et Samuel dit aux hommes d''Israël : Allez-vous-en, chacun dans sa ville.'
