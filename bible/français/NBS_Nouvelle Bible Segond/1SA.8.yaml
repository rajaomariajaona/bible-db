document_id: 1SA.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le peuple d'Israël réclame un roi
  - type: text
    content: ' '
  - type: note
    content: 'devint vieux  : cf. 2.22 ; Gn 24.1 ; Jos 23.1 ; 1R 1.1. –  juges  : cf. Dt 16.18 ; 2Ch 19.5.'
  - type: text
    content: 'Lorsque Samuel devint vieux, il nomma ses fils juges d''Israël. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'demandait  : cf. 1.17n,20n,28n.'
  - type: text
    content: 'Samuel dit toutes les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ' au peuple qui lui demandait un roi. '
  '11':
  - type: note
    content: 'prendra vos fils  : cf. 14.52 ; 1R 9.22. –  et à ses attelages  : autre traduction et à ses équipages de chars. –  ils iront… comme gardes du corps  : litt. ils courront (devant son char)  ; cf. 22.17n  ; 2S 15.1 ; 1R 1.5.'
  - type: text
    content: 'Il dit : Voici les droits du roi qui régnera sur vous : il prendra vos fils et il les affectera à ses chars et à ses attelages, ils iront devant son char comme gardes du corps ; '
  '12':
  - type: note
    content: Les chefs de mille et les chefs de cinquante sont des chefs militaires, cf. 2R 1.9-14 ; 1Ch 27.1 ; voir aussi Nb 1.16n. –  LXX remplace les chefs de cinquante par des chefs de cent, et labourer ses terres par vendanger ses vignes.
  - type: text
    content: 'il les nommera chefs de mille ou chefs de cinquante, il leur fera labourer ses terres, récolter sa moisson, fabriquer ses armes et l''équipement de ses chars. '
  '13':
  - type: text
    content: 'Il prendra vos filles comme parfumeuses, cuisinières et boulangères. '
  '14':
  - type: note
    content: Cf. 22.7 ; 1R 21.7 ; Ez 46.16-18. –  gens de sa cour, serviteurs (v. 16) et esclaves (v. 17) traduisent le même mot hébreu. Ici et au v. 15, les gens de la cour désignent des fonctionnaires, civils ou militaires, de rang élevé, ce que suggère le contexte.
  - type: text
    content: 'Il prendra le meilleur de vos champs, de vos vignes et de vos oliviers et il le donnera aux gens de sa cour. '
  '15':
  - type: note
    content: 'Une dîme prélevée en faveur du roi n''est pas mentionnée dans l''A.T. en dehors des v. 15,17 ; voir cependant Am 7.1. –  hauts fonctionnaires Gn 37.36n. –  aux gens de sa cour  : litt. à ses serviteurs.'
  - type: text
    content: 'Il prendra la dîme de vos semailles et de vos vendanges, et il la donnera à ses hauts fonctionnaires et aux gens de sa cour. '
  '16':
  - type: note
    content: A côté des employés stables mentionnés dans les v. 12s, le roi recourra à de la main-d'œuvre occasionnelle pour effectuer certains travaux, p. ex. de construction. –  vos jeunes gens (cf. 9.2n) à qui serait confiée, probablement, la surveillance des équipes de corvées ; LXX, au lieu de vos jeunes gens, a lu votre gros bétail, qui semblait constituer un meilleur parallèle à vos ânes.
  - type: text
    content: 'Il prendra les meilleurs de vos serviteurs, de vos servantes et de vos jeunes gens, et vos ânes, et il s''en servira pour ses travaux. '
  '17':
  - type: note
    content: 'Ainsi vous deviendrez ses esclaves (ou ses serviteurs, v. 14n) : autre traduction et vous-mêmes, vous deviendrez ses esclaves  ; cependant, cette dernière proposition n''est sans doute pas un élément parmi d''autres de l''énumération des droits du roi, mais une sorte de récapitulation des avertissements contenus dans les v. 11-17. Cf. 1R 12.4.'
  - type: text
    content: 'Il prendra la dîme de votre petit bétail. Ainsi vous deviendrez ses esclaves. '
  '18':
  - type: note
    content: 'vous crierez contre le roi  : cf. Mi 3.1-4. –  ne vous répondra pas  : cf. Pr 1.28'
  - type: text
    content: 'Ce jour-là vous crierez contre le roi que vous vous serez choisi, mais ce jour-là le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne vous répondra pas !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'refusa d''écouter  : cf. Jr 44.16 ; Ps 81.12. –  Tant pis…  : litt. non…  ; certains mss hébreux portent ils lui dirent . –  un roi sur nous  : cf. 12.12.'
  - type: text
    content: 'Le peuple refusa d''écouter Samuel. Tant pis ! dirent-ils ; il y aura un roi sur nous, '
  '2':
  - type: note
    content: 'Joël / Abiya  : cf. 1Ch 6.13n. –  Bersabée  : cf. 3.20n.'
  - type: text
    content: 'Le nom de son fils premier-né était Joël ; le nom du second, Abiya ; ils étaient juges à Bersabée. '
  '20':
  - type: note
    content: 'comme toutes les nations  : cf. v. 5n. –  sera notre juge  : cf. v. 5s ; 7.6n,15ss. –  il conduira nos armées  : litt. il sortira devant nous, expression qui évoque souvent les campagnes militaires.'
  - type: text
    content: 'et nous aussi nous serons comme toutes les nations ; notre roi sera notre juge, il conduira nos armées et mènera nos guerres. '
  '21':
  - type: note
    content: 'Un homme comme intermédiaire entre le peuple et Dieu : cf. Ex 18.19s. –  en présence du Seigneur  : litt. aux oreilles de YHWH.'
  - type: text
    content: 'Samuel entendit toutes les paroles du peuple et les dit en présence du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '22':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Samuel : Ecoute-les : tu leur donneras un roi. Et Samuel dit aux hommes d''Israël : Allez-vous-en, chacun dans sa ville.'
  '3':
  - type: note
    content: 'ne suivirent pas  : litt. n''allèrent pas sur  ; c.-à-d. ils ne se comportèrent pas comme il l''avait fait (cf. Jr 22.15-17) ; de même dans la suite du récit (v. 5). –  ils avaient un penchant pour le profit  : litt. ils penchaient derrière le gain illicite  ; le même verbe hébreu, à une autre forme, est utilisé à la fin du v., où il est rendu par portaient atteinte au droit, litt. faisaient pencher le droit. –  pots-de-vin Ex 23.8+.'
  - type: text
    content: 'Les fils de Samuel ne suivirent pas sa voie ; ils avaient un penchant pour le profit, acceptaient des pots-de-vin et portaient atteinte au droit. '
  '4':
  - type: note
    content: 'Rama  : lieu de résidence habituel de Samuel, cf. 1.1n  ; 7.17.'
  - type: text
    content: 'Tous les anciens d''Israël se rassemblèrent et vinrent trouver Samuel à Rama. '
  '5':
  - type: note
    content: 'Cf. Ac 13.21. –  un roi Dt 17.14ss ; cf. Os 13.10. –  qui soit notre juge  : litt. pour nous juger  ; autre traduction pour nous gouverner  ; de même aux v. 6,20 ; cf. 7.6+ ; Jg 2.16n  ; Rt 1.1n. –  comme en ont toutes les nations  : cf. Ez 20.32 ; Est 3.8.'
  - type: text
    content: 'Ils lui dirent : Toi, tu es vieux, et tes fils ne suivent pas tes voies ; maintenant, donne-nous un roi qui soit notre juge, comme en ont toutes les nations. '
  '6':
  - type: note
    content: 'Samuel fut mécontent  : litt. la chose était mauvaise aux yeux de Samuel. –  pria  : cf. 7.5n  ; 12.17.'
  - type: text
    content: 'Samuel fut mécontent de les entendre dire : « Donne-nous un roi pour qu''il soit notre juge » ; Samuel pria le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'rejettent  : le même verbe hébreu est aussi traduit par mépriser (cf. 10.19 ; Lv 26.44 ; Nb 11.20 ; 14.31) ; voir Ex 16.8 ; Lc 10.16. –  ils ne veulent plus que je sois roi (ou que je règne) sur eux  : cf. 12.12 ; Ps 5.3 ; 10.16 ; 93.1.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Samuel : Ecoute le peuple en tout ce qu''il te dira ; ce n''est pas toi qu''ils rejettent, c''est moi qu''ils rejettent ; ils ne veulent plus que je sois roi sur eux. '
  '8':
  - type: note
    content: 'comme ils ont toujours agi  : LXX ajoute à mon égard. –  monter d''Egypte Gn 12.10n. –  ils m''ont abandonné  : cf. Dt 31.16 ; Jos 24.16 ; Jg 10.13 ; Ps 78.8,17,40. –  pour servir (ou pour rendre un culte à) d''autres dieux  : cf. Jg 3.6n.'
  - type: text
    content: 'Ils agissent à ton égard comme ils ont toujours agi depuis que je les ai fait monter d''Egypte jusqu''à ce jour : ils m''ont abandonné pour servir d''autres dieux. '
  '9':
  - type: note
    content: 'avertis-les ou sois témoin contre eux  ; cf. Ex 19.21,23. –  les droits  : le mot hébreu ainsi traduit (cf. v. 11) a été rendu par comment agissaient en 2.13 ; cf. Mt 20.25-28.'
  - type: text
    content: Maintenant donc, écoute-les ; mais avertis-les et fais-leur connaître les droits du roi qui régnera sur eux.
  - type: heading
    content: Les droits du roi
