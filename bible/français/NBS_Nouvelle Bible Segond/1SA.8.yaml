      - type: text
        text: ',28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Samuel dit toutes les paroles du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' au peuple qui lui demandait un roi. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prendra vos '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.52 ; 1R 9.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et à ses attelages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et à ses équipages de chars
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils iront… comme gardes du corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils courront (devant son char)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 22.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 15.1 ; 1R 1.5.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Voici les droits du roi qui régnera sur vous : il prendra vos fils et il les affectera à ses chars et à ses attelages, ils iront devant son char comme gardes du corps ; '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chefs de mille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chefs de cinquante '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont des chefs militaires, cf. 2R 1.9-14 ; 1Ch 27.1 ; voir aussi Nb 1.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' remplace les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chefs de cinquante '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'par des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chefs de cent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'labourer ses terres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vendanger ses vignes.
    marker-yv: yv-n
  - type: text
    text: 'il les nommera chefs de mille ou chefs de cinquante, il leur fera labourer ses terres, récolter sa moisson, fabriquer ses armes et l''équipement de ses chars. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il prendra vos filles comme parfumeuses, cuisinières et boulangères. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 22.7 ; 1R 21.7 ; Ez 46.16-18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gens de sa cour, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'serviteurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 16) et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'esclaves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 17) traduisent le même mot hébreu. Ici et au v. 15, les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'gens de la cour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désignent des fonctionnaires, civils ou militaires, de rang élevé, ce que suggère le contexte.
    marker-yv: yv-n
  - type: text
    text: 'Il prendra le meilleur de vos champs, de vos vignes et de vos oliviers et il le donnera aux gens de sa cour. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Une '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dîme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'prélevée en faveur du roi n''est pas mentionnée dans l''A.T. en dehors des v. 15,17 ; voir cependant Am 7.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hauts fonctionnaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 37.36
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux gens de sa cour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à ses serviteurs.
    marker-yv: yv-n
  - type: text
    text: 'Il prendra la dîme de vos semailles et de vos vendanges, et il la donnera à ses hauts fonctionnaires et aux gens de sa cour. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A côté des employés stables mentionnés dans les v. 12s, le roi recourra à de la main-d''œuvre occasionnelle pour effectuer certains travaux, p. ex. de construction. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vos jeunes gens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 9.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') à qui serait confiée, probablement, la surveillance des équipes de corvées ; LXX, au lieu de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos jeunes gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: votre gros bétail
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui semblait constituer un meilleur parallèle à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos ânes.
    marker-yv: yv-n
  - type: text
    text: 'Il prendra les meilleurs de vos serviteurs, de vos servantes et de vos jeunes gens, et vos ânes, et il s''en servira pour ses travaux. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ainsi vous deviendrez ses esclaves '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ses serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', v. 14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et vous-mêmes, vous deviendrez ses esclaves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cependant, cette dernière proposition n''est sans doute pas un élément parmi d''autres de l''énumération des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: droits du roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais une sorte de récapitulation des avertissements contenus dans les v. 11-17. Cf. 1R 12.4.'
    marker-yv: yv-n
  - type: text
    text: 'Il prendra la dîme de votre petit bétail. Ainsi vous deviendrez ses esclaves. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous crierez contre le roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mi 3.1-4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne vous répondra pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Pr 1.28'
    marker-yv: yv-n
  - type: text
    text: 'Ce jour-là vous crierez contre le roi que vous vous serez choisi, mais ce jour-là le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne vous répondra pas !'
