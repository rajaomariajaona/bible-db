    marker-yv: yv-n
  - type: text
    text: 'Une Cananéenne venue de ce territoire se mit à crier : Aie compassion de moi, Seigneur, Fils de David ! Ma fille est cruellement tourmentée par un démon. '
  - type: usfm
    marker: v
