    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Evangile selon Thomas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '34 : « Jésus a dit : “Si un aveugle conduit un aveugle, ils tombent tous les deux dans une fosse.” »'
    marker-yv: yv-n
  - type: text
    text: 'Laissez-les : ce sont des aveugles qui guident des aveugles. Si un aveugle guide un aveugle, ils tomberont tous deux dans une fosse.'
