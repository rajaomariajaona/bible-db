      marker: fr
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: n'a plus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n'a en aucun cas.
    marker-yv: yv-n
  - type: text
