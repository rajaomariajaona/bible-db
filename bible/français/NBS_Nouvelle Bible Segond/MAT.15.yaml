      children:
      - type: text
        text: guérie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe 8.8,13 (voir 8.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
