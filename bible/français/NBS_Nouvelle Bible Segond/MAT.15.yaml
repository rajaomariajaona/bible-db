        - type: text
          text: saint
      - type: text
        text: ') : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un présent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais le mot grec correspond à un terme technique désignant une offrande qui, une fois consacrée à Dieu, ne pouvait plus servir à un usage profane ; cf. Pr 28.24 ; voir Mc 7.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais vous, vous dites : Celui qui dira à son père ou à sa mère : « Ce que j''aurais pu te donner pour t''assister est un présent sacré », '
  - type: usfm
    marker: v
