      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ep 6.2s.'
    marker-yv: yv-n
  - type: text
    text: 'Car Dieu a dit : '
  - type: usfm
    marker: it
