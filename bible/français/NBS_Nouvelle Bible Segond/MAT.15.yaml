  - type: text
    text: 'Jésus appela ses disciples et dit : Je suis ému par cette foule : voilà déjà trois jours qu''ils restent auprès de moi et qu''ils n''ont rien à manger. Je ne veux pas les renvoyer à jeun, de peur qu''ils ne défaillent en chemin. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 11.13.
    marker-yv: yv-n
  - type: text
