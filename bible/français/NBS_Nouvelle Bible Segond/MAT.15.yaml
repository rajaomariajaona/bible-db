document_id: MAT.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et la tradition
  - type: heading
    content: Mc 7.1-13
  - type: text
    content: ' '
  - type: note
    content: Cf. Jn 1.19. –  pharisiens / scribes 12.38+ ; 23.2,13ss,25ss.
  - type: text
    content: 'Alors des pharisiens et des scribes viennent de Jérusalem auprès de Jésus et disent : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '13.23. –  Ecoutez  : autre traduction entendez.'
  - type: text
    content: 'Il appela la foule et dit : Ecoutez et comprenez. '
  '11':
  - type: note
    content: 'souille  : autre traduction profane  ; le verbe grec est apparenté aux mots traduits par commun et communion (ou solidarité) ; il peut s''appliquer à une impureté rituelle (Ac 10.15 ; voir pur, impur) autant qu''à une profanation (Ac 21.28). Cf. Mt 12.34 ; 15.17s ; Ac 10.15 ; 11.8 ; Rm 14.14,20 ; Ep 4.29 ; Jc 3.6.'
  - type: text
    content: Ce n'est pas ce qui entre dans la bouche qui souille l'être humain ; c'est ce qui sort de la bouche qui souille l'être humain.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'cette parole…  : litt. les pharisiens ont été « scandalisés » en entendant cette parole , voir 11.6n  ; cf. Pr 12.1 ; 1Co 1.23 ; Ga 5.11.'
  - type: text
    content: 'Alors ses disciples vinrent lui dire : Sais-tu que cette parole a été une cause de chute pour les pharisiens ? '
  '13':
  - type: note
    content: 'Jn 15.1-6 ; Ac 5.38s. Evangile selon Thomas 40 : « Jésus a dit : “Un cep de vigne a été planté en dehors du Père et, n''étant pas solide, il sera arraché jusqu''à sa racine et détruit.” » Epître d''Ignace d''Antioche aux Tralliens 11.1 : « Fuyez donc ces mauvaises plantes parasites : elles portent un fruit qui donne la mort, et si quelqu''un en goûte, il meurt sur-le-champ. Ceux-là ne sont pas la plantation du Père. » Aux Philadelphiens 3.1 : « Abstenez-vous des plantes mauvaises que Jésus-Christ ne cultive pas, parce qu''elles ne sont pas une plantation du Père. »'
  - type: text
    content: 'Il répondit : Toute plante qui n''a pas été plantée par mon Père céleste sera déracinée. '
  '14':
  - type: note
    content: '23.16,24 (cf. 7.5) ; Lc 6.39 ; Rm 2.19. Evangile selon Thomas 34 : « Jésus a dit : “Si un aveugle conduit un aveugle, ils tombent tous les deux dans une fosse.” »'
  - type: text
    content: 'Laissez-les : ce sont des aveugles qui guident des aveugles. Si un aveugle guide un aveugle, ils tomberont tous deux dans une fosse.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 13.36.
  - type: text
    content: 'Pierre lui dit : Explique-nous cette parabole. '
  '16':
  - type: note
    content: 'sans intelligence  : le mot ainsi traduit vient du verbe traduit par comprendre au v. 10 ; cf. 16.9.'
  - type: text
    content: 'Il répondit : Etes-vous encore sans intelligence, vous aussi ? '
  '17':
  - type: note
    content: 'V. 11 ; 1Co 6.13. –  va  : le même verbe est traduit par comprendre en 19.11ns.'
  - type: text
    content: 'Ne comprenez-vous pas que tout ce qui entre dans la bouche va dans le ventre, avant d''être évacué aux latrines ? '
  '18':
  - type: note
    content: provient du cœur v. 11n  ; Pr 4.23 ; Rm 1.29.
  - type: text
    content: 'En revanche, ce qui sort de la bouche provient du cœur, et c''est cela qui souille l''être humain. '
  '19':
  - type: note
    content: '5.21-37 ; 12.34 ; Gn 6.5 ; Jr 17.9 ; Pr 6.14 ; 1Jn 3.15. –  calomnies  : le mot signifie également blasphèmes, cf. 12.31 ; 27.39n.'
  - type: text
    content: 'Car c''est du cœur que viennent raisonnements mauvais, meurtres, adultères, inconduites sexuelles, vols, faux témoignages, calomnies. '
  '2':
  - type: note
    content: 'transgressent-ils (voir péché) : cf. Ac 1.15n  ; Rm 4.15 ; 5.14. –  tradition  : cf. 11.27n  ; Mc 7.3n  ; voir aussi Ga 1.14 ; Col 2.8. –  ne se lavent pas les mains Lc 11.38. –  quand ils mangent  : litt. quand ils mangent du pain  ; cf. Gn 3.19n  ; 37.25n.'
  - type: text
    content: 'Pourquoi tes disciples transgressent-ils la tradition des anciens ? Car ils ne se lavent pas les mains quand ils mangent. '
  '20':
  - type: note
    content: V. 2.
  - type: text
    content: Voilà ce qui souille l'être humain ; mais manger sans s'être lavé les mains ne souille pas l'être humain.
  - type: heading
    content: La foi d'une Cananéenne
  - type: heading
    content: Mc 7.24-30
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'vers la région  : autre traduction dans la région (comme en Mc 7.24, cf. 7.31) ; cette région correspond à l''ancienne Phénicie, située au nord-ouest du pays des Juifs, sur la côte méditerranéenne (cf. Mc 3.8).'
  - type: text
    content: 'Jésus partit de là et se retira vers la région de Tyr et de Sidon. '
  '22':
  - type: note
    content: 'Une Cananéenne  : litt. une femme cananéenne  ; le terme Cananéens désigne souvent dans l''A.T. ceux qui occupaient le pays avant les Israélites et qui étaient restés « païens » (voir non-Juifs) ; cf. Mc 7.26n. –  venue de ce territoire…  : autre traduction une Cananéenne de ce territoire sortit et se mit à crier. –  Aie compassion… Fils de David 9.27+. –  tourmentée par un démon, litt. démonisée.'
  - type: text
    content: 'Une Cananéenne venue de ce territoire se mit à crier : Aie compassion de moi, Seigneur, Fils de David ! Ma fille est cruellement tourmentée par un démon. '
  '23':
  - type: note
    content: 'Lm 3.8. –  Renvoie-la  : on pourrait aussi traduire délivre-la (le verbe correspondant n''a aucun rapport avec celui qui est rendu par envoyer au v. 24) ; cf. 14.15 ; Ac 16.17s.'
  - type: text
    content: 'Il ne lui répondit pas un mot ; ses disciples vinrent lui demander : Renvoie-la, car elle crie derrière nous. '
  '24':
  - type: note
    content: envoyé 9.38n. –  moutons… d'Israël 10.6n.
  - type: text
    content: 'Il répondit : Je n''ai été envoyé qu''aux moutons perdus de la maison d''Israël. '
  '25':
  - type: note
    content: Cf. Lc 18.1ss. –  se prosterner 2.2n  ; voir culte.
  - type: text
    content: 'Mais elle vint se prosterner devant lui en disant : Seigneur, viens à mon secours ! '
  '26':
  - type: note
    content: 'aux chiens  : autre traduction aux petits chiens  ; cf. 7.6+ ; voir Mc 7.27n.'
  - type: text
    content: 'Il répondit : Ce n''est pas bien de prendre le pain des enfants pour le jeter aux chiens. '
  '27':
  - type: note
    content: 'Lc 16.21 ; cf. 7.6s. –  d''ailleurs  : autre traduction pourtant même les chiens… –  maîtres ou seigneurs.'
  - type: text
    content: '– C''est vrai, Seigneur, dit-elle ; d''ailleurs les chiens mangent les miettes qui tombent de la table de leurs maîtres… '
  '28':
  - type: note
    content: '8.10,13n. –  guérie  : même verbe 8.8,13 (voir 8.7n).'
  - type: text
    content: 'Alors Jésus lui dit : O femme, grande est ta foi ; qu''il t''advienne ce que tu veux. Et dès ce moment même sa fille fut guérie.'
  - type: heading
    content: Guérisons au bord du lac de Galilée
  - type: heading
    content: Mc 7.31-37
  '29':
  - type: text
    content: ' '
  - type: note
    content: mer 4.13n. –  montagne 5.1n.
  - type: text
    content: 'Jésus partit de là et longea les rives de la mer de Galilée. Il monta sur la montagne et il s''assit. '
  '3':
  - type: text
    content: 'Il leur répondit : Et vous, pourquoi transgressez-vous le commandement de Dieu au profit de votre tradition ? '
  '30':
  - type: note
    content: '19.2. –  déposa  : litt. jeta, comme en 27.5.'
  - type: text
    content: 'Alors de grandes foules vinrent à lui, avec des infirmes, des aveugles, des sourds-muets, des estropiés et beaucoup d''autres malades. On les déposa à ses pieds, et il les guérit ; '
  '31':
  - type: note
    content: 9.33 ; 11.5 ; Lc 7.16. –  glorifiait 9.8 ; cf. 5.16+.
  - type: text
    content: et la foule s'étonnait de voir les sourds-muets parler, les estropiés redevenir valides, les infirmes marcher, les aveugles voir ; et elle glorifiait le Dieu d'Israël.
  - type: heading
    content: Jésus nourrit quatre mille hommes
  - type: heading
    content: Mc 8.1-10  ; cf. Mt 14.13-21/ /
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'ému 9.36n  ; 14.14. –  rien à manger  : litt. pas de quoi manger.'
  - type: text
    content: 'Jésus appela ses disciples et dit : Je suis ému par cette foule : voilà déjà trois jours qu''ils restent auprès de moi et qu''ils n''ont rien à manger. Je ne veux pas les renvoyer à jeun, de peur qu''ils ne défaillent en chemin. '
  '33':
  - type: note
    content: Nb 11.13.
  - type: text
    content: 'Les disciples lui dirent : Où trouverions-nous, dans ce lieu désert, assez de pains pour rassasier une si grande foule ? '
  '34':
  - type: text
    content: 'Jésus leur dit : Combien de pains avez-vous ? Sept, répondirent-ils, et quelques petits poissons. '
  '35':
  - type: text
    content: 'Alors il enjoignit à la foule de s''installer par terre '
  '36':
  - type: note
    content: '14.19n. –  rendu grâce 26.27n. –  aux disciples  : certains mss portent à ses disciples. –  et les disciples…  : litt. et les disciples aux foules.'
  - type: text
    content: 'et prit les sept pains et les poissons ; après avoir rendu grâce, il les rompit et se mit à les donner aux disciples, et les disciples en donnèrent aux foules. '
  '37':
  - type: note
    content: 14.20n  ; Rm 14.6 ; 1Co 10.30.
  - type: text
    content: 'Tous mangèrent et furent rassasiés, et on emporta sept corbeilles pleines des morceaux qui restaient. '
  '38':
  - type: note
    content: 14.21n  ; 16.10.
  - type: text
    content: Ceux qui avaient mangé étaient quatre mille hommes, sans compter les femmes et les enfants.
  '39':
  - type: text
    content: ' '
  - type: note
    content: '14.23. –  Magadan  : localité non identifiée ; certains mss lisent Magdala , nom d''une localité située à l''ouest du lac de Tibériade.'
  - type: text
    content: Ensuite, il renvoya les foules, monta dans le bateau et se rendit dans le territoire de Magadan.
  '4':
  - type: note
    content: Ex 20.12 ; 21.17 ; Lv 20.9 ; Dt 5.16  ; 27.16 ; Mc 7.10n  ; Ep 6.2s.
  - type: text
    content: 'Car Dieu a dit : '
  - type: text
    content: Honore ton père et ta mère,
  - type: text
    content: ' et : '
  - type: text
    content: Celui qui parle en mal de son père ou de sa mère sera mis à mort
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'un présent sacré (voir saint) : litt. un présent, mais le mot grec correspond à un terme technique désignant une offrande qui, une fois consacrée à Dieu, ne pouvait plus servir à un usage profane ; cf. Pr 28.24 ; voir Mc 7.11n.'
  - type: text
    content: 'Mais vous, vous dites : Celui qui dira à son père ou à sa mère : « Ce que j''aurais pu te donner pour t''assister est un présent sacré », '
  '6':
  - type: note
    content: 'n''a plus  : autre traduction n''a en aucun cas.'
  - type: text
    content: 'celui-là n''a plus à honorer son père ou sa mère. Ainsi vous avez annulé la parole de Dieu à cause de votre tradition. '
  '7':
  - type: note
    content: 'Hypocrites 6.2n  ; 22.18 ; 23.13ss ; Lc 12.1. –  Esaïe a bien parlé en prophète  : autre traduction c''est avec raison qu''Esaïe a parlé en prophète  ; cf. Es 29.13  ; voir aussi Ac 28.25.'
  - type: text
    content: 'Hypocrites, Esaïe a bien parlé en prophète sur vous, quand il a dit :'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 58.2-4 ; Ez 14.3 ; Ps 78.36s. Voir cœur.
  - type: text
    content: Ce peuple m'honore des lèvres,
  - type: text
    content: mais son cœur est très éloigné de moi
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'rendent un culte  : le verbe ainsi traduit est employé principalement dans les Actes et exprime une vénération religieuse. –  commandements (voir loi) humains Col 2.22 ; Tt 1.14.'
  - type: text
    content: C'est en vain qu'ils me rendent un culte,
  - type: text
    content: eux qui enseignent comme doctrines
  - type: text
    content: des commandements humains
  - type: text
    content: .
  - type: heading
    content: Mc 7.14-23
