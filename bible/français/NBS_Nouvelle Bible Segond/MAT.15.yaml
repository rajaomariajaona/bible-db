      - type: usfm
        marker: w
        children:
        - type: text
          text: Thomas
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '40 : « Jésus a dit : “Un cep de vigne a été planté en dehors du Père et, n''étant pas solide, il sera arraché jusqu''à sa racine et détruit.” » Epître '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Ignace
      - type: text
        text: ' d''Antioche aux Tralliens 11.1 : « Fuyez donc ces mauvaises plantes parasites : elles portent un fruit qui donne la mort, et si quelqu''un en goûte, il meurt sur-le-champ. Ceux-là ne sont pas la plantation du Père. » Aux Philadelphiens 3.1 : « Abstenez-vous des plantes mauvaises que Jésus-Christ ne cultive pas, parce qu''elles ne sont pas une plantation du Père. »'
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : Toute plante qui n''a pas été plantée par mon Père céleste sera déracinée. '
  - type: usfm
    marker: v
