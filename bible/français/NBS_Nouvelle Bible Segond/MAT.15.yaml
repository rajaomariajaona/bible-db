    marker-yv: yv-n
  - type: text
    text: 'Alors de grandes foules vinrent à lui, avec des infirmes, des aveugles, des sourds-muets, des estropiés et beaucoup d''autres malades. On les déposa à ses pieds, et il les guérit ; '
  - type: usfm
