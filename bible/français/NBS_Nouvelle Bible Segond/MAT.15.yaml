        text: '15.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 2.
    marker-yv: yv-n
  - type: text
    text: Voilà ce qui souille l'être humain ; mais manger sans s'être lavé les mains ne souille pas l'être humain.
