      - type: text
        text: au v. 24) ; cf. 14.15 ; Ac 16.17s.
    marker-yv: yv-n
  - type: text
    text: 'Il ne lui répondit pas un mot ; ses disciples vinrent lui demander : Renvoie-la, car elle crie derrière nous. '
  - type: usfm
