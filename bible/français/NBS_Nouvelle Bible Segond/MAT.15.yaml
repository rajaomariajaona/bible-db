  - type: text
    text: 'Pourquoi tes disciples transgressent-ils la tradition des anciens ? Car ils ne se lavent pas les mains quand ils mangent. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Il leur répondit : Et vous, pourquoi transgressez-vous le commandement de Dieu au profit de votre tradition ? '
  - type: usfm
    marker: v
    metadata:
