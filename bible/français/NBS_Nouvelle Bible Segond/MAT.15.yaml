        text: '  ; Pr 4.23 ; Rm 1.29.'
    marker-yv: yv-n
  - type: text
    text: 'En revanche, ce qui sort de la bouche provient du cœur, et c''est cela qui souille l''être humain. '
  - type: usfm
    marker: v
