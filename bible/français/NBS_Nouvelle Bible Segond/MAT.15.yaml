    - type: usfm
      marker: fq
      children:
      - type: text
        text: calomnies
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot signifie également '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: blasphèmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 12.31 ; 27.39'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car c''est du cœur que viennent raisonnements mauvais, meurtres, adultères, inconduites sexuelles, vols, faux témoignages, calomnies. '
  - type: usfm
    marker: v
    metadata:
