document_id: PSA.68,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Hymne pour accueillir le Dieu victorieux
  - type: text
    content: Du chef de chœur. De David. Psaume. Chant.
  '10':
  - type: text
    content: Tu répandis une pluie bienfaisante, ô Dieu !
  - type: text
    content: Ton patrimoine épuisé, c'est toi qui l'as rétabli.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ton peuple  : traduction incertaine d''un mot hébreu qui signifie habituellement (homonymie ?) être vivant, animal  ; d''où une autre traduction tes bêtes se posèrent . Ce mot apparaît en 2S 23.11n,13 avec le sens probable de troupe  ; un rapprochement avec une langue voisine suggère aussi le sens de pays. –  habite là…  : autre traduction ton peuple habite (ton patrimoine) ; dans ta bonté tu établis le pauvre…'
  - type: text
    content: Ton peuple habite là où, dans ta bonté,
  - type: text
    content: tu établis le pauvre, ô Dieu.
  '12':
  - type: text
    content: ' '
  - type: note
    content: les femmes… 40.10+ ; Es 40.9n.
  - type: text
    content: Le Seigneur donne une parole,
  - type: text
    content: 'et les femmes qui portent la bonne nouvelle sont une grande armée :'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 48.5s ; Jg 5.19ss. –  celle qui reste à la maison  : traduction incertaine ; on a aussi compris tu partages comme butin la splendeur des maisons ou on partage le butin à l''entrée de la maison.'
  - type: text
    content: les rois des armées fuient, fuient,
  - type: text
    content: et celle qui reste à la maison partage le butin.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Texte très obscur. –  au milieu (litt. entre ) des étables ou des parcs (pour le bétail)  ; cf. Jg 5.16. –  la colombe  : cf. Ct 2.12,14 ; 5.2 ; 6.9 ; certains pensent qu''il s''agissait d''un signe de ralliement ; la tradition juive en fait un symbole d''Israël ; l’ argent et l’ or sont sans doute ceux du butin (v. 13).'
  - type: text
    content: Tandis que vous êtes couchés au milieu des étables,
  - type: text
    content: les ailes de la colombe sont couvertes d'argent,
  - type: text
    content: et son plumage est d'un jaune d'or.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jg 5.19s. –  le Puissant  : hébreu Shaddaï  ; 91.1 ; Gn 17.1n. –  il neigeait Jb 38.22s. –  le Tsalmôn ( Le Sombre ), semble être ici le nom d''une montagne ; cf. Jg 9.48n.'
  - type: text
    content: Lorsque le Puissant y dispersa les rois,
  - type: text
    content: il neigeait sur le Tsalmôn.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 48.2-3n. –  Montagne et mont traduisent le même mot hébreu. –  du (litt. de ) Bashân  : région fertile à l''est du lac de Galilée, cf. 22.13n  ; Am 4.1 ; par rapprochement avec une langue voisine de l''hébreu, on a aussi traduit montagnes du Dragon . –  aux cimes nombreuses  : traduction incertaine ; on a aussi compris haute montagne  ; LXX montagne aux fromages (la région du Bashân était réputée pour son élevage).'
  - type: text
    content: Montagne de Dieu, mont du Bashân,
  - type: text
    content: montagne aux cimes nombreuses, mont du Bashân,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'jalousez-vous ou épiez-vous  ; le verbe hébreu n''apparaît qu''ici et sa traduction est incertaine ; cf. Es 2.2. –  la montagne…  : cf. 9.12 ; 74.2 ; 76.3 ; 78.68 ; 132.13. –  à jamais Ez 43.7.'
  - type: text
    content: pourquoi, montagnes aux cimes nombreuses, jalousez-vous
  - type: text
    content: la montagne qu'il a plu à Dieu d'habiter ?
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''en fera pas moins sa demeure à jamais.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Les chars de Dieu Jos 5.13-15 ; 2R 6.17 ; Es 66.15 ; Ez 1.4ss ; Za 14.5. –  se comptent par vingtaines de milliers…  : traduction très incertaine ; litt. sont deux myriades (= 20 000) , des milliers de redoublements (ou de flamboyants  ?) ; une tradition juive comprend le dernier mot comme le nom d''une catégorie d''anges ; cf. Nb 10.36. –  le Seigneur est parmi eux…  : certains modifient le texte hébreu traditionnel pour lire le Seigneur ( YHWH ) est venu du Sinaï dans le sanctuaire  ; cf. Dt 33.2ss ; Jg 5.5ss ; 1R 19.'
  - type: text
    content: Les chars de Dieu se comptent par vingtaines de milliers,
  - type: text
    content: par milliers et par milliers ;
  - type: text
    content: le Seigneur est parmi eux,
  - type: text
    content: le Sinaï est dans le sanctuaire.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Ep 4.8. –  Tu es monté 47.6 ; Es 33.5. –  tu as prélevé  : Syr et Tg tu as fait des dons aux humains. –  même rebelles…  : cf. v. 6 ; la fin du v. est obscure ; Syr les rebelles ne demeureront pas devant Dieu. –  Seigneur (Yah)  : cf. v. 5n  ; Ex 15.2n.'
  - type: text
    content: Tu es monté sur la hauteur, tu as emmené des captifs,
  - type: text
    content: tu as prélevé des dons parmi les humains,
  - type: text
    content: 'même rebelles, pour y faire ta demeure, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) Dieu !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. Nb 10.35.
  - type: text
    content: Dieu se lève, ses ennemis se dispersent ;
  - type: text
    content: ceux qui le détestent fuient devant lui.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit… 28.6+ ; 145.2. –  Il nous prend en charge…  : certains comprennent on nous charge, mais Dieu est notre salut. –  Dieu  : hébreu ’El , de même aux v. 21,25 ( mon Dieu ), 36 ( Dieu d''Israël ) ; cf. Gn 21.33n.'
  - type: text
    content: Béni soit le Seigneur, jour après jour !
  - type: text
    content: 'Il nous prend en charge, ce Dieu-là est notre salut. '
  - type: text
    content: Pause.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les issues de la mort  : litt. les sorties pour la mort  ; on pourrait aussi comprendre Dieu est maître des voies qui mènent à la mort  ; cf. Mt 16.18 ; Ap 1.18.'
  - type: text
    content: Ce Dieu est pour nous le Dieu du salut ;
  - type: text
    content: 'c''est à '
  - type: text
    content: Dieu
  - type: text
    content: ', le Seigneur, qu''appartiennent les issues de la mort.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: '110.6n  ; Es 63.3 ; Jr 48.45 ; Siracide 36.12 : « Brise les têtes des chefs ennemis qui disent : Il n''y a personne comme nous ! » –  fracassera  : le même verbe est traduit par enfoncer au v. 24, écraser en 110.5s ; cf. Nb 24.17. –  qui se complaît  : litt. qui marche.'
  - type: text
    content: Oui, Dieu fracassera la tête de ses ennemis,
  - type: text
    content: le crâne chevelu de celui qui se complaît dans son tort.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Je les ramènerai…  : litt. je ramènerai… je ramènerai. –  Bashân v. 16n  ; cf. 139.8ss ; Am 9.3.'
  - type: text
    content: 'Le Seigneur dit : Je les ramènerai du Bashân,'
  - type: text
    content: je les ramènerai des profondeurs de la mer,
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'tes pieds (litt. ton pied ) dans le sang 58.11. –  la langue de tes chiens…  : cf. 2R 9.36.'
  - type: text
    content: afin que tu plonges tes pieds dans le sang,
  - type: text
    content: et que la langue de tes chiens ait sa part des ennemis.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'ton arrivée  : litt. tes marches  ; même terme en Na 2.6 ; Ha 3.6 ( sentiers ) ; Jb 6.19 ( convois ) ; Pr 31.27.'
  - type: text
    content: Ils voient ton arrivée, ô Dieu
  - type: text
    content: – l'arrivée de mon Dieu, de mon roi, dans le sanctuaire.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'des jeunes filles  : cf. v. 28n  ; Es 7.14n.'
  - type: text
    content: En tête vont les chanteurs, puis ceux qui jouent des instruments à cordes,
  - type: text
    content: au milieu des jeunes filles battant du tambourin.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'dans les rassemblements  : le terme hébreu correspondant est apparenté à celui qui est traduit par assemblée (voir Eglise) ; 22.26+ ; 26.12 ; 35.18. –  le Seigneur (hébreu YHWH ) : plusieurs mss portent le Seigneur. –  depuis la source d''Israël  : l''expression désigne peut-être une source comme point de départ de la procession vers le sanctuaire (v. 25s ; cf. la source de Guihôn en 1R 1.33-40 ; voir aussi Es 48.1 ; 51.1 ; Za 13.1) ; elle a aussi été comprise dans un sens figuré  : vous qui êtes issus de la source d''Israël. LXX a lu les sources  ; certains se sont inspirés de ce pluriel pour modifier le texte hébreu traditionnel et lire depuis les assemblées d''Israël.'
  - type: text
    content: Bénissez Dieu dans les rassemblements,
  - type: text
    content: 'bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' depuis la source d''Israël !'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Voilà  : litt. là. –  le plus jeune  : autres traductions le cadet ; le plus petit  ; cf. 1S 9.21. –  qui domine sur eux ou leur guide , texte incertain ; certains voient là une allusion à Saül, le premier roi d''Israël, issu de Benjamin (1S 9ss). –  leur troupe  : le mot hébreu n''apparaît qu''ici et sa traduction est conjecturale.'
  - type: text
    content: Voilà Benjamin, le plus jeune, qui domine sur eux,
  - type: text
    content: les princes de Juda et leur troupe,
  - type: text
    content: les princes de Zabulon, les princes de Nephtali.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  ordonne…  : litt. ordonne ta puissance. –  Donne de la puissance  : on pourrait aussi comprendre le terme ainsi traduit comme un substantif et traduire  : la puissance… c''est ce que tu fais pour nous. –  ô Dieu  : selon certains, cette invocation s''adresserait au roi (cf. 45.7n).'
  - type: text
    content: Ton Dieu ordonne que tu sois puissant.
  - type: text
    content: Donne de la puissance, ô Dieu, à ce que tu as fait pour nous !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Comme la fumée 37.20 ; Os 13.3. –  tu les dissipes  : des versions anciennes ont lu ils se dissipent. –  comme la cire 22.15 ; 97.5 ; Mi 1.4. –  disparaissent devant Dieu 9.4 ; 37.20 ; Jg 5.31.'
  - type: text
    content: Comme la fumée se dissipe, tu les dissipes ;
  - type: text
    content: comme la cire fond au feu,
  - type: text
    content: les méchants disparaissent devant Dieu.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'ton temple  : on pourrait aussi traduire ton palais. –  les rois…  : cf. 72.10 ; 76.12 ; 1R 10.24s ; 2Ch 9.24 ; 32.23 ; Ap 21.24.'
  - type: text
    content: De ton temple qui domine Jérusalem,
  - type: text
    content: où les rois t'apportent des présents,
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Texte très obscur et traduction conjecturale ; cf. Es 27.1+. –  troupe 22.17n. –  taureaux  : autre traduction puissants  ; cf. 22.13n. –  avec les taurillons des peuples  : certains modifient le texte hébreu traditionnel pour lire et les maîtres des peuples. –  celui qui rampe (ou qui piétine ) pour (ou avec ) des pièces d''argent  : quelques-uns modifient le texte hébreu traditionnel pour lire piétine ceux qui prennent plaisir à l''argent. –  Disperse… 46.10.'
  - type: text
    content: rabroue l'animal des roseaux,
  - type: text
    content: la troupe des taureaux avec les taurillons des peuples,
  - type: text
    content: celui qui rampe pour des pièces d'argent !
  - type: text
    content: Disperse les peuples qui prennent plaisir à combattre !
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Des objets de bronze  : le terme hébreu correspondant est inconnu par ailleurs ; on a aussi compris des étoffes teintes  ; LXX des ambassadeurs. –  Koush ou la Nubie  ; cf. Gn 2.13n. –  les mains tendues  : traduction conjecturale (le terme correspondant à tendues serait sous-entendu dans le texte) ; on pourrait aussi comprendre les mains pleines (d''offrandes) ; cf. Es 18.7 ; 45.14 ; So 3.10 ; Za 14.16ss ; Ac 8.27.'
  - type: text
    content: Des objets de bronze viennent de l'Egypte ;
  - type: text
    content: Koush accourt, les mains tendues vers Dieu.
  '33':
  - type: text
    content: ' '
  - type: note
    content: '47.2,7 ; 138.4 ; Jr 20.13. –  chantez le Seigneur par des psaumes  : ou, selon certains mss hébreux et plusieurs versions anciennes, chantez des psaumes pour le Seigneur (voir 7.18n).'
  - type: text
    content: Royaumes de la terre, chantez pour Dieu,
  - type: text
    content: 'chantez le Seigneur par des psaumes ! '
  - type: text
    content: Pause.
  '34':
  - type: text
    content: ' '
  - type: note
    content: qui chevauche… v. 5n  ; Dt 33.26. –  Il fait entendre sa voix 29.3+.
  - type: text
    content: Pour celui qui chevauche dans le ciel, le ciel du temps jadis !
  - type: text
    content: Il fait entendre sa voix, sa voix puissante.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Reconnaissez…  : litt. donnez (ou attribuez ) la puissance à Dieu  ; cf. Dt 32.3n  ; Jn 9.24. –  Il est au-dessus d''Israël  : autre traduction sa hauteur (ou sa majesté ) est sur Israël.'
  - type: text
    content: Reconnaissez la puissance de Dieu !
  - type: text
    content: Il est au-dessus d'Israël, sa puissance est dans les nues.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'De tes sanctuaires…  : LXX Dieu est admiré dans ses (lieux) saints ou dans ses saints  ; cf. 73.17+ ; Lv 21.23n  ; 2Th 1.10. –  puissance et pouvoir 29.11.'
  - type: text
    content: De tes sanctuaires, ô Dieu, tu es redoutable.
  - type: text
    content: C'est le Dieu d'Israël qui donne au peuple puissance et pouvoir.
  - type: text
    content: Béni soit Dieu !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.27 ; 32.11 ; 97.12 ; Jb 22.19.
  - type: text
    content: Mais les justes se réjouissent, ils exultent devant Dieu,
  - type: text
    content: ils sont gais, ils sont comblés de joie.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '66.1s. –  chantez… par des psaumes  : cf. v. 33 ; 7.18n  ; 21.14n. –  Frayez le chemin à  : traduction incertaine ; on a aussi compris exaltez  ; cf. Es 40.3. –  qui chevauche (ou qui conduit son char ) dans les plaines arides  : autres traductions, par rapprochement avec un titre donné à Baal dans les textes d''Ougarit  : celui qui chevauche les nuées ou celui qui a les nuées pour char  ; cf. v. 34 ; 18.10s ; Dt 33.26 ; Jos 8.14n  ; Es 19.1. –  Son nom…  : texte incertain, litt. en Yah son nom  ; certains modifient la préposition pour lire car Yah est son nom  ; cf. Ps 83.19 ; voir aussi Ex 3.15n  ; sur Yah , forme abrégée du nom divin YHWH , voir v. 19 ; 77.12 ; 89.9 ; 94.7,12 ; 102.19 ; 104.35n  ; 105.45 ; 106.1,48 ; 111.1 ; 112.1 ; 113.1,9 ; 115.17s ; 116.19 ; 117.2 ; 118.5,14,17ss ; 122.4 ; 130.3 ; 135.1,3s,21 ; 146.1,10 ; 147.1,20 ; 148.1,14 ; 149.1,9 ; 150.1,6 ; Ex 15.2n.'
  - type: text
    content: Chantez pour Dieu, chantez son nom par des psaumes !
  - type: text
    content: Frayez le chemin à celui qui chevauche dans les plaines arides !
  - type: text
    content: 'Son nom, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah). Exultez devant lui !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'père des orphelins… 146.9 ; Ex 22.21s. –  défenseur  : litt. juge , au sens de celui qui fait justice (aux veuves). –  séjour sacré  : cf. 26.8 ; Dt 26.15n  ; Jr 25.30 ; Za 2.17 ; 2Ch 30.27.'
  - type: text
    content: Le père des orphelins, le défenseur des veuves,
  - type: text
    content: c'est Dieu, dans son séjour sacré.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'maison  : sans doute au sens de famille, foyer  ; cf. 113.9. –  il fait sortir… Es 42.7. –  pour leur satisfaction  : le mot hébreu n''apparaît qu''ici et sa traduction est incertaine ; par rapprochement avec des langues voisines on a aussi compris vers la prospérité ; avec des chants de joie ; par une heureuse délivrance  ; ou bien, en rattachant à ce qui précède, ceux qui sont prisonniers dans les chaînes. –  en des lieux arides  : LXX dans des tombeaux.'
  - type: text
    content: Dieu fait habiter les gens seuls dans une maison,
  - type: text
    content: il fait sortir les prisonniers pour leur satisfaction ;
  - type: text
    content: les rebelles seuls demeurent en des lieux arides.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 33.2ss ; Jg 5.4ss ; Ha 3.3-6.
  - type: text
    content: O Dieu, quand tu sortis à la tête de ton peuple,
  - type: text
    content: 'quand tu marchais sur la terre aride  –  '
  - type: text
    content: Pause.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 19.18 ; Jg 5.4s ; Hé 12.26. –  c''est le Sinaï  : autre traduction ce Sinaï  ; les termes correspondants sont absents de certains mss.'
  - type: text
    content: la terre trembla, le ciel ruissela devant Dieu – c'est le Sinaï –
  - type: text
    content: devant Dieu, le Dieu d'Israël.
