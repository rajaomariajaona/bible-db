          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les ennemis du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 20.5 ; Nb 10.35 ; Dt 7.10 ; 32.41 ; Ps 68.2 ; 81.16 ; 139.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la colère du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la Colère de devant YHWH '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. v. 10 ; 24.18 ; 29.8 ; 32.25s ; Nb 1.53
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 34.2 ; 1Ch 27.24.'
      marker-yv: yv-n
    - type: text
      text: 'Jéhu, fils de Hanani, le visionnaire, sortit au-devant de lui. Il dit au roi Josaphat : Doit-on secourir le méchant, et aimes-tu ceux qui détestent le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ? A cause de cela la colère du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est sur toi. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.3 '
      - type: usfm
        marker: fq
