          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'appliqué ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.14 ; 30.19 ; Esd 7.10 ; 1Ch 22.19 (autre verbe).'
      marker-yv: yv-n
    - type: text
      text: 'Mais il s''est trouvé de bonnes choses en toi : tu as éliminé du pays les poteaux cultuels (les ashéras) et tu as appliqué ton cœur à chercher Dieu.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josaphat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH juge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') entreprend une réforme dans le domaine de la justice ; cf. Dt 16.18-20 ; 17.8-13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fit… une tournée parmi le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sortit dans le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Cf. 17.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis Bersabée jusqu'à la région montagneuse d'Ephraïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. de l''extrémité sud du pays jusqu''à l''extrémité nord ; cf. 17.2 ; Jg 20.1 ; 2R 23.8.'
      marker-yv: yv-n
    - type: text
      text: 'Josaphat resta à Jérusalem. Puis il fit encore une tournée parmi le peuple, depuis Bersabée jusqu''à la région montagneuse d''Ephraïm, et il le ramena au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de ses pères. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Dt 16.18.
      marker-yv: yv-n
    - type: text
      text: 'Il nomma des juges dans le pays, dans toutes les villes fortes de Juda, dans chaque ville. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ep 6.7.
      marker-yv: yv-n
    - type: text
      text: 'Il dit aux juges : Veillez à ce que vous ferez : ce n''est pas pour des humains que vous jugerez ; c''est pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui sera avec vous en matière de droit. '
