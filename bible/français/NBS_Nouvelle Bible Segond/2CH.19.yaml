document_id: 2CH.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Josaphat nomme des juges en Juda
  - type: text
    content: ' '
  - type: note
    content: 'sain et sauf  : litt. en paix  ; cf. 1R 22.27n.'
  - type: text
    content: 'Josaphat, roi de Juda, revint sain et sauf chez lui, à Jérusalem. '
  '10':
  - type: note
    content: 'meurtre  : litt. entre sang et sang  ; voir Ex 22.1s ; Nb 35.10ss ; Dt 17.8 ; 19.1-13 ; 21.1-9. –  commandement / prescriptions / règles  : trois termes qui désignent l''ensemble de la législation civile et religieuse ; voir loi. Cf. Dt 11.1.'
  - type: text
    content: 'Dans tout litige qui vous sera soumis par vos frères habitant dans leurs villes relativement à un meurtre, à une loi, à un commandement, à des prescriptions et à des règles, vous les avertirez, afin qu''ils ne se mettent pas en tort devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et que la Colère ne s''abatte pas sur vous et sur vos frères. C''est ainsi que vous agirez, et vous ne vous rendrez pas coupables. '
  '11':
  - type: note
    content: 'le prêtre en chef  : cf. 2R 25.18 ; Esd 7.5 ; 1Ch 27.5 – secrétaires 26.11 ; 34.13 ; Dt 1.15n  ; voir scribe.'
  - type: text
    content: 'Vous avez au-dessus de vous le prêtre en chef Amaria pour toutes les affaires du '
  - type: text
    content: Seigneur
  - type: text
    content: ', Zebadia, fils d''Ismaël, chef de la maison de Juda, pour toutes les affaires du roi, et vous avez devant vous des lévites comme secrétaires. Soyez forts et agissez, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit avec celui qui agira bien.'
  '2':
  - type: note
    content: 'Hanani, le visionnaire  : cf. 16.7+ ; voir prophète. –  le méchant  : c.-à-d. Achab. –  ceux qui détestent le Seigneur ou les ennemis du Seigneur  ; cf. Ex 20.5 ; Nb 10.35 ; Dt 7.10 ; 32.41 ; Ps 68.2 ; 81.16 ; 139.21. –  la colère du Seigneur  : litt. la Colère de devant YHWH cf. v. 10 ; 24.18 ; 29.8 ; 32.25s ; Nb 1.53n  ; Es 34.2 ; 1Ch 27.24.'
  - type: text
    content: 'Jéhu, fils de Hanani, le visionnaire, sortit au-devant de lui. Il dit au roi Josaphat : Doit-on secourir le méchant, et aimes-tu ceux qui détestent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? A cause de cela la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sur toi. '
  '3':
  - type: note
    content: 'de bonnes choses en toi  : cf. 12.12. –  éliminé Dt 13.6n. –  appliqué ton cœur…  : cf. 12.14 ; 30.19 ; Esd 7.10 ; 1Ch 22.19 (autre verbe).'
  - type: text
    content: 'Mais il s''est trouvé de bonnes choses en toi : tu as éliminé du pays les poteaux cultuels (les ashéras) et tu as appliqué ton cœur à chercher Dieu.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Josaphat ( YHWH juge ) entreprend une réforme dans le domaine de la justice ; cf. Dt 16.18-20 ; 17.8-13. –  fit… une tournée parmi le peuple  : litt. sortit dans le peuple . Cf. 17.9. –  depuis Bersabée jusqu''à la région montagneuse d''Ephraïm  : c.-à-d. de l''extrémité sud du pays jusqu''à l''extrémité nord ; cf. 17.2 ; Jg 20.1 ; 2R 23.8.'
  - type: text
    content: 'Josaphat resta à Jérusalem. Puis il fit encore une tournée parmi le peuple, depuis Bersabée jusqu''à la région montagneuse d''Ephraïm, et il le ramena au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de ses pères. '
  '5':
  - type: note
    content: Cf. Dt 16.18.
  - type: text
    content: 'Il nomma des juges dans le pays, dans toutes les villes fortes de Juda, dans chaque ville. '
  '6':
  - type: note
    content: Cf. Ep 6.7.
  - type: text
    content: 'Il dit aux juges : Veillez à ce que vous ferez : ce n''est pas pour des humains que vous jugerez ; c''est pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui sera avec vous en matière de droit. '
  '7':
  - type: note
    content: 'la frayeur du Seigneur 14.13+. –  prenez garde…  : autres traductions prenez garde à ce que vous faites (cf. v. 6)  ; observez et agissez. –  il n''y a chez le Seigneur …  : cf. Rm 2.11+. –  injustice  : voir justice. –  corruption  : autre traduction acceptation de pot-de-vin (Ex 23.8+) ; cf. Dt 10.17n  ; 16.19 ; 27.25.'
  - type: text
    content: 'Maintenant, que la frayeur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit sur vous ; prenez garde et agissez, car il n''y a chez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, ni injustice, ni favoritisme, ni corruption.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Voir lévites, prêtres. –  pour exercer…  : litt. pour le droit de YHWH et le litige . –  trancher… Jérusalem  : LXX et Vg ont lu pour trancher les litiges des habitants de Jérusalem.'
  - type: text
    content: 'De même, à Jérusalem, Josaphat installa des lévites, des prêtres et des chefs de famille d''Israël pour exercer le droit du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et trancher les litiges ; ils habitaient à Jérusalem. '
  '9':
  - type: note
    content: 'crainte du Seigneur  : cf. Ps 19.10+ ; 34.12 ; Pr 1.7n  ; voir aussi v. 7+ (autre terme). –  avec probité  : autre traduction avec fidélité  ; même terme en 31.12,15,18 ; 34.12 ; cf. 1R 9.22n.'
  - type: text
    content: 'Il leur ordonna : Vous agirez ainsi dans la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec probité, d''un cœur entier. '
