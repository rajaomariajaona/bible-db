      marker-yv: yv-n
    - type: text
      text: 'Josaphat, roi de Juda, revint sain et sauf chez lui, à Jérusalem. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: meurtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'entre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' et sang'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir Ex 22.1s ; Nb 35.10ss ; Dt 17.8 ; 19.1-13 ; 21.1-9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'commandement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prescriptions '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: règles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : trois termes qui désignent l''ensemble de la législation civile et religieuse ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: . Cf. Dt 11.1.
      marker-yv: yv-n
    - type: text
      text: 'Dans tout litige qui vous sera soumis par vos frères habitant dans leurs villes relativement à un meurtre, à une loi, à un commandement, à des prescriptions et à des règles, vous les avertirez, afin qu''ils ne se mettent pas en tort devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et que la Colère ne s''abatte pas sur vous et sur vos frères. C''est ainsi que vous agirez, et vous ne vous rendrez pas coupables. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le prêtre en chef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 25.18 ; Esd 7.5 ; 1Ch 27.5 – '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'secrétaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 26.11 ; 34.13 ; Dt 1.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: scribe
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous avez au-dessus de vous le prêtre en chef Amaria pour toutes les affaires du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Zebadia, fils d''Ismaël, chef de la maison de Juda, pour toutes les affaires du roi, et vous avez devant vous des lévites comme secrétaires. Soyez forts et agissez, et que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soit avec celui qui agira bien.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
