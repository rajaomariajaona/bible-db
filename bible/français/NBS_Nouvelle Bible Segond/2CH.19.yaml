      - type: usfm
        marker: fqa
        children:
        - type: text
          text:  ; observez et agissez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il n''y a chez le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 2.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: injustice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: corruption
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'acceptation de pot-de-vin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Ex 23.8+) ; cf. Dt 10.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 16.19 ; 27.25.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, que la frayeur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soit sur vous ; prenez garde et agissez, car il n''y a chez le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, ni injustice, ni favoritisme, ni corruption.'
