          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le méchant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. Achab. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ceux qui détestent le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
