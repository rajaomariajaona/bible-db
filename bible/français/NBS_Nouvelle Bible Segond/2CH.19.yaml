      marker-yv: yv-n
    - type: text
      text: 'De même, à Jérusalem, Josaphat installa des lévites, des prêtres et des chefs de famille d''Israël pour exercer le droit du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et trancher les litiges ; ils habitaient à Jérusalem. '
