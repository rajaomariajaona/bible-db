document_id: ACT.26,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul présente sa défense devant Agrippa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Agrippa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hérode
        - type: text
          text: . – Certains mss occidentaux portent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Alors Paul, confiant et recevant l''encouragement de l''Esprit saint, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'étendit la main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'défense '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Agrippa dit à Paul : Il t''est permis de plaider ta cause. Alors Paul étendit la main et présenta ainsi sa défense : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.3+ ; cf. Ap 2.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 18 ; 9.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grands '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon suffrage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon caillou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; l''expression vient de la coutume qui consistait à exprimer son vote dans une délibération par un caillou (souvent noir pour la condamnation et blanc pour l''acquittement) ; cf. 8.1 ; voir aussi Ap 2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est ce que j''ai fait à Jérusalem : j''ai moi-même fait enfermer en prison beaucoup de saints, selon l''autorité dont j''avais été investi par les grands prêtres ; et, quand on décidait de les supprimer, j''apportais mon suffrage. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sévices '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à blasphémer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute à abjurer en maudissant solennellement le Christ ; cf. 13.45'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Co 12.3.'
      marker-yv: yv-n
    - type: text
      text: Dans toutes les synagogues, j'usais de maints sévices pour les forcer à blasphémer. Dans l'excès de ma fureur contre eux, je les persécutais jusque dans les villes étrangères.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul raconte sa conversion et son œuvre
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'investi par les grands '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.1,2.
      marker-yv: yv-n
    - type: text
      text: 'C''est ainsi que je me rendais à Damas, avec l''autorité et le mandat dont j''avais été investi par les grands prêtres, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 23 ; 9.4 ; 22.6,9 ; Lc 2.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'quand, vers le milieu du jour, ô roi, j''ai vu en chemin briller tout autour de moi et de mes compagnons de route une lumière venant du ciel, plus resplendissante que le soleil. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en langue hébraïque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir 9.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (même forme pour '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Saoul
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'regimber contre l''aiguillon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les aiguillons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), comme un animal rétif (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''aiguillon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étant le bâton pointu destiné à faire avancer les bêtes ; cf. 1Co 15.55s) : image courante parmi les Grecs (on la trouve chez Euripide) pour évoquer une vaine résistance aux dieux ou au destin.'
      marker-yv: yv-n
    - type: text
      text: 'Nous sommes tous tombés à terre, et j''ai entendu une voix qui me disait en langue hébraïque : « Saoul, Saoul, pourquoi me persécutes-tu ? Il est dur pour toi de regimber contre l''aiguillon ! » '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'J''ai répondu : « Qui es-tu, Seigneur ? » Le Seigneur a dit : « Moi, je suis Jésus, celui que, toi, tu persécutes. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lève-toi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 2.1,3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je te destine… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.14s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ce que tu as vu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du fait que tu m'as vu et que je t'apparaîtrai encore ; de la façon dont tu m'as vu et dont je t'apparaîtrai encore
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ce que tu as vu et…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 9.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'apparaîtrai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.9 ; 18.9 ; 22.18 ; 23.11 ; 2Co 12.1ss.'
      marker-yv: yv-n
    - type: text
      text: 'Mais lève-toi, tiens-toi sur tes pieds. Voici en effet pourquoi je te suis apparu : je te destine à être serviteur et témoin de ce que tu as vu de moi et de ce pour quoi je t''apparaîtrai encore. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je te délivrerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je te prends du milieu de ce peuple et des non-Juifs…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20-22 ; 7.10,34 ; 12.11 ; 22.21 ; 23.27 ; Jr 1.5-10,19 ; 1Ch 16.35 ; l''expression '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vers qui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut se référer aussi bien à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ') qu''aux '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je te délivrerai de ce peuple et des non-Juifs, vers qui, moi, je t''envoie, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour leur ouvrir les yeux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.47 ; Es 42.6s,16 ; Ep 5.8 ; Col 1.12s ; 1P 2.9 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Joseph
        - type: text
          text: ' et Aséneth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.10 : « Toi qui es le Très-Haut, le Fort, qui donnes la vie à l''univers, et qui appelles des ténèbres à la lumière, et de l''erreur à la vérité, et de la mort à la vie. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''autorité du Satan… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: ') : cf. Ep 2.2+ ; 1Th 1.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le pardon des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péchés
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.38+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une part… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ceux qui ont été consacrés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui sont devenus '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme apparenté v. 10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par la foi en moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision pourrait aussi se rapporter à ce qui précède'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''ils reçoivent, par la foi en moi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.21 ; cf. 13.39.
      marker-yv: yv-n
    - type: text
      text: pour leur ouvrir les yeux, afin qu'ils se tournent des ténèbres vers la lumière et de l'autorité du Satan vers Dieu, et qu'ils reçoivent le pardon des péchés et une part d'héritage parmi ceux qui ont été consacrés par la foi en moi. »
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Agrippa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hérode
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En conséquence, roi Agrippa, je n''ai pas été réfractaire à la vision céleste. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 24.2s,10. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. 25.15.
      marker-yv: yv-n
    - type: text
      text: 'Je m''estime heureux, roi Agrippa, d''avoir aujourd''hui à présenter ma défense devant toi au sujet de toutes les accusations que les Juifs portent contre moi, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.8 ; 9.19s,27-29 ; Rm 15.19 ; Ga 1.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux non-Juifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux (autres) nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 10.45'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. D''après une reconstitution, cette précision aurait été absente du texte occidental. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''ils doivent '
        - type: usfm
          marker: w
          children:
          - type: text
            text: changer
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de changer radicalement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de se repentir, de se convertir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 2.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et de se tourner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (3.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.19+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en pratiquant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des œuvres dignes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 3.8/ /.
      marker-yv: yv-n
    - type: text
      text: 'Mais à ceux de Damas d''abord, puis à Jérusalem, dans toute la Judée, et aux non-Juifs, j''ai annoncé qu''ils doivent changer radicalement et se tourner vers Dieu, avec des œuvres dignes de ce changement radical. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.30s. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voilà pourquoi les Juifs se sont emparés de moi dans le temple, tentant de m''éliminer. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '26.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai subsisté
      - type: usfm
