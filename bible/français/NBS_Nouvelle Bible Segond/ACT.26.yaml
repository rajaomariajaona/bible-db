document_id: ACT.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul présente sa défense devant Agrippa
  - type: text
    content: ' '
  - type: note
    content: 'Agrippa  : voir Hérode. – Certains mss occidentaux portent  : Alors Paul, confiant et recevant l''encouragement de l''Esprit saint, étendit la main 12.17+. –  défense 22.1n.'
  - type: text
    content: 'Agrippa dit à Paul : Il t''est permis de plaider ta cause. Alors Paul étendit la main et présenta ainsi sa défense : '
  '10':
  - type: note
    content: '8.3+ ; cf. Ap 2.10. –  saints v. 18 ; 9.13n. –  grands prêtres 4.23+. –  mon suffrage  : litt. mon caillou  ; l''expression vient de la coutume qui consistait à exprimer son vote dans une délibération par un caillou (souvent noir pour la condamnation et blanc pour l''acquittement) ; cf. 8.1 ; voir aussi Ap 2.17n.'
  - type: text
    content: 'C''est ce que j''ai fait à Jérusalem : j''ai moi-même fait enfermer en prison beaucoup de saints, selon l''autorité dont j''avais été investi par les grands prêtres ; et, quand on décidait de les supprimer, j''apportais mon suffrage. '
  '11':
  - type: note
    content: 'sévices 22.5n. –  à blasphémer  : sans doute à abjurer en maudissant solennellement le Christ ; cf. 13.45n  ; 1Co 12.3.'
  - type: text
    content: Dans toutes les synagogues, j'usais de maints sévices pour les forcer à blasphémer. Dans l'excès de ma fureur contre eux, je les persécutais jusque dans les villes étrangères.
  - type: heading
    content: Paul raconte sa conversion et son œuvre
  '12':
  - type: text
    content: ' '
  - type: note
    content: investi par les grands prêtres 9.1,2.
  - type: text
    content: 'C''est ainsi que je me rendais à Damas, avec l''autorité et le mandat dont j''avais été investi par les grands prêtres, '
  '13':
  - type: note
    content: Cf. v. 23 ; 9.4 ; 22.6,9 ; Lc 2.9n.
  - type: text
    content: 'quand, vers le milieu du jour, ô roi, j''ai vu en chemin briller tout autour de moi et de mes compagnons de route une lumière venant du ciel, plus resplendissante que le soleil. '
  '14':
  - type: note
    content: 'en langue hébraïque 21.40n  ; voir 9.4n (même forme pour Saoul). –  regimber contre l''aiguillon (litt. les aiguillons), comme un animal rétif (l''aiguillon étant le bâton pointu destiné à faire avancer les bêtes ; cf. 1Co 15.55s) : image courante parmi les Grecs (on la trouve chez Euripide) pour évoquer une vaine résistance aux dieux ou au destin.'
  - type: text
    content: 'Nous sommes tous tombés à terre, et j''ai entendu une voix qui me disait en langue hébraïque : « Saoul, Saoul, pourquoi me persécutes-tu ? Il est dur pour toi de regimber contre l''aiguillon ! » '
  '15':
  - type: text
    content: 'J''ai répondu : « Qui es-tu, Seigneur ? » Le Seigneur a dit : « Moi, je suis Jésus, celui que, toi, tu persécutes. '
  '16':
  - type: note
    content: 'lève-toi…  : cf. Ez 2.1,3. –  je te destine… 3.20n  ; 22.14s. –  de ce que tu as vu…  : autres traductions du fait que tu m''as vu et que je t''apparaîtrai encore ; de la façon dont tu m''as vu et dont je t''apparaîtrai encore  ; certains mss portent de ce que tu as vu et…  ; cf. 9.10+. –  je t''apparaîtrai…  : cf. 16.9 ; 18.9 ; 22.18 ; 23.11 ; 2Co 12.1ss.'
  - type: text
    content: 'Mais lève-toi, tiens-toi sur tes pieds. Voici en effet pourquoi je te suis apparu : je te destine à être serviteur et témoin de ce que tu as vu de moi et de ce pour quoi je t''apparaîtrai encore. '
  '17':
  - type: note
    content: 'Je te délivrerai  : autre traduction possible je te prends du milieu de ce peuple et des non-Juifs…  ; cf. v. 20-22 ; 7.10,34 ; 12.11 ; 22.21 ; 23.27 ; Jr 1.5-10,19 ; 1Ch 16.35 ; l''expression vers qui peut se référer aussi bien à ce peuple (les Juifs) qu''aux non-Juifs.'
  - type: text
    content: 'Je te délivrerai de ce peuple et des non-Juifs, vers qui, moi, je t''envoie, '
  '18':
  - type: note
    content: 'pour leur ouvrir les yeux… 13.47 ; Es 42.6s,16 ; Ep 5.8 ; Col 1.12s ; 1P 2.9 ; Joseph et Aséneth 8.10 : « Toi qui es le Très-Haut, le Fort, qui donnes la vie à l''univers, et qui appelles des ténèbres à la lumière, et de l''erreur à la vérité, et de la mort à la vie. » –  de l''autorité du Satan… (voir démon) : cf. Ep 2.2+ ; 1Th 1.9. –  le pardon des péchés 2.38+. –  une part… 20.32n. –  ceux qui ont été consacrés ou qui sont devenus saints, terme apparenté v. 10. –  par la foi en moi  : cette précision pourrait aussi se rapporter à ce qui précède  : qu''ils reçoivent, par la foi en moi… 20.21 ; cf. 13.39.'
  - type: text
    content: pour leur ouvrir les yeux, afin qu'ils se tournent des ténèbres vers la lumière et de l'autorité du Satan vers Dieu, et qu'ils reçoivent le pardon des péchés et une part d'héritage parmi ceux qui ont été consacrés par la foi en moi. »
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Agrippa  : voir Hérode.'
  - type: text
    content: 'En conséquence, roi Agrippa, je n''ai pas été réfractaire à la vision céleste. '
  '2':
  - type: note
    content: Cf. 24.2s,10. –  Juifs cf. 25.15.
  - type: text
    content: 'Je m''estime heureux, roi Agrippa, d''avoir aujourd''hui à présenter ma défense devant toi au sujet de toutes les accusations que les Juifs portent contre moi, '
  '20':
  - type: note
    content: 'Cf. 1.8 ; 9.19s,27-29 ; Rm 15.19 ; Ga 1.22. –  aux non-Juifs ou aux (autres) nations, 10.45n. D''après une reconstitution, cette précision aurait été absente du texte occidental. –  qu''ils doivent changer…  : litt. de changer radicalement (ou de se repentir, de se convertir, 2.38n) et de se tourner (3.19n) vers Dieu 15.19+. –  avec (litt. en pratiquant) des œuvres dignes… Lc 3.8/ /.'
  - type: text
    content: 'Mais à ceux de Damas d''abord, puis à Jérusalem, dans toute la Judée, et aux non-Juifs, j''ai annoncé qu''ils doivent changer radicalement et se tourner vers Dieu, avec des œuvres dignes de ce changement radical. '
  '21':
  - type: note
    content: 21.30s. – Voir temple.
  - type: text
    content: 'Voilà pourquoi les Juifs se sont emparés de moi dans le temple, tentant de m''éliminer. '
  '22':
  - type: note
    content: 'j''ai subsisté  : autre traduction j''ai tenu bon  ; le même verbe est traduit par se tenir debout en Lc 21.36. –  les prophètes et Moïse (voir loi) 28.23 ; cf. 3.18 ; 24.14 ; Lc 24.27+. –  annoncé  : litt. dit devoir arriver.'
  - type: text
    content: 'Mais, grâce à la protection de Dieu, j''ai subsisté jusqu''à ce jour et je rends témoignage devant petits et grands, sans rien dire en dehors de ce que les prophètes et Moïse ont annoncé, '
  '23':
  - type: note
    content: '17.3 ; Lc 24.26+. –  relevé le premier  : litt. le premier du relèvement (ou de la résurrection) des morts, cf. 2.24n  ; 1Co 15.20 ; Col 1.18. –  la lumière… v. 18+ ; voir aussi Mt 4.16 ; Lc 2.32 ; 2Tm 1.10. –  aux non-Juifs v. 20n.'
  - type: text
    content: à savoir que le Christ souffrirait et que, relevé le premier d'entre les morts, il annoncerait la lumière au peuple et aux non-Juifs.
  - type: heading
    content: Paul appelle Agrippa à la foi
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'défense 22.1n. –  Festus  : cf. 25.19. –  s''écria  : litt. dit d''une grande voix . –  Tu es fou  : cf. 12.15 ; Jn 10.20. –  Ta grande érudition  : litt. tes lettres abondantes  ; le même terme sera traduit par écrit en 28.21 ; il peut désigner les écrits sacrés (cf. Jn 7.15n  ; 2Tm 3.15n) ; voir aussi son emploi négatif en Rm 2.27,29 ; 7.6 ; 2Co 3.6s ; Ga 6.11.'
  - type: text
    content: 'Comme il présentait ainsi sa défense, Festus s''écria : Tu es fou, Paul ! Ta grande érudition te pousse à la folie ! '
  '25':
  - type: note
    content: très excellent 24.3+. –  de bon sens 1Tm 2.9n. –  j'énonce 2.4n.
  - type: text
    content: 'Paul répliqua : Je ne suis pas fou, très excellent Festus ; ce sont, au contraire, des paroles de vérité et de bon sens que j''énonce. '
  '26':
  - type: note
    content: 'avec assurance 2.29n  ; cf. Jn 18.20. –  pas en cachette  : litt. pas dans un coin  ; cf. v. 20,23.'
  - type: text
    content: 'Le roi est instruit de tout cela, et je lui en parle avec assurance, car je suis persuadé qu''il n''en ignore rien ; en effet, ce n''est pas en cachette que tout cela s''est passé. '
  '27':
  - type: note
    content: 'Crois-tu aux prophètes 24.14 ; Lc 24.25+. –  Agrippa  : voir Hérode. –  que tu y crois  : autre traduction que tu crois.'
  - type: text
    content: 'Crois-tu aux prophètes, roi Agrippa ? Je sais bien que tu y crois ! '
  '28':
  - type: note
    content: 'Encore un peu  : cf. v. 29. –  tu m''auras persuadé…  : texte incertain et traduction conjecturale ; on peut aussi comprendre tu vas me persuader (13.43+) de faire le chrétien ; tu vas me persuader que tu as fait de moi un chrétien  ; ou, selon certains mss, tu vas me persuader de devenir chrétien ; tu vas te persuader que tu as fait de moi un chrétien  ; cf. 11.26+.'
  - type: text
    content: 'Agrippa dit à Paul : Encore un peu, tu m''auras persuadé, tu auras fait de moi un chrétien ! '
  '29':
  - type: note
    content: 'pour un peu ou pour beaucoup  : on pourrait aussi comprendre tôt ou tard (v. 28). –  de ces liens, c.-à-d. de ma condition de prisonnier.'
  - type: text
    content: 'Paul répondit : Que ce soit pour un peu ou pour beaucoup, je souhaiterais, s''il plaît à Dieu, que non seulement toi, mais encore tous ceux qui m''écoutent aujourd''hui, vous deveniez tels que, moi, je suis – à l''exception toutefois de ces liens !'
  '3':
  - type: note
    content: 'V. 26. –  car tu connais particulièrement bien  : autre traduction d''autant que tu connais bien.'
  - type: text
    content: car tu connais particulièrement bien toutes les coutumes des Juifs et leurs débats. Je te prie donc de m'écouter patiemment.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : Et comme il disait cela, le roi…'
  - type: text
    content: 'Alors le roi, le gouverneur, Bérénice et tous ceux qui étaient assis avec eux se levèrent ; '
  '31':
  - type: note
    content: '23.29+. –  la prison  : litt. les liens, cf. v. 29n.'
  - type: text
    content: 'en se retirant, ils se disaient les uns aux autres : Cet homme ne fait rien qui mérite la mort ou la prison. '
  '32':
  - type: note
    content: Cf. 25.11s,25. –  César 25.8n.
  - type: text
    content: 'Agrippa, de son côté, dit à Festus : On aurait pu relâcher cet homme, s''il n''en avait pas appelé à César.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: '22.3 ; Ga 1.13. –  au milieu de ma nation, à Jérusalem  : autre traduction dans ma nation et à Jérusalem.'
  - type: text
    content: 'Ce qu''a été ma vie depuis le plus jeune âge, dès le commencement au milieu de ma nation, à Jérusalem, tous les Juifs le savent. '
  '5':
  - type: note
    content: pharisien 23.6+. –  parti 5.17n.
  - type: text
    content: 'Ils me connaissent depuis longtemps et ils peuvent témoigner, s''ils le veulent, que j''ai vécu en pharisien, selon le parti le plus strict de notre religion. '
  '6':
  - type: note
    content: 'parce que je mets mon espérance (23.6+) en la promesse…  : litt. pour espérance de la promesse  ; 3.25s ; 13.32.'
  - type: text
    content: 'Et maintenant je suis mis en jugement parce que je mets mon espérance en la promesse que Dieu a faite à nos pères, '
  '7':
  - type: note
    content: 'Cf. 24.15. –  promesse dont… espèrent atteindre l''accomplissement  : litt. que nos douze tribus… espèrent atteindre  ; le même verbe est traduit par arriver en 16.1 etc. –  célèbrent le culte  : même verbe en Lc 2.37 (prendre part au culte). –  avec ferveur 12.5n.'
  - type: text
    content: 'promesse dont nos douze tribus, qui célèbrent le culte avec ferveur, nuit et jour, espèrent atteindre l''accomplissement. C''est au sujet de cette espérance, ô roi, que je suis accusé par des Juifs ! '
  '8':
  - type: note
    content: réveille ou relève 3.15n  ; 4.2n  ; cf. 25.19+ ; 26.23 ; Rm 4.17 ; Hé 11.19 ; voir résurrection.
  - type: text
    content: Pourquoi juge-t-on incroyable, parmi vous, que Dieu réveille des morts ?
  - type: heading
    content: 9.1-29  ; 22.3-21
  '9':
  - type: text
    content: ' '
  - type: note
    content: au nom… 3.16+. –  le Nazoréen 2.22+.
  - type: text
    content: 'Pour ma part, donc, j''avais d''abord pensé devoir m''opposer très activement au nom de Jésus le Nazoréen. '
