document_id: ISA.42,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le serviteur du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'Mt 12.18-21. –  mon serviteur  : cf. 20.3 ; 41.8+ ; voir aussi 49.3 ; 50.10 ; 52.13–53.11. –  que je soutiens 41.10 ; Ps 41.13 ; 63.9. –  celui que j''ai choisi ou mon élu (41.9 ; 43.20 ; 45.4 ; voir 48.10n) …  : cf. Mt 3.17/ / ; 17.5/ / ; Lc 23.35. –  mon souffle ou mon Esprit 11.2+ ; 59.21 ; 61.1. –  il imposera  : litt. il fera sortir l''équité (ou le droit ) pour les nations  ; de même au v. 3 ; cf. Ha 1.4n  ; d''autres comprennent il révélera l''équité aux nations (voir aussi Ps 17.2n  ; 37.6n).'
  - type: text
    content: Voici mon serviteur, que je soutiens,
  - type: text
    content: celui que j'ai choisi et que j'agrée.
  - type: text
    content: J'ai mis sur lui mon souffle ;
  - type: text
    content: il imposera l'équité aux nations.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'chant nouveau v. 9 ; Ps 33.3 ; 40.4 ; 96.1 ; 98.1 ; 144.9 ; 149.1 ; Ap 5.9 ; 14.3. –  voyagez  : litt. descendez  ; cf. Ps 107.23-30. –  qui la remplissez Gn 1.20-22 ; Ps 24.1n  ; 96.11 ; 98.7. –  îles 11.11+.'
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un chant nouveau,'
  - type: text
    content: chantez sa louange depuis les extrémités de la terre,
  - type: text
    content: vous qui voyagez sur la mer
  - type: text
    content: et vous qui la remplissez,
  - type: text
    content: les îles et leurs habitants !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Qédar 21.16n. –  Séla 16.1n. –  montagnes… 44.23+.
  - type: text
    content: Que le désert et ses villes élèvent la voix,
  - type: text
    content: ainsi que les villages où habite Qédar !
  - type: text
    content: Que les habitants de Séla poussent des cris de joie !
  - type: text
    content: Que du sommet des montagnes ils lancent des cris de triomphe !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'on dise  : le même verbe est traduit par annoncer au v. 9.'
  - type: text
    content: 'Qu''on rende gloire au '
  - type: text
    content: Seigneur
  - type: text
    content: et que dans les îles on dise sa louange !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'sort 37.9n  ; Jg 5.4 ; Ps 68.8. –  héros 9.5n. –  il éveille 41.2n. –  passion jalouse 9.6+. –  guerrières  : sous-entendu dans le texte ; cf. 15.4.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sort comme un héros,'
  - type: text
    content: il éveille sa passion jalouse comme un homme de guerre ;
  - type: text
    content: il lance des acclamations guerrières, il pousse des cris,
  - type: text
    content: il triomphe de ses ennemis.
  '14':
  - type: text
    content: ' '
  - type: note
    content: garde le silence 57.11 ; 62.1,6 ; 64.11 ; 65.6. –  comme une femme… 13.8+.
  - type: text
    content: Depuis toujours je garde le silence,
  - type: text
    content: je me tais, je me contiens ;
  - type: text
    content: comme une femme en travail je gémis,
  - type: text
    content: je suffoque et je suis haletant.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 41.18 ; Ps 107.33.
  - type: text
    content: Je ferai des montagnes et des collines un désert,
  - type: text
    content: j'en dessécherai toute la verdure ;
  - type: text
    content: je changerai les fleuves en îles
  - type: text
    content: et je dessécherai les étangs.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'aveugles v. 18+. –  je les conduirai Ex 13.21. –  ténèbres en lumière Ex 14.20. –  et je ne les abandonnerai pas  : autre traduction et je ne manquerai pas de le faire.'
  - type: text
    content: Je ferai marcher les aveugles
  - type: text
    content: sur un chemin qu'ils ne connaissaient pas ;
  - type: text
    content: je les conduirai par des sentiers qu'ils ne connaissaient pas.
  - type: text
    content: Je changerai devant eux les ténèbres en lumière
  - type: text
    content: et le sol accidenté en terrain plat ;
  - type: text
    content: c'est bien cela que je ferai,
  - type: text
    content: et je ne les abandonnerai pas.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 41.11+.
  - type: text
    content: Ils reculeront, ils auront honte,
  - type: text
    content: ceux qui mettent leur confiance dans des statues,
  - type: text
    content: 'ceux qui disent à des idoles de métal fondu :'
  - type: text
    content: Vous êtes nos dieux !
  - type: heading
    content: Un peuple qui n'a pas voulu entendre
  '18':
  - type: text
    content: ' '
  - type: note
    content: Sourds / Aveugles 29.18+ ; voir en particulier v. 20 ; 6.9s ; 43.8 ; 44.18 ; voir aussi Mt 11.5.
  - type: text
    content: Sourds, écoutez !
  - type: text
    content: Aveugles, regardez et voyez !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui a trouvé la paix  : le mot hébreu peut signifier rétribué (cf. Pr 11.31), accompli (Ps 65.2) ou pacifié  ; cf. 54.10.'
  - type: text
    content: Qui est aveugle, sinon mon serviteur ?
  - type: text
    content: Qui est sourd comme le messager que j'envoie ?
  - type: text
    content: Qui est aveugle comme celui qui a trouvé la paix,
  - type: text
    content: 'aveugle comme le serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '2':
  - type: text
    content: Il ne criera pas,
  - type: text
    content: il n'élèvera pas la voix,
  - type: text
    content: il ne se fera pas entendre dans les rues.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'V. 18+. –  on n''a pas entendu  : litt. il n''entend pas ou il n''écoute pas.'
  - type: text
    content: Tu as vu beaucoup de choses,
  - type: text
    content: mais tu n'y as pas pris garde ;
  - type: text
    content: on a ouvert les oreilles,
  - type: text
    content: mais on n'a pas entendu.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'à cause de sa justice  : cf. 43.25+. –  rendre la loi grande… v. 4,6 ; Dt 4.1-8.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a pris plaisir, à cause de sa justice,'
  - type: text
    content: à rendre la loi grande et magnifique.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'dans des fosses  : en modifiant légèrement la vocalisation traditionnelle du texte hébreu, qui porte les jeunes gens.'
  - type: text
    content: Et voilà un peuple pillé et dépouillé !
  - type: text
    content: On les a tous pris au piège dans des fosses,
  - type: text
    content: cachés dans des maisons de détention ;
  - type: text
    content: ils ont été pillés,
  - type: text
    content: et il n'y a personne pour les délivrer !
  - type: text
    content: ils sont dépouillés,
  - type: text
    content: 'et il n''y a personne pour dire : Restitue !'
  '23':
  - type: text
    content: Qui parmi vous prêtera l'oreille à cela ?
  - type: text
    content: Qui prêtera attention, pour écouter à l'avenir ?
  '24':
  - type: text
    content: ' '
  - type: note
    content: livré 43.28 ; 47.6. –  sa loi 5.24 ; 30.9.
  - type: text
    content: Qui a livré Jacob à ceux qui le dépouillent,
  - type: text
    content: et Israël aux pillards ?
  - type: text
    content: 'N''est-ce pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: contre qui nous avons péché ?
  - type: text
    content: Ils n'ont pas voulu suivre ses voies
  - type: text
    content: et ils n'ont pas écouté sa loi.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'sur Israël  : litt. sur lui. –  il n''a rien compris  : autre traduction il ne l''a pas su. –  dévoré 43.2. –  il n''a pas réfléchi ou il n''y a pas fait attention  ; litt. il n''a pas mis sur son cœur  ; cf. 46.8 ; 47.2 ; 57.1,11 ; Jr 12.11.'
  - type: text
    content: Aussi a-t-il versé sur Israël
  - type: text
    content: l'ardeur de sa colère
  - type: text
    content: et la violence de la guerre ;
  - type: text
    content: celle-ci l'a embrasé de toutes parts,
  - type: text
    content: et il n'a rien compris ;
  - type: text
    content: elle l'a dévoré,
  - type: text
    content: et il n'a pas réfléchi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'roseau 1R 14.15 ; 2R 18.21 ; Ez 29.6. –  qui ploie v. 4n  ; cf. 58.5-6n. –  mèche 43.17. –  qui vacille  : cf. v. 4 ; 61.3. –  loyalement  : autre traduction selon la vérité.'
  - type: text
    content: Il ne brisera pas le roseau qui ploie,
  - type: text
    content: il n'éteindra pas la mèche qui vacille ;
  - type: text
    content: il imposera loyalement l'équité.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'il ne ploiera pas  : en modifiant légèrement le texte hébreu traditionnel pour lire ici le même verbe qu''au v. 3 ; habituellement ce verbe est traduit par écraser (58.6 ; Dt 28.33 ; 1S 12.3s ; Os 5.11 ; Am 4.1) ou casser (pour un roseau, en 36.6 ; 2R 18.21 ; Ez 29.7 ; voir aussi Ec 12.6). Ici le texte hébreu pourrait signifier il ne courra pas ( ?). Certains interprètent il ne s''esquivera pas. –  îles 11.11+ ; 51.4.'
  - type: text
    content: Il ne vacillera pas,
  - type: text
    content: il ne ploiera pas,
  - type: text
    content: jusqu'à ce qu'il ait installé l'équité sur la terre ;
  - type: text
    content: les îles attendent sa loi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 44.24-28 ; 45.12s ; 48.13s. –  Dieu  : hébreu ’El , cf. 40.18n. –  ciel / déploie 40.22. –  étale  : le verbe correspondant est traduit par couvrir (d''or) en 40.19 ; mot de la même racine que l’ étendue de Gn 1.6n. –  productions 44.3 ; 48.19 ; 61.9 ; 65.23. –  la respiration (Gn 2.7n) / le souffle  : les deux termes hébreux sont synonymes et peuvent aussi signifier esprit.'
  - type: text
    content: 'Ainsi parle Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: celui qui crée le ciel et qui le déploie,
  - type: text
    content: celui qui étale la terre et ses productions,
  - type: text
    content: celui qui donne la respiration à ceux qui la peuplent
  - type: text
    content: 'et le souffle à ceux qui la parcourent :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'pour la justice ou selon la justice  ; cf. 41.2. –  je te préserve (cf. 48.6n) : certains modifient le texte hébreu traditionnel pour lire je te forme (formes verbales très proches en hébreu), de même en 49.8. Plusieurs versions anciennes ont lu au passé  : je t''ai préservé (ou formé ) , j''ai fait de toi l''alliance du peuple (40.7+) ; cf. Mt 26.28. –  lumière des nations 49.6 ; 51.4 ; Lc 2.32 ; Jn 8.12.'
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je t''ai appelé pour la justice'
  - type: text
    content: et je te prends par la main,
  - type: text
    content: je te préserve pour faire de toi
  - type: text
    content: l'alliance du peuple,
  - type: text
    content: la lumière des nations,
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ps 107.10-14 ; Mt 11.5/  ; Lc 1.79 ; Jn 9 ; Ac 26.18.
  - type: text
    content: pour ouvrir les yeux des aveugles,
  - type: text
    content: pour faire sortir de la forteresse le prisonnier
  - type: text
    content: et de la maison de détention les habitants des ténèbres.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '48.11. –  le Seigneur (YHWH)  : cf. Ex 3.15n. – Voir gloire. –  mon honneur  : autre traduction ma louange.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), c''est là mon nom ;'
  - type: text
    content: et je ne donnerai pas ma gloire à un autre
  - type: text
    content: ni mon honneur aux statues.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'passé / annonce 41.22+. –  est arrivé  : autre traduction s''est réalisé . –  du nouveau 43.19 ; 48.6. –  germe 43.19 ; 44.4 ; 45.8 ; 55.10 ; 58.8 ; 61.11.'
  - type: text
    content: 'Le passé est arrivé :'
  - type: text
    content: je vous annonce du nouveau ;
  - type: text
    content: avant que cela ne germe,
  - type: text
    content: je vous le fais entendre.
  - type: heading
    content: Le Seigneur intervient
