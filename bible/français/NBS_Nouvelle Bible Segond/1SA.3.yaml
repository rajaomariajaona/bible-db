document_id: 1SA.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu fait de Samuel son prophète
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: Vocation prophétique d'un enfant
        - type: text
          text: '  : cf. Jr 1.4-10 ; voir Mt 11.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le jeune Samuel… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La parole du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' était rare'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Am 8.11s ; Ps 74.9 ; l''adjectif hébreu peut aussi évoquer le côté précieux de ce qui est rare. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les visions n''étaient pas fréquentes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'étaient pas évidentes, n'apparaissaient pas de façon éclatante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; le sens du verbe hébreu n'est pas assuré.
      marker-yv: yv-n
    - type: text
      text: 'Le jeune Samuel officiait pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' devant Eli.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était rare en ces jours-là, les visions n''étaient pas fréquentes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' vint et se tint là'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 34.5 ; Nb 22.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Samuel ! Samuel ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ce double appel se retrouve dans plusieurs autres révélations importantes, p. ex. en Gn 22.11 ; Ex 3.4 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Daniel
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.37 (« Daniel ! Daniel ! »). LXX utilise le redoublement aux v. 4,6, mais pas au v. 10.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vint et se tint là. Il appela comme chaque fois : Samuel ! Samuel ! Samuel répondit : Parle ! Moi, ton serviteur, j''écoute. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quiconque…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les deux oreilles de quiconque l'entendra en tinteront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 21.12 ; Jr 19.3.'
      marker-yv: yv-n
    - type: text
      text: 'Alors le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Samuel : Je vais faire quelque chose en Israël ; quiconque en entendra parler en restera abasourdi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir 2.31 ; cf. Nb 23.19 ; Jos 23.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du début à la fin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: commencer et achever
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je réaliserai tout, sans rien omettre.
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là je réaliserai sur Eli tout ce que j''ai dit contre sa maison, du début à la fin. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je juge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je condamne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ez 11.10s ; 21.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ont méprisé Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après LXX et une indication des scribes, il s''agit selon toute vraisemblance du texte original ; le texte hébreu traditionnel porte, avec une construction boiteuse, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se sont méprisés eux-mêmes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sans doute pour éviter une expression jugée irrespectueuse envers Dieu) ; autre variante '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le méprisent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: repris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 23.13s ; Mt 10.37.'
      marker-yv: yv-n
    - type: text
      text: 'Je lui annonce que je juge sa maison pour toujours, à cause de la faute qu''il connaît : ses fils ont méprisé Dieu, et il ne les a pas repris. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiation
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 15.30s ; Es 22.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni par des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Hé 10.26 ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'égard des sacrifices et des offrandes.
      marker-yv: yv-n
    - type: text
      text: C'est pourquoi je jure, en ce qui concerne la maison d'Eli, qu'aucune expiation ne sera jamais faite pour la faute de la maison d'Eli, ni par des sacrifices ni par des offrandes.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'au matin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : LXX ajoute ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il se leva de bonne heure (et ouvrit…).
      marker-yv: yv-n
    - type: text
      text: 'Samuel resta couché jusqu''au matin, puis il ouvrit les portes de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Samuel avait peur de raconter la vision à Eli. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Mais Eli appela Samuel ; il dit : Samuel, mon fils ! Celui-ci répondit : Je suis là ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qu'est-ce qu'il t'a dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quelle est la parole qu'il t'a dite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que Dieu… ajoute cela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule de malédiction appelant un châtiment divin en cas de non-observance d''une obligation ; cf. 14.44 ; 20.13 ; 25.22 ; 2S 3.9,35 ; 1R 2.23 ; 19.2 ; 20.10 ; 2R 6.31 ; Rt 1.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction.'
      marker-yv: yv-n
    - type: text
      text: 'Eli demanda : Qu''est-ce qu''il t''a dit ? Je t''en prie, ne me cache rien. Que Dieu te fasse ceci et qu''il y ajoute cela, si tu me caches quoi que ce soit de tout ce qu''il t''a dit ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il fasse ce qui lui plaira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui est bon à ses yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2S 10.12 ; 15.26 ; 1Ch 19.13.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Samuel lui dit tout ; il ne lui cacha rien. Eli dit : C''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; qu''il fasse ce qui lui plaira !'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Samuel grandissait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' était avec lui'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 16.18 ; 17.37 ; 18.12-14 ; Nb 23.21 ; 2S 5.10 ; 2R 18.7 ; voir aussi Gn 26.3,24 ; 39.2 ; Jos 1.9 ; Es 43.2 ; Ps 23.4 ; Ac 7.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il ne laissait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aucune des paroles du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' ne restait sans effet'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le sujet pronominal '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut désigner soit Samuel (qui transmet fidèlement les messages du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: '), soit plutôt le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (qui veille à l''efficacité de ce qu''il annonce par son prophète) ; expressions comparables en Jos 21.45 ; Jg 2.19 ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: laisser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; 1R 8.56 ; 2R 10.10 ; Est 6.10 (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: négliger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Samuel grandissait, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était avec lui. Il ne laissait tomber à terre aucune de ses paroles. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il ne pouvait plus voir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.15 ; cf. Gn 27.1 ; 48.10 ; 1R 14.4.
      marker-yv: yv-n
    - type: text
      text: 'Un jour qu''Eli était couché à sa place – ses yeux commençaient à s''affaiblir, il ne pouvait plus voir ; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'depuis Dan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(à l''extrême nord) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jusqu''à Bersabée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(à l''extrême sud), c.-à-d. d''un bout à l''autre du pays ; cf. Jg 20.1 ; 2S 3.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'accrédité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: installé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant a été rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sûr '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'stable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2.35
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Voir aussi 2Ch 35.18 ; Ac 13.20 ; cf. Jn 4.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 12.6 ; 1R 18.22 ; 22.7.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi tout Israël, depuis Dan jusqu''à Bersabée, sut que Samuel était accrédité comme prophète du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Silo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
