document_id: 1SA.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu fait de Samuel son prophète
  - type: text
    content: ' '
  - type: note
    content: 'Vocation prophétique d''un enfant  : cf. Jr 1.4-10 ; voir Mt 11.25. –  Le jeune Samuel… 2.11n. –  La parole du Seigneur était rare  : cf. Am 8.11s ; Ps 74.9 ; l''adjectif hébreu peut aussi évoquer le côté précieux de ce qui est rare. –  les visions n''étaient pas fréquentes ou n''étaient pas évidentes, n''apparaissaient pas de façon éclatante  ; le sens du verbe hébreu n''est pas assuré.'
  - type: text
    content: 'Le jeune Samuel officiait pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' devant Eli.'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était rare en ces jours-là, les visions n''étaient pas fréquentes. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur vint et se tint là  : cf. Ex 34.5 ; Nb 22.9. –  Samuel ! Samuel ! ce double appel se retrouve dans plusieurs autres révélations importantes, p. ex. en Gn 22.11 ; Ex 3.4 ; Daniel grec 14.37 (« Daniel ! Daniel ! »). LXX utilise le redoublement aux v. 4,6, mais pas au v. 10.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vint et se tint là. Il appela comme chaque fois : Samuel ! Samuel ! Samuel répondit : Parle ! Moi, ton serviteur, j''écoute. '
  '11':
  - type: note
    content: 'quiconque…  : litt. les deux oreilles de quiconque l''entendra en tinteront  ; cf. 2R 21.12 ; Jr 19.3.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Samuel : Je vais faire quelque chose en Israël ; quiconque en entendra parler en restera abasourdi. '
  '12':
  - type: note
    content: 'Voir 2.31 ; cf. Nb 23.19 ; Jos 23.15. –  du début à la fin  : litt. commencer et achever  ; c.-à-d. je réaliserai tout, sans rien omettre.'
  - type: text
    content: 'En ce jour-là je réaliserai sur Eli tout ce que j''ai dit contre sa maison, du début à la fin. '
  '13':
  - type: note
    content: 'je juge  : autre traduction je condamne  ; cf. Ez 11.10s ; 21.35. –  ont méprisé Dieu  : d''après LXX et une indication des scribes, il s''agit selon toute vraisemblance du texte original ; le texte hébreu traditionnel porte, avec une construction boiteuse, se sont méprisés eux-mêmes (sans doute pour éviter une expression jugée irrespectueuse envers Dieu) ; autre variante le méprisent. –  repris  : cf. Pr 23.13s ; Mt 10.37.'
  - type: text
    content: 'Je lui annonce que je juge sa maison pour toujours, à cause de la faute qu''il connaît : ses fils ont méprisé Dieu, et il ne les a pas repris. '
  '14':
  - type: note
    content: 'expiation…  : cf. Nb 15.30s ; Es 22.14. –  ni par des sacrifices  : cf. Hé 10.26 ; on pourrait aussi comprendre à l''égard des sacrifices et des offrandes.'
  - type: text
    content: C'est pourquoi je jure, en ce qui concerne la maison d'Eli, qu'aucune expiation ne sera jamais faite pour la faute de la maison d'Eli, ni par des sacrifices ni par des offrandes.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'jusqu''au matin  : LXX ajoute ici il se leva de bonne heure (et ouvrit…).'
  - type: text
    content: 'Samuel resta couché jusqu''au matin, puis il ouvrit les portes de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Samuel avait peur de raconter la vision à Eli. '
  '16':
  - type: text
    content: 'Mais Eli appela Samuel ; il dit : Samuel, mon fils ! Celui-ci répondit : Je suis là ! '
  '17':
  - type: note
    content: 'Qu''est-ce qu''il t''a dit  : litt. quelle est la parole qu''il t''a dite, de même dans la suite. –  Que Dieu… ajoute cela  : formule de malédiction appelant un châtiment divin en cas de non-observance d''une obligation ; cf. 14.44 ; 20.13 ; 25.22 ; 2S 3.9,35 ; 1R 2.23 ; 19.2 ; 20.10 ; 2R 6.31 ; Rt 1.17n  ; voir bénédiction, malédiction.'
  - type: text
    content: 'Eli demanda : Qu''est-ce qu''il t''a dit ? Je t''en prie, ne me cache rien. Que Dieu te fasse ceci et qu''il y ajoute cela, si tu me caches quoi que ce soit de tout ce qu''il t''a dit ! '
  '18':
  - type: note
    content: 'qu''il fasse ce qui lui plaira  : litt. ce qui est bon à ses yeux  ; cf. 2S 10.12 ; 15.26 ; 1Ch 19.13.'
  - type: text
    content: 'Alors Samuel lui dit tout ; il ne lui cacha rien. Eli dit : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; qu''il fasse ce qui lui plaira !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Samuel grandissait  : cf. 2.11n. –  le Seigneur était avec lui  : cf. 16.18 ; 17.37 ; 18.12-14 ; Nb 23.21 ; 2S 5.10 ; 2R 18.7 ; voir aussi Gn 26.3,24 ; 39.2 ; Jos 1.9 ; Es 43.2 ; Ps 23.4 ; Ac 7.9. –  Il ne laissait…  : autre traduction aucune des paroles du Seigneur ne restait sans effet . Le sujet pronominal Il peut désigner soit Samuel (qui transmet fidèlement les messages du Seigneur), soit plutôt le Seigneur (qui veille à l''efficacité de ce qu''il annonce par son prophète) ; expressions comparables en Jos 21.45 ; Jg 2.19 ( laisser ) ; 1R 8.56 ; 2R 10.10 ; Est 6.10 ( négliger ).'
  - type: text
    content: 'Samuel grandissait, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec lui. Il ne laissait tomber à terre aucune de ses paroles. '
  '2':
  - type: note
    content: il ne pouvait plus voir 4.15 ; cf. Gn 27.1 ; 48.10 ; 1R 14.4.
  - type: text
    content: 'Un jour qu''Eli était couché à sa place – ses yeux commençaient à s''affaiblir, il ne pouvait plus voir ; '
  '20':
  - type: note
    content: 'depuis Dan (à l''extrême nord) jusqu''à Bersabée (à l''extrême sud), c.-à-d. d''un bout à l''autre du pays ; cf. Jg 20.1 ; 2S 3.10. –  accrédité ou installé  : le mot hébreu correspondant a été rendu par sûr et stable en 2.35n. Voir aussi 2Ch 35.18 ; Ac 13.20 ; cf. Jn 4.19. –  prophète du Seigneur Nb 12.6 ; 1R 18.22 ; 22.7.'
  - type: text
    content: 'Ainsi tout Israël, depuis Dan jusqu''à Bersabée, sut que Samuel était accrédité comme prophète du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '21':
  - type: note
    content: 'Silo  : cf. 1.3n. – Au lieu de à Silo, par la parole du Seigneur, LXX présente le texte suivant  : Eli était très vieux, et ses fils persévéraient dans leur mauvaise voie devant le Seigneur.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' continua d''apparaître à Silo : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se révélait à Samuel, à Silo, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: note
    content: 'pas encore éteinte  : selon Ex 27.20s ; Lv 24.2-4, la lampe sacrée du sanctuaire était allumée chaque soir et brillait durant toute la nuit ; cf. 2Ch 13.11. –  dans le temple  : on ne possède pas de description de l''architecture ni du mobilier du sanctuaire de Silo. –  le coffre de Dieu Ex 25.10-16 ; il symbolise la présence de Dieu au milieu de son peuple.'
  - type: text
    content: 'la lampe de Dieu n''était pas encore éteinte, et Samuel était couché dans le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' où était le coffre de Dieu – '
  '4':
  - type: note
    content: 'appela Samuel  : LXX a lu appela : « Samuel, Samuel ! »  ; cf. v. 10n. Voir aussi Es 45.4. –  Je suis là  : cf. Gn 22.1n  ; Ex 3.4 ; Es 6.8.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' appela Samuel. Il répondit : Je suis là ! '
  '5':
  - type: text
    content: 'Il courut vers Eli et dit : Je suis là ! Tu m''as appelé ? Eli répondit : Je n''ai pas appelé ; retourne te coucher ! Il alla donc se coucher. '
  '6':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' appela de nouveau Samuel. Samuel se leva, alla trouver Eli et dit : Je suis là ! Tu m''as appelé ! Eli répondit : Je n''ai pas appelé, mon fils ; retourne te coucher ! '
  '7':
  - type: note
    content: 'ne connaissait pas encore le Seigneur  : le encore répété confère à cette précision un sens très différent de l''affirmation apparemment semblable de 2.12.'
  - type: text
    content: 'Samuel ne connaissait pas encore le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne s''était pas encore révélée à lui.'
  '8':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' appela de nouveau Samuel, pour la troisième fois. Celui-ci se leva, alla trouver Eli et dit : Je suis là ! Tu m''as appelé ! Eli comprit alors que c''était le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui appelait le garçon. '
  '9':
  - type: note
    content: 's''il t''appelle  : autre traduction si on t''appelle.'
  - type: text
    content: 'Eli dit à Samuel : Va te coucher ; s''il t''appelle, tu diras : « Parle, '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; moi, ton serviteur, j''écoute. » Samuel alla donc se coucher à sa place.'
