document_id: PRO.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le but du livre
  - type: text
    content: ' '
  - type: note
    content: 'Maximes  : le mot hébreu mashal recouvre des genres littéraires très variés et peut, en conséquence, être traduit de diverses manières ( proverbe , 1S 10.12, d''où le titre traditionnel du livre ; mais aussi maxime , 1S 24.14 ; poème , Nb 23.7n  ; Ez 14.8n  ; Ps 78.2n  ; fable , Dt 28.37 ; Jb 17.6) ; LXX le rend ici (et dans le titre du livre) par le mot grec paroïmia (cf. Jn 10.6, discours figuré  ; 2P 2.22, proverbe ). Vg a traduit par paraboles , ce qui met en valeur l''aspect énigmatique ou pédagogique de certains proverbes. L''essentiel du livre (chap. 10ss) est composé de maximes ou de sentences , populaires (proverbes) ou reflétant l''expérience d''un milieu particulier (de la cour du roi au monde rural), exprimées en un seul vers comportant deux stiques qui mettent souvent en balance deux idées, opposées ou complémentaires. La racine hébraïque d''où vient le mot mashal peut évoquer une comparaison (Es 14.4n  ; Ps 28.1, être semblable  ; cf. Jb 30.19 ; 41.25n), mais elle peut aussi signifier (par homonymie, ou en vertu d''un rapport de sens ? cf. Es 28.14n) dominer, gouverner, exercer le pouvoir (Pr 6.7 ; 12.24 ; 16.32 ; 17.2 ; 19.10 ; 22.7 ; 23.1 ; 28.15 ; 29.2,12,26 ; voir aussi Gn 1.16n). –  Salomon… 1R 5.9-14.'
  - type: text
    content: Maximes de Salomon,
  - type: text
    content: fils de David, roi d'Israël,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Voir pécheurs. –  te duper  : autre traduction te séduire  ; même verbe en 16.29 ; 20.19 ; 24.28 ; 25.15. –  ne te laisse pas faire  : litt. ne le veuille pas  ; quelques mss portent n''y va pas  ; cf. Ps 1.1.'
  - type: text
    content: Mon fils, si des pécheurs veulent te duper,
  - type: text
    content: ne te laisse pas faire.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'embuscade / pièges v. 18 ; cf. Siracide 11.32 : « Une étincelle allume un brasier, les pièges du pécheur font couler le sang. » –  sans raison v. 17n.'
  - type: text
    content: 'S''ils disent : Viens avec nous,'
  - type: text
    content: dressons une embuscade, versons du sang,
  - type: text
    content: tendons sans raison des pièges à l'innocent,
  '12':
  - type: text
    content: ' '
  - type: note
    content: le séjour des morts 5.5 ; 7.27 ; 9.18 ; 15.11,24 ; 23.14 ; 27.20 ; 30.16 ; Nb 16.31-33n  ; Ps 6.6+ ; 55.16+ ; Jb 7.9n  ; Ec 9.10 ; voir aussi Es 14.9. –  descendent dans le gouffre Es 38.18 ; Ez 31.14-18 ; cf. Ps 28.1 ; 30.4 ; 88.5 ; 143.7.
  - type: text
    content: engloutissons-les vivants, comme le séjour des morts,
  - type: text
    content: tout entiers, comme ceux qui descendent dans le gouffre ;
  '13':
  - type: text
    content: nous trouverons toutes sortes de biens précieux,
  - type: text
    content: nous remplirons de butin nos maisons ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'tu auras ta part  : litt. tu feras tomber ton sort ou ton lot , même terme en 16.33 ; 18.18.'
  - type: text
    content: tu auras ta part au milieu de nous,
  - type: text
    content: il n'y aura qu'une bourse pour nous tous !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ne te mets pas en chemin… Ps 1.1. –  tes pieds  : litt. ton pied.'
  - type: text
    content: Mon fils, ne te mets pas en chemin avec eux,
  - type: text
    content: garde tes pieds de leur sentier ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: au mal ou au malheur 6.18 ; Es 59.7 ; Rm 3.15.
  - type: text
    content: car leurs pieds courent au mal,
  - type: text
    content: et ils ont hâte de répandre du sang.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. Il s''agit sans doute d''une comparaison, qu''on pourrait comprendre ainsi : les oiseaux, quand ils voient poser le piège, l''évitent (mais les mauvais n''ont pas cette intelligence et se tendent un piège à eux-mêmes, v. 18). –  en vain  : la même expression a été traduite par sans raison au v. 11.'
  - type: text
    content: Car c'est en vain qu'on jette le filet
  - type: text
    content: devant les yeux de tout ce qui a des ailes ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: Voir sang.
  - type: text
    content: eux, c'est contre leur propre sang qu'ils dressent une embuscade,
  - type: text
    content: c'est à leur propre vie qu'ils tendent des pièges.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'les voies  : certains modifient le texte hébreu traditionnel pour lire la fin ou l''avenir  ; cf. 15.27. – Les termes correspondant à avide et gain illicite sont apparentés en hébreu ; aussi 15.27. –  son maître (hébreu ba`al ) : autre traduction celui qui le possède.'
  - type: text
    content: 'Telles sont les voies de celui qui est avide d''un gain illicite :'
  - type: text
    content: il prend la vie de son maître.
  - type: heading
    content: Appel et avertissement de la sagesse
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'sagesse  : hébreu hokma  ; le terme peut désigner le savoir-faire ou l’ habileté de l''artisan (Ex 31.2ss ; 35.25s ; 36.8 ; 1R 7.14), du marin (Ps 107.27), du commerçant (Ez 28.4s) ou du paysan (cf. les proverbes ruraux comme 10.5 ; 12.10 ; 20.4 ; 25.14,23 ; 26.1 ; 27.23ss) comme l''aptitude intellectuelle du scribe (Jr 8.8s) ou l''adresse politique des conseillers du roi. La sagesse est habituellement fondée sur l''observation, la réflexion, l''expérience et l''enseignement. –  instruction  : hébreu mousar  ; ce mot peut aussi être traduit par correction (ou corriger , 3.11 ; 7.22 ; 12.1 ; 13.24 ; 15.5,10,32 ; 19.20,27 ; 22.15 ; 23.13 ; 24.32) ; cf. Jr 5.3+. –  intelligence  : le terme correspondant ( bina ) évoque peut-être plus spécialement la capacité d''analyse et de discernement ; cependant le texte enfile des quasi-synonymes, pratiquement interchangeables, entre lesquels il serait probablement illusoire de distinguer des nuances trop précises ; voir aussi 2.2n  ; 4.1.'
  - type: text
    content: pour connaître la sagesse et l'instruction,
  - type: text
    content: pour comprendre les paroles de l'intelligence,
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'La Sagesse  : le mot hébreu est ici au pluriel (de même en 9.1 ; 14.1 ; 24.7) ; 8.1-10 ; 9.3 ; Jn 7.37 ; cf. 8.22 ; Jr 5.1,12s ; 7.2 ; Am 6.1 ; 9.10 ; So 1.12.'
  - type: text
    content: La Sagesse crie dans les rues,
  - type: text
    content: sur les places elle fait retentir sa voix ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'bruyants  : autre traduction agités , cf. 7.11n  ; 20.1. –  elle crie…  : cf. Sagesse 6.14 : « Quiconque part tôt vers elle (la Sagesse) ne se fatiguera pas : il la trouvera assise à sa porte. » –  aux portes…  : litt. aux entrées des portes, dans la ville.'
  - type: text
    content: aux carrefours bruyants elle crie ;
  - type: text
    content: 'aux portes de la ville elle prononce ses paroles :'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Jusqu''à quand  : cf. Jr 4.14,21 ; 12.4 ; 31.22 ; 47.5. –  naïfs v. 4n. –  insolents  : traduction traditionnelle moqueurs  ; cf. 3.34 ; 9.7s,12 ; 13.1 ; 14.6,9 ; 15.12 ; 19.25,28s ; 20.1 ; 21.11,24 ; 22.10 ; 24.9 ; 29.8 ; cf. Es 28.14,22 ; 29.20. –  stupides  : même terme au v. 32 ; 3.35 ; 8.5 ; 10.1,18,23 ; 12.23 ; 13.16,19s ; 14.7s,16,24,33 ; 15.2,7,14,20 ; 17.10,12,16,21,24s ; 18.2,6s ; 19.1,10,13,29 ; 21.20 ; 23.9 ; 26.1ss ; 28.26 ; 29.11,20 ; Ps 49.11 ; 92.7 ; 94.8 ; Ec 2.14+.'
  - type: text
    content: Jusqu'à quand, naïfs, aimerez-vous la naïveté ?
  - type: text
    content: Jusqu'à quand les insolents se plairont-ils à l'insolence
  - type: text
    content: et les gens stupides détesteront-ils la connaissance ?
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'avertissements ou réprimandes v. 25,30 ; 3.11 ; 5.12 ; 6.23 ; 10.17 ; 12.1 ; 13.18 ; 15.5,10,31s ; 27.5 ; 29.1,15. Le mot hébreu est aussi traduit par réplique (Ps 38.15), châtiment (ou châtier , Ps 39.12 ; 73.14), défense (Jb 13.6n). –  Je répandrai ou je ferai jaillir (cf. 18.4) ; la même forme verbale est traduite par éructer en 15.2,28 ; cf. Ps 19.3n. –  mon souffle ou mon esprit  : cf. Jb 32.8 ; voir aussi Es 11.1-4 ; Jl 3.'
  - type: text
    content: Revenez à mes avertissements !
  - type: text
    content: Je répandrai sur vous mon souffle,
  - type: text
    content: je vous ferai connaître mes paroles…
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai appelé Es 65.12 ; 66.4 ; Jr 7.13. –  j''ai tendu la main  : cf. Es 65.2 ; Ac 26.1.'
  - type: text
    content: Puisque j'ai appelé et que vous avez résisté,
  - type: text
    content: puisque j'ai tendu la main et que personne n'y a prêté attention,
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'vous avez rejeté  : cf. Ps 107.11. –  conseils  : cf. v. 30 ; 8.14 ; 12.15 ; 19.20 ; 20.18 ; 21.30 ; 27.9.'
  - type: text
    content: puisque vous avez rejeté tous mes conseils
  - type: text
    content: et que vous avez fait peu de cas de mes avertissements,
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'je rirai  : cf. Dt 28.63 ; Ps 2.4. –  quand la catastrophe…  : litt. à votre catastrophe . Cf. Jr 11.11 ; 23.19 ; Mi 3.4.'
  - type: text
    content: à mon tour, je rirai, quand la catastrophe s'abattra sur vous,
  - type: text
    content: je me moquerai, quand la frayeur viendra sur vous
  '27':
  - type: text
    content: – quand la frayeur viendra sur vous comme une tourmente,
  - type: text
    content: lorsque la catastrophe arrivera sur vous comme un ouragan,
  - type: text
    content: quand la détresse et le désarroi arriveront sur vous.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'ils m''appelleront…  : cf. Es 1.15 ; Jr 11.11 ; 14.12 ; Ez 8.18 ; Os 5.6 ; Mi 3.4 ; Jn 7.34.'
  - type: text
    content: Alors ils m'appelleront et je ne répondrai pas ;
  - type: text
    content: ils me chercheront et ne me trouveront pas.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 6.19. –  crainte du Seigneur  : cf. v. 7n.'
  - type: text
    content: Parce qu'ils ont détesté la connaissance
  - type: text
    content: 'et qu''ils n''ont pas choisi la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'équité  : hébreu mishpath  ; le terme correspondant est souvent traduit par droit, justice ou jugement (Dt 1.17) ; au pluriel, règles (Ex 21.1 ; Dt 4.8). –  droiture  : même terme en 2.9 ; 8.6 ; 23.16,31 ; autre terme apparenté en 2.13 ; 4.11 ; 11.24 ; 14.2 ; 17.26.'
  - type: text
    content: pour recevoir l'instruction du bon sens,
  - type: text
    content: – justice, équité et droiture –
  '30':
  - type: text
    content: ' '
  - type: note
    content: conseils v. 25n. –  avertissements v. 23n.
  - type: text
    content: parce qu'ils n'ont pas voulu de mes conseils
  - type: text
    content: et qu'ils ont méprisé tous mes avertissements,
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'ils mangeront…  : cf. 18.21 ; 26.27 ; 28.10 ; Ps 7.15-17 ; Sagesse 11.16 : « On est puni par où l''on a péché. » –  leur voie  : autre traduction leur conduite.'
  - type: text
    content: ils mangeront le fruit de leur voie
  - type: text
    content: et ils seront rassasiés de leurs propres conseils,
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.36 ; Am 6.1 ; voir aussi Jr 5.12s. –  égarement  : le terme hébreu est aussi traduit par infidélité (cf. Jr 3.8 ; 5.6).'
  - type: text
    content: car l'égarement des naïfs les tue,
  - type: text
    content: l'insouciance des gens stupides les perd ;
  '33':
  - type: text
    content: mais celui qui m'écoute demeurera en sécurité,
  - type: text
    content: il vivra tranquille, sans que le malheur l'effraie.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'naïfs v. 22,32 ; 7.7 ; 8.5 ; 9.4,13,16 ; 14.15 ; 19.25 ; 21.11 ; 22.3 ; 27.12 ; on a rapproché ce terme du verbe traduit par duper au v. 10n. –  un esprit avisé  : cf. 8.5,12 ; 10.5 ; 12.16,23 ; 13.16 ; 14.8,15,18 ; 15.5 ; 19.25 ; 22.3 ; 27.12 ; ce terme peut évoquer une saine prudence ou, en mauvaise part, la ruse (cf. Gn 3.1n  ; Jb 5.12s ; 15.5). –  réflexion 2.11 ; 3.21 ; 5.2 ; 8.12 ; cf. 12.2n.'
  - type: text
    content: pour donner aux naïfs un esprit avisé,
  - type: text
    content: au jeune homme de la connaissance et de la réflexion.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Que le sage… 22.17 ; Ec 9.17. –  savoir 4.2 ; 7.21 ; 9.9 ; 16.21,23. –  acquerra 4.5+. –  l''art de diriger  : même terme en 11.14 ; 12.5 ( stratégie ) ; 20.18 ; 24.6 ; Jb 37.12 ( diriger ).'
  - type: text
    content: Que le sage écoute, et il augmentera son savoir,
  - type: text
    content: et celui qui est intelligent acquerra l'art de diriger ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'maximes et sentences  : autre traduction une maxime (v. 1n) et une sentence (sur le terme correspondant, cf. Ha 2.6n).'
  - type: text
    content: pour comprendre maximes et sentences,
  - type: text
    content: les paroles des sages et leurs énigmes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'crainte du Seigneur v. 29 ; 2.5 ; 8.13 ; 9.10 ; 10.27 ; 14.2 ; 15.16,33 ; 16.6 ; 19.23 ; 22.4 ; 23.17 ; Ps 111.10 ; Jb 28.28 ; Siracide 1.14 : « Le commencement de la sagesse, c''est la crainte du Seigneur, pour les fidèles, elle a été créée avec eux dans le sein maternel. » 25.11 : « La crainte du Seigneur surpasse toute chose : celui qui la possède, à qui peut-on le comparer ? » –  imbéciles  : cf. 10.14,21 ; 11.29 ; 12.15s ; 14.3,9 ; 15.5 ; 16.22 ; 17.28 ; 20.3 ; 24.7 ; 27.3,22 ; 29.9.'
  - type: text
    content: 'La crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est le commencement de la connaissance ;'
  - type: text
    content: la sagesse et l'instruction, voilà ce que les imbéciles méprisent.
  - type: heading
    content: Mise en garde contre les mauvais garçons
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Mon fils  : l''expression peut s''adresser, outre au fils (ou au petit-fils) proprement dit, à l''élève ou au disciple d''un maître. –  écoute 2.2 ; 4.1,10 ; 7.24 ; 13.1 ; 19.20 ; 22.17 ; 23.19,22 ; cf. 4.20 ; 5.1 ; 7.1. –  l''enseignement  : hébreu tora  ; hors des Proverbes (voir aussi Jb 22.22n) ce mot est habituellement traduit par loi  ; il tire ses différents sens d''une racine verbale qui peut signifier enseigner, éduquer . Cf. 3.1 ; 4.2 ; 6.20,23 ; 7.2 ; 13.14 ; 28.4,7,9 ; 29.18 ; 31.26 ; Ex 12.49n  ; Dt 4.44. –  ta mère  : cf. 4.3 ; 6.20 ; 10.1 ; 15.20 ; 17.25 ; 19.26 ; 20.20 ; 23.22,25 ; 28.24 ; 29.15 ; 30.11,17 ; 31.1.'
  - type: text
    content: Mon fils, écoute l'instruction de ton père,
  - type: text
    content: et ne délaisse pas l'enseignement de ta mère ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'parure  : autre traduction ruban (cf. 4.9) ; Sagesse 5.16 : « Aussi recevront-ils (les justes) la royauté splendide et le diadème magnifique de la main du Seigneur. » –  des colliers  : cf. Siracide 6.24-29 : « Mets tes pieds dans ses entraves (celles de la sagesse), et ton cou dans son carcan… Alors ses entraves seront pour toi une protection puissante, et son carcan un vêtement glorieux. »'
  - type: text
    content: car c'est une parure gracieuse pour ta tête,
  - type: text
    content: ce sont des colliers pour ton cou.
