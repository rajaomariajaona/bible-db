      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Barnabé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 4.36+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 2.13+.
      marker-yv: yv-n
    - type: text
      text: 'Ensuite, quatorze ans plus tard, je suis remonté à Jérusalem avec Barnabé, et j''ai aussi pris Tite avec moi. '
