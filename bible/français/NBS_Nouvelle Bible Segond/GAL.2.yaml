        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adopter les coutumes '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juives
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: judaïser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe grec correspondant n''apparaît qu''ici dans le N.T.'
      marker-yv: yv-n
    - type: text
      text: 'Quand j''ai vu qu''ils ne marchaient pas droit au regard de la vérité de la bonne nouvelle, j''ai dit à Céphas, devant tout le monde : « Si toi, qui es juif, tu vis à la manière des non-Juifs et non à la manière des Juifs, comment peux-tu contraindre les non-Juifs à adopter les coutumes juives ? »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Juifs et non-Juifs sont sauvés par la foi
    marker-yv: yv-h
