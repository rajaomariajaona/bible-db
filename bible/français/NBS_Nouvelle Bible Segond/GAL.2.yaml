        - type: text
          text: 'quatorze ans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 2Co 12.2) : le point de départ de cette période est incertain ; cf. Ga 1.15ss,18,21. –  '
      - type: usfm
