      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devant tous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Tm 5.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'contraindre les non-Juifs… '
      - type: usfm
        marker: ft
        children:
