      marker-yv: yv-n
    - type: text
      text: 'Sachant que l''être humain n''est pas justifié en vertu des œuvres de la loi, mais au moyen de la foi de Jésus-Christ, nous aussi nous avons mis notre foi en Jésus-Christ, afin d''être justifiés en vertu de la foi du Christ et non pas des œuvres de la loi – car personne ne sera justifié en vertu des œuvres de la loi. '
