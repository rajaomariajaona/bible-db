document_id: GAL.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Accord de Paul et des autres apôtres
  - type: text
    content: ' '
  - type: note
    content: 'quatorze ans (cf. 2Co 12.2) : le point de départ de cette période est incertain ; cf. Ga 1.15ss,18,21. –  à Jérusalem  : cf. Ac 15.2-4. –  Barnabé Ac 4.36+. –  Tite 2Co 2.13+.'
  - type: text
    content: 'Ensuite, quatorze ans plus tard, je suis remonté à Jérusalem avec Barnabé, et j''ai aussi pris Tite avec moi. '
  '10':
  - type: note
    content: Cf. Ac 11.29s ; Rm 15.25-31 ; 1Co 16.1ss ; 2Co 8–9.
  - type: text
    content: nous devions seulement nous souvenir des pauvres, ce que j'ai fait avec empressement.
  - type: heading
    content: Paul s'oppose à Pierre
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'à Antioche  : cf. Ac 11.19-27. –  ouvertement  : litt. en face . –  il avait tort  : litt. il était condamné.'
  - type: text
    content: 'Mais lorsque Céphas est venu à Antioche, je me suis opposé à lui ouvertement, parce qu''il avait tort. '
  '12':
  - type: note
    content: 'de chez Jacques  : autre traduction de la part de Jacques, cf. Ac 15.1,24. –  il mangeait avec les non-Juifs 1.16n  ; Ac 10.28,45n  ; 11.3 ; cf. Jubilés 22.16 : « Sépare-toi des nations, ne mange pas avec elles, n''agis pas selon leurs manières, et ne deviens pas leur semblable, car leurs actes sont impurs et toute leur conduite est abominable. » –  des circoncis  : litt. de ceux de la circoncision  ; v. 8 ; Col 4.11 ; Tt 1.10.'
  - type: text
    content: 'En effet, avant la venue de quelques personnes de chez Jacques, il mangeait avec les non-Juifs ; mais après leur venue il s''est esquivé et s''est tenu à l''écart, par crainte des circoncis. '
  '13':
  - type: note
    content: 'sont entrés dans ce jeu  : le verbe correspondant n''apparaît qu''ici dans le N.T. ; il est apparenté au mot qui est traduit dans la suite par double jeu, et ailleurs par hypocrisie  ; voir Mt 6.2n. –  Barnabé lui-même v. 1+,9 ; cf. Ac 15.36-39.'
  - type: text
    content: 'Les autres Juifs aussi sont entrés dans ce jeu, au point que Barnabé lui-même s''est laissé entraîner par leur double jeu. '
  '14':
  - type: note
    content: 'Cf. v. 4s ; 3.28 ; 5.11. –  qu''ils ne marchaient pas droit…  : autre traduction qu''ils n''allaient pas droit à la vérité… –  devant tout le monde  : litt. devant tous 1Tm 5.20. –  contraindre les non-Juifs… v. 3+ ; 1.16n. –  adopter les coutumes juives  : litt. judaïser  ; le verbe grec correspondant n''apparaît qu''ici dans le N.T.'
  - type: text
    content: 'Quand j''ai vu qu''ils ne marchaient pas droit au regard de la vérité de la bonne nouvelle, j''ai dit à Céphas, devant tout le monde : « Si toi, qui es juif, tu vis à la manière des non-Juifs et non à la manière des Juifs, comment peux-tu contraindre les non-Juifs à adopter les coutumes juives ? »'
  - type: heading
    content: Juifs et non-Juifs sont sauvés par la foi
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Voir juifs . –  de naissance ou par nature , cf. 4.8 ; Ep 2.3n. –  de ces pécheurs de non-Juifs  : litt. des pécheurs d''entre les nations (ou les païens ) ; cf. v. 17 ; 1.16n  ; Ep 2.12 ; voir aussi Mc 2.15ss/ /.'
  - type: text
    content: 'Nous, nous sommes juifs de naissance, nous ne sommes pas de ces pécheurs de non-Juifs. '
  '16':
  - type: note
    content: 'justifié Rm 3.24+. –  des œuvres de la loi  : litt. d''œuvres de loi 3.2,11 ; Rm 3.28 ; l''expression hébraïque correspondante apparaît déjà dans un écrit de Qumrân (Lettre halakhique ou 4QMMT), mais dans un sens différent (préceptes de la loi). –  la foi de Jésus-Christ  : litt. une foi de Jésus-Christ, de même plus loin une foi de Christ  ; il faut sans doute comprendre, non la foi qu''avait Jésus, mais une foi déterminée par Jésus-Christ, par opposition aux œuvres de la loi  ; de même v. 20 ; 3.22 ; Rm 3.22n  ; cf. Ga 5.19 ; voir aussi Ac 3.16n  ; Ph 3.9n. –  en vertu de la foi 3.8,24 ; Rm 4.5 ; 5.1 ; Ep 2.8s ; Ph 3.9. –  personne  : litt. toute chair, hébraïsme ; on comprend naturellement aucune chair (c.-à-d. personne) ne sera justifiée… mais on pourrait aussi comprendre toute chair (c.-à-d. toute personne) ne sera pas justifiée…  ; cf. Gn 6.12 ; Ps 143.2 ; Rm 3.20.'
  - type: text
    content: 'Sachant que l''être humain n''est pas justifié en vertu des œuvres de la loi, mais au moyen de la foi de Jésus-Christ, nous aussi nous avons mis notre foi en Jésus-Christ, afin d''être justifiés en vertu de la foi du Christ et non pas des œuvres de la loi – car personne ne sera justifié en vertu des œuvres de la loi. '
  '17':
  - type: note
    content: 'nous étions nous aussi trouvés pécheurs v. 15+ ; cf. 1Co 9.21. –  serviteur (ou ministre, cf. Mt 20.26nss ; Rm 15.8) du péché  : cf. Ga 2.21 ; voir aussi Mt 11.19.'
  - type: text
    content: 'Mais si, en cherchant à être justifiés dans le Christ, nous étions nous aussi trouvés pécheurs, le Christ serait alors serviteur du péché ? Jamais de la vie ! '
  '18':
  - type: note
    content: 'détruit ou aboli, cf. Mt 5.17+ ; Rm 3.31 ; voir aussi 4.15. –  je montre…  : cf. 2Co 3.1n.'
  - type: text
    content: 'Si je reconstruis ce que j''ai détruit, je montre que je suis un transgresseur ; '
  '19':
  - type: note
    content: 'mort pour la loi / vivre pour Dieu Rm 6.10s ; 7.4-6 ; 14.8. –  crucifié avec le Christ  : cf. 5.24 ; 6.14 ; Rm 6.6,8.'
  - type: text
    content: 'en effet, par la loi, je suis moi-même mort pour la loi, afin de vivre pour Dieu. Je suis crucifié avec le Christ : '
  '2':
  - type: note
    content: 'révélation  : cf. 1.12,16+ ; 2Co 12.1. –  que je proclame 5.11 ; Mc 1.4n  ; 1Co 15.11s. –  non-Juifs 1.16n. –  aux gens les plus considérés  : cf. v. 6,9. –  en vain 4.11 ; 1Co 15.2+,10n  ; cf. Ph 2.16.'
  - type: text
    content: 'J''y suis monté par suite d''une révélation. Je leur ai exposé la bonne nouvelle que je proclame parmi les non-Juifs ; je l''ai exposée en privé aux gens les plus considérés, de peur de courir ou d''avoir couru en vain. '
  '20':
  - type: note
    content: 'plus moi  : cf. 3.26-28. –  le Christ qui vit en moi Rm 8.10+. –  ma vie présente…  : litt. ce que je vis maintenant en chair 2Co 10.3 ; Ph 1.22. –  la foi du Fils  : litt. une foi (qui est) celle du Fils, voir v. 16n  ; cf. Ep 3.17. –  qui m''a aimé Jn 13.1 ; 2Co 5.14s ; 1Jn 3.16. –  s''est livré  : cf. 1.4+ ; 1Tm 2.6.'
  - type: text
    content: 'ce n''est plus moi qui vis, c''est le Christ qui vit en moi ; ma vie présente dans la chair, je la vis dans la foi du Fils de Dieu, qui m''a aimé et qui s''est livré lui-même pour moi. '
  '21':
  - type: note
    content: 'Je ne rejette pas  : autre traduction je n''annule pas  ; cf. 5.4. – Voir grâce. –  justice 3.21 ; 5.4 ; Rm 1.17+. –  mort pour rien  : cf. v. 17.'
  - type: text
    content: Je ne rejette pas la grâce de Dieu ; car si la justice est par la loi, alors le Christ est mort pour rien.
  '3':
  - type: note
    content: 'Tite, qui était avec moi v. 1+ ; 2Co 8.23. –  grec, peut-être au sens très général de non juif, cf. 3.28+ ; Rm 1.14n. –  même pas été contraint  : cf. v. 14 ; 6.12 ; Ac 15.1ss.'
  - type: text
    content: 'Mais Tite, qui était avec moi, et qui était grec, n''a même pas été contraint de se faire circoncire. '
  '4':
  - type: note
    content: 'Tout cela…  : la phrase est incomplète et sa relation au contexte est incertaine ; il s''agit peut-être d''un commentaire général sur les motifs de la venue de Paul à Jérusalem (v. 1-3) ; quelques-uns rattachent plus particulièrement l''explication au v. 3  : … même pas été contraint de se faire circoncire à cause des (ou malgré les) faux frères… –  des intrus…  : cf. 1.7 ; Ac 15.1,24 ; Jd 4. –  introduits  : cf. Rm 5.20n. –  liberté / asservir  : cf. 5.1+.'
  - type: text
    content: '– Tout cela à cause des faux frères, des intrus qui s''étaient introduits parmi nous pour épier la liberté que nous avons en Jésus-Christ, avec l''intention de nous asservir ; '
  '5':
  - type: note
    content: 'la vérité de la bonne nouvelle  : cf. v. 14 ; 4.16+ ; Ep 1.13. –  pour vous  : autre traduction chez vous.'
  - type: text
    content: à ceux-là nous n'avons pas cédé un seul instant, nous ne nous sommes pas soumis, afin que la vérité de la bonne nouvelle demeure pour vous.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'considérés (v. 2,9) comme des gens importants  : litt. (pour) être quelque chose v. 2+ ; formule analogue 6.3 ; cf. Ac 5.36. –  Dieu n''est pas partial  : litt. Dieu n''accueille pas la face d''un homme  ; cf. Lc 20.21 ; Ac 10.34n  ; voir aussi Dt 10.17n  ; Rm 2.11. –  ne m''ont rien imposé  : autre traduction ne m''ont rien demandé de plus.'
  - type: text
    content: 'Quant à ceux qui étaient considérés comme des gens importants – ce qu''ils étaient autrefois m''est bien égal : Dieu n''est pas partial ! – ces gens considérés ne m''ont rien imposé. '
  '7':
  - type: note
    content: 'que la bonne nouvelle m''avait été confiée  : cf. 1Tm 1.11+ ; litt. que la bonne nouvelle de l''incirconcision m''avait été confiée comme à Pierre de la circoncision. –  pour les incirconcis  : cf. 1.15s ; Ac 9.15 ; 15.12 ; 22.21 ; Rm 1.5s ; 15.15-19 ; Ep 3.8 ; 1Tm 2.7. –  Pierre  : ce nom n''apparaît, dans les épîtres de Paul, qu''ici et au v. 8 ; cf. 1.18n.'
  - type: text
    content: 'Au contraire, lorsqu''ils ont vu que la bonne nouvelle m''avait été confiée pour les incirconcis, comme à Pierre pour les circoncis '
  '8':
  - type: note
    content: 'Voir apôtre. –  auprès des circoncis  : litt. de la circoncision.'
  - type: text
    content: '– car celui qui avait été à l''œuvre en Pierre pour l''apostolat auprès des circoncis avait aussi été à l''œuvre en moi auprès des non-Juifs – '
  '9':
  - type: note
    content: 'la grâce qui m''avait été accordée Rm 1.5+. –  Jacques 1.19+. –  Céphas 1.18n. –  Jean Mc 1.19+. –  considérés v. 2+. –  colonnes  : il s''agit probablement d''un titre donné aux principaux responsables de l''Eglise de Jérusalem ; il évoque peut-être l''image du temple  ; cf. 1Tm 3.15 ; Ap 3.12 ; Règle annexe de la Communauté (Qumrân) 1.12 : « A l''âge de vingt-cinq ans, il (le jeune membre de la communauté) pourra venir prendre place parmi les fondements de la Congrégation sainte pour assurer le service de la Congrégation. » –  communion ou solidarité 6.6n  ; Ac 2.42n  ; 2Co 8.4n.'
  - type: text
    content: 'et lorsqu''ils ont reconnu la grâce qui m''avait été accordée, alors Jacques, Céphas et Jean, qui étaient considérés comme des colonnes, nous ont donné la main droite, à Barnabé et à moi, en signe de communion : nous irions, nous, vers les non-Juifs, et eux vers les circoncis ; '
