          - type: text
            text: n
        - type: text
          text: '  ; Ac 10.28,45'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.3 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Jubilés
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.16 : « Sépare-toi des nations, ne mange pas avec elles, n''agis pas selon leurs manières, et ne deviens pas leur semblable, car leurs actes sont impurs et toute leur conduite est abominable. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: circoncis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ceux de la circoncision
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; v. 8 ; Col 4.11 ; Tt 1.10.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, avant la venue de quelques personnes de chez Jacques, il mangeait avec les non-Juifs ; mais après leur venue il s''est esquivé et s''est tenu à l''écart, par crainte des circoncis. '
