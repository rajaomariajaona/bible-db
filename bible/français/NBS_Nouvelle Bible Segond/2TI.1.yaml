      text: C'est aussi pour cette cause que j'endure ces souffrances ; mais je n'en ai pas honte, car je sais bien en qui j'ai placé ma foi, et je suis persuadé que celui-là a le pouvoir de garder ce qui m'a été confié jusqu'à ce jour-là.
