document_id: 2TI.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: '1Tm 1.1+. – Voir apôtre . –  par la volonté de Dieu 1Co 1.1 ; 2Co 1.1 ; Ep 1.1 ; Col 1.1. –  la promesse…  : cf. 1Jn 2.25 ; voir aussi Ac 1.4+ ; Rm 1.2 ; Ga 3.14 ; Ep 1.13. –  de la vie  : cf. Ph 2.16 ; 1Tm 4.8 ; 6.19 ; Tt 1.2 ; Jc 1.12. –  en Jésus-Christ v. 9,13 ; 2.1,10 ; 3.12,15 ; cf. Rm 8.2 ; Ga 2.20 ; 3.27 ; Ph 1.21 ; Col 3.4.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, selon la promesse de la vie qui est en Jésus-Christ, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 's''est… manifestée  : litt. a été manifestée cf. Rm 16.26 ; 1Tm 3.16 ; Tt 1.3 ; 1P 1.20 ; voir aussi Ep 1.9s. –  manifestation 1Tm 6.14+ ; cf. Tt 2.11 ; 3.4. –  notre Sauveur (1Tm 1.1+) , Jésus-Christ Lc 2.11 ; Ep 5.23 ; Ph 3.20 ; Tt 1.4 ; 2.13 ; 3.6 ; 2P 1.11. –  réduit à rien (Rm 3.3+) la mort 1Co 15.26 ; Hé 2.14s ; cf. Rm 6.5s. –  mis en lumière  : cf. Ep 3.9 ; voir aussi Jn 1.4ss ; Ac 26.23 ; Ep 1.18 ; 5.14 ; Ap 21.23 ; 22.5. –  la vie (cf. 1Tm 6.19) et l''impérissable  : cf. Rm 1.23+ ; 2.7 ; 1Co 15.42,50,53ss ; Ep 6.24 ; 1Tm 1.17n.'
  - type: text
    content: – cette grâce qui s'est maintenant manifestée
  - type: text
    content: par la manifestation de notre Sauveur, Jésus-Christ,
  - type: text
    content: qui a réduit à rien la mort
  - type: text
    content: et mis en lumière la vie et l'impérissable par la bonne nouvelle.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1Tm 2.7n  ; après maître (au sens d’ enseignant ), certains mss ajoutent des nations , c.-à-d. des non-Juifs . Voir aussi apôtre.
  - type: text
    content: 'C''est pour cette bonne nouvelle que, moi, j''ai été institué héraut, apôtre et maître. '
  '12':
  - type: note
    content: 'pour cette cause v. 6n. –  souffrances v. 8 ; cf. 1P 4.16. –  pas honte v. 8+. –  je sais bien (autre traduction je connais celui) en qui j''ai placé ma foi  : cf. 4.17s ; Ac 16.34 ; Tt 3.8 ; 1Jn 4.16. –  persuadé v. 5+. –  a le pouvoir Rm 4.21 ; 11.23 ; 2Co 9.8. –  ce qui m''a été confié  : litt. mon dépôt  ; on pourrait aussi comprendre ce que je lui ai confié  ; cf. v. 14+ ; voir aussi 2.8n  ; Lc 23.46 ; Ac 14.23 ; 20.32 ; 1P 1.4 ; 4.19. –  ce jour-là  : cf. v. 18 ; 4.8 ; Mt 7.22 ; Lc 17.24 ; Rm 13.12 ; 14.10 ; Ph 1.6,10 ; 2Th 1.10.'
  - type: text
    content: C'est aussi pour cette cause que j'endure ces souffrances ; mais je n'en ai pas honte, car je sais bien en qui j'ai placé ma foi, et je suis persuadé que celui-là a le pouvoir de garder ce qui m'a été confié jusqu'à ce jour-là.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.2 ; 3.10. –  dans la foi…  : cette portion de phrase pourrait aussi se rattacher à la fin du v. que tu as entendues de moi dans la foi et dans l''amour qui est (ou qui sont ) en Jésus-Christ  ; cf. 1Tm 1.14+ ; voir aussi 4.12 ; Tt 2.7. –  saines paroles 1Tm 1.10+ ; 6.3.'
  - type: text
    content: 'Retiens, dans la foi et dans l''amour qui est en Jésus-Christ, le modèle des saines paroles que tu as entendues de moi. '
  '14':
  - type: note
    content: 'toutes les belles choses…  : litt. le beau (1Tm 1.8n) dépôt  ; cf. v. 12n  ; 1Tm 6.20n. –  l''Esprit saint (cf. v. 7 ; Tt 3.5) qui habite en nous  : cf. v. 5+ ; voir aussi Jn 16.4 ; Rm 8.11 ; 1Co 12.4ss.'
  - type: text
    content: Garde toutes les belles choses qui t'ont été confiées au moyen de l'Esprit saint qui habite en nous.
  - type: heading
    content: Fidélité d'Onésiphore et de sa maison
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.17 ; 4.10,16 ; voir aussi Ph 1.12ss. –  tous ceux qui sont en Asie  : autre traduction qui viennent d''Asie , c.-à-d. de la région d''Ephèse ; cf. Ac 16.6n. –  m''ont abandonné ou se sont détournés de moi , même verbe Tt 1.14 ; Hé 12.25 ; cf. Mc 14.50/ / ; Jn 6.66.'
  - type: text
    content: 'Tu sais que tous ceux qui sont en Asie m''ont abandonné ; Phygèle et Hermogène sont de ce nombre. '
  '16':
  - type: note
    content: 'compassion  : cf. Lc 1.72 ; Jc 2.13. –  la maison d''Onésiphore 4.19 ; cf. 1Co 16.15 ; Ga 6.10 ; 1Tm 3.4s,12 ; Tt 1.11 ; Phm 2. –  souvent réconforté (ou, plus littéralement, rafraîchi  ; terme apparenté Ac 3.20) : cf. Col 4.11 (autre terme) ; voir aussi Mt 25.36 ; Hé 10.34 ; 13.3. –  pas eu honte v. 8+. –  de mes chaînes  : litt. de ma chaîne 2.9 ; Ac 28.20 ; Ep 6.20 ; Ph 1.7+.'
  - type: text
    content: 'Que le Seigneur accorde sa compassion à la maison d''Onésiphore, car il m''a souvent réconforté et il n''a pas eu honte de mes chaînes ; '
  '17':
  - type: note
    content: 'empressement  : cf. 4.9n  ; Ph 2.28 ; Tt 3.12ns. –  m''a trouvé  : cf. v. 18 ; Ac 28.30.'
  - type: text
    content: 'au contraire, lorsqu''il est venu à Rome, il m''a cherché avec empressement et il m''a trouvé. '
  '18':
  - type: note
    content: 'Seigneur  : les deux occurrences du mot désignent peut-être respectivement le Christ et Dieu, ou l''inverse (cf. 4.1). –  trouver  : cf. v. 17. –  compassion… du Seigneur Jd 21. –  en ce jour-là v. 12+ ; cf. Lc 14.14 ; 1Co 4.5. –  combien… il a rendu (ou, selon certains mss, il m''a rendu) de services  : on pourrait aussi traduire quel ministère il a exercé (à Ephèse) ; cf. 1Tm 3.10n,13.'
  - type: text
    content: Que le Seigneur lui accorde de trouver compassion auprès du Seigneur en ce jour-là. Toi-même tu sais mieux que personne combien, à Ephèse, il a rendu de services.
  '2':
  - type: note
    content: '1Tm 1.2+. –  mon enfant bien-aimé  : cf. 2.1 ; 1Co 4.14,17 ; Ph 2.20ss. –  Grâce / paix… Rm 1.7+.'
  - type: text
    content: 'à Timothée, mon enfant bien-aimé : Grâce, compassion et paix de la part de Dieu, le Père, et de Jésus-Christ, notre Seigneur !'
  - type: heading
    content: Reconnaissance envers Dieu
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis plein de gratitude 1Tm 1.12n. –  à la suite de mes ancêtres (le même terme est traduit par parents en 1Tm 5.4) : cf. Ac 22.3 ; 24.14 ; Rm 9.4s ; 2Co 11.22 ; Ph 3.4ss. –  je rends un culte  : cf. Rm 1.9n  ; voir aussi Lc 2.37n. –  avec une conscience pure Ac 23.1 ; 24.16 ; 1Tm 1.5+. –  fais… mention ou fais… mémoire  : cf. Ph 1.3. –  continuellement 1Th 1.2+. –  prières  : le même terme est traduit par requêtes en 1Tm 2.1+. –  nuit et jour 1Th 3.10 ; cf. Lc 18.1.'
  - type: text
    content: 'Je suis plein de gratitude envers Dieu à qui, à la suite de mes ancêtres, je rends un culte avec une conscience pure, et je fais continuellement mention de toi dans mes prières, nuit et jour ; '
  '4':
  - type: note
    content: 'je souhaite vivement  : cf. 4.9,21 ; même verbe ou termes apparentés (évoquant également une vive affection) en Rm 1.11 ; 15.23 ; 2Co 7.7 ; 9.14 ; Ph 1.8 ; 2.26 ; 4.1 ; 1Th 3.6. –  tes larmes  : allusion probable à la séparation de Paul et de Timothée ; cf. Ac 20.37 ; 1Tm 1.3. –  rempli de joie Ac 13.52 ; Rm 15.13 ; 2Co 7.4.'
  - type: text
    content: 'je souhaite vivement te voir – je me souviens de tes larmes – pour être rempli de joie ; '
  '5':
  - type: note
    content: 'je me remémore ou j''évoque le souvenir de. –  foi sans hypocrisie 1Tm 1.5+. –  elle a d''abord habité  : cf. v. 14 ; Rm 8.11 ; 2Co 6.11 ; Col 3.16. –  ta grand-mère…  : cf. v. 3 ; 3.15 ; Ac 16.1ss ; voir aussi Es 51.1 ; Pr 31.10. –  persuadé v. 12 ; Ga 5.10 ; Ph 2.24 ; 2Th 3.4.'
  - type: text
    content: 'je me remémore aussi la foi sans hypocrisie qui est en toi : comme elle a d''abord habité en ta grand-mère, Loïs, et en ta mère, Eunice, j''en suis persuadé, elle habite aussi en toi.'
  - type: heading
    content: Souffre avec moi pour la bonne nouvelle
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'C''est pourquoi  : litt. pour cette cause , comme au v. 12 ; Tt 1.13n. –  je t''exhorte  : litt. je te rappelle  ; cf. 1Co 4.17. –  ranimer (ou attiser ) la flamme  : cf. Ac 2.3 ; 1Th 5.19. –  don de la grâce Rm 1.11n  ; 1Co 12.4n. –  que tu as reçu  : litt. qui est en toi . –  l''imposition de mes mains 1Tm 4.14+.'
  - type: text
    content: 'C''est pourquoi je t''exhorte à ranimer la flamme du don de la grâce, du don de Dieu, que tu as reçu par l''imposition de mes mains. '
  '7':
  - type: note
    content: 'Cf. Rm 8.15 ; 1Tm 1.18 ; autre traduction  : En effet, l''Esprit que Dieu nous a donné ne nous porte pas à la lâcheté, mais il nous communique force, amour et pondération. –  un esprit de…  : cf. v. 14+ ; Es 11.2 ; Rm 8.2,15. –  lâcheté  ; termes apparentés en Mc 4.40 (peureux) ; Jn 14.27 (céder à la lâcheté) ; Ap 21.8 (lâches). –  force ou puissance  : cf. Lc 1.35 ; 4.14 ; Ac 6.5,8 ; Rm 15.19 ; 1Co 2.4 ; 2Co 6.6 ; 1Th 1.5. –  amour Mc 12.30/ / ; Ga 5.22. –  pondération  : cf. Rm 12.3n  ; 1Tm 2.9n  ; Tt 2.4,12.'
  - type: text
    content: 'En effet, ce n''est pas un esprit de lâcheté que Dieu nous a donné, mais un esprit de force, d''amour et de pondération. '
  '8':
  - type: note
    content: 'pas honte  : cf. v. 12,16 ; 2.15 ; Rm 1.16 ; 2Co 10.8 ; Ph 1.20 ; Hé 2.11 ; 11.16 ; voir aussi Lc 9.26 ; 1P 4.16. –  du témoignage de notre Seigneur  : autre traduction du témoignage à rendre à notre Seigneur  : cf. Jn 15.26s ; Ac 1.8 ; 26.16 ; 1Co 1.6 ; Ap 1.2,9 ; 6.9 ; 12.17 ; 19.10 ; voir aussi 1Tm 2.6 ; 6.12s. –  moi, son prisonnier (à Rome, selon v. 17) : cf. v. 16+ ; 2.9 ; Ep 3.1n. –  souffre avec moi  : cf. 2.3,11 ; 4.5 ; Ph 1.27 ; voir aussi Ac 9.16. –  par la puissance de Dieu Ep 3.20 ; cf. Rm 1.16 ; 1Co 1.18.'
  - type: text
    content: N'aie donc pas honte du témoignage de notre Seigneur, ni de moi, son prisonnier. Mais souffre avec moi pour la bonne nouvelle, par la puissance de Dieu,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Tm 1.17+ ; 3.16 ; Tt 3.5ss. –  sauvés 1Tm 1.1+ ; 2.4. –  saint appel ou sainte vocation  : cf. 1Co 1.2 ; 1P 1.15 ; voir aussi Rm 8.28,30 ; Ga 1.6 ; 1Co 1.9 ; Ep 1.18 ; 4.1 ; Ph 3.14 ; 1Th 2.12 ; 5.14 ; 2Th 2.14 ; 1Tm 6.12 ; Hé 3.1. –  nos œuvres  : cf. Ep 2.9 ; Tt 3.5. –  son propre projet  : cf. 3.10 ; Rm 8.28 ; 9.11 ; Ep 1.11+. –  en Jésus-Christ v. 1+ ; cf. Rm 8.29 ; Ep 1.3ss ; Ap 13.8. –  temps éternels Rm 16.25 ; Tt 1.2 ; cf. 1P 1.20.'
  - type: text
    content: qui nous a sauvés
  - type: text
    content: et nous a adressé un saint appel,
  - type: text
    content: non pas selon nos œuvres,
  - type: text
    content: mais selon son propre projet, selon la grâce
  - type: text
    content: qui nous a été accordée en Jésus-Christ
  - type: text
    content: avant les temps éternels
