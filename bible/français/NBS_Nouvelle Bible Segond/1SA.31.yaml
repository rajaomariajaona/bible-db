        - type: text
          text: '31.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'autre côté de la vallée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit de la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vallée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'plaine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Jizréel, où les Philistins ont établi leur camp (cf. 28.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''autre côté du Jourdain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en Transjordanie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à l''est (cf. Gn 50.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s ; Nb 32.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leurs villes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: selon LXX, Vg et le texte parallèle de 1Ch 10.7.
      marker-yv: yv-n
    - type: text
      text: Les hommes d'Israël qui étaient de l'autre côté de la vallée et de l'autre côté du Jourdain virent que les hommes d'Israël s'enfuyaient et que Saül et ses fils étaient morts. Ils abandonnèrent les villes et s'enfuirent, et les Philistins vinrent s'y installer.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dépouiller
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 2.21 ; 23.10 ; Na 2.3 ; Lc 10.30.'
      marker-yv: yv-n
    - type: text
      text: 'Le lendemain, les Philistins vinrent pour dépouiller les cadavres et ils découvrirent Saül et ses trois fils, qui étaient tombés au mont Guilboa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: coupèrent la tête de Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.51'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses armes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.51+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parmi le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 1.20.'
      marker-yv: yv-n
    - type: text
      text: 'Ils coupèrent la tête de Saül et le dépouillèrent de ses armes. Puis ils firent annoncer la bonne nouvelle par tout le pays des Philistins dans les maisons de leurs idoles et parmi le peuple. '
