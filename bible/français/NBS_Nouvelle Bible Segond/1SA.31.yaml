        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 1.21.'
      marker-yv: yv-n
    - type: text
      text: 'Les Philistins livraient bataille à Israël. Les hommes d''Israël durent fuir pour échapper aux Philistins, et des victimes tombèrent au mont Guilboa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
