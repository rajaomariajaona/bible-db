document_id: 1SA.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Bataille de Guilboa ; mort de Saül
  - type: heading
    content: 1Ch 10.1-14
  - type: text
    content: ' '
  - type: note
    content: 'livraient bataille à Israël  : cf. 28.1,19. –  fuir  : cf. 4.10. –  Guilboa  : cf. 28.4n  ; 2S 1.21.'
  - type: text
    content: 'Les Philistins livraient bataille à Israël. Les hommes d''Israël durent fuir pour échapper aux Philistins, et des victimes tombèrent au mont Guilboa. '
  '10':
  - type: note
    content: 'Cf. 21.9s. –  dans la maison  : c.-à-d. dans le temple. –  des Astartés  : cf. Jg 2.13n. –  Beth-Shân (variante orthographique de Beth-Shéân) : ville proche du Jourdain, au sud-est de la plaine de Jizréel ; cf. Jos 17.11 ; Jg 1.27 ; 2S 21.12.'
  - type: text
    content: Ils mirent les armes de Saül dans la maison des Astartés et ils clouèrent son cadavre sur la muraille de Beth-Shân.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Yabesh de Galaad  : cf. 11.1n  ; les habitants de cette ville avaient une dette de reconnaissance à l''égard de Saül, voir chap. 11.'
  - type: text
    content: 'Lorsque les habitants de Yabesh de Galaad apprirent ce que les Philistins avaient fait à Saül, '
  '12':
  - type: note
    content: 'ils les brûlèrent  : unique mention de la crémation de cadavres dans la Bible ; il s''agit ici d''un acte honorable (cf. 2S 2.5).'
  - type: text
    content: 'tous les hommes vaillants marchèrent toute la nuit et prirent de la muraille de Beth-Shân le cadavre de Saül et ceux de ses fils. Puis ils revinrent à Yabesh, où ils les brûlèrent ; '
  '13':
  - type: note
    content: 'ensevelirent  : cf. 2S 2.4s ; 21.12. –  jeûnèrent  : cf. 2S 1.12 ; 3.35 ; 12.20-23. –  sept jours  : cf. Gn 50.10 ; Siracide 22.12 : « Le deuil pour un mort dure sept jours. »'
  - type: text
    content: ils prirent leurs ossements et les ensevelirent sous le tamaris à Yabesh. Et ils jeûnèrent sept jours.
  '2':
  - type: note
    content: 'Abinadab  : en 14.49 est mentionné un fils du nom de Yishvi.'
  - type: text
    content: 'Les Philistins serrèrent de près Saül et ses fils ; ils tuèrent Jonathan, Abinadab et Malki-Shoua, fils de Saül. '
  '3':
  - type: note
    content: 'Le poids du combat se porta  : litt. le combat fut lourd. –  les archers  : litt. les tireurs, hommes avec l''arc. –  le trouvèrent  : autre traduction l''atteignirent. –  il fut saisi… d''un tremblement violent, c.-à-d. il fut saisi de panique à leur vue  ; LXX et Vg ont confondu le verbe hébreu correspondant avec un autre verbe à l''orthographe très proche et l''ont traduit par il fut blessé par eux.'
  - type: text
    content: 'Le poids du combat se porta sur Saül ; les archers le trouvèrent, et il fut saisi devant eux d''un tremblement violent. '
  '4':
  - type: note
    content: 'celui qui portait ses armes  : cf. 16.21 ; Jg 9.54+. –  ces incirconcis Jg 14.3n. –  ne voulut pas  : cf. 24.7 ; 26.9-11. –  se jeta dessus  : un des rares cas de suicide mentionnés dans la Bible ; cf. v. 5 ; 2S 17.23 ; 1R 16.18 ; Mt 27.5. En 2S 1.9s, un jeune Amalécite prétendra avoir tué lui-même Saül.'
  - type: text
    content: 'Saül dit alors à celui qui portait ses armes : Tire ton épée et transperce-moi, de crainte que ces incirconcis ne viennent me transpercer ou me brutaliser. Celui qui portait ses armes ne voulut pas : il avait très peur. Alors Saül prit l''épée et se jeta dessus. '
  '5':
  - type: text
    content: 'Celui qui portait les armes de Saül, le voyant mort, se jeta aussi sur son épée et mourut avec lui. '
  '6':
  - type: note
    content: 'Cf. 28.19. –  et tous ses hommes  : les mots correspondants sont absents de LXX.'
  - type: text
    content: 'Ainsi moururent ensemble, ce jour-là, Saül et ses trois fils, celui qui portait ses armes, et tous ses hommes. '
  '7':
  - type: note
    content: 'de l''autre côté de la vallée  : il s''agit de la vallée ou plaine de Jizréel, où les Philistins ont établi leur camp (cf. 28.4n). –  de l''autre côté du Jourdain ou en Transjordanie, à l''est (cf. Gn 50.10ns ; Nb 32.19n). –  les villes  : leurs villes selon LXX, Vg et le texte parallèle de 1Ch 10.7.'
  - type: text
    content: Les hommes d'Israël qui étaient de l'autre côté de la vallée et de l'autre côté du Jourdain virent que les hommes d'Israël s'enfuyaient et que Saül et ses fils étaient morts. Ils abandonnèrent les villes et s'enfuirent, et les Philistins vinrent s'y installer.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'dépouiller  : cf. 2S 2.21 ; 23.10 ; Na 2.3 ; Lc 10.30.'
  - type: text
    content: 'Le lendemain, les Philistins vinrent pour dépouiller les cadavres et ils découvrirent Saül et ses trois fils, qui étaient tombés au mont Guilboa. '
  '9':
  - type: note
    content: 'coupèrent la tête de Saül  : cf. 17.51n. –  ses armes  : cf. 17.51+. –  parmi le peuple  : cf. 2S 1.20.'
  - type: text
    content: 'Ils coupèrent la tête de Saül et le dépouillèrent de ses armes. Puis ils firent annoncer la bonne nouvelle par tout le pays des Philistins dans les maisons de leurs idoles et parmi le peuple. '
