        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 21.9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le temple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Astartés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth-Shân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(variante orthographique de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Beth-Shéân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : ville proche du Jourdain, au sud-est de la plaine de Jizréel ; cf. Jos 17.11 ; Jg 1.27 ; 2S 21.12.'
      marker-yv: yv-n
    - type: text
      text: Ils mirent les armes de Saül dans la maison des Astartés et ils clouèrent son cadavre sur la muraille de Beth-Shân.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yabesh de Galaad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 11.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; les habitants de cette ville avaient une dette de reconnaissance à l''égard de Saül, voir chap. 11.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque les habitants de Yabesh de Galaad apprirent ce que les Philistins avaient fait à Saül, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils les brûlèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : unique mention de la crémation de cadavres dans la Bible ; il s''agit ici d''un acte honorable (cf. 2S 2.5).'
      marker-yv: yv-n
    - type: text
      text: 'tous les hommes vaillants marchèrent toute la nuit et prirent de la muraille de Beth-Shân le cadavre de Saül et ceux de ses fils. Puis ils revinrent à Yabesh, où ils les brûlèrent ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ensevelirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 2.4s ; 21.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jeûnèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 1.12 ; 3.35 ; 12.20-23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sept jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 50.10 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.12 : « Le deuil pour un mort dure sept jours. »'
      marker-yv: yv-n
    - type: text
      text: ils prirent leurs ossements et les ensevelirent sous le tamaris à Yabesh. Et ils jeûnèrent sept jours.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abinadab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : en 14.49 est mentionné un fils du nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yishvi.
      marker-yv: yv-n
    - type: text
      text: 'Les Philistins serrèrent de près Saül et ses fils ; ils tuèrent Jonathan, Abinadab et Malki-Shoua, fils de Saül. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le poids du combat se porta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le combat fut lourd
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les archers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les tireurs, hommes avec l'arc
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le trouvèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'atteignirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il fut saisi… d'un tremblement violent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fut saisi de panique à leur vue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' ont confondu le verbe hébreu correspondant avec un autre verbe à l''orthographe très proche et l''ont traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fut blessé par eux.
      marker-yv: yv-n
    - type: text
      text: 'Le poids du combat se porta sur Saül ; les archers le trouvèrent, et il fut saisi devant eux d''un tremblement violent. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui qui portait ses armes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.21 ; Jg 9.54+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ces incirconcis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jg 14.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne voulut pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 24.7 ; 26.9-11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se jeta dessus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un des rares cas de suicide mentionnés dans la Bible ; cf. v. 5 ; 2S 17.23 ; 1R 16.18 ; Mt 27.5. En 2S 1.9s, un jeune Amalécite prétendra avoir tué lui-même Saül.'
      marker-yv: yv-n
    - type: text
      text: 'Saül dit alors à celui qui portait ses armes : Tire ton épée et transperce-moi, de crainte que ces incirconcis ne viennent me transpercer ou me brutaliser. Celui qui portait ses armes ne voulut pas : il avait très peur. Alors Saül prit l''épée et se jeta dessus. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'Celui qui portait les armes de Saül, le voyant mort, se jeta aussi sur son épée et mourut avec lui. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 28.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et tous ses hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les mots correspondants sont absents de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi moururent ensemble, ce jour-là, Saül et ses trois fils, celui qui portait ses armes, et tous ses hommes. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
