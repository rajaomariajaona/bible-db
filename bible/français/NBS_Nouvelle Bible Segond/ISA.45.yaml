document_id: ISA.45,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 11,14,18 ; 44.24). –  l''homme qui a reçu son onction , litt. son oint  ; hébreu mashiah , grec (LXX) khristos , d''où vient le mot Christ (cf. 61.1 ; Ps 2.2n) ; désignation du roi (cf. 2S 5.3), du prêtre (Ex 29.7 ; Lv 5.3ss), et même d''un prophète d''après 1R 19.16. Il est exceptionnel que ce titre soit donné à un souverain non israélite ; c''est le cas ici en raison de la libération accordée par Cyrus aux Judéens exilés à Babylone (cf. 44.26-28). –  que j''ai saisi par la main 41.13 ; 42.6. –  terrasser… des nations 41.2 ; Ps 2 ; 110. –  détacher la ceinture  : litt. ouvrir (même verbe qu''au vers suivant, dans le sens de relâcher ) les reins  ; cf. v. 5 ; 1R 20.11n  ; Ez 21.11n  ; Jb 12.21. –  des villes  : sous-entendu dans le texte ; cf. Dt 16.18n.'
  - type: text
    content: 'Voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à l''homme qui a reçu son onction,'
  - type: text
    content: – à Cyrus, que j'ai saisi par la main droite,
  - type: text
    content: pour terrasser devant lui des nations,
  - type: text
    content: pour détacher la ceinture des rois,
  - type: text
    content: pour ouvrir devant lui les deux battants,
  - type: text
    content: 'et que les portes des villes ne soient plus fermées :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: père 64.7.
  - type: text
    content: 'Quel malheur pour celui qui dit à un père :'
  - type: text
    content: Pourquoi engendres-tu ?
  - type: text
    content: '– et à une femme :'
  - type: text
    content: Pourquoi accouches-tu ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Saint d''Israël 1.4+. –  façonne 43.1+. –  Veut-on m''interroger  : litt. interrogez-moi (ou demandez-moi ), même verbe en 41.28 ; 58.2 ; 65.1. –  ce qui est à venir  : même mot en 44.7. Certains le modifient légèrement ici pour lire des signes , de sorte qu''on puisse traduire  : demandez-moi des signes au sujet de mes fils, donnez-moi des ordres sur l''œuvre de mes mains ! (cf. v. 9n).'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Saint d''Israël,'
  - type: text
    content: 'celui qui le façonne :'
  - type: text
    content: Veut-on m'interroger sur ce qui est à venir,
  - type: text
    content: me donner des ordres sur mes fils et sur l'œuvre de mes mains ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 42.5n  ; 51.13.
  - type: text
    content: C'est moi qui ai fait la terre
  - type: text
    content: et qui sur elle ai créé l'homme ;
  - type: text
    content: ce sont mes propres mains qui ont déployé le ciel,
  - type: text
    content: et c'est moi qui commande toute son armée.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'l''ai suscité  : il s''agit probablement de Cyrus ; cf. v. 1 ; 41.2n. –  pour la justice  : autres traductions selon la justice ; pour la victoire  ; cf. 42.6 ; 41.2. –  j''aplanirai… v. 2 ; 40.3s. –  il rebâtira ma ville 44.26,28. –  sans indemnités (ou prix d''achat ) ni présents (ou pots-de-vin ) 52.3 ; cf. 55.1.'
  - type: text
    content: C'est moi qui l'ai suscité pour la justice,
  - type: text
    content: et j'aplanirai toutes ses voies ;
  - type: text
    content: il rebâtira ma ville et il laissera partir mes exilés
  - type: text
    content: sans indemnités ni présents,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le produit du travail  : litt. la fatigue  ; cf. Gn 31.42n. –  Egypte / Koush (11.11+ ; cf. Gn 2.13n) / Sabéens 43.3n. –  Ces peuples  : sous-entendu dans le texte. –  derrière toi ou après toi  ; on pourrait aussi comprendre que ces peuples s''en vont en exil à la place d''Israël, pour servir la Perse. –  se prosterneront 60.14+. –  chez toi seulement  : cf. 2R 5.15. –  Dieu  : hébreu ’El , de même au v. 15 ( un Dieu qui se cache ), 20 ( dieu ), 21 ( un Dieu juste ), 22 ; voir 40.18n  ; Gn 21.33n. –  il n''y en a pas d''autre v. 5. –  les dieux  : hébreu ’elohim , même terme au v. 15 pour le Dieu d''Israël  ; cf. Gn 1.1n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Le produit du travail de l'Egypte, les profits de Koush
  - type: text
    content: et ceux des Sabéens, hommes de haute taille,
  - type: text
    content: passeront chez toi et seront à toi.
  - type: text
    content: Ces peuples marcheront derrière toi,
  - type: text
    content: ils passeront enchaînés,
  - type: text
    content: ils se prosterneront devant toi
  - type: text
    content: 'et t''adresseront leur prière :'
  - type: text
    content: C'est chez toi seulement qu'est Dieu,
  - type: text
    content: et il n'y en a pas d'autre,
  - type: text
    content: les dieux sont néant !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'un Dieu  : hébreu ’El , cf. Gn 21.33n. –  qui se cache  : cf. v. 19+.'
  - type: text
    content: Vraiment tu es un Dieu qui se cache,
  - type: text
    content: Dieu d'Israël, Sauveur !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 41.11+.
  - type: text
    content: Ils sont tous honteux et confus,
  - type: text
    content: ils s'en vont tous dans la confusion,
  - type: text
    content: les ciseleurs d'idoles.
  '17':
  - type: text
    content: ' '
  - type: note
    content: le salut ou la victoire.
  - type: text
    content: 'Quant à Israël, c''est par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''il obtient le salut pour toujours.'
  - type: text
    content: Jamais, plus jamais vous ne serez honteux ni confus.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'chaos  : hébreu tohou , de même au v. 19n  ; cf. 24.10n  ; 34.11n  ; 49.4 ; Gn 1.2n.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: celui qui crée le ciel,
  - type: text
    content: lui, le Dieu qui façonne la terre
  - type: text
    content: et la forme, lui qui l'affermit,
  - type: text
    content: qui ne l'a pas créée chaos,
  - type: text
    content: 'mais qui l''a façonnée pour qu''elle soit habitée :'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: et il n'y en a pas d'autre.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'en cachette  : cf. v. 15 ; 48.16 ; Jn 18.20 ; Ac 26.26. –  chaos v. 18+.'
  - type: text
    content: Ce n'est pas en cachette que j'ai parlé,
  - type: text
    content: dans un lieu ténébreux de la terre.
  - type: text
    content: 'Je n''ai pas dit aux descendants de Jacob :'
  - type: text
    content: Cherchez-moi dans le chaos !
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je dis ce qui est juste,'
  - type: text
    content: je proclame ce qui est droit.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je marcherai… devant toi  : cf. 49.10 ; 52.12. –  j''aplanirai les pentes  : cf. v. 13 ; 40.3s. –  battants / verrous Ps 107.16n.'
  - type: text
    content: Je marcherai moi-même devant toi,
  - type: text
    content: j'aplanirai les pentes,
  - type: text
    content: je briserai les battants de bronze
  - type: text
    content: et je casserai les verrous de fer.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'rescapés des nations  : cf. 66.19. –  intercèdent 44.17. –  dieu 44.10n. –  ne peut les sauver 46.7 ; 47.15.'
  - type: text
    content: Rassemblez-vous et venez,
  - type: text
    content: approchez ensemble,
  - type: text
    content: rescapés des nations !
  - type: text
    content: Ils n'ont pas de connaissance,
  - type: text
    content: ceux qui portent le bois de leur statue
  - type: text
    content: et qui intercèdent auprès d'un dieu
  - type: text
    content: qui ne peut les sauver.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Annoncez-le 41.22+. –  vos arguments  : sous-entendu dans le texte. –  dès le temps jadis 46.10. –  depuis lors 44.8n. –  A part moi… 44.6+ ; Mc 12.32 . –  pas de Dieu… sauveur 43.11.'
  - type: text
    content: Annoncez-le et présentez vos arguments !
  - type: text
    content: Qu'ils tiennent conseil tous ensemble !
  - type: text
    content: Qui a fait entendre cela dès le temps jadis
  - type: text
    content: et depuis lors l'a annoncé ?
  - type: text
    content: 'N''est-ce pas moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ?'
  - type: text
    content: A part moi, il n'y a pas de Dieu ;
  - type: text
    content: de Dieu juste et sauveur,
  - type: text
    content: à part moi, il n'y en a aucun.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 49.6 ; 52.10 ; Ps 98.3. –  vous tous…  : autre traduction vous, toutes les extrémités de la terre.'
  - type: text
    content: Tournez-vous vers moi et soyez sauvés,
  - type: text
    content: vous tous, aux extrémités de la terre !
  - type: text
    content: Car je suis Dieu,
  - type: text
    content: et il n'y en a pas d'autre.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Je le jure par moi-même  : cf. 49.18 ; 54.9 ; 62.8 ; Gn 22.16+ ; Dt 32.40 ; Jr 22.5+. –  parole qui ne sera pas révoquée 55.11. –  Tout genou fléchira Rm 14.11  ; Ph 2.10s. –  prêtera serment 19.18 ; 2Ch 15.14.'
  - type: text
    content: Je le jure par moi-même
  - type: text
    content: – de ma bouche sort ce qui est juste,
  - type: text
    content: 'une parole qui ne sera pas révoquée :'
  - type: text
    content: Tout genou fléchira devant moi,
  - type: text
    content: toute langue prêtera serment par moi.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'dira-t-on de moi… autre traduction dira-t-on, résident pour moi… –  la justice  : le terme hébreu est au pluriel, forme qui évoque habituellement des actes de justice (cf. 64.5, ce que nous faisons pour la justice ) ou des victoires  ; cf. 33.15+. –  à lui viendront  : selon de nombreux mss hébreux (y compris un ms de Qumrân) et des versions anciennes. Texte hébreu traditionnel  : il viendra vers lui (Dieu vers Israël ?) . Ils seront honteux…'
  - type: text
    content: 'Dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' seul, dira-t-on de moi,'
  - type: text
    content: résident la justice et la force ;
  - type: text
    content: à lui viendront, honteux,
  - type: text
    content: tous ceux qui se sont fâchés contre lui.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'justifiés  : cf. 43.9n. –  mettront leur fierté  : cf. 41.16n.'
  - type: text
    content: 'Par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' seront justifiés tous les descendants d''Israël,'
  - type: text
    content: en lui ils mettront leur fierté.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'enfouis  : litt. des ténèbres. –  t''appelle par ton nom 41.25n.'
  - type: text
    content: Je te donnerai des trésors enfouis,
  - type: text
    content: des richesses cachées,
  - type: text
    content: afin que tu saches
  - type: text
    content: 'que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui t''appelle par ton nom,'
  - type: text
    content: et que je suis le Dieu d'Israël.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'mon serviteur 41.8+. –  choisi 42.1+ ; 44.1. –  paré d''un titre  : même verbe hébreu en 44.5 ; sur le titre donné à Cyrus, cf. v. 1n  ; 44.28n.'
  - type: text
    content: A cause de Jacob, mon serviteur,
  - type: text
    content: d'Israël, celui que j'ai choisi,
  - type: text
    content: je t'ai appelé par ton nom ;
  - type: text
    content: je t'ai paré d'un titre,
  - type: text
    content: sans que tu me connaisses.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'pas d''autre v. 14 ; 64.3. –  préparé au combat  : litt. ceint , cf. v. 1 ; 8.9n.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: et il n'y en a pas d'autre,
  - type: text
    content: à part moi il n'y a pas de Dieu ;
  - type: text
    content: je t'ai préparé au combat,
  - type: text
    content: sans que tu me connaisses,
  '6':
  - type: text
    content: afin que l'on sache,
  - type: text
    content: du soleil levant au couchant,
  - type: text
    content: 'qu''en dehors de moi il n''y a que néant :'
  - type: text
    content: 'je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: et il n'y en a pas d'autre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '41.23 ; Jb 2.10 ; Ec 7.14 ; Lm 3.38 ; cf. Dt 32.39. –  je fais la paix  : même expression en 27.5 ; Jb 25.2.'
  - type: text
    content: Je façonne la lumière
  - type: text
    content: et je crée les ténèbres,
  - type: text
    content: je fais la paix
  - type: text
    content: et je crée le malheur ;
  - type: text
    content: 'c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui fais tout cela.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 61.11 ; Os 2.23s ; Ps 85.12. –  justice / salut 46.13 ; 51.5-8 ; 56.1 ; 59.17 ; 62.1.
  - type: text
    content: Que le ciel distille d'en haut,
  - type: text
    content: que les nuées laissent couler la justice !
  - type: text
    content: Que la terre s'ouvre
  - type: text
    content: pour que le salut y soit fécond,
  - type: text
    content: et qu'en même temps la justice y germe !
  - type: text
    content: 'C''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai créé cela.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: '29.16+ ; Rm 9.20. –  qui l''a façonné  : le même terme peut désigner le potier ; cf. 43.1+. –  ne vaut rien  : litt. pas de mains pour lui  ; autre traduction et ton action (peut-elle dire) : Il n''a pas de mains ! cf. v. 11 ; voir aussi 10.15.'
  - type: text
    content: Quel malheur pour qui cherche querelle à celui qui l'a façonné,
  - type: text
    content: alors qu'il n'est qu'un vase parmi les vases de terre !
  - type: text
    content: 'L''argile peut-elle dire à celui qui la façonne :'
  - type: text
    content: Que fais-tu ?
  - type: text
    content: 'et : Ton action ne vaut rien !'
