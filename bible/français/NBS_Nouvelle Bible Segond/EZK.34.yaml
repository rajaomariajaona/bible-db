document_id: EZK.34,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les chefs d'Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je m''oppose '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je leur réclamerai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je rechercherai de leur main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',22 ; 13.21 ; Jr 23.2s ; Za 10.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je ne les laisserai plus paître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je les ferai cesser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (30.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de (faire) paître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de se repaître de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je m''oppose aux bergers ! Je leur réclamerai mon troupeau, je ne les laisserai plus paître mon troupeau, pour que les bergers ne se repaissent plus eux-mêmes. J''arracherai mon troupeau de leur bouche, et il ne sera plus une proie pour eux.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ps 23.1 ; 80.2 ; Jn 10.11.
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je vais moi-même prendre soin de mes bêtes et les passer en revue. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Comme un berger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 40.11+ ; Jr 31.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'éparpillées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dispersées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont deux synonymes aussi en hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jour de nuée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'obscurité épaisse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 30.2-3+ ; Dt 4.11 ; Jl 2.2 ; So 1.15 ; Ps 97.2.
      marker-yv: yv-n
    - type: text
      text: 'Comme un berger passe en revue son troupeau quand il est au milieu de ses bêtes éparpillées, ainsi je passerai en revue mon troupeau et j''arracherai mes bêtes de tous les lieux où elles ont été dispersées, un jour de nuée et d''obscurité épaisse. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je les rassemblerai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de tous les pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 6.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 27 ; 28.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je les ferai sortir d''entre les peuples, je les rassemblerai de tous les pays et je les ramènerai sur leur terre ; je les ferai paître sur les montagnes d''Israël, dans les ravins et dans tous les lieux d''habitation du pays. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jr 50.19 ; Ps 23.2.
      marker-yv: yv-n
    - type: text
      text: 'Je les ferai paître dans un bon pâturage, et leur domaine sera sur les montagnes qui dominent Israël ; là elles se coucheront dans un bon domaine, et elles pourront paître dans de gras pâturages, dans les montagnes d''Israël. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 11-12+ ; Mi 7.14s ; Za 11.7.
      marker-yv: yv-n
    - type: text
      text: 'C''est moi qui ferai paître mon troupeau, c''est moi qui ferai coucher les bêtes – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 4 ; Mi 4.6s ; Mt 18.12 ; Lc 15.4-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je détruirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je garderai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je veillerai sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 17-22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: équité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot est souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: droit.
      marker-yv: yv-n
    - type: text
      text: Je chercherai celle qui est perdue, je ramènerai celle qui est égarée, je panserai celle qui est blessée et je ferai reprendre des forces à celle qui est malade. Mais je détruirai celle qui est grasse et forte. Je les ferai paître avec équité.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu vient au secours de son peuple
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entre bête et bête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu correspondant s''applique normalement à n''importe quel animal du petit bétail (moutons et chèvres) ; cf. v. 22 ; Ex 12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: béliers et boucs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il s''agit peut-être ici des chefs du peuple ; cf. 17.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 31.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 25.32s.'
      marker-yv: yv-n
    - type: text
      text: 'Quant à vous, mon troupeau, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je juge entre bête et bête, entre béliers et boucs. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'Ne vous suffit-il pas de paître dans le bon pâturage, que vous fouliez de vos pieds le reste de votre pâturage ? Ne vous suffit-il pas de boire une eau limpide, que vous troubliez le reste avec vos pieds ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Mon troupeau doit paître ce que vos pieds ont foulé et boire ce que vos pieds ont troublé !
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bergers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce terme désigne souvent les rois (parfois aussi des chefs de moindre importance, Es 56.11) dans l''ancien Orient ; cf. Jr 2.8+ ; 23.1ss ; Za 11.15-17 ; voir aussi Gn 48.15 ; 1S 16.11,19 ; 17.15 ; Es 40.11 ; Ps 23 ; 80.2 ; 95.7 ; Jn 10.1-30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se repaissaient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se repaissent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même verbe que '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faire paître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le troupeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot s''applique au petit bétail en général, moutons et chèvres.'
      marker-yv: yv-n
    - type: text
      text: 'Humain, parle en prophète sur les bergers d''Israël ! Parle en prophète et dis-leur, aux bergers : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Quel malheur pour les bergers d''Israël, qui se repaissaient eux-mêmes ! Les bergers ne devraient-ils pas faire paître le troupeau ? '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'A cause de cela, ainsi leur parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : C''est moi-même qui jugerai entre les bêtes grasses et les bêtes maigres. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Parce que vous avez poussé avec le flanc et avec l''épaule, parce que vous avez frappé de vos cornes toutes les bêtes faibles, jusqu''à ce que vous les ayez dispersées au dehors, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 10,17.
      marker-yv: yv-n
    - type: text
      text: 'je sauverai mon troupeau, afin qu''il ne soit plus livré au pillage, et je jugerai entre bête et bête. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 37.24 ; 2S 5.2 ; Es 9.5s ; Jr 3.15 ; 23.4s ; 30.9 ; Os 3.5 ; 1Ch 11.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un seul berger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 37.15-28 ; voir aussi Jn 10.16 ; Ap 7.17.'
      marker-yv: yv-n
    - type: text
      text: 'Je nommerai à leur tête un seul berger qui les fera paître, David, mon serviteur ; il les fera paître, il sera leur berger. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je serai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(comme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je suis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Ex 3.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.20+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prince '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 37.25 ; 44.3 ; 45.7-9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 46.2-18 ; 48.21s ; cf. Ex 22.27.'
      marker-yv: yv-n
    - type: text
      text: 'Moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je serai leur Dieu, et David, mon serviteur, sera prince au milieu d''eux – c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai parlé. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.25 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '37.26 ; cf. Nb 25.12s ; Es 54.10 ; Ml 2.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les animaux féroces
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression en 5.17 ; cf. Lv 26.6 ; Es 11.6-9 ; Os 2.20 ; Jb 5.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils habiteront… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'broussailles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: forêt
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 31.3 ; voir aussi Jr 26.18.'
      marker-yv: yv-n
    - type: text
      text: 'Je conclurai pour eux une alliance de paix et je ferai disparaître du pays les animaux féroces ; ils habiteront en sécurité dans le désert et dormiront au milieu des broussailles. '
  '26':
  - type: usfm
