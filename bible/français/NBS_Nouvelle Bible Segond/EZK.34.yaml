document_id: EZK.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les chefs d'Israël
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'Je m''oppose 5.8+. –  Je leur réclamerai…  : litt. je rechercherai de leur main v. 6n,22 ; 13.21 ; Jr 23.2s ; Za 10.3. –  je ne les laisserai plus paître  : litt. je les ferai cesser (30.13n) de (faire) paître (ou de se repaître de  ; cf. v. 2n).'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''oppose aux bergers ! Je leur réclamerai mon troupeau, je ne les laisserai plus paître mon troupeau, pour que les bergers ne se repaissent plus eux-mêmes. J''arracherai mon troupeau de leur bouche, et il ne sera plus une proie pour eux.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 23.1 ; 80.2 ; Jn 10.11.
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je vais moi-même prendre soin de mes bêtes et les passer en revue. '
  '12':
  - type: note
    content: Comme un berger Es 40.11+ ; Jr 31.10. –  éparpillées et dispersées sont deux synonymes aussi en hébreu. –  jour de nuée / obscurité épaisse 30.2-3+ ; Dt 4.11 ; Jl 2.2 ; So 1.15 ; Ps 97.2.
  - type: text
    content: 'Comme un berger passe en revue son troupeau quand il est au milieu de ses bêtes éparpillées, ainsi je passerai en revue mon troupeau et j''arracherai mes bêtes de tous les lieux où elles ont été dispersées, un jour de nuée et d''obscurité épaisse. '
  '13':
  - type: note
    content: 'je les rassemblerai 11.17+. –  de tous les pays  : litt. des pays  ; cf. 6.8n. –  leur terre v. 27 ; 28.25n  ; Gn 2.5n.'
  - type: text
    content: 'Je les ferai sortir d''entre les peuples, je les rassemblerai de tous les pays et je les ramènerai sur leur terre ; je les ferai paître sur les montagnes d''Israël, dans les ravins et dans tous les lieux d''habitation du pays. '
  '14':
  - type: note
    content: Jr 50.19 ; Ps 23.2.
  - type: text
    content: 'Je les ferai paître dans un bon pâturage, et leur domaine sera sur les montagnes qui dominent Israël ; là elles se coucheront dans un bon domaine, et elles pourront paître dans de gras pâturages, dans les montagnes d''Israël. '
  '15':
  - type: note
    content: V. 11-12+ ; Mi 7.14s ; Za 11.7.
  - type: text
    content: 'C''est moi qui ferai paître mon troupeau, c''est moi qui ferai coucher les bêtes – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'V. 4 ; Mi 4.6s ; Mt 18.12 ; Lc 15.4-7. –  je détruirai  : LXX je garderai, c.-à-d. je veillerai sur  ; cf. v. 17-22. –  équité  : le mot est souvent traduit par droit.'
  - type: text
    content: Je chercherai celle qui est perdue, je ramènerai celle qui est égarée, je panserai celle qui est blessée et je ferai reprendre des forces à celle qui est malade. Mais je détruirai celle qui est grasse et forte. Je les ferai paître avec équité.
  - type: heading
    content: Dieu vient au secours de son peuple
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'entre bête et bête  : le terme hébreu correspondant s''applique normalement à n''importe quel animal du petit bétail (moutons et chèvres) ; cf. v. 22 ; Ex 12.3n. –  béliers et boucs  : il s''agit peut-être ici des chefs du peuple ; cf. 17.13n  ; 31.11n  ; Mt 25.32s.'
  - type: text
    content: 'Quant à vous, mon troupeau, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je juge entre bête et bête, entre béliers et boucs. '
  '18':
  - type: text
    content: 'Ne vous suffit-il pas de paître dans le bon pâturage, que vous fouliez de vos pieds le reste de votre pâturage ? Ne vous suffit-il pas de boire une eau limpide, que vous troubliez le reste avec vos pieds ? '
  '19':
  - type: text
    content: Mon troupeau doit paître ce que vos pieds ont foulé et boire ce que vos pieds ont troublé !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'bergers  : ce terme désigne souvent les rois (parfois aussi des chefs de moindre importance, Es 56.11) dans l''ancien Orient ; cf. Jr 2.8+ ; 23.1ss ; Za 11.15-17 ; voir aussi Gn 48.15 ; 1S 16.11,19 ; 17.15 ; Es 40.11 ; Ps 23 ; 80.2 ; 95.7 ; Jn 10.1-30. –  se repaissaient ou se repaissent , même verbe que faire paître , de même dans la suite. –  le troupeau  : le mot s''applique au petit bétail en général, moutons et chèvres.'
  - type: text
    content: 'Humain, parle en prophète sur les bergers d''Israël ! Parle en prophète et dis-leur, aux bergers : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Quel malheur pour les bergers d''Israël, qui se repaissaient eux-mêmes ! Les bergers ne devraient-ils pas faire paître le troupeau ? '
  '20':
  - type: text
    content: 'A cause de cela, ainsi leur parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : C''est moi-même qui jugerai entre les bêtes grasses et les bêtes maigres. '
  '21':
  - type: text
    content: 'Parce que vous avez poussé avec le flanc et avec l''épaule, parce que vous avez frappé de vos cornes toutes les bêtes faibles, jusqu''à ce que vous les ayez dispersées au dehors, '
  '22':
  - type: note
    content: V. 10,17.
  - type: text
    content: 'je sauverai mon troupeau, afin qu''il ne soit plus livré au pillage, et je jugerai entre bête et bête. '
  '23':
  - type: note
    content: 'Cf. 37.24 ; 2S 5.2 ; Es 9.5s ; Jr 3.15 ; 23.4s ; 30.9 ; Os 3.5 ; 1Ch 11.2. –  un seul berger  : cf. 37.15-28 ; voir aussi Jn 10.16 ; Ap 7.17.'
  - type: text
    content: 'Je nommerai à leur tête un seul berger qui les fera paître, David, mon serviteur ; il les fera paître, il sera leur berger. '
  '24':
  - type: note
    content: je serai (comme je suis en Ex 3.14n) leur Dieu 11.20+. –  prince 37.25 ; 44.3 ; 45.7-9n  ; 46.2-18 ; 48.21s ; cf. Ex 22.27.
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', je serai leur Dieu, et David, mon serviteur, sera prince au milieu d''eux – c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé. '
  '25':
  - type: note
    content: 'alliance de paix 37.26 ; cf. Nb 25.12s ; Es 54.10 ; Ml 2.5. –  les animaux féroces  : même expression en 5.17 ; cf. Lv 26.6 ; Es 11.6-9 ; Os 2.20 ; Jb 5.23. –  ils habiteront… v. 28. –  broussailles ou forêt  ; cf. 31.3 ; voir aussi Jr 26.18.'
  - type: text
    content: 'Je conclurai pour eux une alliance de paix et je ferai disparaître du pays les animaux féroces ; ils habiteront en sécurité dans le désert et dormiront au milieu des broussailles. '
  '26':
  - type: note
    content: 'Je ferai d''eux…  : autre traduction je ferai d''eux et des environs (LXX aux environs) une colline de bénédiction. –  ma colline  : Sion ; cf. 20.40+. –  la pluie en son temps Lv 26.4 ; Dt 11.14 ; 28.12 ; Jr 5.24.'
  - type: text
    content: 'Je ferai d''eux et des environs de ma colline une bénédiction ; j''enverrai la pluie en son temps, ce seront des pluies de bénédiction. '
  '27':
  - type: note
    content: '36.30 ; cf. Lv 25.19 ; 26.4. –  leurs jougs  : cf. 30.18 ; Jr 30.8.'
  - type: text
    content: 'L''arbre des champs donnera son fruit, et le pays donnera sa production. Ils seront en sécurité sur leur terre ; ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) quand je briserai les liens de leurs jougs et que je les délivrerai de la main de ceux qui les asservissent. '
  '28':
  - type: note
    content: les animaux sauvages ou les animaux du pays  ; cf. 29.5 ; 32.4 ; Gn 1.24n. –  ils habiteront en sécurité 28.26+.
  - type: text
    content: 'Ils ne seront plus livrés au pillage parmi les nations, les animaux sauvages ne les dévoreront plus, ils habiteront en sécurité, et il n''y aura personne pour les troubler. '
  '29':
  - type: note
    content: 'J''aménagerai  : litt. je dresserai. –  une plantation de renom (litt. pour un nom) ; certaines versions anciennes ont lu une plantation de paix. –  famine 36.30. –  ils ne seront plus chargés d''insultes…  : autre traduction ils ne seront plus chargés de la confusion des nations 16.52,54 ; 32.24s,30 ; 36.6-7n  ; 39.26 ; 44.13 ; cf. 16.27n.'
  - type: text
    content: 'J''aménagerai pour eux une plantation de renom ; ils ne seront plus emportés par la famine dans le pays et ils ne seront plus chargés d''insultes par les nations. '
  '3':
  - type: note
    content: 'la graisse  : LXX et Vg ont lu le lait, différence de voyelles en hébreu. – Cf. Za 11.4s.'
  - type: text
    content: 'Vous mangez la graisse, vous êtes vêtus avec la laine, vous avez sacrifié les bêtes grasses : vous ne faites pas paître le troupeau. '
  '30':
  - type: note
    content: 5.13+ ; 37.27s.
  - type: text
    content: 'Ainsi ils sauront que moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu, je suis avec eux, et qu''ils sont mon peuple, eux, la maison d''Israël – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '31':
  - type: note
    content: 'vous êtes des êtres humains (hébreu ’adam) : LXX omet cette proposition ; cf. Ps 95.7 ; 100.3.'
  - type: text
    content: 'Vous, mon troupeau, le troupeau que je fais paître, vous êtes des êtres humains ; moi, je suis votre Dieu – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '4':
  - type: note
    content: Cf. 45.9 ; 1S 8.11-18 ; 1R 21 ; Jr 23.2 ; Mi 2.2 ; Za 11.16 ; Jd 12 ; Ap 3.2.
  - type: text
    content: 'Vous n''avez pas fait reprendre des forces aux bêtes qui étaient faibles, soigné celle qui était malade, pansé celle qui était blessée ; vous n''avez pas ramené celle qui s''égarait, cherché celle qui était perdue ; mais vous les avez dominées avec force et avec rudesse. '
  '5':
  - type: note
    content: Cf. Nb 27.17 ; 1R 22.17 ; Jr 10.21 ; 50.6 ; Za 10.2 ; 2Ch 18.16 ; Mt 9.36/ / ; 1P 2.25.
  - type: text
    content: 'Elles se sont dispersées faute de berger ; elles sont devenues la proie de tous les animaux sauvages ; elles se sont dispersées. '
  '6':
  - type: note
    content: 'Mon troupeau  : cf. 1P 5.2-4. –  erre  : le verbe hébreu présente la même dualité de sens que le français (cf. erreur et errance) ; cf. 45.20 ; Lv 4.2n. –  montagnes / collines  : cf. 6.2s. –  tout le pays ou toute la terre. –  n''en prend soin  : litt. ne le recherche ou ne le réclame, comme au v. 10.'
  - type: text
    content: Mon troupeau erre dans toutes les montagnes et sur toutes les collines élevées, mon troupeau est dispersé sur tout le pays ; personne n'en prend soin, personne ne le cherche.
  '7':
  - type: text
    content: 'A cause de cela, bergers, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '8':
  - type: note
    content: Par ma vie… à coup sûr 5.11n. –  la proie… v. 5.
  - type: text
    content: 'Par ma vie, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – à coup sûr, parce que mon troupeau est livré au pillage et parce qu''il est devenu la proie de tous les animaux sauvages, faute de berger, parce que mes bergers ne prenaient aucun soin de mon troupeau, parce que les bergers se repaissaient eux-mêmes et ne faisaient pas paître mon troupeau, '
  '9':
  - type: text
    content: 'à cause de cela, bergers, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
