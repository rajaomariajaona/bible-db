document_id: EXO.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'autel de l'encens
  - type: text
    content: ' '
  - type: note
    content: autel 37.25-28 ; Nb 4.11 ; 1R 6.20s ; Es 6.6 ; Ez 41.22 ; 2Ch 4.19 ; Ap 8.3-5.
  - type: text
    content: 'Tu feras un autel pour offrir de l''encens ; tu le feras en bois d''acacia ; '
  '10':
  - type: note
    content: 'Voir Lv 16.14-19. – Voir sang, péché. –  du sacrifice offert pour l''expiation  : on pourrait aussi comprendre ici du sacrifice offert le jour de l''Expiation  ; le même terme est employé dans un sens plus général en 29.36 et dans le sens particulier de rançon en 30.16 ; cf. Lv 23.27n  ; Nb 29.11. –  une chose très sacrée 29.37n  ; voir saint.'
  - type: text
    content: 'Une fois par an, Aaron fera l''expiation sur les cornes de l''autel ; avec le sang du sacrifice pour le péché, du sacrifice offert pour l''expiation, on fera l''expiation sur lui une fois par an, dans toutes vos générations. C''est une chose très sacrée pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: L'impôt pour le sanctuaire
  '11':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '12':
  - type: note
    content: 'tu feras le dénombrement  : litt. tu lèveras la tête. Le terme hébreu correspondant à recenser signifie aussi visiter, inspecter, passer en revue  ; sur le recensement, voir 38.25-28 ; Nb 1. –  rançon  : le mot ainsi traduit (voir également v. 15n  ; terme apparenté au v. 16) vient de la même racine que celui qui est rendu par expiatoire (voir 25.17n), il comporte peut-être ici une idée d''expiation ; il s''agit en tout cas d''un prix payé pour rester en vie quand on est menacé de mort (cf. 21.30n). Voir aussi rédemption. –  fléau  : cf. 2S 24 ; 1Ch 21.'
  - type: text
    content: 'Lorsque tu feras le dénombrement des Israélites pour les recenser, chacun d''eux donnera au '
  - type: text
    content: Seigneur
  - type: text
    content: ' une rançon pour lui-même, lors du recensement ; ainsi, lors de ce recensement, il n''y aura pas de fléau parmi eux. '
  '13':
  - type: note
    content: 'Cf. 38.25s ; Né 10.33s ; Mt 17.24n. –  sicle du sanctuaire Lv 5.15n  ; Nb 3.47 ; cf. Ez 45.12 ; un demi-sicle  : environ 5 g ; voir mesures, poids et monnaies. –  prélèvement  : cf. 25.2+.'
  - type: text
    content: 'Voici ce que donneront tous ceux qui passeront au recensement : un demi-sicle, selon le sicle du sanctuaire, qui est de vingt guéras ; ce sera un prélèvement d''un demi-sicle pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '14':
  - type: text
    content: 'Quiconque passera au recensement, depuis l''âge de vingt ans et au-dessus, donnera le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'comme rançon pour eux-mêmes  : ou, selon la traduction habituelle de la tournure employée ici, pour faire l''expiation sur eux-mêmes (ou pour leur vie  ; sur le mot correspondant à eux-mêmes ou leur vie, cf. Gn 1.20n), même tournure à la fin du v. 16 ; voir v. 12n  ; 25.17n.'
  - type: text
    content: 'Le riche ne paiera pas plus, le pauvre ne paiera pas moins d''un demi-sicle pour le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme rançon pour eux-mêmes. '
  '16':
  - type: note
    content: 'de la rançon ou, selon la traduction habituelle du terme qui apparaît ici, de l''expiation (cf. v. 10n  ; 29.36). –  évocation 28.12+. –  une rançon pour eux-mêmes  : voir v. 15n.'
  - type: text
    content: 'Tu recevras des Israélites l''argent de la rançon, et tu l''emploieras au service de la tente de la Rencontre ; ce sera une évocation des Israélites devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', une rançon pour eux-mêmes.'
  - type: heading
    content: La cuve pour les purifications
  '17':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '18':
  - type: note
    content: cuve de bronze 38.8 ; cf. 1R 7.23-26,38s ; 2R 16.17 ; 2Ch 4.6.
  - type: text
    content: 'Tu feras une cuve de bronze, avec sa base de bronze, pour les ablutions ; tu la mettras entre la tente de la Rencontre et l''autel ; tu y mettras de l''eau '
  '19':
  - type: text
    content: 'avec laquelle Aaron et ses fils se laveront les mains et les pieds. '
  '2':
  - type: note
    content: 'Cf. 27.2n. –  une coudée  : environ 45 cm ; voir mesures.'
  - type: text
    content: 'sa longueur sera d''une coudée et sa largeur d''une coudée ; il sera carré, et sa hauteur sera de deux coudées. Ses cornes seront d''une seule pièce avec lui. '
  '20':
  - type: note
    content: 'offrandes  : voir sacrifices.'
  - type: text
    content: 'Lorsqu''ils entreront dans la tente de la Rencontre, ils se laveront avec cette eau ; ainsi ils ne mourront pas ; de même lorsqu''ils s''approcheront de l''autel afin d''officier et de faire fumer des offrandes consumées par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '21':
  - type: note
    content: prescription perpétuelle 12.14+ ; voir loi. – Voir générations.
  - type: text
    content: ils se laveront les mains et les pieds ; ainsi ils ne mourront pas. C'est une prescription perpétuelle pour lui et pour sa descendance, dans toutes leurs générations.
  - type: heading
    content: L'huile sacrée
  '22':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '23':
  - type: note
    content: 'meilleures essences odoriférantes  : litt. essences odoriférantes de tête. –  de celle qui coule d''elle-même  : par opposition à celle que l''on obtient par trituration des feuilles. –  cinnamome (hébreu qinnamôn) : plante aromatique proche de la cannelle. –  cinq cents sicles  : environ 4,7 kg ; voir mesures, poids et monnaies ; l''unité de mesure est sous-entendue dans le texte, ici et dans la suite du v., et jusqu''à la première occurrence du v. 24. –  deux cent cinquante sicles  : environ 2,4 kg.'
  - type: text
    content: 'Toi, prends des meilleures essences odoriférantes : de la myrrhe, de celle qui coule d''elle-même, cinq cents sicles ; du cinnamome odoriférant, la moitié, soit deux cent cinquante sicles ; du roseau odoriférant, deux cent cinquante sicles ; '
  '24':
  - type: text
    content: 'de la casse, cinq cents sicles, selon le sicle du sanctuaire ; et de l''huile d''olive, un hîn. '
  '25':
  - type: note
    content: 37.29. Sur l’onction d'huile, voir 29.7 ; 1S 10.1 ; Ps 45.8 ; 92.11 ; 104.15 ; 133.2 ; 1Ch 29.22.
  - type: text
    content: Tu feras avec cela une huile pour l'onction sacrée, une composition de parfums, ouvrage de parfumeur ; ce sera l'huile pour l'onction sacrée.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Sur l’onction de la Demeure , cf. 40.9-15 ; Gn 28.18 ; Lv 8.10-12 ; Dn 9.24.
  - type: text
    content: 'C''est avec elle que tu conféreras l''onction à la tente de la Rencontre et au coffre du Témoignage, '
  '27':
  - type: text
    content: 'à la table et à tous ses ustensiles, au porte-lampes et à ses ustensiles, à l''autel de l''encens, '
  '28':
  - type: note
    content: autel des holocaustes 27.1ss ; voir sacrifices.
  - type: text
    content: 'à l''autel des holocaustes et à tous ses ustensiles, à la cuve et à sa base. '
  '29':
  - type: note
    content: 'très sacrées  : voir 29.37n  ; cf. 2S 6.6s ; Ez 44.19 ; voir saint. –  tout ce qui les touchera  : autre traduction quiconque les touchera.'
  - type: text
    content: 'Tu consacreras ces choses, et elles seront très sacrées ; tout ce qui les touchera sera consacré. '
  '3':
  - type: note
    content: or pur 25.11+.
  - type: text
    content: 'Tu le couvriras d''or pur, avec son plateau, ses parois et ses cornes, tout autour ; tu lui feras une bordure d''or tout autour. '
  '30':
  - type: note
    content: 'Aaron et… ses fils  : voir prêtre.'
  - type: text
    content: Tu conféreras l'onction à Aaron et à ses fils ; tu les consacreras afin qu'ils exercent pour moi le sacerdoce.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'pour moi  : LXX pour vous . –  dans toutes vos générations 12.14+.'
  - type: text
    content: 'Tu diras aux Israélites : Ce sera une huile d''onction sacrée pour moi, dans toutes vos générations. '
  '32':
  - type: text
    content: 'On n''en répandra pas sur le corps d''un être humain, et vous n''en ferez pas de semblable, dans les mêmes proportions ; elle est sacrée, elle sera sacrée pour vous. '
  '33':
  - type: note
    content: 'profane  : litt. étranger  ; cf. 29.33n. –  retranché de son peuple ou des siens  ; v. 38 ; 31.14 ; Gn 17.14n  ; Lv 7.20n.'
  - type: text
    content: Quiconque en composera une semblable ou en mettra sur un profane sera retranché de son peuple.
  - type: heading
    content: La fabrication de l'encens
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Le mot onyx (LXX) ne désigne pas ici la pierre précieuse, mais une substance provenant d''une espèce de mollusque marin. Le stacté (LXX) et le galbanum (hébreu helbena ) sont sans doute des aromates tirés de plantes ou de résines ; il en est de même de l’ encens (hébreu lebona , même terme en Lv 2.1s,15s ; 5.11 ; 6.8 ; 24.7 ; Nb 5.15 ; Es 43.23 ; 60.6 ; 66.3 ; Jr 6.20 ; 17.26 ; 41.5 ; Ct 3.6 ; 4.6,14 ; Né 13.5,9 ; 1Ch 9.29) mentionné ici comme un ingrédient parmi d''autres du mélange liturgique couramment appelé encens (hébreu qetoreth , v. 35 etc.). Sur les offrandes d’ encens , voir Lv 16.12s ; 1R 10.2 ; Jr 6.20 ; Ps 141.2 ; Ap 5.8 ; 8.4. Cf. Siracide 24.15 : « Comme la cannelle et le baume aromatique, comme la myrrhe de choix j''ai (la Sagesse) exhalé mon parfum, comme du galbanum, de l''onyx et du stacte, comme une nuée d''encens dans la Demeure. »'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Prends des aromates, du stacté, de l''onyx, du galbanum, des aromates et de l''encens raffiné, en parties égales. '
  '35':
  - type: note
    content: 'un encens ou un parfum  ; contrairement au terme traduit par encens au v. 34, qui désignait un élément de la composition parmi d''autres, le mot qui apparaît ici et au v. 37 désigne l''ensemble de la composition aromatique. –  salé  : peut-être au sens de bien préparé  ; LXX mélangé. – Voir pur. –  sacré  : voir saint.'
  - type: text
    content: 'Tu feras avec cela un encens parfumé, ouvrage de parfumeur ; il sera salé, pur et sacré. '
  '36':
  - type: note
    content: je te rencontrerai 25.22+.
  - type: text
    content: 'Tu le réduiras en poudre et tu le mettras devant le Témoignage, dans la tente de la Rencontre, là où je te rencontrerai. Ce sera une chose très sacrée pour vous. '
  '37':
  - type: text
    content: 'Quant à l''encens que tu feras, vous n''en ferez pas dans les mêmes proportions pour votre usage ; il sera pour toi consacré au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '38':
  - type: note
    content: V. 33n.
  - type: text
    content: Quiconque en fera un semblable pour en sentir l'odeur sera retranché de son peuple.
  '4':
  - type: text
    content: 'Tu feras au-dessous de la bordure deux anneaux d''or, des deux côtés ; tu en feras de part et d''autre, pour recevoir les barres qui serviront à le porter. '
  '5':
  - type: text
    content: 'Tu feras les barres en bois d''acacia et tu les couvriras d''or. '
  '6':
  - type: note
    content: voile 26.31-34. –  Témoignage 16.34n. –  expiatoire 25.17n. –  je te rencontrerai 25.22+.
  - type: text
    content: 'Tu placeras l''autel en face du voile qui est devant le coffre du Témoignage, en face de l''expiatoire qui est sur le Témoignage, là où je te rencontrerai. '
  '7':
  - type: note
    content: 'Aaron  : voir prêtre.'
  - type: text
    content: 'Aaron y fera fumer de l''encens aromatique ; il en fera fumer chaque matin, lorsqu''il s''occupera des lampes ; '
  '8':
  - type: note
    content: 'fera… fumer et encens correspondent à des termes apparentés en hébreu. –  à la tombée du soir 12.6n. –  arrangera 25.37n. –  C''est un encens…  : litt. (en) encens constant devant YHWH. –  générations 12.14+.'
  - type: text
    content: 'Aaron en fera aussi fumer à la tombée du soir, lorsqu''il arrangera les lampes. C''est un encens qui fumera constamment devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans toutes vos générations. '
  '9':
  - type: note
    content: 'encens profane  : litt. encens étranger  ; cf. 29.33n  ; Nb 3.4n. –  holocauste  : voir sacrifices.'
  - type: text
    content: 'Vous n''offrirez sur l''autel ni encens profane, ni holocauste, ni offrande végétale, et vous n''y répandrez aucune libation. '
