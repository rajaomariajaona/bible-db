  - type: text
    text: 'Voici ce que donneront tous ceux qui passeront au recensement : un demi-sicle, selon le sicle du sanctuaire, qui est de vingt guéras ; ce sera un prélèvement d''un demi-sicle pour le '
  - type: usfm
