  - type: text
    text: 'Une fois par an, Aaron fera l''expiation sur les cornes de l''autel ; avec le sang du sacrifice pour le péché, du sacrifice offert pour l''expiation, on fera l''expiation sur lui une fois par an, dans toutes vos générations. C''est une chose très sacrée pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
