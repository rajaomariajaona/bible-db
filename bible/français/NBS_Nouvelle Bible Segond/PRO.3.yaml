        - type: text
          text: '4.1 : « La Sagesse, c''est le livre des commandements de Dieu, c''est la Loi qui existe pour toujours ; tous ceux qui s''attachent à elle iront à la vie, mais ceux qui l''abandonnent mourront. » –  '
      - type: usfm
