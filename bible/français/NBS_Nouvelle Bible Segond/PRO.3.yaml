document_id: PRO.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sagesse et crainte de Dieu
  - type: text
    content: ' '
  - type: note
    content: enseignement 1.8n  ; 5.1 ; 6.20 ; 7.1 ; cf. Dt 8.1ss ; 30.1ss. – Voir cœur. –  préceptes 2.1n.
  - type: text
    content: Mon fils, n'oublie pas mon enseignement,
  - type: text
    content: et que ton cœur garde mes préceptes ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'remplies d''abondance  : LXX remplies de blé  ; cf. Dt 16.1 ; 28.8 ; Ps 4.8. –  déborderont ou, plus litt., éclateront . –  vin  : autre traduction vin nouveau , cf. Gn 27.28n.'
  - type: text
    content: alors tes granges seront remplies d'abondance,
  - type: text
    content: et tes cuves déborderont de vin.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Hé 12.5s . –  Ne rejette pas  : autre traduction ne méprise pas . –  instruction ou correction  ; cf. 1.2n. –  avertissements 1.23n.'
  - type: text
    content: 'Ne rejette pas, mon fils, l''instruction du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et ne prends pas ses avertissements en horreur ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: avertit ou reprend  ; c'est le verbe hébreu d'où vient le mot traduit par avertissements au v. 11 ; cf. Dt 8.5 ; Ap 3.19.
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avertit celui qu''il aime,'
  - type: text
    content: comme un père l'enfant qu'il agrée.
  - type: heading
    content: La sagesse, un bien plus précieux que l'or
  '13':
  - type: text
    content: Heureux celui qui a trouvé la sagesse,
  - type: text
    content: celui qui obtient l'intelligence !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le gain qu''elle procure  : litt. son gain . –  l''argent / l''or 8.10,19 ; 16.16 ; 22.1 ; 27.21 ; voir aussi 2.4+ ; 10.20 ; 17.3,16 ; 25.4,11 ; 26.23. –  ce qu''elle rapporte v. 9n.'
  - type: text
    content: Car le gain qu'elle procure est préférable au gain de l'argent,
  - type: text
    content: et ce qu'elle rapporte vaut mieux que l'or ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'coraux  : autres traductions rubis ; perles  ; LXX pierres précieuses  ; cf. 8.11 ; 20.15 ; 31.10 ; Jb 28.18n  ; Lm 4.7n.'
  - type: text
    content: elle est plus précieuse que les coraux,
  - type: text
    content: et rien de ce que tu peux désirer n'a sa valeur.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'longueur de jours v. 2 ; cf. 8.18 ; voir Siracide 4.12s : « L''aimer, c''est aimer la vie, ceux qui se lèvent de bon matin pour elle seront remplis de joie. Celui qui la possède obtiendra la gloire en héritage, le lieu où il va, le Seigneur le bénit. »'
  - type: text
    content: Dans sa main droite, il y a longueur de jours ;
  - type: text
    content: dans sa main gauche, richesse et gloire.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'voies…  : cf. 2.13+.'
  - type: text
    content: Ses voies sont belles,
  - type: text
    content: et tous ses sentiers sont paix.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'arbre de vie  : cf. 11.30 ; 13.12 ; 15.4 ; Gn 2.9+ ; 3.22 ; Ap 2.7 ; 22.14,19 ; Baruch 4.1 : « La Sagesse, c''est le livre des commandements de Dieu, c''est la Loi qui existe pour toujours ; tous ceux qui s''attachent à elle iront à la vie, mais ceux qui l''abandonnent mourront. » –  tiennent ferme 4.4 ; cf. 5.5n.'
  - type: text
    content: Elle est un arbre de vie pour ceux qui la saisissent,
  - type: text
    content: et ceux qui la tiennent ferme sont déclarés heureux.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'par (ou avec ) la sagesse 8.22-31 ; cf. Sagesse 9.1s : « Dieu des pères et Seigneur miséricordieux qui as fait l''univers par ta parole, formé l''homme par ta Sagesse afin qu''il domine sur les créatures appelées par toi à l''existence. »'
  - type: text
    content: 'C''est par la sagesse que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fonde la terre,'
  - type: text
    content: c'est par l'intelligence qu'il installe le ciel ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'longueur de jours  : c.-à-d. longévité  ; cf. v. 16 ; 4.10 ; 9.11 ; 10.27 ; Dt 4.40 ; 8.3 ; 1R 5.26 ; Ps 21.5n  ; Né 9.29 ; voir Siracide 1.20 : « La racine de la sagesse, c''est la crainte du Seigneur, et ses rameaux sont une longue vie. » Baruch 3.14 : « Apprends où est le discernement, où est la force, où est le savoir pour connaître en même temps où sont la longévité et la vie, où sont la lumière des yeux et la paix. » Voir aussi Dt 5.6 ; 6.2 ; Jb 42.16s. –  paix  : autre traduction prospérité.'
  - type: text
    content: car ils t'ajouteront longueur de jours,
  - type: text
    content: années de vie et paix.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'abîmes  : cf. 8.24,27s ; voir Gn 1.2n.'
  - type: text
    content: c'est par sa connaissance que les abîmes se sont ouverts
  - type: text
    content: et que les nuages distillent la rosée.
  - type: heading
    content: Dieu protège le sage
  '21':
  - type: text
    content: ' '
  - type: note
    content: garde 4.21. –  raison 2.7n.
  - type: text
    content: Mon fils, garde, sans qu'elles s'éloignent de tes yeux,
  - type: text
    content: 'la raison et la réflexion :'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'la vie de ta gorge  : autre traduction ta propre vie (sur le terme correspondant, cf. Gn 1.20n). – Voir grâce. –  ton cou 1.9.'
  - type: text
    content: elles seront la vie de ta gorge
  - type: text
    content: et la grâce de ton cou.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'tu iras ton chemin…  : cf. 4.12. –  tes pieds…  : litt. ton pied ne heurtera pas (cf. Ps 91.12).'
  - type: text
    content: Alors tu iras ton chemin en sécurité,
  - type: text
    content: et tes pieds ne heurteront rien.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Si tu te couches… 6.22 ; Ps 3.6+.
  - type: text
    content: Si tu te couches, tu n'auras aucune frayeur ;
  - type: text
    content: et quand tu seras couché, ton sommeil sera doux.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 33 ; 4.14,16-18 ; Ps 91.5+. –  Ne crains  : autre traduction tu ne craindras . –  la tourmente des méchants  : on peut comprendre aussi bien l''assaut des méchants que la tourmente qui va s''abattre sur les méchants . –  quand elle arrive  : autre traduction parce qu''elle arrive.'
  - type: text
    content: Ne crains ni la frayeur soudaine,
  - type: text
    content: ni la tourmente des méchants, quand elle arrive ;
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'car le Seigneur …  : litt. car YHWH sera dans tes reins  ; cf. Jb 5.19-27. –  tes pieds  : litt. ton pied.'
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera ton assurance,'
  - type: text
    content: il préservera tes pieds de tout piège.
  - type: heading
    content: Le sage et son prochain
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'à ceux qui y ont droit  : litt. à ses possesseurs (hébreu ba`al ) ; cf. Siracide 4.3 : « N''ajoute pas au tourment d''un cœur irrité, ne fais pas attendre tes dons à qui en a besoin. » Voir Mt 7.12.'
  - type: text
    content: Ne refuse pas un bienfait à ceux qui y ont droit,
  - type: text
    content: quand tu as le pouvoir de l'accorder.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'ton prochain  : cf. 6.1,3,29 ; 25.9 ; 27.17 ; voir aussi Mt 5.43-48 ; Lc 10.25-37. –  quand tu as de quoi donner  : litt. alors qu''il y a (quelque chose) avec toi.'
  - type: text
    content: 'Ne dis pas à ton prochain : « Va et reviens,'
  - type: text
    content: demain je donnerai ! » quand tu as de quoi donner.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Les mots correspondant à mal et prochain font assonance en hébreu ; cf. Jr 12.6 ; Ps 55.13.
  - type: text
    content: Ne trame pas le mal contre ton prochain,
  - type: text
    content: lorsqu'il habite auprès de toi en toute sécurité.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'fidélité  : cf. 19.22 ; 20.6 ; Ps 25.10n  ; 85.11+. –  loyauté ou vérité  ; cf. l''usage du même terme en 8.7 ; 11.18 ; 12.19 ; 14.25 ; 22.21 ; 23.23 ; voir aussi 14.22 ; 16.6 ; 20.28 ; Ps 85.11n. –  attache-les… écris-les… 6.21 ; 7.3 ; Dt 5.22 ; cf. Ex 13.9 ; Dt 6.6-9.'
  - type: text
    content: Que la fidélité et la loyauté ne t'abandonnent pas ;
  - type: text
    content: attache-les à ton cou, écris-les sur la tablette de ton cœur.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'N''accuse pas  : autre traduction ne te querelle pas avec.'
  - type: text
    content: N'accuse pas quelqu'un sans raison,
  - type: text
    content: lorsqu'il ne t'a fait aucun mal.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 23.17 ; 24.1,19 ; Ps 37.1+ ; 73.3+ ; Siracide 11.21 : « Ne t''étonne pas des œuvres du pécheur, fais confiance au Seigneur et persévère dans ta besogne, car il est facile aux yeux du Seigneur d''enrichir soudain le pauvre d''un seul coup. »'
  - type: text
    content: Ne sois pas jaloux de l'homme violent,
  - type: text
    content: et ne choisis aucune de ses voies.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'une abomination pour le Seigneur  : litt. abomination de YHWH , 6.16 ; 8.7 ; 11.1,20 ; 12.22 ; 13.19 ; 15.8s,26 ; 16.5,12 ; 17.15 ; 20.10,23 ; 21.27 ; 24.9 ; 26.25 ; 27.14 ; 28.9 ; 29.27 ; cf. Gn 43.32n  ; voir pur, impur. –  ses secrets  : autre traduction son conseil secret  ; même terme en 11.13 ; 15.22 ( délibérations secrètes ) ; 20.19 ; 25.9 ; cf. Ps 25.14.'
  - type: text
    content: 'Car l''homme sinueux est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: mais ses secrets sont pour les gens droits ;
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'malédiction  : voir bénédiction.'
  - type: text
    content: 'la malédiction du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est dans la maison du méchant,'
  - type: text
    content: mais il bénit le domaine des justes ;
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'aux affligés ou aux humbles  ; autre lecture traditionnelle aux pauvres  ; LXX le Seigneur résiste aux orgueilleux, mais il accorde sa grâce aux humbles  ; cf. Jc 4.6 ; 1P 5.5  ; voir aussi Pr 14.21n  ; Ps 9.13n  ; Siracide 3.18,20 : « Plus tu es grand, plus il faut t''humilier, et devant le Seigneur tu trouveras grâce. Car grande est la puissance du Seigneur, et il est glorifié par les humbles. »'
  - type: text
    content: les insolents, il les traite avec insolence,
  - type: text
    content: mais il fait grâce aux affligés ;
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'les sages auront…  : cf. Siracide 4.13 : « Celui qui la possède obtiendra la gloire en héritage, le lieu où il va, le Seigneur le bénit. » –  stupides 1.22+. –  mépris  : même terme 6.33 ; 9.7 ; 11.2 ; 12.16n  ; 13.18 ; 18.3 ; 22.10 ; il est aussi traduit par ignominie (Jr 13.26+) ; cf. Es 22.18 ; Os 4.7,18 ; Na 3.5 ; Ha 2.16 ; Ps 83.17 ; Jb 10.15.'
  - type: text
    content: les sages auront la gloire pour patrimoine ;
  - type: text
    content: les gens stupides, le plus grand mépris.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'grâce et bon sens 13.15 ; cf. Ps 111.10 ; Lc 2.52 ; Rm 12.17. –  aux yeux de Dieu  : autre traduction possible aux yeux des dieux.'
  - type: text
    content: Tu trouveras ainsi grâce et bon sens
  - type: text
    content: aux yeux de Dieu et des humains.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'confiance Ps 37.5 ; cf. Pr 28.26 ; Siracide 2.6 : « Aie confiance en Dieu et il te viendra en aide, suis une voie droite et espère en lui. »'
  - type: text
    content: 'De tout ton cœur, mets ta confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: ne t'appuie pas sur ta propre intelligence ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'reconnais-le  : litt. connais-le . –  c''est lui  : cf. 16.3.'
  - type: text
    content: reconnais-le dans toutes tes voies,
  - type: text
    content: et c'est lui qui aplanira tes sentiers.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ne te crois pas trop sage  : litt. ne sois pas sage à tes yeux 26.12 ; 28.11 ; Rm 12.16. – Voir crainte.'
  - type: text
    content: Ne te crois pas trop sage ;
  - type: text
    content: 'crains le '
  - type: text
    content: Seigneur
  - type: text
    content: ', écarte-toi du mal :'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'pour ton corps  : litt. pour ton nombril  ; LXX pour ton corps  ; cf. 4.22 ; Siracide 30.15 : « Une robuste santé vaut mieux que tout l''or du monde, un esprit vigoureux mieux qu''une immense fortune. »'
  - type: text
    content: ce sera la santé pour ton corps
  - type: text
    content: et un rafraîchissement pour tes os.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Honore  : autre traduction glorifie Ex 23.19 ; 34.26 ; Dt 26.2 ; Ml 3.10-12. –  tes récoltes  : autre traduction tes revenus  ; le même terme est traduit par ce qu''elle rapporte au v. 14 ; il revient en 8.19 ; 10.16 ; 14.4 ; 15.6 ; 16.8 ; 18.20 ( produit ).'
  - type: text
    content: 'Honore le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec tes biens'
  - type: text
    content: 'et avec les prémices de toutes tes récoltes :'
