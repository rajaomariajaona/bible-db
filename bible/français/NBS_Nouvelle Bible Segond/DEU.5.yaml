document_id: DEU.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Dix paroles
  - type: heading
    content: Ex 20.1-17
  - type: text
    content: ' '
  - type: note
    content: 'convoqua  : autre traduction appela . –  tout Israël 1.1+. –  Ecoute, Israël 4.1+. –  en votre présence  : litt. à vos oreilles . –  vous veillerez (le même verbe est traduit ailleurs par garder, observer , cf. 4.6n) / mettre en pratique (litt. faire ) : formules analogues au v. 32 ; 6.3,25 ; 8.1 ; 11.32 ; 12.1 ; 13.1 ; 15.5 ; 17.10n  ; 23.24 ; 24.8 ; 28.1,15,58 ; 31.12 ; 32.46 ; Jos 1.7 ; 22.5 ; 2R 17.37.'
  - type: text
    content: 'Moïse convoqua tout Israël ; il leur dit : Ecoute, Israël, les prescriptions et les règles que j''énonce aujourd''hui en votre présence. Vous les apprendrez et vous veillerez à les mettre en pratique. '
  '10':
  - type: note
    content: ceux qui m'aiment 6.5 ; 7.9 ; 10.12 ; 11.1,13,22 ; 13.4 ; 19.9 ; 30.6,16,20 ; Jos 22.5 ; 23.11 ; Jg 5.31 ; 1R 3.3 ; Ps 31.24 ; 97.10.
  - type: text
    content: mais qui agis avec fidélité jusqu'à la millième génération envers ceux qui m'aiment et qui observent mes commandements.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'pour tromper  : cf. v. 20n  ; Ex 20.7n.'
  - type: text
    content: 'Tu n''invoqueras pas le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, pour tromper : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne tiendra pas pour innocent celui qui invoquera son nom pour tromper.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Voir sabbat. –  sacré  : voir saint.'
  - type: text
    content: 'Observe le sabbat, pour en faire un jour sacré, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te l''a ordonné. '
  '13':
  - type: note
    content: Cf. Lc 13.14.
  - type: text
    content: 'Pendant six jours tu travailleras, et tu feras tout ton ouvrage. '
  '14':
  - type: note
    content: 'serviteur (autre traduction esclave) / servante  : cf. 23.16. –  bœuf 25.4. –  immigré 10.19.'
  - type: text
    content: 'Mais le septième jour, c''est un sabbat pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu : tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bœuf, ni ton âne, ni aucune de tes bêtes, ni l''immigré qui est dans tes villes, afin que ton serviteur et ta servante puissent se reposer comme toi. '
  '15':
  - type: note
    content: 'Tu te souviendras 7.18s ; 8.2,18 ; 9.7 ; 15.15 ; 16.3 ; 24.9,18 ; 25.17 ; 32.7. –  tu as été esclave en Egypte  : cf. 6.21 ; 10.19 ; 15.15 ; 16.1,3,12 ; 23.8 ; 24.18,22 ; 26.6 ; Ex 14.5 ; 22.20 ; 23.9 ; Lv 19.34 ; 26.13 ; 1Ch 29.15. –  d''une main forte… 4.34+. –  célébrer  : litt. faire.'
  - type: text
    content: 'Tu te souviendras que tu as été esclave en Egypte et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''en a fait sortir d''une main forte, d''un bras étendu : c''est pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a ordonné de célébrer le jour du sabbat.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: que tu sois heureux 4.40n  ; cf. Mt 15.4/ /.
  - type: text
    content: 'Honore ton père et ta mère, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te l''a ordonné, afin que tes jours se prolongent et que tu sois heureux sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'La séparation des v. n''est pas uniforme dans les mss hébreux et les versions anciennes : les v. 17-20 forment parfois un seul v. et la numérotation est décalée en conséquence. Cf. Mt 5.21,27 ; 19.18-19/ / ; Rm 13.9 ; Jc 2.11.'
  - type: text
    content: Tu ne commettras pas de meurtre.
  '18':
  - type: text
    content: Tu ne commettras pas d'adultère.
  '19':
  - type: text
    content: Tu ne commettras pas de vol.
  '2':
  - type: note
    content: Ex 19.5s ; 24.1-8. – Voir alliance. –  à l'Horeb 4.10.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, a conclu avec nous une alliance à l''Horeb. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: faux témoignage ou témoignage d'illusion, de tromperie  ; même terme hébreu qu'au v. 11 et autre terme qu'en Ex 20.16.
  - type: text
    content: Tu ne porteras pas de faux témoignage contre ton prochain.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'désireras  : le verbe correspondant ne figure pas en Ex 20.17 ; il est probablement plus fort que celui qui est rendu ici et en Ex 20.17 par convoiteras  ; cf. Nb 11.4 ( être rempli de désir ) ; 2S 23.15 ; Am 5.18 ; voir aussi Rm 7.7.'
  - type: text
    content: Tu ne convoiteras pas la femme de ton prochain ; tu ne désireras pas la maison de ton prochain, ni son champ, ni son serviteur, ni sa servante, ni son bœuf, ni son âne, ni rien de ce qui appartient à ton prochain. »
  '22':
  - type: text
    content: ' '
  - type: note
    content: 4.11+ ; Hé 12.18. –  assemblée 9.10 ; 10.4 ; 18.16 ; 23.2-9 ; 31.30 ; Jos 8.35 ; 1R 8.22. –  sans rien ajouter 4.2+. –  tablettes de pierre 4.13+.
  - type: text
    content: 'Ces paroles, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les a adressées à toute votre assemblée dans la montagne, du milieu du feu, des nuées et de l''obscurité épaisse, avec une grande voix, sans rien ajouter. Il les a écrites sur deux tablettes de pierre qu''il m''a données.'
  - type: heading
    content: Moïse, porte-parole de Dieu
  '23':
  - type: text
    content: ' '
  - type: note
    content: toute en feu 4.11+.
  - type: text
    content: 'Après avoir entendu la voix du milieu des ténèbres, et tandis que la montagne était toute en feu, vous vous êtes présentés devant moi, avec tous les chefs de vos tribus et vos anciens, '
  '24':
  - type: note
    content: 'Voir gloire. –  grandeur 3.24+. –  Dieu peut parler à l''homme…  : cf. Ex 33.20.'
  - type: text
    content: 'et vous avez dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous a fait voir sa gloire et sa grandeur, et nous avons entendu sa voix du milieu du feu ; en ce jour nous avons vu que Dieu peut parler à l''homme et que celui-ci peut rester en vie. '
  '25':
  - type: note
    content: 4.33 ; 18.16.
  - type: text
    content: 'Maintenant, pourquoi mourrions-nous ? Car ce grand feu nous dévorera ! Si nous continuons à entendre la voix du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous mourrons ! '
  '26':
  - type: note
    content: 'Qui donc a jamais entendu  : litt. qui (de) toute chair a entendu. –  Dieu vivant Jos 3.10 ; Jr 10.10 ; 23.36 ; Os 2.1 ; Dn 6.27 ; Mt 16.16 ; Ac 14.15 ; 2Co 3.3.'
  - type: text
    content: 'Qui donc a jamais entendu, comme nous, la voix du Dieu vivant parler du milieu du feu et est resté en vie ? '
  '27':
  - type: note
    content: Ex 20.18-21 ; cf. 1Tm 2.5 ; Hé 12.24.
  - type: text
    content: 'Présente-toi, toi, écoute tout ce que dira le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ; toi, tu nous diras tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, t''aura dit ; nous l''écouterons, et nous le ferons.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'ce que vous me disiez  : litt. la voix (ou le son ) de vos paroles quand vous me parliez , de même dans la suite.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a entendu ce que vous me disiez ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : J''ai entendu ce que ce peuple t''a dit ; tout ce qu''ils ont dit est bon. '
  '29':
  - type: note
    content: 'toujours (première occurrence) : litt. tous les jours. – Voir cœur. –  pour me craindre 4.10+. –  heureux pour toujours, eux et leurs fils 4.40n.'
  - type: text
    content: 'Ah ! s''ils avaient toujours ce même cœur pour me craindre et pour observer tous mes commandements, afin qu''ils soient heureux pour toujours, eux et leurs fils ! '
  '3':
  - type: note
    content: Cf. 1.35,39 ; 2.14-16 ; 4.23,31,37.
  - type: text
    content: 'Ce n''est pas avec nos pères que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a conclu cette alliance ; c''est avec nous, qui sommes ici aujourd''hui, tous vivants. '
  '30':
  - type: text
    content: 'Va, dis-leur : « Retournez à vos tentes. » '
  '31':
  - type: note
    content: 'tout le commandement (voir loi) : cf. 6.25 ; 8.1 ; 11.8,22 ; 15.5 ; 19.9 ; 27.1 ; 31.5 ; voir aussi Ex 24.12.'
  - type: text
    content: 'Toi, reste ici avec moi, et je te dirai tout le commandement, les prescriptions et les règles que tu leur apprendras afin qu''ils les mettent en pratique dans le pays que je leur donne pour qu''ils en prennent possession. '
  '32':
  - type: note
    content: Vous veillerez… v. 1n. –  ni à droite ni à gauche 17.11,20 ; 28.14 ; Jos 1.7 ; 23.6 ; 2R 22.2.
  - type: text
    content: '– Vous veillerez à mettre en pratique ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous a ordonné ; vous ne vous en écarterez ni à droite ni à gauche. '
  '33':
  - type: note
    content: que vous viviez 4.1+. –  heureux 4.40n. –  prolongiez vos jours 4.26+.
  - type: text
    content: 'Vous suivrez en tout la voie que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous a prescrite, afin que vous viviez, que vous soyez heureux et que vous prolongiez vos jours dans le pays dont vous prendrez possession.'
  '4':
  - type: note
    content: Cf. 34.10 ; Gn 32.31 ; Ex 33.11 ; Nb 12.6-8 ; 1Co 13.12.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a parlé face à face dans la montagne, du milieu du feu. '
  '5':
  - type: note
    content: 'la parole  : un ms hébreu et des versions anciennes ont lu les paroles (4.36) ; cf. 5.23-30 ; Ga 3.19s.'
  - type: text
    content: 'Je me tenais en ce temps-là entre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et vous, pour vous dire la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; car vous aviez peur du feu et vous n''êtes pas montés dans la montagne. Il a dit :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 20.2-17 (voir les notes). –  Seigneur (YHWH)  : voir noms divins. –  maison des esclaves 6.12 ; 7.8 ; 8.14 ; 13.6,11 ; Ex 13.3+ ; Jos 24.17 ; Jg 6.8 ; Jr 34.13.'
  - type: text
    content: '« Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu ; c''est moi qui t''ai fait sortir de l''Egypte, de la maison des esclaves.'
  '7':
  - type: text
    content: Tu n'auras pas d'autres dieux devant moi.
  '8':
  - type: text
    content: 'Tu ne te feras pas de statue, aucune forme de ce qui est dans le ciel, en haut, de ce qui est sur la terre, en bas, ou de ce qui est dans les eaux, au-dessous de la terre. '
  '9':
  - type: note
    content: 'Ex 20.5n  ; 34.7 ; Nb 14.18. –  faute  : voir péché.'
  - type: text
    content: 'Tu ne te prosterneras pas devant ces choses-là et tu ne les serviras pas ; car moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, je suis un Dieu à la passion jalouse, qui fais rendre des comptes aux fils pour la faute des pères, jusqu''à la troisième et la quatrième génération de ceux qui me détestent, '
