    - type: text
      text: ', ton Dieu : tu ne feras aucun travail, ni toi, ni ton fils, ni ta fille, ni ton serviteur, ni ta servante, ni ton bœuf, ni ton âne, ni aucune de tes bêtes, ni l''immigré qui est dans tes villes, afin que ton serviteur et ta servante puissent se reposer comme toi. '
