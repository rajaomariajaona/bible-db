      marker-yv: yv-n
    - type: text
      text: 'Moïse convoqua tout Israël ; il leur dit : Ecoute, Israël, les prescriptions et les règles que j''énonce aujourd''hui en votre présence. Vous les apprendrez et vous veillerez à les mettre en pratique. '
