    - type: text
      text: ', ton Dieu, t''en a fait sortir d''une main forte, d''un bras étendu : c''est pourquoi le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''a ordonné de célébrer le jour du sabbat.'
