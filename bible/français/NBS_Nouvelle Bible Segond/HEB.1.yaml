document_id: HEB.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prologue
  - type: text
    content: ' '
  - type: note
    content: aux pères 3.9 ; 8.9 ; voir aussi Lc 1.55 ; Rm 4.16-18 ; 11.17 ; 1Co 10.1. –  par (litt. dans ) les prophètes Os 12.10s.
  - type: text
    content: 'Après avoir autrefois, à bien des reprises et de bien des manières, parlé aux pères par les prophètes, Dieu '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 102.26-28 . –  l''ouvrage  : litt. les œuvres  ; cf. 2.7n  ; 3.9 ; 4.3s,10.'
  - type: text
    content: 'Et encore :'
  - type: text
    content: C'est toi, Seigneur, qui as fondé la terre au commencement,
  - type: text
    content: et les cieux sont l'ouvrage de tes mains ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ils s''useront  : litt. ils vieilliront  ; le même verbe est traduit par rendre ancien en 8.13 ; cf. Lc 12.33. –  comme un vêtement  : cf. Es 50.9 ; 51.6 ; plusieurs mss omettent la répétition de l''expression correspondante au v. 12.'
  - type: text
    content: Ils disparaîtront, mais toi, tu demeures ;
  - type: text
    content: ils s'useront tous comme un vêtement ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Tu les rouleras Es 34.4 ; Ap 6.14 ; certains mss portent tu les changeras  ; voir aussi Hé 12.26s. –  le même 13.8.
  - type: text
    content: Tu les rouleras comme un habit,
  - type: text
    content: et ils seront changés
  - type: text
    content: ' comme un vêtement,'
  - type: text
    content: mais toi, tu es le même, et tes années ne finiront pas
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 110.1 . –  Assieds-toi ou siège . L''épître reprend ici le verbe employé dans la traduction grecque (LXX) du Ps 110 et qui signifie le plus souvent être assis . Partout ailleurs (1.3+) elle emploie un verbe en partie synonyme, qui signifie plutôt s''asseoir  ; il pourrait évoquer plus particulièrement l''entrée en fonction d''un roi ou d''un juge (cf. Mt 19.28 ; 20.21ss ; 25.31 ; Ac 23.3 ; 25.6,17 ; 1Co 6.4n  ; Ap 3.21). –  ton marchepied  : litt. le marchepied de tes pieds.'
  - type: text
    content: 'Et pour lequel des anges a-t-il jamais dit :'
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: jusqu'à ce que je fasse de tes ennemis ton marchepied.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'des esprits…  : cf. v. 7n. –  serviteurs / ministère  : les deux termes grecs ainsi traduits évoquent l''idée de service ; le premier (dérivé du mot traduit par serviteurs au v. 7) s''applique plutôt à un service public, religieux ou profane (voir aussi 8.2,6 ; 9.21n  ; 10.11 ; Ac 13.2n  ; Rm 13.6n), le second à un service personnel ; cf. 6.10 ; Ps 91.11 ; Dn 7.10 ; Mt 4.11n  ; 18.10 ; 20.26n  ; Ac 6.1n  ; 12.11 ; Ap 19.10. –  hériter  : cf. v. 2,4.'
  - type: text
    content: Ne sont-ils pas tous des esprits serviteurs, envoyés pour exercer leur ministère en faveur de ceux qui vont hériter le salut ?
  '2':
  - type: note
    content: 'en ces jours qui sont les derniers  : litt. au terme de ces jours-ci  ; cf. 9.26 ; Jr 23.20 ; Ez 38.16 ; Mi 4.1 ; Dn 2.28,45 ; 10.14 ; Ac 2.17 ; 1Co 1.11 ; 1P 1.20. –  par un Fils…  : la formulation met en valeur la qualité du nouveau messager, Fils par opposition aux prophètes (v. 1) qui sont habituellement qualifiés de serviteurs ; cf. 3.5s ; 4.14 ; Am 3.7 ; Ps 2.6-12 ; Mt 21.33-38/ /. –  héritier de tout 2.8 ; Mt 28.18. –  par qui  : cf. 11.3 ; Jn 1.3 ; 1Co 8.6 ; Col 1.16 ; voir aussi Pr 8.27-31 ; Sagesse 7.21 : « L''artisane de l''univers, la Sagesse. » –  les mondes ou les âges, les temps, traduction traditionnelle les siècles (v. 8n  ; 6.5 ; 11.3 ; c''est le mot grec qui a donné le terme éons, voir Ep 2.2n).'
  - type: text
    content: nous a parlé, en ces jours qui sont les derniers, par un Fils qu'il a constitué héritier de tout et par qui il a fait les mondes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'rayonnement de sa gloire 2Co 4.4 ; Col 1.15 ; cf. Sagesse 7.25s : « Elle (la Sagesse) est un effluve de la puissance de Dieu, une pure irradiation de la gloire du Tout-Puissant… Elle est un reflet de la lumière éternelle, un miroir sans tache de l''activité de Dieu et une image de sa bonté. » –  l''expression ou l''empreinte (le terme grec a donné notre mot caractère ). –  sa réalité même ou sa vraie nature  ; c''est du mot grec correspondant que vient le terme technique hypostase (également 3.14n  ; 11.1n  ; 2Co 9.4n). –  soutient tout Col 1.17. –  par sa parole  : grammaticalement, il peut s''agir de celle de Dieu ou de celle du Fils ; cf. 11.3 ; Ps 33.9. Cf. Philon d''Alexandrie, De migratione Abrahami , 3-6 : « La Parole est l''habitation du père… L''habitation de Dieu n''est pas telle ou telle des réalités qui supportent la description ou tombent sous le sens… Que serait cette habitation sinon la Parole antérieure à tous les êtres qui ont reçu l''existence et le devenir, la Parole dont le Pilote de l''Univers s''est emparé comme d''un timon pour gouverner le Tout : quand il façonnait le monde, Il en avait fait son instrument pour assurer l''irréprochable cohésion de son œuvre. » –  après avoir fait  : certains mss ajoutent par lui-même . –  purification des péchés 9.14,26. –  il s''est assis… v. 13n  ; 8.1 ; 10.12 ; 12.2 ; Ps 110.1 ; 113.5 ; Mt 22.44/ / ; 26.64/ / ; Mc 16.19 ; Ep 1.20 ; autres références à différents détails du Ps 110 en Hé 5.6,10 ; 6.20 ; 7.11-28 ; 10.12s.'
  - type: text
    content: Ce Fils, qui est le rayonnement de sa gloire et l'expression de sa réalité même,
  - type: text
    content: soutient tout par sa parole puissante ;
  - type: text
    content: après avoir fait la purification des péchés,
  - type: text
    content: il s'est assis à la droite de la majesté dans les hauteurs,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'supérieur aux (ou meilleur que les , même terme en 6.9 ; 7.7,19,22 ; 8.6 ; 9.23 ; 10.34 ; 11.16,35,40 ; 12.24) anges 1.5–2.18 ; cf. Ep 1.21 ; Ph 2.9-11 ; 1P 3.22. – Voir nom . –  plus remarquable que le leur  : autre traduction bien différent du leur , cf. 8.6.'
  - type: text
    content: devenu d'autant supérieur aux anges
  - type: text
    content: qu'il a hérité un nom plus remarquable que le leur.
  - type: heading
    content: Le Fils supérieur aux anges
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ac 13.33 ; Rm 1.3s. –  Dieu  : le sujet est sous-entendu dans le texte, litt. a-t-il jamais dit . –  Tu es mon Fils… 5.5 ; Ps 2.7 . –  aujourd''hui 3.7,13,15 ; 4.7 ; 13.8. –  Moi, je serai… 2S 7.14 ; 1Ch 17.13.'
  - type: text
    content: 'Auquel des anges, en effet, Dieu a-t-il jamais dit :'
  - type: text
    content: Tu es mon Fils,
  - type: text
    content: c'est moi qui t'ai engendré aujourd'hui.
  - type: text
    content: 'Et encore :'
  - type: text
    content: Moi, je serai pour lui un Père,
  - type: text
    content: et lui sera pour moi un Fils.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Et encore…  : d''autres comprennent et quand il introduit (ou introduira ) de nouveau…  ; cf. v. 5 ; 2.13 ; 4.5,7 ; le verbe traduit par introduit peut s''entendre d''une intronisation. –  premier-né Ps 89.28 ; Col 1.18. –  le monde  : ici comme en 2.5, il s''agit du terme grec rendu dans le reste du N.T. par terre habitée (Mt 24.14n) ; si le verbe traduit précédemment par introduire se réfère à l''intronisation du Christ (après sa mort), il faut ici entendre monde dans un sens analogue à celui qu''il a en 2.5 ( monde à venir ). –  Que tous les anges… Dt 32.43n  ; Ps 97.7n . –  se prosternent devant lui  : autres traductions lui rendent hommage, l''adorent (voir culte), cf. Mt 2.2n.'
  - type: text
    content: 'Et encore, quand il introduit le premier-né dans le monde, il dit :'
  - type: text
    content: Que tous les anges de Dieu se prosternent devant lui !
  '7':
  - type: text
    content: ' '
  - type: note
    content: Il fait… Ps 104.4n . –  des esprits ou des vents (même mot en hébreu comme en grec) ; cf. v. 14n.
  - type: text
    content: 'Pour les anges, il dit :'
  - type: text
    content: Il fait de ses anges des esprits,
  - type: text
    content: de ses serviteurs un feu flamboyant
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 45.7s . –  pour le Fils  : autre traduction au Fils , même possibilité au v. 13 ; cf. v. 7. –  est établi pour toujours  : litt. est pour le siècle du siècle , cf. v. 2n  ; Ga 1.5n. –  ton règne  : autres traductions ton royaume, ta royauté (Mt 3.2n) ; plusieurs mss portent son règne.'
  - type: text
    content: 'Mais pour le Fils :'
  - type: text
    content: Ton trône, ô Dieu, est établi pour toujours,
  - type: text
    content: le sceptre de ton règne est un sceptre d'équité
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Voir justice . –  le mal  : litt. la non-loi  ; le même terme, au pluriel, est traduit par désordres en 10.17 ; voir Mt 7.23n  ; 2Co 6.14 ; 2Th 2.3n. –  conféré une onction  : verbe apparenté au nom Christ . –  à toi plus qu''à  : autre traduction plutôt qu''à  ; la même préposition est employée dans la comparaison entre le Christ et les anges en 1.4 ; 2.7,9. –  compagnons 3.1n.'
  - type: text
    content: Tu as aimé la justice et tu as détesté le mal ;
  - type: text
    content: c'est pourquoi, ô Dieu, ton Dieu t'a conféré
  - type: text
    content: une onction d'huile d'allégresse, à toi plus qu'à tes compagnons
  - type: text
    content: .
