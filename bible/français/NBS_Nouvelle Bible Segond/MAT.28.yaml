document_id: MAT.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La résurrection de Jésus
  - type: heading
    content: Mc 16.1-8  ; Lc 24.1-11  ; Jn 20.1,11-18
  - type: text
    content: ' '
  - type: note
    content: '27.56,61 ; cf. Mc 15.47 ; Lc 23.56. –  Après le sabbat  : autre traduction possible le soir du sabbat . –  alors que… allait commencer ou venait de commencer  : le même verbe ne se retrouve, dans le N.T., qu''en Lc 23.54n  ; on le comprend traditionnellement de l''aube du dimanche matin, mais il pourrait aussi évoquer le début du premier jour après le sabbat selon le compte juif, à la tombée de la nuit (à l''apparition de la première étoile), le samedi soir ; cf. Mc 16.2n.'
  - type: text
    content: 'Après le sabbat, alors que le premier jour de la semaine allait commencer, Marie-Madeleine et l''autre Marie vinrent voir le sépulcre. '
  '10':
  - type: note
    content: N'ayez pas peur v. 5. –  frères 12.49+. –  Galilée v. 7+.
  - type: text
    content: 'Alors Jésus leur dit : N''ayez pas peur ; allez dire à mes frères de se rendre en Galilée : c''est là qu''ils me verront.'
  - type: heading
    content: Le récit des gardes
  '11':
  - type: text
    content: ' '
  - type: note
    content: 27.62ss ; voir aussi prêtres.
  - type: text
    content: 'Pendant qu''elles étaient en chemin, quelques hommes de la garde entrèrent dans la ville et racontèrent aux grands prêtres tout ce qui était arrivé. '
  '12':
  - type: note
    content: 'Ac 4.15-17. –  anciens  : cf. 27.41.'
  - type: text
    content: 'Ceux-ci, après s''être rassemblés avec les anciens et avoir tenu conseil, donnèrent aux soldats une forte somme d''argent '
  '13':
  - type: note
    content: 27.64.
  - type: text
    content: 'en leur ordonnant : Dites : « Ses disciples sont venus de nuit le dérober, pendant que nous étions endormis. » '
  '14':
  - type: note
    content: 27.65n  ; cf. Ac 12.19. –  nous userons de persuasion envers lui ou nous le persuaderons  ; on peut aussi comprendre nous l'apaiserons (cf. 1Jn 3.19n). Certains mss portent seulement nous userons de persuasion.
  - type: text
    content: 'Et si le gouverneur l''apprend, nous userons de persuasion envers lui et nous ferons en sorte que vous ne soyez pas inquiétés. '
  '15':
  - type: note
    content: 'selon…  : litt. comme on leur avait enseigné. –  cette histoire  : litt. cette parole. –  jusqu''à ce jour 27.8. – Voir aussi Juifs.'
  - type: text
    content: Ils prirent l'argent et agirent selon les instructions qui leur avaient été données. Et cette histoire s'est propagée parmi les Juifs jusqu'à ce jour.
  - type: heading
    content: Le Ressuscité envoie ses disciples en mission
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'onze disciples  : cf. Mc 16.14 ; Lc 24.9,33 ; Ac 1.26 ; 2.14. –  Galilée v. 7+. –  montagne 5.1n.'
  - type: text
    content: 'Les onze disciples allèrent en Galilée, sur la montagne que Jésus avait désignée. '
  '17':
  - type: note
    content: 'ils se prosternèrent  : certains mss portent ils se prosternèrent devant lui, ou ils l''adorèrent  ; cf. v. 9 ; 2.2n. –  mais quelques-uns…  : certains comprennent eux qui avaient douté  ; cf. 14.31.'
  - type: text
    content: 'Quand ils le virent, ils se prosternèrent, mais quelques-uns eurent des doutes ; '
  '18':
  - type: note
    content: Toute autorité ou tout pouvoir 8.9n  ; Dn 7.14 ; Jn 17.2 ; Ep 1.20-22 ; Ap 12.10 ; cf. Rm 14.9 ; 1Co 15.27 ; 1P 3.22 ; Ap 17.14. –  donné 11.27+/ /.
  - type: text
    content: 'Jésus s''approcha et leur dit : Toute autorité m''a été donnée dans le ciel et sur la terre. '
  '19':
  - type: note
    content: 'Cf. 10.5s ; 24.14n/ / ; 26.13 ; Mc 16.15 ; Ac 1.8 ; Rm 1.5,13-15 ; Col 1.23 ; cf. 1Tm 2.4. –  des gens de toutes les nations ou de tous les non-Juifs, 4.15n. –  disciples Ac 14.21. –  baptisez Ac 2.38 ; 8.12. –  pour le nom ou au nom, cf. 18.20. –  Père / Fils / Esprit saint  : cf. Jn 14.16 ; Rm 1.4 ; 15.16,30 ; 2Co 1.21s ; 13.13 ; Ga 4.6 ; Ep 1.3-14 ; 2.18 ; 1P 1.2 ; 1Jn 4.2 ; Ap 22.1.'
  - type: text
    content: 'Allez, faites des gens de toutes les nations des disciples, baptisez-les pour le nom du Père, du Fils et de l''Esprit saint, '
  '2':
  - type: note
    content: tremblement de terre 27.51+,54. –  l'ange du Seigneur 1.20n.
  - type: text
    content: 'Soudain, il y eut un grand tremblement de terre ; car l''ange du Seigneur, descendu du ciel, vint rouler la pierre et s''asseoir dessus. '
  '20':
  - type: note
    content: enseignez Ac 2.42. –  garder ou observer Jn 14.23 ; 15.10. –  avec vous 1.23 ; 18.20 ; Ag 1.13 ; Ac 18.10 ; cf. Jn 14.18 ; 17.26 ; Rm 8.35,39 ; 2Tm 4.17. –  fin du monde 13.39n.
  - type: text
    content: et enseignez-leur à garder tout ce que je vous ai commandé. Quant à moi, je suis avec vous tous les jours, jusqu'à la fin du monde.
  '3':
  - type: note
    content: Dn 10.6 ; cf. Mt 17.2 ; Ac 1.10. –  neige Dn 7.9.
  - type: text
    content: 'Son aspect était comme l''éclair et son vêtement blanc comme la neige. '
  '4':
  - type: note
    content: Ap 1.17.
  - type: text
    content: 'Les gardes tremblèrent de peur et devinrent comme morts. '
  '5':
  - type: note
    content: n'ayez pas peur v. 10 ; cf. Es 41.10+ ; Lc 1.13+ ; voir crainte.
  - type: text
    content: 'Mais l''ange dit aux femmes : Vous, n''ayez pas peur, car je sais que vous cherchez Jésus, le crucifié. '
  '6':
  - type: note
    content: 16.21+. –  réveillé ou relevé, cf. 2.13n  ; voir aussi résurrection.
  - type: text
    content: 'Il n''est pas ici ; en effet, il s''est réveillé, comme il l''avait dit. Venez, regardez le lieu où il gisait, '
  '7':
  - type: note
    content: en Galilée v. 10,16 ; 26.32/ /.
  - type: text
    content: et allez vite dire à ses disciples qu'il s'est réveillé d'entre les morts. Il vous précède en Galilée ; c'est là que vous le verrez. Voilà, je vous l'ai dit.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mc 16.8 ; Jn 20.20.
  - type: text
    content: 'Elles s''éloignèrent vite du tombeau, avec crainte et avec une grande joie, et elles coururent porter la nouvelle aux disciples. '
  '9':
  - type: note
    content: 'Bonjour  : litt. réjouissez-vous ! 26.49n  ; cf. Lc 1.28n. –  lui saisirent les pieds  : cf. 2R 4.27 ; comparer avec Jn 20.17. –  en se prosternant… v. 17 ; 2.2n,11n  ; voir aussi culte.'
  - type: text
    content: 'Mais Jésus vint au-devant d''elles et leur dit : Bonjour ! Elles s''approchèrent et lui saisirent les pieds en se prosternant devant lui. '
