        children:
        - type: text
          text: 'Zacharie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(5.1+) s''est poursuivie au-delà des dernières dates indiquées dans leurs livres (cf. Za 7.1). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Dieu d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Za 1.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Artaxerxès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cette mention anticipe vraisemblablement sur les travaux de reconstruction des remparts (4.6-23 ; Né 1–6), le temple étant d''ailleurs inclus dans la future ville fortifiée (cf. Né 3.29-31) ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.18 : « Néhémie (sous Artaxerxès), qui avait construit le Temple et l''autel. »'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Et les anciens des Judéens bâtirent avec succès, selon la parole prophétique d'Aggée, le prophète, et de Zacharie, fils d'Iddo ; ils bâtirent et restaurèrent, d'après l'ordre du Dieu d'Israël, et d'après l'ordre de Cyrus, de Darius et d'Artaxerxès, roi de Perse.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le troisième jour
      - type: usfm
        marker: ft
        children:
        - type: text
