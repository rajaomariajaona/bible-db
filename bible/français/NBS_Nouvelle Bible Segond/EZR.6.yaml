          marker: w
          children:
          - type: text
            text: Esdras
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.5 a « le vingt-troisième jour ». –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Adar…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : février-mars 515 av. J.-C.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: La maison fut achevée le troisième jour du mois d'Adar, dans la sixième année du règne du roi Darius.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
