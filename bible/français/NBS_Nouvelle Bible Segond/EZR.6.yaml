      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la bibliothèque…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la maison des livres des trésors déposés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 4).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors le roi Darius donna ordre de faire des recherches dans la bibliothèque où l'on déposait les archives, à Babylone.
    - type: text
      text: ' '
