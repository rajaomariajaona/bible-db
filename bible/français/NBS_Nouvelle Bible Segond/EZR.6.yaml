document_id: EZR.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Réponse du roi Darius
  - type: text
    content: ' '
  - type: note
    content: '5.17+. –  la bibliothèque…  : litt. la maison des livres des trésors déposés (cf. v. 4).'
  - type: text
    content: Alors le roi Darius donna ordre de faire des recherches dans la bibliothèque où l'on déposait les archives, à Babylone.
  - type: text
    content: ' '
  '10':
  - type: note
    content: 'd''odeur agréable Gn 8.21n  ; Ex 29.18,25 ; Lv 1.9n. –  prient pour la vie du roi  : cf. Jr 29.7+ ; 1Tm 2.1s ; cf. 1 Maccabées 7.33 : « Des prêtres sortirent du lieu saint… pour le saluer pacifiquement (l''émissaire du roi) et lui montrer l''holocauste qu''on offrait pour le roi. »'
  - type: text
    content: afin qu'ils offrent des sacrifices d'odeur agréable au Dieu du ciel et qu'ils prient pour la vie du roi et de ses fils.
  - type: text
    content: ' '
  '11':
  - type: note
    content: 'transgressera  : litt. changera, cf. Dn 3.28n. –  parole  : voir 4.17n. –  pour l''y pendre et l''y frapper  : autre traduction on le dressera (le pieu) et on l''empalera dessus, ce qui pourrait aussi correspondre à la pratique perse ; cf. Nb 25.4 ; Dt 21.22 ; Jos 10.26 ; 2S 21.6ss ; Est 7.9s. –  sa maison…  : cf. Dn 2.5 ; 3.29 ; voir aussi 2R 10.27.'
  - type: text
    content: 'Et voici l''ordre que je donne au sujet de quiconque transgressera cette parole : on arrachera de sa maison une pièce de bois pour l''y pendre et l''y frapper, et on fera de sa maison un tas d''immondices.'
  - type: text
    content: ' '
  '12':
  - type: note
    content: 'qui fait demeurer… Dt 12.11 ; 14.23 ; 16.2,6,11 ; 26.2 ; 1R 8.16 ; 9.3 ; 11.36 ; 14.21. – Voir nom. –  cet édit  : sous-entendu dans le texte.'
  - type: text
    content: Que le Dieu qui fait demeurer là-bas son nom renverse tout roi et tout peuple qui étendraient la main pour transgresser cet édit en détruisant cette maison de Dieu qui est à Jérusalem ! Moi, Darius, j'ai donné cet ordre. Qu'il soit exactement exécuté. »
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'cet ordre  : sous-entendu dans le texte.'
  - type: text
    content: Alors Tathnaï, gouverneur de Transeuphratène, Shetar-Boznaï et leurs collègues se conformèrent exactement à cet ordre que leur envoya le roi Darius.
  - type: heading
    content: Inauguration du temple rebâti
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'selon la parole prophétique  : autre traduction soutenus par la prophétie  ; on en a parfois déduit que l''activité d’ Aggée et de Zacharie (5.1+) s''est poursuivie au-delà des dernières dates indiquées dans leurs livres (cf. Za 7.1). –  du Dieu d''Israël  : cf. Za 1.16. –  Artaxerxès 4.7n  ; cf. 7.1n  ; cette mention anticipe vraisemblablement sur les travaux de reconstruction des remparts (4.6-23 ; Né 1–6), le temple étant d''ailleurs inclus dans la future ville fortifiée (cf. Né 3.29-31) ; cf. 2 Maccabées 1.18 : « Néhémie (sous Artaxerxès), qui avait construit le Temple et l''autel. »'
  - type: text
    content: Et les anciens des Judéens bâtirent avec succès, selon la parole prophétique d'Aggée, le prophète, et de Zacharie, fils d'Iddo ; ils bâtirent et restaurèrent, d'après l'ordre du Dieu d'Israël, et d'après l'ordre de Cyrus, de Darius et d'Artaxerxès, roi de Perse.
  - type: text
    content: ' '
  '15':
  - type: note
    content: 'le troisième jour  : 3 Esdras 7.5 a « le vingt-troisième jour ». –  Adar…  : février-mars 515 av. J.-C.'
  - type: text
    content: La maison fut achevée le troisième jour du mois d'Adar, dans la sixième année du règne du roi Darius.
  - type: text
    content: ' '
  '16':
  - type: note
    content: 'le reste des exilés  : voir 4.1n. –  l''inauguration ou la dédicace, 1R 8 ; 2Ch 7.3ss.'
  - type: text
    content: Les Israélites, les prêtres et les lévites, et le reste des exilés firent l'inauguration de cette maison de Dieu dans la joie.
  - type: text
    content: ' '
  '17':
  - type: note
    content: Cf. 1R 8.62ss ; 2Ch 7.8ss ; 29.21 ; 30.24 ; 35.7. –  pour le péché Lv 4–5 ; Ez 40.39 ; 45.19s,23. –  12 boucs 8.35 ; Nb 7.87 ; cf. Ez 43.22ss.
  - type: text
    content: Ils offrirent, pour l'inauguration de cette maison de Dieu, 100 taureaux, 200 béliers, 400 agneaux et, pour le péché de tout Israël, 12 boucs, d'après le nombre des tribus d'Israël.
  - type: text
    content: ' '
  '18':
  - type: note
    content: Cf. Ex 29 ; Lv 8 ; Nb 3.5ss ; 8.5ss ; 18.1ss ; Né 13.30 ; sur les divisions et classes, cf. 1Ch 23–24 ; 2Ch 23.18 ; 31.2 ; 35.4s. Aux différentes catégories mentionnées ici 3 Esdras 7.9 ajoute « et les portiers à chaque porte ».
  - type: text
    content: Ils installèrent les prêtres selon leurs divisions et les lévites selon leurs classes pour le service de Dieu à Jérusalem, comme il est écrit dans le livre de Moïse.
  - type: heading
    content: Les Judéens célèbrent la fête de la Pâque
  '19':
  - type: text
    content: ' '
  - type: note
    content: A partir d'ici le texte est de nouveau en hébreu (cf. 4.7n). –  Les exilés 4.1n. –  célébrèrent la Pâque Ex 12 ; 2R 23.21ss ; cf. 2Ch 30.13ss ; 35.1ss ; voir calendrier et fêtes. –  le quatorzième jour du premier mois Ex 12.1ss,18 ; Lv 23.5 ; Nb 9.2s ; cf. 2Ch 30.15.
  - type: text
    content: 'Les exilés célébrèrent la Pâque le quatorzième jour du premier mois. '
  '2':
  - type: note
    content: 'Ecbatane (araméen Ahmetha), résidence d''été des rois de Perse (aujourd''hui Hamadân, en Iran). –  la citadelle  : terme hébreu correspondant en Est 1.2n  ; Dn 8.2 ; Né 1.1 ; la traduction suit la plupart des versions anciennes, mais le texte araméen traditionnel porte, litt., dans la citadelle.'
  - type: text
    content: 'Et on trouva à Ecbatane la citadelle, dans la province de Médie, un rouleau sur lequel était écrit le mémoire suivant :'
  '20':
  - type: note
    content: 's''étaient purifiés  : cf. 2Ch 29.34 ; 30.3. –  tous ensemble 2.64n  ; 3.9. –  pour leurs frères les prêtres, et pour eux-mêmes  : à cause de cette expression certains pensent que la phrase avait originellement pour sujet les lévites, sans les prêtres  ; cf. 2Ch 30.17ss ; 35.6,11 ; voir aussi Ex 12.2 ; Dt 16.2.'
  - type: text
    content: 'Les prêtres et les lévites s''étaient purifiés tous ensemble, ils étaient tous purs ; ils immolèrent la Pâque pour tous les exilés, pour leurs frères les prêtres, et pour eux-mêmes. '
  '21':
  - type: note
    content: 'mangèrent  : LXX précise la Pâque. –  ceux qui s''étaient séparés (9.1ss ; 10.8,11 ; Né 9.2 ; 10.29 ; 13.3) de l''impureté des nations du pays, sans doute des prosélytes parmi les peuples des pays (3.3n) ; voir aussi Nb 9.14. –  chercher le Seigneur  : cf. 4.2+.'
  - type: text
    content: 'Les Israélites qui étaient revenus de l''exil mangèrent avec tous ceux qui s''étaient séparés de l''impureté des nations du pays et qui se joignirent à eux pour chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '22':
  - type: note
    content: 'Pains sans levain 2Ch 30.21 ; 35.17 ; cf. Ex 12.15ss ; Lv 23.6ss. –  en inclinant…  : litt. en tournant vers eux le cœur  ; cf. 7.27. –  roi d''Assyrie  : désignation inhabituelle de l''empereur perse (ici Darius, cf. 4.5), dont la domination s''étendait sur toute la Mésopotamie (y compris les anciens territoires assyriens). –  les soutenir  : litt. fortifier leurs mains, cf. 1.6n  ; Né 2.18n  ; 6.9n.'
  - type: text
    content: 'Ils célébrèrent la fête des Pains sans levain pendant sept jours, dans la joie, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les avait réjouis en inclinant vers eux le cœur du roi d''Assyrie pour les soutenir dans l''œuvre de la maison de Dieu, du Dieu d''Israël.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.1nss ; 5.13. –  pour être…  : autre traduction au lieu où l''on offre des sacrifices , cf. 3.3 ; Jr 41.5. –  qu''elle ait de solides fondations ou que l''on en garde les fondations (antérieures) 5.16+. –  soixante coudées (environ 30 m ; voir mesures). Pour la largeur Syr a lu vingt coudées (environ 10 m) ; cf. 1R 6.2 ; Ez 41.2 ; 2Ch 3.3 ; voir aussi Esd 3.12+.'
  - type: text
    content: '« La première année du roi Cyrus, le roi Cyrus a donné cet ordre : Maison de Dieu à Jérusalem – que la maison soit rebâtie, pour être un lieu où l''on offre des sacrifices, et qu''elle ait de solides fondations. Elle aura soixante coudées de hauteur, soixante coudées de largeur,'
  - type: text
    content: ' '
  '4':
  - type: note
    content: 'rangée de bois (plusieurs mss et LXX n''ont pas le mot rendu ici par neuf) : cf. 5.8n  ; 1R 6.36 ; 7.12. –  payés…  : voir v. 8.'
  - type: text
    content: trois rangées de pierres de taille et une rangée de bois neuf. Les frais seront payés par la maison du roi.
  - type: text
    content: ' '
  '5':
  - type: note
    content: '5.14+. –  à la place où ils étaient 5.15n. –  et déposés  : d''après des versions anciennes ; araméen et tu les déposeras.'
  - type: text
    content: De plus, les objets d'or et d'argent de la maison de Dieu que Nabuchodonosor a enlevés du temple de Jérusalem et emportés à Babylone seront rendus, rapportés au temple de Jérusalem, à la place où ils étaient, et déposés dans la maison de Dieu. »
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Tathnaï… 5.3n. –  collègues d''Apharsak  : voir 5.6n. –  tenez-vous à l''écart ou ne vous en mêlez pas.'
  - type: text
    content: « Maintenant, Tathnaï, gouverneur de Transeuphratène, Shetar-Boznaï, et vous leurs collègues d'Apharsak, en Transeuphratène, tenez-vous à l'écart.
  - type: text
    content: ' '
  '7':
  - type: note
    content: 'le gouverneur des Judéens  : sans doute Zorobabel ; les mots correspondants sont absents de LXX ; cf. 5.2-3n  ; cf. 3 Esdras 6.27 : « Zorobabel, serviteur du Seigneur et gouverneur de Juda. » –  les anciens  : cf. 2.2 ; 3.12 ; 5.1,5. –  sur son emplacement 5.15.'
  - type: text
    content: Laissez continuer les travaux de cette maison de Dieu ; le gouverneur des Judéens et les anciens des Judéens la rebâtissent sur son emplacement.
  - type: text
    content: ' '
  '8':
  - type: note
    content: 'Cf. v. 4. –  Voici l''ordre que je donne  : litt. de moi ordre est donné, formule analogue v. 11 ; 4.19,21 ; 5.17 ; 7.13,21 ; Dn 3.29 ; 4.3 ; 6.27. –  impôts 4.13+. –  exactement v. 12s ; 7.21,26 ; voir 5.8n.'
  - type: text
    content: 'Voici l''ordre que je donne concernant ce que vous devez faire à l''égard de ces anciens des Judéens pour rebâtir cette maison de Dieu : les frais, pris sur les biens du roi provenant des impôts de Transeuphratène, seront exactement payés à ces hommes, afin qu''il n''y ait pas d''interruption.'
  - type: text
    content: ' '
  '9':
  - type: note
    content: 'Dieu du ciel 1.2n. –  huile  : le terme araméen est apparenté au mot hébreu pour onction  ; de même en 7.22 ; cf. Ex 25.6 ; 29.7,21. –  jour après jour, même expression 3.4 ; Né 8.18 ; 2Ch 30.21 ; une formule apparentée est traduite selon l''ordre de chaque jour en 1Ch 16.37 ; 2Ch 8.13s ; 31.16. –  sans négligence  : cf. 4.22 ; Dn 6.5.'
  - type: text
    content: Ce qui est nécessaire pour les holocaustes du Dieu du ciel, taureaux, béliers et agneaux, froment, sel, vin et huile, sera livré, sur leurs indications, aux prêtres de Jérusalem, jour après jour, et sans négligence,
  - type: text
    content: ' '
