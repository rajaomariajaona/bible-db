        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 4.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour l'y pendre et l'y frapper
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on le dressera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le pieu) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et on l'empalera dessus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait aussi correspondre à la pratique perse ; cf. Nb 25.4 ; Dt 21.22 ; Jos 10.26 ; 2S 21.6ss ; Est 7.9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa maison…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dn 2.5 ; 3.29 ; voir aussi 2R 10.27.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Et voici l''ordre que je donne au sujet de quiconque transgressera cette parole : on arrachera de sa maison une pièce de bois pour l''y pendre et l''y frapper, et on fera de sa maison un tas d''immondices.'
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui fait demeurer… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 12.11 ; 14.23 ; 16.2,6,11 ; 26.2 ; 1R 8.16 ; 9.3 ; 11.36 ; 14.21. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cet édit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Que le Dieu qui fait demeurer là-bas son nom renverse tout roi et tout peuple qui étendraient la main pour transgresser cet édit en détruisant cette maison de Dieu qui est à Jérusalem ! Moi, Darius, j'ai donné cet ordre. Qu'il soit exactement exécuté. »
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cet ordre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Alors Tathnaï, gouverneur de Transeuphratène, Shetar-Boznaï et leurs collègues se conformèrent exactement à cet ordre que leur envoya le roi Darius.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Inauguration du temple rebâti
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon la parole '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophétique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
