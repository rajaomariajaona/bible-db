      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; on en a parfois déduit que l'activité d’
      - type: usfm
        marker: ft
        children:
        - type: text
