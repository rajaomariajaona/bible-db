      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Les Israélites, les prêtres et les lévites, et le reste des exilés firent l'inauguration de cette maison de Dieu dans la joie.
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1R 8.62ss ; 2Ch 7.8ss ; 29.21 ; 30.24 ; 35.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 4–5 ; Ez 40.39 ; 45.19s,23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '12 boucs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.35 ; Nb 7.87 ; cf. Ez 43.22ss.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ils offrirent, pour l'inauguration de cette maison de Dieu, 100 taureaux, 200 béliers, 400 agneaux et, pour le péché de tout Israël, 12 boucs, d'après le nombre des tribus d'Israël.
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ex 29 ; Lv 8 ; Nb 3.5ss ; 8.5ss ; 18.1ss ; Né 13.30 ; sur les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'divisions '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: classes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1Ch 23–24 ; 2Ch 23.18 ; 31.2 ; 35.4s. Aux différentes catégories mentionnées ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 Esdras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.9 ajoute « et les portiers à chaque porte ».
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ils installèrent les prêtres selon leurs divisions et les lévites selon leurs classes pour le service de Dieu à Jérusalem, comme il est écrit dans le livre de Moïse.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Judéens célèbrent la fête de la Pâque
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A partir d'ici le texte est de nouveau en hébreu (cf. 4.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les exilés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'célébrèrent la Pâque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 12 ; 2R 23.21ss ; cf. 2Ch 30.13ss ; 35.1ss ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le quatorzième jour du premier mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 12.1ss,18 ; Lv 23.5 ; Nb 9.2s ; cf. 2Ch 30.15.
      marker-yv: yv-n
    - type: text
      text: 'Les exilés célébrèrent la Pâque le quatorzième jour du premier mois. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ecbatane '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(araméen '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ahmetha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), résidence d''été des rois de Perse (aujourd''hui Hamadân, en Iran). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la citadelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : terme hébreu correspondant en Est 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dn 8.2 ; Né 1.1 ; la traduction suit la plupart des versions anciennes, mais le texte araméen traditionnel porte, litt., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la citadelle.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Et on trouva à Ecbatane la citadelle, dans la province de Médie, un rouleau sur lequel était écrit le mémoire suivant :'
