    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''étaient '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifiés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 29.34 ; 30.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tous ensemble '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.64'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour leurs frères les prêtres, et pour eux-mêmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à cause de cette expression certains pensent que la phrase avait originellement pour sujet '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sans '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2Ch 30.17ss ; 35.6,11 ; voir aussi Ex 12.2 ; Dt 16.2.'
      marker-yv: yv-n
    - type: text
      text: 'Les prêtres et les lévites s''étaient purifiés tous ensemble, ils étaient tous purs ; ils immolèrent la Pâque pour tous les exilés, pour leurs frères les prêtres, et pour eux-mêmes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
