      - type: usfm
        marker: fq
        children:
        - type: text
          text: prient pour la vie du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 29.7+ ; 1Tm 2.1s ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.33 : « Des prêtres sortirent du lieu saint… pour le saluer pacifiquement (l''émissaire du roi) et lui montrer l''holocauste qu''on offrait pour le roi. »'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: afin qu'ils offrent des sacrifices d'odeur agréable au Dieu du ciel et qu'ils prient pour la vie du roi et de ses fils.
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
