      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2.8 ; 7.2) ; de même au v. 19 ; cf. 2Ch 17.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ' n''est désigné ainsi que dans les Chroniques.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi David dit à toute l''assemblée : Mon fils Salomon, le seul que Dieu ait choisi, est jeune et délicat, et l''ouvrage est considérable, car ce château n''est pas pour un être humain, mais pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 22.3s,14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de l'or pour ce qui doit être d'or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'or pour l'or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même dans la suite.'
    marker-yv: yv-n
  - type: text
    text: 'De toute ma force, j''ai préparé pour la maison de mon Dieu de l''or pour ce qui doit être d''or, de l''argent pour ce qui doit être d''argent, du bronze pour ce qui doit être de bronze, du fer pour ce qui doit être de fer, et du bois pour ce qui doit être en bois, des pierres d''onyx et des pierres à enchâsser, des pierres brillantes et de diverses couleurs, toutes sortes de pierres précieuses et du marbre blanc en quantité. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: intérêt
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu évoque généralement l''idée de faveur, d''agrément ; cf. v. 17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le sanctuaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la maison du sanctuaire.
    marker-yv: yv-n
  - type: text
    text: 'De plus, dans mon intérêt pour la maison de mon Dieu, je donne pour la maison de mon Dieu mon bien propre, or et argent, en plus de tout ce que j''ai préparé pour le sanctuaire : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 3 000 talents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : plus de 100 tonnes ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 7 000 talents
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : plus de 220 tonnes ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: or d'Ophir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 9.28. La région appelée '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ophir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: n'est pas identifiée, mais était réputée pour la qualité de l’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'or '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qu''on y trouvait. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: revêtir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu correspondant est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'recrépir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Lv 14.42 ; par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'enduire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Ez 13.10ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des bâtiments
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des maisons.
    marker-yv: yv-n
  - type: text
    text: '3 000 talents d''or, de l''or d''Ophir, et 7 000 talents d''argent épuré, pour en revêtir les parois des bâtiments, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour l'or de ce qui doit être d'or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour l'or pour l'or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même pour la suite. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour s''engager '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour remplir sa main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : par des promesses de dons ; cf. Ex 35.5.'
    marker-yv: yv-n
  - type: text
    text: 'pour l''or de ce qui doit être d''or et pour l''argent de ce qui doit être d''argent, ainsi que pour tous les travaux des artisans. Qui se porte volontaire aujourd''hui pour s''engager envers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Les chefs des familles, les chefs des tribus d''Israël, les chefs de mille et de cent, ainsi que les chefs des travaux du roi se portèrent volontaires. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Esd 8.26
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dariques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : monnaie de l''époque perse ; voir Esd 8.27.'
    marker-yv: yv-n
  - type: text
    text: 'Ils donnèrent pour le service de la maison de Dieu 5 000 talents d''or, 10 000 dariques, 10 000 talents d''argent, 18 000 talents de bronze et 100 000 talents de fer. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ceux qui avaient des pierres précieuses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui avec qui il fut trouvé des pierres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ces '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pierres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'affectées au '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trésor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont de toute évidence des pierres précieuses ou semi-précieuses. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yehiel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 26.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui avaient des pierres précieuses les remirent à Yehiel, le Guershonite, pour le trésor de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leurs offrandes volontaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(aussi aux v. 14,17 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faire des offrandes volontaires
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils s''étaient portés volontaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(aussi aux v. 5s) traduisent un même verbe hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' entier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 20.3+.
    marker-yv: yv-n
  - type: text
    text: 'Le peuple se réjouit de leurs offrandes volontaires, car c''était d''un cœur entier qu''ils s''étaient portés volontaires pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; le roi David en eut aussi une grande joie.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Prière de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jc 3.9+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
