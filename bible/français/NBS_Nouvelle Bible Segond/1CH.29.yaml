  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'David, fils de Jessé, régna sur tout Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir 2S 5.5 ; 1R 2.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le temps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les jours.
    marker-yv: yv-n
  - type: text
    text: 'Le temps qu''il régna sur Israël fut de quarante ans : à Hébron il régna sept ans, et à Jérusalem il régna trente-trois ans. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
