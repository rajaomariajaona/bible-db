      marker: fr
      children:
      - type: text
        text: '29.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui s'est passé de son temps…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les temps qui sont passés sur lui et sur Israël et sur tous les royaumes…
    marker-yv: yv-n
  - type: text
    text: – avec tout son règne et toute sa vaillance, et ce qui s'est passé de son temps soit en Israël, soit dans tous les royaumes des pays.
