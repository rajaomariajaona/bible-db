    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' rendit Salomon grand, il l''éleva aux yeux de tout Israël ; il rendit son règne plus éclatant que celui d''aucun roi d''Israël avant lui.'
- type: usfm
  marker: r
  children:
