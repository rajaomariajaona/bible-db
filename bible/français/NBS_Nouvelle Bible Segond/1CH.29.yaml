      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: heureuse vieillesse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 15.15 ; 25.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rassasié de jours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.1 ; cf. Gn 35.29 ; Jb 42.17.
    marker-yv: yv-n
  - type: text
    text: 'Il mourut dans une heureuse vieillesse, rassasié de jours, de richesse et de gloire. Salomon, son fils, devint roi à sa place. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Aucun des trois ouvrages mentionnés n''a été conservé ; voir l''introduction aux Chroniques. Les trois personnages sont mentionnés respectivement en 9.22 ; 17.1 et 21.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''histoire… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le début et la fin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2Ch 9.29+.'
    marker-yv: yv-n
  - type: text
    text: 'L''histoire du roi David, le début et la fin, cela est écrit dans l''histoire de Samuel, le voyant, dans l''histoire de Nathan, le prophète, et dans l''histoire de Gad, le visionnaire, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
