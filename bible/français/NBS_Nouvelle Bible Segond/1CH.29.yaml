    - type: usfm
      marker: fq
      children:
      - type: text
        text: Béni sois-tu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: remercia / je te remercie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 20 ; cf. 1S 25.32+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en présence de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sous les yeux de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est l''autre nom de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jacob
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; voir 1.34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; c''est à ce personnage que se rapporte le plus naturellement le qualificatif '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: notre père.
    marker-yv: yv-n
  - type: text
    text: 'David bénit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en présence de toute l''assemblée. David dit : Béni sois-tu, depuis toujours et pour toujours, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu d''Israël, notre père ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la grandeur… l'éclat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir des énumérations analogues en Ps 96.6+ ; Mt 6.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Tm 1.17 ; Ap 4.11 ; 5.12s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: majesté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 15.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: t'appartient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de t'élever souverainement…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de t'élever comme tête de toutes choses.
    marker-yv: yv-n
  - type: text
    text: 'A toi, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', la grandeur, la puissance, la splendeur, la majesté et l''éclat ; car tout ce qui est au ciel et sur la terre t''appartient ; à toi, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le règne, à toi de t''élever souverainement au-dessus de tout ! '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '29.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dt 8.18 ; 1S 2.7s ; Ec 5.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est de toi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de devant toi (sont)…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la richesse et la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: ' sont devant toi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de rendre grand et fort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de faire grandir et de fortifier toute chose '
    - type: usfm
