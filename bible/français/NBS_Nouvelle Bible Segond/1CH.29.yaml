document_id: 1CH.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Offrande pour la construction du temple
  - type: text
    content: ' '
  - type: note
    content: 'Mon fils… le seul…  : autre traduction Salomon, mon seul fils, celui que Dieu a choisi  ; certains modifient le texte hébreu traditionnel pour lire plus simplement mon fils, celui que Dieu a choisi  ; cf. 28.4. –  jeune et délicat 22.5. –  ce château ou cette citadelle (cf. Est 1.2n  ; Né 1.1n  ; 2.8 ; 7.2) ; de même au v. 19 ; cf. 2Ch 17.12n. Le temple n''est désigné ainsi que dans les Chroniques.'
  - type: text
    content: 'Le roi David dit à toute l''assemblée : Mon fils Salomon, le seul que Dieu ait choisi, est jeune et délicat, et l''ouvrage est considérable, car ce château n''est pas pour un être humain, mais pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jc 3.9+. –  bénit / Béni sois-tu  : autre traduction remercia / je te remercie , de même au v. 20 ; cf. 1S 25.32+. –  en présence de  : litt. sous les yeux de . –  Israël est l''autre nom de Jacob  ; voir 1.34n  ; c''est à ce personnage que se rapporte le plus naturellement le qualificatif notre père.'
  - type: text
    content: 'David bénit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en présence de toute l''assemblée. David dit : Béni sois-tu, depuis toujours et pour toujours, '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, notre père ! '
  '11':
  - type: note
    content: 'la grandeur… l''éclat  : voir des énumérations analogues en Ps 96.6+ ; Mt 6.13n  ; 1Tm 1.17 ; Ap 4.11 ; 5.12s. –  majesté  : cf. 1S 15.29n. –  t''appartient  : sous-entendu dans le texte. –  de t''élever souverainement…  : autre traduction de t''élever comme tête de toutes choses.'
  - type: text
    content: 'A toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', la grandeur, la puissance, la splendeur, la majesté et l''éclat ; car tout ce qui est au ciel et sur la terre t''appartient ; à toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', le règne, à toi de t''élever souverainement au-dessus de tout ! '
  '12':
  - type: note
    content: 'Cf. Dt 8.18 ; 1S 2.7s ; Ec 5.18. –  C''est de toi…  : litt. de devant toi (sont)…  ; on pourrait aussi comprendre la richesse et la gloire sont devant toi. –  de rendre grand et fort  : litt. de faire grandir et de fortifier toute chose (ou quiconque).'
  - type: text
    content: C'est de toi que viennent la richesse et la gloire ; c'est toi qui domines sur tout. C'est dans ta main que sont la force et la puissance, et c'est ta main qui a le pouvoir de rendre grand et fort.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 145.1-7. –  ton nom splendide  : litt. le nom de ta splendeur  ; autre traduction ton nom et ta splendeur , cf. Es 63.14.'
  - type: text
    content: 'Maintenant, notre Dieu, nous te célébrons, et nous louons ton nom splendide. '
  '14':
  - type: note
    content: 'Qui suis-je  : cf. 1S 18.18+. –  c''est de ta main…  : litt. de ta main nous te donnons.'
  - type: text
    content: 'Qui suis-je donc, et qui est mon peuple, pour que nous soyons capables de faire de pareilles offrandes volontaires ? Tout vient de toi, et c''est de ta main que vient ce que nous te donnons ! '
  '15':
  - type: note
    content: 'des immigrés et des résidents temporaires  : cf. Gn 23.4 ; Ex 12.48n  ; Lv 25.23 ; Hé 11.13+. –  comme l''ombre  : cf. Ps 102.12 ; 144.4 ; Jb 14.2 ; Ec 6.12. –  pas d''espérance  : voir 2S 12.23 ; Ps 90.9s ; Jb 7.9 ; 10.21 ; 14.7-12 ; 16.22.'
  - type: text
    content: 'Nous sommes devant toi des immigrés et des résidents temporaires, comme tous nos pères ; nos jours sur la terre sont comme l''ombre, et il n''y a pas d''espérance. '
  '16':
  - type: note
    content: 'Cf. 1Co 4.7. –  sacré  : voir saint.'
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, c''est de ta main que vient toute cette abondance que nous avons préparée afin de bâtir une maison pour toi, pour ton nom sacré. Tout t''appartient !'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'tu sondes le cœur 28.9n. –  je vois  : autre traduction j''ai vu . –  avec joie  : l''expression pourrait aussi se rapporter au peuple  : je vois maintenant ton peuple te faire avec joie des offrandes volontaires.'
  - type: text
    content: 'Je sais bien, mon Dieu, que tu sondes le cœur et que tu agrées la droiture ; aussi je t''ai fait toutes ces offrandes volontaires avec un cœur droit, et je vois maintenant avec joie ton peuple qui se trouve ici te faire des offrandes volontaires. '
  '18':
  - type: note
    content: 'Dieu d''Abraham, d''Isaac et d''Israël  : cf. Ex 3.6,15 ; Lv 26.42 ; 1R 18.36 ; Mt 22.32. –  garde pour toujours…  : cf. 2Th 3.5. –  affermis son cœur pour toi  : autres traductions dirige son cœur vers toi ; prépare (même verbe v. 2 etc.) son cœur à toi.'
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Abraham, d''Isaac et d''Israël, nos pères, garde pour toujours cette forme de pensée dans le cœur de ton peuple et affermis son cœur pour toi. '
  '19':
  - type: note
    content: 'un cœur entier 28.9+. –  commandements  : voir loi. –  le château v. 1n.'
  - type: text
    content: Donne à Salomon, mon fils, un cœur entier pour qu'il observe tes commandements, tes préceptes et tes prescriptions, qu'il les mette tous en pratique et qu'il bâtisse le château pour lequel j'ai fait des préparatifs.
  - type: heading
    content: Salomon proclamé roi ; mort de David
  '2':
  - type: note
    content: 'Voir 22.3s,14. –  de l''or pour ce qui doit être d''or  : litt. de l''or pour l''or  ; de même dans la suite.'
  - type: text
    content: 'De toute ma force, j''ai préparé pour la maison de mon Dieu de l''or pour ce qui doit être d''or, de l''argent pour ce qui doit être d''argent, du bronze pour ce qui doit être de bronze, du fer pour ce qui doit être de fer, et du bois pour ce qui doit être en bois, des pierres d''onyx et des pierres à enchâsser, des pierres brillantes et de diverses couleurs, toutes sortes de pierres précieuses et du marbre blanc en quantité. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Bénissez / bénit  : cf. v. 10n  ; Ps 135.19 ; Né 9.5. –  Ils s''inclinèrent et se prosternèrent… devant le roi  : cf. 1R 1.16+. –  devant le Seigneur Né 8.6.'
  - type: text
    content: 'David dit à toute l''assemblée : Bénissez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, je vous prie ! Alors toute l''assemblée bénit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de ses pères. Ils s''inclinèrent et se prosternèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et devant le roi. '
  '21':
  - type: note
    content: 'Cf. 2Ch 1.6. –  Le lendemain  : litt. au lendemain de ce jour. –  libations  : cf. Ex 29.40s ; Nb 15.1-16.'
  - type: text
    content: 'Le lendemain, ils offrirent des sacrifices au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ils offrirent des holocaustes au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : mille taureaux, mille béliers et mille agneaux, avec leurs libations, et des sacrifices en quantité pour tout Israël. '
  '22':
  - type: note
    content: 'avec une grande joie  : cf. Dt 12.7 ; Né 8.12 ; 2Ch 30.21. –  pour la seconde fois  : cf. 23.1, où est mentionnée la désignation de Salomon comme successeur de David. –  l''onction 1R 1.34,39. –  Tsadoq  : cf. 2S 8.17 ; 15.24.'
  - type: text
    content: 'Ils mangèrent et burent ce jour-là devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec une grande joie, et ils investirent pour la seconde fois Salomon, fils de David, de la royauté ; ils lui conférèrent l''onction de chef pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et à Tsadoq celle de prêtre. '
  '23':
  - type: note
    content: 'Cf. 1R 2.12. –  Il prospéra  : cf. Dn 11.36 ; le verbe hébreu correspondant a aussi été traduit par réussir, cf. 1Ch 22.11,13 ; 2Ch 7.11 ; 31.21 ; 32.30. –  l''écouta ou lui obéit, c.-à-d. lui fut soumis.'
  - type: text
    content: 'Salomon s''assit sur le trône du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour être roi à la place de David, son père. Il prospéra et tout Israël l''écouta. '
  '24':
  - type: note
    content: 'se soumirent au roi Salomon  : litt. mirent la main sous le roi Salomon (cf. 2R 10.15n  ; Ez 17.18n  ; Esd 10.19n  ; 2Ch 30.8) ; c''est le geste opposé à lever la main contre (cf. 1R 11.27), qui exprime l''idée de se révolter contre (quelqu''un). – En 1R 1–2 l''accession de Salomon au trône est très mouvementée. Dans les Chroniques elle prend un caractère paisible et consensuel.'
  - type: text
    content: 'Tous les princes, les guerriers, et même tous les fils du roi David se soumirent au roi Salomon. '
  '25':
  - type: note
    content: 'rendit Salomon grand  : cf. Jos 4.14. –  règne plus éclatant (cf. v. 11) : voir 1R 3.13 ; 5.1-14 ; Ec 2.9.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rendit Salomon grand, il l''éleva aux yeux de tout Israël ; il rendit son règne plus éclatant que celui d''aucun roi d''Israël avant lui.'
  - type: heading
    content: 1R 2.10-12
  '26':
  - type: text
    content: 'David, fils de Jessé, régna sur tout Israël. '
  '27':
  - type: note
    content: 'Voir 2S 5.5 ; 1R 2.11. –  Le temps  : litt. les jours.'
  - type: text
    content: 'Le temps qu''il régna sur Israël fut de quarante ans : à Hébron il régna sept ans, et à Jérusalem il régna trente-trois ans. '
  '28':
  - type: note
    content: 'heureuse vieillesse  : cf. Gn 15.15 ; 25.8. –  rassasié de jours 23.1 ; cf. Gn 35.29 ; Jb 42.17.'
  - type: text
    content: 'Il mourut dans une heureuse vieillesse, rassasié de jours, de richesse et de gloire. Salomon, son fils, devint roi à sa place. '
  '29':
  - type: note
    content: 'Aucun des trois ouvrages mentionnés n''a été conservé ; voir l''introduction aux Chroniques. Les trois personnages sont mentionnés respectivement en 9.22 ; 17.1 et 21.9. –  L''histoire… 1R 11.41n. –  le début et la fin  : cf. 2Ch 9.29+.'
  - type: text
    content: 'L''histoire du roi David, le début et la fin, cela est écrit dans l''histoire de Samuel, le voyant, dans l''histoire de Nathan, le prophète, et dans l''histoire de Gad, le visionnaire, '
  '3':
  - type: note
    content: 'intérêt  : le terme hébreu évoque généralement l''idée de faveur, d''agrément ; cf. v. 17. –  le sanctuaire  : litt. la maison du sanctuaire.'
  - type: text
    content: 'De plus, dans mon intérêt pour la maison de mon Dieu, je donne pour la maison de mon Dieu mon bien propre, or et argent, en plus de tout ce que j''ai préparé pour le sanctuaire : '
  '30':
  - type: note
    content: 'ce qui s''est passé de son temps…  : litt. les temps qui sont passés sur lui et sur Israël et sur tous les royaumes…'
  - type: text
    content: – avec tout son règne et toute sa vaillance, et ce qui s'est passé de son temps soit en Israël, soit dans tous les royaumes des pays.
  '4':
  - type: note
    content: '3 000 talents  : plus de 100 tonnes ; 7 000 talents  : plus de 220 tonnes ; voir mesures. –  or d''Ophir  : cf. 1R 9.28. La région appelée Ophir n''est pas identifiée, mais était réputée pour la qualité de l’or qu''on y trouvait. –  revêtir  : le verbe hébreu correspondant est traduit par recrépir en Lv 14.42 ; par enduire en Ez 13.10ss. –  des bâtiments  : litt. des maisons.'
  - type: text
    content: '3 000 talents d''or, de l''or d''Ophir, et 7 000 talents d''argent épuré, pour en revêtir les parois des bâtiments, '
  '5':
  - type: note
    content: 'pour l''or de ce qui doit être d''or  : litt. pour l''or pour l''or, de même pour la suite. –  pour s''engager (litt. pour remplir sa main) : par des promesses de dons ; cf. Ex 35.5.'
  - type: text
    content: 'pour l''or de ce qui doit être d''or et pour l''argent de ce qui doit être d''argent, ainsi que pour tous les travaux des artisans. Qui se porte volontaire aujourd''hui pour s''engager envers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '6':
  - type: text
    content: 'Les chefs des familles, les chefs des tribus d''Israël, les chefs de mille et de cent, ainsi que les chefs des travaux du roi se portèrent volontaires. '
  '7':
  - type: note
    content: 'Cf. Esd 8.26n. –  dariques  : monnaie de l''époque perse ; voir Esd 8.27.'
  - type: text
    content: 'Ils donnèrent pour le service de la maison de Dieu 5 000 talents d''or, 10 000 dariques, 10 000 talents d''argent, 18 000 talents de bronze et 100 000 talents de fer. '
  '8':
  - type: note
    content: 'Ceux qui avaient des pierres précieuses  : litt. celui avec qui il fut trouvé des pierres  ; ces pierres affectées au trésor sont de toute évidence des pierres précieuses ou semi-précieuses. –  Yehiel  : cf. 26.21n.'
  - type: text
    content: 'Ceux qui avaient des pierres précieuses les remirent à Yehiel, le Guershonite, pour le trésor de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: note
    content: leurs offrandes volontaires (aussi aux v. 14,17 faire des offrandes volontaires) et ils s'étaient portés volontaires (aussi aux v. 5s) traduisent un même verbe hébreu. –  d'un cœur entier 20.3+.
  - type: text
    content: 'Le peuple se réjouit de leurs offrandes volontaires, car c''était d''un cœur entier qu''ils s''étaient portés volontaires pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le roi David en eut aussi une grande joie.'
  - type: heading
    content: Prière de David
