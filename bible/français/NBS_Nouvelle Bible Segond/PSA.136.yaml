document_id: PSA.136,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Célébrez le sauveur d'Israël
  - type: text
    content: ' '
  - type: note
    content: La tradition juive appelle ce chant le grand Hallel (cf. 113.1n  ; 120.1n) ; il était sans doute antiphoné, le refrain car sa fidélité est pour toujours étant repris par l'assemblée (cf. 106.1+ ; 2Ch 7.3,6).
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il est bon'
  - type: text
    content: – car sa fidélité est pour toujours !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 135.8+ss.
  - type: text
    content: Celui qui frappe les premiers-nés de l'Egypte,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '11':
  - type: text
    content: ' '
  - type: note
    content: Ex 12.31,51 ; 13.3 ; Dt 26.8.
  - type: text
    content: qui en fait sortir Israël
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '12':
  - type: text
    content: ' '
  - type: note
    content: Dt 4.34+.
  - type: text
    content: d'une main forte, d'un bras étendu
  - type: text
    content: – car sa fidélité est pour toujours !
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex 14.21ss ; sur la mer des Joncs , cf. Ex 13.18n.
  - type: text
    content: Celui qui coupe en deux la mer des Joncs,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '14':
  - type: text
    content: qui fait passer Israël au milieu d'elle,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '15':
  - type: text
    content: ' '
  - type: note
    content: se débarrasse 109.23n  ; Ex 14.27n  ; 15.4ss.
  - type: text
    content: qui se débarrasse du pharaon et de son armée dans la mer des Joncs
  - type: text
    content: – car sa fidélité est pour toujours !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 78.52s ; Dt 8.2,15 ; Jr 2.6 ; Am 2.10.
  - type: text
    content: Celui qui conduit son peuple dans le désert
  - type: text
    content: – car sa fidélité est pour toujours !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 135.10ss.
  - type: text
    content: Celui qui frappe de grands rois,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '18':
  - type: text
    content: qui tue des rois magnifiques,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '19':
  - type: text
    content: ' '
  - type: note
    content: Nb 21.21ss.
  - type: text
    content: Sihôn, roi des Amorites,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 26 ; 135.5 ; voir aussi 1Co 8.5.
  - type: text
    content: Célébrez le Dieu des dieux
  - type: text
    content: – car sa fidélité est pour toujours !
  '20':
  - type: text
    content: ' '
  - type: note
    content: Nb 21.33ss.
  - type: text
    content: et Og, roi du Bashân,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '21':
  - type: text
    content: qui donne leur pays comme patrimoine,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '22':
  - type: text
    content: ' '
  - type: note
    content: 135.12. –  Israël, son serviteur Es 44.21.
  - type: text
    content: comme patrimoine à Israël, son serviteur
  - type: text
    content: – car sa fidélité est pour toujours !
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 106.45 ; Jg 2.16ss.
  - type: text
    content: Celui qui se souvint de nous quand nous étions abaissés,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '24':
  - type: text
    content: ' '
  - type: note
    content: Lc 1.71.
  - type: text
    content: qui nous arracha à nos oppresseurs
  - type: text
    content: – car sa fidélité est pour toujours !
  '25':
  - type: text
    content: ' '
  - type: note
    content: '104.27s ; 145.15s ; 147.9 ; Jb 36.31. –  à tous  : litt. à toute chair.'
  - type: text
    content: Celui qui donne du pain à tous
  - type: text
    content: – car sa fidélité est pour toujours !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 2s. –  Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: Célébrez le Dieu du ciel,
  - type: text
    content: car sa fidélité est pour toujours !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 8.2 ; Dt 10.17 ; cf. Ap 17.14.
  - type: text
    content: Célébrez le Seigneur des seigneurs
  - type: text
    content: – car sa fidélité est pour toujours !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 72.18 ; 86.10.
  - type: text
    content: Celui qui seul fait des choses grandes et étonnantes
  - type: text
    content: – car sa fidélité est pour toujours !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 115.3+ ; Jr 10.12 ; 51.15 ; Pr 3.19 ; cf. Gn 1.1,6ss.
  - type: text
    content: Celui qui fait le ciel avec intelligence
  - type: text
    content: – car sa fidélité est pour toujours !
  '6':
  - type: text
    content: ' '
  - type: note
    content: '24.2. –  construit  : verbe apparenté au mot traduit par voûte (céleste) en Gn 1.6n  ; plus littéralement, on pourrait traduire il martèle, il aplatit, il repousse , c.-à-d. il donne forme, il affermit.'
  - type: text
    content: Celui qui construit la terre sur les eaux
  - type: text
    content: – car sa fidélité est pour toujours !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'les grandes lumières  : cf. Gn 1.14nss (terme apparenté pour luminaires ) ; Jr 31.35 ; voir aussi Jc 1.17.'
  - type: text
    content: Celui qui fait les grandes lumières,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '8':
  - type: text
    content: le soleil pour dominer sur le jour,
  - type: text
    content: – car sa fidélité est pour toujours ! –
  '9':
  - type: text
    content: la lune et les étoiles pour dominer sur la nuit
  - type: text
    content: – car sa fidélité est pour toujours !
