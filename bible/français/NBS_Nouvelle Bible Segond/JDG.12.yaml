document_id: JDG.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Conflit des Ephraïmites avec Jephté
  - type: text
    content: ' '
  - type: note
    content: '8.1-3. –  se mobilisèrent 7.23n. –  passèrent / passé  : il s''agit ici soit de la traversée d''un fleuve (le Jourdain ou le Yabboq), soit du passage de la frontière avec les Ammonites ; cf. v. 3,5 ; 11.29n. –  vers Tsaphôn  : autre traduction vers le nord  ; cf. Jos 13.27. –  Nous allons…  : litt. ta maison, nous la brûlerons sur toi par le feu  ; cf. 14.15 ; 1R 16.18.'
  - type: text
    content: 'Les hommes d''Ephraïm se mobilisèrent et passèrent vers Tsaphôn pour dire à Jephté : Pourquoi es-tu passé pour faire la guerre aux Ammonites, sans nous avoir appelés à aller avec toi ? Nous allons mettre le feu à ta maison et te brûler avec elle ! '
  '10':
  - type: text
    content: puis Ibtsân mourut et fut enseveli à Beth-Léhem.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Elôn Gn 46.14 ; Nb 26.26.
  - type: text
    content: 'Après lui, Elôn le Zabulonite fut juge en Israël. Il fut juge en Israël pendant dix ans ; '
  '12':
  - type: note
    content: Ayyalôn (nom presque identique à celui d’Elôn en hébreu), sans doute à ne pas confondre avec la localité de Dan qui porte le même nom (1.35 ; Jos 10.12).
  - type: text
    content: puis Elôn le Zabulonite mourut et fut enseveli à Ayyalôn, au pays de Zabulon.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Piratonite  : habitant de Piratôn, à une dizaine de kilomètres au sud-ouest de Sichem (2S 23.30 ; 1Ch 11.31 ; 27.14).'
  - type: text
    content: 'Après lui, Abdôn, fils de Hillel, le Piratonite, fut juge en Israël. '
  '14':
  - type: note
    content: Cf. v. 9 ; 10.4.
  - type: text
    content: 'Il eut quarante fils et trente petits-fils qui montaient soixante-dix ânons. Il fut juge en Israël pendant huit ans ; '
  '15':
  - type: note
    content: 'montagne (ou région montagneuse) des Amalécites  : ce nom pourrait être une allusion historique, par exemple à un combat en Ephraïm contre les Amalécites du Sud (3.13+) ; mais il pourrait aussi s''agir d''une indication géographique indépendante (5.14n).'
  - type: text
    content: puis Abdôn, fils de Hillel, le Piratonite, mourut et fut enseveli à Piratôn, au pays d'Ephraïm, dans la montagne des Amalécites.
  '2':
  - type: note
    content: 'J''ai été en grand conflit…  : litt. homme de dispute (ou de procès) j''ai été, moi et mon peuple et les fils d''Ammon, beaucoup  ; on pourrait aussi comprendre j''ai été en grand conflit avec mon peuple et les Ammonites. –  appelés  : cf. 4.10n.'
  - type: text
    content: 'Jephté leur répondit : J''ai été en grand conflit, moi et mon peuple, avec les Ammonites ; et quand je vous ai appelés, vous ne m''avez pas sauvé de leur main. '
  '3':
  - type: note
    content: 'j''ai risqué ma vie  : litt. j''ai mis ma vie (cf. Gn 1.20n) dans ma main  ; cf. 1S 19.5 ; 28.21 ; Jb 13.14. –  je suis passé v. 1n. –  venez-vous  : litt. êtes-vous montés.'
  - type: text
    content: 'Voyant que tu ne venais pas me sauver, j''ai risqué ma vie : je suis passé chez les Ammonites, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me les a livrés. Pourquoi donc venez-vous me faire la guerre en ce jour ?'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'qui avait dit  : autre traduction car ils avaient dit . –  Vous êtes des rescapés ou des fugitifs  ; terme apparenté en 21.17 ; cette expression injurieuse semble présenter Galaad comme un ramassis de transfuges ou de déchets d’ Ephraïm et de Manassé (cf. v. 5s ; Nb 26.29).'
  - type: text
    content: 'Jephté rassembla tous les hommes de Galaad pour faire la guerre à Ephraïm. Les hommes de Galaad battirent Ephraïm, qui avait dit : « Vous êtes des rescapés d''Ephraïm, vous, Galaad, au milieu d''Ephraïm, au milieu de Manassé ! » '
  '5':
  - type: note
    content: 'gués du Jourdain  : cf. 3.28+s. –  rescapés  : cf. v. 4n. –  éphraïmite  : le terme correspondant pourrait aussi être transcrit éphratite (cf. 1S 1.1n  ; 17.12 ; 1R 11.26 ; Rt 1.2).'
  - type: text
    content: 'Galaad prit les gués du Jourdain, du côté d''Ephraïm. Quand l''un des rescapés d''Ephraïm disait : « Je voudrais passer ! », les hommes de Galaad lui demandaient : « Es-tu éphraïmite ? » Il répondait : « Non. » '
  '6':
  - type: note
    content: 'Shibboleth  : ce mot hébreu, qui signifie épi ou torrent, sert de test pour reconnaître les Ephraïmites d''après une caractéristique de leur dialecte ; ceux-ci ne prononçaient pas le son sh comme les Galaadites (cf. Mt 26.69-75/ /). –  à ce moment-là  : autre traduction en ce temps-là (cf. 3.29).'
  - type: text
    content: 'On lui disait alors : « Dis “Shibboleth”, je te prie. » Et il disait « Sibboleth », car il ne pouvait pas bien prononcer. Sur quoi on le saisissait et on l''égorgeait près des gués du Jourdain. Quarante-deux mille hommes d''Ephraïm tombèrent à ce moment-là.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'fut juge 2.16n. –  dans les villes…  : LXX a lu dans sa ville (le Mitspa ?), cf. 10.17n.'
  - type: text
    content: Jephté fut juge en Israël pendant six ans ; puis Jephté, le Galaadite, mourut et fut enseveli dans les villes de Galaad.
  - type: heading
    content: Ibtsân, Elôn et Abdôn
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Beth-Léhem  : il s''agit vraisemblablement ici de la localité de Zabulon, à une dizaine de kilomètres à l''ouest-nord-ouest de Nazareth (Jos 19.15), plutôt que de Beth-Léhem de Juda (Jg 17.7+).'
  - type: text
    content: 'Après lui, Ibtsân de Beth-Léhem fut juge en Israël. '
  '9':
  - type: note
    content: 'Cf. v. 14 ; 10.3-5. –  maria  : litt. envoya. –  au dehors  : c.-à-d. hors de sa tribu, contrairement sans doute à l''usage courant ; cela étendait d''autant la zone d''influence du juge.'
  - type: text
    content: 'Il eut trente fils et trente filles qu''il maria au dehors, et il fit venir pour ses fils trente filles du dehors. Il fut juge en Israël pendant sept ans ; '
