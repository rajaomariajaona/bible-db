  - type: text
    text: 'Galaad prit les gués du Jourdain, du côté d''Ephraïm. Quand l''un des rescapés d''Ephraïm disait : « Je voudrais passer ! », les hommes de Galaad lui demandaient : « Es-tu éphraïmite ? » Il répondait : « Non. » '
