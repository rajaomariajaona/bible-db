  - type: text
    text: 'Jephté rassembla tous les hommes de Galaad pour faire la guerre à Ephraïm. Les hommes de Galaad battirent Ephraïm, qui avait dit : « Vous êtes des rescapés d''Ephraïm, vous, Galaad, au milieu d''Ephraïm, au milieu de Manassé ! » '
