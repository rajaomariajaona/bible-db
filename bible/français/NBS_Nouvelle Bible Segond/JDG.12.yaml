  - type: text
    text: 'On lui disait alors : « Dis “Shibboleth”, je te prie. » Et il disait « Sibboleth », car il ne pouvait pas bien prononcer. Sur quoi on le saisissait et on l''égorgeait près des gués du Jourdain. Quarante-deux mille hommes d''Ephraïm tombèrent à ce moment-là.'
