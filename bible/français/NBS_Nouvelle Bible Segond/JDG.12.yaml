  - type: text
    text: 'Les hommes d''Ephraïm se mobilisèrent et passèrent vers Tsaphôn pour dire à Jephté : Pourquoi es-tu passé pour faire la guerre aux Ammonites, sans nous avoir appelés à aller avec toi ? Nous allons mettre le feu à ta maison et te brûler avec elle ! '
