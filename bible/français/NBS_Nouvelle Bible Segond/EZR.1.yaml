        - type: text
          text: Cf. Gn 26.3 ; 28.15 ; 31.3 ; Ex 3.12.
      marker-yv: yv-n
    - type: text
      text: 'Quiconque d''entre vous appartient à son peuple, que son Dieu soit avec lui ! Qu''il monte à Jérusalem, en Juda, et bâtisse la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël – c''est le Dieu qui est à Jérusalem ! '
