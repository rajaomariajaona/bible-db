      marker-yv: yv-n
    - type: text
      text: 'Alors les chefs de famille de Juda et de Benjamin, les prêtres et les lévites, tous ceux dont Dieu éveilla l''esprit, montèrent pour bâtir la maison du '
    - type: usfm
