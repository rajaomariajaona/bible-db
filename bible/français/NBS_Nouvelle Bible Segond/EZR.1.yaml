document_id: EZR.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Cyrus autorise la reconstruction du temple
  - type: heading
    content: 2Ch 36.22-23
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.3ss ; le texte hébreu commence par un et , comme en 2Ch 36.22 ; il se donne ainsi pour la suite directe des Chroniques. –  La première année à compter de la prise de Babylone, 539/8 av. J.-C. –  Cyrus, roi de Perse 5.13 ; 6.3 ; Es 44.28ss. –  que s''accomplisse  : cf. Mt 1.22+. –  prononcée par  : litt. de la bouche de . –  Jérémie Jr 25.11s ; 29.10 ; voir aussi 27.7 ; 31.38 ; Za 1.12 ; Dn 9.2. –  éveilla l''esprit de , c.-à-d. fit agir , cf. v. 5 ; Jr 51.11 ; Ag 1.14 ; 1Ch 5.26 ; 2Ch 21.16 ; voir aussi Es 13.17n  ; Jr 6.22+. –  diffusa…  : litt. fit passer une voix (de même en 10.7 ; Ex 36.6 ; Né 8.15 ; 2Ch 30.5 ; 36.22) ; cf. Esd 6.2ss ; 2Ch 30.1ss.'
  - type: text
    content: 'La première année de Cyrus, roi de Perse, afin que s''accomplisse la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononcée par Jérémie, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' éveilla l''esprit de Cyrus, roi de Perse, qui diffusa dans tout son royaume cette proclamation – même par écrit : '
  '10':
  - type: note
    content: 'doubles  : on a aussi compris de second ordre ; de rechange  ; le terme correspondant est absent de LXX et Vg.'
  - type: text
    content: '30 coupes d''or, 410 coupes doubles d''argent, 1 000 autres objets. '
  '11':
  - type: note
    content: '5 400  : ce total ne correspond pas à la somme des v. 9s (2 499). Peut-être s''agit-il d''une liste partielle.'
  - type: text
    content: 'Total des objets d''or et d''argent : 5 400. Sheshbatsar fit monter le tout en même temps que montaient les exilés, de Babylone à Jérusalem.'
  '2':
  - type: note
    content: 'Dieu du ciel  : désignation perse de Dieu, cf. 5.11s ; 6.9s ; Né 1.5 ; 2.4 ; voir aussi Ap 11.13. –  tous les royaumes, y compris l''ancienne Assyrie : l''édit concerne aussi, en principe, les descendants des exilés du royaume du Nord, cf. v. 5 ; 2R 17 ; 2Ch 30.9. –  m''a chargé de…  : la même formule a été traduite faire rendre des comptes  ; cf. Jr 6.15n.'
  - type: text
    content: 'Ainsi parle Cyrus, roi de Perse : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu du ciel, m''a donné tous les royaumes de la terre, et il m''a chargé de lui bâtir une maison à Jérusalem, en Juda. '
  '3':
  - type: note
    content: Cf. Gn 26.3 ; 28.15 ; 31.3 ; Ex 3.12.
  - type: text
    content: 'Quiconque d''entre vous appartient à son peuple, que son Dieu soit avec lui ! Qu''il monte à Jérusalem, en Juda, et bâtisse la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël – c''est le Dieu qui est à Jérusalem ! '
  '4':
  - type: note
    content: 'Cf. 6.8ss ; Ex 3.21s ; 11.2s ; 12.35s. –  ceux qui restent Es 1.9+ ; 10.20s. –  séjournent en immigrés  : cf. Ex 12.48n  ; Jr 29. –  des bêtes  : certains comprennent des bêtes de somme, de même au v. 6. –  offrandes volontaires 2.68 ; 7.15s ; 8.25ss ; Né 7.69 ; cf. Ex 25.2ns ; Lv 7.16+.'
  - type: text
    content: A tous ceux qui restent, quel que soit le lieu où ils séjournent en immigrés, que les gens du lieu leur fournissent de l'argent, de l'or, des biens et des bêtes, avec des offrandes volontaires pour la maison du Dieu qui est à Jérusalem.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Juda / Benjamin  : cf. 4.1 ; 10.9 ; Né 11.4,36 ; 12.34 ; 1Ch 9.3 ; 12.17 ; 2Ch 11.1ss,12,23 ; 15.2,8s ; 25.5 ; 31.1 ; 34.9. – Voir prêtre. –  lévites  : cf. 2.40+. –  éveilla l''esprit v. 1n. –  montèrent…  : litt. se levèrent… pour monter et pour bâtir.'
  - type: text
    content: 'Alors les chefs de famille de Juda et de Benjamin, les prêtres et les lévites, tous ceux dont Dieu éveilla l''esprit, montèrent pour bâtir la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui est à Jérusalem. '
  '6':
  - type: note
    content: 'leur apportèrent une aide  : litt. fortifièrent dans leurs mains, cf. 6.22 ; Né 2.18 ; 6.9n  ; voir aussi Jg 9.24 ; 1S 23.16 ; Es 35.3 ; Jr 23.14. –  sous forme d''objets  : 3 Esdras 2.6 semble avoir lu « par tous les moyens : argent et or… ». –  riches présents Gn 24.53 ; 2Ch 21.3 ; 32.23.'
  - type: text
    content: 'Tous ceux qui les entouraient leur apportèrent une aide sous forme d''objets d''argent et d''or, de biens, de bêtes et de riches présents, outre toutes les offrandes volontaires. '
  '7':
  - type: note
    content: 'rendit  : litt. fit sortir. –  les objets…  : cf. 5.14 ; 6.5 ; 2R 24.13ss ; 25.13ss ; Jr 27.22 ; 52.17ss ; Dn 1.2 ; 5.2 ; 2Ch 36.7,10,18. –  de son dieu, d''après LXX  ; autre traduction de ses dieux.'
  - type: text
    content: 'Le roi Cyrus rendit les objets de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), que Nabuchodonosor avait fait sortir de Jérusalem et placés dans la maison de son dieu. '
  '8':
  - type: note
    content: 'Mitredath ou Mithridate, nom perse signifiant don de Mithra. –  trésorier  : terme d''origine perse. –  Sheshbatsar, le prince  : nom babylonien du premier gouverneur des Judéens au moment du retour à Jérusalem. On l''a parfois identifié à Zorobabel (2.2 ; 3.2), mais sans doute à tort ; cf. 5.14n,16 ; 1Ch 3.18 (Shénatsar ?).'
  - type: text
    content: 'Cyrus, roi de Perse, les fit sortir par Mitredath, le trésorier, qui en fit le compte pour Sheshbatsar, le prince de Juda. '
  '9':
  - type: note
    content: 'couteaux  : traduction conjecturale ; le texte est incertain ; on pourrait aussi comprendre 1 029 ( ?) plats d''argent.'
  - type: text
    content: 'En voici le nombre : 30 plats d''or, 1 000 plats d''argent, 29 couteaux, '
