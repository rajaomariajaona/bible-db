document_id: EZK.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur annonce la fin
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Le tour vient  : litt. le tour (v. 7n) sort.'
  - type: text
    content: Il est là, le jour ! Il arrive !
  - type: text
    content: Le tour vient !
  - type: text
    content: Le bâton fleurit !
  - type: text
    content: L'arrogance s'épanouit !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  abondance  : autres traductions multitude ; tumulte (on aurait peut-être affaire à un synonyme au vers suivant) ; même terme aux v. 12-14 ; 23.42 ; 26.13 ; 29.19 ; 30.4,10,15 ; 31.2,18 ; 32.12,16,18,20,24ss,31s ; 39.11,15. –  plus de splendeur en eux  : on a aussi compris pas de lamentation pour eux . Vg pas de repos (ou pas de répit ; pas de consolation ) pour eux , ce qui pourrait correspondre à une variante de l''hébreu.'
  - type: text
    content: La violence se dresse,
  - type: text
    content: 'pour servir de bâton à la méchanceté :'
  - type: text
    content: plus rien d'eux,
  - type: text
    content: plus rien de leur abondance,
  - type: text
    content: plus rien de leur multitude,
  - type: text
    content: plus de splendeur en eux !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'son abondance  : autres traductions sa multitude ; son tumulte (cf. v. 11n) ; dans le texte hébreu le possessif est au féminin ; il pourrait renvoyer à la ville de Jérusalem ou à la terre d''Israël (v. 2) ; cf. 30.15 ; 31.2 ; 39.11.'
  - type: text
    content: Il arrive, le temps,
  - type: text
    content: il approche, le jour !
  - type: text
    content: Que l'acheteur ne se réjouisse pas,
  - type: text
    content: que le vendeur ne prenne pas le deuil !
  - type: text
    content: Car une colère ardente éclate
  - type: text
    content: contre toute son abondance.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le vendeur…  : peut-être faut-il voir ici une allusion aux lois du jubilé (Lv 25.8-17), désormais inapplicables en raison de l''exil. –  son abondance  ; cf. v. 11n,12n,14. –  et personne… par (ou dans , cf. 3.18n) sa faute  : texte obscur ; autre traduction parce que la vie de chacun réside dans sa faute, ils ne se fortifieront pas.'
  - type: text
    content: Non, le vendeur ne rentrera pas en possession de ce qu'il a vendu,
  - type: text
    content: fût-il encore parmi les vivants ;
  - type: text
    content: car la vision contre toute son abondance ne sera pas retirée,
  - type: text
    content: et personne n'assurera sa vie par sa faute.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'trompette  : cf. 33.3s ; Es 18.3 ; Jr 6.1 ; Os 5.8 ; Am 3.6.'
  - type: text
    content: On sonne de la trompette, tout est prêt,
  - type: text
    content: mais personne ne marche au combat,
  - type: text
    content: car ma colère ardente éclate
  - type: text
    content: contre toute son abondance.
  '15':
  - type: text
    content: ' '
  - type: note
    content: épée / peste / famine 5.12+.
  - type: text
    content: L'épée au dehors,
  - type: text
    content: la peste et la famine au dedans !
  - type: text
    content: Celui qui est dans la campagne
  - type: text
    content: mourra par l'épée ;
  - type: text
    content: celui qui est dans la ville,
  - type: text
    content: la famine et la peste le dévoreront.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'sur les montagnes  : cf. Mt 24.16/ /. –  tous gémissent  : LXX je les ferai tous mourir . –  dans (ou à cause de ) sa faute v. 13+ ; voir péché.'
  - type: text
    content: Leurs rescapés s'échappent,
  - type: text
    content: ils sont sur les montagnes
  - type: text
    content: comme les colombes des vallées ;
  - type: text
    content: tous gémissent,
  - type: text
    content: chacun dans sa faute.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '21.12. –  tombent ou s''affaiblissent  ; l''expression signifie perdre courage  ; cf. 2S 4.1 ; Es 13.7 ; Jr 6.24 ; 2Ch 15.7. –  dégouttent  : litt. s''en vont en eau  ; il faut sans doute comprendre ruissellent d''urine (par l''effet de la peur ou de la faiblesse).'
  - type: text
    content: Toutes les mains tombent,
  - type: text
    content: tous les genoux dégouttent.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Signes de deuil, de tristesse ou de pénitence ; cf. 27.31 ; Es 15.2s ; Am 8.10. –  les saisit  : litt. les couvre.'
  - type: text
    content: Ils mettent un sac pour pagne,
  - type: text
    content: et un frémissement les saisit ;
  - type: text
    content: tous les visages sont couverts de honte,
  - type: text
    content: toutes leurs têtes sont rasées.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'So 1.18. –  une souillure  : ici et au v. 20 c''est le terme hébreu qui désigne habituellement la souillure rituelle des règles ; cf. 18.6+ ; Lv 12.2n  ; Lm 1.8n. –  colère traduit ici un autre mot que dans le reste du chapitre. –  rassasier leur gosier ou se rassasier  ; cf. Gn 1.20n. –  l''obstacle…  : litt. l''obstacle (c.-à-d. la cause ou l''occasion ) de leur faute  ; de même 14.3ss ; 18.30 ; 44.12 ; cf. 3.20n  ; 21.20n.'
  - type: text
    content: Ils jetteront leur argent dans les rues,
  - type: text
    content: et leur or deviendra une souillure ;
  - type: text
    content: leur argent et leur or ne pourront les délivrer,
  - type: text
    content: 'au jour de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: ils ne pourront ni rassasier leur gosier,
  - type: text
    content: ni remplir leurs entrailles ;
  - type: text
    content: car c'est l'obstacle sur lequel ils ont trébuché,
  - type: text
    content: la cause de leur faute.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'voici ce que dit (la formule correspondante est habituellement traduite par ainsi parle , p. ex. v. 5) le Seigneur  : LXX dis : voici ce que dit le Seigneur . –  à la terre d''Israël  : litt. au sol d''Israël , de même en 11.17 ; 12.19,22 ; 13.9 ; 18.2 ; 20.38,42 ; 21.7s ; 25.3,6 ; 33.24 ; 36.6 ; cf. Gn 2.5n. –  les quatre extrémités  : cf. Ap 7.1 ; 20.8.'
  - type: text
    content: 'Quant à toi, humain, voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' à la terre d''Israël :'
  - type: text
    content: C'est la fin !
  - type: text
    content: La fin arrive sur les quatre extrémités du pays !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'leur belle parure  : il faut peut-être voir ici une allusion au temple  ; cf. v. 21s ; 8.5-16 ; 2R 21.1-8 ; voir aussi, dans un sens plus général, Ez 16.17 ; Os 2.10.'
  - type: text
    content: Ils ont fait leur orgueil de leur belle parure,
  - type: text
    content: et ils y ont mis les images de leurs abominations, de leurs horreurs.
  - type: text
    content: Aussi j'en ferai pour eux une souillure ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: livrerai Gn 9.2n. –  aux étrangers 30.12+.
  - type: text
    content: je la livrerai en pillage aux étrangers,
  - type: text
    content: et comme butin aux méchants du pays,
  - type: text
    content: afin qu'ils la profanent.
  '22':
  - type: text
    content: Je me détournerai d'eux,
  - type: text
    content: on profanera mon trésor ;
  - type: text
    content: des bandits y pénétreront et le profaneront.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'les chaînes  : litt. la chaîne , sans doute celle qui servira à lier les prisonniers et à les emmener en exil ; certains modifient le texte hébreu traditionnel pour lire le massacre . –  sanguinaires  : litt. de sangs , c.-à-d. de meurtres ; cf. 9.9n  ; voir Es 1.15n  ; Mi 3.9-11. –  pleine de violence  : cf. 9.9 ; 12.19 ; 22.2ns.'
  - type: text
    content: Prépare les chaînes !
  - type: text
    content: Car le pays est rempli de jugements sanguinaires,
  - type: text
    content: la ville est pleine de violence.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 28.7. –  s''emparent ou, selon la traduction habituelle du terme, prennent possession . –  leurs sanctuaires  : traduction d''après le grec, qui suppose une vocalisation différente du texte hébreu ; lecture traditionnelle ceux qui les sanctifient  ; voir saint.'
  - type: text
    content: Je ferai venir les plus mauvaises nations,
  - type: text
    content: pour qu'elles s'emparent de leurs maisons ;
  - type: text
    content: je mettrai fin à l'orgueil des puissants,
  - type: text
    content: et leurs sanctuaires seront profanés.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Le dénouement  : ce mot rare, qui ressemble au verbe traduit par enrouler en Es 38.12n, désigne peut-être, au sens propre, l''acte du tisserand qui détache son ouvrage du métier ; autre traduction, d''après une autre racine  : l''angoisse . –  Ils voudraient…  : litt. ils cherchent la paix, mais rien (ou il n''y en a pas ) ; cf. Jr 6.14 ; 8.11.'
  - type: text
    content: Le dénouement arrive !
  - type: text
    content: Ils voudraient que tout aille bien, mais rien ne va !
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 13.9 ; Es 29.14 ; Mi 3.6 ; Lm 2.9 ; voir Jr 18.18n. – Voir prophète, loi et prêtre.
  - type: text
    content: Il arrive malheur sur malheur,
  - type: text
    content: une nouvelle succède à une nouvelle ;
  - type: text
    content: ils demandent des visions au prophète,
  - type: text
    content: mais la loi fait défaut au prêtre
  - type: text
    content: et le conseil aux anciens.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'selon leur voie  : cf. v. 3s,9 ; 9.10 ; 11.21 ; 22.31 ; Jc 2.24. –  de leurs propres jugements  : cf. Mt 7.2 ; Jc 2.13.'
  - type: text
    content: Le roi prend le deuil,
  - type: text
    content: le prince se revêt de son atterrement,
  - type: text
    content: les mains du peuple du pays sont saisies d'épouvante.
  - type: text
    content: Je les traiterai selon leur voie,
  - type: text
    content: je les jugerai de leurs propres jugements,
  - type: text
    content: 'et ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la fin…  : litt. la fin sur toi . –  je te jugerai… v. 8 ; 18.30 ; 33.20 ; cf. Jr 17.10+ ; Os 12.3+. –  je ferai retomber sur toi  : litt. je mettrai sur toi  ; autre traduction je te chargerai de  ; de même dans la suite ; cf. 9.10 ; 11.21 ; 22.31 ; 23.49. –  toutes tes abominations 5.9+.'
  - type: text
    content: Maintenant, la fin vient sur toi ;
  - type: text
    content: j'enverrai ma colère contre toi,
  - type: text
    content: je te jugerai selon tes voies,
  - type: text
    content: je ferai retomber sur toi toutes tes abominations.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'sans pitié 5.11+. –  tes voies  : autre traduction ta conduite , de même au v. 9, dans une tournure légèrement différente ; cf. v. 27+ ; 9.10n. –  tes abominations seront…  : cf. Jr 2.19 ; Rm 1.18-32.'
  - type: text
    content: Mon œil sera sans pitié pour toi,
  - type: text
    content: je n'épargnerai personne ;
  - type: text
    content: car je ferai retomber sur toi tes voies,
  - type: text
    content: tes abominations seront au milieu de toi ;
  - type: text
    content: 'ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Un malheur, un malheur unique  : certains mss hébreux portent malheur après malheur.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Un malheur, un malheur unique !
  - type: text
    content: Il arrive !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la fin / Elle s''éveille  : hébreu haqqéts / héqits  ; le texte joue sur l''assonance.'
  - type: text
    content: La fin arrive ! Elle arrive la fin !
  - type: text
    content: Elle s'éveille contre toi !
  - type: text
    content: Elle va arriver !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ton tour  : traduction incertaine ; le même mot est traduit par diadème en Es 28.5, de sorte que la proposition pourrait signifier ton règne passe  ; l''image pourrait encore être celle du sort funeste qui vient s''abattre en tournoyant sur la tête des impies. De même au v. 10. –  le jour 30.2-3+ ; Es 2.10-21. –  panique  : cf. 22.5n. –  cris de joie  : cf. Es 16.9s (terme apparenté).'
  - type: text
    content: Il arrive, ton tour, habitant du pays !
  - type: text
    content: Il arrive, le temps,
  - type: text
    content: il approche, le jour, jour de panique !
  - type: text
    content: Plus de cris de joie dans les montagnes !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3+. –  je suis près…  : autre traduction de près je vais répandre  ; cf. v. 7 ; 9.1 ; 11.3.'
  - type: text
    content: Maintenant je suis près de répandre ma fureur sur toi ;
  - type: text
    content: j'irai jusqu'au bout de ma colère contre toi ;
  - type: text
    content: je te jugerai selon tes voies,
  - type: text
    content: je ferai retomber sur toi toutes tes abominations.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'V. 4. –  ce qui convient à tes voies  : litt. selon tes voies.'
  - type: text
    content: Mon œil sera sans pitié,
  - type: text
    content: je n'épargnerai personne ;
  - type: text
    content: 'je ferai retomber sur toi ce qui convient à tes voies :'
  - type: text
    content: tes abominations seront au milieu de toi ;
  - type: text
    content: 'ainsi vous saurez que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui frappe.'
