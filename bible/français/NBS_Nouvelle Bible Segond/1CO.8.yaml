document_id: 1CO.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les viandes sacrifiées aux idoles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les viandes sacrifiées aux idoles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.14-31 ; Ac 15.29+ ; la viande des sacrifices offerts dans les temples de Corinthe était couramment vendue sur le marché. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la connaissance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en grec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gnosis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui a donné le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gnose '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir « La question gnostique »♦) v. 7,10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gonfle d''orgueil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gonfle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 13.4 ; Col 2.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: construit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est constructif, édifie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.23 ; 14.3ss ; Rm 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Pour ce qui concerne les viandes sacrifiées aux idoles, nous savons que tous, nous avons de la connaissance. La connaissance gonfle d''orgueil, mais l''amour construit. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'connaissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la construction…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sa conscience… ne sera-t-elle pas construite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: édifiée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de façon à manger… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Sans doute ceux qui se faisaient forts de leur « connaissance » prétendaient-ils faire œuvre « constructive » pour leurs frères plus « faibles », les « édifier » par leur attitude ; mais pareille « édification » était en fait néfaste si elle incitait les « faibles » à commettre ce qu'eux-mêmes considéraient comme un acte d'idolâtrie.
      marker-yv: yv-n
    - type: text
      text: 'Car si quelqu''un te voit, toi qui as de la connaissance, à table dans un temple d''idoles, la construction de sa conscience ne va-t-elle pas l''amener, lui qui est faible, à manger des viandes sacrifiées aux idoles ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 14.15,20.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi le faible se perd à cause de ta connaissance, lui, ce frère pour qui le Christ est mort ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En péchant de la sorte contre les frères et en heurtant leur conscience, qui est faible, c''est contre le Christ que vous péchez. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: causer la chute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 9+ ; 1.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 11.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 17.27 ; Rm 14.21,23 ; 2Co 11.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: viande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 14.2 ; voir aussi Dn 1.8,12.'
      marker-yv: yv-n
    - type: text
      text: C'est pourquoi, si un aliment doit causer la chute de mon frère, jamais plus je ne mangerai de viande, afin de ne pas causer la chute de mon frère.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ga 6.3.'
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un pense connaître quelque chose, il ne connaît pas encore comme il faut connaître. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aime Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 8.28+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'connu de lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.12 ; 14.38
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ga 4.9 ; 2Tm 2.19 ; cf. Jn 10.14.'
      marker-yv: yv-n
    - type: text
      text: 'Mais si quelqu''un aime Dieu, celui-là est connu de lui. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'y a pas d'idole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.19ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'y a de Dieu qu'un seul
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'y a pas de dieu sinon un
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'y a de Dieu que celui qui est un
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 6+ ; Dt 4.35,39 ; 6.4+ ; Mc 12.29.'
      marker-yv: yv-n
    - type: text
      text: 'Donc, pour ce qui concerne la consommation des viandes sacrifiées aux idoles, nous savons qu''il n''y a pas d''idole dans le monde et qu''il n''y a de Dieu qu''un seul. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ps 136.2s. Allusion aux nombreuses divinités des religions de l''Antiquité. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et de fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme.
      marker-yv: yv-n
    - type: text
      text: Car s'il est vrai qu'il y a ce qu'on appelle des dieux, soit dans le ciel, soit sur la terre, – et de fait il y a beaucoup de dieux et beaucoup de seigneurs –
  '6':
  - type: usfm
    marker: q2
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'un seul Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.5s ; Rm 3.30 ; Ep 4.5s ; 1Tm 2.5 ; cf. Ml 2.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de qui tout vient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(tous les verbes sont sous-entendus dans le texte) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce type de formule (Rm 11.36+) rappelle celles du stoïcisme (Ac 17.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',28) ; cf. Marc Aurèle (4.23) : « Tout vient de toi (la nature), tout est en toi, tout est pour toi. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par qui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jn 1.3+ ; Col 1.15-20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et par qui nous sommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains traduisent, en interprétant différemment le parallélisme'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et par qui nous sommes destinés à Dieu.
      marker-yv: yv-n
    - type: text
      text: néanmoins, pour nous, il n'y a qu'un seul Dieu, le Père,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: de qui tout vient et pour qui nous sommes,
  - type: usfm
    marker: q2
    children:
    - type: text
      text: et un seul Seigneur, Jésus-Christ,
  - type: usfm
    marker: q3
    children:
    - type: text
      text: par qui tout existe et par qui nous sommes.
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous n'ont pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la connaissance n''est pas en tous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 1) ; certains comprennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous n'ont pas cette connaissance-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''autres'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la connaissance n'a pas porté les mêmes fruits chez tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''habitude '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme en 11.16) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des idoles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'idole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la conscience de l'idole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en les considérant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faible '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 14.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: souillée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur.'
      marker-yv: yv-n
    - type: text
      text: 'Mais tous n''ont pas cette connaissance. En effet, quelques-uns, encore tenus par l''habitude des idoles, mangent de ces viandes en les considérant comme sacrifiées aux idoles ; et leur conscience, qui est faible, en est souillée. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui nous rapprochera de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui nous rendra agréables à '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui nous fera comparaître devant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Rm 14.17 ; Hé 13.9.'
      marker-yv: yv-n
    - type: text
      text: 'Or ce n''est pas un aliment qui nous rapprochera de Dieu : si nous n''en mangeons pas, nous n''avons rien de moins ; si nous en mangeons, nous n''avons rien de plus. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: votre droit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec est souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'autorité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (7.37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; il est apparenté au verbe traduit par '
      - type: usfm
