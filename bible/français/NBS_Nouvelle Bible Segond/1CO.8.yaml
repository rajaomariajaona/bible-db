document_id: 1CO.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les viandes sacrifiées aux idoles
  - type: text
    content: ' '
  - type: note
    content: 'les viandes sacrifiées aux idoles  : cf. 10.14-31 ; Ac 15.29+ ; la viande des sacrifices offerts dans les temples de Corinthe était couramment vendue sur le marché. –  la connaissance  : en grec gnosis , qui a donné le mot gnose (voir « La question gnostique »♦) v. 7,10. –  gonfle d''orgueil ou simplement gonfle , cf. 4.6n  ; 13.4 ; Col 2.18. –  construit  : autres traductions est constructif, édifie  ; v. 10n  ; 3.9n  ; 10.23 ; 14.3ss ; Rm 15.2n.'
  - type: text
    content: 'Pour ce qui concerne les viandes sacrifiées aux idoles, nous savons que tous, nous avons de la connaissance. La connaissance gonfle d''orgueil, mais l''amour construit. '
  '10':
  - type: note
    content: 'connaissance v. 1+. –  la construction…  : litt. sa conscience… ne sera-t-elle pas construite (ou édifiée, cf. v. 1n) de façon à manger… ? Sans doute ceux qui se faisaient forts de leur « connaissance » prétendaient-ils faire œuvre « constructive » pour leurs frères plus « faibles », les « édifier » par leur attitude ; mais pareille « édification » était en fait néfaste si elle incitait les « faibles » à commettre ce qu''eux-mêmes considéraient comme un acte d''idolâtrie.'
  - type: text
    content: 'Car si quelqu''un te voit, toi qui as de la connaissance, à table dans un temple d''idoles, la construction de sa conscience ne va-t-elle pas l''amener, lui qui est faible, à manger des viandes sacrifiées aux idoles ? '
  '11':
  - type: note
    content: Rm 14.15,20.
  - type: text
    content: 'Ainsi le faible se perd à cause de ta connaissance, lui, ce frère pour qui le Christ est mort ! '
  '12':
  - type: note
    content: Voir péché.
  - type: text
    content: 'En péchant de la sorte contre les frères et en heurtant leur conscience, qui est faible, c''est contre le Christ que vous péchez. '
  '13':
  - type: note
    content: 'causer la chute  : cf. v. 9+ ; 1.23n  ; Mt 11.6n  ; 17.27 ; Rm 14.21,23 ; 2Co 11.29n. –  viande  : cf. Rm 14.2 ; voir aussi Dn 1.8,12.'
  - type: text
    content: C'est pourquoi, si un aliment doit causer la chute de mon frère, jamais plus je ne mangerai de viande, afin de ne pas causer la chute de mon frère.
  '2':
  - type: note
    content: Cf. 3.7n  ; Ga 6.3.
  - type: text
    content: 'Si quelqu''un pense connaître quelque chose, il ne connaît pas encore comme il faut connaître. '
  '3':
  - type: note
    content: aime Dieu Rm 8.28+. –  connu de lui 13.12 ; 14.38n  ; Ga 4.9 ; 2Tm 2.19 ; cf. Jn 10.14.
  - type: text
    content: 'Mais si quelqu''un aime Dieu, celui-là est connu de lui. '
  '4':
  - type: note
    content: 'il n''y a pas d''idole  : cf. 10.19ss. –  il n''y a de Dieu qu''un seul  : litt. il n''y a pas de dieu sinon un  ; autre traduction il n''y a de Dieu que celui qui est un  ; cf. v. 6+ ; Dt 4.35,39 ; 6.4+ ; Mc 12.29.'
  - type: text
    content: 'Donc, pour ce qui concerne la consommation des viandes sacrifiées aux idoles, nous savons qu''il n''y a pas d''idole dans le monde et qu''il n''y a de Dieu qu''un seul. '
  '5':
  - type: note
    content: 'Cf. Ps 136.2s. Allusion aux nombreuses divinités des religions de l''Antiquité. –  et de fait  : litt. comme.'
  - type: text
    content: Car s'il est vrai qu'il y a ce qu'on appelle des dieux, soit dans le ciel, soit sur la terre, – et de fait il y a beaucoup de dieux et beaucoup de seigneurs –
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'qu''un seul Dieu  : cf. v. 4n  ; 12.5s ; Rm 3.30 ; Ep 4.5s ; 1Tm 2.5 ; cf. Ml 2.10. –  de qui tout vient (tous les verbes sont sous-entendus dans le texte) …  : ce type de formule (Rm 11.36+) rappelle celles du stoïcisme (Ac 17.18n,28) ; cf. Marc Aurèle (4.23) : « Tout vient de toi (la nature), tout est en toi, tout est pour toi. » –  par qui…  : cf. Jn 1.3+ ; Col 1.15-20. –  et par qui nous sommes  : certains traduisent, en interprétant différemment le parallélisme  : et par qui nous sommes destinés à Dieu.'
  - type: text
    content: néanmoins, pour nous, il n'y a qu'un seul Dieu, le Père,
  - type: text
    content: de qui tout vient et pour qui nous sommes,
  - type: text
    content: et un seul Seigneur, Jésus-Christ,
  - type: text
    content: par qui tout existe et par qui nous sommes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'tous n''ont pas…  : litt. la connaissance n''est pas en tous (cf. v. 1) ; certains comprennent  : tous n''ont pas cette connaissance-là , d''autres  : la connaissance n''a pas porté les mêmes fruits chez tous . –  l''habitude (même terme en 11.16) des idoles (litt. de l''idole ) : certains mss portent la conscience de l''idole . –  en les considérant  : sous-entendu dans le texte. –  faible Rm 14.1+. –  souillée  : voir pur, impur.'
  - type: text
    content: 'Mais tous n''ont pas cette connaissance. En effet, quelques-uns, encore tenus par l''habitude des idoles, mangent de ces viandes en les considérant comme sacrifiées aux idoles ; et leur conscience, qui est faible, en est souillée. '
  '8':
  - type: note
    content: 'qui nous rapprochera de  : autres traductions qui nous rendra agréables à ou qui nous fera comparaître devant  ; cf. Rm 14.17 ; Hé 13.9.'
  - type: text
    content: 'Or ce n''est pas un aliment qui nous rapprochera de Dieu : si nous n''en mangeons pas, nous n''avons rien de moins ; si nous en mangeons, nous n''avons rien de plus. '
  '9':
  - type: note
    content: 'votre droit  : le mot grec est souvent traduit par autorité (7.37n) ; il est apparenté au verbe traduit par permettre en 6.12 ; on le retrouve au sens de droit en 9.4ss,12,18 ; 2Th 3.9 ; cf. Rm 14.13,20s ; Ga 5.13.'
  - type: text
    content: 'Prenez garde cependant que votre droit ne devienne pas une pierre d''achoppement pour les faibles. '
