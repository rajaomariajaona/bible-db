document_id: REV.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le trône de Dieu et le culte céleste
  - type: text
    content: ' '
  - type: note
    content: 'porte ouverte dans le ciel  : cf. 19.11 ; Ez 1.1 ; Ps 78.23 ; Mt 3.16/ / ; Jn 1.51 ; Ac 10.11. –  trompette / première voix 1.10+. –  Monte ici 11.12 ; cf. Ex 19.24. –  ce qui doit arriver 1.1+.'
  - type: text
    content: 'Après cela, je vis une porte ouverte dans le ciel. Telle une trompette, la première voix que j''avais entendue parler avec moi dit : Monte ici, et je te ferai voir ce qui doit arriver après.'
  '10':
  - type: note
    content: 'V. 4+. –  se prosternent  : 3.9+ ; Mt 2.2+ ; voir culte.'
  - type: text
    content: 'les vingt-quatre anciens tombent aux pieds de celui qui est assis sur le trône, se prosternent devant celui qui vit à tout jamais et jettent leurs couronnes devant le trône, en disant :'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'digne 5.9s. –  gloire…  : cf. 5.13 ; 7.10,12 ; 11.15,17 ; 12.10 ; 15.3s ; 19.1s,5-7 ; cf. 1Ch 29.11 ; Rm 16.27. –  c''est toi qui as tout créé Ep 3.9 ; cf. Siracide 18.1 : « Celui qui vit éternellement a créé toutes choses ensemble. » –  par ta volonté  : cf. 1Co 12.18+. –  était  : certains mss ont le présent du même verbe ( est ) ou un autre verbe ( est venu à l''existence ).'
  - type: text
    content: Tu es digne, notre Seigneur, notre Dieu,
  - type: text
    content: de recevoir la gloire, l'honneur et la puissance,
  - type: text
    content: car c'est toi qui as tout créé,
  - type: text
    content: c'est par ta volonté que tout était et que tout a été créé.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'saisi par l''Esprit 1.10n. –  trône / ciel Es 6.1 ; Ez 1.26 ; 10.1 ; Ps 11.4 ; 103.19. –  sur ce trône v. 9s ; 5.1,7,13 ; 6.16 ; 7.10,15 ; 19.4 ; 20.11 ; 21.5 ; cf. 1R 22.19 ; Ps 47.9 ; 2Ch 18.18 ; cf. Siracide 1.8 : « Un seul est sage, très redoutable, celui qui siège sur son trône. »'
  - type: text
    content: 'Aussitôt je fus saisi par l''Esprit. Il y avait un trône dans le ciel, et sur ce trône quelqu''un était assis. '
  '3':
  - type: note
    content: 'halo  : le mot grec ainsi traduit pourrait aussi désigner l''arc-en-ciel ; de même en 10.1 ; cf. Ez 1.27s. –  émeraude 21.11,19.'
  - type: text
    content: Celui qui était assis avait l'aspect d'une pierre de jaspe et de sardoine, et le trône était entouré d'un halo qui avait l'aspect de l'émeraude.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'trônes 3.21+. –  vingt-quatre (cf. 1Ch 24.3-19) anciens v. 10 ; 5.5-8,14 ; 7.11,13 ; 11.16 ; 14.3 ; 19.4 ; cf. Ex 3.16 ; 24.1,9-11 ; Nb 11.16 ; 1R 8.1 ; Es 24.23+. –  vêtements blancs 3.4+. –  couronnes (2.10n) d''or  : cf. 14.14+ ; Za 6.11.'
  - type: text
    content: Autour du trône, vingt-quatre trônes ; sur ces trônes, vingt-quatre anciens assis, habillés de vêtements blancs ; sur leurs têtes, des couronnes d'or.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'éclairs / voix (ou bruits ) / tonnerres (ou coups de tonnerre ) 8.5 ; 11.19 ; 16.18 ; Ex 19.16 ; cf. Ez 1.13 ; sur le terme correspondant à voix , qui peut aussi évoquer le tonnerre , cf. Ps 29.3n. –  sept lampes  : cf. 1.12+ ; Za 4.2. –  sept esprits 1.4+.'
  - type: text
    content: 'Du trône sortent des éclairs, des voix et des tonnerres. Devant le trône brûlent sept lampes ardentes, qui sont les sept esprits de Dieu. '
  '6':
  - type: note
    content: 'une mer… cristal  : cf. 15.2 ; voir aussi Gn 1.7n  ; Ex 24.10 ; Ez 1.22. –  êtres vivants  : le mot grec correspondant désigne normalement des animaux 5.6,8,11,14 ; 6.1,3,5,7 ; 7.11 ; 14.3 ; 15.7 ; 19.4 ; cf. Ez 1.5-21 ; 10.14. –  yeux v. 8 ; Ez 1.18 ; 10.12.'
  - type: text
    content: Devant le trône, comme une mer de verre, semblable à du cristal.
  - type: text
    content: 'Au milieu du trône et tout autour du trône, quatre êtres vivants pleins d''yeux devant et derrière. '
  '7':
  - type: note
    content: 'Cf. Ez 1.10 ; 10.14. –  un visage  : autre traduction une apparence.'
  - type: text
    content: 'Le premier être vivant ressemble à un lion, le deuxième être vivant ressemble à un taurillon, le troisième être vivant a comme un visage humain, et le quatrième être vivant ressemble à un aigle en plein vol. '
  '8':
  - type: note
    content: 'six ailes Es 6.2. –  ils sont pleins  : autre traduction elles sont pleines. –  yeux v. 6+. –  Jour et nuit…  : litt. ils n''ont de repos ni le jour ni la nuit, disant  ; cf. 14.11. –  Saint… Es 6.3. –  Tout-Puissant 1.8n. –  celui qui était… 1.4n.'
  - type: text
    content: 'Les quatre êtres vivants ont chacun six ailes, et ils sont pleins d''yeux tout autour et au dedans. Jour et nuit, ils ne cessent de dire :'
  - type: text
    content: Saint, saint, saint est le Seigneur Dieu, le Tout-Puissant,
  - type: text
    content: celui qui était, qui est et qui vient !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction et quand les êtres vivants donneront gloire… les vingt-quatre anciens se prosterneront… ils adoreront… ils jetteront leurs couronnes… –  actions de grâces 2Co 4.15+. –  sur le trône v. 2+. –  celui qui vit…  : cf. 1.18+ ; voir aussi 4.10 ; 10.6 ; 15.7 ; Dn 4.31 ; 6.27 ; 12.7.'
  - type: text
    content: 'Et chaque fois que les êtres vivants donnent gloire, honneur et actions de grâces à celui qui est assis sur le trône, à celui qui vit à tout jamais, '
