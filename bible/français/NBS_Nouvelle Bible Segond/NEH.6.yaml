document_id: NEH.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouvelle intervention des adversaires
  - type: text
    content: ' '
  - type: note
    content: 'Sanballat… 2.10n. –  Tobiya  : cf. v. 17ss. –  Guéshem ou Gashmou (v. 6) : cf. 2.19. –  l''Arabe  : cf. 2.19n. –  autres ennemis 4.1s. –  plus de brèche 1.3 ; 2.13.'
  - type: text
    content: 'Lorsque Sanballat, Tobiya, Guéshem l''Arabe et nos autres ennemis apprirent que j''avais rebâti la muraille et qu''il n''y restait plus de brèche – en ce temps-là, je n''avais pas encore posé les battants des portes – '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Delaya  : cf. 1Ch 24.18. –  Mehétabéel  : cf. Gn 36.39 ; 1Ch 1.50. –  Il s''était enfermé  : traduction incertaine ; autres possibilités il était enfermé, empêché, lié  ; certains pensent à une impureté cérémonielle, d''autres à une mise en scène d''allure prophétique pour impressionner Néhémie ; Vg en secret  ; cf. 1S 20.25s ; Jr 36.5n. –  Allons ensemble  : l''oracle du prophète est présenté sous forme poétique en hébreu. –  à la maison de Dieu  : sur la fonction d''asile du temple, cf. Ex 21.13s ; 1R 1.50ss.'
  - type: text
    content: 'Je me rendis chez Shemaya, fils de Delaya, fils de Mehétabéel. Il s''était enfermé et il dit :'
  - type: text
    content: Allons ensemble à la maison de Dieu,
  - type: text
    content: à l'intérieur du temple,
  - type: text
    content: et fermons les portes du temple ;
  - type: text
    content: car ils viennent pour te tuer,
  - type: text
    content: et c'est pendant la nuit qu'ils viendront pour te tuer.
  '11':
  - type: text
    content: ' '
  - type: note
    content: LXX Qui est l'homme qui entrera dans le temple et restera en vie ? Néhémie n'étant ni prêtre ni lévite, il ne pouvait probablement pas entrer dans le temple sans le profaner ; voir aussi 1.11n  ; Lv 21.17ss ; Nb 18.7.
  - type: text
    content: 'Je répondis : Un homme comme moi, prendre la fuite ! Et quel homme tel que moi pourrait entrer dans le temple et vivre ? Je n''entrerai pas. '
  '12':
  - type: note
    content: 'Cf. Dt 18.20. –  parole prophétique  : cf. Esd 6.14. –  l''avaient soudoyé  : le verbe hébreu est au singulier (cf. Esd 4.5n).'
  - type: text
    content: 'Je m''étais aperçu que ce n''était pas Dieu qui l''envoyait. Mais il avait prononcé sur moi cette parole prophétique parce que Tobiya et Sanballat l''avaient soudoyé. '
  '13':
  - type: note
    content: 'peur v. 9+. – Voir péché. –  une mauvaise réputation  : litt. un mauvais nom. –  me déshonorer ou m''outrager, cf. 2.17n  ; d''autres comprennent me faire passer pour un blasphémateur.'
  - type: text
    content: Ils l'avaient soudoyé ainsi pour que j'aie peur, que je suive ses avis et que je pèche ; ils m'auraient alors fait une mauvaise réputation pour me déshonorer.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '3.36+. –  la prophétesse  : LXX le prophète  ; cf. Ex 15.20 ; 2R 22.14 ; Lc 2.36 ; Ap 2.20. –  prophètes  : deux mss de LXX ont lu prêtres  ; cf. 1R 22.5ss ; Jr 23.9ss ; Za 13.2s.'
  - type: text
    content: Souviens-toi, mon Dieu, de Tobiya, de Sanballat et de leurs œuvres, et aussi de Noadia, la prophétesse, et des autres prophètes qui cherchaient à me faire peur.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'achevée  : cf. 1R 7.51. –  le vingt-cinquième jour du mois d''Eloul , en septembre ; sur l''année, cf. 2.1n. –  en cinquante-deux jours  : Flavius Josèphe attribue à la reconstruction des murailles une durée de deux ans et quatre mois.'
  - type: text
    content: 'La muraille fut achevée le vingt-cinquième jour du mois d''Eloul, en cinquante-deux jours. '
  '16':
  - type: note
    content: 'le virent  : avec une infime modification de la lecture traditionnelle, qui se traduirait comme suit  : toutes les nations (ou tous les païens, c.-à-d. les non-Juifs) autour de nous eurent peur. –  ils tombèrent de haut  : litt. ils tombèrent beaucoup à leurs yeux  ; on pourrait aussi comprendre aux yeux des Judéens  ; quelques-uns modifient légèrement le texte hébreu traditionnel pour lire ce fut une chose fort étonnante à leurs yeux.'
  - type: text
    content: Lorsque tous nos ennemis l'apprirent et que toutes les nations autour de nous le virent, ils tombèrent de haut et surent que cet ouvrage avait été accompli grâce à notre Dieu.
  '17':
  - type: text
    content: 'En ces jours-là, les notables de Juda adressaient beaucoup de lettres à Tobiya, et les lettres de Tobiya leur parvenaient. '
  '18':
  - type: note
    content: Shekania 3.29+. –  Arah Esd 2.5. –  Meshoullam 3.4,30.
  - type: text
    content: 'Car beaucoup en Juda étaient liés à lui par serment, parce qu''il était le gendre de Shekania, fils d''Arah, et que son fils Yohanân avait pris pour femme la fille de Meshoullam, fils de Bérékia. '
  '19':
  - type: note
    content: 'Ils disaient… du bien  : autre traduction on mentionnait ses bonnes œuvres devant moi  ; LXX on me rapportait ses paroles  ; certains modifient légèrement la lecture traditionnelle de l''hébreu pour lire on me rapportait les rumeurs le concernant. –  faire peur v. 9+.'
  - type: text
    content: Ils disaient même du bien de lui devant moi, et ils lui rapportaient mes paroles. Tobiya envoyait des lettres pour me faire peur.
  '2':
  - type: note
    content: Kephirim peut signifier les villages (ainsi a compris LXX), mais il s'agit plutôt du nom d'une localité de la vallée d'Ono, au nord-ouest de Jérusalem, sans doute une zone neutre entre Samarie et Ashdod (4.1n) ; cf. 7.37 ; Esd 2.33 ; 1Ch 8.12.
  - type: text
    content: 'Sanballat et Guéshem m''envoyèrent ce message : Viens, rencontrons-nous à Kephirim, dans la vallée d''Ono. Ils se préparaient à me faire du mal. '
  '3':
  - type: note
    content: 'beaucoup de travail 4.10ss. –  pendant que je le quitterais  : LXX a traduit quand je l''aurai achevé, je descendrai vers vous.'
  - type: text
    content: 'Je leur envoyai des messagers avec cette réponse : J''ai beaucoup de travail à faire et je ne peux pas descendre ; pourquoi le travail serait-il interrompu pendant que je le quitterais pour descendre vers vous ? '
  '4':
  - type: note
    content: 'quatre fois  : cette précision est absente de LXX, de même une cinquième fois au v. 5.'
  - type: text
    content: 'Ils envoyèrent quatre fois le même message, et je leur rendis la même réponse. '
  '5':
  - type: text
    content: 'Sanballat m''envoya ce même message une cinquième fois par son serviteur, qui tenait à la main une lettre ouverte. '
  '6':
  - type: note
    content: 'Gashmou  : cf. v. 1n  ; la mention de son nom est absente de deux importants mss de LXX. –  vous vous préparez à vous rebeller 2.19. –  dit-on  : la même expression hébraïque est traduite des rumeurs de ce genre ; ce genre de rumeurs dans les v. suivants.'
  - type: text
    content: 'Il y était écrit : Le bruit se répand parmi les nations, et Gashmou affirme que, toi et les Judéens, vous vous préparez à vous rebeller, et que c''est pour cela que tu rebâtis la muraille. Tu vas, dit-on, devenir leur roi ; '
  '7':
  - type: note
    content: 'des prophètes…  : cf. 1S 10.24 ; 2S 15.10 ; 1R 1.25,32ss ; 2R 9 ; Ag 2.20ss ; Za 4 ; 6.9ss. –  du roi Artaxerxès, 1.1n. –  discutons  : litt. tenons conseil ensemble, c.-à-d. négocions.'
  - type: text
    content: 'tu as même désigné des prophètes pour proclamer à Jérusalem à ton sujet : « Il y a un roi en Juda ! » Maintenant des rumeurs de ce genre arriveront à la connaissance du roi. Viens donc, et discutons. '
  '8':
  - type: note
    content: 'c''est toi…  : litt. c''est de ton propre cœur que tu les inventes  ; cf. 2.5ss ; la même expression est traduite par choisir de sa propre initiative en 1R 12.33.'
  - type: text
    content: 'Je lui fis répondre : Ce genre de rumeurs dont tu parles n''existe pas, c''est toi qui les inventes ! '
  '9':
  - type: note
    content: 'Ils perdront courage…  : litt. leurs mains tomberont de l''ouvrage, et il ne se fera pas  ; cf. 2S 4.1 ; 17.2 ; Es 35.3 ; Jr 47.3 ; Esd 4.4 ; 2Ch 15.7. –  donne-moi du courage  : litt. fortifie mes mains  ; il peut s''agir d''une prière (cf. 3.36+), auquel cas l''invocation ô Dieu serait sous-entendue dans le texte ; d''autres y ont vu un appel (ironique ?) à Sanballat (tu ferais mieux de nous encourager) ; des versions anciennes ont compris  : alors (= Maintenant) je me fortifiai  ; cf. 2.18n.'
  - type: text
    content: 'Tous ces gens voulaient nous faire peur et se disaient : Ils perdront courage et l''ouvrage ne se fera pas. Maintenant, donne-moi du courage !'
