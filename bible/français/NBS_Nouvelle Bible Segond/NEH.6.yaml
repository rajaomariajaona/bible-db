document_id: NEH.6
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nouvelle intervention des adversaires
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sanballat… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tobiya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 17ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Guéshem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gashmou '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 6) : cf. 2.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Arabe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'autres ennemis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.1s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'plus de brèche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.3 ; 2.13.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Sanballat, Tobiya, Guéshem l''Arabe et nos autres ennemis apprirent que j''avais rebâti la muraille et qu''il n''y restait plus de brèche – en ce temps-là, je n''avais pas encore posé les battants des portes – '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Kephirim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'peut signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les villages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ainsi a compris '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '), mais il s''agit plutôt du nom d''une localité de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vallée d'Ono
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au nord-ouest de Jérusalem, sans doute une zone neutre entre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
        text: ' et Ashdod (4.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; cf. 7.37 ; Esd 2.33 ; 1Ch 8.12.
    marker-yv: yv-n
  - type: text
    text: 'Sanballat et Guéshem m''envoyèrent ce message : Viens, rencontrons-nous à Kephirim, dans la vallée d''Ono. Ils se préparaient à me faire du mal. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'beaucoup de travail '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.10ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pendant que je le quitterais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX a traduit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand je l'aurai achevé, je descendrai vers vous.
    marker-yv: yv-n
  - type: text
    text: 'Je leur envoyai des messagers avec cette réponse : J''ai beaucoup de travail à faire et je ne peux pas descendre ; pourquoi le travail serait-il interrompu pendant que je le quitterais pour descendre vers vous ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre fois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision est absente de LXX, de même '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une cinquième fois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 5.
    marker-yv: yv-n
  - type: text
    text: 'Ils envoyèrent quatre fois le même message, et je leur rendis la même réponse. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Sanballat m''envoya ce même message une cinquième fois par son serviteur, qui tenait à la main une lettre ouverte. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gashmou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; la mention de son nom est absente de deux importants mss de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous vous préparez à vous rebeller '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dit-on
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression hébraïque est traduite '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des rumeurs de ce genre ; ce genre de rumeurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans les v. suivants.
    marker-yv: yv-n
  - type: text
    text: 'Il y était écrit : Le bruit se répand parmi les nations, et Gashmou affirme que, toi et les Judéens, vous vous préparez à vous rebeller, et que c''est pour cela que tu rebâtis la muraille. Tu vas, dit-on, devenir leur roi ; '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 10.24 ; 2S 15.10 ; 1R 1.25,32ss ; 2R 9 ; Ag 2.20ss ; Za 4 ; 6.9ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du roi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Artaxerxès, 1.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: discutons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tenons conseil ensemble
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: négocions.
    marker-yv: yv-n
  - type: text
    text: 'tu as même désigné des prophètes pour proclamer à Jérusalem à ton sujet : « Il y a un roi en Juda ! » Maintenant des rumeurs de ce genre arriveront à la connaissance du roi. Viens donc, et discutons. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est toi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'c''est de ton propre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' que tu les inventes'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2.5ss ; la même expression est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'choisir de sa propre initiative '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1R 12.33.
    marker-yv: yv-n
  - type: text
    text: 'Je lui fis répondre : Ce genre de rumeurs dont tu parles n''existe pas, c''est toi qui les inventes ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils perdront courage…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leurs mains tomberont de l'ouvrage, et il ne se fera pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2S 4.1 ; 17.2 ; Es 35.3 ; Jr 47.3 ; Esd 4.4 ; 2Ch 15.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: donne-moi du courage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fortifie mes mains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il peut s''agir d''une prière (cf. 3.36+), auquel cas l''invocation '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ô Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: serait sous-entendue dans le texte ; d'autres y ont vu un appel (ironique ?) à Sanballat (tu ferais mieux de nous encourager) ; des versions anciennes ont compris
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'alors '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(= '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Maintenant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je me fortifiai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tous ces gens voulaient nous faire peur et se disaient : Ils perdront courage et l''ouvrage ne se fera pas. Maintenant, donne-moi du courage !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Delaya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1Ch 24.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mehétabéel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 36.39 ; 1Ch 1.50. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il s'était enfermé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : traduction incertaine ; autres possibilités '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il était enfermé, empêché, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; certains pensent à une impureté cérémonielle, d''autres à une mise en scène d''allure prophétique pour impressionner Néhémie ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en secret
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 1S 20.25s ; Jr 36.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Allons ensemble
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : l''oracle du prophète est présenté sous forme poétique en hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à la maison de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sur la fonction d''asile du temple, cf. Ex 21.13s ; 1R 1.50ss.'
    marker-yv: yv-n
  - type: text
    text: 'Je me rendis chez Shemaya, fils de Delaya, fils de Mehétabéel. Il s''était enfermé et il dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Allons ensemble à la maison de Dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: à l'intérieur du temple,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et fermons les portes du temple ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: car ils viennent pour te tuer,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et c'est pendant la nuit qu'ils viendront pour te tuer.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Qui est l''homme qui entrera dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: temple
      - type: text
        text: ' et restera en vie ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Néhémie n''étant ni '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: ' ni '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévite
      - type: text
        text: ', il ne pouvait probablement pas entrer dans le temple sans le profaner ; voir aussi 1.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lv 21.17ss ; Nb 18.7.'
    marker-yv: yv-n
  - type: text
    text: 'Je répondis : Un homme comme moi, prendre la fuite ! Et quel homme tel que moi pourrait entrer dans le temple et vivre ? Je n''entrerai pas. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dt 18.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: parole prophétique
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Esd 6.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'avaient soudoyé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu est au singulier (cf. Esd 4.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Je m''étais aperçu que ce n''était pas Dieu qui l''envoyait. Mais il avait prononcé sur moi cette parole prophétique parce que Tobiya et Sanballat l''avaient soudoyé. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 9+. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une mauvaise réputation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
