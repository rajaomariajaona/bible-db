document_id: 1JN.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ce que nous avons entendu, vu et touché
  - type: text
    content: ' '
  - type: note
    content: 'dès le commencement  : cf. 2.7,13s,24 ; 3.8,11 ; voir aussi Jn 1.1+ ; 6.64 ; 8.44 ; 15.27 ; 16.4 ; 2Jn 5s. –  nous  : cf. 4.6,14,16 ; Jn 1.14,16 ; 21.24 ; 3Jn 9,12 ; voir aussi Lc 1.1 ; Hé 1.2. –  vu / contemplé  : cf. 4.14 ; Jn 1.14n  ; 20.20 ; Ac 4.20. –  palpé  : cf. Jn 20.25,27-29 ; même verbe Lc 24.39. –  la parole v. 10 ; 2.5,7,14 ; 3.18 ; Jn 1.1n. –  de la vie v. 2 ; cf. Jn 6.68 ; Ph 2.16.'
  - type: text
    content: 'Ce qui était dès le commencement, ce que nous avons entendu, ce que nous avons vu de nos yeux, ce que nous avons contemplé et que nos mains ont palpé, – il s''agit de la parole de la vie '
  '10':
  - type: note
    content: nous n'avons pas péché ou nous n'avons jamais péché  ; cf. v. 8 ; Rm 3.9-20. –  nous faisons de lui un menteur 5.10.
  - type: text
    content: Si nous disons que nous n'avons pas péché, nous faisons de lui un menteur, et sa parole n'est pas en nous.
  '2':
  - type: note
    content: 'car  : litt. et. –  la vie Jn 1.4+ ; 11.25 ; 14.6. –  s''est manifestée  : litt. a été manifestée, de même dans la suite ; cf. 2.19,28 ; 3.2,5,8,10 ; 4.9 ; Jn 2.11+ ; Rm 3.21 ; 1Tm 3.16+. –  vu v. 1+. –  témoignage 4.14 ; Jn 15.27. –  nous vous annonçons…  : cf. Jn 17.20. –  vie éternelle 2.25 ; 5.11-13 ; Jn 3.15n  ; 17.3. –  auprès du Père  : même tournure qu''en Jn 1.1ns ; de même en 1Jn 2.1 ; 3.21 ; 5.14.'
  - type: text
    content: '(car la vie s''est manifestée, nous avons vu, nous rendons témoignage et nous vous annonçons la vie éternelle, qui était auprès du Père et qui s''est manifestée à nous) – '
  '3':
  - type: note
    content: 'vu et entendu Ac 4.20. –  vous soyez en communion  : litt. vous ayez communion, de même v. 6s ; le terme grec a aussi le sens concret de solidarité  ; cf. Jn 17.20s ; Ac 2.42n  ; 1Co 1.9 ; Ph 1.5n. –  le Père / son Fils 2.22ss ; 4.14 ; Mt 11.27/ / ; 16.27/ / ; 24.36/ / ; 28.19 ; Lc 1.32 ; Jn 1.14 ; 3.35+ ; Hé 1.5 ; 2P 1.17 ; 2Jn 3,9.'
  - type: text
    content: 'ce que nous avons vu et entendu, nous vous l''annonçons, à vous aussi, pour que vous aussi vous soyez en communion avec nous. Or notre communion est avec le Père et avec son Fils, Jésus-Christ. '
  '4':
  - type: note
    content: nous l'écrivons 5.13. –  que notre (ou votre, selon certains mss) joie soit complète Jn 15.11+ ; 2Jn 12 ; cf. 2Co 1.24.
  - type: text
    content: Cela, nous, nous l'écrivons, pour que notre joie soit complète.
  - type: heading
    content: Marcher en pleine lumière
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'message 3.11 ; cf. 2.25 ; 5.11. –  annonçons  : le verbe est apparenté au mot traduit par message (forme voisine aux v. 2s) ; cf. Jn 4.25 ; 16.13-15 ; LXX l''emploie p. ex. en Es 40.21 ; 42.9 ; Dn 2.2,4,7 ( faire connaître ). –  lumière v. 6s ; Jn 1.4+ ; 8.12+ ; cf. 1Tm 6.16 ; Jc 1.17.'
  - type: text
    content: Le message que nous avons entendu de lui et que nous vous annonçons, c'est que Dieu est lumière, et qu'il n'y a pas en lui de ténèbres.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Si nous disons  : cf. v. 8,10 ; 2.4,6 etc. ; Jc 2.14+. –  nous sommes en communion v. 3n. –  marchions dans les ténèbres  : cf. 2.6n,9,11 ; Jn 8.12+. –  nous mentons 2.4,9 ; 4.20. –  nous ne faisons pas , c.-à-d. nous ne mettons pas en pratique, nous n''agissons pas en accord avec  ; cette utilisation du verbe faire , inhabituelle en grec comme en français, est sans doute un sémitisme ; elle est particulièrement caractéristique de 1Jn, dans un sens positif (2.17,29 ; 3.4,7,10,22) ou négatif (3.4,8s) ; voir aussi v. 10 ; 5.2n,10 ; Jn 3.21 ; Ap 21.27 ; 22.15. –  la vérité v. 8 ; 2.4,21 ; 3.18s ; 4.6 ; 5.6.'
  - type: text
    content: 'Si nous disons que nous sommes en communion avec lui, et que nous marchions dans les ténèbres, nous mentons et nous ne faisons pas la vérité. '
  '7':
  - type: note
    content: 'si nous marchons…  : cf. Es 2.5 ; Ep 5.8. –  le sang…  : cf. 2.2n  ; Hé 9.14 ; Ap 1.5 ; 7.14. –  Fils 1.3.'
  - type: text
    content: Mais si nous marchons dans la lumière, comme lui-même est dans la lumière, nous sommes en communion les uns avec les autres, et le sang de Jésus, son Fils, nous purifie de tout péché.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'pas de péché  : comparer avec 3.6,8s ; 5.18 ; cf. 1R 8.46 ; Jb 9.2 ; Pr 20.9 ; Ec 7.20 ; Rm 3.10-20. –  la vérité… v. 6+ ; 2.4.'
  - type: text
    content: 'Si nous disons que nous n''avons pas de péché, nous nous égarons nous-mêmes, et la vérité n''est pas en nous. '
  '9':
  - type: note
    content: 'Si nous reconnaissons ou si nous confessons  : le terme grec évoque habituellement un acte de reconnaissance public ; on le retrouve en 2.23 ; 4.2s,15 ; Jn 1.20n  ; 2Jn 7 ; un verbe apparenté est traduit par reconnaître publiquement en Mc 1.5n/ / ; Jc 5.16n  ; cf. Ps 32.1-5 ; Pr 28.13 ; 2Ch 7.14 ; Rm 4.6-8. –  il est juste…  : autre traduction il est assez juste… pour nous pardonner  ; cf. 2.1,29 ; 3.7 ; Dt 32.4. –  digne de confiance ou fidèle 1Co 1.9n  ; cf. Jn 20.27n  ; 3Jn 5 ; Ap 1.5+. –  pardonnera 2.12. –  injustice  : cf. Rm 1.18 ; 2.8 ; 1Co 13.6 ; 2Th 2.10-12 ; 2Tm 2.18s.'
  - type: text
    content: 'Si nous reconnaissons nos péchés, il est juste et digne de confiance : il nous pardonnera nos péchés et nous purifiera de toute injustice. '
