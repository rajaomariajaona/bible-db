document_id: 1CH.13,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David décide d'amener le Coffre à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 6.1-11
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tint conseil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Pr 15.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chefs de mille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 18.1+.'
      marker-yv: yv-n
    - type: text
      text: 'David tint conseil avec les chefs de mille et de cent, avec tous les dirigeants ; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' se mit en colère contre Ouzza et l''abattit parce qu''il avait étendu la main sur le Coffre. Ouzza mourut là, devant Dieu. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait ouvert une brèche en Ouzza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avait éclaté contre Ouzza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 6.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David se fâcha parce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ouvert une brèche en Ouzza ; c''est pourquoi on appelle ce lieu Pérets-Ouzza (« Brèche d''Ouzza »), jusqu''à ce jour. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'saisi par la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2S 6.9 ; Jon 1.16 ; Ag 1.12 ; Ps 40.4 ; 52.8 ; 64.10.
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là David fut saisi par la crainte de Dieu ; il dit : Comment pourrais-je faire entrer chez moi le coffre de Dieu ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David ne prit pas le Coffre chez lui dans la Ville de David, et il le fit conduire dans la maison d''Obed-Edom, le Gatite. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénit
        - type: text
          text: … tout ce qui lui appartenait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 30.27 ; 39.5.'
      marker-yv: yv-n
    - type: text
      text: 'Le coffre de Dieu resta trois mois chez Obed-Edom, dans sa maison, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' bénit la maison d''Obed-Edom et tout ce qui lui appartenait.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: envoyons des messages de tous côtés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éclatons et envoyons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le verbe correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éclater
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout le pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les pays.
      marker-yv: yv-n
    - type: text
      text: 'puis David dit à toute l''assemblée d''Israël : Si cela vous paraît bon et si cela vient du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, envoyons des messages de tous côtés à nos frères qui restent dans tout le pays d''Israël, ainsi qu''aux prêtres et aux lévites aux abords de leurs villes, afin qu''ils se rassemblent auprès de nous. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous ne l'avons pas cherché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''hébreu est ambigu : il s''agit soit du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', soit de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe peut évoquer une démarche cultuelle, ou plus précisément la consultation d''un oracle.'
      marker-yv: yv-n
    - type: text
      text: 'Nous ramènerons chez nous le coffre de notre Dieu, car nous ne l''avons pas cherché aux jours de Saül. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Toute l''assemblée se prononça pour qu''on agisse ainsi : la chose paraissait convenable à tout le peuple. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rassembla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe est apparenté au terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'assemblée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 2,4 ; cf. 15.3 ; 28.1,8 ; 29.1,10,20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Shihor d'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Jos 13.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Nb 34.5. Il s''agit probablement d''un cours d''eau ou d''un lac qui faisait la frontière entre l''Egypte et Israël ; en tout cas il marque ici la limite sud du pays, opposée à la limite nord indiquée par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''entrée de Hamath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lebo-Hamath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; cf. Jg 3.3+ ; 1R 8.65. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qiriath-Yéarim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 6.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 2S 6.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David rassembla tout Israël, depuis le Shihor d''Egypte jusqu''à l''entrée de Hamath, pour faire venir de Qiriath-Yéarim le coffre de Dieu. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David, avec tout Israël, monta à Baala, à Qiriath-Yéarim, qui appartient à Juda, pour en faire monter le coffre de Dieu, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) qui est assis sur les keroubim, et dont le nom est invoqué là. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils chargèrent le coffre de Dieu sur un chariot neuf, depuis la maison d''Abinadab ; Ouzza et Ahio conduisaient le chariot. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trompettes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n'apparaissent pas dans le texte de 2S 6.5 ; elles sont fréquemment mentionnées par les Chroniques, cf. 15.24,28 ; 16.6,42.
      marker-yv: yv-n
    - type: text
      text: 'David et tout Israël jouaient de toute leur force devant Dieu sur des lyres, des luths, des tambourins, des cymbales et des trompettes, avec des chants. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2S 6.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''ils arrivèrent à l''aire de Kidôn, Ouzza étendit la main pour saisir le Coffre, parce que les bœufs avaient glissé. '
