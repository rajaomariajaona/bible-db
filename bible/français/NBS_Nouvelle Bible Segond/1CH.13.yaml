document_id: 1CH.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David décide d'amener le Coffre à Jérusalem
  - type: heading
    content: 2S 6.1-11
  - type: text
    content: ' '
  - type: note
    content: 'tint conseil  : cf. Pr 15.22. –  chefs de mille  : cf. 2S 18.1+.'
  - type: text
    content: 'David tint conseil avec les chefs de mille et de cent, avec tous les dirigeants ; '
  '10':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Ouzza et l''abattit parce qu''il avait étendu la main sur le Coffre. Ouzza mourut là, devant Dieu. '
  '11':
  - type: note
    content: 'avait ouvert une brèche en Ouzza  : autre traduction avait éclaté contre Ouzza  ; cf. v. 2n  ; 15.13n  ; 2S 6.8n.'
  - type: text
    content: 'David se fâcha parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ouvert une brèche en Ouzza ; c''est pourquoi on appelle ce lieu Pérets-Ouzza (« Brèche d''Ouzza »), jusqu''à ce jour. '
  '12':
  - type: note
    content: saisi par la crainte… 2S 6.9 ; Jon 1.16 ; Ag 1.12 ; Ps 40.4 ; 52.8 ; 64.10.
  - type: text
    content: 'En ce jour-là David fut saisi par la crainte de Dieu ; il dit : Comment pourrais-je faire entrer chez moi le coffre de Dieu ? '
  '13':
  - type: text
    content: 'David ne prit pas le Coffre chez lui dans la Ville de David, et il le fit conduire dans la maison d''Obed-Edom, le Gatite. '
  '14':
  - type: note
    content: 'bénit… tout ce qui lui appartenait  : cf. Gn 30.27 ; 39.5.'
  - type: text
    content: 'Le coffre de Dieu resta trois mois chez Obed-Edom, dans sa maison, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' bénit la maison d''Obed-Edom et tout ce qui lui appartenait.'
  '2':
  - type: note
    content: 'envoyons des messages de tous côtés  : litt. éclatons et envoyons  ; sur le verbe correspondant à éclater, cf. v. 11n. –  tout le pays  : litt. tous les pays.'
  - type: text
    content: 'puis David dit à toute l''assemblée d''Israël : Si cela vous paraît bon et si cela vient du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, envoyons des messages de tous côtés à nos frères qui restent dans tout le pays d''Israël, ainsi qu''aux prêtres et aux lévites aux abords de leurs villes, afin qu''ils se rassemblent auprès de nous. '
  '3':
  - type: note
    content: 'le coffre  : cf. 1S 3.3n. –  nous ne l''avons pas cherché  : l''hébreu est ambigu : il s''agit soit du coffre, soit de Dieu  ; le verbe peut évoquer une démarche cultuelle, ou plus précisément la consultation d''un oracle.'
  - type: text
    content: 'Nous ramènerons chez nous le coffre de notre Dieu, car nous ne l''avons pas cherché aux jours de Saül. '
  '4':
  - type: text
    content: 'Toute l''assemblée se prononça pour qu''on agisse ainsi : la chose paraissait convenable à tout le peuple. '
  '5':
  - type: note
    content: 'rassembla  : le verbe est apparenté au terme traduit par assemblée aux v. 2,4 ; cf. 15.3 ; 28.1,8 ; 29.1,10,20. –  le Shihor d''Egypte  : voir Jos 13.3n  ; cf. Nb 34.5. Il s''agit probablement d''un cours d''eau ou d''un lac qui faisait la frontière entre l''Egypte et Israël ; en tout cas il marque ici la limite sud du pays, opposée à la limite nord indiquée par l''entrée de Hamath (ou Lebo-Hamath) ; cf. Jg 3.3+ ; 1R 8.65. –  Qiriath-Yéarim  : cf. 1S 6.21n  ; voir aussi 2S 6.2n.'
  - type: text
    content: 'David rassembla tout Israël, depuis le Shihor d''Egypte jusqu''à l''entrée de Hamath, pour faire venir de Qiriath-Yéarim le coffre de Dieu. '
  '6':
  - type: text
    content: 'David, avec tout Israël, monta à Baala, à Qiriath-Yéarim, qui appartient à Juda, pour en faire monter le coffre de Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est assis sur les keroubim, et dont le nom est invoqué là. '
  '7':
  - type: text
    content: 'Ils chargèrent le coffre de Dieu sur un chariot neuf, depuis la maison d''Abinadab ; Ouzza et Ahio conduisaient le chariot. '
  '8':
  - type: note
    content: Les trompettes n'apparaissent pas dans le texte de 2S 6.5 ; elles sont fréquemment mentionnées par les Chroniques, cf. 15.24,28 ; 16.6,42.
  - type: text
    content: 'David et tout Israël jouaient de toute leur force devant Dieu sur des lyres, des luths, des tambourins, des cymbales et des trompettes, avec des chants. '
  '9':
  - type: note
    content: Voir 2S 6.6n.
  - type: text
    content: 'Lorsqu''ils arrivèrent à l''aire de Kidôn, Ouzza étendit la main pour saisir le Coffre, parce que les bœufs avaient glissé. '
