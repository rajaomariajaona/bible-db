document_id: 2CO.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: '1Co 1.1n. – Voir apôtre . –  Timothée v. 19 ; 1Co 4.17+. –  Eglise de Dieu 1Co 1.1+. –  les saints Rm 1.7+. –  Achaïe  : nom de la province romaine de Grèce méridionale dont Corinthe était le chef-lieu ; cf. 9.2 ; 11.10 ; Rm 16.1n.'
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, à l''Eglise de Dieu qui est à Corinthe, et à tous les saints qui sont dans l''ensemble de l''Achaïe : '
  '10':
  - type: note
    content: 'Cf. 2Tm 4.18 ; voir aussi Ph 2.27. –  et nous délivrera  : certains mss portent et nous délivre. –  d''une telle mort  : certains mss portent le pluriel (de telles morts, de tels dangers de mort ? cf. 11.23n  ; voir aussi 6.4ss). –  et nous espérons  : sous-entendu dans le texte ; certains mss portent seulement et il nous délivrera encore.'
  - type: text
    content: 'C''est lui qui nous a délivrés et nous délivrera d''une telle mort. Oui, nous avons mis en lui notre espérance, et nous espérons qu''il nous délivrera encore. '
  '11':
  - type: note
    content: 'Rm 15.30+ ; Ph 1.19. –  ainsi beaucoup…  : litt. afin que le don de la grâce (Rm 1.11n  ; 1Co 1.7n) (obtenu) pour nous grâce à beaucoup de faces (ou de personnes) (soit) par beaucoup objet d''action de grâces pour nous. Voir aussi 2Co 4.15 ; 9.11s.'
  - type: text
    content: Vous y contribuerez vous-mêmes en priant pour nous ; ainsi beaucoup auront obtenu ce don de la grâce en notre faveur, et beaucoup en rendront grâce pour nous.
  - type: heading
    content: Pourquoi Paul a ajourné sa visite
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'notre fierté  : un terme apparenté est traduit par motif de fierté au v. 14+ ; Rm 2.17+. –  conscience Ac 23.1+. –  une simplicité…  : autre traduction la simplicité et la sincérité de Dieu  ; au lieu de simplicité (le terme peut aussi avoir le sens de générosité , cf. 8.2n), certains mss portent sainteté (ou consécration ). –  sincérité ou pureté, transparence , de même en 2.17 ; cf. 4.2 ; 1Co 5.8n. –  la sagesse de la chair  : litt. une sagesse charnelle , c.-à-d. humaine ; cf. v. 17 ; 10.4 ; Rm 15.27n  ; voir 1Co 1.17+.'
  - type: text
    content: 'Car notre fierté, c''est le témoignage de notre conscience : nous nous sommes conduits dans le monde, et surtout à votre égard, avec une simplicité et une sincérité qui viennent de Dieu ; non pas avec la sagesse de la chair, mais avec la grâce de Dieu. '
  '13':
  - type: note
    content: 'pas autre chose  : cf. 11.4 ; Ga 1.6-9 ; 2.2-5. –  ce que vous lisez et comprenez (ou connaissez) : les deux verbes grecs sont apparentés à celui qui est habituellement traduit par connaître (cf. 3.2). –  pleinement  : autre traduction jusqu''à la fin.'
  - type: text
    content: 'Nous ne vous écrivons pas autre chose que ce que vous lisez et comprenez. J''espère que vous comprendrez pleinement, '
  '14':
  - type: note
    content: 'motif de fierté  : cf. v. 12n  ; voir aussi 5.12 ; 7.4,14 ; 8.24 ; 9.2s ; 10.8,13ss ; 11.10,16ss,30 ; 12.1,5s,9 ; Ph 2.16 ; 1Th 2.19s ; 2Th 1.4. –  au jour… 1Co 1.8+. –  de notre Seigneur  : certains mss portent seulement du Seigneur.'
  - type: text
    content: comme vous l'avez déjà compris en partie, que nous sommes votre motif de fierté, et vous le nôtre, au jour de notre Seigneur Jésus.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'confiance 3.4 ; 8.22 ; 10.2 ; Ep 3.12 ; Ph 3.4. –  venir vous voir  : cf. 12.14 ; 13.1 ; 1Co 4.18s. –  une seconde grâce  : certains mss portent une seconde joie  ; l''expression peut signifier simplement une grâce (ou une joie ) supplémentaire.'
  - type: text
    content: 'C''est avec cette confiance que j''avais d''abord décidé de venir vous voir, pour que vous ayez une seconde grâce, '
  '16':
  - type: note
    content: 'pensant ensuite  : sous-entendu dans le texte. – La Macédoine correspond grosso modo au nord de la Grèce actuelle ; sur les projets de Paul, cf. v. 23 ; 2.1,13+ ; 12.14 ; 13.1 ; 1Co 16.5s. –  recevoir…  : cf. Rm 15.24n.'
  - type: text
    content: 'pensant ensuite passer de chez vous en Macédoine, puis revenir de Macédoine chez vous et recevoir de vous ce dont j''aurais eu besoin pour me rendre en Judée. '
  '17':
  - type: note
    content: 'selon la chair  : cf. v. 12n  ; 5.16 ; 10.2s. –  qu''il y aurait…  : litt. qu''il y ait chez moi le oui oui et le non non  ; cf. v. 19s ; Mt 5.37 ; Jc 5.12.'
  - type: text
    content: 'En décidant cela, ai-je donc fait preuve de légèreté ? Est-ce que je prends mes décisions selon la chair, de sorte qu''il y aurait toujours en moi le « oui » et le « non » ? '
  '18':
  - type: note
    content: 'Dieu est digne de confiance ou fidèle 1Co 1.9+ ; on pourrait comprendre  : aussi vrai que Dieu est digne de confiance, ou encore Dieu en est garant.'
  - type: text
    content: 'Dieu est digne de confiance : la parole que nous vous avons adressée n''a pas été « oui » et « non ». '
  '19':
  - type: note
    content: 'Voir Fils. –  Jésus-Christ, que nous avons proclamé 4.5 ; 11.4 ; Mc 1.4n  ; cf. Ac 19.13. –  Silvain  : c''est de toute évidence la forme gréco-latine du nom sémitique Silas (Ac 15.22-40 ; 16.19-29 ; cf. 18.5 ; 1Th 1.1 ; 2Th 1.1 ; 1P 5.12). –  Timothée v. 1. –  « oui » et « non » v. 17+,20. –  en lui il n''y a que « oui »  : autre traduction en lui le « oui » a été dit (une fois pour toutes).'
  - type: text
    content: 'Car le Fils de Dieu, Jésus-Christ, que nous avons proclamé parmi vous, moi, Silvain et Timothée, n''a pas été « oui » et « non » : en lui il n''y a que « oui ». '
  '2':
  - type: note
    content: 'Grâce et paix… Rm 1.7+. –  Seigneur Jésus-Christ  : cf. 4.5 ; Ac 2.36 ; 1Co 12.3 ; Ph 2.11.'
  - type: text
    content: Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !
  - type: heading
    content: Encouragés pour pouvoir encourager
  '20':
  - type: note
    content: 'Cf. Rm 5.8. –  l''amen  : transcription en grec d''un mot hébreu (ou araméen) apparenté à des termes habituellement rendus par fidélité, loyauté ou vérité  ; il signifie la pleine certitude, l''accord ou la confiance en une parole donnée ; fréquemment employé par Jésus, dans les évangiles (Mt 5.18n  ; Jn 1.51n), et par la communauté chrétienne (Rm 16.27 ; 1Co 14.16 ; Ap 5.14), il désigne le Christ lui-même en Ap 3.14. – Voir gloire.'
  - type: text
    content: Si nombreuses que soient les promesses de Dieu, c'est en lui qu'elles sont « oui ». Voilà pourquoi c'est aussi par lui que nous disons à Dieu l’
  - type: text
    content: amen,
  - type: text
    content: ' pour sa gloire. '
  '21':
  - type: note
    content: 'affermit  : autre traduction confirme  ; cf. 1Co 1.8n. –  qui nous a conféré l''onction ou qui nous a oints  ; c''est du verbe grec correspondant que vient le terme Christ qui, comme le mot hébreu ayant donné Messie, signifie oint  ; dans l''A.T. grec (LXX) il évoque principalement la consécration (par onction d''huile sacrée) des rois (cf. 1Co 4.8 ?) et des prêtres ; cf. Lc 4.18 ; Ac 4.27 ; 10.38 ; Hé 1.9 ; 1Jn 2.20n,27.'
  - type: text
    content: 'Or celui qui nous affermit avec vous dans le Christ et qui nous a conféré l''onction, c''est Dieu. '
  '22':
  - type: note
    content: 'son sceau Ep 1.13+ ; cf. Rm 4.11. –  déposé  : litt. donné, cf. 5.5. – Voir cœur. –  arrhes de l''Esprit 5.5 ; Ep 1.14 ; cf. Rm 8.23.'
  - type: text
    content: Il nous a aussi marqués de son sceau, et il a déposé dans notre cœur les arrhes de l'Esprit.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'j''en prends  : litt. j''invoque  ; cf. Rm 1.9+. –  ma vie  : autre traduction mon âme (cf. Mt 10.28n). –  ménager 13.2. –  plus venu à Corinthe v. 16+.'
  - type: text
    content: 'Moi, j''en prends Dieu à témoin, sur ma vie : c''est pour vous ménager que je ne suis plus venu à Corinthe ; '
  '24':
  - type: note
    content: 'exercer une maîtrise ou dominer en seigneurs  ; cf. Rm 6.9n  ; 1P 5.2s. –  collaborateurs  : cf. 6.1 ; 1Co 3.9n. –  pour votre joie  : cf. 1Jn 1.3-4+. –  c''est par la foi que vous tenez  : formule analogue en Rm 11.20n.'
  - type: text
    content: 'non pas que nous voulions exercer une maîtrise sur votre foi : nous sommes plutôt des collaborateurs pour votre joie, puisque c''est par la foi que vous tenez.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Béni soit… Ep 1.3,17 ; 1P 1.3 ; cf. Jn 20.17. –  de toute magnanimité  : litt. des magnanimités  ; cf. Rm 12.1n. –  encouragement  : autres traductions consolation, réconfort  ; mêmes possibilités dans la suite ; dans d''autres contextes, cette famille de termes peut aussi évoquer l''exhortation ; cf. 7.4 ; 13.11n  ; Ac 2.40n  ; 11.23+ ; Rm 12.1,8n  ; 15.5n.'
  - type: text
    content: 'Béni soit le Dieu et Père de notre Seigneur Jésus-Christ, le Père de toute magnanimité et le Dieu de tout encouragement, '
  '4':
  - type: note
    content: 'encourage ou console, réconforte, cf. v. 3n  ; 7.6+. –  détresses  : le mot grec (de même v. 8 ; 8.2,13) a été traditionnellement rendu par tribulation(s)  ; il est apparenté au verbe traduit par presser en 4.8 ; 7.5 et par être dans la détresse en 1.6 ; cf. Mt 24.9n  ; Rm 5.3+ ; 1Th 3.3n  ; 2Th 1.7. –  nous puissions encourager  : sur l''idée d''échange, présente ici et dans la suite, cf. 4.12 ; 5.21 ; 8.9 ; 11.29 ; 12.9 ; 13.4.'
  - type: text
    content: 'lui qui nous encourage dans toutes nos détresses, afin que, par l''encouragement que nous recevons nous-mêmes de Dieu, nous puissions encourager ceux qui sont dans toutes sortes de détresses ! '
  '5':
  - type: note
    content: Cf. 4.10+ ; Ph 1.20 ; Col 1.24.
  - type: text
    content: 'De même, en effet, que les souffrances du Christ abondent pour nous, de même aussi notre encouragement abonde par le Christ. '
  '6':
  - type: note
    content: 'Cf. 4.15. –  pour que vous ayez…  : litt. qui est à l''œuvre (même verbe en 4.12) dans l''endurance (ou la persévérance, 6.4 ; 12.12 ; Rm 2.7n  ; 5.3s) des mêmes souffrances que nous aussi nous souffrons.'
  - type: text
    content: 'Si nous sommes dans la détresse, c''est pour votre encouragement et pour votre salut ; si nous sommes encouragés, c''est pour votre encouragement, pour que vous ayez la force d''endurer les mêmes souffrances que nous. '
  '7':
  - type: note
    content: 'Cf. Rm 8.17 ; Ph 1.29 ; 2Tm 2.11s. –  ferme  : cf. Rm 4.16n  ; 1Co 1.6n. –  vous avez part  : le verbe est apparenté au mot habituellement rendu par communion (ou solidarité) ; cf. 6.14 ; 8.4n  ; 13.13.'
  - type: text
    content: 'Et notre espérance à votre égard est ferme, car nous le savons : comme vous avez part aux souffrances, vous avez part aussi à l''encouragement.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'nous ne voulons pas… Rm 1.13+. –  détresse v. 4n. –  en Asie  : c.-à-d. dans la région d''Ephèse (Ac 16.6n  ; Rm 16.5n) ; on ne sait pas à quelle épreuve précise l''apôtre fait ici allusion ; cf. Ac 19.23-40 ; 21.27 ; 24.19 ; 1Co 15.32 ; Ph 1.12-30. –  nous désespérions même  : autre traduction nous étions très incertains  ; le même verbe, en 4.8, renchérit sur celui qui est traduit par être désemparé.'
  - type: text
    content: 'En effet, frères, nous ne voulons pas que vous ignoriez la détresse que nous avons connue en Asie : nous avons été accablés à l''extrême, au-delà de nos forces ; nous désespérions même de rester en vie. '
  '9':
  - type: note
    content: 'Cf. 11.23. –  le Dieu qui réveille ou qui relève les morts  : cf. Rm 4.17+,24n  ; voir résurrection.'
  - type: text
    content: 'En nous-mêmes, nous avions accepté notre arrêt de mort ; c''était pour que nous ne mettions pas notre confiance en nous-mêmes, mais dans le Dieu qui réveille les morts. '
