      - type: text
        text: Seigneur Jésus-Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.5 ; Ac 2.36 ; 1Co 12.3 ; Ph 2.11.'
    marker-yv: yv-n
  - type: text
    text: Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ !
