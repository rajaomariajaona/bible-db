      children:
      - type: text
        text: 'nous ne voulons pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 1.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'détresse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en Asie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c.-à-d. dans la région d''Ephèse (Ac 16.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 16.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; on ne sait pas à quelle épreuve précise l''apôtre fait ici allusion ; cf. Ac 19.23-40 ; 21.27 ; 24.19 ; 1Co 15.32 ; Ph 1.12-30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous désespérions même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous étions très incertains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le même verbe, en 4.8, renchérit sur celui qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être désemparé.
    marker-yv: yv-n
  - type: text
    text: 'En effet, frères, nous ne voulons pas que vous ignoriez la détresse que nous avons connue en Asie : nous avons été accablés à l''extrême, au-delà de nos forces ; nous désespérions même de rester en vie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 11.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Dieu qui réveille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui relève '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les morts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Rm 4.17+,24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: résurrection
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En nous-mêmes, nous avions accepté notre arrêt de mort ; c''était pour que nous ne mettions pas notre confiance en nous-mêmes, mais dans le Dieu qui réveille les morts. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2Tm 4.18 ; voir aussi Ph 2.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et nous délivrera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et nous délivre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'une telle mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent le pluriel ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de telles morts, de tels dangers de mort ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 11.23
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 6.4ss). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et nous espérons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte ; certains mss portent seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et il nous délivrera encore.
    marker-yv: yv-n
  - type: text
    text: 'C''est lui qui nous a délivrés et nous délivrera d''une telle mort. Oui, nous avons mis en lui notre espérance, et nous espérons qu''il nous délivrera encore. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 15.30+ ; Ph 1.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ainsi beaucoup…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'afin que le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'don de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Rm 1.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Co 1.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '(obtenu) pour nous grâce à beaucoup de faces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de personnes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (soit) par beaucoup objet d'action de grâces pour nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Voir aussi 2Co 4.15 ; 9.11s.
    marker-yv: yv-n
  - type: text
    text: Vous y contribuerez vous-mêmes en priant pour nous ; ainsi beaucoup auront obtenu ce don de la grâce en notre faveur, et beaucoup en rendront grâce pour nous.
