  - type: text
    text: 'Car notre fierté, c''est le témoignage de notre conscience : nous nous sommes conduits dans le monde, et surtout à votre égard, avec une simplicité et une sincérité qui viennent de Dieu ; non pas avec la sagesse de la chair, mais avec la grâce de Dieu. '
