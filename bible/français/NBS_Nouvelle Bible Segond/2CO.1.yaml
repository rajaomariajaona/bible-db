        - type: text
          text: n
      - type: text
        text: '  ; 2Th 1.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous puissions encourager
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur l''idée d''échange, présente ici et dans la suite, cf. 4.12 ; 5.21 ; 8.9 ; 11.29 ; 12.9 ; 13.4.'
    marker-yv: yv-n
  - type: text
    text: 'lui qui nous encourage dans toutes nos détresses, afin que, par l''encouragement que nous recevons nous-mêmes de Dieu, nous puissions encourager ceux qui sont dans toutes sortes de détresses ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 4.10+ ; Ph 1.20 ; Col 1.24.
    marker-yv: yv-n
  - type: text
    text: 'De même, en effet, que les souffrances du Christ abondent pour nous, de même aussi notre encouragement abonde par le Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 4.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour que vous ayez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui est à l''œuvre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même verbe en 4.12) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans l''endurance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la persévérance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 6.4 ; 12.12 ; Rm 2.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 5.3s) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des mêmes souffrances que nous aussi nous souffrons.
    marker-yv: yv-n
  - type: text
    text: 'Si nous sommes dans la détresse, c''est pour votre encouragement et pour votre salut ; si nous sommes encouragés, c''est pour votre encouragement, pour que vous ayez la force d''endurer les mêmes souffrances que nous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Rm 8.17 ; Ph 1.29 ; 2Tm 2.11s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ferme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Rm 4.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Co 1.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous avez part
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe est apparenté au mot habituellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'communion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: solidarité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. 6.14 ; 8.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 13.13.'
    marker-yv: yv-n
  - type: text
    text: 'Et notre espérance à votre égard est ferme, car nous le savons : comme vous avez part aux souffrances, vous avez part aussi à l''encouragement.'
