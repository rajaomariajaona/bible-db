  - type: text
    text: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, à l''Eglise de Dieu qui est à Corinthe, et à tous les saints qui sont dans l''ensemble de l''Achaïe : '
