    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'encourage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: console, réconforte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: détresses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot grec (de même v. 8 ; 8.2,13) a été traditionnellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tribulation(s)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il est apparenté au verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'presser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 4.8 ; 7.5 et par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'être dans la détresse '
    - type: usfm
      marker: ft
      children:
      - type: text
