document_id: 2CH.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 17. –  pour porter les fardeaux  : litt. de fardeau , cf. 1R 5.29 ; 11.28n. –  surveiller 1Ch 15.21n.'
  - type: text
    content: Salomon compta soixante-dix mille hommes pour porter les fardeaux, quatre-vingt mille tailleurs de pierre dans la montagne, et trois mille six cents pour les surveiller.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Houram 1R 5.15n. –  un écrit  : même terme en 35.4n  ; 1Ch 28.19. –  C''est parce que le Seigneur (YHWH) aime son peuple  : cf. 9.8 ; Dt 7.8 ; 1R 10.9+.'
  - type: text
    content: 'Houram, roi de Tyr, répondit par un écrit qu''il envoya à Salomon : C''est parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) aime son peuple qu''il t''a fait roi sur eux ! '
  '11':
  - type: note
    content: 'Béni soit…  : cf. 1R 5.21n. –  qui a fait le ciel et la terre  : cf. Gn 1.1n  ; Ex 20.11 ; 2R 19.15 ; Ps 115.15+. –  sage  : même terme hébreu aux v. 6n,12s. –  au bon sens…  : litt. connaissant le (bon) sens et l''intelligence  ; cf. Es 29.24 ; Jb 38.4 ; Pr 1.2 ; 4.1 ; 17.27. –  une maison pour le Seigneur (1R 6.1 ; 1Ch 22.6) / une maison royale 1.18n.'
  - type: text
    content: 'Houram dit encore : Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël, qui a fait le ciel et la terre, de ce qu''il a donné au roi David un fils sage, au bon sens et à l''intelligence éprouvés, qui va bâtir une maison pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et une maison royale pour lui-même ! '
  '12':
  - type: note
    content: habile v. 6n. –  Houram-Abi (Houram est mon père) est appelé Houram-Abiv en 4.16 et Hiram en 1R 7.13n  ; voir aussi 1R 5.15n.
  - type: text
    content: 'Je t''envoie maintenant un homme habile, à l''intelligence éprouvée, Houram-Abi, '
  '13':
  - type: note
    content: 'fils d''une femme…  : cf. 1R 7.14. –  byssos 1Ch 4.21n. –  Il connaît tout l''art…  : litt. (il sait) graver toute gravure. –  concevoir…  : cf. Ex 31.4 ; 35.32,35. –  à faire  : sous-entendu en hébreu. –  hommes habiles v. 6n.'
  - type: text
    content: 'fils d''une femme d''entre les filles de Dan et d''un père Tyrien. Il sait travailler l''or et l''argent, le bronze et le fer, la pierre et le bois, la pourpre rouge et violette, le byssos et le carmin. Il connaît tout l''art de la gravure et il saura concevoir tous les ouvrages qu''on lui donnera à faire avec tes hommes habiles et avec les hommes habiles de David, ton père. '
  '14':
  - type: text
    content: 'Maintenant, mon seigneur, daigne nous envoyer le froment, l''orge, l''huile et le vin dont tu as parlé. '
  '15':
  - type: note
    content: 'Jaffa (hébreu Yapho) : principal port israélite sur la Méditerranée ; cf. Ac 9.36 (Joppé).'
  - type: text
    content: Nous, nous couperons du bois du Liban autant que tu en auras besoin ; nous te les expédierons par mer, par flottage, jusqu'à Jaffa ; toi, tu les feras monter à Jérusalem.
  - type: heading
    content: 1R 5.27-32
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'tous les immigrés  : litt. tous les hommes immigrés  ; cette précision est propre aux Chroniques ; cf. 1Ch 22.2.'
  - type: text
    content: 'Salomon compta tous les immigrés qui étaient en Israël, dont le compte avait déjà été fait par David, son père. On en trouva cent cinquante-trois mille six cents. '
  '17':
  - type: note
    content: 'prit  : litt. fit. –  pour porter les fardeaux v. 1n.'
  - type: text
    content: Il en prit soixante-dix mille pour porter les fardeaux, quatre-vint mille comme tailleurs de pierre dans la montagne, et trois mille six cents pour surveiller et faire travailler le peuple.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Houram 1R 5.15n. –  Fais pour moi  : sous-entendu dans le texte. –  à qui tu as envoyé…  : cf. 1Ch 14.1 ; voir aussi 2S 5.11. –  une maison  : litt. une maison pour y habiter.'
  - type: text
    content: 'Salomon fit dire à Houram, roi de Tyr : Fais pour moi comme tu as fait pour David, mon père, à qui tu as envoyé des cèdres pour qu''il se bâtisse une maison. '
  '3':
  - type: note
    content: 'une maison pour le nom du Seigneur 1.18+. –  afin de lui consacrer des offrandes  : litt. pour lui consacrer  ; certains comprennent pour la lui consacrer (la maison, c.-à-d. le temple) ; voir saint. –  l''encens aromatique  : cf. 13.11 ; Ex 25.6 ; 30.7 ; 31.11 ; 35.8,15,28 ; 37.29 ; 39.38 ; 40.27 ; Lv 4.7 ; 16.12 ; Nb 4.16. –  d''exposer constamment des pains  : litt. et l''exposition constante  ; le terme correspondant ici à exposition est traduit par pains exposés en 29.18 ; cf. Lv 24.6ns ; 1R 7.48 ; Né 10.33 ; 1Ch 9.32 ; 28.16 ; 2Ch 13.11. –  d''offrir (sous-entendu dans le texte) des holocaustes Lv 1.3nss ; Nb 28.1-8 ; voir aussi Ex 29.18. – Voir sabbat. –  nouvelles lunes ou commencements de mois  ; cf. Nb 10.10+ ; 28.11 ; 1S 20.5 ; 2R 4.23 ; Es 1.13s ; Os 2.13 ; Am 8.5. –  rencontres festives du Seigneur  : cf. Lv 23.2,4,37,44 ; Os 9.5 ; voir aussi Ez 45.17 ; 2Ch 8.13+ ; 31.3.'
  - type: text
    content: 'Je bâtis une maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, afin de lui consacrer des offrandes, de faire fumer devant lui de l''encens aromatique, d''exposer constamment des pains, d''offrir des holocaustes le matin et le soir, aux sabbats, aux nouvelles lunes et aux rencontres festives du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, comme cela incombe pour toujours à Israël. '
  '4':
  - type: note
    content: 'doit être grande  : cf. v. 8 ; 3.5 ; 1Ch 29.1. –  notre Dieu est plus grand…  : cf. Ex 18.11.'
  - type: text
    content: 'La maison que je vais bâtir doit être grande, car notre Dieu est plus grand que tous les dieux. '
  '5':
  - type: note
    content: 'Cf. 6.18 ; 1R 8.27n. –  qui serais-je  : cf. 1S 18.18+.'
  - type: text
    content: 'Mais qui aurait le pouvoir de lui bâtir une maison, puisque le ciel du ciel ne peut le contenir ? Et qui serais-je pour lui bâtir une maison, si ce n''était pour offrir de l''encens devant lui ? '
  '6':
  - type: note
    content: 'habile(s)  : le terme hébreu correspondant (aussi aux v. 12s) est souvent traduit par sage(s), cf. v. 11ss. –  la pourpre rouge…  : cf. Ex 25.4n. –  connaissant l''art de la gravure  : litt. sachant graver des gravures. –  a préparés  : cf. v. 8 ; 1.4 ; 1Ch 15.3,12 ; 22.3,14 ; 28.2 ; 29.2s,16 etc.'
  - type: text
    content: 'Maintenant, envoie-moi un homme habile à travailler l''or, l''argent, le bronze et le fer, la pourpre rouge, le carmin et la pourpre violette, un homme connaissant l''art de la gravure, afin qu''il travaille avec les hommes habiles qui sont auprès de moi en Juda et à Jérusalem, ceux que David, mon père, a préparés. '
  '7':
  - type: note
    content: 'santal  : hébreu ’algoummim, sens incertain ; cf. 9.10s ; 1R 10.11ns (’almougim). –  tes hommes 1R 5.20n.'
  - type: text
    content: 'Envoie-moi du Liban du bois de cèdre, de cyprès et de santal : je sais bien, moi, que tes hommes savent couper les bois du Liban. Mes hommes seront avec tes hommes. '
  '8':
  - type: text
    content: 'Qu''on me prépare du bois en quantité, car la maison que je vais bâtir sera d''une grandeur étonnante. '
  '9':
  - type: note
    content: 'vingt mille kors ≈ 4 200 m3  ; voir mesures, poids et monnaies. –  foulé  : hébreu makkoth (litt. coups) ; des versions anciennes ont lu (pour la) nourriture, ce qui correspondrait au terme employé en 1R 5.25 (hébreu makkoleth, traduit par entretien). –  vingt mille baths ≈ 420 m3.'
  - type: text
    content: Je donnerai à tes hommes, aux bûcherons qui couperont les arbres, vingt mille kors de froment foulé, vingt mille kors d'orge, vingt mille baths de vin et vingt mille baths d'huile.
  - type: heading
    content: 1R 5.15-26  ; 7.13-14
