  - type: text
    text: ', mon Dieu, afin de lui consacrer des offrandes, de faire fumer devant lui de l''encens aromatique, d''exposer constamment des pains, d''offrir des holocaustes le matin et le soir, aux sabbats, aux nouvelles lunes et aux rencontres festives du '
  - type: usfm
