    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lui (était) juste à ses yeux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Un ms hébreu et des versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à leurs yeux.
    marker-yv: yv-n
  - type: text
    text: Ces trois hommes cessèrent de répondre à Job, parce qu'il se croyait juste.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Elihou '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il est Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; c''est un nom assez répandu en Israël (cf. 1S 1.1 ; 1Ch 12.21). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Bouzite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 22.21 (cf. Jb 1.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; Jr 25.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: parce qu'il se disait plus juste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parce qu''il justifiait sa vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son être
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir Gn 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (plus) que Dieu ; parce qu'il se déclarait juste devant Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 4.17
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 35.2 ; 40.8.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Elihou, fils de Barakéel, le Bouzite, du clan de Ram, se mit en colère. Il se mit en colère contre Job, parce qu''il se disait plus juste que Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils condamnaient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (9.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c''est vraisemblablement ce que portait le texte hébreu originel ; le texte hébreu traditionnel porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils condamnaient Job
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais il s''agit probablement d''une annotation des scribes par respect pour le nom de Dieu.'
    marker-yv: yv-n
  - type: text
    text: 'Il se mit en colère contre ses trois amis, parce qu''ils ne trouvaient rien à répondre et qu''ils condamnaient Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 12.12 ; Lv 19.32.
    marker-yv: yv-n
  - type: text
    text: 'Comme ils étaient plus âgés que lui, Elihou avait attendu pour parler à Job. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 15.
    marker-yv: yv-n
  - type: text
    text: Mais Elihou avait vu que ces trois hommes n'avaient pas de réponse, et il se mit en colère.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elihou justifie son intervention
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jeune
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: petit en jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 15.10 ; 30.1.
    marker-yv: yv-n
  - type: text
    text: 'Elihou, fils de Barakéel, le Bouzite, répondit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Je suis jeune, et vous êtes des vieillards ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est pourquoi j'ai tremblé, je craignais
- type: usfm
  marker: q1
  children:
  - type: text
    text: de vous exposer mon savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je me disais…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'j''ai dit : les jours parleront'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Cf. 8.8+.
    marker-yv: yv-n
  - type: text
    text: 'Je me disais : « L''âge avancé saura parler,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: le grand nombre des années fera connaître la sagesse. »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 35.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un souffle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
      - type: text
        text: '  ; l''Esprit'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. v. 18 ; voir Gn 41.38s ; Dn 1.17 ; Es 11.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du Puissant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Mais en réalité, dans l'homme, c'est un souffle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est l'haleine du Puissant qui lui donne l'intelligence ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'abondance d'années
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une multitude (de jours ?)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.8s : « Car la vieillesse estimée n''est pas celle du grand âge, elle ne se mesure pas au nombre des années. La sagesse tient lieu de cheveux blancs pour l''homme, l''âge de la vieillesse, c''est une vie sans tache. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'équité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme hébreu est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'droit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: règle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 8.3 ; 9.19 ; 13.18 ; 23.4 ; 27.2 ; 29.14 ; 31.13 ; 34.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 35.2 ; 36.6,17 ; 37.23.'
    marker-yv: yv-n
  - type: text
    text: l'abondance d'années ne donne pas la sagesse,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ce ne sont pas les vieillards qui comprennent l'équité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Voilà pourquoi je dis : Ecoute-moi !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Moi aussi, j'exposerai mon savoir.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jc 1.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos raisonnements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : pluriel du terme traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'intelligence '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 12.12s ; 26.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'examiné… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses propos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la question.
    marker-yv: yv-n
  - type: text
    text: J'ai attendu vos paroles,
- type: usfm
  marker: q1
  children:
  - type: text
    text: j'ai prêté l'oreille à vos raisonnements,
- type: usfm
  marker: q1
  children:
  - type: text
    text: jusqu'à ce que vous ayez examiné à fond ses propos.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: Je vous ai accordé toute mon attention ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais aucun de vous n'a convaincu Job,
- type: usfm
  marker: q1
  children:
  - type: text
    text: aucun n'a répondu à ses discours.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 36.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui le confondra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui le repoussera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui le chassera, qui l'emportera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; même verbe en 13.25 (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: emportée par le vent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; Ps 1.4.
    marker-yv: yv-n
  - type: text
    text: 'Ne dites pas cependant : « Nous avons trouvé là la sagesse ;'
- type: usfm
  marker: q1
  children:
  - type: text
    text: c'est Dieu qui le confondra, et non pas un homme ! »
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ce n'est pas contre moi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il n''a pas aligné contre moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vers moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des propos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 35.4.
    marker-yv: yv-n
  - type: text
    text: Ce n'est pas contre moi qu'il a tenu ses propos ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: aussi ne lui répondrai-je pas avec vos paroles.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 5 ; 11.3.
    marker-yv: yv-n
  - type: text
    text: Ils sont terrifiés, ils ne répondent plus !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Les mots leur manquent !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'J''ai attendu : puisqu''ils ne parlent pas,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: parce qu'ils s'arrêtent et ne répondent plus,
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '32.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à mon tour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
