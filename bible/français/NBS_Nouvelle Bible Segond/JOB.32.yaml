document_id: JOB.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: INTERVENTION D'ÉLIHOU
  - type: heading
    content: La colère d'Elihou
  - type: text
    content: ' '
  - type: note
    content: 'il se croyait juste  : litt. lui (était) juste à ses yeux . Un ms hébreu et des versions anciennes ont lu à leurs yeux.'
  - type: text
    content: Ces trois hommes cessèrent de répondre à Job, parce qu'il se croyait juste.
  '10':
  - type: text
    content: 'Voilà pourquoi je dis : Ecoute-moi !'
  - type: text
    content: Moi aussi, j'exposerai mon savoir.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jc 1.19+. –  vos raisonnements  : pluriel du terme traduit par intelligence en 12.12s ; 26.12. –  examiné… 5.27n. –  ses propos  : autre traduction la question.'
  - type: text
    content: J'ai attendu vos paroles,
  - type: text
    content: j'ai prêté l'oreille à vos raisonnements,
  - type: text
    content: jusqu'à ce que vous ayez examiné à fond ses propos.
  '12':
  - type: text
    content: Je vous ai accordé toute mon attention ;
  - type: text
    content: mais aucun de vous n'a convaincu Job,
  - type: text
    content: aucun n'a répondu à ses discours.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 36.22. –  qui le confondra  : litt. qui le repoussera , ou qui le chassera, qui l''emportera  ; même verbe en 13.25 ( emportée par le vent ) ; Ps 1.4.'
  - type: text
    content: 'Ne dites pas cependant : « Nous avons trouvé là la sagesse ;'
  - type: text
    content: c'est Dieu qui le confondra, et non pas un homme ! »
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ce n''est pas contre moi…  : litt. il n''a pas aligné contre moi (ou vers moi ) des propos  ; cf. 35.4.'
  - type: text
    content: Ce n'est pas contre moi qu'il a tenu ses propos ;
  - type: text
    content: aussi ne lui répondrai-je pas avec vos paroles.
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 5 ; 11.3.
  - type: text
    content: Ils sont terrifiés, ils ne répondent plus !
  - type: text
    content: Les mots leur manquent !
  '16':
  - type: text
    content: 'J''ai attendu : puisqu''ils ne parlent pas,'
  - type: text
    content: parce qu'ils s'arrêtent et ne répondent plus,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'à mon tour  : autre traduction c''est ma part (cf. 20.29 etc.).'
  - type: text
    content: à mon tour, je veux répondre ;
  - type: text
    content: je veux exposer mon savoir, moi aussi !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.2. –  un souffle…  : litt. un souffle (ou un esprit, l''Esprit , cf. 15.2+) de mon ventre me presse . Cf. Jr 20.9.'
  - type: text
    content: Car je suis plein de propos,
  - type: text
    content: un souffle me presse au dedans de moi ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'au dedans de moi…  : litt. mon ventre (est) comme du vin qui n''est pas ouvert . –  comme des outres neuves  : cf. Mt 9.17/ /. –  qui vont éclater  : litt. il (mon ventre) éclate.'
  - type: text
    content: au dedans de moi, c'est comme du vin sous pression,
  - type: text
    content: comme des outres neuves qui vont éclater.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Elihou signifie il est Dieu  ; c''est un nom assez répandu en Israël (cf. 1S 1.1 ; 1Ch 12.21). –  le Bouzite Gn 22.21 (cf. Jb 1.1n) ; Jr 25.23. –  parce qu''il se disait plus juste  : autres traductions parce qu''il justifiait sa vie (ou son être , voir Gn 1.20n) (plus) que Dieu ; parce qu''il se déclarait juste devant Dieu  ; cf. 4.17n  ; 35.2 ; 40.8.'
  - type: text
    content: 'Alors Elihou, fils de Barakéel, le Bouzite, du clan de Ram, se mit en colère. Il se mit en colère contre Job, parce qu''il se disait plus juste que Dieu. '
  '20':
  - type: text
    content: Je parlerai pour pouvoir respirer,
  - type: text
    content: j'ouvrirai mes lèvres et je répondrai.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Je ne favoriserai…  : litt. que je ne lève (surtout) pas (le verbe hébreu correspondant est traduit par enlever au v. 22) la face d''un homme , cf. 13.8nss. –  flatterai Ps 12.3s ; Pr 29.5.'
  - type: text
    content: Je ne favoriserai personne,
  - type: text
    content: je ne flatterai aucun être humain ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui me fait  : c.-à-d. mon créateur (cf. 31.15n). –  m''enlèverait v. 21n.'
  - type: text
    content: 'car je ne sais pas flatter :'
  - type: text
    content: celui qui me fait m'enlèverait bien vite !
  '3':
  - type: note
    content: 'ils condamnaient (9.20n) Dieu  : c''est vraisemblablement ce que portait le texte hébreu originel ; le texte hébreu traditionnel porte ils condamnaient Job, mais il s''agit probablement d''une annotation des scribes par respect pour le nom de Dieu.'
  - type: text
    content: 'Il se mit en colère contre ses trois amis, parce qu''ils ne trouvaient rien à répondre et qu''ils condamnaient Dieu. '
  '4':
  - type: note
    content: 12.12 ; Lv 19.32.
  - type: text
    content: 'Comme ils étaient plus âgés que lui, Elihou avait attendu pour parler à Job. '
  '5':
  - type: note
    content: V. 15.
  - type: text
    content: Mais Elihou avait vu que ces trois hommes n'avaient pas de réponse, et il se mit en colère.
  - type: heading
    content: Elihou justifie son intervention
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'jeune  : litt. petit en jours  ; cf. 15.10 ; 30.1.'
  - type: text
    content: 'Elihou, fils de Barakéel, le Bouzite, répondit :'
  - type: text
    content: Je suis jeune, et vous êtes des vieillards ;
  - type: text
    content: c'est pourquoi j'ai tremblé, je craignais
  - type: text
    content: de vous exposer mon savoir.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je me disais…  : litt. j''ai dit : les jours parleront . Cf. 8.8+.'
  - type: text
    content: 'Je me disais : « L''âge avancé saura parler,'
  - type: text
    content: le grand nombre des années fera connaître la sagesse. »
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 35.11. –  un souffle  : autres traductions un esprit  ; l''Esprit  ; cf. v. 18 ; voir Gn 41.38s ; Dn 1.17 ; Es 11.2. –  du Puissant 5.17n.'
  - type: text
    content: Mais en réalité, dans l'homme, c'est un souffle,
  - type: text
    content: c'est l'haleine du Puissant qui lui donne l'intelligence ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'l''abondance d''années  : litt. une multitude (de jours ?)  ; cf. Sagesse 4.8s : « Car la vieillesse estimée n''est pas celle du grand âge, elle ne se mesure pas au nombre des années. La sagesse tient lieu de cheveux blancs pour l''homme, l''âge de la vieillesse, c''est une vie sans tache. » –  l''équité  : le terme hébreu est aussi traduit par droit ou règle  ; cf. 8.3 ; 9.19 ; 13.18 ; 23.4 ; 27.2 ; 29.14 ; 31.13 ; 34.4n  ; 35.2 ; 36.6,17 ; 37.23.'
  - type: text
    content: l'abondance d'années ne donne pas la sagesse,
  - type: text
    content: ce ne sont pas les vieillards qui comprennent l'équité.
