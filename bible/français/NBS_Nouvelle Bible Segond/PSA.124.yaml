document_id: PSA.124,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sans le Seigneur qui était pour nous…
  - type: text
    content: ' '
  - type: note
    content: 'montées 120.1n. –  De David  : cette précision est absente de certains mss hébreux et grecs. –  Sans le Seigneur … ou si le Seigneur n''avait été pour nous , formule presque identique en 94.17 ; cf. 27.13 ; 119.92 ; voir aussi Gn 31.42 ; Es 1.9. –  pour nous 46.2ss ; 56.10 ; 118.6. –  Qu''Israël le dise 129.1 ; cf. 118.2+.'
  - type: text
    content: Chant des montées. De David.
  - type: text
    content: 'Sans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui était pour nous'
  - type: text
    content: – Qu'Israël le dise ! –
  '2':
  - type: text
    content: ' '
  - type: note
    content: 3.2+.
  - type: text
    content: 'sans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui était pour nous,'
  - type: text
    content: quand les hommes se dressèrent contre nous,
  '3':
  - type: text
    content: ' '
  - type: note
    content: engloutis 35.25 ; 79.7 ; Es 9.11 ; Jr 51.34 ; Pr 1.12 ; Lm 2.16.
  - type: text
    content: alors ils nous auraient engloutis tout vivants,
  - type: text
    content: quand ils se mirent en colère contre nous ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 18.5 ; 32.6 ; 42.8 ; 46.4 ; 69.2s ; 88.8 ; 89.9 ; Es 8.7s ; 17.12 ; Jr 47.2 ; Lm 3.54. –  un torrent ou un oued  ; cf. Gn 26.17n  ; Jb 6.15n.
  - type: text
    content: alors les eaux nous auraient emportés,
  - type: text
    content: un torrent nous aurait submergés.
  '5':
  - type: text
    content: Alors auraient passé sur nous
  - type: text
    content: les flots impétueux.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Béni… 28.6+ ; 31.22.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui ne nous a pas livrés en proie à leurs dents !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 25.15 ; 91.3 ; Pr 6.5 ; 7.23 ; Ec 9.12.
  - type: text
    content: Nous nous sommes échappés comme l'oiseau du filet des oiseleurs ;
  - type: text
    content: le filet s'est rompu, et nous nous sommes échappés.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Voir 121.2+. –  dans le nom du Seigneur 20.2,8 ; 33.21 ; Pr 18.10.
  - type: text
    content: 'Notre secours est dans le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui fait le ciel et la terre.
