document_id: DEU.23,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Dans plusieurs éditions ce v. est rattaché au chap. 22 et la numérotation des v. suivants est décalée en conséquence. –  la femme de son père  : en situation de polygamie (cf. 21.15), vraisemblablement une autre que sa propre mère ; cf. 27.20 ; Gn 35.22 ; Lv 18.8 ; 1Co 5.1. –  ne soulèvera le pan du vêtement  : cf. 22.12n  ; si l''expression se réfère au geste par lequel le mari s''engageait envers sa femme (il la couvrait du pan de son vêtement, cf. Ez 16.8 ; Rt 3.9), la phrase pourrait signifier ne portera atteinte aux droits conjugaux de son père en prenant sa femme  ; mais le verbe hébreu traduit par soulever est aussi traduit, dans des contextes analogues, par exposer (la nudité) , cf. Lv 18.6nss.'
  - type: text
    content: Personne ne prendra la femme de son père et ne soulèvera le pan du vêtement de son père.
  - type: heading
    content: Les personnes exclues de l'assemblée
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 20.1ss.
  - type: text
    content: 'Lorsque tu pars en campagne contre tes ennemis, garde-toi de toute chose mauvaise. '
  '11':
  - type: note
    content: 'incident nocturne  : autre désignation du cas prévu en Lv 15.16n. LXX emploie ici le même terme (écoulement). Cf. Règlement de la Guerre (Qumrân) 7.4-6 : « Nul homme boiteux, aveugle, ou estropié, ou ayant dans sa chair une tare irréparable, ou frappé d''une impureté de sa chair, nul de ceux-là n''ira avec eux au combat. Tous, ce seront des volontaires pour le combat, et ils seront parfaits d''esprit et de corps et prêts pour le jour de la Vengeance. Et nul homme qui ne sera en état de pureté à cause de son flux au jour du combat ne descendra avec eux ; car les anges de sainteté accompagneront leurs armées. »'
  - type: text
    content: 'S''il y a chez toi un homme qui n''est pas pur, par suite d''un incident nocturne, il sortira du camp et ne rentrera pas à l''intérieur du camp ; '
  '12':
  - type: text
    content: 'sur le soir il se lavera avec de l''eau, puis au coucher du soleil il pourra rentrer à l''intérieur du camp. '
  '13':
  - type: note
    content: 'un endroit à l''écart  : le mot correspondant est habituellement traduit par main  ; il peut aussi avoir le sens de côté.'
  - type: text
    content: 'Tu auras un endroit à l''écart, hors du camp ; c''est là, dehors, que tu sortiras. '
  '14':
  - type: note
    content: 'un outil  : le mot désigne habituellement un piquet ou un pieu (p. ex. Jg 4.21).'
  - type: text
    content: 'Tu auras dans ton équipement un outil ; quand tu iras t''accroupir dehors, tu feras un trou, puis tu te retourneras pour recouvrir tes excréments. '
  '15':
  - type: note
    content: '20.4 ; Nb 5.3. –  marche au milieu (ou au sein) de ton camp  : autre traduction parcourt ton camp  ; même forme verbale en Gn 3.8n. –  pour te sauver ou pour te délivrer. –  saint ou sacré, cf. 7.6+. –  rien d''inconvenant  : litt. la nudité d''une chose, même expression en 24.1n. –  de toi  : litt. de derrière toi, cf. Nb 14.43n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, marche au milieu de ton camp pour te sauver et pour livrer tes ennemis devant toi ; ton camp sera donc saint, afin qu''il ne voie chez toi rien d''inconvenant et qu''il ne se détourne pas de toi.'
  - type: heading
    content: L'esclave en fuite
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1S 30.11-15 ; Phm 8-21. Cf. Code d''Hammourabi 16 : « Si un homme a caché chez lui un ou une esclave en fuite… ce maître de maison sera mis à mort. » –  livreras  : le verbe qui apparaît ici, plus rare que celui qui apparaît dans l''expression courante de Gn 9.2n etc., signifie habituellement fermer  ; il peut avoir la nuance d’ interdire l''accès à un lieu de refuge ; même verbe en Jos 20.5 ; 1S 17.46 ; 23.7,11s,20 ; 24.19 ; 26.8 ; 30.15 ; 2S 18.28 ; Am 1.6,9 ; 6.8 ; Ab 14 ; Ps 31.9 ; 78.48,50,62 ; Jb 16.11 ; Lm 2.7. –  pour se réfugier chez toi  : litt. vers toi.'
  - type: text
    content: 'Tu ne livreras pas à son maître un esclave qui s''est sauvé de chez son maître pour se réfugier chez toi. '
  '17':
  - type: note
    content: l'une de tes villes 12.12n  ; 16.18n. –  tu ne l'exploiteras pas Ex 22.20+.
  - type: text
    content: Il habitera chez toi, en ton sein, au lieu qu'il choisira, dans l'une de tes villes, où bon lui semblera ; tu ne l'exploiteras pas.
  - type: heading
    content: La prostitution sacrée
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'prostitué(e) sacré(e)  : litt. consacré(e)  ; cf. Gn 38.21ns ; 1R 14.24 ; 15.12 ; 22.47 ; 2R 23.7 ; Os 4.14 ; Jb 36.14. –  fils d''Israël ou Israélites.'
  - type: text
    content: 'Il n''y aura pas de prostituée sacrée parmi les filles d''Israël, il n''y aura pas de prostitué sacré parmi les fils d''Israël. '
  '19':
  - type: note
    content: 'dans la maison du Seigneur  : cf. Mt 27.6. –  pour un vœu v. 22 ; cf. Lv 7.16. –  prostituée  : autre terme, plus général, qu''au v. 18n. –  chien  : compte tenu du parallélisme avec le v. 18, il s''agit vraisemblablement d''un homme qui se livre à la prostitution rituelle ; le terme en viendra plus tard, dans le judaïsme, à désigner les non-Juifs ou païens en général (cf. Mt 15.26s ; Ph 3.2 ; Ap 22.15). –  une abomination…  : litt. une abomination (voir pur, impur) de YHWH (voir noms divins) 7.25+.'
  - type: text
    content: 'Tu n''apporteras pas dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, pour un vœu, quel qu''il soit, le gain d''une prostituée ou le salaire d''un chien : l''un comme l''autre sont une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  - type: heading
    content: Le prêt à intérêt
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 21.16-24 ; Es 56.3-5 ; Mt 19.12 ; Ac 8.27-38 ; Ga 5.12. –  l'assemblée du Seigneur 5.22+. Voir Eglise.
  - type: text
    content: 'Celui dont les testicules ont été écrasés ou le pénis coupé n''entrera pas dans l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex 22.24+.
  - type: text
    content: 'Tu n''exigeras de ton frère aucun intérêt : ni pour de l''argent, ni pour des vivres, ni pour rien de ce qui peut se prêter à intérêt. '
  '21':
  - type: note
    content: 'de l''étranger  : cf. 15.3. – Voir bénédiction. –  tu entres pour en prendre possession 1.21+ ; 4.1n.'
  - type: text
    content: 'Tu pourras exiger un intérêt de l''étranger, mais tu n''en exigeras pas de ton frère, afin que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénisse dans toutes tes entreprises, sur la terre où tu entres pour en prendre possession.'
  - type: heading
    content: Les vœux
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'vœu v. 19 ; voir Nb 30.2-17 ; Ps 66.13 ; Pr 20.25 ; Ec 5.3-5 ; Mt 5.33 ; cf. Jc 4.17 ; Siracide 18.22s : « Que rien ne t''empêche d''accomplir ton vœu en temps voulu, n''attends pas jusqu''à la mort pour t''en acquitter. Avant de faire un vœu, prépare-toi, ne sois pas comme un homme qui tente le Seigneur. » –  un péché pour toi 15.9+.'
  - type: text
    content: 'Si tu fais un vœu au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, tu ne tarderas pas à t''en acquitter ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''en demanderait compte, et ce serait un péché pour toi. '
  '23':
  - type: text
    content: 'Si tu t''abstiens de faire un vœu, il n''y aura pas de péché pour toi. '
  '24':
  - type: note
    content: 'tu garderas (ou tu observeras) … et tu agiras (litt. tu feras) : cf. 5.1n.'
  - type: text
    content: 'Mais tu garderas ce qui est sorti de tes lèvres et tu agiras conformément aux vœux que tu as faits volontairement au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, ceux que tu as prononcés de ta propre bouche.'
  - type: heading
    content: La vigne et le champ du prochain
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. 24.19-22.
  - type: text
    content: 'Si tu entres dans la vigne de ton prochain, tu pourras à ton gré manger des raisins et t''en rassasier ; mais tu n''en mettras pas dans ton récipient. '
  '26':
  - type: note
    content: Mt 12.1/ /.
  - type: text
    content: Si tu entres dans les blés de ton prochain, tu pourras cueillir des épis à la main, mais tu ne passeras pas la faucille dans les blés de ton prochain.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'bâtard  : il s''agit sans doute ici de l''enfant né d''une union illicite (cf. Lv 18.6-18 ; même mot en Za 9.6) ; la tradition juive l''a appliqué par la suite aux enfants nés de Juifs et de femmes étrangères (cf. Né 13.23-27). –  même sa dixième génération  : précision absente ici de LXX.'
  - type: text
    content: 'Un bâtard n''entrera pas dans l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; même sa dixième génération n''entrera pas dans l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ammonite / Moabite  : cf. 2.9+,19. –  Il en est ainsi pour toujours  : autre traduction (ils n''y entreront) jamais , cf. Né 13.1-3.'
  - type: text
    content: 'L''Ammonite et le Moabite n''entreront pas dans l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; même leur dixième génération n''entrera pas dans l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il en est ainsi pour toujours, '
  '5':
  - type: note
    content: 'ils ne sont pas venus  : cf. 25.17-19. –  du pain et de l''eau  : cf. Gn 18.4s. –  Balaam Nb 22.2–24.25 ; cf. 2P 2.15. –  Mésopotamie Gn 10.22n.'
  - type: text
    content: 'parce qu''ils ne sont pas venus au-devant de vous avec du pain et de l''eau, sur le chemin, lorsque vous êtes sortis d''Egypte, et parce qu''ils ont soudoyé contre toi Balaam, fils de Béor, de Petor en Mésopotamie, pour te maudire. '
  '6':
  - type: note
    content: 'malédiction en bénédiction  : cf. Jos 24.10. –  t''aimait 4.37+.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, n''a pas voulu écouter Balaam ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a changé pour toi la malédiction en bénédiction, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aimait. '
  '7':
  - type: note
    content: 'Cf. Mt 5.43. – Voir paix. –  tant que tu vivras  : litt. tous tes jours.'
  - type: text
    content: Tu ne chercheras jamais leur paix ni leur bien-être, tant que tu vivras.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'l''Edomite… ton frère 2.4 ; cf. Gn 25.25s ; 36. –  l''Egyptien…  : cf. 10.19+ ; Gn 47.4 ; voir aussi Es 19.18-25.'
  - type: text
    content: 'Tu n''auras pas en abomination l''Edomite, car il est ton frère ; tu n''auras pas en abomination l''Egyptien, car tu as été un immigré dans son pays : '
  '9':
  - type: note
    content: 'troisième génération  : cf. v. 3s ; 5.9 ; Gn 15.16.'
  - type: text
    content: 'les fils qui leur naîtront, à la troisième génération, pourront entrer dans l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: La pureté du camp
