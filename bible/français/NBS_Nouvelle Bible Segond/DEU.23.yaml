document_id: DEU.23,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dans plusieurs éditions ce v. est rattaché au chap. 22 et la numérotation des v. suivants est décalée en conséquence. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la femme de son père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en situation de polygamie (cf. 21.15), vraisemblablement une autre que sa propre mère ; cf. 27.20 ; Gn 35.22 ; Lv 18.8 ; 1Co 5.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne soulèvera le pan du vêtement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 22.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; si l''expression se réfère au geste par lequel le mari s''engageait envers sa femme (il la couvrait du pan de son vêtement, cf. Ez 16.8 ; Rt 3.9), la phrase pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne portera atteinte aux droits conjugaux de son père en prenant sa femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; mais le verbe hébreu traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'soulever '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est aussi traduit, dans des contextes analogues, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exposer (la nudité)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Lv 18.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss.
      marker-yv: yv-n
    - type: text
      text: Personne ne prendra la femme de son père et ne soulèvera le pan du vêtement de son père.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les personnes exclues de l'assemblée
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 20.1ss.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu pars en campagne contre tes ennemis, garde-toi de toute chose mauvaise. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: incident nocturne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre désignation du cas prévu en Lv 15.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' emploie ici le même terme ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: écoulement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règlement de la Guerre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 7.4-6 : « Nul homme boiteux, aveugle, ou estropié, ou ayant dans sa chair une tare irréparable, ou frappé d''une impureté de sa chair, nul de ceux-là n''ira avec eux au combat. Tous, ce seront des volontaires pour le combat, et ils seront parfaits d''esprit et de corps et prêts pour le jour de la Vengeance. Et nul homme qui ne sera en état de pureté à cause de son flux au jour du combat ne descendra avec eux ; car les anges de sainteté accompagneront leurs armées. »'
      marker-yv: yv-n
    - type: text
      text: 'S''il y a chez toi un homme qui n''est pas pur, par suite d''un incident nocturne, il sortira du camp et ne rentrera pas à l''intérieur du camp ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'sur le soir il se lavera avec de l''eau, puis au coucher du soleil il pourra rentrer à l''intérieur du camp. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un endroit à l'écart
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il peut aussi avoir le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: côté.
      marker-yv: yv-n
    - type: text
      text: 'Tu auras un endroit à l''écart, hors du camp ; c''est là, dehors, que tu sortiras. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un outil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot désigne habituellement un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'piquet '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (p. ex. Jg 4.21).
      marker-yv: yv-n
    - type: text
      text: 'Tu auras dans ton équipement un outil ; quand tu iras t''accroupir dehors, tu feras un trou, puis tu te retourneras pour recouvrir tes excréments. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.4 ; Nb 5.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'marche au milieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au sein
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ton camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parcourt ton camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même forme verbale en Gn 3.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour te sauver '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour te délivrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 7.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rien d'inconvenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la nudité d'une chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même expression en 24.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de derrière toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Nb 14.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, marche au milieu de ton camp pour te sauver et pour livrer tes ennemis devant toi ; ton camp sera donc saint, afin qu''il ne voie chez toi rien d''inconvenant et qu''il ne se détourne pas de toi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'esclave en fuite
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1S 30.11-15 ; Phm 8-21. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Code '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hammourabi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16 : « Si un homme a caché chez lui un ou une esclave en fuite… ce maître de maison sera mis à mort. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: livreras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe qui apparaît ici, plus rare que celui qui apparaît dans l''expression courante de Gn 9.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' etc., signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fermer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; il peut avoir la nuance d’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'interdire l''accès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'à un lieu de refuge ; même verbe en Jos 20.5 ; 1S 17.46 ; 23.7,11s,20 ; 24.19 ; 26.8 ; 30.15 ; 2S 18.28 ; Am 1.6,9 ; 6.8 ; Ab 14 ; Ps 31.9 ; 78.48,50,62 ; Jb 16.11 ; Lm 2.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour se réfugier chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vers toi.
      marker-yv: yv-n
    - type: text
      text: 'Tu ne livreras pas à son maître un esclave qui s''est sauvé de chez son maître pour se réfugier chez toi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''une de tes villes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 16.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu ne l''exploiteras pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 22.20+.
      marker-yv: yv-n
    - type: text
      text: Il habitera chez toi, en ton sein, au lieu qu'il choisira, dans l'une de tes villes, où bon lui semblera ; tu ne l'exploiteras pas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La prostitution sacrée
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prostitué(e) sacré(e)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consacré(e)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Gn 38.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; 1R 14.24 ; 15.12 ; 22.47 ; 2R 23.7 ; Os 4.14 ; Jb 36.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Israélites.
      marker-yv: yv-n
    - type: text
      text: 'Il n''y aura pas de prostituée sacrée parmi les filles d''Israël, il n''y aura pas de prostitué sacré parmi les fils d''Israël. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 27.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour un vœu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 22 ; cf. Lv 7.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prostituée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre terme, plus général, qu''au v. 18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : compte tenu du parallélisme avec le v. 18, il s''agit vraisemblablement d''un homme qui se livre à la prostitution rituelle ; le terme en viendra plus tard, dans le judaïsme, à désigner les non-Juifs ou païens en général (cf. Mt 15.26s ; Ph 3.2 ; Ap 22.15). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une abomination…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une abomination '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de YHWH '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins) 7.25+.'
      marker-yv: yv-n
    - type: text
      text: 'Tu n''apporteras pas dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, pour un vœu, quel qu''il soit, le gain d''une prostituée ou le salaire d''un chien : l''un comme l''autre sont une abomination pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le prêt à intérêt
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 21.16-24 ; Es 56.3-5 ; Mt 19.12 ; Ac 8.27-38 ; Ga 5.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''assemblée du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.22+. Voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Eglise
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Celui dont les testicules ont été écrasés ou le pénis coupé n''entrera pas dans l''assemblée du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 22.24+.
      marker-yv: yv-n
    - type: text
      text: 'Tu n''exigeras de ton frère aucun intérêt : ni pour de l''argent, ni pour des vivres, ni pour rien de ce qui peut se prêter à intérêt. '
