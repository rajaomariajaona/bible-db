  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'étranger
      - type: usfm
        marker: ft
