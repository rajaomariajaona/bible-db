    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 4.7+ ; Nb 6.24ss. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Que Dieu nous accorde sa grâce et qu'il nous bénisse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'qu''il fasse briller sur nous sa face ! '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '98.2s ; 99.1-3 ; cf. 1R 8.43,60 ; Lc 2.30-32 ; 3.6 ; Ac 28.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le pays.
      marker-yv: yv-n
    - type: text
      text: – Afin que l'on connaisse ta voie sur la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ton salut parmi toutes les nations !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6 ; 47.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'te célèbrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 33.2 ; 100.4 ; 105.1 etc.
      marker-yv: yv-n
    - type: text
      text: Les peuples te célèbrent, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les peuples te célèbrent.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : terme hébreu peu courant, synonyme de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peuples
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 47.4 ; 57.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu juges '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.9+ ; 98.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans le pays.
      marker-yv: yv-n
    - type: text
      text: Les nations se réjouissent, elles poussent des cris de joie ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tu juges les peuples avec droiture,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'tu conduis les nations sur la terre. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: Les peuples te célèbrent, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les peuples te célèbrent.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 85.13 ; cf. 65.10-14 ; Lv 25.19 ; 26.4.
      marker-yv: yv-n
    - type: text
      text: La terre donne ses produits ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu, notre Dieu, nous bénit.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 22.28 ; 33.8 ; Es 41.5 ; Jr 10.7. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Dieu nous bénit,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et toutes les extrémités de la terre le craignent.
