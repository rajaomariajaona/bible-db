document_id: PSA.67,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les peuples te célèbrent
  - type: text
    content: ' '
  - type: note
    content: Cf. 66.1+. –  instruments à cordes 4.1+.
  - type: text
    content: Du chef de chœur. Avec instruments à cordes. Psaume. Chant.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.7+ ; Nb 6.24ss. – Voir grâce.
  - type: text
    content: Que Dieu nous accorde sa grâce et qu'il nous bénisse,
  - type: text
    content: 'qu''il fasse briller sur nous sa face ! '
  - type: text
    content: Pause.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '98.2s ; 99.1-3 ; cf. 1R 8.43,60 ; Lc 2.30-32 ; 3.6 ; Ac 28.28. –  sur la terre  : autre traduction dans le pays.'
  - type: text
    content: – Afin que l'on connaisse ta voie sur la terre,
  - type: text
    content: ton salut parmi toutes les nations !
  '4':
  - type: text
    content: ' '
  - type: note
    content: V. 6 ; 47.2. –  te célèbrent 33.2 ; 100.4 ; 105.1 etc.
  - type: text
    content: Les peuples te célèbrent, ô Dieu,
  - type: text
    content: tous les peuples te célèbrent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'nations  : terme hébreu peu courant, synonyme de peuples  ; cf. 47.4 ; 57.10. –  tu juges 9.9+ ; 98.9. –  sur la terre  : autre traduction dans le pays.'
  - type: text
    content: Les nations se réjouissent, elles poussent des cris de joie ;
  - type: text
    content: car tu juges les peuples avec droiture,
  - type: text
    content: 'tu conduis les nations sur la terre. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: Les peuples te célèbrent, ô Dieu,
  - type: text
    content: tous les peuples te célèbrent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 85.13 ; cf. 65.10-14 ; Lv 25.19 ; 26.4.
  - type: text
    content: La terre donne ses produits ;
  - type: text
    content: Dieu, notre Dieu, nous bénit.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.28 ; 33.8 ; Es 41.5 ; Jr 10.7. – Voir crainte.
  - type: text
    content: Dieu nous bénit,
  - type: text
    content: et toutes les extrémités de la terre le craignent.
