    children:
    - type: text
      text: Les peuples te célèbrent
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '67.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 66.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'instruments à cordes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.1+.
      marker-yv: yv-n
    - type: text
      text: Du chef de chœur. Avec instruments à cordes. Psaume. Chant.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
