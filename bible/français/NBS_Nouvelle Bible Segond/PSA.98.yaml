document_id: PSA.98,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Acclamez le Seigneur qui vient
  - type: text
    content: ' '
  - type: note
    content: 'Psaume  : LXX ajoute de David. –  Chantez… 33.3+ ; 96.1 ; 149.1 ; Es 42.10. –  choses étonnantes 86.10 ; Ex 34.10 ; Es 12.5 ; Lc 1.49. –  son bras saint ou le bras de sa sainteté. –  lui ont donné la victoire  : litt. l''ont sauvé ou l''ont secouru  ; cf. 17.7+ ; Es 51.5 ; 52.10 ; 59.16 ; 63.5.'
  - type: text
    content: Psaume.
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un chant nouveau,'
  - type: text
    content: car il a fait des choses étonnantes ;
  - type: text
    content: sa main droite et son bras saint lui ont donné la victoire.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'fait connaître son salut 67.3 ; Es 49.6 ; Lc 2.30ss. –  dévoilé sa justice  : cf. Es 56.1 ; Rm 1.17 ; Ap 15.4.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait connaître son salut,'
  - type: text
    content: il a dévoilé sa justice sous les yeux des nations.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Il s''est souvenu… Lc 1.54. –  fidélité / constance (synonymes) : cf. 89.34. –  les extrémités de la terre… Es 40.5 ; 52.10 ; 66.18 ; Lc 3.6 ; Ac 28.28.'
  - type: text
    content: Il s'est souvenu de sa fidélité
  - type: text
    content: et de sa constance envers la maison d'Israël ;
  - type: text
    content: toutes les extrémités de la terre
  - type: text
    content: ont vu le salut de notre Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '66.1s ; 96.1 ; 100.1s ; 108.2 ; cf. Es 52.9. –  chantez  : le verbe hébreu (différent de celui qui apparaît au v. 1) est traduit par jouez au v. 5 ; il est apparenté aux mots traduits par mélodie (v. 5 ; 81.3 ; 118.14n) et par psaume dans les suscriptions (7.18n).'
  - type: text
    content: 'Acclame le '
  - type: text
    content: Seigneur
  - type: text
    content: ', terre entière !'
  - type: text
    content: Eclatez en cris de joie, chantez !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 33.3 ; 43.4 ; 71.22 ; 147.7 ; 150.3 ; cf. Es 51.3. –  mélodie 81.3n.
  - type: text
    content: 'Jouez de la lyre pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: sur la lyre jouez une mélodie ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'trompettes / trompe  : cf. Nb 10.10. –  devant le roi 47.3,7ss ; 100.2.'
  - type: text
    content: avec des trompettes et au son de la trompe,
  - type: text
    content: 'lancez des acclamations devant le roi, le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: la mer… 96.11s ; Es 55.12. –  le monde… 24.1.
  - type: text
    content: Que la mer retentisse, avec tout ce qui s'y trouve,
  - type: text
    content: le monde avec tous ceux qui l'habitent !
  '8':
  - type: text
    content: ' '
  - type: note
    content: les montagnes 89.13 ; Es 44.23 ; 55.12.
  - type: text
    content: Que les fleuves battent des mains,
  - type: text
    content: qu'avec eux les montagnes poussent des cris de joie,
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 96.13+. –  les peuples… 67.5 ; 96.10.
  - type: text
    content: 'devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il vient pour juger la terre !'
  - type: text
    content: Il jugera le monde avec justice,
  - type: text
    content: il jugera les peuples avec droiture.
