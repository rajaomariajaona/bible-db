document_id: COL.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'vous vous êtes réveillés ou relevés 2.12n (voir résurrection). –  en haut  : cf. 1.5 ; Ga 4.26 ; Ph 3.14,20s ; voir aussi Mt 6.20,33 ; Jn 3.31. –  où le Christ est assis… Ps 110.1 ; Ep 1.20 ; Hé 1.3n.'
  - type: text
    content: 'Si donc vous vous êtes réveillés avec le Christ, cherchez les choses d''en haut, où le Christ est assis à la droite de Dieu. '
  '10':
  - type: note
    content: 'le nouveau Ep 2.15 ; 4.24 ; cf. Rm 6.4 ; 13.14 ; 1Co 15.45 ; 2Co 5.17 ; Ga 3.27 ; voir aussi Ez 36.26s. –  qui se renouvelle Rm 12.2+ ; 2Co 4.16. –  de la connaissance  : autre traduction d''une pleine connaissance, cf. 1.9n. –  selon l''image…  : cf. 1.15 ; Gn 1.26s ; Rm 8.29 ; 1Co 15.49. –  qui l''a créé  : autre traduction qui le crée.'
  - type: text
    content: 'et vous avez revêtu le nouveau, qui se renouvelle en vue de la connaissance, selon l''image de celui qui l''a créé. '
  '11':
  - type: note
    content: 'Ga 3.28+ ; cf. 1Co 12.13. –  Grec / Juif Rm 1.14n,16+ ; 10.12. –  ni circoncis ni incirconcis  : litt. circoncision et incirconcision 4.11n  ; Ga 6.15. – Les Scythes, peuple localisé au nord de la mer Noire, passaient aux yeux des Grecs pour les plus sauvages des barbares (Rm 1.14n). –  esclave / homme libre 1Co 7.22. –  le Christ est tout et en tous (autre traduction en tout) : cf. 1Co 15.28 ; Ep 1.23.'
  - type: text
    content: Il n'y a là ni Grec ni Juif, ni circoncis ni incirconcis, ni barbare ni Scythe, ni esclave ni homme libre ; mais le Christ est tout et en tous.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ep 4.2,32 ; 5.1s ; voir aussi Mt 11.29 ; Ga 5.22 ; Ph 2.1-4. –  choisis… Rm 8.33 ; 1P 2.9. – Voir saints . –  d''une tendresse magnanime  : litt. d''entrailles de magnanimité cf. Lc 1.78n  ; Phm 7n. Sur le terme correspondant à magnanimité , voir Rm 12.1n.'
  - type: text
    content: 'Ainsi donc, vous qui êtes choisis par Dieu, saints et bien-aimés, revêtez-vous d''une tendresse magnanime, de bonté, d''humilité, de douceur, de patience. '
  '13':
  - type: note
    content: 'Supportez-vous  : même verbe en Mt 17.17. –  faites-vous grâce Rm 8.32n  ; 2Co 2.7. –  comme le Seigneur (certains mss portent comme le Christ, comme Dieu, comme Dieu en Christ) …  : cf. Jn 15.12 ; Rm 15.7 ; Ep 5.2 ; cf. Mt 6.14 ; 18.21-35.'
  - type: text
    content: 'Supportez-vous les uns les autres et faites-vous grâce, si quelqu''un a à se plaindre d''un autre ; comme le Seigneur vous a fait grâce, vous aussi, faites de même. '
  '14':
  - type: note
    content: 'par-dessus tout… l''amour  : cf. Rm 13.8-10 ; 1Co 13 ; 16.14. –  le lien parfait  : litt. le lien de la perfection ou de l''accomplissement  ; on pourrait aussi comprendre le lien qui porte à l''accomplissement ou à la perfection  ; cf. 1.28n  ; Ep 4.3.'
  - type: text
    content: 'Mais par-dessus tout, revêtez-vous de l''amour, qui est le lien parfait. '
  '15':
  - type: note
    content: 'la paix du Christ 1.20+ ; cf. Jn 14.27 ; voir aussi Ph 4.7 ; 2Th 3.16. –  un seul corps 1.18+ ; Rm 12.5+ ; Ep 4.4. – Voir cœur. –  reconnaissants  : le terme grec est apparenté au verbe habituellement traduit par rendre grâce, 1.3+ ; Ep 5.4.'
  - type: text
    content: Que la paix du Christ, à laquelle vous avez été appelés en un seul corps, règne dans votre cœur. Soyez reconnaissants !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ep 4.29 ; 1Th 1.8. –  avec toute sa richesse  : litt. richement  ; autre traduction largement , cf. 1Tm 6.17 ; Tt 3.6 ; 2P 1.11. –  avertissez-vous Rm 15.14 ; 1Th 5.11. –  en toute sagesse 1.28. –  chants spirituels  : Ep 5.19 ; voir esprit. –  dans la grâce  : autre traduction avec gratitude . –  chantez… Ac 16.25+ ; cf. 1Co 14.15,26n  ; Ep 5.18s.'
  - type: text
    content: 'Que la parole du Christ habite en vous avec toute sa richesse ; instruisez-vous et avertissez-vous en toute sagesse, par des cantiques, des hymnes, des chants spirituels ; dans la grâce, chantez à Dieu de tout votre cœur. '
  '17':
  - type: note
    content: Cf. v. 23 ; 1Co 10.31. –  au nom du Seigneur Jésus 1Co 5.4 ; Ph 2.10 ; Jc 5.14. –  rendant grâce 1.3+ ; Ep 5.20+.
  - type: text
    content: Quoi que vous fassiez, en parole ou en œuvre, faites tout au nom du Seigneur Jésus, en rendant grâce par lui à Dieu, le Père.
  - type: heading
    content: Maris et femmes, enfants et parents
  '18':
  - type: text
    content: ' '
  - type: note
    content: 1Co 7 ; 11.3 ; 14.34+ ; Ep 5.22-24 ; Tt 2.4s ; 1P 3.1-6.
  - type: text
    content: 'Femmes, soyez soumises à votre mari, comme il convient dans le Seigneur. '
  '19':
  - type: note
    content: Ep 5.25-33 ; 1P 3.7.
  - type: text
    content: 'Maris, aimez votre femme, et ne vous aigrissez pas contre elle. '
  '2':
  - type: note
    content: Cf. Ph 3.19s.
  - type: text
    content: 'Pensez à ce qui est en haut, et non pas à ce qui est sur la terre. '
  '20':
  - type: note
    content: 'Ep 6.1-3 ; Hé 12.6-11 ; 1P 5.5. –  agréé dans (ou par) le Seigneur  : cf. Ep 5.10 (tournure légèrement différente).'
  - type: text
    content: 'Enfants, obéissez en tout à vos parents, car cela est agréé dans le Seigneur. '
  '21':
  - type: note
    content: n'exaspérez pas ou ne provoquez pas, ne poussez pas à bout  ; le même verbe apparaît en 2Co 9.2 avec le sens positif de stimuler  ; cf. Ep 6.4 (c'est un autre verbe qui est traduit par irriter).
  - type: text
    content: Pères, n'exaspérez pas vos enfants, de peur qu'ils ne se découragent.
  - type: heading
    content: Esclaves et maîtres
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Esclaves Ep 6.5nss ; voir l''introduction à Philémon ; cf. 1Co 7.21-23 ; 1Tm 6.1s ; Tt 2.9s ; Phm 16 ; 1P 2.18-20. –  maîtres et Seigneur traduisent un même mot grec, également en 4.1. – Voir chair . – Voir cœur . –  crainte du Seigneur  : cf. Ep 5.21.'
  - type: text
    content: 'Esclaves, obéissez en tout à vos maîtres selon la chair ; non pas seulement sous leurs yeux, comme s''il s''agissait de plaire à des humains, mais avec simplicité de cœur, dans la crainte du Seigneur. '
  '23':
  - type: note
    content: V. 17+. –  de toute votre âme Ep 6.6n.
  - type: text
    content: 'Quoi que vous fassiez, travaillez-y de toute votre âme, comme pour le Seigneur, et non pour des humains, '
  '24':
  - type: note
    content: 'l''héritage 1.12+ ; cf. Ga 4.1s. –  Servez comme des esclaves v. 22n  ; cf. 4.12 ; Rm 12.11. –  vrai  : sous-entendu dans le texte.'
  - type: text
    content: 'sachant que vous recevrez du Seigneur l''héritage en récompense. Servez comme des esclaves du vrai Seigneur, le Christ. '
  '25':
  - type: note
    content: 'celui qui agit injustement…  : autre traduction qui fait du tort le subira lui-même. –  partialité  : voir Ac 10.34n  ; cf. Dt 10.17 ; Rm 2.11 ; 1P 1.17.'
  - type: text
    content: 'Car celui qui agit injustement recueillera l''injustice qu''il a faite : il n''y a pas de partialité.'
  '3':
  - type: note
    content: Cf. 2.13 ; Rm 6.2ss.
  - type: text
    content: 'Car vous êtes morts, et votre vie est cachée avec le Christ en Dieu. '
  '4':
  - type: note
    content: 'votre vie  : certains mss portent notre vie  ; cf. Ph 1.21+ ; voir aussi Jn 5.24 ; Ga 2.20 ; 1Jn 5.12. –  se manifestera / vous vous manifesterez  : litt. sera manifesté / vous serez manifestés 1.26 ; 4.4n  ; cf. Lc 17.30 ; 1Jn 2.28 ; 3.1s ; voir aussi Rm 8.19 ; 1Co 15.23 ; 1Th 4.17 ; 1P 1.6-8.'
  - type: text
    content: Quand le Christ, votre vie, se manifestera, alors vous aussi vous vous manifesterez avec lui, dans la gloire.
  - type: heading
    content: L'homme ancien et l'homme nouveau
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Faites donc mourir  : cf. Rm 6.6-11 ; 8.13 ; Ga 5.24. –  ce qui n''est que terrestre  : litt. les parties du corps (ou les membres ) (qui sont) sur la terre , cf. Rm 7.5 ; voir aussi Mc 9.43-47 ; selon une tradition orientale, les membres de l''homme représentaient ses vices ou ses vertus (souvent au nombre de cinq, cf. v. 8,12 ; voir aussi Jn 8.51n). –  l''inconduite sexuelle… Rm 1.29+ ; 1Co 5.1n  ; Ep 4.19-31 ; 5.3-5. –  impureté  : voir pur, impur. –  mauvais désirs  : cf. Rm 1.24+.'
  - type: text
    content: 'Faites donc mourir ce qui n''est que terrestre : l''inconduite sexuelle, l''impureté, les passions, les mauvais désirs et l''avidité, qui est idolâtrie. '
  '6':
  - type: note
    content: sur les rebelles, litt. sur les fils de la rébellion, comme en Ep 2.2n  ; 5.6 ; les termes correspondants sont absents de plusieurs mss ; cf. Mt 3.7.
  - type: text
    content: 'C''est pour cela que la colère de Dieu vient sur les rebelles. '
  '7':
  - type: note
    content: '1.21 ; Ep 2.2ns ; Tt 3.3. –  ainsi  : litt. en ces choses-là ou parmi ces gens-là.'
  - type: text
    content: 'C''est à cela que vous vous adonniez autrefois, lorsque vous viviez ainsi. '
  '8':
  - type: note
    content: 'rejetez (ou défaites-vous de) tout cela, même verbe en Rm 13.12 ; Ep 4.22,25 ; Hé 12.1 ; Jc 1.21 ; 1P 2.1n. –  calomnie  : le mot grec correspondant a donné notre mot blasphème  ; cf. Ep 4.29,31 ; voir aussi 5.4n.'
  - type: text
    content: 'Mais maintenant, vous aussi, rejetez tout cela : colère, animosité, malfaisance, calomnie, paroles choquantes sortant de votre bouche. '
  '9':
  - type: note
    content: 'Ne vous mentez pas Ep 4.25 ; Jc 3.14. –  vous vous êtes dépouillés de (ou vous avez dépouillé, cf. 2.15n) l''homme ancien  : cf. Ep 4.22,24n. –  avec ses agissements ou ses pratiques, cf. Rm 8.13.'
  - type: text
    content: 'Ne vous mentez pas les uns aux autres : vous vous êtes dépouillés de l''homme ancien, avec ses agissements, '
