  - type: text
    text: 'Athalie, mère d''Achazia, vit que son fils était mort. Elle fit disparaître toute la descendance royale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Athalie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est la grand-mère du jeune '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', futur roi de Juda. Si elle tient à faire périr tous ses petits-fils, c''est pour assouvir un désir de vengeance : Jéhu, bras séculier du parti fidèle à YHWH, avait exterminé les soixante-dix frères d''Athalie (cf. 10.1-10) ; elle est la seule baaliste de sang royal à avoir survécu à cette épuration sanglante. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fils d'Achazia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fils de son frère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ce qui, compte tenu de ce qui précède, revient au même). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'enleva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le vola. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'on mettait à mort…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction possible ici (non pas en 2Ch 22.11)'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ceux qui allaient le mettre à mort, lui et sa nourrice, (étaient) dans la chambre… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle le mit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu possible du texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la chambre des lits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette désignation n''apparaît que dans ce texte et dans son parallèle en 2Ch 22.11 ; il s''agit peut-être d''une dépendance du temple, qui serait alors réservée aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On le mit à l'abri
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils le mirent à l'abri.
    marker-yv: yv-n
  - type: text
    text: 'Mais Yehoshéba, fille du roi Joram, sœur d''Achazia, prit Joas, fils d''Achazia, et l''enleva d''entre les fils du roi qu''on mettait à mort : elle le mit avec sa nourrice dans la chambre des lits. On le mit à l''abri d''Athalie et il ne fut pas mis à mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec elle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : avec la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nourrice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou bien avec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yehoshéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
