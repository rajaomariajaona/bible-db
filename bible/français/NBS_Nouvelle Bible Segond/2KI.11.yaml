      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 3.3.'
    marker-yv: yv-n
  - type: text
    text: 'Il resta six ans caché avec elle dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', tandis qu''Athalie régnait sur le pays.'
