    marker-yv: yv-n
  - type: text
    text: 'La septième année, Joïada envoya chercher les chefs de cent parmi les Cariens et les gardes du corps. Il les fit venir auprès de lui dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il conclut une alliance pour eux, leur fit prêter serment dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et leur fit voir le fils du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sens probable d''un texte difficile. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceux qui prennent leur service le jour du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entrant (durant) le sabbat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: monteront la garde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression traduite ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: assureront le service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Nb 1.53'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis il leur donna ces ordres : Voici ce que vous ferez : un tiers d''entre vous, ceux qui prennent leur service le jour du sabbat, monteront la garde à la maison du roi ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la porte de Sour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de Yesod '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Fondation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), selon 2Ch 23.5. LXX la désigne comme la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: porte des chemins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' comme la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: porte cachée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Elle pourrait se trouver, selon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ', non loin de la source de Guihôn. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: alternativement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction conjecturale. Autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour en contrôler l'accès
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; absent de LXX.'
    marker-yv: yv-n
  - type: text
    text: 'un tiers se tiendra à la porte de Sour, et un tiers à la porte derrière les gardes du corps ; vous monterez alternativement la garde de la maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ceux qui quittent leur service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ceux qui sortent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . La programmation du jour du sabbat pour la prise de pouvoir permet à Joïada de mobiliser la totalité des troupes, celles qui quittent leur service comme celles qui prennent leur service ce jour-là.
    marker-yv: yv-n
  - type: text
    text: 'Vos deux autres divisions, tous ceux qui quittent leur service le jour du sabbat, monteront la garde de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' auprès du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quiconque s'avancera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : par-delà les raisons touchant à la sécurité du jeune roi, on peut penser que les précautions mises en place par Joïada ont aussi des raisons religieuses, cf. Ex 19.12 ; Nb 1.51,53. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: où qu'il aille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand il sortira et quand il rentrera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur cette expression, voir Nb 27.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 18.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 3.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Ps 121.8.'
    marker-yv: yv-n
  - type: text
    text: Vous entourerez le roi de toutes parts, chacun les armes à la main, et quiconque s'avancera vers les rangs sera mis à mort ; vous serez près du roi où qu'il aille.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les chefs de cent firent exactement ce que Joïada, le prêtre, avait ordonné. Chacun prit ses hommes, ceux qui prenaient leur service le jour du sabbat et ceux qui quittaient leur service le jour du sabbat, et ils se rendirent auprès de Joïada, le prêtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les lances
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le pluriel est attesté par un ms hébreu et LXX, Syr et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ', ainsi qu''en 2Ch 23.9. Le texte hébreu traditionnel comporte un singulier. Les armes étaient d''ordinaire conservées dans le palais (1R 14.27s) mais on connaît le cas d''armes exceptionnelles conservées dans des temples (1S 21.9s ; 31.10) ; c''est le cas des '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'carquois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: boucliers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ?) d''or pris par David aux Araméens (2S 8.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss). La remise de ces armes aux guerriers qui vont sacrer Joas souligne la continuité au sein de la dynastie davidique.
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre remit aux chefs de cent les lances et les carquois qui avaient appartenu au roi David et qui étaient dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'côté droit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: côté gauche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Ex 27.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 6.8 ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sud / nord. '
    - type: usfm
