document_id: 2KI.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Athalie s'empare du pouvoir à Jérusalem
  - type: heading
    content: 2Ch 22.10-12
  - type: text
    content: ' '
  - type: note
    content: 'Athalie  : cf. 8.18n. –  fit disparaître  : litt. se leva et fit disparaître , de même en 2Ch 22.10n.'
  - type: text
    content: 'Athalie, mère d''Achazia, vit que son fils était mort. Elle fit disparaître toute la descendance royale. '
  '10':
  - type: note
    content: 'les lances  : le pluriel est attesté par un ms hébreu et LXX, Syr et Vg, ainsi qu''en 2Ch 23.9. Le texte hébreu traditionnel comporte un singulier. Les armes étaient d''ordinaire conservées dans le palais (1R 14.27s) mais on connaît le cas d''armes exceptionnelles conservées dans des temples (1S 21.9s ; 31.10) ; c''est le cas des carquois (ou boucliers  ?) d''or pris par David aux Araméens (2S 8.7nss). La remise de ces armes aux guerriers qui vont sacrer Joas souligne la continuité au sein de la dynastie davidique.'
  - type: text
    content: 'Le prêtre remit aux chefs de cent les lances et les carquois qui avaient appartenu au roi David et qui étaient dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '11':
  - type: note
    content: 'côté droit / côté gauche  : voir Ex 27.14n  ; 1R 6.8 ; autre traduction sud / nord. –  près de l''autel…  : autre traduction par rapport à l''autel et à la Maison (c.-à-d. au temple).'
  - type: text
    content: 'Les gardes du corps, les armes à la main, se postèrent depuis le côté droit de la Maison jusqu''au côté gauche de la Maison, près de l''autel et près de la Maison, pour entourer le roi. '
  '12':
  - type: note
    content: 'Le prêtre fit avancer  : litt. il fit sortir. –  diadème  : autre traduction signe de mise à part (hébreu nézer) ; insigne de la royauté (1S 1.10 ; Ps 89.40 ; 132.18) ou de la fonction du grand prêtre (Ex 29.6 ; 39.30 ; Lv 8.9). –  le Témoignage  : le terme correspondant désigne habituellement les tablettes de la loi conservées dans le coffre de l''alliance (Ex 16.34n  ; 25.16,21 ; 26.33s ; 31.18). Certains pensent qu''il s''agit ici d''un document reprenant les promesses faites à la dynastie, ou la liste des droits et devoirs du roi, cf. Dt 17.18-20 ; Ps 89 ; 132.12n  ; d''autres y voient un insigne royal. Quelques-uns modifient le texte hébreu traditionnel pour lire les chaînettes (cf. 2S 1.10). –  Ils l''investirent…  : les verbes au pluriel renvoient soit à l''action conjointe des troupes et du prêtre (cf. 1R 1.38) soit à celle du peuple dont il est question au v. 13. Comparer avec LXX il le fit roi et lui conféra l''onction.'
  - type: text
    content: 'Le prêtre fit avancer le fils du roi et mit sur lui le diadème et le Témoignage. Ils l''investirent de la royauté et lui conférèrent l''onction. Frappant des mains, ils dirent : Vive le roi !'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les gardes du corps et le peuple  : litt. ceux qui courent (v. 4n) , le peuple , avec pour le premier mot une forme araméenne du pluriel. LXX ceux du peuple qui couraient , cf. 2Ch 23.12. Le peuple qui jusque-là était comme tenu à l''écart va prendre de plus en plus part aux événements.'
  - type: text
    content: 'Athalie entendit les gardes du corps et le peuple. Elle vint vers le peuple, à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '14':
  - type: note
    content: 'sur l''estrade  : autre traduction près de la colonne, cf. 2Ch 11.13n. –  selon l''usage  : le mot signifie aussi décision de justice, droit  ; cf. Jg 13.12n. –  les chefs et les trompettes étaient près du roi  : autre lecture possible avec LXX et Vg les chants et (le son) des trompettes (montaient) vers le roi.'
  - type: text
    content: 'et regarda : le roi se tenait sur l''estrade, selon l''usage ; les chefs et les trompettes étaient près du roi, tout le peuple du pays était dans la joie et sonnait des trompettes. Athalie déchira ses vêtements et cria : Conspiration ! Conspiration ! '
  '15':
  - type: note
    content: 'commandants de l''armée  : cf. Nb 31.14n. –  mettez à mort  : certains mss et 2Ch 23.14 portent que soit mis à mort.'
  - type: text
    content: 'Alors Joïada, le prêtre, donna cet ordre aux chefs de cent, les commandants de l''armée : Faites-la sortir en dehors des rangs, et mettez à mort par l''épée quiconque la suivra. Car le prêtre avait dit : Qu''elle ne soit pas mise à mort dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '16':
  - type: note
    content: 'Cf. v. 20. –  l''entrée des chevaux  : cf. Jr 31.40 ; Né 3.28n.'
  - type: text
    content: 'On mit la main sur elle, et elle arriva à la maison du roi par le chemin de l''entrée des chevaux : c''est là qu''elle fut mise à mort.'
  - type: heading
    content: Réforme de Joïada
  - type: heading
    content: 2Ch 23.16-21
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 23.3. –  pour que celui-ci soit le peuple…  : litt. pour être le peuple de YHWH . –  et entre le roi et le peuple  : cette précision est absente de plusieurs mss de LXX comme de 2Ch 23.16. Sur une telle alliance, voir 2S 5.3.'
  - type: text
    content: 'Joïada conclut l''alliance entre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le roi et le peuple, pour que celui-ci soit le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et entre le roi et le peuple. '
  '18':
  - type: note
    content: 'ils la démolirent, ils brisèrent consciencieusement ses autels…  : d''après une tradition de lecture du texte hébreu, cf. 2Ch 23. Autre lecture traditionnelle  : ils la démolirent avec son autel, ils brisèrent consciencieusement ses images. –  devant les autels  : plusieurs mss de LXX et de Tg, Syr et Vg lisent devant l''autel. –  Le prêtre…  : Joïada craint-il des représailles venant d''adeptes de Baal ou une extension au temple du Seigneur de l''ardeur iconoclaste de la foule ?'
  - type: text
    content: 'Tout le peuple du pays entra dans la maison du Baal ; ils la démolirent, ils brisèrent consciencieusement ses autels et ses images et tuèrent devant les autels Mattân, prêtre du Baal. Le prêtre Joïada nomma des surveillants pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'les Cariens, les gardes du corps  : autre texte en 2Ch 23.20. –  Alors Joas…  : litt. et il s''assit (LXX ils le firent asseoir) sur le trône des rois.'
  - type: text
    content: 'Il prit les chefs de cent, les Cariens, les gardes du corps et tout le peuple du pays. Ils firent descendre le roi de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et arrivèrent à la maison du roi par le chemin de la porte des gardes du corps. Alors Joas s''assit sur le trône royal. '
  '2':
  - type: note
    content: 'Athalie est la grand-mère du jeune Joas, futur roi de Juda. Si elle tient à faire périr tous ses petits-fils, c''est pour assouvir un désir de vengeance : Jéhu, bras séculier du parti fidèle à YHWH, avait exterminé les soixante-dix frères d''Athalie (cf. 10.1-10) ; elle est la seule baaliste de sang royal à avoir survécu à cette épuration sanglante. –  fils d''Achazia  : LXX porte fils de son frère (ce qui, compte tenu de ce qui précède, revient au même). –  l''enleva  : litt. le vola. –  qu''on mettait à mort…  : autre traduction possible ici (non pas en 2Ch 22.11)  : ceux qui allaient le mettre à mort, lui et sa nourrice, (étaient) dans la chambre… –  elle le mit  : sous-entendu possible du texte. –  la chambre des lits  : cette désignation n''apparaît que dans ce texte et dans son parallèle en 2Ch 22.11 ; il s''agit peut-être d''une dépendance du temple, qui serait alors réservée aux prêtres. –  On le mit à l''abri  : autre traduction ils le mirent à l''abri.'
  - type: text
    content: 'Mais Yehoshéba, fille du roi Joram, sœur d''Achazia, prit Joas, fils d''Achazia, et l''enleva d''entre les fils du roi qu''on mettait à mort : elle le mit avec sa nourrice dans la chambre des lits. On le mit à l''abri d''Athalie et il ne fut pas mis à mort. '
  '20':
  - type: text
    content: Tout le peuple du pays se réjouissait, et la ville était tranquille. Quant à Athalie, on l'avait mise à mort par l'épée, dans la maison du roi.
  '3':
  - type: note
    content: 'avec elle  : avec la nourrice, ou bien avec Yehoshéba. –  dans la maison du Seigneur  : cf. 1S 3.3.'
  - type: text
    content: 'Il resta six ans caché avec elle dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', tandis qu''Athalie régnait sur le pays.'
  - type: heading
    content: Joas est sacré roi
  - type: heading
    content: 2Ch 23.1-21
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Joïada  : LXX précise le prêtre  ; cf. v. 9. Pour 2Ch 22.11, il est aussi le mari de Yehoshéba. –  Cariens  : l''existence de mercenaires venus de cette région située à l''ouest de la Turquie (autour de Milet) est attestée à Babylone, en Egypte et même en Perse ; sur la présence de mercenaires étrangers au service des rois de Juda, cf. 2S 15.18 ; 20.7 ; 1R 1.38. –  gardes du corps  : litt. coureurs , terme qui désigne des troupes à pied, cf. 1S 8.11+ ; 22.17n  ; 1R 1.5 ; 14.27n  ; LXX transcrit le mot hébreu sans le traduire, y voyant sans doute le nom d''une ethnie. –  Il conclut une alliance  : cf. Gn 15.18n. La plupart des mss de LXX portent une alliance du Seigneur . –  dans la maison du Seigneur  : les mss de LXX ont lu devant le Seigneur ou dans l''alliance du Seigneur.'
  - type: text
    content: 'La septième année, Joïada envoya chercher les chefs de cent parmi les Cariens et les gardes du corps. Il les fit venir auprès de lui dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il conclut une alliance pour eux, leur fit prêter serment dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et leur fit voir le fils du roi. '
  '5':
  - type: note
    content: 'Sens probable d''un texte difficile. –  ceux qui prennent leur service le jour du sabbat  : litt. entrant (durant) le sabbat. –  monteront la garde  : expression traduite ailleurs par assureront le service, cf. Nb 1.53n.'
  - type: text
    content: 'Puis il leur donna ces ordres : Voici ce que vous ferez : un tiers d''entre vous, ceux qui prennent leur service le jour du sabbat, monteront la garde à la maison du roi ; '
  '6':
  - type: note
    content: 'la porte de Sour ou de Yesod (Fondation), selon 2Ch 23.5. LXX la désigne comme la porte des chemins, et Syr comme la porte cachée. Elle pourrait se trouver, selon Tg, non loin de la source de Guihôn. –  alternativement  : traduction conjecturale. Autre traduction pour en contrôler l''accès  ; absent de LXX.'
  - type: text
    content: 'un tiers se tiendra à la porte de Sour, et un tiers à la porte derrière les gardes du corps ; vous monterez alternativement la garde de la maison. '
  '7':
  - type: note
    content: 'ceux qui quittent leur service  : litt. ceux qui sortent. La programmation du jour du sabbat pour la prise de pouvoir permet à Joïada de mobiliser la totalité des troupes, celles qui quittent leur service comme celles qui prennent leur service ce jour-là.'
  - type: text
    content: 'Vos deux autres divisions, tous ceux qui quittent leur service le jour du sabbat, monteront la garde de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' auprès du roi. '
  '8':
  - type: note
    content: 'quiconque s''avancera…  : par-delà les raisons touchant à la sécurité du jeune roi, on peut penser que les précautions mises en place par Joïada ont aussi des raisons religieuses, cf. Ex 19.12 ; Nb 1.51,53. –  où qu''il aille  : litt. quand il sortira et quand il rentrera  ; sur cette expression, voir Nb 27.17n  ; 1S 18.5n  ; 1R 3.7n  ; voir aussi Ps 121.8.'
  - type: text
    content: Vous entourerez le roi de toutes parts, chacun les armes à la main, et quiconque s'avancera vers les rangs sera mis à mort ; vous serez près du roi où qu'il aille.
  '9':
  - type: text
    content: 'Les chefs de cent firent exactement ce que Joïada, le prêtre, avait ordonné. Chacun prit ses hommes, ceux qui prenaient leur service le jour du sabbat et ceux qui quittaient leur service le jour du sabbat, et ils se rendirent auprès de Joïada, le prêtre. '
