        text: le prêtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. v. 9. Pour 2Ch 22.11, il est aussi le mari de Yehoshéba. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cariens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : l''existence de mercenaires venus de cette région située à l''ouest de la Turquie (autour de Milet) est attestée à Babylone, en Egypte et même en Perse ; sur la présence de mercenaires étrangers au service des rois de Juda, cf. 2S 15.18 ; 20.7 ; 1R 1.38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gardes du corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: coureurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', terme qui désigne des troupes à pied, cf. 1S 8.11+ ; 22.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 1.5 ; 14.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; LXX transcrit le mot hébreu sans le traduire, y voyant sans doute le nom d''une ethnie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il conclut une alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 15.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. La plupart des mss de LXX portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une alliance du Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la maison du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les mss de LXX ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'devant le Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
