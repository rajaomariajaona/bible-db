document_id: PSA.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur fait son entrée au temple
  - type: text
    content: ' '
  - type: note
    content: 'Psaume  : LXX ajoute pour le premier jour de la semaine. –  au Seigneur … 50.12 ; 89.12 ; 95.4s ; 98.7 ; Ex 19.5 ; 1Co 10.26. –  tout ce qui s''y trouve ou, plus littéralement, ce qui la remplit  ; expressions comparables en 50.12 ; 96.11 ; 98.7 ; Dt 33.16 ; Es 34.1 ; Jr 8.16n  ; voir aussi Es 6.3.'
  - type: text
    content: De David. Psaume.
  - type: text
    content: 'C''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''appartient la terre, avec tout ce qui s''y trouve,'
  - type: text
    content: le monde avec tous ceux qui l'habitent.
  '10':
  - type: text
    content: Qui donc est ce roi glorieux ?
  - type: text
    content: '– Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: 'c''est lui, le roi glorieux ! '
  - type: text
    content: Pause.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 75.4 ; 104.5 ; 136.6 ; Jb 26.7 ; 38.4-6.
  - type: text
    content: Car c'est lui qui la fonde sur les mers
  - type: text
    content: et qui l'installe sur les fleuves.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 15. –  se tiendra debout  : litt. se lèvera  ; cf. 1.5n. –  dans son sanctuaire  : litt. dans le lieu de sa sainteté.'
  - type: text
    content: 'Qui montera à la montagne du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Qui se tiendra debout dans son sanctuaire ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'les mains innocentes et le cœur pur  : cf. 26.6 ; Gn 20.5 ; Es 33.14s ; Mt 5.8. –  livre  : litt. porte . –  sa vie ou son être (6.4n), d''après certains mss hébreux et des versions anciennes ; autre texte mon être  ; ainsi lue l''expression rappelle celle d''Ex 20.7 ( invoquer le nom du Seigneur pour tromper ou pour faire illusion ).'
  - type: text
    content: – Celui qui a les mains innocentes et le cœur pur,
  - type: text
    content: qui ne livre pas sa vie à l'illusion
  - type: text
    content: et qui ne jure pas pour tromper.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'la bénédiction du Seigneur 129.8. –  la justice  : autre traduction la victoire . –  Dieu de son salut  : cf. 18.47 ; 25.5 ; 27.9 ; 51.16 ; 65.6 ; 79.9 ; 85.5 ; Es 17.10 ; Mi 7.7 ; Ha 3.18 ; 1Ch 16.35 ; cf. 1Tm 1.1.'
  - type: text
    content: 'Il obtiendra la bénédiction du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: la justice du Dieu de son salut.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Tels sont…  : litt. telle est la génération de ceux qui te cherchent, de ceux…  ; cf. 14.5n  ; 73.15n. –  ceux qui te recherchent…  : litt. ceux qui recherchent ta face  ; autre traduction ceux qui recherchent ta face, ô Jacob  ; certains modifient le texte hébreu traditionnel d''après LXX pour lire ceux qui recherchent la face du Dieu de Jacob  ; cf. 9.11+ ; 27.8+ ; 105.4 ; 2S 21.1n  ; Os 5.15.'
  - type: text
    content: Tels sont ceux qui le cherchent,
  - type: text
    content: 'ceux qui te recherchent, tel est Jacob ! '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Portes…  : cf. 118.19s. –  linteaux  : le mot signifie habituellement tête(s)  ; de même au v. 9. –  roi glorieux  : cf. 29.9s ; Ex 24.16s ; 1Co 2.8 ; le Seigneur (v. 8,10) est ici décrit comme un roi victorieux, faisant une entrée triomphale (v. 9) dans son palais (le temple) ; voir aussi 2S 6.12-16 ; 1R 8.1-11 ; Ez 44.2 ; Ml 3.1.'
  - type: text
    content: Portes, élevez vos linteaux !
  - type: text
    content: Elevez-vous, portails antiques !
  - type: text
    content: Que le roi glorieux fasse son entrée !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le fort…  : cf. Jr 32.18. –  le héros  : autres traductions le vaillant ; le guerrier.'
  - type: text
    content: Qui est ce roi glorieux ?
  - type: text
    content: '– Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le fort, le héros,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le héros de la guerre.'
  '9':
  - type: text
    content: Portes, élevez vos linteaux !
  - type: text
    content: Elevez-les, portails antiques !
  - type: text
    content: Que le roi glorieux fasse son entrée !
