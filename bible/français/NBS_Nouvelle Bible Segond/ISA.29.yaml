document_id: ISA.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem assiégée, puis délivrée
  - type: text
    content: ' '
  - type: note
    content: 'Ariel  : l''étymologie de ce nom, qui désigne ici Jérusalem, est incertaine  : ville de Dieu, montagne de Dieu ou encore lion de Dieu (cf. Gn 49.8-10 ; Am 1.2) ; cf. v. 2n. –  cité contre laquelle David (37.35) a dressé son camp  : c.-à-d. cité qu''il a assiégée , ou cité où il a élu domicile ( contre laquelle est sous-entendu dans le texte) ; cf. 2S 5.6-9. –  année à année  : certains comprennent encore une année (cf. 32.10). –  fêtes Lv 23.4-37 ; voir calendrier.'
  - type: text
    content: Quel malheur pour Ariel, Ariel,
  - type: text
    content: la cité contre laquelle David a dressé son camp !
  - type: text
    content: Ajoutez année à année,
  - type: text
    content: laissez les fêtes accomplir leur cycle,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'souffle ou esprit (même terme au v. 24). –  torpeur ou profond sommeil , cf. Gn 2.21+ ; 2R 6.18 ; Rm 11.8. –  prophètes / visionnaires Mi 3.6s. –  voilé  : litt. couvert.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a répandu sur vous'
  - type: text
    content: un souffle de torpeur,
  - type: text
    content: il a fermé vos yeux (les prophètes),
  - type: text
    content: il a voilé vos têtes (les visionnaires).
  '11':
  - type: text
    content: ' '
  - type: note
    content: livre cacheté 8.16 ; Jr 32.9-14 ; cf. Ap 5.1-5.
  - type: text
    content: 'Toute cette vision est pour vous comme les mots d''un livre cacheté que l''on donne à un homme qui sait lire, en disant : « Lis donc cela, je te prie ! » et qui répond : « Je ne peux pas, car il est cacheté. » '
  '12':
  - type: note
    content: Cf. Ac 8.30s.
  - type: text
    content: 'Ou comme un livre que l''on donne à un homme qui ne sait pas lire, en disant : « Lis donc cela, je te prie ! » et qui répond : « Je ne sais pas lire. »'
  '13':
  - type: text
    content: ' '
  - type: note
    content: '1.11-15 ; Ps 78.36s ; Mt 15.8-9/  ; Col 2.22. –  s''approche de moi  : litt. s''approche . – Voir cœur et crainte. –  un commandement…  : autre traduction un commandement humain, une leçon apprise.'
  - type: text
    content: 'Le Seigneur dit : Ainsi, quand ce peuple s''approche de moi,'
  - type: text
    content: il me glorifie de la bouche et des lèvres,
  - type: text
    content: mais son cœur est loin de moi,
  - type: text
    content: et la crainte qu'il a de moi
  - type: text
    content: n'est qu'un commandement appris des hommes.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '5.21 ; 9.5n  ; 1Co 1.19. –  je continue  : la traduction suppose une légère modification de la vocalisation traditionnelle du texte hébreu, litt. me voici – il continue… –  ira se cacher  : autre traduction se dérobera , même verbe au v. 15.'
  - type: text
    content: C'est pourquoi je continue à étonner ce peuple
  - type: text
    content: en lui donnant sujet d'étonnement sur sujet d'étonnement ;
  - type: text
    content: la sagesse des sages s'y perdra,
  - type: text
    content: et l'intelligence des intelligents ira se cacher.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.1s ; Jb 34.21s ; Jn 3.19s. –  se terrent  : litt. vont profond , cf. 31.6 ; Jr 49.8,30.'
  - type: text
    content: 'Quel malheur pour ceux qui se terrent loin du '
  - type: text
    content: Seigneur
  - type: text
    content: afin de cacher leurs projets !
  - type: text
    content: Leurs œuvres se font dans les ténèbres,
  - type: text
    content: 'et ils disent : Qui nous voit ? Qui nous connaît ?'
  '16':
  - type: text
    content: ' '
  - type: note
    content: '45.9 ; 64.7 ; Jr 18.6+ ; Rm 9.20. –  perversité  : le terme hébreu correspondant n''apparaît qu''ici et en Ez 16.34, avec le sens de faire le contraire . –  l''ouvrage / l''ouvrier  : litt. la chose faite / celui qui la fait. –  pour que le pot dise…  : autre traduction pour que l''objet façonné dise de celui qui l''a façonné.'
  - type: text
    content: Quelle perversité que la vôtre !
  - type: text
    content: Le potier doit-il être considéré comme l'argile,
  - type: text
    content: 'pour que l''ouvrage dise de l''ouvrier :'
  - type: text
    content: Il ne m'a pas fait ?
  - type: text
    content: '– pour que le pot dise de son potier :'
  - type: text
    content: Il n'a pas d'intelligence ?
  - type: heading
    content: Le grand renversement de situation
  '17':
  - type: text
    content: ' '
  - type: note
    content: verger / forêt 10.18 ; cf. 32.15. – Le mot hébreu pour verger ( karmel ) désigne aussi la chaîne du Carmel, juste au sud des monts du Liban , à la limite septentrionale d'Israël.
  - type: text
    content: Ne s'en faut-il pas d'un bref instant
  - type: text
    content: pour que le Liban se change en verger,
  - type: text
    content: et que le verger soit considéré comme une forêt ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sourds / aveugles  : voir v. 9-12,24 ; 6.10 ; cf. 32.3s ; 35.5 ; 42.7,16-19 ; 43.8 ; Mt 11.5/ /. –  livre v. 11s ; voir aussi 30.8 ; 34.16n. –  de l''obscurité…  : autre traduction sortant de l''obscurité…'
  - type: text
    content: En ce jour-là, les sourds entendront les paroles du livre ;
  - type: text
    content: de l'obscurité et des ténèbres,
  - type: text
    content: les yeux des aveugles verront.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'affligés / pauvres 11.4 ; 41.17 ; Mt 5.3s. –  dans le Seigneur ou grâce au Seigneur . –  débordante  : autre traduction grandissante. –  Saint d''Israël 1.4+.'
  - type: text
    content: 'Les affligés auront dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' une joie débordante,'
  - type: text
    content: et les plus pauvres des humains
  - type: text
    content: feront du Saint d'Israël leur allégresse.
  '2':
  - type: text
    content: ' '
  - type: note
    content: plaintes / gémissements 33.7-9 ; les deux termes font assonance en hébreu ; on les retrouve en Lm 2.5. –  comme un foyer sacrificiel… v. 1n  ; le mot ariel désigne aussi le foyer de l'autel (Ez 43.15ns) ; voir aussi 30.33 ; 31.9.
  - type: text
    content: et je réduirai Ariel ;
  - type: text
    content: il y aura des plaintes et des gémissements ;
  - type: text
    content: et la ville sera pour moi comme un foyer sacrificiel (ariel).
  '20':
  - type: text
    content: ' '
  - type: note
    content: brute v. 5 ; 13.11+. –  insolent 28.14,22. –  du mal 1.13+.
  - type: text
    content: Car la brute ne sera plus,
  - type: text
    content: l'insolent aura disparu,
  - type: text
    content: tous ceux qui se tenaient à l'affût pour faire du mal seront retranchés
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'condamnaient  : litt. faisaient (ou déclaraient ) pécheur. –  en justice  : litt. dans (ou par ) une parole ou une affaire (cf. 1.23 ; 5.23 ; 10.1s). On pourrait aussi traduire pour un mot. –  qui accusait…  : cf. Am 5.10. –  sans motif  : hébreu tohou , cf. 24.10n.'
  - type: text
    content: – ceux qui condamnaient l'homme en justice,
  - type: text
    content: qui tendaient des pièges à celui qui accusait à la porte de la ville,
  - type: text
    content: et qui écartaient le juste sans motif.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. 28.16 ; 30.12,15). –  à la maison…  : en modifiant légèrement la vocalisation traditionnelle du texte hébreu, certains lisent ainsi parle le Seigneur, le Dieu (hébreu ’El ) de la maison de Jacob. –  libéré 35.10 ; 51.11. –  Abraham 41.8 ; 51.2 ; 63.16. –  plus honte 45.17.'
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: à la maison de Jacob,
  - type: text
    content: 'lui qui a libéré Abraham :'
  - type: text
    content: Maintenant Jacob n'aura plus honte,
  - type: text
    content: maintenant son visage ne pâlira plus.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'lorsque ses enfants…  : autre traduction lorsqu''il (Jacob) verra ses enfants – œuvre de mes mains (cf. 5.12+) — en son sein… Cf. 49.21 ; 54.1. –  ils reconnaîtront… pour sacré et ils reconnaîtront la sainteté traduisent un même verbe hébreu (traduction traditionnelle sanctifier , 5.16+ ; 8.13), apparenté au terme pour Saint (1.4+). – Voir nom.'
  - type: text
    content: Car, lorsque ses enfants verront
  - type: text
    content: au milieu d'eux l'œuvre de mes mains,
  - type: text
    content: ils reconnaîtront mon nom pour sacré ;
  - type: text
    content: ils reconnaîtront la sainteté du Saint de Jacob
  - type: text
    content: et ils redouteront le Dieu d'Israël ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'V. 18. –  connaîtront l''intelligence  : cf. Jb 38.4 ; Pr 1.2 ; 4.1 ; 17.27 ; 2Ch 2.11n. –  ceux qui médisent  : cf. Pr 16.28 ; 18.8 ; 26.20,22 ; voir aussi v. 8 ; 30.9.'
  - type: text
    content: ceux dont l'esprit s'égarait connaîtront l'intelligence,
  - type: text
    content: et ceux qui médisent recevront l'instruction.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tout autour de toi  : LXX a lu contre toi, comme David (cf. v. 1n), ce qui correspond à une légère variante graphique de l''hébreu ; cf. Ez 24.2-14.'
  - type: text
    content: Je dresserai mon camp tout autour de toi,
  - type: text
    content: je te cernerai par des postes armés,
  - type: text
    content: j'élèverai contre toi des ouvrages de siège.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'spectre  : cf. 2.11,17 ; 8.19 ; 1S 28.14.'
  - type: text
    content: Tu seras abaissée,
  - type: text
    content: ta parole viendra de la terre,
  - type: text
    content: tes paroles seront plus basses que la poussière ;
  - type: text
    content: ta voix sortira de terre comme celle d'un spectre,
  - type: text
    content: et c'est de la poussière que tu chuchoteras ta parole.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ennemis 1.7. –  poussière / paille 17.13s. –  tout à coup…  : cf. 30.13 ; ce dernier membre de phrase pourrait aussi être rattaché au v. 6  : tout à coup, en un instant, le Seigneur (YHWH) des Armées interviendra…'
  - type: text
    content: La multitude de tes ennemis sera comme une fine poussière,
  - type: text
    content: cette multitude de brutes sera comme la menue paille qui vole,
  - type: text
    content: et cela tout à coup, en un instant.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.27,30 ; 66.15 ; Ex 19.18 ; 1R 19.11s ; Ps 50.1 ; Jb 38.1. –  interviendra chez toi ou pour toi , cf. 10.12+ ; 24.22n  ; autre traduction tu seras visité (e) par le Seigneur (YHWH) des Armées. –  tremblement de terre 9.4n. –  un feu… dévore  : litt. une flamme d''un feu dévorant  ; cf. 9.17n  ; 30.30.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées interviendra chez toi,'
  - type: text
    content: avec le tonnerre, un tremblement de terre et un grand bruit,
  - type: text
    content: avec l'ouragan et la tempête,
  - type: text
    content: et avec un feu flamboyant qui dévore.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'rêve Ps 73.20 ; Jb 20.8. –  la multitude…  : litt. la multitude de toutes les nations , de même au v. 8 ; sur la délivrance de la menace assyrienne, cf. 31.4s ; 36—37. –  elle et sa forteresse  : autre traduction de la forteresse bâtie contre elle (et de ceux qui voudront…).'
  - type: text
    content: Et comme il en est d'un rêve, d'une vision nocturne,
  - type: text
    content: ainsi en sera-t-il de la multitude des nations
  - type: text
    content: qui combattront Ariel,
  - type: text
    content: de tous ceux qui l'attaqueront,
  - type: text
    content: elle et sa forteresse,
  - type: text
    content: et qui voudront la réduire.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'gosier  : il s''agit du même mot hébreu traditionnellement traduit par âme  ; cf. 32.6 ; 55.2 ; 56.11 ; Gn 1.20n.'
  - type: text
    content: Alors, comme celui qui a faim rêve qu'il mange,
  - type: text
    content: puis s'éveille, le gosier vide,
  - type: text
    content: et comme celui qui a soif rêve qu'il boit,
  - type: text
    content: puis s'éveille, épuisé et le gosier assoiffé ;
  - type: text
    content: ainsi en sera-t-il de la multitude des nations
  - type: text
    content: qui combattront le mont Sion.
  - type: heading
    content: Un peuple incapable de comprendre
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Attardez-vous et soyez stupéfaits  : les deux verbes hébreux correspondants font assonance, de même que ceux du vers suivant. –  Fermez les yeux…  : litt. collez-vous, collez  ; les verbes correspondants sont apparentés. Cf. 6.9s ; 32.3. –  ivres, mais… pas de vin 51.21 ; cf. 28.7+.'
  - type: text
    content: Attardez-vous et soyez stupéfaits !
  - type: text
    content: Fermez les yeux et devenez aveugles !
  - type: text
    content: Ils sont ivres, mais ce n'est pas de vin ;
  - type: text
    content: ils titubent, mais ce n'est pas sous l'effet de l'alcool.
