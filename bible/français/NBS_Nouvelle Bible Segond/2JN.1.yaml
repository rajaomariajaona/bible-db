      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Mt 10.13s ; Rm 16.17 ; 1Co 5.6,9 ; 2Th 3.6,14s ; Tt 3.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bonjour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (de) se réjouir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur cette salutation courante en grec, voir Mt 26.49'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un vient vous voir sans apporter cet enseignement, ne le recevez pas chez vous et ne lui dites même pas bonjour. '
