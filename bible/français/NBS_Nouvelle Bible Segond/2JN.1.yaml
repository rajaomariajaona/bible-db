      marker-yv: yv-n
    - type: text
      text: 'L''ancien, à la Dame choisie et à ses enfants que, moi, j''aime dans la vérité – et non pas moi seulement, mais aussi tous ceux qui connaissent la vérité – '
  '10':
  - type: usfm
