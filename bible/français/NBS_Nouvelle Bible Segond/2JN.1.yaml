document_id: 2JN.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3Jn 1. –  L''ancien  : outre son grand âge et sa position d''autorité (cf. 1P 5.1), l''auteur veut peut-être signifier par cette appellation son appartenance au groupe des témoins oculaires des événements fondateurs du christianisme (cf. v. 5 ; 1Jn 1.1-3 ; 2.7). –  la Dame  : en grec kuria , féminin de kurios, Seigneur  ; le mot désigne vraisemblablement une communauté chrétienne, mais certains y ont vu un nom propre (habituellement transcrit Kyria ). –  choisie ou élue  : cf. v. 13 ; 2Tm 2.10 ; Tt 1.1 ; 1P 2.9 ; 5.13. –  ses enfants v. 4. –  que… j''aime v. 5. –  dans la vérité  : autre traduction en vérité v. 2 ; Ep 4.15 ; 1Jn 3.18 ; 3Jn 1. –  connaissent (1Jn 2.3n) la vérité Jn 8.32 ; 1Tm 2.4 ; 4.3 ; 2Tm 3.7 ; 1Jn 2.21.'
  - type: text
    content: 'L''ancien, à la Dame choisie et à ses enfants que, moi, j''aime dans la vérité – et non pas moi seulement, mais aussi tous ceux qui connaissent la vérité – '
  '10':
  - type: note
    content: 'Cf. Mt 10.13s ; Rm 16.17 ; 1Co 5.6,9 ; 2Th 3.6,14s ; Tt 3.10. –  bonjour  : litt. (de) se réjouir  ; sur cette salutation courante en grec, voir Mt 26.49n.'
  - type: text
    content: 'Si quelqu''un vient vous voir sans apporter cet enseignement, ne le recevez pas chez vous et ne lui dites même pas bonjour. '
  '11':
  - type: note
    content: 'se rend complice de ou s''associe à  : cf. Ep 5.11 ; 1Tm 5.22n  ; Ap 18.4.'
  - type: text
    content: Car celui qui lui dit bonjour se rend complice de ses œuvres mauvaises.
  - type: heading
    content: En attendant le revoir
  '12':
  - type: text
    content: ' '
  - type: note
    content: '3Jn 13s. –  de vive voix  : litt. bouche à bouche , expression qui peut être comprise au sens de face à face , cf. Nb 12.8n. –  que notre (ou votre , selon certains mss) joie soit complète 1Jn 1.4+.'
  - type: text
    content: Quoique j'aie beaucoup à vous écrire, je n'ai pas souhaité le faire avec le papier et l'encre ; mais j'espère aller vous voir et vous parler de vive voix, pour que notre joie soit complète.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ta sœur  : sans doute la communauté chrétienne à laquelle appartient l''auteur, cf. v. 1n  ; 1P 5.13.'
  - type: text
    content: Les enfants de ta sœur choisie te saluent.
  '2':
  - type: note
    content: 'la vérité Jn 8.32+ ; 1Jn 2.4. –  demeure en nous  : cf. 1Jn 2.27 ; 3.9 ; voir aussi 2P 1.12. –  pour toujours  : cf. Jn 14.16s.'
  - type: text
    content: 'à cause de la vérité qui demeure en nous et qui sera avec nous pour toujours : '
  '3':
  - type: note
    content: 'Cf. 1Tm 1.2 ; 2Tm 1.2. –  grâce / paix… Rm 1.7+. – Voir Fils. –  avec nous  : certains mss portent avec vous  ; cf. 1Co 1.8.'
  - type: text
    content: La grâce, la compassion et la paix de Dieu, le Père, et de Jésus-Christ, le Fils du Père, seront avec nous dans la vérité et l'amour.
  - type: heading
    content: Le commandement reçu du Père
  '4':
  - type: text
    content: ' '
  - type: note
    content: '3Jn 3s. –  vivant  : litt. marchant , de même v. 6. –  le commandement v. 5 ; 1Jn 4.21 ; voir loi.'
  - type: text
    content: 'Je me suis beaucoup réjoui de trouver quelques-uns de tes enfants vivant dans la vérité, selon le commandement que nous avons reçu du Père. '
  '5':
  - type: note
    content: 'chère Dame  : grec kuria, voir v. 1n. –  commandement nouveau  : cf. Jn 13.34+ ; voir 1Jn 2.7s,24 ; 3.11,23.'
  - type: text
    content: 'Et maintenant, chère Dame, je te demande – ce que je t''écris n''est pas un commandement nouveau, mais seulement celui que nous avons eu dès le commencement – que nous nous aimions les uns les autres. '
  '6':
  - type: note
    content: V. 4n  ; Jn 14.15,23s ; 1Jn 5.3.
  - type: text
    content: Et l'amour consiste à vivre selon ses commandements. C'est là le commandement dans lequel vous devez vivre, comme vous l'avez entendu dès le commencement.
  - type: heading
    content: L'enseignement du Christ
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'd''imposteurs ou de trompeurs  : le terme grec est apparenté à celui qui est habituellement traduit par erreur ou égarement  ; cf. 1Jn 2.26+ ; voir aussi Mt 27.64+ ; 2P 2.1. –  ne reconnaissent pas  : autre traduction ne confessent pas  ; cf. 1Jn 1.9n. –  venant , au présent, autre temps qu''en 1Jn 4.2n. – Voir chair . –  antichrist 1Jn 2.18+.'
  - type: text
    content: 'En effet, beaucoup d''imposteurs sont sortis dans le monde, qui ne reconnaissent pas Jésus-Christ venant en chair. Voilà l''imposteur et l''antichrist. '
  '8':
  - type: note
    content: 'notre travail  : litt. ce pour quoi nous avons travaillé  ; certains mss portent vous avez travaillé, c.-à-d. votre travail  ; cf. Rt 2.12 ; Mt 10.42 ; Jn 6.27n-30. –  récompense Mt 5.12+.'
  - type: text
    content: Prenez garde à vous-mêmes, afin de ne pas perdre le fruit de notre travail, mais de recevoir une pleine récompense.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1Jn 2.23s ; 4.15 ; 5.12. – Voir Fils.
  - type: text
    content: 'Quiconque va plus loin et ne demeure pas dans l''enseignement du Christ n''a pas Dieu ; celui qui demeure dans cet enseignement a le Père et le Fils. '
