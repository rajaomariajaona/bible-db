      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le mouvement des planètes paraissant irrégulier par rapport à celui des autres astres) ; cf. Dn 12.3 ; 2P 2.17. Dans le livre d''Hénoch les astres sont très souvent associés aux anges ; ainsi en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 Hénoch '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.15s où il est question des astres correspondant aux anges de Jd 6 : « Les (sept) astres qui se convulsent dans le feu (dans un gouffre) sont ceux qui ont transgressé à leur lever l''ordonnance du Seigneur, – le lieu en dehors du ciel est vide, – en ne sortant pas à leur heure. Il s''est irrité contre eux et les a enchaînés pour dix mille ans. »'
      marker-yv: yv-n
    - type: text
      text: vagues sauvages de la mer rejetant l'écume de leurs turpitudes, astres errants auxquels l'obscurité des ténèbres est réservée pour toujours !
