document_id: JUD.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Judas ou Jude (cette transcription habituelle visant à éviter une confusion avec Judas Iscariote, cf. Jn 14.22 ; il s''agit d''un seul et même nom dans le texte grec) / Jacques  : cf. Mt 13.55/ / ; Mc 6.3 ; Ac 12.17+ ; 1Co 9.5 ; Ga 1.19+ ; Jc 1.1. –  esclave  : autre traduction serviteur  ; cf. Rm 1.1+. –  appelés Rm 1.7+ ; 8.28 ; Col 3.12 ; 1Th 1.4 ; 2Th 2.13. –  de Dieu  : litt. en Dieu . –  gardés  : cf. v. 21 ; Jn 17.11,15 ; 1Th 5.23 ; 2Tm 4.7s ; 1P 1.4 ; 1Jn 5.18 ; Ap 3.10 ; voir aussi 2P 2.4+. –  pour (litt. de ) Jésus-Christ  : cf. Rm 2.16 ; 2Co 5.10 ; voir aussi onction.'
  - type: text
    content: 'Judas, esclave de Jésus-Christ et frère de Jacques, à ceux qui sont appelés, aimés de Dieu, le Père, et gardés pour Jésus-Christ : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '2P 2.12n. –  injurient v. 8n. –  ce qu''ils ne connaissent pas  : cf. 1Co 2.10,14. –  comme des animaux…  : cf. v. 19. –  les pourrit ou les fait tomber en pourriture  : cf. 2P 1.4+.'
  - type: text
    content: 'Eux, au contraire, ils injurient ce qu''ils ne connaissent pas ; et ce qu''ils savent par instinct, comme des animaux dépourvus de raison, c''est cela même qui les pourrit. '
  '11':
  - type: note
    content: '2P 2.15+. –  Malheureux Mt 11.21n. –  Caïn Gn 4.8 ; Hé 11.4 ; 1Jn 3.12. Selon l''interprétation la plus courante dans le judaïsme du Ier s. apr. J.-C., qui se reflète notamment dans le Targum (Tg) du pseudo-Jonathan sur Gn 4.7s (voir les notes), Caïn est surtout la figure du révolté. –  égarement v. 13n. –  Balaam Nb 22–24 ; 31.16 ; Ap 2.14. –  révolte (ou opposition Pr 17.11 ; Hé 12.3) de Coré Nb 16. –  qu''ils ont disparu  : autre traduction qu''ils se sont perdus (cf. v. 5).'
  - type: text
    content: Malheureux sont-ils ! Car ils ont suivi la voie de Caïn ; c'est dans l'égarement de Balaam que, pour un salaire, ils se sont jetés ; et c'est dans la révolte de Coré qu'ils ont disparu !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'écueils  : le terme pourrait aussi signifier tache, souillure (mot très proche en 2P 2.13n, cf. Jd 23). –  repas fraternels ou, selon la transcription classique du terme, agapes (sens particulier du mot grec agapè , habituellement traduit par amour ) ; il s''agit des repas que les premiers chrétiens prenaient ensemble en mémoire de Jésus (cf. Mt 26.20ss/ / ; Jn 13.1,34 ; Ac 2.46 ; 1Co 11.17ss). –  ils… se repaissent  : litt. ils se paissent eux-mêmes , cf. Ez 34.8s. –  sans crainte  : autre traduction sans honte . –  nuées… 2P 2.17 ; cf. Pr 25.14. –  arbres…  : cf. Mt 13.29 ; 15.13 ; Lc 17.6 ; voir aussi Ep 4.14.'
  - type: text
    content: 'Ces gens-là sont les écueils de vos repas fraternels, où ils festoient et se repaissent sans crainte, nuées sans eau emportées par les vents, arbres de fin d''automne sans fruits, deux fois morts, déracinés, '
  '13':
  - type: note
    content: 'vagues… Es 57.20. –  turpitudes  : litt. hontes. –  astres errants  : l''adjectif grec (apparenté au mot traduit par égarement au v. 11) a donné notre mot planète (le mouvement des planètes paraissant irrégulier par rapport à celui des autres astres) ; cf. Dn 12.3 ; 2P 2.17. Dans le livre d''Hénoch les astres sont très souvent associés aux anges ; ainsi en 1 Hénoch 18.15s où il est question des astres correspondant aux anges de Jd 6 : « Les (sept) astres qui se convulsent dans le feu (dans un gouffre) sont ceux qui ont transgressé à leur lever l''ordonnance du Seigneur, – le lieu en dehors du ciel est vide, – en ne sortant pas à leur heure. Il s''est irrité contre eux et les a enchaînés pour dix mille ans. »'
  - type: text
    content: vagues sauvages de la mer rejetant l'écume de leurs turpitudes, astres errants auxquels l'obscurité des ténèbres est réservée pour toujours !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Hénoch Gn 5.3ss,21ss ; 1Ch 1.1ss ; Lc 3.37s ; Hé 11.5 ; 1 Hénoch 60.8 (Noé parle) : « Mon aïeul, le septième depuis Adam, premier humain créé par le Seigneur des Esprits. » –  dit en prophète  : litt. prophétisé 1P 1.10ss. –  Le Seigneur…  : 1 Hénoch 1.9 (version grecque) : « Car Il (Dieu) vient avec ses saintes myriades juger l''univers, faire périr tout impie, confondre toute chair, pour tous les actes d''impiété qu''ils ont commis et pour les outrages qu''ont proférés contre Lui les pécheurs impies. » –  ses saints par dizaines de milliers  : litt. ses saintes myriades (une myriade = 10 000) ; selon toute vraisemblance il s''agit ici des armées célestes, c.-à-d. des anges ; cf. Dt 33.2 ; Za 14.5 ; Mt 25.31 ; Hé 12.22.'
  - type: text
    content: 'C''est aussi à leur sujet qu''Hénoch, le septième depuis Adam, a dit en prophète : « Le Seigneur est venu avec ses saints par dizaines de milliers, '
  '15':
  - type: note
    content: 'Voir v. 14n. –  exercer  : litt. faire. –  de les confondre  : litt. de confondre toute âme. –  toutes les paroles…  : cf. Ml 3.13 ; Mt 12.36. –  dures  : autre traduction insultantes. – Voir péché.'
  - type: text
    content: afin d'exercer le jugement contre tous et de les confondre pour toutes leurs œuvres d'impiété et pour toutes les paroles dures qu'ont proférées contre lui les pécheurs impies. »
  '16':
  - type: text
    content: ' '
  - type: note
    content: '2P 2.10. –  maugréent  : cf. Ex 16.7ss ; Nb 14.27ss ; 17.5,10 ; Jn 6.41n  ; 1Co 10.10+ ; Ph 2.14. –  se plaignent (sous-entendu  : contre Dieu ) de leur sort  : terme apparenté en Rm 9.19 ( faire des reproches ) ; Hé 8.8 ( reproche ). –  qui vont… v. 18 ; 2P 3.3. –  parle avec une monstrueuse insolence ou profère des énormités Dn 11.36 (même terme pour inouï dans la traduction grecque de Théodotion, voir LXX) ; 2P 2.18 ; cf. 1 Hénoch 5.4 : « Vous avez tenu des propos insolents et hautains, de votre bouche impure, contre Sa majesté. » 27.2 « Les maudits dont la bouche dira des insolences contre le Seigneur et qui parleront avec dureté contre Sa gloire. » –  qu''ils flattent les gens  : litt. qu''ils admirent les faces , expression sans doute calquée sur l''hébraïsme relever la face , qui évoque la partialité ; cf. Lv 19.15 ; Dt 10.17 ; Am 5.12 ; Pr 24.23 ; 28.21 ; Ac 10.34n  ; Rm 2.11 ; Ga 2.6n  ; Jc 2.1ss.'
  - type: text
    content: Ce sont des gens qui maugréent, qui se plaignent de leur sort et qui vont au gré de leurs propres désirs ; leur bouche parle avec une monstrueuse insolence, alors qu'ils flattent les gens par intérêt.
  - type: heading
    content: Recommandations aux fidèles
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2P 3.2n. – Voir apôtres.
  - type: text
    content: 'Mais vous, bien-aimés, souvenez-vous des paroles dites à l''avance par les apôtres de notre Seigneur Jésus-Christ. '
  '18':
  - type: note
    content: 'Cf. 2P 3.3 ; voir aussi Mc 13.21ss/ / ; Ac 20.29 ; 2Th 2.9s ; 1Tm 4.1ss ; 2Tm 4.3ss ; 1Jn 2.18. –  Dans les derniers temps  : cf. Ac 2.17 ; 2Tm 3.1+ss. –  moqueurs  : cf. Mt 20.19/ / ; 27.29ss/ /. –  qui iront… v. 16+. –  au gré…  : litt. selon leurs propres désirs d''impiétés.'
  - type: text
    content: 'Ils vous disaient : « Dans les derniers temps, il y aura des moqueurs qui iront au gré de leurs propres désirs, en impies. » '
  '19':
  - type: note
    content: 'fauteurs de divisions  : cf. 1Co 1.10ss ; 11.17ss ; on pourrait aussi comprendre ces gens qui opèrent des classifications, allusion possible à la distinction établie dans le gnosticisme (voir « La question gnostique »♦) entre êtres animaux (ou psychiques, relevant de l''âme ou psukhè  ; c''est un autre terme qui est traduit par animaux au v. 10) et spirituels (relevant de l''Esprit) ; voir 1Co 2.11ss,14nss ; Jc 3.15+. Dans ce cas, l''auteur retournerait contre ses adversaires les catégories qu''eux-mêmes utilisent.'
  - type: text
    content: Les voilà, les fauteurs de divisions, les êtres animaux, ceux qui n'ont pas l'Esprit.
  '2':
  - type: note
    content: Rm 1.7+ ; 2P 1.2. – Voir paix.
  - type: text
    content: Que la compassion, la paix et l'amour vous soient multipliés !
  - type: heading
    content: Les propagateurs de faux enseignements
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'construisez-vous ou édifiez-vous  : sur l''image de la construction cf. 1Co 3.9nss ; Ep 2.20ss ; 4.12 ; 1Th 5.11 ; 1P 2.4ss. –  votre très sainte foi  : cf. v. 3 ; Col 2.7 ; voir aussi 1Co 3.11. –  priez par (ou dans ) l''Esprit saint  : cf. v. 19n  ; Rm 8.15,26 ; 1Co 12.3 ; Ga 4.6 ; Ep 6.18.'
  - type: text
    content: 'Mais vous, bien-aimés, construisez-vous sur votre très sainte foi, priez par l''Esprit saint, '
  '21':
  - type: note
    content: 'gardez-vous  : cf. v. 24. –  dans l''amour de Dieu  : cf. v. 1. –  en attendant (Mc 15.43 ; Lc 2.25 ; 12.36 ; Tt 2.13) la compassion 2Tm 1.18 ; 1 Hénoch 27.4 : « Au temps de leur jugement ils (les justes) le béniront (Dieu) pour leur avoir donné une part dans Sa miséricorde (= compassion). » –  la vie éternelle  : autre traduction possible une vie éternelle.'
  - type: text
    content: gardez-vous dans l'amour de Dieu, en attendant la compassion de notre Seigneur Jésus-Christ pour la vie éternelle.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Ayez compassion  : certains mss portent un autre verbe qu''on pourrait traduire reprenez, persuadez, confondez (v. 15 ; cf. 1Tm 5.20n) ; voir aussi Jc 5.19.'
  - type: text
    content: 'Ayez compassion de ceux qui hésitent ; '
  '23':
  - type: note
    content: 'Une variante de certains mss pourrait suggérer qu''il est question de deux catégories au lieu de trois ; il faudrait lire (ceux qui hésitent), sauvez-les en les arrachant au feu (Am 4.11 ; Za 3.2 ; Mt 13.42,50 ; 25.41)  ; pour d''autres, ayez une compassion mêlée de crainte…  ; cf. Mt 18.17 ; Ac 8.22ss ; 1Co 5.5 ; 2Th 3.14 ; 1Tm 1.20 ; Tt 3.10 ; 2Jn 10s. –  tunique (= vêtement de dessous, cf. Mt 5.40n) tachée (cf. v. 12n  ; Jc 3.6n) …  : cf. Es 64.5 ; Za 3.4 ; Ap 3.4 ; voir aussi Mc 5.27ss ; Règle de la Communauté (Qumrân) 5.18ss : « On les séparera (les impies), ainsi que tout ce qui leur appartient… toutes leurs œuvres deviennent une souillure devant Lui (Dieu), et impurs en tout sont leurs biens. » –  chair  : le terme est pris ici dans son sens péjoratif, associé au péché  ; cf. Rm 6.19 ; 7.18 ; 8.3.'
  - type: text
    content: d'autres, sauvez-les en les arrachant au feu ; pour d'autres enfin, ayez une compassion mêlée de crainte, détestant jusqu'à la tunique tachée par la chair.
  - type: heading
    content: Louange finale
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 16.25+ss. –  vous garder  : cf. v. 21 ; 2Th 3.3 ; 1P 1.4. –  de toute chute 2P 1.10. –  vous faire tenir devant sa gloire Ep 1.4 ; Col 1.22 ; cf. 1Co 1.8 ; Ph 1.10 ; 1Th 3.13 ; 1P 4.13 ; 2P 3.14.'
  - type: text
    content: 'A celui qui peut vous garder de toute chute et vous faire tenir devant sa gloire, sans défaut, dans l''allégresse, '
  '25':
  - type: note
    content: 'Rm 16.27. –  Dieu seul  : cf. Jn 5.44 ; 17.3 ; 1Tm 1.17 ; 6.15s ; Ap 15.4 ; voir aussi Mc 10.18/ / ; 1Co 8.4ss ; Ep 4.6 ; 1Tm 2.5 ; Jc 2.19. –  Sauveur  : cf. Lc 1.47 ; 1Tm 1.1+. –  avant tous les temps  : litt. avant tout le temps ou tout l''âge (traduction traditionnelle le siècle, Mt 12.32n) ; cf. 1Co 2.7 ; voir aussi Jn 17.24 ; Ep 1.4 ; 1P 1.20. –  pour tous les temps ou pour toujours  : Rm 1.25 ; 9.5 ; Ga 1.5n  ; Ph 4.20.'
  - type: text
    content: 'à Dieu seul, notre Sauveur, par Jésus-Christ, notre Seigneur, soient gloire, majesté, pouvoir et autorité dès avant tous les temps, maintenant et pour tous les temps ! '
  - type: text
    content: Amen !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Bien-aimés…  : cf. 1P 2.11. –  tous mes efforts 2P 1.5n. –  j''ai été contraint  : même expression en Lc 14.18 ; 23.17n  ; Hé 7.27. –  encourager ou exhorter  ; cf. Rm 12.1+. –  combattre  : cf. Lc 13.24n  ; Jn 18.36 ; Rm 13.12 ; 1Co 9.24ss ; Ep 6.10ss ; Ph 3.12ss ; 1Th 5.8 ; 1Tm 1.18 ; 6.12 ; 2Tm 2.3ss ; 4.7. –  la foi  : cf. v. 20 ; Ep 4.5 ; 1Tm 1.19 ; 3.9 ; 4.1 ; 6.21 ; Tt 1.13s. –  transmise v. 17 ; 1Co 11.2+ ; 2P 2.21. –  aux saints Rm 1.7+. –  une fois pour toutes  : cf. v. 5 ; Rm 6.10 ; Hé 9.12,26ss ; 10.10 ; 1P 3.18.'
  - type: text
    content: 'Bien-aimés, comme je consacrais tous mes efforts à vous écrire au sujet de notre salut commun, j''ai été contraint de le faire afin de vous encourager à combattre pour la foi qui a été transmise aux saints une fois pour toutes. '
  '4':
  - type: note
    content: 'il s''est glissé  : cf. Ga 2.4 ; 2Tm 3.6 ; 2P 2.1. –  certains hommes  : autre traduction certaines personnes  ; cf. 2Co 10.12 ; Ga 1.7 ; 2.12. –  jugement  : autre traduction châtiment  ; cf. 2P 2.3n. –  écrit depuis longtemps  : Rm 15.4n  ; cf. Ps 69.29 ; 139.16 ; Dn 7.10 ; 1 Hénoch 108.7 : « Certains de ces (événements) sont inscrits et gravés là-haut dans le ciel, de sorte que les anges les lisent et savent ce qui doit arriver aux pécheurs. » –  impies v. 15,18 ; 2Tm 2.16 ; Tt 2.12 ; 2P 2.5 ; 3.7. –  débauche 2P 2.2n  ; cf. Rm 6.1ss ; 1Co 6.12ss ; Ga 5.13 ; 1P 2.16. – Voir grâce. –  Jésus-Christ, notre seul Maître…  : autre traduction le seul Maître (= Dieu) et notre Seigneur Jésus-Christ, voir 2P 2.1+ ; 1 Hénoch 48.10 : « Nul ne tendra la main pour les relever, car ils ont renié le Seigneur des Esprits et son Messie. »'
  - type: text
    content: Car il s'est glissé certains hommes, dont le jugement est écrit depuis longtemps, des impies qui changent en débauche la grâce de notre Dieu et qui renient Jésus-Christ, notre seul Maître et Seigneur.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'qui savez 1Jn 2.20. –  rappeler 2P 1.12+. –  le Seigneur  : plusieurs mss portent Jésus , nom qui, en grec, peut aussi transcrire celui de Josué  ; cf. 1Co 10.4 ; Hé 4.8n. –  après avoir sauvé  : litt. ayant sauvé une fois  ; certains mss rattachent l''expression correspondante au début du v., de sorte qu''on pourrait comprendre à vous qui savez tout cela une fois pour toutes (v. 3+). –  ensuite  : litt. une deuxième fois  ; autre traduction a agi une deuxième fois pour faire disparaître…  ; cf. Nb 14.29-37 ; 1Co 10.5 ; Hé 3.17ss.'
  - type: text
    content: 'A vous qui savez tout cela, je souhaite rappeler que le Seigneur, après avoir sauvé un peuple de l''Egypte, a fait ensuite disparaître ceux qui avaient refusé de croire ; '
  '6':
  - type: note
    content: 'les anges… Gn 6.1-4 ; 2P 2.4+ ; 1 Hénoch 12.4 : « Hénoch, scribe de justice, va parler aux Veilleurs du ciel qui ont abandonné les hauteurs célestes, le sanctuaire de la résidence éternelle, pour se souiller au contact des femmes. » –  la dignité de leur rang  : le terme correspondant peut désigner le commencement ou principe (autre traduction possible leur condition originelle) et la dignité ou l''autorité du prince (le même terme est traduit par principat en Rm 8.38 ; 1Co 15.24 ; Ep 1.21+). –  demeure  : cf. 2Co 5.2. –  dans des liens éternels  : autre traduction éternellement emprisonnés. –  grand jour  : cf. Jl 1.15 ; 2.11 ; Ab 15 ; So 1.7,14ss ; 2.3 ; Ml 3.23 ; Ap 6.17 ; 16.14 ; voir aussi 2P 2.9 ; Ap 20.1 ; 1 Hénoch 10.4ss : « Enchaîne Azaël (l''un des noms du chef des anges déchus) par les pieds et par les mains, jette-le dans les ténèbres… Le jour du grand jugement, il sera conduit dans la fournaise. »'
  - type: text
    content: 'les anges qui n''avaient pas gardé la dignité de leur rang, mais qui avaient quitté leur propre demeure, il les garde dans des liens éternels, au fond des ténèbres, en vue du jugement du grand jour. '
  '7':
  - type: note
    content: 'Sodome… et les villes voisines Gn 19.4ss ; Dt 29.23 ; Os 11.8 ; 2P 2.6+,10. –  ont couru après  : litt. s''en sont allées après (dans l''A.T., des expressions analogues ont souvent un sens sexuel ; métaphoriquement, elles évoquent parfois l''idolâtrie comme une prostitution ou une infidélité envers Dieu) une chair autre. Dans le contexte de cette lecture de Gn 19, l''expression évoque moins l''homosexualité des habitants de Sodome que leur recherche d''une relation sexuelle avec des anges (faute comparable [De même… d''une manière semblable] à celle des anges qui ont pris femme, v. 6 ; Gn 6). Il s''agit en tout cas de la transgression d''une limite naturelle ; cf. Testament de Nephtali 3.4s : « Pour ne pas devenir comme Sodome, qui a changé son ordre naturel. De même, les Veilleurs (= les anges), eux aussi, ont changé leur ordre naturel, eux que le Seigneur a maudits lors du déluge. »'
  - type: text
    content: De même, Sodome et Gomorrhe et les villes voisines – qui, d'une manière semblable, se sont livrées à l'inconduite sexuelle et ont couru après des êtres d'une autre nature – sont données en exemple, soumises à la peine d'un feu éternel.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'D''une façon semblable  : terme apparenté à celui qui est traduit par semblable au v. 7 ; un ms porte pourtant . –  rêves  : le terme correspondant n''apparaît qu''ici et en Ac 2.17 ; voir Dt 13.2ss ; Es 56.10 ; Jr 27.9 (LXX). –  souillent la chair v. 4+,10 ; cf. Rm 1.18ss ; 1Co 6.12ss ; voir pur, impur. –  méprisent ou rejettent  ; même verbe en Lc 10.16+. –  la seigneurie / les gloires (êtres célestes) : cf. 2P 2.10n  ; voir aussi 1Co 11.10 ; dans le Testament de Juda (25.2) les « puissances de gloire » viennent aussitôt après « l''ange de la Face » et avant le « ciel ». –  injurient ou calomnient  ; le verbe grec signifie aussi blasphémer , de même dans la suite ; cf. Mc 15.29n  ; Ac 13.45n  ; Rm 2.24n  ; 1Tm 6.1n  ; Jc 2.7 ; 1P 4.4.'
  - type: text
    content: 'D''une façon semblable, eux aussi, au gré de leurs rêves, souillent la chair, méprisent la seigneurie et injurient les gloires. '
  '9':
  - type: note
    content: 'D''après plusieurs sources anciennes, cet épisode aurait été relaté dans le livre de l’Assomption de Moïse, mais le texte correspondant n''a pas pu être reconstitué ; cf. Dt 34.6 ; 2P 2.11 ; un ouvrage slave plus tardif, intitulé Sagesse de Moïse, porte : « (Le diable) dit : Moïse est un meurtrier, il a tué un homme en Egypte (Ex 2.12) et il l''a caché dans le sable. Alors Michel supplia Dieu et il y eut de la foudre et des éclairs. Aussitôt le diable disparut, alors Michel enterra Moïse de ses propres mains. » –  diable  : voir démon, diable, Satan. –  discutait Ac 17.2n. –  l''archange Michel  : cf. Dn 10.12-21 ; 12.1 ; Ap 12.7. –  injurieux ou calomnieux, blasphématoire, cf. v. 8n. –  Que le Seigneur te rabroue ou te blâme, te châtie (voir Mc 1.25n) ; Za 3.2.'
  - type: text
    content: 'Or, lorsqu''il contestait avec le diable et discutait au sujet du corps de Moïse, l''archange Michel n''osa pas porter un jugement injurieux, mais il dit : '
  - type: text
    content: Que le Seigneur te rabroue !
