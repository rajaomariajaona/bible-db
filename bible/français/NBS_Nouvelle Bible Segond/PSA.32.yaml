document_id: PSA.32,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le bonheur d'être pardonné
  - type: text
    content: ' '
  - type: note
    content: 'Poème  : traduction incertaine d''un terme technique qui apparaît dans les suscriptions des Ps 42 ; 44 ; 45 ; 52—55 ; 74 ; 78 ; 88 ; 89 ; 142 ; dérivé du verbe rendu par instruire au v. 8, il pourrait aussi être traduit par instruction, méditation  ; son sens est cependant plus probablement celui d’ œuvre d''art . –  Heureux 1.1+ ; Rm 4.7s. –  pardonnée  : autres traductions enlevée ; prise en charge. –  couvert  : cf. v. 5 ; 25.18+ ; 85.3 ; Jc 5.20 ; 1P 4.8.'
  - type: text
    content: De David. Poème.
  - type: text
    content: Heureux celui dont la transgression est pardonnée,
  - type: text
    content: dont le péché est couvert !
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 33.22 ; Pr 13.21 ; Ec 2.26. –  celui qui met sa confiance… 4.6+.
  - type: text
    content: Il y a beaucoup de douleurs pour le méchant ;
  - type: text
    content: 'celui qui met sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', sa fidélité l''entoure.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 33.1 ; 63.12 ; 97.12 ; Jl 2.23. – Voir cœur.
  - type: text
    content: 'Justes, réjouissez-vous dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', soyez dans l''allégresse !'
  - type: text
    content: Poussez des cris de joie, vous tous qui avez le cœur droit !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ne tient pas compte… ou ne compte pas de faute  ; Ac 7.59 ; 2Co 5.19. –  dans l''esprit  : versions anciennes dans la bouche, dans le cœur  ; cf. Jn 1.47 ; Ap 14.5.'
  - type: text
    content: 'Heureux l''homme à qui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne tient pas compte de la faute,'
  - type: text
    content: et dans l'esprit duquel il n'y a pas de tromperie !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 31.11 ; 39.2-4. –  je gémissais  : litt. dans mon rugissement  ; 22.2n. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Tant que je gardais le silence, mes os se consumaient,
  - type: text
    content: je gémissais sans cesse ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ta main 38.3 ; 39.10-12. –  ma vigueur  : traduction incertaine, litt. ma sève ( ?) ; certains modifient le texte hébreu traditionnel pour lire ma langue s''était changée… (cf. 22.16), ou encore mon cœur est comme un champ dans la sécheresse de l''été.'
  - type: text
    content: car jour et nuit ta main pesait sur moi,
  - type: text
    content: 'ma vigueur s''était changée en sécheresse d''été. '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 38.19 ; 51.5s ; 69.6 ; 85.3+s ; Nb 5.7 ; 2S 12.13 ; Jb 31.33 ; Pr 28.13 ; 1Jn 1.9s. –  Je reconnaîtrai…  : cf. 26.7n. –  tu as pardonné…  : autres traductions tu as enlevé, tu t''es chargé de  ; cf. v. 1 ; Ex 10.17n  ; 34.7. –  ma faute, mon péché ou la faute de mon péché  ; on pourrait comprendre  : tu as ôté la culpabilité (ou le châtiment ) de mon péché  ; cf. Gn 4.7n,13n.'
  - type: text
    content: 'Je te fais connaître mon péché :'
  - type: text
    content: je n'ai pas couvert ma faute ;
  - type: text
    content: 'j''ai dit : Je reconnaîtrai mes transgressions devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Et toi, tu as pardonné ma faute, mon péché. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: au temps convenable , d'après LXX  ; litt. au temps de trouver ( Dieu  ?) seulement  ; cf. 69.14 ; Es 49.8 ; 55.6. –  grandes eaux 18.5,17 ; Es 8.7ss ; 17.12 ; 23.3 ; 43.2 ; Ct 8.7. –  ne l'atteindraient pas 91.7.
  - type: text
    content: Qu'ainsi tout fidèle te prie au temps convenable !
  - type: text
    content: Quand de grandes eaux inonderaient tout,
  - type: text
    content: elles ne l'atteindraient pas.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'une cachette  : cf. 7.2+. –  de cris de délivrance  : texte incertain ; quelques-uns le modifient pour lire de boucliers  ; cf. 3.4+.'
  - type: text
    content: Tu es pour moi une cachette, tu me préserves de la détresse ;
  - type: text
    content: 'tu m''entoures de cris de délivrance. '
  - type: text
    content: Pause.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Je t''instruirai (v. 1n) : cf. 34.12 ; Jb 15.17. –  je te montrerai la voie 16.11 ; 25.4,8-10. –  j''aurai le regard  : litt. mon œil  ; cf. 33.18.'
  - type: text
    content: Je t'instruirai, je te montrerai la voie que tu dois suivre ;
  - type: text
    content: je te conseillerai, j'aurai le regard sur toi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ne soyez pas  : quelques mss portent ne sois pas  ; Pr 26.3 ; Jc 3.3. –  dont on les pare  : certains comprennent pour contenir leur fougue. –  afin qu''ils ne s''approchent pas de toi  : autre traduction et rien ne t''arrivera (cf. v. 6).'
  - type: text
    content: Ne soyez pas comme un cheval ou un mulet sans intelligence ;
  - type: text
    content: on les bride avec un mors et un frein, dont on les pare,
  - type: text
    content: afin qu'ils ne s'approchent pas de toi.
