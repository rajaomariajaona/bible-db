document_id: EXO.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Naissance et enfance de Moïse
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.16-20. –  pour femme  : sous-entendu dans le texte.'
  - type: text
    content: 'Un homme de la maison de Lévi alla prendre pour femme une fille de Lévi. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Le nom de Moïse (en hébreu Moshé ) est rapproché du verbe hébreu traduit par je l'ai retiré ( meshitihou , cf. Ps 18.17). Il rappelle par ailleurs le mot égyptien mosis , qui revient souvent dans des noms propres se référant au nom d'une divinité et qui signifie créé, engendré ou issu (de la divinité, p. ex. de Thot pour Thoutmosis).
  - type: text
    content: Quand l'enfant eut grandi, elle l'amena à la fille du pharaon, et celle-ci le prit pour fils. Elle l'appela du nom de Moïse (« Tiré »), car, dit-elle, je l'ai retiré de l'eau.
  - type: heading
    content: Moïse s'enfuit en Madiân
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ses frères  : les Hébreux, cf. 4.18. – Sur l''ensemble, voir Ac 7.23-29 ; Hé 11.24-27.'
  - type: text
    content: 'En ces jours-là, Moïse, devenu grand, se rendit auprès de ses frères et vit leurs corvées. Il vit un Egyptien qui frappait un Hébreu, l''un de ses frères. '
  '12':
  - type: text
    content: 'Il se tourna d''un côté et de l''autre et, voyant qu''il n''y avait personne, il abattit l''Egyptien et le cacha dans le sable. '
  '13':
  - type: note
    content: 'celui qui avait tort  : litt. le méchant, voir justice. –  compagnon  : autre traduction prochain  ; le terme hébreu peut aussi signifier ami.'
  - type: text
    content: 'Comme il sortait le jour suivant, il vit deux Hébreux qui se querellaient. Il dit à celui qui avait tort : Pourquoi frappes-tu ton compagnon ? '
  '14':
  - type: note
    content: 'Vas-tu…  : litt. parles-tu pour me tuer…'
  - type: text
    content: 'Il répondit : Qui t''a fait chef et juge sur nous ? Vas-tu me tuer comme tu as tué l''Egyptien ? Moïse eut peur ; il se dit : Ainsi la chose se sait ! '
  '15':
  - type: note
    content: 's''installer et s''assit traduisent deux sens possibles d''un même verbe hébreu. –  Madiân 4.19 ; Gn 25.2n  ; 37.28. –  près d''un puits  : litt. près du puits  ; l''article défini peut renvoyer à un puits connu par une tradition précise, mais ce n''est pas forcément le cas.'
  - type: text
    content: Quand le pharaon apprit ce qui s'était passé, il chercha à tuer Moïse. Moïse s'enfuit pour échapper au pharaon et il vint s'installer en Madiân. Il s'assit près d'un puits.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 24.11+. –  Le prêtre…  : autre traduction un prêtre.'
  - type: text
    content: 'Le prêtre de Madiân avait sept filles. Elles vinrent puiser de l''eau et remplirent les auges pour faire boire le troupeau de leur père. '
  '17':
  - type: note
    content: 'les chassèrent  : ils voulaient peut-être abreuver leurs propres troupeaux avec l''eau puisée par les jeunes filles, de façon à s''épargner la peine de puiser l''eau eux-mêmes. –  les défendit  : litt. les sauva.'
  - type: text
    content: 'Mais les bergers arrivèrent et les chassèrent. Alors Moïse se leva, les défendit et fit boire leur troupeau. '
  '18':
  - type: note
    content: Réouel est appelé Jéthro à partir de 3.1 ; cf. 18.1 ; Nb 10.29 ; Jg 1.16.
  - type: text
    content: 'Quand elles furent de retour auprès de Réouel, leur père, il dit : Pourquoi revenez-vous si tôt aujourd''hui ? '
  '19':
  - type: text
    content: 'Elles répondirent : Un Egyptien nous a délivrées de la main des bergers ; il a même puisé de l''eau pour nous et il a fait boire le troupeau. '
  '2':
  - type: note
    content: 'On a souvent comparé ce récit à celui de la naissance de Sargon Ier, roi d''Akkad, dans un texte datant probablement de la fin du IIIe millénaire et connu par des copies incomplètes du Ier millénaire av. J.-C. : « Ma ville est Azoupiranou, située sur les rives de l''Euphrate. Ma mère Enitoum me conçut, en cachette elle m''enfanta. Elle me disposa dans une corbeille de joncs. De bitume elle scella mon couvercle. Elle me jeta dans le fleuve qui ne m''engloutit pas. Le fleuve m''entraîna et m''apporta à Akki, le puiseur d''eau. Akki, le puiseur d''eau, m''accueillit comme son fils et m''éleva. Il fit de moi son jardinier. Tandis que j''étais son jardinier, Ishtar (déesse de l''amour et de la fécondité) me donna son amour. Et pendant quatorze ans j''ai régné. » –  beau  : le mot signifie également bon. Cf. Ac 7.20 ; Hé 11.23. –  mois  : litt. lunes.'
  - type: text
    content: 'Cette femme fut enceinte et mit au monde un fils. Elle vit qu''il était beau et elle le cacha pendant trois mois. '
  '20':
  - type: note
    content: 'laissé là  : le verbe correspondant est souvent traduit par abandonner. –  manger ici  : litt. manger du pain  ; cf. Gn 3.19n.'
  - type: text
    content: 'Il dit à ses filles : Où est-il ? Pourquoi donc avez-vous laissé là cet homme ? Appelez-le, qu''il vienne manger ici.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'accepta  : autre traduction décida (même verbe en Dt 1.5). –  Séphora 4.25s.'
  - type: text
    content: 'Moïse accepta de s''installer chez cet homme, qui lui donna sa fille Séphora. '
  '22':
  - type: note
    content: Guershom est rapproché du mot hébreu ger, traduit par immigré (12.48n  ; cf. 1Ch 6.1n, où le même nom est donné au Guershôn d'Ex 6.16). La deuxième partie du nom peut faire penser à l'adverbe sham, là-bas (cf. 18.3 ; voir aussi Jg 17.7n  ; 18.30n).
  - type: text
    content: Elle mit au monde un fils, qu'il appela du nom de Guershom (« Immigré ») – car, dit-il, je suis un immigré dans un pays étranger.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 26.7 ; Ps 130.1. –  dans leur esclavage  : autre traduction à cause de l''esclavage.'
  - type: text
    content: 'Longtemps après, le roi d''Egypte mourut ; les Israélites gémissaient et criaient encore dans leur esclavage. Les appels au secours qu''ils lançaient dans leur esclavage montèrent vers Dieu. '
  '24':
  - type: note
    content: 'soupirs  : même terme en 6.5 ; Jg 2.18 ; Ez 30.24. –  alliance Gn 15.14,18 ; 17.2 ; Lv 26.42+.'
  - type: text
    content: 'Dieu entendit leurs soupirs. Dieu se souvint de son alliance avec Abraham, Isaac et Jacob. '
  '25':
  - type: note
    content: 'il sut  : litt. Dieu connut  ; la phrase semble incomplète. LXX il se fit connaître d''eux (cf. 3.7 ; 6.5).'
  - type: text
    content: Dieu regarda les Israélites et il sut…
  '3':
  - type: note
    content: 'caisse  : le mot hébreu tébah est celui qui désigne l’arche de Noé (cf. Gn 6.14n), de même au v. 5. Il n''apparaît nulle part ailleurs dans la Bible hébraïque. –  de papyrus  : cf. Es 18.2. –  joncs  : cf. 13.18.'
  - type: text
    content: 'Ne pouvant pas le cacher plus longtemps, elle prit pour lui une caisse de papyrus, qu''elle enduisit de bitume et de poix ; elle y mit l''enfant et la déposa parmi les joncs, au bord du Nil. '
  '4':
  - type: note
    content: 'La sœur de l''enfant  : litt. sa sœur, de même au v. 7.'
  - type: text
    content: La sœur de l'enfant se posta à quelque distance, pour savoir ce qui lui arriverait.
  '5':
  - type: text
    content: 'La fille du pharaon descendit se baigner dans le Nil, tandis que ses servantes se promenaient au bord du Nil. Elle aperçut la caisse au milieu des joncs et envoya une de ses servantes la prendre. '
  '6':
  - type: note
    content: 'Elle voulait l''épargner  : autre traduction elle en eut pitié  ; même verbe en Dt 13.9 ; terme apparenté en Gn 19.16.'
  - type: text
    content: 'Elle l''ouvrit et vit l''enfant : c''était un petit garçon qui pleurait. Elle voulait l''épargner, mais elle dit : C''est un des enfants des Hébreux ! '
  '7':
  - type: note
    content: V. 4n.
  - type: text
    content: 'Alors la sœur de l''enfant dit à la fille du pharaon : Veux-tu que j''aille t''appeler une nourrice d''entre les femmes des Hébreux, afin qu''elle allaite cet enfant pour toi ? '
  '8':
  - type: note
    content: 'La jeune fille  : sur le terme hébreu correspondant, voir Es 7.14n.'
  - type: text
    content: 'Va, lui répondit la fille du pharaon. La jeune fille alla donc appeler la mère de l''enfant. '
  '9':
  - type: text
    content: 'La fille du pharaon lui dit : Emporte cet enfant, et allaite-le pour moi ; je te donnerai ton salaire. La femme prit l''enfant et l''allaita.'
