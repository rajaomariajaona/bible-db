document_id: EXO.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Naissance et enfance de Moïse
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 6.16-20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour femme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Un homme de la maison de Lévi alla prendre pour femme une fille de Lévi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On a souvent comparé ce récit à celui de la naissance de Sargon I
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ', roi d''Akkad, dans un texte datant probablement de la fin du III'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' millénaire et connu par des copies incomplètes du I'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: er
      - type: text
        text: ' millénaire av. J.-C. : « Ma ville est Azoupiranou, située sur les rives de l''Euphrate. Ma mère Enitoum me conçut, en cachette elle m''enfanta. Elle me disposa dans une corbeille de joncs. De bitume elle scella mon couvercle. Elle me jeta dans le fleuve qui ne m''engloutit pas. Le fleuve m''entraîna et m''apporta à Akki, le puiseur d''eau. Akki, le puiseur d''eau, m''accueillit comme son fils et m''éleva. Il fit de moi son jardinier. Tandis que j''étais son jardinier, Ishtar (déesse de l''amour et de la fécondité) me donna son amour. Et pendant quatorze ans j''ai régné. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: beau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot signifie également '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: bon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Cf. Ac 7.20 ; Hé 11.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lunes.
    marker-yv: yv-n
  - type: text
    text: 'Cette femme fut enceinte et mit au monde un fils. Elle vit qu''il était beau et elle le cacha pendant trois mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: caisse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tébah '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est celui qui désigne l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'arche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de Noé (cf. Gn 6.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), de même au v. 5. Il n''apparaît nulle part ailleurs dans la Bible hébraïque. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de papyrus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 18.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: joncs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 13.18.'
    marker-yv: yv-n
  - type: text
    text: 'Ne pouvant pas le cacher plus longtemps, elle prit pour lui une caisse de papyrus, qu''elle enduisit de bitume et de poix ; elle y mit l''enfant et la déposa parmi les joncs, au bord du Nil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: La sœur de l'enfant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa sœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 7.'
    marker-yv: yv-n
  - type: text
    text: La sœur de l'enfant se posta à quelque distance, pour savoir ce qui lui arriverait.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'La fille du pharaon descendit se baigner dans le Nil, tandis que ses servantes se promenaient au bord du Nil. Elle aperçut la caisse au milieu des joncs et envoya une de ses servantes la prendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elle voulait l'épargner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle en eut pitié
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même verbe en Dt 13.9 ; terme apparenté en Gn 19.16.'
    marker-yv: yv-n
  - type: text
    text: 'Elle l''ouvrit et vit l''enfant : c''était un petit garçon qui pleurait. Elle voulait l''épargner, mais elle dit : C''est un des enfants des Hébreux ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors la sœur de l''enfant dit à la fille du pharaon : Veux-tu que j''aille t''appeler une nourrice d''entre les femmes des Hébreux, afin qu''elle allaite cet enfant pour toi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: La jeune fille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur le terme hébreu correspondant, voir Es 7.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Va, lui répondit la fille du pharaon. La jeune fille alla donc appeler la mère de l''enfant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'La fille du pharaon lui dit : Emporte cet enfant, et allaite-le pour moi ; je te donnerai ton salaire. La femme prit l''enfant et l''allaita.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(en hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Moshé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') est rapproché du verbe hébreu traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je l''ai retiré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: meshitihou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ps 18.17). Il rappelle par ailleurs le mot égyptien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mosis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui revient souvent dans des noms propres se référant au nom d''une divinité et qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'créé, engendré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'issu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de la divinité, p. ex. de Thot pour Thoutmosis).
    marker-yv: yv-n
  - type: text
    text: Quand l'enfant eut grandi, elle l'amena à la fille du pharaon, et celle-ci le prit pour fils. Elle l'appela du nom de Moïse (« Tiré »), car, dit-elle, je l'ai retiré de l'eau.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Moïse s'enfuit en Madiân
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ses frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les Hébreux, cf. 4.18. – Sur l''ensemble, voir Ac 7.23-29 ; Hé 11.24-27.'
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là, Moïse, devenu grand, se rendit auprès de ses frères et vit leurs corvées. Il vit un Egyptien qui frappait un Hébreu, l''un de ses frères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il se tourna d''un côté et de l''autre et, voyant qu''il n''y avait personne, il abattit l''Egyptien et le cacha dans le sable. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui qui avait tort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le méchant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: compagnon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prochain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme hébreu peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ami.
    marker-yv: yv-n
  - type: text
    text: 'Comme il sortait le jour suivant, il vit deux Hébreux qui se querellaient. Il dit à celui qui avait tort : Pourquoi frappes-tu ton compagnon ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Vas-tu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parles-tu pour me tuer…
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : Qui t''a fait chef et juge sur nous ? Vas-tu me tuer comme tu as tué l''Egyptien ? Moïse eut peur ; il se dit : Ainsi la chose se sait ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''installer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''assit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent deux sens possibles d''un même verbe hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Madiân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.19 ; Gn 25.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 37.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: près d'un puits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: près du puits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''article défini peut renvoyer à un puits connu par une tradition précise, mais ce n''est pas forcément le cas.'
    marker-yv: yv-n
  - type: text
    text: Quand le pharaon apprit ce qui s'était passé, il chercha à tuer Moïse. Moïse s'enfuit pour échapper au pharaon et il vint s'installer en Madiân. Il s'assit près d'un puits.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Gn 24.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtre
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un prêtre.
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre de Madiân avait sept filles. Elles vinrent puiser de l''eau et remplirent les auges pour faire boire le troupeau de leur père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les chassèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ils voulaient peut-être abreuver leurs propres troupeaux avec l''eau puisée par les jeunes filles, de façon à s''épargner la peine de puiser l''eau eux-mêmes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les défendit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les sauva.
    marker-yv: yv-n
  - type: text
    text: 'Mais les bergers arrivèrent et les chassèrent. Alors Moïse se leva, les défendit et fit boire leur troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Réouel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jéthro '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: à partir de 3.1 ; cf. 18.1 ; Nb 10.29 ; Jg 1.16.
    marker-yv: yv-n
  - type: text
    text: 'Quand elles furent de retour auprès de Réouel, leur père, il dit : Pourquoi revenez-vous si tôt aujourd''hui ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Elles répondirent : Un Egyptien nous a délivrées de la main des bergers ; il a même puisé de l''eau pour nous et il a fait boire le troupeau. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: laissé là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant est souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: abandonner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: manger ici
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: manger du pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 3.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dit à ses filles : Où est-il ? Pourquoi donc avez-vous laissé là cet homme ? Appelez-le, qu''il vienne manger ici.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
