    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1P 3.20s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils ont tous reçu le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: baptême
      - type: text
        text: ' de Moïse'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils ont tous été baptisés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(certains mss portent une forme légèrement différente, qu''on pourrait traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils se sont tous baptisés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils se sont tous fait baptiser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en Moïse, pour être unis à Moïse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 12.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 6.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'ils ont tous reçu le baptême de Moïse, dans la nuée et dans la mer, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 16.4-35 ; Dt 8.3 ; Ps 78.24-29 ; Jn 6.31,49. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nourriture '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: spirituelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'ils ont tous mangé la même nourriture spirituelle '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ex 17.5s ; Nb 20.7-11 ; 21.16 ; Ps 78.15s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'breuvage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'boisson '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même terme Hé 9.10). – Selon une tradition rabbinique, les Israélites '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'buvaient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'toujours au même '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rocher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'suivait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans leurs pérégrinations. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Philon
      - type: text
        text: ' a identifié ce rocher à la Sagesse, Paul l''identifie au '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Christ.
    marker-yv: yv-n
  - type: text
    text: 'et ils ont tous bu le même breuvage spirituel – ils buvaient en effet à un rocher spirituel qui les suivait, et ce rocher, c''était le Christ. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils ont été abattus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils sont tombés ; leurs cadavres jonchèrent le désert
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 14.16,23,29-33 ; Ps 78.31 ; Hé 3.17 ; Jd 5.'
    marker-yv: yv-n
  - type: text
    text: Pourtant, la plupart d'entre eux n'ont pas été agréés par Dieu, puisqu'ils ont été abattus dans le désert.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
