      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 5.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que nous n'ayons pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que nous ne soyons pas des désireurs de choses mauvaises comme ceux-là aussi désirèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 11.4,34 ; Ps 106.14.
    marker-yv: yv-n
  - type: text
    text: 'Ce sont là des exemples pour nous, afin que nous n''ayons pas de mauvais désirs, comme ils en ont eu. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'idolâtres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 14ss. –  '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ex 32.6.
    marker-yv: yv-n
  - type: text
    text: 'Ne devenez pas idolâtres, comme certains d''entre eux, ainsi qu''il est écrit : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Le peuple s'assit pour manger et pour boire ; puis ils se levèrent pour s'amuser
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'inconduite sexuelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: . – Cf. Nb 14.37 ; 25.1-9 ; 26.62.
    marker-yv: yv-n
  - type: text
    text: 'Ne nous livrons pas à l''inconduite sexuelle, comme certains d''entre eux s''y livrèrent : il en tomba vingt-trois mille en un seul jour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ne provoquons pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne mettons pas le Christ à l''épreuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne tentons pas le Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comme certains d''entre eux éprouvèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tentèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; le texte emploie deux verbes grecs différents, mais apparentés ; le second sera traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mettre à l''épreuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; certains mss portent '
    - type: usfm
      marker: fqa
