    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les fins des âges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des mondes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(traduction traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des siècles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), comme en 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 7.26 ; Mt 12.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 13.39'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Hé 9.26 ; 1P 4.7 ; 1Jn 2.18.'
    marker-yv: yv-n
  - type: text
    text: 'Or tout cela leur est arrivé à titre d''exemple et a été écrit pour nous avertir, nous sur qui la fin des temps est arrivée. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Rm 11.20+ ; 14.4 ; Ga 6.1 ; 2Th 2.15.
    marker-yv: yv-n
  - type: text
    text: Ainsi donc, que celui qui pense être debout prenne garde de tomber !
