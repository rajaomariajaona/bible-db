document_id: 1CO.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'exemple d'Israël au désert
  - type: text
    content: ' '
  - type: note
    content: je ne veux pas… Rm 1.13+. –  sous la nuée… Ex 13.21 ; 14.19-29 ; Ps 105.39.
  - type: text
    content: 'Mes frères, je ne veux pas que vous l''ignoriez : nos pères ont tous été sous la nuée, ils sont tous passés au travers de la mer, '
  '10':
  - type: note
    content: Ne maugréez pas Ex 16.2s ; Nb 14.2,36 ; 16.11-35 ; 17.6-15 ; Ps 106.25 ; Jn 6.41n  ; Ph 2.14 ; 1P 4.9 ; Jd 16. –  le destructeur Hé 11.28.
  - type: text
    content: 'Ne maugréez pas, comme certains d''entre eux maugréèrent : le destructeur les fit disparaître. '
  '11':
  - type: note
    content: 'à titre d''exemple  : litt. typiquement, v. 6n  ; cf. Hé 3.8-11. –  pour nous avertir  : cf. 9.10. –  la fin des temps  : litt. les fins des âges ou des mondes (traduction traditionnelle des siècles), comme en 1.20n  ; cf. 7.26 ; Mt 12.32n  ; 13.39n  ; Hé 9.26 ; 1P 4.7 ; 1Jn 2.18.'
  - type: text
    content: 'Or tout cela leur est arrivé à titre d''exemple et a été écrit pour nous avertir, nous sur qui la fin des temps est arrivée. '
  '12':
  - type: note
    content: Cf. Rm 11.20+ ; 14.4 ; Ga 6.1 ; 2Th 2.15.
  - type: text
    content: Ainsi donc, que celui qui pense être debout prenne garde de tomber !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'épreuve ou tentation  ; de même le verbe apparenté traduit par mis à l''épreuve pourrait être rendu par tenté  ; un verbe dérivé, qui a souvent le même sens, est traduit par provoquer au v. 9n  ; cf. 7.5 ; Mt 4.1n. –  Dieu est digne de confiance ou fidèle 1.9+. –  une issue  : même terme en Hé 13.7 ; cf. Mt 6.13 ; 2P 2.9.'
  - type: text
    content: 'Aucune épreuve ne vous est survenue qui n''ait été humaine ; or Dieu est digne de confiance : il ne permettra pas que vous soyez mis à l''épreuve au-delà de vos forces ; avec l''épreuve il ménagera aussi une issue, pour que vous puissiez la supporter.'
  - type: heading
    content: Pas d'association avec les démons
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1Jn 5.21.
  - type: text
    content: 'Aussi, mes bien-aimés, fuyez l''idolâtrie. '
  '15':
  - type: note
    content: 'Je vous parle  : autre traduction je le dis, litt. je dis. –  jugez vous-mêmes 11.13.'
  - type: text
    content: 'Je vous parle comme à des gens avisés ; jugez vous-mêmes de ce que je dis. '
  '16':
  - type: note
    content: 'coupe de bénédiction  : expression consacrée tirée du rituel de la Pâque ; cf. Lc 22.20n. –  sur laquelle nous prononçons la bénédiction  : litt. que nous bénissons, cf. Mc 8.7n. –  une communion au sang / au corps  : autre traduction une solidarité avec le sang / le corps. –  Le pain que nous rompons Ac 2.42n.'
  - type: text
    content: 'La coupe de bénédiction, sur laquelle nous prononçons la bénédiction, n''est-ce pas une communion au sang du Christ ? Le pain que nous rompons, n''est-ce pas une communion au corps du Christ ? '
  '17':
  - type: note
    content: 'Puisqu''il y a…  : autre traduction possible  : en effet, nous sommes tous un seul pain, un seul corps (avec lui)  ; cf. 12.27 ; Rm 12.5+ ; Ep 1.23 ; 4.4,25 ; 5.30 ; Col 3.15. –  nous partageons tous…  : autre traduction nous avons tous part au même pain. – Cf. Didachè 9.4 : « Comme ce pain rompu, disséminé sur les montagnes, a été rassemblé pour être un, que ton Eglise soit rassemblée de la même manière des extrémités de la terre dans ton royaume… (voir Lc 22.17n). »'
  - type: text
    content: 'Puisqu''il y a un seul pain, nous, la multitude, nous sommes un seul corps ; car nous partageons tous le même pain. '
  '18':
  - type: note
    content: 'l''Israël selon la chair Rm 9.3 ; cf. 1.3n  ; Ga 6.16. –  ceux qui mangent…  : cf. 9.13 ; Lv 6.11 ; 7.6,15. –  ne sont-ils pas…  : autres traductions ne sont-ils pas solidaires de l''autel ? n''ont-ils pas part (à ce qui est offert sur) l''autel ? mêmes possibilités au v. 20.'
  - type: text
    content: 'Voyez l''Israël selon la chair : ceux qui mangent des animaux offerts en sacrifice ne sont-ils pas en communion avec l''autel ?'
  '19':
  - type: text
    content: ' '
  - type: note
    content: '8.4,6. –  aurait de l''importance  : litt. soit quelque chose  ; cf. 3.7n.'
  - type: text
    content: 'Que dis-je alors ? Que la viande sacrifiée aux idoles aurait de l''importance ? Qu''une idole aurait de l''importance ? '
  '2':
  - type: note
    content: 'Cf. 1P 3.20s. –  ils ont tous reçu le baptême de Moïse  : litt. ils ont tous été baptisés (certains mss portent une forme légèrement différente, qu''on pourrait traduire ils se sont tous baptisés ou ils se sont tous fait baptiser) pour Moïse (autres traductions en Moïse, pour être unis à Moïse  ; cf. 12.13n  ; Rm 6.3n).'
  - type: text
    content: 'ils ont tous reçu le baptême de Moïse, dans la nuée et dans la mer, '
  '20':
  - type: note
    content: 'Non  : sous-entendu dans le texte. –  ce qu''on sacrifie  : autre traduction ce qu''ils sacrifient  ; certains mss portent ce que les non-Juifs sacrifient. –  à des démons  : cf. Lv 17.7n  ; Dt 32.17 ; Ps 106.36s ; Ap 9.20.'
  - type: text
    content: 'Non, mais ce qu''on sacrifie, on le sacrifie à des démons et non à Dieu ; or je ne veux pas que vous soyez en communion avec les démons. '
  '21':
  - type: note
    content: 2Co 6.15s. –  partager v. 17n. –  la table du Seigneur Ml 1.7,12 ; cf. Es 65.11.
  - type: text
    content: 'Vous ne pouvez pas boire à la coupe du Seigneur et à la coupe des démons ; vous ne pouvez pas partager la table du Seigneur et la table des démons. '
  '22':
  - type: note
    content: la jalousie ou la passion jalouse Dt 32.16,21.
  - type: text
    content: Ou bien voulons-nous provoquer la jalousie du Seigneur ? Sommes-nous plus forts que lui ?
  - type: heading
    content: Agir en tout pour la gloire de Dieu
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Tout est permis 6.12+. –  tout n''est pas constructif  : litt. tout ne construit pas ou tout n''édifie pas 8.1n.'
  - type: text
    content: 'Tout est permis, mais tout n''est pas utile ; tout est permis, mais tout n''est pas constructif. '
  '24':
  - type: note
    content: Cf. v. 33 ; 13.5 ; Rm 15.2 ; Ph 2.4,21.
  - type: text
    content: Que personne ne cherche son propre intérêt, mais celui de l'autre !
  '25':
  - type: text
    content: ' '
  - type: note
    content: Voir 8.1n  ; Rm 14. –  sans poser aucune question v. 27 ; 2.14n.
  - type: text
    content: 'Mangez de tout ce qui se vend au marché, sans poser aucune question par motif de conscience ; '
  '26':
  - type: note
    content: Ps 24.1  ; 50.12 ; 89.12 ; cf. Dt 10.14. –  tout ce qui s'y trouve ou, plus littéralement, ce qui la remplit  ; le même terme grec est traduit ailleurs par plénitude.
  - type: text
    content: 'car '
  - type: text
    content: c'est au Seigneur qu'appartient la terre et tout ce qui s'y trouve
  - type: text
    content: '. '
  '27':
  - type: note
    content: Cf. Lc 10.8.
  - type: text
    content: 'Si un non-croyant vous invite et que vous vouliez y aller, mangez de tout ce qu''on vous offrira, sans poser aucune question par motif de conscience. '
  '28':
  - type: note
    content: offert en sacrifice ou, d'après certains mss, offert aux idoles  ; cf. 8.7. –  à cause de et par motif de traduisent une seule préposition grecque (cf. v. 25,27) ; un ms porte seulement par motif de conscience.
  - type: text
    content: 'Mais si quelqu''un vous dit : Ceci a été offert en sacrifice, n''en mangez pas, à cause de celui qui vous a informés, et par motif de conscience. '
  '29':
  - type: note
    content: Rm 14.13ss.
  - type: text
    content: 'Quand je dis « par motif de conscience », je ne parle pas de votre conscience à vous, mais de celle de l''autre. Pourquoi, en effet, ma liberté serait-elle jugée par la conscience d''un autre ? '
  '3':
  - type: note
    content: 'Ex 16.4-35 ; Dt 8.3 ; Ps 78.24-29 ; Jn 6.31,49. –  nourriture 3.2n. –  spirituelle  : voir esprit.'
  - type: text
    content: 'ils ont tous mangé la même nourriture spirituelle '
  '30':
  - type: note
    content: 'gratitude ou action de grâces  : le terme grec correspondant est habituellement traduit par grâce  ; il est apparenté au verbe rendu ici par je rends grâce  ; cf. Rm 14.6 ; 1Tm 4.3s.'
  - type: text
    content: Si, moi, je prends ma part avec gratitude, pourquoi serais-je calomnié pour ce dont, moi, je rends grâce ?
  '31':
  - type: text
    content: ' '
  - type: note
    content: tout pour la gloire de Dieu Ph 1.10s ; Col 3.17.
  - type: text
    content: 'Ainsi, soit que vous mangiez, soit que vous buviez, ou quoi que vous fassiez, faites tout pour la gloire de Dieu. '
  '32':
  - type: note
    content: '1Th 4.12. –  pierre d''achoppement  : cf. 8.9 ; Ac 24.16n. –  Grecs / Juifs Rm 1.14n,16+. –  Eglise de Dieu 1.2 ; 11.22 ; 15.9 ; Ac 20.28 ; 2Co 1.1 ; Ga 1.13 ; 1Tm 3.5.'
  - type: text
    content: 'Ne soyez une pierre d''achoppement ni pour les Grecs, ni pour les Juifs, ni pour l''Eglise de Dieu, '
  '33':
  - type: note
    content: 'V. 24+ ; cf. 9.20-22. –  en tout…  : litt. je plais en tout à tous.'
  - type: text
    content: comme moi aussi, en tout, je veux faire ce qui plaît à chacun, cherchant, non pas mon propre intérêt, mais celui de la multitude, afin qu'elle soit sauvée.
  '4':
  - type: note
    content: Cf. Ex 17.5s ; Nb 20.7-11 ; 21.16 ; Ps 78.15s. –  breuvage ou boisson (même terme Hé 9.10). – Selon une tradition rabbinique, les Israélites buvaient toujours au même rocher, qui les suivait dans leurs pérégrinations. Philon a identifié ce rocher à la Sagesse, Paul l'identifie au Christ.
  - type: text
    content: 'et ils ont tous bu le même breuvage spirituel – ils buvaient en effet à un rocher spirituel qui les suivait, et ce rocher, c''était le Christ. '
  '5':
  - type: note
    content: 'ils ont été abattus  : autres traductions ils sont tombés ; leurs cadavres jonchèrent le désert  ; cf. Nb 14.16,23,29-33 ; Ps 78.31 ; Hé 3.17 ; Jd 5.'
  - type: text
    content: Pourtant, la plupart d'entre eux n'ont pas été agréés par Dieu, puisqu'ils ont été abattus dans le désert.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'exemples  : litt. types , cf. v. 11n  ; Rm 5.14n. –  que nous n''ayons pas…  : litt. que nous ne soyons pas des désireurs de choses mauvaises comme ceux-là aussi désirèrent Nb 11.4,34 ; Ps 106.14.'
  - type: text
    content: 'Ce sont là des exemples pour nous, afin que nous n''ayons pas de mauvais désirs, comme ils en ont eu. '
  '7':
  - type: note
    content: idolâtres v. 14ss. –  Ex 32.6.
  - type: text
    content: 'Ne devenez pas idolâtres, comme certains d''entre eux, ainsi qu''il est écrit : '
  - type: text
    content: Le peuple s'assit pour manger et pour boire ; puis ils se levèrent pour s'amuser
  - type: text
    content: '. '
  '8':
  - type: note
    content: inconduite sexuelle 5.1n. – Cf. Nb 14.37 ; 25.1-9 ; 26.62.
  - type: text
    content: 'Ne nous livrons pas à l''inconduite sexuelle, comme certains d''entre eux s''y livrèrent : il en tomba vingt-trois mille en un seul jour. '
  '9':
  - type: note
    content: 'Ne provoquons pas…  : litt. ne mettons pas le Christ à l''épreuve (ou ne tentons pas le Christ) comme certains d''entre eux éprouvèrent (ou tentèrent) ; le texte emploie deux verbes grecs différents, mais apparentés ; le second sera traduit par mettre à l''épreuve au v. 13n. –  le Christ  : cf. v. 4n  ; certains mss portent le Seigneur  ; Ps 78.18 ; Mt 4.7s/ /. –  les serpents Nb 21.5s. –  les firent disparaître  : autre traduction les perdirent  ; même possibilité v. 10.'
  - type: text
    content: 'Ne provoquons pas le Christ, comme certains d''entre eux le firent : les serpents les firent disparaître. '
