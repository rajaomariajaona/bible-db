    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je ne veux pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 1.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sous la nuée… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 13.21 ; 14.19-29 ; Ps 105.39.
    marker-yv: yv-n
  - type: text
    text: 'Mes frères, je ne veux pas que vous l''ignoriez : nos pères ont tous été sous la nuée, ils sont tous passés au travers de la mer, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
