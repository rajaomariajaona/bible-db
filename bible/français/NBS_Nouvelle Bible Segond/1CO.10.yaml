      - type: text
        text: le Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Ps 78.18 ; Mt 4.7s/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les serpents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 21.5s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les firent disparaître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les perdirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même possibilité v. 10.'
    marker-yv: yv-n
  - type: text
    text: 'Ne provoquons pas le Christ, comme certains d''entre eux le firent : les serpents les firent disparaître. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ne maugréez pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 16.2s ; Nb 14.2,36 ; 16.11-35 ; 17.6-15 ; Ps 106.25 ; Jn 6.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ph 2.14 ; 1P 4.9 ; Jd 16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le destructeur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hé 11.28.
    marker-yv: yv-n
  - type: text
    text: 'Ne maugréez pas, comme certains d''entre eux maugréèrent : le destructeur les fit disparaître. '
  - type: usfm
    marker: v
