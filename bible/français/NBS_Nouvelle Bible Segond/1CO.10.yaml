    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.4 : « Comme ce pain rompu, disséminé sur les montagnes, a été rassemblé pour être un, que ton Eglise soit rassemblée de la même manière des extrémités de la terre dans ton royaume… (voir Lc 22.17'
