    marker-yv: yv-n
  - type: text
    text: 'Quand je dis « par motif de conscience », je ne parle pas de votre conscience à vous, mais de celle de l''autre. Pourquoi, en effet, ma liberté serait-elle jugée par la conscience d''un autre ? '
