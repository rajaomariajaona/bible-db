document_id: PSA.115,104
type_code: fra
verses:
  '1':
  - type: heading
    content: A Dieu seul soit la gloire !
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 114.1n  ; voir aussi 135. –  pas à nous, mais à ton nom… Es 48.11 ; Ez 36.22s. –  donne (ou rends ) gloire  : cf. 29.1s ; Jr 13.16+ ; Ac 12.23. –  fidélité / loyauté  : cf. 25.10+ ; 108.5 ; 138.2.'
  - type: text
    content: 'Non pas à nous, '
  - type: text
    content: Seigneur
  - type: text
    content: ', non pas à nous,'
  - type: text
    content: mais à ton nom donne gloire,
  - type: text
    content: à cause de ta fidélité, à cause de ta loyauté !
  '10':
  - type: text
    content: ' '
  - type: note
    content: Maison d'Aaron Ex 4.14 ; 28.1 ; Lv 16.6,11 ; Nb 18.20.
  - type: text
    content: 'Maison d''Aaron, mets ta confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: – Il est leur secours et leur bouclier.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Vous qui craignez v. 13 ; 15.4+ ; 22.24 ; il s'agit peut-être ici du groupe des prosélytes ; voir Ac 10.2n.
  - type: text
    content: 'Vous qui craignez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mettez votre confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: – Il est leur secours et leur bouclier.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur se souvient  : cf. Es 49.15. –  il bénira 28.9 ; 67.7 ; 109.28 ; Nb 6.23-26.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se souvient de nous : il bénira,'
  - type: text
    content: il bénira la maison d'Israël,
  - type: text
    content: il bénira la maison d'Aaron,
  '13':
  - type: text
    content: ' '
  - type: note
    content: ceux qui craignent v. 11+ ; cf. 128.4. –  les petits et les grands Jr 6.13 ; 16.6 ; 31.34 ; Jon 3.5 ; Ap 11.18 ; 19.5.
  - type: text
    content: 'il bénira ceux qui craignent le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: les petits et les grands ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 1.11 ; Es 49.20 ; 54.1ss ; Za 10.10 ; voir aussi Ac 2.39.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donnera l''accroissement,'
  - type: text
    content: à vous et à vos fils.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 134.3 ; cf. 121.2 ; 124.8 ; 146.6 ; Gn 1.1 ; 14.19 ; Ex 20.11 ; Es 42.5 ; Pr 3.19 ; Ac 14.15 ; Ap 14.7 ; voir aussi 1S 23.21 ; Rt 2.20.
  - type: text
    content: 'Soyez bénis du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui fait le ciel et la terre !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ciel du Seigneur  : cf. v. 3 ; 8.4ss ; Lm 3.66. –  il a donné la terre… 8.7s ; Gn 1.28s ; Jr 27.5 ; Ac 17.26.'
  - type: text
    content: 'Le ciel est le ciel du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: mais il a donné la terre aux êtres humains.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '6.6+ ; 94.17 ; Es 38.18. –  le Seigneur (Yah)  : cf. v. 18 ; 68.5n  ; 104.35n. –  dans le lieu du silence  : litt. au silence.'
  - type: text
    content: 'Ce ne sont pas les morts qui louent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah),'
  - type: text
    content: ni aucun de ceux qui descendent dans le lieu du silence ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: dès maintenant… 113.2+. –  Louez le Seigneur 104.35n.
  - type: text
    content: 'mais nous, nous bénirons le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah),'
  - type: text
    content: dès maintenant et pour toujours.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 79.10+ ; cf. Ex 32.12 ; Nb 14.15s.
  - type: text
    content: 'Pourquoi les nations diraient-elles :'
  - type: text
    content: Où donc est leur Dieu ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Notre Dieu…  : cf. 2.4 ; 11.4 ; 103.19 ; 123.1 ; Jon 1.9. –  tout ce qu''il veut  : cf. 135.6 ; Jb 23.13 ; Sagesse 12.17s : « Il fait montre de sa force, celui dont le pouvoir absolu est mis en doute, et il confond l''arrogance de ceux-là mêmes qui reconnaissent ce pouvoir. Mais toi qui maîtrises ta force, tu juges avec sérénité, et tu nous gouvernes avec tant de ménagements. Le pouvoir d''agir est à ta disposition quand tu le veux. »'
  - type: text
    content: Notre Dieu est au ciel,
  - type: text
    content: il fait tout ce qu'il veut.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 135.15ss ; Dt 4.28 ; Es 40.19s ; 41.6s ; 44.9ss ; 46.6s ; Jr 10.3ss ; 16.20 ; Os 8.6 ; Ha 2.18 ; 2Ch 32.19 ; Ac 7.41 ; 17.29 ; 19.26 ; Rm 1.23 ; Ap 19.20.
  - type: text
    content: Leurs idoles sont de l'argent et de l'or,
  - type: text
    content: œuvre de mains humaines.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ne parlent pas  : cf. 1Co 12.2. –  des yeux  : cf. Mt 13.13.'
  - type: text
    content: Elles ont une bouche et ne parlent pas,
  - type: text
    content: elles ont des yeux et ne voient pas,
  '6':
  - type: text
    content: elles ont des oreilles et n'entendent pas,
  - type: text
    content: elles ont un nez et ne sentent pas.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'aucun murmure…  : litt. elles ne murmurent pas avec leur gosier  ; cf. 1.2n.'
  - type: text
    content: Elles ont leurs mains et ne palpent pas,
  - type: text
    content: elles ont leurs pieds et ne marchent pas,
  - type: text
    content: aucun murmure ne sort de leur gosier.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 135.18 ; Es 44.9 ; Jr 2.5 ; Sagesse 14.8s : « Maudite l''idole fabriquée, elle et son auteur, celui-ci pour l''avoir façonnée, et elle, une chose corruptible, pour avoir été nommée dieu. Car Dieu déteste également l''impie et son impiété. »'
  - type: text
    content: Ils leur ressemblent, ceux qui les font,
  - type: text
    content: tous ceux qui mettent leur confiance en elles !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Israël  : plusieurs mss hébreux et des versions anciennes portent maison d''Israël  ; cf. v. 12 ; 130.7 ; peut-être cette partie du psaume était-elle antiphonée, avec des répons de plusieurs groupes (v. 9-11) à l''intérieur de l''assemblée ; cf. 118.2ss ; 135.19s ; 136. –  confiance 4.6+ ; 37.3 ; 62.9,11. –  secours / bouclier (3.4+ ; 28.7) : cf. 33.20.'
  - type: text
    content: 'Israël, mets ta confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: – Il est leur secours et leur bouclier.
