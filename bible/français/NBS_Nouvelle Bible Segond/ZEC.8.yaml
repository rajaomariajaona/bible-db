document_id: ZEC.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesses de paix et d'abondance
  - type: text
    content: ' '
  - type: note
    content: 'parvint  : litt. fut  ; Syr et Tg ont la formule plus complète ( fut sur moi ou fut auprès de moi ) habituellement traduite par me parvint (v. 18 ; 7.4).'
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées parvint : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ag 1.4-11 ; 2.15-19 ; 2Ch 15.3ss,5n. –  il n''y avait de paix pour personne (litt. pour celui qui sortait et pour celui qui rentrait ) : autre traduction rien n''allait bien pour personne.'
  - type: text
    content: Car avant ces jours-là
  - type: text
    content: il n'y avait pas de salaire pour les humains
  - type: text
    content: et pas de salaire pour les bêtes ;
  - type: text
    content: il n'y avait de paix pour personne,
  - type: text
    content: à cause de l'ennemi.
  - type: text
    content: J'avais lâché tous les humains
  - type: text
    content: les uns contre les autres.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'comme j''étais…  : litt. comme les premiers jours.'
  - type: text
    content: 'Maintenant – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: je ne suis pas pour le reste de ce peuple
  - type: text
    content: comme j'étais par le passé.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Os 2.23-25 ; Am 9.13-15 ; Ps 85.13. –  ce sont…  : litt. semence de paix ou de prospérité.'
  - type: text
    content: 'Car ce sont des semailles de paix :'
  - type: text
    content: la vigne donnera son fruit,
  - type: text
    content: la terre donnera ses produits
  - type: text
    content: et le ciel donnera sa rosée ;
  - type: text
    content: je donnerai tous ces biens comme patrimoine
  - type: text
    content: au reste de ce peuple.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'vous serez bénédiction  : cf. Gn 12.2 ; Es 19.24s ; Ag 2.19. –  N''ayez pas peur 1Ch 28.20+ ; voir crainte. –  prenez courage v. 9n  ; cf. Es 35.3.'
  - type: text
    content: Tout comme vous avez été malédiction parmi les nations,
  - type: text
    content: maison de Juda et maison d'Israël,
  - type: text
    content: de même je vous sauverai,
  - type: text
    content: et vous serez bénédiction.
  - type: text
    content: N'ayez pas peur,
  - type: text
    content: prenez courage !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 32.42 ; Esd 5.12. –  j''avais décidé… v. 15 ; 1.6. –  pas regretté  : cf. v. 15+ ; Nb 23.19 ; 1S 15.29 ; Jr 4.28 ; Am 1.3 ; Ps 110.4 ; Rm 11.29 ; Hé 6.17s.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Tout comme j'avais décidé de vous faire du mal
  - type: text
    content: lorsque vos pères provoquaient mon irritation,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: et que je ne l'ai pas regretté,
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'je suis revenu  : autre traduction je me suis ravisé  ; cf. v. 3+ ; 1.3 ; voir aussi Jr 18.8 ; 26.3 ; Jl 2.13 ; Am 7.3 ; Jon 3.10 ; 4.2.'
  - type: text
    content: de même je suis revenu
  - type: text
    content: et j'ai décidé en ces jours-ci
  - type: text
    content: de faire du bien à Jérusalem et à la maison de Juda.
  - type: text
    content: N'ayez pas peur !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.9ss. –  ce que vous ferez  : autre traduction les paroles que vous mettrez en pratique . –  Parlez loyalement ou avec loyauté  ; autre traduction dites la vérité , v. 3n  ; Ep 4.25 . –  avec loyauté  : cette répétition est omise par LXX  ; elle pourrait être due à une erreur de copie. –  jugez correctement  : litt. jugez d''un jugement de paix (cf. 7.9n). Le terme correspondant à paix évoque souvent, d''une façon très générale, ce qui est convenable, ce qui va bien . –  aux portes de vos villes  : litt. à vos portes  ; cf. Dt 16.18n.'
  - type: text
    content: 'Voici ce que vous ferez :'
  - type: text
    content: Parlez loyalement, chacun à son prochain ;
  - type: text
    content: avec loyauté, jugez correctement aux portes de vos villes ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.3 ; 7.10 ; voir aussi Lv 19.12+ ; Mt 5.33. – Voir cœur.
  - type: text
    content: que personne ne prépare en son cœur du mal
  - type: text
    content: contre son prochain.
  - type: text
    content: N'aimez pas les faux serments,
  - type: text
    content: car tout cela, je le déteste
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les jours de jeûne deviendront jours de joie
  '18':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées me parvint : '
  '19':
  - type: note
    content: 'quatrième mois (le mot pour mois est sous-entendu dans le texte) : en souvenir de la prise de Jérusalem (Jr 52.6ss). –  cinquième / septième  : cf. 7.3n,5n. –  dixième  : en souvenir du début du siège (2R 25.1 ; Jr 52.4). –  jours de gaieté  : cf. Es 60.20 ; Jr 31.13 ; Ps 90.15 ; Jn 16.20. –  loyauté ou vérité  ; cf. v. 3n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Le jeûne du quatrième mois, le jeûne du cinquième mois,
  - type: text
    content: le jeûne du septième mois et le jeûne du dixième mois
  - type: text
    content: deviendront pour la maison de Juda
  - type: text
    content: des jours de gaieté et de joie,
  - type: text
    content: d'heureuses rencontres festives.
  - type: text
    content: Mais aimez la loyauté et la paix.
  '2':
  - type: note
    content: 1.14+,15. –  ardeur ou fureur, le mot hébreu peut avoir les deux sens.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Je suis pris d'une grande passion, d'une passion jalouse pour Sion,
  - type: text
    content: je suis saisi pour elle d'une grande et brûlante ardeur.
  '20':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 2.2.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Il viendra encore des peuples
  - type: text
    content: et des habitants d'un grand nombre de villes.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'essayer d''apaiser 7.2n. –  chercher Ps 9.11. –  j''irai  : la collectivité de la ville est ici, comme souvent, personnifiée.'
  - type: text
    content: 'Les habitants d''une ville iront à l''autre, en disant :'
  - type: text
    content: 'Allons essayer d''apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: 'et chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées !'
  - type: text
    content: Moi aussi j'irai !
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.15+ ; Es 2.3 ; 45.14.
  - type: text
    content: Une multitude de peuples, des nations fortes
  - type: text
    content: 'viendront à Jérusalem pour chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: 'pour essayer d''apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'dix hommes  : cf. Lv 26.26 ; Jg 6.27 ; 2R 25.25 ; Rt 4.2. –  un Juif  : autre traduction un Judéen  ; sur ce nom, employé après l''exil, cf. Est 2.5n  ; 3.6,10,13 ; Dn 3.8n  ; Né 1.2. –  Dieu est avec vous  : cf. 1Co 14.25 ; voir aussi Es 7.14n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : En ces jours-là, dix hommes de toutes les langues des nations saisiront un Juif, ils le saisiront par le pan de son vêtement et diront : Nous irons avec vous, car nous avons appris que Dieu est avec vous.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur  : plusieurs mss hébreux et des versions anciennes ajoutent des Armées (cf. v. 1,4,6 etc.). –  Je reviens… 1.16 ; 2.14. –  Jérusalem sera appelée…  : cf. Es 1.21,26 ; 60.14 ; 62.12 ; Jr 33.16 ; Ez 48.35+. –  loyauté ou vérité  ; cf. v. 8,16,19. –  la montagne… Es 2.2s ; 11.9+ ; Ez 20.40+. –  Montagne sacrée  : autres traductions mont Sacré ; montagne de la sainteté.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je reviens à Sion
  - type: text
    content: et je demeurerai au milieu de Jérusalem.
  - type: text
    content: Jérusalem sera appelée « Ville de la loyauté »,
  - type: text
    content: 'et la montagne du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, « Montagne sacrée ».'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 65.20.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Des vieillards, hommes et femmes,
  - type: text
    content: s'assiéront encore sur les places de Jérusalem,
  - type: text
    content: chacun son bâton à la main,
  - type: text
    content: à cause du grand nombre de leurs jours.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 9.20 ; 49.26 ; 50.30.
  - type: text
    content: Les places de la ville
  - type: text
    content: seront remplies de garçons et de filles
  - type: text
    content: jouant sur les places.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'étonnant  : cf. Gn 18.14 ; Jr 32.27 ; voir aussi Es 50.2 ; Mt 19.26/ / ; Lc 1.37. –  reste  : les rescapés de l''exil, comme en Ag 1.12+ ; cf. Es 1.9+.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Si cela paraît étonnant
  - type: text
    content: au reste de ce peuple, en ces jours-là,
  - type: text
    content: cela sera-t-il aussi étonnant pour moi ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Es 43.5.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Je sauve mon peuple
  - type: text
    content: du pays du levant et du pays du soleil couchant.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ils seront mon peuple… 13.9 ; Jr 7.23+ ; Ez 11.20+ ; Ap 21.3,7. –  loyauté (ou vérité , v. 3n) / justice  : cf. 1R 3.6 ; Ps 19.10.'
  - type: text
    content: Je les ramènerai,
  - type: text
    content: et ils demeureront dans Jérusalem ;
  - type: text
    content: ils seront mon peuple,
  - type: text
    content: et moi, je serai leur Dieu
  - type: text
    content: dans la loyauté et la justice.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.9 ; Ag 1.1 ; Esd 5.1s. –  Prenez courage  : litt. que vos mains soient fortes . –  au temps  : litt. au jour . – Voir temple.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Prenez courage,
  - type: text
    content: vous qui entendez en ces jours-ci
  - type: text
    content: ces paroles que les prophètes prononcèrent
  - type: text
    content: 'au temps où furent posées les fondations de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: au temps où le temple allait être bâti.
