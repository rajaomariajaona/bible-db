    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: humble d'apparence (quand je suis) parmi vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. v. 10 ; 1Co 2.3+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'plein de hardiesse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de courage, de confiance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 5.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Moi, Paul, je vous y encourage par la douceur et la bienveillance du Christ, – moi qui suis humble en face de vous et qui, de loin, suis plein de hardiesse à votre égard – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 11+ ; 1Co 4.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à montrer…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à m''enhardir de la confiance que je compte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même verbe est traduit plus loin par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: estimer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'oser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 12) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'contre ceux… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vivons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: marchons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'selon la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',17+.'
    marker-yv: yv-n
  - type: text
    text: 'je vous en prie : que je n''aie pas, une fois présent, à montrer ma confiance sous forme de hardiesse, comme je compte bien oser le faire à l''encontre de ceux qui estiment que nous vivons selon la chair. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ga 2.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous combattons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous faisons la guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1Co 9.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En effet, si c''est bien dans la chair que nous vivons, ce n''est pas selon la chair que nous combattons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'armes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celles de la chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: charnelles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du fait de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: démolir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même terme v. 8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des forteresses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 2.11-18 ; Pr 21.22.'
    marker-yv: yv-n
  - type: text
    text: 'Car les armes avec lesquelles nous combattons ne sont pas celles de la chair ; cependant elles ont le pouvoir, du fait de Dieu, de démolir des forteresses. Nous démolissons les raisonnements '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'obéissance du Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''obéissance au Christ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rm 1.5+.
    marker-yv: yv-n
  - type: text
    text: 'et toute hauteur qui s''élève contre la connaissance de Dieu, et nous nous emparons de toute pensée pour l''amener, captive, à l''obéissance du Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.9+ ; 7.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'faire '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Rm 13.4 ; 2Th 1.8 ; 1P 2.14.
    marker-yv: yv-n
  - type: text
    text: Nous sommes prêts aussi à faire justice de toute désobéissance, lorsque votre obéissance à vous sera complète.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Regardez les choses en face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous regardez aux apparences
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'est persuadé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, plus littéralement, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'est persuadé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Lc 18.9 ; Rm 2.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il appartient au Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'être de Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 5.17 ; 1Co 1.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nous aussi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 11.23.
    marker-yv: yv-n
  - type: text
    text: 'Regardez les choses en face ! Si quelqu''un est persuadé qu''il appartient au Christ, qu''il tienne également compte de ceci : s''il appartient au Christ, nous aussi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je serais un peu trop fier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.14+ ; cf. 11.16,18 ; 12.6 ; Ph 3.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de l''autorité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du pouvoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Mc 1.22+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour vous construire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour vous édifier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 12.19+)… : v. 4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 13.10 ; 1Co 5.4s ; voir aussi Jr 1.10 ; 24.6.'
    marker-yv: yv-n
  - type: text
    text: 'Et quand même je serais un peu trop fier de l''autorité que le Seigneur nous a donnée, pour vous construire et non pour vous démolir, je n''en aurais pas honte ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mais je ne veux pas paraître…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour que je ne paraisse pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mes lettres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2P 3.16.
    marker-yv: yv-n
  - type: text
    text: 'mais je ne veux pas paraître vous intimider par mes lettres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sont sévères et fortes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ont du poids et de la force
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sa parole… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 11.6 ; 1Co 2.1-5.
    marker-yv: yv-n
  - type: text
    text: '« Car ses lettres, dit-on, sont sévères et fortes ; mais, lorsqu''il est présent en personne, il est faible, et sa parole est méprisable. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui qui parle de la sorte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un tel (individu)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tels nous sommes… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 2 ; 12.20 ; 13.2,10 ; cf. 1Co 4.18s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nous serons '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nous sommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (le verbe est sous-entendu dans le texte).
    marker-yv: yv-n
  - type: text
    text: 'Qu''il tienne compte de ceci, celui qui parle de la sorte : tels nous sommes en parole dans nos lettres, étant absents, tels aussi nous serons en œuvre, une fois présents.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.1+.
    marker-yv: yv-n
  - type: text
    text: 'Nous n''oserions pas nous égaler ou nous comparer à quelques-uns de ceux qui se recommandent eux-mêmes. D''ailleurs, en se mesurant à leur propre mesure et en se comparant à eux-mêmes, ceux-là manquent d''intelligence. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que Dieu nous a départi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que le Dieu de (toute) mesure nous a mesuré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Paul passe d''une affirmation très générale (cf. Rm 12.3) à la question concrète du territoire sur lequel il exerce son activité (v. 14-16), comme en Rm 15.17-21 ; Ga 2.9. Le mot traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'domaine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(aussi v. 15s) signifie également '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'règle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Ga 6.16) ; c'est lui qui a donné notre mot « canon ».
    marker-yv: yv-n
  - type: text
    text: 'Quant à nous, nous ne voudrions pas faire les fiers hors de toute mesure ; nous prendrons au contraire pour mesure le domaine que Dieu nous a départi en nous faisant parvenir aussi jusqu''à vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est bien jusqu'à vous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: c'est bien nous qui sommes arrivés (les premiers) jusqu'à vous…
    marker-yv: yv-n
  - type: text
    text: 'Nous ne dépassons pas nos limites, comme si nous n''étions pas parvenus jusqu''à vous ; car c''est bien jusqu''à vous que nous sommes arrivés avec la bonne nouvelle du Christ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 15.20.'
    marker-yv: yv-n
  - type: text
    text: 'Nous ne mettons pas, hors de toute mesure, notre fierté dans les travaux d''autrui. Mais nous avons l''espérance, si votre foi augmente, de devenir encore plus grands parmi vous, dans notre propre domaine, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Rm 15.23s.
    marker-yv: yv-n
  - type: text
    text: 'en annonçant la bonne nouvelle dans les régions situées au-delà de chez vous, au lieu de mettre notre fierté en ce qui a déjà été fait dans le domaine d''autrui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
