        text: Jr 9.22s
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; 1Co 1.31.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Que le fier mette sa fierté dans le Seigneur !
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
