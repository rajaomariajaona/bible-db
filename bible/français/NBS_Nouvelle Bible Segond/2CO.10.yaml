document_id: 2CO.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul défend son ministère
  - type: text
    content: ' '
  - type: note
    content: 'Moi, Paul Ga 5.2. –  encourage ou exhorte  ; cf. Rm 12.1+. –  la douceur… du Christ Mt 5.5n  ; 11.29 ; cf. 1Co 4.21+. –  bienveillance  : cf. Ph 4.5n. –  humble en face de vous  : autre traduction humble d''apparence (quand je suis) parmi vous  ; cf. v. 10 ; 1Co 2.3+. –  plein de hardiesse ou de courage, de confiance , cf. 5.6n.'
  - type: text
    content: 'Moi, Paul, je vous y encourage par la douceur et la bienveillance du Christ, – moi qui suis humble en face de vous et qui, de loin, suis plein de hardiesse à votre égard – '
  '10':
  - type: note
    content: 'V. 1. –  sont sévères et fortes  : autre traduction ont du poids et de la force. –  sa parole… 11.6 ; 1Co 2.1-5.'
  - type: text
    content: '« Car ses lettres, dit-on, sont sévères et fortes ; mais, lorsqu''il est présent en personne, il est faible, et sa parole est méprisable. » '
  '11':
  - type: note
    content: 'celui qui parle de la sorte  : litt. un tel (individu)  ; cf. 2.5n. –  tels nous sommes… v. 2 ; 12.20 ; 13.2,10 ; cf. 1Co 4.18s. –  nous serons ou nous sommes (le verbe est sous-entendu dans le texte).'
  - type: text
    content: 'Qu''il tienne compte de ceci, celui qui parle de la sorte : tels nous sommes en parole dans nos lettres, étant absents, tels aussi nous serons en œuvre, une fois présents.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 3.1+.
  - type: text
    content: 'Nous n''oserions pas nous égaler ou nous comparer à quelques-uns de ceux qui se recommandent eux-mêmes. D''ailleurs, en se mesurant à leur propre mesure et en se comparant à eux-mêmes, ceux-là manquent d''intelligence. '
  '13':
  - type: note
    content: 'que Dieu nous a départi  : autre traduction possible que le Dieu de (toute) mesure nous a mesuré  ; Paul passe d''une affirmation très générale (cf. Rm 12.3) à la question concrète du territoire sur lequel il exerce son activité (v. 14-16), comme en Rm 15.17-21 ; Ga 2.9. Le mot traduit par domaine (aussi v. 15s) signifie également règle (Ga 6.16) ; c''est lui qui a donné notre mot « canon ».'
  - type: text
    content: 'Quant à nous, nous ne voudrions pas faire les fiers hors de toute mesure ; nous prendrons au contraire pour mesure le domaine que Dieu nous a départi en nous faisant parvenir aussi jusqu''à vous. '
  '14':
  - type: note
    content: 'c''est bien jusqu''à vous…  : autre traduction c''est bien nous qui sommes arrivés (les premiers) jusqu''à vous…'
  - type: text
    content: 'Nous ne dépassons pas nos limites, comme si nous n''étions pas parvenus jusqu''à vous ; car c''est bien jusqu''à vous que nous sommes arrivés avec la bonne nouvelle du Christ. '
  '15':
  - type: note
    content: V. 13n  ; Rm 15.20.
  - type: text
    content: 'Nous ne mettons pas, hors de toute mesure, notre fierté dans les travaux d''autrui. Mais nous avons l''espérance, si votre foi augmente, de devenir encore plus grands parmi vous, dans notre propre domaine, '
  '16':
  - type: note
    content: Cf. Rm 15.23s.
  - type: text
    content: 'en annonçant la bonne nouvelle dans les régions situées au-delà de chez vous, au lieu de mettre notre fierté en ce qui a déjà été fait dans le domaine d''autrui. '
  '17':
  - type: note
    content: Jr 9.22s  ; 1Co 1.31.
  - type: text
    content: Que le fier mette sa fierté dans le Seigneur !
  - type: text
    content: ' '
  '18':
  - type: note
    content: 3.1+.
  - type: text
    content: Car ce n'est pas celui qui se recommande lui-même qui est approuvé, c'est celui que le Seigneur recommande.
  '2':
  - type: note
    content: 'V. 11+ ; 1Co 4.21. –  à montrer…  : litt. à m''enhardir de la confiance que je compte (le même verbe est traduit plus loin par estimer) oser (v. 12) contre ceux… –  vivons  : litt. marchons, de même v. 3. –  selon la chair 1.12n,17+.'
  - type: text
    content: 'je vous en prie : que je n''aie pas, une fois présent, à montrer ma confiance sous forme de hardiesse, comme je compte bien oser le faire à l''encontre de ceux qui estiment que nous vivons selon la chair. '
  '3':
  - type: note
    content: 'Cf. Ga 2.20. –  nous combattons  : autre traduction nous faisons la guerre  ; cf. 1Co 9.7n.'
  - type: text
    content: 'En effet, si c''est bien dans la chair que nous vivons, ce n''est pas selon la chair que nous combattons. '
  '4':
  - type: note
    content: 'armes 6.7+. –  celles de la chair  : litt. charnelles, cf. 1.12n. –  du fait de Dieu  : autre traduction pour Dieu. –  démolir  : même terme v. 8. –  des forteresses  : cf. Es 2.11-18 ; Pr 21.22.'
  - type: text
    content: 'Car les armes avec lesquelles nous combattons ne sont pas celles de la chair ; cependant elles ont le pouvoir, du fait de Dieu, de démolir des forteresses. Nous démolissons les raisonnements '
  '5':
  - type: note
    content: 'l''obéissance du Christ  : autre traduction l''obéissance au Christ Rm 1.5+.'
  - type: text
    content: 'et toute hauteur qui s''élève contre la connaissance de Dieu, et nous nous emparons de toute pensée pour l''amener, captive, à l''obéissance du Christ. '
  '6':
  - type: note
    content: 2.9+ ; 7.11n. –  faire justice Rm 13.4 ; 2Th 1.8 ; 1P 2.14.
  - type: text
    content: Nous sommes prêts aussi à faire justice de toute désobéissance, lorsque votre obéissance à vous sera complète.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Regardez les choses en face  : autre traduction vous regardez aux apparences . –  est persuadé ou, plus littéralement, s''est persuadé , cf. Lc 18.9 ; Rm 2.19. –  qu''il appartient au Christ  : litt. d''être de Christ , cf. 5.17 ; 1Co 1.12n. –  nous aussi 11.23.'
  - type: text
    content: 'Regardez les choses en face ! Si quelqu''un est persuadé qu''il appartient au Christ, qu''il tienne également compte de ceci : s''il appartient au Christ, nous aussi ! '
  '8':
  - type: note
    content: 'je serais un peu trop fier 1.14+ ; cf. 11.16,18 ; 12.6 ; Ph 3.4. –  de l''autorité ou du pouvoir, cf. Mc 1.22+. –  pour vous construire (ou pour vous édifier, 12.19+)… : v. 4n  ; cf. 13.10 ; 1Co 5.4s ; voir aussi Jr 1.10 ; 24.6.'
  - type: text
    content: 'Et quand même je serais un peu trop fier de l''autorité que le Seigneur nous a donnée, pour vous construire et non pour vous démolir, je n''en aurais pas honte ; '
  '9':
  - type: note
    content: 'mais je ne veux pas paraître…  : litt. pour que je ne paraisse pas. –  mes lettres 2P 3.16.'
  - type: text
    content: 'mais je ne veux pas paraître vous intimider par mes lettres. '
