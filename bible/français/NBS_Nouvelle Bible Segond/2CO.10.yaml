      - type: text
        text: '  ; 11.29 ; cf. 1Co 4.21+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bienveillance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ph 4.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
