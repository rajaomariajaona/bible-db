        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Et cet amour,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce n'est pas que, nous, nous ayons aimé Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais que lui nous a aimés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il a envoyé son Fils
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme l'expiation pour nos péchés.
