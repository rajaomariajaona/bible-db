      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.24 ; 4.2 ; Jn 7.39 ; Rm 8.9 ; 1Co 2.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il nous a donné de son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 11.13 ; Jn 3.34 ; Ac 5.32 ; 8.18 ; 11.17 ; 15.8 ; Rm 5.5 ; 2Co 5.5 ; 1Th 4.8.
      marker-yv: yv-n
    - type: text
      text: 'A ceci nous savons que nous demeurons en lui, comme lui en nous : c''est qu''il nous a donné de son Esprit. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
