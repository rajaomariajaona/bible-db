document_id: 1JN.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Comment reconnaître ce qui vient de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'ne croyez pas  : autres traductions ne vous fiez pas à ; n''ayez pas foi en . –  tout esprit  : autre traduction tout message (prétendument) inspiré  : cf. 3.24 ; 2Th 2.2n  ; 1Tm 4.1. –  examinez  : sur le verbe correspondant, voir Rm 1.28n  ; cf. Dt 13.2-6 ; Jr 23.21s ; 28.8s ; Mt 7.15-20 ; Jn 8.42-47 ; Ep 5.8-10 ; Col 2.8 ; 1Th 5.21. –  prophètes de mensonge ou faux prophètes, pseudo-prophètes Mc 13.22/ / ; 2P 2.1 ; 2Jn 7 ; Ap 2.2. –  sortis 2.19 ; 2Jn 7.'
  - type: text
    content: 'Bien-aimés, ne croyez pas tout esprit ; examinez plutôt les esprits pour savoir s''ils sont de Dieu, car beaucoup de prophètes de mensonge sont sortis dans le monde. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 19 ; cf. Rm 5.6-8 ; 2Co 5.19 ; Ep 1.4 ; 2.4s ; Col 2.13 ; 2Th 2.16. –  l'expiation pour nos péchés 2.2n.
  - type: text
    content: Et cet amour,
  - type: text
    content: ce n'est pas que, nous, nous ayons aimé Dieu,
  - type: text
    content: mais que lui nous a aimés
  - type: text
    content: et qu'il a envoyé son Fils
  - type: text
    content: comme l'expiation pour nos péchés.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'V. 7. –  nous a tant aimés  : litt. nous a aimés ainsi . –  nous devons 3.16+ ; cf. Mt 18.33 ; Rm 13.8.'
  - type: text
    content: 'Bien-aimés, si Dieu nous a tant aimés, nous devons, nous aussi, nous aimer les uns les autres. '
  '12':
  - type: note
    content: Personne n'a jamais vu Dieu v. 20 ; Jn 1.18+. –  Dieu demeure en nous v. 15s ; 3.24+ ; cf. Jn 14.23. –  accompli 2.5+.
  - type: text
    content: 'Personne n''a jamais vu Dieu. Si nous nous aimons les uns les autres, Dieu demeure en nous, et son amour est accompli en nous. '
  '13':
  - type: note
    content: 3.24 ; 4.2 ; Jn 7.39 ; Rm 8.9 ; 1Co 2.12. –  il nous a donné de son Esprit Lc 11.13 ; Jn 3.34 ; Ac 5.32 ; 8.18 ; 11.17 ; 15.8 ; Rm 5.5 ; 2Co 5.5 ; 1Th 4.8.
  - type: text
    content: 'A ceci nous savons que nous demeurons en lui, comme lui en nous : c''est qu''il nous a donné de son Esprit. '
  '14':
  - type: note
    content: nous avons vu… 1.2+. –  que le Père a envoyé v. 9+. –  comme sauveur du monde Jn 1.10n  ; 3.17+ ; 4.42.
  - type: text
    content: Et nous, nous avons vu et nous témoignons que le Père a envoyé le Fils comme sauveur du monde.
  '15':
  - type: text
    content: ' '
  - type: note
    content: reconnaît v. 2s ; 1.9n  ; 2.23+. –  Fils de Dieu Mt 16.16+ ; Jn 1.34+. –  Dieu demeure en lui v. 12.
  - type: text
    content: 'Celui qui reconnaît que Jésus est le Fils de Dieu, Dieu demeure en lui, comme lui en Dieu. '
  '16':
  - type: note
    content: 'connaissons (ou avons connu, 2.3n) / cru  : au lieu de nous l''avons cru on pourrait traduire nous avons mis en lui notre foi  ; cf. Jn 6.69n. –  pour nous  : litt. en nous ou parmi nous, cf. v. 9n. –  Dieu est amour… v. 8+,12.'
  - type: text
    content: Et nous, nous connaissons l'amour que Dieu a pour nous, et nous l'avons cru.
  - type: text
    content: Dieu est amour ; celui qui demeure dans l'amour demeure en Dieu, et Dieu demeure en lui.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.18-21. –  en cela ou en ceci , 3.10n. –  accompli v. 12 ; 2.5+. –  parmi nous  : litt. avec nous . –  assurance 2.28+. –  tel il est, lui (litt. celui-là ), cf. 2.6n.'
  - type: text
    content: 'C''est en cela que l''amour est accompli parmi nous, pour que nous ayons de l''assurance au jour du jugement : tel il est, lui, tels nous sommes aussi dans ce monde. '
  '18':
  - type: note
    content: 'pas de crainte cf. Rm 8.15. –  bannit  : litt. jette dehors (cf. Jn 6.37n). –  suppose  : litt. a.'
  - type: text
    content: 'Il n''y a pas de crainte dans l''amour, mais l''amour accompli bannit la crainte, car la crainte suppose un châtiment, et celui qui craint n''est pas accompli dans l''amour. '
  '19':
  - type: note
    content: V. 10.
  - type: text
    content: 'Quant à nous, nous aimons, parce que lui nous a aimés le premier. '
  '2':
  - type: note
    content: 'qui reconnaît (1.9n) Jésus-Christ 2.23+ ; Rm 10.9 ; 1Co 12.3 ; cf. 1Tm 6.12s,20s ; 2Tm 1.13s. –  venu en chair  : à la différence de 2Jn 7n, le verbe est au parfait, temps qui évoque habituellement le résultat permanent d''une action passée (cf. « une fois pour toutes »).'
  - type: text
    content: 'A ceci vous connaissez l''Esprit de Dieu : tout esprit qui reconnaît Jésus-Christ venu en chair est de Dieu ; '
  '20':
  - type: note
    content: 'qu''il déteste 3.15+. –  menteur 1.6+ ; 2.4. –  son frère, qu''il voit 3.17. –  ne peut aimer… v. 8 ; cf. Mt 5.44s. –  qu''il ne voit pas v. 12. –  Origène cite la parole suivante, qu''il attribue peut-être à Jésus : « Tu as vu ton frère, tu as vu ton Dieu. »'
  - type: text
    content: 'Si quelqu''un dit : « J''aime Dieu », et qu''il déteste son frère, c''est un menteur, car celui qui n''aime pas son frère, qu''il voit, ne peut aimer Dieu, qu''il ne voit pas. '
  '21':
  - type: note
    content: ce commandement 3.23 ; cf. Mc 12.29ss/ / ; 1Co 13 ; voir loi.
  - type: text
    content: 'Et nous avons de lui ce commandement : que celui qui aime Dieu aime aussi son frère.'
  '3':
  - type: note
    content: qui ne reconnaît pas (cf. 2.23) ; certains mss portent qui détruit (ou qui dissout), comme en 3.8. –  pas de Dieu 3.10+. –  antichrist… 2.18+.
  - type: text
    content: et tout esprit qui ne reconnaît pas Jésus n'est pas de Dieu ; c'est celui de l'antichrist, dont vous avez entendu dire qu'il vient, et qui maintenant est déjà dans le monde.
  '4':
  - type: text
    content: ' '
  - type: note
    content: vous les avez vaincus 2.13+. –  plus grand 3.20+ ; cf. Mt 12.29.
  - type: text
    content: 'Vous, mes enfants, vous êtes de Dieu, et vous les avez vaincus, car celui qui est en vous est plus grand que celui qui est dans le monde. '
  '5':
  - type: note
    content: 'Cf. Jn 3.31ns ; 8.23+ ; 15.19. –  les écoute  : autre traduction les entend (même possibilité dans la suite).'
  - type: text
    content: 'Eux, ils sont du monde ; c''est pourquoi leur parole est du monde, et le monde les écoute. '
  '6':
  - type: note
    content: 'nous sommes de Dieu v. 4 ; 5.19 ; cf. Jn 18.37 ; 1Co 14.37. –  qui connaît / nous connaissons  : le verbe grec est ici au présent (de même au v. 7) ; il s''agit vraisemblablement moins d''une connaissance acquise (cf. 2.3n) que d''une relation vivante. –  nous écoute Jn 8.47 ; 10.26s. –  pas de Dieu v. 3 ; cf. 2Tm 4.4. –  l''Esprit de la vérité 1.6+ ; Jn 14.17. –  de l''égarement ou de l''erreur (un terme apparenté est traduit par imposteurs en 2Jn 7) 1Jn 2.26+ ; 3.7 ; cf. 2P 2.18 ; Testament de Juda 20.1 : « Deux Esprits s''occupent de l''homme, celui de la vérité et celui de l''égarement. » Règle de la Communauté (Qumrân) 3.18s : « Il a disposé pour l''homme deux Esprits… : ce sont les (deux) Esprits de vérité et de perversion. »'
  - type: text
    content: 'Nous, nous sommes de Dieu ; celui qui connaît Dieu nous écoute ; celui qui n''est pas de Dieu ne nous écoute pas : c''est à cela que nous connaissons l''Esprit de la vérité et l''esprit de l''égarement.'
  - type: heading
    content: Dieu est amour
  '7':
  - type: text
    content: ' '
  - type: note
    content: aimons-nous… 3.11+. –  né de Dieu 2.29+ ; cf. 1P 1.22s. –  connaît Dieu v. 6n  ; cf. 2.3.
  - type: text
    content: Bien-aimés, aimons-nous les uns les autres ;
  - type: text
    content: car l'amour est de Dieu,
  - type: text
    content: et quiconque aime est né de Dieu
  - type: text
    content: et connaît Dieu.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'n''a jamais connu  : cf. 3.1n. –  Dieu est (cf. 1.5 ; Jn 4.24) amour v. 16 ; cf. Jn 3.35+.'
  - type: text
    content: Celui qui n'aime pas n'a jamais connu Dieu,
  - type: text
    content: car Dieu est amour.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'en ceci  : cf. 3.10n. –  s''est manifesté  : litt. a été manifesté , 1.2+ ; 2.28+. –  parmi nous ou en nous . –  Dieu a envoyé… Jn 3.15+,16+. –  que nous vivions par lui  : cf. Ep 2.4s ; Col 2.13.'
  - type: text
    content: 'C''est en ceci que l''amour de Dieu s''est manifesté parmi nous :'
  - type: text
    content: Dieu a envoyé son Fils unique dans le monde pour que nous vivions par lui.
