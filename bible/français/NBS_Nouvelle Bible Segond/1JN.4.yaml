          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.17+ ; 4.42.'
      marker-yv: yv-n
    - type: text
      text: Et nous, nous avons vu et nous témoignons que le Père a envoyé le Fils comme sauveur du monde.
