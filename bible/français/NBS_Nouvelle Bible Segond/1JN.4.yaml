      marker-yv: yv-n
    - type: text
      text: Et nous, nous connaissons l'amour que Dieu a pour nous, et nous l'avons cru.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Dieu est amour ; celui qui demeure dans l'amour demeure en Dieu, et Dieu demeure en lui.
