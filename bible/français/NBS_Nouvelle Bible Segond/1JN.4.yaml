        - type: text
          text: ', le verbe est au parfait, temps qui évoque habituellement le résultat permanent d''une action passée (cf. « une fois pour toutes »).'
      marker-yv: yv-n
    - type: text
      text: 'A ceci vous connaissez l''Esprit de Dieu : tout esprit qui reconnaît Jésus-Christ venu en chair est de Dieu ; '
