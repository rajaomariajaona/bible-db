      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12.
      marker-yv: yv-n
    - type: text
      text: 'Celui qui reconnaît que Jésus est le Fils de Dieu, Dieu demeure en lui, comme lui en Dieu. '
