        - type: text
          text: nous a aimés ainsi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous devons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.16+ ; cf. Mt 18.33 ; Rm 13.8.
      marker-yv: yv-n
    - type: text
      text: 'Bien-aimés, si Dieu nous a tant aimés, nous devons, nous aussi, nous aimer les uns les autres. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
