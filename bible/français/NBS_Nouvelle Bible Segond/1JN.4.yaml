      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Personne n''a jamais vu Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 20 ; Jn 1.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu demeure en nous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 15s ; 3.24+ ; cf. Jn 14.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'accompli '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.5+.
      marker-yv: yv-n
    - type: text
      text: 'Personne n''a jamais vu Dieu. Si nous nous aimons les uns les autres, Dieu demeure en nous, et son amour est accompli en nous. '
  '13':
  - type: usfm
    marker: m
    children:
