      marker-yv: yv-n
    - type: text
      text: 'Bien-aimés, ne croyez pas tout esprit ; examinez plutôt les esprits pour savoir s''ils sont de Dieu, car beaucoup de prophètes de mensonge sont sortis dans le monde. '
