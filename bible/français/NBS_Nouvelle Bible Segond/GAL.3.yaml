    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut comprendre cette proposition comme une vérité très générale : là où il y a un médiateur, il y a forcément plusieurs parties en présence ; donc le recours à un médiateur n''est au fond pas digne de Dieu qui est '
