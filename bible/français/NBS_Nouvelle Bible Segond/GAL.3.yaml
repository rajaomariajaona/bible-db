        text: (Dt 6.4) et qui se révèle directement dans le Christ comme il l'a fait par sa promesse directe à Abraham ; selon certains le rôle du médiateur serait à comprendre, plus précisément, par rapport à la pluralité des anges impliqués dans le don de la loi (v. 19) et à celle des hommes qui la reçoivent (cf. v. 16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',28s) ; voir aussi Rm 3.30 ; Ep 2.14s ; comparer avec 1Tm 2.5.'
    marker-yv: yv-n
  - type: text
    text: 'Or ce médiateur n''est pas médiateur d''un seul, tandis que Dieu est un. '
