document_id: GAL.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La folie des Galates
  - type: text
    content: ' '
  - type: note
    content: 'stupides  : cf. v. 3 ; Lc 24.25 ; Rm 1.14 ; 1Tm 6.9 ; 2Tm 3.9 ; Tt 3.3. –  Jésus-Christ… crucifié 2.19 ; 6.14 ; 1Co 1.18,23+ ; 2.2. –  dépeint  : on pourrait aussi comprendre déclaré officiellement (par une proclamation écrite, affichée aux yeux de tous) ; certains comprennent a été décrit à l''avance (même verbe Rm 15.4n).'
  - type: text
    content: 'Galates stupides, qui a pu vous fasciner, alors que sous vos yeux Jésus-Christ a été dépeint crucifié ? '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'qui relèvent des œuvres  : litt. qui sont des œuvres , cf. v. 2,7n. –  Maudit soit quiconque… Dt 27.26  ; 28.58ss ; 30.10 ; Jr 11.3. –  en tout…  : cf. 5.3 ; 6.13 ; Jc 2.10 ; voir aussi Ac 15.10. –  pour le faire ou pour le mettre en pratique  ; v. 12 ; 5.3.'
  - type: text
    content: 'Tous ceux en effet qui relèvent des œuvres de la loi sont sous la malédiction, car il est écrit : '
  - type: text
    content: Maudit soit quiconque ne persévère pas en tout ce qui est écrit dans le livre de la loi, pour le faire !
  - type: text
    content: ' '
  '11':
  - type: note
    content: 'personne ne soit justifié… 2.16+. –  loi / foi 3.2+. –  celui qui est juste…  : autre traduction le juste vivra par la foi ou par une foi, Ha 2.4n  ; Rm 1.17n  ; Hé 10.38n. Le commentaire d''Habacuc (Pesher) retrouvé à Qumrân associe la foi du juste à la pratique de la loi, contrairement à Paul ; cependant il l''applique à la foi en l''envoyé de Dieu, comme Paul à la foi en Jésus-Christ. On y lit (8.1-3) : « L''explication de ceci concerne tous ceux qui pratiquent la Loi dans la Maison de Juda : Dieu les délivrera de la Maison de jugement à cause de leur affliction et de leur foi dans le Maître de justice. »'
  - type: text
    content: 'Et que personne ne soit justifié devant Dieu par la loi, c''est évident, puisque '
  - type: text
    content: celui qui est juste en vertu de la foi vivra
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'ne relève pas de la foi  : litt. n''est pas de la foi. –  elle dit  : sous-entendu dans le texte. –  Celui qui fera (v. 10n)… Lv 18.5  ; Rm 10.5n  ; cf. Ga 5.3.'
  - type: text
    content: 'Or la loi ne relève pas de la foi ; mais elle dit : '
  - type: text
    content: Celui qui fera ces choses vivra par elles
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'Le Christ nous a rachetés 4.5 ; cf. Rm 3.24+. –  en devenant malédiction pour nous Rm 8.3 ; 2Co 5.21 ; cf. Ga 2.20s ; voir aussi Rm 5.8 ; Ep 2.4s. –  Maudit soit (v. 10+) quiconque… Dt 21.23n  ; 27.26  ; cf. Ac 2.23 ; 5.30. Le Rouleau du Temple (Qumrân) 64.6-13 interprète aussi Dt 21.23 comme un supplice (de pendaison selon certains, mais plus probablement de crucifixion) et non comme l''exposition d''un cadavre : « Quand il y aura quelqu''un qui calomnie son peuple, livre son peuple à une nation étrangère ou fait du mal à son peuple, vous le pendrez au bois et il mourra… Quand un homme accusé d''un crime capital s''enfuira au milieu des nations et maudira son peuple et les fils d''Israël, vous le pendrez lui aussi au bois et il mourra. Leur cadavre ne passera pas la nuit sur le bois, mais vous ne manquerez pas de les ensevelir le jour même, car ils sont maudits de Dieu et des hommes ceux qui sont pendus au bois. »'
  - type: text
    content: 'Le Christ nous a rachetés de la malédiction de la loi en devenant malédiction pour nous – car il est écrit : '
  - type: text
    content: Maudit soit quiconque est pendu au bois
  - type: text
    content: '  – '
  '14':
  - type: note
    content: 'non-Juifs 1.16n. –  la bénédiction d''Abraham v. 8 ; cf. Ep 1.3. –  soit  : autre traduction se réalise. –  l''Esprit promis  : litt. la promesse (comme dans les v. 16-18,21s,29 ; 4.23,28) de l''Esprit, formule ambiguë qui pourrait aussi signifier la promesse que fait l''Esprit  ; cf. Ac 1.4n  ; 2.33,39 ; Rm 5.5 ; Ep 1.13n  ; Hé 6.12n.'
  - type: text
    content: afin que, pour les non-Juifs, la bénédiction d'Abraham soit en Jésus-Christ et que, par la foi, nous recevions l'Esprit promis.
  - type: heading
    content: La loi et la promesse
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'en termes humains Rm 3.5n. –  son testament  : le mot grec peut aussi être traduit par alliance  ; cf. 4.24 ; Hé 9.16n.'
  - type: text
    content: 'Mes frères, je parle en termes humains : quand un homme a fait son testament en bonne et due forme, personne ne peut l''abolir ni y faire une adjonction. '
  '16':
  - type: note
    content: 'à Abraham v. 6-9,14 ; cf. Rm 4.13. –  descendance  : le terme correspondant, en général, désigne collectivement l''ensemble des descendants d''une personne ; ici Paul l''applique au seul Christ, mais de façon à inclure ceux qui croient en lui ; cf. v. 19,29 ; Ac 3.25n  ; Rm 4.13n. –  Il n''est pas dit  : litt. il (Dieu, ou peut-être le texte) ne dit pas. –  de beaucoup  : autres traductions de plusieurs ; d''une multitude. –  d''un seul ou d''une seule (descendance), v. 26-29. –  et à ta descendance Gn 12.7 ; 13.15 ; 17.7s  ; cf. Mt 1.1.'
  - type: text
    content: 'Or les promesses ont été faites à Abraham et à sa descendance. Il n''est pas dit : et aux descendances, comme s''il s''agissait de beaucoup ; mais il s''agit d''un seul : '
  - type: text
    content: et à ta descendance,
  - type: text
    content: ' qui est le Christ. '
  '17':
  - type: note
    content: 'quatre cent trente ans Ex 12.40ns. –  réduirait à rien  : cf. 5.4 (le même verbe est traduit par vous êtes séparés), 11 ; Rm 3.3+.'
  - type: text
    content: 'Voici ce que je veux dire : un testament déjà fait en bonne et due forme par Dieu ne peut pas être annulé par la loi survenue quatre cent trente ans plus tard, ce qui réduirait à rien la promesse. '
  '18':
  - type: note
    content: 'V. 29 ; cf. Rm 4.14 ; 11.6. – Voir loi. –  que Dieu a accordé sa grâce  : autres traductions que Dieu a fait grâce ; que Dieu l''a accordé (l''héritage), par grâce  ; voir Rm 8.32n.'
  - type: text
    content: Car si l'héritage venait de la loi, il ne viendrait plus de la promesse ; or c'est par la promesse que Dieu a accordé sa grâce à Abraham.
  - type: heading
    content: Le rôle de la loi
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'pourquoi… ? autre traduction qu''est-ce que la loi  ? –  à cause des transgressions Rm 4.15+. –  par l''intermédiaire d''anges  : cf. 4.3n  ; Ac 7.38,53n  ; Hé 2.2. –  au moyen (litt. par la main ) d''un médiateur Lv 26.46 ; Dt 5.4s ; Hé 9.15.'
  - type: text
    content: 'Alors pourquoi la loi ? Elle a été ajoutée à cause des transgressions, jusqu''à ce que vienne la descendance à qui la promesse avait été faite ; elle a été promulguée par l''intermédiaire d''anges et au moyen d''un médiateur. '
  '2':
  - type: note
    content: 'en vertu des œuvres… 2.16n. –  loi / foi 2.16 ; Mt 23.23 ; Rm 3.27ss ; 4.13ss ; 10.4 ; Ph 3.9. –  reçu l''Esprit 4.6 ; cf. Ac 11.17 ; Ep 1.13. –  parce que vous avez entendu (ou écouté) : litt. en vertu d''une écoute de foi ou par un message de foi, cf. v. 5 ; le même terme est traduit par ce qu''on entend (dire) en Rm 10.16ns.'
  - type: text
    content: 'Voici seulement ce que je veux apprendre de vous : est-ce en vertu des œuvres de la loi que vous avez reçu l''Esprit, ou parce que vous avez entendu le message de la foi ? '
  '20':
  - type: note
    content: 'ce médiateur…  : on peut comprendre cette proposition comme une vérité très générale : là où il y a un médiateur, il y a forcément plusieurs parties en présence ; donc le recours à un médiateur n''est au fond pas digne de Dieu qui est un (Dt 6.4) et qui se révèle directement dans le Christ comme il l''a fait par sa promesse directe à Abraham ; selon certains le rôle du médiateur serait à comprendre, plus précisément, par rapport à la pluralité des anges impliqués dans le don de la loi (v. 19) et à celle des hommes qui la reçoivent (cf. v. 16n,28s) ; voir aussi Rm 3.30 ; Ep 2.14s ; comparer avec 1Tm 2.5.'
  - type: text
    content: 'Or ce médiateur n''est pas médiateur d''un seul, tandis que Dieu est un. '
  '21':
  - type: note
    content: 'Cf. Rm 7.7. –  les promesses de Dieu  : certains mss portent seulement les promesses. –  qui puisse faire vivre (Jn 5.21+) : cf. Ac 13.38s ; Rm 8.3. –  justice 2.21+.'
  - type: text
    content: 'La loi est-elle donc contre les promesses de Dieu ? Jamais de la vie ! Si une loi avait été donnée qui puisse faire vivre, la justice viendrait réellement de la loi. '
  '22':
  - type: note
    content: tout enfermé sous le péché Rm 3.9-19 ; 11.32. –  la promesse ou la chose promise, cf. v. 14n. –  la foi de Jésus-Christ 2.16n. –  à ceux qui croient ou à ceux qui ont foi, aux croyants.
  - type: text
    content: Mais l'Ecriture a tout enfermé sous le péché, pour que la promesse soit donnée, en vertu de la foi de Jésus-Christ, à ceux qui croient.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Avant que la foi vienne  : cf. v. 25 ; 4.4s. –  gardés sous la loi, enfermés (v. 22+) 4.3,21 ; 5.18.'
  - type: text
    content: 'Avant que la foi vienne, nous étions gardés sous la loi, enfermés, en vue de la foi qui allait être révélée. '
  '24':
  - type: note
    content: 'surveillant ou précepteur  : le terme grec correspondant a donné notre mot pédagogue  ; il désignait à l''époque de Paul l''esclave chargé de surveiller les enfants et de les conduire au maître d''école ; cf. 4.2 ; 1Co 4.15. –  en vertu de la foi ou en vertu d''une foi 2.16n.'
  - type: text
    content: 'Ainsi la loi a été notre surveillant jusqu''au Christ, pour que nous soyons justifiés en vertu de la foi. '
  '25':
  - type: note
    content: V. 23+ ; cf. Rm 6.14 ; 10.4.
  - type: text
    content: 'La foi étant venue, nous ne sommes plus soumis à un surveillant. '
  '26':
  - type: note
    content: Cf. 2.20 ; 4.5ss ; Jn 1.12 ; Rm 8.14-17. –  fils de Dieu Mt 5.9 ; Lc 3.37 ; 20.36 ; Rm 8.14,19.
  - type: text
    content: 'Car vous êtes tous, par la foi, fils de Dieu en Jésus-Christ. '
  '27':
  - type: note
    content: 'reçu le baptême du Christ  : litt. été baptisés en (ou pour) Christ, voir Rm 6.3ns. –  revêtu le Christ Rm 13.14 ; Ep 4.24.'
  - type: text
    content: 'En effet, vous tous qui avez reçu le baptême du Christ, vous avez revêtu le Christ. '
  '28':
  - type: note
    content: 'Juif / Grec Rm 1.14n,16+ ; 10.12 ; voir aussi 1Co 12.13 ; Col 3.11. –  ni homme ni femme  : litt. ni mâle ni femelle  ; cf. Gn 1.27n. –  vous êtes un en Jésus-Christ Jn 17.21+ ; cf. Rm 12.5.'
  - type: text
    content: 'Il n''y a plus ni Juif ni Grec, il n''y a plus ni esclave ni homme libre, il n''y a plus ni homme ni femme, car vous tous, vous êtes un en Jésus-Christ. '
  '29':
  - type: note
    content: 'au Christ 5.24 ; Mc 9.41n  ; 1Co 1.12n. –  la descendance d''Abraham  : on pourrait aussi traduire ici les descendants d''Abraham v. 7,16n  ; 4.7 ; Rm 4.16 ; 8.17 ; 9.7.'
  - type: text
    content: Et si vous appartenez au Christ, alors vous êtes la descendance d'Abraham, héritiers selon la promesse.
  '3':
  - type: note
    content: commencé / achever (ou poursuivre l'achèvement) mêmes verbes en Ph 1.6 ; sur le second, cf. 2Co 7.1n  ; un verbe apparenté est traduit par accomplir en Ga 5.16. –  Esprit / chair Rm 1.3+,4 ; 8.1ss.
  - type: text
    content: 'Etes-vous donc stupides à ce point ? Après avoir commencé par l''Esprit, allez-vous maintenant achever par la chair ? '
  '4':
  - type: note
    content: 'Avez-vous fait tant d''expériences  : le verbe grec signifie souvent souffrir, mais il peut s''appliquer ici à des expériences positives associées à l''Esprit, cf. v. 5. –  Si du moins c''est pour rien ! Autres traductions car alors ce serait vraiment pour rien ! ou si encore c''était pour rien ! cf. 5.10s.'
  - type: text
    content: 'Avez-vous fait tant d''expériences pour rien ? Si du moins c''est pour rien ! '
  '5':
  - type: note
    content: 'Celui qui vous accorde (Ph 1.19n) l''Esprit 1Co 2.12 ; 12.4-11 ; 2Co 1.22. –  qui opère  : le même verbe a été traduit par être à l''œuvre en 2.8 ; cf. 5.6 ; 1Co 12.6n,10n. –  en vertu des œuvres… / parce que vous avez entendu… v. 2n.'
  - type: text
    content: Celui qui vous accorde l'Esprit et qui opère des miracles parmi vous, le fait-il donc en vertu des œuvres de la loi, ou parce que vous avez entendu le message de la foi ?
  - type: heading
    content: Ceux qui croient sont bénis avec Abraham
  '6':
  - type: text
    content: ' '
  - type: note
    content: crut Dieu ou eut foi en Dieu, Gn 15.6  ; Rm 4.3.
  - type: text
    content: 'Ainsi, Abraham '
  - type: text
    content: crut Dieu, et cela lui fut compté comme justice
  - type: text
    content: '. '
  '7':
  - type: note
    content: 'V. 29. –  ceux qui relèvent de la foi  : litt. ceux d''une foi, de même dans la suite (une formule presque identique est aussi traduite en vertu de la foi v. 8,11,22,24). –  fils d''Abraham Lc 3.8+.'
  - type: text
    content: 'Reconnaissez-le donc : ce sont ceux qui relèvent de la foi qui sont fils d''Abraham. '
  '8':
  - type: note
    content: Gn 12.3n  ; 18.18  ; Ac 3.25n. –  non-Juifs et nations traduisent un même mot grec ; cf. 1.16n  ; Mt 4.15n  ; Ac 10.45n.
  - type: text
    content: 'Aussi l''Ecriture, voyant d''avance que Dieu justifierait les non-Juifs en vertu de la foi, a d''avance annoncé cette bonne nouvelle à Abraham : '
  - type: text
    content: Toutes les nations seront bénies en toi ;
  - type: text
    content: ' '
  '9':
  - type: note
    content: 'Cf. Hé 2.16. –  ceux qui relèvent de la foi v. 7n  ; Rm 4.16. –  l''homme de foi ou le croyant  : le mot peut également signifier fidèle ou digne de confiance (1Co 1.9 ; 4.2,17 etc.) ; cf. Jn 20.27n.'
  - type: text
    content: de sorte que ceux qui relèvent de la foi sont bénis avec Abraham, l'homme de foi.
