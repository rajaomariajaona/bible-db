verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Dans le cadre d''une lettre, l''épître aux Galates offre un véritable « traité de défense et illustration » du christianisme. C''est probablement le plus ancien spécimen de ce genre au sein du Nouveau Testament. Ecrit de combat, il a vu le jour à l''occasion d''une crise grave, périlleuse pour l''avenir même du christianisme. Aussi l''auteur s''engage-t-il à fond pour communiquer sa conviction. La '
  - type: text
    content: rhétorique,
  - type: text
    content: ' c''est-à-dire'
  - type: text
    content: l'art de persuader,
  - type: text
    content: ' va être mise au service d''une pensée exceptionnellement forte.'
  - type: text
    content: La haute estime dans laquelle est toujours tenue l'épître aux Galates n'est pas sans lien avec cette méthode d'exposition, tour à tour provocante et amicale, graduée dans ses effets et destinée à conduire le lecteur à effectuer le bon choix, d'une manière irréversible.
  - type: text
    content: 'Si nous ignorons comment cette épître polémique a été reçue en Galatie, son accueil dans le '
  - type: text
    content: canon
  - type: text
    content: ' du Nouveau Testament suggère que les arguments de Paul ont porté. '
  - type: text
    content: « Son Evangile »
  - type: text
    content: ' (Rm 2.16'
  - type: text
    content: n
  - type: text
    content: ) a finalement été entendu, et cette affaire est devenue un exemple à méditer pour toute Eglise en butte aux mêmes difficultés.
  - type: text
    content: La rhétorique au service de l'Evangile
  - type: text
    content: 'Une bonne manière de se rendre compte de la place faite à la rhétorique est d''aller tout de suite à la '
  - type: text
    content: péroraison
  - type: text
    content: ' (6.11-17). C''est le lieu où l''orateur '
  - type: text
    content: s'expose personnellement
  - type: text
    content: ' et où il '
  - type: text
    content: résume
  - type: text
    content: ' l''argumentation afin d''inciter l''auditoire à se déterminer. Quintilien, un contemporain de Paul, auteur d''un ouvrage monumental sur l''art oratoire, indique que le défenseur veillera à « reprendre et regrouper les faits, ce qui rafraîchit la mémoire du juge, place d''un seul coup sous ses yeux toute l''affaire, et fait valoir par l''abondance même des arguments ce qui, pris isolément, aurait produit moins d''effet » ('
  - type: text
    content: De Institutione oratoria,
  - type: text
    content: ' VI, 1.1). Il lui appartiendra ensuite de susciter l'''
  - type: text
    content: indignation
  - type: text
    content: ', enfin d''attirer la '
  - type: text
    content: sympathie
  - type: text
    content: ', mais « cet appel à la pitié ne doit jamais durer longtemps. On n''a pas dit sans raison que rien n''est plus facile à sécher que les larmes » (VI, 1.27).'
  - type: text
    content: 'Ces quatre éléments apparaissent nettement dans le dernier chapitre de l''épître aux Galates :'
  - type: text
    content: '– '
  - type: text
    content: accent personnel (6.11)
  - type: text
    content: '  : Paul écrit de sa propre main (comme aussi, dans un semblable contexte de plaidoyer, en Phm 19 ; cf. 1Co 16.21) ;'
  - type: text
    content: '– '
  - type: text
    content: résumé (6.12-13)
  - type: text
    content: ' poussant l''argumentation à l''extrême : ses adversaires veulent la circoncision comme un sauf-conduit et un trophée ;'
  - type: text
    content: '– '
  - type: text
    content: indignation (6.14-16)
  - type: text
    content: '  : il ne se réclame, quant à lui, que de la croix du Christ ;'
  - type: text
    content: '– '
  - type: text
    content: sympathie (6.17)
  - type: text
    content: '  : il évoque ses « stigmates », ces fameuses '
  - type: text
    content: marques de Jésus
  - type: text
    content: ' qui pourraient être des blessures infligées à l''apôtre, par exemple par des coups de fouet (2Co 11.24s). Ainsi, à la fin de sa plaidoirie en faveur du consul Marcus Aquilius, Cicéron lui déchira la tunique devant les juges « pour montrer ses blessures de guerre » ('
  - type: text
    content: De Oratore,
  - type: text
    content: ' II, 194-195).'
  - type: text
    content: Tout cela conduit à une meilleure compréhension de la démarche de Paul dans l'épître aux Galates. Les brusques changements de rythme et de ton, alliés à une certaine disparité de contenu, correspondent bien aux habitudes stylistiques du temps, telles qu'elles se reflètent dans les écrits de combat pour la défense d'une idée.
  - type: text
    content: 'Dans cette perspective, le '
  - type: text
    content: plan
  - type: text
    content: ' de l''épître apparaît plus distinctement (voir encadré).'
  - type: text
    content: Origine et nature de la crise galate
  - type: text
    content: La crise galate est l'une des épreuves les plus graves qu'ait traversées la première génération chrétienne. A s'en tenir aux données de l'épître, il apparaît que, peu de temps après leur première évangélisation par l'apôtre, les Galates se sont tournés vers d'autres personnes qui ont perverti leur foi. Après l'enthousiasme des débuts, les Galates ont dû se trouver aux prises avec des questions qu'ils étaient incapables de résoudre seuls. Ils ne savaient plus très bien dans quel camp se ranger. Ils n'étaient plus des païens asservis aux éléments du monde, aux observances du calendrier (4.3,7-10), aux clivages habituels (
  - type: text
    content: Juif / Grec, esclave / homme libre, homme / femme,
  - type: text
    content: ' 3.28). Ils ne se sentaient pas non plus solidaires du monde juif et perdaient le statut privilégié dont ils bénéficiaient, en tant que Juifs, dans l''Empire romain.'
  - type: text
    content: 'Ils se sont alors confiés à ceux que Paul considère comme des '
  - type: text
    content: fauteurs de troubles
  - type: text
    content: ' (1.7). Ces derniers ne sont jamais nommés, ils ne sont pas non plus parmi les destinataires de la lettre. Tout se passe comme s''ils n''avaient été que des prédicateurs de passage.'
  - type: text
    content: 'Quelle était la nature de leur doctrine ? On a le sentiment qu''ils avaient en horreur tout ce que le discours libérateur de Paul comportait d''ouverture, grâce à une confiance nouvelle – une confiance en un Christ crucifié qui justifie et en son Esprit qui trace seul le chemin de la vie. Les Galates avaient dû éprouver des difficultés de l''ordre de la «  '
  - type: text
    content: chair*
  - type: text
    content: '  » : non pas seulement inconduite sexuelle, selon ce que le mot « chair » évoque spontanément aujourd''hui, mais aussi '
  - type: text
    content: disputes, jalousies,
  - type: text
    content: ' etc. (5.19ss). Les fauteurs de troubles ont-ils alors prescrit l''ordonnance de la loi juive, y compris l''obligation de la '
  - type: text
    content: circoncision,
  - type: text
    content: ' comme remède à tous ces maux ?'
  - type: text
    content: La circoncision, en effet, avec sa caractéristique de marque permanente, de sceau de l'alliance abrahamique et mosaïque (Gn 17 ; Ex 4), pouvait donner l'impression forte d'être une sorte de « second sacrement » ou de « sacrement de la Torah » (c'est-à-dire de la loi juive) à situer sur le même plan que le baptême chrétien. Aussi bien les Galates, retombés de haut après l'expérience si vive qu'ils avaient faite du don de l'Esprit et le premier enthousiasme de leur baptême (3.1,27), furent-ils des proies faciles pour les propagandistes attardés des vertus pratiques de la Torah qui leur rendirent visite.
  - type: text
    content: 'Et cela est intolérable. Paul y discerne comme la marque d''un envoûtement (3.1) qu''il s''agirait de rompre. Dès lors, pour accentuer sa différence, il provoque ses adversaires sur leur propre terrain : celui de l''argumentation fondée sur l''histoire sainte, qui était sans doute aussi le cheval de bataille des '
  - type: text
    content: hellénistes
  - type: text
    content: ', ce courant important du judaïsme dont Etienne, dans les Actes des Apôtres, apparaît comme un représentant chrétien (cf. Ac 7 ; voir 6.1'
  - type: text
    content: n
  - type: text
    content: ',5).'
  - type: text
    content: Qui sont les Galates ?
  - type: text
    content: 'La fameuse Tour et le quartier de '
  - type: text
    content: Galata,
  - type: text
    content: ' dans l''Istanbul moderne, rappellent, au moins par leur nom, le passage des '
  - type: text
    content: Galates,
  - type: text
    content: ' ces guerriers'
  - type: text
    content: gaulois
  - type: text
    content: ' qui franchirent l''Hellespont (les Dardanelles) vers 278 av. J.-C. pour s''établir ensuite en Anatolie, dans la région de Pessinonte, d''Ancyre (Ankara) et de Tavium.'
  - type: text
    content: Défaits par les Romains en 189 av. J.-C., ils devinrent leurs auxiliaires au siècle suivant. Leur dernier prince, Amyntas, un officier promu par Rome à la dignité royale, mourut en 25 av. J.-C., non sans avoir légué ses Etats à l'administration romaine, sa bienfaitrice. Celle-ci procéda alors à une vaste réorganisation de la carte, avec la création d'une « province » de Galatie, venant enfler le « territoire galate » de plusieurs cantons satellites, telles la Phrygie et la Pisidie.
  - type: text
    content: Comme le notait déjà fort logiquement Jérôme, le traducteur célèbre de la Vulgate (≈ 331-420), ces « Galates sont des Grecs » ; on parle aujourd'hui de Gallo-Grecs. Ils sont en effet policés et instruits, rompus à toutes les finesses de la civilisation hellénistique. Le niveau culturel de l'épître ne serait pas approprié s'il en allait autrement.
  - type: text
    content: Autour de l'incident d'Antioche
  - type: text
    content: 'Pourquoi l''apôtre met-il tant de soin à se démarquer des autorités de l''Eglise, en place à Jérusalem (chap. 1 et 2) ? Au moment où la crise éclate, les gens de Jérusalem jouissent-ils ou non de l''estime des Galates ? En tout cas Paul proteste : sa propre autorité apostolique ne dépend pas des gens de Jérusalem. Elle ne lui vient pas des hommes. Il a bénéficié d''une révélation directe du Seigneur, qui l''a désigné pour devenir apôtre '
  - type: text
    content: parmi les non-Juifs
  - type: text
    content: ' (Ga 1.15s ; cf. Jr 1.5).'
  - type: text
    content: 'S''il a rencontré les '
  - type: text
    content: colonnes
  - type: text
    content: ' de l''Eglise (2.9'
  - type: text
    content: n
  - type: text
    content: '), ce n''est qu''à peu de reprises et pendant peu de temps (1.17-20 ; 2.9-10). Non : Paul n''est en dépendance '
  - type: text
    content: théologique, ecclésiale
  - type: text
    content: ' ou'
  - type: text
    content: rituelle
  - type: text
    content: ' ni de Pierre (1.18 ; 2.11-14), ni des '
  - type: text
    content: faux frères
  - type: text
    content: ' (2.4).'
  - type: text
    content: 'Le récit de la vocation de Paul semble avoir fait partie de sa catéchèse habituelle, si l''on en juge par les nombreuses versions qui en sont connues par le Nouveau Testament. Le récit de Galates 1–2 se distingue cependant de tous les autres par le ton et l''ampleur autobiographique. Tour à tour véhément et tendre (cf. 3.1 et 4.13ss), l''apôtre se montre ici dans sa plus grande humanité : il apparaît à la fois comme un prophète intransigeant, qui ne tolère aucune dérive théologique, et un pasteur tout proche des siens, qui se plaît à évoquer avec eux les souvenirs qui les lient (et dont nous n''avons pas de trace ailleurs).'
  - type: text
    content: L'exemple d'Abraham
  - type: text
    content: (chap. 3 et 4)
  - type: text
    content: La présence d’
  - type: text
    content: Abraham
  - type: text
    content: ', cité neuf fois dans les chapitres 3 et 4, n''a rien de surprenant. Ce personnage partage avec Moïse la palme de la notoriété dans le Nouveau Testament (pas moins de 73 mentions, tandis que Moïse en récolte 79). Dans le monde juif du temps de Jésus, Abraham était considéré comme le parfait observateur de la Torah. Dans la Bible grecque des '
  - type: text
    content: Septante
  - type: text
    content: ' (LXX*), le Siracide lui consacre un éloge qui va bien dans le sens de ce que les Galates ont l''air de penser : « Il observa la loi du Très-Haut et entra dans une alliance avec lui. Dans sa '
  - type: text
    content: chair
  - type: text
    content: ' il établit l''alliance et dans l''épreuve il fut trouvé fidèle » ('
  - type: text
    content: Siracide
  - type: text
    content: '* 44.19-21).'
  - type: text
    content: 'Paul ne pouvait éviter de revenir sur le sujet pour contester, avec la vigueur que l''on sait, les accents légalistes de cette dernière lecture. En fait, il renverse complètement l''interprétation traditionnelle en subordonnant radicalement l''obéissance d''Abraham (et '
  - type: text
    content: a fortiori
  - type: text
    content: ' sa circoncision) à sa foi.'
  - type: text
    content: Mais, pour autant, les procédés exégétiques employés au chapitre 4 surprennent souvent les modernes. Devant leur questionnement, ce qu'on a dit plus haut du modèle rhétorique fournit de très suggestifs éléments de réponse. Il ne fait pas de doute en effet que Paul eût pu s'exprimer de manière plus simple. Mais cela aurait-il été à la hauteur du but poursuivi ? Il semble bien qu'un certain maniérisme ait sa place dans le discours persuasif. Ainsi Démétrios, un rhéteur alexandrin du I
  - type: text
    content: er
  - type: text
    content: ' s. av. J.-C., observait qu''« une expression obscure frappe souvent davantage les auditeurs de terreur, et que son impact varie suivant les auditeurs. Tandis que les choses claires et simples prêtent le flanc au mépris… c''est pourquoi les Mystères sont révélés sous une forme '
  - type: text
    content: allégorique
  - type: text
    content: ' de manière à procurer le frisson ». Le développement de Ga 4.21-31 met en œuvre une stratégie de cette sorte, sans qu''il soit besoin que Paul ait eu contact avec ces rhéteurs. Ce sont là, tout simplement, les idées du milieu grec d''alors, des faits de civilisation.'
  - type: text
    content: Epître difficile ? Sans doute. Mais pièce essentielle de la pensée chrétienne. En dehors d'une vision cohérente de la justification par la seule croix de Jésus-Christ et des vraies dimensions de la liberté chrétienne, l'Evangile reste étouffé par la bonne volonté des législateurs et casuistes de tout poil. Rien d'étonnant dès lors si, à toutes les époques de réforme, la militance de l'Eglise se saisit à nouveau de ces pages pour rappeler haut et fort qu'il n'y a pas d'autre Evangile (Ga 1.9) !
