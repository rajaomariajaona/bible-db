document_id: GAL.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans le cadre d''une lettre, l''épître aux Galates offre un véritable « traité de défense et illustration » du christianisme. C''est probablement le plus ancien spécimen de ce genre au sein du Nouveau Testament. Ecrit de combat, il a vu le jour à l''occasion d''une crise grave, périlleuse pour l''avenir même du christianisme. Aussi l''auteur s''engage-t-il à fond pour communiquer sa conviction. La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: rhétorique,
  - type: text
    text: ' c''est-à-dire'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: l'art de persuader,
  - type: text
    text: ' va être mise au service d''une pensée exceptionnellement forte.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: La haute estime dans laquelle est toujours tenue l'épître aux Galates n'est pas sans lien avec cette méthode d'exposition, tour à tour provocante et amicale, graduée dans ses effets et destinée à conduire le lecteur à effectuer le bon choix, d'une manière irréversible.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Si nous ignorons comment cette épître polémique a été reçue en Galatie, son accueil dans le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: canon
  - type: text
    text: ' du Nouveau Testament suggère que les arguments de Paul ont porté. '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: « Son Evangile »
  - type: text
    text: ' (Rm 2.16'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ) a finalement été entendu, et cette affaire est devenue un exemple à méditer pour toute Eglise en butte aux mêmes difficultés.
- type: usfm
  marker: is2
  children:
  - type: text
    text: La rhétorique au service de l'Evangile
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Une bonne manière de se rendre compte de la place faite à la rhétorique est d''aller tout de suite à la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: péroraison
  - type: text
    text: ' (6.11-17). C''est le lieu où l''orateur '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: s'expose personnellement
  - type: text
    text: ' et où il '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: résume
  - type: text
    text: ' l''argumentation afin d''inciter l''auditoire à se déterminer. Quintilien, un contemporain de Paul, auteur d''un ouvrage monumental sur l''art oratoire, indique que le défenseur veillera à « reprendre et regrouper les faits, ce qui rafraîchit la mémoire du juge, place d''un seul coup sous ses yeux toute l''affaire, et fait valoir par l''abondance même des arguments ce qui, pris isolément, aurait produit moins d''effet » ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: De Institutione oratoria,
  - type: text
    text: ' VI, 1.1). Il lui appartiendra ensuite de susciter l'''
  - type: usfm
    marker: bd
    children:
    - type: text
      text: indignation
  - type: text
    text: ', enfin d''attirer la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sympathie
  - type: text
    text: ', mais « cet appel à la pitié ne doit jamais durer longtemps. On n''a pas dit sans raison que rien n''est plus facile à sécher que les larmes » (VI, 1.27).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces quatre éléments apparaissent nettement dans le dernier chapitre de l''épître aux Galates :'
- type: usfm
  marker: im
  children:
  - type: text
    text: '– '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: accent personnel (6.11)
  - type: text
    text: '  : Paul écrit de sa propre main (comme aussi, dans un semblable contexte de plaidoyer, en Phm 19 ; cf. 1Co 16.21) ;'
- type: usfm
  marker: im
  children:
  - type: text
    text: '– '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: résumé (6.12-13)
  - type: text
    text: ' poussant l''argumentation à l''extrême : ses adversaires veulent la circoncision comme un sauf-conduit et un trophée ;'
- type: usfm
  marker: im
  children:
  - type: text
    text: '– '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: indignation (6.14-16)
  - type: text
    text: '  : il ne se réclame, quant à lui, que de la croix du Christ ;'
- type: usfm
  marker: im
  children:
  - type: text
    text: '– '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sympathie (6.17)
  - type: text
    text: '  : il évoque ses « stigmates », ces fameuses '
  - type: usfm
    marker: it
    children:
    - type: text
      text: marques de Jésus
  - type: text
    text: ' qui pourraient être des blessures infligées à l''apôtre, par exemple par des coups de fouet (2Co 11.24s). Ainsi, à la fin de sa plaidoirie en faveur du consul Marcus Aquilius, Cicéron lui déchira la tunique devant les juges « pour montrer ses blessures de guerre » ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: De Oratore,
  - type: text
    text: ' II, 194-195).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tout cela conduit à une meilleure compréhension de la démarche de Paul dans l'épître aux Galates. Les brusques changements de rythme et de ton, alliés à une certaine disparité de contenu, correspondent bien aux habitudes stylistiques du temps, telles qu'elles se reflètent dans les écrits de combat pour la défense d'une idée.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans cette perspective, le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: plan
  - type: text
    text: ' de l''épître apparaît plus distinctement (voir encadré).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Origine et nature de la crise galate
- type: usfm
  marker: ip
  children:
  - type: text
    text: La crise galate est l'une des épreuves les plus graves qu'ait traversées la première génération chrétienne. A s'en tenir aux données de l'épître, il apparaît que, peu de temps après leur première évangélisation par l'apôtre, les Galates se sont tournés vers d'autres personnes qui ont perverti leur foi. Après l'enthousiasme des débuts, les Galates ont dû se trouver aux prises avec des questions qu'ils étaient incapables de résoudre seuls. Ils ne savaient plus très bien dans quel camp se ranger. Ils n'étaient plus des païens asservis aux éléments du monde, aux observances du calendrier (4.3,7-10), aux clivages habituels (
  - type: usfm
    marker: it
    children:
    - type: text
      text: Juif / Grec, esclave / homme libre, homme / femme,
  - type: text
    text: ' 3.28). Ils ne se sentaient pas non plus solidaires du monde juif et perdaient le statut privilégié dont ils bénéficiaient, en tant que Juifs, dans l''Empire romain.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ils se sont alors confiés à ceux que Paul considère comme des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: fauteurs de troubles
  - type: text
    text: ' (1.7). Ces derniers ne sont jamais nommés, ils ne sont pas non plus parmi les destinataires de la lettre. Tout se passe comme s''ils n''avaient été que des prédicateurs de passage.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Quelle était la nature de leur doctrine ? On a le sentiment qu''ils avaient en horreur tout ce que le discours libérateur de Paul comportait d''ouverture, grâce à une confiance nouvelle – une confiance en un Christ crucifié qui justifie et en son Esprit qui trace seul le chemin de la vie. Les Galates avaient dû éprouver des difficultés de l''ordre de la «  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: chair*
  - type: text
    text: '  » : non pas seulement inconduite sexuelle, selon ce que le mot « chair » évoque spontanément aujourd''hui, mais aussi '
  - type: usfm
    marker: it
    children:
    - type: text
      text: disputes, jalousies,
  - type: text
    text: ' etc. (5.19ss). Les fauteurs de troubles ont-ils alors prescrit l''ordonnance de la loi juive, y compris l''obligation de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: circoncision,
  - type: text
    text: ' comme remède à tous ces maux ?'
- type: usfm
  marker: ip
  children:
  - type: text
    text: La circoncision, en effet, avec sa caractéristique de marque permanente, de sceau de l'alliance abrahamique et mosaïque (Gn 17 ; Ex 4), pouvait donner l'impression forte d'être une sorte de « second sacrement » ou de « sacrement de la Torah » (c'est-à-dire de la loi juive) à situer sur le même plan que le baptême chrétien. Aussi bien les Galates, retombés de haut après l'expérience si vive qu'ils avaient faite du don de l'Esprit et le premier enthousiasme de leur baptême (3.1,27), furent-ils des proies faciles pour les propagandistes attardés des vertus pratiques de la Torah qui leur rendirent visite.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Et cela est intolérable. Paul y discerne comme la marque d''un envoûtement (3.1) qu''il s''agirait de rompre. Dès lors, pour accentuer sa différence, il provoque ses adversaires sur leur propre terrain : celui de l''argumentation fondée sur l''histoire sainte, qui était sans doute aussi le cheval de bataille des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: hellénistes
  - type: text
    text: ', ce courant important du judaïsme dont Etienne, dans les Actes des Apôtres, apparaît comme un représentant chrétien (cf. Ac 7 ; voir 6.1'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ',5).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Qui sont les Galates ?
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La fameuse Tour et le quartier de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Galata,
  - type: text
    text: ' dans l''Istanbul moderne, rappellent, au moins par leur nom, le passage des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Galates,
  - type: text
    text: ' ces guerriers'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: gaulois
  - type: text
    text: ' qui franchirent l''Hellespont (les Dardanelles) vers 278 av. J.-C. pour s''établir ensuite en Anatolie, dans la région de Pessinonte, d''Ancyre (Ankara) et de Tavium.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Défaits par les Romains en 189 av. J.-C., ils devinrent leurs auxiliaires au siècle suivant. Leur dernier prince, Amyntas, un officier promu par Rome à la dignité royale, mourut en 25 av. J.-C., non sans avoir légué ses Etats à l'administration romaine, sa bienfaitrice. Celle-ci procéda alors à une vaste réorganisation de la carte, avec la création d'une « province » de Galatie, venant enfler le « territoire galate » de plusieurs cantons satellites, telles la Phrygie et la Pisidie.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Comme le notait déjà fort logiquement Jérôme, le traducteur célèbre de la Vulgate (≈ 331-420), ces « Galates sont des Grecs » ; on parle aujourd'hui de Gallo-Grecs. Ils sont en effet policés et instruits, rompus à toutes les finesses de la civilisation hellénistique. Le niveau culturel de l'épître ne serait pas approprié s'il en allait autrement.
- type: usfm
  marker: is2
  children:
  - type: text
    text: Autour de l'incident d'Antioche
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pourquoi l''apôtre met-il tant de soin à se démarquer des autorités de l''Eglise, en place à Jérusalem (chap. 1 et 2) ? Au moment où la crise éclate, les gens de Jérusalem jouissent-ils ou non de l''estime des Galates ? En tout cas Paul proteste : sa propre autorité apostolique ne dépend pas des gens de Jérusalem. Elle ne lui vient pas des hommes. Il a bénéficié d''une révélation directe du Seigneur, qui l''a désigné pour devenir apôtre '
  - type: usfm
    marker: it
    children:
    - type: text
      text: parmi les non-Juifs
  - type: text
    text: ' (Ga 1.15s ; cf. Jr 1.5).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'S''il a rencontré les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: colonnes
  - type: text
    text: ' de l''Eglise (2.9'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '), ce n''est qu''à peu de reprises et pendant peu de temps (1.17-20 ; 2.9-10). Non : Paul n''est en dépendance '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: théologique, ecclésiale
  - type: text
    text: ' ou'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: rituelle
  - type: text
    text: ' ni de Pierre (1.18 ; 2.11-14), ni des '
  - type: usfm
    marker: it
    children:
    - type: text
      text: faux frères
  - type: text
    text: ' (2.4).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le récit de la vocation de Paul semble avoir fait partie de sa catéchèse habituelle, si l''on en juge par les nombreuses versions qui en sont connues par le Nouveau Testament. Le récit de Galates 1–2 se distingue cependant de tous les autres par le ton et l''ampleur autobiographique. Tour à tour véhément et tendre (cf. 3.1 et 4.13ss), l''apôtre se montre ici dans sa plus grande humanité : il apparaît à la fois comme un prophète intransigeant, qui ne tolère aucune dérive théologique, et un pasteur tout proche des siens, qui se plaît à évoquer avec eux les souvenirs qui les lient (et dont nous n''avons pas de trace ailleurs).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: L'exemple d'Abraham
- type: usfm
  marker: is2
  children:
  - type: text
    text: (chap. 3 et 4)
- type: usfm
  marker: ip
  children:
  - type: text
    text: La présence d’
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abraham
  - type: text
    text: ', cité neuf fois dans les chapitres 3 et 4, n''a rien de surprenant. Ce personnage partage avec Moïse la palme de la notoriété dans le Nouveau Testament (pas moins de 73 mentions, tandis que Moïse en récolte 79). Dans le monde juif du temps de Jésus, Abraham était considéré comme le parfait observateur de la Torah. Dans la Bible grecque des '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante
  - type: text
    text: ' (LXX*), le Siracide lui consacre un éloge qui va bien dans le sens de ce que les Galates ont l''air de penser : « Il observa la loi du Très-Haut et entra dans une alliance avec lui. Dans sa '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: chair
  - type: text
    text: ' il établit l''alliance et dans l''épreuve il fut trouvé fidèle » ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Siracide
  - type: text
    text: '* 44.19-21).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Paul ne pouvait éviter de revenir sur le sujet pour contester, avec la vigueur que l''on sait, les accents légalistes de cette dernière lecture. En fait, il renverse complètement l''interprétation traditionnelle en subordonnant radicalement l''obéissance d''Abraham (et '
  - type: usfm
    marker: it
    children:
    - type: text
      text: a fortiori
  - type: text
    text: ' sa circoncision) à sa foi.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Mais, pour autant, les procédés exégétiques employés au chapitre 4 surprennent souvent les modernes. Devant leur questionnement, ce qu'on a dit plus haut du modèle rhétorique fournit de très suggestifs éléments de réponse. Il ne fait pas de doute en effet que Paul eût pu s'exprimer de manière plus simple. Mais cela aurait-il été à la hauteur du but poursuivi ? Il semble bien qu'un certain maniérisme ait sa place dans le discours persuasif. Ainsi Démétrios, un rhéteur alexandrin du I
  - type: usfm
    marker: ord
    children:
    - type: text
      text: er
  - type: text
    text: ' s. av. J.-C., observait qu''« une expression obscure frappe souvent davantage les auditeurs de terreur, et que son impact varie suivant les auditeurs. Tandis que les choses claires et simples prêtent le flanc au mépris… c''est pourquoi les Mystères sont révélés sous une forme '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: allégorique
  - type: text
    text: ' de manière à procurer le frisson ». Le développement de Ga 4.21-31 met en œuvre une stratégie de cette sorte, sans qu''il soit besoin que Paul ait eu contact avec ces rhéteurs. Ce sont là, tout simplement, les idées du milieu grec d''alors, des faits de civilisation.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Epître difficile ? Sans doute. Mais pièce essentielle de la pensée chrétienne. En dehors d'une vision cohérente de la justification par la seule croix de Jésus-Christ et des vraies dimensions de la liberté chrétienne, l'Evangile reste étouffé par la bonne volonté des législateurs et casuistes de tout poil. Rien d'étonnant dès lors si, à toutes les époques de réforme, la militance de l'Eglise se saisit à nouveau de ces pages pour rappeler haut et fort qu'il n'y a pas d'autre Evangile (Ga 1.9) !
