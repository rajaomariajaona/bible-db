      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se repentit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le verbe employé ici et au v. 32 n''est pas celui qui est rendu par '
    - type: usfm
