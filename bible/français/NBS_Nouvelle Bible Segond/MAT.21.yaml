    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.41 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lc 19.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en leur temps '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 8.29+.'
    marker-yv: yv-n
  - type: text
    text: 'Ils lui répondirent : Ces misérables, il les fera disparaître misérablement, et il louera la vigne à d''autres vignerons qui lui donneront les fruits en leur temps.'
