  - type: text
    text: 'Il se rendit au temple ; pendant qu''il enseignait, les grands prêtres et les anciens du peuple vinrent lui demander : De quelle autorité fais-tu cela ? Qui t''a donné cette autorité ? '
  - type: usfm
