        text: des hommes ; des gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 5.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eux raisonnaient '
    - type: usfm
