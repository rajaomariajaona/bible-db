    marker-yv: yv-n
  - type: text
    text: 'Ils le prirent, le chassèrent hors de la vigne et le tuèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: f
    children:
    - type: usfm
