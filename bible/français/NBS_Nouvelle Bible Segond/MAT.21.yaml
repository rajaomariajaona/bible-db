      - type: text
        text: '21.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''étonnèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.27+.
    marker-yv: yv-n
  - type: text
    text: 'En voyant cela, les disciples s''étonnèrent : Comment ce figuier a-t-il pu se dessécher à l''instant même ? '
