        - type: text
          text: LXX
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Tu entends ce qu''ils disent ? Jésus leur répondit : Oui. N''avez-vous jamais lu ces paroles :'
