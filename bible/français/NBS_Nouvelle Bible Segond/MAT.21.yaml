      children:
      - type: text
        text: n'avez-vous pas eu foi en lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même possibilité v. 32.'
    marker-yv: yv-n
  - type: text
    text: 'Le baptême de Jean, d''où venait-il ? Du ciel, ou des humains ? Eux raisonnaient, se disant : Si nous répondons : « Du ciel », il nous dira : « Alors pourquoi ne l''avez-vous pas cru ? » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jean… '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 46/ / ; 11.9 ; 14.5.
    marker-yv: yv-n
  - type: text
    text: 'Et si nous répondons : « Des humains », nous pouvons craindre la foule, car tous tiennent Jean pour un prophète. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'Ils répondirent donc à Jésus : Nous ne savons pas. Il leur dit à son tour : Moi non plus, je ne vous dis pas de quelle autorité je fais cela.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole des deux fils
  marker-yv: yv-h
- type: usfm
