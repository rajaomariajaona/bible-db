    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.25 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ps 8.3 '
    - type: usfm
