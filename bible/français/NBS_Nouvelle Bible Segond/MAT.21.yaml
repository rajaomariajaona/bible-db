    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, si vous avez de la foi et si vous n''hésitez pas, non seulement vous ferez ce qui a été fait à ce figuier, mais quand vous direz à cette montagne : « Ote-toi de là et jette-toi dans la mer », cela se fera. '
  - type: usfm
    marker: vlbl
