      marker: ft
      children:
      - type: text
        text: 22.4.
    marker-yv: yv-n
  - type: text
    text: 'Il envoya encore d''autres esclaves, en plus grand nombre que les premiers ; les vignerons les traitèrent de la même manière. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
