      - type: text
        text: '21.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ac 4.26s.
    marker-yv: yv-n
  - type: text
    text: 'Mais quand les vignerons virent le fils, ils se dirent : « C''est l''héritier ! Venez, tuons-le, et nous aurons son héritage. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
