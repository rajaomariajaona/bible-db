    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous n'avez pas eu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous n'avez pas eu de remords par la suite pour le croire.
    marker-yv: yv-n
  - type: text
    text: 'Car Jean est venu à vous par la voie de la justice, et vous ne l''avez pas cru. Ce sont les collecteurs des taxes et les prostituées qui l''ont cru, et vous qui avez vu cela, vous n''avez pas eu de remords par la suite : vous ne l''avez pas cru davantage.'
