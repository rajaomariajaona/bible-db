          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: collecteurs des taxes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 9.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous devancent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 3.12 ; 7.29,36ss ; 18.14 ; 19.1ss.'
    marker-yv: yv-n
  - type: text
    text: 'Lequel des deux a fait la volonté du père ? Ils répondirent : Le premier. Jésus leur dit : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen,
  - type: text
    text: ' je vous le dis, les collecteurs des taxes et les prostituées vous devancent dans le royaume de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par la voie de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur un chemin de justice '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Pr 8.20 ; 12.28 ; 21.21 (
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ') ; 2P 2.21. –  '
    - type: usfm
      marker: fq
