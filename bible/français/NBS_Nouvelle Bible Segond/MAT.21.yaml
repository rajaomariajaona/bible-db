      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.41,46.
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur répondit : Moi aussi, je vais vous poser une question, une seule ; si vous me répondez, je vous dirai de quelle autorité je fais cela. '
