      - type: text
        text: Cf. Os 9.16 ; Ha 3.17 ; Lc 13.6ss ; Jn 15.2.
    marker-yv: yv-n
  - type: text
    text: 'Il vit un figuier sur le chemin et s''en approcha ; mais il n''y trouva que des feuilles ; il lui dit : Que plus jamais un fruit ne vienne de toi ! Et à l''instant même le figuier se dessécha.'
- type: usfm
  marker: p
