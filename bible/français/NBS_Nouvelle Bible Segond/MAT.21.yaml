document_id: MAT.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'entrée de Jésus à Jérusalem
  - type: heading
    content: Mc 11.1-10  ; Lc 19.28-40  ; Jn 12.12-16
  - type: text
    content: ' '
  - type: note
    content: 'Bethphagé  : site proche de Béthanie (voir v. 17n) ; le nom Bethphagé signifie maison des figues . –  mont des Oliviers  : voir Za 14.4.'
  - type: text
    content: 'Lorsqu''ils approchèrent de Jérusalem et qu''ils furent arrivés à Bethphagé, vers le mont des Oliviers, Jésus envoya deux disciples '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'fut en émoi  : litt. fut secouée  ; même verbe en 27.51 ( trembla ).'
  - type: text
    content: 'Lorsqu''il entra dans Jérusalem, toute la ville fut en émoi. On disait : Qui est-il, celui-ci ? '
  '11':
  - type: note
    content: prophète v. 46 ; 16.14 ; Mc 6.15 ; Lc 7.16,39 ; 24.19 ; Jn 1.21+ ; 7.40,52.
  - type: text
    content: 'Les foules répondaient : C''est le prophète Jésus, de Nazareth de Galilée.'
  - type: heading
    content: Jésus chasse les vendeurs du temple
  - type: heading
    content: Mc 11.15-17  ; Lc 19.45-46  ; cf. Jn 2.13-17
  '12':
  - type: text
    content: ' '
  - type: note
    content: Ces marchands fournissaient aux fidèles qui arrivaient de l'étranger de la monnaie valable dans le sanctuaire (Lv 27.25) et des victimes appropriées pour les sacrifices ( colombes ou pigeons , Lv 1.14 ; Dt 14.24-26 ; Lc 2.24). Cf. Za 14.21n  ; voir aussi temple.
  - type: text
    content: 'Jésus entra dans le temple. Il chassa tous ceux qui vendaient et qui achetaient dans le temple, il renversa les tables des changeurs et les sièges des vendeurs de colombes. '
  '13':
  - type: note
    content: Es 56.7 ; Jr 7.11  ; cf. 1R 8.30-40.
  - type: text
    content: 'Et il leur dit : Il est écrit :'
  - type: text
    content: Ma maison sera appelée maison de prière
  - type: text
    content: .
  - type: text
    content: 'Mais vous, vous en faites '
  - type: text
    content: une caverne de bandits
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: note
    content: 11.5 ; 2S 5.8 (LXX).
  - type: text
    content: 'Des aveugles et des infirmes s''approchèrent de lui dans le temple. Il les guérit. '
  '15':
  - type: note
    content: grands prêtres / scribes 2.4n. –  choses étonnantes ou merveilles, miracles  ; le mot grec correspondant n'apparaît qu'ici dans le N.T. ; terme apparenté au v. 42 ; cf. 8.10n. –  Hosanna pour le Fils de David v. 9n  ; 9.27+.
  - type: text
    content: 'Mais les grands prêtres et les scribes s''indignèrent à la vue des choses étonnantes qu''il avait faites et des enfants qui criaient dans le temple : «  '
  - type: text
    content: Hosanna
  - type: text
    content: ' pour le Fils de David ! » '
  '16':
  - type: note
    content: 11.25 ; Ps 8.3 (LXX).
  - type: text
    content: 'Ils lui dirent : Tu entends ce qu''ils disent ? Jésus leur répondit : Oui. N''avez-vous jamais lu ces paroles :'
  - type: text
    content: Par la bouche des tout-petits et des nourrissons tu t'es formé une louange !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Béthanie  : localité située sur le versant oriental du mont des Oliviers.'
  - type: text
    content: Il les laissa et sortit de la ville pour aller à Béthanie, où il passa la nuit.
  - type: heading
    content: Le figuier sans figues
  - type: heading
    content: Mc 11.12-14,20-25
  '18':
  - type: text
    content: ' '
  - type: note
    content: 4.2.
  - type: text
    content: 'Le matin, en retournant à la ville, il eut faim. '
  '19':
  - type: note
    content: Cf. Os 9.16 ; Ha 3.17 ; Lc 13.6ss ; Jn 15.2.
  - type: text
    content: 'Il vit un figuier sur le chemin et s''en approcha ; mais il n''y trouva que des feuilles ; il lui dit : Que plus jamais un fruit ne vienne de toi ! Et à l''instant même le figuier se dessécha.'
  '2':
  - type: note
    content: 26.18.
  - type: text
    content: 'en leur disant : Allez au village qui est devant vous ; vous trouverez aussitôt une ânesse attachée, et un ânon avec elle ; détachez-les, et amenez-les-moi. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: s'étonnèrent 8.27+.
  - type: text
    content: 'En voyant cela, les disciples s''étonnèrent : Comment ce figuier a-t-il pu se dessécher à l''instant même ? '
  '21':
  - type: note
    content: 'Amen 5.18n. –  foi 17.20 ; 23.23n  ; Jn 14.12. –  n''hésitez pas ou ne doutez pas Rm 4.20 ; Jc 1.6. –  Ote-toi…  : litt. sois soulevée et jetée…'
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, si vous avez de la foi et si vous n''hésitez pas, non seulement vous ferez ce qui a été fait à ce figuier, mais quand vous direz à cette montagne : « Ote-toi de là et jette-toi dans la mer », cela se fera. '
  '22':
  - type: note
    content: '7.7ss. –  avec foi  : litt. en croyant.'
  - type: text
    content: Tout ce que vous demanderez avec foi par la prière, vous le recevrez.
  - type: heading
    content: L'autorité de Jésus en question
  - type: heading
    content: Mc 11.27-33  ; Lc 20.1-8
  '23':
  - type: text
    content: ' '
  - type: note
    content: grands prêtres / anciens 16.21+ ; 26.3,47 ; 27.1. –  De quelle autorité ou par quel pouvoir, de quel droit 7.29 ; 8.9n  ; Ex 2.14 ; Jn 2.18 ; Ac 4.7.
  - type: text
    content: 'Il se rendit au temple ; pendant qu''il enseignait, les grands prêtres et les anciens du peuple vinrent lui demander : De quelle autorité fais-tu cela ? Qui t''a donné cette autorité ? '
  '24':
  - type: note
    content: 22.41,46.
  - type: text
    content: 'Jésus leur répondit : Moi aussi, je vais vous poser une question, une seule ; si vous me répondez, je vous dirai de quelle autorité je fais cela. '
  '25':
  - type: note
    content: 'V. 32 ; Jn 1.33 ; 3.27 ; Ac 5.38. –  baptême de Jean  : cf. 3.1ss. –  des humains  : autres traductions des hommes ; des gens  ; cf. 5.13+. –  Eux raisonnaient (en eux-mêmes ou entre eux), 16.7n. –  ne l''avez-vous pas cru  : autre traduction n''avez-vous pas eu foi en lui, même possibilité v. 32.'
  - type: text
    content: 'Le baptême de Jean, d''où venait-il ? Du ciel, ou des humains ? Eux raisonnaient, se disant : Si nous répondons : « Du ciel », il nous dira : « Alors pourquoi ne l''avez-vous pas cru ? » '
  '26':
  - type: note
    content: Jean… prophète v. 46/ / ; 11.9 ; 14.5.
  - type: text
    content: 'Et si nous répondons : « Des humains », nous pouvons craindre la foule, car tous tiennent Jean pour un prophète. '
  '27':
  - type: text
    content: 'Ils répondirent donc à Jésus : Nous ne savons pas. Il leur dit à son tour : Moi non plus, je ne vous dis pas de quelle autorité je fais cela.'
  - type: heading
    content: La parabole des deux fils
  '28':
  - type: text
    content: ' '
  - type: note
    content: 20.1 ; cf. Lc 15.11.
  - type: text
    content: 'Qu''en pensez-vous ? Un homme avait deux fils ; il s''adressa au premier et dit : Mon enfant, va travailler dans la vigne aujourd''hui. '
  '29':
  - type: note
    content: fut pris de remords ou se repentit  ; le verbe employé ici et au v. 32 n'est pas celui qui est rendu par changer radicalement dans le reste de l'évangile (3.2n). Il revient en 27.3.
  - type: text
    content: 'Celui-ci répondit : « Je ne veux pas. » Plus tard, il fut pris de remords, et il y alla. '
  '3':
  - type: note
    content: 'Jn 13.13. –  Le Seigneur  : on pourrait aussi comprendre le maître (des animaux). –  laissera aller  : le même verbe (traduit ailleurs par envoyer) est traduit par renvoyer en Mc 11.3n.'
  - type: text
    content: 'Si quelqu''un vous dit quelque chose, vous répondrez : « Le Seigneur en a besoin. » Et il les laissera aller tout de suite. '
  '30':
  - type: note
    content: 'Certains mss intervertissent les rôles des deux fils aux v. 29s. Cf. 7.21 ; Ez 33.31. –  Bien sûr…  : litt. Moi, maître ! (ou Seigneur !).'
  - type: text
    content: 'L''homme s''adressa alors au second et lui dit la même chose. Celui-ci répondit : « Bien sûr, maître. » Mais il n''y alla pas. '
  '31':
  - type: note
    content: 'Le premier  : certains mss portent le dernier (en fonction de l''interversion aux v. 29 et 30n). –  collecteurs des taxes  : 9.10n. –  vous devancent  : cf. Lc 3.12 ; 7.29,36ss ; 18.14 ; 19.1ss.'
  - type: text
    content: 'Lequel des deux a fait la volonté du père ? Ils répondirent : Le premier. Jésus leur dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, les collecteurs des taxes et les prostituées vous devancent dans le royaume de Dieu. '
  '32':
  - type: note
    content: 'par la voie de la justice ou sur un chemin de justice Pr 8.20 ; 12.28 ; 21.21 (LXX) ; 2P 2.21. –  vous ne l''avez pas cru v. 25 ; Lc 7.30 ; cf. Jn 7.48. –  vous n''avez pas eu…  : litt. vous n''avez pas eu de remords par la suite pour le croire.'
  - type: text
    content: 'Car Jean est venu à vous par la voie de la justice, et vous ne l''avez pas cru. Ce sont les collecteurs des taxes et les prostituées qui l''ont cru, et vous qui avez vu cela, vous n''avez pas eu de remords par la suite : vous ne l''avez pas cru davantage.'
  - type: heading
    content: La parabole des mauvais vignerons
  - type: heading
    content: Mc 12.1-12  ; Lc 20.9-19
  '33':
  - type: text
    content: ' '
  - type: note
    content: maître de maison 20.1. –  une tour d'où des gardiens surveillaient la vigne ; cf. Es 5.1s.
  - type: text
    content: 'Ecoutez une autre parabole. Il y avait un maître de maison qui planta une vigne. Il l''entoura d''une haie, y creusa un pressoir et y construisit une tour, puis il la loua à des vignerons et partit en voyage. '
  '34':
  - type: note
    content: 'A l''approche des vendanges  : litt. lorsque approcha le temps (même mot v. 41) des fruits. –  envoya ses esclaves (ou ses serviteurs) 22.3 ; Jr 7.25s ; 25.4 ; 2Ch 24.19 ; 36.15s ; Ac 7.52.'
  - type: text
    content: 'A l''approche des vendanges, il envoya ses esclaves chez les vignerons, pour recevoir les fruits de la vigne. '
  '35':
  - type: note
    content: 22.6 ; 23.37 ; Jr 20.2 ; 26.21-23 ; Né 9.26.
  - type: text
    content: 'Les vignerons prirent ses esclaves ; l''un, ils le battirent ; un autre, ils le tuèrent ; un autre encore, ils le lapidèrent. '
  '36':
  - type: note
    content: 22.4.
  - type: text
    content: 'Il envoya encore d''autres esclaves, en plus grand nombre que les premiers ; les vignerons les traitèrent de la même manière. '
  '37':
  - type: note
    content: Ga 4.4 ; Hé 1.1s ; voir aussi fils.
  - type: text
    content: 'Enfin il leur envoya son fils, en disant : « Ils respecteront mon fils ! » '
  '38':
  - type: note
    content: Ac 4.26s.
  - type: text
    content: 'Mais quand les vignerons virent le fils, ils se dirent : « C''est l''héritier ! Venez, tuons-le, et nous aurons son héritage. » '
  '39':
  - type: note
    content: Cf. Lv 24.14ss ; Jn 19.17 ; Ac 7.58 ; Hé 13.12s.
  - type: text
    content: 'Ils le prirent, le chassèrent hors de la vigne et le tuèrent. '
  '4':
  - type: note
    content: du prophète 1.22+.
  - type: text
    content: 'Cela arriva afin que s''accomplisse ce qui avait été dit par l''entremise du prophète :'
  '40':
  - type: note
    content: 24.50.
  - type: text
    content: 'Lorsque le maître de la vigne viendra, comment traitera-t-il donc ces vignerons ? '
  '41':
  - type: note
    content: Lc 19.27. –  en leur temps v. 34n  ; 8.29+.
  - type: text
    content: 'Ils lui répondirent : Ces misérables, il les fera disparaître misérablement, et il louera la vigne à d''autres vignerons qui lui donneront les fruits en leur temps.'
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'la principale, celle de l''angle  : litt. tête d''angle, Ps 118.22s  ; cf. Es 8.14 ; 28.16 ; Lc 9.22 ; Ac 4.11 ; Rm 9.33 ; Ep 2.20 ; 1P 2.4,6-8.'
  - type: text
    content: 'Jésus leur dit : N''avez-vous jamais lu dans les Ecritures :'
  - type: text
    content: C'est la pierre que les constructeurs ont rejetée
  - type: text
    content: qui est devenue la principale, celle de l'angle ;
  - type: text
    content: cela est venu du Seigneur,
  - type: text
    content: c'est une chose étonnante à nos yeux
  - type: text
    content: .
  '43':
  - type: text
    content: ' '
  - type: note
    content: 8.11s. –  règne ou royaume 3.2n.
  - type: text
    content: 'C''est pourquoi, je vous le dis, le règne de Dieu vous sera enlevé et sera donné à une nation qui en produira les fruits. '
  '44':
  - type: note
    content: Ce v. est absent de certains mss. Cf. Dn 2.34s,44s.
  - type: text
    content: Quiconque tombera sur cette pierre s'y brisera, et celui sur qui elle tombera, elle l'écrasera.
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'grands prêtres / pharisiens 2.4n  ; 9.34+ ; 27.62. –  comprirent  : autre traduction surent.'
  - type: text
    content: 'Après avoir entendu ses paraboles, les grands prêtres et les pharisiens comprirent que c''était d''eux qu''il parlait ; '
  '46':
  - type: note
    content: V. 11,26+ ; cf. Lc 19.47s.
  - type: text
    content: ils cherchaient à le faire arrêter, mais ils eurent peur des foules, parce qu'elles le tenaient pour un prophète.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Es 62.11 ; Za 9.9  ; cf. Ex 4.19s ; 2S 16.1s (textes souvent rapprochés de Za 9.9 et appliqués au Messie dans la littérature rabbinique). –  la fille de Sion  : autre traduction Sion la belle  : désignation poétique de Jérusalem ; voir Es 1.8n  ; cf. Jn 12.15n. –  plein de douceur  : litt. doux ou humble , 5.5n  ; 11.29s. –  sur une ânesse  : autre traduction possible ici  : sur un âne.'
  - type: text
    content: 'Dites à la fille de Sion :'
  - type: text
    content: Ton roi vient à toi,
  - type: text
    content: plein de douceur, monté sur une ânesse,
  - type: text
    content: sur un ânon, le petit d'une bête de somme
  - type: text
    content: .
  '6':
  - type: text
    content: 'Les disciples allèrent faire ce que Jésus leur avait ordonné. '
  '7':
  - type: note
    content: 1R 1.32,38-40 ; 2R 9.13.
  - type: text
    content: 'Ils amenèrent l''ânesse et l''ânon, sur lesquels ils mirent leurs vêtements ; il s''assit dessus. '
  '8':
  - type: note
    content: 'Cf. Lv 23.40 ; Jn 12.13n  ; Ap 7.9 ; 1 Maccabées 13.51 : « Ils y entrèrent (dans Jérusalem purifiée)… avec des acclamations et des palmes, au son des lyres et des cymbales, des cithares, des hymnes et des chants. »'
  - type: text
    content: 'La plupart des gens de la foule étendirent leurs vêtements sur le chemin ; d''autres coupèrent des branches aux arbres et les étendirent sur le chemin. '
  '9':
  - type: note
    content: 'Hosanna  : transcription d''une expression hébraïque (Ps 118.25s, accorde le salut  ; cf. 2S 14.4), qui signifiait à l''origine sauve, de grâce ! Elle jouait un rôle dans le rituel de la fête des Huttes, à l''automne, comme à la Pâque ; ici elle semble comprise comme une acclamation adressée au roi ; cf. 27.42/ /. – Cf. Didachè 10.6 (conclusion du rituel de la Cène) : « Que la grâce vienne et que ce monde passe ! Hosanna au Dieu de David ! » (sur la suite, voir 1Co 16.22n). 12.1 : « Que toute personne qui vient au nom du Seigneur soit accueillie ; vous la connaîtrez ensuite, après l''avoir éprouvée, car vous saurez discerner la droite de la gauche. » –  Fils de David 9.27+. –  celui qui vient 11.3n  ; 23.39 ; autre traduction Béni soit, au nom du Seigneur, celui qui vient ! –  dans les lieux très hauts Ps 148.1 ; Jb 16.19.'
  - type: text
    content: 'Les foules le précédaient et le suivaient en criant :'
  - type: text
    content: Hosanna
  - type: text
    content: ' pour le Fils de David !'
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur !
  - type: text
    content: Hosanna dans les lieux très hauts !
