      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Enfin il leur envoya son fils, en disant : « Ils respecteront mon fils ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
