  - type: text
    text: 'Celui-ci répondit : « Je ne veux pas. » Plus tard, il fut pris de remords, et il y alla. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Certains mss intervertissent les rôles des deux fils aux v. 29s. Cf. 7.21 ; Ez 33.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
