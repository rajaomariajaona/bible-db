    marker-yv: yv-n
  - type: text
    text: 'A l''approche des vendanges, il envoya ses esclaves chez les vignerons, pour recevoir les fruits de la vigne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 22.6 ; 23.37 ; Jr 20.2 ; 26.21-23 ; Né 9.26.
    marker-yv: yv-n
  - type: text
    text: 'Les vignerons prirent ses esclaves ; l''un, ils le battirent ; un autre, ils le tuèrent ; un autre encore, ils le lapidèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
