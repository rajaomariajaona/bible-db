document_id: PSA.142,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur, dernier refuge du persécuté
  - type: text
    content: ' '
  - type: note
    content: Poème 32.1n. –  dans la grotte 57.1 ; 1S 22.1s ; 24.4ss.
  - type: text
    content: Poème. De David. Lorsqu'il était dans la grotte. Prière.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '77.2 ; cf. 30.9. –  A pleine voix  : litt. de ma voix.'
  - type: text
    content: 'A pleine voix je crie vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'à pleine voix je supplie le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 102.1n.
  - type: text
    content: Je répands ma requête devant lui,
  - type: text
    content: j'expose devant lui ma détresse.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'mon esprit défaille ou je suis à bout de souffle  ; cf. 77.4 ; voir aussi 42.6 ; 143.4. –  tu connais  : cf. 69.6 ; 139.2ss. –  un piège 140.6+ ; 141.9.'
  - type: text
    content: Quand mon esprit défaille,
  - type: text
    content: toi, tu connais mon sentier.
  - type: text
    content: Sur la route où je marche
  - type: text
    content: ils m'ont tendu un piège.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Regarde  : autre lecture possible je regarde. –  à droite  : cf. 16.8 ; 110.5 ; 121.5 ; voir aussi 109.6 ; Za 3.1. –  plus de refuge…  : cf. Jr 25.35 ; Am 2.14 ; Jb 11.20.'
  - type: text
    content: 'Regarde à droite et vois :'
  - type: text
    content: personne ne me reconnaît,
  - type: text
    content: plus de refuge pour moi,
  - type: text
    content: personne ne s'inquiète de ma vie.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Tu es mon abri 91.9 ; cf. 7.2+. –  ma part 16.5+s ; 73.26. –  sur la terre des vivants 27.13 ; 116.9.
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est vers toi que je crie.'
  - type: text
    content: 'Je dis : Tu es mon abri,'
  - type: text
    content: ma part sur la terre des vivants.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 141.1+. –  très affaibli 38.9 ; 79.8. –  Délivre-moi… 18.18 ; Jr 31.11.
  - type: text
    content: Sois attentif à mon cri !
  - type: text
    content: Car je suis très affaibli.
  - type: text
    content: Délivre-moi de ceux qui me poursuivent,
  - type: text
    content: car ils sont plus forts que moi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'de la prison  : cf. 88.9 ; 107.10ss ; le même terme est traduit par forteresse en Es 24.22 ; 42.7 ; voir aussi Lv 24.12 ; Nb 15.34 ; Lm 3.7. – Voir nom. –  Les justes viendront…  : cf. 1Co 12.26. –  quand (ou car ) tu m''auras fait du bien 13.6n.'
  - type: text
    content: Fais-moi sortir de la prison,
  - type: text
    content: afin que je célèbre ton nom !
  - type: text
    content: Les justes viendront m'entourer,
  - type: text
    content: quand tu m'auras fait du bien.
