      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jusqu''à ce jour ils agissent selon ces anciennes règles. Ils ne craignent pas le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ils n''agissent ni selon leurs propres prescriptions et leur propre règle, ni selon la loi et le commandement que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a institués pour les fils de Jacob, celui qui, là-bas, est nommé Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait conclu une alliance avec eux et leur avait donné cet ordre : Vous ne craindrez pas d''autres dieux ; vous ne vous prosternerez pas devant eux, vous ne les servirez pas et vous ne leur offrirez pas de sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: 'Mais c''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) que vous craindrez, lui qui vous a fait monter d''Egypte par une grande puissance, le bras étendu ; c''est devant lui que vous vous prosternerez et c''est à lui que vous offrirez des sacrifices. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toujours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous les jours.
    marker-yv: yv-n
  - type: text
    text: 'Vous veillerez à mettre toujours en pratique les prescriptions, les règles, la loi et le commandement qu''il a écrits pour vous, et vous ne craindrez pas d''autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.38 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'ai conclue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX, Vg '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il a conclue.
    marker-yv: yv-n
  - type: text
    text: 'Vous n''oublierez pas l''alliance que j''ai conclue avec vous, et vous ne craindrez pas d''autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: text
    text: 'Mais c''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu, que vous craindrez ; c''est lui qui vous délivrera de la main de tous vos ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Ils n'ont pas écouté ; ils agissent selon leur ancienne règle.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Ces nations craignaient le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et servaient leurs statues. Leurs fils et les fils de leurs fils agissent jusqu''à ce jour comme leurs pères ont agi.'
