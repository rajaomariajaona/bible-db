    marker-yv: yv-n
  - type: text
    text: 'Ils avaient fait passer par le feu leurs fils et leurs filles, ils s''étaient livrés à la magie, ils avaient pratiqué la divination, ils s''étaient vendus en contrariant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', en faisant ce qui lui déplaisait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de sa vue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
