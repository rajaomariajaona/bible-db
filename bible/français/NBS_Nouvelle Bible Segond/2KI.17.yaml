        text: ils iront et habiteront là et enseigneront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: règle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 26'
      - type: usfm
