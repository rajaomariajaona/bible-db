  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' écarte Israël de sa vue, comme il l''avait annoncé par l''intermédiaire de tous ses serviteurs, les prophètes. Israël a été exilé loin de sa terre, en Assyrie, jusqu''à ce jour.'
