  - type: text
    text: ' et avait fait commettre à Israël un grand péché. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les Israélites ont suivi tous les péchés que Jéroboam avait commis ; ils ne s''en sont pas écartés, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
