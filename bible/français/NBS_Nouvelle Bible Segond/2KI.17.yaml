    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nibhaz
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss hébreux portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nibhân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Eblazer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Ce dieu demeure inconnu malgré différentes hypothèses proposées (Nabou, dieu des scribes, souvent invoqué par la formule '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nabou ahiz, Nabou, maître de…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Ibnahaza ; ou encore le mot hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mizbéah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', signifiant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: autel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tartaq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Tartaq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', identifié parfois avec la déesse Astarté. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Adrammélek
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être une déformation de « Hadad du roi » ou « Hadad roi », Hadad étant l''équivalent de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Anammélek
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut être interprété comme « Anat-du-roi », Anat étant, selon des textes du II'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' millénaire retrouvés à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Ougarit
      - type: text
        text: ', l''épouse de Baal. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dieux de Sepharvaïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon une autre lecture traditionnelle, on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: déesse de Sepharvaïm.
    marker-yv: yv-n
  - type: text
    text: 'les Avvites firent Nibhaz et Tartaq ; les Sepharvaïtes jetaient au feu leurs fils pour Adrammélek et Anammélek, dieux de Sepharvaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.32 '
    - type: usfm
