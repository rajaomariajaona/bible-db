      text: Seigneur
  - type: text
    text: ' envoya contre eux les lions, qui les tuaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la règle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la coutume ; la religion
    - type: usfm
      marker: ft
      children:
