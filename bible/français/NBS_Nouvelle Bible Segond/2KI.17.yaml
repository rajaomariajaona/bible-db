      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Kouth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 30), en akkadien '
