  - type: text
    text: 'Ils avaient rejeté ses prescriptions, l''alliance qu''il avait conclue avec leurs pères et les préceptes qu''il avait institués pour eux. Ils avaient suivi la futilité et ils s''étaient rendus futiles. Ils avaient suivi les nations qui les entouraient et que le '
  - type: usfm
