        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jugement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 33.'
    marker-yv: yv-n
  - type: text
    text: 'On dit au roi d''Assyrie : Les nations que tu as exilées et que tu as fait habiter dans les villes de Samarie ne connaissent pas la règle du dieu du pays ; il a envoyé contre elles les lions, qui les font mourir, parce qu''elles ne connaissent pas la règle du dieu du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
