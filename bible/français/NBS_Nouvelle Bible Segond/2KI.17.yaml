          text: e
      - type: text
        text: ' siècle av. J.-C. »♦ ; « L''Assyrie et les Assyriens »♦. Les sources assyriennes semblent témoigner de l''implantation de tribus arabes sur le territoire de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
