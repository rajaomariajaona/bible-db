  - type: text
    text: 'Comme ils craignaient aussi le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ils nommèrent n''importe qui parmi eux comme prêtres des hauts lieux : ces prêtres officiaient pour eux dans les maisons des hauts lieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: règle
    - type: usfm
