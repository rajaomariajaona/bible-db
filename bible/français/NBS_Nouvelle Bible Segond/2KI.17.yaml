    - type: usfm
      marker: fq
      children:
      - type: text
        text: Avva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : plusieurs localisations ont été proposées pour cette ville : Olmm entre Antioche et Alep, Tell Kafr Aya au sud-ouest de Homs, sur l''Oronte, ou encore Ama, au pays d''Elam ; cf. 18.34. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hamath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : identifié avec la ville de Hama en Syrie sur le fleuve Oronte, à 190 km au nord de Damas, cf. 14.25. D''autres évoquent une ville d''A-ma-ti, dans l''est de la Mésopotamie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sepharvaïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 18.34 ; 19.13 ; Es 36.19 ; 37.13 identifié avec une ville appelée Shoubria dans les textes assyriens. Il pourrait s''agir d''une région située en Anatolie, à l''ouest du lac de Van. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Samarie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : par-delà la ville, ce nom désigne ici l''ensemble de l''ancien territoire du royaume du Nord.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Assyrie fit venir des gens de Babylone, de Kouta, d''Avva, de Hamath et de Sepharvaïm. Il les fit habiter dans les villes de Samarie à la place des Israélites. Ils prirent possession de Samarie et habitèrent dans ses villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
