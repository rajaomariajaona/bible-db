        text: '  : cf. v. 26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi ils craignaient le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), mais ils servaient aussi leurs propres dieux, selon la règle des nations d''où on les avait exilés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 13+. – Voir '
    - type: usfm
