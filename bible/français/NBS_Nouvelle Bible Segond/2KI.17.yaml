  - type: text
    text: 'Mais chaque nation faisait ses propres dieux. Ils les placèrent dans la maison des hauts lieux qu''avaient bâtie les Samaritains, dans les villes où chacune des nations habitait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Soukkoth-Benoth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Des Cabanes de filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : selon certains, cette expression renverrait au culte des déesses Sag-Kouth (cf. Am 5.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') et Ishtar qualifiée de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Banitou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. créatrice. D''autres préconisent l''identification avec la déesse Sarpanitou ou Zer-Banitou, épouse de Mardouk, dans le panthéon babylonien. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nergal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dieu des enfers de la mythologie babylonienne mais connu également en Syrie comme en Egypte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ashima
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : correspondrait au dieu Eshmoun des Phéniciens. Le culte d''Ashima est attesté par des inscriptions achéménides, ainsi que dans la colonie juive d''Eléphantine en Egypte où Ashima de Beth-El est adoré aux côtés de YHWH, cf. Am 8.14.'
    marker-yv: yv-n
  - type: text
    text: 'Les gens de Babylone firent Soukkoth-Benoth, les gens de Kouth firent Nergal, les gens de Hamath firent Ashima, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
