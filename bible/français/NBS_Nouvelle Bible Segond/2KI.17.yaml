  - type: text
    text: 'Le roi d''Assyrie donna cet ordre : Faites aller là-bas l''un des prêtres que vous avez exilés de là-bas ; qu''il aille y habiter, et qu''il leur enseigne la règle du dieu du pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Un des prêtres qui avaient été exilés de Samarie vint habiter à Beth-El et leur enseigna comment ils devaient craindre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
