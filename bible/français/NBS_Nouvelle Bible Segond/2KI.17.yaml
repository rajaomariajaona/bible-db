  - type: text
    text: 'La douzième année d''Achaz, roi de Juda, Osée, fils d''Ela, devint roi sur Israël à Samarie ; il régna neuf ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce qui déplaisait au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 17 ; 3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il fit ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', non pas toutefois comme les rois d''Israël qui l''avaient précédé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Salmanasar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(akkadien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shoulmanou-ashered
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') V (726-722 av. J.-C.), fils de Tiglath-Piléser III. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: partit l'attaquer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: monta contre lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui fut soumis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fut son serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son esclave.
    marker-yv: yv-n
  - type: text
    text: 'Salmanasar, roi d''Assyrie, partit l''attaquer ; et Osée lui fut soumis et lui paya un tribut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: So
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon les mss (hébreux ou grecs), le nom de ce pharaon est transcrit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sy, Segor, Soba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Certains mss de LXX mentionnent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Adramélek, l''Ethiopien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Nubien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). Certains ont vu dans ce nom une référence à la ville égyptienne de Saïs, dont le prince Tefnakht tente de résister au roi nubien Piankhi, maître de la Haute-Egypte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: enfermer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: arrêter.
    marker-yv: yv-n
  - type: text
    text: 'Mais le roi d''Assyrie découvrit une conspiration chez Osée, qui avait envoyé des messagers à So, roi d''Egypte, et qui ne faisait plus monter annuellement le tribut au roi d''Assyrie. Le roi d''Assyrie le fit enfermer et enchaîner dans une maison de détention. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: La place de ces v. repris en 18.9-11 laisse entendre qu'Osée aurait été arrêté avant que Salmanasar ne se mette en campagne contre Samarie. Il se peut aussi que v. 5s décrivent plus en détails les opérations militaires dont le dénouement est déjà annoncé au v. 4.
    marker-yv: yv-n
  - type: text
    text: 'Puis le roi d''Assyrie envahit tout le pays ; il arriva devant Samarie, qu''il assiégea pendant trois ans. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La prise de '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'par Salmanasar V est évoquée dans une chronique babylonienne. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Halah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être Tell Abbasiya, au nord-est de Ninive, près de Khorsabad. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Habor
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : principal affluent sur la rive gauche de l''Euphrate. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la rivière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fleuve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gozân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement Tell Halaf où ont été retrouvés des documents attestant la présence des exilés de Samarie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les villes des Mèdes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX a lu ici un nom propre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Oré des Mèdes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Les textes assyriens chiffrent à 27 290 le nombre de personnes exilées de Samarie par Sargon II (721-705 av. J.-C.), successeur de Salmanasar V.
    marker-yv: yv-n
  - type: text
    text: La neuvième année d'Osée, le roi d'Assyrie prit Samarie et exila Israël en Assyrie. Il les fit habiter à Halah et sur le Habor, la rivière de Gozân, ainsi que dans les villes des Mèdes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les causes de la ruine du royaume d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'A partir d''ici la théologie de l''histoire qui sous-tend l''ensemble des livres des Rois devient explicite : la chute de Samarie est la conséquence de l''infidélité du royaume du Nord à la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' de YHWH, telle qu''elle est formulée en particulier dans le Deutéronome (voir l''introduction♦). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la colère de Dieu contre Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'monter d''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 12.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et les avait libérés…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sous la main de Pharaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Cela arriva parce que les Israélites avaient péché contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), leur Dieu, qui les avait fait monter d''Egypte et les avait libérés de la main du pharaon, le roi d''Egypte, et parce qu''ils avaient craint d''autres dieux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voilà ce qu'avaient fait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et les rois d''Israël qui ont fait '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce qu'ils ont fait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même formule au v. 19, pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '[les prescriptions qu''Israël] avait mises en pratique'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). La portion de texte correspondante est omise par '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ', et la précision '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et les rois d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'par d''autres témoins du texte, dont un ms hébreu. Certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils avaient suivi les prescriptions des nations… à l''initiative des rois d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 16.3).
    marker-yv: yv-n
  - type: text
    text: 'Ils avaient suivi les prescriptions des nations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dépossédées devant les Israélites ; voilà ce qu''avaient fait les rois d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fait en secret… des choses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'inventé… des paroles ; dit… des paroles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ') ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vêtu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '… des paroles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(LXX). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'on ne doit pas faire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui ne sont pas ainsi.
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites avaient fait en secret contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu, des choses qu''on ne doit pas faire. Ils s''étaient bâti des hauts lieux dans toutes leurs villes, depuis les tours des gardes jusqu''aux villes fortes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Ils s''étaient fait des pierres levées et des poteaux cultuels (des ashéras) sur toute colline élevée et sous tout arbre verdoyant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: exilées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : bien qu''aucun récit de la conquête israélite ne mentionne de condamnation à l''exil à l''encontre des Cananéens, le texte biblique reprend à dessein le verbe employé pour Israël au v. 6.'
    marker-yv: yv-n
  - type: text
    text: 'Et là ils avaient offert de l''encens dans tous les hauts lieux, comme les nations que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait exilées devant eux. Ils avaient contrarié le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en faisant des choses mauvaises. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Ils avaient servi les idoles au sujet desquelles le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' leur avait dit : « Vous ne ferez pas cela. » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '17.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tous ses '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon LXX. Le texte hébreu se partage entre deux traditions de lecture différentes'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de tous les prophètes de tout visionnaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de tout son prophète, tout visionnaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '( ?). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: instituée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 15,34 ; le même terme hébreu est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ordonner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'donner un ordre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 35 ; 18.12) ; cf. Dt 4.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je vous ai envoyée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX et Syr ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je leur ai envoyée.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait averti Israël et Juda par l''intermédiaire de tous ses prophètes, de tous les visionnaires ; il leur avait dit : Revenez de vos voies mauvaises et observez mes commandements et mes prescriptions, en suivant toute la loi que j''ai instituée pour vos pères et que je vous ai envoyée par l''intermédiaire de mes serviteurs, les prophètes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mais ils n''avaient pas écouté ; ils s''étaient montrés aussi rétifs que leurs pères, qui n''avaient pas mis leur foi dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu. '
  - type: usfm
    marker: vlbl
    children:
