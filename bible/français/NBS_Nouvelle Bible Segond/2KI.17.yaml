document_id: 2KI.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Osée, roi d'Israël ; prise de Samarie
  - type: text
    content: ' '
  - type: note
    content: 'douzième  : dixième pour un ms de LXX, quatorzième pour un autre.'
  - type: text
    content: 'La douzième année d''Achaz, roi de Juda, Osée, fils d''Ela, devint roi sur Israël à Samarie ; il régna neuf ans. '
  '10':
  - type: text
    content: 'Ils s''étaient fait des pierres levées et des poteaux cultuels (des ashéras) sur toute colline élevée et sous tout arbre verdoyant. '
  '11':
  - type: note
    content: 'exilées  : bien qu''aucun récit de la conquête israélite ne mentionne de condamnation à l''exil à l''encontre des Cananéens, le texte biblique reprend à dessein le verbe employé pour Israël au v. 6.'
  - type: text
    content: 'Et là ils avaient offert de l''encens dans tous les hauts lieux, comme les nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait exilées devant eux. Ils avaient contrarié le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en faisant des choses mauvaises. '
  '12':
  - type: text
    content: 'Ils avaient servi les idoles au sujet desquelles le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur avait dit : « Vous ne ferez pas cela. » '
  '13':
  - type: note
    content: 'tous ses prophètes…  : selon LXX. Le texte hébreu se partage entre deux traditions de lecture différentes  : de tous les prophètes de tout visionnaire ou de tout son prophète, tout visionnaire ( ?). –  instituée  : cf. v. 15,34 ; le même terme hébreu est aussi traduit par ordonner ou donner un ordre (v. 35 ; 18.12) ; cf. Dt 4.2n. –  je vous ai envoyée  : LXX et Syr ont lu je leur ai envoyée.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait averti Israël et Juda par l''intermédiaire de tous ses prophètes, de tous les visionnaires ; il leur avait dit : Revenez de vos voies mauvaises et observez mes commandements et mes prescriptions, en suivant toute la loi que j''ai instituée pour vos pères et que je vous ai envoyée par l''intermédiaire de mes serviteurs, les prophètes. '
  '14':
  - type: text
    content: 'Mais ils n''avaient pas écouté ; ils s''étaient montrés aussi rétifs que leurs pères, qui n''avaient pas mis leur foi dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu. '
  '15':
  - type: note
    content: 'prescriptions  : voir loi. – Voir alliance. –  ils s''étaient rendus futiles. Ils avaient suivi les nations  : litt. ils s''étaient rendus futiles après les nations. Le mot hébreu traduit par futile et qui a donné le nom Abel signifie à l''origine souffle, vent  ; il peut évoquer ce qui est passager ou ce qui a peu d''importance, cf. Ec 1.2n.'
  - type: text
    content: 'Ils avaient rejeté ses prescriptions, l''alliance qu''il avait conclue avec leurs pères et les préceptes qu''il avait institués pour eux. Ils avaient suivi la futilité et ils s''étaient rendus futiles. Ils avaient suivi les nations qui les entouraient et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur avait défendu d''imiter. '
  '16':
  - type: note
    content: 'tous les commandements  : LXX les commandements. –  deux taurillons de métal fondu  : litt. une image fondue de deux taurillons, allusion à 1R 12.28-30. – Voir Baal.'
  - type: text
    content: 'Ils avaient abandonné tous les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, ils s''étaient fait deux taurillons de métal fondu, ils avaient fait un poteau cultuel (une ashéra), ils s''étaient prosternés devant toute l''armée du ciel et ils avaient servi le Baal. '
  '17':
  - type: note
    content: 'ils s''étaient livrés à la magie  : cf. Dt 18.10ss. –  s''étaient vendus  : cf. 1R 21.20,25. –  ce qui lui déplaisait  : cf. v. 2+.'
  - type: text
    content: 'Ils avaient fait passer par le feu leurs fils et leurs filles, ils s''étaient livrés à la magie, ils avaient pratiqué la divination, ils s''étaient vendus en contrariant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en faisant ce qui lui déplaisait. '
  '18':
  - type: note
    content: 'de sa vue  : litt. de sa face.'
  - type: text
    content: 'Aussi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en grande colère contre Israël, les a-t-il écartés de sa vue. Il n''est resté que la seule tribu de Juda ; '
  '19':
  - type: note
    content: 'son Dieu  : litt. leur Dieu  ; le pluriel renvoie sans doute à Juda, comme terme collectif (= les Judéens). Certains pensent cependant qu''il renvoie à Juda et à Israël. –  qu''Israël avait mises en pratique  : autre traduction selon lesquelles Israël avait agi  ; cf. v. 8n.'
  - type: text
    content: 'et même Juda n''a pas observé les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. Ils ont suivi les prescriptions qu''Israël avait mises en pratique. '
  '2':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. v. 17 ; 3.2n.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', non pas toutefois comme les rois d''Israël qui l''avaient précédé. '
  '20':
  - type: note
    content: 'la descendance  : cf. Gn 3.15n. –  et il a fini par les chasser loin de lui  : litt. jusqu''à ce qu''il les jetât de devant lui.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a rejeté toute la descendance d''Israël ; il les a affligés, il les a livrés aux pillards et il a fini par les chasser loin de lui. '
  '21':
  - type: note
    content: 'Lorsqu''il avait…  : autre traduction car il avait… –  arraché  : le verbe hébreu évoque le fait de déchirer un vêtement ou un livre comme en Jr 36.23. –  Jéroboam  : cf. 1R 11.26 ; 12.12. –  détournés  : une lecture traditionnelle, avec plusieurs mss hébreux, LXX, Syr et Tg, voit ici un verbe signifiant habituellement disperser.'
  - type: text
    content: 'Lorsqu''il avait arraché Israël à la maison de David, ils avaient investi de la royauté Jéroboam, fils de Nabath ; or Jéroboam les avait détournés du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et avait fait commettre à Israël un grand péché. '
  '22':
  - type: text
    content: 'Les Israélites ont suivi tous les péchés que Jéroboam avait commis ; ils ne s''en sont pas écartés, '
  '23':
  - type: note
    content: 'par l''intermédiaire  : litt. par la main. –  sa terre  : litt. son sol, cf. Gn 2.5n.'
  - type: text
    content: 'jusqu''à ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' écarte Israël de sa vue, comme il l''avait annoncé par l''intermédiaire de tous ses serviteurs, les prophètes. Israël a été exilé loin de sa terre, en Assyrie, jusqu''à ce jour.'
  - type: heading
    content: Les « Samaritains »
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Sur la politique assyrienne de déplacement des populations, voir « Exils successifs à partir du VIIIe siècle av. J.-C. »♦ ; « L''Assyrie et les Assyriens »♦. Les sources assyriennes semblent témoigner de l''implantation de tribus arabes sur le territoire de Samarie. –  Kouta ou Kouth (v. 30), en akkadien Koutou ou Kouté , à 30 km au nord-est de Babylone. La ville fut mise à sac en 703 par l''Assyrien Sennachérib qui en exila les habitants. –  Avva  : plusieurs localisations ont été proposées pour cette ville : Olmm entre Antioche et Alep, Tell Kafr Aya au sud-ouest de Homs, sur l''Oronte, ou encore Ama, au pays d''Elam ; cf. 18.34. –  Hamath  : identifié avec la ville de Hama en Syrie sur le fleuve Oronte, à 190 km au nord de Damas, cf. 14.25. D''autres évoquent une ville d''A-ma-ti, dans l''est de la Mésopotamie. –  Sepharvaïm  : cf. 18.34 ; 19.13 ; Es 36.19 ; 37.13 identifié avec une ville appelée Shoubria dans les textes assyriens. Il pourrait s''agir d''une région située en Anatolie, à l''ouest du lac de Van. –  Samarie  : par-delà la ville, ce nom désigne ici l''ensemble de l''ancien territoire du royaume du Nord.'
  - type: text
    content: 'Le roi d''Assyrie fit venir des gens de Babylone, de Kouta, d''Avva, de Hamath et de Sepharvaïm. Il les fit habiter dans les villes de Samarie à la place des Israélites. Ils prirent possession de Samarie et habitèrent dans ses villes. '
  '25':
  - type: note
    content: 'Voir crainte. –  les lions…  : cf. Dt 7.22.'
  - type: text
    content: 'Lorsqu''ils commencèrent à y habiter, ils ne craignaient pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' envoya contre eux les lions, qui les tuaient. '
  '26':
  - type: note
    content: 'la règle  : autres traductions la coutume ; la religion  ; le terme correspondant est aussi traduit par droit ou jugement  ; cf. v. 33.'
  - type: text
    content: 'On dit au roi d''Assyrie : Les nations que tu as exilées et que tu as fait habiter dans les villes de Samarie ne connaissent pas la règle du dieu du pays ; il a envoyé contre elles les lions, qui les font mourir, parce qu''elles ne connaissent pas la règle du dieu du pays. '
  '27':
  - type: note
    content: 'un des prêtres que vous avez exilés de là-bas  : texte absent de LXX. –  qu''il aille y habiter  : avec certains mss de LXX, Syr et Vg. Le texte hébreu est au pluriel, litt. ils iront et habiteront là et enseigneront. –  règle  : cf. v. 26n.'
  - type: text
    content: 'Le roi d''Assyrie donna cet ordre : Faites aller là-bas l''un des prêtres que vous avez exilés de là-bas ; qu''il aille y habiter, et qu''il leur enseigne la règle du dieu du pays. '
  '28':
  - type: text
    content: 'Un des prêtres qui avaient été exilés de Samarie vint habiter à Beth-El et leur enseigna comment ils devaient craindre le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'la maison (c.-à-d. le temple ) des hauts lieux  : certains mss de LXX, Syr et Vg portent le pluriel ( les maisons des hauts lieux ).'
  - type: text
    content: 'Mais chaque nation faisait ses propres dieux. Ils les placèrent dans la maison des hauts lieux qu''avaient bâtie les Samaritains, dans les villes où chacune des nations habitait. '
  '3':
  - type: note
    content: 'Salmanasar (akkadien Shoulmanou-ashered) V (726-722 av. J.-C.), fils de Tiglath-Piléser III. –  partit l''attaquer  : litt. monta contre lui. –  lui fut soumis  : litt. fut son serviteur ou son esclave.'
  - type: text
    content: 'Salmanasar, roi d''Assyrie, partit l''attaquer ; et Osée lui fut soumis et lui paya un tribut. '
  '30':
  - type: note
    content: 'Soukkoth-Benoth (Des Cabanes de filles) : selon certains, cette expression renverrait au culte des déesses Sag-Kouth (cf. Am 5.26n) et Ishtar qualifiée de Banitou, c.-à-d. créatrice. D''autres préconisent l''identification avec la déesse Sarpanitou ou Zer-Banitou, épouse de Mardouk, dans le panthéon babylonien. –  Nergal  : dieu des enfers de la mythologie babylonienne mais connu également en Syrie comme en Egypte. –  Ashima  : correspondrait au dieu Eshmoun des Phéniciens. Le culte d''Ashima est attesté par des inscriptions achéménides, ainsi que dans la colonie juive d''Eléphantine en Egypte où Ashima de Beth-El est adoré aux côtés de YHWH, cf. Am 8.14.'
  - type: text
    content: 'Les gens de Babylone firent Soukkoth-Benoth, les gens de Kouth firent Nergal, les gens de Hamath firent Ashima, '
  '31':
  - type: note
    content: 'Nibhaz  : certains mss hébreux portent Nibhân  ; LXX Eblazer. Ce dieu demeure inconnu malgré différentes hypothèses proposées (Nabou, dieu des scribes, souvent invoqué par la formule Nabou ahiz, Nabou, maître de…  ; Ibnahaza ; ou encore le mot hébreu mizbéah, signifiant autel). –  Tartaq  : litt. le Tartaq, identifié parfois avec la déesse Astarté. –  Adrammélek  : peut-être une déformation de « Hadad du roi » ou « Hadad roi », Hadad étant l''équivalent de Baal. –  Anammélek  : peut être interprété comme « Anat-du-roi », Anat étant, selon des textes du IIe millénaire retrouvés à Ougarit, l''épouse de Baal. –  dieux de Sepharvaïm  : selon une autre lecture traditionnelle, on pourrait aussi comprendre déesse de Sepharvaïm.'
  - type: text
    content: 'les Avvites firent Nibhaz et Tartaq ; les Sepharvaïtes jetaient au feu leurs fils pour Adrammélek et Anammélek, dieux de Sepharvaïm. '
  '32':
  - type: note
    content: 'n''importe qui parmi eux  : même expression en Jg 18.2 (de chez eux) ; cf. 1R 12.31n. –  les maisons  : cf. v. 29n.'
  - type: text
    content: 'Comme ils craignaient aussi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ils nommèrent n''importe qui parmi eux comme prêtres des hauts lieux : ces prêtres officiaient pour eux dans les maisons des hauts lieux. '
  '33':
  - type: note
    content: 'règle  : cf. v. 26ns.'
  - type: text
    content: 'Ainsi ils craignaient le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), mais ils servaient aussi leurs propres dieux, selon la règle des nations d''où on les avait exilés.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: V. 13+. – Voir loi.
  - type: text
    content: 'Jusqu''à ce jour ils agissent selon ces anciennes règles. Ils ne craignent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils n''agissent ni selon leurs propres prescriptions et leur propre règle, ni selon la loi et le commandement que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a institués pour les fils de Jacob, celui qui, là-bas, est nommé Israël. '
  '35':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait conclu une alliance avec eux et leur avait donné cet ordre : Vous ne craindrez pas d''autres dieux ; vous ne vous prosternerez pas devant eux, vous ne les servirez pas et vous ne leur offrirez pas de sacrifices. '
  '36':
  - type: text
    content: 'Mais c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) que vous craindrez, lui qui vous a fait monter d''Egypte par une grande puissance, le bras étendu ; c''est devant lui que vous vous prosternerez et c''est à lui que vous offrirez des sacrifices. '
  '37':
  - type: note
    content: 'toujours  : litt. tous les jours.'
  - type: text
    content: 'Vous veillerez à mettre toujours en pratique les prescriptions, les règles, la loi et le commandement qu''il a écrits pour vous, et vous ne craindrez pas d''autres dieux. '
  '38':
  - type: note
    content: 'j''ai conclue  : LXX, Vg il a conclue.'
  - type: text
    content: 'Vous n''oublierez pas l''alliance que j''ai conclue avec vous, et vous ne craindrez pas d''autres dieux. '
  '39':
  - type: text
    content: 'Mais c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, que vous craindrez ; c''est lui qui vous délivrera de la main de tous vos ennemis. '
  '4':
  - type: note
    content: 'So  : selon les mss (hébreux ou grecs), le nom de ce pharaon est transcrit Sy, Segor, Soba. Certains mss de LXX mentionnent Adramélek, l''Ethiopien (ou le Nubien). Certains ont vu dans ce nom une référence à la ville égyptienne de Saïs, dont le prince Tefnakht tente de résister au roi nubien Piankhi, maître de la Haute-Egypte. –  enfermer  : autre traduction arrêter.'
  - type: text
    content: 'Mais le roi d''Assyrie découvrit une conspiration chez Osée, qui avait envoyé des messagers à So, roi d''Egypte, et qui ne faisait plus monter annuellement le tribut au roi d''Assyrie. Le roi d''Assyrie le fit enfermer et enchaîner dans une maison de détention. '
  '40':
  - type: text
    content: Ils n'ont pas écouté ; ils agissent selon leur ancienne règle.
  '41':
  - type: text
    content: 'Ces nations craignaient le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et servaient leurs statues. Leurs fils et les fils de leurs fils agissent jusqu''à ce jour comme leurs pères ont agi.'
  '5':
  - type: note
    content: La place de ces v. repris en 18.9-11 laisse entendre qu'Osée aurait été arrêté avant que Salmanasar ne se mette en campagne contre Samarie. Il se peut aussi que v. 5s décrivent plus en détails les opérations militaires dont le dénouement est déjà annoncé au v. 4.
  - type: text
    content: 'Puis le roi d''Assyrie envahit tout le pays ; il arriva devant Samarie, qu''il assiégea pendant trois ans. '
  '6':
  - type: note
    content: 'La prise de Samarie par Salmanasar V est évoquée dans une chronique babylonienne. –  Halah  : peut-être Tell Abbasiya, au nord-est de Ninive, près de Khorsabad. –  le Habor  : principal affluent sur la rive gauche de l''Euphrate. –  la rivière  : le terme correspondant est habituellement traduit par fleuve. –  Gozân  : probablement Tell Halaf où ont été retrouvés des documents attestant la présence des exilés de Samarie. –  les villes des Mèdes  : LXX a lu ici un nom propre Oré des Mèdes. Les textes assyriens chiffrent à 27 290 le nombre de personnes exilées de Samarie par Sargon II (721-705 av. J.-C.), successeur de Salmanasar V.'
  - type: text
    content: La neuvième année d'Osée, le roi d'Assyrie prit Samarie et exila Israël en Assyrie. Il les fit habiter à Halah et sur le Habor, la rivière de Gozân, ainsi que dans les villes des Mèdes.
  - type: heading
    content: Les causes de la ruine du royaume d'Israël
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'A partir d''ici la théologie de l''histoire qui sous-tend l''ensemble des livres des Rois devient explicite : la chute de Samarie est la conséquence de l''infidélité du royaume du Nord à la loi de YHWH, telle qu''elle est formulée en particulier dans le Deutéronome (voir l''introduction♦). –  Cela  : certains mss de LXX précisent la colère de Dieu contre Israël . – Voir péché. –  monter d''Egypte Gn 12.10n. –  et les avait libérés…  : litt. de sous la main de Pharaon . – Voir crainte.'
  - type: text
    content: 'Cela arriva parce que les Israélites avaient péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu, qui les avait fait monter d''Egypte et les avait libérés de la main du pharaon, le roi d''Egypte, et parce qu''ils avaient craint d''autres dieux. '
  '8':
  - type: note
    content: 'voilà ce qu''avaient fait…  : traduction incertaine ; litt. et les rois d''Israël qui ont fait (ou ce qu''ils ont fait  ; même formule au v. 19, pour [les prescriptions qu''Israël] avait mises en pratique). La portion de texte correspondante est omise par Syr, et la précision et les rois d''Israël par d''autres témoins du texte, dont un ms hébreu. Certains comprennent ils avaient suivi les prescriptions des nations… à l''initiative des rois d''Israël (cf. 16.3).'
  - type: text
    content: 'Ils avaient suivi les prescriptions des nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dépossédées devant les Israélites ; voilà ce qu''avaient fait les rois d''Israël. '
  '9':
  - type: note
    content: 'fait en secret… des choses  : autres traductions inventé… des paroles ; dit… des paroles (Tg) ; vêtu ( ?) … des paroles (LXX). –  qu''on ne doit pas faire  : litt. qui ne sont pas ainsi.'
  - type: text
    content: 'Les Israélites avaient fait en secret contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, des choses qu''on ne doit pas faire. Ils s''étaient bâti des hauts lieux dans toutes leurs villes, depuis les tours des gardes jusqu''aux villes fortes. '
