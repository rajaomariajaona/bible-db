        text: '  : texte absent de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il aille y habiter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : avec certains mss de LXX, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: '. Le texte hébreu est au pluriel, litt. '
    - type: usfm
      marker: fqa
      children:
