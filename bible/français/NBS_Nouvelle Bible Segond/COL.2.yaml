document_id: COL.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Je veux… 1Co 11.3 ; voir aussi Rm 1.13+. –  combat 1.29+. –  pour vous 1.24+. –  Laodicée  : ville située à une trentaine de kilomètres de Colosses, cf. 4.13-16 ; Ap 1.11 ; 3.14-22. –  qui ne m''ont jamais vu  : litt. qui n''ont pas vu ma face en chair.'
  - type: text
    content: 'Je veux, en effet, que vous sachiez quel grand combat je soutiens pour vous, pour ceux de Laodicée et pour tous ceux qui ne m''ont jamais vu, '
  '10':
  - type: note
    content: 'comblés  : litt. remplis  ; c''est le verbe d''où vient le mot traduit par plénitude au v. 9 ; cf. Rm 15.13 ; Ph 1.10s ; 4.19 ; voir aussi Jn 1.16 ; Ep 1.23 ; 3.19 ; 5.18n. –  la tête ou le chef, cf. 1.18+ ; Ep 4.15+. –  principat / autorité v. 15 ; 1.16+.'
  - type: text
    content: et vous êtes comblés en lui, qui est la tête de tout principat et de toute autorité.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'circoncis… Rm 2.25-29+ ; cf. Ep 2.11 ; Ph 3.3. –  pas faite par des mains humaines  : cf. Mc 14.58 ; 2Co 5.1. –  dépouillement v. 15 ; 3.9. –  corps de la chair  : cf. 1.22n  ; Rm 6.6.'
  - type: text
    content: 'En lui vous avez aussi été circoncis d''une circoncision qui n''est pas faite par des mains humaines : par le dépouillement du corps de la chair, par la circoncision du Christ. '
  '12':
  - type: note
    content: 'le baptême  : certains mss emploient ici le mot couramment transcrit baptême  ; d''autres, un terme apparenté, mais plus général et plus rare dans le N.T., qui signifie bain rituel ou ablution (Hé 6.2n) ; cf. Rm 6.4ss ; voir aussi 1P 3.21. –  réveillés (ou relevés) ensemble en lui  : autre traduction réveillés / relevés en lui et avec lui (voir résurrection) ; cf. 3.1ss ; Ep 2.6 ; voir aussi 2Tm 2.18. –  par la foi de (ou relative à, cf. Rm 3.22n) l''action (ou l''opération, Col 1.29n) … Ep 1.19s ; cf. Rm 8.11 ; 1Co 6.14 ; Ph 3.10s.'
  - type: text
    content: 'Ensevelis avec lui par le baptême, vous vous êtes aussi réveillés ensemble en lui, par la foi de l''action de Dieu qui l''a réveillé d''entre les morts. '
  '13':
  - type: note
    content: 'Cf. 1.21 ; Rm 5.12ss ; Ep 2.1-5. –  fautes  : voir péché. –  vous a rendus vivants… ou, selon certains mss, nous a rendus vivants Ep 2.5n. –  en nous faisant grâce 3.13 ; Rm 8.32n.'
  - type: text
    content: 'Vous qui étiez morts du fait de vos fautes et par l''incirconcision de votre chair, il vous a rendus vivants avec lui, en nous faisant grâce pour toutes nos fautes ; '
  '14':
  - type: note
    content: 'effacé  : cf. Es 43.25 ; Ac 3.19. –  l''acte  : en Tobit 5.3 et 9.5 le même terme grec désigne une reconnaissance de dette, signée de la main du débiteur ; cf. Phm 18s ; voir aussi Ps 139.16 ; Ap 20.12. La traduction de la phrase est incertaine ; on pourrait aussi comprendre l''acte… qui nous était contraire à cause des prescriptions légales ou, à la rigueur, l''acte… dont les dispositions légales nous étaient contraires  ; sur ces prescriptions légales, cf. v. 20 (terme apparenté) ; Ep 2.14-15n  ; voir aussi loi. –  enlevé ou supprimé, litt. enlevé (Jn 1.29n) du milieu, expressions analogues en Mt 13.49 ; 1Co 5.2 ; 2Th 2.7n. –  en le clouant…  : cf. Mc 15.26/ / ; 2Co 5.21 ; Ga 3.13 ; voir aussi Rm 7.4 ; 1P 2.24.'
  - type: text
    content: 'il a effacé l''acte rédigé contre nous en vertu des prescriptions légales, acte qui nous était contraire ; il l''a enlevé en le clouant à la croix ; '
  '15':
  - type: note
    content: 'il a dépouillé…  : autre traduction possible il s''est dépouillé (comme en 3.9 ; cf. 2.11+) des autorités…, 1.16+ ; cf. 1Co 15.24 ; Ep 1.21+ ; Ap 12.7s. –  publiquement  : dans d''autres contextes, le terme grec correspondant évoque aussi l’assurance apostolique, cf. Ac 2.29n. –  en les entraînant…  : autre traduction en triomphant d''eux (cf. 2Co 2.14n) en lui-même  ; certains pensent que l''expression correspondant à en lui-même se réfère à la croix du v. 14 (terme masculin en grec) et traduisent en triomphant d''eux par la croix ou en les entraînant dans le triomphe de sa croix.'
  - type: text
    content: il a dépouillé les principats et les autorités, et il les a publiquement livrés en spectacle, en les entraînant dans son triomphe.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Rm 14.1-12,17. –  fête / nouvelle lune / sabbat Ez 45.17 ; Os 2.13 ; 1Ch 23.31 ; 2Ch 2.3 ; 31.3 ; Ga 4.10 ; voir aussi calendrier et fêtes.
  - type: text
    content: 'Dès lors, que personne ne vous juge à propos de ce que vous mangez ou buvez, pour une question de fête, de nouvelle lune ou de sabbat : '
  '17':
  - type: note
    content: 'la réalité…  : litt. le corps est (celui) du Christ  ; le mot grec correspondant à corps (v. 9n  ; 1.18+) est couramment utilisé, dans les courants philosophiques héritiers de l''idéalisme platonicien, et en particulier chez Philon d''Alexandrie, pour désigner la réalité opposée à l''apparence (= l’ombre) ; cf. Hé 10.1n où le mot traduit par image joue un rôle comparable.'
  - type: text
    content: 'tout cela n''est qu''une ombre de ce qui est à venir, mais la réalité, c''est le corps du Christ. '
  '18':
  - type: note
    content: 'Traduction difficile, litt. que personne ne vous frustre… (toute la suite étant au singulier dans le texte). –  frustrer  : le verbe grec correspondant suggère, par son étymologie, l''attribution injuste d''un prix ou une disqualification abusive ; autre traduction condamner. –  humilité  : cf. 3.12 ; le terme a probablement ici le sens de dévotion, voire de mortification. –  culte v. 23. –  au gré de leurs visions  : litt. ce qu''il a vu en entrant (dans le sanctuaire ?)  ; la formulation rappelle peut-être une expression consacrée dans les cultes à mystères qui, depuis l''Orient, s''étaient répandus dans tout l''Empire romain ; son emploi ici pourrait évoquer la participation au culte que les anges rendent à Dieu, dans le cadre d''une vision apocalyptique ; certains mss ajoutent une négation  : se fiant à ce qu''il n''a pas vu. –  gonflés de vanité  : litt. gonflé pour rien, cf. 1Co 4.6n  ; 5.2 ; 8.1. –  la pensée de leur chair  : cf. Rm 1.28+ ; 8.7.'
  - type: text
    content: 'Ne vous laissez pas frustrer par les gens qui se complaisent dans « l''humilité » et le « culte des anges » au gré de leurs visions ; ils sont gonflés de vanité par la pensée de leur chair, '
  '19':
  - type: note
    content: 's''attachent  : même verbe en Mc 7.3 (tenir à) ; Ap 2.13 (retenir), 14 (maintenir). –  à la tête ou au chef 1.18+ ; cf. Ep 4.15s. –  bien uni…  : litt. desservi et bien uni grâce aux jointures et aux articulations  ; cf. v. 2n. –  croissance Ep 2.21n  ; cf. Jn 3.30 ; Ac 6.7.'
  - type: text
    content: et ils ne s'attachent pas à la tête par laquelle tout le corps, bien uni grâce aux jointures et aux articulations qui le desservent, grandit d'une croissance qui vient de Dieu.
  - type: heading
    content: Morts et ressuscités avec le Christ
  '2':
  - type: note
    content: 'qu''ils soient encouragés  : litt. que leurs cœurs soient encouragés ou consolés, réconfortés  ; cf. 4.8n  ; Ep 6.22n. –  bien unis  : même verbe v. 19 ; autre traduction possible ici  : instruits (1Co 2.16). –  pleine conviction 1Th 1.5n  ; le terme grec est apparenté au mot traduit par plénitude (v. 9 ; 1.19) ; cf. v. 3. –  connaître 1.9n. –  le mystère de Dieu, le Christ 1.26s ; cf. 4.3 ; Ep 3.3ss,18s.'
  - type: text
    content: 'afin qu''ils soient encouragés, qu''ils soient bien unis dans l''amour et riches d''une pleine conviction de l''intelligence, pour connaître le mystère de Dieu, le Christ, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'morts avec le Christ v. 12 ; Rm 6.2 ; cf. 7.6 ; Ga 2.19. –  éléments… v. 8n. –  si vous viviez dans le monde ou si votre vie dépendait du monde . –  vous replacez-vous…  : autre traduction vous laissez-vous imposer des prescriptions légales , cf. v. 14n  ; voir aussi loi.'
  - type: text
    content: 'Si vous êtes morts avec le Christ aux éléments du monde, pourquoi, comme si vous viviez dans le monde, vous replacez-vous sous des prescriptions légales : '
  '21':
  - type: note
    content: Cf. 1Co 7.1 ; 10.23 ; 2Co 6.17 ; 1Tm 4.3.
  - type: text
    content: '« Ne prends pas, ne goûte pas, ne touche pas… » '
  '22':
  - type: note
    content: 'toutes choses…  : celles sur lesquelles portent les interdits du v. 21. –  destinées à périr…  : autre traduction qui mènent à la perdition…  ; cf. Ac 8.20 ; 2P 2.12 ; voir aussi Ga 6.8. –  enseignements humains v. 8 ; Es 29.13 ; Mt 15.9/ /.'
  - type: text
    content: 'toutes choses destinées à périr par l''usage qu''on en fait ! Il s''agit de commandements et d''enseignements humains '
  '23':
  - type: note
    content: 'Texte difficile ; cf. v. 18n. –  une apparence  : litt. une parole. –  sagesse  : cf. 1.9+. –  culte volontaire ou arbitraire  ; le terme grec est apparenté à la fois au mot traduit par culte et au verbe rendu par se complaire au v. 18. –  qui n''ont en fait…  : autre traduction qui n''ont aucune valeur face à la satisfaction (le terme peut rappeler celui qui a été traduit par plénitude en 1.19+) de la chair  ; cf. Rm 13.14.'
  - type: text
    content: qui ont, il est vrai, une apparence de sagesse – culte volontaire, humilité et rigueur pour le corps – mais qui n'ont en fait aucune valeur et ne contribuent qu'à la satisfaction de la chair.
  '3':
  - type: note
    content: 'Cf. Es 45.3 ; Pr 2.3-6 ; 8.1ss ; Rm 11.33 ; 1Co 1.24,30 ; 1 Hénoch 46.3 : « C''est lui (le Fils d''homme) qui révélera tout le trésor des mystères. »'
  - type: text
    content: en qui sont cachés tous les trésors de la sagesse et de la connaissance.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 8 ; Rm 16.18+ ; 1Co 2.4 ; Ep 5.6.
  - type: text
    content: 'Je dis cela pour que personne ne vous abuse par de beaux discours. '
  '5':
  - type: note
    content: 'de corps  : litt. de chair  ; cf. 1Co 5.3 ; 1Th 2.17. –  en esprit  : autre traduction par l''Esprit. –  ordre / solidité  : cf. 1.23 ; Ac 16.5+ ; 1Co 14.40 ; 1P 5.9.'
  - type: text
    content: Car si je suis absent de corps, je suis avec vous en esprit, voyant avec joie le bon ordre qui règne parmi vous et la solidité de votre foi dans le Christ.
  - type: heading
    content: Vous avez tout pleinement dans le Christ
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'comme vous avez reçu 1Co 11.23 ; 15.1-3 ; Ga 1.9 ; 1Th 4.1 ; cf. Ep 4.20s. –  Jésus-Christ, le Seigneur ou Jésus-Christ comme Seigneur Rm 10.9+ ; 1Co 8.5s ; 12.3 ; 2Co 4.5 ; Ep 3.11 ; Ph 2.11. –  vivez (litt. marchez ) en (ou par ) lui  : cf. 1.10n  ; Ep 5.2.'
  - type: text
    content: 'Ainsi, comme vous avez reçu Jésus-Christ, le Seigneur, vivez en lui ; '
  '7':
  - type: note
    content: 'enracinez-vous et construisez-vous en lui (ou sur lui, comme sur des fondations) 1.23 ; 1Co 3.9nss ; Ep 2.20,22 ; 3.17. –  affermissez-vous Rm 1.16n  ; 1Co 1.8 ; Jd 20. –  à ce qui vous a été enseigné ou aux instructions qui vous ont été données 2Th 2.15. –  abondez…  : ou, d''après certains mss, progressez en elle (la foi) ou en lui (le Christ) avec actions de grâces (1.3+ ; 4.2).'
  - type: text
    content: enracinez-vous et construisez-vous en lui, affermissez-vous dans la foi, conformément à ce qui vous a été enseigné, et abondez en actions de grâces.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'd''une philosophie…  : litt. de la philosophie et d''une tromperie vide (ou creuse ) ; d''après le contexte, la philosophie en question consiste en un ensemble de spéculations sur l''ordre de l''univers et le salut de l''homme ; il s''agit donc d''une doctrine plus religieuse que strictement philosophique au sens moderne de ce mot ; cf. 2Tm 4.3. –  la tradition des humains  : cf. v. 22 ; Mc 7.3n,8/ /. –  les éléments du monde  : par-delà les éléments constitutifs du monde dans la philosophie classique (l''eau, la terre, le feu et l''air), cette expression (également au v. 20) vise peut-être les forces multiples qui régissaient l''univers selon les conceptions de l''époque ; ces forces étaient divinisées dans le paganisme et assimilées aux anges ou aux démons dans le judaïsme ; cf. v. 10 ; 1.16 ; voir aussi Ga 4.3,9 ; Hé 5.12 ; 2P 3.10n,12.'
  - type: text
    content: 'Prenez garde que personne ne fasse de vous sa proie au moyen d''une philosophie trompeuse et vide, selon la tradition des humains, selon les éléments du monde, et non pas selon le Christ. '
  '9':
  - type: note
    content: 'corporellement  : cf. v. 17n  ; 1.18+. –  plénitude 1.19n  ; cf. Jn 1.1,14,16.'
  - type: text
    content: 'Car c''est en lui qu''habite corporellement toute la plénitude de la divinité, '
