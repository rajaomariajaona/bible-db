document_id: NEH.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Liste des prêtres et des lévites
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.2ss ; 1Ch 24.7ss. –  qui montèrent , c.-à-d. qui revinrent d''exil, cf. 7.6 ; Esd 2.1. –  Zorobabel / Josué Esd 2.2n. –  Esdras  : à ne pas confondre avec Esdras le scribe, cf. v. 26,36 ; 8.9.'
  - type: text
    content: 'Voici les prêtres et les lévites qui montèrent avec Zorobabel, fils de Shéaltiel, et avec Josué : Seraya, Jérémie, Esdras, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Josué v. 1+. –  Joïaqim v. 12,26 ; un prêtre de ce nom est mentionné en Judith 4.6ss ; 15.8 et Baruch 1.7. –  Eliashib 3.1,20s ; 13.4,7,28 ; Esd 10.6.
  - type: text
    content: 'Josué engendra Joïaqim, Joïaqim engendra Eliashib, Eliashib engendra Joïada, '
  '11':
  - type: note
    content: 'Jonathan  : certains modifient le texte hébreu traditionnel pour lire Yohanân, comme aux v. 22s ; voir Esd 10.6n  ; un grand prêtre Jonathan est cependant associé à Néhémie en 2 Maccabées 1.23. –  Yaddoua  : un prêtre de ce nom est connu au temps de Darius III (336-330), contemporain d''Alexandre le Grand (cf. v. 22n  ; voir aussi Esd 4.24n).'
  - type: text
    content: Joïada engendra Jonathan, et Jonathan engendra Yaddoua.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'quels étaient…  : LXX ses frères les prêtres…  ; cf. v. 1-7 ; 10.3ss.'
  - type: text
    content: 'Voici, aux jours de Joïaqim, quels étaient les prêtres, les chefs de famille : pour Seraya, Meraya ; pour Jérémie, Hanania ; '
  '13':
  - type: text
    content: 'pour Esdras, Meshoullam ; pour Amaria, Yohanân ; '
  '14':
  - type: note
    content: 'Melouki ou Melikou, selon deux lectures traditionnelles ; LXX Mallouk, comme au v. 2 ; les noms suivants, jusqu''au v. 21, sont absents d''un ms de LXX. –  Shebania  : cf. v. 3.'
  - type: text
    content: 'pour Melouki, Jonathan ; pour Shebania, Joseph ; '
  '15':
  - type: note
    content: Harim v. 3n.
  - type: text
    content: 'pour Harim, Adna ; pour Merayoth, Helqaï ; '
  '16':
  - type: note
    content: 'Guinnetôn  : cf. v. 4+.'
  - type: text
    content: 'pour Iddo, Zacharie ; pour Guinnetôn, Meshoullam ; '
  '17':
  - type: note
    content: 'pour Minyamîn…  : litt. pour Minyamîn, pour Moadia  ; il se pourrait qu''un nom se soit perdu accidentellement entre les deux ; cf. v. 5.'
  - type: text
    content: 'pour Abiya, Zikri ; pour Minyamîn et Moadia, Pilthaï ; '
  '18':
  - type: text
    content: 'pour Bilga, Shammoua ; pour Shemaya, Jonathan ; '
  '19':
  - type: text
    content: 'pour Yoyarib, Matnaï ; pour Yedaya, Ouzzi ; '
  '2':
  - type: note
    content: 'Hattoush  : ce nom est absent d''un grand ms de LXX.'
  - type: text
    content: 'Amaria, Mallouk, Hattoush, '
  '20':
  - type: note
    content: 'Sallaï  : cf. v. 7.'
  - type: text
    content: 'pour Sallaï, Qallaï ; pour Amoq, Eber ; '
  '21':
  - type: text
    content: pour Hilqiya, Hashabia ; pour Yedaya, Netanéel.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine ; dans le texte hébreu les lévites est isolé en début de verset, sans que sa fonction dans la phrase soit très claire (cf. v. 23) ; voir aussi v. 10s. Certains suppriment la mention des lévites et comprennent Aux jours d''Eliashib… les chefs de famille des prêtres furent inscrits… –  les lévites  : cf. 7.43 ; Esd 8.18s. –  sous le règne de Darius  : texte incertain, que quelques-uns modifient pour lire depuis le règne de Darius (cf. v. 23) ou jusqu''au règne de Darius (dans ce cas, peut-être Darius II [423-404] ou plus probablement Darius III, v. 11n). –  le Perse  : cf. Dn 6.1n  ; 6.29 ; 9.1 ; 11.1.'
  - type: text
    content: Aux jours d'Eliashib, de Joïada, de Yohanân et de Yaddoua, les lévites furent inscrits comme chefs de famille – et les prêtres sous le règne de Darius, le Perse.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'chroniques  : il s''agit de toute évidence d''archives du temple et non des livres bibliques des Chroniques. –  Yohanân, fils d''Eliashib  : cf. v. 10s,22.'
  - type: text
    content: 'Les fils de Lévi, chefs de famille, furent inscrits dans un livre de chroniques jusqu''aux jours de Yohanân, fils d''Eliashib. '
  '24':
  - type: note
    content: 'Cf. v. 8s ; 11.15ss. –  Josué, fils de Qadmiel  : certains modifient légèrement le texte hébreu traditionnel pour lire Josué, Binnouï, Qadmiel, cf. v. 8 ; 10.10 ; Esd 2.40. –  groupe par groupe  : autre traduction chaque groupe alternant avec un autre  ; la même expression apparaît en 1Ch 26.16n, dans un contexte différent ; cf. 1Ch 25. –  David, l''homme de Dieu v. 36 ; voir aussi v. 45s.'
  - type: text
    content: 'Les chefs des lévites : Hashabia, Shérébia et Josué, fils de Qadmiel, et leurs frères en face d''eux, pour louer et célébrer groupe par groupe, selon le commandement de David, l''homme de Dieu. '
  '25':
  - type: note
    content: Les noms propres de ce v. sont absents d'un grand ms de LXX.
  - type: text
    content: 'Mattania, Baqbouqia, Abdias, Meshoullam, Talmôn et Aqqoub, portiers, de garde au seuil des portes. '
  '26':
  - type: note
    content: Néhémie… 8.9n.
  - type: text
    content: Ceux-là vivaient aux jours de Joïaqim, fils de Josué, fils de Yotsadaq, aux jours de Néhémie, le gouverneur, et d'Esdras, le prêtre-scribe.
  - type: heading
    content: Inauguration de la muraille rebâtie
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'dédicace de la muraille  : cf. 6.15. –  lévites  : cf. 11.36 ; Esd 3.10+ ; 6.16 ; 1Ch 15.4 ; 2Ch 5.4ss ; 29.25ss. –  de tous les lieux… 7.72 ; cf. 2Ch 11.14 ; 23.2. –  dans la joie  : litt. et la joie . –  louanges  : le terme hébreu, souvent traduit par reconnaissance , aura le sens concret de chœur(s) à partir du v. 31n  ; Ps 26.7n  ; 95.2+. –  cymbales…  : cf. 1Ch 15.16 ; 25.6 ; 2Ch 29.25.'
  - type: text
    content: 'Lors de la dédicace de la muraille de Jérusalem, on alla chercher les lévites de tous les lieux qu''ils habitaient pour les faire venir à Jérusalem, afin de célébrer la dédicace dans la joie par des louanges et par des chants, au son des cymbales, des luths et des lyres. '
  '28':
  - type: note
    content: 'Les chantres  : litt. les fils des chantres, c.-à-d. ceux qui appartenaient à la corporation des chantres ; d''après certains mss de LXX, quelques-uns modifient le texte hébreu traditionnel pour lire les chantres lévites. –  District 3.22n. –  des villages…  : au lieu des noms propres qui suivent (v. 29) certains mss de LXX ont lu seulement des villages et des campagnes. –  Netophatites (de Netopha, au sud-est de Beth-Léhem) 7.26 ; 1Ch 9.16.'
  - type: text
    content: 'Les chantres se rassemblèrent du District des alentours de Jérusalem, des villages des Netophatites, '
  '29':
  - type: note
    content: 'Beth-Guilgal ou maison du Guilgal, probablement ici au nord de Beth-El plutôt que près de Jéricho ; cf. Dt 11.30n  ; Jos 4.19 ; 2R 2.1 ; 4.38. –  du pays  : autres traductions des campagnes, des champs. –  Guéba / Azmaveth, au nord-est de Jérusalem, cf. 7.28 ; Jos 21.17.'
  - type: text
    content: 'de Beth-Guilgal et du pays de Guéba et d''Azmaveth ; car les chantres s''étaient bâti des villages aux alentours de Jérusalem. '
  '3':
  - type: note
    content: 'Shekania 3.29 ; cf. v. 14. –  Rehoum…  : certains modifient le texte hébreu traditionnel pour lire Harim (v. 15 ; 10.6). LXX omet ce nom et tous ceux qui suivent (jusqu''au v. 7).'
  - type: text
    content: 'Shekania, Rehoum, Merémoth, '
  '30':
  - type: note
    content: 'se purifièrent  : cf. 13.22 ; Gn 35.2s ; Nb 8.21s ; Ml 3.3 ; Esd 6.20 ; 1Ch 15.14 ; 2Ch 29.15 ; 35.6 ; voir aussi Ex 19.10,14 ; Nb 8.5ss ; 19.12,19 ; Ez 36.25. –  les portes…  : cf. 2Ch 29.15ss ; voir aussi Lv 14.48ss ; Ez 43.26.'
  - type: text
    content: Les prêtres et les lévites se purifièrent et ils purifièrent le peuple, les portes et la muraille.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'et je formai…  : la fin du v. est omise par un ms de LXX. –  chœurs  : le même mot est traduit par louange au v. 27n  ; cf. v. 38,40 ; voir aussi Ps 48 ; 147. –  Le premier se mit en marche  : texte obscur ; la traduction, qui s''inspire du v. 38, suppose une légère modification du texte hébreu. –  du côté droit  : probablement vers le sud, selon les principes d''orientation habituels. –  porte du Fumier 2.13n.'
  - type: text
    content: 'Je fis monter sur la muraille les chefs de Juda et je formai deux grands chœurs. Le premier se mit en marche du côté droit sur la muraille, vers la porte du Fumier. '
  '32':
  - type: text
    content: 'Derrière eux marchaient Osée et la moitié des chefs de Juda, '
  '33':
  - type: text
    content: 'Azaria, Esdras, Meshoullam, '
  '34':
  - type: note
    content: 'Benjamin  : d''après certains mss de LXX on modifie quelquefois le texte hébreu traditionnel pour lire Miyamîn ou Minyamîn.'
  - type: text
    content: 'Juda, Benjamin, Shemaya et Jérémie, '
  '35':
  - type: note
    content: des fils de prêtres, c.-à-d. des prêtres, précision qu'il faut peut-être associer aux noms qui précèdent (v. 33s) quoique le texte hébreu traditionnel porte et des fils de prêtres.
  - type: text
    content: 'des fils de prêtres avec des trompettes, Zacharie, fils de Jonathan, fils de Shemaya, fils de Mattania, fils de Michée, fils de Zakkour, fils d''Asaph, '
  '36':
  - type: note
    content: 'Milalaï… Hanani  : segment omis par LXX. –  instruments… de David Am 6.5 ; 1Ch 23.5 ; 2Ch 29.26. –  homme de Dieu v. 24. –  Esdras…  : cf. 8.9. – Voir scribe.'
  - type: text
    content: 'et ses frères, Shemaya, Azaréel, Milalaï, Guilalaï, Maaï, Netanéel, Juda et Hanani, avec les instruments de musique de David, l''homme de Dieu. Esdras, le scribe, était à leur tête. '
  '37':
  - type: note
    content: 'porte de la Source 2.14n. –  porte des Eaux 3.26n. –  vers l''est  : texte omis par LXX jusqu''à la fin du v. 38.'
  - type: text
    content: 'A la porte de la Source, droit devant eux, ils montèrent les marches de la Ville de David par la montée de la muraille, au-dessus de la maison de David, jusqu''à la porte des Eaux, vers l''est. '
  '38':
  - type: note
    content: 'du côté gauche  : texte incertain (en avant, en face  ?), légèrement modifié en fonction du v. 31n. –  une moitié du peuple  : certains pensent que le texte portait primitivement une moitié des chefs du peuple, cf. v. 32. –  tour des Fours 3.11n. –  muraille épaisse 3.8n.'
  - type: text
    content: 'Le second chœur se mit en marche du côté gauche. J''étais derrière lui avec une moitié du peuple, sur la muraille. Par-dessus la tour des Fours, on alla jusqu''à la muraille épaisse ; '
  '39':
  - type: note
    content: 'porte d''Ephraïm 8.16n. –  Vieille porte (omise par un ms de LXX) 3.6n. –  porte des Poissons 3.3n. –  Hananéel / Méa / Petit bétail 3.1n. –  Et l''on s''arrêta  : texte omis par un ms de LXX jusqu''à Ezer v. 42. –  porte de la Garde  : autre traduction porte du quartier neuf, peut-être celle qui conduisait de la vieille ville à la Ville Neuve (cf. 3.31n).'
  - type: text
    content: 'puis au-dessus de la porte d''Ephraïm, de la Vieille porte, de la porte des Poissons, de la tour de Hananéel et de la tour de Méa, jusqu''à la porte du Petit bétail. Et l''on s''arrêta à la porte de la Garde. '
  '4':
  - type: note
    content: 'Guinnetoï  : plusieurs mss portent Guinnetôn, cf. 10.7 ; 12.16. –  Abiya v. 17 ; Lc 1.5.'
  - type: text
    content: 'Iddo, Guinnetoï, Abiya, '
  '40':
  - type: text
    content: 'Les deux chœurs s''arrêtèrent dans la maison de Dieu ; de même, moi, ceux des magistrats qui étaient avec moi, '
  '41':
  - type: text
    content: 'et les prêtres Eliaqim, Maaséya, Minyamîn, Michée, Elioénaï, Zacharie, Hanania, avec des trompettes, '
  '42':
  - type: note
    content: 'Yizrahia…  : précision omise par LXX.'
  - type: text
    content: et Maaséya, Shemaya, Eléazar, Ouzzi, Yohanân, Malkiya, Elam et Ezer. Les chantres se firent entendre – Yizrahia était leur inspecteur.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 8.62ss. –  un grand sujet de joie  : autre traduction une grande joie.'
  - type: text
    content: Les gens offrirent ce jour-là de nombreux sacrifices et se livrèrent aux réjouissances, car Dieu leur avait donné un grand sujet de joie. Les femmes et les enfants se réjouirent aussi, et on entendait de loin la joie de Jérusalem.
  - type: heading
    content: Les parts réservées aux prêtres et aux lévites
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'salles 13.4ss. –  qui servaient…  : autre traduction réservées aux trésors, aux prélèvements… 10.35ss. –  du territoire  : autre traduction des champs . –  étaient à leur poste  : litt. se tenaient debout (devant Dieu ou au service de Dieu), formule habituelle du service liturgique Dt 10.8 ; 2Ch 29.11.'
  - type: text
    content: 'En ce jour, on nomma des hommes ayant la surveillance des salles qui servaient de magasins pour les prélèvements, les prémices et les dîmes, et on les chargea d''y recueillir, du territoire des villes, les parts assignées par la loi aux prêtres et aux lévites, car Juda se réjouissait de ce que les prêtres et les lévites étaient à leur poste, '
  '45':
  - type: note
    content: Voir pur. –  selon le commandement de David v. 24 ; 1Ch 23–26. –  Salomon 2Ch 8.14.
  - type: text
    content: 'assurant le service de leur Dieu et le service des purifications, ainsi que les chantres et les portiers, selon le commandement de David et de Salomon, son fils ; '
  '46':
  - type: note
    content: Texte et traduction incertains ; au lieu de il y avait on pourrait comprendre ils (les lévites) étaient chefs…  ; d'autres modifient le texte hébreu traditionnel pour lire aux jours de David, Asaph les avait établis chefs… ou encore Asaph avait été établi chef…  ; cf. 1Ch 15.16ss ; 16.5,37 ; 2Ch 29.30.
  - type: text
    content: 'car au temps jadis, aux jours de David et d''Asaph, il y avait des chefs des chantres et des chants pour louer et célébrer Dieu. '
  '47':
  - type: note
    content: 'Cf. 13.10. –  et aux jours de Néhémie  : précision omise par un ms de LXX. –  selon l''ordre de chaque jour  : cf. 11.23 ; 1Ch 16.37+. –  sacrées  : voir saint. –  les lévites donnèrent…  : cf. 10.38s ; Nb 18.26ss.'
  - type: text
    content: Tout Israël, aux jours de Zorobabel et aux jours de Néhémie, donna les parts des chantres et des portiers, selon l'ordre de chaque jour ; on donna aussi les portions sacrées aux lévites, et les lévites donnèrent les portions sacrées aux fils d'Aaron.
  '5':
  - type: note
    content: 'Maadia  : cf. v. 17.'
  - type: text
    content: 'Miyamîn, Maadia, Bilga, '
  '6':
  - type: text
    content: 'Shemaya, Yoyarib, Yedaya, '
  '7':
  - type: note
    content: 'Cf. 7.39ss ; 11.10ss. –  Sallou  : cf. v. 20.'
  - type: text
    content: Sallou, Amoq, Hilqiya, Yedaya. Ce furent là les grands prêtres et leurs frères, aux jours de Josué.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.43. –  Josué… v. 24n. –  Shérébia  : cf. 10.13.'
  - type: text
    content: 'Lévites : Josué, Binnouï, Qadmiel, Shérébia, Juda, Mattania, qui dirigeait avec ses frères le chant des louanges ; '
  '9':
  - type: note
    content: 'Cf. 11.15ss. –  Ounni ou Ounno, selon deux lectures traditionnelles ; cf. 1Ch 15.18,20. –  leurs frères  : plusieurs mss hébreux et des versions anciennes ont lu et leurs frères. –  qui étaient en poste  : on pourrait aussi comprendre qui montaient la garde ; qui assuraient le service (cf. 7.3 ; 12.45).'
  - type: text
    content: Baqbouqia et Ounni, leurs frères, qui étaient en poste en face d'eux.
