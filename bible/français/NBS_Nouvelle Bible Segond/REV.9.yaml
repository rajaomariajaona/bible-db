      children:
      - type: text
        text: 'Siracide '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '39.29ss : « Feu, grêle, famine, mort, tout cela a été créé pour le châtiment. Les crocs des bêtes féroces, les scorpions, les vipères, l''épée châtiant les impies pour leur perte, se réjouissent d''accomplir son ordre (celui de Dieu). Sur la terre ils sont prêts pour les cas de besoin, leur moment venu, ils ne transgresseront pas sa parole. »'
    marker-yv: yv-n
  - type: text
    text: 'De la fumée, des criquets sortirent sur la terre, et il leur fut donné un pouvoir pareil au pouvoir des scorpions de la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne pas faire de mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10,19 ; 2.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux humains qui n''ont pas… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.3 ; Ez 9.4,6 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Sagesse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.9 : « Eux (les Egyptiens) périrent mordus par les sauterelles et les mouches, sans qu''on trouvât de remède pour préserver leur vie. »'
    marker-yv: yv-n
  - type: text
    text: 'Il leur fut dit de ne pas faire de mal à l''herbe de la terre, ni à aucune verdure, ni à aucun arbre, mais seulement aux humains qui n''ont pas sur le front le sceau de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cinq mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être par référence à la durée approximative de la vie d''un criquet ; ceux qui cherchent des symbolismes astrologiques dans l''Apocalypse ont rapproché ce temps de celui qui sépare le signe du Scorpion (cf. v. 3) de la fin de l''année. On a aussi compris '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cinq mois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au sens vague de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quelques mois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Mt 25.2,15 ; Lc 12.6,52 ; Ac 20.6 ; 24.1 ; 1Co 14.19).
    marker-yv: yv-n
  - type: text
    text: 'Il leur fut donné, non pas de les tuer, mais de les tourmenter pendant cinq mois : le tourment qu''ils causaient était comme le tourment causé par un scorpion lorsqu''il pique un être humain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 6.16 ; Jr 8.3 ; Jb 3.21.
    marker-yv: yv-n
  - type: text
    text: En ces jours-là, les humains chercheront la mort, mais ils ne la trouveront pas. Ils désireront mourir, et la mort les fuira.
