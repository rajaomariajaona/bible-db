    marker-yv: yv-n
  - type: text
    text: 'Le sixième ange sonna de la trompette. Alors j''entendis une voix venant des quatre cornes de l''autel d''or qui est devant Dieu ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quatre anges '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le grand fleuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Gn 15.18 ; Dt 1.7 ; Jos 1.4)
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ', l''Euphrate'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Ap 16.12.'
    marker-yv: yv-n
  - type: text
    text: 'elle disait au sixième ange qui avait la trompette : Détache les quatre anges qui sont liés sur le grand fleuve, l''Euphrate. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tiers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.7+.
    marker-yv: yv-n
  - type: text
    text: 'Alors les quatre anges qui étaient prêts pour l''heure, le jour, le mois et l''année, furent déliés pour tuer le tiers des humains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt mille fois dix mille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: deux myriades de myriades
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'deux cents millions '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 5.11). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''en entendis le nombre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.4.
    marker-yv: yv-n
  - type: text
    text: Le nombre des combattants de la cavalerie était de vingt mille fois dix mille. J'en entendis le nombre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
