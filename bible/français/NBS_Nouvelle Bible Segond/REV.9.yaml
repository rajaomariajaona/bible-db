  - type: text
    text: 'Le cinquième ange sonna de la trompette. Je vis une étoile qui était tombée du ciel sur la terre. La clef du puits de l''abîme lui fut donnée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fumée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fournaise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 19.28 ; Ex 19.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le soleil…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jl 2.10.'
    marker-yv: yv-n
  - type: text
    text: 'Elle ouvrit le puits de l''abîme. Il monta du puits une fumée comme la fumée d''une grande fournaise ; le soleil et l''air furent obscurcis par la fumée du puits. '
  - type: usfm
    marker: vlbl
    children:
