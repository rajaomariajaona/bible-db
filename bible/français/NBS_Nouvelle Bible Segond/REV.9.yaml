    marker-yv: yv-n
  - type: text
    text: 'Ces criquets ressemblaient à des chevaux équipés pour le combat. Il y avait sur leurs têtes comme des couronnes semblables à de l''or, et leurs visages étaient comme des visages humains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des cheveux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la comparaison pourrait avoir été suggérée par les longues antennes de certaines espèces de sauterelles ou de criquets ; cf. 1Co 11.14ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lions '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jl 1.6.
    marker-yv: yv-n
  - type: text
    text: 'Ils avaient des cheveux comme les cheveux des femmes, et leurs dents étaient comme celles des lions. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cuirasses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot grec (qui a donné notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: thorax
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') signifie aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: poitrail
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bruit de chars '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jl 2.5.
    marker-yv: yv-n
  - type: text
    text: 'Ils avaient des poitrails comme des cuirasses de fer, et le bruit de leurs ailes était comme le bruit de chars à plusieurs chevaux qui courent au combat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 19.
    marker-yv: yv-n
  - type: text
    text: 'Ils ont des queues semblables à celles des scorpions, avec des aiguillons ; c''est dans leurs queues qu''est leur pouvoir de faire du mal aux humains pendant cinq mois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abîme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abaddon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu correspondant désigne le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'monde des disparus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Jb 26.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; il est apparenté à un verbe hébreu qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (se) perdre, périr, disparaître, détruire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en hébreu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Apollyon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: « Destructeur »
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains voient dans ce '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' une allusion au dieu Apollon.'
    marker-yv: yv-n
  - type: text
    text: Ils ont comme roi sur eux l'ange de l'abîme, dont le nom est Abaddon en hébreu, et qui en grec a pour nom Apollyon (« Destructeur »).
