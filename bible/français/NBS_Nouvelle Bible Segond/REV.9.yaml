  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'criquets '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sauterelles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 10.12-15 ; Jl 1–2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'scorpions '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lc 10.19 ; cf. '
    - type: usfm
