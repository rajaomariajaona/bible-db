document_id: REV.9,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'cinquième  : cf. 16.10. –  ange / trompette 8.2+. –  étoile… tombée 8.10+. –  l''abîme v. 11 ; 11.7 ; 17.8 ; 20.1,3 ; Lc 8.31 ; cf. Gn 1.2n  ; voir aussi 2P 2.4n.'
  - type: text
    content: 'Le cinquième ange sonna de la trompette. Je vis une étoile qui était tombée du ciel sur la terre. La clef du puits de l''abîme lui fut donnée. '
  '10':
  - type: note
    content: Cf. v. 19.
  - type: text
    content: 'Ils ont des queues semblables à celles des scorpions, avec des aiguillons ; c''est dans leurs queues qu''est leur pouvoir de faire du mal aux humains pendant cinq mois. '
  '11':
  - type: note
    content: 'abîme v. 1+. –  Abaddon  : le terme hébreu correspondant désigne le monde des disparus (voir Jb 26.6n) ; il est apparenté à un verbe hébreu qui signifie (se) perdre, périr, disparaître, détruire. –  en hébreu  : cf. 16.16. –  Apollyon signifie « Destructeur »  ; certains voient dans ce nom une allusion au dieu Apollon.'
  - type: text
    content: Ils ont comme roi sur eux l'ange de l'abîme, dont le nom est Abaddon en hébreu, et qui en grec a pour nom Apollyon (« Destructeur »).
  '12':
  - type: text
    content: ' '
  - type: note
    content: 8.13+.
  - type: text
    content: Le premier « malheur » est passé. Deux « malheurs » viennent encore après.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ange / trompette 8.2+ ; cf. 16.12. –  des quatre cornes  : certains mss portent seulement des cornes  ; Ex 27.2n. –  autel 6.9+ ; Ex 30.1-3 ; cf. 40.5.'
  - type: text
    content: 'Le sixième ange sonna de la trompette. Alors j''entendis une voix venant des quatre cornes de l''autel d''or qui est devant Dieu ; '
  '14':
  - type: note
    content: 'quatre anges 7.1. –  le grand fleuve (cf. Gn 15.18 ; Dt 1.7 ; Jos 1.4), l''Euphrate  : Ap 16.12.'
  - type: text
    content: 'elle disait au sixième ange qui avait la trompette : Détache les quatre anges qui sont liés sur le grand fleuve, l''Euphrate. '
  '15':
  - type: note
    content: tiers 8.7+.
  - type: text
    content: 'Alors les quatre anges qui étaient prêts pour l''heure, le jour, le mois et l''année, furent déliés pour tuer le tiers des humains. '
  '16':
  - type: note
    content: 'vingt mille fois dix mille  : litt. deux myriades de myriades, c.-à-d. deux cents millions (cf. 5.11). –  J''en entendis le nombre 7.4.'
  - type: text
    content: Le nombre des combattants de la cavalerie était de vingt mille fois dix mille. J'en entendis le nombre.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 41.10-12. –  de feu  : probablement au sens de couleur de feu.'
  - type: text
    content: 'C''est ainsi que, dans la vision, je vis les chevaux et ceux qui les montaient ; ils avaient des cuirasses de feu, d''hyacinthe et de soufre. Les têtes des chevaux étaient comme des têtes de lions ; de leurs bouches sortaient du feu, de la fumée et du soufre. '
  '18':
  - type: note
    content: V. 15. –  fléaux v. 20 ; 11.6 ; 15.1,6,8 ; 16.9,21 ; 18.4,8 ; 21.9 ; 22.18.
  - type: text
    content: 'Le tiers des humains fut tué par ces trois fléaux : par le feu, par la fumée et par le soufre qui sortaient de leurs bouches. '
  '19':
  - type: note
    content: Cf. v. 10. –  elles font du mal 2.11n.
  - type: text
    content: Car le pouvoir des chevaux est dans leurs bouches et dans leurs queues ; leurs queues ressemblent à des serpents ; elles ont des têtes, et c'est par elles qu'elles font du mal.
  '2':
  - type: note
    content: 'fumée / fournaise  : cf. 1.15n  ; Gn 19.28 ; Ex 19.18. –  le soleil…  : cf. Jl 2.10.'
  - type: text
    content: 'Elle ouvrit le puits de l''abîme. Il monta du puits une fumée comme la fumée d''une grande fournaise ; le soleil et l''air furent obscurcis par la fumée du puits. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'ne revinrent pas 2.5n,21n  ; 16.9,11. –  œuvres de leurs mains Es 2.8 ; 17.8 ; Mi 5.12. –  se prosterner devant ou adorer (voir culte) : cf. 3.9n. –  démons Dt 32.17 ; Ps 96.5n  ; 1Co 10.20. –  idoles d''or… Es 2.20 ; Ps 115.4-7 ; 135.15-17 ; Dn 5.4,23.'
  - type: text
    content: 'Les autres humains, qui ne furent pas tués par ces fléaux, ne revinrent pas des œuvres de leurs mains ; ils ne cessèrent pas de se prosterner devant les démons et les idoles d''or, d''argent, de bronze, de pierre et de bois, qui ne peuvent ni voir, ni entendre, ni marcher ; '
  '21':
  - type: note
    content: '16.9,11,21 ; cf. Ex 20.13-15 ; 2R 9.22 ; Na 3.4 ; Rm 1.29. –  sortilèges  : le mot employé ici désigne habituellement une préparation magique ; il a donné notre mot pharmacie  ; termes apparentés en 18.23 ; 21.8 ; 22.15 ; Ga 5.20n. –  prostitution 2.14n.'
  - type: text
    content: ils ne revinrent pas de leurs meurtres, ni de leurs sortilèges, ni de leur prostitution, ni de leurs vols.
  '3':
  - type: note
    content: 'criquets ou sauterelles  : cf. Ex 10.12-15 ; Jl 1–2. –  scorpions Lc 10.19 ; cf. Siracide 39.29ss : « Feu, grêle, famine, mort, tout cela a été créé pour le châtiment. Les crocs des bêtes féroces, les scorpions, les vipères, l''épée châtiant les impies pour leur perte, se réjouissent d''accomplir son ordre (celui de Dieu). Sur la terre ils sont prêts pour les cas de besoin, leur moment venu, ils ne transgresseront pas sa parole. »'
  - type: text
    content: 'De la fumée, des criquets sortirent sur la terre, et il leur fut donné un pouvoir pareil au pouvoir des scorpions de la terre. '
  '4':
  - type: note
    content: 'ne pas faire de mal v. 10,19 ; 2.11n. –  aux humains qui n''ont pas… 7.3 ; Ez 9.4,6 ; Sagesse 16.9 : « Eux (les Egyptiens) périrent mordus par les sauterelles et les mouches, sans qu''on trouvât de remède pour préserver leur vie. »'
  - type: text
    content: 'Il leur fut dit de ne pas faire de mal à l''herbe de la terre, ni à aucune verdure, ni à aucun arbre, mais seulement aux humains qui n''ont pas sur le front le sceau de Dieu. '
  '5':
  - type: note
    content: 'cinq mois  : peut-être par référence à la durée approximative de la vie d''un criquet ; ceux qui cherchent des symbolismes astrologiques dans l''Apocalypse ont rapproché ce temps de celui qui sépare le signe du Scorpion (cf. v. 3) de la fin de l''année. On a aussi compris cinq mois au sens vague de quelques mois (cf. Mt 25.2,15 ; Lc 12.6,52 ; Ac 20.6 ; 24.1 ; 1Co 14.19).'
  - type: text
    content: 'Il leur fut donné, non pas de les tuer, mais de les tourmenter pendant cinq mois : le tourment qu''ils causaient était comme le tourment causé par un scorpion lorsqu''il pique un être humain. '
  '6':
  - type: note
    content: Cf. 6.16 ; Jr 8.3 ; Jb 3.21.
  - type: text
    content: En ces jours-là, les humains chercheront la mort, mais ils ne la trouveront pas. Ils désireront mourir, et la mort les fuira.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ces criquets  : litt. les apparences des criquets . –  chevaux  : cf. Jl 2.4s ; Jb 39.19s.'
  - type: text
    content: 'Ces criquets ressemblaient à des chevaux équipés pour le combat. Il y avait sur leurs têtes comme des couronnes semblables à de l''or, et leurs visages étaient comme des visages humains. '
  '8':
  - type: note
    content: 'des cheveux…  : la comparaison pourrait avoir été suggérée par les longues antennes de certaines espèces de sauterelles ou de criquets ; cf. 1Co 11.14ss. –  dents / lions Jl 1.6.'
  - type: text
    content: 'Ils avaient des cheveux comme les cheveux des femmes, et leurs dents étaient comme celles des lions. '
  '9':
  - type: note
    content: 'cuirasses  : le mot grec (qui a donné notre mot thorax) signifie aussi poitrail. –  bruit de chars Jl 2.5.'
  - type: text
    content: 'Ils avaient des poitrails comme des cuirasses de fer, et le bruit de leurs ailes était comme le bruit de chars à plusieurs chevaux qui courent au combat. '
