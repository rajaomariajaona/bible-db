      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jb 41.10-12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : probablement au sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: couleur de feu.
    marker-yv: yv-n
  - type: text
    text: 'C''est ainsi que, dans la vision, je vis les chevaux et ceux qui les montaient ; ils avaient des cuirasses de feu, d''hyacinthe et de soufre. Les têtes des chevaux étaient comme des têtes de lions ; de leurs bouches sortaient du feu, de la fumée et du soufre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fléaux '
    - type: usfm
      marker: ft
