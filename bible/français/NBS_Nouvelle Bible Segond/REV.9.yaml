  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.13+.
    marker-yv: yv-n
  - type: text
    text: Le premier « malheur » est passé. Deux « malheurs » viennent encore après.
