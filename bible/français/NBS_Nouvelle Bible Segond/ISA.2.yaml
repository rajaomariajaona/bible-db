document_id: ISA.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Toutes les nations afflueront à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Paroles…  : autres traductions ce qu''a vu Esaïe… ; les paroles qu''a vues Esaïe…  ; le verbe est apparenté au terme traduit par vision en 1.1.'
  - type: text
    content: Paroles d'Esaïe, fils d'Amots, ce qu'il a vu au sujet de Juda et de Jérusalem.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Entre dans les rochers v. 19,21 ; cf. Os 10.8 ; Lc 23.30 ; Ap 6.15s. –  la frayeur du Seigneur  : c.-à-d. la frayeur que le Seigneur inspire  ; voir crainte. –  éclat de sa majesté v. 19,21 ; 24.14n  ; Ps 21.6 ; 104.1.'
  - type: text
    content: Entre dans les rochers
  - type: text
    content: et cache-toi dans la poussière,
  - type: text
    content: 'loin de la frayeur du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: de l'éclat de sa majesté.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Les yeux hautains… 5.15 ; cf. 37.29 ; Lc 1.51. –  abaissés / courbée v. 9+. –  la supériorité  : litt. l''élévation , de même au v. 17.'
  - type: text
    content: Les yeux hautains de l'être humain seront abaissés,
  - type: text
    content: 'la supériorité des hommes sera courbée :'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' seul sera élevé en ce jour-là.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: jour 13.6 ; Jl 1.15+ ; Am 5.18.
  - type: text
    content: 'Car c''est un jour pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: contre tout ce qui est hautain et orgueilleux,
  - type: text
    content: contre ce qui s'élève et doit être abaissé ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'cèdres du Liban (10.34n) / chênes du Bashân (en Transjordanie) : cf. Ez 27.5s ; Za 11.1s. –  hauts et élevés  : même expression hébraïque pour le trône de Dieu en 6.1 ( très élevé ).'
  - type: text
    content: contre tous les cèdres du Liban, hauts et élevés,
  - type: text
    content: et contre tous les chênes du Bashân,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'montagnes / collines  : cf. v. 2 ; 65.7+.'
  - type: text
    content: contre toutes les hautes montagnes
  - type: text
    content: et contre toutes les collines élevées ;
  '15':
  - type: text
    content: contre toutes les hautes tours
  - type: text
    content: et contre toutes les murailles fortifiées ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Tarsis  : port et colonie phénicienne (23.7n) de la péninsule ibérique qui constituait, à l''époque, la limite des voyages au long cours (voir 66.19 ; Gn 10.4 ; 1R 10.22 ; 22.49 ; Jon 1.3 ; Ps 72.10). Par extension les bateaux de Tarsis désignent l''ensemble des vaisseaux au long cours, quelle que soit leur destination (23.1,14 ; 60.9 ; cf. Ps 48.8). –  navires  : sens probable d''un terme hébreu qui n''apparaît qu''ici.'
  - type: text
    content: contre tous les bateaux de Tarsis
  - type: text
    content: et contre tous les navires précieux.
  '17':
  - type: text
    content: ' '
  - type: note
    content: courbée / abaissée v. 9+. –  le Seigneur seul sera élevé 2S 22.3 ; Ps 46.8 (même racine hébraïque pour haute retraite ).
  - type: text
    content: La hauteur de l'être humain sera courbée,
  - type: text
    content: 'la supériorité des hommes sera abaissée :'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' seul sera élevé ce jour-là.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'V. 8n. –  seront balayés  : autre traduction passeront  ; même verbe (ou homonymes) en 8.8 ; 9.9 ( remplacer ) ; 21.1 ; 24.5 ( altérer ) ; 40.31 ( renouveler ) ; 41.1 ; Jb 4.15n.'
  - type: text
    content: Tous les faux dieux seront balayés.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'On entrera  : autre traduction ils entreront  ; cf. v. 10+. –  l''éclat de sa majesté v. 10+. –  quand il se lèvera 14.22 ; 33.10 ; Nb 10.35 ; Ps 7.7 ; 9.20 ; 12.6 ; 68.2 ; 82.8 ; 102.14.'
  - type: text
    content: On entrera dans les grottes des rochers
  - type: text
    content: et dans les profondeurs de la poussière,
  - type: text
    content: 'loin de la frayeur du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: de l'éclat de sa majesté,
  - type: text
    content: quand il se lèvera pour épouvanter la terre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Mi 4.1-3. –  Dans la suite des temps  : litt. dans la suite (ou à la fin ) des jours  ; même expression en Gn 49.1 ; Nb 24.14 ; Dt 4.30 ; 31.29 ; Jr 23.20 ; 30.24 ; 48.47 ; 49.39 ; Ez 38.16 ; Os 3.5 ; Mi 4.1 ; Dn 2.28 (équivalent araméen) ; 10.14. –  la montagne de la maison du Seigneur  : le mont Sion (2.3+) sur lequel est bâti le temple de Jérusalem. Cf. 6.1 ; 11.9 ; 24.23 ; 25.6 ; 27.13 ; 56.7 ; 65.25 ; Ez 20.40+ ; Za 14.4 ; Ps 2.6 ; 15.1 ; 48.2. –  montagnes / collines  : cf. v. 14 ; 65.7+. –  toutes les nations 25.6 ; 60.3 ; 66.18-20 ; Jr 3.17 ; Za 8.20-22 ; 14.16s ; Ps 72.11 ; 86.9 ; Ap 15.4. –  y afflueront  : cf. Dt 16.16 ; Ps 122.4.'
  - type: text
    content: Dans la suite des temps,
  - type: text
    content: 'la montagne de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: sera établie au sommet des montagnes ;
  - type: text
    content: elle s'élèvera au-dessus des collines,
  - type: text
    content: et toutes les nations y afflueront.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'rats  : litt. creuseurs de trous  ; autre traduction taupes . –  ses faux dieux (2.8n) d''argent… cf. 30.22n  ; 31.7. –  devant eux  : sous-entendu dans le texte.'
  - type: text
    content: En ce jour-là, l'être humain jettera
  - type: text
    content: aux rats et aux chauves-souris
  - type: text
    content: ses faux dieux d'argent
  - type: text
    content: et ses faux dieux d'or,
  - type: text
    content: qu'il s'était faits pour se prosterner devant eux ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'V. 10+. –  creux / fentes  : cf. Ex 33.22 ; Jg 15.8,11.'
  - type: text
    content: on entrera dans les creux des rochers
  - type: text
    content: et dans les fentes des rocs,
  - type: text
    content: 'loin de la frayeur du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: de l'éclat de sa majesté,
  - type: text
    content: quand il se lèvera pour épouvanter la terre.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Ce v. ne figure pas dans LXX. –  qui n'a qu'un souffle… ou dont le (seul) souffle est dans ses narines  ; cf. Gn 2.7n  ; Jb 7.7+.
  - type: text
    content: Laissez donc l'être humain,
  - type: text
    content: 'qui n''a qu''un souffle dans les narines :'
  - type: text
    content: quelle valeur a-t-il ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'montons… Za 8.3 ; Ps 24.3. –  Dieu de Jacob Ps 46.8 ; 75.10 ; 76.7 ; 84.9. –  Sion 4.5 ; 8.18 ; 14.32 ; 28.16 ; 33.5. –  sortira  : autre traduction s''imposera  ; cf. 42.1nss ; 51.4. –  loi 1.10n.'
  - type: text
    content: 'Une multitude de peuples s''y rendra ; ils diront :'
  - type: text
    content: 'Venez, montons à la montagne du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: à la maison du Dieu de Jacob !
  - type: text
    content: Il nous enseignera ses voies,
  - type: text
    content: et nous suivrons ses sentiers.
  - type: text
    content: Car de Sion sortira la loi,
  - type: text
    content: 'de Jérusalem la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'juge / arbitre  : cf. 11.3s ; 16.5. –  épées / socs de charrue / lances / serpes  : cf. Jl 4.10. –  plus la guerre Os 2.20 ; Za 9.10 ; Ps 46.10.'
  - type: text
    content: Il sera juge entre les nations,
  - type: text
    content: il sera l'arbitre d'une multitude de peuples.
  - type: text
    content: De leurs épées ils forgeront des socs de charrue,
  - type: text
    content: 'de leurs lances des serpes :'
  - type: text
    content: une nation ne lèvera plus l'épée contre une autre,
  - type: text
    content: et on n'apprendra plus la guerre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Maison de Jacob  : l''expression désigne le plus souvent les deux royaumes (8.17 ; 10.20 ; 14.1 ; 29.22). –  marchons à la lumière 10.17 ; 60.1,3 ; Ps 56.14 ; 119.105 ; Pr 6.23 ; Jn 12.35s.'
  - type: text
    content: Maison de Jacob,
  - type: text
    content: 'venez, marchons à la lumière du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: heading
    content: Le jour du Seigneur, jour du jugement
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'il est rempli  : litt. ils sont remplis , mais les pronoms des v. 7s sont au singulier. –  des pratiques de l''Orient  : litt. de l''Orient , c.-à-d., vraisemblablement, de pratiques cultuelles venues de Mésopotamie. –  de gens qui cherchent des présages  : c.-à-d. de devins ou de magiciens  ; même racine hébraïque en 57.3 ; Lv 19.26n  ; Dt 18.10 ; Jr 27.9 ; Mi 5.11. Le terme est apparenté au mot pour nuée ou nuage , peut-être à cause de l''observation divinatoire du ciel. –  il s''accorde avec les étrangers  : litt. ils frappent (des mains) parmi des enfants d''étrangers (si l''on identifie le verbe à celui de Jb 27.23n) ; on peut y voir un geste d''alliance, ou un applaudissement aux coutumes étrangères. On pourrait encore traduire, par rapprochement avec un verbe de même forme en 1R 20.10 ( suffire )  : ils abondent en enfants d''étrangers.'
  - type: text
    content: Car tu as délaissé ton peuple, la maison de Jacob,
  - type: text
    content: parce qu'il est rempli des pratiques de l'Orient,
  - type: text
    content: de gens qui cherchent des présages, comme les Philistins,
  - type: text
    content: parce qu'il s'accorde avec les étrangers ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: chevaux / chars 31.1 ; Dt 17.16 ; Os 14.4 ; Am 2.15 ; 4.10 ; Ps 20.8.
  - type: text
    content: son pays est rempli d'argent et d'or,
  - type: text
    content: infinis sont ses trésors,
  - type: text
    content: son pays est rempli de chevaux,
  - type: text
    content: infini le nombre de ses chars.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'faux dieux  : le terme hébreu évoque le néant ou l''inconsistance, et il rappelle par sa forme le mot traduit par dieu  ; de même aux v. 18,20 ; 10.10s ; 19.1,3 ; 31.7 ; Lv 19.4n  ; Ha 2.18 ; Ps 96.5 ; 97.7 ; le même terme est traduit par néant en Jb 13.4. –  l''œuvre de ses mains  : cf. 17.8.'
  - type: text
    content: Son pays est rempli de faux dieux ;
  - type: text
    content: on se prosterne devant l'œuvre de ses mains,
  - type: text
    content: devant ce que ses doigts ont fait.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'courbé / abaissé v. 11,17 ; 5.15 ; cf. 23.9. Le verbe traduit par est courbé est traduit par renverser en 25.12 ; 26.5 ; par être bas en 29.4 ; cf. 60.14. –  ne leur pardonne pas  : autre traduction ne les relève pas  ; cf. Gn 50.17n  ; Ps 99.8n.'
  - type: text
    content: L'être humain est courbé,
  - type: text
    content: l'homme est abaissé,
  - type: text
    content: ne leur pardonne pas !
