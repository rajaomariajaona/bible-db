document_id: PSA.57,104
type_code: fra
verses:
  '1':
  - type: heading
    content: J'invoque le Dieu Très-Haut
  - type: text
    content: ' '
  - type: note
    content: 'Ne détruis pas  : probablement, titre ou premiers mots d''une mélodie connue (cf. 56.1n) ; de même en 58.1 ; 59.1 ; 75.1. –  Lorsqu''il s''enfuit…  : cf. 142.1 ; 1S 22.1s ; 24.1-9.'
  - type: text
    content: Du chef de chœur. « Ne détruis pas ! » De David. Hymne. Lorsqu'il s'enfuit pour échapper à Saül, dans la grotte.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 18.50.
  - type: text
    content: Je te célébrerai parmi les peuples, Seigneur,
  - type: text
    content: je te chanterai parmi les nations.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'fidélité / loyauté v. 4 ; 25.10+. –  va jusqu''au ciel  : litt. est grande jusqu''au ciel  ; cf. 36.6 ; 103.11 ; Es 55.9.'
  - type: text
    content: Car ta fidélité va jusqu'au ciel,
  - type: text
    content: et ta loyauté jusqu'aux nues.
  '12':
  - type: text
    content: Elève-toi au-dessus du ciel, ô Dieu !
  - type: text
    content: Que ta gloire soit au-dessus de toute la terre !
  '2':
  - type: text
    content: ' '
  - type: note
    content: à l'ombre de tes ailes 17.8+.
  - type: text
    content: Fais-moi grâce, ô Dieu, fais-moi grâce !
  - type: text
    content: C'est en toi que je trouve un abri ;
  - type: text
    content: je trouve un abri à l'ombre de tes ailes,
  - type: text
    content: jusqu'à ce que les calamités soient passées.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'J''invoque ou je crie vers  ; 3.5+. –  le Dieu  : hébreu ’El , Gn 21.33n. –  qui mène tout à bonne fin  : même verbe en 138.8.'
  - type: text
    content: J'invoque le Dieu Très-Haut,
  - type: text
    content: le Dieu qui mène tout à bonne fin pour moi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'il m''enverra…  : litt. il enverra et me sauvera  ; autre traduction qu''il m''envoie le salut . –  quand même celui qui me harcèle (cf. 56.2ns) …  : des versions anciennes ont compris il déshonorera (ou outragera ) celui qui me harcèle. –  Dieu enverra ou que Dieu envoie. –  sa loyauté ou sa vérité  ; cf. v. 11 ; 43.3 ; 85.11n.'
  - type: text
    content: Du ciel il m'enverra le salut,
  - type: text
    content: 'quand même celui qui me harcèle se répand en outrages. '
  - type: text
    content: Pause.
  - type: text
    content: Dieu enverra sa fidélité et sa loyauté.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'lions 7.3+ ; cf. Dn 6.17ss. –  dévoreurs  : traduction incertaine ; le verbe hébreu rappelle le mot traduit par flamme (cf. 104.4n) ; cf. 52.4+ ; 59.8 ; 64.4 ; 140.4 ; Pr 25.18.'
  - type: text
    content: Je suis au milieu des lions ;
  - type: text
    content: je suis couché avec des dévoreurs d'humains ;
  - type: text
    content: leurs dents sont une lance et des flèches,
  - type: text
    content: leur langue est une épée acérée.
  '6':
  - type: text
    content: ' '
  - type: note
    content: V. 11s ; 108.6 ; cf. 8.2 ; 113.4 ; 148.13 ; Nb 14.21 ; Es 2.11 ; 6.3 ; 40.5 ; Ha 3.3.
  - type: text
    content: Elève-toi au-dessus du ciel, ô Dieu !
  - type: text
    content: Que ta gloire soit au-dessus de toute la terre !
  '7':
  - type: text
    content: ' '
  - type: note
    content: '7.16+s. –  filet 9.16 ; Lm 1.13. –  fosse  : terme hébreu rare, également en 119.85 ; cf. Jr 18.22.'
  - type: text
    content: 'Ils avaient tendu un filet sous mes pas :'
  - type: text
    content: je me courbais ;
  - type: text
    content: 'ils avaient creusé une fosse devant moi :'
  - type: text
    content: 'ils y sont tombés. '
  - type: text
    content: Pause.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 108.2-6. –  affermi ou ferme, prêt, préparé  ; cf. 51.12n  ; 78.37 ; 112.7. –  je jouerai des psaumes  : le verbe hébreu est rendu par chanter au v. 10, voir 7.18n  ; 21.14n  ; 27.6.'
  - type: text
    content: Mon cœur est affermi, ô Dieu, mon cœur est affermi ;
  - type: text
    content: je chanterai, je jouerai des psaumes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'ma gloire 7.6n. –  l''aurore  : cf. 46.6+ ; 119.147 ; 130.5s.'
  - type: text
    content: Eveille-toi, ma gloire !
  - type: text
    content: Eveille-toi, luth, éveille-toi, lyre !
  - type: text
    content: J'éveillerai l'aurore.
