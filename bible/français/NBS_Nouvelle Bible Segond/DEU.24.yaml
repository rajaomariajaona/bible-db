document_id: DEU.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La femme répudiée
  - type: text
    content: ' '
  - type: note
    content: 'quelque chose d''inconvenant  : même expression en 23.15n  ; certains l''interprètent ici comme signifiant une affaire de nudité , c.-à-d. une faute sexuelle. –  attestation de rupture Es 50.1 ; Jr 3.8 ; Mt 5.31 ; 19.3-9/ /. –  remise  : litt. donnée à ses mains , de même au v. 3.'
  - type: text
    content: 'Lorsqu''un homme a pris et épousé une femme et que celle-ci n''a pas trouvé grâce à ses yeux, parce qu''il a trouvé en elle quelque chose d''inconvenant, il écrira pour elle une attestation de rupture et, après la lui avoir remise, il la renverra de sa maison. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'un prêt  : même terme en Pr 22.26 ; un terme très proche est traduit par dette en Né 5.10. –  gage v. 6 ; 15.6.'
  - type: text
    content: 'Si tu accordes un prêt à ton prochain, tu n''entreras pas dans sa maison pour te saisir de son gage ; '
  '11':
  - type: text
    content: 'tu resteras dehors, et celui à qui tu fais le prêt t''apportera le gage dehors. '
  '12':
  - type: text
    content: 'Si cet homme est pauvre, tu ne te coucheras pas avec son gage ; '
  '13':
  - type: note
    content: 'Cf. v. 17 ; Ex 22.25s ; Am 2.7s. On a trouvé dans une forteresse de la côte méditerranéenne, entre Jaffa et Ashdod, un document datant sans doute du règne de Josias, où un travailleur se plaint de la non-application de cette loi : « Comme j''avais terminé la moisson et que j''engrangeais, ces jours-ci, Hoshayahou, fils de Shobaï, est venu me prendre mon vêtement, alors que j''avais terminé ma moisson. Cela fait plusieurs jours qu''il m''a pris mon vêtement. Tous mes frères parleront pour moi, eux qui moissonnent avec moi dans la chaleur du jour. (…) Fais en sorte qu''il rende mon vêtement. Si ce n''est pas à un officier de faire en sorte qu''il rende mon vêtement, tu agiras envers moi avec fidélité, tu écouteras mon affaire, tu ne resteras pas muet. » – Voir bénédiction. –  ce sera pour toi justice… 6.25n.'
  - type: text
    content: 'tu lui rendras le gage au coucher du soleil, afin qu''il couche dans son vêtement et qu''il te bénisse ; ce sera pour toi justice devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  - type: heading
    content: Respect envers le salarié
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Lv 19.13 ; Jr 22.13 ; Jb 31.13,39 ; Jc 5.4 ; cf. Siracide 34.27 : « C''est verser le sang que de priver le salarié de son salaire. »'
  - type: text
    content: 'Tu n''opprimeras pas le salarié pauvre ou déshérité, qu''il soit l''un de tes frères ou l''un des immigrés qui sont dans tes villes, dans ton pays. '
  '15':
  - type: note
    content: 'Tu lui donneras…  : litt. en son jour tu lui donneras son salaire, et le soleil ne s''en ira pas sur lui  ; cf. Mt 20.8 ; Ep 4.26. –  il lui tarde…  : litt. vers lui il élève son être ou son désir (sur le terme hébreu correspondant, voir Gn 1.20n). –  il invoquerait…  : cf. 15.9+ ; Jc 4.17.'
  - type: text
    content: 'Tu lui donneras le salaire de sa journée avant le coucher du soleil ; car il est pauvre, et il lui tarde de le recevoir. Sans cela, il invoquerait le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre toi, et ce serait un péché pour toi.'
  - type: heading
    content: Responsabilité personnelle
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.9 ; 7.10 ; Jos 7.24s ; 2R 14.6 ; Jr 31.29s ; Ez 18.1-20 ; voir aussi Jn 8.21.
  - type: text
    content: Les pères ne seront pas mis à mort pour les fils, les fils ne seront pas mis à mort pour les pères ; chacun sera mis à mort pour son propre péché.
  - type: heading
    content: Mesures en faveur des pauvres
  '17':
  - type: text
    content: ' '
  - type: note
    content: atteinte au droit 16.19+. –  de l'immigré et de l'orphelin , d'après certains mss hébreux et des versions anciennes ; de l'immigré orphelin , selon les autres témoins du texte hébreu traditionnel ; cf. 10.18+. –  gage / vêtement v. 13+.
  - type: text
    content: 'Tu ne porteras pas atteinte au droit de l''immigré et de l''orphelin, et tu ne prendras pas en gage le vêtement de la veuve. '
  '18':
  - type: note
    content: esclave en Egypte 5.15+. –  libéré 7.8+.
  - type: text
    content: 'Tu te souviendras que tu as été esclave en Egypte, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''en a libéré ; c''est pourquoi je t''ordonne d''agir ainsi.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 23.25s ; Lv 19.9s ; 23.22 ; Rt 2.15s.
  - type: text
    content: 'Quand tu feras la moisson de ton champ et que tu auras oublié une gerbe dans le champ, tu ne retourneras pas la prendre : elle sera pour l''immigré, pour l''orphelin et pour la veuve, afin que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénisse dans tout le travail de tes mains. '
  '2':
  - type: text
    content: 'Elle sortira de chez lui, elle s''en ira et elle pourra devenir la femme d''un autre homme. '
  '20':
  - type: text
    content: 'Quand tu secoueras tes oliviers, tu n''iras pas cueillir ensuite ce qui reste ; ce sera pour l''immigré, pour l''orphelin et pour la veuve. '
  '21':
  - type: text
    content: 'Quand tu vendangeras ta vigne, tu n''iras pas grappiller ensuite ce qui reste ; ce sera pour l''immigré, pour l''orphelin et pour la veuve. '
  '22':
  - type: note
    content: 5.15+.
  - type: text
    content: Tu te souviendras que tu as été esclave en Egypte ; c'est pourquoi je t'ordonne d'agir ainsi.
  '3':
  - type: text
    content: 'Si ce dernier homme ne l''aime pas, qu''il écrit pour elle une attestation de rupture et, après la lui avoir remise, la renvoie de sa maison ; ou bien, si ce dernier homme qui l''a prise pour femme vient à mourir, '
  '4':
  - type: note
    content: 'Cf. Jr 3.1 ; Os 3.1-3. –  souillée ou rendue impure (voir pur) : en l''occurrence à l''égard du premier mari seulement (cf. v. 2). –  abomination 7.25+.'
  - type: text
    content: 'alors son premier mari, qui l''avait renvoyée, ne pourra pas la reprendre pour femme, après qu''elle a été souillée : ce serait une abomination devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Tu ne chargeras pas d''un péché le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine.'
  - type: heading
    content: Les jeunes mariés
  '5':
  - type: text
    content: ' '
  - type: note
    content: '20.7+. –  vient de prendre femme  : litt. a pris une nouvelle femme . –  pour raison de famille  : litt. pour sa maison ou pour sa maisonnée.'
  - type: text
    content: Lorsqu'un homme vient de prendre femme, il ne partira pas à l'armée, et on ne lui imposera aucune charge ; il sera exempté pour raison de famille pendant un an et il réjouira la femme qu'il a prise.
  - type: heading
    content: Les gages
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le moulin  : cf. Nb 11.8n. –  la meule de dessus  : le même mot peut aussi désigner un char  ; il s''agit ici de la pierre mobile que l''on faisait tourner sur la meule inférieure du moulin, fixe (cf. Jg 9.53).'
  - type: text
    content: 'On ne prendra pas pour gage le moulin, ni la meule de dessus : ce serait prendre pour gage la vie même.'
  - type: heading
    content: Le rapt
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'qui ait enlevé…  : litt. qui ait volé quelqu''un parmi ses frères  ; de même le mot traduit plus loin par ravisseur peut aussi avoir le sens plus général de voleur  ; cf. 5.19 ; Ex 20.15n  ; 21.16. –  réduit en esclavage 21.14n. –  Tu élimineras… 13.6n.'
  - type: text
    content: Si on trouve un homme qui ait enlevé l'un de ses frères, parmi les Israélites, qui l'ait réduit en esclavage ou qui l'ait vendu, ce ravisseur mourra. Tu élimineras ainsi de ton sein ce qui est mauvais.
  - type: heading
    content: La « lèpre »
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Prends garde / vous… 1.8n. –  aux cas de « lèpre » ou au fléau de « la lèpre » Lv 13.2nss. –  enseigneront  : le verbe correspondant est apparenté au terme hébreu tora , traduit par loi . –  prêtres-lévites 17.9n  ; cf. 33.10. –  vous veillerez à agir (litt. à faire ) : cf. 5.1n.'
  - type: text
    content: 'Prends garde aux cas de « lèpre », afin de bien observer et de faire exactement ce que vous enseigneront les prêtres-lévites ; vous veillerez à agir selon ce que je leur ai ordonné. '
  '9':
  - type: note
    content: Nb 12.10.
  - type: text
    content: 'Souviens-toi de ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a fait à Miriam en chemin lorsque vous êtes sortis d''Egypte.'
  - type: heading
    content: Encore les gages
