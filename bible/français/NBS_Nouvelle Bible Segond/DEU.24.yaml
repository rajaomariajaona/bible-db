      children:
      - type: text
        text: 'gage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 6 ; 15.6.
    marker-yv: yv-n
  - type: text
    text: 'Si tu accordes un prêt à ton prochain, tu n''entreras pas dans sa maison pour te saisir de son gage ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'tu resteras dehors, et celui à qui tu fais le prêt t''apportera le gage dehors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Si cet homme est pauvre, tu ne te coucheras pas avec son gage ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 17 ; Ex 22.25s ; Am 2.7s. On a trouvé dans une forteresse de la côte méditerranéenne, entre Jaffa et Ashdod, un document datant sans doute du règne de Josias, où un travailleur se plaint de la non-application de cette loi : « Comme j''avais terminé la moisson et que j''engrangeais, ces jours-ci, Hoshayahou, fils de Shobaï, est venu me prendre mon vêtement, alors que j''avais terminé ma moisson. Cela fait plusieurs jours qu''il m''a pris mon vêtement. Tous mes frères parleront pour moi, eux qui moissonnent avec moi dans la chaleur du jour. (…) Fais en sorte qu''il rende mon vêtement. Si ce n''est pas à un officier de faire en sorte qu''il rende mon vêtement, tu agiras envers moi avec fidélité, tu écouteras mon affaire, tu ne resteras pas muet. » – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce sera pour toi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'tu lui rendras le gage au coucher du soleil, afin qu''il couche dans son vêtement et qu''il te bénisse ; ce sera pour toi justice devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu.'
