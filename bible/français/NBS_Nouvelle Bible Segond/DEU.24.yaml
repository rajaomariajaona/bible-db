  - type: text
    text: Si on trouve un homme qui ait enlevé l'un de ses frères, parmi les Israélites, qui l'ait réduit en esclavage ou qui l'ait vendu, ce ravisseur mourra. Tu élimineras ainsi de ton sein ce qui est mauvais.
