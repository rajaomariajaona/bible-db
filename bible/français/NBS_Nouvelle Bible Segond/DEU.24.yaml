      - type: text
        text: (sur le terme hébreu correspondant, voir Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il invoquerait…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.9+ ; Jc 4.17.'
    marker-yv: yv-n
  - type: text
    text: 'Tu lui donneras le salaire de sa journée avant le coucher du soleil ; car il est pauvre, et il lui tarde de le recevoir. Sans cela, il invoquerait le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' contre toi, et ce serait un péché pour toi.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Responsabilité personnelle
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 5.9 ; 7.10 ; Jos 7.24s ; 2R 14.6 ; Jr 31.29s ; Ez 18.1-20 ; voir aussi Jn 8.21.
    marker-yv: yv-n
  - type: text
    text: Les pères ne seront pas mis à mort pour les fils, les fils ne seront pas mis à mort pour les pères ; chacun sera mis à mort pour son propre péché.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mesures en faveur des pauvres
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'atteinte au droit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de l'immigré et de l'orphelin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''après certains mss hébreux et des versions anciennes ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'immigré orphelin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon les autres témoins du texte hébreu traditionnel ; cf. 10.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'gage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vêtement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 13+.
    marker-yv: yv-n
  - type: text
    text: 'Tu ne porteras pas atteinte au droit de l''immigré et de l''orphelin, et tu ne prendras pas en gage le vêtement de la veuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'esclave en Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.15+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'libéré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.8+.
    marker-yv: yv-n
  - type: text
    text: 'Tu te souviendras que tu as été esclave en Egypte, et que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, t''en a libéré ; c''est pourquoi je t''ordonne d''agir ainsi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 23.25s ; Lv 19.9s ; 23.22 ; Rt 2.15s.
    marker-yv: yv-n
  - type: text
    text: 'Quand tu feras la moisson de ton champ et que tu auras oublié une gerbe dans le champ, tu ne retourneras pas la prendre : elle sera pour l''immigré, pour l''orphelin et pour la veuve, afin que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te bénisse dans tout le travail de tes mains. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Quand tu secoueras tes oliviers, tu n''iras pas cueillir ensuite ce qui reste ; ce sera pour l''immigré, pour l''orphelin et pour la veuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Quand tu vendangeras ta vigne, tu n''iras pas grappiller ensuite ce qui reste ; ce sera pour l''immigré, pour l''orphelin et pour la veuve. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.15+.
    marker-yv: yv-n
  - type: text
    text: Tu te souviendras que tu as été esclave en Egypte ; c'est pourquoi je t'ordonne d'agir ainsi.
