    marker-yv: yv-n
  - type: text
    text: Lorsqu'un homme vient de prendre femme, il ne partira pas à l'armée, et on ne lui imposera aucune charge ; il sera exempté pour raison de famille pendant un an et il réjouira la femme qu'il a prise.
