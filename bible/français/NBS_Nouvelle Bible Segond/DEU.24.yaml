    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''un homme a pris et épousé une femme et que celle-ci n''a pas trouvé grâce à ses yeux, parce qu''il a trouvé en elle quelque chose d''inconvenant, il écrira pour elle une attestation de rupture et, après la lui avoir remise, il la renverra de sa maison. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Elle sortira de chez lui, elle s''en ira et elle pourra devenir la femme d''un autre homme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Si ce dernier homme ne l''aime pas, qu''il écrit pour elle une attestation de rupture et, après la lui avoir remise, la renvoie de sa maison ; ou bien, si ce dernier homme qui l''a prise pour femme vient à mourir, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jr 3.1 ; Os 3.1-3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'souillée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rendue impure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ') : en l''occurrence à l''égard du premier mari seulement (cf. v. 2). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abomination '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.25+.
    marker-yv: yv-n
  - type: text
    text: 'alors son premier mari, qui l''avait renvoyée, ne pourra pas la reprendre pour femme, après qu''elle a été souillée : ce serait une abomination devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Tu ne chargeras pas d''un péché le pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te donne comme patrimoine.'
