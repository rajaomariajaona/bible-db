document_id: 2CH.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Jotam
  - type: heading
    content: 2R 15.32-38
  - type: text
    content: 'Jotam avait vingt-cinq ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. Le nom de sa mère était Yerousha, fille de Tsadoq. '
  '2':
  - type: note
    content: 'ce qui convenait…  : cf. 20.32n. –  seulement, il n''entra pas dans le temple du Seigneur  : c.-à-d., il n''agit pas comme son père, qui avait péché en essayant d''exercer des fonctions sacerdotales, cf. 26.16ss. –  Mais le peuple était encore perverti  : cf. 2R 15.35.'
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait Ozias, son père – seulement, il n''entra pas dans le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: . Mais le peuple était encore perverti.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la porte Haute de la maison du Seigneur  : peut-être celle qui est mentionnée dans Jr 20.2n. –  il bâtit beaucoup  : cette partie du v. et les v. 4-6 sont propres aux Chroniques. –  Ophel 33.14 ; Es 32.14 ; Mi 4.8n  ; Né 3.26n  ; probablement la colline (cf. 2R 5.24n) où avait été construit le palais royal, au sud du temple.'
  - type: text
    content: 'C''est lui qui bâtit la porte Haute de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il bâtit beaucoup sur la muraille de l''Ophel. '
  '4':
  - type: text
    content: 'Il bâtit des villes dans la région montagneuse de Juda, ainsi que des citadelles et des tours dans les bois. '
  '5':
  - type: note
    content: 'des Ammonites  : peuple transjordanien, cf. Gn 19.38n. –  cent talents ≈ 3,4 t ; dix mille kors ≈ 4,2 m3  ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Il fut en guerre avec le roi des Ammonites et il l''emporta sur eux. Les Ammonites lui donnèrent cette année-là cent talents d''argent, dix mille kors de froment et dix mille d''orge ; voilà ce que lui payèrent les Ammonites, ainsi que la deuxième année et la troisième. '
  '6':
  - type: note
    content: 'parce qu''il affermit ses voies…  : les Chroniques soulignent encore que la fidélité au Seigneur est source de bénédiction et de succès.'
  - type: text
    content: 'Jotam devint fort, parce qu''il affermit ses voies devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  ses entreprises  : litt. ses voies . –  le livre des rois d''Israël et de Juda  : cf. 16.11+.'
  - type: text
    content: 'Le reste de l''histoire de Jotam, toutes ses guerres et toutes ses entreprises, cela est écrit dans le livre des rois d''Israël et de Juda. '
  '8':
  - type: note
    content: Ce v. répète le début du v. 1, mais il est omis par LXX et Syr.
  - type: text
    content: 'Il avait vingt-cinq ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. '
  '9':
  - type: note
    content: 'se coucha avec ses pères  : cf. 1R 1.21n. –  on l''ensevelit dans la Ville de David  : cf. 9.31n  ; 2S 5.7n. –  Achaz  : ce nom signifie il a saisi (cf. Achazia et Joachaz, 22.1n).'
  - type: text
    content: Jotam se coucha avec ses pères, et on l'ensevelit dans la Ville de David. Achaz, son fils, devint roi à sa place.
