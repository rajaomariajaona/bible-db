document_id: 2CH.27,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne de Jotam
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 15.32-38
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Jotam avait vingt-cinq ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. Le nom de sa mère était Yerousha, fille de Tsadoq. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui convenait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'seulement, il n''entra pas dans le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d., il n''agit pas comme son père, qui avait péché en essayant d''exercer des fonctions sacerdotales, cf. 26.16ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mais le peuple était encore perverti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 15.35.'
      marker-yv: yv-n
    - type: text
      text: 'Il fit ce qui convenait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', exactement comme l''avait fait Ozias, son père – seulement, il n''entra pas dans le temple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . Mais le peuple était encore perverti.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la porte Haute de la maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : peut-être celle qui est mentionnée dans Jr 20.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il bâtit beaucoup
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette partie du v. et les v. 4-6 sont propres aux Chroniques. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ophel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 33.14 ; Es 32.14 ; Mi 4.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Né 3.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; probablement la colline (cf. 2R 5.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) où avait été construit le palais royal, au sud du temple.
      marker-yv: yv-n
    - type: text
      text: 'C''est lui qui bâtit la porte Haute de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il bâtit beaucoup sur la muraille de l''Ophel. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il bâtit des villes dans la région montagneuse de Juda, ainsi que des citadelles et des tours dans les bois. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Ammonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peuple transjordanien, cf. Gn 19.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cent talents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '≈ 3,4 t ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dix mille kors '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ≈ 4,2 m
        - type: usfm
          marker: ord
          children:
          - type: text
            text: '3'
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies.'
      marker-yv: yv-n
    - type: text
      text: 'Il fut en guerre avec le roi des Ammonites et il l''emporta sur eux. Les Ammonites lui donnèrent cette année-là cent talents d''argent, dix mille kors de froment et dix mille d''orge ; voilà ce que lui payèrent les Ammonites, ainsi que la deuxième année et la troisième. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parce qu'il affermit ses voies…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les Chroniques soulignent encore que la fidélité au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' est source de bénédiction et de succès.'
      marker-yv: yv-n
    - type: text
      text: 'Jotam devint fort, parce qu''il affermit ses voies devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses entreprises
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses voies
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le livre des rois d'Israël et de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 16.11+.'
      marker-yv: yv-n
    - type: text
      text: 'Le reste de l''histoire de Jotam, toutes ses guerres et toutes ses entreprises, cela est écrit dans le livre des rois d''Israël et de Juda. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce v. répète le début du v. 1, mais il est omis par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il avait vingt-cinq ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se coucha avec ses pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 1.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on l'ensevelit dans la Ville de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 5.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Achaz
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce nom signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a saisi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Achazia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Joachaz
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Jotam se coucha avec ses pères, et on l'ensevelit dans la Ville de David. Achaz, son fils, devint roi à sa place.
