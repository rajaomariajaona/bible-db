    - type: text
      text: 'Alors, au sein des nations où ils auront été emmenés captifs, vos rescapés se souviendront de moi, qui ai été brisé avec leur cœur prostitué et dévoyé loin de moi, et leurs yeux qui se prostituaient avec leurs idoles. Ils n''oseront plus se regarder en face, à cause des méfaits qu''ils ont commis avec toutes leurs abominations. '
