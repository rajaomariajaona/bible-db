document_id: EZK.6,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les adorateurs d'idoles
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ainsi ils sauront que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) et que ce n''est pas pour rien que j''ai parlé de leur infliger ce malheur.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Frappe de la main…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ces gestes et l''interjection correspondante ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hélas !
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') pourraient aussi être interprétés comme les expressions d''une vive joie ; cf. 21.19,22 ; 22.13 ; 25.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abominations funestes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mauvaises
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') 8.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'famine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.12+.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Frappe de la main, tape du pied et dis : « Hélas ! » sur toutes les abominations funestes de la maison d''Israël, qui tombera par l''épée, par la famine et par la peste. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aura été préservé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sera assiégé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Es 1.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Celui qui est loin mourra par la peste, celui qui est proche tombera par l''épée, celui qui restera, qui aura été préservé, mourra par la famine. J''irai jusqu''au bout de ma fureur contre eux, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous tout arbre vert…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.28 ; Dt 12.2 ; 1R 14.23 ; 2R 16.4 ; Jr 2.20 ; Os 4.13s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: offrandes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'odeur agréable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 8.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 1.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), quand les victimes seront au milieu de leurs idoles, autour de leurs autels, sur toute colline élevée, sur tous les sommets des montagnes, sous tout arbre vert, sous tout térébinthe touffu, là où ils présentaient à toutes leurs idoles des offrandes d''odeur agréable. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'J''étendrai la main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 5.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dévasté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.8+ ; 33.28s ; 35.3 ; Jr 51.43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plus… désert de Dibla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'depuis le désert '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sans doute celui de Juda) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu'à Dibla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', lieu inconnu ; certains témoins du texte portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Ribla '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (les caractères hébreux correspondant à R et D se ressemblent beaucoup) ; il s'agirait alors d'une ville syrienne, située sur l'Oronte ; voir 2R 23.33 ; 25.6,20.
      marker-yv: yv-n
    - type: text
      text: 'J''étendrai la main sur eux et je ferai du pays un lieu dévasté, plus dévasté que le désert de Dibla, dans tous leurs lieux d''habitation ; ainsi ils sauront que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tourne-toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. 4.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: montagnes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sites privilégiés des sanctuaires du culte idolâtrique ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parle… en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Humain, tourne-toi vers les montagnes d''Israël et parle sur elles en prophète. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Voici ce que dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la formule correspondante est habituellement traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ainsi parle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(p. ex. v. 11). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux ravins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux lits des oueds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 31.12 ; 32.6 ; 34.13 ; 35.8 ; 36.4,6 ; voir Jb 6.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 18.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.16 ; 20.28s ; Dt 12.2 ; 1R 3.2 ; 11.7 ; 14.23 ; 15.14 ; 2R 12.4 ; 14.4 ; 15.4,35 ; 17.9,11 ; 2R 16.4 ; 18.4 ; 22.23 ; 23.5,15,19 ; Jr 3.6 ; 7.31 ; Os 4.13 ; 10.8 ; Am 7.9 ; Mi 1.5 ; Ps 78.58.'
      marker-yv: yv-n
    - type: text
      text: 'Tu diras : Montagnes d''Israël, écoutez la parole du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  ! Voici ce que dit le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ' aux montagnes et aux collines, aux ravins et aux vallées : Je fais moi-même venir l''épée contre vous, et je ferai disparaître vos hauts lieux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'brasiers à encens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'idoles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6 ; Lv 26.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 17.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les victimes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vos transpercés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; formule analogue au v. 13.'
      marker-yv: yv-n
    - type: text
      text: 'Vos autels seront dévastés, vos brasiers à encens seront brisés, et je ferai tomber les victimes devant vos idoles. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L'action ici décrite constitue à la fois une profanation des cultes idolâtriques et un châtiment grave pour leurs adeptes, privés de la sépulture familiale ; cf. v. 13 ; 9.7 ; Lv 26.30s ; 2R 23.14-16 ; Jr 8.1-3 ; 36.30.
      marker-yv: yv-n
    - type: text
      text: 'Je mettrai les cadavres des Israélites devant leurs idoles et je disséminerai vos ossements autour de vos autels. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jr 10.14s ; Mi 1.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vos autels seront réduits en ruines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte incertain, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vos autels seront réduits en ruines et mis en tort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?), ce qui pourrait à la rigueur signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: … et reconnus, de ce fait, comme coupables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cependant plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: réduits en ruines et dévastés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: seront brisées et disparaîtront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les deux verbes correspondants font assonance en hébreu.'
      marker-yv: yv-n
    - type: text
      text: 'Dans tous vos lieux d''habitation, vos villes seront réduites en ruines et vos hauts lieux dévastés ; ainsi vos autels seront réduits en ruines, vos idoles seront brisées et disparaîtront, vos brasiers à encens seront abattus et vos œuvres effacées. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous saurez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 2.5+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que je suis le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.13 ; 7.4,27 ; 11.10,12 etc.
      marker-yv: yv-n
    - type: text
      text: 'Les victimes tomberont au milieu de vous, et ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vous laisserai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je vous conserverai un reste : des rescapés…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 5.3+ ; 14.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'disséminés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(5.10+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans tous les pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans les pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) 12.15 ; 29.12 ; 30.23,26 ; 36.19.
      marker-yv: yv-n
    - type: text
      text: 'Mais je vous laisserai des rescapés de l''épée parmi les nations, lorsque vous serez disséminés dans tous les pays. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 26.41 ; Dt 30.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui ai été brisé avec leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs traductions anciennes ont vu dans cette formule inhabituelle un sens actif'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quand j''aurai brisé leur cœur… et leurs yeux… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prostitué
      - type: usfm
        marker: ft
        children:
        - type: text
