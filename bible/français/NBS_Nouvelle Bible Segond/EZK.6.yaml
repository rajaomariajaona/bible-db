document_id: EZK.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les adorateurs d'idoles
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: text
    content: 'Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et que ce n''est pas pour rien que j''ai parlé de leur infliger ce malheur.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Frappe de la main…  : ces gestes et l''interjection correspondante ( Hélas ! ) pourraient aussi être interprétés comme les expressions d''une vive joie ; cf. 21.19,22 ; 22.13 ; 25.6. –  abominations funestes (litt. mauvaises ) 8.9. –  épée / famine / peste 5.12+.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Frappe de la main, tape du pied et dis : « Hélas ! » sur toutes les abominations funestes de la maison d''Israël, qui tombera par l''épée, par la famine et par la peste. '
  '12':
  - type: note
    content: 'aura été préservé  : autre traduction sera assiégé  ; cf. Es 1.8n.'
  - type: text
    content: 'Celui qui est loin mourra par la peste, celui qui est proche tombera par l''épée, celui qui restera, qui aura été préservé, mourra par la famine. J''irai jusqu''au bout de ma fureur contre eux, '
  '13':
  - type: note
    content: 'sous tout arbre vert…  : cf. 20.28 ; Dt 12.2 ; 1R 14.23 ; 2R 16.4 ; Jr 2.20 ; Os 4.13s. –  offrandes  : voir sacrifices. –  odeur agréable Gn 8.21n  ; Lv 1.9n.'
  - type: text
    content: 'et ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand les victimes seront au milieu de leurs idoles, autour de leurs autels, sur toute colline élevée, sur tous les sommets des montagnes, sous tout arbre vert, sous tout térébinthe touffu, là où ils présentaient à toutes leurs idoles des offrandes d''odeur agréable. '
  '14':
  - type: note
    content: 'J''étendrai la main Es 5.25+. –  dévasté 15.8+ ; 33.28s ; 35.3 ; Jr 51.43. –  plus… désert de Dibla  : autre traduction depuis le désert (sans doute celui de Juda) jusqu''à Dibla, lieu inconnu ; certains témoins du texte portent Ribla (les caractères hébreux correspondant à R et D se ressemblent beaucoup) ; il s''agirait alors d''une ville syrienne, située sur l''Oronte ; voir 2R 23.33 ; 25.6,20.'
  - type: text
    content: 'J''étendrai la main sur eux et je ferai du pays un lieu dévasté, plus dévasté que le désert de Dibla, dans tous leurs lieux d''habitation ; ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tourne-toi (litt. ta face ) : cf. 4.3+. –  montagnes  : sites privilégiés des sanctuaires du culte idolâtrique ( hauts lieux , cf. v. 3). –  parle… en prophète 4.7n.'
  - type: text
    content: 'Humain, tourne-toi vers les montagnes d''Israël et parle sur elles en prophète. '
  '3':
  - type: note
    content: 'Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 11). –  aux ravins ou aux lits des oueds, de même en 31.12 ; 32.6 ; 34.13 ; 35.8 ; 36.4,6 ; voir Jb 6.15n  ; Ps 18.16n. –  hauts lieux  : cf. 16.16 ; 20.28s ; Dt 12.2 ; 1R 3.2 ; 11.7 ; 14.23 ; 15.14 ; 2R 12.4 ; 14.4 ; 15.4,35 ; 17.9,11 ; 2R 16.4 ; 18.4 ; 22.23 ; 23.5,15,19 ; Jr 3.6 ; 7.31 ; Os 4.13 ; 10.8 ; Am 7.9 ; Mi 1.5 ; Ps 78.58.'
  - type: text
    content: 'Tu diras : Montagnes d''Israël, écoutez la parole du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' aux montagnes et aux collines, aux ravins et aux vallées : Je fais moi-même venir l''épée contre vous, et je ferai disparaître vos hauts lieux. '
  '4':
  - type: note
    content: 'brasiers à encens / idoles v. 6 ; Lv 26.30n  ; Es 17.8+. –  les victimes  : litt. vos transpercés  ; formule analogue au v. 13.'
  - type: text
    content: 'Vos autels seront dévastés, vos brasiers à encens seront brisés, et je ferai tomber les victimes devant vos idoles. '
  '5':
  - type: note
    content: L'action ici décrite constitue à la fois une profanation des cultes idolâtriques et un châtiment grave pour leurs adeptes, privés de la sépulture familiale ; cf. v. 13 ; 9.7 ; Lv 26.30s ; 2R 23.14-16 ; Jr 8.1-3 ; 36.30.
  - type: text
    content: 'Je mettrai les cadavres des Israélites devant leurs idoles et je disséminerai vos ossements autour de vos autels. '
  '6':
  - type: note
    content: 'Cf. Jr 10.14s ; Mi 1.7. –  vos autels seront réduits en ruines  : texte incertain, litt. vos autels seront réduits en ruines et mis en tort ( ?), ce qui pourrait à la rigueur signifier … et reconnus, de ce fait, comme coupables  ; cependant plusieurs versions anciennes ont lu réduits en ruines et dévastés, cf. v. 4. –  seront brisées et disparaîtront  : les deux verbes correspondants font assonance en hébreu.'
  - type: text
    content: 'Dans tous vos lieux d''habitation, vos villes seront réduites en ruines et vos hauts lieux dévastés ; ainsi vos autels seront réduits en ruines, vos idoles seront brisées et disparaîtront, vos brasiers à encens seront abattus et vos œuvres effacées. '
  '7':
  - type: note
    content: vous saurez (cf. 2.5+) que je suis le Seigneur 6.13 ; 7.4,27 ; 11.10,12 etc.
  - type: text
    content: 'Les victimes tomberont au milieu de vous, et ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '8':
  - type: note
    content: 'je vous laisserai…  : autre traduction je vous conserverai un reste : des rescapés…  ; cf. 5.3+ ; 14.22. –  disséminés (5.10+) dans tous les pays (litt. dans les pays) 12.15 ; 29.12 ; 30.23,26 ; 36.19.'
  - type: text
    content: 'Mais je vous laisserai des rescapés de l''épée parmi les nations, lorsque vous serez disséminés dans tous les pays. '
  '9':
  - type: note
    content: 'Cf. Lv 26.41 ; Dt 30.1-3. –  qui ai été brisé avec leur cœur…  : plusieurs traductions anciennes ont vu dans cette formule inhabituelle un sens actif  : quand j''aurai brisé leur cœur… et leurs yeux… –  prostitué  : cf. 16.1-63 ; 23 ; Lv 19.29n  ; Os 1.2n. –  Ils n''oseront plus se regarder en face  : autres traductions ils seront dégoûtés de leur propre face ou le dégoût se lira sur leur face  ; de même en 20.43 ; 36.31. –  abominations 5.9n.'
  - type: text
    content: 'Alors, au sein des nations où ils auront été emmenés captifs, vos rescapés se souviendront de moi, qui ai été brisé avec leur cœur prostitué et dévoyé loin de moi, et leurs yeux qui se prostituaient avec leurs idoles. Ils n''oseront plus se regarder en face, à cause des méfaits qu''ils ont commis avec toutes leurs abominations. '
