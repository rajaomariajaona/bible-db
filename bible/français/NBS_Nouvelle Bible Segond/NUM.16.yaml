    marker-yv: yv-n
  - type: text
    text: 'Coré, fils de Yitsehar, fils de Qehath, fils de Lévi, avec Datân et Abiram, fils d''Eliab, et On, fils de Péleth, qui étaient fils de Ruben, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des princes de la communauté qui étaient convoqués '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui convoquaient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 4.34 ; 31.13 ; 32.2 ; Ex 16.22. – Le mot traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rencontres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'fait partie du vocabulaire liturgique ; il est apparenté au terme rendu par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'communauté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 3,5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; on le retrouve dans l''expression '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tente de la Rencontre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(1.1+) ; il est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'rencontres festives '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Gn 1.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'temps fixé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Nb 9.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des hommes de renom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 6.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'se dressèrent contre Moïse, avec deux cent cinquante hommes des Israélites, des princes de la communauté qui étaient convoqués pour les rencontres, des hommes de renom. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aaron '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 18,20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cela suffit ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: assez de vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'c''en est assez ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de même au v. 7 ; cf. Gn 45.28 ; Dt 3.26 ; 1R 19.4 ; Ez 44.6 ; 45.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tous… sont '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saints
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.40 ; Ex 19.6 ; Lv 11.44s ; 19.2 ; 20.7,26 ; 21.8 ; voir aussi Nb 11.29 ; 1R 12.31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' est au milieu d''eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 34.9.
    marker-yv: yv-n
  - type: text
    text: 'Ils se rassemblèrent contre Moïse et Aaron et leur dirent : Cela suffit ! Tous les membres de la communauté sont saints et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est au milieu d''eux. Pourquoi vous élevez-vous au-dessus de l''assemblée du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il tomba… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.5+.
    marker-yv: yv-n
  - type: text
    text: 'Quand Moïse eut entendu cela, il tomba face contre terre. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toute sa communauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : de même aux v. 6,11,16 ; 26.9 ; cf. v. 19ss,32 ; 14.35 ; 27.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Demain matin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.13,21 ; Ex 16.7 ; 2S 15.2 ; Jr 21.12 ; Ps 101.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fera savoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: saura
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2Tm 2.19. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il le laissera se présenter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il le fera approcher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même aux v. 9s ; sur le verbe correspondant, cf. Lv 1.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ps 65.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Jr 30.21.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit à Coré et à toute sa communauté : Demain matin, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fera savoir qui lui appartient et qui est saint, et il le laissera se présenter devant lui ; il laissera se présenter devant lui celui qu''il choisira. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 16s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cassolettes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.14 ; Ex 25.38
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 27.3.'
    marker-yv: yv-n
  - type: text
    text: 'Faites ceci : Coré et toute sa communauté, prenez des cassolettes. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: encens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 30.7s ; Lv 10.1ss ; 2R 23.8s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cela suffit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3.'
    marker-yv: yv-n
  - type: text
    text: 'Demain, mettez-y du feu et placez-y de l''encens devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; l''homme que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' choisira, c''est lui qui est saint ! Cela suffit, fils de Lévi !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Moïse dit à Coré : Ecoutez, je vous prie, fils de Lévi ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'séparés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mis à part '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 21 ; 8.14 ; cf. 1.47ss ; 3.6ss ; 4.30 ; 8.5ss ; Dt 10.8 ; Ez 44.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en vous laissant…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en vous faisant approcher de lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: demeure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 24,27 ; 1.50'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 17.28 ; 19.13 ; 31.30,47 ; Lv 15.31 ; 17.4.'
    marker-yv: yv-n
  - type: text
    text: 'Ne vous suffit-il pas que le Dieu d''Israël vous ait séparés de la communauté d''Israël, en vous laissant vous présenter devant lui pour accomplir le service de la demeure du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et vous tenir devant la communauté afin d''officier pour elle ? '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il vous a laissés vous présenter devant lui, toi et tous tes frères, les fils de Lévi avec toi, et vous réclamez encore le sacerdoce ! '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous vous liguez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'c''est contre le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' que vous vous liguez'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou, avec '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'voilà ce que tu fais, toi et toute ta communauté qui s''est liguée contre le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'est-il…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit sans doute d''une question rhétorique, destinée à souligner que la dignité d''Aaron (et donc des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ') est entièrement due à la décision et à la consécration divines, et que toute révolte contre l''ordre sacerdotal est nécessairement une révolte contre Dieu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous maugréiez contre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3+ ; Ex 16.7s.'
    marker-yv: yv-n
  - type: text
    text: 'C''est pourquoi, toi et toute ta communauté, vous vous liguez contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Aaron, en effet, qu''est-il pour que vous maugréiez contre lui ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
