        text: '16.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: méchants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne touchez rien…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 52.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de peur d'être emportés…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 19.15,17.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit à la communauté : Eloignez-vous, je vous en prie, des tentes de ces hommes méchants, et ne touchez rien de ce qui leur appartient, de peur d''être emportés par tous leurs péchés. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et toutes leurs familles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et leurs enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 14.3,31 ; 31.9 ; 32.16s,24,26 ; Gn 34.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 18.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ils se retirèrent de toutes parts loin de la demeure de Coré, de Datân et d'Abiram. Datân et Abiram, eux, sortirent et se tinrent debout à l'entrée de leurs tentes, avec leurs femmes, leurs fils et toutes leurs familles.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et que je n'agis pas de moi-même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et pas de mon (propre) '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 24.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jn 5.30 ; 8.28.'
    marker-yv: yv-n
  - type: text
    text: 'Moïse dit : A ceci vous saurez que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a envoyé pour accomplir toutes ces œuvres, et que je n''agis pas de moi-même. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'ils subissent le sort commun
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''ils sont visités '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: inspectés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', verbe qui évoque habituellement une intervention divine positive ou négative (châtiment) ; cf. Ex 20.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jr 6.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si ceux-là meurent comme meurent tous les humains, s''ils subissent le sort commun à tous les humains, ce n''est pas le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' qui m''a envoyé ; '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fait une chose inouïe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: crée une création
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; certains comprennent ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ouvre une fissure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si la terre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si le sol
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le mot correspondant ici à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sol '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de même au v. 31) n''est pas le même que celui qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 32s ; cf. Gn 2.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ap 12.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils descendent vivants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 55.16,24 ; Ap 19.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au '
      - type: usfm
        marker: w
        children:
        - type: text
          text: séjour
      - type: text
        text: ' des morts'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', parfois personnifié comme un monstre engloutissant ses victimes ; cf. Es 28.15 ; Jr 9.20 ; Os 13.14 ; Ps 49.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bafoué le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.11,23.
    marker-yv: yv-n
  - type: text
    text: 'mais si le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fait une chose inouïe, si la terre ouvre sa bouche pour les engloutir avec tout ce qui leur appartient et qu''ils descendent vivants au séjour des morts, vous saurez alors que ces hommes ont bafoué le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 26.10 ; Dt 11.6 ; Ps 106.17 ; voir aussi 2Ch 26.16ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 4.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il achevait de prononcer toutes ces paroles, la terre se fendit au-dessous d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 22,35 ; voir aussi 26.11.
    marker-yv: yv-n
  - type: text
    text: 'La terre ouvrit sa bouche et les engloutit, eux et leurs maisons, tous les gens de Coré et tous leurs biens. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 30+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils disparurent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils périrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du milieu de l'assemblée.
    marker-yv: yv-n
  - type: text
    text: 'Ils descendirent vivants au séjour des morts, eux et tout ce qui leur appartenait ; la terre les recouvrit, et ils disparurent de l''assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à leurs cris
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à leur voix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à leur bruit.
    marker-yv: yv-n
  - type: text
    text: 'Tout Israël, qui était autour d''eux, s''enfuit à leurs cris, en disant : Que la terre ne nous engloutisse pas ! '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 16,24,27 ; 11.1 ; 17.1ss ; 26.10 ; Lv 10.1ss ; 2R 1.10,12 ; Ps 106.18.
    marker-yv: yv-n
  - type: text
    text: 'Alors un feu sortit d''auprès du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et dévora les deux cent cinquante hommes qui présentaient l''encens.'
