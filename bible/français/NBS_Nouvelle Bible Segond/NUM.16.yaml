document_id: NUM.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La révolte de Coré, Datân et Abiram
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. commence par un verbe dont le sens est incertain, litt. il prit (avec Coré pour sujet) ; certains vocalisent différemment le texte hébreu pour traduire Coré… fit montre d''arrogance, ainsi que Datân…  ; d''autres interprètent Coré… entraîna Datân… (2) Ils se soulevèrent… ou encore Coré entraîna (les 250 hommes, v. 2,35) … Datân… et Abiram… (2) se soulevèrent… Cf. 3.5-13 ; 11–12 ; 14 ; 26.9. –  Coré v. 8,16,19,24,27 ; 27.3 ; Ex 6.18-24 ; cf. Jd 11. –  Datân / Abiram v. 12,25,27 ; Dt 11.6 ; Ps 106.17s. –  On, fils de Péleth , n''est mentionné nulle part ailleurs ; certains modifient le texte hébreu traditionnel pour lire Abiram, fils d''Eliab, lui-même fils de Pallou , cf. 26.5,8s. –  qui étaient…  : litt. fils de Ruben , le mot correspondant à fils étant au pluriel, sauf dans quelques mss hébreux et grecs qui ont le singulier.'
  - type: text
    content: 'Coré, fils de Yitsehar, fils de Qehath, fils de Lévi, avec Datân et Abiram, fils d''Eliab, et On, fils de Péleth, qui étaient fils de Ruben, '
  '10':
  - type: text
    content: 'Il vous a laissés vous présenter devant lui, toi et tous tes frères, les fils de Lévi avec toi, et vous réclamez encore le sacerdoce ! '
  '11':
  - type: note
    content: 'vous vous liguez…  : autre traduction c''est contre le Seigneur que vous vous liguez, ou, avec LXX, voilà ce que tu fais, toi et toute ta communauté qui s''est liguée contre le Seigneur. –  qu''est-il…  : il s''agit sans doute d''une question rhétorique, destinée à souligner que la dignité d''Aaron (et donc des prêtres) est entièrement due à la décision et à la consécration divines, et que toute révolte contre l''ordre sacerdotal est nécessairement une révolte contre Dieu. –  vous maugréiez contre  : cf. v. 3+ ; Ex 16.7s.'
  - type: text
    content: 'C''est pourquoi, toi et toute ta communauté, vous vous liguez contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Aaron, en effet, qu''est-il pour que vous maugréiez contre lui ?'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'V. 1+. –  Nous ne monterons pas  : cf. v. 13s ; d''autres comprennent ici nous ne nous soumettrons pas  ; voir aussi 13.31 ; 14.40.'
  - type: text
    content: 'Moïse envoya quelqu''un appeler Datân et Abiram, fils d''Eliab. Mais ils dirent : Nous ne monterons pas ! '
  '13':
  - type: note
    content: 'Ne te suffit-il pas…  : Syr ne vous suffit-il pas de nous avoir fait monter (cf. Gn 12.10n  ; 13.1 ; 44.24) … ? –  d''un pays…  : la description habituelle du pays d''Israël est ici appliquée à l''Egypte, cf. 11.4ss ; 13.27 ; 14.1ss,8 ; Ex 3.8n  ; 13.5 ; 16.3 ; 33.3. –  t''ériger en prince sur nous ou faire le prince (ou le chef) au-dessus de nous, cf. Ex 2.14.'
  - type: text
    content: 'Ne te suffit-il pas de nous avoir fait monter d''un pays ruisselant de lait et de miel pour nous faire mourir dans le désert ? Vas-tu encore t''ériger en prince sur nous ? '
  '14':
  - type: note
    content: 'ce n''est pas / ce ne sont pas  : LXX et Vg omettent les négations, ce qui donne à la phrase un tour ironique  : pour sûr, tu nous as fait entrer dans un pays… –  crever les yeux  : c.-à-d., peut-être, pour les empêcher de voir que tu as failli à tes promesses, ou encore pour les asservir complètement ; cf. Jg 16.21 ; 1S 11.2 ; voir aussi 2R 18.32 ; 25.7.'
  - type: text
    content: 'Non, vraiment, ce n''est pas dans un pays ruisselant de lait et de miel que tu nous as fait entrer, ce ne sont pas des champs et des vignes que tu nous as donnés pour patrimoine. Vas-tu crever les yeux de ces gens ? Nous ne monterons pas ! '
  '15':
  - type: note
    content: 'Moïse  : cf. v. 22 ; 12.3 ; 14.13. –  Ne regarde pas  : litt. ne te tourne pas vers. –  leur offrande  : cf. 15.4s ; Lv 2.1ss ; voir sacrifices. –  pas même… un âne  : Smr, LXX je ne leur ai rien pris de précieux  ; cf. 1S 12.3.'
  - type: text
    content: 'Moïse fut très fâché ; il dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ne regarde pas leur offrande. Je ne leur ai pas même pris un âne et je n''ai fait de mal à aucun d''eux.'
  - type: heading
    content: Le châtiment de Coré, Datân et Abiram
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 16.9.
  - type: text
    content: 'Moïse dit à Coré : Toi et toute ta communauté, soyez demain devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec Aaron. '
  '17':
  - type: note
    content: 'sa cassolette  : Syr ajoute et mettez-y du feu, cf. v. 6s,18 ; 17.1ss ; Lv 10.1 ; 1R 18.24. –  présentez-la  : litt. présentez chacun sa cassolette. –  il y aura et de même pour sont sous-entendus dans le texte.'
  - type: text
    content: 'Que chacun de vous prenne sa cassolette ; mettez-y de l''encens et présentez-la devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il y aura deux cent cinquante cassolettes ; de même pour toi et Aaron, chacun sa cassolette. '
  '18':
  - type: text
    content: 'Ils prirent chacun sa cassolette, y mirent du feu, y placèrent de l''encens et se tinrent à l''entrée de la tente de la Rencontre avec Moïse et Aaron. '
  '19':
  - type: note
    content: toute la communauté 14.10 ; LXX toute sa communauté, voir v. 5+. –  la gloire… 14.10,21s ; cf. Lv 9.5s,23.
  - type: text
    content: 'Coré rassembla contre eux toute la communauté, à l''entrée de la tente de la Rencontre. Alors la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut à toute la communauté.'
  '2':
  - type: note
    content: 'des princes de la communauté qui étaient convoqués ou qui convoquaient 1.16n  ; cf. 4.34 ; 31.13 ; 32.2 ; Ex 16.22. – Le mot traduit par rencontres fait partie du vocabulaire liturgique ; il est apparenté au terme rendu par communauté (v. 3,5n) ; on le retrouve dans l''expression tente de la Rencontre (1.1+) ; il est aussi traduit par rencontres festives (Gn 1.14n), par temps fixé (Nb 9.2n). –  des hommes de renom  : litt. de nom  ; cf. Gn 6.4n.'
  - type: text
    content: 'se dressèrent contre Moïse, avec deux cent cinquante hommes des Israélites, des princes de la communauté qui étaient convoqués pour les rencontres, des hommes de renom. '
  '20':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '21':
  - type: note
    content: 'Cf. 17.10. –  de cette communauté  : litt. du milieu de cette communauté.'
  - type: text
    content: 'Séparez-vous de cette communauté ; je vais les exterminer en un instant ! '
  '22':
  - type: note
    content: 'tombèrent v. 4+. –  Dieu (hébreu ’El, Gn 21.33n), Dieu (’Elohim, Gn 1.1n) du souffle (litt. des souffles ou des esprits) de tout être (litt. de toute chair) 27.16 ; LXX Dieu des esprits et de toute chair  : cf. 11.17,29 ; Gn 2.7 ; 6.3,12 ; Es 40.6-7n  ; 1S 10.10 ; Jl 3.1 ; Ps 104.29s ; Jb 12.10 ; voir aussi Jr 32.27 ; Hé 12.9 ; Ap 22.6 ; Hymnes (Qumrân) 10.8 : « Tu es le Prince des dieux et le Roi des êtres vénérés, et le Seigneur de tout esprit et le Maître de toute créature. » –  Un seul homme…  : cf. v. 5,8,16,32 ; Gn 18.23ss ; Lv 10.6 ; Jos 22.18 ; voir noms divins. – Voir péché. –  en colère  : cf. 1.53+ ; 17.11.'
  - type: text
    content: 'Ils tombèrent face contre terre et dirent : O Dieu, Dieu du souffle de tout être ! Un seul homme aurait péché et tu serais en colère contre toute la communauté ?'
  '23':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '24':
  - type: note
    content: 'Retirez-vous  : litt. montez. –  la demeure  : cf. v. 9+,27 ; 1.50n  ; LXX la communauté  ; LXX omet en outre de Datân et d''Abiram, de même au v. 27 (cf. v. 12,26) ; voir aussi Ex 33.8.'
  - type: text
    content: 'Dis à la communauté : Retirez-vous de toutes parts loin de la demeure de Coré, de Datân et d''Abiram. '
  '25':
  - type: note
    content: Cf. v. 12-15.
  - type: text
    content: 'Moïse alla trouver Datân et Abiram ; les anciens d''Israël le suivirent. '
  '26':
  - type: note
    content: 'méchants  : voir justice. –  ne touchez rien…  : cf. Es 52.11. –  de peur d''être emportés…  : cf. Gn 19.15,17.'
  - type: text
    content: 'Il dit à la communauté : Eloignez-vous, je vous en prie, des tentes de ces hommes méchants, et ne touchez rien de ce qui leur appartient, de peur d''être emportés par tous leurs péchés. '
  '27':
  - type: note
    content: 'V. 24n. –  et toutes leurs familles  : autre traduction et leurs enfants  ; cf. 14.3,31 ; 31.9 ; 32.16s,24,26 ; Gn 34.29n  ; Jg 18.21n  ; voir aussi fils.'
  - type: text
    content: Ils se retirèrent de toutes parts loin de la demeure de Coré, de Datân et d'Abiram. Datân et Abiram, eux, sortirent et se tinrent debout à l'entrée de leurs tentes, avec leurs femmes, leurs fils et toutes leurs familles.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'et que je n''agis pas de moi-même  : litt. et pas de mon (propre) cœur , cf. 24.13n  ; Jn 5.30 ; 8.28.'
  - type: text
    content: 'Moïse dit : A ceci vous saurez que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a envoyé pour accomplir toutes ces œuvres, et que je n''agis pas de moi-même. '
  '29':
  - type: note
    content: 's''ils subissent le sort commun  : litt. s''ils sont visités ou inspectés, verbe qui évoque habituellement une intervention divine positive ou négative (châtiment) ; cf. Ex 20.5n  ; Jr 6.15n.'
  - type: text
    content: 'Si ceux-là meurent comme meurent tous les humains, s''ils subissent le sort commun à tous les humains, ce n''est pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui m''a envoyé ; '
  '3':
  - type: note
    content: 'Moïse / Aaron v. 18,20. –  Cela suffit ! litt. assez de vous, autre traduction c''en est assez ! de même au v. 7 ; cf. Gn 45.28 ; Dt 3.26 ; 1R 19.4 ; Ez 44.6 ; 45.9. –  Tous… sont saints  : cf. 15.40 ; Ex 19.6 ; Lv 11.44s ; 19.2 ; 20.7,26 ; 21.8 ; voir aussi Nb 11.29 ; 1R 12.31. –  le Seigneur est au milieu d''eux Ex 34.9.'
  - type: text
    content: 'Ils se rassemblèrent contre Moïse et Aaron et leur dirent : Cela suffit ! Tous les membres de la communauté sont saints et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est au milieu d''eux. Pourquoi vous élevez-vous au-dessus de l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  '30':
  - type: note
    content: 'fait une chose inouïe  : litt. crée une création, cf. Gn 1.1n  ; certains comprennent ici ouvre une fissure. –  si la terre…  : ou si le sol  ; le mot correspondant ici à sol (de même au v. 31) n''est pas le même que celui qui est traduit par terre aux v. 32s ; cf. Gn 2.5n  ; Ap 12.16. –  qu''ils descendent vivants  : cf. Ps 55.16,24 ; Ap 19.20. –  au séjour des morts, parfois personnifié comme un monstre engloutissant ses victimes ; cf. Es 28.15 ; Jr 9.20 ; Os 13.14 ; Ps 49.15. –  bafoué le Seigneur 14.11,23.'
  - type: text
    content: 'mais si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait une chose inouïe, si la terre ouvre sa bouche pour les engloutir avec tout ce qui leur appartient et qu''ils descendent vivants au séjour des morts, vous saurez alors que ces hommes ont bafoué le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 26.10 ; Dt 11.6 ; Ps 106.17 ; voir aussi 2Ch 26.16ss. –  la terre  : cf. Gn 2.5n  ; 4.10n.'
  - type: text
    content: 'Comme il achevait de prononcer toutes ces paroles, la terre se fendit au-dessous d''eux. '
  '32':
  - type: note
    content: Cf. v. 22,35 ; voir aussi 26.11.
  - type: text
    content: 'La terre ouvrit sa bouche et les engloutit, eux et leurs maisons, tous les gens de Coré et tous leurs biens. '
  '33':
  - type: note
    content: 'Cf. v. 30+. –  ils disparurent  : autre traduction ils périrent. –  de l''assemblée  : litt. du milieu de l''assemblée.'
  - type: text
    content: 'Ils descendirent vivants au séjour des morts, eux et tout ce qui leur appartenait ; la terre les recouvrit, et ils disparurent de l''assemblée. '
  '34':
  - type: note
    content: 'à leurs cris  : litt. à leur voix ou à leur bruit.'
  - type: text
    content: 'Tout Israël, qui était autour d''eux, s''enfuit à leurs cris, en disant : Que la terre ne nous engloutisse pas ! '
  '35':
  - type: note
    content: Cf. v. 16,24,27 ; 11.1 ; 17.1ss ; 26.10 ; Lv 10.1ss ; 2R 1.10,12 ; Ps 106.18.
  - type: text
    content: 'Alors un feu sortit d''auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dévora les deux cent cinquante hommes qui présentaient l''encens.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: il tomba… 14.5+.
  - type: text
    content: 'Quand Moïse eut entendu cela, il tomba face contre terre. '
  '5':
  - type: note
    content: 'toute sa communauté  : de même aux v. 6,11,16 ; 26.9 ; cf. v. 19ss,32 ; 14.35 ; 27.3. –  Demain matin  : cf. 22.13,21 ; Ex 16.7 ; 2S 15.2 ; Jr 21.12 ; Ps 101.8. –  fera savoir  : LXX saura  ; cf. 2Tm 2.19. –  il le laissera se présenter  : autre traduction il le fera approcher  ; de même aux v. 9s ; sur le verbe correspondant, cf. Lv 1.2n  ; Ps 65.5n  ; voir aussi Jr 30.21.'
  - type: text
    content: 'Il dit à Coré et à toute sa communauté : Demain matin, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera savoir qui lui appartient et qui est saint, et il le laissera se présenter devant lui ; il laissera se présenter devant lui celui qu''il choisira. '
  '6':
  - type: note
    content: V. 16s. –  cassolettes 4.14 ; Ex 25.38n  ; 27.3.
  - type: text
    content: 'Faites ceci : Coré et toute sa communauté, prenez des cassolettes. '
  '7':
  - type: note
    content: 'encens  : cf. Ex 30.7s ; Lv 10.1ss ; 2R 23.8s. –  Cela suffit  : cf. v. 3.'
  - type: text
    content: 'Demain, mettez-y du feu et placez-y de l''encens devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; l''homme que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira, c''est lui qui est saint ! Cela suffit, fils de Lévi !'
  '8':
  - type: text
    content: 'Moïse dit à Coré : Ecoutez, je vous prie, fils de Lévi ! '
  '9':
  - type: note
    content: 'séparés ou mis à part v. 21 ; 8.14 ; cf. 1.47ss ; 3.6ss ; 4.30 ; 8.5ss ; Dt 10.8 ; Ez 44.11. –  en vous laissant…  : autre traduction en vous faisant approcher de lui. –  demeure  : cf. v. 24,27 ; 1.50n  ; 17.28 ; 19.13 ; 31.30,47 ; Lv 15.31 ; 17.4.'
  - type: text
    content: 'Ne vous suffit-il pas que le Dieu d''Israël vous ait séparés de la communauté d''Israël, en vous laissant vous présenter devant lui pour accomplir le service de la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et vous tenir devant la communauté afin d''officier pour elle ? '
