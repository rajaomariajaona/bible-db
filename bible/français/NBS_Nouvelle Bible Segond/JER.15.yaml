document_id: JER.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Condamnation du peuple de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Quand Moïse et Samuel…  : cf. 7.16+ ; Ex 32.11-14 ; 34.8s ; Nb 11.2 ; 1S 7.8-10 ; 12.19,23 ; Ps 99.6 ; 106.23 ; voir aussi Ez 14.14-16. –  je resterai insensible…  : litt. mon être (ou ma vie, mon âme  ; cf. Gn 1.20n) ne sera pas avec le peuple  ; cf. 14.19. –  qu''il s''en aille  : litt. qu''ils sortent.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Quand Moïse et Samuel se tiendraient devant moi, je resterai insensible à l''égard de ce peuple. Chasse-le de ma vue, qu''il s''en aille ! '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '11.18+. –  Quel malheur… 20.14 ; Jb 3.3. –  un homme (ou un sujet ) de querelle  : cf. Es 41.11 ; Jb 31.35n. –  maudissent  : voir bénédiction.'
  - type: text
    content: Quel malheur pour moi, ma mère, que tu m'aies fait naître,
  - type: text
    content: moi, un homme de querelle et de dispute pour tout le pays !
  - type: text
    content: Je n'emprunte ni ne prête,
  - type: text
    content: et pourtant tous me maudissent.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  Le Seigneur dit  : LXX a lu qu''il en soit ainsi, Seigneur ! –  je t''ai affranchi  : traduction incertaine ; on a aussi compris je te laisserai sans faute un reste, je t''ai armé ou, dans la bouche de Jérémie  : je t''ai servi sans faute pour le bien (du peuple ?) ; cf. 17.16n  ; 18.20. –  je suis intervenu pour toi  : autres traductions j''ai frappé (les ennemis ?) pour toi ; j''ai intercédé pour toi (ou auprès de toi ) ; cf. les emplois du même verbe en 36.25 ; Es 53.6n,12n  ; 59.16. Par ailleurs, certains ont traduit les expressions hébraïques rendues ici par des formules de serment (avec l''emploi de l''expression à coup sûr  ; cf. Es 5.9n, sans faute ), par des tournures interro-négatives ( ne t''avais-je pas affranchi… ). –  temps de la détresse 14.8.'
  - type: text
    content: '– Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit :'
  - type: text
    content: A coup sûr, je t'ai affranchi pour ton bien ;
  - type: text
    content: à coup sûr, je suis intervenu pour toi,
  - type: text
    content: au temps du malheur, au temps de la détresse.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Autre traduction Le fer brisera-t-il le fer du nord (cf. 1.14n) et le bronze ? cf. v. 20 ; 1.18 ; 28.13s ; Ps 2.9.
  - type: text
    content: Peut-on briser le fer,
  - type: text
    content: le fer du nord et le bronze ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.3s. –  non pas pour un paiement  : d''après LXX, certains comprennent  : en paiement (de tous tes péchés ) ; cf. 2.19+ ; Es 45.13 ; 50.1 ; 52.3 ; 55.1 ; Ps 44.13. –  mais…  : autre traduction (ils ne serviront) ni pour tous tes péchés, ni pour ton territoire.'
  - type: text
    content: Tes biens et tes trésors,
  - type: text
    content: je les livre en butin,
  - type: text
    content: non pas pour un paiement,
  - type: text
    content: mais à cause de tous tes péchés, sur tout ton territoire.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je te fais passer avec…  : autre traduction je fais passer (sur toi ?) ton ennemi  ; plusieurs mss hébreux et des versions anciennes ont lu je te rends esclave de ton ennemi , comme en 17.4 (une seule lettre distingue les deux expressions en hébreu). –  que tu ne connais pas 9.15+. –  de ma colère ou dans mes narines  ; cf. Dt 32.22 ; Ps 18.9. –  il brûle contre vous  : certains mss portent il brûlera pour toujours , comme en 17.4.'
  - type: text
    content: Je te fais passer avec ton ennemi
  - type: text
    content: dans un pays que tu ne connais pas,
  - type: text
    content: car le feu de ma colère s'est allumé ;
  - type: text
    content: il brûle contre vous.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Toi, tu sais ! Seigneur  : les mots correspondants sont absents de certains mss de LXX ; certains les déplacent à la fin du v. 11. –  interviens 6.15n. –  mes persécuteurs ou ceux qui me poursuivent , 17.18 ; 20.11 ; Ps 7.2n  ; 35.3. –  Ne me prends pas  : autres traductions ne m''enlève pas, ne me laisse pas enlever (c.-à-d. tuer ) ; cf. Gn 5.24 ; Es 52.5 ; 53.8. –  toi qui es patient…  : certains comprennent à cause de ta patience  ; cf. 10.25+ ; 17.15 ; Ex 34.6. –  Reconnais  : autre traduction sache . –  je supporte les outrages ou le déshonneur 6.10n  ; Ps 69.8.'
  - type: text
    content: – Toi, tu sais !
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi de moi,'
  - type: text
    content: interviens pour moi,
  - type: text
    content: venge-moi de mes persécuteurs !
  - type: text
    content: Ne me prends pas,
  - type: text
    content: toi qui es patient !
  - type: text
    content: Reconnais que je supporte les outrages à cause de toi.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Tes paroles…  : autre traduction quand j''ai trouvé tes paroles, je les ai dévorées cf. v. 19 ; 1.9 ; Ez 2.8–3.3 ; voir aussi Ps 19.8-11 ; 119.103,131 ; Jn 4.34 ; Hé 6.4s ; 1P 2.2s. –  ta parole ou, selon une autre lecture traditionnelle, tes paroles (comme au début du v.). –  joie de mon cœur  : cf. Ps 19.9 ; 119.111 ; Ct 3.11. –  ton nom… 7.10+ ; cf. 14.9.'
  - type: text
    content: Tes paroles se trouvaient là
  - type: text
    content: et je les ai dévorées ;
  - type: text
    content: ta parole a fait la gaieté et la joie de mon cœur,
  - type: text
    content: car ton nom est invoqué sur moi,
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu des Armées !'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 16.8 ; Ps 1.1 ; 26.4s. –  le conseil secret 6.11n  ; 23.18,22. –  des rieurs  : autre traduction de ceux qui se divertissent.'
  - type: text
    content: Je ne me suis pas assis dans le conseil secret des rieurs, pour m'y amuser ;
  - type: text
    content: ta main me contraint à m'asseoir solitaire,
  - type: text
    content: car tu m'as rempli de fureur.
  '18':
  - type: text
    content: ' '
  - type: note
    content: plaie 10.19+. –  incurable 14.19 ; 30.13-15 ; 46.11 ; 51.9 ; Mi 1.9. –  Serais-tu ou tu es . –  source trompeuse ou mensongère  ; autres traductions tromperie, mensonge (même terme en Mi 1.14) ; cf. 2.13 ; 20.7 ; Jb 6.15-20 ; 24.19.
  - type: text
    content: Pourquoi ma souffrance est-elle continuelle ?
  - type: text
    content: Pourquoi ma plaie est-elle incurable,
  - type: text
    content: pourquoi refuse-t-elle de se guérir ?
  - type: text
    content: Serais-tu vraiment pour moi comme une source trompeuse,
  - type: text
    content: comme une eau à laquelle on ne peut pas se fier ?
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Si tu reviens… je te ramènerai traduisent deux formes du même verbe hébreu, cf. 3.12n  ; 4.1 ; 11.18+ ; 31.18. –  tu te tiendras…  : litt. tu te tiendras devant moi  ; autre traduction tu seras à nouveau à mon service  ; cf. 7.10+ ; 18.20 ; 1R 17.1 ; Ps 106.23. –  si tu sépares  : litt. si tu fais sortir , ce qui pourrait signifier si tu exprimes ce qui est précieux plutôt que ce qui est vil  ; cf. Dt 8.3. –  comme ma propre bouche  : cf. v. 16 ; 1.9+ ; Ex 4.16 ; 1R 17.24 ; 2Ch 36.12.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Si tu reviens, je te ramènerai
  - type: text
    content: et tu te tiendras à ton poste devant moi ;
  - type: text
    content: si tu sépares le précieux du vil,
  - type: text
    content: tu seras comme ma propre bouche.
  - type: text
    content: C'est à eux de revenir à toi,
  - type: text
    content: ce n'est pas à toi de revenir à eux.
  '2':
  - type: note
    content: 'Où irons-nous ? litt. où sortirons-nous ? v. 1n. –  mort (ou peste  ; cf. 18.21n) / épée / famine  : cf. 14.12+ ; 43.11 ; Za 11.9 ; Ap 13.9s.'
  - type: text
    content: 'S''ils te disent alors : Où irons-nous ? Tu leur répondras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Qui est destiné à la mort, à la mort !
  - type: text
    content: Qui est destiné à l'épée, à l'épée !
  - type: text
    content: Qui est destiné à la famine, à la famine !
  - type: text
    content: Qui est destiné à la captivité, en captivité !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 1.8,18s.
  - type: text
    content: Je ferai de toi, pour ce peuple,
  - type: text
    content: un mur de bronze fortifié ;
  - type: text
    content: ils te feront la guerre,
  - type: text
    content: mais ils ne l'emporteront pas sur toi,
  - type: text
    content: car je suis avec toi pour te sauver et te délivrer
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '21':
  - type: text
    content: ' '
  - type: note
    content: '20.13 ; cf. 26.24 ; 36.26 ; 38.13 ; 39.17 ; Jb 5.15. –  de la main  : l''expression correspondante traduit ici deux termes hébreux approximativement synonymes.'
  - type: text
    content: Je te délivrerai de la main des mauvais,
  - type: text
    content: je te libérerai de la main des brutes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Je leur assignerai…  : cf. 1.10n  ; autre traduction, moins probable je leur ferai rendre des comptes (par) quatre…  ; 6.15n  ; 27.8 (même verbe, mais construction différente). –  quatre espèces (litt. clans ou familles , cf. 1.15n  ; Gn 8.19n) de fléaux Ez 14.21+ ; Ap 6.8. –  lacérer ou traîner  ; cf. 22.19 ; 49.20 ; 50.45.'
  - type: text
    content: 'Je leur assignerai quatre espèces de fléaux – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : l''épée pour tuer, les chiens pour lacérer, les oiseaux du ciel et les bêtes de la terre pour dévorer et détruire. '
  '4':
  - type: note
    content: un sujet de terreur… 24.9 ; 29.18 ; 34.17 ; cf. Dt 28.25n  ; 2Ch 29.8 ; voir aussi Na 3.6. –  à cause de Manassé 2R 21.1-18 ; 23.26 ; 24.3s ; cf. Jr 16.10-13 ; 31.29s.
  - type: text
    content: J'en ferai un sujet de terreur pour tous les royaumes de la terre, à cause de Manassé, fils d'Ezéchias, roi de Juda, à cause de tout ce qu'il a fait dans Jérusalem.
  - type: heading
    content: Je suis las d'avoir du regret
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Qui donc voudrait t''épargner  : cf. 13.14+. –  te plaindrait  : le verbe hébreu évoque un mouvement (en 18.16 un hochement de tête en signe de frayeur, de dérision ou de réprobation, voir aussi 48.27), ici en signe de compassion ; de même en 16.5 ; 22.10 ; Jb 2.11n  ; cf. Es 51.19 ; Na 3.7 ; Ps 69.21 ( un signe de pitié ). –  pour demander (homonyme du mot pour séjour des morts en hébreu) comment tu vas  : litt. s’(il y a) paix à toi , allusion à la salutation courante en Israël ; cf. Ps 122.6-8.'
  - type: text
    content: Qui donc voudrait t'épargner, Jérusalem,
  - type: text
    content: qui te plaindrait ?
  - type: text
    content: Qui ferait un détour pour demander comment tu vas ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'délaissé  : comme en 7.29 ; 12.7 ; le même verbe est traduit ailleurs par rejeter (23.33,39). –  retournée en arrière  : cf. Jos 22.16 ; So 1.6. –  j''étends la main 6.12+. –  d''avoir du regret  : autres traductions d''avoir pitié ; de renoncer (au mal que je projetais)  ; cf. 44.22 ; Dt 32.36n  ; voir Am 7.3,6,8.'
  - type: text
    content: Tu m'as délaissé,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: tu es retournée en arrière ;
  - type: text
    content: alors j'étends la main sur toi
  - type: text
    content: et je te détruis,
  - type: text
    content: je suis las d'avoir du regret.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je les vanne  : cette opération qui consistait à jeter en l''air le blé battu pour que le vent emporte la balle (c.-à-d. l''enveloppe du grain) sert ici d''image du jugement divin qui va se traduire, pour Jérusalem, par la défaite et l''exil ; autre traduction je les dissémine , cf. 4.11n  ; 49.32+ ; 51.2 ; Es 17.13n  ; 41.15s ; Ez 5.10 ; Ps 1.4n. –  aux portes du pays  : cf. 14.2n  ; Na 3.13 ; les aires de battage étaient souvent situées aux portes des villes, cf. 1R 22.10 ; Rt 3.2n. –  n''est pas revenu… 5.3+.'
  - type: text
    content: Je les vanne aux portes du pays,
  - type: text
    content: je tue leurs enfants ;
  - type: text
    content: je fais disparaître mon peuple,
  - type: text
    content: qui n'est pas revenu de ses voies.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'plus nombreuses que le sable  : cf. 33.22 ; Gn 22.17 ; Jos 11.4 ; Ps 78.27 ; Jb 6.3. –  celui qui ravage tout 6.26+. –  en plein midi 6.4.'
  - type: text
    content: Par moi, ses veuves sont plus nombreuses
  - type: text
    content: 'que le sable de la mer :'
  - type: text
    content: j'amène sur eux, sur la mère du jeune homme,
  - type: text
    content: celui qui ravage tout, en plein midi ;
  - type: text
    content: je fais tout à coup tomber sur elle
  - type: text
    content: l'agitation et l'épouvante.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sept fils 1S 2.5. –  son soleil se couche… Am 8.9 ; cf. Mt 27.45. –  Ceux qui restent  : litt. leur reste.'
  - type: text
    content: Celle qui avait mis au monde sept fils dépérit,
  - type: text
    content: elle rend l'âme ;
  - type: text
    content: son soleil se couche quand il fait encore jour ;
  - type: text
    content: elle a honte, elle rougit.
  - type: text
    content: Ceux qui restent, je les livre à l'épée
  - type: text
    content: devant leurs ennemis
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Jérémie se plaint, Dieu l'affermit
