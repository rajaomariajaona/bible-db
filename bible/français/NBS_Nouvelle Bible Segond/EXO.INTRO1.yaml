document_id: EXO.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: Une mémoire vivante
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre de l''Exode est la mémoire vivante d''un peuple qui se comprend comme peuple de Dieu. Le récit de l''institution de la Pâque l''indique déjà : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Lorsque demain ton fils te demandera : « Que signifie cela ? », tu lui répondras : « A la force de sa main, le Seigneur nous a fait sortir de l''Egypte, de la maison d''esclavage. »'
  - type: text
    text: ' (Ex 13.14.) On sait par ailleurs que, plus tard, des cultivateurs offrant à Dieu les prémices de leurs récoltes réciteront : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Mon père
  - type: text
    text: ' (Jacob, selon toute vraisemblance) '
  - type: usfm
    marker: it
    children:
    - type: text
      text: était un Araméen nomade
  - type: text
    text: '  ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: il est descendu en Egypte avec peu de gens… Les Egyptiens nous ont… soumis à un dur esclavage. Nous avons crié vers le Seigneur, le Dieu de nos pères… D'une main forte, d'un bras étendu…
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: le Seigneur nous a fait sortir d'Egypte
  - type: text
    text: ' . '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Il nous a amenés dans ce lieu et il nous a donné ce pays, un pays ruisselant de lait et de miel
  - type: text
    text: ' (Dt 26.5-11).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette mémoire de l''Exode jalonne toute l''histoire de l''Israël biblique. Elle fonde sa '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: conscience nationale
  - type: text
    text: '. Ainsi le pacte de Sichem qui fédère en une seule nation tous les clans et tribus susceptibles d''oublier leurs liens communs s''appuie sur ce seul argument : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) a '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fait sortir vos pères de l'Egypte,
  - type: text
    text: ' choisissez donc dès maintenant votre camp (Jos 24.4-15,25-28). Abraham s''était vu prédire cet événement (Gn 15.13-16). Le prophète Elie accomplira le long voyage du Carmel à l''Horeb pour retrouver, dans la pureté vivifiante du désert, les conditions historiques du face à face avec Dieu et le sens véritable de sa mission. Puis ce sont Amos (2.10 ; 3.1s ; 5.25), Osée (11.1-4), Michée (6.1-5), Jérémie (31.31-33) ou Esaïe (40ss) qui sans cesse reviennent aux thèmes de l''Exode. C''est encore le cas de la quasi-totalité des psaumes « historiques » (78 ; 81 ; 105 ; 106 ; 114 ; 135 ; 136).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le Nouveau Testament, pour sa part, est tout imprégné du souvenir de l'Exode. Spécialement dans les discours des Actes (par exemple celui d'Etienne en Ac 7) et dans l'Apocalypse, qui exploite le symbolisme des plaies d'Egypte et celui de l'agneau immolé, présent dans onze de ses chapitres.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette fonction de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mémoire vivante
  - type: text
    text: ' s''annonce déjà dans le premier verset du livre de l''Exode. La liste des ancêtres, placée à cet endroit, a pour fonction de rappeler à tous les clans et tribus d''Israël qu''ils ont effectivement été opprimés en Egypte et qu''ils ont eu part à une libération qui est l''œuvre de Dieu. Selon le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Talmud
  - type: text
    text: '*, Rabbi Gamaliel (Gamaliel I ou II ? cf. Ac 5.34'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  ; 22.3) aurait enseigné que tout fidèle a le devoir de se considérer comme ayant été personnellement tiré d''Egypte.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le cadre historique
- type: usfm
  marker: ip
  children:
  - type: text
    text: Les liens entre l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Egypte
  - type: text
    text: ' et Canaan sont constants. La table des nations de Genèse 10 présente les deux peuples comme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: fils de Cham
  - type: text
    text: ' (Gn 10.6). Pour autant l''Exode est peu loquace sur sa propre insertion dans le contexte égyptien. C''est le développement considérable de l''égyptologie depuis le déchiffrement des hiéroglyphes au XIX'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle (Champollion est mort en 1842) qui a suscité la curiosité des modernes en la matière. L''histoire biblique, elle, est avant tout une histoire théologique, et les listes de pharaons y interviennent peu. Ce qui est rapporté dans les quinze premiers chapitres de l''Exode pourrait correspondre à plusieurs dynasties (voir « Les “pharaons” », p.${Xpharaons}). Les hypothèses s''échelonnent du XVI'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' jusqu''au XII'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle av. J.-C., sans jamais retenir l''adhésion de tous les spécialistes. En fait, toutes les correspondances entre le récit de l''Exode et l''histoire égyptienne, dans l''état présent de sa reconstitution, restent douteuses ; elles n''apportent en tout état de cause qu''un éclairage limité au texte biblique.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Qui sont les Hébreux ?
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La dénomination '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Hébreu(x)
  - type: text
    text: ' apparaît 34 fois dans l''Ancien Testament, dont 14 dans l''Exode. Ce sont généralement des étrangers qui désignent ainsi les Israélites, dans un contexte où ceux-ci sont considérés comme des travailleurs immigrés. Le mot lui-même pourrait signifier « qui vient d''au-delà » ou « de l''autre côté » ; d''après cette étymologie, il pourrait s''appliquer à des Transjordaniens ou à des Transeuphratiens (cf. Gn 10.21'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '). Dans cette hypothèse, il ne désignerait pas à l''origine une ethnie particulière, mais plutôt un certain type de population nomade, souvent fière et batailleuse, capable aussi, parfois, de vendre ses services (le terme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: hébreu
  - type: text
    text: ' s''applique à des esclaves de maîtres israélites en Ex 21.2 ; Dt 15.12 ; Jr 34.9,14).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il n''est pas possible d''évoquer ce mot sans le rapprocher des nombreuses mentions de groupes '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: habirou
  - type: text
    text: ' ou '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ‘apirou
  - type: text
    text: ' dans les documents administratifs de tout le Proche-Orient, depuis la fin du III'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' millénaire. Les « Hébreux » ne seraient-ils pas aussi de ces Habirou ?'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Délimitation et plan
- type: usfm
  marker: ip
  children:
  - type: text
    text: Suite naturelle de la Genèse, le livre de l'Exode est aussi le préalable obligé à la compréhension des trois livres qui lui font suite. On pressent bien que le découpage en cinq volumes (notre mot « Pentateuque » transcrit un terme grec qui désigne, au propre, les « cinq étuis » où se logeaient les rouleaux) est un arrangement postérieur. Il était cependant connu de Philon* d'Alexandrie au I
  - type: usfm
    marker: ord
    children:
    - type: text
      text: er
  - type: text
    text: ' siècle et, avant lui, de la version grecque des '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante
  - type: text
    text: ' (LXX*, à partir du III'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle av. J.-C.). Ce sont d''ailleurs des manuscrits de cette dernière qui donnent à notre livre le titre d’'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Exodos
  - type: text
    text: ' (= « sortie » ; l''un d''eux précise '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Exodos Aiguptou
  - type: text
    text: ', « sortie d''Egypte »).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: plan
  - type: text
    text: ', symétrique autour d''une partie centrale (l''alliance*), oppose deux types de service ou d''esclavage (service du pharaon et service de Dieu), deux types de difficultés (les réticences du pharaon et celles du peuple) et deux types d''organisation (le rituel de la Pâque et le sanctuaire du désert).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''arrangement tripartite classique n''en perd pas pour autant sa pertinence :'
- type: usfm
  marker: io2
  children:
  - type: text
    text: I. Dieu libère son peuple (1–18)
- type: usfm
  marker: io2
  children:
  - type: text
    text: II. Dieu fait alliance avec son peuple (19–24)
- type: usfm
  marker: io2
  children:
  - type: text
    text: III. Dieu établit sa demeure au sein de son peuple (25–40).
- type: usfm
  marker: is2
  children:
  - type: text
    text: Remarques sur les contenus narratifs
- type: usfm
  marker: is2
  children:
  - type: text
    text: I. La sortie d'Egypte
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 1 et 2
- type: usfm
  marker: ip
  children:
  - type: text
    text: Avec un vocabulaire repris de la Genèse, l'histoire insiste sur la multiplication extraordinaire des fils de Jacob et, dans les circonstances politiques que nous avons évoquées plus haut, sur le rôle éminent des
  - type: usfm
    marker: bd
    children:
    - type: text
      text: femmes
  - type: text
    text: '. Les mères, les sages-femmes, la mère de Moïse (dont le nom rappelle celui du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Yokébed = « Gloire de YHWH »), sa sœur, et jusqu''à la fille du pharaon et ses suivantes, contrecarrent le plan de génocide.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On rapproche habituellement le nom de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Moïse
  - type: text
    text: ' (hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moshé
  - type: text
    text: ') de l''égyptien '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mosis
  - type: text
    text: ' (parfois transcrit '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mès
  - type: text
    text: ), « créé », « engendré » ou « issu de », habituellement associé au nom d'une divinité. En Exode 2.10
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ' il est rattaché, par assonance, à une racine hébraïque signifiant « retirer ». Dans le récit biblique, le nom suggère en effet l''action providentielle de Dieu, qui a sauvé l''enfant de la mort et qui l''insère dans les milieux de la cour.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''entrée de Moïse, par mariage, dans un clan de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Madianites
  - type: text
    text: ' (descendants d''Abraham par Qetoura, cf. Gn 25.2) revêt peut-être une importance appréciable. Jéthro, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: alias
  - type: text
    text: ' Réouel (Ex 2.18 ; 3.1 ; cf. Hobab en Nb 10.29 ; '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Réouel
  - type: text
    text: ' signifie « ami d''El » ou « ami de Dieu », cf. Ex 33.11), dont Moïse est devenu le gendre, est en effet présenté comme '
  - type: usfm
    marker: it
    children:
    - type: text
      text: prêtre de Madiân
  - type: text
    text: ' (Ex 2.16 ; 3.1). On peut voir dans le rapprochement de Moïse avec lui une sorte de préparation providentielle à la révélation qui va suivre.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 3 à 7.13
- type: usfm
  marker: ip
  children:
  - type: text
    text: Moïse se trouve à la montagne de Dieu en ce lieu du buisson (
  - type: usfm
    marker: it
    children:
    - type: text
      text: sené
  - type: text
    text: ') qui rappelle le nom du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sinaï
  - type: text
    text: ' — mais la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: localisation
  - type: text
    text: ' exacte de ces lieux privilégiés demeure une question ouverte.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Au buisson ardent (chap. 3), Dieu révèle '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: son nom*
  - type: text
    text: ', que la tradition juive s''abstiendra de prononcer (cf. 20.7) et qui nous est parvenu sous la forme dite du « Tétragramme », les quatre lettres correspondant à YHWH. La révélation rattache ce nom, au moins théologiquement, à un verbe habituellement traduit par '
  - type: usfm
    marker: it
    children:
    - type: text
      text: être
  - type: text
    text: ' ou '
  - type: usfm
    marker: it
    children:
    - type: text
      text: devenir
  - type: text
    text: ' (3.14'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ). C'est ce rapprochement qui a incité les Réformateurs protestants du XVI
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle à tenter de traduire YHWH par « l''Eternel » ; mais le texte évoque moins une éternité intemporelle que la présence active du Dieu d''Israël dans l''histoire même de son peuple (cf. 3.12'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '). Depuis bien longtemps, quand ils lisent ce nom sacré dans le texte hébreu, les juifs prononcent un autre mot, le plus souvent '
  - type: usfm
    marker: it
    children:
    - type: text
      text: ’Adonaï
  - type: text
    text: ', qui signifie « Seigneur ». Cette pratique a été suivie par les Juifs de langue grecque qui ont généralement rendu le Tétragramme par le mot grec '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Kurios
  - type: text
    text: ' (= Seigneur) dans la traduction des '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante
  - type: text
    text: ', laquelle allait devenir la principale référence des premiers chrétiens (cf. Rm 10.9-13). C''est ainsi que pour les chrétiens comme pour les juifs la confession de la foi restera liée à la révélation du buisson ardent : c''est le Seigneur (ainsi la présente traduction rend-elle le plus souvent le nom YHWH) qui est avec les siens et qui les fait sortir de toutes les servitudes.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''apparition dans '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: le feu inextinguible
  - type: text
    text: ' (Ex 3.2 ; comme à Abraham dans la fournaise, en Gn 15) ainsi que l''arsenal de prodiges destinés à convaincre le pharaon posent le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) comme le véritable maître de la nature, face aux Baals* et aux quelque 2000 figures du panthéon égyptien.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le sacrifice à trois journées de marche (Ex 3.18 ; cf. Gn 22.4) évoque probablement '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: une fête de printemps
  - type: text
    text: ' à laquelle se substituera ensuite la'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Pâque
  - type: text
    text: ' (voir calendrier*).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''attitude méprisante affichée par le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: pharaon
  - type: text
    text: ' à l''égard du Dieu d''Israël (Ex 5.2) fait place à la connaissance qu''il va en acquérir, lui et le monde entier (8.6,18 ; 9.14,16,29 ; 11.7 ; 14.4).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: La seconde narration (6.1–7.13) a pour effet de mettre encore plus fortement en évidence le rôle de Dieu dans cette libération.
- type: usfm
  marker: is2
  children:
  - type: text
    text: De 7.14 au chap. 11
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le nombre de fléaux retenu par les divers textes est variable : le Psaume 78 (v. 44-51) et le Psaume 105 (v. 28-36) en rapportent chacun sept, mais pas les mêmes. Le problème majeur est en fait celui de l'''
  - type: usfm
    marker: bd
    children:
    - type: text
      text: obstination du pharaon
  - type: text
    text: '  : on lit que le pharaon s''entête (7.13,22 ; 8.15) ou qu''il se montre obtus (8.11 ; 9.34), mais aussi que Dieu lui-même fait en sorte qu''il s''obstine (7.3 ; 9.12 ; 10.1,20,27 ; 11.10). L''articulation entre ces formules n''est pas simple. Elle est à rechercher dans la direction du libre choix de Dieu, qui fait grâce à qui il fait grâce (Ex 33.19 ; Rm 9.14-18).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: On pourrait lire avec fruit, à ce sujet, l'extrait de la tradition des Juifs rapportée par Edmond Fleg (
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moïse raconté par les sages)
  - type: text
    text: '  :'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Que fait un seigneur de guerre, quand il veut réduire ses ennemis ? Il enveloppe leur citadelle et coupe leurs approvisionnements d'eau. S'ils se rendent, c'est bien ; sinon, il fait approcher ses fanfares qui les épouvantent de leur bruit. S'ils se rendent, c'est bien ; sinon, il fait approcher ses archers, qui leur décochent des flèches. S'ils se rendent, c'est bien ; sinon, il fait approcher ses troupes de toutes contrées, pour montrer sa force ; puis il égorge leurs troupeaux ; puis il verse sur eux l'huile bouillante ; il lance sur eux les boulets de pierre ; il escalade leurs murs ; il les enchaîne dans leurs geôles. S'ils se rendent, c'est bien ; sinon, il massacre leurs chefs.
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ainsi fit Dieu à l'égard des Egyptiens…
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Mais voyez combien l''homme de guerre diffère du Dieu de guerre : l''homme de guerre, quand il veut abattre son ennemi, l''attaque par surprise ; il n''espace point ses coups, et quand il le tient sous sa sandale, il l''achève ; mais Dieu avertit par dix fois le Pharaon, par dix fois il lui laissa le répit du repentir, et avant de le châtier, par dix fois, il lui fit grâce.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 12 et 13
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Chacun le constatera aisément, le chapitre 12 revêt simultanément le caractère d''une prescription sur la manière de célébrer la Pâque et celui d''une narration de la dernière nuit en Egypte. On y observe conjointement deux rituels, l''un concernant '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: l'agneau
  - type: text
    text: ' (ou chevreau), en rapport avec les premiers-nés, l''autre relatif aux'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: pains nouveaux
  - type: text
    text: ' (sans adjonction de levain naturel, c''est-à-dire de pâte ancienne ; cf. 1Co 5.7). Ces deux rituels étaient, semble-t-il, habituels chez les bergers nomades : mais par la volonté du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur (YHWH)
  - type: text
    text: ' ils vont prendre le sens d''un rappel perpétuel de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: naissance de la nation
  - type: text
    text: ' que Dieu a choisie et libérée.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le rite protecteur du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sang
  - type: text
    text: '* grâce auquel le malheur '
  - type: usfm
    marker: it
    children:
    - type: text
      text: passe par-dessus
  - type: text
    text: ' (ou '
  - type: usfm
    marker: it
    children:
    - type: text
      text: saute,
  - type: text
    text: ' selon l''étymologie du mot hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pessah
  - type: text
    text: ' = '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Pâque
  - type: text
    text: ) les maisons, est déjà prégnant des riches développements symboliques qui s'ensuivront dans les traditions juive et chrétienne.
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 14 à 15.21
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le passage de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mer des Joncs
  - type: text
    text: ' (diverses localisations : voir la carte p.${Xcartex}) a été compris de bien des manières. Le livre de l''Exode en montre déjà divers éclairages. Le récit insiste sur la grâce toute-puissante de Dieu, qui mène toute l''action, tandis que le peuple apeuré doit demeurer immobile et spectateur du déploiement de la Providence (14.13s).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ici encore, on remarquera la participation des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: femmes
  - type: text
    text: ', et en particulier de la prophétesse Miriam, à la célébration liturgique de la victoire de Dieu ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Il a jeté dans la mer le cheval et son cavalier
  - type: text
    text: ', 15.1). Elles étaient présentes au début (1.15ss), elles sont encore là au dénouement.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: De 15.22 au chap. 17
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après l''obstination funeste du pharaon, voici que le peuple libéré se livre à son tour à la contestation. Le thème de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mise à l'épreuve
  - type: text
    text: ' apparaît à trois reprises : à Mara parce que l''eau est saumâtre (15.22-25), au désert parce que le peuple craint de manquer de nourriture (16.1-4) et à Rephidim parce que le peuple a soif (17.2,7'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  : « provoquer » ou « tenter » = « mettre à l''épreuve »).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La traversée du désert est aussi l''occasion de l''apprentissage de la vie dans la foi. A propos de la manne, le peuple reçoit un enseignement très clair sur le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sabbat*
  - type: text
    text: ' (chap. 16).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''idée d''un '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: livre du souvenir
  - type: text
    text: ', préfiguration de la Bible, fait suite à la victoire de la prière contre Amalec (17.14). Désormais tous les hommes libres devront se savoir « sortis d''Egypte ».'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 18 (Jéthro)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le beau-père de Moïse, déjà présent aux chapitres 2 et 3, réapparaît ici. Ce prêtre madianite exerce manifestement une certaine influence sur Israël. Il préconise pour le peuple une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: organisation de type militaire
  - type: text
    text: ' que Moïse adoptera.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: repas
  - type: text
    text: ' (v. 12) accompagnant le sacrifice de communion est une anticipation de la célébration de la première alliance au chapitre 24.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: II. L'alliance
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 19 à 24
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les préparatifs de la grande manifestation de Dieu occupent tout le chapitre 19. Le peuple s''y voit désigné comme un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: royaume de prêtres
  - type: text
    text: ' (v. 6) — formule où l''on a pu voir déjà posé le principe d''un sacerdoce universel où chacun peut être instruit de Dieu et l''approcher, dans les limites permises. L''aspect de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: manifestation divine
  - type: text
    text: ' est celui d''une éruption volcanique s''ajoutant à un orage. A nouveau le feu (v. 18) est signe de la présence de Dieu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: « Dix commandements »
  - type: text
    text: ' du chapitre 20 sont appelés '
  - type: usfm
    marker: it
    children:
    - type: text
      text: les Dix paroles
  - type: text
    text: ' en Exode 34.28 (/ /Dt 4.13 ; 10.4). Ce décalogue est un don, un message, un enseignement, suivant le sens primitif du mot '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Torah
  - type: text
    text: ' (voir loi*), avant d''être un recueil de préceptes et d''interdictions.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Il est immédiatement suivi par le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Code de l'alliance
  - type: text
    text: ' (20.22–23.33). C''est une collection de préceptes pratiques qui concernent aussi bien l''autel de pierres brutes (20.22-26) que quantité de points touchant la vie d''une société rurale encore peu éloignée du nomadisme.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le chapitre 24, avec la première conclusion de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: l'alliance
  - type: text
    text: ', est capital. Selon le Nouveau Testament, Jésus y fera référence en évoquant le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sang de l'alliance
  - type: text
    text: ' (Mc 14.24 ; Mt 26.28 ; cf. Ex 24.8) et même '
  - type: usfm
    marker: it
    children:
    - type: text
      text: la nouvelle alliance en
  - type: text
    text: ' son '
  - type: usfm
    marker: it
    children:
    - type: text
      text: sang
  - type: text
    text: ' (1Co 11.25 ; cf. Lc 22.20). Fait rarissime dans la Bible (cf. aussi Es 6.1), les soixante-dix anciens '
  - type: usfm
    marker: it
    children:
    - type: text
      text: virent le Dieu d'Israël ; puis ils mangèrent et burent
  - type: text
    text: ', comme cela se faisait ordinairement pour conclure une alliance entre humains (Ex 24.9ss ; cf. 18.12 ; Gn 31.46,54).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: III. La demeure de Dieu
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 25 à 40
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Trois éléments sont à prendre en considération dans cette importante partie du livre : l''échec du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: taurillon
  - type: text
    text: ' ou « veau d''or », le renouvellement de l''alliance et la confection du sanctuaire démontable, signe de la présence réconciliée de Dieu parmi son peuple.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le «  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: veau d'or
  - type: text
    text: '  » (Ex 32 ; cf. 1R 12.26-33) est typique de ce qui se produit lorsque l''humanité prétend rendre un culte à la divinité sans passer par la révélation biblique du Sinaï. Les intentions sont excellentes, mais l''erreur de cible est manifeste.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cependant l''échec précède souvent une progression inespérée. Une fois le peuple châtié en raison de son idolâtrie (Ex 32.35), Moïse reçoit une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: nouvelle révélation
  - type: text
    text: ' du Dieu qui fait grâce à qui il fait grâce (Ex 32.30-35 ; 33.12-23).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Après le renouvellement de l''alliance (chap. 34) qui est à mettre en parallèle, pour son contenu théologique, avec le chapitre 24, le peuple peut enfin travailler d''un cœur joyeux à la construction du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sanctuaire
  - type: text
    text: . Les normes données ici sont à rapprocher de celles qui seront utilisées au début de la monarchie israélite, lors de l'édification « en dur » du sanctuaire royal. Nous sommes à mi-parcours entre le petit sanctuaire sémitique de Timna, retrouvé en 1969 dans les sables (voir l'encadré p.${Xtimna}), et la splendeur future du temple* de Salomon.
