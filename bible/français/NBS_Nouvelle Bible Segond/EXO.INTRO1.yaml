  - type: text
    content: . Les normes données ici sont à rapprocher de celles qui seront utilisées au début de la monarchie israélite, lors de l'édification « en dur » du sanctuaire royal. Nous sommes à mi-parcours entre le petit sanctuaire sémitique de Timna, retrouvé en 1969 dans les sables (voir l'encadré p.${Xtimna}), et la splendeur future du temple* de Salomon.
