document_id: EXO.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Une mémoire vivante
  - type: text
    content: 'Le livre de l''Exode est la mémoire vivante d''un peuple qui se comprend comme peuple de Dieu. Le récit de l''institution de la Pâque l''indique déjà : '
  - type: text
    content: 'Lorsque demain ton fils te demandera : « Que signifie cela ? », tu lui répondras : « A la force de sa main, le Seigneur nous a fait sortir de l''Egypte, de la maison d''esclavage. »'
  - type: text
    content: ' (Ex 13.14.) On sait par ailleurs que, plus tard, des cultivateurs offrant à Dieu les prémices de leurs récoltes réciteront : '
  - type: text
    content: Mon père
  - type: text
    content: ' (Jacob, selon toute vraisemblance) '
  - type: text
    content: était un Araméen nomade
  - type: text
    content: '  ; '
  - type: text
    content: il est descendu en Egypte avec peu de gens… Les Egyptiens nous ont… soumis à un dur esclavage. Nous avons crié vers le Seigneur, le Dieu de nos pères… D'une main forte, d'un bras étendu…
  - type: text
    content: ' '
  - type: text
    content: le Seigneur nous a fait sortir d'Egypte
  - type: text
    content: ' . '
  - type: text
    content: Il nous a amenés dans ce lieu et il nous a donné ce pays, un pays ruisselant de lait et de miel
  - type: text
    content: ' (Dt 26.5-11).'
  - type: text
    content: 'Cette mémoire de l''Exode jalonne toute l''histoire de l''Israël biblique. Elle fonde sa '
  - type: text
    content: conscience nationale
  - type: text
    content: '. Ainsi le pacte de Sichem qui fédère en une seule nation tous les clans et tribus susceptibles d''oublier leurs liens communs s''appuie sur ce seul argument : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) a '
  - type: text
    content: fait sortir vos pères de l'Egypte,
  - type: text
    content: ' choisissez donc dès maintenant votre camp (Jos 24.4-15,25-28). Abraham s''était vu prédire cet événement (Gn 15.13-16). Le prophète Elie accomplira le long voyage du Carmel à l''Horeb pour retrouver, dans la pureté vivifiante du désert, les conditions historiques du face à face avec Dieu et le sens véritable de sa mission. Puis ce sont Amos (2.10 ; 3.1s ; 5.25), Osée (11.1-4), Michée (6.1-5), Jérémie (31.31-33) ou Esaïe (40ss) qui sans cesse reviennent aux thèmes de l''Exode. C''est encore le cas de la quasi-totalité des psaumes « historiques » (78 ; 81 ; 105 ; 106 ; 114 ; 135 ; 136).'
  - type: text
    content: Le Nouveau Testament, pour sa part, est tout imprégné du souvenir de l'Exode. Spécialement dans les discours des Actes (par exemple celui d'Etienne en Ac 7) et dans l'Apocalypse, qui exploite le symbolisme des plaies d'Egypte et celui de l'agneau immolé, présent dans onze de ses chapitres.
  - type: text
    content: 'Cette fonction de '
  - type: text
    content: mémoire vivante
  - type: text
    content: ' s''annonce déjà dans le premier verset du livre de l''Exode. La liste des ancêtres, placée à cet endroit, a pour fonction de rappeler à tous les clans et tribus d''Israël qu''ils ont effectivement été opprimés en Egypte et qu''ils ont eu part à une libération qui est l''œuvre de Dieu. Selon le '
  - type: text
    content: Talmud
  - type: text
    content: '*, Rabbi Gamaliel (Gamaliel I ou II ? cf. Ac 5.34'
  - type: text
    content: n
  - type: text
    content: '  ; 22.3) aurait enseigné que tout fidèle a le devoir de se considérer comme ayant été personnellement tiré d''Egypte.'
  - type: text
    content: Le cadre historique
  - type: text
    content: Les liens entre l'
  - type: text
    content: Egypte
  - type: text
    content: ' et Canaan sont constants. La table des nations de Genèse 10 présente les deux peuples comme '
  - type: text
    content: fils de Cham
  - type: text
    content: ' (Gn 10.6). Pour autant l''Exode est peu loquace sur sa propre insertion dans le contexte égyptien. C''est le développement considérable de l''égyptologie depuis le déchiffrement des hiéroglyphes au XIX'
  - type: text
    content: e
  - type: text
    content: ' siècle (Champollion est mort en 1842) qui a suscité la curiosité des modernes en la matière. L''histoire biblique, elle, est avant tout une histoire théologique, et les listes de pharaons y interviennent peu. Ce qui est rapporté dans les quinze premiers chapitres de l''Exode pourrait correspondre à plusieurs dynasties (voir « Les “pharaons” », p.${Xpharaons}). Les hypothèses s''échelonnent du XVI'
  - type: text
    content: e
  - type: text
    content: ' jusqu''au XII'
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C., sans jamais retenir l''adhésion de tous les spécialistes. En fait, toutes les correspondances entre le récit de l''Exode et l''histoire égyptienne, dans l''état présent de sa reconstitution, restent douteuses ; elles n''apportent en tout état de cause qu''un éclairage limité au texte biblique.'
  - type: text
    content: Qui sont les Hébreux ?
  - type: text
    content: 'La dénomination '
  - type: text
    content: Hébreu(x)
  - type: text
    content: ' apparaît 34 fois dans l''Ancien Testament, dont 14 dans l''Exode. Ce sont généralement des étrangers qui désignent ainsi les Israélites, dans un contexte où ceux-ci sont considérés comme des travailleurs immigrés. Le mot lui-même pourrait signifier « qui vient d''au-delà » ou « de l''autre côté » ; d''après cette étymologie, il pourrait s''appliquer à des Transjordaniens ou à des Transeuphratiens (cf. Gn 10.21'
  - type: text
    content: n
  - type: text
    content: '). Dans cette hypothèse, il ne désignerait pas à l''origine une ethnie particulière, mais plutôt un certain type de population nomade, souvent fière et batailleuse, capable aussi, parfois, de vendre ses services (le terme '
  - type: text
    content: hébreu
  - type: text
    content: ' s''applique à des esclaves de maîtres israélites en Ex 21.2 ; Dt 15.12 ; Jr 34.9,14).'
  - type: text
    content: 'Il n''est pas possible d''évoquer ce mot sans le rapprocher des nombreuses mentions de groupes '
  - type: text
    content: habirou
  - type: text
    content: ' ou '
  - type: text
    content: ‘apirou
  - type: text
    content: ' dans les documents administratifs de tout le Proche-Orient, depuis la fin du III'
  - type: text
    content: e
  - type: text
    content: ' millénaire. Les « Hébreux » ne seraient-ils pas aussi de ces Habirou ?'
  - type: text
    content: Délimitation et plan
  - type: text
    content: Suite naturelle de la Genèse, le livre de l'Exode est aussi le préalable obligé à la compréhension des trois livres qui lui font suite. On pressent bien que le découpage en cinq volumes (notre mot « Pentateuque » transcrit un terme grec qui désigne, au propre, les « cinq étuis » où se logeaient les rouleaux) est un arrangement postérieur. Il était cependant connu de Philon* d'Alexandrie au I
  - type: text
    content: er
  - type: text
    content: ' siècle et, avant lui, de la version grecque des '
  - type: text
    content: Septante
  - type: text
    content: ' (LXX*, à partir du III'
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C.). Ce sont d''ailleurs des manuscrits de cette dernière qui donnent à notre livre le titre d’'
  - type: text
    content: Exodos
  - type: text
    content: ' (= « sortie » ; l''un d''eux précise '
  - type: text
    content: Exodos Aiguptou
  - type: text
    content: ', « sortie d''Egypte »).'
  - type: text
    content: 'Le '
  - type: text
    content: plan
  - type: text
    content: ', symétrique autour d''une partie centrale (l''alliance*), oppose deux types de service ou d''esclavage (service du pharaon et service de Dieu), deux types de difficultés (les réticences du pharaon et celles du peuple) et deux types d''organisation (le rituel de la Pâque et le sanctuaire du désert).'
  - type: text
    content: 'L''arrangement tripartite classique n''en perd pas pour autant sa pertinence :'
  - type: text
    content: I. Dieu libère son peuple (1–18)
  - type: text
    content: II. Dieu fait alliance avec son peuple (19–24)
  - type: text
    content: III. Dieu établit sa demeure au sein de son peuple (25–40).
  - type: text
    content: Remarques sur les contenus narratifs
  - type: text
    content: I. La sortie d'Egypte
  - type: text
    content: Chap. 1 et 2
  - type: text
    content: Avec un vocabulaire repris de la Genèse, l'histoire insiste sur la multiplication extraordinaire des fils de Jacob et, dans les circonstances politiques que nous avons évoquées plus haut, sur le rôle éminent des
  - type: text
    content: femmes
  - type: text
    content: '. Les mères, les sages-femmes, la mère de Moïse (dont le nom rappelle celui du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Yokébed = « Gloire de YHWH »), sa sœur, et jusqu''à la fille du pharaon et ses suivantes, contrecarrent le plan de génocide.'
  - type: text
    content: 'On rapproche habituellement le nom de '
  - type: text
    content: Moïse
  - type: text
    content: ' (hébreu '
  - type: text
    content: Moshé
  - type: text
    content: ') de l''égyptien '
  - type: text
    content: mosis
  - type: text
    content: ' (parfois transcrit '
  - type: text
    content: mès
  - type: text
    content: ), « créé », « engendré » ou « issu de », habituellement associé au nom d'une divinité. En Exode 2.10
  - type: text
    content: n
  - type: text
    content: ' il est rattaché, par assonance, à une racine hébraïque signifiant « retirer ». Dans le récit biblique, le nom suggère en effet l''action providentielle de Dieu, qui a sauvé l''enfant de la mort et qui l''insère dans les milieux de la cour.'
  - type: text
    content: 'L''entrée de Moïse, par mariage, dans un clan de '
  - type: text
    content: Madianites
  - type: text
    content: ' (descendants d''Abraham par Qetoura, cf. Gn 25.2) revêt peut-être une importance appréciable. Jéthro, '
  - type: text
    content: alias
  - type: text
    content: ' Réouel (Ex 2.18 ; 3.1 ; cf. Hobab en Nb 10.29 ; '
  - type: text
    content: Réouel
  - type: text
    content: ' signifie « ami d''El » ou « ami de Dieu », cf. Ex 33.11), dont Moïse est devenu le gendre, est en effet présenté comme '
  - type: text
    content: prêtre de Madiân
  - type: text
    content: ' (Ex 2.16 ; 3.1). On peut voir dans le rapprochement de Moïse avec lui une sorte de préparation providentielle à la révélation qui va suivre.'
  - type: text
    content: Chap. 3 à 7.13
  - type: text
    content: Moïse se trouve à la montagne de Dieu en ce lieu du buisson (
  - type: text
    content: sené
  - type: text
    content: ') qui rappelle le nom du '
  - type: text
    content: Sinaï
  - type: text
    content: ' — mais la '
  - type: text
    content: localisation
  - type: text
    content: ' exacte de ces lieux privilégiés demeure une question ouverte.'
  - type: text
    content: 'Au buisson ardent (chap. 3), Dieu révèle '
  - type: text
    content: son nom*
  - type: text
    content: ', que la tradition juive s''abstiendra de prononcer (cf. 20.7) et qui nous est parvenu sous la forme dite du « Tétragramme », les quatre lettres correspondant à YHWH. La révélation rattache ce nom, au moins théologiquement, à un verbe habituellement traduit par '
  - type: text
    content: être
  - type: text
    content: ' ou '
  - type: text
    content: devenir
  - type: text
    content: ' (3.14'
  - type: text
    content: n
  - type: text
    content: ). C'est ce rapprochement qui a incité les Réformateurs protestants du XVI
  - type: text
    content: e
  - type: text
    content: ' siècle à tenter de traduire YHWH par « l''Eternel » ; mais le texte évoque moins une éternité intemporelle que la présence active du Dieu d''Israël dans l''histoire même de son peuple (cf. 3.12'
  - type: text
    content: n
  - type: text
    content: '). Depuis bien longtemps, quand ils lisent ce nom sacré dans le texte hébreu, les juifs prononcent un autre mot, le plus souvent '
  - type: text
    content: ’Adonaï
  - type: text
    content: ', qui signifie « Seigneur ». Cette pratique a été suivie par les Juifs de langue grecque qui ont généralement rendu le Tétragramme par le mot grec '
  - type: text
    content: Kurios
  - type: text
    content: ' (= Seigneur) dans la traduction des '
  - type: text
    content: Septante
  - type: text
    content: ', laquelle allait devenir la principale référence des premiers chrétiens (cf. Rm 10.9-13). C''est ainsi que pour les chrétiens comme pour les juifs la confession de la foi restera liée à la révélation du buisson ardent : c''est le Seigneur (ainsi la présente traduction rend-elle le plus souvent le nom YHWH) qui est avec les siens et qui les fait sortir de toutes les servitudes.'
  - type: text
    content: 'L''apparition dans '
  - type: text
    content: le feu inextinguible
  - type: text
    content: ' (Ex 3.2 ; comme à Abraham dans la fournaise, en Gn 15) ainsi que l''arsenal de prodiges destinés à convaincre le pharaon posent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) comme le véritable maître de la nature, face aux Baals* et aux quelque 2000 figures du panthéon égyptien.'
  - type: text
    content: 'Le sacrifice à trois journées de marche (Ex 3.18 ; cf. Gn 22.4) évoque probablement '
  - type: text
    content: une fête de printemps
  - type: text
    content: ' à laquelle se substituera ensuite la'
  - type: text
    content: Pâque
  - type: text
    content: ' (voir calendrier*).'
  - type: text
    content: 'L''attitude méprisante affichée par le '
  - type: text
    content: pharaon
  - type: text
    content: ' à l''égard du Dieu d''Israël (Ex 5.2) fait place à la connaissance qu''il va en acquérir, lui et le monde entier (8.6,18 ; 9.14,16,29 ; 11.7 ; 14.4).'
  - type: text
    content: La seconde narration (6.1–7.13) a pour effet de mettre encore plus fortement en évidence le rôle de Dieu dans cette libération.
  - type: text
    content: De 7.14 au chap. 11
  - type: text
    content: 'Le nombre de fléaux retenu par les divers textes est variable : le Psaume 78 (v. 44-51) et le Psaume 105 (v. 28-36) en rapportent chacun sept, mais pas les mêmes. Le problème majeur est en fait celui de l'''
  - type: text
    content: obstination du pharaon
  - type: text
    content: '  : on lit que le pharaon s''entête (7.13,22 ; 8.15) ou qu''il se montre obtus (8.11 ; 9.34), mais aussi que Dieu lui-même fait en sorte qu''il s''obstine (7.3 ; 9.12 ; 10.1,20,27 ; 11.10). L''articulation entre ces formules n''est pas simple. Elle est à rechercher dans la direction du libre choix de Dieu, qui fait grâce à qui il fait grâce (Ex 33.19 ; Rm 9.14-18).'
  - type: text
    content: On pourrait lire avec fruit, à ce sujet, l'extrait de la tradition des Juifs rapportée par Edmond Fleg (
  - type: text
    content: Moïse raconté par les sages)
  - type: text
    content: '  :'
  - type: text
    content: Que fait un seigneur de guerre, quand il veut réduire ses ennemis ? Il enveloppe leur citadelle et coupe leurs approvisionnements d'eau. S'ils se rendent, c'est bien ; sinon, il fait approcher ses fanfares qui les épouvantent de leur bruit. S'ils se rendent, c'est bien ; sinon, il fait approcher ses archers, qui leur décochent des flèches. S'ils se rendent, c'est bien ; sinon, il fait approcher ses troupes de toutes contrées, pour montrer sa force ; puis il égorge leurs troupeaux ; puis il verse sur eux l'huile bouillante ; il lance sur eux les boulets de pierre ; il escalade leurs murs ; il les enchaîne dans leurs geôles. S'ils se rendent, c'est bien ; sinon, il massacre leurs chefs.
  - type: text
    content: Ainsi fit Dieu à l'égard des Egyptiens…
  - type: text
    content: 'Mais voyez combien l''homme de guerre diffère du Dieu de guerre : l''homme de guerre, quand il veut abattre son ennemi, l''attaque par surprise ; il n''espace point ses coups, et quand il le tient sous sa sandale, il l''achève ; mais Dieu avertit par dix fois le Pharaon, par dix fois il lui laissa le répit du repentir, et avant de le châtier, par dix fois, il lui fit grâce.'
  - type: text
    content: Chap. 12 et 13
  - type: text
    content: 'Chacun le constatera aisément, le chapitre 12 revêt simultanément le caractère d''une prescription sur la manière de célébrer la Pâque et celui d''une narration de la dernière nuit en Egypte. On y observe conjointement deux rituels, l''un concernant '
  - type: text
    content: l'agneau
  - type: text
    content: ' (ou chevreau), en rapport avec les premiers-nés, l''autre relatif aux'
  - type: text
    content: pains nouveaux
  - type: text
    content: ' (sans adjonction de levain naturel, c''est-à-dire de pâte ancienne ; cf. 1Co 5.7). Ces deux rituels étaient, semble-t-il, habituels chez les bergers nomades : mais par la volonté du '
  - type: text
    content: Seigneur (YHWH)
  - type: text
    content: ' ils vont prendre le sens d''un rappel perpétuel de la '
  - type: text
    content: naissance de la nation
  - type: text
    content: ' que Dieu a choisie et libérée.'
  - type: text
    content: 'Le rite protecteur du '
  - type: text
    content: sang
  - type: text
    content: '* grâce auquel le malheur '
  - type: text
    content: passe par-dessus
  - type: text
    content: ' (ou '
  - type: text
    content: saute,
  - type: text
    content: ' selon l''étymologie du mot hébreu '
  - type: text
    content: Pessah
  - type: text
    content: ' = '
  - type: text
    content: Pâque
  - type: text
    content: ) les maisons, est déjà prégnant des riches développements symboliques qui s'ensuivront dans les traditions juive et chrétienne.
  - type: text
    content: Chap. 14 à 15.21
  - type: text
    content: 'Le passage de la '
  - type: text
    content: mer des Joncs
  - type: text
    content: ' (diverses localisations : voir la carte p.${Xcartex}) a été compris de bien des manières. Le livre de l''Exode en montre déjà divers éclairages. Le récit insiste sur la grâce toute-puissante de Dieu, qui mène toute l''action, tandis que le peuple apeuré doit demeurer immobile et spectateur du déploiement de la Providence (14.13s).'
  - type: text
    content: 'Ici encore, on remarquera la participation des '
  - type: text
    content: femmes
  - type: text
    content: ', et en particulier de la prophétesse Miriam, à la célébration liturgique de la victoire de Dieu ('
  - type: text
    content: Il a jeté dans la mer le cheval et son cavalier
  - type: text
    content: ', 15.1). Elles étaient présentes au début (1.15ss), elles sont encore là au dénouement.'
  - type: text
    content: De 15.22 au chap. 17
  - type: text
    content: 'Après l''obstination funeste du pharaon, voici que le peuple libéré se livre à son tour à la contestation. Le thème de la '
  - type: text
    content: mise à l'épreuve
  - type: text
    content: ' apparaît à trois reprises : à Mara parce que l''eau est saumâtre (15.22-25), au désert parce que le peuple craint de manquer de nourriture (16.1-4) et à Rephidim parce que le peuple a soif (17.2,7'
  - type: text
    content: n
  - type: text
    content: '  : « provoquer » ou « tenter » = « mettre à l''épreuve »).'
  - type: text
    content: 'La traversée du désert est aussi l''occasion de l''apprentissage de la vie dans la foi. A propos de la manne, le peuple reçoit un enseignement très clair sur le '
  - type: text
    content: sabbat*
  - type: text
    content: ' (chap. 16).'
  - type: text
    content: 'L''idée d''un '
  - type: text
    content: livre du souvenir
  - type: text
    content: ', préfiguration de la Bible, fait suite à la victoire de la prière contre Amalec (17.14). Désormais tous les hommes libres devront se savoir « sortis d''Egypte ».'
  - type: text
    content: Chap. 18 (Jéthro)
  - type: text
    content: 'Le beau-père de Moïse, déjà présent aux chapitres 2 et 3, réapparaît ici. Ce prêtre madianite exerce manifestement une certaine influence sur Israël. Il préconise pour le peuple une '
  - type: text
    content: organisation de type militaire
  - type: text
    content: ' que Moïse adoptera.'
  - type: text
    content: 'Le '
  - type: text
    content: repas
  - type: text
    content: ' (v. 12) accompagnant le sacrifice de communion est une anticipation de la célébration de la première alliance au chapitre 24.'
  - type: text
    content: II. L'alliance
  - type: text
    content: Chap. 19 à 24
  - type: text
    content: 'Les préparatifs de la grande manifestation de Dieu occupent tout le chapitre 19. Le peuple s''y voit désigné comme un '
  - type: text
    content: royaume de prêtres
  - type: text
    content: ' (v. 6) — formule où l''on a pu voir déjà posé le principe d''un sacerdoce universel où chacun peut être instruit de Dieu et l''approcher, dans les limites permises. L''aspect de la '
  - type: text
    content: manifestation divine
  - type: text
    content: ' est celui d''une éruption volcanique s''ajoutant à un orage. A nouveau le feu (v. 18) est signe de la présence de Dieu.'
  - type: text
    content: 'Les '
  - type: text
    content: « Dix commandements »
  - type: text
    content: ' du chapitre 20 sont appelés '
  - type: text
    content: les Dix paroles
  - type: text
    content: ' en Exode 34.28 (/ /Dt 4.13 ; 10.4). Ce décalogue est un don, un message, un enseignement, suivant le sens primitif du mot '
  - type: text
    content: Torah
  - type: text
    content: ' (voir loi*), avant d''être un recueil de préceptes et d''interdictions.'
  - type: text
    content: 'Il est immédiatement suivi par le '
  - type: text
    content: Code de l'alliance
  - type: text
    content: ' (20.22–23.33). C''est une collection de préceptes pratiques qui concernent aussi bien l''autel de pierres brutes (20.22-26) que quantité de points touchant la vie d''une société rurale encore peu éloignée du nomadisme.'
  - type: text
    content: 'Le chapitre 24, avec la première conclusion de '
  - type: text
    content: l'alliance
  - type: text
    content: ', est capital. Selon le Nouveau Testament, Jésus y fera référence en évoquant le '
  - type: text
    content: sang de l'alliance
  - type: text
