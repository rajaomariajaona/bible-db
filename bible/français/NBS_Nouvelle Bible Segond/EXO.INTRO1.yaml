    content: Chap. 25 à 40
  - type: text
    content: 'Trois éléments sont à prendre en considération dans cette importante partie du livre : l''échec du '
  - type: text
    content: taurillon
  - type: text
    content: ' ou « veau d''or », le renouvellement de l''alliance et la confection du sanctuaire démontable, signe de la présence réconciliée de Dieu parmi son peuple.'
  - type: text
    content: 'Le «  '
  - type: text
    content: veau d'or
  - type: text
    content: '  » (Ex 32 ; cf. 1R 12.26-33) est typique de ce qui se produit lorsque l''humanité prétend rendre un culte à la divinité sans passer par la révélation biblique du Sinaï. Les intentions sont excellentes, mais l''erreur de cible est manifeste.'
  - type: text
    content: 'Cependant l''échec précède souvent une progression inespérée. Une fois le peuple châtié en raison de son idolâtrie (Ex 32.35), Moïse reçoit une '
  - type: text
    content: nouvelle révélation
  - type: text
    content: ' du Dieu qui fait grâce à qui il fait grâce (Ex 32.30-35 ; 33.12-23).'
  - type: text
    content: 'Après le renouvellement de l''alliance (chap. 34) qui est à mettre en parallèle, pour son contenu théologique, avec le chapitre 24, le peuple peut enfin travailler d''un cœur joyeux à la construction du '
