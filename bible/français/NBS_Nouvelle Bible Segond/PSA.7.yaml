document_id: PSA.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Etablis mon droit
  - type: text
    content: ' '
  - type: note
    content: 'Complainte  : traduction incertaine d''un terme probablement technique ( shiggayôn ) qui n''apparaît qu''ici (et peut-être en Ha 3.1n). –  Koush, le Benjaminite  : personnage inconnu ; le nom Koush désignant habituellement la Nubie ; des versions anciennes l''ont parfois identifié au Koushite de 2S 18.21nss, mais aussi à Qish , le père du roi Saül ; de telles identifications n''ont aucun fondement.'
  - type: text
    content: 'Complainte. De David. Celle qu''il chanta pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au sujet de Koush, le Benjaminite.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'au mal…  : litt. au mal des méchants. –  sondes (autre traduction éprouves ) les cœurs et les reins  : cf. 11.4s ; 17.3 ; 26.2 ; 44.22 ; 139.1-3,23 ; 1S 16.7 ; Jr 11.20+ ; Jb 7.18n  ; Ap 2.23.'
  - type: text
    content: Mets un terme au mal que commettent les méchants, je t'en prie !
  - type: text
    content: Affermis le juste,
  - type: text
    content: toi qui sondes les cœurs et les reins, Dieu juste !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Mon bouclier 3.4+.
  - type: text
    content: Mon bouclier est auprès de Dieu,
  - type: text
    content: qui sauve ceux qui ont le cœur droit.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'juge juste 9.5 ; Jr 11.20+. –  un Dieu (hébreu ’El , Gn 21.33n) qui entre sans cesse (litt. en tout jour ) en fureur  : LXX il n''est pas furieux chaque jour  ; certains, d''après Syr, rattachent la fin au v. 13  : qui est toujours furieux si l''on ne revient pas à lui.'
  - type: text
    content: Dieu est un juge juste,
  - type: text
    content: un Dieu qui entre sans cesse en fureur.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur ; cf. v. 12n. – Certains pensent que le méchant (cf. v. 17 ; 11.2 ; 37.14s ; 94.23 ; Es 5.28) est le sujet sous-entendu des verbes dès le v. 13 ; toutefois LXX a lu  : si vous ne revenez pas, il (Dieu) aiguisera…  ; dans une telle perspective, Dieu pourrait être le sujet jusqu''à la fin du v. 14 ; cf. Lc 13.3.'
  - type: text
    content: S'il ne revient pas, il aiguise son épée,
  - type: text
    content: il bande son arc et l'apprête.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'C''est pour lui qu''il ou et il  ; cf. v. 13n. –  armes…  : cf. 11.6 ; 64.8 ; Dt 32.23.'
  - type: text
    content: C'est pour lui qu'il prépare des armes meurtrières,
  - type: text
    content: qu'il rend ses flèches brûlantes.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 59.4s ; Jb 15.35. –  Il conçoit  : d''autres comprennent il est en travail (la même racine évoque ailleurs les douleurs de l''accouchement ; cf. Es 13.8 ; 26.17), voir aussi Ct 8.5n. –  il porte (comme une femme enceinte) : autre traduction il conçoit. –  mal / oppression  : cf. v. 17 ; 10.7 ; 55.11 ; 90.10 ; Nb 23.21n  ; Es 10.1 ; Ha 1.3 ; Jb 4.8+.'
  - type: text
    content: Il conçoit le mal,
  - type: text
    content: il porte l'oppression, il accouche du mensonge.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.16 ; 35.7s ; 37.14s ; 57.7 ; 94.13,23 ; 140.6 ; 141.9s ; Jr 2.19 ; Pr 26.27 ; 28.10 ; Ec 10.8. –  fosse  : cf. 9.16 ; 16.10 etc.'
  - type: text
    content: Il ouvre une tranchée, il la creuse
  - type: text
    content: et il tombe dans la fosse qu'il a lui-même faite.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 140.10 ; Jb 4.8 ; Pr 5.22 ; 22.8 ; Est 9.25 ; Ga 6.7s.
  - type: text
    content: L'oppression qu'il a exercée retombe sur sa tête,
  - type: text
    content: sa violence redescend sur son crâne.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Je célébrerai  : cf. 1Ch 16.35. –  je chanterai  : le verbe hébreu correspondant est apparenté au mot traduit par psaume dans les suscriptions (un terme apparenté est traduit par mélodie en 81.3 ; 98.5 ; cf. 118.14n) ; il signifie aussi jouer de la musique  ; de même en 9.3,12 ; 18.50 ; 21.14n  ; 27.6 ; 30.5,13 ; 33.2 ; 47.7s ; 57.8,10 ; 59.18 ; 61.9 ; 66.2,4 ; 68.5,33 ; 71.22s ; 75.10 ; 92.2 ; 98.4ns ; 101.1 ; 104.33 ; 105.2 ; 108.2,4 ; 135.3 ; 138.1 ; 144.9 ; 146.2 ; 147.1,7 ; 149.3 ; Jg 5.3 ; Es 12.5 ; 1Ch 16.9 ; cf. Ps 13.6 ; Col 3.16.'
  - type: text
    content: 'Je célébrerai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' selon sa justice,'
  - type: text
    content: 'je chanterai le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Très-Haut.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'en toi que je trouve un abri  : cf. 2.12 ; 5.12 ; 11.1 ; 14.6 ; 16.1 ; 17.7 ; 18.3 ; 31.2-4,20 ; 34.9,23 ; 37.40 ; 46.2 ; 61.4 ; 71.1-3 ; 91.9 ; 104.18 ; 141.8 ; 142.6. –  sauve-moi de tous mes persécuteurs (ou de tous ceux qui me poursuivent ) 31.16 ; 35.3 ; 109.16 ; 119.84,86,157,161 ; certains modifient le texte hébreu traditionnel pour lire mon persécuteur (ou mon poursuivant ), cf. v. 7 ; voir aussi 109.31.'
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, c''est en toi que je trouve un abri ;'
  - type: text
    content: sauve-moi de tous mes persécuteurs, délivre-moi,
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'qu''ils ne me déchiquettent  : litt. qu''il ne me déchiquette (au singulier dans le texte) ; 17.12 ; 22.14 ; 50.22n  ; cf. 76.5n  ; 104.21 ; 111.5 ; 124.6 ( proie ). –  comme un lion 10.9 ; 17.12 ; 57.5 ; Es 5.29 ; Jr 2.15+. –  sans que personne délivre 50.22 ; 71.11 ; cf. Jg 18.28 ; Os 2.12 ; Jb 5.4 ; 10.7.'
  - type: text
    content: de peur qu'ils ne me déchiquettent,
  - type: text
    content: comme un lion qui arrache sans que personne délivre !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 17.3-5 ; 26.4s ; 1S 24.12 ; Jb 31.5ss.
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, si j''ai fait cela,'
  - type: text
    content: s'il y a de l'injustice sur mes mains,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'si j''ai dépouillé  : certains comprennent si j''ai laissé échapper (cf. 1S 15.9 ; le verbe hébreu peut avoir les deux sens). LXX a compris que je tombe sans défense devant mes adversaires.'
  - type: text
    content: si j'ai rendu le mal à celui qui vivait en paix avec moi,
  - type: text
    content: si j'ai dépouillé, sans raison, mon adversaire,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ma gloire  : l''expression est ici l''équivalent de ma vie  ; cf. 4.3 ; 16.9n  ; 30.13n  ; 57.9n  ; 108.2 ; Jr 2.11n  ; Os 4.7.'
  - type: text
    content: que l'ennemi me poursuive et m'atteigne,
  - type: text
    content: qu'il renverse ma vie à terre et la piétine,
  - type: text
    content: 'qu''il couche ma gloire dans la poussière ! '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '3.8+. –  Eveille-toi pour moi  : LXX éveille-toi, Seigneur mon Dieu  ; cf. 35.23+. –  ordonné l''équité  : autre traduction institué le droit.'
  - type: text
    content: 'Lève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans ta colère !'
  - type: text
    content: Dresse-toi contre la fureur de mes adversaires !
  - type: text
    content: Eveille-toi pour moi, toi qui as ordonné l'équité !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Reviens  : certains modifient le texte hébreu traditionnel pour lire installe-toi ou assieds-toi (position du roi ou du juge).'
  - type: text
    content: Que toute la communauté des peuples t'entoure !
  - type: text
    content: Reviens en haut au-dessus d'elle !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'juge les peuples 9.9 ; cf. 82.1 ; Es 3.13. –  Etablis mon droit ou juge-moi , comme en 26.1 ; 35.24 ; 43.1 ( rends-moi justice ) ; synonyme du verbe précédent. –  selon ma justice  : cf. 17.3+ ; 18.21.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' juge les peuples :'
  - type: text
    content: 'Etablis mon droit, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: selon ma justice et selon mon intégrité !
