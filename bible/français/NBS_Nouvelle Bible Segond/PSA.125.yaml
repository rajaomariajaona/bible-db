document_id: PSA.125,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ceux qui mettent leur confiance dans le Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'montées 120.1n. –  confiance 4.6+. –  comme le mont…  : plusieurs versions anciennes ont lu sur le mont… –  qui ne vacille pas  : cf. 15.5+ ; voir aussi 46.2,6 ; 78.68s ; 87.1,5 ; Es 14.32 ; Jl 4.20 ; 1Jn 2.17.'
  - type: text
    content: Chant des montées.
  - type: text
    content: 'Ceux qui mettent leur confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: sont comme le mont Sion, qui ne vacille pas,
  - type: text
    content: qui est là pour toujours.
  '2':
  - type: text
    content: ' '
  - type: note
    content: le Seigneur entoure 32.10 ; 34.8 ; Za 2.9. –  dès maintenant… 113.2+.
  - type: text
    content: Jérusalem est entourée de montagnes ;
  - type: text
    content: 'de même le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entoure son peuple,'
  - type: text
    content: dès maintenant et pour toujours.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le sceptre (ou le bâton , 2.9+) de la méchanceté (ou, selon des versions anciennes, du méchant ) : cf. Es 9.3 ; 14.5s ; Ez 7.11 ; Siracide 35.23 : « Sur les nations il (Dieu) fera retomber sa vengeance jusqu''à ce qu''il ait supprimé la foule des insolents et brisé le sceptre des injustes. » –  le lot des justes  : cf. 16.5n  ; 25.13 ; 37.11 ; Nb 26.55 ; Es 57.13 ; 60.21 ; 65.9.'
  - type: text
    content: Car le sceptre de la méchanceté ne reposera pas
  - type: text
    content: sur le lot des justes,
  - type: text
    content: afin que les justes ne tendent pas les mains vers l'injustice.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'sois bienfaisant…  : litt. sois bon pour les bons  ; cf. 18.25-27. –  qui ont le cœur droit 7.11.'
  - type: text
    content: Seigneur
  - type: text
    content: ', sois bienfaisant pour les gens de bien'
  - type: text
    content: et pour ceux qui ont le cœur droit !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.5s ; 92.10 ; Mt 7.23. –  voies tortueuses  : cf. Pr 2.15ss. –  malfaisants 5.6+. –  Que la paix… ou que tout aille bien pour Israël ! cf. 128.6 ; Jr 6.14n  ; voir aussi Es 32.18 ; Ga 6.16.'
  - type: text
    content: Mais ceux qui dévient vers des voies tortueuses,
  - type: text
    content: 'que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les emmène'
  - type: text
    content: avec les malfaisants !
  - type: text
    content: Que la paix soit sur Israël !
