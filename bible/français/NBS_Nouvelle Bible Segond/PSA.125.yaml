    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '125.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '120.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'confiance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme le mont…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plusieurs versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur le mont… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui ne vacille pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 15.5+ ; voir aussi 46.2,6 ; 78.68s ; 87.1,5 ; Es 14.32 ; Jl 4.20 ; 1Jn 2.17.'
      marker-yv: yv-n
    - type: text
      text: Chant des montées.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ceux qui mettent leur confiance dans le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont comme le mont Sion, qui ne vacille pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui est là pour toujours.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '125.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' entoure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.10 ; 34.8 ; Za 2.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dès maintenant… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 113.2+.
      marker-yv: yv-n
    - type: text
      text: Jérusalem est entourée de montagnes ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'de même le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' entoure son peuple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dès maintenant et pour toujours.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '125.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le sceptre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le bâton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 2.9+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la méchanceté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou, selon des versions anciennes, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du méchant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. Es 9.3 ; 14.5s ; Ez 7.11 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '35.23 : « Sur les nations il (Dieu) fera retomber sa vengeance jusqu''à ce qu''il ait supprimé la foule des insolents et brisé le sceptre des injustes. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le lot des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 16.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 25.13 ; 37.11 ; Nb 26.55 ; Es 57.13 ; 60.21 ; 65.9.'
      marker-yv: yv-n
    - type: text
      text: Car le sceptre de la méchanceté ne reposera pas
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le lot des justes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: afin que les justes ne tendent pas les mains vers l'injustice.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '125.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sois bienfaisant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sois bon pour les bons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 18.25-27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui ont le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.11.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', sois bienfaisant pour les gens de bien'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et pour ceux qui ont le cœur droit !
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '125.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.5s ; 92.10 ; Mt 7.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voies tortueuses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Pr 2.15ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'malfaisants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que tout aille bien pour Israël ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. 128.6 ; Jr 6.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Es 32.18 ; Ga 6.16.'
      marker-yv: yv-n
    - type: text
      text: Mais ceux qui dévient vers des voies tortueuses,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les emmène'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avec les malfaisants !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la paix soit sur Israël !
