    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Gn 50.17 ; Ex 32.31s ; 2S 19.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que nous avons eu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
