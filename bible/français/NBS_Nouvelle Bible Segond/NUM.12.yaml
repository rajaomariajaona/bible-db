    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du pseudo-Jonathan : … au sujet de la femme coushite que les Coushites avaient mariée à Moïse, lors de sa fuite de devant Pharaon, et qu''il avait ensuite éloignée. En effet, on lui avait fait prendre pour femme la reine de Coush, dont il s''était tenu éloigné. Targum Neofiti : … la femme coushite n''était autre que Séphorah, la femme de Moïse ; mais on l''appelait ainsi, car de même que le coushite se distingue par son corps de toutes les autres créatures, ainsi Séphorah, la femme de Moïse, était particulièrement jolie d''apparence et belle d''aspect, et distinguée en bonnes œuvres sur toutes les femmes de cette génération.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Miriam et Aaron parlèrent contre Moïse au sujet de la Koushite qu''il avait prise – c''est une Koushite qu''il avait prise pour femme. '
