document_id: NUM.12,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Miriam Ex 2.4 ; 15.20s. –  Aaron  : cf. Ex 32.1ss. –  parlèrent contre Moïse  : autre traduction parlèrent à Moïse  ; la même expression hébraïque est traduite par parler par au v. 2. –  la Koushite  : d''après la signification habituelle de ce terme (Koush = Nubie ; Gn 2.13n  ; Es 18.1n), on pourrait comprendre la Nubienne (il s''agirait alors d''une seconde femme de Moïse, d''où plusieurs légendes tardives sur le mariage de Moïse avec une reine ou une princesse éthiopienne) ; néanmoins un Koushân est rattaché à Madiân , lieu d''origine de Séphora (Ex 2.15ss ; 3.1 ; Nb 10.29) en Ha 3.7 (cf. Jg 3.8 ; 2Ch 21.16). –  c''est une Koushite…  : la fin du v. est omise par Vg. –  Targum (Tg) du pseudo-Jonathan : … au sujet de la femme coushite que les Coushites avaient mariée à Moïse, lors de sa fuite de devant Pharaon, et qu''il avait ensuite éloignée. En effet, on lui avait fait prendre pour femme la reine de Coush, dont il s''était tenu éloigné. Targum Neofiti : … la femme coushite n''était autre que Séphorah, la femme de Moïse ; mais on l''appelait ainsi, car de même que le coushite se distingue par son corps de toutes les autres créatures, ainsi Séphorah, la femme de Moïse, était particulièrement jolie d''apparence et belle d''aspect, et distinguée en bonnes œuvres sur toutes les femmes de cette génération.'
  - type: text
    content: 'Alors Miriam et Aaron parlèrent contre Moïse au sujet de la Koushite qu''il avait prise – c''est une Koushite qu''il avait prise pour femme. '
  '10':
  - type: note
    content: Dt 24.9 ; cf. 1R 13.4ss. –  « lèpre »… comme la neige Ex 4.6 ; 2R 5.27 ; cf. Lv 13.2nss.
  - type: text
    content: 'La nuée se retira d''au-dessus de la tente : Miriam était couverte de « lèpre », elle était blanche comme la neige. Aaron se tourna vers Miriam : elle était couverte de « lèpre » ! '
  '11':
  - type: note
    content: 'Cf. Gn 50.17 ; Ex 32.31s ; 2S 19.20. –  que nous avons eu…  : litt. (que) nous avons été (assez) fous (pour commettre) et (par lequel) nous avons péché  ; LXX parce que nous ne savions pas que (ou en quoi) nous péchions.'
  - type: text
    content: 'Alors Aaron dit à Moïse : Pardon, mon seigneur ! Je t''en prie, ne nous charge pas du péché que nous avons eu la folie de commettre ! '
  '12':
  - type: note
    content: 'comme l''enfant mort-né…  : litt. comme (quelqu''un qui est) mort en sortant de la matrice de sa mère…  ; cf. Ps 58.9 ; autre lecture traditionnelle  : … du ventre de notre mère, et que la moitié de notre chair ne soit pas rongée !'
  - type: text
    content: 'Je t''en prie, qu''elle ne soit pas comme l''enfant mort-né, dont la chair est à moitié rongée quand il sort du ventre de sa mère ! '
  '13':
  - type: note
    content: 'Dieu  : hébreu ’El, cf. Gn 21.33n. –  guéris-la ! cf. Ex 15.26.'
  - type: text
    content: 'Moïse cria vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : O Dieu, je t''en prie, guéris-la ! '
  '14':
  - type: note
    content: 'Cf. v. 1s ; Ex 22.27. –  craché…  : cf. Dt 25.9 ; Es 50.6 ; Jb 30.10. –  confusion  : cf. Ez 16.27n. –  exclue du camp  : litt. fermée hors du camp  ; cf. 5.2s ; Lv 13.4ss,46 ; 14.8.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Si son père lui avait craché au visage, ne serait-elle pas dans la confusion pendant sept jours ? Qu''elle soit exclue du camp pendant sept jours ; après cela, elle sera réintégrée. '
  '15':
  - type: note
    content: La tradition juive rapproche cette attente de celle de Miriam pour Moïse, Ex 2.4.
  - type: text
    content: 'Miriam fut exclue du camp pendant sept jours ; le peuple ne partit pas avant que Miriam ait été réintégrée. '
  '16':
  - type: note
    content: Hatséroth 11.35n. –  désert de Parân 10.12n.
  - type: text
    content: Après cela, le peuple partit de Hatséroth et campa dans le désert de Parân.
  '2':
  - type: note
    content: 'par Moïse  : autre traduction à Moïse  ; cf. v. 1n. –  aussi par nous  : autre traduction aussi à nous, cf. Ex 4.27 ; 15.20 ; 28.30 ; Mi 6.4.'
  - type: text
    content: 'Ils dirent : Est-ce seulement par Moïse que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parle ? N''est-ce pas aussi par nous qu''il parle ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''entendit. '
  '3':
  - type: note
    content: 'Moïse…  : litt. l''homme Moïse était très humble  ; autre lecture traditionnelle pauvre  ; versions anciennes doux  ; cf. 11.11-13 ; Ex 11.3 ; voir aussi So 2.3 ; Mt 11.29.'
  - type: text
    content: Or Moïse était un homme très humble, plus qu'aucun être humain sur la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Sortez…  : cf. v. 5n  ; 11.16s,24ss ; Ex 33.7ss.'
  - type: text
    content: 'Soudain le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse, à Aaron et à Miriam : Sortez tous les trois vers la tente de la Rencontre. Ils sortirent tous les trois. '
  '5':
  - type: note
    content: 'une (ou la, selon d''autres mss) colonne de nuée  : cf. 9.15+ss ; 10.11ss ; 11.24 ; Ex 33.9 ; 34.5 ; Dt 31.15. –  la tente  : LXX et Syr précisent de la Rencontre. –  s''avancèrent  : litt. sortirent, comme au v. 4.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' descendit dans une colonne de nuée et se tint à l''entrée de la tente. Il appela Aaron et Miriam, qui s''avancèrent tous les deux. '
  '6':
  - type: note
    content: 'un prophète du Seigneur ou pour le Seigneur  ; la construction correspondante est inhabituelle en hébreu ; certains, avec Syr, rattachent le nom divin YHWH (Seigneur) à ce qui suit et traduisent  : s''il y a parmi vous un prophète, c''est dans une vision que moi, le Seigneur, je me ferai connaître à lui…  ; cf. Gn 20.3 ; 37.5ss ; 40.5ss ; 41 ; 46.2 ; Nb 22.8 ; 23.7 ; Dt 13.2-6 ; Jg 7.13 ; 1S 3.15 ; 9.9 ; 28.6,15 ; 1R 3.15 ; Jr 23.28 ; Jb 33.15s.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: Ecoutez mes paroles, je vous prie !
  - type: text
    content: 'S''il y a parmi vous un prophète du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: c'est dans une vision que je me ferai connaître à lui,
  - type: text
    content: c'est dans un rêve que je lui parlerai.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Moïse , prophète Dt 18.15 ; 34.10 ; Os 12.14. –  mon serviteur  : cf. 2S 7.5 ; Es 20.3 ; 42.1+ ; Am 3.7 ; Ap 15.3. –  Il est l''homme de confiance…  : autre traduction il est installé à demeure dans toute ma maison  ; LXX et Vg ont compris il est fidèle (ou digne de confiance ) dans toute ma maison  ; cf. Hé 3.2ss.'
  - type: text
    content: Il n'en est pas ainsi de Moïse, mon serviteur.
  - type: text
    content: Il est l'homme de confiance pour toute ma maison.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'de vive voix  : litt. bouche à bouche , cf. 14.14n  ; Ex 33.11 ; Dt 5.4 ; 34.10 ; 2Jn 12n  ; 3Jn 14. –  en vision  : le terme hébreu (traduit par aspect en 9.15s p. ex.) est très proche de celui qui a été traduit par vision au v. 6 ; autres traductions manifestement, visiblement ou, d''après plusieurs versions anciennes, en personne (il faudrait alors traduire et au lieu de mais ) ; cf. Ex 33.20ss ; Hé 11.27 ; voir aussi Gn 32.31 ; 1R 19.13 ; la traduction de Tg pourrait signifier dans un miroir (cf. 1Co 13.12) ; d''autres modifient légèrement le texte hébreu traditionnel pour lire non pas par des visions ni par des énigmes  ; cf. Ez 1.1n  ; voir aussi Jn 1.18 ; 3.11 ; 6.46 ; 9.29 ; 14.9. –  la forme  : même mot en Ex 20.4/ / ; Dt 4.12ss ; Ps 17.15 ; Jb 4.16 ; LXX la gloire du Seigneur . – Voir crainte.'
  - type: text
    content: Je lui parle de vive voix,
  - type: text
    content: en vision, mais sans énigmes,
  - type: text
    content: 'et il contemple la forme même du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Pourquoi donc n'avez-vous pas craint
  - type: text
    content: de parler contre Moïse, mon serviteur ?
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre eux ; il s''en alla. '
