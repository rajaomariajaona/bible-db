document_id: JOS.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les douze pierres commémoratives
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Lorsque toute la nation eut achevé de passer le Jourdain, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Josué : '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Prenez douze hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.12.
    marker-yv: yv-n
  - type: text
    text: 'Prenez douze hommes parmi le peuple, un homme de chaque tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les pieds des prêtres.
    marker-yv: yv-n
  - type: text
    text: 'Donnez-leur cet ordre : Enlevez d''ici, du milieu du Jourdain, de l''endroit où les prêtres se sont tenus immobiles, douze pierres que vous ferez passer avec vous et que vous déposerez au campement où vous passerez la nuit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Josué appela les douze hommes qu''il avait fait désigner parmi les Israélites, un homme de chaque tribu. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une pierre… selon le nombre des tribus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2+,3,8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Israélites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''Israël'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 8.'
    marker-yv: yv-n
  - type: text
    text: 'Josué leur dit : Passez devant le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vers le milieu du Jourdain, et que chacun de vous charge une pierre sur son épaule, selon le nombre des tribus des Israélites, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un signe parmi vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 12.26 ; 13.8,14 ; Dt 6.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vos fils vous demanderont '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 21-24.
    marker-yv: yv-n
  - type: text
    text: 'afin que cela soit un signe parmi vous. Lorsque vos fils vous demanderont demain : « Que sont ces pierres pour vous ? », '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les eaux du Jourdain…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un rappel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une évocation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ex 12.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 13.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 28.12 ; Nb 17.5.'
    marker-yv: yv-n
  - type: text
    text: 'vous leur direz : « C''est que les eaux du Jourdain ont été coupées devant le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Lorsqu'il a passé le Jourdain, les eaux du Jourdain ont été coupées. » Ces pierres seront pour toujours un rappel pour les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les Israélites firent ce que Josué avait ordonné. Ils enlevèrent douze pierres du milieu du Jourdain, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''avait dit à Josué, selon le nombre des tribus des Israélites. Ils les firent passer avec eux au campement et les y déposèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à l'endroit où…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'à ce jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.9 ; 6.25 ; 7.26 ; 8.28s ; 9.27 ; 13.13 ; 14.14 ; 15.63 ; 16.10 ; 22.3,17 ; 23.8s.'
    marker-yv: yv-n
  - type: text
    text: 'Josué dressa douze pierres au milieu du Jourdain, à l''endroit où s''étaient tenus les prêtres qui portaient le coffre de l''alliance, et elles sont là jusqu''à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soit… exécutée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'achever '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme Moïse…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 31.7s,23.'
    marker-yv: yv-n
  - type: text
    text: 'Les prêtres qui portaient le Coffre se tinrent au milieu du Jourdain jusqu''à ce que soit entièrement exécutée la parole que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait ordonné à Josué de dire au peuple, exactement comme Moïse l''avait ordonné à Josué. Et le peuple se hâta de passer. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et les prêtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et les pierres.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque tout le peuple eut achevé de passer, le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et les prêtres passèrent devant le peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme Moïse le leur avait dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 32.20-22 ; Dt 3.18.'
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Ruben, les fils de Gad et la demi-tribu de Manassé passèrent en ordre de bataille devant les Israélites, comme Moïse le leur avait dit ; '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quarante mille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quarante milliers ; quarante phratries
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 1.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 5.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hommes armés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: équipés pour l'armée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 6.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 31.5 ; 32.27 ; 1Ch 12.24s ; 2Ch 17.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'plaines arides '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'environ quarante mille hommes armés passèrent devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pour le combat, en direction des plaines arides de Jéricho.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 3.7 ; 1Ch 29.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: craignirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils le respectèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; voir Lv 19.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce jour-là, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' rendit Josué grand aux yeux de tout Israël ; ils le craignirent comme ils avaient craint Moïse, tous les jours de sa vie.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Josué : '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le coffre du Témoignage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 25.22 ; 26.33s ; 30.6,26 ; 31.7 ; 39.35 ; 40.3,5,21 ; Nb 4.5 ; 7.89.
    marker-yv: yv-n
  - type: text
    text: 'Ordonne aux prêtres qui portent le coffre du Témoignage de remonter du Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Alors Josué donna cet ordre aux prêtres : Remontez du Jourdain ! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coulèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: allèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme auparavant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme hier et avant-hier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par-dessus toutes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout le long de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.15.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque les prêtres qui portaient le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' remontèrent du milieu du Jourdain, au moment où ils levèrent les pieds pour se diriger vers la terre ferme, les eaux du Jourdain revinrent à leur place et coulèrent comme auparavant, par-dessus toutes ses rives.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le dixième jour du premier mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cette date correspond au début de la fête de la Pâque (Ex 12.3) ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guilgal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : deux étymologies sont données au nom de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guilgal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot peut évoquer le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cercle de pierres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: qui sert de mémorial du passage du Jourdain ; en 5.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ', il est expliqué par la racine verbale hébraïque '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: galal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rouler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; 10.6+ ; cf. Dt 11.30
      - type: usfm
        marker: ord
        children:
        - type: text
