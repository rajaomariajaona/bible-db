  - type: text
    text: 'C''est afin que tous les peuples de la terre sachent que la main du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est une main forte, et afin que vous craigniez toujours le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu.'
