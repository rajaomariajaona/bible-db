      - type: text
        text: de la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du pays
    - type: usfm
      marker: ft
