    marker-yv: yv-n
  - type: text
    text: Le peuple remonta du Jourdain le dixième jour du premier mois ; ils campèrent au Guilgal, à la limite est de Jéricho.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: Ces douze pierres qu'ils avaient prises du Jourdain, Josué les dressa au Guilgal.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Il dit aux Israélites : Lorsque, demain, vos fils demanderont à leurs pères : « Que signifient ces pierres ? », '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'vous le ferez savoir à vos fils en disant : « C''est sur la terre ferme qu''Israël a passé ce Jourdain. » '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
