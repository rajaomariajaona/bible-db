document_id: JOS.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les douze pierres commémoratives
  - type: text
    content: 'Lorsque toute la nation eut achevé de passer le Jourdain, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : '
  '10':
  - type: note
    content: 'soit… exécutée  : le même verbe est traduit par achever au v. 11. –  comme Moïse…  : cf. Dt 31.7s,23.'
  - type: text
    content: 'Les prêtres qui portaient le Coffre se tinrent au milieu du Jourdain jusqu''à ce que soit entièrement exécutée la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Josué de dire au peuple, exactement comme Moïse l''avait ordonné à Josué. Et le peuple se hâta de passer. '
  '11':
  - type: note
    content: 'et les prêtres  : LXX et les pierres.'
  - type: text
    content: 'Lorsque tout le peuple eut achevé de passer, le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les prêtres passèrent devant le peuple. '
  '12':
  - type: note
    content: 'comme Moïse le leur avait dit  : cf. Nb 32.20-22 ; Dt 3.18.'
  - type: text
    content: 'Les fils de Ruben, les fils de Gad et la demi-tribu de Manassé passèrent en ordre de bataille devant les Israélites, comme Moïse le leur avait dit ; '
  '13':
  - type: note
    content: 'quarante mille  : autres traductions quarante milliers ; quarante phratries  ; cf. Nb 1.16n  ; Jg 5.8. –  hommes armés ou équipés pour l''armée  ; cf. 6.7n  ; Nb 31.5 ; 32.27 ; 1Ch 12.24s ; 2Ch 17.18. –  plaines arides 8.14n  ; Dt 1.1n.'
  - type: text
    content: 'environ quarante mille hommes armés passèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour le combat, en direction des plaines arides de Jéricho.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'grand  : cf. 3.7 ; 1Ch 29.25. –  ils le craignirent  : c.-à-d. ils le respectèrent  ; voir Lv 19.3n.'
  - type: text
    content: 'Ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rendit Josué grand aux yeux de tout Israël ; ils le craignirent comme ils avaient craint Moïse, tous les jours de sa vie.'
  '15':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : '
  '16':
  - type: note
    content: le coffre du Témoignage Ex 25.22 ; 26.33s ; 30.6,26 ; 31.7 ; 39.35 ; 40.3,5,21 ; Nb 4.5 ; 7.89.
  - type: text
    content: 'Ordonne aux prêtres qui portent le coffre du Témoignage de remonter du Jourdain. '
  '17':
  - type: text
    content: 'Alors Josué donna cet ordre aux prêtres : Remontez du Jourdain ! '
  '18':
  - type: note
    content: 'coulèrent  : litt. allèrent. –  comme auparavant  : litt. comme hier et avant-hier  ; cf. 3.4n. –  par-dessus toutes  : autre traduction tout le long de  ; cf. 3.15.'
  - type: text
    content: 'Lorsque les prêtres qui portaient le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remontèrent du milieu du Jourdain, au moment où ils levèrent les pieds pour se diriger vers la terre ferme, les eaux du Jourdain revinrent à leur place et coulèrent comme auparavant, par-dessus toutes ses rives.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'le dixième jour du premier mois  : cette date correspond au début de la fête de la Pâque (Ex 12.3) ; voir calendrier et fêtes. –  Guilgal  : deux étymologies sont données au nom de Guilgal  : le mot peut évoquer le cercle de pierres qui sert de mémorial du passage du Jourdain ; en 5.9n, il est expliqué par la racine verbale hébraïque galal , qui signifie rouler  ; 10.6+ ; cf. Dt 11.30n  ; Jg 2.1 ; Os 4.15n. –  la limite 18.15n.'
  - type: text
    content: Le peuple remonta du Jourdain le dixième jour du premier mois ; ils campèrent au Guilgal, à la limite est de Jéricho.
  '2':
  - type: note
    content: Prenez douze hommes 3.12.
  - type: text
    content: 'Prenez douze hommes parmi le peuple, un homme de chaque tribu. '
  '20':
  - type: text
    content: Ces douze pierres qu'ils avaient prises du Jourdain, Josué les dressa au Guilgal.
  '21':
  - type: text
    content: 'Il dit aux Israélites : Lorsque, demain, vos fils demanderont à leurs pères : « Que signifient ces pierres ? », '
  '22':
  - type: text
    content: 'vous le ferez savoir à vos fils en disant : « C''est sur la terre ferme qu''Israël a passé ce Jourdain. » '
  '23':
  - type: note
    content: Cf. Ex 14.21ss.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, a mis à sec devant vous les eaux du Jourdain jusqu''à ce que vous soyez passés, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, l''avait fait à la mer des Joncs, qu''il a mise à sec devant nous jusqu''à ce que nous soyons passés. '
  '24':
  - type: note
    content: 'de la terre  : autre traduction du pays  ; cf. Dt 28.10 ; 1R 8.43,53,60. –  toujours  : litt. tous les jours.'
  - type: text
    content: 'C''est afin que tous les peuples de la terre sachent que la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est une main forte, et afin que vous craigniez toujours le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu.'
  '3':
  - type: note
    content: 'les prêtres  : litt. les pieds des prêtres.'
  - type: text
    content: 'Donnez-leur cet ordre : Enlevez d''ici, du milieu du Jourdain, de l''endroit où les prêtres se sont tenus immobiles, douze pierres que vous ferez passer avec vous et que vous déposerez au campement où vous passerez la nuit.'
  '4':
  - type: text
    content: 'Josué appela les douze hommes qu''il avait fait désigner parmi les Israélites, un homme de chaque tribu. '
  '5':
  - type: note
    content: 'une pierre… selon le nombre des tribus  : cf. v. 2+,3,8. –  Israélites  : litt. fils d''Israël, de même au v. 8.'
  - type: text
    content: 'Josué leur dit : Passez devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vers le milieu du Jourdain, et que chacun de vous charge une pierre sur son épaule, selon le nombre des tribus des Israélites, '
  '6':
  - type: note
    content: 'un signe parmi vous  : cf. Ex 12.26 ; 13.8,14 ; Dt 6.20. –  vos fils vous demanderont v. 21-24.'
  - type: text
    content: 'afin que cela soit un signe parmi vous. Lorsque vos fils vous demanderont demain : « Que sont ces pierres pour vous ? », '
  '7':
  - type: note
    content: 'les eaux du Jourdain…  : cf. 3.13. –  un rappel  : autre traduction une évocation, cf. Ex 12.14n  ; 13.9n  ; 28.12 ; Nb 17.5.'
  - type: text
    content: 'vous leur direz : « C''est que les eaux du Jourdain ont été coupées devant le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: . Lorsqu'il a passé le Jourdain, les eaux du Jourdain ont été coupées. » Ces pierres seront pour toujours un rappel pour les Israélites.
  '8':
  - type: text
    content: 'Les Israélites firent ce que Josué avait ordonné. Ils enlevèrent douze pierres du milieu du Jourdain, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait dit à Josué, selon le nombre des tribus des Israélites. Ils les firent passer avec eux au campement et les y déposèrent. '
  '9':
  - type: note
    content: 'à l''endroit où…  : cf. v. 3n. –  jusqu''à ce jour  : cf. 5.9 ; 6.25 ; 7.26 ; 8.28s ; 9.27 ; 13.13 ; 14.14 ; 15.63 ; 16.10 ; 22.3,17 ; 23.8s.'
  - type: text
    content: 'Josué dressa douze pierres au milieu du Jourdain, à l''endroit où s''étaient tenus les prêtres qui portaient le coffre de l''alliance, et elles sont là jusqu''à ce jour. '
