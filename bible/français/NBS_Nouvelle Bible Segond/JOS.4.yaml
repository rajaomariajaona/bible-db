      children:
      - type: text
        text: '4.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ex 14.21ss.
    marker-yv: yv-n
  - type: text
    text: 'Car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, a mis à sec devant vous les eaux du Jourdain jusqu''à ce que vous soyez passés, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, l''avait fait à la mer des Joncs, qu''il a mise à sec devant nous jusqu''à ce que nous soyons passés. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
