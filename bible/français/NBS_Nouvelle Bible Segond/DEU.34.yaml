document_id: DEU.34,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort de Moïse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plaines arides de Moab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Nb 22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nebo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.49. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pisga '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui fit voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Mt 4.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jusqu''à Dan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jg 18.28s.
      marker-yv: yv-n
    - type: text
      text: 'Moïse monta des plaines arides de Moab au mont Nebo, au sommet du Pisga, en face de Jéricho. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui fit voir tout le pays : le Galaad jusqu''à Dan, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.10 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 18.15-18 ; Nb 12.6s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'face à face '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.4+.
      marker-yv: yv-n
    - type: text
      text: 'Il ne s''est plus levé en Israël de prophète comme Moïse, que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' connaissait face à face, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'signes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prodiges '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.34+.
      marker-yv: yv-n
    - type: text
      text: 'pour tous les signes et les prodiges que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''envoya produire en Egypte contre le pharaon, contre les gens de sa cour et contre tout son pays, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toutes les choses grandes… d'une main forte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toute la main forte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(3.24+) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et toute la grande frayeur que Moïse fit… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.1+.
      marker-yv: yv-n
    - type: text
      text: et pour toutes les choses grandes et redoutables que Moïse fit d'une main forte sous les yeux de tout Israël.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'tout Nephtali, le pays d''Ephraïm et de Manassé, tout le pays de Juda jusqu''à la mer occidentale, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Néguev '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 13.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: District
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: district du Jourdain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gn 13.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jusqu''à Tsoar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 13.10 ; 14.2 ; 19.22.
      marker-yv: yv-n
    - type: text
      text: 'le Néguev, le District, la vallée de Jéricho, la Ville des Palmiers, jusqu''à Tsoar. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le pays… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu n'y entreras pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu n'y passeras pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.37+ ; 3.27.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui dit : C''est là le pays que j''ai promis par serment à Abraham, à Isaac et à Jacob, en disant : Je le donnerai à ta descendance. Je te l''ai fait voir de tes yeux ; mais tu n''y entreras pas.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'serviteur du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jos 1.2 ; Hé 3.5 ; Ap 15.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ordre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bouche.
      marker-yv: yv-n
    - type: text
      text: 'Moïse, serviteur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mourut là, au pays de Moab, sur l''ordre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il l'ensevelit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il faut probablement comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' l''ensevelit'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils l''ensevelirent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on l'ensevelit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jd 9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth-Péor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il l''ensevelit dans la vallée, au pays de Moab, en face de Beth-Péor. Personne ne sait où est sa tombe, jusqu''à ce jour. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cent vingt ans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'avait pas disparu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne s'était pas enfuie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ps 92.13-15.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse avait cent vingt ans lorsqu''il mourut ; son œil ne s''était pas affaibli, et sa vigueur n''avait pas disparu. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Nb 20.29.
      marker-yv: yv-n
    - type: text
      text: Les Israélites pleurèrent Moïse pendant trente jours, dans les plaines arides de Moab ; puis ces jours de pleurs et de deuil sur Moïse arrivèrent à leur terme.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Josué '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.38+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait posé les mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Nb 27.18-23 ; 2R 2.15 ; Es 11.2 ; Ac 6.6.'
      marker-yv: yv-n
    - type: text
      text: 'Josué, fils de Noun, était rempli d''un souffle de sagesse, car Moïse avait posé les mains sur lui. Les Israélites l''écoutèrent, ils firent ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait ordonné à Moïse.'
