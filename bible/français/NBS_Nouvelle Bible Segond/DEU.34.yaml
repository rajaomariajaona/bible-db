document_id: DEU.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort de Moïse
  - type: text
    content: ' '
  - type: note
    content: 'plaines arides de Moab  : cf. Nb 22.1n. –  Nebo 32.49. –  Pisga 3.27. –  lui fit voir  : cf. Mt 4.8. –  jusqu''à Dan Jg 18.28s.'
  - type: text
    content: 'Moïse monta des plaines arides de Moab au mont Nebo, au sommet du Pisga, en face de Jéricho. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui fit voir tout le pays : le Galaad jusqu''à Dan, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'prophète  : cf. 18.15-18 ; Nb 12.6s. –  face à face 5.4+.'
  - type: text
    content: 'Il ne s''est plus levé en Israël de prophète comme Moïse, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' connaissait face à face, '
  '11':
  - type: note
    content: signes / prodiges 4.34+.
  - type: text
    content: 'pour tous les signes et les prodiges que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''envoya produire en Egypte contre le pharaon, contre les gens de sa cour et contre tout son pays, '
  '12':
  - type: note
    content: 'toutes les choses grandes… d''une main forte  : litt. toute la main forte (3.24+) et toute la grande frayeur que Moïse fit… –  tout Israël 1.1+.'
  - type: text
    content: et pour toutes les choses grandes et redoutables que Moïse fit d'une main forte sous les yeux de tout Israël.
  '2':
  - type: text
    content: 'tout Nephtali, le pays d''Ephraïm et de Manassé, tout le pays de Juda jusqu''à la mer occidentale, '
  '3':
  - type: note
    content: Néguev Gn 13.14n  ; 20.1+. –  District, c.-à-d. district du Jourdain, Gn 13.10nss. –  jusqu'à Tsoar Gn 13.10 ; 14.2 ; 19.22.
  - type: text
    content: 'le Néguev, le District, la vallée de Jéricho, la Ville des Palmiers, jusqu''à Tsoar. '
  '4':
  - type: note
    content: 'le pays… 1.8+. –  tu n''y entreras pas  : litt. tu n''y passeras pas, cf. 1.37+ ; 3.27.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : C''est là le pays que j''ai promis par serment à Abraham, à Isaac et à Jacob, en disant : Je le donnerai à ta descendance. Je te l''ai fait voir de tes yeux ; mais tu n''y entreras pas.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'serviteur du Seigneur Jos 1.2 ; Hé 3.5 ; Ap 15.3. –  ordre  : litt. bouche.'
  - type: text
    content: 'Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mourut là, au pays de Moab, sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'Il l''ensevelit  : il faut probablement comprendre le Seigneur l''ensevelit  ; LXX ils l''ensevelirent ou on l''ensevelit  ; cf. Jd 9n. –  Beth-Péor 3.29n.'
  - type: text
    content: 'Il l''ensevelit dans la vallée, au pays de Moab, en face de Beth-Péor. Personne ne sait où est sa tombe, jusqu''à ce jour. '
  '7':
  - type: note
    content: 'cent vingt ans 31.2. –  n''avait pas disparu  : litt. ne s''était pas enfuie  ; cf. Ps 92.13-15.'
  - type: text
    content: 'Moïse avait cent vingt ans lorsqu''il mourut ; son œil ne s''était pas affaibli, et sa vigueur n''avait pas disparu. '
  '8':
  - type: note
    content: Cf. Nb 20.29.
  - type: text
    content: Les Israélites pleurèrent Moïse pendant trente jours, dans les plaines arides de Moab ; puis ces jours de pleurs et de deuil sur Moïse arrivèrent à leur terme.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Josué 1.38+. –  souffle (ou esprit ) de sagesse / avait posé les mains  : cf. Nb 27.18-23 ; 2R 2.15 ; Es 11.2 ; Ac 6.6.'
  - type: text
    content: 'Josué, fils de Noun, était rempli d''un souffle de sagesse, car Moïse avait posé les mains sur lui. Les Israélites l''écoutèrent, ils firent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse.'
