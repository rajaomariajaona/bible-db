  - type: text
    text: 'Quand vous serez entrés dans le pays et que vous y planterez toutes sortes d''arbres fruitiers, vous considérerez leur fruit comme incirconcis ; pendant trois ans, il sera incirconcis pour vous ; on ne le mangera pas. '
