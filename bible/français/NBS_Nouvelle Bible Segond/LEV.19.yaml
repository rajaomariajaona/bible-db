        children:
        - type: text
          text: noms
      - type: text
        text: ' divins.'
    marker-yv: yv-n
  - type: text
    text: 'Parle à toute la communauté des Israélites ; tu leur diras : Vous serez saints, car moi, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu, je suis saint. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: respectera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: craindra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; en fonction du contexte, le terme hébreu peut désigner la crainte de Dieu (cf. v. 14,32), la peur des hommes (Jos 8.10 ; 11.6) ou le respect (cf. v. 30 ; 26.2 ; Jos 4.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 14.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; voir aussi Ex 20.12 ; Lv 20.9 ; Ez 22.7 ; Mt 15.4/ / ; Ep 6.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbats
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 30 ; 23.3 ; Ex 20.8-11 ; 31.12-17 ; Jr 17.19-27 ; Ez 22.8 ; Mt 12.2+.
    marker-yv: yv-n
  - type: text
    text: 'Chacun de vous respectera sa mère et son père et observera mes sabbats. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: faux dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu correspondant, qui semble évoquer le néant ou l''inconsistance, fait assonance avec le mot habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dieu(x)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 26.1 ; Es 2.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ha 2.18 ; Ps 96.5 ; 97.7 ; le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'néant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Jb 13.4 ; voir aussi Ex 20.3,23 ; 34.14,17 ; Dt 27.15 ; 2R 17.16 ; Es 44.16s.
    marker-yv: yv-n
  - type: text
    text: 'Vous ne vous tournerez pas vers les faux dieux et vous ne vous ferez pas des dieux de métal fondu. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ' de paix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que vous soyez agréés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 22.19.'
    marker-yv: yv-n
  - type: text
    text: 'Quand vous offrirez au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' un sacrifice de paix, vous l''offrirez de telle façon que vous soyez agréés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.15-18.
    marker-yv: yv-n
  - type: text
    text: 'On le mangera le jour où vous le sacrifierez, ou le lendemain ; ce qui en restera jusqu''au troisième jour sera jeté au feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Si on en mange le troisième jour, c''est une chose impropre ; on ne sera pas agréé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'retranché de son peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Celui qui en mangera sera chargé de sa faute, car il profane une chose consacrée au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; celui-là sera retranché de son peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.22 ; Dt 24.19-22.
    marker-yv: yv-n
  - type: text
    text: 'Quand vous ferez la moisson dans votre pays, tu ne moissonneras pas ton champ jusqu''au bord et tu ne ramasseras pas ce qui reste à glaner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 13s.
    marker-yv: yv-n
  - type: text
    text: 'Tu ne cueilleras pas non plus les grappes restées dans ta vigne, tu ne ramasseras pas les grains qui en seront tombés. Tu abandonneras cela au pauvre et à l''immigré. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.21-23 ; Ex 20.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's ; Jr 7.9 ; Os 4.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'compatriote '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous ne commettrez pas de vol ; aucun de vous ne mentira à son compatriote ni ne le trompera. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'faux serments '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.22ss ; Jr 5.2 ; 7.9 ; Za 5.4 ; 8.17 ; Ml 3.5 ; cf. Ex 20.7,16 ; Mt 5.33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu profanerais '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '18.21+ ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous ne ferez pas de faux serments par mon nom : tu profanerais le nom de ton Dieu. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 22.20 ; Dt 24.14s ; Ml 3.5 ; Mt 20.8 ; Jc 5.4.
    marker-yv: yv-n
  - type: text
    text: 'Tu n''opprimeras pas ton prochain, tu ne commettras aucune spoliation. La paye d''un salarié ne passera pas la nuit chez toi jusqu''au lendemain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 27.18 ; Jb 29.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maudiras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ', malédiction. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: obstacle…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cause de chute
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ps 119.165+ ; Mt 11.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu ne maudiras pas un sourd et tu ne mettras devant un aveugle aucun obstacle qui puisse le faire trébucher : tu craindras ton Dieu. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH).'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 23.3ss ; Dt 1.17 ; 16.19 ; Ac 23.3 ; Jc 2.9 ; Jd 16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'injustice '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ez 3.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous ne commettrez pas d''injustice dans les jugements : tu n''avantageras pas le pauvre et tu ne favoriseras pas le grand, mais tu jugeras ton compatriote selon la justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu n'iras pas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu ne marcheras pas en calomniateur parmi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: contre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les tiens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(pluriel du mot habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 8 etc. ; cf. Gn 17.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu ne réclameras pas la mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu ne te lèveras pas contre le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ez 22.9,12 ; voir aussi 1R 21.10,13 ; Mt 26.60/ / ; Ac 6.13.'
    marker-yv: yv-n
  - type: text
    text: 'Tu n''iras pas calomnier les tiens. Tu ne réclameras pas la mort de ton prochain. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH). '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avertiras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: reprendras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Pr 1.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Mt 18.15/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Tu ne détesteras pas ton frère dans ton cœur ; tu avertiras ton compatriote, mais tu ne te chargeras pas d''un péché à cause de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tu ne te vengeras pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 12.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rancune
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 3.12 ; Ps 103.9 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.6 : « D''aucune injustice ne garde rancune à ton prochain, ne fais rien dans un mouvement de violence. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens de ton peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de ton peuple'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu aimeras… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 34+ ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Mt 5.43 ; 19.19 ; 22.39/ / ; Rm 13.9 ; Ga 5.14 ; Jc 2.8.
    marker-yv: yv-n
  - type: text
