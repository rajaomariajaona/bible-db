    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à toute la communauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.3-5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous serez '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saints
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.44+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
