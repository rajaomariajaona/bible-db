document_id: LEV.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Comment Dieu veut être servi
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: Cf. v. 13s.
  - type: text
    content: 'Tu ne cueilleras pas non plus les grappes restées dans ta vigne, tu ne ramasseras pas les grains qui en seront tombés. Tu abandonneras cela au pauvre et à l''immigré. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 5.21-23 ; Ex 20.15ns ; Jr 7.9 ; Os 4.2. –  compatriote 18.20n.
  - type: text
    content: 'Vous ne commettrez pas de vol ; aucun de vous ne mentira à son compatriote ni ne le trompera. '
  '12':
  - type: note
    content: faux serments 5.22ss ; Jr 5.2 ; 7.9 ; Za 5.4 ; 8.17 ; Ml 3.5 ; cf. Ex 20.7,16 ; Mt 5.33. –  tu profanerais 18.21+ ; voir saint.
  - type: text
    content: 'Vous ne ferez pas de faux serments par mon nom : tu profanerais le nom de ton Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex 22.20 ; Dt 24.14s ; Ml 3.5 ; Mt 20.8 ; Jc 5.4.
  - type: text
    content: 'Tu n''opprimeras pas ton prochain, tu ne commettras aucune spoliation. La paye d''un salarié ne passera pas la nuit chez toi jusqu''au lendemain. '
  '14':
  - type: note
    content: 'Dt 27.18 ; Jb 29.15. –  maudiras  : voir bénédiction, malédiction. –  obstacle…  : autre traduction cause de chute, cf. Ps 119.165+ ; Mt 11.6n.'
  - type: text
    content: 'Tu ne maudiras pas un sourd et tu ne mettras devant un aveugle aucun obstacle qui puisse le faire trébucher : tu craindras ton Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Ex 23.3ss ; Dt 1.17 ; 16.19 ; Ac 23.3 ; Jc 2.9 ; Jd 16. –  injustice Ez 3.20n  ; voir justice.
  - type: text
    content: 'Vous ne commettrez pas d''injustice dans les jugements : tu n''avantageras pas le pauvre et tu ne favoriseras pas le grand, mais tu jugeras ton compatriote selon la justice. '
  '16':
  - type: note
    content: 'Tu n''iras pas…  : litt. tu ne marcheras pas en calomniateur parmi (ou contre) les tiens (pluriel du mot habituellement traduit par peuple, de même au v. 8 etc. ; cf. Gn 17.14n  ; 25.8n). –  Tu ne réclameras pas la mort  : litt. tu ne te lèveras pas contre le sang, cf. Ez 22.9,12 ; voir aussi 1R 21.10,13 ; Mt 26.60/ / ; Ac 6.13.'
  - type: text
    content: 'Tu n''iras pas calomnier les tiens. Tu ne réclameras pas la mort de ton prochain. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '17':
  - type: note
    content: 'Voir cœur. –  avertiras  : autre traduction reprendras  ; cf. Pr 1.23n  ; cf. Mt 18.15/ /.'
  - type: text
    content: 'Tu ne détesteras pas ton frère dans ton cœur ; tu avertiras ton compatriote, mais tu ne te chargeras pas d''un péché à cause de lui. '
  '18':
  - type: note
    content: 'Tu ne te vengeras pas Rm 12.19. –  rancune  : cf. Jr 3.12 ; Ps 103.9 ; Siracide 10.6 : « D''aucune injustice ne garde rancune à ton prochain, ne fais rien dans un mouvement de violence. » –  les gens de ton peuple  : litt. les fils de ton peuple. –  tu aimeras… v. 34+ ; Mt 5.43 ; 19.19 ; 22.39/ / ; Rm 13.9 ; Ga 5.14 ; Jc 2.8.'
  - type: text
    content: 'Tu ne te vengeras pas ; tu ne garderas pas de rancune envers les gens de ton peuple ; tu aimeras ton prochain comme toi-même. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 22.9-11. –  prescriptions  : voir loi.'
  - type: text
    content: Vous observerez mes prescriptions. Tu n'accoupleras pas des bêtes de deux espèces différentes ; tu n'ensemenceras pas ton champ de deux espèces différentes ; tu ne porteras pas un vêtement tissé de deux espèces différentes de fils.
  '2':
  - type: note
    content: 'à toute la communauté  : cf. 8.3-5. –  Vous serez saints… 11.44+. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Parle à toute la communauté des Israélites ; tu leur diras : Vous serez saints, car moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, je suis saint. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'une servante  : autre traduction une esclave  ; cf. Gn 12.16n. –  dégagée par son fiancé (cf. Ex 21.8n  ; Dt 7.8n) ou affranchie par son maître. –  il y aura punition  : traduction incertaine.'
  - type: text
    content: 'Lorsqu''un homme a des rapports sexuels avec une femme, si c''est une servante qui a été promise à un autre homme et qui n''a pas été dégagée ni affranchie, il y aura punition, mais ils ne seront pas mis à mort, parce qu''elle n''a pas été affranchie. '
  '21':
  - type: note
    content: 'En réparation…  : autres traductions en sacrifice de réparation… ; pour réparer son tort envers le Seigneur l''homme apportera… 5.6n,15+.'
  - type: text
    content: 'En réparation l''homme apportera au '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''entrée de la tente de la Rencontre, un bélier en sacrifice de réparation. '
  '22':
  - type: note
    content: Voir prêtre et expiation.
  - type: text
    content: 'Le prêtre fera sur lui l''expiation devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour le péché qu''il a commis, avec le bélier du sacrifice de réparation, et le péché qu''il a commis lui sera pardonné.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Quand vous serez entrés 14.34+. – La circoncision (cf. Gn 17.14) consacrait l'Israélite à Dieu, de sorte que l’ incirconcis était considéré comme impur ; de même le fruit des jeunes arbres, avant leur consécration (v. 24), est regardé comme impropre à la consommation ; cf. Lv 23.11-14 ; Lc 13.7.
  - type: text
    content: 'Quand vous serez entrés dans le pays et que vous y planterez toutes sortes d''arbres fruitiers, vous considérerez leur fruit comme incirconcis ; pendant trois ans, il sera incirconcis pour vous ; on ne le mangera pas. '
  '24':
  - type: note
    content: Cf. Jg 9.27n.
  - type: text
    content: 'La quatrième année, tout leur fruit sera consacré à la louange du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: text
    content: 'La cinquième année, vous en mangerez le fruit, vous en récolterez le produit pour vous-mêmes. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'au-dessus du sang  : selon certains, cette expression, qui apparaît aussi en 1S 14.32n et en Ez 33.25, évoquerait un rite magique de communion avec les esprits du monde souterrain par l''intermédiaire du sang répandu sur la terre ; cf. 3.17+. –  divination (le mot hébreu rappelle celui qui désigne le serpent ) / présage (le terme correspondant est proche de celui qui est habituellement traduit par nuage ) : cf. Dt 18.9-14 ; 2R 21.6 ; 2Ch 33.6.'
  - type: text
    content: 'Vous ne mangerez rien au-dessus du sang. Vous ne pratiquerez pas la divination et vous ne chercherez pas de présage. '
  '27':
  - type: note
    content: 'chevelure  : litt. tête  ; ce passage fait sans doute allusion à des pratiques rituelles ; cf. 21.5 ; Dt 14.1 ; Jr 48.37.'
  - type: text
    content: 'Vous ne couperez pas en rond les bords de votre chevelure. Tu ne raseras pas les bords de ta barbe. '
  '28':
  - type: note
    content: 'mort  : le terme correspondant signifie habituellement vie, être vivant, et a été traditionnellement rendu par âme  ; de même en 21.1,11 ; 22.4 (cadavre) ; voir Gn 1.20n.'
  - type: text
    content: 'Vous ne ferez pas d''incisions dans votre chair pour un mort et vous ne vous ferez pas de tatouage. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Certaines religions de l'Antiquité exigeaient qu'une jeune fille se prostitue dans un temple avant de se marier ; cf. Dt 23.18.
  - type: text
    content: Tu ne profaneras pas ta fille en la prostituant, de peur que le pays ne se prostitue et ne se remplisse d'infamie.
  '3':
  - type: note
    content: 'respectera  : litt. craindra  ; en fonction du contexte, le terme hébreu peut désigner la crainte de Dieu (cf. v. 14,32), la peur des hommes (Jos 8.10 ; 11.6) ou le respect (cf. v. 30 ; 26.2 ; Jos 4.14n  ; 1S 14.26n) ; voir aussi Ex 20.12 ; Lv 20.9 ; Ez 22.7 ; Mt 15.4/ / ; Ep 6.2s. –  sabbats v. 30 ; 23.3 ; Ex 20.8-11 ; 31.12-17 ; Jr 17.19-27 ; Ez 22.8 ; Mt 12.2+.'
  - type: text
    content: 'Chacun de vous respectera sa mère et son père et observera mes sabbats. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3+ ; 26.2 ; Ez 22.8. –  respecterez  : litt. craindrez v. 3n.'
  - type: text
    content: 'Vous observerez mes sabbats, et vous respecterez mon sanctuaire. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '31':
  - type: text
    content: ' '
  - type: note
    content: '20.6,27 ; Dt 18.10s ; 1S 28.3n  ; 2R 23.24 : Es 8.19 ; 19.3. –  impurs  : voir pur.'
  - type: text
    content: 'Ne vous tournez pas vers les spirites ou vers les médiums ; ne les recherchez pas, vous deviendriez impurs à leur contact. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu. '
  '32':
  - type: note
    content: tu honoreras ou tu auras du respect pour  ; la même expression a été traduite par favoriser au v. 15 ; cf. Lm 5.12.
  - type: text
    content: 'Tu te lèveras devant les cheveux blancs, tu honoreras le vieillard. Tu craindras ton Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 13 ; voir aussi 25.35 ; Ex 12.48n  ; 22.20+ ; Dt 24.17s ; 27.19 ; Jr 22.3 ; Ez 22.7 ; Ps 146.9.
  - type: text
    content: 'Si un immigré vient séjourner avec vous dans votre pays, vous ne l''exploiterez pas. '
  '34':
  - type: note
    content: tu l'aimeras comme toi-même v. 18+ ; cf. 25.35 ; Dt 10.19 ; Mt 5.44 ; Lc 10.27,29ss.
  - type: text
    content: 'Vous traiterez l''immigré qui séjourne avec vous comme un autochtone d''entre vous ; tu l''aimeras comme toi-même, car vous avez été immigrés en Egypte. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 45.9.
  - type: text
    content: 'Vous ne commettrez pas d''injustice, ni dans les jugements, ni dans les mesures de dimension, ni dans les poids, ni dans les mesures de capacité. '
  '36':
  - type: note
    content: Dt 25.13-16 ; Ez 45.10-12 ; Os 12.8 ; Am 8.5 ; Pr 11.1 ; 16.11 ; 20.10,23.
  - type: text
    content: 'Vous aurez des balances justes, des poids justes, un épha juste et un hîn juste. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu ; c''est moi qui vous ai fait sortir d''Egypte. '
  '37':
  - type: text
    content: 'Vous observerez toutes mes prescriptions et toutes mes règles : vous les mettrez en pratique. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'faux dieux  : le mot hébreu correspondant, qui semble évoquer le néant ou l''inconsistance, fait assonance avec le mot habituellement traduit par Dieu ou dieu(x)  ; cf. 26.1 ; Es 2.8n  ; Ha 2.18 ; Ps 96.5 ; 97.7 ; le même terme est traduit par néant en Jb 13.4 ; voir aussi Ex 20.3,23 ; 34.14,17 ; Dt 27.15 ; 2R 17.16 ; Es 44.16s.'
  - type: text
    content: 'Vous ne vous tournerez pas vers les faux dieux et vous ne vous ferez pas des dieux de métal fondu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'sacrifice de paix 3.1+. –  que vous soyez agréés  : cf. 22.19.'
  - type: text
    content: 'Quand vous offrirez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un sacrifice de paix, vous l''offrirez de telle façon que vous soyez agréés. '
  '6':
  - type: note
    content: 7.15-18.
  - type: text
    content: 'On le mangera le jour où vous le sacrifierez, ou le lendemain ; ce qui en restera jusqu''au troisième jour sera jeté au feu. '
  '7':
  - type: text
    content: 'Si on en mange le troisième jour, c''est une chose impropre ; on ne sera pas agréé. '
  '8':
  - type: note
    content: retranché de son peuple 7.20n.
  - type: text
    content: 'Celui qui en mangera sera chargé de sa faute, car il profane une chose consacrée au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; celui-là sera retranché de son peuple.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 23.22 ; Dt 24.19-22.
  - type: text
    content: 'Quand vous ferez la moisson dans votre pays, tu ne moissonneras pas ton champ jusqu''au bord et tu ne ramasseras pas ce qui reste à glaner. '
