  - type: text
    text: Le Seigneur lui livra Joïaqim, roi de Juda, et une partie des objets de la maison de Dieu. Il les emmena au pays de Shinéar, dans la maison de ses dieux, et il mit les objets dans le Trésor de ses dieux.
