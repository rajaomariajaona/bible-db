      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi leur fixa pour chaque jour une portion des mets de sa table et du vin dont il buvait, voulant les élever pendant trois années, au bout desquelles ils se tiendraient devant le roi. '
  - type: usfm
    marker: vlbl
