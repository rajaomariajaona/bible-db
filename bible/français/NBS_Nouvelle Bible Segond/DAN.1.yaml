    marker-yv: yv-n
  - type: text
    text: 'Dieu donna à ces quatre garçons de la connaissance, du discernement dans tout ce qui concernait les lettres et de la sagesse ; Daniel expliquait toutes les visions et tous les rêves. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Au terme fixé par le roi pour les lui amener, le chef des hauts fonctionnaires les amena devant Nabuchodonosor. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Le roi s''entretint avec eux ; parmi eux tous, il ne s''en trouvait aucun comme Daniel, Hanania, Mishaël et Azaria. Ils se tinrent donc devant le roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1R 10.3s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même mot qu''en Gn 41.8 ; Ex 7.11) / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'envoûteurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.2,10,27 ; 4.4 ; 5.7,11,15.
    marker-yv: yv-n
  - type: text
    text: 'Sur tous les sujets qui réclamaient de la sagesse et de l''intelligence, et sur lesquels le roi les interrogeait, il les trouvait dix fois supérieurs à tous les mages et les envoûteurs qui étaient dans tout son royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Telle fut l'existence de Daniel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et Daniel fut (ainsi). '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cyrus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.29 ; cf. Esd 1.1 ; 2Ch 36.22.
    marker-yv: yv-n
  - type: text
    text: Telle fut l'existence de Daniel jusqu'à la première année du roi Cyrus.
