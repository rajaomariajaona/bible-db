    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2R 25.29s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dont il buvait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ses banquets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 8,16 ; Est 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 5.6'
      - type: usfm
        marker: ord
