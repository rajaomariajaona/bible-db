document_id: DAN.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Daniel et ses compagnons à Babylone
  - type: text
    content: ' '
  - type: note
    content: La troisième année… de Joïaqim ≈ 606 av. J.-C. ; cf. 2R 24.1s. –  Nabuchodonosor… 2Ch 36.5s.
  - type: text
    content: 'La troisième année du règne de Joïaqim, roi de Juda, Nabuchodonosor, roi de Babylone, vint contre Jérusalem et l''assiégea. '
  '10':
  - type: note
    content: 'moins bonne mine  : le terme correspondant semble décrire la mauvaise humeur en Gn 40.6n  ; cf. Pr 19.3n.'
  - type: text
    content: 'Le chef des hauts fonctionnaires dit à Daniel : Je crains mon maître, le roi, qui a fixé ce que vous devez manger et boire ; pourquoi vous trouverait-il moins bonne mine qu''aux autres garçons de votre âge ? Vous me feriez risquer ma tête devant le roi ! '
  '11':
  - type: note
    content: 'intendant  : traduction incertaine ; des versions anciennes ont compris le mot hébreu comme un nom propre.'
  - type: text
    content: 'Alors Daniel dit à l''intendant à qui le chef des hauts fonctionnaires avait remis la surveillance de Daniel, de Hanania, de Mishaël et d''Azaria : '
  '12':
  - type: note
    content: 'dix jours  : cf. v. 20 ; Gn 24.55 ; Ap 2.10.'
  - type: text
    content: 'Nous sommes tes serviteurs ; mets-nous, je t''en prie, à l''épreuve pendant dix jours ; qu''on nous donne des légumes à manger et de l''eau à boire. '
  '13':
  - type: text
    content: 'Tu regarderas ensuite notre mine et la mine des garçons qui mangent les mets du roi, et tu agiras avec nous d''après ce que tu auras vu. '
  '14':
  - type: text
    content: 'Il leur accorda ce qu''ils demandaient et les mit à l''épreuve pendant dix jours. '
  '15':
  - type: text
    content: 'Au bout de dix jours, ils avaient meilleure mine et plus d''embonpoint que tous les garçons qui mangeaient les mets du roi. '
  '16':
  - type: text
    content: Désormais, l'intendant enlevait les mets et le vin de leurs repas, et il leur donnait des légumes.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'connaissance… lettres  : cf. v. 4n. –  visions / rêves 2.1ss ; 4.1ss ; 5.5 ; Gn 41.12.'
  - type: text
    content: 'Dieu donna à ces quatre garçons de la connaissance, du discernement dans tout ce qui concernait les lettres et de la sagesse ; Daniel expliquait toutes les visions et tous les rêves. '
  '18':
  - type: text
    content: 'Au terme fixé par le roi pour les lui amener, le chef des hauts fonctionnaires les amena devant Nabuchodonosor. '
  '19':
  - type: text
    content: 'Le roi s''entretint avec eux ; parmi eux tous, il ne s''en trouvait aucun comme Daniel, Hanania, Mishaël et Azaria. Ils se tinrent donc devant le roi. '
  '2':
  - type: note
    content: 'livra Gn 9.2n. –  objets 5.2n  ; 2Ch 36.7. –  Shinéar Gn 10.10n. –  Trésor  : litt. maison du trésor  ; cf. Ml 3.10 ; Né 10.39. –  de ses dieux  : autre traduction de son dieu  ; cf. Gn 1.1n.'
  - type: text
    content: Le Seigneur lui livra Joïaqim, roi de Juda, et une partie des objets de la maison de Dieu. Il les emmena au pays de Shinéar, dans la maison de ses dieux, et il mit les objets dans le Trésor de ses dieux.
  '20':
  - type: note
    content: Cf. 1R 10.3s. –  mages (même mot qu'en Gn 41.8 ; Ex 7.11) / envoûteurs 2.2,10,27 ; 4.4 ; 5.7,11,15.
  - type: text
    content: 'Sur tous les sujets qui réclamaient de la sagesse et de l''intelligence, et sur lesquels le roi les interrogeait, il les trouvait dix fois supérieurs à tous les mages et les envoûteurs qui étaient dans tout son royaume. '
  '21':
  - type: note
    content: 'Telle fut l''existence de Daniel  : litt. et Daniel fut (ainsi). –  Cyrus 6.29 ; cf. Esd 1.1 ; 2Ch 36.22.'
  - type: text
    content: Telle fut l'existence de Daniel jusqu'à la première année du roi Cyrus.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'ordonna  : litt. dit. –  chef de ses hauts fonctionnaires ou de ses eunuques  ; sur le terme hébreu correspondant, voir Jr 39.3n  ; cf. Est 1.10n.'
  - type: text
    content: 'Le roi ordonna à Ashpenaz, chef de ses hauts fonctionnaires, d''amener quelques Israélites de la descendance royale ou de familles de dignitaires, '
  '4':
  - type: note
    content: 'doués  : le même terme hébreu est traduit par avoir du discernement en 11.33,35 ; 12.3,10. Il est apparenté au terme traduit par bon sens en Pr 3.4 p. ex. Litt. ayant du discernement en toute sagesse, connaissant la connaissance, comprenant la connaissance (terme apparenté au précédent) ; cf. v. 17 ; 2.27-30 ; 9.22s ; voir aussi Ez 28.3. –  à se tenir  : autre traduction à servir, de même dans la suite. –  les lettres et la langue des Chaldéens  : l''écriture cunéiforme de Babylone, qui sera considérée comme une clefs des sciences occultes (cf. l''emploi du mot Chaldéens / chaldéens en 2.2n).'
  - type: text
    content: 'des garçons sans défaut corporel, beaux, doués de toute sagesse, de connaissance et d''intelligence, aptes à se tenir dans le palais du roi, à qui l''on apprendrait les lettres et la langue des Chaldéens. '
  '5':
  - type: note
    content: 'Cf. 2R 25.29s. –  dont il buvait  : autre traduction de ses banquets  ; cf. v. 8,16 ; Est 1.3n  ; 5.6n.'
  - type: text
    content: 'Le roi leur fixa pour chaque jour une portion des mets de sa table et du vin dont il buvait, voulant les élever pendant trois années, au bout desquelles ils se tiendraient devant le roi. '
  '6':
  - type: note
    content: 'Judéens  : litt. fils de Juda. – Le nom de Daniel signifie Dieu est mon juge  ; cf. Ez 14.14n.'
  - type: text
    content: 'Il y avait parmi eux, d''entre les Judéens, Daniel, Hanania, Mishaël et Azaria. '
  '7':
  - type: note
    content: Le changement de nom suppose un changement de destinée, imposé par une autorité (cf. Gn 17.5 ; 32.29 ; 2R 23.34 ; Mt 16.18). Les noms donnés à Daniel et à ses trois compagnons (chap. 3) sont d'origine mésopotamienne. Ainsi Belteshatsar est la transcription d'un nom akkadien dont le sens pourrait être « Protège la vie du roi ! », « Protège sa vie ! » ou encore, selon certains, « Dame (titre de la déesse épouse de Bel ou Mardouk, dieu patron de Babylone ?), protège le roi ! » ; cf. 2.26 ; 4.5n  ; 10.1.
  - type: text
    content: 'Le chef des hauts fonctionnaires leur imposa des noms : à Daniel celui de Belteshatsar, à Hanania celui de Shadrak, à Mishaël celui de Méshak et à Azaria celui d''Abed-Nego.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'décida  : litt. mit sur son cœur. –  se souiller  : cf. Lv 11 ; Dt 14 ; 2 Maccabées 6.18 à 7.42 raconte les persécutions infligées aux Juifs qui refusaient de manger du porc sous le règne d''Antiochos IV Epiphane (175-164 av. J.-C.) ; Judith 12.2 : « Je (Judith) n''en mangerai pas (des mets des Assyriens) de peur que ce ne soit une occasion de chute, mais ce que j''ai apporté m''approvisionnera. » Tobit 1.10s : « Après la déportation en Assyrie, alors que j''étais moi-même déporté, je vins à Ninive. Tous mes frères et les gens de ma race mangeaient de la nourriture des païens, mais moi, je me gardai de manger de la nourriture des païens. » Jubilés 22.16ss (instruction d''Abraham à Jacob) : « Sépare-toi des nations, ne mange pas avec elles, n''agis pas selon leurs manières, et ne deviens pas leur semblable, car leurs actes sont impurs et toute leur conduite est souillée, immonde, abominable. Ils offrent leurs sacrifices à des morts, ils adorent des démons et mangent au milieu des tombes. » Voir aussi Dn 10.3 ; 1Co 8.1-7 ; 10.19s et pur, impur.'
  - type: text
    content: 'Daniel décida de ne pas se souiller avec les mets du roi et le vin dont il buvait, et il supplia le chef des hauts fonctionnaires de ne pas l''obliger à se souiller. '
  '9':
  - type: note
    content: 'Cf. Gn 39.4,21 ; 1R 8.50n  ; Est 2.9+ ; Né 1.11n. –  la faveur et la compassion  : expression traduite ailleurs par fidélité et compassion  ; cf. Jr 16.5 ; Os 2.21 ; Za 7.9 ; Ps 103.4 ; voir aussi Es 63.7 ; Ps 25.6.'
  - type: text
    content: 'Dieu accorda à Daniel la faveur et la compassion du chef des hauts fonctionnaires. '
