      - type: text
        text: '2 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.18 à 7.42 raconte les persécutions infligées aux Juifs qui refusaient de manger du porc sous le règne d''Antiochos IV Epiphane (175-164 av. J.-C.) ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Judith
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.2 : « Je (Judith) n''en mangerai pas (des mets des Assyriens) de peur que ce ne soit une occasion de chute, mais ce que j''ai apporté m''approvisionnera. » '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tobit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.10s : « Après la déportation en Assyrie, alors que j''étais moi-même déporté, je vins à Ninive. Tous mes frères et les gens de ma race mangeaient de la nourriture des païens, mais moi, je me gardai de manger de la nourriture des païens. » '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Jubilés
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.16ss (instruction d''Abraham à Jacob) : « Sépare-toi des nations, ne mange pas avec elles, n''agis pas selon leurs manières, et ne deviens pas leur semblable, car leurs actes sont impurs et toute leur conduite est souillée, immonde, abominable. Ils offrent leurs sacrifices à des morts, ils adorent des démons et mangent au milieu des tombes. » Voir aussi Dn 10.3 ; 1Co 8.1-7 ; 10.19s et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ', impur.'
    marker-yv: yv-n
  - type: text
    text: 'Daniel décida de ne pas se souiller avec les mets du roi et le vin dont il buvait, et il supplia le chef des hauts fonctionnaires de ne pas l''obliger à se souiller. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Gn 39.4,21 ; 1R 8.50
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Est 2.9+ ; Né 1.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la faveur et la compassion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression traduite ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fidélité et compassion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jr 16.5 ; Os 2.21 ; Za 7.9 ; Ps 103.4 ; voir aussi Es 63.7 ; Ps 25.6.'
    marker-yv: yv-n
  - type: text
    text: 'Dieu accorda à Daniel la faveur et la compassion du chef des hauts fonctionnaires. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: moins bonne mine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant semble décrire la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mauvaise humeur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Gn 40.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Pr 19.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le chef des hauts fonctionnaires dit à Daniel : Je crains mon maître, le roi, qui a fixé ce que vous devez manger et boire ; pourquoi vous trouverait-il moins bonne mine qu''aux autres garçons de votre âge ? Vous me feriez risquer ma tête devant le roi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: intendant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; des versions anciennes ont compris le mot hébreu comme un nom propre.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Daniel dit à l''intendant à qui le chef des hauts fonctionnaires avait remis la surveillance de Daniel, de Hanania, de Mishaël et d''Azaria : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dix jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20 ; Gn 24.55 ; Ap 2.10.'
    marker-yv: yv-n
  - type: text
    text: 'Nous sommes tes serviteurs ; mets-nous, je t''en prie, à l''épreuve pendant dix jours ; qu''on nous donne des légumes à manger et de l''eau à boire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Tu regarderas ensuite notre mine et la mine des garçons qui mangent les mets du roi, et tu agiras avec nous d''après ce que tu auras vu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Il leur accorda ce qu''ils demandaient et les mit à l''épreuve pendant dix jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Au bout de dix jours, ils avaient meilleure mine et plus d''embonpoint que tous les garçons qui mangeaient les mets du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: Désormais, l'intendant enlevait les mets et le vin de leurs repas, et il leur donnait des légumes.
