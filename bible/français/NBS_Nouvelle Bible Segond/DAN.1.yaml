  - type: text
    text: 'Le roi ordonna à Ashpenaz, chef de ses hauts fonctionnaires, d''amener quelques Israélites de la descendance royale ou de familles de dignitaires, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: doués
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme hébreu est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avoir du discernement '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 11.33,35 ; 12.3,10. Il est apparenté au terme traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bon sens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Pr 3.4 p. ex. Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ayant du discernement en toute sagesse, connaissant la connaissance, comprenant la connaissance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(terme apparenté au précédent) ; cf. v. 17 ; 2.27-30 ; 9.22s ; voir aussi Ez 28.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à se tenir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à servir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les lettres et la langue des Chaldéens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''écriture cunéiforme de Babylone, qui sera considérée comme une clefs des sciences occultes (cf. l''emploi du mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldéens / chaldéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 2.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'des garçons sans défaut corporel, beaux, doués de toute sagesse, de connaissance et d''intelligence, aptes à se tenir dans le palais du roi, à qui l''on apprendrait les lettres et la langue des Chaldéens. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
