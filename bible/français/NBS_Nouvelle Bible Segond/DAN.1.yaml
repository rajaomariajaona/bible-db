      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il y avait parmi eux, d''entre les Judéens, Daniel, Hanania, Mishaël et Azaria. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le changement de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' suppose un changement de destinée, imposé par une autorité (cf. Gn 17.5 ; 32.29 ; 2R 23.34 ; Mt 16.18). Les noms donnés à Daniel et à ses trois compagnons (chap. 3) sont d''origine mésopotamienne. Ainsi '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Belteshatsar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est la transcription d'un nom akkadien dont le sens pourrait être « Protège la vie du roi ! », « Protège sa vie ! » ou encore, selon certains, « Dame (titre de la déesse épouse de Bel ou Mardouk, dieu patron de Babylone ?), protège le roi ! » ; cf. 2.26 ; 4.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.1.'
    marker-yv: yv-n
  - type: text
    text: 'Le chef des hauts fonctionnaires leur imposa des noms : à Daniel celui de Belteshatsar, à Hanania celui de Shadrak, à Mishaël celui de Méshak et à Azaria celui d''Abed-Nego.'
