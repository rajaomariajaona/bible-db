    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ehoud '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.15-30.
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites firent encore ce qui déplaisait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – Ehoud était mort. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'appela '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'convoqua '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même au v. 13) ; le verbe hébreu correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'crier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 3.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nephtali '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qédesh '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6+.
      marker-yv: yv-n
    - type: text
      text: Baraq appela Zabulon et Nephtali à Qédesh ; une dizaine de milliers d'hommes montèrent sur ses pas ; Débora aussi monta avec lui.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.16+ ; cf. 4.17ss ; 5.24 ; voir aussi 1S 15.6. Au lieu du nom propre '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Héber
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un clan caïnite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qénite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Caïn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des autres Caïnites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qénites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Gn 4.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 24.21-24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hobab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 10.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tsaannaïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon une autre lecture traditionnelle, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tsaanannim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en Jos 19.33.'
      marker-yv: yv-n
    - type: text
      text: Héber, le Caïnite, s'était séparé de Caïn, des fils de Hobab, beau-père de Moïse, et il était allé jusqu'au térébinthe qui est à Tsaannaïm, près de Qédesh, pour y dresser sa tente.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'On informa Sisera que Baraq, fils d''Abinoam, était monté au mont Tabor. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'appela '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au Qishôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'oued Qishôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chars de fer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le peuple.
      marker-yv: yv-n
    - type: text
      text: 'Depuis Harosheth-Goyim, Sisera appela au Qishôn tous ses chars, neuf cents chars de fer, et tous les hommes qui étaient avec lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' ne sort-il pas devant toi ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dix mille hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6+.
      marker-yv: yv-n
    - type: text
      text: 'Alors Débora dit à Baraq : Lève-toi, car c''est aujourd''hui que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a livré Sisera. C''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui-même qui se met en campagne devant toi. Baraq descendit donc du mont Tabor, avec dix mille hommes derrière lui. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ex 14.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses troupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et ils furent passés au fil de l'épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à bouche d'épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains suppriment cette expression, pensant qu''elle est due à une erreur de copie (on aurait recopié deux fois l''expression du v. 16). Dans cette perspective il faudrait lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frappa de panique… devant Baraq.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' frappa de panique Sisera, tous ses chars et toutes ses troupes, et ils furent passés au fil de l''épée devant Baraq. Sisera descendit de son char et s''enfuit à pied. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Nb 21.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tombèrent au fil de l'épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 21.24 ; Hé 11.34 ; voir aussi Jos 6.21+.'
      marker-yv: yv-n
    - type: text
      text: 'Baraq poursuivit les chars et les troupes jusqu''à Harosheth-Goyim ; toutes les troupes de Sisera tombèrent au fil de l''épée : il n''en resta pas un seul homme.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 9+,11 ; 5.6,24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Héber, le Caïnite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du clan des Caïnites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Sisera s''enfuit à pied vers la tente de Yaël, femme de Héber, le Caïnite ; car il y avait la paix entre Yabîn, roi de Hatsor, et la maison de Héber, le Caïnite. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Entre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: détourne-toi, fais un détour.
      marker-yv: yv-n
    - type: text
      text: 'Yaël sortit à la rencontre de Sisera et lui dit : Entre, mon seigneur, entre chez moi, n''aie pas peur. Il entra chez elle, dans la tente, et elle le recouvrit d''une couverture. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.25 ; cf. Gn 24.17.
      marker-yv: yv-n
    - type: text
      text: 'Il lui dit : Donne-moi, je te prie, un peu d''eau à boire, j''ai soif. Elle ouvrit l''outre à lait, lui donna à boire et le recouvrit. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yabîn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hatsor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.17,23s ; cf. Jos 11.1-14 ; 12.19 ; 19.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sisera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.28-30 ; 1S 12.9 ; Ps 83.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Harosheth-Goyim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : « Forêt ( ?) des nations », peut-être au sud-est de Haïfa.'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les vendit alors à Yabîn, roi de Canaan, qui régnait à Hatsor. Le général de son armée était Sisera. Il habitait à Harosheth-Goyim. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il lui dit encore : Tiens-toi à l''entrée de la tente ; si quelqu''un vient te demander : « Y a-t-il quelqu''un ici ? », tu répondras : « Non. » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 5.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pénétra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; le verbe hébreu correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sauter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: profondément endormi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frappé de torpeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 2.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dn 8.18.'
      marker-yv: yv-n
    - type: text
      text: 'Yaël, femme de Héber, saisit un pieu de la tente, prit le marteau, s''approcha de lui furtivement et lui planta le pieu dans la tempe ; il pénétra dans la terre. Il était profondément endormi, accablé de fatigue ; c''est ainsi qu''il mourut. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.25.
      marker-yv: yv-n
    - type: text
      text: 'Comme Baraq poursuivait Sisera, Yaël sortit à sa rencontre et lui dit : Viens, je te montrerai l''homme que tu cherches. Il entra chez elle : Sisera gisait mort, le pieu dans la tempe.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yabîn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2+.
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là Dieu humilia Yabîn, roi de Canaan, devant les Israélites. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les Israélites…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la main des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
