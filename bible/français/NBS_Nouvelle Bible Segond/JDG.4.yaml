document_id: JDG.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Débora et Baraq
  - type: text
    content: ' '
  - type: note
    content: 2.11+. –  Ehoud 3.15-30.
  - type: text
    content: 'Les Israélites firent encore ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  – Ehoud était mort. '
  '10':
  - type: note
    content: appela ou convoqua (de même au v. 13) ; le verbe hébreu correspondant est traduit par crier en 3.9+. –  Nephtali / Qédesh v. 6+.
  - type: text
    content: Baraq appela Zabulon et Nephtali à Qédesh ; une dizaine de milliers d'hommes montèrent sur ses pas ; Débora aussi monta avec lui.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 1.16+ ; cf. 4.17ss ; 5.24 ; voir aussi 1S 15.6. Au lieu du nom propre Héber , certains comprennent un clan caïnite (ou qénite ). –  de Caïn , c.-à-d. des autres Caïnites ou Qénites  ; cf. Gn 4.1n  ; Nb 24.21-24. –  Hobab Nb 10.29. –  Tsaannaïm ou, selon une autre lecture traditionnelle, Tsaanannim , comme en Jos 19.33.
  - type: text
    content: Héber, le Caïnite, s'était séparé de Caïn, des fils de Hobab, beau-père de Moïse, et il était allé jusqu'au térébinthe qui est à Tsaannaïm, près de Qédesh, pour y dresser sa tente.
  '12':
  - type: text
    content: 'On informa Sisera que Baraq, fils d''Abinoam, était monté au mont Tabor. '
  '13':
  - type: note
    content: 'appela v. 10n. –  au Qishôn  : litt. à l''oued Qishôn, cf. v. 7n. –  chars de fer v. 3. –  les hommes  : litt. le peuple.'
  - type: text
    content: 'Depuis Harosheth-Goyim, Sisera appela au Qishôn tous ses chars, neuf cents chars de fer, et tous les hommes qui étaient avec lui. '
  '14':
  - type: note
    content: 'C''est le Seigneur …  : litt. le Seigneur ne sort-il pas devant toi ? v. 6n  ; 2.15n. –  dix mille hommes v. 6+.'
  - type: text
    content: 'Alors Débora dit à Baraq : Lève-toi, car c''est aujourd''hui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a livré Sisera. C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui-même qui se met en campagne devant toi. Baraq descendit donc du mont Tabor, avec dix mille hommes derrière lui. '
  '15':
  - type: note
    content: 'Cf. Ex 14.24. –  ses troupes  : litt. le camp. –  et ils furent passés au fil de l''épée  : litt. à bouche d''épée  ; certains suppriment cette expression, pensant qu''elle est due à une erreur de copie (on aurait recopié deux fois l''expression du v. 16). Dans cette perspective il faudrait lire frappa de panique… devant Baraq.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa de panique Sisera, tous ses chars et toutes ses troupes, et ils furent passés au fil de l''épée devant Baraq. Sisera descendit de son char et s''enfuit à pied. '
  '16':
  - type: note
    content: 'Cf. Nb 21.35. –  tombèrent au fil de l''épée  : cf. Lc 21.24 ; Hé 11.34 ; voir aussi Jos 6.21+.'
  - type: text
    content: 'Baraq poursuivit les chars et les troupes jusqu''à Harosheth-Goyim ; toutes les troupes de Sisera tombèrent au fil de l''épée : il n''en resta pas un seul homme.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'V. 9+,11 ; 5.6,24. –  de Héber, le Caïnite  : autre traduction du clan des Caïnites  ; cf. v. 11n.'
  - type: text
    content: 'Sisera s''enfuit à pied vers la tente de Yaël, femme de Héber, le Caïnite ; car il y avait la paix entre Yabîn, roi de Hatsor, et la maison de Héber, le Caïnite. '
  '18':
  - type: note
    content: 'Entre  : litt. détourne-toi, fais un détour.'
  - type: text
    content: 'Yaël sortit à la rencontre de Sisera et lui dit : Entre, mon seigneur, entre chez moi, n''aie pas peur. Il entra chez elle, dans la tente, et elle le recouvrit d''une couverture. '
  '19':
  - type: note
    content: 5.25 ; cf. Gn 24.17.
  - type: text
    content: 'Il lui dit : Donne-moi, je te prie, un peu d''eau à boire, j''ai soif. Elle ouvrit l''outre à lait, lui donna à boire et le recouvrit. '
  '2':
  - type: note
    content: '2.14+. –  Yabîn / Hatsor 4.17,23s ; cf. Jos 11.1-14 ; 12.19 ; 19.36. –  Sisera  : cf. 5.28-30 ; 1S 12.9 ; Ps 83.10. –  Harosheth-Goyim  : « Forêt ( ?) des nations », peut-être au sud-est de Haïfa.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les vendit alors à Yabîn, roi de Canaan, qui régnait à Hatsor. Le général de son armée était Sisera. Il habitait à Harosheth-Goyim. '
  '20':
  - type: text
    content: 'Il lui dit encore : Tiens-toi à l''entrée de la tente ; si quelqu''un vient te demander : « Y a-t-il quelqu''un ici ? », tu répondras : « Non. » '
  '21':
  - type: note
    content: 'Cf. 3.21n  ; 5.26. –  pénétra  : traduction incertaine ; le verbe hébreu correspondant est traduit par sauter en 1.14n. –  profondément endormi  : autre traduction frappé de torpeur, cf. Gn 2.21n  ; Dn 8.18.'
  - type: text
    content: 'Yaël, femme de Héber, saisit un pieu de la tente, prit le marteau, s''approcha de lui furtivement et lui planta le pieu dans la tempe ; il pénétra dans la terre. Il était profondément endormi, accablé de fatigue ; c''est ainsi qu''il mourut. '
  '22':
  - type: note
    content: Cf. 3.25.
  - type: text
    content: 'Comme Baraq poursuivait Sisera, Yaël sortit à sa rencontre et lui dit : Viens, je te montrerai l''homme que tu cherches. Il entra chez elle : Sisera gisait mort, le pieu dans la tempe.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Yabîn v. 2+.
  - type: text
    content: 'En ce jour-là Dieu humilia Yabîn, roi de Canaan, devant les Israélites. '
  '24':
  - type: note
    content: 'Les Israélites…  : litt. la main des fils d''Israël devint (de plus en plus) dure sur Yabîn.'
  - type: text
    content: Les Israélites intensifièrent leur pression contre Yabîn, roi de Canaan, jusqu'à ce qu'ils aient retranché Yabîn, roi de Canaan.
  '3':
  - type: note
    content: crièrent vers le Seigneur 3.9+ (verbe synonyme et phonétiquement proche). –  chars de fer 1.19+.
  - type: text
    content: 'Les Israélites crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car Yabîn avait neuf cents chars de fer ; il opprimait avec violence les Israélites depuis vingt ans.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Débora  : son nom signifie abeille (comme en 14.8). –  prophétesse  : cf. v. 14 ; 5.1ss ; Ex 15.20s ; 2R 22.14 ; Né 6.14 ; voir aussi 1S 2.1-10 ; Lc 1.46-55 ; 2.36-38. –  Lappidoth signifie torches (cf. 4.6n). –  était juge  : voir 3.10n.'
  - type: text
    content: 'En ce temps-là, Débora, une prophétesse, femme de Lappidoth, était juge en Israël. '
  '5':
  - type: note
    content: 'palmier de Débora  : cf. Gn 35.8. –  Rama de Benjamin, au nord de Jérusalem, Jos 18.25 ; Jr 31.15. –  la région montagneuse d''Ephraïm 3.27+. –  jugement  : le mot hébreu correspondant, qui peut aussi avoir le sens de droit ou d’équité, est apparenté à celui qui désigne les juges (2.16n).'
  - type: text
    content: 'Elle était assise sous le palmier de Débora, entre Rama et Beth-El, dans la région montagneuse d''Ephraïm ; les Israélites montaient la voir là pour le jugement. '
  '6':
  - type: note
    content: 'Baraq signifie éclair  ; cf. v. 4n  ; 5.12,15 ; Hé 11.32s. –  Qédesh-Nephtali Jos 12.22 ; 19.37 ; 21.32. –  t''a donné cet ordre  : litt. ne t''a-t-il pas ordonné ? Cf. v. 14n. –  dirige-toi  : traduction incertaine ; même verbe au v. 7 (attirer) ; en 5.14 il est traduit par tenir (le bâton du scribe) ; en 20.37 par se porter en avant. On lui a aussi donné, ici, le sens de recruter (des hommes de guerre). –  le mont Tabor, à la frontière de Nephtali et de Zabulon, cf. Jos 19.22. –  dix mille hommes v. 10,14.'
  - type: text
    content: 'Elle fit appeler Baraq, fils d''Abinoam, de Qédesh-Nephtali, et elle lui dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, t''a donné cet ordre : « Va, dirige-toi vers le mont Tabor, et prends avec toi dix mille hommes des fils de Nephtali et des fils de Zabulon ; '
  '7':
  - type: note
    content: 'j''attirerai ou je dirigerai, voir v. 6n. –  l''oued Qishôn  : cours d''eau qui coule au pied du Carmel et se jette dans la Méditerranée au nord de Haïfa ; cf. v. 13 ; 5.21 ; Jos 19.11n  ; 1R 18.40 ; Ps 83.10.'
  - type: text
    content: 'j''attirerai vers toi, à l''oued Qishôn, Sisera, général de l''armée de Yabîn, avec ses chars et sa multitude, et je te le livrerai. » '
  '8':
  - type: note
    content: 'Si tu viens  : litt. si tu vas, de même dans la suite. –  LXX ajoute à la fin du v. car je ne sais pas le jour où l''ange du Seigneur m''accordera le succès, cf. v. 14.'
  - type: text
    content: 'Baraq lui dit : Si tu viens avec moi, j''irai ; mais si tu ne viens pas avec moi, je n''irai pas. '
  '9':
  - type: note
    content: 'honneur  : le terme hébreu est aussi traduit par dignité (Ex 28.2), splendeur (Es 60.7), parure (Ez 16.17). –  une femme v. 17ss ; cf. 9.53s ; Judith 9.10s : « Frappe par mes lèvres trompeuses l''esclave à côté du chef et le chef à côté de son serviteur ; broie leur haute taille par une main de femme. Car ta force n''est pas dans le nombre, ni ta puissance dans les forts, mais tu es le Dieu des humbles, le secours des petits, le défenseur des faibles, le protecteur des abandonnés, le sauveur des désespérés. » –  vendra 2.14+. –  alla  : litt. se leva et alla.'
  - type: text
    content: 'Elle répondit : J''irai avec toi ; mais tu n''auras pas d''honneur dans la voie où tu t''engages, car c''est à une femme que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vendra Sisera. Puis Débora alla avec Baraq à Qédesh. '
