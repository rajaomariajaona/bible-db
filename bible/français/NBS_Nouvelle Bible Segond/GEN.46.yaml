      children:
      - type: text
        text: . Cf. 30.43 ; 37.12.
    marker-yv: yv-n
  - type: text
    text: 'Ce sont des bergers de petit bétail : ils sont des éleveurs ; ils ont amené leur petit bétail et leur gros bétail, avec tout ce qui leur appartient. '
  - type: usfm
    marker: v
    metadata:
