document_id: GEN.46,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob retrouve Joseph
  - type: text
    content: ' '
  - type: note
    content: Israël 32.29 ; 35.10. –  Bersabée 21.14n,31n  ; cf. 28.10. – Voir sacrifices.
  - type: text
    content: 'Israël partit donc avec tout ce qui lui appartenait. Il arriva à Bersabée et offrit des sacrifices au Dieu d''Isaac, son père. '
  '10':
  - type: note
    content: 'Saül…  : cf. Ex 6.15.'
  - type: text
    content: 'Fils de Siméon : Yemouel, Yamîn, Ohad, Yakîn et Tsohar ; et Saül, le fils de la Cananéenne. '
  '11':
  - type: text
    content: 'Fils de Lévi : Guershôn, Qehath et Merari. '
  '12':
  - type: note
    content: 38.1-11.
  - type: text
    content: 'Fils de Juda : Er, Onân, Shéla, Pérets et Zérah ; mais Er et Onân moururent en Canaan. Les fils de Pérets furent Hetsrôn et Hamoul. '
  '13':
  - type: note
    content: 'Yob  : Smr et LXX ont lu Yashoub  ; cf. Nb 26.24 ; 1Ch 7.1.'
  - type: text
    content: 'Fils d''Issacar : Tola, Pouva, Yob et Shimrôn. '
  '14':
  - type: text
    content: 'Fils de Zabulon : Séred, Elôn et Yahléel. '
  '15':
  - type: note
    content: 29.32ss ; 30.17-21. –  Paddân-Aram 25.20n.
  - type: text
    content: Voilà les fils que Léa donna à Jacob à Paddân-Aram, outre sa fille Dina. Ses fils et ses filles étaient trente-trois en tout.
  '16':
  - type: text
    content: 'Fils de Gad : Tsiphiôn, Haggui, Shouni, Etsbôn, Eri, Arodi et Aréli. '
  '17':
  - type: text
    content: 'Fils d''Aser : Yimna, Yishva, Yishvi et Beria ; et Sérah, leur sœur. Fils de Beria : Héber et Malkiel. '
  '18':
  - type: note
    content: 29.24 ; 30.9-13.
  - type: text
    content: 'Voilà les fils de Zilpa, que Laban avait donnée à sa fille Léa. Ce sont ceux-là qu''elle donna à Jacob : seize en tout.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 30.22-24 ; 35.16-20.
  - type: text
    content: 'Fils de Rachel, femme de Jacob : Joseph et Benjamin. '
  '2':
  - type: note
    content: visions 15.1 ; Nb 12.6 ; 1S 3.15 ; cf. les rêves en Gn 28.12 ; 37.5+.
  - type: text
    content: 'Dieu parla à Israël dans des visions nocturnes. Il dit : Jacob ! Jacob ! Celui-ci répondit : Je suis là ! '
  '20':
  - type: note
    content: '41.45,50-52. –  prêtre d''On  : 41.45n.'
  - type: text
    content: 'Nés de Joseph, en Egypte : Manassé et Ephraïm, ceux que lui donna Aséneth, fille de Poti-Phéra, prêtre d''On. '
  '21':
  - type: text
    content: 'Fils de Benjamin : Béla, Béker, Ashbel, Guéra, Naaman, Ehi, Rosh, Mouppim, Houppim et Ard. '
  '22':
  - type: note
    content: V. 19.
  - type: text
    content: 'Voilà les fils de Rachel, ceux qui naquirent de Jacob : quatorze en tout.'
  '23':
  - type: text
    content: 'Fils de Dan : Houshim. '
  '24':
  - type: text
    content: 'Fils de Nephtali : Yahtséel, Gouni, Yétser et Shillem. '
  '25':
  - type: note
    content: 29.29 ; 30.3-8.
  - type: text
    content: 'Voilà les fils de Bilha, que Laban avait donnée à sa fille Rachel. Ce sont ceux-là qu''elle donna à Jacob : sept en tout.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'issus de lui  : litt. sortis de sa cuisse , cf. 24.2n  ; Ex 1.5n  ; Jg 8.30 ; le chiffre de soixante-six (cf. 46.27) ne comprend peut-être ni Er et Onan , morts en Canaan (46.12+), ni Manassé et Ephraïm , nés en Egypte (46.20).'
  - type: text
    content: 'Ceux qui vinrent en Egypte avec Jacob et qui étaient issus de lui – sans compter les femmes des fils de Jacob – étaient soixante-six en tout. '
  '27':
  - type: note
    content: 'soixante-dix  : c''est le nombre de tous les descendants mâles de Jacob (sans compter Jacob) ; cf. Ex 1.5 ; Dt 10.22 ; 32.28n. LXX (qui a cinq noms supplémentaires au v. 20) et Ac 7.14 portent le chiffre 75 (cf. Jr 25.11+).'
  - type: text
    content: 'Les fils de Joseph qui étaient nés de lui en Egypte : deux. Total des gens de la maison de Jacob qui vinrent en Egypte : soixante-dix.'
  - type: heading
    content: Jacob en Egypte
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Jacob envoya  : litt. il envoya ou il avait envoyé . –  Juda 43.8 ; 44.16-34. –  pour préparer le voyage  : litt. pour montrer devant lui ( ?) ; d''après LXX, certains modifient le texte hébreu traditionnel pour lire pour qu''il (Joseph) vienne à sa rencontre . –  Goshen 45.10+.'
  - type: text
    content: 'Jacob envoya Juda à Joseph, en avant de lui, pour préparer le voyage vers Goshen. Ils arrivèrent au pays de Goshen. '
  '29':
  - type: note
    content: 42.24+.
  - type: text
    content: 'Joseph attela son char et monta vers Goshen, à la rencontre d''Israël, son père. Dès qu''il parut, il se jeta à son cou et pleura longtemps à son cou. '
  '3':
  - type: note
    content: '12.2+,10n  ; 15.13 ; 26.23-25 ; 28.14. –  Je suis Dieu…  : autre traduction je suis El (cf. 21.33n  ; 33.20), le Dieu de ton père  ; 28.13 ; 31.53 ; 43.23 ; 49.25 ; voir aussi noms divins. –  N''aie pas peur  : 15.1+ ; voir crainte. –  Egypte  : cf. 26.2. –  grande nation  : cf. 12.2 ; 21.8 ; Ex 32.10 ; Nb 14.12.'
  - type: text
    content: 'Il reprit : Je suis Dieu, le Dieu de ton père. N''aie pas peur de descendre en Egypte, car c''est là que je te ferai devenir une grande nation. '
  '30':
  - type: note
    content: '45.28 ; cf. Lc 2.29s. –  j''ai vu ton visage  : autre traduction j''ai paru en ta présence, cf. 32.21n.'
  - type: text
    content: 'Israël dit à Joseph : Je peux mourir maintenant, puisque j''ai vu ton visage et que tu es encore en vie ! '
  '31':
  - type: note
    content: 'Cf. 45.16-20. –  toute la maison de son / mon père  : autre traduction sa / ma famille.'
  - type: text
    content: 'Joseph dit à ses frères et à toute la maison de son père : Je vais monter informer le pharaon ; je lui dirai : Mes frères et toute la maison de mon père, qui étaient en Canaan, sont arrivés auprès de moi. '
  '32':
  - type: note
    content: 'éleveurs  : litt. hommes de troupeau. Cf. 30.43 ; 37.12.'
  - type: text
    content: 'Ce sont des bergers de petit bétail : ils sont des éleveurs ; ils ont amené leur petit bétail et leur gros bétail, avec tout ce qui leur appartient. '
  '33':
  - type: text
    content: 'Quand le pharaon vous appellera et qu''il vous demandera : « Quelles sont vos activités ? », '
  '34':
  - type: note
    content: 'une abomination pour l''Egypte  : litt. une abomination de l''Egypte ou des Egyptiens, cf. 43.32n. Beaucoup d''animaux étaient divinisés en Egypte ; peut-être un interdit religieux pesait-il sur les hommes qui s''occupaient du bétail. Cependant on n''a retrouvé en Egypte aucune attestation d''un tel interdit. Mais l''aversion des Egyptiens pour les bergers pourrait aussi avoir une cause profane : les Egyptiens ont subi beaucoup d''invasions de nomades.'
  - type: text
    content: 'vous répondrez : « Nous, tes serviteurs, nous sommes éleveurs, depuis notre jeunesse jusqu''à présent, comme l''étaient aussi nos pères. » Ainsi vous vous installerez au pays de Goshen, car tous les bergers de petit bétail sont une abomination pour l''Egypte.'
  '4':
  - type: note
    content: descendrai / monter 12.10n  ; cf. 50.5-7 ; Ex 3.8 ; 12.37ss. –  Joseph… 50.1-3.
  - type: text
    content: Je descendrai moi-même avec toi en Egypte, et je t'en ferai moi-même monter ; et Joseph te fermera les yeux de sa propre main.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '45.19-21 ; cf. Nb 20.15 ; Dt 26.5 ; Jos 24.4 ; Es 52.4 ; Ps 105.23 ; Ac 7.15. –  fils d''Israël  : voir 32.29n. –  leurs femmes et toutes leurs familles  : litt. leurs familles (ou enfants ) et leurs femmes  ; cf. 34.29n.'
  - type: text
    content: 'Jacob quitta Bersabée. Les fils d''Israël transportèrent Jacob, leur père, ainsi que leurs femmes et toutes leurs familles, sur les chariots que le pharaon avait envoyés pour le transporter. '
  '6':
  - type: text
    content: 'Ils prirent aussi leurs troupeaux et les biens qu''ils avaient acquis en Canaan. Ils se rendirent en Egypte – Jacob et toute sa descendance. '
  '7':
  - type: text
    content: Ses fils et ses petits-fils, ses filles et ses petites-filles, toute sa descendance, il les emmena avec lui en Egypte.
  - type: heading
    content: La famille de Jacob
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 1.1-5 ; Nb 26 ; 1Ch 2–8. –  noms des fils d''Israël  : voir 32.29n.'
  - type: text
    content: 'Voici les noms des fils d''Israël qui vinrent en Egypte : Jacob et ses fils.'
  - type: text
    content: 'Premier-né de Jacob : Ruben. '
  '9':
  - type: note
    content: 'Hénoch  : cf. 4.17s ; 5.18ss.'
  - type: text
    content: 'Fils de Ruben : Hénoch, Pallou, Hetsrôn et Karmi. '
