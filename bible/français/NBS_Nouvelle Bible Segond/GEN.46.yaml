    marker-yv: yv-n
  - type: text
    text: 'Joseph dit à ses frères et à toute la maison de son père : Je vais monter informer le pharaon ; je lui dirai : Mes frères et toute la maison de mon père, qui étaient en Canaan, sont arrivés auprès de moi. '
