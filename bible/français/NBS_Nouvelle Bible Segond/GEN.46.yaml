      marker: fr
      children:
      - type: text
        text: '46.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une abomination pour l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une abomination de l''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des Egyptiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 43.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Beaucoup d''animaux étaient divinisés en Egypte ; peut-être un interdit religieux pesait-il sur les hommes qui s''occupaient du bétail. Cependant on n''a retrouvé en Egypte aucune attestation d''un tel interdit. Mais l''aversion des Egyptiens pour les bergers pourrait aussi avoir une cause profane : les Egyptiens ont subi beaucoup d''invasions de nomades.'
    marker-yv: yv-n
  - type: text
    text: 'vous répondrez : « Nous, tes serviteurs, nous sommes éleveurs, depuis notre jeunesse jusqu''à présent, comme l''étaient aussi nos pères. » Ainsi vous vous installerez au pays de Goshen, car tous les bergers de petit bétail sont une abomination pour l''Egypte.'
