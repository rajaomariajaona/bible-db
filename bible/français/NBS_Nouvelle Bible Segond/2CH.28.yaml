document_id: 2CH.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Début du règne d'Achaz ; guerre contre Israël
  - type: heading
    content: 2R 16.1-20
  - type: text
    content: ' '
  - type: note
    content: 'vingt ans  : un ms hébreu et plusieurs versions anciennes portent vingt-cinq ans . –  ce qui convenait au Seigneur  : cf. 20.32n. –  son père  : père au sens d’ ancêtre.'
  - type: text
    content: 'Achaz avait vingt ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. Il ne fit pas ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme l''avait fait David, son père. '
  '10':
  - type: note
    content: 'vos esclaves et vos servantes  : autre traduction vos esclaves, hommes et femmes  ; cf. Gn 12.16n  ; Jr 34.9ss ; voir aussi Né 5.8. –  N''est-ce pas vous qui êtes en tort…  : par-delà la situation présente, le texte fait peut-être allusion à la faute liée au schisme (le culte concurrent de celui de Jérusalem, et considéré comme illégitime), cf. v. 13. –  votre Dieu  : cf. v. 9 le Dieu de vos pères.'
  - type: text
    content: 'Et maintenant, ces fils de Juda et de Jérusalem, vous dites que vous allez les réduire à être vos esclaves et vos servantes ! N''est-ce pas vous qui êtes en tort devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu ? '
  '11':
  - type: note
    content: 'renvoyez / captifs / faits  : les mots correspondants font assonance en hébreu.'
  - type: text
    content: 'Maintenant, écoutez-moi, et renvoyez chez eux ces captifs que vous avez faits parmi vos frères ; car la colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est sur vous. '
  '12':
  - type: note
    content: 'fils d''Ephraïm  : les Israélites, cf. 25.7n. –  Ezéchias  : hébreu Yehizqiyahou, à ne pas confondre avec le roi du même nom, fils d''Achaz, v. 27.'
  - type: text
    content: 'Des hommes, parmi ceux qui étaient à la tête des fils d''Ephraïm, Azaria, fils de Yohanân, Bérékia, fils de Meshillémoth, Ezéchias, fils de Shalloum, et Amasa, fils de Hadlaï, s''élevèrent contre ceux qui revenaient de l''armée. '
  '13':
  - type: note
    content: 'Vous ne ferez pas entrer ici ces captifs…  : dans les v. 13-15, le royaume du Nord, habituellement considéré comme infidèle, paraît plus juste que Juda, qui avait abandonné le Seigneur sous Achaz. –  ajouter à nos péchés 1S 12.19.'
  - type: text
    content: 'Ils leur dirent : Vous ne ferez pas entrer ici ces captifs ; car c''est pour nous mettre en tort devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que vous parlez d''ajouter à nos péchés et à nos torts. Nous avons déjà beaucoup de torts, et la colère ardente est sur Israël. '
  '14':
  - type: text
    content: 'Les hommes armés abandonnèrent les captifs et le butin devant les chefs et devant toute l''assemblée. '
  '15':
  - type: note
    content: 'Cf. Lc 10.34. –  prirent les captifs  : litt. se levèrent et prirent les captifs  ; autre traduction fortifièrent les captifs. –  ils les pansèrent  : autre traduction ils les enduisirent d''huile (panacée de l''Antiquité orientale). –  tous ceux qui ne pouvaient pas marcher  : litt. quiconque trébuchait.'
  - type: text
    content: Les hommes qui furent désignés par leur nom prirent les captifs ; ils employèrent le butin à vêtir tous ceux qui étaient nus ; ils leur donnèrent des habits et des sandales, ils les firent manger et boire, ils les pansèrent, ils conduisirent sur des ânes tous ceux qui ne pouvaient pas marcher, et ils les amenèrent à Jéricho, la Ville des Palmiers, auprès de leurs frères. Puis ils retournèrent à Samarie.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'A partir d''ici sont rapportées différentes détresses du règne d''Achaz. –  appela…  : litt. envoya auprès des rois d''Assyrie pour l''aider . –  les rois d''Assyrie  : un ms hébreu, des versions anciennes et le passage parallèle de 2R 16.7 ont le singulier, cf. v. 20 ; ce pluriel, qui réapparaît dans 30.6 et 32.4, signifie peut-être le roi d''Assyrie et ses alliés.'
  - type: text
    content: 'En ce temps-là, le roi Achaz appela à son secours les rois d''Assyrie. '
  '17':
  - type: note
    content: 'Les Edomites  : ce peuple avait profité de la campagne racontée au début du chapitre (v. 5) pour s''installer au sud du territoire judéen (cf. 2R 16.6).'
  - type: text
    content: 'Les Edomites vinrent encore, battirent Juda et emmenèrent des captifs. '
  '18':
  - type: note
    content: 'Bas-Pays  : cf. Dt 1.7n. Les villes de Juda prises par les Philistins sont toutes mentionnées dans le livre de Josué (15.10,35,41 ; 19.42), à l''exception de Guimzo que l''on situe au nord-est de la ville philistine d''Eqrôn.'
  - type: text
    content: 'Les Philistins firent une invasion dans les villes du Bas-Pays et du Néguev de Juda ; ils prirent Beth-Shémesh, Ayyalôn, Guedéroth, Soko et les localités qui en dépendent, Timna et les localités qui en dépendent, Guimzo et les localités qui en dépendent, et ils y habitèrent. '
  '19':
  - type: note
    content: 'Car le Seigneur humilia Juda  : cf. v. 5n. –  roi d''Israël  : quelques mss hébreux et la plupart des versions anciennes portent roi de Juda. –  qui avait commis…  : autre traduction qui avait été gravement infidèle au Seigneur  ; cf. 12.2n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' humilia Juda à cause d''Achaz, roi d''Israël, qui avait rendu la situation incontrôlable en Juda et qui avait commis de grands sacrilèges envers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '2':
  - type: note
    content: Voir Baal.
  - type: text
    content: 'Il suivit les voies des rois d''Israël, il fit même des idoles de métal fondu pour les Baals. '
  '20':
  - type: note
    content: 'Tilgath-Pilnéser  : cf. 1Ch 5.6,26 ; forme habituelle Tiglath-Piléser, cf. 2R 15.29 ; 16.7,10. –  ne le soutint pas  : correspond à une légère modification de la vocalisation du texte hébreu traditionnel qui se lit et ne le vainquit pas, d''où l''autre traduction retenue par certains l''attaqua, l''assiégea (autre traduction pour traita en adversaire, cf. v. 22n) mais ne le vainquit pas.'
  - type: text
    content: 'Tilgath-Pilnéser, roi d''Assyrie, l''attaqua ; il le traita en adversaire et ne le soutint pas. '
  '21':
  - type: note
    content: 'dépouillé  : litt. divisé, partagé, réparti  ; cf. 2R 16.8. –  Mais cela ne lui fut d''aucun secours  : selon 2R 16.9, le roi d''Assyrie accède à la demande d''Achaz ; peut-être le chroniste souligne-t-il les effets à long terme de la politique d''Achaz : Juda deviendra un vassal de l''Assyrie.'
  - type: text
    content: 'Car Achaz avait dépouillé la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la maison du roi et celle des chefs, pour faire des dons au roi d''Assyrie. Mais cela ne lui fut d''aucun secours. '
  '22':
  - type: note
    content: 'Pendant qu''il était dans la détresse  : le verbe hébreu correspondant est traduit par traiter en adversaire au v. 20 ; autre traduction possible pendant qu''il était assiégé  ; LXX rattache ces mots au v. 21  : Cela ne fut pas pour lui une aide mais une affliction. –  il continuait à commettre des sacrilèges  : autre traduction il devint encore plus infidèle  ; cf. 12.2n.'
  - type: text
    content: 'Pendant qu''il était dans la détresse, il continuait à commettre des sacrilèges envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', lui, le roi Achaz. '
  '23':
  - type: note
    content: 'Ce v. abrège considérablement le récit de 1R 16.10-18 ; Achaz espère obtenir l''aide des dieux de Damas, qui l''avaient battu ; comme c''est l''inverse qui se produit, vient le commentaire doctrinal : Mais ils le firent trébucher… –  tout Israël désigne ici le royaume de Juda ; cf. v. 19n.'
  - type: text
    content: 'Il sacrifia aux dieux de Damas qui l''avaient frappé, et il dit : Puisque les dieux des rois d''Aram viennent à leur secours, je leur offrirai des sacrifices pour qu''ils viennent à mon secours ! Mais ils le firent trébucher, ainsi que tout Israël.'
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 16.17s. –  Il ferma les portes de la maison du Seigneur  : cf. 29.7. –  il se fit des autels dans tous les coins de Jérusalem (ou, peut-être, à tous les angles [de la muraille] de Jérusalem , cf. 26.9,15) : cette mention est propre aux Chroniques.'
  - type: text
    content: 'Achaz rassembla les objets de la maison de Dieu et les mit en pièces. Il ferma les portes de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il se fit des autels dans tous les coins de Jérusalem '
  '25':
  - type: note
    content: Verset propre aux Chroniques. Voir hauts lieux, sacrifices.
  - type: text
    content: 'et il fit des hauts lieux dans chacune des villes de Juda afin d''offrir de l''encens à d''autres dieux. Il contraria ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu de ses pères.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 16.19s. –  Le reste de son histoire  : cf. 1R 11.41n. –  ses entreprises  : litt. ses voies. –  le début et la fin  : cf. 9.29+. –  le livre des rois de Juda et d''Israël  : cf. 16.11n.'
  - type: text
    content: 'Le reste de son histoire, toutes ses entreprises, le début et la fin, cela est écrit dans le livre des rois de Juda et d''Israël. '
  '27':
  - type: note
    content: 'se coucha avec ses pères  : cf. 1R 1.21n. –  on l''ensevelit  : cf. 9.31n. –  on ne le mit pas (litt. ils ne l''amenèrent pas ou ils ne le firent pas entrer) dans les tombeaux des rois d''Israël  : un roi à ce point impie ne méritait pas l''honneur d''être enseveli avec les autres rois, cf. le cas de Joram (21.20) et celui de Joas (24.25), mais voir 2R 16.20. –  Ezéchias  : hébreu Hizqiyah, Hizqiyahou, ou encore Yehizqiya, Yehizqiyahou (YHWH est ma force, YHWH fortifie).'
  - type: text
    content: 'Achaz se coucha avec ses pères, et on l''ensevelit dans la ville de Jérusalem : on ne le mit pas dans les tombeaux des rois d''Israël. Ezéchias, son fils, devint roi à sa place.'
  '3':
  - type: note
    content: 'la vallée du Fils de Hinnom Jos 15.8n  ; vallée au sud de Jérusalem, où l''on brûlait les déchets de la ville et qui était devenue un lieu de cultes idolâtriques ; on trouve aussi vallée de Hinnom (Jos 18.16 ; Né 11.30), en hébreu gé Hinnom, d''où Géhenne. –  fit dévorer ses fils par le feu…  : cf. Lv 18.21 ; Dt 12.31 ; Jr 19.5 ; Ez 16.21 ; 20.31 ; 2R 16.3 porte son fils.'
  - type: text
    content: 'Il offrit de l''encens dans la vallée du Fils de Hinnom et fit dévorer ses fils par le feu, imitant ainsi les abominations des nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dépossédées devant les Israélites. '
  '4':
  - type: note
    content: Cf. Dt 12.2+ ; 1R 14.23+.
  - type: text
    content: Il offrait des sacrifices et de l'encens dans les hauts lieux, sur les collines et sous tout arbre verdoyant.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 5-20 sont propres aux Chroniques, bien que le v. 5 rappelle 2R 16.5. –  Le Seigneur, son Dieu, le livra…  : l''événement est ici vu comme un châtiment du Seigneur. –  roi d''Aram / roi d''Israël  : d''après 2R 16.5 et Es 7.1, le roi d''Aram et le roi d''Israël formèrent une coalition contre Juda. –  les Araméens le battirent  : litt. ils le frappèrent.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, le livra au roi d''Aram ; les Araméens le battirent et firent chez lui un grand nombre de captifs, qu''ils emmenèrent à Damas. Il fut aussi livré au roi d''Israël, qui lui infligea une grande défaite. '
  '6':
  - type: note
    content: 'Péqah, fils de Remalia (hébreu Remalyahou) : le roi d''Israël. –  hommes  : sous-entendu dans le texte. –  parce qu''ils avaient abandonné le Seigneur  : cf. v. 19,25 ; les Chroniques voient les événements de ce chapitre comme une juste rétribution ; voir l''introduction aux Chroniques♦.'
  - type: text
    content: 'Péqah, fils de Remalia, tua en Juda, en un seul jour, cent vingt mille hommes, tous vaillants, parce qu''ils avaient abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères. '
  '7':
  - type: note
    content: 'vaillant homme  : autres traductions héros ; guerrier  ; cf. 32.3. –  Ephraïm  : tribu importante faisant partie du royaume d''Israël. –  royale  : sous-entendu dans le texte. –  second du roi  : cf. 1S 23.17.'
  - type: text
    content: 'Zikri, un vaillant homme d''Ephraïm, tua Maaséya, fils du roi, Azriqam, chef de la maison royale, et Elqana, second du roi. '
  '8':
  - type: note
    content: 'Samarie  : 18.2n.'
  - type: text
    content: Les Israélites firent parmi leurs frères deux cent mille captifs, femmes, fils et filles, et ils leur prirent beaucoup de butin. Ils emmenèrent le butin à Samarie.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Oded  : à ne pas confondre avec le prophète du même nom, qui était le père d''Azaria au temps d''Asa ; 15.1,8. –  le Dieu de vos pères vous les a livrés  : Israël devient l''instrument de la colère de Dieu contre Juda. –  vous les avez massacrés…  : cf. Es 10.6 ; 47.6 ; Za 1.15. –  rage  : le même terme évoque l''irritation en 16.10n  ; 26.19. –  jusqu''au ciel  : cf. Jr 51.9 ; Esd 9.6 ; Ap 18.5 ; voir aussi 2Ch 30.27.'
  - type: text
    content: 'Il y avait là un prophète du '
  - type: text
    content: Seigneur
  - type: text
    content: ' nommé Oded. Il sortit au-devant de l''armée qui revenait à Samarie. Il leur dit : Dans sa fureur contre Juda, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, vous les a livrés, et vous les avez massacrés avec une rage qui atteignait jusqu''au ciel. '
