          text: ' : cf. Jr 51.9 ; Esd 9.6 ; Ap 18.5 ; voir aussi 2Ch 30.27.'
      marker-yv: yv-n
    - type: text
      text: 'Il y avait là un prophète du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' nommé Oded. Il sortit au-devant de l''armée qui revenait à Samarie. Il leur dit : Dans sa fureur contre Juda, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de vos pères, vous les a livrés, et vous les avez massacrés avec une rage qui atteignait jusqu''au ciel. '
