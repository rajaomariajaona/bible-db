      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: second du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 23.17.'
      marker-yv: yv-n
    - type: text
      text: 'Zikri, un vaillant homme d''Ephraïm, tua Maaséya, fils du roi, Azriqam, chef de la maison royale, et Elqana, second du roi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.8 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Samarie
      - type: usfm
        marker: ft
        children:
        - type: text
