document_id: 2CH.28,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Début du règne d'Achaz ; guerre contre Israël
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 16.1-20
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vingt ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms hébreu et plusieurs versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vingt-cinq ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce qui convenait au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 20.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au sens d’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ancêtre.
      marker-yv: yv-n
    - type: text
      text: 'Achaz avait vingt ans lorsqu''il devint roi ; il régna seize ans à Jérusalem. Il ne fit pas ce qui convenait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme l''avait fait David, son père. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vos esclaves et vos servantes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vos esclaves, hommes et femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 12.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 34.9ss ; voir aussi Né 5.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'est-ce pas vous qui êtes en tort…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : par-delà la situation présente, le texte fait peut-être allusion à la faute liée au schisme (le culte concurrent de celui de Jérusalem, et considéré comme illégitime), cf. v. 13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: votre Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 9 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Dieu de vos pères.
      marker-yv: yv-n
    - type: text
      text: 'Et maintenant, ces fils de Juda et de Jérusalem, vous dites que vous allez les réduire à être vos esclaves et vos servantes ! N''est-ce pas vous qui êtes en tort devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'renvoyez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'captifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les mots correspondants font assonance en hébreu.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, écoutez-moi, et renvoyez chez eux ces captifs que vous avez faits parmi vos frères ; car la colère ardente du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est sur vous. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.12 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Ephraïm'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les Israélites, cf. 25.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ezéchias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yehizqiyahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à ne pas confondre avec le roi du même nom, fils d''Achaz, v. 27.'
      marker-yv: yv-n
    - type: text
      text: 'Des hommes, parmi ceux qui étaient à la tête des fils d''Ephraïm, Azaria, fils de Yohanân, Bérékia, fils de Meshillémoth, Ezéchias, fils de Shalloum, et Amasa, fils de Hadlaï, s''élevèrent contre ceux qui revenaient de l''armée. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous ne ferez pas entrer ici ces captifs…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans les v. 13-15, le royaume du Nord, habituellement considéré comme infidèle, paraît plus juste que Juda, qui avait abandonné le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' sous Achaz. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ajouter à nos '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péchés
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 12.19.
      marker-yv: yv-n
    - type: text
      text: 'Ils leur dirent : Vous ne ferez pas entrer ici ces captifs ; car c''est pour nous mettre en tort devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' que vous parlez d''ajouter à nos péchés et à nos torts. Nous avons déjà beaucoup de torts, et la colère ardente est sur Israël. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les hommes armés abandonnèrent les captifs et le butin devant les chefs et devant toute l''assemblée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lc 10.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prirent les captifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se levèrent et prirent les captifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fortifièrent les captifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils les pansèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils les enduisirent d''huile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(panacée de l''Antiquité orientale). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous ceux qui ne pouvaient pas marcher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quiconque trébuchait.
      marker-yv: yv-n
    - type: text
      text: Les hommes qui furent désignés par leur nom prirent les captifs ; ils employèrent le butin à vêtir tous ceux qui étaient nus ; ils leur donnèrent des habits et des sandales, ils les firent manger et boire, ils les pansèrent, ils conduisirent sur des ânes tous ceux qui ne pouvaient pas marcher, et ils les amenèrent à Jéricho, la Ville des Palmiers, auprès de leurs frères. Puis ils retournèrent à Samarie.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A partir d''ici sont rapportées différentes détresses du règne d''Achaz. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: appela…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: envoya auprès des rois d'Assyrie pour l'aider
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les rois d'Assyrie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms hébreu, des versions anciennes et le passage parallèle de 2R 16.7 ont le singulier, cf. v. 20 ; ce pluriel, qui réapparaît dans 30.6 et 32.4, signifie peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le roi d'Assyrie et ses alliés.
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, le roi Achaz appela à son secours les rois d''Assyrie. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les Edomites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce peuple avait profité de la campagne racontée au début du chapitre (v. 5) pour s''installer au sud du territoire judéen (cf. 2R 16.6).'
      marker-yv: yv-n
    - type: text
      text: 'Les Edomites vinrent encore, battirent Juda et emmenèrent des captifs. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bas-Pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 1.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Les villes de Juda prises par les Philistins sont toutes mentionnées dans le livre de Josué (15.10,35,41 ; 19.42), à l''exception de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Guimzo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: que l'on situe au nord-est de la ville philistine d'Eqrôn.
      marker-yv: yv-n
    - type: text
      text: 'Les Philistins firent une invasion dans les villes du Bas-Pays et du Néguev de Juda ; ils prirent Beth-Shémesh, Ayyalôn, Guedéroth, Soko et les localités qui en dépendent, Timna et les localités qui en dépendent, Guimzo et les localités qui en dépendent, et ils y habitèrent. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Car le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' humilia Juda'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: roi d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss hébreux et la plupart des versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'roi de Juda. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui avait commis…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui avait été gravement infidèle au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' humilia Juda à cause d''Achaz, roi d''Israël, qui avait rendu la situation incontrôlable en Juda et qui avait commis de grands sacrilèges envers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baal
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il suivit les voies des rois d''Israël, il fit même des idoles de métal fondu pour les Baals. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tilgath-Pilnéser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 5.6,26 ; forme habituelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tiglath-Piléser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2R 15.29 ; 16.7,10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne le soutint pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : correspond à une légère modification de la vocalisation du texte hébreu traditionnel qui se lit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et ne le vainquit pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''où l''autre traduction retenue par certains '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''attaqua, l''assiégea '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction pour '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: traita en adversaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais ne le vainquit pas.
      marker-yv: yv-n
    - type: text
      text: 'Tilgath-Pilnéser, roi d''Assyrie, l''attaqua ; il le traita en adversaire et ne le soutint pas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dépouillé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: divisé, partagé, réparti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2R 16.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mais cela ne lui fut d'aucun secours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : selon 2R 16.9, le roi d''Assyrie accède à la demande d''Achaz ; peut-être le chroniste souligne-t-il les effets à long terme de la politique d''Achaz : Juda deviendra un vassal de l''Assyrie.'
      marker-yv: yv-n
    - type: text
      text: 'Car Achaz avait dépouillé la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', la maison du roi et celle des chefs, pour faire des dons au roi d''Assyrie. Mais cela ne lui fut d''aucun secours. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pendant qu'il était dans la détresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'traiter en adversaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 20 ; autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pendant qu'il était assiégé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' rattache ces mots au v. 21'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Cela ne fut pas pour lui une aide mais une affliction. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il continuait à commettre des sacrilèges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il devint encore plus infidèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Pendant qu''il était dans la détresse, il continuait à commettre des sacrilèges envers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', lui, le roi Achaz. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce v. abrège considérablement le récit de 1R 16.10-18 ; Achaz espère obtenir l''aide des dieux de Damas, qui l''avaient battu ; comme c''est l''inverse qui se produit, vient le commentaire doctrinal : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mais ils le firent trébucher… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne ici le royaume de Juda ; cf. v. 19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il sacrifia aux dieux de Damas qui l''avaient frappé, et il dit : Puisque les dieux des rois d''Aram viennent à leur secours, je leur offrirai des sacrifices pour qu''ils viennent à mon secours ! Mais ils le firent trébucher, ainsi que tout Israël.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2R 16.17s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il ferma les portes de la maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 29.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il se fit des autels dans tous les coins de Jérusalem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou, peut-être, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à tous les angles [de la muraille] de Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 26.9,15) : cette mention est propre aux Chroniques.'
      marker-yv: yv-n
    - type: text
      text: 'Achaz rassembla les objets de la maison de Dieu et les mit en pièces. Il ferma les portes de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', il se fit des autels dans tous les coins de Jérusalem '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Verset propre aux Chroniques. Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et il fit des hauts lieux dans chacune des villes de Juda afin d''offrir de l''encens à d''autres dieux. Il contraria ainsi le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu de ses pères.'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2R 16.19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le reste de son histoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 11.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses entreprises
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ses voies. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le début et la fin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le livre des rois de Juda et d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 16.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le reste de son histoire, toutes ses entreprises, le début et la fin, cela est écrit dans le livre des rois de Juda et d''Israël. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se coucha avec ses pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 1.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on l'ensevelit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on ne le mit pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils ne l''amenèrent pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ne le firent pas entrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans les tombeaux des rois d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un roi à ce point impie ne méritait pas l''honneur d''être enseveli avec les autres rois, cf. le cas de Joram (21.20) et celui de Joas (24.25), mais voir 2R 16.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ezéchias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hizqiyah, Hizqiyahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yehizqiya, Yehizqiyahou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH est ma force, YHWH fortifie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Achaz se coucha avec ses pères, et on l''ensevelit dans la ville de Jérusalem : on ne le mit pas dans les tombeaux des rois d''Israël. Ezéchias, son fils, devint roi à sa place.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la vallée du Fils de Hinnom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 15.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; vallée au sud de Jérusalem, où l''on brûlait les déchets de la ville et qui était devenue un lieu de cultes idolâtriques ; on trouve aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vallée de Hinnom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Jos 18.16 ; Né 11.30), en hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gé Hinnom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''où '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Géhenne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fit dévorer ses fils par le feu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 18.21 ; Dt 12.31 ; Jr 19.5 ; Ez 16.21 ; 20.31 ; 2R 16.3 porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son fils.
      marker-yv: yv-n
    - type: text
      text: 'Il offrit de l''encens dans la vallée du Fils de Hinnom et fit dévorer ses fils par le feu, imitant ainsi les abominations des nations que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait dépossédées devant les Israélites. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Dt 12.2+ ; 1R 14.23+.
      marker-yv: yv-n
    - type: text
      text: Il offrait des sacrifices et de l'encens dans les hauts lieux, sur les collines et sous tout arbre verdoyant.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 5-20 sont propres aux Chroniques, bien que le v. 5 rappelle 2R 16.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ', son Dieu, le livra…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''événement est ici vu comme un châtiment du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'roi d''Aram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: roi d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après 2R 16.5 et Es 7.1, le roi d''Aram et le roi d''Israël formèrent une coalition contre Juda. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Araméens le battirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils le frappèrent.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu, le livra au roi d''Aram ; les Araméens le battirent et firent chez lui un grand nombre de captifs, qu''ils emmenèrent à Damas. Il fut aussi livré au roi d''Israël, qui lui infligea une grande défaite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Péqah, fils de Remalia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
