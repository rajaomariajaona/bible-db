      marker-yv: yv-n
    - type: text
      text: 'Péqah, fils de Remalia, tua en Juda, en un seul jour, cent vingt mille hommes, tous vaillants, parce qu''ils avaient abandonné le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de leurs pères. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vaillant homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: héros ; guerrier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 32.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ephraïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : tribu importante faisant partie du royaume d''Israël. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
