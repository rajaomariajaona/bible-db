document_id: ACT.28,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Malte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 27.26ss,39ss.
      marker-yv: yv-n
    - type: text
      text: Une fois arrivés sains et saufs, nous avons appris que l'île s'appelait Malte.
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On nous a rendu de grands honneurs et, à notre départ, on nous a fourni ce dont nous avions besoin.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Voyage de Malte à Rome
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trois mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous avons gagné le large
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faire voile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 13.13 ; 16.11 ; 18.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un bateau d''Alexandrie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: enseigne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : probablement une figure de proue. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Dioscures '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont Castor et Pollux, fils de Zeus dans la mythologie gréco-romaine. Ils étaient censés protéger les marins.
      marker-yv: yv-n
    - type: text
      text: 'Après un séjour de trois mois, nous avons gagné le large sur un bateau d''Alexandrie qui avait hiverné dans l''île et qui portait pour enseigne les Dioscures. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Syracuse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en Sicile.'
      marker-yv: yv-n
    - type: text
      text: 'Ayant abordé à Syracuse, nous y avons demeuré trois jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en suivant la côte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte incertain ; quelques mss ont un autre verbe qui pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'levant l''ancre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: larguant les amarres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Reggio '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Rhegium
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', tout au sud de l''Italie. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pouzzoles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Puteoli
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', près de Naples, à environ 350 km de la précédente escale et à 200 km de Rome.'
      marker-yv: yv-n
    - type: text
      text: 'De là, en suivant la côte, nous avons atteint Reggio ; le vent du sud s''étant levé le lendemain, en deux jours nous sommes parvenus à Pouzzoles, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 20.6.
      marker-yv: yv-n
    - type: text
      text: 'où nous avons trouvé des frères qui nous ont prié de demeurer sept jours avec eux. C''est ainsi que nous sommes arrivés à Rome. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les frères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(1.15+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de cette ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.10 ; 18.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Appius
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à environ 65 km de Rome, et les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Trois-Tavernes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à 50 km. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a rendu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 26.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pris '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'repris '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: courage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 23.11 ; Rm 1.11ss ; 15.14ss.'
      marker-yv: yv-n
    - type: text
      text: Les frères de cette ville, qui avaient eu de nos nouvelles, sont venus à notre rencontre jusqu'au Forum d'Appius et aux Trois-Tavernes. En les voyant, Paul a rendu grâce à Dieu et il a pris courage.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Rome
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 24.23 ; 27.3+ ; 28.30s. – Texte occidental probable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Le centurion livra les prisonniers au commandant, mais Paul trouva grâce auprès de lui pour demeurer à part, en dehors de la forteresse, tandis qu'un soldat le gardait.
      marker-yv: yv-n
    - type: text
      text: Après notre arrivée à Rome, on a permis à Paul de demeurer à part avec le soldat qui le gardait.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 13.46+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les notables '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 19.47. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'contre le peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd''Israël, cf. 21.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les coutumes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prisonnier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: livré aux Romains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 21.32s ; Lc 9.22 ; 24.7.'
      marker-yv: yv-n
    - type: text
      text: 'Au bout de trois jours, il convoqua les notables des Juifs ; quand ils furent réunis, il se mit à leur dire : Mes frères, sans avoir rien fait contre le peuple ni contre les coutumes de nos pères, moi, je suis prisonnier depuis qu''à Jérusalem j''ai été livré aux Romains. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'interrogé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me relâcher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.9 ; 26.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rien qui mérite la mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 23.29+.
      marker-yv: yv-n
    - type: text
      text: 'Après m''avoir interrogé, ceux-ci étaient décidés à me relâcher, parce qu''il n''y avait en moi rien qui mérite la mort. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Juifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.45+ ; cf. 25.8ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'y sont opposés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rencontrer la contradiction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 22 ; cf. 13.45 ; Lc 2.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; certains témoins du texte occidental ajoutent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en criant : Enlève notre ennemi ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en appeler à César '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.11+. – A la fin du v. le texte occidental ajoute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais pour délivrer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou racheter) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ma vie de la mort.
      marker-yv: yv-n
    - type: text
      text: 'Mais les Juifs s''y sont opposés et j''ai été forcé d''en appeler à César, sans avoir pour autant l''intention d''accuser ma nation. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les barbares
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. les autochtones, qui ne parlaient pas le grec (Rm 1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'humanité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui s'était mise à tomber
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui menaçait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'froid '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 11.27.
      marker-yv: yv-n
    - type: text
      text: 'Les barbares nous ont témoigné une humanité extraordinaire ; ils nous ont tous accueillis près d''un grand feu, qu''ils avaient allumé à cause de la pluie qui s''était mise à tomber et du froid. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''espérance d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces chaînes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette chaîne.
      marker-yv: yv-n
    - type: text
      text: C'est pour ce motif que j'ai demandé à vous voir et à vous parler, car c'est à cause de l'espérance d'Israël que je porte ces chaînes.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 28.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aucun écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.2 ; 22.5.'
      marker-yv: yv-n
    - type: text
      text: 'Ils lui répondirent : Nous n''avons reçu de Judée aucun écrit à ton sujet, et aucun frère n''est venu pour rapporter ou dire du mal de toi. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 17.19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce parti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la contradiction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.45+ ; Lc 2.34 ; Hé 12.3.
      marker-yv: yv-n
    - type: text
      text: Mais nous voudrions t'entendre parler toi-même de ce que tu penses, car nous savons que ce parti rencontre partout la contradiction.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il rendait témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'règne de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3+ ; cf. 19.8 ; 28.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' de Moïse / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Prophètes
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '26.22+ ; cf. 17.2s,11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis le matin jusqu'au soir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 20.7,11.'
      marker-yv: yv-n
    - type: text
      text: 'Ils lui fixèrent un jour et revinrent le trouver en plus grand nombre dans son logis. Dans son exposé, il rendait témoignage au règne de Dieu et s''efforçait, par la loi de Moïse et les Prophètes, de les persuader de tout ce qui concerne Jésus, et cela depuis le matin jusqu''au soir. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 14.1s ; 17.4s,12 ; 18.6-8.
      marker-yv: yv-n
    - type: text
      text: 'Les uns furent persuadés par ce qu''il disait, et les autres ne crurent pas. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 23.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que ceci
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'une seule parole.
      marker-yv: yv-n
    - type: text
      text: 'Comme ils se retiraient, en désaccord les uns avec les autres, Paul n''ajouta que ceci : L''Esprit saint a bien parlé à vos pères, par l''entremise du prophète Esaïe, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.26 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Es 6.9s
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Mt 13.14s/ / ; Jn 12.40.'
      marker-yv: yv-n
    - type: text
      text: 'quand il a dit :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Va vers ce peuple, et dis :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Vous aurez beau entendre, vous ne comprendrez jamais ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: vous aurez beau regarder, vous ne verrez jamais ;
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2Co 3.14.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: car le cœur de ce peuple s'est engourdi ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: ils sont devenus durs d'oreille et ils ont fermé les yeux,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: de peur de voir avec leurs yeux, d'entendre avec leurs oreilles,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: de comprendre avec leur cœur
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et de faire demi-tour ; je les aurais guéris !
  '28':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sachez donc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce salut de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 3.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux (autres) nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 13.46+ ; 18.6 ; Ps 67.3 ; 98.3.'
      marker-yv: yv-n
    - type: text
      text: 'Sachez donc que ce salut de Dieu a été envoyé aux non-Juifs : eux, ils écouteront. [ '
  '29':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certains mss, qui représentent notamment le texte occidental, ajoutent ici
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lorsqu'il eut dit cela, les Juifs s'en allèrent, en débattant vivement entre eux.
      marker-yv: yv-n
    - type: text
      text: ']'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul avait ramassé une brassée de bois mort pour la mettre dans le feu, mais, par l''effet de la chaleur, une vipère en est sortie et s''est attachée à sa main. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 28.16,23 ; 2Tm 1.17. A la fin du v. certains mss occidentaux ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Juifs et Grecs.
      marker-yv: yv-n
    - type: text
      text: 'Il demeura deux années entières au domicile qu''il avait loué. Il accueillait tous ceux qui venaient le voir ; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: il proclamait le règne de Dieu et enseignait ce qui concerne le Seigneur Jésus-Christ avec une entière assurance, sans empêchement.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', que les Grecs, et sans doute aussi les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: barbares
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', tenaient pour une divinité, ou au moins pour une fatalité à laquelle nul ne pouvait échapper.'
      marker-yv: yv-n
    - type: text
      text: 'Quand les barbares ont vu la bête suspendue à sa main, ils se sont dit les uns aux autres : Cet homme est sûrement un meurtrier, puisque, à peine sauvé de la mer, la Justice ne lui permet pas de vivre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Mc 16.18 ; Lc 10.19.
      marker-yv: yv-n
    - type: text
      text: 'Mais il a secoué la bête dans le feu et n''en a éprouvé aucun mal. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.22 ; 14.11ss.'
      marker-yv: yv-n
    - type: text
      text: Les gens s'attendaient à le voir enfler ou tomber mort tout à coup ; mais, après avoir attendu longtemps, voyant qu'il ne lui arrivait rien de mal, ils ont changé d'avis et se sont mis à dire que c'était un dieu.
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: premier personnage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: premier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sans doute le titre du principal magistrat de Malte à l''époque romaine ; voir aussi 13.50'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.48 ; 16.5 ; 28.14.'
      marker-yv: yv-n
    - type: text
      text: 'Il y avait, dans les environs, une propriété appartenant au premier personnage de l''île, un nommé Publius, qui nous a accueillis et logés amicalement pendant trois jours. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.40 ; Lc 4.38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'imposé les mains '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.6+ ; cf. Lc 4.40 ; Jc 5.14.
      marker-yv: yv-n
    - type: text
      text: 'Le père de Publius était alité, en proie à la fièvre et à la dysenterie ; Paul est entré chez lui, il a prié, il lui a imposé les mains et il l''a guéri. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.15s ; 8.7 ; 19.11s ; Lc 5.15 ; 7.21.
      marker-yv: yv-n
    - type: text
      text: 'Là-dessus, les autres malades de l''île sont venus aussi, et ils ont été guéris. '
