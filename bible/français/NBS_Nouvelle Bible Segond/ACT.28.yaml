document_id: ACT.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul à Malte
  - type: text
    content: ' '
  - type: note
    content: 27.26ss,39ss.
  - type: text
    content: Une fois arrivés sains et saufs, nous avons appris que l'île s'appelait Malte.
  '10':
  - type: text
    content: On nous a rendu de grands honneurs et, à notre départ, on nous a fourni ce dont nous avions besoin.
  - type: heading
    content: Voyage de Malte à Rome
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'trois mois 27.9n,12. –  nous avons gagné le large  : le même verbe est traduit par faire voile en 13.13 ; 16.11 ; 18.21. –  un bateau d''Alexandrie 27.6n. –  enseigne  : probablement une figure de proue. –  les Dioscures sont Castor et Pollux, fils de Zeus dans la mythologie gréco-romaine. Ils étaient censés protéger les marins.'
  - type: text
    content: 'Après un séjour de trois mois, nous avons gagné le large sur un bateau d''Alexandrie qui avait hiverné dans l''île et qui portait pour enseigne les Dioscures. '
  '12':
  - type: note
    content: Syracuse, en Sicile.
  - type: text
    content: 'Ayant abordé à Syracuse, nous y avons demeuré trois jours. '
  '13':
  - type: note
    content: 'en suivant la côte  : texte incertain ; quelques mss ont un autre verbe qui pourrait signifier levant l''ancre ou larguant les amarres. –  Reggio ou Rhegium, tout au sud de l''Italie. –  Pouzzoles ou Puteoli, près de Naples, à environ 350 km de la précédente escale et à 200 km de Rome.'
  - type: text
    content: 'De là, en suivant la côte, nous avons atteint Reggio ; le vent du sud s''étant levé le lendemain, en deux jours nous sommes parvenus à Pouzzoles, '
  '14':
  - type: note
    content: Cf. 20.6.
  - type: text
    content: 'où nous avons trouvé des frères qui nous ont prié de demeurer sept jours avec eux. C''est ainsi que nous sommes arrivés à Rome. '
  '15':
  - type: note
    content: 'Les frères (1.15+) de cette ville  : cf. 2.10 ; 18.2. –  Appius, à environ 65 km de Rome, et les Trois-Tavernes, à 50 km. –  a rendu grâce  : cf. Mt 26.27n. –  pris ou repris courage  : cf. 23.11 ; Rm 1.11ss ; 15.14ss.'
  - type: text
    content: Les frères de cette ville, qui avaient eu de nos nouvelles, sont venus à notre rencontre jusqu'au Forum d'Appius et aux Trois-Tavernes. En les voyant, Paul a rendu grâce à Dieu et il a pris courage.
  - type: heading
    content: Paul à Rome
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 24.23 ; 27.3+ ; 28.30s. – Texte occidental probable  : Le centurion livra les prisonniers au commandant, mais Paul trouva grâce auprès de lui pour demeurer à part, en dehors de la forteresse, tandis qu''un soldat le gardait.'
  - type: text
    content: Après notre arrivée à Rome, on a permis à Paul de demeurer à part avec le soldat qui le gardait.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.46+. –  les notables 13.50n  ; Lc 19.47. –  contre le peuple d''Israël, cf. 21.28. –  les coutumes 21.21+. –  prisonnier 23.18+. –  livré aux Romains  : cf. 21.32s ; Lc 9.22 ; 24.7.'
  - type: text
    content: 'Au bout de trois jours, il convoqua les notables des Juifs ; quand ils furent réunis, il se mit à leur dire : Mes frères, sans avoir rien fait contre le peuple ni contre les coutumes de nos pères, moi, je suis prisonnier depuis qu''à Jérusalem j''ai été livré aux Romains. '
  '18':
  - type: note
    content: interrogé 4.9n. –  me relâcher 25.9 ; 26.32. –  rien qui mérite la mort 23.29+.
  - type: text
    content: 'Après m''avoir interrogé, ceux-ci étaient décidés à me relâcher, parce qu''il n''y avait en moi rien qui mérite la mort. '
  '19':
  - type: note
    content: 'les Juifs 13.45+ ; cf. 25.8ss. –  s''y sont opposés  : le même verbe est traduit par rencontrer la contradiction au v. 22 ; cf. 13.45 ; Lc 2.34n  ; certains témoins du texte occidental ajoutent  : en criant : Enlève notre ennemi ! –  en appeler à César 25.11+. – A la fin du v. le texte occidental ajoute  : mais pour délivrer (ou racheter) ma vie de la mort.'
  - type: text
    content: 'Mais les Juifs s''y sont opposés et j''ai été forcé d''en appeler à César, sans avoir pour autant l''intention d''accuser ma nation. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les barbares  : c.-à-d. les autochtones, qui ne parlaient pas le grec (Rm 1.14n). –  humanité 27.3n. –  qui s''était mise à tomber  : autre traduction possible qui menaçait . –  froid 2Co 11.27.'
  - type: text
    content: 'Les barbares nous ont témoigné une humanité extraordinaire ; ils nous ont tous accueillis près d''un grand feu, qu''ils avaient allumé à cause de la pluie qui s''était mise à tomber et du froid. '
  '20':
  - type: note
    content: 'l''espérance d''Israël 23.6+. –  ces chaînes  : litt. cette chaîne.'
  - type: text
    content: C'est pour ce motif que j'ai demandé à vous voir et à vous parler, car c'est à cause de l'espérance d'Israël que je porte ces chaînes.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 28.15. –  aucun écrit  : cf. 9.2 ; 22.5.'
  - type: text
    content: 'Ils lui répondirent : Nous n''avons reçu de Judée aucun écrit à ton sujet, et aucun frère n''est venu pour rapporter ou dire du mal de toi. '
  '22':
  - type: note
    content: 'Cf. 17.19s. –  ce parti  : cf. 5.17n  ; 24.5+. –  la contradiction 13.45+ ; Lc 2.34 ; Hé 12.3.'
  - type: text
    content: Mais nous voudrions t'entendre parler toi-même de ce que tu penses, car nous savons que ce parti rencontre partout la contradiction.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'il rendait témoignage 23.11+. –  règne de Dieu 1.3+ ; cf. 19.8 ; 28.31. –  loi de Moïse / Prophètes 26.22+ ; cf. 17.2s,11. –  depuis le matin jusqu''au soir  : cf. 20.7,11.'
  - type: text
    content: 'Ils lui fixèrent un jour et revinrent le trouver en plus grand nombre dans son logis. Dans son exposé, il rendait témoignage au règne de Dieu et s''efforçait, par la loi de Moïse et les Prophètes, de les persuader de tout ce qui concerne Jésus, et cela depuis le matin jusqu''au soir. '
  '24':
  - type: note
    content: Cf. 14.1s ; 17.4s,12 ; 18.6-8.
  - type: text
    content: 'Les uns furent persuadés par ce qu''il disait, et les autres ne crurent pas. '
  '25':
  - type: note
    content: 'Cf. 23.7. –  que ceci  : litt. qu''une seule parole.'
  - type: text
    content: 'Comme ils se retiraient, en désaccord les uns avec les autres, Paul n''ajouta que ceci : L''Esprit saint a bien parlé à vos pères, par l''entremise du prophète Esaïe, '
  '26':
  - type: note
    content: Es 6.9s  ; Mt 13.14s/ / ; Jn 12.40.
  - type: text
    content: 'quand il a dit :'
  - type: text
    content: 'Va vers ce peuple, et dis :'
  - type: text
    content: Vous aurez beau entendre, vous ne comprendrez jamais ;
  - type: text
    content: vous aurez beau regarder, vous ne verrez jamais ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2Co 3.14.
  - type: text
    content: car le cœur de ce peuple s'est engourdi ;
  - type: text
    content: ils sont devenus durs d'oreille et ils ont fermé les yeux,
  - type: text
    content: de peur de voir avec leurs yeux, d'entendre avec leurs oreilles,
  - type: text
    content: de comprendre avec leur cœur
  - type: text
    content: et de faire demi-tour ; je les aurais guéris !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Sachez donc 2.14+. –  ce salut de Dieu Lc 3.6. –  aux non-Juifs ou aux (autres) nations  : cf. 13.46+ ; 18.6 ; Ps 67.3 ; 98.3.'
  - type: text
    content: 'Sachez donc que ce salut de Dieu a été envoyé aux non-Juifs : eux, ils écouteront. [ '
  '29':
  - type: note
    content: 'Certains mss, qui représentent notamment le texte occidental, ajoutent ici  : Lorsqu''il eut dit cela, les Juifs s''en allèrent, en débattant vivement entre eux.'
  - type: text
    content: ']'
  '3':
  - type: text
    content: 'Paul avait ramassé une brassée de bois mort pour la mettre dans le feu, mais, par l''effet de la chaleur, une vipère en est sortie et s''est attachée à sa main. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Cf. 28.16,23 ; 2Tm 1.17. A la fin du v. certains mss occidentaux ajoutent Juifs et Grecs.
  - type: text
    content: 'Il demeura deux années entières au domicile qu''il avait loué. Il accueillait tous ceux qui venaient le voir ; '
  '31':
  - type: text
    content: il proclamait le règne de Dieu et enseignait ce qui concerne le Seigneur Jésus-Christ avec une entière assurance, sans empêchement.
  '4':
  - type: note
    content: la Justice, que les Grecs, et sans doute aussi les barbares, tenaient pour une divinité, ou au moins pour une fatalité à laquelle nul ne pouvait échapper.
  - type: text
    content: 'Quand les barbares ont vu la bête suspendue à sa main, ils se sont dit les uns aux autres : Cet homme est sûrement un meurtrier, puisque, à peine sauvé de la mer, la Justice ne lui permet pas de vivre. '
  '5':
  - type: note
    content: Cf. Mc 16.18 ; Lc 10.19.
  - type: text
    content: 'Mais il a secoué la bête dans le feu et n''en a éprouvé aucun mal. '
  '6':
  - type: note
    content: 'un dieu  : cf. 12.22 ; 14.11ss.'
  - type: text
    content: Les gens s'attendaient à le voir enfler ou tomber mort tout à coup ; mais, après avoir attendu longtemps, voyant qu'il ne lui arrivait rien de mal, ils ont changé d'avis et se sont mis à dire que c'était un dieu.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'premier personnage  : litt. premier , sans doute le titre du principal magistrat de Malte à l''époque romaine ; voir aussi 13.50n. –  trois jours  : cf. 10.48 ; 16.5 ; 28.14.'
  - type: text
    content: 'Il y avait, dans les environs, une propriété appartenant au premier personnage de l''île, un nommé Publius, qui nous a accueillis et logés amicalement pendant trois jours. '
  '8':
  - type: note
    content: Cf. 9.40 ; Lc 4.38. –  imposé les mains 6.6+ ; cf. Lc 4.40 ; Jc 5.14.
  - type: text
    content: 'Le père de Publius était alité, en proie à la fièvre et à la dysenterie ; Paul est entré chez lui, il a prié, il lui a imposé les mains et il l''a guéri. '
  '9':
  - type: note
    content: 5.15s ; 8.7 ; 19.11s ; Lc 5.15 ; 7.21.
  - type: text
    content: 'Là-dessus, les autres malades de l''île sont venus aussi, et ils ont été guéris. '
