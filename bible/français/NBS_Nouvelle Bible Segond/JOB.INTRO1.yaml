document_id: JOB.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Contrairement à l''opinion répandue, le livre de Job ne traite pas simplement de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: souffrance
  - type: text
    text: ' innocente, considérée en elle-même. Il s''intéresse plutôt au rapport entre cette souffrance et le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Dieu tout-puissant
  - type: text
    text: . Il présente une quête longue et difficile sur le véritable visage de Dieu, quête qui naît presque inévitablement dans la détresse d'un malheur inexplicable. Quel est ce Dieu, qui semble rester silencieux et laisser faire ? Pourquoi paraît-il même s'acharner sur le malheureux qui n'en peut mais ?
- type: usfm
  marker: is2
  children:
  - type: text
    text: Pourquoi ?
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A ces questions les humains apportent en général un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: système de réponses
  - type: text
    text: ' destinées à satisfaire la raison. Ainsi les amis de Job avec leurs thèses et arguments. Mais que valent ces réponses ? Job les conteste avec tant de vigueur qu''il n''est pas toujours aisé de discerner s''il conteste l''image traditionnelle de Dieu qu''on veut lui imposer ou s''il conteste Dieu lui-même. En tout cas, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur (YHWH)
  - type: text
    text: ' qui prend la parole à la fin du livre semble n''avoir guère apprécié le zèle apologétique des amis de Job (cf. 13.4-10) : c''est une bien mauvaise note qu''il leur attribue (42.7s).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Tout s''amorce avec la question formulée par '
  - type: usfm
    marker: it
    children:
    - type: text
      text: l'Adversaire
  - type: text
    text: ' (1.9) : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Est-ce
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: pour rien
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: que Job craint Dieu ?
  - type: text
    text: ' Autrement dit, honore-t-il Dieu à cause des avantages qu''il retire de cette attitude, ou bien l''aime-t-il de façon désintéressée ? Aucun croyant ne saurait échapper à cette question. Dieu relève le défi : il ne sera aimé que pour lui-même.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Aux « pourquoi » que Job lance vers le ciel, le livre apporte-t-il, au fond, une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: réponse
  - type: text
    text: '  ? Quand, aux chapitres 38 et suivants, Dieu prend enfin la parole, ce n''est pas pour répondre, mais pour interroger à son tour. L''être humain retrouve ainsi sa vraie place, celle d''un être responsable devant Dieu, qui doit répondre de lui-même et de ses dires. Mais Dieu reste Dieu. Son mystère ne se laisse enfermer dans aucune formule. L''essentiel n''est pas dans les questions que nous pouvons nous poser à son sujet ni dans d''éventuelles réponses, mais dans le fait souverain qu''il est là.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: L'organisation du livre
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre se présente comme un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: drame poétique
  - type: text
    text: ' (3.1–42.6) encadré par deux textes plus courts, principalement en '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'prose :'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: '1.1–2.13 L''épreuve de Job :'
  - type: text
    text: ' Ce '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prologue
  - type: text
    text: ' situe les principaux acteurs du drame : Job et les siens, ses trois amis (Eliphaz de Témân, Bildad de Shouah et Tsophar de Naama) ; Dieu lui-même et les « fils de dieu », des êtres célestes qui forment son entourage, à l''image de la cour des souverains de l''Antiquité ; parmi eux, le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Satan, l'Adversaire
  - type: text
    text: ', l''accusateur, celui qui jette le doute. Les scènes successives de ce prologue nous transportent alternativement au ciel, dans la cour de Dieu, et au pays d''Outs (sur le territoire d''Edom, en Arabie ou dans la région du Hauran, à l''est du cours supérieur de la vallée du Jourdain), là où vivent Job et les siens.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 42.7-17
  - type: text
    text: ' Un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: épilogue
  - type: text
    text: ' en deux parties : Job intercède pour ses amis (v. 7-9) et Dieu rétablit Job dans son bonheur premier (v. 10-17).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: drame poétique
  - type: text
    text: ' proprement dit, totalement distinct des scènes du prologue, fait alterner monologues et dialogues selon les articulations suivantes :'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Chap. 3 Monologue de Job
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'Chap. 4–27 Dialogue avec les trois amis :'
  - type: text
    text: ' trois cycles comprenant successivement l''argumentation de chacun des amis suivie d''une réponse de Job (4–14 ; 15–21 ; 22–27 ; le troisième cycle paraît cependant irrégulier, cf. 24.18'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: '  ; 27.13'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ). D'une part, les thèses classiques des amis, postulant un lien de cause à effet entre péché (en l'occurrence, peut-être, un péché secret de Job) et malheur ; d'autre part, la protestation de Job, jaillissant de l'expérience vive.
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'Chap. 28 Poème sur la Sagesse :'
  - type: text
    text: ' la Sagesse échappe aux ingénieurs les plus habiles, aux explorateurs les plus hardis. Le lecteur est dès lors invité à ne pas se laisser trop facilement convaincre par les divers arguments échangés jusqu''ici. Dieu, seul sage (v. 23), parle cependant aux humains et leur donne part à la sagesse sous une forme modeste : craindre le Seigneur (YHWH) et s''écarter du mal (v. 28).'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Chap. 29–31 Monologue de Job
  - type: text
    text: ', reprenant sa plainte et ses questions, et débouchant (chap. 31) sur des serments d''innocence qui, en principe, contraignent Dieu à se manifester, ne serait-ce qu''en accomplissant les malédictions conditionnelles que Job a prononcées contre lui-même au cas où il aurait vraiment péché.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Chap. 32–37 Diatribe d'Elihou
  - type: text
    text: ', nouvel intervenant qui estime que les trois amis n''ont pas été assez convaincants pour réduire Job au silence. Il reprend cependant lui-même plusieurs de leurs arguments, tout en relâchant quelque peu le lien de causalité entre faute et souffrance.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 38.1–42.6 Dieu lui-même s'adresse à Job
  - type: text
    text: ', qui lui répond brièvement à deux reprises (40.3-5 ; 42.1-6).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: L'espérance de Job
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La lutte acharnée de Job contre l''argumentation traditionnelle de ses amis résulte d''une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: espérance intime
  - type: text
    text: ' qui continue envers et contre tout de l''habiter. Celle-ci affleure dans certains passages du deuxième cycle de discours. On retrouve ici quelques-uns des « grands textes » du livre. Ainsi :'
- type: usfm
  marker: ip
  children:
  - type: text
    text: '16.18-22 '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Dès maintenant, j'ai un
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: témoin
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: dans le ciel —
  - type: text
    text: ' quelqu''un qui, malgré tout, ne peut pas ne pas entendre ma plainte.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: '17.3 '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sois mon
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: garant
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: auprès de toi-même
  - type: text
    text: ' (voir la note).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: '19.23-27 '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Je sais bien, moi, que mon
  - type: text
    text: ' '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: rédempteur
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: est vivant.
  - type: text
    text: ' Le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rédempteur
  - type: text
    text: ', en hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: go'el,
  - type: text
    text: ' était le plus proche parent d''une victime. C''est à lui qu''il revenait de prendre en main la cause de celle-ci, par exemple en poursuivant et en châtiant son meurtrier, en rachetant le malheureux tombé en esclavage, ou en remplissant à sa place des devoirs familiaux. Dépassant les hésitations du chapitre 14 (v. 13ss), Job affirme sa tremblante assurance d''une réhabilitation finale. On a vu se dessiner ici la foi en la résurrection*.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans ces trois passages, on retrouve l''étonnant '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: dédoublement
  - type: text
    text: ' caractéristique du livre entre l''idée traditionnelle de Dieu et le mystère du Dieu vivant et vrai, en qui se cache l''ultime motif d''espérer encore. Là est la source de l''espérance de Job.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le livre de Job dans la Bible
- type: usfm
  marker: ip
  children:
  - type: text
    text: L'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: originalité
  - type: text
    text: ' du livre de Job est évidente quand on le compare à la littérature connue du Proche-Orient ancien. Le thème du juste souffrant préoccupe déjà les Sumériens une vingtaine de siècles avant l''ère chrétienne, mais les questions posées par Job dépassent largement la conclusion commune des textes non israélites, à savoir la nécessité de se résigner devant l''arbitraire divin. Ce thème brûlant est au contraire l''occasion pour lui de chercher, jusqu''au bout, le vrai visage de Dieu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le livre de Job ne ressemble pas non plus aux autres livres de la Bible. On le classe en général parmi les écrits de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sagesse
  - type: text
    text: ' (voir « La littérature de sagesse », p.${Xsagesse}), mais par sa forme et son thème il diffère fort des Proverbes. On peut le rapprocher de Qohéleth (l''Ecclésiaste) par sa hardiesse à contester ouvertement un certain nombre d''idées reçues, voire de valeurs sacrées, mais sa virulence le place sur un tout autre registre que le pessimisme paisible de Qohéleth. On a également noté des similitudes avec le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: poème du serviteur
  - type: text
    text: ' humilié et maltraité en Esaïe 52–53, mais la souffrance de Job n''est pas affectée d''une quelconque explication rédemptrice.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le lien du livre de Job avec le reste de la Bible est cependant profond. Il réside avant tout dans la vérité que Job découvre au terme de sa douloureuse quête. A la fin de son parcours, en effet, Job a appris que, devant Dieu, il ne peut commencer par se poser lui-même, avec ses souffrances, ses angoisses, ses questions, si terribles soient-elles. C''est d''abord Dieu qui est là, avec ses voies mystérieuses et les questions qu''il pose. Nos propres problèmes, et leurs solutions éventuelles, ne viennent qu''ensuite. C''est d''abord Dieu qui est là, avec sa présence englobante qui a seule la puissance d''apaiser : même si cela ne devait rien résoudre, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: maintenant mon œil t'a vu
  - type: text
    text: ' (42.5).'
