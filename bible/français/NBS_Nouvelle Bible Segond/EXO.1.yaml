document_id: EXO.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: SERVITUDE ET LIBÉRATION D'ISRAËL
  - type: heading
    content: Les Israélites esclaves en Egypte
  - type: text
    content: ' '
  - type: note
    content: 'Voici les noms  : l''expression hébraïque correspondante constitue le titre traditionnel du livre dans la Bible juive ; cf. Ez 48.1. –  des fils d''Israël…  : dans la suite du récit (v. 7,9 etc.) la même expression sera traduite par Israélites , cf. Gn 32.29n  ; 46.1-26. –  toute sa maison  : litt. sa maison , c.-à-d. sa famille.'
  - type: text
    content: 'Voici les noms des fils d''Israël qui étaient venus en Egypte avec Jacob ; chacun était venu avec toute sa maison : '
  '10':
  - type: note
    content: 'donc  : cf. Gn 11.3n. –  sagesse ou habileté  ; cf. Pr 1.2n. –  nos ennemis  : litt. ceux qui nous détestent. –  monter  : de la plaine d''Egypte vers la région montagneuse de Canaan ; cf. Gn 12.10n  ; 46.4+ ; voir aussi Ac 7.19.'
  - type: text
    content: 'Agissons donc avec sagesse à son égard, de peur qu''il ne se multiplie : s''il survenait une guerre, il se joindrait à nos ennemis pour nous faire la guerre et monter ensuite du pays. '
  '11':
  - type: note
    content: 'on lui assigna  : c.-à-d. on assigna au peuple. –  l''affliger (autre traduction l''humilier) …  : cf. 3.7,17 ; 4.31 ; Gn 15.13 ; voir Dt 8.2n. –  corvées  : cf. 2.11 ; 5.4ss ; 6.6s ; 1R 11.28n. –  villes-entrepôts  : le même terme hébreu se retrouve en 1R 9.19. –  Pitom / Ramsès (Gn 47.11) : on situe généralement ces deux villes à la limite entre l''Egypte et le désert du Sinaï, non loin de l''actuel canal de Suez. Pitom vient probablement d''un terme égyptien signifiant temple d''Atoum. La ville avec laquelle Pitom est souvent identifiée a été construite au VIIe s. av. J.-C., près d''un temple beaucoup plus ancien. Ramsès est habituellement identifiée à la capitale de Ramsès II (≈ 1290-1224 av. J.-C.), proche de Tanis ; cf. 12.37 ; Nb 33.3,5. LXX mentionne en outre On, qui est la ville du Soleil (en grec Héliou polis) (cf. Gn 41.45n).'
  - type: text
    content: 'Alors on lui assigna des chefs de travaux forcés afin de l''affliger par des corvées. C''est ainsi qu''il bâtit pour le pharaon des villes-entrepôts : Pitom et Ramsès. '
  '12':
  - type: note
    content: s'accroissait ou, plus litt., éclatait, explosait (cf. Gn 28.14n  ; 30.30n). –  en horreur Nb 22.3n.
  - type: text
    content: 'Mais plus on l''affligeait, plus il se multipliait et s''accroissait ; on prit les Israélites en horreur. '
  '13':
  - type: note
    content: 'les Egyptiens  : autre traduction l''Egypte.'
  - type: text
    content: 'Alors les Egyptiens soumirent les Israélites à un rude esclavage. '
  '14':
  - type: note
    content: 'un dur esclavage  : cf. 6.9 ; esclavage et travail traduisent ici un même mot hébreu. Voir aussi Dt 26.6 ; 1R 12.4 ; Es 14.3.'
  - type: text
    content: 'Ils leur rendirent la vie amère par un dur esclavage : travail de l''argile et des briques, et toutes sortes de travaux des champs, tels étaient les travaux du rude esclavage qu''on leur imposait.'
  - type: heading
    content: Le pharaon persécute les Israélites
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'des Hébreux  : le texte emploie ici le féminin du terme habituellement traduit par hébreu  ; il faudrait dire des sages-femmes hébreu(es ?) , mais l''adjectif correspondant n''est pas usité au féminin en français ; même problème dans la suite où nous traduisons femmes des Hébreux.'
  - type: text
    content: 'Le roi d''Egypte parla aussi aux sages-femmes des Hébreux – l''une se nommait Shiphra et l''autre Poua. '
  '16':
  - type: note
    content: 'les sièges  : litt. les deux pierres. Le terme correspondant, rare (cf. Jr 18.3n), désignait peut-être une sorte de siège d''accouchement ; d''autres y voient un euphémisme et comprennent  : Lorsque vous accouchez…, regardez bien le sexe. LXX quand elles seront sur le point d''accoucher…'
  - type: text
    content: 'Il leur dit : Quand vous accoucherez les femmes des Hébreux et que vous les verrez sur les sièges, si c''est un garçon, faites-le mourir ; si c''est une fille, qu''elle vive. '
  '17':
  - type: note
    content: 'craignirent  : voir crainte. –  laissèrent vivre  : litt. firent vivre, de même aux v. suivants.'
  - type: text
    content: 'Mais les sages-femmes craignirent Dieu ; elles ne firent pas ce que leur avait dit le roi d''Egypte ; elles laissèrent vivre les enfants. '
  '18':
  - type: text
    content: 'Le roi d''Egypte appela les sages-femmes et leur dit : Pourquoi avez-vous agi ainsi ? Pourquoi avez-vous laissé vivre les enfants ? '
  '19':
  - type: note
    content: 'elles sont pleines de vie  : certains modifient légèrement le texte hébreu traditionnel pour lire ce sont des bêtes.'
  - type: text
    content: 'Les sages-femmes répondirent au pharaon : C''est que les femmes des Hébreux ne sont pas comme les Egyptiennes ; comme elles sont pleines de vie, elles accouchent avant l''arrivée de la sage-femme. '
  '2':
  - type: text
    content: 'Ruben, Siméon, Lévi, Juda, '
  '20':
  - type: text
    content: 'Dieu fit du bien aux sages-femmes ; le peuple se multiplia et devint très fort. '
  '21':
  - type: note
    content: 'il leur donna une famille  : litt. il (c.-à-d. Dieu) leur fit des maisons ou des maisonnées (logiquement, aux sages-femmes  ; mais dans le texte le pronom est au masculin, de sorte qu''on comprendrait plutôt  : aux Israélites) ; LXX elles se firent des maisons.'
  - type: text
    content: Parce que les sages-femmes avaient craint Dieu, il leur donna une famille.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'qui naîtront  : Smr, LXX et Tg ajoutent aux Juifs.'
  - type: text
    content: 'Alors le pharaon donna cet ordre à tout son peuple : Tous les garçons qui naîtront, vous les jetterez dans le Nil ; toutes les filles, vous les laisserez vivre.'
  '3':
  - type: text
    content: 'Issacar, Zabulon, Benjamin, '
  '4':
  - type: text
    content: 'Dan, Nephtali, Gad et Aser. '
  '5':
  - type: note
    content: 'Ceux qui étaient issus de Jacob  : litt. tout être (cf. Gn 1.20n) sorti de la cuisse (cf. Gn 24.2n) de Jacob. –  soixante-dix  : LXX soixante-quinze  ; cf. Gn 46.27n  ; Ac 7.14.'
  - type: text
    content: Ceux qui étaient issus de Jacob étaient soixante-dix en tout. Joseph était alors en Egypte.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Gn 50.22-26 ; cf. Ac 7.15.
  - type: text
    content: 'Joseph mourut, ainsi que tous ses frères et toute cette génération-là. '
  '7':
  - type: note
    content: 'Gn 12.2+ ; Dt 26.5 ; Ps 105.24s ; Ac 7.17. –  Israélites v. 1n. –  proliférèrent  : le verbe correspondant est traduit par grouiller en 7.28 ; Gn 1.20n  ; 7.21 ; cf. Gn 9.7n.'
  - type: text
    content: Les Israélites furent féconds ; ils proliférèrent, se multiplièrent et devinrent de plus en plus forts. Et le pays en fut rempli.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ac 7.18.
  - type: text
    content: 'Un nouveau roi, qui n''avait pas connu Joseph, vint à régner sur l''Egypte. '
  '9':
  - type: text
    content: 'Il dit à son peuple : Le peuple des Israélites est plus nombreux et plus fort que nous. '
