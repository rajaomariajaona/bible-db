document_id: EXO.1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: SERVITUDE ET LIBÉRATION D'ISRAËL
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Israélites esclaves en Egypte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Voici les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''expression hébraïque correspondante constitue le titre traditionnel du livre dans la Bible juive ; cf. Ez 48.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Israël…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : dans la suite du récit (v. 7,9 etc.) la même expression sera traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 32.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 46.1-26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute sa maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa famille.
      marker-yv: yv-n
    - type: text
      text: 'Voici les noms des fils d''Israël qui étaient venus en Egypte avec Jacob ; chacun était venu avec toute sa maison : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donc
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 11.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: habileté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Pr 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nos ennemis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui nous détestent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: monter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : de la plaine d''Egypte vers la région montagneuse de Canaan ; cf. Gn 12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 46.4+ ; voir aussi Ac 7.19.'
      marker-yv: yv-n
    - type: text
      text: 'Agissons donc avec sagesse à son égard, de peur qu''il ne se multiplie : s''il survenait une guerre, il se joindrait à nos ennemis pour nous faire la guerre et monter ensuite du pays. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on lui assigna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on assigna au peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''affliger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'humilier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.7,17 ; 4.31 ; Gn 15.13 ; voir Dt 8.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: corvées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.11 ; 5.4ss ; 6.6s ; 1R 11.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: villes-entrepôts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme hébreu se retrouve en 1R 9.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pitom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramsès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Gn 47.11) : on situe généralement ces deux villes à la limite entre l''Egypte et le désert du Sinaï, non loin de l''actuel canal de Suez. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pitom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'vient probablement d''un terme égyptien signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: temple d'Atoum
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . La ville avec laquelle Pitom est souvent identifiée a été construite au VII
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C., près d''un temple beaucoup plus ancien. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ramsès '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est habituellement identifiée à la capitale de Ramsès II (≈ 1290-1224 av. J.-C.), proche de Tanis ; cf. 12.37 ; Nb 33.3,5. LXX mentionne en outre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'On, qui est la ville du Soleil '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(en grec '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Héliou polis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) (cf. Gn 41.45
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Alors on lui assigna des chefs de travaux forcés afin de l''affliger par des corvées. C''est ainsi qu''il bâtit pour le pharaon des villes-entrepôts : Pitom et Ramsès. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''accroissait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus litt., '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'éclatait, explosait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 28.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 30.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en horreur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 22.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais plus on l''affligeait, plus il se multipliait et s''accroissait ; on prit les Israélites en horreur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'Egypte.
      marker-yv: yv-n
    - type: text
      text: 'Alors les Egyptiens soumirent les Israélites à un rude esclavage. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un dur esclavage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.9 ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'esclavage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'travail '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent ici un même mot hébreu. Voir aussi Dt 26.6 ; 1R 12.4 ; Es 14.3.
      marker-yv: yv-n
    - type: text
      text: 'Ils leur rendirent la vie amère par un dur esclavage : travail de l''argile et des briques, et toutes sortes de travaux des champs, tels étaient les travaux du rude esclavage qu''on leur imposait.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le pharaon persécute les Israélites
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Hébreux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte emploie ici le féminin du terme habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: hébreu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; il faudrait dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des sages-femmes hébreu(es ?)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais l''adjectif correspondant n''est pas usité au féminin en français ; même problème dans la suite où nous traduisons '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: femmes des Hébreux.
      marker-yv: yv-n
    - type: text
      text: 'Le roi d''Egypte parla aussi aux sages-femmes des Hébreux – l''une se nommait Shiphra et l''autre Poua. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les sièges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les deux pierres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Le terme correspondant, rare (cf. Jr 18.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), désignait peut-être une sorte de siège d'accouchement ; d'autres y voient un euphémisme et comprennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lorsque vous accouchez…, regardez bien le sexe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand elles seront sur le point d'accoucher…
      marker-yv: yv-n
    - type: text
      text: 'Il leur dit : Quand vous accoucherez les femmes des Hébreux et que vous les verrez sur les sièges, si c''est un garçon, faites-le mourir ; si c''est une fille, qu''elle vive. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: craignirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: laissèrent vivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: firent vivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. suivants.'
      marker-yv: yv-n
    - type: text
      text: 'Mais les sages-femmes craignirent Dieu ; elles ne firent pas ce que leur avait dit le roi d''Egypte ; elles laissèrent vivre les enfants. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi d''Egypte appela les sages-femmes et leur dit : Pourquoi avez-vous agi ainsi ? Pourquoi avez-vous laissé vivre les enfants ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: elles sont pleines de vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient légèrement le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce sont des bêtes.
      marker-yv: yv-n
    - type: text
      text: 'Les sages-femmes répondirent au pharaon : C''est que les femmes des Hébreux ne sont pas comme les Egyptiennes ; comme elles sont pleines de vie, elles accouchent avant l''arrivée de la sage-femme. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ruben, Siméon, Lévi, Juda, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dieu fit du bien aux sages-femmes ; le peuple se multiplia et devint très fort. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il leur donna une famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur fit des maisons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des maisonnées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(logiquement, aux '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sages-femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mais dans le texte le pronom est au masculin, de sorte qu''on comprendrait plutôt'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elles se firent des maisons.
      marker-yv: yv-n
    - type: text
      text: Parce que les sages-femmes avaient craint Dieu, il leur donna une famille.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui naîtront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Smr, LXX et Tg ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux Juifs.
      marker-yv: yv-n
    - type: text
      text: 'Alors le pharaon donna cet ordre à tout son peuple : Tous les garçons qui naîtront, vous les jetterez dans le Nil ; toutes les filles, vous les laisserez vivre.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Issacar, Zabulon, Benjamin, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dan, Nephtali, Gad et Aser. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ceux qui étaient issus de Jacob
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
