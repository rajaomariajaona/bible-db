  - type: text
    text: 'Mais le roi lui dit : Non ! Je te l''achèterai à son prix ; je n''offrirai pas au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', mon Dieu, des holocaustes qui ne coûtent rien ! David acheta l''aire et les bœufs pour cinquante sicles d''argent. '
