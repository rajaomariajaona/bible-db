document_id: 2SA.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David fait recenser le peuple d'Israël
  - type: heading
    content: 1Ch 21.1-6
  - type: text
    content: ' '
  - type: note
    content: 'se mit… en colère  : cf. Nb 25.3 ; 32.13 ; Jg 2.14,20 ; 3.8 ; 2R 13.3. –  de nouveau  : cf. 21.1-14. –  Il incita  : dans le récit parallèle de 1Ch 21, c''est l''Adversaire (le Satan ) qui incite David à dénombrer le peuple. – Le dénombrement semble être une faute en ce que le roi veut connaître le chiffre de la population, alors que le Seigneur avait promis qu''Israël serait innombrable (voir 17.11 ; Gn 13.16 ; 15.5 ; 22.17 ; 26.4 ; 28.14 ; 32.13 ; Ex 1.7 ; 1R 4.20 ; Es 10.22 ; Os 2.11 ; Hé 11.12). De plus, cette opération visait aussi à connaître le nombre des hommes aptes au service militaire (cf. v. 2, où c''est Joab, le chef de l''armée , qui en est chargé ; voir aussi le v. 9) ; mais c''était s''en remettre plus aux forces guerrières qu''à Dieu lui-même (cf. Jg 7.2-7 ; 1S 14.6 ; 17.47 ; Jr 17.5).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit de nouveau en colère contre Israël. Il incita David à leur faire du tort, en disant : Va, dénombre Israël et Juda !'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'sentit battre son cœur  : cf. 1S 24.6n. –  un grand péché  : cf. 12.13+. –  stupidement  : cf. 1S 13.13+.'
  - type: text
    content: 'David sentit battre son cœur après qu''il eut ainsi compté le peuple. David dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : J''ai commis un grand péché en faisant cela ! Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', pardonne, je te prie, la faute que j''ai commise, moi, ton serviteur, car j''ai agi tout à fait stupidement.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'était parvenue ou parvint , l''antériorité ou la simultanéité de la révélation divine n''étant pas clairement définie par le texte hébreu. –  Gad  : cf. 1S 22.5+. –  visionnaire ou voyant  ; cf. 1S 9.9+, autre terme hébreu ; voir prophète.'
  - type: text
    content: 'Quand David se leva, au matin, cette parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était parvenue à Gad, le prophète, le visionnaire de David : '
  '12':
  - type: note
    content: 'Je te propose…  : autre traduction il y a trois fléaux que je peux t''imposer.'
  - type: text
    content: 'Va dire à David : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je te propose trois choses ; choisis-en une, et je la ferai pour toi. '
  '13':
  - type: note
    content: 'Sept années  : cf. Gn 41.30 ; 2R 8.1 ; le texte parallèle de 1Ch 21.12 et LXX parlent de trois années. –  famine / fuite / peste rappellent les trois fléaux, peste / épée (= guerre) / famine, dont parlent souvent Jérémie (21.7 ; 24.10 ; 27.8) ou Ezéchiel (6.11 ; 7.15), et quelques autres textes (Lv 26.25s ; Dt 28.21-25 ; 1R 8.37). –  réfléchis  : litt. sache.'
  - type: text
    content: 'Gad arriva chez David et lui dit : Qu''est-ce qui doit t''arriver ? Sept années de famine dans ton pays, trois mois de fuite devant des adversaires qui te poursuivent, ou bien trois jours de peste dans ton pays ? Maintenant, réfléchis et vois ce que je dois répondre à celui qui m''envoie. '
  '14':
  - type: note
    content: 'une grande détresse  : cf. 1S 28.15+. –  sa compassion  : litt. ses compassions  ; cf. Ps 119.156 ; Dn 9.18 ; Né 9.19,27,31. –  aux mains des hommes  : cf. Jg 2.14 ; Es 10.5-7 ; Ps 106.40-42 ; Siracide 2.17s : « Ceux qui craignent le Seigneur ont toujours le cœur prêt, devant lui ils s''humilient et disent : “Nous tomberons entre les mains du Seigneur et non entre les mains des hommes ; car telle est sa grandeur, telle aussi sa miséricorde.” » Voir aussi Mt 24.45 ; Mc 9.31.'
  - type: text
    content: 'David répondit à Gad : Je suis dans une grande détresse ! Laisse-nous, je te prie, tomber aux mains du '
  - type: text
    content: Seigneur
  - type: text
    content: ', car sa compassion est grande ; mais que je ne tombe pas aux mains des hommes !'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX, le v. 15 commence par David choisit donc pour lui la peste ; c''était le temps de la moisson des blés . –  jusqu''au temps fixé  : expression dont le sens précis nous échappe ; LXX jusqu''à l''heure du déjeuner  ; Syr jusqu''à la sixième heure (≈ midi ). –  de Dan à Bersabée  : cf. v. 2+. –  soixante-dix mille hommes  : cf. Nb 17.14 ; 25.9 ; 1S 6.19.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit venir la peste en Israël, depuis le matin jusqu''au temps fixé ; et, de Dan à Bersabée, il mourut soixante-dix mille hommes parmi le peuple. '
  '16':
  - type: note
    content: 'regretta ce malheur  : autre traduction renonça à ce malheur  ; cf. Ex 32.12,14 ; Jr 18.8 ; Jl 2.13 ; Jon 3.10 ; 4.2 ; voir Dt 32.36 ; Ps 78.38 ; voir aussi Nb 23.19+. –  messager (ou ange) destructeur  : cf. Ex 12.23 ; 2R 19.35 ; Ac 12.23. –  Aravna  : autre lecture traditionnelle Avarna. –  Jébusite  : habitant de Jébus, ancien nom de la ville de Jérusalem avant que David en fasse sa capitale ; cf. Jg 19.10n.'
  - type: text
    content: 'Comme le messager étendait la main sur Jérusalem pour la détruire, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' regretta ce malheur ; il dit au messager destructeur qui était parmi le peuple : Cela suffit ! Arrête maintenant. Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était près de l''aire d''Aravna, le Jébusite.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'C''est moi qui ai péché  : cf. 1S 15.24+. –  C''est moi qui ai commis la faute  : un ms de Qumrân porte c''est moi, le berger, qui ai commis le mal  ; le berger est un titre royal, auquel répond ici l''expression ce troupeau , litt. eux, le petit bétail , désignant le peuple (cf. Ps 78.70-72). –  ta main… sur moi  : cf. Ex 9.3 ; Dt 2.15 ; Jg 2.15 ; 1S 7.13 ; Ez 13.9.'
  - type: text
    content: 'Quand il vit le messager qui frappait parmi le peuple, David dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : C''est moi qui ai péché ! C''est moi qui ai commis la faute ; mais ce troupeau, qu''a-t-il fait ? Que ta main soit sur moi et sur ma famille, je t''en prie !'
  - type: heading
    content: David bâtit un autel pour le Seigneur
  - type: heading
    content: 1Ch 21.18-27
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Gad  : cf. v. 11. –  Aravna  : autre lecture traditionnelle Arania.'
  - type: text
    content: 'Ce jour-là, Gad arriva chez David et lui dit : Monte, élève un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur l''aire d''Aravna, le Jébusite. '
  '19':
  - type: text
    content: 'David monta, selon la parole de Gad, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'depuis Dan jusqu''à Bersabée 1S 3.20n. –  recensez  : le pluriel s''adresse sans doute à Joab et aux collaborateurs dont il s''entourera. –  j''en connaîtrai le nombre  : litt. je connaîtrai le nombre du peuple.'
  - type: text
    content: 'Alors le roi dit à Joab, le chef de l''armée, qui était avec lui : Parcours donc toutes les tribus d''Israël, je te prie, depuis Dan jusqu''à Bersabée, et recensez le peuple. Ainsi j''en connaîtrai le nombre. '
  '20':
  - type: note
    content: 'sortit de chez lui, ou quitta l''esplanade où il battait sa moisson (l''aire), selon le texte parallèle de 1Ch 21.20. –  se prosterna  : cf. 9.6 ; 14.4 ; 1S 24.9 ; 25.23.'
  - type: text
    content: 'Aravna regardait d''en haut et vit le roi et les gens de sa cour qui se dirigeaient vers lui ; alors Aravna sortit et se prosterna devant le roi, face contre terre. '
  '21':
  - type: note
    content: 'Pour t''acheter l''aire  : cf. en Gn 23 une transaction commerciale analogue à celle des v. 21-24. –  bâtir un autel  : cf. Jg 6.11-24. –  afin que le fléau…  : cf. Nb 17.13,15 ; 25.8 ; Ps 106.30.'
  - type: text
    content: 'Aravna dit : Pourquoi, ô roi, viens-tu chez moi, ton serviteur ? David répondit : Pour t''acheter l''aire afin d''y bâtir un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', afin que le fléau qui frappe le peuple s''arrête. '
  '22':
  - type: note
    content: 'holocauste  : cf. 6.17s ; Lv 1 ; 1S 6.14s. –  le traîneau à dépiquer  : engin agricole que l''on faisait passer sur les épis, pour séparer le grain de la balle ; cf. Es 41.15 (autre terme). –  l''attelage  : litt. l''équipement des bœufs. –  de bois, c.-à-d. de combustible.'
  - type: text
    content: 'Aravna dit à David : O roi, mon seigneur, prends-la et offre en holocauste ce qui te plaira ; regarde, les bœufs seront pour l''holocauste, et le traîneau à dépiquer, avec l''attelage, servira de bois ; '
  '23':
  - type: note
    content: 'ô roi, je te donne tout  : on peut aussi traduire ces mots comme une reprise du récit à la troisième personne  : Le roi Aravna donna tout (cela) au roi (David) ; Aravna aurait été roi de Jébus avant la prise de la ville par David. Le nom Aravna est peut-être dérivé d''un mot hourrite signifiant chef, attesté dès le IIe millénaire av. J.-C. ; il aurait donc désigné une fonction avant de devenir un nom propre. –  te soit favorable  : cf. Ez 20.40s ; 43.27 ; Ps 44.4 ; 147.11 ; Jb 33.26 ; cf. Ps 20.4s.'
  - type: text
    content: 'ô roi, je te donne tout ! Et Aravna dit au roi : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te soit favorable ! '
  '24':
  - type: note
    content: 'cinquante sicles d''argent  : environ 500 g ; le texte parallèle de 1Ch 21.25 parle de six cents sicles d''or  ; sur le sicle, cf. 14.26n  ; 1S 9.8n.'
  - type: text
    content: 'Mais le roi lui dit : Non ! Je te l''achèterai à son prix ; je n''offrirai pas au '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, des holocaustes qui ne coûtent rien ! David acheta l''aire et les bœufs pour cinquante sicles d''argent. '
  '25':
  - type: note
    content: 'se laissa fléchir  : cf. 21.14n. –  le fléau… s''arrêta  : cf. v. 21.'
  - type: text
    content: 'David bâtit là un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il offrit des holocaustes et des sacrifices de paix. Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se laissa fléchir en faveur du pays : le fléau qui frappait Israël s''arrêta.'
  '3':
  - type: note
    content: 'cent fois plus nombreux, c.-à-d. absolument impossible à dénombrer. –  que tes yeux… le voient signifie que cela se passe de ton vivant. –  pourquoi…  : Joab tente de faire revenir David sur sa décision, car il y décèle le signe d''un manque de confiance en Dieu.'
  - type: text
    content: 'Joab dit au roi : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, rende le peuple cent fois plus nombreux, et que tes yeux, ô roi, mon seigneur, le voient ! Mais pourquoi, ô roi, veux-tu faire cela ? '
  '4':
  - type: note
    content: 's''imposa à Joab  : litt. fut forte envers Joab  ; cf. Ec 8.4.'
  - type: text
    content: 'Mais la parole du roi s''imposa à Joab et aux chefs de l''armée ; Joab et les chefs de l''armée sortirent donc devant le roi pour recenser le peuple d''Israël. '
  '5':
  - type: note
    content: 'Le texte hébreu des v. 5-7 est peu clair, mais on comprend quand même que Joab parcourt d''abord la Transjordanie, puis le nord du pays, d''est en ouest, et regagne finalement le sud par la côte méditerranéenne. On pourrait aussi comprendre le début du v. 5, d''après des mss de LXX, ils passèrent le Jourdain et commencèrent par Aroër et par la ville qui est au milieu… –  commencèrent  : litt. campèrent ou installèrent leur camp. –  Aroër  : localité située à l''est de la mer Morte, près de la frontière de Moab qui suit le cours de l''Arnon. –  depuis  : le terme correspondant signifie normalement à droite de ou au sud de. –  la ville qui est au milieu de l''oued (cf. Dt 2.36 ; Jos 13.9,16) pourrait avoir été celle dont on trouve les restes aujourd''hui à El-Medeyiné. –  Gad est, avec Ruben et Manassé, une des tribus installées à l''est du Jourdain ; voir Nb 32 ; Jos 13. –  Yazer  : à une cinquantaine de kilomètres au nord d’Aroër.'
  - type: text
    content: 'Ils passèrent le Jourdain et commencèrent par Aroër ; depuis la ville qui est au milieu de l''oued, ils allèrent vers Gad et en direction de Yazer. '
  '6':
  - type: note
    content: 'au Galaad  : cf. 1S 13.7n. –  au pays de Tahtim-Hodshi  : région inconnue ; certains mss de LXX ont lu au pays des Hittites, à Qadesh  ; il s''agirait alors de la ville de Qadesh sur l''Oronte. –  à Dan-Yaân  : localité inconnue ; certains pensent qu''il faudrait lire à Dan (et à) Iyôn (cf. 1R 15.20). –  Sidon  : ville phénicienne, sur la côte méditerranéenne.'
  - type: text
    content: 'Ils allèrent au Galaad et au pays de Tahtim-Hodshi. Ils allèrent à Dan-Yaân et aux environs de Sidon. '
  '7':
  - type: note
    content: 'forteresse de Tyr  : cf. Jos 19.29 ; endroit probablement différent, mais proche de la ville phénicienne de Tyr. –  Hivvites / Cananéens  : deux des peuples que les Israélites n''avaient pas totalement chassés de leur territoire (cf. Dt 7). –  Bersabée  : cf. v. 2.'
  - type: text
    content: 'Ils allèrent à la forteresse de Tyr, et dans toutes les villes des Hivvites et des Cananéens. Ils terminèrent par le Néguev de Juda, à Bersabée. '
  '8':
  - type: text
    content: 'Ils parcoururent ainsi tout le pays ; au bout de neuf mois et vingt jours, ils arrivèrent à Jérusalem. '
  '9':
  - type: note
    content: Le texte parallèle de 1Ch 21.5s donne des chiffres différents et précise que, volontairement, Joab n'a pas recensé deux des tribus israélites.
  - type: text
    content: 'Joab remit au roi le chiffre du recensement du peuple : il y avait en Israël huit cent mille hommes vaillants tirant l''épée, et les hommes de Juda étaient cinq cent mille.'
  - type: heading
    content: Dieu punit la faute de David
  - type: heading
    content: 1Ch 21.7-17
