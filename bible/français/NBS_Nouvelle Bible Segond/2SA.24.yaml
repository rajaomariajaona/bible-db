  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mit… en colère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Nb 25.3 ; 32.13 ; Jg 2.14,20 ; 3.8 ; 2R 13.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de nouveau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 21.1-14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il incita
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : dans le récit parallèle de 1Ch 21, c''est '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''Adversaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Satan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') qui incite David à dénombrer le peuple. – Le '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: dénombrement
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'semble être une faute en ce que le roi veut connaître le chiffre de la population, alors que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' avait promis qu''Israël serait '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'innombrable '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir 17.11 ; Gn 13.16 ; 15.5 ; 22.17 ; 26.4 ; 28.14 ; 32.13 ; Ex 1.7 ; 1R 4.20 ; Es 10.22 ; Os 2.11 ; Hé 11.12). De plus, cette opération visait aussi à connaître le nombre des hommes aptes au service militaire (cf. v. 2, où c''est '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Joab, le chef de l'armée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui en est chargé ; voir aussi le v. 9) ; mais c''était s''en remettre plus aux forces guerrières qu''à Dieu lui-même (cf. Jg 7.2-7 ; 1S 14.6 ; 17.47 ; Jr 17.5).'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se mit de nouveau en colère contre Israël. Il incita David à leur faire du tort, en disant : Va, dénombre Israël et Juda !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'depuis Dan jusqu''à Bersabée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 3.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: recensez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le pluriel s''adresse sans doute à Joab et aux collaborateurs dont il s''entourera. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'en connaîtrai le nombre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je connaîtrai le nombre du peuple.
    marker-yv: yv-n
  - type: text
    text: 'Alors le roi dit à Joab, le chef de l''armée, qui était avec lui : Parcours donc toutes les tribus d''Israël, je te prie, depuis Dan jusqu''à Bersabée, et recensez le peuple. Ainsi j''en connaîtrai le nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cent fois plus nombreux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. absolument impossible à dénombrer. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que tes yeux… le voient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que cela se passe de ton vivant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pourquoi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Joab tente de faire revenir David sur sa décision, car il y décèle le signe d''un manque de confiance en Dieu.'
    marker-yv: yv-n
  - type: text
    text: 'Joab dit au roi : Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, rende le peuple cent fois plus nombreux, et que tes yeux, ô roi, mon seigneur, le voient ! Mais pourquoi, ô roi, veux-tu faire cela ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'imposa à Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fut forte envers Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ec 8.4.'
    marker-yv: yv-n
  - type: text
    text: 'Mais la parole du roi s''imposa à Joab et aux chefs de l''armée ; Joab et les chefs de l''armée sortirent donc devant le roi pour recenser le peuple d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte hébreu des v. 5-7 est peu clair, mais on comprend quand même que Joab parcourt d''abord la Transjordanie, puis le nord du pays, d''est en ouest, et regagne finalement le sud par la côte méditerranéenne. On pourrait aussi comprendre le début du v. 5, d''après des mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils passèrent le Jourdain et commencèrent par Aroër et par la ville qui est au milieu… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: commencèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'campèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: installèrent leur camp
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aroër
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : localité située à l''est de la mer Morte, près de la frontière de Moab qui suit le cours de l''Arnon. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant signifie normalement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à droite de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au sud de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la ville qui est au milieu de l''oued '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Dt 2.36 ; Jos 13.9,16) pourrait avoir été celle dont on trouve les restes aujourd''hui à El-Medeyiné. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est, avec Ruben et Manassé, une des tribus installées à l''est du Jourdain ; voir Nb 32 ; Jos 13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yazer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à une cinquantaine de kilomètres au nord d’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Aroër.
    marker-yv: yv-n
  - type: text
    text: 'Ils passèrent le Jourdain et commencèrent par Aroër ; depuis la ville qui est au milieu de l''oued, ils allèrent vers Gad et en direction de Yazer. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au Galaad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 13.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au pays de Tahtim-Hodshi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : région inconnue ; certains mss de LXX ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au pays des Hittites, à Qadesh
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il s''agirait alors de la ville de Qadesh sur l''Oronte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Dan-Yaân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : localité inconnue ; certains pensent qu''il faudrait lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à Dan (et à) Iyôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 1R 15.20). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sidon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ville phénicienne, sur la côte méditerranéenne.'
    marker-yv: yv-n
  - type: text
    text: 'Ils allèrent au Galaad et au pays de Tahtim-Hodshi. Ils allèrent à Dan-Yaân et aux environs de Sidon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: forteresse de Tyr
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 19.29 ; endroit probablement différent, mais proche de la ville phénicienne de Tyr. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hivvites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cananéens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : deux des peuples que les Israélites n''avaient pas totalement chassés de leur territoire (cf. Dt 7). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bersabée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2.'
    marker-yv: yv-n
  - type: text
    text: 'Ils allèrent à la forteresse de Tyr, et dans toutes les villes des Hivvites et des Cananéens. Ils terminèrent par le Néguev de Juda, à Bersabée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Ils parcoururent ainsi tout le pays ; au bout de neuf mois et vingt jours, ils arrivèrent à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le texte parallèle de 1Ch 21.5s donne des chiffres différents et précise que, volontairement, Joab n'a pas recensé deux des tribus israélites.
    marker-yv: yv-n
  - type: text
    text: 'Joab remit au roi le chiffre du recensement du peuple : il y avait en Israël huit cent mille hommes vaillants tirant l''épée, et les hommes de Juda étaient cinq cent mille.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu punit la faute de David
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Ch 21.7-17
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sentit battre son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 24.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un grand '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 12.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: stupidement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 13.13+.'
    marker-yv: yv-n
  - type: text
    text: 'David sentit battre son cœur après qu''il eut ainsi compté le peuple. David dit au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : J''ai commis un grand péché en faisant cela ! Maintenant, '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', pardonne, je te prie, la faute que j''ai commise, moi, ton serviteur, car j''ai agi tout à fait stupidement.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'était parvenue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parvint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', l''antériorité ou la simultanéité de la révélation divine n''étant pas clairement définie par le texte hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 22.5+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'visionnaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: voyant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 1S 9.9+, autre terme hébreu ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Quand David se leva, au matin, cette parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' était parvenue à Gad, le prophète, le visionnaire de David : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je te propose…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il y a trois fléaux que je peux t'imposer.
    marker-yv: yv-n
  - type: text
    text: 'Va dire à David : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je te propose trois choses ; choisis-en une, et je la ferai pour toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sept années
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 41.30 ; 2R 8.1 ; le texte parallèle de 1Ch 21.12 et '
      - type: usfm
        marker: w
        children:
        - type: text
