document_id: HOS.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruine prochaine d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'Ephraïm 4.17n. –  il avait la haute main sur Israël  : autre traduction il s''était élevé en Israël  ; certains modifient le texte hébreu traditionnel pour lire il était prince en Israël ou il élevait la voix en Israël . –  il s''est mis en tort ou il s''est rendu coupable 4.15n. –  Baal 2.10,15ss ; 6.2 ; 9.10 ; 11.2. –  mort  : cf. 4.14 ; 7.9.'
  - type: text
    content: Lorsque Ephraïm parlait,
  - type: text
    content: 'c''était la terreur :'
  - type: text
    content: il avait la haute main sur Israël.
  - type: text
    content: Mais il s'est mis en tort avec le Baal
  - type: text
    content: et il est mort.
  '10':
  - type: text
    content: ' '
  - type: note
    content: au sujet desquels ou à qui  ; cf. 1S 8.1-6.
  - type: text
    content: Où donc est ton roi ?
  - type: text
    content: Qu'il te sauve dans toutes tes villes !
  - type: text
    content: 'Où sont tes juges, au sujet desquels tu disais :'
  - type: text
    content: Donne-moi un roi et des princes !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.15 ; 1S 8.6-9 ; 12.17 ; 1R 11.37 ; 2R 9.1-3.
  - type: text
    content: Je t'ai donné un roi dans ma colère,
  - type: text
    content: je te l'ôterai dans ma fureur.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'gardée  : litt. serrée ou enveloppée (cf. 4.19).'
  - type: text
    content: La faute d'Ephraïm est gardée,
  - type: text
    content: son péché est mis en réserve.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'terme  : litt. temps . –  ne sort pas du ventre…  : litt. ne s''est pas tenu debout à la brisure (ou à la brèche ) des fils  ; cf. Es 37.3n.'
  - type: text
    content: Les douleurs de la femme qui accouche viendront pour lui ;
  - type: text
    content: 'c''est un fils peu sage :'
  - type: text
    content: mais, au terme, il ne sort pas du ventre de sa mère.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je les libérerai…  : litt. je les libérerai de la main (c.-à-d. du pouvoir ) du séjour des morts  ; certains voient dans ces mots une exclamation ironique  : Je les libérerais… ? ! je les reprendrais… ? ! (cf. 4.16n  ; 7.13n) et comprennent la suite du v. comme un appel lancé à la mort et au séjour des morts, personnifiés (cf. Ap 6.8), pour qu''ils accomplissent leur œuvre de destruction ; cf. 1Co 15.55 . Sur le verbe traduit par reprendre (ailleurs rédimer ; assurer la rédemption de ), voir Ex 6.6+ ; Es 35.9n. –  où sont…  : autre traduction je serai tes pestes (ou, selon certains mss, ta peste ). –  où sont (ou je serai ) tes épidémies  : autre traduction ta destruction  ; ce terme rare (Dt 32.24n  ; Ps 91.6 ; Es 28.2n) a été traduit par aiguillon dans LXX, ce qui pourrait aussi être le sens de l''hébreu. –  La pitié  : litt. le regret  ; cf. 12.8 ; Dt 32.36n  ; voir aussi Nb 23.19+.'
  - type: text
    content: Je les libérerai du séjour des morts,
  - type: text
    content: je les reprendrai à la mort.
  - type: text
    content: Mort, où sont tes pestes ?
  - type: text
    content: Séjour des morts, où sont tes épidémies ?
  - type: text
    content: La pitié est cachée à mes regards !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Il…  : il s''agit probablement d’ Ephraïm , dont le nom est sans doute rappelé par le verbe traduit par a beau être fertile (hébreu yaphri’ ) ; cf. v. 1 ; 9.16n. –  le vent d''est désigne vraisemblablement l''ennemi, en l''occurrence l''Assyrie ; cf. 8.7+ ; 12.2 ; voir aussi Gn 41.6 ; Jr 18.17 ; Ez 19.12 ; Ha 1.9n. –  souffle  : voir esprit. –  C''est lui qui saccagera ou on saccagera.'
  - type: text
    content: Il a beau être fertile parmi ses frères,
  - type: text
    content: le vent d'est viendra,
  - type: text
    content: 'le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui s''élève du désert.'
  - type: text
    content: Il desséchera sa source,
  - type: text
    content: tarira sa fontaine.
  - type: text
    content: C'est lui qui saccagera le trésor, tous les objets de valeur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'de leur invention  : le terme correspondant est habituellement traduit par intelligence ou entendement . –  On dit…  : texte obscur ; autres traductions c''est à leur sujet que l''on dit : Ils sacrifient l''homme et embrassent les taurillons (cf. 8.5ns) ; des sacrificateurs, qui sont des hommes, embrassent les taurillons  ; ou encore, avec une légère modification du texte hébreu traditionnel  : à eux (les dieux-idoles), disent-ils, sacrifiez ! – et l''homme embrasse des taurillons . LXX sacrifiez des hommes, les taurillons font défaut (cf. Dt 12.31 ; Jr 7.31 ; 19.5). –  embrasser  : cf. 1R 19.18 ; Jb 31.27.'
  - type: text
    content: Maintenant ils continuent à pécher,
  - type: text
    content: ils se font une image de métal fondu avec leur argent,
  - type: text
    content: ils se font des idoles de leur invention ;
  - type: text
    content: toutes sont l'œuvre d'artisans.
  - type: text
    content: 'On dit à leur sujet :'
  - type: text
    content: Ceux qui sacrifient des êtres humains
  - type: text
    content: peuvent bien embrasser des taurillons !
  '3':
  - type: text
    content: ' '
  - type: note
    content: nuée / rosée 6.4+ ; cf. Jc 4.14. –  paille Ps 1.4+. –  d'une fenêtre ou d'une ouverture  ; sur le terme, cf. Gn 7.11n.
  - type: text
    content: C'est pourquoi ils seront comme la nuée du matin,
  - type: text
    content: comme la rosée matinale qui disparaît,
  - type: text
    content: comme la menue paille qui s'envole de l'aire,
  - type: text
    content: comme la fumée qui sort d'une fenêtre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '12.10. –  connais  : autre traduction connaîtras . –  que moi Es 44.8 ; 45.21.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu,'
  - type: text
    content: depuis l'Egypte.
  - type: text
    content: Tu ne connais pas d'autre Dieu à part moi,
  - type: text
    content: et il n'y a pas d'autre sauveur que moi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'je t''ai connu  : LXX je t''ai fait paître , ce qui pourrait correspondre à une variante du texte hébreu (cf. v. 6). –  dans le désert 2.16.'
  - type: text
    content: Moi, je t'ai connu dans le désert,
  - type: text
    content: dans un pays torride.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Quand ils ont eu des pâturages  : autre traduction comme leur troupeau . –  leur cœur s''est élevé Ez 31.10 ; Dn 5.20 ; 2Ch 17.6n. –  ils m''ont oublié 2.15+.'
  - type: text
    content: Quand ils ont eu des pâturages,
  - type: text
    content: ils se sont rassasiés ;
  - type: text
    content: quand ils ont été rassasiés,
  - type: text
    content: leur cœur s'est élevé ;
  - type: text
    content: c'est pourquoi ils m'ont oublié.
  '7':
  - type: text
    content: ' '
  - type: note
    content: comme un lion 5.14+.
  - type: text
    content: Je serai pour eux comme un lion ;
  - type: text
    content: comme un léopard sur un chemin,
  - type: text
    content: je les suivrai des yeux ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: ourse 2S 17.8.
  - type: text
    content: je les attaquerai comme une ourse privée de ses petits,
  - type: text
    content: je déchirerai l'enveloppe de leur cœur ;
  - type: text
    content: 'là je les dévorerai, comme une lionne :'
  - type: text
    content: les animaux sauvages les mettront en pièces.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Verset obscur, litt. il t''a détruit, Israël, car en (ou avec ; contre ) moi en (ou avec ; contre ) ton secours  ; autres traductions, inspirées par des versions anciennes  : je te détruirai, Israël, qui te secourra ? (cf. LXX, Syr) ; à toi la destruction, Israël, en moi ton secours (cf. Vg).'
  - type: text
    content: Ce qui te détruit, Israël,
  - type: text
    content: c'est que tu as été contre moi,
  - type: text
    content: contre celui qui pouvait te secourir.
