      - type: text
        text: 'Ps 82.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (et non le Pentateuque) qui est cité. Toutefois, dans les commentaires rabbiniques, le Ps 82 est particulièrement associé au don de la loi au Sinaï ; voir aussi Ex 7.1.
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur répondit : N''est-il pas écrit dans votre loi : '
  - type: usfm
    marker: it
    children:
