    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: blasphème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 24.16 ; Mt 9.3/ / ; 26.65/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'homme '
    - type: usfm
      marker: ft
      children:
      - type: text
