document_id: JHN.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le berger et ses moutons
  - type: text
    content: ' '
  - type: note
    content: Amen, amen 1.51n  ; cf. Mt 5.18n. – L'image est celle d'un enclos de pierres où l'on parque les moutons pour la nuit ; 10.16 ; Mi 2.12.
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, celui qui n''entre pas dans l''enclos à moutons par la porte, mais qui l''escalade par un autre côté, celui-là est un voleur et un bandit. '
  '10':
  - type: note
    content: 'abattre ou tuer  ; le verbe signifie aussi sacrifier (Mc 14.12n). –  détruire ou perdre 3.16+. –  la vie 3.15+ ; 5.24s. –  l''aient en abondance  : autre traduction, moins probable  : qu''ils soient dans l''abondance.'
  - type: text
    content: Le voleur ne vient que pour voler, abattre et détruire ; moi, je suis venu pour qu'ils aient la vie et l'aient en abondance.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'C''est moi qui suis…  : cf. v. 7+,14. –  le bon berger v. 1-5 ; cf. Es 40.11 ; Jr 31.9 ; Ez 34.11-16,23 ; 37.24 ; Ps 78.70ss ; Mt 9.36/ / ; 18.12-13/ / ; 25.32 ; 26.31/ / ; Hé 13.20 ; Ap 7.17. –  se défait de  : certains mss portent donne  ; le verbe traduit par se défaire de (également aux v. 15,17s ; de même 13.37 ; 15.13 ; cf. 13.4n) signifie littéralement mettre, déposer (ainsi en 19.41 ; un verbe apparenté est traduit par risquer en Rm 16.4) ; il rappelle peut-être Es 53.12 (cf. Mt 20.28/ /) ; voir aussi 1Jn 3.16 ; cf. Ga 2.20 ; 1Tm 2.6 ; Tt 2.14. –  de sa vie  : autre traduction de lui-même  ; le terme grec ainsi traduit n''est pas celui qui figure au v. 10 (et depuis 1.4+), mais psukhè (ou psyché ) qui désigne habituellement la vie sensible, naturelle, de l''individu (humain ou animal) ; il revient aux v. 15,17,24 et en 12.25,27 ; 13.37s ; 15.13 ; 1Jn 3.16 ; il est quelquefois rendu par âme (ainsi 3Jn 2), cf. Mt 10.28n  ; comparer avec Gn 1.20n.'
  - type: text
    content: 'C''est moi qui suis le bon berger. Le bon berger se défait de sa vie pour ses moutons. '
  '12':
  - type: note
    content: 'Cf. Za 11.17 ; 1P 5.2s. –  le loup  : cf. Ac 20.29+.'
  - type: text
    content: 'Quand il voit venir le loup, l''employé, celui qui n''est pas berger et pour qui il ne s''agit pas de ses propres moutons, s''enfuit en abandonnant les moutons. Et le loup s''en empare, il les disperse. '
  '13':
  - type: note
    content: 'C''est un employé  : certains mss portent l''employé s''enfuit parce que c''est un employé. –  il n''a pas le souci  : cf. 12.6.'
  - type: text
    content: 'C''est un employé : il n''a pas le souci des moutons.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'C''est moi qui suis… v. 11+. –  Je connais mes moutons… v. 27 ; cf. 2.25 ; 1Co 8.2s : 13.12 ; Ga 4.9 ; 2Tm 2.19.'
  - type: text
    content: 'C''est moi qui suis le bon berger. Je connais mes moutons, et mes moutons me connaissent, '
  '15':
  - type: note
    content: 'le Père me connaît… 7.29+ ; Mt 11.27/ /. –  je me défais de ma vie  : certains mss portent je donne ma vie  ; v. 11n. –  pour mes moutons  : cf. 6.51 ; 11.51s.'
  - type: text
    content: 'comme le Père me connaît et comme, moi, je connais le Père ; et je me défais de ma vie pour mes moutons. '
  '16':
  - type: note
    content: 'Cf. 4.35-38 ; 11.52 ; 17.20. –  que je les amène  : cf. Es 56.8 ; 1P 2.25. –  entendront ma voix v. 3 ; cf. 5.25 ; 18.37. –  ils deviendront  : certains mss portent il y aura. –  un seul troupeau, un seul berger  : les deux termes grecs correspondants sont apparentés ; Ez 34.23 ; 37.24 ; Ga 3.28 ; Ep 2.14-18 ; Col 3.11.'
  - type: text
    content: J'ai encore d'autres moutons qui ne sont pas de cet enclos ; ceux-là aussi, il faut que je les amène ; ils entendront ma voix, et ils deviendront un seul troupeau, un seul berger.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'le Père m''aime 3.35+. –  je me défais de ma vie v. 11n. –  la reprendre  : autre traduction la recevoir à nouveau  ; de même au v. 18 ; cf. 13.12.'
  - type: text
    content: 'Si le Père m''aime, c''est parce que, moi, je me défais de ma vie pour la reprendre. '
  '18':
  - type: note
    content: 'ne me l''enlève  : certains mss portent ne me l''a enlevée  ; cf. 1.29n  ; 19.11 ; Ph 2.8s. –  le pouvoir de  : cf. 1.12n  ; 19.10. –  le commandement  : même terme 11.57n  ; 12.49s ; 13.34 ; 14.15,21 ; 15.10,12 ; voir aussi 14.31.'
  - type: text
    content: Personne ne me l'enlève, mais c'est moi qui m'en défais, de moi-même ; j'ai le pouvoir de m'en défaire et j'ai le pouvoir de la reprendre ; tel est le commandement que j'ai reçu de mon Père.
  '19':
  - type: text
    content: ' '
  - type: note
    content: '7.43+. –  les Juifs  : cf. 1.19n.'
  - type: text
    content: 'Il y eut encore division parmi les Juifs à cause de ces paroles. '
  '2':
  - type: text
    content: 'Mais celui qui entre par la porte est le berger des moutons. '
  '20':
  - type: note
    content: 'démon 7.20+. –  il est fou  : litt. et il est fou  ; cf. Ac 26.24 ; Sagesse 5.4 : « Insensés, nous avons jugé sa vie (celle du juste) une pure folie et sa mort déshonorante. »'
  - type: text
    content: 'Beaucoup d''entre eux disaient : Il a un démon, il est fou ; pourquoi l''écoutez-vous ? '
  '21':
  - type: note
    content: 9.16,30-33.
  - type: text
    content: 'D''autres disaient : Ces paroles ne sont pas celles d''un démoniaque. Un démon peut-il ouvrir les yeux des aveugles ?'
  - type: heading
    content: Jésus est rejeté
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'On célébrait  : litt. il y eut . –  la Dédicace  : le mot grec, qui signifie renouvellement , correspond à l''hébreu Hanoukka , nom de la fête célébrée fin décembre ou début janvier en mémoire de la purification et de la nouvelle dédicace du temple par Judas Maccabée en 164 av. J.-C., après sa profanation par Antiochos IV Epiphane (voir calendrier et fêtes). Le même mot est aussi utilisé dans LXX pour les inaugurations antérieures de la tente ou du temple (Nb 7.10s ; 1R 8.63 ; Esd 6.16 ; 2Ch 7.5).'
  - type: text
    content: 'On célébrait alors la Dédicace à Jérusalem. C''était l''hiver. '
  '23':
  - type: note
    content: 'le portique de Salomon  : allée couverte qui longeait l''enceinte orientale de la cour du temple ; cf. Ac 3.11 ; 5.12.'
  - type: text
    content: 'Jésus marchait dans le temple, sous le portique de Salomon. '
  '24':
  - type: note
    content: '8.25 ; Lc 22.67. –  Les Juifs  : cf. 1.19n. –  nous feras-tu languir ? ou nous importuneras-tu ? litt. tiendras-tu notre âme  ; le même verbe est traduit par enlever au v. 18 et le mot correspondant à âme est rendu par vie au v. 17. –  Christ 1.41n  ; voir onction. –  ouvertement 7.4n  ; 16.25,29 ; Mc 8.32.'
  - type: text
    content: 'Les Juifs l''entourèrent ; ils lui disaient : Jusqu''à quand nous feras-tu languir ? Si c''est toi qui es le Christ, dis-le-nous ouvertement. '
  '25':
  - type: note
    content: 'Je vous l''ai dit  : cf. 4.26+. –  vous ne croyez pas  : cf. v. 37s ; 1.7n. –  Ce qui me rend témoignage… les œuvres… 5.36+. –  au nom de mon Père 5.43.'
  - type: text
    content: 'Jésus leur répondit : Je vous l''ai dit, et vous ne croyez pas. Ce qui me rend témoignage, ce sont les œuvres que, moi, je fais au nom de mon Père. '
  '26':
  - type: note
    content: V. 3s ; 6.60-64+ ; cf. Os 14.10 ; Pr 28.5 ; 1Co 2.14 ; 1Jn 2.19.
  - type: text
    content: 'Mais si, vous, vous ne croyez pas, c''est parce que vous n''êtes pas de mes moutons. '
  '27':
  - type: note
    content: V. 3,14 ; cf. 8.47 ; voir aussi Gn 18.19n  ; Jr 1.5n  ; Rm 8.29.
  - type: text
    content: 'Mes moutons entendent ma voix. Moi, je les connais, et ils me suivent. '
  '28':
  - type: note
    content: 'vie éternelle 3.15+ ; cf. 17.2. –  ils ne se perdront jamais (4.14n) : autres traductions ils ne seront jamais perdus, ils ne disparaîtront jamais, cf. 3.16 ; 6.39+ ; voir aussi Rm 8.33-39 ; 1P 1.5. –  arrachera  : le même verbe est traduit par s''emparer de au v. 12 ; de même v. 29 ; cf. 6.15.'
  - type: text
    content: 'Et moi, je leur donne la vie éternelle ; ils ne se perdront jamais, et personne ne les arrachera de ma main. '
  '29':
  - type: note
    content: 'Ce que mon Père…  : certains mss portent mon Père, quant à ce qu''il m''a donné, est plus grand que tout  ; ou mon Père, qui me (les) a donné(s), est plus grand que tout (cf. 6.37+ ; 14.28). –  de la main du Père  : cf. 3.35 ; Es 43.13.'
  - type: text
    content: 'Ce que mon Père m''a donné est plus grand que tout – et personne ne peut l''arracher de la main du Père. '
  '3':
  - type: note
    content: 'entendent sa voix v. 16,27 ; 18.37 ; cf. 8.43 ; Ap 3.20 ; Ps 95.7. –  par leur nom  : cf. 1.42+ ; 20.16 ; Es 43.1.'
  - type: text
    content: 'C''est pour lui que le gardien ouvre la porte ; les moutons entendent sa voix ; il appelle ses propres moutons par leur nom et les mène dehors. '
  '30':
  - type: note
    content: 17.11,21-23 ; cf. 1.1.
  - type: text
    content: Moi et le Père, nous sommes un.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 8.59+.
  - type: text
    content: 'Les Juifs ramassèrent à nouveau des pierres pour le lapider. '
  '32':
  - type: note
    content: 'Cf. 7.19,23 ; 9.3. –  allez-vous me lapider  : litt. me lapidez-vous, de même au v. 33.'
  - type: text
    content: 'Jésus leur dit : Je vous ai montré beaucoup de belles œuvres venant du Père. Pour laquelle de ces œuvres allez-vous me lapider ? '
  '33':
  - type: note
    content: 'blasphème  : cf. Lv 24.16 ; Mt 9.3/ / ; 26.65/ /. –  homme / Dieu 5.18+.'
  - type: text
    content: 'Les Juifs lui répondirent : Ce n''est pas pour une belle œuvre que nous allons te lapider, mais pour blasphème, parce que, toi qui es un homme, tu te fais Dieu ! '
  '34':
  - type: note
    content: votre loi 7.49 ; 12.34 ; 15.25 ; cf. 1.17 ; 5.39+. Le terme loi semble ici s'appliquer à l'ensemble des écrits sacrés du judaïsme (l'A.T. chrétien), puisque c'est Ps 82.6 (et non le Pentateuque) qui est cité. Toutefois, dans les commentaires rabbiniques, le Ps 82 est particulièrement associé au don de la loi au Sinaï ; voir aussi Ex 7.1.
  - type: text
    content: 'Jésus leur répondit : N''est-il pas écrit dans votre loi : '
  - type: text
    content: 'Moi, j''ai dit : Vous êtes des dieux !'
  - type: text
    content: ' '
  '35':
  - type: note
    content: 'ceux à qui…  : cf. Rm 3.19. –  être annulée 5.18n  ; 7.23 ; cf. Mt 5.17s ; Lc 16.17.'
  - type: text
    content: 'Ainsi elle a appelé dieux ceux à qui la parole de Dieu a été adressée, – et l''Ecriture ne peut être annulée – '
  '36':
  - type: note
    content: 'consacré  : traduction traditionnelle sanctifié  ; le terme est apparenté au mot habituellement traduit par saint  ; cf. 6.69 ; 17.17-19 ; Jr 1.5. –  envoyé 3.17+. –  Tu blasphèmes v. 33. –  Je suis Fils de Dieu 1.34+.'
  - type: text
    content: 'et vous, vous dites à celui que le Père a consacré et envoyé dans le monde : « Tu blasphèmes ! » parce que j''ai dit : « Je suis Fils de Dieu » ! '
  '37':
  - type: note
    content: 5.36+.
  - type: text
    content: 'Si je ne fais pas les œuvres de mon Père, ne me croyez pas. '
  '38':
  - type: note
    content: 'croyez les œuvres  : cf. 2.11. –  sachez et comprenez traduisent deux formes du même verbe grec (habituellement traduit par connaître, cf. v. 6n). –  le Père est en moi… 14.10s,20 ; 17.21,23.'
  - type: text
    content: 'Mais si je les fais, quand même vous ne me croiriez pas, croyez les œuvres ; sachez et comprenez ainsi que le Père est en moi, comme moi dans le Père. '
  '39':
  - type: note
    content: 'Ils cherchèrent… 7.30+. –  il leur échappa  : litt. il sortit de leur mains  ; 8.59+.'
  - type: text
    content: Ils cherchèrent encore à l'arrêter ; mais il leur échappa.
  '4':
  - type: note
    content: 'Cf. Ps 80.2. Epître d''Ignace d''Antioche aux Philadelphiens 2.1 : « Là où est votre berger, suivez-le comme des brebis. »'
  - type: text
    content: 'Lorsqu''il les a tous fait sortir, il marche devant eux ; et les moutons le suivent, parce qu''ils connaissent sa voix. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 1.28 ; 3.23 ; cf. Mt 19.1/ /. –  baptisé 1.19ss.
  - type: text
    content: 'Il retourna de l''autre côté du Jourdain, au lieu où Jean avait d''abord baptisé, et il y demeura. '
  '41':
  - type: note
    content: 'Cf. 1.7s,19-35 ; 3.22-30 ; 5.33-36. –  produit  : litt. fait, cf. v. 37s ; 2.23n. –  de cet homme  : litt. de celui-ci.'
  - type: text
    content: 'Beaucoup de gens vinrent à lui ; ils disaient : Jean n''a produit aucun signe, mais tout ce que Jean a dit de cet homme était vrai. '
  '42':
  - type: note
    content: 2.23+.
  - type: text
    content: Et là, beaucoup mirent leur foi en lui.
  '5':
  - type: note
    content: 'jamais  : autre traduction en aucun cas. –  un étranger  : autre traduction un autre (même terme Mt 17.25ns ; Lc 16.12).'
  - type: text
    content: Ils ne suivront jamais un étranger ; ils le fuiront, parce qu'ils ne connaissent pas la voix des étrangers.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'discours figuré  : le mot grec signifie habituellement proverbe, aphorisme (2P 2.22) ; il comporte chez Jean un élément de mystère (cf. 16.25,29) ; cf. les paraboles (autre terme grec) des évangiles synoptiques (voir « Quelques paraboles de la Bible »♦). –  ne surent pas  : autre traduction ne comprirent pas  ; le verbe est habituellement traduit par connaître (v. 14s,27,38).'
  - type: text
    content: Jésus leur tint ce discours figuré, mais eux ne surent pas ce qu'il leur disait.
  - type: heading
    content: Le bon berger
  '7':
  - type: text
    content: ' '
  - type: note
    content: c'est moi qui suis… v. 9,11 ; 6.35+. –  la porte v. 9 ; cf. 14.6 ; Gn 28.17 ; Ps 78.23 ; 118.20 ; Mt 7.13-14/ / ; 25.10.
  - type: text
    content: 'Jésus leur dit encore : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, c''est moi qui suis la porte des moutons. '
  '8':
  - type: note
    content: 'Cf. Jr 23.1s ; Ez 34.2s. –  avant moi  : cette précision est absente de certains mss. –  écoutés  : autre traduction entendus (même verbe v. 8,16,20,27).'
  - type: text
    content: 'Tous ceux qui sont venus avant moi sont des voleurs et des bandits ; mais les moutons ne les ont pas écoutés. '
  '9':
  - type: note
    content: 'C''est moi qui suis la porte v. 7+. Cf. Le Pasteur d''Hermas, Sim. IX,12,6 : « C''est par eux (les anges) que le Seigneur a été entouré d''un rempart et la porte, c''est le Fils de Dieu. C''est la seule entrée qui conduise au Seigneur. Personne donc ne s''introduira auprès de lui si ce n''est par son Fils. » Epître d''Ignace d''Antioche aux Philadelphiens 9.1 : « Il est la porte du Père, par laquelle entrent Abraham, Isaac et Jacob, et les prophètes, et les apôtres et l''Eglise. Tout cela conduit à l''unité avec Dieu. » –  il sera sauvé 3.17+. –  entrera et sortira  : cf. 8.32-36 ; voir Nb 27.17 ; Dt 28.6n  ; 31.2n. –  des pâturages  : cf. Es 49.9s ; Ps 23.1-3.'
  - type: text
    content: 'C''est moi qui suis la porte ; si quelqu''un entre par moi, il sera sauvé ; il entrera et sortira et trouvera des pâturages. '
