document_id: JHN.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le berger et ses moutons
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amen, amen '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.51'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Mt 5.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – L''image est celle d''un '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'enclos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de pierres où l'on parque les moutons pour la nuit ; 10.16 ; Mi 2.12.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen, amen,
  - type: text
    text: ' je vous le dis, celui qui n''entre pas dans l''enclos à moutons par la porte, mais qui l''escalade par un autre côté, celui-là est un voleur et un bandit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Mais celui qui entre par la porte est le berger des moutons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'entendent sa voix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 16,27 ; 18.37 ; cf. 8.43 ; Ap 3.20 ; Ps 95.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par leur '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.42+ ; 20.16 ; Es 43.1.'
    marker-yv: yv-n
  - type: text
    text: 'C''est pour lui que le gardien ouvre la porte ; les moutons entendent sa voix ; il appelle ses propres moutons par leur nom et les mène dehors. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ps 80.2. Epître '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Ignace
      - type: text
        text: ' d''Antioche aux Philadelphiens 2.1 : « Là où est votre berger, suivez-le comme des brebis. »'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il les a tous fait sortir, il marche devant eux ; et les moutons le suivent, parce qu''ils connaissent sa voix. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jamais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en aucun cas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un étranger
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un autre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même terme Mt 17.25
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; Lc 16.12).
    marker-yv: yv-n
  - type: text
    text: Ils ne suivront jamais un étranger ; ils le fuiront, parce qu'ils ne connaissent pas la voix des étrangers.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: discours figuré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot grec signifie habituellement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'proverbe, aphorisme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(2P 2.22) ; il comporte chez Jean un élément de mystère (cf. 16.25,29) ; cf. les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'paraboles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre terme grec) des évangiles '
      - type: usfm
        marker: w
        children:
        - type: text
          text: synoptiques
      - type: text
        text: ' (voir « Quelques paraboles de la Bible »♦). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne surent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne comprirent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le verbe est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'connaître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 14s,27,38).
    marker-yv: yv-n
  - type: text
    text: Jésus leur tint ce discours figuré, mais eux ne surent pas ce qu'il leur disait.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le bon berger
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'c''est moi qui suis… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 9,11 ; 6.35+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la porte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 9 ; cf. 14.6 ; Gn 28.17 ; Ps 78.23 ; 118.20 ; Mt 7.13-14/ / ; 25.10.
    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit encore : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen, amen,
  - type: text
    text: ' je vous le dis, c''est moi qui suis la porte des moutons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jr 23.1s ; Ez 34.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avant moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision est absente de certains mss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: écoutés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'entendus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même verbe v. 8,16,20,27).
    marker-yv: yv-n
  - type: text
    text: 'Tous ceux qui sont venus avant moi sont des voleurs et des bandits ; mais les moutons ne les ont pas écoutés. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est moi qui suis la porte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 7+. Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Le Pasteur '
    - type: usfm
      marker: ft
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Hermas
      - type: text
        text: ', Sim. IX,12,6 : « C''est par eux (les anges) que le Seigneur a été entouré d''un rempart et la porte, c''est le Fils de Dieu. C''est la seule entrée qui conduise au Seigneur. Personne donc ne s''introduira auprès de lui si ce n''est par son Fils. » Epître '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Ignace
      - type: text
        text: ' d''Antioche aux Philadelphiens 9.1 : « Il est la porte du Père, par laquelle entrent Abraham, Isaac et Jacob, et les prophètes, et les apôtres et l''Eglise. Tout cela conduit à l''unité avec Dieu. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il sera sauvé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.17+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: entrera et sortira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.32-36 ; voir Nb 27.17 ; Dt 28.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 31.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des pâturages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 49.9s ; Ps 23.1-3.'
    marker-yv: yv-n
  - type: text
    text: 'C''est moi qui suis la porte ; si quelqu''un entre par moi, il sera sauvé ; il entrera et sortira et trouvera des pâturages. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abattre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tuer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le verbe signifie aussi '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sacrifier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Mc 14.12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'détruire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'perdre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la vie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.15+ ; 5.24s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'aient en abondance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction, moins probable'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ils soient dans l'abondance.
    marker-yv: yv-n
  - type: text
    text: Le voleur ne vient que pour voler, abattre et détruire ; moi, je suis venu pour qu'ils aient la vie et l'aient en abondance.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est moi qui suis…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 7+,14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le bon berger '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 1-5 ; cf. Es 40.11 ; Jr 31.9 ; Ez 34.11-16,23 ; 37.24 ; Ps 78.70ss ; Mt 9.36/ / ; 18.12-13/ / ; 25.32 ; 26.31/ / ; Hé 13.20 ; Ap 7.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se défait de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: donne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se défaire de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (également aux v. 15,17s ; de même 13.37 ; 15.13 ; cf. 13.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') signifie littéralement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mettre, déposer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ainsi en 19.41 ; un verbe apparenté est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'risquer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Rm 16.4) ; il rappelle peut-être Es 53.12 (cf. Mt 20.28/ /) ; voir aussi 1Jn 3.16 ; cf. Ga 2.20 ; 1Tm 2.6 ; Tt 2.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de sa vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de lui-même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le terme grec ainsi traduit n''est pas celui qui figure au v. 10 (et depuis 1.4+), mais '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'psukhè '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: psyché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') qui désigne habituellement la vie sensible, naturelle, de l''individu (humain ou animal) ; il revient aux v. 15,17,24 et en 12.25,27 ; 13.37s ; 15.13 ; 1Jn 3.16 ; il est quelquefois rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'âme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (ainsi 3Jn 2), cf. Mt 10.28
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; comparer avec Gn 1.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'C''est moi qui suis le bon berger. Le bon berger se défait de sa vie pour ses moutons. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Za 11.17 ; 1P 5.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le loup
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 20.29+.'
    marker-yv: yv-n
  - type: text
    text: 'Quand il voit venir le loup, l''employé, celui qui n''est pas berger et pour qui il ne s''agit pas de ses propres moutons, s''enfuit en abandonnant les moutons. Et le loup s''en empare, il les disperse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est un employé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'employé s'enfuit parce que c'est un employé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il n'a pas le souci
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.6.'
    marker-yv: yv-n
  - type: text
    text: 'C''est un employé : il n''a pas le souci des moutons.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est moi qui suis… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je connais mes moutons… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 27 ; cf. 2.25 ; 1Co 8.2s : 13.12 ; Ga 4.9 ; 2Tm 2.19.'
    marker-yv: yv-n
  - type: text
    text: 'C''est moi qui suis le bon berger. Je connais mes moutons, et mes moutons me connaissent, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
