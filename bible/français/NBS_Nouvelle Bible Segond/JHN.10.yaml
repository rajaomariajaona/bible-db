        text: 14.10s,20 ; 17.21,23.
    marker-yv: yv-n
  - type: text
    text: 'Mais si je les fais, quand même vous ne me croiriez pas, croyez les œuvres ; sachez et comprenez ainsi que le Père est en moi, comme moi dans le Père. '
