    marker-yv: yv-n
  - type: text
    text: 'Jésus leur dit : Je vous ai montré beaucoup de belles œuvres venant du Père. Pour laquelle de ces œuvres allez-vous me lapider ? '
  - type: usfm
    marker: vlbl
