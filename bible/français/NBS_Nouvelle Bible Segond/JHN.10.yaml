    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.35 ; Es 43.13.'
    marker-yv: yv-n
  - type: text
    text: 'Ce que mon Père m''a donné est plus grand que tout – et personne ne peut l''arracher de la main du Père. '
  - type: usfm
    marker: vlbl
