      - type: text
        text: 'Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.18+.
    marker-yv: yv-n
  - type: text
    text: 'Les Juifs lui répondirent : Ce n''est pas pour une belle œuvre que nous allons te lapider, mais pour blasphème, parce que, toi qui es un homme, tu te fais Dieu ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
