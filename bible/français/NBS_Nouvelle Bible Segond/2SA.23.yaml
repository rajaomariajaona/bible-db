      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en 2S 23.8-23 et dans le texte parallèle de 1Ch 11.10-25, la racine hébraïque correspondante apparaît de nombreuses fois, sous trois formes différentes : l''une signifie '
