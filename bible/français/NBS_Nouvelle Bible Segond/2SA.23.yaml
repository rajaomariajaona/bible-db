        - type: text
          text: 'et la troisième semble désigner un certain groupement de soldats, ou peut-être un titre d''officier. La ressemblance des formes a provoqué des confusions lors de la transmission des deux textes parallèles, d''où les multiples variantes actuelles, en hébreu et dans les versions anciennes. L''expression rendue ici par '
      - type: usfm
