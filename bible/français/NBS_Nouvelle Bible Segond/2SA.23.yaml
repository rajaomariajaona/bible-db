      - type: usfm
        marker: fq
        children:
        - type: text
          text: du favori des mélodies
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du chantre agréable, du protégé de la forteresse, du favori des biens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; pour les hésitations concernant l'un des termes qui apparaissent ici (chant ou puissance ?) voir Gn 43.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . Cf. 1S 18.7 ; Ps 81.3 ; 98.5.
      marker-yv: yv-n
    - type: text
      text: 'Voici les dernières paroles de David :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Déclaration de David, fils de Jessé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: déclaration de l'homme haut placé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de l'homme qui a reçu l'onction du Dieu de Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: du favori des mélodies d'Israël.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réalisa une grande victoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fit un grand salut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 12 ; 1S 11.13 ; 19.5 ; Ps 68.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dépouiller les cadavres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 31.8+.'
      marker-yv: yv-n
    - type: text
      text: 'C''est lui qui battit les Philistins jusqu''à ce que sa main, fatiguée, reste collée à son épée. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' réalisa une grande victoire ce jour-là. Les hommes ne revinrent derrière Eléazar que pour dépouiller les cadavres.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Léhi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', avec une modification de vocalisation du mot hébreu ; tel qu''il apparaît ici, l''hébreu signifierait '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour une troupe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 13), sens surprenant au v. 11. Sur '
      - type: usfm
        marker: fq
        children:
        - type: text
