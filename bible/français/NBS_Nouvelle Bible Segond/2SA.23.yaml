        - type: text
          text: lentilles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1Ch 11.13 où il s''agit d’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: orge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fuyait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: reculait devant les Philistins.
      marker-yv: yv-n
    - type: text
      text: 'Après lui, Shamma, fils d''Agué, le Hararite. Les Philistins s''étaient rassemblés à Léhi. Il y avait là une parcelle de terre couverte de lentilles ; le peuple fuyait pour échapper aux Philistins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la reprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la dégagea
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réalisa une grande victoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Shamma se tint debout au milieu de la parcelle, la reprit et battit les Philistins. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' réalisa une grande victoire.'
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois des trente chefs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : parmi les diverses variantes des textes et des versions anciennes (cf. v. 8), il est possible de retenir aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trois hommes, l'élite d'entre les gardes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Adoullam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vallée des Rephaïtes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Au temps de la moisson, trois des trente chefs descendirent et vinrent auprès de David dans la grotte d''Adoullam. Une troupe de Philistins avait dressé son camp dans la vallée des Rephaïtes. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les endroits escarpés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la forteresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 1S 22.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : il s''agit de la grotte d''Adoullam. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Beth-Léhem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : patrie de David.'
      marker-yv: yv-n
    - type: text
      text: David était alors dans les endroits escarpés ; il y avait alors un poste des Philistins à Beth-Léhem.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la citerne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du puits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 16,20 ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la citerne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du puits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Beth-Léhem, qui est à la porte (de la ville)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; de même au v. 16.
      marker-yv: yv-n
    - type: text
      text: 'David exprima un désir en disant : Qui me fera boire de l''eau de la citerne qui est à la porte de Beth-Léhem ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: forcèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: firent irruption dans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il la répandit en libation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette eau est trop précieuse pour être simplement bue ; David en fait une offrande à Dieu.'
      marker-yv: yv-n
    - type: text
      text: 'Alors les trois vaillants hommes forcèrent le camp des Philistins et puisèrent de l''eau de la citerne qui est à la porte de Beth-Léhem. Ils l''apportèrent et la présentèrent à David ; mais il ne voulut pas la boire et il la répandit en libation pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jamais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 2.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.7+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il dit : Jamais, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', je ne ferais cela ! N''est-ce pas le sang de ces hommes, qui y sont allés au péril de leur vie ? Et il ne voulut pas la boire. Voilà ce que firent les trois vaillants hommes.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abishaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 26.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: appartenait à l'élite de la garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : problème textuel (cf. v. 8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: était à la tête des trois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui brandit sa lance…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui se fit ainsi un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et qui eut du renom.
      marker-yv: yv-n
    - type: text
      text: 'Abishaï, frère de Joab, fils de Tserouya, appartenait à l''élite de la garde. C''est lui qui brandit sa lance sur trois cents hommes qu''il transperça et qui se fit ainsi un nom parmi les trois. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'n''est-ce pas lui qui a eu le plus de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parmi les trois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un ms hébreu porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parmi les trente
      - type: usfm
        marker: ft
