        - type: text
          text: c'est lui qui brandit sa lance.
      marker-yv: yv-n
    - type: text
      text: 'Voici les noms des vaillants hommes de David : Yosheb-ba-Shébeth le Tahkemonite, qui appartenait à l''élite de la garde. C''est lui, Adino l''Etsnite, qui s''attaqua à huit cents hommes, qu''il transperça en une seule fois.'
