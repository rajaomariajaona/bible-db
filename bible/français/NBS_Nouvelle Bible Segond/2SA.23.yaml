document_id: 2SA.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dernières paroles de David
  - type: text
    content: ' '
  - type: note
    content: 'dernières paroles de David  : cf. les dernières paroles de Jacob en Gn 49, et les dernières paroles de Moïse en Dt 33 ; voir aussi 1R 2.1-9. –  Déclaration  : cf. 1S 2.30n. –  haut placé  : expression hébraïque inhabituelle, qui a donné lieu à de nombreuses interprétations, déjà dans les versions anciennes. –  l''homme qui a reçu l''onction 1S 2.10n. –  du favori des mélodies  : traduction incertaine ; on a aussi compris du chantre agréable, du protégé de la forteresse, du favori des biens  ; pour les hésitations concernant l''un des termes qui apparaissent ici (chant ou puissance ?) voir Gn 43.11n  ; Ex 15.2n. Cf. 1S 18.7 ; Ps 81.3 ; 98.5.'
  - type: text
    content: 'Voici les dernières paroles de David :'
  - type: text
    content: Déclaration de David, fils de Jessé,
  - type: text
    content: déclaration de l'homme haut placé,
  - type: text
    content: de l'homme qui a reçu l'onction du Dieu de Jacob,
  - type: text
    content: du favori des mélodies d'Israël.
  '10':
  - type: note
    content: 'réalisa une grande victoire  : litt. fit un grand salut  : cf. v. 12 ; 1S 11.13 ; 19.5 ; Ps 68.21. –  dépouiller les cadavres  : cf. 1S 31.8+.'
  - type: text
    content: 'C''est lui qui battit les Philistins jusqu''à ce que sa main, fatiguée, reste collée à son épée. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalisa une grande victoire ce jour-là. Les hommes ne revinrent derrière Eléazar que pour dépouiller les cadavres.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'à Léhi , avec une modification de vocalisation du mot hébreu ; tel qu''il apparaît ici, l''hébreu signifierait pour une troupe (cf. v. 13), sens surprenant au v. 11. Sur Léhi , cf. Jg 15.9n. –  couverte  : litt. remplie . –  lentilles  : cf. 1Ch 11.13 où il s''agit d’ orge . –  fuyait…  : autre traduction reculait devant les Philistins.'
  - type: text
    content: 'Après lui, Shamma, fils d''Agué, le Hararite. Les Philistins s''étaient rassemblés à Léhi. Il y avait là une parcelle de terre couverte de lentilles ; le peuple fuyait pour échapper aux Philistins. '
  '12':
  - type: note
    content: 'la reprit ou la dégagea. –  réalisa une grande victoire  : cf. v. 10n.'
  - type: text
    content: 'Shamma se tint debout au milieu de la parcelle, la reprit et battit les Philistins. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalisa une grande victoire.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'trois des trente chefs  : parmi les diverses variantes des textes et des versions anciennes (cf. v. 8), il est possible de retenir aussi trois hommes, l''élite d''entre les gardes . –  Adoullam  : cf. 1S 22.1n. –  vallée des Rephaïtes  : cf. 5.18n.'
  - type: text
    content: 'Au temps de la moisson, trois des trente chefs descendirent et vinrent auprès de David dans la grotte d''Adoullam. Une troupe de Philistins avait dressé son camp dans la vallée des Rephaïtes. '
  '14':
  - type: note
    content: 'les endroits escarpés ou la forteresse (cf. 1S 22.4n) : il s''agit de la grotte d''Adoullam. –  Beth-Léhem  : patrie de David.'
  - type: text
    content: David était alors dans les endroits escarpés ; il y avait alors un poste des Philistins à Beth-Léhem.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'de la citerne  : autre lecture traditionnelle du puits , de même aux v. 16,20 ; litt. de la citerne (ou du puits ) de Beth-Léhem, qui est à la porte (de la ville)  ; de même au v. 16.'
  - type: text
    content: 'David exprima un désir en disant : Qui me fera boire de l''eau de la citerne qui est à la porte de Beth-Léhem ? '
  '16':
  - type: note
    content: 'forcèrent, c.-à-d. firent irruption dans. –  il la répandit en libation  : cette eau est trop précieuse pour être simplement bue ; David en fait une offrande à Dieu.'
  - type: text
    content: 'Alors les trois vaillants hommes forcèrent le camp des Philistins et puisèrent de l''eau de la citerne qui est à la porte de Beth-Léhem. Ils l''apportèrent et la présentèrent à David ; mais il ne voulut pas la boire et il la répandit en libation pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'Jamais  : cf. 1S 2.30n  ; 24.7+. – Voir sang.'
  - type: text
    content: 'Il dit : Jamais, '
  - type: text
    content: Seigneur
  - type: text
    content: ', je ne ferais cela ! N''est-ce pas le sang de ces hommes, qui y sont allés au péril de leur vie ? Et il ne voulut pas la boire. Voilà ce que firent les trois vaillants hommes.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Abishaï  : cf. 1S 26.6n. –  appartenait à l''élite de la garde  : problème textuel (cf. v. 8n) ; on pourrait aussi traduire était à la tête des trois . –  qui brandit sa lance…  : cf. v. 8n. –  qui se fit ainsi un nom  : autre traduction et qui eut du renom.'
  - type: text
    content: 'Abishaï, frère de Joab, fils de Tserouya, appartenait à l''élite de la garde. C''est lui qui brandit sa lance sur trois cents hommes qu''il transperça et qui se fit ainsi un nom parmi les trois. '
  '19':
  - type: note
    content: 'Litt. n''est-ce pas lui qui a eu le plus de gloire… –  parmi les trois  : un ms hébreu porte parmi les trente  ; cf. v. 13-17,23.'
  - type: text
    content: C'est lui qui a eu le plus de gloire parmi les trois. Il fut leur chef ; mais il n'égala pas les trois.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Le souffle ou l'Esprit . Cf. Es 51.16 ; 59.21 ; Jr 1.9 ; Mt 22.43 ; Hé 1.1s ; 2P 1.21.
  - type: text
    content: 'Le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' a parlé par moi,'
  - type: text
    content: sa parole est sur ma langue.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Benaya  : cf. 8.18n. –  un homme de valeur  : autre traduction fils d''un homme de valeur  ; une variante du texte hébreu dit (fils d’)un homme vivant . –  Qabtséel  : cf. Jos 15.21. –  les deux Ariel  : LXX a lu les deux fils d''Ariel  ; personnages inconnus par ailleurs. –  un lion dans une citerne  : litt. le lion à l''intérieur de la citerne  ; l''emploi de l''article défini (deux fois) peut suggérer que l''épisode était bien connu.'
  - type: text
    content: 'Benaya, fils de Joïada, était un homme de valeur, originaire de Qabtséel, qui avait fait de nombreux exploits. C''est lui qui abattit les deux Ariel de Moab. C''est lui qui descendit et abattit un lion dans une citerne, un jour de neige. '
  '21':
  - type: note
    content: Cf. 1S 17.43,47,51.
  - type: text
    content: 'C''est lui qui abattit un Egyptien qui avait fière allure. Dans la main de l''Egyptien, il y avait une lance ; il descendit vers lui avec un bâton, arracha la lance de la main de l''Egyptien et le tua avec sa lance. '
  '22':
  - type: note
    content: 'il se fit ainsi un nom  : cf. v. 18n.'
  - type: text
    content: 'Voilà ce que fit Benaya, fils de Joïada, et il se fit ainsi un nom parmi les trois vaillants hommes. '
  '23':
  - type: note
    content: 'les trente / les trois, cf. v. 19n. –  l''affecta à sa garde personnelle  : cf. 1S 22.14n.'
  - type: text
    content: C'est lui qui a eu le plus de gloire parmi les trente ; mais il n'égala pas les trois. David l'affecta à sa garde personnelle.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Asaël  : cf. 3.27n  ; voir 2.18-23. – Les v. 24-39 dressent une liste de trente et un noms de soldats qui ont fait partie des trente  ; le nombre traditionnel de trente n''est probablement pas à prendre au sens strict (cf. v. 39  : trente-sept ). La liste parallèle de 1Ch 11.26-41 présente plusieurs variantes, dont ne sont signalées que les plus importantes.'
  - type: text
    content: Asaël, frère de Joab, l'un des trente.
  - type: text
    content: Elhanân, fils de Dodo, de Beth-Léhem.
  '25':
  - type: text
    content: ' '
  - type: note
    content: Eliqa, le Harodite ne figure pas dans la liste de 1Ch 11.
  - type: text
    content: Shamma, le Harodite.
  - type: text
    content: Eliqa, le Harodite.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'le Paltite  : de Péleth, probablement Beth-Péleth, cf. Jos 15.27.'
  - type: text
    content: Hélets, le Paltite.
  - type: text
    content: Ira, fils d'Iqqesh, le Teqoïte.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Mebounnaï, le Houshatite  : cf. 21.18n  ; 1Ch 11.29 ( Sibbekaï ).'
  - type: text
    content: Abiézer, l'Anatotite.
  - type: text
    content: Mebounnaï, le Houshatite.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Tsalmôn  : cf. 1Ch 11.29 ( Ilaï ).'
  - type: text
    content: Tsalmôn, l'Ahohite.
  - type: text
    content: Maharaï, le Netophatite.
  '29':
  - type: text
    content: Héleb, fils de Baana, le Netophatite.
  - type: text
    content: Ittaï, fils de Ribaï, de Guibéa des fils de Benjamin.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le Rocher d''Israël  : cf. 22.3,32,47 ; Dt 32.15,31 ; 1S 2.2 ; Es 17.10 ; 26.4 ; Ps 28.1. –  gouverne  : autre traduction domine . –  en juste  : cf. 8.15+ ; Ps 72.1-4 ; 101.1-8 ; Pr 16.12. –  crainte de Dieu  : cf. Es 11.2s ; Ps 111.10 ; Jb 28.28 ; Pr 1.7 ; 9.10.'
  - type: text
    content: Le Dieu d'Israël a parlé,
  - type: text
    content: 'le Rocher d''Israël m''a dit :'
  - type: text
    content: Celui qui gouverne les humains en juste,
  - type: text
    content: celui qui gouverne avec la crainte de Dieu,
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'le Piratonite  : de Piratôn, cf. Jg 12.13n. –  Hiddaï  : cf. 1Ch 11.32 ( Houraï ).'
  - type: text
    content: Benaya, le Piratonite.
  - type: text
    content: Hiddaï, des oueds du Gaash.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Abi-Albôn  : cf. 1Ch 11.32 ( Abiel ). –  plaine aride  : hébreu ‘arava  ; cf. Dt 1.1n  ; Jos 8.14n. –  le Barhoumite selon le texte hébreu traditionnel ; certains proposent de lire le Bahourimite , de Bahourim (cf. 2S 3.16n).'
  - type: text
    content: Abi-Albôn, de la plaine aride.
  - type: text
    content: Azmaveth, le Barhoumite.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'le Shaalbonite  : de Shaalabbîn (Jos 19.42) ou Shaalbim (Jg 1.35). – On ignore si Bené-Yashen (1Ch 11.34 Bené Hashem, de Guizôn ) doit être compris comme un nom de personne à transcrire, ou doit être traduit par les fils de Yashen ( … de Hashem ) ; les deux formes actuelles du texte sont de toute façon peu claires ; d''après une recension de LXX, certains pensent qu''elles dérivent d''un original qui portait Yashen, le Gounite.'
  - type: text
    content: Eliahba, le Shaalbonite.
  - type: text
    content: Bené-Yashen.
  - type: text
    content: Jonathan.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Shamma  : cf. 1Ch 11.34 ( fils de Shagué , apposition à Jonathan ). –  Sharar  : cf. 1Ch 11.35 ( Sakar ). –  l''Ararite selon le texte hébreu traditionnel ; quelques mss portent le Hararite , d''autres l''Aradite.'
  - type: text
    content: Shamma, le Hararite.
  - type: text
    content: Ahiam, fils de Sharar, l'Ararite.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Eliphéleth, fils d''Ahasbaï, fils du Maakatite  : cf. 1Ch 11.35 ( Eliphal, fils d''Our ). –  Eliam, fils d''Ahitophel, le Guilonite  : cf. 1Ch 11.36 ( Hépher, de Mekéra et Ahiya, de Palôn ). Sur Ahitophel , voir 15.12+.'
  - type: text
    content: Eliphéleth, fils d'Ahasbaï, fils du Maakatite.
  - type: text
    content: Eliam, fils d'Ahitophel, le Guilonite.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Paaraï, l''Arbite (d''Arab, cf. Jos 15.52) : cf. 1Ch 11.37 ( Naaraï, fils d''Ezbaï ).'
  - type: text
    content: Hetsraï, le Carmélite.
  - type: text
    content: Paaraï, l'Arbite.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Yiguéal, fils de Nathan, de Tsoba  : cf. 1Ch 11.38 ( Joël, frère de Nathan ). –  Bani, le Gadite  : cf. 1Ch 11.38 ( Mibhar, fils de Hagri ).'
  - type: text
    content: Yiguéal, fils de Nathan, de Tsoba.
  - type: text
    content: Bani, le Gadite.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'qui portait  : selon plusieurs mss hébreux, de LXX et de Tg, ainsi que Syr et Vg  ; le texte hébreu traditionnel a le pluriel qui portaient.'
  - type: text
    content: Tséleq, l'Ammonite.
  - type: text
    content: Nahraï, le Béérotite, qui portait les armes de Joab, fils de Tserouya.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'le Yitrite  : de Yéter ou de Yattir.'
  - type: text
    content: Ira, le Yitrite.
  - type: text
    content: Gareb, le Yitrite.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Urie, le Hittite  : cf. 11.3n. – Le texte parallèle de 1Ch 11 ajoute seize autres noms, mais sans donner de total, comme le trente-sept du présent verset.'
  - type: text
    content: Urie, le Hittite. En tout, trente-sept.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'à l''aube  : litt. à la lumière du matin . –  quand le soleil se lève  : cf. Jg 5.31 ; Ml 3.20 ; Pr 4.18. –  la verdure  : cf. Os 14.6-8 ; Ps 72.6s.'
  - type: text
    content: est pareil à l'aube, quand le soleil se lève
  - type: text
    content: par un matin sans nuages ;
  - type: text
    content: par sa clarté et par la pluie, la verdure sort de la terre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El , cf. Gn 21.33n. –  alliance perpétuelle  : cf. 7.8-16 ; Gn 9.16 ; 17.7 ; Es 55.3 ; Jr 32.40 ; Ez 16.60 ; Ps 105.10 ; 2Ch 13.5 ; Hé 13.20. –  germer ou pousser  ; la germination est parfois l''image d''événements qui se préparent dans la discrétion et dont l''apparition est certaine ; cf. Es 42.9 ; 43.19 ; 45.8 ; 61.11 ; Jr 33.15 ; Ps 85.12 ; 132.17. –  salut  : autres traductions victoire, triomphe . –  tout ce qui est agréable  : autres traductions tout mon bon plaisir, tout son bon plaisir ; toute chose.'
  - type: text
    content: Ma maison n'est-elle pas ainsi avec Dieu,
  - type: text
    content: puisqu'il a fait avec moi une alliance perpétuelle,
  - type: text
    content: en tous points réglée et gardée ?
  - type: text
    content: Ne fera-t-il pas germer tout mon salut
  - type: text
    content: et tout ce qui est agréable ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les gens sans morale  : cf. Dt 13.14n. –  les chardons ou les épines  ; cf. Gn 3.18 ; Es 33.12 ; Ez 2.6.'
  - type: text
    content: Mais les gens sans morale sont tous comme les chardons que l'on rejette,
  - type: text
    content: que l'on ne prend pas avec la main ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 's''arme  : litt. se remplit (la main). –  ils seront jetés au feu  : litt. ils seront brûlés au feu  ; cf. Es 27.4 ; Ps 21.9s ; Hé 6.8. –  sur place  : certains commentateurs pensent que le mot hébreu correspondant est de trop, car on le retrouve exactement identique dans le verset suivant, dans le nom propre (Yosheb-)ba-Shébeth.'
  - type: text
    content: l'homme qui les touche
  - type: text
    content: s'arme d'un fer ou d'un bois de lance ;
  - type: text
    content: ils seront jetés au feu sur place.
  - type: heading
    content: Les vaillants hommes de David
  - type: heading
    content: 1Ch 11.10-47
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vaillants hommes  : autres traductions guerriers ; héros  ; cf. 10.7n. –  Yosheb-ba-Shébeth le Tahkemonite  : nom surprenant, qui pourrait être la déformation plus ou moins involontaire d''un nom tel que Ish-Baal le Hakmonite (voir le nom correspondant de 1Ch 11.11 Yashobéam, fils de Hakmoni ). –  qui appartenait à l''élite de la garde  : en 2S 23.8-23 et dans le texte parallèle de 1Ch 11.10-25, la racine hébraïque correspondante apparaît de nombreuses fois, sous trois formes différentes : l''une signifie trois , une autre trente et la troisième semble désigner un certain groupement de soldats, ou peut-être un titre d''officier. La ressemblance des formes a provoqué des confusions lors de la transmission des deux textes parallèles, d''où les multiples variantes actuelles, en hébreu et dans les versions anciennes. L''expression rendue ici par appartenait à l''élite de la garde pourrait aussi être comprise comme chef de division . –  C''est lui, Adino l''Etsnite  : 1Ch 11.11 c''est lui qui brandit sa lance.'
  - type: text
    content: 'Voici les noms des vaillants hommes de David : Yosheb-ba-Shébeth le Tahkemonite, qui appartenait à l''élite de la garde. C''est lui, Adino l''Etsnite, qui s''attaqua à huit cents hommes, qu''il transperça en une seule fois.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Dodo  : variante de lecture Dodi . –  d''Ahohi ou d''un Ahohite , c.-à-d. d''un homme du clan d''Ahoah (cf. 1Ch 8.4). –  défièrent ou outragèrent, déshonorèrent , cf. 1S 17.10n. –  se retiraient sur les hauteurs  : litt. montaient  ; le sens, incertain, pourrait être que l''armée battait en retraite.'
  - type: text
    content: 'Après lui, Eléazar, fils de Dodo, fils d''Ahohi. C''était l''un des trois vaillants hommes qui défièrent avec David les Philistins qui s''étaient rassemblés là pour le combat, tandis que les hommes d''Israël se retiraient sur les hauteurs. '
