      - type: usfm
        marker: fq
        children:
        - type: text
          text: haut placé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : expression hébraïque inhabituelle, qui a donné lieu à de nombreuses interprétations, déjà dans les versions anciennes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''homme qui a reçu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
