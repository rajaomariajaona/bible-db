document_id: DAN.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: text
    content: Moi, Nabuchodonosor, je vivais tranquille dans ma maison et heureux dans mon palais.
  - type: text
    content: ' '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'un veilleur, un saint  : cf. v. 14,20 ; 8.13 ; Za 14.5 ; Ps 89.6 ; Jb 5.1 ; 1 Hénoch 12.2 (à propos d''Hénoch enlevé au ciel) : « Ses travaux étaient avec les Veilleurs, et ses jours (s''écoulaient) avec les Saints. »'
  - type: text
    content: 'Voici ce que je vis, dans les visions de mon esprit, pendant que j''étais sur mon lit : un veilleur, un saint, descendit du ciel.'
  - type: text
    content: ' '
  '11':
  - type: text
    content: 'Il cria avec force :'
  - type: text
    content: Abattez l'arbre, et coupez ses branches ;
  - type: text
    content: arrachez son feuillage, et dispersez ses fruits ;
  - type: text
    content: que les bêtes fuient son abri,
  - type: text
    content: et les oiseaux ses branches !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'la souche…  : litt. la souche de ses racines , de même dans la suite.'
  - type: text
    content: Mais laissez en terre la souche avec ses racines,
  - type: text
    content: dans des chaînes de fer et de bronze,
  - type: text
    content: au milieu de l'herbe des champs.
  - type: text
    content: Qu'il soit trempé de la rosée du ciel,
  - type: text
    content: et qu'il ait, comme les bêtes, l'herbe de la terre pour partage !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Son cœur d''homme sera changé…  : c.-à-d. il perdra la raison  ; autre traduction son cœur s''éloignera des hommes (cf. v. 29) ; voir aussi 7.4. –  sept temps (même mot que 2.21n) : c.-à-d. sept années, cf. v. 20 ; 7.25n  ; 12.7 ; Ap 12.14.'
  - type: text
    content: Son cœur d'homme sera changé,
  - type: text
    content: et un cœur de bête lui sera donné ;
  - type: text
    content: et sept temps passeront sur lui.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'veilleurs / saints v. 10n. –  le Très-Haut est maître…  : cf. 2.44 ; Jr 27.5 ; Jb 36.7. –  le dernier des hommes 1S 2.8 ; Lc 1.52.'
  - type: text
    content: Cette sentence est un décret des veilleurs,
  - type: text
    content: cette résolution est un ordre des saints,
  - type: text
    content: afin que les vivants sachent que le Très-Haut est maître de la royauté des hommes, qu'il la donne à qui il veut, et qu'il peut y élever le dernier des hommes.
  - type: text
    content: ' '
  '15':
  - type: text
    content: Voilà le rêve que j'ai eu, moi, le roi Nabuchodonosor. Toi, Belteshatsar, dis-moi l'interprétation, puisque tous les sages de mon royaume ne peuvent me faire connaître cette interprétation ; toi, tu le peux, car tu as en toi le souffle des dieux saints.
  - type: heading
    content: Daniel explique le rêve du roi
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Alors Daniel, nommé Belteshatsar, fut un moment stupéfait ; ses pensées l''épouvantaient. Le roi reprit : Belteshatsar, que le rêve et l''interprétation ne t''épouvantent pas ! Belteshatsar répondit : Mon seigneur, que le rêve soit pour tes ennemis, et son interprétation pour tes adversaires !'
  - type: text
    content: ' '
  '17':
  - type: note
    content: V. 7-12.
  - type: text
    content: L'arbre que tu as vu, qui était devenu grand et fort, dont la cime atteignait le ciel, et qu'on voyait de toute la terre ;
  - type: text
    content: ' '
  '18':
  - type: text
    content: cet arbre, dont le feuillage était beau et les fruits abondants, qui portait de la nourriture pour tous, sous lequel s'abritaient les bêtes sauvages, et dans les branches duquel les oiseaux du ciel demeuraient,
  - type: text
    content: ' '
  '19':
  - type: text
    content: c'est toi, ô roi, qui es devenu grand et puissant, dont la grandeur s'est accrue au point d'atteindre le ciel, et dont le pouvoir s'étend jusqu'aux extrémités de la terre.
  - type: text
    content: ' '
  '2':
  - type: note
    content: 'un rêve qui m''effraya 2.1+. –  les pensées… esprit  : litt. des pensées sur mon lit et les visions de ma tête, de même dans la suite et en 7.1, cf. 2.28.'
  - type: text
    content: J'eus un rêve qui m'effraya ; les pensées dont j'étais poursuivi sur mon lit, les visions de mon esprit, me remplissaient d'épouvante.
  - type: text
    content: ' '
  '20':
  - type: note
    content: un veilleur, un saint… v. 10n.
  - type: text
    content: 'Le roi a vu un veilleur, un saint, descendre du ciel et dire : « Abattez l''arbre, et détruisez-le ; mais laissez en terre la souche avec ses racines, dans des chaînes de fer et de bronze, au milieu de l''herbe des champs ; qu''il soit trempé de la rosée du ciel, et qu''il ait avec les bêtes sauvages l''herbe pour partage, jusqu''à ce que sept temps aient passé sur lui. »'
  - type: text
    content: ' '
  '21':
  - type: text
    content: 'Voici l''interprétation, ô roi ; voici le décret du Très-Haut qui t''atteindra, ô roi :'
  - type: text
    content: ' '
  '22':
  - type: text
    content: On te chassera d'entre les humains, tu auras ta demeure avec les bêtes sauvages, et on te donnera, comme aux bœufs, de l'herbe à manger ; tu seras trempé de la rosée du ciel, et sept temps passeront sur toi, jusqu'à ce que tu saches que le Très-Haut est maître de la royauté des hommes, et qu'il la donne à qui il veut.
  - type: text
    content: ' '
  '23':
  - type: note
    content: 'subsistera pour toi  : autres traductions sera affermie ou se prolongera pour toi. –  c''est le ciel qui est le maître  : cf. 1 Maccabées 3.18 : « Il importe peu au Ciel d''opérer le salut au moyen de beaucoup ou de peu d''hommes. » 2 Maccabées 9.4 : « La sentence du Ciel. » Voir aussi Mt 3.2n  ; Lc 11.16+.'
  - type: text
    content: L'ordre de laisser la souche de l'arbre avec ses racines signifie que ta royauté subsistera pour toi quand tu sauras que c'est le ciel qui est le maître.
  - type: text
    content: ' '
  '24':
  - type: note
    content: 'Mets un terme à  : le verbe araméen, qui signifie d''abord rompre, est compris par certains au sens de racheter. –  la justice  : le mot est peut-être ici à comprendre au sens d''aumône ; cf. Mt 6.1n-4 ; voir aussi Pr 16.6n,8 ; Tobit 12.9 : « L''aumône délivre de la mort et elle purifie de tout péché. Ceux qui font l''aumône seront rassasiés de vie. » Siracide 3.30 : « Comme l''eau éteint le feu qui flambe, ainsi l''aumône efface les péchés. »'
  - type: text
    content: Aussi, ô roi, puisse mon conseil te plaire ! Mets un terme à tes péchés par la justice et à tes fautes par la compassion envers les pauvres, et ta tranquillité se prolongera.
  - type: heading
    content: Le rêve se réalise
  '25':
  - type: text
    content: ' '
  - type: text
    content: Tout cela arriva au roi Nabuchodonosor.
  - type: text
    content: ' '
  '26':
  - type: note
    content: Un texte araméen de Qumrân attribue la même durée et une cause analogue à l'absence, plusieurs fois mentionnée dans les textes babyloniens, de Nabonide dans sa capitale (cf. Dn 5.1n).
  - type: text
    content: Au bout de douze mois, comme il se promenait dans le palais royal à Babylone,
  - type: text
    content: ' '
  '27':
  - type: note
    content: 'Babylone la Grande  : cf. Gn 11.2-4 ; Ap 14.8 ; 16.19 ; 17.5 ; 18.2. –  résidence  : litt. maison. –  puissance… force… gloire 2.37 ; 5.18.'
  - type: text
    content: 'le roi dit : N''est-ce pas là Babylone la Grande, que j''ai bâtie comme résidence royale, par la puissance de ma force et pour l''honneur de ma gloire ?'
  - type: text
    content: ' '
  '28':
  - type: note
    content: 'une voix descendit du ciel  : cf. Mt 3.17+/ /.'
  - type: text
    content: 'La parole était encore dans la bouche du roi qu''une voix descendit du ciel : C''est à toi que l''on parle, roi Nabuchodonosor. Ta royauté s''est retirée de toi.'
  - type: text
    content: ' '
  '29':
  - type: text
    content: On te chassera d'entre les humains, tu auras ta demeure avec les bêtes sauvages, on te donnera, comme aux bœufs, de l'herbe à manger ; et sept temps passeront sur toi, jusqu'à ce que tu saches que le Très-Haut est maître de la royauté des hommes et qu'il la donne à qui il veut.
  - type: text
    content: ' '
  '3':
  - type: text
    content: Je donnai l'ordre de faire venir devant moi tous les sages de Babylone afin de me faire connaître l'interprétation du rêve.
  - type: text
    content: ' '
  '30':
  - type: note
    content: plumes / griffes sous-entendu dans le texte.
  - type: text
    content: Au même instant la parole s'accomplit sur Nabuchodonosor. Il fut chassé d'entre les humains, il se mit à manger de l'herbe comme les bœufs, et son corps fut trempé de la rosée du ciel, jusqu'à ce que ses cheveux poussent comme les plumes des aigles, et ses ongles comme les griffes des oiseaux.
  - type: heading
    content: La guérison de Nabuchodonosor
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Après le temps marqué  : litt. à la fin des jours  ; cf. v. 13. –  la raison  : litt. ma connaissance , de même au v. 33. – Voir bénédiction. –  celui qui est vivant pour toujours ou éternellement , 6.27 ; 12.7 ; Ap 1.18 ; 10.5s. –  de génération en génération Ex 3.15 ; Dt 32.7 ; Es 34.10,17 ; 51.8 ; Ps 33.11 ; 45.18 ; 85.6 ; Pr 27.24.'
  - type: text
    content: Après le temps marqué, moi, Nabuchodonosor, je levai les yeux vers le ciel, et la raison me revint. Je bénis le Très-Haut, je louai et glorifiai celui qui est vivant pour toujours,
  - type: text
    content: dont la domination durera toujours
  - type: text
    content: et dont le règne subsiste de génération en génération.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 40.15-17. –  l''armée du ciel  : cf. Gn 2.1. –  qui lui résiste  : litt. qui frappe dans (ou avec, contre ) sa main  ; on pourrait aussi comprendre  : qui puisse lever la main contre lui. –  Que fais-tu ? Es 45.9 ; Jb 9.12 ; Rm 9.20.'
  - type: text
    content: Tous les habitants de la terre comptent pour rien ;
  - type: text
    content: il agit comme il lui plaît
  - type: text
    content: avec l'armée du ciel et avec les habitants de la terre,
  - type: text
    content: et il n'y a personne qui lui résiste
  - type: text
    content: 'et lui dise : Que fais-tu ?'
  '33':
  - type: text
    content: ' '
  - type: text
    content: A ce moment, la raison me revint ; l'honneur de ma royauté, ma magnificence et ma splendeur me furent rendus, mes conseillers et mes grands me réclamèrent ; je fus rétabli dans ma royauté, et ma grandeur ne fit que s'accroître.
  - type: text
    content: ' '
  '34':
  - type: note
    content: dont toutes les œuvres… Ps 111.7s. – Voir justice. –  qui peut abaisser Ez 17.24 ; Ps 18.28 ; Pr 16.18 ; Lc 1.52.
  - type: text
    content: Maintenant, moi, Nabuchodonosor, je loue, j'exalte et je glorifie le roi du ciel, dont toutes les œuvres sont vraies et dont les voies sont justes, et qui peut abaisser ceux qui marchent avec orgueil.
  '4':
  - type: note
    content: 2.2n.
  - type: text
    content: Alors vinrent les mages, les envoûteurs, les chaldéens et les devins. Je leur racontai le rêve, mais ils ne m'en firent pas connaître l'interprétation.
  - type: text
    content: ' '
  '5':
  - type: note
    content: 'd''après le nom de mon dieu  : le nom de Belteshatsar donné à Daniel (1.6-7n  ; 2.26) rappelle, dans sa forme araméenne, celui du dieu babylonien Bel (cf. Es 46.1n) ; cependant il s''agit sans doute plus d''un jeu d''assonance que d''une véritable étymologie. –  le souffle (ou l''esprit) des dieux saints  : la version grecque de Théodotion (voir LXX) a traduit un esprit saint (ou l''Esprit saint) de Dieu, de même au v. 6 ; cf. 5.11,14 ; Gn 41.38 ; Ex 31.3.'
  - type: text
    content: 'En dernier lieu se présenta devant moi Daniel, nommé Belteshatsar d''après le nom de mon dieu, et qui a en lui le souffle des dieux saints. Je lui dis le rêve :'
  - type: text
    content: ' '
  '6':
  - type: note
    content: 'chef des mages 2.48. –  aucun mystère… 2.18n,28+,47. –  dis-moi…  : litt. les visions du rêve que j''ai vu et son interprétation, dis  ; cf. 2.6-10. La version grecque de Théodotion précise  : écoute le rêve… et dis-m''en l''interprétation.'
  - type: text
    content: Belteshatsar, chef des mages, toi qui as en toi, je le sais, le souffle des dieux saints, et pour qui aucun mystère n'est difficile, dis-moi l'interprétation des visions que j'ai eues en rêve.
  - type: text
    content: ' '
  '7':
  - type: note
    content: Cf. Es 10.33–11.1 ; Ez 17.3-10,22-24 ; 31.3-9.
  - type: text
    content: 'Voici ce que je vis, dans les visions de mon esprit, pendant que j''étais sur mon lit :'
  - type: text
    content: Au milieu de la terre, un arbre très haut.
  '8':
  - type: text
    content: ' '
  - type: text
    content: Cet arbre était grand et fort,
  - type: text
    content: sa cime atteignait le ciel,
  - type: text
    content: et on le voyait de toutes les extrémités de la terre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: oiseaux du ciel Mt 13.31s/ /.
  - type: text
    content: Son feuillage était beau
  - type: text
    content: et ses fruits abondants ;
  - type: text
    content: il portait de la nourriture pour tous ;
  - type: text
    content: sous lui, les bêtes sauvages trouvaient de l'ombre ;
  - type: text
    content: dans ses branches habitaient les oiseaux du ciel,
  - type: text
    content: et tout être vivant tirait de lui sa nourriture.
