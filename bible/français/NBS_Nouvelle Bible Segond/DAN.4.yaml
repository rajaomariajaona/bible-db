document_id: DAN.4,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Moi, Nabuchodonosor, je vivais tranquille dans ma maison et heureux dans mon palais.
    - type: text
      text: ' '
  '10':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un veilleur, un saint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 14,20 ; 8.13 ; Za 14.5 ; Ps 89.6 ; Jb 5.1 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.2 (à propos d''Hénoch enlevé au ciel) : « Ses travaux étaient avec les Veilleurs, et ses jours (s''écoulaient) avec les Saints. »'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Voici ce que je vis, dans les visions de mon esprit, pendant que j''étais sur mon lit : un veilleur, un saint, descendit du ciel.'
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Il cria avec force :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Abattez l'arbre, et coupez ses branches ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: arrachez son feuillage, et dispersez ses fruits ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: que les bêtes fuient son abri,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et les oiseaux ses branches !
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la souche…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la souche de ses racines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Mais laissez en terre la souche avec ses racines,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: dans des chaînes de fer et de bronze,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: au milieu de l'herbe des champs.
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Qu'il soit trempé de la rosée du ciel,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et qu'il ait, comme les bêtes, l'herbe de la terre pour partage !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' d''homme sera changé…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il perdra la raison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'son cœur s''éloignera des hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 29) ; voir aussi 7.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept temps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même mot que 2.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : c.-à-d. sept années, cf. v. 20 ; 7.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.7 ; Ap 12.14.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Son cœur d'homme sera changé,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et un cœur de bête lui sera donné ;
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et sept temps passeront sur lui.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'veilleurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'saints '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Très-Haut est maître…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.44 ; Jr 27.5 ; Jb 36.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le dernier des hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 2.8 ; Lc 1.52.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Cette sentence est un décret des veilleurs,
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: cette résolution est un ordre des saints,
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: afin que les vivants sachent que le Très-Haut est maître de la royauté des hommes, qu'il la donne à qui il veut, et qu'il peut y élever le dernier des hommes.
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: it
      children:
      - type: text
        text: Voilà le rêve que j'ai eu, moi, le roi Nabuchodonosor. Toi, Belteshatsar, dis-moi l'interprétation, puisque tous les sages de mon royaume ne peuvent me faire connaître cette interprétation ; toi, tu le peux, car tu as en toi le souffle des dieux saints.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Daniel explique le rêve du roi
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Alors Daniel, nommé Belteshatsar, fut un moment stupéfait ; ses pensées l''épouvantaient. Le roi reprit : Belteshatsar, que le rêve et l''interprétation ne t''épouvantent pas ! Belteshatsar répondit : Mon seigneur, que le rêve soit pour tes ennemis, et son interprétation pour tes adversaires !'
    - type: text
      text: ' '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 7-12.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: L'arbre que tu as vu, qui était devenu grand et fort, dont la cime atteignait le ciel, et qu'on voyait de toute la terre ;
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: it
      children:
      - type: text
        text: cet arbre, dont le feuillage était beau et les fruits abondants, qui portait de la nourriture pour tous, sous lequel s'abritaient les bêtes sauvages, et dans les branches duquel les oiseaux du ciel demeuraient,
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: it
      children:
      - type: text
        text: c'est toi, ô roi, qui es devenu grand et puissant, dont la grandeur s'est accrue au point d'atteindre le ciel, et dont le pouvoir s'étend jusqu'aux extrémités de la terre.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un rêve qui m''effraya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les pensées… '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des pensées sur mon lit et les visions de ma tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite et en 7.1, cf. 2.28.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: J'eus un rêve qui m'effraya ; les pensées dont j'étais poursuivi sur mon lit, les visions de mon esprit, me remplissaient d'épouvante.
    - type: text
      text: ' '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un veilleur, un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Le roi a vu un veilleur, un saint, descendre du ciel et dire : « Abattez l''arbre, et détruisez-le ; mais laissez en terre la souche avec ses racines, dans des chaînes de fer et de bronze, au milieu de l''herbe des champs ; qu''il soit trempé de la rosée du ciel, et qu''il ait avec les bêtes sauvages l''herbe pour partage, jusqu''à ce que sept temps aient passé sur lui. »'
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Voici l''interprétation, ô roi ; voici le décret du Très-Haut qui t''atteindra, ô roi :'
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: it
      children:
      - type: text
        text: On te chassera d'entre les humains, tu auras ta demeure avec les bêtes sauvages, et on te donnera, comme aux bœufs, de l'herbe à manger ; tu seras trempé de la rosée du ciel, et sept temps passeront sur toi, jusqu'à ce que tu saches que le Très-Haut est maître de la royauté des hommes, et qu'il la donne à qui il veut.
    - type: text
      text: ' '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: subsistera pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sera affermie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se prolongera pour toi. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est le ciel qui est le maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.18 : « Il importe peu au Ciel d''opérer le salut au moyen de beaucoup ou de peu d''hommes. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 Maccabées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.4 : « La sentence du Ciel. » Voir aussi Mt 3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 11.16+.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: L'ordre de laisser la souche de l'arbre avec ses racines signifie que ta royauté subsistera pour toi quand tu sauras que c'est le ciel qui est le maître.
    - type: text
      text: ' '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mets un terme à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe araméen, qui signifie d''abord '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rompre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', est compris par certains au sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'racheter. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot est peut-être ici à comprendre au sens d''aumône ; cf. Mt 6.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: -4 ; voir aussi Pr 16.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',8 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.9 : « L''aumône délivre de la mort et elle purifie de tout '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: '. Ceux qui font l''aumône seront rassasiés de vie. » '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.30 : « Comme l''eau éteint le feu qui flambe, ainsi l''aumône efface les péchés. »'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Aussi, ô roi, puisse mon conseil te plaire ! Mets un terme à tes péchés par la justice et à tes fautes par la compassion envers les pauvres, et ta tranquillité se prolongera.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le rêve se réalise
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tout cela arriva au roi Nabuchodonosor.
    - type: text
      text: ' '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Un texte araméen de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' attribue la même durée et une cause analogue à l''absence, plusieurs fois mentionnée dans les textes babyloniens, de Nabonide dans sa capitale (cf. Dn 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
