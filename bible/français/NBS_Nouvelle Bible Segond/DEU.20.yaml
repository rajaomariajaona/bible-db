document_id: DEU.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles pour la guerre
  - type: text
    content: ' '
  - type: note
    content: 'chars  : cf. 17.16 ; Jos 17.16 ; Jg 1.19. –  tu n''en auras pas peur 1.21+ ; 3.2. –  le Seigneur … est avec toi 2.7+ ; cf. 1.42. –  monter d''Egypte Gn 12.10n.'
  - type: text
    content: 'Lorsque tu pars en guerre contre tes ennemis et que tu vois des chevaux, des chars et des troupes en plus grand nombre que les tiens, tu n''en auras pas peur ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui t''a fait monter d''Egypte, est avec toi. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jg 21.13.
  - type: text
    content: 'Quand tu te présenteras devant une ville pour l''attaquer, tu lui proposeras la paix. '
  '11':
  - type: note
    content: Cf. Jos 9.18-27 ; 16.10 ; 17.13 ; Jg 1.28-35 ; 1R 9.21. –  à la corvée ou au tribut  ; cf. Gn 49.15 ; Jg 1.28nss ; Es 31.8 ; Pr 12.24.
  - type: text
    content: 'Si elle accepte ta paix et t''ouvre ses portes, tout le peuple qui s''y trouve sera astreint pour toi à la corvée ; ils seront tes esclaves. '
  '12':
  - type: text
    content: 'Si elle ne fait pas la paix avec toi, si elle te fait la guerre, alors tu l''assiégeras ; '
  '13':
  - type: note
    content: Cf. 2.34s ; Nb 31.7.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te la livrera ; tu passeras toute sa population mâle au fil de l''épée. '
  '14':
  - type: note
    content: 'Les femmes  : cf. 21.10-14. –  les familles  : autre traduction les enfants, cf. Gn 34.29n. –  celui que le Seigneur …  : autre traduction ceux que le Seigneur … t''aura livrés.'
  - type: text
    content: 'Les femmes, les familles, les bêtes, tout ce qui sera dans la ville, tout son butin, tu le pilleras et tu mangeras le butin pris sur tes ennemis, celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura donné. '
  '15':
  - type: text
    content: 'C''est ainsi que tu agiras à l''égard de toutes les villes qui sont très éloignées de toi et qui ne font pas partie des villes de ces nations-ci. '
  '16':
  - type: text
    content: 'Mais dans les villes de ces peuples que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine, tu ne laisseras la vie à rien de ce qui respire. '
  '17':
  - type: note
    content: 'Cf. 2.34+ ; 7.1-4. –  anathème  : voir bénédiction, malédiction.'
  - type: text
    content: 'Tu frapperas d''anathème les Hittites, les Amorites, les Cananéens, les Perizzites, les Hivvites et les Jébusites, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te l''a ordonné, '
  '18':
  - type: note
    content: 7.25+ ; 18.9.
  - type: text
    content: 'afin qu''ils ne vous apprennent pas à imiter toutes les abominations qu''ils font pour leurs dieux et à pécher contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. '
  '19':
  - type: note
    content: Cf. Gn 1.29. La pratique consistant à détruire les vergers des villes assiégées ou conquises est attestée par plusieurs inscriptions assyriennes.
  - type: text
    content: 'Si tu assièges longtemps une ville pour l''attaquer et la prendre, tu ne détruiras pas les arbres en y brandissant la hache ; tu t''en nourriras et tu ne les couperas pas : l''arbre des champs est-il un homme pour que tu l''assièges ? '
  '2':
  - type: text
    content: 'A l''approche du combat, le prêtre s''avancera et parlera au peuple. '
  '20':
  - type: note
    content: 'qu''elle tombe  : litt. qu''elle descende  ; autre traduction qu''elle se rende.'
  - type: text
    content: Mais tu pourras détruire, couper les arbres dont tu sauras qu'ils ne servent pas à la nourriture, et bâtir avec eux des ouvrages de siège contre la ville qui te fait la guerre, jusqu'à ce qu'elle tombe.
  '3':
  - type: note
    content: Ecoute, Israël 4.1+. –  ne vous épouvantez pas 1.29+.
  - type: text
    content: 'Il leur dira : « Ecoute, Israël ! Vous allez aujourd''hui à la rencontre de vos ennemis pour le combat. Que votre cœur ne mollisse pas ! N''ayez pas peur, ne vous effrayez pas, ne vous épouvantez pas devant eux. '
  '4':
  - type: note
    content: '1.30+ ; cf. 23.15. –  vous sauver  : autre traduction vous donner la victoire.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, marche avec vous, afin de combattre vos ennemis pour vous et de vous sauver. »'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'secrétaires  : autre traduction officiers recruteurs  ; cf. 1.15+ ; Jos 1.10n. –  au peuple  : autre traduction aux troupes . –  inaugurée  : le même mot est utilisé pour la dédicace du temple en 1R 8.63n  ; Ps 30.1 ; 2Ch 7.5 ; Jn 10.22. Pour l''ensemble du passage, cf. 28.30 ; Lc 14.18-20.'
  - type: text
    content: 'Les secrétaires diront ensuite au peuple : « Qui a bâti une maison neuve et ne l''a pas encore inaugurée ? Qu''il s''en aille et rentre chez lui, de peur qu''il ne meure au combat et qu''un autre ne l''inaugure ! '
  '6':
  - type: note
    content: 'n''en a pas encore profité  : le verbe correspondant est souvent traduit par profaner (les premiers fruits appartenaient à Dieu), de même en 28.30 ; cf. Lv 19.23-25 ; Jr 31.5 ; voir aussi 1Co 9.7.'
  - type: text
    content: 'Qui a planté une vigne et n''en a pas encore profité ? Qu''il s''en aille et rentre chez lui, de peur qu''il ne meure au combat et qu''un autre n''en profite ! '
  '7':
  - type: text
    content: 'Qui s''est fiancé avec une femme et ne l''a pas encore prise ? Qu''il s''en aille et rentre chez lui, de peur qu''il ne meure au combat et qu''un autre ne la prenne ! » '
  '8':
  - type: note
    content: 'son cœur mollir  : cf. v. 3. –  qu''il ne fasse pas fondre…  : litt. que le cœur de ses frères ne fonde pas comme son cœur, cf. 1.28n  ; Jg 7.3 ; 2S 17.10n  ; Ps 22.15+.'
  - type: text
    content: 'Les secrétaires continueront à parler au peuple ; ils diront : « Qui a peur ? Qui sent son cœur mollir ? Qu''il s''en aille et rentre chez lui, afin qu''il ne fasse pas fondre le cœur de ses frères comme son propre cœur ! » '
  '9':
  - type: note
    content: 'ils placeront  : autres traductions on placera ; on nommera  ; sur le verbe correspondant, voir Gn 40.4n.'
  - type: text
    content: Quand les secrétaires auront achevé de parler au peuple, ils placeront les chefs des armées à la tête du peuple.
