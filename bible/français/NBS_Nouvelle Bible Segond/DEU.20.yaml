document_id: DEU.20,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles pour la guerre
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chars
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 17.16 ; Jos 17.16 ; Jg 1.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu n''en auras pas peur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.21+ ; 3.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' … est avec toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.7+ ; cf. 1.42. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'monter d''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 12.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu pars en guerre contre tes ennemis et que tu vois des chevaux, des chars et des troupes en plus grand nombre que les tiens, tu n''en auras pas peur ; car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, qui t''a fait monter d''Egypte, est avec toi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jg 21.13.
      marker-yv: yv-n
    - type: text
      text: 'Quand tu te présenteras devant une ville pour l''attaquer, tu lui proposeras la paix. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jos 9.18-27 ; 16.10 ; 17.13 ; Jg 1.28-35 ; 1R 9.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à la corvée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au tribut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 49.15 ; Jg 1.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss ; Es 31.8 ; Pr 12.24.
      marker-yv: yv-n
    - type: text
      text: 'Si elle accepte ta paix et t''ouvre ses portes, tout le peuple qui s''y trouve sera astreint pour toi à la corvée ; ils seront tes esclaves. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si elle ne fait pas la paix avec toi, si elle te fait la guerre, alors tu l''assiégeras ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2.34s ; Nb 31.7.
      marker-yv: yv-n
    - type: text
      text: 'le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te la livrera ; tu passeras toute sa population mâle au fil de l''épée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.10-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les enfants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 34.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'celui que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ceux que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' … t''aura livrés.'
      marker-yv: yv-n
    - type: text
      text: 'Les femmes, les familles, les bêtes, tout ce qui sera dans la ville, tout son butin, tu le pilleras et tu mangeras le butin pris sur tes ennemis, celui que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''aura donné. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est ainsi que tu agiras à l''égard de toutes les villes qui sont très éloignées de toi et qui ne font pas partie des villes de ces nations-ci. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais dans les villes de ces peuples que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te donne comme patrimoine, tu ne laisseras la vie à rien de ce qui respire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.34+ ; 7.1-4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction.'
      marker-yv: yv-n
    - type: text
      text: 'Tu frapperas d''anathème les Hittites, les Amorites, les Cananéens, les Perizzites, les Hivvites et les Jébusites, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te l''a ordonné, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.25+ ; 18.9.
      marker-yv: yv-n
    - type: text
      text: 'afin qu''ils ne vous apprennent pas à imiter toutes les abominations qu''ils font pour leurs dieux et à pécher contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 1.29. La pratique consistant à détruire les vergers des villes assiégées ou conquises est attestée par plusieurs inscriptions assyriennes.
      marker-yv: yv-n
    - type: text
      text: 'Si tu assièges longtemps une ville pour l''attaquer et la prendre, tu ne détruiras pas les arbres en y brandissant la hache ; tu t''en nourriras et tu ne les couperas pas : l''arbre des champs est-il un homme pour que tu l''assièges ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'A l''approche du combat, le prêtre s''avancera et parlera au peuple. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'elle tombe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'elle descende
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'elle se rende.
      marker-yv: yv-n
    - type: text
      text: Mais tu pourras détruire, couper les arbres dont tu sauras qu'ils ne servent pas à la nourriture, et bâtir avec eux des ouvrages de siège contre la ville qui te fait la guerre, jusqu'à ce qu'elle tombe.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ecoute, Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne vous épouvantez pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.29+.
      marker-yv: yv-n
    - type: text
      text: 'Il leur dira : « Ecoute, Israël ! Vous allez aujourd''hui à la rencontre de vos ennemis pour le combat. Que votre cœur ne mollisse pas ! N''ayez pas peur, ne vous effrayez pas, ne vous épouvantez pas devant eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.30+ ; cf. 23.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous sauver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous donner la victoire.
      marker-yv: yv-n
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, marche avec vous, afin de combattre vos ennemis pour vous et de vous sauver. »'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: secrétaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: officiers recruteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1.15+ ; Jos 1.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux troupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: inaugurée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même mot est utilisé pour la dédicace du temple en 1R 8.63'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 30.1 ; 2Ch 7.5 ; Jn 10.22. Pour l''ensemble du passage, cf. 28.30 ; Lc 14.18-20.'
      marker-yv: yv-n
    - type: text
      text: 'Les secrétaires diront ensuite au peuple : « Qui a bâti une maison neuve et ne l''a pas encore inaugurée ? Qu''il s''en aille et rentre chez lui, de peur qu''il ne meure au combat et qu''un autre ne l''inaugure ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'en a pas encore profité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe correspondant est souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'profaner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (les premiers fruits appartenaient à Dieu), de même en 28.30 ; cf. Lv 19.23-25 ; Jr 31.5 ; voir aussi 1Co 9.7.
      marker-yv: yv-n
    - type: text
      text: 'Qui a planté une vigne et n''en a pas encore profité ? Qu''il s''en aille et rentre chez lui, de peur qu''il ne meure au combat et qu''un autre n''en profite ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qui s''est fiancé avec une femme et ne l''a pas encore prise ? Qu''il s''en aille et rentre chez lui, de peur qu''il ne meure au combat et qu''un autre ne la prenne ! » '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' mollir'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il ne fasse pas fondre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que le cœur de ses frères ne fonde pas comme son cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 7.3 ; 2S 17.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 22.15+.'
      marker-yv: yv-n
    - type: text
      text: 'Les secrétaires continueront à parler au peuple ; ils diront : « Qui a peur ? Qui sent son cœur mollir ? Qu''il s''en aille et rentre chez lui, afin qu''il ne fasse pas fondre le cœur de ses frères comme son propre cœur ! » '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils placeront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on placera ; on nommera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le verbe correspondant, voir Gn 40.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quand les secrétaires auront achevé de parler au peuple, ils placeront les chefs des armées à la tête du peuple.
