      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(3.1-6), '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Philadelphie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(3.7-13), à l''intérieur des terres, en suivant un axe nord-ouest sud-est. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Laodicée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (3.14-22), au sud-est de Philadelphie, non loin de Colosses (Col 2.1 ; 4.13). Toutes ces villes étaient reliées par une voie romaine.
      marker-yv: yv-n
    - type: text
      text: 'qui disait : Ce que tu vois, écris-le dans un livre, et envoie-le aux sept Eglises : à Ephèse, à Smyrne, à Pergame, à Thyatire, à Sardes, à Philadelphie et à Laodicée.'
