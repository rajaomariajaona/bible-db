          text: 'Smyrne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(2.8-11) : un peu plus au nord, également sur la côte. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pergame '
      - type: usfm
        marker: ft
        children:
        - type: text
