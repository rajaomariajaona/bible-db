document_id: REV.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Introduction
  - type: text
    content: ' '
  - type: note
    content: 'Révélation ou dévoilement , en grec apokalupsis , d''où Apocalypse (sur le premier mot comme titre de l''ouvrage, cf. Gn 1.1n  ; Ex 1.1n) ; même terme en Rm 2.5 ; 8.19 ; 1Co 1.7 ; 2Th 1.7 ; 1P 1.7,13. –  Christ v. 2,5 ; 11.15 ; 12.10 ; 20.4,6 (sept fois en tout) ; voir onction. –  que Dieu lui a donnée  : cf. Am 3.7. –  esclaves  : autre traduction serviteurs  ; cf. 2.20 ; 6.15 ; 7.3 ; 10.7 ; 11.18 ; 13.16 ; 15.3 ; 19.2,5,18 ; 22.3,6 ; Lc 1.38n  ; Rm 1.1+. –  ce qui doit arriver v. 19 ; 4.1 ; 22.6 ; cf. Dn 2.28s,45. –  bientôt ou rapidement  : cf. 3.11 ; 11.14 ; 22.6s,12,20. –  signifiée  : même verbe (apparenté au terme habituellement traduit par signe ) en Jn 12.33+. –  ange 22.16. –  Jean v. 9 ; 22.8.'
  - type: text
    content: 'Révélation de Jésus-Christ, que Dieu lui a donnée pour montrer à ses esclaves ce qui doit arriver bientôt ; il l''a signifiée en envoyant son ange à son esclave Jean, '
  '10':
  - type: note
    content: 'par l''Esprit  : autre traduction en esprit  ; 4.2 ; 17.3. –  au jour du Seigneur  : litt. au jour seigneurial (même adjectif en 1Co 11.20) ; cette expression qui n''apparaît qu''ici dans le N.T. pourrait, comme la formule plus couramment traduite par jour du Seigneur (Ac 2.20 ; 1Co 1.8 ; 5.5 ; 2Co 1.14 ; Ph 1.6 etc.), s''appliquer au « jugement dernier » (cf. Ap 16.14 ; voir aussi Es 13.9 ; Jr 30.7 ; Os 1.5+ ; Jl 1.15 ; 2.11 ; 3.4 ; Am 5.18 ; Za 14.1 ; Ml 3.2,19). La plupart des spécialistes estiment cependant qu''elle a ici un sens liturgique : la vision aurait eu lieu au jour de la semaine où la majeure partie des chrétiens se rassemblent pour le culte. En grec post-biblique, le terme désigne le dimanche (notre mot dimanche vient du latin dies dominicus, « jour du Seigneur », de Dominus = « Seigneur » ; cf. Ac 20.7 ; 1Co 11.26 ; 16.2). –  derrière moi  : cf. Jn 20.14. –  trompette 4.1 ; cf. Ex 19.16 ; Es 30.21 ; Ez 3.12 ; Mt 24.31 ; 1Co 15.52 ; 1Th 4.16.'
  - type: text
    content: 'quand je fus saisi par l''Esprit, au jour du Seigneur ; j''entendis derrière moi une voix, forte comme le son d''une trompette, '
  '11':
  - type: note
    content: 'écris-le v. 19 ; 14.13 ; 19.9 ; 21.5 ; cf. Es 30.8. –  sept Eglises v. 4. –  Ephèse (2.1-7) : métropole de la province romaine d''Asie, sur la côte ouest (Ac 19.1). Smyrne (2.8-11) : un peu plus au nord, également sur la côte. Pergame (2.12-17), Thyatire (2.18-29), Sardes (3.1-6), Philadelphie (3.7-13), à l''intérieur des terres, en suivant un axe nord-ouest sud-est. Laodicée (3.14-22), au sud-est de Philadelphie, non loin de Colosses (Col 2.1 ; 4.13). Toutes ces villes étaient reliées par une voie romaine.'
  - type: text
    content: 'qui disait : Ce que tu vois, écris-le dans un livre, et envoie-le aux sept Eglises : à Ephèse, à Smyrne, à Pergame, à Thyatire, à Sardes, à Philadelphie et à Laodicée.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui parlait  : litt. la voix qui parlait . –  je vis  : cette expression revient 42 fois dans le livre (cf. 11.2n). –  sept porte-lampes v. 20 ; 2.1 ; cf. Ex 25.31,37 ; 27.20s ; Za 4.'
  - type: text
    content: 'Je me retournai pour voir celui qui parlait avec moi. Quand je me fus retourné, je vis sept porte-lampes d''or '
  '13':
  - type: note
    content: fils d'homme 14.14 ; Ez 1.26n  ; Dn 7.13n. –  robe / ceinture d'or 15.6 ; Dn 10.5.
  - type: text
    content: 'et, au milieu des porte-lampes, quelqu''un qui ressemblait à un fils d''homme. Il était vêtu d''une longue robe et portait une ceinture d''or à la poitrine. '
  '14':
  - type: note
    content: cheveux Dn 7.9. –  Ses yeux… 2.18 ; 19.12.
  - type: text
    content: 'Sa tête et ses cheveux étaient blancs comme laine blanche, comme neige. Ses yeux étaient comme un feu flamboyant, '
  '15':
  - type: note
    content: 'Dn 10.6. –  bronze  : le terme grec, qui n''apparaît que dans Ap (aussi en 2.18), rappelle le mot traduit par encens en 18.13 ; il pourrait évoquer le métal servant à faire les autels. –  incandescent ou peut-être purifié (le même verbe est traduit par purifié par le feu en 3.18) au creuset, litt. comme embrasé dans une fournaise. –  le bruit (ou la voix, même mot en grec) de grandes eaux 14.2 ; 19.6 ; Ez 43.2.'
  - type: text
    content: 'ses pieds ressemblaient à du bronze incandescent, et sa voix était comme le bruit de grandes eaux. '
  '16':
  - type: note
    content: 'sept étoiles v. 20 ; 2.1 ; 3.1. –  bouche / épée 2.16 ; 19.21 ; Es 11.4 ; 49.2. –  à deux tranchants 2.12 ; 19.15 ; Hé 4.12 ; cf. Jg 3.16 ; Pr 5.4. –  son visage  : autre traduction son apparence 10.1 ; cf. Mt 17.2/ / ; voir aussi Jg 5.31.'
  - type: text
    content: Il avait dans sa main droite sept étoiles ; de sa bouche sortait une épée acérée, à deux tranchants, et son visage était comme le soleil lorsqu'il brille dans toute sa puissance.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Ez 1.28 ; Dn 8.18+ ; 10.15,19. –  N''aie pas peur Es 41.10+ ; Lc 1.13+ ; voir crainte. –  C''est moi qui suis…  : cf. v. 8 ; 2.23 ; 22.16 ; Jn 4.26n  ; 6.35+. –  premier / dernier 2.8 ; 22.13 ; Es 41.4+ ; 44.6 ; 48.12.'
  - type: text
    content: 'Quand je le vis, je tombai à ses pieds, comme mort. Alors il posa sur moi sa main droite, en disant :'
  - type: text
    content: 'N''aie pas peur ! C''est moi qui suis le premier et le dernier, '
  '18':
  - type: note
    content: 'le vivant  : le même terme est traduit par celui qui vit en 4.9+ ; cf. Lc 24.5 ; Hé 7.25 ; voir aussi Dt 32.40 ; Dn 4.31+. –  Je suis mort  : litt. je suis devenu mort. –  les clefs… du séjour des morts  : cf. 3.7+ ; Jb 38.17 ; Mt 16.18s.'
  - type: text
    content: 'le vivant. Je suis mort, mais je suis vivant à tout jamais, et j''ai les clefs de la mort et du séjour des morts. '
  '19':
  - type: note
    content: V. 1+ ; cf. Es 48.6.
  - type: text
    content: 'Ecris donc ce que tu as vu, ce qui est et ce qui va arriver après. '
  '2':
  - type: note
    content: 'témoigné de  : autre traduction attesté  ; la famille de termes grecs correspondant à témoin et témoignage est celle qui a donné le mot martyr(e)  ; sans doute ce sens particulier (le supplice comme témoignage de la foi) est-il déjà en germe dans l''Apocalypse ; cf. v. 5,9 ; 6.9 ; 12.11,17 ; 19.10 ; 20.4 ; voir aussi 1Jn 1.1-3. –  ce qu''il a vu v. 11s.'
  - type: text
    content: 'qui a témoigné de tout ce qu''il a vu : la parole de Dieu et le témoignage de Jésus-Christ.'
  '20':
  - type: note
    content: V. 4,11s,16.
  - type: text
    content: Quant au mystère des sept étoiles que tu as vues dans ma main droite, et aux sept porte-lampes d'or, les sept étoiles sont les anges des sept Eglises, et les sept porte-lampes sont les sept Eglises.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux 14.13 ; 16.15 ; 19.9 ; 20.6 ; 22.7,14 (sept fois). –  à haute voix  : précision sous-entendue dans le texte : celui qui lit le fait pour ceux qui entendent (autre traduction qui écoutent ) ; cf. Ac 8.28n  ; 13.15 ; 1Tm 4.13+. –  prophétie 22.18s. –  gardent  : autre traduction observent . –  proche 22.10.'
  - type: text
    content: Heureux celui qui lit à haute voix les paroles de la prophétie, comme ceux qui les entendent et qui gardent ce qui y est écrit ! Car le temps est proche.
  - type: heading
    content: Salutations aux sept Eglises
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'sept Eglises  : voir v. 11n  ; le chiffre suggère une idée de totalité, cf. les sept esprits (voir l''introduction) ; voir aussi 22.16. –  Asie  : voir Ac 16.6n  ; Rm 16.5n. –  Grâce et paix…  : Rm 1.7+. –  celui qui est…  : litt. l''étant, l''était et le venant v. 8 ; 4.8 ; 11.17 ; 16.5 ; cf. Ex 3.14 ; Es 41.4 que le judaïsme commentait en appelant Dieu celui qui est, qui était et qui sera  ; voir aussi Jn 8.24. –  sept esprits 3.1 ; 4.5 ; 5.6 ; cf. 8.2n  ; Es 11.2s.'
  - type: text
    content: 'Jean, aux sept Eglises qui sont en Asie : Grâce et paix à vous de la part de celui qui est, qui était et qui vient, de la part des sept esprits qui sont devant son trône '
  '5':
  - type: note
    content: 'témoin fidèle ou digne de confiance v. 2+ ; 2.13,19n  ; 3.14 ; 19.11 ; cf. Es 55.4 ; Jr 42.5 ; Ps 89.38 ; voir aussi 1Jn 1.9n. –  premier-né Ps 89.28. –  d''entre les morts Col 1.18. –  chef ou prince  : même terme Jn 3.1+ ; 12.31. –  délivrés ou déliés  ; quelques mss portent lavés, ce qui représente en grec une variante d''une seule lettre (cf. 7.14). – Voir péchés et sang.'
  - type: text
    content: et de la part de Jésus-Christ, le témoin fidèle, le premier-né d'entre les morts et le chef des rois de la terre !
  - type: text
    content: 'A celui qui nous aime, qui nous a délivrés de nos péchés par son sang '
  '6':
  - type: note
    content: 'royaume / prêtres 5.10 ; 20.6 ; 22.5 ; Ex 19.6 ; Es 61.6 ; 1P 2.5,9. –  à lui la gloire Rm 16.27. –  à tout jamais  : traduction traditionnelle aux siècles des siècles  ; ici certains mss ont une formule plus simple (aux siècles) qu''on traduit habituellement pour toujours  ; cf. v. 18 ; 4.9s ; 5.13 ; 7.12 ; 10.6 ; 11.15 ; 14.11 ; 15.7 ; 19.3 ; 20.10 ; 22.5 ; Ga 1.5n. –  le pouvoir 5.13 (autre terme en 2.26n) ; le mot qui apparaît ici se retrouve en Lc 1.51 ; Ac 19.20 ; Ep 1.19n  ; 6.10 ; Col 1.11 ; 1Tm 6.16 ; 1P 4.11 ; 5.11 ; Jd 25.'
  - type: text
    content: 'et qui a fait de nous un royaume, des prêtres pour son Dieu et Père, à lui la gloire et le pouvoir à tout jamais ! '
  - type: text
    content: Amen !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il vient… ou il va venir… 2.16 ; 3.11 ; 11.14 ; 22.7,12,20 (sept fois). –  avec les nuées 14.14 ; Dn 7.13  ; Mt 24.30/ / ; cf. Ex 13.21 ; 19.16. –  tous le verront  : litt. tout œil le verra . –  ceux qui l''ont transpercé… Za 12.10ss  ; Jn 19.37. –  se lamenteront  : autre traduction se frapperont la poitrine , cf. 18.9 ; Mt 11.17n  ; Lc 23.27n. –  à son sujet  : autre traduction sur lui.'
  - type: text
    content: 'Il vient avec les nuées :'
  - type: text
    content: 'tous le '
  - type: text
    content: verront,
  - type: text
    content: 'même ceux qui l''ont '
  - type: text
    content: transpercé,
  - type: text
    content: et toutes les tribus de la terre se lamenteront à son sujet
  - type: text
    content: .
  - type: text
    content: 'Oui, '
  - type: text
    content: amen !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'l''alpha et l''oméga  : première et dernière lettres de l''alphabet grec (cf. de A à Z ) ; 21.6 ; 22.13. –  celui qui est… v. 4n. –  le Tout-Puissant 4.8 ; 11.17 ; 15.3 ; 16.7,14 ; 19.6,15 ; 21.22 ; 2Co 6.18 ; grec pantokratôr , titre impérial, utilisé dans LXX comme équivalent de l''hébreu tseva''oth, (Dieu) des Armées (Am 3.13 etc. ; cf. Rm 9.29n) et parfois de Shaddaï, Puissant (voir Gn 17.1n) ; voir nom.'
  - type: text
    content: C'est moi qui suis l'alpha et l'oméga, dit le Seigneur Dieu, celui qui est, qui était et qui vient, le Tout-Puissant.
  - type: heading
    content: Jean voit le Christ glorifié
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Moi, Jean v. 1+ ; cf. Dn 8.1. –  qui prends part… Ph 4.14. –  détresse 2.9s,22 ; 7.14 ; Mt 24.9n  ; Rm 5.3+ ; 2Co 1.4n  ; 1Th 3.3n. –  royauté  : le même mot est traduit par royaume au v. 6 ; cf. Mt 3.2n. –  persévérance ou endurance 2.2s (cf. 2.10) ; 3.10 ; 13.10 ; 14.12 ; Rm 2.7n  ; 2Th 1.4 ; 2Tm 2.12 ; Jc 1.3+. –  Patmos  : petite île de la mer Egée, à une centaine de kilomètres d''Ephèse. On comprend habituellement que Jean est détenu ou relégué dans cette île par le pouvoir romain à cause de son activité missionnaire ; de nombreux opposants (p. ex. des philosophes) ont été exilés sous le règne de Domitien (81-96) ; cf. 17.10n  ; dans cette hypothèse, Jean peut apparaître comme un personnage important, connu et redouté de l''administration romaine d''Asie Mineure. –  parole / témoignage v. 2+.'
  - type: text
    content: 'Moi, Jean, votre frère, qui prends part à la détresse, à la royauté et à la persévérance en Jésus, j''étais dans l''île appelée Patmos à cause de la parole de Dieu et du témoignage de Jésus '
