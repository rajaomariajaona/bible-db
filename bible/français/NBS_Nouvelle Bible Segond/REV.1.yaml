      - type: usfm
        marker: fq
        children:
        - type: text
          text: au jour du Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au jour seigneurial '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même adjectif en 1Co 11.20) ; cette expression qui n''apparaît qu''ici dans le N.T. pourrait, comme la formule plus couramment traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jour du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Ac 2.20 ; 1Co 1.8 ; 5.5 ; 2Co 1.14 ; Ph 1.6 etc.), s''appliquer au « jugement dernier » (cf. Ap 16.14 ; voir aussi Es 13.9 ; Jr 30.7 ; Os 1.5+ ; Jl 1.15 ; 2.11 ; 3.4 ; Am 5.18 ; Za 14.1 ; Ml 3.2,19). La plupart des spécialistes estiment cependant qu''elle a ici un sens liturgique : la vision aurait eu lieu au jour de la semaine où la majeure partie des chrétiens se rassemblent pour le culte. En grec post-biblique, le terme désigne le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dimanche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dimanche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'vient du latin '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dies dominicus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', « jour du Seigneur », de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dominus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '= « Seigneur » ; cf. Ac 20.7 ; 1Co 11.26 ; 16.2). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: derrière moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 20.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trompette '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.1 ; cf. Ex 19.16 ; Es 30.21 ; Ez 3.12 ; Mt 24.31 ; 1Co 15.52 ; 1Th 4.16.
      marker-yv: yv-n
    - type: text
      text: 'quand je fus saisi par l''Esprit, au jour du Seigneur ; j''entendis derrière moi une voix, forte comme le son d''une trompette, '
