document_id: EZK.46,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règles particulières pour le prince
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 12 ; 44.1s. –  six jours de travail Ex 20.9s. –  sabbat Nb 28.9s. –  nouvelle lune v. 3+ ; 45.17 ; Nb 10.10 ; cf. 1S 20.5,24.
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : La porte de la cour intérieure, celle qui donne sur l''est, restera fermée les six jours de travail, mais elle sera ouverte le jour du sabbat ; elle sera aussi ouverte le jour de la nouvelle lune. '
  '10':
  - type: note
    content: 'sortira  : dans la plupart des mss hébreux le verbe est au pluriel, qui peut se traduire on sortira comme au v. 9 ; plusieurs mss et versions anciennes ont le singulier.'
  - type: text
    content: Le prince entrera au milieu d'eux quand ils entreront et sortira quand ils sortiront.
  - type: heading
    content: Règles pour les divers sacrifices
  '11':
  - type: text
    content: ' '
  - type: note
    content: V. 5n.
  - type: text
    content: 'Aux fêtes, aux rencontres festives, l''offrande végétale sera d''un épha pour le taureau, d''un épha pour le bélier et de ce qu''il pourra pour les agneaux, avec un hîn d''huile par épha. '
  '12':
  - type: note
    content: '44.2s ; cf. 46.2+. –  volontaire Lv 7.16+. –  on lui ouvrira / on fermera  : autre traduction il ouvrira / il fermera.'
  - type: text
    content: 'Si le prince offre au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un holocauste volontaire ou un sacrifice volontaire de paix, on lui ouvrira la porte qui donne sur l''est ; il offrira son holocauste et son sacrifice de paix comme il le fait le jour du sabbat ; puis il sortira, et on fermera la porte après qu''il sera sorti.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ex 29.38-42 ; Nb 28.3-8 ; Dn 8.11+.
  - type: text
    content: 'Tu offriras chaque jour en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ' un agneau d''un an sans défaut ; tu l''offriras tous les matins. '
  '14':
  - type: note
    content: 'pour l''ajouter à  : le verbe hébreu correspondant n''apparaît qu''ici ; autres traductions pour en imbiber la farine ; pour pétrir la farine (d''après LXX).'
  - type: text
    content: 'Tu y joindras tous les matins, en offrande végétale, un sixième d''épha et le tiers d''un hîn d''huile pour l''ajouter à la farine. C''est l''offrande végétale pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ce sont là des prescriptions perpétuelles, valables constamment. '
  '15':
  - type: text
    content: Tous les matins on offrira l'agneau, l'offrande végétale et l'huile en holocauste constant.
  - type: heading
    content: L'héritage des fils du prince
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'à l''un de ses fils  : litt. à un homme parmi ses fils . –  pour les fils de celui-ci  : litt. pour ses fils.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Si le prince fait un cadeau à l''un de ses fils, cela constituera pour les fils de celui-ci un patrimoine ; ce sera leur propriété héréditaire. '
  '17':
  - type: note
    content: 'sujets  : litt. serviteurs. –  l''année de la libération  : cf. Lv 25.2-7,10ss. –  il reviendra au prince  : litt. il cessera pour le prince  ; certains modifient le texte hébreu traditionnel pour lire un verbe plus couramment traduit par revenir. –  seulement à ses fils  : cf. Jn 8.35.'
  - type: text
    content: 'Mais s''il fait à l''un de ses sujets un don pris sur son patrimoine, ce don lui appartiendra jusqu''à l''année de la libération, puis il reviendra au prince ; ainsi son patrimoine appartiendra seulement à ses fils. '
  '18':
  - type: note
    content: '45.7-9n. –  dépouillera  : le même verbe est habituellement traduit par exploiter (18.7,12,16 ; 22.7,29 ; 45.8 ; Ex 22.20+).'
  - type: text
    content: Le prince ne prendra rien du patrimoine du peuple, il ne le dépouillera pas de ses propriétés ; le patrimoine qu'il donnera à ses fils, il le prendra de sa propriété, afin que mon peuple ne soit pas dispersé, chacun loin de sa propriété.
  - type: heading
    content: Les cuisines du temple
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Il me conduisit  : cf. 40.1ss ; 44.1,4. –  dans les salles sacrées… prêtres  : la traduction s''inspire de versions anciennes ; litt. vers les salles, le (lieu) saint, vers les prêtres  ; cf. 42.1-14.'
  - type: text
    content: 'Il me conduisit par l''accès qui était sur le côté de la porte, dans les salles sacrées destinées aux prêtres, celles qui donnent sur le nord. Il y avait un emplacement dans le fond, à l''ouest. '
  '2':
  - type: note
    content: 'Le prince entrera…  : cf. 44.3. –  par le vestibule  : litt. par le chemin du vestibule. –  Les prêtres offriront…  : cf. 45.22-25 ; 2S 6.17s ; 1R 8.22. –  seuil  : autre terme hébreu qu''en 40.6 ; 41.16 etc. ; de même en 47.1.'
  - type: text
    content: 'Le prince entrera par le vestibule de la porte extérieure et s''arrêtera près des montants de la porte. Les prêtres offriront son holocauste et ses sacrifices de paix ; il se prosternera sur le seuil de la porte, puis il sortira, et la porte ne sera pas fermée avant le soir. '
  '20':
  - type: note
    content: feront cuire (cf. Ex 23.19 ; 29.31 etc.) ou feront bouillir (cf. Ex 12.9 ; 16.23), de même au v. 24 ; c'est un autre verbe qui est traduit par feront cuire dans la suite du v. 20 ; cf. 1S 2.12-16. –  réparation / péché 40.39+. –  consacrer 44.19n.
  - type: text
    content: 'Il me dit : C''est le lieu où les prêtres feront cuire les sacrifices de réparation et les sacrifices pour le péché, et où ils feront cuire les offrandes végétales, pour éviter de les porter dans la cour extérieure et de consacrer le peuple. '
  '21':
  - type: note
    content: 'une cour à chacun…  : litt. une cour à l''angle de la cour, une cour à l''angle de la cour.'
  - type: text
    content: 'Il me fit sortir dans la cour extérieure et me fit passer vers les quatre coins de la cour. Il y avait une cour à chacun des coins de la cour. '
  '22':
  - type: note
    content: 'voûtées  : traduction conjecturale ; LXX petites. –  quarante coudées ≈ 21 m ; voir mesures, poids et monnaies. –  dans les coins  : le terme correspondant est signalé dans les mss hébreux comme devant être omis à la lecture (cf. 41.20n).'
  - type: text
    content: 'Aux quatre coins de la cour, il y avait des cours voûtées, longues de quarante coudées et larges de trente ; toutes les quatre avaient la même mesure, dans les coins. '
  '23':
  - type: note
    content: 'Un enclos  : le même mot est traduit par rangées en 1R 6.36 ; 7.12.'
  - type: text
    content: 'Un enclos les entourait toutes les quatre, et des cuisines étaient aménagées, adossées à l''enclos tout autour. '
  '24':
  - type: note
    content: 'les locaux (litt. la maison) des cuisiniers (autre forme du verbe traduit plus loin par font cuire, cf. v. 20n) ; un terme apparenté est traduit par cuisines au v. 23. –  les officiants de la Maison  : cf. 44.11n  ; 45.5'
  - type: text
    content: 'Il me dit : Ce sont les locaux des cuisiniers, où les officiants de la Maison font cuire la viande des sacrifices du peuple.'
  '3':
  - type: note
    content: Le peuple du pays… v. 9n. –  sabbat / nouvelles lunes v. 1 ; Es 66.23.
  - type: text
    content: 'Le peuple du pays se prosternera devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à l''entrée de cette porte, aux jours de sabbat et aux nouvelles lunes.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lv 23.18. –  sans défaut 43.22+.
  - type: text
    content: 'L''holocauste que le prince présentera au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le jour du sabbat, sera de six agneaux sans défaut et d''un bélier sans défaut ; '
  '5':
  - type: note
    content: '45.24+. –  ce qu''il pourra  : litt. le don de sa main, de même au v. 11 ; voir aussi v. 7n.'
  - type: text
    content: 'et son offrande végétale d''un épha pour le bélier, et de ce qu''il pourra pour les agneaux, avec un hîn d''huile par épha. '
  '6':
  - type: note
    content: Cf. Nb 28.11-15.
  - type: text
    content: 'Le jour de la nouvelle lune, il offrira un taureau sans défaut, six agneaux et un bélier qui seront sans défaut ; '
  '7':
  - type: note
    content: 'ce que ses ressources lui permettront  : même formule (apparentée à celle des v. 5 et 11) en Lv 5.11n.'
  - type: text
    content: il fera une offrande végétale d'un épha pour le taureau, d'un épha pour le bélier et de ce que ses ressources lui permettront pour les agneaux, avec un hîn d'huile par épha.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'V. 2. –  par le vestibule  : cf. v. 2n. –  par le même chemin  : litt. par son chemin , expression analogue en 44.3.'
  - type: text
    content: 'Lorsque le prince entrera, il entrera par le vestibule de la porte et il sortira par le même chemin. '
  '9':
  - type: note
    content: 'devant le Seigneur Ex 23.14-17 ; Dt 16.16. –  par la porte  : litt. par le chemin de la porte, expression revenant à cinq reprises dans ce verset ; cf. v. 2,8. – La porte nord et la porte sud sont sans doute celles de la cour extérieure (40.20-27), à ne pas confondre avec les portes de la cour intérieure (40.28-37), où le peuple n''entre pas (46.1-3).'
  - type: text
    content: 'Lorsque le peuple du pays viendra devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', aux rencontres festives, celui qui entrera par la porte nord pour se prosterner sortira par la porte sud, et celui qui entrera par la porte sud sortira par la porte nord. On ne s''en retournera pas par la porte qu''on a passée en entrant, mais on sortira par la porte opposée. '
