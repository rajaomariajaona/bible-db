    marker-yv: yv-n
  - type: text
    text: 'Il me dit : C''est le lieu où les prêtres feront cuire les sacrifices de réparation et les sacrifices pour le péché, et où ils feront cuire les offrandes végétales, pour éviter de les porter dans la cour extérieure et de consacrer le peuple. '
