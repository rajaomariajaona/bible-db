document_id: EZK.46
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règles particulières pour le prince
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 12 ; 44.1s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'six jours de travail '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 20.9s. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sabbat
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 28.9s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nouvelle lune '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 3+ ; 45.17 ; Nb 10.10 ; cf. 1S 20.5,24.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : La porte de la cour intérieure, celle qui donne sur l''est, restera fermée les six jours de travail, mais elle sera ouverte le jour du sabbat ; elle sera aussi ouverte le jour de la nouvelle lune. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le prince entrera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 44.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par le vestibule
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par le chemin du vestibule
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ' offriront…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 45.22-25 ; 2S 6.17s ; 1R 8.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: seuil
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre terme hébreu qu''en 40.6 ; 41.16 etc. ; de même en 47.1.'
    marker-yv: yv-n
  - type: text
    text: 'Le prince entrera par le vestibule de la porte extérieure et s''arrêtera près des montants de la porte. Les prêtres offriront son holocauste et ses sacrifices de paix ; il se prosternera sur le seuil de la porte, puis il sortira, et la porte ne sera pas fermée avant le soir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le peuple du pays… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sabbat '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nouvelles lunes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1 ; Es 66.23.
    marker-yv: yv-n
  - type: text
    text: 'Le peuple du pays se prosternera devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à l''entrée de cette porte, aux jours de sabbat et aux nouvelles lunes.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lv 23.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sans défaut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 43.22+.
    marker-yv: yv-n
  - type: text
    text: 'L''holocauste que le prince présentera au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le jour du sabbat, sera de six agneaux sans défaut et d''un bélier sans défaut ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '45.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qu'il pourra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le don de sa main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 11 ; voir aussi v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et son offrande végétale d''un épha pour le bélier, et de ce qu''il pourra pour les agneaux, avec un hîn d''huile par épha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Nb 28.11-15.
    marker-yv: yv-n
  - type: text
    text: 'Le jour de la nouvelle lune, il offrira un taureau sans défaut, six agneaux et un bélier qui seront sans défaut ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce que ses ressources lui permettront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même formule (apparentée à celle des v. 5 et 11) en Lv 5.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: il fera une offrande végétale d'un épha pour le taureau, d'un épha pour le bélier et de ce que ses ressources lui permettront pour les agneaux, avec un hîn d'huile par épha.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par le vestibule
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par le même chemin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par son chemin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', expression analogue en 44.3.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le prince entrera, il entrera par le vestibule de la porte et il sortira par le même chemin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'devant le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ex 23.14-17 ; Dt 16.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par la porte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par le chemin de la porte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', expression revenant à cinq reprises dans ce verset ; cf. v. 2,8. – La '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'porte nord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'porte sud '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont sans doute celles de la cour extérieure (40.20-27), à ne pas confondre avec les portes de la cour intérieure (40.28-37), où le peuple n'entre pas (46.1-3).
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le peuple du pays viendra devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', aux rencontres festives, celui qui entrera par la porte nord pour se prosterner sortira par la porte sud, et celui qui entrera par la porte sud sortira par la porte nord. On ne s''en retournera pas par la porte qu''on a passée en entrant, mais on sortira par la porte opposée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sortira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans la plupart des mss hébreux le verbe est au pluriel, qui peut se traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on sortira '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: comme au v. 9 ; plusieurs mss et versions anciennes ont le singulier.
    marker-yv: yv-n
  - type: text
    text: Le prince entrera au milieu d'eux quand ils entreront et sortira quand ils sortiront.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Règles pour les divers sacrifices
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Aux fêtes, aux rencontres festives, l''offrande végétale sera d''un épha pour le taureau, d''un épha pour le bélier et de ce qu''il pourra pour les agneaux, avec un hîn d''huile par épha. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '44.2s ; cf. 46.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'volontaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 7.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on lui ouvrira '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on fermera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ouvrira / il fermera.
    marker-yv: yv-n
  - type: text
    text: 'Si le prince offre au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' un holocauste volontaire ou un sacrifice volontaire de paix, on lui ouvrira la porte qui donne sur l''est ; il offrira son holocauste et son sacrifice de paix comme il le fait le jour du sabbat ; puis il sortira, et on fermera la porte après qu''il sera sorti.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 29.38-42 ; Nb 28.3-8 ; Dn 8.11+.
    marker-yv: yv-n
  - type: text
    text: 'Tu offriras chaque jour en holocauste au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' un agneau d''un an sans défaut ; tu l''offriras tous les matins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour l'ajouter à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu correspondant n''apparaît qu''ici ; autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour en imbiber la farine ; pour pétrir la farine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Tu y joindras tous les matins, en offrande végétale, un sixième d''épha et le tiers d''un hîn d''huile pour l''ajouter à la farine. C''est l''offrande végétale pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ce sont là des prescriptions perpétuelles, valables constamment. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: Tous les matins on offrira l'agneau, l'offrande végétale et l'huile en holocauste constant.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'héritage des fils du prince
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à l'un de ses fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à un homme parmi ses fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour les fils de celui-ci
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour ses fils.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le Seigneur '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Dieu
  - type: text
    text: '  : Si le prince fait un cadeau à l''un de ses fils, cela constituera pour les fils de celui-ci un patrimoine ; ce sera leur propriété héréditaire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sujets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'année de la libération
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 25.2-7,10ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il reviendra au prince
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il cessera pour le prince
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains modifient le texte hébreu traditionnel pour lire un verbe plus couramment traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: revenir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: seulement à ses fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 8.35.'
    marker-yv: yv-n
  - type: text
    text: 'Mais s''il fait à l''un de ses sujets un don pris sur son patrimoine, ce don lui appartiendra jusqu''à l''année de la libération, puis il reviendra au prince ; ainsi son patrimoine appartiendra seulement à ses fils. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '46.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 45.7-9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dépouillera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'exploiter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (18.7,12,16 ; 22.7,29 ; 45.8 ; Ex 22.20+).
    marker-yv: yv-n
  - type: text
    text: Le prince ne prendra rien du patrimoine du peuple, il ne le dépouillera pas de ses propriétés ; le patrimoine qu'il donnera à ses fils, il le prendra de sa propriété, afin que mon peuple ne soit pas dispersé, chacun loin de sa propriété.
