        text: une cour à l'angle de la cour, une cour à l'angle de la cour.
    marker-yv: yv-n
  - type: text
    text: 'Il me fit sortir dans la cour extérieure et me fit passer vers les quatre coins de la cour. Il y avait une cour à chacun des coins de la cour. '
