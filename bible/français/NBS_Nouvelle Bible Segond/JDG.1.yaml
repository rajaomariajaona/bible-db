      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je lui ai livré…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 2.24+.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' répondit : C''est Juda qui ira ; je lui ai livré le pays. '
  - type: usfm
