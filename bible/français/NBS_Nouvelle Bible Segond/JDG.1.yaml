document_id: JDG.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël s'installe en Canaan
  - type: text
    content: ' '
  - type: note
    content: 'mort de Josué 2.8-10 ; Jos 24.29-31 ; cf. v. 1. –  interrogèrent…  : cf. 18.5 ; 20.18,23,27s ; 1S 7.5-12 ; 14.37 ; 23.2,4,9-12 ; 30.7s ; 2S 2.1 ; 5.19,23s ; 1R 22.6-8,15ss ; 2R 8.8 ; 22.13 ; Es 30.2 ; Ez 20.1,3,31. –  ira  : litt. montera , cf. v. 3n,4n  ; 2.1 ; 20.18. –  aux Cananéens  : litt. au Cananéen , de même dans la suite.'
  - type: text
    content: 'Après la mort de Josué, les Israélites interrogèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Qui de nous ira le premier faire la guerre aux Cananéens ? '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Hébron  : cf. v. 20 ; Gn 13.18n  ; Jos 10.36s ; 14.13-15 ; 15.13. –  Shéshaï… Nb 13.22 ; Jos 15.14.'
  - type: text
    content: 'Juda marcha contre les Cananéens qui habitaient à Hébron (l''ancien nom d''Hébron était Qiriath-Arba) ; ils battirent Shéshaï, Ahimân et Talmaï. '
  '11':
  - type: note
    content: Jos 10.38s ; 11.21s ; voir 15.15-19n.
  - type: text
    content: 'De là il marcha contre les habitants de Debir (l''ancien nom de Debir était Qiriath-Sépher). '
  '12':
  - type: text
    content: 'Caleb dit : Je donnerai ma fille Aksa pour femme à celui qui battra Qiriath-Sépher et la prendra. '
  '13':
  - type: note
    content: Otniel 3.9s ; Jos 14.6n,14 ; 15.17.
  - type: text
    content: 'Otniel, fils de Qenaz, frère cadet de Caleb, la prit ; Caleb lui donna pour femme sa fille Aksa. '
  '14':
  - type: note
    content: 'elle l''incita…  : c.-à-d. elle incita Otniel à demander un champ (litt. le champ) à son père (son père à elle, c.-à-d. Caleb) ; des versions anciennes semblent avoir compris il (Otniel) incita Aksa à demander un champ à son père. –  Elle sauta de son âne (litt. de dessus l''âne) : traduction incertaine d''un verbe qui n''apparaît qu''ici (et dans le parallèle de Jos 15.18) et en Jg 4.21n  ; d''après un rapprochement avec l''arabe, on a aussi compris  : elle battit des mains sur l''âne (ou en descendant de l''âne) ; LXX elle se mit à maugréer sur l''âne et cria depuis l''âne…'
  - type: text
    content: 'A son arrivée, elle l''incita à demander un champ à son père. Elle sauta de son âne, et Caleb lui dit : Qu''est-ce que tu as ? '
  '15':
  - type: note
    content: une faveur ou un présent  ; le terme est souvent traduit par bénédiction.
  - type: text
    content: 'Elle lui répondit : Accorde-moi une faveur, car tu m''as donné une terre du sud ; donne-moi aussi des réservoirs d''eau. Alors Caleb lui donna les réservoirs d''en haut et les réservoirs d''en bas.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'du Caïnite (ou Qénite ) , beau-père de Moïse  : cf. 4.11 ; Nb 10.29-32 ; 24.21s ; voir aussi Ex 2.16-22. –  la Ville des Palmiers  : ou bien Jéricho (3.13 ; Dt 34.3 ; 2Ch 28.15), ou bien Tamar (= Palmier ), au sud de la mer Morte. –  Arad  : au sud d''Hébron Nb 21.1 ; 33.40 ; Jos 12.14. –  avec le peuple  : d''après certains témoins anciens du texte, quelques-uns modifient le texte hébreu traditionnel pour lire avec le peuple d''Amalec  ; cf. 1S 15.6.'
  - type: text
    content: Les fils du Caïnite, beau-père de Moïse, montèrent de la Ville des Palmiers, avec les fils de Juda, dans le désert de Juda, au sud d'Arad, et ils allèrent s'installer avec le peuple.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Nb 21.3 ; Jos 12.14 ; le nom Horma rappelle le verbe hébreu traduit par frappèrent d''anathème  : cf. Jg 21.11 ; voir Dt 2.34n.'
  - type: text
    content: 'Juda partit avec Siméon, son frère, et ils battirent les Cananéens qui habitaient Tsephath ; ils la frappèrent d''anathème, et on appela la ville du nom de Horma (« Anathème »). '
  '18':
  - type: note
    content: 'Juda prit encore  : LXX (Mais) Juda ne prit pas…  ; cf. v. 19 ; 3.3 ; Jos 13.3 ; 1S 6.17 ; Jr 25.20 ; Am 1.6-8.'
  - type: text
    content: 'Juda prit encore Gaza avec son territoire, Ashqelôn avec son territoire, et Eqrôn avec son territoire. '
  '19':
  - type: note
    content: 'prit possession de  : c''est le même verbe hébreu qui est rendu par déposséder, de même dans la suite ; cf. Jos 17.16n  ; 1R 20.23ss. –  chars de fer 4.3,13 ; Jos 17.18.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut avec Juda, et celui-ci prit possession de la montagne ; mais il ne put déposséder les habitants de la vallée, parce qu''ils avaient des chars de fer.'
  '2':
  - type: note
    content: 'Juda 20.18. –  je lui ai livré…  : cf. Jos 2.24+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit : C''est Juda qui ira ; je lui ai livré le pays. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'V. 10+ ; cf. Nb 14.24 ; Jos 11.21 ; 14.12. –  Anaqites  : litt. fils de l''Anaq.'
  - type: text
    content: On donna Hébron à Caleb, comme l'avait dit Moïse ; il en déposséda les trois Anaqites.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 8 ; Jos 15.63 ; 18.28.
  - type: text
    content: Les fils de Benjamin ne dépossédèrent pas les Jébusites qui habitaient Jérusalem ; les Jébusites habitent à Jérusalem avec les fils de Benjamin jusqu'à ce jour.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'La maison de Joseph (= Ephraïm et Manassé, Gn 48) : cf. 2S 19.21 ; 1R 11.28. –  attaqua  : litt. monta (à) . –  Beth-El  : cf. Jos 16.2 ; 18.13,22.'
  - type: text
    content: 'La maison de Joseph, quant à elle, attaqua Beth-El ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec eux. '
  '23':
  - type: note
    content: Gn 28.19n.
  - type: text
    content: 'La maison de Joseph fit explorer Beth-El (l''ancien nom de la ville était Louz). '
  '24':
  - type: note
    content: Cf. Jos 2 ; 6.21-25.
  - type: text
    content: 'Les gardes virent un homme qui sortait de la ville et lui dirent : S''il te plaît, montre-nous par où entrer dans la ville, et nous agirons avec fidélité envers toi. '
  '25':
  - type: note
    content: tout son clan ou toute sa famille  ; cf. Gn 12.3n  ; Jos 6.23n.
  - type: text
    content: 'Il leur montra par où entrer dans la ville ; ils passèrent la ville au fil de l''épée, mais ils laissèrent partir cet homme et tout son clan. '
  '26':
  - type: note
    content: Hittites Gn 10.15n. –  Louz v. 23+.
  - type: text
    content: 'L''homme se rendit au pays des Hittites : il bâtit une ville et l''appela du nom de Louz ; c''est là son nom jusqu''à ce jour.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ne prit pas possession  : autre traduction ne déposséda pas (les habitants de) . –  des localités…  : litt. de ses filles , cf. Jos 15.45n. –  persistèrent à v. 35 ; le verbe correspondant est traduit par consentir à en 17.11 ; 19.6 ; cf. Jos 17.11s.'
  - type: text
    content: 'Manassé ne prit pas possession de Beth-Shéân et des localités qui en dépendent, de Taanak et des localités qui en dépendent, de Dor et des localités qui en dépendent, de Yibléam et des localités qui en dépendent, de Meguiddo et des localités qui en dépendent ; les Cananéens persistèrent à habiter dans ce pays. '
  '28':
  - type: note
    content: 'à la corvée  : autre traduction au tribut, même possibilité dans la suite ; Jos 17.13 ; cf. 2S 20.24 ; 1R 9.20-22.'
  - type: text
    content: Lorsque Israël fut assez fort, il soumit les Cananéens à la corvée, mais il ne put les déposséder.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Jos 16.10 ; sur Guézer , voir aussi Jos 10.33n  ; 1R 9.16.
  - type: text
    content: Ephraïm ne déposséda pas les Cananéens qui habitaient à Guézer ; les Cananéens habitèrent en son sein à Guézer.
  '3':
  - type: note
    content: 'Sur les territoires de Juda et de Siméon, voir Jos 14.1-5 ; 15 ; 19.1-9. –  Viens  : litt. monte, cf. v. 1n. –  le lot qui m''a / t''a été attribué  : litt. mon / ton lot  ; le même terme est traduit par sort en 20.9 ; Lv 16.8n.'
  - type: text
    content: 'Juda dit à Siméon, son frère : Viens avec moi dans le lot qui m''a été attribué, et nous ferons la guerre aux Cananéens ; moi aussi, j''irai avec toi dans le lot qui t''a été attribué. Siméon alla donc avec lui. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Jos 19.10-16 ; Qitrôn semble correspondre à Qattath et Nahalol à Nahalal en Jos 19.15.
  - type: text
    content: Zabulon ne déposséda pas les habitants de Qitrôn, ni les habitants de Nahalol ; les Cananéens habitèrent au sein de Zabulon, mais ils furent astreints à la corvée.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Jos 19.24-31 ; Akko est le port connu plus tard sous le nom de Ptolémaïs et de Saint-Jean d''Acre. –  Sidon Gn 10.19n. –  Aphiq  : cf. Jos 19.30n.'
  - type: text
    content: 'Aser ne déposséda pas les habitants d''Akko, ni les habitants de Sidon, ni ceux d''Ahlab, d''Akzib, de Helba, d''Aphiq et de Rehob ; '
  '32':
  - type: note
    content: 'Cf. v. 29s. –  s''installèrent et habitaient traduisent le même verbe hébreu. –  parmi  : la même formule (aussi au v. 33) est traduite par au sein de aux v. 29s.'
  - type: text
    content: 'les Asérites s''installèrent parmi les Cananéens qui habitaient le pays : ils ne les dépossédèrent pas.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Jos 19.32-39. –  Beth-Shémesh Jos 19.22.
  - type: text
    content: Nephtali ne déposséda pas les habitants de Beth-Shémesh, ni les habitants de Beth-Anath ; il s'installa parmi les Cananéens qui habitaient le pays, mais les habitants de Beth-Shémesh et de Beth-Anath furent astreints à la corvée.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17—18 ; Jos 19.47. –  Amorites Gn 10.16n  ; cf. Jg 1.19 ; 10.11 ; Nb 13.29 ; Jos 5.1. –  repoussèrent  : le verbe correspondant est rendu par opprimer en 2.18 ; 10.12.'
  - type: text
    content: 'Les Amorites repoussèrent dans les montagnes les fils de Dan et ne les laissèrent pas descendre dans la vallée. '
  '35':
  - type: note
    content: 'Har-Hérès (mont du Soleil), correspond peut-être à Ir-Shémesh (Ville du Soleil, synonymes en hébreu) en Jos 19.41. –  la maison de Joseph…  : litt. la main de la maison de Joseph s''alourdit  ; cf. 3.10n.'
  - type: text
    content: 'Les Amorites persistèrent à habiter à Har-Hérès, à Ayyalôn et à Shaalbim ; mais quand la maison de Joseph devint puissante, ils furent astreints à la corvée. '
  '36':
  - type: note
    content: Le territoire… ou, d'après certains mss de LXX, la frontière des Amorites (était constituée par celle) des Edomites… –  Aqrabbim (Scorpions) Nb 34.4n  ; Jos 15.3. –  Séla ou la Roche, ville édomite parfois identifiée à Pétra (même sens en grec), mais qui est plus probablement à situer à une cinquantaine de kilomètres au sud de Kérak ; 2R 14.7.
  - type: text
    content: Le territoire des Amorites était depuis la montée d'Aqrabbim, depuis Séla et au-dessus.
  '4':
  - type: note
    content: 'attaqua  : litt. monta, cf. v. 1n. –  Cananéens / Perizzites Gn 13.7 ; 34.30 ; Jos 17.15. –  Bézeq  : ce nom est en 1S 11.8 celui d''une localité située au nord de Sichem. –  dix mille 1S 18.7.'
  - type: text
    content: 'Juda attaqua, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur livra les Cananéens et les Perizzites ; ils les battirent à Bézeq : dix mille hommes. '
  '5':
  - type: note
    content: 'Adoni-Bézeq  : cf. Jos 10.1nss.'
  - type: text
    content: 'Ils trouvèrent Adoni-Bézeq à Bézeq et ils lui firent la guerre. Ainsi ils battirent les Cananéens et les Perizzites. '
  '6':
  - type: note
    content: 'lui coupèrent les pouces  : traduction traditionnelle mais incertaine ; s''il s''agit bien des pouces, la mutilation rendait inapte au maniement de certaines armes, notamment l''arc. S''il s''agit des extrémités (ainsi LXX), elle était beaucoup plus invalidante, empêchant de se tenir debout et de saisir quoi que ce soit (cf. v. 7).'
  - type: text
    content: 'Adoni-Bézeq prit la fuite ; mais ils le poursuivirent, l''attrapèrent et lui coupèrent les pouces des mains et des pieds. '
  '7':
  - type: note
    content: 'Soixante-dix  : cf. 8.30. –  à Jérusalem v. 8+.'
  - type: text
    content: 'Adoni-Bézeq dit : Soixante-dix rois, avec les pouces des mains et des pieds coupés, ramassaient les restes sous ma table ; Dieu me paie de retour selon ce que j''ai fait. On l''emmena à Jérusalem, et il y mourut.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 21 ; Jos 15.63 ; 2S 5.6-12 ; voir aussi Dt 13.16.
  - type: text
    content: 'Les fils de Juda firent la guerre à Jérusalem et la prirent ; ils la passèrent au fil de l''épée et mirent le feu à la ville. '
  '9':
  - type: note
    content: 'Cf. Dt 1.7 ; Jos 9.1s ; 10.40 ; 12.7s ; Jr 32.44 ; 33.13. –  descendirent  : Jérusalem (v. 8) est située à plus de 700 m au-dessus du niveau de la Méditerranée, mais c''est surtout un sommet symbolique : de tout le pays (y compris de la montagne, la région montagneuse centrale de Cisjordanie où elle se situe et qui la domine en partie) on y monte et on en descend (cf. 1S 1.3n). –  Bas-Pays  : hébreu shephéla.'
  - type: text
    content: Les fils de Juda descendirent ensuite pour faire la guerre aux Cananéens qui habitaient la montagne, le Néguev et le Bas-Pays.
  - type: heading
    content: Jos 15.13-19
