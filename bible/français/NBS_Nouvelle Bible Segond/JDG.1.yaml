        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le lot qui m''a '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: t'a été attribué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon / ton lot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 20.9 ; Lv 16.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Juda dit à Siméon, son frère : Viens avec moi dans le lot qui m''a été attribué, et nous ferons la guerre aux Cananéens ; moi aussi, j''irai avec toi dans le lot qui t''a été attribué. Siméon alla donc avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: attaqua
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: monta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cananéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Perizzites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 13.7 ; 34.30 ; Jos 17.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bézeq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce nom est en 1S 11.8 celui d''une localité située au nord de Sichem. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dix mille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 18.7.
    marker-yv: yv-n
  - type: text
    text: 'Juda attaqua, et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' leur livra les Cananéens et les Perizzites ; ils les battirent à Bézeq : dix mille hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Adoni-Bézeq
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 10.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss.
    marker-yv: yv-n
  - type: text
    text: 'Ils trouvèrent Adoni-Bézeq à Bézeq et ils lui firent la guerre. Ainsi ils battirent les Cananéens et les Perizzites. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui coupèrent les pouces
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction traditionnelle mais incertaine ; s''il s''agit bien des pouces, la mutilation rendait inapte au maniement de certaines armes, notamment l''arc. S''il s''agit des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'extrémités '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (ainsi LXX), elle était beaucoup plus invalidante, empêchant de se tenir debout et de saisir quoi que ce soit (cf. v. 7).
    marker-yv: yv-n
  - type: text
    text: 'Adoni-Bézeq prit la fuite ; mais ils le poursuivirent, l''attrapèrent et lui coupèrent les pouces des mains et des pieds. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Soixante-dix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à Jérusalem '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8+.
    marker-yv: yv-n
  - type: text
    text: 'Adoni-Bézeq dit : Soixante-dix rois, avec les pouces des mains et des pieds coupés, ramassaient les restes sous ma table ; Dieu me paie de retour selon ce que j''ai fait. On l''emmena à Jérusalem, et il y mourut.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 21 ; Jos 15.63 ; 2S 5.6-12 ; voir aussi Dt 13.16.
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Juda firent la guerre à Jérusalem et la prirent ; ils la passèrent au fil de l''épée et mirent le feu à la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Dt 1.7 ; Jos 9.1s ; 10.40 ; 12.7s ; Jr 32.44 ; 33.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: descendirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Jérusalem (v. 8) est située à plus de 700 m au-dessus du niveau de la Méditerranée, mais c''est surtout un sommet symbolique : de tout le pays (y compris de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: montagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', la région montagneuse centrale de Cisjordanie où elle se situe et qui la domine en partie) on y monte et on en descend (cf. 1S 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bas-Pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: shephéla.
    marker-yv: yv-n
  - type: text
    text: Les fils de Juda descendirent ensuite pour faire la guerre aux Cananéens qui habitaient la montagne, le Néguev et le Bas-Pays.
- type: usfm
  marker: r
  children:
  - type: text
    text: Jos 15.13-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
