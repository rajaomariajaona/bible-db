  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hébron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 20 ; Gn 13.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 10.36s ; 14.13-15 ; 15.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shéshaï… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 13.22 ; Jos 15.14.
    marker-yv: yv-n
  - type: text
    text: 'Juda marcha contre les Cananéens qui habitaient à Hébron (l''ancien nom d''Hébron était Qiriath-Arba) ; ils battirent Shéshaï, Ahimân et Talmaï. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jos 10.38s ; 11.21s ; voir 15.15-19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'De là il marcha contre les habitants de Debir (l''ancien nom de Debir était Qiriath-Sépher). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Caleb dit : Je donnerai ma fille Aksa pour femme à celui qui battra Qiriath-Sépher et la prendra. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Otniel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.9s ; Jos 14.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',14 ; 15.17.'
    marker-yv: yv-n
  - type: text
    text: 'Otniel, fils de Qenaz, frère cadet de Caleb, la prit ; Caleb lui donna pour femme sa fille Aksa. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle l'incita…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'elle incita Otniel à demander un champ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le champ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'à son père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son père à elle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. Caleb) ; des versions anciennes semblent avoir compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Otniel) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: incita Aksa à demander un champ à son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Elle sauta de son âne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de dessus l'âne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : traduction incertaine d''un verbe qui n''apparaît qu''ici (et dans le parallèle de Jos 15.18) et en Jg 4.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; d''après un rapprochement avec l''arabe, on a aussi compris'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'elle battit des mains sur l''âne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en descendant de l'âne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle se mit à maugréer sur l'âne et cria depuis l'âne…
    marker-yv: yv-n
  - type: text
    text: 'A son arrivée, elle l''incita à demander un champ à son père. Elle sauta de son âne, et Caleb lui dit : Qu''est-ce que tu as ? '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une faveur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un présent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme est souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
