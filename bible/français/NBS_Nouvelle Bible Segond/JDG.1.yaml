  - type: text
    text: 'Après la mort de Josué, les Israélites interrogèrent le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Qui de nous ira le premier faire la guerre aux Cananéens ? '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
