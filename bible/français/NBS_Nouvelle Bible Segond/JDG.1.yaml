      children:
      - type: text
        text: 'Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Siméon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir Jos 14.1-5 ; 15 ; 19.1-9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Viens
    - type: usfm
      marker: ft
      children:
      - type: text
