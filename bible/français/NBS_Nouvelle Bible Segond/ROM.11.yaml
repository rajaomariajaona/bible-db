document_id: ROM.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu n'a pas rejeté son peuple
  - type: text
    content: ' '
  - type: note
    content: 2Co 11.22 ; Ph 3.5-7.
  - type: text
    content: 'Je demande donc : Dieu a-t-il rejeté son peuple ? Jamais de la vie ! Car je suis moi-même Israélite, de la descendance d''Abraham, de la tribu de Benjamin. '
  '10':
  - type: text
    content: ' '
  - type: text
    content: Que leurs yeux soient obscurcis, pour qu'ils ne voient rien !
  - type: text
    content: Fais-leur toujours courber le dos !
  - type: heading
    content: Juifs et non-Juifs dans le projet de Dieu
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'trébuché Jc 2.10n. –  tout à fait  : sous-entendu dans le texte. –  leur faute ou leur faux pas , même terme 4.25 ; 5.15ss ; de même dans la suite ; voir péché. –  aux non-Juifs ou aux nations , v. 12. –  provoquer leur jalousie 10.19+ ; cf. Ac 13.45 ; 17.5.'
  - type: text
    content: 'Je demande donc : ont-ils trébuché pour tomber tout à fait ? Jamais de la vie ! Mais, du fait de leur faute, le salut a été donné aux non-Juifs, afin de provoquer leur jalousie. '
  '12':
  - type: note
    content: 'faute v. 11n. –  défaite  : autres traductions déchéance, perte, diminution (même terme en 1Co 6.7). –  richesse des non-Juifs ou des nations  : cf. Mt 8.11s ; 21.43. –  leur complet relèvement  : litt. leur plénitude  ; le même mot est traduit par totalité au v. 25 et peut être compris ici dans un sens analogue (quand ils seront au complet) ; cf. Es 2.2s ; Za 8.22s.'
  - type: text
    content: Or si leur faute a fait la richesse du monde, et leur défaite la richesse des non-Juifs, à combien plus forte raison en sera-t-il ainsi de leur complet relèvement !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'apôtre des non-Juifs  : autre traduction envoyé aux non-Juifs , cf. 1.1n,5. – Voir gloire .'
  - type: text
    content: 'Je vous le dis, à vous, les non-Juifs : pour autant que je suis l''apôtre des non-Juifs, moi, je glorifie mon ministère, '
  '14':
  - type: note
    content: 'jalousie v. 11. –  de ma propre chair  : cf. 9.3. –  sauver quelques-uns 1Co 9.22 ; 1Tm 4.16.'
  - type: text
    content: 'afin, si possible, de provoquer de la jalousie parmi les gens de ma propre chair et d''en sauver quelques-uns. '
  '15':
  - type: note
    content: réconciliation du monde 2Co 5.17-21. –  une vie d'entre les morts Jn 5.25 ; cf. Ez 37.
  - type: text
    content: 'Car si leur mise à l''écart a été la réconciliation du monde, que sera leur réintégration, sinon une vie d''entre les morts ? '
  '16':
  - type: note
    content: 'prémices 8.23 ; Nb 15.17-21 ; cf. Lv 2.2s. –  saintes  : cf. 1Co 7.14. –  toute la pâte (litt. la pâte) 9.21.'
  - type: text
    content: Or si les prémices sont saintes, toute la pâte l'est aussi ; et si la racine est sainte, les branches le sont aussi.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ep 2.11-22. –  à la racine, à la sève  : litt. de la racine de l''huile (ou de la richesse ) ; cf. Jg 9.9.'
  - type: text
    content: 'Mais si quelques-unes des branches ont été retranchées, et si toi, olivier sauvage, tu as été greffé parmi eux, si tu as eu part à la racine, à la sève de l''olivier, '
  '18':
  - type: note
    content: '2.17n  ; cf. Jn 4.22. –  n''oublie pas que  : sous-entendu dans le texte.'
  - type: text
    content: 'ne fais pas le fier aux dépens des branches. Si tu fais le fier, n''oublie pas que ce n''est pas toi qui portes la racine, mais que c''est la racine qui te porte. '
  '19':
  - type: text
    content: 'Tu diras donc : des branches ont été retranchées pour que, moi, je sois greffé. '
  '2':
  - type: note
    content: 'Dieu n''a pas rejeté… 1S 12.22  ; Jr 31.37 ; Ps 94.14. –  connu d''avance 8.29n. –  dans le passage où…  : litt. en Elie, comment il en appelle à Dieu contre Israël (cf. Hé 4.7n).'
  - type: text
    content: Dieu n'a pas rejeté son peuple,
  - type: text
    content: ' ce peuple qu''il a connu d''avance. Ne savez-vous pas ce que dit l''Ecriture dans le passage où Elie adresse à Dieu cette plainte contre Israël : '
  '20':
  - type: note
    content: 'tu tiens  : autres traductions tu es debout, tu tiens ferme  ; cf. 5.2n  ; 14.4n  ; 1Co 10.12 ; 15.1 ; 16.13 ; 2Co 1.24 ; 1Th 3.8 ; voir aussi Es 7.9n  ; Rm 4.2. –  N''en tire pas orgueil  : formule presque identique en grec en 12.16n. –  crainte Ph 2.12.'
  - type: text
    content: 'Fort bien ; elles ont été retranchées du fait de leur manque de foi, et toi, c''est par la foi que tu tiens. N''en tire pas orgueil, aie plutôt de la crainte ; '
  '21':
  - type: note
    content: 'prends garde…  : certains mss portent il ne t''épargnera pas non plus.'
  - type: text
    content: 'car si Dieu n''a pas épargné les branches naturelles, prends garde qu''il ne t''épargne pas non plus. '
  '22':
  - type: note
    content: 'retranché  : même terme au v. 24 ; cf. Jn 15.2,4 ; Hé 3.14.'
  - type: text
    content: 'Considère donc la bonté et la sévérité de Dieu : sévérité envers ceux qui sont tombés, et bonté de Dieu envers toi, si tu demeures dans cette bonté ; autrement, toi aussi tu seras retranché. '
  '23':
  - type: note
    content: dans leur manque de foi ou sans foi, litt. dans la non-foi, comme au v. 20.
  - type: text
    content: 'Eux, de même, s''ils ne demeurent pas dans leur manque de foi, ils seront greffés ; car Dieu a le pouvoir de les greffer à nouveau. '
  '24':
  - type: text
    content: En effet, si toi tu as été retranché de l'olivier naturellement sauvage et, contrairement à la nature, greffé sur l'olivier franc, à plus forte raison eux seront-ils greffés selon leur nature sur leur propre olivier.
  - type: heading
    content: Le salut d'Israël
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'que vous ignoriez 1.13+. –  mystère 16.25+ ; Col 1.25-28. –  avisés 12.16 ; cf. Mt 7.24n. –  devenu obtus v. 7n  ; 2Co 3.14 ; voir cœur. –  en partie  : même expression grecque 15.15 ( à certains égards ), 24. –  totalité ou plénitude v. 12n  ; cf. 15.19 ; Lc 21.24 ; Jn 10.16 ; 2Th 2.3s ; Ap 6.11n  ; cf. Testament de Zabulon 9.8s : « Il convertira toutes les nations pour qu''elles le servent avec zèle (…) et vous serez rejetés par lui, jusqu''au moment de la consommation. » Voir non-Juifs.'
  - type: text
    content: 'Car je ne veux pas, mes frères, que vous ignoriez ce mystère, afin que vous ne vous croyiez pas trop avisés : Israël est devenu obtus, en partie, jusqu''à ce que la totalité des non-Juifs soit entrée. '
  '26':
  - type: note
    content: 'tout Israël  : cf. v. 5,25. –  Le libérateur… Es 59.20s  ; Ps 14.7.'
  - type: text
    content: 'Et c''est ainsi que tout Israël sera sauvé, comme il est écrit :'
  - type: text
    content: Le libérateur viendra de Sion,
  - type: text
    content: il détournera de Jacob les impiétés ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: Es 27.9  ; Jr 31.33s. – Voir alliance et péchés.
  - type: text
    content: et telle sera mon alliance avec eux,
  - type: text
    content: lorsque j'ôterai leurs péchés
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'à cause de vous  : on peut comprendre ici en votre faveur . –  du choix de Dieu  : litt. du choix ou de l''élection (v. 5,7). –  de leurs pères  : litt. des pères  ; cf. 9.11,25 ; 15.8 ; Dt 4.37 ; 9.5.'
  - type: text
    content: 'Du point de vue de la bonne nouvelle, certes, ils sont ennemis, à cause de vous, mais du point de vue du choix de Dieu, ils sont aimés à cause de leurs pères. '
  '29':
  - type: note
    content: 'Voir grâce. –  irrévocables  : litt. sans regret  ; le même terme revient en 2Co 7.10 (que l''on ne regrette pas) ; cf. Nb 23.19 ; Ps 110.4 ; Hé 7.21.'
  - type: text
    content: 'Car les dons de la grâce et l''appel de Dieu sont irrévocables. '
  '3':
  - type: note
    content: '1R 19.10,14. – Voir prophètes. –  ils en veulent à ma vie  : sur cette expression, voir Mt 2.20n.'
  - type: text
    content: 'Seigneur, '
  - type: text
    content: ils ont tué tes prophètes, ils ont démoli tes autels ; je suis resté, moi seul, et ils en veulent à ma vie
  - type: text
    content: '. '
  '30':
  - type: note
    content: refusé d'obéir 2.8n  ; cf. 10.21. –  compassion 9.15ss ; 15.9.
  - type: text
    content: 'En effet, tout comme vous, autrefois, vous avez refusé d''obéir à Dieu et maintenant, pourtant, vous avez obtenu compassion, du fait de leur refus d''obéir, '
  '31':
  - type: note
    content: 'du fait de la compassion…  : d''autres rattachent cette précision à la suite du v. et traduisent pour qu''eux aussi puissent obtenir compassion du fait de la compassion dont vous êtes l''objet ou pour qu''eux aussi puissent obtenir compassion, la même compassion que celle dont vous êtes l''objet. – Le deuxième maintenant est absent de certains mss ; quelques-uns l''ont remplacé par plus tard.'
  - type: text
    content: 'de même eux aussi, maintenant, ont refusé d''obéir, du fait de la compassion dont vous bénéficiez, pour qu''eux aussi puissent maintenant obtenir compassion. '
  '32':
  - type: note
    content: 'Ga 3.22 ; 1Tm 2.4. –  leur refus d''obéir  : litt. le refus d''obéir, 2.8n.'
  - type: text
    content: Car Dieu a enfermé tous les humains dans leur refus d'obéir, pour avoir compassion de tous.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'profondeur 1Co 2.10. –  richesse 9.23+. –  sagesse 1Co 1.21 ; 2.7 ; Ep 3.10 ; Col 2.3. –  connaissance Ps 139.6,17s ; Ep 3.5. –  jugements  : cf. Sagesse 17.1 : « Tes jugements sont grands et difficiles à comprendre. » –  insondables Ps 77.20 ; Jb 5.9 ; 9.10 ; Ep 3.8.'
  - type: text
    content: O profondeur de la richesse,
  - type: text
    content: de la sagesse et de la connaissance de Dieu !
  - type: text
    content: Que ses jugements sont insondables
  - type: text
    content: et ses voies incompréhensibles !
  '34':
  - type: text
    content: ' '
  - type: note
    content: Es 40.13  ; Jr 23.18 ; Jb 15.8 ; 1Co 2.11,16.
  - type: text
    content: 'En effet, '
  - type: text
    content: qui a connu la pensée du Seigneur ?
  - type: text
    content: Qui a été son conseiller ?
  '35':
  - type: text
    content: ' '
  - type: note
    content: Jb 41.3.
  - type: text
    content: Qui lui a donné le premier,
  - type: text
    content: pour devoir être payé de retour ?
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Tout… 1Co 8.6n  ; Col 1.16s ; Hé 2.10. –  A lui la gloire 16.27+. –  pour toujours  : litt. pour les temps ou pour les âges (traduction traditionnelle « siècles »), cf. 12.2n.'
  - type: text
    content: Tout est de lui, par lui et pour lui.
  - type: text
    content: 'A lui la gloire pour toujours ! '
  - type: text
    content: Amen !
  '4':
  - type: note
    content: 1R 19.18  ; voir Baal.
  - type: text
    content: 'Mais quelle est la réponse divine ? '
  - type: text
    content: Je
  - type: text
    content: ' me '
  - type: text
    content: suis réservé sept mille hommes, qui n'ont pas fléchi le genou devant Baal
  - type: text
    content: '. '
  '5':
  - type: note
    content: 9.6-13,27.
  - type: text
    content: 'De même aussi, dans le temps présent, il y a un reste selon le choix de la grâce. '
  '6':
  - type: note
    content: '4.4-6 ; Ga 2.16 ; 3.18 ; voir aussi grâce. – Certains mss ajoutent à la fin du v.  : et si c''est par les œuvres, ce n''est plus une grâce, autrement l''œuvre n''est plus une œuvre.'
  - type: text
    content: Or si c'est par grâce, ce n'est plus en vertu des œuvres ; autrement la grâce n'est plus une grâce.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ce sont ceux…  : litt. le choix (ou l''élection ) l''a obtenu  ; cf. 9.30-33. –  sont devenus obtus ou ont été rendus obtus , litt. ont été endurcis  ; cf. v. 25 ; Mc 3.5n  ; voir cœur.'
  - type: text
    content: 'Quoi donc ? Ce qu''Israël recherche, il ne l''a pas obtenu : ce sont ceux qui ont été choisis qui l''ont obtenu. Les autres sont devenus obtus, '
  '8':
  - type: note
    content: Dt 29.3 ; Es 6.9s ; 29.10  ; 44.18 ; Jn 12.40. – Voir esprit.
  - type: text
    content: 'ainsi qu''il est écrit :'
  - type: text
    content: Dieu leur a donné un esprit de torpeur,
  - type: text
    content: des yeux pour ne rien voir,
  - type: text
    content: des oreilles pour ne rien entendre,
  - type: text
    content: jusqu'à ce jour
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 69.23s  ; cf. 35.8. –  un juste châtiment  : litt. une rétribution  ; termes apparentés pour payer de retour v. 35 ; 12.19 ; cf. 14.12ss.'
  - type: text
    content: 'Et David dit :'
  - type: text
    content: Que leur table soit pour eux un piège,
  - type: text
    content: ' un filet,'
  - type: text
    content: une cause de chute, un juste châtiment !
