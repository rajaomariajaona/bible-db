document_id: ROM.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu n'a pas rejeté son peuple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 11.22 ; Ph 3.5-7.
      marker-yv: yv-n
    - type: text
      text: 'Je demande donc : Dieu a-t-il rejeté son peuple ? Jamais de la vie ! Car je suis moi-même Israélite, de la descendance d''Abraham, de la tribu de Benjamin. '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Que leurs yeux soient obscurcis, pour qu'ils ne voient rien !
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Fais-leur toujours courber le dos !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Juifs et non-Juifs dans le projet de Dieu
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trébuché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jc 2.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout à fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur faute '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur faux pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même terme 4.25 ; 5.15ss ; de même dans la suite ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'provoquer leur jalousie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.19+ ; cf. Ac 13.45 ; 17.5.
      marker-yv: yv-n
    - type: text
      text: 'Je demande donc : ont-ils trébuché pour tomber tout à fait ? Jamais de la vie ! Mais, du fait de leur faute, le salut a été donné aux non-Juifs, afin de provoquer leur jalousie. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faute '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: défaite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'déchéance, perte, diminution '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme en 1Co 6.7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'richesse des non-Juifs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 8.11s ; 21.43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur complet relèvement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur plénitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'totalité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 25 et peut être compris ici dans un sens analogue (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand ils seront au complet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. Es 2.2s ; Za 8.22s.
      marker-yv: yv-n
    - type: text
      text: Or si leur faute a fait la richesse du monde, et leur défaite la richesse des non-Juifs, à combien plus forte raison en sera-t-il ainsi de leur complet relèvement !
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: apôtre
        - type: text
          text: ' des non-Juifs'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: envoyé aux non-Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',5. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je vous le dis, à vous, les non-Juifs : pour autant que je suis l''apôtre des non-Juifs, moi, je glorifie mon ministère, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jalousie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de ma propre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sauver quelques-uns '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 9.22 ; 1Tm 4.16.
      marker-yv: yv-n
    - type: text
      text: 'afin, si possible, de provoquer de la jalousie parmi les gens de ma propre chair et d''en sauver quelques-uns. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réconciliation du monde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Co 5.17-21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une vie d''entre les morts '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jn 5.25 ; cf. Ez 37.
      marker-yv: yv-n
    - type: text
      text: 'Car si leur mise à l''écart a été la réconciliation du monde, que sera leur réintégration, sinon une vie d''entre les morts ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prémices '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.23 ; Nb 15.17-21 ; cf. Lv 2.2s. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saintes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Co 7.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toute la pâte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la pâte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) 9.21.
      marker-yv: yv-n
    - type: text
      text: Or si les prémices sont saintes, toute la pâte l'est aussi ; et si la racine est sainte, les branches le sont aussi.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ep 2.11-22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la racine, à la sève
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la racine de l''huile '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la richesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. Jg 9.9.
      marker-yv: yv-n
    - type: text
      text: 'Mais si quelques-unes des branches ont été retranchées, et si toi, olivier sauvage, tu as été greffé parmi eux, si tu as eu part à la racine, à la sève de l''olivier, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Jn 4.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'oublie pas que
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'ne fais pas le fier aux dépens des branches. Si tu fais le fier, n''oublie pas que ce n''est pas toi qui portes la racine, mais que c''est la racine qui te porte. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Tu diras donc : des branches ont été retranchées pour que, moi, je sois greffé. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu n''a pas rejeté… '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 1S 12.22
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Jr 31.37 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ps 94.14
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'connu d''avance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le passage où…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en Elie, comment il en appelle à Dieu contre Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Hé 4.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dieu n'a pas rejeté son peuple,
    - type: text
      text: ' ce peuple qu''il a connu d''avance. Ne savez-vous pas ce que dit l''Ecriture dans le passage où Elie adresse à Dieu cette plainte contre Israël : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu tiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu es debout, tu tiens ferme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 5.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Co 10.12 ; 15.1 ; 16.13 ; 2Co 1.24 ; 1Th 3.8 ; voir aussi Es 7.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 4.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'en tire pas orgueil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule presque identique en grec en 12.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ph 2.12.
      marker-yv: yv-n
    - type: text
      text: 'Fort bien ; elles ont été retranchées du fait de leur manque de foi, et toi, c''est par la foi que tu tiens. N''en tire pas orgueil, aie plutôt de la crainte ; '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prends garde…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne t'épargnera pas non plus.
      marker-yv: yv-n
    - type: text
      text: 'car si Dieu n''a pas épargné les branches naturelles, prends garde qu''il ne t''épargne pas non plus. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: retranché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme au v. 24 ; cf. Jn 15.2,4 ; Hé 3.14.'
      marker-yv: yv-n
    - type: text
      text: 'Considère donc la bonté et la sévérité de Dieu : sévérité envers ceux qui sont tombés, et bonté de Dieu envers toi, si tu demeures dans cette bonté ; autrement, toi aussi tu seras retranché. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans leur manque de foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sans foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la non-foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 20.'
      marker-yv: yv-n
    - type: text
      text: 'Eux, de même, s''ils ne demeurent pas dans leur manque de foi, ils seront greffés ; car Dieu a le pouvoir de les greffer à nouveau. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
