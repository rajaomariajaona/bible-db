document_id: JOS.16
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le territoire d'Ephraïm et de Manassé
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.1 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de Joseph'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce sont Manassé et Ephraïm ; cf. v. 4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jéricho
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cette ville appartiendra aux Benjaminites, cf. 18.21 ; voir aussi Nb 26.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le lot qui échut aux fils de Joseph s''étendait depuis le Jourdain, en face de Jéricho, vers les eaux de Jéricho, à l''est – le désert qui monte de Jéricho dans la montagne de Beth-El. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Louz
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 48.3. On ne la distingue plus de Beth-El en 18.13 ; Gn 28.19 ; 35.6 ; Jg 1.22s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Arkites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : clan installé au sud-ouest de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Beth-El
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2S 15.32 ; 16.16 ; 17.5,14 ; 1Ch 27.33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ataroth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Couronnes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Cercles (de pierres ?).
    marker-yv: yv-n
  - type: text
    text: 'Il continuait de Beth-El à Louz et passait vers la frontière des Arkites à Ataroth. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'frontière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'territoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent le même mot hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yaphlétites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il y a un Yaphleth rattaché à Aser en 1Ch 7.32s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth-Horôn-le-Bas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Guézer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.33'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis il descendait à l''ouest vers la frontière des Yaphlétites jusqu''au territoire de Beth-Horôn-le-Bas et jusqu''à Guézer pour déboucher sur la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: Tel fut le patrimoine des fils de Joseph, Manassé et Ephraïm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Voici la frontière des fils d''Ephraïm, clan par clan : la frontière de leur patrimoine était, à l''est, Atroth-Addar jusqu''à Beth-Horôn-le-Haut. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: La frontière…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.7.'
    marker-yv: yv-n
  - type: text
    text: 'La frontière aboutissait du côté de l''ouest vers le Mikmetath au nord ; puis la frontière tournait à l''est vers Taanath-Silo, qu''elle traversait à l''est vers Yanoah. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'De Yanoah, elle descendait à Ataroth et à Naarata, touchait Jéricho et aboutissait au Jourdain. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: De Tappouah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: longeait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: allait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 17.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''oued Qana '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Roseau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : on l''a identifié avec un oued qui débouche sur la Méditerranée à une vingtaine de kilomètres au nord de Tel-Aviv, cf. 17.9 ; 19.28.'
    marker-yv: yv-n
  - type: text
    text: 'De Tappouah, la frontière longeait l''oued Qana, vers l''ouest, pour aboutir à la mer. Voilà le patrimoine de la tribu des fils d''Ephraïm, clan par clan, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au milieu…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.9.'
    marker-yv: yv-n
  - type: text
    text: 'ainsi que les villes réservées aux fils d''Ephraïm au milieu du patrimoine des fils de Manassé, toutes ces villes et les villages qui en dépendent. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''à ce jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ils ne dépossédèrent pas les Cananéens qui habitaient à Guézer ; les Cananéens habitent au sein d'Ephraïm jusqu'à ce jour, mais ils sont astreints à une corvée d'esclaves.
