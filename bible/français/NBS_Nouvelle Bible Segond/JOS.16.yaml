document_id: JOS.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le territoire d'Ephraïm et de Manassé
  - type: text
    content: ' '
  - type: note
    content: 'fils de Joseph  : ce sont Manassé et Ephraïm ; cf. v. 4. –  Jéricho  : cette ville appartiendra aux Benjaminites, cf. 18.21 ; voir aussi Nb 26.3n.'
  - type: text
    content: 'Le lot qui échut aux fils de Joseph s''étendait depuis le Jourdain, en face de Jéricho, vers les eaux de Jéricho, à l''est – le désert qui monte de Jéricho dans la montagne de Beth-El. '
  '10':
  - type: note
    content: jusqu'à ce jour 4.9n.
  - type: text
    content: Ils ne dépossédèrent pas les Cananéens qui habitaient à Guézer ; les Cananéens habitent au sein d'Ephraïm jusqu'à ce jour, mais ils sont astreints à une corvée d'esclaves.
  '2':
  - type: note
    content: 'Louz  : cf. Gn 48.3. On ne la distingue plus de Beth-El en 18.13 ; Gn 28.19 ; 35.6 ; Jg 1.22s. –  Arkites  : clan installé au sud-ouest de Beth-El  ; cf. 2S 15.32 ; 16.16 ; 17.5,14 ; 1Ch 27.33. –  Ataroth  : Couronnes ou Cercles (de pierres ?).'
  - type: text
    content: 'Il continuait de Beth-El à Louz et passait vers la frontière des Arkites à Ataroth. '
  '3':
  - type: note
    content: 'frontière et territoire traduisent le même mot hébreu. –  Yaphlétites  : il y a un Yaphleth rattaché à Aser en 1Ch 7.32s. –  Beth-Horôn-le-Bas 10.10n. –  Guézer 10.33n.'
  - type: text
    content: 'Puis il descendait à l''ouest vers la frontière des Yaphlétites jusqu''au territoire de Beth-Horôn-le-Bas et jusqu''à Guézer pour déboucher sur la mer. '
  '4':
  - type: text
    content: Tel fut le patrimoine des fils de Joseph, Manassé et Ephraïm.
  '5':
  - type: text
    content: 'Voici la frontière des fils d''Ephraïm, clan par clan : la frontière de leur patrimoine était, à l''est, Atroth-Addar jusqu''à Beth-Horôn-le-Haut. '
  '6':
  - type: note
    content: 'La frontière…  : cf. 17.7.'
  - type: text
    content: 'La frontière aboutissait du côté de l''ouest vers le Mikmetath au nord ; puis la frontière tournait à l''est vers Taanath-Silo, qu''elle traversait à l''est vers Yanoah. '
  '7':
  - type: text
    content: 'De Yanoah, elle descendait à Ataroth et à Naarata, touchait Jéricho et aboutissait au Jourdain. '
  '8':
  - type: note
    content: 'De Tappouah  : cf. 17.8ns. –  longeait  : litt. allait, cf. 17.9. –  l''oued Qana (Roseau) : on l''a identifié avec un oued qui débouche sur la Méditerranée à une vingtaine de kilomètres au nord de Tel-Aviv, cf. 17.9 ; 19.28.'
  - type: text
    content: 'De Tappouah, la frontière longeait l''oued Qana, vers l''ouest, pour aboutir à la mer. Voilà le patrimoine de la tribu des fils d''Ephraïm, clan par clan, '
  '9':
  - type: note
    content: 'au milieu…  : cf. 17.9.'
  - type: text
    content: 'ainsi que les villes réservées aux fils d''Ephraïm au milieu du patrimoine des fils de Manassé, toutes ces villes et les villages qui en dépendent. '
