    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'épha et épha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesure
      - type: text
        text: ' de capacité pour les céréales) ; cf. Lv 19.35s ; Am 8.5 ; Mi 6.10s ; Pr 11.1 ; 20.10 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '26.29–27.2 : « Difficilement le marchand évitera les fautes, et le commerçant ne restera pas exempt de péché. Beaucoup ont péché par amour du gain, et celui qui cherche à s''enrichir détourne son regard. Comme un piquet s''enfonce dans la jointure des pierres, entre vente et achat s''intercale le péché. » 42.4 : « (N''aie honte) ni de la justesse de la balance et des poids, ni d''acquérir beaucoup ou peu. »'
    marker-yv: yv-n
  - type: text
    text: 'Tu n''auras pas dans ton sac deux sortes de poids, un gros et un petit. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans ta maison.
    marker-yv: yv-n
  - type: text
    text: 'Tu n''auras pas chez toi deux sortes d''épha, un grand et un petit. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
