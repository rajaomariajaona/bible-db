    - type: usfm
      marker: fq
      children:
      - type: text
        text: beau-frère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme hébreu correspondant désigne peut-être plus largement un proche parent ; il a été traduit en latin par le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: levir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''où le nom de lévirat donné à cette coutume (cf. Lv 18.16).'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque des frères habitent ensemble, si l''un d''eux meurt sans laisser de fils, la femme du défunt ne se mariera pas au dehors avec un étranger ; son beau-frère ira vers elle, il la prendra pour femme et il remplira envers elle son devoir de beau-frère. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'portera le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se lèvera sur le nom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sera considéré comme fils du défunt et non de son géniteur biologique
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nom… effacé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.14+.
    marker-yv: yv-n
  - type: text
    text: 'Le premier-né qu''elle mettra au monde portera le nom de son frère défunt, afin que son nom ne soit pas effacé d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne désire pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Rt 3.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à la porte de la ville '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de la ville '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est sous-entendu dans le texte) : cf. 16.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si cet homme ne désire pas prendre sa belle-sœur pour femme, sa belle-sœur montera à la porte de la ville, vers les anciens, et elle dira : « Mon beau-frère refuse de relever le nom de son frère en Israël, il ne veut pas remplir envers moi son devoir de beau-frère. » '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Les anciens de la ville l''appelleront et lui parleront. S''il persiste, en disant : « Je ne désire pas la prendre pour femme », '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Rt 4.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sous les yeux des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anciens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 31.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa sandale
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa sandale de son pied (à lui)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de bâtir la maison de son frère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. de lui donner une descendance.'
    marker-yv: yv-n
  - type: text
    text: 'alors sa belle-sœur s''approchera de lui sous les yeux des anciens, elle lui ôtera sa sandale et elle lui crachera au visage. Elle déclarera : « Voilà ce qu''on fait à l''homme qui refuse de bâtir la maison de son frère. » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Et voici le nom dont on l''appellera en Israël : « Maison du déchaussé ».'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Coup interdit dans une rixe
  marker-yv: yv-h
