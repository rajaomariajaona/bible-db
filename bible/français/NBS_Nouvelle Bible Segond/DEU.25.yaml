    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 38.6-8 ; Rt 4 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Mt 22.24ss/ /. '
    - type: usfm
      marker: ft
      children:
      - type: text
