    marker-yv: yv-n
  - type: text
    text: Tu ne muselleras pas le bœuf quand il foule le grain.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La loi du lévirat
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
