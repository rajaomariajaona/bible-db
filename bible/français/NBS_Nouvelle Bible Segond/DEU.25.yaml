    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quarante coups
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pour ne pas dépasser la limite prescrite, la tradition fixera plus tard à 39 le nombre des coups (2Co 11.24). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avili
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mépriser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 27.16.
    marker-yv: yv-n
  - type: text
    text: Il ne lui infligera pas plus de quarante coups, de peur que, si on le battait de beaucoup plus de coups, ton frère ne soit avili sous tes yeux.
- type: usfm
  marker: s1
