document_id: DEU.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Equité dans les jugements
  - type: text
    content: ' '
  - type: note
    content: 'on acquittera…  : autre traduction on déclarera juste (ou on justifiera ) le juste et méchant le méchant , cf. 1.9+ ; 16.18-20 ; 22.8n  ; 1R 8.32n  ; Es 5.20 ; Am 2.6 ; 5.12.'
  - type: text
    content: 'Lorsque des hommes qui ont un litige comparaissent pour être jugés, on acquittera l''innocent et on condamnera le coupable. '
  '10':
  - type: text
    content: 'Et voici le nom dont on l''appellera en Israël : « Maison du déchaussé ».'
  - type: heading
    content: Coup interdit dans une rixe
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'l''un avec l''autre  : litt. un homme et son frère , expression courante pour indiquer la réciprocité ; certains voient ici l''indice d''une parenté des combattants (cf. v. 5) ; voir cependant 22.1,4 ; 23.20s etc.'
  - type: text
    content: 'Lorsque des hommes se querellent l''un avec l''autre, si la femme de l''un s''approche pour délivrer son mari de la main de celui qui le frappe, si elle avance la main et saisit ce dernier par les parties honteuses, '
  '12':
  - type: note
    content: 'tu lui couperas la main  : cf. Mt 5.30. –  sans pitié 7.16+.'
  - type: text
    content: tu lui couperas la main ; ton œil sera sans pitié.
  - type: heading
    content: L'honnêteté dans le commerce
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'deux sortes de poids  : litt. pierre et pierre , pour peser la marchandise ou l''argent ; de même au v. 14, litt. épha et épha (mesure de capacité pour les céréales) ; cf. Lv 19.35s ; Am 8.5 ; Mi 6.10s ; Pr 11.1 ; 20.10 ; Siracide 26.29–27.2 : « Difficilement le marchand évitera les fautes, et le commerçant ne restera pas exempt de péché. Beaucoup ont péché par amour du gain, et celui qui cherche à s''enrichir détourne son regard. Comme un piquet s''enfonce dans la jointure des pierres, entre vente et achat s''intercale le péché. » 42.4 : « (N''aie honte) ni de la justesse de la balance et des poids, ni d''acquérir beaucoup ou peu. »'
  - type: text
    content: 'Tu n''auras pas dans ton sac deux sortes de poids, un gros et un petit. '
  '14':
  - type: note
    content: 'chez toi  : litt. dans ta maison.'
  - type: text
    content: 'Tu n''auras pas chez toi deux sortes d''épha, un grand et un petit. '
  '15':
  - type: note
    content: Voir justice. –  que tes jours se prolongent 4.26+.
  - type: text
    content: 'Tu auras un poids exact et juste, tu auras un épha exact et juste, afin que tes jours se prolongent sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne. '
  '16':
  - type: note
    content: abomination 7.25+.
  - type: text
    content: 'Car quiconque agit ainsi, quiconque agit injustement, est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  - type: heading
    content: Amalec, l'ennemi héréditaire
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 23.4-9. –  toi / vous 1.8n. –  Amalec Ex 17.8-16 ; Nb 24.20 ; 1S 15.2s.
  - type: text
    content: 'Souviens-toi de ce qu''Amalec t''a fait en chemin lorsque vous êtes sortis d''Egypte, '
  '18':
  - type: note
    content: 'pour attaquer ton arrière-garde  : cf. Jos 10.19n. –  en dernier  : litt. derrière toi. – Voir crainte.'
  - type: text
    content: 'comment il est venu à ta rencontre, en chemin, pour attaquer ton arrière-garde, tous ceux qui se traînaient en dernier, alors que tu étais fatigué, épuisé, et cela parce qu''il ne craignait pas Dieu. '
  '19':
  - type: note
    content: 'le repos… dans le pays 3.20+ ; 26.1. –  de tous les ennemis… 12.10 ; 2S 7.1. –  tu effaceras le souvenir  : autre traduction tu effaceras le nom  ; cf. 9.14+ ; 32.26 ; Ex 17.14n.'
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''accordera le repos en te délivrant de tous les ennemis qui t''entourent dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine, afin que tu en prennes possession, tu effaceras le souvenir d''Amalec de dessous le ciel : ne l''oublie pas.'
  '2':
  - type: note
    content: 'Si le coupable…  : litt. si le méchant est fils de coups.'
  - type: text
    content: 'Si le coupable mérite d''être battu, le juge le fera étendre par terre et on le battra devant lui d''un nombre de coups proportionné à sa culpabilité. '
  '3':
  - type: note
    content: 'quarante coups  : pour ne pas dépasser la limite prescrite, la tradition fixera plus tard à 39 le nombre des coups (2Co 11.24). –  avili  : le même verbe est traduit par mépriser en 27.16.'
  - type: text
    content: Il ne lui infligera pas plus de quarante coups, de peur que, si on le battait de beaucoup plus de coups, ton frère ne soit avili sous tes yeux.
  - type: heading
    content: Le bœuf
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 22.4,6s ; 1Co 9.9 ; 1Tm 5.18. –  le grain  : sous-entendu dans le texte.'
  - type: text
    content: Tu ne muselleras pas le bœuf quand il foule le grain.
  - type: heading
    content: La loi du lévirat
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 38.6-8 ; Rt 4 ; Mt 22.24ss/ /. –  beau-frère  : le terme hébreu correspondant désigne peut-être plus largement un proche parent ; il a été traduit en latin par le mot levir , d''où le nom de lévirat donné à cette coutume (cf. Lv 18.16).'
  - type: text
    content: 'Lorsque des frères habitent ensemble, si l''un d''eux meurt sans laisser de fils, la femme du défunt ne se mariera pas au dehors avec un étranger ; son beau-frère ira vers elle, il la prendra pour femme et il remplira envers elle son devoir de beau-frère. '
  '6':
  - type: note
    content: 'portera le nom  : litt. se lèvera sur le nom, c.-à-d. sera considéré comme fils du défunt et non de son géniteur biologique. –  nom… effacé 9.14+.'
  - type: text
    content: 'Le premier-né qu''elle mettra au monde portera le nom de son frère défunt, afin que son nom ne soit pas effacé d''Israël. '
  '7':
  - type: note
    content: 'ne désire pas  : cf. Rt 3.13n. –  à la porte de la ville (de la ville est sous-entendu dans le texte) : cf. 16.18n.'
  - type: text
    content: 'Si cet homme ne désire pas prendre sa belle-sœur pour femme, sa belle-sœur montera à la porte de la ville, vers les anciens, et elle dira : « Mon beau-frère refuse de relever le nom de son frère en Israël, il ne veut pas remplir envers moi son devoir de beau-frère. » '
  '8':
  - type: text
    content: 'Les anciens de la ville l''appelleront et lui parleront. S''il persiste, en disant : « Je ne désire pas la prendre pour femme », '
  '9':
  - type: note
    content: 'Cf. Rt 4.7ns. –  sous les yeux des anciens  : cf. 31.7. –  sa sandale  : litt. sa sandale de son pied (à lui). –  de bâtir la maison de son frère, c.-à-d. de lui donner une descendance.'
  - type: text
    content: 'alors sa belle-sœur s''approchera de lui sous les yeux des anciens, elle lui ôtera sa sandale et elle lui crachera au visage. Elle déclarera : « Voilà ce qu''on fait à l''homme qui refuse de bâtir la maison de son frère. » '
