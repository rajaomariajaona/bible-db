        - type: text
          text: n
      - type: text
        text: '  ; Es 5.20 ; Am 2.6 ; 5.12.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque des hommes qui ont un litige comparaissent pour être jugés, on acquittera l''innocent et on condamnera le coupable. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Si le coupable…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'si le méchant est '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de coups.'
    marker-yv: yv-n
  - type: text
    text: 'Si le coupable mérite d''être battu, le juge le fera étendre par terre et on le battra devant lui d''un nombre de coups proportionné à sa culpabilité. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
