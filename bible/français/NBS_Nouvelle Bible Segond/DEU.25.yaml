      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que tes jours se prolongent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.26+.
    marker-yv: yv-n
  - type: text
    text: 'Tu auras un poids exact et juste, tu auras un épha exact et juste, afin que tes jours se prolongent sur la terre que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te donne. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'abomination '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.25+.
    marker-yv: yv-n
  - type: text
    text: 'Car quiconque agit ainsi, quiconque agit injustement, est une abomination pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu.'
