      children:
      - type: text
        text: l'un avec l'autre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un homme et son frère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', expression courante pour indiquer la réciprocité ; certains voient ici l''indice d''une parenté des combattants (cf. v. 5) ; voir cependant 22.1,4 ; 23.20s etc.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque des hommes se querellent l''un avec l''autre, si la femme de l''un s''approche pour délivrer son mari de la main de celui qui le frappe, si elle avance la main et saisit ce dernier par les parties honteuses, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu lui couperas la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 5.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sans pitié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.16+.
    marker-yv: yv-n
  - type: text
    text: tu lui couperas la main ; ton œil sera sans pitié.
