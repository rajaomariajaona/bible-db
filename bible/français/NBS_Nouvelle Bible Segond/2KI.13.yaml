    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : malgré 11.18.'
    marker-yv: yv-n
  - type: text
    text: 'Mais ils ne s''écartèrent pas des péchés que la maison de Jéroboam avait fait commettre à Israël ; ils suivirent cette voie-là ; même le poteau cultuel (l''ashéra) restait en place à Samarie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il ne restait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après plusieurs versions anciennes ; le texte hébreu traditionnel porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne laissait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui pourrait signifier, dans un sens indéfini, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on n''avait laissé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même sens) ou peut-être '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu n'avait laissé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: attelages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: équipages (de chars), hommes d'équipage, cavaliers
    - type: usfm
      marker: ft
      children:
      - type: text
