      text: Seigneur
  - type: text
    text: ' donna un sauveur à Israël. Les Israélites échappèrent à la main des Araméens ; ils continuèrent d''habiter dans leurs tentes, comme d''habitude. '
  - type: usfm
    marker: vlbl
