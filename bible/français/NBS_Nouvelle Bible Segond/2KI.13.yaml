    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; il ne s''écarta d''aucun des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël ; il suivit cette voie-là. '
  - type: usfm
    marker: vlbl
