document_id: 2KI.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joachaz, roi d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'sur Israël  : précision absente de LXX.'
  - type: text
    content: 'La vingt-troisième année de Joas, fils d''Achazia, roi de Juda, Joachaz, fils de Jéhu, devint roi sur Israël à Samarie. Il régna dix-sept ans. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'trente-septième  : des mss de LXX hésitent entre trente-sixième, trente-neuvième ou quarantième . –  Il régna  : sous-entendu dans le texte. –  seize ans  : Syr treize.'
  - type: text
    content: 'La trente-septième année de Joas, roi de Juda, Joas, fils de Joachaz, devint roi sur Israël à Samarie. Il régna seize ans. '
  '11':
  - type: note
    content: ce qui déplaisait… 3.2n.
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il ne s''écarta d''aucun des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël ; il suivit cette voie-là. '
  '12':
  - type: note
    content: '14.15s. –  Le reste de l''histoire… 1R 11.41n. –  la guerre…  : cf. 2Ch 25.17-24.'
  - type: text
    content: 'Le reste de l''histoire de Joas, tout ce qu''il a fait, sa vaillance, et la guerre qu''il eut avec Amatsia, roi de Juda, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '13':
  - type: note
    content: se coucha… 8.24+ ; 1R 1.21+.
  - type: text
    content: Joas se coucha avec ses pères, et Jéroboam s'assit sur son trône. Joas fut enseveli à Samarie avec les rois d'Israël.
  - type: heading
    content: Dernier acte prophétique d'Elisée
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Joas v. 11. –  sur lui  : litt. sur sa face  ; cf. Gn 50.1n. –  Père…  : cf. 2.12n  ; la formule suggère entre le roi et le prophète Elisée une relation similaire à celle qui unissait Elisée à son maître Elie.'
  - type: text
    content: 'Lorsque Elisée fut atteint de la maladie dont il mourut, Joas, roi d''Israël, descendit vers lui, pleura sur lui en disant : Père ! Père ! Chars et attelages d''Israël ! '
  '15':
  - type: text
    content: 'Elisée lui dit : Prends un arc et des flèches ! Il prit un arc et des flèches. '
  '16':
  - type: note
    content: 'Prépare l''arc…  : litt. fais chevaucher ta main sur l''arc ! Et il fit chevaucher sa main. Cet emploi inhabituel du verbe correspondant à chevaucher (ou atteler, Os 10.11) désigne peut-être l''action consistant à ployer l''arc pour l''armer en fixant la corde à l''extrémité supérieure.'
  - type: text
    content: 'Puis Elisée dit au roi d''Israël : Prépare l''arc ! Il le prépara. Elisée posa alors ses mains sur les mains du roi '
  '17':
  - type: note
    content: 'victorieuse ou de salut. –  les Araméens  : litt. Aram.'
  - type: text
    content: 'et dit : Ouvre la fenêtre vers l''est ! Il l''ouvrit. Elisée dit : Tire ! Il tira. Elisée dit : C''est une flèche victorieuse pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', une flèche victorieuse contre les Araméens ; tu battras les Araméens à Apheq, jusqu''à l''extermination. '
  '18':
  - type: note
    content: 'au roi d''Israël  : précision absente de Syr et d''un ms de LXX.'
  - type: text
    content: 'Elisée dit : Prends les flèches ! Il les prit. Elisée dit au roi d''Israël : Frappe contre terre ! Alors il frappa trois fois et s''arrêta. '
  '19':
  - type: text
    content: 'L''homme de Dieu s''irrita contre lui ; il dit : Il fallait frapper cinq ou six fois ; alors tu aurais battu les Araméens jusqu''à l''extermination ; maintenant tu ne les battras que trois fois.'
  '2':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. v. 11 ; 3.2n  ; 1R 11.6+. –  il suivit  : litt. il marcha après. –  les péchés que Jéroboam… 10.31n.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il suivit les péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël ; il ne s''en écarta pas. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'L''année suivante  : litt. une année venant , ce que LXX et Tg comprennent comme une référence au début de l''année suivante, alors que Syr et Vg traduisent la même année.'
  - type: text
    content: 'Elisée mourut, et on l''ensevelit. L''année suivante, des troupes de Moabites pénétrèrent dans le pays. '
  '21':
  - type: note
    content: 'une de ces troupes  : litt. la troupe. –  se leva  : litt. se leva sur ses pieds ou sur ses jambes.'
  - type: text
    content: On était en train d'ensevelir un homme quand on vit une de ces troupes. On jeta l'homme dans le tombeau d'Elisée ; l'homme alla toucher les ossements d'Elisée, il reprit vie et se leva.
  - type: heading
    content: Joas reprend plusieurs villes aux Araméens
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'roi d''Aram  : précision absente de LXX.'
  - type: text
    content: 'Hazaël, roi d''Aram, avait opprimé les Israélites pendant tous les jours de Joachaz. '
  '23':
  - type: note
    content: 'Cf. v. 7n. – Voir grâce. –  loin de lui  : litt. de dessus (ou d''auprès de) sa face. –  jusqu''à présent  : cette indication reçoit une signification différente selon que l''on suppose le texte rédigé avant ou après la chute de Samarie (722/1 av. J.-C.). Dans ce dernier cas, elle pourrait signifier la persistance de l''alliance de Dieu avec son peuple au-delà de la disparition du royaume du Nord. Dans son contexte actuel, elle vient souligner que les victoires de Joas d''Israël sont moins liées à l''action du prophète Elisée, ami du roi, qu''à la fidélité de Dieu, ami des patriarches.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur fit grâce : il eut compassion d''eux et se tourna vers eux à cause de son alliance avec Abraham, Isaac et Jacob ; il n''a pas voulu les détruire, il ne les a pas rejetés loin de lui, jusqu''à présent. '
  '24':
  - type: note
    content: 'Hazaël  : cf. 8.8n. –  Ben-Hadad  : cf. 6.24n.'
  - type: text
    content: 'Hazaël, roi d''Aram, mourut ; Ben-Hadad, son fils, devint roi à sa place. '
  '25':
  - type: note
    content: Cf. v. 5,17.
  - type: text
    content: Joas, fils de Joachaz, reprit à Ben-Hadad, fils d'Hazaël, les villes prises par Hazaël à Joachaz, son père, pendant la guerre. Joas le battit trois fois et reprit les villes d'Israël.
  '3':
  - type: note
    content: 'sans cesse  : litt. tous les jours. –  Hazaël  : cf. 8.8n. –  Ben-Hadad  : cf. 6.24n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Israël. Il les livra sans cesse à Hazaël, roi d''Aram, et à Ben-Hadad, fils d''Hazaël. '
  '4':
  - type: note
    content: 'chercha à apaiser  : litt. caressa la face, cf. Ex 32.11+. –  il avait vu l''oppression  : cf. Ex 3.7 (autre formule en hébreu), 9.'
  - type: text
    content: 'Joachaz chercha à apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''entendit, car il avait vu l''oppression d''Israël – car le roi d''Aram les opprimait – '
  '5':
  - type: note
    content: 'un sauveur  : sans doute en la personne de Joas, fils de Joachaz, cf. v. 25. LXX un salut  ; c''est probablement grâce à la victoire d''Adad-Nirari III, roi d''Assyrie, sur les Araméens que les Israélites ont pu récupérer leur territoire. –  échappèrent…  : litt. sortirent de dessous la main, certains mss de LXX ont lu il les fit sortir de dessous. –  dans leurs tentes  : cf. Jg 7.8n. –  d''habitude  : litt. hier, avant-hier, Gn 31.2n.'
  - type: text
    content: 'et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna un sauveur à Israël. Les Israélites échappèrent à la main des Araméens ; ils continuèrent d''habiter dans leurs tentes, comme d''habitude. '
  '6':
  - type: note
    content: 'le poteau cultuel…  : malgré 11.18.'
  - type: text
    content: 'Mais ils ne s''écartèrent pas des péchés que la maison de Jéroboam avait fait commettre à Israël ; ils suivirent cette voie-là ; même le poteau cultuel (l''ashéra) restait en place à Samarie. '
  '7':
  - type: note
    content: 'Il ne restait  : d''après plusieurs versions anciennes ; le texte hébreu traditionnel porte il ne laissait, ce qui pourrait signifier, dans un sens indéfini, on n''avait laissé (même sens) ou peut-être Dieu n''avait laissé. –  attelages  : autres traductions équipages (de chars), hommes d''équipage, cavaliers. –  décimés  : litt. fait disparaître ou fait périr. –  comme la poussière…  : litt. comme une poussière à piétiner, même verbe hébreu en Mi 4.13. – Plusieurs mss de LXX lisent le v. 23 à la suite du v. 7.'
  - type: text
    content: 'Il ne restait comme troupes à Joachaz que cinquante attelages, dix chars et dix mille fantassins ; car le roi d''Aram les avait décimés, il les avait traités comme la poussière qu''on foule aux pieds. '
  '8':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n.
  - type: text
    content: 'Le reste de l''histoire de Joachaz, tout ce qu''il a fait, sa vaillance, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '9':
  - type: note
    content: se coucha avec ses pères 8.24+ ; 1R 1.21+.
  - type: text
    content: Joachaz se coucha avec ses pères, et on l'ensevelit à Samarie. Joas, son fils, devint roi à sa place.
  - type: heading
    content: Joas, roi d'Israël
