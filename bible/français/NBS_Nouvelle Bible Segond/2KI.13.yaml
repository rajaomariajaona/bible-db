    - type: usfm
      marker: fq
      children:
      - type: text
        text: décimés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fait disparaître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fait périr
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme la poussière…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme une poussière à piétiner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même verbe hébreu en Mi 4.13. – Plusieurs mss de LXX lisent le v. 23 à la suite du v. 7.'
    marker-yv: yv-n
  - type: text
    text: 'Il ne restait comme troupes à Joachaz que cinquante attelages, dix chars et dix mille fantassins ; car le roi d''Aram les avait décimés, il les avait traités comme la poussière qu''on foule aux pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le reste de l''histoire… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le reste de l''histoire de Joachaz, tout ce qu''il a fait, sa vaillance, cela est écrit dans le livre des chroniques des rois d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se coucha avec ses pères '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.24+ ; 1R 1.21+.
    marker-yv: yv-n
  - type: text
    text: Joachaz se coucha avec ses pères, et on l'ensevelit à Samarie. Joas, son fils, devint roi à sa place.
