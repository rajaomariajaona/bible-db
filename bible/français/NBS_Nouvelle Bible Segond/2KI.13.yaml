  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un sauveur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sans doute en la personne de Joas, fils de Joachaz, cf. v. 25. LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un salut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; c''est probablement grâce à la victoire d''Adad-Nirari III, roi d''Assyrie, sur les Araméens que les Israélites ont pu récupérer leur territoire. –  '
    - type: usfm
