      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; la formule suggère entre le roi et le prophète Elisée une relation similaire à celle qui unissait Elisée à son maître Elie.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Elisée fut atteint de la maladie dont il mourut, Joas, roi d''Israël, descendit vers lui, pleura sur lui en disant : Père ! Père ! Chars et attelages d''Israël ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Elisée lui dit : Prends un arc et des flèches ! Il prit un arc et des flèches. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Prépare l'arc…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fais chevaucher ta main sur l'arc ! Et il fit chevaucher sa main
