  - type: text
    text: 'Le reste de l''histoire de Joas, tout ce qu''il a fait, sa vaillance, et la guerre qu''il eut avec Amatsia, roi de Juda, cela est écrit dans le livre des chroniques des rois d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '13.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se coucha… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.24+ ; 1R 1.21+.
    marker-yv: yv-n
  - type: text
    text: Joas se coucha avec ses pères, et Jéroboam s'assit sur son trône. Joas fut enseveli à Samarie avec les rois d'Israël.
