document_id: 1CH.19,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les envoyés de David déshonorés
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 10.1-5
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2S 10.1 mentionne ici déjà le nom du nouveau roi, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hanoun.
      marker-yv: yv-n
    - type: text
      text: 'Là-dessus, Nahash, roi des Ammonites, mourut, et son fils devint roi à sa place. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Joab vit qu''il avait à se battre sur deux fronts, devant et derrière. Il fit alors un choix dans l''élite d''Israël et se rangea face aux Araméens ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abshaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abishaï.
      marker-yv: yv-n
    - type: text
      text: 'il confia le reste de la troupe à Abshaï, son frère, et ils se rangèrent face aux Ammonites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Il dit : Si les Araméens sont plus forts que moi, tu viendras à mon secours ; et si les Ammonites sont plus forts que toi, je te porterai secours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Sois fort, soyons forts pour notre peuple et pour les villes de notre Dieu, et que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fasse ce qui lui plaira ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Joab s''avança avec sa troupe pour attaquer les Araméens, qui durent fuir pour lui échapper. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abshaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quand les Ammonites virent que les Araméens avaient fui, ils fuirent aussi pour échapper à Abshaï, frère de Joab, et ils rentrèrent dans la ville ; Joab se rendit à Jérusalem.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shophak
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 2S 10.18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shobak.
      marker-yv: yv-n
    - type: text
      text: 'Les Araméens, voyant qu''ils avaient été battus par Israël, envoyèrent des messagers pour mobiliser les Araméens de Transeuphratène ; Shophak, le chef de l''armée de Hadad-Ezer, était à leur tête. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'On le dit à David. Celui-ci rassembla tout Israël, passa le Jourdain, arriva près d''eux et se rangea devant eux. Ainsi, David se rangea en ordre de bataille face aux Araméens, qui le combattirent. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2S 10.18 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: équipages de sept cents chars et quarante mille cavaliers.
      marker-yv: yv-n
    - type: text
      text: 'Les Araméens durent fuir pour échapper à Israël. David leur tua les équipages de sept mille chars et quarante mille fantassins ; il fit mettre à mort Shophak, le chef de l''armée. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 10.19 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec Israël.
      marker-yv: yv-n
    - type: text
      text: Ceux qui étaient soumis à Hadad-Ezer, se voyant battus par Israël, firent la paix avec David et lui furent soumis ; et les Araméens ne voulurent plus secourir les Ammonites.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des messagers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 10.2 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des gens de sa cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui présenter ses condoléances
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour le consoler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2S 10.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David dit : J''agirai avec fidélité envers Hanoun, fils de Nahash, car son père a agi avec fidélité envers moi. David envoya des messagers lui présenter ses condoléances pour son père. Les gens de la cour de David arrivèrent au pays des Ammonites, auprès de Hanoun, pour lui présenter des condoléances, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: détruire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 19.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: explorer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses serviteurs.
      marker-yv: yv-n
    - type: text
      text: 'mais les princes des Ammonites dirent à Hanoun : Penses-tu que David ait voulu honorer ton père en t''envoyant ces gens pour te présenter ses condoléances ? N''est-ce pas pour examiner, pour détruire, pour espionner le pays que ses gens sont venus auprès de toi ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Alors Hanoun saisit les gens de David, les fit raser et fit couper leurs habits à mi-longueur, jusqu''au derrière ; puis il les renvoya. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'On vint faire un rapport sur ces hommes à David, qui envoya quelqu''un à leur rencontre ; ces hommes étaient en effet dans une grande confusion ; le roi leur fit dire : Restez à Jéricho jusqu''à ce que votre barbe ait repoussé, puis vous reviendrez.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Guerre contre les Ammonites et les Araméens
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 10.6-19
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2S 10.6 présente plusieurs différences dans les chiffres et dans les noms géographiques. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mille talents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plus de 34 tonnes ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des attelages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des équipages.
      marker-yv: yv-n
    - type: text
      text: 'Les Ammonites virent qu''ils s''étaient rendus odieux à David. Alors Hanoun et les Ammonites envoyèrent mille talents d''argent pour engager des chars et des attelages chez les Araméens de Mésopotamie et chez les Araméens de Maaka et de Tsoba. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Medba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils engagèrent trente-deux mille chars et le roi de Maaka avec son peuple, lesquels dressèrent leur camp devant Medba. Les Ammonites, sortant de leurs villes, se rassemblèrent et marchèrent au combat. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Quand David l''apprit, il envoya contre eux Joab avec toute l''armée, les guerriers. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: Les Ammonites se mirent en campagne ; ils se rangèrent en ordre de bataille à l'entrée de la ville ; les rois qui étaient venus étaient à part dans la campagne.
