document_id: 1CH.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les envoyés de David déshonorés
  - type: heading
    content: 2S 10.1-5
  - type: text
    content: ' '
  - type: note
    content: 2S 10.1 mentionne ici déjà le nom du nouveau roi, Hanoun.
  - type: text
    content: 'Là-dessus, Nahash, roi des Ammonites, mourut, et son fils devint roi à sa place. '
  '10':
  - type: text
    content: 'Joab vit qu''il avait à se battre sur deux fronts, devant et derrière. Il fit alors un choix dans l''élite d''Israël et se rangea face aux Araméens ; '
  '11':
  - type: note
    content: 'Abshaï  : cf. 2.16n  ; 11.20n  ; Syr et Vg Abishaï.'
  - type: text
    content: 'il confia le reste de la troupe à Abshaï, son frère, et ils se rangèrent face aux Ammonites. '
  '12':
  - type: text
    content: 'Il dit : Si les Araméens sont plus forts que moi, tu viendras à mon secours ; et si les Ammonites sont plus forts que toi, je te porterai secours. '
  '13':
  - type: text
    content: 'Sois fort, soyons forts pour notre peuple et pour les villes de notre Dieu, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse ce qui lui plaira ! '
  '14':
  - type: text
    content: 'Joab s''avança avec sa troupe pour attaquer les Araméens, qui durent fuir pour lui échapper. '
  '15':
  - type: note
    content: 'Abshaï  : cf. 2.16n  ; 11.20n.'
  - type: text
    content: Quand les Ammonites virent que les Araméens avaient fui, ils fuirent aussi pour échapper à Abshaï, frère de Joab, et ils rentrèrent dans la ville ; Joab se rendit à Jérusalem.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Shophak  : 2S 10.18 Shobak.'
  - type: text
    content: 'Les Araméens, voyant qu''ils avaient été battus par Israël, envoyèrent des messagers pour mobiliser les Araméens de Transeuphratène ; Shophak, le chef de l''armée de Hadad-Ezer, était à leur tête. '
  '17':
  - type: text
    content: 'On le dit à David. Celui-ci rassembla tout Israël, passa le Jourdain, arriva près d''eux et se rangea devant eux. Ainsi, David se rangea en ordre de bataille face aux Araméens, qui le combattirent. '
  '18':
  - type: note
    content: 2S 10.18 équipages de sept cents chars et quarante mille cavaliers.
  - type: text
    content: 'Les Araméens durent fuir pour échapper à Israël. David leur tua les équipages de sept mille chars et quarante mille fantassins ; il fit mettre à mort Shophak, le chef de l''armée. '
  '19':
  - type: note
    content: 'avec David  : 2S 10.19 avec Israël.'
  - type: text
    content: Ceux qui étaient soumis à Hadad-Ezer, se voyant battus par Israël, firent la paix avec David et lui furent soumis ; et les Araméens ne voulurent plus secourir les Ammonites.
  '2':
  - type: note
    content: 'des messagers  : 2S 10.2 des gens de sa cour. –  lui présenter ses condoléances  : litt. pour le consoler  ; cf. 2S 10.2n.'
  - type: text
    content: 'David dit : J''agirai avec fidélité envers Hanoun, fils de Nahash, car son père a agi avec fidélité envers moi. David envoya des messagers lui présenter ses condoléances pour son père. Les gens de la cour de David arrivèrent au pays des Ammonites, auprès de Hanoun, pour lui présenter des condoléances, '
  '3':
  - type: note
    content: 'détruire  : cf. Gn 19.21n  ; certains modifient le texte hébreu traditionnel pour lire explorer. –  ses gens  : litt. ses serviteurs.'
  - type: text
    content: 'mais les princes des Ammonites dirent à Hanoun : Penses-tu que David ait voulu honorer ton père en t''envoyant ces gens pour te présenter ses condoléances ? N''est-ce pas pour examiner, pour détruire, pour espionner le pays que ses gens sont venus auprès de toi ? '
  '4':
  - type: text
    content: 'Alors Hanoun saisit les gens de David, les fit raser et fit couper leurs habits à mi-longueur, jusqu''au derrière ; puis il les renvoya. '
  '5':
  - type: text
    content: 'On vint faire un rapport sur ces hommes à David, qui envoya quelqu''un à leur rencontre ; ces hommes étaient en effet dans une grande confusion ; le roi leur fit dire : Restez à Jéricho jusqu''à ce que votre barbe ait repoussé, puis vous reviendrez.'
  - type: heading
    content: Guerre contre les Ammonites et les Araméens
  - type: heading
    content: 2S 10.6-19
  '6':
  - type: text
    content: ' '
  - type: note
    content: '2S 10.6 présente plusieurs différences dans les chiffres et dans les noms géographiques. –  mille talents  : plus de 34 tonnes ; voir mesures, poids et monnaies. –  des attelages  : autre traduction des équipages.'
  - type: text
    content: 'Les Ammonites virent qu''ils s''étaient rendus odieux à David. Alors Hanoun et les Ammonites envoyèrent mille talents d''argent pour engager des chars et des attelages chez les Araméens de Mésopotamie et chez les Araméens de Maaka et de Tsoba. '
  '7':
  - type: note
    content: 'Medba  : cf. Es 15.2n.'
  - type: text
    content: 'Ils engagèrent trente-deux mille chars et le roi de Maaka avec son peuple, lesquels dressèrent leur camp devant Medba. Les Ammonites, sortant de leurs villes, se rassemblèrent et marchèrent au combat. '
  '8':
  - type: text
    content: 'Quand David l''apprit, il envoya contre eux Joab avec toute l''armée, les guerriers. '
  '9':
  - type: text
    content: Les Ammonites se mirent en campagne ; ils se rangèrent en ordre de bataille à l'entrée de la ville ; les rois qui étaient venus étaient à part dans la campagne.
