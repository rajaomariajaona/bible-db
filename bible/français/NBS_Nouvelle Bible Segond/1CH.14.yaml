document_id: 1CH.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David à Jérusalem
  - type: heading
    content: 2S 5.11-16
  - type: text
    content: ' '
  - type: note
    content: 'Hiram  : selon une lecture traditionnelle et la plupart des versions anciennes ; certains mss hébreux et Tg portent Houram.'
  - type: text
    content: 'Hiram, roi de Tyr, envoya des messagers à David, avec du bois de cèdre, ainsi que des maçons et des charpentiers, pour lui bâtir une maison. '
  '10':
  - type: note
    content: interrogea ou consulta, cf. v. 14.
  - type: text
    content: 'David interrogea Dieu : Dois-je attaquer les Philistins ? Me les livreras-tu ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Vas-y, je te les livrerai. '
  '11':
  - type: text
    content: 'Ils attaquèrent Baal-Peratsim, où David les battit. Puis il dit : Dieu a ouvert une brèche par ma main dans les rangs de mes ennemis, comme une brèche ouverte par les eaux. C''est pourquoi on a appelé ce lieu du nom de Baal-Peratsim (« Maître des brèches »). '
  '12':
  - type: note
    content: 'David… jeter au feu  : cf. 2S 5.21 David et ses hommes les emportèrent (comme butin).'
  - type: text
    content: Ils abandonnèrent là leurs dieux. David ordonna de les jeter au feu.
  '13':
  - type: text
    content: 'Les Philistins se déployèrent de nouveau dans la vallée. '
  '14':
  - type: text
    content: 'David interrogea encore Dieu, et Dieu lui dit : Tu ne les attaqueras pas ; prends-les à revers, et tu arriveras sur eux en face des mûriers. '
  '15':
  - type: text
    content: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors tu engageras le combat, car c''est Dieu qui se met en campagne devant toi pour battre les troupes des Philistins. '
  '16':
  - type: note
    content: 'ils battirent remplace il battit de 2S 5.25. –  depuis Gabaon  : 2S 5.25 depuis Guéba.'
  - type: text
    content: 'David fit ce que Dieu lui avait ordonné ; ils battirent les troupes des Philistins depuis Gabaon jusqu''à Guézer. '
  '17':
  - type: note
    content: 'La renommée de David se répandit  : litt. le nom de David sortit. –  dans tous les pays  : cf. Jos 6.27 ; 2Ch 26.8. –  sa frayeur  : selon toute vraisemblance, la frayeur qu''inspirait David ; voir Ex 15.14-16 ; Dt 2.25 ; 11.25 ; voir crainte.'
  - type: text
    content: 'La renommée de David se répandit dans tous les pays ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donna à toutes les nations sa frayeur.'
  '2':
  - type: text
    content: 'David sut ainsi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''affermissait comme roi sur Israël et que son règne s''élevait toujours plus, à cause d''Israël, son peuple.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'des femmes  : 2S 5.13 des femmes et des concubines.'
  - type: text
    content: 'David prit encore des femmes à Jérusalem ; il engendra encore des fils et des filles. '
  '4':
  - type: text
    content: 'Voici les noms des enfants qu''il eut à Jérusalem : Shammoua, Shobab, Nathan, Salomon, '
  '5':
  - type: note
    content: 'Elpéleth  : ce nom n''est pas mentionné dans la liste de 2S 5.14-16.'
  - type: text
    content: 'Yibhar, Elishoua, Elpéleth, '
  '6':
  - type: note
    content: 'Noga  : ce nom n''est pas mentionné dans la liste de 2S 5.14-16.'
  - type: text
    content: 'Noga, Népheg, Yaphia, '
  '7':
  - type: text
    content: Elishama, Béeliada et Eliphéleth.
  - type: heading
    content: Victoires de David sur les Philistins
  - type: heading
    content: 2S 5.17-25
  '8':
  - type: text
    content: ' '
  - type: note
    content: il sortit au-devant d'eux remplace il descendit à la forteresse de 2S 5.17.
  - type: text
    content: 'Quand les Philistins apprirent que David avait reçu l''onction pour être roi sur tout Israël, il montèrent tous à sa recherche. Quand David l''apprit, il sortit au-devant d''eux. '
  '9':
  - type: text
    content: 'Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïtes. '
