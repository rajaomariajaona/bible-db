document_id: 1CH.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 5.11-16
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hiram
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : selon une lecture traditionnelle et la plupart des versions anciennes ; certains mss hébreux et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Houram.
      marker-yv: yv-n
    - type: text
      text: 'Hiram, roi de Tyr, envoya des messagers à David, avec du bois de cèdre, ainsi que des maçons et des charpentiers, pour lui bâtir une maison. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'interrogea '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consulta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 14.'
      marker-yv: yv-n
    - type: text
      text: 'David interrogea Dieu : Dois-je attaquer les Philistins ? Me les livreras-tu ? Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui dit : Vas-y, je te les livrerai. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils attaquèrent Baal-Peratsim, où David les battit. Puis il dit : Dieu a ouvert une brèche par ma main dans les rangs de mes ennemis, comme une brèche ouverte par les eaux. C''est pourquoi on a appelé ce lieu du nom de Baal-Peratsim (« Maître des brèches »). '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: David… jeter au feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 5.21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'David et ses hommes les emportèrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (comme butin).
      marker-yv: yv-n
    - type: text
      text: Ils abandonnèrent là leurs dieux. David ordonna de les jeter au feu.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins se déployèrent de nouveau dans la vallée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David interrogea encore Dieu, et Dieu lui dit : Tu ne les attaqueras pas ; prends-les à revers, et tu arriveras sur eux en face des mûriers. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors tu engageras le combat, car c''est Dieu qui se met en campagne devant toi pour battre les troupes des Philistins. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils battirent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'remplace '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il battit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de 2S 5.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: depuis Gabaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 5.25 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis Guéba.
      marker-yv: yv-n
    - type: text
      text: 'David fit ce que Dieu lui avait ordonné ; ils battirent les troupes des Philistins depuis Gabaon jusqu''à Guézer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La renommée de David se répandit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' de David sortit'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans tous les pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 6.27 ; 2Ch 26.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa frayeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : selon toute vraisemblance, la frayeur qu''inspirait David ; voir Ex 15.14-16 ; Dt 2.25 ; 11.25 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La renommée de David se répandit dans tous les pays ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' donna à toutes les nations sa frayeur.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David sut ainsi que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''affermissait comme roi sur Israël et que son règne s''élevait toujours plus, à cause d''Israël, son peuple.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 2S 5.13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des femmes et des concubines.
      marker-yv: yv-n
    - type: text
      text: 'David prit encore des femmes à Jérusalem ; il engendra encore des fils et des filles. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici les noms des enfants qu''il eut à Jérusalem : Shammoua, Shobab, Nathan, Salomon, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elpéleth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce nom n''est pas mentionné dans la liste de 2S 5.14-16.'
      marker-yv: yv-n
    - type: text
      text: 'Yibhar, Elishoua, Elpéleth, '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Noga
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce nom n''est pas mentionné dans la liste de 2S 5.14-16.'
      marker-yv: yv-n
    - type: text
      text: 'Noga, Népheg, Yaphia, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elishama, Béeliada et Eliphéleth.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoires de David sur les Philistins
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 5.17-25
    marker-yv: yv-h
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il sortit au-devant d''eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'remplace '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il descendit à la forteresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de 2S 5.17.
      marker-yv: yv-n
    - type: text
      text: 'Quand les Philistins apprirent que David avait reçu l''onction pour être roi sur tout Israël, il montèrent tous à sa recherche. Quand David l''apprit, il sortit au-devant d''eux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïtes. '
