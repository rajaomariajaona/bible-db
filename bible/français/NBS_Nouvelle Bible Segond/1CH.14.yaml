  children:
  - type: text
    text: 2S 5.11-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hiram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : selon une lecture traditionnelle et la plupart des versions anciennes ; certains mss hébreux et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Houram.
    marker-yv: yv-n
  - type: text
    text: 'Hiram, roi de Tyr, envoya des messagers à David, avec du bois de cèdre, ainsi que des maçons et des charpentiers, pour lui bâtir une maison. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'David sut ainsi que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''affermissait comme roi sur Israël et que son règne s''élevait toujours plus, à cause d''Israël, son peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des femmes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : 2S 5.13 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des femmes et des concubines.
    marker-yv: yv-n
  - type: text
    text: 'David prit encore des femmes à Jérusalem ; il engendra encore des fils et des filles. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Voici les noms des enfants qu''il eut à Jérusalem : Shammoua, Shobab, Nathan, Salomon, '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elpéleth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce nom n''est pas mentionné dans la liste de 2S 5.14-16.'
    marker-yv: yv-n
  - type: text
    text: 'Yibhar, Elishoua, Elpéleth, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Noga
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce nom n''est pas mentionné dans la liste de 2S 5.14-16.'
    marker-yv: yv-n
  - type: text
    text: 'Noga, Népheg, Yaphia, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Elishama, Béeliada et Eliphéleth.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoires de David sur les Philistins
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 2S 5.17-25
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il sortit au-devant d''eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'remplace '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il descendit à la forteresse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de 2S 5.17.
    marker-yv: yv-n
  - type: text
    text: 'Quand les Philistins apprirent que David avait reçu l''onction pour être roi sur tout Israël, il montèrent tous à sa recherche. Quand David l''apprit, il sortit au-devant d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïtes. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'interrogea '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: consulta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 14.'
    marker-yv: yv-n
  - type: text
    text: 'David interrogea Dieu : Dois-je attaquer les Philistins ? Me les livreras-tu ? Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui dit : Vas-y, je te les livrerai. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Ils attaquèrent Baal-Peratsim, où David les battit. Puis il dit : Dieu a ouvert une brèche par ma main dans les rangs de mes ennemis, comme une brèche ouverte par les eaux. C''est pourquoi on a appelé ce lieu du nom de Baal-Peratsim (« Maître des brèches »). '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: David… jeter au feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 5.21 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'David et ses hommes les emportèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (comme butin).
    marker-yv: yv-n
  - type: text
    text: Ils abandonnèrent là leurs dieux. David ordonna de les jeter au feu.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Les Philistins se déployèrent de nouveau dans la vallée. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'David interrogea encore Dieu, et Dieu lui dit : Tu ne les attaqueras pas ; prends-les à revers, et tu arriveras sur eux en face des mûriers. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors tu engageras le combat, car c''est Dieu qui se met en campagne devant toi pour battre les troupes des Philistins. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils battirent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'remplace '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il battit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de 2S 5.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis Gabaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 2S 5.25 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: depuis Guéba.
    marker-yv: yv-n
  - type: text
    text: 'David fit ce que Dieu lui avait ordonné ; ils battirent les troupes des Philistins depuis Gabaon jusqu''à Guézer. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: La renommée de David se répandit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' de David sortit'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans tous les pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 6.27 ; 2Ch 26.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa frayeur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon toute vraisemblance, la frayeur qu''inspirait David ; voir Ex 15.14-16 ; Dt 2.25 ; 11.25 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'La renommée de David se répandit dans tous les pays ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' donna à toutes les nations sa frayeur.'
