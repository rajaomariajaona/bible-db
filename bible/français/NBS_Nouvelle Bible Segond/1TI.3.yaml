document_id: 1TI.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Cette parole est certaine 1.15+ ; l''expression pourrait aussi se rattacher à ce qui suit. –  la charge d''épiscope  : le terme grec correspondant est dérivé du mot épiskopos (proprement surveillant, inspecteur ), qui donnera notre mot évêque  ; dans le N.T. la fonction qu''il désigne n''est probablement pas encore l’« épiscopat » tel qu''il s''est défini dans la tradition ultérieure de l''Eglise ; cf. Ac 1.20n  ; 20.17,28n  ; Ph 1.1 ; 1P 2.25n  ; voir aussi 1Co 6.4 ; 14.1 ; 1Th 5.12 ; Hé 13.17. –  désire ou aspire à  : cf. 6.10n  ; Hé 11.16. –  une belle œuvre  : cf. 5.10n,25 ; 6.18 ; Tt 2.7,14 ; 3.8,14.'
  - type: text
    content: Cette parole est certaine.
  - type: heading
    content: Les responsables de la communauté
  - type: text
    content: 'Si quelqu''un aspire à la charge d''épiscope, il désire une belle œuvre. '
  '10':
  - type: note
    content: 'Qu''on les mette… à l''épreuve  : autres traductions qu''on les examine ; qu''ils soient d''abord éprouvés et approuvés  ; sur le verbe correspondant, voir Rm 1.28n  ; cf. 1Co 16.3n  ; 1Th 2.4n. –  sans reproche v. 2n  ; même terme 1Co 1.8 ; Col 1.22 ; Tt 1.6s.'
  - type: text
    content: Qu'on les mette d'abord à l'épreuve et qu'ils exercent ensuite le ministère, s'ils sont sans reproche.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'les femmes  : il s''agit probablement, ou bien de femmes ministres (v. 8n  ; cf. Rm 16.1n), ou bien des femmes des ministres (cf. v. 12) ; cf. Lc 8.3. –  dignes v. 8n. –  médisantes  : le mot grec est habituellement transcrit diable (cf. démon, diable, Satan) ; cf. v. 6n  ; 2Tm 3.3 ; Tt 2.3. –  sobres v. 2n. –  dignes de confiance  : autre traduction fidèles  ; cf. 1.12+. –  en tout  : cf. 5.10.'
  - type: text
    content: 'Que les femmes, de même, soient dignes, non médisantes, sobres, dignes de confiance en tout. '
  '12':
  - type: note
    content: V. 2n,4+.
  - type: text
    content: 'Les ministres doivent être hommes d''une seule femme et bien diriger leurs enfants et leur propre maison. '
  '13':
  - type: note
    content: 'exercé le ministère ou servi  ; cf. Mc 10.43-45/ / ; Lc 10.40 ; Jn 12.2 ; 2Tm 1.18 ; 1P 4.10s. –  un beau rang  : cf. 5.17 ; voir aussi Lc 12.44ss ; 16.10ss ; 19.17. –  assurance Ac 2.29n  ; 6.8 ; 2Co 3.12+.'
  - type: text
    content: Car ceux qui ont bien exercé le ministère s'acquièrent un beau rang et une grande assurance par la foi qui est en Jésus-Christ.
  - type: heading
    content: Le mystère de la piété
  '14':
  - type: text
    content: ' '
  - type: note
    content: 4.13.
  - type: text
    content: 'Je t''écris cela avec l''espoir que je viendrai bientôt te voir ; '
  '15':
  - type: note
    content: 'si je tarde  : le même verbe est traduit par retarder en 2P 3.9. –  la (ou une) maison de Dieu  : cf. v. 4ns ; Hé 3.6+ ; 1P 4.7 ; voir aussi 1Co 3.9,16 ; 6.19 ; Ga 6.10 ; Ep 2.19ss ; 2Tm 2.20. – Voir Eglise. –  Dieu vivant 4.10 ; Rm 9.26 ; 2Co 3.3 ; 6.16 ; 1Th 1.9 ; cf. Os 2.1 ; 1P 2.4s. –  colonne…  : d''autres comprennent toi qui es colonne…  ; sur l''image de la colonne, cf. Jr 1.18 ; Ga 2.9 ; Ap 3.12 ; voir aussi 1R 7.15ss. –  appui  : certains comprennent fondation (cf. 1Co 4.10ss ; Ep 2.20) ; le mot grec n''apparaît nulle part ailleurs. –  vérité 2.4+.'
  - type: text
    content: 'mais si je tarde, tu sauras ainsi comment il faut se conduire dans la maison de Dieu, qui est l''Eglise du Dieu vivant, la colonne et l''appui de la vérité. '
  '16':
  - type: note
    content: 'Il s''agit probablement d''une hymne ; cf. 1.17+ ; Ep 5.14 ; Ph 2.6ss ; 2Tm 2.11ss. –  il faut le reconnaître ou le déclarer, le confesser  : un terme apparenté est traduit par acte de reconnaissance en 6.12ns. –  mystère v. 9+ ; cf. Dn 2.28,47 ; Mc 4.11/ / ; Rm 16.25+s ; 1Co 2.1,7 ; Ep 1.9s ; 3.3ss ; 6.19 ; Col 1.26s ; 2.2s ; 4.3 ; 2Th 2.7 ; Ap 10.7. –  piété 2.2n. –  grand  : cf. Ep 5.32 ; voir aussi Ac 19.34. –  Il s''est  : les meilleurs mss portent un masculin, qui renvoie probablement au Christ ; certains mss ont le neutre, qui renverrait au mystère. –  s''est manifesté  : litt. a été manifesté, cf. Col 3.3s ; voir aussi Jn 2.11+ ; 2Tm 1.10+ ; Hé 9.26 ; 1P 1.20 ; 1Jn 1.2+. –  dans la chair  : autre traduction par la chair  ; cf. Jn 1.14 ; Rm 1.3 ; Col 1.22 ; Hé 2.14 ; voir aussi Lc 24.39. –  justifié Mt 11.19 ; Jn 16.10. –  dans l''Esprit ou en esprit, par l''Esprit, cf. Rm 1.4 ; 8.11 ; 1Co 6.11 ; Hé 9.14 ; 1P 3.18. –  est apparu  : autre terme caractéristique des théophanies ou manifestations de la divinité ; cf. Lc 24.34 ; Ac 13.31 ; 1Co 15.5ss ; Hé 9.28. –  aux anges Lc 24.4 ; Ac 4.10 ; Ep 3.10 ; Ph 2.10 ; Col 2.15 ; Hé 1.4ss ; 1P 1.12. –  proclamé 2.7n  ; cf. Col 1.6,23 ; Ga 2.2. –  les nations ou les non-Juifs Mt 4.15n  ; 28.19 ; Rm 16.26 ; Ep 3.8 ; 2Tm 4.17. –  cru Rm 10.10 ; 2Th 1.10. –  monde  : cf. Jn 1.10n  ; 3.16s ; 12.32 ; 17.21 ; 1Jn 5.4s. –  enlevé ou élevé Mc 16.19 ; Lc 9.51 ; Ac 1.2,11,22 ; cf. Jn 3.13 ; 6.62 ; 20.17 ; Ep 4.10 ; Hé 6.20 ; 9.12,24 ; 1P 3.22. –  gloire 1Co 2.8 ; 2Co 3.18.'
  - type: text
    content: 'Et, il faut le reconnaître, le mystère de la piété est grand :'
  - type: text
    content: Il s'est manifesté dans la chair,
  - type: text
    content: il a été justifié dans l'Esprit,
  - type: text
    content: il est apparu aux anges,
  - type: text
    content: il a été proclamé parmi les nations,
  - type: text
    content: il a été cru dans le monde,
  - type: text
    content: il a été enlevé dans la gloire.
  '2':
  - type: note
    content: 'Tt 1.5ss. –  irrépréhensible v. 7 ; même terme 5.7 ; 6.14 (sans reproche) ; synonymes v. 10+ ; Ph 2.15 ; 1Th 3.13 ; cf. Ac 6.3. –  l''homme d''une seule femme  : autre traduction mari d''une seule femme  ; certains comprennent qu''il n''ait été marié qu''une fois  ; v. 12 ; 5.9 ; Tt 1.6 ; cf. Lv 21.14 ; Mt 19.1ss. –  sobre v. 11 ; Tt 2.2 ; verbes apparentés en 1Co 15.34 (se ressaisir) ; 1Th 5.6,8 ; 2Tm 2.26 (revenir à son bon sens) ; 4.5 ; 1P 1.13 ; 4.7 ; 5.8. –  pondéré  : cf. 2.9n  ; Tt 1.8 ; 2.2,4-6. –  décent ou courtois, poli  ; voir 2.9n. –  hospitalier  : le terme grec signifie étymologiquement ami de l''étranger, cf. 5.10+ ; Rm 12.13n. –  apte à l''enseignement  : cf. 5.17 ; 2Tm 2.24 ; Tt 1.9 ; voir aussi 1Co 12.29 ; Jc 3.1.'
  - type: text
    content: 'Il faut donc que l''épiscope soit irrépréhensible, qu''il soit l''homme d''une seule femme, qu''il soit sobre, pondéré, décent, hospitalier, apte à l''enseignement, '
  '3':
  - type: note
    content: 'adonné au vin (cf. v. 8 ; voir aussi Lv 10.8ss ; 1Co 5.11 ; 6.10 ; 11.21 ; Ep 5.18) / violent Lc 12.42ss ; cf. 2Tm 2.25. –  conciliant 2Co 10.1 ; Ph 4.5n  ; Tt 3.2 ; Jc 3.17 ; 1P 2.18. –  pacifique  : litt. non querelleur, cf. 2Tm 2.23s ; Tt 3.2,9. –  désintéressé  : litt. non ami de l''argent, cf. Hé 13.5 ; voir aussi Lc 16.10-14 ; Jn 12.6 ; 1Co 13.5.'
  - type: text
    content: 'qu''il ne soit pas adonné au vin, ni violent, mais conciliant, pacifique, désintéressé ; '
  '4':
  - type: note
    content: dirige ou s'occupe (bien) de v. 5,12 ; 5.17 ; Rm 12.8n  ; 1Th 5.12 ; Tt 3.8n. – La maison (au sens de maisonnée) comprenait les enfants, mais aussi, le cas échéant, les esclaves ; cf. 5.8 ; Ac 10.2n. –  dignité 2.2+.
  - type: text
    content: 'qu''il dirige bien sa propre maison et qu''il tienne ses enfants dans la soumission, en toute dignité. '
  '5':
  - type: note
    content: 'Cf. 1S 2.12ss ; Lc 12.42 ; 16.10. –  maison (v. 4n) / Eglise v. 15 ; cf. Ep 2.19. –  prendra-t-il soin…  : cf. Ac 20.28.'
  - type: text
    content: 'En effet, si quelqu''un ne sait pas diriger sa propre maison, comment prendra-t-il soin de l''Eglise de Dieu ? '
  '6':
  - type: note
    content: 'nouveau converti  : le terme grec, qui a donné notre mot néophyte, signifie étymologiquement jeune plant (cf. 1Co 3.6,9 ; terme apparenté Rm 6.5n) ; voir aussi Ac 21.16. –  aveuglé par l''orgueil  : autre traduction gonflé d''orgueil  ; même verbe 6.4 ; 2Tm 3.4 ; voir aussi 1P 5.3. –  le jugement du diable (v. 7,11n  ; 2Tm 2.26 ; 3.3 ; Tt 2.3 ; cf. Ep 4.27 ; 6.11 ; voir démon, diable, Satan) : ou bien le châtiment infligé au diable (cf. Lc 10.18 ; Jn 12.31 ; Rm 16.20 ; Ap 12.7ss ; 20.10 ; voir aussi Es 14.12ss ; Ez 28.17), ou bien le châtiment exécuté par le diable (v. 7 ; 1.20+). D''autres comprennent et qu''il ne tombe sous le coup de la médisance (v. 11n).'
  - type: text
    content: 'Que ce ne soit pas un nouveau converti, de peur qu''il ne soit aveuglé par l''orgueil et ne tombe dans le jugement du diable. '
  '7':
  - type: note
    content: 'Cf. v. 2 ; 2Co 8.21 ; voir aussi Rm 12.17 ; 1Co 10.32 ; Ph 2.15 ; Tt 2.5,8 ; 1P 2.13 ; 3.1. –  que ceux…  : litt. qu''il ait un beau témoignage (Ac 6.3) de la part de ceux du dehors (Mc 4.11+ ; Col 4.5 ; 1Th 4.12). –  pièges du diable 2Tm 2.26.'
  - type: text
    content: Il faut aussi que ceux du dehors lui rendent un beau témoignage, pour qu'il ne tombe pas dans le discrédit et dans les pièges du diable.
  - type: heading
    content: Les ministres
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ministres ou serviteurs  : le terme grec ( diakonos , qui donnera diacre ) désigne ici une fonction précise, subalterne par rapport à celle de l''épiscope ; les ministres s''occupaient vraisemblablement de tâches pratiques au sein de la communauté, notamment auprès des nécessiteux ; cf. Ph 1.1 ; voir aussi Ac 6.1ss. –  dignes v. 4 ; 2.2n. –  exempts de duplicité  : litt. non doubles de langage  ; cf. Jc 1.8n  ; voir aussi 2Co 1.17ss. D''autres comprennent non bavards . –  excès de vin  : cf. v. 3. –  gains honteux Tt 1.7,11 ; 1P 5.2 ; cf. Mc 12.40 ; Lc 16.9ss.'
  - type: text
    content: 'Les ministres, pareillement, doivent être dignes, exempts de duplicité, d''excès de vin et de gains honteux ; '
  '9':
  - type: note
    content: 'le mystère de la foi  : cf. v. 16+ ; 1Co 4.1 ; voir aussi Rm 16.25+. –  conscience pure  : cf. 1.5+,19 ; voir aussi Ac 23.1+ ; 2Tm 1.3 ; Hé 9.14 ; 10.2,22 ; 13.18.'
  - type: text
    content: 'ils doivent conserver le mystère de la foi dans une conscience pure. '
