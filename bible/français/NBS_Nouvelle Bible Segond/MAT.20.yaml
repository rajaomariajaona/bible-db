    marker-yv: yv-n
  - type: text
    text: 'Tandis qu''il montait à Jérusalem, Jésus prit à part les douze disciples et leur dit en chemin : '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.21+ ; Lc 9.51+ ; cf. Ac 20.22s. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
