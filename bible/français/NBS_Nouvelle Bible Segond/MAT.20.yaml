    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.21+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se réveillera '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
