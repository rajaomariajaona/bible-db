  children:
  - type: text
    text: Les ouvriers de la dernière heure
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un maître de maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un homme, un maître de maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.52+ ; 21.33ss.
    marker-yv: yv-n
  - type: text
    text: 'Voici en effet à quoi le règne des cieux est semblable : un maître de maison qui était sorti de bon matin embaucher des ouvriers pour sa vigne. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mit d''accord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 13 ; 18.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un denier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies) : c''était un salaire convenable ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tobit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.15 parle d’« une drachme par jour » (la drachme, à l'époque romaine, était d'une valeur légèrement inférieure au denier).
    marker-yv: yv-n
  - type: text
    text: 'Il se mit d''accord avec les ouvriers pour un denier par jour et les envoya dans sa vigne. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: troisième heure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : entre 8 h et 9 h du matin environ.'
    marker-yv: yv-n
  - type: text
    text: 'Il sortit vers la troisième heure, en vit d''autres qui étaient sur la place sans rien faire '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 3.8 ; Col 4.1 ; voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et leur dit : « Allez dans la vigne, vous aussi, et je vous donnerai ce qui est juste. » '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sixième
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : vers midi. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: neuvième heure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : entre 14 h et 15 h environ.'
    marker-yv: yv-n
  - type: text
    text: 'Ils y allèrent. Il sortit encore vers la sixième, puis vers la neuvième heure, et il fit de même. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: onzième heure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : entre 16 h et 17 h environ ; cf. Jn 9.4.'
    marker-yv: yv-n
  - type: text
    text: 'Vers la onzième heure il sortit encore, en trouva d''autres qui se tenaient là et leur dit : « Pourquoi êtes-vous restés ici toute la journée sans rien faire ? » '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Ils lui répondirent : « C''est que personne ne nous a embauchés. – Allez dans la vigne, vous aussi », leur dit-il. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le soir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 19.13 ; Dt 24.14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur salaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme est traduit habituellement par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'récompense '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (5.12+).
    marker-yv: yv-n
  - type: text
    text: 'Le soir venu, le maître de la vigne dit à son intendant : « Appelle les ouvriers et paie-leur leur salaire, en allant des derniers aux premiers. » '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Ceux de la onzième heure vinrent et reçurent chacun un denier. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les premiers vinrent ensuite, pensant recevoir davantage, mais ils reçurent, eux aussi, chacun un denier. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 15.29ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maugréer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 5.30 ; Jn 6.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En le recevant, ils se mirent à maugréer contre le maître de maison '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'et dirent : « Ces derniers venus n''ont fait qu''une heure, et tu les traites à l''égal de nous, qui avons supporté le poids du jour et la chaleur ! » '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mon ami
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: compagnon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 11.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 22.12 ; 26.50. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mis d''accord '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2.
    marker-yv: yv-n
  - type: text
    text: 'Il répondit à l''un d''eux : « Mon ami, je ne te fais pas de tort ; ne t''es-tu pas mis d''accord avec moi pour un denier ? '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1S 30.21-25.
    marker-yv: yv-n
  - type: text
    text: 'Prends ce qui est à toi et va-t''en. Je veux donner à celui qui est le dernier autant qu''à toi. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'verrais-tu… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ton œil est-il mauvais '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (6.23
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parce que, moi, je suis bon ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Rm 9.15.
    marker-yv: yv-n
  - type: text
    text: 'Ne m''est-il pas permis de faire de mes biens ce que je veux ? Ou bien verrais-tu d''un mauvais œil que je sois bon ? » '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 19.30 ; 21.31s.
    marker-yv: yv-n
  - type: text
    text: C'est ainsi que les derniers seront premiers et les premiers derniers.
