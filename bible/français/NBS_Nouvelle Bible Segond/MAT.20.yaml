  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.2 ; Jn 18.30,35 ; Ac 2.23 ; cf. Ac 21.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se moquent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '27.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fouettent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jn 19.1. –  '
    - type: usfm
