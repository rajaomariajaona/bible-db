    marker-yv: yv-n
  - type: text
    text: 'Il leur répondit : Ma coupe, vous la boirez, mais pour ce qui est de s''asseoir à ma droite et à ma gauche, ce n''est pas à moi de le donner ; les places sont à ceux pour qui elles ont été préparées par mon Père.'
