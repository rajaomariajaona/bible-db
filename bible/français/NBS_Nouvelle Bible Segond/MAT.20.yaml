    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Vous, cherchez à croître à partir de ce qui est petit et, de plus grand, à devenir moindre. Quand vous entrez où vous avez été invités à dîner, ne vous installez pas aux places les plus en vue, de peur que quelqu''un de plus honorable que toi n''arrive et que l''hôte ne vienne te dire : « Redescends » ; cela te ferait honte. Mais si tu t''installes à la dernière '
