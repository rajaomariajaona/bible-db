    marker-yv: yv-n
  - type: text
    text: 'Il lui dit : Que veux-tu ? – Ordonne, lui dit-elle, que mes deux fils que voici s''assoient l''un à ta droite et l''autre à ta gauche dans ton royaume. '
  - type: usfm
