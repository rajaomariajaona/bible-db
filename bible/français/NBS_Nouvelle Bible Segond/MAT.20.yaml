      children:
      - type: text
        text: '2.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'condamneront à mort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 26.66 ; Jn 19.7.
    marker-yv: yv-n
  - type: text
    text: 'Nous montons à Jérusalem ; le Fils de l''homme sera livré aux grands prêtres et aux scribes. Ils le condamneront à mort '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
