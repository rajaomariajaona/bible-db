document_id: MAT.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les ouvriers de la dernière heure
  - type: text
    content: ' '
  - type: note
    content: 'un maître de maison  : litt. un homme, un maître de maison 13.52+ ; 21.33ss.'
  - type: text
    content: 'Voici en effet à quoi le règne des cieux est semblable : un maître de maison qui était sorti de bon matin embaucher des ouvriers pour sa vigne. '
  '10':
  - type: text
    content: 'Les premiers vinrent ensuite, pensant recevoir davantage, mais ils reçurent, eux aussi, chacun un denier. '
  '11':
  - type: note
    content: Cf. Lc 15.29ss. –  maugréer Lc 5.30 ; Jn 6.41n.
  - type: text
    content: 'En le recevant, ils se mirent à maugréer contre le maître de maison '
  '12':
  - type: text
    content: 'et dirent : « Ces derniers venus n''ont fait qu''une heure, et tu les traites à l''égal de nous, qui avons supporté le poids du jour et la chaleur ! » '
  '13':
  - type: note
    content: 'Mon ami  : litt. compagnon, 11.16n  ; 22.12 ; 26.50. –  mis d''accord v. 2.'
  - type: text
    content: 'Il répondit à l''un d''eux : « Mon ami, je ne te fais pas de tort ; ne t''es-tu pas mis d''accord avec moi pour un denier ? '
  '14':
  - type: note
    content: Cf. 1S 30.21-25.
  - type: text
    content: 'Prends ce qui est à toi et va-t''en. Je veux donner à celui qui est le dernier autant qu''à toi. '
  '15':
  - type: note
    content: verrais-tu… ou ton œil est-il mauvais (6.23n) parce que, moi, je suis bon ? Cf. Rm 9.15.
  - type: text
    content: 'Ne m''est-il pas permis de faire de mes biens ce que je veux ? Ou bien verrais-tu d''un mauvais œil que je sois bon ? » '
  '16':
  - type: note
    content: 19.30 ; 21.31s.
  - type: text
    content: C'est ainsi que les derniers seront premiers et les premiers derniers.
  - type: heading
    content: Jésus annonce une troisième fois sa mort et sa résurrection
  - type: heading
    content: Mc 10.32-34  ; Lc 18.31-34
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Tandis qu''il montait  : certains mss portent comme il allait monter . –  les douze disciples  : certains mss portent seulement les Douze.'
  - type: text
    content: 'Tandis qu''il montait à Jérusalem, Jésus prit à part les douze disciples et leur dit en chemin : '
  '18':
  - type: note
    content: 16.21+ ; Lc 9.51+ ; cf. Ac 20.22s. –  Fils de l'homme v. 28 ; 8.20n. –  grands prêtres / scribes 2.4n. –  condamneront à mort 26.66 ; Jn 19.7.
  - type: text
    content: 'Nous montons à Jérusalem ; le Fils de l''homme sera livré aux grands prêtres et aux scribes. Ils le condamneront à mort '
  '19':
  - type: note
    content: aux non-Juifs 27.2 ; Jn 18.30,35 ; Ac 2.23 ; cf. Ac 21.11. –  se moquent 27.29. –  fouettent Jn 19.1. –  crucifient 10.38. –  troisième jour 16.21+. –  se réveillera ou ressuscitera 17.9n.
  - type: text
    content: et le livreront aux non-Juifs, pour qu'ils se moquent de lui, le fouettent et le crucifient ; et le troisième jour il se réveillera.
  - type: heading
    content: La demande de la mère des fils de Zébédée
  - type: heading
    content: Mc 10.35-41
  '2':
  - type: note
    content: 'mit d''accord v. 13 ; 18.19n. –  un denier (voir mesures, poids et monnaies) : c''était un salaire convenable ; Tobit 5.15 parle d’« une drachme par jour » (la drachme, à l''époque romaine, était d''une valeur légèrement inférieure au denier).'
  - type: text
    content: 'Il se mit d''accord avec les ouvriers pour un denier par jour et les envoya dans sa vigne. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 4.21 ; 27.56. –  se prosterna 2.2n  ; voir culte.
  - type: text
    content: 'Alors la mère des fils de Zébédée s''approcha de lui avec ses fils et se prosterna pour lui faire une demande. '
  '21':
  - type: note
    content: 'Ordonne  : litt. dis. –  s''assoient 19.28. –  ton royaume 13.41 ; 16.28 ; Lc 1.33 ; 22.29 ; 23.42 ; Jn 18.36.'
  - type: text
    content: 'Il lui dit : Que veux-tu ? – Ordonne, lui dit-elle, que mes deux fils que voici s''assoient l''un à ta droite et l''autre à ta gauche dans ton royaume. '
  '22':
  - type: note
    content: coupe 26.39,42 ; Jn 18.11+.
  - type: text
    content: 'Jésus répondit : Vous ne savez pas ce que vous demandez. Pouvez-vous boire la coupe que, moi, je vais boire ? – Nous le pouvons, dirent-ils. '
  '23':
  - type: note
    content: 'Ma coupe, vous la boirez Ac 12.2 ; Ap 1.9 ; cf. Rm 8.17 ; Ph 3.10 ; 1Th 3.3. –  droite / gauche 27.38. –  les places sont  : sous-entendu dans le texte ; autre traduction ce n''est pas à moi de le donner, sinon à ceux pour qui cela a été préparé  ; cf. 25.34.'
  - type: text
    content: 'Il leur répondit : Ma coupe, vous la boirez, mais pour ce qui est de s''asseoir à ma droite et à ma gauche, ce n''est pas à moi de le donner ; les places sont à ceux pour qui elles ont été préparées par mon Père.'
  - type: heading
    content: Mc 10.42-45  ; Lc 22.24-27
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Les dix autres  : litt. les dix.'
  - type: text
    content: 'Les dix autres, qui avaient entendu cela, s''indignèrent contre les deux frères. '
  '25':
  - type: note
    content: '1Co 2.6. –  des nations  : autre traduction des non-Juifs, 4.15n.'
  - type: text
    content: 'Jésus les appela et dit : Vous savez que les chefs des nations dominent sur elles en seigneurs, et que les grands leur font sentir leur autorité. '
  '26':
  - type: note
    content: Le terme traduit ici par serviteur a donné notre mot diacre. Il désigne un assistant (22.13). C'est un verbe apparenté qui est traduit par servir au v. 28 (voir 4.11n). De même en 23.11 ; Mc 9.35.
  - type: text
    content: 'Il n''en sera pas de même parmi vous. Au contraire, quiconque veut devenir grand parmi vous sera votre serviteur '
  '27':
  - type: note
    content: 1Co 9.19 ; 2Co 4.5 ; 3Jn 9.
  - type: text
    content: 'et quiconque veut être le premier parmi vous sera votre esclave. '
  '28':
  - type: note
    content: 'servir v. 26n  ; Ph 2.7. –  vie (sur le terme, voir 10.28n) ; cf. Jn 10.18 ; 1Jn 3.16. –  rançon (ou rédemption  ; autre traduction pour délivrer) / une multitude ou beaucoup 1Tm 2.6 ; Es 53.10ss ; voir aussi Rm 5.15 ; Hé 2.10 ; Ap 5.9. – A la fin du v. certains mss occidentaux (voir introduction aux Actes des Apôtres, p.$) ajoutent  : Vous, cherchez à croître à partir de ce qui est petit et, de plus grand, à devenir moindre. Quand vous entrez où vous avez été invités à dîner, ne vous installez pas aux places les plus en vue, de peur que quelqu''un de plus honorable que toi n''arrive et que l''hôte ne vienne te dire : « Redescends » ; cela te ferait honte. Mais si tu t''installes à la dernière (ou moindre) place et que quelqu''un d''inférieur (ou de moindre) arrive, l''hôte te dira : « Monte », et cela sera à ton avantage (cf. Lc 14.8ss).'
  - type: text
    content: C'est ainsi que le Fils de l'homme n'est pas venu pour être servi, mais pour servir et donner sa vie en rançon pour une multitude.
  - type: heading
    content: Jésus guérit deux aveugles à Jéricho
  - type: heading
    content: Mc 10.46-52  ; Lc 18.35-43  ; cf. Mt 9.27-31
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.27-31.
  - type: text
    content: 'Lorsqu''ils sortirent de Jéricho, une grande foule le suivit. '
  '3':
  - type: note
    content: 'troisième heure  : entre 8 h et 9 h du matin environ.'
  - type: text
    content: 'Il sortit vers la troisième heure, en vit d''autres qui étaient sur la place sans rien faire '
  '30':
  - type: note
    content: 'Deux 8.28+. –  Seigneur  : le terme correspondant est absent de certains mss. –  Fils de David 9.27+.'
  - type: text
    content: 'Deux aveugles assis au bord du chemin entendirent que Jésus passait et crièrent : Aie compassion de nous, Seigneur, Fils de David ! '
  '31':
  - type: note
    content: les rabrouait 8.26n  ; cf. 19.13/ /.
  - type: text
    content: 'La foule les rabrouait pour les faire taire, mais ils n''en crièrent que plus fort : Aie compassion de nous, Seigneur, Fils de David ! '
  '32':
  - type: text
    content: 'Jésus s''arrêta, les appela et dit : Que voulez-vous que je fasse pour vous ? '
  '33':
  - type: text
    content: 'Ils lui dirent : Seigneur, que nos yeux s''ouvrent ! '
  '34':
  - type: note
    content: Emu 9.36n.
  - type: text
    content: Emu, Jésus leur toucha les yeux ; aussitôt ils retrouvèrent la vue et le suivirent.
  '4':
  - type: note
    content: 1Co 3.8 ; Col 4.1 ; voir justice.
  - type: text
    content: 'et leur dit : « Allez dans la vigne, vous aussi, et je vous donnerai ce qui est juste. » '
  '5':
  - type: note
    content: 'sixième  : vers midi. –  neuvième heure  : entre 14 h et 15 h environ.'
  - type: text
    content: 'Ils y allèrent. Il sortit encore vers la sixième, puis vers la neuvième heure, et il fit de même. '
  '6':
  - type: note
    content: 'onzième heure  : entre 16 h et 17 h environ ; cf. Jn 9.4.'
  - type: text
    content: 'Vers la onzième heure il sortit encore, en trouva d''autres qui se tenaient là et leur dit : « Pourquoi êtes-vous restés ici toute la journée sans rien faire ? » '
  '7':
  - type: text
    content: 'Ils lui répondirent : « C''est que personne ne nous a embauchés. – Allez dans la vigne, vous aussi », leur dit-il. '
  '8':
  - type: note
    content: 'Le soir Lv 19.13 ; Dt 24.14s. –  maître 12.8n. –  leur salaire  : le terme est traduit habituellement par récompense (5.12+).'
  - type: text
    content: 'Le soir venu, le maître de la vigne dit à son intendant : « Appelle les ouvriers et paie-leur leur salaire, en allant des derniers aux premiers. » '
  '9':
  - type: text
    content: 'Ceux de la onzième heure vinrent et reçurent chacun un denier. '
