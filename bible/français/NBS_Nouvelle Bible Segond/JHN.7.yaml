document_id: JHN.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les frères de Jésus ne croient pas en lui
  - type: text
    content: ' '
  - type: note
    content: 'parcourait  : litt. marchait (en) , cf. 6.66. –  Galilée 1.43+. –  les Juifs 1.19n. –  cherchaient à le tuer 5.18+.'
  - type: text
    content: Après cela, Jésus parcourait la Galilée ; en effet, il ne voulait pas parcourir la Judée, parce que les Juifs cherchaient à le tuer.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4. –  manifestement ou ouvertement , cf. Mc 1.45n. –  comme en secret  : certains mss portent en secret.'
  - type: text
    content: 'Mais quand ses frères furent montés à la fête, alors il y monta lui aussi, non pas manifestement, mais comme en secret. '
  '11':
  - type: note
    content: Cf. 11.56.
  - type: text
    content: 'Les Juifs le cherchaient pendant la fête et disaient : Où est-il, celui-là ? '
  '12':
  - type: note
    content: 'dans les foules  : certains mss portent dans la foule. –  murmures ou contestations, cf. v. 32 ; voir 6.41n. –  C''est un homme de bien  : litt. il est bon, cf. Mt 12.35 ; Mc 10.17s ; Lc 23.50. –  il égare la foule  : cf. v. 47 ; Mt 27.63n.'
  - type: text
    content: 'Il y avait dans les foules beaucoup de murmures à son sujet. Les uns disaient : C''est un homme de bien. D''autres disaient : Au contraire, il égare la foule. '
  '13':
  - type: note
    content: 'crainte des Juifs (1.19n) : 9.22 ; 19.38 ; 20.19.'
  - type: text
    content: Personne, toutefois, ne parlait ouvertement de lui, par crainte des Juifs.
  '14':
  - type: text
    content: ' '
  - type: note
    content: au temple… il enseignait Mc 12.35+.
  - type: text
    content: 'On était déjà au milieu de la fête quand Jésus monta au temple ; là, il enseignait. '
  '15':
  - type: note
    content: étonnés Mt 8.27+. –  Comment connaît-il les Ecrits ou les Ecritures, litt. les lettres  ; même terme en 5.47 (aussi 2Tm 3.15) ; cf. Jn 5.39+ (mot différent mais apparenté) ; autre traduction comment peut-il être aussi instruit ? (le même terme est traduit par érudition en Ac 26.24) ; cf. Mt 7.28 ; 13.54/ / ; Lc 2.47 ; Ac 4.13.
  - type: text
    content: 'Les Juifs, étonnés, se demandaient : Comment connaît-il les Ecrits, lui qui n''a pas étudié ? '
  '16':
  - type: note
    content: Voir 3.34+ ; 5.19+.
  - type: text
    content: 'Jésus leur répondit : Mon enseignement n''est pas de moi, mais de celui qui m''a envoyé. '
  '17':
  - type: note
    content: '12.49+ ; cf. Nb 16.28. –  de ma propre initiative  : litt. de moi-même, aussi au v. 18.'
  - type: text
    content: 'Si quelqu''un veut faire sa volonté, il saura si cet enseignement vient de Dieu ou si c''est moi qui parle de ma propre initiative. '
  '18':
  - type: note
    content: gloire 5.44+.
  - type: text
    content: Celui qui parle de sa propre initiative cherche sa propre gloire ; mais celui qui cherche la gloire de celui qui l'a envoyé est vrai, et il n'y a pas d'injustice en lui.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Moïse / loi 1.17 ; 5.45+. –  aucun de vous ne met la loi en pratique (litt. ne fait la loi ) : cf. Ac 7.53 ; Rm 2.17-23. –  cherchez-vous… 5.18+.'
  - type: text
    content: 'Moïse ne vous a-t-il pas donné la loi ? Pourtant aucun de vous ne met la loi en pratique. Pourquoi cherchez-vous à me tuer ? '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la fête juive…  : litt. la fête des Juifs (5.1n) , celle des Tentes (cf. 1.14n), autre nom de la fête des Huttes (voir calendrier et fêtes) ; cf. Lv 23.34-44 ; Nb 29.12-39 ; Dt 16.13-16 ; Za 14.16-19.'
  - type: text
    content: 'Or la fête juive des Tentes était proche. '
  '20':
  - type: note
    content: Tu as un démon 8.48,52 ; 10.20 ; cf. Mt 11.18/ / ; 12.24-27/ / ; Mc 3.22+.
  - type: text
    content: 'La foule répondit : Tu as un démon ! Qui cherche à te tuer ? '
  '21':
  - type: note
    content: 'une seule œuvre  : cf. 5.1-16.'
  - type: text
    content: 'Jésus leur répondit : J''ai fait une seule œuvre et vous en êtes tous étonnés. '
  '22':
  - type: note
    content: 'la circoncision Gn 17.10-12 ; Lv 12.3 ; Ac 7.8 ; Rm 4.11. –  des pères, c.-à-d. des patriarches, cf. 6.31+. –  pendant le sabbat  : si celui-ci tombait le huitième jour de l''enfant ; cf. Mt 12.5.'
  - type: text
    content: 'Moïse vous a donné la circoncision, – non qu''elle vienne de Moïse, puisqu''elle vient des pères – et vous circoncisez un homme pendant le sabbat. '
  '23':
  - type: note
    content: 'ne soit pas annulée ou violée  : cf. 5.18n  ; 10.35. –  vous irritez-vous  : le verbe grec correspondant n''apparaît qu''ici dans le N.T. –  qui ai (litt. parce que j''ai) rendu la santé… 5.8s,11n  ; cf. Mt 12.11-12/ /. –  un homme  : autre traduction un être humain (même terme v. 22).'
  - type: text
    content: 'Si un homme reçoit la circoncision pendant le sabbat, pour que la loi de Moïse ne soit pas annulée, pourquoi vous irritez-vous contre moi qui ai rendu la santé à un homme tout entier pendant le sabbat ? '
  '24':
  - type: note
    content: '8.15 ; cf. Lv 19.15 ; 1S 16.7 ; Es 11.3s ; Za 7.9. –  que votre jugement soit juste  : litt. jugez le juste jugement.'
  - type: text
    content: 'Ne jugez pas selon l''apparence : que votre jugement soit juste !'
  - type: heading
    content: Jésus est-il le Christ ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: '5.18+ ; cf. 7.20. –  qu''ils cherchent  : autre traduction qu''on cherche.'
  - type: text
    content: 'Quelques habitants de Jérusalem disaient : N''est-ce pas celui qu''ils cherchent à tuer ? '
  '26':
  - type: note
    content: 'ouvertement  : cf. v. 4n,10 ; 18.20. –  ils ne lui disent rien  : autre traduction on ne lui dit rien. –  les chefs…  : cf. v. 48 ; 3.1n  ; 9.27. –  compris ou reconnu  ; le verbe grec est habituellement traduit par connaître, savoir  ; ainsi v. 17,27 (saura), 49,51.'
  - type: text
    content: 'Le voici qui parle ouvertement, et ils ne lui disent rien ! Est-ce que les chefs auraient vraiment compris qu''il est le Christ ? '
  '27':
  - type: note
    content: 'Cf. v. 41 ; 6.42. –  d''où il est  : cf. v. 28 ; 8.14 ; 9.29s ; 19.9. –  quand il vient…  : autre traduction quand il viendra, personne ne saura…'
  - type: text
    content: 'Cependant, celui-ci, nous savons d''où il est ; le Christ, quand il vient, personne ne sait d''où il est ! '
  '28':
  - type: note
    content: Jésus… enseignait dans le temple Mc 12.35+. –  s'écria v. 37 ; 12.44. –  de moi-même 5.19+. –  est vrai 3.33+. –  vous ne le connaissez pas 8.19,55 ; 14.7 ; 15.21 ; 16.3.
  - type: text
    content: 'Alors Jésus, qui enseignait dans le temple, s''écria : Vous me connaissez, et vous savez d''où je suis ! Pourtant ce n''est pas de moi-même que je suis venu ; celui qui m''a envoyé est vrai, et vous, vous ne le connaissez pas. '
  '29':
  - type: note
    content: 'je viens  : litt. je suis  ; cf. 6.46 ; 8.55 ; 10.15 ; 17.25 ; Mt 11.27.'
  - type: text
    content: Moi, je le connais, car je viens de lui et c'est lui qui m'a envoyé.
  '3':
  - type: note
    content: 'Ses frères 2.12+. –  voient  : cf. 2.11+,23.'
  - type: text
    content: 'Ses frères lui dirent : Pars d''ici et va-t''en en Judée, pour que tes disciples aussi voient les œuvres que tu fais. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Ils cherchaient donc… v. 32,44 ; 8.20 ; 10.39 ; 11.57 ; cf. 5.18+ ; voir aussi Lc 4.29s. –  son heure… 2.4+ ; cf. 7.6,8.
  - type: text
    content: Ils cherchaient donc à l'arrêter, mais personne ne mit la main sur lui, parce que son heure n'était pas encore venue.
  '31':
  - type: text
    content: ' '
  - type: note
    content: beaucoup mirent leur foi en lui 2.23+. –  signes 2.11+,23n.
  - type: text
    content: 'Parmi la foule, beaucoup mirent leur foi en lui ; ils disaient : Le Christ, quand il viendra, produira-t-il plus de signes que celui-ci n''en a produit ?'
  - type: heading
    content: Des gardes sont envoyés pour arrêter Jésus
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 45 ; 11.47,57 ; 12.18s ; 18.3 ; Mt 12.23s. –  murmurer ou maugréer , cf. v. 12 ; 6.41n. –  grands prêtres / pharisiens cf. v 45 ; 11.47,57 ; 18.3 ; Mt 21.45 ; 27.62 ; voir aussi Mt 2.4n. –  des gardes 18.3,12,18,22,36n  ; 19.6 ; cf. Mt 5.25n. –  pour l'arrêter v. 30+.
  - type: text
    content: Les pharisiens entendirent la foule murmurer à son sujet. Alors les grands prêtres et les pharisiens envoyèrent des gardes pour l'arrêter.
  '33':
  - type: text
    content: ' '
  - type: note
    content: pour un peu de temps 12.35 ; 13.33 ; 14.19 ; 16.16-19. –  je m'en vais vers (1.1n)… 8.14,21s ; 13.3,33,36 ; 14.4s,28 ; 16.5,9s ; 17.11-13 ; cf. Mt 16.21/ /.
  - type: text
    content: 'Jésus dit : Je suis encore avec vous pour un peu de temps, et je m''en vais vers celui qui m''a envoyé. '
  '34':
  - type: note
    content: 'vous ne me trouverez pas  : certains mss portent seulement vous ne trouverez pas. –  je suis  : autre traduction je serai  ; 8.21 ; 13.33,36 ; 16.10 ; 17.24 ; cf. Dt 4.29 ; Pr 1.28 ; Lc 17.22n.'
  - type: text
    content: 'Vous me chercherez, mais vous ne me trouverez pas ; là où, moi, je suis, vous, vous ne pouvez pas venir. '
  '35':
  - type: note
    content: 'Cf. 8.22. –  ceux qui sont dispersés…  : litt. la dispersion (en grec diaspora, voir « La diaspora ou les Juifs hors de leur pays ») des Grecs. Ce dernier mot peut désigner ici soit les Juifs hellénisés habitant hors de leur pays, soit les non-Juifs  ; cf. 4.35-38 ; 12.20-24 ; Ac 6.1 ; 9.29 ; 11.1 ; 21.21 ; Jc 1.1n  ; 1P 1.1n.'
  - type: text
    content: 'Les Juifs se dirent entre eux : Où va-t-il se rendre, pour que, nous, nous ne le trouvions pas ? Va-t-il se rendre chez ceux qui sont dispersés parmi les Grecs et instruire les Grecs ? '
  '36':
  - type: note
    content: 'V. 34. –  Que signifie…  : litt. qu''est-ce que cette parole…'
  - type: text
    content: 'Que signifie cette parole qu''il a dite : « Vous me chercherez, mais vous ne me trouverez pas ; là où, moi, je suis, vous, vous ne pouvez pas venir. »'
  - type: heading
    content: Des fleuves d'eau vive
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'dernier jour / grand jour de la fête (v. 2) : cf. 19.31 ; Lv 23.36 ; Nb 29.32-38. Dans le judaïsme du temps de Jésus, la fête des Huttes comportait un rituel de l''eau, y compris une procession par laquelle on accompagnait l''eau de la source de Guihôn (Jn 9.7n) jusqu''à l''autel ; cf. Es 12.3n  ; Za 14.16-19 ; voir aussi calendrier et fêtes. –  s''écria v. 28+. –  Si quelqu''un a soif… 4.10-14 ; Es 12.3 ; 44.3 ; 49.10 ; 55.1 ; Ap 21.6+ ; cf. Mt 11.28. –  et qu''il boive  : autre traduction possible  : et qu''il boive (38), celui qui met sa foi en moi. Comme dit l''Ecriture : Des fleuves… –  Evangile selon Thomas 28 : « Jésus a dit : “Je me suis tenu debout au milieu du monde, et je me suis manifesté à eux dans la chair ; je les ai trouvés tous ivres ; je n''en ai trouvé aucun d''entre eux qui eût soif. Et mon âme s''est affligée pour les fils des hommes, parce qu''ils sont aveugles dans leur cœur, et n''arrivent pas à voir ; puisqu''ils sont venus dans le monde vides, et c''est vides aussi qu''ils cherchent à en sortir ; mais en ce moment ils sont ivres. Quand ils auront rejeté leur vin, ils se convertiront.” »'
  - type: text
    content: 'Le dernier jour, le grand jour de la fête, Jésus, debout, s''écria : Si quelqu''un a soif, qu''il vienne à moi et qu''il boive ! '
  '38':
  - type: note
    content: 'Cf. 4.14+ ; 19.34 ; Es 43.19s ; 58.11 ; Ez 47.1-12 ; Jl 4.18 ; Za 14.8 ; Pr 18.4 ; Ct 4.15. –  de son sein  : litt. de son ventre.'
  - type: text
    content: 'Celui qui met sa foi en moi, – comme dit l''Ecriture – des fleuves d''eau vive couleront de son sein. '
  '39':
  - type: note
    content: 'l''Esprit 14.16s+ ; 20.22 ; cf. Ac 2.4. –  ceux qui mettraient leur foi en lui  : certains mss portent ceux qui mettaient leur foi en lui. –  il n''y avait pas encore d''Esprit  : autre traduction il n''était pas encore question d''Esprit  ; certains mss portent l''Esprit saint n''avait pas encore été donné  ; cf. Ac 5.32. –  glorifié 11.3s ; 12.16,23,28 ; 13.31s ; 14.13 ; 17.1-5 ; cf. 1.14n.'
  - type: text
    content: Il dit cela au sujet de l'Esprit qu'allaient recevoir ceux qui mettraient leur foi en lui ; car il n'y avait pas encore d'Esprit, puisque Jésus n'avait pas encore été glorifié.
  - type: heading
    content: La foule se divise à cause de Jésus
  '4':
  - type: note
    content: 'en secret  : cf. v. 10 ; 11.54 ; 18.20. –  se mettre en évidence  : litt. être ouvertement, cf. v. 13,26 ; 10.24 ; 11.14,54 ; 16.25,29 ; 18.20 ; le même mot est traduit par assurance en Ac 2.29n  ; 1Jn 2.28+. –  manifeste-toi au monde 1.10n  ; 14.22 ; cf. 2.18+ ; Mt 12.16-19.'
  - type: text
    content: 'Personne n''agit en secret, s''il cherche à se mettre en évidence ; si tu fais ces choses, manifeste-toi au monde. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: le Prophète 1.21+.
  - type: text
    content: 'Des gens de la foule, après avoir entendu ces paroles, disaient : Vraiment, c''est lui, le Prophète ! '
  '41':
  - type: note
    content: le Christ / Galilée v. 52 ; 1.43+,46.
  - type: text
    content: 'D''autres disaient : C''est le Christ ! Mais d''autres disaient : Est-ce de Galilée que vient le Christ ? '
  '42':
  - type: note
    content: 2S 7.12 ; Jr 23.5 ; Mi 5.1 ; Ps 89.4s ; Mt 2.5s ; 22.42/ / ; Ac 13.23 ; Rm 1.3+.
  - type: text
    content: 'L''Ecriture ne dit-elle pas que le Christ vient de la descendance de David et de Bethléem, le village où était David ? '
  '43':
  - type: note
    content: 9.16 ; 10.19 ; cf. 3.19-21.
  - type: text
    content: 'Il y eut donc, à cause de lui, division parmi la foule. '
  '44':
  - type: note
    content: V. 30+.
  - type: text
    content: Quelques-uns d'entre eux voulaient l'arrêter, mais personne ne mit la main sur lui.
  - type: heading
    content: L'incrédulité des chefs
  '45':
  - type: text
    content: ' '
  - type: note
    content: grands prêtres / pharisiens v. 32+ ; voir aussi Mt 2.4n.
  - type: text
    content: 'Les gardes revinrent vers les grands prêtres et les pharisiens, qui leur dirent : Pourquoi ne l''avez-vous pas amené ? '
  '46':
  - type: note
    content: Cf. 18.6 ; Mt 7.28s.
  - type: text
    content: 'Les gardes répondirent : Jamais un homme n''a parlé ainsi. '
  '47':
  - type: note
    content: V. 12+.
  - type: text
    content: 'Les pharisiens leur répliquèrent : Est-ce que, vous aussi, vous vous êtes laissé égarer ? '
  '48':
  - type: note
    content: Cf. 12.42 ; Mt 21.32.
  - type: text
    content: 'Y a-t-il quelqu''un parmi les chefs ou les pharisiens qui ait mis sa foi en lui ? '
  '49':
  - type: note
    content: 'Cf. Dt 27.26 ; 28.15 ; Lc 11.52 ; voir aussi loi. –  maudits  : Ps 119.21 ; voir bénédiction, malédiction.'
  - type: text
    content: 'Mais cette foule qui ne connaît pas la loi, ce sont des maudits ! '
  '5':
  - type: note
    content: Comparer avec Ac 1.14.
  - type: text
    content: 'En effet, même ses frères ne mettaient pas leur foi en lui. '
  '50':
  - type: note
    content: 'qui était venu le trouver  : certains mss ajoutent de nuit  ; cf. 3.1s.'
  - type: text
    content: 'Nicodème, qui était venu le trouver précédemment et qui était l''un d''entre eux, leur dit : '
  '51':
  - type: note
    content: 'Dt 1.16s ; 19.18. –  un homme  : litt. l''homme.'
  - type: text
    content: 'Notre loi juge-t-elle un homme sans qu''on l''ait d''abord entendu et qu''on sache ce qu''il fait ? '
  '52':
  - type: note
    content: 'Cherche bien  : le même verbe est traduit par sonder en 5.39+. –  prophète / Galilée  : cf. v. 41+ ; 1.46 ; 2R 14.25n. –  ne vient  : litt. ne se lève, cf. 2.19n.'
  - type: text
    content: 'Ils lui répondirent : Serais-tu de Galilée, toi aussi ? Cherche bien, et tu verras qu''aucun prophète ne vient de Galilée.'
  - type: heading
    content: La femme adultère
  - type: text
    content: '[ '
  '53':
  - type: note
    content: La section qui débute ici et s'achève en 8.11 est omise par plusieurs mss ; d'autres la placent après 8.36, après 8.44, à la fin de Jn ou même dans Lc (après 21.37-38).
  - type: text
    content: Et chacun s'en alla chez soi.
  '6':
  - type: note
    content: 'Cf. 2.4+. –  temps ou moment  ; sur le terme correspondant (5.3n), voir Mc 1.15n. –  là  : litt. prêt.'
  - type: text
    content: 'Jésus leur dit : Mon temps n''est pas encore venu ; votre temps à vous est toujours là. '
  '7':
  - type: note
    content: moi, il me déteste 15.18+. –  que ses œuvres sont mauvaises 3.19s.
  - type: text
    content: 'Le monde ne peut pas vous détester ; moi, il me déteste, parce que je lui rends le témoignage que ses œuvres sont mauvaises. '
  '8':
  - type: note
    content: 'je ne monte pas  : certains mss portent  : je ne monte pas encore. –  temps / accompli  : cf. Mc 1.15 (mêmes termes grecs).'
  - type: text
    content: 'Montez, vous, à la fête. Moi, je ne monte pas à cette fête, parce que mon temps n''est pas encore accompli. '
  '9':
  - type: note
    content: 'Après avoir dit  : certains mss portent après leur avoir dit. –  en Galilée 7.1.'
  - type: text
    content: Après avoir dit cela, lui, il demeura en Galilée.
  - type: heading
    content: Jésus à la fête des Tentes
