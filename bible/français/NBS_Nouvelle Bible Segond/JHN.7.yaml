        text: '28 : « Jésus a dit : “Je me suis tenu debout au milieu du monde, et je me suis manifesté à eux dans la chair ; je les ai trouvés tous ivres ; je n''en ai trouvé aucun d''entre eux qui eût soif. Et mon âme s''est affligée pour les fils des hommes, parce qu''ils sont aveugles dans leur cœur, et n''arrivent pas à voir ; puisqu''ils sont venus dans le monde vides, et c''est vides aussi qu''ils cherchent à en sortir ; mais en ce moment ils sont ivres. Quand ils auront rejeté leur vin, ils se convertiront.” »'
