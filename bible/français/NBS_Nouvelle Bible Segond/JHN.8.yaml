      marker-yv: yv-n
    - type: text
      text: 'Les Juifs dirent : Va-t-il se tuer lui-même, pour qu''il dise : « Là où, moi, je vais, vous, vous ne pouvez pas venir. » '
  '23':
  - type: usfm
