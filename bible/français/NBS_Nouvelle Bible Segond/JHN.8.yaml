      marker-yv: yv-n
    - type: text
      text: 'Elle répondit : Personne, Seigneur. Jésus dit : Moi non plus, je ne te condamne pas ; va, et désormais ne pèche plus.]'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La lumière du monde
