      marker-yv: yv-n
    - type: text
      text: 'Il leur disait : Vous, vous êtes d''en bas ; moi, je suis d''en haut. Vous, vous êtes de ce monde ; moi, je ne suis pas de ce monde. '
  '24':
  - type: usfm
