          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui te fais-tu ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. 10.33.
      marker-yv: yv-n
    - type: text
      text: 'Serais-tu, toi, plus grand qu''Abraham, notre père, qui est mort ? Les prophètes aussi sont morts. Qui prétends-tu être ? '
  '54':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.54 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.44+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'C''est mon Père qui me glorifie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.39+ ; 13.32 ; 16.14 ; 17.5.
      marker-yv: yv-n
    - type: text
      text: 'Jésus répondit : Si c''est moi qui me glorifie moi-même, ma gloire n''est rien. C''est mon Père qui me glorifie, lui dont vous, vous dites : « Il est notre Dieu ! » '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.55 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous ne le connaissez pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.28+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je le connais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.25 (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'connaître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduit ici deux verbes grecs différents, mais largement équivalents).
      marker-yv: yv-n
    - type: text
      text: 'Et vous ne le connaissez pas ; moi, je le connais. Et si je disais que je ne le connais pas, je serais un menteur comme vous. Mais je le connais et je garde sa parole. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.56 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a été transporté d''allégresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Gn 17.17 ; 1P 1.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la perspective de voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 13.17/ / ; Hé 11.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 13.6 ; Ez 30.3 ; Jl 1.15 ; Am 5.18 ; Lc 17.24 ; 1Co 1.8 ; 5.5 ; 2Co 1.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il l'a vu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.41 ; Gn 22.13 ; Lc 17.22.'
      marker-yv: yv-n
    - type: text
      text: 'Abraham, votre père, a été transporté d''allégresse à la perspective de voir mon jour : il l''a vu, et il s''est réjoui. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Juifs lui dirent : Tu n''as pas encore cinquante ans, et tu as vu Abraham ? '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.58 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vienne à l'existence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: moi, je suis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Es 43.10,13.'
      marker-yv: yv-n
    - type: text
      text: 'Jésus leur dit : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen, amen,
    - type: text
      text: ' je vous le dis, avant qu''Abraham vienne à l''existence, moi, je suis.'
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.59 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils prirent des pierres… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.31 ; 11.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jésus se cacha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.39 ; 12.36 ; à la fin du v. certains mss ajoutent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et, passant au milieu d''eux, il s''en alla ainsi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Lc 4.29s). – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Là-dessus, ils prirent des pierres pour les lui jeter ; mais Jésus se cacha et sortit du temple.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour le mettre à l'épreuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.6 ; Mt 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.15 ; Lc 6.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se mit à écrire…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe grec ainsi traduit s''applique parfois à la rédaction d''un acte d''accusation ; il peut aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tracer des traits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (comme pour compter), de sorte que certains ont vu ici l'idée d'un compte des péchés (cf. v. 7s ; Jr 17.1,13 ; Jb 13.26) ; mais peut-être le texte décrit-il simplement un geste sans signification propre, par lequel Jésus montre qu'il ne partage pas les préoccupations de ceux qui l'entourent.
      marker-yv: yv-n
    - type: text
      text: 'Ils disaient cela pour le mettre à l''épreuve, afin de pouvoir l''accuser. Mais Jésus se baissa et se mit à écrire avec le doigt sur la terre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Dt 17.7 ; Mt 7.1-5 ; Rm 2.1,23.
      marker-yv: yv-n
    - type: text
      text: 'Comme ils continuaient à l''interroger, il se redressa et leur dit : Que celui de vous qui est sans péché lui jette le premier une pierre ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écrire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (verbe apparenté en grec).'
      marker-yv: yv-n
    - type: text
      text: 'De nouveau il se baissa et se mit à écrire sur la terre. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certains mss proposent un texte plus long
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Quand ils entendirent cela, accusés par leur conscience, ils se retirèrent un à un, depuis les plus âgés jusqu'aux derniers. Et [Jésus] resta seul…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 22.22.'
      marker-yv: yv-n
    - type: text
      text: 'Quand ils entendirent cela, ils se retirèrent un à un, à commencer par les plus âgés. Et il resta seul avec la femme qui était là, au milieu. '
