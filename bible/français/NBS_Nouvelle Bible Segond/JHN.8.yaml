      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'où sont-ils passés ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: où sont tes accusateurs ?
      marker-yv: yv-n
    - type: text
      text: 'Alors Jésus se redressa et lui dit : Eh bien, femme, où sont-ils passés ? Personne ne t''a donc condamnée ? '
  '11':
  - type: usfm
    marker: p
    children:
