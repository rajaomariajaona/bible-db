          - type: text
            text: n
        - type: text
          text: '  ; Es 41.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 43.10s ; 46.4 ; 48.12 ; Os 1.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est pourquoi je vous ai dit que vous mourrez dans vos péchés ; en effet, si vous ne croyez pas que, moi, je suis, vous mourrez dans vos péchés. '
