document_id: JHN.8,104
type_code: fra
verses:
  '1':
  - type: text
    content: 'Jésus se rendit au mont des Oliviers. '
  '10':
  - type: note
    content: où sont-ils passés ? certains mss portent où sont tes accusateurs ?
  - type: text
    content: 'Alors Jésus se redressa et lui dit : Eh bien, femme, où sont-ils passés ? Personne ne t''a donc condamnée ? '
  '11':
  - type: note
    content: 'Moi non plus Ps 103.8,13s. –  ne pèche plus  : cf. 5.14.'
  - type: text
    content: 'Elle répondit : Personne, Seigneur. Jésus dit : Moi non plus, je ne te condamne pas ; va, et désormais ne pèche plus.]'
  - type: heading
    content: La lumière du monde
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'C''est moi qui suis… 6.35+. –  la lumière du monde (1.10n) 1.4s,9 ; 3.19-21 ; 9.5 ; 11.9s ; 12.35s,46 ; cf. Es 9.1 ; 42.8 ; 49.6 ; 60.1,3 ; 1Jn 1.5-7 ; 2.8-11 ; cf. Mt 5.14 ; Ph 2.15 ; 1Th 5.5. –  celui qui me suit 1.37-43 ; 10.4,27 ; 12.26 ; 13.36s ; 21.19,22. –  ne marchera jamais  : autre traduction ne marchera pas . – Cf. Evangile selon Thomas 77 : « Jésus a dit : “C''est moi la lumière qui est au-dessus d''eux tous ; c''est moi le Tout. Le Tout est issu de moi, et c''est à moi que le Tout est parvenu. Fendez du bois, et je suis là ; soulevez une pierre, et c''est là que vous me trouverez.” »'
  - type: text
    content: 'Jésus leur dit encore : C''est moi qui suis la lumière du monde ; celui qui me suit ne marchera jamais dans les ténèbres, mais il aura la lumière de la vie.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 5.31-32+. –  pharisiens 1.24+. –  vrai , ici au sens de valide, juridiquement recevable (cf. 5.31n) ; autre adjectif, apparenté, au v. 16 (selon la leçon la plus probable).
  - type: text
    content: 'Là-dessus, les pharisiens lui dirent : C''est toi qui te rends témoignage à toi-même, ton témoignage n''est pas vrai. '
  '14':
  - type: note
    content: d'où je suis venu 7.27+. –  où je vais 7.33+ ; 8.21-23.
  - type: text
    content: 'Jésus leur répondit : Même si c''est moi qui me rends témoignage à moi-même, mon témoignage est vrai, car je sais d''où je suis venu et où je vais ; vous, vous ne savez ni d''où je viens ni où je vais. '
  '15':
  - type: note
    content: vous jugez selon la chair, c.-à-d. de façon humaine  ; cf. 7.24+ ; 1Co 1.26 ; 2.8-16. –  je ne juge personne 3.17+ ; 5.22.
  - type: text
    content: 'Vous, vous jugez selon la chair ; moi, je ne juge personne. '
  '16':
  - type: note
    content: 'si, moi, je jugeais…  : autre traduction si, moi, je juge, mon jugement est vrai  ; 5.27+,30. –  vrai  : autre traduction conforme à la vérité (cf. v. 13n). –  je ne suis pas seul v. 29+. –  il y a  : sous-entendu dans le texte. –  le Père…  : certains mss portent celui qui m''a envoyé.'
  - type: text
    content: 'Et si, moi, je jugeais, mon jugement serait vrai, car je ne suis pas seul : il y a moi et le Père qui m''a envoyé. '
  '17':
  - type: note
    content: 'votre loi  : cf. Lc 11.52. –  deux hommes  : autre traduction deux personnes  ; le terme grec est normalement employé au sens générique (homme ou femme) ; Dt 17.6+ ; Mt 18.16 ; 26.60/ / ; cf. Hé 6.18 ; 10.28.'
  - type: text
    content: 'Dans votre loi, il est écrit que le témoignage de deux hommes est vrai. '
  '18':
  - type: note
    content: '5.32+,37 ; 1Jn 5.9. –  Moi, je me rends témoignage…  : litt. c''est moi qui suis (v. 24n  ; 4.26n) celui qui rend témoignage…'
  - type: text
    content: 'Moi, je me rends témoignage à moi-même, et le Père qui m''a envoyé me rend témoignage. '
  '19':
  - type: note
    content: Cf. 7.28+.
  - type: text
    content: 'Ils lui dirent donc : Où est ton Père ? Jésus répondit : Vous ne connaissez ni moi, ni mon Père. Si vous me connaissiez, vous connaîtriez aussi mon Père.'
  '2':
  - type: note
    content: au temple… il les instruisait Mc 12.35+.
  - type: text
    content: Mais dès le matin, il retourna au temple, et tout le peuple vint à lui. S'étant assis, il les instruisait.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'dans le Trésor  : soit près de la salle où étaient conservées les offrandes, soit à l''endroit même où celles-ci étaient faites (cf. Mc 12.41nss/ /). –  il enseignait dans le temple Mc 12.35+. –  personne ne vint l''arrêter… 7.30+.'
  - type: text
    content: Il dit ces paroles dans le Trésor, alors qu'il enseignait dans le temple ; et personne ne vint l'arrêter, parce que son heure n'était pas encore venue.
  - type: heading
    content: Jésus, l'envoyé du Père
  '21':
  - type: text
    content: ' '
  - type: note
    content: 7.33-34+. –  vous mourrez dans votre péché v. 24 ; cf. 9.41 ; 16.9 ; voir aussi Dt 24.16 ; Ez 18.20.
  - type: text
    content: 'Il leur dit encore : Moi, je m''en vais ; vous me chercherez, et vous mourrez dans votre péché ; là où moi, je vais, vous, vous ne pouvez pas venir. '
  '22':
  - type: note
    content: 'Cf. 7.35. –  Les Juifs  : cf. 1.19n. –  se tuer lui-même  : comparer avec 10.17s ; 11.50s.'
  - type: text
    content: 'Les Juifs dirent : Va-t-il se tuer lui-même, pour qu''il dise : « Là où, moi, je vais, vous, vous ne pouvez pas venir. » '
  '23':
  - type: note
    content: Cf. 1.10 ; 3.31 ; 17.14-16 ; 1Jn 4.5.
  - type: text
    content: 'Il leur disait : Vous, vous êtes d''en bas ; moi, je suis d''en haut. Vous, vous êtes de ce monde ; moi, je ne suis pas de ce monde. '
  '24':
  - type: note
    content: 'que, moi, je suis  : cf. 4.26n  ; on pourrait aussi comprendre ce que je suis ou que je le suis (le Christ), mais l''emploi absolu de cette expression (cf. 8.28,58 ; 12.26 ; 13.13n,19 ; 18.5,6,8) est probablement une allusion à la révélation du nom divin dans l''Ancien Testament ; cf. Ex 3.14n  ; Dt 32.39n  ; Es 41.4n  ; 43.10s ; 46.4 ; 48.12 ; Os 1.9n.'
  - type: text
    content: 'C''est pourquoi je vous ai dit que vous mourrez dans vos péchés ; en effet, si vous ne croyez pas que, moi, je suis, vous mourrez dans vos péchés. '
  '25':
  - type: note
    content: 'Qui es-tu 1.19. –  Ce que je vous dis depuis le commencement (cf. 1.1n) : le sens du texte grec, peut-être incomplet, est incertain ; autres traductions, interrogatives  : D''abord, pourquoi vous parlerais-je ? En somme, que vous dis-je ? ou affirmatives  : ce que je vous dis : le commencement (interprétation de plusieurs versions anciennes) ; précisément ce que je vous dis ; absolument ce que je vous dis  ; un ms grec porte je vous ai dit au commencement ce dont je vous parle (encore). Cf. Evangile selon Thomas 43 : « Ses disciples lui dirent : “Qui es-tu pour nous dire ces choses ?” Jésus leur répondit : “Vous n''avez pas compris qui je suis à partir de ce que je vous dis, mais vous êtes devenus comme les Juifs : en effet, ils aiment l''arbre et ils haïssent sont fruit, ou bien ils aiment le fruit et ils haïssent l''arbre (cf. Mt 12.33+).” »'
  - type: text
    content: 'Ils lui disaient : Qui es-tu, toi ? Jésus leur répondit : Ce que je vous dis depuis le commencement. '
  '26':
  - type: note
    content: Cf. 3.11,33+,34. –  juger v. 16.
  - type: text
    content: 'J''ai à votre sujet beaucoup à dire et à juger ; mais celui qui m''a envoyé est vrai, et moi, je dis au monde ce que j''ai entendu de lui. '
  '27':
  - type: note
    content: 'Cf. v. 18s. –  surent  : autre traduction comprirent  ; le verbe grec est habituellement traduit par connaître (7.26n) ; même verbe v. 28,32,43,52,55. –  du Père  : certains mss ajoutent Dieu.'
  - type: text
    content: 'Ils ne surent pas qu''il leur parlait du Père. '
  '28':
  - type: note
    content: 'élevé le Fils de l''homme 3.14+. –  que, moi, je suis  : autre traduction que je le suis, cf. v. 24n. –  rien de moi-même 5.19+.'
  - type: text
    content: 'Alors Jésus leur dit : Quand vous aurez élevé le Fils de l''homme, vous saurez que, moi, je suis, et que je ne fais rien de moi-même, mais que je parle selon ce que le Père m''a enseigné. '
  '29':
  - type: note
    content: 'est avec moi  : cf. v. 16 ; 10.30 ; 16.32 ; voir aussi Ex 3.12 ; Jos 1.5 ; 1S 10.7 ; Jr 1.8 ; Am 5.14. –  je fais toujours…  : cf. 4.34+. –  ce qu''il agrée ou ce qui lui plaît  : cf. 1Jn 3.22.'
  - type: text
    content: Celui qui m'a envoyé est avec moi ; il ne m'a pas laissé seul, parce que, moi, je fais toujours ce qu'il agrée.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. Nb 5.12-31 ; Lc 7.37-50. –  scribes / pharisiens Mc 5.21+.
  - type: text
    content: 'Alors les scribes et les pharisiens amènent une femme surprise en adultère, la placent au milieu '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 2.23+.
  - type: text
    content: Comme il parlait ainsi, beaucoup mirent leur foi en lui.
  - type: heading
    content: Fils d'Abraham ou fils du diable ?
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Juifs  : cf. 1.19n. –  demeurez dans ma parole v. 37 ; 15.7,14 ; cf. 5.38+ ; 6.56 ; Ac 11.23 ; 2Jn 9.'
  - type: text
    content: 'Jésus, donc, disait aux Juifs qui avaient mis leur foi en lui : Si vous demeurez dans ma parole, vous êtes vraiment mes disciples ; '
  '32':
  - type: note
    content: la vérité v. 40,44-46 ; 1.14,17 ; 3.21 ; 4.23s ; 14.6,17 ; 15.26 ; 16.7,13 ; 17.17-19 ; 18.37s ; 1Jn 1.6-8 ; 2Jn 1,4 ; 3Jn 3. –  vous rendra libres v. 36+.
  - type: text
    content: 'vous connaîtrez la vérité, et la vérité vous rendra libres. '
  '33':
  - type: note
    content: 'la descendance d''Abraham v. 39,56 ; Mt 3.9/ / ; Lc 3.8+ ; cf. Rm 4.12 ; Ga 3.6-16. –  jamais été esclaves  : cf. Lv 25.39 ; Dt 5.15+ ; Né 9.36.'
  - type: text
    content: 'Ils lui répondirent : Nous sommes la descendance d''Abraham et nous n''avons jamais été esclaves de personne ; comment peux-tu dire, toi : « Vous deviendrez libres ! » '
  '34':
  - type: note
    content: Cf. Rm 6.16-20 ; 2P 2.19 ; 1Jn 3.4,8 ; cf. Gn 4.7. –  Amen, amen 1.51n  ; cf. Mt 5.18n.
  - type: text
    content: 'Jésus leur répondit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, quiconque fait le péché est esclave du péché. '
  '35':
  - type: note
    content: 'esclave / fils  : cf. Gn 21.10 ; Ex 21.2 ; Dt 15.12 ; Jr 2.14s ; 3.22 ; Ga 4.1-9,30. –  dans la maison  : cf. 14.2. –  demeure pour toujours (4.14n) : cf. 12.34.'
  - type: text
    content: 'Or l''esclave ne demeure pas pour toujours dans la maison ; le fils, lui, demeure pour toujours. '
  '36':
  - type: note
    content: V. 32 ; cf. Rm 6.18,22 ; 8.2 ; 1Co 7.23 ; 2Co 3.17 ; Ga 5.1.
  - type: text
    content: Si donc le Fils vous rend libres, vous serez réellement libres.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'descendance d''Abraham v. 33+. –  vous cherchez… 5.18+. –  ma parole ne trouve pas de place ou ne pénètre pas en vous  : cf. v. 31+ ; voir Mt 19.11n.'
  - type: text
    content: 'Je sais que vous êtes la descendance d''Abraham ; mais vous cherchez à me tuer, parce que ma parole ne trouve pas de place en vous. '
  '38':
  - type: note
    content: 'auprès du Père  : certains mss portent auprès de mon Père  ; cf. v. 40 ; 1.39n  ; 3.11+. –  du Père ou du père  ; autre traduction  : vous faites ce que vous avez entendu du père  ; certains mss portent de votre père  ; cf. v. 44.'
  - type: text
    content: Moi, je dis ce que j'ai vu auprès du Père ; vous aussi, faites donc ce que vous avez entendu du Père.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Si vous étiez…  : certains mss portent si vous êtes enfants d''Abraham (v. 33+), faites les œuvres d''Abraham  ; cf. Gn 15.6 ; Rm 4.1-20 ; Ga 3.14 ; Hé 11.8-19 ; Jc 2.21-24.'
  - type: text
    content: 'Ils lui répondirent : Notre père, c''est Abraham. Jésus leur dit : Si vous étiez enfants d''Abraham, vous feriez les œuvres d''Abraham. '
  '4':
  - type: note
    content: 'Maître  : au sens d’enseignant (1.38+).'
  - type: text
    content: 'et lui disent : Maître, cette femme a été surprise en flagrant délit d''adultère. '
  '40':
  - type: note
    content: 'V. 37. –  dit la vérité v. 32+,44s ; 18.37+ ; cf. Ps 15.2. –  que j''ai entendue  : cf. v. 38.'
  - type: text
    content: 'Mais maintenant vous cherchez à me tuer, moi, un homme, qui vous ai dit la vérité que j''ai entendue de Dieu. Abraham n''a pas fait cela. '
  '41':
  - type: note
    content: 'nés de la prostitution ou de l''inconduite sexuelle  ; autre traduction nous ne sommes pas des enfants illégitimes  ; cf. 9.1ss,34 ; Gn 38.24 ; Os 1.2n. –  un seul Père, Dieu  : cf. v. 44 ; 19.15 ; voir aussi Ex 4.22 ; Dt 32.6 ; Es 63.16 ; Ml 2.10.'
  - type: text
    content: Vous, vous faites les œuvres de votre père.
  - type: text
    content: 'Ils lui dirent : Nous, nous ne sommes pas nés de la prostitution ; nous avons un seul Père, Dieu. '
  '42':
  - type: note
    content: vous m'aimeriez 14.15+ ; cf. 1Jn 5.1. –  c'est de Dieu que je suis sorti (1.43n) 13.3 ; 16.27-30 ; 17.8 ; cf. Mc 1.38n. –  de moi-même 5.19+.
  - type: text
    content: 'Jésus leur dit : Si Dieu était votre Père, vous m''aimeriez ; car, moi, c''est de Dieu que je suis sorti et que je viens ; je ne suis pas venu de moi-même, mais c''est lui qui m''a envoyé. '
  '43':
  - type: note
    content: 'connaissez-vous  : autres traductions reconnaissez-vous ; comprenez-vous. –  mon langage  : cf. 1.1,14 ; 10.3s ; même mot grec en Mt 26.73. –  vous ne pouvez pas  : cf. 5.44 ; 6.60 ; 12.39 ; Mt 12.34 ; Rm 8.7 ; 1Co 2.14. –  entendre  : autre traduction écouter.'
  - type: text
    content: 'Pourquoi ne connaissez-vous pas mon langage ? Parce que vous ne pouvez pas entendre ma parole. '
  '44':
  - type: note
    content: 'le diable 6.70n  ; cf. Ac 13.10 ; voir 1Jn 3.8-15 et démon, diable, Satan. –  faire ou réaliser. –  homicide (ou meurtrier, cf. 1Jn 3.15n) dès le commencement  : cf. 1.1+ ; Gn 3.4 ; Rm 5.12 ; 1P 5.8 ; 1Jn 3.8 ; Ap 12.9 ; Sagesse 2.24 : « Par la jalousie du diable la mort est entrée dans le monde. » –  il ne se tenait pas  : certains mss portent il ne s''est pas tenu, ce qui pourrait signifier il ne s''est jamais tenu. –  vérité v. 32+. –  de ce qui lui est propre  : autre traduction de son propre fonds  ; cf. 5.19+,43+. –  il est à la fois le menteur et son père (c.-à-d. le père du menteur) ; autre traduction il est menteur et père du mensonge.'
  - type: text
    content: 'Vous, vous êtes de votre père, le diable, et vous voulez faire les désirs de votre père. Lui, il était homicide dès le commencement ; il ne se tenait pas dans la vérité, parce qu''il n''y a pas de vérité en lui. Lorsqu''il dit le mensonge, il parle de ce qui lui est propre, car il est à la fois le menteur et son père. '
  '45':
  - type: note
    content: je dis la vérité v. 40+ ; cf. Ga 4.16. –  vous ne me croyez pas ou vous n'avez pas foi en moi 1.7n  ; 6.64+ ; cf. Lc 22.67.
  - type: text
    content: 'Et moi, parce que je dis la vérité, vous ne me croyez pas. '
  '46':
  - type: note
    content: 'me confondra (3.20n) en matière de péché  : même tournure 16.8s ; cf. 18.23 ; 2Co 5.21 ; Hé 4.15+ ; 1P 2.22 ; 3.18 ; 1Jn 3.5.'
  - type: text
    content: 'Qui de vous me confondra en matière de péché ? Si je dis la vérité, pourquoi, vous, ne me croyez-vous pas ? '
  '47':
  - type: note
    content: 'Celui qui est de Dieu…  : cf. 10.26 ; 18.37 ; 1Jn 4.4-6 ; 5.19. –  entend  : autre traduction écoute. –  pas de Dieu 1Jn 2.16 ; 3.10 ; 4.3.'
  - type: text
    content: Celui qui est de Dieu entend les paroles de Dieu. Si, vous, vous n'entendez pas, c'est parce que vous n'êtes pas de Dieu.
  - type: heading
    content: Jésus et Abraham
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'Les Juifs  : cf. 1.19n. –  Samaritain 4.9n  ; le terme peut être compris ici comme une insulte au sens assez imprécis ; certains y ont cependant vu une allusion plus précise à telle ou telle doctrine ou pratique samaritaine (cf. Ac 8.14ss). –  démon 7.20+.'
  - type: text
    content: 'Les Juifs lui répondirent : N''est-ce pas nous qui avons raison de dire que, toi, tu es un Samaritain, et que tu as un démon ? '
  '49':
  - type: note
    content: j'honore mon Père Ml 1.6.
  - type: text
    content: 'Jésus répondit : Moi, je n''ai pas de démon, mais j''honore mon Père, et vous, vous me déshonorez. '
  '5':
  - type: note
    content: Lv 20.10 ; Dt 22.22-24. –  Moïse / la loi 1.17+.
  - type: text
    content: 'Moïse, dans la loi, nous a ordonné de lapider de telles femmes : toi, donc, que dis-tu ? '
  '50':
  - type: note
    content: 'ma gloire 5.44+. –  qui la cherche  : litt. qui cherche. –  juge  : cf. 5.22 ; 1P 2.23.'
  - type: text
    content: 'Moi, je ne cherche pas ma gloire ; il en est un qui la cherche, et qui juge. '
  '51':
  - type: note
    content: 'Cf. v. 24,31. Evangile selon Thomas 1 : « Celui qui trouvera l''interprétation de ces paroles ne goûtera pas la mort. » 18s : « Les disciples demandèrent à Jésus : “Dis-nous comment sera notre fin.” Jésus dit : “Avez-vous donc découvert le commencement, pour que vous cherchiez la fin ? Car, là où est le commencement, là sera la fin. Heureux celui qui se tiendra debout dans le commencement ; il connaîtra la fin et ne goûtera pas la mort.” Jésus a dit : “Heureux celui qui était avant d''être ! Si vous devenez mes disciples et que vous écoutez ces paroles, ces pierres vous serviront. Car vous avez dans le paradis cinq arbres (cf. Col 3.5n), qui ne changent ni en été ni en hiver et dont les feuilles ne tombent pas. Quiconque les connaîtra ne goûtera pas la mort.” » 85 : « Jésus a dit : “Adam est né d''une grande puissance et d''une grande richesse, mais il n''est pas devenu digne de vous ; car, s''il avait été digne, il n''aurait pas goûté la mort.” » –  garde ma parole 14.23 ; 15.20 ; 17.6 ; 1Jn 2.5 ; Ap 3.8,10. –  il ne verra jamais (4.14n) la mort  : cf. 3.15+ ; 5.24 ; 11.25s ; Lc 2.26 ; Hé 11.5.'
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, si quelqu''un garde ma parole, il ne verra jamais la mort.'
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'démon 7.20+. –  Abraham est mort…  : cf. Za 1.5 ; Ac 2.29 ; voir aussi Lc 20.37s/ /. – Voir prophètes . –  ne goûtera jamais la mort  : cf. Mt 16.28/ / ; Hé 2.9.'
  - type: text
    content: 'Les Juifs lui dirent donc : Maintenant nous savons que tu as un démon. Abraham est mort, les prophètes aussi, et toi, tu dis : « Si quelqu''un garde ma parole, il ne goûtera jamais la mort ! » '
  '53':
  - type: note
    content: 'plus grand (cf. 4.12) qu''Abraham  : cf. Lc 16.22-31 ; Hé 7.4-8 ; Siracide 44.19 : « Le grand Abraham, ancêtre d''une multitude de nations, il ne s''est trouvé personne pour l''égaler en gloire. » –  Qui prétends-tu être  : litt. qui te fais-tu ? cf. 10.33.'
  - type: text
    content: 'Serais-tu, toi, plus grand qu''Abraham, notre père, qui est mort ? Les prophètes aussi sont morts. Qui prétends-tu être ? '
  '54':
  - type: note
    content: 5.44+. –  C'est mon Père qui me glorifie 7.39+ ; 13.32 ; 16.14 ; 17.5.
  - type: text
    content: 'Jésus répondit : Si c''est moi qui me glorifie moi-même, ma gloire n''est rien. C''est mon Père qui me glorifie, lui dont vous, vous dites : « Il est notre Dieu ! » '
  '55':
  - type: note
    content: vous ne le connaissez pas 7.28+. –  je le connais 17.25 (connaître traduit ici deux verbes grecs différents, mais largement équivalents).
  - type: text
    content: 'Et vous ne le connaissez pas ; moi, je le connais. Et si je disais que je ne le connais pas, je serais un menteur comme vous. Mais je le connais et je garde sa parole. '
  '56':
  - type: note
    content: 'a été transporté d''allégresse 5.35n  ; cf. Gn 17.17 ; 1P 1.8. –  à la perspective de voir  : autre traduction pour voir  ; cf. Mt 13.17/ / ; Hé 11.13. –  mon jour  : cf. Es 13.6 ; Ez 30.3 ; Jl 1.15 ; Am 5.18 ; Lc 17.24 ; 1Co 1.8 ; 5.5 ; 2Co 1.14. –  il l''a vu  : cf. 12.41 ; Gn 22.13 ; Lc 17.22.'
  - type: text
    content: 'Abraham, votre père, a été transporté d''allégresse à la perspective de voir mon jour : il l''a vu, et il s''est réjoui. '
  '57':
  - type: text
    content: 'Les Juifs lui dirent : Tu n''as pas encore cinquante ans, et tu as vu Abraham ? '
  '58':
  - type: note
    content: 'vienne à l''existence, comme en 1.3n. –  moi, je suis  : cf. v. 24n  ; 1.1n  ; voir aussi Es 43.10,13.'
  - type: text
    content: 'Jésus leur dit : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, avant qu''Abraham vienne à l''existence, moi, je suis.'
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'ils prirent des pierres… 10.31 ; 11.8. –  Jésus se cacha  : cf. 10.39 ; 12.36 ; à la fin du v. certains mss ajoutent et, passant au milieu d''eux, il s''en alla ainsi (cf. Lc 4.29s). – Voir temple.'
  - type: text
    content: Là-dessus, ils prirent des pierres pour les lui jeter ; mais Jésus se cacha et sortit du temple.
  '6':
  - type: note
    content: 'pour le mettre à l''épreuve  : cf. 6.6 ; Mt 4.1n  ; 22.15 ; Lc 6.7. –  se mit à écrire…  : le verbe grec ainsi traduit s''applique parfois à la rédaction d''un acte d''accusation ; il peut aussi signifier tracer des traits (comme pour compter), de sorte que certains ont vu ici l''idée d''un compte des péchés (cf. v. 7s ; Jr 17.1,13 ; Jb 13.26) ; mais peut-être le texte décrit-il simplement un geste sans signification propre, par lequel Jésus montre qu''il ne partage pas les préoccupations de ceux qui l''entourent.'
  - type: text
    content: 'Ils disaient cela pour le mettre à l''épreuve, afin de pouvoir l''accuser. Mais Jésus se baissa et se mit à écrire avec le doigt sur la terre. '
  '7':
  - type: note
    content: Cf. Dt 17.7 ; Mt 7.1-5 ; Rm 2.1,23.
  - type: text
    content: 'Comme ils continuaient à l''interroger, il se redressa et leur dit : Que celui de vous qui est sans péché lui jette le premier une pierre ! '
  '8':
  - type: note
    content: 'écrire  : cf. v. 6n (verbe apparenté en grec).'
  - type: text
    content: 'De nouveau il se baissa et se mit à écrire sur la terre. '
  '9':
  - type: note
    content: 'Certains mss proposent un texte plus long  : Quand ils entendirent cela, accusés par leur conscience, ils se retirèrent un à un, depuis les plus âgés jusqu''aux derniers. Et [Jésus] resta seul…  ; cf. Mt 22.22.'
  - type: text
    content: 'Quand ils entendirent cela, ils se retirèrent un à un, à commencer par les plus âgés. Et il resta seul avec la femme qui était là, au milieu. '
