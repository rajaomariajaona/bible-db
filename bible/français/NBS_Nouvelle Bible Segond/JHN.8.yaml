            text: Thomas
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '77 : « Jésus a dit : “C''est moi la lumière qui est au-dessus d''eux tous ; c''est moi le Tout. Le Tout est issu de moi, et c''est à moi que le Tout est parvenu. Fendez du bois, et je suis là ; soulevez une pierre, et c''est là que vous me trouverez.” »'
      marker-yv: yv-n
    - type: text
      text: 'Jésus leur dit encore : C''est moi qui suis la lumière du monde ; celui qui me suit ne marchera jamais dans les ténèbres, mais il aura la lumière de la vie.'
