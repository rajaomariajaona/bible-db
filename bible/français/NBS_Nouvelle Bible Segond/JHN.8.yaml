      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'où je vais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.33+ ; 8.21-23.
      marker-yv: yv-n
    - type: text
      text: 'Jésus leur répondit : Même si c''est moi qui me rends témoignage à moi-même, mon témoignage est vrai, car je sais d''où je suis venu et où je vais ; vous, vous ne savez ni d''où je viens ni où je vais. '
