document_id: PRO.13,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: l'instruction 1.2n. –  insolent 1.22n  ; cf. 14.6 ; 15.12 ; 24.9. –  reproches v. 8 ; 17.10 ; Ec 7.5 ; des termes de la même famille sont traduits par rabrouer en Es 17.13+ ; Ps 9.6+.
  - type: text
    content: Un fils sage écoute l'instruction de son père ;
  - type: text
    content: l'insolent n'entend pas les reproches.
  '10':
  - type: text
    content: ' '
  - type: note
    content: arrogance 11.2.
  - type: text
    content: L'arrogance ne provoque que des brouilles ;
  - type: text
    content: la sagesse est avec ceux qui écoutent les conseils.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'disparaissent…  : traduction incertaine. On a aussi compris  : les biens mal acquis diminuent . LXX les biens rapidement acquis avec l''iniquité  ; certains modifient le texte hébreu traditionnel pour lire les biens trop vite acquis diminuent , comme en 20.21 ; cf. 10.2. –  peu à peu  : litt. à la main , ce qui peut signifier poignée par poignée.'
  - type: text
    content: Les biens disparaissent plus vite qu'un souffle ;
  - type: text
    content: celui qui amasse peu à peu les augmente.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'attente différée  : cf. v. 19. –  rend le cœur malade  : autre traduction décourage . –  arbre de vie 3.18n.'
  - type: text
    content: L'attente différée rend le cœur malade ;
  - type: text
    content: un désir qui aboutit est un arbre de vie.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'devra donner des gages  : autre traduction se fait du mal à lui-même . –  qui respecte (litt. qui craint ) les préceptes…  : cf. 1.7+ ; Dt 4.40 ; 7.12-15 ; 11.18-25.'
  - type: text
    content: Celui qui méprise la parole devra donner des gages ;
  - type: text
    content: celui qui respecte les préceptes sera récompensé.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'enseignement  : hébreu tora  ; cf. 1.8n. –  source de vie 14.27 ; 16.22 ; cf. 10.11n  ; 11.30 ; Siracide 21.13 : « La science du sage grossit comme un déluge et son conseil est comme une source d''eau vive. »'
  - type: text
    content: L'enseignement du sage est une source de vie
  - type: text
    content: pour s'écarter des pièges de la mort.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'bon sens / grâce  : mêmes termes hébreux en 3.4 ; LXX ajoute connaître la loi est (signe) d''une bonne intelligence . –  traîtres 11.3n. –  est sans issue  : sens très incertain ; autres traductions n''a pas de fin ; est rude ; est inflexible  ; LXX les voies des méprisants sont celles de la perdition , texte analogue dans Tg  ; cf. 14.27.'
  - type: text
    content: Le bon sens procure la grâce ;
  - type: text
    content: la voie des traîtres est sans issue.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'homme avisé 1.4n  ; cf. Ec 10.3. –  selon sa connaissance  : autres traductions agit à bon escient, réfléchit avant d''agir  ; avec une autre analyse lexicale, on a aussi compris  : tout homme avisé récolte la connaissance, l''homme stupide sème l''imbécillité . –  stupide 1.22+.'
  - type: text
    content: Tout homme avisé agit selon sa connaissance ;
  - type: text
    content: l'homme stupide fait étalage de son imbécillité.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Un messager méchant  : autre traduction un mauvais messager . –  tombe  : en modifiant la vocalisation traditionnelle de l''hébreu, certains lisent fait tomber . –  émissaire digne de confiance ou probe (12.17+) ; cf. 25.13 ; 26.6 ; voir aussi 2S 1.1-16.'
  - type: text
    content: Un messager méchant tombe dans le malheur ;
  - type: text
    content: un émissaire digne de confiance guérit.
  '18':
  - type: text
    content: ' '
  - type: note
    content: mépris 3.35+. –  l'instruction 1.2n. –  avertissements 1.23n  ; 10.17.
  - type: text
    content: Pauvreté et mépris sont pour celui qui fait peu de cas de l'instruction ;
  - type: text
    content: celui qui tient compte des avertissements est honoré.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 12. –  réalisé  : litt. qui est . –  abomination  : cf. 29.27. LXX les désirs des gens pieux font plaisir à l''âme, les œuvres des impies sont loin de la connaissance.'
  - type: text
    content: Un désir réalisé est doux ;
  - type: text
    content: s'écarter du mal est une abomination pour les gens stupides.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Par le fruit…  : cf. 12.14n  ; 18.20. –  l''appétit  : voir 6.30n. –  traîtres 11.3n.'
  - type: text
    content: Par le fruit de sa bouche on se nourrit de bonnes choses ;
  - type: text
    content: l'appétit des traîtres, c'est la violence.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui marche…  : autre lecture traditionnelle marche avec les sages et deviens sage  ; cf. 14.7 ; Siracide 6.33s : « Si tu aimes écouter, tu apprendras, si tu prêtes l''oreille, tu deviendras sage. Tiens-toi dans l''assemblée des vieillards, attache-toi à leur sagesse. » –  fréquente 28.7 ; 29.3 ; Jb 24.21.'
  - type: text
    content: Celui qui marche avec les sages devient sage ;
  - type: text
    content: celui qui fréquente les gens stupides s'en trouve mal.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. 16.5.
  - type: text
    content: Le malheur poursuit les pécheurs ;
  - type: text
    content: le bonheur récompense les justes.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'homme de bien  : cf. 28.8 ; Jb 15.29 ; 27.16s.'
  - type: text
    content: L'homme de bien transmet à ses petits-fils un patrimoine ;
  - type: text
    content: les ressources du pécheur sont réservées pour le juste.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'par les pauvres  : litt. des pauvres  ; LXX les justes passeront de nombreuses années dans la richesse  ; cf. 22.2n. –  faute d''équité (1.3n) : LXX mais les injustes périront rapidement  ; cf. 12.11 ; 18.9.'
  - type: text
    content: Le champ défriché par les pauvres donne une nourriture abondante ;
  - type: text
    content: tel est emporté faute d'équité.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'bâton  : autre traduction baguette  ; cf. 10.13n. –  n''hésite pas  : autres traductions ne tarde pas à le corriger ; cherche à le corriger 1.2n  ; 23.13 ; 29.15,17 ; cf. 3.12n.'
  - type: text
    content: Celui qui ménage son bâton déteste son fils ;
  - type: text
    content: celui qui l'aime n'hésite pas à le corriger.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'son appétit v. 2 ; 6.30n. –  crie famine  : litt. manque ou connaît la privation  ; cf. Ps 34.11 ; 37.3.'
  - type: text
    content: Le juste mange et satisfait son appétit ;
  - type: text
    content: le ventre des méchants crie famine.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'surveille  : le verbe hébreu correspondant est traduit par préserver au v. 6 ; c''est un synonyme fréquent du verbe traduit ici par garder (cf. 28.8,11 ; 3.1,21 ; 4.6,13,23 etc.). –  se garde lui-même  : autres traductions possibles garde sa vie, garde sa gorge (sur le terme hébreu correspondant, voir Gn 1.20n) ; cf. Pr 21.23 ; Jc 3.2-12 ; Siracide 22.27 : « Qui placera une garde sur ma bouche et, sur mes lèvres, le sceau de la discrétion, pour les empêcher de causer ma chute et ma langue de me perdre ? » 28.25s : « Fais aussi à ta bouche une porte et un verrou. Prends garde que ta langue ne te fasse trébucher. »'
  - type: text
    content: Celui qui surveille sa bouche se garde lui-même ;
  - type: text
    content: celui qui ouvre tout grand ses lèvres court à sa ruine.
  '4':
  - type: text
    content: ' '
  - type: note
    content: paresseux 6.6n-11 ; 21.25. –  sont dans l'abondance 11.25n.
  - type: text
    content: Le paresseux a des désirs qui n'aboutissent à rien ;
  - type: text
    content: les hommes actifs sont dans l'abondance.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'se rend odieux  : litt. se rend puant , cf. Gn 34.30n. –  fait rougir 19.26.'
  - type: text
    content: Le juste déteste les paroles mensongères ;
  - type: text
    content: le méchant se rend odieux et fait rougir.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la méchanceté  : un ms hébreu porte les méchants  ; cf. LXX les impies  ; cf. 10.29 ; 11.3,5,6.'
  - type: text
    content: La justice préserve celui dont la voie est intègre ;
  - type: text
    content: la méchanceté pervertit le pécheur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Les mots correspondant à fait le riche et fait le pauvre font assonance en hébreu ; cf. 12.9 ; Lc 12.21,33.
  - type: text
    content: Tel fait le riche et n'a rien du tout ;
  - type: text
    content: tel fait le pauvre et a de grands biens.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'rançon 6.35n  ; 21.18. –  reproches  : autre traduction menaces  ; cf. v. 1 ; voir aussi 15.16 ; Ec 5.11 ; Jb 18.5s ; 21.17.'
  - type: text
    content: La rançon de la vie d'un homme, c'est sa richesse ;
  - type: text
    content: le pauvre n'entend pas les reproches.
  '9':
  - type: text
    content: ' '
  - type: note
    content: justes 4.18. –  la lampe… 20.20 ; 24.20 ; Ps 97.11 ; Jb 18.5s.
  - type: text
    content: La lumière des justes réjouit ;
  - type: text
    content: la lampe des méchants s'éteint.
