      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Humain, c''est ici le lieu de mon trône, le lieu de mes pieds. J''y demeurerai toujours, au milieu des Israélites. La maison d''Israël et ses rois ne rendront plus impur mon nom sacré par leur prostitution et par les cadavres de leurs rois sur leurs hauts lieux. '
