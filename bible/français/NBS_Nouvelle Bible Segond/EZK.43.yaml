document_id: EZK.43,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La gloire de Dieu revient dans le temple
  - type: text
    content: ' '
  - type: note
    content: 40.6+.
  - type: text
    content: 'Il me fit aller vers la porte, la porte qui donnait sur l''est. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'soient confus 16.27n. –  fautes  : voir péché. –  le plan  : cf. 28.12n  ; d''après plusieurs versions anciennes, certains modifient le texte hébreu traditionnel pour lire son plan (celui de la Maison , c.-à-d. du temple).'
  - type: text
    content: 'Toi, humain, fais à la maison d''Israël la description de la Maison : qu''ils soient confus de leurs fautes et qu''ils mesurent le plan. '
  '11':
  - type: note
    content: 'S''ils sont confus…  : cf. 16.54. –  fais-leur connaître  : cf. 40.4. –  forme (LXX tu dessineras) et dessins traduisent un même mot hébreu qui apparaît dans le texte au singulier puis au pluriel. –  prescriptions  : cf. 44.5 ; Ex 18.16,20 ; Dt 7.11 ; Jr 44.10 : le mot peut s''appliquer aussi bien aux indications architecturales qui précèdent qu''aux règles rituelles qui suivent (cf. 42.11n). –  mets-en la description  : litt. écris. –  sous leurs yeux 4.12+.'
  - type: text
    content: 'S''ils sont confus à cause de tout ce qu''ils ont fait, fais-leur connaître la forme de cette Maison, sa disposition, ses issues et ses entrées, tous ses dessins et toutes ses prescriptions, tous ses dessins et toutes ses lois ; mets-en la description sous leurs yeux. Ils observeront tous ses dessins et toutes ses prescriptions, et ils les exécuteront. '
  '12':
  - type: note
    content: 'Telle est la loi ou voici la loi  ; cf. Lv 11.46 ; 15.32. –  le territoire  : le mot hébreu correspondant signifie aussi frontière ; limite  ; il est aussi traduit par rebord dans la suite (v. 13,17,20n) ; 45.1n.'
  - type: text
    content: Telle est la loi concernant la Maison. Sur le sommet de la montagne, tout le territoire qui l'entoure est très sacré. Voilà la loi concernant la Maison.
  - type: heading
    content: L'autel et les sacrifices
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'l''autel  : cf. Ex 27.1-8 ; 1R 6.21 ; 7.48 ; 8.64 ; 2Ch 4.1. –  les coudées…  : formule analogue en 40.5n  ; voir aussi mesures. –  cavité  : le mot hébreu correspondant signifie habituellement sein  ; cf. v. 14n  ; il s''agissait sans doute d''une rigole qui entourait l''autel pour recueillir le sang (cf. 1R 18.32 ; le même mot désigne l''intérieur d''un char en 1R 22.35). –  son contour  : le mot hébreu est habituellement traduit par lèvre . –  un empan (≈ 25 cm) : sous-entendu de largeur, soit une demi-coudée. –  le support  : litt. le dos  ; LXX la hauteur (à rattacher aux mesures du v. 14).'
  - type: text
    content: 'Voici les mesures de l''autel, d''après les coudées dont chacune était d''un palme plus longue que la coudée ordinaire. La cavité était d''une coudée et avait une coudée de largeur ; le rebord qui délimitait son contour avait un empan ; c''était le support de l''autel. '
  '14':
  - type: note
    content: 'Il faut sans doute se représenter une sorte de pyramide à étages à la manière des ziggourats mésopotamiennes (cf. v. 17 et Gn 11.4n), chaque étage, haut de deux coudées (≈ 1,05 m), étant d’une coudée (≈ 52,5 cm) plus étroit que l''étage inférieur. –  la cavité… sol  : litt. le sein de la terre  ; cf. v. 13n  ; voir aussi 38.12. –  socle  : traduction incertaine ; le même terme est traduit par enceinte en 2Ch 4.9 ; 6.13. –  quatre coudées ≈ 2,10 m.'
  - type: text
    content: 'Depuis la cavité au niveau du sol jusqu''au socle inférieur il y avait deux coudées, et une coudée de largeur ; et depuis le petit jusqu''au grand socle il y avait quatre coudées, et une coudée de largeur. '
  '15':
  - type: note
    content: 'foyer  : on reconnaît ici, avec plusieurs variantes orthographiques, le mot transcrit ariel en Es 29.2n  ; à la première occurrence on pourrait lire la montagne de Dieu (hébreu ’El) ; cf. Ez 28.14-16. –  quatre coudées, sous-entendu de hauteur (cf. v. 16). –  quatre cornes Ex 27.2n.'
  - type: text
    content: 'Le foyer avait quatre coudées ; quatre cornes s''élevaient du foyer. '
  '16':
  - type: note
    content: Cf. Ap 21.16. –  douze coudées ≈ 6,30 m.
  - type: text
    content: 'Le foyer avait douze coudées de longueur, douze coudées de largeur et formait un carré par ses quatre côtés. '
  '17':
  - type: note
    content: V. 14n. –  quatorze coudées ≈ 7,30 m ; une demi-coudée ≈ 26 cm ; une coudée ≈ 52 cm.
  - type: text
    content: Le socle avait quatorze coudées de longueur sur quatorze coudées de largeur à ses quatre côtés ; le rebord, tout autour, avait une demi-coudée ; la cavité avait une coudée tout autour, et ses marches étaient tournées vers l'est.
  '18':
  - type: text
    content: ' '
  - type: note
    content: holocaustes Lv 1.3n. –  aspersion Lv 4.6 ; 5.9 etc. – Voir sang.
  - type: text
    content: 'Il me dit : Humain, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Voici les prescriptions au sujet de l''autel, pour le jour où on le construira, afin d''y offrir les holocaustes et d''y faire l''aspersion du sang. '
  '19':
  - type: note
    content: 'prêtres-lévites 44.15 ; cf. Dt 17.9n. –  de Tsadoq…  : cf. 40.46n. –  un taureau…  : cf. Ex 29.1n,36s ; Lv 4.3 ; 8.14-17 ; 16.3,6.'
  - type: text
    content: 'Tu donneras aux prêtres-lévites, qui sont de la descendance de Tsadoq et qui se présentent devant moi afin d''officier pour moi, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – un taureau en sacrifice pour le péché. '
  '2':
  - type: note
    content: 'la gloire 1.28+ ; cf. Ap 21.11. –  arrivait de l''est  : noter ici et au v. 4 l''itinéraire inverse de celui qui a été décrit en 10.4,18-22 ; 11.22-25. –  grandes eaux 1.24+. –  la terre s''illuminait…  : cf. Nb 14.21 ; Es 6.3 ; Ps 72.19 ; Ap 18.1.'
  - type: text
    content: 'Or la gloire du Dieu d''Israël arrivait de l''est. Sa voix était pareille au bruit de grandes eaux, et la terre s''illuminait de sa gloire. '
  '20':
  - type: note
    content: 'Cf. 45.19 ; Ex 29.12 ; Lv 8.15. –  les quatre cornes de l''autel  : litt. ses quatre cornes  ; cf. v. 15+. –  le rebord, tout autour  : cf. v. 12n. – Voir péché. –  expiation v. 26 ; 45.15,17,20 ; cf. Lv 1.4+ ; 14.52s ; 16.18s.'
  - type: text
    content: 'Tu prendras de son sang et tu en mettras sur les quatre cornes de l''autel, sur les quatre angles du socle et sur le rebord, tout autour. Tu ôteras ainsi le péché de l''autel et tu feras l''expiation pour lui. '
  '21':
  - type: note
    content: 'taureau v. 19+. –  un lieu réservé  : hébreu miphqad, comme en Né 3.31n  ; cf. Ex 29.14 ; Lv 4.12n. –  Maison 40.5n.'
  - type: text
    content: 'Tu prendras le taureau du sacrifice pour le péché, et on le brûlera dans un lieu réservé de la Maison, hors du sanctuaire. '
  '22':
  - type: note
    content: 'un bouc  : cf. v. 25 ; Lv 16.5,15 ; Esd 6.17. –  sans défaut Lv 1.3n.'
  - type: text
    content: 'Le deuxième jour, tu présenteras un bouc sans défaut en sacrifice pour le péché, et on ôtera le péché de l''autel, comme on l''a fait au moyen du taureau. '
  '23':
  - type: note
    content: Cf. Nb 7.15.
  - type: text
    content: 'Quand tu auras achevé le sacrifice pour le péché, tu présenteras un taureau sans défaut et un bélier sans défaut, pris sur le petit bétail. '
  '24':
  - type: note
    content: sel Lv 2.13n.
  - type: text
    content: 'Tu les présenteras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; les prêtres jetteront du sel sur eux et les offriront en holocauste pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: note
    content: 'sept jours  : cf. 45.23 ; voir aussi Lv 8.33-35 ; 23.18.'
  - type: text
    content: 'Pendant sept jours, tu offriras chaque jour un bouc en sacrifice pour le péché ; on offrira aussi un taureau et un bélier pris sur le petit bétail, l''un et l''autre sans défaut. '
  '26':
  - type: note
    content: 'Ex 29.37. – Voir pur. –  on l''investira  : litt. on lui remplira les mains, formule habituellement réservée à l''investiture des personnes (cf. Ex 28.41n).'
  - type: text
    content: 'Pendant sept jours, on fera l''expiation de l''autel : on le purifiera et on l''investira. '
  '27':
  - type: note
    content: Cf. 2S 6.17s. –  sacrifices de paix Lv 3.1n. –  accueillerai favorablement 20.40ns.
  - type: text
    content: 'Lorsque ces jours seront achevés, à partir du huitième jour, les prêtres offriront sur l''autel vos holocaustes et vos sacrifices de paix, et je vous accueillerai favorablement – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '3':
  - type: note
    content: 'Texte incertain. –  La vision  : c''est ici (au singulier) le terme habituellement traduit par aspect (cf. 1.1n) ; certains comprennent son aspect était semblable à celui que j''avais vu… –  pour la destruction…  : litt. pour détruire la ville  ; au lieu de lorsque j''étais venu, quelques mss hébreux et des versions anciennes ont lu lorsqu''il était venu  ; cf. 1.3ss ; 3.22s ; 9.3ss. –  Kebar 1.1n.'
  - type: text
    content: La vision que j'avais était comme la vision que j'avais eue lorsque j'étais venu pour la destruction de la ville ; et ces visions étaient semblables à celle que j'avais eue près du Kebar. Je tombai face contre terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.23 ; 40.6 ; 44.2.
  - type: text
    content: 'La gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' entra dans la Maison par la porte qui donnait sur l''est. '
  '5':
  - type: note
    content: un souffle ou le Souffle  ; cf. 2.2n  ; 3.12n,14+. –  La gloire du Seigneur (v. 2+) remplissait… 44.4 ; cf. Ex 40.34 ; 1R 8.11 ; Es 6.1-4 ; 2Ch 5.13s.
  - type: text
    content: 'Alors un souffle m''enleva et me transporta dans la cour intérieure. La gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplissait la Maison. '
  '6':
  - type: note
    content: 'un homme  : des versions anciennes ont lu l''homme  ; cf. 40.3ss.'
  - type: text
    content: 'J''entendis quelqu''un qui me parlait depuis la Maison, et un homme se tenait près de moi. '
  '7':
  - type: note
    content: 'c''est ici  : le verbe est absent du texte hébreu traditionnel ; LXX tu as vu (le lieu…). –  mon trône  : cf. Jr 3.16s ; 14.21 ; 17.12 ; voir aussi Es 6.1 ; 66.1 ; Ps 2.4 ; 11.4 ; Mt 5.34 ; 23.22. –  mes pieds  : cf. Es 60.13n  ; Ps 99.5 ; 132.7 ; Lm 2.1 ; 1Ch 28.2. –  J''y demeurerai toujours 37.26 ; cf. Ex 25.8 ; 29.45s ; Nb 35.34 ; Dt 12.5 ; Za 2.14 ; 8.3. –  ses rois  : cf. 45.9n. –  ne rendront plus impur (ou ne souilleront plus  ; cf. 14.11+) mon nom sacré  : cf. 20.9+,39s ; 22.5 ; voir aussi saint. –  prostitution 6.9+ ; cf. 2R 23.7. –  sur leurs hauts lieux  : quelques mss hébreux et une version ancienne portent à leur mort, ce qui correspond à un changement d''une seule voyelle en hébreu ; on aurait dans ce cas, sans doute, une allusion aux sépultures des rois situées près du temple, source d''impureté rituelle ; cf. 44.25s ; 1R 2.10 ; 11.43 ; 14.31 ; 2R 15.7 ; 21.18n,26 ; voir aussi pur.'
  - type: text
    content: 'Il me dit : Humain, c''est ici le lieu de mon trône, le lieu de mes pieds. J''y demeurerai toujours, au milieu des Israélites. La maison d''Israël et ses rois ne rendront plus impur mon nom sacré par leur prostitution et par les cadavres de leurs rois sur leurs hauts lieux. '
  '8':
  - type: note
    content: 'près de  : litt. avec. –  les montants de leurs portes  : voir 41.21n. –  et il n''y avait qu''un mur…  : litt. et le mur entre moi et eux. Avant la destruction de Jérusalem le palais royal était contigu au temple de Salomon (1R 7.1-12). –  abominations 5.9+.'
  - type: text
    content: 'Ils mettaient leur seuil près de mon seuil, les montants de leurs portes à côté des montants de mes portes, et il n''y avait qu''un mur entre moi et eux ; ils ont ainsi rendu impur mon nom sacré par les abominations qu''ils ont commises ; c''est pourquoi je les ai exterminés dans ma colère. '
  '9':
  - type: note
    content: V. 7n.
  - type: text
    content: Maintenant ils éloigneront de moi leur prostitution et les cadavres de leurs rois, et je demeurerai toujours au milieu d'eux.
