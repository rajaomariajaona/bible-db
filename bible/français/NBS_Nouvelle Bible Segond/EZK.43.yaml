    - type: text
      text: 'S''ils sont confus à cause de tout ce qu''ils ont fait, fais-leur connaître la forme de cette Maison, sa disposition, ses issues et ses entrées, tous ses dessins et toutes ses prescriptions, tous ses dessins et toutes ses lois ; mets-en la description sous leurs yeux. Ils observeront tous ses dessins et toutes ses prescriptions, et ils les exécuteront. '
