          text: ', ce qui correspond à un changement d''une seule voyelle en hébreu ; on aurait dans ce cas, sans doute, une allusion aux sépultures des rois situées près du temple, source d''impureté rituelle ; cf. 44.25s ; 1R 2.10 ; 11.43 ; 14.31 ; 2R 15.7 ; 21.18'
        - type: usfm
