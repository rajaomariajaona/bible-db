    - type: text
      text: 'Ils mettaient leur seuil près de mon seuil, les montants de leurs portes à côté des montants de mes portes, et il n''y avait qu''un mur entre moi et eux ; ils ont ainsi rendu impur mon nom sacré par les abominations qu''ils ont commises ; c''est pourquoi je les ai exterminés dans ma colère. '
