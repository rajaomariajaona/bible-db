    marker-yv: yv-n
  - type: text
    text: A quoi donc saura-t-on que j'ai trouvé grâce à tes yeux, moi et ton peuple ? N'est-ce pas au fait que tu marcheras avec nous, et que nous serons traités différemment, moi et ton peuple, de tous les peuples de la terre ?
