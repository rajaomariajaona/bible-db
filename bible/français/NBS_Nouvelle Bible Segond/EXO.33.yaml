    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je saurai.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Dis aux Israélites : Vous êtes un peuple rétif ; si je montais un seul instant au milieu de toi, je t''exterminerais. Débarrasse-toi maintenant de tes ornements, et je verrai ce que je vais te faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Horeb '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ainsi les Israélites se dépouillèrent de leurs ornements à partir du mont Horeb.
