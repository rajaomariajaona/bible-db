  - type: text
    text: ' dit à Moïse : Va, toi et le peuple que tu as fait monter d''Egypte ; monte d''ici vers le pays que j''ai promis par serment à Abraham, à Isaac et à Jacob, en disant : « Je le donnerai à ta descendance. » '
