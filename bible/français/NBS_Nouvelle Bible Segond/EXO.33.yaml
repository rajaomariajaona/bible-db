  - type: text
    text: 'Moïse prit la tente et la dressa pour lui hors du camp, à quelque distance ; il l''appela tente de la Rencontre ; quiconque voulait consulter le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sortait vers la tente de la Rencontre, qui était hors du camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Lorsque Moïse sortait vers la tente, tout le peuple se levait ; chacun se tenait à l''entrée de sa tente et suivait des yeux Moïse, jusqu''à ce qu''il soit entré dans la tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nuée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.21+.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Moïse entrait dans la tente, la colonne de nuée descendait et s''arrêtait à l''entrée de la tente ; alors il parlait avec Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tout le peuple voyait la colonne de nuée s''arrêter à l''entrée de la tente ; alors tout le peuple se levait et se prosternait, chacun à l''entrée de sa tente. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '33.11 '
    - type: usfm
      marker: fq
      children:
