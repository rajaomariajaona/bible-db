  - type: text
    text: 'Moïse dit au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Regarde, tu me dis : « Fais monter ce peuple ! » Pourtant tu ne m''as pas fait savoir qui tu enverras avec moi. Cependant, tu as dit : « Je t''ai distingué par ton nom, et tu as trouvé grâce à mes yeux. » '
  - type: usfm
