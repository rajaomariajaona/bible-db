        text: '33.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au milieu de toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en ton sein
    - type: usfm
      marker: ft
      children:
      - type: text
