document_id: EXO.33,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu donne l'ordre de partir
  - type: text
    content: ' '
  - type: note
    content: Gn 12.7+ ; 26.3 ; 28.13. –  monter d'Egypte Gn 12.10n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Va, toi et le peuple que tu as fait monter d''Egypte ; monte d''ici vers le pays que j''ai promis par serment à Abraham, à Isaac et à Jacob, en disant : « Je le donnerai à ta descendance. » '
  '10':
  - type: text
    content: 'Tout le peuple voyait la colonne de nuée s''arrêter à l''entrée de la tente ; alors tout le peuple se levait et se prosternait, chacun à l''entrée de sa tente. '
  '11':
  - type: note
    content: 'face à face Nb 12.6-8 ; Dt 34.10. –  Josué 17.9+ ; cf. Dt 31.14. –  ne bougeait pas  : cf. 13.22n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parlait à Moïse face à face, comme un homme parle à son ami. Puis il revenait au camp ; mais son auxiliaire, le jeune Josué, fils de Noun, ne bougeait pas de l''intérieur de la tente.'
  - type: heading
    content: Dieu s'entretient avec Moïse
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'distingué  : litt. connu , cf. Gn 18.19 ; Jr 1.5. –  trouvé grâce… Gn 6.8+.'
  - type: text
    content: 'Moïse dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Regarde, tu me dis : « Fais monter ce peuple ! » Pourtant tu ne m''as pas fait savoir qui tu enverras avec moi. Cependant, tu as dit : « Je t''ai distingué par ton nom, et tu as trouvé grâce à mes yeux. » '
  '13':
  - type: note
    content: 'Cf. Ps 25.4. –  je trouverai ainsi…  : autres traductions pour que je continue de trouver… ; pour que je sache que j''ai vraiment trouvé…  ; cf. Gn 6.8+ ; 18.3n  ; Jg 6.17.'
  - type: text
    content: 'Maintenant, je t''en prie, si j''ai trouvé grâce à tes yeux, fais-moi connaître tes voies ; alors je te connaîtrai et je trouverai ainsi grâce à tes yeux. Regarde : cette nation est ton peuple !'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'J''irai moi-même  : litt. ma face ira  ; même tournure au v. 15 ; le même verbe est traduit par marcher au v. 16 ; cf. 34.9 ; Dt 4.37n  ; Es 63.9n. –  je t''accorderai le repos  : autre traduction je te conduirai  ; Jos 21.44 ; Ps 95.11 ; Hé 4.1-11 ; cf. Jg 3.11.'
  - type: text
    content: 'Il répondit : J''irai moi-même avec toi et je t''accorderai le repos.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Moïse lui dit  : litt. il lui dit.'
  - type: text
    content: 'Moïse lui dit : Si tu n''y vas pas toi-même, ne nous fais pas monter d''ici. '
  '16':
  - type: note
    content: 'nous serons traités différemment… 8.18n. –  peuples de la terre  : litt. peuples qui (sont) sur la face de la terre (Gn 2.5n) ; cf. Dt 7.6 ; 14.2.'
  - type: text
    content: A quoi donc saura-t-on que j'ai trouvé grâce à tes yeux, moi et ton peuple ? N'est-ce pas au fait que tu marcheras avec nous, et que nous serons traités différemment, moi et ton peuple, de tous les peuples de la terre ?
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'précisément…  : litt. cette parole (ou cette chose ) même que tu as dite . –  je t''ai distingué…  : litt. je t''ai connu (ou je te connais ) de nom.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Je ferai précisément ce que tu as dit, car tu as trouvé grâce à mes yeux et je t''ai distingué par ton nom.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Moïse dit  : litt. il dit . –  gloire 16.7+.'
  - type: text
    content: 'Alors Moïse dit : Fais-moi voir ta gloire, je t''en prie !'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'devant toi  : litt. sur ta face . –  toute ma bonté  : autre traduction tout ce que j''ai de bon . –  je proclamerai  : ou, selon la traduction de la même formule ailleurs, j''invoquerai . –  le nom…  : cf. 3.14n,15n  ; 34.5s ; Rm 9.15.'
  - type: text
    content: 'Il répondit : Je ferai passer devant toi toute ma bonté et je proclamerai devant toi le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ; je ferai grâce à qui je ferai grâce, et j''aurai compassion de qui j''aurai compassion. '
  '2':
  - type: note
    content: 'messager  : autre traduction ange  ; cf. 23.20. –  les Cananéens… 3.8n.'
  - type: text
    content: 'J''enverrai devant toi un messager et je chasserai les Cananéens, les Amorites, les Hittites, les Perizzites, les Hivvites et les Jébusites, '
  '20':
  - type: note
    content: 'Cf. 3.6+. –  voir ma face  : le texte joue (cf. v. 23) sur cette expression, qui est plusieurs fois traduite par paraître en la présence de (quelqu''un) et qui s''applique habituellement à la rencontre d''un personnage important ou redouté ; cf. 10.28s ; Gn 32.21 ; 33.10 ; 44.23,26 ; 46.30 ; 2S 14.24ss. –  vivre  : autre traduction rester en vie.'
  - type: text
    content: 'Il ajouta : Tu ne pourras pas voir ma face, car l''être humain ne peut me voir et vivre.'
  '21':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Voici un lieu près de moi ; tu te tiendras sur le rocher. '
  '22':
  - type: note
    content: Cf. 1R 19.13.
  - type: text
    content: 'Quand ma gloire passera, je te mettrai dans un creux du rocher et je te couvrirai de ma main jusqu''à ce que je sois passé. '
  '23':
  - type: note
    content: 'tu me verras par-derrière  : litt. tu verras mon arrière.'
  - type: text
    content: Puis je retirerai ma main, et tu me verras par-derrière ; mais ma face ne pourra pas être vue.
  '3':
  - type: note
    content: au milieu de toi ou en ton sein, de même au v. 5 ; cf. 34.9 (parmi),12. –  rétif v. 5 ; 32.9n.
  - type: text
    content: 'dans ce pays ruisselant de lait et de miel. Mais je ne monterai pas au milieu de toi, de peur de t''exterminer en chemin, car tu es un peuple rétif. '
  '4':
  - type: note
    content: 'funeste  : litt. mauvaise.'
  - type: text
    content: 'Lorsque le peuple eut entendu cette parole funeste, il prit le deuil ; personne ne mit ses ornements. '
  '5':
  - type: note
    content: 'je verrai  : litt. je saurai.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Dis aux Israélites : Vous êtes un peuple rétif ; si je montais un seul instant au milieu de toi, je t''exterminerais. Débarrasse-toi maintenant de tes ornements, et je verrai ce que je vais te faire. '
  '6':
  - type: note
    content: Horeb 3.1n.
  - type: text
    content: Ainsi les Israélites se dépouillèrent de leurs ornements à partir du mont Horeb.
  - type: heading
    content: La tente de la Rencontre
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'la tente  : LXX sa tente . –  hors du camp  : cf. Nb 2.2 ; Hé 13.13. –  tente de la Rencontre 27.21+. –  consulter le Seigneur 18.15.'
  - type: text
    content: 'Moïse prit la tente et la dressa pour lui hors du camp, à quelque distance ; il l''appela tente de la Rencontre ; quiconque voulait consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sortait vers la tente de la Rencontre, qui était hors du camp. '
  '8':
  - type: text
    content: 'Lorsque Moïse sortait vers la tente, tout le peuple se levait ; chacun se tenait à l''entrée de sa tente et suivait des yeux Moïse, jusqu''à ce qu''il soit entré dans la tente. '
  '9':
  - type: note
    content: nuée 13.21+.
  - type: text
    content: 'Lorsque Moïse entrait dans la tente, la colonne de nuée descendait et s''arrêtait à l''entrée de la tente ; alors il parlait avec Moïse. '
