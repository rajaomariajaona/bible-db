      marker: fr
      children:
      - type: text
        text: '33.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ps 25.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je trouverai ainsi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour que je continue de trouver… ; pour que je sache que j'ai vraiment trouvé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 6.8+ ; 18.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jg 6.17.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, je t''en prie, si j''ai trouvé grâce à tes yeux, fais-moi connaître tes voies ; alors je te connaîtrai et je trouverai ainsi grâce à tes yeux. Regarde : cette nation est ton peuple !'
