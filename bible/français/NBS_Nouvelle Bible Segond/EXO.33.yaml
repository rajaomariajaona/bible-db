  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parlait à Moïse face à face, comme un homme parle à son ami. Puis il revenait au camp ; mais son auxiliaire, le jeune Josué, fils de Noun, ne bougeait pas de l''intérieur de la tente.'
