document_id: LEV.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le sacrifice de paix
  - type: text
    content: ' '
  - type: note
    content: 'sacrifice de paix (v. 1-17) : le terme hébreu est apparenté au mot habituellement traduit par paix , qui évoque aussi la prospérité, c.-à-d. le bien-être ; en fonction des caractéristiques de ce sacrifice plus que du sens probable du terme hébreu correspondant, on l''appelle également sacrifice de communion  ; cf. 7.11-21,28-36 ; 19.5-8 ; 22.21-25.'
  - type: text
    content: 'Si son présent est un sacrifice de paix, s''il présente un animal pris sur le gros bétail, il présentera devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un mâle ou une femelle sans défaut. '
  '10':
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons. '
  '11':
  - type: note
    content: 'nourriture  : litt. pain, de même au v. 16 ; cf. 21.6n  ; Nb 28.2n,24.'
  - type: text
    content: 'Le prêtre fera fumer cela sur l''autel. C''est une nourriture consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '12':
  - type: text
    content: 'Si son présent est une chèvre, il le présentera devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'la tête de l''animal  : litt. sa tête, cf. v. 2n.'
  - type: text
    content: 'Il posera la main sur la tête de l''animal ; il l''immolera devant la tente de la Rencontre, et les fils d''Aaron aspergeront de son sang le pourtour de l''autel. '
  '14':
  - type: text
    content: 'De ce présent il présentera, en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
  '15':
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons. '
  '16':
  - type: note
    content: graisse v. 3n.
  - type: text
    content: 'Le prêtre fera fumer cela sur l''autel. C''est une nourriture consumée par le feu, une odeur agréable. Toute la graisse appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'prescription  : voir loi. –  pour toutes vos générations 6.11 ; 7.36 ; 10.9 ; 17.7 ; 22.3 ; 23.14,21,31,43 ; 24.3 ; Gn 17.7n. –  dans tous vos lieux d''habitation 7.26 ; 23.3,14,21,31 ; cf. Ex 19.5 ; Ps 24.1. –  sang 7.26 ; 17.10-14 ; 19.26 ; Gn 9.4 ; Dt 12.16,23 ; 15.23 ; cf. Jn 6.53 ; Ac 15.20,29.'
  - type: text
    content: 'C''est une prescription perpétuelle, pour toutes vos générations, dans tous vos lieux d''habitation : vous ne mangerez ni graisse ni sang.'
  '2':
  - type: note
    content: 'son présent  : c.-à-d. l''animal qu''il offre en présent, de même au v. 8 ; cf. 1.2n,4n. – Voir prêtres.'
  - type: text
    content: 'Il posera la main sur la tête de son présent ; il l''immolera à l''entrée de la tente de la Rencontre, et les fils d''Aaron, les prêtres, aspergeront du sang le pourtour de l''autel. '
  '3':
  - type: note
    content: 'La graisse était considérée comme la meilleure part, ici réservée à Dieu v. 16s ; 7.23-25 ; 17.6 ; cf. Gn 4.4 ; 45.18n  ; Ex 23.18 ; 1S 2.15 ; Es 25.6n  ; Ez 44.7,15 ; Ps 36.9n  ; 63.6. –  sur les entrailles  : autre traduction au-dessus des entrailles.'
  - type: text
    content: 'De ce sacrifice de paix il présentera, en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
  '4':
  - type: note
    content: 'qui les entoure… flancs  : litt. qui (est) sur eux, qui (est) sur les lombes. –  le lobe  : litt. le surplus, ce qui reste, de même dans la suite ; autre traduction possible la masse graisseuse qui est sur le foie  ; les Babyloniens employaient le lobe du foie à des fins divinatoires (cf. Ez 21.26).'
  - type: text
    content: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons. '
  '5':
  - type: note
    content: 'l''holocauste (cf. 1.3n) : il s''agit ici du sacrifice offert chaque matin ; cf. 6.5 ; Ex 29.38-42. –  sur le feu de bois 1.17n.'
  - type: text
    content: 'Les fils d''Aaron feront fumer cela sur l''autel, par-dessus l''holocauste qui est sur le feu de bois. C''est une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '6':
  - type: text
    content: 'Si son présent est pris sur le petit bétail, il présentera un mâle ou une femelle sans défaut en sacrifice de paix au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'S''il offre en présent un mouton, il le présentera devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '8':
  - type: text
    content: 'Il posera la main sur la tête de son présent ; il l''immolera devant la tente de la Rencontre, et les fils d''Aaron aspergeront de son sang le pourtour de l''autel. '
  '9':
  - type: note
    content: La queue est une partie grasse (v. 3n) chez certaines races de moutons.
  - type: text
    content: 'De ce sacrifice de paix il présentera, en offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : sa graisse, la queue entière qu''il détachera près de l''échine, la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
