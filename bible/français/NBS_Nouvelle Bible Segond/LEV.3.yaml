document_id: LEV.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le sacrifice de paix
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 1-17) : le terme hébreu est apparenté au mot habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui évoque aussi la prospérité, c.-à-d. le bien-être ; en fonction des caractéristiques de ce sacrifice plus que du sens probable du terme hébreu correspondant, on l''appelle également '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sacrifice de communion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 7.11-21,28-36 ; 19.5-8 ; 22.21-25.
      marker-yv: yv-n
    - type: text
      text: 'Si son présent est un sacrifice de paix, s''il présente un animal pris sur le gros bétail, il présentera devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' un mâle ou une femelle sans défaut. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nourriture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 16 ; cf. 21.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 28.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',24.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre fera fumer cela sur l''autel. C''est une nourriture consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si son présent est une chèvre, il le présentera devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la tête de l'animal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il posera la main sur la tête de l''animal ; il l''immolera devant la tente de la Rencontre, et les fils d''Aaron aspergeront de son sang le pourtour de l''autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'De ce présent il présentera, en offrande consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'graisse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre fera fumer cela sur l''autel. C''est une nourriture consumée par le feu, une odeur agréable. Toute la graisse appartient au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prescription
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour toutes vos '
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.11 ; 7.36 ; 10.9 ; 17.7 ; 22.3 ; 23.14,21,31,43 ; 24.3 ; Gn 17.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans tous vos lieux d''habitation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.26 ; 23.3,14,21,31 ; cf. Ex 19.5 ; Ps 24.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.26 ; 17.10-14 ; 19.26 ; Gn 9.4 ; Dt 12.16,23 ; 15.23 ; cf. Jn 6.53 ; Ac 15.20,29.
      marker-yv: yv-n
    - type: text
      text: 'C''est une prescription perpétuelle, pour toutes vos générations, dans tous vos lieux d''habitation : vous ne mangerez ni graisse ni sang.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son présent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'animal qu'il offre en présent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 8 ; cf. 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il posera la main sur la tête de son présent ; il l''immolera à l''entrée de la tente de la Rencontre, et les fils d''Aaron, les prêtres, aspergeront du sang le pourtour de l''autel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'graisse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était considérée comme la meilleure part, ici réservée à Dieu v. 16s ; 7.23-25 ; 17.6 ; cf. Gn 4.4 ; 45.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 23.18 ; 1S 2.15 ; Es 25.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 44.7,15 ; Ps 36.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 63.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur les entrailles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au-dessus des entrailles.
      marker-yv: yv-n
    - type: text
      text: 'De ce sacrifice de paix il présentera, en offrande consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui les entoure… flancs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui (est) sur eux, qui (est) sur les lombes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le lobe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le surplus, ce qui reste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite ; autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la masse graisseuse qui est sur le foie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; les Babyloniens employaient '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le lobe du foie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: à des fins divinatoires (cf. Ez 21.26).
      marker-yv: yv-n
    - type: text
      text: 'les deux rognons et la graisse qui les entoure, celle qui couvre les flancs, et le lobe du foie, qu''il détachera près des rognons. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''holocauste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : il s''agit ici du sacrifice offert chaque matin ; cf. 6.5 ; Ex 29.38-42. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur le feu de bois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils d''Aaron feront fumer cela sur l''autel, par-dessus l''holocauste qui est sur le feu de bois. C''est une offrande consumée par le feu, une odeur agréable pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si son présent est pris sur le petit bétail, il présentera un mâle ou une femelle sans défaut en sacrifice de paix au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'S''il offre en présent un mouton, il le présentera devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il posera la main sur la tête de son présent ; il l''immolera devant la tente de la Rencontre, et les fils d''Aaron aspergeront de son sang le pourtour de l''autel. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'queue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est une partie grasse (v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) chez certaines races de moutons.
      marker-yv: yv-n
    - type: text
      text: 'De ce sacrifice de paix il présentera, en offrande consumée par le feu pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : sa graisse, la queue entière qu''il détachera près de l''échine, la graisse qui couvre les entrailles, toute la graisse qui est sur les entrailles, '
