document_id: JOB.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : il se plaint de ses amis'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: qui n'épargne rien 16.13n. –  renié ou caché, effacé  ; cf. 27.11. –  Saint Es 6.3 ; 40.25 ; Ha 3.3.
  - type: text
    content: J'aurais encore une consolation,
  - type: text
    content: 'et je sauterais de joie, malgré la douleur qui n''épargne rien :'
  - type: text
    content: je n'aurais pas renié les paroles du Saint.
  '11':
  - type: text
    content: ' '
  - type: note
    content: vie v. 7n.
  - type: text
    content: Quelle est ma force, pour que j'attende ?
  - type: text
    content: Quelle sera ma fin pour que je prolonge ma vie ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 14.18.
  - type: text
    content: Ma force est-elle celle d'une pierre ?
  - type: text
    content: Ma chair est-elle du bronze ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'ressource  : cf. 5.12n.'
  - type: text
    content: Ne suis-je pas sans secours,
  - type: text
    content: toute ressource n'est-elle pas bannie loin de moi ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui est effondré…  : cf. 29.12s ; 31.16-20. –  quand même il abandonnerait  : certains comprennent sinon, il abandonnera (cf. Pr 30.9). Plusieurs versions anciennes portent  : celui qui refuse la bonté à son ami abandonne la crainte du Puissant (5.17n) ; cf. 31.28.'
  - type: text
    content: Celui qui est effondré a droit à la fidélité de son compagnon,
  - type: text
    content: quand même il abandonnerait la crainte du Puissant.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Mes frères 22.13+. –  m''ont trahi  : litt. ont trahi . –  un oued , c.-à-d. un cours d''eau intermittent qui est à sec en été (quand on a le plus besoin d''eau) ; cf. Gn 26.17n  ; 1R 17.4ss. –  comme le lit…  : on pourrait aussi traduire ils ont disparu comme les torrents (intermittents) de leur lit  ; cf. Jr 15.18 ; voir aussi 2.13.'
  - type: text
    content: Mes frères m'ont trahi comme un oued,
  - type: text
    content: comme le lit des oueds qui disparaissent.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Leurs eaux sont troubles…  : litt. ceux qui sont sombres (le texte hébreu emploie vraisemblablement deux synonymes dans les deux vers) du fait de la glace (cf. 37.10+) ; allusion probable aux eaux troubles de la fonte des neiges. –  ils sont assombris…  : traduction incertaine, litt. au-dessus d''eux se cache (ou s''assombrit  ; cf. 28.21n  ; 42.3 ; jeu d''assonance en hébreu) la neige.'
  - type: text
    content: Leurs eaux sont troubles à cause de la glace,
  - type: text
    content: ils sont assombris par la fonte des neiges ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'chaleur  : le mot hébreu n''apparaît qu''ici et son sens est incertain.'
  - type: text
    content: au temps de la chaleur, ils tarissent,
  - type: text
    content: aux feux du soleil, ils se dessèchent sur place.
  '18':
  - type: text
    content: Les caravanes dévient de leur chemin,
  - type: text
    content: s'enfoncent dans le chaos et disparaissent.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Téma  : oasis du nord de l''Arabie (Gn 25.15 ; Es 21.14 ; Jr 25.23 ; 1Ch 1.30). –  les fixent du regard , c.-à-d. les oueds (v. 15). –  convois Ps 68.25n. –  Saba  : cf. 1.15n.'
  - type: text
    content: Les caravanes de Téma les fixent du regard,
  - type: text
    content: les convois de Saba les espèrent ;
  '2':
  - type: text
    content: Oh ! s'il était possible de peser ma contrariété,
  - type: text
    content: si l'on mettait toute ma détresse sur une balance,
  '20':
  - type: text
    content: ' '
  - type: note
    content: Jr 14.3.
  - type: text
    content: ils ont honte d'avoir eu confiance ;
  - type: text
    content: quand ils arrivent, ils rougissent.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Vous non plus…  : litt. car maintenant vous êtes (cela même) pour lui (pour celui qui souffre ? pour Dieu ?) ou peut-être vous êtes devenus cela . Autres traductions car maintenant vous êtes ? Non ! ou voilà ce que vous êtes maintenant . Au lieu de pour lui ou non (termes très ressemblants en hébreu) des versions anciennes ont lu pour moi . –  ma terreur  : litt. la terreur  ; autre traduction un spectacle terrifiant.'
  - type: text
    content: Vous non plus, maintenant, vous n'êtes plus rien ;
  - type: text
    content: vous voyez ma terreur, et vous avez peur !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'vos biens  : litt. votre force . –  présents Jr 15.10.'
  - type: text
    content: 'Vous ai-je dit : « Donnez-moi quelque chose !'
  - type: text
    content: Avec vos biens, faites des présents en ma faveur !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'échapper à  : litt. échapper à la main de  ; cf. Jr 15.21.'
  - type: text
    content: Faites-moi échapper à l'adversaire,
  - type: text
    content: libérez-moi de la main des brutes ! »
  '24':
  - type: text
    content: ' '
  - type: note
    content: 10.2 ; 13.23 ; cf. Jn 8.46.
  - type: text
    content: Exposez-moi votre enseignement, et je me tairai ;
  - type: text
    content: faites-moi comprendre en quoi je me suis égaré.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'persuasifs  : d''autres comprennent doux  ; le mot signifie habituellement douloureux (cf. 1R 2.8n  ; Mi 2.10) mais on a peut-être affaire ici à un homonyme (cf. Ps 119.103). –  que prouvent vos critiques ? litt. que reprochent vos reproches ?'
  - type: text
    content: Que les discours droits sont persuasifs !
  - type: text
    content: Mais que prouvent vos critiques ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: '35.13. –  et lancer au vent…  : autre traduction alors que les discours d''un désespéré ne sont que pour le vent.'
  - type: text
    content: Comptez-vous critiquer des paroles,
  - type: text
    content: et lancer au vent les discours d'un désespéré ?
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Vous tireriez au sort  : litt. vous feriez tomber (le sort) , comme pour déterminer de qui l''orphelin sera esclave, ou qui pourra l''exploiter.'
  - type: text
    content: Vous tireriez au sort même un orphelin,
  - type: text
    content: vous donneriez votre ami !
  '28':
  - type: text
    content: Maintenant, décidez-vous à me regarder !
  - type: text
    content: Vous mentirais-je en face ?
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'est là  : autre traduction en cela  ; certains comprennent ma justice est en cause.'
  - type: text
    content: Revenez, je vous en prie, ne soyez pas injustes ;
  - type: text
    content: revenez encore, ma justice est là !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sont inconsidérées  : même verbe en Pr 20.25. Certains comprennent toutefois  : mes paroles s''étouffent , c.-à-d. je suffoque, je ne peux plus parler.'
  - type: text
    content: 'ce serait maintenant plus pesant que le sable de la mer :'
  - type: text
    content: voilà pourquoi mes paroles sont inconsidérées.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 6s ; 34.3. –  injustice / langue 27.4+. –  Mon palais 12.11 ; 33.2 ; ou ma bouche 31.30. –  la détresse  : litt. les détresses , cf. v. 2 ; le même mot est traduit par ruine en 30.13 ; cf. Ps 5.10 ; 52.4 ; 57.2 ( calamités ).'
  - type: text
    content: Y a-t-il de l'injustice sur ma langue ?
  - type: text
    content: Mon palais ne sait-il pas discerner la détresse ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'les flèches  : cf. 7.20 ; 16.13 ; 34.6n  ; Ps 38.3. –  Puissant 5.17n. –  m''ont transpercé  : litt. (sont) avec moi ou chez moi , c.-à-d. sur moi . – Voir esprit. –  effrois 9.34n  ; 22.10 ; cf. 18.11+ (autre terme hébreu) ; même terme en Ps 88.17. –  s''alignent  : le même terme peut évoquer des armées rangées en ordre de bataille (cf. 2S 10.8).'
  - type: text
    content: Car les flèches du Puissant m'ont transpercé,
  - type: text
    content: et mon esprit en boit le venin ;
  - type: text
    content: les effrois de Dieu s'alignent contre moi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: âne sauvage 11.12+ ; cf. 39.8.
  - type: text
    content: L'âne sauvage va-t-il braire auprès de l'herbe tendre ?
  - type: text
    content: Le bœuf mugit-il auprès de son fourrage ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'fade 1.22n. –  le blanc d''un œuf  : l''expression hébraïque n''apparaît qu''ici et sa signification est incertaine. Certains y voient le suc insipide d''une plante (pourpier ou guimauve) ; cf. 6.30.'
  - type: text
    content: Peut-on manger sans sel ce qui est fade ?
  - type: text
    content: Y a-t-il de la saveur dans le blanc d'un œuf ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'je refusais  : autre traduction mon gosier refusait  ; le même terme est traduit par vie au v. 11 (voir Gn 1.20n). –  c''est là ma nourriture…  : litt. eux, comme les souillures (le mot peut désigner l''impureté des règles, cf. Lv 12.2 ; 15.33 ; ou les douleurs, cf. Ps 41.4, même terme) de mon pain.'
  - type: text
    content: Ce que je refusais de toucher,
  - type: text
    content: c'est là ma nourriture, si infecte soit-elle !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ah ! si ma demande était exaucée  : litt. qui donnera que ma demande arrive ! formules de souhait analogues en 11.5 ; 13.5 ; 14.4,13 ; 19.23 ; 23.3 ; 29.2 ; 31.31,35.'
  - type: text
    content: Ah ! si ma demande était exaucée,
  - type: text
    content: si Dieu réalisait mon espoir !
  '9':
  - type: text
    content: ' '
  - type: note
    content: '3.21+ ; cf. Nb 11.15 ; 1R 19.4 ; Jon 4.3. –  se décide v. 28. –  m''achève  : le même verbe hébreu (également en 27.8, retrancher ) apparaît en Es 38.12 ( arracher ). Il faut sans doute voir ici la même image du tissu achevé sur le métier. Voir également 7.6n.'
  - type: text
    content: Que Dieu se décide à m'écraser,
  - type: text
    content: qu'il étende sa main et m'achève !
