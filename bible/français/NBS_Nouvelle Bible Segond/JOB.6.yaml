          text: comme le lit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ont disparu comme les torrents (intermittents) de leur lit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
