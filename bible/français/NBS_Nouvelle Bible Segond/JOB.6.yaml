      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Celui qui est effondré…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 29.12s ; 31.16-20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quand même il abandonnerait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sinon, il abandonnera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Pr 30.9). Plusieurs versions anciennes portent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'celui qui refuse la bonté à son ami abandonne la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' du Puissant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (5.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; cf. 31.28.
      marker-yv: yv-n
    - type: text
      text: Celui qui est effondré a droit à la fidélité de son compagnon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand même il abandonnerait la crainte du Puissant.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
