      marker-yv: yv-n
    - type: text
      text: Mes frères m'ont trahi comme un oued,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le lit des oueds qui disparaissent.
  '16':
  - type: usfm
    marker: q1
    children:
