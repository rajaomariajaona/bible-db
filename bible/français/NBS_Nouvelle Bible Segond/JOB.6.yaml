    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mes frères '
      - type: usfm
        marker: ft
        children:
        - type: text
