          text: 'au-dessus d''eux se cache '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'assombrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 28.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 42.3 ; jeu d''assonance en hébreu) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la neige.
      marker-yv: yv-n
    - type: text
      text: Leurs eaux sont troubles à cause de la glace,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils sont assombris par la fonte des neiges ;
