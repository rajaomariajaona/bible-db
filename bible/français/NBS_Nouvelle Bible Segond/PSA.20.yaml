document_id: PSA.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière pour le roi
  - type: text
    content: ' '
  - type: note
    content: 13.1+.
  - type: text
    content: Du chef de chœur. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi comprendre  : Seigneur, sauve ! Que le roi nous réponde…  ; LXX Seigneur, sauve ton roi et exauce-nous…  ; cf. 28.8s ; 118.25.'
  - type: text
    content: Seigneur
  - type: text
    content: ', sauve le roi !'
  - type: text
    content: Qu'il nous réponde, le jour où nous l'invoquons !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'au jour de la détresse  : cf. 9.10+ ; 86.7. –  Dieu de Jacob 24.6n  ; 46.8,12 ; 75.10 ; 76.7 ; 81.2,5 ; 84.9 ; 94.7 ; 2S 23.1 ; Mi 4.2. –  te protège  : le verbe hébreu signifie, au propre  : placer dans un lieu élevé , c.-à-d. inaccessible aux ennemis ; de même en 59.2 ; 69.30 ; 91.14 ; 107.41.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te réponde au jour de la détresse,'
  - type: text
    content: que le nom du Dieu de Jacob te protège !
  '3':
  - type: text
    content: ' '
  - type: note
    content: de Sion 14.7+ ; cf. 110.2. –  il te soutienne 18.36+.
  - type: text
    content: Que du sanctuaire il t'envoie du secours,
  - type: text
    content: que de Sion il te soutienne !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'qu''il agrée  : litt. qu''il trouve gras (les sacrifices) ; certains modifient le texte hébreu traditionnel pour lire qu''il recherche.'
  - type: text
    content: Qu'il se souvienne de toutes tes offrandes,
  - type: text
    content: 'qu''il agrée tes holocaustes ! '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ce que ton cœur désire  : litt. selon ton cœur  ; cf. 13.6 ; 21.3 ; 37.4 ; 1S 1.17 ; Ph 4.19.'
  - type: text
    content: Qu'il te donne ce que ton cœur désire,
  - type: text
    content: qu'il accomplisse tous tes projets !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'nous lèverons l''étendard  : LXX nous serons grandis , c.-à-d. glorifiés  ; certains modifient le texte hébreu traditionnel pour lire nous serons dans l''allégresse.'
  - type: text
    content: Nous pousserons des cris de joie à cause de ton salut,
  - type: text
    content: nous lèverons l'étendard au nom de notre Dieu ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' accomplira tout ce que tu demandes.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme qui a reçu son onction 2.2n  ; cf. 18.51. –  de son sanctuaire céleste  : litt. du ciel de sa sainteté , ce qui pourrait aussi signifier de son ciel sacré. –  le secours puissant  : autre traduction les hauts faits salvateurs. –  sa main droite 17.7+.'
  - type: text
    content: 'Je sais maintenant que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sauve l''homme qui a reçu son onction ;'
  - type: text
    content: il lui répondra de son sanctuaire céleste
  - type: text
    content: par le secours puissant de sa main droite.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'chars / chevaux 33.16s ; 147.10 ; Dt 17.16 ; Es 30.15s ; 31.1s ; Os 1.7. –  c''est le nom… que nous évoquons  : cf. Ex 3.15n  ; voir aussi Ps 33.21 ; 124.8 ; Pr 18.10.'
  - type: text
    content: Les uns, c'est leurs chars, les autres, leurs chevaux ;
  - type: text
    content: 'nous, c''est le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, que nous évoquons.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 40.29-31. –  nous sommes debout  : autre traduction nous nous levons . –  nous tenons  : autre traduction nous nous soutenons.'
  - type: text
    content: Eux, ils plient et ils tombent ;
  - type: text
    content: nous, nous sommes debout et nous tenons.
