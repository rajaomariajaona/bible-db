document_id: EXO.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Annonce du dixième fléau
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 6.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'laissera partir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Je vais faire venir encore un fléau, un seul, sur le pharaon et sur l''Egypte. Après cela il vous laissera partir d''ici. Quand il vous laissera enfin partir, il ira jusqu''à vous chasser d''ici. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''entête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse et Aaron firent tous ces prodiges devant le pharaon ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit en sorte que le pharaon s''entête : il ne laissa pas les Israélites partir de son pays.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux oreilles du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 24.7 etc. – Sur l''ensemble, cf. 3.22+.'
      marker-yv: yv-n
    - type: text
      text: 'Parle au peuple, je te prie : que chaque homme demande à son voisin, et chaque femme à sa voisine, des objets d''argent et des objets d''or. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'donné… de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: respecté… par
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: grand… aux yeux de.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait donné au peuple de la grâce aux yeux des Egyptiens ; Moïse lui-même était très respecté, en Egypte, par les gens de la cour du pharaon comme par le peuple.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Moïse dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : comparer v. 8 et 10.28s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je sortirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 12.12.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : En pleine nuit, je sortirai au milieu de l''Egypte ; '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui travaille au moulin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui (est) derrière les (deux) meules
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 11.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'tous les premiers-nés en Egypte mourront, depuis le premier-né du pharaon qui est assis sur son trône jusqu''au premier-né de la servante qui travaille au moulin, ainsi que tous les premiers-nés des bêtes. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il y aura de grands cris dans toute l''Egypte, tels qu''il n''y en a jamais eu et qu''il n''y en aura jamais plus. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'aboiera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne remuera la langue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jos 10.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 54.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: depuis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: traite différemment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais chez les Israélites, pas même un chien n''aboiera, ni contre un homme, ni contre une bête, afin que vous sachiez que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' traite différemment l''Egypte et Israël. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui te suit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui (est) à tes pieds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui (suit) tes pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il sortit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il se retira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 41.46 ; 47.10.'
      marker-yv: yv-n
    - type: text
      text: 'Alors tous les gens de ta cour viendront se prosterner devant moi, en disant : Sors, toi et tout le peuple qui te suit. Après cela je sortirai. Il sortit de chez le pharaon dans une colère ardente.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Le pharaon ne vous écoutera pas, afin que mes prodiges se multiplient en Egypte. '
