document_id: EXO.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Annonce du dixième fléau
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.1. –  laissera partir 5.1n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Je vais faire venir encore un fléau, un seul, sur le pharaon et sur l''Egypte. Après cela il vous laissera partir d''ici. Quand il vous laissera enfin partir, il ira jusqu''à vous chasser d''ici. '
  '10':
  - type: note
    content: s'entête 4.21n  ; 7.3n.
  - type: text
    content: 'Moïse et Aaron firent tous ces prodiges devant le pharaon ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit en sorte que le pharaon s''entête : il ne laissa pas les Israélites partir de son pays.'
  '2':
  - type: note
    content: 'au peuple  : litt. aux oreilles du peuple, de même en 24.7 etc. – Sur l''ensemble, cf. 3.22+.'
  - type: text
    content: 'Parle au peuple, je te prie : que chaque homme demande à son voisin, et chaque femme à sa voisine, des objets d''argent et des objets d''or. '
  '3':
  - type: note
    content: 'donné… de la grâce… 3.21+. –  des Egyptiens  : autre traduction de l''Egypte. –  respecté… par  : litt. grand… aux yeux de.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné au peuple de la grâce aux yeux des Egyptiens ; Moïse lui-même était très respecté, en Egypte, par les gens de la cour du pharaon comme par le peuple.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Moïse dit  : comparer v. 8 et 10.28s. –  je sortirai  : cf. 12.12.'
  - type: text
    content: 'Moïse dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : En pleine nuit, je sortirai au milieu de l''Egypte ; '
  '5':
  - type: note
    content: '12.29+. –  qui travaille au moulin  : litt. qui (est) derrière les (deux) meules  ; cf. Nb 11.8n.'
  - type: text
    content: 'tous les premiers-nés en Egypte mourront, depuis le premier-né du pharaon qui est assis sur son trône jusqu''au premier-né de la servante qui travaille au moulin, ainsi que tous les premiers-nés des bêtes. '
  '6':
  - type: text
    content: 'Il y aura de grands cris dans toute l''Egypte, tels qu''il n''y en a jamais eu et qu''il n''y en aura jamais plus. '
  '7':
  - type: note
    content: 'n''aboiera  : litt. ne remuera la langue, cf. Jos 10.21n  ; Es 54.17. –  contre  : autre traduction depuis. –  traite différemment  : cf. 8.18n.'
  - type: text
    content: 'Mais chez les Israélites, pas même un chien n''aboiera, ni contre un homme, ni contre une bête, afin que vous sachiez que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' traite différemment l''Egypte et Israël. '
  '8':
  - type: note
    content: 'qui te suit  : litt. qui (est) à tes pieds ou qui (suit) tes pas. –  Il sortit ou il se retira, cf. Gn 41.46 ; 47.10.'
  - type: text
    content: 'Alors tous les gens de ta cour viendront se prosterner devant moi, en disant : Sors, toi et tout le peuple qui te suit. Après cela je sortirai. Il sortit de chez le pharaon dans une colère ardente.'
  '9':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Le pharaon ne vous écoutera pas, afin que mes prodiges se multiplient en Egypte. '
