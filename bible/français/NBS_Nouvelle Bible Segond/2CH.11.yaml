document_id: 2CH.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Roboam, roi de Juda
  - type: heading
    content: 1R 12.21-24
  - type: text
    content: 'Roboam, arrivé à Jérusalem, rassembla la maison de Juda et de Benjamin, cent quatre-vingt mille guerriers d''élite, pour qu''ils combattent Israël, afin de ramener le royaume sous l''autorité de Roboam. '
  '10':
  - type: note
    content: 'Tsoréa  : ville située à environ 20 km à l''ouest de Jérusalem ; cf. Jos 15.33 ; 19.41 ; Jg 13.2,25 ; 16.31 ; 18.2,8,11 ; Né 11.29 ; voir aussi 1Ch 2.53 ; 4.2. –  Ayyalôn  : ville du Bas-Pays, à une vingtaine de kilomètres au nord-ouest de Jérusalem ; cf. 28.18 ; Jos 19.42 ; 21.24 ; Jg 1.35 ; 1Ch 6.54 ; 8.13. –  Hébron Jos 10.3n. –  villes fortes  : même mot hébreu rare aux v. 11 (forteresses), 23 ; 12.4 ; 14.5 ; 21.3 ; Es 29.3 (ouvrages de siège) ; Na 2.2.'
  - type: text
    content: 'Tsoréa, Ayyalôn et Hébron, en Juda et en Benjamin. Ce furent des villes fortes. '
  '11':
  - type: note
    content: 'forteresses  : cf. v. 10+. –  réserves  : le terme hébreu correspondant est souvent rendu par trésor  ; cf. 1Ch 27.25n.'
  - type: text
    content: 'Il répara les forteresses et il y plaça des chefs et des réserves de nourriture, d''huile et de vin. '
  '12':
  - type: note
    content: grands boucliers 1R 10.16n.
  - type: text
    content: Il y avait dans chacune de ces villes de grands boucliers et des lances ; il les rendit très fortes. Juda et Benjamin lui appartenaient.
  - type: heading
    content: Les prêtres et les lévites d'Israël se rallient à Roboam
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Voir prêtres et lévites . –  vinrent  : sous-entendu dans le texte.'
  - type: text
    content: 'Quant aux prêtres et aux lévites qui étaient dans tout Israël, ils vinrent de tout leur territoire pour se rallier à lui ; '
  '14':
  - type: note
    content: 'habitations  : le terme hébreu correspondant est plus souvent traduit par abords  ; cf. 31.19 ; Lv 25.34 ; Jos 21.2ss ; 1Ch 5.16 ; 6.40ss. – Sur les propriétés des lévites, cf. Lv 25.32s ; Nb 35.2ss.'
  - type: text
    content: 'les lévites abandonnèrent leurs habitations et leurs propriétés, et ils se rendirent en Juda et à Jérusalem, parce que Jéroboam et ses fils les avaient empêchés d''exercer leur sacerdoce pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '15':
  - type: note
    content: 'installé (litt. placé pour lui) des prêtres pour les hauts lieux  : cf. 1R 12.28-31 ; 13.33. – L''adoration des boucs n''est mentionnée qu''ici, en rapport avec le règne de Jéroboam. Voir, par ailleurs, Lv 17.7 ; Es 13.21 ; 34.14. –  les taurillons ou les veaux  : ceux de Beth-El et de Dan (1R 12.28-30), omis ici par les Chroniques.'
  - type: text
    content: 'il avait installé des prêtres pour les hauts lieux, pour les boucs et pour les taurillons qu''il avait faits. '
  '16':
  - type: note
    content: 'qui avaient décidé…  : litt. qui donnaient (ou mettaient) leur cœur à rechercher…'
  - type: text
    content: 'A leur suite, ceux de toutes les tribus d''Israël qui avaient décidé de rechercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, vinrent à Jérusalem pour sacrifier au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères. '
  '17':
  - type: note
    content: 'ils suivirent (LXX il suivit) pendant trois ans  : cf. 12.1.'
  - type: text
    content: Ils fortifièrent ainsi le royaume de Juda et encouragèrent Roboam, fils de Salomon, pendant trois ans ; car ils suivirent pendant trois ans la voie de David et de Salomon.
  - type: heading
    content: La famille de Roboam
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'fille de  : autre lecture traditionnelle fils de.'
  - type: text
    content: 'Roboam prit pour femme Mahalath, fille de Yerimoth, fils de David, et d''Abihaïl, fille d''Eliab, fils de Jessé. '
  '19':
  - type: text
    content: 'Elle lui donna des fils : Yéoush, Shemaria et Zaham. '
  '2':
  - type: text
    content: 'Mais la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Shemaya, l''homme de Dieu : '
  '20':
  - type: note
    content: 'pour femme  : sous-entendu ici, cf. v. 18. –  Maaka, fille d''Absalom  : cf. 1R 15.2n,10. –  Abiya  : successeur de Roboam (12.16) ; voir aussi 1R 14.31n.'
  - type: text
    content: 'Après elle, il prit pour femme Maaka, fille d''Absalom. Elle lui donna des enfants : Abiya, Attaï, Ziza et Shelomith. '
  '21':
  - type: note
    content: 'dix-huit femmes et soixante concubines  : cf. 1R 11.3ss ; voir aussi 2S 15.16 ; 20.23 ; 1Ch 3.1-8. –  vingt-huit fils et soixante filles  : cf. Jg 8.30 ; 12.9,14.'
  - type: text
    content: 'Roboam aimait Maaka, fille d''Absalom, plus que toutes ses femmes et ses concubines ; or il eut dix-huit femmes et soixante concubines, et il engendra vingt-huit fils et soixante filles. '
  '22':
  - type: note
    content: 'donna le premier rang  : litt. fit se tenir en tête. –  Abiya v. 20n. –  car c''est lui…  : litt. pour le faire roi.'
  - type: text
    content: 'Roboam donna le premier rang à Abiya, fils de Maaka, comme chef de ses frères, car c''est lui qu''il voulait investir de la royauté. '
  '23':
  - type: note
    content: 'dans tous les territoires  : litt. dans tous les pays  ; la même expression désigne l''ensemble du pays en 15.5 ; cf. 1Ch 13.2 – villes fortes v. 10n.'
  - type: text
    content: Il eut l'intelligence de disperser tous ses fils dans tous les territoires de Juda et de Benjamin, dans toutes les villes fortes ; il leur fournit en abondance du ravitaillement et demanda pour eux une multitude de femmes.
  '3':
  - type: text
    content: 'Dis à Roboam, fils de Salomon, roi de Juda, et à tout Israël en Juda et en Benjamin : '
  '4':
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Vous ne vous mettrez pas en campagne, vous ne ferez pas la guerre à vos frères ! Que chacun de vous rentre chez lui, car c''est de moi que cela vient. Ils écoutèrent les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils s''en retournèrent ; ils ne marchèrent pas contre Jéroboam.'
  '5':
  - type: text
    content: 'Roboam habita à Jérusalem et bâtit des villes fortes en Juda. '
  '6':
  - type: note
    content: 'Beth-Léhem (cf. 1Ch 2.51n) : à 8 km au sud-ouest de Jérusalem. –  Etam  : localité de Juda, voisine de Beth-Léhem. Le nom de cette ville est mentionné en Jos 15.59n (LXX). –  Teqoa  : localité de la région montagneuse de Juda, à 18 km au sud de Jérusalem ; cf. 20.20 ; 2S 14.2n  ; Jr 6.1 ; Am 1.1 ; voir aussi Jos 15.59n (LXX).'
  - type: text
    content: 'Il bâtit Beth-Léhem, Etam, Teqoa, '
  '7':
  - type: note
    content: 'Beth-Tsour  : ville de la région montagneuse de Juda, à environ 8 km au nord d''Hébron ; cf. 12.9 ; Jos 15.58. –  Soko  : ville du Bas-Pays de Juda, mentionnée avec Azéqa (v. 9) et Adoullam en Jos 15.35 ; cf. 1S 17.1 ; 2Ch 28.18 ; certains l''identifient à la ville de la région montagneuse citée en Jos 15.48 ; cf. 1Ch 4.18. –  Adoullam  : ville cananéenne conquise par Josué au profit de Juda (Jos 12.15 ; 15.35) ; lieu de refuge pour David (1S 22.1 ; 2S 23.13 ; voir aussi Mi 1.15), à 25 km au sud-ouest de Jérusalem.'
  - type: text
    content: 'Beth-Tsour, Soko, Adoullam, '
  '8':
  - type: note
    content: 'Gath 26.6 ; cf. Jos 11.22n  ; 1S 5.1n  ; Mi 1.10n. –  Marésha  : cf. 14.8s ; 20.37 ; Jos 15.44 ; Mi 1.15 ; 1Ch 2.42 ; 4.21. –  Ziph  : ville de la région montagneuse de Juda ; actuellement Tell Zif, à 7 km au sud-est d''Hébron (Jos 15.55). Cf. 1S 23.14-18.'
  - type: text
    content: 'Gath, Marésha, Ziph, '
  '9':
  - type: note
    content: 'Adoraïm  : place forte de Juda ; actuellement Doura, à 8 km à l''ouest d''Hébron. –  Lakish Jos 10.3n. –  Azéqa Jos 10.10s ; 15.35 ; Jr 34.7 ; Né 11.30.'
  - type: text
    content: 'Adoraïm, Lakish, Azéqa, '
