document_id: 2CH.11,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Roboam, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 12.21-24
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roboam, arrivé à Jérusalem, rassembla la maison de Juda et de Benjamin, cent quatre-vingt mille guerriers d''élite, pour qu''ils combattent Israël, afin de ramener le royaume sous l''autorité de Roboam. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsoréa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ville située à environ 20 km à l''ouest de Jérusalem ; cf. Jos 15.33 ; 19.41 ; Jg 13.2,25 ; 16.31 ; 18.2,8,11 ; Né 11.29 ; voir aussi 1Ch 2.53 ; 4.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ayyalôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ville du Bas-Pays, à une vingtaine de kilomètres au nord-ouest de Jérusalem ; cf. 28.18 ; Jos 19.42 ; 21.24 ; Jg 1.35 ; 1Ch 6.54 ; 8.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hébron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 10.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: villes fortes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même mot hébreu rare aux v. 11 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: forteresses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), 23 ; 12.4 ; 14.5 ; 21.3 ; Es 29.3 (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ouvrages de siège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; Na 2.2.
      marker-yv: yv-n
    - type: text
      text: 'Tsoréa, Ayyalôn et Hébron, en Juda et en Benjamin. Ce furent des villes fortes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: forteresses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réserves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant est souvent rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: trésor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1Ch 27.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il répara les forteresses et il y plaça des chefs et des réserves de nourriture, d''huile et de vin. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grands boucliers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 10.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il y avait dans chacune de ces villes de grands boucliers et des lances ; il les rendit très fortes. Juda et Benjamin lui appartenaient.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les prêtres et les lévites d'Israël se rallient à Roboam
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vinrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Quant aux prêtres et aux lévites qui étaient dans tout Israël, ils vinrent de tout leur territoire pour se rallier à lui ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: habitations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant est plus souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: abords
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 31.19 ; Lv 25.34 ; Jos 21.2ss ; 1Ch 5.16 ; 6.40ss. – Sur les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'propriétés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Lv 25.32s ; Nb 35.2ss.'
      marker-yv: yv-n
    - type: text
      text: 'les lévites abandonnèrent leurs habitations et leurs propriétés, et ils se rendirent en Juda et à Jérusalem, parce que Jéroboam et ses fils les avaient empêchés d''exercer leur sacerdoce pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'installé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: placé pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des prêtres pour les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 12.28-31 ; 13.33. – L''adoration des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'boucs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''est mentionnée qu''ici, en rapport avec le règne de Jéroboam. Voir, par ailleurs, Lv 17.7 ; Es 13.21 ; 34.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les taurillons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les veaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ceux de Beth-El et de Dan (1R 12.28-30), omis ici par les Chroniques.'
      marker-yv: yv-n
    - type: text
      text: 'il avait installé des prêtres pour les hauts lieux, pour les boucs et pour les taurillons qu''il avait faits. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui avaient décidé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui donnaient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mettaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' à rechercher…'
      marker-yv: yv-n
    - type: text
      text: 'A leur suite, ceux de toutes les tribus d''Israël qui avaient décidé de rechercher le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, vinrent à Jérusalem pour sacrifier au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de leurs pères. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils suivirent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il suivit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pendant trois ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.1.'
      marker-yv: yv-n
    - type: text
      text: Ils fortifièrent ainsi le royaume de Juda et encouragèrent Roboam, fils de Salomon, pendant trois ans ; car ils suivirent pendant trois ans la voie de David et de Salomon.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La famille de Roboam
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fille de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils de.
      marker-yv: yv-n
    - type: text
      text: 'Roboam prit pour femme Mahalath, fille de Yerimoth, fils de David, et d''Abihaïl, fille d''Eliab, fils de Jessé. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Elle lui donna des fils : Yéoush, Shemaria et Zaham. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Shemaya, l''homme de Dieu : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu ici, cf. v. 18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maaka, fille d'Absalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abiya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : successeur de Roboam (12.16) ; voir aussi 1R 14.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Après elle, il prit pour femme Maaka, fille d''Absalom. Elle lui donna des enfants : Abiya, Attaï, Ziza et Shelomith. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dix-huit femmes et soixante concubines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 11.3ss ; voir aussi 2S 15.16 ; 20.23 ; 1Ch 3.1-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vingt-huit fils et soixante filles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 8.30 ; 12.9,14.'
      marker-yv: yv-n
    - type: text
      text: 'Roboam aimait Maaka, fille d''Absalom, plus que toutes ses femmes et ses concubines ; or il eut dix-huit femmes et soixante concubines, et il engendra vingt-huit fils et soixante filles. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donna le premier rang
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fit se tenir en tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abiya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car c'est lui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour le faire roi.
      marker-yv: yv-n
    - type: text
      text: 'Roboam donna le premier rang à Abiya, fils de Maaka, comme chef de ses frères, car c''est lui qu''il voulait investir de la royauté. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans tous les territoires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans tous les pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la même expression désigne l''ensemble du pays en 15.5 ; cf. 1Ch 13.2 – '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'villes fortes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il eut l'intelligence de disperser tous ses fils dans tous les territoires de Juda et de Benjamin, dans toutes les villes fortes ; il leur fournit en abondance du ravitaillement et demanda pour eux une multitude de femmes.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Dis à Roboam, fils de Salomon, roi de Juda, et à tout Israël en Juda et en Benjamin : '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Vous ne vous mettrez pas en campagne, vous ne ferez pas la guerre à vos frères ! Que chacun de vous rentre chez lui, car c''est de moi que cela vient. Ils écoutèrent les paroles du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; ils s''en retournèrent ; ils ne marchèrent pas contre Jéroboam.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Roboam habita à Jérusalem et bâtit des villes fortes en Juda. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth-Léhem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 1Ch 2.51
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : à 8 km au sud-ouest de Jérusalem. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Etam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité de Juda, voisine de Beth-Léhem. Le nom de cette ville est mentionné en Jos 15.59'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ('
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Teqoa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : localité de la région montagneuse de Juda, à 18 km au sud de Jérusalem ; cf. 20.20 ; 2S 14.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 6.1 ; Am 1.1 ; voir aussi Jos 15.59'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (LXX).'
      marker-yv: yv-n
    - type: text
      text: 'Il bâtit Beth-Léhem, Etam, Teqoa, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '11.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Beth-Tsour
      - type: usfm
        marker: ft
