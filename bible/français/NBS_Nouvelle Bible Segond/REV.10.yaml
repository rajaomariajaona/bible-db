  - type: text
    text: 'La voix que j''avais entendue venir du ciel parla encore avec moi. Elle me dit : Va prendre le petit livre ouvert dans la main de l''ange qui se tient debout sur la mer et sur la terre. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ez 2.8–3.3 ; cf. Jr 15.16-18 ; Ps 119.103.
    marker-yv: yv-n
  - type: text
    text: 'J''allai vers l''ange et je lui dis de me donner le petit livre. Il me dit : Prends-le et avale-le ; il remplira ton ventre d''amertume, mais dans ta bouche il sera doux comme du miel.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Je pris le petit livre de la main de l''ange et je l''avalai : il fut doux comme du miel dans ma bouche, mais quand je l''eus mangé mon ventre fut rempli d''amertume. '
  - type: usfm
