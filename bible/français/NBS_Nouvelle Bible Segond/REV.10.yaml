    marker-yv: yv-n
  - type: text
    text: 'Quand les sept tonnerres eurent parlé, j''allais écrire, mais j''entendis du ciel une voix qui disait : Tiens secret ce qu''ont dit les sept tonnerres ; ne l''écris pas.'
