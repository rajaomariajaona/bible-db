    marker-yv: yv-n
  - type: text
    text: 'et jura par celui qui vit à tout jamais, qui a créé le ciel et ce qui s''y trouve, la terre et ce qui s''y trouve, la mer et ce qui s''y trouve : Il n''y aura plus de délai ! '
