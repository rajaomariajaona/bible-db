document_id: REV.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'ange et le petit livre ouvert
  - type: text
    content: ' '
  - type: note
    content: 'un autre ange (8.3+) puissant (5.2+) qui descendait du ciel 18.1 ; 20.1. –  nuée Ex 13.21n. –  un halo…  : litt. le halo (ou l''arc-en-ciel ) sur sa tête , voir 4.3n. –  son visage… 1.16+. –  ses jambes  : litt. ses pieds.'
  - type: text
    content: 'Je vis un autre ange puissant qui descendait du ciel, vêtu d''une nuée, un halo autour de la tête ; son visage était comme le soleil et ses jambes comme des colonnes de feu. '
  '10':
  - type: text
    content: 'Je pris le petit livre de la main de l''ange et je l''avalai : il fut doux comme du miel dans ma bouche, mais quand je l''eus mangé mon ventre fut rempli d''amertume. '
  '11':
  - type: note
    content: 'Cf. 5.9+ ; Jr 1.10 ; 25.30 ; Ez 25.2 ; Dn 3.4n. –  nations  : voir non-Juifs.'
  - type: text
    content: 'Alors on me dit : Il faut encore que tu parles en prophète sur beaucoup de peuples, de nations, de langues, de rois.'
  '2':
  - type: note
    content: 'petit livre v. 8-10 ; cf. Ez 2.9. –  ouvert  : cf. 5.2ss.'
  - type: text
    content: 'Il tenait à la main un petit livre ouvert. Il posa le pied droit sur la mer et le pied gauche sur la terre, '
  '3':
  - type: note
    content: 'il cria… 6.10n  ; 7.2+. –  comme un lion qui rugit Os 11.10 ; Am 1.2 ; 3.8 ; cf. Jr 25.30. –  sept tonnerres  : cf. Ps 29.3-9. –  firent entendre  : le même verbe est traduit par parler, selon son sens habituel, aux v. 4,8.'
  - type: text
    content: 'et il cria comme un lion qui rugit. A son cri, les sept tonnerres firent entendre leurs voix. '
  '4':
  - type: note
    content: 'du ciel une voix v. 8 ; 14.2,13 ; 18.4. –  Tiens secret  : litt. scelle, de même en 22.10 ; Dn 8.26 ; 12.4,9.'
  - type: text
    content: 'Quand les sept tonnerres eurent parlé, j''allais écrire, mais j''entendis du ciel une voix qui disait : Tiens secret ce qu''ont dit les sept tonnerres ; ne l''écris pas.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 32.40 ; Dn 12.7.
  - type: text
    content: 'Alors l''ange que j''avais vu debout sur la mer et sur la terre leva la main droite vers le ciel '
  '6':
  - type: note
    content: 'celui qui vit… 4.9+. –  qui a créé  : cf. 14.7 ; Gn 1.1n  ; 14.19,22 ; Ex 20.11 ; Ps 146.6 ; Né 9.6 ; Ac 4.24. –  Il n''y aura  : autre traduction qu''il n''y aurait. –  plus de délai  : litt. plus de temps.'
  - type: text
    content: 'et jura par celui qui vit à tout jamais, qui a créé le ciel et ce qui s''y trouve, la terre et ce qui s''y trouve, la mer et ce qui s''y trouve : Il n''y aura plus de délai ! '
  '7':
  - type: note
    content: 'aux jours…  : litt. aux jours de la voix (ou du son, de la sonnerie) du septième ange, quand il va sonner…  ; 11.15 ; cf. 1Co 15.51s. –  le mystère de Dieu Rm 16.25 ; 1Co 2.7 ; Ep 1.9 ; 3.3-5,9s ; 6.19 ; Col 1.26s ; 2.2 ; 4.3. –  s''accomplira  : le même verbe est traduit par achever en 11.7 ; 15.8 ; 20.3,5,7 ; cf. 15.1 ; 17.17. –  ses esclaves (ou ses serviteurs, 1.1+), les prophètes 11.18 ; cf. Jr 7.25 ; 25.4 ; Am 3.7 ; Za 1.6 ; Dn 9.6-10.'
  - type: text
    content: Mais aux jours où le septième ange va sonner de la trompette, alors le mystère de Dieu s'accomplira, selon la bonne nouvelle qu'il a annoncée à ses esclaves, les prophètes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'La voix v. 4+. –  petit livre v. 2+. –  ouvert ou déroulé  : cf. 5.1n.'
  - type: text
    content: 'La voix que j''avais entendue venir du ciel parla encore avec moi. Elle me dit : Va prendre le petit livre ouvert dans la main de l''ange qui se tient debout sur la mer et sur la terre. '
  '9':
  - type: note
    content: Ez 2.8–3.3 ; cf. Jr 15.16-18 ; Ps 119.103.
  - type: text
    content: 'J''allai vers l''ange et je lui dis de me donner le petit livre. Il me dit : Prends-le et avale-le ; il remplira ton ventre d''amertume, mais dans ta bouche il sera doux comme du miel.'
