    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.2ss.'
    marker-yv: yv-n
  - type: text
    text: 'Il tenait à la main un petit livre ouvert. Il posa le pied droit sur la mer et le pied gauche sur la terre, '
