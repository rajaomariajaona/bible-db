    marker-yv: yv-n
  - type: text
    text: Isaac fit donc partir Jacob qui se rendit à Paddân-Aram, auprès de Laban, fils de Betouel, l'Araméen, et frère de Rébecca, mère de Jacob et d'Esaü.
