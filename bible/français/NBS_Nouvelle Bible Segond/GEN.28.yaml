document_id: GEN.28,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 24.3+ ; 27.46. –  Tu ne prendras pas…  : litt. tu ne prendras pas une femme d''entre les filles de Canaan (cf. v. 2).'
  - type: text
    content: 'Isaac appela Jacob, le bénit et lui donna cet ordre : Tu ne prendras pas pour femme une Cananéenne. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 26.33 ; 27.43 ; 29.4.
  - type: text
    content: 'Jacob partit de Bersabée pour Harrân. '
  '11':
  - type: note
    content: 'un lieu  : litt. le lieu, cf. v. 16n. –  soleil 15.12,17. –  pierres v. 18.'
  - type: text
    content: 'Il atteignit un lieu où il passa la nuit, car le soleil s''était couché. Il prit l''une des pierres du lieu, la plaça sous sa tête et se coucha en ce lieu. '
  '12':
  - type: note
    content: 'rêve 20.3+ ; 37.5-11. –  escalier  : le mot hébreu soullam (traditionnellement rendu ici par échelle) désignait peut-être une rampe d''accès comme on en construisait dans la haute Antiquité pour assiéger les villes ; celle qui est encore visible à Massada, sur la rive ouest de la mer Morte, en est un bon spécimen. L''image pourrait aussi rappeler les escaliers des temples à étages de Mésopotamie, cf. 11.4n. –  messagers  : autre traduction anges  ; cf. 16.7 ; 19.1. Voir Jn 1.51.'
  - type: text
    content: 'Il fit alors un rêve : un escalier était dressé sur la terre, et son sommet touchait au ciel ; les messagers de Dieu y montaient et y descendaient. '
  '13':
  - type: note
    content: 'au-dessus de lui  : autre traduction près de lui, de l''escalier, ou de Jacob.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se tenait au-dessus de lui ; il dit : Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Abraham, ton père, et le Dieu d''Isaac. La terre sur laquelle tu es couché, je te la donnerai, à toi et à ta descendance. '
  '14':
  - type: note
    content: 'Cf. v. 3s ; 12.3n. –  poussière 13.16. –  tu t''étendras  : autres traductions tu éclateras ; tu exploseras  ; même verbe en 30.30,43 ; 38.29 ; Ex 1.12 ; cf. Dt 12.20 ; 19.8. –  ouest / sud 12.8n  ; 13.14n. –  Tous les clans… se béniront par toi 12.3n.'
  - type: text
    content: 'Ta descendance sera aussi nombreuse que les grains de poussière de la terre ; tu t''étendras à l''ouest et à l''est, au nord et au sud. Tous les clans de la terre se béniront par toi et par ta descendance. '
  '15':
  - type: note
    content: 26.3 ; 31.3,5 ; Dt 2.7.
  - type: text
    content: Je suis avec toi, je te garderai partout où tu iras et je te ramènerai vers cette terre ; car je ne t'abandonnerai pas, jusqu'à ce que j'aie fait ce que je t'ai dit.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ce lieu  : pris absolument, le terme hébreu maqom désigne souvent un sanctuaire, lieu de la résidence de Dieu ou d''un dieu, et en particulier le temple de Jérusalem (voir Dt 12.2ss).'
  - type: text
    content: 'Jacob s''éveilla de son sommeil ; il dit : Vraiment, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est en ce lieu, et moi, je ne le savais pas ! '
  '17':
  - type: note
    content: 'Ex 3.5 ; 19.12. –  peur  : voir crainte.'
  - type: text
    content: 'Il eut peur et dit : Que ce lieu est redoutable ! Ce n''est rien de moins que la maison de Dieu, c''est la porte du ciel ! '
  '18':
  - type: note
    content: 'La pierre levée commémore l''événement et signale la présence de la divinité. Cette signification est consacrée par l''onction d’huile (31.13 ; 35.14 ; cf. Ex 30.25s ; Dt 7.5 ; 12.3 ; 16.22). –  son sommet  : le même mot est traduit par tête au v. 11.'
  - type: text
    content: 'Jacob se leva de bon matin ; il prit la pierre qu''il avait placée sous sa tête, il en fit une pierre levée et versa de l''huile sur son sommet. '
  '19':
  - type: note
    content: Beth-El (transcription traditionnelle Béthel, mais le texte hébreu l'écrit comme un nom composé) signifie maison d'El (cf. 21.33n) ou maison de Dieu. Ce sera plus tard un important sanctuaire israélite, à 20 km au nord de Jérusalem (12.8n  ; 31.13 ; 35.1-15). –  Louz 48.3 ; Jg 1.22s.
  - type: text
    content: 'Il appela ce lieu du nom de Beth-El – mais le nom de la ville avait d''abord été Louz. '
  '2':
  - type: note
    content: Os 12.13. –  Paddân-Aram 25.20n  ; cf. 27.43. –  Betouel est père de Rébecca et de Laban ; v. 5 ; 24.15.
  - type: text
    content: 'Va à Paddân-Aram, chez Betouel, le père de ta mère ; là-bas, prends pour femme une des filles de Laban, le frère de ta mère. '
  '20':
  - type: text
    content: 'Jacob fit ce vœu : Si Dieu est avec moi et me garde sur la route où je vais, s''il me donne du pain à manger et des habits pour me vêtir, '
  '21':
  - type: note
    content: 'sain et sauf  : litt. en paix  ; cf. Jos 10.21+.'
  - type: text
    content: 'et si je reviens sain et sauf chez mon père, alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera mon Dieu. '
  '22':
  - type: note
    content: dîme 14.20n  ; Nb 18.21-24 ; Dt 12.6,18 ; 14.22ss ; 26.12 ; cf. Am 4.4.
  - type: text
    content: Cette pierre dont j'ai fait une pierre levée sera une maison de Dieu. Sur tout ce que tu me donneras, je te paierai la dîme.
  '3':
  - type: note
    content: 'le Dieu-Puissant, hébreu ’El-Shaddaï 17.1n. –  assemblée  : hébreu qahal. Ce terme est habituellement traduit par le grec ekklèsia, qui a donné notre mot église (ici LXX le rend par le terme sunagogê, qui a donné synagogue). Ici il pourrait signifier, plus généralement, une foule.'
  - type: text
    content: 'Que le Dieu-Puissant te bénisse, te rende fécond et te multiplie, et que tu deviennes une assemblée de peuples ! '
  '4':
  - type: note
    content: 12.3+,7+,10n  ; 20.1n.
  - type: text
    content: 'Qu''il te donne la bénédiction d''Abraham, à toi et à ta descendance avec toi, afin que tu prennes possession du pays où tu séjournes en immigré, ce pays que Dieu a donné à Abraham ! '
  '5':
  - type: note
    content: V. 2n.
  - type: text
    content: Isaac fit donc partir Jacob qui se rendit à Paddân-Aram, auprès de Laban, fils de Betouel, l'Araméen, et frère de Rébecca, mère de Jacob et d'Esaü.
  '6':
  - type: text
    content: ' '
  - type: note
    content: V. 1n.
  - type: text
    content: 'Esaü vit qu''Isaac avait béni Jacob et l''avait envoyé à Paddân-Aram pour y prendre femme, et qu''en le bénissant il lui avait donné cet ordre : « Tu ne prendras pas pour femme une Cananéenne » ; '
  '7':
  - type: note
    content: 'il vit  : sous-entendu dans le texte.'
  - type: text
    content: 'il vit que Jacob, écoutant son père et sa mère, était parti pour Paddân-Aram. '
  '8':
  - type: note
    content: 26.34s.
  - type: text
    content: 'Esaü vit ainsi que les Cananéennes déplaisaient à Isaac, son père. '
  '9':
  - type: note
    content: 'Mahalath  : Smr Basmath, de même dans la suite (cf. 26.34 ; 36.3). –  Nebayoth 25.13.'
  - type: text
    content: Alors Esaü se rendit auprès d'Ismaël. Il prit pour femme Mahalath, fille d'Ismaël, fils d'Abraham, et sœur de Nebayoth, en plus de ses autres femmes.
  - type: heading
    content: Le rêve de Jacob
