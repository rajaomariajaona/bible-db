    marker-yv: yv-n
  - type: text
    text: Je suis avec toi, je te garderai partout où tu iras et je te ramènerai vers cette terre ; car je ne t'abandonnerai pas, jusqu'à ce que j'aie fait ce que je t'ai dit.
