      children:
      - type: text
        text: il vit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'il vit que Jacob, écoutant son père et sa mère, était parti pour Paddân-Aram. '
  - type: usfm
    marker: vlbl
