  - type: text
    text: 'Esaü vit qu''Isaac avait béni Jacob et l''avait envoyé à Paddân-Aram pour y prendre femme, et qu''en le bénissant il lui avait donné cet ordre : « Tu ne prendras pas pour femme une Cananéenne » ; '
