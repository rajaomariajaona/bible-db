  - type: text
    text: 'Ta descendance sera aussi nombreuse que les grains de poussière de la terre ; tu t''étendras à l''ouest et à l''est, au nord et au sud. Tous les clans de la terre se béniront par toi et par ta descendance. '
  - type: usfm
    marker: vlbl
