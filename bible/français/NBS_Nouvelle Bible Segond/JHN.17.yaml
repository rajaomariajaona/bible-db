        text: '17.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je viens à toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ma joie, complète '
    - type: usfm
