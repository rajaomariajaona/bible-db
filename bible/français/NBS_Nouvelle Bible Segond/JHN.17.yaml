document_id: JHN.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus prie pour ses disciples
  - type: text
    content: ' '
  - type: note
    content: 'leva les yeux 11.41+. –  l''heure est venue 2.4+ ; cf. 12.23. –  Glorifie… 7.39+ ; 13.31+. –  le Fils  : certains mss portent ton Fils.'
  - type: text
    content: 'Après avoir parlé ainsi, Jésus leva les yeux au ciel et dit : Père, l''heure est venue. Glorifie ton Fils, pour que le Fils te glorifie, '
  '10':
  - type: note
    content: 16.15 ; cf. Lc 15.31.
  - type: text
    content: '– comme tout ce qui est à moi est à toi et ce qui est à toi est à moi – et je suis glorifié en eux. '
  '11':
  - type: note
    content: 'Je ne suis plus dans le monde 13.1+ ; cf. 16.4 ; Origène cite un développement paradoxal de cette formule, développement qu''il juge inauthentique : « Je ne suis plus dans le monde et dans le monde je suis. » –  Père saint  : cf. Lv 11.44+. –  garde-les…  : certains mss portent garde en ton nom ceux que tu m''as donnés (cf. v. 2). –  ton nom… que tu m''as donné  : cf. 1.12n  ; 8.24n. –  qu''ils soient un comme nous  : cf. v. 21-23 ; 10.30 ; Ga 3.28. – Cf. Didachè 10.2 : « Nous te rendons grâce, Père saint, pour ton saint nom que tu as fait habiter dans nos cœurs, et pour la connaissance, la foi et l''immortalité que tu nous as révélées par Jésus ton serviteur. »'
  - type: text
    content: 'Je ne suis plus dans le monde ; eux sont dans le monde, et moi, je viens à toi. Père saint, garde-les en ton nom, ce nom que tu m''as donné, pour qu''ils soient un comme nous. '
  '12':
  - type: note
    content: 'j''étais avec eux  : certains mss ajoutent dans le monde. –  je les gardais…  : certains mss portent je gardais en ton nom ceux que tu m''as donnés. –  aucun d''eux ne s''est perdu  : cf. 3.16+ ; 6.39+ ; 18.8s. –  celui qui est voué à la perdition  : litt. le fils de la perdition  ; même expression en 2Th 2.3n  ; cf. 1Jn 2.18,22 ; 4.3. –  que l''Ecriture soit accomplie 13.18+.'
  - type: text
    content: 'Lorsque j''étais avec eux, moi, je les gardais en ton nom, ce nom que tu m''as donné. Je les ai préservés, et aucun d''eux ne s''est perdu, sinon celui qui est voué à la perdition, pour que l''Ecriture soit accomplie. '
  '13':
  - type: note
    content: je viens à toi 13.1+. –  ma joie, complète 15.11+.
  - type: text
    content: 'Maintenant, je viens à toi, et je parle ainsi dans le monde pour qu''ils aient en eux ma joie, complète. '
  '14':
  - type: note
    content: Cf. 8.23+ ; 15.18+s.
  - type: text
    content: 'Moi, je leur ai donné ta parole, et le monde les a détestés, parce qu''ils ne sont pas du monde, comme moi, je ne suis pas du monde. '
  '15':
  - type: note
    content: 'du Mauvais  : autre traduction du mal  ; cf. 12.31+ ; Mt 5.37n  ; 6.13+ ; 2Th 3.3 ; 1Jn 2.13s ; 3.12 ; 5.18s.'
  - type: text
    content: 'Je ne te demande pas de les enlever du monde, mais de les garder du Mauvais. '
  '16':
  - type: note
    content: V. 14.
  - type: text
    content: 'Ils ne sont pas du monde, comme moi, je ne suis pas du monde. '
  '17':
  - type: note
    content: 'Consacre-les  : traduction traditionnelle sanctifie-les  ; un terme apparenté est traduit par saint au v. 11 ; cf. v. 19 ; 10.36. –  par (ou dans) la vérité (certains mss portent ta vérité) 8.32+ ; cf. 4.23s. –  c''est ta parole…  : autre traduction ta parole est vérité  ; cf. 1.1n  ; voir aussi Ps 119.43,142,160 ; Ec 12.10 ; 1P 1.22.'
  - type: text
    content: 'Consacre-les par la vérité : c''est ta parole qui est la vérité. '
  '18':
  - type: note
    content: envoyé dans le monde 3.17+ ; cf. 20.21.
  - type: text
    content: 'Comme tu m''as envoyé dans le monde, moi aussi je les ai envoyés dans le monde. '
  '19':
  - type: note
    content: 'moi (le terme correspondant est absent de certains mss), je me consacre (v. 17n) moi-même pour eux  : cf. 6.51 ; 10.18,36 ; 15.13 ; 1Co 1.30 ; 11.24 ; Hé 2.9,11+. –  par la vérité  : autre traduction en vérité  ; cf. v. 17n.'
  - type: text
    content: Et moi, je me consacre moi-même pour eux, pour qu'eux aussi soient consacrés par la vérité.
  '2':
  - type: note
    content: 'pouvoir (1.12n) sur tous (litt. toute chair) : cf. 3.35+ ; Mt 28.18+. –  vie éternelle 3.15+. –  ceux que tu lui as donnés v. 6,9,24 ; cf. 6.37+.'
  - type: text
    content: 'et que, comme tu lui as donné pouvoir sur tous, il donne la vie éternelle à tous ceux que tu lui as donnés. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'pas seulement pour ceux-ci v. 9 ; cf. 10.16+ ; 1Jn 1.3. –  qui, par leur parole, mettront leur foi (ou croiront , cf. v. 8,21) en moi  : cf. 20.29 ; Rm 10.17.'
  - type: text
    content: 'Ce n''est pas seulement pour ceux-ci que je demande, mais encore pour ceux qui, par leur parole, mettront leur foi en moi, '
  '21':
  - type: note
    content: 'soient un v. 11+. –  tu es en moi… 10.38+. –  soient en nous  : certains mss portent soient un en nous. –  pour que le monde croie… v. 8s ; 1.10n.'
  - type: text
    content: 'afin que tous soient un, comme toi, Père, tu es en moi et moi en toi, qu''eux aussi soient en nous, pour que le monde croie que c''est toi qui m''as envoyé. '
  '22':
  - type: note
    content: Cf. v. 24.
  - type: text
    content: 'Et moi, je leur ai donné la gloire que tu m''as donnée, pour qu''ils soient un comme nous, nous sommes un, '
  '23':
  - type: note
    content: 'moi en eux 15.4,9 ; Rm 8.10+. –  accomplis (ou rendus parfaits  ; même verbe v. 4 ; 4.34 ; 5.36 ; 19.38) dans l''unité  : litt. en un (seul), cf. 11.52n. –  que le monde (1.10n) sache ou comprenne, reconnaisse cf. v. 8n,21 ; 14.21+. –  tu les as aimés 16.27. –  comme tu m''as aimé 3.35+.'
  - type: text
    content: – moi en eux et toi en moi – pour qu'ils soient accomplis dans l'unité et que le monde sache que c'est toi qui m'as envoyé et que tu les as aimés comme tu m'as aimé.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ce que tu m''as donné  : certains mss portent ceux que tu m''as donnés  ; cf. 6.37+. –  là où, moi, je suis 12.26+. –  qu''ils voient ma gloire 1.14+ ; 2Co 3.18–4.6 ; 1Jn 3.2 ; cf. Gn 45.13. –  avant…  : cf. v. 5+.'
  - type: text
    content: 'Quant à ce que tu m''as donné, Père, je veux que là où, moi, je suis, eux aussi soient avec moi, pour qu''ils voient ma gloire, celle que tu m''as donnée parce que tu m''as aimé avant la fondation du monde. '
  '25':
  - type: note
    content: 'juste  : cf. Ps 7.18 ; 9.5 ; 96.13 ; 116.5 ; 129.4 ; 145.17 ; Rm 3.26 ; Ap 16.5. –  le monde ne t''a jamais connu 1.10n  ; 7.28+. –  je t''ai connu ou je suis parvenu à te connaître 8.55 ; Mt 11.27/ /. –  su  : autres traductions compris, reconnu  ; le même verbe est traduit par connaître dans les propositions précédentes.'
  - type: text
    content: 'Père juste, le monde ne t''a jamais connu ; mais moi, je t''ai connu, et eux, ils ont su que tu m''as envoyé. '
  '26':
  - type: note
    content: fait connaître 15.15. –  ton nom v. 6+. –  que l'amour… 15.9 ; cf. Rm 8.39.
  - type: text
    content: Je leur ai fait connaître ton nom et je le leur ferai connaître, pour que l'amour dont tu m'as aimé soit en eux, comme moi en eux.
  '3':
  - type: note
    content: 'c''est qu''ils te connaissent  : le même verbe est aussi traduit par savoir dans la suite (v. 7s,23,25) ; 14.6-9 ; cf. 4.14,36 ; 6.27 ; 12.25 ; 1Jn 3.1s ; 5.13,20 ; voir aussi Jr 24.7 ; 31.31-34 ; Ez 36.25-28 ; Sagesse 15.3 : « Savoir qui tu es (Dieu) conduit à la justice parfaite et reconnaître ta souveraineté est la racine de l''immortalité. »'
  - type: text
    content: '– Or la vie éternelle, c''est qu''ils te connaissent, toi, le seul vrai Dieu, et celui que tu as envoyé, Jésus-Christ. – '
  '4':
  - type: note
    content: 'je t''ai glorifié  : cf. 13.31+,32. –  j''ai accompli ou j''ai achevé  : même verbe v. 23 ; 4.34+ (terme apparenté en Hé 5.9).'
  - type: text
    content: 'Moi, je t''ai glorifié sur la terre ; j''ai accompli l''œuvre que tu m''as donnée à faire. '
  '5':
  - type: note
    content: 'glorifie-moi…  : cf. 7.39+ ; 8.54+. –  auprès  : cf. 1.39n. –  avant que le monde soit  : cf. v. 24 ; 1.1-3,14 ; 8.58 ; cf. Ph 2.6-11 ; Hé 2.9 ; 5.5.'
  - type: text
    content: Et maintenant, toi, Père, glorifie-moi auprès de toi-même de la gloire que j'avais auprès de toi avant que le monde soit.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai manifesté ton nom (1.31+) : cf. v. 11s,26 ; cf. 1.18 ; 12.28 ; 14.7-9 ; voir aussi Ex 3.12-15 ; Hé 2.12. –  aux hommes (autre traduction aux humains , cf. 1.9n) que tu m''as donnés v. 2 ; 6.37+,44. –  Ils étaient à toi v. 9s ; cf. 1.47 ; 3.21 ; 6.44s ; 7.17 ; 18.37. –  ils ont gardé ta parole 8.51+. – Cf. Odes de Salomon 42.20 : « Je posai sur leur tête mon Nom, puisqu''ils sont fils libres, ils sont à moi. »'
  - type: text
    content: 'J''ai manifesté ton nom aux hommes que tu m''as donnés du milieu du monde. Ils étaient à toi, et tu me les as donnés ; et ils ont gardé ta parole. '
  '7':
  - type: note
    content: Cf. 6.46+.
  - type: text
    content: 'Maintenant, ils savent que tout ce que tu m''as donné est issu de toi. '
  '8':
  - type: note
    content: 'su  : autres traductions compris ; reconnu (c''est le verbe habituellement traduit par connaître). –  sorti de toi ou d''auprès de toi 8.42+ ; 16.27s. –  ils ont cru (v. 20n) que c''est toi qui m''as envoyé 11.42 ; 21.23,25.'
  - type: text
    content: Car je leur ai donné les paroles que tu m'as données ; ils les ont reçues ; ils ont vraiment su que je suis sorti de toi, et ils ont cru que c'est toi qui m'as envoyé.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'pour eux que je demande  : cf. v. 20 ; 14.16n. –  pas pour le monde (1.10n) v. 21,23 ; 14.17,19,22 ; 15.19. –  à toi v. 6+.'
  - type: text
    content: 'Moi, c''est pour eux que je demande. Je ne demande pas pour le monde, mais pour ceux que tu m''as donnés, parce qu''ils sont à toi, '
