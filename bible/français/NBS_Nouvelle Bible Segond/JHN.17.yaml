      - type: text
        text: Cf. 8.23+ ; 15.18+s.
    marker-yv: yv-n
  - type: text
    text: 'Moi, je leur ai donné ta parole, et le monde les a détestés, parce qu''ils ne sont pas du monde, comme moi, je ne suis pas du monde. '
