    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.3 : « Savoir qui tu es (Dieu) conduit à la justice parfaite et reconnaître ta souveraineté est la racine de l''immortalité. »'
    marker-yv: yv-n
  - type: text
    text: '– Or la vie éternelle, c''est qu''ils te connaissent, toi, le seul vrai Dieu, et celui que tu as envoyé, Jésus-Christ. – '
