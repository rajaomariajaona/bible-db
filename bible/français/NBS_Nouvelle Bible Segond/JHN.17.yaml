    marker-yv: yv-n
  - type: text
    text: 'Lorsque j''étais avec eux, moi, je les gardais en ton nom, ce nom que tu m''as donné. Je les ai préservés, et aucun d''eux ne s''est perdu, sinon celui qui est voué à la perdition, pour que l''Ecriture soit accomplie. '
  - type: usfm
    marker: vlbl
