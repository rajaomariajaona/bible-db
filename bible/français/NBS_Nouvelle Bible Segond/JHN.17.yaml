        children:
        - type: text
          text: Didachè
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.2 : « Nous te rendons grâce, Père saint, pour ton saint nom que tu as fait habiter dans nos cœurs, et pour la connaissance, la foi et l''immortalité que tu nous as révélées par Jésus ton serviteur. »'
    marker-yv: yv-n
  - type: text
    text: 'Je ne suis plus dans le monde ; eux sont dans le monde, et moi, je viens à toi. Père saint, garde-les en ton nom, ce nom que tu m''as donné, pour qu''ils soient un comme nous. '
  - type: usfm
    marker: vlbl
