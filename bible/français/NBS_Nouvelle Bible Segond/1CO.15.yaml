        text: '15.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ac 2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sont demeurés en vie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: demeurent jusqu'à maintenant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jn 21.22s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se sont endormis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la mort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est sous-entendu en grec), comme aux v. 18,20,51 ; 7.39 ; 11.30 ; cf. 1Th 4.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss.
    marker-yv: yv-n
  - type: text
    text: 'Ensuite, il est apparu à plus de cinq cents frères à la fois : la plupart d''entre eux sont demeurés en vie, quelques-uns se sont endormis dans la mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jacques '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 12.17 ; 15.13 ; Ga 1.19 ; 2.9,12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tous les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: apôtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être un groupe distinct des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Douze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: du v. 5 ; cf. v. 9 ; 9.1 ; 12.28.
    marker-yv: yv-n
  - type: text
    text: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 9.1 ; Ac 9.3-7/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un avorton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'avorton
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme grec désigne habituellement un enfant né avant terme, non viable ; d''autres comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'un enfant posthume '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 9). Certains pensent que Paul reprend ici une insulte proférée à son endroit par ses adversaires.
    marker-yv: yv-n
  - type: text
    text: Après eux tous, il m'est apparu, à moi aussi, comme à un avorton.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le moindre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mt 5.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ep 3.8 ; 1Tm 1.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est même trop d'honneur pour moi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne suis pas capable d'être appelé apôtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Mt 3.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '/ / ; 8.8 ; tournures analogues en 2Co 2.16 ; 3.5s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'j''ai persécuté '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Eglise
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ac 8.3 ; Ga 1.13 ; Ph 3.6 ; 1Tm 1.13.
    marker-yv: yv-n
  - type: text
    text: 'Moi, en effet, je suis le moindre des apôtres ; c''est même trop d''honneur pour moi que d''être appelé apôtre, puisque j''ai persécuté l''Eglise de Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.10+ ; Ac 14.26 ; Ga 1.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: inutile
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vide
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même v. 14,58 ; le terme revient dans l''expression traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en vain '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2Co 6.1 ; Ga 2.2 ; cf. Ep 5.6 ; Ph 2.16 ; Col 2.8 ; 1Th 2.1 ; 3.5 ; Jc 2.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'plus qu''eux tous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2Co 11.5,23+.
    marker-yv: yv-n
  - type: text
    text: 'Mais par la grâce de Dieu je suis ce que je suis, et sa grâce envers moi n''a pas été inutile ; au contraire, j''ai travaillé plus qu''eux tous ; non pas moi toutefois, mais la grâce de Dieu qui est avec moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 3.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: telle est…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ainsi nous proclamons et ainsi vous avez cru.
    marker-yv: yv-n
  - type: text
    text: Ainsi donc, que ce soit moi, que ce soient eux, telle est notre proclamation et telle est la foi à laquelle vous êtes venus.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La résurrection des morts
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Mt 22.23+/ / ; voir aussi 2Tm 2.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: résurrection
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: relèvement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot grec (de même dans la suite) est d''une autre famille que le verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (se) réveiller
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Ac 2.24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 3.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 4.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Or si l''on proclame que le Christ s''est réveillé d''entre les morts, comment quelques-uns d''entre vous peuvent-ils dire qu''il n''y a pas de résurrection des morts ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 20ss ; Ac 4.2 ; 17.32.
    marker-yv: yv-n
  - type: text
    text: 'S''il n''y a pas de résurrection des morts, le Christ non plus ne s''est pas réveillé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'inutile '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vide, vidée de son sens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Rm 4.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Et si le Christ ne s''est pas réveillé, alors notre proclamation est inutile, et votre foi aussi est inutile. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
