  - type: text
    text: 'Je vous confirme, mes frères, la bonne nouvelle que je vous ai annoncée, celle que vous avez reçue, dans laquelle vous vous tenez '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur la voie du salut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir 1.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si vous la retenez dans les termes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec quelle parole je vous ai annoncé la bonne nouvelle, si vous la retenez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est pour rien…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 11,14,17 ; Ga 2.2+.'
    marker-yv: yv-n
  - type: text
    text: et par laquelle aussi vous êtes sur la voie du salut, si vous la retenez dans les termes où je vous l'ai annoncée ; autrement, c'est pour rien que vous seriez venus à la foi.
- type: usfm
  marker: p
