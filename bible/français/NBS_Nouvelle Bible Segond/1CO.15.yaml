document_id: 1CO.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La bonne nouvelle que Paul a reçue et transmise
  - type: text
    content: ' '
  - type: note
    content: 'Je vous confirme  : litt. je vous fais connaître (12.3n), cf. v. 12ss ; 3.1s. –  la bonne nouvelle ou l''Evangile , cf. Ga 1.11. –  annoncée / reçue  : cf. 11.23 ; 1Th 2.13. –  dans laquelle vous vous tenez  : autres traductions à laquelle vous tenez ferme ; par laquelle vous êtes debout  ; cf. Rm 5.2n  ; 11.20n.'
  - type: text
    content: 'Je vous confirme, mes frères, la bonne nouvelle que je vous ai annoncée, celle que vous avez reçue, dans laquelle vous vous tenez '
  '10':
  - type: note
    content: 'par la grâce 3.10+ ; Ac 14.26 ; Ga 1.15. –  inutile  : litt. vide, de même v. 14,58 ; le terme revient dans l''expression traduite par en vain 2Co 6.1 ; Ga 2.2 ; cf. Ep 5.6 ; Ph 2.16 ; Col 2.8 ; 1Th 2.1 ; 3.5 ; Jc 2.20n. –  plus qu''eux tous 2Co 11.5,23+.'
  - type: text
    content: 'Mais par la grâce de Dieu je suis ce que je suis, et sa grâce envers moi n''a pas été inutile ; au contraire, j''ai travaillé plus qu''eux tous ; non pas moi toutefois, mais la grâce de Dieu qui est avec moi. '
  '11':
  - type: note
    content: 'Cf. 3.5. –  telle est…  : litt. ainsi nous proclamons et ainsi vous avez cru.'
  - type: text
    content: Ainsi donc, que ce soit moi, que ce soient eux, telle est notre proclamation et telle est la foi à laquelle vous êtes venus.
  - type: heading
    content: La résurrection des morts
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 22.23+/ / ; voir aussi 2Tm 2.18. –  résurrection ou relèvement  : le mot grec (de même dans la suite) est d''une autre famille que le verbe traduit par (se) réveiller  ; cf. Ac 2.24n  ; 3.15n  ; Rm 1.4n  ; 4.24n.'
  - type: text
    content: 'Or si l''on proclame que le Christ s''est réveillé d''entre les morts, comment quelques-uns d''entre vous peuvent-ils dire qu''il n''y a pas de résurrection des morts ? '
  '13':
  - type: note
    content: Cf. v. 20ss ; Ac 4.2 ; 17.32.
  - type: text
    content: 'S''il n''y a pas de résurrection des morts, le Christ non plus ne s''est pas réveillé. '
  '14':
  - type: note
    content: V. 2+. –  inutile ou vide, vidée de son sens, cf. v. 10n  ; Rm 4.14n.
  - type: text
    content: 'Et si le Christ ne s''est pas réveillé, alors notre proclamation est inutile, et votre foi aussi est inutile. '
  '15':
  - type: note
    content: 'faux témoins  : cf. 6.14 ; Ac 1.22 ; 2.32 ; 3.15 ; 4.33 ; 5.32 ; voir aussi Ga 2.17 ; 1Jn 5.10.'
  - type: text
    content: 'Nous apparaissons même comme de faux témoins de Dieu, puisque nous avons témoigné contre Dieu qu''il a réveillé le Christ, alors qu''il ne l''a pas réveillé, s''il est vrai que les morts ne se réveillent pas. '
  '16':
  - type: note
    content: V. 13.
  - type: text
    content: 'En effet, si les morts ne se réveillent pas, le Christ non plus ne s''est pas réveillé. '
  '17':
  - type: note
    content: votre foi est futile v. 2+. –  encore dans vos péchés Rm 6.4-11 ; 7.4+.
  - type: text
    content: 'Et si le Christ ne s''est pas réveillé, votre foi est futile, vous êtes encore dans vos péchés '
  '18':
  - type: note
    content: ceux qui se sont endormis, c.-à-d. ceux qui sont morts, cf. v. 6n.
  - type: text
    content: 'et ceux qui se sont endormis dans le Christ sont perdus. '
  '19':
  - type: note
    content: 'Autres traductions possibles  : si, dans cette vie, nous n''avons fait que mettre notre espérance dans le Christ  ; ou encore si… nous n''avons mis notre espérance que dans le Christ…  ; cf. 2 Baruch 21.13 : « Car s''il n''y avait que cette vie que chacun possède ici-bas, il n''y aurait rien de plus amer que cela. » –  pitoyables Ap 3.17. –  tous  : litt. tous les humains.'
  - type: text
    content: Si c'est pour cette vie seulement que nous avons mis notre espérance dans le Christ, nous sommes les plus pitoyables de tous.
  '2':
  - type: note
    content: 'sur la voie du salut  : voir 1.18n. –  si vous la retenez dans les termes…  : traduction incertaine ; litt. avec quelle parole je vous ai annoncé la bonne nouvelle, si vous la retenez. –  c''est pour rien…  : cf. v. 11,14,17 ; Ga 2.2+.'
  - type: text
    content: et par laquelle aussi vous êtes sur la voie du salut, si vous la retenez dans les termes où je vous l'ai annoncée ; autrement, c'est pour rien que vous seriez venus à la foi.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'le Christ s''est bel et bien réveillé  : litt. maintenant, Christ s''est réveillé v. 4+ ; 1Th 4.14. –  prémices v. 23 ; cf. 16.15n  ; Rm 8.23+ ; Col 1.18 ; voir aussi Ac 3.15 ; 26.23. –  endormis v. 6n.'
  - type: text
    content: 'Mais le Christ s''est bel et bien réveillé d''entre les morts : il est les prémices de ceux qui se sont endormis. '
  '21':
  - type: note
    content: Cf. v. 45-49 ; Gn 3.17-19 ; voir Rm 5.12-21.
  - type: text
    content: 'Car, puisque la mort est venue par un homme, c''est aussi par un homme qu''est venue la résurrection des morts. '
  '22':
  - type: note
    content: 'Cf. Rm 8.10s. –  rendus vivants  : cf. v. 36,45 ; Jn 5.21+.'
  - type: text
    content: 'En effet, comme tous meurent en Adam, de même aussi tous seront rendus vivants dans le Christ, '
  '23':
  - type: note
    content: 'rang  : cf. 1Th 4.16 ; Ap 20.4s ; voir aussi Dn 12.2s ; Jn 5.28s ; Ac 24.15. –  Christ / prémices v. 20+. –  son avènement  : voir Mt 24.3n  ; cf. 1Th 2.19+ ; 4.15s ; voir aussi Col 3.4. –  ceux qui appartiennent au Christ 1.12n  ; 3.23 ; cf. Ga 3.29 ; 5.24.'
  - type: text
    content: 'mais chacun en son rang : le Christ comme prémices, puis, à son avènement, ceux qui appartiennent au Christ. '
  '24':
  - type: note
    content: 'viendra  : le verbe est (probablement) sous-entendu dans le texte. Autre traduction possible  : Ensuite, à la fin, quand il remettra… (26) le dernier ennemi, la mort, sera réduit à rien. –  la royauté ou le royaume, cf. 4.20+. –  réduit à rien v. 26 ; 1.28+ ; cf. Dn 2.44 ; Rm 8.38 ; Ep 1.21 ; Ph 2.9. –  principat / autorité / puissance  : cf. 2.6,8 ; Ep 1.21+ ; Col 1.16 ; 2.15.'
  - type: text
    content: 'Ensuite viendra la fin, quand il remettra la royauté à celui qui est Dieu et Père, après avoir réduit à rien tout principat, toute autorité, toute puissance. '
  '25':
  - type: note
    content: 'Ps 110.1  ; Mt 22.44/ / ; Lc 19.27. Il faut sans doute comprendre ici  : jusqu''à ce que Dieu ait mis tous ses ennemis sous les pieds du Christ (v. 27s).'
  - type: text
    content: Car il faut qu'il règne jusqu'à ce qu’
  - type: text
    content: il ait mis
  - type: text
    content: ' tous '
  - type: text
    content: ses ennemis sous
  - type: text
    content: ' ses '
  - type: text
    content: pieds
  - type: text
    content: '. '
  '26':
  - type: note
    content: Cf. 2Tm 1.10 ; Hé 2.14s ; Ap 20.14 ; 21.4 ; voir aussi Jn 5.24 ; 11.25s.
  - type: text
    content: 'Le dernier ennemi qui sera réduit à rien, c''est la mort. '
  '27':
  - type: note
    content: 'il a tout mis sous ses pieds Ps 8.7  ; Ep 1.22 ; Hé 2.8 ; cf. 1P 3.22. –  lorsqu''il (Dieu ? ou elle, l''Ecriture ?) dit  : autre traduction lorsqu''il dira. –  tout soumis Ph 3.21.'
  - type: text
    content: 'En effet, '
  - type: text
    content: il a tout mis sous ses pieds
  - type: text
    content: '. Mais lorsqu''il dit que tout lui a été soumis, il est évident que c''est à l''exception de celui qui lui a tout soumis. '
  '28':
  - type: note
    content: 'Voir Fils. –  se soumettra ou sera soumis. –  tout en tous  : cf. 8.6 ; Col 3.11.'
  - type: text
    content: Et lorsque tout lui sera soumis, alors le Fils lui-même se soumettra à celui qui lui a tout soumis, pour que Dieu soit tout en tous.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'qui reçoivent le baptême (ou qui se font baptiser ) pour les morts  : autres traductions possibles au-dessus des (tombes des) morts ; à cause des morts  ; il s''agit peut-être d''une pratique de l''Eglise de Corinthe, inconnue par ailleurs ; pour le raisonnement de Paul, cf. 2 Maccabées 12.43s : « Il (Judas Maccabée) envoya jusqu''à deux mille drachmes à Jérusalem, afin qu''on offrît un sacrifice pour le péché, agissant fort bien et noblement dans la pensée de la résurrection. Si, en effet, il n''avait pas espéré que les soldats tombés ressusciteraient, il eût été superflu et sot de prier pour des morts. »'
  - type: text
    content: Autrement, que feront ceux qui reçoivent le baptême pour les morts ? S'il n'est pas question que les morts se réveillent, pourquoi recevraient-ils le baptême pour eux ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'transmis / reçu 11.2+,23. –  mort pour nos péchés / Ecritures  : cf. Es 53.5-12 ; Lc 24.46 ; 1P 3.18.'
  - type: text
    content: 'Je vous ai transmis, avant tout, ce que j''avais moi-même reçu : le Christ est mort pour nos péchés, selon les Ecritures. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2Co 7.5.
  - type: text
    content: 'Et nous, pourquoi sommes-nous à toute heure en péril ? '
  '31':
  - type: note
    content: 'je meurs  : certains comprennent je suis exposé à la mort, cf. 4.9+ ; Rm 8.36+.'
  - type: text
    content: 'Chaque jour je meurs, mes frères, aussi vrai que vous êtes ma fierté en Jésus-Christ, notre Seigneur. '
  '32':
  - type: note
    content: 'pour des vues humaines  : litt. selon (l’)humain  ; d''autres comprennent si, pour parler en termes humains, j''ai combattu les bêtes…  ; cf. Rm 3.5n. –  contre les bêtes  : l''expression est probablement à prendre au sens figuré. –  à Ephèse 16.8s ; Ac 19.23ss ; 20.3 ; cf. 2Co 1.8. –  quel avantage  : cf. 13.3. –  mangeons et buvons Es 22.13  ; cf. Lc 12.19.'
  - type: text
    content: 'Si c''est pour des vues humaines que j''ai combattu contre les bêtes à Ephèse, quel avantage m''en revient-il ? Si les morts ne se réveillent pas, '
  - type: text
    content: mangeons et buvons, car demain nous mourrons !
  - type: text
    content: ' '
  '33':
  - type: note
    content: 'Ne vous égarez pas 6.9n. –  les mauvaises compagnies…  : citation du poète grec Ménandre (≈ 342-292 av. J.-C.). –  pourrissent v. 42n  ; 3.17n.'
  - type: text
    content: 'Ne vous égarez pas :'
  - type: text
    content: les mauvaises compagnies pourrissent les bonnes mœurs.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Ressaisissez-vous  : cf. Rm 13.11 ; Ep 5.14. –  sérieusement  : autre traduction comme il est juste . –  méconnaissent  : litt. ont une ignorance (ou une méconnaissance ) de Dieu (cf. Rm 10.3n) ; sur le terme grec correspondant, voir 1P 2.15 ; cf. 1Th 4.5+ ; voir aussi Mt 22.29 ; Ac 26.8. –  honte 4.14+.'
  - type: text
    content: Ressaisissez-vous sérieusement et cessez de pécher ; quelques-uns, en effet, méconnaissent Dieu – je le dis à votre honte.
  - type: heading
    content: Le corps ressuscité
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'reviennent-ils  : litt. viennent-ils.'
  - type: text
    content: 'Mais quelqu''un dira : Comment les morts se réveillent-ils ? Avec quel corps reviennent-ils ? '
  '36':
  - type: note
    content: Homme déraisonnable ! cf. Lc 11.40 ; 12.20 ; Rm 2.20. –  Ce que tu sèmes… Jn 12.24.
  - type: text
    content: 'Homme déraisonnable ! Ce que tu sèmes toi-même n''est pas rendu vivant sans mourir. '
  '37':
  - type: note
    content: 'une simple graine…  : litt. une graine (toute) nue, peut-être de blé ou de quelque autre chose  ; cf. 2Co 5.3.'
  - type: text
    content: 'Et ce que tu sèmes, ce n''est pas le corps à venir, c''est une simple graine, un grain de blé peut-être, ou une autre semence ; '
  '38':
  - type: note
    content: 'Cf. Rm 4.17 ; 2 Maccabées 7.22s : « Je (une mère à ses enfants martyrs) ne sais comment vous êtes apparus dans mes entrailles ; ce n''est pas moi qui vous ai gratifiés de l''esprit et de la vie, et ce n''est pas moi qui ai organisé les éléments dont chacun de vous est composé. Aussi bien le Créateur du monde, qui a formé l''homme à sa naissance et qui est à l''origine de toute chose, vous rendra-t-il dans sa miséricorde et l''esprit et la vie. » –  comme il le veut 12.18+. –  à chaque semence Gn 1.11s.'
  - type: text
    content: puis Dieu lui donne un corps comme il le veut ; à chaque semence il donne un corps qui lui est propre.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Toute chair…  : autre traduction aucune chair n''est semblable à une autre . Cf. Gn 1.20,24 ; 8.17.'
  - type: text
    content: 'Toute chair n''est pas la même chair ; mais autre est celle des humains, autre la chair des animaux, autre la chair des oiseaux, autre celle des poissons. '
  '4':
  - type: note
    content: 'réveillé (ou relevé, v. 12,20 ; 6.14n) le troisième jour / Ecritures  : cf. Os 6.2 ; Jon 2.1 ; Mt 16.21+/ / ; Ac 2.24-32.'
  - type: text
    content: 'Il a été enseveli, il s''est réveillé le troisième jour, selon les Ecritures. '
  '40':
  - type: note
    content: célestes / terrestres v. 49 ; cf. Jn 3.10 ; Ph 2.10. –  la gloire ou l'éclat, même possibilité dans la suite ; cf. Ac 22.11n.
  - type: text
    content: 'Il y a aussi des corps célestes et des corps terrestres ; mais autre est la gloire des corps célestes, autre celle des corps terrestres. '
  '41':
  - type: text
    content: Autre est la gloire du soleil, autre la gloire de la lune, et autre la gloire des étoiles ; même une étoile diffère en gloire d'une autre étoile.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Voir résurrection . –  périssable  : autres traductions dans la pourriture, dans la décomposition  ; même terme au v. 50, apparenté au verbe rendu par pourrir au v. 33 ; cf. 9.25+.'
  - type: text
    content: 'Ainsi en est-il de la résurrection des morts. Semé périssable, on se réveille impérissable. '
  '43':
  - type: note
    content: 'Ph 3.20s ; Col 3.4. –  dans le déshonneur  : autre traduction sans honneur. –  dans la puissance  : la même expression est traduite par avec puissance en Mc 9.1 ; Rm 1.4 ; Col 1.29 ; 1Th 1.5 ; 2Th 1.11.'
  - type: text
    content: 'Semé dans le déshonneur, on se réveille dans la gloire. Semé dans la faiblesse, on se réveille dans la puissance. '
  '44':
  - type: note
    content: 'naturel ou animal, c.-à-d. de l''ordre de l’être vivant (l''adjectif est dérivé du terme psukhè, parfois rendu par âme) : v. 45n  ; voir 2.14n. –  spirituel  : cf. 2.15.'
  - type: text
    content: Semé corps naturel, on se réveille corps spirituel.
  - type: text
    content: 'S''il y a un corps naturel, il y a aussi un corps spirituel. '
  '45':
  - type: note
    content: 'Cf. v. 21s ; Gn 2.7. –  un être vivant, naturel  : le terme grec correspondant (psukhè ou psychè, apparenté à l''adjectif traduit par naturel aux v. 44 et suivant) est traditionnellement rendu par âme  ; cf. Gn 1.20n  ; Mt 10.28n  ; Hé 4.12n. –  est devenu ou devient  : le verbe est sous-entendu dans le texte. –  un esprit (ou un Esprit) 2Co 3.6,17 ; 1P 3.18 ; cf. Jn 5.21+ ; 6.63 ; Rm 8.11.'
  - type: text
    content: 'C''est pourquoi il est écrit : '
  - type: text
    content: Le
  - type: text
    content: ' premier '
  - type: text
    content: homme,
  - type: text
    content: ' Adam, '
  - type: text
    content: devint un être vivant, naturel
  - type: text
    content: '. Le dernier Adam, lui, est devenu un esprit qui fait vivre. '
  '46':
  - type: note
    content: naturel / spirituel v. 44n.
  - type: text
    content: 'Ce n''est pas le spirituel qui est premier, c''est le naturel ; le spirituel vient ensuite. '
  '47':
  - type: note
    content: 'homme  : autre traduction être humain. –  fait de poussière  : l''adjectif correspondant n''apparaît qu''ici et aux v. 48s dans le N.T. ; cf. Gn 2.5n,7. –  du ciel Jn 3.13,31.'
  - type: text
    content: 'Le premier homme, tiré de la terre, est fait de poussière. Le deuxième homme vient du ciel. '
  '48':
  - type: note
    content: Cf. v. 40,47n.
  - type: text
    content: 'Tel est celui qui est fait de poussière, tels sont aussi ceux qui sont faits de poussière ; et tel est le céleste, tels sont aussi les célestes. '
  '49':
  - type: note
    content: 'porté l''image  : cf. v. 53 ; Gn 1.26s ; 5.3 ; voir aussi Rm 8.29 ; 2Co 3.18 ; Ph 3.21 ; 1Jn 3.2s.'
  - type: text
    content: Et de même que nous avons porté l'image de celui qui est fait de poussière, nous porterons aussi l'image du céleste.
  '5':
  - type: note
    content: Céphas 1.12n  ; cf. Lc 24.34 ; Jn 21.15-17. –  aux Douze Mt 28.16s/ / ; Lc 24.36 ; Jn 20.19,26 ; 21.1,12.
  - type: text
    content: 'Il est apparu à Céphas, puis aux Douze. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: Ce que je dis 7.29. –  la chair et le sang Mt 16.17+. –  hériter le royaume 6.9s,13 ; cf. Jn 3.6+. –  le périssable ou la vie périssable  ; v. 42n. –  l'impérissable ou la vie impérissable  ; même terme dans la suite.
  - type: text
    content: 'Ce que je dis, mes frères, c''est que la chair et le sang ne peuvent hériter le royaume de Dieu, et que le périssable n''hérite pas l''impérissable. '
  '51':
  - type: note
    content: mystère 2.1+ ; cf. Rm 11.25. –  nous ne nous endormirons pas tous… v. 6n. – Cf. 1Th 4.13-17.
  - type: text
    content: 'Je vais vous dire un mystère : nous ne nous endormirons pas tous ; mais tous, nous serons changés, '
  '52':
  - type: note
    content: dernière trompette Mt 24.31+ ; 1Th 4.16 ; Ap 8.6+. –  et nous 1Th 4.15.
  - type: text
    content: 'en un instant, en un clin d''œil, à la dernière trompette. Car elle sonnera, et les morts se réveilleront impérissables, et nous, nous serons changés. '
  '53':
  - type: note
    content: Cf. 2Co 4.16–5.5 ; voir aussi Lc 20.36 ; Jn 11.25s ; Ph 1.23.
  - type: text
    content: 'Il faut en effet que le périssable revête l''impérissable, et que le mortel revête l''immortalité. '
  '54':
  - type: note
    content: Es 25.8.
  - type: text
    content: 'Lorsque le périssable aura revêtu l''impérissable, et que le mortel aura revêtu l''immortalité, alors se sera accomplie la parole qui est écrite :'
  - type: text
    content: La mort a été engloutie dans la victoire
  - type: text
    content: .
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Os 13.14 . –  Mort  : certains mss portent, au deuxième vers, Hadès , c.-à-d. séjour des morts  ; par ailleurs les mots correspondant à victoire et à aiguillon sont intervertis dans certains mss ; sur l’ aiguillon , cf. Ac 26.14n.'
  - type: text
    content: Mort, où est ta victoire ?
  - type: text
    content: Mort, où est ton aiguillon ?
  '56':
  - type: text
    content: ' '
  - type: note
    content: Cf. Rm 6.14,23 ; 7.7-13 ; 10.4s ; Hé 2.14. – Voir péché et loi.
  - type: text
    content: 'L''aiguillon de la mort, c''est le péché ; et la puissance du péché, c''est la loi. '
  '57':
  - type: note
    content: Cf. Rm 7.25 ; voir aussi Jn 16.33 ; Ph 1.21 ; 1Jn 5.4. – Voir grâce.
  - type: text
    content: Mais grâce soit rendue à Dieu, qui nous donne la victoire par notre Seigneur Jésus-Christ !
  '58':
  - type: text
    content: ' '
  - type: note
    content: 'soyez fermes…  : cf. Col 1.23. –  progressez  : litt. abondez , cf. 2Co 9.8. –  l''œuvre du Seigneur 16.10. –  pas inutile  : cf. v. 10n  ; cf. Es 65.23 ; 2Ch 15.7 ; 1Th 3.5 ; Ap 14.13.'
  - type: text
    content: Ainsi, mes frères bien-aimés, soyez fermes, inébranlables, progressez toujours dans l'œuvre du Seigneur, sachant que votre travail, dans le Seigneur, n'est pas inutile.
  '6':
  - type: note
    content: 'Cf. Ac 2. –  sont demeurés en vie  : litt. demeurent jusqu''à maintenant  ; cf. Jn 21.22s. –  se sont endormis (dans la mort est sous-entendu en grec), comme aux v. 18,20,51 ; 7.39 ; 11.30 ; cf. 1Th 4.13nss.'
  - type: text
    content: 'Ensuite, il est apparu à plus de cinq cents frères à la fois : la plupart d''entre eux sont demeurés en vie, quelques-uns se sont endormis dans la mort. '
  '7':
  - type: note
    content: 'Jacques Ac 12.17 ; 15.13 ; Ga 1.19 ; 2.9,12. –  tous les apôtres  : peut-être un groupe distinct des Douze du v. 5 ; cf. v. 9 ; 9.1 ; 12.28.'
  - type: text
    content: 'Ensuite, il est apparu à Jacques, puis à tous les apôtres. '
  '8':
  - type: note
    content: 'Cf. 9.1 ; Ac 9.3-7/ /. –  un avorton  : litt. l''avorton  ; le terme grec désigne habituellement un enfant né avant terme, non viable ; d''autres comprennent un enfant posthume (cf. v. 9). Certains pensent que Paul reprend ici une insulte proférée à son endroit par ses adversaires.'
  - type: text
    content: Après eux tous, il m'est apparu, à moi aussi, comme à un avorton.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le moindre  : cf. Mt 5.19n  ; Ep 3.8 ; 1Tm 1.15. –  c''est même trop d''honneur pour moi…  : litt. je ne suis pas capable d''être appelé apôtre  ; cf. Mt 3.11n/ / ; 8.8 ; tournures analogues en 2Co 2.16 ; 3.5s. –  j''ai persécuté l''Eglise Ac 8.3 ; Ga 1.13 ; Ph 3.6 ; 1Tm 1.13.'
  - type: text
    content: 'Moi, en effet, je suis le moindre des apôtres ; c''est même trop d''honneur pour moi que d''être appelé apôtre, puisque j''ai persécuté l''Eglise de Dieu. '
