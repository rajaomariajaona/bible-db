    marker-yv: yv-n
  - type: text
    text: 'Je vous ai transmis, avant tout, ce que j''avais moi-même reçu : le Christ est mort pour nos péchés, selon les Ecritures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réveillé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: relevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', v. 12,20 ; 6.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le troisième jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ecritures
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Os 6.2 ; Jon 2.1 ; Mt 16.21+/ / ; Ac 2.24-32.'
    marker-yv: yv-n
  - type: text
    text: 'Il a été enseveli, il s''est réveillé le troisième jour, selon les Ecritures. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Céphas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Lc 24.34 ; Jn 21.15-17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux Douze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 28.16s/ / ; Lc 24.36 ; Jn 20.19,26 ; 21.1,12.
    marker-yv: yv-n
  - type: text
    text: 'Il est apparu à Céphas, puis aux Douze. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
