      text: Vous étiez alors un petit nombre d'hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une poignée, et vous séjourniez là en immigrés ;
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: '  ; '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand David eut achevé d''offrir l''holocauste et les sacrifices de paix, il bénit le peuple au nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s'en allaient d'une nation à l'autre
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et d'un royaume vers un autre peuple ;
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais il ne laissa personne les opprimer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'il fit des reproches à des rois à leur sujet :'
