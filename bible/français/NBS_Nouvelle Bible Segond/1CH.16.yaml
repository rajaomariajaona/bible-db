          text: 'ceux qui ont reçu mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 2.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Voir '
      - type: usfm
