      marker-yv: yv-n
    - type: text
      text: Souvenez-vous toujours de son alliance,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de la parole instituée pour mille générations,
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en hébreu, le mot correspondant figure au v. 15 mais est sous-entendu ici.'
      marker-yv: yv-n
    - type: text
      text: – de l'alliance qu'il a conclue avec Abraham,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et de son serment à Isaac ;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a établi cela comme une prescription pour Jacob,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme alliance perpétuelle pour Israël,
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'en disant : Je te donnerai Canaan'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme le patrimoine qui vous est échu.
