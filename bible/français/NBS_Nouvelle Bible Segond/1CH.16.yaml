document_id: 1CH.16,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2S 6.17-19. Voir sacrifices.
  - type: text
    content: 'Après qu''on eut amené le coffre de Dieu, on le plaça à l''intérieur de la tente que David avait dressée pour lui, et on présenta devant Dieu des holocaustes et des sacrifices de paix. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Mettez votre fierté  : litt. louez-vous . –  son nom sacré ou son saint nom , de même au v. 35. –  se réjouisse le cœur Ps 19.9 ; 33.21 ; 104.15 ; 105.3.'
  - type: text
    content: Mettez votre fierté dans son nom sacré !
  - type: text
    content: 'Que se réjouisse le cœur de ceux qui cherchent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'recherchez-le  : litt. cherchez sa face  ; cf. Ps 27.8+.'
  - type: text
    content: 'Cherchez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et sa force,'
  - type: text
    content: recherchez-le constamment !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'de ses jugements  : litt. des jugements de sa bouche Ps 105.5.'
  - type: text
    content: Souvenez-vous des choses étonnantes qu'il a faites,
  - type: text
    content: de ses prodiges et de ses jugements,
  '13':
  - type: text
    content: ' '
  - type: note
    content: Israël (autre nom de Jacob ) remplace ici Abraham mentionné en Ps 105.6.
  - type: text
    content: vous, descendance d'Israël, son serviteur,
  - type: text
    content: vous, fils de Jacob, ceux qu'il a choisis !
  '14':
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu ;'
  - type: text
    content: ses jugements s'exercent sur toute la terre.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Souvenez-vous  : Ps 105.8 il se souvient . –  parole instituée ou prescrite  ; cf. Dt 6.6 ; 12.28 ; Jos 8.35 ; Ps 105.8 ; Né 1.8.'
  - type: text
    content: Souvenez-vous toujours de son alliance,
  - type: text
    content: de la parole instituée pour mille générations,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'de l''alliance  : en hébreu, le mot correspondant figure au v. 15 mais est sous-entendu ici.'
  - type: text
    content: – de l'alliance qu'il a conclue avec Abraham,
  - type: text
    content: et de son serment à Isaac ;
  '17':
  - type: text
    content: il a établi cela comme une prescription pour Jacob,
  - type: text
    content: comme alliance perpétuelle pour Israël,
  '18':
  - type: text
    content: 'en disant : Je te donnerai Canaan'
  - type: text
    content: comme le patrimoine qui vous est échu.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Vous étiez… vous séjourniez  : Ps 105.12 ils étaient… ils séjournaient . –  vous séjourniez là en immigrés  : cf. Ex 12.48n.'
  - type: text
    content: Vous étiez alors un petit nombre d'hommes,
  - type: text
    content: une poignée, et vous séjourniez là en immigrés ;
  '2':
  - type: note
    content: Voir bénédiction  ; nom.
  - type: text
    content: 'Quand David eut achevé d''offrir l''holocauste et les sacrifices de paix, il bénit le peuple au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: text
    content: ils s'en allaient d'une nation à l'autre
  - type: text
    content: et d'un royaume vers un autre peuple ;
  '21':
  - type: text
    content: mais il ne laissa personne les opprimer,
  - type: text
    content: 'il fit des reproches à des rois à leur sujet :'
  '22':
  - type: text
    content: ' '
  - type: note
    content: ceux qui ont reçu mon onction 1S 2.10n. – Voir prophète.
  - type: text
    content: Ne touchez pas à ceux qui ont reçu mon onction,
  - type: text
    content: et ne faites pas de mal à mes prophètes !
  - type: heading
    content: Ps 96
  '23':
  - type: text
    content: ' '
  - type: note
    content: Le texte parallèle de Ps 96.1s est un peu plus développé.
  - type: text
    content: 'Chante pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', terre entière !'
  - type: text
    content: Annoncez jour après jour la bonne nouvelle de son salut !
  '24':
  - type: text
    content: ' '
  - type: note
    content: Le v. 24 est absent de LXX. – Voir gloire.
  - type: text
    content: Dites parmi les nations sa gloire,
  - type: text
    content: racontez parmi tous les peuples ses actes étonnants !
  '25':
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est grand et digne de toute louange,'
  - type: text
    content: il est redoutable, plus que tous les dieux ;
  '26':
  - type: text
    content: car tous les dieux des peuples sont des faux dieux,
  - type: text
    content: 'mais c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui a fait le ciel.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Au lieu de la joie et de son lieu , Ps 96.6 parle de la splendeur et de son sanctuaire.
  - type: text
    content: L'éclat et la magnificence sont devant lui,
  - type: text
    content: la puissance et la joie sont en son lieu.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Clans ou familles , cf. Gn 12.3n.
  - type: text
    content: 'Clans des peuples, donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' gloire et puissance !'
  '29':
  - type: text
    content: ' '
  - type: note
    content: offrandes ou offrandes végétales , cf. 21.23 ; 23.29 ; Lv 2.1n. – Au lieu de devant lui , Ps 96.8 porte dans ses cours , c.-à-d. dans les cours de son temple.
  - type: text
    content: 'Donnez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' la gloire de son nom !'
  - type: text
    content: Apportez des offrandes, entrez devant lui,
  - type: text
    content: 'prosternez-vous devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' quand éclate sa sainteté !'
  '3':
  - type: note
    content: 'un pain rond Ex 29.23n. –  un gâteau de dattes  : cf. 2S 6.19n.'
  - type: text
    content: Puis il distribua à tous les gens d'Israël, hommes et femmes, à chacun un pain rond, un gâteau de dattes et un gâteau de raisins.
  - type: heading
    content: Les lévites chantent les louanges du Seigneur
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Le texte parallèle du Ps 96.10 commence par Dites parmi les nations : C''est le Seigneur qui est roi , expression qui a un équivalent au v. 31 du présent chapitre. – A la fin du verset, Ps 96.10 ajoute il juge les peuples avec droiture.'
  - type: text
    content: Tremble devant lui, terre entière !
  - type: text
    content: – Le monde est ferme, il ne vacille pas.
  '31':
  - type: text
    content: Que le ciel se réjouisse, que la terre soit dans l'allégresse !
  - type: text
    content: 'Que l''on dise parmi les nations : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est roi !'
  '32':
  - type: text
    content: Que la mer retentisse, avec tout ce qui la remplit !
  - type: text
    content: Que la campagne exulte, avec tout ce qui s'y trouve !
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Car il vient…  : le texte parallèle de Ps 96.13 est plus développé.'
  - type: text
    content: Que les arbres des forêts poussent des cris de joie
  - type: text
    content: 'devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Car il vient pour juger la terre.'
  - type: heading
    content: Ps 106.1,47-48
  '34':
  - type: text
    content: ' '
  - type: note
    content: Le texte parallèle de Ps 106.1 débute par l'acclamation liturgique Louez le Seigneur (= Alléluia ).
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car il est bon,'
  - type: text
    content: car sa fidélité est pour toujours !
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Dites  : ce mot ne figure pas en Ps 106.47. –  Dieu de notre salut  : Ps 106.47 Seigneur notre Dieu . –  et délivre-nous  : absent de Ps 106.47.'
  - type: text
    content: 'Dites : Sauve-nous, Dieu de notre salut,'
  - type: text
    content: rassemble-nous et délivre-nous des nations,
  - type: text
    content: afin que nous célébrions ton nom sacré
  - type: text
    content: et que nous mettions notre honneur à te louer !
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Voir bénédiction. –  Alors… le Seigneur  : le texte parallèle du Ps 106.48 présente ces mots comme faisant encore partie de la louange Et que tout le peuple dise : Qu''il en soit ainsi ! (ou Amen ! Cf. Dt 27.15n) Louez le Seigneur.'
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël,'
  - type: text
    content: depuis toujours et pour toujours !
  - type: text
    content: 'Alors tout le peuple dit : Qu''il en soit ainsi ! Et il loua le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'selon l''ordre de chaque jour  : cf. Lv 23.37n  ; 2R 25.30n  ; Esd 6.9n  ; voir aussi Esd 3.4 ; Né 11.23 ; 12.47 ; 2Ch 8.13s ; 31.16.'
  - type: text
    content: 'David laissa là, devant le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', Asaph et ses frères pour qu''ils officient constamment devant le Coffre, selon l''ordre de chaque jour ; '
  '38':
  - type: note
    content: Traduction d'un texte hébreu difficile, litt. et Obed-Edom et leurs frères, soixante-huit, et Obed-Edom, fils de Yeditoun, et Hosa, comme portiers. On ne sait pas s'il est question d'un seul personnage nommé Obed-Edom et mentionné deux fois, ou de deux personnages différents portant le même nom.
  - type: text
    content: 'Obed-Edom, fils de Yeditoun, et Hosa, avec leurs frères au nombre de soixante-huit, comme portiers ; '
  '39':
  - type: note
    content: 'Tsadoq  : cf. 2S 8.17 ; 15.24. –  les autres prêtres  : litt. les prêtres. –  Gabaon  : cf. 2S 2.12n  ; 1R 3.4.'
  - type: text
    content: 'Tsadoq, le prêtre, et les autres prêtres, ses frères, devant la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dans le haut lieu qui était à Gabaon, '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'évoquer  : cf. Ex 3.15n. –  de célébrer et de louer le Seigneur  : cf. 23.5,30 ; 25.3,6 ; Esd 3.10s ; Né 12.46.'
  - type: text
    content: 'Il plaça devant le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ceux des lévites qui officiaient, afin d''évoquer, de célébrer et de louer le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : '
  '40':
  - type: note
    content: Cf. v. 1s. –  tout ce qui est écrit dans la loi Jos 23.6.
  - type: text
    content: 'pour qu''ils offrent constamment au '
  - type: text
    content: Seigneur
  - type: text
    content: ' des holocaustes, matin et soir, sur l''autel des holocaustes, et qu''ils fassent tout ce qui est écrit dans la loi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a instituée pour Israël. '
  '41':
  - type: note
    content: 'Hémân, Yedoutoun  : cf. 15.17+. –  car sa fidélité est pour toujours ! formule liturgique de louange ; voir v. 34 ; Ps 136.'
  - type: text
    content: 'Auprès d''eux il y avait Hémân, Yedoutoun et les autres qui avaient été choisis et désignés par leur nom pour célébrer le '
  - type: text
    content: Seigneur
  - type: text
    content: '  – car sa fidélité est pour toujours ! '
  '42':
  - type: note
    content: 'Auprès d''eux…  : on pourrait aussi comprendre Auprès d''eux il y avait Hémân et Yedoutoun, des trompettes…  ; mais cette nouvelle mention de Hémân et Yedoutoun (voir v. 41) est absente de LXX. –  affectés à la porte  : voir 15.18+.'
  - type: text
    content: Auprès d'eux – Hémân et Yedoutoun – il y avait des trompettes et des cymbales pour ceux qui les faisaient retentir, et les instruments de musique de Dieu. Les fils de Yedoutoun étaient affectés à la porte.
  '43':
  - type: text
    content: ' '
  - type: note
    content: Voir 2S 6.19s.
  - type: text
    content: Tout le peuple s'en alla chacun chez soi, et David s'en retourna pour bénir sa maison.
  '5':
  - type: note
    content: 'Zacharie  : hébreu Zekarya.'
  - type: text
    content: 'Asaph, le chef ; Zacharie, son second ; Yéiel, Shemiramoth, Yehiel, Mattitia, Eliab, Benaya, Obed-Edom et Yéiel. Ils avaient pour instruments des luths et des lyres ; et Asaph faisait retentir les cymbales. '
  '6':
  - type: text
    content: 'Les prêtres Benaya et Yahaziel sonnaient constamment des trompettes devant le coffre de l''alliance de Dieu. '
  '7':
  - type: text
    content: 'C''est en ce jour que David chargea pour la première fois Asaph et ses frères de célébrer le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Ps 105.1-15
  '8':
  - type: text
    content: ' '
  - type: note
    content: ses hauts faits Ps 9.12n.
  - type: text
    content: 'Célébrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', invoquez son nom !'
  - type: text
    content: Faites connaître parmi les peuples ses hauts faits !
  '9':
  - type: text
    content: Chantez pour lui, jouez des psaumes pour lui !
  - type: text
    content: Réfléchissez à tous ses actes étonnants !
