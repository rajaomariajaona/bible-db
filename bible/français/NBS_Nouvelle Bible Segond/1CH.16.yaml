        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Dites parmi les nations sa gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: racontez parmi tous les peuples ses actes étonnants !
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) est grand et digne de toute louange,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il est redoutable, plus que tous les dieux ;
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car tous les dieux des peuples sont des faux dieux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) qui a fait le ciel.'
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Au lieu de '
      - type: usfm
        marker: fq
        children:
