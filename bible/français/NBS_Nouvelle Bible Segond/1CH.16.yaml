        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ne touchez pas à ceux qui ont reçu mon onction,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ne faites pas de mal à mes prophètes !
  - type: usfm
    marker: r
    children:
    - type: text
      text: Ps 96
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le texte parallèle de Ps 96.1s est un peu plus développé.
      marker-yv: yv-n
    - type: text
      text: 'Chante pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', terre entière !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Annoncez jour après jour la bonne nouvelle de son salut !
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
