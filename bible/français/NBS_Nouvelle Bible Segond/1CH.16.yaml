          text: 'la joie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Ps 96.6 parle de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la splendeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son sanctuaire.
      marker-yv: yv-n
    - type: text
      text: L'éclat et la magnificence sont devant lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la puissance et la joie sont en son lieu.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Clans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
