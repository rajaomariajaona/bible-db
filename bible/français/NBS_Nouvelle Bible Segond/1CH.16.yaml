      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jacob
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') remplace ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Abraham '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: mentionné en Ps 105.6.
      marker-yv: yv-n
    - type: text
      text: vous, descendance d'Israël, son serviteur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous, fils de Jacob, ceux qu'il a choisis !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), notre Dieu ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses jugements s'exercent sur toute la terre.
