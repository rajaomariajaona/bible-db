      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous étiez… vous séjourniez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Ps 105.12 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils étaient… ils séjournaient
      - type: usfm
        marker: ft
        children:
