  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Que se réjouisse le cœur de ceux qui cherchent le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  !'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
