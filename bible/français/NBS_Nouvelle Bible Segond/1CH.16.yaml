      marker-yv: yv-n
    - type: text
      text: 'Donnez au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' la gloire de son nom !'
  - type: usfm
    marker: q1
    children:
