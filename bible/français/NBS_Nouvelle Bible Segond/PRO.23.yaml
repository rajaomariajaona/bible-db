      - type: text
        text: 'Instruction d''Aménémopé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23.13ss : « Ne mange pas devant un notable, ne porte pas la nourriture à ta bouche le premier. Si tu es satisfait d''une nourriture trompeuse (ou : contente-toi de faire semblant de mâcher), cela occupera ta salive. Regarde la coupe (ou : le bol) qui est devant toi, et contente-t''en. » '
    - type: usfm
