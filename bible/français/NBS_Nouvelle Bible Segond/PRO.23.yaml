document_id: PRO.23,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'un chef  : litt. quelqu''un qui domine (ou qui dirige, qui gouverne ), cf. 1.1n. – Cf. Instruction d''Aménémopé 23.13ss : « Ne mange pas devant un notable, ne porte pas la nourriture à ta bouche le premier. Si tu es satisfait d''une nourriture trompeuse (ou : contente-toi de faire semblant de mâcher), cela occupera ta salive. Regarde la coupe (ou : le bol) qui est devant toi, et contente-t''en. » Siracide 31.12ss : « Si tu te trouves assis à une grande table, ne va pas t''exclamer, la bouche ouverte devant elle : “Qu''elle est bien garnie !” Souviens-toi, c''est un vice que d''avoir l''œil avide (cf. v. 6n)… N''étends pas la main vers tout ce que tu vois, pour ne pas te bousculer avec ton voisin sur le plat. Juge d''après toi-même de ce que ton prochain ressent, et comporte-toi toujours avec réflexion. Mange ce qu''on te présente, comme un homme bien élevé, et ne joue pas des mâchoires au point d''en être odieux. Sois le premier à t''arrêter par bonne éducation, ne te montre pas insatiable, de crainte de choquer. Si tu es assis en nombreuse compagnie, n''étends pas la main avant les autres. Qu''il suffit de peu à l''homme bien élevé ! Aussi n''étouffe-t-il point, une fois sur son lit : qui mange modérément jouit d''un sommeil salutaire… »'
  - type: text
    content: Si tu t'assieds à table avec un chef,
  - type: text
    content: fais bien attention à ce qui est devant toi ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ne déplace pas… 22.28+ ; cf. Instruction d''Aménémopé 7.12ss : « N''emporte pas la borne placée aux limites de la terre arable, ne déplace pas le cordeau de mesure ; ne convoite pas une coudée de terre, et n''empiète pas sur les limites du terrain d''une veuve. »'
  - type: text
    content: Ne déplace pas la borne ancienne
  - type: text
    content: et n'entre pas dans le champ des orphelins ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'rédempteur  : le mot hébreu go''el s''appliquait au plus proche parent qui devait défendre les intérêts des siens, voire les venger. Ici il s''agit sans doute de Dieu. Cf. 22.23,28+ ; Ex 6.6+ ; Nb 35.12n  ; Jr 50.34 ; Jb 19.25n  ; Rt 2.20+.'
  - type: text
    content: car leur rédempteur est fort ;
  - type: text
    content: il défendra leur cause contre toi.
  - type: heading
    content: Autres conseils
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'l''instruction  : le même mot hébreu est traduit par correction au v. 13 ; cf. 1.2n. –  tes oreilles  : cf. 22.17.'
  - type: text
    content: Dispose ton cœur à l'instruction
  - type: text
    content: et tes oreilles aux discours de la connaissance.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la correction v. 12n. –  jeune homme ou jeune garçon, serviteur  ; cf. 20.11 ; 22.6n. –  bâton  : cf. 10.13n  ; Siracide 7.23 : « As-tu des enfants ? Eduque-les, plie leur nuque dès la jeunesse. »'
  - type: text
    content: N'épargne pas la correction au jeune homme ;
  - type: text
    content: si tu le frappes du bâton, il ne mourra pas.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'bâton  : cf. 10.13n. –  tu sauveras sa vie  : autre traduction tu le sauveras (sur le terme hébreu correspondant à vie , voir Gn 1.20n). –  séjour des morts 1.12n.'
  - type: text
    content: En le frappant du bâton,
  - type: text
    content: tu sauveras sa vie du séjour des morts.
  '15':
  - type: text
    content: Mon fils, si ton cœur devient sage,
  - type: text
    content: mon cœur, à moi aussi, se réjouira.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Je tressaillirai…  : litt. mes reins exulteront  ; cf. Jr 12.2 ; Ps 16.7 ; 139.13 ; Jb 16.13 ; 19.27 ; Lm 3.13.'
  - type: text
    content: Je tressaillirai de joie dans les profondeurs de mon être,
  - type: text
    content: quand tes lèvres diront ce qui est droit.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ne soit pas jaloux  : cf. 3.31 ; 24.1,19 ; Ps 37.1 ; 73.3. –  sans cesse  : litt. tout le jour . – Voir crainte.'
  - type: text
    content: Que ton cœur ne soit pas jaloux des pécheurs ;
  - type: text
    content: 'que sans cesse il craigne le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'car il y a  : autre traduction alors il y aura . –  ton espoir… 24.14.'
  - type: text
    content: car il y a un avenir ;
  - type: text
    content: ton espoir ne sera pas retranché.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'écoute 1.8n. –  dirige ton cœur dans la voie  : cf. 4.14 ; 9.6.'
  - type: text
    content: Toi, mon fils, écoute et deviens sage ;
  - type: text
    content: dirige ton cœur dans la voie.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'mets un couteau sous ta gorge  : sans doute pour restreindre son appétit. On pourrait aussi comprendre  : tu te mets un couteau sous la gorge , c.-à-d. tu risques ta vie si tu commets un impair. –  appétit 6.30n.'
  - type: text
    content: mets un couteau sous ta gorge,
  - type: text
    content: si tu as trop d'appétit.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'vin  : cf. Es 5.22 ; Lc 21.34 ; Rm 13.13 ; Ep 5.18.'
  - type: text
    content: Ne sois pas de ceux qui s'enivrent de vin,
  - type: text
    content: 'de ceux qui font des excès de viandes :'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'l''ivrogne  : cf. 21.17. –  celui qui fait des excès  : cf. v. 20 ; autre traduction le débauché  ; cf. 28.7 ; Dt 21.20. –  s''appauvrissent  : autre traduction deviendront pauvres  ; cf. 20.13+. –  assoupissement  : cf. 6.10n  ; 24.33s. – Cf. Siracide 18.33 : « Ne t''appauvris pas en festoyant avec de l''argent emprunté, alors que tu n''as rien dans ta bourse. »'
  - type: text
    content: car l'ivrogne et celui qui fait des excès s'appauvrissent ;
  - type: text
    content: l'assoupissement fait porter des haillons.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 1.8n  ; cf. 19.26 ; Dt 21.18-21.
  - type: text
    content: Ecoute ton père, lui qui t'a engendré ;
  - type: text
    content: ne méprise pas ta mère, quand elle est devenue vieille.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Ce v. est absent de LXX. –  Acquiers la vérité (autre traduction la loyauté ) : cf. 4.5+.'
  - type: text
    content: Acquiers la vérité et ne la vends pas
  - type: text
    content: – la sagesse, l'instruction et l'intelligence.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Le père du juste…  : cf. 10.1 ; 15.20 ; Siracide 30.2 : « Celui qui élève bien son fils en tirera satisfaction, parmi ses connaissances, il sera fier de lui. »'
  - type: text
    content: Le père du juste est dans l'allégresse ;
  - type: text
    content: celui qui engendre un sage en a de la joie.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'se réjouissent  : cf. v. 24+ ; 17.25.'
  - type: text
    content: Que ton père et ta mère se réjouissent,
  - type: text
    content: que celle qui t'a mis au monde soit dans l'allégresse !
  '26':
  - type: text
    content: Mon fils, donne-moi ton cœur ;
  - type: text
    content: que tes yeux se plaisent à mes voies !
  '27':
  - type: text
    content: ' '
  - type: note
    content: une fosse profonde 22.14.
  - type: text
    content: Car la prostituée est une fosse profonde ;
  - type: text
    content: l'inconnue, un puits étroit.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'dresse une embuscade  : cf. 7.12. –  les hommes  : autre traduction les humains.'
  - type: text
    content: Elle dresse une embuscade comme un bandit ;
  - type: text
    content: parmi les hommes elle multiplie les traîtres.
  - type: heading
    content: Portrait de l'ivrogne
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Pour qui…  : cf. 20.1. –  les yeux rouges  : expression rare et diversement interprétée ; autres possibilités les yeux injectés de sang ; les yeux sombres ; les yeux hagards ; les yeux troubles ; les yeux tuméfiés  ; cf. Gn 49.12n où la même expression est prise en bonne part.'
  - type: text
    content: Pour qui les « Malheur ! », pour qui les « Hélas ! » ?
  - type: text
    content: Pour qui les querelles, pour qui les plaintes ?
  - type: text
    content: Pour qui les blessures inutiles ?
  - type: text
    content: Pour qui les yeux rouges ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ne désire pas…  : cf. v. 6.'
  - type: text
    content: 'Ne désire pas ses friandises :'
  - type: text
    content: c'est un aliment trompeur.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 's''attardent auprès du vin  : cf. Es 5.11,22. –  qui aiment déguster  : litt. qui entrent pour scruter (18.17n) ; autre traduction qui recherchent . –  les vins parfumés  : litt. le mélange (cf. 9.2n).'
  - type: text
    content: Pour ceux qui s'attardent auprès du vin,
  - type: text
    content: pour ceux qui aiment déguster les vins parfumés.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Ne regarde pas le vin…  : cf. Ep 5.18s. –  lorsqu''il  : autre traduction parce qu''il . –  qu''il déploie sa robe  : litt. qu''il donne son œil (c.-à-d. son aspect ). –  qu''il coule aisément  : expression analogue en Ct 7.10.'
  - type: text
    content: Ne regarde pas le vin lorsqu'il est d'un beau rouge,
  - type: text
    content: qu'il déploie sa robe dans la coupe
  - type: text
    content: et qu'il coule aisément.
  '32':
  - type: text
    content: Par la suite il mord comme un serpent,
  - type: text
    content: il pique comme un aspic.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'd''autres femmes ou des étrangères, des prostituées  ; cf. 2.16n  ; 22.14n. On pourrait aussi comprendre  : tes yeux verront des choses étranges . – Voir cœur.'
  - type: text
    content: Tes yeux se porteront sur d'autres femmes,
  - type: text
    content: ton cœur parlera d'une manière perverse.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'au cœur de la mer  : cf. Ps 107.26s. –  comme un homme couché au sommet d''un mât  : LXX comme un pilote dans une violente tempête.'
  - type: text
    content: Tu seras comme un homme couché au cœur de la mer,
  - type: text
    content: 'comme un homme couché au sommet d''un mât :'
  '35':
  - type: text
    content: « On m'a frappé, et je n'ai pas eu mal !
  - type: text
    content: On m'a battu, et je n'en ai rien su !
  - type: text
    content: Quand me réveillerai-je ? J'en redemande encore ! »
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Instruction d''Aménémopé 9.14ss : « N''occupe pas ton cœur à la poursuite des richesses… Ne te fatigue pas à rechercher le superflu quand tu as de côté ce dont tu as besoin. Si des richesses te viennent par le vol, elles ne passeront pas la nuit chez toi ; on verra le lieu où elles étaient, mais elles n''y seront plus. La terre aura ouvert sa bouche… pour les engloutir et les faire sombrer dans le monde souterrain. Ou bien elles se seront fait des ailes comme celles des oies et se seront envolées au ciel. »'
  - type: text
    content: Ne te fatigue pas pour devenir riche,
  - type: text
    content: cesse d'appliquer à cela ton intelligence.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'se lèvent  : litt. s''envolent , même verbe hébreu à la fin du v. –  la richesse ou l''argent  ; l''hébreu porte un simple pronom ( vers lui, vers elle ou vers cela ).'
  - type: text
    content: Tes yeux se lèvent vers la richesse ?
  - type: text
    content: Il n'y a plus rien !
  - type: text
    content: Car elle se fait des ailes
  - type: text
    content: et, comme l'aigle, elle s'envole vers le ciel.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 1-3. –  qui a l''œil mauvais  : c.-à-d., selon toute vraisemblance, qui est avare, mesquin ou envieux  ; cf. 28.22 ; Dt 15.9n  ; 28.54ss ; Mt 6.23n  ; Siracide 14.8ss : « Il est mauvais, l''homme à l''œil envieux, qui détourne le visage et méprise les gens. L''œil du cupide n''est pas satisfait de sa part, une avidité mauvaise dessèche son âme. L''avare (litt. l''œil mauvais) est chiche de pain et il manque à sa propre table. » (L''hébreu ajoute : « Un œil bon multiplie le pain, et d''une source à sec fait jaillir l''eau sur la table. ») 31.13 : « Souviens-toi, c''est un vice que d''avoir l''œil avide, qu''y a-t-il dans la création de pire que l''œil ? C''est pourquoi il pleure à tout propos. » (Hébreu : « Dieu n''a rien créé de pire que l''œil ; c''est pourquoi devant tout il s''agite. »)'
  - type: text
    content: Ne mange pas le pain de celui qui a l'œil mauvais,
  - type: text
    content: ne désire pas ses friandises ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'il est tel…  : traduction incertaine ; LXX il mange et boit comme quelqu''un qui aurait avalé un cheveu  ; Vg comme un devin ou un interprète il juge ce qu''il ignore  ; Tg comme une porte élevée, ses désirs sont élevés  ; certains modifient le texte hébreu traditionnel pour lire ce sera comme une tempête (ou comme de la pourriture ) dans ton gosier , ou encore il ne pense qu''à satisfaire son propre appétit.'
  - type: text
    content: car il est tel que sont ses arrière-pensées.
  - type: text
    content: « Mange et bois », te dira-t-il ;
  - type: text
    content: mais son cœur n'est pas avec toi.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ce que…  : litt. ton morceau que tu as mangé . – Cf. Instruction d''Aménémopé 14.5ss : « Ne convoite pas le bien du pauvre, n''aie pas d''appétit pour son pain ; le bien du pauvre reste en travers de la gorge, il fait vomir le gosier… La bouchée de pain trop grosse, tu l''auras avalée et vomie, et tu seras vidé. »'
  - type: text
    content: Ce que tu as mangé, tu le vomiras
  - type: text
    content: et tu auras perdu tes belles paroles.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ne parle pas…  : cf. 9.8 ; Mt 7.6. –  à l''homme stupide  : litt. aux oreilles du stupide  ; 1.22+. – Cf. Instruction d''Aménémopé 22.11ss : « Ne t''épanche pas auprès de n''importe qui, de peur de porter préjudice à l''estime qu''on te porte ; ne dispense pas tes paroles aux gens ordinaires, et ne fréquente pas celui qui est trop expansif (cf. Pr 20.19). »'
  - type: text
    content: 'Ne parle pas à l''homme stupide :'
  - type: text
    content: il méprise le bon sens de tes discours.
