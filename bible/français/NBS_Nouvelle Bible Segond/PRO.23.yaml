      - type: text
        text: '9.14ss : « N''occupe pas ton cœur à la poursuite des richesses… Ne te fatigue pas à rechercher le superflu quand tu as de côté ce dont tu as besoin. Si des richesses te viennent par le vol, elles ne passeront pas la nuit chez toi ; on verra le lieu où elles étaient, mais elles n''y seront plus. La terre aura ouvert sa bouche… pour les engloutir et les faire sombrer dans le monde souterrain. Ou bien elles se seront fait des ailes comme celles des oies et se seront envolées au ciel. »'
