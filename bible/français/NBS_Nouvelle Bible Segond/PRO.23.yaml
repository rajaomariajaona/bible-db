      - type: text
        text: '14.8ss : « Il est mauvais, l''homme à l''œil envieux, qui détourne le visage et méprise les gens. L''œil du cupide n''est pas satisfait de sa part, une avidité mauvaise dessèche son âme. L''avare (litt. l''œil mauvais) est chiche de pain et il manque à sa propre table. » (L''hébreu ajoute : « Un œil bon multiplie le pain, et d''une source à sec fait jaillir l''eau sur la table. ») 31.13 : « Souviens-toi, c''est un vice que d''avoir l''œil avide, qu''y a-t-il dans la création de pire que l''œil ? C''est pourquoi il pleure à tout propos. » (Hébreu : « Dieu n''a rien créé de pire que l''œil ; c''est pourquoi devant tout il s''agite. »)'
