      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '31.12ss : « Si tu te trouves assis à une grande table, ne va pas t''exclamer, la bouche ouverte devant elle : “Qu''elle est bien garnie !” Souviens-toi, c''est un vice que d''avoir l''œil avide (cf. v. 6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ')… N''étends pas la main vers tout ce que tu vois, pour ne pas te bousculer avec ton voisin sur le plat. Juge d''après toi-même de ce que ton prochain ressent, et comporte-toi toujours avec réflexion. Mange ce qu''on te présente, comme un homme bien élevé, et ne joue pas des mâchoires au point d''en être odieux. Sois le premier à t''arrêter par bonne éducation, ne te montre pas insatiable, de crainte de choquer. Si tu es assis en nombreuse compagnie, n''étends pas la main avant les autres. Qu''il suffit de peu à l''homme bien élevé ! Aussi n''étouffe-t-il point, une fois sur son lit : qui mange modérément jouit d''un sommeil salutaire… »'
