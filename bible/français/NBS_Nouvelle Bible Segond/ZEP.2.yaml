document_id: ZEP.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel aux humbles
  - type: text
    content: ' '
  - type: note
    content: 'Rassemblez-vous et recueillez-vous  : deux formes d''un même verbe hébreu dont la traduction est incertaine ( rassemblez-vous et rassemblez  ?) ; ailleurs il signifie ramasser (de la paille, cf. v. 2) ; toutefois on peut aussi le rapprocher d''une racine sémitique qui signifie réfléchir . –  sans pudeur  : traduction incertaine ; on pourrait comprendre qui ne pâlit pas (Es 29.22 ; Jl 2.6 ; Na 2.11) ; qui n''est pas désirée (le verbe correspondant est traduit par languir en Gn 31.30 ; Ps 84.3 ; Jb 14.15), ou encore, d''après LXX, mal élevée ; sans éducation.'
  - type: text
    content: Rassemblez-vous et recueillez-vous,
  - type: text
    content: nation sans pudeur,
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 8 ; Es 16.6 ; Jr 48.26,42 ; Ez 25.6s. –  le peuple du Seigneur Ex 6.7 ; Dt 7.6.
  - type: text
    content: 'Cela leur arrivera pour leur orgueil, parce qu''ils ont outragé le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées et qu''ils se sont élevés contre lui. '
  '11':
  - type: note
    content: 'sera redoutable  : LXX apparaîtra  ; cf. Dt 7.21 ; Ml 1.14 ; Ps 47.3 ; 66.5 ; 76.13 ; 89.8 ; 96.4 ; Dn 9.4. –  il anéantira  : traduction conjecturale ; c''est en modifiant légèrement le texte qu''on peut lire, litt., il fera décliner, dépérir, ou il abaissera, cf. Es 10.16 ; 17.4 ; Ez 34.20 ; Mi 6.10 ; voir aussi Ex 12.12. –  de la terre ou du pays. –  les îles des nations, c.-à-d. les nations les plus éloignées, en particulier celles de l''ouest, dans le bassin méditerranéen ; cf. Gn 10.5 ; Es 11.11+ ; 24.15 ; 41.5 ; 42.12. –  se prosterneront… Ml 1.11 ; Ps 22.28 ; 66.4 ; cf. Es 2.2+s.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera redoutable contre eux : il anéantira tous les dieux de la terre ; toutes les îles des nations se prosterneront devant lui, chacune en son lieu.'
  - type: heading
    content: Contre les peuples du sud et du nord
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Koushites ou Nubiens , au sud, peut-être comme représentants de l''Egypte sur laquelle ils avaient dominé pendant un demi-siècle, jusqu''en 663 av. J.-C. 1.1n  ; 3.10 ; Gn 2.13n  ; Es 18.1nss ; voir aussi Jr 46 ; Ez 29–32. –  vous serez  : litt. ils seront  ; certains modifient le texte hébreu traditionnel pour lire (vous serez) victimes (Ez 21.19n) de l''épée du Seigneur  ; cf. Jr 25.33 ; 47.6 ; 48.2 ; 50.35ss ; Ez 32.25ss.'
  - type: text
    content: Vous aussi, Koushites,
  - type: text
    content: vous serez victimes de mon épée.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Il étendra sa main 1.4+. –  le nord Jr 1.14n. – Sur la chute de Ninive , capitale de l'Assyrie , en 612 av. J.-C., voir Na 1.1n  ; cf. Es 10.5ss ; 14.24ss ; Na 2–3.
  - type: text
    content: Il étendra sa main vers le nord,
  - type: text
    content: et il fera disparaître l'Assyrie ;
  - type: text
    content: il fera de Ninive un lieu dévasté,
  - type: text
    content: une terre desséchée comme le désert.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'des animaux de toute espèce  : litt. tous les animaux de la nation , peut-être au sens de de la terre  ; certains modifient le texte hébreu traditionnel pour lire de la vallée , cf. Es 13.21+. –  le pélican  : l''identification de cet oiseau est particulièrement incertaine ; autres propositions  : corneille, hibou, choucas… Es 34.11+ss ; Ps 102.7n. –  passeront la nuit ou logeront . –  La ruine  : LXX le corbeau . –  car les lambris…  : traduction conjecturale ; autre traduction car les poutres de cèdre seront mises à nu  ; en modifiant le texte hébreu traditionnel certains lisent oui, j''écrase la ville.'
  - type: text
    content: Des troupeaux se coucheront au milieu d'elle,
  - type: text
    content: des animaux de toute espèce ;
  - type: text
    content: aussi bien le pélican que le hérisson
  - type: text
    content: passeront la nuit parmi ses chapiteaux ;
  - type: text
    content: une voix hululera à la fenêtre.
  - type: text
    content: La ruine sera sur le seuil,
  - type: text
    content: car les lambris de cèdre seront arrachés.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ville en liesse  : cf. 3.11n ( exulter ) ; Es 22.2 ; 23.7 ; 32.13. –  sécurité Lv 25.18 ; Dt 12.10 ; Jg 18.7 ; 1S 12.11. –  Moi, et rien que moi Es 47.8,10. –  dévastée Jr 50.30 ; 51.41. –  animaux v. 5s,14. –  sifflent… Jr 18.16n  ; 19.8 ; 49.17 ; 50.13 ; Lm 2.15.'
  - type: text
    content: Voilà donc cette ville en liesse,
  - type: text
    content: qui habite en sécurité
  - type: text
    content: 'et qui se dit :'
  - type: text
    content: Moi, et rien que moi !
  - type: text
    content: Comment ! Elle est dévastée,
  - type: text
    content: c'est un gîte pour les animaux !
  - type: text
    content: Tous ceux qui passent près d'elle
  - type: text
    content: sifflent d'horreur et agitent la main.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'que ne survienne le décret  : litt. avant la naissance du décret , sens incertain ; quelques-uns modifient le texte hébreu traditionnel pour lire avant que vous ne soyez chassés comme de la menue paille (ou comme la balle ) qui s''en va en un jour  ; cf. Es 29.5 ; 41.15 ; Os 13.3 ; Ps 1.4+. –  colère ardente  : cf. 1.18+ ; Ex 32.12 ; Nb 25.4 ; Dt 13.18 ; Es 13.9,13 ; Jr 4.8 ; 25.38. –  le jour de la colère 1.7+,14ss ; Lm 2.22.'
  - type: text
    content: avant que ne survienne le décret
  - type: text
    content: et que ce jour ne passe comme de la menue paille,
  - type: text
    content: avant que n'arrive sur vous
  - type: text
    content: 'la colère ardente du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: avant que n'arrive sur vous
  - type: text
    content: 'le jour de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cherchez le Seigneur 1.6+ ; cf. Am 5.4 ; Ps 24.4-6 ; Pr 28.5. –  gens humbles (ou pauvres, affligés ) du pays (ou de la terre ) : cf. 3.12 ; Es 57.15 ; 61.1 ; 66.2 ; Ps 10.17 ; 22.27 ; 76.10 ; Pr 3.34 ; 16.19. –  son équité  : autre traduction son droit  ; cf. Dt 4.4ss. –  Cherchez la justice…  : cf. Pr 14.6 ; 15.14 ; 17.9 ; 18.15 ; Mt 6.33. –  l''humilité et gens humbles sont apparentés en hébreu ; cf. Pr 15.33 ; 18.12 ; 22.4. –  Peut-être Am 5.15. –  cachés  : cf. Es 2.10 ; 26.20. –  au jour… v. 1+.'
  - type: text
    content: 'Cherchez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous tous, gens humbles du pays,'
  - type: text
    content: vous qui agissez selon son équité !
  - type: text
    content: Cherchez la justice, cherchez l'humilité !
  - type: text
    content: Peut-être serez-vous cachés
  - type: text
    content: 'au jour de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Contre les peuples de l'ouest
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Gaza / Ashqelôn / Ashdod / Eqrôn  : quatre des cinq villes des Philistins (si Gath n''est pas citée, c''est sans doute parce qu''elle a perdu son importance ; cf. Am 1.6nss) à l''ouest de Jérusalem ; le texte hébreu contient plusieurs jeux d''assonances sur les noms de ces villes (comme en Es 10.30n  ; Am 5.5n  ; Mi 1.10nss) ; sur la Philistie, cf. Es 14.28ss ; Jr 25.20 ; 47.1ss ; Jl 3.4ss ; Za 9.5ss. –  abandonnée  : cf. Es 6.12 ; 17.9 ; Jr 4.29. –  en plein midi Jr 6.4 ; 15.8 ; 20.16.'
  - type: text
    content: Car Gaza sera abandonnée,
  - type: text
    content: Ashqelôn sera dévastée,
  - type: text
    content: Ashdod sera chassée en plein midi,
  - type: text
    content: Eqrôn sera déracinée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur 3.1 ; Es 5.8+ ; Ha 2.6. –  bord de la mer  : litt. le lien de la mer , expression qui peut signifier simplement la région côtière  ; de même aux v. 6s ; le même mot est traduit par contrée en Dt 3.13ss ; 1R 4.13. –  Kérétites Ez 25.15ss ; il s''agit probablement de Crétois, associés aux Philistins (cf. 1S 30.14 ; 2S 8.18 ; 15.18 ; 20.7,23 ; 1R 1.38,44 ; Am 9.7n). –  Canaan 1.11n  ; Jos 13.3 ; l''expression pourrait ici désigner en particulier les Phéniciens, associés aux Philistins (cf. Jl 4.4ss) ; c''est par ailleurs des Philistins que vient le nom de Palestine qui a été donné plus tard à tout l''ancien pays de Canaan  ; certains modifient le texte hébreu traditionnel pour lire je t''humilierai, pays des Philistins . –  je te détruirai  : autres traductions je te ferai périr ; je te ferai disparaître . –  plus d''habitants 3.6.'
  - type: text
    content: Quel malheur pour les habitants du bord de la mer,
  - type: text
    content: pour la nation des Kérétites !
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est contre vous :'
  - type: text
    content: Canaan, pays des Philistins,
  - type: text
    content: je te détruirai, tu n'auras plus d'habitants !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 5.17 ; 7.25+. –  des pacages  : traduction incertaine ; le terme hébreu, qui n''apparaît qu''ici dans l''A.T., est peut-être un synonyme rare de celui qui est traduit par pâturages . D''autres comprennent des citernes.'
  - type: text
    content: Le bord de la mer deviendra des pâturages,
  - type: text
    content: des pacages pour les bergers,
  - type: text
    content: et des parcs pour les troupeaux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 11.14 ; Jr 49.2 ; Am 9.12 ; Ab 19s ; Za 9.7. –  Cette région  : c''est le terme qui a été traduit par bord (de la mer) dans les v. 5ns. –  le reste… v. 9 ; 3.13ns ; Es 1.9+ ; Mi 2.12 ; cf. Jr 40.15 ; 42.15,19 ; 43.5 ; 44.12,28 ; Za 8.11. –  c''est là…  : traduction incertaine, litt. ils feront paître pour eux  ; certains modifient le texte hébreu traditionnel pour lire ils feront paître (leurs troupeaux) près de la mer  ; cf. Es 65.10. –  se coucheront  : même verbe au v. 14 ; 3.13. –  interviendra 1.8+ ; Za 10.3. –  il rétablira… 3.20 ; Dt 30.3n  ; Jr 29.14n  ; Os 6.11n  ; Jb 42.10n.'
  - type: text
    content: Cette région sera pour le reste de la maison de Juda ;
  - type: text
    content: c'est là qu'ils feront paître leur bétail ;
  - type: text
    content: le soir ils se coucheront dans les maisons d'Ashqelôn ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, interviendra pour eux ;'
  - type: text
    content: il rétablira leur situation.
  - type: heading
    content: Contre les peuples de l'est
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'outrages  : le même terme est traduit par déshonneur en 3.18+. –  Moab et Ammonites , à l''est ; cf. Gn 19.31ss ; 2R 24.2 ; Es 15–16 ; Jr 48–49 ; Ez 21.33ss ; 25.1ss ; Am 1.13–2.3. –  s''élevaient contre ses frontières  : traduction incertaine ; on pourrait aussi comprendre se glorifiaient de leur territoire , ou encore s''étendaient sur son territoire (celui de Juda)  ; cf. v. 10+.'
  - type: text
    content: J'ai entendu les outrages de Moab
  - type: text
    content: et les injures par lesquelles les Ammonites
  - type: text
    content: outrageaient mon peuple
  - type: text
    content: et s'élevaient contre ses frontières.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'par ma vie  : litt. je suis vivant ! (formule de serment) ; cf. Jg 8.19 ; Ez 5.11 ; Os 4.15n. –  Seigneur … des Armées 1S 1.3n. –  Sodome / Gomorrhe Gn 19 ; Dt 29.22s ; Es 1.9-10+ ; 13.19 ; Jr 23.14 ; Am 4.11 ; Mt 10.15/ / ; 2P 2.6. –  un lieu couvert…  : traduction incertaine ; d''autres, rapprochant de Gn 15.2n, comprennent  : l''héritage des mauvaises herbes , cette dernière expression étant aussi une traduction incertaine (Jb 30.7 ; Pr 24.31) ; cf. Es 5.6+. –  mine de sel  : cf. Jg 9.45 ; Jr 17.6 ; Ps 107.34 ; Jb 39.6. –  le reste… v. 7+.'
  - type: text
    content: C'est pourquoi, par ma vie,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, Dieu d''Israël –'
  - type: text
    content: Moab sera comme Sodome,
  - type: text
    content: les Ammonites comme Gomorrhe ;
  - type: text
    content: ce sera un lieu couvert de mauvaises herbes,
  - type: text
    content: une mine de sel,
  - type: text
    content: un lieu dévasté pour toujours ;
  - type: text
    content: le reste de mon peuple les pillera,
  - type: text
    content: ce qui subsistera de ma nation s'emparera de leur patrimoine.
