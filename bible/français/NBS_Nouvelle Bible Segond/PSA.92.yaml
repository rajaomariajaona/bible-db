document_id: PSA.92,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Il est bon de célébrer le Seigneur
  - type: text
    content: ' '
  - type: note
    content: Chant 30.1+. – Voir sabbat.
  - type: text
    content: Psaume. Chant. Pour le jour du sabbat.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Jg 5.31.
  - type: text
    content: 'Car tes ennemis, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: tes ennemis disparaissent ;
  - type: text
    content: tous les malfaisants sont dispersés.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ma corne 75.5nss ; 89.18n. –  l''aurochs 22.22 ; 29.6 ; Nb 23.22 ; 24.8 ; Dt 33.17 ; Es 34.7 ; Jb 39.9s ; LXX la licorne. –  je suis arrosé (même verbe en Lv 2.4) : cf. Ps 23.5 ; 45.8 ; 133.2 ; Es 61.3 ; voir aussi Mc 6.13 ; Jc 5.14. Plusieurs versions anciennes ont lu et ma vieillesse (baigne) dans l''huile fraîche , c.-à-d. dans la prospérité ou la grâce.'
  - type: text
    content: Tu élèves ma corne comme celle de l'aurochs ;
  - type: text
    content: je suis arrosé d'une huile fraîche.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Mes yeux voient…  : autre traduction possible mes détracteurs (le terme hébreu correspondant n''apparaît qu''ici et sa signification exacte est incertaine ; la traduction s''inspire de versions anciennes) me sont offerts en spectacle  ; cf. 22.18n  ; 37.34ss ; 54.9+ (autre verbe).'
  - type: text
    content: Mes yeux voient mes détracteurs,
  - type: text
    content: et mes oreilles entendent
  - type: text
    content: ceux qui se dressent contre moi pour me faire du mal.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Les justes fleurissent  : litt. le juste fleurit , mais la suite est au pluriel ; cf. 1.3 ; Jr 17.8 ; Pr 11.28 ; Psaumes de Salomon 14.3s : « Le paradis du Seigneur, les arbres de vie, ce sont ses saints. Leur plantation est enracinée pour l''éternité, on ne les arrachera pas tant qu''il y aura des cieux. » –  cèdre du Liban Es 2.16 ; 10.34n.'
  - type: text
    content: Les justes fleurissent comme le palmier,
  - type: text
    content: ils croissent comme le cèdre du Liban.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '52.10 ; cf. 23.6n  ; 27.4 ; 41.13 ; 61.5. –  les cours…  : litt. les cours de notre Dieu  ; cf. 65.5 ; 84.3.'
  - type: text
    content: 'Plantés dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: ils fleurissent dans les cours du temple de notre Dieu ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'cheveux blancs 103.5 ; 148.12s. –  pleins de sève  : litt. gras.'
  - type: text
    content: ils sont encore féconds à l'âge des cheveux blancs,
  - type: text
    content: ils sont pleins de sève et verdoyants,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'dire  : autre traduction raconter (cf. v. 3). –  mon rocher 18.3+. –  pas d''injustice  : cf. 51.6 ; 73.2 ; Dt 32.4 ; Jn 7.18 ; Rm 3.4 ; 9.14 ; Ap 15.3 ; 16.5,7.'
  - type: text
    content: 'pour dire que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est droit :'
  - type: text
    content: c'est mon rocher, il n'y a pas d'injustice en lui.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 147.1 ; cf. 7.18n  ; 54.8.
  - type: text
    content: 'Il est bon de célébrer le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: de chanter pour ton nom, ô Très-Haut !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 34.2. –  matin 5.4 ; 30.6+ ; 59.17 ; 88.14 ; 90.14. –  nuits 77.7 ; 119.55 ; 134.1 ; Es 26.9.
  - type: text
    content: De dire dès le matin ta fidélité,
  - type: text
    content: et ta constance pendant les nuits,
  '4':
  - type: text
    content: ' '
  - type: note
    content: '33.2 ; 81.1. –  au son  : le terme hébreu correspondant est dérivé du verbe traduit par murmurer, méditer (1.2n  ; 9.17n).'
  - type: text
    content: sur l'instrument à dix cordes et sur le luth,
  - type: text
    content: au son de la lyre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 65.18 ; 2Ch 7.10.
  - type: text
    content: 'Tu me réjouis, '
  - type: text
    content: Seigneur
  - type: text
    content: ', par ton action ;'
  - type: text
    content: je crie de joie devant les œuvres de tes mains.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Que tes œuvres… 104.24 ; cf. 77.12s ; 106.2 ; 111.2. –  tes pensées 40.6 ; 139.17s ; Es 55.8s.
  - type: text
    content: 'Que tes œuvres sont grandes, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Comme tes pensées sont profondes !
  '7':
  - type: text
    content: ' '
  - type: note
    content: '73.22. –  L''abruti / l''homme stupide  : cf. 49.11 ; 94.8 ; Pr 1.22+ ; 12.1 ; 30.2.'
  - type: text
    content: L'abruti n'en sait rien,
  - type: text
    content: l'homme stupide n'en a aucune intelligence.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 37.35s ; 73.17ss ; cf. Jb 27.14. –  malfaisants v. 10 ; 5.6+.
  - type: text
    content: Quand les méchants fleurissent comme l'herbe,
  - type: text
    content: quand s'épanouissent tous les malfaisants,
  - type: text
    content: c'est pour être détruits à jamais.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 9.8 ; 10.16 ; 11.4 ; 14.2 ; 68.35 ; 93.2 ; 102.13.
  - type: text
    content: Mais toi, là-haut,
  - type: text
    content: 'pour toujours tu es le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) !'
