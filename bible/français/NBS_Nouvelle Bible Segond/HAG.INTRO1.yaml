document_id: HAG.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Le court livret d'Aggée rassemble quatre déclarations divines transmises par le prophète entre le mois d'
  - type: text
    content: août
  - type: text
    content: ' et le mois de '
  - type: text
    content: décembre
  - type: text
    content: ' de l''an '
  - type: text
    content: 520 av. J.-C.
  - type: text
    content: ' Cette extrême précision chronologique incite à le replacer dans le contexte politique de son époque.'
  - type: text
    content: 'A la cour de Perse, '
  - type: text
    content: deux règnes
  - type: text
    content: ' surtout marquent la période de la reconstruction du temple de Jérusalem ('
  - type: text
    content: la maison du Seigneur
  - type: text
    content: ) après l'exil de Juda. Celui de Cyrus, le conquérant de Babylone, et celui de Darius, le roi qui apparaît à la première phrase du livret et dont l'avènement sert de référence pour dater les messages du prophète.
  - type: text
    content: Cyrus
  - type: text
    content: ' avait pris Babylone en 539. L''année suivante, il promulguait un décret (voir « Cyrus à Babylone », p.${Xcyrbab}) autorisant les populations exilées à retourner dans leurs pays d''origine. Les Juifs en ont bénéficié. Ceux qui le désiraient ont pu rentrer à Jérusalem avec les moyens de reconstruire le temple. Il semble que, dès 537, le premier contingent de Juifs revenus de captivité se soit employé à relever l''autel des holocaustes sur le mont du Temple, ce qui rendait possible la reprise du culte sacrificiel. Mais la réticence des habitants du pays qui n''avaient pas connu l''exil, regroupés autour de la capitale administrative, Samarie, mit rapidement un terme aux velléités de reconstruction (Esd 4).'
  - type: text
    content: 'A la faveur d''une période troublée pour le pouvoir central perse, les choses resteront en l''état pendant quelques années. Mais l''histoire biblique va rebondir grâce à l''arrivée de '
  - type: text
    content: Darius
  - type: text
    content: ', qui agira à l''égard des religions des populations soumises avec le même esprit de libéralisme que son illustre parent, le grand Cyrus. C''est dans cette conjoncture à nouveau favorable que le prophète Aggée se met à parler.'
  - type: text
    content: 'Comme bien d''autres prophètes avant lui, Aggée dénonce le manque de passion spirituelle du peuple de Dieu. Il explique ainsi les récoltes désastreuses des dernières années. Mais le message d''Aggée ne se borne pas à un constat de faillite. Après dix-sept années de négligence, le temps est venu de '
  - type: text
    content: rebâtir le temple
  - type: text
    content: '. Aggée s''exprime avec une si joyeuse conviction (son nom veut dire « en fête », peut-être au sens de « né un jour de fête ») qu''il emporte l''adhésion de tout le peuple. Un souffle nouveau s''empare du prince, du grand prêtre et du peuple : trois semaines après cette première déclaration, les travaux de reconstruction du temple ont repris.'
  - type: text
    content: 'En septembre 520, le prophète revient à la charge pour développer le deuxième grand thème de son message. Cette fois-ci il s''intéresse principalement au personnage de '
  - type: text
    content: Zorobabel
  - type: text
    content: ', qu''il désigne comme '
  - type: text
    content: gouverneur de Juda
  - type: text
    content: ' (1.1 ; 2.2) — le terme traduit par '
  - type: text
    content: gouverneur
  - type: text
    content: ' étant, dans l''administration perse, dévolu aux responsables des subdivisions des satrapies. Mais d''autres sources indiquent que Zorobabel est de sang royal. Il est en effet le petit-fils du roi Joïakîn de Juda, que les Babyloniens avaient emmené en captivité et par qui la lignée de David s''était perpétuée (cf. 1Ch 3.1,19).'
  - type: text
    content: 'Le prophète Aggée, dans ses derniers messages, va faire de Zorobabel une '
  - type: text
    content: figure messianique
  - type: text
    content: '. Les bouleversements politiques qui ébranlent la terre depuis plusieurs années doivent aboutir à une restauration de la royauté davidique : '
  - type: text
    content: Je te prendrai, Zorobabel, fils de Shéaltiel, mon serviteur, — déclaration du Seigneur — et je te placerai comme un sceau, car c'est toi que j'ai choisi
  - type: text
    content: ' (2.23). Cette dernière promesse trouvera encore un écho dans les deux généalogies évangéliques de Jésus, où Zorobabel figure en bonne place (Mt 1.12 ; Lc 3.27).'
  - type: text
    content: Le message universel du livre
  - type: text
    content: 'Le prophète Aggée est un '
  - type: text
    content: laïc
  - type: text
    content: . Le livre biblique qui porte son nom est destiné aux hommes et aux femmes d'action qui veulent vivre leur foi dans l'avenir que Dieu leur ouvre. Cet écrit donne l'exemple d'une lecture positive de la politique internationale et illustre l'influence bénéfique du courage et de la ferveur. Aujourd'hui encore il engage la communauté de la foi, après les examens de conscience nécessaires, à se mettre au travail pour répondre à l'appel et aux promesses de Dieu.
  - type: text
    content: Pistes pour une étude chronologique
  - type: text
    content: 1.1-14
  - type: text
    content: Les récentes calamités agricoles sont imputables à l'égoïsme de la communauté de Juda. Chacun a pensé à son propre bien-être au lieu de songer à servir Dieu.
  - type: text
    content: 2.15-19
  - type: text
    content: La reprise des travaux de reconstruction du temple apporte une nouvelle prospérité.
  - type: text
    content: (cf. 1.15
  - type: text
    content: n
  - type: text
    content: )
  - type: text
    content: 2.1-9
  - type: text
    content: Vigoureux encouragements aux bâtisseurs. Gloire future du nouveau temple.
  - type: text
    content: 2.10-14
  - type: text
    content: 'Consultation des prêtres* sur le pur* et l''impur : une parabole sur le comportement de la communauté de la foi.'
  - type: text
    content: 2.20-23
  - type: text
    content: 'Dieu confirme son choix de la lignée davidique en la personne de Zorobabel : ce gouverneur mis en place par les Perses reçoit maintenant une sorte d''investiture royale de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
