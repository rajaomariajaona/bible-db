document_id: ISA.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: PREMIÈRE PARTIE
  - type: text
    content: ' '
  - type: note
    content: 'Vision 2.1 ; Ab 1+. – Le nom d’ Esaïe (qui a aussi été transcrit Isaïe , hébreu Yesha‘yahou ), signifie YHWH (le Seigneur ) sauve (même racine hébraïque que Josué, Osée ou Jésus ). Autres personnages du même nom : Esd 8.7,19 ; Né 11.7 ; 1Ch 25.3,15 ; 26.25 ; cf. Mt 1.21n. –  Amots (ne pas confondre avec le prophète Amos, dont le nom est très différent en hébreu) n''est connu que comme père d''Esaïe. –  aux jours d''Ozias (6.1n  ; ou Azaria , cf. 2R 15.1 ; 2Ch 26.1) … d''Ezéchias (2R 18.1–20.21), c.-à-d. approximativement entre 740 et 687 av. J.-C.'
  - type: text
    content: Vision d'Esaïe, fils d'Amots, qu'il eut sur Juda et Jérusalem, aux jours d'Ozias, de Jotam, d'Achaz, d'Ezéchias, rois de Juda.
  - type: heading
    content: Israël s'est révolté contre le Seigneur
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Sodome / Gomorrhe v. 9+. L''apostrophe s''adresse à Jérusalem ; voir aussi Dt 32.32 ; Jr 23.14 ; Lm 4.6. –  loi ou enseignement , en hébreu tora  : cf. 2.3 ; 8.16,23 ; Jb 22.22n.'
  - type: text
    content: 'Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: chefs de Sodome !
  - type: text
    content: Prête l'oreille à la loi de notre Dieu,
  - type: text
    content: peuple de Gomorrhe !
  '11':
  - type: text
    content: ' '
  - type: note
    content: '1S 15.22 ; Jr 6.20 ; 7.22 ; Os 6.6 ; Am 5.21-25 ; Mi 6.6-8 ; Ps 50.8. – Voir sacrifices. –  bêtes grasses  : cf. 11.6 ; Ez 39.18 ; Am 5.22.'
  - type: text
    content: 'Qu''ai-je à faire de la multitude de vos sacrifices ? dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Je suis rassasié des holocaustes de béliers
  - type: text
    content: et de la graisse des bêtes grasses ;
  - type: text
    content: je ne prends pas plaisir
  - type: text
    content: au sang des taureaux, des agneaux et des boucs.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'pour paraître en ma présence  : litt. pour être vus de ma face (cf. 16.12n). Un ms hébreu et une version ancienne portent pour voir ma face. –  qui vous demande  : litt. qui recherche cela de vos mains. –  les cours de mon temple  : litt. mes cours.'
  - type: text
    content: Quand vous venez pour paraître en ma présence,
  - type: text
    content: qui vous demande de fouler les cours de mon temple ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 23.14ss ; voir aussi Ps 50.8ss ; Pr 15.8 ; 21.3 ; Ec 4.17. –  nouvelles lunes Nb 28.11. – Voir sabbat. –  convocations  : cf. 4.5 ; Lv 23.3ss. –  mal ou malfaisance , même terme en 10.1 ; 29.20 ; 31.2n  ; 32.6 ; 41.29n  ; 55.7 ; 58.9 ; 59.4ss ; 66.3n  ; Jr 4.14s ; cf. Nb 23.21n  ; Os 4.15n  ; Am 5.5n. –  assemblées solennelles Lv 23.36n  ; Dt 16.8n  ; Jr 9.1n  ; Am 5.21.'
  - type: text
    content: 'Cessez d''apporter des offrandes inutiles :'
  - type: text
    content: l'encens est pour moi une abomination ;
  - type: text
    content: quant aux nouvelles lunes, aux sabbats et aux convocations,
  - type: text
    content: je ne supporte pas le mal avec les assemblées solennelles.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je déteste  : autre traduction mon âme déteste (cf. Gn 1.20n). –  rencontres festives  : cf. 33.20. –  je suis las Jr 15.6.'
  - type: text
    content: Je déteste vos nouvelles lunes et vos rencontres festives,
  - type: text
    content: elles me pèsent ;
  - type: text
    content: je suis las de les supporter.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'vous tendez les mains (pour prier) 1R 8.22n  ; Ps 28.2+ ; cf. Ec 5.1 ; Mt 6.7. –  je ferme  : litt. je cache. –  de sang  : le mot hébreu est au pluriel ; cette formule désigne généralement l''effusion et la dette de sang liées au meurtre ; 59.3 ; voir aussi 4.4 ; Gn 4.10 ; Dt 19.10 ; cf. Ps 9.13 ; 24.4 ; Pr 6.16ss.'
  - type: text
    content: Quand vous tendez les mains,
  - type: text
    content: je ferme les yeux pour ne pas vous voir ;
  - type: text
    content: quand bien même vous multipliez les prières,
  - type: text
    content: 'je n''entends pas :'
  - type: text
    content: vos mains sont pleines de sang.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 51.9ss. – Voir pur. –  agissements mauvais Dt 28.20n  ; Jr 4.4+.
  - type: text
    content: Lavez-vous, purifiez-vous,
  - type: text
    content: ôtez de ma vue vos agissements mauvais,
  - type: text
    content: cessez de faire du mal.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'cherchez l''équité ou le droit , cf. v. 21,27 ; cf. 16.5n. –  redressez l''oppresseur  : des versions anciennes ont lu  : rendez le bonheur à l''opprimé , ce qui correspond à une vocalisation différente du texte hébreu. –  rendez justice et équité correspondent à des termes apparentés en hébreu. –  orphelin / veuve v. 23 ; 9.16 ; 10.2 ; Ex 22.21 ; Jr 7.6 ; 22.3 ; Ez 22.7 ; Ps 82.3+ ; 146.9+ ; Jb 22.9+.'
  - type: text
    content: Apprenez à faire du bien,
  - type: text
    content: cherchez l'équité,
  - type: text
    content: redressez l'oppresseur,
  - type: text
    content: rendez justice à l'orphelin,
  - type: text
    content: défendez la veuve.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'argumentons ou discutons  ; même forme verbale en Jb 23.7. On pourrait aussi comprendre réconcilions-nous . Cf. Mi 6.2. –  écarlate / cramoisi  : c''est l''association de ces deux termes qui est traduite par écarlate en Ex 25.4n. –  ils deviendraient…  : autre traduction possible deviendraient-ils… ? –  blancs comme la neige Ps 51.9.'
  - type: text
    content: Venez, je vous prie, et argumentons,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Quand vos péchés seraient comme l'écarlate,
  - type: text
    content: ils deviendraient blancs comme la neige ;
  - type: text
    content: quand ils seraient rouges comme le cramoisi,
  - type: text
    content: ils deviendraient comme la laine.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ce qu''il y a de meilleur…  : litt. le bon du pays  ; cf. Jr 2.7 ; voir aussi Esd 9.12.'
  - type: text
    content: Si vous voulez écouter,
  - type: text
    content: vous mangerez ce qu'il y a de meilleur dans le pays ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ciel (ou cieux , Gn 1.1n) / Terre , pris à témoin : Dt 30.19 ; 31.28 ; 32.1 (cf. Mi 1.2) ; Ps 50.4. –  c''est le Seigneur qui parle (ou qui a parlé ) : cf. 22.25 ; 24.3 ; 25.8 ; 1R 14.11n. –  des fils 63.8 ; cf. Ex 4.22 ; Jr 3.19 ; 31.20 ; Os 2.1 ; 11.1 ; voir aussi Dt 21.18ss.'
  - type: text
    content: Ciel, écoute !
  - type: text
    content: Terre, prête l'oreille !
  - type: text
    content: '– c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  - type: text
    content: J'ai éduqué et élevé des fils,
  - type: text
    content: mais ils se sont révoltés contre moi.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'l''épée Lv 26.6,25 ; Dt 32.42 ; 2S 2.26 ; Jr 2.30. –  la bouche…  : cf. 34.16n  ; 40.5 ; 58.14.'
  - type: text
    content: mais si vous refusez, si vous êtes rebelles,
  - type: text
    content: vous serez dévorés par l'épée
  - type: text
    content: '– c''est la bouche du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  - type: heading
    content: Dieu purifiera Jérusalem
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Comment  : voir 14.4n  ; Am 5.1. –  fidèle ou sûre, stable  ; il s''agit de Jérusalem ; cf. v. 26. –  prostituée  : cf. 23.15-18 ; Ez 16.15-43 ; 23.22-49 ; Os 1.2 ; 2.4-15 ; 3.3. –  équité ou droit , cf. v. 17+ ; 5.7 ; Ps 89.15 ; 97.2. –  séjournait  : litt. passait la nuit ou logeait.'
  - type: text
    content: Comment ! La cité fidèle
  - type: text
    content: est devenue une prostituée !
  - type: text
    content: Elle était remplie d'équité,
  - type: text
    content: la justice y séjournait,
  - type: text
    content: et maintenant ce sont des meurtriers !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'scories  : cf. Ez 22.18. –  vin  : cf. 5.1-7.'
  - type: text
    content: Ton argent s'est changé en scories,
  - type: text
    content: ton vin a été coupé d'eau.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'chefs / rebelles Os 9.15. –  pots-de-vin / récompenses 5.23 ; 33.15 ; Ex 23.7-8+. –  orphelin / veuve v. 17+. –  ne les préoccupe pas  : litt. ne vient pas vers eux . – Cf. 3.15+.'
  - type: text
    content: Tes chefs sont rebelles
  - type: text
    content: et complices des voleurs,
  - type: text
    content: tous aiment les pots-de-vin
  - type: text
    content: et courent après les récompenses ;
  - type: text
    content: ils ne font pas droit à l'orphelin,
  - type: text
    content: et la cause de la veuve ne les préoccupe pas.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'du Seigneur…  : litt. du Seigneur (hébreu ha-’adôn ) YHWH des Armées , v. 9n. –  l''Indomptable d''Israël  : cf. 10.13 ; 46.12 ; 49.26+ ; Gn 49.24n. –  malheur ! la même interjection est traduite par quel malheur pour au v. 4. –  Je tirerai satisfaction  : cf. Gn 27.42n  ; Ez 5.13n. L''hébreu joue sur une assonance entre les verbes traduits respectivement par Je tirerai satisfaction et je me vengerai (ces verbes sont proches par le sens comme par la forme).'
  - type: text
    content: A cause de cela, – déclaration du Seigneur,
  - type: text
    content: 'du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: l'Indomptable d'Israël –
  - type: text
    content: malheur ! Je tirerai satisfaction de mes adversaires,
  - type: text
    content: et je me vengerai de mes ennemis.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'J''étendrai de nouveau  : voir v. 26n. –  comme avec de la potasse  : le terme correspondant est traduit par lessive en Jb 9.30 (terme apparenté en Jr 2.22n  ; Ml 3.2) ; une autre acception du même mot, ou un homonyme, évoque la pureté en Ps 18.21,25 ; Jb 22.30. On utilisait un mélange de potasse et de soude pour le lavage des métaux ; certains modifient le texte hébreu traditionnel pour lire dans une fournaise . –  toutes tes parcelles de plomb  : un mot très proche désigne l''étain (Ez 22.18-20 ; 27.12). On peut aussi comprendre, plus simplement, tes déchets . Cf. Jr 6.29.'
  - type: text
    content: J'étendrai de nouveau la main sur toi,
  - type: text
    content: je passerai au creuset tes scories, comme avec de la potasse,
  - type: text
    content: et j'enlèverai toutes tes parcelles de plomb.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Je te donnerai de nouveau…  : litt. je ferai revenir (le même verbe a été traduit par j''étendrai de nouveau au v. 25) tes juges comme par le passé , c.-à-d. je ferai revenir tes juges d''autrefois ou je ferai redevenir tes juges comme ils étaient autrefois. –  Ville de la justice 54.14 ; cf. Jr 33.16n. –  Cité fidèle v. 21 ; cf. 60.14 ; Ap 2.17 ; 3.12.'
  - type: text
    content: Je te donnerai de nouveau des juges comme par le passé,
  - type: text
    content: et des conseillers comme au début.
  - type: text
    content: Après cela, on t'appellera
  - type: text
    content: « Ville de la justice »,
  - type: text
    content: « Cité fidèle ».
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'équité / justice 5.7,16 ; 9.6 ; 28.17 ; 32.16 ; 33.5 ; 58.2 ; 59.9. –  ceux qui y reviendront  : certains comprennent les gens de Sion (c.-à-d. Jérusalem) qui reviendront ( au Seigneur , c.-à-d. qui se convertiront ). LXX ses captifs (ceux de Jérusalem) ; certains modifient le texte hébreu traditionnel pour lire ses habitants , cf. v. 26 ; 6.7 ; 10.20-22.'
  - type: text
    content: Sion sera libérée par l'équité,
  - type: text
    content: ceux qui y reviendront, par la justice.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'les révoltés comme les pécheurs  : litt. révoltés et pécheurs ensemble  ; tournure particulièrement fréquente chez Esaïe, cf. v. 31 ; 9.20 ; 10.8 ( autant de ) ; 11.6s,14 ; 18.6 ; 22.3 ; 27.4 ; 31.3 ; 40.5 ; 41.1,19s,23 ; 42.14 ; 43.17,26 ; 44.11 ; 45.8,21 ; 52.8s ; 60.13.'
  - type: text
    content: Mais le désastre atteindra
  - type: text
    content: les révoltés comme les pécheurs,
  - type: text
    content: 'ceux qui abandonnent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' disparaîtront.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'on aura honte  : autre traduction ils auront honte . –  térébinthes  : arbres associés aux pratiques idolâtriques du culte cananéen de la fécondité : 57.5 ; Os 4.12s ; cf. Jr 2.20,23 ; Ez 6.13+. –  jardins (également consacrés à l''idolâtrie) : cf. 17.10 ; 65.3 ; 66.17.'
  - type: text
    content: Alors on aura honte des térébinthes,
  - type: text
    content: objets de vos désirs,
  - type: text
    content: et vous rougirez des jardins
  - type: text
    content: que vous vous êtes choisis ;
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'l''âne…  : litt. l''âne, la mangeoire (traduction traditionnelle la crèche ) de ses maîtres (hébreu ba`al ).'
  - type: text
    content: Le bœuf connaît son propriétaire,
  - type: text
    content: l'âne connaît la mangeoire où ses maîtres le nourrissent ;
  - type: text
    content: Israël, lui, ne connaît rien,
  - type: text
    content: mon peuple ne comprend rien.
  - type: heading
    content: Plus rien d'intact en Juda
  '30':
  - type: text
    content: ' '
  - type: note
    content: flétri 64.5 ; Ps 1.3+.
  - type: text
    content: car vous serez comme un térébinthe
  - type: text
    content: au feuillage flétri,
  - type: text
    content: comme un jardin qui n'a pas d'eau.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.24 ; 9.4,17s ; 10.16s ; 26.11 ; 29.6 ; 30.27,30,33 ; 33.11. –  personne pour éteindre Jr 4.4 ; 21.12 ; Am 5.6.
  - type: text
    content: Le puissant sera comme de l'étoupe,
  - type: text
    content: et son action comme une étincelle ;
  - type: text
    content: ils brûleront tous les deux ensemble,
  - type: text
    content: il n'y aura personne pour éteindre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur v. 24n  ; 5.8+ ; cf. 30.1,9. – Voir péché. –  engeance  : le mot hébreu est le plus souvent traduit par descendance ou descendants (cf. 6.13n  ; Gn 3.15n). –  pervertis Gn 6.12 ; autre traduction destructeurs. –  abandonné Dt 28.20 ; Jr 1.16. –  bafoué 5.24 ; 52.5 ; 60.14n. –  le Saint d''Israël  : pour ce nom de Dieu caractéristique du livre d''Esaïe, voir 5.19,24 ; 10.20 ; 12.6 ; 17.7 ; 29.19 ; 30.11,15 ; 31.1 ; 37.23 ; 41.14,20 ; 47.4 ; 49.7 ; 54.5 ; 60.9,14 ; 2R 19.22 ; Jr 50.29 ; 51.5 ; Os 11.9 ; Ps 71.22 ; 78.41 ; 89.19 ; cf. Lv 19.2 ; Es 6.3 ; 8.13 ; Ha 1.12. –  Ils ont déserté  : litt. ils se sont éloignés (même forme verbale en Ez 14.5) en arrière  ; cette proposition est omise par LXX.'
  - type: text
    content: Quel malheur pour cette nation pécheresse,
  - type: text
    content: pour ce peuple chargé de fautes,
  - type: text
    content: pour cette engeance mauvaise,
  - type: text
    content: pour ces fils pervertis !
  - type: text
    content: 'Ils ont abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: ils ont bafoué le Saint d'Israël.
  - type: text
    content: Ils ont déserté…
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Pr 13.1,24 ; 23.13s ; 29.15. –  Où (autre traduction pourquoi ) donc vous frapper encore  : litt. sur quoi serez-vous encore frappés  ; cf. Jr 5.3. –  subversion ou apostasie  ; cf. 31.6 ; 59.13 ; Dt 13.6n. –  Toute la tête / tout le cœur  : autre traduction toute tête / tout cœur.'
  - type: text
    content: Où donc vous frapper encore,
  - type: text
    content: quand vous ajoutez à la subversion ?
  - type: text
    content: Toute la tête est malade,
  - type: text
    content: tout le cœur est souffrant.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Os 5.13. –  rien n''est en bon état Ps 38.4,8. –  pansées… huile  : cf. Jr 8.22 ; Lc 10.34.'
  - type: text
    content: Depuis les pieds jusqu'à la tête,
  - type: text
    content: rien n'est en bon état ;
  - type: text
    content: blessures, meurtrissures, plaies vives
  - type: text
    content: n'ont été ni pansées, ni bandées,
  - type: text
    content: ni adoucies par l'huile.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '5.9 ; 6.11 ; 17.9 ; allusion probable à l''invasion assyrienne (cf. 36–37). –  comme une destruction d''étrangers  : expression obscure ; certains comprennent une destruction causée par des étrangers , d''autres une destruction qui atteint des étrangers  ; d''autres encore modifient le texte hébreu traditionnel pour lire comme la destruction de Sodome. Sur le terme traduit par destruction , voir Gn 19.21+,29.'
  - type: text
    content: Votre pays est dévasté,
  - type: text
    content: vos villes sont incendiées,
  - type: text
    content: des étrangers dévorent votre terre devant vous.
  - type: text
    content: C'est une dévastation comme une destruction d'étrangers.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.17. –  Sion la belle  : litt. la fille de Sion , c.-à-d. Jérusalem elle-même, personnifiée poétiquement comme une jeune fille ; de même 16.1 ; 37.22 ; 52.2 ; 62.11 ; cf. 10.30n,32n  ; 23.10,12 ; 47.1,5 ; Jr 4.11n,31n  ; Mi 1.13n  ; So 3.14n  ; Za 2.11n  ; Ps 9.15n  ; 45.13n  ; 137.8n  ; Lm 1.6n. –  une hutte  : cf. Am 9.11n. –  dans une vigne  : cf. 5.2n. –  cabane 24.20. –  préservée  : des versions anciennes ont lu assiégée , ce qui correspond à une autre vocalisation du texte hébreu.'
  - type: text
    content: Et Sion la belle est restée
  - type: text
    content: comme une hutte dans une vigne,
  - type: text
    content: comme une cabane dans un champ de concombres,
  - type: text
    content: comme une ville préservée !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Si le Seigneur …  : autre traduction sans le Seigneur … qui nous a laissé…  ; formule très proche en Ps 94.17 ; 124.1ns. –  le Seigneur (YHWH) des Armées (voir nom) v. 24 ; 3.1 ; 6.3,5 ; 10.16,23s ; 19.4 ; 31.4 ; 44.6+ ; ce titre, fréquent dans les Prophètes (voir l''introduction à l''Ancien Testament♦), faisait peut-être à l''origine référence aux armées d''Israël (Ex 12.41 ; 1S 1.3,11 ; 4.4 ; 2S 6.2,18 ; Ps 24.7ss ; cf. Ex 15.3 ; Nb 10.35 ; Jos 3–4 ; 1S 17.45). Il a pu prendre par la suite une signification astrale (les étoiles étant appelées l''armée du ciel , Dt 4.19 ; 17.13 ; Es 40.26 ; 45.12 ; Jr 8.2 ; mais cette désignation s''applique aussi à des êtres célestes conçus comme personnels 1R 22.19 ; Ps 148.2), voire évoquer, de façon plus générale encore, la multitude des créatures (Gn 2.1 ; Ps 103.20ss) ; LXX l''a ici transcrit en grec ( le Seigneur Sabaôth , cf. Jc 5.4n), ailleurs elle le traduit par le Seigneur des puissances (2S 6.2), par le Seigneur tout-puissant ou le Seigneur, le Tout-Puissant (cf. Ap 1.8n). –  des survivants ou des rescapés  ; sur l''idée du reste, qui correspond à la conscience qu''a la communauté d''avoir échappé ou survécu à des malheurs antérieurs, voir 4.2s ; 6.13 ; 10.20-22 ; 11.11,16 (16.14 ; 17.3 ; 21.17) ; 28.5 ; 37.4,31s ; Jr 23.3 ; 31.7 ; 50.20 ; Ez 5.3+ ; 6.8s ; 11.13 ; Am 3.12 ; 5.3,15 ; Mi 2.12 ; 4.6s ; 5.2,6 ; So 2.7,9 ; 3.12s ; Ag 1.12 ; Za 8.6-11 ; 13.8s ; 14.2 ; Né 1.2 ; Rm 9.29. –  nous serions vite devenus…  : autres traductions nous serions presque devenus  ; ou, en rattachant le terme à ce qui précède  : si le Seigneur ne nous avait laissé quelques survivants, nous serions devenus… –  Sodome / Gomorrhe v. 10+ ; 3.9 ; 13.19 ; voir Gn 18.20–19.28 ; Dt 29.22 ; Jr 23.14 ; 49.18 ; 50.40 ; Ez 16.46-50 ; Am 4.11 ; So 2.9 ; Lm 4.6 ; Mt 10.15/ / ; 2P 2.6.'
  - type: text
    content: 'Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: ne nous avait laissé des survivants,
  - type: text
    content: nous serions vite devenus comme Sodome,
  - type: text
    content: nous ressemblerions à Gomorrhe.
  - type: heading
    content: Un culte qui fait horreur à Dieu
