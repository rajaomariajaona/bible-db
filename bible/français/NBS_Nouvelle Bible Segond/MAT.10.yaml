      text: si la maison est digne, que votre paix vienne sur elle ; mais si elle n'est pas digne, que votre paix retourne vers vous.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: secouez la poussière de vos pieds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', geste de rupture : on ne veut rien emporter de la personne ou de la collectivité avec qui la relation est rompue ; cf. Ac 13.51 ; voir aussi 18.6 ; 22.23.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''on ne vous accueillera pas et qu''on n''écoutera pas vos paroles, sortez de la maison ou de la ville et secouez la poussière de vos pieds. '
