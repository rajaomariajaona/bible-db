      text: 'Voici les noms des douze apôtres : le premier, Simon, celui qu''on appelle Pierre, et André, son frère ; Jacques, fils de Zébédée, et Jean, son frère ; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'c''est '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' de votre Père… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jn 14.26 ; Ac 4.8 ; 1Co 2.4 ; 2Tm 4.17. –  '
      - type: usfm
