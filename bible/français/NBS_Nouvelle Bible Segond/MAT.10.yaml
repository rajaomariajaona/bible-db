      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Didachè '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.1s : « Tout vrai prophète, qui veut s''établir chez vous, mérite sa nourriture. De la même manière, le vrai docteur (ou : maître) mérite, lui aussi, comme l''ouvrier sa nourriture. »'
      marker-yv: yv-n
    - type: text
      text: ni sac pour la route, ni deux tuniques, ni sandales, ni bâton, car l'ouvrier mérite sa nourriture.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: digne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : dans ce contexte, cette qualification suppose avant tout une disposition à recevoir les envoyés de Jésus ; cf. v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',13.'
      marker-yv: yv-n
    - type: text
      text: Dans toute ville ou tout village où vous entrerez, informez-vous pour savoir s'il s'y trouve quelqu'un qui est digne, et demeurez chez lui jusqu'à ce que vous partiez.
