        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La salutation courante parmi les Juifs était
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'La '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' soit avec vous ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: On saluait une famille en disant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Paix à cette maison !
      marker-yv: yv-n
    - type: text
      text: 'En entrant dans la maison, saluez-la ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ac 16.15 ; 2Jn 10 ; 3Jn 9s.'
      marker-yv: yv-n
