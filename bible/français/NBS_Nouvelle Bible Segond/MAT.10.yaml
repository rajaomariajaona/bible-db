document_id: MAT.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les douze apôtres
  - type: heading
    content: Mc 3.16-19  ; Lc 6.14-16  ; Ac 1.13
  - type: text
    content: ' '
  - type: note
    content: 'douze  : cf. Jn 6.67ss ; 20.24 ; 1Co 15.5. –  l''autorité pour ou le pouvoir de 8.9n. Cf. Ac 3.6-8. –  impurs  : le terme correspondant apparaît 30 fois dans le N.T., où il est associé 25 fois au mot traduit par esprit(s) . Voir pur, impur.'
  - type: text
    content: Puis il appela ses douze disciples et leur donna l'autorité pour chasser les esprits impurs et guérir toute maladie et toute infirmité.
  '10':
  - type: note
    content: 'mérite  : litt. est digne de, comme au v. 11 ; cf. Nb 18.31 ; 1Co 9.4,14 ; 2Th 3.8s ; 1Tm 5.18. Didachè 13.1s : « Tout vrai prophète, qui veut s''établir chez vous, mérite sa nourriture. De la même manière, le vrai docteur (ou : maître) mérite, lui aussi, comme l''ouvrier sa nourriture. »'
  - type: text
    content: ni sac pour la route, ni deux tuniques, ni sandales, ni bâton, car l'ouvrier mérite sa nourriture.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'digne  : dans ce contexte, cette qualification suppose avant tout une disposition à recevoir les envoyés de Jésus ; cf. v. 10n,13.'
  - type: text
    content: Dans toute ville ou tout village où vous entrerez, informez-vous pour savoir s'il s'y trouve quelqu'un qui est digne, et demeurez chez lui jusqu'à ce que vous partiez.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'La salutation courante parmi les Juifs était  : La paix soit avec vous ! On saluait une famille en disant  : Paix à cette maison !'
  - type: text
    content: 'En entrant dans la maison, saluez-la ; '
  '13':
  - type: note
    content: V. 11n  ; Ac 16.15 ; 2Jn 10 ; 3Jn 9s.
  - type: text
    content: si la maison est digne, que votre paix vienne sur elle ; mais si elle n'est pas digne, que votre paix retourne vers vous.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'secouez la poussière de vos pieds , geste de rupture : on ne veut rien emporter de la personne ou de la collectivité avec qui la relation est rompue ; cf. Ac 13.51 ; voir aussi 18.6 ; 22.23.'
  - type: text
    content: 'Lorsqu''on ne vous accueillera pas et qu''on n''écoutera pas vos paroles, sortez de la maison ou de la ville et secouez la poussière de vos pieds. '
  '15':
  - type: note
    content: Amen 5.18n. –  jour du jugement 11.22 ; 12.36 ; Es 34.8 ; Ac 17.31 ; 2P 2.9 ; 3.7 ; 1Jn 4.17. –  Sodome / Gomorrhe 11.23s ; Gn 19.24s ; Ez 16.46-61 ; Lm 4.6 ; Rm 9.29 ; 2P 2.6 ; Jd 7.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis : au jour du jugement, ce sera moins dur pour le pays de Sodome et de Gomorrhe que pour cette ville-là.'
  - type: heading
    content: Les persécutions à venir
  - type: heading
    content: Mc 13.9-13  ; Lc 12.11-12  ; 21.12-19
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'envoie 9.38n. –  moutons v. 7. –  loups 7.15+. Cf. Siracide 13.17 : « Quoi de commun entre le loup et l''agneau ? Tel est le pécheur en face de l''homme pieux. » –  avisés ou prudents , cf. 7.24n  ; le même terme décrit le serpent en Gn 3.1 (LXX). –  purs  : litt. sans mélange , même terme Rm 16.19 ; Ph 2.15 ; cf. 1Co 14.20. Voir aussi Lc 11.52n.'
  - type: text
    content: Moi, je vous envoie comme des moutons au milieu des loups. Soyez donc avisés comme les serpents et purs comme les colombes.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 24.9-14. –  des gens  : autre traduction des humains  ; cf. 5.13+. –  aux tribunaux  : voir Mc 13.9n (même terme) ; cf. Mt 23.34 ; Ac 5.40 ; 6.12 ; 22.19 ; 2Co 11.23s.'
  - type: text
    content: 'Gardez-vous des gens, car ils vous livreront aux tribunaux et ils vous fouetteront dans leurs synagogues ; '
  '18':
  - type: note
    content: 'Ac 25.23 ; 27.24. –  témoignage Dt 31.26 ; Jn 15.27. –  les non-Juifs ou les nations  : cf. 24.14.'
  - type: text
    content: 'vous serez menés, à cause de moi, devant des gouverneurs et devant des rois ; ce sera un témoignage pour eux comme pour les non-Juifs. '
  '19':
  - type: note
    content: 'Lc 12.11s. –  parlerez et direz traduisent un seul verbe grec (également au v. 20). –  ce moment même  : litt. cette heure-là.'
  - type: text
    content: 'Mais quand on vous livrera, ne vous inquiétez ni de la manière dont vous parlerez ni de ce que vous direz ; ce que vous direz vous sera donné à ce moment même ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'apôtres  : le mot correspondant, employé 80 fois dans le N.T., n''apparaît qu''ici chez Matthieu. Voir 9.38n  ; Mc 3.14n  ; 1Co 15.7 ; Ga 1.17. –  Pierre / André / Jacques / Jean 4.18,21 ; Jn 1.40-49 ; Ac 1.13.'
  - type: text
    content: 'Voici les noms des douze apôtres : le premier, Simon, celui qu''on appelle Pierre, et André, son frère ; Jacques, fils de Zébédée, et Jean, son frère ; '
  '20':
  - type: note
    content: c'est l'Esprit de votre Père… Jn 14.26 ; Ac 4.8 ; 1Co 2.4 ; 2Tm 4.17. –  en vous ou par vous.
  - type: text
    content: car ce n'est pas vous qui parlerez, c'est l'Esprit de votre Père qui parlera en vous.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 10.35s ; Mi 7.6.
  - type: text
    content: 'Le frère livrera son frère à la mort, et le père son enfant ; les enfants se dresseront contre leurs parents et les feront mettre à mort. '
  '22':
  - type: note
    content: '5.11/ / ; Jn 15.18 ; 1Jn 3.13 – à cause de mon nom  : cf. 19.29 ; 24.9 ; Lc 21.12+. –  persévérera ou endurera, résistera, tiendra bon 24.13 ; Dn 12.12s ; 2Tm 2.12 ; Jc 5.11. Cf. 4 Esdras 6.25 : « Quiconque aura échappé à tous les maux que je viens de t''annoncer sera sauvé. Il verra mon salut et la fin de ce siècle (ou : de ce monde, cf. Mt 12.32n). »'
  - type: text
    content: Vous serez détestés de tous à cause de mon nom ; mais celui qui persévérera jusqu'à la fin sera sauvé.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '12.15 ; 23.34 ; Ac 8.1 ; 9.25 ; 14.5-7 ; 2Co 11.33. –  pas  : autres traductions jamais, en aucun cas (de même v. 42). –  achevé…  : litt. achevé les villes . –  que vienne le Fils de l''homme 16.28 ; 24.30 ; 26.64.'
  - type: text
    content: 'Quand on vous persécutera dans cette ville-ci, fuyez dans une autre. '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, en effet, vous n''aurez pas achevé de parcourir les villes d''Israël avant que vienne le Fils de l''homme.'
  - type: heading
    content: Ceux qui se déclareront pour Jésus
  - type: heading
    content: Lc 9.26  ; 12.2-9
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'au-dessus  : cf. Lc 6.40 ; Jn 13.16 ; 15.20. –  maître  : au sens d’ enseignant  ; le mot traduit par seigneur pourrait aussi être rendu par maître (au sens de patron, propriétaire ).'
  - type: text
    content: 'Le disciple n''est pas au-dessus du maître, ni l''esclave au-dessus de son seigneur. '
  '25':
  - type: note
    content: '9.34+ ; Hé 12.3. –  Béelzéboul Mc 3.22n  ; voir démon. –  agiront-ils ainsi envers  : autre traduction appelleront-ils ainsi.'
  - type: text
    content: Il suffit au disciple de devenir comme son maître, et à l'esclave de devenir comme son seigneur. S'ils ont appelé le maître de maison Béelzéboul, à combien plus forte raison agiront-ils ainsi envers les gens de sa maison !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Ne les craignez donc pas ou n''ayez donc pas peur d''eux , même possibilité dans la suite. –  rien de voilé…  : cf. Mc 4.22/ / ; 1Tm 5.25.'
  - type: text
    content: 'Ne les craignez donc pas, car il n''y a rien de voilé qui ne doive être révélé, rien de caché qui ne doive être connu. '
  '27':
  - type: note
    content: 'en plein jour  : litt. dans la lumière  ; cf. 5.14n. –  ce qui vous est chuchoté  : litt. ce que vous entendez. – Cf. Ac 4.10.'
  - type: text
    content: 'Ce que je vous dis dans les ténèbres, dites-le en plein jour ; ce qui vous est chuchoté à l''oreille, proclamez-le sur les toits en terrasse. '
  '28':
  - type: note
    content: 'Es 8.12s ; Jr 1.8,17 ; Pr 14.26s ; 1P 3.14 ; Ap 2.10 ; 4 Maccabées 13.14s : « Ne craignons pas celui qui pense tuer ; car grande est l''épreuve de l''âme, grand le danger de tourment éternel en réserve pour ceux qui transgressent le commandement de Dieu. » –  l''âme  : le même terme grec est traduit par vie v. 39 ; 2.20 ; 6.25 ; 16.25s ; 20.28 ; cf. 11.29n  ; 12.18n  ; 22.37 ; 26.38n  ; voir aussi 1Co 15.45n  ; Hé 4.12n  ; 1P 1.9n. Sur le terme hébreu correspondant dans l''A.T., voir Gn 1.20n. –  faire disparaître ou faire périr, perdre Hé 10.31 ; Jc 4.12 ; Ap 14.7,10. –  géhenne 5.22n. – Cf. Le Pasteur d''Hermas, Mand. XII,6,2s : « La menace du diable, ne la craignez pas du tout : il est sans force, comme les nerfs d''un mort. Ecoutez-moi donc et craignez celui qui peut tout sauver et perdre, et observez les commandements et vous vivrez pour Dieu. »'
  - type: text
    content: 'Ne craignez pas ceux qui tuent le corps et qui ne peuvent tuer l''âme ; craignez plutôt celui qui peut faire disparaître et l''âme et le corps dans la géhenne. '
  '29':
  - type: note
    content: 'as  : petite pièce de bronze valant 1/16 de denier, cf. 5.26n  ; voir mesures, poids et monnaies. –  indépendamment de  : litt. sans, en dehors de.'
  - type: text
    content: 'Ne vend-on pas deux moineaux pour un as ? Cependant il n''en tombe pas un seul à terre indépendamment de votre Père. '
  '3':
  - type: note
    content: 'Thomas Jn 11.16. –  Matthieu 9.9ss. –  Jacques, fils (ou frère  ?) d''Alphée  : litt. Jacques d''Alphée  ; cf. Mc 3.18n.'
  - type: text
    content: 'Philippe et Barthélemy ; Thomas et Matthieu, le collecteur des taxes ; Jacques, fils d''Alphée, et Thaddée ; '
  '30':
  - type: note
    content: 1S 14.45 ; 2S 14.11 ; Lc 21.18 ; Ac 27.34.
  - type: text
    content: 'Quant à vous, même les cheveux de votre tête sont tous comptés. '
  '31':
  - type: note
    content: '6.26 ; 12.12 ; Jb 35.11. –  N''ayez donc pas peur ou ne craignez donc pas  : cf. v. 26ss.'
  - type: text
    content: 'N''ayez donc pas peur : vous valez plus que beaucoup de moineaux.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'se reconnaîtra en moi ou se déclarera pour moi  : litt. confessera (verbe apparenté en 3.6 ; le même verbe est traduit par déclarer en 7.23) en moi  : sémitisme, de même pour la formule réciproque (litt. je confesserai en lui ) ; voir aussi 11.25n  ; 14.7n  ; 1S 2.30 ; Rm 10.9 ; 1Jn 4.2s ; Ap 3.5. –  les gens  : autres traductions les hommes ; les humains  ; cf. 5.13+.'
  - type: text
    content: 'Quiconque donc se reconnaîtra en moi devant les gens, je me reconnaîtrai moi aussi en lui devant mon Père qui est dans les cieux ; '
  '33':
  - type: note
    content: '7.23+ ; Lc 9.26 ; 2Tm 2.12 ; 1Jn 2.22s ; Jd 4. –  renie  : le même verbe est traduit par nier en 26.70,72 ; verbe apparenté en 16.24n.'
  - type: text
    content: mais si quelqu'un me renie devant les gens, je le renierai moi aussi devant mon Père qui est dans les cieux.
  - type: heading
    content: Non la paix, mais l'épée
  - type: heading
    content: Lc 12.51-53
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Ne pensez pas 5.17. –  paix  : cf. 5.9 ; 10.12s ; voir aussi Lc 2.14+.'
  - type: text
    content: 'Ne pensez pas que je sois venu apporter la paix sur la terre : je ne suis pas venu apporter la paix, mais l''épée. '
  '35':
  - type: note
    content: V. 21 ; Mi 7.6  ; Ps 41.10.
  - type: text
    content: 'Car je suis venu mettre la division '
  - type: text
    content: entre l'homme et son père, entre la fille et sa mère, entre la belle-fille et sa belle-mère,
  - type: text
    content: ' '
  '36':
  - type: text
    content: 'et '
  - type: text
    content: l'homme aura pour ennemis les gens de sa maison
  - type: text
    content: .
  - type: heading
    content: L'attachement à Jésus
  - type: heading
    content: Mc 8.34-35  ; Lc 9.23-24  ; 14.26-27
  '37':
  - type: text
    content: ' '
  - type: note
    content: 19.29 ; Dt 33.9.
  - type: text
    content: 'Celui qui me préfère père ou mère n''est pas digne de moi, celui qui me préfère fils ou fille plus que moi n''est pas digne de moi ; '
  '38':
  - type: note
    content: '16.24/ /. –  me suivre  : litt. suivre derrière moi, cf. 4.19n.'
  - type: text
    content: 'celui qui ne prend pas sa croix pour me suivre n''est pas digne de moi. '
  '39':
  - type: note
    content: 'trouvé  : autres traductions assuré, préservé  ; cf. 16.25/ / ; Mc 8.35 ; Lc 9.24 ; 17.33 ; Jn 12.25 ; Ph 3.8s.'
  - type: text
    content: Celui qui aura trouvé sa vie la perdra, et celui qui aura perdu sa vie à cause de moi la trouvera.
  - type: heading
    content: Qui vous accueille m'accueille
  - type: heading
    content: Mc 9.37,41  ; Lc 9.48  ; 10.16  ; Jn 13.20
  '4':
  - type: note
    content: 'Cananite est l''équivalent araméen du mot grec habituellement transcrit zélote (Lc 6.15 ; Ac 1.13). Au temps de la rédaction des évangiles, celui-ci signifiait l''appartenance à un mouvement politico-religieux radical qui s''est engagé dans la lutte armée contre Rome pendant la guerre de 66-73 et qui a notamment organisé la défense de Jérusalem jusqu''à sa chute en 70. Ce mouvement combattait également les Juifs qu''il jugeait infidèles d''un point de vue religieux ou patriotique. Peut-être Simon était-il un partisan nationaliste lorsqu''il a rencontré Jésus. Certains pensent cependant que le terme est ici à prendre au sens plus général de passionné, zélé, enthousiaste. –  Judas… 26.14-16. –  Iscariote ou Iscarioth (le nom est écrit différemment en Mc 3.19 p. ex.) ; le sens de ce surnom est incertain : on y a vu une indication géographique  : homme de Karioth ou Kérioth, nom d''une bourgade au sud d''Hébron ; ou bien morale  : homme de mensonge, allusion à la trahison ; ou encore politique  : le sicaire, nom d''origine latine (= l''homme au poignard) donné à certains activistes comme les zélotes (cf. Ac 5.37) ; voir aussi Jn 6.71 ; 13.2n,26 où ce nom est donné à Simon, le père de Judas. –  qui le livra, c.-à-d. qui livra Jésus. – Cf. Evangile des ébionites (Epiphane, Panarion, 30,13,2-3) : « Il y eut un homme du nom de Jésus – il avait environ trente ans – qui nous choisit. Il vint à Capharnaüm, entra dans la maison de Simon surnommé Pierre, ouvrit la bouche et dit : “En passant le long du lac de Tibériade, j''ai choisi Jean et Jacques, fils de Zébédée, Simon, André… Thaddée, Simon le Zélote, Judas Iscariote ; et toi Matthieu, je t''ai appelé alors que tu étais assis au bureau des taxes et tu m''as suivi. Je veux ainsi que vous soyez douze apôtres pour témoigner auprès d''Israël.” »'
  - type: text
    content: Simon le Cananite et Judas l'Iscariote, celui qui le livra.
  - type: heading
    content: Jésus envoie les Douze en mission
  - type: heading
    content: Mc 6.7-11  ; Lc 9.2-5  ; 10.3-12
  '40':
  - type: text
    content: ' '
  - type: note
    content: 18.5 ; Lc 10.16 ; Jn 13.20 ; Ga 4.14.
  - type: text
    content: 'Qui vous accueille m''accueille, et qui m''accueille accueille celui qui m''a envoyé. '
  '41':
  - type: note
    content: 'en sa qualité de…  : litt. pour le nom d’(un)…, tournure sémitique qui signifie parce que c''est un prophète / un juste / un disciple  ; cf. Gn 12.3 ; 1R 17.9-24 ; 18.4 ; 2R 4.8-37 ; 3Jn 8.'
  - type: text
    content: 'Qui accueille un prophète en sa qualité de prophète obtiendra une récompense de prophète, et qui accueille un juste en sa qualité de juste obtiendra une récompense de juste. '
  '42':
  - type: note
    content: 'coupe  : cf. 20.22+. –  à l''un de ces petits  : cf. 25.35,40 ; Mc 9.41. –  jamais  : autre traduction en aucun cas.'
  - type: text
    content: 'Quiconque donnera à boire ne serait-ce qu''une coupe d''eau fraîche à l''un de ces petits en sa qualité de disciple, '
  - type: text
    content: amen,
  - type: text
    content: ' je vous le dis, il ne perdra jamais sa récompense.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: envoya 9.38n. –  des non-Juifs ou des (autres) nations, des païens , comme en 4.12 ; 6.32 ; cf. 28.19n  ; Ac 13.46. –  Samaritains Lc 9.52s ; Jn 4.9n,40 ; Ac 8.1,5ss.
  - type: text
    content: 'Tels sont les douze que Jésus envoya, après leur avoir donné les injonctions suivantes :'
  - type: text
    content: 'Ne partez pas sur le chemin des non-Juifs, et n''entrez pas dans une ville de Samaritains ; '
  '6':
  - type: note
    content: moutons perdus 9.36+. –  Israël 15.24 ; Ac 3.26 ; Rm 15.8 ; cf. Jn 12.20,32.
  - type: text
    content: allez plutôt vers les moutons perdus de la maison d'Israël.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 3.2n.
  - type: text
    content: 'En chemin, proclamez que le règne des cieux s''est approché. '
  '8':
  - type: note
    content: 'Mc 16.17 ; Ac 9.34,40. –  réveillez  : autre traduction relevez, cf. 2.13n  ; voir résurrection. –  purifiez les lépreux 8.2+s ; 11.5. –  chassez les démons 7.22+ ; 12.24ss. –  gratuitement 2R 5.16 ; Ac 8.20 ; 20.33 ; 2Co 11.7. Didachè 11.3ss : « Pour les apôtres et les prophètes, selon le précepte de l''évangile, agissez de cette manière : Que tout apôtre qui vient chez vous soit reçu comme le Seigneur. Mais il ne restera qu''un seul jour et, si besoin est, le jour suivant ; s''il reste trois jours, c''est un faux prophète. A son départ, que l''apôtre ne reçoive rien en dehors du pain pour l''étape ; s''il demande de l''argent, c''est un faux prophète. »'
  - type: text
    content: Guérissez les malades, réveillez les morts, purifiez les lépreux, chassez les démons. Vous avez reçu gratuitement, donnez gratuitement.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'N''acquérez  : c''est le sens habituel du verbe grec (cf. v. 8) ; d''autres comprennent ne vous procurez . –  monnaie de bronze ou chalque(s)  ; voir Mc 6.8n  ; mesures, poids et monnaies. – Cf. Lc 22.35-38.'
  - type: text
    content: 'N''acquérez ni or, ni argent, ni monnaie de bronze pour l''emporter à la ceinture, '
