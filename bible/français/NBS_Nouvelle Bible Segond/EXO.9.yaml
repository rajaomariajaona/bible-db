document_id: EXO.9,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Cinquième fléau : la peste du bétail'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Va trouver le pharaon ; tu lui diras : « Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu des Hébreux : Laisse partir mon peuple, pour qu''il me serve. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Ils prirent de la suie de fourneau et se présentèrent devant le pharaon ; Moïse la jeta vers le ciel, et elle produisit sur les humains et sur les bêtes des ulcères avec une éruption de pustules. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute l'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les Egyptiens.
      marker-yv: yv-n
    - type: text
      text: 'Les mages ne pouvaient plus se présenter devant Moïse, à cause des ulcères ; car les ulcères étaient sur les mages comme sur toute l''Egypte. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.13+. Voir aussi 7.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit en sorte que le pharaon s''entête ; il ne les écouta pas, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait dit à Moïse.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Septième fléau : la grêle'
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Lève-toi de bon matin et va te poster devant le pharaon. Tu lui diras : « Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu des Hébreux : Laisse partir mon peuple, pour qu''il me serve. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contre toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vers ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car cette fois, je vais envoyer tous mes fléaux contre toi, contre les gens de ta cour et contre ton peuple, afin que tu saches que nul n''est semblable à moi sur toute la terre. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Si maintenant j''avais étendu la main et si je t''avais frappé par la peste, toi et ton peuple, tu aurais disparu de la terre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rm 9.17. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'ai laissé subsister
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t'ai suscité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t'ai fait tenir debout
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 21.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que l'on fasse connaître…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que l''on raconte mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais si je t''ai laissé subsister, c''est afin de te faire voir ma force et pour que l''on fasse connaître mon nom par toute la terre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Si tu fais encore obstacle à mon peuple, et si tu ne le laisses pas partir, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je ferai tomber… une averse de grêle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je ferai pleuvoir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 16.4) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: … de la grêle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même au v. 23. Sur la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: grêle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ps 78.47s ; 105.32 ; voir aussi Es 28.2,17 ; 30.30 ; Ez 38.22 ; Ap 8.7 ; 16.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: terrible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lourde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 24 ; cf. 10.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'depuis… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 24 ; cf. Dn 12.1 ; Mt 24.21/ /.
      marker-yv: yv-n
    - type: text
      text: 'je ferai tomber demain, à cette heure-ci, une averse de grêle si terrible qu''il n''y en a pas eu de semblable en Egypte depuis le jour de sa fondation jusqu''à maintenant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Maintenant, fais mettre en sûreté tes troupeaux et tout ce qui t'appartient dans la campagne. La grêle tombera sur tous les humains et sur toutes les bêtes qui se trouveront dans la campagne et qui n'auront pas été rassemblés à la maison, et ils mourront. »
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: 'Si tu refuses de le laisser partir, si tu le retiens encore, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Des Egyptiens tirent bénéfice de leur obéissance au Dieu d''Israël ; cf. Es 19.24s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gens de la cour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'serviteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent un même mot hébreu, cf. v. 21 ; dans le second cas il pourrait aussi être rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: esclaves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les gens de la cour du pharaon qui craignirent la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' mirent à l''abri dans les maisons leurs serviteurs et leurs troupeaux. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne firent pas attention à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne mirent pas sur leur cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Es 57.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; expression comparable en 7.23.'
      marker-yv: yv-n
    - type: text
      text: 'Mais ceux qui ne firent pas attention à la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' laissèrent leurs serviteurs et leurs troupeaux dans la campagne.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Tends ta main vers le ciel, et qu''il tombe de la grêle dans toute l''Egypte sur les humains, sur les bêtes et sur toute l''herbe des champs en Egypte. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: brandit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe hébreu est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'étendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 22 ; cf. 8.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 10.12s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des coups de tonnerre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des tonnerres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sens particulier du mot habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bruit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même aux v. 28s,33s ; 19.16,19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.18 ; cf. 9.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 12.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 29.3s ; voir aussi Jb 1.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 37.2-5.'
      marker-yv: yv-n
    - type: text
      text: 'Moïse brandit son bâton vers le ciel : le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit retentir des coups de tonnerre et tomber la grêle, et du feu descendit sur la terre. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fit tomber une averse de grêle sur l''Egypte. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 16.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le feu se mêlait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y eut de la grêle, et le feu se mêlait à la grêle ; elle était si terrible qu''il n''y en avait pas eu de semblable dans toute l''Egypte depuis que c''est une nation. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'campagne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'champs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent le même terme hébreu.
      marker-yv: yv-n
    - type: text
      text: 'La grêle frappa, dans toute l''Egypte, tout ce qui était dans la campagne, depuis les humains jusqu''aux bêtes ; la grêle frappa aussi toute l''herbe des champs et brisa tous les arbres des champs. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: C'est seulement au pays de Goshen, où étaient les Israélites, qu'il n'y eut pas de grêle.
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 10.16 ; Nb 22.34 ; 1S 15.24 ; 26.21 ; 2S 12.13 ; 24.10 ; Ps 51.6 ; Lc 15.18,21. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui avons tort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (qui sommes) les méchants.
      marker-yv: yv-n
    - type: text
      text: 'Le pharaon fit appeler Moïse et Aaron et leur dit : Cette fois, j''ai péché. C''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) qui est juste, c''est moi et mon peuple qui avons tort. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Intercédez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: coups de tonnerre divin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'voix '
      - type: usfm
