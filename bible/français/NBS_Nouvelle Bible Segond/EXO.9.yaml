document_id: EXO.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Cinquième fléau : la peste du bétail'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Va trouver le pharaon ; tu lui diras : « Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Hébreux : Laisse partir mon peuple, pour qu''il me serve. '
  '10':
  - type: text
    content: 'Ils prirent de la suie de fourneau et se présentèrent devant le pharaon ; Moïse la jeta vers le ciel, et elle produisit sur les humains et sur les bêtes des ulcères avec une éruption de pustules. '
  '11':
  - type: note
    content: 'toute l''Egypte  : autre traduction tous les Egyptiens.'
  - type: text
    content: 'Les mages ne pouvaient plus se présenter devant Moïse, à cause des ulcères ; car les ulcères étaient sur les mages comme sur toute l''Egypte. '
  '12':
  - type: note
    content: 7.13+. Voir aussi 7.3n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit en sorte que le pharaon s''entête ; il ne les écouta pas, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait dit à Moïse.'
  - type: heading
    content: 'Septième fléau : la grêle'
  '13':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Lève-toi de bon matin et va te poster devant le pharaon. Tu lui diras : « Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu des Hébreux : Laisse partir mon peuple, pour qu''il me serve. '
  '14':
  - type: note
    content: 'contre toi  : litt. vers ton cœur.'
  - type: text
    content: 'Car cette fois, je vais envoyer tous mes fléaux contre toi, contre les gens de ta cour et contre ton peuple, afin que tu saches que nul n''est semblable à moi sur toute la terre. '
  '15':
  - type: text
    content: 'Si maintenant j''avais étendu la main et si je t''avais frappé par la peste, toi et ton peuple, tu aurais disparu de la terre. '
  '16':
  - type: note
    content: 'Rm 9.17. –  je t''ai laissé subsister  : autre traduction je t''ai suscité  ; litt. je t''ai fait tenir debout  ; cf. 21.21. –  que l''on fasse connaître…  : litt. que l''on raconte mon nom.'
  - type: text
    content: 'Mais si je t''ai laissé subsister, c''est afin de te faire voir ma force et pour que l''on fasse connaître mon nom par toute la terre. '
  '17':
  - type: text
    content: 'Si tu fais encore obstacle à mon peuple, et si tu ne le laisses pas partir, '
  '18':
  - type: note
    content: 'je ferai tomber… une averse de grêle  : litt. je ferai pleuvoir (cf. 16.4) … de la grêle  ; de même au v. 23. Sur la grêle, cf. Ps 78.47s ; 105.32 ; voir aussi Es 28.2,17 ; 30.30 ; Ez 38.22 ; Ap 8.7 ; 16.21. –  terrible  : litt. lourde, de même au v. 24 ; cf. 10.14n. –  depuis… v. 24 ; cf. Dn 12.1 ; Mt 24.21/ /.'
  - type: text
    content: 'je ferai tomber demain, à cette heure-ci, une averse de grêle si terrible qu''il n''y en a pas eu de semblable en Egypte depuis le jour de sa fondation jusqu''à maintenant. '
  '19':
  - type: text
    content: Maintenant, fais mettre en sûreté tes troupeaux et tout ce qui t'appartient dans la campagne. La grêle tombera sur tous les humains et sur toutes les bêtes qui se trouveront dans la campagne et qui n'auront pas été rassemblés à la maison, et ils mourront. »
  '2':
  - type: text
    content: 'Si tu refuses de le laisser partir, si tu le retiens encore, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Des Egyptiens tirent bénéfice de leur obéissance au Dieu d'Israël ; cf. Es 19.24s. –  gens de la cour et serviteurs traduisent un même mot hébreu, cf. v. 21 ; dans le second cas il pourrait aussi être rendu par esclaves . – Voir crainte.
  - type: text
    content: 'Les gens de la cour du pharaon qui craignirent la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' mirent à l''abri dans les maisons leurs serviteurs et leurs troupeaux. '
  '21':
  - type: note
    content: 'ne firent pas attention à  : litt. ne mirent pas sur leur cœur  ; cf. Es 57.11n  ; expression comparable en 7.23.'
  - type: text
    content: 'Mais ceux qui ne firent pas attention à la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' laissèrent leurs serviteurs et leurs troupeaux dans la campagne.'
  '22':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Tends ta main vers le ciel, et qu''il tombe de la grêle dans toute l''Egypte sur les humains, sur les bêtes et sur toute l''herbe des champs en Egypte. '
  '23':
  - type: note
    content: 'brandit  : le même verbe hébreu est traduit par étendre au v. 22 ; cf. 8.1n  ; 10.12s. –  des coups de tonnerre  : litt. des tonnerres, sens particulier du mot habituellement traduit par voix ou bruit  ; de même aux v. 28s,33s ; 19.16,19n  ; 20.18 ; cf. 9.28n  ; 1S 12.17n  ; Ps 29.3s ; voir aussi Jb 1.16n  ; 37.2-5.'
  - type: text
    content: 'Moïse brandit son bâton vers le ciel : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit retentir des coups de tonnerre et tomber la grêle, et du feu descendit sur la terre. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit tomber une averse de grêle sur l''Egypte. '
  '24':
  - type: note
    content: 'V. 18n  ; cf. 16.4n. –  le feu se mêlait  : cf. Ez 1.4n.'
  - type: text
    content: 'Il y eut de la grêle, et le feu se mêlait à la grêle ; elle était si terrible qu''il n''y en avait pas eu de semblable dans toute l''Egypte depuis que c''est une nation. '
  '25':
  - type: note
    content: campagne et champs traduisent le même terme hébreu.
  - type: text
    content: 'La grêle frappa, dans toute l''Egypte, tout ce qui était dans la campagne, depuis les humains jusqu''aux bêtes ; la grêle frappa aussi toute l''herbe des champs et brisa tous les arbres des champs. '
  '26':
  - type: text
    content: C'est seulement au pays de Goshen, où étaient les Israélites, qu'il n'y eut pas de grêle.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.16 ; Nb 22.34 ; 1S 15.24 ; 26.21 ; 2S 12.13 ; 24.10 ; Ps 51.6 ; Lc 15.18,21. – Voir péché . –  YHWH  : voir noms divins. – Voir justice . –  qui avons tort  : litt. (qui sommes) les méchants.'
  - type: text
    content: 'Le pharaon fit appeler Moïse et Aaron et leur dit : Cette fois, j''ai péché. C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est juste, c''est moi et mon peuple qui avons tort. '
  '28':
  - type: note
    content: 'Intercédez 8.4+. –  coups de tonnerre divin  : autre traduction voix (au pluriel) de Dieu (ou de dieux). Cf. v. 23n  ; voir Gn 1.1n,2n.'
  - type: text
    content: 'Intercédez auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), pour qu''il n''y ait plus de coups de tonnerre divin ni de grêle ; je vous laisserai partir, et on ne vous retiendra plus. '
  '29':
  - type: note
    content: 'je tendrai les mains  : geste de la prière. –  coups de tonnerre v. 23n. –  la terre appartient au Seigneur 19.5 ; Dt 10.14 ; Ps 24.1.'
  - type: text
    content: 'Moïse lui dit : Quand je sortirai de la ville, je tendrai les mains vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; les coups de tonnerre cesseront, et il n''y aura plus de grêle, afin que tu saches que la terre appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: 'Am 4.10 ; Ha 3.5,17 ; Ps 78.48. –  grave  : litt. lourde.'
  - type: text
    content: 'la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera sur tes troupeaux dans la campagne, sur les chevaux, sur les ânes, sur les chameaux, sur le gros bétail et sur le petit bétail ; il y aura une peste très grave. '
  '30':
  - type: text
    content: 'Mais je sais que, toi et les gens de ta cour, vous ne craindrez pas encore le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu. '
  '31':
  - type: note
    content: 'en épis  : cf. 13.4n.'
  - type: text
    content: '– Le lin et l''orge avaient été frappés, parce que l''orge était en épis et le lin en fleur ; '
  '32':
  - type: note
    content: Cf. 10.5.
  - type: text
    content: 'le froment et l''épeautre n''avaient pas été frappés, parce qu''ils sont tardifs. – '
  '33':
  - type: note
    content: coups de tonnerre v. 23n.
  - type: text
    content: 'Moïse sortit de chez le pharaon et de la ville, et il tendit les mains vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; les coups de tonnerre et la grêle cessèrent, et la pluie ne se déversa plus sur la terre.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: resta obtus 7.14n.
  - type: text
    content: 'Le pharaon, voyant que la pluie, la grêle et les coups de tonnerre avaient cessé, continua de pécher et il resta obtus, lui et les gens de sa cour. '
  '35':
  - type: note
    content: s'entêta 4.21n.
  - type: text
    content: 'Le pharaon s''entêta : il ne laissa pas partir les Israélites, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait dit par l''intermédiaire de Moïse.'
  '4':
  - type: note
    content: Cf. v. 26 ; 8.18n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' traitera différemment les troupeaux d''Israël et les troupeaux de l''Egypte : il ne mourra pas une seule bête qui appartienne aux Israélites. '
  '5':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fixé l''échéance en disant : Demain, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera cela dans le pays. »'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Tous les troupeaux  : cf. v. 19-21.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit ainsi le lendemain. Tous les troupeaux de l''Egypte moururent, et il ne mourut pas une seule bête des troupeaux des Israélites. '
  '7':
  - type: note
    content: 'fit prendre des informations  : litt. envoya. –  le pharaon resta obtus…  : cf. 7.14n.'
  - type: text
    content: 'Le pharaon fit prendre des informations : pas une seule bête des troupeaux d''Israël n''était morte. Mais le pharaon resta obtus : il ne laissa pas partir le peuple.'
  - type: heading
    content: 'Sixième fléau : les ulcères'
  '8':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : Prenez à pleines poignées de la suie de fourneau : que Moïse la jette vers le ciel, sous les yeux du pharaon. '
  '9':
  - type: note
    content: 'poussière  : le même terme, assez rare (Es 5.24 ; 29.5 ; Ez 26.10 ; Na 1.3 ; terme voisin en Ct 3.6) est traduit par poudre en Dt 28.24. – Le mot traduit par ulcères désigne une maladie de la peau ; cf. Lv 13.18 ; Dt 28.35 ; 2R 20.7 ; Jb 2.7 ; Lc 16.21 ; Ap 16.2,11. Celui qui est rendu par pustules ne figure nulle part ailleurs et sa traduction est très incertaine.'
  - type: text
    content: 'Elle se changera en poussière sur toute l''Egypte ; elle produira, dans toute l''Egypte, sur les humains et sur les bêtes, des ulcères avec éruption de pustules. '
