document_id: TIT.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'esclave  : autre traduction serviteur Rm 1.1n  ; cf. Ph 1.1 ; Jc 1.1 ; 2P 1.1 ; Jd 1. – Voir apôtre . –  selon la foi…  : cf. Rm 1.5. –  de ceux qui ont été choisis 2Tm 2.10. –  connaissance de la vérité 1Tm 2.4n. –  piété 1Tm 2.2n  ; 6.3 ; cf. Ep 4.15.'
  - type: text
    content: 'Paul, esclave de Dieu, apôtre de Jésus-Christ selon la foi de ceux qui ont été choisis par Dieu et selon la connaissance de la vérité qui est conforme à la piété, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'beaucoup  : cf. 1Tm 1.3. –  insoumis v. 6+. –  discoureurs futiles 1Tm 1.6. –  marchands d''illusion ou trompeurs , verbe correspondant pour s''illusionner Ga 6.3 ; cf. Rm 16.18+. –  les circoncis  : litt. ceux de la circoncision , sans doute des chrétiens d''origine juive Ac 10.45 ; 11.2 ; 15.1 ; Ga 2.12 ; Col 4.11n.'
  - type: text
    content: 'Il y a en effet beaucoup d''insoumis, de discoureurs futiles et de marchands d''illusion, surtout parmi les circoncis ; '
  '11':
  - type: note
    content: 'Ils bouleversent  : cf. 2Tm 2.18 (même verbe pour renverser). –  des maisons ou des familles  : cf. 1Tm 5.13 ; 2Tm 3.6. –  ce qu''il ne faut pas  : cf. 1Tm 5.13. –  gains honteux v. 7+ ; cf. 1Tm 6.5 ; 2P 2.3.'
  - type: text
    content: 'il faut leur fermer la bouche. Ils bouleversent des maisons entières, en enseignant ce qu''il ne faut pas, pour des gains honteux. '
  '12':
  - type: note
    content: 'leur propre prophète  : probablement le poète crétois Epiménide de Cnossos (VIIe-VIe s. av. J.-C.), qui passait pour prophète. –  gloutons paresseux  : litt. ventres oisifs, cf. Ph 3.19.'
  - type: text
    content: 'L''un d''eux, leur propre prophète, a dit :'
  - type: text
    content: Crétois toujours menteurs, méchantes bêtes, gloutons paresseux.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Aussi  : litt. pour cette cause 2Tm 1.6n. –  reprends-les v. 9n  ; 2Tm 4.2. –  sévèrement Rm 11.22 ; 2Co 13.10. –  afin…  : cf. 2Tm 2.24s. –  qu''ils soient sains dans la foi 2.2 ; cf. v. 9+ ; 1Tm 6.4s.'
  - type: text
    content: 'Ce témoignage est vrai. Aussi reprends-les sévèrement, afin qu''ils soient sains dans la foi, '
  '14':
  - type: note
    content: 'fables 1Tm 1.4n. –  commandements d''humains  : cf. Mc 7.3,5/ / ; Col 2.16,21s. –  qui se détournent de la vérité  : cf. v. 1 ; 1Tm 6.5 ; 2Tm 4.4.'
  - type: text
    content: 'au lieu de s''attacher à des fables juives et à des commandements d''humains qui se détournent de la vérité. '
  '15':
  - type: note
    content: 'Tout est pur…  : proverbe répandu dans le monde hellénistique ; cf. Mc 7.18ss/ / ; Lc 11.41 ; Ac 10.14s ; Rm 14.14,20 ; 1Co 6.11s ; 10.23,30s ; 1Tm 4.3. –  ceux qui sont purs  : cf. Mt 5.8 ; Jn 13.10 ; 15.3 ; 1Tm 2.8. –  souillés Hé 12.15 ; 2P 2.10 ; Jd 8. –  sans foi ou incroyants, infidèles 1Co 7.12 ; 2Co 4.4 ; 1Tm 5.8 (même terme pour non-croyant). –  intelligence  : cf. Rm 12.2 ; Hé 5.14. –  conscience 1Tm 1.19 ; 4.2 ; 6.5 ; 2Tm 3.8.'
  - type: text
    content: 'Tout est pur pour ceux qui sont purs, mais rien n''est pur pour ceux qui sont souillés et sans foi : leur intelligence comme leur conscience sont souillées. '
  '16':
  - type: note
    content: 'Ils déclarent ou ils confessent  ; le même terme est habituellement traduit par reconnaître (publiquement) : cf. 1Tm 6.12s. –  connaître Dieu  : cf. Ga 4.8 ; 1Th 4.5 ; 2Th 1.8 ; voir aussi 1Jn 2.4 ; 4.6. –  renient  : cf. 2.12n  ; 1Tm 5.8 ; 2Tm 2.12s ; 3.5 ; voir aussi Ps 14.1. –  abominables  : cf. Lc 16.15 ; Ap 21.8. –  rebelles ou désobéissants, réfractaires 3.1,3 ; Ep 2.2 ; 5.6 ; Hé 4.6,11. –  inaptes…  : litt. désapprouvés, réprouvés  ; cf. 2Tm 3.8n,17 ; voir aussi Rm 1.28 ; 1Co 9.27 ; 2Co 13.5ss.'
  - type: text
    content: Ils déclarent connaître Dieu, mais ils le renient par leurs œuvres. Ils sont abominables, rebelles et inaptes à toute œuvre bonne.
  '2':
  - type: note
    content: 'dans l''espérance… 3.7 ; cf. Ac 26.6 ; 28.20 ; Rm 4.18 ; 8.20 ; 1Co 9.10 ; 1Tm 4.10. –  vie éternelle 1Tm 1.16+. –  Dieu, qui ne ment pas Nb 23.19 ; 1S 15.29 ; Hé 6.18 ; cf. 2Tm 2.13. –  promise Rm 1.2 ; 4.21 ; 1Tm 4.8 ; 2Tm 1.1 ; 1Jn 2.25+. –  avant les temps éternels (2Tm 1.9) : autre traduction depuis la nuit des temps (cf. Lc 1.70 ; Rm 1.2) ; cf. Jn 17.24 ; Ep 1.4.'
  - type: text
    content: 'dans l''espérance de la vie éternelle, – cette vie, Dieu, qui ne ment pas, l''a promise avant les temps éternels, '
  '3':
  - type: note
    content: 'en son temps 1Tm 2.6n  ; 6.15 ; cf. Ac 1.7 ; Rm 5.6 ; Ga 4.4 ; Ep 1.10. –  manifesté Rm 16.25s ; 1Tm 3.16 ; voir aussi 1Co 2.7ss ; Ep 3.5ss ; Col 1.26. –  sa parole  : cf. Jn 1.14 ; Hé 1.1s. –  proclamation 1Tm 2.7n  ; 2Tm 4.17 ; cf. 1Co 1.21 ; 2.4. –  confiée 1Tm 1.11+. –  par ordre… 1Tm 1.1+. –  Dieu, notre Sauveur 2.10 ; 3.4 ; 1Tm 1.1+.'
  - type: text
    content: 'et en son temps il a manifesté sa parole dans la proclamation qui m''a été confiée, à moi, par ordre de Dieu, notre Sauveur – '
  '4':
  - type: note
    content: 'Tite 2Co 2.13+ ; 2Tm 4.10. –  mon enfant véritable  : cf. 1Tm 1.2+. –  notre commune foi  : cf. Rm 1.12 ; 2P 1.1 ; Jd 3. –  grâce / paix… Rm 1.7+. –  Jésus-Christ, notre Sauveur  : cf. v. 3+ ; 2.13n  ; 2Tm 1.10+.'
  - type: text
    content: 'à Tite, mon enfant véritable selon notre commune foi : Grâce et paix de la part de Dieu, le Père, et de Jésus-Christ, notre Sauveur !'
  - type: heading
    content: Les anciens
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Si je t''ai laissé…  : cf. 2Tm 4.20. –  Crète Ac 2.11. –  ce qui restait à régler  : cf. 1Th 3.10 ; voir aussi 1Co 3.6. –  tu nommes des anciens Ac 14.23 ; cf. 6.3 ; 11.30+ ; 1Tm 4.14n  ; 5.17.'
  - type: text
    content: 'Si je t''ai laissé en Crète, c''est pour que tu mettes bon ordre à ce qui restait à régler et que tu nommes des anciens dans chaque ville, selon ce que je t''ai moi-même prescrit : '
  '6':
  - type: note
    content: 'Cf. 1Tm 3.2nss. –  croyants  : autres traductions fidèles, dignes de confiance. –  accusés 1Tm 5.19. –  débauche Ep 5.18 ; 1P 4.4 ; cf. Pr 28.7 ; Lc 15.13. –  insoumis v. 10 ; 1Tm 1.9.'
  - type: text
    content: 's''il s''y trouve quelqu''un qui soit sans reproche, homme d''une seule femme, ayant des enfants croyants qui ne soient ni accusés de débauche ni insoumis. '
  '7':
  - type: note
    content: 'l''épiscope 1Tm 3.1ns. –  puisqu''il est (litt. comme) un intendant  : en grec le terme est apparenté aux termes habituellement traduits par maison (1Tm 3.15) ; cf. Lc 12.42 ; 1Co 4.1ns ; 1Tm 1.4n  ; 1P 4.10. –  arrogant 2P 2.10. –  coléreux  : cf. Pr 22.24 ; 29.22. –  gains honteux v. 11 ; 1P 5.2.'
  - type: text
    content: 'Il faut en effet que l''épiscope soit sans reproche, puisqu''il est un intendant de Dieu ; qu''il ne soit ni arrogant, ni coléreux, ni adonné au vin, ni violent, ni porté aux gains honteux ; '
  '8':
  - type: note
    content: 'hospitalier Rm 12.13n. –  ami du bien  : cf. 2Tm 3.3. –  pondéré 2.2,4nss,12 ; 1Tm 2.9n. –  juste, saint  : voir Ep 4.24n. –  maître de soi Ac 24.25 ; 1Co 7.9 ; 9.25 ; Ga 5.23 ; 2P 1.6 ; cf. 2Tm 2.24ss.'
  - type: text
    content: 'mais qu''il soit hospitalier, ami du bien, pondéré, juste, saint, maître de soi, '
  '9':
  - type: note
    content: 'Cf. 1Tm 5.17. –  authentique ou certaine, digne de confiance  ; le même mot a souvent le sens de fidèle ou croyant, cf. v. 6 ; 3.8 ; 1Tm 1.15n. –  telle qu''elle a été enseignée  : autre traduction selon la doctrine  ; cf. Rm 6.17 ; 16.17 ; 1Co 15.3 ; 1Tm 4.6 ; 6.3 ; 2Jn 9. –  encourager ou exhorter 1Tm 1.3+ ; cf. 4.13 ; 6.2. –  par (ou dans) l''enseignement sain 2.1 ; 1Tm 1.10+. –  réfuter ou reprendre v. 13 ; 2.15 ; 1Tm 5.20n. –  contradicteurs  : cf. 2.9 ; Lc 2.34n.'
  - type: text
    content: attaché à la parole authentique telle qu'elle a été enseignée, pour pouvoir encourager par l'enseignement sain et réfuter les contradicteurs.
  - type: heading
    content: Les propagateurs de faux enseignements
