document_id: PRO.18,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'son propre désir  : LXX et Vg ont lu des prétextes (comme en Jg 14.4). –  contre toute raison  : autres traductions contre toute assistance, contre tout ce qui est bénéfique (sur le terme correspondant, voir 2.7n, ressources  ; Jb 5.12n) ; ou encore en toute occasion il se déchaîne ; de toutes ses forces il se déchaîne  ; LXX en toute occasion il sera couvert d''opprobre.'
  - type: text
    content: Celui qui se tient à l'écart recherche son propre désir ;
  - type: text
    content: il se déchaîne contre toute raison.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Voir nom. –  une tour forte Ps 61.4 ; cf. Pr 29.25 ; 2S 22.51 ; Ps 18.3 ; 124.8.
  - type: text
    content: 'Le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est une tour forte ;'
  - type: text
    content: le juste y court et se trouve hors d'atteinte.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'riche  : cf. 22.2n. –  une ville forte  : cf. 10.15+. –  dans sa chambre forte  : sens incertain, les versions anciennes ont généralement opté pour un sens concret ; autre traduction dans son imagination  ; le terme correspondant (ou un homonyme ?) est traduit par ciselures en 25.11n  ; (pierre) ornée en Lv 26.1n (cf. Nb 33.52n  ; Ez 8.12) ; imaginations en Ps 73.7n. –  hors d''atteinte v. 10.'
  - type: text
    content: La fortune du riche est une ville forte ;
  - type: text
    content: dans sa chambre forte, c'est une muraille hors d'atteinte.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le désastre  : cf. 16.18+. –  l''humilité  : cf. 11.2 ; 15.33n.'
  - type: text
    content: Avant le désastre, le cœur de l'homme s'élève ;
  - type: text
    content: l'humilité précède la gloire.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Siracide 11.8 : « Ne réponds pas avant d''avoir écouté, n''interviens pas au milieu d''un discours. »'
  - type: text
    content: Celui qui répond avant d'avoir écouté,
  - type: text
    content: voilà bien son imbécillité et sa confusion !
  '14':
  - type: text
    content: ' '
  - type: note
    content: Voir esprit.
  - type: text
    content: L'esprit de l'homme le soutient dans la maladie ;
  - type: text
    content: l'esprit abattu, qui le relèvera ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'cœur intelligent…  : cf. 15.14. –  acquiert 4.5+.'
  - type: text
    content: Un cœur intelligent acquiert la connaissance ;
  - type: text
    content: l'oreille des sages recherche la connaissance.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Les cadeaux…  : litt. le don d''un être humain (cf. 17.8,23 ; 21.14) élargit pour lui  ; autre traduction mettent au large (cf. Gn 26.22 ; Dt 33.20).'
  - type: text
    content: Les cadeaux ouvrent les portes ;
  - type: text
    content: ils conduisent devant les grands.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'qui défend sa cause  : litt. dans son procès ou dans son accusation  ; cf. 25.8. –  lui demande des preuves  : litt. le scrute ou l''examine à fond  ; le même verbe est traduit par découvrir en 25.2 ; mettre à l''épreuve en 28.11 ; voir aussi 23.30n  ; cf. Jb 5.27n.'
  - type: text
    content: Le premier qui défend sa cause paraît juste ;
  - type: text
    content: arrive la partie adverse, et elle lui demande des preuves.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le sort  : cf. 16.33n. –  des groupes puissants ou des puissants  ; certains comprennent, plus généralement, les parties en procès.'
  - type: text
    content: Le sort fait cesser les querelles,
  - type: text
    content: il départage des groupes puissants.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Texte incertain. LXX un frère aidé par son frère est comme une ville forte et élevée ; il est fort comme un palais solidement élevé.
  - type: text
    content: Un frère offensé est pire qu'une ville forte ;
  - type: text
    content: les querelles sont comme les verrous d'un palais.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'l''homme stupide 1.22+. –  l''étalage  : autre traduction à dévoiler (autre forme du même verbe en 11.13 ; 25.9). –  de ses pensées ou de son opinion , litt. de son cœur.'
  - type: text
    content: Ce n'est pas à l'intelligence que l'homme stupide prend plaisir,
  - type: text
    content: c'est à l'étalage de ses pensées.
  '20':
  - type: text
    content: ' '
  - type: note
    content: fruit de sa bouche 12.14n  ; 13.2. –  du produit ou de la récolte, du revenu  ; cf. 3.9n. –  ses lèvres 13.3.
  - type: text
    content: Par le fruit de sa bouche l'homme rassasie son ventre,
  - type: text
    content: c'est du produit de ses lèvres qu'il est rassasié.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'au pouvoir  : litt. dans la main . –  la langue  : cf. 21.23 ; Jc 3.2-12 ; Siracide 37.17s : « Il (le cœur) fait pousser quatre rameaux : le bien et le mal, la vie et la mort, et celle qui constamment décide, c''est la langue. »'
  - type: text
    content: La mort et la vie sont au pouvoir de la langue ;
  - type: text
    content: celui qui l'aime en mange le fruit.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'une femme  : LXX une femme bonne  ; cf. 5.15+ ; 12.14 ; 19.14 ; 31.10ss. A la fin du v. LXX ajoute  : Celui qui chasse une femme bonne chasse le bien (ou le bonheur ) . Celui qui garde une femme adultère est déraisonnable et impie.'
  - type: text
    content: Celui qui a trouvé une femme a trouvé le bonheur ;
  - type: text
    content: 'c''est une faveur qu''il a obtenue du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 23 et 24 sont absents de LXX. –  Le pauvre…  : cf. Siracide 13.3 : « Le riche commet une injustice et c''est lui qui se fâche, le pauvre subit l''injustice et doit en plus s''excuser. »'
  - type: text
    content: Le pauvre parle en suppliant ;
  - type: text
    content: le riche répond avec dureté.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui a des amis…  : litt. un homme des amis pour se faire du mal . Certains témoins du texte ont lu il est des amis qui font du mal  ; cf. 17.17 ; 27.10.'
  - type: text
    content: Celui qui a des amis peut les avoir pour son malheur ;
  - type: text
    content: il est tel ami plus attaché qu'un frère.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'mépris 3.35+ ; 11.2. –  le déshonneur  : autre traduction les outrages.'
  - type: text
    content: Quand vient le méchant vient aussi le mépris ;
  - type: text
    content: avec l'ignominie vient le déshonneur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ce verset peut se comprendre de deux manières : ou bien il s''agit des paroles des sages qui sont des eaux profondes et un torrent (ou un oued , cf. 30.17 ; Gn 26.17n  ; Jb 6.15n) qui jaillit (1.23n) ; ou bien il y a contraste entre les paroles d’ un homme quelconque, qui sont mystérieuses et immobiles comme les eaux profondes , et les paroles de sagesse qui sont jaillissantes et vivantes comme un torrent . –  Les paroles d''un homme  : litt. les paroles d''une bouche d''homme . –  eaux profondes 20.5. –  source de la sagesse  : quelques mss hébreux et LXX portent la source de la vie . Cf. 10.11n  ; Jn 7.38 ; Siracide 21.13 : « La science du sage grossit comme un déluge et son conseil est comme une source d''eau vive. » –  jaillit 1.23n.'
  - type: text
    content: Les paroles d'un homme sont des eaux profondes ;
  - type: text
    content: la source de la sagesse est un torrent qui jaillit.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.15+ ; 24.23+ ; Lv 19.15 ; Dt 1.17 ; 16.19 ; Ps 35.11. –  favoriser le méchant  : litt. élever la face du méchant . – Voir justice.'
  - type: text
    content: Il n'est pas bon de favoriser le méchant
  - type: text
    content: pour léser le juste dans son droit.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'stupide 1.22+. –  se mêlent…  : autres traductions entrent dans les querelles, mènent à la querelle.'
  - type: text
    content: Les lèvres de l'homme stupide se mêlent des querelles ;
  - type: text
    content: sa bouche appelle les coups.
  '7':
  - type: text
    content: ' '
  - type: note
    content: V. 6+ ; cf. 10.14 ; 13.3.
  - type: text
    content: La bouche de l'homme stupide cause sa ruine ;
  - type: text
    content: ses lèvres sont un piège pour lui.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Les paroles du médisant… 26.22 ; absent de LXX.
  - type: text
    content: Les paroles du médisant sont comme des friandises,
  - type: text
    content: elles descendent jusqu'au fin fond du corps.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui se relâche…  : cf. 24.10 ; voir aussi 6.6 ; Jos 18.3n. –  de celui qui détruit  : litt. du maître de la destruction.'
  - type: text
    content: Celui qui se relâche dans son travail
  - type: text
    content: est frère de celui qui détruit.
