document_id: PSA.75,104
type_code: fra
verses:
  '1':
  - type: heading
    content: C'est Dieu qui est juge
  - type: text
    content: ' '
  - type: note
    content: Ne détruis pas 57.1n. –  D'Asaph 73.1+. –  Chant 30.1+.
  - type: text
    content: Du chef de chœur. « Ne détruis pas ! » Psaume. D'Asaph. Chant.
  '10':
  - type: text
    content: ' '
  - type: note
    content: je chanterai 7.18n. –  Dieu de Jacob 14.7+ ; 81.2 ; cf. Jg 5.3.
  - type: text
    content: Quant à moi, je le dirai toujours ;
  - type: text
    content: je chanterai pour le Dieu de Jacob.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'V. 5nss ; 92.11n  ; 112.9n  ; 1S 2.1n. –  méchants / juste  : cf. 1.1ss.'
  - type: text
    content: J'abattrai toutes les cornes des méchants ;
  - type: text
    content: les cornes du juste s'élèveront.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ton nom…  : LXX a lu nous invoquerons ton nom ; je raconterai tes actes étonnants  ; 9.2+ ; 26.7 ; 78.4 ; Hé 2.12.'
  - type: text
    content: 'Nous te célébrons, ô Dieu, nous te célébrons :'
  - type: text
    content: ton nom est proche ;
  - type: text
    content: on raconte tes actes étonnants.
  '3':
  - type: text
    content: ' '
  - type: note
    content: C'est soudain Dieu qui parle (cf. 46.11). –  Au temps… 102.14 ; Ha 2.3. –  qui jugerai 96.13 ; 98.9 ; cf. Jc 5.8s. –  avec droiture 7.12+ ; 9.9 ; 67.5 ; 96.10 ; cf. 35.24 ; 1P 2.23.
  - type: text
    content: Au temps que j'aurai fixé,
  - type: text
    content: c'est moi qui jugerai avec droiture.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'La terre fond  : cf. 18.8 ; 46.3s,7n  ; Es 24.18 ; Jb 9.6. –  affermis ses colonnes  : cf. 24.1s ; 93.1 ; 104.5 ; 1S 2.8.'
  - type: text
    content: 'La terre fond avec tous ses habitants :'
  - type: text
    content: 'c''est moi qui affermis ses colonnes. '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.10s ; 1S 2.3. –  ceux qui font les fiers 73.3n. –  la corne  : image de puissance ou de fierté, de même aux v. 6,11n  ; voir aussi 18.3n  ; 73.9 ; 89.18n  ; 92.11 ; 112.9 ; 132.17 ; 148.14.'
  - type: text
    content: 'Je dis à ceux qui font les fiers : Ne soyez pas fiers !'
  - type: text
    content: 'Et aux méchants : N''élevez pas la corne !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'en haut  : c.-à-d. pour défier Dieu. –  ne vous obstinez pas…  : litt. ne proférez pas l''insolence (31.19+) avec le cou  ; cf. Jb 15.26n  ; certains modifient le texte hébreu traditionnel pour lire contre le rocher au lieu de avec le cou , d''après LXX contre Dieu (cf. 18.3+).'
  - type: text
    content: N'élevez pas en haut votre corne,
  - type: text
    content: ne vous obstinez pas dans vos discours insolents.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'que vient  : sous-entendu dans le texte. –  l''élévation  : autre traduction possible, d''après la vocalisation traditionnelle de l''hébreu et des versions anciennes  : ni du désert des montagnes (homonymie de l''hébreu), mais la phrase resterait alors en suspens ; cf. 68.8ss.'
  - type: text
    content: Car ce n'est ni de l'orient, ni de l'occident,
  - type: text
    content: ni du désert que vient l'élévation.
  '8':
  - type: text
    content: ' '
  - type: note
    content: le juge 50.6+. –  il abaisse… 73.18 ; 1S 2.4-8 ; Ez 21.31 ; Mt 23.12 ; Lc 1.51-54.
  - type: text
    content: 'Car Dieu est le juge :'
  - type: text
    content: il abaisse l'un, il élève l'autre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '11.6 ; 60.5 ; cf. Es 51.17ss ; Jr 25.15ss ; 51.7 ; Ez 23.31ss ; Ab 16 ; Ha 2.16 ; Za 12.2 ; Lm 4.21 ; Ap 14.10 ; voir aussi Nb 5.1ss. –  fermenté  : autre traduction écumant , cf. 46.4. –  il en verse  : traduction incertaine ; LXX il verse de l''un à l''autre.'
  - type: text
    content: 'Car il y a dans la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' une coupe'
  - type: text
    content: pleine d'un vin fermenté et mélangé,
  - type: text
    content: 'et il en verse :'
  - type: text
    content: tous les méchants de la terre la vident,
  - type: text
    content: ils la boivent jusqu'à la lie.
