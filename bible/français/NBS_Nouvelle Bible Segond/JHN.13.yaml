document_id: JHN.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus lave les pieds de ses disciples
  - type: text
    content: ' '
  - type: note
    content: 'Pâque 2.13+ ; voir calendrier et fêtes. –  sachant v. 3 ; 18.4 ; 19.28. –  l''heure était venue 2.4+ ; 12.23+. –  passer  : cf. Ex 12.11n-13n. –  de ce monde (1.10n) au Père v. 3 ; 14.12,28 ; 16.5,10,17,28 ; 17.13 ; 20.17. –  dans le monde 1.10n  ; 17.11-18. –  les aima  : cf. v. 34 ; 15.9 ; 17.23 ; Rm 5.8 ; 8.35 ; 2Co 5.14 ; Ga 2.20 ; Ep 3.19 ; 5.1s ; 1Jn 3.16. –  jusqu''au bout  : litt. jusqu''à la fin  ; l''expression peut signifier aussi à l''extrême  ; un verbe apparenté est traduit par achever en 19.28,30.'
  - type: text
    content: Avant la fête de la Pâque, sachant que l'heure était venue pour lui de passer de ce monde au Père, Jésus, qui avait aimé les siens qui étaient dans le monde, les aima jusqu'au bout.
  '10':
  - type: note
    content: 'n''a besoin de se laver…  : certains mss portent n''a pas besoin de se laver. –  vous êtes purs (le mot grec signifie également propre) ; cf. 2.6+ ; 15.3n.'
  - type: text
    content: 'Jésus lui dit : Celui qui s''est baigné n''a besoin de se laver que les pieds : il est entièrement pur ; or vous, vous êtes purs, mais non pas tous. '
  '11':
  - type: note
    content: 6.64+.
  - type: text
    content: 'Il savait en effet qui allait le livrer ; c''est pourquoi il dit : Vous n''êtes pas tous purs.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: '15.7. –  repris  : cf. v. 4n et 10.17ns. –  Savez-vous  : cf. v. 7n.'
  - type: text
    content: 'Après leur avoir lavé les pieds et avoir repris ses vêtements, il se remit à table et leur dit : Savez-vous ce que j''ai fait pour vous ? '
  '13':
  - type: note
    content: 'Mt 21.3 ; 23.8,10. –  Maître et Seigneur  : autre traduction le Maître (au sens d’enseignant) et le Seigneur (terme qu''on pourrait également traduire par maître, au sens de propriétaire ou de patron). –  vous avez raison  : litt. vous dites bien, cf. 4.17 ; 8.48 ; 18.23. –  je le suis  : litt. je suis, cf. 8.24n.'
  - type: text
    content: 'Vous, vous m''appelez Maître et Seigneur, et vous avez raison, car je le suis. '
  '14':
  - type: note
    content: Cf. 1Tm 5.10 ; 1P 5.5 ; 1Jn 3.16+.
  - type: text
    content: 'Si donc je vous ai lavé les pieds, moi, le Seigneur et le Maître, vous aussi vous devez vous laver les pieds les uns aux autres ; '
  '15':
  - type: note
    content: Cf. v. 34+ ; Lc 22.24-30 ; 1Co 11.1 ; Ph 2.3-11 ; 1P 2.21 ; 1Jn 2.6+. Sur le terme correspondant à exemple, voir Hé 4.11n (manière) ; Jc 5.10 ; 2P 2.6.
  - type: text
    content: 'car je vous ai donné l''exemple, afin que, vous aussi, vous fassiez comme moi j''ai fait pour vous. '
  '16':
  - type: note
    content: Amen, amen 1.51n  ; cf. Mt 5.18n. –  esclave ou serviteur, maître ou seigneur (ainsi v. 13s), apôtre ou envoyé (d'un verbe synonyme de celui qui est ici traduit par envoyer) Mt 10.24+/ /.
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, l''esclave n''est pas plus grand que son maître, ni l''apôtre plus grand que celui qui l''a envoyé. '
  '17':
  - type: note
    content: 'pourvu que vous le fassiez  : cf. 3.21 ; 7.17 ; Mt 7.21,24-27 ; Rm 2.13 ; Jc 1.22,25.'
  - type: text
    content: Si vous savez cela, heureux êtes-vous, pourvu que vous le fassiez !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ceux que j''ai choisis 6.70+. –  Celui qui mange (6.54n) mon pain  : certains mss portent celui qui mange le pain avec moi ; Ps 41.10  ; Mc 14.18 ; cf. 3.20n.'
  - type: text
    content: 'Ce n''est pas de vous tous que je le dis ; moi, je connais ceux que j''ai choisis. Mais il faut que soit accomplie l''Ecriture : '
  - type: text
    content: Celui qui mange mon pain
  - type: text
    content: ' a levé son '
  - type: text
    content: talon contre moi
  - type: text
    content: '. '
  '19':
  - type: note
    content: avant que la chose arrive 14.29 ; 16.1,4 ; cf. Es 43.10 ; 46.10 ; Mt 24.25/ /. –  que, moi, je suis ou que c'est moi  ; 8.24n,28.
  - type: text
    content: 'Dès maintenant, je vous le dis, avant que la chose arrive, pour que, lorsqu''elle arrivera, vous croyiez que, moi, je suis. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'le diable 6.70n  ; cf. 12.31+ ; 13.27 ; Lc 22.3 ; Ac 5.3. Voir démon, diable, Satan. –  mis  : litt. jeté  ; le même verbe est traduit par verser au v. 5. –  cœur Lc 1.66n. –  Judas…  : d''après certains mss, le nom Iscariote pourrait ici être attribué à Judas  ; cf. 6.71n.'
  - type: text
    content: 'Pendant le dîner, alors que le diable a déjà mis au cœur de Judas, fils de Simon Iscariote, de le livrer, '
  '20':
  - type: note
    content: Cf. 12.44 ; 17.18+ ; Mt 10.40+/ /.
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, qui reçoit celui que j''envoie me reçoit, et qui me reçoit reçoit celui qui m''a envoyé.'
  - type: heading
    content: Jésus annonce que Judas va le trahir
  - type: heading
    content: Mt 26.21-25  ; Mc 14.18-21  ; Lc 22.21-23
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'son esprit…  : litt. il se troubla en esprit (c.-à-d. intérieurement ) ou dans l''Esprit (c.-à-d. sous l''action de l''Esprit saint ), 11.33n. –  l''un de vous me livrera 6.64+.'
  - type: text
    content: 'Lorsque Jésus eut ainsi parlé, son esprit se troubla ; il prononça ce témoignage : '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, l''un de vous me livrera. '
  '22':
  - type: text
    content: 'Les disciples se regardaient les uns les autres et se demandaient de qui il parlait. '
  '23':
  - type: note
    content: 'celui que Jésus aimait 19.26 ; 20.2 ; 21.7,20 ; voir aussi 18.15n  ; cf. 11.3,5n. –  contre le sein  : expression très proche de celle qui figure en 1.18n  ; les convives étaient étendus sur des divans, en appui sur le coude gauche ; celui qui était installé à la droite de Jésus (position de faveur et d''intimité) devait se pencher contre sa poitrine pour lui parler (v. 24s).'
  - type: text
    content: 'Un de ses disciples, celui que Jésus aimait, était placé à table contre le sein de Jésus. '
  '24':
  - type: text
    content: 'Simon Pierre lui fait signe de lui demander de qui il parlait. '
  '25':
  - type: note
    content: 'Ce disciple  : litt. celui-là (cf. 19.35n) ; en grec le même démonstratif désigne Judas dans la suite (v. 26,27,30n). –  se penche  : le même verbe est traduit par se remettre à table au v. 12 ; il est également traduit par s''installer en 6.10 ; cf. 21.20.'
  - type: text
    content: 'Ce disciple se penche alors tout contre la poitrine de Jésus et lui dit : Seigneur, qui est-ce ? '
  '26':
  - type: note
    content: 'Cf. 10.18. –  le prend  : le terme correspondant est absent de certains mss. Indépendamment du sens qui lui est donné ici par la parole de Jésus, ce geste pourrait être interprété comme un témoignage de faveur ou d''affection particulière.'
  - type: text
    content: 'Jésus lui répond : C''est celui pour qui je tremperai moi-même le morceau et à qui je le donnerai. Il trempe le morceau, le prend et le donne à Judas, fils de Simon l''Iscariote. '
  '27':
  - type: note
    content: 'V. 2+. –  Satan  : voir démon, diable, Satan.'
  - type: text
    content: 'C''est alors, après le morceau, que le Satan entra en lui. Jésus lui dit : Ce que tu fais, fais-le vite. '
  '28':
  - type: text
    content: 'Aucun de ceux qui étaient à table ne sut pourquoi il lui disait cela. '
  '29':
  - type: note
    content: '12.6. –  fête  : cf. v. 1 ; voir calendrier et fêtes.'
  - type: text
    content: 'En effet, comme Judas tenait la bourse, quelques-uns pensaient que Jésus lui disait : « Achète ce dont nous avons besoin pour la fête », ou : « Va donner quelque chose aux pauvres. » '
  '3':
  - type: note
    content: 'Jésus, qui sait  : litt. sachant v. 1+. –  tout remis entre ses mains 3.35+. –  sorti (ou issu, venu) de Dieu 8.42+. –  s''en va à Dieu  : cf. 6.62 ; 7.33+. – Cf. Epître d''Ignace aux Magnésiens 7.2 : « Tous, accourez pour vous réunir comme en un seul temple de Dieu, comme autour du seul autel, autour du seul Jésus-Christ, qui est sorti du Père un, et qui était en lui l''unique, et qui est allé vers lui. »'
  - type: text
    content: 'Jésus, qui sait que le Père a tout remis entre ses mains, qu''il est sorti de Dieu et qu''il s''en va à Dieu, '
  '30':
  - type: note
    content: 'Cf. 9.4 ; 11.10 ; Lc 22.53. –  Judas  : litt. celui-là.'
  - type: text
    content: Judas prit donc le morceau et sortit aussitôt. Il faisait nuit.
  - type: heading
    content: Le commandement nouveau
  '31':
  - type: text
    content: ' '
  - type: note
    content: 12.23. –  Fils de l'homme 1.51+. –  glorifié 7.39+ ; 14.13.
  - type: text
    content: 'Lorsque Judas fut sorti, Jésus dit : Maintenant le Fils de l''homme a été glorifié, et Dieu a été glorifié en lui. '
  '32':
  - type: note
    content: 'Si Dieu a été glorifié en lui  : cette proposition est absente de plusieurs mss. –  en lui  : certains mss précisent en lui-même. –  il le glorifiera aussitôt (même adverbe, p. ex., au v. 30 ; 19.34) ; cf. 8.54 ; 17.1,5,22,24.'
  - type: text
    content: 'Si Dieu a été glorifié en lui, Dieu aussi le glorifiera en lui, il le glorifiera aussitôt. '
  '33':
  - type: note
    content: '7.33+,34+. –  Mes enfants  : litt. petits enfants, cf. 21.5 (autre terme grec, synonyme) ; 1Jn 2.1n. –  encore un peu  : cf. 7.33+ ; 14.19 ; 16.16ss ; Hé 10.37. –  Juifs  : cf. 1.19n.'
  - type: text
    content: 'Mes enfants, je suis avec vous encore un peu. Vous me chercherez ; et comme j''ai dit aux Juifs : « Là où, moi, je vais, vous, vous ne pouvez pas venir », à vous aussi je le dis maintenant.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: '15.12s,17 ; Ga 6.2 ; 1Th 4.9 ; 1P 1.22 ; 1Jn 2.7s,10 ; 3.11,23 ; 4.7-12,19 ; 5.1,3 ; 2Jn 5 ; cf. Mt 22.37-39. –  commandement  : voir loi. –  comme je vous ai aimés v. 1+,15+ ; 15.9 ; voir Ep 5.2 ; Col 3.13.'
  - type: text
    content: 'Je vous donne un commandement nouveau : que vous vous aimiez les uns les autres ; comme je vous ai aimés, que vous aussi, vous vous aimiez les uns les autres. '
  '35':
  - type: note
    content: 'tous sauront…  : cf. 12.32 ; 17.21-23 ; 1Jn 2.5 ; 3.14 ; cf. 1Th 4.9+.'
  - type: text
    content: Si vous avez de l'amour les uns pour les autres, tous sauront que vous êtes mes disciples.
  - type: heading
    content: Jésus annonce que Pierre le reniera
  - type: heading
    content: Mt 26.33-35  ; Mc 14.29-31  ; Lc 22.31-34
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'où vas-tu ? 7.35 ; 14.5 ; 16.5. –  Jésus lui répondit  : certains mss portent Jésus répondit . –  tu ne peux pas v. 33. –  tu me suivras plus tard 12.26+ ; 21.18s.'
  - type: text
    content: 'Simon Pierre lui dit : Seigneur, où vas-tu ? Jésus lui répondit : Là où je vais, tu ne peux pas me suivre maintenant ; tu me suivras plus tard. '
  '37':
  - type: note
    content: me défaire de ma vie 10.11n.
  - type: text
    content: 'Seigneur, lui dit Pierre, pourquoi ne puis-je pas te suivre maintenant ? Je suis prêt à me défaire de ma vie pour toi. '
  '38':
  - type: note
    content: 18.27. –  renié 1.20n.
  - type: text
    content: 'Jésus répondit : Tu es prêt à te défaire de ta vie pour moi ! '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je te le dis, un coq n''aura pas chanté que tu m''auras renié par trois fois.'
  '4':
  - type: note
    content: 'Cf. Lc 12.37 ; 17.7-10 ; 22.27. –  de table  : litt. du dîner, comme au v. 2. –  se défait de  : litt. dépose  ; même verbe 10.11n. –  qu''il attache…  : litt. qu''il ceignit  ; cf. 21.7n.'
  - type: text
    content: 'se lève de table, se défait de ses vêtements et prend un linge qu''il attache comme un tablier. '
  '5':
  - type: note
    content: 'Cf. 12.3 ; Lc 7.44 ; voir aussi 12.37. –  une cuvette  : autre traduction un broc. –  laver les pieds de quelqu''un était considéré comme une tâche humiliante, qu''on n''avait même pas le droit d''imposer à un esclave juif. Habituellement l''hospitalité voulait qu''on offre de l''eau à ses invités, à leur arrivée, pour qu''ils se lavent eux-mêmes les pieds (Lc 7.44n). Cependant un disciple, p. ex., pouvait décider de son plein gré de laver les pieds de son maître en signe d''amour et de dévouement, cf. v. 13s ; Joseph et Aséneth 20.2s : « Elle apporta de l''eau pour lui laver les pieds. Joseph lui dit : “Que l''une des vierges (= une servante) vienne donc et qu''elle me lave les pieds.” Aséneth lui dit : “Non, seigneur, car mes mains sont tes mains et tes pieds sont mes pieds, et ce n''est pas une autre qui te lavera les pieds.” Et elle lui lava les pieds de force. »'
  - type: text
    content: 'Puis il verse de l''eau dans une cuvette et se met à laver les pieds des disciples et à les essuyer avec le linge qui lui servait de tablier. '
  '6':
  - type: note
    content: Cf. Mt 3.14 ; 16.22.
  - type: text
    content: 'Il vient donc à Simon Pierre, qui lui dit : Toi, Seigneur, tu me laves les pieds ! '
  '7':
  - type: note
    content: 'tu le sauras  : autres traductions tu le connaîtras ; tu le comprendras  ; le même verbe est traduit par savoir aux v. 12,28,35. –  après  : litt. après cela, cf. v. 12 ; cf. 12.16+.'
  - type: text
    content: 'Jésus lui répondit : Ce que, moi, je suis en train de faire, toi, tu ne le sais pas maintenant ; tu le sauras après. '
  '8':
  - type: note
    content: tu n'as pas de part avec moi, c.-à-d. nous n'avons plus rien à faire ensemble  ; cf. 2S 20.1.
  - type: text
    content: 'Pierre lui dit : Non, jamais tu ne me laveras les pieds. Jésus lui répondit : Si je ne te lave pas, tu n''as pas de part avec moi. '
  '9':
  - type: text
    content: 'Simon Pierre lui dit : Alors, Seigneur, pas seulement mes pieds, mais aussi mes mains et ma tête ! '
