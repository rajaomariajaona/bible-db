  - type: text
    text: 'Mes enfants, je suis avec vous encore un peu. Vous me chercherez ; et comme j''ai dit aux Juifs : « Là où, moi, je vais, vous, vous ne pouvez pas venir », à vous aussi je le dis maintenant.'
