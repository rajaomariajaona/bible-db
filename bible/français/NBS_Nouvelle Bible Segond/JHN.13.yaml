          text: Joseph
      - type: text
        text: ' et Aséneth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.2s : « Elle apporta de l''eau pour lui laver les pieds. Joseph lui dit : “Que l''une des vierges (= une servante) vienne donc et qu''elle me lave les pieds.” Aséneth lui dit : “Non, seigneur, car mes mains sont tes mains et tes pieds sont mes pieds, et ce n''est pas une autre qui te lavera les pieds.” Et elle lui lava les pieds de force. »'
    marker-yv: yv-n
  - type: text
    text: 'Puis il verse de l''eau dans une cuvette et se met à laver les pieds des disciples et à les essuyer avec le linge qui lui servait de tablier. '
