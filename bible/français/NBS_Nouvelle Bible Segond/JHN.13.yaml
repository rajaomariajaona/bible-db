      - type: text
        text: de quelqu'un était considéré comme une tâche humiliante, qu'on n'avait même pas le droit d'imposer à un esclave juif. Habituellement l'hospitalité voulait qu'on offre de l'eau à ses invités, à leur arrivée, pour qu'ils se lavent eux-mêmes les pieds (Lc 7.44
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). Cependant un disciple, p. ex., pouvait décider de son plein gré de laver les pieds de son maître en signe d''amour et de dévouement, cf. v. 13s ; '
    - type: usfm
