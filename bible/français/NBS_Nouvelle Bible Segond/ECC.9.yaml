        children:
        - type: text
          text: '(version babylonienne) 10.3 : « Gilgamesh, que cherches-tu dans ton errance ? La vie que tu poursuis, tu ne la trouveras pas. Quand les dieux ont créé les humains, ils ont assigné la mort aux humains et ils ont gardé la vie dans leurs mains. Quant à toi, Gilgamesh, que ton ventre soit plein ! Réjouis-toi jour et nuit ! De chaque jour fais une fête joyeuse ! Danse et amuse-toi jour et nuit ! Que tes vêtements soient éclatants ! Lave-toi la tête, baigne-toi dans l''eau ! Prête attention au petit qui saisit ta main, que ta femme soit heureuse sur ton sein ! Voilà la tâche des humains. » –  '
