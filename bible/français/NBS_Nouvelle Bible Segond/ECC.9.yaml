      marker-yv: yv-n
    - type: text
      text: 'Voici un mal parmi tout ce qui se fait sous le soleil : c''est qu''il y a pour tous un même sort ; aussi le cœur des humains est rempli de mal, et la démence est dans leur cœur pendant leur vie ; et après… chez les morts !'
