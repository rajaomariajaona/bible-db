document_id: ECC.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un même sort attend tous les hommes
  - type: text
    content: ' '
  - type: note
    content: 'j''y ai réfléchi  : même expression hébraïque en 7.2n. –  constaté  : la forme verbale unique qui apparaît ici rappelle le verbe traduit par éprouver en 3.18. –  dans la main de Dieu Dt 33.3 ; cf. Pr 16.1 ; Sagesse 7.16 : « Il tient en son pouvoir et nous-mêmes et nos paroles. » –  amour / haine 3.8. –  devant lui  : litt. devant eux. Certains modifient le texte hébreu traditionnel pour rattacher la fin du v. 1 au v. 2 et lire tout devant eux est futilité (v. 2n), parce que tous ont un même sort…'
  - type: text
    content: Tout cela, j'y ai réfléchi ;
  - type: text
    content: ce que j'ai constaté,
  - type: text
    content: c'est que les justes, les sages et leurs labeurs
  - type: text
    content: sont dans la main de Dieu ;
  - type: text
    content: l'amour comme la haine, l'être humain ne les connaît pas ;
  - type: text
    content: tout est devant lui.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Siracide 14.16 : « Donne, prends, et réjouis ton âme, car il n''y a pas, aux enfers (= au séjour des morts ), à rechercher le plaisir. »'
  - type: text
    content: Tout ce que ta main trouve à faire, avec ta force, fais-le ;
  - type: text
    content: car il n'y a ni activité, ni raison, ni connaissance, ni sagesse
  - type: text
    content: dans le séjour des morts, où tu vas.
  - type: heading
    content: Le malheur arrive tout à coup
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'n''appartient pas  : autre traduction n''appartient pas toujours , même possibilité dans la suite. –  aux rapides  : autre traduction aux agiles. –  aux vaillants  : autres traductions aux guerriers ; aux héros . –  car tous sont…  : litt. temps et coup (cf. 1R 5.18n) arrivent à (verbe de la même famille que le mot traduit par sort au v. 2) tous ou les attendent tous (cf. 2.14s).'
  - type: text
    content: J'ai encore vu sous le soleil
  - type: text
    content: que la course n'appartient pas aux rapides,
  - type: text
    content: ni la guerre aux vaillants,
  - type: text
    content: ni le pain aux sages,
  - type: text
    content: ni la richesse aux intelligents,
  - type: text
    content: ni la faveur à ceux qui savent,
  - type: text
    content: car tous sont à la merci des temps et des circonstances.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'son temps  : autre traduction son heure (même terme dans la suite, cf. v. 11n  ; 8.5n) ; Lc 12.20 ; Jc 4.14. –  filet Os 7.12+. –  pour leur malheur  : litt. au filet mauvais.'
  - type: text
    content: L'être humain ne connaît pas plus son temps
  - type: text
    content: que les poissons qui sont pris au filet, pour leur malheur,
  - type: text
    content: ou que les oiseaux qui sont pris au piège ;
  - type: text
    content: comme eux, les humains sont attrapés à l'heure néfaste qui s'abat sur eux à l'improviste.
  - type: heading
    content: La sagesse est souvent méconnue
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'cet exemple de sagesse  : litt. une sagesse.'
  - type: text
    content: J'ai aussi vu sous le soleil cet exemple de sagesse
  - type: text
    content: 'qui m''a paru remarquable :'
  '14':
  - type: text
    content: 'Il y avait une petite ville, avec peu d''hommes ; un roi puissant vint contre elle, l''investit et bâtit contre elle de grands ouvrages de siège. '
  '15':
  - type: note
    content: 'pauvre et sage  : cf. 4.13 ; Pr 21.22 ; 24.5. –  qui délivra  : autre traduction qui aurait pu délivrer.'
  - type: text
    content: Il se trouvait là un homme pauvre et sage qui délivra la ville par sa sagesse. Et personne ne s'est souvenu de cet homme pauvre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '7.19 ; cf. Siracide 13.22s : « Que le riche se trompe, beaucoup viennent à son secours, s''il profère des sottises, on lui donne raison. Mais si l''humble se trompe, on lui en fait reproche ; s''il dit des choses sensées, on n''en fait aucun cas. Qu''un riche parle, tous se taisent et portent aux nues son discours. Qu''un pauvre parle, et on dit : “Qui est-ce ?” »'
  - type: text
    content: 'J''ai dit :'
  - type: text
    content: Mieux vaut la sagesse que la vaillance.
  - type: text
    content: Cependant la sagesse du pauvre est méprisée,
  - type: text
    content: et ses paroles ne sont pas écoutées.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Autre traduction les paroles des sages, dans le calme, sont mieux écoutées que les cris… –  stupides 2.14+.
  - type: text
    content: Les paroles des sages, écoutées dans le calme,
  - type: text
    content: valent mieux que les cris de celui qui gouverne parmi les gens stupides.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'V. 14-16. –  un seul pécheur  : le mot est peut-être à entendre ici dans son sens étymologique  : celui qui manque le but, le maladroit  ; cf. 10.1,4n.'
  - type: text
    content: Mieux vaut la sagesse que des armes de combat ;
  - type: text
    content: un seul pécheur anéantit beaucoup de bien.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Tout arrive également à tous  : LXX futilité pour tous (v. 1n) ; les mots hébreux pour Tout (litt. le tout ) et futilité sont graphiquement très proches ; cf. 1.2+. –  même sort  : cf. 3.19. –  serment  : cf. 8.2n  ; Nb 5.19 ; voir aussi Ex 22.8 ; Dt 19.17 ; Jg 17.1ss ; 1R 8.31s.'
  - type: text
    content: 'Tout arrive également à tous :'
  - type: text
    content: même sort pour le juste et pour le méchant,
  - type: text
    content: pour le bon,
  - type: text
    content: pour le pur et pour l'impur,
  - type: text
    content: pour celui qui sacrifie et pour celui qui ne sacrifie pas ;
  - type: text
    content: il en est du bon comme du pécheur,
  - type: text
    content: de celui qui prête serment comme de celui qui craint le serment.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '8.11. –  après  : litt. après lui. Plusieurs versions anciennes ont lu le pluriel, qu''on pourrait traduire et leur fin (est) chez les morts.'
  - type: text
    content: 'Voici un mal parmi tout ce qui se fait sous le soleil : c''est qu''il y a pour tous un même sort ; aussi le cœur des humains est rempli de mal, et la démence est dans leur cœur pendant leur vie ; et après… chez les morts !'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui est associé…  : la traduction est fondée sur une lecture traditionnelle juive, corroborée par certains mss hébreux et des versions anciennes. Autre lecture  : Car (cf. v. 3) quel est celui qui sera choisi (c.-à-d., peut-être, exempté de la mort)  ? Pour tous les vivants il y a de la confiance, car un chien vivant… ou bien  : Pour tous les vivants une chose est sûre, c''est qu''un chien vivant…  ; cf. v. 7ss ; la fin du v. cite sans doute un proverbe populaire, tel celui d''Ahiqar  : un renard vivant vaut mieux qu''un lion mort. Sur le chien comme animal méprisé, cf. Ps 22.17 ; Pr 26.11 ; Mt 7.6 ; Lc 16.21.'
  - type: text
    content: En effet, celui qui est associé à tous les vivants peut avoir confiance ;
  - type: text
    content: un chien vivant vaut mieux qu'un lion mort.
  '5':
  - type: text
    content: ' '
  - type: note
    content: leur souvenir ou leur nom  ; cf. Ex 3.15n. –  oublié 8.10.
  - type: text
    content: Les vivants, en effet, savent qu'ils mourront ;
  - type: text
    content: mais les morts ne savent rien ;
  - type: text
    content: pour eux il n'y a plus de salaire,
  - type: text
    content: puisque leur souvenir est oublié.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'amour / haine v. 1. –  passion jalouse 4.4n. – Cf. Siracide 14.19 : « Toute œuvre corruptible disparaît, et celui qui l''a produite s''en va avec elle. »'
  - type: text
    content: Leur amour, leur haine et leur passion jalouse ont déjà disparu ;
  - type: text
    content: ils n'auront plus jamais de part à tout ce qui se fait sous le soleil.
  - type: heading
    content: Jouir de la vie comme d'un don de Dieu
  '7':
  - type: text
    content: ' '
  - type: note
    content: '2.24+ ; cf. Ac 2.46. Epopée de Gilgamesh (version babylonienne) 10.3 : « Gilgamesh, que cherches-tu dans ton errance ? La vie que tu poursuis, tu ne la trouveras pas. Quand les dieux ont créé les humains, ils ont assigné la mort aux humains et ils ont gardé la vie dans leurs mains. Quant à toi, Gilgamesh, que ton ventre soit plein ! Réjouis-toi jour et nuit ! De chaque jour fais une fête joyeuse ! Danse et amuse-toi jour et nuit ! Que tes vêtements soient éclatants ! Lave-toi la tête, baigne-toi dans l''eau ! Prête attention au petit qui saisit ta main, que ta femme soit heureuse sur ton sein ! Voilà la tâche des humains. » –  le cœur content 7.3n.'
  - type: text
    content: 'Va, mange ton pain avec joie, et bois ton vin le cœur content : déjà Dieu a agréé tes œuvres.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Mt 6.17.
  - type: text
    content: Qu'en tout temps tes vêtements soient blancs,
  - type: text
    content: et que l'huile ne manque pas sur ta tête.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Jouis de  : litt. vois  ; cf. Pr 5.18. –  tous les jours de la vie futile / tous tes jours futiles  : expressions presque identiques en hébreu ; la répétition est totalement ou partiellement absente de quelques mss ; cf. 6.12n.'
  - type: text
    content: Jouis de la vie avec la femme que tu aimes,
  - type: text
    content: pendant tous les jours de la vie futile que Dieu t'a donnée sous le soleil,
  - type: text
    content: pendant tous tes jours futiles ;
  - type: text
    content: car c'est ta part dans la vie et dans le travail que tu fais sous le soleil.
