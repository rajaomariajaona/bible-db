          - type: text
            text: séjour
        - type: text
          text: ' des morts'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), à rechercher le plaisir. »
      marker-yv: yv-n
    - type: text
      text: Tout ce que ta main trouve à faire, avec ta force, fais-le ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il n'y a ni activité, ni raison, ni connaissance, ni sagesse
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans le séjour des morts, où tu vas.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le malheur arrive tout à coup
    marker-yv: yv-h
