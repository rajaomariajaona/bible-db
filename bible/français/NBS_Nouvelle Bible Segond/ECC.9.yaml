          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.16 : « Il tient en son pouvoir et nous-mêmes et nos paroles. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'amour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
