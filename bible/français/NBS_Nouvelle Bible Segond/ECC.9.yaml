  '14':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Il y avait une petite ville, avec peu d''hommes ; un roi puissant vint contre elle, l''investit et bâtit contre elle de grands ouvrages de siège. '
  '15':
  - type: usfm
