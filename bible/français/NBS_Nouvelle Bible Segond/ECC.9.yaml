          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.22s : « Que le riche se trompe, beaucoup viennent à son secours, s''il profère des sottises, on lui donne raison. Mais si l''humble se trompe, on lui en fait reproche ; s''il dit des choses sensées, on n''en fait aucun cas. Qu''un riche parle, tous se taisent et portent aux nues son discours. Qu''un pauvre parle, et on dit : “Qui est-ce ?” »'
      marker-yv: yv-n
    - type: text
      text: 'J''ai dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mieux vaut la sagesse que la vaillance.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Cependant la sagesse du pauvre est méprisée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ses paroles ne sont pas écoutées.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
