      text: même sort pour le juste et pour le méchant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour le bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour le pur et pour l'impur,
  - type: usfm
    marker: q1
    children:
    - type: text
