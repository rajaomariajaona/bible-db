        - type: text
          text: devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devant eux. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains modifient le texte hébreu traditionnel pour rattacher la fin du v. 1 au v. 2 et lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout devant eux est futilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parce que tous ont un même sort…
      marker-yv: yv-n
    - type: text
      text: Tout cela, j'y ai réfléchi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ce que j'ai constaté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est que les justes, les sages et leurs labeurs
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sont dans la main de Dieu ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'amour comme la haine, l'être humain ne les connaît pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tout est devant lui.
