document_id: 1CH.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Autres descendants de Lévi
  - type: heading
    content: Nb 3.17-20
  - type: text
    content: ' '
  - type: note
    content: 'Dans certaines traductions, les v. 1-66 sont numérotés 6.16-81 (voir 5.27n). –  Fils de Lévi  : cf. 5.27n  ; la liste qui suit est plus complète, sur certains points, que celle qui précède. –  Guershom (ainsi nommé dans le chap. 6 et en 15.7) est appelé Guershôn en 5.27 ; 23.6 et dans le reste de l''A.T. (cf. Gn 46.11 ; Ex 6.16s ; Nb 3.17ss ; 4.22,38,41 ; 7.7 ; 10.17 ; 26.57 ; Jos 21.6 ; 21.27).'
  - type: text
    content: 'Fils de Lévi : Guershom, Qehath et Merari. '
  '10':
  - type: text
    content: 'Fils d''Elqana : Amasaï et Ahimoth ; '
  '11':
  - type: note
    content: 'Le texte des v. 11-13 présente plusieurs variantes dans les versions anciennes. –  Elqana, les fils d''Elqana  : autre lecture traditionnelle Elqana, son fils  ; quelques mss hébreux, LXX et Syr suppriment le deuxième Elqana. –  Tsophaï  : LXX a lu Tsouphi (cf. 1S 1.1).'
  - type: text
    content: 'Elqana, les fils d''Elqana : Tsophaï, son fils ; Nahath, son fils ; '
  '12':
  - type: note
    content: 'Eliab  : nommé Eliel au v. 19 et Elihou en 1S 1.1. –  Yeroham  : LXX porte différents noms, selon les mss ; de même au v. 19. –  Elqana  : cf. 1S 1.1.'
  - type: text
    content: 'Eliab, son fils ; Yeroham, son fils ; Elqana, son fils ; '
  '13':
  - type: note
    content: 'fils de Samuel…  : cf. 1S 8.1s ; certains mss de LXX et Syr précisent Joël, le premier-né, et le deuxième, Abiya.'
  - type: text
    content: et les fils de Samuel, le premier-né Vashni et Abiya.
  '14':
  - type: text
    content: 'Fils de Merari : Mahli ; Libni, son fils ; Shiméi, son fils ; Ouzza, son fils ; '
  '15':
  - type: note
    content: 'Hagguiya  : un ms de Syr porte Hanania.'
  - type: text
    content: Shiméa, son fils ; Hagguiya, son fils ; Asaya, son fils.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ceux que David nomma ou plaça , 15.16s ; comparer avec 6.34. –  pour diriger le chant ou pour s''occuper du chant , litt. sur les mains (ou du côté ) du chant de la maison de YHWH (25.6 ; cf. Ps 137.3). Les Chroniques mettent en évidence les activités musicales des lévites ; cf. chap. 15 ; 16 ; 25. –  dès que le Coffre…  : cf. chap. 15–16 ; 2S 6 ; Ps 132.8.'
  - type: text
    content: 'Voici ceux que David nomma pour diriger le chant de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', dès que le Coffre eut un lieu de repos : '
  '17':
  - type: note
    content: 'par le chant  : LXX porte avec des instruments (de musique). –  devant la Demeure…  : autre traduction devant la demeure de la tente de la Rencontre  ; les lévites ne sont pas autorisés à pénétrer à l''intérieur du sanctuaire (même s''il n''est que provisoire) où est déposé le Coffre ; ce privilège est réservé aux prêtres.'
  - type: text
    content: 'ils officiaient par le chant devant la Demeure, la tente de la Rencontre, jusqu''à ce que Salomon eût bâti la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Jérusalem, et ils étaient présents à leur travail selon leur règle.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'les Qehatites  : litt. les fils des Qehatites  ; des versions anciennes portent les fils de Qehath . –  Hémân est mentionné plusieurs fois dans les chap. 15, 16 et 25, en compagnie d’ Asaph (cf. v. 24) et d’ Etân (cf. v. 29), lequel est fréquemment appelé aussi Yedoutoun (cf. 16.41s). Voir aussi Ps 88.1.'
  - type: text
    content: 'Voici ceux qui étaient présents avec leurs fils. D''entre les Qehatites : Hémân, le chantre, fils de Joël, fils de Samuel, '
  '19':
  - type: note
    content: 'Yeroham  : cf. v. 12n. –  Toah  : plusieurs variantes dans les versions anciennes.'
  - type: text
    content: 'fils d''Elqana, fils de Yeroham, fils d''Eliel, fils de Toah, '
  '2':
  - type: text
    content: 'Voici les noms des fils de Guershom : Libni et Shiméi. '
  '20':
  - type: note
    content: 'Tsouph  : selon plusieurs mss hébreux et des versions anciennes ; le texte hébreu traditionnel porte Tsiph.'
  - type: text
    content: 'fils de Tsouph, fils d''Elqana, fils de Mahath, fils d''Amasaï, '
  '21':
  - type: text
    content: 'fils d''Elqana, fils de Joël, fils d''Azaria, fils de Sophonie, '
  '22':
  - type: note
    content: 'Ebiasaph  : cf. v. 8n.'
  - type: text
    content: 'fils de Tahath, fils d''Assir, fils d''Ebiasaph, fils de Coré, '
  '23':
  - type: text
    content: fils de Yitsehar, fils de Qehath, fils de Lévi, fils d'Israël.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Asaph  : cf. v. 18n  ; voir aussi Ps 73–83. –  Bérékia  : hébreu Bérékyahou , de même 15.17 ; cf. pour le même nom 2Ch 28.12 ; Za 1.7.'
  - type: text
    content: 'Asaph, son frère, qui se tenait à sa droite, Asaph, fils de Bérékia, fils de Shiméa, '
  '25':
  - type: note
    content: 'Baaséya  : quelques mss hébreux, certains mss de LXX et Syr portent Maaséya.'
  - type: text
    content: 'fils de Michel, fils de Baaséya, fils de Malkiya, '
  '26':
  - type: text
    content: 'fils d''Etni, fils de Zérah, fils d''Adaya, '
  '27':
  - type: text
    content: 'fils d''Etân, fils de Zimma, fils de Shiméi, '
  '28':
  - type: text
    content: fils de Yahath, fils de Guershom, fils de Lévi.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'leurs frères  : LXX et Syr portent le singulier leur frère . –  Etân  : cf. v. 18n  ; voir aussi Ps 89.1. –  Qishi  : plusieurs mss hébreux, des mss de LXX, ainsi que Vg portent ici Qoushi.'
  - type: text
    content: 'Fils de Merari, leurs frères, à la gauche ; Etân, fils de Qishi, fils d''Abdi, fils de Mallouk, '
  '3':
  - type: text
    content: 'Fils de Qehath : Amram, Yitsehar, Hébron et Ouzziel. '
  '30':
  - type: text
    content: 'fils de Hashabia, fils d''Amatsia, fils de Hilqiya, '
  '31':
  - type: text
    content: 'fils d''Amtsi, fils de Bani, fils de Shémer, '
  '32':
  - type: text
    content: fils de Mahli, fils de Moushi, fils de Merari, fils de Lévi.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 17n. –  chargés de  : litt. donnés à , cf. Nb 3.9n.'
  - type: text
    content: 'Leurs frères, les lévites, étaient chargés de tout le service de la Demeure, de la maison de Dieu. '
  '34':
  - type: note
    content: 'Aaron et ses fils, c.-à-d. les prêtres, seuls autorisés (cf. Lv 8–9) à offrir des sacrifices (Lv 1–7) et de l''encens (Ex 30.7-9,34-38). –  faisaient fumer des offrandes  : autre traduction offraient de l''encens. –  le Très-Sacré  : l''expression hébraïque correspondante désigne souvent la deuxième partie du sanctuaire (tente de la Rencontre ou futur temple de Salomon), l''endroit où était déposé le Coffre (cf. v. 17n) ; mais on pourrait aussi la comprendre comme signifiant ici les choses très sacrées (voir saint), c.-à-d. certaines offrandes (cf. Lv 2.3 ; 6.10 ; 7.1) réservées aux prêtres  : ils s''occupaient de tout ce qui concernait les choses très sacrées. –  faisaient l''expiation  : cf. Lv 4–5. –  Moïse, serviteur de Dieu Dn 9.11 ; Né 10.30 ; 2Ch 24.6 ; cf. Dt 34.5+ ; Ml 3.22 ; Ps 105.26.'
  - type: text
    content: 'Aaron et ses fils faisaient fumer des offrandes sur l''autel des holocaustes et sur l''autel de l''encens ; ils remplissaient toutes les fonctions dans le Très-Sacré et faisaient l''expiation sur Israël, exactement comme l''avait ordonné Moïse, serviteur de Dieu. '
  '35':
  - type: note
    content: 'fils d''Aaron  : cf. 5.29ss.'
  - type: text
    content: 'Voici les fils d''Aaron : Eléazar, son fils ; Phinéas, son fils ; Abishoua, son fils ; '
  '36':
  - type: text
    content: 'Bouqqi, son fils ; Ouzzi, son fils ; Zerahia, son fils ; '
  '37':
  - type: text
    content: 'Merayoth, son fils ; Amaria, son fils ; Ahitoub, son fils ; '
  '38':
  - type: text
    content: Tsadoq, son fils ; Ahimaats, son fils.
  - type: heading
    content: Les villes attribuées aux descendants de Lévi
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'leurs campements Gn 25.16+. –  que le sort (v. 46,48,50 ; 24.5,7,31n  ; 25.8s ; 26.13s ; Lv 16.8n) avait désignés (en premier, cf. Jos 21.10) : litt. pour eux était le sort ou le lot , cf. Jos 21.4ss.'
  - type: text
    content: Voici leurs lieux d'habitation, selon leurs campements, dans leurs territoires.
  - type: heading
    content: Jos 21.4,10-29
  - type: text
    content: 'Aux fils d''Aaron, du clan des Qehatites, que le sort avait désignés, '
  '4':
  - type: text
    content: 'Fils de Merari : Mahli et Moushi.'
  - type: text
    content: 'Voici les clans des lévites, selon leurs pères. '
  '40':
  - type: text
    content: 'on donna Hébron, au pays de Juda, avec ses abords, tout autour ; '
  '41':
  - type: text
    content: 'mais les champs de la ville et les villages qui en dépendent, on les donna à Caleb, fils de Yephounné. '
  '42':
  - type: note
    content: 'les villes  : beaucoup modifient le texte hébreu traditionnel pour lire ici le singulier, la ville, se rapportant à Hébron, comme en Jos 21.13. –  Hébron / Yattir  : Syr ajoute et ses abords, cf. Jos 21.13s ; au lieu de Yattir, LXX porte Selna (peut-être une lecture différente de Hilên, v. 43n).'
  - type: text
    content: 'Aux fils d''Aaron on donna les villes de refuge : Hébron ; Libna, avec ses abords ; Yattir ; Eshtemoa, avec ses abords ; '
  '43':
  - type: note
    content: 'Hilez  : plusieurs mss hébreux portent Hilên (v. 42n), cf. Holôn en Jos 15.51 ; 21.15.'
  - type: text
    content: 'Hilez, avec ses abords ; Debir, avec ses abords ; '
  '44':
  - type: text
    content: 'Ashân, avec ses abords ; Beth-Shémesh, avec ses abords ; '
  '45':
  - type: note
    content: 'treize villes  : la liste des v. 42-45 n''énumère que onze villes, mais la liste parallèle de Jos 21 y ajoute Youtta (v. 16) et Gabaon (v. 17).'
  - type: text
    content: 'de la tribu de Benjamin, Guéba, avec ses abords ; Alémeth, avec ses abords ; Anatoth, avec ses abords. Total de leurs villes : treize villes, d''après leurs clans.'
  - type: heading
    content: Cf. Jos 21.5-8
  '46':
  - type: text
    content: ' '
  - type: note
    content: Le texte hébreu de ce v. est en très mauvais état ; beaucoup le modifient pour lire ici le même texte qu'en Jos 21.5 ; la tribu serait alors Ephraïm , la demi-tribu Dan.
  - type: text
    content: 'Les autres fils de Qehath eurent par le sort dix villes du clan de la tribu, de la demi-tribu et de la moitié de Manassé. '
  '47':
  - type: note
    content: 'Guershom  : cf. v. 1n. –  de la tribu de Manassé  : cf. Jos 21.6 de la demi-tribu de Manassé.'
  - type: text
    content: 'Aux fils de Guershom, clan par clan, treize villes de la tribu d''Issacar, de la tribu d''Aser, de la tribu de Nephtali et de la tribu de Manassé, au Bashân. '
  '48':
  - type: text
    content: Les fils de Merari, clan par clan, eurent par le sort douze villes de la tribu de Ruben, de la tribu de Gad et de la tribu de Zabulon.
  '49':
  - type: text
    content: 'Les Israélites donnèrent aux lévites les villes avec leurs abords. '
  '5':
  - type: text
    content: 'De Guershom : Libni, son fils ; Yahath, son fils ; Zimma, son fils ; '
  '50':
  - type: note
    content: 'de la tribu des fils de Benjamin  : omis par LXX ; cf. Jos 21.9.'
  - type: text
    content: 'Ils donnèrent par le sort, de la tribu des fils de Juda, de la tribu des fils de Siméon et de la tribu des fils de Benjamin, ces villes qu''ils désignèrent par leur nom. '
  '51':
  - type: note
    content: 'Certains clans  : cf. v. 46 ; quelques mss de LXX et Vg portent les clans…  ; cf. Jos 21.20. –  dans leur territoire  ; Jos 21.20 par le sort.'
  - type: text
    content: 'Certains clans des fils de Qehath eurent dans leur territoire des villes prises sur la tribu d''Ephraïm. '
  '52':
  - type: note
    content: 'la ville  : le texte hébreu traditionnel porte le pluriel les villes  ; cf. Jos 21.21.'
  - type: text
    content: 'Ils leur donnèrent la ville de refuge : Sichem, avec ses abords, dans la région montagneuse d''Ephraïm ; Guézer, avec ses abords ; '
  '53':
  - type: text
    content: 'Yoqméam, avec ses abords ; Beth-Horôn, avec ses abords ; '
  '54':
  - type: text
    content: 'Ayyalôn, avec ses abords ; Gath-Rimmôn, avec ses abords ; '
  '55':
  - type: note
    content: 'Balaam, nom identique en hébreu (Bil‘am) à celui du prophète (Nb 22–24) ; deux mss hébreux et plusieurs versions anciennes portent Yibléam. –  pour le clan  : d''après des mss de LXX et Tg, certains modifient le texte hébreu traditionnel pour lire pour les clans.'
  - type: text
    content: de la demi-tribu de Manassé, Aner, avec ses abords ; Balaam, avec ses abords – pour le clan des autres fils de Qehath.
  '56':
  - type: text
    content: ' '
  - type: note
    content: Ashtaroth Jos 9.10+ ; 21.27 ( Béeshtra ).
  - type: text
    content: 'Aux fils de Guershom : du clan de la demi-tribu de Manassé, Golân, au Bashân, avec ses abords ; Ashtaroth, avec ses abords ; '
  '57':
  - type: note
    content: 'Issacar  : légère variante orthographique pour ce nom, de même en 2.1. –  Qédesh  : cf. v. 61 ; Qishiôn en Jos 21.27.'
  - type: text
    content: 'de la tribu d''Issacar, Qédesh, avec ses abords ; Dabrath, avec ses abords ; '
  '58':
  - type: note
    content: 'Ramoth  : LXX porte Amos ou Sabôr, selon les mss ; cf. Jos 19.21 ; 21.29. –  Anem  : cf. Jos 21.29 Eïn-Gannim.'
  - type: text
    content: 'Ramoth, avec ses abords ; Anem, avec ses abords ; '
  '59':
  - type: note
    content: 'Mashal  : Mishéal en Jos 19.26 ; 21.30.'
  - type: text
    content: 'de la tribu d''Aser, Mashal, avec ses abords ; Abdôn, avec ses abords ; '
  '6':
  - type: text
    content: Yoah, son fils ; Iddo, son fils ; Zérah, son fils ; Yéatraï, son fils.
  '60':
  - type: note
    content: 'Houqoq  : cf. Jos 21.31 Helkath.'
  - type: text
    content: 'Houqoq, avec ses abords ; Rehob, avec ses abords ; '
  '61':
  - type: note
    content: 'Hammôn  : cf. Jos 19.35 Hamath  ; Jos 21.32 Hammoth-Dor.'
  - type: text
    content: de la tribu de Nephtali, Qédesh, en Galilée, avec ses abords ; Hammôn, avec ses abords ; Qiriataïm, avec ses abords.
  '62':
  - type: text
    content: ' '
  - type: note
    content: 'Rimmono  : selon le texte hébreu traditionnel ; certains proposent de lire Rimmôn  ; LXX Remmôn  ; Jos 21.35 Dimna.'
  - type: text
    content: 'Aux autres, aux fils de Merari : de la tribu de Zabulon, Rimmono, avec ses abords ; Tabor, avec ses abords ; '
  '63':
  - type: note
    content: 'en Transjordanie, en face de Jéricho  : litt. de l''autre côté du Jourdain de Jéricho, même expression en Nb 22.1n  ; cf. Gn 50.10n  ; Jos 5.1n. –  à l''est  : LXX à l''ouest.'
  - type: text
    content: 'en Transjordanie, en face de Jéricho, à l''est du Jourdain : de la tribu de Ruben, Bétser, au désert, avec ses abords ; Yahtsa, avec ses abords ; '
  '64':
  - type: text
    content: 'Qedémoth, avec ses abords ; Méphaath, avec ses abords ; '
  '65':
  - type: note
    content: 'de la tribu de Gad  : omis par Syr.'
  - type: text
    content: 'de la tribu de Gad, Ramoth, au Galaad, avec ses abords ; Mahanaïm, avec ses abords ; '
  '66':
  - type: text
    content: Heshbôn, avec ses abords ; Yazer, avec ses abords.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Coré  : cf. Nb 16 ; 26.10s.'
  - type: text
    content: 'Fils de Qehath : Amminadab, son fils ; Coré, son fils ; Assir, son fils ; '
  '8':
  - type: note
    content: 'Ebiasaph  : certains mss hébreux et certains mss de LXX portent Abiasaph, de même au v. 22.'
  - type: text
    content: 'Elqana, son fils ; Ebiasaph, son fils ; Assir, son fils ; '
  '9':
  - type: text
    content: 'Tahath, son fils ; Uriel, son fils ; Ouzzia, son fils ; Saül, son fils. '
