document_id: EZK.44,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La porte réservée au prince
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 40.6+.
      marker-yv: yv-n
    - type: text
      text: 'Il me ramena vers la porte extérieure du sanctuaire, celle qui donnait sur l''est. Elle était fermée. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.10 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 43.19+ ; 2R 23.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour suivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: derrière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 20.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils seront chargés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ce qui concerne les lévites qui se sont éloignés de moi, quand Israël s''égarait et se détournait de moi pour suivre ses idoles, ils seront chargés de leur faute. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils officieront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 40.46'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 46.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 3.6-9,25 ; 8.18 ; 16.9 ; 18.1-7 ; 1Ch 9.17-32 ; 26.1-28 ; voir aussi Hé 13.10. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dans mon sanctuaire ils officieront, affectés aux portes de la Maison ; ils officieront pour la Maison. Ils immoleront pour le peuple les holocaustes et les autres sacrifices ; ils se tiendront debout devant lui afin d''officier pour lui. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un obstacle… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je leur jure…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comme en 20.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Parce qu''ils ont officié devant ses idoles et qu''ils ont été pour la maison d''Israël un obstacle qui fait trébucher, une cause de faute, je leur jure, à main levée, – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  – qu''ils seront chargés de leur faute. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 16.52,54 ; 32.24s,30 ; Jr 30.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacerdoce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chargés de leur confusion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 34.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils ne s''approcheront pas de moi afin d''exercer pour moi le sacerdoce ; ils ne s''approcheront pas de tout ce qui m''est consacré, des choses très sacrées ; ils seront chargés de leur confusion et des abominations qu''ils ont commises. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils feront tout son service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et de tout ce qui en dépend ; ils accompliront tout son travail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 48.18s ; sur les deux mots traduits ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 40.46'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 23.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Je les chargerai d'assurer le service de la Maison ; ils feront tout son service, tout ce qui doit s'y faire.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles pour les prêtres
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.15 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: '-lévites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de Tsadoq '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '40.46'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour me présenter la graisse et le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 7+ ; Lv 7.33.'
      marker-yv: yv-n
    - type: text
      text: 'Mais les prêtres-lévites, fils de Tsadoq, qui ont assuré le service de mon sanctuaire quand les Israélites s''égaraient loin de moi, ceux-là se présenteront devant moi afin d''officier pour moi ; ils se tiendront debout devant moi pour me présenter la graisse et le sang – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Ceux-là entreront dans mon sanctuaire ; ils se présenteront devant ma table afin d''officier pour moi et ils assureront mon service. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils n'auront sur eux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la laine ne montera pas sur eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 28.5 ; 39.27.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''ils arriveront aux portes de la cour intérieure, ils revêtiront des habits de lin ; ils n''auront sur eux rien qui soit en laine, quand ils officieront aux portes de la cour intérieure et dans la Maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 28.39-42 ; 39.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils ne mettront pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ne se ceindront pas dans la sueur.
      marker-yv: yv-n
    - type: text
      text: 'Ils auront une parure de lin sur la tête et des caleçons de lin sur les reins ; ils ne mettront pas de ceinture qui provoque la sueur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 42.14. – Le texte hébreu traditionnel répète '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la cour extérieure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'consacrer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'par le contact avec une chose sacrée (en l''occurrence les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vêtements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) 46.20 ; cf. Ex 30.29+ ; Es 65.5.
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''ils sortiront pour aller dans la cour extérieure, vers le peuple, ils quitteront les vêtements avec lesquels ils officient et les déposeront dans les salles du sanctuaire ; ils mettront d''autres vêtements, afin de ne pas consacrer le peuple par leurs vêtements. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 43.4+ ; 46.1s.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me dit : Cette porte restera fermée, elle ne s''ouvrira pas, et personne n''y passera, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, est entré par là. Elle restera fermée. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 24.17 ; Lv 10.6 ; 19.27 ; 21.5,10 ; voir aussi Nb 6.5.
      marker-yv: yv-n
    - type: text
      text: 'Ils ne se raseront pas la tête et ne laisseront pas non plus pousser librement leurs cheveux ; mais ils devront tailler leur chevelure. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 10.9.
      marker-yv: yv-n
    - type: text
      text: 'Aucun prêtre ne boira du vin lorsqu''il entrera dans la cour intérieure. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lv 21.7,13s.
      marker-yv: yv-n
    - type: text
      text: 'Ils ne prendront pour femme ni une veuve, ni une femme répudiée, mais ils prendront des vierges de la descendance de la maison d''Israël, ou une veuve si elle est la veuve d''un prêtre. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.26+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacré… profane
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils enseigneront à mon peuple la distinction entre le sacré et le profane, ils lui feront connaître la différence entre l''impur et le pur. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils feront respecter le droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'équité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en lisant ici le mot traduit plus loin, au pluriel, par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: règles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après une lecture traditionnelle du texte hébreu ; autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils se tiendront là pour juger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rencontres festives
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 23. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbats
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.20+.
      marker-yv: yv-n
    - type: text
      text: 'En cas de litige, ils feront respecter le droit et ils jugeront d''après mes règles. Ils observeront aussi mes lois et mes prescriptions lors de toutes mes rencontres festives, et ils feront de mes sabbats des jours sacrés. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '44.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 21.1-4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Un prêtre n'ira pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'ira pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
