document_id: EZK.44,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La porte réservée au prince
  - type: text
    content: ' '
  - type: note
    content: 40.6+.
  - type: text
    content: 'Il me ramena vers la porte extérieure du sanctuaire, celle qui donnait sur l''est. Elle était fermée. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'lévites  : cf. 43.19+ ; 2R 23.9. –  pour suivre  : litt. derrière , comme en 20.16n. –  ils seront chargés…  : cf. 4.4n.'
  - type: text
    content: 'En ce qui concerne les lévites qui se sont éloignés de moi, quand Israël s''égarait et se détournait de moi pour suivre ses idoles, ils seront chargés de leur faute. '
  '11':
  - type: note
    content: 'ils officieront  : cf. 40.46n  ; 46.24n  ; Nb 3.6-9,25 ; 8.18 ; 16.9 ; 18.1-7 ; 1Ch 9.17-32 ; 26.1-28 ; voir aussi Hé 13.10. – Voir sacrifices.'
  - type: text
    content: 'Dans mon sanctuaire ils officieront, affectés aux portes de la Maison ; ils officieront pour la Maison. Ils immoleront pour le peuple les holocaustes et les autres sacrifices ; ils se tiendront debout devant lui afin d''officier pour lui. '
  '12':
  - type: note
    content: 'un obstacle… 7.19n. –  je leur jure…  : comme en 20.5n.'
  - type: text
    content: 'Parce qu''ils ont officié devant ses idoles et qu''ils ont été pour la maison d''Israël un obstacle qui fait trébucher, une cause de faute, je leur jure, à main levée, – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  – qu''ils seront chargés de leur faute. '
  '13':
  - type: note
    content: 'Cf. 16.52,54 ; 32.24s,30 ; Jr 30.21. –  sacerdoce  : voir prêtre. –  consacré  : voir saint. –  chargés de leur confusion  : cf. 34.29n.'
  - type: text
    content: 'Ils ne s''approcheront pas de moi afin d''exercer pour moi le sacerdoce ; ils ne s''approcheront pas de tout ce qui m''est consacré, des choses très sacrées ; ils seront chargés de leur confusion et des abominations qu''ils ont commises. '
  '14':
  - type: note
    content: 'ils feront tout son service  : autre traduction et de tout ce qui en dépend ; ils accompliront tout son travail, comme en 48.18s ; sur les deux mots traduits ici par service, voir 40.46n  ; Nb 3.7n,26n  ; 1Ch 23.32n.'
  - type: text
    content: Je les chargerai d'assurer le service de la Maison ; ils feront tout son service, tout ce qui doit s'y faire.
  - type: heading
    content: Règles pour les prêtres
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'prêtres-lévites 43.19. –  fils de Tsadoq 40.46n. –  pour me présenter la graisse et le sang  : cf. v. 7+ ; Lv 7.33.'
  - type: text
    content: 'Mais les prêtres-lévites, fils de Tsadoq, qui ont assuré le service de mon sanctuaire quand les Israélites s''égaraient loin de moi, ceux-là se présenteront devant moi afin d''officier pour moi ; ils se tiendront debout devant moi pour me présenter la graisse et le sang – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '16':
  - type: text
    content: 'Ceux-là entreront dans mon sanctuaire ; ils se présenteront devant ma table afin d''officier pour moi et ils assureront mon service. '
  '17':
  - type: note
    content: 'ils n''auront sur eux…  : litt. la laine ne montera pas sur eux  ; cf. Ex 28.5 ; 39.27.'
  - type: text
    content: 'Lorsqu''ils arriveront aux portes de la cour intérieure, ils revêtiront des habits de lin ; ils n''auront sur eux rien qui soit en laine, quand ils officieront aux portes de la cour intérieure et dans la Maison. '
  '18':
  - type: note
    content: 'Ex 28.39-42 ; 39.28. –  parure 24.17n. –  ils ne mettront pas…  : litt. ils ne se ceindront pas dans la sueur.'
  - type: text
    content: 'Ils auront une parure de lin sur la tête et des caleçons de lin sur les reins ; ils ne mettront pas de ceinture qui provoque la sueur. '
  '19':
  - type: note
    content: Cf. 42.14. – Le texte hébreu traditionnel répète dans la cour extérieure. –  consacrer par le contact avec une chose sacrée (en l'occurrence les vêtements) 46.20 ; cf. Ex 30.29+ ; Es 65.5.
  - type: text
    content: 'Lorsqu''ils sortiront pour aller dans la cour extérieure, vers le peuple, ils quitteront les vêtements avec lesquels ils officient et les déposeront dans les salles du sanctuaire ; ils mettront d''autres vêtements, afin de ne pas consacrer le peuple par leurs vêtements. '
  '2':
  - type: note
    content: 43.4+ ; 46.1s.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Cette porte restera fermée, elle ne s''ouvrira pas, et personne n''y passera, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, est entré par là. Elle restera fermée. '
  '20':
  - type: note
    content: Cf. 24.17 ; Lv 10.6 ; 19.27 ; 21.5,10 ; voir aussi Nb 6.5.
  - type: text
    content: 'Ils ne se raseront pas la tête et ne laisseront pas non plus pousser librement leurs cheveux ; mais ils devront tailler leur chevelure. '
  '21':
  - type: note
    content: Cf. Lv 10.9.
  - type: text
    content: 'Aucun prêtre ne boira du vin lorsqu''il entrera dans la cour intérieure. '
  '22':
  - type: note
    content: Cf. Lv 21.7,13s.
  - type: text
    content: 'Ils ne prendront pour femme ni une veuve, ni une femme répudiée, mais ils prendront des vierges de la descendance de la maison d''Israël, ou une veuve si elle est la veuve d''un prêtre. '
  '23':
  - type: note
    content: '22.26+. –  sacré… profane  : voir saint. – Voir pur.'
  - type: text
    content: 'Ils enseigneront à mon peuple la distinction entre le sacré et le profane, ils lui feront connaître la différence entre l''impur et le pur. '
  '24':
  - type: note
    content: 'ils feront respecter le droit ou l''équité, en lisant ici le mot traduit plus loin, au pluriel, par règles, d''après une lecture traditionnelle du texte hébreu ; autre lecture traditionnelle ils se tiendront là pour juger  ; voir loi. –  rencontres festives  : cf. Gn 1.14n  ; Lv 23. –  sabbats 20.20+.'
  - type: text
    content: 'En cas de litige, ils feront respecter le droit et ils jugeront d''après mes règles. Ils observeront aussi mes lois et mes prescriptions lors de toutes mes rencontres festives, et ils feront de mes sabbats des jours sacrés. '
  '25':
  - type: note
    content: 'Cf. Lv 21.1-4. –  Un prêtre n''ira pas  : litt. il n''ira pas. –  un mort  : litt. un humain (hébreu ’adam) mort.'
  - type: text
    content: 'Un prêtre n''ira pas vers un mort, de peur de se rendre impur ; il ne pourra se rendre impur que pour un père, pour une mère, pour un fils, pour une fille, pour un frère et pour une sœur qui n''est pas mariée. '
  '26':
  - type: note
    content: Cf. Nb 19.12-19.
  - type: text
    content: 'Après sa purification, on comptera pour lui sept jours. '
  '27':
  - type: note
    content: 'Cf. 42.13 ; 43.21. –  pour officier dans le sanctuaire  : même formule en Ex 29.30 ; 35.19 ; 39.1,41.'
  - type: text
    content: 'Le jour où il entrera dans le sanctuaire, dans la cour intérieure pour officier dans le sanctuaire, il présentera le sacrifice pour son propre péché – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Voici leur patrimoine  : litt. et ce sera pour eux un patrimoine  ; certains mss latins ont lu ils n''auront pas de patrimoine  ; cf. Nb 18.20-24 ; Dt 10.9 ; 18.1s.'
  - type: text
    content: 'Voici leur patrimoine : c''est moi qui suis leur patrimoine. Vous ne leur donnerez pas de propriété en Israël : c''est moi qui suis leur propriété. '
  '29':
  - type: note
    content: offrandes végétales 42.13+. –  sacrifices pour le péché / de réparation 40.39+ ; cf. Lv 7.7. –  anathème Nb 18.14+ ; voir bénédiction, malédiction.
  - type: text
    content: 'Ils se nourriront des offrandes végétales, des sacrifices pour le péché et des sacrifices de réparation ; et tout ce qui sera frappé d''anathème en Israël sera pour eux. '
  '3':
  - type: note
    content: '46.2,12. –  le prince, en tant que prince  : formule inhabituelle en hébreu ; certains modifient le texte hébreu traditionnel pour lire quant au prince, il pourra… ; seul le prince pourra… ; instructions pour le prince : il pourra… 34.24+ ; 45.9n. –  s''y asseoir  : probablement dans l''une des loges de la porte ; cf. 40.7ss. –  manger le pain devant le Seigneur  : c.-à-d. participer au repas qui fait suite aux sacrifices (de paix en particulier) ; cf. 18.6+ ; 39.17n  ; 42.13+ ; 43.27+. –  par le vestibule  : litt. par le chemin du vestibule. –  par le même chemin 46.8n.'
  - type: text
    content: 'Mais le prince, en tant que prince, pourra s''y asseoir, pour manger le pain devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . Il entrera par le vestibule de la porte et il sortira par le même chemin.
  - type: heading
    content: Les étrangers ne seront pas admis au temple
  '30':
  - type: note
    content: '20.40+. –  prémices / premiers fruits  : cf. Ex 23.19 ; 34.26 ; Lv 2.14n  ; voir aussi Nb 18.11. –  tous vos prélèvements  : litt. tous vos prélèvements de tout parmi tous vos prélèvements  ; cf. Nb 15.20 ; 18.12. –  prémices de votre pâte Nb 15.20s ; Né 10.38.'
  - type: text
    content: 'Les prémices de tous les premiers fruits et tous vos prélèvements sans exception appartiendront aux prêtres ; vous donnerez au prêtre les prémices de votre pâte – afin que la bénédiction repose sur ta maison. '
  '31':
  - type: note
    content: 4.14+ ; Lv 22.8.
  - type: text
    content: Les prêtres ne mangeront aucune bête crevée ou déchiquetée, qu'il s'agisse d'oiseau ou de bétail.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 43.5+. –  face contre terre 1.28n.
  - type: text
    content: 'Il me conduisit vers la porte nord, devant la Maison. Je regardai : la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplissait la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Je tombai face contre terre. '
  '5':
  - type: note
    content: 'fais attention  : litt. mets ton cœur  ; cf. 40.4n. –  prescriptions 43.11n. –  accès / issues  : certains, d''après des versions araméennes, comprennent respectivement ceux qui sont admis et ceux qui sont exclus du sanctuaire  ; cf. 40.16n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Humain, fais attention ! Regarde de tes yeux et écoute de tes oreilles tout ce que je te dirai au sujet de toutes les prescriptions de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de toutes ses lois ; fais attention à l''accès de la Maison et à toutes les issues du sanctuaire. '
  '6':
  - type: note
    content: 'aux rebelles  : LXX à la maison rebelle  ; cf. 2.5+. –  Cela suffit 45.9 ; cf. Nb 16.3n.'
  - type: text
    content: 'Tu diras aux rebelles, à la maison d''Israël : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Cela suffit, avec toutes vos abominations, maison d''Israël ! '
  '7':
  - type: note
    content: 'des étrangers v. 9 ; cf. Jos 9.27 ; Esd 2.43-58 ; 8.20 ; Ac 21.28 ; voir par contraste Es 56.6s. –  incirconcis de cœur…  : cf. Dt 10.16 ; 30.6 ; Jr 4.4 ; 6.10 ; 9.25 ; voir aussi circoncision. –  on a rompu ou ils ont rompu  ; des versions anciennes ont lu vous avez rompu  ; cf. 23.39 ; certains comprennent vous avez rompu mon alliance en présentant mon pain, la graisse et le sang (v. 15 ; cf. Lv 3.3n,16-17+ ; 21.6n) à toutes vos abominations (5.9+).'
  - type: text
    content: 'Vous avez introduit dans mon sanctuaire des étrangers incirconcis de cœur et incirconcis de chair, pour profaner ma maison. Au moment où vous présentiez mon pain, la graisse et le sang, on a rompu mon alliance au profit de toutes vos abominations. '
  '8':
  - type: note
    content: 'Vous n''avez pas assuré… 40.45n. –  ce qui m''est consacré  : cf. 22.8n. –  vous avez installé ces gens-là  : litt. vous les avez installés  ; cf. 2Ch 13.9-11.'
  - type: text
    content: Vous n'avez pas assuré le service de ce qui m'est consacré, mais vous avez installé ces gens-là pour assurer le service à votre place dans mon sanctuaire.
  '9':
  - type: text
    content: ' '
  - type: note
    content: incirconcis v. 7+ ; cf. Es 52.1. –  qui sont au milieu… 14.7 ; 22.7 ; cf. 44.22s ; Dt 23.8s ; 29.10 ; Né 13.3.
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Aucun étranger, incirconcis de cœur et incirconcis de chair, n''entrera dans mon sanctuaire, aucun des étrangers qui sont au milieu des Israélites.'
  - type: heading
    content: Règles pour les lévites
