document_id: PSA.100,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nous sommes son peuple
  - type: text
    content: ' '
  - type: note
    content: de reconnaissance v. 4 ; cf. 26.7n  ; 95.2n  ; Lv 7.12ns. –  Acclame… 98.4+.
  - type: text
    content: Psaume de reconnaissance.
  - type: text
    content: 'Acclame le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: terre entière !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Servez…  : cf. 68.4 ; Dt 28.47 ; Jos 24.15ss ; Né 8.10. –  en sa présence ou devant lui  ; cf. 95.6 ; 98.6+ ; Ex 34.24 ; Es 1.12 ; 1Ch 16.29.'
  - type: text
    content: 'Servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec joie,'
  - type: text
    content: entrez en sa présence avec des cris de joie !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Sachez…  : autre traduction reconnaissez…  ; cf. 46.11 ; 95.7 ; 105.7 ; Dt 4.35,39 ; 1R 18.36ss ; Ez 6.7 ; 34.31. –  qui nous a faits 95.6+. –  et nous lui appartenons  : autre lecture traditionnelle et non pas nous-mêmes. –  son peuple…  : cf. 74.1+ ; 95.7.'
  - type: text
    content: 'Sachez que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est Dieu :'
  - type: text
    content: c'est lui qui nous a faits, et nous lui appartenons ;
  - type: text
    content: nous sommes son peuple, le troupeau qu'il fait paître.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '5.8 ; 95.2 ; 116.17-19 ; 118.19. –  reconnaissance  : autre traduction un sacrifice de reconnaissance  ; le terme hébreu correspondant (26.7n) est apparenté au verbe traduit par Célébrez. –  les cours de son temple  : litt. ses cours . –  bénissez son nom 96.2.'
  - type: text
    content: Entrez par ses portes avec reconnaissance,
  - type: text
    content: entrez dans les cours de son temple avec des louanges !
  - type: text
    content: Célébrez-le, bénissez son nom !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 25.8+ ; 106.1 ; 117.2 ; 118.1 ; 136.1 ; Lc 1.50.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon : sa fidélité est pour toujours,'
  - type: text
    content: sa constance de génération en génération.
