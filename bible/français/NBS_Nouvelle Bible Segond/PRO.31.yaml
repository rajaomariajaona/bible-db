document_id: PRO.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Conseils à un roi
  - type: text
    content: ' '
  - type: note
    content: 'LXX place les v. 1-9 de ce chapitre après 30.15-33, c.-à-d. (cf. 30.15n) avant les chapitres 25–29. En revanche LXX comme le texte hébreu traditionnel ont 31.10-31 à la fin du livre. –  du roi Lemouel. Sentence  : certains lisent de Lemouel, roi de Massa (voir 30.1n). –  sa mère…  : ces conseils destinés au roi sont attribués à une femme, ce qui est exceptionnel dans l''A.T. mais correspond à une tendance caractéristique de la littérature de sagesse (voir ♦) ; cf. 1.8+. –  l''instruisit ou le corrigea 1.2n  ; 9.7n.'
  - type: text
    content: Paroles du roi Lemouel. Sentence par laquelle sa mère l'instruisit.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Qui trouvera…  : à partir d''ici commence un poème alphabétique : les initiales des 22 vers correspondent à l''ordre des lettres dans l''alphabet hébreu ; cf. Ps 9.1n  ; 25.1n. –  une femme de valeur  : cf. v. 29 ; 12.4n. Cet éloge de la femme parfaite a parfois été compris allégoriquement, comme une description de la Sagesse personnifiée (cf. 8.22ss). Sur l''ensemble de ce poème, cf. 14.1 ; 1P 3.1-6.'
  - type: text
    content: Qui trouvera une femme de valeur ?
  - type: text
    content: Son prix dépasse de loin celui des coraux.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le bénéfice  : litt. le butin.'
  - type: text
    content: Le cœur de son mari a confiance en elle,
  - type: text
    content: et le bénéfice ne manque pas.
  '12':
  - type: text
    content: Elle lui fait du bien, et non pas du mal,
  - type: text
    content: tous les jours de sa vie.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Elle se procure  : litt. elle cherche . –  travaille…  : autre traduction se consacre à ses activités.'
  - type: text
    content: Elle se procure de la laine et du lin
  - type: text
    content: et travaille de ses mains avec plaisir.
  '14':
  - type: text
    content: Elle est comme les bateaux d'un marchand,
  - type: text
    content: elle fait venir son pain de loin.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ses instructions  : autre traduction leurs rations  ; cf. 27.27.'
  - type: text
    content: Elle se lève lorsqu'il fait encore nuit,
  - type: text
    content: elle donne de quoi manger à sa maison,
  - type: text
    content: elle donne ses instructions à ses servantes.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'du fruit de ses mains  : c.-à-d. du produit de son travail  ; expression analogue v. 31. –  elle plante  : autre lecture traditionnelle il plante.'
  - type: text
    content: Elle pense à un champ et elle l'acquiert ;
  - type: text
    content: du fruit de ses mains elle plante une vigne.
  '17':
  - type: text
    content: Elle ceint ses reins de force,
  - type: text
    content: elle affermit ses bras.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ce qu''elle gagne  : autres traductions son commerce ; son activité.'
  - type: text
    content: Elle sent que ce qu'elle gagne est bon ;
  - type: text
    content: sa lampe ne s'éteint pas la nuit.
  '19':
  - type: text
    content: ' '
  - type: note
    content: tiennent ou tiennent ferme 5.5n.
  - type: text
    content: Elle met la main à la quenouille,
  - type: text
    content: ses mains tiennent le fuseau.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Que te dirai-je  : litt. quoi  ; autre traduction possible non  ; LXX que garderas-tu, mon enfant ? Quoi ? les paroles de Dieu. Mon fils unique, je te parle, mon fils. Quoi, fils de mon ventre ? Quoi, fils de mes vœux ? –  fils  : le terme correspondant apparaît ici dans sa forme araméenne ( bar ). –  fils de mon ventre Es 49.15 ; voir aussi Gn 15.4n  ; Jb 19.17.'
  - type: text
    content: Que te dirai-je, mon fils ? Que te dirai-je, fils de mon ventre ?
  - type: text
    content: Que te dirai-je, fils de mes vœux ?
  '20':
  - type: text
    content: Elle ouvre ses mains pour le pauvre,
  - type: text
    content: elle tend la main au déshérité.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'd''écarlate  : cf. Ex 25.4n  ; des versions anciennes ont lu un mot très voisin qui signifierait double ou doublé , et pourrait désigner des vêtements chauds.'
  - type: text
    content: 'Elle ne craint pas la neige pour sa maison :'
  - type: text
    content: toute sa maison est vêtue d'écarlate.
  '22':
  - type: text
    content: ' '
  - type: note
    content: couvertures 7.16n.
  - type: text
    content: Elle se fait des couvertures,
  - type: text
    content: elle a des vêtements de fin lin et de pourpre rouge.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'reconnu  : litt. connu . –  aux portes ( de la ville est sous-entendu dans le texte) : cf. v. 31 ; Dt 16.18n. –  lorsqu''il est assis  : position de celui qui juge.'
  - type: text
    content: Son mari est reconnu aux portes de la ville,
  - type: text
    content: lorsqu'il est assis avec les anciens du pays.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'des sous-vêtements  : le terme correspondant est au singulier (collectif ?) ; sur ce terme rare, voir Jg 14.12ns ; Es 3.23. –  des ceintures  : litt. une ceinture . –  au marchand  : litt. au Cananéen , type du marchand ambulant (cf. Jb 40.30).'
  - type: text
    content: Elle fait des sous-vêtements et les vend,
  - type: text
    content: elle livre des ceintures au marchand.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'de l''avenir  : litt. du jour d''après.'
  - type: text
    content: Elle est revêtue de force et de dignité,
  - type: text
    content: elle se rit de l'avenir.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 1 ; 6.20. –  sa langue…  : litt. un enseignement (ou une loi , 1.8n) de fidélité est sur sa langue.'
  - type: text
    content: Elle ouvre la bouche avec sagesse,
  - type: text
    content: sa langue enseigne la fidélité.
  '27':
  - type: text
    content: Elle surveille la marche de sa maison,
  - type: text
    content: elle ne mange pas le pain de la paresse.
  '28':
  - type: text
    content: Ses fils se lèvent, ils la déclarent heureuse ;
  - type: text
    content: son mari se lève, il la loue.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Beaucoup de filles…  : cf. Ct 6.8s.'
  - type: text
    content: Beaucoup de filles ont montré leur valeur ;
  - type: text
    content: toi, tu les surpasses toutes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ne livre pas…  : comparer les v. 2-9 avec 3.4 ; 5.1-14 ; 6.20-35 ; 16.12s ; 29.14 ; voir aussi Dt 17.15-20 ; 1R 11.4 ; Ec 10.16s. –  tes voies  : certains modifient le texte hébreu traditionnel pour lire tes cuisses (ou tes flancs ), ou encore tes caresses.'
  - type: text
    content: Ne livre pas ta vigueur aux femmes,
  - type: text
    content: tes voies à celles qui perdent les rois.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'la femme qui craint le Seigneur  : on pourrait aussi comprendre la femme (qui est) la crainte du Seigneur  ; cf. 1.7+.'
  - type: text
    content: La grâce est trompeuse et la beauté futile ;
  - type: text
    content: 'la femme qui craint le '
  - type: text
    content: Seigneur
  - type: text
    content: ', voilà celle qui sera louée.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'fruit de ses mains  : cf. v. 16n. –  la louent  : la formule hébraïque ( wihalelouha ) rappelle la formule des Psaumes, louez le Seigneur ( halelou-Yah , d''où alléluia , voir Ps 104.35n).'
  - type: text
    content: Donnez-lui du fruit de ses mains ;
  - type: text
    content: qu'aux portes de la ville ses œuvres la louent !
  '4':
  - type: text
    content: ' '
  - type: note
    content: vin / alcool v. 6 ; 20.1 ; Lv 10.9n.
  - type: text
    content: Ce n'est pas aux rois, Lemouel,
  - type: text
    content: ce n'est pas aux rois de boire du vin,
  - type: text
    content: ni aux princes de rechercher de l'alcool,
  '5':
  - type: text
    content: ' '
  - type: note
    content: les pauvres ou les affligés.
  - type: text
    content: de peur qu'en buvant ils n'oublient ce qui a été prescrit
  - type: text
    content: et ne dénaturent la cause de tous les pauvres.
  '6':
  - type: text
    content: Donnez de l'alcool à celui qui va disparaître,
  - type: text
    content: du vin à celui qui est amer ;
  '7':
  - type: text
    content: qu'il boive et qu'il oublie sa pauvreté,
  - type: text
    content: qu'il ne se souvienne plus de sa peine !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'de tous les délaissés  : litt. de tous les fils de ce qui passe.'
  - type: text
    content: Ouvre ta bouche pour le muet,
  - type: text
    content: pour la cause de tous les délaissés.
  '9':
  - type: text
    content: Ouvre ta bouche, juge avec justice
  - type: text
    content: et défends la cause du pauvre et du déshérité.
  - type: heading
    content: Portrait de la femme de valeur
