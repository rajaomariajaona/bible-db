          - type: text
            text: n
        - type: text
          text: . Cet éloge de la femme parfaite a parfois été compris allégoriquement, comme une description de la Sagesse personnifiée (cf. 8.22ss). Sur l'ensemble de ce poème, cf. 14.1 ; 1P 3.1-6.
      marker-yv: yv-n
    - type: text
      text: Qui trouvera une femme de valeur ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Son prix dépasse de loin celui des coraux.
