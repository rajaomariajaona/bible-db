        marker: fq
        children:
        - type: text
          text: du roi Lemouel. Sentence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains lisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de Lemouel, roi de Massa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir 30.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa mère…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ces conseils destinés au roi sont attribués à une femme, ce qui est exceptionnel dans l''A.T. mais correspond à une tendance caractéristique de la littérature de sagesse (voir ♦) ; cf. 1.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''instruisit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le corrigea '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Paroles du roi Lemouel. Sentence par laquelle sa mère l'instruisit.
