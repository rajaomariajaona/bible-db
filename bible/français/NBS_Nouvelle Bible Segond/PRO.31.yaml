        - type: text
          text: ' place les v. 1-9 de ce chapitre après 30.15-33, c.-à-d. (cf. 30.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') avant les chapitres 25–29. En revanche LXX comme le texte hébreu traditionnel ont 31.10-31 à la fin du livre. –  '
