document_id: JHN.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et la Samaritaine
  - type: text
    content: ' '
  - type: note
    content: 'Jésus  : certains mss portent le Seigneur . –  pharisiens 1.24+. –  qu''il faisait…  : litt. que Jésus faisait… –  baptisait 3.22,26.'
  - type: text
    content: 'Jésus ayant su que les pharisiens avaient entendu dire qu''il faisait et baptisait plus de disciples que Jean, '
  '10':
  - type: note
    content: 'don de Dieu  : cf. Ac 8.20. –  celui qui te dit  : cf. v. 26+. –  eau vive (litt. vivante, cf. 6.51) : l''expression désigne une eau courante, non stagnante, susceptible d''évoquer métaphoriquement la vie elle-même ; cf. 7.37s ; Gn 26.19 ; Jr 2.13 ; Za 14.8 ; Ap 21.6 ; 22.17. Epître d''Ignace d''Antioche aux Romains 7.2 : « Mon désir terrestre a été crucifié, et il n''y a plus en moi de feu pour aimer la matière, mais en moi une eau vive qui murmure et qui dit au dedans de moi : “Viens vers le Père.” »'
  - type: text
    content: 'Jésus lui répondit : Si tu connaissais le don de Dieu, et qui est celui qui te dit : « Donne-moi à boire », c''est toi qui le lui aurais demandé, et il t''aurait donné de l''eau vive. '
  '11':
  - type: note
    content: 'Cf. Gn 21.19. –  lui dit la femme  : certains mss portent seulement lui dit(-elle).'
  - type: text
    content: '– Seigneur, lui dit la femme, tu n''as rien pour puiser, et le puits est profond ; d''où aurais-tu donc cette eau vive ? '
  '12':
  - type: note
    content: Cf. 6.31-33 ; 8.53 ; Mt 12.41s.
  - type: text
    content: 'Serais-tu, toi, plus grand que Jacob, notre père, qui nous a donné ce puits et qui en a bu lui-même, ainsi que ses fils et ses troupeaux ? '
  '13':
  - type: note
    content: Cf. Jr 2.13.
  - type: text
    content: 'Jésus lui répondit : Quiconque boit de cette eau aura encore soif ; '
  '14':
  - type: note
    content: 'n(e)… jamais  : cette négation traduit une formule grecque (aussi en 8.51s ; 10.28 ; 11.26 ; 13.8) opposée à celle qui correspond à pour toujours en 6.51,58 ; 8.35 ; 12.34 ; 14.16 ; 1Jn 2.17 ; 2Jn 2, litt. pour l''éon (sur ce mot, voir Ep 2.2n) ou, selon une traduction traditionnelle du terme, pour le siècle  ; outre le sens temporel évident toujours / jamais (cf. p. ex. 1Co 8.13 ; voir aussi Jn 6.35n), le grec peut évoquer un rapport, positif ou négatif, à l’éternité ou au monde à venir (cf. Mt 12.32n). –  jamais soif 6.27,35,53s. –  une source d''eau qui jaillira pour la (ou en) vie éternelle (même formule v. 36) : cf. 7.38s ; 19.34 ; Es 58.11 ; voir aussi 12.3 ; 44.3 ; 49.10 ; Jr 2.13 ; 17.13 ; Ez 47.1ss. Evangile selon Thomas 13 : « Jésus a dit à ses disciples : “Faites une comparaison, et dites-moi à qui je ressemble.” Simon Pierre lui dit : “Tu es semblable à un ange juste.” Matthieu lui dit : “Tu es semblable à un philosophe intelligent.” Thomas lui dit : “Maître, ma bouche est tout à fait incapable de dire à qui tu es semblable.” Jésus répondit : “Je ne suis pas ton maître ; puisque tu as bu, tu t''es enivré à la source bouillonnante que j''ai fait jaillir.” »'
  - type: text
    content: 'celui qui boira de l''eau que, moi, je lui donnerai, celui-là n''aura jamais soif : l''eau que je lui donnerai deviendra en lui une source d''eau qui jaillira pour la vie éternelle. '
  '15':
  - type: note
    content: 6.34.
  - type: text
    content: 'La femme lui dit : Seigneur, donne-moi cette eau-là, pour que je n''aie plus soif et que je n''aie plus à venir puiser ici. '
  '16':
  - type: text
    content: '– Va, lui dit-il, appelle ton mari et reviens ici. '
  '17':
  - type: text
    content: 'La femme répondit : Je n''ai pas de mari. Jésus lui dit : Tu as raison de dire : « Je n''ai pas de mari. » '
  '18':
  - type: note
    content: 'Cf. 2.25+ ; certains voient dans les cinq maris une allusion aux cinq cultes non juifs rattachés à l''origine du culte samaritain en 2R 17.29-41 ; dans cette perspective, celui que tu as maintenant serait le Dieu d''Israël, dont les Samaritains se réclameraient d''une façon plus ou moins illégitime. Toutefois rien n''impose cette lecture allégorique : Jésus peut simplement décrire la vie privée de la Samaritaine (v. 19).'
  - type: text
    content: 'Car tu as eu cinq maris, et celui que tu as maintenant n''est pas ton mari. En cela tu as dit vrai. '
  '19':
  - type: note
    content: 'tu es prophète  : cf. 1.21+ ; voir aussi Lc 7.39.'
  - type: text
    content: '– Seigneur, lui dit la femme, je vois que, toi, tu es prophète. '
  '2':
  - type: note
    content: Cf. 1Co 1.14-17.
  - type: text
    content: '– en fait, ce n''était pas Jésus lui-même qui baptisait, mais ses disciples – '
  '20':
  - type: note
    content: 'adoré  : le verbe correspondant, ici et dans la suite, est aussi traduit par se prosterner (9.38) ; voir Mt 2.2n  ; voir aussi culte. –  cette montagne  : le mont Garizim, près de Sichem, sur lequel avait été bâti le temple samaritain détruit environ 150 ans avant l''époque de Jésus ; cf. Dt 11.29 ; 27.12 ; Jos 8.33. –  le lieu  : on peut comprendre, dans un sens fort, le lieu sacré ou saint, comme en 11.48n. –  Jérusalem  : cf. Dt 12.5+ ; 1R 9.3 ; Ps 122.1-5.'
  - type: text
    content: 'Nos pères ont adoré sur cette montagne ; vous, vous dites que le lieu où il faut adorer est à Jérusalem. '
  '21':
  - type: note
    content: Cf. 2.19+ ; 1R 8.27 ; Es 66.1 ; Ml 1.11 ; Ac 6.14 ; 7.47s.
  - type: text
    content: 'Jésus lui dit : Femme, crois-moi, l''heure vient où ce ne sera ni sur cette montagne ni à Jérusalem que vous adorerez le Père. '
  '22':
  - type: note
    content: 'ce que vous ne connaissez pas  : cf. 2R 17.24-33 ; Ac 17.23. –  le salut vient des Juifs  : cf. Es 2.3 ; Rm 9.3s ; 11.18.'
  - type: text
    content: 'Vous, vous adorez ce que vous ne connaissez pas ; nous, nous adorons ce que nous connaissons, car le salut vient des Juifs. '
  '23':
  - type: note
    content: l'heure (cf. 2.4+) vient – c'est maintenant 5.25 ; cf. Rm 13.11. –  en esprit 3.5-8 ; cf. Rm 12.1 ; Ep 2.18 ; Ph 3.3 ; autre traduction par l'Esprit et la vérité. –  vérité 8.32+ ; cf. 1Jn 3.18 ; 5.6.
  - type: text
    content: 'Mais l''heure vient – c''est maintenant – où les vrais adorateurs adoreront le Père en esprit et en vérité ; car tels sont les adorateurs que le Père cherche. '
  '24':
  - type: note
    content: Dieu est Esprit 2Co 3.17s.
  - type: text
    content: 'Dieu est Esprit, et il faut que ceux qui l''adorent l''adorent en esprit et en vérité. '
  '25':
  - type: note
    content: Je sais… Dt 18.18,22. –  Messie / Christ 1.41n. Les Samaritains appelaient Ta‘eb (celui qui revient) le Messie qu'ils attendaient ; il devait surtout avoir pour fonction d'enseigner et de révéler (cf. Dt 18.15ss) ; voir aussi onction. –  il nous annoncera tout 14.26.
  - type: text
    content: 'La femme lui dit : Je sais que le Messie vient – celui qu''on appelle Christ. Quand il viendra, lui, il nous annoncera tout. '
  '26':
  - type: note
    content: 'C''est moi qui te parle  : autres traductions moi, je suis celui qui te parle ; je le suis, moi qui te parle  ; litt. moi je suis, formule couramment employée au sens de c''est moi, c''est moi qui suis… (cf. 6.20 ; 9.9 ; 18.5 ; Mt 14.27n  ; Mc 6.50n  ; 14.61s), mais qui a souvent chez Jean un sens plus profond (voir 8.24n  ; 18.6 ; cf. 6.35+). –  qui te parle v. 10 ; 9.37 ; cf. Es 52.6 (formulation presque identique dans LXX).'
  - type: text
    content: 'Jésus lui dit : C''est moi qui te parle.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Que cherches-tu  : cf. v. 23 ; 1.38+.'
  - type: text
    content: 'Là-dessus arrivèrent ses disciples, qui s''étonnaient de le voir parler avec une femme. Toutefois aucun ne dit : « Que cherches-tu ? » ou : « De quoi parles-tu avec elle ? » '
  '28':
  - type: note
    content: jarre 2.6ns.
  - type: text
    content: 'La femme laissa donc sa jarre, s''en alla dans la ville et dit aux gens : '
  '29':
  - type: note
    content: 'Il y a là  : sous-entendu dans le texte. –  tout ce que j''ai fait v. 18,39. –  le Christ 7.26 ; cf. Mt 12.23.'
  - type: text
    content: 'Venez voir ! Il y a là un homme qui m''a dit tout ce que j''ai fait ! Serait-ce le Christ ? '
  '3':
  - type: note
    content: Judée 3.22+. –  Galilée 1.43+ ; cf. Mt 4.13-17 ; Mc 1.14s ; Lc 4.14s.
  - type: text
    content: il quitta la Judée et retourna en Galilée.
  '30':
  - type: text
    content: Ils sortirent de la ville pour venir à lui.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'V. 8. –  lui disaient  : litt. lui demandaient.'
  - type: text
    content: 'Pendant ce temps, les disciples lui disaient : '
  - type: text
    content: Rabbi,
  - type: text
    content: ' mange ! '
  '32':
  - type: note
    content: 6.27.
  - type: text
    content: 'Mais il leur dit : Moi, j''ai à manger une nourriture que, vous, vous ne connaissez pas. '
  '33':
  - type: note
    content: Cf. 2.20n  ; Mt 16.7.
  - type: text
    content: 'Les disciples se disaient donc les uns aux autres : Quelqu''un lui aurait-il apporté à manger ? '
  '34':
  - type: note
    content: 'faire la volonté 5.30 ; 6.38ss ; 7.17 ; 9.31 ; Hé 10.7-10 ; 1Jn 2.17. –  celui qui m''a envoyé  : autre traduction celui qui m''envoie. –  accomplir son œuvre 5.36 ; 17.4n  ; 19.28,30.'
  - type: text
    content: 'Jésus leur dit : Ma nourriture, c''est de faire la volonté de celui qui m''a envoyé et d''accomplir son œuvre. '
  '35':
  - type: note
    content: 'blancs  : en hébreu, le terme équivalent pouvait aussi désigner toute couleur claire ; autre traduction dorés (c.-à-d. prêts pour la moisson, cf. v. 39ss). –  la moisson  : cf. Mt 9.37-38+/ /.'
  - type: text
    content: 'Ne dites-vous pas, vous, qu''il y a encore quatre mois jusqu''à ce que vienne la moisson ? Eh bien, je vous le dis, levez les yeux et regardez les champs : ils sont blancs pour la moisson. Déjà '
  '36':
  - type: note
    content: 'un salaire  : autre traduction une récompense  ; cf. Mt 5.12+. –  pour la vie éternelle v. 14n. –  se réjouissent ensemble  : cf. Es 9.2 ; Ps 126.5s ; voir aussi Am 9.13.'
  - type: text
    content: 'le moissonneur reçoit un salaire et recueille du fruit pour la vie éternelle, pour que le semeur et le moissonneur se réjouissent ensemble. '
  '37':
  - type: note
    content: Cf. Dt 20.6 ; 28.30 ; Mi 6.15 ; Jb 31.8 ; Mt 25.24 ; 1Co 3.6.
  - type: text
    content: 'En cela, en effet, ce qu''on dit est vrai : L''un sème, l''autre moissonne. '
  '38':
  - type: note
    content: 'Cf. Ac 8.14-17. –  envoyés 17.18 ; 20.21. –  vous êtes arrivés…  : litt. vous êtes entrés dans leur travail (ou leur peine, cf. v. 6n).'
  - type: text
    content: Moi, je vous ai envoyés moissonner ce qui ne vous a coûté, à vous, aucun travail ; d'autres ont travaillé, et vous, vous êtes arrivés pour recueillir le fruit de leur travail.
  '39':
  - type: text
    content: ' '
  - type: note
    content: Beaucoup… mirent leur foi en lui 1.7n  ; 2.23+. –  Il m'a dit… v. 29+.
  - type: text
    content: 'Beaucoup de Samaritains de cette ville-là mirent leur foi en lui à cause de la parole de la femme qui rendait ce témoignage : Il m''a dit tout ce que j''ai fait. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Samarie  : voir v. 9n.'
  - type: text
    content: Or il fallait qu'il passe par la Samarie.
  '40':
  - type: note
    content: 'Cf. Lc 9.52-56. –  ils lui demandèrent…  : cf. Ac 10.48 ; 18.20. –  demeurer auprès d''eux ou chez eux 1.39n.'
  - type: text
    content: 'Aussi, quand les Samaritains vinrent à lui, ils lui demandèrent de demeurer auprès d''eux ; et il demeura là deux jours. '
  '41':
  - type: note
    content: Cf. 1.45-50 ; sur la réaction des Samaritains à la bonne nouvelle, voir aussi Ac 8.5ss,14,25. –  croire ou avoir foi, 1.7n.
  - type: text
    content: 'Ils furent encore beaucoup plus nombreux à croire à cause de sa parole ; '
  '42':
  - type: note
    content: le sauveur du monde (1.10n) 3.17 ; 1Jn 4.14 ; voir aussi Es 19.20 ; 43.3 ; Mt 1.21 ; Lc 1.47 ; 2.11 ; Ac 5.31 ; 13.23 ; Ph 3.20. – Certains mss ajoutent le Christ (cf. v. 29+).
  - type: text
    content: 'ils disaient à la femme : Ce n''est plus à cause de tes dires que nous croyons ; car nous l''avons entendu nous-mêmes, et nous savons que c''est vraiment lui le sauveur du monde.'
  - type: heading
    content: Jésus guérit le fils d'un officier royal
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'ces deux jours v. 40. –  partit  : litt. sortit , cf. 1.43. –  Galilée v. 3+.'
  - type: text
    content: 'Après ces deux jours, il partit de là pour se rendre en Galilée. '
  '44':
  - type: note
    content: un prophète… Mt 13.57/ /. –  dans son propre pays ou dans sa région d'origine.
  - type: text
    content: '– Car Jésus lui-même a témoigné qu''un prophète n''est pas honoré dans son propre pays. – '
  '45':
  - type: note
    content: 'Cf. 2.13+,23. –  Lorsqu''il vint  : autre traduction lorsqu''il arriva  ; même verbe au v. 46 (retourner).'
  - type: text
    content: Lorsqu'il vint en Galilée, les Galiléens l'accueillirent, parce qu'ils avaient vu tout ce qu'il avait fait à Jérusalem pendant la fête. Car eux aussi étaient allés à la fête.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'changé l''eau en vin  : litt. fait l''eau vin  ; voir 2.1-11. –  un officier royal  : c.-à-d. un homme au service d''Hérode Antipas, tétrarque de Galilée (Mt 2.22n), qui était souvent considéré comme un roi ; cf. Mt 8.5-13/ /.'
  - type: text
    content: Il retourna donc à Cana de Galilée, où il avait changé l'eau en vin.
  - type: heading
    content: Cf. Mt 8.5-13  ; Lc 7.1-10
  - type: text
    content: 'Il y avait à Capharnaüm un officier royal dont le fils était malade. '
  '47':
  - type: note
    content: 'descendre  : Capharnaüm (2.12+) est situé au bord du lac de Galilée, à quelque 200 m au-dessous du niveau de la mer Méditerranée. –  sur le point de mourir  : expressions comparables en Lc 7.2n  ; Ap 3.2n.'
  - type: text
    content: 'Ayant entendu dire que Jésus était venu de Judée en Galilée, il alla le trouver pour lui demander de descendre guérir son fils, qui était sur le point de mourir. '
  '48':
  - type: note
    content: signes (2.11+) / prodiges Ac 5.12. –  vous ne croirez donc jamais ! ou vous ne croirez en aucun cas ; vous n'aurez jamais foi  ; même verbe v. 50,53 (devenir croyant) ; 1.7n  ; 2.23s ; cf. Mt 12.38 ; 16.1-4 ; 24.24/ / ; 1Co 1.22+.
  - type: text
    content: 'Jésus lui dit : Si vous ne voyez pas des signes et des prodiges, vous ne croirez donc jamais ! '
  '49':
  - type: text
    content: 'L''officier royal lui dit : Seigneur, descends avant que mon enfant ne meure. '
  '5':
  - type: text
    content: ' '
  - type: note
    content: Il arrive ou il vient , même verbe v. 7,27. –  Sychar , à proximité de la ville appelée Sichem dans l'A.T. (aujourd'hui Naplouse) ; cf. Gn 33.19 ; 48.22n  ; Jos 24.32.
  - type: text
    content: 'Il arrive donc dans une ville de Samarie nommée Sychar, près du champ que Jacob avait donné à Joseph, son fils. '
  '50':
  - type: note
    content: Cf. 1R 17.23 ; Mt 8.10,13.
  - type: text
    content: – Va, lui dit Jésus, ton fils vit.
  - type: text
    content: 'L''homme crut la parole que Jésus lui avait dite et il s''en alla. '
  '51':
  - type: note
    content: Cf. Mc 7.30.
  - type: text
    content: 'Comme déjà il descendait, ses esclaves vinrent au-devant de lui pour lui dire que son enfant vivait. '
  '52':
  - type: note
    content: 'la septième heure  : entre midi et une heure environ. –  la fièvre l''a quitté  : cf. Mt 8.15+/ /.'
  - type: text
    content: 'Il leur demanda à quelle heure il s''était trouvé mieux ; ils lui dirent : Hier, à la septième heure, la fièvre l''a quitté. '
  '53':
  - type: note
    content: 'au moment même  : litt. en cette heure-là. –  il devint croyant v. 58n. –  lui et toute sa maison Ac 10.2n  ; 11.14 ; 16.14s,31.'
  - type: text
    content: 'Le père sut donc que c''était au moment même où Jésus lui avait dit : Ton fils vit. Et il devint croyant, lui et toute sa maison. '
  '54':
  - type: note
    content: deuxième signe en Galilée ( ?), cf. 2.11,23n  ; 3.2.
  - type: text
    content: Jésus produisit encore ce deuxième signe après être venu de Judée en Galilée.
  '6':
  - type: note
    content: 'la source (même terme v. 14) de Jacob  : il s''agit en fait d''un puits profond (v. 11) ; celui avec lequel la tradition l''a identifié a une trentaine de mètres de profondeur. De tels puits étaient souvent alimentés par une source souterraine (v. 10n). –  de Jacob v. 12. –  fatigué  : le même verbe est traduit par travailler au v. 38 (autre traduction possible peiner). –  était assis tel quel  : autre traduction était assis à même le puits  ; cf. 13.25n  ; Mc 4.38. –  environ la sixième heure  : vers midi.'
  - type: text
    content: Là se trouvait la source de Jacob. Jésus, fatigué du voyage, s'était assis tel quel au bord de la source. C'était environ la sixième heure.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 19.28.
  - type: text
    content: 'Une femme de Samarie vient puiser de l''eau. Jésus lui dit : Donne-moi à boire. '
  '8':
  - type: note
    content: Cf. v. 31-33 ; 6.5.
  - type: text
    content: '– Ses disciples, en effet, étaient allés à la ville pour acheter des vivres. – '
  '9':
  - type: note
    content: 'une Samaritaine  : litt. une femme samaritaine  ; cf. v. 27. –  Les Juifs, en effet…  : cette phrase est absente de certains mss ; quelques-uns comprennent le verbe traduit par ne veulent rien avoir de commun avec dans un sens concret  : ne partagent pas leurs ustensiles avec  ; d''autres le prennent dans un sens plus général, au sens de n''ont pas de relations avec  ; sur les Samaritains, cf. 2R 17.27-33 ; Esd 4 ; 9–10 ; Mt 10.5 ; Lc 9.52s ; 10.29-37 ; 17.11-19 ; Siracide 50.25s : « Il y a deux nations que mon âme déteste, et la troisième n''est pas une nation : ceux qui sont établis dans la montagne de Séir, les Philistins et le peuple fou qui habite à Sichem (c.-à-d. les Samaritains). »'
  - type: text
    content: 'La Samaritaine lui dit : Comment toi, qui es juif, peux-tu me demander à boire, à moi qui suis une Samaritaine ? – Les Juifs, en effet, ne veulent rien avoir de commun avec les Samaritains. – '
