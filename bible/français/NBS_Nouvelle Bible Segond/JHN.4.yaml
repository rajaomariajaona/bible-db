          text: '50.25s : « Il y a deux nations que mon âme déteste, et la troisième n''est pas une nation : ceux qui sont établis dans la montagne de Séir, les Philistins et le peuple fou qui habite à Sichem (c.-à-d. les Samaritains). »'
      marker-yv: yv-n
    - type: text
      text: 'La Samaritaine lui dit : Comment toi, qui es juif, peux-tu me demander à boire, à moi qui suis une Samaritaine ? – Les Juifs, en effet, ne veulent rien avoir de commun avec les Samaritains. – '
