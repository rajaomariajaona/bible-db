      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que Jésus faisait… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: baptisait
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.22,26.
      marker-yv: yv-n
    - type: text
      text: 'Jésus ayant su que les pharisiens avaient entendu dire qu''il faisait et baptisait plus de disciples que Jean, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: don de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ac 8.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui qui te dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 26+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'eau vive '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vivante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 6.51) : l''expression désigne une eau courante, non stagnante, susceptible d''évoquer métaphoriquement la vie elle-même ; cf. 7.37s ; Gn 26.19 ; Jr 2.13 ; Za 14.8 ; Ap 21.6 ; 22.17. Epître '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Ignace
        - type: text
          text: ' d''Antioche aux Romains 7.2 : « Mon désir terrestre a été crucifié, et il n''y a plus en moi de feu pour aimer la matière, mais en moi une eau vive qui murmure et qui dit au dedans de moi : “Viens vers le Père.” »'
      marker-yv: yv-n
    - type: text
      text: 'Jésus lui répondit : Si tu connaissais le don de Dieu, et qui est celui qui te dit : « Donne-moi à boire », c''est toi qui le lui aurais demandé, et il t''aurait donné de l''eau vive. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 21.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui dit la femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent seulement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui dit(-elle).
      marker-yv: yv-n
    - type: text
      text: '– Seigneur, lui dit la femme, tu n''as rien pour puiser, et le puits est profond ; d''où aurais-tu donc cette eau vive ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 6.31-33 ; 8.53 ; Mt 12.41s.
      marker-yv: yv-n
    - type: text
      text: 'Serais-tu, toi, plus grand que Jacob, notre père, qui nous a donné ce puits et qui en a bu lui-même, ainsi que ses fils et ses troupeaux ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jr 2.13.
      marker-yv: yv-n
    - type: text
      text: 'Jésus lui répondit : Quiconque boit de cette eau aura encore soif ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n(e)… jamais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette négation traduit une formule grecque (aussi en 8.51s ; 10.28 ; 11.26 ; 13.8) opposée à celle qui correspond à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour toujours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 6.51,58 ; 8.35 ; 12.34 ; 14.16 ; 1Jn 2.17 ; 2Jn 2, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour l''éon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (sur ce mot, voir Ep 2.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ou, selon une traduction traditionnelle du terme, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour le siècle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; outre le sens temporel évident '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toujours / jamais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. p. ex. 1Co 8.13 ; voir aussi Jn 6.35
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), le grec peut évoquer un rapport, positif ou négatif, à l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'éternité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou au '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'monde à venir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Mt 12.32
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jamais soif '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.27,35,53s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une source d''eau qui jaillira pour la '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vie éternelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même formule v. 36) : cf. 7.38s ; 19.34 ; Es 58.11 ; voir aussi 12.3 ; 44.3 ; 49.10 ; Jr 2.13 ; 17.13 ; Ez 47.1ss. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile selon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Thomas
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13 : « Jésus a dit à ses disciples : “Faites une comparaison, et dites-moi à qui je ressemble.” Simon Pierre lui dit : “Tu es semblable à un ange juste.” Matthieu lui dit : “Tu es semblable à un philosophe intelligent.” Thomas lui dit : “Maître, ma bouche est tout à fait incapable de dire à qui tu es semblable.” Jésus répondit : “Je ne suis pas ton maître ; puisque tu as bu, tu t''es enivré à la source bouillonnante que j''ai fait jaillir.” »'
      marker-yv: yv-n
    - type: text
      text: 'celui qui boira de l''eau que, moi, je lui donnerai, celui-là n''aura jamais soif : l''eau que je lui donnerai deviendra en lui une source d''eau qui jaillira pour la vie éternelle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.34.
      marker-yv: yv-n
    - type: text
      text: 'La femme lui dit : Seigneur, donne-moi cette eau-là, pour que je n''aie plus soif et que je n''aie plus à venir puiser ici. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: '– Va, lui dit-il, appelle ton mari et reviens ici. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'La femme répondit : Je n''ai pas de mari. Jésus lui dit : Tu as raison de dire : « Je n''ai pas de mari. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.25+ ; certains voient dans les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cinq maris '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'une allusion aux cinq cultes non juifs rattachés à l''origine du culte samaritain en 2R 17.29-41 ; dans cette perspective, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'celui que tu as maintenant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'serait le Dieu d''Israël, dont les Samaritains se réclameraient d''une façon plus ou moins illégitime. Toutefois rien n''impose cette lecture allégorique : Jésus peut simplement décrire la vie privée de la Samaritaine (v. 19).'
      marker-yv: yv-n
    - type: text
      text: 'Car tu as eu cinq maris, et celui que tu as maintenant n''est pas ton mari. En cela tu as dit vrai. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu es '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.21+ ; voir aussi Lc 7.39.'
      marker-yv: yv-n
    - type: text
      text: '– Seigneur, lui dit la femme, je vois que, toi, tu es prophète. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1Co 1.14-17.
      marker-yv: yv-n
    - type: text
      text: '– en fait, ce n''était pas Jésus lui-même qui baptisait, mais ses disciples – '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: adoré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe correspondant, ici et dans la suite, est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se prosterner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (9.38) ; voir Mt 2.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette montagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mont Garizim, près de Sichem, sur lequel avait été bâti le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' '
        - type: usfm
          marker: w
          children:
          - type: text
            text: samaritain
        - type: text
          text: ' détruit environ 150 ans avant l''époque de Jésus ; cf. Dt 11.29 ; 27.12 ; Jos 8.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on peut comprendre, dans un sens fort, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le lieu sacré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: saint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 11.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 12.5+ ; 1R 9.3 ; Ps 122.1-5.'
      marker-yv: yv-n
    - type: text
      text: 'Nos pères ont adoré sur cette montagne ; vous, vous dites que le lieu où il faut adorer est à Jérusalem. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2.19+ ; 1R 8.27 ; Es 66.1 ; Ml 1.11 ; Ac 6.14 ; 7.47s.
      marker-yv: yv-n
    - type: text
      text: 'Jésus lui dit : Femme, crois-moi, l''heure vient où ce ne sera ni sur cette montagne ni à Jérusalem que vous adorerez le Père. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que vous ne connaissez pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 17.24-33 ; Ac 17.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le salut vient des Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 2.3 ; Rm 9.3s ; 11.18.'
      marker-yv: yv-n
    - type: text
      text: 'Vous, vous adorez ce que vous ne connaissez pas ; nous, nous adorons ce que nous connaissons, car le salut vient des Juifs. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''heure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 2.4+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vient – c''est maintenant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.25 ; cf. Rm 13.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.5-8 ; cf. Rm 12.1 ; Ep 2.18 ; Ph 3.3 ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par l'Esprit et la vérité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vérité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.32+ ; cf. 1Jn 3.18 ; 5.6.
      marker-yv: yv-n
    - type: text
      text: 'Mais l''heure vient – c''est maintenant – où les vrais adorateurs adoreront le Père en esprit et en vérité ; car tels sont les adorateurs que le Père cherche. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu est Esprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 3.17s.
      marker-yv: yv-n
    - type: text
      text: 'Dieu est Esprit, et il faut que ceux qui l''adorent l''adorent en esprit et en vérité. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.25 '
      - type: usfm
