document_id: NAM.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Sentence Es 13.1n  ; Jr 23.33nss ; Ha 1.1 ; Za 9.1 ; Ml 1.1. –  Ninive , capitale de l''Assyrie, tombée en 612 av. J.-C. sous les coups d''une coalition comprenant les Babyloniens et les Mèdes ; cf. Gn 10.11 ; 2R 19.36 ; Jon 1.2 ; So 2.13 ; Tobit 14.4 : « Je crois à la parole de Dieu proférée par Nahum contre Ninive ; tout se réalisera et s''abattra sur Assour (l''Assyrie) et Ninive ; tout ce qu''ont dit les prophètes d''Israël, que Dieu a envoyés, tout cela arrivera. » –  Livre  : cf. Jr 36 ; Ez 3.1ss. –  vision Es 1.1 ; 2.1 ; Ez 7.26 ; Am 1.1+ ; Ab 1 ; Ha 1.1 ; 2.2s. –  Nahum ( Consolé, Réconforté ou peut-être Apaisé, Satisfait, Vengé ) : nom apparenté à Menahem (2R 15) ou Néhémie (Né 1.1 ; voir aussi 7.7) ; cf. Lc 3.25. –  Elqoshite  : ce qualificatif (qui rappelle le mot désignant la pluie tardive ou pluie de printemps ) indique vraisemblablement l''origine du prophète. Aucune localité nommée Elqosh n''a pu être identifiée avec certitude ; une hypothèse la situerait à une dizaine de kilomètres au nord de Lakish.'
  - type: text
    content: Sentence sur Ninive. Livre de la vision de Nahum, l'Elqoshite.
  - type: heading
    content: Le Seigneur, un Dieu terrible et bon
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur ; certains, d''après LXX, modifient le texte hébreu traditionnel pour lire comme un fourré d''épines, comme des liserons entortillés, il sera dévoré…  ; cf. Jg 9.15 ; 2S 23.6s ; Es 10.17 ; 27.4 ; Ez 2.6 ; Mi 7.4. –  entièrement  : dans l''état actuel du texte le mot correspondant peut signifier la paille entièrement sèche ou bien elle sera entièrement dévorée  ; cf. Es 5.24 ; 10.17 ; 33.11s ; 47.14 ; Jl 2.5 ; Ab 18.'
  - type: text
    content: Même s'ils sont des épines enchevêtrées,
  - type: text
    content: ivres de leurs boissons,
  - type: text
    content: ils seront dévorés
  - type: text
    content: comme la paille sèche, entièrement.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'De toi , au féminin, de même aux v. 12s ; c''est peut-être Ninive qui est ici visée (v. 8n  ; 2.9 ; 3.7). –  celui qui se préparait au mal…  : cf. v. 9n,13n  ; 2.1 ; voir aussi 2R 19.4s,16 ; Es 37.23s. –  des projets destructeurs ou des projets d''homme sans morale  ; litt. des projets de Bélial  ; sur les deux sens possibles de ce terme, comparer 2.1 ; Dt 13.14n  ; Ps 18.5n  ; 41.9 ; 101.3 ; Jb 34.18 ; Pr 6.12 ; 16.27 ; 19.8 ; 2Co 6.15n.'
  - type: text
    content: De toi est sorti
  - type: text
    content: 'celui qui se préparait au mal contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: celui qui avait des projets destructeurs.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'c''en sera fini  : litt. il passera  ; LXX ils (ou elles ) passeront  : certains s''appuient sur une autre variante de LXX pour traduire l''ensemble comme suit  : si de grandes eaux jaillissent, elles se perdront et disparaîtront  ; cf. Es 37.36. –  Si je t''afflige…  : autre traduction je t''ai affligé et je ne t''affligerai plus , texte diversement traduit par les versions anciennes ; cf. v. 9 ; Ps 119.71,75.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: S'ils sont au complet, aussi nombreux qu'ils soient,
  - type: text
    content: ils seront fauchés, c'en sera fini.
  - type: text
    content: Si je t'afflige,
  - type: text
    content: c'est pour ne plus avoir à t'affliger.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le joug  : versions anciennes le bâton  ; cf. Es 9.3 ; 10.24 ; 14.5 ; voir aussi Lv 26.13 ; Es 14.25 ; Jr 30.8 ; Ez 34.27 ; Ps 107.14. –  sur toi (féminin) : Jérusalem s''est affranchie de la domination assyrienne avant la fin du règne d''Assourbanipal (≈ 630 av. J.-C.).'
  - type: text
    content: Maintenant je vais briser le joug qu'il fait peser sur toi,
  - type: text
    content: et je romprai tes liens.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Tu  : ici les pronoms sont au masculin ; il doit s''agir du roi d''Assyrie. –  descendance qui porte ton nom (litt. à partir de ton nom ) 3.10 ; Es 14.20 ; Ps 37.28 ; 109.13 ; Jb 18.19. –  tes dieux ou ton dieu , voir Gn 1.1n  ; cf. Jr 10.11. –  statue… Dt 27.15 ; Jg 17.3s ; 18.14,17 ; Es 42.17. –  je préparerai  : certains modifient le texte hébreu traditionnel pour lire je saccagerai  ; cf. Ez 32.22s. –  tu ne vaux pas grand-chose  : litt. tu es léger , c.-à-d. tu ne fais pas le poids, cf. Dn 5.27.'
  - type: text
    content: 'Voici ce qu''a ordonné sur toi le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Tu n'auras plus de descendance qui porte ton nom ;
  - type: text
    content: je retrancherai de la maison de tes dieux
  - type: text
    content: statue et idole de métal fondu ;
  - type: text
    content: je préparerai ta tombe,
  - type: text
    content: car tu ne vaux pas grand-chose.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 2-8 présentent, avec quelques irrégularités mineures, un début de structure alphabétique (voir Ps 9.1n  ; 25.1n). De plus, les idées semblent agencées symétriquement autour d''un vers central (première partie du v. 5). –  Dieu (hébreu ’El , Gn 21.33n) à la passion jalouse  : cf. Ex 20.5n  ; 34.14 ; Dt 4.24+ ; 32.21 ; Jos 24.19ss ; Es 9.6 ; 26.11 ; 37.32 ; 59.17s ; 63.15 ; Ez 8.3,5 ; 35.11 ; 36.23 ; 39.25 ; Jl 2.18 ; Za 8.2 ; Ps 78.58 ; 79.5 ; voir aussi Pr 6.34 ; Ct 8.6. –  il se venge ou il est vengeur  ; cf. Dt 7.10 ; 32.35s,41,43 ; Es 61.2 ; 63.4 ; Jr 5.9 ; 11.20 ; 46.10 ; 51.11 ; Ez 25.14,17 ; Ps 94 ; 99.8 ; Rm 12.19 ; Ap 19.2. –  il est plein de fureur  : litt. maître (hébreu ba`al ) de la fureur Jr 4.4 ; même expression en Pr 15.18 ; 29.22 pour furieux . –  il garde sa rigueur ou il garde rancune  ; cf. Lv 19.18 ; Jr 3.5,12 ; Am 1.11 ; Ps 103.9.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un Dieu à la passion jalouse, il se venge ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se venge, il est plein de fureur ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se venge de ses adversaires,'
  - type: text
    content: il garde sa rigueur envers ses ennemis.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 34.6s ; Nb 14.18 ; Es 48.9 ; Jr 30.11 ; Jl 2.13 ; Jon 4.2 ; Ps 86.15 ; 99.8 ; 103.8 ; 145.8 ; Né 9.17. –  le Seigneur ne tient jamais…  : en rattachant au vers suivant le nom YHWH ( le Seigneur ), on peut lire il ne tient jamais… ; le Seigneur fait son chemin…  ; autres traductions il ne laisse pas le coupable impuni ; il ne laisse rien passer  ; cf. Ex 20.7 ; 34.7 ; Nb 14.18n  ; Dt 5.11. –  Il fait…  : litt. son chemin est dans (ou par ) l''ouragan…  ; cf. Ex 19.18 ; 1R 19.11 ; 2R 2.1 ; Es 29.6 ; Jr 4.11ss ; 23.19 ; Ez 13.13 ; Os 13.15 ; Am 1.14 ; Mi 1.4 ; Ps 18.10 ; 50.3 ; 68.5 ; Jb 9.16s ; 38.1. –  il soulève…  : litt. une nuée, la poussière de ses pieds  ; cf. Ex 13.21+ ; 19.9 ; 33.9s ; 1R 8.10s ; Jl 2.2 ; So 1.15 ; Ps 18.10 ; 97.2 ; 99.7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est patient ;'
  - type: text
    content: sa force est grande ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne tient jamais le coupable pour innocent.'
  - type: text
    content: Il fait son chemin dans l'ouragan, dans la tempête ;
  - type: text
    content: il soulève une nuée de poussière.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Il rabroue la mer…  : cf. Es 17.13+ ; 50.2 ; 51.9s ; 54.9 ; Ha 3.8 ; Ps 9.6 ; 68.31 ; 74.12ss ; 77.17 ; 104.7 ; 106.9 ; Jb 26.12 ; voir aussi Ex 14.21 ; 15.8 ; Mt 8.26s. –  les fleuves  : cf. Jos 3.14ss ; Ps 74.15 ; 114.3ss. –  Bashân / Carmel / Liban , régions fertiles Es 10.34n  ; 29.17n  ; 33.9n  ; 35.2 ; 37.24 ; Os 14.6 ; Am 1.2 ; 4.1 ; Mi 7.14n. –  dépérissent ou se flétrissent  ; certains, pour rétablir la régularité de la structure alphabétique, lisent ici un autre verbe signifiant sont désolés  ; cf. Es 16.8 ; 24.4,7 ; Jl 1.12.'
  - type: text
    content: Il rabroue la mer et la dessèche,
  - type: text
    content: il fait tarir tous les fleuves ;
  - type: text
    content: Bashân et Carmel dépérissent,
  - type: text
    content: la fleur du Liban dépérit.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'fait trembler les montagnes… Ex 19.18 ; 1R 19.11ss ; Jr 4.24 ; Ez 38.19s ; Jl 4.16 ; Mi 1.2s ; Ha 3.6 ; Ps 18.8 ; 29.5ss ; 46.3s ; 97.4. –  la terre se soulève  : d''après quelques versions anciennes, certains modifient le texte hébreu traditionnel pour lire la terre est bouleversée  ; cf. Am 8.8 ; 9.5 ; Ps 89.10 ; voir aussi 68.9. –  le monde… Es 18.3 ; 26.9,18 ; Ps 24.1 ; 33.8 ; 98.7 ; Lm 4.12.'
  - type: text
    content: Il fait trembler les montagnes,
  - type: text
    content: et les collines s'effondrent ;
  - type: text
    content: la terre se soulève devant lui,
  - type: text
    content: le monde et tous ses habitants.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Qui résistera… Jr 10.10 ; Jl 2.11 ; Ml 3.2 ; Ps 76.8 ; 130.3 ; Jb 9.13 ; Ap 6.17. –  fureur traduit ici deux termes hébreux synonymes. Cf. Jr 7.20 ; 42.18 ; 44.6. –  comme le feu Es 30.27 ; Mi 1.4 ; So 3.8 ; Ps 79.5.
  - type: text
    content: Qui résistera devant sa fureur ?
  - type: text
    content: Qui tiendra contre sa colère ardente ?
  - type: text
    content: 'Sa fureur se répand comme le feu :'
  - type: text
    content: il démolit les rochers.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'bon Jr 33.11 ; Ps 25.8+ ; Lm 3.25 ; cf. Rm 2.4 ; 11.22. –  une forteresse Es 25.4 ; Ps 9.10+ ; 46.2 ; 77.3 ; 119.14. –  il connaît  : autres traductions il distingue, il prend soin de  ; cf. Ps 1.6 ; 31.8n  ; Jn 10.14s. – Certains rattachent la fin du v. au v. 8  : ceux qui trouvent en lui un abri (8) quand passe le déferlement (dévastateur)  ; cf. Ps 32.6 ; 57.2 ; voir aussi 2.12 ; 5.12 ; 46.2 ; 144.2.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon,'
  - type: text
    content: il est une forteresse au jour de la détresse ;
  - type: text
    content: il connaît ceux qui trouvent en lui un abri.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'un déferlement qui emporte tout  : cf. v. 7n  ; Es 30.28 ; Ps 69.2s ; 124.4s. –  il accomplira une extermination…  : texte obscur et traduction conjecturale, litt. il fera extermination (même expression au v. 9) (de) son lieu (avec possessif féminin). Certains pensent que ce lieu désignerait déjà Ninive ; d''après LXX, d''autres modifient le texte hébreu traditionnel pour traduire il exterminera ses adversaires  ; cf. Ha 3.13 ; voir aussi Es 10.23 ; Jr 4.27 ; 5.10,18. –  poursuivra ou chassera  ; cf. Es 8.22.'
  - type: text
    content: Mais, dans un déferlement qui emporte tout,
  - type: text
    content: il accomplira une extermination en ce lieu
  - type: text
    content: et il poursuivra ses ennemis jusque dans les ténèbres.
  - type: heading
    content: Messages pour Juda et pour Ninive
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'A partir d''ici la structure alphabétique (v. 2n) devient plus difficile à établir. –  Quels plans préparez-vous…  : selon certains, cette apostrophe s''adresserait aux dirigeants de Jérusalem et à leurs projets humains de défense, selon d''autres aux Assyriens Es 29.15 ; 30.1s ; Os 7.15 ; Ps 2.1. –  extermination v. 8n  ; Jr 30.11 ; Ps 33.10 ; 1Co 1.19. –  pas deux fois  : cf. 1S 26.8 ; 2S 20.10.'
  - type: text
    content: 'Quels plans préparez-vous contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: C'est lui qui accomplit l'extermination.
  - type: text
    content: La détresse ne paraîtra pas deux fois.
