        - type: text
          text: '27.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pour avoir toujours à sa disposition immédiate des troupes prêtes au combat, David avait organisé des périodes mensuelles de service actif ; cf. 1R 4.7–5.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'secrétaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: officiers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 23.4 ; 26.29 ; Dt 1.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte, de même dans la suite. – Les noms de la plupart des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chefs des classes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'énumérés dans les v. 2-15 figurent dans la liste des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vaillants hommes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de David (11.10-47).
      marker-yv: yv-n
    - type: text
      text: Israélites selon leur nombre, chefs de famille, chefs de mille et de cent, secrétaires qui étaient au service du roi pour tout ce qui concernait les classes, leur arrivée et leur départ, mois par mois, pendant tous les mois de l'année, chaque classe étant de 24 000 hommes.
