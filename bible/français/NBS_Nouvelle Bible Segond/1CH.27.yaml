document_id: 1CH.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Organisation militaire du royaume
  - type: text
    content: ' '
  - type: note
    content: 'Pour avoir toujours à sa disposition immédiate des troupes prêtes au combat, David avait organisé des périodes mensuelles de service actif ; cf. 1R 4.7–5.8. –  secrétaires ou officiers  ; cf. 23.4 ; 26.29 ; Dt 1.15n. –  hommes  : sous-entendu dans le texte, de même dans la suite. – Les noms de la plupart des chefs des classes énumérés dans les v. 2-15 figurent dans la liste des vaillants hommes de David (11.10-47).'
  - type: text
    content: Israélites selon leur nombre, chefs de famille, chefs de mille et de cent, secrétaires qui étaient au service du roi pour tout ce qui concernait les classes, leur arrivée et leur départ, mois par mois, pendant tous les mois de l'année, chaque classe étant de 24 000 hommes.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Hélets…  : cf. 11.27.'
  - type: text
    content: 'Le septième, pour le septième mois : Hélets, le Pelonite, des fils d''Ephraïm ; pour sa classe, 24 000 hommes.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Sibbekaï  : cf. 11.29.'
  - type: text
    content: 'Le huitième, pour le huitième mois : Sibbekaï, le Houshatite, pour les Zérahites ; pour sa classe, 24 000 hommes.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Abiézer  : cf. 11.28.'
  - type: text
    content: 'Le neuvième, pour le neuvième mois : Abiézer, l''Anatotite, pour les Benjaminites ; pour sa classe, 24 000 hommes.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Maharaï  : cf. 11.30.'
  - type: text
    content: 'Le dixième, pour le dixième mois : Maharaï, le Netophatite, pour les Zérahites ; pour sa classe, 24 000 hommes.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Benaya…  : cf. 11.31.'
  - type: text
    content: 'Le onzième, pour le onzième mois : Benaya, le Piratonite, des fils d''Ephraïm ; pour sa classe, 24 000 hommes.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Heldaï  : cf. Héled , en 11.30.'
  - type: text
    content: 'Le douzième, pour le douzième mois : Heldaï, le Netophatite, pour Otniel ; pour sa classe, 24 000 hommes.'
  - type: heading
    content: 'Organisation civile du royaume : les chefs de tribu'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Contrairement à la liste précédente, celle qui suit ne contient que peu de personnages identifiables. La liste des tribus est surprenante  : Gad et Aser n''y figurent pas, mais par contre on y trouve Aaron et les deux demi-tribus de Manassé , ce qui permet de rétablir le nombre traditionnel de douze tribus. –  chef  : même terme hébreu v. 4 ; cf. v. 3n,22n. –  Shephatia 12.6n.'
  - type: text
    content: 'A la tête des tribus d''Israël :'
  - type: text
    content: 'Pour les Rubénites : un chef, Eliézer, fils de Zikri ;'
  - type: text
    content: 'pour les Siméonites : Shephatia, fils de Maaka ;'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Tsadoq  : cf. 24.3n,31 ; 2S 8.17 ; 15.24.'
  - type: text
    content: 'pour Lévi : Hashabia, fils de Qemouel ;'
  - type: text
    content: 'pour Aaron : Tsadoq ;'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Elihou , frère de David , pourrait être une variante d’ Eliab (ainsi dans LXX).
  - type: text
    content: 'pour Juda : Elihou, des frères de David ;'
  - type: text
    content: 'pour Issacar : Omri, fils de Michel ;'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Yishmaya  : hébreu Yishma‘yahou , cf. forme brève du même nom en 12.4.'
  - type: text
    content: 'pour Zabulon : Yishmaya, fils d''Abdias ;'
  - type: text
    content: 'pour Nephtali : Yerimoth, fils d''Azriel ;'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Sur et pour (la deuxième fois) traduisent la même préposition hébraïque ; de même dans la suite. –  Yashobéam  : cf. 11.11 ; 12.7.'
  - type: text
    content: 'Sur la première classe, pour le premier mois : Yashobéam, fils de Zabdiel ; pour sa classe, 24 000 hommes. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Azazia  : hébreu ‘Azazyahou  ; de même 15.21 ; 2Ch 31.13. –  Pedaya  : hébreu Pedayahou  ; ce nom apparaît le plus souvent sous la forme brève, cf. 3.18s ; 2R 23.36 ; Né 3.25 ; 8.4 ; 11.7 ; 13.13.'
  - type: text
    content: 'pour les fils d''Ephraïm : Osée, fils d''Azazia ;'
  - type: text
    content: 'pour la demi-tribu de Manassé : Joël, fils de Pedaya ;'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Abner  : cf. 26.28 ; 1S 14.50n.'
  - type: text
    content: 'pour la demi-tribu de Manassé de Galaad : Yiddo, fils de Zacharie ;'
  - type: text
    content: 'pour Benjamin : Yaasiel, fils d''Abner ;'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'chefs  : cf. v. 3n'
  - type: text
    content: 'pour Dan : Azaréel, fils de Yeroham.'
  - type: text
    content: Ce sont là les chefs des tribus d'Israël.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'dénombrement  : cf. Nb 1.2n. –  vingt ans et au-dessous  : cf. Nb 1.3-47. –  aussi nombreux que…  : cf. Gn 15.5 ; 22.17 ; 26.4.'
  - type: text
    content: 'David ne fit pas le dénombrement de ceux qui avaient vingt ans et au-dessous, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit qu''il rendrait Israël aussi nombreux que les étoiles du ciel. '
  '24':
  - type: note
    content: 'il ne l''acheva pas  : voir chap. 21, en particulier v. 6. –  la Colère  : cf. Nb 1.53+ ; 2Ch 19.2+,10. – L''ouvrage intitulé chroniques du roi David n''a pas été conservé, voir l''introduction aux Chroniques.'
  - type: text
    content: 'Joab, fils de Tserouya, avait commencé le dénombrement, mais il ne l''acheva pas : cela avait attiré la Colère sur Israël. Les résultats n''en ont pas été reportés dans les chiffres des chroniques du roi David.'
  - type: heading
    content: Les intendants des biens royaux
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'La plupart des personnages mentionnés dans les v. 25-31 ne sont pas connus par ailleurs. –  réserves  : le mot hébreu correspondant peut aussi désigner des trésors , mais sa reprise dans la suite suggère qu''il s''agit plutôt de stocks de vivres répartis à divers endroits du pays. –  les réserves du roi sont celles accumulées en ville, à Jérusalem, par opposition à la campagne (c.-à-d. hors de la capitale ), aussi bien dans les autres villes que dans les villages et les tours , ce dernier terme désignant vraisemblablement les postes de garde militaires situés hors de toute agglomération.'
  - type: text
    content: 'Sur les réserves du roi : Azmaveth, fils d''Adiel ;'
  - type: text
    content: 'sur les réserves de la campagne, des villes, des villages et des tours : Jonathan, fils d''Ozias ;'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'la terre  : litt. le sol , cf. Gn 2.5n.'
  - type: text
    content: 'sur les ouvriers de la campagne qui cultivaient la terre : Ezri, fils de Keloub ;'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'le Ramatite  : de Rama.'
  - type: text
    content: 'sur les vignes : Shiméi, le Ramatite ;'
  - type: text
    content: 'sur ceux qui, dans les régions viticoles, s''occupaient des réserves de vin : Zabdi, de Shepham ;'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Bas-Pays  : hébreu shephéla . –  le Guédérite  : de Guéder.'
  - type: text
    content: 'sur les oliviers et les sycomores du Bas-Pays : Baal-Hanân, le Guédérite ;'
  - type: text
    content: 'sur les réserves d''huile : Yoash ;'
  '29':
  - type: text
    content: 'sur le gros bétail qui paissait dans la plaine côtière (Sharôn) : Shitraï, le Sharonite ;'
  - type: text
    content: 'sur le gros bétail des vallées : Shaphath, fils d''Adlaï ;'
  '3':
  - type: note
    content: 'chef / chefs  : le mot traduit deux termes hébreux différents ; le premier (aussi dans l''expression chefs de famille au v. 1, ou chefs des tribus au v. 22) peut également signifier tête, premier  ; le second (aussi dans chefs de mille, etc.) peut aussi être traduit par prince  ; un autre terme encore est traduit par chef au v. 4 ; celui-ci pourrait aussi être traduit par conducteur ou président (litt. celui qui est devant).'
  - type: text
    content: 'C''était un des fils de Pérets. Il était chef de tous les chefs des armées du premier mois. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Yéhdeya 24.20n. –  le Méronotite  : de Méronoth ; voir Né 3.7.'
  - type: text
    content: 'sur les chameaux : Obil, l''Ismaélite ;'
  - type: text
    content: 'sur les ânesses : Yéhdeya, le Méronotite ;'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'responsables  : litt. chefs (ou princes ), cf. v. 3n  ; 28.1.'
  - type: text
    content: 'sur le petit bétail : Yaziz, le Hagarite.'
  - type: text
    content: Tous ceux-là étaient responsables des biens du roi David.
  - type: heading
    content: L'entourage privé de David
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Comparer les v. 32-34 avec une notice analogue en 18.14-17. – Ce Jonathan n''est pas mentionné ailleurs dans la Bible. –  scribe  : le mot hébreu correspondant désigne souvent la fonction professionnelle d''un personnage, mais pourrait bien être utilisé ici pour évoquer ses compétences particulières de savant ou érudit . –  s''occupait des fils du roi  : litt. (était) avec les fils du roi , peut-être en tant que précepteur.'
  - type: text
    content: 'Jonathan, oncle de David, était conseiller ; c''était un homme intelligent, un scribe. Yehiel, fils de Hakmoni, s''occupait des fils du roi ; '
  '33':
  - type: note
    content: 'Ahitophel 2S 15.12+. –  Houshaï 2S 15.32+. –  ami du roi  : cf. 2S 15.37n  ; 1R 4.5n.'
  - type: text
    content: 'Ahitophel était conseiller du roi ; Houshaï, l''Arkite, était ami du roi ; '
  '34':
  - type: note
    content: Joïada, fils de Benaya, à ne pas confondre avec le prêtre Joïada, père de Benaya, mentionné au v. 5. Par contre il est possible que, dans ces deux versets, Benaya soit le même personnage. –  Joab est le seul nom qui apparaisse simultanément dans la présente liste et dans celle de 18.14-17 (v. 15) ; voir 2S 2.13n.
  - type: text
    content: après Ahitophel, il y eut Joïada, fils de Benaya, et Abiathar ; Joab était chef de l'armée du roi.
  '4':
  - type: note
    content: 'Dodaï  : cf. Dodo, en 11.12. –  chef  : cf. v. 3n.'
  - type: text
    content: 'Sur la classe du deuxième mois : Dodaï, l''Ahohite ; sa classe avait Miqloth comme chef ; pour sa classe, 24 000 hommes.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Benaya 11.22.
  - type: text
    content: 'Chef de la troisième armée, pour le troisième mois : Benaya, fils de Joïada, le prêtre chef ; pour sa classe, 24 000 hommes. '
  '6':
  - type: note
    content: 'les trente  : cf. 2S 23.8n,22s.'
  - type: text
    content: Ce Benaya était un vaillant homme parmi les trente et à la tête des trente ; Ammizabad, son fils, faisait partie de sa classe.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Asaël 2.16n.
  - type: text
    content: 'Le quatrième, pour le quatrième mois : Asaël, frère de Joab, et, après lui, Zebadia, son fils ; pour sa classe, 24 000 hommes.'
  '8':
  - type: text
    content: 'Le cinquième, pour le cinquième mois : le chef Shamehouth, de Yizrah ; pour sa classe, 24 000 hommes.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ira…  : cf. 11.28.'
  - type: text
    content: 'Le sixième, pour le sixième mois : Ira, fils d''Iqqesh, le Teqoïte ; pour sa classe, 24 000 hommes.'
