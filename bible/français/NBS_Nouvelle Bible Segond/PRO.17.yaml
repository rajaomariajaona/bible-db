document_id: PRO.17,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Mieux vaut… 15.16s. –  la tranquillité  : LXX la paix . –  pleine de viandes…  : litt. pleine de sacrifices de querelle.'
  - type: text
    content: Mieux vaut un morceau de pain sec avec la tranquillité
  - type: text
    content: qu'une maison pleine de viandes avec des querelles.
  '10':
  - type: text
    content: ' '
  - type: note
    content: stupide 1.22+.
  - type: text
    content: Un reproche fait plus d'effet à l'homme intelligent
  - type: text
    content: que cent coups à l'homme stupide.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'que révolte (hébreu ak-meri ) fait assonance, en hébreu, avec cruel (hébreu ’akzari ). –  un messager ou un ange cruel  : cf. Ex 12.23,29 ; Ps 78.49. Voir aussi Pr 24.21s.'
  - type: text
    content: Le mauvais ne recherche que révolte ;
  - type: text
    content: un messager cruel lui sera envoyé.
  '12':
  - type: text
    content: ' '
  - type: note
    content: homme stupide v. 10+. –  imbécillité 15.21n.
  - type: text
    content: Mieux vaut rencontrer une ourse privée de ses petits
  - type: text
    content: qu'un homme stupide dans son imbécillité.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'rend le mal pour le bien  : cf. 20.22 ; 24.29 ; Dt 23.25 ; Ps 109.4s ; Rm 12.17 ; 1Th 5.15 ; 1P 3.9.'
  - type: text
    content: Celui qui rend le mal pour le bien,
  - type: text
    content: le mal ne s'éloignera pas de sa maison.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'rompre une digue  : litt. libérer des eaux . –  retire-toi  : cf. 20.3 ; Mt 5.25,40.'
  - type: text
    content: Commencer une dispute, c'est rompre une digue ;
  - type: text
    content: avant que la querelle se déchaîne, retire-toi.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui justifie le méchant…  : autres traductions celui qui déclare juste le méchant et celui qui déclare méchant le juste ; celui qui acquitte le coupable et celui qui condamne l''innocent  ; cf. 24.24 ; Ex 23.7 ; Dt 16.18-20 ; 25.1n  ; Es 5.23 ; Jb 9.20n.'
  - type: text
    content: Celui qui justifie le méchant et celui qui condamne le juste
  - type: text
    content: 'sont tous deux une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'argent  : cf. 2.4n  ; 3.14n. –  homme stupide 1.22+. –  acquérir 4.5+. –  de raison  : litt. de cœur.'
  - type: text
    content: Pourquoi une somme d'argent dans la main de l'homme stupide ?
  - type: text
    content: Pour acquérir la sagesse ? Mais il n'a pas de raison !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ami  : cf. 18.24 ; 27.10 ; Siracide 6.8 : « Il y a l''homme qui est un ami à son heure à lui et qui ne le restera pas au jour de la détresse. » 6.16 : « Un ami fidèle est un élixir de vie, ceux qui craignent le Seigneur le trouveront. » –  le frère…  : autre traduction c''est un frère né pour la détresse  ; cf. Siracide 40.24 : « Les frères et les appuis interviennent au temps de l''adversité, mais bien davantage l''aumône est libératrice. »'
  - type: text
    content: L'ami aime en tout temps ;
  - type: text
    content: le frère est né pour la détresse.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui est dépourvu…  : litt. l''humain qui manque de cœur frappe la main (ou la paume ) ; cf. 6.1n-5.'
  - type: text
    content: Celui qui est dépourvu de raison prend des engagements,
  - type: text
    content: il se porte garant pour son prochain.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'l''offense  : autre traduction la transgression  ; même terme hébreu au v. 9. –  brouilles 13.10. –  élève sa porte ou, plus littéralement, son ouverture, son entrée  ; l''expression a été interprétée au sens propre ( celui qui veut avoir une maison plus grande ou plus belle que les autres ) ou au sens figuré ( celui qui ouvre tout grand la bouche ) ; il s''agit en tout cas d''une mise en garde contre l''orgueil ; cf. 16.18 ; 18.12.'
  - type: text
    content: Qui aime l'offense aime les brouilles ;
  - type: text
    content: qui élève sa porte recherche le désastre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'il a part au patrimoine  : autre traduction il répartit le patrimoine.'
  - type: text
    content: Un serviteur qui a du bon sens domine sur le fils qui fait honte ;
  - type: text
    content: il a part au patrimoine au milieu des frères.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'cœur tortueux  : cf. Ps 101.4+. –  la langue perverse  : litt. celui qui (se ?) retourne par sa langue  ; le verbe peut aussi avoir le sens de détruire  ; cf. Gn 19.21n.'
  - type: text
    content: Un cœur tortueux ne trouve pas le bonheur ;
  - type: text
    content: la langue perverse tombe dans le malheur.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.1 ; Siracide 22.3 : « C''est une honte d''être le père d''un fils mal élevé. »'
  - type: text
    content: Qui donne le jour à un être stupide aura du chagrin ;
  - type: text
    content: le père d'un fou ne saurait se réjouir.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Un cœur joyeux  : cf. 15.13 ; voir aussi 14.30.'
  - type: text
    content: Un cœur joyeux est un bon remède ;
  - type: text
    content: un esprit abattu dessèche les os.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'des pots-de-vin ou des présents (cf. v. 8 ; 18.16 et 21.14 où le sens du même terme peut être plus large), ici manifestement destinés à un juge corrompu ou à un faux témoin (cf. Ex 23.8+). –  sous le manteau  : litt. (tirés) de la poche ou du sein , de dessous le manteau, en cachette. –  équité 1.3n.'
  - type: text
    content: Le méchant accepte des pots-de-vin offerts sous le manteau
  - type: text
    content: pour faire dévier les sentiers de l'équité.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'tout près  : litt. avec la face . –  mais les yeux…  : parce qu''il ne sait pas fixer son attention sur ce qui est nécessaire et proche ; cf. Dt 30.11-14 ; Ec 2.14 ; 8.1. –  de la terre  : autre traduction du pays.'
  - type: text
    content: La sagesse est tout près de l'homme intelligent ;
  - type: text
    content: mais les yeux de l'homme stupide vont aux extrémités de la terre.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Un fils stupide  : cf. 1.22+ ; 10.1.'
  - type: text
    content: Un fils stupide contrarie son père ;
  - type: text
    content: il rend amère celle qui l'a mis au monde.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'condamner… à une amende  : même verbe ou termes apparentés en 19.19n  ; 21.11 ; 22.3 ; 27.12 ; Ex 21.22 ; Dt 22.19 ; 2R 23.33n  ; Am 2.8. –  frapper…  : autre traduction ni de frapper des gens de bien à cause de leur droiture  ; cf. 19.6n.'
  - type: text
    content: Il n'est pas bon de condamner un juste, même à une amende ;
  - type: text
    content: frapper les nobles est contraire au droit.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'se retient de parler  : autre traduction modère ses propos  ; cf. 10.19. –  possède  : litt. connaît  ; cf. 4.1+. –  calme  : litt. froid.'
  - type: text
    content: Celui qui se retient de parler possède la connaissance ;
  - type: text
    content: l'esprit calme est intelligent.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'l''imbécile 1.7n. –  quand il se tait…  : cf. Jb 13.5 ; Siracide 20.5 : « Tel se tait que l''on tient pour sage, tel autre se rend odieux à force de bavarder. »'
  - type: text
    content: Même l'imbécile, quand il se tait, passe pour sage ;
  - type: text
    content: celui qui tient ses lèvres fermées est intelligent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Il y a un creuset… 27.21. –  l'argent… l'or 3.14n. –  celui qui sonde ou qui éprouve  ; le terme correspondant peut aussi évoquer la purification des métaux ; cf. Jr 9.6 ; 11.20 ; Ps 7.10n  ; 66.10 ; Jb 7.18n.
  - type: text
    content: Il y a un creuset pour l'argent et un four pour l'or ;
  - type: text
    content: 'celui qui sonde les cœurs, c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui fait du mal  : cf. 1.14 ; 24.19.'
  - type: text
    content: Celui qui fait du mal prête attention à la lèvre malfaisante ;
  - type: text
    content: le menteur prête l'oreille à la langue perfide.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Qui se moque… 14.31n. –  qui le fait  : autre traduction qui l''a fait . –  qui se réjouit  : cf. 24.17+ ; Lv 19.14.'
  - type: text
    content: Qui se moque du pauvre outrage celui qui le fait ;
  - type: text
    content: qui se réjouit d'une catastrophe ne sera pas tenu pour innocent.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'La couronne des vieillards  : cf. 14.24n  ; 16.31n. –  les petits-fils  : litt. les fils des fils  ; cf. Ps 128.3-6. –  la parure  : autre traduction la splendeur  ; 4.9n. –  les pères  : cf. Siracide 3.11-16 : « La gloire d''un homme vient de l''honneur de son père… Mon fils, prends soin de ton père dans sa vieillesse… C''est un blasphémateur, celui qui abandonne son père. »'
  - type: text
    content: La couronne des vieillards, ce sont les petits-fils ;
  - type: text
    content: la parure des fils, ce sont les pères.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Le langage  : litt. la lèvre. –  distingué  : traduction incertaine ; quelques-uns modifient le texte hébreu traditionnel pour lire droit(e) . – La formule traduite par ne convient pas (hébreu lo’-nawa ) fait assonance, en hébreu, avec celles qui sont rendues par à un fou (ou, peut-être, à un rustre ) et à un noble . –  le langage mensonger  : autre traduction la lèvre menteuse  ; cf. Ps 120.2.'
  - type: text
    content: Le langage distingué ne convient pas à un fou ;
  - type: text
    content: combien moins à un noble le langage mensonger !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Les présents (ou les pots-de-vin  ; cf. v. 23n) …  : litt. le présent est une pierre de grâce aux yeux de ses maîtres . On peut comprendre l''expression pierre de grâce au sens de pierre précieuse ou peut-être de talisman ( qui fait obtenir grâce ou faveur ) ; cf. 18.16 ; 19.6 ; 21.14.'
  - type: text
    content: Les présents sont une pierre précieuse aux yeux de ceux qui en disposent ;
  - type: text
    content: où qu'ils aillent, ils ont du succès.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'une offense  : autre traduction une transgression  ; cf. 10.12. –  qui la rappelle  : la formule de l''hébreu pourrait signifier qui la rappelle par ses paroles ou dans une affaire . –  les intimes 16.28n.'
  - type: text
    content: Celui qui couvre une offense recherche l'amour ;
  - type: text
    content: celui qui la rappelle divise les intimes.
