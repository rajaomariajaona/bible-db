document_id: PSA.129,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Souvent ils m'ont attaqué, mais…
  - type: text
    content: ' '
  - type: note
    content: 'montées 120.1n. –  m’ / ma  : autres chants communautaires à la première personne du singulier Es 12.1ss ; 61.10 ; Jr 10.19ss ; Mi 7.7ss. –  depuis ma jeunesse Jr 2.2 ; Os 2.17 ; 11.1 ; cf. Ex 1.11s. –  Qu''Israël… 124.1+.'
  - type: text
    content: Chant des montées.
  - type: text
    content: Souvent ils m'ont attaqué depuis ma jeunesse,
  - type: text
    content: – Qu'Israël le dise ! –
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ils ne l''ont pas emporté  : cf. Lm 3.22ss.'
  - type: text
    content: souvent ils m'ont attaqué depuis ma jeunesse,
  - type: text
    content: mais ils ne l'ont pas emporté sur moi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 66.11 ; Es 1.6 ; 51.23. –  Des laboureurs  : LXX a lu les méchants , comme au v. 4.'
  - type: text
    content: Des laboureurs ont labouré mon dos,
  - type: text
    content: ils y ont tracé de longs sillons.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Le Seigneur est juste… ou le Seigneur, le Juste, a détaché…  ; cf. 7.10,12 ; 11.7 ; 51.6 ; 119.137 ; 145.17 ; Es 45.21 ; So 3.5 ; Lm 1.18 ; Dn 4.34 ; 9.14 ; Esd 9.15 ; Né 9.33. –  les cordes des méchants , c.-à-d. celles par lesquelles les méchants retenaient les justes ; cf. 124.6s ; 125.3 ; Lv 6.13 ; Es 9.3 ; Ez 34.27.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est juste :'
  - type: text
    content: il a détaché les cordes des méchants.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 35.4 ; 40.15.
  - type: text
    content: Qu'ils soient honteux et qu'ils reculent,
  - type: text
    content: tous ceux qui détestent Sion !
  '6':
  - type: text
    content: ' '
  - type: note
    content: '37.2 ; 2R 19.26 ; Es 37.27. –  en terrasse  : sous-entendu dans le texte ; cf. Dt 22.8n. –  qui se dessèche…  : sens incertain ; quelques-uns modifient le texte hébreu traditionnel pour lire que le vent d''est dessèche.'
  - type: text
    content: Qu'ils soient comme l'herbe des toits en terrasse,
  - type: text
    content: qui se dessèche avant qu'on l'arrache !
  '7':
  - type: text
    content: Le moissonneur n'en remplit pas sa main,
  - type: text
    content: ni le lieur de gerbes sa poche ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.9 ; 118.26 ; Rt 2.4. – Voir nom.
  - type: text
    content: 'les passants ne disent pas :'
  - type: text
    content: 'Que la bénédiction du '
  - type: text
    content: Seigneur
  - type: text
    content: ' soit sur vous !'
  - type: text
    content: 'Nous vous bénissons au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
