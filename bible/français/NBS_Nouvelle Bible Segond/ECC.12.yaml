  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette description métaphorique du vieillissement et de la mort a souvent été lue de façon allégorique, voir v. 3ss et les notes. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Enseignements de Ptah-Hotep '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 11.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : « Seigneur, la vieillesse est là, la décrépitude est arrivée. La défaillance est là, la faiblesse apparaît… Les yeux sont misérables, les oreilles sont sourdes, la vigueur s''épuise à cause de la fatigue du cœur. La bouche est taciturne, elle ne parle plus ; la mémoire s''en va, elle ne se souvient plus d''hier. Les os sont douloureux de vieillesse. Ce qui était bon est devenu mauvais, le goût s''en est allé. Tout ce qu''apporte la vieillesse est mauvais. Le nez est bouché, il ne respire plus, il est aussi fatigant d''être assis que d''être debout. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nuages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pluie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.3.
      marker-yv: yv-n
    - type: text
      text: avant que s'obscurcissent le soleil et la lumière,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la lune et les étoiles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que les nuages reviennent après la pluie.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On a vu dans ces expressions autant d''allusions à des parties du corps humain, par exemple ici : bras, jambes, dents, yeux.'
      marker-yv: yv-n
    - type: text
      text: Ce jour-là les gardiens de la maison tremblent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les hommes vaillants se courbent ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les meunières, trop peu nombreuses, cessent de moudre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celles qui regardent par les fenêtres sont dans l'obscurité,
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les deux battants…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : peut-être les lèvres qui se ferment et la voix qui faiblit, ou bien les oreilles qui ne perçoivent plus les sons. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le bruit de la meule '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 25.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on se lève…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le vieillard a le sommeil léger et se réveille tôt. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les chanteuses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les filles du chant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; ici encore, on peut discerner une évocation de la voix ou de l''ouïe ; cf. Es 29.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'affaiblissent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se courbent.
      marker-yv: yv-n
    - type: text
      text: les deux battants de la porte se ferment sur la rue
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tandis que baisse le bruit de la meule ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on se lève au chant de l'oiseau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: toutes les chanteuses s'affaiblissent ;
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
