        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Quant au reste… tires-en instruction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'garde-toi de vouloir en faire plus. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: étude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu correspondant n''apparaît qu''ici dans l''A.T. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le corps.
      marker-yv: yv-n
    - type: text
      text: 'Quant au reste, mon fils, tires-en instruction :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à faire un grand nombre de livres, il n'y aurait pas de fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et beaucoup d'étude est une fatigue pour la chair.
