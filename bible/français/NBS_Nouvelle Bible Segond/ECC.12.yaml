      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'paroles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de sagesse et les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'clous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: piquets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'plantés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'le caractère normatif des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'recueils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui en résultent. Autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'comme des aiguillons et comme des piquets plantés par les maîtres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(mot traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: auteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des troupeaux. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un seul berger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 48.15 ; Os 4.16 ; Ps 23.1 ; 28.9.'
      marker-yv: yv-n
    - type: text
      text: Les paroles des sages sont comme des aiguillons ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les auteurs de recueils sont comme des clous plantés.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est le don d'un seul berger.
