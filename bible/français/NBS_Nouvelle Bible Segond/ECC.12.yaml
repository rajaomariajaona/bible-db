        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ton Créateur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot correspondant est au pluriel (d''excellence ?) dans le texte hébreu traditionnel ; on pourrait aussi penser qu''il désigne les parents si le verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'créer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n'était pas habituellement réservé à Dieu ; cf. Gn 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ml 2.10 ; on a parfois modifié le texte pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'souviens-toi de ton puits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ta citerne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', expression qui pourrait désigner métaphoriquement l''épouse (cf. Pr 5.15ss ; Ct 4.15). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avant que viennent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les jours du malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 6.3 ; 11.8 ; voir Jr 13.16+.'
      marker-yv: yv-n
    - type: text
      text: Souviens-toi de ton Créateur pendant les jours de ta jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que viennent les jours du malheur
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et qu''arrivent les années dont tu diras : « Je n''y trouve aucun plaisir » ;'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écrites exactement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après quelques mss hébreux et des versions anciennes, certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a écrit droitement des paroles de vérité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Ps 119.43).
      marker-yv: yv-n
    - type: text
      text: Qohéleth s'est efforcé de trouver des paroles qui plaisent ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont été écrites exactement, ce sont des paroles de vérité.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
