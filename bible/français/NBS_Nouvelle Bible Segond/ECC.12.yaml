      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fin du discours ; tout a été entendu. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Crains
        - type: text
          text: ' Dieu… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.14+ ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '19.20 : « Toute sagesse est crainte du Seigneur, en toute sagesse il y a la pratique de la Loi. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est là tout l'humain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cela vaut pour tout homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 3.13 ; 5.18 ; 7.2).
      marker-yv: yv-n
    - type: text
      text: 'Ecoutons la conclusion de tout le discours :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Crains Dieu et observe ses commandements.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est là tout l'humain.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
