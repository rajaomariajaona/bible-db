document_id: ECC.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'approche de la mort
  - type: text
    content: ' '
  - type: note
    content: 'Souviens-toi de  : autre traduction pense à. –  ton Créateur  : le mot correspondant est au pluriel (d''excellence ?) dans le texte hébreu traditionnel ; on pourrait aussi penser qu''il désigne les parents si le verbe traduit par créer n''était pas habituellement réservé à Dieu ; cf. Gn 1.1n  ; Ml 2.10 ; on a parfois modifié le texte pour lire souviens-toi de ton puits ou de ta citerne , expression qui pourrait désigner métaphoriquement l''épouse (cf. Pr 5.15ss ; Ct 4.15). –  avant que viennent (v. 2n) les jours du malheur  : cf. 6.3 ; 11.8 ; voir Jr 13.16+.'
  - type: text
    content: Souviens-toi de ton Créateur pendant les jours de ta jeunesse,
  - type: text
    content: avant que viennent les jours du malheur
  - type: text
    content: 'et qu''arrivent les années dont tu diras : « Je n''y trouve aucun plaisir » ;'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'écrites exactement  : d''après quelques mss hébreux et des versions anciennes, certains modifient le texte hébreu traditionnel pour lire il a écrit droitement des paroles de vérité (cf. Ps 119.43).'
  - type: text
    content: Qohéleth s'est efforcé de trouver des paroles qui plaisent ;
  - type: text
    content: elles ont été écrites exactement, ce sont des paroles de vérité.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Les aiguillons évoquent peut-être le pouvoir stimulant des paroles de sagesse et les clous (ou piquets ) plantés le caractère normatif des recueils qui en résultent. Autre traduction comme des aiguillons et comme des piquets plantés par les maîtres (mot traduit ici par auteurs ) des troupeaux. –  un seul berger  : cf. Gn 48.15 ; Os 4.16 ; Ps 23.1 ; 28.9.'
  - type: text
    content: Les paroles des sages sont comme des aiguillons ;
  - type: text
    content: les auteurs de recueils sont comme des clous plantés.
  - type: text
    content: C'est le don d'un seul berger.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Quant au reste… tires-en instruction  : traduction incertaine ; certains comprennent garde-toi de vouloir en faire plus. –  étude  : le terme hébreu correspondant n''apparaît qu''ici dans l''A.T. –  la chair  : autre traduction le corps.'
  - type: text
    content: 'Quant au reste, mon fils, tires-en instruction :'
  - type: text
    content: à faire un grand nombre de livres, il n'y aurait pas de fin,
  - type: text
    content: et beaucoup d'étude est une fatigue pour la chair.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutons…  : autre traduction fin du discours ; tout a été entendu. –  Crains Dieu… 3.14+ ; cf. Siracide 19.20 : « Toute sagesse est crainte du Seigneur, en toute sagesse il y a la pratique de la Loi. » –  C''est là tout l''humain  : autre traduction cela vaut pour tout homme (cf. 3.13 ; 5.18 ; 7.2).'
  - type: text
    content: 'Ecoutons la conclusion de tout le discours :'
  - type: text
    content: Crains Dieu et observe ses commandements.
  - type: text
    content: C'est là tout l'humain.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 3.17+ ; cf. 2Co 5.10.
  - type: text
    content: Car Dieu fera venir toute œuvre en jugement,
  - type: text
    content: pour tout ce qui est caché
  - type: text
    content: – que ce soit bien ou mal.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cette description métaphorique du vieillissement et de la mort a souvent été lue de façon allégorique, voir v. 3ss et les notes. Enseignements de Ptah-Hotep (cf. 11.9n) : « Seigneur, la vieillesse est là, la décrépitude est arrivée. La défaillance est là, la faiblesse apparaît… Les yeux sont misérables, les oreilles sont sourdes, la vigueur s''épuise à cause de la fatigue du cœur. La bouche est taciturne, elle ne parle plus ; la mémoire s''en va, elle ne se souvient plus d''hier. Les os sont douloureux de vieillesse. Ce qui était bon est devenu mauvais, le goût s''en est allé. Tout ce qu''apporte la vieillesse est mauvais. Le nez est bouché, il ne respire plus, il est aussi fatigant d''être assis que d''être debout. » –  nuages / pluie 11.3.'
  - type: text
    content: avant que s'obscurcissent le soleil et la lumière,
  - type: text
    content: la lune et les étoiles,
  - type: text
    content: et que les nuages reviennent après la pluie.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'On a vu dans ces expressions autant d''allusions à des parties du corps humain, par exemple ici : bras, jambes, dents, yeux.'
  - type: text
    content: Ce jour-là les gardiens de la maison tremblent,
  - type: text
    content: les hommes vaillants se courbent ;
  - type: text
    content: les meunières, trop peu nombreuses, cessent de moudre,
  - type: text
    content: celles qui regardent par les fenêtres sont dans l'obscurité,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'les deux battants…  : peut-être les lèvres qui se ferment et la voix qui faiblit, ou bien les oreilles qui ne perçoivent plus les sons. –  le bruit de la meule Jr 25.10. –  on se lève…  : le vieillard a le sommeil léger et se réveille tôt. –  les chanteuses  : litt. les filles du chant  ; ici encore, on peut discerner une évocation de la voix ou de l''ouïe ; cf. Es 29.4. –  s''affaiblissent  : litt. se courbent.'
  - type: text
    content: les deux battants de la porte se ferment sur la rue
  - type: text
    content: tandis que baisse le bruit de la meule ;
  - type: text
    content: on se lève au chant de l'oiseau,
  - type: text
    content: toutes les chanteuses s'affaiblissent ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'l''amandier fleurit  : allusion possible aux cheveux blancs du vieillard ; cf. 11.10n  ; autre traduction on dédaigne l''amande. –  le criquet…  : évocation possible de l''allure et de la démarche du vieillard. –  la câpre , à laquelle on prêtait peut-être des vertus apéritives, voire aphrodisiaques ; autre traduction la câpre éclate. –  ce qui sera pour toujours sa demeure  : litt. la maison de sa perpétuité ou de son éternité  ; cf. 3.11n. –  le cortège…  : litt. ceux qui se lamentent (pour les funérailles) circulent  ; cf. Jr 4.8 ; 9.16.'
  - type: text
    content: on a peur de ce qui est élevé,
  - type: text
    content: il y a des terreurs en chemin, l'amandier fleurit,
  - type: text
    content: le criquet devient pesant, la câpre n'a plus d'effet,
  - type: text
    content: car l'être humain s'en va vers ce qui sera pour toujours sa demeure,
  - type: text
    content: et le cortège de lamentations passe dans la rue ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'avant que  : comme au v. 2. –  se détache  : d''après une lecture traditionnelle du texte hébreu et de nombreux mss ; autre lecture traditionnelle s''éloigne  ; certains modifient le texte hébreu pour lire se rompe  ; l''ensemble du v. semble décrire la mort. –  réservoir ou coupe, globe , même terme en 1R 7.41n ( évasé ) ; Za 4.2ns. –  et tombe  : sous-entendu dans le texte.'
  - type: text
    content: avant que le cordon d'argent se détache,
  - type: text
    content: que le réservoir d'or se casse,
  - type: text
    content: que la jarre se brise à la fontaine,
  - type: text
    content: que la poulie se casse et tombe dans la citerne ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: la poussière… 3.20+ ; cf. 1.7n. –  le souffle ou l'esprit  ; cf. 3.21.
  - type: text
    content: avant que la poussière retourne à la terre, selon ce qu'elle était,
  - type: text
    content: et que le souffle retourne à Dieu qui l'a donné.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 1.2+.
  - type: text
    content: Futilité complète, dit Qohéleth, tout n'est que futilité.
  - type: heading
    content: Conclusion
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'appris la connaissance au peuple  : cf. Dn 11.33+. –  pesé  : autre traduction écouté. –  mis en ordre  : autre traduction corrigé . –  maximes ou proverbes  ; cf. Ez 14.8n  ; Ps 78.2n  ; Pr 1.1n.'
  - type: text
    content: Outre que Qohéleth fut un sage,
  - type: text
    content: il a encore appris la connaissance au peuple ;
  - type: text
    content: il a pesé, examiné à fond et mis en ordre un grand nombre de maximes.
