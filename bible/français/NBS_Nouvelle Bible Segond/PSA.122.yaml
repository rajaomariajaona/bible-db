      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme il est de règle en Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la communauté d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 81.5s ; Ex 23.14ss ; 34.23s ; Dt 16.16 ; Lc 2.41s. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: C'est là que montent les tribus,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'les tribus du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (Yah),'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme témoignage pour Israël,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'afin de célébrer le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 72.1ss ; Dt 17.7ss ; 2S 15.2ss ; 1R 3.16ss ; 7.7 ; Es 11.3 ; 16.5 ; Jr 21.12 ; 2Ch 19.8.
      marker-yv: yv-n
    - type: text
      text: Car là sont installés les trônes pour le jugement,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les trônes pour la maison de David.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Demandez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jérusalem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vivent tranquilles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : il y a jeu d''assonances en hébreu entre les mots correspondants ; l''expression '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Demandez la paix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: demandez comment va Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. souciez-vous d''elle ; cf. 51.20 ; 85.9 ; Jr 15.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 14.32. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qu'ils vivent tranquilles…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que tes tentes soient tranquilles ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui t'aiment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 1+ ; 26.8 ; dans toute la fin du psaume les pronoms à la deuxième personne du singulier (féminins en hébreu) désignent '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jérusalem.
      marker-yv: yv-n
    - type: text
      text: Demandez la paix de Jérusalem !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'ils vivent tranquilles, ceux qui t'aiment !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que la paix soit dans tes remparts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la tranquillité dans tes palais !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A cause de mes frères et de mes amis,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'je dirai : Que la paix soit en toi !'
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'A cause de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je recherche ton bonheur.
