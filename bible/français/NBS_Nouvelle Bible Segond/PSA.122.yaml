document_id: PSA.122,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Vœux de paix pour Jérusalem
  - type: text
    content: ' '
  - type: note
    content: montées 120.1n. –  Je me réjouis… 27.4 ; 42.5 ; 43.4 ; 84.2ss ; Es 2.2s ; 30.29 ; Jr 31.6 ; Mi 4.2 ; Za 8.21.
  - type: text
    content: Chant des montées. De David.
  - type: text
    content: 'Je me réjouis quand on me dit :'
  - type: text
    content: 'Allons à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 87.2.
  - type: text
    content: Nos pieds se sont arrêtés
  - type: text
    content: à tes portes, Jérusalem !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 46.6 ; 48.2ss ; 76.1ss ; Mc 13.1/ / ; 1P 2.5 ; Ap 21.10ss. –  qui forme…  : texte obscur, litt. qui est liée pour elle tous ensemble  ; certains comprennent comme une ville puissamment fortifiée  ; cf. 48.13ss.'
  - type: text
    content: Jérusalem, tu es bâtie
  - type: text
    content: comme une ville qui forme un ensemble bien uni.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'montent  : cf. 120.1n. –  du Seigneur (Yah) 68.5n. –  comme témoignage…  : autre traduction comme il est de règle en Israël  ; un ms de Qumrân a lu la communauté d''Israël  ; cf. 81.5s ; Ex 23.14ss ; 34.23s ; Dt 16.16 ; Lc 2.41s. – Voir nom.'
  - type: text
    content: C'est là que montent les tribus,
  - type: text
    content: 'les tribus du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah),'
  - type: text
    content: comme témoignage pour Israël,
  - type: text
    content: 'afin de célébrer le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 72.1ss ; Dt 17.7ss ; 2S 15.2ss ; 1R 3.16ss ; 7.7 ; Es 11.3 ; 16.5 ; Jr 21.12 ; 2Ch 19.8.
  - type: text
    content: Car là sont installés les trônes pour le jugement,
  - type: text
    content: les trônes pour la maison de David.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Demandez / paix / Jérusalem / vivent tranquilles  : il y a jeu d''assonances en hébreu entre les mots correspondants ; l''expression Demandez la paix pourrait aussi signifier demandez comment va Jérusalem , c.-à-d. souciez-vous d''elle ; cf. 51.20 ; 85.9 ; Jr 15.5n  ; Lc 14.32. –  Qu''ils vivent tranquilles…  : un ms porte que tes tentes soient tranquilles ! –  ceux qui t''aiment  : cf. v. 1+ ; 26.8 ; dans toute la fin du psaume les pronoms à la deuxième personne du singulier (féminins en hébreu) désignent Jérusalem.'
  - type: text
    content: Demandez la paix de Jérusalem !
  - type: text
    content: Qu'ils vivent tranquilles, ceux qui t'aiment !
  '7':
  - type: text
    content: Que la paix soit dans tes remparts,
  - type: text
    content: et la tranquillité dans tes palais !
  '8':
  - type: text
    content: A cause de mes frères et de mes amis,
  - type: text
    content: 'je dirai : Que la paix soit en toi !'
  '9':
  - type: text
    content: 'A cause de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: je recherche ton bonheur.
