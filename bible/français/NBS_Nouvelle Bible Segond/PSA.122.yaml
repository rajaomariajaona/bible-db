      marker-yv: yv-n
    - type: text
      text: Chant des montées. De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je me réjouis quand on me dit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Allons à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  !'
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
