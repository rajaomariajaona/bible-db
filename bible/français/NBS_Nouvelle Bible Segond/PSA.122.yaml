      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 46.6 ; 48.2ss ; 76.1ss ; Mc 13.1/ / ; 1P 2.5 ; Ap 21.10ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui forme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : texte obscur, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui est liée pour elle tous ensemble
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme une ville puissamment fortifiée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 48.13ss.
      marker-yv: yv-n
    - type: text
      text: Jérusalem, tu es bâtie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme une ville qui forme un ensemble bien uni.
