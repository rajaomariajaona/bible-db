      - type: usfm
        marker: fr
        children:
        - type: text
          text: '122.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 87.2.
      marker-yv: yv-n
    - type: text
      text: Nos pieds se sont arrêtés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à tes portes, Jérusalem !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
