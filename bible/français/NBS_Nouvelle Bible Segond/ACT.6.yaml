      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'diacre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: diaconat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
