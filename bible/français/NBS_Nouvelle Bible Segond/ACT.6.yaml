        marker: ft
        children:
        - type: text
          text: (2.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Etant donc incapables de regarder la vérité en face, (11) ils soudoyèrent…
      marker-yv: yv-n
    - type: text
      text: 'mais ils n''étaient pas capables de s''opposer à la sagesse et à l''Esprit par lesquels il parlait. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Mt 26.59-66/ /.
      marker-yv: yv-n
    - type: text
      text: 'Alors ils soudoyèrent des hommes qui dirent : Nous l''avons entendu proférer des paroles blasphématoires contre Moïse et contre Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
