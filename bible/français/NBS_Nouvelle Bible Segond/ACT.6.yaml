        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ph 1.1.'
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, comme les disciples se multipliaient, les gens de langue grecque se mirent à maugréer contre les gens de langue hébraïque, parce que leurs veuves étaient négligées dans le service quotidien. '
