          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prosélyte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.11+.
      marker-yv: yv-n
    - type: text
      text: 'Ce discours plut à toute la multitude. Ils choisirent Etienne, homme plein de foi et d''Esprit saint, Philippe, Prochore, Nicanor, Timon, Parménas et Nicolas, prosélyte d''Antioche. '
