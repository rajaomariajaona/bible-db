document_id: ACT.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sept hommes choisis pour aider les apôtres
  - type: text
    content: ' '
  - type: note
    content: 'les disciples  : cf. 9.1,26 ; 11.26 ; 16.1 ; 18.23. –  gens de langue grecque  : litt. hellénistes , au sens d’ hellénophones  ; ce terme désignait sans doute spécialement les Juifs de la diaspora dont le grec était la langue maternelle, par opposition aux Juifs de langue hébraïque (litt. les Hébreux ) qui vivaient dans le pays de leurs ancêtres, même si beaucoup de ces derniers parlaient également grec (cf. v. 5n  ; 9.29 ; 11.20n  ; voir aussi 2Co 11.22 ; Ph 3.5). Il s''agit ici de deux groupes de chrétiens distingués d''après leurs origines. –  maugréer Lc 5.30 ; Jn 6.41n. –  leurs veuves  : cf. 1Tm 5.3ss. –  le service ou le ministère (cf. 1.17,25 ; 2.45 ; 4.35 ; 20.24 ; 21.19) ; c''est le mot grec qui a donné les mots diacre et diaconat , de même au v. 4 ; un verbe apparenté est traduit par servir au v. 2 ; cf. Mt 4.11n  ; 20.26n  ; Ph 1.1.'
  - type: text
    content: 'En ces jours-là, comme les disciples se multipliaient, les gens de langue grecque se mirent à maugréer contre les gens de langue hébraïque, parce que leurs veuves étaient négligées dans le service quotidien. '
  '10':
  - type: note
    content: '4.14 ; Lc 21.15. –  s''opposer  : autre traduction résister  ; même verbe en 13.8 ; Lc 21.15. –  à la sagesse…  : texte occidental à la sagesse qui était en lui (cf. v. 3) et à l''Esprit saint par lequel il parlait, parce qu''il les confondait en toute assurance (2.29n). Etant donc incapables de regarder la vérité en face, (11) ils soudoyèrent…'
  - type: text
    content: 'mais ils n''étaient pas capables de s''opposer à la sagesse et à l''Esprit par lesquels il parlait. '
  '11':
  - type: note
    content: Cf. Mt 26.59-66/ /.
  - type: text
    content: 'Alors ils soudoyèrent des hommes qui dirent : Nous l''avons entendu proférer des paroles blasphématoires contre Moïse et contre Dieu. '
  '12':
  - type: note
    content: 'Mt 10.17. –  anciens / scribes  : cf. Mt 27.41+ ; Mc 8.31n  ; Lc 9.22.'
  - type: text
    content: 'Ils ameutèrent le peuple, les anciens et les scribes ; puis ils survinrent, s''emparèrent de lui et l''emmenèrent au sanhédrin. '
  '13':
  - type: note
    content: 'faux témoins  : cf. Ex 20.16 ; Pr 14.5 ; 24.28. –  contre ce lieu (c.-à-d. le temple 7.38,48 ; 24.6) … / contre la loi (18.13 ; 21.21) : v. 11 ; 21.28 ; 25.8 ; cf. Jr 26.11 ; Mt 24.1s,15/ / ; Jn 11.48.'
  - type: text
    content: 'Ils produisirent de faux témoins qui disaient : Cet homme ne cesse de proférer des paroles contre ce lieu et contre la loi ; '
  '14':
  - type: note
    content: Cf. Mc 14.57s ; Jn 2.19. –  nazoréen 2.22+.
  - type: text
    content: 'car nous l''avons entendu dire que Jésus, ce nazoréen, détruirait ce lieu et changerait les coutumes que Moïse nous a transmises. '
  '15':
  - type: note
    content: 'qui siégeaient  : autre traduction qui étaient assis. –  le fixaient  : cf. Lc 4.20. –  ils virent…  : autre traduction ils virent que sa face était pareille à… cf. 7.55s. – Voir ange.'
  - type: text
    content: Alors que tous ceux qui siégeaient au sanhédrin le fixaient, ils virent son visage comme celui d'un ange.
  '2':
  - type: note
    content: 'Cf. Ex 18.17-23. –  Les Douze  : cf. 1.2-26. –  la multitude v. 5 ; 15.12,30.'
  - type: text
    content: 'Les Douze convoquèrent alors la multitude des disciples et dirent : Il ne convient pas que nous délaissions la parole de Dieu pour servir aux tables. '
  '3':
  - type: note
    content: 'Choisissez  : autre traduction cherchez. –  sept hommes 21.8. –  bon témoignage 10.22 ; 16.2 ; 22.12 ; cf. 1Tm 3.7ss ; 3Jn 12. –  remplis d''Esprit 2.4+ ; cf. 7.55 ; Ex 31.3 ; 35.31. –  sagesse v. 10 ; Lc 2.40. –  de cela  : litt. de ce besoin.'
  - type: text
    content: 'Choisissez plutôt parmi vous, frères, sept hommes de qui l''on rende un bon témoignage, remplis d''Esprit et de sagesse, et nous les chargerons de cela. '
  '4':
  - type: note
    content: 'Cf. 2.42+. –  service  : cf. v. 1n  ; 20.24 ; 21.19 ; Lc 1.2.'
  - type: text
    content: 'Quant à nous, nous nous consacrerons assidûment à la prière et au service de la Parole. '
  '5':
  - type: note
    content: 'Les sept noms mentionnés ici sont grecs (v. 1n). –  Etienne 6.8–8.2 ; 11.19s ; 22.20. – Voir Esprit saint. –  Philippe 8.5-40 ; 21.8 ; les Actes le distinguent de l''apôtre du même nom (1.13). –  Nicolas  : voir Ap 2.6n. –  prosélyte 2.11+.'
  - type: text
    content: 'Ce discours plut à toute la multitude. Ils choisirent Etienne, homme plein de foi et d''Esprit saint, Philippe, Prochore, Nicanor, Timon, Parménas et Nicolas, prosélyte d''Antioche. '
  '6':
  - type: note
    content: après avoir prié 1.24 ; 13.3 ; 14.23. –  leur imposèrent les mains 8.17-19 ; 9.12,17 ; 13.3 ; 19.6 ; 28.8 ; Mt 9.18+ ; 1Tm 4.14 ; 5.22 ; 2Tm 1.6 ; Hé 6.2 ; cf. Nb 27.18-23 ; Dt 34.9.
  - type: text
    content: Ils les présentèrent aux apôtres, qui, après avoir prié, leur imposèrent les mains.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.41,47. –  La parole de Dieu se répandait 12.24 ; 19.20. –  prêtres  : il y avait plusieurs milliers de prêtres à Jérusalem. –  obéissait à la foi Rm 1.5+.'
  - type: text
    content: La parole de Dieu se répandait, le nombre des disciples se multipliait rapidement à Jérusalem, et une grande foule de prêtres obéissait à la foi.
  - type: heading
    content: Arrestation d'Etienne
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Etienne v. 5+. –  plein de grâce  : certains mss portent plein de foi  ; cf. 4.33. –  prodiges / signes 2.19+ ; cf. 5.12.'
  - type: text
    content: 'Etienne, plein de grâce et de puissance, produisait des prodiges et des signes grandioses parmi le peuple. '
  '9':
  - type: note
    content: 'Quelques membres…  : il s''agit de Juifs appartenant à une ou plusieurs synagogues hellénistiques de Jérusalem (cf. 9.29 ; 24.12), parmi lesquels les descendants affranchis des Juifs que Pompée avait emmenés captifs à Rome environ un siècle auparavant. –  Cyrénéens 2.10 ; 13.1+ ; Mt 27.32/ /. –  Cilicie 21.39+. –  Asie 16.6n.'
  - type: text
    content: 'Quelques membres de la synagogue dite des Affranchis, des Cyrénéens, des Alexandrins et des gens de Cilicie et d''Asie, engagèrent un débat avec Etienne ; '
