document_id: PSA.102,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Détresse et espérance
  - type: text
    content: ' '
  - type: note
    content: défaille 61.3 ; 142.4n. –  répand… 142.3.
  - type: text
    content: 'Prière. D''un pauvre, lorsqu''il défaille et qu''il répand sa requête devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '10':
  - type: text
    content: ' '
  - type: note
    content: '42.4 ; 80.6 ; cf. 2S 12.16 ; Jb 2.8 ; 42.6 ; Lm 3.16. –  je mêle  : cf. Pr 9.2n.'
  - type: text
    content: Je mange de la cendre comme du pain,
  - type: text
    content: je mêle mes larmes à ce que je bois,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'soulevé… Es 64.5 ; Jb 27.21 ; 30.22. –  au loin  : sous-entendu dans le texte.'
  - type: text
    content: à cause de ta fureur et de ta colère,
  - type: text
    content: car tu m'as soulevé et jeté au loin.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 5 ; 37.2 ; 90.6,9 ; 103.15. –  comme l''ombre qui s''allonge (autre traduction qui décline ) : cf. 109.23n  ; 144.4 ; Es 40.7 ; 51.12 ; Jr 6.4 ; Jb 8.9 ; 14.2.'
  - type: text
    content: Mes jours sont comme l'ombre qui s'allonge,
  - type: text
    content: et je me dessèche comme l'herbe.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'tu es installé (ou tu es assis [en roi ou en juge] ) pour toujours 9.8+ ; cf. Lm 5.19. –  on évoque ton nom…  : litt. ton évocation (ou ton souvenir ) (est) de génération en génération  ; au lieu de ton évocation (cf. 6.6n  ; 135.13 ; Ex 3.15n) quelques mss portent ton trône.'
  - type: text
    content: 'Mais toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es installé pour toujours,'
  - type: text
    content: on évoque ton nom de génération en génération.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Tu te lèveras 3.8+ ; 7.7. –  compassion…  : cf. 67.2 ; 135.14 ; Dt 32.36 ; Es 14.1 ; 30.18 ; 49.13 ; Jr 30.18 ; 31.20 ; Ez 39.25 ; Am 5.15 ; Za 1.12. –  de lui faire grâce  : autre traduction d''avoir pitié d''elle  ; le même verbe est traduit par prendre pitié au v. 15. –  le temps fixé  : cf. 12.6 ; 69.14 ; 85.10 ; 119.126 ; sur le terme correspondant, voir Gn 1.14n  ; 17.21n.'
  - type: text
    content: Tu te lèveras, tu auras compassion de Sion ;
  - type: text
    content: car c'est le moment de lui faire grâce,
  - type: text
    content: le temps fixé est arrivé ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: nous prenons en pitié v. 14n  ; cf. Es 52.2 ; Lm 4.1 ; Dn 9.17 ; Né 2.3.
  - type: text
    content: car nous, tes serviteurs, nous nous plaisons à ses pierres,
  - type: text
    content: nous prenons en pitié sa poussière.
  '16':
  - type: text
    content: ' '
  - type: note
    content: les nations craindront 1R 8.43 ; Es 59.19. –  ta gloire Es 40.5 ; 52.10 ; 66.18.
  - type: text
    content: 'Alors les nations craindront le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et tous les rois de la terre ta gloire.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'rebâtit Sion  : cf. 51.20 ; 87.5 ; 147.2 ; Es 14.32 ; 60.10 ; Jr 30.18 ; Mi 7.11. –  apparaît dans sa gloire Es 60.1.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rebâtit Sion,'
  - type: text
    content: il apparaît dans sa gloire.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 22.25 ; 69.34.
  - type: text
    content: Il se tourne vers la prière du misérable,
  - type: text
    content: il ne méprise pas sa prière.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'écrit  : cf. Es 8.1ss ; 30.8. –  génération future / peuple qui sera créé 22.31s ; Es 43.1+,21 ; 2Co 5.17 ; Ep 2.10. –  le Seigneur (Yah)  : cf. 68.5n.'
  - type: text
    content: Que cela soit écrit pour la génération future,
  - type: text
    content: 'et le peuple qui sera créé louera le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 39.13 ; 84.9 ; 143.1. –  que mes appels… 18.7 ; 88.3 ; 119.169.
  - type: text
    content: Seigneur
  - type: text
    content: ', entends ma prière,'
  - type: text
    content: et que mes appels au secours parviennent jusqu'à toi !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'de son haut sanctuaire  : autres traductions de sa hauteur sacrée ; de la hauteur de sa sainteté  ; 11.4+ ; 14.2 ; 33.14 ; 113.5s ; Dt 26.15 ; Es 63.15.'
  - type: text
    content: Car il se penche de son haut sanctuaire ;
  - type: text
    content: 'du ciel le '
  - type: text
    content: Seigneur
  - type: text
    content: ' regarde sur la terre'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'soupirs… 79.11. –  ceux qui sont en danger de mort  : litt. les fils de la mort , ce qui peut aussi signifier les condamnés à mort.'
  - type: text
    content: pour entendre les soupirs du prisonnier,
  - type: text
    content: pour délivrer ceux qui sont en danger de mort,
  '22':
  - type: text
    content: 'afin qu''ils parlent, dans Sion, du nom du '
  - type: text
    content: Seigneur
  - type: text
    content: et qu'ils disent sa louange dans Jérusalem,
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 86.9 ; Es 2.2ss ; 45.14 ; 60.3ss ; Mi 7.12 ; Za 14.16 ; Ml 1.11 ; Ap 15.4 ; 21.24.
  - type: text
    content: quand peuples et royaumes se réuniront
  - type: text
    content: 'pour servir le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Il a fait fléchir  : litt. il a affligé ou il a humilié. –  ma force  : autre texte hébreu traditionnel sa force. –  abrégé mes jours 89.46.'
  - type: text
    content: Il a fait fléchir ma force en chemin,
  - type: text
    content: il a abrégé mes jours.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El , cf. Gn 21.33n. –  au milieu… Es 38.10 ; Ec 7.17. –  de génération en génération  : cf. v. 28 ; 90.2ss.'
  - type: text
    content: 'Je dis : Mon Dieu, ne m''enlève pas au milieu de mes jours,'
  - type: text
    content: toi, dont les années durent de génération en génération !
  '26':
  - type: text
    content: ' '
  - type: note
    content: Hé 1.10-12  ; cf. Gn 1.1 ; Es 45.12 ; 51.12.
  - type: text
    content: Autrefois tu as fondé la terre,
  - type: text
    content: et le ciel est l'œuvre de tes mains.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ils disparaîtront Mt 24.35/ /. –  tu subsisteras v. 13+. –  comme un vêtement  : cf. Es 34.4 ; 50.9 ; 51.6ss ; Jb 13.28. –  tu les changeras  : cf. Es 65.17 ; 2P 3.10ss ; Ap 20.11.'
  - type: text
    content: Eux, ils disparaîtront, mais toi, tu subsisteras ;
  - type: text
    content: ils s'useront tous comme un vêtement ;
  - type: text
    content: tu les changeras comme un habit, et ils seront changés.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'toi, c''est toi  : litt. toi, lui ou tu es lui , formule qui peut être interprétée au sens de tu es le même ou tu es (réellement)  ; cf. Dt 32.39n  ; Es 41.4n  ; voir aussi Hé 13.8. –  tes années… v. 25+ ; Jb 36.26.'
  - type: text
    content: 'Mais toi, c''est toi :'
  - type: text
    content: tes années ne finiront pas.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 69.37 ; Jr 33.16 ; Ez 37.25.
  - type: text
    content: Les fils de tes serviteurs auront une demeure,
  - type: text
    content: et leur descendance s'affermira devant toi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ne te détourne pas…  : litt. ne me cache pas ta face  ; 13.2+ ; 27.9n  ; 69.18. –  au jour de ma détresse 9.10+. –  Tends… 17.6n  ; 31.3 ; 71.2. –  au jour où je crie 56.10 ; cf. 3.5+. –  Réponds-moi vite ! 31.3+ ; 143.7.'
  - type: text
    content: Ne te détourne pas de moi au jour de ma détresse !
  - type: text
    content: Tends vers moi ton oreille au jour où je crie !
  - type: text
    content: Réponds-moi vite !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 31.11 ; 90.9s. –  en fumée 37.20 ; 68.3 ; Es 51.6 ; Os 13.3 ; cf. Jc 4.14. –  mes os… Jb 30.30.
  - type: text
    content: Car mes jours s'évanouissent en fumée,
  - type: text
    content: mes os sont brûlants comme de la braise.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'frappé 121.6 ; Es 49.10n  ; Jon 4.8. –  se dessèche 22.16. –  comme l''herbe 102.12+. –  j''en oublie…  : litt. car (ou à cause de cela ) j''oublie de manger mon pain  ; 109.24 ; 1S 1.7s ; Jb 33.20.'
  - type: text
    content: Mon cœur est frappé, et se dessèche comme l'herbe ;
  - type: text
    content: j'en oublie de manger.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.7 ; 69.4 ; Jb 19.20 ; Lm 1.21 ; 4.8.
  - type: text
    content: Mes gémissements sont tels
  - type: text
    content: que mes os s'attachent à ma chair.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'pélican / chat-huant  : identification incertaine d''oiseaux peuplant les lieux désertiques ou dévastés ; cf. So 2.14n.'
  - type: text
    content: Je ressemble au pélican du désert,
  - type: text
    content: je suis comme le chat-huant des ruines ;
  '8':
  - type: text
    content: je veille, et je suis
  - type: text
    content: comme l'oiseau solitaire sur un toit.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 42.11 ; 44.17. –  m''outragent  : autre traduction me déshonorent. –  sans cesse  : litt. tout le jour . –  furieux ou frénétiques, exaltés  ; ailleurs la même forme verbale évoque la folie ; cf. Es 44.25 ; Jb 12.17 ; Ec 7.7. –  me prennent à témoin de leurs serments  : litt. jurent par moi  : le sort de l''auteur est tel qu''il sert à illustrer la malédiction encourue en cas de parjure : cf. Es 65.15n  ; Jr 29.22 ; Za 8.13 ; on pourrait aussi comprendre jurent contre moi , c.-à-d. me maudissent solennellement  ; cf. Nb 5.21ss.'
  - type: text
    content: Mes ennemis m'outragent sans cesse,
  - type: text
    content: mes adversaires furieux me prennent à témoin de leurs serments.
