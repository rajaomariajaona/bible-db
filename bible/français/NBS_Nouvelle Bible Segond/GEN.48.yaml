          text: et vint voir Jacob.
      marker-yv: yv-n
    - type: text
      text: 'Après cela, on dit à Joseph : Ton père est malade. Il prit alors avec lui ses deux fils, Manassé et Ephraïm. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Joseph les fit approcher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il les fit approcher.
      marker-yv: yv-n
    - type: text
      text: '– Les yeux d''Israël étaient appesantis par la vieillesse ; il ne pouvait plus voir. – Joseph les fit approcher de lui ; il les embrassa et les étreignit. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Israël dit à Joseph : Je ne pensais pas revoir ton visage, et Dieu me fait voir aussi ta descendance ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des genoux de son père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de ses genoux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (sur le rite d'adoption, cf. 30.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 50.23).'
      marker-yv: yv-n
    - type: text
      text: 'Joseph les retira des genoux de son père et se prosterna face contre terre. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Joseph les prit tous les deux, Ephraïm par la main droite, à la gauche d''Israël, et Manassé par la main gauche, à la droite d''Israël, et il les fit approcher de lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le plus jeune '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cadet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 25.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il avait croisé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est à dessein qu'il avait placé ses mains ainsi, bien que Manassé fût le premier-né.
      marker-yv: yv-n
    - type: text
      text: 'Israël tendit sa main droite et la posa sur la tête d''Ephraïm, alors que celui-ci était le plus jeune, et il posa sa main gauche sur la tête de Manassé. Il avait croisé ses mains – en effet, Manassé était le premier-né. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
