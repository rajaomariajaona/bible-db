document_id: GEN.48,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob bénit les fils de Joseph
  - type: text
    content: ' '
  - type: note
    content: 'on dit  : d''après LXX, Tg, Syr, Vg  ; texte hébreu traditionnel, litt. il dit . –  Manassé / Ephraïm 41.50-52. – LXX ajoute à la fin du v. et vint voir Jacob.'
  - type: text
    content: 'Après cela, on dit à Joseph : Ton père est malade. Il prit alors avec lui ses deux fils, Manassé et Ephraïm. '
  '10':
  - type: note
    content: '27.1+. –  Joseph les fit approcher  : litt. il les fit approcher.'
  - type: text
    content: '– Les yeux d''Israël étaient appesantis par la vieillesse ; il ne pouvait plus voir. – Joseph les fit approcher de lui ; il les embrassa et les étreignit. '
  '11':
  - type: text
    content: 'Israël dit à Joseph : Je ne pensais pas revoir ton visage, et Dieu me fait voir aussi ta descendance ! '
  '12':
  - type: note
    content: 'des genoux de son père  : litt. de ses genoux (sur le rite d''adoption, cf. 30.3n  ; 50.23).'
  - type: text
    content: 'Joseph les retira des genoux de son père et se prosterna face contre terre. '
  '13':
  - type: text
    content: 'Puis Joseph les prit tous les deux, Ephraïm par la main droite, à la gauche d''Israël, et Manassé par la main gauche, à la droite d''Israël, et il les fit approcher de lui. '
  '14':
  - type: note
    content: 'le plus jeune ou le cadet, cf. 25.23. –  Il avait croisé…  : autre traduction c''est à dessein qu''il avait placé ses mains ainsi, bien que Manassé fût le premier-né.'
  - type: text
    content: 'Israël tendit sa main droite et la posa sur la tête d''Ephraïm, alors que celui-ci était le plus jeune, et il posa sa main gauche sur la tête de Manassé. Il avait croisé ses mains – en effet, Manassé était le premier-né. '
  '15':
  - type: note
    content: 'Joseph 49.22-26. –  devant qui… 17.1 ; 24.40. –  de tout temps… jusqu''à ce jour  : même expression Nb 22.30. –  berger 49.24 ; Ez 34.15,23 ; Ps 23.1 ; 80.2 ; Jn 10.1-18.'
  - type: text
    content: 'Il bénit Joseph en disant :'
  - type: text
    content: Que le Dieu devant qui ont marché mes pères, Abraham et Isaac,
  - type: text
    content: que le Dieu qui a été de tout temps mon berger, jusqu'à ce jour,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'le messager (autre traduction l''ange ) : Smr porte le roi (les deux mots se ressemblent en hébreu) ; cf. 31.11 ; 32.25n  ; Ex 23.20 ; 32.24. –  rédimé ou délivré  ; cf. Ex 6.6n. Voir rédemption. –  foisonnent  : le verbe hébreu est peut-être apparenté au mot dag ou daga , qui signifie poisson (pour évoquer l''idée de foisonnement innombrable ?) ou à dagân , qui désigne le blé (cf. Dagân , dieu cananéen des céréales et de la fertilité à Ougarit, qui apparaît dans la Bible sous le nom de Dagôn  ; cf. Jg 16.23 ; 1S 5.2n).'
  - type: text
    content: que le messager qui m'a rédimé de tout mal bénisse ces garçons !
  - type: text
    content: Qu'on les appelle de mon nom
  - type: text
    content: et du nom de mes pères, Abraham et Isaac ;
  - type: text
    content: qu'ils foisonnent, qu'ils se multiplient dans le pays !
  '17':
  - type: text
    content: 'Joseph vit que son père avait posé sa main droite sur la tête d''Ephraïm, et cela lui déplut. Il prit la main de son père pour la retirer de la tête d''Ephraïm et la mettre sur celle de Manassé. '
  '18':
  - type: text
    content: 'Joseph dit à son père : Pas ainsi, père ! C''est celui-ci qui est le premier-né. Pose ta main droite sur sa tête. '
  '19':
  - type: note
    content: 'Cf. 25.23. –  un ensemble  : litt. une plénitude  ; d''autres comprennent rempliront les nations.'
  - type: text
    content: 'Mais son père refusa ; il dit : Je sais, mon fils, je sais ; lui aussi deviendra un peuple, lui aussi sera grand ; mais son frère cadet sera plus grand que lui, et sa descendance deviendra un ensemble de nations. '
  '2':
  - type: text
    content: 'On dit à Jacob : Ton fils Joseph vient te voir. Israël rassembla ses forces et s''assit sur son lit. '
  '20':
  - type: note
    content: 'par toi  : LXX porte par vous. –  bénira  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire se bénira  ; cf. 12.3n.'
  - type: text
    content: 'Il les bénit ce jour-là en disant :'
  - type: text
    content: 'C''est par toi qu''Israël bénira en disant :'
  - type: text
    content: Que Dieu te rende comme Ephraïm et comme Manassé !
  - type: text
    content: 'Ainsi il mettait Ephraïm avant Manassé. '
  '21':
  - type: note
    content: 15.16 ; 46.4.
  - type: text
    content: 'Israël dit à Joseph : Je vais mourir. Mais Dieu sera avec vous, et il vous ramènera au pays de vos pères. '
  '22':
  - type: note
    content: 'un « sichem », une part (cf. 43.34) : le mot hébreu shékem, qui signifie épaule et peut-être, au sens figuré, colline, est aussi le nom d''une ville (traditionnellement transcrit Sichem, 12.6n) ; LXX a gardé ici le nom propre. Les paroles de Jacob pourraient viser la colline et la ville de Sichem où Joseph sera enseveli (Jos 24.32). –  Amorites 10.16n  ; 15.16. –  épée 34.25-29 ; 35.5. – L’arc (cf. 49.23s) est caractéristique de la tribu de Benjamin, qui occupe la région avoisinante (2S 1.18,22 ; 1Ch 8.40 ; 12.2 ; 2Ch 4.7).'
  - type: text
    content: Quant à moi, je t'ai donné un « sichem », une part de plus qu'à tes frères, celle que j'ai prise aux Amorites avec mon épée et mon arc.
  '3':
  - type: note
    content: 'Le Dieu-Puissant  : hébreu ’El-Shaddaï 17.1n  ; 35.11. –  Louz 28.19 ; 35.6.'
  - type: text
    content: 'Jacob dit à Joseph : Le Dieu-Puissant m''est apparu à Louz, en Canaan, et il m''a béni. '
  '4':
  - type: note
    content: '28.3 ; 35.11. –  assemblée de peuples  : voir 28.3n.'
  - type: text
    content: 'Il m''a dit : « Je te rends fécond ; je te multiplierai et je ferai de toi une assemblée de peuples ; je donnerai ce pays à ta descendance après toi, comme propriété perpétuelle. » '
  '5':
  - type: note
    content: V. 1. Les tribus d’Ephraïm et de Manassé (voir 41.50-52) remplaceront celle de Joseph Nb 1.10 ; Jos 14.4. –  Ruben et Siméon sont les fils aînés de Jacob (29.31-33) ; cf. 35.22+ ; 34.25+ ; 1Ch 5.1s.
  - type: text
    content: 'Maintenant, les deux fils qui sont nés de toi en Egypte, avant mon arrivée vers toi en Egypte, seront miens ; Ephraïm et Manassé seront miens, comme Ruben et Siméon. '
  '6':
  - type: note
    content: 'les enfants ou la famille, cf. 11.28n. –  que tu as engendrés  : autre traduction que tu engendrerais  ; il y aura deux tribus issues de Joseph et non pas davantage. Voir aussi nom. –  patrimoine Jos 13–19.'
  - type: text
    content: 'Mais les enfants que tu as engendrés après eux seront tiens ; ils seront désignés sous le nom de leurs frères pour recevoir leur part du patrimoine. '
  '7':
  - type: note
    content: 'Paddân  : comme le précisent quelques textes anciens, il s''agit de Paddân-Aram (25.20n). –  Rachel  : deux témoins du texte ajoutent  : ta mère. – Sur l''ensemble, voir 35.16n-20.'
  - type: text
    content: A mon arrivée de Paddân, Rachel mourut près de moi en Canaan, en route, à quelque distance d'Ephrata ; c'est là que je l'ai ensevelie, sur le chemin d'Ephrata, c'est-à-dire Beth-Léhem.
  '8':
  - type: text
    content: 'Israël regarda les fils de Joseph et dit : Ceux-ci, qui sont-ils ? '
  '9':
  - type: note
    content: Hé 11.21.
  - type: text
    content: 'Joseph répondit à son père : Ce sont mes fils, ceux que Dieu m''a donnés ici. Il dit : Je t''en prie, fais-les avancer vers moi, pour que je les bénisse. '
