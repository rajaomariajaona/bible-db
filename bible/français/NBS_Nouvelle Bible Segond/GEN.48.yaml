    - type: text
      text: que le messager qui m'a rédimé de tout mal bénisse ces garçons !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'on les appelle de mon nom
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et du nom de mes pères, Abraham et Isaac ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils foisonnent, qu'ils se multiplient dans le pays !
  '17':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Joseph vit que son père avait posé sa main droite sur la tête d''Ephraïm, et cela lui déplut. Il prit la main de son père pour la retirer de la tête d''Ephraïm et la mettre sur celle de Manassé. '
  '18':
  - type: usfm
    marker: m
    children:
    - type: text
      text: 'Joseph dit à son père : Pas ainsi, père ! C''est celui-ci qui est le premier-né. Pose ta main droite sur sa tête. '
  '19':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 25.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un ensemble
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une plénitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rempliront les nations.
      marker-yv: yv-n
    - type: text
      text: 'Mais son père refusa ; il dit : Je sais, mon fils, je sais ; lui aussi deviendra un peuple, lui aussi sera grand ; mais son frère cadet sera plus grand que lui, et sa descendance deviendra un ensemble de nations. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On dit à Jacob : Ton fils Joseph vient te voir. Israël rassembla ses forces et s''assit sur son lit. '
  '20':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se bénira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il les bénit ce jour-là en disant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'C''est par toi qu''Israël bénira en disant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que Dieu te rende comme Ephraïm et comme Manassé !
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi il mettait Ephraïm avant Manassé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.16 ; 46.4.
      marker-yv: yv-n
    - type: text
      text: 'Israël dit à Joseph : Je vais mourir. Mais Dieu sera avec vous, et il vous ramènera au pays de vos pères. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un « sichem », une part '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 43.34) : le mot hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shékem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'épaule '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et peut-être, au sens figuré, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: colline
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', est aussi le nom d''une ville (traditionnellement transcrit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Sichem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 12.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; LXX a gardé ici le nom propre. Les paroles de Jacob pourraient viser la colline et la ville de Sichem où Joseph sera enseveli (Jos 24.32). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amorites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 34.25-29 ; 35.5. – L’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'arc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 49.23s) est caractéristique de la tribu de Benjamin, qui occupe la région avoisinante (2S 1.18,22 ; 1Ch 8.40 ; 12.2 ; 2Ch 4.7).
      marker-yv: yv-n
    - type: text
      text: Quant à moi, je t'ai donné un « sichem », une part de plus qu'à tes frères, celle que j'ai prise aux Amorites avec mon épée et mon arc.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le Dieu-Puissant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’El-Shaddaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 35.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Louz '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 28.19 ; 35.6.
      marker-yv: yv-n
    - type: text
      text: 'Jacob dit à Joseph : Le Dieu-Puissant m''est apparu à Louz, en Canaan, et il m''a béni. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.3 ; 35.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: assemblée de peuples
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 28.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il m''a dit : « Je te rends fécond ; je te multiplierai et je ferai de toi une assemblée de peuples ; je donnerai ce pays à ta descendance après toi, comme propriété perpétuelle. » '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '48.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 1. Les tribus d’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Manassé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir 41.50-52) remplaceront celle de Joseph Nb 1.10 ; Jos 14.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ruben et Siméon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont les fils aînés de Jacob (29.31-33) ; cf. 35.22+ ; 34.25+ ; 1Ch 5.1s.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, les deux fils qui sont nés de toi en Egypte, avant mon arrivée vers toi en Egypte, seront miens ; Ephraïm et Manassé seront miens, comme Ruben et Siméon. '
