        children:
        - type: text
          text: 'devant qui… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.1 ; 24.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de tout temps… jusqu'à ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression Nb 22.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'berger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 49.24 ; Ez 34.15,23 ; Ps 23.1 ; 80.2 ; Jn 10.1-18.
      marker-yv: yv-n
    - type: text
      text: 'Il bénit Joseph en disant :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que le Dieu devant qui ont marché mes pères, Abraham et Isaac,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que le Dieu qui a été de tout temps mon berger, jusqu'à ce jour,
