document_id: JOS.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le territoire de Siméon
  - type: heading
    content: 1Ch 4.28-33
  - type: text
    content: ' '
  - type: note
    content: 'Voir fils. –  Leur patrimoine…  : cf. 15.24-42 pour les noms de beaucoup de ces localités. Pour les v. 1-9, cf. 15.21-32 ; Gn 49.5-7n  ; 1Ch 4.24-33.'
  - type: text
    content: 'Le deuxième lot qui sortit fut pour Siméon, la tribu des fils de Siméon, clan par clan. Leur patrimoine était au milieu du patrimoine des fils de Juda. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'les fils de Zabulon  : pour les v. 10-16, cf. Gn 49.13 ; Dt 33.18s. –  Sarid  : au nord de la plaine de Jizréel.'
  - type: text
    content: 'Le troisième lot fut pour les fils de Zabulon, clan par clan. La frontière de leur patrimoine s''étendait jusqu''à Sarid. '
  '11':
  - type: note
    content: 'Maréala / Dabbasheth  : au nord de l’oued (cf. Gn 26.17) Qishôn (voir v. 20 ; Jg 4.7n). –  Yoqnéam  : à 20 km au sud-est de Haïfa.'
  - type: text
    content: 'La frontière montait vers l''ouest et vers Maréala, touchait Dabbasheth, puis l''oued qui passe devant Yoqnéam. '
  '12':
  - type: note
    content: 'Yaphia  : à 2 km au sud-ouest de Nazareth.'
  - type: text
    content: 'De Sarid, elle tournait vers l''est, vers le soleil levant, à la frontière de Kisloth-Tabor, aboutissait à Dabrath et montait à Yaphia. '
  '13':
  - type: note
    content: 'Guitta-Hépher  : cf. 2R 14.25. Localisation incertaine, peut-être à 5 km au nord-est de Nazareth. –  Rimmôn (Grenade) : à 9 km au nord de Nazareth.'
  - type: text
    content: 'De là, elle passait à l''est par Guitta-Hépher, par Itta-Qatsîn, aboutissait à Rimmôn, s''incurvant jusqu''à Néa. '
  '14':
  - type: note
    content: 'la vallée de Yiphtah-El (Dieu ouvre) : à 25 km au sud-est d''Akko.'
  - type: text
    content: 'La frontière tournait ensuite au nord de Hannatôn et débouchait sur la vallée de Yiphtah-El. '
  '15':
  - type: note
    content: 'Nahalal (Abreuvoir) : à une dizaine de kilomètres au sud-ouest de Nazareth, cf. 21.35. –  Shimrôn 11.1n. –  Yidéala  : certains mss hébreux et LXX portent Yiréala (confusion de deux lettres proches par la forme) ; probablement à 13 km à l''ouest de Nazareth. –  douze villes  : ce total ne correspond plus à l''état actuel du texte.'
  - type: text
    content: 'Avec Qattath, Nahalal, Shimrôn, Yidéala, Beth-Léhem, douze villes, et les villages qui en dépendent. '
  '16':
  - type: text
    content: Voilà le patrimoine des fils de Zabulon, clan par clan, ces villes-là et les villages qui en dépendent.
  - type: heading
    content: Le territoire d'Issacar
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Issacar  : pour les v. 17-23, cf. Gn 49.14s ; Dt 33.18s.'
  - type: text
    content: 'Le quatrième lot qui sortit fut pour Issacar, pour les fils d''Issacar, clan par clan. '
  '18':
  - type: note
    content: 'Jizréel, dans la vallée du même nom (cf. 17.16n), deviendra la ville d''Achab et Jézabel ; cf. 1R 18.45s ; 21.1ss. –  Shounem  : à 11 km au sud de Nazareth ; cf. 1S 28.4 ; 1R 1.3,15 ; 2.17 ; 2R 4.8-37 ; Ct 7.1n.'
  - type: text
    content: 'Leur frontière atteignait Jizréel, Kesouloth, Shounem, '
  '19':
  - type: note
    content: 'Anaharath  : au sud de Eïn-Dor (17.11).'
  - type: text
    content: 'Hapharaïm, Shiôn, Anaharath, '
  '2':
  - type: note
    content: 'Shéba  : la liste de 15.26 porte Shema, et celle de 1Ch 4.28ss n''a pas de ville correspondante. Peut-être Shéba est-elle une répétition accidentelle de la finale de Bersabée (hébreu Béer-Shéba). Notons que sans Shéba, la liste donnerait bien treize villes, cf. v. 6.'
  - type: text
    content: 'Ils eurent dans leur patrimoine : Bersabée, Shéba, Molada, '
  '20':
  - type: text
    content: 'Rabbith, Qishiôn, Abets, '
  '21':
  - type: text
    content: 'Rémeth, Eïn-Gannim, Eïn-Hadda et Beth-Patsets ; '
  '22':
  - type: text
    content: 'la frontière touchait Tabor, Shahatsima, Beth-Shémesh ; puis leur frontière débouchait sur le Jourdain : seize villes, et les villages qui en dépendent. '
  '23':
  - type: text
    content: Voilà le patrimoine de la tribu des fils d'Issacar, clan par clan, les villes et les villages qui en dépendent.
  - type: heading
    content: Le territoire d'Aser
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'fils d''Aser  : pour les v. 24-31, cf. Gn 49.20 ; Dt 33.24s.'
  - type: text
    content: 'Le cinquième lot qui sortit fut pour la tribu des fils d''Aser, clan par clan. '
  '25':
  - type: text
    content: 'Leur frontière était Helqath, Hali, Béten, Akshaph, '
  '26':
  - type: note
    content: 'Carmel  : promontoire de la côte méditerranéenne, près du port de Haïfa, cf. 1R 18.19n.'
  - type: text
    content: 'Alammélek, Améad et Mishéal ; elle touchait, vers l''ouest, le Carmel et Shihor-Libnath ; '
  '27':
  - type: note
    content: 'à gauche  : autre traduction au nord.'
  - type: text
    content: 'puis elle tournait vers le soleil levant, vers Beth-Dagôn, touchait Zabulon et la vallée de Yiphtah-El, au nord de Beth-Emeq et de Néiel, et aboutissait à Kaboul, à gauche, '
  '28':
  - type: text
    content: 'puis à Ebrôn, Rehob, Hammôn et Qana, jusqu''à Sidon la Grande. '
  '29':
  - type: text
    content: 'La frontière tournait ensuite vers Rama jusqu''à la ville forte de Tyr ; puis la frontière tournait vers Hosa, pour déboucher sur la mer, par la contrée d''Akzib. '
  '3':
  - type: text
    content: 'Hatsar-Shoual, Bala, Atsem, '
  '30':
  - type: note
    content: 'Ouma ou Oumma, ou même Akko selon d''autres témoins (cf. Jg 1.31). –  Apheq  : cf. 12.18n  ; il s''agit probablement ici de la localité appelée Aphiq en Jg 1.31 ; elle est peut-être à situer en Phénicie.'
  - type: text
    content: 'Avec Ouma, Apheq et Rehob, vingt-deux villes, et les villages qui en dépendent. '
  '31':
  - type: text
    content: Voilà le patrimoine de la tribu des fils d'Aser, clan par clan, ces villes-là et les villages qui en dépendent.
  - type: heading
    content: Le territoire de Nephtali
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'les fils de Nephtali  : pour les v. 32-39, cf. Dt 33.23.'
  - type: text
    content: 'Le sixième lot qui sortit fut pour les fils de Nephtali, clan par clan. '
  '33':
  - type: note
    content: 'Leur frontière… débouchait sur le Jourdain  : beaucoup des noms qui apparaissent ici sont inconnus et difficiles à localiser. Certains ont déjà été mentionnés précédemment ; parfois un même nom désigne deux localités différentes. Ici, la région se trouve à l''ouest et au nord-ouest du lac de Tibériade.'
  - type: text
    content: 'Leur frontière s''étendait depuis Héleph, depuis le térébinthe qui est à Tsaanannim, Adami-Néqeb et Yabnéel, jusqu''à Laqqoum ; elle débouchait sur le Jourdain. '
  '34':
  - type: text
    content: 'La frontière tournait vers l''ouest à Aznoth-Tabor et de là aboutissait à Houqoq ; elle touchait Zabulon du côté du sud, Aser du côté de l''ouest et Juda ; le Jourdain était vers le soleil levant. '
  '35':
  - type: text
    content: 'Les villes fortes étaient Tsiddim, Tser, Hammath, Raqqath, Kinnéreth, '
  '36':
  - type: text
    content: 'Adama, Rama, Hatsor, '
  '37':
  - type: text
    content: 'Qédesh, Edréi, Eïn-Hatsor, '
  '38':
  - type: text
    content: 'Yiréôn, Migdal-El, Horem, Beth-Anath et Beth-Shémesh : dix-neuf villes, et les villages qui en dépendent. '
  '39':
  - type: text
    content: Voilà le patrimoine de la tribu des fils de Nephtali, clan par clan, les villes et les villages qui en dépendent.
  - type: heading
    content: Le territoire de Dan
  '4':
  - type: text
    content: 'Eltolad, Betoul, Horma, '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Dan  : pour les v. 40-48, cf. Gn 49.16s ; Dt 33.22 ; Jg 18.'
  - type: text
    content: 'Le septième lot qui sortit fut pour la tribu des fils de Dan, clan par clan. '
  '41':
  - type: note
    content: 'Ir-Shémesh  : cf. Jg 1.35n.'
  - type: text
    content: 'La frontière de leur patrimoine était Tsoréa, Eshtaol, Ir-Shémesh, '
  '42':
  - type: text
    content: 'Shaalabbîn, Ayyalôn, Yitla, '
  '43':
  - type: text
    content: 'Elôn, Timnata, Eqrôn, '
  '44':
  - type: text
    content: 'Elteqé, Guibbetôn, Baalath, '
  '45':
  - type: text
    content: 'Yehoud, Bené-Beraq, Gath-Rimmôn, '
  '46':
  - type: note
    content: 'Raqqôn (ou le Raqqôn) : le terme correspondant est absent de LXX  ; certains croient qu''il résulte d''une répétition accidentelle des lettres du mot Yarqôn, nom d''un cours d''eau qui se jette dans la Méditerranée à Jaffa. D''autres pensent que l''expression les eaux du Yarqôn, comme Raqqôn, désigne un lieu précis. –  le territoire  : autre traduction la frontière.'
  - type: text
    content: les eaux du Yarqôn et Raqqôn, avec le territoire en face de Jaffa.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Le territoire… leur échappait  : litt. le territoire (ou la frontière ) des fils de Dan sortit d''eux , sens incertain ; quelques-uns se fondent sur LXX (qui intervertit ce v. et le suivant) pour modifier le texte hébreu traditionnel et lire le territoire des fils de Dan était trop exigu pour eux (cf. 17.15). –  au fil de l''épée 6.21n. –  l''appelèrent Dan  : notice historique sur la destinée des Danites (cf. Jg 1.34s) ; chassés par les Amorites, ils vont vers le nord à Léshem (= Laïsh en Jg 18.7).'
  - type: text
    content: 'Le territoire des fils de Dan leur échappait. Alors les fils de Dan allèrent faire la guerre à Léshem ; ils la prirent et la passèrent au fil de l''épée ; ils en prirent possession, s''y installèrent et l''appelèrent Dan, du nom de Dan, leur père. '
  '48':
  - type: text
    content: Voilà le patrimoine de la tribu des fils de Dan, clan par clan, ces villes-là et les villages qui en dépendent.
  - type: heading
    content: La ville de Timnath-Sérah accordée à Josué
  '49':
  - type: text
    content: ' '
  - type: note
    content: Josué, fils de Noun 1.1n  ; cf. 14.6-15 ; Ez 45.7s.
  - type: text
    content: 'Lorsqu''ils eurent achevé de recevoir le pays en patrimoine, d''après ses frontières, les Israélites donnèrent à Josué, fils de Noun, un patrimoine au milieu d''eux. '
  '5':
  - type: note
    content: 'Beth-Markaboth (Maison des Chars) : cf. 1Ch 4.31. –  Hatsar-Soussa  : Parc de la cavalerie.'
  - type: text
    content: 'Tsiqlag, Beth-Markaboth, Hatsar-Soussa, '
  '50':
  - type: note
    content: 'Sur l''ordre du Seigneur  : litt. sur la bouche de YHWH  ; cf. 15.13n. –  Timnath-Sérah  : c''est la Timnath-Hérès de Jg 2.9, à environ 15 km au nord-ouest de Beth-El ; cf. 24.30. –  Il rebâtit  : autre traduction il bâtit.'
  - type: text
    content: 'Sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ils lui donnèrent la ville qu''il avait demandée, Timnath-Sérah, dans la région montagneuse d''Ephraïm. Il rebâtit la ville et s''y installa.'
  '51':
  - type: text
    content: ' '
  - type: note
    content: la tente de la Rencontre 18.1n.
  - type: text
    content: 'Tels sont les patrimoines qu''Eléazar, le prêtre, Josué, fils de Noun, et les chefs de famille répartirent par le sort devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à Silo, à l''entrée de la tente de la Rencontre, selon les tribus des Israélites. Ainsi ils achevèrent le partage du pays.'
  '6':
  - type: note
    content: 'Beth-Lebaoth (Maison des Lionnes) : cf. 15.32.'
  - type: text
    content: 'Beth-Lebaoth et Sharouhen : treize villes, et les villages qui en dépendent ; '
  '7':
  - type: note
    content: 'Aïn, Rimmôn  : le texte hébreu traditionnel semble ici les compter comme deux villes (cf. 15.32n) ; LXX porte Eïn-Rimmôn et rajoute la localité Thalkha pour arriver au total de quatre villes.'
  - type: text
    content: 'Aïn, Rimmôn, Eter et Ashân : quatre villes, et les villages qui en dépendent ; '
  '8':
  - type: note
    content: 'Baalath-Béer (Dame [ou Propriétaire] du puits) : comparer avec Béaloth (pluriel) de 15.24 ; voir aussi 15.29 ; 19.3. –  Ramath-Néguev (Hauteur du midi) : autres traductions Rama du Néguev ou Ramath du midi (cf. Ramoth du Néguev en 1S 30.27).'
  - type: text
    content: 'et tous les villages qui sont autour de ces villes, jusqu''à Baalath-Béer (c''est-à-dire Ramath-Néguev). Voilà le patrimoine de la tribu des fils de Siméon, clan par clan. '
  '9':
  - type: text
    content: Le patrimoine des fils de Siméon fut pris sur la contrée des fils de Juda ; car la part des fils de Juda était trop grande pour eux, et c'est au milieu de leur patrimoine que les fils de Siméon reçurent le leur.
  - type: heading
    content: Le territoire de Zabulon
