document_id: JOS.19,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de Siméon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Ch 4.28-33
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Leur patrimoine…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 15.24-42 pour les noms de beaucoup de ces localités. Pour les v. 1-9, cf. 15.21-32 ; Gn 49.5-7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 4.24-33.'
      marker-yv: yv-n
    - type: text
      text: 'Le deuxième lot qui sortit fut pour Siméon, la tribu des fils de Siméon, clan par clan. Leur patrimoine était au milieu du patrimoine des fils de Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les fils de Zabulon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : pour les v. 10-16, cf. Gn 49.13 ; Dt 33.18s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sarid
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : au nord de la plaine de Jizréel.'
      marker-yv: yv-n
    - type: text
      text: 'Le troisième lot fut pour les fils de Zabulon, clan par clan. La frontière de leur patrimoine s''étendait jusqu''à Sarid. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Maréala '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dabbasheth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au nord de l’'
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'oued '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 26.17) Qishôn (voir v. 20 ; Jg 4.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yoqnéam
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à 20 km au sud-est de Haïfa.'
      marker-yv: yv-n
    - type: text
      text: 'La frontière montait vers l''ouest et vers Maréala, touchait Dabbasheth, puis l''oued qui passe devant Yoqnéam. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yaphia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à 2 km au sud-ouest de Nazareth.'
      marker-yv: yv-n
    - type: text
      text: 'De Sarid, elle tournait vers l''est, vers le soleil levant, à la frontière de Kisloth-Tabor, aboutissait à Dabrath et montait à Yaphia. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guitta-Hépher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 14.25. Localisation incertaine, peut-être à 5 km au nord-est de Nazareth. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rimmôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Grenade
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : à 9 km au nord de Nazareth.'
      marker-yv: yv-n
    - type: text
      text: 'De là, elle passait à l''est par Guitta-Hépher, par Itta-Qatsîn, aboutissait à Rimmôn, s''incurvant jusqu''à Néa. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la vallée de Yiphtah-El '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu ouvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : à 25 km au sud-est d''Akko.'
      marker-yv: yv-n
    - type: text
      text: 'La frontière tournait ensuite au nord de Hannatôn et débouchait sur la vallée de Yiphtah-El. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nahalal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abreuvoir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : à une dizaine de kilomètres au sud-ouest de Nazareth, cf. 21.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shimrôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yidéala
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss hébreux et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yiréala '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(confusion de deux lettres proches par la forme) ; probablement à 13 km à l''ouest de Nazareth. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: douze villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce total ne correspond plus à l''état actuel du texte.'
      marker-yv: yv-n
    - type: text
      text: 'Avec Qattath, Nahalal, Shimrôn, Yidéala, Beth-Léhem, douze villes, et les villages qui en dépendent. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà le patrimoine des fils de Zabulon, clan par clan, ces villes-là et les villages qui en dépendent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire d'Issacar
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Issacar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : pour les v. 17-23, cf. Gn 49.14s ; Dt 33.18s.'
      marker-yv: yv-n
    - type: text
      text: 'Le quatrième lot qui sortit fut pour Issacar, pour les fils d''Issacar, clan par clan. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jizréel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', dans la vallée du même nom (cf. 17.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), deviendra la ville d''Achab et Jézabel ; cf. 1R 18.45s ; 21.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shounem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à 11 km au sud de Nazareth ; cf. 1S 28.4 ; 1R 1.3,15 ; 2.17 ; 2R 4.8-37 ; Ct 7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Leur frontière atteignait Jizréel, Kesouloth, Shounem, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Anaharath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au sud de Eïn-Dor (17.11).'
      marker-yv: yv-n
    - type: text
      text: 'Hapharaïm, Shiôn, Anaharath, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shéba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la liste de 15.26 porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Shema
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et celle de 1Ch 4.28ss n''a pas de ville correspondante. Peut-être '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shéba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est-elle une répétition accidentelle de la finale de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Bersabée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Béer-Shéba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). Notons que sans '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shéba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', la liste donnerait bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: treize villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 6.'
      marker-yv: yv-n
    - type: text
      text: 'Ils eurent dans leur patrimoine : Bersabée, Shéba, Molada, '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rabbith, Qishiôn, Abets, '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Rémeth, Eïn-Gannim, Eïn-Hadda et Beth-Patsets ; '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'la frontière touchait Tabor, Shahatsima, Beth-Shémesh ; puis leur frontière débouchait sur le Jourdain : seize villes, et les villages qui en dépendent. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà le patrimoine de la tribu des fils d'Issacar, clan par clan, les villes et les villages qui en dépendent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire d'Aser
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fils d'Aser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : pour les v. 24-31, cf. Gn 49.20 ; Dt 33.24s.'
      marker-yv: yv-n
    - type: text
      text: 'Le cinquième lot qui sortit fut pour la tribu des fils d''Aser, clan par clan. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Leur frontière était Helqath, Hali, Béten, Akshaph, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Carmel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : promontoire de la côte méditerranéenne, près du port de Haïfa, cf. 1R 18.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alammélek, Améad et Mishéal ; elle touchait, vers l''ouest, le Carmel et Shihor-Libnath ; '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à gauche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au nord.
      marker-yv: yv-n
    - type: text
      text: 'puis elle tournait vers le soleil levant, vers Beth-Dagôn, touchait Zabulon et la vallée de Yiphtah-El, au nord de Beth-Emeq et de Néiel, et aboutissait à Kaboul, à gauche, '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'puis à Ebrôn, Rehob, Hammôn et Qana, jusqu''à Sidon la Grande. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La frontière tournait ensuite vers Rama jusqu''à la ville forte de Tyr ; puis la frontière tournait vers Hosa, pour déboucher sur la mer, par la contrée d''Akzib. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hatsar-Shoual, Bala, Atsem, '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ouma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Oumma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou même '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Akko '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'selon d''autres témoins (cf. Jg 1.31). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Apheq
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; il s''agit probablement ici de la localité appelée Aphiq en Jg 1.31 ; elle est peut-être à situer en Phénicie.'
      marker-yv: yv-n
    - type: text
      text: 'Avec Ouma, Apheq et Rehob, vingt-deux villes, et les villages qui en dépendent. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà le patrimoine de la tribu des fils d'Aser, clan par clan, ces villes-là et les villages qui en dépendent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de Nephtali
    marker-yv: yv-h
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les fils de Nephtali
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : pour les v. 32-39, cf. Dt 33.23.'
      marker-yv: yv-n
    - type: text
      text: 'Le sixième lot qui sortit fut pour les fils de Nephtali, clan par clan. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Leur frontière… débouchait sur le Jourdain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : beaucoup des noms qui apparaissent ici sont inconnus et difficiles à localiser. Certains ont déjà été mentionnés précédemment ; parfois un même nom désigne deux localités différentes. Ici, la région se trouve à l''ouest et au nord-ouest du lac de Tibériade.'
      marker-yv: yv-n
    - type: text
      text: 'Leur frontière s''étendait depuis Héleph, depuis le térébinthe qui est à Tsaanannim, Adami-Néqeb et Yabnéel, jusqu''à Laqqoum ; elle débouchait sur le Jourdain. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La frontière tournait vers l''ouest à Aznoth-Tabor et de là aboutissait à Houqoq ; elle touchait Zabulon du côté du sud, Aser du côté de l''ouest et Juda ; le Jourdain était vers le soleil levant. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les villes fortes étaient Tsiddim, Tser, Hammath, Raqqath, Kinnéreth, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Adama, Rama, Hatsor, '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Qédesh, Edréi, Eïn-Hatsor, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yiréôn, Migdal-El, Horem, Beth-Anath et Beth-Shémesh : dix-neuf villes, et les villages qui en dépendent. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Voilà le patrimoine de la tribu des fils de Nephtali, clan par clan, les villes et les villages qui en dépendent.
  - type: usfm
    marker: s1
    children:
    - type: text
