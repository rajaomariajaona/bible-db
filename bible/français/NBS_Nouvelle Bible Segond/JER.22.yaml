    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2R 23.34.
    marker-yv: yv-n
  - type: text
    text: mais il mourra dans le lieu où on l'a exilé ; il ne reverra plus ce pays.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Contre Joïaqim, deuxième successeur de Josias
  marker-yv: yv-h
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.13 '
    - type: usfm
