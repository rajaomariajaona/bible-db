    text: '– Est-il donc un pantin méprisable et disloqué, ce Konia ? Est-ce un objet dont personne ne veut plus ? Pourquoi sont-ils jetés, lui et ses descendants, lancés dans un pays qu''ils ne connaissent pas ? '
