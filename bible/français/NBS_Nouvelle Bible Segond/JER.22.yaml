    marker-yv: yv-n
  - type: text
    text: 'Car voici ce que dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' contre la maison du roi de Juda :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Tu es pour moi un Galaad,
- type: usfm
  marker: q1
  children:
  - type: text
    text: un sommet du Liban ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: pourtant, sans faute, je ferai de toi un désert,
- type: usfm
  marker: q1
  children:
  - type: text
    text: une ville sans habitants.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je consacre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je sanctifie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 6.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Es 13.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cèdres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 15,23 ; Es 37.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans le feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.14.
    marker-yv: yv-n
  - type: text
    text: Je consacre contre toi des destructeurs,
- type: usfm
  marker: q1
  children:
  - type: text
    text: chacun avec ses armes ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: ils couperont tes plus beaux cèdres
- type: usfm
  marker: q1
  children:
  - type: text
    text: et les feront tomber dans le feu.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'passera… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pourquoi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.19+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cette grande ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ap 18.18.'
    marker-yv: yv-n
  - type: text
    text: 'Une multitude de nations passera près de cette ville ; les gens se diront l''un à l''autre : Pourquoi le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a-t-il ainsi traité cette grande ville ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils ont abandonné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.13+ ; cf. 19.4. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils se sont prosternés… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.10.
    marker-yv: yv-n
  - type: text
    text: 'Et l''on répondra : Parce qu''ils ont abandonné l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), leur Dieu, parce qu''ils se sont prosternés devant d''autres dieux et les ont servis.'
- type: usfm
