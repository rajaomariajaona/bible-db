    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Descends à la maison du roi de Juda, et là prononce cette parole. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 7.2 ; 17.20 ; 34.4.
    marker-yv: yv-n
  - type: text
    text: 'Tu diras : Ecoute la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', roi de Juda, qui es assis sur le trône de David, toi, les gens de ta cour et ton peuple, qui entrez par ces portes ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 16s ; 7.6+ ; 21.12+ ; Es 1.17 ; Mt 23.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' innocent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.6+.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Agissez selon l''équité et la justice ; délivrez de la main de l''oppresseur celui qu''on dépouille ; n''exploitez pas l''immigré, l''orphelin et la veuve ; n''usez pas de violence et ne répandez pas de sang innocent en ce lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: eux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: '  ; l''hébreu a le singulier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lui, les gens de sa cour et son peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 2.'
    marker-yv: yv-n
  - type: text
    text: 'Car si vraiment vous agissez selon cette parole, les rois assis sur le trône de David entreront par les portes de cette maison, montés sur des chars et sur des chevaux, eux, les gens de leur cour et leur peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je le jure par moi-même '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 44.26 ; 49.13 ; 51.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 22.16+ ; Es 45.23 ; 62.8 ; Am 4.2 ; 6.8 ; 8.7 ; Ps 89.36,50 ; Hé 6.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cette maison… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.10 ; Mt 23.38/ /.
    marker-yv: yv-n
  - type: text
    text: 'Mais si vous n''écoutez pas ces paroles, je le jure par moi-même, – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – cette maison deviendra une ruine.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: voici ce que dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la formule correspondante est habituellement traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ainsi parle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(p. ex. v. 1,3) ; de même aux v. 11,18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Galaad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Liban
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : régions connues en particulier pour leurs forêts, respectivement au nord-est et au nord du pays d''Israël ; cf. v. 23 ; 21.14 ; 2S 18.6-9 ; 1R 5.22s ; voir aussi Za 10.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sans faute '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à coup sûr
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', formule de serment, cf. 15.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 5.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
