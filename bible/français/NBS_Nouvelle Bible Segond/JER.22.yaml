  - type: text
    text: Quel malheur pour celui qui bâtit sa maison aux dépens de la justice,
- type: usfm
  marker: q1
  children:
  - type: text
    text: et ses chambres à l'étage aux dépens de l'équité !
- type: usfm
  marker: q1
  children:
  - type: text
    text: Qui fait travailler son prochain pour rien,
- type: usfm
  marker: q1
  children:
  - type: text
    text: sans lui donner sa paye ;
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '22.14 '
    - type: usfm
