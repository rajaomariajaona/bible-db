      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ne pleurez pas celui qui est mort,
- type: usfm
  marker: q1
  children:
  - type: text
    text: ne le plaignez pas ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: pleurez, pleurez celui qui s'en va,
- type: usfm
  marker: q1
  children:
  - type: text
    text: car il ne reviendra plus,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il ne reverra plus le pays de ses origines.
- type: usfm
  marker: m
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Car voici ce que dit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' contre Shalloum, fils de Josias, roi de Juda, qui était devenu roi à la place de Josias, son père, et qui a quitté ce lieu : Il n''y reviendra plus, '
  - type: usfm
    marker: vlbl
