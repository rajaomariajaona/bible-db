      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 15 ; 9.23+ ; 23.5 ; 33.15 ; Ps 72.2-4 ; Pr 16.12s ; 29.4,14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
