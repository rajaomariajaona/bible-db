document_id: JER.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre la famille royale de Juda
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.11n. –  Descends  : cf. 21.13n  ; 26.10 ; 36.12 ; 2R 11.19 ; 20.5.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Descends à la maison du roi de Juda, et là prononce cette parole. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui est mort  : autre traduction pour un mort , cf. Dt 26.14. Il y a sans doute ici une allusion à Josias , tué à Meguiddo en 609 av. J.-C. (1.2n  ; 2R 23.29s) ; cf. 2Ch 35.24s. –  celui qui s''en va  : Shalloum (v. 11s ; 1Ch 3.15), alias Joachaz, fils de Josias, exilé par Néko (cf. 1.3n  ; 2R 23.30ss ; Ez 19.4). –  de ses origines ou de sa parenté, de sa famille  ; de même en 46.16 ; cf. Gn 11.28n.'
  - type: text
    content: Ne pleurez pas celui qui est mort,
  - type: text
    content: ne le plaignez pas ;
  - type: text
    content: pleurez, pleurez celui qui s'en va,
  - type: text
    content: car il ne reviendra plus,
  - type: text
    content: il ne reverra plus le pays de ses origines.
  '11':
  - type: text
    content: 'Car voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre Shalloum, fils de Josias, roi de Juda, qui était devenu roi à la place de Josias, son père, et qui a quitté ce lieu : Il n''y reviendra plus, '
  '12':
  - type: note
    content: 2R 23.34.
  - type: text
    content: mais il mourra dans le lieu où on l'a exilé ; il ne reverra plus ce pays.
  - type: heading
    content: Contre Joïaqim, deuxième successeur de Josias
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Message adressé à Joïaqim (v. 18), cf. 1.3n. –  bâtit sa maison  : cf. v. 14s ; 36.22 ; Mi 3.10 ; Ha 2.12 ; Siracide 21.8 : « Celui qui bâtit sa maison avec l''argent d''autrui, c''est comme s''il ramassait les pierres pour son propre tombeau. » –  justice / équité  : cf. v. 15 ; 9.23+ ; 23.5 ; 33.15 ; Ps 72.2-4 ; Pr 16.12s ; 29.4,14. –  chambres à l''étage Jg 3.20n. –  sans lui donner sa paye Lv 19.13 ; Dt 24.14s ; Jc 5.4 ; cf. Jb 7.2n.'
  - type: text
    content: Quel malheur pour celui qui bâtit sa maison aux dépens de la justice,
  - type: text
    content: et ses chambres à l'étage aux dépens de l'équité !
  - type: text
    content: Qui fait travailler son prochain pour rien,
  - type: text
    content: sans lui donner sa paye ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 12.18. –  lambrisse de cèdre  : cf. v. 6s ; 1R 77. –  l''enduit  : le verbe hébreu est généralement rendu par conférer (ou recevoir ) l''onction . –  couleur rouge  : cf. Ez 23.14.'
  - type: text
    content: 'qui dit : « Je bâtirai pour moi une maison de vastes dimensions'
  - type: text
    content: avec des chambres spacieuses à l'étage »,
  - type: text
    content: et qui y fait percer des fenêtres,
  - type: text
    content: la lambrisse de cèdre
  - type: text
    content: et l'enduit de couleur rouge !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'tu as la passion du cèdre  : litt. tu rivalises de cèdre , le même verbe est traduit par se mesurer à en 12.5 ; LXX tu rivalises avec Achaz  ; cf. 2R 16.18 ; Es 7. –  Ton père  : probablement Josias (1.2n) ; 2Ch 34–35 ; Siracide 49.1-3 : « Le souvenir de Josias est un mélange aromatique… Dans toutes les bouches il est comme du miel, comme une musique dans un banquet arrosé de vin. Il suivit la voie droite en convertissant le peuple et il supprima les horreurs impies. Il dirigea son cœur vers le Seigneur, en des jours impies il fortifia la piété. »'
  - type: text
    content: Es-tu roi parce que tu as la passion du cèdre ?
  - type: text
    content: Ton père ne mangeait-il pas, ne buvait-il pas ?
  - type: text
    content: Mais il agissait selon l'équité et la justice,
  - type: text
    content: – alors tout allait bien pour lui –
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 3+,13. –  me connaître 9.5,22-23+ ; Os 6.6.
  - type: text
    content: il jugeait la cause du pauvre et du déshérité,
  - type: text
    content: – alors tout allait bien.
  - type: text
    content: N'est-ce pas cela, me connaître ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Ez 22.13,27. –  des yeux et un cœur… Ez 33.31 ; Ps 119.36 ; 2P 2.14. –  le sang de l''innocent 7.6+ ; cf. 26.15,23. –  oppression  : cf. 6.6.'
  - type: text
    content: Mais tu n'as des yeux et un cœur
  - type: text
    content: que pour ton intérêt,
  - type: text
    content: pour répandre le sang de l'innocent,
  - type: text
    content: pour exercer oppression et brutalité.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Joïaqim v. 13n  ; 1.3n  ; LXX commence l''oracle par malheur à cet homme-là ! –  lamentation 4.8 ; 16.4ss ; Ps 78.64. –  Quel malheur 34.5 ; 1R 13.30. –  Majesté  : le terme correspondant est habituellement traduit par éclat (Ps 8.2n).'
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre Joïaqim, fils de Josias, roi de Juda :'
  - type: text
    content: On ne fera pas pour lui la lamentation
  - type: text
    content: « Quel malheur, mon frère ! Quel malheur, ma sœur ! » ;
  - type: text
    content: on ne fera pas pour lui la lamentation
  - type: text
    content: « Quel malheur, Seigneur ! Quel malheur, Majesté ! ».
  '19':
  - type: text
    content: ' '
  - type: note
    content: '36.30 ; cf. 8.1s ; 2R 24.6 ; 2Ch 36.6-8 ; voir aussi Es 14.19s. –  traîné  : cf. 15.3n  ; 2S 17.13.'
  - type: text
    content: Il aura la sépulture d'un âne,
  - type: text
    content: il sera traîné et jeté hors des portes de Jérusalem.
  - type: heading
    content: Honte et déshonneur pour Jérusalem
  '2':
  - type: note
    content: Cf. 7.2 ; 17.20 ; 34.4.
  - type: text
    content: 'Tu diras : Ecoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', roi de Juda, qui es assis sur le trône de David, toi, les gens de ta cour et ton peuple, qui entrez par ces portes ! '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Monte…  : les ordres s''adressent à un sujet féminin, probablement Jérusalem personnifiée (cf. 2.2s ; Ez 16). –  Abarim  : nom des hauts-plateaux à l''est de la mer Morte, Nb 27.12n (cf. les monts du Liban , au nord, et du Bashân , au nord-est, cf. Es 2.13+) ; des versions anciennes ont lu le mot différemment (LXX d''au-delà de la mer  ; Vg aux passants , cf. 49.32n). –  ceux qui t''aimaient  : cf. 2.25n  ; 4.30n (autre terme) ; il s''agit sans doute ici (et au v. 22) des nations alliées à Juda contre Babylone, voir aussi 30.14 ; Ez 16.33,36s ; 23.5,9,22 ; Lm 1.19.'
  - type: text
    content: Monte au Liban et crie !
  - type: text
    content: Fais retentir ta voix sur le Bashân !
  - type: text
    content: Crie du haut des Abarim !
  - type: text
    content: Car tous ceux qui t'aimaient sont brisés.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'ta voie  : cf. 2.20+,25+,33,36 ; 3.13,21 ; 10.23. –  depuis ta jeunesse 3.25+.'
  - type: text
    content: Je t'ai parlé dans le temps de ton insouciance ;
  - type: text
    content: 'tu disais : Je n''écouterai pas.'
  - type: text
    content: Telle est ta voie depuis ta jeunesse ;
  - type: text
    content: tu ne m'as pas écouté.
  '22':
  - type: text
    content: ' '
  - type: note
    content: tes bergers 2.8+ ; 23.1ss. –  ceux qui t'aiment v. 20n. –  honteuse / confuse 31.19. –  à cause de tout le mal que tu as fait 7.12.
  - type: text
    content: Tous tes bergers seront la pâture du vent,
  - type: text
    content: et ceux qui t'aiment iront en captivité ;
  - type: text
    content: c'est alors que tu seras honteuse et confuse
  - type: text
    content: à cause de tout le mal que tu as fait.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Liban / cèdres  : cf. v. 6s,14s. –  femme qui accouche 4.31+.'
  - type: text
    content: Toi qui habites au Liban,
  - type: text
    content: qui as ton nid dans les cèdres,
  - type: text
    content: combien tu gémiras quand les douleurs t'atteindront,
  - type: text
    content: les convulsions, comme celles d'une femme qui accouche !
  - type: heading
    content: Sur Konia, fils de Joïaqim
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Par ma vie cf. v. 5 ; 4.2n  ; Rm 14.11. –  Konia (en hébreu Konyahou , 37.1 ; cf. 24.1n), alias Jékonia ou Jéchonias (27.20 ; 29.2), identifié à Joïakîn (52.31ss), fils de Joïaqim (v. 18) ; cf. 1.3n. –  le sceau Ag 2.23n. –  je l''arracherais…  : litt. je t''arracherais.'
  - type: text
    content: 'Par ma vie – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – quand bien même Konia, fils de Joïaqim, roi de Juda, serait le sceau à ma main droite, je l''arracherais de là ! '
  '25':
  - type: note
    content: 21.7+. –  qui en veulent… 11.21n.
  - type: text
    content: 'Je te livrerai à ceux qui en veulent à ta vie, à ceux qui t''effraient : à Nabuchodonosor, roi de Babylone, et aux Chaldéens. '
  '26':
  - type: note
    content: 'Je vous jetterai v. 28 ; 10.18+ ; 16.13. –  ta mère  : cf. 13.18n  ; 2R 24.15. –  là vous mourrez Es 22.18.'
  - type: text
    content: 'Je vous jetterai, toi et ta mère qui t''a mis au monde, dans cet autre pays où vous n''êtes pas nés, et là vous mourrez ; '
  '27':
  - type: note
    content: 'ils ne reviendront jamais  : cf. 28.4. –  où ils désireront tant revenir  : litt. où ils porteront leur être (ou leur désir, 2.24n) pour y revenir  ; cf. 44.14.'
  - type: text
    content: 'ils ne reviendront jamais dans le pays où ils désireront tant revenir. '
  '28':
  - type: note
    content: 'un pantin  : autre traduction une potiche  ; le terme pourrait désigner une poterie ou un autre ustensile, comme le terme traduit plus loin par objet. –  disloqué  : une autre forme du même verbe est traduite par mettre en pièces en 13.14 ; 51.20ss ; faire éclater en 48.12. –  ce Konia  : litt. cet homme Konyahou. –  dont personne ne veut plus  : litt. en qui l''on ne prend pas plaisir  ; cf. 19.11+ ; 48.38 ; Os 8.8 ; Ps 31.13. –  jetés v. 26+.'
  - type: text
    content: '– Est-il donc un pantin méprisable et disloqué, ce Konia ? Est-ce un objet dont personne ne veut plus ? Pourquoi sont-ils jetés, lui et ses descendants, lancés dans un pays qu''ils ne connaissent pas ? '
  '29':
  - type: note
    content: Terre ou pays (deux fois au lieu de trois dans LXX  ; cf. 7.4n) ; cf. 29.20 ; Dt 32.1 ; Es 1.2.
  - type: text
    content: '– Terre, terre, terre, écoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '3':
  - type: note
    content: V. 16s ; 7.6+ ; 21.12+ ; Es 1.17 ; Mt 23.23. –  sang innocent 7.6+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Agissez selon l''équité et la justice ; délivrez de la main de l''oppresseur celui qu''on dépouille ; n''exploitez pas l''immigré, l''orphelin et la veuve ; n''usez pas de violence et ne répandez pas de sang innocent en ce lieu. '
  '30':
  - type: note
    content: 'Cf. 36.30 ; 1Ch 3.17-24. –  comme un homme… ses jours  : cette portion de texte est omise par LXX.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Inscrivez cet homme comme privé d''enfants, comme un homme qui ne réussira rien durant ses jours, car aucun de ses descendants ne réussira à s''asseoir sur le trône de David pour gouverner Juda.'
  '4':
  - type: note
    content: '17.25. –  eux…  : d''après LXX  ; l''hébreu a le singulier lui, les gens de sa cour et son peuple  ; cf. v. 2.'
  - type: text
    content: 'Car si vraiment vous agissez selon cette parole, les rois assis sur le trône de David entreront par les portes de cette maison, montés sur des chars et sur des chevaux, eux, les gens de leur cour et leur peuple. '
  '5':
  - type: note
    content: je le jure par moi-même cf. 44.26 ; 49.13 ; 51.14n  ; Gn 22.16+ ; Es 45.23 ; 62.8 ; Am 4.2 ; 6.8 ; 8.7 ; Ps 89.36,50 ; Hé 6.13. –  cette maison… 9.10 ; Mt 23.38/ /.
  - type: text
    content: 'Mais si vous n''écoutez pas ces paroles, je le jure par moi-même, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – cette maison deviendra une ruine.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 1,3) ; de même aux v. 11,18. –  Galaad / Liban  : régions connues en particulier pour leurs forêts, respectivement au nord-est et au nord du pays d''Israël ; cf. v. 23 ; 21.14 ; 2S 18.6-9 ; 1R 5.22s ; voir aussi Za 10.10. –  sans faute ou à coup sûr , formule de serment, cf. 15.11n  ; Es 5.9n. –  une ville  : litt. des villes.'
  - type: text
    content: 'Car voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre la maison du roi de Juda :'
  - type: text
    content: Tu es pour moi un Galaad,
  - type: text
    content: un sommet du Liban ;
  - type: text
    content: pourtant, sans faute, je ferai de toi un désert,
  - type: text
    content: une ville sans habitants.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Je consacre ou je sanctifie , 6.4n  ; cf. Es 13.3. –  cèdres v. 15,23 ; Es 37.24. –  dans le feu 21.14.
  - type: text
    content: Je consacre contre toi des destructeurs,
  - type: text
    content: chacun avec ses armes ;
  - type: text
    content: ils couperont tes plus beaux cèdres
  - type: text
    content: et les feront tomber dans le feu.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'passera… 19.8. –  Pourquoi… 5.19+. –  cette grande ville  : cf. Ap 18.18.'
  - type: text
    content: 'Une multitude de nations passera près de cette ville ; les gens se diront l''un à l''autre : Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a-t-il ainsi traité cette grande ville ? '
  '9':
  - type: note
    content: ils ont abandonné 2.13+ ; cf. 19.4. – Voir alliance. –  ils se sont prosternés… 13.10.
  - type: text
    content: 'Et l''on répondra : Parce qu''ils ont abandonné l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu, parce qu''ils se sont prosternés devant d''autres dieux et les ont servis.'
  - type: heading
    content: Sur Shalloum, successeur de Josias
