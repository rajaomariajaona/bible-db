document_id: HOS.14,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Certaines éditions font de ce v. le dernier du chap. 13 et décalent en conséquence la numérotation du chap. 14. –  Samarie 7.1n. –  faire réparation 10.2n. –  on écrasera leurs enfants  : cf. 10.14. –  femmes enceintes 2R 8.12 ; 15.16 ; Am 1.13.'
  - type: text
    content: Samarie va devoir faire réparation,
  - type: text
    content: parce qu'elle s'est rebellée contre son Dieu.
  - type: text
    content: Ils tomberont par l'épée,
  - type: text
    content: on écrasera leurs enfants
  - type: text
    content: et on éventrera leurs femmes enceintes.
  - type: heading
    content: Guérison du peuple infidèle
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 107.43 ; cf. Jr 9.11 ; Ec 8.1. –  Qui est sage ? Il aura…  : autre traduction que celui qui est sage ait l''intelligence de ces choses . –  les comprendra  : litt. les connaîtra . –  les voies du Seigneur … Ps 1.6 ; 25.10. –  transgresseurs ou révoltés  ; cf. 7.13 ; 8.1.'
  - type: text
    content: Qui est sage ?
  - type: text
    content: Il aura l'intelligence de ces choses.
  - type: text
    content: Celui qui est intelligent les comprendra.
  - type: text
    content: 'Car les voies du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont droites :'
  - type: text
    content: les justes y marcheront,
  - type: text
    content: mais les transgresseurs y trébucheront.
  '2':
  - type: text
    content: ' '
  - type: note
    content: reviens 2.9+. –  trébuché sur ta faute 5.5n.
  - type: text
    content: 'Israël, reviens au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu,'
  - type: text
    content: car tu as trébuché sur ta faute.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Pardonne  : autres traductions enlève ; charge-toi de  ; cf. 1.6 ; Ex 10.17n. –  prends (ou agrée ) ce qui est bon  : autre traduction reçois-nous favorablement . –  Nous nous acquitterons…  : litt. nous nous acquitterons (ou nous offrirons en sacrifice de paix ) des taureaux de nos lèvres  ; LXX nous donnerons en échange le fruit de nos lèvres  ; cf. Hé 13.15 (les mots hébreux pour fruit et taureaux se ressemblent et rappellent le nom d’ Ephraïm  ; cf. 9.16n). Sur l''expression fruit de nos lèvres , voir aussi Es 57.19n.'
  - type: text
    content: Prenez avec vous des paroles,
  - type: text
    content: 'et revenez au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: 'Dites-lui : Pardonne toute faute,'
  - type: text
    content: et prends ce qui est bon !
  - type: text
    content: Nous nous acquitterons
  - type: text
    content: en t'offrant le fruit de nos lèvres.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Assyrien 5.13+. –  Nous ne monterons pas sur des chevaux ou nous n'attellerons pas de chevaux (10.11), pour la guerre (1.7) ; allusion probable à l'Egypte (1R 10.28 ; Es 31.3). –  l'œuvre de nos mains 2.10+. –  Notre Dieu ! cf. Ex 32.4,8 ; 1R 12.28 ; Es 44.16s ; Jr 2.27. –  orphelin Ex 22.21-23 ; Ps 68.6 ; 146.9.
  - type: text
    content: L'Assyrien ne nous sauvera pas.
  - type: text
    content: Nous ne monterons pas sur des chevaux,
  - type: text
    content: 'nous ne dirons plus à l''œuvre de nos mains : « Notre Dieu ! »'
  - type: text
    content: Car c'est auprès de toi que l'orphelin obtient compassion.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Je guérirai 6.1+. –  infidélité 11.7n. –  amour 9.15. –  d''eux  : litt. de lui.'
  - type: text
    content: Je guérirai leur infidélité,
  - type: text
    content: je les aimerai d'un amour généreux,
  - type: text
    content: car ma colère s'est détournée d'eux.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Es 27.6. – Le nom du Liban évoque ici la montagne boisée (Es 2.13 ; 33.9n) ; il rappelle aussi le mot hébreu pour encens , d'où, peut-être, la mention de sa senteur au v. 7 (cf. Ct 4.11).
  - type: text
    content: Je serai comme la rosée pour Israël,
  - type: text
    content: il fleurira comme le lis,
  - type: text
    content: il s'enracinera comme le Liban.
  '7':
  - type: text
    content: ' '
  - type: note
    content: la magnificence ou la dignité  ; le terme est souvent traduit par éclat (Ps 8.2n).
  - type: text
    content: Ses rameaux s'étendront ;
  - type: text
    content: il aura la magnificence de l'olivier
  - type: text
    content: et la senteur du Liban.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'la renommée  : litt. l''évocation ou le souvenir  ; cf. 12.6n.'
  - type: text
    content: Ils reviendront,
  - type: text
    content: ceux qui s'assoient à son ombre,
  - type: text
    content: ils redonneront la vie au froment,
  - type: text
    content: et ils fleuriront comme la vigne ;
  - type: text
    content: ils auront la renommée du vin du Liban.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'qu''ai-je encore à faire…  : LXX qu''est-ce qu''Ephraïm a encore à faire avec les idoles ? cf. 1R 17.18+ ; 2R 3.13. –  C''est moi qui lui répondrai 2.23-25. –  que vient ton fruit  : litt. que ton fruit (9.16n) est trouvé  ; cf. 2.10.'
  - type: text
    content: Ephraïm, qu'ai-je encore à faire avec les idoles ?
  - type: text
    content: C'est moi qui lui répondrai, qui le suivrai des yeux.
  - type: text
    content: 'Je serai comme un cyprès verdoyant :'
  - type: text
    content: c'est de moi que vient ton fruit.
