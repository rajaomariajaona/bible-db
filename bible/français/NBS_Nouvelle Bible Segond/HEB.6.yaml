document_id: HEB.6,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'le commencement…  : litt. la parole du commencement du Christ  ; cf. 5.12n. –  l''accomplissement ou l''état d''adulte  : cf. 5.14n. –  les fondations ou le fondement  : cf. 1Co 3.9nss. –  changement radical et abandon…  : autres traductions conversion, repentance pour les œuvres mortes  ; même terme v. 6 ; 12.17n  ; sur le rapport avec la foi , cf. Ac 20.21. –  œuvres mortes ou mortifères  : cf. 9.14 ; Rm 8.6,13 ; Ga 5.19 ; Ep 5.11.'
  - type: text
    content: 'Aussi, laissant le commencement de la parole du Christ, tendons vers l''accomplissement, sans poser de nouveau les fondations : changement radical et abandon des œuvres mortes, foi en Dieu, '
  '10':
  - type: note
    content: 'œuvre / amour 1Th 1.3 ; Ap 2.19. – Voir nom. –  en vous mettant au service  : verbe apparenté au terme traduit par ministère 1.14n  ; cf. 10.32-34. –  saints Rm 1.7n  ; 12.13 ; 15.25s ; 16.2 ; 2Co 9.12.'
  - type: text
    content: 'En effet, Dieu n''est pas injuste pour oublier votre œuvre, ni l''amour que vous avez montré pour son nom en vous mettant au service des saints et en continuant à les servir. '
  '11':
  - type: note
    content: '3.14 ; 10.23. –  une pleine espérance  : litt. la plénitude (1Th 1.5n) de l''espérance  ; construction analogue en 10.22 (une pleine foi).'
  - type: text
    content: 'Mais nous désirons que chacun de vous montre jusqu''à la fin le même empressement en vue d''une pleine espérance, '
  '12':
  - type: note
    content: 'nonchalants 5.11n. –  imitiez 1Co 11.1+. –  reçoivent l''héritage promis  : litt. héritent les promesses, c.-à-d. ce qui est promis  ; cf. v. 15n,17 ; 8.6 ; 9.15n  ; 10.36 ; 11.7,9,13,17,33,39 ; voir Ga 3.14n  ; Psaumes de Salomon 12.6 : « Que les saints du Seigneur héritent des promesses ! »'
  - type: text
    content: pour que vous ne soyez pas nonchalants, mais que vous imitiez ceux qui, par la foi et la patience, reçoivent l'héritage promis.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Gn 22.16 ; Rm 4.20.
  - type: text
    content: 'En effet, comme Dieu, en faisant la promesse à Abraham, ne pouvait jurer par un plus grand que lui, il jura par lui-même, '
  '14':
  - type: note
    content: 'A coup sûr, je te comblerai…  : litt. si (3.11n) en bénissant je te bénirai et en multipliant je te multiplierai  ; citation de Gn 22.17 selon LXX, qui calque en grec la tournure hébraïque ; on trouve une allusion au même v. en Hé 11.12.'
  - type: text
    content: 'en disant :'
  - type: text
    content: A coup sûr, je te comblerai de bénédictions et je
  - type: text
    content: ' te '
  - type: text
    content: multiplierai
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui avait été promis  : litt. la promesse v. 12+ ; 11.33.'
  - type: text
    content: 'C''est ainsi qu''après s''être montré patient Abraham obtint ce qui avait été promis. '
  '16':
  - type: note
    content: Ex 22.10.
  - type: text
    content: 'En effet, les humains jurent par ce qui est plus grand qu''eux, et le serment, en confirmant leur parole, met un terme à toute contestation. '
  '17':
  - type: note
    content: 'décidé / décisions  : cf. Ep 1.11. –  intervint  : litt. s''entremit, verbe apparenté au terme traduit par médiateur (cf. 8.6n).'
  - type: text
    content: 'En ce sens, Dieu, décidé à donner aux héritiers de la promesse une preuve supplémentaire du caractère immuable de ses décisions, intervint par un serment, '
  '18':
  - type: note
    content: 'deux choses  : promesse (v. 12+) et serment (v. 17). –  impossible que Dieu mente Nb 23.19 ; 1S 15.29 ; Tt 1.2. –  nous ayons un puissant encouragement…  : autre traduction nous ayons, nous qui sommes dans le refuge (litt. qui avons fui ou cherché refuge), un puissant encouragement à rester attachés à l''espérance qui nous est proposée  ; cf. 3.6 ; 10.23 ; Col 1.5.'
  - type: text
    content: 'afin que, par deux choses immuables, dans lesquelles il est impossible que Dieu mente, nous ayons un puissant encouragement, nous dont le refuge a été de nous attacher à l''espérance qui nous était proposée. '
  '19':
  - type: note
    content: 'ancre  : cf. 2.1. –  du voile  : allusion au voile qui, dans le temple, séparait le lieu dit Sacré ou Saint du Très-Sacré ou Saint des saints (9.2s ; 10.20 ; Ex 26.33 ; Lv 16.2s,12,15).'
  - type: text
    content: 'Cette espérance, nous l''avons comme une ancre solide et ferme pour l''âme ; elle pénètre au-delà du voile, '
  '2':
  - type: note
    content: 'bains rituels  : autre traduction baptêmes  ; le mot grec qui apparaît ici n''est pas celui qui est habituellement rendu par baptême dans le N.T., mais il lui est apparenté ; il revient en 9.10 et en Mc 7.4n et, selon plusieurs mss, en Col 2.12n où il s''appliquerait au baptême chrétien. Ici l''auteur pense peut-être à un enseignement qui distinguait le baptême chrétien des divers bains rituels pratiqués dans le judaïsme, ou encore à des rites de purification pratiqués en plus du baptême dans certains cercles chrétiens. Voir aussi Ac 18.25 ; 19.1-5. –  imposition des mains Ac 6.6+ ; 8.17 ; 19.6 ; 1Tm 4.14+ ; 5.22. –  résurrection 7.11 ; 11.19,35.'
  - type: text
    content: 'enseignement sur les bains rituels, imposition des mains, résurrection des morts et jugement éternel. '
  '20':
  - type: note
    content: 2.17+ ; 5.6,10 ; 7.1-10. – Voir prêtre.
  - type: text
    content: là où Jésus est entré pour nous comme un précurseur, devenu grand prêtre pour toujours, selon l'ordre de Melchisédek.
  '3':
  - type: note
    content: si Dieu… Ac 18.21+.
  - type: text
    content: C'est ce que nous allons faire, si Dieu le permet.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Dans le texte grec, ce v. commence par l''expression car il est impossible… , qui dans la traduction est reportée au v. 6 par souci de clarté ; cf. 10.26-32 ; Mt 12.31 ; voir aussi 1Jn 5.16. –  éclairés 10.32 ; cf. Ep 1.18 ; 3.9 ; 5.13s. –  don céleste  : cf. Jn 4.10 ; 6.32s. –  ont eu part  : cf. 3.1n,14. –  l''Esprit saint 2.4+.'
  - type: text
    content: 'Quant à ceux qui ont été une fois éclairés, qui ont goûté le don céleste et ont eu part à l''Esprit saint, '
  '5':
  - type: note
    content: 'goûté 1P 2.2s ; cf. Jos 21.45 ; 23.15 ; Jr 15.16+. –  bonne  : le terme peut également signifier belle (cf. 10.24) ; il est traduit par bien en 5.14 ; 13.9, par bonne en 13.18 ; cf. 1Tm 1.8n. –  monde (cf. 1.2n) à venir  : cf. 2.5+ (autre expression en grec) ; cf. 9.11+ ; Mt 12.32n.'
  - type: text
    content: 'qui ont goûté la bonne parole de Dieu et les puissances du monde à venir '
  '6':
  - type: note
    content: 'sont tombés  : litt. sont tombés à côté  ; un terme apparenté est traduit par faute en Rm 5.17,20 ; cf. Ez 18.24. –  il est impossible v. 4n. –  de les amener…  : litt. de faire encore un renouvellement (cf. Rm 12.2 ; Tt 3.5) pour un changement radical (autres traductions une repentance ; une conversion  ; cf. v. 1n  ; 12.17n). –  ils crucifient à nouveau  : on pourrait aussi traduire simplement ils crucifient  ; cf. 9.25ss ; 10.26-29 ; 1Co 11.27 ; 2P 2.21. –  Fils de Dieu 4.14+. –  déshonorent publiquement  : une expression grecque très proche est traduite livrer en spectacle en Col 2.15.'
  - type: text
    content: 'et qui sont tombés, il est impossible de les amener à un nouveau changement radical. Car, pour leur propre compte, ils crucifient à nouveau le Fils de Dieu et le déshonorent publiquement. '
  '7':
  - type: note
    content: Gn 1.11s ; Dt 11.11.
  - type: text
    content: 'En effet, lorsqu''une terre abreuvée de pluies fréquentes produit des plantes utiles à ceux pour qui elle est cultivée, elle a part à la bénédiction de Dieu. '
  '8':
  - type: note
    content: 'Gn 3.17s ; Mt 7.16 ; 13.7/ /. –  elle s''avère sans valeur ou elle est inapte à l''épreuve, désapprouvée, disqualifiée  : cf. 3.9n  ; Rm 1.28n  ; 1Co 9.27n  ; 2Tm 3.8n. –  en passe  : litt. près.'
  - type: text
    content: Mais si elle produit des épines et des chardons, elle s'avère sans valeur ; elle est en passe d'être maudite, et elle finit par être brûlée.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 15.14. –  nous sommes persuadés…  : litt. nous sommes persuadés, en ce qui vous concerne, de choses meilleures (ou supérieures , cf. 1.4n) et tenant au salut.'
  - type: text
    content: 'Quoique nous parlions ainsi, bien-aimés, nous sommes persuadés que quelque chose de meilleur vous attend, à savoir le salut. '
