      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Tout va bien. Mon maître m''envoie te dire : « Deux jeunes gens d''entre les prophètes arrivent maintenant chez moi, de la région montagneuse d''Ephraïm ; donne pour eux, je te prie, un talent d''argent et deux vêtements de fête. » '
