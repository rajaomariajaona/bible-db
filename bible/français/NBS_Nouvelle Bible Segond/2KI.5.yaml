          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Guéhazi se lança à la poursuite de Naaman. Naaman, le voyant courir après lui, sauta de son char pour aller à sa rencontre ; il lui dit : Tout va bien ? '
