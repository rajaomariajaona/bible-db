document_id: 2KI.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Guérison de Naaman le « lépreux »
  - type: text
    content: ' '
  - type: note
    content: 'du roi  : terme absent d''un ms hébreu et de LXX. –  un homme important  : litt. un grand homme  ; cf. 4.8n. –  le Seigneur  : YHWH, ici considéré comme responsable d''une victoire (litt. salut ) remportée par des non-Israélites, peut-être sur les Assyriens mais plus probablement sur Israël (v. 2). –  ce vaillant guerrier  : expression absente du texte de LXX. –  « lépreux »  : autre traduction atteint d''une maladie de peau  ; la maladie dont souffre Naaman n''est sans doute pas la lèpre telle que nous la connaissons. Celle-ci ne fera son apparition dans cette région qu''au IVe s. av. J.-C., avec le retour des troupes d''Alexandre revenant de la frontière indienne (cf. Lv 13.2n).'
  - type: text
    content: 'Naaman, le chef de l''armée du roi d''Aram, était un homme important aux yeux de son seigneur ; il jouissait d''une grande considération, car c''est par lui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné la victoire à Aram. Mais cet homme, ce vaillant guerrier, était « lépreux ». '
  '10':
  - type: note
    content: 'envoya un messager  : comme dans l''épisode de la Shounamite (4.12ss), Elisée ne s''adresse pas directement à son visiteur mais lui envoie un messager. – Voir pur.'
  - type: text
    content: 'Elisée envoya un messager lui dire : Va te laver sept fois dans le Jourdain ; ta chair redeviendra saine, et tu seras pur. '
  '11':
  - type: note
    content: 'et se tiendra  : le terme correspondant est absent de plusieurs mss de LXX. –  le nom du Seigneur (YHWH), son Dieu  : LXX le nom de son Dieu. –  l''endroit malade  : litt. le lieu.'
  - type: text
    content: 'Naaman s''irrita ; il s''en alla en disant : Je me disais : Il sortira et se tiendra devant moi, il invoquera le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), son Dieu, il agitera sa main sur l''endroit malade et débarrassera le « lépreux » de sa « lèpre ». '
  '12':
  - type: note
    content: 'Abana  : autre lecture traditionnelle Amana (cf. Ct 4.8 où le même nom désigne une montagne). –  Ne pouvais-je pas  : autre traduction ne pourrais-je pas  ; le texte grec précise en y allant.'
  - type: text
    content: 'Les fleuves de Damas, l''Abana et le Parpar, ne valent-ils pas mieux que toutes les eaux d''Israël ? Ne pouvais-je pas m''y laver pour devenir pur ? Il repartit en fureur. '
  '13':
  - type: note
    content: 'ses serviteurs  : autre traduction ses hommes. –  Si le prophète…  : autres traductions si seulement le prophète t''avait demandé… tu l''aurais fait ! ou mon père, le prophète t''aurait demandé… tu l''aurais fait. –  quelque chose de difficile  : litt. une grande chose.'
  - type: text
    content: 'Mais ses serviteurs vinrent lui dire : Si le prophète t''avait demandé quelque chose de difficile, ne l''aurais-tu pas fait ? A plus forte raison s''il te dit : « Lave-toi et sois pur ! » '
  '14':
  - type: note
    content: 'de l''homme de Dieu  : la plupart des mss de LXX portent d''Elisée, de même dans la suite.'
  - type: text
    content: 'Il descendit alors et se plongea sept fois dans le Jourdain, selon la parole de l''homme de Dieu ; alors sa chair redevint comme celle d''un petit garçon : il était pur.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'toute sa suite  : litt. tout son camp ou toute sa troupe . –  pas de Dieu ou pas de dieu , cf. Gn 1.1n. Une fois de plus un non-Israélite reconnaît l''universalité du Dieu d''Israël (cf. 1R 17.12,24). –  un cadeau  : litt. une bénédiction  ; il s''agit d''un cadeau en remerciement pour une réconciliation ou une bénédiction ; cf. Gn 33.11 ; 1S 25.27 ; 30.26 ; Ps 21.4. –  de ma part  : litt. de la part de ton serviteur.'
  - type: text
    content: 'Il revint vers l''homme de Dieu, avec toute sa suite. Lorsqu''il fut arrivé, il se présenta devant lui et dit : Je sais qu''il n''y a pas de Dieu sur toute la terre, si ce n''est en Israël. Maintenant, accepte, je te prie, un cadeau de ma part. '
  '16':
  - type: note
    content: 'au service duquel…  : cf. 3.14+. –  insista 2.17+.'
  - type: text
    content: 'Elisée répondit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', au service duquel je me tiens, je n''accepterai pas. Naaman insista pour qu''il accepte, mais il refusa. '
  '17':
  - type: note
    content: 'Dans ce cas  : litt. et non  ; LXX sinon. –  qu''on me donne  : litt. qu''on donne à ton serviteur. –  de la terre  : LXX précise toi tu me donneras de la terre rouge. Même si le texte reconnaît que YHWH peut agir en faveur d''un étranger ou d''une nation étrangère (v. 1), Naaman continue d''établir un lien entre le Dieu et la terre d''Israël. – Voir sacrifices.'
  - type: text
    content: 'Alors Naaman dit : Dans ce cas, je te prie, qu''on me donne, à moi, ton serviteur, de la terre, la charge de deux mulets ; car je ne veux plus offrir ni holocauste, ni sacrifice, à d''autres dieux qu''au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '18':
  - type: note
    content: 'Que le Seigneur …  : litt. pour cette chose (mots absents de LXX), que le Seigneur pardonne à ton serviteur. –  Rimmôn  : déformation (le mot signifie grenade en hébreu) du surnom Ramanu qui, en Mésopotamie, désigne le dieu de l''orage Hadad. Alors que le texte hébreu laisse entendre que Naaman feint d''adorer le dieu de son pays, LXX (je me prosternerai, moi, devant le Seigneur, mon dieu) fait de lui un adorateur du Seigneur. –  que le Seigneur (YHWH) me pardonne donc  : autre traduction que le Seigneur me pardonne, je t''en prie.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) me pardonne cependant ceci : quand mon seigneur se rend à la maison de Rimmôn pour s''y prosterner et qu''il s''appuie sur mon bras, je me prosterne aussi dans la maison de Rimmôn ; que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) me pardonne donc lorsque je me prosternerai dans la maison de Rimmôn ! '
  '19':
  - type: note
    content: 'Voir paix. –  à quelque distance  : même expression en Gn 35.16 ; 48.7.'
  - type: text
    content: 'Elisée lui dit : Va en paix. Alors il le quitta.'
  - type: heading
    content: Guéhazi frappé de « lèpre »
  - type: text
    content: 'Quand il fut à quelque distance, '
  '2':
  - type: note
    content: 'Lors d''une expédition…  : litt. (d’)Aram sortirent des pillards…  ; cf. Gn 49.19. –  Elle était au service de…  : litt. elle était devant…'
  - type: text
    content: 'Lors d''une expédition, des troupes araméennes avaient ramené captive, du pays d''Israël, une petite fille. Elle était au service de la femme de Naaman. '
  '20':
  - type: note
    content: 'homme de Dieu  : les mots correspondants sont absents de LXX.'
  - type: text
    content: 'Guéhazi, le serviteur d''Elisée, l''homme de Dieu, dit : Mon maître a ménagé Naaman, cet Araméen, en ne prenant pas ce qu''il avait apporté ; eh bien, par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', je vais lui courir après pour obtenir quelque chose de lui. '
  '21':
  - type: note
    content: Tout va bien ? litt. est-ce la paix  ? cf. 4.23n,26n.
  - type: text
    content: 'Alors Guéhazi se lança à la poursuite de Naaman. Naaman, le voyant courir après lui, sauta de son char pour aller à sa rencontre ; il lui dit : Tout va bien ? '
  '22':
  - type: note
    content: 'les prophètes  : litt. les fils des prophètes, cf. 2.3n. –  un talent  : environ 34 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Il répondit : Tout va bien. Mon maître m''envoie te dire : « Deux jeunes gens d''entre les prophètes arrivent maintenant chez moi, de la région montagneuse d''Ephraïm ; donne pour eux, je te prie, un talent d''argent et deux vêtements de fête. » '
  '23':
  - type: note
    content: 'Accepte  : litt. accepte, prends  ; LXX lit seulement prends. –  Il insista auprès de lui  : texte absent d''un ms hébreu et de LXX ; le même verbe est habituellement traduit par assiéger (6.24s). –  serviteurs  : le même terme hébreu est traduit par jeunes gens au v. 22.'
  - type: text
    content: 'Naaman dit : Accepte deux talents. Il insista auprès de lui, mit deux talents d''argent dans deux sacs et les donna, ainsi que deux vêtements de fête, à deux de ses serviteurs qui les portèrent devant Guéhazi. '
  '24':
  - type: note
    content: 'colline  : hébreu ‘ophel, voir Mi 4.8n  ; il s''agit peut-être ici du palais royal de Samarie. Tg lit ‘arephel, c.-à-d. cachette. –  Guéhazi prit le présent  : litt. il prit de ses mains.'
  - type: text
    content: 'Arrivé à la colline, Guéhazi prit le présent, le déposa dans la maison et renvoya les hommes, qui partirent. '
  '25':
  - type: note
    content: 'Elisée lui dit : D''où viens-tu, Guéhazi ? Autre lecture traditionnelle Elisée lui parla à cause de l''absence de Guéhazi.'
  - type: text
    content: 'Puis il vint lui-même et se présenta devant son maître. Elisée lui dit : D''où viens-tu, Guéhazi ? Il répondit : Je ne suis allé nulle part. '
  '26':
  - type: note
    content: 'Mon cœur…  : c.-à-d. n''étais-je pas présent, en esprit  ? –  Est-ce le temps…  : LXX a compris et maintenant tu as pris…'
  - type: text
    content: 'Mais Elisée lui dit : Mon cœur n''était-il pas là lorsque cet homme est descendu de son char pour venir à ta rencontre ? Est-ce le temps de prendre de l''argent et de prendre des vêtements, puis des oliviers, des vignes, du petit bétail et du gros bétail, des serviteurs et des servantes ? '
  '27':
  - type: text
    content: 'La « lèpre » de Naaman s''attachera à toi et à ta descendance pour toujours ! Guéhazi se retira de devant lui : il était couvert de « lèpre », il était blanc comme la neige.'
  '3':
  - type: text
    content: 'Elle dit à sa maîtresse : Oh ! si mon maître allait chez le prophète qui est à Samarie, celui-ci le débarrasserait de sa « lèpre » ! '
  '4':
  - type: note
    content: 'Naaman…  : le sujet est sous-entendu dans le texte hébreu traditionnel ; certains mss hébreux et LXX portent le féminin  : elle vint le dire à son seigneur (ou son maître, c.-à-d. à son mari).'
  - type: text
    content: 'Naaman vint dire à son seigneur : La jeune fille d''Israël a parlé de telle et telle manière. '
  '5':
  - type: note
    content: 'Vas-y  : litt. va, entre (cf. 1R 1.13) ou va, reviens. –  dix talents  : environ 340 kg ; voir mesures, poids et monnaies. –  six mille…  : litt. six mille d''or. –  vêtements de fête  : cf. Jg 14.12n  ; par la suite (v. 7s), le terme désigne les vêtements du roi.'
  - type: text
    content: 'Alors le roi d''Aram dit : Vas-y ; j''enverrai une lettre au roi d''Israël. Il partit en prenant avec lui dix talents d''argent, six mille pièces d''or et dix vêtements de fête. '
  '6':
  - type: note
    content: 'Avec cette lettre…  : litt. et maintenant, quand cette lettre te sera arrivée, voici, je t''aurai envoyé Naaman…'
  - type: text
    content: 'Il apporta au roi d''Israël la lettre, où il était dit : Avec cette lettre je t''envoie Naaman, mon serviteur, afin que tu le débarrasses de sa « lèpre ». '
  '7':
  - type: note
    content: 'Suis-je Dieu… pour faire vivre  : cf. Jn 5.21+. –  Constatez  : litt. sachez et voyez, 1R 20.7n. Le ton de la lettre du roi de Damas est celui d''un suzerain s''adressant à un vassal.'
  - type: text
    content: 'Après avoir lu la lettre, le roi d''Israël déchira ses vêtements et dit : Suis-je Dieu, pour faire mourir et pour faire vivre, qu''il s''adresse ainsi à moi afin que je débarrasse un homme de sa « lèpre » ? Constatez, je vous prie, qu''il me cherche querelle ! '
  '8':
  - type: note
    content: 'Elisée, l''homme de Dieu  : texte absent de LXX, de même que les mots roi d''Israël. –  il y a un prophète en Israël  : cf. 1R 18.36.'
  - type: text
    content: 'Lorsque Elisée, l''homme de Dieu, apprit que le roi d''Israël avait déchiré ses vêtements, il fit dire au roi : Pourquoi as-tu déchiré tes vêtements ? Laisse-le venir chez moi, je te prie, et il saura qu''il y a un prophète en Israël. '
  '9':
  - type: note
    content: 'ses chevaux  : selon plusieurs mss ; le texte hébreu traditionnel porte un singulier son cheval. –  à l''entrée  : cf. 4.15n.'
  - type: text
    content: 'Naaman vint avec ses chevaux et son char et s''arrêta à l''entrée de la maison d''Elisée. '
