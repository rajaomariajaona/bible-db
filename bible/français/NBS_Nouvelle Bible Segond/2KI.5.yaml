    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : terme absent d''un ms hébreu et de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un homme important
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un grand homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 4.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : YHWH, ici considéré comme responsable d''une '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'victoire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: salut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') remportée par des non-Israélites, peut-être sur les Assyriens mais plus probablement sur Israël (v. 2). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce vaillant guerrier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : expression absente du texte de LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: « lépreux »
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: atteint d'une maladie de peau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; la maladie dont souffre Naaman n'est sans doute pas la lèpre telle que nous la connaissons. Celle-ci ne fera son apparition dans cette région qu'au IV
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C., avec le retour des troupes d''Alexandre revenant de la frontière indienne (cf. Lv 13.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Naaman, le chef de l''armée du roi d''Aram, était un homme important aux yeux de son seigneur ; il jouissait d''une grande considération, car c''est par lui que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait donné la victoire à Aram. Mais cet homme, ce vaillant guerrier, était « lépreux ». '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: envoya un messager
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comme dans l''épisode de la Shounamite (4.12ss), Elisée ne s''adresse pas directement à son visiteur mais lui envoie un messager. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elisée envoya un messager lui dire : Va te laver sept fois dans le Jourdain ; ta chair redeviendra saine, et tu seras pur. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et se tiendra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant est absent de plusieurs mss de LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH), son Dieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le nom de son Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'endroit malade
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le lieu.
      marker-yv: yv-n
    - type: text
      text: 'Naaman s''irrita ; il s''en alla en disant : Je me disais : Il sortira et se tiendra devant moi, il invoquera le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), son Dieu, il agitera sa main sur l''endroit malade et débarrassera le « lépreux » de sa « lèpre ». '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Ct 4.8 où le même nom désigne une montagne). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne pouvais-je pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne pourrais-je pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le texte grec précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en y allant.
      marker-yv: yv-n
    - type: text
      text: 'Les fleuves de Damas, l''Abana et le Parpar, ne valent-ils pas mieux que toutes les eaux d''Israël ? Ne pouvais-je pas m''y laver pour devenir pur ? Il repartit en fureur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si le prophète…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si seulement le prophète t''avait demandé… tu l''aurais fait ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon père, le prophète t'aurait demandé… tu l'aurais fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quelque chose de difficile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une grande chose.
      marker-yv: yv-n
    - type: text
      text: 'Mais ses serviteurs vinrent lui dire : Si le prophète t''avait demandé quelque chose de difficile, ne l''aurais-tu pas fait ? A plus forte raison s''il te dit : « Lave-toi et sois pur ! » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'homme de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la plupart des mss de LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'Elisée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Il descendit alors et se plongea sept fois dans le Jourdain, selon la parole de l''homme de Dieu ; alors sa chair redevint comme celle d''un petit garçon : il était pur.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute sa suite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout son camp '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute sa troupe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pas de dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Une fois de plus un non-Israélite reconnaît l''universalité du Dieu d''Israël (cf. 1R 17.12,24). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un cadeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; il s''agit d''un cadeau en remerciement pour une réconciliation ou une bénédiction ; cf. Gn 33.11 ; 1S 25.27 ; 30.26 ; Ps 21.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ma part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la part de ton serviteur.
      marker-yv: yv-n
    - type: text
      text: 'Il revint vers l''homme de Dieu, avec toute sa suite. Lorsqu''il fut arrivé, il se présenta devant lui et dit : Je sais qu''il n''y a pas de Dieu sur toute la terre, si ce n''est en Israël. Maintenant, accepte, je te prie, un cadeau de ma part. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au service duquel…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'insista '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.17+.
      marker-yv: yv-n
    - type: text
      text: 'Elisée répondit : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', au service duquel je me tiens, je n''accepterai pas. Naaman insista pour qu''il accepte, mais il refusa. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dans ce cas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et non
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sinon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on me donne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'on donne à ton serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toi tu me donneras de la terre rouge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Même si le texte reconnaît que YHWH peut agir en faveur d''un étranger ou d''une nation étrangère (v. 1), Naaman continue d''établir un lien entre le Dieu et la terre d''Israël. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Naaman dit : Dans ce cas, je te prie, qu''on me donne, à moi, ton serviteur, de la terre, la charge de deux mulets ; car je ne veux plus offrir ni holocauste, ni sacrifice, à d''autres dieux qu''au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' …'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour cette chose '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (mots absents de LXX)
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' pardonne à ton serviteur'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rimmôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : déformation (le mot signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'grenade '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en hébreu) du surnom Ramanu qui, en Mésopotamie, désigne le dieu de l'orage Hadad. Alors que le texte hébreu laisse entendre que Naaman feint d'adorer le dieu de son pays, LXX (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je me prosternerai, moi, devant le Seigneur, mon dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') fait de lui un adorateur du Seigneur. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' (YHWH) me pardonne donc'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: me pardonne, je t'en prie.
      marker-yv: yv-n
    - type: text
      text: 'Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) me pardonne cependant ceci : quand mon seigneur se rend à la maison de Rimmôn pour s''y prosterner et qu''il s''appuie sur mon bras, je me prosterne aussi dans la maison de Rimmôn ; que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) me pardonne donc lorsque je me prosternerai dans la maison de Rimmôn ! '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à quelque distance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression en Gn 35.16 ; 48.7.'
      marker-yv: yv-n
    - type: text
      text: 'Elisée lui dit : Va en paix. Alors il le quitta.'
  - type: usfm
