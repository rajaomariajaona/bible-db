      marker-yv: yv-n
    - type: text
      text: 'Naaman dit : Accepte deux talents. Il insista auprès de lui, mit deux talents d''argent dans deux sacs et les donna, ainsi que deux vêtements de fête, à deux de ses serviteurs qui les portèrent devant Guéhazi. '
