      text: 'Après avoir lu la lettre, le roi d''Israël déchira ses vêtements et dit : Suis-je Dieu, pour faire mourir et pour faire vivre, qu''il s''adresse ainsi à moi afin que je débarrasse un homme de sa « lèpre » ? Constatez, je vous prie, qu''il me cherche querelle ! '
