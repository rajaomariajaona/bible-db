      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Celle-ci souligne qu'Isaac se soumet volontairement au sacrifice.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''ils furent arrivés au lieu que Dieu lui avait indiqué, Abraham y bâtit l''autel et disposa le bois. Il ligota Isaac, son fils, et le mit sur l''autel, par-dessus le bois. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Puis Abraham tendit la main et prit le couteau pour immoler son fils. '
  - type: usfm
    marker: v
