      children:
      - type: text
        text: Ne porte pas la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression a été traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tendre la main '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu '
      - type: usfm
        marker: w
        children:
        - type: text
          text: crains
      - type: text
        text: ' Dieu'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : dans l''Ancien Testament la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'crainte de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'n''est pas seulement l''effroi suscité par le divin ou le sacré. Ici elle est le corollaire de l''obéissance. Le Deutéronome la situe sur le même plan que l''amour pour Dieu ; cf. 20.11 ; 42.18 ; Dt 6.13+ ; 2R 4.1 ; Es 11.2 ; Ps 112.1 ; Jb 1.1ss ; Pr 1.7 ; 16.6 ; voir aussi 1Jn 4.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pas refusé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 2,16 ; Rm 8.32.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Ne porte pas la main sur le garçon et ne lui fais rien : je sais maintenant que tu crains Dieu et que tu ne m''as pas refusé ton fils, ton fils unique. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
