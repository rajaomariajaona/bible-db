    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8 ; 2R 2.6.'
    marker-yv: yv-n
  - type: text
    text: 'Abraham prit le bois pour l''holocauste et le chargea sur Isaac, son fils, et il prit lui-même le feu et le couteau. Puis ils continuèrent à marcher ensemble, tous les deux. '
  - type: usfm
    marker: v
