    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'animal pour l'holocauste, c'est-à-dire mon fils !
    marker-yv: yv-n
  - type: text
    text: 'Abraham répondit : Que Dieu voie lui-même quel animal il aura pour holocauste, mon fils !'
- type: usfm
  marker: p
  children:
  - type: text
    text: Et ils continuèrent à marcher ensemble, tous les deux.
