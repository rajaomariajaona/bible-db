    marker-yv: yv-n
  - type: text
    text: 'Alors Isaac dit à Abraham, son père : Père ! Il répondit : Oui, mon fils ? Isaac reprit : Le feu et le bois sont là, mais où est l''animal pour l''holocauste ? '
  - type: usfm
