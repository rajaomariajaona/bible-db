    marker-yv: yv-n
  - type: text
    text: 'Dieu dit : Prends ton fils, je te prie, ton fils unique, celui que tu aimes, Isaac ; va-t''en au pays de Moriya et là, offre-le en holocauste sur l''une des montagnes que je t''indiquerai.'
