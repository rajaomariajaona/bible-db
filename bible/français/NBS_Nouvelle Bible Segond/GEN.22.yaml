        text: '22.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ex 13.13 ; voir aussi 1Co 10.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par-derrière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : plusieurs mss hébreux, Smr, LXX, Syr et des mss de Tg ont ici un autre terme, correspondant simplement à une autre façon de dire '
    - type: usfm
