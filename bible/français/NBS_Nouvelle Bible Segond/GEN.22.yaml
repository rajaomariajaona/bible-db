      marker: fq
      children:
      - type: text
        text: Père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Oui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 1'
      - type: usfm
