    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 31.32 ; 34.25 ; 40.20 ; 42.18 ; Ex 3.18+ ; voir aussi Os 6.1s.'
    marker-yv: yv-n
  - type: text
    text: 'Le troisième jour, Abraham, levant les yeux, vit le lieu de loin. '
