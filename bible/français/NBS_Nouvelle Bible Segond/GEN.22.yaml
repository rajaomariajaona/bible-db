      marker: fr
      children:
      - type: text
        text: '22.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que Dieu voie…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : réponse ambiguë ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu verra '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: yire'é
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme au v. 14) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour lui l'animal pour l'holocauste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu pourvoira à l''animal… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'En outre, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mon fils '
    - type: usfm
      marker: ft
      children:
      - type: text
