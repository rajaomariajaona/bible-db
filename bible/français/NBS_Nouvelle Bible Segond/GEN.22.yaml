  - type: text
    text: 'Abraham se leva de bon matin, sella son âne et prit avec lui deux serviteurs et Isaac, son fils. Il fendit du bois pour l''holocauste et se mit en route pour le lieu que Dieu lui avait indiqué. '
  - type: usfm
    marker: v
