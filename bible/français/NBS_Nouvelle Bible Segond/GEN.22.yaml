document_id: GEN.22,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Abraham prêt à sacrifier Isaac
  - type: text
    content: ' '
  - type: note
    content: 'Sur l''ensemble du chap., voir Hé 11.17-19 ; Jc 2.21-23 ; cf. 1 Maccabées 2.52 : « Abraham n''a-t-il pas été fidèle dans l''épreuve, et cela ne lui a-t-il pas été compté comme justice ? » (cf. Gn 15.6). –  Je suis là ! litt. me voici  ; autre traduction oui ? (cf. v. 7) ; sur cette formule de réponse à un appel, cf. v. 11 ; 27.1,18 ; 31.11 ; 37.13 ; Ex 3.4 ; 1S 3.4ss ; 12.3 ; 2S 1.7 ; 9.6 ; Es 58.9 ; 65.1.'
  - type: text
    content: 'Après cela, Dieu mit Abraham à l''épreuve ; il lui dit : Abraham ! Il répondit : Je suis là ! '
  '10':
  - type: text
    content: 'Puis Abraham tendit la main et prit le couteau pour immoler son fils. '
  '11':
  - type: note
    content: messager (autre traduction ange) du Seigneur 16.7.
  - type: text
    content: 'Alors le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''appela depuis le ciel, en disant : Abraham ! Abraham ! Il répondit : Je suis là ! '
  '12':
  - type: note
    content: 'Ne porte pas la main  : la même expression a été traduite par tendre la main au v. 10. –  tu crains Dieu  : dans l''Ancien Testament la crainte de Dieu n''est pas seulement l''effroi suscité par le divin ou le sacré. Ici elle est le corollaire de l''obéissance. Le Deutéronome la situe sur le même plan que l''amour pour Dieu ; cf. 20.11 ; 42.18 ; Dt 6.13+ ; 2R 4.1 ; Es 11.2 ; Ps 112.1 ; Jb 1.1ss ; Pr 1.7 ; 16.6 ; voir aussi 1Jn 4.18. –  pas refusé…  : cf. v. 2,16 ; Rm 8.32.'
  - type: text
    content: 'Il dit : Ne porte pas la main sur le garçon et ne lui fais rien : je sais maintenant que tu crains Dieu et que tu ne m''as pas refusé ton fils, ton fils unique. '
  '13':
  - type: note
    content: 'Cf. Ex 13.13 ; voir aussi 1Co 10.13. –  par-derrière  : plusieurs mss hébreux, Smr, LXX, Syr et des mss de Tg ont ici un autre terme, correspondant simplement à une autre façon de dire un (ou un seul) bélier.'
  - type: text
    content: 'Abraham leva les yeux et vit par-derrière un bélier retenu par les cornes dans un buisson ; alors Abraham alla prendre le bélier et l''offrit en holocauste à la place de son fils. '
  '14':
  - type: note
    content: 'Adonaï (cf. 15.2n) : nom substitué habituellement au tétragramme YHWH qui figure en fait dans le texte ; cf. 4.26n. YHWH-Yiré signifie YHWH voit (ou peut-être pourvoit, v. 8n) ; cf. 16.13n  ; voir aussi Ex 3.15n. –  il sera vu, c.-à-d. il apparaîtra, terme caractéristique des manifestations de Dieu (cf. 17.1n). LXX à la montagne le Seigneur sera vu.'
  - type: text
    content: 'Abraham appela ce lieu du nom d''Adonaï-Yiré (« YHWH voit »). C''est pourquoi l''on dit aujourd''hui : A la montagne du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il sera vu.'
  '15':
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' appela Abraham une seconde fois depuis le ciel ; '
  '16':
  - type: note
    content: 'Cf. Es 45.23+ ; Lc 1.73s ; Hé 6.13s. –  refusé  : autre traduction épargné (même verbe, avec un complément, au v. 12).'
  - type: text
    content: 'il dit : Je le jure par moi-même, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – parce que tu as fait cela, parce que tu n''as pas refusé ton fils, ton fils unique, '
  '17':
  - type: note
    content: 'je te bénirai  : autre traduction je te comblerai de bénédictions 12.2-3n  ; 13.16+ ; Jr 33.22 ; Hé 11.12. –  comme le sable Es 48.19. –  des villes…  : litt. de la porte (de la ville) de ses ennemis, de même en 24.60, avec un synonyme pour ennemis.'
  - type: text
    content: 'je te bénirai et je multiplierai ta descendance comme les étoiles du ciel et comme le sable qui est au bord de la mer. Ta descendance prendra possession des villes de ses ennemis. '
  '18':
  - type: note
    content: 12.3n  ; cf. 48.20.
  - type: text
    content: Toutes les nations de la terre se béniront par ta descendance, parce que tu m'as écouté.
  '19':
  - type: text
    content: ' '
  - type: note
    content: serviteurs v. 3n,5.
  - type: text
    content: Abraham revint vers ses serviteurs, puis ils s'en allèrent ensemble à Bersabée, car Abraham habitait à Bersabée.
  - type: heading
    content: Les descendants de Nahor
  '2':
  - type: note
    content: 'Prends ton fils…  : ce récit a souvent été rapproché des textes concernant les sacrifices et le rachat des premiers-nés (Ex 13.2,12+ ; 22.29 ; 34.20 ; Lv 18.21+ ; Mi 6.7s). Il s''intéresse cependant avant tout à une situation unique, l’épreuve d''Abraham face à l''enfant de la promesse. –  fils unique  : cf. Ps 22.21n  ; Za 12.10. LXX traduit bien-aimé, comme en Mt 3.17 ; cf. Jn 3.16 ; 1Jn 4.9s. –  Moriya  : la localisation est incertaine (Hébron ? Sichem ?). En 2Ch 3.1, l''expression mont Moriya désigne le lieu où Salomon bâtit le temple de Jérusalem. LXX a traduit ici le pays élevé, Syr le pays des Amorites. En hébreu Moriya fait assonance avec les verbes correspondant à voir ou à pourvoir (v. 8n,13s). –  holocauste 8.20n  ; cf. Jg 11.31+ ; sur les sacrifices humains voir aussi 2R 16.3 ; 21.6 ; 23.10 ; Jr 7.30s.'
  - type: text
    content: 'Dieu dit : Prends ton fils, je te prie, ton fils unique, celui que tu aimes, Isaac ; va-t''en au pays de Moriya et là, offre-le en holocauste sur l''une des montagnes que je t''indiquerai.'
  '20':
  - type: text
    content: ' '
  - type: note
    content: On a ici une liste de tribus araméennes ou syriennes. –  Milka / Nahor 11.29 ; 24.15.
  - type: text
    content: 'Après cela, on dit à Abraham : Milka, elle aussi, a donné des fils à Nahor, ton frère : '
  '21':
  - type: note
    content: 'Outs  : cf. 10.23n. –  Bouz  : région d''Arabie (Jr 25.23). –  Aram 10.22n.'
  - type: text
    content: 'Outs, son premier-né, Bouz, son frère, Qemouel, père d''Aram, '
  '22':
  - type: note
    content: 'Késed  : pourrait être rattaché aux Chaldéens (hébreu Kasdim).'
  - type: text
    content: 'Késed, Hazo, Pildash, Yidlaph et Betouel. '
  '23':
  - type: note
    content: Rébecca 25.20.
  - type: text
    content: 'Betouel a engendré Rébecca. Ce sont là les huit fils que Milka a donnés à Nahor, frère d''Abraham. '
  '24':
  - type: note
    content: Soit douze fils en tout (cf. 17.20n). De ces noms, on ne retrouve ailleurs que celui de Maaka (Dt 3.14 ; Jos 12.5 ; 2S 10.6), qui désigne une peuplade syrienne. –  concubine 25.6 ; 35.22 ; 36.12 ; cf. 2S 5.13n.
  - type: text
    content: 'Sa concubine, nommée Réouma, a elle aussi eu des enfants : Tébah, Gaham, Tahash et Maaka.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'deux serviteurs  : litt. ses deux serviteurs ou deux de ses serviteurs . Le mot hébreu traduit ici par serviteurs signifie aussi garçon, jeune homme  ; dans la suite du récit il s''applique à Isaac (v. 5), dans le chap. 21 à Ismaël.'
  - type: text
    content: 'Abraham se leva de bon matin, sella son âne et prit avec lui deux serviteurs et Isaac, son fils. Il fendit du bois pour l''holocauste et se mit en route pour le lieu que Dieu lui avait indiqué. '
  '4':
  - type: note
    content: 'troisième jour  : cf. 31.32 ; 34.25 ; 40.20 ; 42.18 ; Ex 3.18+ ; voir aussi Os 6.1s.'
  - type: text
    content: 'Le troisième jour, Abraham, levant les yeux, vit le lieu de loin. '
  '5':
  - type: note
    content: 'garçon v. 3n. –  nous prosterner  : autre traduction adorer  ; même verbe hébreu en 18.2 ; 19.1 ; 23.7 etc. ; voir culte.'
  - type: text
    content: 'Abraham dit à ses serviteurs : Vous, restez ici avec l''âne ; moi et le garçon, nous irons là-haut pour nous prosterner, puis nous reviendrons vers vous. '
  '6':
  - type: note
    content: 'ils continuèrent…  : cf. v. 8 ; 2R 2.6.'
  - type: text
    content: 'Abraham prit le bois pour l''holocauste et le chargea sur Isaac, son fils, et il prit lui-même le feu et le couteau. Puis ils continuèrent à marcher ensemble, tous les deux. '
  '7':
  - type: note
    content: 'Père  : litt. mon père. –  Oui  : cf. v. 1n. –  Isaac reprit  : litt. et il dit. –  l''animal  : le terme hébreu désigne une tête de petit bétail, mouton ou chèvre ; de même au v. 8.'
  - type: text
    content: 'Alors Isaac dit à Abraham, son père : Père ! Il répondit : Oui, mon fils ? Isaac reprit : Le feu et le bois sont là, mais où est l''animal pour l''holocauste ? '
  '8':
  - type: note
    content: 'Que Dieu voie…  : réponse ambiguë ; litt. Dieu verra (hébreu yire''é, comme au v. 14) pour lui l''animal pour l''holocauste  ; on pourrait aussi traduire Dieu pourvoira à l''animal… En outre, mon fils pourrait être compris comme une apposition à ce qui précède  : l''animal pour l''holocauste, c''est-à-dire mon fils !'
  - type: text
    content: 'Abraham répondit : Que Dieu voie lui-même quel animal il aura pour holocauste, mon fils !'
  - type: text
    content: Et ils continuèrent à marcher ensemble, tous les deux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Il ligota  : le verbe hébreu qui apparaît ici ( ‘aqad ) a fourni le titre donné à l''ensemble de cet épisode dans la tradition juive  : Aqéda, ligature . Celle-ci souligne qu''Isaac se soumet volontairement au sacrifice.'
  - type: text
    content: 'Lorsqu''ils furent arrivés au lieu que Dieu lui avait indiqué, Abraham y bâtit l''autel et disposa le bois. Il ligota Isaac, son fils, et le mit sur l''autel, par-dessus le bois. '
