      - type: text
        text: ' s. : « Il les prit avec lui et entra jusque dans le parvis des purs ; et il allait et venait dans le Temple. Un pharisien, archiprêtre, du nom de Lévi, s''avança, les rejoignit et dit au Sauveur : “Qui t''a permis de fouler ce parvis des purs et de porter tes regards sur ces vases sacrés sans t''être baigné ? et alors que tes disciples ne se sont même pas lavés les pieds ! Au contraire, c''est souillé que tu as foulé ce Temple, ce Lieu de pureté, alors que personne, à moins qu''il ne se soit baigné et n''ait changé de vêtements, ne le foule et n''ose en regarder les vases sacrés.” Aussitôt le Sauveur s''arrêta avec ses disciples et lui répondit : “Et toi donc qui es ici, dans le Temple, es-tu pur ?” L''autre lui dit : “Je suis pur. Car je me suis baigné dans le bassin de David, je suis descendu par un des escaliers et remonté par l''autre, j''ai revêtu des vêtements blancs et purs, et alors seulement je suis venu contempler ces vases sacrés.” Le Sauveur lui répondit ainsi : “Malheur à vous, aveugles qui ne voyez rien ! Tu t''es baigné dans ces eaux d''égout, où chiens et porcs se sont vautrés nuit et jour. En faisant tes ablutions, tu as nettoyé cette peau du dehors, que les courtisanes et les joueuses de flûte, elles aussi, parfument, baignent, nettoient et parent pour exciter la convoitise des hommes ; mais à l''intérieur elles sont pleines de scorpions et de toute sorte de malice. Quant à moi et à mes disciples, nous qui, dis-tu, ne serions pas passés par le bain, nous sommes passés par le bain dans les eaux vives et pures…” »'
