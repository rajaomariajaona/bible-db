document_id: MRK.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus met en question la tradition
  - type: heading
    content: Mt 15.1-20
  - type: text
    content: ' '
  - type: note
    content: scribes (2.6+) venus de Jérusalem 3.22 ; voir aussi pharisiens.
  - type: text
    content: 'Les pharisiens et quelques scribes venus de Jérusalem se rassemblent autour de lui. '
  '10':
  - type: note
    content: Honore… 10.19 ; Ex 20.12 ; Dt 5.16  ; Ep 6.2. –  Celui qui parle en mal de (autres traductions qui insulte, qui maudit) … Ex 21.17 ; Lv 20.9. Voir bénédiction, malédiction.
  - type: text
    content: 'Car Moïse a dit : '
  - type: text
    content: Honore ton père et ta mère,
  - type: text
    content: ' et : '
  - type: text
    content: Celui qui parle en mal de son père ou de sa mère sera mis à mort
  - type: text
    content: '. '
  '11':
  - type: note
    content: 'korbân  : transcription en grec du mot hébreu ou araméen qorbân (3.17n), qui signifie offrande ou présent (voir Lv 1.2n  ; Mt 27.6n) ; c''était devenu un terme technique désignant une offrande qui, une fois consacrée à Dieu, ne pouvait plus servir à un usage profane (l''adjectif sacré explicite un sous-entendu du texte ; voir saint).'
  - type: text
    content: 'Mais vous, vous dites : Si un homme dit à son père ou à sa mère : « Ce que j''aurais pu te donner pour t''assister est '
  - type: text
    content: korbân
  - type: text
    content: '  – un présent sacré » '
  '12':
  - type: note
    content: 'Les biens qu''on avait promis de donner au temple ne pouvaient plus servir à aucun autre usage ; cf. Ecrit de Damas (Qumrân) 16.13s : « Qu''on ne voue à l''autel rien d''illégalement acquis… Qu''on ne consacre pas la nourriture de sa maison à Dieu ; car c''est ce qu''Il a dit  : Ils se font la chasse l''un à l''autre par l''anathème. »'
  - type: text
    content: '– vous ne le laissez plus rien faire pour son père ou pour sa mère ; '
  '13':
  - type: note
    content: 'que vous avez transmise  : verbe apparenté au mot traduit par tradition (Mt 15.2n) ; à ce dernier certains mss ajoutent le qualificatif folle (ou stupide).'
  - type: text
    content: vous annulez ainsi la parole de Dieu par la tradition que vous avez transmise. Et vous faites bien d'autres choses semblables.
  - type: heading
    content: Mt 15.10-20
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'se mit à dire  : litt. leur disait.'
  - type: text
    content: 'Il appela encore la foule et se mit à dire : Ecoutez-moi tous et comprenez. '
  '15':
  - type: note
    content: Mt 23.25/ /.
  - type: text
    content: 'Il n''y a rien au dehors de l''être humain qui puisse le souiller en entrant en lui. C''est ce qui sort de l''être humain qui le souille. [ '
  '16':
  - type: note
    content: 'Certains mss ajoutent  : Si quelqu''un a des oreilles pour entendre, qu''il entende (cf. 4.9,23 ; Mt 11.15+).'
  - type: text
    content: ']'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'parabole  : cf. 4.2+,11n.'
  - type: text
    content: 'Lorsqu''il fut rentré à la maison, loin de la foule, ses disciples l''interrogèrent sur cette parabole. '
  '18':
  - type: note
    content: 'sans intelligence Mt 15.16n. –  Evangile selon Thomas 14 : « Jésus a dit : “Si vous jeûnez, vous vous attribuerez un péché ; si vous priez, vous serez condamnés ; si vous donnez l''aumône, vous nuirez à votre esprit. Et lorsque vous allez dans n''importe quel pays et que vous marchez dans les villages, si on vous reçoit, mangez ce qu''on mettra devant vous, et soignez les habitants qui sont malades ; car ce qui entre dans votre bouche ne vous souillera pas, mais ce qui sort de votre bouche, c''est cela qui vous souillera.” »'
  - type: text
    content: 'Il leur dit : Etes-vous donc sans intelligence, vous aussi ? Ne comprenez-vous pas que rien de ce qui, du dehors, entre dans l''être humain ne peut le souiller ? '
  '19':
  - type: note
    content: 'Ainsi il purifiait  : litt. purifiant  ; autre traduction ainsi il déclarait purs tous les aliments  ; cf. Ac 10.15n  ; Ga 2.12 ; Tt 1.15.'
  - type: text
    content: 'Car cela n''entre pas dans son cœur, mais dans son ventre, avant de s''en aller aux latrines. Ainsi il purifiait tous les aliments. '
  '2':
  - type: note
    content: 'Cf. Lc 11.38/ /. –  Ils voient…  : litt. ayant vu…, dans le texte la phrase continue au v. 5, après la parenthèse des v. 3s. –  manger  : litt. manger les pains (comme en 6.44), cf. 3.20n. –  souillées  : autre traduction profanes  ; le mot (de même dans la suite) signifie aussi commun(es)  ; il s''agit évidemment ici d''impureté rituelle (voir pur, impur) et non de malpropreté. Un papyrus égyptien du IVe s. apr. J.-C. (Oxyrhynque 840) porte le texte suivant, qui date peut-être du IIe s. : « Il les prit avec lui et entra jusque dans le parvis des purs ; et il allait et venait dans le Temple. Un pharisien, archiprêtre, du nom de Lévi, s''avança, les rejoignit et dit au Sauveur : “Qui t''a permis de fouler ce parvis des purs et de porter tes regards sur ces vases sacrés sans t''être baigné ? et alors que tes disciples ne se sont même pas lavés les pieds ! Au contraire, c''est souillé que tu as foulé ce Temple, ce Lieu de pureté, alors que personne, à moins qu''il ne se soit baigné et n''ait changé de vêtements, ne le foule et n''ose en regarder les vases sacrés.” Aussitôt le Sauveur s''arrêta avec ses disciples et lui répondit : “Et toi donc qui es ici, dans le Temple, es-tu pur ?” L''autre lui dit : “Je suis pur. Car je me suis baigné dans le bassin de David, je suis descendu par un des escaliers et remonté par l''autre, j''ai revêtu des vêtements blancs et purs, et alors seulement je suis venu contempler ces vases sacrés.” Le Sauveur lui répondit ainsi : “Malheur à vous, aveugles qui ne voyez rien ! Tu t''es baigné dans ces eaux d''égout, où chiens et porcs se sont vautrés nuit et jour. En faisant tes ablutions, tu as nettoyé cette peau du dehors, que les courtisanes et les joueuses de flûte, elles aussi, parfument, baignent, nettoient et parent pour exciter la convoitise des hommes ; mais à l''intérieur elles sont pleines de scorpions et de toute sorte de malice. Quant à moi et à mes disciples, nous qui, dis-tu, ne serions pas passés par le bain, nous sommes passés par le bain dans les eaux vives et pures…” »'
  - type: text
    content: 'Ils voient quelques-uns de ses disciples manger avec des mains souillées, c''est-à-dire non lavées. '
  '20':
  - type: text
    content: 'Et il disait : C''est ce qui sort de l''être humain qui le souille. '
  '21':
  - type: note
    content: Cf. Rm 1.29+ ; voir aussi cœur. –  inconduites sexuelles Mt 5.32n.
  - type: text
    content: 'Car c''est du dedans, du cœur des gens, que sortent les raisonnements mauvais : inconduites sexuelles, vols, meurtres, '
  '22':
  - type: note
    content: 'méchancetés  : un terme apparenté est traduit par mauvais(es) dans la suite. –  débauche  : cf. Rm 13.13 ; 2Co 12.21 ; Ga 5.19 ; Ep 4.19 ; 1P 4.3 ; 2P 2.2,7,18 ; Jd 4. –  regard mauvais  : litt. œil mauvais, expression qui évoque habituellement l’envie, l’avarice, cf. Mt 6.23n. –  calomnie ou blasphème, le mot grec peut avoir l''un ou l''autre sens, cf. 3.28s ; 15.29n. –  déraison ou folie (même terme 2Co 11.1n) : le terme peut avoir dans la Bible une connotation morale et spirituelle (voir Ps 14.1).'
  - type: text
    content: 'adultères, avidités, méchancetés, ruse, débauche, regard mauvais, calomnie, orgueil, déraison. '
  '23':
  - type: note
    content: choses mauvaises ou méchancetés.
  - type: text
    content: Toutes ces choses mauvaises sortent du dedans et souillent l'être humain.
  - type: heading
    content: 'En pays non juif : la foi d''une femme syro-phénicienne'
  - type: heading
    content: Mt 15.21-28
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'partit  : litt. se leva . –  dans le territoire de Tyr  : certains mss ajoutent et de Sidon (v. 31n  ; 3.8n) ; c''est une région peuplée en majorité de non-Juifs (cf. 1R 17.8-24).'
  - type: text
    content: 'Il partit de là et s''en alla dans le territoire de Tyr. Il entra dans une maison ; il voulait que personne ne le sache, mais il ne put rester caché. '
  '25':
  - type: note
    content: la fille ou la petite fille, cf. v. 27n  ; 5.23n. –  avait (3.22n) un esprit impur (voir pur, impur) 1.23n. –  se jeter à ses pieds 5.22+.
  - type: text
    content: 'Car une femme dont la fille avait un esprit impur entendit aussitôt parler de lui et vint se jeter à ses pieds. '
  '26':
  - type: note
    content: 'grecque au sens très général de non juive (Rm 1.14n). –  syro-phénicienne  : la Phénicie (cf. 3.8n) était incluse dans la province romaine de Syrie. –  chasser le démon 3.15+. –  de sa fille  : litt. hors de sa fille.'
  - type: text
    content: 'Cette femme était grecque, d''origine syro-phénicienne. Elle lui demandait de chasser le démon de sa fille. '
  '27':
  - type: note
    content: 'd''abord  : cf. Rm 1.16. –  chiens  : autre traduction petits chiens  ; le grec emploie un diminutif, qui pourrait désigner les chiens domestiques admis dans les maisons par opposition aux chiens des rues ou aux chiens de ferme ; mais les diminutifs de ce genre, particulièrement fréquents dans le grec de Mc, n''ont pas toujours une nuance précise (cf. 5.23n  ; 8.7 ; 9.36n  ; 10.13n), et il ne faut sans doute pas interpréter celui-ci comme un adoucissement de la parole de Jésus. Peut-être la formule fait-elle allusion à une façon dont les Juifs désignaient les non-Juifs (voir aussi Mt 7.6).'
  - type: text
    content: 'Il lui disait : Laisse d''abord les enfants se rassasier, car ce n''est pas bien de prendre le pain des enfants pour le jeter aux chiens. '
  '28':
  - type: note
    content: 'Seigneur… ou, d''après certains mss  : C''est vrai, Seigneur… mais les chiens…  ; cf. Lc 16.21.'
  - type: text
    content: 'Mais elle lui répond : Seigneur, les chiens sous la table mangent bien les miettes des enfants… '
  '29':
  - type: text
    content: 'Il lui dit : A cause de cette parole, va : le démon est sorti de ta fille. '
  '3':
  - type: note
    content: 'soigneusement  : traduction incertaine ; on a aussi compris jusqu''au poignet ou jusqu''au coude  ; le terme grec fait probablement allusion à un geste rituel. –  la tradition (Mt 15.2n) des anciens (certains ont vu dans cet emploi du terme ancien un titre équivalent à scribe  ; d''autres y voient une référence plus vague aux générations d''autrefois) régissait l''application de la loi de Moïse ; elle a longtemps été transmise oralement avant d''être consignée dans le Talmud  ; voir aussi Juifs.'
  - type: text
    content: '– Or les pharisiens et tous les Juifs ne mangent pas sans s''être soigneusement lavé les mains, parce qu''ils sont attachés à la tradition des anciens. '
  '30':
  - type: note
    content: Cf. Jn 4.50ss.
  - type: text
    content: 'Quand elle rentra chez elle, elle trouva l''enfant étendue sur le lit : le démon était sorti.'
  - type: heading
    content: 'En pays non juif : Jésus guérit un sourd-muet'
  - type: heading
    content: Mt 15.29-31
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'de Tyr…  : certains mss portent de Tyr et de Sidon, et il revint vers la mer  ; cf. v. 24n  ; 3.8n. –  Décapole 5.1n,20+.'
  - type: text
    content: 'Il sortit du territoire de Tyr et revint par Sidon vers la mer de Galilée, en traversant le territoire de la Décapole. '
  '32':
  - type: note
    content: 'Cf. 8.22-26. –  un sourd qui a de la difficulté à parler (ou un sourd bègue) : les termes grecs correspondants sont ceux qui traduisent les mots hébreux rendus par sourd et muet en Es 35.5s (LXX). –  poser la main sur lui  : cf. 5.23 ; Mt 9.18n.'
  - type: text
    content: 'On lui amène un sourd qui a de la difficulté à parler, et on le supplie de poser la main sur lui. '
  '33':
  - type: note
    content: 'Cf. 1.41+ ; 8.23+. –  cracha  : cf. 8.23. –  avec sa salive  : sous-entendu dans le texte.'
  - type: text
    content: 'Il l''emmena à l''écart de la foule, lui mit les doigts dans les oreilles, cracha et lui toucha la langue avec sa salive ; '
  '34':
  - type: note
    content: 'leva les yeux 6.41 ; Mt 14.19 ; Jn 11.41+. –  soupira 8.12+. –  Ephphatha  : transcription, puis traduction (Ouvre-toi !) en grec d''un mot araméen (3.17n).'
  - type: text
    content: 'puis il leva les yeux au ciel, soupira et dit : '
  - type: text
    content: Ephphatha
  - type: text
    content: '  – Ouvre-toi ! '
  '35':
  - type: note
    content: 'Aussitôt  : le terme correspondant est absent de certains mss. –  sa langue se délia  : litt. le lien de sa langue se dénoua, cf. Lc 13.16.'
  - type: text
    content: 'Aussitôt ses oreilles s''ouvrirent, sa langue se délia ; il parlait correctement. '
  '36':
  - type: note
    content: 'Cf. 1.25+,44-45n. –  Jésus…  : litt. il leur recommanda. –  plus ils proclamaient la nouvelle  : litt. plus ils proclamaient.'
  - type: text
    content: 'Jésus leur recommanda de n''en rien dire à personne, mais plus il le leur recommandait, plus ils proclamaient la nouvelle. '
  '37':
  - type: note
    content: ébahissement 1.22+. –  Il fait même entendre les sourds et parler les muets (ou, selon certains mss, des muets) ; cf. Es 35.5s ; Mt 11.5/ /.
  - type: text
    content: 'En proie à l''ébahissement le plus total, ils disaient : Il fait tout à merveille ! Il fait même entendre les sourds et parler les muets.'
  '4':
  - type: note
    content: 'après avoir fait les ablutions rituelles  : le verbe grec correspondant a donné notre verbe baptiser, et il est le plus souvent employé dans ce sens (1.4ss) ; certains mss portent après avoir fait les aspersions (rituelles). –  le bain rituel  : litt. les bains rituels, terme apparenté à celui qui est traduit par baptême en 1.4n (voir Hé 6.2n) ; cf. Mt 23.25/ /. –  et des sièges  : litt. et des lits (comme au v. 30 ; on mangeait étendu sur une couche) ; les mots correspondants ne figurent que dans certains mss.'
  - type: text
    content: 'Et, quand ils reviennent de la place publique, ils ne mangent qu''après avoir fait les ablutions rituelles. Ils sont encore attachés à beaucoup d''autres observances traditionnelles, comme le bain rituel des coupes, des cruches, des vases de bronze et des sièges. – '
  '5':
  - type: note
    content: 'mangent  : litt. mangent le pain. –  souillées v. 2n.'
  - type: text
    content: 'Les pharisiens et les scribes lui demandent : Pourquoi tes disciples mangent-ils avec des mains souillées, au lieu de suivre la tradition des anciens ?'
  '6':
  - type: text
    content: ' '
  - type: note
    content: Es 29.13  ; Mt 15.7n  ; voir aussi prophète et cœur.
  - type: text
    content: 'Il leur dit : Esaïe a bien parlé en prophète sur vous, hypocrites, comme il est écrit :'
  - type: text
    content: Ce peuple m'honore des lèvres,
  - type: text
    content: mais son cœur est très éloigné de moi ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'rendent un culte  : voir Ac 13.43n. –  doctrines ou enseignements  ; cf. Col 2.22 ; voir aussi loi.'
  - type: text
    content: c'est en vain qu'ils me rendent un culte,
  - type: text
    content: eux qui enseignent comme doctrines
  - type: text
    content: des commandements humains
  - type: text
    content: .
  '8':
  - type: text
    content: 'Vous abandonnez le commandement de Dieu, et vous vous attachez à la tradition des humains. '
  '9':
  - type: note
    content: 'établir  : autre traduction maintenir  ; certains mss portent garder (ou observer).'
  - type: text
    content: 'Il leur disait : Vous rejetez bel et bien le commandement de Dieu pour établir votre tradition. '
