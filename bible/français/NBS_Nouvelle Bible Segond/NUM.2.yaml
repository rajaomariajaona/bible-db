document_id: NUM.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La disposition des tribus dans le camp
  - type: text
    content: ' '
  - type: note
    content: 'Moïse / Aaron  : cf. v. 34 ; 1.3.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '1.5 ; 7.30. –  Au sud  : litt. à droite , cf. v. 3n.'
  - type: text
    content: 'Au sud, la bannière du camp de Ruben, armée par armée. Prince pour les fils de Ruben : Elitsour, fils de Shedéour. '
  '11':
  - type: note
    content: 1.20s.
  - type: text
    content: 'Son armée : 46 500 recensés. '
  '12':
  - type: note
    content: 1.6 ; 7.36.
  - type: text
    content: 'A ses côtés campera la tribu de Siméon. Prince pour les fils de Siméon : Sheloumiel, fils de Tsourishaddaï. '
  '13':
  - type: note
    content: 1.23.
  - type: text
    content: 'Son armée : 59 300 recensés. '
  '14':
  - type: note
    content: Réouel ou Déouel, selon plusieurs mss hébreux et Vg  ; voir 1.14n  ; 7.42.
  - type: text
    content: 'Puis la tribu de Gad. Prince pour les fils de Gad : Eliasaph, fils de Réouel. '
  '15':
  - type: note
    content: 1.25.
  - type: text
    content: 'Son armée : 45 650 recensés. '
  '16':
  - type: note
    content: V. 9+. –  partiront en deuxième 10.6,18ss.
  - type: text
    content: 'Total des recensés pour le camp de Ruben : 151 450, armée par armée. Ils partiront en deuxième.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: '3.23ss ; 10.17,21. –  lévites 8.6+. –  d''après son rang  : litt. sur sa main  ; cf. 10.11ss.'
  - type: text
    content: Ensuite, la tente de la Rencontre partira, avec le camp des lévites placé au milieu des camps. Ils partiront dans l'ordre où ils camperont, chacun d'après son rang, selon leurs bannières.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '1.10 ; 7.48. –  A l''ouest  : litt. vers la mer (Gn 12.8n).'
  - type: text
    content: 'A l''ouest, la bannière du camp d''Ephraïm, armée par armée. Prince pour les fils d''Ephraïm : Elishama, fils d''Ammihoud. '
  '19':
  - type: note
    content: 1.33.
  - type: text
    content: 'Son armée : 40 500 recensés. '
  '2':
  - type: note
    content: 'Cf. 1.5ss ; 3.21ss ; 10.11ss ; Ez 48.30ss ; l''ordre ressemble à celui d''une procession, cf. Ps 68.28 ; sur la disposition en quatre corps (sur la bannière, 1.52n  ; 2.31n) autour d''un élément central, connu aussi chez les Egyptiens, cf. Ex 13.18n  ; voir aussi 2Ch 11.5ss. –  autour de la tente…  : cf. v. 17 ; 5.3 ; 10.35s ; Ex 25.8 ; 29.45s ; Lv 15.31 ; 16.16 ; 19.30 ; 20.3 ; 26.11 ; Jg 18.20 ; 1S 4.4ss ; 11.11 ; Ez 40ss ; Jn 1.14 ; voir aussi Nb 11.24ss. –  tente de la Rencontre  : cf. 1.1+,50ss.'
  - type: text
    content: Les Israélites camperont chacun près de sa bannière, sous les enseignes de leur famille ; ils camperont en face et tout autour de la tente de la Rencontre.
  '20':
  - type: note
    content: '1.10 ; 7.54. –  A ses côtés  : LXX lit à ses côtés campera… comme aux v. 5,12,27.'
  - type: text
    content: 'A ses côtés, la tribu de Manassé. Prince pour les fils de Manassé : Gamliel, fils de Pedahtsour. '
  '21':
  - type: note
    content: 1.35.
  - type: text
    content: 'Son armée : 32 200 recensés. '
  '22':
  - type: note
    content: 1.11 ; 7.60.
  - type: text
    content: 'Puis la tribu de Benjamin. Prince pour les fils de Benjamin : Abidân, fils de Guidéoni. '
  '23':
  - type: note
    content: 1.36s.
  - type: text
    content: 'Son armée : 35 400 recensés. '
  '24':
  - type: note
    content: V. 9+. –  partiront en troisième 10.22ss.
  - type: text
    content: 'Total des recensés pour le camp d''Ephraïm : 108 100, armée par armée. Ils partiront en troisième.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 1.12 ; 7.66.
  - type: text
    content: 'Au nord, la bannière du camp de Dan, armée par armée. Prince pour les fils de Dan : Ahiézer, fils d''Ammishaddaï. '
  '26':
  - type: note
    content: 1.39.
  - type: text
    content: 'Son armée : 62 700 recensés. '
  '27':
  - type: note
    content: 1.13 ; 7.72.
  - type: text
    content: 'A ses côtés campera la tribu d''Aser. Prince pour les fils d''Aser : Paguiel, fils d''Okrân. '
  '28':
  - type: note
    content: 1.41.
  - type: text
    content: 'Son armée : 41 500 recensés. '
  '29':
  - type: note
    content: 1.15 ; 7.78.
  - type: text
    content: 'Puis la tribu de Nephtali. Prince pour les fils de Nephtali : Ahira, fils d''Eïnân. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 10,18,25. Le texte décrit le dispositif en carré ou en losange du camp militaire, en partant de l''est et en parcourant la rose des vents dans le sens des aiguilles d''une montre (voir ci-contre « La disposition des tribus d''Israël au désert »). –  à l''est ou devant  ; l''expression pourrait aussi signifier face à l''entrée de la Demeure (cf. 3.23), mais il est plus probable qu''elle soit ici à entendre comme un synonyme de au levant (on « s''oriente » face au soleil levant). –  armée par armée  : litt. pour leurs armées  ; le terme armée , ici au pluriel et au singulier dans la suite, désigne le contingent de chaque tribu ; cf. 1.3 ; de même en 10.14ss. – Voir fils. –  Nahshôn 1.7+.'
  - type: text
    content: 'Ceux qui camperont à l''est, au levant, seront sous la bannière du camp de Juda, armée par armée. Prince pour les fils de Juda : Nahshôn, fils d''Amminadab. '
  '30':
  - type: note
    content: 1.43.
  - type: text
    content: 'Son armée : 53 400 recensés. '
  '31':
  - type: note
    content: partiront les derniers 10.25ss. –  selon leurs bannières 1.52n  ; certains modifient le texte hébreu traditionnel pour lire par armée, comme au v. 9+.
  - type: text
    content: 'Total des recensés pour le camp de Dan : 157 600. Ils partiront les derniers, selon leurs bannières.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: 1.46n.
  - type: text
    content: 'Tels sont les Israélites qui furent recensés, famille par famille. Tous ceux qui furent recensés dans les camps, armée par armée, étaient 603 550. '
  '33':
  - type: note
    content: 1.47+ss.
  - type: text
    content: 'Les lévites ne furent pas recensés au milieu des Israélites, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 1.54+ ; 10.12ss.
  - type: text
    content: 'Les Israélites firent exactement ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ordonné à Moïse. C''est ainsi qu''ils campaient, selon leurs bannières ; c''est ainsi qu''ils partaient, chacun selon son clan, d''après sa famille.'
  '4':
  - type: note
    content: 1.27.
  - type: text
    content: 'Son armée : 74 600 recensés. '
  '5':
  - type: note
    content: 1.8 ; 7.18.
  - type: text
    content: 'A ses côtés campera la tribu d''Issacar. Prince pour les fils d''Issacar : Netanéel, fils de Tsouar. '
  '6':
  - type: note
    content: 1.29.
  - type: text
    content: 'Son armée : 54 400 recensés. '
  '7':
  - type: note
    content: 1.9 ; 7.24.
  - type: text
    content: 'Puis la tribu de Zabulon. Prince pour les fils de Zabulon : Eliab, fils de Hélôn. '
  '8':
  - type: note
    content: 1.31.
  - type: text
    content: 'Son armée : 57 400 recensés. '
  '9':
  - type: note
    content: Total des recensés / armée par armée v. 16,24,31n. –  partiront les premiers 10.5,14ss.
  - type: text
    content: 'Total des recensés pour le camp de Juda : 186 400, armée par armée. Ils partiront les premiers.'
