      - type: text
        text: 1.7+.
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui camperont à l''est, au levant, seront sous la bannière du camp de Juda, armée par armée. Prince pour les fils de Juda : Nahshôn, fils d''Amminadab. '
