      - type: text
        text: 'Cf. v. 10,18,25. Le texte décrit le dispositif en carré ou en losange du camp militaire, en partant de l''est et en parcourant la rose des vents dans le sens des aiguilles d''une montre (voir ci-contre « La disposition des tribus d''Israël au désert »). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à l''est '
    - type: usfm
      marker: ft
      children:
