document_id: ISA.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Avec ses 66 chapitres, le rouleau d''Esaïe constitue le portail monumental par lequel on accède au grand ensemble des '
  - type: text
    content: prophètes écrivains
  - type: text
    content: ', ceux que la tradition hébraïque appelle les « derniers prophètes ». Ceux-ci exerceront une influence déterminante dans l''élaboration de la foi d''Israël et, par voie de conséquence, dans la conception que les chrétiens eux-mêmes pourront se faire de leur situation devant Dieu.'
  - type: text
    content: 'Le '
  - type: text
    content: nom
  - type: text
    content: ' d''Esaïe (aussi transcrit '
  - type: text
    content: Isaïe,
  - type: text
    content: ' sous l''influence de la Bible latine ; hébreu '
  - type: text
    content: Yesha`yahou
  - type: text
    content: ') constitue à lui seul tout un programme : il signifie « YHWH (le Seigneur) sauve (ou libère) ». Il est à lire en filigrane dans toutes les pages de l''œuvre, quels que soient les temps et les circonstances auxquels s''applique la prophétie.'
  - type: text
    content: Le rouleau d'Esaïe porte en effet sur
  - type: text
    content: trois périodes
  - type: text
    content: ' bien distinctes. La première est celle du prophète, autour de 740-700 av. J.-C. La seconde, deux siècles plus tard, transporte le lecteur à Babylone vers la fin de l''exil. La troisième enfin projette l''espérance vers l''accomplissement dernier évoqué dans la description des cieux nouveaux et de la terre nouvelle (65.17).'
  - type: text
    content: 'La tradition biblique ne s''est pas préoccupée, comme le font sans cesse les modernes, de procéder à une redistribution de ces prophéties dans le '
  - type: text
    content: temps
  - type: text
    content: '. Ce fait est déjà clairement attesté par le Siracide*, lorsqu''il écrit (vers 180 av. J.-C.) au sujet d''Esaïe : '
  - type: text
    content: Sous une puissante inspiration il vit la fin des temps et consola les affligés de Sion. Jusqu'à l'éternité il annonça l'avenir et les choses cachées avant qu'elles n'arrivent
  - type: text
    content: ' (48.24s).'
  - type: text
    content: De même, le grand rouleau d'Esaïe retrouvé en deux exemplaires (1QIs
  - type: text
    content: a
  - type: text
    content: ' et 1QIs'
  - type: text
    content: b
  - type: text
    content: ') dans la célèbre bibliothèque de la communauté de Qumrân*, au nord-ouest de la mer Morte, ne marque '
  - type: text
    content: aucune transition
  - type: text
    content: ' entre la partie de l''ouvrage relative à la période jérusalémite (chap. 1–39) et les deux suivantes. La seule césure importante qui ait été relevée (trois lignes réglées, mais laissées en blanc) se trouve, dans le manuscrit « a », entre les chapitres 33 et 34, au bas de la 27'
  - type: text
    content: e
  - type: text
    content: ' colonne d''un volume qui en compte 54. La raison de ce blanc est sans doute matérielle plutôt que littéraire. Ces manuscrits, qui remontent au II'
  - type: text
    content: e
  - type: text
    content: ' siècle av. J.-C., suggèrent que le livre d''Esaïe constituait un recueil unique dès le III'
  - type: text
    content: e
  - type: text
    content: ' siècle au moins. Le quatrième évangile met la même réalité en évidence lorsque, sous la même et unique rubrique de '
  - type: text
    content: parole du prophète Esaïe
  - type: text
    content: ' (Jn 12.38s), il cite d''affilée le chapitre 53 (le serviteur souffrant) et le chapitre 6 (vocation du prophète).'
  - type: text
    content: 'Le temps d''Esaïe :'
  - type: text
    content: chapitres 1–39
  - type: text
    content: 'L''essentiel de ce que nous savons de la personnalité du prophète se trouve dans ses propres écrits. C''est un citadin de '
  - type: text
    content: Jérusalem
  - type: text
    content: ' qui connaît admirablement sa ville. Tout au long de sa vie, il a été mêlé aux grandes décisions politiques. La tradition des '
  - type: text
    content: Talmuds
  - type: text
    content: '* en fait d''ailleurs le cousin germain du roi Ozias.'
  - type: text
    content: 'Quatre règnes sont cités au début du livre pour déterminer le cadre chronologique de l''activité du prophète : Ozias (781-740), Jotam (740-736), Achaz (736-716) et Ezéchias (716-687).'
  - type: text
    content: Le règne d'
  - type: text
    content: Ozias
  - type: note
    content: 1 La Bible l'appelle Azaria en 2R 14.21 ; 15.1,6-8,17,23,27, mais Ozias en 2R15.13,30,32,34 ; Es 1.1 ; 6.1+ ; Os 1.1 ; Am 1.1 ; 2Ch 26. Les annales de Tiglath-Piléser disent Az-ri-ya-a-ou.
  - type: text
    content: ', roi de Juda'
  - type: text
    content: ','
  - type: text
    content: ' avait été marqué par d''importants succès, aussi bien sur le plan de la prospérité économique que sur ceux de l''organisation administrative et de la politique militaire. Mettant à profit plusieurs décennies de paix, Ozias avait su redonner à Juda une prospérité comparable à celle des jours de Salomon.'
  - type: text
    content: 'Son fils '
  - type: text
    content: Jotam
  - type: text
    content: ', qui assura la régence lorsque Ozias fut tombé malade, et qui lui succéda, conduisit une politique analogue. Le cadre de l''action d''Esaïe se situe dans la Jérusalem opulente issue de ces deux règnes : '
  - type: text
    content: Son pays est rempli d'argent et d'or, infinis sont ses trésors
  - type: text
    content: ', constate-t-il (2.7).'
  - type: text
    content: 'C''est alors que se déclenche la '
  - type: text
    content: guerre syro-éphraïmite
  - type: text
    content: '. Elle avait été fomentée par le roi de Damas, un certain Retsîn, qui avait fait alliance avec le roi d''Israël, Péqah de Samarie, dans l''espoir de secouer le joug de l''empire assyrien, notamment en cessant de payer le tribut. Pour réussir cette entreprise, il était, pensait-on, utile d''obliger Juda à se rallier à la coalition (cf. 2Ch 26). Jotam s''y était refusé, et c''est peut-être au moment de sa mort (ou à la faveur d''une mise à l''écart antérieure) que Retsîn et Péqah tentent un coup de force : ils décident de déposer le roi'
  - type: text
    content: Achaz
  - type: text
    content: ', qui avait tout juste vingt ans au moment de son accession au trône, pour placer un de leurs partisans sur le trône de David (voir 7.6'
  - type: text
    content: n
  - type: text
    content: ). Retsîn et Péqah mettent donc le siège devant Jérusalem. C'est à ce moment que nous trouvons Esaïe adjurant le jeune roi de faire confiance au Seigneur (YHWH) au lieu de mettre son espérance dans les expéditions militaires et les combinaisons politiques (7.1-9). Les sources ne nous permettent pas de savoir quelle fut l'attitude d'Achaz. En tout cas il ne se rallia pas à la coalition et ne fut pas destitué. On pense parfois que pour contrer la pression syro-éphraïmite il fit allégeance au monarque assyrien. En tout état de cause, celui-ci intervient vers 732, détruisant Damas et annexant une partie importante d'Israël. Juda, quant à lui, s'en sortira assez bien en préservant son autonomie.
  - type: text
    content: 'Au milieu de ces intrigues, la parole du prophète apparaît comme la voix de la conscience d''Israël. C''est à ce moment qu''Esaïe rédige le récit des circonstances de sa vocation, dans le temple, en un hymne éclatant où l''affirmation absolue de la sainteté et de la souveraineté universelle de Dieu résonne comme un défi (6.1-10). Le Dieu d''Esaïe est en effet '
  - type: text
    content: 'le Saint* d''Israël :'
  - type: text
    content: ' cette expression caractéristique de l''ensemble du livre (cf. aussi Ps 78.41 ; 89.11) reviendra souvent, avec diverses nuances, dans ses trois parties (1.4+ ; 41.14 etc. ; 60.9,14). Elle rappelle tout d''abord, solennellement, que Dieu a des droits sur son peuple et revendique sa fidélité. L''appel pressant du prophète en faveur de la foi, qui affermit plus solidement que les fortifications de la ville (7.9), l''annonce persévérante de sa confiance en Dieu (cf. le « reste qui subsistera » en 6.13 ; 7.3'
  - type: text
    content: n
  - type: text
    content: '  ; 10.19-22, etc.), l''attente explicite d''un enfant messianique (cf. 7.14 ; 9.5s ; 11.1ss), tous ces messages raniment l''espérance nationale.'
  - type: text
    content: En 721, au bout d'un siège de trois ans, Samarie est tombée. C'en est fait du royaume du Nord, dont l'élite est emmenée dans un exil dont nous ne savons rien. Seul le royaume de Juda reste épargné par la tourmente. Le roi
  - type: text
    content: Ezéchias
  - type: text
    content: ' préside maintenant à ses destinées.'
  - type: text
    content: 'Ezéchias est connu pour sa '
  - type: text
    content: réforme religieuse
  - type: text
    content: ' qui vise, entre autres, à évacuer du temple l''idolâtrie. Le lourd tribut qu''il faut payer chaque année au suzerain de Ninive entretient dans la contrée un esprit de rébellion propice à toutes les aventures. On sait qu''Esaïe a toujours prôné la non-intervention et la confiance placée dans le Seigneur (YHWH), non dans les calculs politiques. Ezéchias cependant poursuit les travaux de son grand-père Ozias ; il exécute dans Jérusalem de grands ouvrages de fortification et surtout un prodigieux travail de percement de la colline pour mettre la source hors de portée des éventuels assaillants (voir « L''inscription de Siloé », p.${Xsiloe}).'
  - type: text
    content: 'Entre 713 et 711 Ezéchias cherche des appuis en '
  - type: text
    content: Egypte
  - type: text
    content: ' pour se libérer de la pression assyrienne. Esaïe tente alors de faire obstacle à l''alliance militaire proposée par le monarque nubien d''Egypte, Shabaka : on trouve de belles lignes à ce sujet en 31.1-3. Il va jusqu''à ridiculiser les ambassadeurs égyptiens. Pour dépeindre le sort qui attendait ces fiers parlementaires, Esaïe n''hésite pas à se promener dans la ville pieds nus et le derrière nu, c''est-à-dire dans la tenue humiliante réservée à l''époque aux prisonniers de guerre (chap. 20).'
  - type: text
    content: 'Mais lorsqu''en 703 Merodak-Baladân, roi de '
  - type: text
    content: Babylone
  - type: text
    content: ', vient à son tour exciter à la rébellion contre Ninive (chap. 39), Juda se révolte et bascule dans la guerre. Le pays est ravagé par Sennachérib. Seule Jérusalem, miraculeusement, résiste au siège.'
  - type: text
    content: 'Les chapitres 36 à 38 (qui ne sont pas entièrement identiques aux annales de 2 Rois et de 2 Chroniques) montrent que, dans la dernière période de sa vie, le roi Ezéchias suivit plus étroitement le conseil d''Esaïe et eut un comportement de '
  - type: text
    content: croyant exemplaire
  - type: text
    content: ' face à l''adversité.'
  - type: text
    content: Pourtant l'
  - type: text
    content: exil
  - type: text
    content: ' menace à l''horizon (39.5-8).'
  - type: text
    content: 'Les messages appelant à la justice sociale, à la responsabilité et à l''espérance malgré tout sont groupés dans cette première partie de la manière suivante :'
  - type: text
    content: 1–12
  - type: text
    content: 'Reproches adressés au peuple de Dieu, qui opprime les pauvres tout en pratiquant un culte formaliste ; annonce de la catastrophe prochaine, mais aussi de la venue d''un Sauveur, l''Emmanuel ou '
  - type: text
    content: Immanou-El
  - type: text
    content: ', « Dieu avec nous » (7.14 ; cf. 9.5 ; 11.1-5).'
  - type: text
    content: 13–23
  - type: text
    content: 'Prophéties sur les nations : Babylone, l''Assyrie, la Philistie, Moab, Damas, l''Egypte, etc.'
  - type: text
    content: 24–27
  - type: text
    content: L'Apocalypse d'Esaïe (sur ce terme, cf. p.${Xapocat}, {Xapocdn}).
  - type: text
    content: 28–35
  - type: text
    content: Contre l'alliance avec l'Egypte.
  - type: text
    content: 36–39
  - type: text
    content: Intermède historique (cf. 2R 18–20) sur le règne d'Ezéchias.
  - type: text
    content: 'La consolation d''Israël :'
  - type: text
    content: chapitres 40–55
  - type: text
    content: 'La seconde partie de la prophétie console les Judéens installés à '
  - type: text
    content: Babylone
  - type: text
    content: ' depuis la chute de Jérusalem en 587/6 av. J.-C.'
  - type: text
    content: 'Que deviendrait le reste d''Israël (46.3) s''il demeurait incapable de discerner l''action du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) dans les grands bouleversements qui modifieront à ce moment l''équilibre des forces ? Car du fin fond du royaume de '
  - type: text
    content: Perse
  - type: text
    content: ' se lève un jeune conquérant à qui tout réussit et qui va pénétrer dans Babylone sans combat. Les gens du pays l''acclameront comme un sauveur, l''élu de Mardouk (le dieu local), appelé par celui-ci à remplacer le dernier roi de Babylone, Nabonide, qui ne goûtait guère la religion de la capitale et s''était abstenu d''y paraître depuis plusieurs années.'
  - type: text
    content: Nous sommes en septembre (
  - type: text
    content: Tishri
  - type: text
    content: ') 539. Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ne disait mot, alors les exilés de Juda se noieraient probablement dans les foules qui acclament le nouveau maître.'
  - type: text
    content: 'Mais '
  - type: text
    content: Cyrus
  - type: text
    content: ' — tel est son nom — a pour principe de libérer tous les captifs et de s''en faire des partisans en leur accordant la possibilité de pratiquer leur culte et de retourner dans leur pays d''origine. En vue de ce contexte favorable, Dieu parle à nouveau. Dans les chapitres 40–55 du rouleau d''Esaïe se développe avec force l''affirmation du destin particulier d''Israël, appelé maintenant à entreprendre un'
  - type: text
    content: nouvel exode
  - type: text
    content: ' dans une marche de la foi au travers du désert qui aboutit à Jérusalem et au trône royal du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  - type: text
    content: 'Dans le désert, frayez le chemin du Seigneur… Jérusalem, toi qui portes la bonne nouvelle… dis aux villes de Juda : Votre Dieu est là ! Le Seigneur Dieu vient avec force'
  - type: text
    content: ' (40.3,9s ; cf. 43.16-23 ; 48.21).'
  - type: text
    content: 'Il est manifeste que le peuple de Dieu, courbé depuis quarante ans dans la servitude, a besoin d''être raffermi dans sa foi au Dieu de l''univers entier, qui règne toujours et partout. Avec des accents pleins de ferveur et de sollicitude, la prophétie martèle : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est le '
  - type: text
    content: Saint d'Israël
  - type: text
    content: ', le Tout-Autre (41.14,16,20 etc.) ; mais il est aussi l''unique Dieu véritable (43.10-13), le '
  - type: text
    content: Créateur
  - type: text
    content: ' qui a façonné la terre, les arbres, les cieux, son peuple et tous les peuples (40.26,28 ; 42.5 ; 43.1, etc.).'
  - type: text
    content: 'Les exilés ne doivent pas s''en laisser conter au sujet des '
  - type: text
    content: idoles
  - type: text
    content: ' articulées, taillées dans le bois, que l''on promène dans les rues de Babylone (44.9ss ; 46). Le Seigneur (YHWH), qui est le maître de l''histoire, se sert des monarques et des peuples comme il le veut. On s''en était déjà rendu compte dans le cas de l''Assyrie (10.5ss). Voici aujourd''hui le tour de Cyrus, qui est le '
  - type: text
    content: berger
  - type: text
    content: ' du '
  - type: text
    content: Seigneur
  - type: text
    content: ', son « messie », celui qui a reçu l''onction* du seul vrai Dieu (44.28 ; 45.1).'
  - type: text
    content: Quatre poèmes émergent de cet ensemble, poèmes qu'une tradition bien établie, mais non contraignante, désigne comme les
  - type: text
    content: chants du serviteur du Seigneur
  - type: text
    content: . Cette expression désigne le plus souvent le peuple d'Israël (41.8s ; 44.1 etc.). On y a parfois vu une désignation de Cyrus ou d'un anti-Cyrus.
  - type: text
    content: 'En quatre endroits pourtant, il est question d''un '
  - type: text
    content: personnage mystérieux
  - type: text
    content: ', à la forte personnalité, injustement persécuté, mis à mort, et cependant vivant au-delà de son supplice (cf. 42.1-7 ; 49.1-9 ; 50.4-11 ; 52.13–53.12). Beaucoup plus tard, les premiers chrétiens n''ont pas hésité à reconnaître en lui Jésus-Christ (Mt 12.15-21 ; Lc 1.32 ; 24.27 ; Jn 12.37-41 ; Ac 8.32-35 ; 1P 2.21-25).'
  - type: text
    content: 'Les derniers chapitres : / / 56–66'
  - type: text
    content: 'La collection de messages prophétiques qui sert de conclusion au rouleau d''Esaïe est d''une grande beauté. Ce sont les paroles d''un '
  - type: text
    content: pasteur
  - type: text
    content: ' qui exhorte son troupeau à la repentance, l''invitant à fuir l''idolâtrie (57) ou l''hypocrisie (58). Ce sont de graves avertissements à l''endroit de ceux qui persévèrent dans la fausseté (59 ; 65–66), mais aussi les expressions les plus débordantes de compassion et de consolation assorties de promesses de bonheur pour qui accepte l''alliance du Saint d''Israël (56 ; 57 ; 60 ; 63 ; 66). On sent vibrer la communauté de la foi au travers de ces pages brûlantes où le pathétique le dispute au sublime.'
  - type: text
    content: 'Rien d''étonnant si le culte de l''Eglise chrétienne se plaît à reprendre telles prières, confessions des fautes, supplications ou promesses de grâce éparses dans ces pages. Jésus déjà les connaissait et les aimait. Dans l''Evangile selon Luc, il confère une destinée hors du commun au chapitre 61 : '
  - type: text
    content: Le souffle du Seigneur Dieu est sur moi, car le Seigneur m'a conféré l'onction
  - type: text
    content: ' (= il m''a fait « messie »). '
  - type: text
    content: Il m'a envoyé pour porter une bonne nouvelle aux pauvres
  - type: text
    content: … (cf. Lc 4.16-21).
