      marker-yv: yv-n
    - type: text
      text: J'arrivai à Tel-Aviv, chez les exilés qui habitaient près du Kebar, là où ils habitaient ; je restai là sept jours, atterré, au milieu d'eux.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezéchiel sera comme un guetteur
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au bout de sept jours, la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '17':
