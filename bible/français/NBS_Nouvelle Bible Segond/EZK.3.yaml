      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je te le réclamerai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si un juste revient de sa justice et agit injustement, je mettrai devant lui un obstacle pour qu''il trébuche, et il mourra ; si tu ne l''as pas averti, il mourra dans son péché. On ne se souviendra plus de ce qu''il a fait pour la justice ; mais son sang, je te le réclamerai. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ta vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Mais si, toi, tu avertis le juste pour que le juste ne pèche pas, et qu'il ne pèche pas, il vivra, parce qu'il a été averti, et toi, tu sauveras ta vie.
  - type: usfm
