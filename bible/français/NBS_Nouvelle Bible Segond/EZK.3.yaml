      marker-yv: yv-n
    - type: text
      text: 'Quand je dirai au méchant : « Tu mourras ! », si tu ne l''avertis pas, si tu ne parles pas pour avertir le méchant au sujet de sa voie méchante afin de lui sauver la vie, ce méchant mourra dans sa faute ; mais son sang, je te le réclamerai. '
