    - type: text
      text: 'Il me dit : Humain, mange ce que tu trouveras, mange ce rouleau et va parler à la maison d''Israël ! '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il me dit : Humain, reçois dans ton cœur et écoute de tes oreilles toutes les paroles que je te dis ! '
