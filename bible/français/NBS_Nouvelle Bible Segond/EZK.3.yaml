    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 33.1-20 ; Es 21.6-8 ; 56.10 ; Jr 6.16-19 ; Os 12.14 ; Ha 2.1.
      marker-yv: yv-n
    - type: text
      text: 'Humain, je te fais guetteur pour la maison d''Israël. Tu écouteras la parole de ma bouche et tu les avertiras de ma part. '
