document_id: EZK.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 2.8+.
  - type: text
    content: 'Il me dit : Humain, mange ce que tu trouveras, mange ce rouleau et va parler à la maison d''Israël ! '
  '10':
  - type: text
    content: 'Il me dit : Humain, reçois dans ton cœur et écoute de tes oreilles toutes les paroles que je te dis ! '
  '11':
  - type: note
    content: les exilés 1.1. –  les gens (litt. les fils) de ton peuple 33.2+. –  qu'ils écoutent… 2.5+.
  - type: text
    content: 'Va trouver les exilés, les gens de ton peuple ; tu leur parleras et, qu''ils écoutent ou qu''ils ne prennent pas garde, tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Un souffle ou le Souffle , cf. 2.2n  ; cf. v. 14 ; 1R 18.12 ; Ac 8.39 ; 2Co 12.2n  ; Ap 1.10. –  un puissant grondement  : litt. le bruit (ou la voix ) d''un grand tremblement , de même au v. 13 ; le même terme hébreu est traduit par trembler en 12.18 (verbe apparenté en 26.10,15 ; 27.28 ; 31.16 ; 38.20) ; frémissement en 37.7 ; il peut désigner un tremblement de terre (38.19 ; 1R 19.11s ; Es 29.6 ; Am 1.1 ; Za 14.5) ; voir aussi Jr 10.22n  ; 47.3. –  Bénie soit la gloire  : cf. 1.28+ ; Ps 29.9 ; voir aussi Es 6.3s. –  du lieu où il réside  : litt. de son lieu  ; cf. Es 26.21n  ; Mi 1.3.'
  - type: text
    content: 'Un souffle m''enleva, et j''entendis derrière moi un puissant grondement : Bénie soit la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ', du lieu où il réside ! '
  '13':
  - type: note
    content: 'J''entendis  : sous-entendu dans le texte. –  êtres vivants 1.5n. –  roues 1.15.'
  - type: text
    content: 'J''entendis le bruit des ailes des êtres vivants battant l''une contre l''autre, le bruit des roues auprès d''eux et le puissant grondement. '
  '14':
  - type: note
    content: 'Un souffle ou le Souffle, cf. v. 12 ; cf. 8.3 ; 43.5. –  irrité et furieux  : litt. amer et dans la fièvre de mon esprit. –  la main du Seigneur 1.3+. –  était plus forte que moi  : litt. (était) forte (le même terme hébreu est traduit par dure au v. 8n) sur moi.'
  - type: text
    content: 'Un souffle m''enleva et m''emporta. J''allais, irrité et furieux, mais la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était plus forte que moi. '
  '15':
  - type: note
    content: 'Tel-Aviv  : colline de l''épi (sans doute par hébraïsation d''un nom de lieu babylonien ; cf. Ex 13.4n) ; localité inconnue de Mésopotamie, à ne pas confondre avec la ville moderne d''Israël qui a reçu ce nom. –  Kebar 1.1n. –  là où ils habitaient  : ces mots sont absents de certains mss hébreux et de Syr. –  je restai  : autres traductions j''habitai (même verbe dans le début du v.)  ; je restai assis  ; cf. Esd 9.3-5.'
  - type: text
    content: J'arrivai à Tel-Aviv, chez les exilés qui habitaient près du Kebar, là où ils habitaient ; je restai là sept jours, atterré, au milieu d'eux.
  - type: heading
    content: Ezéchiel sera comme un guetteur
  '16':
  - type: text
    content: 'Au bout de sept jours, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 33.1-20 ; Es 21.6-8 ; 56.10 ; Jr 6.16-19 ; Os 12.14 ; Ha 2.1.
  - type: text
    content: 'Humain, je te fais guetteur pour la maison d''Israël. Tu écouteras la parole de ma bouche et tu les avertiras de ma part. '
  '18':
  - type: note
    content: '33.8. –  au méchant  : cf. 18.4,20. –  au sujet de sa voie méchante  : autres traductions des conséquences de sa voie mauvaise ; pour le détourner de sa voie mauvaise. –  lui sauver la vie  : litt. le faire vivre. –  dans sa faute  : autres traductions à cause de sa faute ; pour sa propre faute ; par sa faute  ; mêmes possibilités dans la suite. Voir péché. –  son sang  ; cf. Gn 4.10n. –  je te le réclamerai  : litt. je chercherai (ou je redemanderai) de ta main, c.-à-d. je t''en demanderai compte, je t''en tiendrai pour responsable (de même au v. 20) ; cf. Gn 9.5ns.'
  - type: text
    content: 'Quand je dirai au méchant : « Tu mourras ! », si tu ne l''avertis pas, si tu ne parles pas pour avertir le méchant au sujet de sa voie méchante afin de lui sauver la vie, ce méchant mourra dans sa faute ; mais son sang, je te le réclamerai. '
  '19':
  - type: note
    content: 33.9. –  tu sauveras ta vie ou tu te sauveras, même possibilité au v. 21 ; sur le terme hébreu correspondant à vie, cf. Gn 1.20n  ; voir aussi 1Tm 4.16 ; Jc 5.20.
  - type: text
    content: 'Mais si, toi, tu avertis le méchant, et qu''il ne revienne pas de sa méchanceté et de sa voie méchante, il mourra dans sa faute, et toi, tu sauveras ta vie. '
  '2':
  - type: text
    content: 'J''ouvris la bouche, et il me fit manger ce rouleau. '
  '20':
  - type: note
    content: 33.12s,18. –  un juste 18.24,26 ; cf. 2P 2.21. –  un obstacle pour qu'il trébuche ou une cause de chute  ; cf. 7.19n  ; Jr 6.21. –  ce qu'il a fait pour la justice 18.24 ; 33.13 ; 1S 12.7 ; Es 33.15n  ; Jr 51.10n  ; Mi 6.5n  ; Ps 103.6n  ; Dn 9.16,18. –  je te le réclamerai v. 18n.
  - type: text
    content: 'Si un juste revient de sa justice et agit injustement, je mettrai devant lui un obstacle pour qu''il trébuche, et il mourra ; si tu ne l''as pas averti, il mourra dans son péché. On ne se souviendra plus de ce qu''il a fait pour la justice ; mais son sang, je te le réclamerai. '
  '21':
  - type: note
    content: ta vie v. 19n.
  - type: text
    content: Mais si, toi, tu avertis le juste pour que le juste ne pèche pas, et qu'il ne pèche pas, il vivra, parce qu'il a été averti, et toi, tu sauveras ta vie.
  - type: heading
    content: Un temps de silence pour Ezéchiel
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Là  : cf. v. 15. –  main v. 14 ; 1.3+. –  Sors  : litt. lève-toi, sors , de même au v. 23.'
  - type: text
    content: 'Là, la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur moi, et il me dit : Sors dans la vallée et là je te parlerai. '
  '23':
  - type: note
    content: '1.1n,28+. –  Je sortis  : cf. v. 22n.'
  - type: text
    content: 'Je sortis dans la vallée ; la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''y tenait, telle que je l''avais vue près du Kebar. Alors je tombai face contre terre. '
  '24':
  - type: note
    content: 'Un souffle ou le Souffle, cf. 2.2n. –  Il me dit  : il s''agit de toute évidence de Dieu (cf. v. 22) ; le verbe est au masculin, ceux qui ont pour sujet le mot correspondant à souffle sont au féminin.'
  - type: text
    content: 'Un souffle entra en moi et me fit tenir sur mes jambes. Il me dit : Va t''enfermer chez toi. '
  '25':
  - type: note
    content: Cf. 4.4-8.
  - type: text
    content: 'Toi, humain, ils mettront sur toi des cordes, avec lesquelles ils te lieront : tu ne sortiras pas au milieu d''eux. '
  '26':
  - type: note
    content: 'que tu sois muet  : cf. 24.27 ; 29.21 ; 33.21s. –  que tu ne puisses pas les reprendre (ou les avertir) : litt. que tu ne sois pas pour eux un homme de reproche (ou de réprimande, d''avertissement) ; cf. Pr 1.23n. –  maison rebelle v. 9.'
  - type: text
    content: 'Je collerai ta langue à ton palais, pour que tu sois muet et que tu ne puisses pas les reprendre – car c''est une maison rebelle. '
  '27':
  - type: note
    content: 'Que celui qui écoute…  : autre traduction que celui qui veut écouter… qui ne veut pas prendre garde  ; cf. 2.5+ ; Mt 11.15+ ; Ap 22.11.'
  - type: text
    content: 'Mais quand je te parlerai, j''ouvrirai ta bouche, pour que tu leur dises : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: . Que celui qui écoute, écoute, et que celui qui ne prend pas garde, ne prenne pas garde – car c'est une maison rebelle.
  '3':
  - type: note
    content: 'Cf. Es 6.6s ; Jr 1.9 ; 15.16. –  Je le mangeai  : litt. je mangeai.'
  - type: text
    content: 'Il me dit : Humain, nourris ton ventre et remplis tes entrailles de ce rouleau que je te donne ! Je le mangeai, et il fut dans ma bouche doux comme du miel.'
  '4':
  - type: text
    content: 'Il me dit : Humain, va vers la maison d''Israël, et tu leur diras mes paroles ! '
  '5':
  - type: note
    content: 'au langage impénétrable, à la langue inintelligible  : litt. profonds de lèvre et pesants de langue, de même au v. 6 ; cf. Es 33.19.'
  - type: text
    content: 'Car ce n''est pas vers un peuple au langage impénétrable, à la langue inintelligible, que tu es envoyé ; c''est vers la maison d''Israël. '
  '6':
  - type: note
    content: 'ils t''écouteraient  : cf. 5.6s ; 16.47s ; Jon 3.5 ; Mt 8.10-13 ; 11.21-23 ; Ac 13.46.'
  - type: text
    content: 'Ce n''est pas vers une multitude de peuples au langage impénétrable, à la langue inintelligible, dont tu ne comprends pas les discours. Si je t''envoyais vers ceux-là, ils t''écouteraient. '
  '7':
  - type: note
    content: 'a le front dur…  : litt. ils sont forts de front et durs de cœur  ; cf. 2.4n.'
  - type: text
    content: 'Mais la maison d''Israël ne voudra pas t''écouter, parce qu''elle ne veut pas m''écouter ; car toute la maison d''Israël a le front dur ; ce sont des obstinés. '
  '8':
  - type: note
    content: 'dur face à…  : autre traduction aussi dur (litt. fort, de même dans la suite) que…  ; l''expression hébraïque rappelle le nom d''Ezéchiel (1.3n) ; cf. Es 50.7 ; Jr 1.18.'
  - type: text
    content: 'Je rends ton visage dur face à leur visage ; je rends ton front dur face à leur front. '
  '9':
  - type: note
    content: maison rebelle v. 27 ; 2.5+ ; voir crainte.
  - type: text
    content: Je rends ton front comme un diamant, plus dur que le roc. N'aie pas peur d'eux, ne sois pas terrifié par eux – car c'est une maison rebelle.
