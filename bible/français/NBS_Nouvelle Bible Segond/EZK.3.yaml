      text: 'Mais si, toi, tu avertis le méchant, et qu''il ne revienne pas de sa méchanceté et de sa voie méchante, il mourra dans sa faute, et toi, tu sauveras ta vie. '
  '2':
  - type: usfm
    marker: p
    children:
