document_id: AMO.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les Moabites
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.3n. –  Moab , au sud-est Es 15–16 ; Jr 48 ; Ez 25.8ss ; So 2.8ss. –  calciné  : c.-à-d. réduit en chaux ou brûlé à la chaux. Les Israélites accordaient une grande importance à l''inhumation ; selon les croyances anciennes, la destruction des ossements privait les défunts de repos ; cf. Jos 7.25s ; 1S 31.13 ; 1R 2.31 ; 2R 9.34 ; Es 34.3 ; Ps 79.2s ; Ec 6.3 ; voir aussi Gn 38.24 ; Lv 20.14. –  Edom 1.6n,11n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions de Moab,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: parce qu'il a brûlé, calciné les os du roi d'Edom,
  '10':
  - type: text
    content: ' '
  - type: note
    content: je vous ai fait monter… 3.1 ; 9.7 ; Gn 12.10n  ; Ex 20.2 ; Jos 24.2ss ; Jr 2.6 ; Mi 6.4s. –  quarante ans Dt 2.7 ; 29.4 ; Ac 7.36 ; 13.17ss.
  - type: text
    content: Moi, pourtant, je vous ai fait monter d'Egypte
  - type: text
    content: et je vous ai conduits quarante ans dans le désert
  - type: text
    content: pour que vous preniez possession du pays des Amorites.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'des prophètes Dt 18.15ss ; 34.10 ; Jg 4.4 ; Os 12.14. –  des nazirs  : hommes voués à Dieu qui devaient en particulier s''abstenir de vin (v. 12) ; voir Nb 6.1-21 ; cf. Jg 13.4ss ; 1S 1.11,28 ; Lc 1.15.'
  - type: text
    content: J'ai suscité des prophètes parmi vos fils
  - type: text
    content: et des nazirs parmi vos jeunes gens.
  - type: text
    content: N'en est-il pas ainsi, Israélites ?
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: …
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'fait boire du vin  : cf. Nb 6.3 ; Jr 35.2ss. –  N''agissez (ou ne parlez ) pas en prophètes 3.8+ ; 7.12ss ; 1R 22.8,27 ; Es 30.10 ; Jr 11.21 ; Mi 2.6 ; cf. Ac 4.17s ; 5.28,40 ; 7.51ss ; 9.5.'
  - type: text
    content: Mais vous avez fait boire du vin aux nazirs,
  - type: text
    content: 'et aux prophètes vous avez donné cet ordre :'
  - type: text
    content: N'agissez pas en prophètes !
  '13':
  - type: text
    content: ' '
  - type: note
    content: Sens incertain ; autres traductions je vous embourbe sur place, comme s'embourbe un chariot… ; je fais craquer le sol sous vos pieds comme sous un chariot…  ; ou encore, avec une modification du texte hébreu traditionnel, je vous fais vaciller comme vacille un chariot…
  - type: text
    content: Eh bien, moi, je vous écrase sur place,
  - type: text
    content: comme écrase un chariot chargé de gerbes.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.19 ; 9.1 ; Es 40.30 ; Jr 25.35 ; 46.6. –  ne sauvera pas sa vie ou ne se sauvera pas lui-même  ; cf. Gn 1.20n.
  - type: text
    content: Plus de refuge pour l'homme rapide ;
  - type: text
    content: celui qui est vigoureux ne pourra pas déployer sa force,
  - type: text
    content: et le guerrier ne sauvera pas sa vie ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui est rapide  : litt. celui qui est agile (v. 14) quant à ses pieds  ; même expression en 2S 2.18n. –  le cavalier  : autre traduction le conducteur de char.'
  - type: text
    content: celui qui manie l'arc ne résistera pas,
  - type: text
    content: celui qui est rapide n'échappera pas,
  - type: text
    content: et le cavalier ne sauvera pas sa vie ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mc 14.52. –  le plus courageux  : litt. celui qui est fort (ou ferme ) en son cœur  ; l''expression peut aussi évoquer l''entêtement, cf. Dt 2.30+. –  ce jour-là  : cf. 3.14 ; 4.2 ; 5.18 ; 8.9ss,13 ; Es 2.11 ; 11.10 ; 12.1 ; 30.26 ; Jr 30.5ss ; Os 1.5+ ; Jl 1.15+ ; Mt 7.22 ; voir aussi Mc 2.20 ; Jn 14.20 ; 2Tm 1.18.'
  - type: text
    content: le plus courageux des guerriers
  - type: text
    content: s'enfuira nu en ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: '1.4+. –  Qeriyoth est peut-être un autre nom de Qir-Moab (Es 15.1), ou bien une autre ville royale ; certains l''interprètent comme un nom commun  : les villes  ; cf. Jr 48.24+. –  acclamations guerrières 1.14n.'
  - type: text
    content: j'enverrai le feu contre Moab.
  - type: text
    content: Il dévorera les palais de Qeriyoth ;
  - type: text
    content: et Moab mourra au milieu du vacarme,
  - type: text
    content: au milieu des acclamations guerrières et au son de la trompe.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le juge est peut-être le roi ; cf. 1.15 ; Jg 2.16n. –  de chez lui  : litt. de son sein  ; le texte hébreu traditionnel porte ici un pronom féminin ( de son sein à elle ), de même pour ses chefs . En revanche le pronom correspondant à avec lui est masculin.'
  - type: text
    content: Je retrancherai le juge de chez lui
  - type: text
    content: et je tuerai tous ses chefs avec lui,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Juda
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Juda 1.1n. –  ils ont rejeté (ou méprisé ) la loi… Lv 26.14ss ; Es 5.24 ; Jr 7.28. –  mensonges  : le terme désigne vraisemblablement ici les idoles ; cf. Es 44.9ss ; Jr 10.1ss ; Ps 115.4ss.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions de Juda,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: 'parce qu''ils ont rejeté la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: et qu'ils n'ont pas observé ses prescriptions,
  - type: text
    content: parce qu'ils se sont laissé égarer par leurs mensonges,
  - type: text
    content: les mêmes mensonges que leurs pères avaient suivis,
  '5':
  - type: text
    content: ' '
  - type: note
    content: Jr 17.27 ; Os 8.14.
  - type: text
    content: j'enverrai le feu contre Juda,
  - type: text
    content: et il dévorera les palais de Jérusalem.
  - type: heading
    content: Israël
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'vendu le juste  : cf. 5.12 ; Es 29.21 ; Ha 1.4 ; Ps 31.19 ; 34.22 ; 37.12. –  vendu… le pauvre  : cf. 5.7,11s ; Ex 21.2 ; Lv 25.39ss ; 2R 4.1 ; voir aussi Dt 17.19s ; Es 1.17,23 ; Jr 2.34 ; 22.3 ; Ez 22.29 ; Mi 2.1s,8s ; 3.9ss ; 6.10ss. –  pour une paire de sandales 8.6 ; cf. Rt 4.7s.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions d'Israël,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: parce qu'ils ont vendu le juste pour de l'argent,
  - type: text
    content: le pauvre pour une paire de sandales ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ils harcèlent…  : texte obscur ; autres traductions ils convoitent jusqu''à la poussière… ; ils sont impatients de faire venir la poussière de la terre sur la tête…  ; même verbe en 8.4 ; Ps 56.2s ; 57.4 ; cf. Jos 7.6 ; Né 9.1 ; Ap 18.19 ; certains modifient le texte hébreu traditionnel pour lire ils engloutissent les petites gens (8.4n) ou bien ils piétinent dans la poussière… la tête des petites gens  ; cf. 4.1 ; 5.11 ; Es 3.14s. –  ils font dévier…  : autre traduction ils portent atteinte à la cause des pauvres  ; cf. Es 10.2 ; Jb 24.4. –  vers la même fille (litt. vers la jeune fille ) : cf. Ex 21.7ss ; Lv 18.8 ; 20.11s ; l''expression pourrait viser la prostitution sacrée (la prostituée sacrée est habituellement désignée par un terme apparenté à celui qui est ici traduit par sacré ) ; cf. v. 8 ; Dt 23.18ns ; 1R 14.22ss ; 15.12 ; 22.47 ; 2R 23.7 ; Os 4.14. –  profanant… Lv 18.21 ; 19.12 ; 20.3 ; Ez 20.39 ; 36.20s ; 43.8. –  mon nom sacré (voir saint) Ez 20.39 ; 36.20ss ; 39.7,25 ; 43.7s.'
  - type: text
    content: ils harcèlent jusqu'à la poussière de la terre
  - type: text
    content: qui est sur la tête des petites gens,
  - type: text
    content: ils font dévier le chemin des pauvres.
  - type: text
    content: Un homme et son père vont vers la même fille,
  - type: text
    content: profanant ainsi mon nom sacré.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vêtements pris en gage Ex 22.25s ; Dt 24.12s. –  de leur dieu ou, moins probablement, de leurs dieux (cf. Gn 11n). –  condamnés à l''amende  : cf. Ex 21.22 ; Dt 22.19 ; Pr 17.26n.'
  - type: text
    content: Ils s'étendent près de chaque autel
  - type: text
    content: sur des vêtements pris en gage
  - type: text
    content: et ils boivent dans la maison de leur dieu
  - type: text
    content: le vin de ceux qu'ils ont condamnés à l'amende.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'devant eux  : litt. de devant eux  ; cf. Dt 7.1 ; Jos 3.6 ; 2S 5.24. –  Amorites Gn 10.16n  ; 14.7,13 ; Dt 2.24 ; Jos 24.8. –  dont la hauteur… Nb 13.28-33 ; Dt 1.28 ; 2.10,21 ; 3.11 ; 9.2 ; cf. Es 2.13+ ; 37.24 ; Dn 4.11s. –  fruit / racines Os 9.16 ; Jb 18.16.'
  - type: text
    content: Moi, pourtant, j'ai détruit devant eux les Amorites,
  - type: text
    content: dont la hauteur égalait celle des cèdres,
  - type: text
    content: et la force celle des chênes ;
  - type: text
    content: j'ai détruit leur fruit en haut
  - type: text
    content: et leurs racines en bas.
