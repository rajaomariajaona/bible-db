document_id: JOB.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Dernière réplique de Job (fin) : si j''ai péché, que Dieu m''achève'
  - type: text
    content: ' '
  - type: note
    content: 'J''avais conclu une alliance  : cf. Gn 15.18n. –  sur une vierge  : autre traduction sur une jeune fille  ; certains modifient le texte hébreu traditionnel pour lire sur une folie  ; d''autres interprètent la vierge comme une référence à la déesse Ishtar, également appelée vierge des cieux  ; cf. Jr 7.18n  ; 44.16ss ; voir aussi Es 33.15 ; Mt 5.28n  ; Siracide 9.5 : « N''attache pas tes regards sur une jeune fille, de peur d''être pris au piège dans sa condamnation. »'
  - type: text
    content: J'avais conclu une alliance pour mes yeux ;
  - type: text
    content: comment aurais-je pu fixer mon attention sur une vierge ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tourne la meule pour un autre  : c.-à-d. qu''elle soit son esclave.'
  - type: text
    content: Que ma femme tourne la meule pour un autre,
  - type: text
    content: et que d'autres abusent d'elle !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 22.22 ; Pr 6.32 ; Jn 8.4s. –  du ressort des juges  : terme apparenté au v. 28 ; cf. Ex 21.22n.'
  - type: text
    content: Car ce serait une infamie,
  - type: text
    content: une faute du ressort des juges.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'monde des disparus 26.6n. –  arracherait…  : autre traduction réduirait à rien tous mes revenus.'
  - type: text
    content: C'est un feu qui dévorerait jusqu'au monde des disparus,
  - type: text
    content: et qui arracherait toutes mes récoltes.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 21.2s ; Lv 25.39-43 ; Dt 5.14 ; Jr 34.8s. –  méprisé 5.17 ; 7.16n.
  - type: text
    content: Si j'ai méprisé le droit de mon serviteur ou de ma servante
  - type: text
    content: quand ils étaient en litige avec moi,
  '14':
  - type: text
    content: que ferai-je, quand Dieu se lèvera ?
  - type: text
    content: Quand il demandera des comptes, que répondrai-je ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui me faisait…  : litt. celui qui me faisait dans le ventre ne l''a-t-il pas fait (le serviteur ou la servante ) Cf. Pr 17.5 ; 22.2. –  Un seul Dieu  : litt. un seul . –  formés  : litt. placés.'
  - type: text
    content: Celui qui me faisait dans le ventre de ma mère ne les a-t-il pas faits aussi ?
  - type: text
    content: Un seul Dieu ne nous a-t-il pas formés dans le sein maternel ?
  '16':
  - type: text
    content: ' '
  - type: note
    content: 6.14+. –  les yeux… 11.20+. –  veuve 22.9+.
  - type: text
    content: Si j'ai refusé aux pauvres ce qu'ils désiraient,
  - type: text
    content: si j'ai laissé les yeux de la veuve s'épuiser,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 22.7+,9+ ; Es 58.7.
  - type: text
    content: si j'ai mangé seul ma ration,
  - type: text
    content: sans que l'orphelin puisse en manger,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'il a grandi…  : d''autres comprennent il (Dieu) m''a élevé comme un père . –  j''ai guidé la veuve  : litt. je l''ai guidée , ce qui pourrait aussi, à la rigueur, s''appliquer à la mère.'
  - type: text
    content: – car, depuis ma jeunesse, il a grandi avec moi comme avec un père ;
  - type: text
    content: depuis le ventre de ma mère, j'ai guidé la veuve –
  '19':
  - type: text
    content: ' '
  - type: note
    content: 22.6+.
  - type: text
    content: si j'ai vu le vagabond manquer de vêtements,
  - type: text
    content: le pauvre dépourvu de couverture,
  '2':
  - type: text
    content: ' '
  - type: note
    content: part / patrimoine 20.29+. –  le Puissant 5.17n.
  - type: text
    content: Quelle part Dieu m'aurait-il réservée d'en haut ?
  - type: text
    content: Quel patrimoine le Puissant m'aurait-il envoyé depuis les hauteurs ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 24.13. –  sans que…  : autre traduction si ses reins ne m''ont pas béni (cf. v. 31 ; 30.25n).'
  - type: text
    content: sans que ses reins m'aient béni,
  - type: text
    content: sans qu'il ait été réchauffé par la toison de mes moutons ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 82.3. –  levé  : litt. agité (cf. Es 10.32+). –  parce que…  : litt. parce que je voyais mon secours à la porte  ; c.-à-d. lors d''un jugement (cf. 5.4n).'
  - type: text
    content: si j'ai levé la main contre l'orphelin,
  - type: text
    content: parce que je me voyais soutenu à la porte de la ville,
  '22':
  - type: text
    content: que mon bras se détache de mon épaule,
  - type: text
    content: mon avant-bras du coude, et qu'il se brise !
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 119.120. –  venant de Dieu  : litt. d''El ou de Dieu.'
  - type: text
    content: Car la catastrophe venant de Dieu était une frayeur pour moi,
  - type: text
    content: et je ne peux rien devant sa majesté.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'mon assurance 8.14n. –  Je me fie à toi  : litt. ma confiance ou ma sécurité  ; cf. 22.24+ ; Ps 49.7 ; 52.9 ; Pr 11.28 ; Mc 10.23-25 ; Lc 12.19s.'
  - type: text
    content: Si j'ai fait de l'or mon assurance,
  - type: text
    content: 'si j''ai dit au métal précieux : « Je me fie à toi ! »,'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'acquises  : litt. trouvées.'
  - type: text
    content: si je me suis réjoui de l'abondance de mes biens,
  - type: text
    content: des richesses que ma main avait acquises ;
  '26':
  - type: text
    content: si j'ai regardé la lumière quand elle brillait,
  - type: text
    content: la lune quand elle s'avançait radieuse,
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'séduire v. 9n. –  ma main…  : geste d''adoration envers les astres. Cf. Dt 4.19 ; 17.3 ; Jr 8.2 ; Ez 8.16.'
  - type: text
    content: si mon cœur s'est laissé séduire en secret,
  - type: text
    content: si ma main s'est portée à ma bouche pour un baiser ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: 6.14. –  passible de jugement v. 11n.
  - type: text
    content: ce serait encore une faute passible de jugement,
  - type: text
    content: et j'aurais renié le Dieu d'en haut !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 17.5 ; 24.17 ; Mt 5.44 ; Lc 6.27s. –  mon ennemi  : litt. celui qui me détestait ou qui me haïssait . –  atteint  : litt. trouvé.'
  - type: text
    content: Si je me suis réjoui du malheur de mon ennemi,
  - type: text
    content: si j'ai sauté d'allégresse parce qu'un mal l'avait atteint,
  '3':
  - type: text
    content: ' '
  - type: note
    content: malfaisants 34.8,22 ; Es 31.2n  ; Os 6.8n  ; Ps 5.6+ ; Pr 10.22 ; 21.15.
  - type: text
    content: La catastrophe n'est-elle pas pour l'homme injuste,
  - type: text
    content: et l'infortune pour les malfaisants ?
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'ma bouche  : litt. mon palais , cf. 6.30n. –  sa mort  : litt. sa vie ou son être , voir Gn 1.20n. –  malédiction  : autre traduction adjuration  ; sur le terme hébreu correspondant, voir Gn 24.41n  ; Lv 5.1n  ; Nb 5.21n  ; Dt 29.11nss ; Ps 59.13 ; voir aussi bénédiction, malédiction.'
  - type: text
    content: moi qui n'avais pas permis à ma bouche de pécher,
  - type: text
    content: de demander sa mort par une malédiction ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 58.10. –  les gens…  : c.-à-d., probablement, mes hôtes.'
  - type: text
    content: 'si les gens qui sont dans ma tente ne disaient pas :'
  - type: text
    content: « Qui n'a-t-il pas rassasié de viande ? »
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 19.2 ; Jg 19.20.
  - type: text
    content: – L'immigré ne passait pas la nuit dehors,
  - type: text
    content: j'ouvrais ma porte au voyageur. –
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'comme tout être humain  : autre traduction comme Adam (cf. Gn 1.26n  ; 3.10). –  dans ma poche  : litt. dans mon sein ou dans mon giron , désignant le repli du vêtement qui sert de poche.'
  - type: text
    content: Si, comme tout être humain, j'ai couvert mes transgressions,
  - type: text
    content: pour enfouir ma faute dans ma poche,
  '34':
  - type: text
    content: ' '
  - type: note
    content: Cf. Pr 29.25.
  - type: text
    content: parce que j'étais effrayé de la rumeur de la multitude,
  - type: text
    content: parce que le mépris des clans me terrifiait ;
  - type: text
    content: si je me suis tenu silencieux sans franchir ma porte…
  '35':
  - type: text
    content: ' '
  - type: note
    content: '13.17-22+. –  mon dernier signe  : litt. mon taw , nom de la dernière lettre de l''alphabet hébreu, à l''origine en forme de croix (X ; cf. Ez 9.4n). Il faut peut-être comprendre ici mon dernier mot ou ma signature . –  le Puissant 5.17n. –  plainte / accusateur 13.19 ; l''expression rendue ici par accusateur a aussi été traduite par homme de querelle (Jr 15.10), et au pluriel ceux qui te cherchent querelle (Es 41.11).'
  - type: text
    content: Ah ! s'il y avait quelqu'un pour m'écouter !
  - type: text
    content: Voilà mon dernier signe ;
  - type: text
    content: que le Puissant me réponde !
  - type: text
    content: La plainte écrite par mon accusateur,
  '36':
  - type: text
    content: ne la porterai-je pas sur mon épaule,
  - type: text
    content: ne la nouerai-je pas sur moi comme une couronne ?
  '37':
  - type: text
    content: Je lui rendrai compte du nombre de mes pas,
  - type: text
    content: je m'approcherai de lui comme un chef.
  '38':
  - type: text
    content: ' '
  - type: note
    content: Si… v. 7+. –  ma terre (litt. mon sol , cf. Gn 2.5n) Lv 26.34s ; 2Ch 36.21.
  - type: text
    content: Si ma terre crie contre moi,
  - type: text
    content: si ses sillons versent des larmes ;
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 22.13. –  si j''en ai mangé… sans l''avoir payé  : litt. si j''ai mangé sa force sans argent . –  désespéré  : litt. fait souffler.'
  - type: text
    content: si j'en ai mangé le produit sans l'avoir payé,
  - type: text
    content: si j'ai désespéré ses propriétaires ;
  '4':
  - type: text
    content: ' '
  - type: note
    content: 14.16+.
  - type: text
    content: Ne regardait-il pas mes voies ?
  - type: text
    content: Ne comptait-il pas tous mes pas ?
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'ivraie  : traduction incertaine ; le terme semble dérivé d''une racine qui évoque une mauvaise odeur (cf. Gn 34.30n). Il s''agit peut-être d''une plante à l''odeur nauséabonde. Cf. Gn 3.18. –  Fin des  : litt. s''achèvent (les paroles) , verbe de la même racine que le terme traduit par intégrité (1.1+).'
  - type: text
    content: qu'il en sorte des ajoncs au lieu de froment,
  - type: text
    content: et de l'ivraie au lieu d'orge !
  - type: text
    content: Fin des paroles de Job.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ai-je eu recours…  : litt. si j''ai marché avec le néant (quelques mss hébreux et des versions anciennes portent avec les hommes de néant ) , si mon pied s''est hâté vers la tromperie.'
  - type: text
    content: Ai-je eu recours à l'illusion,
  - type: text
    content: me suis-je orienté vers la tromperie ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: pèse Pr 16.2 ; 21.2. –  mon intégrité 1.1+ ; Ps 7.9 ; 17.1-5.
  - type: text
    content: Que Dieu me pèse dans des balances justes,
  - type: text
    content: et il saura mon intégrité !
  '7':
  - type: text
    content: ' '
  - type: note
    content: Si… v. 38-40 ; cf. Nb 5.19-22 ; Jg 17.2 ; 1R 8.31. – Voir cœur.
  - type: text
    content: Si mes pas se sont écartés du chemin,
  - type: text
    content: si mon cœur a suivi mes yeux,
  - type: text
    content: si quelque souillure s'est attachée à mes mains,
  '8':
  - type: text
    content: que je sème et qu'un autre mange,
  - type: text
    content: et que mes rejetons soient déracinés !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'séduit  : autre traduction dupé , même verbe au v. 27 ; cf. Pr 6.23-26 ; Ec 7.26. –  fait le guet  : le terme hébreu est habituellement traduit par tendre une embuscade.'
  - type: text
    content: Si mon cœur a été séduit par une femme,
  - type: text
    content: si j'ai fait le guet à la porte de mon prochain.
