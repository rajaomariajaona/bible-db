          text: sur une folie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; d''autres interprètent la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vierge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'comme une référence à la déesse Ishtar, également appelée '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vierge des cieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Jr 7.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 44.16ss ; voir aussi Es 33.15 ; Mt 5.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.5 : « N''attache pas tes regards sur une jeune fille, de peur d''être pris au piège dans sa condamnation. »'
      marker-yv: yv-n
    - type: text
      text: J'avais conclu une alliance pour mes yeux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comment aurais-je pu fixer mon attention sur une vierge ?
