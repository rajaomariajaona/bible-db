    text: 'Elle t''assiégera aux portes de toutes tes villes, jusqu''à ce que tombent ces hautes et fortes murailles dans lesquelles tu as mis ta confiance, dans tout ton pays ; elle t''assiégera aux portes de toutes tes villes, dans tout le pays que le '
