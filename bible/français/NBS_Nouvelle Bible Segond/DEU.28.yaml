document_id: DEU.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Promesses de bonheur
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 15. –  Si tu écoutes 4.30n  ; Za 6.15. –  en veillant… 5.1n. –  très haut 26.19n. –  de la terre (comme au v. 49) ou du pays (cf. 11.22-25) ; 28.10.
  - type: text
    content: 'Si tu écoutes le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en veillant à mettre en pratique tous ses commandements, tels que je les institue pour toi aujourd''hui, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te placera très haut au-dessus de toutes les nations de la terre. '
  '10':
  - type: note
    content: 'de la terre ou du pays v. 1n. –  le nom du Seigneur (YHWH) (v. 58n  ; Ex 3.15n) est invoqué sur toi  : cf. Jr 7.10 ; Am 9.12 ; Dn 9.18s ; Jc 2.7. –  ils te craindront  : autre traduction ils auront peur de toi.'
  - type: text
    content: 'Tous les peuples de la terre verront que le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est invoqué sur toi, et ils te craindront.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'te comblera…  : litt. te donnera un surplus de bien par le fruit… , formule analogue en 30.9 ; cf. 28.4+. –  sur la terre 7.13+. –  que le Seigneur a juré… 1.8+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te comblera de biens, en multipliant le fruit de ton ventre, le fruit de ton bétail et le fruit de ta terre, sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a juré à tes pères de te donner. '
  '12':
  - type: note
    content: pluie 11.14+ ; cf. 28.23s. –  tu prêteras v. 44 ; 15.6 (autre verbe) ; cf. Pr 22.7.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''ouvrira son bon trésor, le ciel, pour donner à ton pays la pluie en son temps et pour bénir tout le travail de tes mains ; tu prêteras à une multitude de nations, et toi, tu n''auras pas à emprunter. '
  '13':
  - type: note
    content: 'V. 43s. –  si tu écoutes…  : autre traduction si tu obéis aux commandements. –  si tu les observes…  : cf. 4.6n  ; Jos 1.7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera de toi, non pas la queue, mais la tête ; tu seras toujours en haut et tu ne seras jamais en bas, si tu écoutes les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, que j''institue pour toi aujourd''hui, si tu les observes et les mets en pratique, '
  '14':
  - type: note
    content: tu / vous 1.8n. –  ni à droite… 5.32+. –  toutes les paroles ou toutes les choses. –  si tu ne suis pas… 6.14n.
  - type: text
    content: si tu ne t'écartes ni à droite ni à gauche de toutes les paroles que j'institue pour vous aujourd'hui, si tu ne suis pas d'autres dieux pour les servir.
  - type: heading
    content: Menaces de malheur
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1-2+ ; 4.25-28 ; 31.17-21 ; Lv 26.14-45 ; Am 4.6-12 ; Dn 9.11.
  - type: text
    content: 'Mais si tu n''écoutes pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, si tu ne veilles pas à mettre en pratique tous ses commandements et toutes ses prescriptions, tels que je les institue pour toi aujourd''hui, voici toutes les malédictions qui viendront sur toi et qui t''atteindront :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 3.
  - type: text
    content: 'Tu seras maudit dans la ville, et tu seras maudit dans la campagne. '
  '17':
  - type: note
    content: V. 5n.
  - type: text
    content: 'Ta corbeille et ta huche seront maudites. '
  '18':
  - type: note
    content: V. 4+.
  - type: text
    content: 'Le fruit de ton ventre, le fruit de ta terre, la reproduction de tes bovins et les portées de ton petit bétail seront maudits. '
  '19':
  - type: note
    content: V. 6n.
  - type: text
    content: Tu seras maudit lorsque tu rentreras, et tu seras maudit lorsque tu sortiras.
  '2':
  - type: note
    content: 'bénédictions  : cf. 11.26-30 ; 30.15-20 ; Ex 23.20-33 ; Lv 26.3-13 ; sur la notion même de bénédiction, voir Gn 27.33-40. –  parce que  : autre traduction lorsque.'
  - type: text
    content: 'Voici toutes les bénédictions qui viendront sur toi et qui t''atteindront, parce que tu écouteras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu :'
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'V. 8n. –  la malédiction…  : litt. la malédiction (voir bénédiction, malédiction) , la panique et le rabrouement . –  jusqu''à… 7.23. –  que tu disparaisses… 11.17. –  de tes agissements mauvais  : litt. du mal (ou de la méchanceté ) de tes agissements  ; cf. Jr 4.4n. –  parce que tu m''as abandonné  : voir 11.13n  ; cf. Es 1.4 ; Jr 2.13.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' enverra contre toi la malédiction, il te frappera de panique et te rabrouera dans toutes tes entreprises, jusqu''à ce que tu sois détruit, que tu disparaisses bien vite, à cause de tes agissements mauvais, parce que tu m''as abandonné.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 8.37. –  et te fasse disparaître  : sous-entendu dans le texte. –  pour en prendre possession 1.21+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' attachera à toi la peste, jusqu''à ce qu''elle t''extermine et te fasse disparaître de la terre où tu entres pour en prendre possession. '
  '22':
  - type: note
    content: 'sécheresse, d''après Vg  ; épée, mot très proche en hébreu, dans le texte hébreu traditionnel. –  rouille / nielle  : maladies des céréales selon Am 4.9 ; certains y voient des maladies humaines (p. ex. gangrène et jaunisse).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te frappera de dépérissement, de fièvre, d''inflammation, de brûlure, de sécheresse, de rouille et de nielle, qui te poursuivront jusqu''à ce que tu disparaisses. '
  '23':
  - type: note
    content: Cf. v. 12 ; Lv 26.19.
  - type: text
    content: Le ciel qui est au-dessus de ta tête sera de bronze, et la terre qui est au-dessous de toi sera de fer.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'poussière / poudre  : cf. Ex 9.9n. –  jusqu''à ce que tu sois détruit v. 45,63.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' enverra pour pluie à ton pays de la poussière et de la poudre ; il en descendra du ciel sur toi jusqu''à ce que tu sois détruit.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'te battra devant tes ennemis  : autres traductions te fera battre par tes ennemis ; te frappera d''un fléau devant tes ennemis  ; cf. v. 7+. –  tu seras un sujet de terreur  : c.-à-d. ton sort sera si affreux qu''il inspirera de la terreur  ; cf. v. 37 ; Jr 15.4+. –  de la terre ou du pays v. 1n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te battra devant tes ennemis ; tu les attaqueras par un seul chemin et tu t''enfuiras devant eux par sept chemins ; tu seras un sujet de terreur pour tous les royaumes de la terre. '
  '26':
  - type: note
    content: Cf. Jr 7.33 ; 16.4.
  - type: text
    content: Ton cadavre sera la pâture de tous les oiseaux du ciel et des bêtes de la terre, et il n'y aura personne pour les troubler.
  '27':
  - type: text
    content: ' '
  - type: note
    content: ulcère v. 35 ; Ex 9.8-11 ; cf. Ap 16.2. –  tumeurs ou hémorroïdes 1S 5.6n–6.5. –  gale Lv 21.20 ; 22.20.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te frappera de l''ulcère d''Egypte, de tumeurs, de gale et de démangeaisons, toutes choses dont tu ne pourras guérir. '
  '28':
  - type: note
    content: 'délire (v. 34) / cécité (ou aveuglement) Za 12.4 ; cf. 2P 1.9. –  déraison  : litt. stupéfaction de cœur.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te frappera de délire, de cécité, de déraison ; '
  '29':
  - type: note
    content: 'tu tâtonneras  : cf. Es 59.10 ; So 1.17 ; Jb 5.14 ; Ac 22.11. –  tu ne réussiras pas dans tes projets (litt. tes voies, cf. Es 48.15n  ; Ps 37.7) : autre traduction tu ne trouveras pas ton chemin, cf. Dt 29.8 ; Jos 1.7s ; Es 48.15. –  toujours (litt. tous les jours) opprimé v. 33 ; cf. 24.14. –  dépouillé  : le même terme est traduit par s''emparer de au v. 31. –  il n''y aura pas de sauveur v. 31.'
  - type: text
    content: tu tâtonneras en plein midi comme l'aveugle tâtonne dans l'obscurité ; tu ne réussiras pas dans tes projets, tu seras toujours opprimé et dépouillé, et il n'y aura pas de sauveur.
  '3':
  - type: text
    content: ' '
  - type: note
    content: V. 16.
  - type: text
    content: 'Tu seras béni dans la ville, et tu seras béni dans la campagne. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: Cf. 20.5-7 ; Am 5.11.
  - type: text
    content: 'Tu auras une fiancée, et un autre homme couchera avec elle ; tu bâtiras une maison et tu ne l''habiteras pas ; tu planteras une vigne et tu n''en profiteras pas. '
  '31':
  - type: note
    content: Cf. 23.1-3. –  il n'y aura personne… v. 29.
  - type: text
    content: 'Ton bœuf sera égorgé sous tes yeux, et tu n''en mangeras pas ; on s''emparera de ton âne devant toi, et on ne te le rendra pas ; ton petit bétail sera donné à tes ennemis, et il n''y aura personne pour te sauver. '
  '32':
  - type: note
    content: 'Lv 26.16. –  tes yeux… s''épuiseront v. 65. –  tu ne pourras rien faire  : litt. et (ce ne sera) pas au pouvoir de ta main  ; cf. Mi 2.1n  ; Né 5.5n.'
  - type: text
    content: 'Tes fils et tes filles seront livrés à un autre peuple, tes yeux le verront et s''épuiseront à les attendre sans cesse, mais tu ne pourras rien faire. '
  '33':
  - type: note
    content: 'tu ne connais pas v. 36. –  tout le produit de ton travail  : autre traduction tout ce pour quoi tu t''es fatigué  ; cf. Gn 31.42n. –  toujours opprimé (v. 29n) et écrasé Am 4.1.'
  - type: text
    content: 'Un peuple que tu ne connais pas mangera le fruit de ta terre, tout le produit de ton travail, tu seras toujours opprimé et écrasé. '
  '34':
  - type: note
    content: spectacle v. 67. –  délire v. 28.
  - type: text
    content: Le spectacle que tu auras sous les yeux te jettera dans le délire.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'ulcère (v. 27+) malin… Jb 2.7n. –  il te frappera  : sous-entendu dans le texte.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te frappera aux genoux et aux cuisses d''un ulcère malin dont tu ne pourras guérir, il te frappera depuis les pieds jusqu''au crâne. '
  '36':
  - type: note
    content: 'ton roi 17.14s. –  tu serviras…  : cf. v. 64 ; 4.27s ; 29.25.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te fera marcher, toi et ton roi que tu auras placé à ta tête, vers une nation que tu n''auras pas connue, ni toi ni tes pères. Là, tu serviras d''autres dieux, du bois et de la pierre. '
  '37':
  - type: note
    content: V. 25. –  sujet de stupéfaction ou d'atterrement  ; cf. Lv 26.32n  ; Jr 42.18 ; Ez 5.15 ; 2Ch 29.8. –  fable / raillerie 1R 9.7+ ; 2Ch 7.20.
  - type: text
    content: 'Tu deviendras un sujet de stupéfaction, de fable et de raillerie parmi tous les peuples chez qui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te mènera.'
  '38':
  - type: text
    content: ' '
  - type: note
    content: Mi 6.15 ; Ag 1.6. –  criquets Jl 1.4n.
  - type: text
    content: 'Tu donneras aux champs beaucoup de semence, mais tu ne feras qu''une petite récolte, car les criquets la dévoreront. '
  '39':
  - type: note
    content: Am 5.11 ; So 1.13.
  - type: text
    content: 'Tu planteras des vignes et tu les cultiveras, mais tu n''en boiras pas le vin ; tu n''en amasseras pas la récolte, car les vers la mangeront. '
  '4':
  - type: note
    content: 'Cf. v. 11,18,51 ; Lc 1.42. –  la reproduction…  : cf. 7.13+.'
  - type: text
    content: 'Le fruit de ton ventre, le fruit de ta terre, le fruit de ton bétail, la reproduction de tes bovins et les portées de ton petit bétail seront bénis. '
  '40':
  - type: note
    content: 'tu ne t''enduiras pas d''huile (à usage médical ou cosmétique) : des expressions analogues sont traduites par (se) parfumer ou panser  ; cf. 2S 14.2 ; Ez 16.9 ; Mi 6.15 ; Rt 3.3 ; Dn 10.3.'
  - type: text
    content: 'Tu auras des oliviers dans tout ton territoire, mais tu ne t''enduiras pas d''huile, car tes olives tomberont. '
  '41':
  - type: text
    content: 'Tu engendreras des fils et des filles, mais ils ne seront pas pour toi, car ils iront en captivité. '
  '42':
  - type: text
    content: Les grillons prendront possession de tous tes arbres et du fruit de ta terre.
  '43':
  - type: text
    content: ' '
  - type: note
    content: V. 13.
  - type: text
    content: 'L''immigré qui est en ton sein s''élèvera toujours plus haut au-dessus de toi, et toi, tu descendras toujours plus bas ; '
  '44':
  - type: note
    content: V. 12.
  - type: text
    content: lui, il te prêtera, et toi, tu n'auras rien à lui prêter ; lui, il sera la tête, et toi, tu seras la queue.
  '45':
  - type: text
    content: ' '
  - type: note
    content: V. 2+,15. –  détruit v. 24+.
  - type: text
    content: 'Toutes ces malédictions viendront sur toi, elles te poursuivront et t''atteindront jusqu''à ce que tu sois détruit, parce que tu n''as pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en observant ses commandements et ses prescriptions, tels qu''il les a institués pour toi. '
  '46':
  - type: note
    content: Cf. 4.34+.
  - type: text
    content: Elles seront pour toujours sur toi et sur ta descendance comme des signes et des prodiges.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'servi 7.4+ ; 10.12. –  le cœur content  : litt. dans le bien du cœur  ; cf. 4.40n  ; voir aussi 6.10-12 ; 8.11-14 ; 32.13-15.'
  - type: text
    content: 'Pour n''avoir pas servi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, avec joie et le cœur content, en ayant tout en abondance, '
  '48':
  - type: note
    content: manquant de tout v. 57. –  joug de fer Jr 28.14.
  - type: text
    content: 'tu serviras dans la faim, la soif et le dénuement, en manquant de tout, les ennemis que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' enverra contre toi. Il mettra un joug de fer sur ta nuque, jusqu''à ce qu''il t''ait détruit. '
  '49':
  - type: note
    content: 'Jr 5.15-17 ; voir aussi Es 5.26 ; 33.19 ; Ha 1.8. –  qui fondra sur toi comme l''aigle sur sa proie  : litt. comme fond l''aigle (ou le vautour) ; même verbe en Jr 48.40 ; 49.22 ; Ps 18.11n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' suscitera contre toi de loin, des extrémités de la terre, une nation qui fondra sur toi comme l''aigle sur sa proie, une nation dont tu ne comprendras pas la langue, '
  '5':
  - type: note
    content: V. 17. –  corbeille 26.2,4. – La huche servait aussi de pétrin pour préparer le pain.
  - type: text
    content: Ta corbeille et ta huche seront bénies.
  '50':
  - type: note
    content: 'visage farouche Dn 8.23n. –  n''aura pas de respect  : litt. ne relèvera pas le visage  ; autre traduction qui ne favorisera pas (cf. 10.17n) ; cf. 32.25.'
  - type: text
    content: 'une nation au visage farouche, qui n''aura pas de respect pour le vieillard et ne fera pas grâce au jeune homme. '
  '51':
  - type: note
    content: 'V. 4+. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n. –  jusqu''à ce qu''elle t''ait fait disparaître 8.20+.'
  - type: text
    content: 'Elle mangera le fruit de ton bétail et le fruit de ta terre, jusqu''à ce que tu sois détruit ; elle ne te laissera ni blé, ni vin, ni huile, ni petit de tes bovins, ni portée de ton petit bétail, jusqu''à ce qu''elle t''ait fait disparaître. '
  '52':
  - type: note
    content: 'aux portes de toutes tes villes  : litt. dans toutes tes portes  ; cf. 12.15n  ; 16.18n. –  murailles… ta confiance  : cf. Jr 5.17.'
  - type: text
    content: 'Elle t''assiégera aux portes de toutes tes villes, jusqu''à ce que tombent ces hautes et fortes murailles dans lesquelles tu as mis ta confiance, dans tout ton pays ; elle t''assiégera aux portes de toutes tes villes, dans tout le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne.'
  '53':
  - type: text
    content: ' '
  - type: note
    content: détresse (le même terme désigne plus particulièrement le siège d'une ville en 20.19s) / désarroi v. 55,57 ; cf. Jr 19.9n  ; Rm 2.9. –  tu mangeras… Lv 26.29 ; cf. 2R 6.28s ; Ez 5.10 ; Lm 2.20 ; 4.10.
  - type: text
    content: 'Dans la détresse et le désarroi où te réduira ton ennemi, tu mangeras le fruit de ton ventre, la chair de tes fils et de tes filles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a donnés. '
  '54':
  - type: note
    content: délicat / choyé (autre traduction raffiné) v. 56 ; Es 47.1.
  - type: text
    content: 'L''homme le plus délicat et le plus choyé chez toi regardera d''un œil mauvais son frère, ainsi que la femme qui dort sur son sein et ceux de ses fils qu''il a épargnés, '
  '55':
  - type: note
    content: V. 53.
  - type: text
    content: 'de crainte de devoir donner à l''un d''entre eux de la chair de ses fils qu''il mangera, parce qu''il ne lui restera plus rien dans la détresse et le désarroi où te réduira ton ennemi aux portes de toutes tes villes. '
  '56':
  - type: note
    content: 'V. 54. –  ne se risquerait pas…  : trop raffinée pour marcher, elle restait étendue chez elle ou se faisait transporter en litière.'
  - type: text
    content: 'La femme la plus délicate et la plus choyée chez toi, celle qui est si choyée et si délicate qu''elle ne se risquerait pas à poser son pied par terre, regardera d''un œil mauvais le mari qui dort sur son sein, son fils et sa fille, '
  '57':
  - type: note
    content: 'd''elle  : litt. d''entre ses pieds ou d''entre ses jambes, euphémisme ; cf. Gn 49.10 ; Ex 4.25n  ; Es 6.2n  ; 7.20n. –  manquant de tout v. 48.'
  - type: text
    content: ainsi que ce qui sera sorti d'elle, les fils qu'elle a mis au monde, car, manquant de tout, elle les mangera dans la détresse et le désarroi où te réduira ton ennemi aux portes de tes villes.
  '58':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 1s. –  toutes les paroles… 17.19+. –  crains 4.10+. –  nom  : cf. 12.5 ; Ex 3.15n. – Voir gloire.'
  - type: text
    content: 'Si tu ne veilles pas à mettre en pratique toutes les paroles de cette loi, qui sont écrites dans ce livre, si tu ne crains pas ce nom glorieux et redoutable, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, '
  '59':
  - type: note
    content: Cf. 7.15+ ; 28.27,61 ; 29.21 ; Lv 26.21.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te frappera de façon étonnante, toi et ta descendance, de grands fléaux persistants, de maladies graves et persistantes. '
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'V. 19 ; cf. Ps 121.8. –  lorsque tu rentreras (ou entreras ) / lorsque tu sortiras  : l''expression signifie sans doute ici, dans un sens général, dans toutes tes entreprises  ; ailleurs elle est souvent employée dans un sens militaire (on pourrait comprendre lorsque tu reviendras de campagne / lorsque tu partiras en campagne , cf. v. 7) ; cf. 31.2n  ; 33.18n  ; Nb 27.17n  ; Jn 10.9.'
  - type: text
    content: 'Tu seras béni lorsque tu rentreras, et tu seras béni lorsque tu sortiras. '
  '60':
  - type: text
    content: 'Il amènera sur toi toutes les épidémies d''Egypte qui t''effrayaient, et elles s''attacheront à toi. '
  '61':
  - type: note
    content: 'le livre de cette loi  : autre traduction ce livre de la loi  ; cf. 29.20 ; 30.10 ; 31.26 ; Jos 1.8 ; 8.34 ; 2R 22.8,11 ; Né 8.3. –  détruit v. 24+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera même venir sur toi toutes sortes de maladies et de fléaux qui ne sont pas mentionnés dans le livre de cette loi, jusqu''à ce que tu sois détruit. '
  '62':
  - type: note
    content: nombreux / peu de gens 1.10+ ; 4.27n  ; 26.5n  ; cf. Jr 42.2+. –  écouté v. 1n.
  - type: text
    content: 'Après avoir été aussi nombreux que les étoiles du ciel, il ne vous restera que peu de gens, parce que tu n''as pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  '63':
  - type: text
    content: ' '
  - type: note
    content: 'vous faire du bien  : cf. 8.16 ; 30.9 ; Jr 32.40s. –  arrachés de la terre (cf. Gn 2.5n) : cf. 29.27 ; 1R 14.15 ; Jr 12.14 ; 2Ch 7.20.'
  - type: text
    content: 'De même que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était content de vous faire du bien et de vous multiplier, de même le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera content de vous faire disparaître et de vous détruire ; ainsi vous serez arrachés de la terre dont tu vas entrer en possession. '
  '64':
  - type: note
    content: V. 36+ ; cf. Lc 21.24.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te dispersera parmi tous les peuples, d''une extrémité de la terre à l''autre. Là, tu serviras d''autres dieux que ni toi, ni tes pères, n''avez connus, du bois et de la pierre. '
  '65':
  - type: note
    content: 'tes pieds ne trouveront pas de lieu de repos 2.5 ; cf. Gn 8.9n. –  tes yeux seront épuisés v. 32 ; cf. Lv 26.16n  ; 1S 2.33 ; Jb 3.6. –  ta vie  : autres traductions tout ton être ou peut-être ta gorge, ton âme (autre terme au v. 66) ; cf. Gn 1.20n.'
  - type: text
    content: 'Parmi ces nations, tu ne seras pas tranquille, et tes pieds ne trouveront pas de lieu de repos. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rendra ton cœur agité ; tes yeux seront épuisés, ta vie affaiblie. '
  '66':
  - type: note
    content: 'comme en suspens devant toi  : litt. (sus-)pendue pour toi devant, même verbe en 2S 21.12 ; d''autres rapportent l''expression à une autre racine hébraïque et traduisent quand tu considéreras ta vie, elle te sera lassitude ou cela te sera pénible. –  tu ne pourras pas compter sur ou tu n''auras pas foi en, verbe apparenté au mot amen (27.15n  ; cf. Es 7.9n) ; Jb 24.22.'
  - type: text
    content: 'Ta vie sera comme en suspens devant toi, tu seras effrayé nuit et jour, tu ne pourras pas compter sur ta propre vie, '
  '67':
  - type: note
    content: Cf. Jb 7.4. –  du spectacle… v. 34.
  - type: text
    content: 'tu diras le matin : « Ah ! si c''était le soir ! » et tu diras le soir : « Ah ! si c''était le matin ! » à cause de la frayeur que tu éprouveras dans ton cœur et du spectacle que tu auras sous les yeux. '
  '68':
  - type: note
    content: '17.16+ ; cf. Os 8.13+. –  comme esclaves et comme servantes  : autre traduction comme esclaves, hommes et femmes  ; cf. Gn 12.16n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te ramènera en Egypte sur des bateaux, et tu feras ce chemin dont je t''avais dit : « Tu ne le reverras plus ! » Là, vous vous vendrez à tes ennemis, comme esclaves et comme servantes ; mais il n''y aura personne pour vous acheter.'
  - type: heading
    content: DERNIER DISCOURS DE MOÏSE
  '69':
  - type: text
    content: ' '
  - type: note
    content: Certaines éditions rattachent ce v. au chap. 29 et décalent la numérotation des v. en conséquence. – Cf. 1.5. – Voir alliance.
  - type: text
    content: 'Telles sont les paroles de l''alliance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ordonna à Moïse de conclure avec les Israélites au pays de Moab, en plus de l''alliance qu''il avait conclue avec eux à l''Horeb.'
  '7':
  - type: note
    content: 'battra…  : autres traductions te fera battre les ennemis ; frappera d''un fléau devant toi les ennemis, cf. v. 25 ; 1.42 ; voir aussi 20.4.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' battra devant toi les ennemis qui se dresseront contre toi ; ils t''attaqueront par un seul chemin et ils s''enfuiront devant toi par sept chemins.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ordonnera que la bénédiction…  : autre traduction t''assignera la bénédiction  ; cf. Lv 25.21 ; Ps 133.3n. –  toutes tes entreprises  : litt. tout l''envoi de ta main , de même au v. 20 ; 15.10+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ordonnera que la bénédiction soit avec toi dans tes granges, et dans toutes tes entreprises. Il te bénira dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne. '
  '9':
  - type: note
    content: 'fera de toi…  : litt. te fera lever pour lui comme peuple saint. –  peuple saint 7.6+ ; 26.19.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera de toi son peuple saint, ainsi qu''il te l''a juré, parce que tu observeras les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et que tu suivras ses voies. '
