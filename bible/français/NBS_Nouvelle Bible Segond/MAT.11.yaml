document_id: MAT.11,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: '4.23+ ; 7.28+ ; 9.35. –  proclamer le message  : litt. proclamer 3.1+ ; 4.23.'
  - type: text
    content: Lorsque Jésus eut achevé de donner ses ordres à ses douze disciples, il partit de là pour enseigner et proclamer le message dans leurs villes.
  - type: heading
    content: La question de Jean le Baptiseur
  - type: heading
    content: Lc 7.18-35
  '10':
  - type: note
    content: 'devant toi  : cette expression correspond à deux formules différentes en grec ; la première (litt. devant ta face) est un hébraïsme. –  messager  : les mots hébreu et grec correspondants peuvent aussi être traduits par ange  ; Ml 3.1  ; cf. Ex 23.20  ; Es 40.1 ; Mc 1.2/ /.'
  - type: text
    content: 'C''est à son sujet qu''il est écrit :'
  - type: text
    content: Moi, j'envoie devant
  - type: text
    content: ' toi '
  - type: text
    content: mon messager,
  - type: text
    content: pour frayer ton chemin devant
  - type: text
    content: ' toi.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Amen 5.18n. –  nés de femmes  : cf. Jb 11.12 ; 14.1 ; 15.14 ; 25.4. –  il ne s''en est pas levé ou il n''en a pas été suscité  : cf. 2.13n  ; 3.9n. –  le plus petit ou celui qui est plus petit (autre mot qu''en 5.19) 18.1/ /.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, parmi ceux qui sont nés de femmes, il ne s''en est pas levé de plus grand que Jean le Baptiseur. Cependant le plus petit dans le royaume des cieux est plus grand que lui. '
  '12':
  - type: note
    content: Lc 13.24 ; 16.16 ; Jn 6.15. –  qui s'en emparent ou qui le ravissent, cf. 7.15n.
  - type: text
    content: 'Depuis les jours de Jean le Baptiseur jusqu''à présent, le royaume des cieux est soumis à la violence, et ce sont les violents qui s''en emparent. '
  '13':
  - type: note
    content: 'Jn 1.6-8 ; 1P 1.10. –  prophètes / loi  : cf. 5.17n  ; Rm 3.21n.'
  - type: text
    content: 'Car tous les prophètes et la loi ont parlé en prophètes jusqu''à Jean ; '
  '14':
  - type: note
    content: '17.10-13/ / ; Ml 3.23s ; Lc 1.16s ; Jn 1.21. –  l''admettre  : litt. l''accueillir, le recevoir. –  qui devait venir  : litt. qui va venir.'
  - type: text
    content: 'et, si vous voulez l''admettre, l''Elie qui devait venir, c''est lui. '
  '15':
  - type: note
    content: 13.9/ /,43 ; Dt 29.3 ; Ez 3.27 ; Mc 4.9+ ; Lc 14.35 ; Ap 2.7+.
  - type: text
    content: Que celui qui a des oreilles entende !
  '16':
  - type: text
    content: ' '
  - type: note
    content: '12.39-45/ /. –  génération 12.39+. –  Voici…  : litt. elle est semblable à des enfants assis… –  les autres ou, d''après certains mss, leurs compagnons.'
  - type: text
    content: 'A qui comparerai-je cette génération ? Voici à quoi elle est semblable : des enfants assis sur les places publiques, qui appellent les autres '
  '17':
  - type: note
    content: 'Pr 1.24 ; Ec 3.4 ; voir aussi Es 16.10 ; Jr 7.34 ; 16.9 ; 25.10 ; 48.33 ; Ez 26.13. –  vous ne vous êtes pas lamentés  : autre traduction vous ne vous êtes pas frappé (la poitrine), même verbe en 24.30 ; cf. Lc 18.13 (autre verbe).'
  - type: text
    content: 'en disant :'
  - type: text
    content: Nous vous avons joué de la flûte,
  - type: text
    content: et vous n'avez pas dansé.
  - type: text
    content: Nous avons chanté des complaintes,
  - type: text
    content: et vous ne vous êtes pas lamentés.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 3.4/ / ; Lc 1.15. –  Il a un démon , c.-à-d. il est fou , cf. Jn 10.20s.
  - type: text
    content: 'Car Jean est venu : il ne mangeait ni ne buvait, et l''on dit : « Il a un démon ! » '
  '19':
  - type: note
    content: 'Fils de l''homme 8.20n  ; 9.6 ; 10.23. –  glouton / buveur / ami… des pécheurs  : cf. 9.10n-11 ; Dt 21.20 ; Pr 23.20 ; 1Co 15.32. –  justifiée par ses œuvres  : cf. 12.37 ; voir aussi Rm 3.20 ; 4.2 ; Ga 2.16 ; Jc 2.21ss. –  œuvres  : certains mss portent ses enfants (Lc 7.35) ; voir 1Co 1.24.'
  - type: text
    content: 'Le Fils de l''homme est venu, mangeant et buvant, et l''on dit : « C''est un glouton et un buveur, un ami des collecteurs des taxes, des pécheurs ! » Mais la sagesse a été justifiée par ses œuvres.'
  - type: heading
    content: Les villes qui refusent de croire
  - type: heading
    content: Mt 10.15  ; Lc 10.12-15
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Jean (le Baptiseur) , dans sa prison  : cf. 3.1-6 ; 4.12. –  Christ  : cf. 1.16n.'
  - type: text
    content: 'Or Jean, dans sa prison, avait entendu parler des œuvres du Christ. Il envoya ses disciples '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '12.41 ; Jr 8.4-6 ; Ps 81.12 ; Jn 12.37. –  faire des reproches sévères  : le même verbe est traduit par insulter en 5.11 ; 27.44. –  miracles 7.22n. –  pas voulu changer radicalement ou pas changé  ; autres traductions elles ne s''étaient pas repenties, elles ne s''étaient pas converties . Voir 3.2n.'
  - type: text
    content: 'Alors il se mit à faire des reproches sévères aux villes dans lesquelles avaient eu lieu la plupart des miracles, parce qu''elles n''avaient pas voulu changer radicalement : '
  '21':
  - type: note
    content: 'Quel malheur pour toi  : certains traduisent malheur à toi, mais il s''agit moins d''une malédiction que d''une lamentation ou du constat d''un destin tragique ; autres traductions possibles hélas pour toi ; tant pis pour toi  ; cf. 18.7 ; 23.13ss ; 24.19 ; 26.24 ; 1Co 9.16 ; Jd 11 ; Ap 8.13+. –  Chorazin / Bethsaïda  : localités proches du lac de Tibériade. Sur Bethsaïda, voir Mc 6.45n. –  Tyr / Sidon  : principales villes de la Phénicie, où l''on adorait Baal et Astarté. Cf. Es 23 ; Ez 26–28 ; Jl 4.4-8 ; Am 1.9s ; Za 9.2ss. –  changé radicalement v. 20n  ; 3.2n. –  sac / cendre  : signes de deuil, de tristesse ou de pénitence, Jon 3.6 ; cf. Es 58.5 ; Jb 2.8 ; Dn 9.3 ; Est 4.2s.'
  - type: text
    content: 'Quel malheur pour toi, Chorazin ! Quel malheur pour toi, Bethsaïda ! Si les miracles qui ont été faits chez vous avaient été faits à Tyr et à Sidon, il y a longtemps qu''elles auraient changé radicalement, en passant par le sac et la cendre ! '
  '22':
  - type: note
    content: 10.15+ ; Hé 12.25.
  - type: text
    content: 'C''est pourquoi, je vous le dis, au jour du jugement, ce sera moins dur pour Tyr et Sidon que pour vous. '
  '23':
  - type: note
    content: Capharnaüm 4.13n. –  ciel / séjour des morts (en grec hadès) Es 14.4,11-15 ; Ez 26.20 ; 31.14ss ; cf. Am 9.2 ; Ps 139.8.
  - type: text
    content: 'Et toi, Capharnaüm, seras-tu élevée jusqu''au ciel ? Tu seras abaissée jusqu''au séjour des morts ; car si les miracles qui ont été faits chez toi avaient été faits à Sodome, elle demeurerait encore aujourd''hui ! '
  '24':
  - type: text
    content: C'est pourquoi, je vous le dis, au jour du jugement, ce sera moins dur pour le pays de Sodome que pour toi.
  - type: heading
    content: Le Père révélé par le Fils
  - type: heading
    content: Lc 10.21-22
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'célèbre  : le même verbe grec est traduit par reconnaître publiquement en 3.6 ; il traduit souvent, dans LXX, un verbe hébreu qui a aussi été rendu par célébrer et qui peut également signifier rendre grâce (p. ex. 2S 22.50 ; Ps 6.6 ; 9.2 ; 136.26) ; voir aussi Rm 14.11n. Cf. Hymnes (Qumrân) 7.26s : « Je te rends grâces, ô Adonaï (Seigneur) ! Car tu m''as donné l''intelligence de ta vérité ; et tes Mystères merveilleux, tu me les as fait connaître. » –  Seigneur du ciel et de la terre Ac 17.24 ; cf. Gn 14.19,22 ; expression analogue dans certains mss de Tobit 7.17. –  sages / intelligents Es 5.21 ; 29.14 ; Os 14.10 ; Jb 37.24 ; Ec 9.11 ; cf. 1Co 1.19-29 ; 2.6ss. –  tout-petits 21.16 ; le terme correspondant traduit quelquefois, dans LXX, celui qui est rendu par naïf dans l''A.T. (Ps 19.8 ; 116.6 ; 119.130).'
  - type: text
    content: 'En ce temps-là, Jésus dit : Je te célèbre, Père, Seigneur du ciel et de la terre, parce que tu as caché ces choses aux sages et aux gens intelligents, et que tu les as révélées aux tout-petits. '
  '26':
  - type: note
    content: 'tel a été ton bon plaisir  : litt. ainsi il y a eu bon plaisir devant toi, cf. 3.17+ ; Rm 9.18 ; Ph 2.13.'
  - type: text
    content: Oui, Père, parce que tel a été ton bon plaisir.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Tout 28.18 ; Jn 3.35 ; 13.3 ; 17.2. –  remis  : le même verbe grec est traduit par livrer en 4.12 ; 5.25 ; 10.4 etc. ; un terme apparenté est rendu par tradition en 15.2ss ; le verbe qui apparaît ici peut aussi avoir le sens de transmettre (Mc 7.13n  ; Lc 1.2 ; Ac 6.14 ; 1Co 11.2+ ; cf. Rm 6.17n). –  mon Père  : certains mss portent le Père , de même en Lc 10.22. –  connaît Jn 1.18 ; 10.14s ; 17.25. –  le Fils 24.36 ; 28.19 ; Jn 3.35s ; 5.19ss ; 6.40 ; 8.36 ; 14.13 ; 17.1. –  révéler 16.17 ; Ga 1.15s.'
  - type: text
    content: Tout m'a été remis par mon Père, et personne ne connaît le Fils, sinon le Père, personne non plus ne connaît le Père, sinon le Fils et celui à qui le Fils décide de le révéler.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Evangile selon Thomas 90 : « Jésus a dit : “Venez à moi, car mon joug est bon et ma seigneurie douce, et vous trouverez le repos pour vous.” » –  qui peinez  : le même verbe est traduit par travailler en 6.28 ; cf. Jr 31.25. –  sous la charge  : litt. et qui êtes chargés  ; cf. 23.4 ; Ps 38.5. –  le repos Ex 33.14 ; Jb 34.29.'
  - type: text
    content: 'Venez à moi, vous tous qui peinez sous la charge ; moi, je vous donnerai le repos. '
  '29':
  - type: note
    content: 'joug  : cette image est souvent utilisée dans la littérature juive pour désigner la loi. –  laissez-vous instruire par moi  : même tournure 24.32, litt. apprenez de moi  ; on pourrait aussi comprendre soyez mes disciples ; apprenez à mon contact comme je suis doux…  ; cf. 5.5n  ; 21.5 ; Ep 4.20s. –  humble de cœur  : cf. Nb 12.3 ; 2Co 8.9 ; 10.1 ; Ph 2.5-8. –  vous trouverez le repos  : autre traduction vous trouverez du repos pour vos âmes  ; mais la formule correspondant à vos âmes peut être un simple équivalent de vous-mêmes  ; sur le terme grec parfois traduit par âme, voir 10.28n  ; sur le repos, voir aussi Es 28.12 ; Jr 6.16. – Sur l''ensemble, cf. Siracide 51.23,26s : « Venez à moi (la Sagesse), gens sans instruction, installez-vous à mon école (…). Soumettez votre nuque à son joug et que votre âme reçoive l''instruction ! C''est tout près qu''on la peut trouver. Voyez de vos yeux combien peu j''ai peiné avant de trouver un profond repos. »'
  - type: text
    content: 'Prenez sur vous mon joug et laissez-vous instruire par moi, car je suis doux et humble de cœur, et '
  - type: text
    content: vous trouverez le repos
  - type: text
    content: '. '
  '3':
  - type: note
    content: 'celui qui vient (ou qui devait venir), titre messianique ; cf. 3.11 ; 16.27 ; 21.9 ; 23.39 ; 25.31 ; Za 9.9 ; 14.5 ; Ml 3.1 ; Ps 118.26 ; Dn 7.13 ; 9.26 ; Lc 7.19+ ; Jn 6.14 ; Hé 10.37n  ; Ap 1.4,8. –  un autre  : ici, à la différence de Lc 7.19, Mt emploie un terme qui pourrait signifier quelqu''un de différent  ; mais les deux termes sont pratiquement interchangeables dans le grec de cette époque. – Cf. 1P 1.10s.'
  - type: text
    content: 'lui demander : Est-ce toi, celui qui vient, ou devons-nous en attendre un autre ? '
  '30':
  - type: note
    content: 'Ac 15.10 ; 1Jn 5.3. –  bon  : le terme grec qui apparaît ici peut signifier avantageux, utile, doux, agréable, bienfaisant, bénéfique  ; il est très proche, surtout dans sa prononciation, du mot transcrit Christ (cf. Rm 2.4n  ; Phm 11n).'
  - type: text
    content: Car mon joug est bon, et ma charge légère.
  '4':
  - type: text
    content: 'Jésus leur répondit : Allez raconter à Jean ce que vous entendez et voyez : '
  '5':
  - type: note
    content: '15.31 ; 21.14 ; Es 26.19  ; 29.18s ; 35.5s ; 42.7,18  ; 61.1-3. –  aveugles 9.27. –  infirmes ou boiteux 15.30s ; 18.8 ; 21.14. –  les lépreux sont purifiés  : cf. 8.2+s ; 10.8. –  sourds ou sourds-muets 9.32. –  se réveillent  : autre traduction se relèvent, cf. 2.13n  ; 10.8 ; voir résurrection. –  bonne nouvelle 4.23+. –  pauvres 5.3.'
  - type: text
    content: Les aveugles retrouvent la vue,
  - type: text
    content: ' les infirmes marchent, les lépreux sont purifiés, '
  - type: text
    content: les sourds entendent, les morts se réveillent
  - type: text
    content: ' et la bonne nouvelle est annoncée aux pauvres. '
  '6':
  - type: note
    content: 'cause de chute  : c''est du terme grec correspondant (parfois traduit par pierre d''achoppement, c.-à-d. obstacle qui fait trébucher) que vient notre mot scandale 13.57 ; 15.12n  ; 17.27 ; 26.31-33 ; cf. 5.29s ; 13.21,41 ; 16.23 ; 18.6-9 ; 24.10 ; voir aussi Lv 19.14 (même terme dans LXX) ; Jos 23.13 ; Jg 2.3 ; 8.27 (même terme pour piège dans LXX) ; 1S 25.31 ; Es 8.14ns ; Ez 3.20n  ; 7.19n  ; Ps 119.165 ; 124.7 ; Jn 6.61 ; 16.1 ; Rm 9.32s ; 1Co 1.23 ; 1P 2.8.'
  - type: text
    content: Heureux celui pour qui je ne serai pas une cause de chute !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 3.1,5/ / ; Ep 4.14. Autre traduction possible (de même dans la suite) pourquoi êtes-vous allés au désert ? Pour voir… ? L'image du roseau qui ploie s'oppose peut-être à l'intransigeance de Jean, cf. 14.3ss.
  - type: text
    content: 'A leur départ, Jésus se mit à dire aux foules, à propos de Jean : Qu''êtes-vous allés voir au désert ? Un roseau agité par le vent ? '
  '8':
  - type: note
    content: 'avec raffinement  : litt. de (vêtements) délicats  ; le terme peut aussi évoquer un caractère mou ou efféminé ; cf. 3.4/ /.'
  - type: text
    content: 'Alors, qu''êtes-vous allés voir ? Un homme vêtu avec raffinement ? Mais ceux qui s''habillent avec raffinement sont dans les maisons des rois ! '
  '9':
  - type: note
    content: 14.5 ; Lc 1.76.
  - type: text
    content: 'Qu''êtes-vous donc allés voir ? Un prophète ? Oui, je vous le dis, et plus qu''un prophète. '
