verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Intervention des adversaires des Judéens
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: adversaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 4+,10 ; Né 4.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Benjamin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les exilés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de l''exil'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même 6.16,19,20 ; 8.35 ; 10.7,16 ; cf. 9.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les adversaires de Juda et de Benjamin apprirent que les exilés bâtissaient un temple pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Osnappar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit probablement du roi assyrien Assourbanipal (669-626) ; cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 17.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Transeuphratène
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au-delà du fleuve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', terme officiel désignant les territoires situés à l''ouest de l''Euphrate, et en particulier la Syrie et l''ancien royaume d''Israël, dont '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Samarie
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était le chef-lieu ; de même aux v. 11,16s,20 ; 5.3,6 ; 6.6,8,13 ; 7.21,25 ; équivalent hébreu en 8.36 ; cf. Jos 24.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 10.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 5.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 19.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: etc.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot ainsi traduit pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et maintenant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: et se rattacher à la suite. De même plus loin.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: et les autres peuples que le grand et illustre Osnappar a exilés et installés dans la ville de Samarie et dans le reste de la Transeuphratène, etc. »
    - type: text
      text: ' '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'copie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 23 ; 5.6 ; 7.11.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: C'est ici la copie de la lettre qu'ils envoyèrent au roi Artaxerxès. « Nous, tes serviteurs, les gens de Transeuphratène, etc.
    - type: text
      text: ' '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Judéens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même terme araméen au v. 23 et en 5.1,5 ; 6.7s,14 ; équivalent hébreu en 2R 16.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Né 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de chez toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de chez Cyrus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais on peut en déduire que le retour des exilés se poursuivait sous Artaxerxès. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ville rebelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 15,19+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'restaurent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.3,9.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Que le roi sache que les Judéens qui sont partis de chez toi et qui sont arrivés parmi nous à Jérusalem rebâtissent la ville rebelle et méchante, en restaurent les murs et en réparent les fondations.
    - type: text
      text: ' '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 6.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: taxe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: droit de passage ; corvée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20 ; 7.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: finalement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot ainsi traduit est de sens incertain ; on l''a aussi rapproché d''un terme perse signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: magasin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''où l''autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cela portera préjudice au trésor royal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 15,22.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Que le roi sache donc que, si cette ville est rebâtie et si ses murs sont restaurés, ils ne paieront ni tribut, ni impôt, ni taxe, et que finalement cela portera préjudice au roi.
    - type: text
      text: ' '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous mangeons le sel du palais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous dépendons du palais pour notre subsistance, nous lui sommes redevables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le sel est parfois associé à la notion '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'alliance
        - type: text
          text: ' (Lv 2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Or, comme nous mangeons le sel du palais et qu'il ne nous paraît pas convenable de voir mépriser le roi, nous envoyons au roi ces informations
    - type: text
      text: ' '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mémoires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'des rois assyriens, chaldéens puis perses de Babylone ; cf. 5.12,17 ; 6.1 ; Est 2.23 ; 6.1 ; 10.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rebelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 12,19+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: détruite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en 587/6 av. J.-C. (2R 25).'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: pour qu'on fasse des recherches dans le livre des mémoires de tes pères. Tu trouveras dans le livre des mémoires et tu sauras que cette ville est une ville rebelle, qui porte préjudice aux rois et aux provinces, et qu'on s'y est livré à la révolte dès les temps anciens. Voilà pourquoi cette ville a été détruite.
    - type: text
      text: ' '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Nous faisons savoir au roi que, si cette ville est rebâtie et si ses murs sont restaurés, par cela même tu n'auras plus de possession en Transeuphratène. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Réponse du roi Artaxerxès
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette réponse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : terme d''origine perse qui peut aussi désigner un décret royal ; cf. 5.7 ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rapport
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), 11 ; 6.11 (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: 'Le roi envoya cette réponse : « A Rehoum, chancelier, à Shimshaï, secrétaire, et au reste de leurs collègues qui habitent à Samarie et dans le reste de la Transeuphratène, salut, etc.'
    - type: text
      text: ' '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La lettre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le document
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; terme hébreu correspondant au v. 7 ; même terme au v. 23 et en 5.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: distinctement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''expression araméenne pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en traduisant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en expliquant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; équivalent hébreu en Né 8.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: La lettre que vous nous avez envoyée a été lue distinctement devant moi.
    - type: text
      text: ' '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 12,15 ; 2R 18.7 ; 24.1,20.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: J'ai donné ordre de faire des recherches ; on a trouvé que dès les temps anciens cette ville s'est soulevée contre les rois, et qu'on s'y est livré à la sédition et à la révolte.
    - type: text
      text: ' '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Zorobabel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esdras
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et de Josué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous cherchons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe 6.21, synonyme 8.22s ; cf. Dt 4.29 ; Os 5.15 ; Am 5.4,6 ; 8.12 ; Ps 9.11+ ; 1Ch 22.19 ; 28.9 ; 2Ch 15.2 ; 17.4 ; 31.21 ; voir aussi 2R 17.28,32s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et nous lui offrons…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mais nous n''offrons pas de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jr 41.5 ; 2Ch 30 ; 34.9 ; 35.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Asarhaddon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (680-669 av. J.-C., cf. 2R 19.37 ; Es 37.38) a pu, comme d'autres rois d'Assyrie (2R 17.24-41 ; 2Ch 33.11), organiser des déplacements de populations dans les régions conquises ; cf. Es 7.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils s''approchèrent de Zorobabel et des chefs de famille et leur dirent : Nous bâtirons avec vous ; car, comme vous, nous cherchons votre Dieu, et nous lui offrons des sacrifices depuis le temps d''Asarhaddon, roi d''Assyrie, qui nous a fait monter ici. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1R 5.1-4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Il y eut à Jérusalem des rois puissants, qui dominaient sur toute la Transeuphratène et auxquels on payait tribut, impôt et taxe.
    - type: text
      text: ' '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 23s ; 5.5 ; 6.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les travaux de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: En conséquence, ordonnez de faire interrompre les travaux de ces gens, afin que cette ville ne soit pas rebâtie avant une autorisation de ma part.
    - type: text
      text: ' '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Gardez-vous de mettre en cela de la négligence, de peur que le mal n'augmente au préjudice des rois. »
  '23':
  - type: usfm
