document_id: EZR.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Intervention des adversaires des Judéens
  - type: text
    content: ' '
  - type: note
    content: 'adversaires  : cf. v. 4+,10 ; Né 4.5. –  Juda / Benjamin 1.5+. –  les exilés  : litt. les fils de l''exil , de même 6.16,19,20 ; 8.35 ; 10.7,16 ; cf. 9.4n.'
  - type: text
    content: 'Les adversaires de Juda et de Benjamin apprirent que les exilés bâtissaient un temple pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '10':
  - type: note
    content: 'Osnappar  : il s''agit probablement du roi assyrien Assourbanipal (669-626) ; cf. v. 2n  ; 2R 17.24. –  Transeuphratène  : litt. au-delà du fleuve, terme officiel désignant les territoires situés à l''ouest de l''Euphrate, et en particulier la Syrie et l''ancien royaume d''Israël, dont Samarie était le chef-lieu ; de même aux v. 11,16s,20 ; 5.3,6 ; 6.6,8,13 ; 7.21,25 ; équivalent hébreu en 8.36 ; cf. Jos 24.2n  ; 2S 10.16n  ; 1R 5.4n  ; 14.15n  ; 1Ch 19.16. –  etc.  : le mot ainsi traduit pourrait aussi signifier et maintenant et se rattacher à la suite. De même plus loin.'
  - type: text
    content: et les autres peuples que le grand et illustre Osnappar a exilés et installés dans la ville de Samarie et dans le reste de la Transeuphratène, etc. »
  - type: text
    content: ' '
  '11':
  - type: note
    content: Cf. v. 9s. –  copie v. 23 ; 5.6 ; 7.11.
  - type: text
    content: C'est ici la copie de la lettre qu'ils envoyèrent au roi Artaxerxès. « Nous, tes serviteurs, les gens de Transeuphratène, etc.
  - type: text
    content: ' '
  '12':
  - type: note
    content: 'les Judéens  : autre traduction les Juifs  ; même terme araméen au v. 23 et en 5.1,5 ; 6.7s,14 ; équivalent hébreu en 2R 16.6n  ; Né 1.2n. –  de chez toi  : LXX de chez Cyrus, mais on peut en déduire que le retour des exilés se poursuivait sous Artaxerxès. –  ville rebelle v. 15,19+. –  restaurent 5.3,9.'
  - type: text
    content: Que le roi sache que les Judéens qui sont partis de chez toi et qui sont arrivés parmi nous à Jérusalem rebâtissent la ville rebelle et méchante, en restaurent les murs et en réparent les fondations.
  - type: text
    content: ' '
  '13':
  - type: note
    content: 'Cf. 6.8. –  taxe  : autres traductions droit de passage ; corvée  ; cf. v. 20 ; 7.24. –  finalement  : le mot ainsi traduit est de sens incertain ; on l''a aussi rapproché d''un terme perse signifiant magasin, d''où l''autre traduction cela portera préjudice au trésor royal  ; cf. v. 15,22.'
  - type: text
    content: Que le roi sache donc que, si cette ville est rebâtie et si ses murs sont restaurés, ils ne paieront ni tribut, ni impôt, ni taxe, et que finalement cela portera préjudice au roi.
  - type: text
    content: ' '
  '14':
  - type: note
    content: nous mangeons le sel du palais, c.-à-d. nous dépendons du palais pour notre subsistance, nous lui sommes redevables  ; le sel est parfois associé à la notion d'alliance (Lv 2.13n).
  - type: text
    content: Or, comme nous mangeons le sel du palais et qu'il ne nous paraît pas convenable de voir mépriser le roi, nous envoyons au roi ces informations
  - type: text
    content: ' '
  '15':
  - type: note
    content: mémoires des rois assyriens, chaldéens puis perses de Babylone ; cf. 5.12,17 ; 6.1 ; Est 2.23 ; 6.1 ; 10.2. –  rebelle v. 12,19+. –  détruite, en 587/6 av. J.-C. (2R 25).
  - type: text
    content: pour qu'on fasse des recherches dans le livre des mémoires de tes pères. Tu trouveras dans le livre des mémoires et tu sauras que cette ville est une ville rebelle, qui porte préjudice aux rois et aux provinces, et qu'on s'y est livré à la révolte dès les temps anciens. Voilà pourquoi cette ville a été détruite.
  - type: text
    content: ' '
  '16':
  - type: text
    content: Nous faisons savoir au roi que, si cette ville est rebâtie et si ses murs sont restaurés, par cela même tu n'auras plus de possession en Transeuphratène. »
  - type: heading
    content: Réponse du roi Artaxerxès
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'cette réponse  : terme d''origine perse qui peut aussi désigner un décret royal ; cf. 5.7 ( rapport ), 11 ; 6.11 ( parole ).'
  - type: text
    content: 'Le roi envoya cette réponse : « A Rehoum, chancelier, à Shimshaï, secrétaire, et au reste de leurs collègues qui habitent à Samarie et dans le reste de la Transeuphratène, salut, etc.'
  - type: text
    content: ' '
  '18':
  - type: note
    content: 'La lettre  : autre traduction le document  ; terme hébreu correspondant au v. 7 ; même terme au v. 23 et en 5.5. –  distinctement  : l''expression araméenne pourrait signifier en traduisant ou en expliquant (cf. v. 7n) ; équivalent hébreu en Né 8.8n.'
  - type: text
    content: La lettre que vous nous avez envoyée a été lue distinctement devant moi.
  - type: text
    content: ' '
  '19':
  - type: note
    content: Cf. v. 12,15 ; 2R 18.7 ; 24.1,20.
  - type: text
    content: J'ai donné ordre de faire des recherches ; on a trouvé que dès les temps anciens cette ville s'est soulevée contre les rois, et qu'on s'y est livré à la sédition et à la révolte.
  - type: text
    content: ' '
  '2':
  - type: note
    content: 'de Zorobabel  : 3 Esdras ajoute et de Josué, cf. v. 3. –  nous cherchons  : même verbe 6.21, synonyme 8.22s ; cf. Dt 4.29 ; Os 5.15 ; Am 5.4,6 ; 8.12 ; Ps 9.11+ ; 1Ch 22.19 ; 28.9 ; 2Ch 15.2 ; 17.4 ; 31.21 ; voir aussi 2R 17.28,32s. –  et nous lui offrons…  : autre lecture traditionnelle mais nous n''offrons pas de sacrifices  ; cf. Jr 41.5 ; 2Ch 30 ; 34.9 ; 35.18. –  Asarhaddon (680-669 av. J.-C., cf. 2R 19.37 ; Es 37.38) a pu, comme d''autres rois d''Assyrie (2R 17.24-41 ; 2Ch 33.11), organiser des déplacements de populations dans les régions conquises ; cf. Es 7.8n.'
  - type: text
    content: 'Ils s''approchèrent de Zorobabel et des chefs de famille et leur dirent : Nous bâtirons avec vous ; car, comme vous, nous cherchons votre Dieu, et nous lui offrons des sacrifices depuis le temps d''Asarhaddon, roi d''Assyrie, qui nous a fait monter ici. '
  '20':
  - type: note
    content: Cf. 1R 5.1-4n.
  - type: text
    content: Il y eut à Jérusalem des rois puissants, qui dominaient sur toute la Transeuphratène et auxquels on payait tribut, impôt et taxe.
  - type: text
    content: ' '
  '21':
  - type: note
    content: 'Cf. v. 23s ; 5.5 ; 6.8. –  les travaux de  : sous-entendu dans le texte.'
  - type: text
    content: En conséquence, ordonnez de faire interrompre les travaux de ces gens, afin que cette ville ne soit pas rebâtie avant une autorisation de ma part.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Gardez-vous de mettre en cela de la négligence, de peur que le mal n'augmente au préjudice des rois. »
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 18n,21+ ; Né 1.3 ; 2.3,13.
  - type: text
    content: Aussitôt que la copie de la lettre du roi Artaxerxès eut été lue devant Rehoum, Shimshaï, le secrétaire, et leurs collègues, ils se hâtèrent d'aller à Jérusalem, auprès des Judéens, pour faire interrompre les travaux par la violence et par la force.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Si ce v. était considéré comme la suite chronologique des v. 8-23 il faudrait songer à la deuxième année de Darius II (422/1 av. J.-C.), beaucoup trop tardive ; certains réduisent la difficulté en remplaçant Alors par ainsi (changement d''une lettre en araméen) ; il faut alors comprendre : de la même manière que les travaux de reconstruction de la ville et de ses remparts (v. 12s,16,21) seront interrompus plus tard, de la même manière la reconstruction du temple ( la maison de Dieu , cf. v. 5) l''avait été auparavant. Quoi qu''il en soit, le v. 24 est selon toute vraisemblance à lire comme la suite du v. 5 (cf. v. 6n) et désigne dès lors la deuxième année de Darius Ier (521 av. J.-C.).'
  - type: text
    content: Alors fut interrompu l'ouvrage de la maison de Dieu à Jérusalem ; il fut interrompu jusqu'à la deuxième année du règne de Darius, roi de Perse.
  '3':
  - type: note
    content: Cf. 3.3n  ; Né 2.20 ; 2Ch 13.7-12 ; voir aussi Jn 4.9. –  comme nous l'a ordonné… 1.2s ; 3.7 ; 5.13ss ; 6.3ss.
  - type: text
    content: 'Mais Zorobabel, Josué et les autres chefs des familles d''Israël leur répondirent : Ce n''est pas à vous et à nous de bâtir une maison pour notre Dieu ; nous bâtirons nous seuls pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, comme nous l''a ordonné le roi Cyrus, roi de Perse. '
  '4':
  - type: note
    content: 'le peuple du pays (3.3n) : cf. 10.2,11 ; Né 10.31s. –  se mit à décourager le peuple  : litt. affaiblirent les mains du peuple, cf. Jr 38.4n  ; voir aussi Ag 1.2-9. –  l''intimider ou l''épouvanter  ; cf. Ps 2.5 ; 83.16 ; 2Ch 32.18. –  l''empêcher de  : sous-entendu dans le texte.'
  - type: text
    content: 'Alors le peuple du pays se mit à décourager le peuple de Juda et à l''intimider pour l''empêcher de bâtir ; '
  '5':
  - type: note
    content: 'ils payèrent  : autre traduction ils soudoyèrent  ; verbe très proche en Né 6.12s ; 13.2. –  faire échouer leur projet  : cf. Né 4.9 ; voir aussi Es 14.27 ; Ps 33.10. –  de Cyrus (556-530 av. J.-C., voir 1.1n) … jusqu''au règne de Darius Ier (522-486 av. J.-C.), voir v. 24n.'
  - type: text
    content: ils payèrent des conseillers contre eux, pour faire échouer leur projet, pendant tous les jours de Cyrus, roi de Perse, et jusqu'au règne de Darius, roi de Perse.
  - type: heading
    content: Les Judéens dénoncés au roi Artaxerxès
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Xerxès  : sans doute Xerxès Ier (environ 486-465 av. J.-C. ; cf. Est 1.1n) ; les v. 6-23 concernent une époque ultérieure à celle de Cyrus et de Darius (v. 5n) ; cf. v. 24n. –  accusation  : hébreu sitna , dérivé du mot qui a donné le nom Satan (l''accusateur, l''adversaire) ; cf. Gn 26.21n.'
  - type: text
    content: 'Et sous le règne de Xerxès, au commencement de son règne, ils écrivirent une lettre d''accusation contre les habitants de Juda et de Jérusalem. '
  '7':
  - type: note
    content: 'Artaxerxès Ier, successeur de Xerxès (≈ 465-424 av. J.-C.). –  Bishlam  : certains modifient ce nom propre pour lire à Jérusalem ou au sujet de Jérusalem  ; d''autres comprennent  : avec la bonté de Mitredath (cf. 1.8n). –  Tabéel  : nom araméen signifiant El (ou Dieu, cf. Gn 21.33n) est bon  ; cf. Es 7.6n. –  le reste de leurs collègues v. 9,17,23 ; 5.3,6 ; 6.6,13. –  texte  : le terme correspondant est traduit par écrit en 2Ch 35.4n. –  lettre  : même terme au v. 23 ; 5.5. –  écrit en araméen…  : on pourrait aussi comprendre écrit en araméen et traduit (en hébreu ou en perse, cf. v. 18n)  ; voici le texte araméen  ; à partir du v. 8 le texte est en araméen, jusqu''à 6.18 (cf. Dn 2.4n).'
  - type: text
    content: Et aux jours d'Artaxerxès, Bishlam, Mitredath, Tabéel et le reste de leurs collègues écrivirent à Artaxerxès, roi de Perse. Le texte de la lettre fut écrit en araméen, traduit en araméen.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'chancelier  : litt. maître du jugement ou du commandement (également v. 9,17) ; cf. 2.63n  ; 8.36+. –  secrétaire  : voir scribe.'
  - type: text
    content: 'Rehoum, chancelier, et Shimshaï, secrétaire, écrivirent au roi Artaxerxès la lettre suivante concernant Jérusalem, savoir :'
  - type: text
    content: ' '
  '9':
  - type: note
    content: 'ceux de Dîn  : on pourrait aussi comprendre, avec de légères modifications du texte araméen traditionnel  : les juges, les légats, les consuls, les fonctionnaires perses, les gens d''Erek (Gn 10.10n), de Babylone, de Suse, c''est-à-dire les Elamites (Gn 10.22n).'
  - type: text
    content: « Rehoum, chancelier, Shimshaï, secrétaire, et le reste de leurs collègues, ceux de Dîn, d'Apharsatak, de Tarpel, d'Apharas, d'Erek, de Babylone, de Suse, de Déha, d'Elam,
  - type: text
    content: ' '
