    marker-yv: yv-n
  - type: text
    text: 'Lorsque celui-ci était encore à toi, ne pouvais-tu pas le garder ? Et même quand il a été vendu, son prix ne restait-il pas sous ton autorité ? Comment as-tu pu envisager pareille action ? Ce n''est pas à des humains que tu as menti, mais à Dieu ! '
