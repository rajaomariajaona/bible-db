  - type: text
    text: 'Alors Pierre lui dit : Comment avez-vous pu vous accorder pour provoquer l''Esprit du Seigneur ? Sache-le : ceux qui ont enseveli ton mari sont à la porte ; ils t''emporteront aussi ! '
