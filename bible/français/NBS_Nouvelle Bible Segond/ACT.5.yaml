document_id: ACT.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ananias et Saphira
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Règle de la Communauté (Qumrân, où l''on pratiquait la communauté des biens) 6.24s : « S''il se trouve parmi eux un homme qui mente en matière de biens, et qui le fasse sciemment, on le séparera du milieu de la Purification des Nombreux… »'
  - type: text
    content: 'Or un nommé Ananias, avec Saphira, sa femme, vendit aussi une propriété ; '
  '10':
  - type: text
    content: 'A l''instant même, elle tomba à ses pieds et expira. Les jeunes gens, à leur entrée, la trouvèrent morte ; ils l''emportèrent et l''ensevelirent auprès de son mari. '
  '11':
  - type: note
    content: 'l''Eglise  : transcription du grec ekklèsia, assemblée ou communauté  : cf. 2.47n  ; 7.38n  ; 9.31 ; 11.26 ; 13.1 ; 18.22 ; 20.28 ; cf. 19.32n. –  qui apprirent  : litt. qui entendirent, cf. v. 5n.'
  - type: text
    content: Une grande crainte saisit toute l'Eglise et tous ceux qui apprirent cela.
  - type: heading
    content: De nombreux miracles
  '12':
  - type: text
    content: ' '
  - type: note
    content: 2.42+ss. –  signes / prodiges 2.19+ ; cf. 4.30. – Voir apôtres . –  d'un commun accord 1.14+. –  portique de Salomon 3.11n  ; cf. 2.46+.
  - type: text
    content: 'Beaucoup de signes et de prodiges se produisaient dans le peuple par les mains des apôtres. Ils se tenaient tous, d''un commun accord, au portique de Salomon. '
  '13':
  - type: note
    content: 'Parmi les autres  : cf. Lc 8.10 ; certains modifient le texte grec pour lire parmi les chefs, parmi les lévites, ou parmi les anciens. –  se joindre à eux  : cf. v. 14 ; certains modifient le texte grec pour lire s''opposer à eux ou leur faire obstacle. –  magnifiait  : 10.46 ; 19.17 ; Lc 1.46 ; Ph 1.20.'
  - type: text
    content: 'Parmi les autres, personne n''osait se joindre à eux ; mais le peuple les magnifiait. '
  '14':
  - type: note
    content: 'Autre traduction  : de plus en plus de croyants se joignaient (ou étaient ajoutés, comme en 2.41+) au Seigneur  ; cf. 9.5 ; 11.24 ; 18.8+.'
  - type: text
    content: 'De plus en plus de gens croyaient au Seigneur, une multitude d''hommes et de femmes. '
  '15':
  - type: note
    content: Cf. 19.11s ; Mc 6.56. –  grabats 9.33 ; Mc 2.4n. – Le texte occidental ajoute et qu'ils soient délivrés de toutes leurs maladies ou car chacun d'eux était guéri de toutes ses maladies.
  - type: text
    content: 'On apportait les malades dans les grandes rues et on les plaçait sur des litières et des grabats, pour qu''à la venue de Pierre son ombre au moins puisse couvrir l''un ou l''autre. '
  '16':
  - type: note
    content: 'de Jérusalem ou, d''après certains mss, à Jérusalem. –  perturbés  : cf. Lc 6.18n. –  esprits impurs 8.7 ; cf. Mc 1.23n  ; 6.7+/ / ; 16.17 ; voir pur, impur. –  tous étaient guéris Lc 6.17-19.'
  - type: text
    content: La multitude accourait aussi des villes voisines de Jérusalem, portant des malades et des gens perturbés par des esprits impurs ; et tous étaient guéris.
  - type: heading
    content: Les apôtres sont arrêtés puis relâchés
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.1-22 ; 12.4-10. –  d''une passion jalouse ou de jalousie  ; cf. 7.9 ; 13.45 ; 17.5 ; Rm 10.2n. –  grand prêtre 4.6. –  parti  : le terme grec, qui pouvait s''appliquer sans connotation péjorative à n''importe quelle école religieuse, philosophique ou politique, a pris par la suite le sens de secte et a donné notre mot hérésie (cf. 15.5 ; 24.5+ ; 26.5 ; 1Co 11.19 ; Ga 5.20 ; 2P 2.1). –  sadducéens 4.1+,2+. –  intervinrent  : litt. (le grand prêtre) se leva…  ; cf. v. 6,34,36s etc.'
  - type: text
    content: 'Alors, remplis d''une passion jalouse, le grand prêtre et tous ceux qui étaient avec lui, c''est-à-dire le parti des sadducéens, intervinrent ; '
  '18':
  - type: note
    content: 'mirent la main 4.3n. – Voir apôtres. –  les jetèrent dans la prison publique  : on pourrait aussi comprendre les jetèrent publiquement en prison  ; cf. 16.37. – A la fin du v. le texte occidental ajoute et chacun s''en alla chez lui ou à ses propres affaires (cf. Jn 7.53).'
  - type: text
    content: 'ils mirent la main sur les apôtres et les jetèrent dans la prison publique. '
  '19':
  - type: note
    content: 'Cf. 16.26s. –  l''ange du Seigneur  : autre traduction un ange du Seigneur  ; cf. 8.26 ; 12.7ss,23 ; 23.8 ; voir aussi 10.3,7,22 ; 11.13 ; Mt 1.20n.'
  - type: text
    content: 'Mais pendant la nuit l''ange du Seigneur ouvrit les portes de la prison ; il les fit sortir et leur dit : '
  '2':
  - type: note
    content: 'détourna  : même verbe en Tt 2.10 ; Jos 7.1ss (LXX, même verbe pour prendre une part) ; 2 Maccabées 4.32 : « Ménélas déroba (ou : détourna) quelques objets d''or du sanctuaire. » –  aux pieds… 4.35+. – Voir apôtres.'
  - type: text
    content: 'avec le consentement de sa femme, il détourna une partie du prix, puis il apporta le reste et le déposa aux pieds des apôtres. '
  '20':
  - type: note
    content: 'tenez-vous  : autre traduction tenez-vous debout  ; de même v. 25. –  les paroles de cette vie  : cf. 3.15 ; 11.18 ; 13.26n,46-48 ; Jn 6.68 ; Ph 2.16.'
  - type: text
    content: 'Allez, tenez-vous dans le temple, et dites au peuple toutes les paroles de cette vie. '
  '21':
  - type: note
    content: 'enseigner 2.42+. –  le sanhédrin…  : on pourrait aussi comprendre le sanhédrin, c''est-à-dire l''assemblée des anciens…  : cf. 4.1 ; cf. Ex 12.21. –  Israélites Lc 1.16n.'
  - type: text
    content: Ayant entendu cela, ils se rendirent au temple dès le matin et se mirent à enseigner.
  - type: text
    content: 'Le grand prêtre et ceux qui étaient avec lui arrivèrent ; ils convoquèrent le sanhédrin et toute l''assemblée des anciens des Israélites et envoyèrent chercher les apôtres à la prison. '
  '22':
  - type: text
    content: 'Les gardes, à leur arrivée, ne les trouvèrent pas dans la prison. Ils s''en retournèrent et firent leur rapport en disant : '
  '23':
  - type: text
    content: 'Nous avons trouvé la prison soigneusement fermée, et les gardiens à leur poste devant les portes ; mais quand nous avons ouvert, nous n''avons trouvé personne à l''intérieur. '
  '24':
  - type: note
    content: 4.1+. –  grands prêtres Mt 2.4n. –  perplexes 2.12 ; 10.17 ; Lc 9.7.
  - type: text
    content: 'Lorsqu''ils eurent entendu cela, le commandant du temple et les grands prêtres, perplexes à leur sujet, se demandaient ce qu''il adviendrait de cette affaire. '
  '25':
  - type: note
    content: V. 21+.
  - type: text
    content: 'Quelqu''un vint leur annoncer : Les hommes que vous avez jetés en prison se tiennent dans le temple, et ils instruisent le peuple ! '
  '26':
  - type: note
    content: Cf. 16.39 ; Mt 21.26+.
  - type: text
    content: Alors le commandant et les gardes allèrent les chercher ; ils les amenèrent sans violence, car ils avaient peur d'être lapidés par le peuple.
  '27':
  - type: text
    content: 'Quand ils les eurent amenés, ils les firent comparaître devant le sanhédrin. Le grand prêtre les interrogea : '
  '28':
  - type: note
    content: 'Ne vous avions-nous pas donné…  : certains mss portent nous vous avions donné… –  en ce nom-là ou ce nom-là, v. 40 ; 4.17n,18n. –  faire retomber sur nous…  : cf. 18.6 ; Jg 9.24 ; Mt 27.25+. – Voir sang.'
  - type: text
    content: Ne vous avions-nous pas donné l'injonction formelle de ne plus enseigner en ce nom-là ? dit-il. Vous avez rempli Jérusalem de votre enseignement ! Vous êtes décidés à faire retomber sur nous le sang de cet homme !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : Pierre répondit : A qui faut-il obéir, à Dieu ou à des humains ? Il dit : A Dieu. Et Pierre lui dit : (30) Le Dieu de nos pères…  ; 4.19 ; cf. Platon, Apologie de Socrate , 29d : « J''obéirai à Dieu plutôt qu''à vous. »'
  - type: text
    content: 'Pierre répondit, ainsi que les apôtres : Il faut obéir à Dieu plutôt qu''à des humains. '
  '3':
  - type: note
    content: 'le Satan / cœur Lc 22.3 ; Jn 13.2 ; voir aussi Lc 8.12 ; voir démon. –  que tu mentes à l''Esprit saint  : cf. v. 9 ; voir aussi Lc 12.10. –  en détournant…  : autre traduction possible et que tu détournes…'
  - type: text
    content: 'Pierre lui dit : Ananias, pourquoi le Satan a-t-il rempli ton cœur, que tu mentes à l''Esprit saint en détournant une partie du prix du champ ? '
  '30':
  - type: note
    content: 'Le Dieu de nos pères Ex 3.15. –  réveillé ou relevé 3.15n (voir résurrection). –  éliminé…  : même verbe 26.21 ; cf. 2.23+. –  au bois 10.39 ; 13.29 ; Ga 3.13+.'
  - type: text
    content: 'Le Dieu de nos pères a réveillé Jésus, que vous, vous avez éliminé en le pendant au bois. '
  '31':
  - type: note
    content: 'par sa droite 2.33n. –  pionnier (ou prince, 3.15n) et sauveur  : cf. 4.12+ ; Hé 2.10. –  pour donner (11.18+) … un changement radical (ou la repentance, la conversion) … 2.38+ ; 3.19 ; 10.36 ; Lc 24.47. –  pardon des péchés 2.38+.'
  - type: text
    content: 'Dieu l''a élevé par sa droite comme pionnier et sauveur, pour donner à Israël un changement radical et le pardon des péchés. '
  '32':
  - type: note
    content: 'témoins 1.8+,22. –  l''Esprit saint 15.28 ; cf. Jn 15.26. –  que Dieu a donné Jn 7.39n. –  à ceux qui lui obéissent  : cf. Rm 1.4s.'
  - type: text
    content: Nous, nous sommes témoins de tout cela, avec l'Esprit saint que Dieu a donné à ceux qui lui obéissent.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Exaspérés 7.54.
  - type: text
    content: 'Exaspérés, ceux qui les écoutaient étaient décidés à les supprimer. '
  '34':
  - type: note
    content: un pharisien 23.6-10. –  Gamaliel 22.3 ; le Talmud distingue Gamaliel l'Ancien, petit-fils de Hillel, principale référence de l'école pharisienne, et son petit-fils Gamaliel II, autre maître juif du Ier s. apr. J.-C. ; c'est au premier des deux que se réfèrent les Actes. –  maître ou enseignant  ; cf. 13.1n. – Voir loi. –  faire sortir 4.15.
  - type: text
    content: 'Mais un pharisien nommé Gamaliel, maître de la loi estimé de tout le peuple, se leva dans le sanhédrin et donna l''ordre de faire sortir ces gens un instant. '
  '35':
  - type: note
    content: 'il dit  : litt. il leur dit. –  Hommes d''Israël 2.22n.'
  - type: text
    content: 'Puis il dit : Hommes d''Israël, prenez garde à ce que vous allez faire à l''égard de ces gens-là. '
  '36':
  - type: note
    content: 'Theudas et Judas le Galiléen (v. 37), nationalistes juifs également mentionnés (mais datés différemment) par Flavius Josèphe. –  se disait quelqu''un 8.9 ; Ga 2.6n. –  quatre cents hommes  : cf. 21.38.'
  - type: text
    content: 'Avant ces jours-ci, en effet, s''est levé Theudas, qui se disait quelqu''un, et auquel se sont ralliés environ quatre cents hommes ; il a été supprimé, et tous ceux qui s''étaient laissé persuader par lui ont été mis en déroute ; il n''en est rien resté. '
  '37':
  - type: note
    content: 'Selon Josèphe, l''insurrection menée par Judas le Galiléen en 6 apr. J.-C. (cf. Lc 13.1s), à l''occasion d''un recensement décrété par Rome (cf. Lc 2.2), avait donné le jour au mouvement sicaire (voir Ac 21.38n) ; voir aussi zélote. –  entraîné  : le verbe correspondant se retrouve au v. 38, dans un autre sens ; dans d''autres contextes il signifie éloigner ou s''éloigner (12.10 ; 15.38, quitter  ; 19.9 ; 22.29 ; Lc 8.13n). Un terme apparenté a donné notre mot apostasie. –  du monde  : litt. du peuple. –  à sa suite  : litt. derrière lui  ; même préposition en 20.30 (autre verbe) ; Lc 21.8n.'
  - type: text
    content: 'Après lui s''est levé Judas le Galiléen, à l''époque du recensement, et il a entraîné du monde à sa suite : lui aussi a disparu, et tous ceux qui s''étaient laissé persuader par lui ont été dispersés. '
  '38':
  - type: note
    content: 'ne vous occupez plus  : litt. éloignez-vous (cf. v. 37n). –  laissez-les aller  : le texte occidental ajoute sans vous salir (ou vous souiller) les mains. –  S''il s''agit…  : litt. si cette décision ou cette œuvre est des humains.'
  - type: text
    content: 'Maintenant, je vous le dis, ne vous occupez plus de ces gens, et laissez-les aller. S''il s''agit d''une décision ou d''une œuvre humaine, elle disparaîtra ; '
  '39':
  - type: note
    content: 'si cela vient de Dieu  : cf. 23.9 ; Lc 20.4. –  les faire disparaître ou, selon certains mss, la faire disparaître, la détruire (la décision ou l''œuvre). Le texte occidental ajoute ni vous, ni les rois, ni les tyrans. Tenez-vous donc éloignés de ces hommes  ; cf. Sagesse 12.14 : « Il n''y a non plus ni roi ni souverain qui puisse te braver pour défendre ceux que tu as châtiés. » –  vous trouver (litt. être trouvés) en guerre contre Dieu  : cf. 2 Maccabées 7.19 : « Ne t''imagine pas que tu resteras impuni, toi (Antiochos) qui as entrepris de faire la guerre à Dieu. » –  Ils se laissèrent persuader par lui ou ils se rangèrent à son avis  ; même formule v. 36s ; cf. 13.43+.'
  - type: text
    content: 'mais si cela vient de Dieu, vous ne pourrez pas les faire disparaître. Prenez garde de ne pas vous trouver en guerre contre Dieu ! Ils se laissèrent persuader par lui. '
  '4':
  - type: note
    content: 'Cf. Dt 23.22-24. –  Lorsque celui-ci…  : litt. demeurant ne demeurait-il pas à toi, et vendu n''était-il pas en ton pouvoir ?'
  - type: text
    content: 'Lorsque celui-ci était encore à toi, ne pouvais-tu pas le garder ? Et même quand il a été vendu, son prix ne restait-il pas sous ton autorité ? Comment as-tu pu envisager pareille action ? Ce n''est pas à des humains que tu as menti, mais à Dieu ! '
  '40':
  - type: note
    content: 'Ils appelèrent… 4.18. –  les firent battre  : cf. 22.19 ; Mc 13.9 ; 2Co 11.24. –  au nom de Jésus ou du nom de Jésus, v. 17n,18n. –  les relâchèrent 4.21.'
  - type: text
    content: Ils appelèrent les apôtres, les firent battre, leur enjoignirent de ne plus parler au nom de Jésus et les relâchèrent.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'tout joyeux Lc 1.14+ ; 6.22s/ / ; 15.5 ; 19.6 ; cf. 1P 4.13. –  dignes 2Th 1.5+. –  pour le Nom (cf. 3.16+) : dans le judaïsme, cette expression désigne Dieu sans le nommer expressément ; voir aussi 9.16 ; 15.26 ; 21.13 ; 3Jn 7.'
  - type: text
    content: 'Ceux-ci se retirèrent de devant le sanhédrin, tout joyeux d''avoir été jugés dignes d''être déshonorés pour le Nom. '
  '42':
  - type: note
    content: 'V. 21+. –  au temple et dans les maisons 2.46 ; cf. 13.5+. –  annoncer la bonne nouvelle 15.35 ; Lc 20.1. –  du Christ, Jésus  : autres traductions de Jésus-Christ, que Jésus est le Christ ou que le Christ, c''est Jésus 2.36+ ; cf. 8.35+ ; voir onction.'
  - type: text
    content: Et chaque jour, au temple et dans les maisons, ils ne cessaient d'enseigner et d'annoncer la bonne nouvelle du Christ, Jésus.
  '5':
  - type: note
    content: 'V. 10 ; cf. 12.23 ; 13.11 ; 1R 14.1-18. –  crainte v. 11 ; 2.43+. –  tous ceux qui l''apprirent  : litt. tous ceux qui entendirent  ; autre traduction  : tous les auditeurs  ; même possibilité au v. 11.'
  - type: text
    content: 'Quand Ananias entendit cela, il tomba et expira. Une grande crainte saisit tous ceux qui l''apprirent. '
  '6':
  - type: note
    content: Cf. 8.2 ; Lv 10.4s.
  - type: text
    content: Les jeunes gens se levèrent, l'enveloppèrent, l'emportèrent et l'ensevelirent.
  '7':
  - type: text
    content: 'Environ trois heures plus tard, sa femme entra, sans savoir ce qui était arrivé. '
  '8':
  - type: text
    content: 'Pierre lui demanda : Dis-moi, est-ce bien à tel prix que vous avez vendu le champ ? Oui, répondit-elle, c''est bien à ce prix-là. '
  '9':
  - type: note
    content: 'provoquer (litt. éprouver ou tenter, de même 15.10) l''Esprit 5.3s ; cf. Es 63.10 ; 1Co 10.9 ; voir aussi Mt 4.1n. –  ceux qui…  : litt. les pieds de ceux qui…'
  - type: text
    content: 'Alors Pierre lui dit : Comment avez-vous pu vous accorder pour provoquer l''Esprit du Seigneur ? Sache-le : ceux qui ont enseveli ton mari sont à la porte ; ils t''emporteront aussi ! '
