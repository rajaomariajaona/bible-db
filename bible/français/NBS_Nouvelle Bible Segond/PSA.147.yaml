document_id: PSA.147,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pouvoir de Dieu dans l'histoire et dans la nature
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX et Vg, ce psaume en constitue deux, numérotés 146 (= v. 1-11) et 147 (v. 12-20) ; cf. 9.1n  ; voir aussi 146.1n. –  Louez le Seigneur v. 20 ; 104.35n. –  il est bon… 92.2. –  chanter  : le verbe hébreu correspondant est rendu par jouer au v. 7 ; voir 7.18n. –  il est doux et beau…  : autre traduction il est doux de lui offrir une belle louange  ; cf. 135.3n.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: Car il est bon de chanter notre Dieu,
  - type: text
    content: il est doux et beau de le louer.
  '10':
  - type: text
    content: ' '
  - type: note
    content: '33.16s ; cf. 18.30,34 ; 20.8s ; Es 40.30s ; Am 2.14ss. –  la robustesse  : litt. les cuisses.'
  - type: text
    content: Ce n'est pas dans la vigueur du cheval qu'il se complaît,
  - type: text
    content: ce n'est pas la robustesse de l'homme qu'il agrée ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 33.18. –  agrée ou est favorable à , de même au v. 10 ; cf. 149.4. –  qui le craignent 15.4+.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agrée ceux qui le craignent,'
  - type: text
    content: ceux qui attendent sa fidélité.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1n.
  - type: text
    content: 'Jérusalem, fais l''éloge du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Sion, loue ton Dieu !
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 2. – Voir bénédiction.
  - type: text
    content: Car il renforce les verrous de tes portes,
  - type: text
    content: il bénit tes fils en ton sein ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: il instaure la paix ou la prospérité  ; Es 60.17ss. –  du meilleur froment 81.17n.
  - type: text
    content: il instaure la paix dans ton territoire,
  - type: text
    content: il te rassasie du meilleur froment.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ordres  : le terme hébreu est synonyme de parole (voir 119.11n) ; cf. v. 18s ; 33.4-9 ; 107.20 ; Gn 1.3+ ; Es 9.7 ; 55.10s ; Jn 1.1+ ; Ac 13.26 ; 2Th 3.1.'
  - type: text
    content: 'Il envoie ses ordres sur la terre :'
  - type: text
    content: sa parole court avec rapidité.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Jb 38.22. –  neige / laine Es 1.18 ; Dn 7.9.
  - type: text
    content: Il donne la neige comme de la laine,
  - type: text
    content: il répand le givre comme de la cendre ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: '148.8 ; Jb 38.30. –  qui peut tenir (même expression en 130.3 ; cf. Pr 27.4) …  : certains modifient légèrement le texte pour traduire devant son froid les eaux s''arrêtent (c.-à-d. gèlent).'
  - type: text
    content: il lance sa glace par morceaux ;
  - type: text
    content: qui peut tenir devant son froid ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 6.16 ; 37.10. –  sa parole  : cf. v. 15n. –  le vent  : litt. son vent (ou son souffle, son esprit ).'
  - type: text
    content: Il envoie sa parole et les fait fondre ;
  - type: text
    content: il souffle le vent, et les eaux coulent.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ses paroles  : autre lecture traditionnelle sa parole  ; cf. 78.5 ; Ac 10.36 ; Rm 3.1s. –  prescriptions  : voir loi.'
  - type: text
    content: Il révèle ses paroles à Jacob,
  - type: text
    content: ses prescriptions et ses règles à Israël ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: rebâtit Jérusalem v. 13 ; 51.20 ; 102.17 ; cf. Es 44.28 ; Am 9.11 ; Né 3–4. –  rassemble les bannis Es 11.12 ; 56.8 ; 60.1ss.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rebâtit Jérusalem,'
  - type: text
    content: il rassemble les bannis d'Israël ;
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'elles ne connaissent pas  : versions anciennes il ne leur a pas fait connaître  ; cf. Dt 4.7s ; Ac 14.16. –  Louez le Seigneur 104.35n.'
  - type: text
    content: il n'a pas agi de même pour toutes les nations ;
  - type: text
    content: elles ne connaissent pas ses règles.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: guérit 6.3 ; 30.3 ; 41.5 ; Dt 32.39 ; Es 19.22 ; 57.18s ; Jr 30.17 ; 33.6 ; Os 6.1 ; 11.3 ; Jb 5.18. –  cœur brisé 51.19 ; Es 61.1.
  - type: text
    content: il guérit ceux qui ont le cœur brisé
  - type: text
    content: et panse leurs blessures.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Es 40.26+ ; cf. Ep 3.15. – Voir nom.
  - type: text
    content: Il compte le nombre des étoiles,
  - type: text
    content: il les appelle toutes par leur nom.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'n''a pas de limite  : litt. n''a pas de compte , c.-à-d. est insondable  ; cf. 145.3+ ; Es 40.28.'
  - type: text
    content: Notre Seigneur est grand, d'une force immense,
  - type: text
    content: son intelligence n'a pas de limite.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '113.7s ; 146.7ss ; 1S 2.7 ; Es 40.29 ; Lc 1.52. –  méchants  : voir justice.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soutient les pauvres,'
  - type: text
    content: il abaisse les méchants jusqu'à terre.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Entonnez un chœur  : cf. 119.172n  ; Esd 3.11. –  jouez (v. 1+) de la lyre 33.2 ; 43.4 ; 92.4.'
  - type: text
    content: 'Entonnez un chœur pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec reconnaissance,'
  - type: text
    content: jouez de la lyre pour notre Dieu !
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 135.7 ; Jb 5.10 ; Ac 14.17. – LXX ajoute à la fin du v. et les plantes pour le service (ou le travail ) des humains , comme en 104.14.
  - type: text
    content: Il couvre le ciel de nuages,
  - type: text
    content: il prépare la pluie pour la terre ;
  - type: text
    content: il fait pousser l'herbe dans les montagnes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 104.21,27s ; 145.15s ; Jb 38.41 ; Lc 12.24.
  - type: text
    content: Il donne leur nourriture aux bêtes,
  - type: text
    content: aux petits du corbeau quand ils crient.
