document_id: GEN.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob quitte Sichem pour Beth-El
  - type: text
    content: ' '
  - type: note
    content: 'Monte  : litt. lève-toi, monte  ; de même au v. 3. – La deuxième occurrence du mot Dieu traduit l''hébreu ’El , de même au v. 3 ; cf. v. 7n  ; 21.33n  ; 31.13 ; 33.20n  ; voir aussi noms divins. –  qui t''est apparu…  : cf. 27.41-45 ; 28.10-22.'
  - type: text
    content: 'Dieu dit à Jacob : Monte à Beth-El et installe-toi là ; là tu feras un autel au Dieu qui t''est apparu alors que tu t''enfuyais pour échapper à Esaü, ton frère. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 32.28s.
  - type: text
    content: 'Dieu lui dit : Ton nom est Jacob, mais on ne t''appellera plus du nom de Jacob. Ton nom sera Israël. – Ainsi il l''appela du nom d''Israël. '
  '11':
  - type: note
    content: 'le Dieu-Puissant  : hébreu ’El-Shaddaï 17.1n,5s ; 28.3. –  fécond 1.22+. –  une assemblée de nations 28.3n.'
  - type: text
    content: 'Dieu lui dit : Je suis le Dieu-Puissant. Sois fécond et multiplie-toi ; une nation et une assemblée de nations seront issues de toi, et des rois sortiront de tes reins. '
  '12':
  - type: note
    content: 12.7+ ; 26.3.
  - type: text
    content: Le pays que j'ai donné à Abraham et à Isaac, je te le donnerai, et à ta descendance après toi je donnerai ce pays.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 17.22.
  - type: text
    content: 'Dieu s''éleva au-dessus de lui au lieu où il avait parlé avec lui. '
  '14':
  - type: note
    content: '28.18. –  une libation  : offrande consistant à répandre un liquide (généralement du vin, Ex 29.40s ; Lv 23.13 ; Nb 15.4n  ; Dt 32.38 ; voir cependant 2S 23.16 ; Os 9.4 ; Ps 16.4) en l''honneur de la divinité ; voir aussi sacrifices.'
  - type: text
    content: 'Jacob installa au lieu où il avait parlé avec lui une pierre levée – une pierre levée, une pierre sur laquelle il répandit une libation et versa de l''huile. '
  '15':
  - type: note
    content: 28.19 ; cf. Os 12.5.
  - type: text
    content: Jacob appela du nom de Beth-El le lieu où Dieu lui avait parlé.
  - type: heading
    content: Naissance de Benjamin et mort de Rachel
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Ephrata  : ce nom est associé à Beth-Léhem (v. 19 ; 48.7), à une douzaine de kilomètres au sud-sud-ouest de Jérusalem ; cf. Mi 5.1 ; Ps 132.6 ; Rt 1.1s ; 1Ch 2.24,50 ; 4.4 ; c''était peut-être à l''origine une variante d''Ephraïm, nom d''une région et peut-être d''une ville au nord de Jérusalem (1S 10.2 ; Jr 31.15ss).'
  - type: text
    content: 'Ils partirent de Beth-El. A quelque distance d''Ephrata, Rachel accoucha. Elle eut un accouchement pénible. '
  '17':
  - type: note
    content: encore un fils 30.24.
  - type: text
    content: 'Pendant les douleurs de l''accouchement, la sage-femme lui dit : N''aie pas peur, tu as encore un fils ! '
  '18':
  - type: note
    content: Ben-Oni signifie Fils de mon mal ou fils de mon humiliation. Cf. 1S 4.20s ; 1Ch 4.9 ; 7.23. –  Benjamin (hébreu Binyamîn) signifie Fils de la (main) droite, la droite pouvant être le côté favorable ou la direction du sud. La tribu de Benjamin occupait la région située au sud d'Ephraïm (cf. v. 16n  ; voir aussi Jg 3.15+).
  - type: text
    content: 'Comme elle allait rendre l''âme, car elle était mourante, elle l''appela du nom de Ben-Oni (« Fils de mon mal ») ; mais son père l''appela Benjamin (« Fils de la main droite »). '
  '19':
  - type: note
    content: Ephrata / Beth-Léhem (orthographe traditionnelle Bethléem, d'après le grec) v. 16n  ; cf. Rt 1.2 ; Mi 5.1.
  - type: text
    content: 'Rachel mourut et fut ensevelie sur le chemin d''Ephrata, c''est-à-dire Beth-Léhem. '
  '2':
  - type: note
    content: Certains actes religieux demandent une purification rituelle préalable ; cf. Ex 19.10-14. –  dieux étrangers 31.19 ; Ex 20.3 ; Jos 24.2,15,23. –  vêtements Nb 31.24.
  - type: text
    content: 'Jacob dit à sa maison et à tous ceux qui étaient avec lui : Supprimez les dieux étrangers qui sont au milieu de vous, purifiez-vous et changez de vêtements. '
  '20':
  - type: note
    content: Cf. Jr 31.15. –  tombe et tombeau traduisent un même mot hébreu.
  - type: text
    content: 'Jacob installa une pierre levée sur sa tombe : c''est la pierre levée du tombeau de Rachel, jusqu''à aujourd''hui.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cette portion de texte fait partie du v. 16 dans LXX. –  Israël , c.-à-d. Jacob v. 10 ; 32.29. –  Migdal-Eder signifie tour du Troupeau . Ce nom désigne ailleurs Jérusalem ou un de ses quartiers (Mi 4.8n).
  - type: text
    content: 'Israël partit et dressa sa tente au-delà de Migdal-Eder. '
  '22':
  - type: note
    content: Ruben… 49.4 ; Lv 18.8. –  fils de Jacob 29.31–30.24 ; 35.18. –  douze 17.20n.
  - type: text
    content: Pendant qu'Israël demeurait dans ce pays, Ruben alla coucher avec Bilha, concubine de son père, et Israël l'apprit.
  - type: heading
    content: 1Ch 2.1-2
  - type: text
    content: 'Les fils de Jacob étaient douze : '
  '23':
  - type: text
    content: 'Fils de Léa : le premier-né de Jacob, Ruben ; puis Siméon, Lévi, Juda, Issacar et Zabulon. '
  '24':
  - type: text
    content: 'Fils de Rachel : Joseph et Benjamin. '
  '25':
  - type: text
    content: 'Fils de Bilha, servante de Rachel : Dan et Nephtali. '
  '26':
  - type: text
    content: 'Fils de Zilpa, servante de Léa : Gad et Aser. Ce sont là les fils de Jacob, ceux qui naquirent de lui à Paddân-Aram.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Mamré 13.18n. –  Qiriath-Arba  : cf. 23.2. –  séjourné en immigrés  : cf. Ex 12.48n.'
  - type: text
    content: 'Jacob arriva auprès d''Isaac, son père, à Mamré, à Qiriath-Arba, c''est-à-dire Hébron, où Abraham et Isaac avaient séjourné en immigrés. '
  '28':
  - type: text
    content: 'Les jours d''Isaac furent de cent quatre-vingts ans ; '
  '29':
  - type: note
    content: réuni aux siens… 25.8n.
  - type: text
    content: puis il expira. Il mourut et fut réuni aux siens, âgé et rassasié de jours. Esaü et Jacob, ses fils, l'ensevelirent.
  '3':
  - type: note
    content: Cf. 28.20 ; 31.3,42 ; 48.15. –  monterons v. 1n. –  Dieu v. 1n.
  - type: text
    content: 'Nous monterons à Beth-El ; là je ferai un autel au Dieu qui m''a répondu au jour de ma détresse et qui a été avec moi sur le chemin que j''ai parcouru. '
  '4':
  - type: note
    content: 'dieux étrangers v. 2. –  les anneaux… oreilles  : cf. Jg 8.26. –  térébinthe (cf. v. 8n) / Sichem (33.18) 12.6n  ; Jos 24.26 ; Jg 9.6.'
  - type: text
    content: 'Ils donnèrent à Jacob tous les dieux étrangers qui étaient dans leurs mains, ainsi que les anneaux qui étaient à leurs oreilles. Jacob les enfouit sous le térébinthe qui est près de Sichem. '
  '5':
  - type: note
    content: 'terreur  : cf. 31.42,53n (autre mot hébreu) ; voir aussi 12.17 ; 20.7s ; 31.7,24 ; Ex 23.27 ; Jos 2.9 ; 1S 14.15 ; Ps 105.14 ; voir crainte.'
  - type: text
    content: Ensuite ils partirent. La terreur de Dieu se répandit sur les villes environnantes, et on ne poursuivit pas les fils de Jacob.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Louz 28.19.
  - type: text
    content: 'Jacob arriva, lui et tous ceux qui étaient avec lui, à Louz, c''est-à-dire Beth-El, en Canaan. '
  '7':
  - type: note
    content: 'El-Beth-El, c.-à-d. Dieu (ou El, 21.33n) de Beth-El, 35.1n. –  Dieu s''était révélé  : le verbe hébreu est ici au pluriel (cf. 1.1n) ; on pourrait traduire les dieux s''étaient révélés.'
  - type: text
    content: 'Là, il bâtit un autel, et il appela le lieu El-Beth-El (« Dieu de Beth-El ») ; car c''est là que Dieu s''était révélé à lui alors qu''il s''enfuyait pour échapper à son frère. '
  '8':
  - type: note
    content: 'La nourrice de Rébecca n''était pas nommée en 24.59. Le nom Débora reviendra dans le livre des Juges (4.4). –  au-dessous de Beth-El est bâtie sur une colline. –  on a appelé  : litt. il a appelé. –  Chêne-des-Pleurs (cf. Jg 2.1n) : le mot traduit par Chêne est proche de celui qui a été rendu par térébinthe au v. 4, et plus proche encore de celui qui est traduit de la même manière en 12.6 ; 13.18 ; 14.13 ; 18.1. Il pourrait s''agir du même arbre, mais son identification reste incertaine (cf. Es 6.13 ; Os 4.13).'
  - type: text
    content: Débora, nourrice de Rébecca, mourut ; elle fut ensevelie au-dessous de Beth-El, sous le chêne qu'on a appelé du nom de Chêne-des-Pleurs.
  '9':
  - type: text
    content: ' '
  - type: note
    content: à son arrivée… 33.18. – Voir bénédiction .
  - type: text
    content: Dieu apparut encore à Jacob, à son arrivée de Paddân-Aram, et il le bénit.
