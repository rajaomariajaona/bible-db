        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 31.13 ; 33.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui t'est apparu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 27.41-45 ; 28.10-22.'
      marker-yv: yv-n
    - type: text
      text: 'Dieu dit à Jacob : Monte à Beth-El et installe-toi là ; là tu feras un autel au Dieu qui t''est apparu alors que tu t''enfuyais pour échapper à Esaü, ton frère. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 32.28s.
      marker-yv: yv-n
    - type: text
      text: 'Dieu lui dit : Ton nom est Jacob, mais on ne t''appellera plus du nom de Jacob. Ton nom sera Israël. – Ainsi il l''appela du nom d''Israël. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Dieu-Puissant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’El-Shaddaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',5s ; 28.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fécond '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une assemblée de nations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu lui dit : Je suis le Dieu-Puissant. Sois fécond et multiplie-toi ; une nation et une assemblée de nations seront issues de toi, et des rois sortiront de tes reins. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.7+ ; 26.3.
      marker-yv: yv-n
    - type: text
      text: Le pays que j'ai donné à Abraham et à Isaac, je te le donnerai, et à ta descendance après toi je donnerai ce pays.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.22.
      marker-yv: yv-n
    - type: text
      text: 'Dieu s''éleva au-dessus de lui au lieu où il avait parlé avec lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une libation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : offrande consistant à répandre un liquide (généralement du vin, Ex 29.40s ; Lv 23.13 ; Nb 15.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 32.38 ; voir cependant 2S 23.16 ; Os 9.4 ; Ps 16.4) en l''honneur de la divinité ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jacob installa au lieu où il avait parlé avec lui une pierre levée – une pierre levée, une pierre sur laquelle il répandit une libation et versa de l''huile. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 28.19 ; cf. Os 12.5.
      marker-yv: yv-n
    - type: text
      text: Jacob appela du nom de Beth-El le lieu où Dieu lui avait parlé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Naissance de Benjamin et mort de Rachel
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ephrata
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce nom est associé à Beth-Léhem (v. 19 ; 48.7), à une douzaine de kilomètres au sud-sud-ouest de Jérusalem ; cf. Mi 5.1 ; Ps 132.6 ; Rt 1.1s ; 1Ch 2.24,50 ; 4.4 ; c''était peut-être à l''origine une variante d''Ephraïm, nom d''une région et peut-être d''une ville au nord de Jérusalem (1S 10.2 ; Jr 31.15ss).'
      marker-yv: yv-n
    - type: text
      text: 'Ils partirent de Beth-El. A quelque distance d''Ephrata, Rachel accoucha. Elle eut un accouchement pénible. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'encore un fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 30.24.
      marker-yv: yv-n
    - type: text
      text: 'Pendant les douleurs de l''accouchement, la sage-femme lui dit : N''aie pas peur, tu as encore un fils ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ben-Oni '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Fils
        - type: text
          text: ' de mon mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fils de mon humiliation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Cf. 1S 4.20s ; 1Ch 4.9 ; 7.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Benjamin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Binyamîn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Fils de la (main) droite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', la droite pouvant être le côté favorable ou la direction du sud. La tribu de Benjamin occupait la région située au sud d''Ephraïm (cf. v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Jg 3.15+).'
      marker-yv: yv-n
    - type: text
      text: 'Comme elle allait rendre l''âme, car elle était mourante, elle l''appela du nom de Ben-Oni (« Fils de mon mal ») ; mais son père l''appela Benjamin (« Fils de la main droite »). '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephrata '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Beth-Léhem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(orthographe traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bethléem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après le grec) v. 16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Rt 1.2 ; Mi 5.1.'
      marker-yv: yv-n
    - type: text
      text: 'Rachel mourut et fut ensevelie sur le chemin d''Ephrata, c''est-à-dire Beth-Léhem. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains actes religieux demandent une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purification
        - type: text
          text: ' rituelle préalable ; cf. Ex 19.10-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dieux étrangers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.19 ; Ex 20.3 ; Jos 24.2,15,23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vêtements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 31.24.
      marker-yv: yv-n
    - type: text
      text: 'Jacob dit à sa maison et à tous ceux qui étaient avec lui : Supprimez les dieux étrangers qui sont au milieu de vous, purifiez-vous et changez de vêtements. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jr 31.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tombe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tombeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduisent un même mot hébreu.
      marker-yv: yv-n
    - type: text
      text: 'Jacob installa une pierre levée sur sa tombe : c''est la pierre levée du tombeau de Rachel, jusqu''à aujourd''hui.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette portion de texte fait partie du v. 16 dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. Jacob v. 10 ; 32.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Migdal-Eder '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tour du Troupeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Ce nom désigne ailleurs Jérusalem ou un de ses quartiers (Mi 4.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Israël partit et dressa sa tente au-delà de Migdal-Eder. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ruben… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '49.4 ; Lv 18.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fils de Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.31–30.24 ; 35.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'douze '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Pendant qu'Israël demeurait dans ce pays, Ruben alla coucher avec Bilha, concubine de son père, et Israël l'apprit.
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1Ch 2.1-2
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les fils de Jacob étaient douze : '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: 'Fils de Léa : le premier-né de Jacob, Ruben ; puis Siméon, Lévi, Juda, Issacar et Zabulon. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Fils de Rachel : Joseph et Benjamin. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: text
      text: 'Fils de Bilha, servante de Rachel : Dan et Nephtali. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: text
      text: 'Fils de Zilpa, servante de Léa : Gad et Aser. Ce sont là les fils de Jacob, ceux qui naquirent de lui à Paddân-Aram.'
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mamré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qiriath-Arba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 23.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: séjourné en immigrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Jacob arriva auprès d''Isaac, son père, à Mamré, à Qiriath-Arba, c''est-à-dire Hébron, où Abraham et Isaac avaient séjourné en immigrés. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Les jours d''Isaac furent de cent quatre-vingts ans ; '
  '29':
  - type: usfm
    marker: p
    children:
