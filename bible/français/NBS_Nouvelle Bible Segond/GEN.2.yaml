document_id: GEN.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: toute leur armée , c.-à-d. tout ce qui s'y trouve  ; cf. Es 34.2 ; 40.26 ; Ps 103.2 ; 148.2.
  - type: text
    content: 'Ainsi furent achevés le ciel et la terre, et toute leur armée. '
  '10':
  - type: note
    content: 'Cf. Ez 47.1+. –  bras  : litt. têtes.'
  - type: text
    content: 'Un fleuve sortait d''Eden pour arroser le jardin, et de là il se divisait en quatre bras. '
  '11':
  - type: note
    content: Le Pishôn (terme probablement dérivé d'une racine signifiant jaillir) n'est pas connu par ailleurs. Il a été conjecturalement identifié à l'Indus, au Gange, au Nil ou à d'autres fleuves. Le pays de Havila est une région d'Arabie proche de l'Egypte (10.7,29 ; 25.18 ; 1S 15.7 ; 1Ch 1.9).
  - type: text
    content: 'Le nom du premier est Pishôn ; c''est celui qui contourne tout le pays de Havila, où l''on trouve l''or '
  '12':
  - type: note
    content: 'Le bdellium est une gomme résineuse provenant d''un arbre qui pousse au Proche-Orient, cf. Nb 11.7n. –  onyx  : cf. Ez 28.13.'
  - type: text
    content: '– et l''or de ce pays est bon. Là se trouvent aussi le bdellium et la pierre d''onyx. '
  '13':
  - type: note
    content: 'Le Guihôn, fleuve, a souvent été identifié au Nil. Mais c''est aussi le nom de la principale source de Jérusalem (1R 1.33ss). –  Koush  : ce nom désigne le plus souvent la Nubie, région située au sud de l''Egypte, entre la première et la quatrième cataracte du Nil (l''actuel Soudan ; le terme grec qui le traduit dans LXX a donné notre nom Ethiopie) ; mais certains identifient le pays de Koush mentionné ici à d''autres régions, soit en Mésopotamie, soit aux confins de la péninsule arabique, près du golfe d''Aqaba.'
  - type: text
    content: 'Le nom du deuxième fleuve est Guihôn ; c''est celui qui contourne tout le pays de Koush. '
  '14':
  - type: note
    content: 'le Tigre  : en hébreu Hiddéqel (Dn 10.4). –  à l''est de l''Assyrie 10.11n  ; autre traduction devant Ashour (l''ancienne capitale de l''Assyrie). –  l''Euphrate, l''autre grand fleuve de Mésopotamie (15.18).'
  - type: text
    content: Le nom du troisième fleuve est le Tigre ; c'est celui qui coule à l'est de l'Assyrie. Le quatrième fleuve, c'est l'Euphrate.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'plaça  : litt. posa (cf. 39.16) ; la racine hébraïque correspondante est souvent associée à l''idée de repos  ; cf. 8.4n  ; la même forme du verbe est traduite par laisser en 19.16. –  cultiver v. 5n. –  le garder  : autre traduction en prendre soin.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu prit l''homme et le plaça dans le jardin d''Eden pour le cultiver et pour le garder. '
  '16':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu donna cet ordre à l''homme : Tu pourras manger de tous les arbres du jardin ; '
  '17':
  - type: note
    content: 'connaissance… v. 9n. –  tu mourras  : autre traduction il te faudra mourir  ; c''est la formule qui prescrit la peine de mort dans les textes juridiques. LXX a ici calqué la forme intensive de l''hébreu  : de mort vous mourrez (tout le v. est traduit au pluriel). Cf. 3.4ns ; Jr 26.8n.'
  - type: text
    content: 'mais tu ne mangeras pas de l''arbre de la connaissance de ce qui est bon ou mauvais, car le jour où tu en mangeras, tu mourras. '
  '18':
  - type: note
    content: 'Cf. Ec 4.9-12 ; comparer avec 1Co 7.1s. –  aide  : le mot hébreu désigne souvent Dieu lui-même comme secours de son peuple. Cf. Ex 18.4 ; Dt 33.7 ; Ps 20.3 ; 33.10 ; 115.9-11 ; 121.1 etc. –  son vis-à-vis  : autres traductions qui lui convienne, qui lui corresponde  : l''association des deux termes désigne en la femme l''alliée naturelle de l''homme. – Dans l’Epopée de Gilgamesh, Enkidou, l''homme sauvage qui vit avec les animaux, est éveillé à la connaissance par une relation avec une prostituée (4.4) : « Après qu''il eut été comblé de ses charmes, il se tourna vers ses bêtes sauvages. Quand elles le virent, lui, Enkidou, les gazelles s''enfuirent, les bêtes sauvages de la steppe s''éloignèrent de lui. Enkidou était stupéfait : son corps était crispé, ses genoux ne bougeaient plus – ses bêtes sauvages étaient parties. Enkidou dut ralentir le pas – ce n''était plus comme auparavant. Mais maintenant il avait la sagesse, une vaste intelligence. Il retourna s''asseoir aux pieds de la prostituée. Il l''écouta attentivement, tandis qu''elle lui disait, à lui, à Enkidou : “Tu es sage, Enkidou, tu es devenu comme un dieu ! Pourquoi courir la steppe avec les créatures sauvages ? Viens, je t''emmènerai à Ourouk, la ville fortifiée, au temple sacré, la demeure d''Anou et d''Ishtar, là où vit Gilgamesh, celui qui est plein de force et qui domine le peuple comme un taureau sauvage.” Comme il l''écoute, les paroles de la femme gagnent sa faveur. Le cœur illuminé, il désire avoir un ami. »'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu dit : Il n''est pas bon que l''homme soit seul ; je vais lui faire une aide qui sera son vis-à-vis. '
  '19':
  - type: note
    content: 'façonna v. 7n. –  animaux de la campagne  : autre traduction animaux sauvages  ; 3.1,14n. –  afin que…  : litt. et tout ce qu''appelait l''homme être vivant (1.20n), c’(était) son nom. Dans le monde biblique, donner un nom à quelque chose ou à quelqu''un suppose souvent qu''on exerce une autorité sur lui et qu''on influe sur sa destinée (cf. 1.5,28 ; 3.16,20 ; 17.5 etc. ; Es 43.1).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu façonna de la terre tous les animaux de la campagne et tous les oiseaux du ciel. Il les amena vers l''homme pour voir comment il les appellerait, afin que tout être vivant porte le nom dont l''homme l''appellerait. '
  '2':
  - type: note
    content: 'Le septième jour  : quelques versions anciennes portent ici le sixième jour. –  Dieu avait achevé  : autre traduction Dieu acheva (tournures analogues 17.22 ; 24.19 ; 49.33 ; Ex 40.33 ; Lv 16.20 ; Nb 4.15 ; 7.1 ; 16.31). –  il se reposa  : litt. il cessa (de travailler) (cf. Es 14.4n). C''est le verbe hébreu shabath, associé au mot sabbat, qui désigne l''aboutissement de la semaine ; il fait également assonance avec le chiffre sept ; autre traduction il s''arrêta (ou il fit sabbat) après tout le travail qu''il avait fait  ; cf. Ex 23.12 ; 31.17.'
  - type: text
    content: 'Le septième jour, Dieu avait achevé tout le travail qu''il avait fait ; le septième jour, il se reposa de tout le travail qu''il avait fait. '
  '20':
  - type: note
    content: 'de leurs noms  : litt. de noms. –  pour un homme  : certains traduisent pour Adam, cf. 1.26n  ; d''autres modifient le texte hébreu traditionnel pour lire quant à l''homme, il ne trouva pas (ou il n''avait pas trouvé) d''aide… (v. 18n).'
  - type: text
    content: 'L''homme appela de leurs noms toutes les bêtes, les oiseaux du ciel et tous les animaux de la campagne ; mais, pour un homme, il ne trouva pas d''aide qui fût son vis-à-vis. '
  '21':
  - type: note
    content: 'une torpeur  : autre traduction un profond sommeil  ; cf. 15.12 ; 1S 26.12 ; Es 29.10 ; Jb 4.13 ; 33.15 ; Pr 19.15 ; Dn 8.18n. –  côtes  : le mot hébreu ainsi traduit signifie habituellement côté (d''un bâtiment p. ex. : Ex 25.12,14 etc.). Il est phonétiquement proche du mot traduit par image en 1.26 (cf. 1Co 11.7-9).'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu fit tomber une torpeur sur l''homme, qui s''endormit ; il prit une de ses côtes et referma la chair à sa place. '
  '22':
  - type: note
    content: 'forma une femme…  : litt. bâtit en une femme la côte…  ; cf. Ep 5.22s ; 1Tm 2.9-15. –  amena v. 19.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu forma une femme de la côte qu''il avait prise à l''homme, et il l''amena vers l''homme. '
  '23':
  - type: note
    content: 'c''est l''os…, la chair…  : l''expression exprime d''ordinaire l''appartenance à la même famille ou au même peuple ; elle signifie naturellement nous sommes bien liés l''un à l''autre  ; cf. 29.14 ; Jg 9.2s ; 2S 5.1 ; 19.13s. –  femme / homme  : hébreu ’ishsha / ’ish.'
  - type: text
    content: 'L''homme dit :'
  - type: text
    content: Cette fois c'est l'os de mes os,
  - type: text
    content: la chair de ma chair.
  - type: text
    content: Celle-ci, on l'appellera « femme »,
  - type: text
    content: car c'est de l'homme qu'elle a été prise.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'quittera / s''attachera (34.3 ; Jr 13.11n) : cf. Rt 1.14nss ; on pourrait voir dans cet aphorisme la description d''une société matrilinéaire ou matrilocale (où c''est la femme qui détermine le lieu du foyer et assure la continuité d''une génération à l''autre) ; toutefois la portée de ce texte semble beaucoup plus générale. –  ils deviendront  : LXX les deux deviendront . –  Mt 19.5/ /; 1Co 6.16 ; Ep 5.31.'
  - type: text
    content: C'est pourquoi l'homme quittera son père et sa mère et s'attachera à sa femme, et ils deviendront une seule chair.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'nus  : dans la Bible le terme correspondant évoque au moins autant la faiblesse attachée à l''idée de dénuement que l''atteinte à la pudeur associée à la nudité. Voir 3.1n,7,10 ; cf. Es 58.7 ; Os 2.5 ; Jb 1.21 ; 22.6 ; 24.7,10.'
  - type: text
    content: Ils étaient tous les deux nus, l'homme et sa femme, et ils n'en avaient pas honte.
  '3':
  - type: note
    content: 'Voir bénédiction. –  en fit un jour sacré ou saint  ; autres traductions le consacra, le sanctifia  ; cf. Ex 20.8,11. –  de tout le travail…  : litt. de tout son travail que Dieu avait créé pour faire  ; cf. Jn 5.17.'
  - type: text
    content: Dieu bénit le septième jour et en fit un jour sacré, car en ce jour Dieu se reposa de tout le travail qu'il avait fait en créant.
  - type: heading
    content: Le jardin d'Eden
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Voilà… ou voici…  : cette phrase peut être considérée comme la conclusion de la section précédente (depuis le début du chapitre 1) ou comme l''introduction d''une nouvelle section (jusqu''à la fin du chapitre 3). Le récit qui commence au v. 4 raconte la création d''une autre manière que Gn 1.1–2.3, et n''est pas à prendre comme une simple suite. –  la généalogie ou la lignée  : hébreu toledoth , litt. les engendrements ou les générations (LXX genesis , d''où Genèse  ; voir l''introduction), c.-à-d., ici, les origines . Ce mot signale le début ou la fin de certaines sections du texte 5.1 ; 6.9 ; 10.1,32 ; 11.10,27 ; 25.12s,19 ; 36.1,9 ; 37.2 ; Ex 6.16,19 ; Nb 3.1 ; Rt 4.18 ; 1Ch 1.29+ ; cf. Ex 28.10n  ; Nb 1.20. –  le Seigneur  : lecture usuelle du nom personnel du Dieu d''Israël, YHWH, ici accompagné du terme plus général ’Elohim ( Dieu , cf. 1.1n) ; cf. 4.26n  ; 12.8 ; 15.2n  ; Ex 3.14-15n  ; 6.2s.'
  - type: text
    content: Voilà la généalogie du ciel et de la terre, quand ils furent créés.
  - type: text
    content: 'Au jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu fit la terre et le ciel, '
  '5':
  - type: note
    content: 'pleuvoir  : cf. 7.4+. –  pas d''homme (ou pas d''humain, ou encore personne) : hébreu ’adam, 1.26n. –  pour la cultiver  : litt. pour travailler (le verbe est souvent traduit par servir) le sol (v. 15 ; Ps 104.14n) ; le mot correspondant ici à sol n''est pas le même que celui qui est rendu par terre dans ce qui précède ; il s''agit de ’adama, de la même racine que ’adam  : l''être humain est indissociable de la terre qu''il cultive et qui le nourrit ; voir aussi 4.10n.'
  - type: text
    content: 'il n''y avait encore aucun arbuste de la campagne sur la terre, et aucune herbe de la campagne ne poussait encore ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu n''avait pas fait pleuvoir sur la terre, et il n''y avait pas d''homme pour la cultiver. '
  '6':
  - type: note
    content: 'un flot  : le sens du mot correspondant, rare (seulement ici et en Jb 36.27), est incertain ; on a aussi traduit une vapeur. LXX une source (cf. Nb 21.17). –  en arrosait (ou irriguait, cf. 13.10) toute la surface  : litt. arrosait toute la face du sol (v. 5n) ; cf. v. 10.'
  - type: text
    content: 'Mais un flot montait de la terre et en arrosait toute la surface. '
  '7':
  - type: note
    content: 'façonna  : le verbe hébreu yatsar évoque, entre autres, le travail du potier sur l''argile ; dans les deux tiers des cas, c''est Dieu qui en est le sujet (cf. Jr 18.6+) ; voir v. 19 ; Es 43.1,7,21 ; Jr 1.5n etc. –  homme / terre (hébreu ’adam / ’adama) v. 5n  ; cf. Jb 1.21. –  poussière  : cf. 3.19. –  narines 3.19n. –  souffle (hébreu neshama, autre terme qu''en 1.2,30 ; 6.3,17 ; 7.15) de vie 7.22n  ; 1R 17.17 ; Es 2.22 ; 42.5 ; 57.16n  ; Jb 27.3 ; 32.8 etc. ; voir aussi esprit. –  être vivant 1.20n  ; cf. 1Co 15.45-49.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu façonna l''homme de la poussière de la terre ; il insuffla dans ses narines un souffle de vie, et l''homme devint un être vivant. '
  '8':
  - type: note
    content: 'Eden  : ce nom évoque en hébreu l''idée de délices aux v. 10,15 ; 3.23s ; 4.16 ; Es 51.3 ; Ez 28.13 ; 31.9,16,18 ; 36.35 ; Jl 2.3. Notre mot paradis vient du vocable grec (d''origine perse) utilisé par LXX pour traduire jardin dans ce v., comme en 13.10. –  du côté de l''est ou de l''orient  ; le mot hébreu désigne souvent la direction de l''est, litt. devant (on s’« oriente » face au soleil levant) ; mais il peut aussi évoquer ce qui est avant, dans le temps (cf. Dt 33.15n,27 ; voir Jb 18.20n).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu planta un jardin en Eden, du côté de l''est, et il y mit l''homme qu''il avait façonné. '
  '9':
  - type: note
    content: 'agréables à voir…  : cf. 3.6n. –  bons pour la nourriture  : litt. bons à manger, de même 3.6. –  l''arbre de la vie 3.22ss ; cf. Pr 3.18 ; 11.30 ; 13.12 ; 15.4 ; Ap 2.7 ; 22.1s,14,19. On trouve une plante de vie dans l’Epopée de Gilgamesh  : il s''agit là d''une plante magique qui peut faire rajeunir et rendre immortel celui qui en mange ; mais cette plante est devenue inaccessible aux humains. –  au milieu du jardin  : cf. 3.3. –  connaissance… v. 17 ; 3.5,22. On pourrait aussi traduire connaissance du bon et du mauvais, du bonheur et du malheur ou du bien et du mal  ; comme en hébreu l''opposition des contraires désigne souvent la totalité (on dit volontiers « le petit et le grand » pour « tout le monde »), certains comprennent une connaissance universelle, ou bien la connaissance en général. Cf. 24.50n  ; 31.24n  ; Dt 1.39 ; 2S 14.17 ; 19.36 ; 1R 3.9 ; Es 5.20 ; 7.15 ; voir aussi Lv 27.10ss ; Nb 13.19 ; Dt 30.15 ; Jon 4.11n  ; Jb 30.26 ; Ec 1.18 ; Lm 3.38 ; Hé 5.14.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu fit pousser de la terre toutes sortes d''arbres agréables à voir et bons pour la nourriture, ainsi que l''arbre de la vie au milieu du jardin, et l''arbre de la connaissance de ce qui est bon ou mauvais. '
