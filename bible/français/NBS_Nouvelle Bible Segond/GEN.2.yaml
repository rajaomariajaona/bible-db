      - type: text
        text: ', Enkidou, l''homme sauvage qui vit avec les animaux, est éveillé à la connaissance par une relation avec une prostituée (4.4) : « Après qu''il eut été comblé de ses charmes, il se tourna vers ses bêtes sauvages. Quand elles le virent, lui, Enkidou, les gazelles s''enfuirent, les bêtes sauvages de la steppe s''éloignèrent de lui. Enkidou était stupéfait : son corps était crispé, ses genoux ne bougeaient plus – ses bêtes sauvages étaient parties. Enkidou dut ralentir le pas – ce n''était plus comme auparavant. Mais maintenant il avait la sagesse, une vaste intelligence. Il retourna s''asseoir aux pieds de la prostituée. Il l''écouta attentivement, tandis qu''elle lui disait, à lui, à Enkidou : “Tu es sage, Enkidou, tu es devenu comme un dieu ! Pourquoi courir la steppe avec les créatures sauvages ? Viens, je t''emmènerai à Ourouk, la ville fortifiée, au temple sacré, la demeure d''Anou et d''Ishtar, là où vit Gilgamesh, celui qui est plein de force et qui domine le peuple comme un taureau sauvage.” Comme il l''écoute, les paroles de la femme gagnent sa faveur. Le cœur illuminé, il désire avoir un ami. »'
