  children:
  - type: text
    text: Jésus s'invite chez Zachée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.35+ ; cf. 9.51+.
    marker-yv: yv-n
  - type: text
    text: 'Il entra dans Jéricho et passa par la ville. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Zachée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : probablement une forme grecque du nom hébreu Zakkaï (cf. Esd 2.9). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chef des collecteurs des taxes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.12+ ; 18.10ss ; cf. Mt 21.31 ; Mc 2.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: riche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.23.'
    marker-yv: yv-n
  - type: text
    text: 'Un nommé Zachée, qui était chef des collecteurs des taxes et qui était riche, '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 4.14,37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cherchait à voir…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.9 ; Jn 12.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'foule '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 18.36ss.
    marker-yv: yv-n
  - type: text
    text: 'cherchait à voir qui était Jésus ; mais à cause de la foule, il ne pouvait pas le voir, car il était de petite taille. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sycomore
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il courut en avant et monta sur un sycomore pour le voir, parce qu''il devait passer par là. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 18.40s ; voir aussi Jn 1.47s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chez toi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans ta maison.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Jésus fut arrivé à cet endroit, il leva les yeux et lui dit : Zachée, descends vite ; il faut que je demeure aujourd''hui chez toi. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.29 ; cf. Gn 19.2 ; 24.23ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tout joyeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 37 ; 1.14+ ; 15.5.
    marker-yv: yv-n
  - type: text
    text: 'Tout joyeux, Zachée descendit vite pour le recevoir. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.30 ; 7.34 ; 15.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'En voyant cela, tous maugréaient : Il est allé loger chez un pécheur ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: debout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.11,13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je donne…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on explique habituellement les verbes au présent comme un engagement volontaire que Zachée prend pour l''avenir, engagement déterminé par sa rencontre avec Jésus ; mais on les a aussi compris comme une description de ce qu''il faisait habituellement (cf. 18.12), contrairement aux idées reçues sur les collecteurs des taxes ; voir aussi 8.3 ; Ac 4.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aux pauvres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: extorqué
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'accuser à tort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quadruple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 21.37 ; 2S 12.6 ; comparer avec Ex 22.3ss ; Lv 5.21-24 ; Nb 5.6s ; voir aussi Pr 6.31.
    marker-yv: yv-n
  - type: text
    text: 'Mais Zachée, debout, dit au Seigneur : Seigneur, je donne aux pauvres la moitié de mes biens, et si j''ai extorqué quoi que ce soit à quelqu''un, je lui rends le quadruple. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 7.47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dit à son sujet '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 12.41 ; 20.19). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aujourd''hui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cette maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ac 10.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 16.31ss ; Jn 4.53. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils d''Abraham '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.8+ ; 13.16.
    marker-yv: yv-n
  - type: text
    text: 'Jésus lui dit : Aujourd''hui le salut est venu pour cette maison, parce que lui aussi est un fils d''Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' de l''homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: venu chercher…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.32 ; 9.55'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 15.4ss ; Ez 34.16 ; Mt 9.13/ / ; 18.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jn 3.17 ; 1Tm 1.15.'
    marker-yv: yv-n
  - type: text
    text: Car le Fils de l'homme est venu chercher et sauver ce qui était perdu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: La parabole des mines
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 25.14-30
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parabole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.36+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: près de Jérusalem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Jéricho (v. 1) est à moins de 30 km de la capitale (10.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le règne de Dieu… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.43+ ; cf. 11.2 ; Ac 1.6 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Assomption de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Moïse
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.1 : « Alors sur toute la création Son Règne sera manifesté. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à l''instant même '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.64+ ; voir aussi 9.27+ ; 17.20ss.
    marker-yv: yv-n
  - type: text
    text: 'Comme ils écoutaient cela, il ajouta une parabole, parce qu''il était près de Jérusalem et qu''ils imaginaient que le règne de Dieu allait se manifester à l''instant même. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 10.30+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de haute naissance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sur le terme grec, voir Ac 17.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un pays lointain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.13 ; comparer avec 20.9 ; Mt 25.19 ; Mc 13.34. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se faire investir de la royauté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le terme grec est rendu au v. 11 par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'règne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: royaume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 4.43+ ; voir aussi 22.29 ; Mt 3.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). Les rois vassaux de Rome devaient parfois, pour leur investiture, faire une démarche de ce genre auprès de l''empereur. Selon Flavius '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Josèphe
      - type: text
        text: ', Archélaos, fils '
      - type: usfm
        marker: w
        children:
        - type: text
          text: d'Hérode
      - type: text
        text: ' le Grand (qui avait fait construire un palais à Jéricho, v. 11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), était allé à Rome à cette fin en 4 av. J.-C., à la mort de son père, ainsi que son frère aîné et rival Antipas. A cause, entre autres choses, de l''opposition de ses sujets, qui avaient envoyé une délégation pour demander l''abolition de la royauté et l''administration directe de Rome (cf. v. 14), Archélaos n''avait reçu que le titre d''ethnarque. C''est encore une délégation, de Juifs et de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samaritains
      - type: text
        text: ', qui a obtenu sa déposition en 6 apr. J.-C.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit donc : Un homme de haute naissance s''en alla dans un pays lointain pour se faire investir de la royauté, puis revenir. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: esclaves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même possibilité dans la suite. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mines
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : somme d''argent relativement peu importante (v. 17 ; cf. 1R 10.17 ; Esd 2.69), équivalant à cent drachmes (Lc 15.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ou à un soixantième de talent (cf. Mt 25.14ss) ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''à ce que j''arrive '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que je (re)vienne.
    marker-yv: yv-n
  - type: text
    text: 'Il appela dix de ses esclaves, leur donna dix mines et leur dit : Faites des affaires jusqu''à ce que j''arrive. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une ambassade '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une délégation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; v. 12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'derrière lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'après lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (9.23
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Mais ses concitoyens le détestaient, et ils envoyèrent une ambassade derrière lui pour dire : Nous ne voulons pas que cet individu règne sur nous. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quelles affaires…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quelles affaires chacun avait faites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (verbe apparenté v. 13).
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il fut de retour, après avoir été investi de la royauté, il fit appeler auprès de lui les esclaves auxquels il avait donné l''argent, afin de savoir quelles affaires ils avaient faites. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le premier…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.18ss ; 16.5ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite.'
    marker-yv: yv-n
  - type: text
    text: 'Le premier se présenta et dit : Maître, ta mine a rapporté dix mines. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 16.10 ; voir aussi 2Co 4.17.'
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit : C''est bien ! Tu es un bon esclave ; puisque tu as été digne de confiance dans une petite affaire, tu auras autorité sur dix villes. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Le deuxième vint et dit : Maître, ta mine a produit cinq mines. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il lui dit : Toi, de même, tu seras responsable de cinq villes. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Un autre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'autre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon les meilleurs mss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un linge
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même terme en Jn 11.44 ; 20.7 ; Ac 19.12.'
    marker-yv: yv-n
  - type: text
    text: 'Un autre vint et dit : Maître, voici ta mine que j''ai gardée dans un linge ; '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 25.25 ; cf. Ps 119.120 ; Jb 4.14 ; 23.13ss ; voir aussi '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'je te craignais, en effet, parce que tu es un homme sévère ; tu prends ce que tu n''as pas déposé, et tu moissonnes ce que tu n''as pas semé. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.22 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jb 15.6 ; Mt 12.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur tes paroles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ta bouche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mauvais esclave
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: esclave mauvais.
    marker-yv: yv-n
  - type: text
    text: 'Il lui dit : Je te jugerai sur tes paroles, mauvais esclave ; tu savais que, moi, je suis un homme sévère, que je prends ce que je n''ai pas déposé et que je moissonne ce que je n''ai pas semé ? '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans une banque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme désigne d''abord la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'table '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'des prêteurs sur gages ; cf. Mc 11.15/ / ; Jn 2.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: intérêt
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''argent aurait peut-être été prêté à des non-Juifs, cf. Ex 22.24 ; Lv 25.36s ; Dt 23.20s.'
    marker-yv: yv-n
  - type: text
    text: 'Alors pourquoi n''as-tu pas placé mon argent dans une banque ? A mon arrivée je l''aurais retiré avec un intérêt ! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Enlevez-lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe a été traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'prendre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 21s.
    marker-yv: yv-n
  - type: text
    text: 'Puis il dit à ceux qui étaient là : Enlevez-lui la mine et donnez-la à celui qui a les dix mines. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ce v. manque chez plusieurs témoins anciens.
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Maître, il a dix mines ! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je vous le dis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.8+ ; 14.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on donnera… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.18+.
    marker-yv: yv-n
  - type: text
    text: '– Je vous le dis, on donnera à celui qui a, mais à celui qui n''a pas, on enlèvera même ce qu''il a. – '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 14 ; cf. v. 43s ; 12.46 ; 21.20ss ; 23.28ss ; 1S 15.33 ; voir aussi 1Co 15.25.
    marker-yv: yv-n
  - type: text
    text: Quant à mes ennemis, qui n'ont pas voulu que je règne sur eux, amenez-les ici et égorgez-les devant moi.
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'entrée de Jésus à Jérusalem
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 21.1-9  ; Mc 11.1-10  ; Jn 12.12-16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.31,51+ ; cf. 2.42+ ; 10.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Mc 10.32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en avant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'devant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (même terme v. 27).
    marker-yv: yv-n
  - type: text
    text: Après avoir ainsi parlé, il partit en avant et monta vers Jérusalem.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Bethphagé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Béthanie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(24.50) / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mont… des Oliviers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(21.37 ; Ac 1.12) : voir Mc 11.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: disciples
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 18.15.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il approcha de Bethphagé et de Béthanie, près du mont dit des Oliviers, il envoya deux de ses disciples, '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mc 11.2+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur lequel aucun homme…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 23.53.'
    marker-yv: yv-n
  - type: text
    text: 'en disant : Allez au village qui est en face ; quand vous y serez entrés, vous trouverez un ânon attaché, sur lequel aucun homme ne s''est jamais assis ; détachez-le et amenez-le. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.13+ ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même possibilité v. 34 ; même terme au pluriel v. 33.'
    marker-yv: yv-n
  - type: text
    text: 'Si quelqu''un vous demande : « Pourquoi le détachez-vous ? », vous lui direz : « Le Seigneur en a besoin. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 22.13.
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui avaient été envoyés s''en allèrent et trouvèrent les choses comme il leur avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses maîtres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 31
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Ac 16.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss.
    marker-yv: yv-n
  - type: text
    text: 'Comme ils détachaient l''ânon, ses maîtres leur dirent : Pourquoi détachez-vous l''ânon ? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 31
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 1R 1.33ss ; Za 9.9s.'
    marker-yv: yv-n
  - type: text
    text: 'Ils répondirent : Le Seigneur en a besoin. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jetèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe grec est dérivé de celui qui apparaît en 4.35 ; 17.2 ; en 1P 5.7 il est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se décharger de.
    marker-yv: yv-n
  - type: text
    text: 'Et ils l''amenèrent à Jésus ; puis ils jetèrent leurs vêtements sur l''ânon et firent monter Jésus. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2R 9.13.
    marker-yv: yv-n
  - type: text
    text: A mesure qu'il avançait, les gens étendaient leurs vêtements sur le chemin.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1R 1.38ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'multitude '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout joyeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: louer Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2.13,20 ; 18.43 ; 24.53 ; Ac 2.47 ; 3.8s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'miracles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (10.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''ils avaient vus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.10ss ; 14.1ss ; 17.11ss ; 18.35ss.
    marker-yv: yv-n
  - type: text
    text: 'Il approchait déjà de la descente du mont des Oliviers lorsque toute la multitude des disciples, tout joyeux, se mirent à louer Dieu à pleine voix pour tous les miracles qu''ils avaient vus. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.35+ ; '
