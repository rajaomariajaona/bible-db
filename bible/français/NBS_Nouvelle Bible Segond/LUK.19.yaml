document_id: LUK.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus s'invite chez Zachée
  - type: text
    content: ' '
  - type: note
    content: 18.35+ ; cf. 9.51+.
  - type: text
    content: 'Il entra dans Jéricho et passa par la ville. '
  '10':
  - type: note
    content: 'Fils de l''homme 5.24+. –  venu chercher…  : cf. 5.32 ; 9.55n  ; 15.4ss ; Ez 34.16 ; Mt 9.13/ / ; 18.10n  ; Jn 3.17 ; 1Tm 1.15.'
  - type: text
    content: Car le Fils de l'homme est venu chercher et sauver ce qui était perdu.
  - type: heading
    content: La parabole des mines
  - type: heading
    content: Mt 25.14-30
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'parabole 5.36+. –  près de Jérusalem  : Jéricho (v. 1) est à moins de 30 km de la capitale (10.30n). –  le règne de Dieu… 4.43+ ; cf. 11.2 ; Ac 1.6 ; Assomption de Moïse 10.1 : « Alors sur toute la création Son Règne sera manifesté. » –  à l''instant même 1.64+ ; voir aussi 9.27+ ; 17.20ss.'
  - type: text
    content: 'Comme ils écoutaient cela, il ajouta une parabole, parce qu''il était près de Jérusalem et qu''ils imaginaient que le règne de Dieu allait se manifester à l''instant même. '
  '12':
  - type: note
    content: 'Cf. 10.30+. –  de haute naissance  : sur le terme grec, voir Ac 17.11n. –  un pays lointain  : cf. 15.13 ; comparer avec 20.9 ; Mt 25.19 ; Mc 13.34. –  se faire investir de la royauté (le terme grec est rendu au v. 11 par règne et ailleurs par royaume  ; cf. 4.43+ ; voir aussi 22.29 ; Mt 3.2n). Les rois vassaux de Rome devaient parfois, pour leur investiture, faire une démarche de ce genre auprès de l''empereur. Selon Flavius Josèphe, Archélaos, fils d''Hérode le Grand (qui avait fait construire un palais à Jéricho, v. 11n), était allé à Rome à cette fin en 4 av. J.-C., à la mort de son père, ainsi que son frère aîné et rival Antipas. A cause, entre autres choses, de l''opposition de ses sujets, qui avaient envoyé une délégation pour demander l''abolition de la royauté et l''administration directe de Rome (cf. v. 14), Archélaos n''avait reçu que le titre d''ethnarque. C''est encore une délégation, de Juifs et de Samaritains, qui a obtenu sa déposition en 6 apr. J.-C.'
  - type: text
    content: 'Il dit donc : Un homme de haute naissance s''en alla dans un pays lointain pour se faire investir de la royauté, puis revenir. '
  '13':
  - type: note
    content: 'esclaves  : autre traduction serviteurs, même possibilité dans la suite. –  mines  : somme d''argent relativement peu importante (v. 17 ; cf. 1R 10.17 ; Esd 2.69), équivalant à cent drachmes (Lc 15.8n) ou à un soixantième de talent (cf. Mt 25.14ss) ; voir mesures, poids et monnaies. –  jusqu''à ce que j''arrive ou que je (re)vienne.'
  - type: text
    content: 'Il appela dix de ses esclaves, leur donna dix mines et leur dit : Faites des affaires jusqu''à ce que j''arrive. '
  '14':
  - type: note
    content: une ambassade ou une délégation  ; v. 12n,27. –  derrière lui ou après lui (9.23n).
  - type: text
    content: 'Mais ses concitoyens le détestaient, et ils envoyèrent une ambassade derrière lui pour dire : Nous ne voulons pas que cet individu règne sur nous. '
  '15':
  - type: note
    content: 'quelles affaires…  : certains mss portent quelles affaires chacun avait faites (verbe apparenté v. 13).'
  - type: text
    content: 'Lorsqu''il fut de retour, après avoir été investi de la royauté, il fit appeler auprès de lui les esclaves auxquels il avait donné l''argent, afin de savoir quelles affaires ils avaient faites. '
  '16':
  - type: note
    content: 'Le premier…  : cf. 14.18ss ; 16.5ss. –  Maître ou Seigneur, de même dans la suite.'
  - type: text
    content: 'Le premier se présenta et dit : Maître, ta mine a rapporté dix mines. '
  '17':
  - type: note
    content: Cf. v. 13n  ; 16.10 ; voir aussi 2Co 4.17.
  - type: text
    content: 'Il lui dit : C''est bien ! Tu es un bon esclave ; puisque tu as été digne de confiance dans une petite affaire, tu auras autorité sur dix villes. '
  '18':
  - type: text
    content: 'Le deuxième vint et dit : Maître, ta mine a produit cinq mines. '
  '19':
  - type: text
    content: 'Il lui dit : Toi, de même, tu seras responsable de cinq villes. '
  '2':
  - type: note
    content: 'Zachée  : probablement une forme grecque du nom hébreu Zakkaï (cf. Esd 2.9). –  chef des collecteurs des taxes 3.12+ ; 18.10ss ; cf. Mt 21.31 ; Mc 2.15n. –  riche  : cf. 18.23.'
  - type: text
    content: 'Un nommé Zachée, qui était chef des collecteurs des taxes et qui était riche, '
  '20':
  - type: note
    content: 'Un autre  : litt. l''autre, selon les meilleurs mss. –  un linge  : même terme en Jn 11.44 ; 20.7 ; Ac 19.12.'
  - type: text
    content: 'Un autre vint et dit : Maître, voici ta mine que j''ai gardée dans un linge ; '
  '21':
  - type: note
    content: Mt 25.25 ; cf. Ps 119.120 ; Jb 4.14 ; 23.13ss ; voir aussi crainte.
  - type: text
    content: 'je te craignais, en effet, parce que tu es un homme sévère ; tu prends ce que tu n''as pas déposé, et tu moissonnes ce que tu n''as pas semé. '
  '22':
  - type: note
    content: 'Cf. Jb 15.6 ; Mt 12.37. –  sur tes paroles  : litt. de ta bouche. –  mauvais esclave  : autre traduction esclave mauvais.'
  - type: text
    content: 'Il lui dit : Je te jugerai sur tes paroles, mauvais esclave ; tu savais que, moi, je suis un homme sévère, que je prends ce que je n''ai pas déposé et que je moissonne ce que je n''ai pas semé ? '
  '23':
  - type: note
    content: 'dans une banque  : le terme désigne d''abord la table des prêteurs sur gages ; cf. Mc 11.15/ / ; Jn 2.15. –  intérêt  : l''argent aurait peut-être été prêté à des non-Juifs, cf. Ex 22.24 ; Lv 25.36s ; Dt 23.20s.'
  - type: text
    content: 'Alors pourquoi n''as-tu pas placé mon argent dans une banque ? A mon arrivée je l''aurais retiré avec un intérêt ! '
  '24':
  - type: note
    content: 'Enlevez-lui  : le même verbe a été traduit par prendre v. 21s.'
  - type: text
    content: 'Puis il dit à ceux qui étaient là : Enlevez-lui la mine et donnez-la à celui qui a les dix mines. '
  '25':
  - type: note
    content: Ce v. manque chez plusieurs témoins anciens.
  - type: text
    content: 'Ils lui dirent : Maître, il a dix mines ! '
  '26':
  - type: note
    content: 'Je vous le dis  : cf. 11.8+ ; 14.24. –  on donnera… 8.18+.'
  - type: text
    content: '– Je vous le dis, on donnera à celui qui a, mais à celui qui n''a pas, on enlèvera même ce qu''il a. – '
  '27':
  - type: note
    content: V. 14 ; cf. v. 43s ; 12.46 ; 21.20ss ; 23.28ss ; 1S 15.33 ; voir aussi 1Co 15.25.
  - type: text
    content: Quant à mes ennemis, qui n'ont pas voulu que je règne sur eux, amenez-les ici et égorgez-les devant moi.
  - type: heading
    content: L'entrée de Jésus à Jérusalem
  - type: heading
    content: Mt 21.1-9  ; Mc 11.1-10  ; Jn 12.12-16
  '28':
  - type: text
    content: ' '
  - type: note
    content: 9.31,51+ ; cf. 2.42+ ; 10.30n  ; voir Mc 10.32. –  en avant ou devant (même terme v. 27).
  - type: text
    content: Après avoir ainsi parlé, il partit en avant et monta vers Jérusalem.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Bethphagé / Béthanie (24.50) / mont… des Oliviers (21.37 ; Ac 1.12) : voir Mc 11.1n. –  disciples  : cf. 18.15.'
  - type: text
    content: 'Lorsqu''il approcha de Bethphagé et de Béthanie, près du mont dit des Oliviers, il envoya deux de ses disciples, '
  '3':
  - type: note
    content: 'Cf. 4.14,37. –  cherchait à voir…  : cf. 9.9 ; Jn 12.21. –  foule 18.36ss.'
  - type: text
    content: 'cherchait à voir qui était Jésus ; mais à cause de la foule, il ne pouvait pas le voir, car il était de petite taille. '
  '30':
  - type: note
    content: 'Mc 11.2+. –  sur lequel aucun homme…  : cf. 23.53.'
  - type: text
    content: 'en disant : Allez au village qui est en face ; quand vous y serez entrés, vous trouverez un ânon attaché, sur lequel aucun homme ne s''est jamais assis ; détachez-le et amenez-le. '
  '31':
  - type: note
    content: 'Le Seigneur  : cf. 7.13+ ; autre traduction son maître, même possibilité v. 34 ; même terme au pluriel v. 33.'
  - type: text
    content: 'Si quelqu''un vous demande : « Pourquoi le détachez-vous ? », vous lui direz : « Le Seigneur en a besoin. »'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.13.
  - type: text
    content: 'Ceux qui avaient été envoyés s''en allèrent et trouvèrent les choses comme il leur avait dit. '
  '33':
  - type: note
    content: ses maîtres v. 31n  ; cf. Ac 16.16nss.
  - type: text
    content: 'Comme ils détachaient l''ânon, ses maîtres leur dirent : Pourquoi détachez-vous l''ânon ? '
  '34':
  - type: note
    content: V. 31n  ; cf. 1R 1.33ss ; Za 9.9s.
  - type: text
    content: 'Ils répondirent : Le Seigneur en a besoin. '
  '35':
  - type: note
    content: 'jetèrent  : le verbe grec est dérivé de celui qui apparaît en 4.35 ; 17.2 ; en 1P 5.7 il est traduit par se décharger de.'
  - type: text
    content: 'Et ils l''amenèrent à Jésus ; puis ils jetèrent leurs vêtements sur l''ânon et firent monter Jésus. '
  '36':
  - type: note
    content: Cf. 2R 9.13.
  - type: text
    content: A mesure qu'il avançait, les gens étendaient leurs vêtements sur le chemin.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 1.38ss. –  multitude 6.17. –  tout joyeux v. 6+. –  louer Dieu  : cf. 2.13,20 ; 18.43 ; 24.53 ; Ac 2.47 ; 3.8s. –  miracles (10.13n) qu''ils avaient vus 13.10ss ; 14.1ss ; 17.11ss ; 18.35ss.'
  - type: text
    content: 'Il approchait déjà de la descente du mont des Oliviers lorsque toute la multitude des disciples, tout joyeux, se mirent à louer Dieu à pleine voix pour tous les miracles qu''ils avaient vus. '
  '38':
  - type: note
    content: '13.35+ ; Ps 118.26. –  le roi 1.32 ; 23.3,37s ; cf. 18.38s ; Jn 12.13 ; Ac 17.7. –  Paix…  : cf. 2.14 ; Jb 25.2. – Voir aussi bénédiction, nom et gloire.'
  - type: text
    content: 'Ils disaient :'
  - type: text
    content: Béni soit celui qui vient,
  - type: text
    content: 'le roi, '
  - type: text
    content: au nom du Seigneur !
  - type: text
    content: Paix dans le ciel
  - type: text
    content: et gloire dans les lieux très hauts !
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 21.14ss. –  Quelques pharisiens (5.17+) , du milieu de la foule  : cf. 13.31 ; 14.1,3 ; 15.2 ; 16.14 ; 17.20. –  Maître 3.12n. –  rabroue ou reprends 4.35n  ; cf. 18.39.'
  - type: text
    content: 'Quelques pharisiens, du milieu de la foule, lui dirent : Maître, rabroue tes disciples ! '
  '4':
  - type: note
    content: 'sycomore  : cf. 17.6n.'
  - type: text
    content: 'Il courut en avant et monta sur un sycomore pour le voir, parce qu''il devait passer par là. '
  '40':
  - type: note
    content: 'Cf. Jn 18.8. –  si eux se taisent…  : ou, selon certains mss, si eux se taisaient, ce sont les pierres qui crieraient  ; on peut voir dans cette phrase une allusion à la destruction de Jérusalem, cf. v. 44 ; Ha 2.11.'
  - type: text
    content: 'Il répondit : Je vous le dis, si eux se taisent, ce sont les pierres qui crieront !'
  - type: heading
    content: Jésus pleure sur Jérusalem
  '41':
  - type: text
    content: ' '
  - type: note
    content: '13.34s. –  pleura  : cf. 23.28 ; 2R 8.11 ; Jr 8.18,23 ; 14.17 ; Jn 11.35.'
  - type: text
    content: 'Quand, approchant, il vit la ville, il pleura sur elle '
  '42':
  - type: note
    content: 'Cf. Es 48.18. –  Si toi aussi (v. 37s) tu avais su Dt 32.28s. –  en ce jour  : cf. v. 33 ; certains mss renforcent avec une formule qu''on pourrait traduire en ce jour au moins. –  comment trouver la paix (certains mss précisent ta paix) : la même expression a été traduite les conditions de paix en 14.32 ; cf. Jr 6.14 ; 8.11. –  cela t''est caché  : litt. cela (ou la paix) a été caché (e) à tes yeux  ; cf. 8.9s ; 10.21.'
  - type: text
    content: 'en disant : Si toi aussi tu avais su, en ce jour, comment trouver la paix ! Mais maintenant cela t''est caché. '
  '43':
  - type: note
    content: 'des jours viendront 5.35+ ; 23.29 ; cf. 1S 2.31 ; 2R 20.17. –  t''entoureront de palissades ou d''ouvrages de siège  : cf. Es 29.3 ; 37.33 ; Jr 6.6ss ; 52.5 ; Ez 4.1ss ; 21.27. –  t''encercleront  : cf. 2R 6.14. – Le récit du siège et de la prise de Jérusalem par les armées romaines en 70, tel qu''on le trouve notamment chez Flavius Josèphe (Guerre des Juifs), présente de nombreux points communs avec cette description ; voir aussi 21.20ss ; 23.28ss.'
  - type: text
    content: 'Car des jours viendront sur toi où tes ennemis t''entoureront de palissades, t''encercleront et te presseront de toutes parts ; '
  '44':
  - type: note
    content: 'ils t''écraseront (autre traduction ils te nivelleront au ras du sol), toi et tes enfants  : cf. 23.28 ; 2R 8.12 ; Os 10.14 ; 14.1 ; Na 3.10 ; Ps 137.9. –  pierre sur pierre  : cf. v. 40 ; 20.17 ; 21.6 ; 2S 17.13 ; Mi 3.12. –  parce que  : cf. Ac 12.23. –  le temps de l''intervention divine  : litt. le temps de ta visite ou de ton inspection, terme qui désigne habituellement une intervention divine, positive ou négative (châtiment) ; cf. 1.68n  ; 7.16 ; Jr 6.15n  ; 10.15 ; 1P 2.12.'
  - type: text
    content: ils t'écraseront, toi et tes enfants au milieu de toi, et ils ne laisseront pas en toi pierre sur pierre, parce que tu n'as pas reconnu le temps de l'intervention divine.
  - type: heading
    content: Jésus chasse les vendeurs du temple
  - type: heading
    content: Mt 21.12-17  ; Mc 11.15-17  ; cf. Jn 2.13-17
  '45':
  - type: text
    content: ' '
  - type: note
    content: temple 2.27+. –  marchands Mt 21.12n.
  - type: text
    content: 'Entré dans le temple, il se mit à chasser les marchands '
  '46':
  - type: note
    content: Il est écrit 4.4,8,10. –  Ma maison… Es 56.7 ; Jr 7.11.
  - type: text
    content: 'en leur disant : Il est écrit :'
  - type: text
    content: Ma maison sera une maison de prière
  - type: text
    content: .
  - type: text
    content: 'Mais vous, vous en avez fait '
  - type: text
    content: une caverne de bandits
  - type: text
    content: .
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Il enseignait… dans le temple 20.1 ; 21.37s ; 22.53 ; cf. 2.46s ; Jn 7.14 ; 18.20. –  grands prêtres / scribes  : cf. 20.19 ; 22.2,4,52 ; 23.10 ; Mt 2.4n  ; Mc 8.31n. –  les notables  : cf. 23.13,35 ; 24.20 ; sur le terme employé ici (litt. les premiers ), cf. Mc 6.21n  ; Ac 13.50n. –  cherchaient…  : cf. 6.11 ; 11.53s ; 20.19 ; Mc 3.6 ; 11.18.'
  - type: text
    content: 'Il enseignait tous les jours dans le temple. Et les grands prêtres, les scribes et les notables du peuple cherchaient à le faire disparaître ; '
  '48':
  - type: note
    content: 'tout le peuple…  : cf. 18.43 ; 20.19 ; 21.38 ; 23.27,35 ; Mc 12.37. –  suspendu…  : litt. suspendu à lui pour l''écouter  ; verbe apparenté Mt 22.40n.'
  - type: text
    content: mais ils ne savaient comment faire, car tout le peuple était suspendu à ses lèvres.
  '5':
  - type: note
    content: 'Cf. 18.40s ; voir aussi Jn 1.47s. –  chez toi  : litt. dans ta maison.'
  - type: text
    content: 'Lorsque Jésus fut arrivé à cet endroit, il leva les yeux et lui dit : Zachée, descends vite ; il faut que je demeure aujourd''hui chez toi. '
  '6':
  - type: note
    content: 5.29 ; cf. Gn 19.2 ; 24.23ss. –  Tout joyeux v. 37 ; 1.14+ ; 15.5.
  - type: text
    content: 'Tout joyeux, Zachée descendit vite pour le recevoir. '
  '7':
  - type: note
    content: 5.30 ; 7.34 ; 15.2n  ; voir aussi péché.
  - type: text
    content: 'En voyant cela, tous maugréaient : Il est allé loger chez un pécheur ! '
  '8':
  - type: note
    content: 'debout  : cf. 18.11,13. –  au Seigneur 7.13+. –  je donne…  : on explique habituellement les verbes au présent comme un engagement volontaire que Zachée prend pour l''avenir, engagement déterminé par sa rencontre avec Jésus ; mais on les a aussi compris comme une description de ce qu''il faisait habituellement (cf. 18.12), contrairement aux idées reçues sur les collecteurs des taxes ; voir aussi 8.3 ; Ac 4.32. –  aux pauvres 4.18+. –  extorqué  : le même verbe a été traduit par accuser à tort 3.14n. –  quadruple Ex 21.37 ; 2S 12.6 ; comparer avec Ex 22.3ss ; Lv 5.21-24 ; Nb 5.6s ; voir aussi Pr 6.31.'
  - type: text
    content: 'Mais Zachée, debout, dit au Seigneur : Seigneur, je donne aux pauvres la moitié de mes biens, et si j''ai extorqué quoi que ce soit à quelqu''un, je lui rends le quadruple. '
  '9':
  - type: note
    content: 'Cf. 7.47. –  lui dit  : autre traduction dit à son sujet (cf. 12.41 ; 20.19). –  Aujourd''hui 2.11+. –  cette maison  : cf. v. 5n  ; Ac 10.2n  ; voir aussi 16.31ss ; Jn 4.53. –  fils d''Abraham 3.8+ ; 13.16.'
  - type: text
    content: 'Jésus lui dit : Aujourd''hui le salut est venu pour cette maison, parce que lui aussi est un fils d''Abraham. '
