document_id: NAM.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La ville sanguinaire livrée au carnage
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur… Es 1.4 ; 5.8+ ; Mi 2.1 ; Ha 2.9,12. –  ville sanguinaire (litt. de sangs , comme en Es 1.15n) ; cf. Ez 22.2s ; 24.6ss ; voir aussi Jr 2.34 ; 6.7 ; Mi 3.1 ; Ha 2.8,12,17. –  dissimulation  : même terme en Os 7.3 ; 10.13 ; 12.1 ; Ps 59.13. –  violence  : traduction incertaine d''un mot qui n''apparaît qu''ici et en Ab 14 ( carrefour  ?) : il semble dériver d''une racine signifiant partager ou arracher  ; on pourrait aussi comprendre pleine de butin . –  Les proies…  : 2.13n  ; autre traduction qui ne lâche jamais sa proie  ; cf. Es 14.17.'
  - type: text
    content: Quel malheur pour la ville sanguinaire,
  - type: text
    content: remplie de dissimulation, pleine de violence !
  - type: text
    content: Les proies ne lui font pas défaut…
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 20.4. –  on a écrasé ses enfants 2R 8.12 ; Es 13.16,18 ; Os 10.14 ; 14.1 ; voir aussi Am 1.13 ; Ps 137.9 ; Lc 19.44. –  à tous les coins de rues Es 51.20 ; Pr 1.21 ; Lm 2.19. –  tiré… au sort Lv 16.8n  ; Jl 4.3 ; Ab 11. –  grands / chaînes Ps 149.8 ; cf. Jr 40.1,4.
  - type: text
    content: Et cependant elle aussi est partie en exil,
  - type: text
    content: elle s'en est allée captive ;
  - type: text
    content: on a écrasé ses enfants
  - type: text
    content: à tous les coins de rues ;
  - type: text
    content: on a tiré ses dignitaires au sort,
  - type: text
    content: et tous ses grands ont été chargés de chaînes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ivre  : cf. Es 29.9s ; 63.6 ; Jr 25.27 ; 51.7,39,64 ; Ez 23.33 ; Ab 16 ; Ha 2.5ss ; Lm 4.21 ; Ap 16. –  tu te cacheras  : traduction incertaine ; on pourrait aussi comprendre tu t''évanouiras . –  un refuge  : litt. une forteresse , comme en 1.7 ; autre terme au v. 12 ; cf. 1R 20.30.'
  - type: text
    content: Toi aussi, tu seras ivre,
  - type: text
    content: tu te cacheras ;
  - type: text
    content: toi aussi, tu chercheras un refuge contre l'ennemi.
  - type: heading
    content: Ninive incapable de résister
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'figuiers / primeurs  : cf. Os 9.10 ; Mi 7.1n. –  quand on les secoue… Ap 6.13.'
  - type: text
    content: Toutes tes forteresses
  - type: text
    content: sont des figuiers avec des primeurs ;
  - type: text
    content: quand on les secoue,
  - type: text
    content: elles tombent dans la bouche de qui veut les manger.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'des femmes Es 19.16 ; Jr 49.22 ; 50.37 ; 51.30. –  tes verrous  : probablement les positions de défense avancées qui auraient dû retenir l''envahisseur (voir introduction) ; cf. Es 15.5 ; voir aussi Es 45.1s ; Am 1.5.'
  - type: text
    content: 'Voici ton peuple :'
  - type: text
    content: il n'y a plus que des femmes en ton sein ;
  - type: text
    content: les portes de ton pays
  - type: text
    content: s'ouvrent toutes grandes à tes ennemis ;
  - type: text
    content: un feu dévore tes verrous.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Puise de l''eau  : cf. Es 22.9ss. –  forteresses ou fortifications  ; cf. v. 12. –  le moule à briques (2S 12.31), typique de la construction mésopotamienne (Gn 11.3n) : les préparatifs de défense arrivent trop tard.'
  - type: text
    content: Puise de l'eau pour le siège !
  - type: text
    content: Répare tes forteresses !
  - type: text
    content: Entre dans la boue, foule l'argile !
  - type: text
    content: Prends le moule à briques !
  '15':
  - type: text
    content: ' '
  - type: note
    content: '2.14 ; Jl 2.3. –  Entasse-toi  : litt. alourdis-toi ; rends-toi lourde  ; cf. Jg 7.12 ; Jr 46.23 ; Jl 2.2.'
  - type: text
    content: Là, le feu te dévorera,
  - type: text
    content: l'épée te retranchera,
  - type: text
    content: te dévorera comme des criquets.
  - type: heading
    content: Toute une population disparaît
  - type: text
    content: Entasse-toi comme les criquets !
  - type: text
    content: Entasse-toi comme les sauterelles !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'tes marchands  : cf. Ez 27.13,15,17 ; 28.16. –  plus que les étoiles  : cf. Gn 15.5 ; 22.17 ; Dt 1.10 ; Né 9.23 ; 1Ch 27.23. –  ouvre les ailes  : traduction incertaine ; on a aussi compris sort de sa chrysalide ou, collectivement, les criquets (Jl 1.4n) se déploient (cf. v. 17).'
  - type: text
    content: Tu as multiplié tes marchands
  - type: text
    content: 'plus que les étoiles du ciel :'
  - type: text
    content: le criquet ouvre les ailes et s'envole.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'gardes / officiers (ou scribes  ?) : les mots hébreux correspondants sont d''origine akkadienne et correspondent à des postes de l''administration assyrienne (cf. Jr 51.27n). –  sauterelles Jl 1.4n. –  nuée de criquets  : hébreu gov govi , identification incertaine. –  se posent  : litt. campent . –  sur les haies ou contre les murs  ; litt. dans les enclos (à bétail) . –  au temps  : litt. au jour . –  ils s''envolent ou ils sont chassés , mais le verbe hébreu correspondant est au singulier, de même plus loin pour le lieu qu''ils habitaient (litt. son lieu ) ; autre traduction de la fin  : et l''on ne sait plus où ils sont  ; cf. Es 17.14 ; Ps 103.16 ; Jb 7.10 ; Ap 18.21.'
  - type: text
    content: Tes gardes sont comme les sauterelles,
  - type: text
    content: tes officiers comme une nuée de criquets,
  - type: text
    content: 'qui se posent sur les haies au temps de la froidure :'
  - type: text
    content: le soleil se lève, ils s'envolent,
  - type: text
    content: et on ne reconnaît plus le lieu qu'ils habitaient.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'bergers Es 44.28 ; Jr 3.15 ; 10.21 ; 12.10. –  sommeillent Es 56.10. –  braves  : cf. 2.6n. –  demeurent immobiles  : litt. demeurent  ; LXX dorment , peut-être au sens de sont morts  ; cf. 1.14 ; Ps 94.17 ; voir aussi Es 5.27 ; Jr 51.39,57 ; Ez 32.22. –  dispersé sur les montagnes 1R 22.17 ; Jr 50.6,17 ; Ez 34.5s ; cf. Nb 27.17 ; Za 13.7 ; Mt 18.12. –  personne ne le rassemble Es 13.14 ; Jr 49.5.'
  - type: text
    content: Tes bergers sommeillent, roi d'Assyrie,
  - type: text
    content: 'tes braves demeurent immobiles :'
  - type: text
    content: ton peuple est dispersé sur les montagnes,
  - type: text
    content: et personne ne le rassemble.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'pas de soulagement Jr 10.19 ; 14.17 ; 30.12 ; 51.9. –  ta blessure Jr 4.6n  ; 6.14n. –  battront des mains  : de moquerie ou de dégoût ; cf. Ez 25.6 ; Ps 47.2 ; Jb 27.23 ; Lm 2.15. –  le mal que tu faisais 2.1 ; Es 10.7 ; 37.11ss ; Jon 1.2.'
  - type: text
    content: Il n'y a pas de soulagement pour ta blessure,
  - type: text
    content: ta plaie est mortelle.
  - type: text
    content: Tous ceux qui entendront parler de toi
  - type: text
    content: battront des mains sur toi ;
  - type: text
    content: sur qui le mal que tu faisais ne passait-il pas, constamment ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: Jr 47.3 ; cf. Jg 5.22n  ; Ez 26.10. –  bondissent Jl 2.5.
  - type: text
    content: Bruit du fouet,
  - type: text
    content: 'grondement des roues :'
  - type: text
    content: les chevaux galopent,
  - type: text
    content: les chars bondissent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 46.9 ; 51.27 ; Jl 2.4 ; Ha 1.8. –  des chars  : litt. de l''équipage (de char) ou de l''attelage . –  éclairs de lance Ha 3.11n. –  cadavres… Ex 12.30 ; 2R 19.35. –  On trébuche… Jr 46.12.'
  - type: text
    content: Assaut des chars,
  - type: text
    content: flamboiement d'épée,
  - type: text
    content: 'éclairs de lance :'
  - type: text
    content: multitude de victimes !
  - type: text
    content: une masse de cadavres !
  - type: text
    content: des morts à l'infini !
  - type: text
    content: On trébuche sur les morts…
  - type: heading
    content: Ninive couverte de honte
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ap 17.1–18.3. –  prostitution  : sans doute ici au sens de manœuvres politico-commerciales ; cf. v. 16 ; Es 23.15ss ; Ez 23.14ss ; voir aussi Os 1.2n. –  grâce / sortilèges  : cf. 2R 9.22 ; Es 47.8-12 ; Ap 9.21 ; 18.23 ; 19.2. –  vendait des nations  : cf. Dt 32.40 ; Jg 2.14+ ; 1S 12.9 ; Ez 30.12.'
  - type: text
    content: C'est à cause de toute la prostitution de la prostituée,
  - type: text
    content: pleine de grâce, maîtresse en sortilèges,
  - type: text
    content: elle qui vendait des nations par sa prostitution
  - type: text
    content: et des tribus par ses sortilèges.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''oppose à toi 2.14n. –  Je relèverai…  : cf. Es 47.2s ; Jr 13.22s,26 ; Ez 16.36ss ; Os 2.3ss ; Ha 2.15s ; Ap 17.16. –  ton ignominie  : le terme hébreu correspondant est également traduit par mépris  ; cf. Es 22.18 ; Jr 13.26 ; 46.12 ; Os 4.7,18 ; Ha 2.16 ; Pr 3.35+.'
  - type: text
    content: Je m'oppose à toi !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: text
    content: Je relèverai le bas de ta robe sur ton visage,
  - type: text
    content: je montrerai ta nudité aux nations,
  - type: text
    content: ton ignominie aux royaumes.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'des horreurs  : le mot hébreu s''applique à toute sorte d''impureté rituelle (Lv 7.21 ; 11.10ss) ; il désigne souvent les idoles ; cf. 1R 15.12n  ; Jr 4.1n  ; Ez 5.11. –  je te rabaisserai  : autre traduction je te rendrai folle  ; cf. Dt 32.15n  ; Jr 14.21n  ; Mi 7.6n  ; voir aussi Ml 2.9. –  je te donnerai en spectacle ou, selon certains, je ferai de toi un objet de crainte  : cf. Jr 15.4 ; Ez 28.17s.'
  - type: text
    content: Je jetterai sur toi des horreurs,
  - type: text
    content: je te rabaisserai
  - type: text
    content: et je te donnerai en spectacle.
  '7':
  - type: text
    content: ' '
  - type: note
    content: fuira… Jr 51.6 ; Ap 18.4. –  Ninive est ravagée So 2.13 ; cf. Es 21.2 ; 33.1 ; Jr 5.6 ; 6.26 ; 12.12 ; 15.8 ; Ap 18.17ss. –  Qui la plaindra Jr 15.5n. –  Où te chercherai-je ou, d'après LXX, où lui trouverai-je une consolation  ; cf. Ez 14.23 ; 16.54 ; Ps 69.21 ; Lm 1.2,9 ; 2.13.
  - type: text
    content: Ainsi, quiconque te verra fuira loin de toi
  - type: text
    content: 'et dira : Ninive est ravagée.'
  - type: text
    content: Qui la plaindra ?
  - type: text
    content: Où te chercherai-je des consolateurs ?
  - type: heading
    content: Ninive subira le même sort que Thèbes
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'No-Amôn (cf. Jr 46.25n) : probablement Thèbes, capitale de la Haute-Egypte, tombée aux mains des Assyriens en 663 av. J.-C. ; cf. Ez 30.14ss. –  les canaux  : litt. les fleuves ou les bras du fleuve  ; souvent, le mot désigne au singulier le Nil et au pluriel les bras de son delta, en Basse-Egypte ; cf. 1.4 ; Ez 29.3s ; voir aussi Jr 51.13 ; Ez 27.3 ; Ha 3.8 ; Ap 17.1. –  Son rempart  : avec une légère modification du texte hébreu traditionnel ; cf. Es 26.1 ; Lm 2.8. –  une mer  : la deuxième fois la majorité des versions anciennes ont lu des eaux , ce qui suppose une légère modification de la vocalisation traditionnelle ; certains ont vu dans ce verset une allusion aux ondulations taillées sur les remparts de Thèbes.'
  - type: text
    content: Es-tu en meilleure position que No-Amôn
  - type: text
    content: qui était assise entre les canaux,
  - type: text
    content: entourée par les eaux ?
  - type: text
    content: Son rempart était une mer,
  - type: text
    content: une mer sa muraille.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Koush , au sud de Thèbes : avec LXX on pourrait lire Koush (ou la Nubie , ou l''Ethiopie , cf. Gn 2.13n) était sa puissance illimitée (cf. 2.10+) ; c''est une dynastie koushite qui était au pouvoir à Thèbes lorsque la ville a été prise (cf. Es 18.1n  ; 20.5). –  Pouth  : vraisemblablement la Libye (Gn 10.6n  ; Es 66.19n  ; Jr 46.9 ; Ez 27.10 ; 30.5 ; 38.5 ; 1Ch 1.8) ; sur les Libyens , voir aussi 2Ch 12.3 ; 16.8 ; Dn 11.43. –  tes auxiliaires  : LXX, Syr ses auxiliaires.'
  - type: text
    content: Koush avait une puissance illimitée,
  - type: text
    content: ainsi que l'Egypte.
  - type: text
    content: Pouth et les Libyens étaient tes auxiliaires.
