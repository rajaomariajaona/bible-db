      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 15.9 ; 18.15.'
      marker-yv: yv-n
    - type: text
      text: 'Egypte engendra les Loudites, les Anamites, les Lehabites, les Naphtouhites, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
