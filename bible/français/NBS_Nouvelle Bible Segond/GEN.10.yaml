      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Patrosites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au sud de l''Egypte ; cf. Es 11.11 ; Jr 44.15 ; Ez 30.14. – Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Kaslouhites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont sans doute à rattacher aux '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kaphtorites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', car les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Philistins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(26.14,15,18 etc.) sont décrits comme originaires de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kaphtor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. de Crète ou de la côte sud de l''Asie Mineure, en Am 9.7 ; voir aussi Dt 2.23 ; Jr 47.4. A partir du XII'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C., les Philistins étaient implantés dans la région côtière de l''actuelle Gaza. C''est de leur nom que vient celui de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Palestine.
      marker-yv: yv-n
    - type: text
      text: les Patrosites, les Kaslouhites, d'où sont sortis les Philistins, et les Kaphtorites.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
