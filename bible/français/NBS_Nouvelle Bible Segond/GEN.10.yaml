document_id: GEN.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les peuples de la terre
  - type: heading
    content: 1Ch 1.5-23
  - type: text
    content: ' '
  - type: note
    content: 'Comme le montre le v. 32, ce chap. répartit l''humanité en trois groupes rattachés aux trois fils de Noé , selon leur implantation géographique (voir « La grande famille d''Abraham : Israël et ses voisins »♦) et selon leur langue (v. 5,20,31), d''après les critères de l''époque : On distinguera ainsi : 1) les peuples situés au nord-ouest du pays d''Israël, autour de la Méditerranée, et notamment les Grecs ( Japhet , v. 2-5) ; 2) les civilisations du « croissant fertile » ( Cham , v. 6-20) ; 3) les peuples du Proche-Orient, dont Israël ( Sem , v. 21-31 ; voir aussi 11.10-32). Cette « table des nations » comporte soixante-dix noms dans le texte hébreu traditionnel, soixante-douze dans LXX  ; cf. Dt 32.8n  ; Lc 10.1n  ; voir aussi non-Juifs. –  généalogie v. 32 ; 2.4n.'
  - type: text
    content: Voici la généalogie des fils de Noé, Sem, Cham et Japhet. Des fils naquirent d'eux après le déluge.
  '10':
  - type: note
    content: 'Il régna d''abord  : litt. le commencement (cf. 1.1n) de son royaume (comme en 20.9) fut. –  Babylone  : hébreu Babel (11.9n). –  Erek ou Ourouk, en Babylonie méridionale. –  Akkad peut désigner une ville au nord de la Babylonie et, plus généralement, la région de Babylone. –  Kalné  : cf. Es 10.9 ; Am 6.2 ( ?). –  Shinéar (11.2 ; 14.1,9 ; Jos 7.21 ; Es 11.11 ; Za 5.11 ; Dn 1.2) est également une désignation de la Babylonie, peut-être plus particulièrement en usage parmi les peuples situés à l''ouest de l''Euphrate.'
  - type: text
    content: 'Il régna d''abord sur Babylone, Erek, Akkad et Kalné, au pays de Shinéar. '
  '11':
  - type: note
    content: 'De ce pays-là…  : traduction incertaine ; on pourrait aussi comprendre  : De ce pays-là sortit Assyrie (hébreu ’Ashour, nom habituel de l''empire assyrien et de sa première capitale), cf. v. 22 ; 2.14n  ; voir aussi Nb 24.22n. –  il bâtit 11.4ss. –  Ninive, capitale de l''Assyrie 2R 19.36 ; Es 37.37 ; Jon 1.2 etc. ; Na 1.1 etc. ; So 2.13. –  Rehoboth  : Largeurs ou Places, cf. 26.22n. –  Kalah  : Puissance ( ?), aussi appelée Kalhou en akkadien, identifiée à Tell Nimroud sur le Tigre, à environ 35 km en aval de Ninive ; cf. v. 12.'
  - type: text
    content: 'De ce pays-là il sortit vers l''Assyrie ; il bâtit Ninive, la ville de Rehoboth, Kalah '
  '12':
  - type: note
    content: 'c''est la grande ville  : cette phrase pourrait s''appliquer à Résen, mais aussi à Kalah, capitale de l''Assyrie après Ashour (ou Assour) et avant Ninive (qui est aussi appelée grande ville en Jon 1.2 ; 3.2s ; 4.11).'
  - type: text
    content: 'et Résen, entre Ninive et Kalah : c''est la grande ville. '
  '13':
  - type: note
    content: 'Les noms énumérés ici désignent les habitants des différentes parties de l''Egypte. –  Loudites Jr 46.9. –  Naphtouhites  : cf. Jos 15.9 ; 18.15.'
  - type: text
    content: 'Egypte engendra les Loudites, les Anamites, les Lehabites, les Naphtouhites, '
  '14':
  - type: note
    content: 'Patrosites  : au sud de l''Egypte ; cf. Es 11.11 ; Jr 44.15 ; Ez 30.14. – Les Kaslouhites sont sans doute à rattacher aux Kaphtorites, car les Philistins (26.14,15,18 etc.) sont décrits comme originaires de Kaphtor, c.-à-d. de Crète ou de la côte sud de l''Asie Mineure, en Am 9.7 ; voir aussi Dt 2.23 ; Jr 47.4. A partir du XIIe s. av. J.-C., les Philistins étaient implantés dans la région côtière de l''actuelle Gaza. C''est de leur nom que vient celui de Palestine.'
  - type: text
    content: les Patrosites, les Kaslouhites, d'où sont sortis les Philistins, et les Kaphtorites.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Sidon  : une des villes des Phéniciens, port sur la Méditerranée (v. 19 etc.). –  Heth est probablement considéré comme l''ancêtre des Hittites (15.20 ; 23.3ss etc.) qui ont envahi le Proche-Orient à partir de l''Asie Mineure, aux XIVe et XIIIe s. av. J.-C. Plus tard le terme hittite a été étendu, dans l''usage mésopotamien, de façon à inclure toute la région à l''ouest de l''Euphrate, la Syrie et le pays d''Israël.'
  - type: text
    content: 'Canaan engendra Sidon, son premier-né, et Heth ; '
  '16':
  - type: note
    content: 'A partir d''ici et jusqu''au v. 19, les noms sont au singulier (collectif) dans le texte, comme régulièrement dans une telle liste de peuples  : le Jébusite, l''Amorite, etc. –  Jébusites  : habitants de Jébus, qui deviendra Jérusalem (Jos 15.8 ; 18.28 ; Jg 1.21 ; 19.10 ; 2S 5.6-9). Cette population était réputée être d''origine amorite et hittite (Ez 16.3,45). – Le terme Amorites désignait sans doute à l''origine les habitants de l''Amourrou, nom de la région située à l''ouest de l''Euphrate (Syrie et pays d''Israël) dans les textes babyloniens depuis le IIIe millénaire ; dans la Bible il s''applique en particulier à la région montagneuse centrale de Canaan (Nb 13.29 ; Dt 1.7,19s,44 ; Jos 11.3), et en général à l''ensemble de la population préisraélite (Gn 15.16 ; 48.22 ; Jos 10.12 ; Am 2.9s). – Les autres peuples cités jusqu''au v. 18 sont vraisemblablement d''anciens habitants de la Syrie ou de Canaan, mais il est difficile de les identifier plus précisément. Cf. Ex 3.8n.'
  - type: text
    content: 'et les Jébusites, les Amorites, les Guirgashites, '
  '17':
  - type: note
    content: Hivvites 34.2 ; 36.2 ; Ex 3.8 ; Jos 9.7 ; Jg 3.3.
  - type: text
    content: 'les Hivvites, les Arqites, les Sinites, '
  '18':
  - type: note
    content: 'Arvadites  : cf. Ez 27.8n,11.'
  - type: text
    content: 'les Arvadites, les Tsemarites, les Hamatites. Ensuite, les clans des Cananéens se dispersèrent. '
  '19':
  - type: note
    content: 'Le territoire  : autre traduction la frontière. – Sur la côte méditerranéenne, Sidon (10.15) marque la limite nord, Guérar (20.1ss ; 26.1ss) et Gaza (10.14n) la limite sud. –  Adma et Tseboïm sont au sud de la mer Morte, près de Sodome et Gomorrhe (13.10 ; 14.2,8 ; Dt 29.22 ; Os 11.8). –  Lésha n''a pas été identifiée.'
  - type: text
    content: 'Le territoire des Cananéens s''étendit depuis Sidon, du côté de Guérar, jusqu''à Gaza, et, du côté de Sodome, de Gomorrhe, d''Adma et de Tseboïm, jusqu''à Lésha. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Gomer  : sans doute les Cimmériens d''Asie Mineure (Ez 38.6). –  Magog  : peut-être les Lydiens de Gygès (Ez 38.2n  ; 39.6). –  Médie  : hébreu Madaï , qui désigne les Mèdes ou la Médie, au nord de la Perse (2R 17.6 ; 18.11 ; Es 13.17 ; 21.2 etc.). –  Grèce  : hébreu Yawân , désignation des Ioniens et, plus tard, des Grecs en général (Es 66.19 ; Ez 27.13 ; Za 9.13 ; Dn 8.21+). –  Toubal et Méshek  : sans doute en Asie Mineure, au sud de la mer Noire (Es 66.19n  ; Ez 27.13 ; 32.26 ; 38.2s ; 39.1 ; Ps 120.5). –  Tiras  : probablement les Tyrrhéniens ou Etrusques, habitants primitifs de l''Italie.'
  - type: text
    content: 'Les fils de Japhet furent : Gomer, Magog, Médie, Grèce, Toubal, Méshek et Tiras. '
  '20':
  - type: note
    content: V. 5n.
  - type: text
    content: Ce sont là les fils de Cham, clan par clan, langue par langue, dans leurs pays, dans leurs nations.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Sem v. 1n  ; 11.10ss. –  Héber (v. 24 ; 11.16) est sans doute à rattacher aux Hébreux (14.13 ; 39.14,17 ; 40.15 ; 41.12 ; 43.32). Selon certains, ce nom, qui viendrait d''une racine signifiant passer, traverser , les aurait désignés, d''un point de vue cananéen, comme ceux qui venaient d''au-delà (de l''est) du fleuve (l''Euphrate au temps des migrations d''Abraham, le Jourdain lors de la conquête ; Jos 3.14s ; 24.2s) ; il peut aussi être rattaché à la terminologie administrative des empires mésopotamiens, les désignant au contraire comme habitant au-delà (à l''ouest) de l''Euphrate ; on l''a souvent rapproché du terme Habirou ou ‘Apirou , qui s''appliquait, dans le Proche-Orient ancien, à un type de population sans attache géographique ou tribale fixe, et dès lors susceptible de se mettre au service de divers maîtres. Le mot hébreu s''applique encore à des esclaves en Ex 21.2 ; Dt 15.12 ; Jr 34.9,14 ; il n''apparaît que 34 fois dans la Bible hébraïque, le plus souvent dans la bouche d''étrangers ou du moins dans un contexte qui distingue les Hébreux de non-Israélites (voir aussi Ex 1.15s,19 ; 2.6,11,13 ; 3.18 ; 5.3 ; 7.16 ; 9.1,13 ; 10.3 ; 1S 4.6,9 ; 13.3,7,19 ; 14.11,21 ; 29.3 ; Jon 1.9). –  l''aîné  : on peut comprendre aussi bien frère aîné de Japhet (cf. 9.24,27) que frère de Japhet, celui-ci étant l''aîné (ainsi LXX).'
  - type: text
    content: 'Des enfants naquirent aussi de Sem, père de tous les fils de Héber et frère de Japhet, l''aîné. '
  '22':
  - type: note
    content: 'Elam  : à l''est du Tigre, autour de la ville de Suse ; 14.1,9 ; Es 11.11n  ; 21.2 ; 22.6 ; Jr 49.34ss ; Ez 32.24 ; Dn 8.2 ; Esd 4.9n. –  Assyrie  : cf. v. 11n. –  Arpakshad  : le nom d’Arpakshad désigne peut-être aussi une région à l''est du Tigre (Arrapah) v. 24 ; 11.10-13. –  Loud pourrait être la Lydie (voir Es 66.19 ; Ez 27.10 ; 30.5 ; mais cf. Gn 10.13). –  Aram  : les Araméens, habitants soit de Mésopotamie (en hébreu ’Aram naharayim, Aram des deux fleuves, 24.10), soit de Syrie (’Aram Damméseq, Aram de Damas, 2S 8.5).'
  - type: text
    content: 'Les fils de Sem furent : Elam, Assyrie, Arpakshad, Loud et Aram. '
  '23':
  - type: note
    content: 'Outs  : sans doute une région d''Arabie (22.21 ; 36.28 ; Jr 25.20 ; Jb 1.1 ; Lm 4.21).'
  - type: text
    content: 'Les fils d''Aram : Outs, Houl, Guéter et Mash. '
  '24':
  - type: note
    content: Entre Arpakshad (v. 22n) et Shélah LXX mentionne Kaïnan (hébreu Qénân), cf. 5.9 ; Lc 3.36 ; de même dans la généalogie de 11.10-17.
  - type: text
    content: 'Arpakshad engendra Shélah, et Shélah engendra Héber. '
  '25':
  - type: note
    content: 'Péleg  : du verbe traduit par fut partagée (ou divisée) ; allusion probable au récit de 11.1-9 ; cf. 11.18ss. –  Yoqtân signifie il est petit.'
  - type: text
    content: 'D''Héber il naquit deux fils : le nom du premier était Péleg, parce qu''en ses jours la terre fut partagée, et le nom de son frère était Yoqtân. '
  '26':
  - type: note
    content: 'Tribus arabes (jusqu''au v. 28). –  Hatsarmaveth  : peut-être l''Hadramaout au sud de la péninsule arabique.'
  - type: text
    content: 'Yoqtân engendra Almodad, Shéleph, Hatsarmaveth, Yerah, '
  '27':
  - type: note
    content: 'Ouzal  : cf. Ez 27.19n.'
  - type: text
    content: 'Hadoram, Ouzal, Diqla, '
  '28':
  - type: note
    content: 'Saba (hébreu Sheva’) : cf. v. 7n.'
  - type: text
    content: 'Obal, Abimaël, Saba, '
  '29':
  - type: note
    content: Ophir (1R 9.28 ; 10.11 ; 22.49 ; Es 13.12 ; Ps 45.10 ; Jb 22.24 ; 28.16) et Havila (Gn 2.11) sont des pays producteurs d'or, sans doute en Arabie.
  - type: text
    content: 'Ophir, Havila et Yobab. Tous ceux-là sont les fils de Yoqtân. '
  '3':
  - type: note
    content: 'Ashkenaz  : sans doute les Scythes (Jr 51.27). –  Togarma  : probablement une autre désignation (cf. v. 2) des Cimmériens ; voir Ez 27.14n  ; 38.6.'
  - type: text
    content: 'Les fils de Gomer : Ashkenaz, Riphath et Togarma. '
  '30':
  - type: note
    content: Noms de lieux inconnus. –  de l'est ou de l'orient 2.8n  ; cf. Nb 23.7 ; Dt 33.15n.
  - type: text
    content: Leurs lieux d'habitation s'étendent depuis Mésha, du côté de Sephar, jusqu'aux montagnes de l'est.
  '31':
  - type: text
    content: ' '
  - type: note
    content: V. 5n.
  - type: text
    content: 'Ce sont les fils de Sem, clan par clan, langue par langue, dans leurs pays, nation par nation. '
  '32':
  - type: note
    content: généalogie 2.4n.
  - type: text
    content: Voilà les clans des fils de Noé, selon leur généalogie, dans leurs nations. C'est à partir d'eux que les nations se sont réparties sur la terre après le déluge.
  '4':
  - type: note
    content: 'Elisha est traditionnellement identifié à Alashaïa, appellation babylonienne de Chypre  ; certains croient cependant que ce nom désignerait plutôt Carthage  ; d''autres pensent qu''il serait une déformation de celui d’Ulysse et s''appliquerait à des îles Ioniennes, en particulier Ithaque, dont l’Odyssée célèbre la pourpre (cf. Ez 27.6s). –  Tarsis  : port de la péninsule ibérique et, par extension, la péninsule elle-même (Es 23.6 ; 66.19 ; Jr 10.9 ; Ez 27.12 ; Jon 1.3n etc.). –  Chypre  : en hébreu Kittim (pluriel), qui désigne Chypre et ses habitants, et par extension tous les peuples navigants, y compris les Grecs (Nb 24.24 ; Es 23.1 ; Jr 2.10 ; Ez 27.6 ; Dn 11.30). –  Rhodes  : hébreu Rodanim, d''après certains mss hébreux et des versions anciennes (LXX p. ex.), comme en 1Ch 1.7 ; cf. Ez 27.15n. Le texte hébreu traditionnel porte ici Dodanim (les équivalents hébreux des lettres d et r se confondent facilement), que d''autres modifient différemment pour traduire les Dananéens.'
  - type: text
    content: 'Les fils de Grèce : Elisha et Tarsis, Chypre et Rhodes. '
  '5':
  - type: note
    content: 'C''est par eux qu''ont été peuplées  : litt. à partir d''eux furent réparties  ; cf. v. 32. –  îles  : le mot hébreu désigne aussi les régions côtières, cf. Es 11.11+. –  langue v. 20,31 ; cf. 11.1. –  clan 8.19n.'
  - type: text
    content: C'est par eux qu'ont été peuplées les îles des nations dans leurs pays, chacun selon sa langue, clan par clan, dans leurs nations.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Koush ou Nubie  : cf. v. 8n  ; voir 2.13n. –  Egypte  : hébreu Mitsrayim (12.10 etc.). –  Pouth  : sans doute la Libye (Es 66.19n  ; Jr 46.9 ; Ez 27.10 ; 30.5 ; 38.5 ; Na 3.9). –  Canaan 9.18n,25, voir v. 15-19.'
  - type: text
    content: 'Les fils de Cham furent : Koush, Egypte, Pouth et Canaan. '
  '7':
  - type: note
    content: 'Tous les noms de ce v. désignent de petits royaumes d''Arabie (cf. v. 28s). –  Seba Es 43.3n  ; 1Ch 1.9. –  Havila 2.11n. –  Rama Ez 27.22. –  Saba  : hébreu Sheva’ v. 28 ; 25.3 ; 1R 10/ / ; Es 60.6n  ; Jr 6.20 ; Ez 27.22s ; 38.13 ; Jl 4.8 ; Ps 72.10,15 ; Jb 1.15 ; 6.19. –  Dedân 25.3 ; Jr 25.23 ; 49.8 ; Ez 25.13 ; 27.15,20 ; 38.13.'
  - type: text
    content: 'Les fils de Koush : Seba, Havila, Sabta, Rama et Sabteka. Les fils de Rama : Saba et Dedân. '
  '8':
  - type: note
    content: 'Koush  : certains pensent qu''à la différence du v. 6n, ce nom désigne ici l''éponyme ou ancêtre des Kassites, un peuple qui a dominé Babylone entre le XVIe et le XIIe s. av. J.-C. –  Nemrod ou Nimrod  : ce nom, qui pourrait signifier en hébreu nous nous révolterons, rappelle probablement celui du principal dieu de Babylone, Mardouk, ou celui de Ninourta, dieu de la guerre et de la chasse ; il pourrait conserver le souvenir d''un roi assyrien ou babylonien dont le nom incluait celui de la divinité ; voir aussi Mi 5.5. –  héros  : cf. 6.4 ; c''est le même mot hébreu qui sera traduit par vaillant au v. 9 ; il est souvent rendu par guerrier  ; cf. Jg 6.12+.'
  - type: text
    content: 'Koush engendra aussi Nemrod ; c''est lui qui, le premier, fut un héros sur la terre. '
  '9':
  - type: note
    content: 'vaillant  : cf. v. 8n. –  chasseur 25.27 etc. Les rois de Mésopotamie apparaissent souvent sur les fresques aux prises avec des lions ; leurs exploits de chasse leur confèrent un statut de bienfaiteurs et fondent leur pouvoir politique. –  devant le Seigneur  : cf. Jon 3.2n.'
  - type: text
    content: 'Il fut un vaillant chasseur devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est pourquoi l''on dit : « Comme Nemrod, vaillant chasseur devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. » '
