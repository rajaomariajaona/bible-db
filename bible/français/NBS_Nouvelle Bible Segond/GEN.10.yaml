        - type: text
          text: Kalah
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Puissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?), aussi appelée '
      - type: usfm
