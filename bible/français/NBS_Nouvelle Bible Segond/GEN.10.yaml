      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Comme le montre le v. 32, ce chap. répartit l''humanité en trois groupes rattachés aux trois '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de Noé'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon leur implantation géographique (voir « La grande famille d''Abraham : Israël et ses voisins »♦) et selon leur langue (v. 5,20,31), d''après les critères de l''époque : On distinguera ainsi : 1) les peuples situés au nord-ouest du pays d''Israël, autour de la Méditerranée, et notamment les Grecs ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Japhet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 2-5) ; 2) les civilisations du « croissant fertile » ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 6-20) ; 3) les peuples du Proche-Orient, dont Israël ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 21-31 ; voir aussi 11.10-32). Cette « table des nations » comporte soixante-dix noms dans le texte hébreu traditionnel, soixante-douze dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '  ; cf. Dt 32.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 10.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'généalogie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 32 ; 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Voici la généalogie des fils de Noé, Sem, Cham et Japhet. Des fils naquirent d'eux après le déluge.
