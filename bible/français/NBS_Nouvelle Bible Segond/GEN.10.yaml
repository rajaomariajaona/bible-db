        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il bâtit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.4ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ninive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', capitale de l''Assyrie 2R 19.36 ; Es 37.37 ; Jon 1.2 etc. ; Na 1.1 etc. ; So 2.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rehoboth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Largeurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Places
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 26.22'
        - type: usfm
          marker: ord
          children:
          - type: text
