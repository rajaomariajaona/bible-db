      - type: usfm
        marker: fq
        children:
        - type: text
          text: Babylone
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Babel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (11.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Erek '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ourouk
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en Babylonie méridionale. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Akkad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'peut désigner une ville au nord de la Babylonie et, plus généralement, la région de Babylone. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kalné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 10.9 ; Am 6.2 ( ?). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shinéar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (11.2 ; 14.1,9 ; Jos 7.21 ; Es 11.11 ; Za 5.11 ; Dn 1.2) est également une désignation de la Babylonie, peut-être plus particulièrement en usage parmi les peuples situés à l'ouest de l'Euphrate.
      marker-yv: yv-n
    - type: text
      text: 'Il régna d''abord sur Babylone, Erek, Akkad et Kalné, au pays de Shinéar. '
  '11':
