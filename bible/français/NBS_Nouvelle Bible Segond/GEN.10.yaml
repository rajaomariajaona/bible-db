      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : une des villes des Phéniciens, port sur la Méditerranée (v. 19 etc.). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Heth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est probablement considéré comme l'ancêtre des Hittites (15.20 ; 23.3ss etc.) qui ont envahi le Proche-Orient à partir de l'Asie Mineure, aux XIV
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' et XIII'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C. Plus tard le terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hittite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: a été étendu, dans l'usage mésopotamien, de façon à inclure toute la région à l'ouest de l'Euphrate, la Syrie et le pays d'Israël.
      marker-yv: yv-n
    - type: text
      text: 'Canaan engendra Sidon, son premier-né, et Heth ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A partir d'ici et jusqu'au v. 19, les noms sont au singulier (collectif) dans le texte, comme régulièrement dans une telle liste de peuples
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le Jébusite, l'Amorite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jébusites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : habitants de Jébus, qui deviendra Jérusalem (Jos 15.8 ; 18.28 ; Jg 1.21 ; 19.10 ; 2S 5.6-9). Cette population était réputée être d''origine amorite et hittite (Ez 16.3,45). – Le terme '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amorites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désignait sans doute à l'origine les habitants de l'Amourrou, nom de la région située à l'ouest de l'Euphrate (Syrie et pays d'Israël) dans les textes babyloniens depuis le III
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' millénaire ; dans la Bible il s''applique en particulier à la région montagneuse centrale de Canaan (Nb 13.29 ; Dt 1.7,19s,44 ; Jos 11.3), et en général à l''ensemble de la population préisraélite (Gn 15.16 ; 48.22 ; Jos 10.12 ; Am 2.9s). – Les autres peuples cités jusqu''au v. 18 sont vraisemblablement d''anciens habitants de la Syrie ou de Canaan, mais il est difficile de les identifier plus précisément. Cf. Ex 3.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et les Jébusites, les Amorites, les Guirgashites, '
