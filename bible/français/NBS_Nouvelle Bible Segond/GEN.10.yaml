    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les noms énumérés ici désignent les habitants des différentes parties de l''Egypte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Loudites '
      - type: usfm
        marker: ft
        children:
        - type: text
