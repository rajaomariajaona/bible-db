document_id: JOB.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job (suite) : Dieu ne m''a fait naître que pour me détruire'
  - type: text
    content: ' '
  - type: note
    content: 'à ma plainte  : le texte hébreu ajoute sur moi , peut-être au sens de sur mon sort , LXX sur lui , c.-à-d. sur (ou contre ) Dieu . –  amertume 7.11+.'
  - type: text
    content: Je suis dégoûté de ma vie !
  - type: text
    content: Je vais donner libre cours à ma plainte,
  - type: text
    content: je vais parler dans mon amertume.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Sagesse 7.1s : « Je suis moi aussi un homme mortel, égal à tous, descendant du premier qui fut modelé de terre. Dans le ventre d''une mère, j''ai été sculpté en chair durant dix mois, ayant pris consistance dans le sang à partir d''une semence d''homme et du plaisir qui accompagne le sommeil. »'
  - type: text
    content: Ne m'as-tu pas coulé comme du lait ?
  - type: text
    content: Ne m'as-tu pas caillé comme du fromage ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: Jr 1.5 ; Ps 139.13.
  - type: text
    content: Tu m'as revêtu de peau et de chair,
  - type: text
    content: tu m'as tissé d'os et de tendons ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'vigueur  : selon un des sens possibles du terme hébreu traduit le plus souvent par fidélité  ; autres traductions éclat ; ta fidélité  ; cf. Es 40.6n. –  mon souffle ou mon esprit.'
  - type: text
    content: tu m'as accordé vie et vigueur,
  - type: text
    content: tes soins ont gardé mon souffle.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Voir cœur. –  ce qui était…  : litt. que ceci (est) avec (ou chez ) toi.'
  - type: text
    content: Mais voilà ce que tu réservais dans ton cœur,
  - type: text
    content: 'je sais ce qui était dans ta pensée :'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 7.21.
  - type: text
    content: si je pèche, tu m'observes,
  - type: text
    content: et tu ne me tiens pas pour innocent de ma faute.
  '15':
  - type: text
    content: ' '
  - type: note
    content: '9.20. – Voir justice. –  mépris Pr 3.35+. –  absorbé  : le mot hébreu n''apparaît qu''ici ; certains comprennent ivre d''affliction . –  affliction ou humiliation , cf. 22.29 ; 30.11,16,27 ; 36.8,15,21 ; 37.23 ; voir aussi Dt 8.2n.'
  - type: text
    content: Si je suis un méchant, quel malheur pour moi !
  - type: text
    content: Si je suis un juste, je n'ose lever la tête,
  - type: text
    content: rassasié de mépris et absorbé dans mon affliction.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'si j''ose la redresser  : litt. s''il se redresse (le mot correspondant à tête est du masculin en hébreu). Des versions anciennes ont lu je suis épuisé . –  comme un lion 16.9.'
  - type: text
    content: Et si j'ose la redresser, tu me pourchasses comme un lion ;
  - type: text
    content: tu fais encore à mes dépens des exploits étonnants,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'une armée… pour m''assaillir  : litt. relèves et armée avec moi  ; cf. 15.24 ; 16.14.'
  - type: text
    content: tu m'opposes de nouveaux témoins,
  - type: text
    content: ta contrariété à mon sujet augmente,
  - type: text
    content: une armée prend la relève pour m'assaillir.
  '18':
  - type: text
    content: ' '
  - type: note
    content: '3.1+,11. –  du ventre de ma mère  : autre traduction du sein maternel.'
  - type: text
    content: Pourquoi m'as-tu fait sortir du ventre de ma mère ?
  - type: text
    content: J'aurais expiré, aucun œil ne m'aurait vu ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 3.16+.
  - type: text
    content: je serais comme si je n'avais jamais existé,
  - type: text
    content: j'aurais été porté du ventre de ma mère à la tombe.
  '2':
  - type: text
    content: ' '
  - type: note
    content: '6.24+. –  Ne me condamne pas  : autre traduction ne me déclare pas méchant  ; cf. v. 7 ; 9.20n.'
  - type: text
    content: 'Je dis à Dieu : Ne me condamne pas !'
  - type: text
    content: Fais-moi savoir de quoi tu m'accuses !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Mes jours… 7.7+ ; autre traduction le petit nombre de mes jours ne va-t-il pas cesser ? –  Qu''il se retire…  : cf. 7.19+.'
  - type: text
    content: Mes jours ne sont-ils pas en petit nombre ?
  - type: text
    content: Qu'il me laisse !
  - type: text
    content: Qu'il se retire de moi,
  - type: text
    content: et que je reprenne un peu courage,
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'ténèbres / ombre de mort  : cf. 3.5n.'
  - type: text
    content: avant que je m'en aille, pour ne plus revenir,
  - type: text
    content: au pays des ténèbres et de l'ombre de mort,
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'd''obscurité totale  : litt. comme l''obscurité , comme à la fin du v. le texte hébreu accumule les synonymes. –  où la lumière est comme l''obscurité  : litt. et brille (v. 3) comme l''obscurité , traduction incertaine ; cf. 38.17.'
  - type: text
    content: pays de ténèbres profondes, d'obscurité totale,
  - type: text
    content: ombre de mort, où ne règne aucun ordre,
  - type: text
    content: où la lumière est comme l'obscurité !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'rejeter  : autre traduction mépriser  ; cf. 5.17 ; 7.16n. –  le produit de ton travail  : litt. la fatigue de tes mains  ; cf. 39.11,16n  ; Gn 31.42n  ; Ag 1.11. –  faire briller…  : c.-à-d. favoriser les projets des méchants.'
  - type: text
    content: Te paraît-il bien d'exercer l'oppression,
  - type: text
    content: de rejeter le produit de ton travail
  - type: text
    content: et de faire briller ta lumière sur les projets des méchants ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 21.4 ; 1S 16.7 ; Os 11.9. –  mortel 4.17n.
  - type: text
    content: As-tu des yeux de chair,
  - type: text
    content: vois-tu comme voit un mortel ?
  '5':
  - type: text
    content: Tes jours sont-ils comme les jours d'un mortel,
  - type: text
    content: et tes années comme les jours d'un homme,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 14.16.
  - type: text
    content: pour que tu cherches ma faute,
  - type: text
    content: pour que tu t'enquières de mon péché,
  '7':
  - type: text
    content: ' '
  - type: note
    content: un méchant v. 2n,15 ; 9.29. –  personne ne délivre Dt 32.39.
  - type: text
    content: sachant bien que je ne suis pas un méchant,
  - type: text
    content: et que personne ne délivre de ta main ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'façonné Gn 2.7 ; Ps 119.73. –  tout entier  : traduction conjecturale (litt. ensemble, tout autour ) ; certains, s''inspirant de LXX et Syr, modifient le texte hébreu traditionnel pour lire et, changeant d''avis, tu m''engloutirais ? Cf. 2.3n.'
  - type: text
    content: Tes mains m'ont façonné, elles m'ont fait
  - type: text
    content: tout entier… Et tu m'engloutirais !
  '9':
  - type: text
    content: ' '
  - type: note
    content: argile 33.6 ; Es 64.7. –  à la poussière Gn 3.19.
  - type: text
    content: Souviens-toi, je t'en prie, que tu m'as fait comme avec de l'argile ;
  - type: text
    content: voudrais-tu me faire retourner à la poussière ?
