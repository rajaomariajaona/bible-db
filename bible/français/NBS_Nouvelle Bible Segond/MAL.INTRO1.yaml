document_id: MAL.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Plusieurs indices convergent vers une '
  - type: text
    content: datation
  - type: text
    content: ' du livret de Malachie entre 473 et 430 av. J.-C. : la mention du '
  - type: text
    content: gouverneur
  - type: text
    content: ' (1.8) évoque selon toute vraisemblance la domination perse ; la pratique du culte sacrificiel, dans un temple visiblement reconstruit, suggère que nous sommes après 512 av. J.-C. ; enfin la polémique contre les mariages avec des étrangères semble annoncer celle d''Esdras, plus radicale encore.'
  - type: text
    content: Malachie
  - type: text
    content: ' signifie « mon messager » ou « mon ange* » (voir 3.1 où le même mot est employé). La vénérable version grecque des '
  - type: text
    content: Septante
  - type: text
    content: ' (LXX*) l''a interprété comme un nom commun, en traduisant '
  - type: text
    content: son messager
  - type: text
    content: ' (ce qui correspondrait à l''hébreu '
  - type: text
    content: mal'ako
  - type: text
    content: ' au lieu de '
  - type: text
    content: mal'aki
  - type: text
    content: ). La tradition cependant y a vu le nom propre de l'auteur.
  - type: text
    content: 'Le procédé d''exposition relève d''un style très particulier : celui du '
  - type: text
    content: dialogue fictif
  - type: text
    content: ' avec un opposant. Il est possible, sans trop presser le sens, de distinguer alors une série de six argumentations. En voici les contours :'
  - type: text
    content: 'I. 1.2-5 :'
  - type: text
    content: ' A la '
  - type: text
    content: question
  - type: text
    content: ' « le Seigneur (YHWH) nous aime-t-il vraiment ? » (cf. 1.2), la '
  - type: text
    content: prophétie
  - type: text
    content: ' répond en invoquant l''exemple troublant de la préférence de Dieu pour Jacob (= Israël) au détriment d''Esaü (= Edom). Aux yeux du prophète, la récente conquête d''Edom par les Arabes nabatéens prouve que l''antique promesse est toujours en vigueur.'
  - type: text
    content: 'II. 1.6–2.9 :'
  - type: text
    content: ' A la '
  - type: text
    content: question
  - type: text
    content: ' « à quoi bon le culte, puisque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne nous est tout de même pas favorable ? » (cf. 1.7,9), la '
  - type: text
    content: prophétie
  - type: text
    content: ' répond par l''énumération des tricheries du peuple et de ses prêtres dans l''exercice du culte. Avec des offrandes défectueuses et des prêtres infidèles, Lévi renie l''alliance de paix que Dieu avait conclue avec lui pour le sacerdoce (2.4-8). Le prophète incite ses lecteurs à la jalousie en affirmant que le nom du Seigneur (YHWH) est '
  - type: text
    content: grand parmi les nations
  - type: text
    content: ' (1.11) — ce qui pouvait évoquer, au moins pour les prêtres, l''idée scandaleuse d''un culte non juif supérieur à celui des « fils » même de YHWH (1.6).'
  - type: text
    content: 'III. 2.10-16 :'
  - type: text
    content: ' A la '
  - type: text
    content: question
  - type: text
    content: ' « pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a-t-il plus égard aux offrandes ? » (cf. 2.13s), la '
  - type: text
    content: prophétie
  - type: text
    content: ' répond en plaçant le débat sur le plan de la conduite individuelle en matière matrimoniale. Mariages étrangers et répudiations caractérisent en effet le laxisme spirituel des déçus de la restauration. « Nous avons tous le même ancêtre, commun à Israël et à Edom : c''est Isaac », disent-ils. L''alliance des patriarches est le fait du même Dieu, semble encore plaider l''auteur de l'''
  - type: text
    content: abomination
  - type: text
    content: ' notoire commise à Jérusalem (2.11). Mais les choses se corsent encore davantage en 2.14s. Selon certains, ces versets viseraient le comportement du grand prêtre, qui aurait répudié la femme de sa jeunesse pour épouser ensuite une jeune Edomite dont il attendait une descendance divine. Mais Dieu ne prêtera pas son appui à de pareilles infidélités : '
  - type: text
    content: détestable est la répudiation
  - type: text
    content: ' (2.16).'
  - type: text
    content: 'IV. 2.17–3.6 :'
  - type: text
    content: ' A la '
  - type: text
    content: question
  - type: text
    content: ' « où est la justice de Dieu, si celui-ci reste indifférent au mal ? » (cf. 2.17), la '
  - type: text
    content: prophétie
  - type: text
    content: ' répond que le jour du jugement vient, terrible et soudain (3.1s). Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en sera l''artisan. Son jugement purifiera la caste sacerdotale et rétablira ainsi les conditions d''un vrai culte dont les offrandes seront agréées (3.3). Du même coup la sorcellerie, les faux témoignages et l''injustice disparaîtront.'
  - type: text
    content: 'V. 3.7-12 :'
  - type: text
    content: ' A la '
  - type: text
    content: question
  - type: text
    content: ' « en quoi devons-nous revenir à Dieu ? » (cf. 3.7), la '
  - type: text
    content: prophétie
  - type: text
    content: ' répond en évoquant une sécheresse et une invasion de sauterelles (3.11), qu''elle présente comme la conséquence des fraudes commises à l''égard de l''impôt du temple (3.10). Le cœur partagé conduit à un culte de pure forme où la relation avec le Seigneur est rompue. La loyauté dans ce domaine, en revanche, ferait de Juda un '
  - type: text
    content: pays de délices
  - type: text
    content: ' (3.12).'
  - type: text
    content: 'VI. 3.13-21 :'
  - type: text
    content: ' A la '
  - type: text
    content: question
  - type: text
    content: ' « qu''avons-nous gagné à observer les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et à porter le deuil devant lui ? » (cf. 3.14), la '
  - type: text
    content: prophétie
  - type: text
    content: ' répond que ceux qui honorent le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ne seront pas oubliés : un livre conservera leur souvenir (3.16). La justice s''exercera au jour du '
  - type: text
    content: Seigneur
  - type: text
    content: . Elle éliminera les hautains et les méchants ; mais ce sera la gloire des serviteurs fidèles au soleil de sa justice (3.18ss).
  - type: text
    content: 'La '
  - type: text
    content: conclusion générale
  - type: text
    content: ' ('
  - type: text
    content: 3.22-24
  - type: text
    content: ) exhorte à observer la loi de Moïse et désigne Elie, le prophète, comme le héraut de la justice à venir et l'agent d'une conversion massive du peuple. Cette conclusion s'applique d'abord au livret de Malachie, mais elle con-vient admirablement pour clore le cycle entier de la prophétie biblique.
  - type: text
    content: Parmi les thèmes propres à cet écrit et qui méritent quelque réflexion, on doit citer la reprise de l'idéal réformateur pour lequel la
  - type: text
    content: doctrine
  - type: text
    content: ' et le'
  - type: text
    content: culte
  - type: text
    content: ' sont des éléments essentiels de la vie de la communauté sainte ; l''élargissement des perspectives à '
  - type: text
    content: toutes les nations
  - type: text
    content: ' (1.11) ; le refus des arguties en matière de '
  - type: text
    content: mariages mixtes
  - type: text
    content: ' (2.10) ; le thème du '
  - type: text
    content: jugement purificateur
  - type: text
    content: ' (chap. 3) ; la métaphore du '
  - type: text
    content: soleil de la justice
  - type: text
    content: ' (3.20), unique dans la Bible et qui, comprise du Christ, a largement influencé la fixation de la fête de Noël au solstice d''hiver.'
  - type: text
    content: On sait le relief que prendra dans les évangiles la figure d'
  - type: text
    content: Elie
  - type: text
    content: '  : type et modèle de Jean le Baptiseur (cf. Mt 11.14 ; 16.14 ; 17.10ss/ /), mais aussi, à la Transfiguration, symbole de la prédication des prophètes aux côtés du législateur Moïse (Mt 17.3s/ /). Nul doute, donc, que le livre « Malachie » est apparu aux premiers chrétiens comme un tremplin vers l''Evangile.'
