document_id: MAL.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Plusieurs indices convergent vers une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: datation
  - type: text
    text: ' du livret de Malachie entre 473 et 430 av. J.-C. : la mention du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gouverneur
  - type: text
    text: ' (1.8) évoque selon toute vraisemblance la domination perse ; la pratique du culte sacrificiel, dans un temple visiblement reconstruit, suggère que nous sommes après 512 av. J.-C. ; enfin la polémique contre les mariages avec des étrangères semble annoncer celle d''Esdras, plus radicale encore.'
- type: usfm
  marker: ip
  children:
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Malachie
  - type: text
    text: ' signifie « mon messager » ou « mon ange* » (voir 3.1 où le même mot est employé). La vénérable version grecque des '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante
  - type: text
    text: ' (LXX*) l''a interprété comme un nom commun, en traduisant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: son messager
  - type: text
    text: ' (ce qui correspondrait à l''hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mal'ako
  - type: text
    text: ' au lieu de '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mal'aki
  - type: text
    text: ). La tradition cependant y a vu le nom propre de l'auteur.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le procédé d''exposition relève d''un style très particulier : celui du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: dialogue fictif
  - type: text
    text: ' avec un opposant. Il est possible, sans trop presser le sens, de distinguer alors une série de six argumentations. En voici les contours :'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'I. 1.2-5 :'
  - type: text
    text: ' A la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: question
  - type: text
    text: ' « le Seigneur (YHWH) nous aime-t-il vraiment ? » (cf. 1.2), la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prophétie
  - type: text
    text: ' répond en invoquant l''exemple troublant de la préférence de Dieu pour Jacob (= Israël) au détriment d''Esaü (= Edom). Aux yeux du prophète, la récente conquête d''Edom par les Arabes nabatéens prouve que l''antique promesse est toujours en vigueur.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'II. 1.6–2.9 :'
  - type: text
    text: ' A la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: question
  - type: text
    text: ' « à quoi bon le culte, puisque le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne nous est tout de même pas favorable ? » (cf. 1.7,9), la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prophétie
  - type: text
    text: ' répond par l''énumération des tricheries du peuple et de ses prêtres dans l''exercice du culte. Avec des offrandes défectueuses et des prêtres infidèles, Lévi renie l''alliance de paix que Dieu avait conclue avec lui pour le sacerdoce (2.4-8). Le prophète incite ses lecteurs à la jalousie en affirmant que le nom du Seigneur (YHWH) est '
  - type: usfm
    marker: it
    children:
    - type: text
      text: grand parmi les nations
  - type: text
    text: ' (1.11) — ce qui pouvait évoquer, au moins pour les prêtres, l''idée scandaleuse d''un culte non juif supérieur à celui des « fils » même de YHWH (1.6).'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'III. 2.10-16 :'
  - type: text
    text: ' A la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: question
  - type: text
    text: ' « pourquoi le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' n''a-t-il plus égard aux offrandes ? » (cf. 2.13s), la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prophétie
  - type: text
    text: ' répond en plaçant le débat sur le plan de la conduite individuelle en matière matrimoniale. Mariages étrangers et répudiations caractérisent en effet le laxisme spirituel des déçus de la restauration. « Nous avons tous le même ancêtre, commun à Israël et à Edom : c''est Isaac », disent-ils. L''alliance des patriarches est le fait du même Dieu, semble encore plaider l''auteur de l'''
  - type: usfm
    marker: it
    children:
    - type: text
      text: abomination
  - type: text
    text: ' notoire commise à Jérusalem (2.11). Mais les choses se corsent encore davantage en 2.14s. Selon certains, ces versets viseraient le comportement du grand prêtre, qui aurait répudié la femme de sa jeunesse pour épouser ensuite une jeune Edomite dont il attendait une descendance divine. Mais Dieu ne prêtera pas son appui à de pareilles infidélités : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: détestable est la répudiation
  - type: text
    text: ' (2.16).'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'IV. 2.17–3.6 :'
  - type: text
    text: ' A la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: question
  - type: text
    text: ' « où est la justice de Dieu, si celui-ci reste indifférent au mal ? » (cf. 2.17), la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prophétie
  - type: text
    text: ' répond que le jour du jugement vient, terrible et soudain (3.1s). Le messager du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en sera l''artisan. Son jugement purifiera la caste sacerdotale et rétablira ainsi les conditions d''un vrai culte dont les offrandes seront agréées (3.3). Du même coup la sorcellerie, les faux témoignages et l''injustice disparaîtront.'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'V. 3.7-12 :'
  - type: text
    text: ' A la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: question
  - type: text
    text: ' « en quoi devons-nous revenir à Dieu ? » (cf. 3.7), la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prophétie
  - type: text
    text: ' répond en évoquant une sécheresse et une invasion de sauterelles (3.11), qu''elle présente comme la conséquence des fraudes commises à l''égard de l''impôt du temple (3.10). Le cœur partagé conduit à un culte de pure forme où la relation avec le Seigneur est rompue. La loyauté dans ce domaine, en revanche, ferait de Juda un '
  - type: usfm
    marker: it
    children:
    - type: text
      text: pays de délices
  - type: text
    text: ' (3.12).'
- type: usfm
  marker: im
  children:
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 'VI. 3.13-21 :'
  - type: text
    text: ' A la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: question
  - type: text
    text: ' « qu''avons-nous gagné à observer les commandements du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et à porter le deuil devant lui ? » (cf. 3.14), la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: prophétie
  - type: text
    text: ' répond que ceux qui honorent le nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) ne seront pas oubliés : un livre conservera leur souvenir (3.16). La justice s''exercera au jour du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: . Elle éliminera les hautains et les méchants ; mais ce sera la gloire des serviteurs fidèles au soleil de sa justice (3.18ss).
- type: usfm
  marker: im
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: conclusion générale
  - type: text
    text: ' ('
  - type: usfm
    marker: bd
    children:
    - type: text
      text: 3.22-24
  - type: text
    text: ) exhorte à observer la loi de Moïse et désigne Elie, le prophète, comme le héraut de la justice à venir et l'agent d'une conversion massive du peuple. Cette conclusion s'applique d'abord au livret de Malachie, mais elle con-vient admirablement pour clore le cycle entier de la prophétie biblique.
- type: usfm
  marker: ip
  children:
  - type: text
    text: Parmi les thèmes propres à cet écrit et qui méritent quelque réflexion, on doit citer la reprise de l'idéal réformateur pour lequel la
  - type: usfm
    marker: bd
    children:
    - type: text
      text: doctrine
  - type: text
    text: ' et le'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: culte
  - type: text
    text: ' sont des éléments essentiels de la vie de la communauté sainte ; l''élargissement des perspectives à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: toutes les nations
  - type: text
    text: ' (1.11) ; le refus des arguties en matière de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mariages mixtes
  - type: text
    text: ' (2.10) ; le thème du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: jugement purificateur
  - type: text
    text: ' (chap. 3) ; la métaphore du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: soleil de la justice
  - type: text
    text: ' (3.20), unique dans la Bible et qui, comprise du Christ, a largement influencé la fixation de la fête de Noël au solstice d''hiver.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: On sait le relief que prendra dans les évangiles la figure d'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Elie
  - type: text
    text: '  : type et modèle de Jean le Baptiseur (cf. Mt 11.14 ; 16.14 ; 17.10ss/ /), mais aussi, à la Transfiguration, symbole de la prédication des prophètes aux côtés du législateur Moïse (Mt 17.3s/ /). Nul doute, donc, que le livre « Malachie » est apparu aux premiers chrétiens comme un tremplin vers l''Evangile.'
