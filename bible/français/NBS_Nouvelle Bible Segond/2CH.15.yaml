    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Dieu fut sur…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 20.14 ; Nb 24.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 3.10 ; 11.29 ; 1S 19.20 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Azaria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '‘Azaryahou '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 1R 4.2+), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'YHWH est venu en aide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au secours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; il n'est mentionné nulle part ailleurs.
      marker-yv: yv-n
    - type: text
      text: 'Le souffle de Dieu fut sur Azaria, fils d''Oded, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le troisième mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mois de Sivan (mai-juin). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la quinzième année du règne d''Asa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ≈ 896/5 av. J.-C.
      marker-yv: yv-n
    - type: text
      text: 'Ils se rassemblèrent à Jérusalem le troisième mois de la quinzième année du règne d''Asa. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifièrent
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1.6 ; 5.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le butin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être celui de 14.12s.'
      marker-yv: yv-n
    - type: text
      text: 'Ce jour-là, ils sacrifièrent au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', sur le butin qu''ils avaient amené, sept cents têtes de gros bétail et sept mille têtes de petit bétail. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils contractèrent une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' en s''engageant'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils entrèrent dans une alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression hébraïque en Jr 34.10 ; Ez 16.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chercher le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.14 ; 14.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de tout leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' et de toute leur âme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) 1R 2.4+.
      marker-yv: yv-n
    - type: text
      text: 'Ils contractèrent une alliance en s''engageant à chercher le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de leurs pères, de tout leur cœur et de toute leur âme. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne chercherait pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devait être mis à mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 13.6 ; 17.2ss.'
      marker-yv: yv-n
    - type: text
      text: 'Quiconque ne chercherait pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, devait être mis à mort, petit ou grand, homme ou femme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Ils firent serment au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' d''une voix forte, avec des acclamations, au son des trompettes et des trompes. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils avaient cherché le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils l'avaient cherché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. v. 12+s (verbe synonyme). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celui-ci s'était laissé trouver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 2,4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: accorda le repos de tous côtés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.5+s.'
      marker-yv: yv-n
    - type: text
      text: 'Tout Juda se réjouit de ce serment, car c''est de tout leur cœur qu''ils l''avaient fait ; c''est de toute leur volonté qu''ils avaient cherché le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et celui-ci s''était laissé trouver par eux. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' leur accorda le repos de tous côtés.'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 15.13-15
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1R 15.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: grande dame
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2R 10.13 ; Jr 13.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ashéra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baal
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il réduisit en poussière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : absent de 1R 15.13.'
      marker-yv: yv-n
    - type: text
      text: 'Quant à Maaka, mère du roi Asa, il lui retira la dignité de grande dame, parce qu''elle avait fait une idole pour l''Ashéra. Asa abattit son idole qu''il réduisit en poussière et la brûla dans l''oued Cédron. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: hauts
        - type: text
          text: ' lieux. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le cœur… entier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1R 15.14 précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais les hauts lieux ne disparurent pas d''Israël, quoique le cœur d''Asa fût entier pendant tous ses jours. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 5.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il apporta à la maison de Dieu ce que son père avait consacré et ce qu'il avait lui-même consacré, de l'argent, de l'or et divers objets.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il n''y eut pas de guerre… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.5s.
      marker-yv: yv-n
    - type: text
      text: Il n'y eut pas de guerre jusqu'à la trente-cinquième année du règne d'Asa.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout Juda et Benjamin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8s ; 14.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'si vous le cherchez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.6 ; 1Ch 28.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il se laissera trouver par vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4,15 ; Es 65.1 ; Jr 29.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si vous l'abandonnez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.5.'
      marker-yv: yv-n
    - type: text
      text: 'qui sortit au-devant d''Asa et lui dit : Ecoutez-moi, Asa, ainsi que tout Juda et Benjamin ! Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est avec vous quand vous êtes avec lui ; si vous le cherchez, il se laissera trouver par vous ; si vous l''abandonnez, il vous abandonnera. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pendant bien des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Os 3.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu véritable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Dieu de vérité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de loyauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette formule ne se retrouve nulle part ailleurs. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' qui enseigne, ni '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 33.10 ; Jr 2.8+ ; 18.18.'
      marker-yv: yv-n
    - type: text
      text: 'Pendant bien des jours, il n''y a eu pour Israël ni Dieu véritable, ni prêtre qui enseigne, ni loi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans leur détresse…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 4.30 ; Os 2.9 ; 5.15 ; Ps 78.34s ; 119.67. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il s'est laissé trouver par eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 2.'
      marker-yv: yv-n
    - type: text
      text: 'Mais dans leur détresse ils sont revenus au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, ils l''ont recherché ; et il s''est laissé trouver par eux. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour personne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour celui qui sort et pour celui qui rentre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 27.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 31.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 18.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ces temps-là, il n''y avait de paix pour personne, car de grandes paniques s''abattaient sur tous les habitants des pays ; '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on se heurtait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mettre en pièces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 34.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nation contre nation…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ag 2.22 ; Za 11.6 ; voir aussi Es 19.2 ; Mt 24.7 ; Mc 13.8 ; Lc 21.10.'
      marker-yv: yv-n
    - type: text
      text: 'on se heurtait nation contre nation, ville contre ville, parce que Dieu les frappait de panique par toutes sortes de détresses. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1Co 15.58 ; 1Tm 5.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne perdez pas courage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que vos mains ne faiblissent pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Dt 31.6 ; 2S 4.1 ; 17.2 ; Es 35.3 ; Jr 6.24+ ; Za 8.9,13 ; Jb 4.3 ; Esd 4.4 ; Né 6.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une récompense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un salaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 15.1).
      marker-yv: yv-n
    - type: text
      text: Vous donc, soyez forts et ne perdez pas courage, car il y a une récompense pour vos actions.
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Oded était '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte veut peut-être distinguer les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'paroles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: d'Azaria qui viennent d'être rapportées (cf. v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') et un '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'message prophétique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme hébreu en 9.29 ; Né 6.12) attribué au père de cet Azaria ; 2Ch 28.9 mentionne un prophète du même nom. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trouva la force
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 7 (même racine verbale) ; 23.1 ; 25.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: faire disparaître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 15.12 ; Za 13.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'horreurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il restaura
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il renouvela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même verbe en 24.4,12.
      marker-yv: yv-n
    - type: text
      text: 'Après avoir entendu ces paroles, ce message prophétique (Oded était prophète), Asa trouva la force de faire disparaître les horreurs de tout le pays de Juda et de Benjamin et des villes qu''il avait prises dans la région montagneuse d''Ephraïm. Il restaura l''autel du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui était devant le vestibule du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout Juda et Benjamin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 2,8 ; 11.1,3,23 ; 14.7 ; 25.5 ; 31.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se rallièrent à lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tombèrent sur lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; l''expression est souvent employée au sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se rendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (à un adversaire dont on reconnaît la supériorité) ; cf. Jr 21.9 ; 37.13s ; 38.19 ; 39.9 ; 52.15.
      marker-yv: yv-n
    - type: text
      text: 'Il rassembla tout Juda et Benjamin, et ceux d''Ephraïm, de Manassé et de Siméon qui avaient immigré parmi eux, car un grand nombre de gens d''Israël se rallièrent à lui lorsqu''ils virent que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu, était avec lui. '
