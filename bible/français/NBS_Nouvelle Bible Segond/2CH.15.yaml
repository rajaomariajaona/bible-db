document_id: 2CH.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Asa entreprend des réformes religieuses
  - type: text
    content: ' '
  - type: note
    content: 'Le souffle (ou l''Esprit ) de Dieu fut sur…  : cf. 20.14 ; Nb 24.2n  ; Jg 3.10 ; 11.29 ; 1S 19.20 etc. –  Azaria  : hébreu ‘Azaryahou (cf. 1R 4.2+), YHWH est venu en aide (ou au secours ) ; il n''est mentionné nulle part ailleurs.'
  - type: text
    content: 'Le souffle de Dieu fut sur Azaria, fils d''Oded, '
  '10':
  - type: note
    content: 'le troisième mois  : le mois de Sivan (mai-juin). –  la quinzième année du règne d''Asa ≈ 896/5 av. J.-C.'
  - type: text
    content: 'Ils se rassemblèrent à Jérusalem le troisième mois de la quinzième année du règne d''Asa. '
  '11':
  - type: note
    content: 'ils sacrifièrent…  : 1.6 ; 5.6. –  le butin  : peut-être celui de 14.12s.'
  - type: text
    content: 'Ce jour-là, ils sacrifièrent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', sur le butin qu''ils avaient amené, sept cents têtes de gros bétail et sept mille têtes de petit bétail. '
  '12':
  - type: note
    content: 'Ils contractèrent une alliance en s''engageant  : litt. ils entrèrent dans une alliance  ; même expression hébraïque en Jr 34.10 ; Ez 16.8. –  chercher le Seigneur 12.14 ; 14.3+. –  de tout leur cœur et de toute leur âme (cf. Gn 1.20n) 1R 2.4+.'
  - type: text
    content: 'Ils contractèrent une alliance en s''engageant à chercher le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères, de tout leur cœur et de toute leur âme. '
  '13':
  - type: note
    content: 'ne chercherait pas… v. 12+. –  devait être mis à mort  : cf. Dt 13.6 ; 17.2ss.'
  - type: text
    content: 'Quiconque ne chercherait pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, devait être mis à mort, petit ou grand, homme ou femme. '
  '14':
  - type: text
    content: 'Ils firent serment au '
  - type: text
    content: Seigneur
  - type: text
    content: ' d''une voix forte, avec des acclamations, au son des trompettes et des trompes. '
  '15':
  - type: note
    content: 'ils avaient cherché le Seigneur (litt. ils l''avaient cherché) : cf. v. 12+s (verbe synonyme). –  celui-ci s''était laissé trouver  : cf. v. 2,4. –  accorda le repos de tous côtés  : cf. 14.5+s.'
  - type: text
    content: 'Tout Juda se réjouit de ce serment, car c''est de tout leur cœur qu''ils l''avaient fait ; c''est de toute leur volonté qu''ils avaient cherché le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et celui-ci s''était laissé trouver par eux. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur accorda le repos de tous côtés.'
  - type: heading
    content: 1R 15.13-15
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 15.13n. –  grande dame  : cf. 2R 10.13 ; Jr 13.18n. –  Ashéra  : voir Baal. –  qu''il réduisit en poussière  : absent de 1R 15.13.'
  - type: text
    content: 'Quant à Maaka, mère du roi Asa, il lui retira la dignité de grande dame, parce qu''elle avait fait une idole pour l''Ashéra. Asa abattit son idole qu''il réduisit en poussière et la brûla dans l''oued Cédron. '
  '17':
  - type: note
    content: 'Voir hauts lieux. –  d''Israël  : cf. 21.2n. –  le cœur… entier  : 1R 15.14 précise avec le Seigneur.'
  - type: text
    content: 'Mais les hauts lieux ne disparurent pas d''Israël, quoique le cœur d''Asa fût entier pendant tous ses jours. '
  '18':
  - type: note
    content: 'Cf. 5.1n. –  consacré  : voir saint.'
  - type: text
    content: Il apporta à la maison de Dieu ce que son père avait consacré et ce qu'il avait lui-même consacré, de l'argent, de l'or et divers objets.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Il n'y eut pas de guerre… 14.5s.
  - type: text
    content: Il n'y eut pas de guerre jusqu'à la trente-cinquième année du règne d'Asa.
  '2':
  - type: note
    content: 'tout Juda et Benjamin  : cf. v. 8s ; 14.7. –  si vous le cherchez 14.6 ; 1Ch 28.9+. –  il se laissera trouver par vous  : cf. v. 4,15 ; Es 65.1 ; Jr 29.14. –  si vous l''abandonnez…  : cf. 12.5.'
  - type: text
    content: 'qui sortit au-devant d''Asa et lui dit : Ecoutez-moi, Asa, ainsi que tout Juda et Benjamin ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec vous quand vous êtes avec lui ; si vous le cherchez, il se laissera trouver par vous ; si vous l''abandonnez, il vous abandonnera. '
  '3':
  - type: note
    content: 'Pendant bien des jours  : cf. Os 3.4. –  Dieu véritable  : litt. Dieu de vérité ou de loyauté  ; cette formule ne se retrouve nulle part ailleurs. –  ni prêtre qui enseigne, ni loi  : cf. Dt 33.10 ; Jr 2.8+ ; 18.18.'
  - type: text
    content: 'Pendant bien des jours, il n''y a eu pour Israël ni Dieu véritable, ni prêtre qui enseigne, ni loi. '
  '4':
  - type: note
    content: 'dans leur détresse…  : cf. Dt 4.30 ; Os 2.9 ; 5.15 ; Ps 78.34s ; 119.67. –  il s''est laissé trouver par eux  : cf. v. 2.'
  - type: text
    content: 'Mais dans leur détresse ils sont revenus au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, ils l''ont recherché ; et il s''est laissé trouver par eux. '
  '5':
  - type: note
    content: 'Voir paix. –  pour personne  : litt. pour celui qui sort et pour celui qui rentre  ; cf. Nb 27.17n  ; Dt 31.2n  ; 1S 18.5n  ; 1R 3.7n.'
  - type: text
    content: 'En ces temps-là, il n''y avait de paix pour personne, car de grandes paniques s''abattaient sur tous les habitants des pays ; '
  '6':
  - type: note
    content: 'on se heurtait  : le même verbe est traduit par mettre en pièces en 34.7. –  nation contre nation…  : cf. Ag 2.22 ; Za 11.6 ; voir aussi Es 19.2 ; Mt 24.7 ; Mc 13.8 ; Lc 21.10.'
  - type: text
    content: 'on se heurtait nation contre nation, ville contre ville, parce que Dieu les frappait de panique par toutes sortes de détresses. '
  '7':
  - type: note
    content: 'Cf. 1Co 15.58 ; 1Tm 5.18. –  ne perdez pas courage  : litt. que vos mains ne faiblissent pas  ; cf. Dt 31.6 ; 2S 4.1 ; 17.2 ; Es 35.3 ; Jr 6.24+ ; Za 8.9,13 ; Jb 4.3 ; Esd 4.4 ; Né 6.9. –  une récompense  : litt. un salaire (cf. Gn 15.1).'
  - type: text
    content: Vous donc, soyez forts et ne perdez pas courage, car il y a une récompense pour vos actions.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Oded était prophète  : le texte veut peut-être distinguer les paroles d''Azaria qui viennent d''être rapportées (cf. v. 1n) et un message prophétique (même terme hébreu en 9.29 ; Né 6.12) attribué au père de cet Azaria ; 2Ch 28.9 mentionne un prophète du même nom. –  trouva la force  : cf. v. 7 (même racine verbale) ; 23.1 ; 25.11. –  faire disparaître  : cf. 1R 15.12 ; Za 13.2. –  horreurs 1R 11.5n. –  Il restaura  : litt. il renouvela  ; même verbe en 24.4,12.'
  - type: text
    content: 'Après avoir entendu ces paroles, ce message prophétique (Oded était prophète), Asa trouva la force de faire disparaître les horreurs de tout le pays de Juda et de Benjamin et des villes qu''il avait prises dans la région montagneuse d''Ephraïm. Il restaura l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui était devant le vestibule du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '9':
  - type: note
    content: 'tout Juda et Benjamin  : cf. v. 2,8 ; 11.1,3,23 ; 14.7 ; 25.5 ; 31.1. –  se rallièrent à lui  : litt. tombèrent sur lui  ; l''expression est souvent employée au sens de se rendre (à un adversaire dont on reconnaît la supériorité) ; cf. Jr 21.9 ; 37.13s ; 38.19 ; 39.9 ; 52.15.'
  - type: text
    content: 'Il rassembla tout Juda et Benjamin, et ceux d''Ephraïm, de Manassé et de Siméon qui avaient immigré parmi eux, car un grand nombre de gens d''Israël se rallièrent à lui lorsqu''ils virent que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, était avec lui. '
