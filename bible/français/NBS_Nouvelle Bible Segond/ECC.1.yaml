document_id: ECC.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie n'a pas de sens
  - type: text
    content: ' '
  - type: note
    content: 'Qohéleth  : transcription d''un terme hébreu de forme féminine (pour désigner une fonction ? cf. Esd 2.55n,57 ; le mot en tout cas régit toujours le masculin, sauf en 7.27n) apparenté à qahal, assemblée (v. 2,12 ; 12.8ss) ; le titre traditionnel du livre vient de la version grecque (LXX), qui a traduit Ekklèsiastès , de ekklèsia , mot qui a donné église, ecclésiastique. Le titre hébreu a été diversement interprété  : prédicateur, convocateur ou chef de l''assemblée (cf. 1R 8) ; assembleur de maximes (mais la racine hébraïque correspondante évoque toujours un rassemblement de personnes) ; ou encore, par homonymie, contestation  ; en tout cas ce mot joue ici le rôle d''un nom propre (cf. la Sagesse dans Pr 8–9). –  fils de David, roi à Jérusalem  : cf. v. 12 ; 2.9 ; 1R 1–11 ; Pr 1.1.'
  - type: text
    content: Paroles de Qohéleth, fils de David, roi à Jérusalem.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'bien avant nous  : litt. dans les temps (le terme grec correspondant dans LXX a été traditionnellement rendu par âge[s], siècle[s] ou monde[s]  ; cf. Ga 1.5n) qu''il y a eu avant nous.'
  - type: text
    content: 'Y a-t-il une chose dont on dise : Regarde, c''est nouveau !'
  - type: text
    content: – elle était déjà là bien avant nous.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction on n''a pas souvenir des hommes du passé, et ceux qui viendront dans l''avenir ne laisseront pas non plus de souvenir…  ; cf. 2.16+. –  qui viendront  : litt. qui seront.'
  - type: text
    content: Il n'y a pas de souvenir du passé,
  - type: text
    content: et ce qui sera dans l'avenir ne laissera pas non plus de souvenir
  - type: text
    content: chez ceux qui viendront par la suite.
  - type: heading
    content: L'expérience du sage
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 1+ ; 1R 1.11-40.
  - type: text
    content: 'Moi, Qohéleth, j''ai été roi sur Israël à Jérusalem. '
  '13':
  - type: note
    content: 'J''ai décidé de (litt. j''ai donné mon cœur à) rechercher… 7.25 ; 8.16. –  explorer 2.3n  ; 7.25 ; Nb 10.33n  ; 13.2 etc. –  sous le ciel v. 3+ ; 2.3 ; 3.1. –  occupation 2.23,26 ; 3.10 ; 4.8 ; 5.2,13. –  funeste  : litt. mauvaise. –  impose aux humains  : litt. donne aux fils de l''homme (cf. Gn 1.26n) pour les humilier (ou les affliger).'
  - type: text
    content: J'ai décidé de rechercher et d'explorer par la sagesse tout ce qui se fait sous le ciel ; c'est une occupation funeste que Dieu impose aux humains.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'futilité v. 2n. –  poursuite  : mot d''origine araméenne (traduit par volonté en Esd 5.17 ; 7.18), qui rappelle le verbe hébreu habituellement traduit par paître (cf. Os 12.2) ; il fait assonance avec vent (le même terme est aussi traduit par esprit ) en hébreu re‘outh rouah (cf. v. 6) ; voir aussi 2.11,17,26 ; 4.4,6,16 ; 6.9.'
  - type: text
    content: 'J''ai vu toutes les œuvres qui se font sous le soleil : tout n''est que futilité et poursuite du vent.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.13.
  - type: text
    content: Ce qui est courbé ne peut être redressé,
  - type: text
    content: ce qui manque ne peut être compté.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Je me suis dit  : litt. j''ai dit avec mon cœur. –  j''ai développé…  : autre traduction je suis devenu grand (cf. 2.9) et j''ai amassé… (cf. 12.9 ; 1R 3.12 ; 5.9-14 ; 10.1-13,23s). –  qui m''ont précédé…  : litt. qui étaient (rois ?) avant moi sur (ou, d''après d''autres mss hébreux et des versions anciennes, à , comme en 2.9) Jérusalem.'
  - type: text
    content: 'Je me suis dit : Moi, j''ai développé et amassé plus de sagesse que tous ceux qui m''ont précédé à Jérusalem, et mon cœur a vu beaucoup de sagesse et de connaissance.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai décidé…  : cf. v. 13n  ; 8.16. –  la folie  : autre traduction la stupidité (cf. Gn 31.28 ; 1S 13.13 ; 26.21 ; 2S 15.31 ; 24.10 ; Es 44.25 ; 1Ch 21.8 ; 2Ch 16.9) ; même terme ou termes apparentés en Ec 2.3,12s,19 ; 7.17,25 ; 10.1,3,6,13s ; une autre famille de mots, très proche par la forme et par le sens, évoque la stupidité en 2.14+. –  poursuite… v. 14n  ; 2.22n  ; 4.16.'
  - type: text
    content: J'ai décidé de connaître la sagesse et de connaître la démence et la folie ; je sais que cela aussi n'est que poursuite du vent.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 2.16s. –  contrariété  : même terme, ou verbe apparenté, en 2.23 ; 5.16 ; 7.3,9.'
  - type: text
    content: Car avec beaucoup de sagesse on a beaucoup de contrariété ;
  - type: text
    content: plus on a de connaissance, plus on a de tourment.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Futilité complète  : litt. vanité de vanités , tournure superlative (cf. Ct 1.1n). Le mot traditionnellement rendu par vanité signifie proprement souffle, vapeur , mais il peut avoir ici perdu en partie son sens concret ; il évoque en tout cas ce qui est inconsistant ou passager et, par là même, décevant 2.11,17 ; 11.8 ; 12.8 ; cf. Rm 8.20 ; voir aussi Gn 4.2n  ; Ps 62.10n. –  tout 9.2n.'
  - type: text
    content: Futilité complète, dit Qohéleth, futilité complète,
  - type: text
    content: tout n'est que futilité !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Quel avantage…  : autre traduction que reste-t-il à l''être humain  ; le mot hébreu n''apparaît que dans ce livre (10 fois) ; cf. 2.11,13 ; 3.9 ; 5.8,15 ; 7.11s ; 10.10s ; un terme apparenté est traduit par supériorité en 3.19. –  le travail qu''il fait ou la peine qu''il se donne  : cf. 2.10ss,20,22 ; 3.9 ; 5.14s,17 ; 9.9 ; cf. Gn 3.17-19. –  sous le soleil , c.-à-d. ici-bas , v. 14 ; 2.11,17-22 ; 3.16 ; 4.1,3,7,15 ; 5.12,17 ; 6.1,12 ; 8.9,15,17 ; 9.3,6,9,11,13 ; cf. v. 13 ; 7.11 ; 8.14.'
  - type: text
    content: Quel avantage l'être humain retire-t-il de tout le travail qu'il fait sous le soleil ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Siracide 14.18 : « Comme le feuillage verdoyant sur un arbre touffu tantôt tombe et tantôt repousse, ainsi les générations de chair et de sang : l''une meurt et une autre apparaît. »'
  - type: text
    content: Une génération s'en va, une génération vient,
  - type: text
    content: et la terre subsiste toujours.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'se couche  : litt. vient ou rentre.'
  - type: text
    content: Le soleil se lève, le soleil se couche ;
  - type: text
    content: il aspire au lieu d'où il se lève.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le vent  : cf. v. 14n.'
  - type: text
    content: Allant vers le sud, tournant vers le nord,
  - type: text
    content: tournant, tournant, va le vent,
  - type: text
    content: et le vent reprend ses tours.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Siracide 40.11 : « Tout ce qui vient de la terre retourne à la terre et ce qui vient des eaux retourne à la mer. » –  les torrents ou les oueds  ; cf. Gn 26.17n  ; Jb 6.15n.'
  - type: text
    content: Tous les torrents vont à la mer, et la mer n'est pas remplie ;
  - type: text
    content: vers le lieu où ils coulent, les torrents continuent à couler.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Tout est fatigant…  : autre traduction tout est en travail , ou encore toutes les paroles sont usées (ou lassantes ), l''homme ne peut rien dire. –  ne se lasse pas  : litt. ne se remplit pas  ; cf. v. 7 ; 6.7.'
  - type: text
    content: Tout est fatigant, plus qu'on ne peut dire ;
  - type: text
    content: l'œil n'est pas rassasié de voir,
  - type: text
    content: l'oreille ne se lasse pas d'entendre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '2.12 ; 3.15. –  Ce qui a été  : autre traduction ce qui est . –  ce qui s''est fait…  : cf. v. 13s ; 2.17 ; 4.1n  ; 8.9,11nss ; 9.3,6.'
  - type: text
    content: Ce qui a été, c'est ce qui sera ;
  - type: text
    content: 'ce qui s''est fait, c''est ce qui se fera :'
  - type: text
    content: il n'y a rien de nouveau sous le soleil.
