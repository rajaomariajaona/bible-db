document_id: JOB.41,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Plusieurs éditions rattachent ce verset au chapitre 40, ce qui provoque un décalage dans la suite du chapitre. –  Devant lui…  : traduction incertaine, litt. son attente est illusion.'
  - type: text
    content: Devant lui toute attente n'est qu'illusion ;
  - type: text
    content: à son seul aspect n'est-on pas terrassé ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'de la lumière  : autres traductions du feu ; des éclairs. –  la lueur (litt. les paupières ) de l''aurore 3.9n.'
  - type: text
    content: Ses éternuements font jaillir de la lumière ;
  - type: text
    content: ses yeux sont comme la lueur de l'aurore.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 18.9 ; Ap 9.17.
  - type: text
    content: Des torches jaillissent de sa gueule,
  - type: text
    content: des étincelles de feu s'en échappent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'une chaudière ardente  : autres traductions un encensoir ; sur des roseaux ( ?) ; même terme ou homonyme en 40.26n. Certains modifient le texte hébreu traditionnel pour lire au second vers  : un souffle de feu ardent.'
  - type: text
    content: Une fumée sort de ses naseaux,
  - type: text
    content: comme d'un chaudron qui bout, d'une chaudière ardente.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Son haleine  : autres traductions son gosier, son être (voir Gn 1.20n).'
  - type: text
    content: Son haleine allume des braises,
  - type: text
    content: des flammes sortent de sa gueule.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'réside  : sur le verbe correspondant, voir 19.4n.'
  - type: text
    content: Dans son cou réside la puissance,
  - type: text
    content: l'effroi bondit au-devant de lui.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'éléments  : le mot hébreu est très rare et sa signification incertaine ; il apparaît en Am 8.6 ( déchet ). –  son corps  : litt. sa chair.'
  - type: text
    content: Les éléments de son corps sont attachés ensemble,
  - type: text
    content: ils sont fondus sur lui, ils ne vacillent pas.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'cœur… dur comme la pierre Ez 11.19 ; 36.26. –  meule inférieure  : la partie la plus lourde du moulin à grain domestique, qui consistait en une grosse pierre plate et dure.'
  - type: text
    content: Son cœur est dur comme la pierre,
  - type: text
    content: dur comme la meule inférieure.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Verset difficile. –  Devant sa majesté  : cf. 13.11 ; 31.23 ; autre traduction quand il se lève . –  les plus robustes  : autre traduction les dieux  ; certains modifient le texte hébreu traditionnel pour lire les flots . –  s''esquivent  : le verbe hébreu semble apparenté au mot habituellement traduit par péché , mais il pourrait avoir aussi le sens de se retirer  ; certains modifient le texte hébreu traditionnel pour lire un autre verbe, se cacher ou être terrorisé . –  brisés  : certains modifient le texte hébreu traditionnel pour lire les reins brisés (Ez 21.11), ou bien, avec le verbe précédent, les vagues de la mer se retirent.'
  - type: text
    content: Devant sa majesté, les plus robustes sont effrayés
  - type: text
    content: et s'esquivent, brisés.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ne sert à rien  : litt. ne se dresse pas ou ne tient pas . –  javelot  : autre mot hébreu qu''en 33.18+ ; 39.23+ ; il n''apparaît qu''ici.'
  - type: text
    content: Pour celui qui l'approche, l'épée ne sert à rien,
  - type: text
    content: ni la lance, ni le javelot, ni la cuirasse.
  '19':
  - type: text
    content: Il considère le fer comme de la paille,
  - type: text
    content: le bronze comme du bois pourri.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Personne n''est assez courageux…  : on pourrait aussi traduire n''est-il pas cruel (30.21n) quand on le réveille ? ou n''est-il pas trop féroce pour qu''on le provoque ? –  tiendrait  : autre traduction se présenterait  ; même verbe en 1.6 ; 2.1 ; 33.5 ; 38.14. –  devant moi  : de nombreux mss portent devant lui . Cf. 9.4 ; Na 1.6.'
  - type: text
    content: Personne n'est assez courageux pour l'exciter ;
  - type: text
    content: qui donc tiendrait devant moi ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'La flèche  : litt. le fils de l''arc . –  sont…  : le verbe hébreu employé ici suggère l''idée de destruction, cf. Gn 19.21+.'
  - type: text
    content: La flèche ne le fait pas fuir,
  - type: text
    content: les pierres de la fronde sont pour lui de la paille.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'sifflement  : le même terme est traduit par bondir en 39.24 (terme apparenté au v. 20). –  javelot 39.23n.'
  - type: text
    content: Il considère la massue comme de la paille,
  - type: text
    content: il se rit du sifflement du javelot.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 29.3.
  - type: text
    content: Il a sous lui des pointes aiguës,
  - type: text
    content: une herse qu'il traîne sur la boue.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 32.2.
  - type: text
    content: Il fait bouillonner les profondeurs comme une marmite,
  - type: text
    content: il change la mer en un vase à parfum.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'devient  : litt. est considéré.'
  - type: text
    content: Il laisse derrière lui un sentier lumineux ;
  - type: text
    content: l'abîme devient comme les cheveux blancs d'un vieillard.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'pas de maître  : LXX pas de pareil , autre sens possible du texte hébreu (un terme apparenté est traduit par ressembler en 30.19).'
  - type: text
    content: Sur la terre il n'a pas de maître ;
  - type: text
    content: il a été fait sans terreur.
  '26':
  - type: text
    content: ' '
  - type: note
    content: des plus fiers animaux 28.8n.
  - type: text
    content: Il regarde tout ce qui est élevé,
  - type: text
    content: il est le roi des plus fiers animaux.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Qui m''a avancé…  : cf. 34.13 ; Rm 11.35  ; autre traduction, d''après LXX, qui s''est mesuré à moi et s''en est tiré sain et sauf ? –  tout m''appartient Ex 19.5 ; Dt 10.14 ; Ps 24.1 ; 50.12.'
  - type: text
    content: Qui m'a avancé quelque chose pour que je le lui rende ?
  - type: text
    content: Sous tout le ciel, tout m'appartient.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction incertaine. On retourne à Léviathan. –  de son corps  : litt. de ses membres ou des parties de son corps  ; d''autres comprennent ses vantardises (cf. 11.3n) et traduisent n''ai-je pas réduit au silence ses vantardises ? –  de la beauté de son organisme  : traduction conjecturale ; autre possibilité de son prix  ; certains modifient le texte hébreu traditionnel pour lire et je proclamerai sa force sans pareille.'
  - type: text
    content: Je ne me tairai pas à propos de son corps,
  - type: text
    content: de sa force et de la beauté de son organisme.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Litt. qui a dévoilé (cf. 38.17n) la face de son vêtement ? Qui est venu dans le double de son frein ? Ce dernier terme apparaît aussi en 30.11 ; Es 30.28 ( mors ) ; Ps 32.9. Certains, s'appuyant sur LXX, modifient le texte hébreu (inversion de lettres) pour lire (la doublure) de sa cuirasse (comme en Jr 46.4 ; 51.3).
  - type: text
    content: Qui l'a dépouillé de son vêtement ?
  - type: text
    content: Qui pénétrera entre ses mâchoires ?
  '6':
  - type: text
    content: Qui a ouvert les portes de sa gueule ?
  - type: text
    content: Autour de ses dents c'est la terreur.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ses orgueilleux et puissants (même terme 12.21n  ?) boucliers  : traduction incertaine ; on modifie souvent le texte hébreu traditionnel, d''après LXX, pour traduire son dos (est formé de) rangées de boucliers  ; il s''agit certainement ici d''écailles ; cf. 15.26. –  sont liés ou fermés  ; LXX il est lié comme par un sceau de pierre.'
  - type: text
    content: Ses orgueilleux et puissants boucliers
  - type: text
    content: sont liés étroitement comme par un sceau ;
  '8':
  - type: text
    content: ils se serrent l'un contre l'autre,
  - type: text
    content: il ne passerait pas entre eux un souffle ;
  '9':
  - type: text
    content: ils sont attachés l'un à l'autre,
  - type: text
    content: ils se tiennent et ne peuvent se séparer.
