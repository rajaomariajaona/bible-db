document_id: PSA.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un roi après la victoire
  - type: heading
    content: 2S 22.1-51
  - type: text
    content: ' '
  - type: note
    content: 2S 22. –  serviteur du Seigneur 36.1 ; 144.10. –  De David 3.1n  ; cf. v. 51.
  - type: text
    content: 'Du chef de chœur. Du serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: '. De David, qui prononça pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les paroles de ce chant, le jour où le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''eut délivré de la main de tous ses ennemis et de la main de Saül.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 144.5 ; cf. Gn 11.5,7 ; 18.21 ; Ex 3.8 ; 19.11,18,20 ; 34.5 ; Es 63.19. –  épaisse nuée ou obscurité épaisse  ; 97.2 ; Ex 20.21n.
  - type: text
    content: Il inclina le ciel et descendit
  - type: text
    content: avec une épaisse nuée sous ses pieds.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Il était monté  : le verbe hébreu est apparenté au mot habituellement traduit par char , de sorte qu''on a aussi compris  : sur le char du keroub (les deux mots font assonance en hébreu) ; cf. 80.2 ; 99.1 ; Gn 3.24n  ; Ex 25.18n  ; 1S 4.4 ; 2S 6.2 ; 2R 19.15 ; Ez 1 ; 9.3n  ; 10. –  il planait  : autre traduction il fondait (comme un oiseau de proie) , cf. Dt 28.49n. –  sur les ailes du vent 104.3.'
  - type: text
    content: Il était monté sur un keroub et il volait,
  - type: text
    content: il planait sur les ailes du vent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '97.2 ; Ex 19.16,18 ; Dt 4.11. –  sa hutte  : cf. 27.5n  ; 2S 22.12n  ; Jb 36.29.'
  - type: text
    content: Il faisait des ténèbres sa cachette, sa hutte tout autour de lui
  - type: text
    content: – des eaux ténébreuses et de sombres nuages.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'provenaient ses nuages  : traduction incertaine ; cf. 2S 22.13.'
  - type: text
    content: De la clarté qui le précédait provenaient ses nuages,
  - type: text
    content: de la grêle et des braises.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur tonna  : cf. 29.3ss ; 77.18s ; Ex 9.18+,23nss ; 1S 2.10 ; Es 30.30 ; Jb 37.5.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tonna dans le ciel,'
  - type: text
    content: le Très-Haut fit retentir sa voix,
  - type: text
    content: avec la grêle et les braises.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ses flèches  : cf. 144.6 ; Dt 32.23 ; Ha 3.11. –  il les dispersa / les frappa de panique  : on pourrait comprendre ces verbes comme s''appliquant soit aux ennemis, soit, moins probablement, aux flèches et aux éclairs  : il les dispersa… et les fit partir en tout sens.'
  - type: text
    content: Il lança ses flèches et il les dispersa,
  - type: text
    content: il multiplia les éclairs et les frappa de panique.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 14.21 ; 15.8 ; Jb 37.10. –  Le lit  : le terme peut aussi désigner le lit d''un fleuve (Es 8.7). Il semble s''appliquer le plus souvent aux ravins creusés par les oueds (torrents intermittents) ; cf. 42.2n  ; 126.4n  ; Ez 6.3+ ; Jb 6.15n. –  souffle  : voir esprit. –  de tes narines ou de ta colère  ; cf. Dt 32.22n.'
  - type: text
    content: Le lit des eaux apparut,
  - type: text
    content: les fondations du monde furent mises à découvert,
  - type: text
    content: 'quand tu les rabrouas, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: par ton souffle, par le vent de tes narines.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '144.7 ; cf. 32.6+. –  D''en haut il tend la main  : litt. il envoie d''en haut  ; autre traduction d''en haut il envoie un émissaire.'
  - type: text
    content: D'en haut il tend la main, il me saisit,
  - type: text
    content: il me retire des grandes eaux ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: 69.15 ; 106.10 ; 142.7 ; Lc 1.71.
  - type: text
    content: il me délivre de mon ennemi puissant,
  - type: text
    content: de ceux qui me détestent et qui sont plus forts que moi.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'le jour où…  : litt. au jour de ma catastrophe.'
  - type: text
    content: Ils se tenaient devant moi le jour où la catastrophe s'abattait sur moi ;
  - type: text
    content: 'mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était mon appui.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je t''aime  : le verbe hébreu évoque habituellement la compassion de Dieu à l''égard de ses créatures ; cf. 116.1n. Certains modifient le texte hébreu traditionnel pour lire je t''exalte (30.1 ; 145.1 ; Es 25.1). –  ma force 118.14 ; Ex 15.2 ; Es 12.2 ; Jr 16.19 ; Ha 3.19.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: 'Je t''aime, '
  - type: text
    content: Seigneur
  - type: text
    content: ', ma force !'
  '20':
  - type: text
    content: ' '
  - type: note
    content: au large 4.2n. –  il a pris plaisir en moi 22.9n  ; 41.12.
  - type: text
    content: Il m'a fait sortir pour me mettre au large,
  - type: text
    content: il m'a délivré, car il a pris plaisir en moi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'V. 25 ; cf. 7.9+ ; 1S 26.23 ; Jb 22.30 ; Jc 4.8. – Voir justice. –  il m''a récompensé  : autre traduction il m''a rendu.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a traité selon ma justice,'
  - type: text
    content: il m'a récompensé selon la pureté de mes mains ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'les voies du Seigneur  : cf. v. 31 ; 25.9 ; 37.34 ; 77.14 ; 103.7 ; 128.1 ; Gn 18.19 ; Es 2.3 ; 40.3 ; Mc 1.3/ /. –  je ne me suis pas éloigné…  : litt. je n''ai pas été méchant (m''éloignant ainsi) de mon Dieu.'
  - type: text
    content: 'car j''ai gardé les voies du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je ne me suis pas éloigné de mon Dieu comme les méchants.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '119.102. –  prescriptions  : voir loi.'
  - type: text
    content: Toutes ses règles sont devant moi,
  - type: text
    content: et je n'éloigne pas de moi ses prescriptions.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'intègre  : cf. Dt 18.13n  ; Jb 1.1. –  de toute faute  : litt. de ma faute.'
  - type: text
    content: J'ai été intègre envers lui,
  - type: text
    content: et je me suis gardé de toute faute.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'V. 21+. –  en sa présence  : litt. devant ses yeux.'
  - type: text
    content: 'Aussi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a rendu selon ma justice,'
  - type: text
    content: selon la pureté de mes mains en sa présence.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'fidèle ou bon  ; cf. 4.4n. –  l''homme intègre  : cf. 2S 22.26n (la vocalisation traditionnelle est ici légèrement différente).'
  - type: text
    content: Avec celui qui est fidèle tu te montres fidèle,
  - type: text
    content: avec l'homme intègre tu te montres intègre,
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. Pr 3.34. – Voir pur.
  - type: text
    content: avec celui qui est pur tu te montres pur,
  - type: text
    content: et avec celui qui est tortueux tu te montres retors.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'le peuple affligé  : certains modifient le texte hébreu traditionnel pour lire les pauvres (9.13n). –  abaisses les regards hautains Es 2.11 ; 5.15.'
  - type: text
    content: Car c'est toi qui sauves le peuple affligé
  - type: text
    content: et qui abaisses les regards hautains.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. 27.1+ ; 132.17n. On pourrait aussi ponctuer différemment le texte et lire c'est toi qui fais briller ma lampe, Seigneur  ; mon Dieu éclaire mes ténèbres.
  - type: text
    content: C'est toi qui fais briller ma lampe ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, éclaire mes ténèbres.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'On pourrait aussi traduire comme une invocation  : Seigneur, mon roc… –  mon roc / mon rocher v. 32,47 ; 19.15 ; 31.3s ; 42.10 ; 62.3,8 ; 73.26 ; 92.16 ; 144.2 ; Dt 32.4,15,18 ; 1S 2.2 ; Es 17.10 ; 30.29 ; 44.8 ; cf. 1Co 10.4. –  mon libérateur  : litt. celui qui me fait échapper , cf. v. 44,49 ; 40.18 ; 144.2. –  Dieu  : hébreu ’El , de même aux v. 31,33,48 ; cf. Gn 21.33n. –  en qui je trouve un abri 7.2+. –  bouclier 3.4+. –  la corne  : cf. 75.5s,11 ; Lc 1.69n. –  qui me sauve  : litt. de mon salut . –  citadelle 9.10+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est mon roc, ma forteresse, mon libérateur,'
  - type: text
    content: mon Dieu, mon rocher, en qui je trouve un abri,
  - type: text
    content: mon bouclier, la corne qui me sauve, ma citadelle !
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'je me précipite…  : traduction incertaine ; on a aussi compris  : je prends d''assaut les remparts.'
  - type: text
    content: Avec toi je me précipite sur une troupe armée,
  - type: text
    content: avec mon Dieu je saute une muraille.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'La voie…  : litt. Dieu (hébreu ’El ) , parfaite (est) sa voie  ; cf. 145.17 ; Dt 32.4. –  la parole…  : cf. 12.7+.'
  - type: text
    content: La voie de Dieu est parfaite,
  - type: text
    content: 'la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est éprouvée ;'
  - type: text
    content: il est un bouclier pour tous ceux qui trouvent en lui un abri.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 46.11+ ; voir aussi 89.9 ; 1S 2.2 ; Es 44.6,8 ; 45.6,14,21s ; Mc 12.32 ; Jn 17.3 ; 1Co 8.4 ; Ga 3.20 ; Ep 4.5s ; 1Tm 2.5. –  Dieu  : hébreu ’Eloah , à la première occurrence ; cf. Jb 3.4n.'
  - type: text
    content: 'Qui donc est Dieu, si ce n''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ?'
  - type: text
    content: Qui est un rocher, sinon notre Dieu ?
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El.'
  - type: text
    content: C'est le Dieu qui me ceint de vaillance
  - type: text
    content: et qui rend ma voie parfaite.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'sur les hauteurs  : litt. sur mes hauteurs  ; cf. 27.5+ ; Ha 3.19.'
  - type: text
    content: Il rend mes pieds semblables à ceux des biches,
  - type: text
    content: et me fait tenir sur les hauteurs.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 144.1.
  - type: text
    content: Il enseigne à mes mains la guerre ;
  - type: text
    content: mes bras tendent un arc de bronze.
  '36':
  - type: text
    content: ' '
  - type: note
    content: ta main droite (17.7+) me soutient 63.9 ; cf. 20.3 ; 98.1 ; Es 9.6 ; ces mots sont absents en 2S 22.36. –  ta réponse , c.-à-d. ton oracle  ; on obtient cette traduction en lisant les consonnes du texte comme en 2S 22.36 ; ici la lecture traditionnelle comprend ton humilité ou ton humiliation , ce qui pourrait signifier ton abaissement ou l'humiliation que tu me fais subir (même terme en 45.5). D'autres modifient les consonnes mêmes pour lire ton secours.
  - type: text
    content: Tu me donnes le bouclier de ton salut,
  - type: text
    content: ta main droite me soutient
  - type: text
    content: et ta réponse me grandit.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Tu me fais marcher au large  : litt. tu élargis mon pas (ou mes pas , selon plusieurs versions anciennes) sous moi , c.-à-d. tu me donnes la place de marcher.'
  - type: text
    content: Tu me fais marcher au large,
  - type: text
    content: et je ne chancelle pas sur mes chevilles.
  '38':
  - type: text
    content: Je poursuis mes ennemis, je les atteins
  - type: text
    content: et je ne reviens pas avant de les avoir exterminés.
  '39':
  - type: text
    content: Je les fracasse, et ils ne peuvent se relever ;
  - type: text
    content: ils tombent sous mes pieds.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.5+ ; v. 7 ; Jg 10.12.
  - type: text
    content: 'Je m''écrie : Loué soit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Et je suis sauvé de mes ennemis.
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'mes adversaires  : litt. ceux qui se dressent (contre) moi , de même au v. 49.'
  - type: text
    content: Tu me ceins de vaillance pour le combat,
  - type: text
    content: tu fais plier sous moi mes adversaires.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Tu fais fuir…  : litt. de mes ennemis, tu me donnes la nuque ou le dos  ; cf. 21.13 ; Ex 23.27n.'
  - type: text
    content: Tu fais fuir mes ennemis devant moi ;
  - type: text
    content: je réduirai au silence ceux qui me détestent.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Ils appellent au secours  : le verbe hébreu fait assonance avec le terme traduit par sauveur.'
  - type: text
    content: 'Ils appellent au secours : pas de sauveur !'
  - type: text
    content: 'Ils appellent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il ne leur répond pas !'
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'qu''emporte le vent  : litt. face au vent  ; cf. 1.4n. –  je les balaie  : litt. je les vide  ; les deux verbes traduits par écraser et fouler en 2S 22.43 sont très proches dans l''écriture hébraïque ; cf. Es 10.6 ; Mi 7.10.'
  - type: text
    content: Je les pulvérise comme la poussière qu'emporte le vent,
  - type: text
    content: je les balaie comme la boue des rues.
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'aux querelles du peuple  : certains modifient le texte hébreu traditionnel pour lire à un peuple innombrable. –  à la tête des nations 2.8s ; Ap 2.26s. –  m''est soumis  : litt. me sert.'
  - type: text
    content: Tu me fais échapper aux querelles du peuple,
  - type: text
    content: tu me mets à la tête des nations ;
  - type: text
    content: un peuple que je ne connais pas m'est soumis.
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'Au premier ordre…  : litt. à écoute d''oreille ils m''écoutent , le verbe correspondant à écouter ayant aussi le sens d’ obéir  ; on pourrait aussi comprendre rien qu''à entendre parler de moi ils m''obéissent  ; cf. 2S 22.45, où les deux vers sont intervertis ; voir aussi Jb 42.5n (tournure hébraïque analogue). –  flattent  : cf. Dt 33.29n.'
  - type: text
    content: Au premier ordre ils m'obéissent,
  - type: text
    content: les étrangers me flattent ;
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'ils sortent en tremblant  : traduction incertaine ; le verbe hébreu n''apparaît qu''ici et en 2S 22.46 (avec une inversion de lettres) ; cf. Os 11.10s ; Mi 7.17.'
  - type: text
    content: les étrangers sont en défaillance,
  - type: text
    content: ils sortent en tremblant de leurs forteresses.
  '47':
  - type: text
    content: ' '
  - type: note
    content: V. 3+. –  Dieu de mon salut 24.5+.
  - type: text
    content: 'Vive le '
  - type: text
    content: Seigneur
  - type: text
    content: ', béni soit mon Rocher !'
  - type: text
    content: Que le Dieu de mon salut soit exalté,
  '48':
  - type: text
    content: ' '
  - type: note
    content: '47.4 ; 144.2. –  la vengeance  : litt. les vengeances  : même terme en 79.10 ; 94.1 ; 149.7 ; Nb 31.2s ; Jg 11.36 ; Jr 11.20+ ; Ez 25.14ss ; Lm 3.60. –  qui me soumet  : litt. qui ramène sous moi , autre verbe en 2S 22.48.'
  - type: text
    content: le Dieu qui m'accorde la vengeance,
  - type: text
    content: qui me soumet des peuples,
  '49':
  - type: text
    content: ' '
  - type: note
    content: 59.2s. –  mes adversaires v. 40n. –  de l'homme violent 140.2.
  - type: text
    content: qui me fait échapper à mes ennemis !
  - type: text
    content: Tu m'élèves au-dessus de mes adversaires,
  - type: text
    content: tu me délivres de l'homme violent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Les liens , comme au v. 6 ; cf. 116.3s ; 2S 22.5 les flots (voir aussi Jon 2.3s) ; plusieurs versions anciennes, dont LXX, ont lu les douleurs  ; cf. Ps 55.5 ; Ac 2.24n. –  torrents  : le même terme est traduit par oued en 83.10 ; cf. Gn 26.17n  ; Jb 6.15n. –  la destruction  : hébreu beliya''al , qui signifie parfois ce qui ne vaut rien et qui a donné le nom Bélial ; cf. Dt 13.14n  ; 2Co 6.15n  ; il signifie peut-être ici le lieu dont on ne remonte pas.'
  - type: text
    content: Les liens de la mort m'avaient enserré,
  - type: text
    content: et les torrents de la destruction m'avaient rempli d'effroi ;
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 15.9. –  je te célébrerai  : cf. 57.10 ; 108.4 ; 1Ch 16.35. –  je chanterai pour ton nom… 7.18n  ; cf. 61.9 ; 66.2.'
  - type: text
    content: 'C''est pourquoi je te célébrerai parmi les nations, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je chanterai pour ton nom.
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'Il fait de grandes choses…  : litt. il fait grandir les saluts de son roi  ; cf. 144.10. –  l''homme qui a reçu son onction (ou  : son messie ) 2.2n  ; cf. 20.7. –  envers David (cf. v. 1+) et envers sa descendance, pour toujours 89.5,30 ; 2S 7.16-29 ; 1R 2.33.'
  - type: text
    content: Il fait de grandes choses pour le salut de son roi,
  - type: text
    content: il agit avec fidélité envers l'homme qui a reçu son onction,
  - type: text
    content: envers David et envers sa descendance, pour toujours.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Voir séjour des morts. –  les filets de la mort  : cf. Pr 13.14 ; 14.27.'
  - type: text
    content: les liens du séjour des morts m'avaient entouré,
  - type: text
    content: les filets de la mort étaient devant moi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Dans ma détresse (4.2n) j''invoque…  : cf. 3.5+ ; 120.1 ; Jon 2.8. –  de son temple  : autre traduction de son palais. –  il m''entend 4.4+. –  les appels…  : litt. mon appel au secours devant lui  ; cf. 2S 22.7n  ; voir aussi Ex 2.23 ; Jc 5.4.'
  - type: text
    content: 'Dans ma détresse, j''invoque le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: j'appelle mon Dieu au secours ;
  - type: text
    content: de son temple, il m'entend,
  - type: text
    content: et les appels au secours que je lance vers lui parviennent à ses oreilles.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 77.19 ; Ex 19.16,18 ; Jg 5.4s ; 1R 19.11s ; Ha 3.3-13. – Les verbes pour fut ébranlée et trembla font assonance en hébreu.
  - type: text
    content: La terre fut ébranlée et trembla,
  - type: text
    content: les fondations des montagnes furent agitées ;
  - type: text
    content: elles s'ébranlèrent, parce qu'il s'était fâché.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 50.3 ; Dt 32.22n  ; Es 30.27.
  - type: text
    content: De la fumée montait de ses narines,
  - type: text
    content: un feu dévorant sortait de sa bouche,
  - type: text
    content: des braises enflammées en jaillissaient.
