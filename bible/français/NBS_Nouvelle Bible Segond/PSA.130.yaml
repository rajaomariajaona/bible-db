document_id: PSA.130,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Depuis les profondeurs…
  - type: text
    content: ' '
  - type: note
    content: montées 120.1n. –  Depuis les profondeurs (en traduction latine de profundis , titre de ce psaume dans la liturgie) 3.5+ ; 69.3,15 ; Es 51.10 ; Ez 27.34 ; Jon 2.3 ; Lm 3.55.
  - type: text
    content: Chant des montées.
  - type: text
    content: 'Depuis les profondeurs je t''invoque, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Que tes oreilles soient attentives  : cf. 17.6n  ; Né 1.6 ; 2Ch 6.40 ; 7.15. –  mes supplications , comme en 28.2n  ; 66.19n.'
  - type: text
    content: Seigneur, entends-moi !
  - type: text
    content: Que tes oreilles soient attentives
  - type: text
    content: à mes supplications !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Si tu prenais garde…  : autres traductions si tu gardais ; si tu observais  ; cf. Jr 3.5 ; Os 13.12ss. –  fautes  : voir péché. –  Seigneur (Yah)  : cf. 68.5n. –  qui… 143.2 ; Ml 3.2 ; Rm 3.23s.'
  - type: text
    content: 'Si tu prenais garde aux fautes, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah),'
  - type: text
    content: Seigneur, qui pourrait tenir debout ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'c''est auprès de toi… , c.-à-d. tu disposes du pardon comme tu l''entends  ; v. 7 ; 36.10 ; Dn 9.9 ; Né 9.17 ; cf. Mc 2.7/ /. –  qu''on te craigne  : cf. 15.4+ ; 25.12,14 ; 67.8 ; 72.5 ; 111.10 ; 112.1 ; Es 8.13 ; 50.10 ; Pr 3.7 ; Ec 3.14.'
  - type: text
    content: Mais c'est auprès de toi que se trouve le pardon,
  - type: text
    content: afin qu'on te craigne.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'J''espère le Seigneur  : autre traduction j''espère, Seigneur  ; cf. 27.14 ; 37.34 ; 40.2 ; 42.6+ ; 112.7 ; Es 26.9. –  j''espère vraiment  : autre traduction mon âme espère  ; cf. 6.4n. –  sa parole 107.20 ; 119.81s,114,147 ; 138.4.'
  - type: text
    content: 'J''espère le '
  - type: text
    content: Seigneur
  - type: text
    content: ', j''espère vraiment ;'
  - type: text
    content: j'attends sa parole.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.6+ ; 123.2 ; Es 21.11s. –  Je (ou mon âme  ; cf. 6.4n) compte sur  : le verbe est sous-entendu en hébreu ; on pourrait aussi traduire je tends vers, j''attends. – Au lieu de plus que les gardes… LXX a lu depuis la veille du matin jusqu''au soir.'
  - type: text
    content: Je compte sur le Seigneur
  - type: text
    content: plus que les gardes sur le matin,
  - type: text
    content: plus que les gardes sur le matin.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Israël, attends…  : cf. v. 5s ; 131.3. –  la fidélité…  : cf. 23.6n.'
  - type: text
    content: 'Israël, attends le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Car c''est auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''est la fidélité,'
  - type: text
    content: et la libération abonde auprès de lui.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 25.22 ; 111.9 ; Mt 1.21 ; Tt 2.14 ; Ap 1.5.
  - type: text
    content: C'est lui qui libérera Israël
  - type: text
    content: de toutes ses fautes.
