document_id: 2SA.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David pleure son fils
  - type: text
    content: ' '
  - type: note
    content: 'bouleversé  : autre traduction tremblant . –  la chambre à l''étage (cf. Jg 3.20n) : au-dessus de la porte de la ville (voir 18.24n), sur la partie élargie de la muraille, une pièce pouvait être aménagée ; c''est là que se tient David. –  en marchant  : un ms grec a lu en pleurant . –  Absalom…  : cf. 18.5.'
  - type: text
    content: 'Alors le roi, bouleversé, monta dans la chambre à l''étage de la porte de la ville et se mit à pleurer. Il disait en marchant : Mon fils Absalom ! mon fils, mon fils Absalom ! Ah ! si j''étais mort à ta place ! Absalom, mon fils, mon fils !'
  '10':
  - type: note
    content: 'les tribus d''Israël désigne les tribus installées dans la partie nord du pays, et qui formeront le royaume du Nord après la mort de Salomon ; ce sont elles qui avaient soutenu les prétentions d''Absalom (voir v. 11). –  à la main des Philistins  : cf. 3.18 ; 5.17-25 ; 21.15-22. –  il a dû fuir  : cf. 15.14.'
  - type: text
    content: 'Dans toutes les tribus d''Israël, tout le peuple discutait ; on disait : Le roi nous a délivrés de la main de nos ennemis, c''est lui qui nous a fait échapper à la main des Philistins, et maintenant il a dû fuir le pays à cause d''Absalom. '
  '11':
  - type: note
    content: 'à qui nous avons conféré l''onction  : litt. que nous avons oint sur nous, c.-à-d. que nous avons fait roi sur nous  ; le chap. 15 n''a pas mentionné cette onction royale. –  pourquoi gardez-vous le silence… ? cf. 1S 7.8.'
  - type: text
    content: 'Or Absalom, à qui nous avons conféré l''onction, est mort au combat ; pourquoi gardez-vous le silence lorsqu''il s''agit de faire revenir le roi ? '
  '12':
  - type: note
    content: 'Tsadoq et Abiathar  : cf. 15.24n. –  aux anciens de Juda  : cf. 1S 30.26 ; David, judéen d''origine, tient à être rétabli sur son trône en priorité par ses concitoyens. –  car la parole…  : autre traduction alors que la parole de tout Israël est parvenue… Cette dernière phrase du v. est placée soit à la fin du v. 11, soit à la fin du v. 13 par certains mss de LXX.'
  - type: text
    content: 'De son côté, le roi David fit dire aux prêtres Tsadoq et Abiathar : Dites aux anciens de Juda : « Pourquoi seriez-vous les derniers à faire revenir le roi chez lui ? » – car la parole de tout Israël était parvenue jusqu''au roi, chez lui. '
  '13':
  - type: note
    content: 'mes os et ma chair  : cf. 5.1n.'
  - type: text
    content: '« Vous êtes mes frères, vous êtes mes os et ma chair ; pourquoi seriez-vous les derniers à ramener le roi ? » '
  '14':
  - type: note
    content: 'Amasa  : cf. 17.25n. –  Que Dieu…  : cf. 1S 3.17n. –  pour toujours  : litt. tous les jours. –  chef de l''armée  : cf. 20.4.'
  - type: text
    content: 'Vous direz aussi à Amasa : « N''es-tu pas mes os et ma chair ? Que Dieu me fasse ceci et qu''il y ajoute cela, si tu ne deviens pas pour toujours devant moi chef de l''armée à la place de Joab ! » '
  '15':
  - type: note
    content: 'Il finit par convaincre…  : litt. il inclina (ou fléchit) le cœur de tous les hommes de Juda  ; ou, selon certains mss et Tg, le cœur de tous les hommes de Juda fut incliné. –  un seul homme suggère l''unité de décision et d''action des Judéens ; cf. Jg 6.16 ; 20.1 ; 1S 11.7.'
  - type: text
    content: 'Il finit par convaincre tous les hommes de Juda comme un seul homme ; ils envoyèrent au roi ce message : Reviens, toi et tous tes hommes.'
  - type: heading
    content: David épargne Shiméi
  '16':
  - type: text
    content: ' '
  - type: note
    content: au Guilgal 1S 10.8+.
  - type: text
    content: 'Le roi revint et arriva jusqu''au Jourdain ; Juda se rendit au Guilgal pour aller à la rencontre du roi et lui faire passer le Jourdain. '
  '17':
  - type: note
    content: 'Shiméi  : cf. 16.5-13. –  avec les hommes de Juda  : litt. avec l''homme de Juda, singulier employé avec une valeur collective.'
  - type: text
    content: 'Shiméi, fils de Guéra, le Benjaminite, qui était de Bahourim, descendit vite avec les hommes de Juda à la rencontre du roi David. '
  '18':
  - type: note
    content: 'Tsiba  : cf. 9.2-12 ; 16.1-4.'
  - type: text
    content: 'Il avait avec lui mille hommes de Benjamin, ainsi que Tsiba, qui était au service de la maison de Saül, avec ses quinze fils et ses vingt serviteurs. Ils parvinrent au Jourdain avant le roi. '
  '19':
  - type: note
    content: 'L''équipe de passeurs…  : litt. le passage passa pour passer la maison du roi…  ; au lieu de l’équipe de passeurs, traduction incertaine d''un terme hébreu rare (cf. 15.28 ; 17.16), d''autres comprennent le bac, le radeau. Certains s''appuient sur LXX pour modifier le texte hébreu traditionnel et traduire  : ils mirent tout en œuvre pour faire passer la maison du roi et répondre à ses désirs. –  comme il lui plaisait  : litt. et pour faire ce qui lui plaisait  ; on pourrait aussi traduire plus librement et exécuter ses ordres.'
  - type: text
    content: 'L''équipe de passeurs passa pour faire passer la maison du roi comme il lui plaisait. Shiméi, fils de Guéra, tomba devant le roi quand celui-ci eut passé le Jourdain. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 37.35 ; Jr 31.15.
  - type: text
    content: 'On dit à Joab : Le roi pleure et mène deuil sur Absalom. '
  '20':
  - type: note
    content: 'Shiméi, coupable d''avoir insulté David qui fuyait (16.5-13), implore le pardon du roi qui est rétabli dans ses prérogatives ; cf. Ps 32.2. –  Ne te souviens pas de  : autre traduction n''évoque pas. –  ô roi  : litt. ô roi, mon seigneur, cf. v. 21. –  N''y fais pas attention  : même expression en 13.33.'
  - type: text
    content: 'Il dit au roi : Mon seigneur, ne tiens pas compte de ma faute. Ne te souviens pas de la faute que, moi, ton serviteur, j''ai commise le jour où toi, ô roi, tu sortais de Jérusalem. N''y fais pas attention ! '
  '21':
  - type: note
    content: 'j''ai péché  : cf. Pr 28.13. –  la maison de Joseph désigne probablement ici, en plus des tribus d''Ephraïm et de Manassé, celle de Benjamin, frère de Joseph.'
  - type: text
    content: 'Je le sais, en effet, j''ai péché ; je suis aujourd''hui le premier de toute la maison de Joseph à descendre à ta rencontre, ô roi, mon seigneur. '
  '22':
  - type: note
    content: 'Abishaï  : cf. 16.9-12 ; 1S 26.6n. –  maudit  : cf. Ex 22.27 ; voir bénédiction, malédiction. –  l''homme qui a reçu l''onction  : cf. 1.14,16 ; 1S 2.10n  ; 26.9.'
  - type: text
    content: 'Alors Abishaï, fils de Tserouya, dit : Shiméi ne doit-il pas être mis à mort pour avoir maudit l''homme qui a reçu l''onction du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? '
  '23':
  - type: note
    content: 'Pourquoi…  : cf. 16.10n. –  fils de Tserouya  : cf. 16.10n  ; Lc 9.54s. –  adversaires  : cf. 1S 29.4n. –  Va-t-on, aujourd''hui, mettre quelqu''un à mort 1S 11.13+ ; cf. 1R 2.46.'
  - type: text
    content: 'Mais David dit : Pourquoi vous mêlez-vous de mes affaires, fils de Tserouya ? Pourquoi vous comportez-vous aujourd''hui en adversaires à mon égard ? Va-t-on, aujourd''hui, mettre quelqu''un à mort en Israël ? Est-ce qu''aujourd''hui je ne sais pas que je suis roi sur Israël ? '
  '24':
  - type: note
    content: 'jura  : cf. 1R 2.8s,36-46.'
  - type: text
    content: 'Et le roi dit à Shiméi : Tu ne mourras pas ! Le roi le lui jura.'
  - type: heading
    content: David se réconcilie avec Mephi-Bosheth
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Saül  : en fait, Mephi-Bosheth est le petit-fils de Saül ; cf. 9.7n  ; 16.3n. –  soigné ses pieds  : litt. fait ses pieds (de même plus loin fait sa moustache ) ; des versions anciennes ont interprété il ne s''était pas lavé les pieds ; il ne s''était pas taillé les ongles des pieds (cf. Dt 21.12) ; certains mss de LXX ajoutent ni ses mains . Les soins corporels négligés expriment une attitude de deuil (cf. 12.20n) ; à sa manière, Mephi-Bosheth s''est associé à la tragédie vécue par David. –  sain et sauf ou victorieux , litt. en paix , cf. 15.27 ; 19.31 ; Jos 10.21+.'
  - type: text
    content: 'Mephi-Bosheth, fils de Saül, descendit aussi à la rencontre du roi. Il n''avait pas soigné ses pieds, il n''avait pas soigné sa moustache, il n''avait pas lavé ses vêtements depuis le jour où le roi s''en était allé jusqu''au jour où il était rentré sain et sauf. '
  '26':
  - type: note
    content: 'à Jérusalem  : cette localisation est surprenante, puisque Mephi-Bosheth habitait Jérusalem (voir 9.13 ; 16.3) et que les rencontres avec Shiméi (v. 16-24) et Barzillaï (v. 32-40) ont lieu aux abords du Jourdain. Pour éviter la difficulté, certains mss grecs tardifs ont changé à Jérusalem en de Jérusalem. Il se peut que, dans le texte primitif, à Jérusalem ait figuré à la fin du v. 25 (revenait sain et sauf à Jérusalem) et qu''il ait été déplacé par une erreur de copie.'
  - type: text
    content: 'Lorsqu''il vint à la rencontre du roi, à Jérusalem, le roi lui dit : Pourquoi n''es-tu pas venu avec moi, Mephi-Bosheth ? '
  '27':
  - type: note
    content: 'Mephi-Bosheth conteste l''explication fournie par Tsiba en 16.3 ; c''est Tsiba qui l’a trompé en l''empêchant de suivre le roi dans sa fuite. –  j''avais dit : Je ferai seller mon âne  : LXX je lui avais dit : Selle mon âne. –  mon âne ou mon ânesse, en tenant compte du pronom féminin qui suit, litt. je la monterai. –  boiteux  : cf. 4.4 ; 9.3,13.'
  - type: text
    content: 'Il répondit : O roi, mon serviteur m''a trompé ; en effet, j''avais dit : Je ferai seller mon âne et je le monterai pour aller avec le roi – car je suis boiteux – '
  '28':
  - type: note
    content: 'il m''a calomnié  : cf. Ps 15.3n  ; le terme hébreu est apparenté à celui que l''on traduit habituellement par pied  ; il y a peut-être là une allusion au handicap de Mephi-Bosheth (boiteux des deux jambes, 9.13). –  comme un messager (ou ange) de Dieu  : voir 14.17,20 ; 1S 29.9n. –  Fais comme il te plaira  : cf. 1S 3.18n.'
  - type: text
    content: 'mais il m''a calomnié auprès de toi, ô roi, mon seigneur. Mais tu es comme un messager de Dieu. Fais comme il te plaira. '
  '29':
  - type: note
    content: 'la maison de mon père  : autre traduction ma famille. –  des gens qui méritent la mort  : litt. des hommes de mort  ; cf. 1R 2.26. –  qui mangent à ta table  : cf. 9.10,13. –  De quel droit…  : un ms de LXX porte  : de qui, alors, pourrais-je obtenir un meilleur traitement ? Mais lorsqu''il cria vers le roi, le roi dit…'
  - type: text
    content: 'Car toute la maison de mon père s''est comportée envers toi comme des gens qui méritent la mort ; et cependant tu m''as placé parmi ceux qui mangent à ta table. De quel droit pourrais-je encore crier vers toi, ô roi ? '
  '3':
  - type: note
    content: 'la victoire  : le mot hébreu correspondant signifie aussi le salut. –  devint un deuil  : cf. Lm 5.15.'
  - type: text
    content: 'Et la victoire, ce jour-là, devint un deuil pour tout le peuple, car en ce jour le peuple entendait dire : Le roi est affligé à cause de son fils. '
  '30':
  - type: note
    content: 'J''ai décidé…  : Après avoir attribué toutes les terres à Mephi-Bosheth (9.9s), puis à Tsiba (16.4), David renonce à rouvrir le dossier et impose un compromis : vous vous partagerez les terres.'
  - type: text
    content: 'Le roi lui dit : Pourquoi discutes-tu encore ? J''ai décidé que, toi et Tsiba, vous vous partagerez les terres. '
  '31':
  - type: text
    content: 'Alors Mephi-Bosheth dit au roi : Qu''il prenne même le tout, puisque tu es rentré chez toi sain et sauf, ô roi, mon seigneur !'
  - type: heading
    content: David récompense Barzillaï
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Barzillaï  : cf. 17.27n. –  pour prendre congé de lui…  : la fin du v. présente en hébreu une construction grammaticale très étrange, mais le sens semble clair ; Tg, Vg pour l''accompagner.'
  - type: text
    content: 'Barzillaï, le Galaadite, descendit de Roguelim et passa le Jourdain avec le roi, pour prendre congé de lui près du Jourdain. '
  '33':
  - type: note
    content: 'très vieux  : cf. Ps 90.10. –  pendant son séjour  : avec une légère modification de vocalisation du mot hébreu ; une modification plus importante permettrait de lire malgré son grand âge. Dans sa forme actuelle, le mot hébreu n''apparaît qu''ici et son sens est inconnu. –  très important  : litt. très grand, qui peut se comprendre également comme très riche.'
  - type: text
    content: 'Barzillaï était très vieux, il avait quatre-vingts ans. Il avait pourvu à tous les besoins du roi pendant son séjour à Mahanaïm, car c''était un homme très important. '
  '34':
  - type: note
    content: 'Viens  : litt. passe ou traverse.'
  - type: text
    content: 'Le roi dit à Barzillaï : Viens avec moi, je pourvoirai à tous tes besoins chez moi, à Jérusalem. '
  '35':
  - type: note
    content: Combien d'années vivrai-je encore… ? litt. comme quoi sont les jours des années de ma vie… ?
  - type: text
    content: 'Mais Barzillaï répondit au roi : Combien d''années vivrai-je encore, pour que je monte avec le roi à Jérusalem ? '
  '36':
  - type: note
    content: 'chanteurs / chanteuses  : cf. Ec 2.8 ; 12.4 ; 2Ch 35.25. –  à charge  : cf. 15.33.'
  - type: text
    content: 'J''ai aujourd''hui quatre-vingts ans. Puis-je distinguer le bon du mauvais ? Puis-je, moi, ton serviteur, savourer le goût de ce que je mange et de ce que je bois ? Puis-je encore apprécier la voix des chanteurs et des chanteuses ? Pourquoi te serais-je encore à charge, ô roi, mon seigneur ? '
  '37':
  - type: note
    content: 'Pour un peu…  : autre traduction j''irai juste un peu au-delà du Jourdain avec toi, ô roi. D''ailleurs, pourquoi… ? –  m''accorderais-tu cette récompense  : autre traduction me traiterais-tu ainsi.'
  - type: text
    content: 'Pour un peu je passerais le Jourdain avec toi, ô roi. Mais pourquoi m''accorderais-tu cette récompense ? '
  '38':
  - type: note
    content: 'Kimham  : certains mss de LXX et de Syr précisent qu''il s''agit du fils de Barzillaï ; cf. 1R 2.7 ; voir aussi Pr 20.7.'
  - type: text
    content: 'Laisse-moi, je te prie, retourner mourir dans ma ville, près de la tombe de mon père et de ma mère ! Mais voici ton serviteur Kimham ; qu''il aille avec toi, ô roi, mon seigneur ; fais pour lui ce qui te plaira. '
  '39':
  - type: text
    content: 'Le roi dit : Que Kimham vienne avec moi, et je ferai pour lui ce qui te plaira ; tout ce que tu voudras de moi, je le ferai pour toi. '
  '4':
  - type: text
    content: 'Ce jour-là, le peuple rentra dans la ville à la dérobée, comme des gens confus de s''être enfuis au cours du combat. '
  '40':
  - type: note
    content: 'embrassa Barzillaï  : cf. 14.33n  ; c''est ici le baiser d''adieu, comme en Gn 32.1 ; 1S 10.1 ; 20.41 ; Rt 1.9,14. –  bénit  : cf. 6.18+. –  puis Barzillaï…  : litt. et il revint à son lieu.'
  - type: text
    content: 'Quand tout le peuple eut passé le Jourdain et que le roi l''eut aussi passé, le roi embrassa Barzillaï et le bénit ; puis Barzillaï rentra chez lui. '
  '41':
  - type: note
    content: 'Comparer les v. 41-44 avec 1R 12. –  du Guilgal  : cf. v. 16. –  Kimham  : ici, en hébreu, son nom est orthographié Kimhan. –  la moitié du peuple d''Israël  : l''unanimité ne règne pas au sein des tribus du Nord sur l''opportunité de se rallier à David (d''où la révolte de Shéba au chap. 20). Mais ceux qui y sont favorables rivalisent avec les Judéens dans ce projet. –  le Jourdain  : sous-entendu dans le texte, litt. avaient fait passer le roi ou (selon une autre tradition de lecture) étaient passés avec le roi.'
  - type: text
    content: Le roi passa en direction du Guilgal, et Kimham passa avec lui.
  - type: heading
    content: Querelle entre Juda et Israël
  - type: text
    content: 'Tout le peuple de Juda et la moitié du peuple d''Israël avaient fait passer le Jourdain au roi. '
  '42':
  - type: note
    content: tous les hommes d'Israël, c.-à-d. tous les partisans du ralliement, qui viennent d'être mentionnés. Cf. v. 11-15.
  - type: text
    content: 'Mais tous les hommes d''Israël vinrent trouver le roi et lui dirent : Pourquoi nos frères, les hommes de Juda, t''ont-ils enlevé ? Pourquoi ont-ils fait passer le Jourdain au roi, à sa maison et à tous les gens de David avec lui ? '
  '43':
  - type: note
    content: 'proche  : David est Judéen lui aussi. –  vécu  : litt. mangé. –  Nous a-t-il fait quelque cadeau ? texte obscur (a-t-il prélevé quelque chose pour nous ?).'
  - type: text
    content: 'Tous les hommes de Juda répondirent aux hommes d''Israël : C''est que le roi nous est proche ; est-ce là une raison de vous fâcher ? Avons-nous vécu aux dépens du roi ? Nous a-t-il fait quelque cadeau ? '
  '44':
  - type: note
    content: 'dix fois autant  : les tribus du Nord sont au nombre de dix, alors que Juda est une tribu unique. –  Mais les hommes de Juda parlèrent…  : le sens de cette dernière affirmation n''est pas très clair ; on pourrait aussi comprendre les hommes de Juda parlèrent avec plus d''obstination que les hommes d''Israël.'
  - type: text
    content: 'Les hommes d''Israël répondirent aux hommes de Juda : Le roi nous appartient dix fois autant, et David même plus qu''à vous. Pourquoi nous avez-vous traités à la légère ? N''avons-nous pas été les premiers à proposer de faire revenir notre roi ? Mais les hommes de Juda parlèrent plus durement que les hommes d''Israël.'
  '5':
  - type: note
    content: 'couvert le visage  : cf. 15.30n.'
  - type: text
    content: 'Le roi s''était couvert le visage. Le roi criait à pleine voix : Mon fils Absalom ! Absalom, mon fils, mon fils ! '
  '6':
  - type: note
    content: 'à tous tes hommes  : litt. à la face de tous tes serviteurs (de même au v. 7). –  t''ont sauvé la vie…  : la victoire militaire d''un usurpateur s''accompagnait souvent de l''élimination de toute la famille régnante ; cf. Jg 9.5s ; 1R 15.29 ; 16.11s ; 2R 10.1-17. –  tes concubines 5.13n.'
  - type: text
    content: 'Joab entra chez le roi et dit : Tu fais honte aujourd''hui à tous tes hommes, à ceux qui aujourd''hui t''ont sauvé la vie, à toi, à tes fils et à tes filles, à tes femmes et à tes concubines. '
  '7':
  - type: note
    content: 'si Absalom était vivant  : cf. 18.5. –  aujourd''hui  : la dernière occurrence de ce mot est omise par certains mss de LXX et Syr. –  cela te conviendrait  : litt. ce serait droit à tes yeux  ; cf. Ex 15.26 ; Jos 9.25 ; Jr 26.14.'
  - type: text
    content: 'Tu aimes ceux qui te détestent et tu détestes ceux qui t''aiment : tu montres aujourd''hui que tes chefs et tes hommes ne sont rien pour toi ; aujourd''hui, je le sais, si Absalom était vivant et si nous étions tous morts aujourd''hui, cela te conviendrait ! '
  '8':
  - type: note
    content: 'Maintenant…  : litt. maintenant, lève-toi, sors et parle. –  parle au cœur de tes hommes  : l''expression hébraïque correspondante suggère habituellement le rétablissement de relations de confiance ; cf. Gn 34.3n  ; 50.21. –  ce soir  : autre traduction cette nuit.'
  - type: text
    content: 'Maintenant, sors et parle au cœur de tes hommes ! Si tu ne sors pas, je le jure par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', il ne restera pas un seul homme avec toi ce soir ; et ce sera pire pour toi que tous les malheurs qui te sont arrivés depuis ta jeunesse jusqu''à présent.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le roi accepte de faire passer les intérêts du royaume avant sa douleur personnelle ; il quitte la pièce où il s''était retiré et vient se présenter devant les soldats ; cf. Pr 16.15. –  alla s''asseoir  : litt. se leva et s''assit . –  de la ville  : sous-entendu dans le texte ; cf. Dt 16.18n. –  chacun dans sa tente  : voir 18.17n  ; Jos 22.4.'
  - type: text
    content: 'Alors le roi alla s''asseoir à la porte de la ville. On fit dire à tout le peuple : Le roi est assis à la porte de la ville. Et tout le peuple vint devant le roi.'
  - type: heading
    content: David invité à rentrer à Jérusalem
  - type: text
    content: 'Cependant Israël s''était enfui, chacun dans sa tente. '
