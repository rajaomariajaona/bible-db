        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : au-dessus de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la porte de la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir 18.24
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), sur la partie élargie de la muraille, une pièce pouvait être aménagée ; c''est là que se tient David. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en marchant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms grec a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en pleurant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Absalom…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 18.5.'
      marker-yv: yv-n
    - type: text
      text: 'Alors le roi, bouleversé, monta dans la chambre à l''étage de la porte de la ville et se mit à pleurer. Il disait en marchant : Mon fils Absalom ! mon fils, mon fils Absalom ! Ah ! si j''étais mort à ta place ! Absalom, mon fils, mon fils !'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les tribus d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne les tribus installées dans la partie nord du pays, et qui formeront le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'royaume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'du Nord après la mort de Salomon ; ce sont elles qui avaient soutenu les prétentions d''Absalom (voir v. 11). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la main des Philistins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.18 ; 5.17-25 ; 21.15-22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a dû fuir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.14.'
      marker-yv: yv-n
    - type: text
      text: 'Dans toutes les tribus d''Israël, tout le peuple discutait ; on disait : Le roi nous a délivrés de la main de nos ennemis, c''est lui qui nous a fait échapper à la main des Philistins, et maintenant il a dû fuir le pays à cause d''Absalom. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à qui nous avons conféré '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que nous avons oint sur nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que nous avons fait roi sur nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le chap. 15 n''a pas mentionné cette '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'onction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'royale. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pourquoi gardez-vous le silence… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. 1S 7.8.
      marker-yv: yv-n
    - type: text
      text: 'Or Absalom, à qui nous avons conféré l''onction, est mort au combat ; pourquoi gardez-vous le silence lorsqu''il s''agit de faire revenir le roi ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsadoq et Abiathar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux anciens de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 30.26 ; David, judéen d''origine, tient à être rétabli sur son trône en priorité par ses concitoyens. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car la parole…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'alors que la parole de tout Israël est parvenue… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette dernière phrase du v. est placée soit à la fin du v. 11, soit à la fin du v. 13 par certains mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'De son côté, le roi David fit dire aux prêtres Tsadoq et Abiathar : Dites aux anciens de Juda : « Pourquoi seriez-vous les derniers à faire revenir le roi chez lui ? » – car la parole de tout Israël était parvenue jusqu''au roi, chez lui. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mes os et ma chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '« Vous êtes mes frères, vous êtes mes os et ma chair ; pourquoi seriez-vous les derniers à ramener le roi ? » '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amasa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que Dieu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 3.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chef de l'armée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.4.'
      marker-yv: yv-n
    - type: text
      text: 'Vous direz aussi à Amasa : « N''es-tu pas mes os et ma chair ? Que Dieu me fasse ceci et qu''il y ajoute cela, si tu ne deviens pas pour toujours devant moi chef de l''armée à la place de Joab ! » '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il finit par convaincre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il inclina '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fléchit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' de tous les hommes de Juda'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ou, selon certains mss et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ', '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cœur de tous les hommes de Juda fut incliné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un seul homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: suggère l'unité de décision et d'action des Judéens ; cf. Jg 6.16 ; 20.1 ; 1S 11.7.
      marker-yv: yv-n
    - type: text
      text: 'Il finit par convaincre tous les hommes de Juda comme un seul homme ; ils envoyèrent au roi ce message : Reviens, toi et tous tes hommes.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David épargne Shiméi
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au Guilgal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 10.8+.
      marker-yv: yv-n
    - type: text
      text: 'Le roi revint et arriva jusqu''au Jourdain ; Juda se rendit au Guilgal pour aller à la rencontre du roi et lui faire passer le Jourdain. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shiméi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.5-13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec les hommes de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec l'homme de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', singulier employé avec une valeur collective.'
      marker-yv: yv-n
    - type: text
      text: 'Shiméi, fils de Guéra, le Benjaminite, qui était de Bahourim, descendit vite avec les hommes de Juda à la rencontre du roi David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tsiba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.2-12 ; 16.1-4.'
      marker-yv: yv-n
    - type: text
      text: 'Il avait avec lui mille hommes de Benjamin, ainsi que Tsiba, qui était au service de la maison de Saül, avec ses quinze fils et ses vingt serviteurs. Ils parvinrent au Jourdain avant le roi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: L'équipe de passeurs…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le passage passa pour passer la maison du roi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; au lieu de l’'
      - type: usfm
        marker: fq
        children:
        - type: text
          text: équipe de passeurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', traduction incertaine d''un terme hébreu rare (cf. 15.28 ; 17.16), d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le bac, le radeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Certains s''appuient sur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' pour modifier le texte hébreu traditionnel et traduire'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils mirent tout en œuvre pour faire passer la maison du roi et répondre à ses désirs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme il lui plaisait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et pour faire ce qui lui plaisait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on pourrait aussi traduire plus librement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et exécuter ses ordres.
      marker-yv: yv-n
    - type: text
      text: 'L''équipe de passeurs passa pour faire passer la maison du roi comme il lui plaisait. Shiméi, fils de Guéra, tomba devant le roi quand celui-ci eut passé le Jourdain. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Gn 37.35 ; Jr 31.15.
      marker-yv: yv-n
    - type: text
      text: 'On dit à Joab : Le roi pleure et mène deuil sur Absalom. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Shiméi, coupable d''avoir insulté David qui fuyait (16.5-13), implore le pardon du roi qui est rétabli dans ses prérogatives ; cf. Ps 32.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne te souviens pas de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'évoque pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ô roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ô roi, mon seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'y fais pas attention
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression en 13.33.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit au roi : Mon seigneur, ne tiens pas compte de ma faute. Ne te souviens pas de la faute que, moi, ton serviteur, j''ai commise le jour où toi, ô roi, tu sortais de Jérusalem. N''y fais pas attention ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 28.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la maison de Joseph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne probablement ici, en plus des tribus d'Ephraïm et de Manassé, celle de Benjamin, frère de Joseph.
      marker-yv: yv-n
    - type: text
      text: 'Je le sais, en effet, j''ai péché ; je suis aujourd''hui le premier de toute la maison de Joseph à descendre à ta rencontre, ô roi, mon seigneur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abishaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.9-12 ; 1S 26.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maudit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 22.27 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''homme qui a reçu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.14,16 ; 1S 2.10'
        - type: usfm
          marker: ord
          children:
          - type: text
