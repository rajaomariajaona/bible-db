          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: traverse.
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit à Barzillaï : Viens avec moi, je pourvoirai à tous tes besoins chez moi, à Jérusalem. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Combien d''années vivrai-je encore… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme quoi sont les jours des années de ma vie… ?
      marker-yv: yv-n
    - type: text
      text: 'Mais Barzillaï répondit au roi : Combien d''années vivrai-je encore, pour que je monte avec le roi à Jérusalem ? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chanteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chanteuses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ec 2.8 ; 12.4 ; 2Ch 35.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à charge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.33.'
      marker-yv: yv-n
    - type: text
      text: 'J''ai aujourd''hui quatre-vingts ans. Puis-je distinguer le bon du mauvais ? Puis-je, moi, ton serviteur, savourer le goût de ce que je mange et de ce que je bois ? Puis-je encore apprécier la voix des chanteurs et des chanteuses ? Pourquoi te serais-je encore à charge, ô roi, mon seigneur ? '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pour un peu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''irai juste un peu au-delà du Jourdain avec toi, ô roi. D''ailleurs, pourquoi… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: m'accorderais-tu cette récompense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me traiterais-tu ainsi.
      marker-yv: yv-n
    - type: text
      text: 'Pour un peu je passerais le Jourdain avec toi, ô roi. Mais pourquoi m''accorderais-tu cette récompense ? '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kimham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' précisent qu''il s''agit du fils de Barzillaï ; cf. 1R 2.7 ; voir aussi Pr 20.7.'
      marker-yv: yv-n
    - type: text
      text: 'Laisse-moi, je te prie, retourner mourir dans ma ville, près de la tombe de mon père et de ma mère ! Mais voici ton serviteur Kimham ; qu''il aille avec toi, ô roi, mon seigneur ; fais pour lui ce qui te plaira. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit : Que Kimham vienne avec moi, et je ferai pour lui ce qui te plaira ; tout ce que tu voudras de moi, je le ferai pour toi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ce jour-là, le peuple rentra dans la ville à la dérobée, comme des gens confus de s''être enfuis au cours du combat. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.40 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: embrassa Barzillaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; c''est ici le baiser d''adieu, comme en Gn 32.1 ; 1S 10.1 ; 20.41 ; Rt 1.9,14. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puis Barzillaï…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il revint à son lieu.
      marker-yv: yv-n
    - type: text
      text: 'Quand tout le peuple eut passé le Jourdain et que le roi l''eut aussi passé, le roi embrassa Barzillaï et le bénit ; puis Barzillaï rentra chez lui. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.41 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Comparer les v. 41-44 avec 1R 12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Guilgal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Kimham
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ici, en hébreu, son nom est orthographié '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Kimhan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la moitié du peuple d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''unanimité ne règne pas au sein des tribus du Nord sur l''opportunité de se rallier à David (d''où la révolte de Shéba au chap. 20). Mais ceux qui y sont favorables rivalisent avec les Judéens dans ce projet. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Jourdain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avaient fait passer le roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou (selon une autre tradition de lecture) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: étaient passés avec le roi.
      marker-yv: yv-n
    - type: text
      text: Le roi passa en direction du Guilgal, et Kimham passa avec lui.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Querelle entre Juda et Israël
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tout le peuple de Juda et la moitié du peuple d''Israël avaient fait passer le Jourdain au roi. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.42 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les hommes d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les partisans du ralliement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui viennent d''être mentionnés. Cf. v. 11-15.'
      marker-yv: yv-n
    - type: text
      text: 'Mais tous les hommes d''Israël vinrent trouver le roi et lui dirent : Pourquoi nos frères, les hommes de Juda, t''ont-ils enlevé ? Pourquoi ont-ils fait passer le Jourdain au roi, à sa maison et à tous les gens de David avec lui ? '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: proche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : David est Judéen lui aussi. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vécu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mangé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nous a-t-il fait quelque cadeau ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: texte obscur (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a-t-il prélevé quelque chose pour nous ?
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Tous les hommes de Juda répondirent aux hommes d''Israël : C''est que le roi nous est proche ; est-ce là une raison de vous fâcher ? Avons-nous vécu aux dépens du roi ? Nous a-t-il fait quelque cadeau ? '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.44 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dix fois autant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les tribus du Nord sont au nombre de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', alors que Juda est une tribu unique. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mais les hommes de Juda parlèrent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sens de cette dernière affirmation n''est pas très clair ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les hommes de Juda parlèrent avec plus d'obstination que les hommes d'Israël.
      marker-yv: yv-n
    - type: text
      text: 'Les hommes d''Israël répondirent aux hommes de Juda : Le roi nous appartient dix fois autant, et David même plus qu''à vous. Pourquoi nous avez-vous traités à la légère ? N''avons-nous pas été les premiers à proposer de faire revenir notre roi ? Mais les hommes de Juda parlèrent plus durement que les hommes d''Israël.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: couvert le visage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi s''était couvert le visage. Le roi criait à pleine voix : Mon fils Absalom ! Absalom, mon fils, mon fils ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à tous tes hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à la face de tous tes serviteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même au v. 7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'ont sauvé la vie…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la victoire militaire d''un usurpateur s''accompagnait souvent de l''élimination de toute la famille régnante ; cf. Jg 9.5s ; 1R 15.29 ; 16.11s ; 2R 10.1-17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tes concubines '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Joab entra chez le roi et dit : Tu fais honte aujourd''hui à tous tes hommes, à ceux qui aujourd''hui t''ont sauvé la vie, à toi, à tes fils et à tes filles, à tes femmes et à tes concubines. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si Absalom était vivant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aujourd'hui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la dernière occurrence de ce mot est omise par certains mss de LXX et Syr. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cela te conviendrait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce serait droit à tes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 15.26 ; Jos 9.25 ; Jr 26.14.'
      marker-yv: yv-n
    - type: text
      text: 'Tu aimes ceux qui te détestent et tu détestes ceux qui t''aiment : tu montres aujourd''hui que tes chefs et tes hommes ne sont rien pour toi ; aujourd''hui, je le sais, si Absalom était vivant et si nous étions tous morts aujourd''hui, cela te conviendrait ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maintenant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant, lève-toi, sors et parle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parle au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' de tes hommes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''expression hébraïque correspondante suggère habituellement le rétablissement de relations de confiance ; cf. Gn 34.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 50.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce soir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette nuit.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, sors et parle au cœur de tes hommes ! Si tu ne sors pas, je le jure par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', il ne restera pas un seul homme avec toi ce soir ; et ce sera pire pour toi que tous les malheurs qui te sont arrivés depuis ta jeunesse jusqu''à présent.'
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'accepte de faire passer les intérêts du royaume avant sa douleur personnelle ; il quitte la pièce où il s''était retiré et vient se présenter devant les soldats ; cf. Pr 16.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: alla s'asseoir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se leva et s'assit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte ; cf. Dt 16.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chacun dans sa tente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir 18.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 22.4.'
      marker-yv: yv-n
    - type: text
      text: 'Alors le roi alla s''asseoir à la porte de la ville. On fit dire à tout le peuple : Le roi est assis à la porte de la ville. Et tout le peuple vint devant le roi.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David invité à rentrer à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Cependant Israël s''était enfui, chacun dans sa tente. '
