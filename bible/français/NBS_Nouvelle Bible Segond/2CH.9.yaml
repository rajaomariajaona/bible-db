    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout ce qu''elle avait dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 14.7 ; 2S 7.3.
    marker-yv: yv-n
  - type: text
    text: 'La reine de Saba entendit parler de la réputation de Salomon et vint à Jérusalem pour le mettre à l''épreuve par des énigmes. Elle avait une suite très importante et des chameaux portant des essences odoriférantes, de l''or en quantité et des pierres précieuses. Elle vint trouver Salomon et parla avec lui de tout ce qu''elle avait dans le cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Salomon lui expliqua tout ce qu'elle demandait ; il n'y avait rien de caché que Salomon ne pût lui expliquer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'La reine de Saba vit la sagesse de Salomon, la maison qu''il avait bâtie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et leurs vêtements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la précision est omise par 1R 10.5 pour les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: échansons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les marches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant, dérivé du verbe traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: montait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', désigne habituellement les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chambres à l''étage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (3.9 ; Jg 3.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; 1R 10.5 porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les holocaustes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (terme apparenté).
    marker-yv: yv-n
  - type: text
    text: 'les mets de sa table, l''habitation des gens de sa cour, la fonction de ses auxiliaires et leurs vêtements, ses échansons et leurs vêtements, et les marches par lesquelles on montait à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : elle en eut le souffle coupé. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Elle dit alors au roi : C''était donc vrai, ce que j''ai appris dans mon pays au sujet de tes paroles et de ta sagesse ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qu'on en disait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'leurs paroles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 1R 10.7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je n'y croyais pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'je ne croyais pas les paroles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les choses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je ne croyais pas cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' omettent le suffixe possessif et lisent comme en 1R 10.7.'
    marker-yv: yv-n
  - type: text
    text: 'Je ne croyais pas ce qu''on en disait, avant d''être venue et de l''avoir vu de mes yeux. Et on ne m''avait pas dit la moitié de ta grande sagesse ! Tu surpasses ce que ta réputation m''avait laissé entendre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Heureux tes hommes, heureux tes gens qui se tiennent constamment à ton service et qui entendent ta sagesse ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Béni
      - type: text
        text: ' soit le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', ton Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1R 1.48+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que tu agisses selon l''équité et la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 10.9+.
    marker-yv: yv-n
  - type: text
    text: 'Béni soit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, qui a pris plaisir en toi et t''a placé sur son trône comme roi pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu ! Parce que ton Dieu aime Israël et veut le faire subsister pour toujours, il t''a fait roi sur lui pour que tu agisses selon l''équité et la justice. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cent vingt talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '≈ 4,1 t ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: Elle donna au roi cent vingt talents d'or, une très grande quantité d'essences odoriférantes et des pierres précieuses. Il n'y a plus eu d'essences odoriférantes telles que celles que la reine de Saba donna au roi Salomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hiram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : selon une lecture traditionnelle et la plupart des versions anciennes ; certains mss hébreux et Tg portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Houram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 1R 5.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ophir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 9.26-28
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: santal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 11 ; 2.7 ; 1R 10.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s.
    marker-yv: yv-n
  - type: text
    text: 'Les hommes de Hiram et les hommes de Salomon, qui apportèrent de l''or d''Ophir, amenèrent aussi du bois de santal et des pierres précieuses. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'santal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi fit avec le bois de santal des voies d''accès pour la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et pour la maison du roi, ainsi que des lyres et des luths pour les chantres. On n''en avait pas vu de semblables auparavant dans le pays de Juda.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle s'en retourna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : verbe synonyme en 1R 10.13.'
    marker-yv: yv-n
  - type: text
    text: Le roi Salomon donna à la reine de Saba tout ce qu'elle souhaita demander, plus qu'elle n'avait apporté au roi. Puis elle s'en retourna dans son pays, elle et les gens de sa cour.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les richesses de Salomon
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1R 10.14-29
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Pour les v. 13-28, cf. Mt 6.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'six cent soixante-six talents '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ≈ 22,8 t.
    marker-yv: yv-n
  - type: text
    text: 'Le poids de l''or qui arrivait à Salomon chaque année était de six cent soixante-six talents d''or, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: marchands
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre terme en 1R 10.15.'
    marker-yv: yv-n
  - type: text
    text: outre ce qui provenait des prospecteurs et des marchands qui en apportaient, ainsi que de tous les rois d'Arabie et des gouverneurs du pays, qui apportaient de l'or et de l'argent à Salomon.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'six cents sicles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ≈ 6 kg.
    marker-yv: yv-n
  - type: text
    text: 'Le roi Salomon fit deux cents grands boucliers d''or battu, pour chacun desquels il employa six cents sicles d''or battu, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trois cents sicles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '≈ 3 kg (le terme correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sicles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est probablement sous-entendu) ; cf. 1R 10.17
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: trois mines
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: ', poids et monnaies.'
    marker-yv: yv-n
  - type: text
    text: 'et trois cents petits boucliers d''or battu, pour chacun desquels il employa trois cents sicles d''or ; le roi les mit dans la maison-de-la-forêt-du-Liban. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'or '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.21 ; Ex 25.11+ ; 1Ch 28.17s.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi fit un grand trône d''ivoire et le couvrit d''or pur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ce trône avait six marches et un marchepied d''or attenant au trône ; il y avait des bras de chaque côté du siège, deux lions debout à côté des bras, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'et douze lions debout sur les six marches de part et d''autre. Il ne s''est rien fait de pareil pour aucun royaume. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la maison-de-la-forêt-du-Liban '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 7.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''or fin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 6.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le service à boissons du roi Salomon était d''or, et toute la vaisselle de la maison-de-la-forêt-du-Liban était d''or fin. Rien n''était d''argent : on n''en faisait aucun cas aux jours de Salomon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des bateaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1R 9.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Houram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des mss hébreux et des versions anciennes portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hiram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Car le roi avait des bateaux qui allaient à Tarsis avec les hommes de Houram ; tous les trois ans arrivaient les bateaux de Tarsis, apportant de l'or et de l'argent, de l'ivoire, des singes et des paons.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Le roi Salomon fut plus grand que tous les rois de la terre par sa richesse et par sa sagesse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: recherchaient Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: recherchaient la face de Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ps 27.8+ ; Pr 29.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la sagesse… dans son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ex 31.6 ; Ps 90.12 ; Pr 2.10 ; 14.33.
    marker-yv: yv-n
  - type: text
    text: 'Tous les rois de la terre recherchaient Salomon, pour entendre la sagesse que Dieu avait mise dans son cœur. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'présent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tribut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 17.5,11 ; 26.8.'
    marker-yv: yv-n
  - type: text
    text: 'Chacun apportait son présent, des objets d''argent et des objets d''or, des vêtements, des armes, des essences odoriférantes, des chevaux et des mulets. Il en était ainsi chaque année. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre mille stalles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 5.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: hommes d'équipage pour les chars
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: équipages, attelages, chevaux d'attelage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1R 5.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 10.26+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des villes de garnison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des villes de chars
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 1R 10.26.'
    marker-yv: yv-n
  - type: text
    text: 'Salomon avait quatre mille stalles pour les chevaux et les chars, et douze mille hommes d''équipage pour les chars, qu''il installa dans des villes de garnison et à Jérusalem, près du roi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1R 5.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il dominait sur tous les rois depuis le Fleuve, le pays des Philistins, et jusqu''à la frontière d''Egypte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aussi commun
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 20.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi rendit l''argent aussi commun à Jérusalem que les pierres ; il rendit les cèdres aussi nombreux que les sycomores qui sont dans le Bas-Pays. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.28 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1.16.
    marker-yv: yv-n
  - type: text
    text: On amenait d'Egypte et de tous les pays des chevaux pour Salomon.
- type: usfm
  marker: s1
