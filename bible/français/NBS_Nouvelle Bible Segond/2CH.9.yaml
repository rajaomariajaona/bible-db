  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le reste de l''histoire… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
