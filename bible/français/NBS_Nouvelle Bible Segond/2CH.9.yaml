      - type: text
        text: le début et la fin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 12.15 ; 16.11 ; 20.34 ; 25.26 ; 26.22 ; 28.26 ; 35.27 ; 1Ch 29.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''histoire de Nathan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Ch 29.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le message '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophétique
      - type: text
        text: ' d''Ahiya de Silo'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1R 11.29ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yéédo
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yéedi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; c''est peut-être le même qui est nommé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Iddo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 12.15 ; 13.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jéroboam, fils de Nebath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.26
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le reste de l''histoire de Salomon, le début et la fin, cela est écrit dans l''histoire de Nathan, le prophète, dans le message prophétique d''Ahiya de Silo et dans les visions de Yéédo, le visionnaire, sur Jéroboam, fils de Nebath. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1R 2.11.
    marker-yv: yv-n
  - type: text
    text: 'Salomon régna quarante ans à Jérusalem sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on l'ensevelit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 11.43 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (il) fut enseveli
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même en 2Ch 21.20/ / ; 27.9/ / ; 28.27/ / ; 33.20/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la Ville de David
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.16 ; 13.23 ; 21.20 ; 24.16,25 ; 27.9 ; 1R 15.8.'
    marker-yv: yv-n
  - type: text
    text: Puis Salomon se coucha avec ses pères, et on l'ensevelit dans la Ville de David, son père. Roboam, son fils, devint roi à sa place.
