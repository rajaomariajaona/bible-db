document_id: 2CH.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La reine de Saba rend visite à Salomon
  - type: heading
    content: 1R 10.1-13
  - type: text
    content: ' '
  - type: note
    content: 'le mettre à l''épreuve  : litt. mettre à l''épreuve Salomon . –  tout ce qu''elle avait dans le cœur 1S 14.7 ; 2S 7.3.'
  - type: text
    content: 'La reine de Saba entendit parler de la réputation de Salomon et vint à Jérusalem pour le mettre à l''épreuve par des énigmes. Elle avait une suite très importante et des chameaux portant des essences odoriférantes, de l''or en quantité et des pierres précieuses. Elle vint trouver Salomon et parla avec lui de tout ce qu''elle avait dans le cœur. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Hiram  : selon une lecture traditionnelle et la plupart des versions anciennes ; certains mss hébreux et Tg portent Houram  ; cf. 1R 5.15n  ; 10.11+. –  Ophir 1R 9.26-28n. –  santal  : cf. v. 11 ; 2.7 ; 1R 10.11ns.'
  - type: text
    content: 'Les hommes de Hiram et les hommes de Salomon, qui apportèrent de l''or d''Ophir, amenèrent aussi du bois de santal et des pierres précieuses. '
  '11':
  - type: note
    content: santal v. 10n.
  - type: text
    content: 'Le roi fit avec le bois de santal des voies d''accès pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et pour la maison du roi, ainsi que des lyres et des luths pour les chantres. On n''en avait pas vu de semblables auparavant dans le pays de Juda.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'elle s''en retourna  : verbe synonyme en 1R 10.13.'
  - type: text
    content: Le roi Salomon donna à la reine de Saba tout ce qu'elle souhaita demander, plus qu'elle n'avait apporté au roi. Puis elle s'en retourna dans son pays, elle et les gens de sa cour.
  - type: heading
    content: Les richesses de Salomon
  - type: heading
    content: 1R 10.14-29
  '13':
  - type: text
    content: ' '
  - type: note
    content: Pour les v. 13-28, cf. Mt 6.29. –  six cent soixante-six talents ≈ 22,8 t.
  - type: text
    content: 'Le poids de l''or qui arrivait à Salomon chaque année était de six cent soixante-six talents d''or, '
  '14':
  - type: note
    content: 'marchands  : autre terme en 1R 10.15.'
  - type: text
    content: outre ce qui provenait des prospecteurs et des marchands qui en apportaient, ainsi que de tous les rois d'Arabie et des gouverneurs du pays, qui apportaient de l'or et de l'argent à Salomon.
  '15':
  - type: text
    content: ' '
  - type: note
    content: six cents sicles ≈ 6 kg.
  - type: text
    content: 'Le roi Salomon fit deux cents grands boucliers d''or battu, pour chacun desquels il employa six cents sicles d''or battu, '
  '16':
  - type: note
    content: trois cents sicles ≈ 3 kg (le terme correspondant à sicles est probablement sous-entendu) ; cf. 1R 10.17n (trois mines) ; voir mesures, poids et monnaies.
  - type: text
    content: 'et trois cents petits boucliers d''or battu, pour chacun desquels il employa trois cents sicles d''or ; le roi les mit dans la maison-de-la-forêt-du-Liban. '
  '17':
  - type: note
    content: 'or pur  : cf. 4.21 ; Ex 25.11+ ; 1Ch 28.17s.'
  - type: text
    content: 'Le roi fit un grand trône d''ivoire et le couvrit d''or pur. '
  '18':
  - type: text
    content: 'Ce trône avait six marches et un marchepied d''or attenant au trône ; il y avait des bras de chaque côté du siège, deux lions debout à côté des bras, '
  '19':
  - type: text
    content: 'et douze lions debout sur les six marches de part et d''autre. Il ne s''est rien fait de pareil pour aucun royaume. '
  '2':
  - type: text
    content: Salomon lui expliqua tout ce qu'elle demandait ; il n'y avait rien de caché que Salomon ne pût lui expliquer.
  '20':
  - type: note
    content: la maison-de-la-forêt-du-Liban 1R 7.2n. –  d'or fin 1R 6.20n.
  - type: text
    content: 'Tout le service à boissons du roi Salomon était d''or, et toute la vaisselle de la maison-de-la-forêt-du-Liban était d''or fin. Rien n''était d''argent : on n''en faisait aucun cas aux jours de Salomon. '
  '21':
  - type: note
    content: 'des bateaux 1R 9.26+. –  Houram  : des mss hébreux et des versions anciennes portent Hiram  ; cf. v. 10n.'
  - type: text
    content: Car le roi avait des bateaux qui allaient à Tarsis avec les hommes de Houram ; tous les trois ans arrivaient les bateaux de Tarsis, apportant de l'or et de l'argent, de l'ivoire, des singes et des paons.
  '22':
  - type: text
    content: 'Le roi Salomon fut plus grand que tous les rois de la terre par sa richesse et par sa sagesse. '
  '23':
  - type: note
    content: 'recherchaient Salomon  : litt. recherchaient la face de Salomon  ; cf. Ps 27.8+ ; Pr 29.26n. –  la sagesse… dans son cœur Ex 31.6 ; Ps 90.12 ; Pr 2.10 ; 14.33.'
  - type: text
    content: 'Tous les rois de la terre recherchaient Salomon, pour entendre la sagesse que Dieu avait mise dans son cœur. '
  '24':
  - type: note
    content: 'présent ou tribut  : cf. 17.5,11 ; 26.8.'
  - type: text
    content: 'Chacun apportait son présent, des objets d''argent et des objets d''or, des vêtements, des armes, des essences odoriférantes, des chevaux et des mulets. Il en était ainsi chaque année. '
  '25':
  - type: note
    content: 'quatre mille stalles  : cf. 1R 5.6. –  hommes d''équipage pour les chars  : autres traductions équipages, attelages, chevaux d''attelage  ; cf. 1R 5.6n  ; 10.26+. –  des villes de garnison  : litt. des villes de chars, comme en 1R 10.26.'
  - type: text
    content: 'Salomon avait quatre mille stalles pour les chevaux et les chars, et douze mille hommes d''équipage pour les chars, qu''il installa dans des villes de garnison et à Jérusalem, près du roi. '
  '26':
  - type: note
    content: Cf. 1R 5.1n.
  - type: text
    content: 'Il dominait sur tous les rois depuis le Fleuve, le pays des Philistins, et jusqu''à la frontière d''Egypte. '
  '27':
  - type: note
    content: 'aussi commun  : cf. v. 20.'
  - type: text
    content: 'Le roi rendit l''argent aussi commun à Jérusalem que les pierres ; il rendit les cèdres aussi nombreux que les sycomores qui sont dans le Bas-Pays. '
  '28':
  - type: note
    content: Cf. 1.16.
  - type: text
    content: On amenait d'Egypte et de tous les pays des chevaux pour Salomon.
  - type: heading
    content: La mort de Salomon
  - type: heading
    content: 1R 11.41-43
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  le début et la fin  : cf. 12.15 ; 16.11 ; 20.34 ; 25.26 ; 26.22 ; 28.26 ; 35.27 ; 1Ch 29.29. –  l''histoire de Nathan 1Ch 29.29n. –  le message prophétique d''Ahiya de Silo  : cf. 1R 11.29ss. –  Yéédo  : autre lecture traditionnelle Yéedi  ; c''est peut-être le même qui est nommé Iddo en 12.15 ; 13.22. –  Jéroboam, fils de Nebath 1R 11.26n.'
  - type: text
    content: 'Le reste de l''histoire de Salomon, le début et la fin, cela est écrit dans l''histoire de Nathan, le prophète, dans le message prophétique d''Ahiya de Silo et dans les visions de Yéédo, le visionnaire, sur Jéroboam, fils de Nebath. '
  '3':
  - type: text
    content: 'La reine de Saba vit la sagesse de Salomon, la maison qu''il avait bâtie, '
  '30':
  - type: note
    content: Cf. 1R 2.11.
  - type: text
    content: 'Salomon régna quarante ans à Jérusalem sur tout Israël. '
  '31':
  - type: note
    content: 'on l''ensevelit  : cf. 1R 11.43 (il) fut enseveli  ; de même en 2Ch 21.20/ / ; 27.9/ / ; 28.27/ / ; 33.20/ /. –  dans la Ville de David  : cf. 12.16 ; 13.23 ; 21.20 ; 24.16,25 ; 27.9 ; 1R 15.8.'
  - type: text
    content: Puis Salomon se coucha avec ses pères, et on l'ensevelit dans la Ville de David, son père. Roboam, son fils, devint roi à sa place.
  '4':
  - type: note
    content: 'et leurs vêtements  : la précision est omise par 1R 10.5 pour les échansons. –  les marches  : le terme correspondant, dérivé du verbe traduit par montait, désigne habituellement les chambres à l''étage (3.9 ; Jg 3.20n) ; 1R 10.5 porte les holocaustes (terme apparenté).'
  - type: text
    content: 'les mets de sa table, l''habitation des gens de sa cour, la fonction de ses auxiliaires et leurs vêtements, ses échansons et leurs vêtements, et les marches par lesquelles on montait à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : elle en eut le souffle coupé. '
  '5':
  - type: text
    content: 'Elle dit alors au roi : C''était donc vrai, ce que j''ai appris dans mon pays au sujet de tes paroles et de ta sagesse ! '
  '6':
  - type: note
    content: 'ce qu''on en disait  : litt. leurs paroles (cf. 1R 10.7 je n''y croyais pas, litt. je ne croyais pas les paroles ou les choses, c.-à-d. je ne croyais pas cela) ; LXX et Tg omettent le suffixe possessif et lisent comme en 1R 10.7.'
  - type: text
    content: 'Je ne croyais pas ce qu''on en disait, avant d''être venue et de l''avoir vu de mes yeux. Et on ne m''avait pas dit la moitié de ta grande sagesse ! Tu surpasses ce que ta réputation m''avait laissé entendre. '
  '7':
  - type: text
    content: 'Heureux tes hommes, heureux tes gens qui se tiennent constamment à ton service et qui entendent ta sagesse ! '
  '8':
  - type: note
    content: Béni soit le Seigneur, ton Dieu 1R 1.48+. –  que tu agisses selon l'équité et la justice 1R 10.9+.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui a pris plaisir en toi et t''a placé sur son trône comme roi pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ! Parce que ton Dieu aime Israël et veut le faire subsister pour toujours, il t''a fait roi sur lui pour que tu agisses selon l''équité et la justice. '
  '9':
  - type: note
    content: cent vingt talents ≈ 4,1 t ; voir mesures, poids et monnaies.
  - type: text
    content: Elle donna au roi cent vingt talents d'or, une très grande quantité d'essences odoriférantes et des pierres précieuses. Il n'y a plus eu d'essences odoriférantes telles que celles que la reine de Saba donna au roi Salomon.
