document_id: 1CO.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La collecte pour l'Eglise de Jérusalem
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.1+. –  la collecte en faveur des saints (1.2+) c.-à-d. des chrétiens de Jérusalem Ac 11.29+ ; 24.17 ; Rm 15.25-32 ; 2Co 8–9. –  prescrit aux Eglises 7.17. –  Galatie Ga 1.2 ; 2.10 ; cf. Ac 18.23.
  - type: text
    content: 'Pour ce qui concerne la collecte en faveur des saints, faites, vous aussi, comme je l''ai prescrit aux Eglises de Galatie. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Timothée 4.17+ ; cf. 2Tm 1.6-8. –  l'œuvre du Seigneur 15.58.
  - type: text
    content: 'Si Timothée arrive, faites en sorte qu''il soit sans crainte chez vous, car il travaille comme moi à l''œuvre du Seigneur. '
  '11':
  - type: note
    content: 'que personne… 1Tm 4.12. –  Fournissez-lui…  : autre traduction renvoyez-le en paix vers moi  ; cf. v. 6+.'
  - type: text
    content: Donc, que personne ne le méprise ! Fournissez-lui ce dont il aura besoin pour faire un bon voyage jusqu'à moi, car je l'attends avec les frères.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 1.12+.
  - type: text
    content: Pour ce qui concerne le frère Apollos, je l'ai beaucoup encouragé à venir vous voir avec les frères, mais ce n'était décidément pas sa volonté de le faire maintenant ; il viendra quand il en aura l'occasion.
  - type: heading
    content: Dernières recommandations et salutations
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Veillez Mc 13.37+ ; cf. Rm 13.11-14 ; 1Th 5.6. –  tenez-vous  : autres traductions tenez-vous debout ; tenez ferme  ; cf. Rm 11.20n (autre verbe) ; même verbe en Rm 14.4 ( tenir debout ) ; Ga 5.1 ; Ph 1.27 ; 4.1 ; 1Th 3.8 ; 2Th 2.15. –  comportez-vous en hommes  : c.-à-d. soyez courageux , cf. Ps 31.25n. –  soyez forts Ep 6.10.'
  - type: text
    content: 'Veillez, tenez-vous dans la foi, comportez-vous en hommes, soyez forts. '
  '14':
  - type: note
    content: 13.1-13 ; cf. 14.40.
  - type: text
    content: Que parmi vous tout se fasse avec amour !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'V. 17 ; 1.16. –  Je vous fais…  : litt. je vous y encourage , cf. 1.10+. –  prémices (cf. 15.20+) de l''Achaïe (2Co 1.1n) : probablement les tout premiers chrétiens de la région de Corinthe (cf. Rm 16.5). –  service 12.5 ; Rm 12.7. –  des saints 1.2+.'
  - type: text
    content: 'Je vous fais encore une recommandation, mes frères. Vous savez que la maison de Stéphanas est les prémices de l''Achaïe, et qu''elle s''est mise au service des saints. '
  '16':
  - type: note
    content: 'Ph 2.30 ; 1Th 5.12s ; 1Tm 5.17. –  Soumettez-vous Hé 13.17. –  de telles personnes  : autre traduction de tels hommes. –  collaborent  : autre traduction qui collaborent avec eux  ; cf. Rm 16.3.'
  - type: text
    content: 'Soumettez-vous, vous aussi, à de telles personnes, ainsi qu''à tous ceux qui collaborent et qui se donnent de la peine. '
  '17':
  - type: note
    content: 'la présence  : autre traduction la venue  ; dans d''autres contextes le même terme est traduit par avènement, cf. Mt 24.3n  ; Ph 2.12n. –  Stéphanas v. 15. –  ils ont suppléé  : litt. ils ont rempli votre manque  ; même formule en Ph 2.30 ; cf. 2Co 8.14 ; 9.12.'
  - type: text
    content: 'Je me réjouis de la présence de Stéphanas, de Fortunatus et d''Achaïcos ; ils ont suppléé à votre absence, '
  '18':
  - type: note
    content: Cf. 2Co 2.13 ; 7.13.
  - type: text
    content: car ils ont tranquillisé mon esprit et le vôtre. Sachez donc apprécier de telles personnes.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Les Eglises (cf. 11.16+) de la province romaine d'Asie (Ac 16.6n) dont Ephèse (1Co 16.8) était la capitale ; cf. Ap 1.4,11. –  Aquilas et Prisca Ac 18.2ss,18 ; cf. Rm 16.3-5.
  - type: text
    content: 'Les Eglises d''Asie vous saluent. Aquilas et Prisca, avec l''Eglise qui est dans leur maison, vous saluent bien dans le Seigneur. '
  '2':
  - type: note
    content: 'le premier jour de la semaine  : c.-à-d. le dimanche, comme en Mc 16.2n/ / ; Ac 20.7 ; cf. Ap 1.10n.'
  - type: text
    content: 'Que chacun de vous, le premier jour de la semaine, mette à part chez lui ce qu''il pourra, selon ses moyens, afin qu''on n''attende pas mon arrivée pour faire les collectes. '
  '20':
  - type: note
    content: Rm 16.16+.
  - type: text
    content: Tous les frères vous saluent. Saluez-vous les uns les autres par un saint baiser.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ga 6.11ss ; Col 4.18 ; 2Th 3.17 ; Phm 19.
  - type: text
    content: 'La salutation est de ma main à moi, Paul. '
  '22':
  - type: note
    content: 'n''est pas l''ami du Seigneur  : cf. Ep 6.14. –  anathème 12.3n  ; cf. Ga 1.8s. –  Marana tha ou, selon certains mss, Maran atha  : transcription d''une expression araméenne signifiant le Seigneur est venu, le Seigneur vient ou Seigneur, viens ! cf. 11.26ss ; Ap 22.20. – Cf. Didachè 10.6 (conclusion du rituel de la Cène) : « Que la grâce vienne et que ce monde passe ! Hosanna (cf. Mt 21.9n) au Dieu de David ! Si quelqu''un est saint, qu''il vienne ! Si quelqu''un ne l''est pas, qu''il fasse pénitence ! Maranatha. »'
  - type: text
    content: 'Si quelqu''un n''est pas l''ami du Seigneur, qu''il soit anathème ! '
  - type: text
    content: Marana tha !
  - type: text
    content: ' '
  '23':
  - type: note
    content: Rm 16.20+ ; 1Th 5.27.
  - type: text
    content: 'Que la grâce du Seigneur Jésus soit avec vous ! '
  '24':
  - type: note
    content: 'Certains mss portent, avec diverses variantes, l''indication suivante  : [Epître de Paul, apôtre, et de Sosthène] aux Corinthiens [1re], écrite d''Ephèse [de Philippes], par l''entremise de Stéphanas, de Fortunatus, d''Achaïcos et de Timothée.'
  - type: text
    content: Mon amour est avec vous tous en Jésus-Christ.
  '3':
  - type: note
    content: 'Cf. 2Co 8.19-21. –  choisis  : litt. approuvés ou éprouvés (3.13n). –  vos dons  : le même mot est traduit habituellement par grâce  ; cf. 2Co 8.4nss.'
  - type: text
    content: 'Quand je serai là, j''enverrai avec des lettres ceux que vous aurez choisis pour porter vos dons à Jérusalem ; '
  '4':
  - type: note
    content: Cf. Rm 15.24s.
  - type: text
    content: s'il vaut la peine que j'y aille moi-même, ils feront le voyage avec moi.
  - type: heading
    content: Projets de voyage de l'apôtre
  '5':
  - type: text
    content: ' '
  - type: note
    content: 4.19+ ; Ac 19.21 ; 20.1 ; 2Co 1.16.
  - type: text
    content: 'Je viendrai vous voir quand je serai passé par la Macédoine – je passe en effet par la Macédoine. '
  '6':
  - type: note
    content: 'l''hiver Tt 3.12. –  que vous me fournissiez…  : cf. v. 11n  ; Rm 15.24n.'
  - type: text
    content: 'Peut-être demeurerai-je chez vous, ou même y passerai-je l''hiver, afin que vous me fournissiez vous-mêmes ce dont j''aurai besoin pour poursuivre mon voyage. '
  '7':
  - type: note
    content: Cf. Ac 20.2s. –  si le Seigneur… Ac 18.21+.
  - type: text
    content: 'Je ne veux pas, cette fois-ci, vous voir en passant : j''espère demeurer quelque temps chez vous, si le Seigneur le permet. '
  '8':
  - type: note
    content: 'Ephèse 15.32 ; Ac 19.1ss. –  Pentecôte  : voir calendrier et fêtes.'
  - type: text
    content: 'Je demeurerai néanmoins à Ephèse jusqu''à la Pentecôte ; '
  '9':
  - type: note
    content: 'porte 2Co 2.12 ; Col 4.3 ; cf. Ac 14.27 ; Ap 3.8. –  prometteuse  : litt. opérante ou efficace, cf. 12.6n  ; d''autres comprennent pour l''activité, pour mon activité. –  adversaires Ph 1.28.'
  - type: text
    content: car une porte s'est ouverte toute grande, prometteuse, et les adversaires sont nombreux.
