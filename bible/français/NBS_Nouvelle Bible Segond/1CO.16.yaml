        text: '16.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ac 20.2s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'si le Seigneur… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ac 18.21+.
    marker-yv: yv-n
  - type: text
    text: 'Je ne veux pas, cette fois-ci, vous voir en passant : j''espère demeurer quelque temps chez vous, si le Seigneur le permet. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
