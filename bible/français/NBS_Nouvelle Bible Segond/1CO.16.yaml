    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(1.2+) c.-à-d. des chrétiens de Jérusalem Ac 11.29+ ; 24.17 ; Rm 15.25-32 ; 2Co 8–9. –  '
    - type: usfm
      marker: fq
