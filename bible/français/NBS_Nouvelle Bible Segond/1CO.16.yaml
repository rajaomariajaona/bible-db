      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Galatie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ga 1.2 ; 2.10 ; cf. Ac 18.23.
    marker-yv: yv-n
  - type: text
    text: 'Pour ce qui concerne la collecte en faveur des saints, faites, vous aussi, comme je l''ai prescrit aux Eglises de Galatie. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le premier jour de la semaine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. le dimanche, comme en Mc 16.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: / / ; Ac 20.7 ; cf. Ap 1.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Que chacun de vous, le premier jour de la semaine, mette à part chez lui ce qu''il pourra, selon ses moyens, afin qu''on n''attende pas mon arrivée pour faire les collectes. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
