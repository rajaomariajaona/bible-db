      marker: fr
      children:
      - type: text
        text: '16.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 2Co 8.19-21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: choisis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'approuvés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'éprouvés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (3.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos dons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot est traduit habituellement par '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2Co 8.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ss.
    marker-yv: yv-n
  - type: text
    text: 'Quand je serai là, j''enverrai avec des lettres ceux que vous aurez choisis pour porter vos dons à Jérusalem ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '16.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Rm 15.24s.
    marker-yv: yv-n
  - type: text
    text: s'il vaut la peine que j'y aille moi-même, ils feront le voyage avec moi.
- type: usfm
  marker: s1
  children:
  - type: text
