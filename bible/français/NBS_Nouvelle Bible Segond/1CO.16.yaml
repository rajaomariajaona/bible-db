      marker: fr
      children:
      - type: text
        text: '16.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que personne… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Tm 4.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Fournissez-lui…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'renvoyez-le en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' vers moi'
    - type: usfm
      marker: ft
      children:
      - type: text
