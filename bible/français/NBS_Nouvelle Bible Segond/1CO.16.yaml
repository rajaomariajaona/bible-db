    marker-yv: yv-n
  - type: text
    text: 'Si Timothée arrive, faites en sorte qu''il soit sans crainte chez vous, car il travaille comme moi à l''œuvre du Seigneur. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
