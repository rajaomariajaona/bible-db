      - type: text
        text: '16.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Timothée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.17+ ; cf. 2Tm 1.6-8. –  '
    - type: usfm
      marker: fq
