      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Peut-être demeurerai-je chez vous, ou même y passerai-je l''hiver, afin que vous me fournissiez vous-mêmes ce dont j''aurai besoin pour poursuivre mon voyage. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
