      marker: ft
      children:
      - type: text
        text: 1.12+.
    marker-yv: yv-n
  - type: text
    text: Pour ce qui concerne le frère Apollos, je l'ai beaucoup encouragé à venir vous voir avec les frères, mais ce n'était décidément pas sa volonté de le faire maintenant ; il viendra quand il en aura l'occasion.
