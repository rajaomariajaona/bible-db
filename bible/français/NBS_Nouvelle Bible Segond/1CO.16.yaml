    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''hiver '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Tt 3.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que vous me fournissiez…
    - type: usfm
      marker: ft
      children:
      - type: text
