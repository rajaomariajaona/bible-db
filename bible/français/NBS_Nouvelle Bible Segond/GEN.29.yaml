verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jacob rencontre Rachel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'Orient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'Est
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cette formule désigne habituellement les populations (souvent arabes) situées à l'est de Canaan (cf. 25.6 ; Nb 23.7 ; Jg 6.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 25.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jb 1.3+) ; ici il s''agit de la Syrie, au nord-est du pays d''Israël.'
      marker-yv: yv-n
    - type: text
      text: 'Jacob se remit en marche et s''en alla au pays des fils de l''Orient. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Jacob vit Rachel, fille de Laban, le frère de sa mère, et le petit bétail de Laban, le frère de sa mère, Jacob s''approcha, roula la pierre de l''ouverture du puits et fit boire le petit bétail de Laban, le frère de sa mère. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Puis Jacob embrassa Rachel et se mit à sangloter. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: frère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 15.'
      marker-yv: yv-n
    - type: text
      text: 'Jacob dit à Rachel qu''il était un parent de son père, qu''il était fils de Rébecca. Elle courut le dire à son père. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jacob raconta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il raconta.
      marker-yv: yv-n
    - type: text
      text: 'Dès que Laban eut appris l''arrivée de Jacob, fils de sa sœur, il courut à sa rencontre, l''étreignit et l''embrassa. Il le conduisit chez lui, et Jacob raconta tout à Laban. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mes os et ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : formule exprimant le lien familial (cf. 2.23 ; Jg 9.2 ; 2S 5.1 ; 19.13s) ; Laban reconnaît que Jacob est bien de la famille.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Laban lui dit : Tu es vraiment mes os et ma chair. Il habita chez lui un mois durant.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le double mariage de Jacob
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parce que
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: alors que
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Puis Laban dit à Jacob : Me serviras-tu pour rien parce que tu es mon frère ? Dis-moi quel doit être ton salaire. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Or Laban avait deux filles : le nom de l''aînée était Léa, et le nom de la cadette Rachel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: doux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''adjectif hébreu (traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 18.7, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'délicat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 33.13 etc.) peut être compris comme un signe de beauté ; on a aussi compris, par opposition à la beauté de Rachel, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ternes.
      marker-yv: yv-n
    - type: text
      text: 'Les yeux de Léa étaient doux, mais Rachel était d''une très grande beauté, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 21.4-6 ; Os 12.13. Selon la coutume israélite, c'est au fiancé de verser une dot (Gn 34.12 ; Ex 22.15s ; 1S 18.25).
      marker-yv: yv-n
    - type: text
      text: 'et Jacob aimait Rachel. Il dit : Je te servirai sept ans pour Rachel, ta fille cadette. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Reste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: installe-toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'habiter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 14.
      marker-yv: yv-n
    - type: text
      text: 'Laban dit : Je préfère te la donner à toi plutôt qu''à un autre homme. Reste chez moi ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.10-32 ; Ex 2.15-21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au repos '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: couchés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il aperçut un puits dans la campagne ; trois troupeaux de petit bétail étaient au repos à côté, car c''était à ce puits qu''on faisait boire les troupeaux. Il y avait une grande pierre pour boucher l''ouverture du puits. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ct 8.6s.
      marker-yv: yv-n
    - type: text
      text: Ainsi Jacob servit sept années pour Rachel. Ce fut à ses yeux comme quelques jours, parce qu'il l'aimait.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ensuite Jacob dit à Laban : Donne-moi ma femme, car mon temps est accompli ; je veux aller avec elle ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jn 2.1s.
      marker-yv: yv-n
    - type: text
      text: 'Laban réunit tous les gens du lieu et donna un banquet. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Léa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est probablement couverte d'un voile qui la dissimule entièrement aux regards, selon la coutume orientale (24.66) ; Jacob ne distingue pas la substitution à ce moment-là.
      marker-yv: yv-n
    - type: text
      text: 'Le soir, il prit sa fille Léa et l''amena vers Jacob, qui alla avec elle. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laban donna sa servante Zilpa pour servante à sa fille Léa. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 27.35s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: surprise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voici
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jacob dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit.
      marker-yv: yv-n
    - type: text
      text: 'Le matin venu, surprise : c''était Léa ! Alors Jacob dit à Laban : Qu''est-ce que tu m''as fait ? N''est-ce pas pour Rachel que j''ai servi chez toi ? Pourquoi m''as-tu trompé ? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laban dit : Il est inadmissible, chez nous, de donner la cadette avant l''aînée. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la semaine…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la semaine de celle-ci
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette semaine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit en tout cas de la semaine durant laquelle on fêtait le mariage (Jg 14.12). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous te donnerons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Smr et des versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je te donnerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aussi l'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le code lévitique interdira formellement l''union avec deux sœurs (Lv 18.18).'
      marker-yv: yv-n
    - type: text
      text: Achève la semaine de noces avec celle-ci, et nous te donnerons aussi l'autre pour le service que tu feras encore chez moi pendant sept autres années.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Jacob fit ainsi ; il acheva la semaine de noces avec Léa ; puis Laban lui donna pour femme sa fille Rachel. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Laban donna sa servante Bilha pour servante à sa fille Rachel. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tous les troupeaux se rassemblaient là ; on roulait la pierre de l''ouverture du puits, on faisait boire le petit bétail et on remettait la pierre à sa place, sur l''ouverture du puits. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jacob alla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il vint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 16.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Jacob alla aussi avec Rachel, qu'il aimait plus que Léa ; et il servit encore chez Laban pendant sept autres années.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les enfants de Jacob
    marker-yv: yv-h
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'était pas aimée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'était détestée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: haïe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 33 ; cf. Dt 21.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il la rendit féconde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ouvrit sa matrice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Ps 127.3 ; 128.3.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' vit que Léa n''était pas aimée, et il la rendit féconde, tandis que Rachel était stérile. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ruben '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Re'ouvên
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qu''on peut lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Re''ou bên, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Regardez, un fils !
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') fait assonance avec la déclaration de Léa, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ra''a YHWH be‘oni, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' a vu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: regardé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mon affliction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon humiliation, mon oppression
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Voir aussi 3.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Léa fut enceinte. Elle mit au monde un fils, qu''elle appela du nom de Ruben (« Regardez, un fils ! ») ; car, dit-elle, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a vu mon affliction ; maintenant, mon mari m''aimera. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Siméon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
