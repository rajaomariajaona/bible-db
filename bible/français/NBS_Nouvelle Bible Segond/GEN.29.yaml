document_id: GEN.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jacob rencontre Rachel
  - type: text
    content: ' '
  - type: note
    content: 'de l''Orient  : litt. de l''Est  ; cette formule désigne habituellement les populations (souvent arabes) situées à l''est de Canaan (cf. 25.6 ; Nb 23.7 ; Jg 6.3n  ; Ez 25.4n  ; Jb 1.3+) ; ici il s''agit de la Syrie, au nord-est du pays d''Israël.'
  - type: text
    content: 'Jacob se remit en marche et s''en alla au pays des fils de l''Orient. '
  '10':
  - type: text
    content: 'Lorsque Jacob vit Rachel, fille de Laban, le frère de sa mère, et le petit bétail de Laban, le frère de sa mère, Jacob s''approcha, roula la pierre de l''ouverture du puits et fit boire le petit bétail de Laban, le frère de sa mère. '
  '11':
  - type: text
    content: 'Puis Jacob embrassa Rachel et se mit à sangloter. '
  '12':
  - type: note
    content: 'parent  : litt. frère, cf. v. 15.'
  - type: text
    content: 'Jacob dit à Rachel qu''il était un parent de son père, qu''il était fils de Rébecca. Elle courut le dire à son père. '
  '13':
  - type: note
    content: 'Jacob raconta  : litt. il raconta.'
  - type: text
    content: 'Dès que Laban eut appris l''arrivée de Jacob, fils de sa sœur, il courut à sa rencontre, l''étreignit et l''embrassa. Il le conduisit chez lui, et Jacob raconta tout à Laban. '
  '14':
  - type: note
    content: 'mes os et ma chair  : formule exprimant le lien familial (cf. 2.23 ; Jg 9.2 ; 2S 5.1 ; 19.13s) ; Laban reconnaît que Jacob est bien de la famille.'
  - type: text
    content: 'Alors Laban lui dit : Tu es vraiment mes os et ma chair. Il habita chez lui un mois durant.'
  - type: heading
    content: Le double mariage de Jacob
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'parce que  : autre traduction alors que . –  frère v. 12n.'
  - type: text
    content: 'Puis Laban dit à Jacob : Me serviras-tu pour rien parce que tu es mon frère ? Dis-moi quel doit être ton salaire. '
  '16':
  - type: text
    content: 'Or Laban avait deux filles : le nom de l''aînée était Léa, et le nom de la cadette Rachel. '
  '17':
  - type: note
    content: 'doux  : l''adjectif hébreu (traduit par tendre en 18.7, par délicat en 33.13 etc.) peut être compris comme un signe de beauté ; on a aussi compris, par opposition à la beauté de Rachel, ternes.'
  - type: text
    content: 'Les yeux de Léa étaient doux, mais Rachel était d''une très grande beauté, '
  '18':
  - type: note
    content: Cf. Ex 21.4-6 ; Os 12.13. Selon la coutume israélite, c'est au fiancé de verser une dot (Gn 34.12 ; Ex 22.15s ; 1S 18.25).
  - type: text
    content: 'et Jacob aimait Rachel. Il dit : Je te servirai sept ans pour Rachel, ta fille cadette. '
  '19':
  - type: note
    content: 'Reste  : autre traduction installe-toi  ; le même verbe est traduit par habiter au v. 14.'
  - type: text
    content: 'Laban dit : Je préfère te la donner à toi plutôt qu''à un autre homme. Reste chez moi ! '
  '2':
  - type: note
    content: 24.10-32 ; Ex 2.15-21. –  au repos ou couchés, cf. 4.7n.
  - type: text
    content: 'Il aperçut un puits dans la campagne ; trois troupeaux de petit bétail étaient au repos à côté, car c''était à ce puits qu''on faisait boire les troupeaux. Il y avait une grande pierre pour boucher l''ouverture du puits. '
  '20':
  - type: note
    content: Ct 8.6s.
  - type: text
    content: Ainsi Jacob servit sept années pour Rachel. Ce fut à ses yeux comme quelques jours, parce qu'il l'aimait.
  '21':
  - type: text
    content: 'Ensuite Jacob dit à Laban : Donne-moi ma femme, car mon temps est accompli ; je veux aller avec elle ! '
  '22':
  - type: note
    content: Jn 2.1s.
  - type: text
    content: 'Laban réunit tous les gens du lieu et donna un banquet. '
  '23':
  - type: note
    content: Léa est probablement couverte d'un voile qui la dissimule entièrement aux regards, selon la coutume orientale (24.66) ; Jacob ne distingue pas la substitution à ce moment-là.
  - type: text
    content: 'Le soir, il prit sa fille Léa et l''amena vers Jacob, qui alla avec elle. '
  '24':
  - type: text
    content: 'Laban donna sa servante Zilpa pour servante à sa fille Léa. '
  '25':
  - type: note
    content: 'Cf. 27.35s. –  surprise  : litt. voici. –  Jacob dit  : litt. il dit.'
  - type: text
    content: 'Le matin venu, surprise : c''était Léa ! Alors Jacob dit à Laban : Qu''est-ce que tu m''as fait ? N''est-ce pas pour Rachel que j''ai servi chez toi ? Pourquoi m''as-tu trompé ? '
  '26':
  - type: text
    content: 'Laban dit : Il est inadmissible, chez nous, de donner la cadette avant l''aînée. '
  '27':
  - type: note
    content: 'la semaine…  : litt. la semaine de celle-ci, ou cette semaine  ; il s''agit en tout cas de la semaine durant laquelle on fêtait le mariage (Jg 14.12). –  nous te donnerons  : Smr et des versions anciennes ont lu je te donnerai. –  aussi l''autre  : le code lévitique interdira formellement l''union avec deux sœurs (Lv 18.18).'
  - type: text
    content: Achève la semaine de noces avec celle-ci, et nous te donnerons aussi l'autre pour le service que tu feras encore chez moi pendant sept autres années.
  '28':
  - type: text
    content: 'Jacob fit ainsi ; il acheva la semaine de noces avec Léa ; puis Laban lui donna pour femme sa fille Rachel. '
  '29':
  - type: text
    content: 'Laban donna sa servante Bilha pour servante à sa fille Rachel. '
  '3':
  - type: text
    content: 'Tous les troupeaux se rassemblaient là ; on roulait la pierre de l''ouverture du puits, on faisait boire le petit bétail et on remettait la pierre à sa place, sur l''ouverture du puits. '
  '30':
  - type: note
    content: 'Jacob alla  : litt. il vint  ; cf. 16.2n.'
  - type: text
    content: Jacob alla aussi avec Rachel, qu'il aimait plus que Léa ; et il servit encore chez Laban pendant sept autres années.
  - type: heading
    content: Les enfants de Jacob
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'n''était pas aimée  : litt. était détestée ou haïe , de même au v. 33 ; cf. Dt 21.15n. –  il la rendit féconde  : litt. il ouvrit sa matrice  ; cf. Ps 127.3 ; 128.3.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vit que Léa n''était pas aimée, et il la rendit féconde, tandis que Rachel était stérile. '
  '32':
  - type: note
    content: Le nom de Ruben (hébreu Re'ouvên, qu'on peut lire Re'ou bên, Regardez, un fils !) fait assonance avec la déclaration de Léa, ra'a YHWH be‘oni, le Seigneur a vu (ou regardé) mon affliction (ou mon humiliation, mon oppression). Voir aussi 3.20n.
  - type: text
    content: 'Léa fut enceinte. Elle mit au monde un fils, qu''elle appela du nom de Ruben (« Regardez, un fils ! ») ; car, dit-elle, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a vu mon affliction ; maintenant, mon mari m''aimera. '
  '33':
  - type: note
    content: Le nom de Siméon (hébreu Shim‘ôn) vient du verbe traduit par entendre (shama‘), cf. 16.11n.
  - type: text
    content: 'Elle fut encore enceinte et mit au monde un fils. Elle dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a entendu que je n''étais pas aimée, et il m''a donné aussi celui-ci. Et elle l''appela du nom de Siméon (« Entendu »). '
  '34':
  - type: note
    content: 'enfin  : litt. maintenant. –  il l''appela  : c''est sans doute Jacob qui donne ici le nom à l''enfant (le verbe est au masculin). Certains traduisent on l''appela. –  Lévi (hébreu Léwi, qui désigne aussi le lévite) est associé au verbe s''attachera (hébreu yilawé) ; cf. Nb 18.2n  ; Es 56.3n.'
  - type: text
    content: 'Elle fut encore enceinte et mit au monde un fils. Elle dit : Cette fois enfin, mon mari s''attachera à moi, car je lui ai donné trois fils. C''est pourquoi il l''appela du nom de Lévi (« Attaché »). '
  '35':
  - type: note
    content: Juda (hébreu Yehouda) est rapproché de l'expression je célébrerai (hébreu ’odé).
  - type: text
    content: 'Elle fut encore enceinte et mit au monde un fils. Elle dit : Cette fois, je célébrerai le '
  - type: text
    content: Seigneur
  - type: text
    content: . C'est pourquoi elle l'appela du nom de Juda (« Célébré »). Elle cessa alors d'avoir des enfants.
  '4':
  - type: note
    content: 'dit aux bergers  : litt. leur dit. –  Harrân 28.10.'
  - type: text
    content: 'Jacob dit aux bergers : Mes frères, d''où êtes-vous ? Ils répondirent : Nous sommes de Harrân. '
  '5':
  - type: note
    content: Nahor 24.15.
  - type: text
    content: 'Il leur dit : Connaissez-vous Laban, fils de Nahor ? Ils répondirent : Nous le connaissons. '
  '6':
  - type: note
    content: Comment va-t-il ? / Bien ! litt. Paix pour lui ? / Paix ! Cf. 43.27ns.
  - type: text
    content: 'Il leur dit : Comment va-t-il ? Ils répondirent : Bien ! Voici sa fille Rachel qui arrive avec le petit bétail. '
  '7':
  - type: text
    content: 'Il dit : Il fait encore grand jour ; il n''est pas encore temps de rassembler le troupeau ; faites boire le petit bétail, puis allez le faire paître. '
  '8':
  - type: text
    content: 'Ils répondirent : Nous ne pouvons pas, tant que tous les troupeaux n''ont pas été rassemblés ; c''est alors qu''on roule la pierre de l''ouverture du puits et qu''on fait boire le petit bétail.'
  '9':
  - type: text
    content: 'Il parlait encore avec eux lorsque arriva Rachel, avec le petit bétail de son père : elle était bergère. '
