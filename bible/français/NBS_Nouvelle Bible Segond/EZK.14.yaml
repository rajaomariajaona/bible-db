    - type: text
      text: 'Humain, ces hommes-là portent leurs idoles dans leur cœur ; ils placent juste devant eux l''obstacle sur lequel ils vont trébucher, la cause de leur faute. Me laisserai-je consulter par eux ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout homme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 7 ; 18.5,18,21 ; 32.2,6,9 ; Lv 17.3,8,10,13 ; 20.2-6 ; 22.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quand il viendra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres lectures traditionnelles'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à cause de cela ; moi-même '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (comme au v. 7).
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, parle-leur ; tu leur diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Tout homme de la maison d''Israël qui porte ses idoles dans son cœur et qui met juste devant lui l''obstacle sur lequel il va trébucher, la cause de sa faute – si celui-là vient trouver le prophète, c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui lui répondrai, quand il viendra, à cause de la multitude de ses idoles. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
