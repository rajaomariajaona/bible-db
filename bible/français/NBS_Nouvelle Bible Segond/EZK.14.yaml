document_id: EZK.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël doit rejeter les idoles
  - type: text
    content: ' '
  - type: note
    content: 8.1+ ; cf. 20.1-4.
  - type: text
    content: 'Quelques hommes parmi les anciens d''Israël vinrent vers moi et s''assirent devant moi, '
  '10':
  - type: note
    content: 'Ils seront…  : cf. 4.4n.'
  - type: text
    content: 'Ils seront ainsi chargés de leur faute ; telle sera la faute du prophète, telle sera la faute de celui qui consulte, '
  '11':
  - type: note
    content: qu'elle ne se rende plus impure ou qu'elle ne se souille plus  ; cf. 18.6+ ; sur l'impureté en Ezéchiel, voir 4.13 ; 9.7 ; 20.7,18,26,31,43 ; 22.3,5,10s,26 ; 23.7,13,17,30,38 ; 24.11,13 ; 36.17s,25,29 ; 37.23 ; 39.24 ; 43.7s ; 44.23 ; voir aussi pur. –  ils seront mon peuple… 11.20+.
  - type: text
    content: 'afin que la maison d''Israël ne s''égare plus loin de moi, et qu''elle ne se rende plus impure par toutes ses transgressions. Alors ils seront mon peuple, et moi, je serai leur Dieu – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Rien n'arrêtera le jugement de Dieu
  '12':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 19. –  sacrilèges 15.8 ; 18.24 ; Lv 5.15 ; Jos 7.1 ; voir saint. –  retire le pain 4.16n  ; cf. Es 3.1 ; Ps 105.16. –  je lui envoie la famine  : cf. 5.17 ; Am 8.11. –  les humains et les bêtes v. 17,19,21 ; 25.13 ; 29.8 ; 36.11 ; cf. Jon 4.11.'
  - type: text
    content: 'Humain, si un pays pèche contre moi en commettant des sacrilèges, et si j''étends ma main sur lui, si je lui retire le pain, si je lui envoie la famine, si j''en retranche les humains et les bêtes, '
  '14':
  - type: note
    content: 'V. 16,18,20 ; cf. Jr 15.1. –  Noé Gn 6–9 ; Es 54.9 ; Hé 11.7. –  Daniel (orthographe légèrement différente de celle qui apparaît dans le livre de Daniel) ou Danel (simple différence de vocalisation en hébreu), ce dernier étant, dans un texte phénicien antérieur à Ez, le nom d''un sage (cf. 28.3) frappé par le malheur (il perd son fils, cf. v. 16) ; si c''est à ce Danel qu''Ez se réfère, il s''agirait de trois justes non israélites (cf. v. 13 un pays). –  Job  : cf. Jb 1 ; 42.7-17. –  sauveraient  : le même verbe est aussi traduit par délivrer (cf. 7.19 ; 13.21,23 ; 34.27 etc.).'
  - type: text
    content: 'et qu''il y ait au milieu de lui ces trois hommes, Noé, Daniel et Job, ceux-ci sauveraient leur vie par leur justice – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '15':
  - type: note
    content: Cf. 5.17n.
  - type: text
    content: 'Si je fais parcourir le pays par des animaux féroces qui en tuent les enfants, s''il devient un lieu dévasté où personne ne passe à cause de ces animaux, '
  '16':
  - type: note
    content: 'ces trois hommes v. 14n,18. –  par ma vie 5.11n. –  eux seuls  : cf. 5.3+.'
  - type: text
    content: 'et qu''il y ait au milieu de lui ces trois hommes – par ma vie (déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '), ils ne sauveraient ni fils ni filles ; eux seuls seraient sauvés, et le pays deviendrait un lieu dévasté. '
  '17':
  - type: note
    content: 5.12+ ; 11.8+.
  - type: text
    content: 'Ou si je fais venir l''épée contre ce pays, si je dis : « Que l''épée parcoure le pays ! », si j''en retranche les humains et les bêtes, '
  '18':
  - type: note
    content: V. 16.
  - type: text
    content: 'et qu''il y ait au milieu de lui ces trois hommes – par ma vie (déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '), ils ne sauveraient ni fils ni filles ; eux seuls seraient sauvés. '
  '19':
  - type: note
    content: 'peste / sang  : cf. 5.17 ; 38.22+. –  je répands… ma fureur  : cf. Ap 16.1. –  les humains et les bêtes  : cf. v. 13+.'
  - type: text
    content: 'Ou si j''envoie la peste dans ce pays, si je répands contre lui ma fureur par le sang, pour en retrancher les humains et les bêtes, '
  '2':
  - type: text
    content: 'et la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '20':
  - type: note
    content: V. 14n.
  - type: text
    content: 'et qu''il y ait au milieu de lui Noé, Daniel et Job – par ma vie (déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ), ils ne sauveraient ni fils ni fille ; par leur justice, ils ne sauveraient que leur propre vie.
  '21':
  - type: text
    content: ' '
  - type: note
    content: quatre jugements terribles (litt. mauvais , c.-à-d. de malheur ) ; cf. 5.12+,17 ; 33.27 ; Es 51.19 ; Jr 15.3 ; Ap 6.8.
  - type: text
    content: 'Oui, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Bien que j''envoie contre Jérusalem mes quatre jugements terribles, l''épée, la famine, les animaux féroces et la peste, pour en retrancher les humains et les bêtes, '
  '22':
  - type: note
    content: 'il y restera des rescapés  : cf. 5.3+ ; 6.8n. –  Ils arriveront…  : litt. ils sortent vers vous, annonce du second exil aux premiers exilés ; cf. 5.4s. –  leur voie  : le mot correspondant est souvent traduit par chemin, parfois par conduite (cf. 9.10n) ; de même au v. 23 ; cf. 20.43s ; 24.14 ; 36.17,19. –  vous serez consolés 16.54 ; 24.23n  ; 31.16 ; 32.31.'
  - type: text
    content: 'il y restera des rescapés, qui en sortiront, des fils et des filles. Ils arriveront auprès de vous, vous verrez leur voie et leurs agissements, et vous serez consolés du malheur que je fais venir sur Jérusalem, de tout ce que je fais venir sur elle. '
  '23':
  - type: note
    content: 'pas pour rien  : cf. 6.10.'
  - type: text
    content: 'Ils vous consoleront, quand vous verrez leur voie et leurs agissements ; ainsi vous saurez que ce n''est pas pour rien que je fais tout ce que je fais contre elle – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Humain 2.1n. –  portent…  : litt. font monter leurs idoles sur leur cœur  ; cf. 11.19+. –  l''obstacle… 7.19n. –  faute  : voir péché.'
  - type: text
    content: 'Humain, ces hommes-là portent leurs idoles dans leur cœur ; ils placent juste devant eux l''obstacle sur lequel ils vont trébucher, la cause de leur faute. Me laisserai-je consulter par eux ? '
  '4':
  - type: note
    content: 'Tout homme…  : cf. v. 7 ; 18.5,18,21 ; 32.2,6,9 ; Lv 17.3,8,10,13 ; 20.2-6 ; 22.18. –  quand il viendra  : autres lectures traditionnelles  : à cause de cela ; moi-même (comme au v. 7).'
  - type: text
    content: 'A cause de cela, parle-leur ; tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Tout homme de la maison d''Israël qui porte ses idoles dans son cœur et qui met juste devant lui l''obstacle sur lequel il va trébucher, la cause de sa faute – si celui-là vient trouver le prophète, c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui lui répondrai, quand il viendra, à cause de la multitude de ses idoles. '
  '5':
  - type: note
    content: 'éloignés  : cf. Es 1.4n.'
  - type: text
    content: 'Ainsi seront saisis par leur propre cœur les gens de la maison d''Israël qui se sont éloignés de moi à cause de toutes leurs idoles. '
  '6':
  - type: note
    content: 'Revenez  : cf. Es 1.27n  ; Jr 3.14 ; Os 14.3 ; Za 1.4. –  détournez-vous  : litt. faites revenir votre face. –  abominations 5.9+.'
  - type: text
    content: 'A cause de cela, dis à la maison d''Israël : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Revenez, revenez de vos idoles, détournez-vous de toutes vos abominations ! '
  '7':
  - type: note
    content: 'V. 3+,4n. –  ou tout immigré  : voir 47.22+ ; immigré et séjourne sont des termes apparentés en hébreu ; cf. Ex 12.48n. –  moi-même  : c.-à-d. non par une déclaration prophétique, mais par un châtiment.'
  - type: text
    content: 'Car tout homme de la maison d''Israël, ou tout immigré qui séjourne en Israël, qui s''est éloigné de moi, qui porte ses idoles dans son cœur et qui met juste devant lui l''obstacle sur lequel il va trébucher, la cause de sa faute – si celui-là vient trouver le prophète pour me consulter, c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui lui répondrai moi-même. '
  '8':
  - type: note
    content: 'Je me retournerai  : litt. je donnerai ma face, de même en 15.7 ; cf. Lv 26.17 ; Jr 21.10 ; Ps 34.17. –  sujet de fable  : le terme hébreu a aussi le sens de poème, proverbe, maxime, parabole  ; cf. 12.22s ; 17.2 ; 18.2s ; 21.5n  ; 24.3 ; Dt 28.37 ; Jr 24.9 ; Jb 13.12. –  de mon peuple  : litt. du milieu de mon peuple, de même dans la suite.'
  - type: text
    content: 'Je me retournerai contre cet homme, je ferai de lui un signe et un sujet de fable et je le retrancherai de mon peuple. Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'duper  : cf. 1R 22.20ss ; Jr 20.7n. –  j''étendrai la main  : cf. 13.9n  ; Es 5.25.'
  - type: text
    content: 'Si le prophète se laisse duper, s''il prononce une parole, c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui aurai dupé ce prophète ; j''étendrai la main sur lui et je le ferai disparaître d''Israël, mon peuple. '
