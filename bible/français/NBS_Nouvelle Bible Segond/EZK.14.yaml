      marker-yv: yv-n
    - type: text
      text: 'Car tout homme de la maison d''Israël, ou tout immigré qui séjourne en Israël, qui s''est éloigné de moi, qui porte ses idoles dans son cœur et qui met juste devant lui l''obstacle sur lequel il va trébucher, la cause de sa faute – si celui-là vient trouver le prophète pour me consulter, c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui lui répondrai moi-même. '
