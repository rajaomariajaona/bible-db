        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ainsi seront saisis par leur propre cœur les gens de la maison d''Israël qui se sont éloignés de moi à cause de toutes leurs idoles. '
