        children:
        - type: text
          text: 'Danel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(simple différence de vocalisation en hébreu), ce dernier étant, dans un texte phénicien antérieur à Ez, le nom d''un sage (cf. 28.3) frappé par le malheur (il perd son fils, cf. v. 16) ; si c''est à ce Danel qu''Ez se réfère, il s''agirait de trois '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justes
        - type: text
          text: ' non israélites (cf. v. 13 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Job
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jb 1 ; 42.7-17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sauveraient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'délivrer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 7.19 ; 13.21,23 ; 34.27 etc.).
      marker-yv: yv-n
    - type: text
      text: 'et qu''il y ait au milieu de lui ces trois hommes, Noé, Daniel et Job, ceux-ci sauveraient leur vie par leur justice – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '. '
