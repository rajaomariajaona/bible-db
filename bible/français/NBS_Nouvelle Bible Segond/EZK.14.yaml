      marker-yv: yv-n
    - type: text
      text: 'Humain, si un pays pèche contre moi en commettant des sacrilèges, et si j''étends ma main sur lui, si je lui retire le pain, si je lui envoie la famine, si j''en retranche les humains et les bêtes, '
