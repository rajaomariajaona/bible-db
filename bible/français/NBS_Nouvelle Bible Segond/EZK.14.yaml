    - type: text
      text: 'afin que la maison d''Israël ne s''égare plus loin de moi, et qu''elle ne se rende plus impure par toutes ses transgressions. Alors ils seront mon peuple, et moi, je serai leur Dieu – déclaration du Seigneur '
    - type: usfm
