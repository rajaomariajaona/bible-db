      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'est-ce que je désire obtenir la faveur des hommes, ou celle de Dieu ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cette question, rhétorique, peut avoir comme réponse sous-entendue
      - type: usfm
