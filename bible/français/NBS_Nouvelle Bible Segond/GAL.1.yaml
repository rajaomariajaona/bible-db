      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si je voulais encore…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si je plaisais encore…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1Th 2.4.
      marker-yv: yv-n
    - type: text
      text: Et maintenant, vais-je essayer de persuader des humains, ou bien Dieu ? Est-ce à des humains que je cherche à plaire ? Si je voulais encore plaire à des humains, je ne serais pas un esclave du Christ.
  - type: usfm
