document_id: GAL.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'apôtre signifie envoyé  : cf. v. 17 ; Rm 1.1+ ; voir Mc 3.14n  ; 6.30n. –  non par des humains…  : litt. non de la part d''humains ni par un humain mais par Jésus-Christ… v. 11s ; cf. Am 7.14 ; Ac 20.24 ; voir aussi onction. –  Dieu… qui l''a réveillé ou relevé  : cf. Rm 1.4 ; 4.24n  ; voir résurrection.'
  - type: text
    content: 'Paul, apôtre, – envoyé, non par des humains, ni par l''entremise d''un être humain, mais par Jésus-Christ et Dieu, le Père, qui l''a réveillé d''entre les morts – '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'essayer de persuader  : même verbe 5.7 ( obéir ), 10 ( avoir confiance ) ; cf. Rm 2.8 ; d''autres comprennent ici  : est-ce que je désire obtenir la faveur des hommes, ou celle de Dieu ? Cette question, rhétorique, peut avoir comme réponse sous-entendue  : je cherche la faveur de Dieu et non celle des humains , ou bien  : je ne cherche à persuader personne, ni les humains ni Dieu . –  Si je voulais encore…  : autre traduction si je plaisais encore…  ; cf. 1Th 2.4.'
  - type: text
    content: Et maintenant, vais-je essayer de persuader des humains, ou bien Dieu ? Est-ce à des humains que je cherche à plaire ? Si je voulais encore plaire à des humains, je ne serais pas un esclave du Christ.
  - type: heading
    content: Comment Paul a reçu et transmis la bonne nouvelle
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 15.1. –  certifie 1Co 12.3n. –  simplement humaine  : litt. selon l''homme  ; cf. v. 1 ; 1Th 2.13.'
  - type: text
    content: 'Je vous le certifie, mes frères, la bonne nouvelle que j''ai annoncée pour ma part n''est pas simplement humaine, '
  '12':
  - type: note
    content: reçue 1Co 11.23. –  une révélation de Jésus-Christ v. 16 ; 2.2 ; 2Co 12.1 ; cf. Mt 16.17.
  - type: text
    content: car moi-même je ne l'ai pas reçue ni apprise d'un homme, mais par une révélation de Jésus-Christ.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 23+ ; Ac 8.3 ; 22.4s ; 26.9-11 ; 1Co 15.9. –  je m'acharnais contre elle ou je cherchais à la détruire  ; même verbe v. 23 ; Ac 9.21.
  - type: text
    content: 'Vous avez en effet entendu parler de la façon dont je me conduisais autrefois, dans le judaïsme : je persécutais alors à outrance l''Eglise de Dieu et je m''acharnais contre elle ; '
  '14':
  - type: note
    content: 'Ac 22.3 ; Ph 3.5s. –  beaucoup de Juifs…  : litt. beaucoup de ceux de mon âge dans ma race (c.-à-d. mon peuple). –  d''une passion jalouse ou de zèle, cf. 4.17s ; 5.20 ; 2Co 11.2n. –  les traditions de mes pères Mc 7.3nss.'
  - type: text
    content: dans le judaïsme, je progressais mieux que beaucoup de Juifs de mon âge, car je débordais d'une passion jalouse pour les traditions de mes pères.
  '15':
  - type: text
    content: ' '
  - type: note
    content: à Dieu… ou, d'après certains mss, à celui qui m'a mis à part…  ; cf. Ac 13.2 ; voir aussi Rm 1.1n. –  depuis le ventre de ma mère Es 49.1 ; Jr 1.5. –  appelé par sa grâce v. 6n  ; 1Co 15.10.
  - type: text
    content: 'Mais quand il a plu à Dieu, qui m''a mis à part depuis le ventre de ma mère et qui m''a appelé par sa grâce, '
  '16':
  - type: note
    content: 'révéler en moi son Fils v. 12 ; Mt 11.27 ; cf. Ac 9.3-6 ; 1Co 9.1 ; voir aussi 2Co 4.6. –  comme une bonne nouvelle  : cf. v. 23. –  parmi les non-Juifs ou les païens, les (gens des) nations, selon la formule par laquelle les Juifs désignaient les non-Juifs ; aussi en 2.2,8s,12,14s ; 3.8n,13s ; cf. 2.7+ ; Mt 4.15n  ; Ac 10.45n  ; 22.21 ; 1Co 5.1n. –  sans consulter personne  : litt. je n''ai consulté ni la chair ni le sang, c.-à-d. je n''en ai pas référé à une instance humaine  ; cf. Mt 16.17 ; 1Co 15.50.'
  - type: text
    content: 'de révéler en moi son Fils pour que je l''annonce comme une bonne nouvelle parmi les non-Juifs, aussitôt, sans consulter personne, '
  '17':
  - type: note
    content: 'apôtres avant moi  : cf. v. 1n. –  parti pour l''Arabie  : cf. 2Co 11.32n  ; sur ce voyage mystérieux, voir ci-contre « L''Arabie de Paul ». –  retourné à Damas  : cf. Ac 9.1-22.'
  - type: text
    content: sans même monter à Jérusalem pour voir ceux qui étaient apôtres avant moi, je suis parti pour l'Arabie, puis je suis retourné à Damas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ac 9.26. –  Céphas , transcription du nom araméen de Pierre  : cf. 2.7nss,11,14 ; 1Co 1.12n. –  j''ai demeuré…  : autre traduction je suis resté… auprès de lui.'
  - type: text
    content: 'Trois ans plus tard, je suis monté à Jérusalem pour faire la connaissance de Céphas, et j''ai demeuré quinze jours chez lui. '
  '19':
  - type: note
    content: 'sinon  : autre traduction mais seulement. –  Jacques, le frère du Seigneur  : cf. 2.9 ; Mc 6.3/ / ; Ac 12.17+.'
  - type: text
    content: 'Mais je n''ai vu aucun autre des apôtres, sinon Jacques, le frère du Seigneur. '
  '2':
  - type: note
    content: 'Eglises ou assemblées (chrétiennes) ; cf. v. 13,22n. –  Galatie  : province centrale de l''Asie Mineure ; cf. Ac 16.6 ; 18.23 ; 1Co 16.1 ; 2Tm 4.10 ; 1P 1.1.'
  - type: text
    content: 'et tous les frères qui sont avec moi, aux Eglises de Galatie : '
  '20':
  - type: note
    content: '2Co 11.31+. –  je le dis  : litt. voici.'
  - type: text
    content: En vous écrivant cela, je le dis devant Dieu, je ne mens pas.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Ac 9.30 ; 15.23,41.
  - type: text
    content: 'Je me suis ensuite rendu dans les contrées de Syrie et de Cilicie. '
  '22':
  - type: note
    content: Eglises de Judée…, c.-à-d. Eglises « chrétiennes » de Judée  ; cf. v. 2n  ; 1Th 2.14ss ; voir aussi Ac 9.31 ; 10.37 ; 11.1,29 ; 1Th 1.1 ; 2Th 1.1.
  - type: text
    content: 'Quant aux Eglises de Judée, – celles qui sont dans le Christ – elles ne me connaissaient pas personnellement. '
  '23':
  - type: note
    content: 'V. 13+. –  annonce… v. 16n. –  la foi  : cf. 3.23.'
  - type: text
    content: 'Elles avaient seulement entendu dire : « Celui qui autrefois nous persécutait annonce maintenant comme une bonne nouvelle la foi contre laquelle il s''acharnait. » '
  '24':
  - type: note
    content: Voir gloire.
  - type: text
    content: Et elles glorifiaient Dieu à mon sujet.
  '3':
  - type: note
    content: Grâce et paix… Rm 1.7+.
  - type: text
    content: 'Grâce et paix à vous de la part de Dieu, notre Père, et du Seigneur Jésus-Christ, '
  '4':
  - type: note
    content: 's''est donné  : cf. 2.20 ; 1Tm 2.6 ; Tt 2.14. – Voir péché. –  délivrer du (ou arracher au, Ac 7.10n) présent monde (Rm 12.2n) mauvais (ou méchant) : cf. 4.3,9s ; 6.14 ; voir aussi Ep 5.16 ; 1Jn 5.19 ; voir aussi justice. –  selon la volonté… Hé 10.9s.'
  - type: text
    content: 'qui s''est donné lui-même pour nos péchés, afin de nous délivrer du présent monde mauvais, selon la volonté de notre Dieu et Père, '
  '5':
  - type: note
    content: 'Rm 16.27+. – Voir gloire. –  à tout jamais  : traduction traditionnelle aux siècles des siècles  ; cette formule est calquée sur la tournure grecque correspondante, redoublement solennel, à la manière sémitique, de l''expression habituellement traduite pour toujours  ; le mot grec correspondant à siècles dans cette expression est celui qui a été rendu par monde au v. 4 ; il peut en effet désigner un temps, défini ou non, et ce qui le caractérise (un âge, une ère) ; cf. Ep 3.21 ; Ph 4.20 ; 1P 4.11 ; 5.11 ; Ap 1.6+.'
  - type: text
    content: 'à qui soit la gloire à tout jamais ! '
  - type: text
    content: Amen !
  - type: heading
    content: On détourne les Galates de l'unique bonne nouvelle
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la grâce du Christ  : autres traductions la grâce qu''est le Christ ; celui qui vous a appelés par sa grâce, le Christ  ; cf. v. 15s ; 5.8 ; Rm 1.6. –  une autre « bonne nouvelle » ou un autre « Evangile » (Mc 1.1+), comme en 2Co 11.4 ; cf. 1Tm 6.3.'
  - type: text
    content: 'Je m''étonne que vous vous détourniez si vite de celui qui vous a appelés par la grâce du Christ, pour passer à une autre « bonne nouvelle », '
  '7':
  - type: note
    content: 'qui d''ailleurs n''en est pas une  : litt. qui n''en est pas une autre  ; autre traduction non pas qu''il y en ait une autre  ; ou bien qui n''est rien d''autre que ceci : il y a des gens…  ; le mot grec correspondant à autre n''est pas le même qu''au v. 6. –  qui vous troublent 5.10 ; cf. Ac 15.1,24.'
  - type: text
    content: 'qui d''ailleurs n''en est pas une : il y a seulement des gens qui vous troublent et qui veulent pervertir la bonne nouvelle du Christ. '
  '8':
  - type: note
    content: Voir ange. –  anathème Rm 9.3n  ; cf. 1Co 16.22 ; voir bénédiction, malédiction.
  - type: text
    content: 'Mais si nous-mêmes, ou si un ange du ciel vous annonçait une bonne nouvelle différente de celle que nous vous avons annoncée, qu''il soit anathème ! '
  '9':
  - type: note
    content: 'je le répète  : cf. 5.3,21 ; 2Co 13.2 ; 1Th 3.4 ; 4.6.'
  - type: text
    content: 'Nous l''avons déjà dit, et je le répète maintenant : si quelqu''un vous annonce une bonne nouvelle différente de celle que vous avez reçue, qu''il soit anathème !'
