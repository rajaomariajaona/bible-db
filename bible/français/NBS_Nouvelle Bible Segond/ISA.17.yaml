document_id: ISA.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre Damas
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. –  Damas  : capitale de la Syrie (10.9n  ; sur sa chute, voir 2R 16.9). La suite (v. 3ss) concerne le royaume israélite du Nord, allié à Damas contre l''Assyrie et contre Juda (7.1n).'
  - type: text
    content: Sentence sur Damas.
  - type: text
    content: Damas ne sera plus une ville,
  - type: text
    content: ce ne sera plus qu'un monceau de ruines.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tu as oublié… 51.13 ; Dt 8.11 ; Jr 2.32+ ; Ez 22.12. –  Dieu de ton salut  : 12.2 ; 43.3+. –  du Rocher de ta force  : litt. de ta forteresse (même mot hébreu dans villes fortes au v. 9) 26.4 ; 30.29 ; 44.8 ; cf. Dt 32.4+ ; Ps 18.3,32 ; 28.3 ; 31.3s ; 71.3. –  plantations d''agrément  : cf. 1.29n. Il faut peut-être voir ici une allusion aux alliances étrangères (v. 11).'
  - type: text
    content: Car tu as oublié le Dieu de ton salut,
  - type: text
    content: tu ne t'es pas souvenu du Rocher de ta force.
  - type: text
    content: C'est pourquoi tu as fait des plantations d'agrément,
  - type: text
    content: tu as mis dans la terre des pousses étrangères ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le matin même  : autre traduction dès le lendemain . –  La moisson a disparu…  : texte incertain, que la traduction modifie légèrement d''après Vg  ; d''autres comprennent la moisson est en tas au jour où on la recueille, mais le mal… –  incurable Jr 15.18 ; Mi 1.9.'
  - type: text
    content: le jour où tu les as plantées, tu les as vues pousser,
  - type: text
    content: le matin même ta semence a donné des fleurs.
  - type: text
    content: La moisson a disparu au jour de la maladie,
  - type: text
    content: et le mal est incurable.
  - type: heading
    content: Les envahisseurs chassés en une nuit
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 8.9s ; 28.2 ; 51.9 ; Ez 38.9 ; Ps 104.6 ; Jb 38.11. –  Malheur ! 1.24n. – Les termes hébreux traduits par tumulte et grondent sont apparentés ; le premier peut aussi décrire une multitude ou une foule (5.13s ; 29.5,7s ; 31.4 etc.), auquel cas il est à peu près synonyme du mot traduit ici par multitude (2.3s ; 52.14s etc.), lequel signifie nombreux, grand, abondant (p. ex. dans les grandes eaux du v. 13).
  - type: text
    content: Malheur ! Le tumulte d'une multitude de peuples qui grondent
  - type: text
    content: comme grondent les mers,
  - type: text
    content: le mugissement de peuplades qui mugissent
  - type: text
    content: comme mugissent des eaux puissantes,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'rabroue  : cf. 30.17 ; 50.2 ; 51.20 ; 54.9 ; 66.15 ; Jr 29.27 ; Na 1.4 ; Ml 2.3 ; 3.11 ; Ps 9.6+ ; Pr 13.1n  ; voir aussi Mc 1.25n. –  comme de la menue paille  : voir Jr 15.7n  ; Ps 1.4n  ; on battait et on vannait le grain sur des lieux élevés pour profiter de l''action du vent. –  les balles de chardons  : autre traduction un tourbillon de poussière , litt. une roue. Le terme hébreu désigne vraisemblablement une sorte de chardon de forme sphérique qui, une fois sec, est coupé de ses racines et roulé par le vent (de même en Ps 83.14) ; voir aussi Es 40.24 ; Jr 13.24 ; Jb 27.21.'
  - type: text
    content: des peuplades qui mugissent comme mugissent de grandes eaux,
  - type: text
    content: il les rabroue, et elles fuient au loin,
  - type: text
    content: chassées comme de la menue paille dans les montagnes
  - type: text
    content: au souffle du vent,
  - type: text
    content: comme les balles de chardons roulées par l'ouragan.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'soir / matin  : cf. 29.7 ; 33.2 ; 37.36 ; Ex 14.14,27 ; Ps 30.6 ; 46.6 ; 73.18-20. –  la part / le lot (ou le sort ) : cf. 34.17 ; 57.6 ; Lv 16.8n.'
  - type: text
    content: Quand vient le soir, c'est l'épouvante ;
  - type: text
    content: avant le matin, ils ne sont plus !
  - type: text
    content: Voilà la part de ceux qui nous dépouillent,
  - type: text
    content: le lot de ceux qui nous pillent.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les villes d''Aroër (cf. Jos 13.16,25 ; Jg 11.26 ; 2S 24.5 où ce nom est rattaché à Moab) sont abandonnées  : LXX a lu  : elle a été abandonnée pour toujours. –  aux troupeaux  : cf. 7.25+. –  personne pour les troubler cf. Jr 7.33 ; 30.10 ; Ez 34.28.'
  - type: text
    content: Les villes d'Aroër sont abandonnées,
  - type: text
    content: elles sont livrées aux troupeaux ;
  - type: text
    content: les bêtes s'y couchent, et il n'y a personne pour les troubler.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'forteresse d''Ephraïm  : Aram s''interposait entre la poussée assyrienne et le royaume israélite du Nord (voir aussi v. 1n  ; 7.1-9,17).'
  - type: text
    content: C'en est fait de la forteresse d'Ephraïm
  - type: text
    content: et du royaume de Damas et du reste d'Aram.
  - type: text
    content: Il en sera comme de la gloire des Israélites,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Ce qui restera du royaume d'Israël
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Voir gloire. –  Jacob  : il s''agit ici du royaume du Nord. –  disparaîtra  : litt. deviendra maigre.'
  - type: text
    content: En ce jour-là, la gloire de Jacob s'affaiblira,
  - type: text
    content: et la graisse de sa chair disparaîtra.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'lorsqu''on rassemble…  : avec une légère modification du texte hébreu on pourrait lire lorsque le moissonneur rassemble (le blé) sur pied. –  le bras du moissonneur  : litt. son bras. –  vallée des Rephaïtes (ou des Ombres , cf. 14.9n) : près de Jérusalem, probablement à l''ouest.'
  - type: text
    content: Il en sera comme lorsqu'on rassemble la moisson sur pied,
  - type: text
    content: et que le bras du moissonneur moissonne les épis ;
  - type: text
    content: comme lorsqu'on glane les épis
  - type: text
    content: dans la vallée des Rephaïtes.
  '6':
  - type: text
    content: ' '
  - type: note
    content: grappillage / gaulage 24.13.
  - type: text
    content: Il en restera un grappillage,
  - type: text
    content: comme au gaulage de l'olivier,
  - type: text
    content: deux ou trois baies en haut de la cime,
  - type: text
    content: quatre ou cinq dans ses branches à fruits,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël.'
  - type: heading
    content: La fin de l'idolâtrie
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'son créateur  : litt. celui qui le fait  ; cf. 27.11n  ; 43.7+ ; 51.13. –  se tourneront  : litt. regarderont , même verbe au v. 8. –  Saint d''Israël 1.4+.'
  - type: text
    content: 'En ce jour-là, l''homme portera ses regards vers son créateur, ses yeux se tourneront vers le Saint d''Israël. '
  '8':
  - type: note
    content: 2.8. –  les poteaux cultuels (les ashéras) (Jg 3.7n) / brasiers à encens 27.9 ; Lv 26.30n  ; 2R 23.4-15 ; Ez 6.4,6 ; 2Ch 14.4 ; 34.4,7.
  - type: text
    content: Ses regards ne se porteront plus vers les autels, œuvre de ses mains, et il ne regardera plus ce que ses doigts ont fait, les poteaux cultuels (les ashéras) et les brasiers à encens.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'comme les bois et la cime des montagnes  : autre traduction comme la ramure et la cime des arbres ( des montagnes étant sous-entendu dans le texte hébreu) ; LXX les Amorites et les Hivites (cf. la conquête de Canaan, Jos 9.7 ; 11.3). –  tout sera dévasté  : litt. ce sera une dévastation.'
  - type: text
    content: En ce jour-là, ses villes fortes
  - type: text
    content: seront abandonnées comme les bois et la cime des montagnes
  - type: text
    content: abandonnés devant les Israélites,
  - type: text
    content: et tout sera dévasté.
