document_id: PSA.37,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ne t'irrite pas du succès des méchants
  - type: text
    content: ' '
  - type: note
    content: 'Psaume alphabétique, chaque lettre de l''alphabet introduisant le plus souvent deux v. (25.1n). –  Ne te fâche pas contre les mauvais  : autres traductions ne te fâche pas à cause des mauvais ; ne rivalise pas avec les mauvais  ; cf. Pr 24.1,19. –  ne sois pas jaloux 73.3 ; Ml 3.13ss ; Jb 21 ; Pr 23.17.'
  - type: text
    content: De David.
  - type: text
    content: Ne te fâche pas contre les mauvais,
  - type: text
    content: ne sois pas jaloux de ceux qui agissent injustement.
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 36 ; 103.16 ; Es 41.12.
  - type: text
    content: 'Encore un peu de temps : plus de méchant !'
  - type: text
    content: 'Tu examines le lieu qu''il habitait : plus personne !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'V. 9+ ; Mt 5.5. –  Les pauvres  : cf. v. 14 ; 9.13n. –  paix abondante 119.165n.'
  - type: text
    content: Les pauvres posséderont le pays,
  - type: text
    content: une paix abondante fera leurs délices.
  '12':
  - type: text
    content: ' '
  - type: note
    content: V. 7,32 ; 31.14. –  il grince des dents 35.16+.
  - type: text
    content: Le méchant intrigue contre le juste,
  - type: text
    content: il grince des dents contre lui.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur rit  : cf. 2.4+. –  son jour arrive  : cf. Ez 21.30.'
  - type: text
    content: Le Seigneur rit de lui,
  - type: text
    content: car il voit que son jour arrive.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '7.13+ ; 11.2. –  dont la voie est droite  : quelques mss et LXX portent dont le cœur est droit (7.11).'
  - type: text
    content: Les méchants tirent l'épée,
  - type: text
    content: ils bandent leur arc,
  - type: text
    content: pour faire tomber le pauvre et le déshérité,
  - type: text
    content: pour égorger ceux dont la voie est droite.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 7.16+s. –  leurs arcs… 46.10 ; 1S 2.4.
  - type: text
    content: Leur épée entrera dans leur propre cœur,
  - type: text
    content: leurs arcs se briseront.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 4.8 ; 84.11 ; Pr 15.16 ; 16.8 ; Ec 4.6.
  - type: text
    content: Mieux vaut le peu du juste
  - type: text
    content: que l'abondance de beaucoup de méchants ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: les bras des méchants… 10.15. –  le Seigneur soutient v. 24 ; 3.6 ; 41.4,13 ; 55.23 ; 119.116 ; 145.14 ; 146.9 ; 147.6 ; Es 42.1.
  - type: text
    content: car les bras des méchants seront brisés,
  - type: text
    content: 'mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soutient les justes.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: Le Seigneur connaît 1.6+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' connaît les jours des gens intègres,'
  - type: text
    content: et leur patrimoine subsiste toujours.
  '19':
  - type: text
    content: ' '
  - type: note
    content: pas honte 22.6+. –  au temps du malheur 27.5+. –  aux jours de la famine 33.19.
  - type: text
    content: Ils n'ont pas honte au temps du malheur,
  - type: text
    content: aux jours de la famine ils sont rassasiés.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 129.6 ; voir aussi 90.6+.
  - type: text
    content: Car ils sont fanés aussi vite que l'herbe
  - type: text
    content: et ils se flétrissent comme le gazon vert.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'comme les plus beaux prés  : texte incertain ; cf. v. 2+. –  en fumée 68.3.'
  - type: text
    content: Mais les méchants disparaîtront,
  - type: text
    content: 'et les ennemis du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme les plus beaux prés ;'
  - type: text
    content: ils s'évanouissent, ils s'évanouissent en fumée.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 26 ; 112.5,9 ; Pr 21.26 ; Mt 5.42 ; 10.8 ; Ac 3.6 ; 20.35 ; Rm 12.8 ; Ep 4.28. – Voir grâce.
  - type: text
    content: Le méchant emprunte, et il ne rend pas ;
  - type: text
    content: le juste fait grâce, et il donne.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qu''il bénit  : on pourrait comprendre ceux que bénit le Seigneur , mais aussi ceux que bénit le juste  ; de même pour la suite ; cf. Mt 25.34,41.'
  - type: text
    content: Car ceux qu'il bénit posséderont le pays,
  - type: text
    content: et ceux qu'il maudit seront retranchés.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Es 26.7s ; Jr 10.23 ; Pr 16.9 ; 20.24.
  - type: text
    content: 'Par le '
  - type: text
    content: Seigneur
  - type: text
    content: ', les pas de l''homme s''affermissent,'
  - type: text
    content: il prend plaisir à sa voie ;
  '24':
  - type: text
    content: s'il tombe, il n'est pas terrassé,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soutient sa main.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jb 4.7 ; Pr 10.3.
  - type: text
    content: J'ai été jeune, j'ai vieilli ;
  - type: text
    content: et je n'ai pas vu le juste abandonné,
  - type: text
    content: ni sa descendance mendiant son pain.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'V. 21+. –  Sans cesse  : litt. tout le jour . –  sa descendance ou ses descendants  ; cf. v. 25,28 ; 112.2 ; voir Gn 3.15n. –  en bénédiction  : cf. Gn 22.18 ; 26.4 ; 28.14.'
  - type: text
    content: Sans cesse il fait grâce et il prête ;
  - type: text
    content: et sa descendance est en bénédiction.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 34.15+.
  - type: text
    content: Ecarte-toi de ce qui est mauvais, fais ce qui est bon,
  - type: text
    content: et demeure pour toujours.
  '28':
  - type: text
    content: ' '
  - type: note
    content: '145.20. –  l''équité  : le même mot (aussi au v. 30) est traduit par droit au v. 6. –  il n''abandonne pas v. 33 ; 9.11 ; 94.14 ; Dt 4.31 ; Es 41.17. –  ils sont…  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire les mauvais sont détruits pour toujours . –  la descendance des méchants  : cf. v. 38n  ; 9.6+ ; 21.11.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aime l''équité,'
  - type: text
    content: il n'abandonne pas ses fidèles.
  - type: text
    content: ils sont toujours sous sa garde,
  - type: text
    content: mais la descendance des méchants est retranchée.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'V. 9+,11. –  ils y demeureront  : autre traduction ils demeureront.'
  - type: text
    content: Les justes posséderont le pays
  - type: text
    content: et ils y demeureront à jamais.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'confiance  : cf. v. 27,34 ; 4.6+.'
  - type: text
    content: 'Mets ta confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et agis bien ;'
  - type: text
    content: demeure dans le pays et repais-toi de fidélité.
  '30':
  - type: text
    content: ' '
  - type: note
    content: murmure ou médite  ; cf. 1.2n  ; 49.4 ; Pr 10.31.
  - type: text
    content: La bouche du juste murmure la sagesse,
  - type: text
    content: et sa langue proclame l'équité.
  '31':
  - type: text
    content: ' '
  - type: note
    content: La loi 19.8 ; 40.9 ; 119.11 ; cf. Dt 6.6 ; 30.14 ; Es 51.7 ; Jr 31.31-34. –  ne chancelle pas 26.1.
  - type: text
    content: La loi de son Dieu est dans son cœur ;
  - type: text
    content: il ne chancelle pas dans sa marche.
  '32':
  - type: text
    content: ' '
  - type: note
    content: V. 12 ; 10.8 ; cf. Gn 37.18. –  épie 5.4n.
  - type: text
    content: Le méchant épie le juste
  - type: text
    content: et cherche à le faire mourir ;
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'V. 28+. –  condamner  : autre traduction déclarer méchant  ; cf. Dt 25.1n  ; Jb 9.20n. –  quand il est en jugement 9.20n.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne l''abandonne pas entre ses mains,'
  - type: text
    content: et il ne le laisse pas condamner quand il est en jugement.
  '34':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 3. –  tu verras 58.11 ; 91.8 ; Pr 29.16.
  - type: text
    content: 'Mets ton espérance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', garde sa voie,'
  - type: text
    content: et il t'élèvera pour que tu possèdes le pays ;
  - type: text
    content: tu verras les méchants retranchés.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'comme un arbre  : litt. comme un indigène , texte obscur ; LXX il avait grandi comme un cèdre du Liban  ; cf. 73.3-12 ; Ez 31.10-12 ; Jb 5.3 ; 20.5-7.'
  - type: text
    content: J'ai vu le méchant dans toute sa brutalité ;
  - type: text
    content: il s'étendait comme un arbre verdoyant.
  '36':
  - type: text
    content: Il a passé, et il n'est plus.
  - type: text
    content: Je l'ai cherché, mais il était introuvable.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui est intègre… celui qui est droit  : des versions anciennes ont lu l''intégrité et la droiture. –  un avenir  : certains comprennent une postérité  ; cf. v. 28+ ; Pr 23.18.'
  - type: text
    content: 'Observe celui qui est intègre, regarde celui qui est droit :'
  - type: text
    content: il y a un avenir pour l'homme de paix.
  '38':
  - type: text
    content: ' '
  - type: note
    content: V. 9+.
  - type: text
    content: Mais ceux qui se révoltent sont détruits tous ensemble,
  - type: text
    content: l'avenir des méchants est retranché.
  '39':
  - type: text
    content: ' '
  - type: note
    content: Le salut (ou la victoire ) des justes… 3.9+ ; 57.4 ; 144.10 ; Es 45.17 ; Jr 3.23 ; Ac 4.12. –  forteresse 27.1+. –  au temps de la détresse 9.10+.
  - type: text
    content: 'Le salut des justes vient du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: il est leur forteresse au temps de la détresse.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Fais du Seigneur tes délices v. 11 ; Es 58.14 ; Jb 22.26 ; 27.10. –  il te donnera  : cf. 2.8 ; 20.5,7 ; 21.3 ; 78.29 ; 1S 1.17 ; Mt 6.33.'
  - type: text
    content: 'Fais du '
  - type: text
    content: Seigneur
  - type: text
    content: ' tes délices,'
  - type: text
    content: et il te donnera ce que ton cœur demande.
  '40':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.2+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les secourt, il leur donne d''échapper ;'
  - type: text
    content: il leur donne d'échapper aux méchants, il les sauve,
  - type: text
    content: parce qu'ils ont trouvé en lui un abri.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Remets ton sort au Seigneur  : litt. roule ta voie sur YHWH  ; LXX a lu révèle ta voie au Seigneur  ; cf. 22.9n  ; Pr 16.3n.'
  - type: text
    content: 'Remets ton sort au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'mets ta confiance en lui : c''est lui qui agira.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 58.10 ; Jr 51.10. –  Il imposera  : litt. il fera sortir  ; cf. 17.2n. –  comme le soleil à son midi  : litt. comme le midi.'
  - type: text
    content: Il imposera ta justice comme la lumière,
  - type: text
    content: et ton droit comme le soleil à son midi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Garde le silence 4.5 ; 62.2,6 ; Es 30.15 ; Lm 3.28-30. –  celui qui réussit  : cf. 1.3 ; 10.5 ; Jr 12.1. –  ses intrigues v. 12 ; 10.2,4n  ; 21.12.'
  - type: text
    content: 'Garde le silence devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et attends-le ;'
  - type: text
    content: ne te fâche pas contre celui qui réussit dans ses voies,
  - type: text
    content: contre l'homme qui mène à bien ses intrigues.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ce serait mal faire  : cf. 39.1 ; 73.2 ; Ep 4.31 ; Col 3.8 ; Jc 1.19s.'
  - type: text
    content: Laisse la colère, abandonne la fureur ;
  - type: text
    content: ne te fâche pas, ce serait mal faire.
  '9':
  - type: text
    content: ' '
  - type: note
    content: retranchés v. 38. –  posséderont le pays (ou la terre ) v. 11,22,29,34 ; 25.13n  ; Es 57.13 ; 60.21 ; 65.9 ; Ez 11.17 ; Pr 2.21s.
  - type: text
    content: Car les mauvais seront retranchés,
  - type: text
    content: 'et ceux qui espèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' posséderont le pays.'
