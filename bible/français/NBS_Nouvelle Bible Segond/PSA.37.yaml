document_id: PSA.37,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ne t'irrite pas du succès des méchants
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Psaume alphabétique, chaque lettre de l'alphabet introduisant le plus souvent deux v. (25.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne te fâche pas contre les mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne te fâche pas à cause des mauvais ; ne rivalise pas avec les mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Pr 24.1,19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne sois pas jaloux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 73.3 ; Ml 3.13ss ; Jb 21 ; Pr 23.17.
      marker-yv: yv-n
    - type: text
      text: De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ne te fâche pas contre les mauvais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne sois pas jaloux de ceux qui agissent injustement.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 36 ; 103.16 ; Es 41.12.
      marker-yv: yv-n
    - type: text
      text: 'Encore un peu de temps : plus de méchant !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Tu examines le lieu qu''il habitait : plus personne !'
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 9+ ; Mt 5.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les pauvres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 14 ; 9.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' abondante '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '119.165'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Les pauvres posséderont le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: une paix abondante fera leurs délices.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 7,32 ; 31.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il grince des dents '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 35.16+.
      marker-yv: yv-n
    - type: text
      text: Le méchant intrigue contre le juste,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il grince des dents contre lui.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le Seigneur rit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son jour arrive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 21.30.'
      marker-yv: yv-n
    - type: text
      text: Le Seigneur rit de lui,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car il voit que son jour arrive.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.13+ ; 11.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dont la voie est droite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : quelques mss et LXX portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dont le cœur est droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (7.11).
      marker-yv: yv-n
    - type: text
      text: Les méchants tirent l'épée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils bandent leur arc,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour faire tomber le pauvre et le déshérité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour égorger ceux dont la voie est droite.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.16+s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leurs arcs… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 46.10 ; 1S 2.4.
      marker-yv: yv-n
    - type: text
      text: Leur épée entrera dans leur propre cœur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leurs arcs se briseront.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 4.8 ; 84.11 ; Pr 15.16 ; 16.8 ; Ec 4.6.
      marker-yv: yv-n
    - type: text
      text: Mieux vaut le peu du juste
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que l'abondance de beaucoup de méchants ;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les bras des méchants… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' soutient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 24 ; 3.6 ; 41.4,13 ; 55.23 ; 119.116 ; 145.14 ; 146.9 ; 147.6 ; Es 42.1.
      marker-yv: yv-n
    - type: text
      text: car les bras des méchants seront brisés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'mais le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soutient les justes.'
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' connaît '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.6+.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' connaît les jours des gens intègres,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et leur patrimoine subsiste toujours.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas honte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au temps du malheur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux jours de la famine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 33.19.
      marker-yv: yv-n
    - type: text
      text: Ils n'ont pas honte au temps du malheur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aux jours de la famine ils sont rassasiés.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 129.6 ; voir aussi 90.6+.
      marker-yv: yv-n
    - type: text
      text: Car ils sont fanés aussi vite que l'herbe
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ils se flétrissent comme le gazon vert.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme les plus beaux prés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : texte incertain ; cf. v. 2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en fumée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 68.3.
      marker-yv: yv-n
    - type: text
      text: Mais les méchants disparaîtront,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et les ennemis du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme les plus beaux prés ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils s'évanouissent, ils s'évanouissent en fumée.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 26 ; 112.5,9 ; Pr 21.26 ; Mt 5.42 ; 10.8 ; Ac 3.6 ; 20.35 ; Rm 12.8 ; Ep 4.28. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le méchant emprunte, et il ne rend pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le juste fait grâce, et il donne.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ceux qu''il '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ceux que bénit le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux que bénit le juste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; de même pour la suite ; cf. Mt 25.34,41.
      marker-yv: yv-n
    - type: text
      text: Car ceux qu'il bénit posséderont le pays,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qu'il maudit seront retranchés.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 26.7s ; Jr 10.23 ; Pr 16.9 ; 20.24.
      marker-yv: yv-n
    - type: text
      text: 'Par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', les pas de l''homme s''affermissent,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il prend plaisir à sa voie ;
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s'il tombe, il n'est pas terrassé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' soutient sa main.'
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jb 4.7 ; Pr 10.3.
      marker-yv: yv-n
    - type: text
      text: J'ai été jeune, j'ai vieilli ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je n'ai pas vu le juste abandonné,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni sa descendance mendiant son pain.
  '26':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sans cesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout le jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa descendance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses descendants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 25,28 ; 112.2 ; voir Gn 3.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en bénédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 22.18 ; 26.4 ; 28.14.'
      marker-yv: yv-n
    - type: text
      text: Sans cesse il fait grâce et il prête ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et sa descendance est en bénédiction.
  '27':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 34.15+.
      marker-yv: yv-n
    - type: text
      text: Ecarte-toi de ce qui est mauvais, fais ce qui est bon,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et demeure pour toujours.
  '28':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '145.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'équité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même mot (aussi au v. 30) est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il n''abandonne pas '
      - type: usfm
        marker: ft
        children:
