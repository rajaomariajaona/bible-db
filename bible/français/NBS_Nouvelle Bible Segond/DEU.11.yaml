document_id: DEU.11,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Tu aimeras 5.10+. –  tu garderas (ou tu observeras , v. 8) … ses observances  : les deux mots sont apparentés ; la même expression a aussi été traduite par assurer le service , cf. Gn 26.5 ; Lv 8.35n  ; Nb 3.7n. –  toujours  : litt. tous les jours.'
  - type: text
    content: 'Tu aimeras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et tu garderas toujours ses observances, ses prescriptions, ses règles et ses commandements.'
  - type: heading
    content: Comprendre ce que Dieu a fait pour Israël
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tes pieds  : litt. ton pied  ; allusion probable à des techniques égyptiennes d''irrigation (mécanismes actionnés par les mains et les pieds, comme il y en avait en Egypte ? rigoles creusées, ouvertes ou fermées avec le pied ?) ; mais on a aussi compris en l''arrosant de ton urine (sens de l''euphémisme l''eau des pieds en 2R 18.27n  ; Es 36.12n) ; cf. Ez 32.13ns. –  jardin Es 1.30.'
  - type: text
    content: 'Car le pays où tu vas entrer pour en prendre possession n''est pas comme l''Egypte, d''où vous êtes sortis, où tu jetais ta semence en l''arrosant à l''aide de tes pieds comme dans un jardin potager. '
  '11':
  - type: note
    content: 8.7-9 ; cf. Hé 6.7.
  - type: text
    content: 'Le pays vers lequel vous passez pour en prendre possession est un pays de montagnes et de vallées, qui boit l''eau de la pluie du ciel ; '
  '12':
  - type: note
    content: 'prend soin  : le verbe correspondant est habituellement traduit par chercher.'
  - type: text
    content: 'c''est un pays dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, prend soin et sur lequel le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a constamment les yeux, du commencement à la fin de l''année.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Voir 6.4n. –  mes commandements  : c''est de toute évidence Dieu qui parle (cf. v. 14s ; 7.4n  ; 28.20 ; 29.4). –  institue 4.2n. –  aimant le Seigneur 5.10+. –  le servant 10.12n. –  de tout votre cœur et de toute votre âme (cf. Gn 1.20n) 4.29+.'
  - type: text
    content: 'Si vous écoutez mes commandements, tels que je les institue pour vous aujourd''hui, en aimant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et en le servant de tout votre cœur et de toute votre âme, '
  '14':
  - type: note
    content: 'Cf. 28.12 ; 1R 18.1,45 ; Jr 3.3 ; 5.23-24n  ; Ez 34.26s ; Os 6.3 ; Jl 2.23 ; Am 4.7 ; Za 10.1 ; Jb 29.23 ; Pr 16.15 ; Jc 5.7. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n.'
  - type: text
    content: 'je donnerai à votre pays la pluie en son temps, celle de l''automne et celle du printemps, et tu récolteras ton blé, ton vin et ton huile ; '
  '15':
  - type: text
    content: 'je mettrai aussi dans tes champs de l''herbe pour tes bêtes ; tu mangeras et tu seras rassasié. '
  '16':
  - type: note
    content: 'de vous laisser duper  : litt. de peur que votre cœur ne soit dupé (ou séduit) ; cf. 6.14+.'
  - type: text
    content: 'Gardez-vous de vous laisser duper et de vous écarter en servant d''autres dieux et en vous prosternant devant eux. '
  '17':
  - type: note
    content: Cf. Lv 26.19s. –  bon pays 1.25+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mettrait alors en colère contre vous ; il fermerait le ciel, et il n''y aurait pas de pluie ; la terre ne donnerait plus sa production, et vous disparaîtriez bien vite du bon pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous donne.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.6-9 et les notes. –  Vous mettrez sur votre cœur  : l''expression correspondante, traduite ici littéralement, a aussi été rendue par réfléchir (Es 42.25+). –  sur votre âme  : autre traduction sur vous-même.'
  - type: text
    content: 'Vous mettrez sur votre cœur et sur votre âme ces paroles que je vous adresse. Vous les attacherez comme un signe sur votre main, et elles seront un fronteau entre vos yeux. '
  '19':
  - type: note
    content: 'quand tu seras chez toi  : autre traduction quand tu seras assis chez toi.'
  - type: text
    content: 'Vous les apprendrez à vos fils et vous leur en parlerez quand tu seras chez toi et quand tu seras en chemin, quand tu te coucheras et quand tu te lèveras. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Reconnaissez et connus traduisent un même verbe hébreu. –  pas… vos fils  : cf. v. 7 ; 4.31 ; 5.3. –  instruction ou correction 4.36n. –  sa main forte… 4.34+.'
  - type: text
    content: 'Reconnaissez donc aujourd''hui – car il ne s''agit pas de vos fils qui ne les ont pas connus et ne les ont pas vus – l''instruction du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, sa grandeur, sa main forte, son bras étendu, '
  '20':
  - type: text
    content: 'Tu les écriras sur les montants de la porte de ta maison et aux portes de tes villes. '
  '21':
  - type: note
    content: 'vos jours…  : cf. 4.26+. –  sur la terre… 1.8+. –  jours du ciel  : cf. Jr 33.20-26 ; Ps 72.5,7.'
  - type: text
    content: 'Alors vos jours et les jours de vos fils, sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a juré à vos pères de leur donner, seront aussi nombreux que les jours du ciel au-dessus de la terre.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: tout ce commandement 5.31+. –  j'institue v. 27n  ; 4.2n. –  en aimant le Seigneur 5.10+. –  en suivant toutes ses voies 10.12+. –  en vous attachant 10.20+.
  - type: text
    content: 'Car si vous observez tout ce commandement que j''institue pour vous, en le mettant en pratique, en aimant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, en suivant toutes ses voies et en vous attachant à lui, '
  '23':
  - type: note
    content: 4.38+.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dépossédera devant vous toutes ces nations, et vous prendrez possession de nations plus grandes et plus fortes que vous. '
  '24':
  - type: note
    content: 'Jos 1.3s. –  occidentale  : litt. postérieure, de l''arrière (cf. Gn 14.15n), c.-à-d. la Méditerranée.'
  - type: text
    content: 'Tout lieu que fouleront vos pieds vous appartiendra : votre territoire s''étendra du désert au Liban et du Fleuve, l''Euphrate, jusqu''à la mer occidentale. '
  '25':
  - type: note
    content: 2.25n  ; cf. Ex 23.27.
  - type: text
    content: 'Personne ne tiendra contre vous. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, donnera, comme il vous l''a dit, la frayeur, la crainte de vous, à tout le pays où vous irez.'
  - type: heading
    content: Bénédiction ou malédiction
  '26':
  - type: text
    content: ' '
  - type: note
    content: 28.1+ ; 30.15-20. – Voir bénédiction, malédiction.
  - type: text
    content: 'Regarde, je place aujourd''hui devant vous bénédiction et malédiction : '
  '27':
  - type: note
    content: 'que j''institue pour vous  : le même verbe est traduit par prescrire au v. 28 ; 4.2n. –  aujourd''hui 1.10+.'
  - type: text
    content: 'la bénédiction, si vous écoutez les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, que j''institue pour vous aujourd''hui ; '
  '28':
  - type: note
    content: suivre d'autres dieux 6.14n. –  que vous ne connaissez pas 29.25 ; 32.17 ; voir aussi 28.33,36.
  - type: text
    content: 'la malédiction, si vous n''écoutez pas les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et si vous vous écartez de la voie que je vous prescris aujourd''hui pour suivre d''autres dieux que vous ne connaissez pas.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 27.4,11-13 ; Jos 8.30-35 ; le mont Garizim (cf. Jn 4.20n) et le mont Ebal sont à une trentaine de kilomètres à l'ouest du Jourdain, respectivement au sud et au nord de Sichem (cf. Gn 12.6s ; Jos 24.1 ; 1R 12.1).
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura fait entrer dans le pays où tu vas entrer pour en prendre possession, tu prononceras la bénédiction sur le mont Garizim et la malédiction sur le mont Ebal. '
  '3':
  - type: text
    content: 'ses signes et ses actes, ce qu''il a fait, au milieu de l''Egypte, au pharaon, le roi d''Egypte, et à tout son pays ; '
  '30':
  - type: note
    content: 'de l''autre côté… 3.20n. –  en direction…  : litt. derrière le chemin du soleil couchant ; derrière peut signifier à l''ouest (v. 24n), de sorte qu''on aurait là une juxtaposition de deux expressions équivalentes. Certains comprennent cependant derrière la route du soleil couchant  ; il s''agirait alors de la route qui reliait la Syrie et l''Egypte en passant à l''ouest du Jourdain (ainsi nommée par opposition à une autre route, qui menait de Syrie en Arabie par la Transjordanie). –  plaine aride  : hébreu ‘arava  ; cf. 1.1n  ; Jos 8.14n. –  Guilgal  : ce nom (qui signifie cercle) s''applique peut-être à plusieurs cercles de pierres dressées ; cf. Jos 4.19–5.12 (sanctuaire proche de Jéricho) ; Jg 3.19n  ; 2R 2.1 ; 4.38 (au nord de Beth-El) ; Os 4.15+. –  térébinthes de Moré Gn 12.6n.'
  - type: text
    content: 'Ces montagnes sont de l''autre côté du Jourdain, en direction du soleil couchant, au pays des Cananéens qui habitent dans la plaine aride, en face du Guilgal, près des térébinthes de Moré. '
  '31':
  - type: note
    content: du pays que le Seigneur … vous donne 3.20+.
  - type: text
    content: 'Car vous passez le Jourdain pour aller prendre possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous donne ; vous en prendrez possession et vous y habiterez.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Vous veillerez… 5.1n.
  - type: text
    content: Vous veillerez à mettre en pratique toutes les prescriptions et les règles que je place devant vous aujourd'hui.
  '4':
  - type: note
    content: 'Ex 14.23–15.21 ; Ps 106.11 ; 136.15. –  les a fait disparaître  : c.-à-d. leur a fait subir une défaite définitive.'
  - type: text
    content: 'ce qu''il a fait à l''armée d''Egypte, à ses chevaux et à ses chars, comment il a ramené sur eux les eaux de la mer des Joncs, lorsqu''ils vous poursuivaient : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les a fait disparaître, jusqu''à ce jour ; '
  '5':
  - type: note
    content: 8.2-6.
  - type: text
    content: 'ce qu''il a fait dans le désert, jusqu''à votre arrivée en ce lieu ; '
  '6':
  - type: note
    content: 'Nb 16. –  leurs familles  : litt. leurs maisons ou leurs maisonnées. –  tous ceux qui les avaient suivis  : litt. quiconque (ou tout ce qui) se levait (ou se dressait) à leurs pieds  ; autre traduction tout ce qui leur appartenait. –  au milieu de tout Israël 1.1+.'
  - type: text
    content: 'ce qu''il a fait à Datân et à Abiram, fils d''Eliab, fils de Ruben, comment la terre a ouvert sa bouche pour les engloutir, avec leurs familles, leurs tentes et tous ceux qui les avaient suivis, au milieu de tout Israël. '
  '7':
  - type: note
    content: V. 2 ; 1.31+.
  - type: text
    content: 'Car ce sont vos propres yeux qui ont vu toute la grande œuvre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a faite.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: tout le commandement 5.31n. –  que j'institue pour vous ou que je vous donne 4.2n. –  en prendre possession 1.21+.
  - type: text
    content: 'Ainsi, vous observerez tout le commandement que j''institue pour vous aujourd''hui, afin que vous ayez la force d''aller vous emparer du pays vers lequel vous passez pour en prendre possession, '
  '9':
  - type: note
    content: 'prolongiez vos jours 4.26+. –  sur la terre  : cf. 7.13+. –  que le Seigneur a juré… 1.8+. –  lait / miel 6.3 ; 26.9,15 ; 27.3 ; 31.20 ; Ex 3.8n  ; Jos 5.6.'
  - type: text
    content: 'et afin que vous prolongiez vos jours sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a juré à vos pères de leur donner, à eux et à leur descendance, ce pays ruisselant de lait et de miel.'
  - type: heading
    content: Le pays dont le Seigneur prend soin
