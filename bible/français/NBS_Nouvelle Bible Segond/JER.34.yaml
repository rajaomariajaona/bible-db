document_id: JER.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie annonce au roi Sédécias le sort qui l'attend
  - type: text
    content: ' '
  - type: note
    content: 'Parole… 1.2n. –  pendant que Nabuchodonosor… 32.1n-2+. –  les villes qui en dépendaient  : litt. ses villes  ; cf. v. 7 ; 49.13 ; 2R 25.1.'
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', pendant que Nabuchodonosor, roi de Babylone, avec toute son armée, tous les royaumes des pays qu''il dirigeait et tous les peuples, faisait la guerre contre Jérusalem et contre toutes les villes qui en dépendaient :'
  '10':
  - type: note
    content: 'avaient contracté  : litt. étaient entrés dans l''alliance  ; cf. Ez 16.8n. –  acceptèrent  : litt. écoutèrent  ; cf. v. 17.'
  - type: text
    content: 'Tous les princes et tout le peuple, qui avaient contracté l''alliance, acceptèrent de renvoyer libres leurs esclaves et leurs servantes, de ne plus les tenir en esclavage ; ils acceptèrent et les renvoyèrent. '
  '11':
  - type: text
    content: Mais ensuite ils revinrent sur leur décision ; ils ramenèrent les esclaves et les servantes qu'ils avaient renvoyés libres et ils les forcèrent à redevenir esclaves et servantes.
  '12':
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie, de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '13':
  - type: note
    content: 'Cf. Dt 29.24. –  maison des esclaves  : cf. Ex 13.3+.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : J''ai conclu une alliance avec vos pères, le jour où je les ai fait sortir de l''Egypte, de la maison des esclaves ; je leur ai dit : '
  '14':
  - type: note
    content: Ex 21.2-6 ; Dt 15.12-17 ; voir aussi Lv 25.40s ; Ez 46.17. –  à toi Dt 1.8n  ; 15.12. –  pas écouté 7.26n.
  - type: text
    content: 'Au bout de sept ans, chacun de vous renverra libre son frère hébreu, celui qui se vend à toi ; il te servira six ans, puis tu le renverras libre de chez toi. Mais vos pères ne m''ont pas écouté, ils n''ont pas tendu l''oreille. '
  '15':
  - type: note
    content: 'vous étiez revenus ou vous vous étiez convertis  ; cf. v. 10s,16 ; 3.12n  ; Es 1.26-27n. –  ce qui me convenait  : litt. ce qui (était) droit à mes yeux. –  dans la maison… 7.10+.'
  - type: text
    content: 'Vous, vous étiez revenus aujourd''hui, vous aviez fait ce qui me convenait : chacun de vous avait proclamé la libération de son prochain, vous aviez conclu une alliance devant moi, dans la maison sur laquelle mon nom est invoqué. '
  '16':
  - type: note
    content: 'vous avez profané mon nom  : en l''occurrence, en violant un serment prononcé au nom du Seigneur  ; cf. v. 15 ; Lv 18.21 ; 19.12 ; 21.6 ; 22.2,32 ; Ez 20.39 ; 36.20ss ; Am 2.7 ; Ml 1.12. –  et rendus à eux-mêmes  : autre traduction selon leur désir  ; cf. v. 10s ; expression analogue Dt 21.14 (où elle voudra).'
  - type: text
    content: Mais vous êtes revenus sur votre décision et vous avez profané mon nom ; vous avez ramené les esclaves et les servantes que vous aviez renvoyés libres et rendus à eux-mêmes, et vous les avez forcés à redevenir vos esclaves et vos servantes.
  '17':
  - type: text
    content: ' '
  - type: note
    content: écouté ou obéi  ; cf. v. 10. –  épée / peste / famine 14.12+. –  sujet de terreur 15.4+.
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Vous ne m''avez pas écouté, chacun de vous n''a pas proclamé la libération de son frère, de son prochain. Je proclame contre vous – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – une libération pour l''épée, pour la peste et pour la famine, et je ferai de vous un sujet de terreur pour tous les royaumes de la terre. '
  '18':
  - type: note
    content: 'ont passé outre et en passant traduisent deux sens d''un même verbe hébreu ; pareillement, un autre verbe est rendu à la fois par qu''ils avaient conclue et en coupant  ; sur le rite d''alliance évoqué ici, cf. Gn 15.10,17n  ; le texte pourrait aussi être compris comme suit  : je rendrai les hommes… comme le taurillon qu''ils ont coupé en deux en passant… –  qui n''ont pas réalisé  : cf. Gn 6.18n. –  les paroles de l''alliance  : cf. 11.2ss.'
  - type: text
    content: 'Je livrerai les hommes qui ont passé outre à mon alliance, qui n''ont pas réalisé les paroles de l''alliance qu''ils avaient conclue devant moi, en coupant un taurillon en deux et en passant entre ses morceaux. '
  '19':
  - type: note
    content: hauts fonctionnaires 29.2n  ; cf. Ac 8.27n. –  peuple du pays 1.18n.
  - type: text
    content: 'Les princes de Juda et les princes de Jérusalem, les hauts fonctionnaires, les prêtres, et tout le peuple du pays, qui sont passés entre les morceaux du taurillon, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 21.7,10+ ; 38.14-23.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Va, parle à Sédécias, roi de Juda ; tu lui diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je livre cette ville au roi de Babylone, et il y mettra le feu. '
  '20':
  - type: note
    content: 'ceux qui en veulent…  : voir 11.21n, de même pour le v. 21. –  leurs cadavres… 7.33+.'
  - type: text
    content: 'je les livrerai à leurs ennemis, à ceux qui en veulent à leur vie, et leurs cadavres seront la pâture des oiseaux du ciel et des bêtes de la terre. '
  '21':
  - type: note
    content: '21.7+. –  qui s''éloigne de vous  : cette expression (la même qu''en 21.2 ; 37.5nss) signifie probablement qui vient de lever (provisoirement) le siège de Jérusalem.'
  - type: text
    content: 'Je livrerai Sédécias, roi de Juda, et ses princes à leurs ennemis, à ceux qui en veulent à leur vie, à l''armée du roi de Babylone, qui s''éloigne de vous. '
  '22':
  - type: note
    content: 32.24+. –  un lieu dévasté 9.10+.
  - type: text
    content: 'Je donnerai un ordre – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – et je les ramènerai contre cette ville ; ils combattront contre elle, ils la prendront et y mettront le feu. Et je ferai des villes de Juda un lieu dévasté, sans habitants.'
  '3':
  - type: note
    content: 32.4n  ; 52.8s ; 2R 25.5s.
  - type: text
    content: 'Et toi, tu ne lui échapperas pas, mais tu seras bel et bien pris et livré à lui ; tes yeux verront les yeux du roi de Babylone, il te parlera face à face, et tu iras à Babylone. '
  '4':
  - type: text
    content: 'Seulement écoute la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', Sédécias, roi de Juda ! Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur toi : Tu ne mourras pas par l''épée. '
  '5':
  - type: note
    content: 'Tu mourras en paix  : cf. 14.13s ; 21.7n  ; 32.5 ; 38.17 ; Ez 12.12s. –  comme on a fait un feu… pour toi  : litt. comme les feux de tes pères… ainsi on brûlera pour toi  ; il s''agit vraisemblablement d''offrandes de parfums ; d''où la traduction de certains  : comme on a brûlé des parfums pour tes pères… ainsi on en brûlera pour toi  ; cf. 2Ch 16.14n  ; 21.19s. –  lamentation  : cf. 22.18n.'
  - type: text
    content: 'Tu mourras en paix ; et comme on a fait un feu pour tes pères, les anciens rois qui t''ont précédé, ainsi on en fera aussi pour toi, et on entonnera sur toi la lamentation : « Quel malheur, seigneur ! » Car j''ai prononcé cette parole – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '6':
  - type: text
    content: 'Jérémie, le prophète, dit toutes ces paroles à Sédécias, roi de Juda, à Jérusalem. '
  '7':
  - type: note
    content: 'toutes (omis par LXX) les autres villes de Juda v. 1+. –  Lakish Jos 10.31-35 ; 2R 14.19 ; 18.14,17 ; Né 11.30. –  Azéqa Jos 10.10 ; 15.35 ; 1S 17.1 ; Né 11.30. –  villes fortifiées  : cf. 4.5.'
  - type: text
    content: Et l'armée du roi de Babylone combattait contre Jérusalem et toutes les autres villes de Juda, contre Lakish et Azéqa, car c'étaient là les seules villes fortifiées qui restaient parmi les villes de Juda.
  - type: heading
    content: Les esclaves libérés de nouveau asservis
  '8':
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', après que le roi Sédécias eut conclu une alliance avec tout le peuple de Jérusalem, pour leur proclamer la libération, '
  '9':
  - type: note
    content: 'Cf. Né 5.8 ; 2Ch 28.10. –  ses esclaves et ses servantes  : autre traduction ses esclaves, hommes et femmes  ; cf. Gn 12.16n.'
  - type: text
    content: 'afin que chacun renvoie libres ses esclaves et ses servantes hébreux, et que personne ne tienne plus en esclavage son frère judéen. '
