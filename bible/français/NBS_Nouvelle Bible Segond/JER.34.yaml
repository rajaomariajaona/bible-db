document_id: JER.34,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie annonce au roi Sédécias le sort qui l'attend
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Parole… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pendant que Nabuchodonosor… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les villes qui en dépendaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 7 ; 49.13 ; 2R 25.1.
      marker-yv: yv-n
    - type: text
      text: 'Parole qui parvint à Jérémie de la part du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', pendant que Nabuchodonosor, roi de Babylone, avec toute son armée, tous les royaumes des pays qu''il dirigeait et tous les peuples, faisait la guerre contre Jérusalem et contre toutes les villes qui en dépendaient :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avaient contracté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'étaient entrés dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ez 16.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: acceptèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: écoutèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 17.'
      marker-yv: yv-n
    - type: text
      text: 'Tous les princes et tout le peuple, qui avaient contracté l''alliance, acceptèrent de renvoyer libres leurs esclaves et leurs servantes, de ne plus les tenir en esclavage ; ils acceptèrent et les renvoyèrent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Mais ensuite ils revinrent sur leur décision ; ils ramenèrent les esclaves et les servantes qu'ils avaient renvoyés libres et ils les forcèrent à redevenir esclaves et servantes.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Jérémie, de la part du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Dt 29.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maison des esclaves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 13.3+.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : J''ai conclu une alliance avec vos pères, le jour où je les ai fait sortir de l''Egypte, de la maison des esclaves ; je leur ai dit : '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 21.2-6 ; Dt 15.12-17 ; voir aussi Lv 25.40s ; Ez 46.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 1.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas écouté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Au bout de sept ans, chacun de vous renverra libre son frère hébreu, celui qui se vend à toi ; il te servira six ans, puis tu le renverras libre de chez toi. Mais vos pères ne m''ont pas écouté, ils n''ont pas tendu l''oreille. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous étiez revenus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous vous étiez convertis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 10s,16 ; 3.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 1.26-27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui me convenait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui (était) droit à mes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la maison… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.10+.
      marker-yv: yv-n
    - type: text
      text: 'Vous, vous étiez revenus aujourd''hui, vous aviez fait ce qui me convenait : chacun de vous avait proclamé la libération de son prochain, vous aviez conclu une alliance devant moi, dans la maison sur laquelle mon nom est invoqué. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous avez profané mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : en l''occurrence, en violant un serment prononcé au nom du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: '  ; cf. v. 15 ; Lv 18.21 ; 19.12 ; 21.6 ; 22.2,32 ; Ez 20.39 ; 36.20ss ; Am 2.7 ; Ml 1.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et rendus à eux-mêmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon leur désir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 10s ; expression analogue Dt 21.14 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: où elle voudra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Mais vous êtes revenus sur votre décision et vous avez profané mon nom ; vous avez ramené les esclaves et les servantes que vous aviez renvoyés libres et rendus à eux-mêmes, et vous les avez forcés à redevenir vos esclaves et vos servantes.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'écouté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: obéi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. v. 10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'famine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sujet de terreur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.4+.
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Vous ne m''avez pas écouté, chacun de vous n''a pas proclamé la libération de son frère, de son prochain. Je proclame contre vous – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – une libération pour l''épée, pour la peste et pour la famine, et je ferai de vous un sujet de terreur pour tous les royaumes de la terre. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ont passé outre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en passant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent deux sens d''un même verbe hébreu ; pareillement, un autre verbe est rendu à la fois par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''ils avaient conclue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en coupant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le rite d''alliance évoqué ici, cf. Gn 15.10,17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; le texte pourrait aussi être compris comme suit'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je rendrai les hommes… comme le taurillon qu''ils ont coupé en deux en passant… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui n'ont pas réalisé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 6.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les paroles de l'alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.2ss.'
      marker-yv: yv-n
    - type: text
      text: 'Je livrerai les hommes qui ont passé outre à mon alliance, qui n''ont pas réalisé les paroles de l''alliance qu''ils avaient conclue devant moi, en coupant un taurillon en deux et en passant entre ses morceaux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hauts fonctionnaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Ac 8.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peuple du pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les princes de Juda et les princes de Jérusalem, les hauts fonctionnaires, les prêtres, et tout le peuple du pays, qui sont passés entre les morceaux du taurillon, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.7,10+ ; 38.14-23.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël : Va, parle à Sédécias, roi de Juda ; tu lui diras : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Je livre cette ville au roi de Babylone, et il y mettra le feu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui en veulent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 11.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', de même pour le v. 21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leurs cadavres… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.33+.
      marker-yv: yv-n
    - type: text
      text: 'je les livrerai à leurs ennemis, à ceux qui en veulent à leur vie, et leurs cadavres seront la pâture des oiseaux du ciel et des bêtes de la terre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui s'éloigne de vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette expression (la même qu''en 21.2 ; 37.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss) signifie probablement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui vient de lever (provisoirement) le siège de Jérusalem.
      marker-yv: yv-n
    - type: text
      text: 'Je livrerai Sédécias, roi de Juda, et ses princes à leurs ennemis, à ceux qui en veulent à leur vie, à l''armée du roi de Babylone, qui s''éloigne de vous. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un lieu dévasté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.10+.
      marker-yv: yv-n
    - type: text
      text: 'Je donnerai un ordre – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – et je les ramènerai contre cette ville ; ils combattront contre elle, ils la prendront et y mettront le feu. Et je ferai des villes de Juda un lieu dévasté, sans habitants.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 52.8s ; 2R 25.5s.'
      marker-yv: yv-n
    - type: text
      text: 'Et toi, tu ne lui échapperas pas, mais tu seras bel et bien pris et livré à lui ; tes yeux verront les yeux du roi de Babylone, il te parlera face à face, et tu iras à Babylone. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Seulement écoute la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', Sédécias, roi de Juda ! Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sur toi : Tu ne mourras pas par l''épée. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu mourras en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.13s ; 21.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 32.5 ; 38.17 ; Ez 12.12s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme on a fait un feu… pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
