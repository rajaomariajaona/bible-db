      - type: text
        text: seraient à mon service
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 17.1 ; 24.40 ; 48.15 ; 1R 8.23,25 ; 2R 20.3 ; Ps 56.14 ; 116.9 ; voir Lc 1.76. –  '
    - type: usfm
