      - type: text
        text: tes fils plus que moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 10.37.'
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi foulez-vous aux pieds mon sacrifice et mon offrande, que j''ai ordonné de faire en mon séjour ? Tu honores tes fils plus que moi, afin de vous engraisser des prémices de toutes les offrandes d''Israël, mon peuple ! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'déclaration du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la formule apparaît environ 350 fois dans l''A.T., le plus souvent dans les livres des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Prophètes
      - type: text
        text: ', où elle souligne l''origine divine du message transmis par un prophète ; cf. Es 3.15 ; Jr 1.8 ; Ez 5.11 ; Os 2.15 etc. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: marcheraient devant moi
    - type: usfm
      marker: ft
      children:
      - type: text
