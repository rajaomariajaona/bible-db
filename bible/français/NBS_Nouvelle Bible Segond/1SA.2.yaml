document_id: 1SA.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'Anne
  - type: text
    content: ' '
  - type: note
    content: 'pria  : cette prière de louange, d''adoration et de reconnaissance, souvent appelée cantique , présente de nombreux points communs avec les Psaumes ; on peut la rapprocher également de Lc 1.46-55. –  Par le Seigneur  : autre traduction dans le Seigneur  ; la deuxième fois plusieurs témoins anciens ont lu par (ou en ) mon Dieu  ; la même préposition hébraïque est rendue plus loin par de ( je me réjouis de ton salut ). –  mon cœur exulte Ps 28.7. –  ma corne  : la corne (du taureau, du bouc ou du bélier) est habituellement une image de puissance ou de fierté ; cf. Ps 89.18,25 etc. –  ma bouche s''ouvre…  : cette formule suggère soit l''engloutissement des ennemis (Lm 2.16), soit la moquerie (Es 57.4) ; voir aussi Ps 35.21 ; 81.11. –  ton salut  : cf. Ps 9.15+.'
  - type: text
    content: 'Anne pria ; elle dit :'
  - type: text
    content: 'Par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' mon cœur exulte,'
  - type: text
    content: 'par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ma corne s''élève ;'
  - type: text
    content: ma bouche s'ouvre toute grande contre mes ennemis,
  - type: text
    content: car je me réjouis de ton salut.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'cherchent querelle  : le même verbe hébreu est traduit par accuser en Jr 2.29 ; cf. Jb 9.3. –  seront brisés  : autre traduction seront terrifiés (cf. 17.11). –  il tonnera 7.10 ; 2S 22.14 (= Ps 18.14) ; Es 29.6 ; Ps 29.3-9 ; Jb 37.2-5 ; 40.9. Voir ci-dessus « Samuel dans le Siracide  ». –  jugera… la terre Gn 18.25 ; Ps 9.9 ; 98.9 ; Jn 3.17 ; 12.47 ; Ac 17.31. –  son roi / l''homme qui a reçu son onction (ou son messie ) : cf. v. 35 ; 12.3-5 ; 16.6 ; 24.7-11 ; 26.9-23 ; 2S 1.14-16 ; 19.22 ; Ps 2.6 ; 89.21 ; 132.17. –  la corne  : cf. v. 1n.'
  - type: text
    content: 'Ceux qui cherchent querelle au '
  - type: text
    content: Seigneur
  - type: text
    content: ' seront brisés ;'
  - type: text
    content: contre eux, dans le ciel, il tonnera.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' jugera les extrémités de la terre.'
  - type: text
    content: Il donnera de la puissance à son roi,
  - type: text
    content: il élèvera la corne de l'homme qui a reçu son onction.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Elqana rentra chez lui  : certains mss de LXX portent elle le laissa là, devant le Seigneur, et revint à Rama  ; d''autres ont le pluriel ils le laissèrent là… et revinrent… –  Rama  : cf. 1.1n. –  quant au garçon… d''Eli  : cette remarque est une sorte de refrain qui revient avec quelques variantes aux v. 18,21,26 ; 3.1. –  officiait ou servait (cf. 1.24n).'
  - type: text
    content: 'Elqana rentra chez lui, à Rama ; quant au garçon, il officiait pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' auprès d''Eli, le prêtre.'
  - type: heading
    content: Abus commis par les fils d'Eli
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'des hommes sans morale  : litt. des fils de Bélial , cf. 1.16n  ; Dt 13.14n. –  ils ne connaissaient pas le Seigneur  : cf. 3.7n  ; Jr 2.8 ; 9.2 ; 1Co 15.34 ; 1Jn 3.6 ; 4.8.'
  - type: text
    content: 'Les fils d''Eli étaient des hommes sans morale ; ils ne connaissaient pas le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'Voici comment ces prêtres agissaient…  : litt. (telle était) la règle des prêtres avec le peuple  ; comme le terme correspondant à règle peut aussi avoir le sens de droit ou de coutume, on pourrait comprendre, avec Vg, en rattachant ces mots à la fin du v. 12  : ils ne connaissaient pas le Seigneur, ni le droit des prêtres à l''égard du peuple.'
  - type: text
    content: 'Voici comment ces prêtres agissaient à l''égard du peuple : chaque fois qu''on offrait un sacrifice, le serviteur du prêtre arrivait au moment où l''on faisait cuire la viande. Une fourchette à trois dents à la main, '
  '14':
  - type: note
    content: 'tous les gens d''Israël  : litt. tout Israël. –  à Silo 1.3n.'
  - type: text
    content: 'il piquait dans la cuve, dans le chaudron, dans la marmite ou dans le pot ; tout ce que la fourchette ramenait, le prêtre le prenait. C''est ainsi qu''ils agissaient à l''égard de tous les gens d''Israël qui venaient là, à Silo. '
  '15':
  - type: note
    content: 'La législation de Lv 3 prescrit de faire fumer les parties grasses de l''animal sur l''autel au début du rituel. Les fils d''Eli exigeaient en fait d''être servis avant le Seigneur lui-même ; voir sacrifices. –  fumer Lv 3.5. –  de la viande crue  : litt. du vivant.'
  - type: text
    content: 'Avant même qu''on fasse fumer la graisse, le serviteur du prêtre arrivait et disait à celui qui offrait le sacrifice : « Donne de la viande à rôtir pour le prêtre ; il n''acceptera pas de toi de la viande cuite, mais seulement de la viande crue. » '
  '16':
  - type: note
    content: 'd''abord  : litt. comme le jour  ; LXX d''abord, comme il convient  ; Vg d''abord, comme à l''accoutumée  ; cf. Gn 25.31n. –  la graisse  : Lv 3.3s énumère les morceaux gras de la victime qui sont réservés à Dieu et qui doivent donc être brûlés sur l''autel. –  le serviteur répondait : « Non ! Donne-le… »  : autre lecture traditionnelle le serviteur lui répondait : « Donne-le… »'
  - type: text
    content: 'Et si l''homme lui disait : « Qu''on fasse d''abord fumer la graisse ; ensuite tu prendras ce que tu désires », le serviteur répondait : « Non ! Donne-le tout de suite, sinon je le prends de force. » '
  '17':
  - type: note
    content: 'Voir péché. –  ces jeunes gens  : autre traduction ces serviteurs. –  ils bafouaient  : litt. les hommes bafouaient  ; il peut s''agir des fils d''Eli, ou des chefs de famille, ou même de la population en général ; le mot est absent d''un ms de Qumrân ainsi que de LXX, de sorte que le verbe dépend du sujet précédent, ces jeunes gens.'
  - type: text
    content: 'Le péché de ces jeunes gens était très grand devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', car ils bafouaient l''offrande du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Samuel sert le Seigneur à Silo
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 11n. –  c''était un garçon  : autre traduction en tant que serviteur . –  qui portait un éphod… comme un pagne  : litt. ceint d''un éphod  ; l’ éphod désigne ici un vêtement liturgique particulier, réservé à ceux qui exercent une fonction cultuelle : cf. 22.18 ; 2S 6.14,20 ; voir aussi Ex 25.7n  ; 28.6ss ; 29.5 ; 39.2ss ; Lv 8.7. Ailleurs l''éphod est utilisé pour consulter la divinité (selon certains, il s''agirait alors d''une sorte de bannière divinatoire) : cf. Jg 8.27 ; 17.5 ; 18.14ss ; 1S 2.28 ; 14.3 ; 21.10 ; 23.6ss ; 30.7s ; Os 3.4. Malgré son jeune âge, Samuel fait déjà partie du personnel du sanctuaire.'
  - type: text
    content: 'Samuel officiait devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''était un garçon qui portait un éphod de lin comme un pagne.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.3n,20-28 ; Ps 122. – Voir sacrifices.
  - type: text
    content: 'Sa mère lui faisait chaque année un petit vêtement et le lui apportait en montant avec son mari pour offrir le sacrifice annuel. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'saint Es 6.3 ; Ps 99.3,5,9. –  pas d''autre  : il faut sans doute comprendre pas d''autre saint  ; cf. Ex 15.11 ; Dt 4.35,39 ; 32.39 ; Es 44.8 ; 45.5 ; Os 13.4 ; Ps 18.32. –  rocher / Dieu Dt 32.4 ; 2S 22.3 ; 23.3 ; Ps 62.3,7s.'
  - type: text
    content: 'Nul n''est saint comme le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: il n'y en a pas d'autre que toi ;
  - type: text
    content: il n'y a pas de rocher comme notre Dieu.
  '20':
  - type: note
    content: 'bénit  : cf. Lv 9.22 ; 2Ch 30.27 ; Mc 10.16 ; Lc 24.50s ; Siracide 45.15 : « C''est Moïse qui lui conféra l''investiture (à Aaron)… pour… bénir son peuple par le Nom. » –  une descendance par cette femme  : cf. Ps 128.3 ; Rt 4.12. –  pour remplacer l''enfant…  : litt. à la place de la demande qu''il (ou qu''on) a demandée pour le Seigneur  ; cf. 1.17n,20n,28n. –  chez eux  : litt. à son lieu (celui d''Elqana).'
  - type: text
    content: 'Eli bénit Elqana et sa femme, en disant : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te donne une descendance par cette femme, pour remplacer l''enfant qui a été demandé pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Et ils s''en retournèrent chez eux. '
  '21':
  - type: note
    content: 'intervint en faveur  : cf. Gn 21.1s. –  Le jeune Samuel… v. 11n. –  auprès du Seigneur  : litt. avec YHWH.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' intervint en faveur d''Anne, et elle fut enceinte ; elle mit au monde trois fils et deux filles.'
  - type: text
    content: 'Le jeune Samuel grandissait auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'il apprit aussi  : sous-entendu dans le texte. –  ils couchaient avec les femmes  : voir Ex 20.14 ; Lv 18.20 ; 20.10. –  qui accomplissaient leur service…  : cf. Ex 38.8n.'
  - type: text
    content: 'Eli était très âgé ; il apprit comment ses fils agissaient à l''égard de tout Israël ; il apprit aussi qu''ils couchaient avec les femmes qui accomplissaient leur service à l''entrée de la tente de la Rencontre. '
  '23':
  - type: note
    content: 'Cf. Dt 21.18-21. – Les mots choses et actions traduisent ici un terme hébreu qui désigne aussi les paroles. Certains mss grecs lisent  : de telles choses, ce que j''apprends de tout le peuple du Seigneur.'
  - type: text
    content: 'Il leur dit : Pourquoi faites-vous de telles choses ? J''apprends de tout le peuple vos mauvaises actions. '
  '24':
  - type: note
    content: 'vous poussez…  : traduction incertaine ; ainsi Vg  ; cf. Dt 13 ; Ml 2.8 ; Mt 18.7. Autre possibilité  : ce que j''entends le peuple du Seigneur raconter n''est pas bon  ; certains mss hébreux portent  : vous asservissez le peuple du Seigneur  ; LXX vous ne servez pas le peuple de Dieu.'
  - type: text
    content: 'Non, mes fils, ce que j''entends dire n''est pas bon ; vous poussez le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à la transgression. '
  '25':
  - type: note
    content: 'arbitrera (cf. Ex 21.22n) et intercédera (ou priera) traduisent deux formes du même verbe hébreu ; cf. Dt 1.17 ; 1R 8.31s. –  n''écoutèrent pas  : cf. Pr 1.8. –  les faire mourir v. 34 ; 4.11.'
  - type: text
    content: 'Si un homme pèche contre un autre homme, Dieu arbitrera pour lui ; mais si un homme pèche contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui intercédera pour lui ? Mais ils n''écoutèrent pas leur père, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' voulait les faire mourir.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 2.52 ; Rm 14.18. –  Le jeune Samuel… v. 11n.
  - type: text
    content: 'Le jeune Samuel continuait à grandir ; il était agréable au '
  - type: text
    content: Seigneur
  - type: text
    content: ' aussi bien qu''aux hommes.'
  - type: heading
    content: Le châtiment annoncé à Eli et à sa famille
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'homme de Dieu  : expression qui revient à plusieurs reprises dans les livres de Samuel, des Rois et des Chroniques pour désigner un prophète envoyé par Dieu, voir 9.6ss ; 1R 13.1 ; 2R 1.9 ; 2Ch 11.2. –  la maison de ton père  : autre traduction ta famille , de même dans la suite ; il s''agit de la famille sacerdotale associée à la tribu de Lévi, tribu à laquelle Moïse et Aaron sont également associés ; voir Ex 2.1-10 ; 3 ; 6. –  ils appartenaient à  : un ms de Qumrân, LXX et des mss de Tg précisent ils étaient esclaves de.'
  - type: text
    content: 'Un homme de Dieu vint trouver Eli et lui dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ne me suis-je pas révélé à la maison de ton père, lorsqu''en Egypte ils appartenaient à la maison du pharaon ? '
  '28':
  - type: note
    content: 'pour mon sacerdoce  : litt. pour (être) prêtre pour moi (voir Ex 28.1 ; Lv 8–9) ; les informations qui suivent énumèrent quelques-unes des fonctions sacerdotales en Israël  : monter à l''autel pour offrir les sacrifices d''animaux (voir Lv 1–5), offrir de l''encens (voir Ex 30.34ss ; Lv 16.12s ; Dt 33.10 ; 2Ch 13.10s), porter l''éphod (voir Ex 28.6-30 ; 1S 14.3). –  j''ai donné… toutes les offrandes  : voir Lv 7.28-36 ; Dt 18.3.'
  - type: text
    content: 'Je l''ai choisie parmi toutes les tribus d''Israël pour mon sacerdoce, pour qu''elle monte à mon autel, qu''elle fasse fumer de l''encens et qu''elle porte l''éphod devant moi, et j''ai donné à la maison de ton père toutes les offrandes des Israélites, leurs offrandes consumées par le feu. '
  '29':
  - type: note
    content: 'foulez-vous aux pieds  : cette tournure imagée exprime un manque de respect à l''égard de Dieu ; cf. Hé 10.29. –  en mon séjour  : dans le texte hébreu, le mot correspondant (cf. Dt 26.15n) est employé tout seul, sans préposition ni possessif ; il pourrait désigner le sanctuaire, mais le sens de cette expression inhabituelle pourrait aussi être adverbial, en permanence  ; même possibilité au v. 32. –  tes fils plus que moi  : cf. Mt 10.37.'
  - type: text
    content: 'Pourquoi foulez-vous aux pieds mon sacrifice et mon offrande, que j''ai ordonné de faire en mon séjour ? Tu honores tes fils plus que moi, afin de vous engraisser des prémices de toutes les offrandes d''Israël, mon peuple ! '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'hautaines  : litt. hauteur hauteur  ; cette répétition sert à exprimer l''insistance, à moins qu''elle soit due à une erreur de copie ; cf. Pr 8.13. –  insolence  : même terme en Ps 31.19 ; 75.6 ; 94.4. –  un Dieu qui connaît tout  : litt. un Dieu (hébreu ’El , voir Gn 21.33n) de connaissances , expression unique dans la Bible, mais qui se retrouve dans la Règle de la Communauté (Qumrân) 3.15 : « Du Dieu des Connaissances provient tout ce qui est et sera. » Voir également Ps 139.1-12. –  par lui sont pesés tous (mot sous-entendu dans le texte) les agissements  : selon une autre lecture traditionnelle on pourrait aussi comprendre les agissements ne tiennent pas , c.-à-d. les crimes ne restent pas impunis  ; LXX c''est un Dieu qui prépare ses actions.'
  - type: text
    content: Ne multipliez pas les paroles hautaines ;
  - type: text
    content: qu'aucune insolence ne sorte de votre bouche ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un Dieu qui connaît tout,'
  - type: text
    content: et par lui sont pesés tous les agissements.
  '30':
  - type: note
    content: 'déclaration du Seigneur  : la formule apparaît environ 350 fois dans l''A.T., le plus souvent dans les livres des Prophètes, où elle souligne l''origine divine du message transmis par un prophète ; cf. Es 3.15 ; Jr 1.8 ; Ez 5.11 ; Os 2.15 etc. –  marcheraient devant moi  : c.-à-d. seraient à mon service  ; cf. Gn 17.1 ; 24.40 ; 48.15 ; 1R 8.23,25 ; 2R 20.3 ; Ps 56.14 ; 116.9 ; voir Lc 1.76. –  pour toujours  : cf. Ex 29.9. –  jamais ! litt. profanation à moi ! Cette expression signifie un rejet ou un refus catégoriques ; cf. 12.23 ; 14.45 ; 20.2,9n  ; 22.15 ; 24.7 ; 26.11 ; Jos 22.29 ; 24.16. –  j''honorerai…  : autre traduction je glorifierai celui qui me glorifie  ; cf. 2S 22.26s/ / ; Jn 9.31. –  deviendront peu de chose  : litt. seront légers  ; l''image s''oppose à celle de la gloire, qui évoque en hébreu l''idée de poids.'
  - type: text
    content: 'Eh bien, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël – j''avais dit que ta maison et la maison de ton père marcheraient devant moi pour toujours. Mais maintenant, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – jamais ! Car j''honorerai celui qui m''honore, mais ceux qui me méprisent deviendront peu de chose. '
  '31':
  - type: note
    content: 'ta vigueur…  : litt. ton bras et le bras de la maison de ton père  ; LXX ta descendance et la descendance de la maison de ton père  ; allusion probable à la mort des fils d''Eli (4.11), au massacre des prêtres de Nob (22.18) et à la destitution du prêtre Abiathar (1R 2.26s) ; cf. Ez 30.21,24 ; Ps 10.15 ; 37.17.'
  - type: text
    content: 'Les jours viennent où j''abattrai ta vigueur et la vigueur de la maison de ton père : il n''y aura plus de vieillard dans ta maison. '
  '32':
  - type: note
    content: 'un adversaire ou un rival, c.-à-d. un prêtre d''une autre famille, qui assumera le service du sanctuaire à la place d''Eli et de ses descendants (voir 1R 2.35). Le mot hébreu peut aussi évoquer la détresse ou l’angoisse. –  en mon séjour  : autre traduction en permanence, cf. v. 29n. –  tout le bien qui sera fait à Israël  : par l''adversaire, ou par Dieu lui-même.'
  - type: text
    content: 'Tu verras un adversaire en mon séjour, au milieu de tout le bien qui sera fait à Israël ; et il n''y aura plus jamais de vieillard dans ta maison. '
  '33':
  - type: note
    content: 'Tu auras toujours…  : litt. (il y aura) un homme (que) je ne retrancherai pas pour toi (tournure analogue en 2S 3.29 ; 1R 2.4n  ; Jr 35.19) : un descendant d''Eli subsistera, mais sans doute à une fonction liturgique subalterne. –  pour épuiser…  : cf. Lv 26.16n  ; Dt 28.65 ; Ps 69.4 ; Jb 11.20+ ; 31.16. Eli lui-même, quoique mort, sera témoin au travers de son descendant de la déchéance de sa famille. –  mais tous… par l''épée des hommes  : d''après LXX et un ms de Qumrân  ; le texte hébreu traditionnel porte, litt., tous ceux qui augmentent ta maison mourront hommes  ; on a interprété hommes au sens de gens dans la force de l''âge (par opposition au vieillard des v. 31s), ou de simples particuliers (par opposition aux «anciens  », autre sens du mot traduit par vieillard, ou au descendant unique qui subsiste auprès de l''autel).'
  - type: text
    content: 'Tu auras toujours un successeur auprès de mon autel, pour épuiser tes yeux et ronger ta vie ; mais tous ceux qui pourraient donner de la grandeur à ta maison mourront par l''épée des hommes. '
  '34':
  - type: note
    content: Voir v. 25 ; 4.11.
  - type: text
    content: 'Tu auras pour signe ce qui arrivera à Hophni et Phinéas, tes deux fils : ils mourront tous les deux le même jour. '
  '35':
  - type: note
    content: 'un prêtre sûr ou digne de confiance  : probablement Tsadoq, voir v. 32n  ; 2S 8.17 ; 1R 2.35 ; cf. Ez 44.15 ; sûr et stable traduisent le même mot hébreu. –  selon mon cœur 13.14 ; 2S 7.21. –  Je lui bâtirai une maison stable  : ce type de promesse apparaît trois autres fois dans l''A.T., à propos de dynasties royales : 25.28 ; 2S 7.16 ; 1R 11.38. –  marchera toujours (litt. tous les jours) devant v. 30n. –  l''homme qui aura (ou qui a) reçu mon onction  : autre traduction mon messie, cf. v. 10n.'
  - type: text
    content: 'Je susciterai pour moi un prêtre sûr ; il agira selon mon cœur et selon mon âme. Je lui bâtirai une maison stable, et il marchera toujours devant l''homme qui aura reçu mon onction. '
  '36':
  - type: note
    content: 'quiconque restera  : cf. v. 33n. –  un pain rond 10.3 ; Ex 29.23n  ; cf. Ps 37.25. –  Attache-moi…  : le descendant d''Eli quémandera une position d''esclave au service du prêtre, de manière à pouvoir bénéficier du statut de son maître, cf. Lv 22.10s. –  quelque chose  : litt. un morceau de pain.'
  - type: text
    content: 'Et quiconque restera de ta maison viendra se prosterner devant lui pour avoir une pièce d''argent et un pain rond ; il dira : « Attache-moi, je te prie, à l''une des fonctions du sacerdoce, afin que j''aie quelque chose à manger ! »'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Les v. 4-8, centre de la prière, énumèrent des renversements de situation dus à la volonté divine. –  arc… brisé Jr 51.56 ; Ps 37.14s ; 46.10. –  ceux qui trébuchaient Ps 17.5 ; 55.23 ; 105.37. –  se ceignent de vaillance Ps 18.33.
  - type: text
    content: L'arc des guerriers est brisé,
  - type: text
    content: mais ceux qui trébuchaient se ceignent de vaillance.
  '5':
  - type: text
    content: ' '
  - type: note
    content: rassasiés / affamés Ps 34.11 ; Lm 5.6 ; cf. Lc 6.21,25 ; 15.13ss. –  stérile / beaucoup de fils 1.5 ; Es 54.1 ; Ps 113.9. –  dépérit Jr 15.9.
  - type: text
    content: Ceux qui étaient rassasiés se vendent pour du pain,
  - type: text
    content: mais ceux qui étaient affamés ont du répit ;
  - type: text
    content: la femme stérile accouche sept fois,
  - type: text
    content: mais celle qui avait beaucoup de fils dépérit.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Dt 32.39 ; Ez 37.11ss ; Os 6.1s ; Jon 2.7 ; Ps 30.4. – Voir séjour des morts.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait mourir et il fait vivre,'
  - type: text
    content: il fait descendre au séjour des morts et il en fait remonter.
  '7':
  - type: text
    content: ' '
  - type: note
    content: rend pauvre ou riche Jb 1.21 ; Pr 10.22 ; 2Co 8.9. –  abaisse / élève Ez 17.24 ; Ps 75.8 ; Dn 4.17-34.
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui rend pauvre ou riche,'
  - type: text
    content: c'est lui qui abaisse et qui élève.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'relève / élève Ps 113.7s ; Jb 36.15 ; Lc 1.52. – Voir gloire. –  les piliers (ou les fondations ) de la terre  : cf. Ps 24.2 ; 75.4 ; 102.26 ; 104.5.'
  - type: text
    content: De la poussière il relève le faible,
  - type: text
    content: du fumier il élève le pauvre,
  - type: text
    content: pour les faire asseoir avec les nobles ;
  - type: text
    content: il leur donne pour patrimoine un trône glorieux ;
  - type: text
    content: 'car c''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ' qu''appartiennent les piliers de la terre,'
  - type: text
    content: c'est sur eux qu'il a posé le monde.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 9s présentent de nouvelles oppositions, soulignant l''attitude différenciée du Seigneur à l''égard de ses fidèles et de ses adversaires. –  les pas  : litt. les pieds  ; cf. Ps 91.12 ; 119.105. –  de ses fidèles  : autre lecture traditionnelle de son fidèle , allusion probable au roi du v. 10. –  les méchants Ez 33.8s ; Ps 1.6 ; 37.20 ; voir justice. –  pas par la force Ps 33.16.'
  - type: text
    content: Il garde les pas de ses fidèles.
  - type: text
    content: Mais les méchants se perdent dans les ténèbres ;
  - type: text
    content: car l'homme ne triomphera pas par la force.
