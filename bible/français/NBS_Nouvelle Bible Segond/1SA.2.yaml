  - type: text
    text: 'Voici comment ces prêtres agissaient à l''égard du peuple : chaque fois qu''on offrait un sacrifice, le serviteur du prêtre arrivait au moment où l''on faisait cuire la viande. Une fourchette à trois dents à la main, '
