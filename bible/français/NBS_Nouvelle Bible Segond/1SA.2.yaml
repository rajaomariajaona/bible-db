    marker-yv: yv-n
  - type: text
    text: 'Eh bien, – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël – j''avais dit que ta maison et la maison de ton père marcheraient devant moi pour toujours. Mais maintenant, – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
