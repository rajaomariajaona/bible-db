    marker-yv: yv-n
  - type: text
    text: 'Et quiconque restera de ta maison viendra se prosterner devant lui pour avoir une pièce d''argent et un pain rond ; il dira : « Attache-moi, je te prie, à l''une des fonctions du sacerdoce, afin que j''aie quelque chose à manger ! »'
