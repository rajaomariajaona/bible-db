        text: '  : voir Lv 7.28-36 ; Dt 18.3.'
    marker-yv: yv-n
  - type: text
    text: 'Je l''ai choisie parmi toutes les tribus d''Israël pour mon sacerdoce, pour qu''elle monte à mon autel, qu''elle fasse fumer de l''encens et qu''elle porte l''éphod devant moi, et j''ai donné à la maison de ton père toutes les offrandes des Israélites, leurs offrandes consumées par le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: foulez-vous aux pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette tournure imagée exprime un manque de respect à l''égard de Dieu ; cf. Hé 10.29. –  '
