document_id: JOB.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Réplique de Job (fin) : la triste condition de l''être humain'
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la femme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 25.4 ; Ps 51.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sa vie est courte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: court de jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; voir 7.7+.
      marker-yv: yv-n
    - type: text
      text: L'être humain, né de la femme !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sa vie est courte, il est saturé d'agitation.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.8 ; Ec 3.21.
      marker-yv: yv-n
    - type: text
      text: Mais l'homme meurt et il perd sa force ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'être humain expire ; où est-il ?
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 19.5.
      marker-yv: yv-n
    - type: text
      text: Les eaux de la mer se retirent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fleuves tarissent et se dessèchent ;
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne se relève pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réveillera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sortira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ces deux verbes sont au pluriel en hébreu.'
      marker-yv: yv-n
    - type: text
      text: ainsi l'homme se couche et il ne se relève pas ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant qu'il y a un ciel il ne se réveillera pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne sortira pas de son sommeil.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: me cacher…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 2.10 ; 26.20. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta colère s'en retourne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 27.44s ; Es 9.11+.'
      marker-yv: yv-n
    - type: text
      text: Ah ! si tu voulais me cacher dans le séjour des morts,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: m'y tenir au secret jusqu'à ce que ta colère s'en retourne,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: me fixer un terme où tu te souviendrais de moi !
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si l'homme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si un homme meurt, (re)vivra-t-il ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'attendrais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains traduisent ici par un futur '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'attendrai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; de même au v. 15 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu appelleras… je te répondrai… tu languiras.
      marker-yv: yv-n
    - type: text
      text: Si l'homme, une fois mort, pouvait revivre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les jours de mon service, j'attendrais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: jusqu'à ce que vienne ma relève.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 7.21 ; 19.25-27.
      marker-yv: yv-n
    - type: text
      text: Tu appellerais alors, et moi, je te répondrais,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu languirais après l'œuvre de tes mains.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.6 ; 31.4 ; 34.21.
      marker-yv: yv-n
    - type: text
      text: Alors que maintenant tu comptes mes pas,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu n'observerais plus mon péché.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu blanchirais…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu enduirais sur ma faute
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; sur le verbe hébreu correspondant, cf. 13.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . Voir aussi 9.30s.
      marker-yv: yv-n
    - type: text
      text: Ma transgression serait scellée dans un sac,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et tu blanchirais ma faute.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se disloque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se flétrir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ez 47.12 ; Ps 1.3 ; 37.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se déplace
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avance de son lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 18.4 ; cf. 6.12 ; 9.6.'
      marker-yv: yv-n
    - type: text
      text: Mais la montagne tombe et se disloque,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: le rocher se déplace,
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.15+.
      marker-yv: yv-n
    - type: text
      text: l'eau use les pierres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la crue emporte la poussière de la terre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ainsi tu fais disparaître l'espoir de l'homme.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fleur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ombre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.9+.
      marker-yv: yv-n
    - type: text
      text: Il a poussé comme une fleur et il est coupé.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il fuit comme l'ombre et ne s'arrête pas.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu le défigures
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu changes sa face '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (allusion à la maladie ?).
      marker-yv: yv-n
    - type: text
      text: Tu es sans cesse à l'assaillir, et il s'en va ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tu le défigures, puis tu le renvoies.
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.21 ; cf. 2R 20.19 ; Ec 9.5s.
      marker-yv: yv-n
    - type: text
      text: Ses fils connaissent-ils la gloire ? Il n'en sait rien.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Sont-ils dans l'abaissement ? Il ne s'en aperçoit pas.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est pour sa propre chair qu'il souffre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est pour lui-même qu'il est en deuil.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu me ferais entrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : des versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu le ferais entrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 9.32.
      marker-yv: yv-n
    - type: text
      text: C'est sur lui que tu as l'œil ouvert !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et tu me ferais entrer en jugement avec toi !
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir 4.17+ ; 15.14 ; 25.4. – Voir '
        - type: usfm
          marker: bdit
          children:
          - type: usfm
            marker: w
            children:
            - type: text
              text: pur
          - type: text
            text: ', impur'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Qui peut faire sortir le pur de l'impur ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Personne.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 7.7+. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a fait du début de ce verset la suite de la phrase précédente'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (… personne), même si sa vie sur la terre n'a duré qu'un jour.
      marker-yv: yv-n
    - type: text
      text: Si ses jours sont fixés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu as arrêté le nombre de ses mois,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si tu en as marqué le terme qu'il ne saurait franchir,
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.19+.
      marker-yv: yv-n
    - type: text
      text: détourne de lui tes regards, et qu'il ait une pause ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il puisse être, comme un salarié, content de sa journée.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.10 ; 1Ch 29.15.
      marker-yv: yv-n
    - type: text
      text: 'Pour un arbre, il y a un espoir :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si on le coupe, il repousse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses rejetons ne manquent pas ;
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Es 6.13.
      marker-yv: yv-n
    - type: text
      text: si sa racine vieillit dans la terre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: si son tronc meurt dans la poussière,
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'approche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'odeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Es 11.1.
      marker-yv: yv-n
    - type: text
      text: il refleurit à l'approche de l'eau,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il produit des rameaux comme une jeune plante.
