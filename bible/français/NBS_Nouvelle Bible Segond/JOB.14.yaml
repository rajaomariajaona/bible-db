document_id: JOB.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job (fin) : la triste condition de l''être humain'
  - type: text
    content: ' '
  - type: note
    content: 'de la femme 1.21n  ; 25.4 ; Ps 51.7. –  Sa vie est courte  : litt. court de jours  ; voir 7.7+.'
  - type: text
    content: L'être humain, né de la femme !
  - type: text
    content: Sa vie est courte, il est saturé d'agitation.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 7.8 ; Ec 3.21.
  - type: text
    content: Mais l'homme meurt et il perd sa force ;
  - type: text
    content: l'être humain expire ; où est-il ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: Es 19.5.
  - type: text
    content: Les eaux de la mer se retirent,
  - type: text
    content: les fleuves tarissent et se dessèchent ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'ne se relève pas 7.9+. –  réveillera / sortira  : ces deux verbes sont au pluriel en hébreu.'
  - type: text
    content: ainsi l'homme se couche et il ne se relève pas ;
  - type: text
    content: tant qu'il y a un ciel il ne se réveillera pas,
  - type: text
    content: il ne sortira pas de son sommeil.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'me cacher…  : cf. Es 2.10 ; 26.20. – Voir séjour des morts. –  ta colère s''en retourne  : cf. Gn 27.44s ; Es 9.11+.'
  - type: text
    content: Ah ! si tu voulais me cacher dans le séjour des morts,
  - type: text
    content: m'y tenir au secret jusqu'à ce que ta colère s'en retourne,
  - type: text
    content: me fixer un terme où tu te souviendrais de moi !
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Si l''homme…  : litt. si un homme meurt, (re)vivra-t-il ? –  service  : cf. 7.1n. –  j''attendrais  : certains traduisent ici par un futur j''attendrai…  ; de même au v. 15 tu appelleras… je te répondrai… tu languiras.'
  - type: text
    content: Si l'homme, une fois mort, pouvait revivre,
  - type: text
    content: tous les jours de mon service, j'attendrais,
  - type: text
    content: jusqu'à ce que vienne ma relève.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.21 ; 19.25-27.
  - type: text
    content: Tu appellerais alors, et moi, je te répondrais,
  - type: text
    content: tu languirais après l'œuvre de tes mains.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 10.6 ; 31.4 ; 34.21.
  - type: text
    content: Alors que maintenant tu comptes mes pas,
  - type: text
    content: tu n'observerais plus mon péché.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'tu blanchirais…  : litt. tu enduirais sur ma faute  ; sur le verbe hébreu correspondant, cf. 13.4n. Voir aussi 9.30s.'
  - type: text
    content: Ma transgression serait scellée dans un sac,
  - type: text
    content: et tu blanchirais ma faute.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'se disloque  : le verbe correspondant est traduit par se flétrir en Ez 47.12 ; Ps 1.3 ; 37.2. –  se déplace  : litt. avance de son lieu , de même en 18.4 ; cf. 6.12 ; 9.6.'
  - type: text
    content: Mais la montagne tombe et se disloque,
  - type: text
    content: le rocher se déplace,
  '19':
  - type: text
    content: ' '
  - type: note
    content: 13.15+.
  - type: text
    content: l'eau use les pierres,
  - type: text
    content: la crue emporte la poussière de la terre ;
  - type: text
    content: ainsi tu fais disparaître l'espoir de l'homme.
  '2':
  - type: text
    content: ' '
  - type: note
    content: fleur 8.12+. –  ombre 8.9+.
  - type: text
    content: Il a poussé comme une fleur et il est coupé.
  - type: text
    content: Il fuit comme l'ombre et ne s'arrête pas.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'tu le défigures  : litt. tu changes sa face (allusion à la maladie ?).'
  - type: text
    content: Tu es sans cesse à l'assaillir, et il s'en va ;
  - type: text
    content: tu le défigures, puis tu le renvoies.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 21.21 ; cf. 2R 20.19 ; Ec 9.5s.
  - type: text
    content: Ses fils connaissent-ils la gloire ? Il n'en sait rien.
  - type: text
    content: Sont-ils dans l'abaissement ? Il ne s'en aperçoit pas.
  '22':
  - type: text
    content: C'est pour sa propre chair qu'il souffre,
  - type: text
    content: c'est pour lui-même qu'il est en deuil.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tu me ferais entrer  : des versions anciennes ont lu tu le ferais entrer  ; cf. 9.32.'
  - type: text
    content: C'est sur lui que tu as l'œil ouvert !
  - type: text
    content: Et tu me ferais entrer en jugement avec toi !
  '4':
  - type: text
    content: ' '
  - type: note
    content: Voir 4.17+ ; 15.14 ; 25.4. – Voir pur, impur.
  - type: text
    content: Qui peut faire sortir le pur de l'impur ?
  - type: text
    content: Personne.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.7+. LXX a fait du début de ce verset la suite de la phrase précédente  : (… personne), même si sa vie sur la terre n''a duré qu''un jour.'
  - type: text
    content: Si ses jours sont fixés,
  - type: text
    content: si tu as arrêté le nombre de ses mois,
  - type: text
    content: si tu en as marqué le terme qu'il ne saurait franchir,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 7.19+.
  - type: text
    content: détourne de lui tes regards, et qu'il ait une pause ;
  - type: text
    content: qu'il puisse être, comme un salarié, content de sa journée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 19.10 ; 1Ch 29.15.
  - type: text
    content: 'Pour un arbre, il y a un espoir :'
  - type: text
    content: si on le coupe, il repousse,
  - type: text
    content: ses rejetons ne manquent pas ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 6.13.
  - type: text
    content: si sa racine vieillit dans la terre,
  - type: text
    content: si son tronc meurt dans la poussière,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'à l''approche  : litt. à l''odeur  ; cf. Es 11.1.'
  - type: text
    content: il refleurit à l'approche de l'eau,
  - type: text
    content: il produit des rameaux comme une jeune plante.
