document_id: MIC.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 1.1 ; Os 1.1. –  qui parvint Ez 1.3n. –  Michée  : hébreu Mika , forme abrégée de Mikayehou, Qui est comme YHWH ? cf. 7.18 ; même nom en Jg 17–18 ; cf. 1R 22.8ss ; voir aussi Ex 15.11 ; Es 44.6s ; Ps 35.10 ; 89.7ss ; 113.5. –  Morésheth , à 35 km au sud-ouest de Jérusalem, à une douzaine de kilomètres à l''est de Gath, v. 14 ; Am 6.2 ; cf. Jr 26.18. –  Jotam (≈ 740-736 av. J.-C.), Achaz (≈ 736-716), Ezéchias (≈ 716-687), rois de Juda 2R 15.32–16.20 ; 18–20. –  ce qu''il a vu Am 1.1+. –  Samarie , capitale du royaume du Nord, tombera en 722/1 (2R 17).'
  - type: text
    content: 'Parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Michée de Morésheth aux jours de Jotam, d''Achaz, d''Ezéchias, rois de Juda ; ce qu''il a vu au sujet de Samarie et de Jérusalem.'
  - type: heading
    content: Le Seigneur accuse son peuple
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Texte incertain jusqu''à la fin du chapitre. Des localités mentionnées ici et dans la suite, celles qui ont été localisées se situent toutes dans le Bas-Pays (ou Shephéla ), région de Juda située entre la Philistie ( Gath , tombée aux mains des Assyriens en 711 av. J.-C. ; cf. Jos 13.3 ; 1S 5.8 ; 17.4 ; 1R 2.41 ; Am 6.2) et Jérusalem (cf. Jos 15.33ss), c.-à-d. sur le chemin qu''empruntera l''envahisseur assyrien Sennachérib (2R 18.13ss) ; les verbes hébreux associés à chaque ville font en général assonance avec son nom ; cf. Es 10.26-34. –  Ne l''annoncez pas…  : hébreu taggidou (/ / Gath ), 2S 1.20 ; LXX ne vous enorgueillissez pas . –  ne pleurez pas (hébreu tibkou ) dans Akko ( bako ) : transcription conjecturale, le texte hébreu traditionnel semble incomplet (cf. Jg 1.31n  ; autres propositions d''identification : Kabbôn ou Qéila ; cf. Jos 15.40,44). –  Je me roule (autre lecture traditionnelle roule-toi , au féminin ; la première forme verbale rappelle le nom Philistie) dans la poussière , hébreu ‘aphar (/ / Léaphra ).'
  - type: text
    content: Ne l'annoncez pas dans Gath,
  - type: text
    content: ne pleurez pas dans Akko !
  - type: text
    content: Je me roule dans la poussière à Beth-Léaphra.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Passe  : ici le texte hébreu traditionnel ne présente plus d''assonance très nette ; certains le modifient pour lire fais retentir le cor (hébreu shophar / / Shaphir ) ; cf. Os 5.8 ; d''autres pensent à une simple opposition entre le sens du nom Shaphir ( Beauté ) et l''expression la nudité et la honte . –  sortir  : hébreu yatsea’ / / Tsaanân  : cf. Jos 15.37 (Tsenân). –  Beth-Etsel  : le nom évoque une ville retranchée ou fortifiée (cf. l’ appui ).'
  - type: text
    content: Passe, habitante de Shaphir,
  - type: text
    content: dans la nudité et la honte !
  - type: text
    content: L'habitante de Tsaanân n'ose sortir,
  - type: text
    content: la lamentation de Beth-Etsel vous prive de son appui.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Maroth ( Amertume ) ; cf. Jos 15.59 (Maarath).
  - type: text
    content: L'habitante de Maroth tremble pour son bonheur,
  - type: text
    content: 'car le malheur est descendu, venant du '
  - type: text
    content: Seigneur
  - type: text
    content: jusqu'à la porte de Jérusalem.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'char et chevaux  : litt. le char à l''attelage  ; il y a assonance entre le terme hébreu correspondant larékesh et le nom Lakish (Jos 10.3ss,31s ; 12.11 ; 15.39 ; 2R 14.19 ; 18.3,14 ; Jr 34.7 ; Né 11.30 ; 2Ch 11.9). –  Sion la belle  : litt. la fille de Sion  ; cf. 4.8n  ; Jr 4.11n,31+. –  le commencement (ou les prémices ) du péché  : le texte dénonce peut-être le sentiment illusoire de sécurité associé aux chevaux et aux chars de guerre ; cf. 1R 9.19 ; Es 31.1 ; Os 8.14 ; 10.13 ; 14.4 ; Ps 20.8.'
  - type: text
    content: Attelle char et chevaux,
  - type: text
    content: habitante de Lakish !
  - type: text
    content: Tu as été pour Sion la belle le commencement du péché,
  - type: text
    content: car en toi se sont trouvées les transgressions d'Israël.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'tu te sépareras…  : le terme hébreu employé ici semble évoquer un « cadeau d''adieu » donné à une fiancée en cas de rupture des fiançailles, ou peut-être un acte de répudiation (cf. Ex 18.2 ; Dt 24.1ss) ; il désigne une dot en 1R 9.16. En hébreu fiancée se dit me''orasha , terme qui pourrait avoir été employé dans un état antérieur du texte pour jouer sur le nom de Morésheth-Gath (v. 1n), et peut-être aussi sur celui de Marésha (v. 15). – Le nom Akzib (cf. Gn 38.5 Kezib  ; Jos 15.44) fait assonance avec le mot pour une tromperie (ou un leurre ), hébreu akzab (Jr 15.18n).'
  - type: text
    content: C'est pourquoi tu te sépareras de Morésheth-Gath ;
  - type: text
    content: les maisons d'Akzib seront une tromperie
  - type: text
    content: pour les rois d'Israël.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'conquérant , hébreu yoresh , du verbe habituellement traduit par prendre possession de , apparenté à Marésha Jos 15.44 ; 2Ch 11.8 ; 14.8 ; certains modifient légèrement le texte et comprennent un héritier (autre sens de yoresh ) te sera-t-il donné ? –  Adoullam Gn 38.1 ; Jos 12.15 ; 15.35 ; Né 11.30 ; 2Ch 11.7 ; voir 1S 22.1 ; certains pensent qu''un état ancien du texte comportait une assonance avec ‘ad ‘olam, pour toujours , et conjecturent  : à Adoullam la gloire d''Israël est partie pour toujours  ; cf. 2S 7.16.'
  - type: text
    content: Je t'amènerai un nouveau conquérant,
  - type: text
    content: habitante de Marésha ;
  - type: text
    content: la gloire d'Israël s'en ira jusqu'à Adoullam.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Ce texte semble s''adresser à Jérusalem. –  tes fils chéris  : litt. les fils de tes délices  ; cf. 2.9. –  Elargis ta tonsure , en signe de deuil 2S 10.4s ; 2R 2.23s ; Es 3.24 ; 7.20 ; 15.2s ; 22.12 ; Jr 7.29 ; 16.6 ; 48.37 ; Am 8.10 ; Jb 1.20 ; voir aussi Jr 31.15.'
  - type: text
    content: Rase-toi, coupe ta chevelure,
  - type: text
    content: à cause de tes fils chéris !
  - type: text
    content: Elargis ta tonsure comme le vautour,
  - type: text
    content: car ils s'en vont en exil loin de toi !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez… 5.1 ; Dt 4.1+ ; Es 1.2 ; 34.1 ; Ps 49.2 ; cf. 1R 22.28. –  peuples / terre…  : cf. Gn 18.25 ; Ex 19.5 ; 2R 5.15 ; Es 6.3 ; Am 1.3ss ; 9.7 ; Ps 82.8 ; 96.13 ; 98.8s ; 99.1s. –  ce qui te remplit ou ce qui se trouve en toi  ; cf. Dt 33.16n  ; Ps 24.1n. –  contre vous  : autres traductions au milieu de vous ; entre vous . –  temple (ou palais ) sacré (ou saint ) : l''expression peut aussi désigner la demeure céleste de Dieu (v. 3) ; cf. Jon 2.5n,8 ; Ha 2.20 ; Ps 5.8 ; 11.4n.'
  - type: text
    content: Ecoutez, vous tous, peuples !
  - type: text
    content: Prête attention, terre, toi et ce qui te remplit !
  - type: text
    content: 'Que le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' soit témoin contre vous,'
  - type: text
    content: le Seigneur, depuis son temple sacré !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 20.18ss ; Ps 18.8ss. –  de son lieu  : cf. 1R 8.30 ; Es 26.21+. –  sur les hauteurs… Am 4.13+.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sort de son lieu,'
  - type: text
    content: il descend, il marche sur les hauteurs de la terre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Am 1.1+. –  les montagnes fondent Ps 97.5. –  comme la cire Ps 68.3. –  devant le feu Na 1.6.
  - type: text
    content: Sous lui les montagnes fondent,
  - type: text
    content: les vallées s'entrouvrent
  - type: text
    content: comme la cire devant le feu,
  - type: text
    content: comme l'eau qui dévale une pente.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'transgression ou révolte  ; même terme au v. 13 ; 3.8 ; 6.7 ; 7.18 ; Am 1.3n  ; 1R 12.19 ; 2R 1.1 ; 3.5,7 ; Jr 2.29 ; 3.13 ; 2Ch 10.19. –  des péchés  : LXX du péché . –  Israël = Jacob , ici le royaume du Nord dont la capitale était Samarie (v. 1n) ; cf. 3.1,8. –  Quelle / Quels  : litt. qui , sauf dans un ms de Qumrân qui porte quoi / quel  ; cf. Jg 13.17n. –  les hauts lieux  : LXX le péché.'
  - type: text
    content: Et tout cela à cause de la transgression de Jacob,
  - type: text
    content: à cause des péchés de la maison d'Israël !
  - type: text
    content: Quelle est la transgression de Jacob ?
  - type: text
    content: N'est-ce pas Samarie ?
  - type: text
    content: Quels sont les hauts lieux de Juda ?
  - type: text
    content: N'est-ce pas Jérusalem ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'monceau de pierres 3.12+ ; voir aussi Ez 13.14 ; Lc 19.44. –  dans les champs  : certains rattachent le mot correspondant à la suite et traduisent et (je ferai) de sa campagne (Jos 21.12 ; Ps 78.12 ; Né 11.30 ; 12.29,44 ; 2Ch 31.19) un plant de vigne . Cf. 2R 17.5s.'
  - type: text
    content: Je ferai de Samarie un monceau de pierres dans les champs
  - type: text
    content: pour y planter de la vigne ;
  - type: text
    content: je précipiterai ses pierres dans la vallée,
  - type: text
    content: je mettrai ses fondations à découvert,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'statues 5.12s. –  prostitution  : cf. Os 1.2n  ; voir Jr 2.20 ; Ez 16 ; 23 ; Ep 5.21ss ; ici il faut entendre que les gains de l''idolâtrie (peut-être en particulier ceux qui résultaient de la prostitution sacrée, Dt 23.18n) retourneront à l''idolâtrie, puisqu''ils seront pillés par des envahisseurs qui les utiliseront dans le cadre de leurs propres cultes ; cf. Os 2.7,14.'
  - type: text
    content: toutes ses statues seront mises en pièces,
  - type: text
    content: tous ses gains seront jetés au feu,
  - type: text
    content: 'et je démolirai toutes ses idoles :'
  - type: text
    content: recueillies avec le gain de la prostitution,
  - type: text
    content: elles redeviendront un gain de prostitution.
  - type: heading
    content: Lamentation sur les villes de Juda
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'je me lamenterai, je hurlerai  : cf. Jr 4.8 ; 8.18-23 ; Am 5.1. –  déchaussé (même terme en Jb 12.17,19, nu-pieds ) et nu  : cf. 2S 15.30 ; Es 20.2ss ; Jr 2.25. –  chacal / autruches Jb 30.29.'
  - type: text
    content: C'est pourquoi je me lamenterai, je hurlerai,
  - type: text
    content: je marcherai déchaussé et nu,
  - type: text
    content: je ferai entendre des lamentations comme le chacal
  - type: text
    content: et des gémissements comme les autruches.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'sa plaie (ou son coup, son fléau ) … , texte incertain : le nom est au pluriel, l''adjectif au singulier ; cf. Es 1.5ss ; 30.26 ; Na 3.19. –  elle atteint  : autre traduction il (c.-à-d. le Seigneur ) atteint  ; cf. v. 12.'
  - type: text
    content: Car sa plaie est incurable,
  - type: text
    content: elle s'étend jusqu'à Juda ;
  - type: text
    content: elle atteint la porte de mon peuple,
  - type: text
    content: jusqu'à Jérusalem.
