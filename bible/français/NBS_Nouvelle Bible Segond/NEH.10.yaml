    - type: text
      text: Car les Israélites et les lévites apporteront dans ces salles les prélèvements de blé, de vin et d'huile ; là sont les ustensiles du sanctuaire, et se tiennent les prêtres qui officient, les portiers et les chantres.
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ainsi, nous n'abandonnerons pas la maison de notre Dieu.
