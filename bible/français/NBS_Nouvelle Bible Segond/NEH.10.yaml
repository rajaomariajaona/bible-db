document_id: NEH.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le peuple s'engage à observer la loi
  - type: text
    content: ' '
  - type: note
    content: 'Vg fait de ce verset le dernier du chapitre précédent, d''où un décalage de la numérotation dans certaines éditions de la Bible. –  A cause de tout cela  : cf. 9.1ss ; 13.8ss. –  une convention  : le terme hébreu correspondant est apparenté au mot amen et à ceux qui sont traduits par loyauté, vérité ou probité, constance  ; cf. 11.23n. –  Sur le document…  : cf. v. 2n.'
  - type: text
    content: A cause de tout cela, nous concluons une convention que nous mettons par écrit. Sur le document scellé se trouvent les noms de nos princes, de nos lévites et de nos prêtres.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Lévites  : cf. 7.43 ; 9.4s ; 12.8s,24s ; 1Ch 6.23.'
  - type: text
    content: 'Lévites : Josué, fils d''Azania, Binnouï, des fils de Hénadad, Qadmiel, '
  '11':
  - type: note
    content: 'leurs frères  : LXX ses frères. –  Shebania ou Shekania, d''après certains mss hébreux, des mss de LXX et Syr (cf. v. 13). –  Pelaya, Hanân, sont omis par un ms de LXX.'
  - type: text
    content: 'et leurs frères Shebania, Hodiya, Qelita, Pelaya, Hanân, '
  '12':
  - type: note
    content: Omis par LXX.
  - type: text
    content: 'Michée, Rehob, Hashabia, '
  '13':
  - type: text
    content: 'Zakkour, Shérébia, Shebania, '
  '14':
  - type: text
    content: Hodiya, Bani, Beninou.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.11.
  - type: text
    content: 'Chefs du peuple : Paréosh, Pahath-Moab, Elam, Zattou, Bani, '
  '16':
  - type: text
    content: 'Bounni, Azgad, Bébaï, '
  '17':
  - type: text
    content: 'Adonias, Bigvaï, Adîn, '
  '18':
  - type: note
    content: Cf. 7.21.
  - type: text
    content: 'Ater, Ezéchias, Azzour, '
  '19':
  - type: text
    content: 'Hodiya, Hashoum, Betsaï, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Sur le document scellé se trouvent  : litt. sur le (document) scellé , d''après un ms, comme au v. 1 ; autre texte sur les (documents) scellés  ; certains, avec Vg, lisent les signataires (étaient) … –  Son Excellence… 8.9n  ; cf. 1.1n. –  Sédécias est peut-être le secrétaire (cf. Tsadoq , 13.13, les deux noms sont très proches en hébreu).'
  - type: text
    content: 'Sur le document scellé se trouvent : Son Excellence Néhémie, fils de Hakalia, Sédécias, '
  '20':
  - type: note
    content: Nébaï ou Nobaï, selon deux lectures traditionnelles.
  - type: text
    content: 'Hariph, Anatoth, Nébaï, '
  '21':
  - type: note
    content: Hézir 1Ch 24.15.
  - type: text
    content: 'Magpiash, Meshoullam, Hézir, '
  '22':
  - type: note
    content: 'Meshézabéel 3.4n. –  Yaddoua  : omis par LXX.'
  - type: text
    content: 'Meshézabéel, Tsadoq, Yaddoua, '
  '23':
  - type: text
    content: 'Pelatia, Hanân, Anaya, '
  '24':
  - type: note
    content: 'Hashoub  : cf. 1Ch 9.14.'
  - type: text
    content: 'Osée, Hanania, Hashoub, '
  '25':
  - type: text
    content: 'Lohesh, Pilha, Shobeq, '
  '26':
  - type: text
    content: 'Rehoum, Hashabna, Maaséya, '
  '27':
  - type: text
    content: 'Ahiya, Hanân, Anân, '
  '28':
  - type: text
    content: Mallouk, Harim, Baana.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Esd 7.7. –  les prêtres, les lévites  : autre traduction les prêtres-lévites  ; même possibilité au v. 35 ; 11.20 ; Esd 10.5 ; voir Dt 17.9n. –  Netinim 3.26+. –  séparés 9.2+. –  des peuples des pays , c.-à-d. des populations locales  ; cf. v. 31s ; 9.30 ; Esd 3.3n. – Voir loi. –  ceux qui sont capables…  : cf. 8.2s.'
  - type: text
    content: 'Le reste du peuple, les prêtres, les lévites, les portiers, les chantres, les Netinim et tous ceux qui se sont séparés des peuples des pays pour suivre la loi de Dieu, leurs femmes, leurs fils et leurs filles, tous ceux qui sont capables de comprendre '
  '3':
  - type: note
    content: Seraya 2R 25.18 ; Jr 52.24.
  - type: text
    content: 'Seraya, Azaria, Jérémie, '
  '30':
  - type: note
    content: 'princes 3.5n. –  par serment…  : litt. par une malédiction (ou une adjuration) et par un serment, c.-à-d. par un serment appelant la malédiction en cas de parjure, cf. Gn 24.41n  ; 26.28 ; Lv 5.1n  ; Nb 5.21nss ; Dt 29.11nss ; 1R 8.31 ; Dn 9.11 ; voir aussi Ps 119.106. –  à suivre… 1R 11.38 ; Ez 44.24. –  Moïse, serviteur de Dieu Ml 3.22 ; Ps 105.26.'
  - type: text
    content: 'se joignent à leurs frères, leurs princes. Ils s''engagent par serment, sous peine de malédiction, à suivre la loi de Dieu donnée par l''intermédiaire de Moïse, serviteur de Dieu, à observer et à mettre en pratique tous les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Seigneur, ses règles et ses prescriptions. '
  '31':
  - type: note
    content: 'Cf. 13.23ss ; Esd 9–10 ; voir aussi Ex 34.12ss ; Dt 7.3. –  Nous promettons  : sous-entendu dans le texte. –  gens des peuples du pays  : cf. Esd 3.3n.'
  - type: text
    content: 'Nous promettons de ne pas donner nos filles aux gens des peuples du pays et de ne pas prendre leurs filles pour nos fils ; '
  '32':
  - type: note
    content: 'sabbat…  : cf. 13.15ss ; Ex 20.8ss ; Dt 5.12ss ; Jr 17.21. –  les jours sacrés, c.-à-d. les (autres) jours de fête. –  d''accorder un répit  : le même terme est traduit par laisser tranquille en Ex 23.11. –  la septième année Ex 23.10s ; Lv 25.2ss. –  en n''exigeant…  : litt. et le prêt de toute main, cf. 5.1ss ; Dt 15.1ss.'
  - type: text
    content: 'de ne rien acheter, le jour du sabbat et les jours sacrés, aux gens des peuples du pays qui apporteraient le jour du sabbat des marchandises ou des denrées quelconques à vendre ; et d''accorder un répit la septième année, en n''exigeant le paiement d''aucune dette. '
  '33':
  - type: note
    content: 'Cf. 13.30 ; voir aussi Ex 30.13 ; 38.26 ; 2Ch 24.6 ; Mt 17.24,27. –  un tiers de sicle  : près de 4 g ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Nous nous sommes imposé aussi des commandements qui nous obligeaient à donner un tiers de sicle par année pour le service de la maison de notre Dieu, '
  '34':
  - type: note
    content: 'pains exposés Lv 24.5ss ; 2Ch 2.3 ; cf. Ex 25.30 ; 35.13 ; Nb 4.7 ; 1S 21.7 ; 1R 7.48. –  offrande végétale (cf. 13.5,9 ; Lv 2.1n) constante Lv 6.13 ; Nb 4.16. –  holocauste constant Ex 29.38ss ; Nb 28.3ss ; 1R 18.29,36 ; 2R 16.15 ; Dn 9.21 ; Esd 6.9 ; 7.17 ; 9.5. –  les sabbats…  : cf. Nb 28.9–29.39 ; voir aussi Os 2.13 ; 1Ch 23.31 ; 2Ch 8.13 ; 31.3. –  offrandes (ou choses) sacrées (ou consacrées) : cf. 2Ch 29.33 ; 35.13 ; voir saint. –  sacrifices pour le péché Lv 4.1+ss ; Nb 15.22ss. – Voir expiation. –  tout l''ouvrage…  : peut-être l''entretien de l''édifice proprement dit.'
  - type: text
    content: pour les pains exposés, pour l'offrande végétale constante, pour l'holocauste constant, les sabbats, les nouvelles lunes et les rencontres festives, pour les offrandes sacrées, pour les sacrifices pour le péché destinés à faire l'expiation sur Israël, et pour tout l'ouvrage de la maison de notre Dieu.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.31. –  tiré au sort 11.1 ; Lv 16.8n  ; Jon 1.7 ; 1Ch 6.39n  ; 24.31n  ; 26.13s. –  prêtres, lévites  : autre traduction prêtres-lévites  ; cf. v. 29n. –  en présent  : le terme hébreu correspondant ( qourbân , également 13.31) est très proche de celui de Lv 1.2n. –  aux dates fixées 13.31 ; Esd 10.14n. –  comme il est écrit…  : il n''y a pas dans le Pentateuque de texte traitant des offrandes de bois  ; voir cependant Lv 6.5s.'
  - type: text
    content: 'Nous avons tiré au sort, prêtres, lévites et peuple, au sujet du bois qu''on devait apporter en présent à la maison de notre Dieu, famille par famille, chaque année aux dates fixées, pour qu''il soit brûlé sur l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, comme il est écrit dans la loi. '
  '36':
  - type: note
    content: 'Nous avons promis sous-entendu dans le texte. –  premiers fruits  : cf. 13.31 ; Ex 23.19 ; 34.26 ; Lv 2.14n  ; voir aussi Nb 18.8-20 ; Dt 26.1ss ; Ez 44.30 ; 2Ch 31.5. –  de notre terre  : litt. de notre sol, cf. v. 38 ; Gn 2.5n.'
  - type: text
    content: 'Nous avons promis d''apporter chaque année à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' les premiers fruits de notre terre et les premiers fruits de tous les arbres ; '
  '37':
  - type: note
    content: Cf. 13.10ss ; Ex 13.1s,11ss ; 34.20 ; Nb 3.13 ; 8.17 ; 18.15ss.
  - type: text
    content: 'd''amener à la maison de notre Dieu, aux prêtres qui officient dans la maison de notre Dieu, les premiers-nés de nos fils et de nos bêtes, comme il est écrit dans la loi, les premiers-nés de notre gros bétail et de notre petit bétail ; '
  '38':
  - type: note
    content: 'dans les salles v. 39 ; 12.44 ; 13.4s. –  pâte  : LXX grain  ; cf. Lv 23.17 ; Nb 15.18ss ; 18.12 ; Dt 18.4 ; 26.1ss ; Ez 44.30. –  prélèvements v. 40 ; 12.44 ; 13.5 ; Ex 25.2n  ; Esd 8.25. –  vin  : autre traduction vin nouveau, cf. v. 40 ; Gn 27.28n. –  la dîme de notre terre (cf. v. 36) sera pour les lévites  : cf. 13.12 ; Lv 27.30 ; Nb 18.21ss ; cf. Esd 8.15. –  situées sur les terres que nous cultivons  : litt. de notre service ou de notre travail  ; on pourrait aussi comprendre de notre culte.'
  - type: text
    content: 'd''apporter aux prêtres, dans les salles de la maison de notre Dieu, les prémices de notre pâte et de nos prélèvements, des fruits de tous les arbres, du vin et de l''huile. Et la dîme de notre terre sera pour les lévites. Ce sont les lévites eux-mêmes qui la prendront dans toutes les villes situées sur les terres que nous cultivons. '
  '39':
  - type: note
    content: 'dîme de la dîme Nb 18.26. –  l''apporteront  : litt. la feront monter. –  du Trésor  : litt. de la maison du trésor  ; même expression en Ml 3.10 ; Dn 1.2.'
  - type: text
    content: 'Le prêtre, le fils d''Aaron, sera avec les lévites quand les lévites prendront la dîme de la dîme et l''apporteront à la maison de notre Dieu, dans les salles du Trésor. '
  '4':
  - type: text
    content: 'Pashhour, Amaria, Malkiya, '
  '40':
  - type: note
    content: vin v. 38n.
  - type: text
    content: Car les Israélites et les lévites apporteront dans ces salles les prélèvements de blé, de vin et d'huile ; là sont les ustensiles du sanctuaire, et se tiennent les prêtres qui officient, les portiers et les chantres.
  - type: text
    content: Ainsi, nous n'abandonnerons pas la maison de notre Dieu.
  '5':
  - type: text
    content: 'Hattoush, Shebania, Mallouk, '
  '6':
  - type: text
    content: 'Harim, Merémoth, Abdias, '
  '7':
  - type: note
    content: 'Daniel Esd 8.2. –  Guinnetôn  : cf. 12.4.'
  - type: text
    content: 'Daniel, Guinnetôn, Baruch, '
  '8':
  - type: text
    content: 'Meshoullam, Abiya, Miyamîn, '
  '9':
  - type: note
    content: 'prêtres  : cf. 7.39ss ; 12.1ss,12ss ; voir aussi 1Ch 24.7ss.'
  - type: text
    content: Maazia, Bilgaï, Shemaya, prêtres.
