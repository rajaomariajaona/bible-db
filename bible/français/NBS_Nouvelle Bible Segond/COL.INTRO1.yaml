type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'C''est dans la province romaine d''Asie (la Turquie d''aujourd''hui) que se trouve Colosses. Cette ville située sur les bords du Lycos, un peu à l''écart de la grand-route et à quelques kilomètres de Laodicée et de Hiérapolis, mentionnées en 4.13, ne brillait pas de la gloire de ses prestigieuses voisines. Paul n''est probablement jamais passé à Colosses. D''après le contenu de l''épître adressée aux chrétiens de Colosses, c''est à un Colossien d''origine, '
  - type: text
    content: Epaphras,
  - type: text
    content: ' que l''on doit la fondation de l''Eglise (1.7). L''épître sera portée par '
  - type: text
    content: Tychique,
  - type: text
    content: ' '
  - type: text
    content: le frère bien-aimé, le ministre digne de confiance du Seigneur
  - type: text
    content: ' (4.7), accompagné par '
  - type: text
    content: Onésime,
  - type: text
    content: ' l''esclave qui avait fui la maison de Philémon, lui-même membre de la communauté de Colosses.'
  - type: text
    content: Une épître différente
  - type: text
    content: 'Par rapport aux lettres antérieures de Paul, on voit s''opérer un net changement de '
  - type: text
    content: style
  - type: text
    content: ', au point qu''on a évoqué l''intervention, selon l''usage épistolaire antique, d''un secrétaire auquel l''apôtre aurait donné toute latitude quant à la formulation des idées. Les phrases deviennent plus longues, entrecoupées d''incises, chargées de compléments et de participes. Les synonymes s''accumulent (1.9,14). Quant au vocabulaire, on relève plus de cent mots nouveaux, absents des autres épîtres. De plus, certains termes atteignent ici à une dimension nouvelle : '
  - type: text
    content: tête / corps
  - type: text
    content: ' (1.18), '
  - type: text
    content: plénitude
  - type: text
    content: ' (2.9), '
  - type: text
    content: sagesse
  - type: text
    content: ' (1.9), '
  - type: text
    content: richesse
  - type: text
    content: ' (3.16), '
  - type: text
    content: connaissance
  - type: text
    content: ' (1.9,27), '
  - type: text
    content: mystère
  - type: text
    content: ' (1.27). Réapparaissent également des formules rares, telle '
  - type: text
    content: les éléments du monde
  - type: text
    content: ' (2.8 ; cf. Ga 4.3'
  - type: text
    content: n
  - type: text
    content: ). On ne peut d'ailleurs s'empêcher de remarquer que l'épître aux Colossiens présente de grandes similitudes avec l'épître aux Ephésiens (on a même identifié cette dernière à l'épître aux Laodicéens mentionnée en Col 4.16
  - type: text
    content: n
  - type: text
    content: '  ; voir Ep 1.1'
  - type: text
    content: n
  - type: text
    content: ' et l''introduction à Ephésiens). Les deux écrits ont en commun certains '
  - type: text
    content: thèmes théologiques
  - type: text
    content: '  : '
  - type: text
    content: le Christ est la tête du corps – qui est l'Eglise
  - type: text
    content: ' (comparer 1.18 et Ep 1.22) ; les chrétiens sont ressuscités avec le Christ (comparer 3.1 et Ep 2.6) ; ils siègent avec lui dans le ciel (comparer 3.3s et Ep 1.22 ; 4.4 ; 5.23-32).'
  - type: text
    content: 'L''épître fait par ailleurs peu allusion à l''Esprit saint et n''évoque par exemple ni la justification ni le jugement dernier, thèmes pourtant chers à Paul. D''où viennent ces particularités, tant stylistiques que théologiques ? Dans le cadre de la tradition, qui attribue l''épître à Paul, on peut supposer une évolution de l''apôtre, mûri par l''expérience du ministère et par la difficulté du moment – il écrirait cette lettre en captivité. Certains pensent que l''épître serait l''œuvre d''un disciple de Paul, soucieux de défendre l''héritage face à une situation nouvelle. Mais ce sont surtout les '
  - type: text
    content: circonstances
  - type: text
    content: ' qui commandent la nouveauté. Quand l''hérésie menace, il s''agit de sauvegarder l''Evangile.'
  - type: text
    content: Une communauté en danger
  - type: text
    content: 'Par Epaphras, le '
  - type: text
    content: bien-aimé compagnon de service
  - type: text
    content: ' (1.7), l''apôtre reçoit d''inquiétantes nouvelles. Certains, à Colosses, veulent associer à l''Evangile une sagesse prétendue supérieure, ramenant à des pratiques d''ascétisme populaires dans cette région de la Phrygie où résidait une importante colonie juive. Qu''il s''agisse de '
  - type: text
    content: culte des anges
  - type: text
    content: ' (2.18), de prescriptions alimentaires, de l''observation d''un calendrier rituel (2.16,21) ou de '
  - type: text
    content: rigueur pour le corps
  - type: text
    content: ' (2.23), on a affaire à une '
  - type: text
    content: spéculation religieuse
  - type: text
    content: ' (2.8'
  - type: text
    content: n
  - type: text
    content: ') fondée sur des '
  - type: text
    content: commandements
  - type: text
    content: ' et des '
  - type: text
    content: enseignements humains
  - type: text
    content: ' (2.22) et aboutissant à une doctrine de salut intégrée dans un système du monde. Entre Dieu et l''homme interviendrait toute une hiérarchie d''agents spirituels, '
  - type: text
    content: principats
  - type: text
    content: ' et '
  - type: text
    content: autorités
  - type: text
    content: ' (2.15) censés jouer un rôle dans le salut. Par toutes ces spéculations et ces pratiques ascétiques, on comptait atteindre une perfection et une sagesse supérieures à celles que pouvait engendrer la simple foi chrétienne.'
  - type: text
    content: L'origine de cette hérésie reste difficile à déterminer. S'agit-il d'un mouvement de pensée de type qumranien*, d'un culte céleste en provenance de l'Orient, d'un judaïsme gnosticisant (voir « La question gnostique », p.${Xgnose}) ou d'autre chose encore ? Les données fournies par le texte ne permettent guère de trancher.
  - type: text
    content: Un cantique pour plaidoirie
  - type: text
    content: 'On comprend la réaction véhémente de l''auteur. Il écrit non seulement en '
  - type: text
    content: maître
  - type: text
    content: ' soucieux de préserver l''intégrité de son enseignement, mais aussi en '
  - type: text
    content: pasteur
  - type: text
    content: ' préoccupé par la libération et l''épanouissement des chrétiens en danger d''égarement.'
  - type: text
    content: 'La défense passionnée de l''auteur s''appuie sur la dimension universelle de l''œuvre du Christ. Comme dans l''épître aux Philippiens (Ph 2.6-11), il insère dans son texte une '
  - type: text
    content: hymne
  - type: text
    content: . Celle-ci célèbre le Fils, image de Dieu, créateur du monde invisible et de l'univers, rédempteur des créatures et de la création, tête de l'Eglise (1.15-20).
  - type: text
    content: 'Il est possible que l''auteur ait remanié ici un texte liturgique rappelant les écrits de sagesse du judaïsme, qui aurait été utilisé lors de la célébration du baptême ou du repas de communion. Quoi qu''il en soit, ce cantique à la gloire de Jésus-Christ constitue le thème central de toute l''épître et reflète l''ensemble de sa théologie : '
  - type: text
    content: Il est la tête du corps – qui est l'Eglise. Il est le commencement, le premier-né d'entre les morts, afin d'être en tout le premier
  - type: text
    content: ' (1.18).'
  - type: text
    content: Exhortations pratiques
  - type: text
    content: A partir du chapitre 3, l'épître ressemble beaucoup à plusieurs autres lettres pauliniennes, même si c'est avec l'épître aux Ephésiens que les analogies sont les plus nettes. L'auteur y traite du comportement personnel (3.1-17), des relations au sein de la famille (3.18-21), du statut des maîtres et des esclaves (3.22–4.1) et de la vie communautaire (4.2-6). On notera l'importance donnée à la parole et à l'édification mutuelle, et la place éminente réservée à l'expression chantée de la prière, de la louange et de la foi (3.16).
  - type: text
    content: Actualité de l'épître
  - type: text
    content: 'L''actualité de l''épître aux Colossiens n''est pas à démontrer. L''offensive de multiples sectes, dont l''enseignement amoindrit toujours la personne et l''œuvre du Christ ; l''engouement de beaucoup pour la théosophie, le panthéisme ou la réincarnation ; la tentation des amalgames doctrinaux ; la faveur grandissante pour l''ésotérisme et l''occultisme qui flattent le goût du mystère et nourrissent une curiosité malsaine et angoissée pour les secrets de l''avenir : autant de tendances qui sont un défi pour le christianisme contemporain. L''approximation à laquelle nous devons nous tenir quant à la définition de l''hérésie colossienne fait ressortir, par contraste, la clarté de l''argumentation théologique de l''auteur. A la religion naturelle où l''homme veut se justifier par ses propres efforts, en tentant de pénétrer le mystère divin par l''ésotérisme, le ritualisme ou une morale légaliste, il oppose une théologie où le'
  - type: text
    content: Christ
  - type: text
    content: ' est prééminent. C''est lui qui est l''unique rédempteur, incarné, ressuscité, élevé, vainqueur des puissances hostiles, tête de l''Eglise et suprême espérance des croyants. Et surtout, le présent de la foi se conjugue paradoxalement au passé, en se fondant sur l''événement définitivement accompli. Le règne de Dieu n''est pas seulement à venir. Il est '
  - type: text
    content: déjà
  - type: text
    content: ' là : '
  - type: text
    content: Il nous a délivrés de l'autorité des ténèbres pour nous transporter dans le royaume de son Fils bien-aimé
  - type: text
    content: ' (1.13). Enseveli avec le Christ par le baptême, le croyant est '
  - type: text
    content: déjà
  - type: text
    content: ' ressuscité d''entre les morts (2.12).'
  - type: text
    content: 'Reste alors, pour le chrétien, à vivre de cette résurrection. '
  - type: text
    content: Si donc vous vous êtes réveillés avec le Christ, cherchez les choses d'en haut, où le Christ est assis à la droite de Dieu. Pensez à ce qui est en haut, et non pas à ce qui est sur la terre
  - type: text
    content: ' (3.1s).'
