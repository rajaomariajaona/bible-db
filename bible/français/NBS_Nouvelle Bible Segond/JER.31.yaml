document_id: JER.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Réinstallation d'Israël dans son pays
  - type: text
    content: ' '
  - type: note
    content: je serai le Dieu… 7.23+ ; 31.33. –  clans 1.15n  ; cf. Ap 21.3.
  - type: text
    content: 'En ce temps-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – je serai le Dieu de tous les clans d''Israël, et eux, ils seront mon peuple. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: îles lointaines 2.10n  ; cf. Es 49.1. –  Celui qui a disséminé… 4.11n  ; 15.7n. –  rassemblera (23.3)… comme un berger Es 40.11 ; Ez 34.12s ; Ps 23.
  - type: text
    content: 'Nations, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et proclamez-la dans les îles lointaines !
  - type: text
    content: 'Dites : Celui qui a disséminé Israël le rassemblera'
  - type: text
    content: et il le gardera comme un berger son troupeau.
  '11':
  - type: text
    content: ' '
  - type: note
    content: libère / reprend ou rédime, assure la rédemption de  ; cf. Ex 6.6+ ; Es 35.9n  ; 41.14 ; 51.10s. –  un plus fort Es 49.25 ; Ps 35.10 ; Jb 5.15 ; cf. Mc 3.27/ /.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' libère Jacob,'
  - type: text
    content: il le reprend à un plus fort que lui.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'sur la hauteur de Sion  : cf. Es 2.2 ; Ez 20.40. –  les biens (ou la bonté ) du Seigneur  : cf. 29.32 ; Os 3.5 ; Ps 65.12. –  vin  : autre traduction vin nouveau , cf. Gn 27.28n. –  leur vie ou leur être , en hébreu leur néphesh  ; cf. 2.24n. –  comme un jardin abreuvé Es 58.11.'
  - type: text
    content: Ils viendront et pousseront des cris de joie sur la hauteur de Sion ;
  - type: text
    content: 'ils afflueront vers les biens du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: le blé, le vin, l'huile,
  - type: text
    content: le petit bétail et le gros bétail ;
  - type: text
    content: leur vie sera comme un jardin abreuvé,
  - type: text
    content: et ils ne dépériront plus.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 148.12. –  la jeune fille  : litt. la vierge , même terme aux v. 4,21. –  se réjouiront  : dans le texte hébreu traditionnel le verbe est sous-entendu ; LXX a lu seront heureux , ce qui correspondrait en hébreu à une autre vocalisation du mot traduit par ensemble (cf. comme v. 8,24). –  je changerai leur deuil… Es 35.10 ; 61.3 ; Ps 30.12 ; 126.5.'
  - type: text
    content: Alors la jeune fille se réjouira dans la danse,
  - type: text
    content: jeunes gens et vieillards se réjouiront ensemble ;
  - type: text
    content: je changerai leur deuil en gaieté
  - type: text
    content: et je les consolerai ;
  - type: text
    content: je les réjouirai après leurs tourments.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Je gorgerai…  : litt. j''abreuverai (v. 12,25) de graisse le gosier (ou l''appétit  ; cf. Gn 1.20n  ; Pr 6.30n) des prêtres  ; cf. 31.25 ; Ps 36.9. –  de graisse ou de viandes grasses  ; la graisse était considérée comme la meilleure part (Lv 3.3n).'
  - type: text
    content: Je gorgerai les prêtres de graisse,
  - type: text
    content: et mon peuple sera rassasié de mes biens
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Il y a de l'espérance pour ton avenir
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 2.18. –  Rama en Benjamin (Jos 18.25 ; Jg 4.5), à quelques kilomètres au nord de Jérusalem, première étape sur la route de l''exil (40.1ss) ; au lieu de à Rama certains comprennent sur la hauteur , selon le sens du nom ; cf. 3.21 ; 9.9 ; 22.20 ; Jg 11.37s ; 1S 22.6n. –  Rachel , mère de Benjamin (1.1n  ; 6.1 ; cf. 1S 10.2) et grand-mère, par Joseph, d''Ephraïm (v. 9,18,20) et de Manassé (cf. 1.1n  ; Gn 30.23s ; 35.15-18 ; 41.51s). –  ils ne sont plus  : litt. il n''est plus , ce qui signifie peut-être il n''y en a plus un seul.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: On entend des cris à Rama,
  - type: text
    content: des sanglots amers ;
  - type: text
    content: c'est Rachel qui pleure ses fils ;
  - type: text
    content: elle refuse de se laisser consoler au sujet de ses fils,
  - type: text
    content: car ils ne sont plus.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cesse…  : litt. retiens ta voix des sanglots et tes yeux des larmes  : cf. Ap 7.17 ; 21.4. –  une récompense 2Ch 15.7 ; cf. Ap 14.13.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Cesse de sangloter,
  - type: text
    content: sèche tes larmes ;
  - type: text
    content: car il y aura une récompense pour tes actions
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: ils reviendront du pays de l'ennemi.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 29.11.
  - type: text
    content: Il y a de l'espoir pour ton avenir
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: tes fils reviendront dans leur territoire.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Ephraïm v. 9+. –  qui se plaint 3.21 ; 15.5n. –  j''ai été corrigé  : cf. 5.3+ ; 10.24n. –  ramène-moi…  : cf. 15.19+ ; 17.14 ; Ps 80.4 ; Lm 5.21.'
  - type: text
    content: 'J''entends Ephraïm qui se plaint :'
  - type: text
    content: Tu m'as corrigé, et j'ai été corrigé,
  - type: text
    content: comme un taurillon qui n'est pas dressé ;
  - type: text
    content: ramène-moi, et je reviendrai,
  - type: text
    content: 'car tu es le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), mon Dieu.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Après m''être détourné  : on pourrait aussi comprendre après être revenu  ; LXX après ma captivité . –  j''ai eu du regret  : autre traduction j''ai été consolé ; j''ai été satisfait ; j''ai eu pitié ; j''ai changé d''avis . –  avoir été connu  : autre traduction m''être connu moi-même  ; certains modifient la vocalisation traditionnelle du texte hébreu pour lire après avoir été informé . –  de dégoût (sous-entendu dans le texte) je me frappe la cuisse Ez 21.17. –  le déshonneur de ma jeunesse 22.21s ; 32.30.'
  - type: text
    content: Après m'être détourné, j'ai eu du regret ;
  - type: text
    content: et après avoir été connu,
  - type: text
    content: de dégoût je me frappe la cuisse,
  - type: text
    content: je suis honteux et confus,
  - type: text
    content: car je porte le déshonneur de ma jeunesse.
  '2':
  - type: note
    content: 'Il a trouvé grâce ou faveur (Pr 12.2) : LXX j''ai trouvé (le peuple ?) chaud dans le désert  ; certains modifient le texte hébreu traditionnel pour lire il l''a trouvé campé dans le désert  ; cf. Dt 32.10 ; Os 2.16. –  Israël marche  : en modifiant les voyelles de la lecture traditionnelle on pourrait aussi comprendre  : Il (Dieu) a conduit Israël  ; sur l''ensemble cf. 2.6s. –  la tranquillité  : litt. sa tranquillité ou son repos  ; cf. 50.34.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Il a trouvé grâce dans le désert,
  - type: text
    content: le peuple qui a survécu à l'épée ;
  - type: text
    content: Israël marche vers la tranquillité.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 3,9 ; Es 49.15 ; 63.9 ; Os 11.8s ; Lm 3.32 ; Mt 3.17/ / ; Lc 15.11-32. –  je parle de lui  : autre traduction je parle contre lui . –  son souvenir est vivace en moi ou je dois faire mention de lui , comme en 20.9.'
  - type: text
    content: – Ephraïm est-il donc pour moi un fils chéri,
  - type: text
    content: un enfant choyé ?
  - type: text
    content: Plus je parle de lui,
  - type: text
    content: plus son souvenir est vivace en moi ;
  - type: text
    content: c'est pourquoi mes entrailles frémissent pour lui.
  - type: text
    content: Oui, j'ai compassion de lui
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Reviens, Israël !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'prends garde  : litt. mets ton cœur . –  que tu suis  : une autre lecture traditionnelle pourrait signifier que je suis . –  Israël jolie v. 4n.'
  - type: text
    content: Dresse tes signaux, place tes poteaux,
  - type: text
    content: prends garde à la route,
  - type: text
    content: à la voie que tu suis…
  - type: text
    content: Reviens, Israël jolie,
  - type: text
    content: reviens dans ces villes qui sont à toi !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'errante  : le terme hébreu a peut-être une connotation de stupidité ; cf. 4.22. –  crée une chose nouvelle  : cf. Es 41.20 ; 43.19 ; 48.6s ; 2Co 5.17. –  sur la terre ou dans le pays . –  La femme…  : litt. une femelle entoure (ou assiège , peut-être au sens de circonvient ) un homme . Certains comprennent que désormais c''est la jeune Israël qui fera la cour à son Dieu, c.-à-d. qui le recherchera avec ferveur ; cf. 30.6 ; Dt 32.10.'
  - type: text
    content: Jusqu'à quand seras-tu errante,
  - type: text
    content: fille rebelle ?
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' crée une chose nouvelle sur la terre.'
  - type: text
    content: La femme recherche l'homme !
  - type: heading
    content: Rétablissement de Juda
  '23':
  - type: text
    content: ' '
  - type: note
    content: rétabli leur situation 29.14n. –  domaine de la justice ou juste domaine 50.7 ; cf. 10.25n  ; Ex 15.13. –  montagne de la sainteté ou montagne sacrée, montagne du sanctuaire  ; cf. Es 2.2+ ; Ez 20.40+ ; Ps 2.6+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Voici encore ce que l''on dira au pays de Juda et dans ses villes, quand j''aurai rétabli leur situation : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te bénisse, domaine de la justice, montagne de la sainteté ! '
  '24':
  - type: note
    content: 'Là s''établiront…  : certains comprennent ils s''y établiront, dans Juda et dans toutes ses villes… –  les laboureurs (14.4) comme ceux…  : sans doute les plus pauvres, sédentaires ou nomades.'
  - type: text
    content: 'Là s''établiront Juda et toutes ses villes, les laboureurs comme ceux qui transhument le troupeau. '
  '25':
  - type: note
    content: 'Cf. Es 28.12 ; 40.30s ; Ps 36.9 ; 107.9 ; Mt 11.28 ; Jn 4.14s. –  celui qui est épuisé / tous ceux qui dépérissent  : litt. l''être épuisé / tout être dépérissant, cf. v. 12n.'
  - type: text
    content: 'Car j''abreuve celui qui est épuisé, et je rassasie tous ceux qui dépérissent. '
  '26':
  - type: note
    content: 'j''ai ouvert les yeux  : litt. j''ai regardé  ; cf. Za 41s.'
  - type: text
    content: – Là-dessus je me suis réveillé et j'ai ouvert les yeux ; mon sommeil m'avait été bien doux !
  - type: heading
    content: Dieu vigilant pour bâtir et pour planter
  '27':
  - type: text
    content: ' '
  - type: note
    content: Cf. 30.19 ; Ez 36.11,37s ; Os 2.25.
  - type: text
    content: 'Les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où j''ensemencerai la maison d''Israël et la maison de Juda d''une semence d''humains et d''une semence de bêtes. '
  '28':
  - type: note
    content: j'ai veillé 1.11n-12n. –  pour déraciner… 1.10+ ; cf. 32.42.
  - type: text
    content: 'Et comme j''ai veillé sur eux pour déraciner, pour démolir, pour raser, pour faire disparaître et pour mettre à mal, ainsi je veillerai sur eux pour bâtir et pour planter – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '29':
  - type: note
    content: Cf. Ez 18.2s ; voir aussi Ex 20.5 ; 34.7.
  - type: text
    content: 'En ces jours-là, on ne dira plus :'
  - type: text
    content: « Les pères ont mangé des raisins verts,
  - type: text
    content: et ce sont les fils qui ont mal aux dents. »
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'De loin…  : on pourrait aussi comprendre autrefois le Seigneur s''est montré… –  m''est apparu  : LXX lui est apparu . –  amour / fidélité (ou bienveillance, attachement ) : cf. 2.2n  ; 33.11 ; Dt 4.37+ ; Es 43.4 ; Ml 1.2. –  éternel ou perpétuel . –  je te conserve ma fidélité Ps 36.11 ; 109.12 ; certains comprennent je t''ai attirée par la fidélité  ; cf. Os 11.4.'
  - type: text
    content: '– De loin le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''est apparu :'
  - type: text
    content: Je t'aime d'un amour éternel ;
  - type: text
    content: c'est pourquoi je te conserve ma fidélité.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'pour  : autres traductions dans ; par ; à cause de  ; cf. 32.18 ; voir aussi Dt 24.16 ; 2R 14.6 ; Ez 3.18n  ; 18.4,20.'
  - type: text
    content: 'Chacun mourra pour sa propre faute : tout homme qui mange des raisins verts, c''est lui-même qui aura mal aux dents.'
  - type: heading
    content: La nouvelle alliance
  '31':
  - type: text
    content: ' '
  - type: note
    content: Hé 8.8-13 ; 10.16s. –  une alliance (cf. Es 55.3 ; Os 2.20) nouvelle v. 22 ; Es 42.9 ; Lc 22.20 ; 1Co 11.25 ; 2Co 3.6 ; Hé 9.15.
  - type: text
    content: 'Les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où je conclurai avec la maison d''Israël et la maison de Juda une alliance nouvelle, '
  '32':
  - type: note
    content: rompue 11.10+ ; cf. Dt 29.24. –  leur maître ou leur époux, leur mari, selon les sens possibles de l'hébreu ba`al  ; cf. 3.14n.
  - type: text
    content: 'non pas comme l''alliance que j''ai conclue avec leurs pères, le jour où je les ai saisis par la main pour les faire sortir d''Egypte, alliance qu''ils ont rompue, bien que je sois leur maître – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '33':
  - type: note
    content: 'Voir loi. –  je l''écrirai sur leur cœur  : cf. 17.1+ ; Dt 5.22 ; 6.6 ; Rm 2.15 ; 2Co 3.3 ; voir aussi Es 51.7 ; Rm 8.2 ; 1Jn 3.9. –  je serai leur Dieu… 7.23+ ; cf. 31.1 ; Za 13.9.'
  - type: text
    content: 'Mais voici l''alliance que je conclurai avec la maison d''Israël, après ces jours-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je mettrai ma loi au dedans d''eux, je l''écrirai sur leur cœur ; je serai leur Dieu, et eux, ils seront mon peuple. '
  '34':
  - type: note
    content: 'n''instruira plus  : cf. Mt 23.8 ; 1Jn 2.20,27. –  tous me connaîtront  : cf. 9.23+ ; 24.7 ; Es 11.9 ; 54.13 ; Lc 1.77 ; Jn 6.45. –  depuis le plus petit…  : cf. 5.4s ; 6.11,13. –  Je pardonnerai… 50.20 ; 1R 8.50 ; Es 43.25 ; Rm 11.27. – Voir péché.'
  - type: text
    content: 'Celui-ci n''instruira plus son prochain, ni celui-là son frère, en disant : « Connaissez le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! » Car tous me connaîtront, depuis le plus petit d''entre eux jusqu''au plus grand – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: . Je pardonnerai leur faute, je ne me souviendrai plus de leur péché.
  - type: heading
    content: Ordre de la nature et fidélité de Dieu
  '35':
  - type: text
    content: ' '
  - type: note
    content: Dans LXX les v. 35-37 se présentent dans un ordre différent (v. 36,37,35). – Cf. Gn 1.16 ; Am 5.8 ; Ps 136.7-9 ; 148.2-6. –  les prescriptions ou les lois , même mot au v. 36 et en 33.25 (le terme est absent de LXX) ; certains comprennent les phases de la lune… –  qui agite la mer… Es 51.15n  ; Jb 26.12n. –  dont le nom… 10.16+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: celui qui donne le soleil pour éclairer le jour,
  - type: text
    content: les prescriptions de la lune et des étoiles pour éclairer la nuit,
  - type: text
    content: celui qui agite la mer et fait gronder ses flots,
  - type: text
    content: 'lui dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 33.25s. –  pour toujours  : litt. tous les jours.'
  - type: text
    content: Si ces prescriptions venaient à cesser devant moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: la descendance d'Israël aussi cesserait
  - type: text
    content: pour toujours d'être une nation devant moi.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 40.12-16 ; Pr 30.4. –  toute la descendance  : LXX la descendance  ; cf. Rm 11.2.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Si le ciel, en haut, pouvait être mesuré,
  - type: text
    content: si les fondations de la terre, en bas, pouvaient être sondées,
  - type: text
    content: alors je rejetterais toute la descendance d'Israël,
  - type: text
    content: à cause de tout ce qu'ils ont fait
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: La nouvelle Jérusalem
  '38':
  - type: text
    content: ' '
  - type: note
    content: Cf. Za 14.9s. –  tour de Hananéel , probablement sur l'enceinte de Jérusalem, au nord Né 3.1 ; 12.39. –  porte de l'Angle , à l'ouest ou au nord-ouest 2R 14.13 ; 2Ch 25.23 ; 26.9.
  - type: text
    content: 'Les jours viennent – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – où la ville sera rebâtie pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', depuis la tour de Hananéel jusqu''à la porte de l''Angle. '
  '39':
  - type: note
    content: Gareb et Goath, lieux non identifiés.
  - type: text
    content: 'Le cordeau d''arpentage se tendra encore en ligne droite jusqu''à la colline de Gareb, puis tournera vers Goath. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Je te rebâtirai…  : cf. v. 18 ; voir aussi 1.10+ ; 12.16n  ; 30.18s ; Gn 2.22n. –  Israël jolie  : litt. vierge d''Israël  ; cf. v. 21 ; 14.17+ ; 18.13. –  tambourins Ex 15.20 ; Jg 11.34 ; 1S 18.6 ; Ez 28.13n  ; Ps 149.3. –  des danses et des rires  : litt. de la danse de ceux qui s''amusent  ; autre traduction des danses et de la musique  ; cf. 30.19.'
  - type: text
    content: Je te rebâtirai, et tu seras rebâtie,
  - type: text
    content: Israël jolie !
  - type: text
    content: Tu auras encore tes tambourins pour parure
  - type: text
    content: et tu sortiras au milieu des danses et des rires.
  '40':
  - type: note
    content: 'la vallée des cadavres  : cf. 2.23n  ; 7.31ns. –  cendres grasses  : comme en Lv 1.16 ; cf. 1R 13.3n. –  les terrasses  : traduction incertaine ; cf. l''emploi du même mot (selon l''une des lectures traditionnelles) en Dt 32.32 (terroir) ; 2R 23.4 (terrains, dans un contexte comparable) ; Es 16.8 (campagnes). –  l''oued Cédron, à l''est de Jérusalem. –  porte des Chevaux  : cf. 2R 11.16 ; Né 3.28. –  consacrées au Seigneur  : cf. Ez 45.1 ; Jl 4.17 ; Za 14.20s ; voir saint. –  déraciné / rasé  : cf. 1.10+ ; 12.14-17 ; 18.7,14 ; Am 9.15.'
  - type: text
    content: 'Toute la vallée des cadavres et des cendres grasses, et toutes les terrasses jusqu''à l''oued Cédron, jusqu''à l''angle de la porte des Chevaux, à l''est, seront consacrées au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; rien n''y sera jamais plus déraciné ni rasé.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Tu planteras 1.10+ ; cf. Dt 28.30 ; Es 65.21s ; Am 5.11 ; 9.13. – Voir Samaritains.
  - type: text
    content: Tu planteras encore des vignes
  - type: text
    content: dans les montagnes de Samarie ;
  - type: text
    content: les planteurs profiteront de ce qu'ils ont planté.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.15s ; 50.4s ; Es 2.2s ; 27.13 ; Ps 122.1. –  Montons  : litt. levez-vous, montons.'
  - type: text
    content: Car il est un jour
  - type: text
    content: 'où les gardes crient dans la région montagneuse d''Ephraïm :'
  - type: text
    content: Montons à Sion
  - type: text
    content: 'vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu !'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'en tête des nations  : autres traductions pour le chef des nations, pour la première des nations  ; cf. Am 6.1n (terme apparenté). –  Seigneur, sauve  : cf. Ps 28.9 ; Mt 21.9n/ / ; LXX le Seigneur a sauvé son peuple . –  le reste d''Israël 11.23+.'
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Poussez des cris de joie pour Jacob,
  - type: text
    content: éclatez d'allégresse en tête des nations !
  - type: text
    content: 'Faites-vous entendre, louez, dites :'
  - type: text
    content: Seigneur
  - type: text
    content: ', sauve ton peuple,'
  - type: text
    content: le reste d'Israël !
  '8':
  - type: text
    content: ' '
  - type: note
    content: Je les ramène 23.3+. –  du pays du nord 1.14n  ; 3.18. –  aveugle / boiteux 2S 5.6,8 ; Es 35.5s ; Mi 4.6s ; So 3.19. –  la femme enceinte… 4.31+.
  - type: text
    content: – Je les ramène du pays du nord,
  - type: text
    content: je les rassemble des confins de la terre ;
  - type: text
    content: parmi eux sont l'aveugle et le boiteux,
  - type: text
    content: la femme enceinte comme la femme en travail ;
  - type: text
    content: c'est une grande assemblée qui revient ici.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ils arrivent (LXX ils étaient partis ) en pleurant  ; cf. 50.4s ; Ps 126.1-6. –  leurs supplications  : cf. 3.21 ; LXX la consolation (cf. 16.7). –  vers des cours d''eau  : le terme traduit ici par cours d''eau est traduit par oued au v. 40 ; cf. Dt 8.7 ; 10.7 ; voir aussi Es 49.10. –  un chemin tout droit ou tout plat Ps 107.7. –  je suis un Père…  : cf. Ex 4.22 ; Dt 32.6 ; Os 11.1-3 ; 2Co 6.18. –  Ephraïm 7.15n  ; 31.18,20 ; voir aussi 1Ch 5.1s (Joseph est le père d''Ephraïm).'
  - type: text
    content: Ils arrivent en pleurant,
  - type: text
    content: et je les conduis dans leurs supplications ;
  - type: text
    content: je les mène vers des cours d'eau,
  - type: text
    content: par un chemin tout droit où ils ne peuvent trébucher ;
  - type: text
    content: car je suis un Père pour Israël,
  - type: text
    content: et Ephraïm est mon premier-né.
  - type: heading
    content: Le deuil changé en gaieté
