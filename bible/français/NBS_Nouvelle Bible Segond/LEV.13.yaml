document_id: LEV.13,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Maladies de la peau chez l'homme
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse et à Aaron : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un bourgeonnement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une vivification '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(mot apparenté aux termes traduits par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vive '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre l''examinera : s''il y a sur la peau une tumeur blanche, si cette tumeur a fait blanchir le poil, et qu''il y ait un bourgeonnement de chair vive dans la tumeur, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'c''est une « lèpre » invétérée dans sa peau ; le prêtre le déclarera impur ; il ne l''isolera pas : il est impur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si la « lèpre » fait une éruption sur la peau et que le mal couvre toute la peau, depuis la tête jusqu''aux pieds, partout où le prêtre regarde, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout le corps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toute sa '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'le prêtre l''examinera : si la « lèpre » couvre tout le corps, il déclarera pur le mal : comme il est devenu entièrement blanc, il est pur. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais le jour où l''on apercevra en lui de la chair vive, il sera impur ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'quand le prêtre aura vu la chair vive, il le déclarera impur : la chair vive est impure, c''est la « lèpre ». '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si la chair vive change et redevient blanche, il ira vers le prêtre. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre l''examinera ; si la lésion est redevenue blanche, le prêtre déclarera pur le mal : il est pur. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ulcère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 9.9-11 ; Dt 28.27 ; 2R 20.7 ; Jb 2.7.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque quelqu''un a eu sur la peau un ulcère qui s''est guéri, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'et qu''il apparaît, à la place où était l''ulcère, une tumeur blanche ou une tache luisante d''un blanc rougeâtre, il se montrera au prêtre. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la peau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans la peau de sa chair '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(deux fois dans l''hébreu), de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tache luisante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu ainsi traduit n''apparaît que dans ce passage (v. 4,19,23ss,38s ; 14.56). – Dans ce chap. et le suivant, les mots '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cas, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lésion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 3), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 4 ; 14.48), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tache '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 47ss ; 14.34ss) traduisent un même terme hébreu, proprement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coup
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', souvent rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fléau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 44
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss ; 14.3 ; Gn 12.17 ; Ex 11.1 etc.). – Le terme traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lèpre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ne désigne pas seulement la maladie aujourd'hui connue sous ce nom, puisqu'il s'applique aussi à des taches (moisissures ?) qui peuvent apparaître sur des étoffes et des murs (v. 47-59 ; 14.33-53). Sans doute englobait-il diverses affections de la peau (cf. Nb 12.10 ; Dt 24.8s ; 2R 5.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ps 38 ; Mt 8.2+). – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque quelqu''un a sur la peau une tumeur, une dartre ou une tache luisante qui devient un cas de « lèpre », on l''amènera à Aaron, le prêtre, ou à l''un de ses fils. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre l''examinera : si la tache paraît plus enfoncée que la peau, et que le poil soit devenu blanc, le prêtre le déclarera impur ; c''est un cas de « lèpre » qui a fait éruption dans l''ulcère. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache, qu''elle n''est pas plus enfoncée que la peau, et qu''elle est devenue pâle, il l''isolera pendant sept jours. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est un cas de « lèpre »
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lèpre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étant ici sous-entendu, on pourrait comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'c''est le fléau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu en fin de v. la même formule qu''au v. 20, de même au v. 27.'
      marker-yv: yv-n
    - type: text
      text: 'Si la tache s''est étendue sur la peau, le prêtre le déclarera impur : c''est un cas de « lèpre ». '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si la tache luisante s''est stabilisée, si elle ne s''est pas étendue, c''est la cicatrice de l''ulcère : le prêtre le déclarera pur.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque quelqu''un a eu sur la peau une brûlure par le feu, que le bourgeonnement de la brûlure forme une tache luisante blanche ou d''un blanc rougeâtre, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le prêtre l''examinera : si le poil est devenu blanc dans la tache luisante, et que celle-ci paraisse plus profonde que la peau, c''est la « lèpre » qui a fait éruption dans la brûlure ; le prêtre le déclarera impur : c''est un cas de « lèpre ». '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache luisante, qu''elle n''est pas plus enfoncée que la peau et qu''elle est devenue pâle, le prêtre l''isolera pendant sept jours. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre l''examinera le septième jour. Si la tache s''est étendue sur la peau, le prêtre le déclarera impur : c''est un cas de « lèpre ». '
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si la tache luisante s''est stabilisée, si elle ne s''est pas étendue sur la peau, et si elle est devenue pâle, c''est la tumeur de la brûlure ; le prêtre le déclarera pur : c''est la cicatrice de la brûlure.'
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au menton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans la barbe.
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''un homme ou une femme a une lésion à la tête ou au menton, '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: examinera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'regardera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: verra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite ; cf. v. 56. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: impur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre examinera la lésion qui est sur la peau. Si le poil y est devenu blanc, et que la lésion paraisse plus profonde que la peau, c''est un cas de « lèpre » : le prêtre l''examinera et le déclarera impur. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le prêtre examinera la lésion. Si elle paraît plus profonde que la peau, et qu''il y ait du poil jaunâtre et mince, le prêtre le déclarera impur : c''est la teigne, c''est la « lèpre » de la tête ou du menton. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si le prêtre voit que la lésion de la teigne ne paraît pas plus profonde que la peau, et qu''il n''y a pas de poil noir, le prêtre isolera le cas de teigne pendant sept jours. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre examinera la lésion le septième jour. Si la teigne ne s''est pas étendue, s''il n''y a pas de poil jaunâtre, et si elle ne paraît pas plus profonde que la peau, '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'isolera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'isolera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enfermera la teigne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'il se rasera, mais il ne rasera pas l''endroit où est la teigne ; le prêtre l''isolera une seconde fois pendant sept jours. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre examinera la teigne le septième jour. Si la teigne ne s''est pas étendue sur la peau, et si elle ne paraît pas plus profonde que la peau, le prêtre le déclarera pur ; il lavera ses vêtements, et il sera pur. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si la teigne s''étend sur la peau après qu''il a été déclaré pur, '
  '36':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le prêtre l''examinera ; si la teigne s''est étendue sur la peau, le prêtre n''aura pas à rechercher s''il y a du poil jaunâtre : il est impur. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si la teigne lui paraît stabilisée, et qu''il y ait poussé du poil noir, la teigne est guérie : il est pur, le prêtre le déclarera pur.'
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''un homme ou une femme a sur la peau des taches luisantes, des taches blanches, '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des boutons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu n''apparaît qu''ici dans l''A.T., et sa traduction précise est incertaine ; il désigne en tout cas une éruption bénigne.'
      marker-yv: yv-n
    - type: text
      text: 'le prêtre l''examinera : s''il y a sur la peau des taches luisantes d''un blanc pâle, ce sont des boutons qui ont fait éruption sur la peau : il est pur.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: isolera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe ainsi traduit, ici et dans la suite, est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fermer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 14.38ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la lésion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; de même aux v. 12s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept jours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.38 ; Nb 12.14s.
      marker-yv: yv-n
    - type: text
      text: 'S''il y a sur la peau une tache luisante blanche qui ne paraît pas plus profonde que la peau, et que le poil ne soit pas devenu blanc, le prêtre isolera le mal pendant sept jours. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''un homme perd ses cheveux, c''est un chauve : il est pur. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.41 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chauve du front
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''hébreu désigne par deux mots différents la calvitie frontale et celle du sommet du crâne (cf. v. 55'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'S''il perd ses cheveux sur le devant, c''est un chauve du front : il est pur. '
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais s''il y a dans la partie chauve de derrière ou de devant une lésion d''un blanc rougeâtre, c''est la « lèpre » qui a fait éruption dans la partie chauve de derrière ou de devant. '
  '43':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.43 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si le mal est une tumeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si le mal présente une tumeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si la tumeur du mal (est)… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 13.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre l''examinera : si le mal est une tumeur d''un blanc rougeâtre dans la partie chauve de derrière ou de devant, du même aspect que la « lèpre » de la peau, '
  '44':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.44 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un cas de « lèpre » '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le fléau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le mot rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '« lèpre » '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: étant ici sous-entendu, cf. v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',45s.'
      marker-yv: yv-n
    - type: text
      text: 'c''est un « lépreux », il est impur : le prêtre le déclarera impur ; c''est un cas de « lèpre » à la tête.'
  '45':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.45 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le fléau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), même possibilité au v. 46. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les vêtements déchirés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : signes traditionnels de deuil, de tristesse, de pénitence ou d''extrême affliction (10.6+ ; Ez 24.17).'
      marker-yv: yv-n
    - type: text
      text: 'Le « lépreux » atteint par le mal aura les vêtements déchirés et les cheveux défaits ; il se couvrira la moustache et criera : Impur ! Impur ! '
  '46':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.46 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 14.3 ; Nb 5.2 ; 2R 15.5 ; Jb 2.7s ; Lc 17.12.
      marker-yv: yv-n
    - type: text
      text: Aussi longtemps que le mal sera sur lui, il sera impur. Etant impur, il habitera seul ; son lieu d'habitation sera hors du camp.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Moisissures sur les vêtements
    marker-yv: yv-h
  '47':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.47 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''il y a une tache de « lèpre » sur un vêtement – sur un vêtement de laine ou sur un vêtement de lin, '
  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.48 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chaîne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trame
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction traditionnelle mais incertaine ; il s''agit peut-être de divers types d''étoffe.'
      marker-yv: yv-n
    - type: text
      text: 'sur une chaîne ou sur une trame de lin ou de laine, sur une peau ou sur un ouvrage de peau quelconque – '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.49 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on le montrera au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.2+.
      marker-yv: yv-n
    - type: text
      text: 'et que la tache est verdâtre ou rougeâtre sur le vêtement ou sur la peau, sur la chaîne ou sur la trame, ou sur un objet de peau quelconque, c''est un cas de « lèpre » ; on le montrera au prêtre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre l''examinera le septième jour. Si la lésion lui paraît s''être stabilisée et ne pas s''être étendue sur la peau, le prêtre l''isolera une seconde fois pendant sept jours. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre examinera la tache et l''isolera pendant sept jours. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.51 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pernicieuse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme en 14.44 ; Ez 28.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: impur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 58'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il examinera la tache le septième jour. Si la tache s''est étendue sur le vêtement, sur la chaîne ou sur la trame, sur la peau ou sur l''ouvrage fait de peau, quel qu''il soit, c''est un cas de « lèpre » pernicieuse : il est impur. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.52 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sera jeté au feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sera brûlé au feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 55,57.'
      marker-yv: yv-n
    - type: text
      text: 'Il brûlera le vêtement, la chaîne ou la trame de laine ou de lin, l''objet de peau quelconque sur lequel se trouve la tache : c''est une « lèpre » pernicieuse ; l''objet sera jeté au feu. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si le prêtre voit que la tache ne s''est pas étendue sur le vêtement, sur la chaîne ou sur la trame, sur l''objet de peau quelconque, '
  '54':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le prêtre ordonnera qu''on le lave, et il l''isolera une seconde fois pendant sept jours. '
  '55':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.55 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''endroit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'envers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les mêmes mots hébreux sont traduits '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de derrière / de devant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: aux v. 42s.
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre examinera la tache après qu''elle aura été lavée. Si la tache n''a pas changé d''aspect et ne s''est pas étendue, il est impur ; il sera jeté au feu ; c''est une partie de l''endroit ou de l''envers qui a été rongée. '
  '56':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.56 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si le prêtre voit que la tache est devenue pâle après avoir été lavée, il l''arrachera du vêtement ou de la peau, de la chaîne ou de la trame. '
  '57':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Si elle paraît encore sur le vêtement, sur la chaîne ou sur la trame, ou sur l''objet de peau quelconque, c''est une éruption de « lèpre » : l''objet sera jeté au feu. '
  '58':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.58 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il sera '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. il pourra être utilisé normalement.'
      marker-yv: yv-n
    - type: text
      text: Le vêtement, la chaîne ou la trame, l'objet de peau quelconque qui a été lavé et d'où la tache a disparu sera lavé une seconde fois, et il sera pur.
  '59':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Telle est la loi concernant le cas de la « lèpre » sur un vêtement de laine ou de lin, sur la chaîne ou sur la trame, ou sur un objet de peau quelconque, pour les déclarer purs ou impurs.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre l''examinera une seconde fois le septième jour. Si la lésion est devenue pâle et ne s''est pas étendue sur la peau, le prêtre le déclarera pur : c''est une dartre ; il lavera ses vêtements, et il sera pur. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais si la dartre s''étend sur la peau après qu''il s''est montré au prêtre pour être déclaré pur, il se montrera une seconde fois au prêtre. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le prêtre l''examinera : si la dartre s''est étendue sur la peau, le prêtre le déclarera impur ; c''est la « lèpre ». '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque quelqu''un présente un cas de « lèpre », on l''amènera au prêtre. '
