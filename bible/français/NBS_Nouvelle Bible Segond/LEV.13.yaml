document_id: LEV.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Maladies de la peau chez l'homme
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '10':
  - type: note
    content: 'un bourgeonnement  : litt. une vivification (mot apparenté aux termes traduits par vive et vie).'
  - type: text
    content: 'Le prêtre l''examinera : s''il y a sur la peau une tumeur blanche, si cette tumeur a fait blanchir le poil, et qu''il y ait un bourgeonnement de chair vive dans la tumeur, '
  '11':
  - type: text
    content: 'c''est une « lèpre » invétérée dans sa peau ; le prêtre le déclarera impur ; il ne l''isolera pas : il est impur. '
  '12':
  - type: text
    content: 'Si la « lèpre » fait une éruption sur la peau et que le mal couvre toute la peau, depuis la tête jusqu''aux pieds, partout où le prêtre regarde, '
  '13':
  - type: note
    content: 'tout le corps  : litt. toute sa chair.'
  - type: text
    content: 'le prêtre l''examinera : si la « lèpre » couvre tout le corps, il déclarera pur le mal : comme il est devenu entièrement blanc, il est pur. '
  '14':
  - type: text
    content: 'Mais le jour où l''on apercevra en lui de la chair vive, il sera impur ; '
  '15':
  - type: text
    content: 'quand le prêtre aura vu la chair vive, il le déclarera impur : la chair vive est impure, c''est la « lèpre ». '
  '16':
  - type: text
    content: 'Si la chair vive change et redevient blanche, il ira vers le prêtre. '
  '17':
  - type: text
    content: 'Le prêtre l''examinera ; si la lésion est redevenue blanche, le prêtre déclarera pur le mal : il est pur. '
  '18':
  - type: note
    content: ulcère Ex 9.9-11 ; Dt 28.27 ; 2R 20.7 ; Jb 2.7.
  - type: text
    content: 'Lorsque quelqu''un a eu sur la peau un ulcère qui s''est guéri, '
  '19':
  - type: text
    content: 'et qu''il apparaît, à la place où était l''ulcère, une tumeur blanche ou une tache luisante d''un blanc rougeâtre, il se montrera au prêtre. '
  '2':
  - type: note
    content: 'sur la peau  : litt. dans la peau de sa chair (deux fois dans l''hébreu), de même dans la suite. –  tache luisante  : le terme hébreu ainsi traduit n''apparaît que dans ce passage (v. 4,19,23ss,38s ; 14.56). – Dans ce chap. et le suivant, les mots cas, lésion (v. 3), mal (v. 4 ; 14.48), tache (v. 47ss ; 14.34ss) traduisent un même terme hébreu, proprement coup, souvent rendu par fléau (v. 44nss ; 14.3 ; Gn 12.17 ; Ex 11.1 etc.). – Le terme traduit par lèpre ne désigne pas seulement la maladie aujourd''hui connue sous ce nom, puisqu''il s''applique aussi à des taches (moisissures ?) qui peuvent apparaître sur des étoffes et des murs (v. 47-59 ; 14.33-53). Sans doute englobait-il diverses affections de la peau (cf. Nb 12.10 ; Dt 24.8s ; 2R 5.1n  ; voir aussi Ps 38 ; Mt 8.2+). – Voir prêtre.'
  - type: text
    content: 'Lorsque quelqu''un a sur la peau une tumeur, une dartre ou une tache luisante qui devient un cas de « lèpre », on l''amènera à Aaron, le prêtre, ou à l''un de ses fils. '
  '20':
  - type: text
    content: 'Le prêtre l''examinera : si la tache paraît plus enfoncée que la peau, et que le poil soit devenu blanc, le prêtre le déclarera impur ; c''est un cas de « lèpre » qui a fait éruption dans l''ulcère. '
  '21':
  - type: text
    content: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache, qu''elle n''est pas plus enfoncée que la peau, et qu''elle est devenue pâle, il l''isolera pendant sept jours. '
  '22':
  - type: note
    content: 'c''est un cas de « lèpre »  : le mot correspondant à lèpre étant ici sous-entendu, on pourrait comprendre c''est le fléau (v. 2n) ; LXX a lu en fin de v. la même formule qu''au v. 20, de même au v. 27.'
  - type: text
    content: 'Si la tache s''est étendue sur la peau, le prêtre le déclarera impur : c''est un cas de « lèpre ». '
  '23':
  - type: text
    content: 'Mais si la tache luisante s''est stabilisée, si elle ne s''est pas étendue, c''est la cicatrice de l''ulcère : le prêtre le déclarera pur.'
  '24':
  - type: text
    content: 'Lorsque quelqu''un a eu sur la peau une brûlure par le feu, que le bourgeonnement de la brûlure forme une tache luisante blanche ou d''un blanc rougeâtre, '
  '25':
  - type: text
    content: 'le prêtre l''examinera : si le poil est devenu blanc dans la tache luisante, et que celle-ci paraisse plus profonde que la peau, c''est la « lèpre » qui a fait éruption dans la brûlure ; le prêtre le déclarera impur : c''est un cas de « lèpre ». '
  '26':
  - type: text
    content: 'Si le prêtre voit qu''il n''y a pas de poil blanc dans la tache luisante, qu''elle n''est pas plus enfoncée que la peau et qu''elle est devenue pâle, le prêtre l''isolera pendant sept jours. '
  '27':
  - type: text
    content: 'Le prêtre l''examinera le septième jour. Si la tache s''est étendue sur la peau, le prêtre le déclarera impur : c''est un cas de « lèpre ». '
  '28':
  - type: text
    content: 'Mais si la tache luisante s''est stabilisée, si elle ne s''est pas étendue sur la peau, et si elle est devenue pâle, c''est la tumeur de la brûlure ; le prêtre le déclarera pur : c''est la cicatrice de la brûlure.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'au menton  : autre traduction dans la barbe.'
  - type: text
    content: 'Lorsqu''un homme ou une femme a une lésion à la tête ou au menton, '
  '3':
  - type: note
    content: 'examinera  : litt. regardera ou verra, de même dans la suite ; cf. v. 56. –  impur  : voir pur.'
  - type: text
    content: 'Le prêtre examinera la lésion qui est sur la peau. Si le poil y est devenu blanc, et que la lésion paraisse plus profonde que la peau, c''est un cas de « lèpre » : le prêtre l''examinera et le déclarera impur. '
  '30':
  - type: text
    content: 'le prêtre examinera la lésion. Si elle paraît plus profonde que la peau, et qu''il y ait du poil jaunâtre et mince, le prêtre le déclarera impur : c''est la teigne, c''est la « lèpre » de la tête ou du menton. '
  '31':
  - type: text
    content: 'Si le prêtre voit que la lésion de la teigne ne paraît pas plus profonde que la peau, et qu''il n''y a pas de poil noir, le prêtre isolera le cas de teigne pendant sept jours. '
  '32':
  - type: text
    content: 'Le prêtre examinera la lésion le septième jour. Si la teigne ne s''est pas étendue, s''il n''y a pas de poil jaunâtre, et si elle ne paraît pas plus profonde que la peau, '
  '33':
  - type: note
    content: 'l''isolera  : litt. isolera ou enfermera la teigne, cf. v. 4n.'
  - type: text
    content: 'il se rasera, mais il ne rasera pas l''endroit où est la teigne ; le prêtre l''isolera une seconde fois pendant sept jours. '
  '34':
  - type: text
    content: 'Le prêtre examinera la teigne le septième jour. Si la teigne ne s''est pas étendue sur la peau, et si elle ne paraît pas plus profonde que la peau, le prêtre le déclarera pur ; il lavera ses vêtements, et il sera pur. '
  '35':
  - type: text
    content: 'Mais si la teigne s''étend sur la peau après qu''il a été déclaré pur, '
  '36':
  - type: text
    content: 'le prêtre l''examinera ; si la teigne s''est étendue sur la peau, le prêtre n''aura pas à rechercher s''il y a du poil jaunâtre : il est impur. '
  '37':
  - type: text
    content: 'Si la teigne lui paraît stabilisée, et qu''il y ait poussé du poil noir, la teigne est guérie : il est pur, le prêtre le déclarera pur.'
  '38':
  - type: text
    content: 'Lorsqu''un homme ou une femme a sur la peau des taches luisantes, des taches blanches, '
  '39':
  - type: note
    content: 'des boutons  : le terme hébreu n''apparaît qu''ici dans l''A.T., et sa traduction précise est incertaine ; il désigne en tout cas une éruption bénigne.'
  - type: text
    content: 'le prêtre l''examinera : s''il y a sur la peau des taches luisantes d''un blanc pâle, ce sont des boutons qui ont fait éruption sur la peau : il est pur.'
  '4':
  - type: note
    content: 'isolera  : le verbe ainsi traduit, ici et dans la suite, est rendu par fermer en 14.38ss. –  le mal ou la lésion, v. 2n  ; de même aux v. 12s. –  sept jours 14.38 ; Nb 12.14s.'
  - type: text
    content: 'S''il y a sur la peau une tache luisante blanche qui ne paraît pas plus profonde que la peau, et que le poil ne soit pas devenu blanc, le prêtre isolera le mal pendant sept jours. '
  '40':
  - type: text
    content: 'Lorsqu''un homme perd ses cheveux, c''est un chauve : il est pur. '
  '41':
  - type: note
    content: 'chauve du front  : l''hébreu désigne par deux mots différents la calvitie frontale et celle du sommet du crâne (cf. v. 55n).'
  - type: text
    content: 'S''il perd ses cheveux sur le devant, c''est un chauve du front : il est pur. '
  '42':
  - type: text
    content: 'Mais s''il y a dans la partie chauve de derrière ou de devant une lésion d''un blanc rougeâtre, c''est la « lèpre » qui a fait éruption dans la partie chauve de derrière ou de devant. '
  '43':
  - type: note
    content: 'si le mal est une tumeur  : autre traduction si le mal présente une tumeur, litt. si la tumeur du mal (est)… (cf. 13.2n).'
  - type: text
    content: 'Le prêtre l''examinera : si le mal est une tumeur d''un blanc rougeâtre dans la partie chauve de derrière ou de devant, du même aspect que la « lèpre » de la peau, '
  '44':
  - type: note
    content: un cas de « lèpre » ou le fléau, le mot rendu par « lèpre » étant ici sous-entendu, cf. v. 2n,45s.
  - type: text
    content: 'c''est un « lépreux », il est impur : le prêtre le déclarera impur ; c''est un cas de « lèpre » à la tête.'
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'le mal  : autre traduction le fléau (v. 2n), même possibilité au v. 46. –  les vêtements déchirés…  : signes traditionnels de deuil, de tristesse, de pénitence ou d''extrême affliction (10.6+ ; Ez 24.17).'
  - type: text
    content: 'Le « lépreux » atteint par le mal aura les vêtements déchirés et les cheveux défaits ; il se couvrira la moustache et criera : Impur ! Impur ! '
  '46':
  - type: note
    content: Cf. 14.3 ; Nb 5.2 ; 2R 15.5 ; Jb 2.7s ; Lc 17.12.
  - type: text
    content: Aussi longtemps que le mal sera sur lui, il sera impur. Etant impur, il habitera seul ; son lieu d'habitation sera hors du camp.
  - type: heading
    content: Moisissures sur les vêtements
  '47':
  - type: text
    content: ' '
  - type: note
    content: V. 2n.
  - type: text
    content: 'Lorsqu''il y a une tache de « lèpre » sur un vêtement – sur un vêtement de laine ou sur un vêtement de lin, '
  '48':
  - type: note
    content: 'chaîne / trame  : traduction traditionnelle mais incertaine ; il s''agit peut-être de divers types d''étoffe.'
  - type: text
    content: 'sur une chaîne ou sur une trame de lin ou de laine, sur une peau ou sur un ouvrage de peau quelconque – '
  '49':
  - type: note
    content: on le montrera au prêtre 14.2+.
  - type: text
    content: 'et que la tache est verdâtre ou rougeâtre sur le vêtement ou sur la peau, sur la chaîne ou sur la trame, ou sur un objet de peau quelconque, c''est un cas de « lèpre » ; on le montrera au prêtre. '
  '5':
  - type: text
    content: 'Le prêtre l''examinera le septième jour. Si la lésion lui paraît s''être stabilisée et ne pas s''être étendue sur la peau, le prêtre l''isolera une seconde fois pendant sept jours. '
  '50':
  - type: text
    content: 'Le prêtre examinera la tache et l''isolera pendant sept jours. '
  '51':
  - type: note
    content: 'pernicieuse  : même terme en 14.44 ; Ez 28.24. –  impur  : cf. v. 58n.'
  - type: text
    content: 'Il examinera la tache le septième jour. Si la tache s''est étendue sur le vêtement, sur la chaîne ou sur la trame, sur la peau ou sur l''ouvrage fait de peau, quel qu''il soit, c''est un cas de « lèpre » pernicieuse : il est impur. '
  '52':
  - type: note
    content: 'sera jeté au feu  : litt. sera brûlé au feu  ; cf. v. 55,57.'
  - type: text
    content: 'Il brûlera le vêtement, la chaîne ou la trame de laine ou de lin, l''objet de peau quelconque sur lequel se trouve la tache : c''est une « lèpre » pernicieuse ; l''objet sera jeté au feu. '
  '53':
  - type: text
    content: 'Mais si le prêtre voit que la tache ne s''est pas étendue sur le vêtement, sur la chaîne ou sur la trame, sur l''objet de peau quelconque, '
  '54':
  - type: text
    content: 'le prêtre ordonnera qu''on le lave, et il l''isolera une seconde fois pendant sept jours. '
  '55':
  - type: note
    content: 'de l''endroit / de l''envers  : les mêmes mots hébreux sont traduits de derrière / de devant aux v. 42s.'
  - type: text
    content: 'Le prêtre examinera la tache après qu''elle aura été lavée. Si la tache n''a pas changé d''aspect et ne s''est pas étendue, il est impur ; il sera jeté au feu ; c''est une partie de l''endroit ou de l''envers qui a été rongée. '
  '56':
  - type: note
    content: voit v. 3n.
  - type: text
    content: 'Si le prêtre voit que la tache est devenue pâle après avoir été lavée, il l''arrachera du vêtement ou de la peau, de la chaîne ou de la trame. '
  '57':
  - type: text
    content: 'Si elle paraît encore sur le vêtement, sur la chaîne ou sur la trame, ou sur l''objet de peau quelconque, c''est une éruption de « lèpre » : l''objet sera jeté au feu. '
  '58':
  - type: note
    content: 'il sera pur  : c.-à-d. il pourra être utilisé normalement.'
  - type: text
    content: Le vêtement, la chaîne ou la trame, l'objet de peau quelconque qui a été lavé et d'où la tache a disparu sera lavé une seconde fois, et il sera pur.
  '59':
  - type: text
    content: Telle est la loi concernant le cas de la « lèpre » sur un vêtement de laine ou de lin, sur la chaîne ou sur la trame, ou sur un objet de peau quelconque, pour les déclarer purs ou impurs.
  '6':
  - type: text
    content: 'Le prêtre l''examinera une seconde fois le septième jour. Si la lésion est devenue pâle et ne s''est pas étendue sur la peau, le prêtre le déclarera pur : c''est une dartre ; il lavera ses vêtements, et il sera pur. '
  '7':
  - type: text
    content: 'Mais si la dartre s''étend sur la peau après qu''il s''est montré au prêtre pour être déclaré pur, il se montrera une seconde fois au prêtre. '
  '8':
  - type: text
    content: 'Le prêtre l''examinera : si la dartre s''est étendue sur la peau, le prêtre le déclarera impur ; c''est la « lèpre ». '
  '9':
  - type: text
    content: 'Lorsque quelqu''un présente un cas de « lèpre », on l''amènera au prêtre. '
