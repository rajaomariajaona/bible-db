document_id: ISA.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'anarchie dans le royaume de Juda
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur… des Armées 1.9n,24n. –  toute ressource et tout appui  : les deux termes hébreux, qui sont apparentés, désignent peut-être au sens propre un bâton d''appui ou un sceptre, signes d''autorité (mot de la même famille en Ex 21.19 ; Nb 21.18 [ canne ]).'
  - type: text
    content: 'Le Seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: écarte de Jérusalem et de Juda
  - type: text
    content: toute ressource et tout appui,
  - type: text
    content: toute ressource de pain
  - type: text
    content: et toute ressource d'eau,
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Dites…  : certains modifient le texte hébreu traditionnel pour lire heureux le juste, car il est bon. –  il jouira…  : litt. ils (c.-à-d., probablement, les justes ) mangeront le fruit de leurs agissements (v. 8n) ; cf. Ps 128.2 ; Pr 1.31 ; 12.14 ; Ga 6.7.'
  - type: text
    content: 'Dites : Le juste est en bonne voie,'
  - type: text
    content: il jouira du fruit de ses actes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cela ira mal pour lui  : litt. mauvais , mot qui peut évoquer le mal commis comme le malheur subi. –  ce que ses mains ont préparé (cf. v. 9) ou selon ce que méritent les œuvres de ses mains  ; cf. 59.18+.'
  - type: text
    content: Quel malheur pour le méchant !
  - type: text
    content: Cela ira mal pour lui,
  - type: text
    content: car il lui sera fait ce que ses mains ont préparé.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'oppresseurs v. 5n. –  gamins v. 4+ ; en modifiant le texte d''après des versions anciennes, on pourrait aussi traduire  : ses oppresseurs le grappillent . –  femmes  : cf. 1R 15.13 ; voir aussi Na 3.1. Des versions anciennes ont lu exacteurs ou créanciers au lieu de femmes. –  t''égarent  : cf. 9.15 ; Jr 23.13 ; Os 4.12 ; Mi 3.5. –  ils effacent le chemin que tu suis  : litt. ils engloutissent (ou ils rendent confus, ils brouillent cf. 9.15n  ; 19.3n  ; 28.7n  ; Ps 107.27n) le chemin de tes sentiers.'
  - type: text
    content: Mon peuple a pour oppresseurs des gamins,
  - type: text
    content: et des femmes le dominent ;
  - type: text
    content: mon peuple, tes guides t'égarent,
  - type: text
    content: ils effacent le chemin que tu suis.
  - type: heading
    content: Le procès des dirigeants d'Israël
  '13':
  - type: text
    content: ' '
  - type: note
    content: 41.1+ ; Jr 2.9 ; Os 4.1 ; Mi 6.1 ; Ps 50.4.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se lève pour accuser,'
  - type: text
    content: il est debout pour juger les peuples.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'dévoré  : on pourrait aussi traduire brûlé (cf. 4.4n  ; 5.5n) ; d''autres comprennent vous avez brouté , cf. Ex 22.4n. –  la vigne  : cf. 5.1-7. –  Ce sont…  : litt. ce qui a été volé au pauvre (est) dans vos maisons Am 2.6-8 ; Mi 2.1s.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entre en jugement'
  - type: text
    content: 'avec les anciens de son peuple et avec ses chefs :'
  - type: text
    content: Vous avez dévoré la vigne !
  - type: text
    content: Ce sont les biens dont vous avez dépouillé le pauvre qui remplissent vos maisons !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 1.23 ; 5.23 ; 10.1s ; cf. 11.4 ; 16.5 ; Lv 19.13 ; Am 5.7,10-15 ; 6.12 ; 8.4-6 ; Pr 22.22s.
  - type: text
    content: Pourquoi donc écrasez-vous mon peuple,
  - type: text
    content: pourquoi broyez-vous la face des pauvres ?
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Contre les belles dames de Jérusalem
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'les filles de Sion  : il s''agit des femmes de Jérusalem ou, plus particulièrement, de celles de la cour royale (le palais, comme le temple, était situé sur le mont Sion). Cf. Ez 16.50 ; So 3.11. –  elles font résonner les anneaux  : cette expression traduit un seul verbe hébreu, de la même racine que le mot traduit par anneaux au v. 18.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Parce que les filles de Sion sont hautaines,'
  - type: text
    content: parce qu'elles marchent le cou tendu
  - type: text
    content: et les regards effrontés,
  - type: text
    content: parce qu'elles vont à petits pas
  - type: text
    content: et qu'elles font résonner les anneaux de leurs pieds,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Seigneur / Seigneur  : hébreu ’Adonaï / YHWH , cf. Ex 3.15n. –  chauve ou galeux  ; le mot hébreu correspondant n''apparaît qu''ici. –  leur front  : terme rare qui n''apparaît qu''ici et en 1R 7.50 ( gonds ). On a aussi compris leur sexe  ; cf. 47.3 ; Jr 13.26 ; Ez 16.37.'
  - type: text
    content: le Seigneur rendra chauve le crâne des filles de Sion,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dénudera leur front.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'toute parure  : litt. (la) parure  ; autre traduction la splendeur. – Il est difficile de définir avec précision chacun des éléments de cette énumération. Les anneaux (ou grelots , selon certains) étaient probablement portés aux chevilles (v. 16n). –  filets ou soleils. –  croissants ou miroirs.'
  - type: text
    content: 'En ce jour-là, le Seigneur ôtera toute parure : les anneaux, les filets et les croissants ; '
  '19':
  - type: text
    content: 'les pendants d''oreilles, les bracelets et les voiles ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'devin  : cf. 44.25 ; Dt 18.10-14 ; Jos 13.22 ; 1S 6.2 ; ce terme désigne parfois des prophètes  : Jr 27.9 ; 29.8 ; Mi 3.5-7 ; Za 10.2. –  ancien Ex 3.16,18 ; Dt 25.5-10 ; 2S 5.3 ; 1R 21.8.'
  - type: text
    content: le héros et l'homme de guerre,
  - type: text
    content: le juge et le prophète,
  - type: text
    content: le devin et l'ancien,
  '20':
  - type: note
    content: 'coiffes d''apparat  : cf. 61.3n. –  boîtes de senteur  : litt. maisons de l''âme. Ce dernier mot (cf. Gn 1.20n) peut être pris au sens de respiration, d''où parfum, ou bien au sens de vie (cf. 1S 25.29), auquel cas l''expression désignerait des talismans destinés à protéger leurs porteuses. –  amulettes v. 3n.'
  - type: text
    content: 'les coiffes d''apparat, les chaînettes de cheville et les ceintures, les boîtes de senteur et les amulettes ; '
  '21':
  - type: text
    content: 'les bagues à cachet et les anneaux de nez ; '
  '22':
  - type: note
    content: 'vêtements de fête  : même terme en Za 3.4. –  réticules  : peut-être des bourses ou des sacs à main (cf. 2R 5.23).'
  - type: text
    content: 'les vêtements de fête et les larges tuniques, les manteaux et les réticules, '
  '23':
  - type: note
    content: 'miroirs  : terme rare qui est proche de la racine signifiant dévoiler  ; voir aussi 8.1n. –  sous-vêtements  : cf. Jg 14.12n.'
  - type: text
    content: les miroirs et les sous-vêtements, les turbans et les mantilles.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ceinture / pagne  : les deux termes hébreux sont apparentés. –  un sac  : signe de deuil. –  marque flétrissante  : litt. brûlure . Il s''agit vraisemblablement de la marque au fer rouge que l''on infligeait aux esclaves et aux captifs ; d''après un ms de Qumrân, certains modifient le texte hébreu traditionnel pour lire la honte.'
  - type: text
    content: Au lieu d'essences odoriférantes, ce sera l'infection ;
  - type: text
    content: au lieu de ceinture, une corde ;
  - type: text
    content: au lieu d'une coiffure arrangée, une tonsure ;
  - type: text
    content: au lieu d'un manteau de luxe, un sac pour pagne ;
  - type: text
    content: une marque flétrissante au lieu de beauté.
  - type: heading
    content: Les veuves de Jérusalem
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'tomberont par l''épée 2S 1.12 ; Os 14.1. –  tes héros  : litt. ta bravoure.'
  - type: text
    content: Tes hommes tomberont par l'épée,
  - type: text
    content: tes héros à la guerre.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Ses portes  : litt. ses ouvertures, ses entrées  ; il s''agit des portes de Jérusalem et, par extension, de tous ceux qui se réunissent aux portes de la ville ; cf. Dt 16.18n  ; Lm 1.4 ; 2.9. –  elle s''assiéra par terre  : cf. 47.1 ; Jb 2.13 ; Esd 9.3.'
  - type: text
    content: Ses portes gémiront et seront dans le deuil ;
  - type: text
    content: dépouillée, elle s'assiéra par terre.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'chef de cinquante  : cf. 2R 1.9-13. –  notable  : litt. élevé de face  ; de même en 9.14 ; 2R 5.1 ; Jb 22.8n. –  l''artisan habile  : litt. le sage des artisans  ; certains traduisent l''habile magicien  ; cf. 40.20 ; Ex 28.3n. –  en occultisme  : le même terme est traduit par amulettes au v. 20 ; il semble évoquer un chuchotement en 26.16n  ; ailleurs il décrit plus particulièrement la pratique des charmeurs de serpent (Jr 8.17 ; Ps 58.6 ; Ec 10.11).'
  - type: text
    content: le chef de cinquante et le notable,
  - type: text
    content: le conseiller, l'artisan habile
  - type: text
    content: et l'expert en occultisme.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'V. 12 ; Ec 10.16. –  gamins  : traduction incertaine. Le même mot est traduit par infortune en 66.4n. Certains pensent qu''il désigne ici des tyrans , des faibles ou des caprices.'
  - type: text
    content: Je leur donnerai des jeunes gens pour chefs,
  - type: text
    content: des gamins les domineront.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '9.18 ; Jg 7.22 ; 1S 14.20 ; Mi 7.5s ; Mt 10.21. –  pressera ou opprimera , autre forme du même verbe au v. 12 ( oppresseurs ) ; 9.3 ; 14.2,4 ; 53.7n  ; 58.3 ; 60.17 ; cf. Ex 3.7n. –  importunera  : autres traductions traitera avec insolence ; attaquera  ; même verbe en Pr 6.3. –  vulgaire / honorable  : les termes correspondants pourraient désigner, au sens concret, ce qui est léger ou lourd  ; au sens figuré, ce qui est méprisable ou honorable (voir gloire).'
  - type: text
    content: Parmi le peuple,
  - type: text
    content: l'un pressera l'autre et chacun son prochain ;
  - type: text
    content: le jeune homme importunera le vieillard,
  - type: text
    content: le vulgaire importunera l'honorable.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'maison paternelle  : l''expression est parfois traduite par famille. –  masse trébuchante  : cf. Jr 6.21.'
  - type: text
    content: Alors un homme saisira son frère
  - type: text
    content: 'dans la maison paternelle :'
  - type: text
    content: Tu as un manteau, sois notre chef !
  - type: text
    content: Prends cette masse trébuchante !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'l''autre s''écriera  : litt. il élèvera (la voix) pour dire.'
  - type: text
    content: 'Ce jour-là, l''autre s''écriera :'
  - type: text
    content: Je ne suis pas médecin,
  - type: text
    content: et dans ma maison il n'y a ni pain ni manteau ;
  - type: text
    content: ne me nommez pas chef du peuple !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'leurs agissements ou leurs actes , même terme au v. 10 ; 1.16 ; cf. Jr 4.4+ ; Ps 77.12n. –  sont dirigés…  : litt. (sont) vers YHWH pour se rebeller (contre) les yeux de sa gloire  ; on pourrait aussi traduire pour braver son regard glorieux.'
  - type: text
    content: Car Jérusalem trébuche,
  - type: text
    content: Juda s'effondre,
  - type: text
    content: parce que leur langue et leurs agissements
  - type: text
    content: 'sont dirigés contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: ils se rebellent devant sa gloire.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Leur audace  : litt. la direction ( ?) de leur face , ce qui pourrait signifier l''expression de leur visage (cf. Jr 3.3), les faveurs dont ils bénéficient , ou encore leur partialité  ; cf. Pr 24.23n  ; 28.21n. –  témoigne contre eux  : cf. Jr 14.7 ; Os 5.5 ; 1Tm 5.24. – Voir péché. –  comme Sodome 1.9-10+.'
  - type: text
    content: Leur audace témoigne contre eux ;
  - type: text
    content: leur péché, ils le montrent, comme Sodome,
  - type: text
    content: ils ne le cachent pas.
  - type: text
    content: Quel malheur pour eux !
  - type: text
    content: Car ils se préparent un malheur.
