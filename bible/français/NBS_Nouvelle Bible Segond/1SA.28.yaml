document_id: 1SA.28,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'leurs troupes  : litt. leurs camps. Cf. 17.1 ; 29.1. –  que tu te mettras en campagne  : litt. que tu sortiras au camp  ; cf. 8.20n  ; 11.7n.'
  - type: text
    content: 'En ces jours-là, les Philistins rassemblèrent leurs troupes et formèrent une armée pour faire la guerre à Israël. Akish dit à David : Tu sais bien que tu te mettras en campagne avec moi, toi et tes hommes. '
  '10':
  - type: note
    content: 'Par la vie du Seigneur  : cf. 14.39n. –  aucune faute…  : autre traduction tu n''auras à subir aucun châtiment.'
  - type: text
    content: 'Saül lui fit ce serment par le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', aucune faute ne te sera reprochée dans cette affaire. '
  '11':
  - type: note
    content: que je te fasse monter ou que je fasse monter pour toi  ; même possibilité dans la suite du v.
  - type: text
    content: 'La femme dit : Qui veux-tu que je te fasse monter ? Et il répondit : Fais-moi monter Samuel.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: On ne sait pas en quoi l'apparition de Samuel permet à la femme de découvrir l'identité de Saül. Plusieurs explications ont été proposées, mais aucune n'est convaincante. Quelques mss grecs ont lu lorsque la femme vit (= reconnut ?) Saül…
  - type: text
    content: 'Lorsque la femme vit Samuel, elle poussa un grand cri et dit à Saül : Pourquoi m''as-tu trompée ? Tu es Saül ! '
  '13':
  - type: note
    content: 'un dieu  : hébreu ’élohim  ; ce mot désigne soit Dieu, soit un dieu, soit encore les dieux, car il a la forme d''un pluriel (Gn 1.1n). Dans le verset, le verbe est également au pluriel, d''où la traduction possible je vois des dieux qui montent… L''évocation isolerait par la suite Samuel du groupe des trépassés dont la femme voit l''image. Le mot hébreu est parfois employé pour désigner des humains, par exemple en Ps 82.6. Certains pensent qu''il pourrait même désigner plus précisément dans ce contexte un spectre, un fantôme, les anciens Sémites ayant parfois appelé dieu l''esprit d''un mort.'
  - type: text
    content: 'Le roi lui dit : N''aie pas peur ! Que vois-tu ? La femme dit à Saül : Je vois un dieu qui monte de la terre. '
  '14':
  - type: note
    content: 'un vieillard  : cf. 8.1,5. – Le manteau de Samuel a joué un rôle décisif dans le destin royal de Saül, cf. 15.27. –  s''inclina… prosterné  : cf. 25.23.'
  - type: text
    content: 'Il lui dit : Quelle apparence a-t-il ? Elle répondit : C''est un vieillard qui monte, et il est enveloppé d''un manteau. Saül sut ainsi que c''était Samuel ; il s''inclina face contre terre, prosterné. '
  '15':
  - type: note
    content: 'grande détresse 30.6 ; 2S 24.14 ; cf. Jr 2.19 ; Ps 25.17 ; 116.3. –  Dieu s''est éloigné de moi  : cf. 16.14+. –  ne m''a répondu  : cf. v. 6.'
  - type: text
    content: 'Samuel dit à Saül : Pourquoi m''as-tu troublé en me faisant monter ? Saül répondit : Je suis dans une grande détresse : les Philistins me font la guerre, et Dieu s''est éloigné de moi ; il ne m''a répondu ni par l''intermédiaire des prophètes ni par des rêves, et je t''ai appelé pour que tu me fasses savoir ce que je dois faire. '
  '16':
  - type: note
    content: 'il est devenu ton adversaire  : cf. Lm 2.5 ; LXX a lu il s''est mis du côté de ton prochain (c.-à-d. de David).'
  - type: text
    content: 'Samuel dit : Pourquoi donc m''interroges-tu, puisque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est éloigné de toi et qu''il est devenu ton adversaire ? '
  '17':
  - type: note
    content: 'a agi  : litt. a agi pour lui  ; le pronom lui peut se rapporter, soit à Dieu lui-même (quant au Seigneur, il a agi comme…), soit à David, mentionné nommément à la fin du v. (le Seigneur a agi envers lui…). LXX a compris le Seigneur a agi envers toi comme… –  par mon intermédiaire / déchiré la royauté / à un autre  : cf. 15.28n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a agi comme il te l''a dit par mon intermédiaire ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a déchiré la royauté d''entre tes mains et l''a donnée à un autre, à David. '
  '18':
  - type: note
    content: 'Cf. chap. 15. –  écouté…  : litt. écouté la voix de YHWH, c.-à-d. obéi à son ordre  ; de même aux v. 21-23 ; cf. 25.35 ; 1R 20.36. –  tu n''as pas traité…  : cf. Os 11.9.'
  - type: text
    content: 'Puisque tu n''as pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et que tu n''as pas traité Amalec selon sa colère ardente, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te traite ainsi en ce jour. '
  '19':
  - type: note
    content: 'Cf. 31.1-7. –  vous serez avec moi  : dans le monde des morts.'
  - type: text
    content: 'Avec toi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' livrera aussi Israël aux Philistins. Demain, toi et tes fils, vous serez avec moi, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' livrera les troupes d''Israël aux Philistins. '
  '2':
  - type: note
    content: 'Eh bien, à toi de savoir…  : litt. c''est pourquoi toi tu sauras ce que fera ton serviteur  ; la réponse de David est sans doute volontairement ambiguë : Akish y entend une protestation de fidélité, alors que David ne s''engage en fait à rien de précis. –  pour toujours  : litt. tous les jours. –  mon garde du corps  : litt. le gardien de ma tête  ; cf. 29.2.'
  - type: text
    content: 'David répondit à Akish : Eh bien, à toi de savoir ce que je vais faire ! Et Akish dit à David : Alors, je ferai de toi pour toujours mon garde du corps.'
  - type: heading
    content: Saül consulte la nécromancienne d'Eïn-Dor
  '20':
  - type: note
    content: 'il avait très peur  : cf. Jb 15.20-24. –  rien mangé  : litt. pas mangé de pain  ; cf. 14.24-30 ; 30.12.'
  - type: text
    content: Aussitôt Saül tomba à terre, de toute sa hauteur ; il avait très peur, à cause des paroles de Samuel ; de plus, il manquait de forces, car il n'avait rien mangé de tout le jour et de toute la nuit.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'je t''ai écouté  : cf. v. 18. –  j''ai risqué ma vie  : cf. 19.5n. –  en t''écoutant  : litt. et j''ai écouté tes paroles que tu m''as dites  ; c.-à-d. j''ai exécuté l''ordre que tu m''as donné.'
  - type: text
    content: 'La femme vint trouver Saül et, le voyant tout épouvanté, elle lui dit : Moi, ta servante, je t''ai écouté ; j''ai risqué ma vie en t''écoutant. '
  '22':
  - type: note
    content: 'écoute-moi, c.-à-d. écoute ma proposition. –  quelque chose  : litt. un morceau de pain  ; cf. v. 20n.'
  - type: text
    content: 'Maintenant écoute-moi, toi aussi, je te prie ; laisse-moi te servir quelque chose à manger, afin que tu aies des forces pour te mettre en route. '
  '23':
  - type: note
    content: 'Ses gens ou les gens de sa cour, cf. v. 7. –  insistèrent  : cf. 2S 13.25,27 ; 2R 5.16. –  il finit par les écouter  : litt. il écouta leur voix.'
  - type: text
    content: 'Mais il refusa, en disant : Je ne mangerai pas. Ses gens et la femme aussi insistèrent auprès de lui, et il finit par les écouter. Il se releva de terre et s''assit sur le lit. '
  '24':
  - type: note
    content: 'Cf. Gn 18.6-8. –  un veau à l''étable  : cf. Jr 46.21+ ; Lc 15.23. – Les pains sans levain n''ont sans doute pas ici de signification symbolique particulière ; la femme n''a tout simplement pas le temps de laisser fermenter de la pâte préparée avec du levain.'
  - type: text
    content: 'La femme avait chez elle un veau à l''étable ; elle se dépêcha de le sacrifier ; elle prit de la farine, la pétrit et fit cuire des pains sans levain. '
  '25':
  - type: text
    content: Elle les mit devant Saül et ses gens, et ils mangèrent. Puis ils partirent la nuit même.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Samuel était mort… dans sa ville  : cf. 25.1. –  les spirites et les médiums  : les deux mots hébreux correspondants ( ’ov et yid‘oni ) désignent deux catégories de devins dont il ne nous est pas facile aujourd''hui de déterminer précisément les procédés et les compétences ; cf. Lv 19.31 ; Dt 18.11 ; 2R 21.6 ; Es 8.19 ; cf. Ex 22.17. On a aussi pensé parfois qu''ils pourraient désigner les objets dont se servaient les devins pour pratiquer leur art.'
  - type: text
    content: Samuel était mort ; tout Israël s'était lamenté sur lui, et on l'avait enseveli à Rama, dans sa ville. Saül avait supprimé du pays les spirites et les médiums.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Shounem  : localité mentionnée en Jos 19.18n  ; 2R 4.8. –  Guilboa  : région de collines, au sud de Shounem, où Saül trouvera la mort, cf. 31.1,8 ; 2S 1.6. Ces deux endroits se situent dans le territoire de la tribu d''Issacar, au sud de la plaine de Jizréel.'
  - type: text
    content: 'Les Philistins se rassemblèrent et dressèrent leur camp à Shounem ; Saül rassembla tout Israël, et ils dressèrent leur camp à Guilboa. '
  '5':
  - type: note
    content: 'son cœur trembla beaucoup  : cf. Jb 18.11 ; Pr 28.1.'
  - type: text
    content: 'Quand Saül vit le camp des Philistins, il eut peur ; son cœur trembla beaucoup. '
  '6':
  - type: note
    content: 'interrogea le Seigneur  : cf. 10.22n  ; 14.37n. –  ne lui répondit pas  : cf. Ez 20.31 ; Pr 1.28. –  par les rêves  : cf. Nb 12.6 ; Mt 2.12. –  par l''ourim (ou les ourim), cf. 14.41n  ; Ex 28.30 ; Lv 8.8. –  par les prophètes  : cf. 2R 19.2 ; 22.13-15.'
  - type: text
    content: 'Saül interrogea le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne lui répondit pas, ni par les rêves, ni par l''ourim, ni par les prophètes.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'une femme qui évoque les morts  : litt. une femme maîtresse (ou propriétaire ) d''un ’ov , c.-à-d. soit une femme qui possède un objet divinatoire et sait s''en servir (cf. v. 3), soit une femme experte dans l''art d''évoquer les esprits des morts. –  Eïn-Dor  : cf. Jos 17.11. La localité se situait au sud du mont Tabor, et au nord-est du camp des Philistins (Shounem). Pour s''y rendre, Saül devra passer à proximité du camp ennemi, d''où les précautions qu''il prend (v. 8).'
  - type: text
    content: 'Saül dit aux gens de sa cour : Cherchez-moi une femme qui évoque les morts, et j''irai la consulter. Ils lui dirent : A Eïn-Dor il y a une femme qui évoque les morts. '
  '8':
  - type: note
    content: 'se déguisa  : cf. Jos 9.4 ; 1R 14.2 ; 22.30. –  Fais la divination  : cf. 1Ch 10.13. –  fais-moi monter ou fais monter pour moi, sous-entendu du séjour des morts.'
  - type: text
    content: 'Alors Saül se déguisa en mettant d''autres vêtements et partit avec deux hommes. Ils arrivèrent de nuit chez la femme. Saül lui dit : Fais la divination pour moi, je te prie, en évoquant un mort ; fais-moi monter celui que je te dirai. '
  '9':
  - type: note
    content: Cf. v. 3.
  - type: text
    content: 'La femme lui répondit : Tu sais bien ce que Saül a fait, comment il a retranché du pays les spirites et les médiums ; pourquoi donc me tends-tu un piège, pourquoi veux-tu me faire mettre à mort ? '
