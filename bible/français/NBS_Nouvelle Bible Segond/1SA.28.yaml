document_id: 1SA.28,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs troupes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'leurs camps. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 17.1 ; 29.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que tu te mettras en campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que tu sortiras au camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 8.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, les Philistins rassemblèrent leurs troupes et formèrent une armée pour faire la guerre à Israël. Akish dit à David : Tu sais bien que tu te mettras en campagne avec moi, toi et tes hommes. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Par la vie du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.39'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aucune faute…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu n'auras à subir aucun châtiment.
      marker-yv: yv-n
    - type: text
      text: 'Saül lui fit ce serment par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Par la vie du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', aucune faute ne te sera reprochée dans cette affaire. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que je te fasse monter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que je fasse monter pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même possibilité dans la suite du v.'
      marker-yv: yv-n
    - type: text
      text: 'La femme dit : Qui veux-tu que je te fasse monter ? Et il répondit : Fais-moi monter Samuel.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'On ne sait pas en quoi l''apparition de Samuel permet à la femme de découvrir l''identité de Saül. Plusieurs explications ont été proposées, mais aucune n''est convaincante. Quelques mss grecs ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lorsque la femme vit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= reconnut ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Saül…
      marker-yv: yv-n
    - type: text
      text: 'Lorsque la femme vit Samuel, elle poussa un grand cri et dit à Saül : Pourquoi m''as-tu trompée ? Tu es Saül ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’élohim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ce mot désigne soit Dieu, soit un dieu, soit encore les dieux, car il a la forme d''un pluriel (Gn 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). Dans le verset, le verbe est également au pluriel, d''où la traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je vois des dieux qui montent… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''évocation isolerait par la suite Samuel du groupe des trépassés dont la femme voit l''image. Le mot hébreu est parfois employé pour désigner des humains, par exemple en Ps 82.6. Certains pensent qu''il pourrait même désigner plus précisément dans ce contexte un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: spectre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fantôme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', les anciens Sémites ayant parfois appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: l'esprit d'un mort.
      marker-yv: yv-n
    - type: text
      text: 'Le roi lui dit : N''aie pas peur ! Que vois-tu ? La femme dit à Saül : Je vois un dieu qui monte de la terre. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un vieillard
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.1,5. – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'manteau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de Samuel a joué un rôle décisif dans le destin royal de Saül, cf. 15.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'inclina… prosterné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.23.'
      marker-yv: yv-n
    - type: text
      text: 'Il lui dit : Quelle apparence a-t-il ? Elle répondit : C''est un vieillard qui monte, et il est enveloppé d''un manteau. Saül sut ainsi que c''était Samuel ; il s''inclina face contre terre, prosterné. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grande détresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.6 ; 2S 24.14 ; cf. Jr 2.19 ; Ps 25.17 ; 116.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu s'est éloigné de moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne m'a répondu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6.'
      marker-yv: yv-n
    - type: text
      text: 'Samuel dit à Saül : Pourquoi m''as-tu troublé en me faisant monter ? Saül répondit : Je suis dans une grande détresse : les Philistins me font la guerre, et Dieu s''est éloigné de moi ; il ne m''a répondu ni par l''intermédiaire des prophètes ni par des rêves, et je t''ai appelé pour que tu me fasses savoir ce que je dois faire. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il est devenu ton adversaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lm 2.5 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il s''est mis du côté de ton prochain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Samuel dit : Pourquoi donc m''interroges-tu, puisque le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''est éloigné de toi et qu''il est devenu ton adversaire ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a agi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: a agi pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le pronom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut se rapporter, soit à Dieu lui-même (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quant au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ', il a agi comme…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), soit à David, mentionné nommément à la fin du v. (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' a agi envers lui…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). LXX a compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' a agi envers toi comme… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par mon intermédiaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'déchiré la royauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à un autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a agi comme il te l''a dit par mon intermédiaire ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a déchiré la royauté d''entre tes mains et l''a donnée à un autre, à David. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. chap. 15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écouté…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: écouté la voix de YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: obéi à son ordre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même aux v. 21-23 ; cf. 25.35 ; 1R 20.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu n'as pas traité…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Os 11.9.'
      marker-yv: yv-n
    - type: text
      text: 'Puisque tu n''as pas écouté le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et que tu n''as pas traité Amalec selon sa colère ardente, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' te traite ainsi en ce jour. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 31.1-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous serez avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans le monde des morts.'
      marker-yv: yv-n
    - type: text
      text: 'Avec toi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' livrera aussi Israël aux Philistins. Demain, toi et tes fils, vous serez avec moi, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' livrera les troupes d''Israël aux Philistins. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Eh bien, à toi de savoir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est pourquoi toi tu sauras ce que fera ton serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la réponse de David est sans doute volontairement ambiguë : Akish y entend une protestation de fidélité, alors que David ne s''engage en fait à rien de précis. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon garde du corps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le gardien de ma tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 29.2.'
      marker-yv: yv-n
    - type: text
      text: 'David répondit à Akish : Eh bien, à toi de savoir ce que je vais faire ! Et Akish dit à David : Alors, je ferai de toi pour toujours mon garde du corps.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül consulte la nécromancienne d'Eïn-Dor
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il avait très peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jb 15.20-24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rien mangé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pas mangé de pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 14.24-30 ; 30.12.'
      marker-yv: yv-n
    - type: text
      text: Aussitôt Saül tomba à terre, de toute sa hauteur ; il avait très peur, à cause des paroles de Samuel ; de plus, il manquait de forces, car il n'avait rien mangé de tout le jour et de toute la nuit.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'ai écouté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai risqué ma vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en t'écoutant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et j'ai écouté tes paroles que tu m'as dites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai exécuté l'ordre que tu m'as donné.
      marker-yv: yv-n
    - type: text
      text: 'La femme vint trouver Saül et, le voyant tout épouvanté, elle lui dit : Moi, ta servante, je t''ai écouté ; j''ai risqué ma vie en t''écoutant. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écoute-moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: écoute ma proposition
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quelque chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un morceau de pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant écoute-moi, toi aussi, je te prie ; laisse-moi te servir quelque chose à manger, afin que tu aies des forces pour te mettre en route. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ses gens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les gens de sa cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: insistèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 13.25,27 ; 2R 5.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il finit par les écouter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il écouta leur voix.
      marker-yv: yv-n
    - type: text
      text: 'Mais il refusa, en disant : Je ne mangerai pas. Ses gens et la femme aussi insistèrent auprès de lui, et il finit par les écouter. Il se releva de terre et s''assit sur le lit. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 18.6-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un veau à l'étable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 46.21+ ; Lc 15.23. – Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pains sans levain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n'ont sans doute pas ici de signification symbolique particulière ; la femme n'a tout simplement pas le temps de laisser fermenter de la pâte préparée avec du levain.
      marker-yv: yv-n
    - type: text
      text: 'La femme avait chez elle un veau à l''étable ; elle se dépêcha de le sacrifier ; elle prit de la farine, la pétrit et fit cuire des pains sans levain. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Elle les mit devant Saül et ses gens, et ils mangèrent. Puis ils partirent la nuit même.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Samuel était mort… dans sa ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 25.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les spirites et les médiums
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : les deux mots hébreux correspondants ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '’ov '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: yid‘oni
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) désignent deux catégories de devins dont il ne nous est pas facile aujourd'hui de déterminer précisément les procédés et les compétences ; cf. Lv 19.31 ; Dt 18.11 ; 2R 21.6 ; Es 8.19 ; cf. Ex 22.17. On a aussi pensé parfois qu'ils pourraient désigner les objets dont se servaient les devins pour pratiquer leur art.
      marker-yv: yv-n
    - type: text
      text: Samuel était mort ; tout Israël s'était lamenté sur lui, et on l'avait enseveli à Rama, dans sa ville. Saül avait supprimé du pays les spirites et les médiums.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Shounem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : localité mentionnée en Jos 19.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 4.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guilboa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : région de collines, au sud de Shounem, où Saül trouvera la mort, cf. 31.1,8 ; 2S 1.6. Ces deux endroits se situent dans le territoire de la tribu d''Issacar, au sud de la plaine de Jizréel.'
      marker-yv: yv-n
    - type: text
      text: 'Les Philistins se rassemblèrent et dressèrent leur camp à Shounem ; Saül rassembla tout Israël, et ils dressèrent leur camp à Guilboa. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' trembla beaucoup'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jb 18.11 ; Pr 28.1.'
      marker-yv: yv-n
    - type: text
      text: 'Quand Saül vit le camp des Philistins, il eut peur ; son cœur trembla beaucoup. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'interrogea le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne lui répondit pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 20.31 ; Pr 1.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par les rêves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 12.6 ; Mt 2.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par l''ourim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les ourim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), cf. 14.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 28.30 ; Lv 8.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 19.2 ; 22.13-15.'
      marker-yv: yv-n
    - type: text
      text: 'Saül interrogea le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ne lui répondit pas, ni par les rêves, ni par l''ourim, ni par les prophètes.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une femme qui évoque les morts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une femme maîtresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: propriétaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'un ’ov
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. soit une femme qui possède un objet divinatoire et sait s''en servir (cf. v. 3), soit une femme experte dans l''art d''évoquer les esprits des morts. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Eïn-Dor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jos 17.11. La localité se situait au sud du mont Tabor, et au nord-est du camp des Philistins (Shounem). Pour s''y rendre, Saül devra passer à proximité du camp ennemi, d''où les précautions qu''il prend (v. 8).'
      marker-yv: yv-n
    - type: text
      text: 'Saül dit aux gens de sa cour : Cherchez-moi une femme qui évoque les morts, et j''irai la consulter. Ils lui dirent : A Eïn-Dor il y a une femme qui évoque les morts. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se déguisa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 9.4 ; 1R 14.2 ; 22.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Fais la divination
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 10.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fais-moi monter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fais monter pour moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sous-entendu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du '
        - type: usfm
          marker: w
          children:
          - type: text
            text: séjour
        - type: text
          text: ' des morts.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Saül se déguisa en mettant d''autres vêtements et partit avec deux hommes. Ils arrivèrent de nuit chez la femme. Saül lui dit : Fais la divination pour moi, je te prie, en évoquant un mort ; fais-moi monter celui que je te dirai. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 3.
      marker-yv: yv-n
    - type: text
      text: 'La femme lui répondit : Tu sais bien ce que Saül a fait, comment il a retranché du pays les spirites et les médiums ; pourquoi donc me tends-tu un piège, pourquoi veux-tu me faire mettre à mort ? '
