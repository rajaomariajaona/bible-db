        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'De '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
