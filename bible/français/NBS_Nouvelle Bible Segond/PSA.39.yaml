      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yedoutoun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yeditoun
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon les mss hébreux et versions anciennes) : cf. 62.1 ; 77.1 ; 1Ch 9.16 ; 16.38,41 ; 25.1,3,6 ; 2Ch 5.12.'
      marker-yv: yv-n
    - type: text
      text: Du chef de chœur. De Yedoutoun. Psaume. De David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 2+s.
      marker-yv: yv-n
    - type: text
      text: Je reste muet, je n'ouvre pas la bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est toi qui agis.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
