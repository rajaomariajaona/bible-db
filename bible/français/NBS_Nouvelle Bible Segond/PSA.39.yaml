        children:
        - type: text
          text: '39.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tes coups '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton fléau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
