document_id: PSA.39,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ecarte de moi tes coups ! La vie est si courte…
  - type: text
    content: ' '
  - type: note
    content: 'De (ou à  ; cf. 3.1n) Yedoutoun (ou Yeditoun , selon les mss hébreux et versions anciennes) : cf. 62.1 ; 77.1 ; 1Ch 9.16 ; 16.38,41 ; 25.1,3,6 ; 2Ch 5.12.'
  - type: text
    content: Du chef de chœur. De Yedoutoun. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 2+s.
  - type: text
    content: Je reste muet, je n'ouvre pas la bouche,
  - type: text
    content: car c'est toi qui agis.
  '11':
  - type: text
    content: ' '
  - type: note
    content: tes coups ou ton fléau  ; cf. 32.4 ; 38.12n  ; 89.33.
  - type: text
    content: Eloigne de moi tes coups !
  - type: text
    content: Je défaille sous les attaques de ta main.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Tu corriges ou tu instruis  ; cf. Pr 1.2n. –  en le châtiant ou en le reprenant, en l'avertissant  ; cf. Pr 1.23n. –  comme les mites Jb 13.28. –  vapeur v. 7n.
  - type: text
    content: Tu corriges l'homme en le châtiant pour sa faute ;
  - type: text
    content: comme les mites, tu ronges ce qu'il a de plus désirable.
  - type: text
    content: 'Oui, tout homme est vapeur. '
  - type: text
    content: Pause.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Entends ma prière 54.4. –  ne te tais pas…  : cf. v. 3 ; autres traductions ne sois pas sourd à mes pleurs ; ne reste pas sans rien faire devant mes pleurs. –  je suis un immigré  : cf. 15.1 ; 119.19 ; Gn 23.4 ; Lv 25.23 ; 1Ch 29.15 ; Hé 11.13 ; 1P 2.11.'
  - type: text
    content: 'Entends ma prière, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: prête l'oreille à mes appels au secours,
  - type: text
    content: ne te tais pas devant mes pleurs !
  - type: text
    content: Car je suis un immigré chez toi,
  - type: text
    content: un résident temporaire, comme tous mes pères.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Détourne de moi le regard  : cf. 13.4 ; 25.18s ; 59.5 ; Jb 7.19-21 ; 10.20-22 ; 14.6.'
  - type: text
    content: Détourne de moi le regard et mon visage s'éclairera,
  - type: text
    content: avant que je m'en aille et que je ne sois plus !
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 10 ; 37.7 ; 38.14 ; 73.15 ; 141.3 ; Ml 3.13ss ; Jb 2.10.
  - type: text
    content: 'Je disais : Je garderai mes voies'
  - type: text
    content: de peur de pécher par ma langue ;
  - type: text
    content: je garderai un frein à ma bouche,
  - type: text
    content: tant que le méchant sera devant moi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'loin du bonheur  : traduction incertaine ; on pourrait aussi comprendre en vain. –  était extrême  : le même verbe, à une autre forme, est traduit par attirer le malheur sur en Gn 34.30+.'
  - type: text
    content: Je suis resté muet, silencieux ;
  - type: text
    content: je me suis tu, loin du bonheur ;
  - type: text
    content: ma douleur était extrême.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Mon cœur brûlait  : cf. 32.3 ; Dt 19.6 ; Jr 20.9 ; Lc 24.32.'
  - type: text
    content: Mon cœur brûlait au dedans de moi ;
  - type: text
    content: dans mon murmure, un feu dévorait,
  - type: text
    content: 'et la parole est venue sur ma langue :'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 89.48.
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi connaître ma fin,'
  - type: text
    content: quelle est la mesure de mes jours ;
  - type: text
    content: que je sache combien je suis fragile.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 62.10 ; 90.9s ; Jb 7.6-21 ; 14.1-5. –  de ma vie  : sous-entendu dans le texte. –  vapeur  : autre traduction futilité  ; cf. v. 12 ; 62.10 ; 78.39 ; 94.11n  ; 144.4 ; Gn 4.2n  ; Jb 7.7 ; Ec 1.2n  ; Jc 4.14.'
  - type: text
    content: Tu as donné à mes jours la largeur de la main,
  - type: text
    content: et la durée de ma vie est comme un rien devant toi.
  - type: text
    content: 'Oui, tout homme debout n''est que vapeur. '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'comme une ombre  : litt. dans une image , même mot qu''en Gn 1.26s ; cf. Ps 73.20 ; 102.12. –  il s''agite  : autre traduction il fait du bruit  ; certains modifient le texte hébreu traditionnel pour lire les biens qu''il amasse sont une vapeur, il ne sait qui les recueillera  ; Ec 2.18s ; 6.2 ; Lc 12.18-21.'
  - type: text
    content: Oui, l'homme se promène comme une ombre ;
  - type: text
    content: il s'agite, mais c'est une vapeur !
  - type: text
    content: Il amasse et il ne sait qui recueillera.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Jb 17.13-16.
  - type: text
    content: Maintenant, Seigneur, que puis-je espérer ?
  - type: text
    content: C'est toi que j'attends.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'de toutes mes transgressions  : certains modifient la vocalisation traditionnelle du texte hébreu pour lire de ceux qui se dressent (le terme traduit par transgression a aussi le sens de révolte ) contre moi. Voir péché. –  aux outrages  : autre traduction au déshonneur. –  du fou  : cf. 14.1.'
  - type: text
    content: Délivre-moi de toutes mes transgressions !
  - type: text
    content: Ne m'expose pas aux outrages du fou !
