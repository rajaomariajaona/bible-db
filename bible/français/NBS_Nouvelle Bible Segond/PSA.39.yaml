  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ecarte de moi tes coups ! La vie est si courte…
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: usfm
      marker: vlbl
