        children:
        - type: text
          text: '39.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu corriges '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu instruis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Pr 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en le châtiant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en le reprenant, en l'avertissant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Pr 1.23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme les mites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jb 13.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vapeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tu corriges l'homme en le châtiant pour sa faute ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme les mites, tu ronges ce qu'il a de plus désirable.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, tout homme est vapeur. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause.
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Entends ma prière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '54.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne te tais pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 3 ; autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne sois pas sourd à mes pleurs ; ne reste pas sans rien faire devant mes pleurs. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je suis un immigré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 15.1 ; 119.19 ; Gn 23.4 ; Lv 25.23 ; 1Ch 29.15 ; Hé 11.13 ; 1P 2.11.'
      marker-yv: yv-n
    - type: text
      text: 'Entends ma prière, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: prête l'oreille à mes appels au secours,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ne te tais pas devant mes pleurs !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car je suis un immigré chez toi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un résident temporaire, comme tous mes pères.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Détourne de moi le regard
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 13.4 ; 25.18s ; 59.5 ; Jb 7.19-21 ; 10.20-22 ; 14.6.'
      marker-yv: yv-n
    - type: text
      text: Détourne de moi le regard et mon visage s'éclairera,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: avant que je m'en aille et que je ne sois plus !
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 10 ; 37.7 ; 38.14 ; 73.15 ; 141.3 ; Ml 3.13ss ; Jb 2.10.
      marker-yv: yv-n
    - type: text
      text: 'Je disais : Je garderai mes voies'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur de pécher par ma langue ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je garderai un frein à ma bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tant que le méchant sera devant moi.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: loin du bonheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en vain. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: était extrême
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe, à une autre forme, est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'attirer le malheur sur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Gn 34.30+.
      marker-yv: yv-n
    - type: text
      text: Je suis resté muet, silencieux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je me suis tu, loin du bonheur ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma douleur était extrême.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' brûlait'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 32.3 ; Dt 19.6 ; Jr 20.9 ; Lc 24.32.'
      marker-yv: yv-n
    - type: text
      text: Mon cœur brûlait au dedans de moi ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans mon murmure, un feu dévorait,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et la parole est venue sur ma langue :'
  '5':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 89.48.
      marker-yv: yv-n
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', fais-moi connaître ma fin,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quelle est la mesure de mes jours ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que je sache combien je suis fragile.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 62.10 ; 90.9s ; Jb 7.6-21 ; 14.1-5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ma vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vapeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: futilité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 12 ; 62.10 ; 78.39 ; 94.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 144.4 ; Gn 4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jb 7.7 ; Ec 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jc 4.14.'
      marker-yv: yv-n
    - type: text
      text: Tu as donné à mes jours la largeur de la main,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la durée de ma vie est comme un rien devant toi.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Oui, tout homme debout n''est que vapeur. '
    - type: usfm
      marker: qs
      children:
      - type: text
        text: Pause.
  '7':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme une ombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans une image
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même mot qu''en Gn 1.26s ; cf. Ps 73.20 ; 102.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il s'agite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il fait du bruit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les biens qu'il amasse sont une vapeur, il ne sait qui les recueillera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; Ec 2.18s ; 6.2 ; Lc 12.18-21.
      marker-yv: yv-n
    - type: text
      text: Oui, l'homme se promène comme une ombre ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il s'agite, mais c'est une vapeur !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Il amasse et il ne sait qui recueillera.
  '8':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jb 17.13-16.
      marker-yv: yv-n
    - type: text
      text: Maintenant, Seigneur, que puis-je espérer ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: C'est toi que j'attends.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de toutes mes transgressions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains modifient la vocalisation traditionnelle du texte hébreu pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de ceux qui se dressent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'transgression '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a aussi le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: révolte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'contre moi. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux outrages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au déshonneur. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
