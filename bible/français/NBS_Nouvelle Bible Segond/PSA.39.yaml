        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 89.33.'
      marker-yv: yv-n
    - type: text
      text: Eloigne de moi tes coups !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je défaille sous les attaques de ta main.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
