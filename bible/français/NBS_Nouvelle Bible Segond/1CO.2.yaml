        text: '8.14 : « Vous ne découvrirez pas les profondeurs du cœur de l''homme et vous ne saisirez pas les raisonnements de son intelligence. Comment donc sonderez-vous le Dieu qui a fait tout cela, connaîtrez-vous sa pensée et comprendrez-vous son dessein ? »'
    marker-yv: yv-n
  - type: text
    text: 'Qui donc, parmi les humains, sait ce qui relève de l''humain, sinon l''esprit de l''humain qui est en lui ? De même, personne ne connaît ce qui relève de Dieu, sinon l''Esprit de Dieu. '
