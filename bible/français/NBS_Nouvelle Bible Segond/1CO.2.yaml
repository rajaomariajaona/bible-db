document_id: 1CO.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Annoncer le Christ crucifié
  - type: text
    content: ' '
  - type: note
    content: 'chez vous  : autre traduction vous voir (4.18ss). –  langage / sagesse 1.17n. –  le mystère  : certains mss portent le témoignage  ; cf. v. 7n  ; 4.1 ; 13.2 ; 15.51 ; Rm 11.25 ; 16.25+.'
  - type: text
    content: 'Pour ma part, mes frères, lorsque je suis venu chez vous, ce n''est pas avec une supériorité de langage ou de sagesse que je suis venu vous annoncer le mystère de Dieu. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dn 2.21-23 ; Mt 11.25/ /. –  l''Esprit sonde tout  : cf. Pr 20.27 ; Jn 3.8n. –  profondeurs  : cf. Jb 11.7s ; 12.22 ; Ec 7.24 ; Dn 2.22 ; Rm 11.33 ; voir aussi Ap 2.24.'
  - type: text
    content: 'Or c''est à nous que Dieu l''a révélé par l''Esprit. Car l''Esprit sonde tout, même les profondeurs de Dieu. '
  '11':
  - type: note
    content: 'Cf. Za 12.1+ ; Rm 8.16 ; Judith 8.14 : « Vous ne découvrirez pas les profondeurs du cœur de l''homme et vous ne saisirez pas les raisonnements de son intelligence. Comment donc sonderez-vous le Dieu qui a fait tout cela, connaîtrez-vous sa pensée et comprendrez-vous son dessein ? »'
  - type: text
    content: 'Qui donc, parmi les humains, sait ce qui relève de l''humain, sinon l''esprit de l''humain qui est en lui ? De même, personne ne connaît ce qui relève de Dieu, sinon l''Esprit de Dieu. '
  '12':
  - type: note
    content: Cf. Jn 14.17 ; 16.13s ; 1Jn 5.20. –  ce que Dieu nous a donné par grâce Rm 8.32n.
  - type: text
    content: 'Or nous, ce n''est pas l''esprit du monde que nous avons reçu, mais l''Esprit qui vient de Dieu, pour que nous sachions ce que Dieu nous a donné par grâce. '
  '13':
  - type: note
    content: 'sagesse humaine 1.17+. –  ceux qu''enseigne l''Esprit Jn 14.26+. –  en associant…  : traduction difficile ; autres possibilités  : en exprimant (ou en interprétant) les choses spirituelles en termes spirituels (ou pour des êtres spirituels) ; en jugeant (verbe apparenté v. 14ns) de ce qui est spirituel selon les critères de l''Esprit  ; voir 12.1n.'
  - type: text
    content: 'Et nous en parlons, non avec les discours qu''enseigne la sagesse humaine, mais avec ceux qu''enseigne l''Esprit, en associant le spirituel au spirituel. '
  '14':
  - type: note
    content: 'l''homme  : autre traduction l''être humain. –  naturel  : litt. psychique, du grec psukhè, traditionnellement rendu par âme (cf. Mt 10.28n  ; certains traduisent animal, au sens dérivé, selon l''étymologie, du latin anima [= âme]) ; cf. 15.44n,45n  ; Hé 4.12n  ; Jc 3.15 ; Jd 19. –  n''accueille pas  : cf. Jn 14.17. –  folie 1.18+. –  il ne peut pas connaître Jn 8.43+ ; Rm 8.7. –  qu''on en juge  : autres traductions qu''on le discerne ; qu''on l''examine (même possibilité au v. 15) ; le verbe grec, dérivé de celui qui est habituellement traduit par juger, se retrouve en 4.3s ; 9.3 ; 10.25,27 (poser une question) ; 14.24 ; Ac 4.9n (interroger) ; 17.11n (examiner).'
  - type: text
    content: 'Mais l''homme naturel n''accueille pas ce qui relève de l''Esprit de Dieu, car c''est une folie pour lui ; il ne peut pas connaître cela, parce que c''est spirituellement qu''on en juge. '
  '15':
  - type: note
    content: Cf. 14.24 ; 1Jn 2.20.
  - type: text
    content: 'L''être spirituel, lui, juge de tout, tandis que lui-même n''est jugé par personne. '
  '16':
  - type: note
    content: 'Es 40.13  ; Jr 23.18 ; Rm 11.34 ; cf. Sagesse 9.17 : « Et ta volonté, qui donc l''aurait connue, si tu n''avais donné toi-même la Sagesse et envoyé d''en haut ton saint Esprit ? » –  la pensée du Christ  : cf. Rm 8.9ss ; Ep 3.16-19 ; 1Jn 4.17.'
  - type: text
    content: 'En effet, '
  - type: text
    content: qui a connu la pensée du Seigneur, pour l'instruire ?
  - type: text
    content: ' Or nous, nous avons la pensée du Christ.'
  '2':
  - type: note
    content: 1.23 ; Ga 6.14.
  - type: text
    content: 'Car j''ai jugé bon, parmi vous, de ne rien savoir d''autre que Jésus-Christ – Jésus-Christ crucifié. '
  '3':
  - type: note
    content: crainte / tremblement 2Co 7.15+. – Cf. Ac 18.9 ; 2Co 10.1,10 ; 11.30 ; Ga 4.13.
  - type: text
    content: 'Moi-même, j''étais chez vous dans un état de faiblesse, de crainte et de grand tremblement ; '
  '4':
  - type: note
    content: 'des discours persuasifs…  : certains mss portent un texte légèrement différent qu''on pourrait traduire  : de l''art de persuasion propre à la sagesse [humaine]. –  Esprit Mt 10.20+. –  puissance 1.18+ ; cf. 4.20 ; 2Co 6.7 ; 12.12. – Cf. 14.25 ; Rm 15.19 ; 1Th 1.5.'
  - type: text
    content: 'ma parole et ma proclamation n''avaient rien des discours persuasifs de la sagesse ; c''était une démonstration d''Esprit, de puissance, '
  '5':
  - type: note
    content: Cf. Ep 1.17-20 ; 1P 1.5.
  - type: text
    content: pour que votre foi ne soit pas en la sagesse des humains, mais en la puissance de Dieu.
  - type: heading
    content: La sagesse de Dieu
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'nous énonçons  : le verbe grec ainsi traduit ici et au v. 7 est généralement rendu par parler (v. 13 ; 3.1 etc.) ou dire (Ac 4.29+). –  les gens « accomplis » ou parfaits , ou encore les adultes , par opposition aux tout-petits (3.1) ; le terme désignait souvent les initiés des religions dites à mystères  ; cf. 3.18 ; 13.10 ; 14.20 ; Ep 4.13 ; Ph 3.15 ; Col 1.28. –  princes (ou chefs ) de ce monde  : cf. 1.20n  ; 2.8 ; Jn 12.31+ ; Ep 1.21+. –  qui doivent être (litt. qui sont en train d''être ) réduits à rien 15.24-26.'
  - type: text
    content: 'Cependant, c''est bien une sagesse que nous énonçons parmi les gens « accomplis » : une sagesse qui n''est pas de ce monde ni des princes de ce monde, qui doivent être réduits à rien ; '
  '7':
  - type: note
    content: 'mystérieuse  : litt. en mystère, cf. v. 1+ ; voir aussi Mt 13.11,35 ; Lc 10.21 ; Ep 1.9 ; 3.4s,9 ; Col 1.26s. –  destinée d''avance Rm 8.29s ; Ep 1.5,11 ; cf. Ac 2.23n. –  depuis toujours  : litt. avant les âges ou les mondes, même mot aux v. 6 et 8 ; cf. Ga 1.5n  ; Ep 2.2n. –  à (ou pour) notre gloire Rm 9.23.'
  - type: text
    content: 'nous énonçons la sagesse de Dieu, mystérieuse et cachée, celle que Dieu a destinée d''avance, depuis toujours, à notre gloire ; '
  '8':
  - type: note
    content: 'aucun des princes (v. 6+) … ne l''a connue  : cf. Jn 1.10 ; Ac 13.27 ; voir aussi Mc 15.39 ; Lc 23.34. –  glorieux  : litt. de la gloire  ; Jc 2.1. – Cf. Epître d''Ignace d''Antioche aux Ephésiens 19.1 : « Le prince de ce monde (cf. Jn 12.31 ; 14.30) a ignoré la virginité de Marie, et son enfantement, de même que la mort du Seigneur, trois mystères retentissants, qui furent accomplis dans le silence de Dieu. »'
  - type: text
    content: 'aucun des princes de ce monde ne l''a connue, car s''ils l''avaient connue, ils n''auraient pas crucifié le Seigneur glorieux. '
  '9':
  - type: note
    content: 'D''après Origène ce v. serait une citation de l’Apocalypse d''Elie, un texte qui ne nous est pas parvenu. Il pourrait aussi s''agir d''une combinaison de plusieurs passages de l''A.T. (Es 64.3 ; 52.15 ; Jr 3.16). Evangile selon Thomas 17 : « Jésus a dit : “Je vous donnerai ce qu''aucun œil n''a vu et ce qu''aucune oreille n''a entendu et ce qu''aucune main n''a touché et ce qui n''est jamais monté au cœur de l''homme.” » –  l''homme  : autre traduction l''être humain (cf. v. 5 etc.). –  pour ceux qui l''aiment Rm 8.28 ; cf. Siracide 1.10 : « Il l''a accordée (la Sagesse) à ceux qui l''aiment, lui. »'
  - type: text
    content: Mais c'est, comme il est écrit,
  - type: text
    content: ce que l'œil n'a pas vu, ce que l'oreille n'a pas entendu,
  - type: text
    content: et ce qui n'est pas venu au cœur de l'homme,
  - type: text
    content: ce que Dieu a préparé pour ceux qui l'aiment
  - type: text
    content: .
