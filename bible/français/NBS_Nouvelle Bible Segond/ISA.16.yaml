document_id: ISA.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les réfugiés de Moab
  - type: text
    content: ' '
  - type: note
    content: 'Envoyez un jeune bélier…  : cf. 2R 3.4. –  Séla ( Roche ) : cf. Jg 1.36n  ; 2R 14.7. –  Sion la belle  : litt. la fille de Sion  ; cf. 1.8n.'
  - type: text
    content: Envoyez un jeune bélier à celui qui est maître du pays,
  - type: text
    content: de Séla, par le désert,
  - type: text
    content: à la montagne de Sion la belle.
  '10':
  - type: text
    content: ' '
  - type: note
    content: cris de vendange v. 9n  ; Jr 48.33n.
  - type: text
    content: La joie et l'allégresse ont disparu du verger ;
  - type: text
    content: dans les vignes, plus de cris de joie, plus d'acclamations !
  - type: text
    content: Le vendangeur ne foule plus le raisin dans les cuves ;
  - type: text
    content: j'ai fait cesser les cris de vendange.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'mon cœur  : litt. mon intérieur. –  Qir-Harès = Qir-Moab (15.1n) ; Qir-Haréseth (v. 7) ; voir aussi Jr 48.31n.'
  - type: text
    content: C'est pourquoi mes entrailles frémissent pour Moab, comme une lyre,
  - type: text
    content: mon cœur pour Qir-Harès.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'paraît  : litt. est vu , cf. 1.12n  ; Ex 23.15n. –  sur le haut lieu  : autres traductions près du haut lieu ; sur la hauteur 15.2. –  sanctuaire  : LXX traduit ici le mot hébreu, dérivé de la racine évoquant l''idée de saint ou sacré , par un terme grec qui signifie litt. fait par la main (de l''homme) et que l''on retrouve en Ac 7.48+.'
  - type: text
    content: Moab paraît, il se fatigue sur le haut lieu.
  - type: text
    content: Il arrive à son sanctuaire pour prier et ne peut rien obtenir.
  '13':
  - type: text
    content: 'Telle est la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a prononcée depuis longtemps au sujet de Moab. '
  '14':
  - type: note
    content: 'comme les années d''un salarié ou d''un mercenaire  : il faut sûrement comprendre pas un jour de plus  ; 21.16 ; Lv 25.50. –  toute la grande multitude  : autres traductions l''abondance considérable ; le puissant tumulte. – Cf. 10.25 ; 29.17.'
  - type: text
    content: 'Et maintenant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononce ces mots : Dans trois ans, comme les années d''un salarié, la gloire de Moab sera méprisée. Malgré toute la grande multitude, le reste sera réduit à très peu de chose, et sans importance.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Arnon  : principal cours d''eau de Moab (Nb 21.13,26-28 ; Jos 12.2 ; 13.9,16).'
  - type: text
    content: Tel un oiseau fugitif, telle une nichée dispersée,
  - type: text
    content: 'telles seront les filles de Moab, aux gués de l''Arnon :'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Tiens / prends  : d''après une ancienne traduction de lecture ; autre texte donnez / prenez. –  décision 28.7 ; Ex 21.22n. –  étends  : on peut comprendre les phrases suivantes (peut-être même jusqu''au v. 5) comme une requête de Moab au roi de Juda (cf. v. 1). –  ne trahis pas  : litt. ne dévoile pas ou n''expose pas  ; le verbe correspondant peut aussi avoir le sens d’ exiler.'
  - type: text
    content: Tiens conseil, prends une décision,
  - type: text
    content: étends en plein midi ton ombre comme la nuit,
  - type: text
    content: cache les réfugiés,
  - type: text
    content: ne trahis pas le fugitif !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Que mes réfugiés…  : plusieurs mss hébreux et des versions anciennes ont lu  : que les réfugiés de Moab séjournent en immigrés (cf. Ex 12.48n) chez toi , ce qui correspondrait à une vocalisation différente du texte hébreu traditionnel. Cf. Dt 10.18. –  celui qui ravage tout  : litt. le ravageur  ; probablement le roi d''Assyrie ; cf. 21.2 ; 33.1 ; Ab 5n.'
  - type: text
    content: Que mes réfugiés séjournent en immigrés chez toi, Moab !
  - type: text
    content: Sois pour eux une cachette devant celui qui ravage tout !
  - type: text
    content: Car c'est la fin de celui qui pressure ;
  - type: text
    content: le ravage s'achève,
  - type: text
    content: celui qui piétine disparaît du pays.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '9.1-6 ; 11.3s ; 2S 7.13 ; Jr 23.5 ; 33.15 ; Pr 25.5 ; Lc 1.33. –  sera assis  : position du roi ( trône ) et du juge . –  un homme loyal  : litt. en loyauté ou en vérité . –  cherchant l''équité  : litt. qui recherche le droit  ; cf. 1.17.'
  - type: text
    content: Le trône s'affermira par la fidélité.
  - type: text
    content: Sur lui, dans la tente de David, sera assis un homme loyal,
  - type: text
    content: un juge cherchant l'équité et prompt à rendre la justice.
  - type: heading
    content: Lamentation sur Moab
  '6':
  - type: text
    content: ' '
  - type: note
    content: Voir Jr 48.29-33 et les notes ; So 2.8.
  - type: text
    content: Nous avons appris l'orgueil de Moab,
  - type: text
    content: – un orgueil extrême –
  - type: text
    content: sa suffisance et son orgueil,
  - type: text
    content: son emportement et ses vantardises inutiles.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vous gémissez  : d''après un ms et Tg, certains modifient le texte pour lire ils gémissent ou on gémit , ou encore l''impératif gémissez. –  les ruines  : sens incertain. Le même mot, au féminin, est traduit par gâteaux de raisins en 2S 6.19 ; Os 3.1 (cf. Jr 44.19) ; Ct 2.5 ; 1Ch 16.3. Cf. les vignes au verset suivant. –  Qir-Haréseth = Qir-Moab  ; cf. 15.1n  ; Jr 48.31n.'
  - type: text
    content: C'est pourquoi Moab hurle sur Moab, chacun hurle ;
  - type: text
    content: vous gémissez sur les ruines de Qir-Haréseth,
  - type: text
    content: profondément abattus.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'le pays  : autres traductions les campagnes, les champs. –  Heshbôn 15.4n. –  ceps de qualité 5.2n. –  Sibma  : entre Heshbôn et Nebo (Nb 32.3,38 ; Jos 13.19 ; Jr 48.32). –  Yazer  : au nord de Heshbôn (Nb 21.32 ; 32.1 ; Jos 13.25 ; 21.39 ; 2S 24.5). –  s''égaraient  : cf. 28.7n. –  la mer Morte.'
  - type: text
    content: Car le pays de Heshbôn dépérit ;
  - type: text
    content: les maîtres des nations ont frappé les ceps de qualité de la vigne de Sibma,
  - type: text
    content: qui s'étendaient jusqu'à Yazer,
  - type: text
    content: 'qui s''égaraient dans le désert :'
  - type: text
    content: ses sarments se prolongeaient et dépassaient la mer.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'comme Yazer la pleure  : litt. avec les larmes de Yazer. –  Eléalé 15.4n. –  les cris de la vendange  : hébreu hédâd , sans doute une onomatopée (de même au v. 10) ; cf. Jr 25.30+ ; sur l''image à double sens de la vendange, voir 24.7-13 ; 63.1-6.'
  - type: text
    content: C'est pourquoi je pleurerai la vigne de Sibma comme Yazer la pleure ;
  - type: text
    content: je t'abreuverai de mes larmes, Heshbôn, Eléalé,
  - type: text
    content: car sur ta récolte et sur ta moisson
  - type: text
    content: les cris de la vendange sont tombés.
