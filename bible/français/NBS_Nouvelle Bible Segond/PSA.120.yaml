        text: '(même mot en hébreu) ou marches du temple lui-même (cf. Ex 20.26 ; 1R 10.19s ; Ez 40.6,22,26,31,34,37,49 ; 43.17 ; 2Ch 9.18s ; voir aussi Né 3.15 ; 12.37). On a aussi mis en évidence le caractère '
