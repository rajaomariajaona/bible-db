document_id: PSA.120,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme injustement accusé
  - type: text
    content: ' '
  - type: note
    content: 'Selon certains, le grand Hallel (136.1n  ; cf. 113.1n) commençait dès le Psaume 120. –  des montées (120–134) : cette indication a été diversement comprise ; elle pourrait désigner les chants des pèlerins montant en procession à Jérusalem, puis au temple (cf. 24.3 ; 84.6n  ; 122.4 ; Ex 23.14ss ; Mc 10.33 ; Lc 2.42 ; voir aussi 2S 6 ; 1R 12.32s ; 2R 23.1s ; Es 2.3 ; Jr 31.6 ; Esd 2.1 ; 7.9), ou bien des cantiques chantés sur des degrés (même mot en hébreu) ou marches du temple lui-même (cf. Ex 20.26 ; 1R 10.19s ; Ez 40.6,22,26,31,34,37,49 ; 43.17 ; 2Ch 9.18s ; voir aussi Né 3.15 ; 12.37). On a aussi mis en évidence le caractère graduel de certains de ces psaumes, où le mot qui termine un verset est repris au début du suivant (mais le même phénomène apparaît aussi ailleurs). –  dans ma détresse… 18.7 ; 34.7 ; 81.8 ; 86.7 ; 116.3s ; 118.5,21 ; voir aussi 3.5+ ; 1S 1.10 ; Jon 2.3.'
  - type: text
    content: Chant des montées.
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que j''ai invoqué dans ma détresse,'
  - type: text
    content: et il m'a répondu.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 5.10+ ; 31.19 ; 52.4,6 ; 109.2.
  - type: text
    content: Seigneur
  - type: text
    content: ', délivre-moi de la lèvre menteuse,'
  - type: text
    content: de la langue trompeuse !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine ; on pourrait aussi comprendre  : Que te donnera-t-on, que t''ajoutera-t-on, langue trompeuse ? ou encore Que te donnera-t-il (Dieu)… ; cf. 28.4 ; 1S 3.17n  ; 14.44n  ; Os 9.14.'
  - type: text
    content: Que te donne, que te rapporte
  - type: text
    content: une langue trompeuse ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: Les traits… 7.13s ; 11.2 ; 35.3 ; 45.6 ; 57.5 ; 64.3s ; Es 5.28. –  braises 11.6 ; 140.11.
  - type: text
    content: – Les traits aigus du guerrier,
  - type: text
    content: avec les braises du genêt.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 42.7. –  séjourner en immigré  : cf. Ex 12.48n. –  Méshek , loin au nord d''Israël ; Gn 10.2n  ; Ez 27.13+. –  Qédar , au sud-est ; Gn 25.13n.'
  - type: text
    content: Quel malheur pour moi de séjourner en immigré à Méshek,
  - type: text
    content: de demeurer parmi les tentes de Qédar !
  '6':
  - type: text
    content: ' '
  - type: note
    content: ceux qui détestent , d'après certains mss hébreux et des versions anciennes ; texte hébreu traditionnel celui qui déteste.
  - type: text
    content: Trop longtemps j'ai demeuré
  - type: text
    content: auprès de ceux qui détestent la paix.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Je suis pour la paix… ou je suis la paix  ; certains témoins du texte portent je parle pour la paix, mais ils sont pour la guerre (cf. 28.3 ; 35.20n) ; quelques-uns modifient le texte hébreu traditionnel pour lire je suis pour la paix et la vérité, mais ils sont pour la guerre  ; voir aussi 109.5.
  - type: text
    content: Je suis pour la paix ; mais dès que je parle,
  - type: text
    content: eux, ils sont pour la guerre.
