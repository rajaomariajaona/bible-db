document_id: LEV.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Respect de l'union conjugale
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: 'Tu n''exposeras pas la nudité de la fille de ton fils ou de la fille de ta fille : c''est ta nudité.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'apparentée…  : autre traduction née à ton père (cf. v. 9).'
  - type: text
    content: Tu n'exposeras pas la nudité de la fille de la femme de ton père ; elle est apparentée à ton père, c'est ta sœur.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '20.19 ; cf. Ex 6.20n. –  la proche parente  : litt. la chair (mot traduit par corps dans la note sur v. 6), de même au v. 13.'
  - type: text
    content: Tu n'exposeras pas la nudité de la sœur de ton père. C'est la proche parente de ton père.
  '13':
  - type: text
    content: Tu n'exposeras pas la nudité de la sœur de ta mère. C'est la proche parente de ta mère.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 20.20.
  - type: text
    content: Tu n'exposeras pas la nudité du frère de ton père. Tu ne t'approcheras pas de sa femme. C'est ta tante.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 20.12 ; Gn 38.16,26 ; Ez 22.11.
  - type: text
    content: 'Tu n''exposeras pas la nudité de ta belle-fille. C''est la femme de ton fils : tu n''exposeras pas sa nudité.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 20.21 ; cf. Dt 25.5-10 ; Mt 14.3-12/ /.
  - type: text
    content: Tu n'exposeras pas la nudité de la femme de ton frère. C'est la nudité de ton frère.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 20.14 ; Dt 27.23.
  - type: text
    content: 'Tu n''exposeras pas la nudité d''une femme et de sa fille. Tu ne prendras pas la fille de son fils, ni la fille de sa fille, pour exposer leur nudité. Ce sont des proches parentes : c''est une infamie. '
  '18':
  - type: note
    content: 'tu exciterais une rivalité  : terme rare et traduction incertaine ; cf. Gn 29.15-30.'
  - type: text
    content: Tu ne prendras pas la sœur de ta femme ; tu exciterais une rivalité en exposant sa nudité en plus de celle de ta femme, du vivant de celle-ci.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 12.2+ ; 15.19ss ; 20.18 ; Ez 18.6 ; 22.10.
  - type: text
    content: 'Tu ne t''approcheras pas d''une femme rendue impure par sa souillure menstruelle, pour exposer sa nudité. '
  '2':
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu. '
  '20':
  - type: note
    content: 'de ton compatriote  : même terme en 19.11,15,17 ; 24.19 ; 25.14s,17 ; autre traduction de ton semblable  ; cf. 20.10 ; voir 15.18n  ; Ex 20.14 ; 2S 11.4 ; Ez 22.11.'
  - type: text
    content: 'Tu n''auras pas de rapports sexuels avec la femme de ton compatriote ; tu te rendrais impur avec elle. '
  '21':
  - type: note
    content: 'Cf. 20.2-5 ; Gn 22 ; Dt 12.31 ; 18.10 ; 2R 16.3 ; 17.17 ; Jr 7.31 ; 19.5 ; 32.35 ; Ez 16.20-21n  ; 20.26 ; Mi 6.7s ; Ps 106.37s. –  de tes enfants  : litt. de ta descendance, cf. Gn 3.15n. –  faire passer Ex 13.12+. –  Molek ou Moloch, d''après les transcriptions grecque et latine ; la lecture traditionnelle de l''hébreu semble associer, comme souvent quand il s''agit de désigner des dieux étrangers, les voyelles d''un terme de mépris (ici bosheth = honte) aux consonnes d''un nom propre ou d''un titre (ici mlk, qu''on lirait le plus naturellement mélek = roi) ; le mot rappelle aussi le nom (ou le titre royal) du dieu ammonite Milkom (1R 11.5,7 ; 2R 23.13 ; cf. 2S 12.30n). A Carthage, cependant, un terme très proche (molk) désignait, non pas une divinité, mais le sacrifice humain lui-même ; peut-être l''expression hébraïque qui apparaît ici avait-elle originellement un sens analogue, auquel cas on pourrait traduire  : pour le faire passer en (sacrifice) « molek ». –  tu ne profaneras pas… 19.12 ; 20.3 ; Ex 20.7 ; Ez 36.20s ; voir saint. –  le Seigneur (YHWH), par opposition à Molek 19.12 ; Ex 3.15n.'
  - type: text
    content: 'Tu ne livreras aucun de tes enfants pour le faire passer au Molek ; tu ne profaneras pas le nom de ton Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '22':
  - type: note
    content: '20.13 ; Gn 19.5 ; Jg 19.22 ; Rm 1.26s. –  un homme  : litt. un mâle.'
  - type: text
    content: 'Tu ne coucheras pas avec un homme comme on couche avec une femme. C''est une abomination. '
  '23':
  - type: note
    content: 20.15s ; Ex 22.18 ; Dt 27.21.
  - type: text
    content: Tu n'auras de rapports sexuels avec aucune bête. Tu te rendrais impur avec elle. Une femme ne s'approchera pas d'une bête pour s'accoupler à elle. C'est une perversion.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ac 15.20.
  - type: text
    content: 'Ne vous rendez impurs par rien de tout cela, car c''est par tout cela que se sont rendues impures les nations que je chasse devant vous. '
  '25':
  - type: note
    content: 'V. 28 ; 20.22. –  je lui ai fait rendre des comptes  : cf. 26.16n  ; Ex 20.5n. –  faute  : voir péché.'
  - type: text
    content: 'Le pays en est devenu impur ; je lui ai fait rendre des comptes pour sa faute, et le pays a vomi ses habitants. '
  '26':
  - type: note
    content: abominations Dt 7.25+. –  autochtone / immigré 16.29+ ; cf. Ex 12.48n.
  - type: text
    content: 'Vous observerez donc mes prescriptions et mes règles, et vous ne commettrez aucune de ces abominations, ni l''autochtone, ni l''immigré qui séjourne au milieu de vous. '
  '27':
  - type: text
    content: 'Car ce sont là toutes les abominations qu''ont commises les hommes du pays, ceux qui étaient là avant vous ; le pays est devenu impur. '
  '28':
  - type: note
    content: 'vous ne rendrez pas…  : litt. le pays ne vous vomira pas parce que vous l''avez (ou vous l''auriez) rendu impur  ; voir pur. –  la nation  : LXX, Syr et un Tg portent le pluriel, cf. v. 24.'
  - type: text
    content: 'Ainsi vous ne rendrez pas le pays impur et celui-ci ne vous vomira pas comme il a vomi la nation qui était là avant vous. '
  '29':
  - type: note
    content: Litt. car quiconque fera (une) de toutes ces abominations (v. 26), les êtres qui (la) feront seront retranchés…, voir 7.20n  ; sur le terme correspondant à êtres, voir Gn 1.20n.
  - type: text
    content: 'Quiconque commettra une de ces abominations, quelle qu''elle soit, sera retranché du sein de son peuple. '
  '3':
  - type: note
    content: 'Cf. Ex 23.24. – Le mariage entre proches parents (18.6ss) était pratiqué en Egypte. –  Canaan v. 24-30 ; 14.34 ; 20.22s ; Dt 18.9 ; cf. Gn 9.18nss. –  leurs prescriptions  : cf. v. 4s ; voir aussi v. 30n  ; 20.22s.'
  - type: text
    content: 'Vous ne ferez pas ce qui se fait en Egypte où vous avez habité, et vous ne ferez pas ce qui se fait en Canaan où je vous amène ; vous ne suivrez pas leurs prescriptions. '
  '30':
  - type: note
    content: 'Vous assurerez mon service  : autre traduction vous garderez mes observances  ; cf. 8.35n. –  les prescriptions abominables  : autre traduction les prescriptions et les abominations. –  ainsi…  : autre traduction vous ne vous rendrez pas impurs par (ou avec) elles (les prescriptions abominables).'
  - type: text
    content: 'Vous assurerez mon service, et vous n''agirez pas selon les prescriptions abominables qui avaient cours avant vous ; ainsi vous ne vous rendrez pas impurs. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '4':
  - type: note
    content: 'règles  : pluriel du mot habituellement traduit par droit, il peut aussi désigner l’usage, la coutume  ; de même dans la suite du chap. ; cf. Ex 15.25n  ; voir loi.'
  - type: text
    content: 'Vous mettrez mes règles en pratique et vous observerez mes prescriptions, vous les suivrez. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu. '
  '5':
  - type: note
    content: Cf. Dt 4.1+ ; Ez 20.11,13,21 ; Pr 4.4 ; Né 9.29 ; Lc 10.28 ; Ac 7.38 ; Rm 7.10 ; 10.5 ; Ga 3.12.
  - type: text
    content: 'Vous observerez mes prescriptions et mes règles : celui qui les mettra en pratique vivra par elles. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'de sa parente  : litt. du corps de sa (propre) chair  ; les deux mots hébreux correspondants sont pratiquement synonymes (v. 12n) ; cf. 25.49n. –  exposer (ou découvrir ) sa nudité  : euphémisme pour désigner les relations sexuelles, de même dans la suite et en 20.11,18s ; cf. Gn 9.21s ; Ez 16.36 ; 22.10. – Cf. Code d''Hammourabi 154ss : « Si un homme a eu des relations avec sa fille, on le bannira de la ville. Si un homme a choisi une épouse pour son fils et que son fils ait eu des relations avec elle, mais que lui-même ait ensuite couché sur son sein et qu''on l''ait surpris, on le liera et on le jettera (le texte porte “on la jettera”, mais il s''agit vraisemblablement d''une erreur de copie) dans l''eau (pour le noyer). Si un homme a choisi une épouse pour son fils et que son fils n''ait pas eu de relations avec elle, mais que lui-même ait couché sur son sein, il lui paiera (à elle) la moitié d''une mine d''argent et il lui rendra tout ce qu''elle a apporté de chez son père, afin qu''elle puisse se marier à qui elle voudra. Si un homme a couché sur le sein de sa mère après (la mort de) son père, on les brûlera tous les deux. Si un homme a été surpris sur le sein de sa belle-mère ( ?) après (la mort de) son père, cet homme sera retranché de sa famille. »'
  - type: text
    content: 'Aucun de vous ne s''approchera de sa parente pour exposer sa nudité. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '7':
  - type: text
    content: 'Tu n''exposeras pas la nudité de ton père, ni la nudité de ta mère. C''est ta mère : tu n''exposeras pas sa nudité.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 20.11 ; Gn 35.22 ; Dt 23.1 ; 27.20 ; Am 2.7 ; 1Co 5.1.
  - type: text
    content: Tu n'exposeras pas la nudité de la femme de ton père. C'est la nudité de ton père.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 11n  ; 20.17 ; Dt 27.22 ; voir aussi Gn 20.12 ; 2S 13.11-13 ; Ez 22.11.
  - type: text
    content: Tu n'exposeras pas la nudité de ta sœur, fille de ton père ou fille de ta mère, née dans la maison ou née hors de la maison.
