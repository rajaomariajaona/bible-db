      - type: text
        text: '154ss : « Si un homme a eu des relations avec sa fille, on le bannira de la ville. Si un homme a choisi une épouse pour son fils et que son fils ait eu des relations avec elle, mais que lui-même ait ensuite couché sur son sein et qu''on l''ait surpris, on le liera et on le jettera (le texte porte “on la jettera”, mais il s''agit vraisemblablement d''une erreur de copie) dans l''eau (pour le noyer). Si un homme a choisi une épouse pour son fils et que son fils n''ait pas eu de relations avec elle, mais que lui-même ait couché sur son sein, il lui paiera (à elle) la moitié d''une mine d''argent et il lui rendra tout ce qu''elle a apporté de chez son père, afin qu''elle puisse se marier à qui elle voudra. Si un homme a couché sur le sein de sa mère après (la mort de) son père, on les brûlera tous les deux. Si un homme a été surpris sur le sein de sa belle-mère ( ?) après (la mort de) son père, cet homme sera retranché de sa famille. »'
    marker-yv: yv-n
  - type: text
