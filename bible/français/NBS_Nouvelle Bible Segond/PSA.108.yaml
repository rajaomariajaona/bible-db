document_id: PSA.108,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: J'éveillerai l'aurore
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: De David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''Asaph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (50.1+).
      marker-yv: yv-n
    - type: text
      text: Chant. Psaume. De David.
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: guerrières
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sous-entendu dans le texte ; cf. 60.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Moab est le bassin où je me lave ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur Edom je jette ma sandale ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je lance des acclamations guerrières contre le pays des Philistins !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me mènera dans la ville forte ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qui me conduira jusqu'en Edom ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: N'est-ce pas toi, ô Dieu, qui nous avais repoussés
  - type: usfm
    marker: q1
    children:
    - type: text
      text: – toi, ô Dieu, qui ne partais plus en campagne avec nos armées ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens à notre secours, délivre-nous de l'adversaire !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Le salut des humains est illusoire.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Avec Dieu, nous déploierons nos forces ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est lui qui écrasera nos adversaires.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les v. 2-6 reproduisent 57.8-12 (voir les notes) avec quelques variantes mineures. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je jouerai des psaumes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'chanter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 4 ; voir 7.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ô ma '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: oui, ma gloire (chantera…).
      marker-yv: yv-n
    - type: text
      text: Mon cœur est ferme, ô Dieu !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je chanterai, je jouerai des psaumes, ô ma gloire !
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eveille-toi, luth, éveille-toi, lyre !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: J'éveillerai l'aurore.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Je te célébrerai parmi les peuples, '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ','
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je te chanterai parmi les nations.
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 57.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est plus haute…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dépasse le ciel.
      marker-yv: yv-n
    - type: text
      text: Car ta fidélité est plus haute que le ciel,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ta loyauté va jusqu'aux nues.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Elève-toi au-dessus du ciel, ô Dieu,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et que ta gloire soit au-dessus de toute la terre !
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Les versets 7-14 reproduisent 60.7-14 (voir les notes) avec quelques variantes mineures.
      marker-yv: yv-n
    - type: text
      text: Afin que tes bien-aimés soient délivrés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sauve par ta main droite, et réponds-moi !
  '8':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '108.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu a parlé dans sa sainteté : Je triompherai,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je partagerai Sichem, je mesurerai la vallée de Soukkoth.
  '9':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: A moi Galaad, à moi Manassé !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ephraïm est mon casque ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Juda, mon bâton de commandement ;
