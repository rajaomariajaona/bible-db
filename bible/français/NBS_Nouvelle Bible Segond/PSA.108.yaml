document_id: PSA.108,104
type_code: fra
verses:
  '1':
  - type: heading
    content: J'éveillerai l'aurore
  - type: text
    content: ' '
  - type: note
    content: 'De David  : certains mss portent d''Asaph (50.1+).'
  - type: text
    content: Chant. Psaume. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'guerrières  : sous-entendu dans le texte ; cf. 60.10n.'
  - type: text
    content: Moab est le bassin où je me lave ;
  - type: text
    content: sur Edom je jette ma sandale ;
  - type: text
    content: je lance des acclamations guerrières contre le pays des Philistins !
  '11':
  - type: text
    content: Qui me mènera dans la ville forte ?
  - type: text
    content: Qui me conduira jusqu'en Edom ?
  '12':
  - type: text
    content: N'est-ce pas toi, ô Dieu, qui nous avais repoussés
  - type: text
    content: – toi, ô Dieu, qui ne partais plus en campagne avec nos armées ?
  '13':
  - type: text
    content: Viens à notre secours, délivre-nous de l'adversaire !
  - type: text
    content: Le salut des humains est illusoire.
  '14':
  - type: text
    content: Avec Dieu, nous déploierons nos forces ;
  - type: text
    content: c'est lui qui écrasera nos adversaires.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 2-6 reproduisent 57.8-12 (voir les notes) avec quelques variantes mineures. – Voir cœur. –  je jouerai des psaumes  : le verbe hébreu correspondant est traduit par chanter au v. 4 ; voir 7.18n. –  ô ma gloire  : autre traduction oui, ma gloire (chantera…).'
  - type: text
    content: Mon cœur est ferme, ô Dieu !
  - type: text
    content: Je chanterai, je jouerai des psaumes, ô ma gloire !
  '3':
  - type: text
    content: Eveille-toi, luth, éveille-toi, lyre !
  - type: text
    content: J'éveillerai l'aurore.
  '4':
  - type: text
    content: 'Je te célébrerai parmi les peuples, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: je te chanterai parmi les nations.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 57.11. –  est plus haute…  : autre traduction dépasse le ciel.'
  - type: text
    content: Car ta fidélité est plus haute que le ciel,
  - type: text
    content: et ta loyauté va jusqu'aux nues.
  '6':
  - type: text
    content: Elève-toi au-dessus du ciel, ô Dieu,
  - type: text
    content: et que ta gloire soit au-dessus de toute la terre !
  '7':
  - type: text
    content: ' '
  - type: note
    content: Les versets 7-14 reproduisent 60.7-14 (voir les notes) avec quelques variantes mineures.
  - type: text
    content: Afin que tes bien-aimés soient délivrés,
  - type: text
    content: sauve par ta main droite, et réponds-moi !
  '8':
  - type: text
    content: ' '
  - type: note
    content: Voir saint.
  - type: text
    content: 'Dieu a parlé dans sa sainteté : Je triompherai,'
  - type: text
    content: je partagerai Sichem, je mesurerai la vallée de Soukkoth.
  '9':
  - type: text
    content: A moi Galaad, à moi Manassé !
  - type: text
    content: Ephraïm est mon casque ;
  - type: text
    content: Juda, mon bâton de commandement ;
