document_id: PRO.20,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Le vin…  : cf. 23.29-35. –  est insolent  : autre traduction rend insolent (1.22n). –  l''alcool 31.4,6 ; Lv 10.9n. –  est bruyant  : autre traduction cause de l''agitation , 1.21 ; 7.11n. –  se laisse griser par eux  : autre traduction s''y égare.'
  - type: text
    content: Le vin est insolent, l'alcool est bruyant ;
  - type: text
    content: quiconque se laisse griser par eux ne deviendra pas sage.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Les poids truqués…  : litt. pierre et pierre, épha et épha, les deux sont une abomination de YHWH voir mesures, poids et monnaies ; cf. v. 23 ; 11.1n  ; cf. Dt 25.13ss.'
  - type: text
    content: Les poids truqués, les mesures truquées,
  - type: text
    content: 'tout cela est une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Par ses actes ou ses agissements  ; sur le terme correspondant, voir Jr 4.4+ ; Ps 77.12n. –  le jeune homme  : autre traduction le jeune garçon  ; cf. 22.6 ; 23.13.'
  - type: text
    content: Par ses actes, le jeune homme laisse déjà voir
  - type: text
    content: si son action sera sans reproche et droite.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'L''oreille… l''œil  : cf. Ex 4.11 ; Ps 94.9.'
  - type: text
    content: L'oreille qui entend, l'œil qui voit,
  - type: text
    content: 'c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui les a faits l''un comme l''autre.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le sommeil  : cf. 6.10+ ; 19.15+. –  t''appauvrisses ou deviennes pauvre  ; même forme verbale en 23.21 ; 30.9 ; Gn 45.11n. –  tu seras rassasié de pain  : litt. rassasie-toi de pain.'
  - type: text
    content: N'aime pas le sommeil, de peur que tu ne t'appauvrisses ;
  - type: text
    content: garde les yeux ouverts, tu seras rassasié de pain.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 14-19 sont absents de LXX. –  l''acheteur ou l''acquéreur , cf. 4.5n  ; Siracide 37.11 : « Ne consulte pas… un acheteur sur une vente. » –  se félicite ou se vante , litt. se loue  ; cf. 25.14 ; 27.1 ; 31.30.'
  - type: text
    content: « Mauvais ! Mauvais ! » dit l'acheteur ;
  - type: text
    content: et, dès qu'il s'éloigne, il se félicite.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'or / coraux  : cf. 3.14s. –  des lèvres qui savent  : litt. des lèvres de connaissance.'
  - type: text
    content: Qu'il y ait de l'or, profusion de coraux ;
  - type: text
    content: l'objet le plus précieux, ce sont des lèvres qui savent.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Prends-lui son vêtement / exige de lui des gages 27.13 ; cf. 13.13 ; Ex 22.25 ; Dt 24.17 ; Am 2.8 ; Jb 22.6 ; 24.10. –  garant 6.1n-5 ; cf. 11.15. –  un autre  : autre traduction un étranger . –  d''une inconnue ou d''une étrangère , féminin d''un terme habituellement synonyme de celui qui apparaît au premier vers (2.16n) ; autre lecture traditionnelle d''inconnus ou d''étrangers  ; cf. 27.13n.'
  - type: text
    content: Prends-lui son vêtement, s'il s'est porté garant pour un autre ;
  - type: text
    content: si c'est au profit d'une inconnue, exige de lui des gages.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Jb 20.12-14. –  Le pain du mensonge…  : cf. 9.17.'
  - type: text
    content: Le pain du mensonge est doux à l'homme ;
  - type: text
    content: après, sa bouche est remplie de gravier.
  '18':
  - type: text
    content: ' '
  - type: note
    content: s'établissent en conseil ou se réalisent grâce aux conseils . –  l'art de diriger ou la stratégie  ; cf. 1.5n  ; 12.5 ; voir aussi 24.6.
  - type: text
    content: Les plans s'établissent en conseil ;
  - type: text
    content: pour faire la guerre, mets en œuvre l'art de diriger.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui répand la calomnie… 11.13+. –  ne fréquente pas…  : cf. 23.9n. –  celui qui ouvre trop ses lèvres  : autres traductions celui qui parle naïvement ; celui qui dupe avec ses lèvres.'
  - type: text
    content: Celui qui répand la calomnie dévoile les secrets ;
  - type: text
    content: ne fréquente pas celui qui ouvre trop ses lèvres.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'La terreur…  : cf. 19.12+ ; 16.14. A cause de 19.12 et de LXX, certains traduisent la fureur du roi en modifiant légèrement l''orthographe du mot hébreu. –  en le mettant hors de lui  : autre traduction en se fâchant avec lui . –  on risque sa vie  : autre traduction on pèche contre soi-même (8.36n  ; 19.2n  ; Ha 2.10).'
  - type: text
    content: La terreur qu'inspire le roi est comme le grondement d'un jeune lion ;
  - type: text
    content: en le mettant hors de lui, on risque sa vie.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX le texte correspondant aux v. 20-22 fait suite à 20.9. –  mépris… père… mère  : cf. 19.26n  ; Ex 20.12 ; Lv 20.9 ; Dt 27.16 ; Mt 15.4. –  sa lampe…  : cf. 13.9+. –  à l''approche  : cf. 7.9n.'
  - type: text
    content: Celui qui traite avec mépris son père et sa mère,
  - type: text
    content: sa lampe s'éteindra à l'approche des ténèbres.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'trop vite acquis  : cf. 13.11n  ; 28.20.'
  - type: text
    content: Un patrimoine trop vite acquis dès le début
  - type: text
    content: ne sera pas béni par la suite.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Je rendrai le mal  : cf. 17.13 ; 24.29 ; 25.21s ; Dt 32.35 ; Rm 12.17 ; 1Th 5.15 ; 1P 3.9. – Cf. Instruction d''Aménémopé 22.1ss : « Ne dis pas : “J''ai trouvé l''appui d''un puissant : un homme de ta ville m''a offensé” ; ne dis pas : “J''ai trouvé un protecteur : un ennemi m''a offensé” – tu ne connais pas les plans du dieu – de peur que tu ne sois confus le lendemain (cf. Pr 27.1). Assieds-toi dans les bras du dieu, et ton silence les renversera. »'
  - type: text
    content: 'Ne dis pas : « Je rendrai le mal. »'
  - type: text
    content: 'Mets ton espérance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il te sauvera.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Les poids truqués v. 10n. –  la balance…  : litt. la balance de tromperie n''est pas bonne . – Cf. Instruction d''Aménémopé 17.18s : « N''appuie pas sur la balance, ne fausse pas les poids, n''endommage pas les fractions de la mesure. »'
  - type: text
    content: 'Les poids truqués sont une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: la balance fausse n'est pas une bonne affaire.
  '24':
  - type: text
    content: ' '
  - type: note
    content: dirige les pas 16.9 ; cf. 19.21 ; Jr 10.23 ; Ps 37.23 ; 139.2s ; Jb 31.4.
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui dirige les pas de l''homme ;'
  - type: text
    content: l'être humain, comment pourrait-il comprendre sa voie ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Les mots correspondant à piège et à sacré font assonance en hébreu. –  fait des vœux  : cf. Dt 23.22s ; Ec 5.3-5 ; Mt 15.5ss ; Siracide 18.23 : « Avant de faire un vœu, prépare-toi, ne sois pas comme un homme qui tente le Seigneur. »'
  - type: text
    content: 'C''est un piège pour l''être humain que de dire à la légère : « C''est sacré ! »'
  - type: text
    content: et de réfléchir après avoir fait des vœux.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'dissémine  : le terme hébreu signifie aussi vanner (cf. v. 8n). Ici, l''idée semble être que les méchants sont traités comme le blé que l''on battait à l''aide de sortes de traîneaux munis de roues (cf. Es 28.28).'
  - type: text
    content: Un roi sage dissémine les méchants ;
  - type: text
    content: il fait passer sur eux la roue.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Le souffle ou l''esprit , peut-être ici au sens de conscience  ; c''est le même mot hébreu, neshama , qui est traduit par souffle en Gn 2.7n  ; cf. Ps 150.6n. –  une lampe  : cf. 6.23 ; Mt 6.22 ; 1Co 10ss. –  tout jusqu''au fin fond du corps  : litt. toutes les pièces (ou les chambres ) du ventre (cf. v. 30).'
  - type: text
    content: 'Le souffle de l''être humain est une lampe du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: elle explore tout jusqu'au fin fond du corps.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'fidélité… loyauté 3.3n. –  soutient son trône  : cf. 16.12 ; Es 16.5 ; Ps 61.8.'
  - type: text
    content: La fidélité et la loyauté gardent le roi ;
  - type: text
    content: il soutient son trône par la fidélité.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'parure / ornement  : autre traduction splendeur (4.9n) / magnificence . –  les cheveux blancs  : cf. 16.31n.'
  - type: text
    content: La force est la parure des jeunes gens ;
  - type: text
    content: les cheveux blancs sont l'ornement des vieillards.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'loin des querelles  : cf. 14.17,29 ; 16.14 ; 17.14 ; 19.12. –  imbécile 1.7n.'
  - type: text
    content: C'est une gloire pour l'homme de se tenir loin des querelles ;
  - type: text
    content: tout imbécile se déchaîne.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Les plaies d''une blessure  : on a aussi compris une plaie ouverte, une plaie qui saigne  ; LXX meurtrissures et contusions surviennent aux mauvais . –  les coups…  : litt. des coups (pour les) pièces du ventre (v. 27n) ; certains modifient le texte hébreu traditionnel pour lire elles purifient jusqu''au fin fond du corps  ; on a souvent vu dans ce v. une justification des châtiments corporels ; il pourrait aussi s''agir de la description d''un traitement médical douloureux ; cf. 10.13.'
  - type: text
    content: Les plaies d'une blessure sont un remède pour le mal ;
  - type: text
    content: les coups pénètrent jusqu'au fin fond du corps.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'A cause du froid  : autre traduction dès la saison fraîche (automne ou hiver, saison des semailles) ; cf. 6.6+.'
  - type: text
    content: A cause du froid, le paresseux ne laboure pas ;
  - type: text
    content: à la moisson il demandera, mais il n'y aura rien.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Un projet  : autre traduction un conseil  ; cf. 1.25+ ; 19.20n. –  eaux profondes 18.4.'
  - type: text
    content: Un projet dans le cœur de l'homme est comme des eaux profondes ;
  - type: text
    content: l'homme intelligent sait y puiser.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'se proclament…  : cf. Mt 6.2,5,16. –  fidèles (cf. Es 57.1) et sûr (ou constant, probe, digne de confiance  ; cf. 12.17,22 ; 14.5 ; 28.20) sont approximativement synonymes.'
  - type: text
    content: Beaucoup de gens se proclament fidèles ;
  - type: text
    content: un homme sûr, qui le trouvera ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 19.1n. – Voir justice.
  - type: text
    content: Le juste suit la voie de l'intégrité ;
  - type: text
    content: heureux ses fils après lui !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'dissipe tout mal par son regard  : litt. vanne (ou dissémine ) tout mal par ses yeux  ; autres traductions disperse tous les mauvais…, discerne le mal…  ; cf. v. 26 ; 16.10n.'
  - type: text
    content: Un roi assis sur le trône pour juger
  - type: text
    content: dissipe tout mal par son regard.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'pur de tout péché (litt. de mon péché ) : cf. 1R 8.46 ; Ps 51.7 ; Jb 4.17 ; 14.4 ; Ec 7.20 ; 1Jn 1.8. – LXX place les v. 20-22 à la suite de ce v.'
  - type: text
    content: 'Qui dira : « J''ai rendu mon cœur sans reproche,'
  - type: text
    content: je suis pur de tout péché ! »
