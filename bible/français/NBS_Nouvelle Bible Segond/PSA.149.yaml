  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '149.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte obscur. –  '
      - type: usfm
        marker: fq
        children:
