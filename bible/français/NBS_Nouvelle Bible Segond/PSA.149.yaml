document_id: PSA.149,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur prend plaisir à son peuple
  - type: text
    content: ' '
  - type: note
    content: 'Louez le Seigneur (Yah) v. 9 ; 104.35n. –  Chantez… 33.3+ ; 98.1. –  Chantez sa louange  : litt. sa louange. –  l''assemblée des fidèles 89.6,8.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Chantez pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' un chant nouveau !'
  - type: text
    content: Chantez sa louange dans l'assemblée des fidèles !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'celui qui le fait  : le terme hébreu correspondant est au pluriel (ceux qui le font ?) ; LXX a lu le singulier ; cf. 100.3 ; Es 43.1+ ; 44.2 ; 51.13 ; Hé 3.2n.'
  - type: text
    content: Qu'Israël se réjouisse en celui qui le fait !
  - type: text
    content: Que les fils de Sion
  - type: text
    content: aient de l'allégresse en leur roi !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 7.18n  ; 33.2 ; 81.3 ; 150.3s. – Voir nom.
  - type: text
    content: Qu'ils louent son nom avec des danses,
  - type: text
    content: qu'ils jouent pour lui du tambourin et de la lyre !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur accorde sa faveur à (autre traduction agrée ) son peuple 147.11n. –  pauvres  : cf. 9.13n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' accorde sa faveur à son peuple,'
  - type: text
    content: il donne aux pauvres le salut pour parure.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  sur leurs lits  : on pourrait comprendre quand ils sont malades , ou bien pendant les nuits  ; certains pensent que l''expression désigne ici une sorte de tapis de prière ; cf. 4.5.'
  - type: text
    content: Que les fidèles exultent dans la gloire,
  - type: text
    content: qu'ils poussent des cris de joie sur leurs lits !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El , cf. Gn 21.33n. –  leur bouche  : litt. leur gosier , cf. 5.10. –  l''épée à deux tranchants (Ep 6.17 ; Ap 19.15) dans leur main  : cf. 1S 15.33 ; Né 4.10ss ; Judith 15.13 : « Tous les hommes d''Israël suivirent (le cortège triomphal de Judith) en armes et couronnés, des hymnes à la bouche. » 2 Maccabées 15.27 : « Combattant de leurs mains et priant Dieu de leur cœur, ils firent tomber au moins trente-cinq mille hommes et se réjouirent grandement de cette manifestation de Dieu. »'
  - type: text
    content: Que les louanges de Dieu soient dans leur bouche,
  - type: text
    content: et l'épée à deux tranchants dans leur main,
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.1s,10 ; 9.20 ; 46.6ss ; 48.5ss ; voir aussi Mt 19.28 ; 1Co 6.2.
  - type: text
    content: pour exercer la vengeance sur les nations,
  - type: text
    content: des châtiments parmi les peuples,
  '8':
  - type: text
    content: pour lier leurs rois avec des chaînes
  - type: text
    content: et leurs dignitaires avec des entraves,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'qui est écrit  : cf. Es 13–22 ; Jr 46–51 ; Ez 25–32 ; Ab. –  Louez le Seigneur 104.35n.'
  - type: text
    content: pour exécuter contre eux le jugement qui est écrit !
  - type: text
    content: C'est un honneur magnifique pour tous ses fidèles.
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
