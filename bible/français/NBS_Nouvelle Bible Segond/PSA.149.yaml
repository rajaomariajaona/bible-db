      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu correspondant est au pluriel (ceux qui le font ?) ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu le singulier ; cf. 100.3 ; Es 43.1+ ; 44.2 ; 51.13 ; Hé 3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Qu'Israël se réjouisse en celui qui le fait !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Que les fils de Sion
  - type: usfm
    marker: q1
    children:
    - type: text
      text: aient de l'allégresse en leur roi !
