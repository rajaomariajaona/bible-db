      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quand ils sont malades
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pendant les nuits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; certains pensent que l'expression désigne ici une sorte de tapis de prière ; cf. 4.5.
      marker-yv: yv-n
    - type: text
      text: Que les fidèles exultent dans la gloire,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'ils poussent des cris de joie sur leurs lits !
