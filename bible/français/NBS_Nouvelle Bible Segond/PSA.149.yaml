        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Judith
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.13 : « Tous les hommes d''Israël suivirent (le cortège triomphal de Judith) en armes et couronnés, des hymnes à la bouche. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.27 : « Combattant de leurs mains et priant Dieu de leur cœur, ils firent tomber au moins trente-cinq mille hommes et se réjouirent grandement de cette manifestation de Dieu. »'
      marker-yv: yv-n
    - type: text
      text: Que les louanges de Dieu soient dans leur bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et l'épée à deux tranchants dans leur main,
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
