          text: 'font des prières '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mangent et boivent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 30 ; 7.34.'
      marker-yv: yv-n
    - type: text
      text: 'Ils lui dirent : Les disciples de Jean, comme ceux des pharisiens, jeûnent fréquemment et font des prières, alors que les tiens mangent et boivent. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les amis du marié
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les fils de la salle des noces '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
