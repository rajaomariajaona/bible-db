          text: '(aussi 22.8 ; Ac 3.1,11 ; 4.13,19 ; 8.14) Lc 6.14 ; 8.51 ; 9.28,54 ; Mt 4.21+ ; Ac 1.13 ; 12.2. –  '
      - type: usfm
        marker: fq
