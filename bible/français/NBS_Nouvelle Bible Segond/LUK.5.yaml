      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.14 ; Lv 13.49 ; 14.1ss ; Mt 8.4+. A la fin du v. le principal témoin du texte occidental (voir introductions au N.T. et aux Actes des Apôtres) ajoute l''équivalent de Mc 1.45–2.1 (première partie du v.). – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: offrande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Puis il lui enjoignit de n''en parler à personne. – Mais, dit-il, va te montrer au prêtre, et fais une offrande pour ta purification comme Moïse l''a prescrit ; ce sera pour eux un témoignage. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 4.14,37 ; 7.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On parlait de lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole à son sujet circulait.
      marker-yv: yv-n
    - type: text
      text: 'On parlait de lui de plus en plus ; de grandes foules de gens se rassemblaient pour l''entendre et pour être guéris de leurs maladies. '
