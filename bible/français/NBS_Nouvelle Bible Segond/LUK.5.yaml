        marker: fq
        children:
        - type: text
          text: Maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Lc emploie ici un terme grec particulier, qui évoque le commandement plus que l''enseignement ; il est surtout employé par les disciples ; ainsi en 8.24,45 ; 9.33,49 ; 17.13. –  '
