      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Dieu) : cf. 1.6,9,11,15ss etc. –  '
      - type: usfm
        marker: fq
        children:
