        children:
        - type: text
          text: 'bon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: meilleur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Cf. Mt 11.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Jn 2.10 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.10 : « Ne délaisse pas un vieil ami, car un ami de fraîche date ne le vaut pas. Vin nouveau, ami nouveau ; quand il aura vieilli, tu le boiras avec joie. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile selon Thomas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '47 : « Personne ne boit du vin vieux et n''a aussitôt envie de boire du vin nouveau. Et on ne verse pas du vin nouveau dans de vieilles outres, de peur qu''elles n''éclatent ; et le vin vieux, on ne le verse pas dans une outre neuve, de peur qu''elle ne le gâte. On ne coud pas une vieille pièce sur un vêtement neuf, parce qu''il se produirait une déchirure » (cf. Mt 6.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Et personne, après avoir bu du vin vieux, n''en veut du nouveau, car il dit : Le vieux est bon !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Lorsqu''il eut cessé de parler, il dit à Simon : Avance en eau profonde, et jetez vos filets pour pêcher. '
  '5':
  - type: usfm
    marker: p
    children:
