      - type: usfm
        marker: fq
        children:
        - type: text
          text: le toit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le toit en terrasse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 12.3 ; 17.31 ; Ac 10.9 ; cf. Mt 24.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; mais la présence des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tuiles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: suggère sans doute ici une représentation différente ; autre terme en Mc 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme ils ne savaient pas par où le faire entrer, à cause de la foule, ils montèrent sur le toit et le firent descendre au travers des tuiles avec son lit, au milieu de l''assemblée, devant Jésus. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux bateaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss ont ici un diminutif, qu''on pourrait traduire par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deux barques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en Mc 3.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'il vit au bord du lac deux bateaux d''où les pêcheurs étaient descendus pour laver leurs filets. '
