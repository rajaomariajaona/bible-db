        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le filet.
      marker-yv: yv-n
    - type: text
      text: 'Simon lui répondit : Maître, nous avons travaillé toute la nuit sans rien prendre. Mais, sur ta parole, je vais jeter les filets. '
