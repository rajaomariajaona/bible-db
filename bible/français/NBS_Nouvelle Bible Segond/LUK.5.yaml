    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la parole de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.11,21 ; 11.28 ; Mt 15.6 ; Mc 7.13 ; Jn 10.35 ; Ac 4.31 ; 6.2,7 ; 8.14 ; 11.1 ; 12.24 ; 13.5,7,44,46,48 ; 16.32 ; 17.13 ; 18.11 ; Rm 9.6 ; 1Co 14.36 ; 2Co 2.17 ; 4.2 ; 1Th 2.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'près du lac de Gennésareth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou de Galilée (cf. 4.44
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gennésareth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne la région à l'ouest du lac, au sud de Capharnaüm. Cf. Mc 2.13 ; 3.7.
      marker-yv: yv-n
    - type: text
      text: 'Comme la foule se pressait autour de lui pour entendre la parole de Dieu, et qu''il se tenait près du lac de Gennésareth, '
