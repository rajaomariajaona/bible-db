        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mc 1.40+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tomba…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 17.16 ; Gn 17.3,17 ; Nb 14.5 ; Rt 2.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu peux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 4.37 ; 2R 5.3) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me rendre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 13 ; 4.27 ; 7.22 ; 11.39 ; 17.14,17 ; Mt 8.2+ ; voir aussi Ac 10.15 ; 11.9 ; 15.9.'
      marker-yv: yv-n
    - type: text
      text: 'Il était dans une de ces villes quand un homme couvert de lèpre survint. Voyant Jésus, il tomba face contre terre et lui adressa cette prière : Seigneur, si tu le veux, tu peux me rendre pur. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le toucha '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.19 ; 7.14 ; 8.44,46 ; cf. 4.40 ; Ac 5.14s ; 19.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aussitôt…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.39.'
      marker-yv: yv-n
    - type: text
      text: 'Il tendit la main, le toucha et dit : Je le veux, sois pur. Aussitôt la lèpre le quitta. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
