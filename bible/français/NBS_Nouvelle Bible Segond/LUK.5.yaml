      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'N''aie pas peur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: désormais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression grecque 1.48 ; 12.52 ; 22.18,69 ; Ac 18.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que tu prendras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que tu attraperas vivants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon l''étymologie du verbe grec (cf. 2Tm 2.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; voir Mc 1.17 ; cf. Jr 16.16 ; Am 4.2 ; Ha 1.14s ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Hymnes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 5.7 : « Tu m''as placé dans un lieu d''exil parmi des pêcheurs nombreux qui étendent un filet sur la face des eaux, et parmi les chasseurs mandés contre les fils de perversité. »'
      marker-yv: yv-n
    - type: text
      text: 'Il en était de même de Jacques et de Jean, fils de Zébédée, les compagnons de Simon. Jésus dit à Simon : N''aie pas peur ; désormais ce sont des êtres humains que tu prendras. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 27s ; 9.23,49,57,59,61s ; 11.41 ; 12.33 ; 14.26-33 ; 18.22,28 ; Mt 19.27.
      marker-yv: yv-n
    - type: text
      text: Alors ils ramenèrent les bateaux à terre, laissèrent tout et le suivirent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jésus guérit un lépreux
    marker-yv: yv-h
  - type: usfm
    marker: r
