        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Jn 3.29.'
      marker-yv: yv-n
    - type: text
      text: 'Jésus leur dit : Pouvez-vous faire jeûner les amis du marié pendant que le marié est avec eux ? '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
