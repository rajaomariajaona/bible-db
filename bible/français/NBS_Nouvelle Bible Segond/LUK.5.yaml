    children:
    - type: text
      text: Les premiers disciples
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Cf. Mt 4.18-22  ; Mc 1.16-20  ; Jn 1.35-51  ; 21.1-11
    marker-yv: yv-h
  - type: usfm
