      marker-yv: yv-n
    - type: text
      text: 'Il leur disait aussi une parabole : Personne ne déchire une pièce sur un habit neuf pour raccommoder un vieil habit ; autrement, il aura déchiré l''habit neuf et la pièce qu''il en aura prise ne sera pas assortie au vieux. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Et personne ne met du vin nouveau dans de vieilles outres ; autrement le vin nouveau fait éclater les outres, il se répand, et les outres sont perdues ; '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: text
      text: 'il faut mettre le vin nouveau dans des outres neuves ! '
