        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans une de ces villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lèpre '
      - type: usfm
        marker: ft
        children:
        - type: text
