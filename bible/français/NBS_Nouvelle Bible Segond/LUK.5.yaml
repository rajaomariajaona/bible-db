          text: était là…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'était pour qu''il guérisse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon certains mss, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour leur guérison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 6.18 ; 7.7 ; 8.47 ; 9.2,11,42 ; 14.4 ; 17.15 ; 22.51 ; Ac 9.34 ; 10.38 ; 28.8,27.
      marker-yv: yv-n
    - type: text
      text: 'Un de ces jours-là, il enseignait. Des pharisiens et des maîtres de la loi étaient assis ; ils étaient venus de tous les villages de Galilée et de Judée, et de Jérusalem ; et la puissance du Seigneur était là pour qu''il réalise des guérisons. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Mc 2.2.
      marker-yv: yv-n
    - type: text
      text: 'Des hommes arrivèrent, portant sur un lit un homme qui était paralysé ; ils cherchaient à le faire entrer et à le placer devant lui. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
