document_id: LUK.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les premiers disciples
  - type: heading
    content: Cf. Mt 4.18-22  ; Mc 1.16-20  ; Jn 1.35-51  ; 21.1-11
  - type: text
    content: ' '
  - type: note
    content: la parole de Dieu 8.11,21 ; 11.28 ; Mt 15.6 ; Mc 7.13 ; Jn 10.35 ; Ac 4.31 ; 6.2,7 ; 8.14 ; 11.1 ; 12.24 ; 13.5,7,44,46,48 ; 16.32 ; 17.13 ; 18.11 ; Rm 9.6 ; 1Co 14.36 ; 2Co 2.17 ; 4.2 ; 1Th 2.13. –  près du lac de Gennésareth ou de Galilée (cf. 4.44n) ; Gennésareth désigne la région à l'ouest du lac, au sud de Capharnaüm. Cf. Mc 2.13 ; 3.7.
  - type: text
    content: 'Comme la foule se pressait autour de lui pour entendre la parole de Dieu, et qu''il se tenait près du lac de Gennésareth, '
  '10':
  - type: note
    content: 'Jacques / Jean (aussi 22.8 ; Ac 3.1,11 ; 4.13,19 ; 8.14) Lc 6.14 ; 8.51 ; 9.28,54 ; Mt 4.21+ ; Ac 1.13 ; 12.2. –  compagnons  : cf. v. 7. –  N''aie pas peur 1.13+. –  désormais  : même expression grecque 1.48 ; 12.52 ; 22.18,69 ; Ac 18.6. –  que tu prendras  : litt. que tu attraperas vivants, selon l''étymologie du verbe grec (cf. 2Tm 2.26n) ; voir Mc 1.17 ; cf. Jr 16.16 ; Am 4.2 ; Ha 1.14s ; Hymnes (Qumrân) 5.7 : « Tu m''as placé dans un lieu d''exil parmi des pêcheurs nombreux qui étendent un filet sur la face des eaux, et parmi les chasseurs mandés contre les fils de perversité. »'
  - type: text
    content: 'Il en était de même de Jacques et de Jean, fils de Zébédée, les compagnons de Simon. Jésus dit à Simon : N''aie pas peur ; désormais ce sont des êtres humains que tu prendras. '
  '11':
  - type: note
    content: Cf. v. 27s ; 9.23,49,57,59,61s ; 11.41 ; 12.33 ; 14.26-33 ; 18.22,28 ; Mt 19.27.
  - type: text
    content: Alors ils ramenèrent les bateaux à terre, laissèrent tout et le suivirent.
  - type: heading
    content: Jésus guérit un lépreux
  - type: heading
    content: Mt 8.1-4  ; Mc 1.40-45
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'dans une de ces villes  : cf. 4.43. –  lèpre 17.11ss ; voir Lv 13.2n  ; Mc 1.40+. –  tomba…  : cf. 17.16 ; Gn 17.3,17 ; Nb 14.5 ; Rt 2.10. –  tu peux (cf. 4.37 ; 2R 5.3) me rendre pur  : cf. v. 13 ; 4.27 ; 7.22 ; 11.39 ; 17.14,17 ; Mt 8.2+ ; voir aussi Ac 10.15 ; 11.9 ; 15.9.'
  - type: text
    content: 'Il était dans une de ces villes quand un homme couvert de lèpre survint. Voyant Jésus, il tomba face contre terre et lui adressa cette prière : Seigneur, si tu le veux, tu peux me rendre pur. '
  '13':
  - type: note
    content: 'le toucha 6.19 ; 7.14 ; 8.44,46 ; cf. 4.40 ; Ac 5.14s ; 19.11s. –  Aussitôt…  : cf. 4.39.'
  - type: text
    content: 'Il tendit la main, le toucha et dit : Je le veux, sois pur. Aussitôt la lèpre le quitta. '
  '14':
  - type: note
    content: 'dit-il  : sous-entendu dans le texte. –  va te montrer…  : cf. 17.14 ; Lv 13.49 ; 14.1ss ; Mt 8.4+. A la fin du v. le principal témoin du texte occidental (voir introductions au N.T. et aux Actes des Apôtres) ajoute l''équivalent de Mc 1.45–2.1 (première partie du v.). – Voir prêtre. –  offrande  : voir sacrifices.'
  - type: text
    content: 'Puis il lui enjoignit de n''en parler à personne. – Mais, dit-il, va te montrer au prêtre, et fais une offrande pour ta purification comme Moïse l''a prescrit ; ce sera pour eux un témoignage. '
  '15':
  - type: note
    content: 'Cf. 4.14,37 ; 7.17. –  On parlait de lui  : litt. la parole à son sujet circulait.'
  - type: text
    content: 'On parlait de lui de plus en plus ; de grandes foules de gens se rassemblaient pour l''entendre et pour être guéris de leurs maladies. '
  '16':
  - type: note
    content: priait 3.21+ ; 4.42 ; cf. Mc 1.35.
  - type: text
    content: Mais lui se retirait dans les déserts et priait.
  - type: heading
    content: Le paralytique de Capharnaüm
  - type: heading
    content: Mt 9.1-8  ; Mc 2.1-12
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'pharisiens  : cf. v. 21,30,33 ; 6.2,7 ; 7.30,36 ; Ac 23.6. –  maîtres ou enseignants de la loi  : cf. v. 21 ; 1Tm 1.7. –  Galilée / Judée / Jérusalem  : cf. 4.44n  ; 6.17. –  la puissance 4.14+,36 ; cf. 6.19n  ; 8.46 ; 9.1 ; Ac 3.12 ; 4.7,33 ; 8.10 ; 10.38. –  du Seigneur (Dieu) : cf. 1.6,9,11,15ss etc. –  était là…  : litt. était pour qu''il guérisse ou, selon certains mss, pour leur guérison  ; cf. 6.18 ; 7.7 ; 8.47 ; 9.2,11,42 ; 14.4 ; 17.15 ; 22.51 ; Ac 9.34 ; 10.38 ; 28.8,27.'
  - type: text
    content: 'Un de ces jours-là, il enseignait. Des pharisiens et des maîtres de la loi étaient assis ; ils étaient venus de tous les villages de Galilée et de Judée, et de Jérusalem ; et la puissance du Seigneur était là pour qu''il réalise des guérisons. '
  '18':
  - type: note
    content: Cf. Mc 2.2.
  - type: text
    content: 'Des hommes arrivèrent, portant sur un lit un homme qui était paralysé ; ils cherchaient à le faire entrer et à le placer devant lui. '
  '19':
  - type: note
    content: 'le toit  : on pourrait traduire le toit en terrasse, comme en 12.3 ; 17.31 ; Ac 10.9 ; cf. Mt 24.17n  ; mais la présence des tuiles suggère sans doute ici une représentation différente ; autre terme en Mc 2.4n.'
  - type: text
    content: 'Comme ils ne savaient pas par où le faire entrer, à cause de la foule, ils montèrent sur le toit et le firent descendre au travers des tuiles avec son lit, au milieu de l''assemblée, devant Jésus. '
  '2':
  - type: note
    content: 'deux bateaux  : certains mss ont ici un diminutif, qu''on pourrait traduire par deux barques, comme en Mc 3.9n.'
  - type: text
    content: 'il vit au bord du lac deux bateaux d''où les pêcheurs étaient descendus pour laver leurs filets. '
  '20':
  - type: note
    content: '7.48ss. –  foi 7.9,50 ; 8.25,48 ; 17.5s,19 ; 18.8,42 ; 22.32 ; Ac 6.5 ; 11.24. –  Tes péchés…  : litt. Homme (de même 12.14 ; 22.58,60), tes péchés…  ; cf. 1.77+ ; Ac 2.38 ; 5.31 ; 13.38s ; 26.18. –  te sont pardonnés ou t''ont été pardonnés, de même 7.47s ; forme légèrement différente en Mt 9.5 ; Mc 2.9.'
  - type: text
    content: 'Voyant leur foi, il dit : Tes péchés te sont pardonnés. '
  '21':
  - type: note
    content: 'scribes / pharisiens  : cf. v. 17,30 ; 11.53 ; 15.2 ; Mt 5.20 ; 12.38 ; 15.1 ; 23.2ss ; Mc 2.16 ; 7.1ss ; Jn 8.3 ; Ac 23.9. –  Qui… 7.49 ; 8.25 ; 9.7ss,18ss ; Jn 5.12. –  blasphèmes Mc 2.7+.'
  - type: text
    content: 'Les scribes et les pharisiens se mirent à raisonner : Qui est-il, celui-ci, qui profère des blasphèmes ? Qui peut pardonner les péchés, sinon Dieu seul ? '
  '22':
  - type: note
    content: 'connut leurs raisonnements (2.35+ ; 12.17s) : cf. 4.23 ; 6.8 ; 7.39s ; 9.46s ; 11.17 ; 20.23. –  Pourquoi…  : litt. pourquoi raisonnez-vous dans vos cœurs ? Autre traduction quels raisonnements tenez-vous dans vos cœurs ? Cf. Mt 16.8.'
  - type: text
    content: 'Jésus connut leurs raisonnements ; il leur demanda : Pourquoi tenez-vous des raisonnements ? '
  '23':
  - type: text
    content: 'Qu''est-ce qui est le plus facile, de dire : « Tes péchés te sont pardonnés », ou de dire : « Lève-toi et marche ! » '
  '24':
  - type: note
    content: 'le Fils de l''homme 6.5,22 ; 7.34 ; 9.22,26,44,58 ; 11.30 ; 12.8,10,40 ; 17.22,24,26,30 ; 18.8,31 ; 19.10 ; 21.27,36 ; 22.22,48,69 ; 24.7 ; Ac 7.56 ; cf. Mt 8.20n. –  l''autorité… pour ou le pouvoir, le droit… de  : cf. 4.6,32+ ; Mt 28.18. –  lève-toi…  : cf. Jn 5.8 ; Ac 9.33ss. –  chez toi  : litt. dans ta maison.'
  - type: text
    content: 'Eh bien, afin que vous sachiez que le Fils de l''homme a l''autorité sur la terre pour pardonner les péchés – il dit au paralysé : Je te le dis, lève-toi, prends ton lit et rentre chez toi. '
  '25':
  - type: note
    content: 'Cf. Jn 5.9. –  A l''instant même 1.64+. –  chez lui  : litt. dans sa maison. –  glorifiant Dieu 2.20+ ; 13.13 ; 17.15 ; 18.43 ; 23.47.'
  - type: text
    content: 'A l''instant même, l''homme se leva devant eux, prit sa couche et s''en alla chez lui en glorifiant Dieu. '
  '26':
  - type: note
    content: 'Cf. 1.65+ ; 7.16. –  stupéfaits  : cf. Mc 2.12n  ; voir aussi crainte. –  choses étranges  : le terme correspondant, qui a donné notre mot paradoxe, n''apparaît qu''ici dans le N.T. –  aujourd''hui 2.11+.'
  - type: text
    content: 'Tous, stupéfaits, glorifiaient Dieu ; remplis de crainte, ils disaient : Nous avons vu des choses étranges aujourd''hui !'
  - type: heading
    content: Le banquet chez Lévi
  - type: heading
    content: Mt 9.9-13  ; Mc 2.13-17
  '27':
  - type: text
    content: ' '
  - type: note
    content: aperçut ou remarqua  ; le même verbe est traduit par voir en 7.24 ; 23.55. –  collecteur des taxes 3.12+ ; Mc 2.15n.
  - type: text
    content: 'Après cela, il sortit et aperçut un collecteur des taxes, nommé Lévi, assis au bureau des taxes. Il lui dit : Suis-moi. '
  '28':
  - type: note
    content: 'laissa tout v. 11+ ; 14.33. –  le suivre  : cf. 9.23s,61s ; 14.27.'
  - type: text
    content: Celui-ci laissa tout, se leva et se mit à le suivre.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 15.1. –  chez lui  : litt. dans sa maison  : c''est ici, sans ambiguïté, celle de Lévi (cf. Mc 2.15n).'
  - type: text
    content: 'Lévi donna pour lui un grand banquet chez lui ; il y avait une grande foule de collecteurs des taxes et d''autres personnes à table avec eux. '
  '3':
  - type: note
    content: 'Cf. Mt 13.1ss ; Mc 4.1s. –  Simon 4.38+. –  s''assit  : cf. 4.20n. –  instruisait  : même verbe traduit par enseigner 4.15+.'
  - type: text
    content: Il monta dans l'un de ces bateaux, qui était à Simon, et il lui demanda de s'éloigner un peu du rivage. Puis il s'assit, et du bateau il instruisait les foules.
  '30':
  - type: note
    content: 'Les pharisiens et leurs scribes  : cf. v. 17,21+. –  maugréaient  : cf. 15.2 ; 19.7 ; sur le terme, voir Mt 20.11 ; Jn 6.41n. –  à ses disciples  : cf. 6.1s. –  mangez / buvez  : cf. 7.33s. –  collecteurs des taxes / pécheurs 7.34 ; 15.1 ; cf. 18.11 ; 19.7 ; voir Mc 2.15n.'
  - type: text
    content: 'Les pharisiens et leurs scribes maugréaient ; ils disaient à ses disciples : Pourquoi mangez-vous et buvez-vous avec les collecteurs des taxes et les pécheurs ? '
  '31':
  - type: note
    content: 'médecin  : cf. 4.23 ; voir aussi Es 3.7 ; Jr 8.22 ; 2Ch 16.12.'
  - type: text
    content: 'Jésus leur répondit : Ce ne sont pas ceux qui sont en bonne santé qui ont besoin de médecin, mais les malades. '
  '32':
  - type: note
    content: 'justes / pécheurs  : cf. 15.7/ / ; 19.10. –  je suis venu 7.34 ; 18.8 ; 19.10. –  appeler à un changement radical  : cf. 3.3n  ; 7.36ss ; 13.1ss ; 15 ; 16.30 ; 19.1ss ; 23.40ss ; 24.47.'
  - type: text
    content: Ce ne sont pas des justes, mais des pécheurs, que je suis venu appeler à un changement radical.
  - type: heading
    content: Jésus et le jeûne
  - type: heading
    content: Mt 9.14-17  ; Mc 2.18-22
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Les disciples de Jean le Baptiseur 7.18s ; 11.1 ; Jn 3.25s ; 4.1s ; Ac 18.25s ; voir aussi pharisiens . –  jeûnent 7.33 ; 18.12 ; cf. Mc 2.18+. –  font des prières 11.1. –  mangent et boivent  : cf. v. 30 ; 7.34.'
  - type: text
    content: 'Ils lui dirent : Les disciples de Jean, comme ceux des pharisiens, jeûnent fréquemment et font des prières, alors que les tiens mangent et boivent. '
  '34':
  - type: note
    content: 'les amis du marié  : litt. les fils de la salle des noces (ou de la chambre nuptiale), voir Mc 2.19n  ; cf. Jn 3.29.'
  - type: text
    content: 'Jésus leur dit : Pouvez-vous faire jeûner les amis du marié pendant que le marié est avec eux ? '
  '35':
  - type: note
    content: 'Les jours viendront…  : cf. 17.22 ; 19.43 ; 21.6 ; 23.29 ; voir aussi 22.35s ; Jr 7.32 ; 16.14 ; 31.31 ; Am 4.2 ; Za 14.1. –  ils jeûneront Mt 9.15+ ; Ac 13.2s ; d''après la Didachè, l''Eglise de la fin du Ier ou du début du IIe s. apr. J.-C. jeûnait le mercredi et le vendredi (par opposition au jeûne juif des lundi et jeudi ; cf. Mt 6.16n). Evangile selon Thomas 104 : « Ils dirent à Jésus : “Viens, prions aujourd''hui et jeûnons.” Jésus répondit : “Quel est donc le péché que j''ai commis, ou en quoi ai-je été vaincu ? Mais quand l''époux sera sorti de la chambre nuptiale, alors qu''ils jeûnent et prient !” »'
  - type: text
    content: Les jours viendront où le marié leur sera enlevé ; alors ils jeûneront, en ces jours-là.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Il leur disait (ou il leur dit ) aussi une parabole (4.23n) : cf. 6.39 ; 12.16,41 ; 13.6 ; 14.7 ; 15.3 ; 18.1,9 ; 20.9,19 ; 21.29. –  neuf / vieux  : cf. 2Co 5.17 ; voir aussi Ga 4.9 ; 1Jn 2.7s.'
  - type: text
    content: 'Il leur disait aussi une parabole : Personne ne déchire une pièce sur un habit neuf pour raccommoder un vieil habit ; autrement, il aura déchiré l''habit neuf et la pièce qu''il en aura prise ne sera pas assortie au vieux. '
  '37':
  - type: text
    content: 'Et personne ne met du vin nouveau dans de vieilles outres ; autrement le vin nouveau fait éclater les outres, il se répand, et les outres sont perdues ; '
  '38':
  - type: text
    content: 'il faut mettre le vin nouveau dans des outres neuves ! '
  '39':
  - type: note
    content: 'Ce v. est absent de quelques mss. –  n''en veut  : certains mss ajoutent aussitôt (après). –  bon ou meilleur. Cf. Mt 11.30n  ; voir aussi Jn 2.10 ; Siracide 9.10 : « Ne délaisse pas un vieil ami, car un ami de fraîche date ne le vaut pas. Vin nouveau, ami nouveau ; quand il aura vieilli, tu le boiras avec joie. » Evangile selon Thomas 47 : « Personne ne boit du vin vieux et n''a aussitôt envie de boire du vin nouveau. Et on ne verse pas du vin nouveau dans de vieilles outres, de peur qu''elles n''éclatent ; et le vin vieux, on ne le verse pas dans une outre neuve, de peur qu''elle ne le gâte. On ne coud pas une vieille pièce sur un vêtement neuf, parce qu''il se produirait une déchirure » (cf. Mt 6.24n).'
  - type: text
    content: 'Et personne, après avoir bu du vin vieux, n''en veut du nouveau, car il dit : Le vieux est bon !'
  '4':
  - type: text
    content: 'Lorsqu''il eut cessé de parler, il dit à Simon : Avance en eau profonde, et jetez vos filets pour pêcher. '
  '5':
  - type: note
    content: 'Maître  : Lc emploie ici un terme grec particulier, qui évoque le commandement plus que l''enseignement ; il est surtout employé par les disciples ; ainsi en 8.24,45 ; 9.33,49 ; 17.13. –  les filets  : certains mss portent le filet.'
  - type: text
    content: 'Simon lui répondit : Maître, nous avons travaillé toute la nuit sans rien prendre. Mais, sur ta parole, je vais jeter les filets. '
  '6':
  - type: note
    content: 'se déchiraient  : autre traduction étaient sur le point de se déchirer  ; cf. Jn 21.11.'
  - type: text
    content: 'L''ayant fait, ils prirent une grande quantité de poissons : leurs filets se déchiraient. '
  '7':
  - type: text
    content: 'Ils firent signe à leurs associés qui étaient dans l''autre bateau de venir les aider. Ceux-ci vinrent et remplirent les deux bateaux, au point qu''ils enfonçaient. '
  '8':
  - type: note
    content: 'Simon (4.38+) Pierre 6.14 ; 8.45,51 ; 9.20,28,32s ; 12.41 ; 18.28 ; 22.34,54s,58,60s ; cf. Mt 16.16 ; Jn 21.2ss. –  tomba…  : autre traduction tomba à genoux devant Jésus. –  éloigne-toi…  : le même verbe est traduit par sortir en 4.35+s ; 5.27 ; voir aussi 18.13. –  pécheur  : il n''y aucun rapport en grec entre le mot correspondant (dérivé de péché) et celui qui a été traduit par pêcheur (de pêche, v. 2). Le jeu de mots qui pourrait être perçu dans ce texte serait donc tout à fait accidentel ; cf. Es 6.5 ; Mc 2.15n.'
  - type: text
    content: 'Quand il vit cela, Simon Pierre tomba aux genoux de Jésus et dit : Seigneur, éloigne-toi de moi : je suis un homme pécheur. '
  '9':
  - type: note
    content: 'l''effroi 4.36 ; Ac 3.10 ; voir crainte. –  la pêche…  : litt. la pêche des poissons qu''ils avaient pris.'
  - type: text
    content: 'Car l''effroi l''avait saisi, lui et tous ceux qui étaient avec lui, à cause de la pêche qu''ils avaient faite. '
