        marker: fr
        children:
        - type: text
          text: '5.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les jours viendront…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 17.22 ; 19.43 ; 21.6 ; 23.29 ; voir aussi 22.35s ; Jr 7.32 ; 16.14 ; 31.31 ; Am 4.2 ; Za 14.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils jeûneront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 9.15+ ; Ac 13.2s ; d''après la '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Didachè
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', l''Eglise de la fin du I'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' ou du début du II'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. apr. J.-C. jeûnait le mercredi et le vendredi (par opposition au jeûne juif des lundi et jeudi ; cf. Mt 6.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile selon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Thomas
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '104 : « Ils dirent à Jésus : “Viens, prions aujourd''hui et jeûnons.” Jésus répondit : “Quel est donc le péché que j''ai commis, ou en quoi ai-je été vaincu ? Mais quand l''époux sera sorti de la chambre nuptiale, alors qu''ils jeûnent et prient !” »'
      marker-yv: yv-n
    - type: text
      text: Les jours viendront où le marié leur sera enlevé ; alors ils jeûneront, en ces jours-là.
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
