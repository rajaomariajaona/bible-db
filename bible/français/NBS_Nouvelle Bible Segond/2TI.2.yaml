document_id: 2TI.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un soldat du Christ
  - type: text
    content: ' '
  - type: note
    content: 'mon enfant 1.2+. –  sois puissant  : cf. 1.7 ; 4.17 ; Ac 9.22 ; Ep 6.10 ; Ph 4.13 ; 1Tm 1.12. –  dans la grâce  : cf. 1.9. –  en Jésus-Christ 1.1+ ; 2Co 12.9.'
  - type: text
    content: 'Toi donc, mon enfant, sois puissant dans la grâce qui est en Jésus-Christ. '
  '10':
  - type: note
    content: 'Cf. 2Co 1.6 ; 4.10ss ; Ep 3.13 ; Ph 2.17 ; Col 1.24 ; 1Tm 1.16. –  j''endure tout  : le même verbe est traduit par persévérer au v. 12 ; terme apparenté en 3.10 ; 1Tm 6.11 ; Tt 2.2 ; cf. Rm 12.12 ; 1Co 13.7 ; Hé 10.32 ; 12.2s. –  à cause de ceux qui ont été choisis  : cf. Mt 24.22/ / ; Lc 18.7 ; Tt 1.1 ; voir aussi Rm 8.33 ; 16.13 ; Ep 1.3ss ; Col 3.12 ; 2Th 2.13 ; 2P 1.10. –  avec une gloire éternelle  : cf. Col 1.28 ; 3.4 ; 2Th 2.14 ; 1P 1.7ss.'
  - type: text
    content: 'C''est pourquoi j''endure tout à cause de ceux qui ont été choisis, afin qu''eux aussi accèdent au salut qui est en Jésus-Christ, avec une gloire éternelle. '
  '11':
  - type: note
    content: 'Rm 6.4ss ; Ga 3.19s ; 1Tm 1.17+. –  Cette parole est certaine 1Tm 1.15+. –  si nous sommes morts avec lui  : le pronom lui est probablement sous-entendu dans le texte ; on pourrait aussi comprendre si nous sommes morts ensemble, de même dans la suite ; cf. Rm 6.8 ; voir aussi Mc 14.31/ / ; Jn 11.16 ; 2Co 4.10 ; 5.14 ; 7.3n  ; Ph 3.10.'
  - type: text
    content: 'Cette parole est certaine :'
  - type: text
    content: si nous sommes morts avec lui,
  - type: text
    content: nous vivrons aussi avec lui ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: persévérons ou endurons v. 10+ ; cf. Lc 8.15 ; 21.19 ; Hé 10.36 ; 12.1ss ; voir aussi Rm 8.17. –  régnerons 4.1+ ; Rm 5.17 ; Ep 2.6 ; Ap 5.10 ; 20.4 ; 22.5. –  si nous le renions… v. 13 ; 3.5 ; 1Tm 5.8+ ; Mt 10.33/ / ; Tt 1.16 ; Hé 10.39.
  - type: text
    content: si nous persévérons,
  - type: text
    content: nous régnerons aussi avec lui ;
  - type: text
    content: si nous le renions,
  - type: text
    content: lui aussi nous reniera ;
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction  : si nous sommes infidèles, lui demeure fidèle (ou digne de confiance ) 1Co 1.9+ ; cf. Mi 7.18 ; Ml 3.6 ; Rm 3.3s ; 11.29,32 ; Hé 2.17 ; 4.15 ; 1Jn 1.9. –  il ne peut…  : cf. Nb 23.19 ; Tt 1.2.'
  - type: text
    content: si nous manquons de foi,
  - type: text
    content: lui demeure digne de foi,
  - type: text
    content: car il ne peut se renier lui-même.
  - type: heading
    content: Un ouvrier qui n'a pas à avoir honte
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'rappeler  : cf. 1.6n  ; Tt 3.1 ; 2P 1.12. –  adjurant 4.1 ; 1Tm 5.21. –  querelles de mots v. 23 ; 1Tm 6.4+. –  la ruine  : le terme grec correspondant a donné notre mot catastrophe.'
  - type: text
    content: 'Voilà ce que tu dois rappeler, en adjurant devant Dieu qu''on évite les querelles de mots qui ne servent à rien, sinon à la ruine de ceux qui les écoutent. '
  '15':
  - type: note
    content: 'Cf. 1Tm 4.6. –  te présenter  : cf. Rm 6.13ss ; 12.1 ; 2Co 11.2 ; Ep 5.27 ; Col 1.22,28. –  qui a fait ses preuves  : autre traduction approuvé Rm 1.28n  ; 16.10 ; 1Co 11.19 ; 2Co 10.18 ; 13.5ss ; Ph 2.22 ; Tt 1.16. –  ouvrier  : cf. Mt 20.1ss ; Lc 10.2 ; 2Co 11.13 ; Ph 3.2 ; 1Tm 5.18. –  qui n''a pas à avoir honte 1.8+ ; cf. Rm 6.21 ; 2Co 4.2 ; Ph 1.20 ; Tt 2.7s. –  dispense avec droiture  : litt. coupe droit  ; c''est peut-être l''image du laboureur qui trace un sillon droit, ou celle d''un autre artisan habile et efficace ; cf. Ga 2.14 ; voir aussi 2Co 2.17 ; 4.2 ; Hé 4.12 ; 2P 3.16. –  la parole (v. 9) de la vérité Jn 17.17 ; 2Co 6.7 ; Ep 1.13 ; Col 1.5s ; Jc 1.18 ; 1P 1.22.'
  - type: text
    content: 'Efforce-toi de te présenter devant Dieu comme un homme qui a fait ses preuves, un ouvrier qui n''a pas à avoir honte, qui dispense avec droiture la parole de la vérité. '
  '16':
  - type: note
    content: 'Evite Tt 3.9. –  discours vides et profanateurs 1Tm 1.9n  ; 4.7 ; 6.20 ; voir saint. –  toujours plus  : cf. 3.9,13 ; voir aussi 2Jn 9. –  impiété Rm 1.18 ; 2P 2.15 ; 3.7 ; Jd 15.'
  - type: text
    content: 'Evite les discours vides et profanateurs : ceux qui les tiennent progresseront toujours plus dans l''impiété. '
  '17':
  - type: note
    content: 'comme la gangrène  : cf. 4.3 ; 1Tm 6.3,4n,5n  ; voir aussi Mt 16.6,12 ; 1Co 5.6 ; Ga 5.9. –  Hyménée  : cf. 1Tm 1.20.'
  - type: text
    content: 'Leur parole rongera comme la gangrène. Hyménée et Philète sont de ce nombre. '
  '18':
  - type: note
    content: 'passés à côté  : cf. 1Tm 1.6n  ; 6.21n. –  la résurrection ou, selon certains mss, une résurrection  ; cf. Mt 27.52ss ; Lc 20.35 ; Jn 11.24ss ; Rm 6.4ss ; 1Co 6.14n  ; Ep 1.6 ; 2.5 ; Ph 3.11 ; Col 2.12s ; 3.1 ; voir aussi Ac 17.32 ; 1Co 15.12 ; 2Co 5.1ss ; 1Th 4.14 ; Actes de Paul 14 : « Nous t''apprendrons ce qu''est la résurrection dont Paul dit qu''elle va venir ; elle est survenue déjà par les enfants que nous avons, et nous ressuscitons en reconnaissant le vrai Dieu. » Evangile de Philippe 121.90 : « Ceux qui disent qu''on va d''abord mourir et ressusciter se trompent. Si l''on n''obtient pas d''abord la résurrection étant vivant, lorsqu''on meurt on n''obtiendra rien. » –  renversent ou bouleversent Tt 1.11n.'
  - type: text
    content: Ils sont passés à côté de la vérité, en disant que la résurrection a déjà eu lieu, et ils renversent la foi de quelques-uns.
  - type: heading
    content: Les fondations solides que Dieu a posées
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'fondations ou fondement (litt. le solide fondement de Dieu ) : cf. Rm 15.20 ; 1Co 3.9nss ; Ep 2.20 ; 3.17 ; Col 1.23 ; 1Tm 6.19n  ; voir aussi Es 28.16 ; Mt 16.18 ; 1Tm 3.15. –  scellées  : cf. Ex 28.11,36 ; Ag 2.23 ; Za 3.9 ; Ct 8.6. –  Le Seigneur… Nb 16.5  ; cf. Mt 7.22s ; Jn 6.37 ; 10.14,28 ; 1Co 8.3 ; 2Th 2.13. –  Que quiconque prononce…  : cf. Es 26.13  ; 1Co 1.2. – Voir nom . –  s''éloigne…  : cf. Nb 16.26 ; Es 52.11 ; Ps 97.10 ; Jb 36.10 ; Lc 13.27 ; 1Co 6.17 ; 15.32ss ; 2Co 7.1 ; Siracide 17.26 : « Reviens au Très-Haut et détourne-toi de l''injustice, déteste vigoureusement l''abomination. »'
  - type: text
    content: 'Pourtant, les fondations solides que Dieu a posées tiennent bon, scellées de ces paroles : '
  - type: text
    content: Le Seigneur connaît ceux qui lui appartiennent,
  - type: text
    content: ' et : '
  - type: text
    content: Que quiconque prononce le nom du Seigneur s'éloigne de l'injustice !
  - type: text
    content: ' '
  '2':
  - type: note
    content: 'ce que tu as entendu (ou appris) de moi 1.13 ; cf. 3.14. –  en présence de beaucoup de témoins  : cf. 1Tm 4.14 ; 6.12 ; autre traduction par beaucoup de témoins, cf. 1Co 15.3ss. –  confie-le  : verbe apparenté au mot traduit par dépôt en 1.12,14. –  des gens dignes de confiance ou fidèles, sûrs (le même terme est traduit par certaine au v. 11, digne de foi au v. 13) ; cf. 1Tm 3.9,11. –  capables (2Co 2.16n) … de l''enseigner  : cf. 1Tm 3.2.'
  - type: text
    content: 'Et ce que tu as entendu de moi en présence de beaucoup de témoins, confie-le à des gens dignes de confiance qui seront capables, à leur tour, de l''enseigner à d''autres. '
  '20':
  - type: note
    content: 'maison 1Co 3.10ss ; 1Tm 3.15 ; Hé 3.6. –  objets ou vases, ustensiles Es 22.24. –  d''or et d''argent…  : cf. 1Co 3.12 ; voir aussi 11.19 ; 12.23 ; Mt 13.36ss,47ss. –  pour un usage noble / pour un usage vil  : litt. pour l''honneur / pour le déshonneur, voir Rm 9.21.'
  - type: text
    content: 'Or, dans une grande maison, il n''y a pas seulement des objets d''or et d''argent, mais il y en a aussi de bois et de terre ; les uns sont pour un usage noble, les autres pour un usage vil. '
  '21':
  - type: note
    content: 'se purifie…  : litt. se purifie de ceux-ci  ; cf. v. 19 ; 1Co 5.7 ; 15.33 ; 2Th 3.14. –  pour un usage noble v. 20n  ; cf. Ac 9.15. –  consacré ou sanctifié (voir saint) : cf. Jn 17.19. –  utile  : cf. Phm 11n. –  maître  : même terme 1Tm 6.1. –  propre  : litt. préparé, prêt, Tt 3.1. –  à toute œuvre bonne  : cf. 3.17 ; 2Co 9.8 ; Ep 2.10 ; 1Tm 5.10 ; Tt 3.8,14.'
  - type: text
    content: Si donc quelqu'un se purifie en se séparant de ces derniers, il sera un objet pour un usage noble, consacré, utile à son maître, propre à toute œuvre bonne.
  - type: heading
    content: Le serviteur du Seigneur
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'désirs de la jeunesse  : cf. 1Tm 4.12 ; autre traduction possible les penchants pour la nouveauté . –  la justice…  : cf. 1Tm 6.11n  ; voir aussi Ga 5.22+. –  la paix Hé 12.14 ; cf. Rm 12.18 ; 14.17. –  ceux qui invoquent…  : cf. Ac 9.14,21 ; Rm 10.12s ; 1Co 1.2+. –  d''un cœur pur  : cf. v. 21 ; 1.3+ ; Mt 5.8 ; 1Tm 2.8 ; Tt 2.14 ; Hé 9.14 ; 10.2,22.'
  - type: text
    content: 'Fuis les désirs de la jeunesse ; poursuis plutôt la justice, la foi, l''amour, la paix, avec ceux qui invoquent le Seigneur d''un cœur pur. '
  '23':
  - type: note
    content: 'V. 14. –  Repousse 1Tm 4.7n. –  débats 1Tm 1.4+. –  extravagants (ou inutiles, litt. fous) et ineptes  : cf. 3.9 ; Tt 3.9 ; voir aussi Pr 5.23 ; 8.5 ; 15.12,14 ; 24.7.'
  - type: text
    content: 'Repousse les débats extravagants et ineptes, sachant qu''ils font naître des querelles. '
  '24':
  - type: note
    content: '1Tm 3.2s ; Tt 3.2. –  un esclave du Seigneur Tt 1.1 ; Jc 1.1 ; 1P 2.16 ; cf. Mt 10.24s/ / ; 11.29 ; 12.18ss ; Jn 13.14s ; 15.20 ; 1P 2.23. –  affable ou doux (synonyme au v. 25) 1Th 2.7n. –  apte à enseigner  : cf. 4.2 ; 1Tm 3.2+.'
  - type: text
    content: 'Or un esclave du Seigneur ne doit pas se quereller. Il doit au contraire être affable envers tous, apte à enseigner, prêt à supporter le mal ; '
  '25':
  - type: note
    content: 'corrige ou éduque, même verbe en 1Tm 1.20n (apprendre) ; Tt 2.12 (enseigner). –  avec douceur  : cf. Mt 5.5n  ; 1Co 4.21+ ; Tt 3.2. –  contradicteurs  : cf. 1Tm 5.14 ; 6.20 ; Tt 1.9. –  au cas où…  : cf. 1Tm 2.4 ; voir aussi Jr 13.23 ; Mc 4.12. –  Dieu leur donnerait de changer radicalement (litt. le changement radical, la repentance ou la conversion) Ac 2.38n  ; 5.31 ; 11.18+. –  connaissance de la vérité 3.7 ; 1Tm 2.4n  ; cf. Mt 11.27 ; Ep 1.17.'
  - type: text
    content: 'qu''il corrige avec douceur les contradicteurs, au cas où Dieu leur donnerait de changer radicalement pour parvenir à la connaissance de la vérité, '
  '26':
  - type: note
    content: 'revenir à leur bon sens 1Tm 3.2n  ; cf. 1Co 15.34. –  pièges du diable (voir démon, diable, Satan) 1Tm 3.7 ; cf. Lc 21.34s ; Rm 11.9 ; 1Tm 6.9. –  pris  : litt. attrapés vivants, même verbe Lc 5.10. –  pour les soumettre…  : autre traduction possible (se dégager…) pour se soumettre (enfin) à sa volonté (celle de Dieu).'
  - type: text
    content: de revenir à leur bon sens et de se dégager des pièges du diable, qui les a pris pour les soumettre à sa volonté.
  '3':
  - type: note
    content: 'Souffre avec moi  : cf. 1.8+. –  un bon (litt. beau) soldat…  : le terme désigne en particulier le militaire de carrière, cf. 4.7+ ; voir aussi Rm 6.13 ; 2Co 6.7 ; 10.3ss ; Ep 6.13ss ; Ph 1.30 ; 1Th 5.8 ; 1Tm 1.18 ; 4.10 ; Phm 2.'
  - type: text
    content: 'Souffre avec moi comme un bon soldat de Jésus-Christ. '
  '4':
  - type: note
    content: 'Les exemples qui suivent (soldat, athlète, cultivateur) semblent souligner à la fois que Timothée doit à son ministère un engagement total et que l''Eglise se doit en conséquence de subvenir à ses besoins matériels. –  combattant…  : cf. 1Co 9.7n. –  s''embarrasse  : le même verbe est traduit par se laisser prendre par en 2P 2.20. –  plaire… 1Co 7.32,34 ; 1Th 2.4 ; cf. 1Jn 3.22.'
  - type: text
    content: 'Aucun combattant, dans une armée, ne s''embarrasse des affaires de la vie, s''il veut plaire à celui qui l''a enrôlé. '
  '5':
  - type: note
    content: L'athlète 1Co 9.24ss ; Ph 3.13s ; 1Tm 4.8. –  couronné 4.7s ; 1Co 9.25. –  selon les règles 1Tm 1.8n  ; cf. Mt 7.21ss.
  - type: text
    content: 'L''athlète n''est pas couronné s''il n''a pas combattu selon les règles. '
  '6':
  - type: note
    content: 1Co 9.7,10s ; 1Tm 5.17ns ; cf. Dt 20.6 ; Pr 27.18.
  - type: text
    content: 'Le cultivateur qui se donne de la peine doit être le premier à recevoir sa part des fruits. '
  '7':
  - type: note
    content: 'Comprends…  : cf. Mt 15.17 ; 16.9,11 ; 24.15 ; 1Co 10.15. –  donnera de l''intelligence  : cf. Ep 3.4 ; Col 1.9 ; 2.2 ; voir aussi Pr 2.6 ; 1Co 2.15 ; 1Jn 2.27.'
  - type: text
    content: 'Comprends ce que je dis : le Seigneur te donnera de l''intelligence en tout.'
  - type: heading
    content: Souviens-toi de Jésus-Christ ressuscité
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Souviens-toi 1Th 2.9 ; cf. Jn 16.4. –  de Jésus-Christ  : cf. Hé 2.9 ; voir aussi Ac 2.36. –  réveillé ou relevé , voir résurrection  ; Ac 3.15n  ; cf. 13.30 ; Rm 1.4 ; 10.9 ; 1Co 15.4,12ss,20 ; 2Tm 1.10 ; Ap 1.18. –  et qui est issu  : sous-entendu probable du texte ; autre traduction qui a été suscité (autre sens possible du verbe traduit par s''est réveillé ) de la descendance de David Rm 1.3+ ; cf. Mt 1.1 ; Lc 1.27,32 ; Ac 2.29s ; Ap 5.5. –  ma bonne nouvelle ou mon Evangile  : cf. Rm 2.16 ; 16.25 ; voir aussi 2Co 4.3 ; 1Th 1.5 ; 2Th 2.14 ; 1Tm 1.11.'
  - type: text
    content: 'Souviens-toi de Jésus-Christ, qui s''est réveillé d''entre les morts, et qui est issu de la descendance de David, selon ma bonne nouvelle, '
  '9':
  - type: note
    content: 'pour laquelle  : autre traduction (Jésus-Christ) en qui…, cf. Ep 1.7,11,13. –  je supporte les souffrances (ou le mal) v. 3 ; 1.12 ; même verbe en 4.5n  ; Jc 5.13 (être dans la souffrance). –  prisonnier / prisonnière  : litt. lié(e) 1.16+. –  malfaiteur  : cf. Lc 23.32ss. –  la parole de Dieu 1Th 2.13 ; 2Th 3.1 ; Tt 2.5 ; cf. Es 40.8 ; 55.11 ; Hé 4.12 ; voir aussi Ac 28.31 ; Ep 3.1ss ; Ph 1.12ss ; 2Tm 4.17.'
  - type: text
    content: 'pour laquelle je supporte les souffrances, même celle d''être prisonnier comme un malfaiteur. Mais la parole de Dieu n''est pas prisonnière. '
