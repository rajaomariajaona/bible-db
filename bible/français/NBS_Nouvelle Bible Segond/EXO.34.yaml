document_id: EXO.34,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les nouvelles tablettes de la loi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux tablettes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 24.12+ ; 32.19 ; Dt 10.1. Après '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme les premières
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et monte vers moi sur la montagne.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : Taille deux tablettes de pierre comme les premières ; j''écrirai sur ces tablettes les paroles qui étaient sur les premières tablettes que tu as brisées. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il répondit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en ta faveur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: telles qu'il n'y en a jamais eu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui n''ont pas été créées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Je conclus moi-même une alliance. Je ferai, devant tout ton peuple, des choses étonnantes, telles qu''il n''y en a jamais eu sur toute la terre et dans toutes les nations ; tout le peuple qui t''entoure verra l''œuvre du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', cette œuvre redoutable que j''accomplirai avec toi.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 3.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 23.27 ; Dt 7.'
      marker-yv: yv-n
    - type: text
      text: 'Prends garde à ce que je t''ordonne aujourd''hui. Je chasserai devant toi les Amorites, les Cananéens, les Hittites, les Perizzites, les Hivvites et les Jébusites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de peur… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 23.33+.
      marker-yv: yv-n
    - type: text
      text: 'Garde-toi de conclure une alliance pour les habitants du pays où tu dois entrer, de peur qu''ils ne deviennent un piège en ton sein : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leurs pierres levées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs poteaux cultuels (leurs ashéras)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Gn 28.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 14.15,23.'
      marker-yv: yv-n
    - type: text
      text: vous démolirez leurs autels, vous briserez leurs pierres levées et vous couperez leurs poteaux cultuels (leurs ashéras).
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent ici l''hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le nom du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ', c''est Qana (le Passionné, le Jaloux)'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu à la passion jalouse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El-qana’.
      marker-yv: yv-n
    - type: text
      text: Tu ne te prosterneras pas devant un autre dieu ; car son nom, c'est le-
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '-à-la-passion-jalouse (YHWH-Qana) : c''est un Dieu à la passion jalouse.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se prostituant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Os 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne conclus pas d''alliance pour les habitants du pays, de peur que, se prostituant avec leurs dieux et leur offrant des sacrifices, ils ne t''invitent, et que tu n''en manges ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: de peur que tu ne prennes de leurs filles pour tes fils, et que celles-ci, se prostituant avec leurs dieux, n'entraînent tes fils à se prostituer avec leurs dieux.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.4.
      marker-yv: yv-n
    - type: text
      text: Tu ne te feras pas de dieu de métal fondu.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pains sans levain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.15+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mois des épis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu observeras la fête des Pains sans levain : pendant sept jours, au temps fixé, au mois des épis, tu mangeras des pains sans levain, comme je te l''ai ordonné, car c''est au mois des épis que tu es sorti d''Egypte.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'né le premier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de même que tout mâle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après LXX. Le texte hébreu traditionnel porte une formule obscure que certains traduisent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de tout ton troupeau tu feras une évocation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un souvenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). Les mots hébreux correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'évocation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: souvenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 3.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') et à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mâle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont très proches. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: agneau ou chevreau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ces deux mots traduisent un seul terme hébreu (rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un mouton ou une chèvre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 20) qui désigne une tête de petit bétail (par opposition aux bovins), sans autre précision si le contexte n'en fournit pas.
      marker-yv: yv-n
    - type: text
      text: 'Quiconque est né le premier de sa mère m''appartient, de même que tout mâle né le premier dans tes troupeaux, veau, agneau ou chevreau. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prêt '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.11.
      marker-yv: yv-n
    - type: text
      text: 'Sois prêt au matin ; dès le matin tu monteras au mont Sinaï ; tu te tiendras là devant moi, sur le sommet de la montagne. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 13.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on ne paraîtra pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 23s ; 23.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tu dégageras l'ânon né le premier de sa mère en le remplaçant par un mouton ou une chèvre ; si tu ne le dégages pas, tu lui briseras la nuque. Tu dégageras tout premier-né parmi tes fils ; on ne paraîtra pas devant moi les mains vides.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.21 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 16.29+s.
      marker-yv: yv-n
    - type: text
      text: Pendant six jours tu travailleras, mais le septième jour tu feras sabbat ; même au temps des labours et de la moisson, tu feras sabbat.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la première moisson
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des premiers fruits de la moisson
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 23.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la fin de l'année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même terme en 1S 1.20 ; Ps 19.7 ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: achever sa course
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; 2Ch 24.23.
      marker-yv: yv-n
    - type: text
      text: 'Tu célébreras la fête des Semaines, celle de la première moisson du froment, ainsi que la fête de la Récolte, à la fin de l''année. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 23.14+,17.
      marker-yv: yv-n
    - type: text
      text: 'Trois fois par an, toute ta population mâle devra paraître devant le Seigneur, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), le Dieu d''Israël. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car je déposséderai des nations devant toi et j''agrandirai ton territoire ; personne ne convoitera ton pays pendant que tu monteras pour paraître devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, trois fois par an.'
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '34.25 '
      - type: usfm
        marker: fq
