document_id: EXO.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les nouvelles tablettes de la loi
  - type: text
    content: ' '
  - type: note
    content: 'deux tablettes  : cf. 24.12+ ; 32.19 ; Dt 10.1. Après comme les premières , LXX ajoute et monte vers moi sur la montagne.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Taille deux tablettes de pierre comme les premières ; j''écrirai sur ces tablettes les paroles qui étaient sur les premières tablettes que tu as brisées. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Il répondit  : litt. il dit . –  une alliance  : LXX ajoute en ta faveur (ou avec toi ). –  telles qu''il n''y en a jamais eu  : litt. qui n''ont pas été créées (cf. Gn 1.1n).'
  - type: text
    content: 'Il répondit : Je conclus moi-même une alliance. Je ferai, devant tout ton peuple, des choses étonnantes, telles qu''il n''y en a jamais eu sur toute la terre et dans toutes les nations ; tout le peuple qui t''entoure verra l''œuvre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', cette œuvre redoutable que j''accomplirai avec toi.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.8n  ; 23.27 ; Dt 7.
  - type: text
    content: 'Prends garde à ce que je t''ordonne aujourd''hui. Je chasserai devant toi les Amorites, les Cananéens, les Hittites, les Perizzites, les Hivvites et les Jébusites. '
  '12':
  - type: note
    content: de peur… 23.33+.
  - type: text
    content: 'Garde-toi de conclure une alliance pour les habitants du pays où tu dois entrer, de peur qu''ils ne deviennent un piège en ton sein : '
  '13':
  - type: note
    content: '23.24+. –  leurs pierres levées / leurs poteaux cultuels (leurs ashéras)  : voir Gn 28.18n  ; Jg 3.7n  ; 1R 14.15,23.'
  - type: text
    content: vous démolirez leurs autels, vous briserez leurs pierres levées et vous couperez leurs poteaux cultuels (leurs ashéras).
  '14':
  - type: text
    content: ' '
  - type: note
    content: '20.5. –  dieu et Dieu traduisent ici l''hébreu ’El , cf. v. 6+. –  son nom…  : cf. 3.15n  ; certains comprennent le nom du Seigneur, c''est Qana (le Passionné, le Jaloux) . –  Dieu à la passion jalouse  : hébreu ’El-qana’.'
  - type: text
    content: Tu ne te prosterneras pas devant un autre dieu ; car son nom, c'est le-
  - type: text
    content: Seigneur
  - type: text
    content: '-à-la-passion-jalouse (YHWH-Qana) : c''est un Dieu à la passion jalouse.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: se prostituant Os 2.4n.
  - type: text
    content: 'Ne conclus pas d''alliance pour les habitants du pays, de peur que, se prostituant avec leurs dieux et leur offrant des sacrifices, ils ne t''invitent, et que tu n''en manges ; '
  '16':
  - type: note
    content: Voir fils.
  - type: text
    content: de peur que tu ne prennes de leurs filles pour tes fils, et que celles-ci, se prostituant avec leurs dieux, n'entraînent tes fils à se prostituer avec leurs dieux.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 20.4.
  - type: text
    content: Tu ne te feras pas de dieu de métal fondu.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Pains sans levain 12.15+ ; voir calendrier et fêtes. –  mois des épis 13.4n.
  - type: text
    content: 'Tu observeras la fête des Pains sans levain : pendant sept jours, au temps fixé, au mois des épis, tu mangeras des pains sans levain, comme je te l''ai ordonné, car c''est au mois des épis que tu es sorti d''Egypte.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'né le premier 13.2n,12+. –  de même que tout mâle , d''après LXX. Le texte hébreu traditionnel porte une formule obscure que certains traduisent  : de tout ton troupeau tu feras une évocation (ou un souvenir ). Les mots hébreux correspondant à évocation (ou souvenir , voir 3.15n  ; 12.14n) et à mâle sont très proches. –  agneau ou chevreau  : ces deux mots traduisent un seul terme hébreu (rendu par un mouton ou une chèvre au v. 20) qui désigne une tête de petit bétail (par opposition aux bovins), sans autre précision si le contexte n''en fournit pas.'
  - type: text
    content: 'Quiconque est né le premier de sa mère m''appartient, de même que tout mâle né le premier dans tes troupeaux, veau, agneau ou chevreau. '
  '2':
  - type: note
    content: prêt 19.11.
  - type: text
    content: 'Sois prêt au matin ; dès le matin tu monteras au mont Sinaï ; tu te tiendras là devant moi, sur le sommet de la montagne. '
  '20':
  - type: note
    content: 'Cf. 13.13n. –  on ne paraîtra pas…  : cf. v. 23s ; 23.15n.'
  - type: text
    content: Tu dégageras l'ânon né le premier de sa mère en le remplaçant par un mouton ou une chèvre ; si tu ne le dégages pas, tu lui briseras la nuque. Tu dégageras tout premier-né parmi tes fils ; on ne paraîtra pas devant moi les mains vides.
  '21':
  - type: text
    content: ' '
  - type: note
    content: sabbat 16.29+s.
  - type: text
    content: Pendant six jours tu travailleras, mais le septième jour tu feras sabbat ; même au temps des labours et de la moisson, tu feras sabbat.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'de la première moisson  : litt. des premiers fruits de la moisson , cf. 23.16n. –  à la fin de l''année  : même terme en 1S 1.20 ; Ps 19.7 ( achever sa course ) ; 2Ch 24.23.'
  - type: text
    content: 'Tu célébreras la fête des Semaines, celle de la première moisson du froment, ainsi que la fête de la Récolte, à la fin de l''année. '
  '23':
  - type: note
    content: 23.14+,17.
  - type: text
    content: 'Trois fois par an, toute ta population mâle devra paraître devant le Seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Israël. '
  '24':
  - type: text
    content: 'Car je déposséderai des nations devant toi et j''agrandirai ton territoire ; personne ne convoitera ton pays pendant que tu monteras pour paraître devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, trois fois par an.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'mon sacrifice sanglant  : litt. le sang de mon sacrifice , comme en 23.18 (avec un autre verbe). –  quelque chose de levé 12.15+. –  ne passera pas la nuit 12.8-10.'
  - type: text
    content: Tu n'immoleras pas mon sacrifice sanglant avec quelque chose de levé ; le sacrifice de la fête de la Pâque ne passera pas la nuit jusqu'au lendemain.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 23.19n.
  - type: text
    content: 'Tu apporteras à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les prémices des premiers fruits de ta terre.'
  - type: text
    content: Tu ne feras pas cuire un chevreau dans le lait de sa mère.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Ecris 17.14+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Ecris ces paroles ; c''est d''après elles que je conclus une alliance avec toi et avec Israël. '
  '28':
  - type: note
    content: 'quarante jours… 24.18+. –  Il ne mangea rien…  : litt. il ne mangea pas de pain et il ne but pas d''eau. –  il écrivit  : le sujet peut être Moïse (v. 27) ou Dieu (v. 1). –  les Dix paroles  : en grec (LXX) déka logous, d''où décalogue. On comprend généralement qu''il s''agit ici des Dix commandements de 20.1n-17 (cf. 34.1) ; certains y voient cependant les prescriptions rituelles de 34.14-26.'
  - type: text
    content: 'Moïse resta là, avec le '
  - type: text
    content: Seigneur
  - type: text
    content: ', quarante jours et quarante nuits. Il ne mangea rien, il ne but rien ; il écrivit sur les tablettes les paroles de l''alliance, les Dix paroles.'
  - type: heading
    content: Retour de Moïse au camp
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'rayonner  : le verbe hébreu ainsi traduit est de la même racine que le mot habituellement rendu par corne , qui peut aussi désigner un rayon de lumière (cf. Ha 3.4). La version latine (Vg) a employé ici le mot cornutus , d''où la représentation traditionnelle de Moïse cornu. Il est toutefois à noter que le dieu Baal est parfois représenté avec un casque portant deux cornes, symbolisant la force et la virilité de la divinité. –  lorsqu''il avait parlé avec lui  : on peut comprendre lorsque le Seigneur avait parlé avec Moïse , ou lorsqu''il avait parlé avec le Seigneur.'
  - type: text
    content: 'Moïse descendit du mont Sinaï : les deux tablettes du Témoignage étaient dans la main de Moïse lorsqu''il descendit de la montagne ; Moïse ne savait pas que la peau de son visage s''était mise à rayonner lorsqu''il avait parlé avec lui. '
  '3':
  - type: note
    content: Que personne ne monte 19.12s.
  - type: text
    content: Que personne ne monte avec toi, et qu'on ne voie personne dans toute la montagne ; que ni le petit bétail ni le gros bétail ne paisse devant cette montagne.
  '30':
  - type: note
    content: 'Aaron  : voir prêtre. –  peur  : voir crainte.'
  - type: text
    content: 'Aaron et tous les Israélites regardèrent Moïse : la peau de son visage rayonnait, et ils avaient peur de s''approcher de lui. '
  '31':
  - type: text
    content: 'Moïse les appela : Aaron et tous les princes de la communauté vinrent auprès de lui, et Moïse leur parla. '
  '32':
  - type: note
    content: il institua pour eux ou il leur prescrivit, il leur ordonna  ; le verbe correspondant est apparenté au mot souvent traduit par commandement(s).
  - type: text
    content: 'Après cela, tous les Israélites s''approchèrent, et il institua pour eux tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait dit sur le mont Sinaï. '
  '33':
  - type: note
    content: 'Cf. 2Co 3.7-13. –  un voile  : autre traduction un masque  ; le terme hébreu correspondant n''apparaît qu''ici.'
  - type: text
    content: 'Lorsque Moïse eut achevé de leur parler, il mit un voile sur son visage. '
  '34':
  - type: text
    content: 'Quand Moïse entrait devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour parler avec lui, et jusqu''à ce qu''il sorte, il retirait le voile ; quand il sortait, il disait aux Israélites ce qui lui avait été ordonné. '
  '35':
  - type: note
    content: 'la peau du visage de Moïse  : LXX omet cette répétition. –  parler avec lui v. 29n.'
  - type: text
    content: Les Israélites regardaient le visage de Moïse et voyaient que la peau du visage de Moïse rayonnait ; Moïse remettait alors le voile sur son visage jusqu'au moment où il rentrait pour parler avec lui.
  '4':
  - type: text
    content: 'Moïse tailla deux tablettes de pierre comme les premières. Puis Moïse se leva de bon matin et monta sur le mont Sinaï, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui avait ordonné ; il prit les deux tablettes de pierre.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'nuée 13.21n  ; cf. 19.16. –  et proclama  : on pourrait aussi comprendre  : et il (Moïse) invoqua (cf. 33.19n). – Voir nom.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' descendit dans la nuée, se tint là auprès de lui et proclama le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '6':
  - type: note
    content: 'Dieu  : hébreu ’El, cf. v. 14n  ; Gn 21.33n. –  compatissant…  : cf. Nb 14.18 ; Dt 4.31 ; Jl 2.13 ; Jon 4.2 ; Na 1.3 ; Ps 78.38 ; 86.15 ; 103.8 ; 111.4 ; 112.4 ; 116.5 ; 145.8 ; Né 9.17,31 ; 2Ch 30.9 ; Jc 5.11. –  clément ou qui fait grâce 22.26 ; cf. Né 9.17+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' passa devant lui en proclamant : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH, YHWH), Dieu compatissant et clément, patient et grand par la fidélité et la loyauté, '
  '7':
  - type: note
    content: '20.5ns. – Voir génération. –  qui pardonne  : autres traductions qui enlève ; qui se charge de ; qui supporte  ; cf. 10.17n  ; Lv 10.17 ; Nb 14.18. –  qui ne tient pas…  : litt. qui n''innocente pas. – Voir fils.'
  - type: text
    content: qui conserve sa fidélité jusqu'à la millième génération, qui pardonne la faute, la transgression et le péché, mais qui ne tient pas le coupable pour innocent, qui fait rendre des comptes aux fils et aux petits-fils pour la faute des pères, jusqu'à la troisième et la quatrième génération !
  '8':
  - type: text
    content: 'Moïse s''empressa de s''incliner jusqu''à terre, en se prosternant. '
  '9':
  - type: note
    content: 'daigne marcher parmi nous  : litt. que le Seigneur marche en notre sein ou au milieu de nous  ; cf. 33.3n,15s. –  rétif 32.9n. –  notre faute et notre péché  : certains mss hébreux portent nos fautes et nos péchés.'
  - type: text
    content: 'Il dit : Seigneur, je t''en prie, si j''ai trouvé grâce à tes yeux, daigne marcher parmi nous, car c''est un peuple rétif ; tu pardonneras notre faute et notre péché, et tu feras de nous ton patrimoine.'
  - type: heading
    content: Le renouvellement de l'alliance
