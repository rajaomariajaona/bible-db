document_id: EXO.26
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: La demeure sacrée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Demeure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 36.8-38 ; Nb 4.25,31s ; cf. Hé 9.1-5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'keroubim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 3.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce sera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu les feras d''ouvrage d''artisan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 31).
    marker-yv: yv-n
  - type: text
    text: 'Tu feras la Demeure de dix toiles de fin lin retors, de pourpre violette et rouge et d''écarlate, avec des keroubim ; ce sera un ouvrage d''artisan. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt-huit coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 13 m ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : près de 2 m ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'La longueur de chaque toile sera de vingt-huit coudées, la largeur de chaque toile sera de quatre coudées ; la mesure sera la même pour toutes les toiles. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Cinq toiles seront attachées l''une à l''autre ; les cinq autres toiles seront aussi attachées l''une à l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Tu feras des lacets de pourpre violette au bord de la première toile, à l''extrémité de l''assemblage ; tu feras de même au bord de la toile à l''extrémité du second assemblage. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Tu feras cinquante lacets à la première toile, et tu feras cinquante lacets au bord de la toile à l''extrémité du second assemblage ; ces lacets correspondront les uns aux autres. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: formera un tout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sera une
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 11 ; 36.13,18.'
    marker-yv: yv-n
  - type: text
    text: Tu feras cinquante agrafes d'or et tu attacheras les toiles l'une à l'autre avec ces agrafes. Ainsi la Demeure formera un tout.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Tu feras des toiles de poil de chèvre qui constitueront une tente au-dessus de la Demeure ; tu feras onze toiles. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'La longueur de chaque toile sera de trente coudées, la largeur de chaque toile sera de quatre coudées ; la mesure sera la même pour les onze toiles. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu doubleras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu replieras.
    marker-yv: yv-n
  - type: text
    text: 'Tu attacheras séparément cinq toiles, et les six autres toiles séparément ; tu doubleras la sixième toile vers le devant de la tente. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Tu feras cinquante lacets au bord de la première toile, à l''extrémité du premier assemblage, et cinquante lacets au bord de la toile du second assemblage. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Tu feras cinquante agrafes de bronze, et tu introduiras ces agrafes dans les lacets. Tu assembleras ainsi la tente, qui formera un tout. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le surplus qui dépassera dans les toiles de la tente, la moitié de la toile qui dépassera sera en surplus à l'arrière de la Demeure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui pourrait aussi signifier qu''une moitié seulement du surplus retombe à l''arrière et, dès lors, que l''autre moitié retombe à l''avant (cf. v. 9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Les toiles de la tente auront un surplus d''une demi-toile qui retombera à l''arrière de la Demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la coudée d'une part et la coudée d'autre part…
    marker-yv: yv-n
  - type: text
    text: La coudée que les toiles de la tente auront en surplus de part et d'autre, dans le sens de la longueur, retombera sur les deux côtés de la Demeure, pour la couvrir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dauphin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '25.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tu feras pour la tente une couverture en peau de bélier teinte en rouge, et une couverture en peau de dauphin par-dessus.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'planches '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cadres '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'destinés à supporter les toiles ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: colonnes, montants.
    marker-yv: yv-n
  - type: text
    text: 'Tu feras des planches pour la Demeure ; elles seront en bois d''acacia, placées debout. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'La longueur d''une planche sera de dix coudées et la largeur de chaque planche d''une coudée et demie. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il y aura à chaque planche deux tenons parallèles l''un à l''autre ; tu feras de même pour toutes les planches de la Demeure. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du midi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du Néguev
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 12.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu feras les planches pour la Demeure, vingt planches en direction du midi, au sud. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Tu feras quarante socles d''argent pour les placer sous les vingt planches, deux socles sous chaque planche, pour ses deux tenons. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Pour le deuxième côté de la Demeure, en direction du nord, vingt planches, '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'et leurs quarante socles d''argent, deux socles sous chaque planche. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vers l'ouest
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vers la mer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même en 27.12 ; cf. 10.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu feras six planches pour le fond de la Demeure, vers l''ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Tu feras deux planches pour les angles de la Demeure, dans le fond ; '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: par un anneau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par un même anneau ; au premier anneau.
    marker-yv: yv-n
  - type: text
    text: 'elles seront jumelées depuis le bas, et bien liées ensemble à leur sommet par un anneau ; il en sera de même pour les deux qui sont placées aux deux coins. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Il y aura ainsi huit planches, avec leurs socles d''argent, soit seize socles, deux socles sous chaque planche. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: traverses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot pourrait aussi désigner des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: verrous.
    marker-yv: yv-n
  - type: text
    text: 'Tu feras cinq traverses en bois d''acacia pour les planches d''un côté de la Demeure, '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'cinq traverses pour les planches de l''autre côté de la Demeure, et cinq traverses pour les planches du côté de la Demeure qui forme le fond, vers l''ouest. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'La traverse centrale, au milieu des planches, ira d''une extrémité à l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: Tu couvriras d'or les planches, tu feras d'or les anneaux qui recevront les traverses, et tu couvriras d'or les traverses.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: selon la disposition
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: selon son ordre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le même mot est souvent traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'droit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: règle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; il peut aussi avoir le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: coutume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 15.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tu dresseras la Demeure selon la disposition qui t'a été montrée dans la montagne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'voile '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 36.35-38 ; Lv 16.12,15 ; 2Ch 3.14 ; Mt 27.51/ / ; Hé 6.19 ; 9.3 ; 10.20.
    marker-yv: yv-n
  - type: text
    text: 'Tu feras un voile de pourpre violette et rouge, d''écarlate et de fin lin retors, avec des keroubim ; ce sera un ouvrage d''artisan. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Tu le mettras sur quatre colonnes d''acacia couvertes d''or, avec leurs crochets d''or, posées sur quatre socles d''argent. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '26.33 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Hé 9.2ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Saint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme peut aussi être traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sanctuaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 28.29). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Très-Sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '29.37'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tu mettras le voile au-dessous des agrafes ; c'est là, à l'intérieur, au-delà du voile, que tu feras entrer le coffre du Témoignage ; le voile constituera pour vous la séparation entre le Sacré et le Très-Sacré.
