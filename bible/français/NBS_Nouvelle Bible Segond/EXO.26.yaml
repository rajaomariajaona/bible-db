document_id: EXO.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La demeure sacrée
  - type: text
    content: ' '
  - type: note
    content: 'Demeure 25.9n  ; 36.8-38 ; Nb 4.25,31s ; cf. Hé 9.1-5. –  keroubim 25.18n  ; Gn 3.24n. –  ce sera…  : litt. tu les feras d''ouvrage d''artisan (v. 31).'
  - type: text
    content: 'Tu feras la Demeure de dix toiles de fin lin retors, de pourpre violette et rouge et d''écarlate, avec des keroubim ; ce sera un ouvrage d''artisan. '
  '10':
  - type: text
    content: 'Tu feras cinquante lacets au bord de la première toile, à l''extrémité du premier assemblage, et cinquante lacets au bord de la toile du second assemblage. '
  '11':
  - type: text
    content: 'Tu feras cinquante agrafes de bronze, et tu introduiras ces agrafes dans les lacets. Tu assembleras ainsi la tente, qui formera un tout. '
  '12':
  - type: note
    content: Litt. le surplus qui dépassera dans les toiles de la tente, la moitié de la toile qui dépassera sera en surplus à l'arrière de la Demeure, ce qui pourrait aussi signifier qu'une moitié seulement du surplus retombe à l'arrière et, dès lors, que l'autre moitié retombe à l'avant (cf. v. 9n).
  - type: text
    content: 'Les toiles de la tente auront un surplus d''une demi-toile qui retombera à l''arrière de la Demeure. '
  '13':
  - type: note
    content: Litt. la coudée d'une part et la coudée d'autre part…
  - type: text
    content: La coudée que les toiles de la tente auront en surplus de part et d'autre, dans le sens de la longueur, retombera sur les deux côtés de la Demeure, pour la couvrir.
  '14':
  - type: text
    content: ' '
  - type: note
    content: dauphin 25.5n.
  - type: text
    content: Tu feras pour la tente une couverture en peau de bélier teinte en rouge, et une couverture en peau de dauphin par-dessus.
  '15':
  - type: text
    content: ' '
  - type: note
    content: planches ou cadres destinés à supporter les toiles ; LXX colonnes, montants.
  - type: text
    content: 'Tu feras des planches pour la Demeure ; elles seront en bois d''acacia, placées debout. '
  '16':
  - type: text
    content: 'La longueur d''une planche sera de dix coudées et la largeur de chaque planche d''une coudée et demie. '
  '17':
  - type: text
    content: 'Il y aura à chaque planche deux tenons parallèles l''un à l''autre ; tu feras de même pour toutes les planches de la Demeure. '
  '18':
  - type: note
    content: 'du midi  : autre traduction du Néguev, cf. Gn 12.9n.'
  - type: text
    content: 'Tu feras les planches pour la Demeure, vingt planches en direction du midi, au sud. '
  '19':
  - type: text
    content: 'Tu feras quarante socles d''argent pour les placer sous les vingt planches, deux socles sous chaque planche, pour ses deux tenons. '
  '2':
  - type: note
    content: 'vingt-huit coudées  : environ 13 m ; quatre coudées  : près de 2 m ; voir mesures.'
  - type: text
    content: 'La longueur de chaque toile sera de vingt-huit coudées, la largeur de chaque toile sera de quatre coudées ; la mesure sera la même pour toutes les toiles. '
  '20':
  - type: text
    content: 'Pour le deuxième côté de la Demeure, en direction du nord, vingt planches, '
  '21':
  - type: text
    content: 'et leurs quarante socles d''argent, deux socles sous chaque planche. '
  '22':
  - type: note
    content: 'vers l''ouest  : litt. vers la mer, de même en 27.12 ; cf. 10.19n.'
  - type: text
    content: 'Tu feras six planches pour le fond de la Demeure, vers l''ouest. '
  '23':
  - type: text
    content: 'Tu feras deux planches pour les angles de la Demeure, dans le fond ; '
  '24':
  - type: note
    content: 'par un anneau  : autres traductions par un même anneau ; au premier anneau.'
  - type: text
    content: 'elles seront jumelées depuis le bas, et bien liées ensemble à leur sommet par un anneau ; il en sera de même pour les deux qui sont placées aux deux coins. '
  '25':
  - type: text
    content: 'Il y aura ainsi huit planches, avec leurs socles d''argent, soit seize socles, deux socles sous chaque planche. '
  '26':
  - type: note
    content: 'traverses  : le mot pourrait aussi désigner des verrous.'
  - type: text
    content: 'Tu feras cinq traverses en bois d''acacia pour les planches d''un côté de la Demeure, '
  '27':
  - type: text
    content: 'cinq traverses pour les planches de l''autre côté de la Demeure, et cinq traverses pour les planches du côté de la Demeure qui forme le fond, vers l''ouest. '
  '28':
  - type: text
    content: 'La traverse centrale, au milieu des planches, ira d''une extrémité à l''autre. '
  '29':
  - type: text
    content: Tu couvriras d'or les planches, tu feras d'or les anneaux qui recevront les traverses, et tu couvriras d'or les traverses.
  '3':
  - type: text
    content: 'Cinq toiles seront attachées l''une à l''autre ; les cinq autres toiles seront aussi attachées l''une à l''autre. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'selon la disposition  : litt. selon son ordre  ; le même mot est souvent traduit par droit ou règle  ; il peut aussi avoir le sens de coutume , cf. 15.25n.'
  - type: text
    content: Tu dresseras la Demeure selon la disposition qui t'a été montrée dans la montagne.
  '31':
  - type: text
    content: ' '
  - type: note
    content: voile 36.35-38 ; Lv 16.12,15 ; 2Ch 3.14 ; Mt 27.51/ / ; Hé 6.19 ; 9.3 ; 10.20.
  - type: text
    content: 'Tu feras un voile de pourpre violette et rouge, d''écarlate et de fin lin retors, avec des keroubim ; ce sera un ouvrage d''artisan. '
  '32':
  - type: text
    content: 'Tu le mettras sur quatre colonnes d''acacia couvertes d''or, avec leurs crochets d''or, posées sur quatre socles d''argent. '
  '33':
  - type: note
    content: 'Hé 9.2ss. –  le Sacré ou Saint  : le terme peut aussi être traduit par sanctuaire (cf. 28.29). –  le Très-Sacré 29.37n.'
  - type: text
    content: Tu mettras le voile au-dessous des agrafes ; c'est là, à l'intérieur, au-delà du voile, que tu feras entrer le coffre du Témoignage ; le voile constituera pour vous la séparation entre le Sacré et le Très-Sacré.
  '34':
  - type: text
    content: ' '
  - type: note
    content: expiatoire 25.17n.
  - type: text
    content: 'Tu mettras l''expiatoire sur le coffre du Témoignage, dans le Très-Sacré. '
  '35':
  - type: note
    content: la table du pain offert, 25.23-30.
  - type: text
    content: Tu placeras la table à l'extérieur du voile et le porte-lampes en face de la table, sur le côté sud de la Demeure ; tu mettras la table sur le côté nord.
  '36':
  - type: text
    content: 'Tu feras pour l''entrée de la tente un rideau de pourpre violette et rouge, d''écarlate et de fin lin retors ; ce sera un ouvrage de brodeur. '
  '37':
  - type: text
    content: Tu feras pour le rideau cinq colonnes d'acacia ; tu les couvriras d'or, tu leur mettras des crochets d'or ; tu fondras pour elles cinq socles de bronze.
  '4':
  - type: text
    content: 'Tu feras des lacets de pourpre violette au bord de la première toile, à l''extrémité de l''assemblage ; tu feras de même au bord de la toile à l''extrémité du second assemblage. '
  '5':
  - type: text
    content: 'Tu feras cinquante lacets à la première toile, et tu feras cinquante lacets au bord de la toile à l''extrémité du second assemblage ; ces lacets correspondront les uns aux autres. '
  '6':
  - type: note
    content: 'formera un tout  : litt. sera une, de même au v. 11 ; 36.13,18.'
  - type: text
    content: Tu feras cinquante agrafes d'or et tu attacheras les toiles l'une à l'autre avec ces agrafes. Ainsi la Demeure formera un tout.
  '7':
  - type: text
    content: 'Tu feras des toiles de poil de chèvre qui constitueront une tente au-dessus de la Demeure ; tu feras onze toiles. '
  '8':
  - type: text
    content: 'La longueur de chaque toile sera de trente coudées, la largeur de chaque toile sera de quatre coudées ; la mesure sera la même pour les onze toiles. '
  '9':
  - type: note
    content: 'tu doubleras  : autre traduction tu replieras.'
  - type: text
    content: 'Tu attacheras séparément cinq toiles, et les six autres toiles séparément ; tu doubleras la sixième toile vers le devant de la tente. '
