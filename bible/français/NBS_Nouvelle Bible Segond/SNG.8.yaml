document_id: SNG.8,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'mon frère  : cf. 4.9n. –  nourri au sein  : litt. tétant (ou suçant ) les seins . –  je t''embrasserais  : même verbe hébreu que dans couvrir de baisers en 1.2n  ; cf. Pr 7.13.'
  - type: text
    content: Ah ! si tu étais mon frère,
  - type: text
    content: nourri au sein de ma mère !
  - type: text
    content: Je te trouverais dehors, je t'embrasserais,
  - type: text
    content: et on ne me mépriserait pas.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'muraille / seins  : réponse à la question des v. 8s. –  celle (litt. comme celle ) qui trouve  : (cf. 1.3 ; 5.6ss) autre traduction possible qui procure (cf. Mt 5.9). –  la paix  : hébreu shalom , en assonance avec Salomon ( Shelomo ) au v. 11 (voir aussi 1.1n  ; 7.1n).'
  - type: text
    content: Je suis une muraille,
  - type: text
    content: et mes seins en sont comme les tours ;
  - type: text
    content: aussi ai-je été à ses yeux celle qui trouve la paix.
  - type: heading
    content: Lui
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon v. 10n  ; 1.1n. –  vigne / gardiens 1.6n  ; cf. Ec 2.4 ; 1Ch 27.27. –  Baal-Hamôn  : Maître de la foule . –  mille pièces (probablement des sicles ; voir mesures, poids et monnaies) d''argent  : cf. Es 7.23. – Certains voient dans l''ensemble de ce verset énigmatique une allusion au harem de Salomon ; cf. 6.8 ; 1R 11.3.'
  - type: text
    content: Salomon avait une vigne à Baal-Hamôn ;
  - type: text
    content: il remit la vigne à des gardiens ;
  - type: text
    content: chacun apportait pour son fruit mille pièces d'argent.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'devant moi  : cf. Gn 24.51. –  les mille pièces  : litt. les mille . –  ceux qui… gardent  : le terme est traduit par gardiens au v. 11.'
  - type: text
    content: Ma vigne à moi, je l'ai devant moi.
  - type: text
    content: A toi, Salomon, les mille pièces,
  - type: text
    content: et deux cents à ceux qui en gardent le fruit !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Toi qui habites dans les jardins  : cf. 2.2 ; 4.12ss ; 6.2. –  des compagnons 1.7. –  fais-moi entendre ta voix 2.14.'
  - type: text
    content: Toi qui habites dans les jardins,
  - type: text
    content: 'des compagnons t''écoutent :'
  - type: text
    content: fais-moi entendre ta voix !
  - type: heading
    content: Elle
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.17n.
  - type: text
    content: Prends la fuite, mon bien-aimé !
  - type: text
    content: Sois semblable à la gazelle ou au faon des biches
  - type: text
    content: sur les monts des essences odoriférantes !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'je t''introduirais… mère 3.4. –  du vin 5.1. –  parfumé  : autre mot qu''en 7.3n. –  grenades 4.3+,13.'
  - type: text
    content: Je te conduirais, je t'introduirais dans la maison de ma mère ;
  - type: text
    content: tu m'instruirais,
  - type: text
    content: et je te ferais boire du vin parfumé,
  - type: text
    content: du jus de mes grenades.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 2.6.
  - type: text
    content: Que sa main gauche soit sous ma tête,
  - type: text
    content: que son bras droit m'enlace !
  - type: heading
    content: Autres ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 2.7+.
  - type: text
    content: Je vous en adjure, filles de Jérusalem,
  - type: text
    content: n'éveillez pas, ne réveillez pas l'amour,
  - type: text
    content: avant qu'il le désire.
  - type: heading
    content: L'amour est fort comme la mort
  - type: heading
    content: Autres
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est celle… 3.6. –  Je t''ai éveillé  : cf. v. 4 ; Syr a lu les pronoms compléments au féminin  : je t''ai éveillée… –  pommier 2.3+. –  t''a conçu  : autre traduction a éprouvé les douleurs pour te mettre au monde  ; cf. Ps 7.15n.'
  - type: text
    content: Qui est celle qui monte du désert,
  - type: text
    content: appuyée sur son bien-aimé ?
  - type: heading
    content: Elle
  - type: text
    content: Je t'ai éveillé sous le pommier ;
  - type: text
    content: là même où ta mère t'a conçu,
  - type: text
    content: là où t'a conçu celle qui t'a mis au monde.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'un sceau  : litt. le sceau , objet personnel, que l''on emporte partout avec soi ; il marque de son empreinte ce qui appartient à son propriétaire et authentifie les documents émanant de lui ; cf. Gn 38.18 ; 1R 21.8 ; Jr 22.24 ; Ag 2.23n. –  sur ton bras v. 3 ; 2.6. –  mort / séjour des morts Es 28.15 ; Os 13.14 ; Ha 2.5. –  fièvres Dt 32.24 ; Ps 76.4 (le même mot est rendu par foudres ) ; Jb 5.7n ( étincelles ). –  brûlantes  : litt. de feu . –  une flamme du Seigneur (Yah)  : litt. flamme-de-Yah (forme abrégée du nom divin YHWH ) ; ce serait la seule mention de Dieu dans le Cantique, à moins qu''on ne change la vocalisation de l''hébreu pour lire ses flammes . Certains commentateurs, tout en lisant une flamme du Seigneur , comprennent cette expression dans un sens superlatif et impersonnel  : une flamme sacrée, puissante, redoutable (cf. Gn 1.2n, et l''expression le feu du Seigneur , désignant la foudre, en Nb 11.1,3 ; 1R 18.38 ; 2R 1.12 ; Jb 1.16).'
  - type: text
    content: Place-moi comme un sceau sur ton cœur,
  - type: text
    content: comme un sceau sur ton bras ;
  - type: text
    content: car l'amour est fort comme la mort,
  - type: text
    content: la passion jalouse est dure comme le séjour des morts ;
  - type: text
    content: ses fièvres sont des fièvres brûlantes,
  - type: text
    content: 'une flamme du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah).'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'grandes eaux Ps 18.17 ; 77.20 ; cf. Gn 6–9. –  fleuves… Es 43.2. –  donnerait tous les biens  : cf. Mt 13.44,46.'
  - type: text
    content: De grandes eaux ne peuvent éteindre l'amour,
  - type: text
    content: et des fleuves ne sauraient l'emporter ;
  - type: text
    content: quand un homme donnerait tous les biens de sa maison contre l'amour,
  - type: text
    content: il n'obtiendrait que le mépris.
  - type: heading
    content: Autres
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.6 ; sur le rôle des frères  ; cf. Gn 24.50 ; 34 ; 2S 13. –  où on la demandera en mariage  : litt. où on parlera d''elle  ; expression analogue en 1S 25.39n  ; d''autres comprennent où on parlera contre elle.'
  - type: text
    content: Nous avons une petite sœur
  - type: text
    content: qui n'a pas encore de seins ;
  - type: text
    content: que ferons-nous pour notre sœur
  - type: text
    content: le jour où on la demandera en mariage ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'nous fixerons sur elle  : certains comprennent nous la bloquerons (avec) ; le verbe est habituellement traduit par assiéger (Dt 20.12,19 etc.). –  cèdre 1.17.'
  - type: text
    content: Si elle est une muraille,
  - type: text
    content: nous bâtirons sur elle des créneaux d'argent ;
  - type: text
    content: si elle est une porte,
  - type: text
    content: nous fixerons sur elle une planche de cèdre.
  - type: heading
    content: Elle
