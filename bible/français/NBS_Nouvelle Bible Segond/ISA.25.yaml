document_id: ISA.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur, refuge pour le faible
  - type: text
    content: ' '
  - type: note
    content: 'je t''exalterai 12.1,4 ; Ps 118.28. – Voir nom. –  réalisé  : litt. fait . –  projets étonnants ou conseils admirables 5.19n  ; 9.5 ; 28.29. –  depuis longtemps 22.11+. –  fermes / solides  : termes hébreux apparentés au mot amen (cf. 7.9n).'
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es mon Dieu ;'
  - type: text
    content: je t'exalterai, je célébrerai ton nom,
  - type: text
    content: car tu as réalisé des projets étonnants,
  - type: text
    content: depuis longtemps fermes et solides.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'sur cette montagne v. 6. –  Moab  : cf. 15.1+–16.14. –  foulé Mi 7.10. –  paille / fumier  : hébreu matbén / madména  : le terme hébreu joue probablement sur le nom d''une ville moabite ; cf. Jr 48.2. –  mare à fumier  : litt. les eaux du fumier . Autre lecture traditionnelle, avec des versions anciennes, dans le fumier.'
  - type: text
    content: 'Car la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' repose sur cette montagne ;'
  - type: text
    content: et Moab est foulé sur place,
  - type: text
    content: comme la paille est foulée dans une mare à fumier ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'au milieu de cette mare  : litt. en son sein. –  le Seigneur abaisse (litt. il abaisse  ; cf. 2.9+) son orgueil 6.6 ; Jr 48.29.'
  - type: text
    content: au milieu de cette mare il tend les mains,
  - type: text
    content: comme le nageur les tend pour nager ;
  - type: text
    content: 'mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' abaisse son orgueil,'
  - type: text
    content: en même temps que les pièges de ses mains.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Texte et traduction incertains ; cf. v. 2 ; 26.5. –  il les abat…  : litt. jusque dans la poussière.'
  - type: text
    content: Il renverse, il abaisse les fortifications élevées de tes murs,
  - type: text
    content: il leur fait toucher terre, il les abat dans la poussière.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ville 24.10n. –  cité / palais  : cf. 23.1 ; 32.13s. –  étrangers 1.7 ; 29.5 ; Jr 51.51 ; Ez 7.21 ; 11.9 ; Ab 11 ; Lm 5.2. –  a disparu  : sous-entendu dans le texte. –  jamais il ne sera rebâti 13.20.'
  - type: text
    content: Car tu as réduit la ville en un tas de pierres,
  - type: text
    content: la cité forte en un monceau de ruines ;
  - type: text
    content: le palais des étrangers a disparu de la ville,
  - type: text
    content: jamais il ne sera rebâti.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '24.15s,21. –  nations brutales  : cf. Ez 28.7 ; 30.11 ; 31.12 ; 32.12. – Voir crainte.'
  - type: text
    content: C'est pourquoi le peuple puissant te glorifie,
  - type: text
    content: la ville des nations brutales te craint.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'une forteresse (ou un refuge , cf. 27.5n  ; 30.2ns) pour le faible…  : cf. 26.1,6 ; 29.19s. –  abri / ombrage 4.6. –  comme la pluie battant un mur  : certains modifient légèrement le texte hébreu pour lire comme la pluie du froid.'
  - type: text
    content: Car tu as été une forteresse pour le faible,
  - type: text
    content: une forteresse pour le pauvre dans la détresse,
  - type: text
    content: un abri contre l'averse violente,
  - type: text
    content: un ombrage contre la chaleur ;
  - type: text
    content: car le souffle des brutes
  - type: text
    content: est comme la pluie battant un mur.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '24.8n. –  est étouffée  : sous-entendu dans le texte.'
  - type: text
    content: Comme tu domptes la chaleur sur un lieu desséché,
  - type: text
    content: tu as dompté le vacarme des étrangers ;
  - type: text
    content: comme la chaleur est étouffée par l'ombre d'un nuage,
  - type: text
    content: ainsi l'a été le chant des brutes.
  - type: heading
    content: Un banquet pour tous les peuples
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'pour tous les peuples 2.2+. –  dans cette montagne v. 10 ; 24.23 ; 27.13. –  banquet 55.1ss ; Ex 24.11 ; cf. Dt 16.13-15 ; 1S 9.13 ; Pr 9.2-5 ; Né 8.10-12. Voir aussi Mt 8.11 ; 22.2-10 ; 26.29 ; Lc 14.15-24 ; Ap 19.9,17. –  mets succulents  : litt. graisses  ; cf. Lv 3.3n. –  pleins  : sous-entendu dans le texte. –  vins vieux, clarifiés  : traduction approximative ; il s''agit de vins qui sont restés longtemps sur leur lie (cf. Jr 48.11 ; So 1.12n).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: fera pour tous les peuples, dans cette montagne,
  - type: text
    content: un banquet de mets succulents,
  - type: text
    content: un banquet de vins vieux,
  - type: text
    content: de mets succulents, pleins de moelle,
  - type: text
    content: de vins vieux, clarifiés.
  '7':
  - type: text
    content: ' '
  - type: note
    content: voile de deuil (v. 8 ; cf. 2S 15.30 ; 19.5 ; Jr 14.3s ; Est 6.12), peut-être aussi symbole d'aveuglement ou de méconnaissance de Dieu (cf. 29.10-12 ; 1R 19.13 ; Lc 2.32n  ; 2Co 3.13-18).
  - type: text
    content: Dans cette montagne,
  - type: text
    content: il anéantira le voile qui voile tous les peuples,
  - type: text
    content: la couverture qui couvre toutes les nations ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'il anéantira (cf. v. 7) la mort 26.19 ; 1Co 15.54 (citation d''après une version grecque). –  essuiera les larmes Ps 116.8 ; Ap 7.17 ; 21.4. –  le déshonneur  : autre traduction les outrages que subit son peuple . –  c''est le Seigneur … 1.2n.'
  - type: text
    content: il anéantira la mort pour toujours ;
  - type: text
    content: 'le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' essuiera'
  - type: text
    content: les larmes de tous les visages ;
  - type: text
    content: il fera disparaître de toute la terre
  - type: text
    content: le déshonneur de son peuple
  - type: text
    content: '– c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parle.'
  - type: heading
    content: Humiliation de Moab
  '9':
  - type: text
    content: ' '
  - type: note
    content: En ce jour-là on dira 12.1+. –  allégresse 1P 1.8.
  - type: text
    content: 'En ce jour-là on dira :'
  - type: text
    content: C'est lui, notre Dieu !
  - type: text
    content: Nous avons mis notre espérance en lui
  - type: text
    content: et il nous a sauvés.
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ', en qui nous avons espéré :'
  - type: text
    content: soyons dans l'allégresse,
  - type: text
    content: réjouissons-nous de son salut !
