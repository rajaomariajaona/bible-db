document_id: JER.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de Jérémie lors d'une sécheresse
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.2+.
  - type: text
    content: 'Parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Jérémie à l''occasion de la sécheresse :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.31. –  ils ne restent pas en place  : litt. ils ne retiennent pas leurs pieds . –  il se souvient… Os 8.13 ; 9.9. –  fait rendre des comptes…  : cf. 6.15n. – Voir péché.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à ce peuple : Vraiment, ils aiment vagabonder, ils ne restent pas en place ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne les agrée pas ; maintenant il se souvient de leur faute, il leur fait rendre des comptes pour leurs péchés. '
  '11':
  - type: note
    content: 7.16+.
  - type: text
    content: 'Et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Ne prie pas pour le bien de ce peuple. '
  '12':
  - type: note
    content: 'jeûnent…  : cf. Jl 1.13-14+ ; 2.15-17 ; Ps 69. –  je n''entendrai pas ou je n''écouterai pas. –  holocaustes… 6.20+ ; voir sacrifices. –  épée… famine (5.12+) et… peste  : cf. 15.2 ; 21.7,9 ; 24.10 ; 27.8,13 ; 28.8n  ; 29.17s ; 34.17 ; 38.2 ; 42.17 ; 44.13 ; Lv 26.25s ; Ez 5.12+ ; Ap 6.8.'
  - type: text
    content: 'S''ils jeûnent, je n''entendrai pas leurs cris de détresse ; s''ils offrent des holocaustes et des offrandes, je ne les agréerai pas : je veux les exterminer par l''épée, par la famine et par la peste. '
  '13':
  - type: note
    content: 'Ah ! Seigneur Dieu ! 1.6+. –  les prophètes leur disent…  : cf. 4.10+ ; 5.31+ ; 1R 22.12 ; voir aussi Gn 3.4. –  une paix ou une prospérité (v. 19n  ; 4.10n) véritable  : quelques mss hébreux et des versions anciennes ont lu paix et loyauté (ou stabilité, sécurité) ; cf. 33.6.'
  - type: text
    content: 'Je répondis : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', les prophètes leur disent : Vous ne verrez pas d''épée, vous n''aurez pas de famine ; mais je vous donnerai en ce lieu une paix véritable. '
  '14':
  - type: note
    content: 'mensonge 13.6s,25+ ; cf. Mt 24.5/ /. –  annoncent  : le verbe hébreu correspondant est traduit par parler (en mon nom) au v. 15, parler en prophète au v. 16 ; voir 2.8n  ; une autre forme du même verbe est rendue par font les prophètes  ; cf. Nb 11.25n. –  pas envoyés… 23.16,21,25s,32 ; 27.15 ; 28.15 ; 29.9,23,31 ; Lm 2.14 ; cf. Mt 7.22s. – Voir cœur.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : C''est le mensonge que les prophètes annoncent en mon nom ; je ne les ai pas envoyés, je ne leur ai pas donné d''ordre, je ne leur ai pas parlé ; c''est par des visions mensongères, de la divination, de l''idolâtrie et des tromperies de leur cœur qu''ils font les prophètes pour vous. '
  '15':
  - type: note
    content: 'voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. 13.9,12s ; 15.2). –  contre (ou sur) les prophètes 23.31 ; Ez 13.3.'
  - type: text
    content: 'A cause de cela, voici ce que dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre les prophètes qui parlent en mon nom, sans que je les aie envoyés, en disant qu''il n''y aura dans ce pays ni épée ni famine : Ces prophètes seront exterminés par l''épée et par la famine. '
  '16':
  - type: note
    content: 'Quant aux gens du peuple…  : c.-à-d. leurs cadavres ; cf. 8.2+. –  je ferai retomber  : litt. je verserai. –  le mal qu''ils font  : litt. leur mal  ; cf. 2.19+ ; 6.19+.'
  - type: text
    content: Quant aux gens du peuple pour qui ils parlent en prophètes, ils seront jetés dans les rues de Jérusalem par la famine et l'épée ; il n'y aura personne pour les ensevelir, ni eux, ni leurs femmes, ni leurs fils, ni leurs filles ; je ferai retomber sur eux le mal qu'ils font.
  - type: heading
    content: Jérémie confesse les fautes de son peuple
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Mes yeux… 8.23+ ; cf. 4.19 ; 13.17. –  la jolie fille, mon peuple  : litt. la vierge de la fille de mon peuple  ; le terme correspondant à vierge est omis par LXX  ; voir aussi 4.11n  ; 18.13 ; 31.4,21 ; 46.11 ; Es 37.22. –  désastre ou blessure 4.6n. –  coup ou plaie, fléau 6.7 ; 10.19+.'
  - type: text
    content: 'Tu leur diras cette parole :'
  - type: text
    content: Mes yeux fondent en larmes nuit et jour, sans répit ;
  - type: text
    content: car la jolie fille, mon peuple,
  - type: text
    content: a été frappée d'un grand désastre,
  - type: text
    content: d'un coup très douloureux.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'V. 12 ; 5.12+. –  campagne / épée Ez 7.15. –  parcourent le pays  : certains comprennent errent vers le pays (des morts).'
  - type: text
    content: Si je sors dans la campagne,
  - type: text
    content: je trouve des victimes de l'épée ;
  - type: text
    content: si j'entre dans la ville,
  - type: text
    content: des gens épuisés par la faim ;
  - type: text
    content: même le prophète et le prêtre parcourent le pays
  - type: text
    content: et sont privés de connaissance.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'As-tu donc rejeté  : autre traduction méprises-tu donc  ; cf. Lm 5.22. –  as-tu de l''aversion ou ton cœur est-il dégoûté  ; cf. 12.8. –  guérison 15.18+. –  Nous espérions…  : autre traduction nous espérions la paix  ; cf. v. 13 ; 8.15n.'
  - type: text
    content: As-tu donc rejeté Juda,
  - type: text
    content: as-tu de l'aversion pour Sion ?
  - type: text
    content: Pourquoi nous frappes-tu
  - type: text
    content: sans qu'il y ait pour nous de guérison ?
  - type: text
    content: Nous espérions que tout irait bien,
  - type: text
    content: mais il n'y a rien de bon ;
  - type: text
    content: un temps de guérison,
  - type: text
    content: mais c'est l'effroi !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'deuil 4.28+. –  ses villes…  : litt. ses portes (de villes) dépérissent (ou sont délabrées , comme en Lm 2.8), s''assombrissent à terre  ; cf. 15.7 ; Es 3.26 ; Lm 1.4.'
  - type: text
    content: Juda est en deuil,
  - type: text
    content: ses villes dépérissent ;
  - type: text
    content: elles s'assombrissent, leurs portes abattues,
  - type: text
    content: et les cris de Jérusalem s'élèvent.
  '20':
  - type: text
    content: ' '
  - type: note
    content: connaissons ou reconnaissons v. 7 ; Lv 26.40 ; Dn 9.4-19.
  - type: text
    content: Seigneur
  - type: text
    content: ', nous connaissons notre méchanceté,'
  - type: text
    content: la faute de nos pères ;
  - type: text
    content: car nous avons péché contre toi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'A cause de ton nom v. 7+. –  ne méprise pas 23.17 ; 33.24 ; Jl 2.17. –  rabaisse Dt 32.15n  ; Mi 7.6 ; Na 3.6. –  le trône de ta gloire 17.12 ; cf. 3.17n. –  Ne romps pas ton alliance  : cf. 11.10+.'
  - type: text
    content: A cause de ton nom, ne méprise pas,
  - type: text
    content: ne rabaisse pas le trône de ta gloire !
  - type: text
    content: Souviens-toi ! Ne romps pas ton alliance avec nous !
  '22':
  - type: text
    content: ' '
  - type: note
    content: les futilités , c.-à-d. les idoles 8.19n. –  le ciel , habituellement considéré comme la demeure des dieux, ici comme une simple partie de la création qui ne peut d'elle-même provoquer les ondées . –  c'est toi qui as fait… 5.22-24 ; Es 66.2 ; Jb 5.10 ; Ac 14.17.
  - type: text
    content: Parmi les futilités des nations,
  - type: text
    content: en est-il qui fassent pleuvoir ?
  - type: text
    content: Est-ce le ciel qui donne les ondées ?
  - type: text
    content: 'N''est-ce pas toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu ?'
  - type: text
    content: C'est en toi que nous mettons notre espérance,
  - type: text
    content: car c'est toi qui as fait tout cela.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Les princes  : même terme 25.34ss ; 30.21 ; il peut aussi prendre le sens de magnifique, brave . –  aux citernes…  : cf. 2.13+. –  ils se voilent la tête en signe de deuil et de confusion , cf. v. 4 ; 2S 15.30 ; Est 6.12+ ; la fin du v. est absente de LXX.'
  - type: text
    content: Les princes envoient les petits chercher de l'eau ;
  - type: text
    content: ils vont aux citernes, ne trouvent pas d'eau
  - type: text
    content: et reviennent avec leurs cruches vides ;
  - type: text
    content: dans leur honte et leur confusion
  - type: text
    content: ils se voilent la tête.
  '4':
  - type: text
    content: ' '
  - type: note
    content: de la terre Gn 2.5n. –  plus de pluie 3.3+. –  les laboureurs… Jl 1.11.
  - type: text
    content: A cause de la terre crevassée,
  - type: text
    content: parce qu'il n'y a plus de pluie dans le pays,
  - type: text
    content: les laboureurs, dans leur honte,
  - type: text
    content: se voilent la tête.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jb 39.1-4.
  - type: text
    content: Même la biche dans la campagne
  - type: text
    content: met bas et abandonne sa portée,
  - type: text
    content: parce qu'il n'y a pas de verdure.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ânes sauvages 2.24+. –  pistes du désert 3.2n,21n. –  leurs yeux s''épuisent Ps 69.4+ ; Jb 11.20+. –  à chercher l''herbe…  : litt. car il n''y a pas d''herbe.'
  - type: text
    content: Les ânes sauvages se tiennent sur les pistes du désert,
  - type: text
    content: haletant comme des chacals ;
  - type: text
    content: leurs yeux s'épuisent
  - type: text
    content: à chercher l'herbe qui n'est plus.
  '7':
  - type: text
    content: ' '
  - type: note
    content: nos fautes v. 20 ; voir aussi 5.25+. –  à cause de ton nom v. 21 ; Es 48.9 ; Ez 20.9 ; 36.22 ; Ps 25.11 ; Dn 9.19. –  nous avons péché 3.25+.
  - type: text
    content: – Si nos fautes nous accusent,
  - type: text
    content: 'agis à cause de ton nom, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Car nos infidélités sont nombreuses,
  - type: text
    content: et c'est contre toi que nous avons péché.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'l''espérance d''Israël  : le mot traduit par espérance peut aussi désigner une réserve d''eau (Ex 7.19 ; Es 22.11) ; cf. 17.13 ; 50.7 ; Es 33.2 ; Esd 10.2 ; 1Ch 29.15 ; voir aussi Jr 2.13+. –  Sauveur (Es 43.3+) au temps de la détresse 15.11 ; Ps 77.3. –  un immigré  : cf. 7.6 ; Ex 12.48n.'
  - type: text
    content: Toi, l'espérance d'Israël,
  - type: text
    content: son Sauveur au temps de la détresse,
  - type: text
    content: pourquoi serais-tu comme un immigré dans le pays,
  - type: text
    content: comme un voyageur qui fait un détour pour passer la nuit ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'un héros (cf. 20.11n) qui ne peut sauver  : cf. So 3.17. –  parmi nous Ex 29.45 ; cf. Jn 1.26. –  ton nom est invoqué 7.10+ ; cf. 15.16 ; Dt 28.10 ; Es 43.7 ; Jc 2.7. –  ne nous laisse pas  : litt. ne nous dépose pas  ; on pourrait traduire ne nous laisse pas tomber  ; on trouve un emploi analogue du même verbe, rendu par livrer , en Ps 119.121.'
  - type: text
    content: Pourquoi serais-tu comme un homme déconcerté,
  - type: text
    content: comme un héros qui ne peut sauver ?
  - type: text
    content: 'Tu es pourtant parmi nous, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et ton nom est invoqué sur nous ;
  - type: text
    content: ne nous laisse pas !
  - type: heading
    content: Dieu refuse d'exaucer la prière de Jérémie
