      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2Co 2.13+ ; cf. Tt 1.4 ; 3.12. – La '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dalmatie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: correspond à la partie côtière de l'Illyrie (Rm 15.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) qui aujourd'hui comprendrait approximativement la Croatie, la Bosnie, le Monténégro et le nord de l'Albanie.
      marker-yv: yv-n
    - type: text
      text: 'En effet, Démas m''a abandonné, par amour pour le monde présent, et il est parti pour Thessalonique ; Crescens est allé en Galatie, Tite en Dalmatie. '
