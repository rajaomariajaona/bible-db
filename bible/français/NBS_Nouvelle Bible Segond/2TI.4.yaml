document_id: 2TI.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Proclame la Parole
  - type: text
    content: ' '
  - type: note
    content: 'Je t''adjure… 2.14+ ; cf. 1Tm 6.13. –  juger les vivants et les morts Ac 10.42+ ; cf. Rm 14.9s ; 1Th 4.15ss. –  au nom de  : autre traduction pour . –  manifestation  : cf. v. 8 ; 1Tm 6.14n. –  royaume ou règne v. 18 ; 2.12 ; 1Th 2.12 ; 2Th 1.5 ; Hé 12.23 ; Ap 3.21.'
  - type: text
    content: 'Je t''adjure devant Dieu et devant Jésus-Christ, qui va juger les vivants et les morts, et au nom de sa manifestation et de son royaume : '
  '10':
  - type: note
    content: Démas Col 4.14 ; Phm 24. –  m'a abandonné v. 16+ ; cf. Ac 13.13 ; 15.38. –  le monde présent 1Tm 6.17 ; Tt 2.12. –  Thessalonique Ac 17.1n. –  en Galatie Ac 16.6n  ; avec certains mss, on pourrait aussi comprendre en Gaule. –  Tite 2Co 2.13+ ; cf. Tt 1.4 ; 3.12. – La Dalmatie correspond à la partie côtière de l'Illyrie (Rm 15.19n) qui aujourd'hui comprendrait approximativement la Croatie, la Bosnie, le Monténégro et le nord de l'Albanie.
  - type: text
    content: 'En effet, Démas m''a abandonné, par amour pour le monde présent, et il est parti pour Thessalonique ; Crescens est allé en Galatie, Tite en Dalmatie. '
  '11':
  - type: note
    content: 'Luc Col 4.14 ; Phm 24. –  Marc Ac 12.12+,25 ; 15.37ss ; Col 4.10 ; 1P 5.13. –  bien utile  : cf. 1.18 ; voir aussi 2.21 ; Phm 11n.'
  - type: text
    content: 'Luc seul est avec moi. Prends Marc et amène-le avec toi, car il m''est bien utile pour le ministère. '
  '12':
  - type: note
    content: Tychique Ac 20.4 ; Ep 6.21s ; Col 4.7s ; Tt 3.12. –  Ephèse Ac 16.6n  ; 19.1ss.
  - type: text
    content: 'J''ai envoyé Tychique à Ephèse. '
  '13':
  - type: note
    content: 'Troas Ac 16.8n  ; 20.6 ; 2Co 2.12. –  livres  : cf. 3.15s.'
  - type: text
    content: 'Quand tu viendras, apporte le manteau que j''ai laissé à Troas chez Carpos, et les livres, surtout les parchemins. '
  '14':
  - type: note
    content: 'Alexandre  : cf. Mc 15.21 ; Ac 4.6 ; 19.33 ; 1Tm 1.20. –  le forgeron  : d''autres traduisent l''orfèvre. –  m''a fait beaucoup de mal  : autre traduction a montré beaucoup de méchanceté à mon égard  ; certains croient qu''il s''agit du dénonciateur et accusateur de l''apôtre. –  Le Seigneur… Ps 62.13 ; cf. Ps 28.4 ; Pr 24.12 ; Mt 16.27 ; Rm 2.6 ; 2Co 11.25 ; Ap 2.23 ; 20.13 ; voir aussi 1Tm 1.20.'
  - type: text
    content: 'Alexandre, le forgeron, m''a fait beaucoup de mal. Le Seigneur lui rendra selon ses œuvres. '
  '15':
  - type: note
    content: opposé 3.8n.
  - type: text
    content: Garde-toi de lui, toi aussi, car il s'est violemment opposé à nos paroles.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'défense Ac 22.1 ; 1Co 9.3 ; Ph 1.7,16 ; 1P 3.15. –  tous m''ont abandonné v. 10 ; 1.15 ; cf. Mc 14.50 ; Jn 16.32. –  pas tenu compte  : cf. Lc 23.34 ; Ac 7.40 ; 1Co 13.5 ; 2Co 5.19.'
  - type: text
    content: 'Lors de ma première défense, personne ne m''a assisté : tous m''ont abandonné. Qu''il ne leur en soit pas tenu compte ! '
  '17':
  - type: note
    content: 'Cf. Jn 16.32 ; voir aussi Lc 12.11 ; 21.14s. –  m''a assisté ou s''est tenu près de moi  : la même formule a été traduite par se présenter devant en 2.15 ; cf. Ac 23.11 ; 27.23s. –  m''a rendu puissant 2.1+ ; cf. 2Co 12.9s. –  la proclamation 1Tm 2.7n  ; cf. Ph 1.12ss ; Col 4.3. –  soit pleinement assurée  : même verbe v. 5. –  toutes les nations… ou tous les non-Juifs Mt 4.15n  ; Mc 13.10/ / ; Ac 9.15 ; 10.45n  ; 1Tm 3.16 ; voir aussi Rm 15.19 ; 2Co 2.14 ; Col 1.25. –  délivré… v. 18 ; 1S 17.37 ; Ps 22.22 ; Dn 6.21ss.'
  - type: text
    content: 'C''est le Seigneur qui m''a assisté et qui m''a rendu puissant, pour que, par moi, la proclamation soit pleinement assurée et que toutes les nations l''entendent. Et j''ai été délivré de la gueule du lion. '
  '18':
  - type: note
    content: 'me délivrera…  : cf. v. 17 ; 3.11+ ; Mt 6.13 ; 2Co 1.10 ; 2Th 3.2. –  royaume céleste  : cf. v. 1 ; 1Tm 6.15 ; voir aussi 1Co 15.40,48 ; Ep 1.3,20 ; 2.6. –  A lui… Ga 1.5 ; cf. Rm 16.27+ ; 2P 3.18 ; Ap 1.6. – Voir gloire.'
  - type: text
    content: 'Le Seigneur me délivrera de toute œuvre mauvaise et me sauvera pour son royaume céleste. A lui la gloire à tout jamais ! '
  - type: text
    content: Amen !
  - type: heading
    content: Salutations
  '19':
  - type: text
    content: ' '
  - type: note
    content: Prisca et Aquilas Ac 18.2+ ; Rm 16.3s ; 1Co 16.19. –  la maison d'Onésiphore 1.16ss.
  - type: text
    content: Salue Prisca et Aquilas, ainsi que la maison d'Onésiphore.
  '2':
  - type: note
    content: 'Cf. Ac 20.20s,31. –  proclame  : verbe apparenté au mot traduit par héraut en 1.11 ; cf. 4.17. –  la Parole  : cf. 2.9,15 ; 1Tm 5.17n. –  en toute occasion, favorable ou non  : autre traduction à temps et à contretemps  ; la formule signifie sans doute simplement en toute circonstance. –  réfute ou confonds, dénonce 3.16 ; 1Tm 5.20n. –  reprends Mt 8.26n  ; cf. Lc 17.3n. –  encourage ou exhorte, 1Tm 1.3+. –  en te montrant toujours patient…  : litt. en toute patience (3.10 ; 1Tm 1.16+ ; cf. 2Co 6.6 ; Ga 5.22 ; Col 3.12) et enseignement  ; par ce dernier mot certains comprennent avec le souci (ou l''art) d''instruire, d''autres selon la doctrine.'
  - type: text
    content: proclame la Parole, interviens en toute occasion, favorable ou non, réfute, reprends, encourage, en te montrant toujours patient dans ton enseignement.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Eraste  : cf. Ac 19.22 ; Rm 16.23. –  Corinthe Ac 18.1n. –  Trophime Ac 20.4 ; 21.29. –  Milet Ac 20.15nss.'
  - type: text
    content: Eraste est demeuré à Corinthe, et j'ai laissé Trophime malade à Milet.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Les noms de ce v. n'apparaissent nulle part ailleurs dans le N.T. –  Tâche… v. 9n. – Selon Irénée (IIe s. apr. J.-C.), Linus aurait été par la suite évêque de Rome.
  - type: text
    content: Tâche de venir avant l'hiver.
  - type: text
    content: Euboulos, Pudens, Linus, Claudia et tous les frères te saluent.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'avec ton esprit 1.6s ; cf. Ga 6.18+ ; voir aussi Mt 28.20 ; Ac 18.9s. –  Que la grâce… 1Tm 6.21+ ; Tt 3.15. A la fin du v. certains mss ajoutent Amen ! – Certains mss portent, avec diverses variantes, l''indication suivante  : Seconde à Timothée, [de l''Eglise d''Ephèse], écrite de Rome [Laodicée] lorsque Paul a comparu pour la deuxième fois devant Néron César de Rome  ; cf. 1Tm 6.21n.'
  - type: text
    content: Que le Seigneur soit avec ton esprit ! Que la grâce soit avec vous !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'il viendra un temps…  : cf. 3.1 ; 1Tm 4.1. –  supporteront Hé 13.22. –  l''enseignement sain 1Tm 1.10+. –  avec une démangeaison d''entendre  : autre traduction pour se faire chatouiller les oreilles , cf. v. 4 ; Es 30.10 ; Jr 5.31 ; Ez 33.32 ; Ac 17.21. –  maîtres sur maîtres (au sens d’ enseignants ), cf. 1.11+ ; 3.7.'
  - type: text
    content: 'Car il viendra un temps où ils ne supporteront plus l''enseignement sain ; mais au gré de leurs propres désirs, avec une démangeaison d''entendre, ils se donneront maîtres sur maîtres ; '
  '4':
  - type: note
    content: de la vérité 1Tm 6.5+ ; cf. Ep 4.21 ; 1P 1.22. –  dévieront 1Tm 1.6n. –  fables 1Tm 1.4n.
  - type: text
    content: ils détourneront leurs oreilles de la vérité et dévieront vers les fables.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'sobre  : cf. 1Th 5.6ss ; 1P 1.13+. –  supporte les souffrances  : 2.9n. –  annonce la bonne nouvelle  : litt. fais œuvre (1Tm 3.1+) d''annonciateur de la bonne nouvelle (le mot correspondant a donné notre terme évangéliste , cf. Ac 21.8n). –  assure pleinement… v. 17n.'
  - type: text
    content: Mais toi, sois sobre en tout, supporte les souffrances, annonce la bonne nouvelle, assure pleinement ton ministère.
  - type: heading
    content: J'ai achevé la course, j'ai gardé la foi
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'je suis…  : autre traduction mon sang est déjà répandu…  ; voir Ph 2.17n  ; cf. Rm 12.1 ; 14.8 ; 15.16. –  mon départ  : on a vu dans l''emploi du terme grec correspondant l''image du navire qui lève l''ancre ou largue les amarres ; cf. Ph 1.23 ; voir aussi 2P 1.14s.'
  - type: text
    content: 'Quant à moi, en effet, je suis déjà répandu en libation, et le temps de mon départ est arrivé. '
  '7':
  - type: note
    content: 'le beau combat  : cf. 2.3 ; 1Tm 4.10 ; 6.12n  ; Jd 3. –  achevé ou accompli  : cf. Lc 12.50 ; 24.44 ; Jn 19.28ss. –  la course Ac 13.25 ; 20.24 ; Ph 3.10ss ; voir aussi 1Co 9.24ss ; Ga 2.2 ; 5.7 ; Ph 2.16 ; 2Th 3.1 ; Hé 12.1. –  j''ai gardé la foi  : autre traduction je suis resté fidèle  : cf. 1Co 4.2 ; 1Tm 1.12.'
  - type: text
    content: 'J''ai mené le beau combat, j''ai achevé la course, j''ai gardé la foi. '
  '8':
  - type: note
    content: 'la couronne de justice  : cf. 2.5+ ; 1Co 9.25 ; Ph 3.14 ; Jc 1.12 ; 1P 5.4 ; Ap 2.10 ; cf. Sagesse 5.15s : « Les justes vivent pour toujours ; leur salaire dépend du Seigneur et le Très-Haut prend soin d''eux. Aussi recevront-ils la royauté splendide et le diadème magnifique de la main du Seigneur. » –  réservée Col 1.5. –  le juste juge  : cf. v. 1 ; voir aussi Ac 10.42 ; Hé 12.23. –  en ce jour-là 1.12+. –  non pas seulement à moi…  : cf. Jn 17.26 ; 1Co 4.8. –  aimé ou désiré  ; cf. Ep 6.24 ; 1P 1.8. –  sa manifestation v. 1+.'
  - type: text
    content: Désormais la couronne de justice m'est réservée ; le Seigneur, le juge juste, me la donnera en ce jour-là, et non pas seulement à moi, mais aussi à tous ceux qui auront aimé sa manifestation.
  - type: heading
    content: Nouvelles personnelles et recommandations
  '9':
  - type: text
    content: ' '
  - type: note
    content: Tâche (un terme apparenté est traduit par empressement en 1.17) … v. 21 ; cf. 1.4n  ; Tt 3.12 ; voir aussi 1Co 4.19 ; Ph 2.19,24.
  - type: text
    content: 'Tâche de venir me rejoindre au plus tôt. '
