    marker-yv: yv-n
  - type: text
    text: 'Il bâtit Beth-Horôn-le-Haut et Beth-Horôn-le-Bas, villes fortes, ayant des murailles et des portes avec des barres ; '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les attelages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les équipages des chars, la cavalerie.
    marker-yv: yv-n
  - type: text
    text: 'Baalath et toutes les villes-entrepôts qui appartenaient à Salomon, toutes les villes pour les chars, les villes pour les attelages, et tout ce que Salomon avait eu envie de bâtir à Jérusalem, au Liban et dans tout le pays qu''il dirigeait. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des Hittites… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jos 3.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple qui était resté des Hittites, des Amorites, des Perizzites, des Hivvites et des Jébusites, ceux qui n''étaient pas d''Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceux de leurs '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' qui étaient restés après eux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jg 1.34ss ; 3.5s.
    marker-yv: yv-n
  - type: text
    text: 'ceux de leurs fils qui étaient restés après eux dans le pays et que les Israélites n''avaient pas exterminés, Salomon les astreignit à la corvée – jusqu''à ce jour. '
  - type: usfm
    marker: v
