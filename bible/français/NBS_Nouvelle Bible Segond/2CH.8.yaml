    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2S 5.7-10 et les notes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Une femme… à cause de moi
    - type: usfm
      marker: ft
      children:
      - type: text
