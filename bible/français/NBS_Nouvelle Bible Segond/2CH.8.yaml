      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 9.23.'
    marker-yv: yv-n
  - type: text
    text: Les chefs mis en place par le roi Salomon étaient au nombre de deux cent cinquante ; ils exerçaient leur autorité sur le peuple.
