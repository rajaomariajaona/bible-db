      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Selon la règle de David, son père, il installa les classes des prêtres dans leur service, et les lévites à leur poste, pour louer et officier devant les prêtres selon l''ordre de chaque jour, ainsi que les portiers répartis à chaque porte d''après leurs classes ; car tel était le commandement de David, l''homme de Dieu. '
