    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ma femme n'habitera pas dans la maison de David…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; dans cette hypothèse, la réserve serait seulement motivée par le fait qu''il s''agit d''une étrangère. –  '
    - type: usfm
      marker: fq
