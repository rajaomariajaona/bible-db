      - type: text
        text: esclavage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: travail d'esclave
    - type: usfm
      marker: ft
      children:
