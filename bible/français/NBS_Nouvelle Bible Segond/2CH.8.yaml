      - type: text
        text: les lieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu en hébreu.'
    marker-yv: yv-n
  - type: text
    text: 'Quant à la fille du pharaon, Salomon la fit monter de la Ville de David dans la maison qu''il avait bâtie pour elle ; car il avait dit : Une femme n''habitera pas à cause de moi dans la maison de David, roi d''Israël, parce que les lieux où est entré le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sont sacrés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
