document_id: 2CH.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Activités diverses de Salomon
  - type: heading
    content: 1R 9.10-28
  - type: text
    content: ' '
  - type: note
    content: 'sa propre maison  : litt. sa maison.'
  - type: text
    content: 'Au bout de vingt ans, Salomon avait bâti la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et sa propre maison. '
  '10':
  - type: note
    content: 'Les chefs…  : autre lecture traditionnelle  : les chefs des préfets du roi Salomon  ; cf. 1R 5.30n  ; 9.23.'
  - type: text
    content: Les chefs mis en place par le roi Salomon étaient au nombre de deux cent cinquante ; ils exerçaient leur autorité sur le peuple.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'la fille du pharaon…  : cf. 1R 3.1 ; 9.24n. –  la Ville de David 2S 5.7-10 et les notes. –  Une femme… à cause de moi  : autre traduction ma femme n''habitera pas dans la maison de David…  ; dans cette hypothèse, la réserve serait seulement motivée par le fait qu''il s''agit d''une étrangère. –  les lieux  : sous-entendu en hébreu.'
  - type: text
    content: 'Quant à la fille du pharaon, Salomon la fit monter de la Ville de David dans la maison qu''il avait bâtie pour elle ; car il avait dit : Une femme n''habitera pas à cause de moi dans la maison de David, roi d''Israël, parce que les lieux où est entré le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont sacrés.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Salomon offrait des holocaustes 1.6 ; voir sacrifices. –  l''autel du Seigneur  : cf. 4.1 ; 1R 8.64 ; 2R 16.14. –  vestibule 1R 6.3+.'
  - type: text
    content: 'Alors Salomon offrait des holocaustes au '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celui qu''il avait bâti devant le vestibule ; '
  '13':
  - type: note
    content: 'selon l''ordre de chaque jour  : litt. dans la chose d''un jour dans un jour  ; on pourrait aussi traduire jour après jour. –  le commandement de Moïse  : voir loi. –  sabbats / nouvelles lunes / rencontres festives  : pour cet ensemble, voir 31.3 ; Os 2.13 ; Né 10.34 ; 1Ch 23.31. –  trois fois par an…  : cf. Ex 23.14-17 ; 34.18,22-24 ; Lv 23 ; Dt 16.1-17. –  à la fête…  : voir calendrier et fêtes.'
  - type: text
    content: 'il les offrait selon l''ordre de chaque jour, selon le commandement de Moïse pour les sabbats, pour les nouvelles lunes et pour les rencontres festives, trois fois par an : à la fête des Pains sans levain, à la fête des Semaines et à la fête des Huttes. '
  '14':
  - type: note
    content: 'Selon la règle de David, son père  : cf. 1Ch 23.6ss ; 24.1ss. –  lévites… devant les prêtres  : cf. 1Ch 23.28. –  le Seigneur  : sous-entendu probable. –  David, l''homme de Dieu  : cf. Né 12.24,36 ; voir aussi Dt 33.1n.'
  - type: text
    content: 'Selon la règle de David, son père, il installa les classes des prêtres dans leur service, et les lévites à leur poste, pour louer et officier devant les prêtres selon l''ordre de chaque jour, ainsi que les portiers répartis à chaque porte d''après leurs classes ; car tel était le commandement de David, l''homme de Dieu. '
  '15':
  - type: text
    content: 'On ne s''écarta en rien du commandement du roi pour les prêtres et les lévites, même en ce qui concernait les trésors. '
  '16':
  - type: note
    content: 'jusqu''au jour  : LXX, Syr et Tg portent depuis le jour  ; peut-être le texte des Chroniques considère-t-il la fondation du temple comme un premier aboutissement de l''œuvre de Salomon. –  Ainsi fut achevée…  : autre traduction la maison du Seigneur était parfaite.'
  - type: text
    content: 'Ainsi fut menée à bien toute l''œuvre de Salomon, jusqu''au jour où la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut fondée et jusqu''à ce qu''elle soit terminée. Ainsi fut achevée la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Eiloth  : il s''agit d’ Eilath , comme en 1R 9.26n. –  la mer  : 1R 9.26 précise  : la mer des Joncs.'
  - type: text
    content: 'Salomon partit alors pour Etsiôn-Guéber et pour Eiloth, au bord de la mer, en Edom. '
  '18':
  - type: note
    content: Houram 1R 5.15n. –  Ophir 1R 9.26-28n. –  quatre cent cinquante talents ≈ 15,4 t ; voir mesures, poids et monnaies.
  - type: text
    content: Houram lui envoya, par l'intermédiaire de ses hommes, des bateaux et des hommes qui connaissaient la mer. Ils arrivèrent avec les hommes de Salomon à Ophir, et ils y prirent quatre cent cinquante talents d'or, qu'ils apportèrent au roi Salomon.
  '2':
  - type: note
    content: 'Il rebâtit  : l''hébreu ne fait pas de différence entre bâtir et rebâtir  ; c''est le contexte qui fait employer l''une ou l''autre traduction. –  Houram 1R 5.15n.'
  - type: text
    content: 'Il rebâtit les villes que lui donna Houram et il y fit habiter des Israélites. '
  '3':
  - type: note
    content: 'Hamath de Tsoba  : cette désignation ne se retrouve telle quelle nulle part ailleurs ; Hamath et Tsoba sont les noms de deux royaumes syriens. Une victoire sur Tsoba est attribuée à David en 2S 8.3/ /.'
  - type: text
    content: 'Salomon marcha contre Hamath de Tsoba et s''en rendit maître. '
  '4':
  - type: note
    content: 'bâtit  : autre traduction rebâtit  ; même possibilité au v. 5. –  Tadmor (cf. 1R 9.18n) au désert  : l''actuelle oasis de Palmyre, à mi-chemin entre la Méditerranée et l''Euphrate. –  les villes-entrepôts  : cf. v. 6 ; 1R 9.19+.'
  - type: text
    content: 'Il bâtit Tadmor au désert et toutes les villes-entrepôts qu''il avait bâties en Hamath. '
  '5':
  - type: note
    content: Beth-Horôn-le-Haut / Beth-Horôn-le-Bas 25.13 ; Jos 10.10ns ; 16.3,5 ; 18.13s ; 21.22 ; 1S 13.18 ; 1Ch 6.53 ; 7.24.
  - type: text
    content: 'Il bâtit Beth-Horôn-le-Haut et Beth-Horôn-le-Bas, villes fortes, ayant des murailles et des portes avec des barres ; '
  '6':
  - type: note
    content: 'V. 4+. –  les attelages  : autres traductions les équipages des chars, la cavalerie.'
  - type: text
    content: 'Baalath et toutes les villes-entrepôts qui appartenaient à Salomon, toutes les villes pour les chars, les villes pour les attelages, et tout ce que Salomon avait eu envie de bâtir à Jérusalem, au Liban et dans tout le pays qu''il dirigeait. '
  '7':
  - type: note
    content: des Hittites… Jos 3.10n.
  - type: text
    content: 'Tout le peuple qui était resté des Hittites, des Amorites, des Perizzites, des Hivvites et des Jébusites, ceux qui n''étaient pas d''Israël, '
  '8':
  - type: note
    content: ceux de leurs fils qui étaient restés après eux Jg 1.34ss ; 3.5s.
  - type: text
    content: 'ceux de leurs fils qui étaient restés après eux dans le pays et que les Israélites n''avaient pas exterminés, Salomon les astreignit à la corvée – jusqu''à ce jour. '
  '9':
  - type: note
    content: 'esclavage  : litt. travail d''esclave  ; cf. 1R 5.27n. –  les chefs…  : litt. les chefs de ses chars et de ses équipages (de chars) (ou et de ses attelages ou et de ses cavaliers) ; cf. v. 6.'
  - type: text
    content: 'Mais Salomon n''imposa l''esclavage pour ses travaux à aucun des Israélites, car ils étaient des hommes de guerre, les chefs de ses écuyers, les chefs des équipages de ses chars. '
