    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rebâtit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même possibilité au v. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tadmor '
    - type: usfm
      marker: ft
