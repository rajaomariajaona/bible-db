    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et de ses attelages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et de ses cavaliers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. v. 6.
    marker-yv: yv-n
  - type: text
    text: 'Mais Salomon n''imposa l''esclavage pour ses travaux à aucun des Israélites, car ils étaient des hommes de guerre, les chefs de ses écuyers, les chefs des équipages de ses chars. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les chefs…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre lecture traditionnelle'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les chefs des préfets du roi Salomon
    - type: usfm
      marker: ft
      children:
      - type: text
