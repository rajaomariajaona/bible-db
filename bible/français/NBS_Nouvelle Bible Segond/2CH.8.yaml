    marker-yv: yv-n
  - type: text
    text: 'il les offrait selon l''ordre de chaque jour, selon le commandement de Moïse pour les sabbats, pour les nouvelles lunes et pour les rencontres festives, trois fois par an : à la fête des Pains sans levain, à la fête des Semaines et à la fête des Huttes. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Selon la règle de David, son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1Ch 23.6ss ; 24.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: '… devant les '
      - type: usfm
        marker: w
