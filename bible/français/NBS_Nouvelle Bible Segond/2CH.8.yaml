      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hamath de Tsoba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette désignation ne se retrouve telle quelle nulle part ailleurs ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hamath '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsoba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: sont les noms de deux royaumes syriens. Une victoire sur Tsoba est attribuée à David en 2S 8.3/ /.
    marker-yv: yv-n
  - type: text
    text: 'Salomon marcha contre Hamath de Tsoba et s''en rendit maître. '
  - type: usfm
    marker: v
    metadata:
