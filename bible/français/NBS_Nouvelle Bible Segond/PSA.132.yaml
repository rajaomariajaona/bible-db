document_id: PSA.132,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sion, habitation du Seigneur et ville de David
  - type: text
    content: ' '
  - type: note
    content: montées 120.1n. –  souviens-toi 25.6s ; 74.2,18,22 ; 89.48,51 ; Né 5.19 ; 13.14,22,31. –  de David 2Ch 6.42 ; cf. 2S 7.
  - type: text
    content: Chant des montées.
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi de David,'
  - type: text
    content: de toutes ses afflictions !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'A cause de David  : cf. 21.2-8 ; 89.25,29,34 ; 1R 8.25 ; Es 55.3. –  l''homme qui a reçu ton onction  : litt. le visage de ton oint , 2.2+ ; cf. 84.10 ; 2Ch 6.42.'
  - type: text
    content: A cause de David, ton serviteur,
  - type: text
    content: ne repousse pas l'homme qui a reçu ton onction !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'David / serment 89.3s ; cf. 110.4. –  un serment de loyauté  : autre traduction de vérité. On pourrait aussi rattacher le terme à la suite  : sur lequel, loyalement, il ne reviendra pas. –  un de tes descendants  : litt. du fruit de tes entrailles  ; cf. 2S 7.12ss ; Jr 33.17 ; 1Ch 17.11ss ; Ac 2.30.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait à David un serment de loyauté,'
  - type: text
    content: 'sur lequel il ne reviendra pas :'
  - type: text
    content: C'est un de tes descendants
  - type: text
    content: que je mettrai sur ton trône.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'gardent  : autre traduction observent. –  mon alliance 89.4,29 ; 2S 23.5 ; Es 55.3 ; Jr 33.21ss ; cf. 2R 11.17. –  mon témoignage  : autre traduction mes préceptes  ; cf. 2.7 ; 18.21ss ; 89.31ss ; voir aussi 2R 11.12n. –  sur ton trône  : litt. sur un trône pour toi.'
  - type: text
    content: Si tes fils gardent mon alliance et mon témoignage,
  - type: text
    content: ce que je leur apprends,
  - type: text
    content: leurs fils aussi seront pour toujours
  - type: text
    content: assis sur ton trône.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 68.17 ; 78.68 ; 87.2 ; cf. 48.2s ; 135.21 ; Dt 12.5+.
  - type: text
    content: '– Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a choisi Sion,'
  - type: text
    content: 'il a désiré en faire son habitation :'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 28.12.
  - type: text
    content: C'est mon lieu de repos à jamais ;
  - type: text
    content: j'y habiterai, car je l'ai désirée ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 36.9ss. – Voir bénédiction.
  - type: text
    content: je bénirai ses ressources,
  - type: text
    content: je rassasierai de pain ses pauvres ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: V. 9+ ; 2Ch 6.41.
  - type: text
    content: je revêtirai ses prêtres de salut,
  - type: text
    content: et ses fidèles pousseront des cris de joie.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 10+ ; 110.1. –  je ferai pousser… (Ez 29.21) ou je ferai germer…  : cf. Es 11.1 ; Jr 23.5 ; 33.15 ; Za 3.8 ; 6.12. –  corne  : cf. 18.3 ; 75.5n  ; 1S 2.10 ; Ez 29.21n  ; Lc 1.69. –  une lampe  : certains comprennent ici la métaphore au sens plus précis de descendant, successeur, dynastie, lignée royale  ; cf. 18.29 ; terme très proche en 1R 11.36n  ; 15.4 ; 2R 8.19 ; 2Ch 21.7 ; voir aussi 2S 21.17n  ; Jb 18.6 ; 21.17 ; 29.3 ; Pr 6.23 ; 13.9 ; 20.20,27 ; 24.20 ; Jn 5.35. –  l''homme qui a reçu mon onction 2.2n.'
  - type: text
    content: Là je ferai pousser une corne pour David,
  - type: text
    content: je disposerai une lampe pour l'homme qui a reçu mon onction,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'je revêtirai… 71.13 ; Jb 8.22. –  brillera  : litt. fleurira. –  diadème  : cf. 21.4 ; voir aussi 89.40+ ; 2S 1.10 ; 12.30 ; 2R 11.12.'
  - type: text
    content: je revêtirai ses ennemis de honte,
  - type: text
    content: et sur lui brillera son diadème.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2S 7.1ss. –  serment / vœu  : cf. 1S 14.24ss ; Ac 23.12. –  l''Indomptable de Jacob v. 5 ; Gn 49.24n  ; Es 1.24+.'
  - type: text
    content: 'Il fit ce serment au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'ce vœu à l''Indomptable de Jacob :'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2S 11.9ss.
  - type: text
    content: Je n'entrerai pas dans la tente où j'habite,
  - type: text
    content: je ne monterai pas sur le lit où je couche,
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Pr 6.4.
  - type: text
    content: je ne donnerai ni sommeil à mes yeux,
  - type: text
    content: ni assoupissement à mes paupières,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'une demeure  : litt. des demeures  ; cf. 43.3+ ; 78.60ss ; 1R 8.16 ; Ac 7.46.'
  - type: text
    content: 'jusqu''à ce que j''aie trouvé un lieu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: une demeure pour l'Indomptable de Jacob.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Nous en avons entendu parler  : litt. nous avons entendu parler d''elle  ; il s''agit vraisemblablement du coffre ou arche de l''alliance (v. 8) qui, après avoir été capturé par les Philistins (1S 5–6), était resté à Qiriath-Yéarim (= Yaar  ? 1S 7.1s), avant d''être transféré à Jérusalem, cf. 2S 6.1ss. –  Ephrata , autre nom de Beth-Léhem ou Bethléem, village de David (Mi 5.1 ; Rt 4.11) ; voir aussi Gn 35.16n  ; 1S 1.1n. –  pays  : terme également traduit par campagnes, champs.'
  - type: text
    content: Nous en avons entendu parler à Ephrata,
  - type: text
    content: nous l'avons trouvé au pays de Yaar…
  '7':
  - type: text
    content: ' '
  - type: note
    content: prosternons-nous… 5.8+ ; cf. 24.3ss ; 95.6. –  son marchepied 99.5+ ; Es 60.13 ; 1Ch 28.2.
  - type: text
    content: Allons à sa demeure,
  - type: text
    content: prosternons-nous devant son marchepied !
  - type: heading
    content: 2Ch 6.41-42
  '8':
  - type: text
    content: ' '
  - type: note
    content: '3.8+ ; Nb 10.35s ; 2Ch 6.41s. –  viens  : sous-entendu dans le texte. –  ton lieu de repos  : cf. v. 14 ; 1Ch 28.2. –  le coffre (ou l''arche ) de ta puissance  : hébreu ’arôn ‘ouzzéka  ; cf. 24.8 ; 78.61 ; 1S 4.3s ; 2S 6.3n  ; Jr 3.16s ; 2Ch 6.41.'
  - type: text
    content: 'Lève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', viens à ton lieu de repos,'
  - type: text
    content: toi et le coffre de ta puissance !
  '9':
  - type: text
    content: ' '
  - type: note
    content: V. 16 ; Es 11.5 ; 61.10. – Voir justice.
  - type: text
    content: Que tes prêtres soient revêtus de justice,
  - type: text
    content: et que tes fidèles poussent des cris de joie !
