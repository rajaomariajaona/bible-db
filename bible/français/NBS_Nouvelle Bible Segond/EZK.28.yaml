      marker-yv: yv-n
    - type: text
      text: 'Tu étais en Eden, le jardin de Dieu ; tu étais couvert de toutes sortes de pierres précieuses, de sardoine, de topaze, de diamant, de chrysolithe, d''onyx, de jaspe, de lapis-lazuli, d''escarboucle, d''émeraude et d''or ; tes tambourins et tes flûtes étaient à ton service, préparés pour le jour où tu fus créé. '
