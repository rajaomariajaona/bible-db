document_id: EZK.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre le roi de Tyr
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: incirconcis 31.18 ; 32.19 ; voir circoncision.
  - type: text
    content: 'Tu mourras de la mort des incirconcis, de la main des étrangers. Car moi, j''ai parlé – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '11':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'complainte 26.17+. –  Tu mettais le sceau à  : quelques mss hébreux et plusieurs versions anciennes ont lu tu étais le sceau de  ; cf. Ag 2.23. –  la perfection , au sens d''œuvre achevée, traduction incertaine ; le même mot est rendu par plan (c.-à-d. modèle) en 43.10. –  parfait en beauté  : cf. 27.3.'
  - type: text
    content: 'Humain, entonne une complainte sur le roi de Tyr ! Tu lui diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Tu mettais le sceau à la perfection, tu étais plein de sagesse, parfait en beauté. '
  '13':
  - type: note
    content: 'Eden 31.8s,16,18 ; 36.35 ; cf. Gn 2.8. –  jardin (LXX paradis) de Dieu ou des dieux  ; cf. v. 2n  ; Gn 3.22n. –  pierres précieuses… or  : cf. Gn 2.11s ; voir aussi Ex 28.15-20 ; Ap 17.4 ; 21.18-20. –  lapis-lazuli 1.26+. –  tes tambourins…  : texte obscur ; on pourrait aussi rattacher ces mots à ce qui précède et traduire tes tambourins et tes flûtes (peut-être des ornements ; cf. Ex 28.34 ; Jr 31.4) étaient des ouvrages d''or.'
  - type: text
    content: 'Tu étais en Eden, le jardin de Dieu ; tu étais couvert de toutes sortes de pierres précieuses, de sardoine, de topaze, de diamant, de chrysolithe, d''onyx, de jaspe, de lapis-lazuli, d''escarboucle, d''émeraude et d''or ; tes tambourins et tes flûtes étaient à ton service, préparés pour le jour où tu fus créé. '
  '14':
  - type: note
    content: 'Tu  : pronom féminin dans le texte hébreu traditionnel (peut-être visant la ville de Tyr) ; LXX avec le keroub. –  keroub v. 16 ; 9.3+ ; cf. Gn 3.24n. –  protecteur  : traduction conjecturale ; autre signification possible oint (voir onction). –  aux ailes déployées  : litt. couvrant ( ?) ; le terme rappelle celui qui est traduit par couvrir en Ex 25.20 ; 37.9 ; 1R 8.7 ; 1Ch 28.18. –  dans la montagne sacrée  : cf. 20.40+ ; Es 14.13n  ; voir aussi saint. –  pierres ardentes  : cf. 1.13 ; 10.2 ; 2S 22.9,13.'
  - type: text
    content: 'Tu étais un keroub protecteur, aux ailes déployées ; je t''avais placé dans la montagne sacrée de Dieu ; tu étais là, tu te promenais au milieu des pierres ardentes. '
  '15':
  - type: note
    content: 'injustice  : voir justice.'
  - type: text
    content: 'Tu as été intègre dans tes voies, depuis le jour où tu fus créé jusqu''à celui où l''injustice a été trouvée chez toi. '
  '16':
  - type: note
    content: 'ton commerce v. 4s ; 27.12-25. –  tu as été rempli  : litt. ils ont rempli ( ?) ton milieu  ; LXX tu as rempli ton intérieur (c.-à-d. ton enceinte) de violence. – Voir péché. –  je t''exclus  : litt. je te profane (en te chassant), cf. v. 7-8n,9n  ; voir aussi Es 43.28. –  de la montagne… v. 14+.'
  - type: text
    content: 'Par l''importance de ton commerce tu as été rempli de violence et tu as péché ; je t''exclus de la montagne de Dieu et je te fais disparaître, keroub protecteur, d''entre les pierres ardentes. '
  '17':
  - type: note
    content: Cf. v. 2,6s ; voir aussi Es 14.12ss.
  - type: text
    content: 'Ton cœur s''est enhardi à cause de ta beauté, tu as perverti ta sagesse par ta splendeur ; je te jette à terre, je te livre en spectacle aux rois. '
  '18':
  - type: note
    content: 'tes sanctuaires  : plusieurs mss hébreux et certaines versions anciennes portent ton sanctuaire, d''autres ta sainteté. –  un feu 30.8 ; Am 1.10 ; Za 9.4.'
  - type: text
    content: 'Par la multitude de tes fautes, par l''injustice de ton commerce, tu as profané tes sanctuaires ; je fais sortir du milieu de toi un feu qui te dévore, je te réduis en cendres sur la terre, sous les yeux de tous ceux qui te regardent. '
  '19':
  - type: note
    content: Cf. 27.36+.
  - type: text
    content: Tous ceux qui te connaissent parmi les peuples sont atterrés à cause de toi ; tu es un objet d'épouvante, tu n'es plus, tu ne seras jamais plus !
  - type: heading
    content: Contre Sidon
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'au chef de Tyr (26.2n) : probablement Ithobaal, qui régnait sur Tyr au moment de l''invasion babylonienne (cf. 26.7n). –  Ton cœur s''est enhardi  : autre traduction est devenu hautain , cf. 16.50 ; 2Ch 17.6n  ; voir aussi Es 23.8s. –  Je suis Dieu (hébreu ’El , qui ici pourrait être compris comme le nom propre du dieu suprême du panthéon cananéen) : cf. v. 9n  ; voir aussi Gn 3.5 ; 11.4 ; 21.33n  ; Es 14.13n  ; Dn 4 ; Ac 12.22s ; 2Th 2.4. –  je suis assis…  : autre traduction j''habite dans la demeure des dieux  ; cf. 1R 8.30. –  dieux / divin / un dieu  : hébreu ’élohim (Gn 1.1n). –  au cœur des mers 27.3-4+. –  pas divin, mais humain v. 9 ; Es 31.3.'
  - type: text
    content: 'Humain, dis au chef de Tyr : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Ton cœur s''est enhardi ; tu as dit : « Je suis Dieu, je suis assis parmi les dieux, au cœur des mers ! » Pourtant tu n''es pas divin, mais humain : tu prends ton propre cœur pour celui d''un dieu ! '
  '20':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'tourne-toi  : litt. tourne ta face  ; cf. 4.3+. –  Sidon 27.8n  ; cf. Jl 4.4-8. –  parle… en prophète 4.7n.'
  - type: text
    content: 'Humain, tourne-toi vers Sidon et parle sur elle en prophète ! '
  '22':
  - type: note
    content: 'Je m''oppose à toi… 5.8+. –  Je me glorifierai  : autre traduction je serai glorifié  ; cf. 39.13n. –  je montrerai ma sainteté v. 25 ; 20.41+.'
  - type: text
    content: 'Tu diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je m''oppose à toi, Sidon ! Je me glorifierai au milieu de toi ; ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand j''exécuterai mes jugements contre elle ; en elle je montrerai ma sainteté. '
  '23':
  - type: note
    content: '38.21s. –  peste Ex 9.3,15 ; Jr 21.6 ; Am 4.10. –  je ferai couler  : sous-entendu dans le texte.'
  - type: text
    content: 'J''y enverrai la peste et je ferai couler le sang dans ses rues ; les victimes tomberont au milieu d''elle par une épée dirigée contre elle de toutes parts, et ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Israël vivra en sécurité
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'piquant  : cf. 2.6n  ; 2Co 12.7. –  pernicieux  : même terme en Lv 13.51s ; 14.44.'
  - type: text
    content: 'Ainsi elle ne sera plus pour la maison d''Israël un piquant pernicieux, une épine douloureuse, parmi tous ceux qui la méprisent alentour, et ainsi on saura que je suis le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH).'
  '25':
  - type: text
    content: ' '
  - type: note
    content: '11.17+ ; cf. 36.23s. –  je montrerai ma sainteté v. 22+. –  leur terre  : litt. leur sol  ; 7.2+ ; 34.13 ; Gn 2.5n. –  Jacob, mon serviteur 37.25 ; cf. Gn 28.13.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: 'Lorsque je rassemblerai la maison d''Israël d''entre les peuples où elle est dispersée, je montrerai ma sainteté en elle sous les yeux des nations ; ils habiteront sur leur terre, celle que j''ai donnée à Jacob, mon serviteur. '
  '26':
  - type: note
    content: 'habiteront en sécurité 34.25-28 ; 38.8,11,14 ; 39.26 ; Dt 33.28 ; Jr 23.6 ; 32.37 ; 33.16. –  ils bâtiront  : cf. Es 65.21+.'
  - type: text
    content: 'Ils y habiteront en sécurité, ils bâtiront des maisons et planteront des vignes ; ils y habiteront en sécurité, quand j''exécuterai mes jugements contre tous ceux qui les méprisent alentour. Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu.'
  '3':
  - type: note
    content: 'Daniel  : cf. 14.14n  ; voir aussi Dn 1.4+.'
  - type: text
    content: 'Tu es plus sage que Daniel, rien de secret n''est obscur pour toi. '
  '4':
  - type: note
    content: Cf. Za 9.2s.
  - type: text
    content: 'Par ta sagesse et par ton intelligence tu as acquis des richesses ; tu as acquis de l''or et de l''argent dans tes trésors. '
  '5':
  - type: note
    content: 'habileté  : litt. sagesse, comme au v. 4.'
  - type: text
    content: 'Par ta grande habileté commerciale tu as accru ta richesse, et à cause de ta richesse ton cœur s''est enhardi. '
  '6':
  - type: note
    content: V. 2+.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que tu prends ton propre cœur pour celui d''un dieu, '
  '7':
  - type: note
    content: 'Cf. 7.24 ; 31.12 ; voir aussi 30.12+. –  les pires brutes  : cf. 30.11 ; 31.12 ; 32.12 ; sur le terme correspondant, voir Es 13.11 ; 25.3ss ; 29.5,20 ; 49.25 ; Jr 15.21 ; 20.11 ; Ps 37.35 ; 54.5 ; 86.14 ; Jb 6.23 ; 15.20 ; 27.13 ; Pr 11.16. –  ta splendeur  : terme dérivé du verbe habituellement traduit par resplendir, lequel est souvent employé pour décrire une manifestation de Dieu (Dt 33.2 ; Ps 50.2).'
  - type: text
    content: 'je fais venir contre toi des étrangers, les pires brutes des nations. Ils tireront leurs épées contre ta belle sagesse et ils profaneront ta splendeur. '
  '8':
  - type: note
    content: 'de mort violente  : litt. de mort de transpercé (de victime) ou de profané (cf. v. 7 ; 9.7n  ; 21.19n).'
  - type: text
    content: 'Ils te feront descendre dans la fosse, et tu mourras de mort violente, au cœur des mers. '
  '9':
  - type: note
    content: 'celui qui va te tuer  : litt. ton tueur  ; de nombreux mss hébreux et des versions anciennes ont le pluriel (tes tueurs), comme à la fin du v. –  diras-tu encore ou oseras-tu dire. –  Je suis Dieu, hébreu ’élohim  ; cf. v. 2n. –  pas divin, hébreu ’El, comme au v. 2. –  ceux qui te transperceront ou ceux qui te profaneront, comme au v. 7 (cf. v. 8n).'
  - type: text
    content: 'En face de celui qui va te tuer, diras-tu encore : « Je suis Dieu ! » Tu ne seras pas divin, mais humain, sous la main de ceux qui te transperceront. '
