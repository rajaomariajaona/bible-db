document_id: PSA.143,104
type_code: fra
verses:
  '1':
  - type: heading
    content: N'entre pas en jugement avec moi
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.2s ; 17.1,6n.
  - type: text
    content: Psaume. De David.
  - type: text
    content: Seigneur
  - type: text
    content: ', entends ma prière,'
  - type: text
    content: prête l'oreille à mes supplications !
  - type: text
    content: Réponds-moi dans ta constance, dans ta justice !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tu es mon Dieu 22.11+. –  ton souffle (ou ton Esprit ) bienfaisant (ou bon ) : cf. 51.13 ; Né 9.20. –  me conduise v. 7+.'
  - type: text
    content: Apprends-moi à faire ta volonté,
  - type: text
    content: car tu es mon Dieu.
  - type: text
    content: Que ton souffle bienfaisant me conduise sur une terre aplanie !
  '11':
  - type: text
    content: ' '
  - type: note
    content: A cause de ton nom 23.3 ; 25.11 ; 31.4 ; 109.21. –  fais-moi vivre 119.25+. – Voir justice. –  de la détresse 25.22.
  - type: text
    content: 'A cause de ton nom, '
  - type: text
    content: Seigneur
  - type: text
    content: ', fais-moi vivre !'
  - type: text
    content: Dans ta justice, retire-moi de la détresse !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 54.7. –  je suis ton serviteur 86.2 ; 116.16.
  - type: text
    content: Dans ta fidélité, tu réduiras au silence mes ennemis,
  - type: text
    content: tu feras disparaître tous mes adversaires
  - type: text
    content: – car je suis ton serviteur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'N''entre pas en jugement  : cf. 7.9 ; 35.24 ; 43.1 ; Jb 27.6. –  aucun vivant… 14.3 ; 51.5ss ; 130.3 ; Jb 4.17 ; 9.2,32 ; 14.3 ; 25.4 ; Rm 3.20 ; Ga 2.16.'
  - type: text
    content: N'entre pas en jugement avec moi, ton serviteur,
  - type: text
    content: car aucun vivant ne peut être juste devant toi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'il écrase ma vie à terre 44.26 ; 94.5. –  dans les ténèbres 88.7 ; 107.10ss. –  les gens d''autrefois…  : autre traduction ceux qui sont morts depuis longtemps  ; cf. 88.6 ; Lm 3.6.'
  - type: text
    content: L'ennemi me poursuit,
  - type: text
    content: il écrase ma vie à terre ;
  - type: text
    content: il me fait habiter dans les ténèbres,
  - type: text
    content: comme les gens d'autrefois qui sont morts.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Mon esprit… 77.4 ; 142.4n. –  mon cœur… 61.3 ; 109.22.
  - type: text
    content: Mon esprit défaille,
  - type: text
    content: mon cœur est dévasté au dedans de moi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 77.6,12s. –  je redis 1.2n. –  l'œuvre ou, selon certains mss hébreux et des versions anciennes, les œuvres.
  - type: text
    content: Je me souviens des jours de jadis,
  - type: text
    content: je redis toute ton action,
  - type: text
    content: je médite sur l'œuvre de tes mains.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Je tends les mains 28.2n  ; 77.3 ; 88.10 ; Jr 4.31 ; Lm 1.17. –  comme (ou sur , selon certains mss) une terre épuisée 42.2s ; 63.2 ; Es 32.2.
  - type: text
    content: Je tends les mains vers toi ;
  - type: text
    content: 'je suis devant toi comme une terre épuisée. '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Réponds-moi vite 31.3+ ; 69.18 ; 102.3. –  Mon esprit ou mon souffle  ; cf. v. 4,10. –  Ne te détourne pas…  : litt. ne me cache pas ta face  ; cf. 13.2+ ; 27.9n  ; 102.3. –  Je serais semblable… 22.30+ ; 28.1 ; 88.5.'
  - type: text
    content: 'Réponds-moi vite, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Mon esprit s'épuise.
  - type: text
    content: Ne te détourne pas de moi !
  - type: text
    content: Je serais semblable à ceux qui descendent dans le gouffre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'dès le matin 30.6+ ; 46.6 ; 90.14. –  confiance 4.6+. –  Fais-moi connaître…  : cf. v. 10 ; 25.4s ; 27.11 ; 32.8ss ; 86.11 ; 94.12. –  je m''élève… 25.1s ; 86.4.'
  - type: text
    content: Fais-moi entendre
  - type: text
    content: dès le matin ta fidélité !
  - type: text
    content: Car j'ai mis ma confiance en toi.
  - type: text
    content: Fais-moi connaître le chemin où je dois marcher !
  - type: text
    content: Car je m'élève vers toi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Je me cache  : litt. je couvre , texte obscur ; certains modifient la vocalisation traditionnelle pour lire tu es ma couverture (le même mot est traduit par voile en Gn 20.16n), c.-à-d. ma protection ; cf. Ps 132.9.'
  - type: text
    content: 'Délivre-moi de mes ennemis, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Je me cache auprès de toi.
