document_id: PSA.146,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur, protecteur des faibles
  - type: text
    content: ' '
  - type: note
    content: 'LXX donne pour suscription  : D''Aggée et Zacharie  ; de même 147 ; 148. –  Louez le Seigneur v. 10 ; 104.35n. –  Que je loue…  : cf. 103.1n  ; Lc 1.46.'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  - type: text
    content: 'Que je loue le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 9.8+ ; 29.10 ; 145.13 ; Ex 15.18.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' régnera toujours'
  - type: text
    content: – ton Dieu, Sion, de génération en génération !
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 30.13 ; 34.2 ; 104.33n  ; Es 38.20.
  - type: text
    content: 'Je louerai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tant que je vivrai,'
  - type: text
    content: je chanterai pour mon Dieu tant que j'existerai.
  '3':
  - type: text
    content: ' '
  - type: note
    content: '118.8s ; Jr 17.5ss. –  humains  : litt. fils (singulier) d''être humain (hébreu ’adam ) ; le texte hébreu se poursuit au singulier. –  à qui n''appartient pas le salut  : c.-à-d. incapable de donner la victoire ou de porter secours ; cf. 60.13.'
  - type: text
    content: Ne mettez pas votre confiance dans les nobles,
  - type: text
    content: dans des humains à qui n'appartient pas le salut.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'souffle  : voir esprit. –  à leur poussière  : litt. à son sol  ; cf. 104.29 ; voir aussi 103.14 ; Gn 2.5n,7 ; 3.19 ; Ec 3.20. –  leurs intentions ou leurs projets  ; cf. 33.10 ; 1 Maccabées 2.62s : « Ne craignez pas les menaces de l''homme pécheur, car sa gloire s''en va vers la pourriture et les vers. Aujourd''hui il s''élève et demain on ne le trouvera plus, car il sera retourné à sa poussière et ses projets seront anéantis. »'
  - type: text
    content: Leur souffle s'en va, ils retournent à leur poussière,
  - type: text
    content: et le jour même leurs intentions disparaissent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Heureux… 1.1+ ; 33.12 ; 84.13 ; 144.15. –  secours 27.9 ; 35.2 ; 46.2 ; 121.2 ; 124.8. –  Dieu traduit successivement les termes hébreux ’El (Gn 21.33n) et ’Elohim (Gn 1.1n). –  espoir 25.5 ; 40.2 ; 71.5 ; 130.7 ; 131.3.
  - type: text
    content: Heureux celui qui a pour secours le Dieu de Jacob,
  - type: text
    content: 'qui met son espoir dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu,'
  '6':
  - type: text
    content: ' '
  - type: note
    content: '24.1 ; 121.2 ; 124.8 ; Ex 20.11 ; Né 9.6 ; Ac 4.24 ; 14.15  ; 17.24 ; Ap 5.13 ; 10.6 ; 14.7. –  la loyauté  : autre traduction la vérité.'
  - type: text
    content: lui qui fait le ciel et la terre,
  - type: text
    content: la mer et tout ce qui s'y trouve,
  - type: text
    content: lui qui garde la loyauté pour toujours !
  '7':
  - type: text
    content: ' '
  - type: note
    content: Il agit… selon l'équité 10.18 ; 103.6 ; 140.13. –  affamés 107.9. –  prisonniers 68.7 ; 107.10ss ; Es 42.7 ; 49.9 ; 61.1.
  - type: text
    content: Il agit envers les opprimés selon l'équité ;
  - type: text
    content: il donne du pain aux affamés ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' relâche les prisonniers ;'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ouvre les yeux…  : litt. ouvre les aveugles  ; cf. Es 29.18 ; 35.5 ; 42.7 ; Jn 9. –  redresse… 145.14 ; cf. Lc 13.13. – Voir justice.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ouvre les yeux des aveugles ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' redresse ceux qui sont courbés ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aime les justes.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'les immigrés / l''orphelin…  : cf. 10.18 ; 68.6 ; 94.6 ; Dt 10.18. –  la voie des méchants 1.6.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' garde les immigrés,'
  - type: text
    content: il soutient l'orphelin et la veuve,
  - type: text
    content: mais il fait dévier la voie des méchants.
