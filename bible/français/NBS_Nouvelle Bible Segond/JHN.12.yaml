document_id: JHN.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le parfum répandu sur les pieds de Jésus
  - type: heading
    content: Cf. Mt 26.6-13  ; Mc 14.3-9  ; Lc 7.36-50
  - type: text
    content: ' '
  - type: note
    content: 'Pâque 2.13+ ; voir calendrier et fêtes. –  Béthanie / Lazare 11.1. –  qu''il avait réveillé  : litt. que Jésus avait réveillé ou relevé  ; cf. 2.19n  ; 11.11n,43s.'
  - type: text
    content: 'Six jours avant la Pâque, Jésus vint à Béthanie, où était Lazare qu''il avait réveillé d''entre les morts. '
  '10':
  - type: note
    content: '11.53+. –  grands prêtres  : cf. Mt 2.4n  ; Mc 11.18n.'
  - type: text
    content: 'Les grands prêtres décidèrent alors de tuer aussi Lazare, '
  '11':
  - type: note
    content: '2.23+. –  beaucoup de Juifs s''en allaient (à Béthanie ? vers Jésus ?) ; autre traduction, moins probable  : beaucoup quittaient les Juifs.'
  - type: text
    content: parce que beaucoup de Juifs s'en allaient à cause de lui et mettaient leur foi en Jésus.
  - type: heading
    content: Entrée de Jésus à Jérusalem
  - type: heading
    content: Mt 21.1-9  ; Mc 11.1-10  ; Lc 19.28-38
  '12':
  - type: text
    content: ' '
  - type: note
    content: 11.55 ; Mt 21.1-9/ /. – Voir calendrier et fêtes.
  - type: text
    content: 'Le lendemain, la grande foule qui était venue pour la fête entendit dire que Jésus venait à Jérusalem ; '
  '13':
  - type: note
    content: Voir Mt 21.8n-9n  ; la description de Jn rappelle davantage le rituel de Lv 23.40 que celle des évangiles synoptiques  ; cf. Ps 118.25s  ; Ap 7.9 ; voir bénédiction. –  celui qui vient 1.9+ ; 6.14. – Voir nom. –  roi d'Israël 1.49 ; 6.15+ ; So 3.15.
  - type: text
    content: 'les gens prirent des branches de palmiers et sortirent au-devant de lui, en criant :'
  - type: text
    content: Hosanna !
  - type: text
    content: Béni soit celui qui vient au nom du Seigneur,
  - type: text
    content: 'le '
  - type: text
    content: roi
  - type: text
    content: ' d’'
  - type: text
    content: Israël
  - type: text
    content: .
  '14':
  - type: text
    content: 'Jésus trouva un ânon et s''assit dessus, selon ce qui est écrit :'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Za 9.9  ; cf. Es 35.4 ; 40.9 ; So 3.14s. –  peur  : voir crainte. –  fille de Sion  : autre traduction Sion la belle , désignation poétique de Jérusalem ; cf. Es 1.8n  ; Mt 21.5n.'
  - type: text
    content: N'aie pas peur, fille de Sion ;
  - type: text
    content: ton roi vient,
  - type: text
    content: assis sur le petit d'une ânesse
  - type: text
    content: .
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'comprirent  : le verbe grec est habituellement traduit par connaître, savoir (ainsi v. 9). –  glorifié 7.39+. –  se souvinrent  : cf. 2.22+ ; 14.26 ; 15.26 ; 16.4,12-15 ; voir aussi Mt 26.75/ / ; Lc 24.6,8. –  ils avaient fait  : cf. Mt 21.1-7/ / ; autre traduction on avait fait.'
  - type: text
    content: Ses disciples ne comprirent pas cela tout d'abord ; mais quand Jésus fut glorifié, alors ils se souvinrent que cela était écrit à son sujet, et qu'ils avaient fait cela pour lui.
  '17':
  - type: text
    content: ' '
  - type: note
    content: V. 9 ; 11.18s,43s.
  - type: text
    content: 'La foule qui était avec lui quand il avait appelé Lazare du tombeau pour le réveiller d''entre les morts lui rendait témoignage. '
  '18':
  - type: note
    content: signe 2.11+.
  - type: text
    content: 'C''est pourquoi la foule vint au-devant de lui : elle avait entendu dire qu''il avait produit ce signe. '
  '19':
  - type: note
    content: 'pharisiens 1.24+. –  le monde (le terme pourrait être ici compris au sens banal de tout le monde  ; voir cependant 1.10n  ; 3.17 ; 12.20-32) s''en est allé à sa suite (litt. derrière lui, cf. 1.15n  ; Mc 1.7n) : cf. Jn 3.26 ; 11.47-48 ; voir aussi Mc 1.37 ; Lc 19.48 ; Ac 5.28.'
  - type: text
    content: 'Les pharisiens se dirent donc les uns aux autres : Vous voyez que vous n''y pouvez rien : le monde s''en est allé à sa suite !'
  - type: heading
    content: Des Grecs demandent à voir Jésus
  '2':
  - type: note
    content: 'Marthe servait  : même verbe v. 26 ; voir Lc 10.40n.'
  - type: text
    content: Là, on donna un dîner pour lui ; Marthe servait, et Lazare était l'un de ceux qui étaient à table avec lui.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Grecs  : voir 7.35n  ; il s''agit sans doute ici de prosélytes et de sympathisants du judaïsme ; cf. 11.55 ; Ac 8.27 ; 24.11. –  adorer 4.20n  ; voir aussi culte. –  fête 11.55 ; 12.1,12 ; voir calendrier et fêtes.'
  - type: text
    content: 'Il y avait quelques Grecs parmi les gens qui étaient montés pour adorer pendant la fête. '
  '21':
  - type: note
    content: 'Philippe (1.43+) et André (v. 22) sont des noms d''origine grecque. –  Bethsaïda 1.44n. –  Galilée  : voir Mt 4.12-16. –  voir Jésus  : cf. 7.34 ; Lc 8.20 ; 19.3 ; 23.8.'
  - type: text
    content: 'S''étant approchés de Philippe, qui était de Bethsaïda, en Galilée, ils lui demandaient : Seigneur, nous voudrions voir Jésus. '
  '22':
  - type: note
    content: André v. 21n  ; 1.40.
  - type: text
    content: Philippe vient le dire à André ; André et Philippe viennent le dire à Jésus.
  '23':
  - type: text
    content: ' '
  - type: note
    content: L'heure est venue 13.1 ; 17.1 ; cf. 2.4+. –  Fils de l'homme 1.51+. –  glorifié 7.39+.
  - type: text
    content: 'Jésus leur répond : L''heure est venue où le Fils de l''homme doit être glorifié. '
  '24':
  - type: note
    content: Cf. Mc 4.3-9/ /,26-32 ; 1Co 15.35-44. –  Amen, amen 1.51n  ; cf. Mt 5.18n.
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, si le grain de blé ne tombe en terre et ne meurt, il demeure seul ; mais s''il meurt, il porte beaucoup de fruit. '
  '25':
  - type: note
    content: 'sa vie  : cf. Mt 10.39 ; 16.25/ /. –  perd 3.16+. –  déteste  : cf. Lc 14.26n.'
  - type: text
    content: 'Celui qui tient à sa vie la perd, et celui qui déteste sa vie dans ce monde la gardera pour la vie éternelle. '
  '26':
  - type: note
    content: 'Mt 16.24+/ /. –  veut me servir (autre traduction me sert) / serviteur  : cf. v. 2n  ; Mt 20.26n. –  là où moi, je suis… 7.34+ ; 14.3 ; 17.24 ; voir aussi 8.24n.'
  - type: text
    content: Si quelqu'un veut me servir, qu'il me suive, et là où moi, je suis, là aussi sera mon serviteur. Si quelqu'un veut me servir, c'est le Père qui l'honorera.
  - type: heading
    content: Jésus parle de sa mort
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'je suis troublé 11.33+ ; autre traduction mon âme est troublée (cf. Mc 14.34/ /). –  Père, sauve-moi…  : la phrase pourrait aussi être comprise comme une supplication réelle  : Sauve-moi de cette heure ! Cf. 2.4+ ; 10.18 ; Ps 6.4s  ; 31.10 ; 42.6,12 ; Mc 14.35/ / ; Hé 5.7s. –  pour cela  : litt. à cause de cela.'
  - type: text
    content: 'Maintenant '
  - type: text
    content: je suis troublé
  - type: text
    content: '. Et que dirai-je ? Père, '
  - type: text
    content: sauve-moi
  - type: text
    content: ' de cette heure ? Mais c''est pour cela que je suis venu en cette heure. '
  '28':
  - type: note
    content: glorifie ton nom 17.4,12,26 ; cf. 1.14+ ; 2.11 ; 13.31s ; Mt 6.9. –  Une voix 5.37 ; Mt 3.17/ / ; 17.5/ /.
  - type: text
    content: 'Père, glorifie ton nom ! Une voix vint donc du ciel : Je l''ai glorifié et je le glorifierai encore. '
  '29':
  - type: note
    content: 'le tonnerre  : cf. Ps 29.3-10 ; Jb 37.5. –  Un ange 1.51+ ; Lc 22.43 ; Ac 23.9. – Epiphane de Salamine (315-403) attribue à un ouvrage gnostique (voir « La question gnostique »♦) nommé « Evangile d''Eve » le texte suivant : « Alors que je me tenais sur une montagne élevée, je vis un homme de haute stature, puis un autre de petite taille. J''entendis comme une voix d''un tonnerre et m''approchai pour écouter. Et il m''adressa la parole en ces termes : “Je suis toi et tu es moi : où que tu sois, j''y suis, et je suis disséminé en toutes choses ; d''où que tu le veuilles, tu me rassembles, et en me rassemblant, c''est toi-même que tu rassembles.” »'
  - type: text
    content: 'La foule qui se tenait là et qui avait entendu disait que c''était le tonnerre. D''autres disaient : Un ange lui a parlé. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Marie 11.2 ; cf. Lc 7.37-50. –  une livre  : mesure romaine de poids, correspondant en fait à un peu plus de 300 g (le terme grec correspondant, ici et en 19.39, a donné notre mot « litre »). –  nard Ct 1.12n. –  pur  : l''adjectif grec ainsi traduit rappelle le mot traduit par foi  ; il faut peut-être l''entendre ici au sens d’ authentique , à moins qu''il ne désigne la plante d''où le parfum était tiré (de même en Mc 14.3). –  en répandit  : autre traduction le répandit  ; sur le verbe correspondant, voir Mc 6.13n. –  la maison fut remplie…  : cf. Mt 26.13/ /.'
  - type: text
    content: 'Marie, donc, prit une livre d''un parfum de nard pur de grand prix, en répandit sur les pieds de Jésus et lui essuya les pieds avec ses cheveux ; la maison fut remplie de l''odeur du parfum. '
  '30':
  - type: note
    content: 11.42+.
  - type: text
    content: 'Jésus reprit : Ce n''est pas à cause de moi que cette voix s''est fait entendre, mais à cause de vous. '
  '31':
  - type: note
    content: 'jugement 3.19+. –  prince (3.1+) de ce monde (1.10n) 14.30 ; 16.11 ; cf. 1Co 2.6 ; 2Co 4.4 ; Ep 2.2 ; 1Jn 2.13 ; 5.19. –  chassé (ou jeté) dehors  : cf. 6.37 ; 15.6 (verbe apparenté) ; Lc 10.18 ; Ap 12.9 ; 20.1,10.'
  - type: text
    content: 'C''est maintenant le jugement de ce monde ; c''est maintenant que le prince de ce monde sera chassé dehors. '
  '32':
  - type: note
    content: 'élevé de la terre v. 33n  ; 3.14+. –  j''attirerai tous les hommes (litt. tous) à moi  : cf. 6.44 ; voir aussi 14.3 (même préposition pour auprès de moi).'
  - type: text
    content: 'Et moi, quand j''aurai été élevé de la terre, j''attirerai tous les hommes à moi. '
  '33':
  - type: note
    content: Allusion au supplice infamant de la crucifixion, où le condamné est « élevé de la terre » (v. 32) sur la croix ; cf. 18.32n  ; 21.19 ; sur le verbe traduit par signifier (apparenté au terme traduit par signe, 2.11n), cf. Ac 11.28n  ; Ap 1.1n.
  - type: text
    content: Il disait cela pour signifier de quelle mort il allait mourir.
  '34':
  - type: text
    content: ' '
  - type: note
    content: la loi 10.34n. –  le Christ demeure pour toujours 8.35 ; Es 9.6 ; Ez 37.25 ; Ps 89.36s ; 110.4 ; Dn 7.14 ; voir aussi onction. –  Il faut… v. 32. –  Fils de l'homme 1.51+.
  - type: text
    content: 'La foule lui répondit : Nous, nous avons entendu, de la loi, que le Christ demeure pour toujours ; comment donc peux-tu dire, toi : « Il faut que le Fils de l''homme soit élevé. » Qui est ce Fils de l''homme ? '
  '35':
  - type: note
    content: 'La lumière v. 46 ; 8.12+ ; 9.4+. –  parmi vous  : on pourrait aussi comprendre en vous. –  pour un peu de temps 7.33+. –  que les ténèbres ne vous surprennent pas 1.5n. –  celui qui marche… 11.10 ; 1Jn 2.11 ; cf. Es 50.10 ; Jr 13.16.'
  - type: text
    content: 'Jésus leur dit : La lumière est encore parmi vous pour un peu de temps. Marchez pendant que vous avez la lumière, pour que les ténèbres ne vous surprennent pas : celui qui marche dans les ténèbres ne sait pas où il va. '
  '36':
  - type: note
    content: 'fils de la lumière ou des fils de lumière  ; Lc 16.8 ; Ep 5.8 ; 1Th 5.5. –  se cacha 8.59+. – Cf. Evangile selon Thomas 59 : « Jésus a dit : “Regardez le Vivant pendant que vous êtes en vie, de peur que vous ne mouriez, et que vous cherchiez à le voir, sans y réussir.” »'
  - type: text
    content: Pendant que vous avez la lumière, mettez votre foi en la lumière, pour devenir fils de la lumière.
  - type: text
    content: Jésus dit cela, puis il s'en alla et se cacha d'eux.
  - type: heading
    content: Le refus de croire
  '37':
  - type: text
    content: ' '
  - type: note
    content: signes 2.11+,23n  ; cf. Dt 29.1-3 ; Mt 11.20.
  - type: text
    content: 'Malgré tous les signes qu''il avait produits devant eux, ils ne mettaient pas leur foi en lui, '
  '38':
  - type: note
    content: 'Es 53.1n  ; Rm 10.16 ; Hé 4.2. – Voir prophète. –  ce qu''il nous a entendus dire  : autres traductions ce qu''il a entendu dire de nous ; ce que nous avons entendu.'
  - type: text
    content: 'de sorte que soit accomplie la parole du prophète Esaïe, qui a dit :'
  - type: text
    content: Seigneur, qui a cru ce qu'il nous a entendus dire ?
  - type: text
    content: Et à qui le bras du Seigneur a-t-il été révélé ?
  '39':
  - type: text
    content: ' '
  - type: note
    content: '8.43+ ; cf. 1.9-11. –  croire ou avoir foi  : cf. v. 38,44 ; 1.7n.'
  - type: text
    content: 'S''ils ne pouvaient pas croire, c''est qu''Esaïe a encore dit :'
  '4':
  - type: note
    content: 6.64+,71 ; cf. Mt 26.8/ /.
  - type: text
    content: 'Un de ses disciples, Judas Iscariote, celui qui allait le livrer, dit alors : '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Es 6.10  ; Mt 13.14-15/ / ; Mc 8.18 ; Ac 28.26s. –  rendu leurs yeux aveugles 9.39-41. –  rendu… leur cœur obtus  : litt. endurci leur cœur , voir Mc 3.5n. –  ne fassent pas demi-tour  : voir changement.'
  - type: text
    content: 'Il a rendu '
  - type: text
    content: leurs yeux
  - type: text
    content: ' aveugles'
  - type: text
    content: 'et leur '
  - type: text
    content: cœur
  - type: text
    content: ' obtus,'
  - type: text
    content: pour qu'ils ne voient pas avec leurs yeux,
  - type: text
    content: qu'ils ne comprennent pas avec leur cœur
  - type: text
    content: 'et qu''ils ne fassent pas demi-tour :'
  - type: text
    content: je les aurais guéris !
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'parce qu''il a vu  : certains mss portent lorsqu''il a vu  ; cf. 1.14 ; 8.56 ; voir Es 6.1 ; voir aussi gloire.'
  - type: text
    content: 'C''est ce qu''a dit Esaïe, parce qu''il a vu sa gloire et qu''il a parlé de lui. '
  '42':
  - type: note
    content: 'parmi les chefs  : le même terme est traduit par prince v. 31 ; cf. 3.1+s ; 7.48. –  mirent leur foi en lui 2.23+. –  pharisiens 1.24+. –  reconnaissaient… publiquement 1.20n. –  exclus de la synagogue 9.22+.'
  - type: text
    content: 'Cependant, même parmi les chefs, beaucoup mirent leur foi en lui ; mais à cause des pharisiens, ils ne le reconnaissaient pas publiquement, pour ne pas être exclus de la synagogue. '
  '43':
  - type: note
    content: 5.44+.
  - type: text
    content: Car ils aimèrent la gloire des humains plus que la gloire de Dieu.
  - type: heading
    content: Le jugement par la parole de Jésus
  '44':
  - type: text
    content: ' '
  - type: note
    content: s'écria 7.28+. –  en celui qui m'a envoyé 5.24 ; 13.20.
  - type: text
    content: 'Jésus s''écria : Celui qui met sa foi en moi, ce n''est pas en moi qu''il met sa foi, mais en celui qui m''a envoyé ; '
  '45':
  - type: note
    content: 1.14,18 ; 6.40 ; 14.7-9.
  - type: text
    content: 'et celui qui me voit voit celui qui m''a envoyé. '
  '46':
  - type: note
    content: 1.9+ ; 3.19 ; 8.12+.
  - type: text
    content: 'Moi, la lumière, je suis venu dans le monde, pour que quiconque met sa foi en moi ne demeure pas dans les ténèbres. '
  '47':
  - type: note
    content: 'entend… et ne les garde pas  : cf. Mt 7.24-27 ; 13.23 ; Lc 8.21 ; 11.28. –  moi, je ne le juge pas… 3.17+.'
  - type: text
    content: 'Si quelqu''un entend mes paroles et ne les garde pas, moi, je ne le juge pas, car je ne suis pas venu pour juger le monde, mais pour sauver le monde. '
  '48':
  - type: note
    content: 'Lc 10.16. –  a bien un juge  : litt. a celui qui le jugera : la parole (cf. 1.1n) ; voir aussi 3.18 ; 5.45+ ; Mc 8.38 ; Hé 4.12+. –  au dernier jour 6.39+.'
  - type: text
    content: 'Celui qui me rejette et qui ne reçoit pas mes paroles a bien un juge : c''est la parole que j''ai dite qui le jugera au dernier jour. '
  '49':
  - type: note
    content: 'de ma propre initiative, litt. de moi-même 5.19+ ; cf. 7.17ns ; 8.28 ; 14.10,24. –  m''a donné lui-même un commandement  : cf. 15.10 ; Dt 18.18s ; voir loi.'
  - type: text
    content: 'Car moi, je n''ai pas parlé de ma propre initiative ; c''est le Père, qui m''a envoyé, qui m''a donné lui-même un commandement sur ce que je dois dire et ce dont je dois parler. '
  '5':
  - type: note
    content: 'trois cents deniers  : cf. 6.7 ; Mc 14.5. –  donner aux pauvres Mt 19.21/ /.'
  - type: text
    content: 'Pourquoi n''a-t-on pas vendu ce parfum trois cents deniers pour les donner aux pauvres ? '
  '50':
  - type: note
    content: 'vie éternelle 3.15+ ; 17.2s. –  ce dont, moi, je parle…  : autre traduction ce que, moi, je dis, je le dis… (le texte grec emploie ici deux verbes en grande partie équivalents, aussi au v. 49) ; cf. 1P 4.11.'
  - type: text
    content: Et je sais que son commandement est vie éternelle. Ainsi, ce dont, moi, je parle, j'en parle comme le Père me l'a dit.
  '6':
  - type: note
    content: 'qu''il avait le souci  : cf. 10.13. –  tenant la bourse 13.29 ; cf. Lc 8.3.'
  - type: text
    content: 'Il disait cela, non parce qu''il avait le souci des pauvres, mais parce qu''il était voleur et que, tenant la bourse, il prenait ce qu''on y mettait. '
  '7':
  - type: note
    content: 'Laisse-la…  : texte obscur ; autres traductions laisse-la, qu''elle garde cela… ; laisse-la, elle devait garder (le parfum) pour le jour… ; laisse-la ; aurait-elle dû garder… ? laisse-la observer (autre sens possible du verbe) cet usage en vue du jour…  ; certains mss portent laisse-la, elle a gardé…  ; cf. 19.39s ; 20.1 ; Mc 14.3.'
  - type: text
    content: 'Mais Jésus dit : Laisse-la garder cela pour le jour de mon ensevelissement. '
  '8':
  - type: note
    content: vous ne m'avez pas toujours ou pour toujours Mt 26.11/ / ; cf. Dt 15.11.
  - type: text
    content: Les pauvres, en effet, vous les avez toujours avec vous ; mais moi, vous ne m'avez pas toujours.
  - type: heading
    content: Le complot contre Lazare
  '9':
  - type: text
    content: ' '
  - type: note
    content: '11.43s ; 12.1n. –  La grande foule  : certains mss portent une grande foule.'
  - type: text
    content: 'La grande foule des Juifs sut qu''il était là ; ils vinrent, non pas seulement à cause de Jésus, mais aussi pour voir Lazare, qu''il avait réveillé d''entre les morts. '
