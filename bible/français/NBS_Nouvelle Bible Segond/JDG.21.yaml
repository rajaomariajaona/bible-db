document_id: JDG.21
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Renaissance de la tribu de Benjamin
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mitspa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Aucun de nous… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 7,18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à un Benjaminite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à Benjamin.
    marker-yv: yv-n
  - type: text
    text: 'Au Mitspa, les hommes d''Israël avaient fait ce serment : Aucun de nous ne donnera sa fille pour femme à un Benjaminite. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth-El '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'resta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pleurèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.4+ ; 20.23 ; cf. 21.6+.
    marker-yv: yv-n
  - type: text
    text: 'Le peuple vint à Beth-El et resta là, devant Dieu, jusqu''au soir. Ils se mirent à sangloter, pleurèrent beaucoup '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 6+.
    marker-yv: yv-n
  - type: text
    text: 'et dirent : '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', Dieu d''Israël, pourquoi une telle chose est-elle arrivée en Israël ? Pourquoi manque-t-il aujourd''hui une tribu d''Israël ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 20.26+.
    marker-yv: yv-n
  - type: text
    text: 'Le lendemain, le peuple se leva de bon matin ; ils bâtirent là un autel et offrirent des holocaustes et des sacrifices de paix. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 8 ; cf. 20.8-10 ; voir aussi 5.15-17,23 ; 12.3.
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites dirent : Qui, d''entre toutes les tribus d''Israël, n''est pas monté à l''assemblée devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? – Car on avait fait un serment solennel contre quiconque ne monterait pas vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' au Mitspa ; on avait dit : Celui-là sera mis à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 3,15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avaient du regret au sujet de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avaient pitié de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Or les Israélites avaient du regret au sujet de Benjamin, leur frère ; ils disaient : Aujourd''hui une tribu a été retranchée d''Israël ! '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 1+.
    marker-yv: yv-n
  - type: text
    text: 'Que devons-nous faire pour ceux qui restent, en ce qui concerne les femmes, puisque nous avons juré par le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' de ne pas leur donner nos filles pour femmes ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yabesh de Galaad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', à l''est du Jourdain, connue plus tard pour ses rapports privilégiés avec Benjamin (1S 11.1-10 ; 31.11-13 ; 2S 2.4-7 ; 21.12 ; 1Ch 10.11s). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''assemblée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s.
    marker-yv: yv-n
  - type: text
    text: 'Ils dirent donc : Y a-t-il quelqu''un, parmi les tribus d''Israël, qui ne soit pas monté vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' au Mitspa ? Or personne de Yabesh de Galaad n''était venu au camp, à l''assemblée. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'recensa '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 20.15,17.
    marker-yv: yv-n
  - type: text
    text: 'On recensa le peuple, et il n''y avait là aucun des habitants de Yabesh de Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la communauté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'passez… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 13.16 ; Jos 6.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les familles entières
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 34.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Alors la communauté envoya là douze mille hommes parmi les plus vaillants, en leur donnant cet ordre : Allez, passez au fil de l''épée les habitants de Yabesh de Galaad, avec les femmes et les familles entières. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous frapperez d''anathème '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.17 ; Dt 2.34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: toute femme…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mais vous épargnerez les vierges ; et ils firent ainsi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Nb 31.5s,17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's,35 ; voir aussi Dt 20.13s ; 21.10-14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui a couché…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'connaissant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ayant connu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même verbe est traduit au v. 12 par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avoir des relations avec
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la couche d''un mâle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (expression analogue au v. 12).
    marker-yv: yv-n
  - type: text
    text: 'Voici ce que vous ferez : Vous frapperez d''anathème tout mâle, ainsi que toute femme qui a couché avec un mâle. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre cents jeunes filles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui n'avaient jamais…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ne connaissant pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: n'ayant pas connu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'homme en couche de mâle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à Silo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 19-23 ; 18.31+ ; 20.27
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), plus au nord que le Mitspa (v. 1), '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en Canaan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. en Cisjordanie.'
    marker-yv: yv-n
  - type: text
    text: Ils trouvèrent parmi les habitants de Yabesh de Galaad quatre cents jeunes filles vierges, qui n'avaient jamais eu de relations avec un homme, qui n'avaient jamais couché avec un mâle, et ils les amenèrent dans le camp, à Silo en Canaan.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des messagers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Toute la communauté envoya des messagers parler aux fils de Benjamin qui étaient au rocher de Rimmôn, pour leur proposer la paix. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: En ce temps-là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à ce moment-là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas assez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 12 ; 20.47.
    marker-yv: yv-n
  - type: text
    text: En ce temps-là, Benjamin revint ; on leur donna les femmes de Yabesh de Galaad à qui l'on avait laissé la vie. Mais on n'en trouva pas assez pour eux.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avait ouvert une brèche…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'avait causé la perte d''une tribu d''Israël ; avait fait éclater les tribus d''Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Ex 19.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Le peuple avait du regret au sujet de Benjamin, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait ouvert une brèche dans les tribus d''Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il n'y a plus de femmes…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (toute) femme a été détruite.
    marker-yv: yv-n
  - type: text
    text: 'Les anciens de la communauté dirent : Que devons-nous faire pour ceux qui restent, en ce qui concerne les femmes, puisqu''il n''y a plus de femmes en Benjamin ? '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Que les rescapés de Benjamin…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction conjecturale ; texte hébreu obscur.'
    marker-yv: yv-n
  - type: text
    text: 'Et ils dirent : Que les rescapés de Benjamin conservent leur possession, afin qu''une tribu ne soit pas effacée d''Israël ! '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais nous, nous ne pouvons pas leur donner nos filles pour femmes, car les Israélites ont fait un serment en disant : « Maudit soit celui qui donnera une femme à un Benjaminite ! » '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une fête du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 1.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Silo '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 12 ; 18.31+.
    marker-yv: yv-n
  - type: text
    text: 'Alors ils dirent : Chaque année il y a une fête du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à Silo, qui est au nord de Beth-El, à l''est de la route qui monte de Beth-El à Sichem, et au sud de Lebona. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Puis ils donnèrent cet ordre aux fils de Benjamin : Allez vous mettre en embuscade dans les vignes. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: danser leurs rondes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.34 ; Ex 15.20 ; 32.17-19 ; 1S 18.6 ; 2S 6.5,14-16 ; 1R 18.26 ; Ps 150.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous vous en irez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 31.'
    marker-yv: yv-n
  - type: text
    text: 'Vous regarderez : quand les filles de Silo sortiront pour danser leurs rondes, vous sortirez des vignes, vous enlèverez chacun une fille de Silo et vous vous en irez au pays de Benjamin. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs pères ou leurs frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 34 ; 2S 13.20-29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se plaindre auprès de nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'nous chercher querelle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous intenter un procès
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; plusieurs versions anciennes ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous chercher querelle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la bataille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: contre Yabesh de Galaad v. 10-14.
    marker-yv: yv-n
  - type: text
    text: 'Si leurs pères ou leurs frères viennent se plaindre auprès de nous, nous leur dirons : Faites-leur grâce pour nous : nous n''avons pas pris une femme pour chacun dans la bataille. Ce n''est pas vous qui les leur avez données ; en ce cas, vous seriez en tort. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en nombre suffisant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour leur nombre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'enlevèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: patrimoine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 18.20 ; 26.62 ; Jos 13.23 ; 19.51.'
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Benjamin firent ainsi : ils prirent des femmes en nombre suffisant parmi les danseuses qu''ils enlevèrent, puis ils partirent et retournèrent dans leur patrimoine ; ils rebâtirent les villes et ils s''y installèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: En ce temps-là, les Israélites s'en allèrent de là, chacun dans sa tribu et dans son clan ; ils partirent de là chacun dans son patrimoine.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '21.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.6+.
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là, il n''y avait pas de roi en Israël : chacun faisait ce qui lui convenait.'
