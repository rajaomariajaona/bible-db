document_id: JDG.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Renaissance de la tribu de Benjamin
  - type: text
    content: ' '
  - type: note
    content: 'Mitspa 20.1n. –  Aucun de nous… v. 7,18. –  à un Benjaminite  : litt. à Benjamin.'
  - type: text
    content: 'Au Mitspa, les hommes d''Israël avaient fait ce serment : Aucun de nous ne donnera sa fille pour femme à un Benjaminite. '
  '10':
  - type: note
    content: 'la communauté 20.1n. –  passez… Dt 13.16 ; Jos 6.21. –  les familles entières  : autre traduction les enfants  ; cf. Gn 34.29n.'
  - type: text
    content: 'Alors la communauté envoya là douze mille hommes parmi les plus vaillants, en leur donnant cet ordre : Allez, passez au fil de l''épée les habitants de Yabesh de Galaad, avec les femmes et les familles entières. '
  '11':
  - type: note
    content: 'Vous frapperez d''anathème 1.17 ; Dt 2.34n. –  toute femme…  : certains mss de LXX ajoutent mais vous épargnerez les vierges ; et ils firent ainsi  ; cf. Nb 31.5s,17ns,35 ; voir aussi Dt 20.13s ; 21.10-14. –  qui a couché…  : litt. connaissant ou ayant connu (le même verbe est traduit au v. 12 par avoir des relations avec) la couche d''un mâle (expression analogue au v. 12).'
  - type: text
    content: 'Voici ce que vous ferez : Vous frapperez d''anathème tout mâle, ainsi que toute femme qui a couché avec un mâle. '
  '12':
  - type: note
    content: 'quatre cents jeunes filles  : cf. v. 14. –  qui n''avaient jamais…  : litt. ne connaissant pas (ou n''ayant pas connu) d''homme en couche de mâle, cf. v. 11n. –  à Silo (v. 19-23 ; 18.31+ ; 20.27n), plus au nord que le Mitspa (v. 1), en Canaan, c.-à-d. en Cisjordanie.'
  - type: text
    content: Ils trouvèrent parmi les habitants de Yabesh de Galaad quatre cents jeunes filles vierges, qui n'avaient jamais eu de relations avec un homme, qui n'avaient jamais couché avec un mâle, et ils les amenèrent dans le camp, à Silo en Canaan.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '20.45n,47. –  des messagers  : sous-entendu dans le texte.'
  - type: text
    content: 'Toute la communauté envoya des messagers parler aux fils de Benjamin qui étaient au rocher de Rimmôn, pour leur proposer la paix. '
  '14':
  - type: note
    content: 'En ce temps-là  : autre traduction à ce moment-là. –  pas assez v. 12 ; 20.47.'
  - type: text
    content: En ce temps-là, Benjamin revint ; on leur donna les femmes de Yabesh de Galaad à qui l'on avait laissé la vie. Mais on n'en trouva pas assez pour eux.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'V. 6+. –  avait ouvert une brèche…  : autres traductions avait causé la perte d''une tribu d''Israël ; avait fait éclater les tribus d''Israël (cf. Ex 19.22n).'
  - type: text
    content: 'Le peuple avait du regret au sujet de Benjamin, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait ouvert une brèche dans les tribus d''Israël. '
  '16':
  - type: note
    content: 'V. 7. –  il n''y a plus de femmes…  : litt. (toute) femme a été détruite.'
  - type: text
    content: 'Les anciens de la communauté dirent : Que devons-nous faire pour ceux qui restent, en ce qui concerne les femmes, puisqu''il n''y a plus de femmes en Benjamin ? '
  '17':
  - type: note
    content: 'Que les rescapés de Benjamin…  : traduction conjecturale ; texte hébreu obscur.'
  - type: text
    content: 'Et ils dirent : Que les rescapés de Benjamin conservent leur possession, afin qu''une tribu ne soit pas effacée d''Israël ! '
  '18':
  - type: note
    content: V. 1n.
  - type: text
    content: 'Mais nous, nous ne pouvons pas leur donner nos filles pour femmes, car les Israélites ont fait un serment en disant : « Maudit soit celui qui donnera une femme à un Benjaminite ! » '
  '19':
  - type: note
    content: 'une fête du Seigneur  : cf. 1S 1.3. –  Silo v. 12 ; 18.31+.'
  - type: text
    content: 'Alors ils dirent : Chaque année il y a une fête du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Silo, qui est au nord de Beth-El, à l''est de la route qui monte de Beth-El à Sichem, et au sud de Lebona. '
  '2':
  - type: note
    content: Beth-El 20.18+. –  resta 20.26n. –  pleurèrent 2.4+ ; 20.23 ; cf. 21.6+.
  - type: text
    content: 'Le peuple vint à Beth-El et resta là, devant Dieu, jusqu''au soir. Ils se mirent à sangloter, pleurèrent beaucoup '
  '20':
  - type: text
    content: 'Puis ils donnèrent cet ordre aux fils de Benjamin : Allez vous mettre en embuscade dans les vignes. '
  '21':
  - type: note
    content: 'danser leurs rondes  : cf. 11.34 ; Ex 15.20 ; 32.17-19 ; 1S 18.6 ; 2S 6.5,14-16 ; 1R 18.26 ; Ps 150.4. –  vous vous en irez…  : cf. Gn 31.'
  - type: text
    content: 'Vous regarderez : quand les filles de Silo sortiront pour danser leurs rondes, vous sortirez des vignes, vous enlèverez chacun une fille de Silo et vous vous en irez au pays de Benjamin. '
  '22':
  - type: note
    content: 'leurs pères ou leurs frères  : cf. Gn 34 ; 2S 13.20-29. –  se plaindre auprès de nous  : autre traduction nous chercher querelle ou nous intenter un procès  ; plusieurs versions anciennes ont lu vous chercher querelle. –  dans la bataille contre Yabesh de Galaad v. 10-14.'
  - type: text
    content: 'Si leurs pères ou leurs frères viennent se plaindre auprès de nous, nous leur dirons : Faites-leur grâce pour nous : nous n''avons pas pris une femme pour chacun dans la bataille. Ce n''est pas vous qui les leur avez données ; en ce cas, vous seriez en tort. '
  '23':
  - type: note
    content: 'en nombre suffisant  : litt. pour leur nombre. –  enlevèrent 9.25n. –  patrimoine  : cf. Nb 18.20 ; 26.62 ; Jos 13.23 ; 19.51.'
  - type: text
    content: 'Les fils de Benjamin firent ainsi : ils prirent des femmes en nombre suffisant parmi les danseuses qu''ils enlevèrent, puis ils partirent et retournèrent dans leur patrimoine ; ils rebâtirent les villes et ils s''y installèrent. '
  '24':
  - type: text
    content: En ce temps-là, les Israélites s'en allèrent de là, chacun dans sa tribu et dans son clan ; ils partirent de là chacun dans son patrimoine.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 17.6+.
  - type: text
    content: 'En ces jours-là, il n''y avait pas de roi en Israël : chacun faisait ce qui lui convenait.'
  '3':
  - type: note
    content: V. 6+.
  - type: text
    content: 'et dirent : '
  - type: text
    content: Seigneur
  - type: text
    content: ', Dieu d''Israël, pourquoi une telle chose est-elle arrivée en Israël ? Pourquoi manque-t-il aujourd''hui une tribu d''Israël ? '
  '4':
  - type: note
    content: 20.26+.
  - type: text
    content: 'Le lendemain, le peuple se leva de bon matin ; ils bâtirent là un autel et offrirent des holocaustes et des sacrifices de paix. '
  '5':
  - type: note
    content: V. 8 ; cf. 20.8-10 ; voir aussi 5.15-17,23 ; 12.3.
  - type: text
    content: 'Les Israélites dirent : Qui, d''entre toutes les tribus d''Israël, n''est pas monté à l''assemblée devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? – Car on avait fait un serment solennel contre quiconque ne monterait pas vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au Mitspa ; on avait dit : Celui-là sera mis à mort. '
  '6':
  - type: note
    content: 'V. 3,15. –  avaient du regret au sujet de  : autre traduction avaient pitié de, cf. 2.18n.'
  - type: text
    content: 'Or les Israélites avaient du regret au sujet de Benjamin, leur frère ; ils disaient : Aujourd''hui une tribu a été retranchée d''Israël ! '
  '7':
  - type: note
    content: V. 1+.
  - type: text
    content: 'Que devons-nous faire pour ceux qui restent, en ce qui concerne les femmes, puisque nous avons juré par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de ne pas leur donner nos filles pour femmes ? '
  '8':
  - type: note
    content: V. 5. –  Yabesh de Galaad, à l'est du Jourdain, connue plus tard pour ses rapports privilégiés avec Benjamin (1S 11.1-10 ; 31.11-13 ; 2S 2.4-7 ; 21.12 ; 1Ch 10.11s). –  l'assemblée 20.1ns.
  - type: text
    content: 'Ils dirent donc : Y a-t-il quelqu''un, parmi les tribus d''Israël, qui ne soit pas monté vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au Mitspa ? Or personne de Yabesh de Galaad n''était venu au camp, à l''assemblée. '
  '9':
  - type: note
    content: recensa 20.15,17.
  - type: text
    content: 'On recensa le peuple, et il n''y avait là aucun des habitants de Yabesh de Galaad. '
