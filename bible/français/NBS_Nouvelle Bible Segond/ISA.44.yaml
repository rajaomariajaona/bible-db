  - type: text
    text: L'homme s'en sert pour faire du feu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il les prend pour se chauffer.
- type: usfm
  marker: q1
  children:
  - type: text
    text: D'une part, il en allume pour cuire du pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: d'autre part il fabrique un dieu,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se prosterne ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il en fait une statue,
- type: usfm
  marker: q1
  children:
  - type: text
