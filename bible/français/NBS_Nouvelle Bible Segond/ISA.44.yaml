  - type: text
    text: Le forgeron, comme pour une hache,
- type: usfm
  marker: q1
  children:
  - type: text
    text: travaille avec des braises
- type: usfm
  marker: q1
  children:
  - type: text
    text: et il façonne à coups de marteau ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il travaille d'un bras vigoureux ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: mais a-t-il faim,
- type: usfm
  marker: q1
  children:
