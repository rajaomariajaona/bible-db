document_id: ISA.44,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël, n'aie pas peur
  - type: text
    content: ' '
  - type: note
    content: 'serviteur 41.8+. –  que j''ai choisi  : cf. 42.1n.'
  - type: text
    content: Ecoute maintenant, Jacob, mon serviteur !
  - type: text
    content: Israël, que j'ai choisi !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'un dieu  : hébreu ’el , de même aux v. 15,17 ; 40.18n  ; cf. Gn 21.33n.'
  - type: text
    content: Qui façonne un dieu
  - type: text
    content: ou fond une statue,
  - type: text
    content: pour n'en retirer aucune utilité ?
  '11':
  - type: text
    content: Tous ses compagnons seront honteux ;
  - type: text
    content: les ciseleurs eux-mêmes ne sont que des humains ;
  - type: text
    content: qu'ils se rassemblent tous,
  - type: text
    content: qu'ils se présentent,
  - type: text
    content: et tous ensemble ils seront effrayés et honteux.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Le forgeron  : litt. l''artisan du fer . Les versions grecque et syriaque ont lu l''artisan aiguise le fer pour la hache ( comme pour est sous-entendu dans le texte). –  façonne / travaille  : sous-entendu l''idole  ; cf. v. 15n. –  sans force / épuisé 40.26,29.'
  - type: text
    content: Le forgeron, comme pour une hache,
  - type: text
    content: travaille avec des braises
  - type: text
    content: et il façonne à coups de marteau ;
  - type: text
    content: il travaille d'un bras vigoureux ;
  - type: text
    content: mais a-t-il faim,
  - type: text
    content: le voilà sans force ;
  - type: text
    content: ne boit-il pas d'eau,
  - type: text
    content: le voilà épuisé.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Le menuisier  : litt. l''artisan du bois  ; cf. 40.20n. –  à la craie  : traduction incertaine. –  l''apparence  : autre traduction la splendeur (cf. v. 23). –  qu''elle habite dans une maison  : autre traduction qu''elle soit installée (ou assise ) dans un temple.'
  - type: text
    content: Le menuisier tend le cordeau,
  - type: text
    content: il la dessine à la craie,
  - type: text
    content: il la forme au ciseau,
  - type: text
    content: il la dessine au compas ;
  - type: text
    content: il la fait sur le modèle d'un homme,
  - type: text
    content: il lui donne l'apparence d'un être humain,
  - type: text
    content: pour qu'elle habite dans une maison.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Il coupe des cèdres (2.13) : la construction de l''hébreu permettrait de rattacher ces mots à ce qui précède (la construction de la maison du v. 14, cf. 1R 5.19s), plutôt qu''à ce qui suit (la fabrication de l''idole proprement dite). –  rouvres  : identification incertaine. –  qu''il a laissés grandir  : litt. il les fortifie pour lui.'
  - type: text
    content: Il coupe des cèdres,
  - type: text
    content: il prend des rouvres et des chênes
  - type: text
    content: qu'il a laissés grandir
  - type: text
    content: parmi les arbres de la forêt ;
  - type: text
    content: il plante des pins,
  - type: text
    content: et la pluie les fait croître.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'il fabrique  : le même verbe est traduit par travailler au v. 12. –  fait des révérences  : même verbe hébreu aux v. 17,19 ; 46.6.'
  - type: text
    content: L'homme s'en sert pour faire du feu,
  - type: text
    content: il les prend pour se chauffer.
  - type: text
    content: D'une part, il en allume pour cuire du pain,
  - type: text
    content: d'autre part il fabrique un dieu,
  - type: text
    content: il se prosterne ;
  - type: text
    content: il en fait une statue,
  - type: text
    content: devant laquelle il fait des révérences.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'avec cette moitié  : les versions grecque et syriaque ont lu sur ses braises . –  Ah ! ah ! Ez 25.3+ ; Ps 35.21n.'
  - type: text
    content: Il jette au feu la moitié de son bois,
  - type: text
    content: avec cette moitié il va pouvoir manger de la viande,
  - type: text
    content: il cuit un rôti et se rassasie ;
  - type: text
    content: 'il se chauffe aussi et dit : Ah ! ah !'
  - type: text
    content: je me chauffe, je vois les flammes !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 45.20.
  - type: text
    content: Et avec le reste il fait un dieu, sa statue,
  - type: text
    content: il fait des révérences devant elle,
  - type: text
    content: il se prosterne, il l'invoque
  - type: text
    content: 'et s''écrie : Délivre-moi,'
  - type: text
    content: car tu es mon dieu !
  '18':
  - type: text
    content: ' '
  - type: note
    content: 41.20 ; 42.18+.
  - type: text
    content: Ils n'ont ni connaissance ni intelligence ;
  - type: text
    content: leurs yeux sont bouchés,
  - type: text
    content: de sorte qu'ils ne voient pas,
  - type: text
    content: et leur cœur, de sorte qu'ils n'ont pas de bon sens.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Il ne réfléchit pas  : litt. il ne fait pas revenir vers son cœur  ; cf. 46.8 ; Lm 3.21n  ; Rm 1.21-23. –  une abomination 41.24 ; cf. Dt 7.25s.'
  - type: text
    content: Il ne réfléchit pas
  - type: text
    content: et il n'a ni connaissance
  - type: text
    content: 'ni d''intelligence pour dire :'
  - type: text
    content: J'en ai jeté une moitié au feu,
  - type: text
    content: j'ai cuit du pain sur les braises,
  - type: text
    content: j'ai rôti de la viande et je l'ai mangée ;
  - type: text
    content: et avec le reste je ferais une abomination !
  - type: text
    content: Je ferais des révérences devant un morceau de bois !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'fait 43.7+. –  façonne v. 9 ; 43.1+. –  de ta mère  : sous-entendu dans le texte ; cf. v. 24 ; 46.3 ; 49.1,5 ; Jr 1.5 ; Ga 1.15. –  N''aie pas peur 41.10+. –  Yeshouroun ( le redressé ), cf. 42.19. Le même terme désigne également Israël en Dt 32.15 ; 33.5,26.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', celui qui te fait'
  - type: text
    content: et qui te façonne depuis le ventre de ta mère,
  - type: text
    content: 'celui qui est ton secours :'
  - type: text
    content: N'aie pas peur,
  - type: text
    content: 'Jacob, mon serviteur, Yeshouroun :'
  - type: text
    content: je t'ai choisi.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Il se repaît…  : autre traduction il s''attache à la cendre.'
  - type: text
    content: Il se repaît de cendres ;
  - type: text
    content: son cœur abusé l'égare,
  - type: text
    content: il ne le délivrera pas ;
  - type: text
    content: 'il ne dira pas :'
  - type: text
    content: N'y a-t-il pas un mensonge dans ma main droite ?
  - type: heading
    content: Le créateur du monde est maître de l'histoire
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'mon serviteur 41.8+. –  façonné 43.1+. –  je ne t''oublierai pas  : litt. tu ne seras pas oublié de moi (construction inhabituelle en hébreu). Des versions anciennes ont lu tu ne m''oublieras pas , un ms de Qumrân  : tu ne me décevras pas.'
  - type: text
    content: Souviens-toi de cela, Jacob,
  - type: text
    content: Israël, car tu es mon serviteur ;
  - type: text
    content: je t'ai façonné pour que tu sois mon serviteur ;
  - type: text
    content: Israël, je ne t'oublierai pas.
  '22':
  - type: text
    content: ' '
  - type: note
    content: effacé 43.25. –  nuage Lm 3.44. –  Reviens 1.27n  ; cf. Jr 31.18 ; Lm 5.21. –  j'ai assuré ta rédemption 35.9n  ; 41.14n.
  - type: text
    content: J'ai effacé tes transgressions comme un nuage
  - type: text
    content: et tes péchés comme une nuée.
  - type: text
    content: Reviens à moi, car j'ai assuré ta rédemption.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 42.10-12 ; 49.13 ; 55.12 ; Ps 96.12 ; 148.1-9. –  Ciel ou cieux , cf. 1.1+ ; Gn 1.1n.
  - type: text
    content: Ciel, pousse des cris de joie,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a agi !'
  - type: text
    content: Profondeurs de la terre, lancez des acclamations !
  - type: text
    content: Montagnes, éclatez en cris de joie !
  - type: text
    content: Vous aussi, forêts, avec tous vos arbres !
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a assuré la rédemption de Jacob,'
  - type: text
    content: il montre sa splendeur en Israël.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'ton rédempteur 41.14+. –  depuis le ventre de ta mère v. 2n. –  par moi-même…  : ou, selon certains mss hébreux et des versions anciennes, j''étale la terre (cf. 42.5n) , qui (est) avec moi ? Cf. 45.7.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton rédempteur,'
  - type: text
    content: 'celui qui te façonne depuis le ventre de ta mère :'
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je fais tout ;'
  - type: text
    content: seul, je déploie le ciel,
  - type: text
    content: par moi-même j'étale la terre.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1Co 1.20. –  des vantards  : c.-à-d. des devins  ; autres traductions des bavards ; mensongers  ; cf. 16.6 ; Jr 50.36n. –  rends… stupide  : cf. 2S 15.31.'
  - type: text
    content: Je déjoue les signes des vantards
  - type: text
    content: et je fais perdre la tête aux devins ;
  - type: text
    content: je fais reculer les sages
  - type: text
    content: et je rends leur connaissance stupide.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Je réalise  : litt. faisant se lever ou faisant tenir debout  ; autre traduction je confirme , cf. Dt 8.18n  ; 1R 8.20n. –  je mène à bien v. 28+. –  les projets (litt. le projet ou le conseil , 5.19n) de mes messagers (ou de mes anges ), cf. Ml 1.1n  ; 2.7+.'
  - type: text
    content: Je réalise la parole de mon serviteur
  - type: text
    content: et je mène à bien les projets de mes messagers.
  - type: text
    content: 'Je dis de Jérusalem :'
  - type: text
    content: Elle sera habitée,
  - type: text
    content: 'et des villes de Juda :'
  - type: text
    content: Elles seront rebâties,
  - type: text
    content: et je relèverai leurs ruines.
  '27':
  - type: text
    content: 'Je dis à l''eau profonde :'
  - type: text
    content: Dessèche-toi ;
  - type: text
    content: je tarirai tes fleuves.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cyrus  : première mention expresse du nom du conquérant perse ; voir cependant 40.13n  ; 41.1-5,25–42.9 ; 43.14n  ; voir aussi 45.1-13 ; 46.8-13 ; 48.12-16. –  berger  : titre royal ; cf. 40.11+. –  Il comblera v. 26 ; cf. 48.14. –  Jérusalem / temple Esd 1.1-5 ; 2Ch 36.22s.'
  - type: text
    content: 'Je dis de Cyrus : C''est mon berger !'
  - type: text
    content: Il comblera tous mes désirs,
  - type: text
    content: 'en disant de Jérusalem :'
  - type: text
    content: Qu'elle soit rebâtie !
  - type: text
    content: 'et du temple :'
  - type: text
    content: Qu'il soit fondé !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je verserai…  : cf. 32.15 (autre verbe hébreu) ; 42.1+ ; Ez 39.29 ; Jl 3.1 ; Za 12.10. –  eau (Jn 4.14) / souffle (ou esprit ) Jn 3.5 ; 7.37-39. – Voir bénédiction.'
  - type: text
    content: Car je verserai de l'eau sur le sol altéré
  - type: text
    content: et des ruisseaux sur la terre desséchée ;
  - type: text
    content: je verserai mon souffle sur ta descendance
  - type: text
    content: et ma bénédiction sur ta progéniture.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ils germeront  : autre traduction ils pousseront  ; cf. 42.9. –  près des cours d''eau 30.25 ; Jr 17.8 ; Ps 1.3.'
  - type: text
    content: Ils germeront au beau milieu de l'herbe,
  - type: text
    content: comme les saules près des cours d'eau.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Voir nom. –  sur sa main  : cf. 49.16 ; Lv 19.28 ; Dt 6.8. –  se parera  : cf. 45.4n.'
  - type: text
    content: 'Celui-ci dira : J''appartiens au '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Celui-là se réclamera du nom de Jacob.
  - type: text
    content: 'Cet autre écrira sur sa main : « Appartenant au '
  - type: text
    content: Seigneur
  - type: text
    content: '  »,'
  - type: text
    content: et il se parera du nom d'Israël.
  - type: heading
    content: Ceux qui façonnent des statues
  '6':
  - type: text
    content: ' '
  - type: note
    content: roi 41.21+. –  son rédempteur 41.14n. –  le Seigneur (YHWH) des Armées 1.9,24+ ; 45.13 ; 47.4 ; 48.2 ; 51.15 ; 54.5 ; Ex 3.15n. –  premier / dernier 41.4+. –  en dehors de moi… v. 8 ; 43.11 ; 45.6,21.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le roi d''Israël,'
  - type: text
    content: son rédempteur,
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Je suis le premier et je suis le dernier,
  - type: text
    content: en dehors de moi il n'y a pas de Dieu.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est comme moi…  : autre traduction qui comme moi criera ? On a aussi compris qui clamera qu''il est comme moi ? qui peut appeler (les choses à l''existence) comme moi ? cf. 40.18+. –  annonce 41.22+. –  tout ce qui s''est passé  : sous-entendu probable dans le texte. –  le peuple d''autrefois  : autres traductions le peuple qui subsiste toujours ; les premiers humains.'
  - type: text
    content: Qui est comme moi ? Qu'il crie !
  - type: text
    content: Qu'il l'annonce et m'expose tout ce qui s'est passé
  - type: text
    content: depuis que j'ai fondé le peuple d'autrefois !
  - type: text
    content: Et qu'ils annoncent aussi ce qui est à venir,
  - type: text
    content: ce qui doit encore arriver !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'effrayés  : 48.11 ; cf. 41.10+. –  depuis toujours  : litt. depuis lors (cf. le peuple d''éternité du v. 7) ; 45.21 ; 48.3,5,7. –  témoins 43.10+. –  un autre Dieu… v. 6+. –  Rocher 17.10+.'
  - type: text
    content: Ne soyez pas effrayés, ne tremblez pas ;
  - type: text
    content: ne te l'ai-je pas fait entendre et annoncé depuis toujours ?
  - type: text
    content: 'Vous êtes mes témoins :'
  - type: text
    content: y a-t-il un autre Dieu en dehors de moi ?
  - type: text
    content: Il n'y a pas d'autre Rocher,
  - type: text
    content: je n'en connais pas.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'statues 40.19+. –  leurs œuvres les plus chères  : autre traduction les œuvres qu''ils vénèrent. –  ne servent à rien ou ne sont d''aucun profit , cf. 47.12 ; 48.17 ; 57.12. –  ils sont leurs témoins  : autre traduction, d''après une note du texte hébreu traditionnel  : leurs témoins n''ont ni la vue…'
  - type: text
    content: Ceux qui façonnent des statues, eux tous, se réduisent au chaos,
  - type: text
    content: et leurs œuvres les plus chères ne servent à rien ;
  - type: text
    content: ils sont leurs témoins,
  - type: text
    content: elles n'ont ni la vue,
  - type: text
    content: ni la connaissance,
  - type: text
    content: aussi seront-ils honteux.
