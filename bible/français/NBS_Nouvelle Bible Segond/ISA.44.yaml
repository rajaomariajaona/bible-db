    text: il fait des révérences devant elle,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il se prosterne, il l'invoque
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'et s''écrie : Délivre-moi,'
- type: usfm
  marker: q1
  children:
  - type: text
    text: car tu es mon dieu !
- type: usfm
  marker: q1
  children:
  - type: usfm
