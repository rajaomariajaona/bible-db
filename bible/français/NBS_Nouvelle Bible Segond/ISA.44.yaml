  - type: text
    text: Il jette au feu la moitié de son bois,
- type: usfm
  marker: q1
  children:
  - type: text
    text: avec cette moitié il va pouvoir manger de la viande,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il cuit un rôti et se rassasie ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: 'il se chauffe aussi et dit : Ah ! ah !'
- type: usfm
  marker: q1
  children:
  - type: text
    text: je me chauffe, je vois les flammes !
- type: usfm
  marker: q1
  children:
  - type: usfm
