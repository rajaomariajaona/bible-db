document_id: PSA.104,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Bénis le Créateur !
  - type: text
    content: ' '
  - type: note
    content: 'LXX donne la suscription  : De David. –  Que je bénisse… v. 35 ; 103.1n. –  très grand 95.3 ; 2S 7.22. –  revêtu 93.1+. –  d''éclat et de magnificence 96.6 ; 111.3 ; Jb 40.10.'
  - type: text
    content: 'Que je bénisse le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, tu es très grand,'
  - type: text
    content: tu es revêtu d'éclat et de magnificence !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 74.15 ; Dt 8.7. –  des torrents ou des oueds  ; cf. 83.10 ; Gn 26.17n  ; Jb 6.15n.
  - type: text
    content: Il conduit les sources dans des torrents
  - type: text
    content: qui coulent entre les montagnes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: animaux des champs ou animaux sauvages  ; cf. Gn 3.14n. –  ânes sauvages Gn 16.12 ; Es 32.14 ; Jb 6.5 ; 11.12 ; 24.5 ; 39.5.
  - type: text
    content: Elles font boire tous les animaux des champs ;
  - type: text
    content: les ânes sauvages y étanchent leur soif.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 31.13 ; Mc 4.32+/ /.
  - type: text
    content: Les oiseaux du ciel demeurent près d'elles
  - type: text
    content: et font entendre leur voix parmi le feuillage.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '65.10ss ; 68.10 ; Es 55.10 ; Jr 14.22 ; Ac 14.17. –  de tes œuvres  : certains modifient le texte hébreu traditionnel pour trouver un meilleur parallèle avec les chambres à l''étage (cf. v. 3n) qui apparaissent au premier vers : p. ex. de l''abondance de tes granges  ; cf. 135.7 ; Jb 37.9n  ; 38.37.'
  - type: text
    content: De ses chambres à l'étage il arrose les montagnes ;
  - type: text
    content: la terre est rassasiée du fruit de tes œuvres.
  '14':
  - type: text
    content: ' '
  - type: note
    content: '147.8s ; Gn 1.30. –  que l''homme cultive  : litt. pour le travail (le mot hébreu correspondant peut être traduit par service ) de l''homme (hébreu ’adam ) ; cf. Gn 2.5n,15 ; 3.19 ; Jb 28.5 ; certains modifient la vocalisation traditionnelle de l''hébreu de façon à lire pour les bêtes de somme que l''homme utilise pour tirer le pain de la terre.'
  - type: text
    content: Il fait pousser l'herbe pour les bêtes,
  - type: text
    content: et les plantes que l'homme cultive,
  - type: text
    content: pour tirer le pain de la terre,
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'vin 4.8 ; Jg 9.13 ; Pr 31.7 ; Siracide 31.27s : « Pour les hommes, le vin est comme la vie, si on le boit avec modération. Quelle vie pour celui qui manque de vin ! Aussi bien fut-il créé aux origines pour apporter la joie. Le vin apporte allégresse du cœur et joie de l''âme, quand on le boit à propos et juste ce qu''il faut. » 40.20 : « Le vin et la musique réjouissent le cœur, mais plus que ces deux choses l''amour de la sagesse. » –  l''huile… 23.5 ; 45.8 ; 92.11 ; Dt 28.40 ; Lc 7.46. –  qui soutient le cœur  : l''expression hébraïque correspondante est souvent traduite par restaurer , cf. Gn 18.5n  ; Mt 6.11.'
  - type: text
    content: le vin qui réjouit le cœur de l'homme,
  - type: text
    content: faisant plus que l'huile resplendir son visage,
  - type: text
    content: et le pain qui soutient le cœur de l'homme.
  '16':
  - type: text
    content: 'Les arbres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont rassasiés,'
  - type: text
    content: les cèdres du Liban, qu'il a plantés.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'cigogne Lv 11.19 ; Dt 14.18 ; Jr 8.7 ; Za 5.9. –  demeure  : le mot hébreu correspondant est habituellement traduit par maison.'
  - type: text
    content: C'est là que les oiseaux font leurs nids ;
  - type: text
    content: la cigogne a sa demeure dans les cyprès,
  '18':
  - type: text
    content: ' '
  - type: note
    content: bouquetins 1S 24.3 ; Jb 39.1n. –  damans Lv 11.5 ; Pr 30.26.
  - type: text
    content: les montagnes élevées sont pour les bouquetins,
  - type: text
    content: les rocs sont l'abri des damans,
  '19':
  - type: text
    content: ' '
  - type: note
    content: '19.5s ; 74.16. –  les rencontres festives ou, plus généralement, les temps  ; cf. Gn 1.14nss ; Siracide 43.6s : « La lune aussi, à sa date, fixe l''indication des époques et le signal du temps. De la lune vient le signal de la fête. »'
  - type: text
    content: Il a fait la lune pour marquer les rencontres festives ;
  - type: text
    content: le soleil sait quand il doit se coucher.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Il s''enveloppe de lumière  : cf. 1Tm 6.16 ; Ap 12.1. –  déploie le ciel…  : cf. 8.4ss ; 18.10 ; 33.6 ; 96.5 ; 102.25 ; 136.5 ; Gn 1.6n  ; Es 40.22+ ; Za 12.1 ; Jb 9.8+.'
  - type: text
    content: Il s'enveloppe de lumière comme d'un manteau ;
  - type: text
    content: il déploie le ciel comme une toile.
  '20':
  - type: text
    content: ' '
  - type: note
    content: ténèbres Am 5.8 ; cf. Gn 1.3ss.
  - type: text
    content: Tu amènes les ténèbres, et c'est la nuit
  - type: text
    content: où tous les animaux de la forêt se mettent à fourmiller ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jl 1.20 ; Jb 38.39ss. –  Dieu  : hébreu ’El , cf. Gn 21.33n  ; de même en Jb 38.41.'
  - type: text
    content: 'les jeunes lions rugissent après leur proie :'
  - type: text
    content: ils demandent à Dieu leur nourriture.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Jb 37.8 ; 38.40.
  - type: text
    content: 'Le soleil se lève : Ils se retirent'
  - type: text
    content: et se couchent dans leurs tanières.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 15n  ; Jn 9.4. –  L''homme sort…  : litt. l''homme sort pour son ouvrage.'
  - type: text
    content: L'homme sort pour se rendre à son ouvrage
  - type: text
    content: et à son travail, jusqu'au soir.
  '24':
  - type: text
    content: ' '
  - type: note
    content: '40.6 ; 92.6 ; Jb 5.9. –  avec sagesse Jr 10.12 ; Pr 3.19s ; cf. 8.22ss ; Jb 12.7ss ; 28. –  tout ce que tu as produit  : autres traductions ce que tu possèdes ; tes biens (comme en 105.21n) ; cf. Gn 4.1n.'
  - type: text
    content: 'Que tes œuvres sont nombreuses, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Tu les as toutes faites avec sagesse ;
  - type: text
    content: la terre est remplie de tout ce que tu as produit.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'vaste  : litt. large des deux mains  ; cf. Gn 34.21n  ; Es 22.18n  ; Né 7.4n. –  mer  : cf. Gn 1.9ss. –  animaux 69.35 ; Gn 1.20ss.'
  - type: text
    content: 'Voici la grande et vaste mer :'
  - type: text
    content: là fourmillent sans nombre
  - type: text
    content: des animaux petits et grands ;
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'bateaux 107.23-30. –  Léviathan , nom d''un animal fabuleux représenté comme un monstre marin ; cf. 74.14n  ; Es 27.1 ; Jb 3.8 ; 40.25nss. –  pour jouer avec lui  : autre traduction pour qu''il y joue  ; cf. Jb 40.20n,29 ; Pr 8.31.'
  - type: text
    content: là se déplacent les bateaux
  - type: text
    content: et Léviathan, que tu as façonné pour jouer avec lui.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 136.25 ; 145.15 ; Mt 24.45 ; Lc 12.24,42.
  - type: text
    content: Eux tous mettent leur espoir en toi,
  - type: text
    content: pour que tu leur donnes leur nourriture en son temps.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 145.16 ; cf. Jb 36.31.
  - type: text
    content: Tu la leur donnes, et ils la recueillent ;
  - type: text
    content: tu ouvres ta main, et ils sont rassasiés de biens ;
  '29':
  - type: text
    content: ' '
  - type: note
    content: '30.8. –  tu te détournes  : litt. tu caches ta face  ; cf. 13.2+. –  le souffle  : litt. leur souffle ou leur esprit  ; cf. v. 30 ; 146.4 ; Gn 3.19 ; Jb 10.12 ; 12.10 ; 34.14s ; Ec 12.7. –  ils périssent  : litt. ils expirent , cf. Gn 6.17n  ; Jb 34.15.'
  - type: text
    content: 'tu te détournes : ils sont saisis d''épouvante ;'
  - type: text
    content: 'tu leur retires le souffle : ils périssent'
  - type: text
    content: et retournent à leur poussière.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sur les eaux  : cf. 29.10n  ; 148.4 ; Gn 1.6ns ; Am 9.6. –  chambres à l''étage  : l''image vient des chambres construites sur les toits en terrasses des maisons ; cf. Jg 3.20n  ; 1R 17.19,23 ; 2R 4.10s. –  les nuages pour char 68.5n  ; Es 19.1 ; Ez 1. –  ailes du vent 18.11.'
  - type: text
    content: Il fixe sur les eaux ses chambres à l'étage,
  - type: text
    content: il prend les nuages pour char,
  - type: text
    content: il s'avance sur les ailes du vent.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'ton souffle ou ton Esprit  ; cf. v. 29n  ; 33.6 ; Gn 2.7 ; Ez 37.10 ; Jb 33.4 ; Ac 17.25 ; Judith 16.14 : « Que toutes tes créatures te servent, car tu as dit et elles ont existé, tu as envoyé ton esprit et il les a construites ; il n''y a personne qui résiste à ta voix. » –  ils sont créés  : autre traduction d''autres sont créés. –  la terre  : litt. la face du sol (cf. Gn 2.5n).'
  - type: text
    content: 'Tu envoies ton souffle : ils sont créés,'
  - type: text
    content: et tu renouvelles la terre.
  '31':
  - type: text
    content: ' '
  - type: note
    content: la gloire du Seigneur 19.2 ; 29.9 ; 150.1 ; Es 6.3 ; cf. Rm 11.36. –  se réjouisse… Gn 1.31.
  - type: text
    content: 'Que la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' subsiste toujours !'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se réjouisse de ses œuvres !'
  '32':
  - type: text
    content: ' '
  - type: note
    content: terre… frissonne Esd 10.9n  ; cf. Am 9.5 ; Ps 18.8. –  montagnes… fument (volcans ?) 144.5 ; cf. Ex 19.18.
  - type: text
    content: Il regarde la terre, et elle frissonne ;
  - type: text
    content: il touche les montagnes, et elles fument.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'je chanterai  : le second verbe a aussi été traduit je jouerai ou je chanterai des psaumes  ; cf. 7.18n  ; 21.14n  ; 57.8 ; 105.2 ; voir aussi 30.13 ; 63.5 ; 146.2 ; Es 38.20.'
  - type: text
    content: 'Je chanterai pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' tant que je vivrai,'
  - type: text
    content: je chanterai pour mon Dieu tant que j'existerai.
  '34':
  - type: text
    content: ' '
  - type: note
    content: douce 19.15 ; 119.108 ; cf. Ml 3.4. –  me réjouir dans le Seigneur 16.11 ; 32.11 ; Jl 2.23.
  - type: text
    content: Que ma requête lui soit douce !
  - type: text
    content: 'Moi, je veux me réjouir dans le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Que les pécheurs… 37.38 ; 139.19ss ; Es 13.9 ; Ap 21.27. –  Que je bénisse… v. 1 ; 103.1n. –  Louez le Seigneur (Yah)  : hébreu halelou-Yah (= alléluia , cf. 68.5n) ; voir aussi 105—106 ; 111—113 ; 115—117 ; 135 ; 146—150 ; Ap 19.1-6. –  méchants  : voir justice.'
  - type: text
    content: Que les pécheurs disparaissent de la terre,
  - type: text
    content: et que les méchants ne soient plus !
  - type: text
    content: 'Que je bénisse le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: 'Louez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) !'
  '4':
  - type: text
    content: ' '
  - type: note
    content: '29.7 ; 103.19ss ; 148.8s ; 1R 19.11s. LXX qui fait de ses anges (= messagers ) des esprits (= vents ) , de ses auxiliaires un feu flamboyant  ; cf. Hé 1.7  ; voir aussi 4 Esdras 8.21s : « Toi qu''entoure avec crainte l''armée des anges, qu''un mot de toi change en vent et en feu. » –  le feu flamboyant (ou dévorant ) …  : autre traduction (il fait) du feu flamboyant ses auxiliaires  ; cf. 103.21n.'
  - type: text
    content: Il fait des vents ses messagers,
  - type: text
    content: le feu flamboyant est à son service ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 24.2+ ; 93.1+ ; Jb 38.4 ; Pr 8.29.
  - type: text
    content: il fonde la terre sur ses bases,
  - type: text
    content: jamais, jamais elle ne vacillera.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Tu l''avais couverte  : certains modifient légèrement le texte hébreu traditionnel, incertain, pour lire elle était couverte  ; cf. Gn 1.2 ; 7.20.'
  - type: text
    content: Tu l'avais couverte de l'abîme comme d'un vêtement,
  - type: text
    content: les eaux se tenaient sur les montagnes ;
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. 74.13. –  quand tu les rabroues 9.6+ ; 18.14-16 ; 106.9 ; Es 50.2 ; Na 1.4.
  - type: text
    content: elles fuient quand tu les rabroues,
  - type: text
    content: 'elles se précipitent au bruit de ton tonnerre :'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Certains ont compris  : les montagnes s''élèvent, les vallées s''abaissent, vers le lieu… –  que tu leur as assigné  : litt. tu as fondé pour elles  ; autre traduction que tu leur as fixé.'
  - type: text
    content: elles montent dans les montagnes, descendent dans les vallées,
  - type: text
    content: vers le lieu que tu leur as assigné.
  '9':
  - type: text
    content: ' '
  - type: note
    content: une limite ou une frontière  ; Jr 5.22 ; Jb 26.10 ; 38.8ss ; Pr 8.29. –  qu'elles ne reviennent pas… Gn 9.11.
  - type: text
    content: Tu as posé une limite qu'elles ne doivent pas passer,
  - type: text
    content: afin qu'elles ne reviennent pas couvrir la terre.
