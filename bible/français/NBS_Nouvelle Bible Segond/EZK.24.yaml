        marker: fq
        children:
        - type: text
          text: 'présage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 24.
      marker-yv: yv-n
    - type: text
      text: 'Ce jour-là, ta bouche s''ouvrira, avec le rescapé : tu parleras, tu ne seras plus muet ; tu seras pour eux un présage, et ainsi ils sauront que je suis le '
    - type: usfm
      marker: nd
