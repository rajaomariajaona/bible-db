      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur parure.
      marker-yv: yv-n
    - type: text
      text: 'Quant à toi, humain, assurément, le jour où je leur enlèverai leur force, leur gaieté et leur splendeur, les délices de leurs yeux et la passion de leur vie, leurs fils et leurs filles, '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
