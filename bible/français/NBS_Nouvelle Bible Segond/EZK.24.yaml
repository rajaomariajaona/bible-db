      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pèse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''appesantir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ps 88.8) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contre Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce jour-là débute le siège de Jérusalem par Nabuchodonosor (26.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), siège qui conduira à la destruction de la ville et du temple (2R 25 ; cf. Jr 32.2 ; 34.1).
      marker-yv: yv-n
    - type: text
      text: 'Humain, mets par écrit pour toi la date de ce jour, de ce jour même ! Le roi de Babylone met tout son poids contre Jérusalem en ce jour même. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Je leur répondit : La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''est parvenue en ces termes : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'délices de vos yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 16,25 ; cf. Ps 89.40 ; Lm 2.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de votre vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
