      marker-yv: yv-n
    - type: text
      text: 'Car le sang qu''elle a versé est resté au milieu d''elle ; elle l''a mis sur le rocher nu, elle ne l''a pas répandu sur la terre pour le couvrir de poussière. '
  '8':
  - type: usfm
