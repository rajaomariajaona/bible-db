      marker-yv: yv-n
    - type: text
      text: 'Propose une fable à la maison rebelle ; tu leur diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Prépare la marmite, prépare-la
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et verses-y de l'eau.
  '4':
  - type: usfm
    marker: q1
