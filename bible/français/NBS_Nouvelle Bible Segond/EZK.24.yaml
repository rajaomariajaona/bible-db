          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les délices de tes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la femme du prophète ; cf. v. 18,21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne couleront pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne viendront pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 22s.
      marker-yv: yv-n
    - type: text
      text: 'Humain, je te prends d''un seul coup les délices de tes yeux. Tu ne te lamenteras pas, tu ne pleureras pas, tes larmes ne couleront pas. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2S 15.30 ; 19.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur ta tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte (cf. v. 23 ; 44.18) ; le terme traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 's''applique habituellement à la coiffure des prêtres ; il est apparenté au terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'splendeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 25 ; voir Ex 39.28 ; Es 61.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le pain des autres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 22), celui que les parents et amis avaient coutume d''offrir à l''endeuillé (cf. Jr 16.7 ; Os 9.4).'
      marker-yv: yv-n
    - type: text
      text: Soupire en silence, ne porte pas le deuil des morts, attache ta parure sur ta tête, mets tes sandales aux pieds, ne te couvre pas la moustache et ne mange pas le pain des autres.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''avais parlé au peuple le matin, et ma femme mourut le soir. Le lendemain matin, je fis ce qui m''avait été ordonné. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.9+.
      marker-yv: yv-n
    - type: text
      text: 'Le peuple me dit : Ne nous expliqueras-tu pas ce que signifie pour nous ce que tu fais ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
