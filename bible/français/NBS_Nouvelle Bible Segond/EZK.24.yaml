        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fils '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'filles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23.47. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que vous avez laissés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: abandonnés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) à Jérusalem (le prophète s'adresse aux exilés ; cf. 2R 24.14).
      marker-yv: yv-n
    - type: text
      text: 'Dis à la maison d''Israël : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je profane mon sanctuaire, orgueil de votre force, délices de vos yeux et émoi de votre vie. Vos fils et vos filles que vous avez laissés tomberont par l''épée. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous agirez alors comme j''ai agi. Vous ne vous couvrirez pas la moustache, vous ne mangerez pas le pain des autres, '
