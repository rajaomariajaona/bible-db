      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 589/8 av. J.-C. (le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dixième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est à cheval sur décembre et janvier) ; cf. 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 25.1 ; Jr 52.4.'
      marker-yv: yv-n
    - type: text
      text: 'La neuvième année, le dixième jour du dixième mois, la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 4-5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fais cuire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fais réduire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: assaisonne-la
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; autres possibilités '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prépare la sauce '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, d''après '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vide le jus.
      marker-yv: yv-n
    - type: text
      text: 'Entasse beaucoup de bois, allume le feu, fais cuire la viande, assaisonne-la, et que les os soient brûlés. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mets la marmite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fais-la tenir.
      marker-yv: yv-n
    - type: text
      text: 'Puis mets la marmite vide sur les braises, afin qu''elle chauffe, que le bronze soit brûlé et que son impureté fonde à l''intérieur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les efforts sont inutiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte obscur et traduction incertaine ; peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle a peiné en vain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. LXX omet cette proposition. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'rouille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6.
      marker-yv: yv-n
    - type: text
      text: 'Les efforts sont inutiles, la rouille dont elle est pleine ne s''en retire pas ; au feu sa rouille ! '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'impureté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: souillure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 14.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai voulu te '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je t'ai purifiée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: assouvi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 5.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'L''infamie est dans ton impureté ; parce que j''ai voulu te purifier et que tu n''es pas devenue pure, tu ne seras plus purifiée de ton impureté jusqu''à ce que j''aie assouvi ma fureur contre toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui ai parlé ; cela arrivera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pitié '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'regret '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 6.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On te jugera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils te jugeront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 23.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes voies
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.22+.'
      marker-yv: yv-n
    - type: text
      text: 'C''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai parlé ; cela arrivera, je le ferai ; je ne laisserai rien passer, je n''aurai ni pitié ni regret. On te jugera selon tes voies et selon tes agissements – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le deuil d'Ezéchiel
    marker-yv: yv-h
