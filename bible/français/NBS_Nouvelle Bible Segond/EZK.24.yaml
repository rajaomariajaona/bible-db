document_id: EZK.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérusalem est comme une marmite rouillée
  - type: text
    content: ' '
  - type: note
    content: 'neuvième année  : 589/8 av. J.-C. (le dixième mois est à cheval sur décembre et janvier) ; cf. 1.2n  ; 2R 25.1 ; Jr 52.4.'
  - type: text
    content: 'La neuvième année, le dixième jour du dixième mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'Cf. v. 4-5n. –  fais cuire  : autre traduction fais réduire. –  assaisonne-la  : traduction incertaine ; autres possibilités prépare la sauce ou, d''après LXX, vide le jus.'
  - type: text
    content: 'Entasse beaucoup de bois, allume le feu, fais cuire la viande, assaisonne-la, et que les os soient brûlés. '
  '11':
  - type: note
    content: 'mets la marmite  : litt. fais-la tenir.'
  - type: text
    content: 'Puis mets la marmite vide sur les braises, afin qu''elle chauffe, que le bronze soit brûlé et que son impureté fonde à l''intérieur. '
  '12':
  - type: note
    content: 'Les efforts sont inutiles  : texte obscur et traduction incertaine ; peut-être elle a peiné en vain. LXX omet cette proposition. –  rouille v. 6.'
  - type: text
    content: 'Les efforts sont inutiles, la rouille dont elle est pleine ne s''en retire pas ; au feu sa rouille ! '
  '13':
  - type: note
    content: 'impureté ou souillure  ; cf. 14.11+. –  j''ai voulu te purifier  : litt. je t''ai purifiée. –  assouvi…  : 5.13n.'
  - type: text
    content: 'L''infamie est dans ton impureté ; parce que j''ai voulu te purifier et que tu n''es pas devenue pure, tu ne seras plus purifiée de ton impureté jusqu''à ce que j''aie assouvi ma fureur contre toi. '
  '14':
  - type: note
    content: 'qui ai parlé ; cela arrivera 17.24+. –  pitié 5.11+. –  regret Gn 6.6n. –  On te jugera  : autre traduction ils te jugeront  ; 23.24. –  tes voies  : cf. 14.22+.'
  - type: text
    content: 'C''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé ; cela arrivera, je le ferai ; je ne laisserai rien passer, je n''aurai ni pitié ni regret. On te jugera selon tes voies et selon tes agissements – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Le deuil d'Ezéchiel
  '15':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'd''un seul coup  : autre traduction par un fléau , comme en Nb 14.37n. –  les délices de tes yeux  : la femme du prophète ; cf. v. 18,21. –  ne couleront pas  : litt. ne viendront pas  ; cf. v. 22s.'
  - type: text
    content: 'Humain, je te prends d''un seul coup les délices de tes yeux. Tu ne te lamenteras pas, tu ne pleureras pas, tes larmes ne couleront pas. '
  '17':
  - type: note
    content: 'Cf. 2S 15.30 ; 19.5. –  sur ta tête  : sous-entendu dans le texte (cf. v. 23 ; 44.18) ; le terme traduit par parure s''applique habituellement à la coiffure des prêtres ; il est apparenté au terme traduit par splendeur au v. 25 ; voir Ex 39.28 ; Es 61.3n,10. –  le pain des autres (litt. des hommes, de même au v. 22), celui que les parents et amis avaient coutume d''offrir à l''endeuillé (cf. Jr 16.7 ; Os 9.4).'
  - type: text
    content: Soupire en silence, ne porte pas le deuil des morts, attache ta parure sur ta tête, mets tes sandales aux pieds, ne te couvre pas la moustache et ne mange pas le pain des autres.
  '18':
  - type: text
    content: ' '
  - type: note
    content: V. 16n.
  - type: text
    content: 'J''avais parlé au peuple le matin, et ma femme mourut le soir. Le lendemain matin, je fis ce qui m''avait été ordonné. '
  '19':
  - type: note
    content: 12.9+.
  - type: text
    content: 'Le peuple me dit : Ne nous expliqueras-tu pas ce que signifie pour nous ce que tu fais ? '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la date  : litt. le nom . –  met tout son poids (litt. pèse  ; le même verbe est traduit par s''appesantir en Ps 88.8) contre Jérusalem  : ce jour-là débute le siège de Jérusalem par Nabuchodonosor (26.7n), siège qui conduira à la destruction de la ville et du temple (2R 25 ; cf. Jr 32.2 ; 34.1).'
  - type: text
    content: 'Humain, mets par écrit pour toi la date de ce jour, de ce jour même ! Le roi de Babylone met tout son poids contre Jérusalem en ce jour même. '
  '20':
  - type: text
    content: 'Je leur répondit : La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''est parvenue en ces termes : '
  '21':
  - type: note
    content: délices de vos yeux v. 16,25 ; cf. Ps 89.40 ; Lm 2.2. –  de votre vie ou de votre âme, de même au v. 25 ; cf. Gn 1.20n. –  fils / filles 23.47. –  que vous avez laissés (litt. abandonnés) à Jérusalem (le prophète s'adresse aux exilés ; cf. 2R 24.14).
  - type: text
    content: 'Dis à la maison d''Israël : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je profane mon sanctuaire, orgueil de votre force, délices de vos yeux et émoi de votre vie. Vos fils et vos filles que vous avez laissés tomberont par l''épée. '
  '22':
  - type: note
    content: V. 17n.
  - type: text
    content: 'Vous agirez alors comme j''ai agi. Vous ne vous couvrirez pas la moustache, vous ne mangerez pas le pain des autres, '
  '23':
  - type: note
    content: 'vous pourrirez…  : cf. 4.17n  ; 33.10. –  fautes  : voir péché. –  vous gémirez entre vous (litt. l''un vers l''autre) : le verbe est aussi traduit par gronder Es 5.29s ; Ps 38.9n  ; Pr 5.11n  ; versions anciennes vous vous consolerez les uns les autres  ; cf. 14.22+.'
  - type: text
    content: 'vous aurez votre parure sur la tête et vos sandales aux pieds, vous ne vous lamenterez pas et vous ne pleurerez pas ; mais vous pourrirez dans vos fautes et vous gémirez entre vous. '
  '24':
  - type: note
    content: présage v. 27 ; 12.6n.
  - type: text
    content: 'Ezéchiel sera pour vous un présage. Vous ferez exactement ce qu''il a fait. Ainsi, quand cela arrivera, vous saurez que je suis le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH).'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'leur force  : autre traduction leur forteresse ou leur refuge  ; cf. v. 21. –  leur splendeur  : autre traduction leur parure.'
  - type: text
    content: 'Quant à toi, humain, assurément, le jour où je leur enlèverai leur force, leur gaieté et leur splendeur, les délices de leurs yeux et la passion de leur vie, leurs fils et leurs filles, '
  '26':
  - type: note
    content: 33.21s ; cf. Gn 14.13.
  - type: text
    content: 'ce jour-là le rescapé viendra vers toi pour te le faire entendre. '
  '27':
  - type: note
    content: 3.26+,27. –  présage v. 24.
  - type: text
    content: 'Ce jour-là, ta bouche s''ouvrira, avec le rescapé : tu parleras, tu ne seras plus muet ; tu seras pour eux un présage, et ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: note
    content: 'fable  : cf. 14.8n  ; 21.5 ; il s''agit ici d''une action prophétique (comme en 4.3ss etc.). –  maison rebelle 2.5+. –  marmite  : cf. 11.3-12.'
  - type: text
    content: 'Propose une fable à la maison rebelle ; tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Prépare la marmite, prépare-la
  - type: text
    content: et verses-y de l'eau.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'les morceaux  : cf. v. 6.'
  - type: text
    content: Rassembles-y les morceaux,
  - type: text
    content: tous les bons morceaux, la cuisse, l'épaule ;
  - type: text
    content: remplis-la des meilleurs os.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'entasse  : litt. dispose en cercle . –  les os  : une légère modification du texte hébreu traditionnel permettrait de lire le bois , comme au v. 10. –  sous la marmite  : litt. sous elle.'
  - type: text
    content: Prends du petit bétail de choix
  - type: text
    content: et entasse les os sous la marmite ;
  - type: text
    content: fais bouillir à gros bouillons,
  - type: text
    content: et que les os qui sont dedans cuisent aussi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ville sanguinaire v. 9 ; 22.2n  ; cf. Na 3.1. –  rouille v. 12. –  sans recourir au sort  : litt. le sort n''est pas tombé sur elle (cf. Lv 16.8n), ce qui pourrait signifier le malheur ne frappera pas seulement une partie de la population (cf. 2R 24.14), ou bien Jérusalem ne jouira plus d''un traitement de faveur.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Quel malheur pour la ville sanguinaire, marmite pleine de rouille, dont la rouille ne se retire pas ! Retires-en les morceaux les uns après les autres, sans recourir au sort. '
  '7':
  - type: note
    content: 'le sang qu''elle a versé  : litt. son sang  ; cf. 16.6+ ; 21.37. –  sur le rocher nu v. 8 ; 26.4,14. –  le couvrir de poussière, pour qu''il n''appelle plus vengeance, v. 8 ; cf. Gn 4.10+ ; 37.26 ; Lv 17.11-13 ; Es 26.21 ; Jb 16.18 ; voir aussi Ap 18.24.'
  - type: text
    content: 'Car le sang qu''elle a versé est resté au milieu d''elle ; elle l''a mis sur le rocher nu, elle ne l''a pas répandu sur la terre pour le couvrir de poussière. '
  '8':
  - type: note
    content: 'Dans un accès…  : autre traduction pour faire monter la fureur, pour exercer la vengeance  ; cf. 20.26. –  sur le rocher nu… v. 7n.'
  - type: text
    content: Dans un accès de fureur, dans un acte de vengeance, j'ai versé son sang sur le rocher nu, pour qu'il ne soit pas couvert.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur… v. 6+. –  bûcher  : cf. Es 30.33n.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Quel malheur pour la ville sanguinaire ! Moi aussi je veux faire un grand bûcher. '
