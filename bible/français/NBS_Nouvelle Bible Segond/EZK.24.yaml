        children:
        - type: text
          text: l'un vers l'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : le verbe est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gronder '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 5.29s ; Ps 38.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Pr 5.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; versions anciennes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous vous consolerez les uns les autres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 14.22+.'
      marker-yv: yv-n
    - type: text
      text: 'vous aurez votre parure sur la tête et vos sandales aux pieds, vous ne vous lamenterez pas et vous ne pleurerez pas ; mais vous pourrirez dans vos fautes et vous gémirez entre vous. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '24.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'présage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 27 ; 12.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ezéchiel sera pour vous un présage. Vous ferez exactement ce qu''il a fait. Ainsi, quand cela arrivera, vous saurez que je suis le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ' (YHWH).'
