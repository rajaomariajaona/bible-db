        children:
        - type: text
          text: impureté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur.'
      marker-yv: yv-n
    - type: text
      text: 'Or les œuvres de la chair sont manifestes : inconduite sexuelle, impureté, débauche, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moi, Paul '
      - type: usfm
