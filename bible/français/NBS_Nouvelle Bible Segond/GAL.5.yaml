          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 18+,25 ; 6.8 ; Rm 8.4s. La '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règle de la Communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') comporte (3.25–4.14) des listes de vertus et de vices comparables à celles de Ga 5.16-23 ; elle les associe respectivement à « l''Esprit de vérité » et à « l''Esprit de perversité ». –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'accomplirez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jamais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en aucun cas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que la chair désire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le désir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le verbe apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avoir des désirs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 17) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 24 ; Rm 1.24+ ; Ep 2.3 ; 1P 2.11 ; 1Jn 2.16.'
      marker-yv: yv-n
    - type: text
      text: 'Je dis plutôt : marchez par l''Esprit, et vous n''accomplirez jamais ce que la chair désire. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 7.15-23 ; Jc 4.1,5.
      marker-yv: yv-n
    - type: text
      text: 'Car la chair a des désirs contraires à l''Esprit, et l''Esprit en a de contraires à la chair ; ils sont opposés l''un à l''autre, de sorte que vous ne faites pas ce que vous voudriez. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
