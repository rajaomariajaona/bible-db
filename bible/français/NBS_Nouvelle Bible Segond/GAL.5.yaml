        - type: usfm
          marker: w
          children:
          - type: text
            text: circoncire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ac 15.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Christ ne vous servira de rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.6 ; Hé 4.2.'
      marker-yv: yv-n
    - type: text
      text: 'Moi, Paul, je vous dis que si vous vous faites circoncire, le Christ ne vous servira de rien. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
