        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'liberté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 13 ; 2.4 ; Jn 8.36+ ; Rm 8.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tenez donc ferme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 16.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne vous remettez pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne vous laissez pas remettre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 4.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: joug
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ac 15.10.'
      marker-yv: yv-n
    - type: text
      text: C'est pour la liberté que le Christ nous a libérés. Tenez donc ferme, et ne vous remettez pas sous le joug de l'esclavage.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
