document_id: GAL.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Déchus de la grâce
  - type: text
    content: ' '
  - type: note
    content: 'liberté v. 13 ; 2.4 ; Jn 8.36+ ; Rm 8.2. –  Tenez donc ferme 1Co 16.13n. –  ne vous remettez pas… ou ne vous laissez pas remettre  ; cf. 4.9. –  joug  : cf. Ac 15.10.'
  - type: text
    content: C'est pour la liberté que le Christ nous a libérés. Tenez donc ferme, et ne vous remettez pas sous le joug de l'esclavage.
  '10':
  - type: note
    content: 'confiance v. 7n  ; 2Co 7.16 ; voir aussi Rm 14.14+ (où le même verbe est traduit par je suis persuadé). –  vous ne penserez pas autrement ou vous ne prendrez pas un autre parti. –  trouble 1.7+. –  subira  : litt. portera. –  la peine  : litt. le jugement, cf. 1Co 3.17.'
  - type: text
    content: 'Moi, j''ai confiance en vous, dans le Seigneur : je sais que vous ne penserez pas autrement. Mais celui qui vous trouble, quel qu''il soit, en subira la peine. '
  '11':
  - type: note
    content: 'circoncision / persécuté  : cf. 6.12 ; voir aussi Ac 21.21. –  La cause de chute…  : litt. le scandale de la croix, voir 1Co 1.23n. –  réduite à rien 3.17n.'
  - type: text
    content: 'Quant à moi, mes frères, si je proclamais encore la circoncision, pourquoi serais-je encore persécuté ? La cause de chute, la croix, serait donc réduite à rien ? '
  '12':
  - type: note
    content: Qu'ils aillent donc jusqu'à se mutiler ou se faire castrer  ; Paul rapproche peut-être ici, ironiquement, la circoncision de la castration, qui était pratiquée en Galatie par les prêtres de Cybèle ; cf. Dt 23.2 ; Ph 3.2n.
  - type: text
    content: – Qu'ils aillent donc jusqu'à se mutiler, ceux qui sèment le trouble parmi vous !
  - type: heading
    content: Vivre, non selon la chair, mais selon l'Esprit
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'liberté v. 1+. –  un prétexte pour la chair  : le terme rendu par prétexte est traduit par occasion en Rm 7.8 ; cf. Rm 6.15 ; 1Co 8.9 ; 1P 2.16. –  esclaves  : autre traduction serviteurs  ; cf. v. 1 ; 4.1ss.'
  - type: text
    content: 'Mes frères, vous avez été appelés à la liberté ; seulement, que cette liberté ne devienne pas un prétexte pour la chair ; par amour, faites-vous plutôt esclaves les uns des autres. '
  '14':
  - type: note
    content: Lv 19.18  ; Mc 12.28ss/ / ; Rm 13.8-10 ; Jc 2.8.
  - type: text
    content: 'Car toute la loi est accomplie dans une seule parole, celle-ci : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'détruits  : litt. consumés, anéantis  ; cf. v. 26+ ; même verbe Lc 9.54 ; 2Th 2.8.'
  - type: text
    content: Mais si vous vous mordez, si vous vous dévorez les uns les autres, prenez garde de ne pas être détruits les uns par les autres.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'marchez par l''Esprit v. 18+,25 ; 6.8 ; Rm 8.4s. La Règle de la Communauté (Qumrân) comporte (3.25–4.14) des listes de vertus et de vices comparables à celles de Ga 5.16-23 ; elle les associe respectivement à « l''Esprit de vérité » et à « l''Esprit de perversité ». –  accomplirez 3.3n. –  jamais  : autre traduction en aucun cas . –  ce que la chair désire , litt. le désir (le verbe apparenté est traduit par avoir des désirs au v. 17) de la chair , cf. v. 24 ; Rm 1.24+ ; Ep 2.3 ; 1P 2.11 ; 1Jn 2.16.'
  - type: text
    content: 'Je dis plutôt : marchez par l''Esprit, et vous n''accomplirez jamais ce que la chair désire. '
  '17':
  - type: note
    content: Rm 7.15-23 ; Jc 4.1,5.
  - type: text
    content: 'Car la chair a des désirs contraires à l''Esprit, et l''Esprit en a de contraires à la chair ; ils sont opposés l''un à l''autre, de sorte que vous ne faites pas ce que vous voudriez. '
  '18':
  - type: note
    content: 'conduits par l''Esprit  : cf. v. 16+ ; Rm 8.14. –  pas sous la loi v. 23 ; 2.19 ; 4.5 ; Rm 6.14 ; 7.4.'
  - type: text
    content: 'Mais si vous êtes conduits par l''Esprit, vous n''êtes pas sous la loi. '
  '19':
  - type: note
    content: 'Rm 1.29+. –  impureté  : voir pur, impur.'
  - type: text
    content: 'Or les œuvres de la chair sont manifestes : inconduite sexuelle, impureté, débauche, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Moi, Paul 2Co 10.1. –  si vous vous faites circoncire  : cf. Ac 15.1. –  le Christ ne vous servira de rien  : cf. 1.6 ; Hé 4.2.'
  - type: text
    content: 'Moi, Paul, je vous dis que si vous vous faites circoncire, le Christ ne vous servira de rien. '
  '20':
  - type: note
    content: 'sorcellerie  : même terme en Ap 18.23 (sortilèges). –  dissensions ou partis cf. 1Co 11.19n.'
  - type: text
    content: 'idolâtrie, sorcellerie, hostilités, disputes, passions jalouses, fureurs, ambitions personnelles, divisions, dissensions, '
  '21':
  - type: note
    content: comme je l'ai déjà fait 1.9+ ; cf. 2Co 13.2. –  n'hériteront pas… 1Co 6.9+.
  - type: text
    content: 'envie, beuveries, orgies et autres choses semblables. Je vous préviens, comme je l''ai déjà fait : ceux qui pratiquent de telles choses n''hériteront pas le royaume de Dieu. '
  '22':
  - type: note
    content: 'Cf. 2Co 6.6 ; 1Tm 4.12 ; 6.11 ; 2Tm 2.22 ; 2P 1.5-8. –  fruit Ep 5.9 ; Ph 1.11+. –  Esprit / amour / joie / paix  : cf. Rm 5.5 ; 8.6 ; 14.17 ; 15.13 ; Ep 4.3 ; 1Jn 4.7ss. –  foi ou fidélité  : le terme grec peut avoir les deux sens ; cf. v. 6.'
  - type: text
    content: 'Quant au fruit de l''Esprit, c''est : amour, joie, paix, patience, bonté, bienveillance, foi, '
  '23':
  - type: note
    content: 'douceur  : cf. 6.1 ; 1Co 4.21+ ; voir Mt 5.5n. –  aucune loi n''est…  : autre traduction la loi n''est pas contre de telles choses.'
  - type: text
    content: 'douceur, maîtrise de soi ; aucune loi n''est contre de telles choses. '
  '24':
  - type: note
    content: ceux qui appartiennent à Jésus-Christ ou, d'après certains mss, au Christ 1Co 15.23n. –  crucifié (2.19) la chair Rm 6.6s ; 8.13 ; Col 3.3,5 ; 1P 2.11. –  passions Rm 7.5. –  désirs v. 16n.
  - type: text
    content: Mais ceux qui appartiennent à Jésus-Christ ont crucifié la chair avec ses passions et ses désirs.
  '25':
  - type: text
    content: ' '
  - type: note
    content: V. 16+.
  - type: text
    content: 'Si nous vivons par l''Esprit, marchons aussi par l''Esprit. '
  '26':
  - type: note
    content: Cf. v. 15 ; Ph 2.3n.
  - type: text
    content: Ne devenons pas vaniteux ; cessons de nous provoquer les uns les autres, de nous porter envie les uns aux autres.
  '3':
  - type: note
    content: 'je l''atteste Ac 20.26. –  encore une fois 1.9. –  il est tenu  : la même expression est traduite par être débiteur en Rm 1.14n. –  mettre en pratique (litt. faire) la loi tout entière 3.10+ ; cf. 6.13 ; Rm 2.25.'
  - type: text
    content: 'Et je l''atteste encore une fois à tout homme qui se fait circoncire : il est tenu de mettre en pratique la loi tout entière. '
  '4':
  - type: note
    content: 'séparés  : cf. 3.17n  ; tournure analogue Rm 7.2n,6 (être dégagé de) ; cf. 10.3. – Voir grâce.'
  - type: text
    content: 'Vous êtes séparés du Christ, vous qui cherchez la justification dans la loi ; vous êtes déchus de la grâce. '
  '5':
  - type: note
    content: 'Cf. Rm 8.19,23-25 ; 2Co 1.22 ; 5.1-5. – Voir Esprit. –  de la foi  : autre traduction en vertu d''une foi. –  la justice espérée  : litt. l''espérance de la justice  ; d''autres comprennent ce que la justice fait espérer.'
  - type: text
    content: 'Quant à nous, c''est par l''Esprit que nous attendons de la foi la justice espérée. '
  '6':
  - type: note
    content: 'ni la circoncision ni l''incirconcision 6.15 ; 1Co 7.19+. –  la foi ou une foi qui opère (le verbe grec rappelle le mot traduit par œuvre[s]) par l''amour  : cf. 3.5+ ; 1Tm 1.5 ; Jc 2.14ss ; voir aussi Rm 5.1-5 ; 1Co 13.13 ; 1Th 1.3.'
  - type: text
    content: Car, en Jésus-Christ, ce qui a de la valeur, ce n'est ni la circoncision ni l'incirconcision, mais la foi qui opère par l'amour.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Vous couriez bien  : cf. 2.14 ; Ph 3.12-17. –  obéir ou être persuadé  ; cf. v. 8n  ; le même verbe est traduit par avoir confiance au v. 10. –  vérité 4.16+ ; Jn 8.32.'
  - type: text
    content: 'Vous couriez bien ! Qui vous a arrêtés, en vous empêchant d''obéir à la vérité ? '
  '8':
  - type: note
    content: '1.6. –  persuasion  : le terme grec est apparenté au verbe traduit par obéir au v. 7, cf. 1.10n.'
  - type: text
    content: 'Cette persuasion-là ne vient pas de celui qui vous appelle. '
  '9':
  - type: note
    content: Sur le levain comme image d'une influence mauvaise, cf. 1Co 5.6+s ; voir aussi 1Co 15.33.
  - type: text
    content: 'Un peu de levain fait lever toute la pâte. '
