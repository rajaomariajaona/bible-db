      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 7.16 ; voir aussi Rm 14.14+ (où le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je suis persuadé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous ne penserez pas autrement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous ne prendrez pas un autre parti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trouble '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: subira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: portera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la peine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le jugement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1Co 3.17.'
      marker-yv: yv-n
    - type: text
      text: 'Moi, j''ai confiance en vous, dans le Seigneur : je sais que vous ne penserez pas autrement. Mais celui qui vous trouble, quel qu''il soit, en subira la peine. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'circoncision '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: persécuté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.12 ; voir aussi Ac 21.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La cause de chute…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le scandale de la croix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 1Co 1.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réduite à rien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quant à moi, mes frères, si je proclamais encore la circoncision, pourquoi serais-je encore persécuté ? La cause de chute, la croix, serait donc réduite à rien ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''ils aillent donc jusqu''à se mutiler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se faire castrer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Paul rapproche peut-être ici, ironiquement, la circoncision de la castration, qui était pratiquée en Galatie par les prêtres de Cybèle ; cf. Dt 23.2 ; Ph 3.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: – Qu'ils aillent donc jusqu'à se mutiler, ceux qui sèment le trouble parmi vous !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Vivre, non selon la chair, mais selon l'Esprit
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'liberté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un prétexte pour la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme rendu par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prétexte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'occasion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Rm 7.8 ; cf. Rm 6.15 ; 1Co 8.9 ; 1P 2.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: esclaves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 1 ; 4.1ss.
      marker-yv: yv-n
    - type: text
      text: 'Mes frères, vous avez été appelés à la liberté ; seulement, que cette liberté ne devienne pas un prétexte pour la chair ; par amour, faites-vous plutôt esclaves les uns des autres. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Lv 19.18
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Mc 12.28ss/ / ; Rm 13.8-10 ; Jc 2.8.'
      marker-yv: yv-n
    - type: text
      text: 'Car toute la loi est accomplie dans une seule parole, celle-ci : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tu aimeras ton prochain comme toi-même
    - type: text
      text: '. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
