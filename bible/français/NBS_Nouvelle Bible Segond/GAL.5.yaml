      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 16+ ; Rm 8.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas sous la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 23 ; 2.19 ; 4.5 ; Rm 6.14 ; 7.4.
      marker-yv: yv-n
    - type: text
      text: 'Mais si vous êtes conduits par l''Esprit, vous n''êtes pas sous la loi. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
