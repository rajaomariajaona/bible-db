      marker: ft
      children:
      - type: text
        text: '1.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout ce pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
