document_id: JER.45,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un message du Seigneur pour Baruch
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 34.1-7 ; 39.15-18. –  Baruch 32.12+. –  celui-ci  : c.-à-d. Baruch. –  sous la dictée 36.4n. –  la quatrième année de Joïaqim 25.1n.'
  - type: text
    content: 'Parole que Jérémie, le prophète, adressa à Baruch, fils de Nériya, lorsque celui-ci écrivit dans un livre ces paroles, sous la dictée de Jérémie, la quatrième année de Joïaqim, fils de Josias, roi de Juda :'
  '2':
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, sur toi, Baruch : '
  '3':
  - type: note
    content: 'Tu dis  : LXX a lu puisque tu dis. –  Quel malheur pour moi 10.19. –  je me fatigue à force de gémir Ps 6.7. –  pas le repos  : autre traduction pas de lieu de repos  ; Lm 5.5.'
  - type: text
    content: 'Tu dis : « Quel malheur pour moi ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ajoute le tourment à ma douleur ; je me fatigue à force de gémir, et je ne trouve pas le repos ! » '
  '4':
  - type: note
    content: 1.10+. –  tout ce pays ou toute la terre  ; cette explicitation est omise par LXX.
  - type: text
    content: 'C''est ainsi que tu lui parleras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je rase ce que j''ai bâti, je déracine ce que j''ai planté – tout ce pays. '
  '5':
  - type: note
    content: 'de grandes choses  : cf. Ps 131 ; Rm 12.3,16. –  je fais venir… 6.19+. –  sur tous  : litt. sur toute chair. –  ta vie pour butin 21.9n  ; cf. 39.18.'
  - type: text
    content: 'Et toi, tu rechercherais de grandes choses ? Ne les recherche pas ! Car je fais venir le malheur sur tous, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – mais je te donnerai ta vie pour butin, dans tous les lieux où tu iras.'
