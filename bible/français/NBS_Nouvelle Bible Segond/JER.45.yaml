  - type: text
    text: 'Parole que Jérémie, le prophète, adressa à Baruch, fils de Nériya, lorsque celui-ci écrivit dans un livre ces paroles, sous la dictée de Jérémie, la quatrième année de Joïaqim, fils de Josias, roi de Juda :'
