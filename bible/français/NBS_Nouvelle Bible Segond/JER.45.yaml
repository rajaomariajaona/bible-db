      marker: fq
      children:
      - type: text
        text: de grandes choses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 131 ; Rm 12.3,16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je fais venir… '
    - type: usfm
      marker: ft
      children:
      - type: text
