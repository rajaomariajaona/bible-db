  - type: text
    text: 'C''est ainsi que tu lui parleras : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je rase ce que j''ai bâti, je déracine ce que j''ai planté – tout ce pays. '
  - type: usfm
    marker: v
    metadata:
