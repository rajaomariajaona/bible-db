    marker-yv: yv-n
  - type: text
    text: 'Et toi, tu rechercherais de grandes choses ? Ne les recherche pas ! Car je fais venir le malheur sur tous, – déclaration du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  – mais je te donnerai ta vie pour butin, dans tous les lieux où tu iras.'
