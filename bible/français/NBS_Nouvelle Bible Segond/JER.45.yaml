    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur toute '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ta vie pour butin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.9'
      - type: usfm
        marker: ord
        children:
        - type: text
