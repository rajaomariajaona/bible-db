    marker-yv: yv-n
  - type: text
    text: 'Tu dis : « Quel malheur pour moi ! Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ajoute le tourment à ma douleur ; je me fatigue à force de gémir, et je ne trouve pas le repos ! » '
  - type: usfm
    marker: v
    metadata:
