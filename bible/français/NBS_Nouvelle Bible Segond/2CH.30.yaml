document_id: 2CH.30
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezéchias convoque Israël et Juda pour la Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des messagers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pâque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes.'
    marker-yv: yv-n
  - type: text
    text: 'Ezéchias envoya des messagers dans tout Israël et Juda. Il avait en effet également écrit des lettres à Ephraïm et à Manassé, pour qu''ils viennent à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' à Jérusalem célébrer la Pâque pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avaient tenu conseil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'avaient décidé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent un seul verbe hébreu, de même au v. 23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au deuxième mois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 13,15.
    marker-yv: yv-n
  - type: text
    text: 'Le roi, ses princes et toute l''assemblée avaient tenu conseil à Jérusalem ; ils avaient décidé de célébrer la Pâque au deuxième mois, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'car ils ne pouvaient la célébrer en son temps, parce que les prêtres ne s''étaient pas consacrés en assez grand nombre et que le peuple n''était pas rassemblé à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la chose '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la parole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est droite aux yeux du roi et aux yeux de toute l'assemblée.
    marker-yv: yv-n
  - type: text
    text: 'La chose ayant eu l''approbation du roi et de toute l''assemblée, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: résolurent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'firent tenir (debout) une parole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une chose
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'diffuser une proclamation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Esd 1.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle n'était plus célébrée par la multitude
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle n'était plus guère célébrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme il est écrit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 18.'
    marker-yv: yv-n
  - type: text
    text: 'ils résolurent de diffuser une proclamation dans tout Israël, depuis Bersabée jusqu''à Dan, afin qu''on vienne à Jérusalem célébrer la Pâque pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël. Car elle n''était plus célébrée par la multitude comme il est écrit.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les courriers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les coureurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 10 ; ailleurs (p. ex. 12.10s) le terme correspondant semble désigner des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gardes du corps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1S 8.11 ; 22.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 14.27.'
    marker-yv: yv-n
  - type: text
    text: 'Les courriers allèrent avec les lettres du roi et de ses princes dans tout Israël et Juda. Conformément au commandement du roi, ils dirent : Israélites, revenez au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Abraham, d''Isaac et d''Israël, afin qu''il revienne à vous qui êtes restés, qui avez échappé aux rois d''Assyrie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ont commis des sacrilèges
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ont été infidèles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: livrés à la dévastation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2R 22.19 ; Mi 6.16.'
    marker-yv: yv-n
  - type: text
    text: 'Ne soyez pas comme vos pères et comme vos frères, qui ont commis des sacrilèges envers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de leurs pères, et qu''il a livrés à la dévastation, comme vous le voyez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'engagez-vous envers le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: donnez la main à YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2R 10.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 17.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Esd 10.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Ch 29.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'A présent, ne soyez donc pas rétifs comme vos pères ; engagez-vous envers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', venez à son sanctuaire qu''il a consacré pour toujours, et servez le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, pour que sa colère ardente se détourne de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: clément…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 34.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il ne se détournera pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il ne détournera pas sa face.
    marker-yv: yv-n
  - type: text
    text: 'Si vous revenez au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', vos frères et vos fils obtiendront la compassion de ceux qui les ont emmenés captifs et ils reviendront dans ce pays ; car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, est clément et compatissant ; il ne se détournera pas de vous si vous revenez à lui.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Les courriers passèrent ainsi de ville en ville dans le pays d''Ephraïm et de Manassé, et jusqu''à Zabulon. Mais les gens riaient à leur sujet et se moquaient d''eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''humilièrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 12.6+.
    marker-yv: yv-n
  - type: text
    text: 'Cependant quelques hommes d''Aser, de Manassé et de Zabulon s''humilièrent et vinrent à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un même '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Ch 12.39 ; Jr 32.39 ; Ez 11.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: exécuter l'ordre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mettre en pratique le commandement.
    marker-yv: yv-n
  - type: text
    text: 'En Juda aussi la main de Dieu agit pour leur donner un même cœur et leur faire exécuter l''ordre du roi et des princes, par la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ezéchias célèbre la Pâque
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fête des Pains sans levain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes.'
    marker-yv: yv-n
  - type: text
    text: 'Un peuple nombreux se réunit à Jérusalem pour célébrer la fête des Pains sans levain au deuxième mois : ce fut une immense assemblée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ils supprimèrent les autels qui étaient dans Jérusalem et ils supprimèrent tous les encensoirs en les jetant dans l''oued Cédron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: confus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ez 16.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'holocaustes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.6+.
    marker-yv: yv-n
  - type: text
    text: 'Ils immolèrent ensuite la Pâque le quatorzième jour du deuxième mois. Les prêtres et les lévites, confus, s''étaient consacrés. Ils offrirent des holocaustes dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils occupaient…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils se tenaient (debout) à leur place, selon leur règle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le mot correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'règle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pouvant aussi être traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'droit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: coutume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'selon la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' de Moïse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '23.18 ; Jos 8.31 ; 1R 2.3 ; 2R 14.6 ; Esd 3.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Moïse, l'homme de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 33.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''aspersion du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 5.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'ils recevaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la main.
    marker-yv: yv-n
  - type: text
    text: 'Ils occupaient leur place ordinaire, selon la loi de Moïse, l''homme de Dieu, et les prêtres faisaient l''aspersion du sang qu''ils recevaient des lévites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la Pâque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les pâques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. les animaux destinés à la célébration de la Pâque ; cf. 35.8s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceux qui n''étaient pas '
      - type: usfm
        marker: w
        children:
        - type: text
          text: purs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jn 11.55. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'en faire la consécration
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de consacrer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on peut comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de consacrer les animaux immolés pour la Pâque
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de consacrer les participants '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 18ss).
    marker-yv: yv-n
  - type: text
    text: 'Comme il y avait dans l''assemblée beaucoup de gens qui ne s''étaient pas consacrés, les lévites se chargèrent d''immoler la Pâque pour tous ceux qui n''étaient pas purs, afin d''en faire la consécration pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sans se conformer à ce qui est écrit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ezéchias pria pour eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comparer avec l''intercession de Salomon au chap. 6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fasse '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'expiation
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pardonne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 65.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car une grande partie du peuple, beaucoup de gens d''Ephraïm, de Manassé, d''Issacar et de Zabulon ne s''étaient pas purifiés. Ils mangèrent la Pâque sans se conformer à ce qui est écrit ; c''est pourquoi Ezéchias pria pour eux, en disant : Que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', qui est bon, fasse l''expiation pour '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour les choses sacrées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: saintes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le sanctuaire.
    marker-yv: yv-n
  - type: text
    text: 'tous ceux qui ont appliqué leur cœur à chercher Dieu, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de leurs pères, même sans avoir la pureté requise pour les choses sacrées ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' entendit Ezéchias et il épargna le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pendant sept jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comme au temps de Salomon, cf. 7.8-10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jour après jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Né 8.18+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de toute la force de leurs instruments
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec des instruments de force
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; certains modifient le texte hébreu pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de toute leur force.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi les Israélites qui se trouvèrent à Jérusalem célébrèrent la fête des Pains sans levain pendant sept jours, avec une grande joie. Jour après jour les lévites et les prêtres louaient le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' de toute la force de leurs instruments pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'parla au '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 32.6 ; Gn 34.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'bon sens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: discernement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en ce qui concerne le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans les affaires du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils mangèrent ce qui était prescrit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sens incertain ; d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils achevèrent cette rencontre festive de sept jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: célébrant…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'confessant (leurs péchés) au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ezéchias parla au cœur de tous les lévites, qui montraient beaucoup de bon sens en ce qui concerne le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ils mangèrent ce qui était prescrit pendant sept jours, offrant des sacrifices de paix et célébrant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de leurs pères.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de joie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la joie.
    marker-yv: yv-n
  - type: text
    text: 'Toute l''assemblée tint conseil et décida de célébrer sept autres jours ; ils célébrèrent sept jours de joie, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'car Ezéchias, roi de Juda, avait prélevé pour l''assemblée mille taureaux et sept mille têtes de petit bétail, et les princes avaient prélevé pour l''assemblée mille taureaux et dix mille têtes de petit bétail. Des prêtres s''étaient consacrés en grand nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Toute l''assemblée de Juda, les prêtres et les lévites, tout le peuple venu d''Israël et les immigrés venus d''Israël ou habitant Juda se livrèrent à la joie. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'Il y eut une grande joie à Jérusalem. Depuis le temps de Salomon, fils de David, roi d''Israël, rien de semblable n''avait eu lieu à Jérusalem. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '30.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: '-'
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : des mss hébreux et des versions anciennes portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les prêtres et les lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 15s,21,25. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se levèrent et bénirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son séjour sacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le séjour de sa sainteté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Dt 26.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Les prêtres-lévites bénirent le peuple. Ils furent entendus ; leur prière parvint jusqu'à son séjour sacré, au ciel.
