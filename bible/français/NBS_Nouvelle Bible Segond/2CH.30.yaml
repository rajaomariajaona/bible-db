document_id: 2CH.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias convoque Israël et Juda pour la Pâque
  - type: text
    content: ' '
  - type: note
    content: 'des messagers  : sous-entendu dans le texte. –  Pâque  : voir calendrier et fêtes.'
  - type: text
    content: 'Ezéchias envoya des messagers dans tout Israël et Juda. Il avait en effet également écrit des lettres à Ephraïm et à Manassé, pour qu''ils viennent à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Jérusalem célébrer la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '10':
  - type: text
    content: 'Les courriers passèrent ainsi de ville en ville dans le pays d''Ephraïm et de Manassé, et jusqu''à Zabulon. Mais les gens riaient à leur sujet et se moquaient d''eux. '
  '11':
  - type: note
    content: s'humilièrent 12.6+.
  - type: text
    content: 'Cependant quelques hommes d''Aser, de Manassé et de Zabulon s''humilièrent et vinrent à Jérusalem. '
  '12':
  - type: note
    content: 'un même cœur 1Ch 12.39 ; Jr 32.39 ; Ez 11.19. –  exécuter l''ordre  : autre traduction mettre en pratique le commandement.'
  - type: text
    content: 'En Juda aussi la main de Dieu agit pour leur donner un même cœur et leur faire exécuter l''ordre du roi et des princes, par la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Ezéchias célèbre la Pâque
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'fête des Pains sans levain  : voir calendrier et fêtes.'
  - type: text
    content: 'Un peuple nombreux se réunit à Jérusalem pour célébrer la fête des Pains sans levain au deuxième mois : ce fut une immense assemblée. '
  '14':
  - type: text
    content: 'Ils supprimèrent les autels qui étaient dans Jérusalem et ils supprimèrent tous les encensoirs en les jetant dans l''oued Cédron. '
  '15':
  - type: note
    content: 'confus  : cf. Ez 16.27n. –  holocaustes 1.6+.'
  - type: text
    content: 'Ils immolèrent ensuite la Pâque le quatorzième jour du deuxième mois. Les prêtres et les lévites, confus, s''étaient consacrés. Ils offrirent des holocaustes dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'Ils occupaient…  : litt. ils se tenaient (debout) à leur place, selon leur règle, le mot correspondant à règle pouvant aussi être traduit par droit ou coutume. –  selon la loi de Moïse 23.18 ; Jos 8.31 ; 1R 2.3 ; 2R 14.6 ; Esd 3.2. –  Moïse, l''homme de Dieu  : cf. Dt 33.1n. –  l''aspersion du sang Lv 5.9. –  qu''ils recevaient  : litt. de la main.'
  - type: text
    content: 'Ils occupaient leur place ordinaire, selon la loi de Moïse, l''homme de Dieu, et les prêtres faisaient l''aspersion du sang qu''ils recevaient des lévites. '
  '17':
  - type: note
    content: 'la Pâque  : litt. les pâques, c.-à-d. les animaux destinés à la célébration de la Pâque ; cf. 35.8s. –  ceux qui n''étaient pas purs  : cf. Jn 11.55. –  d''en faire la consécration  : litt. de consacrer  ; on peut comprendre de consacrer les animaux immolés pour la Pâque, ou bien de consacrer les participants (v. 18ss).'
  - type: text
    content: 'Comme il y avait dans l''assemblée beaucoup de gens qui ne s''étaient pas consacrés, les lévites se chargèrent d''immoler la Pâque pour tous ceux qui n''étaient pas purs, afin d''en faire la consécration pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '18':
  - type: note
    content: 'sans se conformer à ce qui est écrit  : cf. v. 5. –  Ezéchias pria pour eux  : comparer avec l''intercession de Salomon au chap. 6. –  fasse l''expiation ou pardonne  : cf. Ps 65.4n.'
  - type: text
    content: 'Car une grande partie du peuple, beaucoup de gens d''Ephraïm, de Manassé, d''Issacar et de Zabulon ne s''étaient pas purifiés. Ils mangèrent la Pâque sans se conformer à ce qui est écrit ; c''est pourquoi Ezéchias pria pour eux, en disant : Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui est bon, fasse l''expiation pour '
  '19':
  - type: note
    content: 'pour les choses sacrées (ou saintes) : autre traduction pour le sanctuaire.'
  - type: text
    content: 'tous ceux qui ont appliqué leur cœur à chercher Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères, même sans avoir la pureté requise pour les choses sacrées ! '
  '2':
  - type: note
    content: avaient tenu conseil et avaient décidé traduisent un seul verbe hébreu, de même au v. 23. –  au deuxième mois v. 13,15.
  - type: text
    content: 'Le roi, ses princes et toute l''assemblée avaient tenu conseil à Jérusalem ; ils avaient décidé de célébrer la Pâque au deuxième mois, '
  '20':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entendit Ezéchias et il épargna le peuple. '
  '21':
  - type: note
    content: 'pendant sept jours  : comme au temps de Salomon, cf. 7.8-10. –  Jour après jour  : cf. Né 8.18+. –  de toute la force de leurs instruments  : litt. avec des instruments de force  ; certains modifient le texte hébreu pour lire de toute leur force.'
  - type: text
    content: 'Ainsi les Israélites qui se trouvèrent à Jérusalem célébrèrent la fête des Pains sans levain pendant sept jours, avec une grande joie. Jour après jour les lévites et les prêtres louaient le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de toute la force de leurs instruments pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '22':
  - type: note
    content: 'parla au cœur 32.6 ; Gn 34.3n. –  bon sens ou discernement. –  en ce qui concerne le Seigneur ou dans les affaires du Seigneur. –  Ils mangèrent ce qui était prescrit…  : sens incertain ; d''après LXX, certains modifient le texte hébreu traditionnel pour lire ils achevèrent cette rencontre festive de sept jours. –  célébrant…  : autre traduction confessant (leurs péchés) au Seigneur.'
  - type: text
    content: 'Ezéchias parla au cœur de tous les lévites, qui montraient beaucoup de bon sens en ce qui concerne le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils mangèrent ce qui était prescrit pendant sept jours, offrant des sacrifices de paix et célébrant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'de joie  : autre traduction dans la joie.'
  - type: text
    content: 'Toute l''assemblée tint conseil et décida de célébrer sept autres jours ; ils célébrèrent sept jours de joie, '
  '24':
  - type: text
    content: 'car Ezéchias, roi de Juda, avait prélevé pour l''assemblée mille taureaux et sept mille têtes de petit bétail, et les princes avaient prélevé pour l''assemblée mille taureaux et dix mille têtes de petit bétail. Des prêtres s''étaient consacrés en grand nombre. '
  '25':
  - type: text
    content: 'Toute l''assemblée de Juda, les prêtres et les lévites, tout le peuple venu d''Israël et les immigrés venus d''Israël ou habitant Juda se livrèrent à la joie. '
  '26':
  - type: text
    content: 'Il y eut une grande joie à Jérusalem. Depuis le temps de Salomon, fils de David, roi d''Israël, rien de semblable n''avait eu lieu à Jérusalem. '
  '27':
  - type: note
    content: 'Les prêtres-lévites  : des mss hébreux et des versions anciennes portent les prêtres et les lévites  ; cf. v. 15s,21,25. –  bénirent  : litt. se levèrent et bénirent. –  son séjour sacré  : autre traduction le séjour de sa sainteté  ; cf. Dt 26.15n.'
  - type: text
    content: Les prêtres-lévites bénirent le peuple. Ils furent entendus ; leur prière parvint jusqu'à son séjour sacré, au ciel.
  '3':
  - type: text
    content: 'car ils ne pouvaient la célébrer en son temps, parce que les prêtres ne s''étaient pas consacrés en assez grand nombre et que le peuple n''était pas rassemblé à Jérusalem. '
  '4':
  - type: note
    content: Litt. la chose (ou la parole) est droite aux yeux du roi et aux yeux de toute l'assemblée.
  - type: text
    content: 'La chose ayant eu l''approbation du roi et de toute l''assemblée, '
  '5':
  - type: note
    content: 'résolurent  : litt. firent tenir (debout) une parole (ou une chose). –  diffuser une proclamation Esd 1.1n. –  elle n''était plus célébrée par la multitude  : autre traduction elle n''était plus guère célébrée. –  comme il est écrit  : cf. v. 18.'
  - type: text
    content: 'ils résolurent de diffuser une proclamation dans tout Israël, depuis Bersabée jusqu''à Dan, afin qu''on vienne à Jérusalem célébrer la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. Car elle n''était plus célébrée par la multitude comme il est écrit.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Les courriers  : litt. les coureurs , de même au v. 10 ; ailleurs (p. ex. 12.10s) le terme correspondant semble désigner des gardes du corps , cf. 1S 8.11 ; 22.17n  ; 1R 14.27.'
  - type: text
    content: 'Les courriers allèrent avec les lettres du roi et de ses princes dans tout Israël et Juda. Conformément au commandement du roi, ils dirent : Israélites, revenez au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Abraham, d''Isaac et d''Israël, afin qu''il revienne à vous qui êtes restés, qui avez échappé aux rois d''Assyrie. '
  '7':
  - type: note
    content: 'ont commis des sacrilèges  : autre traduction ont été infidèles. –  livrés à la dévastation  : cf. 2R 22.19 ; Mi 6.16.'
  - type: text
    content: 'Ne soyez pas comme vos pères et comme vos frères, qui ont commis des sacrilèges envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères, et qu''il a livrés à la dévastation, comme vous le voyez. '
  '8':
  - type: note
    content: 'engagez-vous envers le Seigneur  : litt. donnez la main à YHWH, cf. 2R 10.15n  ; Ez 17.18n  ; Esd 10.19n  ; 1Ch 29.24n.'
  - type: text
    content: 'A présent, ne soyez donc pas rétifs comme vos pères ; engagez-vous envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', venez à son sanctuaire qu''il a consacré pour toujours, et servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, pour que sa colère ardente se détourne de vous. '
  '9':
  - type: note
    content: 'Voir fils. –  clément…  : cf. Ex 34.6. –  il ne se détournera pas  : litt. il ne détournera pas sa face.'
  - type: text
    content: 'Si vous revenez au '
  - type: text
    content: Seigneur
  - type: text
    content: ', vos frères et vos fils obtiendront la compassion de ceux qui les ont emmenés captifs et ils reviendront dans ce pays ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, est clément et compatissant ; il ne se détournera pas de vous si vous revenez à lui.'
