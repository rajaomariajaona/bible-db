document_id: PSA.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme qui voit la mort de près
  - type: text
    content: ' '
  - type: note
    content: 'c''est toi que j''invoque ou c''est vers toi que je crie  ; cf. 3.5+. –  ne garde pas le silence  : autres traductions ne sois pas sourd ; ne reste pas sans rien faire  ; cf. 35.22 ; 39.13 ; 83.2 ; 109.1. –  ceux qui descendent… 22.30+.'
  - type: text
    content: De David.
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est toi que j''invoque !'
  - type: text
    content: Mon Rocher, ne garde pas le silence envers moi !
  - type: text
    content: Si tu te tais,
  - type: text
    content: je serai semblable à ceux qui descendent dans le gouffre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Entends (27.7+) mes supplications (litt. la voix de mes supplications , de même au v. 6 ; 86.6 ; 130.2) : cf. 31.23 ; 116.1n  ; 140.7. –  quand j''élève mes mains  : geste de la prière ; cf. 63.5 ; 88.10 ; 119.48 ; 134.2 ; 141.2 ; 1R 8.22 ; Es 1.15 ; Jr 4.31 ; Lm 1.17 ; 2.19 ; 3.41 ; Esd 9.5 ; Né 8.6 ; 1Tm 2.8. –  le Secret de ton sanctuaire  : litt. le Secret de ta sainteté ou ton saint Secret  ; le Secret (hébreu devir ) est un autre nom du Très-Saint ou Saint des saints , la partie la plus retirée et la plus sacrée du temple de Jérusalem (cf. 5.8n  ; 134.2 ; 1R 8.6-8).'
  - type: text
    content: Entends mes supplications, quand je t'appelle au secours,
  - type: text
    content: quand j'élève mes mains vers le Secret de ton sanctuaire.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'avec les méchants  : cf. 26.9+. –  malfaisants 5.6n. –  qui tiennent un discours (litt. qui parlent  ; cf. Est 10.3n) …  : cf. Ps 12.3+ ; 62.5 ; voir aussi Jr 6.14+ ; Ez 13.10 ; Pr 26.24s.'
  - type: text
    content: Ne m'emporte pas avec les méchants et les malfaisants,
  - type: text
    content: qui tiennent un discours de paix à leur prochain, alors que le mal est dans leur cœur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: selon leurs actes 62.13 ; 94.2 ; 137.8 ; cf. Ex 21.23-25 ; Jr 50.29 ; Pr 24.12 ; Lm 3.64 ; 2Co 11.15 ; 2Tm 4.14 ; 1P 1.17 ; Ap 20.12s ; 22.12. –  agissements 106.29,39 ; cf. 77.12n  ; Dt 28.20n  ; Jr 4.4n.
  - type: text
    content: Traite-les selon leurs actes, selon leurs agissements mauvais,
  - type: text
    content: traite-les selon l'œuvre de leurs mains ;
  - type: text
    content: rends-leur la pareille !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ils ne comprennent pas Es 5.12+. –  Qu''il les rase…  : cf. 52.7 ; Jr 1.10+ ; Jb 12.14.'
  - type: text
    content: 'Car ils ne comprennent pas les actes du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: l'œuvre de ses mains.
  - type: text
    content: Qu'il les rase et ne les rebâtisse pas !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Béni… 31.22 ; 41.14+ ; 124.6.
  - type: text
    content: 'Béni soit le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Car il entend mes supplications.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ma force (v. 8n) et mon bouclier (3.4+) ; cf. 18.2-3+ ; 27.1+ ; 33.20+. –  mon cœur exulte…  : LXX ma chair a refleuri, et de ma propre volonté je le confesserai  ; cf. Jb 33.25.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est ma force et mon bouclier :'
  - type: text
    content: en lui mon cœur se confie, et je suis secouru ;
  - type: text
    content: mon cœur exulte ;
  - type: text
    content: je le célèbre par mon chant.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'une force pour eux  : certains mss hébreux et des versions anciennes ont lu pour son peuple  ; cf. 29.11 ; 68.36 (où le même mot est traduit par puissance ). –  il est une forteresse… 27.1+ ; autre traduction possible  : la forteresse de salut (3.9), c''est l''homme qui a reçu son onction (2.2n) ; cf. 20.7,10 ; 1S 2.10 ; Ha 3.13n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est une force pour eux,'
  - type: text
    content: il est une forteresse pour le salut de l'homme qui a reçu son onction.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Sauve ton peuple Jr 31.7. –  leur berger 23.1+. –  leur soutien  : litt. porte-les  ; cf. Dt 32.11 ; Es 40.11.'
  - type: text
    content: Sauve ton peuple, bénis ton patrimoine !
  - type: text
    content: Sois leur berger et leur soutien pour toujours !
