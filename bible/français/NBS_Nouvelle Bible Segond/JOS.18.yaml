        - type: text
          text: 'Eleph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Bœuf
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : ces deux noms pourraient être lus comme un seul nom composé ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Tséla-Eleph, La Côte du Bœuf
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ?). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jébus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le Jébusite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la Jébusite, les Jébusites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; c''est le nom qui désigne habituellement les anciens habitants de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Guibéa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le texte écrit ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Guibéath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à moins qu''il ne faille lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Guibéa de Qiriath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : probablement la même localité que '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Guibéa de Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', au nord de Jérusalem (cf. 1S 11.4 ; 15.34). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qiriath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Qiriath-Baal ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains, s''appuyant sur plusieurs mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', lisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Qiriath-Yéarim
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 15.60. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quatorze villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: treize villes.
      marker-yv: yv-n
    - type: text
      text: 'Tséla, Eleph, Jébus (c''est-à-dire Jérusalem), Guibéa, Qiriath : quatorze villes, et les villages qui en dépendent. Voilà le patrimoine des fils de Benjamin, clan par clan.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: négligerez-vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la même forme verbale est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se relâcher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Pr 18.9 ; 24.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Dieu de vos pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 3.13,16 ; Dt 1.11+ ; 4.1.'
      marker-yv: yv-n
    - type: text
      text: 'Josué dit aux Israélites : Jusqu''à quand négligerez-vous d''entrer en possession du pays que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de vos pères, vous a donné ? '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Désignez parmi vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 1.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parcourir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils se lèveront et ils parcourront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 13.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en feront le relevé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'écriront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 6,8s.'
      marker-yv: yv-n
    - type: text
      text: 'Désignez parmi vous trois hommes par tribu, et je les enverrai parcourir le pays ; ils en feront le relevé suivant leur patrimoine et ils reviendront auprès de moi. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sud
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot désigne aussi la région du '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Néguev.
      marker-yv: yv-n
    - type: text
      text: 'Ils se le répartiront en sept parts ; Juda restera sur son territoire au sud, et la maison de Joseph restera sur son territoire au nord. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je jetterai pour vous le sort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8,10 (verbe synonyme) ; voir 14.2 ; le verbe qui apparaît ici peut signifier aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jeter un projectile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ex 19.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 20.36s ; 2R 13.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'devant le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. en présence du coffre de l''alliance (3.6+) qu''abrite la tente de la Rencontre.'
      marker-yv: yv-n
    - type: text
      text: 'Vous donc, vous ferez le relevé du pays en sept parts, et vous me l''apporterez ici. Je jetterai pour vous le sort ici même, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas de part pour les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: … leur patrimoine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son patrimoine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 13.14,33 ; Nb 18.20ss ; Dt 10.8s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gad, Ruben…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 13.8-31.'
      marker-yv: yv-n
    - type: text
      text: 'Il n''y aura pas de part pour les lévites parmi vous, car c''est le sacerdoce du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui est leur patrimoine. Gad, Ruben et la demi-tribu de Manassé ont reçu en Transjordanie, à l''est, le patrimoine que Moïse, serviteur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', leur a donné. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: partirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se levèrent et partirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je jetterai pour vous le sort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les hommes partirent. Josué avait donné cet ordre à ceux qui allaient faire le relevé du pays : Allez, parcourez le pays, faites-en le relevé et revenez auprès de moi ; puis je jetterai pour vous le sort devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', à Silo. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Les hommes allèrent, traversèrent le pays et firent sur un livre le relevé en sept parts, selon les villes ; puis ils revinrent auprès de Josué dans le camp, à Silo. '
