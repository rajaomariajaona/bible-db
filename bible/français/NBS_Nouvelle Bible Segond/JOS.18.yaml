        - type: text
          text: ') : à 10 km au nord de Jérusalem ; cf. 21.17 ; 1R 15.22 ; 2R 23.8 ; Esd 2.26 ; Né 11.31.'
      marker-yv: yv-n
    - type: text
      text: 'Kephar-Ammonaï, Ophni et Guéba : douze villes, et les villages qui en dépendent. '
