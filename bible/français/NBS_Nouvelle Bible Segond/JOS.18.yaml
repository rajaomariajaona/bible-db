document_id: JOS.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Tirage au sort pour les tribus restantes
  - type: text
    content: ' '
  - type: note
    content: 'Toute la communauté des Israélites  : même expression en 22.12 ; Ex 16.1 ; Lv 19.2 ; Nb 1.2 ; 8.9 ; 13.26 etc. –  se rassembla  : le verbe correspondant (aussi en 22.12) évoque habituellement l’ assemblée cultuelle (cf. 8.35). –  Silo  : à environ 40 km au nord de Jérusalem, et 10 km au sud de Sichem. –  la tente de la Rencontre  : seulement ici et en 19.51 ; voir aussi Ex 25.22 ; 27.21n  ; 33.7 ; Dt 31.14. –  pays… soumis  : cf. Nb 32.22,29.'
  - type: text
    content: 'Toute la communauté des Israélites se rassembla à Silo ; c''est là qu''ils installèrent à demeure la tente de la Rencontre. Le pays était soumis devant eux. '
  '10':
  - type: note
    content: jeta pour eux le sort v. 6n.
  - type: text
    content: 'Josué jeta pour eux le sort à Silo, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il fit là le partage du pays entre les Israélites, d''après leur répartition.'
  - type: heading
    content: Le territoire de Benjamin
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'lot  : le terme est traduit par sort dans les v. précédents, cf. 14.2n. –  fut tiré  : litt. monta . –  le territoire…  : les frontières de Benjamin sont celles qui ont été décrites en 15.5-9 ; 16.1-3.'
  - type: text
    content: 'Le lot de la tribu des fils de Benjamin fut tiré, clan par clan ; le territoire de leur lot se trouvait entre les fils de Juda et les fils de Joseph. '
  '12':
  - type: note
    content: 'sur le flanc  : litt. à l''épaule  ; cf. 15.8,10s.'
  - type: text
    content: 'Du côté du nord, leur frontière partait du Jourdain. La frontière montait sur le flanc de Jéricho au nord, s''élevait dans la montagne vers l''ouest pour déboucher sur le désert de Beth-Aven. '
  '13':
  - type: text
    content: 'La frontière passait de là à Louz, sur le flanc sud de Louz (c''est-à-dire Beth-El) ; puis la frontière descendait à Atroth-Addar, sur la montagne qui est au sud de Beth-Horôn-le-Bas. '
  '14':
  - type: text
    content: 'Du côté ouest, la frontière s''incurvait et tournait du côté de la mer vers le sud, depuis la montagne qui est en face de Beth-Horôn au sud, et débouchait sur Qiriath-Baal (c''est-à-dire Qiriath-Yéarim), ville des fils de Juda. Tel est le côté ouest. '
  '15':
  - type: note
    content: 'limite  : le même terme est traduit par extrémité au v. 16.'
  - type: text
    content: 'Le côté sud commençait à la limite de Qiriath-Yéarim. La frontière aboutissait à l''ouest, elle aboutissait à la source des eaux de Nephtoah. '
  '16':
  - type: text
    content: 'La frontière descendait à l''extrémité de la montagne qui est en face de la vallée du Fils de Hinnom, dans la vallée des Rephaïtes, au nord. Elle descendait par la vallée de Hinnom, sur le flanc des Jébusites, au sud, et descendait jusqu''à Eïn-Roguel. '
  '17':
  - type: note
    content: Gueliloth 15.7n.
  - type: text
    content: 'Elle s''incurvait au nord et aboutissait à Eïn-Shémesh, puis à Gueliloth, qui est en face de la montée d''Adoummim, et elle descendait à la pierre de Bohân, fils de Ruben. '
  '18':
  - type: note
    content: 'de la montagne  : sous-entendu dans le texte. –  plaine aride  : hébreu ‘arava  ; cf. 8.14n. –  puis descendait…  : sur tous ces noms géographiques, cf. 15.6s.'
  - type: text
    content: 'Elle passait sur le flanc nord de la montagne, face à la plaine aride, puis descendait vers la plaine aride ; '
  '19':
  - type: text
    content: 'la frontière passait sur le flanc nord de Beth-Hogla ; puis la frontière aboutissait à la langue de la mer du Sel, au nord, vers l''embouchure du Jourdain, au sud. C''était la frontière sud. '
  '2':
  - type: note
    content: 'sept tribus  : cinq tribus sont déjà pourvues : Ruben, Gad, Manassé, Juda et Ephraïm. Cf. 13.8 ; 17.18.'
  - type: text
    content: 'Il restait sept tribus des Israélites qui n''avaient pas encore reçu leur part du patrimoine. '
  '20':
  - type: text
    content: Du côté est, le Jourdain formait la frontière. Voilà le patrimoine des fils de Benjamin, clan par clan, avec ses frontières tout autour.
  '21':
  - type: text
    content: 'Les villes de la tribu des fils de Benjamin, clan par clan, étaient : Jéricho, Beth-Hogla, Emeq-Qetsits, '
  '22':
  - type: note
    content: 'Beth-Araba 15.6n. –  Tsemaraïm (Les Deux Sommets) : dans la région montagneuse d''Ephraïm.'
  - type: text
    content: 'Beth-Araba, Tsemaraïm, Beth-El, '
  '23':
  - type: note
    content: 'Avvim (Les Ruines) rappelle le Aï (La Ruine), 7.2n. –  Para (La Vache) : à 12 km au nord-est de Jérusalem. –  Ophra ou Ephrôn (2Ch 13.19), à 8 km au nord de Beth-El ; cf. 1S 13.17.'
  - type: text
    content: 'Avvim, Para, Ophra, '
  '24':
  - type: note
    content: 'Ophni  : peut-être à 21 km au nord-est de Jérusalem. –  Guéba (Colline) : à 10 km au nord de Jérusalem ; cf. 21.17 ; 1R 15.22 ; 2R 23.8 ; Esd 2.26 ; Né 11.31.'
  - type: text
    content: 'Kephar-Ammonaï, Ophni et Guéba : douze villes, et les villages qui en dépendent. '
  '25':
  - type: note
    content: 'Gabaon 9.3n. –  Rama (La Hauteur, toujours avec l''article : hébreu ha-Rama) : probablement à 9 km au nord de Jérusalem. –  Bééroth 9.17n.'
  - type: text
    content: 'Gabaon, Rama, Bééroth, '
  '26':
  - type: note
    content: 'Mitspé  : à distinguer de son homonyme en 15.38. –  Kephira 9.17n. –  Motsa (La Sortie) : selon une tradition juive, à 8 km à l''ouest de Jérusalem.'
  - type: text
    content: 'Mitspé, Kephira, Motsa, '
  '27':
  - type: text
    content: 'Réqem, Yirpéel, Taréala, '
  '28':
  - type: note
    content: 'Tséla (Côte) / Eleph (Bœuf) : ces deux noms pourraient être lus comme un seul nom composé (Tséla-Eleph, La Côte du Bœuf  ?). –  Jébus  : litt. le Jébusite ou la Jébusite, les Jébusites  ; c''est le nom qui désigne habituellement les anciens habitants de Jérusalem. –  Guibéa (le texte écrit ici Guibéath, à moins qu''il ne faille lire Guibéa de Qiriath) : probablement la même localité que Guibéa de Saül, au nord de Jérusalem (cf. 1S 11.4 ; 15.34). –  Qiriath  : peut-être Qiriath-Baal ? Certains, s''appuyant sur plusieurs mss de LXX, lisent Qiriath-Yéarim  ; cf. 15.60. –  quatorze villes  : LXX treize villes.'
  - type: text
    content: 'Tséla, Eleph, Jébus (c''est-à-dire Jérusalem), Guibéa, Qiriath : quatorze villes, et les villages qui en dépendent. Voilà le patrimoine des fils de Benjamin, clan par clan.'
  '3':
  - type: note
    content: 'négligerez-vous  : la même forme verbale est traduite par se relâcher en Pr 18.9 ; 24.10. –  le Dieu de vos pères  : cf. Ex 3.13,16 ; Dt 1.11+ ; 4.1.'
  - type: text
    content: 'Josué dit aux Israélites : Jusqu''à quand négligerez-vous d''entrer en possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, vous a donné ? '
  '4':
  - type: note
    content: 'Désignez parmi vous  : cf. Dt 1.13. –  parcourir  : litt. ils se lèveront et ils parcourront, cf. Gn 13.17n. –  en feront le relevé  : litt. l''écriront, de même aux v. 6,8s.'
  - type: text
    content: 'Désignez parmi vous trois hommes par tribu, et je les enverrai parcourir le pays ; ils en feront le relevé suivant leur patrimoine et ils reviendront auprès de moi. '
  '5':
  - type: note
    content: 'sud  : le mot désigne aussi la région du Néguev.'
  - type: text
    content: 'Ils se le répartiront en sept parts ; Juda restera sur son territoire au sud, et la maison de Joseph restera sur son territoire au nord. '
  '6':
  - type: note
    content: 'Je jetterai pour vous le sort  : cf. v. 8,10 (verbe synonyme) ; voir 14.2 ; le verbe qui apparaît ici peut signifier aussi jeter un projectile, cf. Ex 19.13n  ; 1S 20.36s ; 2R 13.17. –  devant le Seigneur  : c.-à-d. en présence du coffre de l''alliance (3.6+) qu''abrite la tente de la Rencontre.'
  - type: text
    content: 'Vous donc, vous ferez le relevé du pays en sept parts, et vous me l''apporterez ici. Je jetterai pour vous le sort ici même, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu. '
  '7':
  - type: note
    content: 'pas de part pour les lévites… leur patrimoine  : litt. son patrimoine  ; cf. 13.14,33 ; Nb 18.20ss ; Dt 10.8s. –  Gad, Ruben…  : voir 13.8-31.'
  - type: text
    content: 'Il n''y aura pas de part pour les lévites parmi vous, car c''est le sacerdoce du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui est leur patrimoine. Gad, Ruben et la demi-tribu de Manassé ont reçu en Transjordanie, à l''est, le patrimoine que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur a donné. '
  '8':
  - type: note
    content: 'Les hommes  : cf. v. 4. –  partirent  : litt. se levèrent et partirent. –  je jetterai pour vous le sort v. 6n.'
  - type: text
    content: 'Les hommes partirent. Josué avait donné cet ordre à ceux qui allaient faire le relevé du pays : Allez, parcourez le pays, faites-en le relevé et revenez auprès de moi ; puis je jetterai pour vous le sort devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à Silo. '
  '9':
  - type: text
    content: 'Les hommes allèrent, traversèrent le pays et firent sur un livre le relevé en sept parts, selon les villes ; puis ils revinrent auprès de Josué dans le camp, à Silo. '
