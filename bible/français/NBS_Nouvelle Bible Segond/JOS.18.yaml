        - type: text
          text: fut tiré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: monta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le territoire…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : les frontières de Benjamin sont celles qui ont été décrites en 15.5-9 ; 16.1-3.'
      marker-yv: yv-n
    - type: text
      text: 'Le lot de la tribu des fils de Benjamin fut tiré, clan par clan ; le territoire de leur lot se trouvait entre les fils de Juda et les fils de Joseph. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur le flanc
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'épaule
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 15.8,10s.'
      marker-yv: yv-n
    - type: text
      text: 'Du côté du nord, leur frontière partait du Jourdain. La frontière montait sur le flanc de Jéricho au nord, s''élevait dans la montagne vers l''ouest pour déboucher sur le désert de Beth-Aven. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'La frontière passait de là à Louz, sur le flanc sud de Louz (c''est-à-dire Beth-El) ; puis la frontière descendait à Atroth-Addar, sur la montagne qui est au sud de Beth-Horôn-le-Bas. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Du côté ouest, la frontière s''incurvait et tournait du côté de la mer vers le sud, depuis la montagne qui est en face de Beth-Horôn au sud, et débouchait sur Qiriath-Baal (c''est-à-dire Qiriath-Yéarim), ville des fils de Juda. Tel est le côté ouest. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: limite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'extrémité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 16.
      marker-yv: yv-n
    - type: text
      text: 'Le côté sud commençait à la limite de Qiriath-Yéarim. La frontière aboutissait à l''ouest, elle aboutissait à la source des eaux de Nephtoah. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'La frontière descendait à l''extrémité de la montagne qui est en face de la vallée du Fils de Hinnom, dans la vallée des Rephaïtes, au nord. Elle descendait par la vallée de Hinnom, sur le flanc des Jébusites, au sud, et descendait jusqu''à Eïn-Roguel. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gueliloth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle s''incurvait au nord et aboutissait à Eïn-Shémesh, puis à Gueliloth, qui est en face de la montée d''Adoummim, et elle descendait à la pierre de Bohân, fils de Ruben. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la montagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plaine aride
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ‘arava
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 8.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puis descendait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sur tous ces noms géographiques, cf. 15.6s.'
      marker-yv: yv-n
    - type: text
      text: 'Elle passait sur le flanc nord de la montagne, face à la plaine aride, puis descendait vers la plaine aride ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'la frontière passait sur le flanc nord de Beth-Hogla ; puis la frontière aboutissait à la langue de la mer du Sel, au nord, vers l''embouchure du Jourdain, au sud. C''était la frontière sud. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sept tribus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cinq tribus sont déjà pourvues : Ruben, Gad, Manassé, Juda et Ephraïm. Cf. 13.8 ; 17.18.'
      marker-yv: yv-n
    - type: text
      text: 'Il restait sept tribus des Israélites qui n''avaient pas encore reçu leur part du patrimoine. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Du côté est, le Jourdain formait la frontière. Voilà le patrimoine des fils de Benjamin, clan par clan, avec ses frontières tout autour.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'Les villes de la tribu des fils de Benjamin, clan par clan, étaient : Jéricho, Beth-Hogla, Emeq-Qetsits, '
