    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans les v. précédents, cf. 14.2
        - type: usfm
