          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Les Deux Sommets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : dans la région montagneuse d''Ephraïm.'
      marker-yv: yv-n
    - type: text
      text: 'Beth-Araba, Tsemaraïm, Beth-El, '
