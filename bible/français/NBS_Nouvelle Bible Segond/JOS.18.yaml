      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Toute la communauté des Israélites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même expression en 22.12 ; Ex 16.1 ; Lv 19.2 ; Nb 1.2 ; 8.9 ; 13.26 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se rassembla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe correspondant (aussi en 22.12) évoque habituellement l’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'assemblée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cultuelle (cf. 8.35). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Silo
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à environ 40 km au nord de Jérusalem, et 10 km au sud de Sichem. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la tente de la Rencontre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : seulement ici et en 19.51 ; voir aussi Ex 25.22 ; 27.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 33.7 ; Dt 31.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pays… soumis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Nb 32.22,29.'
      marker-yv: yv-n
    - type: text
      text: 'Toute la communauté des Israélites se rassembla à Silo ; c''est là qu''ils installèrent à demeure la tente de la Rencontre. Le pays était soumis devant eux. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jeta pour eux le sort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Josué jeta pour eux le sort à Silo, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et il fit là le partage du pays entre les Israélites, d''après leur répartition.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le territoire de Benjamin
    marker-yv: yv-h
