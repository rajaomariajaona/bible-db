document_id: 2CH.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Asa en guerre contre Basha, roi d'Israël
  - type: heading
    content: 1R 15.16-22
  - type: text
    content: ' '
  - type: note
    content: 'La trente-sixième année…  : cf. 1R 16.8,10. –  bâtit 1R 15.17n.'
  - type: text
    content: La trente-sixième année du règne d'Asa, Basha, roi d'Israël, partit à l'attaque de Juda. Il bâtit Rama, pour barrer la route à Asa, roi de Juda.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'en prison  : litt. dans la maison des entraves , cf. Jr 20.2n,3 ; 29.6 (même mot hébreu). –  il était irrité  : cf. 26.19 ; 28.9 ( rage ) ; un terme apparenté est traduit par de mauvaise humeur en 1R 20.43 ; 21.4 ; voir aussi Pr 19.3n. –  écrasa ou maltraita  : cf. 1S 12.3s ; Am 4.1 (même terme hébreu).'
  - type: text
    content: Asa, contrarié, fit mettre le voyant en prison, parce qu'il était irrité contre lui à cause de cette affaire. En ce temps-là, Asa écrasa aussi d'autres personnes parmi le peuple.
  - type: heading
    content: Fin du règne d'Asa
  - type: heading
    content: 1R 15.23-24
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'L''histoire… 1R 11.41n  ; 15.23 tout le reste de l''histoire d''Asa… –  le début et la fin  : cf. 9.29+ ; absent de 1R 15.23, qui porte à la place toute sa vaillance et tout ce qu''il a fait, et les villes qu''il a bâties . –  le livre des rois de Juda et d''Israël  : cf. 25.26 ; 28.26 ; 32.32 ; voir aussi 20.34 ; 27.7 ; 35.27 ; 36.8 ; cf. 1R 14.19n  ; 15.23n.'
  - type: text
    content: 'L''histoire d''Asa, le début et la fin, cela est écrit dans le livre des rois de Juda et d''Israël. '
  '12':
  - type: note
    content: 'il ne chercha pas le Seigneur  : cf. 14.3+. –  consulta les médecins  : le texte met la maladie du roi en relation avec son impiété ; le recours aux médecins et aux guérisseurs n''est cependant pas interdit, mais le roi n''a pas profité de sa maladie pour se tourner vers le Seigneur.'
  - type: text
    content: 'La trente-neuvième année de son règne, Asa fut atteint d''une très grave maladie des jambes ; toutefois, même pendant sa maladie, il ne chercha pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mais consulta les médecins. '
  '13':
  - type: note
    content: se coucha avec ses pères 1R 1.21n.
  - type: text
    content: 'Asa se coucha avec ses pères ; il mourut la quarante et unième année de son règne. '
  '14':
  - type: note
    content: 'dans le tombeau  : litt. dans ses tombeaux  ; cf. 21.20 ; 28.27 ; 35.24. –  on fit un très grand feu pour lui  : probablement pour y brûler des parfums (Jr 34.5n  ; cf. 21.19) ; certains y voient cependant une incinération. Voir aussi Am 2.1.'
  - type: text
    content: On l'ensevelit dans le tombeau qu'il s'était creusé dans la Ville de David. On le coucha sur un lit qu'on avait garni d'essences odoriférantes et de parfums composés selon l'art du parfumeur, et on fit un très grand feu pour lui.
  '2':
  - type: text
    content: 'Asa sortit de l''argent et de l''or des trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de la maison du roi, et il fit dire à Ben-Hadad, roi d''Aram, qui habitait à Damas : '
  '3':
  - type: note
    content: 'de l''argent et de l''or  : 1R 15.19 ajoute en présent.'
  - type: text
    content: 'Il y a alliance entre moi et toi, entre mon père et ton père. Je t''envoie de l''argent et de l''or. Va, romps ton alliance avec Basha, roi d''Israël, afin qu''il s''éloigne de moi. '
  '4':
  - type: note
    content: 'ils mirent à mal  : cf. 1R 15.20n. –  Iyôn, Dan 1R 15.20n. –  Abel-Maïm  : cf. 1R 15.20 (Abel-Beth-Maaka).'
  - type: text
    content: 'Ben-Hadad écouta le roi Asa ; il envoya les chefs de ses soldats contre les villes d''Israël, et ils mirent à mal Iyôn, Dan, Abel-Maïm, et tous les entrepôts des villes de Nephtali. '
  '5':
  - type: note
    content: Rama v. 1n.
  - type: text
    content: 'Lorsque Basha l''apprit, il cessa de bâtir Rama et interrompit ses travaux. '
  '6':
  - type: note
    content: Rama v. 1n.
  - type: text
    content: Alors le roi Asa occupa tout Juda à emporter les pierres et le bois que Basha employait pour bâtir Rama ; il s'en servit pour bâtir Guéba et Mitspa.
  - type: heading
    content: Asa emprisonne le voyant Hanani
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Hanani, le voyant (cf. 1S 9.9+,11,18s,22) : comparer avec 19.2 ( visionnaire ) ; 20.34 ; 1R 16.1,7. –  tu t''es appuyé sur…  : cf. v. 8 ; 13.18+. –  l''armée du roi…  : un ms de LXX porte l''armée du roi d''Israël.'
  - type: text
    content: 'En ce temps-là, Hanani, le voyant, se rendit auprès d''Asa, roi de Juda, et lui dit : Parce que tu t''es appuyé sur le roi d''Aram et que tu ne t''es pas appuyé sur le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, l''armée du roi d''Aram t''a échappé. '
  '8':
  - type: note
    content: 'les Libyens  : cf. 12.3 ; 14.8-14. –  grande… en grand nombre  : cf. 14.8,10. –  des équipages  : autre traduction des attelages, cf. 12.3n.'
  - type: text
    content: 'Les Koushites et les Libyens ne formaient-ils pas une grande armée, avec des chars et des équipages en grand nombre ? Cependant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te les a livrés, parce que tu t''étais appuyé sur lui. '
  '9':
  - type: note
    content: 'Car le Seigneur parcourt…  : litt. car YHWH, ses yeux rôdent par toute la terre  ; même expression en Za 4.10. –  prêter main-forte à  : litt. se fortifier avec 1Ch 11.10n  ; cf. Dn 10.21n  ; la même forme verbale est aussi traduite par trouver la force de ou devenir fort en 2Ch 1.1 ; 15.8 ; 17.1 etc. –  cœur… entier  : cf. 19.9 ; 25.2 ; 1R 15.3+. –  Tu as agi stupidement  : cf. 1S 13.13 ; 2S 24.10/ /.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parcourt du regard toute la terre, pour prêter main-forte à ceux dont le cœur est tout entier à lui. Tu as agi stupidement dans cette affaire, car dès à présent tu auras des guerres.'
