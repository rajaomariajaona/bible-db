      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.29+ ; absent de 1R 15.23, qui porte à la place '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toute sa vaillance et tout ce qu'il a fait, et les villes qu'il a bâties
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le livre des rois de Juda et d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 25.26 ; 28.26 ; 32.32 ; voir aussi 20.34 ; 27.7 ; 35.27 ; 36.8 ; cf. 1R 14.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'L''histoire d''Asa, le début et la fin, cela est écrit dans le livre des rois de Juda et d''Israël. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il ne chercha pas le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consulta les médecins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte met la maladie du roi en relation avec son impiété ; le recours aux médecins et aux guérisseurs n''est cependant pas interdit, mais le roi n''a pas profité de sa maladie pour se tourner vers le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La trente-neuvième année de son règne, Asa fut atteint d''une très grave maladie des jambes ; toutefois, même pendant sa maladie, il ne chercha pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mais consulta les médecins. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se coucha avec ses pères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 1.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Asa se coucha avec ses pères ; il mourut la quarante et unième année de son règne. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le tombeau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans ses tombeaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 21.20 ; 28.27 ; 35.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on fit un très grand feu pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement pour y brûler des parfums (Jr 34.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 21.19) ; certains y voient cependant une incinération. Voir aussi Am 2.1.'
      marker-yv: yv-n
    - type: text
      text: On l'ensevelit dans le tombeau qu'il s'était creusé dans la Ville de David. On le coucha sur un lit qu'on avait garni d'essences odoriférantes et de parfums composés selon l'art du parfumeur, et on fit un très grand feu pour lui.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Asa sortit de l''argent et de l''or des trésors de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et de la maison du roi, et il fit dire à Ben-Hadad, roi d''Aram, qui habitait à Damas : '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'argent et de l'or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1R 15.19 ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en présent.
      marker-yv: yv-n
    - type: text
      text: 'Il y a alliance entre moi et toi, entre mon père et ton père. Je t''envoie de l''argent et de l''or. Va, romps ton alliance avec Basha, roi d''Israël, afin qu''il s''éloigne de moi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils mirent à mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 15.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Iyôn, Dan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 15.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abel-Maïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 15.20 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abel-Beth-Maaka
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Ben-Hadad écouta le roi Asa ; il envoya les chefs de ses soldats contre les villes d''Israël, et ils mirent à mal Iyôn, Dan, Abel-Maïm, et tous les entrepôts des villes de Nephtali. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rama '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Basha l''apprit, il cessa de bâtir Rama et interrompit ses travaux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rama '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Alors le roi Asa occupa tout Juda à emporter les pierres et le bois que Basha employait pour bâtir Rama ; il s'en servit pour bâtir Guéba et Mitspa.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Asa emprisonne le voyant Hanani
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hanani, le voyant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 1S 9.9+,11,18s,22) : comparer avec 19.2 ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: visionnaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; 20.34 ; 1R 16.1,7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu t'es appuyé sur…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 8 ; 13.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'armée du roi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'armée du roi d'Israël.
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, Hanani, le voyant, se rendit auprès d''Asa, roi de Juda, et lui dit : Parce que tu t''es appuyé sur le roi d''Aram et que tu ne t''es pas appuyé sur le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, l''armée du roi d''Aram t''a échappé. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Libyens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.3 ; 14.8-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: grande… en grand nombre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.8,10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des équipages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des attelages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les Koushites et les Libyens ne formaient-ils pas une grande armée, avec des chars et des équipages en grand nombre ? Cependant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' te les a livrés, parce que tu t''étais appuyé sur lui. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Car le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' parcourt…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car YHWH, ses yeux rôdent par toute la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression en Za 4.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prêter main-forte à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se fortifier avec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Ch 11.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Dn 10.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; la même forme verbale est aussi traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'trouver la force de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devenir fort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 2Ch 1.1 ; 15.8 ; 17.1 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: … entier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 19.9 ; 25.2 ; 1R 15.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu as agi stupidement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 13.13 ; 2S 24.10/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parcourt du regard toute la terre, pour prêter main-forte à ceux dont le cœur est tout entier à lui. Tu as agi stupidement dans cette affaire, car dès à présent tu auras des guerres.'
