      marker-yv: yv-n
    - type: text
      text: Asa, contrarié, fit mettre le voyant en prison, parce qu'il était irrité contre lui à cause de cette affaire. En ce temps-là, Asa écrasa aussi d'autres personnes parmi le peuple.
  - type: usfm
