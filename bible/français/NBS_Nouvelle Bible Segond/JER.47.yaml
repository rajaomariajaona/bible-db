document_id: JER.47,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sur les Philistins
  - type: text
    content: ' '
  - type: note
    content: Philistins / Gaza 25.20n  ; Jos 13.3 ; 1S 6.17.
  - type: text
    content: 'Voici la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui parvint à Jérémie, le prophète, au sujet des Philistins, avant que le pharaon mette à mal Gaza :'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Des eaux s''élèvent…  : cf. 46.7+,8 ; Es 28.2 ; 30.28 ; Na 1.8 ; Ps 124.4s. –  du nord 1.14n. –  impétueux (cf. Es 30.28n) et elles déferlent sur (autre traduction inondent ) traduisent deux formes du même verbe hébreu. –  le pays… 8.16n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Des eaux s'élèvent du nord,
  - type: text
    content: elles deviennent un torrent impétueux ;
  - type: text
    content: elles déferlent sur le pays et sur tout ce qui s'y trouve,
  - type: text
    content: sur la ville et sur tous ceux qui l'habitent.
  - type: text
    content: Les hommes crient,
  - type: text
    content: tous les habitants du pays hurlent
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sabots… roues  : cf. 4.13 ; 46.9 ; Jg 5.22 ; Es 5.28 ; Ez 26.10 ; Na 2.5 ; 3.2s. –  étalons 50.11 ; Gn 49.24n. –  grondement 10.22n. –  les pères ne se tournent pas vers les fils  : ou bien en attendant d''eux le secours, ou au contraire dans leur fuite, ils ne se retournent même pas vers leurs enfants pour les sauver . –  tous ont perdu courage  : litt. les mains se sont affaiblies 6.24+.'
  - type: text
    content: au tonnerre des sabots de ses étalons,
  - type: text
    content: au grondement de ses chars
  - type: text
    content: et au vacarme de ses roues ;
  - type: text
    content: les pères ne se tournent pas vers les fils,
  - type: text
    content: car tous ont perdu courage.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'il arrive, le jour Jl 1.15 ; 2.1 ; 3.4. –  toute la Philistie  : litt. tous les Philistins  ; cf. Ez 25.16 ; Jl 4.4. –  tout survivant qui puisse secourir  : le texte évoque peut-être la disparition des mercenaires philistins à la solde de la Phénicie, plus au nord sur la même côte méditerranéenne ( Tyr et Sidon  ; cf. 25.22 ; Es 23.1n) ; selon certains il s''agirait, à l''opposé, de retrancher à la Philistie tout secours possible de la part de Tyr et de Sidon. –  Kaphtor , lieu d''origine des Philistins, pourrait être la Crète ; cf. Gn 10.14n  ; Dt 2.23 ; Am 9.7.'
  - type: text
    content: Car il arrive, le jour
  - type: text
    content: de ravager toute la Philistie,
  - type: text
    content: de retrancher de Tyr et de Sidon
  - type: text
    content: tout survivant qui puisse secourir ;
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ravage la Philistie,'
  - type: text
    content: les restes de l'île de Kaphtor.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Gaza / Ashqelôn v. 1+ ; Am 1.7s. –  est tondue  : allusion à un rite de deuil (de même pour les incisions 16.6+) ; cf. 48.37 ; Es 3.24 ; Am 8.10. –  le reste de leur plaine  : LXX a lu le reste des Anaqim Nb 13.28 ; Dt 2.10s ; cf. Jos 11.22.'
  - type: text
    content: Gaza est tondue,
  - type: text
    content: Ashqelôn est réduite au silence,
  - type: text
    content: le reste de leur plaine aussi.
  - type: text
    content: Jusqu'à quand te feras-tu des incisions ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Malheur ! 48.2. –  Epée du Seigneur 12.12+ ; 46.10 ; 50.35-38. –  fais silence  : autre traduction calme-toi.'
  - type: text
    content: 'Malheur ! Epée du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: jusqu'où iras-tu, sans repos ?
  - type: text
    content: Rentre dans ton fourreau,
  - type: text
    content: sois tranquille et fais silence.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'te reposerais-tu  : versions anciennes se reposerait-elle ! –  qu''il la dirige  : litt. qu''il lui a donné rendez-vous.'
  - type: text
    content: – Comment te reposerais-tu ?
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui lui ordonne'
  - type: text
    content: d'aller vers Ashqelôn et vers la côte de la mer !
  - type: text
    content: C'est là qu'il la dirige !
