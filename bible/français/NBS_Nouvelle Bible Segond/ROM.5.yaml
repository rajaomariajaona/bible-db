  - type: text
    text: 'Mais il n''en est pas du don de la grâce comme de la faute ; car si, par la faute d''un seul, la multitude a connu la mort, à bien plus forte raison la grâce de Dieu et le don de grâce d''un seul être humain, Jésus-Christ, ont-ils abondé pour la multitude. '
