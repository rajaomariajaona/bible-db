document_id: ROM.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La paix avec Dieu
  - type: text
    content: ' '
  - type: note
    content: 'Etant donc (litt. ayant donc été ) justifiés 3.24+ss. –  en vertu de la foi  : autre traduction en vertu d''une foi . –  nous sommes en paix avec Dieu  : litt. nous avons la paix devant Dieu  ; de bons mss portent ayons la paix (c.-à-d. soyons en paix ou restons en paix ) ; cf. 1R 5.26 ; Es 32.17 ; 53.5 ; Lc 1.79 ; Jn 16.33 ; Ep 2.14-17 ; Col 3.15 ; 1Jn 3.21.'
  - type: text
    content: 'Etant donc justifiés en vertu de la foi, nous sommes en paix avec Dieu par notre Seigneur Jésus-Christ ; '
  '10':
  - type: note
    content: 'ennemis 8.7. –  réconciliés 2Co 5.18s ; Ep 2.16 ; Col 1.20-22. – Voir Fils. –  par sa vie  : autre traduction dans sa vie cf. 4.25 ; 2Co 4.10s.'
  - type: text
    content: 'Car si, lorsque nous étions ennemis, nous avons été réconciliés avec Dieu au moyen de la mort de son Fils, à bien plus forte raison, une fois réconciliés, serons-nous sauvés par sa vie. '
  '11':
  - type: note
    content: nous mettons notre fierté en Dieu 2.17+ ; 5.2s ; 1Co 1.31.
  - type: text
    content: Bien plus, nous mettons notre fierté en Dieu par notre Seigneur Jésus-Christ, par qui maintenant nous avons obtenu la réconciliation.
  - type: heading
    content: Adam et Jésus-Christ
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'La phrase qui constitue ce v. reste en suspens. L''idée sera reprise au v. 18 ; voir 6.23 ; Gn 2.17 ; 3.19 ; 1Co 15.21s,45 ; Ga 6.7-9 ; Jc 1.15 ; cf. Sagesse 2.24 : « Par la jalousie du diable la mort est entrée dans le monde. » 4 Esdras 3.21 : « C''est le cœur mauvais qu''il portait qui fit désobéir Adam le premier : il fut vaincu et toute sa descendance avec lui. » 2 Baruch 54.15 : « Si en effet Adam a péché le premier et a amené la mort sur tous ceux qui n''existaient pas en son temps, cependant, parmi ceux qui sont nés de lui, chacun a préparé pour lui-même le supplice à venir, ou bien choisi pour lui-même les gloires futures. » –  parce que  : le sens exact de la liaison avec ce qui précède est incertain ; on pourrait la rattacher plus précisément à la mort : mort en vue de laquelle, en rapport avec laquelle, à cause de laquelle tous ont péché  ; ou, avec Vg, au seul homme  : en lui, avec lui, à cause de lui tous ont péché  ; mais on peut aussi y voir une relation assez générale : parce que, d''ailleurs, d''autant que, de sorte que tous ont péché  ; cf. 3.23+.'
  - type: text
    content: 'C''est pourquoi, de même que par un seul homme le péché est entré dans le monde, et par le péché la mort, et qu''ainsi la mort est passée à tous les humains, parce que tous ont péché… '
  '13':
  - type: note
    content: 'loi / péché  : cf. 4.15+. –  mis en compte  : verbe apparenté à celui de 4.3n  ; il n''apparaît qu''ici et en Phm 18.'
  - type: text
    content: '– car, jusqu''à la loi, le péché était bien dans le monde, mais le péché n''est pas mis en compte quand il n''y a pas de loi. '
  '14':
  - type: note
    content: 'Cf. 11.32 ; Ga 3.22. –  par une transgression semblable…  : il faut sans doute comprendre en désobéissant, comme Adam, à un commandement clair, émanant expressément de Dieu  ; cf. Gn 2–3. –  la figure  : litt. le type  ; le même terme est traduit par modèle en 6.17 ; Ph 3.17+ ; Hé 8.5n  ; on le retrouve au sens d’exemple en 1Co 10.6 ; cf. Jn 20.25n  ; Ac 7.43n  ; voir aussi Rm 8.29 ; Col 1.15.'
  - type: text
    content: Pourtant la mort a régné depuis Adam jusqu'à Moïse, même sur ceux qui n'avaient pas péché par une transgression semblable à celle d'Adam, lequel est la figure de celui qui allait venir.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Ici et aux v. 16s Paul oppose Adam et le Christ par des arguments a fortiori (cf. v. 9s ; 11.12,24 ; 2Co 3.9,11). La logique de la formule à bien plus forte raison semble, en l''occurrence, s''appuyer sur un postulat qui n''est pas expressément formulé, à savoir que l''œuvre de Dieu (ou de la grâce) est plus puissante que celle du péché. –  don de la grâce 1.11n. –  faute 4.25 ; 11.11n. –  d''un seul  : litt. du seul  ; de même v. 17,19. –  la multitude  : cf. v. 19 ; 12.5n  ; Es 53.11s ; cf. 4 Esdras 7.118 : « O toi, Adam, qu''as-tu fait ? Car si tu as péché, ta chute n''a pas été la tienne seulement, mais aussi la nôtre, à nous, tes descendants. » –  d''un seul être humain…  : litt. du seul homme (ou être humain ) Jésus-Christ (cf. 1Tm 2.5).'
  - type: text
    content: 'Mais il n''en est pas du don de la grâce comme de la faute ; car si, par la faute d''un seul, la multitude a connu la mort, à bien plus forte raison la grâce de Dieu et le don de grâce d''un seul être humain, Jésus-Christ, ont-ils abondé pour la multitude. '
  '16':
  - type: note
    content: 'ce don  : le même terme est traduit par présent en Jc 1.17. –  du péché d''un seul homme  : litt. d''un seul ayant péché. –  le jugement…  : autre traduction le jugement tire de la faute d''un seul la condamnation tandis que le don gratuit tire de nombreuses fautes la pleine justice ou la justification  ; ce dernier terme (voir v. 18n) évoque ici le résultat de la justification, l''état ou la condition de l''être humain justifié.'
  - type: text
    content: 'Et il n''en va pas de ce don comme du péché d''un seul homme. En effet, le jugement, à partir d''un seul, aboutit à la condamnation, tandis que le don de la grâce, à partir d''une multitude de fautes, aboutit à la pleine justice. '
  '17':
  - type: note
    content: régneront-ils 2Tm 2.12 ; Ap 20.4-6.
  - type: text
    content: Car si, par la faute d'un seul, la mort a régné par lui seul, à bien plus forte raison ceux qui reçoivent l'abondance de la grâce et du don de la justice régneront-ils dans la vie par le seul Jésus-Christ.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Voir v. 12n. –  par une seule faute ou par la faute d''un seul  ; cf. 1Co 15.21s. –  accomplissement de la justice  : le mot grec correspondant est rendu par pleine justice au v. 16n, par juste décret en 1.32, par justes ordonnances en 2.26, et par justice requise en 8.4 ; le même mot est traduit par ordonnances en Lc 1.6 ; Hé 9.1,10 et par justice en Ap 15.4 ; 19.8. –  justification  : le terme ici employé (comme en 4.25) évoque davantage le processus que le résultat (cf. 5.16n). –  qui donne la vie  : litt. de vie.'
  - type: text
    content: 'Ainsi donc, comme par une seule faute la condamnation s''étend à tous les humains, de même, par un seul accomplissement de la justice, la justification qui donne la vie s''étend à tous les humains. '
  '19':
  - type: note
    content: 'la multitude v. 15+. –  rendue  : autre traduction constituée. –  obéissance Ph 2.8 ; Hé 5.8.'
  - type: text
    content: 'En effet, tout comme par la désobéissance d''un seul être humain la multitude a été rendue pécheresse, de même, par l''obéissance d''un seul, la multitude sera rendue juste. '
  '2':
  - type: note
    content: 'par la foi  : cette précision est absente de certains mss. –  accès Ep 2.18 ; 3.12n  ; cf. Jn 14.6 ; 1P 3.18. –  cette grâce…  : autre traduction cette grâce dans laquelle (ou par laquelle) nous sommes debout (ou nous tenons ferme) ; cf. 11.20n  ; 1Co 15.1 ; 1P 5.12. –  et que nous mettons  : autre traduction et nous mettons. –  fierté 2.17n. –  espérance / gloire  : cf. 8.17-30 ; Col 1.27 ; Tt 2.13.'
  - type: text
    content: 'c''est par son entremise que nous avons eu, par la foi, accès à cette grâce dans laquelle nous nous tenons, et que nous mettons notre fierté dans l''espérance de la gloire de Dieu. '
  '20':
  - type: note
    content: 'loi / faute 4.15+. –  est intervenue  : litt. s''est introduite, même verbe en Ga 2.4. –  foisonne  : autres traductions s''amplifie ; prolifère ; se multiplie  ; cf. 6.20 ; 2Co 4.15n  ; Ph 4.17 ; 1Th 3.12 ; 2Th 1.3 ; 2P 1.8. –  la grâce a surabondé 1Tm 1.14.'
  - type: text
    content: 'Or la loi est intervenue pour que la faute foisonne ; mais là où le péché a foisonné, la grâce a surabondé. '
  '21':
  - type: note
    content: 'dans la mort  : autres traductions par la mort ; avec la mort. –  la vie éternelle  : autre traduction possible une vie éternelle  ; 2.7+ ; cf. 6.23.'
  - type: text
    content: Afin que, tout comme le péché a régné dans la mort, de même la grâce règne par la justice, pour la vie éternelle, par Jésus-Christ, notre Seigneur.
  '3':
  - type: note
    content: fierté (v. 2) dans les détresses (sur le mot grec correspondant, cf. 2.9 ; 8.35 ; 12.12 ; Ps 37.39 ; 50.15 [LXX] ; Mt 24.9n,21/ / ; Jn 16.33 ; Ac 11.19 ; 14.22 ; 17.5s ; 2Co 1.4s ; Ph 4.14 ; 1Th 3.3 ; Ap 1.9 ; 7.14) ; cf. 2Co 4.17 ; 12.9s ; Jc 1.2-4 ; 1P 1.6s. –  endurance 2.7n.
  - type: text
    content: 'Bien plus, nous mettons notre fierté dans les détresses, sachant que la détresse produit l''endurance, '
  '4':
  - type: note
    content: 'fidélité éprouvée  : le terme grec ainsi traduit désigne la qualité de ce qui a passé une épreuve avec succès, de ce qui a fait ses preuves ; cf. 1.28n  ; 16.10 ; 2Co 2.9n  ; Ph 2.22 ; voir aussi 1P 1.7.'
  - type: text
    content: 'l''endurance une fidélité éprouvée, et une fidélité éprouvée l''espérance. '
  '5':
  - type: note
    content: 'l''espérance ne rend pas honteux  : cf. 9.33 ; 10.11 ; Ps 22.6 ; 25.3,20 ; Hé 6.18s. –  l''amour de Dieu 8.39. – Voir cœur. –  par l''Esprit saint…  : cf. 8.9-16 ; Ac 2.17+ ; Ga 4.6 ; Tt 3.5-7 ; 1Jn 4.12s.'
  - type: text
    content: Or l'espérance ne rend pas honteux, puisque l'amour de Dieu a été répandu dans notre cœur par l'Esprit saint qui nous a été donné.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sans force  : litt. faibles  ; dans d''autres contextes le mot signifie aussi malade . –  en son temps  : autre traduction au temps fixé . –  pour des impies 4.5 ; cf. Ga 1.4 ; Tt 2.14 ; 1P 3.18.'
  - type: text
    content: 'En effet, lorsque nous étions encore sans force, le Christ, en son temps, est mort pour des impies. '
  '7':
  - type: note
    content: 'pour un homme bon  : autre traduction pour une bonne cause.'
  - type: text
    content: 'A peine mourrait-on pour un juste ; peut-être quelqu''un aurait-il le courage de mourir pour un homme bon. '
  '8':
  - type: note
    content: met en évidence (3.5n) son amour 8.32 ; Jn 3.16 ; 15.13 ; Ga 2.20 ; Ep 5.2 ; 1Tm 2.6 ; Tt 3.4 ; 1Jn 3.16 ; 4.10. –  mort pour nous 14.15 ; 1Co 8.11 ; 1Th 5.10.
  - type: text
    content: 'Or voici comment Dieu, lui, met en évidence son amour pour nous : le Christ est mort pour nous alors que nous étions encore pécheurs. '
  '9':
  - type: note
    content: par son sang 3.25+. –  colère (de Dieu) 1.18+ ; 3.5+.
  - type: text
    content: 'A bien plus forte raison, maintenant que nous sommes justifiés par son sang, serons-nous donc sauvés de la colère par son entremise ! '
