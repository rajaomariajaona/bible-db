document_id: DEU.15,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Remise des dettes tous les sept ans
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la remise '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'des dettes : le terme hébreu vient du verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donner du répit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Ex 23.11 ; cf. Lv 25.1-7. Il peut évoquer l'acte de lâcher prise ou de céder, suggérant peut-être à l'origine la restitution d'un gage.
      marker-yv: yv-n
    - type: text
      text: 'Au bout de sept ans, tu feras la remise. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que ton cœur ne soit pas mauvais quand tu lui donneras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Co 9.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes entreprises
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'envoi de ta main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même en 23.21 ; 28.8,20.'
      marker-yv: yv-n
    - type: text
      text: 'Donne-lui, et que ton cœur ne soit pas mauvais quand tu lui donneras : à cause de cela, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te bénira dans tous tes travaux et dans toutes tes entreprises. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pauvres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 4+ ; Mt 26.11/ / ; Jn 12.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ouvrir ta main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à ton frère…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à ton frère, à ton pauvre et à ton déshérité dans ton pays.
      marker-yv: yv-n
    - type: text
      text: 'Il y aura toujours des pauvres dans le pays ; c''est pourquoi je te donne cet ordre : Tu devras ouvrir ta main à ton frère, le pauvre ou le déshérité qui est dans ton pays.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Libérer les esclaves hébreux
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hébreux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur ce terme, qui n''a pas forcément à l''origine un sens ethnique, voir Gn 10.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se vend à toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: t'est vendu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il te servira '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il sera ton esclave
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 15 ; Ex 21.2-6 ; Jr 34.8-16 ; voir aussi Jn 8.35.
      marker-yv: yv-n
    - type: text
      text: 'Si l''un de tes frères hébreux, homme ou femme, se vend à toi, il te servira six années ; mais la septième année, tu le renverras libre de chez toi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les mains vides
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 16.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et lorsque tu le renverras libre de chez toi, tu ne le renverras pas les mains vides ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu le couvriras de présents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu lui feras un collier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', la forme intensive du verbe suggérant probablement l''abondance.'
      marker-yv: yv-n
    - type: text
      text: 'tu le couvriras de présents pris sur ton petit bétail, sur ton aire, sur ton pressoir ; tu lui donneras des biens par lesquels le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''aura béni. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu as été esclave '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'libéré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu te souviendras que tu as été esclave en Egypte, et que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''a libéré ; c''est pourquoi je te donne aujourd''hui cet ordre. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 21.5s.
      marker-yv: yv-n
    - type: text
      text: 'Si toutefois ton esclave te dit : « Je ne veux pas sortir de chez toi », parce qu''il t''aime, toi et ta maison, et qu''il se trouve bien chez toi, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un poinçon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le poinçon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ta servante '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton esclave femme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 20.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'alors tu prendras un poinçon et tu lui perceras l''oreille contre le battant de la porte : il sera ton esclave pour toujours. Tu feras de même pour ta servante. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il ne sera pas dur pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce ne sera pas dur à tes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en fournissant un travail qui vaut '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sous-entendu dans le texte) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le double
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute en ajoutant à la valeur du travail fourni celle du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'salaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'que l''esclave aurait perçu s''il avait été un '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: salarié.
      marker-yv: yv-n
    - type: text
      text: 'Il ne sera pas dur pour toi de le renvoyer libre de chez toi, car il t''aura servi six ans, en fournissant un travail qui vaut le double du salaire d''un salarié ; et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te bénira dans tout ce que tu feras.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les premiers-nés consacrés à Dieu
    marker-yv: yv-h
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ex 13.1s,11-16.
      marker-yv: yv-n
    - type: text
      text: 'Tu consacreras au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, tout premier-né mâle qui naîtra dans ton gros bétail et ton petit bétail. Tu ne travailleras pas avec le premier-né de tes bovins et tu ne tondras pas le premier-né de ton petit bétail. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Voici en quoi consiste…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceci est la parole de la remise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout créancier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout maître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ba`al
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'un prêt de sa main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en fera remise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa main fera remise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. S''agissait-il d''une remise définitive de dette (cf. v. 9) ou seulement d''un répit accordé pendant la septième année (cf. v. 2) ? La question reste discutée. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ne pressera pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : par exemple en menaçant de le réduire en esclavage s''il est insolvable (v. 12).'
      marker-yv: yv-n
    - type: text
      text: 'Voici en quoi consiste la remise : tout créancier qui aura fait un prêt à son prochain en fera remise ; il ne pressera pas son prochain ou son frère quand on aura proclamé la remise pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu le mangeras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ta maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta maisonnée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au lieu… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.5+ ; cf. 14.23.
      marker-yv: yv-n
    - type: text
      text: 'Tu le mangeras année après année, toi et ta famille, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, au lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' choisira. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 21.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 22.20+. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'S''il a un défaut, s''il est boiteux ou aveugle, ou s''il a n''importe quel autre défaut grave, tu ne le sacrifieras pas au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.15+. – Voir '
        - type: usfm
          marker: bdit
          children:
          - type: usfm
            marker: w
            children:
            - type: text
              text: pur
          - type: text
            text: ', impur'
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu le mangeras dans tes villes ; l''impur comme le pur pourront en manger, comme si c''était de la gazelle ou du cerf. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.16+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Seulement, tu ne mangeras pas son sang ; tu le répandras sur la terre comme de l'eau.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''étranger '
      - type: usfm
        marker: ft
