document_id: DEU.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Remise des dettes tous les sept ans
  - type: text
    content: ' '
  - type: note
    content: 'la remise des dettes : le terme hébreu vient du verbe traduit par donner du répit en Ex 23.11 ; cf. Lv 25.1-7. Il peut évoquer l''acte de lâcher prise ou de céder, suggérant peut-être à l''origine la restitution d''un gage.'
  - type: text
    content: 'Au bout de sept ans, tu feras la remise. '
  '10':
  - type: note
    content: 'que ton cœur ne soit pas mauvais quand tu lui donneras  : cf. 2Co 9.7. –  tes entreprises  : litt. l''envoi de ta main  ; de même en 23.21 ; 28.8,20.'
  - type: text
    content: 'Donne-lui, et que ton cœur ne soit pas mauvais quand tu lui donneras : à cause de cela, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénira dans tous tes travaux et dans toutes tes entreprises. '
  '11':
  - type: note
    content: 'pauvres v. 4+ ; Mt 26.11/ / ; Jn 12.8. –  ouvrir ta main v. 8. –  à ton frère…  : litt. à ton frère, à ton pauvre et à ton déshérité dans ton pays.'
  - type: text
    content: 'Il y aura toujours des pauvres dans le pays ; c''est pourquoi je te donne cet ordre : Tu devras ouvrir ta main à ton frère, le pauvre ou le déshérité qui est dans ton pays.'
  - type: heading
    content: Libérer les esclaves hébreux
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'hébreux  : sur ce terme, qui n''a pas forcément à l''origine un sens ethnique, voir Gn 10.21n. –  se vend à toi ou t''est vendu . –  il te servira ou il sera ton esclave  ; cf. v. 15 ; Ex 21.2-6 ; Jr 34.8-16 ; voir aussi Jn 8.35.'
  - type: text
    content: 'Si l''un de tes frères hébreux, homme ou femme, se vend à toi, il te servira six années ; mais la septième année, tu le renverras libre de chez toi. '
  '13':
  - type: note
    content: 'les mains vides  : voir 16.16n.'
  - type: text
    content: 'Et lorsque tu le renverras libre de chez toi, tu ne le renverras pas les mains vides ; '
  '14':
  - type: note
    content: 'tu le couvriras de présents  : litt. tu lui feras un collier, la forme intensive du verbe suggérant probablement l''abondance.'
  - type: text
    content: 'tu le couvriras de présents pris sur ton petit bétail, sur ton aire, sur ton pressoir ; tu lui donneras des biens par lesquels le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura béni. '
  '15':
  - type: note
    content: tu as été esclave 5.15+. –  libéré 7.8n.
  - type: text
    content: 'Tu te souviendras que tu as été esclave en Egypte, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a libéré ; c''est pourquoi je te donne aujourd''hui cet ordre. '
  '16':
  - type: note
    content: Ex 21.5s.
  - type: text
    content: 'Si toutefois ton esclave te dit : « Je ne veux pas sortir de chez toi », parce qu''il t''aime, toi et ta maison, et qu''il se trouve bien chez toi, '
  '17':
  - type: note
    content: 'un poinçon  : litt. le poinçon. –  ta servante ou ton esclave femme  ; cf. Ex 20.10n  ; 21.7n.'
  - type: text
    content: 'alors tu prendras un poinçon et tu lui perceras l''oreille contre le battant de la porte : il sera ton esclave pour toujours. Tu feras de même pour ta servante. '
  '18':
  - type: note
    content: 'Il ne sera pas dur pour toi  : litt. ce ne sera pas dur à tes yeux. –  en fournissant un travail qui vaut (sous-entendu dans le texte) le double  : sans doute en ajoutant à la valeur du travail fourni celle du salaire que l''esclave aurait perçu s''il avait été un salarié.'
  - type: text
    content: 'Il ne sera pas dur pour toi de le renvoyer libre de chez toi, car il t''aura servi six ans, en fournissant un travail qui vaut le double du salaire d''un salarié ; et le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénira dans tout ce que tu feras.'
  - type: heading
    content: Les premiers-nés consacrés à Dieu
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 13.1s,11-16.
  - type: text
    content: 'Tu consacreras au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, tout premier-né mâle qui naîtra dans ton gros bétail et ton petit bétail. Tu ne travailleras pas avec le premier-né de tes bovins et tu ne tondras pas le premier-né de ton petit bétail. '
  '2':
  - type: note
    content: 'Voici en quoi consiste…  : litt. ceci est la parole de la remise. –  tout créancier  : litt. tout maître (hébreu ba`al) d''un prêt de sa main. –  en fera remise  : litt. sa main fera remise. S''agissait-il d''une remise définitive de dette (cf. v. 9) ou seulement d''un répit accordé pendant la septième année (cf. v. 2) ? La question reste discutée. –  il ne pressera pas  : par exemple en menaçant de le réduire en esclavage s''il est insolvable (v. 12).'
  - type: text
    content: 'Voici en quoi consiste la remise : tout créancier qui aura fait un prêt à son prochain en fera remise ; il ne pressera pas son prochain ou son frère quand on aura proclamé la remise pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: note
    content: 'Tu le mangeras 12.7+. –  ta famille  : litt. ta maison ou ta maisonnée. –  au lieu… 12.5+ ; cf. 14.23.'
  - type: text
    content: 'Tu le mangeras année après année, toi et ta famille, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' choisira. '
  '21':
  - type: note
    content: Lv 21.18n  ; 22.20+. – Voir sacrifices.
  - type: text
    content: 'S''il a un défaut, s''il est boiteux ou aveugle, ou s''il a n''importe quel autre défaut grave, tu ne le sacrifieras pas au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. '
  '22':
  - type: note
    content: 12.15+. – Voir pur, impur.
  - type: text
    content: 'Tu le mangeras dans tes villes ; l''impur comme le pur pourront en manger, comme si c''était de la gazelle ou du cerf. '
  '23':
  - type: note
    content: 12.16+. – Voir sang.
  - type: text
    content: Seulement, tu ne mangeras pas son sang ; tu le répandras sur la terre comme de l'eau.
  '3':
  - type: note
    content: 'l''étranger 14.21 ; 23.21. –  tu feras remise  : litt. tu feras faire remise (le même verbe est traduit par lâcher en Jr 17.4n) à ta main, cf. v. 1n,2n.'
  - type: text
    content: 'Tu pourras presser l''étranger ; mais tu feras remise de ce qui t''appartient chez ton frère. '
  '4':
  - type: note
    content: 'il ne devrait pas y avoir  : autre traduction il n''y aura pas  ; comparer avec v. 7,11 ; Ac 4.34. –  dans le pays… 3.20+.'
  - type: text
    content: 'D''ailleurs, il ne devrait pas y avoir de pauvre chez toi, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te bénira dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine, afin que tu en prennes possession, '
  '5':
  - type: note
    content: Cf. 28.1. –  écoutes 4.30+. –  en veillant… 5.1n. –  tout ce commandement 5.31+. –  institue 4.2n.
  - type: text
    content: 'pourvu seulement que tu écoutes le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en veillant à mettre en pratique tout ce commandement que j''institue pour toi aujourd''hui. '
  '6':
  - type: note
    content: tu prêteras sur gages 24.6,10 ; Ex 22.25+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénira, comme il te l''a dit ; tu prêteras sur gages à une multitude de nations, et toi, tu n''auras pas à emprunter sur gages ; tu domineras sur une multitude de nations, et elles ne domineront pas sur toi.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4+ ; Ex 22.21-26 ; Mt 5.42 ; 1Jn 3.17. –  tu ne t''entêteras pas  : selon le sens habituel de l''expression, litt. tu n''affermiras pas ton cœur , cf. 2.30+. Ici cependant une nuance affective n''est pas exclue  : tu ne seras pas insensible.'
  - type: text
    content: 'S''il y a chez toi un pauvre parmi tes frères, dans l''une de tes villes, dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne, tu ne t''entêteras pas et tu ne fermeras pas ta main à ton frère pauvre ; '
  '8':
  - type: note
    content: 'tu lui ouvriras ta main v. 11. –  de quoi pourvoir à ses besoins  : litt. assez pour son manque qui lui manque.'
  - type: text
    content: 'tu lui ouvriras ta main et tu lui prêteras sur gages de quoi pourvoir à ses besoins. '
  '9':
  - type: note
    content: 'de tenir un raisonnement (litt. qu''il y ait avec ton cœur une parole) sans morale  : voir 13.14n  ; Ps 101.3n. –  œil mauvais  : cf. Mt 6.23/ / ; 20.15. – Cf. Siracide 4.5s : « De l''indigent ne détourne pas ton regard, ne lui donne pas sujet de te maudire. Car s''il te maudit dans l''amertume de son âme, son créateur entendra sa prière. » –  un péché pour toi 23.22,23 ; 24.15.'
  - type: text
    content: 'Garde-toi de tenir un raisonnement sans morale, en te disant : « La septième année, l''année de la remise, approche ! », de regarder d''un œil mauvais ton frère pauvre et de ne rien lui donner. Il invoquerait le '
  - type: text
    content: Seigneur
  - type: text
    content: ' contre toi, et ce serait un péché pour toi. '
