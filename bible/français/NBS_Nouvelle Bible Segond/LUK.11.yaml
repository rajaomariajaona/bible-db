  - type: text
    text: 'La reine du Sud se réveillera, lors du jugement, avec les hommes de cette génération, et elle les condamnera, parce qu''elle est venue des extrémités de la terre pour entendre la sagesse de Salomon ; et pourtant il y a ici plus que Salomon. '
