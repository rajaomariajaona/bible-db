    - type: usfm
      marker: fq
      children:
      - type: text
        text: et l'on vous donnera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il vous sera donné '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de même dans la suite) ; cet emploi du passif sert souvent à évoquer l'action de Dieu sans le nommer.
    marker-yv: yv-n
  - type: text
    text: 'Eh bien, moi, je vous dis : Demandez, et l''on vous donnera ; cherchez, et vous trouverez ; frappez, et l''on vous ouvrira. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'on ouvrira '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon certains mss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on ouvre.
    marker-yv: yv-n
  - type: text
    text: 'Car quiconque demande reçoit, qui cherche trouve, et à qui frappe on ouvrira. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quel père… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 5+. – Certains mss ajoutent (avant le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: poisson
    - type: usfm
      marker: ft
      children:
      - type: text
        text: )
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '(si son fils demande) du pain, lui donnera une pierre ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Mt 7.9).
    marker-yv: yv-n
  - type: text
    text: 'Quel père parmi vous, si son fils lui demande un poisson, lui donnera un serpent au lieu d''un poisson ? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 10.19+.
    marker-yv: yv-n
  - type: text
    text: 'Ou bien, s''il demande un œuf, lui donnera-t-il un scorpion ? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: donner de bonnes choses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jc 1.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Père céleste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Père du ciel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''après certains mss, on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le Père donnera-t-il du ciel… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Esprit saint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'Esprit saint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 10.21 ; 24.49 ; Ac 1.4,7s ; Rm 8.15,26 ; comparer avec Mt 7.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui le lui demandent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui lui demandent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui le prient.
    marker-yv: yv-n
  - type: text
    text: Si donc vous, tout mauvais que vous êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison le Père céleste donnera-t-il l'Esprit saint à ceux qui le lui demandent !
- type: usfm
  marker: s1
  children:
