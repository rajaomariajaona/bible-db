        text: '  ; cf. 18.21 ; Dt 4.6 ; 28.13,15 ; Ac 7.53.'
    marker-yv: yv-n
  - type: text
    text: 'Mais il répondit : Heureux plutôt ceux qui entendent la parole de Dieu et qui l''observent !'
