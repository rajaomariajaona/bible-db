    - type: usfm
      marker: ft
      children:
      - type: text
        text: '79 : « Une femme dans la foule lui dit : “Heureux le ventre qui t''a porté et les seins qui t''ont nourri !” Il lui dit : “Heureux ceux qui ont entendu la parole du Père et l''ont gardée en vérité ! Car des jours viendront où vous direz : ‘Heureux le ventre qui n''a pas conçu, et les seins qui n''ont pas allaité !’” » (Cf. Lc 23.29.)'
    marker-yv: yv-n
  - type: text
    text: 'Tandis qu''il parlait ainsi, une femme éleva la voix du milieu de la foule et lui dit : Heureux le ventre qui t''a porté et les seins qui t''ont allaité ! '
  - type: usfm
