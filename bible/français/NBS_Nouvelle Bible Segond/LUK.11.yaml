        text: '39 : « Jésus a dit : “Les pharisiens et les scribes ont reçu les clés de la gnose (= connaissance) et ils les ont cachées. Eux, ils ne sont pas entrés, et à ceux qui voulaient entrer ils ne l''ont pas permis. Quant à vous, soyez prudents comme les serpents et simples comme les colombes.” » (Cf. Mt 10.16.)'
    marker-yv: yv-n
  - type: text
    text: Quel malheur pour vous, les spécialistes de la loi ! Vous avez enlevé la clef de la connaissance ; vous-mêmes n'êtes pas entrés, et ceux qui voulaient entrer, vous les en avez empêchés.
