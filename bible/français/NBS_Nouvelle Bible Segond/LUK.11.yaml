document_id: LUK.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et la prière
  - type: heading
    content: Mt 6.9-13
  - type: text
    content: ' '
  - type: note
    content: 'Il priait 3.21+ ; cf. 9.18. –  Seigneur 5.8 ; 7.13+. –  comme Jean…  : cf. 5.33.'
  - type: text
    content: 'Il priait un jour en un certain lieu. Lorsqu''il eut achevé, un de ses disciples lui dit : Seigneur, enseigne-nous à prier, comme Jean aussi l''a enseigné à ses disciples. '
  '10':
  - type: note
    content: on ouvrira ou, selon certains mss, on ouvre.
  - type: text
    content: 'Car quiconque demande reçoit, qui cherche trouve, et à qui frappe on ouvrira. '
  '11':
  - type: note
    content: 'Quel père… v. 5+. – Certains mss ajoutent (avant le poisson)  : (si son fils demande) du pain, lui donnera une pierre ? (cf. Mt 7.9).'
  - type: text
    content: 'Quel père parmi vous, si son fils lui demande un poisson, lui donnera un serpent au lieu d''un poisson ? '
  '12':
  - type: note
    content: Cf. 10.19+.
  - type: text
    content: 'Ou bien, s''il demande un œuf, lui donnera-t-il un scorpion ? '
  '13':
  - type: note
    content: 'donner de bonnes choses  : cf. Jc 1.17. –  le Père céleste  : litt. le Père du ciel  ; d''après certains mss, on pourrait aussi comprendre le Père donnera-t-il du ciel… –  l''Esprit saint  : autre traduction de l''Esprit saint  ; cf. 10.21 ; 24.49 ; Ac 1.4,7s ; Rm 8.15,26 ; comparer avec Mt 7.11. –  qui le lui demandent, litt. qui lui demandent, autre traduction qui le prient.'
  - type: text
    content: Si donc vous, tout mauvais que vous êtes, vous savez donner de bonnes choses à vos enfants, à combien plus forte raison le Père céleste donnera-t-il l'Esprit saint à ceux qui le lui demandent !
  - type: heading
    content: Jésus a-t-il partie liée avec les démons ?
  - type: heading
    content: Mt 12.22-30  ; Mc 3.22-27
  '14':
  - type: text
    content: ' '
  - type: note
    content: qui était (c.-à-d. qui rendait ) muet ou peut-être sourd-muet 1.22n  ; sur le démon comme cause de diverses maladies et infirmités, cf. 13.11,16 ; Mc 9.17ss. –  étonnées 1.63+.
  - type: text
    content: 'Il chassait un démon qui était muet. Lorsque le démon fut sorti, le muet parla, et les foules furent étonnées. '
  '15':
  - type: note
    content: 'quelques-uns…  : litt. quelques-uns d''entre eux  ; un ms porte quelques-uns parlèrent comme des hommes forts, en disant… –  Béelzéboul  : cf. v. 18 ; voir Mt 9.34n  ; Mc 3.22n.'
  - type: text
    content: 'Mais quelques-uns dirent : C''est par Béelzéboul, le prince des démons, qu''il chasse les démons ! '
  '16':
  - type: note
    content: épreuve 4.2+ ; 10.25n. –  signe… v. 29ss ; Mc 8.11/ /. –  du ciel, c.-à-d. de Dieu  ; 15.7,18,21 ; 20.4 ; cf. Dn 4.23n  ; Mt 21.25 ; Jn 3.27.
  - type: text
    content: 'Et d''autres, pour le mettre à l''épreuve, lui demandaient un signe venant du ciel. '
  '17':
  - type: note
    content: 'les maisons  : outre la construction, le terme peut aussi désigner la famille ou maisonnée  ; cf. 10.5 ; 19.9 ; Ac 16.15. –  les unes sur les autres ou les unes contre les autres (cf. v. 18).'
  - type: text
    content: 'Comme il connaissait leurs pensées, il leur dit : Tout royaume divisé contre lui-même va à sa ruine ; les maisons y tombent les unes sur les autres. '
  '18':
  - type: note
    content: 'le Satan  : cf. v. 15 ; 10.18+. Voir démon, diable, Satan. –  son royaume  : cf. 4.5s.'
  - type: text
    content: 'Si donc le Satan est divisé contre lui-même, comment son royaume tiendra-t-il, puisque vous dites que c''est par Béelzéboul que je chasse les démons ? '
  '19':
  - type: note
    content: 'vos fils  : autre traduction les vôtres  ; il s''agit d''exorcistes juifs, cf. Ac 19.13s.'
  - type: text
    content: 'Et si, moi, je chasse les démons par Béelzéboul, vos fils, par qui les chassent-ils ? C''est pourquoi ils seront eux-mêmes vos juges. '
  '2':
  - type: note
    content: 'Père 10.21+ ; 22.42 ; Mt 6.9n. – Voir nom. –  reconnu pour sacré ou saint, traduction traditionnelle sanctifié  ; cf. Mt 6.9+ ; Jn 12.28. –  que ton règne vienne  : certains mss ajoutent sur nous  ; Grégoire de Nysse, au IVe s., a lu que ton Esprit saint vienne sur nous et nous purifie.'
  - type: text
    content: 'Il leur dit : Quand vous priez, dites :'
  - type: text
    content: Père,
  - type: text
    content: que ton nom soit reconnu pour sacré,
  - type: text
    content: que ton règne vienne !
  '20':
  - type: note
    content: 'le doigt de Dieu Ex 8.15 ; 31.18 ; Dt 9.10 ; Ps 8.4n. –  que, moi, je chasse  : certains mss portent seulement que je chasse. –  le règne ou le royaume de Dieu…  : cf. 10.9,18 ; 17.21. –  est parvenu…  : autre traduction vous a atteints  ; même verbe Mt 12.28 ; Rm 9.31n  ; 2Co 10.14 ; Ph 3.16 ; 1Th 2.16 ; il a le sens de précéder en 1Th 4.15n.'
  - type: text
    content: 'Mais si c''est par le doigt de Dieu que, moi, je chasse les démons, c''est donc que le règne de Dieu est parvenu jusqu''à vous. '
  '21':
  - type: note
    content: 'sa propriété  : le terme grec signifie habituellement cour ou palais (Mt 26.3n), voire enclos (Jn 10.1,16). –  ses biens  : même terme 8.3 ; 12.15,33,44 ; 14.33 ; 16.1 ; 19.8 ; Ac 4.32. –  en sûreté  : litt. en paix  ; cf. 1.79+.'
  - type: text
    content: 'Lorsqu''un homme fort et bien armé garde sa propriété, ses biens sont en sûreté. '
  '22':
  - type: note
    content: 'Cf. Es 49.24s. –  un plus fort  : cf. 3.16 ; 10.19n  ; 1Jn 4.4. –  le bat  : litt. le vainc. –  il lui enlève…  : cf. Col 2.15. –  il peut…  : litt. il distribue ses dépouilles ou son butin  : cf. Es 53.12.'
  - type: text
    content: 'Mais si un plus fort que lui survient et le bat, il lui enlève toutes les armes auxquelles il se fiait, et il peut distribuer le butin qu''il lui a pris. '
  '23':
  - type: note
    content: Cf. 9.50. –  rassemble (ou recueille, 3.17) / disperse Mt 25.24ss ; Jn 11.52.
  - type: text
    content: Celui qui n'est pas avec moi est contre moi, et celui qui ne rassemble pas avec moi disperse.
  - type: heading
    content: Le retour de l'esprit impur
  - type: heading
    content: Mt 12.43-45
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'esprit impur (voir pur, impur) : cf. v. 14 ; 4.33. –  l''être humain ou l''homme (même terme v. 26). –  lieux arides  : cf. 8.29+.'
  - type: text
    content: 'Lorsque l''esprit impur est sorti de l''être humain, il passe par des lieux arides, cherche du repos et, comme il n''en trouve pas, il se dit : « Je vais retourner dans ma maison, celle d''où je suis sorti. » '
  '25':
  - type: text
    content: 'Quand il arrive, il la trouve balayée et ornée. '
  '26':
  - type: note
    content: 'sept autres esprits 8.2. –  la condition… Jn 5.14 ; 2P 2.20. Cf. Le Pasteur d''Hermas, Sim. IX,17,5 : « Après être entrés dans le même lieu et avoir formé un seul corps, certains d''entre eux se sont souillés et ils ont été rejetés du peuple des justes et ils sont redevenus tels qu''ils étaient auparavant et même plutôt pire. »'
  - type: text
    content: Alors il s'en va chercher sept autres esprits plus mauvais que lui ; ils entrent là et s'installent, et la condition dernière de cet homme-là est pire que la première.
  - type: heading
    content: Le vrai bonheur
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'éleva la voix 17.13 ; Ac 2.14 ; 14.11 ; 22.22. –  la foule v. 14. –  Heureux 6.20+ ; cf. 10.23 ; 23.29. –  le ventre…  : cf. 1.28,31,42,48 ; Gn 49.25 ; Evangile selon Thomas 79 : « Une femme dans la foule lui dit : “Heureux le ventre qui t''a porté et les seins qui t''ont nourri !” Il lui dit : “Heureux ceux qui ont entendu la parole du Père et l''ont gardée en vérité ! Car des jours viendront où vous direz : ‘Heureux le ventre qui n''a pas conçu, et les seins qui n''ont pas allaité !’” » (Cf. Lc 23.29.)'
  - type: text
    content: 'Tandis qu''il parlait ainsi, une femme éleva la voix du milieu de la foule et lui dit : Heureux le ventre qui t''a porté et les seins qui t''ont allaité ! '
  '28':
  - type: note
    content: 'Cf. 6.47 ; 8.15,21/ / ; Jc 1.22 ; Ap 1.3. –  plutôt  : le terme grec correspondant peut signifier que la parole de Jésus s''oppose à l''affirmation qui précède (Rm 9.20 ; 10.18 au contraire), ou bien qu''elle renchérit sur elle (Ph 3.8 en fait). Ici on pourrait comprendre que Jésus reprend à son compte l''exclamation de la femme, tout en la corrigeant (v. 26 ; cf. 1.28,42,45). –  qui entendent  : autre traduction qui écoutent. –  qui l''observent  : litt. qui la gardent, sans doute au sens de qui la mettent en pratique  ; cf. 18.21 ; Dt 4.6 ; 28.13,15 ; Ac 7.53.'
  - type: text
    content: 'Mais il répondit : Heureux plutôt ceux qui entendent la parole de Dieu et qui l''observent !'
  - type: heading
    content: Le signe de Jonas et le Fils de l'homme
  - type: heading
    content: Mt 12.38-42
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mc 8.12. –  les foules v. 14. –  Cette génération 7.31+. –  un signe v. 16 ; voir aussi v. 20 ; 7.22 ; Ac 2.22 ; 1Co 1.22 ; cf. Jg 6.17 ; Es 7.11. –  Jonas 2R 14.25 ; Jon 1–4 ; voir « Le “signe” de Jonas »♦.
  - type: text
    content: 'Comme les foules s''amassaient, il se mit à dire : Cette génération est une génération mauvaise : elle cherche un signe ; il ne lui sera pas donné d''autre signe que le signe de Jonas. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'chaque jour  : cf. 9.23 ; voir aussi Ex 16.4. –  notre pain pour ce jour  : autres traductions notre pain pour le lendemain (terme apparenté en Ac 7.26 le jour suivant  ; 16.11 ; 20.15 ; 21.18 ; 23.11), le pain dont nous avons besoin  ; cf. Ac 14.17 ; 17.25 ; voir Mt 6.11n.'
  - type: text
    content: Donne-nous, chaque jour, notre pain pour ce jour ;
  '30':
  - type: note
    content: Fils de l'homme 5.24+.
  - type: text
    content: 'En effet, de même que Jonas fut un signe pour les Ninivites, de même le Fils de l''homme en sera un pour cette génération. '
  '31':
  - type: note
    content: 'reine du Sud  : cf. 1R 10.1ss ; 2Ch 9.1ss. –  se réveillera ou se relèvera, cf. 1.69n  ; 6.8n  ; 7.14n  ; autre verbe au v. 32 (voir résurrection). –  lors du jugement 10.14. –  des extrémités de la terre  : cf. Ps 2.8 ; 22.28 ; 46.10 ; 59.14 ; 65.6. –  la sagesse (2.40+) de Salomon 1R 3.5ss ; 5.9s ; 10.23s. –  et pourtant…  : cf. 7.35. –  plus que…  : cf. 7.26s.'
  - type: text
    content: 'La reine du Sud se réveillera, lors du jugement, avec les hommes de cette génération, et elle les condamnera, parce qu''elle est venue des extrémités de la terre pour entendre la sagesse de Salomon ; et pourtant il y a ici plus que Salomon. '
  '32':
  - type: note
    content: ils ont changé radicalement ou ils se sont repentis, ils se sont convertis 3.3n  ; cf. Jon 3.
  - type: text
    content: Les hommes de Ninive se lèveront, lors du jugement, avec cette génération, et ils la condamneront, parce qu'ils ont changé radicalement à la proclamation de Jonas ; et pourtant il y a ici plus que Jonas.
  - type: heading
    content: La lampe du corps
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.16 ; Mt 5.15 ; Mc 4.21. –  ou sous le boisseau  : les termes correspondants sont absents de certains mss. –  on la met  : sous-entendu dans le texte. –  la lumière  : certains mss portent la clarté.'
  - type: text
    content: Personne n'allume une lampe pour la mettre dans une cachette ou sous le boisseau ; mais on la met sur le porte-lampe, afin que ceux qui entrent voient la lumière.
  - type: heading
    content: Mt 6.22-23
  '34':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ep 1.18. –  bon ou sincère, généreux , litt. simple  ; cf. Mt 6.22n,23n.
  - type: text
    content: 'Ton œil est la lampe du corps. Lorsque ton œil est bon, tout ton corps aussi est illuminé ; mais s''il est mauvais, ton corps aussi est dans les ténèbres. '
  '35':
  - type: text
    content: 'Prends donc garde que la lumière qui est en toi ne soit ténèbres. '
  '36':
  - type: note
    content: 'Cf. Es 42.6s ; 45.7 ; 59.9s ; Mi 7.8 ; Ps 18.29 ; 112.4 ; Jb 29.3 ; Pr 4.18s ; Jn 1.9 ; Evangile selon Thomas 24 : « Il y a de la lumière dans un homme de lumière, et il illumine le monde entier ; s''il n''illumine pas, c''est l''obscurité. » (Cf. Jn 1.38n.)'
  - type: text
    content: Si donc tout ton corps est illuminé, sans avoir aucune partie dans les ténèbres, il sera entièrement illuminé, comme lorsque la lampe t'illumine de son éclat.
  - type: heading
    content: Jésus accuse les pharisiens et les spécialistes de la loi
  - type: heading
    content: Mt 23.4-36
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'un pharisien…  : cf. 5.17+ ; 7.36 ; 14.1. –  déjeuner  : le terme peut désigner le petit-déjeuner ou, plus probablement ici, le repas de midi ; cf. Jn 21.12,15.'
  - type: text
    content: 'Tandis qu''il parlait, un pharisien l''invite à déjeuner chez lui. Il entra et se mit à table. '
  '38':
  - type: note
    content: 'Cf. Mc 7.1ss/ / ; voir aussi Gn 18.4 ; Jg 19.21 ; Mt 15.20. –  fait les ablutions rituelles  : dans d''autres contextes, le verbe correspondant est traduit par baptiser, recevoir le baptême.'
  - type: text
    content: 'Le pharisien vit avec étonnement qu''il n''avait pas fait les ablutions rituelles avant le déjeuner. '
  '39':
  - type: note
    content: 'Mt 23.25ns ; cf. Mc 12.40. –  le Seigneur 7.13+. –  à l''intérieur  : cf. 16.15.'
  - type: text
    content: 'Mais le Seigneur lui dit : Vous, les pharisiens, vous purifiez le dehors de la coupe et du plat, et à l''intérieur vous êtes pleins de rapacité et de méchanceté. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: pardonne et remettons sa dette (cf. 7.47ss) traduisent un même verbe grec ; on pourrait aussi traduire … nous pardonnons à quiconque nous offense  ; cf. 13.2,4n  ; Mt 6.12n  ; voir aussi péchés . –  ne nous fais pas entrer dans l'épreuve ou en tentation , 22.40,46 ; cf. 4.2+ ; 8.12s ; voir Mt 6.13n.
  - type: text
    content: pardonne-nous nos péchés,
  - type: text
    content: car nous aussi, nous remettons sa dette à quiconque nous doit quelque chose ;
  - type: text
    content: et ne nous fais pas entrer dans l'épreuve.
  '40':
  - type: note
    content: 'déraisonnables 12.20. – Cf. Evangile selon Thomas 89 : « Jésus a dit : “Pourquoi lavez-vous l''extérieur de la coupe ? Ne comprenez-vous pas que celui qui a fait l''intérieur est le même que celui qui a fait l''extérieur ?” »'
  - type: text
    content: 'Gens déraisonnables ! celui qui a fait le dehors n''a-t-il pas fait aussi le dedans ? '
  '41':
  - type: note
    content: 'par des actes de compassion ou en aumône. –  ce qui est dedans  : il faut vraisemblablement comprendre ce qui est dans la coupe et dans le plat (v. 39) ; autres traductions donnez en actes de compassion ce que vous avez ; faites vos dons de compassion du fond du cœur  ; cf. 6.30 ; 12.33+ ; 16.9 ; 18.22 ; 19.8 ; 21.1ss ; Ac 9.36 ; 10.2,4,31 ; 11.29 ; 24.17 ; voir aussi Es 58.7ss.'
  - type: text
    content: Donnez plutôt, par des actes de compassion, ce qui est dedans, et tout sera pur pour vous.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 23.23. –  quel malheur… 6.24+. –  dîme 18.12 ; Dt 14.22ss ; cf. 12.6ss ; 26.12ss ; Lv 27.30ss ; Nb 18.12,21ss ; Ml 3.8ss ; Né 10.37s ; 12.44 ; 13.5,12 ; 2Ch 31.5ss. –  rue  : herbacée sauvage ; des textes juifs postérieurs l''excluent de la dîme. –  justice  : le terme grec est habituellement traduit par jugement  ; on le retrouve dans un sens comparable en Mt 12.18 ; Jn 7.24 ( jugement ) ; Ac 8.33 ( droit ). –  l''amour de Dieu 10.27 ; Jn 5.42.'
  - type: text
    content: Mais quel malheur pour vous, les pharisiens ! Vous payez la dîme de la menthe, de la rue et de toutes les plantes potagères, et vous négligez la justice et l'amour de Dieu ! C'est cela qu'il fallait pratiquer, sans omettre le reste.
  '43':
  - type: text
    content: ' '
  - type: note
    content: 14.7 ; 20.46/ / ; Mt 23.6s.
  - type: text
    content: Quel malheur pour vous, les pharisiens ! Vous aimez avoir le premier siège dans les synagogues et être salués sur les places publiques !
  '44':
  - type: text
    content: ' '
  - type: note
    content: Mt 23.27s. –  sur lesquels on marche , se rendant ainsi rituellement impur (voir pur, impur), cf. Lv 5.3 ; 21.1ss,11 ; Nb 19.11-22 ; Mt 23.27n.
  - type: text
    content: Quel malheur pour vous ! Vous êtes comme les tombeaux que rien ne signale, et sur lesquels on marche sans le savoir !
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'spécialistes de la loi 7.30+. –  Maître  : au sens d’ enseignant (3.12n).'
  - type: text
    content: 'Un des spécialistes de la loi s''écria : Maître, en disant cela, tu nous outrages, nous aussi !'
  '46':
  - type: text
    content: ' '
  - type: note
    content: Mt 23.4 ; cf. 11.30 ; Ac 15.10.
  - type: text
    content: 'Il répondit : Quel malheur pour vous aussi, spécialistes de la loi ! Vous chargez les gens de charges difficiles à porter, et vous n''y touchez pas vous-mêmes d''un doigt !'
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 23.29ss. –  les tombeaux  : autre traduction les monuments commémoratifs . –  pères 1.55 ; 6.23,26 ; voir Ac 7.52.'
  - type: text
    content: 'Quel malheur pour vous ! Vous construisez les tombeaux des prophètes, alors que ce sont vos pères qui les ont tués ! '
  '48':
  - type: note
    content: 'témoins / approuvez  : autre traduction vous êtes donc témoins que vous approuvez  ; cf. Ac 8.1. –  vous construisez  : cf. 20.1ss.'
  - type: text
    content: 'Vous êtes donc témoins et vous approuvez les œuvres de vos pères, car eux, ils ont tué les prophètes, et vous, vous construisez ! '
  '49':
  - type: note
    content: 'Mt 23.34ss. –  la sagesse… v. 31 ; 7.35 ; cf. 1Co 1.24,30 ; 2.7 ; Col 2.3. Origène attribue à « l''évangile » une formule comparable : « La sagesse enverra ses enfants » (cf. Lc 7.35). –  Je leur enverrai des prophètes…  : cf. 4.24 ; 6.23 ; 13.33 ; Jr 7.25s ; Ap 18.24 ; Jubilés 1.12 : « Je leur enverrai des témoins pour témoigner, mais ils n''écouteront pas ; et même, ils tueront les témoins, ils persécuteront ceux qui recherchent la Loi… » –  des apôtres ou des envoyés, terme dérivé du verbe traduit ici par enverrai  ; cf. 6.13n  ; 13.34. –  ils en tueront… Ac 12.2ss.'
  - type: text
    content: 'C''est pourquoi la sagesse de Dieu a dit : Je leur enverrai des prophètes et des apôtres ; ils en tueront et en persécuteront, '
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 18.2-5. –  Qui d'entre vous… v. 11 ; 12.25 ; 14.5,28 ; 15.4 ; 17.7 ; Es 42.23 ; 50.10 ; Ag 2.3. –  au milieu de la nuit ou à minuit  ; cf. Mc 13.35 ; Ac 16.25 ; 20.7.
  - type: text
    content: 'Il leur dit encore : Qui d''entre vous aura un ami chez qui il se rendra au milieu de la nuit pour lui dire : « Mon ami, prête-moi trois pains, '
  '50':
  - type: note
    content: 'qu''il soit demandé compte…  : litt. que soit réclamé à cette génération (v. 29ss,51 ; 21.32) le sang…  ; cf. Gn 9.5 ; 42.22 ; 2S 4.11 ; Ez 3.18,20 ; 33.6,8 ; Ps 9.13 ; Mt 27.24s. –  la fondation du monde Mt 13.35 ; 25.34 ; Jn 17.24 ; Ep 1.4 ; Hé 4.3 ; 9.26 ; 1P 1.20 ; Ap 13.8 ; 17.8.'
  - type: text
    content: 'afin qu''il soit demandé compte à cette génération du sang de tous les prophètes qui a été répandu depuis la fondation du monde, '
  '51':
  - type: note
    content: 'le sang d''Abel Gn 4.8ss ; Hé 11.4n. –  Zacharie  : cf. 2Ch 24.20ss ; voir aussi Za 1.1 ; Mt 23.35n. –  fait périr  : le même verbe (aussi 13.33) est traduit par disparaître, faire disparaître en 13.5 ; 17.27ss ; 19.47 ; 20.16. –  la Maison, c.-à-d. le temple. –  je vous le dis 7.28 ; 12.5.'
  - type: text
    content: depuis le sang d'Abel jusqu'au sang de Zacharie, que l'on a fait périr entre l'autel et la Maison ; oui, je vous le dis, il en sera demandé compte à cette génération.
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 23.13n. –  enlevé  : certains témoins lisent caché . –  la clef de la connaissance  : cf. Pr 9.1. –  ceux qui voulaient entrer  : litt. ceux qui entraient . – Cf. Evangile selon Thomas 39 : « Jésus a dit : “Les pharisiens et les scribes ont reçu les clés de la gnose (= connaissance) et ils les ont cachées. Eux, ils ne sont pas entrés, et à ceux qui voulaient entrer ils ne l''ont pas permis. Quant à vous, soyez prudents comme les serpents et simples comme les colombes.” » (Cf. Mt 10.16.)'
  - type: text
    content: Quel malheur pour vous, les spécialistes de la loi ! Vous avez enlevé la clef de la connaissance ; vous-mêmes n'êtes pas entrés, et ceux qui voulaient entrer, vous les en avez empêchés.
  '53':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.11 ; 19.48 ; 20.19s ; 22.2. Pour les v. 53s certains mss portent  : Pendant qu''il leur disait cela devant tout le peuple, les pharisiens et les spécialistes de la loi se mirent à lui en vouloir terriblement ; ils débattirent avec lui sur beaucoup de sujets, cherchant une occasion pour le prendre (en défaut) et trouver de quoi l''accuser . –  scribes / pharisiens 5.21+.'
  - type: text
    content: 'Quand il fut sorti de là, les scribes et les pharisiens commencèrent à le presser violemment et à le faire parler sur beaucoup de sujets, '
  '54':
  - type: note
    content: 'Cf. 20.20. –  lui tendant des pièges  : le même verbe est traduit par préparer un guet-apens en Ac 23.21.'
  - type: text
    content: lui tendant des pièges, pour s'emparer de quelque parole qui sorte de sa bouche.
  '6':
  - type: text
    content: 'car un de mes amis est arrivé de voyage chez moi, et je n''ai rien à lui offrir. » '
  '7':
  - type: note
    content: 'lui répond  : autre traduction lui répondait. –  Cesse de m''importuner  : même tournure 18.5, également rendue par tracasser en Mt 26.10/ / ; Ga 6.17. –  mes enfants et moi…  : il faut se représenter une maison d''une seule pièce, où l''on dispose des matelas pour la nuit : il est impossible d''aller ouvrir sans réveiller toute la famille. –  des pains  : sous-entendu dans le texte.'
  - type: text
    content: 'Si, de l''intérieur, l''autre lui répond : « Cesse de m''importuner ; la porte est déjà fermée, mes enfants et moi nous sommes au lit, je ne peux me lever pour te donner des pains », '
  '8':
  - type: note
    content: 'je vous le dis  : cf. 7.14n  ; 14.24 ; 15.7,10 ; 18.8,14 ; 19.26 ; 23.43. –  il se lèvera…  : autre traduction parce qu''il est réveillé par son insistance effrontée, il finira par lui donner… ; se lever traduit deux verbes grecs partiellement synonymes, cf. 1.69n. Au lieu de à cause de son insistance effrontée, on a aussi compris à cause de sa (propre) honte, mais ce sens est moins probable.'
  - type: text
    content: – je vous le dis, même s'il ne se lève pas pour les lui donner parce qu'il est son ami, il se lèvera à cause de son insistance effrontée et il lui donnera tout ce dont il a besoin.
  - type: heading
    content: Mt 7.7-11
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Eh bien, moi, je vous dis…  : cf. 16.9 ; voir aussi 6.27 ; Mt 16.18 ; 21.24. –  et l''on vous donnera  : litt. il vous sera donné (de même dans la suite) ; cet emploi du passif sert souvent à évoquer l''action de Dieu sans le nommer.'
  - type: text
    content: 'Eh bien, moi, je vous dis : Demandez, et l''on vous donnera ; cherchez, et vous trouverez ; frappez, et l''on vous ouvrira. '
