    marker-yv: yv-n
  - type: text
    text: 'Il leur dit encore : Qui d''entre vous aura un ami chez qui il se rendra au milieu de la nuit pour lui dire : « Mon ami, prête-moi trois pains, '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'car un de mes amis est arrivé de voyage chez moi, et je n''ai rien à lui offrir. » '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui répond
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lui répondait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cesse de m'importuner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même tournure 18.5, également rendue par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tracasser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Mt 26.10/ / ; Ga 6.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mes enfants et moi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il faut se représenter une maison d''une seule pièce, où l''on dispose des matelas pour la nuit : il est impossible d''aller ouvrir sans réveiller toute la famille. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des pains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Si, de l''intérieur, l''autre lui répond : « Cesse de m''importuner ; la porte est déjà fermée, mes enfants et moi nous sommes au lit, je ne peux me lever pour te donner des pains », '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '11.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je vous le dis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 7.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 14.24 ; 15.7,10 ; 18.8,14 ; 19.26 ; 23.43. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il se lèvera…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'parce qu''il est réveillé par son insistance effrontée, il finira par lui donner… ; se lever '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: traduit deux verbes grecs partiellement synonymes, cf. 1.69
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Au lieu de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à cause de son insistance effrontée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', on a aussi compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à cause de sa (propre) honte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais ce sens est moins probable.'
    marker-yv: yv-n
  - type: text
    text: – je vous le dis, même s'il ne se lève pas pour les lui donner parce qu'il est son ami, il se lèvera à cause de son insistance effrontée et il lui donnera tout ce dont il a besoin.
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 7.7-11
  marker-yv: yv-h
