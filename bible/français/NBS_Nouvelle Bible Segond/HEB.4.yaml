document_id: HEB.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Voir crainte . –  promesse d''entrer 3.11 ; cf. Nb 14.31. –  ne semble  : autres traductions ne pense, ne se trouve  ; le verbe grec est ambigu. –  l''avoir manquée ou s''en être privé (même verbe en 12.15) ; autre traduction être venu trop tard.'
  - type: text
    content: 'Craignons donc, tant que subsiste la promesse d''entrer dans son repos, que l''un de vous ne semble l''avoir manquée. '
  '10':
  - type: note
    content: 'celui qui est entré  : cf. v. 14 ; 9.24 ; 10.11-13 ; Ap 14.13.'
  - type: text
    content: Car celui qui est entré dans son repos se repose aussi de ses œuvres, comme Dieu des siennes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: '3.18. –  manière  : le même mot est traduit par copie en 8.5 ; 9.23 ; autre traduction ne tombe en refusant d''obéir (v. 6+) de la même manière.'
  - type: text
    content: 'Empressons-nous donc d''entrer dans ce repos-là, pour que personne ne tombe de la même manière, en refusant d''obéir. '
  '12':
  - type: note
    content: 'vivante 1P 1.23s. –  agissante  : un terme apparenté est traduit par être à l''œuvre en 1Th 2.13. –  épée Es 49.2+ ; Ep 6.17. –  à deux tranchants Ap 1.16n. –  âme / esprit (Esprit  ?) : certains voient ici une allusion à une distinction naturel / spirituel ; voir cependant 6.19 ; 10.38s ; 12.3n  ; 13.17n  ; voir 1Co 2.14n  ; 15.44n-46 ; 1Th 5.23n. Quoi qu''il en soit, le sens général du passage (rien n''échappe à la puissance révélatrice de la parole de Dieu, cf. v. 13) ne fait pas de doute. –  elle est juge  : le terme grec, qui n''apparaît qu''ici dans le N.T., a donné notre mot critique  ; cf. Jn 12.48. –  du cœur Jr 17.10 ; 1Co 4.5.'
  - type: text
    content: 'Car la parole de Dieu est vivante, agissante, plus acérée qu''aucune épée à deux tranchants ; elle pénètre jusqu''à la division de l''âme et de l''esprit, des jointures et des moelles ; elle est juge des sentiments et des pensées du cœur. '
  '13':
  - type: note
    content: 'à son regard  : le mot grec traduit par parole au v. 12 étant du masculin, on peut aussi bien comprendre au regard de la parole que au regard de Dieu  ; de même, à la fin du v., on pourrait traduire aux yeux (ou au regard) de celle à qui nous devons rendre compte (litt. nous avons la parole  ; expressions analogues en Lc 16.2+ ; Rm 14.12) ; cf. 1 Hénoch 9.5 : « C''est toi (Dieu) qui as fait toutes choses et qui détiens toute autorité, tout est devant toi visible et découvert, tu vois tout et rien ne peut t''être caché. » –  offert  : litt. terrassé  ; le verbe grec est apparenté à un terme qui signifie cou ou nuque (et qui a donné notre mot trachée) ; certains l''interprètent ici dans le sens de pris à la gorge, c.-à-d. vaincu, à la merci, d''autres dans le sens d’ouvert, déployé.'
  - type: text
    content: 'Il n''est pas de création qui échappe à son regard : tout est mis à nu et offert aux yeux de celui à qui nous devons rendre compte.'
  - type: heading
    content: Jésus, grand prêtre compatissant
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'grand prêtre 2.17+. –  traversé les cieux 7.26 ; cf. 8.1 ; 9.24 ; 1R 8.27-39 ; Ps 8.2 ; 11.4 ; 113.4 ; voir aussi Ep 4.10. –  Jésus  : cf. v. 8n. –  le Fils (1.2n) de Dieu 6.6 ; 7.3 ; 10.29. –  ce que nous reconnaissons publiquement  : litt. (l''acte de) reconnaissance ou la confession 3.1n.'
  - type: text
    content: 'Puisque nous avons un grand prêtre qui a traversé les cieux, Jésus, le Fils de Dieu, restons attachés à ce que nous reconnaissons publiquement. '
  '15':
  - type: note
    content: 'insensible à  : litt. incapable de compatir à, de même 10.34 ; cf. 5.2 ; 1P 3.8. –  soumis… à des épreuves ou à des tentations 2.17-18+. –  sans péché 7.26 ; 9.14 ; Jn 8.46 ; 2Co 5.21 ; 1Jn 3.5 ; cf. Psaumes de Salomon 17.36 : « Pur de tout péché, il régnera sur un peuple immense. Il reprendra les princes et détruira les pécheurs par son verbe puissant. » –  en tous points semblables Rm 8.3+.'
  - type: text
    content: 'Car nous n''avons pas un grand prêtre insensible à nos faiblesses ; il a été soumis, sans péché, à des épreuves en tous points semblables. '
  '16':
  - type: note
    content: Approchons-nous 10.22 ; cf. 7.25 ; 11.6 ; 12.22. –  assurance 3.6+. – Voir grâce.
  - type: text
    content: Approchons-nous donc avec assurance du trône de la grâce, pour obtenir compassion et trouver grâce, en vue d'un secours opportun.
  '2':
  - type: note
    content: 'la bonne nouvelle ou l''Evangile v. 6. –  à eux Nb 13.30 ; 14.7-9 ; Dt 1.21,29. –  car ils…  : certains mss portent car elle (la parole) ne s''est pas unie à la foi chez ceux qui l''ont entendue, c.-à-d. ceux qui l''ont entendue ne l''ont pas reçue avec foi  ; cf. 3.12+ ; Rm 10.16.'
  - type: text
    content: 'Car la bonne nouvelle nous a été annoncée tout aussi bien qu''à eux. Mais la parole qu''ils ont entendue ne leur a servi de rien, car ils n''étaient pas unis par la foi à ceux qui l''ont entendue. '
  '3':
  - type: note
    content: '3.11n  ; Ps 95.11. –  il (Dieu ? David ?) ou elle (l''Ecriture ?) a dit  : de même v. 4. –  Ses œuvres  : litt. les œuvres.'
  - type: text
    content: 'En effet, nous qui sommes venus à la foi, nous entrons dans le repos dont il a dit :'
  - type: text
    content: 'J''ai donc juré dans ma colère :'
  - type: text
    content: En aucun cas ils n'entreront dans mon repos !
  - type: text
    content: 'Ses œuvres étaient cependant faites depuis la fondation du monde ; '
  '4':
  - type: note
    content: Et Dieu… Gn 2.2.
  - type: text
    content: 'en effet, il a dit quelque part, à propos du septième jour : '
  - type: text
    content: Et Dieu se reposa de toutes ses œuvres le septième jour
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'encore ou de nouveau  : cf. v. 7 ; 1.6n. –  En aucun cas… Ps 95.11.'
  - type: text
    content: 'Et encore dans ce passage : '
  - type: text
    content: En aucun cas ils n'entreront dans mon repos !
  - type: text
    content: ' '
  '6':
  - type: note
    content: '3.19. –  refus d''obéir  : cf. 3.18 ; même terme v. 11.'
  - type: text
    content: 'Ainsi, puisqu''il est réservé à certains d''y entrer, et que ceux qui avaient reçu les premiers cette bonne nouvelle n''y entrèrent pas, à cause de leur refus d''obéir, '
  '7':
  - type: note
    content: '3.7s. –  institue  : autres traductions arrête, détermine, cf. Ac 2.23n. –  par David  : autre traduction en David  ; l''expression pourrait signifier dans le psaume (le Ps 95 est attribué à David dans LXX ; cf. Rm 11.2n) ; cf. Hé 7.28n. –  comme il a été dit plus haut  : autre traduction possible comme il a été dit d''avance.'
  - type: text
    content: 'il institue encore un jour – « aujourd''hui » – en disant bien longtemps après, par David, comme il a été dit plus haut :'
  - type: text
    content: Aujourd'hui, si vous entendez sa voix,
  - type: text
    content: ne vous obstinez pas
  - type: text
    content: .
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Josué  : le nom est identique à celui de Jésus dans le texte grec (cf. v. 14) ; voir aussi Dt 31.7 ; Jos 21.44 ; 22.4 ; 23.1. –  un autre jour v. 7 ; 10.25.'
  - type: text
    content: 'En effet, si Josué leur avait donné le repos, il n''aurait pas, après, parlé d''un autre jour. '
  '9':
  - type: note
    content: 'un repos sabbatique  : autre traduction une observance sabbatique  ; le terme correspondant, dérivé du mot habituellement traduit par sabbat, n''apparaît qu''ici dans le N.T.'
  - type: text
    content: 'Il reste donc un repos sabbatique pour le peuple de Dieu. '
