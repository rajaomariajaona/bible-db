  - type: text
    text: 'Car la bonne nouvelle nous a été annoncée tout aussi bien qu''à eux. Mais la parole qu''ils ont entendue ne leur a servi de rien, car ils n''étaient pas unis par la foi à ceux qui l''ont entendue. '
