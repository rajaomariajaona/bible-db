document_id: PSA.87,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sion, vraie patrie de tous les peuples
  - type: text
    content: ' '
  - type: note
    content: 'Coré 42.1n. –  Chant 30.1+. –  Elle est fondée  : litt. sa (possesseur masculin) fondation (est) sur les montagnes sacrées (ou saintes  ; cf. 3.5+ ; 36.7), texte obscur ; cf. 24.2 ; 78.69 ; 89.12 ; 102.26 ; 104.5 ; Es 14.32 ; 28.16.'
  - type: text
    content: Des fils de Coré. Psaume. Chant.
  - type: text
    content: Elle est fondée sur les montagnes sacrées.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 132.13ss ; Ap 20.9. –  portes de Sion 9.15 ; 24.7ss. –  plus que… 78.67s. –  Jacob 14.7+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' aime les portes de Sion'
  - type: text
    content: plus que toutes les demeures de Jacob.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Voir gloire. –  ville de Dieu 48.2.
  - type: text
    content: Des choses glorieuses ont été dites sur toi,
  - type: text
    content: 'ville de Dieu ! '
  - type: text
    content: Pause.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'J''évoque  : autre traduction je rappelle  ; cf. Jr 4.16. –  Rahav  : ici ce nom peut désigner l''Egypte ; cf. 40.5n  ; 89.10-11n  ; Es 30.7n  ; Jb 26.12s. –  parmi ceux…  : autre traduction possible devant ceux qui me connaissent  ; cf. 9.11 ; 36.11 ; Es 19.21 ; Ez 28.19 ; Dn 11.32 ; Jn 17.3. –  Koush ou la Nubie  ; cf. Gn 2.13n.'
  - type: text
    content: J'évoque Rahav et Babylone
  - type: text
    content: parmi ceux qui me connaissent ;
  - type: text
    content: 'le pays des Philistins, Tyr, avec Koush :'
  - type: text
    content: c'est là qu'un tel est né.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Tous  : litt. homme et homme , tournure qui peut avoir le sens de chacun  ; LXX Sion, (tout) homme l''appellera Mère  ; cf. 2S 20.19 ; Es 51.1s ; Ga 4.26. –  Très-Haut  : cf. 46.5. –  qui l''affermit (Sion, le pronom complément étant au féminin) : cf. v. 1+ ; 102.17.'
  - type: text
    content: 'Mais de Sion il est dit : Tous y sont nés,'
  - type: text
    content: et c'est lui, le Très-Haut, qui l'affermit.
  '6':
  - type: text
    content: ' '
  - type: note
    content: en les inscrivant 69.29+ ; cf. Es 4.3 ; 56.5 ; Ez 13.9 ; Mt 18.18 ; Lc 10.20 ; voir aussi Ph 3.20.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' compte les peuples en les inscrivant :'
  - type: text
    content: 'c''est là qu''un tel est né. '
  - type: text
    content: Pause.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, diversement interprété par les versions anciennes. –  ceux qui dansent  : cf. 2S 6. –  s''écrient  : sous-entendu dans le texte. –  toutes mes sources…  : LXX tous ceux qui habitent en toi  ; cf. 46.5 ; Gn 2.10ss.'
  - type: text
    content: 'Ceux qui chantent comme ceux qui dansent s''écrient :'
  - type: text
    content: toutes mes sources sont en toi.
