        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 41.10 ; Jr 1.8 ; Mt 1.23.'
      marker-yv: yv-n
    - type: text
      text: 'Car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''a béni dans toute l''œuvre de tes mains, il a connu ta marche dans ce grand désert. Voilà quarante années que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, est avec toi : tu n''as manqué de rien.'
