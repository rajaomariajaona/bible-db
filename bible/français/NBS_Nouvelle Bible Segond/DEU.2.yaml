      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Nb 33.35s ; 1R 9.26 ; 2R 14.22 ; 16.6), sur le golfe d''Aqaba (mer Rouge), où débouche au sud le '
      - type: usfm
        marker: fq
