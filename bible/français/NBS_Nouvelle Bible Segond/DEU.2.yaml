        - type: text
          text: V. 28s.
      marker-yv: yv-n
    - type: text
      text: 'Vous vous procurerez auprès d''eux, à prix d''argent, la nourriture que vous mangerez ; vous leur achèterez à prix d''argent même l''eau que vous boirez. '
  '7':
