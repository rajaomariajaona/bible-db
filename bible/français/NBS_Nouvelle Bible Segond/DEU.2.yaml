        marker: fq
        children:
        - type: text
          text: Aroër
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à la frontière sud du royaume de Sihôn ; 3.12 ; 4.48 ; cf. Nb 32.34 ; Jos 12.2 ; 13.9,16,25 ; 2S 24.5 ; 2R 10.33 ; Jr 48.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la ville qui est dans l''oued '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: gorge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 26.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : certains situent cette ville en amont de l''Arnon, à un point où celui-cii ne serait encore qu''un '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: oued
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres la situent entre deux affluents de l''Arnon ; cf. Nb 21.30 ; Jos 12.2 ; 13.9,16.'
      marker-yv: yv-n
    - type: text
      text: 'Depuis Aroër, qui est sur la rive de l''oued Arnon, et la ville qui est dans l''oued, jusqu''au Galaad, il n''y a pas eu de ville trop forte pour nous : le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, nous a tout livré. '
  '37':
  - type: usfm
    marker: p
