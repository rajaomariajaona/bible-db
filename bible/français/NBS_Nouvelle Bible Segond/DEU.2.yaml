    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ac 7.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'provoquez '
      - type: usfm
        marker: ft
        children:
        - type: text
