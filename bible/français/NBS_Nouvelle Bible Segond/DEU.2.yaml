          - type: text
            text: Seigneur
        - type: text
          text: ' … t''avait ordonné (de ne pas approcher).'
      marker-yv: yv-n
    - type: text
      text: 'Mais tu ne t''es pas approché du pays des Ammonites, de tous les bords de l''oued Yabboq, ni des villes de la montagne – de tout ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
