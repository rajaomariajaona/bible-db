          text: 't''a '
        - type: usfm
          marker: w
          children:
          - type: text
            text: béni
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.29 ; 16.15 ; 24.19 ; cf. 30.9 ; Jb 1.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'est avec toi '
      - type: usfm
