document_id: DEU.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 1.1n,7n  ; Nb 14.25.
  - type: text
    content: 'Nous sommes repartis vers le désert, dans la direction de la mer des Joncs, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me l''avait dit ; nous avons contourné longtemps la région montagneuse de Séir.'
  - type: heading
    content: Traversée d'Edom, de Moab et d'Ammon
  '10':
  - type: note
    content: L'explication des v. 10-12 interrompt le discours principal, qui ne reprend qu'au v. 13 ; de même pour les v. 20-23. – Cf. 1.28+ ; Gn 14.5n.
  - type: text
    content: '– C''étaient les Emites qui habitaient là auparavant : un peuple grand, nombreux et de haute taille, comme les Anaqites. '
  '11':
  - type: note
    content: Rephaïtes v. 20s ; 3.11 ; cf. Gn 14.5n  ; 2S 21.15-22 ; Es 14.9n.
  - type: text
    content: 'Ils étaient considérés, eux aussi, comme des Rephaïtes, de même que les Anaqites ; les Moabites les appelaient Emites. '
  '12':
  - type: note
    content: 'Séir / Horites v. 19,22 ; Gn 14.6 ; 36.20. –  les détruisirent  : litt. les détruisirent de devant eux  ; même expression aux v. 21s. –  comme Israël l''a fait  : cf. v. 5 ; Am 9.7.'
  - type: text
    content: 'Séir était autrefois habité par les Horites ; les fils d''Esaü les dépossédèrent, les détruisirent et s''installèrent à leur place, comme Israël l''a fait dans le pays qu''il possède, celui que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui a donné. – '
  '13':
  - type: note
    content: 'le Zéred  : litt. l''oued Zéred, l''un des torrents qui coulent dans la vallée du Zéred (Nb 21.12n) pour se jeter à l''extrémité sud de la mer Morte.'
  - type: text
    content: 'Maintenant, passez l''oued Zéred. Nous avons alors passé le Zéred. '
  '14':
  - type: note
    content: 1.34-35+ ; cf. Jn 5.5.
  - type: text
    content: 'Nous avons marché, depuis Qadesh-Barnéa jusqu''au passage du Zéred, pendant trente-huit ans, jusqu''à ce que toute la génération des hommes de guerre ait disparu du camp, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le leur avait juré. '
  '15':
  - type: note
    content: 'éliminer  : autres traductions chasser ; frapper de panique  ; cf. 7.23 ; Ex 14.24 ; Jos 10.10 ; Jg 4.15 ; 1S 7.10.'
  - type: text
    content: 'La main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' a aussi été sur eux pour les éliminer du camp, jusqu''à ce qu''ils aient tout à fait disparu.'
  '16':
  - type: text
    content: 'Lorsque tous les hommes de guerre eurent disparu du peuple par la mort, '
  '17':
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : '
  '18':
  - type: text
    content: 'Tu passeras aujourd''hui la frontière de Moab, à Ar, '
  '19':
  - type: note
    content: 'tu te présenteras…  : autre traduction tu t''approcheras (cf. v. 37) des Ammonites (litt. des fils d''Ammon, cf. v. 9+).'
  - type: text
    content: 'et tu te présenteras devant les Ammonites. Ne les attaque pas et ne les provoque pas, car je ne te donnerai pas de possession au pays des Ammonites : c''est aux fils de Loth que je l''ai donné en possession. '
  '2':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : '
  '20':
  - type: note
    content: V. 10-11ns ; cf. Gn 14.5.
  - type: text
    content: '– Cette région aussi était considérée comme un pays de Rephaïtes : c''étaient des Rephaïtes qui habitaient là auparavant ; les Ammonites les appelaient Zamzoummites : '
  '21':
  - type: note
    content: 'Cf. 1.28. –  devant eux  : c.-à-d. devant les Ammonites  ; cf. v. 12n.'
  - type: text
    content: 'c''était un peuple grand, nombreux et de haute taille, comme les Anaqites. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les détruisit devant eux ; ils les dépossédèrent et s''installèrent à leur place. '
  '22':
  - type: text
    content: 'C''est aussi ce qu''il avait fait pour les fils d''Esaü qui habitent en Séir, quand il avait détruit les Horites devant eux ; ils les dépossédèrent et s''installèrent à leur place, jusqu''à ce jour. '
  '23':
  - type: note
    content: 'Avvites  : nom de peuple inconnu par ailleurs (aussi en Jos 13.3) ; le même nom désigne une ville de Benjamin en Jos 18.23, une population assyrienne en 2R 17.31 (cf. 17.24). –  Gaza, près de la côte méditerranéenne, à l''ouest de Juda. –  les Kaphtorites (c.-à-d. les Crétois) sont identifiés aux Philistins en Am 9.7 ; voir Gn 10.14n.'
  - type: text
    content: Quant aux Avvites, qui habitaient dans les villages jusqu'à Gaza, ce sont les Kaphtorites, sortis de Kaphtor, qui les détruisirent et s'installèrent à leur place.
  - type: heading
    content: Occupation du royaume de Sihôn
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'l''oued Arnon  : cf. v. 36 ; 3.8,12,16 ; 4.48 ; Jos 12.1s ; 13.9,16 ; voir aussi Nb 21.13n. –  Sihôn 1.4+. –  Dès maintenant  : la forme verbale correspondante est souvent traduite par commencer (à)  ; elle apparaît aussi aux v. 25 ( dès [ce jour] ), 31 (deux fois).'
  - type: text
    content: 'Partez et passez l''oued Arnon. Regarde, je t''ai livré Sihôn, roi de Heshbôn, l''Amorite, et son pays. Dès maintenant prends-en possession ; provoque-le à la guerre ! '
  '25':
  - type: note
    content: 'la frayeur, la crainte de toi  : litt. ta frayeur et ta crainte  ; cf. 11.25. –  sous tout le ciel (autre traduction sous tous les cieux) Ac 2.5. –  entendant parler Nb 14.15 ; Es 66.19 ; Ha 3.2 ; Jb 42.5.'
  - type: text
    content: Je vais donner dès ce jour la frayeur, la crainte de toi, aux peuples qui sont sous tout le ciel ; en entendant parler de toi, ils trembleront et seront saisis d'angoisse devant toi.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Qedémoth , au nord de l'Arnon ; Jos 13.18 ; 21.37 ; 1Ch 6.64.
  - type: text
    content: 'J''ai envoyé, du désert de Qedémoth, des messagers à Sihôn, roi de Heshbôn, avec des paroles de paix. Je lui ai fait dire : '
  '27':
  - type: note
    content: 'je ne ferai que suivre la route  : litt. sur la route, sur la route j''irai.'
  - type: text
    content: 'Je voudrais passer par ton pays ; je ne ferai que suivre la route, sans m''écarter ni à droite ni à gauche. '
  '28':
  - type: note
    content: 'V. 6. –  sans m''arrêter  : litt. avec mes pieds ou sur mes pieds.'
  - type: text
    content: 'Tu me fourniras à prix d''argent la nourriture que je mangerai, et tu me donneras à prix d''argent l''eau que je boirai ; je veux seulement passer, sans m''arrêter. '
  '29':
  - type: note
    content: 'V. 8,19 ; comparer avec 23.4s ; Nb 20.20s. –  Accorde-le-moi aussi  : sous-entendu dans le texte.'
  - type: text
    content: 'C''est ce que m''ont accordé les fils d''Esaü qui habitent en Séir, et les Moabites qui habitent à Ar. Accorde-le-moi aussi jusqu''à ce que j''aie passé le Jourdain pour entrer dans le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous donne. '
  '3':
  - type: text
    content: 'Vous avez assez contourné cette montagne. Repartez vers le nord. '
  '30':
  - type: note
    content: 'a fait en sorte…  : litt. a endurci son esprit et a affermi son cœur  ; la deuxième expression revient en 15.7 ; 2Ch 36.13 ; tournure équivalente en Ex 4.21n. –  voilà pourquoi il en est ainsi en ce jour  : litt. comme ce jour  ; autre traduction possible ce jour-là  ; cf. 4.20,38 ; 6.24 ; 8.18 ; 10.15 ; 29.27.'
  - type: text
    content: 'Mais Sihôn, roi de Heshbôn, n''a pas voulu nous laisser passer chez lui ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a fait en sorte qu''il s''obstine et qu''il s''entête, afin de te le livrer – voilà pourquoi il en est ainsi en ce jour.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'je livre…  : litt. j''ai commencé à donner (ou à placer ) devant toi…  ; cf. Gn 9.2n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : Regarde, je livre dès maintenant devant toi Sihôn et son pays. Dès maintenant prends possession de son pays. '
  '32':
  - type: note
    content: Nb 21.23+.
  - type: text
    content: 'Sihôn est sorti à notre rencontre pour le combat à Yahats, avec tout son peuple. '
  '33':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous l''a livré, et nous l''avons battu, lui, ses fils et tout son peuple. '
  '34':
  - type: note
    content: 'En ce temps-là  : cf. 1.9n. –  frappées d''anathème  : le terme hébreu correspondant, de la même racine sémitique que les mots arabes haram (désignant l''enceinte d''un sanctuaire) et harem (à l''origine : lieu défendu, réservé au maître), signifie ici l''extermination d''une population et la destruction totale (ailleurs partielle) de ses biens. Il s''agit d''un terme à connotation rituelle qui, dans d''autres contextes, peut évoquer une mise hors de l''usage commun par consécration à Dieu ou au temple  ; le mot français anathème vient du mot grec le plus souvent choisi comme équivalent par LXX  ; ici cependant, LXX a traduit le mot hébreu par un verbe qui signifie simplement détruire, exterminer  ; cf. v. 35 ; 3.6s ; 7.2,4-6,26 ; 13.16,18 ; 20.14-18 ; voir aussi Lv 27.21ss ; Nb 18.14 ; 21.2s ; Jos 6.17–7.15 ; 8.2 ; 11.20 ; 1S 15 ; Za 14.11n  ; Esd 10.8n  ; voir aussi bénédiction, malédiction. –  et les familles entières 1.39 ; Gn 34.29n.'
  - type: text
    content: 'En ce temps-là, nous avons pris toutes ses villes et nous les avons frappées d''anathème, les hommes, les femmes et les familles entières : nous n''avons laissé aucun survivant. '
  '35':
  - type: text
    content: 'Nous n''avons pillé que les bêtes et les biens des villes que nous avons prises. '
  '36':
  - type: note
    content: 'Aroër  : à la frontière sud du royaume de Sihôn ; 3.12 ; 4.48 ; cf. Nb 32.34 ; Jos 12.2 ; 13.9,16,25 ; 2S 24.5 ; 2R 10.33 ; Jr 48.19. –  la ville qui est dans l''oued (ou gorge  ; cf. Gn 26.17n) : certains situent cette ville en amont de l''Arnon, à un point où celui-cii ne serait encore qu''un oued  ; d''autres la situent entre deux affluents de l''Arnon ; cf. Nb 21.30 ; Jos 12.2 ; 13.9,16.'
  - type: text
    content: 'Depuis Aroër, qui est sur la rive de l''oued Arnon, et la ville qui est dans l''oued, jusqu''au Galaad, il n''y a pas eu de ville trop forte pour nous : le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous a tout livré. '
  '37':
  - type: note
    content: 'Cf. v. 19n. –  oued Yabboq Gn 32.23n. –  des villes de la montagne à l''est du Jourdain, en territoire ammonite. –  de tout…  : autre traduction de tout ce dont le Seigneur … t''avait ordonné (de ne pas approcher).'
  - type: text
    content: 'Mais tu ne t''es pas approché du pays des Ammonites, de tous les bords de l''oued Yabboq, ni des villes de la montagne – de tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, t''avait interdit.'
  '4':
  - type: note
    content: 23.8 ; cf. Nb 20.14-21. –  fils d'Esaü Gn 36.8s,20.
  - type: text
    content: 'Donne cet ordre au peuple : Vous allez passer près de la frontière de vos frères, les fils d''Esaü, qui habitent en Séir. Ils auront peur de vous ; mais soyez bien sur vos gardes. '
  '5':
  - type: note
    content: 'Cf. Ac 7.5. –  provoquez v. 9,19,24 ; sur le verbe correspondant, voir aussi 2R 14.10 ; Jr 50.24 ; Pr 15.18+ ; 28.4n  ; Dn 11.10n. –  de quoi poser un pied  : cf. 11.24 ; Jos 1.3.'
  - type: text
    content: 'Ne les provoquez pas, car je ne vous donnerai pas même dans leur pays de quoi poser un pied : c''est à Esaü que j''ai donné la région montagneuse de Séir en possession. '
  '6':
  - type: note
    content: V. 28s.
  - type: text
    content: 'Vous vous procurerez auprès d''eux, à prix d''argent, la nourriture que vous mangerez ; vous leur achèterez à prix d''argent même l''eau que vous boirez. '
  '7':
  - type: note
    content: t'a béni… 14.29 ; 16.15 ; 24.19 ; cf. 30.9 ; Jb 1.10. –  est avec toi 20.1 ; 31.8,23 ; Gn 26.3 ; 28.15 ; 39.2 ; Ex 3.12ss ; Jos 1.5 ; 3.7 ; Jg 6.12 ; 1S 16.18 ; 18.14 ; 2S 7.9 ; 1R 8.57 ; 2R 18.7 ; Es 7.14n  ; 41.10 ; Jr 1.8 ; Mt 1.23.
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a béni dans toute l''œuvre de tes mains, il a connu ta marche dans ce grand désert. Voilà quarante années que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, est avec toi : tu n''as manqué de rien.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Nous sommes passés…  : autre traduction nous avons quitté nos frères… et le chemin de la plaine aride… –  nos frères  : cf. Gn 25.24-26. –  Eilath et Etsiôn-Guéber (Nb 33.35s ; 1R 9.26 ; 2R 14.22 ; 16.6), sur le golfe d''Aqaba (mer Rouge), où débouche au sud le chemin de la plaine aride ou de la Araba (1.1n  ; cf. Jos 8.14n). –  nous sommes retournés…  : litt. nous nous sommes tournés et nous sommes passés 1.7+.'
  - type: text
    content: Nous sommes passés à distance de nos frères, les fils d'Esaü, qui habitent en Séir, à distance du chemin de la plaine aride, d'Eilath et d'Etsiôn-Guéber ; puis nous sommes retournés par le chemin du désert de Moab.
  '9':
  - type: text
    content: ' '
  - type: note
    content: fils de Loth v. 19 ; 23.4-7 ; Gn 19.30-38 ; Nb 21.10-20. –  Ar Nb 21.15,28 ; Es 15.1.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : N''attaque pas Moab, ne le provoque pas à la guerre, car je ne te donnerai pas de possession dans son pays : c''est aux fils de Loth que j''ai donné Ar en possession. '
