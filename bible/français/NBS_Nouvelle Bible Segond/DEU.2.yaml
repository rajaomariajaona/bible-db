      marker-yv: yv-n
    - type: text
      text: Nous sommes passés à distance de nos frères, les fils d'Esaü, qui habitent en Séir, à distance du chemin de la plaine aride, d'Eilath et d'Etsiôn-Guéber ; puis nous sommes retournés par le chemin du désert de Moab.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
