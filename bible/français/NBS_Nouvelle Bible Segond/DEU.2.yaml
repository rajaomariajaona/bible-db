      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.24 ; Jos 1.3.'
      marker-yv: yv-n
    - type: text
      text: 'Ne les provoquez pas, car je ne vous donnerai pas même dans leur pays de quoi poser un pied : c''est à Esaü que j''ai donné la région montagneuse de Séir en possession. '
