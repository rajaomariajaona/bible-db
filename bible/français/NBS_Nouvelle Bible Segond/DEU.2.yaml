      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a dit : Regarde, je livre dès maintenant devant toi Sihôn et son pays. Dès maintenant prends possession de son pays. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 21.23+.
      marker-yv: yv-n
    - type: text
      text: 'Sihôn est sorti à notre rencontre pour le combat à Yahats, avec tout son peuple. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, nous l''a livré, et nous l''avons battu, lui, ses fils et tout son peuple. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En ce temps-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: frappées d'anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant, de la même racine sémitique que les mots arabes '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'haram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(désignant l''enceinte d''un sanctuaire) et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'harem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(à l''origine : lieu défendu, réservé au maître), signifie ici l''extermination d''une population et la destruction totale (ailleurs partielle) de ses biens. Il s''agit d''un terme à connotation rituelle qui, dans d''autres contextes, peut évoquer une mise hors de l''usage commun par consécration à Dieu ou au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: '  ; le mot français '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'anathème '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'vient du mot grec le plus souvent choisi comme équivalent par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '  ; ici cependant, LXX a traduit le mot hébreu par un verbe qui signifie simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: détruire, exterminer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 35 ; 3.6s ; 7.2,4-6,26 ; 13.16,18 ; 20.14-18 ; voir aussi Lv 27.21ss ; Nb 18.14 ; 21.2s ; Jos 6.17–7.15 ; 8.2 ; 11.20 ; 1S 15 ; Za 14.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Esd 10.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et les familles entières '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.39 ; Gn 34.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, nous avons pris toutes ses villes et nous les avons frappées d''anathème, les hommes, les femmes et les familles entières : nous n''avons laissé aucun survivant. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Nous n''avons pillé que les bêtes et les biens des villes que nous avons prises. '
