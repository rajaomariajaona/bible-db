document_id: DEU.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 14.25.'
      marker-yv: yv-n
    - type: text
      text: 'Nous sommes repartis vers le désert, dans la direction de la mer des Joncs, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me l''avait dit ; nous avons contourné longtemps la région montagneuse de Séir.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Traversée d'Edom, de Moab et d'Ammon
    marker-yv: yv-h
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: L'explication des v. 10-12 interrompt le discours principal, qui ne reprend qu'au v. 13 ; de même pour les v. 20-23. – Cf. 1.28+ ; Gn 14.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: '– C''étaient les Emites qui habitaient là auparavant : un peuple grand, nombreux et de haute taille, comme les Anaqites. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rephaïtes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 20s ; 3.11 ; cf. Gn 14.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 21.15-22 ; Es 14.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils étaient considérés, eux aussi, comme des Rephaïtes, de même que les Anaqites ; les Moabites les appelaient Emites. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Séir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Horites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 19,22 ; Gn 14.6 ; 36.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les détruisirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les détruisirent de devant eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même expression aux v. 21s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme Israël l'a fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 5 ; Am 9.7.'
      marker-yv: yv-n
    - type: text
      text: 'Séir était autrefois habité par les Horites ; les fils d''Esaü les dépossédèrent, les détruisirent et s''installèrent à leur place, comme Israël l''a fait dans le pays qu''il possède, celui que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui a donné. – '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Zéred
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'oued Zéred
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', l''un des torrents qui coulent dans la vallée du Zéred (Nb 21.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) pour se jeter à l'extrémité sud de la mer Morte.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, passez l''oued Zéred. Nous avons alors passé le Zéred. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.34-35+ ; cf. Jn 5.5.
      marker-yv: yv-n
    - type: text
      text: 'Nous avons marché, depuis Qadesh-Barnéa jusqu''au passage du Zéred, pendant trente-huit ans, jusqu''à ce que toute la génération des hommes de guerre ait disparu du camp, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le leur avait juré. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: éliminer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chasser ; frapper de panique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 7.23 ; Ex 14.24 ; Jos 10.10 ; Jg 4.15 ; 1S 7.10.'
      marker-yv: yv-n
    - type: text
      text: 'La main du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a aussi été sur eux pour les éliminer du camp, jusqu''à ce qu''ils aient tout à fait disparu.'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque tous les hommes de guerre eurent disparu du peuple par la mort, '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a dit : '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tu passeras aujourd''hui la frontière de Moab, à Ar, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu te présenteras…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu t''approcheras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 37) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des Ammonites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des fils d'Ammon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 9+).'
      marker-yv: yv-n
    - type: text
      text: 'et tu te présenteras devant les Ammonites. Ne les attaque pas et ne les provoque pas, car je ne te donnerai pas de possession au pays des Ammonites : c''est aux fils de Loth que je l''ai donné en possession. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' m''a dit : '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 10-11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s ; cf. Gn 14.5.
      marker-yv: yv-n
    - type: text
      text: '– Cette région aussi était considérée comme un pays de Rephaïtes : c''étaient des Rephaïtes qui habitaient là auparavant ; les Ammonites les appelaient Zamzoummites : '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant les Ammonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'c''était un peuple grand, nombreux et de haute taille, comme les Anaqites. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' les détruisit devant eux ; ils les dépossédèrent et s''installèrent à leur place. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'C''est aussi ce qu''il avait fait pour les fils d''Esaü qui habitent en Séir, quand il avait détruit les Horites devant eux ; ils les dépossédèrent et s''installèrent à leur place, jusqu''à ce jour. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Avvites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : nom de peuple inconnu par ailleurs (aussi en Jos 13.3) ; le même nom désigne une ville de Benjamin en Jos 18.23, une population assyrienne en 2R 17.31 (cf. 17.24). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gaza
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', près de la côte méditerranéenne, à l''ouest de Juda. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Kaphtorites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les Crétois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) sont identifiés aux Philistins en Am 9.7 ; voir Gn 10.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quant aux Avvites, qui habitaient dans les villages jusqu'à Gaza, ce sont les Kaphtorites, sortis de Kaphtor, qui les détruisirent et s'installèrent à leur place.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Occupation du royaume de Sihôn
    marker-yv: yv-h
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'oued Arnon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 36 ; 3.8,12,16 ; 4.48 ; Jos 12.1s ; 13.9,16 ; voir aussi Nb 21.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sihôn '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dès maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la forme verbale correspondante est souvent traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: commencer (à)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; elle apparaît aussi aux v. 25 (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dès [ce jour]
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), 31 (deux fois).
      marker-yv: yv-n
    - type: text
      text: 'Partez et passez l''oued Arnon. Regarde, je t''ai livré Sihôn, roi de Heshbôn, l''Amorite, et son pays. Dès maintenant prends-en possession ; provoque-le à la guerre ! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la frayeur, la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' de toi'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta frayeur et ta crainte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 11.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sous tout le ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sous tous les cieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') Ac 2.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entendant parler '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Nb 14.15 ; Es 66.19 ; Ha 3.2 ; Jb 42.5.
      marker-yv: yv-n
    - type: text
      text: Je vais donner dès ce jour la frayeur, la crainte de toi, aux peuples qui sont sous tout le ciel ; en entendant parler de toi, ils trembleront et seront saisis d'angoisse devant toi.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qedémoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', au nord de l''Arnon ; Jos 13.18 ; 21.37 ; 1Ch 6.64.'
      marker-yv: yv-n
    - type: text
      text: 'J''ai envoyé, du désert de Qedémoth, des messagers à Sihôn, roi de Heshbôn, avec des paroles de paix. Je lui ai fait dire : '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je ne ferai que suivre la route
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la route, sur la route j'irai.
      marker-yv: yv-n
    - type: text
      text: 'Je voudrais passer par ton pays ; je ne ferai que suivre la route, sans m''écarter ni à droite ni à gauche. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans m'arrêter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avec mes pieds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur mes pieds.
      marker-yv: yv-n
    - type: text
      text: 'Tu me fourniras à prix d''argent la nourriture que je mangerai, et tu me donneras à prix d''argent l''eau que je boirai ; je veux seulement passer, sans m''arrêter. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 8,19 ; comparer avec 23.4s ; Nb 20.20s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Accorde-le-moi aussi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'C''est ce que m''ont accordé les fils d''Esaü qui habitent en Séir, et les Moabites qui habitent à Ar. Accorde-le-moi aussi jusqu''à ce que j''aie passé le Jourdain pour entrer dans le pays que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, nous donne. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Vous avez assez contourné cette montagne. Repartez vers le nord. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a fait en sorte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'a endurci son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ' et a affermi son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la deuxième expression revient en 15.7 ; 2Ch 36.13 ; tournure équivalente en Ex 4.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: voilà pourquoi il en est ainsi en ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce jour-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.20,38 ; 6.24 ; 8.18 ; 10.15 ; 29.27.'
      marker-yv: yv-n
    - type: text
      text: 'Mais Sihôn, roi de Heshbôn, n''a pas voulu nous laisser passer chez lui ; car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, a fait en sorte qu''il s''obstine et qu''il s''entête, afin de te le livrer – voilà pourquoi il en est ainsi en ce jour.'
  '31':
  - type: usfm
    marker: p
