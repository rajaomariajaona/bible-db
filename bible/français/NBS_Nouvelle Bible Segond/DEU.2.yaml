    - type: text
      text: 'Donne cet ordre au peuple : Vous allez passer près de la frontière de vos frères, les fils d''Esaü, qui habitent en Séir. Ils auront peur de vous ; mais soyez bien sur vos gardes. '
  '5':
  - type: usfm
