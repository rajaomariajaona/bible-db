document_id: PSA.55,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière d'un homme trahi
  - type: text
    content: ' '
  - type: note
    content: Cf. 54.1+.
  - type: text
    content: Du chef de chœur. Avec instruments à cordes. Poème. De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Supprime  : traduction conjecturale ; on pourrait aussi comprendre confonds  ; ou, en modifiant la vocalisation traditionnelle du texte hébreu, engloutis (52.6n). Certains modifient plus considérablement le début du v. dans le texte hébreu traditionnel pour le rattacher au v. 9  : (j''échapperais) à la tempête dévastatrice de leur gorge, au torrent de leurs langues  ; cf. Gn 11.7. –  la violence… Jr 6.7.'
  - type: text
    content: Supprime, Seigneur, divise leurs langues !
  - type: text
    content: Car je vois dans la ville la violence et les querelles ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 59.7. –  mal / oppression  : cf. 7.15+.'
  - type: text
    content: jour et nuit elles en font le tour sur les murailles ;
  - type: text
    content: le mal et l'oppression sont en son sein ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: ruine ou perfidie  ; cf. 5.10.
  - type: text
    content: en son sein il n'y a que ruine ;
  - type: text
    content: la violence et la tromperie ne s'éloignent pas de ses places.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Certains modifient le texte hébreu traditionnel, en partie d'après LXX, pour lire si seulement c'était mon ennemi qui m'outrageait (ou qui me déshonorait ) … si c'était celui qui me déteste…
  - type: text
    content: Car ce n'est pas un ennemi qui m'outrage,
  - type: text
    content: je le supporterais ;
  - type: text
    content: ce n'est pas celui qui me déteste qui s'élève contre moi,
  - type: text
    content: je pourrais me cacher de lui.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'comme moi  : litt. de mon rang  ; cf. 41.10 ; Jr 9.3. –  mon intime ou mon confident.'
  - type: text
    content: C'est toi, un homme comme moi,
  - type: text
    content: mon intime, toi que je connais bien !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'des secrets partagés  : autre traduction d''un même conseil secret (cf. 25.14+). –  avec la foule  : traduction conjecturale ; le terme hébreu correspondant évoque l''agitation, de sorte qu''on a aussi compris avec enthousiasme  ; cf. 42.4. Certains rattachent les mots correspondants à la malédiction du v. 16 et lisent, avec des modifications plus ou moins importantes du texte  : qu''ils s''en aillent en tremblant , ou en un instant.'
  - type: text
    content: Ensemble nous connaissions la douceur des secrets partagés,
  - type: text
    content: nous allions avec la foule à la maison de Dieu !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Que la mort les surprenne (litt. les trompe , même verbe en 89.23) : autre lecture traditionnelle désolations sur eux. –  qu''ils descendent…  : cf. 63.10 ; Nb 16.30,33 ; Ap 19.20. – Voir séjour des morts. –  le mal  : le terme hébreu correspondant est au pluriel ; on pourrait aussi comprendre les malheurs . –  les habite  : litt. dans leur séjour ou, peut-être, sur leur passage , si l''on rattache le terme correspondant à la racine qui évoque la situation de l''immigré (cf. Ex 12.48n) ; le même terme (ou un homonyme) est traduit par grange en Ag 2.19.'
  - type: text
    content: Que la mort les surprenne,
  - type: text
    content: qu'ils descendent vivants au séjour des morts !
  - type: text
    content: Car le mal les habite, il est en leur sein.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'j''invoque Dieu  : autre traduction je crie vers Dieu  ; cf. 3.5+.'
  - type: text
    content: Moi, j'invoque Dieu ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me sauvera.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le soir, le matin et à midi  : cf. Dn 6.11. –  je gémis  : autre traduction je m''agite  ; cf. 42.6n.'
  - type: text
    content: Le soir, le matin et à midi, je soupire et je gémis,
  - type: text
    content: et il m'a entendu.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Par la paix…  : autres traductions par la victoire… , ou il m''a libéré pour me mettre en paix. La suite est obscure dans le texte hébreu traditionnel. Certains le modifient pour lire car des archers s''approchent de moi… –  contre moi  : autre traduction avec moi. Certains, d''après Syr, modifient le texte pour lire ils sont en procès contre moi.'
  - type: text
    content: Par la paix il m'a libéré
  - type: text
    content: de la guerre qu'ils me faisaient,
  - type: text
    content: lorsqu'ils étaient en nombre contre moi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.2+ ; 54.3 ; 61.2. –  ne te dérobe pas  : litt. ne te cache pas  ; cf. 10.1.'
  - type: text
    content: O Dieu, prête l'oreille à ma prière,
  - type: text
    content: ne te dérobe pas à ma supplication !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Certains modifient le texte hébreu traditionnel pour lire Ismaël (= «  Dieu entendra  ») , Yalam et les habitants de l''Orient, tous ensemble, en qui il n''y a pas de changement… –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  entendra et leur répondra  : autres traductions les affligera, les humiliera. –  qui est installé  : litt. qui est assis (comme roi, ou comme juge) ; cf. 29.10. –  depuis le temps jadis 74.12.'
  - type: text
    content: Dieu entendra et leur répondra,
  - type: text
    content: 'lui qui est installé depuis le temps jadis. '
  - type: text
    content: Pause.
  - type: text
    content: Car il n'y a pas en eux de changement,
  - type: text
    content: ils ne craignent pas Dieu.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Il  : cf. v. 13-15. – Voir alliance.'
  - type: text
    content: Il porte les mains sur ceux qui étaient en paix avec lui,
  - type: text
    content: il profane son alliance ;
  '22':
  - type: text
    content: ' '
  - type: note
    content: '5.10+ ; 12.3+. –  des épées (sous-entendu dans le texte) dégainées  : cf. 52.4+ ; 57.5.'
  - type: text
    content: sa bouche est plus douce que la crème,
  - type: text
    content: mais la guerre est dans son cœur ;
  - type: text
    content: ses paroles sont plus onctueuses que l'huile,
  - type: text
    content: mais ce sont des épées dégainées.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Décharge-toi de ton fardeau  : traduction incertaine ; cf. 37.5 ; 1P 5.7. –  il ne laissera jamais…  : certains comprennent il ne laissera pas toujours le juste vaciller  ; cf. 66.9+ ; 112.6.'
  - type: text
    content: 'Décharge-toi de ton fardeau sur le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et il pourvoira à tous tes besoins ;
  - type: text
    content: il ne laissera jamais le juste vaciller.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'au fond de la fosse  : litt. dans le puits de la fosse. –  hommes sanguinaires (26.9n) et trompeurs 5.7+. –  pas la moitié de leurs jours 102.25. –  je mets ma confiance en toi 4.6+.'
  - type: text
    content: Et toi, ô Dieu, tu les feras descendre au fond de la fosse ;
  - type: text
    content: les hommes sanguinaires et trompeurs
  - type: text
    content: n'atteindront pas la moitié de leurs jours ;
  - type: text
    content: moi, je mets ma confiance en toi.
  '3':
  - type: text
    content: Prête attention à moi, réponds-moi !
  - type: text
    content: J'erre çà et là en soupirant, je m'agite
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'l''oppression  : le terme hébreu correspondant n''apparaît qu''ici et sa traduction est incertaine. –  le mal  : cf. v. 11.'
  - type: text
    content: à force d'entendre l'ennemi,
  - type: text
    content: en face de l'oppression du méchant ;
  - type: text
    content: car ils déversent sur moi le mal,
  - type: text
    content: et avec colère ils m'accusent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Mon cœur… 109.22. –  les terreurs de la mort  : cf. 18.5n  ; 116.3.'
  - type: text
    content: Mon cœur tremble au dedans de moi,
  - type: text
    content: et les terreurs de la mort tombent sur moi ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 48.7 ; Jb 4.14. –  frisson 2.11+ ; Esd 10.9n. –  s''empare de moi  : litt. me recouvre.'
  - type: text
    content: crainte et frisson m'envahissent,
  - type: text
    content: un frémissement s'empare de moi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: des ailes ou des ailerons  ; cf. Es 40.31n  ; Ez 17.3n  ; voir aussi Ps 11.1 ; 139.9 ; Es 16.2 ; Jr 4.25 ; 9.9.
  - type: text
    content: 'Je dis : Ah ! si j''avais des ailes comme la colombe !'
  - type: text
    content: Je m'envolerais et je trouverais une demeure.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 9.1. –  séjourner  : litt. passer la nuit ou loger  ; cf. 25.13n.'
  - type: text
    content: Je fuirais bien loin,
  - type: text
    content: 'j''irais séjourner au désert. '
  - type: text
    content: Pause.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je serais plus rapide…  : autre traduction j''échapperais au vent impétueux, à la tempête.'
  - type: text
    content: Je m'échapperais bien vite,
  - type: text
    content: je serais plus rapide que le vent impétueux, que la tempête.
