document_id: EST.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Haman est obligé d'honorer Mardochée
  - type: text
    content: ' '
  - type: note
    content: '2.21-23n. –  livre du souvenir  : cf. Ml 3.16.'
  - type: text
    content: 'Cette nuit-là, comme le sommeil le fuyait, le roi se fit apporter le livre du souvenir, les chroniques, et on en fit la lecture au roi. '
  '10':
  - type: note
    content: 'porte du Roi 2.19n. –  ne néglige  : litt. ne fais tomber  ; cf. v. 13n.'
  - type: text
    content: 'Le roi répondit à Haman : Vite, prends le vêtement et le cheval comme tu l''as si bien dit, et agis ainsi en faveur du Juif Mardochée, celui qui est assis à la porte du Roi ; ne néglige aucun détail de tout ce que tu as dit. '
  '11':
  - type: note
    content: Cf. Pr 14.19.
  - type: text
    content: 'Haman prit le vêtement et le cheval ; il revêtit Mardochée, le promena à cheval sur la place de la ville et proclama devant lui : « Voilà ce qu''on fait à un homme que le roi désire honorer ! »'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'se précipitait chez lui…  : cf. 1R 21.4. –  la tête voilée  : cf. 7.8 ; 2S 15.30 ; Jr 14.3s.'
  - type: text
    content: 'Puis Mardochée retourna à la porte du Roi, tandis que Haman se précipitait chez lui, en deuil et la tête voilée. '
  '13':
  - type: note
    content: 'sa femme / ses amis 5.10. –  conseillers  : litt. sages, il s''agit sans doute de devins. –  S''il est juif  : litt. s''il est de la descendance des Juifs. –  déchoir / Ta déchéance sera totale  : litt. tomber / tu tomberas pour de bon  ; cf. v. 10n  ; 3.7n  ; 7.8n  ; 8.3,17n  ; 9.24 ; voir aussi Dn 4.34 ; Lc 1.51.'
  - type: text
    content: 'Haman raconta à Zéresh, sa femme, et à tous ses amis ce qui lui était arrivé. Ses conseillers et Zéresh, sa femme, lui dirent : S''il est juif, ce Mardochée devant qui tu as commencé de déchoir, tu ne tiendras pas devant lui. Ta déchéance sera totale devant lui. '
  '14':
  - type: note
    content: Cf. 5.8.
  - type: text
    content: Ils lui parlaient encore lorsque arrivèrent les eunuques du roi ; ils s'empressèrent d'emmener Haman au banquet que donnait Esther.
  '2':
  - type: note
    content: 'Bigtân  : le nom est ici orthographié Bigtana dans le texte hébreu ; cf. 2.21.'
  - type: text
    content: 'Or il était écrit là que Mardochée avait fait un rapport sur Bigtân et Téresh, les deux eunuques du roi, de la garde du seuil, qui avaient cherché à porter la main sur le roi Xerxès. '
  '3':
  - type: note
    content: 'Quelle promotion honorifique a-t-on conférée  : litt. qu''a-t-on fait en honneur et en grandeur. –  Les serviteurs personnels du roi  : cf. v. 5 ; 2.2n. –  On n''a rien fait du tout pour lui  : cf. Gn 40.23 ; Ec 9.15.'
  - type: text
    content: 'Le roi dit : Quelle promotion honorifique a-t-on conférée à Mardochée pour cela ? Les serviteurs personnels du roi répondirent : On n''a rien fait du tout pour lui !'
  '4':
  - type: text
    content: ' '
  - type: note
    content: cour 5.1. –  qu'on pende Mardochée 5.14+.
  - type: text
    content: 'Mais, dit le roi, qui est dans la cour ? C''était Haman qui arrivait dans la cour extérieure de la maison du roi pour demander au roi qu''on pende Mardochée à la potence qu''il avait préparée pour lui. '
  '5':
  - type: text
    content: 'Les serviteurs du roi dirent : C''est Haman qui se tient dans la cour. Le roi dit : Qu''il entre ! '
  '6':
  - type: note
    content: 'un homme que le roi désire honorer  : cf. Pr 14.35. –  En son for intérieur  : litt. dans son cœur  ; cf. Ab 3s ; Pr 18.12.'
  - type: text
    content: 'Haman entra, et le roi lui dit : Que faire à un homme que le roi désire honorer ? En son for intérieur, Haman se dit : A qui donc le roi désirerait-il faire honneur plus qu''à moi ? '
  '7':
  - type: text
    content: 'Haman dit au roi : Un homme que le roi désire honorer ? '
  '8':
  - type: note
    content: 'un vêtement royal 8.15 ; Dn 5.29. –  que le roi a porté  : cf. 1S 24.6 ; 1R 19.19 ; 2R 2.8,13s. –  un cheval que le roi a monté  : cf. 1R 1.33. –  couronne royale 1.11+ ; dans un bas-relief du palais de Khorsabad, elle est ainsi placée sur la tête du cheval.'
  - type: text
    content: 'Que l''on prenne un vêtement royal que le roi a porté et un cheval que le roi a monté, et sur la tête duquel une couronne royale a été posée. '
  '9':
  - type: note
    content: 'Cf. Gn 41.42s. –  qu''on proclame…  : autre traduction qu''on fasse une proclamation devant lui. Voilà ce qu''on devrait faire…'
  - type: text
    content: 'Que l''on confie ce vêtement et ce cheval à l''un des princes du roi, un dignitaire. Qu''on revête ainsi l''homme que le roi désire honorer, qu''on le conduise à cheval sur la place de la ville, qu''on proclame devant lui : « Voilà ce qu''on fait à l''homme que le roi désire honorer ! » '
