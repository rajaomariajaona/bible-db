document_id: EST.6,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Haman est obligé d'honorer Mardochée
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.21-23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: livre du souvenir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ml 3.16.'
      marker-yv: yv-n
    - type: text
      text: 'Cette nuit-là, comme le sommeil le fuyait, le roi se fit apporter le livre du souvenir, les chroniques, et on en fit la lecture au roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte du Roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne néglige
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne fais tomber
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi répondit à Haman : Vite, prends le vêtement et le cheval comme tu l''as si bien dit, et agis ainsi en faveur du Juif Mardochée, celui qui est assis à la porte du Roi ; ne néglige aucun détail de tout ce que tu as dit. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Pr 14.19.
      marker-yv: yv-n
    - type: text
      text: 'Haman prit le vêtement et le cheval ; il revêtit Mardochée, le promena à cheval sur la place de la ville et proclama devant lui : « Voilà ce qu''on fait à un homme que le roi désire honorer ! »'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se précipitait chez lui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 21.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la tête voilée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 7.8 ; 2S 15.30 ; Jr 14.3s.'
      marker-yv: yv-n
    - type: text
      text: 'Puis Mardochée retourna à la porte du Roi, tandis que Haman se précipitait chez lui, en deuil et la tête voilée. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa femme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ses amis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: conseillers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', il s''agit sans doute de devins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'S''il est '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juif
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il est de la descendance des Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'déchoir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ta déchéance sera totale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tomber '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu tomberas pour de bon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 7.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 8.3,17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.24 ; voir aussi Dn 4.34 ; Lc 1.51.'
      marker-yv: yv-n
    - type: text
      text: 'Haman raconta à Zéresh, sa femme, et à tous ses amis ce qui lui était arrivé. Ses conseillers et Zéresh, sa femme, lui dirent : S''il est juif, ce Mardochée devant qui tu as commencé de déchoir, tu ne tiendras pas devant lui. Ta déchéance sera totale devant lui. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 5.8.
      marker-yv: yv-n
    - type: text
      text: Ils lui parlaient encore lorsque arrivèrent les eunuques du roi ; ils s'empressèrent d'emmener Haman au banquet que donnait Esther.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bigtân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le nom est ici orthographié '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bigtana '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: dans le texte hébreu ; cf. 2.21.
      marker-yv: yv-n
    - type: text
      text: 'Or il était écrit là que Mardochée avait fait un rapport sur Bigtân et Téresh, les deux eunuques du roi, de la garde du seuil, qui avaient cherché à porter la main sur le roi Xerxès. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Quelle promotion honorifique a-t-on conférée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'a-t-on fait en honneur et en grandeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les serviteurs personnels du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 5 ; 2.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On n'a rien fait du tout pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 40.23 ; Ec 9.15.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit : Quelle promotion honorifique a-t-on conférée à Mardochée pour cela ? Les serviteurs personnels du roi répondirent : On n''a rien fait du tout pour lui !'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''on pende Mardochée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.14+.
      marker-yv: yv-n
    - type: text
      text: 'Mais, dit le roi, qui est dans la cour ? C''était Haman qui arrivait dans la cour extérieure de la maison du roi pour demander au roi qu''on pende Mardochée à la potence qu''il avait préparée pour lui. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les serviteurs du roi dirent : C''est Haman qui se tient dans la cour. Le roi dit : Qu''il entre ! '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un homme que le roi désire honorer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 14.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En son for intérieur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ab 3s ; Pr 18.12.'
      marker-yv: yv-n
    - type: text
      text: 'Haman entra, et le roi lui dit : Que faire à un homme que le roi désire honorer ? En son for intérieur, Haman se dit : A qui donc le roi désirerait-il faire honneur plus qu''à moi ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Haman dit au roi : Un homme que le roi désire honorer ? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un vêtement royal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.15 ; Dn 5.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que le roi a porté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 24.6 ; 1R 19.19 ; 2R 2.8,13s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un cheval que le roi a monté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 1.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'couronne royale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.11+ ; dans un bas-relief du palais de Khorsabad, elle est ainsi placée '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur la tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'du '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cheval.
      marker-yv: yv-n
    - type: text
      text: 'Que l''on prenne un vêtement royal que le roi a porté et un cheval que le roi a monté, et sur la tête duquel une couronne royale a été posée. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '6.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 41.42s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on proclame…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'on fasse une proclamation devant lui. Voilà ce qu'on devrait faire…
      marker-yv: yv-n
    - type: text
      text: 'Que l''on confie ce vêtement et ce cheval à l''un des princes du roi, un dignitaire. Qu''on revête ainsi l''homme que le roi désire honorer, qu''on le conduise à cheval sur la place de la ville, qu''on proclame devant lui : « Voilà ce qu''on fait à l''homme que le roi désire honorer ! » '
