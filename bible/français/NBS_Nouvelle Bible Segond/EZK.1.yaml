document_id: EZK.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Première vision de la gloire du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'La trentième année  : indication chronologique (cf. v. 2) d''interprétation incertaine ; s''agit-il de l''âge du prophète (cf. Lc 3.23) ? de la trentième année à compter de la réforme du culte par Josias (≈ 622 av. J.-C. ; cf. 2R 22–23) ? –  Kebar  : litt. fleuve Kebar  ; sans doute le « grand canal », une dérivation de l''Euphrate ; la communauté des exilés à laquelle appartient Ezéchiel est sans doute installée dans la région de Nippour, au sud-est de Babylone ; comparer 3.15 avec Es 6.1-4 ; voir aussi Ps 137.1n. –  le ciel s''ouvrit  : cf. Gn 7.11 ; Es 24.18 ; Ml 3.10 ; Mt 3.16/ / ; Jn 1.51+ ; Ac 7.56 ; 10.11 ; Ap 4.1 ; 19.11. –  visions (un terme apparenté sera traduit par aspect dans les chap. 1–2 ; 10) divines ou visions de Dieu  : cf. 8.3 ; 11.24 ; 40.2 ; Jr 1.11-15.'
  - type: text
    content: 'La trentième année, le cinquième jour du quatrième mois, comme j''étais parmi les exilés près du Kebar, le ciel s''ouvrit, et j''eus des visions divines. '
  '10':
  - type: note
    content: 'Ap 4.7. –  Leur face ressemblait…  : litt. la ressemblance de leur(s) face(s) (était) une face d''homme…  ; cf. v. 5n.'
  - type: text
    content: 'Leur face ressemblait à celle d''un homme ; tous les quatre avaient une face de lion à droite, tous les quatre une face de taureau à gauche et tous les quatre une face d''aigle. '
  '11':
  - type: note
    content: 'Leurs faces  : de nombreux traducteurs suppriment le terme hébreu correspondant, qu''ils estiment répété par erreur de copie, ou le rattachent au v. 10  : (telles étaient) leurs faces. –  séparées par le haut ou déployées vers le haut  ; cf. 1R 6.24-27.'
  - type: text
    content: 'Leurs faces et leurs ailes étaient séparées par le haut ; chacun avait deux ailes jointes l''une à l''autre, et deux qui lui couvraient le corps. '
  '12':
  - type: note
    content: le souffle ou le vent, l'esprit, l'Esprit  ; cf. v. 4,20s ; 2.2n.
  - type: text
    content: 'Chacun allait droit devant lui ; ils allaient où allait le souffle ; ils ne tournaient pas quand ils se déplaçaient. '
  '13':
  - type: note
    content: 'L''aspect…  : litt. la ressemblance (v. 5n) des êtres vivants, leur aspect (v. 1n), comme des braises de feu  ; LXX au milieu des êtres vivants, un aspect comme des braises de feu. – Cf. Ex 19.16-18 ; Ps 97.4.'
  - type: text
    content: 'L''aspect de ces êtres vivants ressemblait à des braises ; c''était comme l''aspect des flambeaux, et ce feu circulait entre les êtres vivants ; le feu répandait une clarté, et du feu sortaient des éclairs. '
  '14':
  - type: note
    content: 'Texte obscur, omis par LXX. –  comme la foudre  : litt. comme l''aspect (v. 1n) de la foudre ( ?) ; le terme ressemble à celui qui a été traduit par éclairs au v. 13 ; cf. Dn 10.6.'
  - type: text
    content: Les êtres vivants couraient et revenaient, comme la foudre.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.9-13.
  - type: text
    content: 'Je regardais ces êtres vivants : il y avait une roue à terre, à côté des êtres vivants, devant leurs quatre faces. '
  '16':
  - type: note
    content: 'éclat v. 4n. –  chrysolithe  : le même mot hébreu est traduit par le nom Tarsis (Es 2.16n), peut-être elliptiquement pour pierre de Tarsis (voir 10.9n) ; cf. 28.13 ; Ex 28.20 ; 39.13 ; Ct 5.14 ; Dn 10.6. –  toutes les quatre se ressemblaient  : litt. une seule ressemblance pour elles quatre  ; cf. v. 5n.'
  - type: text
    content: 'L''aspect de ces roues, leur structure, avait l''éclat de la chrysolithe, et toutes les quatre se ressemblaient ; leur aspect et leur structure étaient tels que chaque roue paraissait être au milieu d''une autre roue. '
  '17':
  - type: note
    content: 'viraient  : le même verbe a été traduit par tourner aux v. 9,12 ; de même 10.11,16.'
  - type: text
    content: 'Elles allaient sur chacun de leurs quatre côtés quand elles se déplaçaient ; elles ne viraient pas quand elles se déplaçaient. '
  '18':
  - type: note
    content: 'yeux  : certains comprennent ici le mot hébreu au sens d’étincelles ou éclairs  ; cf. v. 4n  ; voir cependant Ap 4.6,8.'
  - type: text
    content: 'Leurs jantes, d''une dimension formidable, leurs jantes à toutes les quatre étaient remplies d''yeux tout autour. '
  '19':
  - type: note
    content: Cf. 10.16.
  - type: text
    content: 'Quand les êtres vivants se déplaçaient, les roues allaient à côté d''eux ; quand les êtres vivants s''élevaient de terre, les roues s''élevaient aussi. '
  '2':
  - type: note
    content: cinquième année… Joïakîn ≈ 593 av. J.-C., cf. 2R 24.10-15.
  - type: text
    content: 'Le cinquième jour du mois – c''était la cinquième année de l''exil du roi Joïakîn – '
  '20':
  - type: note
    content: 'dans le sens du souffle  : litt. vers là où (était) le souffle (ou le vent, cf. v. 12n) ; cette répétition est absente de certaines versions anciennes. –  du vivant ou de l''être vivant (1.5n) ; le terme est ici au singulier ; certains comprennent de chaque être vivant.'
  - type: text
    content: 'Ils allaient où allait le souffle, dans le sens du souffle, et les roues s''élevaient avec eux : le souffle du vivant était dans les roues. '
  '21':
  - type: text
    content: Quand ils se déplaçaient, elles se déplaçaient ; quand ils s'arrêtaient, elles s'arrêtaient ; quand ils s'élevaient de terre, les roues s'élevaient avec eux, car le souffle du vivant était dans les roues.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'de la tête des êtres vivants  : litt. des têtes du vivant (ou de l''animal) ; LXX et Syr ont lu le singulier de la tête (v. 25s ; 10.1). Certains mss hébreux et des versions anciennes ont lu le pluriel des (êtres) vivants . –  une voûte céleste ou une étendue, un firmament  ; cf. Gn 1.6n. –  glace Jb 37.10+ ; on traduit parfois cristal , d''après des versions anciennes ; cf. Ex 24.10 ; Ap 4.2s.'
  - type: text
    content: 'Au-dessus de la tête des êtres vivants, il y avait quelque chose qui ressemblait à une voûte céleste, qui avait l''éclat redoutable de la glace et qui se déployait au-dessus de leurs têtes. '
  '23':
  - type: text
    content: 'Sous cette voûte, leurs ailes étaient droites l''une contre l''autre, ils en avaient chacun deux qui les couvraient, chacun deux qui couvraient leur corps. '
  '24':
  - type: note
    content: 'bruit et voix traduisent un même mot hébreu ; de même dans la suite. –  grandes eaux  : cf. 31.7,15 ; 43.2 ; Es 28.2 ; Ap 1.15. –  du Puissant, hébreu Shaddaï  ; cf. 10.5n  ; voir Gn 17.1n  ; Ps 29.'
  - type: text
    content: 'J''entendis le bruit de leurs ailes, quand ils se déplaçaient, pareil au bruit de grandes eaux, ou à la voix du Puissant ; c''était un bruit tumultueux, comme celui d''une troupe ; quand ils s''arrêtaient, ils laissaient retomber leurs ailes. '
  '25':
  - type: note
    content: Ce v. est totalement ou partiellement absent de plusieurs mss hébreux et des versions anciennes. Autre traduction il y avait du bruit (cf. v. 24n) au-dessus de la voûte…
  - type: text
    content: Une voix venait d'au-dessus de la voûte qui se trouvait au-dessus de leurs têtes ; lorsqu'ils s'arrêtaient, ils laissaient retomber leurs ailes.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Tout au-dessus… têtes  : cette partie du v. est absente de LXX. –  lapis-lazuli  : cf. Ex 24.10n. –  ce qui ressemblait (v. 5n) à un trône  : cf. Es 6.1 ; Dn 7.9. –  un être humain ou un homme  ; cf. 2.1n  ; Dn 7.13+.'
  - type: text
    content: 'Tout au-dessus de la voûte qui était au-dessus de leurs têtes, il y avait quelque chose qui avait l''aspect du lapis-lazuli et qui ressemblait à un trône ; et, au-dessus de ce qui ressemblait à un trône, ce qui ressemblait à l''aspect d''un être humain. '
  '27':
  - type: note
    content: 'éclat étincelant v. 4n. –  qui avait l''aspect du feu, une clarté tout autour de lui  : texte obscur, omis par LXX.'
  - type: text
    content: 'Je vis encore comme un éclat étincelant qui avait l''aspect du feu et qui rayonnait tout autour, depuis ce qui paraissait être ses reins jusqu''en haut, et depuis ce qui paraissait être ses reins jusqu''en bas ; je vis quelque chose qui avait l''aspect du feu, une clarté tout autour de lui. '
  '28':
  - type: note
    content: 'l''aspect de la ressemblance… v. 5n. –  la gloire  : cf. 28.22 ; 43.1-5 ; Ex 16.7+ ; 40.34 ; Es 6.3. –  face contre terre  : litt. sur ma face  ; cf. 3.23 ; 9.8 ; 11.13 ; 43.3 ; 44.4 ; voir aussi Dn 10.9 ; Ap 1.17.'
  - type: text
    content: 'Tel l''aspect de l''arc qui apparaît dans les nuages un jour de pluie, tel était l''aspect de la clarté qui l''entourait : c''était l''aspect de la ressemblance de la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: . Quand je le vis, je tombai face contre terre et j'entendis quelqu'un qui parlait.
  '3':
  - type: note
    content: 'parvint à  : litt. fut (ici à une forme intensive) vers  ; cf. 3.16 ; 6.1 ; 7.1 ; 12.1 ; 1S 15.10 ; 1R 17.2,8 ; Jr 1.1-2n  ; Os 1.1 ; Jl 1.1 ; Mi 1.1 ; So 1.1 ; voir aussi Jb 4.12ss. –  Ezéchiel  : « Dieu fortifie » ou « Dieu rend dur » ; cf. 3.8n,14n  ; 1Ch 24.16. –  prêtre  : cf. Jr 1.1. –  Kebar v. 1n. –  la main du Seigneur fut sur lui  : cf. 3.14,22 ; 8.1 ; 33.22 ; 37.1 ; 40.1 ; voir aussi 6.14 ; 11.5 ; 13.9 ; 14.9 ; 20.33 ; 25.13,16 ; 1R 18.46 ; 2R 3.15.'
  - type: text
    content: 'la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Ezéchiel, fils de Bouzi, le prêtre, au pays des Chaldéens, près du Kebar ; c''est là que la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur lui.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 6.1-7 ; Ap 4. –  un souffle ou un vent , selon la traduction usuelle (13.11,13) ; voir cependant v. 12n  ; voir aussi Ps 18.11 ; 50.3. –  nuée Ex 13.21+. –  gerbe de feu  : traduction incertaine ; la même expression hébraïque désigne le feu mêlé à la grêle (c.-à-d. les éclairs ) en Ex 9.24 ; cf. Ps 97.3. –  un éclat  : le mot hébreu peut signifier aussi œil ou source  ; il pourrait avoir ici le sens d’ apparence  ; de même aux v. 7,16,22,27 ; 8.2 ; 10.9 ; cf. Pr 23.31 ; Dn 10.6n. –  étincelant  : traduction incertaine ; LXX d''ambre  ; Vg d''électrum (par transcription du grec) ; on a aussi proposé vermeil.'
  - type: text
    content: 'Je regardai : il vint du nord un souffle de tempête, une grosse nuée et une gerbe de feu, qui répandait une clarté tout autour. Il y avait comme un éclat étincelant sortant du milieu d''elle, du milieu du feu. '
  '5':
  - type: note
    content: 'Cf. 10.12-15,20 ; Es 6.2 ; Ap 4.5-8. –  quelque chose qui ressemblait à  : litt. la ressemblance de, de même à la fin du v. pour semblait humain, litt. ressemblance d''un homme, et dans la suite ; cf. Gn 1.26n. –  êtres vivants  : le mot hébreu correspondant est habituellement traduit par animaux  ; il est dérivé du verbe souvent rendu par vivre  ; cf. Ap 4.6n. –  aspect  : terme apparenté à celui qui a été traduit par vision au v. 1n.'
  - type: text
    content: Au milieu, quelque chose qui ressemblait à quatre êtres vivants dont l'aspect semblait humain.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 10.14. La description rappelle les statues qui gardaient l'entrée des temples et des palais babyloniens.
  - type: text
    content: 'Chacun d''eux avait quatre faces et quatre ailes. '
  '7':
  - type: note
    content: C'est la même expression qui est rendue par pieds et sabots.
  - type: text
    content: 'Leurs jambes étaient droites, et leurs pieds étaient comme les sabots d''un taurillon ; ils étincelaient de l''éclat du bronze poli. '
  '8':
  - type: note
    content: 10.8,21.
  - type: text
    content: 'Ils avaient des mains humaines sous les ailes à leurs quatre côtés ; et tous les quatre avaient leurs faces et leurs ailes. '
  '9':
  - type: note
    content: 'quand ils se déplaçaient  : litt. en allant (même verbe à la fin du v.), de même dans la suite.'
  - type: text
    content: 'Leurs ailes étaient jointes l''une à l''autre ; ils ne tournaient pas quand ils se déplaçaient : chacun allait droit devant lui. '
