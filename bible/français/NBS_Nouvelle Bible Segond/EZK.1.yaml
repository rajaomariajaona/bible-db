    marker-yv: yv-n
  - type: text
    text: 'Tout au-dessus de la voûte qui était au-dessus de leurs têtes, il y avait quelque chose qui avait l''aspect du lapis-lazuli et qui ressemblait à un trône ; et, au-dessus de ce qui ressemblait à un trône, ce qui ressemblait à l''aspect d''un être humain. '
