  - type: text
    text: 'L''aspect de ces roues, leur structure, avait l''éclat de la chrysolithe, et toutes les quatre se ressemblaient ; leur aspect et leur structure étaient tels que chaque roue paraissait être au milieu d''une autre roue. '
