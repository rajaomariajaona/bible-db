    marker-yv: yv-n
  - type: text
    text: 'Je vis encore comme un éclat étincelant qui avait l''aspect du feu et qui rayonnait tout autour, depuis ce qui paraissait être ses reins jusqu''en haut, et depuis ce qui paraissait être ses reins jusqu''en bas ; je vis quelque chose qui avait l''aspect du feu, une clarté tout autour de lui. '
