    text: 'J''entendis le bruit de leurs ailes, quand ils se déplaçaient, pareil au bruit de grandes eaux, ou à la voix du Puissant ; c''était un bruit tumultueux, comme celui d''une troupe ; quand ils s''arrêtaient, ils laissaient retomber leurs ailes. '
