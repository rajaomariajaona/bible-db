  - type: text
    text: 'Au-dessus de la tête des êtres vivants, il y avait quelque chose qui ressemblait à une voûte céleste, qui avait l''éclat redoutable de la glace et qui se déployait au-dessus de leurs têtes. '
  - type: usfm
    marker: v
    metadata:
