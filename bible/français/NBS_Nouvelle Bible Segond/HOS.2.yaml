document_id: HOS.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu accueillera de nouveau son peuple
  - type: text
    content: ' '
  - type: note
    content: 'comme le sable… Gn 22.17 ; 1R 4.20 ; Es 10.22. –  au lieu…  : cf. v. 16s. –  Vous n''êtes pas mon peuple = Lo-Ammi  ; cf. 1.9n  ; Rm 9.25-27  ; 2Co 6.16. –  Fils du Dieu vivant (hébreu ’El-haï , Dt 5.26+ ; sur le nom ’El , voir aussi Gn 21.33n) : cf. Mt 5.9.'
  - type: text
    content: Pourtant le nombre des Israélites
  - type: text
    content: sera comme le sable de la mer
  - type: text
    content: qui ne peut ni se mesurer ni se compter ;
  - type: text
    content: 'au lieu même où on leur disait :'
  - type: text
    content: « Vous n'êtes pas mon peuple ! »
  - type: text
    content: 'on leur dira : « Fils du Dieu vivant ! »'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'pas compris (litt. connu ) : cf. 7.9 ; 11.3 ; voir aussi 2.22+ ; 4.1+. –  c''était moi qui lui donnais…  : cf. Dt 7.13 ; 8.16s ; Ag 2.8. –  vin  : autre traduction vin nouveau , même possibilité aux v. 11,24 ; cf. 4.11n  ; 7.14 ; 9.2 ; Gn 27.28n. –  Je lui ai prodigué de l''argent…  : autre traduction je lui ai prodigué de l''argent, et ils ont offert (litt. fait ) de l''or pour le Baal (ou à titre d’ offrande , ou pour fabriquer une statue) ; cf. 8.4 ; 11.2 ; 13.2 ; 14.4. Au lieu de reconnaître ses biens comme autant de dons de YHWH, Israël a rendu un culte aux divinités cananéennes qui leur étaient associées.'
  - type: text
    content: Elle n'avait pas compris, elle,
  - type: text
    content: que c'était moi qui lui donnais
  - type: text
    content: le blé, le vin et l'huile.
  - type: text
    content: Je lui ai prodigué de l'argent et de l'or
  - type: text
    content: – et ils en ont fait offrande au Baal !
  '11':
  - type: text
    content: C'est pourquoi je reviendrai
  - type: text
    content: prendre mon blé en son temps
  - type: text
    content: et mon vin dans sa saison,
  - type: text
    content: et je retirerai ma laine et mon lin
  - type: text
    content: qui devaient couvrir sa nudité.
  '12':
  - type: text
    content: ' '
  - type: note
    content: je vais mettre sa honte à découvert Ez 16.36s. –  personne ne la délivrera de ma main 5.14 ; Dt 32.39 ; Mi 5.7 ; Ps 50.22 ; Jb 10.7 ; Dn 4.32 ; cf. Jn 10.28.
  - type: text
    content: Maintenant je vais mettre sa honte à découvert
  - type: text
    content: sous les yeux de ses amants,
  - type: text
    content: et personne ne la délivrera de ma main.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 1.13s ; Am 5.21-23. – Voir calendrier et fêtes.
  - type: text
    content: Je ferai cesser toute sa gaieté,
  - type: text
    content: ses fêtes, ses nouvelles lunes, ses sabbats
  - type: text
    content: et toutes ses rencontres festives.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'vignes / figuiers 1R 5.5 ; Es 36.16 ; Mi 4.4 ; Za 3.10. –  le salaire Dt 23.19. –  Je les réduirai…  : cf. Lv 26.32-35 ; Es 5.5-6+. –  broussailles ou forêt  ; cf. Jr 26.18.'
  - type: text
    content: Je dévasterai ses vignes et ses figuiers,
  - type: text
    content: 'dont elle disait :'
  - type: text
    content: c'est le salaire que m'ont donné mes amants !
  - type: text
    content: Je les réduirai en broussailles,
  - type: text
    content: et les animaux sauvages les dévoreront.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Elle suivait… v. 7n. –  elle m'a oublié 8.14 ; Dt 4.9+.
  - type: text
    content: Je lui ferai rendre des comptes pour les jours des Baals,
  - type: text
    content: auxquels elle offrait de l'encens,
  - type: text
    content: parée de son anneau et de son collier.
  - type: text
    content: Elle suivait ses amants,
  - type: text
    content: et moi, elle m'a oublié
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Dieu veut reconquérir le cœur de son peuple
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'séduire  : cf. 7.11n  ; le même verbe (qui peut aussi avoir le sens de duper ) apparaît en Ex 22.15 ; Jg 14.15 ; 16.5 ; Jb 31.9 ; cf. Jr 20.7n. –  au désert 9.10 ; 13.5 ; voir aussi 12.10 ; Dt 8.2-5 ; Jr 2.2s ; Ez 20.35 ; Ap 12.6. –  je parlerai à (litt. sur ) son cœur Gn 34.3n  ; 50.21 ; Jg 19.3 ; Es 40.2 ; Rt 2.13.'
  - type: text
    content: Eh bien, moi, je vais la séduire ;
  - type: text
    content: je la conduirai au désert
  - type: text
    content: et je parlerai à son cœur.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ses vignes  : cf. 4.11,17s ; 10.1 ; 14.8. –  la vallée d''Akor , de sinistre mémoire (Jos 7.24-26 ; 15.7), à l''entrée de la Terre promise, près de Jéricho ; cf. Es 65.10. –  une porte  : litt. une ouverture, une entrée  ; cf. Ap 3.7s. –  espoir Jr 29.11. –  elle y répondra  : même verbe aux v. 23s ; certains voient dans ce terme ( ‘anetha ) une allusion au nom de la déesse cananéenne Anat, parèdre du Baal et dispensatrice de la pluie et de la rosée ; autre traduction possible elle y chantera (cf. Ex 15.21n). –  sa jeunesse 11.1-3. –  monta d''Egypte Gn 12.10n.'
  - type: text
    content: De là, je lui donnerai ses vignes
  - type: text
    content: et la vallée d'Akor
  - type: text
    content: comme une porte d'espoir ;
  - type: text
    content: elle y répondra comme aux jours de sa jeunesse,
  - type: text
    content: comme au jour où elle monta d'Egypte.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'mon Mari  : litt. mon homme (comme en Gn 2.23n). –  mon Baal  : c.-à-d. mon seigneur ; mon maître (ce terme est parfois employé pour le mari, p. ex. en Dt 24.4 ; un terme apparenté est traduit par époux en Es 54.5) ; cf. Jr 3.14n.'
  - type: text
    content: En ce jour-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: tu m'appelleras « mon Mari »,
  - type: text
    content: tu ne m'appelleras plus « mon Baal ».
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'J''ôterai… Za 13.2. –  des Baals  : sur la multiplicité à la fois géographique et mythologique du Baal, cf. Ex 14.2,9 ; Nb 25.3,5 ; Jg 3.3 ; 8.33 ; 2S 13.23 ; Ct 8.11 etc. –  on n''évoquera plus leurs noms ou on ne se souviendra plus de leurs noms.'
  - type: text
    content: J'ôterai de sa bouche les noms des Baals,
  - type: text
    content: on n'évoquera plus leurs noms.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Les Judéens…  : litt. les fils de Juda et les fils d''Israël  ; Jr 3.18 ; Ez 37.19,22,24. –  chef unique  : cf. 3.5+. –  sortiront  : litt. monteront  ; il peut s''agir de la sortie du pays de l''exil ; cf. v. 17 ; Ex 1.10 ; Esd 2.1 ; certains comprennent  : ils déborderont (comme un fleuve) ou ils pousseront (comme une plante) de (ou dans ) leur propre pays . –  Jizréel v. 24s ; 1.4n.'
  - type: text
    content: Les Judéens et les Israélites seront rassemblés,
  - type: text
    content: ils se donneront un chef unique
  - type: text
    content: et sortiront du pays ;
  - type: text
    content: car grand sera le jour de Jizréel.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'alliance avec les animaux  : cf. 4.3+ ; Es 11.6-9 ; 65.25 ; Ez 34.25 ; Jb 5.23 ; Mc 1.13. –  bestioles de la terre (litt. du sol , cf. Gn 2.5n  ; 6.20) Gn 1.24nss. –  l''arc, l''épée… 1.7+ ; cf. Es 2.4 ; Za 9.10. –  je les ferai disparaître  : sous-entendu dans le texte.'
  - type: text
    content: En ce jour-là, je conclurai pour eux une alliance
  - type: text
    content: avec les animaux sauvages,
  - type: text
    content: les oiseaux du ciel
  - type: text
    content: et les bestioles de la terre.
  - type: text
    content: Je briserai l'arc, l'épée et la guerre, je les ferai disparaître du pays,
  - type: text
    content: et je ferai en sorte qu'ils puissent se coucher en sécurité.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 54.5-10. –  par la justice…  : les qualités énumérées ici semblent occuper dans ces fiançailles nouvelles la place de la dot apportée par le fiancé. –  fidélité 4.1n  ; 6.4-6 ; 10.12 ; 12.7.'
  - type: text
    content: Je te fiancerai à moi pour toujours.
  - type: text
    content: Je te fiancerai à moi par la justice et l'équité,
  - type: text
    content: par la fidélité et la compassion.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'probité ou constance ; fidélité  ; cf. 4.1n. –  tu connaîtras  : cf. 4.1 ; 5.4 ; 6.3,6 ; Jr 31.31-33.'
  - type: text
    content: Je te fiancerai à moi par la probité,
  - type: text
    content: 'et ainsi tu connaîtras le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'je répondrai au ciel (autre traduction aux cieux  ; cf. Gn 1.1n) : cf. v. 17n  ; 14.9 ; Es 65.24.'
  - type: text
    content: En ce jour-là je répondrai,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: je répondrai au ciel,
  - type: text
    content: et il répondra à la terre ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: blé / vin / huile v. 7,10. –  Jizréel 1.4n, surtout ici à cause de l'assonance avec Israël et avec le début du v. 25.
  - type: text
    content: la terre répondra au blé,
  - type: text
    content: au vin et à l'huile,
  - type: text
    content: et ceux-ci répondront à Jizréel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Je répandrai… de la semence  : le texte joue sur le nom de Jizréel (v. 24) ; cf. 1.4n. –  j''aurai compassion de Lo-Rouhama 1.6n  ; cf. Rm 9.25  ; 11.31 ; 1P 2.10 . –  mon peuple  : hébreu ‘ammi  ; cf. 1.9n. –  Mon Dieu Jr 7.23+.'
  - type: text
    content: Je répandrai pour moi de la semence dans le pays,
  - type: text
    content: et j'aurai compassion de Lo-Rouhama.
  - type: text
    content: 'Je dirai à Lo-Ammi : Tu es mon peuple !'
  - type: text
    content: 'Et il dira : Mon Dieu !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ammi (= mon peuple ) / Rouhama (= celle dont on a compassion ) : cf. 1.6-9.'
  - type: text
    content: 'Dites à vos frères : Ammi ! (« Mon peuple ! »)'
  - type: text
    content: 'Et à vos sœurs : Rouhama ! (« Toi dont on a compassion ! »)'
  - type: heading
    content: Israël, épouse infidèle
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Accusez  : terme apparenté en 4.1,4 ; 12.3 ; cf. Es 1.18 ; 3.13-15 ; Jr 2.9 ; Mi 6.1s. –  votre mère Es 50.1. –  elle n''est pas ma femme…  : formule juridique de répudiation attestée au Proche-Orient. –  les signes… / les marques…  : litt. ses prostitutions / ses adultères  ; l''expression fait peut-être allusion aux parures distinctives de la prostituée ; cf. v. 15 ; Gn 38.15 ; Pr 7.10 ; Lettre de Jérémie 42s : « Les femmes se ceignent de cordes et s''installent ensuite sur les chemins pour brûler du son ; et quand l''une d''elles a couché avec le passant qui l''a invitée, elle se moque de sa voisine qui n''a pas été choisie comme elle, et dont la corde n''a pas été rompue. »'
  - type: text
    content: Accusez, accusez votre mère,
  - type: text
    content: car elle n'est pas ma femme,
  - type: text
    content: et je ne suis pas son mari !
  - type: text
    content: Qu'elle ôte de son visage les signes de sa prostitution,
  - type: text
    content: et d'entre ses seins les marques de son adultère !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'je la déshabillerai entièrement  : litt. je la déshabillerai nue  ; cf. Jr 13.22 ; Ez 16.39 ; 23.29 ; Ap 17.16. –  comme au jour de sa naissance Ez 16.4s,22.'
  - type: text
    content: Sinon, je la déshabillerai entièrement,
  - type: text
    content: je la mettrai comme au jour de sa naissance,
  - type: text
    content: je la rendrai semblable au désert,
  - type: text
    content: je la ferai devenir comme une terre desséchée,
  - type: text
    content: je la ferai mourir de soif ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: pas compassion 1.6n. –  fils de la prostitution 1.2n.
  - type: text
    content: je n'aurai pas compassion de ses fils,
  - type: text
    content: car ce sont des fils de la prostitution.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 's''est prostituée 1.2n. –  quand  : autre traduction car . –  Je suivrai 5.11 ; même formule en Dt 6.14n  ; Jr 2.23,25 ; Am 2.4. –  mes amants 9.12,14s.'
  - type: text
    content: Leur mère s'est prostituée,
  - type: text
    content: celle qui les a portés s'est couverte de honte,
  - type: text
    content: 'quand elle a dit : « Je suivrai mes amants,'
  - type: text
    content: qui me donnent du pain et de l'eau,
  - type: text
    content: de la laine et du lin,
  - type: text
    content: de l'huile et de quoi boire. »
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ton chemin  : LXX son chemin  ; cf. v. 18 ; voir Jb 3.23+.'
  - type: text
    content: C'est pourquoi je ferme ton chemin
  - type: text
    content: avec des épines,
  - type: text
    content: je le barre d'une barrière.
  - type: text
    content: Elle ne trouvera plus ses sentiers.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.15 ; Jr 3.22 ; Lc 15.17s. –  les atteindra  : litt. les trouvera . –  revenir ou retourner , 5.4 ; 6.1 ; 7.10 ; 11.5 ; 12.7 ; 14.2 ; Es 1.26-27n.'
  - type: text
    content: Elle poursuivra ses amants,
  - type: text
    content: mais elle ne les atteindra pas ;
  - type: text
    content: elle les cherchera, mais elle ne les trouvera pas.
  - type: text
    content: 'Puis elle dira :'
  - type: text
    content: « Je vais revenir à mon premier mari,
  - type: text
    content: car alors j'étais plus heureuse que maintenant. »
