      - type: usfm
        marker: fqa
        children:
        - type: text
          text: David ordonna de les jeter au feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; un ms de LXX ajoute ces mêmes mots à la fin du présent v.'
      marker-yv: yv-n
    - type: text
      text: Ils abandonnèrent là leurs idoles, et David et ses hommes les emportèrent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'Les Philistins partirent de nouveau à l''attaque et se déployèrent dans la vallée des Rephaïtes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
