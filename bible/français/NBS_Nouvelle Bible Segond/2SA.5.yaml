      marker-yv: yv-n
    - type: text
      text: 'David interrogea le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Dois-je attaquer les Philistins ? Me les livreras-tu ? Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à David : Vas-y, car je te livrerai les Philistins. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
