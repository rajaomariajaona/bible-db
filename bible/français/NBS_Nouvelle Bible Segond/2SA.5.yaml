          text: ', cf. 3.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui menais Israël en campagne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui faisais sortir et rentrer Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1S 18.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: feras paître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 7.8 ; Es 40.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 9.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Déjà, lorsque Saül était notre roi, c''était toujours toi qui menais Israël en campagne et qui l''en ramenais. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' t''a dit : « C''est toi qui feras paître Israël, mon peuple, c''est toi qui seras chef sur Israël. » '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a ouvert une brèche
      - type: usfm
        marker: ft
        children:
