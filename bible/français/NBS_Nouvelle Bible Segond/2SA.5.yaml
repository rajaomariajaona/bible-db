        children:
        - type: text
          text: 'endroits escarpés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: du désert, et en particulier la grotte d'Adoullam (voir 23.13s ; 1S 22.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',4'
        - type: usfm
          marker: ord
          children:
