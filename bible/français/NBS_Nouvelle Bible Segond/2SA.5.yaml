      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La liste des v. 14-16 compte onze noms ; neuf ne réapparaissent que dans les listes parallèles de 1Ch (parfois avec une variante orthographique) ; '
      - type: usfm
