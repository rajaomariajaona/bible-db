        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'désigne ici les tribus du Nord, placées précédemment sous l''autorité d''Ish-Bosheth, et qui se rallient maintenant à celle de David, déjà roi de Juda à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Hébron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir 2.1-4). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes os et ta chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.13 ; Gn 2.23 ; 29.14 ; Jg 9.2 ; voir aussi Dt 17.15.'
      marker-yv: yv-n
    - type: text
      text: 'Toutes les tribus d''Israël vinrent auprès de David à Hébron et dirent : Nous sommes tes os et ta chair. '
