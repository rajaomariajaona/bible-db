        - type: text
          text: toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: même hier, même avant-hier
      - type: usfm
        marker: ft
        children:
