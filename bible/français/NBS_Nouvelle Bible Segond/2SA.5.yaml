            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Quand les Philistins apprirent qu''on avait conféré l''onction à David pour qu''il soit roi sur Israël, ils montèrent tous à la recherche de David. Quand David l''apprit, il descendit à la forteresse. '
  '18':
  - type: usfm
