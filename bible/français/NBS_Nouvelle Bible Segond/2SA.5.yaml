    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''affermissait comme roi sur Israël et qu''il élevait son règne à cause d''Israël, son peuple.'
  - type: usfm
    marker: s1
