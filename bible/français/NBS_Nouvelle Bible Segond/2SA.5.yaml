  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un bruit de pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 3.8 ; 2R 6.32 ; 7.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui se met en campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 2.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 8.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors dépêche-toi, car c''est le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui se met en campagne devant toi pour battre les troupes des Philistins. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Guéba
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 1S 13.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gabaon
      - type: usfm
        marker: ft
        children:
        - type: text
