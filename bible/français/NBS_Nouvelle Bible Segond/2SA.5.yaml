document_id: 2SA.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: David devient roi d'Israël
  - type: heading
    content: 1Ch 11.1-9
  - type: text
    content: ' '
  - type: note
    content: 'Israël désigne ici les tribus du Nord, placées précédemment sous l''autorité d''Ish-Bosheth, et qui se rallient maintenant à celle de David, déjà roi de Juda à Hébron (voir 2.1-4). –  tes os et ta chair  : cf. 19.13 ; Gn 2.23 ; 29.14 ; Jg 9.2 ; voir aussi Dt 17.15.'
  - type: text
    content: 'Toutes les tribus d''Israël vinrent auprès de David à Hébron et dirent : Nous sommes tes os et ta chair. '
  '10':
  - type: note
    content: 's''élevait…  : litt. devenait de plus en plus grand, c.-à-d. la puissance de David augmentait. –  le Seigneur … des Armées  : cf. 1S 1.3n. –  était avec lui  : voir 1S 3.19+.'
  - type: text
    content: 'David s''élevait de plus en plus, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu des Armées, était avec lui.'
  - type: heading
    content: 1Ch 14.1-2
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Hiram  : ce roi de Tyr (Liban) fournira encore des matériaux à Salomon (1R 5.15-26) en vue de la construction du temple. –  une maison , c.-à-d. un palais royal  ; voir 7.2.'
  - type: text
    content: 'Hiram, roi de Tyr, envoya des messagers à David, avec du bois de cèdre, ainsi que des charpentiers et des tailleurs de pierre qui bâtirent une maison pour David. '
  '12':
  - type: note
    content: 'qu''il élevait…  : c.-à-d. que le Seigneur élevait son règne.'
  - type: text
    content: 'David sut ainsi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''affermissait comme roi sur Israël et qu''il élevait son règne à cause d''Israël, son peuple.'
  - type: heading
    content: Les fils de David nés à Jérusalem
  - type: heading
    content: 1Ch 3.5-9  ; 14.3-7
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.2-5. – Les concubines , comme les femmes , étaient toutes des épouses légitimes, mais de rang principal (les femmes ) ou de rang inférieur (les concubines ) ; cf. Dt 17.17 ; Jg 19.1n. –  Hébron  : cf. v. 1-5 ; 2.1. –  des fils et des filles  : 3.2 ne mentionnait que des fils ; pourtant la liste qui suit ne contient pas de nom qui soit exclusivement féminin.'
  - type: text
    content: 'David prit encore des concubines et des femmes de Jérusalem, après qu''il fut venu d''Hébron ; des fils et des filles naquirent encore de lui. '
  '14':
  - type: note
    content: La liste des v. 14-16 compte onze noms ; neuf ne réapparaissent que dans les listes parallèles de 1Ch (parfois avec une variante orthographique) ; Nathan est mentionné en Lc 3.31, sous la forme Natham. Seul Salomon est bien connu en tant que successeur de David (1R 1.39).
  - type: text
    content: 'Voici les noms de ceux qui lui naquirent à Jérusalem : Shammoua, Shobab, Nathan, Salomon, '
  '15':
  - type: text
    content: 'Yibhar, Elishoua, Népheg, Yaphia, '
  '16':
  - type: note
    content: 'Eliada  : appelé Béeliada en 1Ch 14.7.'
  - type: text
    content: Elishama, Eliada et Eliphéleth.
  - type: heading
    content: Victoires de David sur les Philistins
  - type: heading
    content: 1Ch 14.8-16
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'les Philistins  : cf. 1S 4.1n. –  conféré l''onction à David v. 3. –  montèrent 1S 1.3n. –  la forteresse  : soit celle de Jérusalem (voir v. 7), soit les endroits escarpés du désert, et en particulier la grotte d''Adoullam (voir 23.13s ; 1S 22.1n,4n).'
  - type: text
    content: 'Quand les Philistins apprirent qu''on avait conféré l''onction à David pour qu''il soit roi sur Israël, ils montèrent tous à la recherche de David. Quand David l''apprit, il descendit à la forteresse. '
  '18':
  - type: note
    content: 'vallée des Rephaïtes  : au sud-ouest de Jérusalem ; voir Jos 15.8 ; 18.16 ; 1Ch 11.15.'
  - type: text
    content: 'Les Philistins arrivèrent et se déployèrent dans la vallée des Rephaïtes. '
  '19':
  - type: note
    content: interrogea le Seigneur 1S 22.10+. –  Me les livreras-tu ? cf. 1S 14.12+.
  - type: text
    content: 'David interrogea le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Dois-je attaquer les Philistins ? Me les livreras-tu ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à David : Vas-y, car je te livrerai les Philistins. '
  '2':
  - type: note
    content: 'toujours  : litt. même hier, même avant-hier, cf. 3.17+. –  qui menais Israël en campagne…  : litt. qui faisais sortir et rentrer Israël  ; cf. 1S 18.13n-16. –  feras paître  : cf. 7.8 ; Es 40.11. –  chef  : cf. 1S 9.16n.'
  - type: text
    content: 'Déjà, lorsque Saül était notre roi, c''était toujours toi qui menais Israël en campagne et qui l''en ramenais. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' t''a dit : « C''est toi qui feras paître Israël, mon peuple, c''est toi qui seras chef sur Israël. » '
  '20':
  - type: note
    content: 'a ouvert une brèche  : autre traduction a fait voler en éclats mes ennemis  ; cf. Jg 21.15n. Baal-Peratsim est ici interprété au sens de Maître des brèches (ou des éclatements). Es 28.21 fait allusion à cette victoire de David.'
  - type: text
    content: 'David arriva à Baal-Peratsim, où il les battit. Puis il dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ouvert une brèche devant moi dans les rangs de mes ennemis, comme une brèche ouverte par les eaux. C''est pourquoi on a appelé ce lieu du nom de Baal-Peratsim (« Maître des brèches »). '
  '21':
  - type: note
    content: 'leurs idoles  : LXX a traduit leurs dieux  ; en 1S 4.11, les Israélites se sont de même fait prendre le coffre de l''alliance, qu''ils avaient emmené avec eux sur le champ de bataille. – Au lieu de David et ses hommes les emportèrent, le texte parallèle de 1Ch 14.12 dit David ordonna de les jeter au feu  ; un ms de LXX ajoute ces mêmes mots à la fin du présent v.'
  - type: text
    content: Ils abandonnèrent là leurs idoles, et David et ses hommes les emportèrent.
  '22':
  - type: text
    content: 'Les Philistins partirent de nouveau à l''attaque et se déployèrent dans la vallée des Rephaïtes. '
  '23':
  - type: note
    content: 'Tu n''attaqueras pas signifie ici ne les attaque pas de front. –  mûriers  : l''espèce d''arbre mentionnée en hébreu n''est pas identifiée avec certitude.'
  - type: text
    content: 'David interrogea le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui dit : Tu n''attaqueras pas ; prends-les à revers, et tu arriveras sur eux en face des mûriers. '
  '24':
  - type: note
    content: 'un bruit de pas  : cf. Gn 3.8 ; 2R 6.32 ; 7.6. –  qui se met en campagne  : cf. Jg 2.15n  ; 1S 8.20n  ; 18.5n.'
  - type: text
    content: 'Quand tu entendras un bruit de pas dans les cimes des mûriers, alors dépêche-toi, car c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui se met en campagne devant toi pour battre les troupes des Philistins. '
  '25':
  - type: note
    content: 'Guéba  : voir 1S 13.3n  ; LXX Gabaon, cf. 1Ch 14.16. –  Guézer  : voir Jg 1.29+.'
  - type: text
    content: 'David fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui avait ordonné ; il battit les Philistins depuis Guéba jusqu''à Guézer.'
  '3':
  - type: note
    content: 'tous les anciens d''Israël précise, par rapport au v. 1, que ce sont en fait les représentants de toutes les tribus d''Israël qui viennent trouver David. –  conclut une alliance… devant le Seigneur  : cf. 1S 23.18 ; 2R 11.17. –  Ils conférèrent l''onction à David  : cf. 2.4.'
  - type: text
    content: 'Ainsi tous les anciens d''Israël vinrent auprès du roi à Hébron, et le roi David conclut une alliance pour eux à Hébron, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . Ils conférèrent l'onction à David pour qu'il soit roi sur Israël.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'trente ans  : cf. Gn 41.46 ; Lc 3.23.'
  - type: text
    content: 'David avait trente ans lorsqu''il devint roi ; il régna quarante ans. '
  '5':
  - type: note
    content: Voir 2.11+.
  - type: text
    content: A Hébron il régna sur Juda sept ans et six mois, et à Jérusalem il régna trente-trois ans sur tout Israël et Juda.
  - type: heading
    content: David s'empare de Jérusalem
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les Jébusites (cf. Gn 15.21) étaient les habitants de la région de Jébus, ville forte dont David s''empara et dont il fit sa capitale, sous le nom de Jérusalem ; voir Jos 15.8,63 ; Jg 1.21. –  car même les aveugles… te repousseront  : on a aussi compris le texte comme signifiant à moins que tu ne repousses (ou n''écartes ) les aveugles et les boiteux (ou les infirmes ). Le sens de cette remarque un peu mystérieuse semble être  : la ville est si bien fortifiée que même des infirmes seraient assez forts pour la défendre.'
  - type: text
    content: 'Le roi marcha avec ses hommes contre Jérusalem, contre les Jébusites qui habitaient le pays. Ils dirent à David : Tu n''entreras pas ici, car même les aveugles et les boiteux te repousseront ! ce qui voulait dire : David n''entrera pas ici. '
  '7':
  - type: note
    content: 'forteresse de Sion  : le nom de Sion a d''abord désigné, au sens strict, la forteresse cananéenne prise par David, entre les vallées du Cédron et du Tyropéon ; au sens large il s''applique à l''ensemble de la ville de Jérusalem (cf. 2R 19.31). Il servira également à désigner plus précisément le mont du Temple (cf. Es 2.3 ; Am 1.2 ; voir aussi Rm 11.26 ; Hé 12.22 ; Ap 14.1). Lorsque David s''empara de cette place forte, il lui donna son nom, Ville (ou Cité) de David, v. 9 ; cf. 6.10 ; 1R 2.10.'
  - type: text
    content: 'Mais David prit la forteresse de Sion, c''est-à-dire la Ville de David. '
  '8':
  - type: note
    content: 'Le texte hébreu des v. 8s est difficile à comprendre et a donné lieu à de nombreuses interprétations, déjà dans des versions anciennes et dans le texte parallèle de 1Ch 11.6-8. La phrase de David semble rester en suspens. –  par le tsinnor  : peut-être le passage souterrain reliant la ville à son unique source d''eau potable, à l''extérieur des murailles (voir « Le tsinnor »♦) ; mais le sens du mot hébreu, rare, est incertain ; on pourrait aussi voir dans ces mots la conclusion de la phrase de David  : quiconque battra les Jébusites, qu''il touche le tsinnor (arme ? partie du corps ?) ; la phrase pourrait alors être interprétée comme un serment des guerriers avant la bataille. –  ces boiteux et ces aveugles…  : autre traduction possible quant aux boiteux et aux aveugles, David les déteste ou, selon une autre lecture du texte hébreu traditionnel, ils détestent David. –  dans la Maison  : il s''agit sans doute de la maison de Dieu, c.-à-d. du temple qui sera édifié par Salomon ; les handicapés seraient interdits d''accès au sanctuaire. Lv 21.18 ne prévoit un tel interdit que pour les prêtres handicapés. Cf. Mt 21.14.'
  - type: text
    content: 'David avait dit en ce jour : Quiconque battra les Jébusites et les atteindra par le tsinnor, ces boiteux et ces aveugles détestés de David… – C''est pourquoi l''on dit : L''aveugle et le boiteux n''entreront pas dans la Maison. '
  '9':
  - type: note
    content: 'Ville de David  : cf. v. 7n. –  le Millo (Remblai, terre-plein) : il s''agit sans doute de la dépression que Salomon fera combler (1R 9.15n), entre l''esplanade où sera édifié le temple et l''extrémité sud de la colline, où se dressait la forteresse. –  vers l''intérieur ou vers la maison  : indication topographique peu précise pour nous aujourd''hui ; soit en direction de la forteresse, vers le sud, soit en direction du futur temple, vers le nord.'
  - type: text
    content: 'David s''installa dans la forteresse, qu''il appela Ville de David. David bâtit tout autour, depuis le Millo et vers l''intérieur. '
