  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tous les anciens d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'précise, par rapport au v. 1, que ce sont en fait les représentants de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toutes les tribus d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui viennent trouver David. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'conclut une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: '… devant le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 23.18 ; 2R 11.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils conférèrent '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: ' à David'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.4.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi tous les anciens d''Israël vinrent auprès du roi à Hébron, et le roi David conclut une alliance pour eux à Hébron, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . Ils conférèrent l'onction à David pour qu'il soit roi sur Israël.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trente ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 41.46 ; Lc 3.23.'
      marker-yv: yv-n
    - type: text
      text: 'David avait trente ans lorsqu''il devint roi ; il régna quarante ans. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Voir 2.11+.
      marker-yv: yv-n
    - type: text
      text: A Hébron il régna sur Juda sept ans et six mois, et à Jérusalem il régna trente-trois ans sur tout Israël et Juda.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: David s'empare de Jérusalem
    marker-yv: yv-h
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les Jébusites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Gn 15.21) étaient les habitants de la région de Jébus, ville forte dont David s''empara et dont il fit sa capitale, sous le nom de Jérusalem ; voir Jos 15.8,63 ; Jg 1.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car même les aveugles… te repousseront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on a aussi compris le texte comme signifiant '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à moins que tu ne repousses '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'écartes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les aveugles et les boiteux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les infirmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Le sens de cette remarque un peu mystérieuse semble être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la ville est si bien fortifiée que même des infirmes seraient assez forts pour la défendre.
      marker-yv: yv-n
    - type: text
      text: 'Le roi marcha avec ses hommes contre Jérusalem, contre les Jébusites qui habitaient le pays. Ils dirent à David : Tu n''entreras pas ici, car même les aveugles et les boiteux te repousseront ! ce qui voulait dire : David n''entrera pas ici. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: forteresse de Sion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a d''abord désigné, au sens strict, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la forteresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cananéenne prise par David, entre les vallées du Cédron et du Tyropéon ; au sens large il s''applique à l''ensemble de la ville de Jérusalem (cf. 2R 19.31). Il servira également à désigner plus précisément le mont du Temple (cf. Es 2.3 ; Am 1.2 ; voir aussi Rm 11.26 ; Hé 12.22 ; Ap 14.1). Lorsque David s''empara de cette place forte, il lui donna son nom, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Cité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 9 ; cf. 6.10 ; 1R 2.10.'
      marker-yv: yv-n
    - type: text
      text: 'Mais David prit la forteresse de Sion, c''est-à-dire la Ville de David. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le texte hébreu des v. 8s est difficile à comprendre et a donné lieu à de nombreuses interprétations, déjà dans des versions anciennes et dans le texte parallèle de 1Ch 11.6-8. La phrase de David semble rester en suspens. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par le tsinnor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : peut-être le passage souterrain reliant la ville à son unique source d''eau potable, à l''extérieur des murailles (voir « Le tsinnor »♦) ; mais le sens du mot hébreu, rare, est incertain ; on pourrait aussi voir dans ces mots la conclusion de la phrase de David'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quiconque battra les Jébusites, qu''il touche le tsinnor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(arme ? partie du corps ?) ; la phrase pourrait alors être interprétée comme un serment des guerriers avant la bataille. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ces boiteux et ces aveugles…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quant aux boiteux et aux aveugles, David les déteste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon une autre lecture du texte hébreu traditionnel, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils détestent David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la Maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit sans doute de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Dieu, c.-à-d. du temple qui sera édifié par Salomon ; les handicapés seraient interdits d'accès au sanctuaire. Lv 21.18 ne prévoit un tel interdit que pour les prêtres handicapés. Cf. Mt 21.14.
      marker-yv: yv-n
    - type: text
      text: 'David avait dit en ce jour : Quiconque battra les Jébusites et les atteindra par le tsinnor, ces boiteux et ces aveugles détestés de David… – C''est pourquoi l''on dit : L''aveugle et le boiteux n''entreront pas dans la Maison. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ville de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Millo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Remblai, terre-plein
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : il s''agit sans doute de la dépression que Salomon fera combler (1R 9.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), entre l''esplanade où sera édifié le temple et l''extrémité sud de la colline, où se dressait '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la forteresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vers l''intérieur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vers la maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : indication topographique peu précise pour nous aujourd''hui ; soit en direction de la forteresse, vers le sud, soit en direction du futur temple, vers le nord.'
      marker-yv: yv-n
    - type: text
      text: 'David s''installa dans la forteresse, qu''il appela Ville de David. David bâtit tout autour, depuis le Millo et vers l''intérieur. '
