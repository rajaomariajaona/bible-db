        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Baal-Peratsim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est ici interprété au sens de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Maître des brèches '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des éclatements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ). Es 28.21 fait allusion à cette victoire de David.
      marker-yv: yv-n
    - type: text
      text: 'David arriva à Baal-Peratsim, où il les battit. Puis il dit : Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a ouvert une brèche devant moi dans les rangs de mes ennemis, comme une brèche ouverte par les eaux. C''est pourquoi on a appelé ce lieu du nom de Baal-Peratsim (« Maître des brèches »). '
