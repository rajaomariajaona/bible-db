      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 1-5 ; 2.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des fils et des filles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 3.2 ne mentionnait que des fils ; pourtant la liste qui suit ne contient pas de nom qui soit exclusivement féminin.'
      marker-yv: yv-n
    - type: text
      text: 'David prit encore des concubines et des femmes de Jérusalem, après qu''il fut venu d''Hébron ; des fils et des filles naquirent encore de lui. '
