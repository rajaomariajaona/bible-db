document_id: JDG.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Tout comme le livre de Josué, le livre des Juges raconte l'installation en Canaan. Ce n'est plus une histoire des douze tribus, mais celle de quelques actions notoires qui concernent certaines tribus, jamais toutes, une seule le plus souvent. Toute chronologie, même relative, reste précaire. Tout se passe comme si le narrateur, trop éloigné des faits très anciens qu'il rapporte, ne savait plus lui-même s'ils furent successifs ou concomitants. Cela ne le gêne en rien, car sa préoccupation n'est pas de faire œuvre de chroniqueur, mais plutôt de montrer l'infinie patience de Dieu qui pardonne, intervient, suscite des héros et sauve le peuple.
  - type: text
    content: Des juges qui les sauvaient
  - type: text
    content: 'Les archives s''amoncellent sur la table de l''écrivain biblique. D''emblée le rédacteur les inscrit dans sa perspective propre, en s''attachant à la place et au rôle grandissants de '
  - type: text
    content: Juda
  - type: text
    content: ' et de '
  - type: text
    content: Jérusalem.
  - type: text
    content: ' A grands traits, le récit brosse le tableau de ce qu''en politique on appelle « l''héritage ». Comme toujours, le bilan des prédécesseurs est désastreux. A treize reprises, il est fait mention des Cananéens qui se cramponnaient à leur territoire (Jg 1.27ss ; cf. Jos 16.10 ; 17.12s). Car c''est à partir des manques qu''il deviendra possible, sous David, d''apprécier les gains, comme le souligne l''adage qui conclut le livre des Juges : '
  - type: text
    content: 'En ce temps-là, il n''y avait pas de roi en Israël : chacun faisait ce qui lui convenait'
  - type: text
    content: ' (Jg 21.25 ; cf. 17.6 ; 18.1 et 19.1).'
  - type: text
    content: 'L''avertissement de 2.6–3.6 développe une théologie de l''histoire. Il dénonce les palinodies du peuple saint qui n''en finit pas de se laisser séduire par les idoles. La colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) frappe alors les Israélites en les livrant aux ennemis du dehors. Dans son malheur, Israël trouve néanmoins un recours. Longanime, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vient à nouveau en aide à son peuple : il lui suscite des '
  - type: text
    content: juges
  - type: text
    content: '. Revêtus du souffle divin, ces héros providentiels remportent alors sur le plan militaire les victoires miraculeuses de la foi et rétablissent pour un temps la situation. Le motif central de l''ouvrage est bien résumé en 2.16 : '
  - type: text
    content: Le Seigneur suscita
  - type: text
    content: ' '
  - type: text
    content: des juges
  - type: text
    content: ' '
  - type: text
    content: qui les
  - type: text
    content: ' '
  - type: text
    content: sauvèrent
  - type: text
    content: ' '
  - type: text
    content: de la main de ceux qui les pillaient.
  - type: text
    content: 'Ces juges sont avant tout, au moins pour ceux d''entre eux qui sont considérés comme « grands », des guerriers charismatiques. Ils sont tour à tour appelés '
  - type: text
    content: juges
  - type: text
    content: ' et '
  - type: text
    content: sauveurs.
  - type: text
    content: ' Le livre aurait aussi bien pu s''appeler « Livre des sauveurs ». En effet, s''il est probable que plusieurs ont effectivement rendu la justice, ce n''est pas à ce titre que la Bible parle d''eux. Et n''oublions pas qu''il est aussi des « juges » hors du livre des Juges (Samuel et ses fils, 1S 7.15–8.2).'
  - type: text
    content: Affirmer de ces « juges » qu'ils « jugeaient » (suivant la charmante expression de Ruth 1.1
  - type: text
    content: n
  - type: text
    content: ) revient à dire qu'ils faisaient la guerre et prenaient en main, le temps de rétablir l'ordre, l'administration de leur province (Jg 2.16
  - type: text
    content: n
  - type: text
    content: ). Il est peu probable que l'autorité de ces gouverneurs occasionnels se soit étendue à plus de deux ou trois tribus associées dans un même combat.
  - type: text
    content: Les « grands juges »
  - type: text
    content: 'Il en va des juges comme des rois de France : tous ne furent pas grands. Sont généralement appelés « grands juges » les personnages les plus représentatifs de cette fresque. Souvent on se plaît à en retenir six : Otniel, Ehoud, Débora, Gédéon, Jephté, Samson'
  - type: text
    content: .
  - type: text
    content: 'Hormis la longueur de la narration qui leur est consacrée (à l''opposé des brèves notices sur les petits juges, cf. 3.31 ; 10.1-5 ; 12.8-15), le texte n''apporte que peu d''éléments objectifs pour distinguer les grands juges. Ceux-ci peuvent se signaler par un ou plusieurs des indices suivants :'
  - type: text
    content: '1) ils apparaissent comme des personnages charismatiques : '
  - type: text
    content: Otniel, Gédéon, Jephté et Samson
  - type: text
    content: ' furent investis du '
  - type: text
    content: souffle
  - type: text
    content: ' (ou de l''Esprit*) '
  - type: text
    content: du Seigneur
  - type: text
    content: ' (3.10 ; 6.34 ; 11.29 ; 13.25 ; 14.6,19 ; 15.14) ;'
  - type: text
    content: '2) ce sont des '
  - type: text
    content: sauveurs,
  - type: text
    content: ' c''est-à-dire des libérateurs (3.9,15) ;'
  - type: text
    content: '3) par suite de leur action, '
  - type: text
    content: le pays fut tranquille pendant… ans
  - type: text
    content: ' (3.11,30 ; 5.31 ; 8.28).'
  - type: text
    content: Une galerie de portraits
  - type: text
    content: 'Héros judéen, '
  - type: text
    content: Otniel
  - type: text
    content: ' est le chef de file obligé de cette liste. Neveu et gendre du célèbre Caleb, Otniel est un combattant confirmé, un ancien du front de libération, conquérant de Debir appelée plus tard '
  - type: text
    content: Qiriath-Sépher,
  - type: text
    content: ' la « cité administrative » (1.11s). Ce personnage est un « juge-sauveur » (3.8ss) qui secoue le joug de l''oppression, difficile à circonscrire, de Koushân-Rishéatayim (« Koushân-le-Très-Méchant ? »), peut-être un petit despote madianite (voir Ha 3.7'
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: '« Comme bien des gens adroits, '
  - type: text
    content: Ehoud
  - type: text
    content: ' est un gaucher » : tel est à peu près le jeu de mots sur '
  - type: text
    content: benjaminite
  - type: text
    content: ' (qui étymologiquement pourrait signifier « droitier », cf. 3.15'
  - type: text
    content: n
  - type: text
    content: ) construit par le narrateur pour donner un indice de lecture affûtant la curiosité sur l'anecdote qui va suivre.
  - type: text
    content: 'Toute l''histoire repose en effet sur la particularité physique de ce '
  - type: text
    content: sauveur
  - type: text
    content: ' qui parvient, grâce à elle, à perpétrer un attentat politique sur la personne du grotesque Eglôn. Ce roi de Moab qui trône, semble-t-il, sur sa chaise percée est ainsi traîtreusement supprimé. La bouffonnerie du récit annonce déjà les facéties de Samson — et rappelle les bonnes histoires que l''on conte sur l''ennemi en temps de guerre, pour soutenir le moral des troupes.'
  - type: text
    content: 'Le mouvement de détachements israélites vers les gués du Jourdain, après le succès de l''opération, montre que l''on est en présence d''une action de guerre non dépourvue de sens tactique. Mais la '
  - type: text
    content: trompe
  - type: text
    content: ' (hébreu '
  - type: text
    content: shophar,
  - type: text
    content: ' 3.27) qui les alerte est aussi un instrument liturgique ; elle évoque d''autres événements significatifs qui eurent lieu dans ces mêmes parages (cf. Jos 6).'
  - type: text
    content: 'La bataille de Taanak, racontée deux fois (Jg 4 et 5), met en scène trois héros. Une solide tradition de louange se porte tout de suite vers '
  - type: text
    content: Débora
  - type: text
    content: '. A lire attentivement les deux récits, on verra que l''action de Débora est indissociable de celle du général '
  - type: text
    content: Baraq
  - type: text
    content: ' — et de celle de '
  - type: text
    content: Yaël,
  - type: text
    content: ' une aventurière au service de la bonne cause et dont la tradition n''hésite pas à dire qu''elle est '
  - type: text
    content: bénie entre les femmes
  - type: text
    content: ' (5.24)'
  - type: text
    content: .
  - type: text
    content: La réputation de Débora, la Jeanne d'Arc de la Bible, dépasse toutes les autres. Son principal titre de gloire est d'être parvenue à mobiliser, contre l'ennemi philistin et ses chars de guerre, la coalition d'une dizaine de tribus. On s'accorde à y reconnaître la préfiguration de l'unité nationale qui se réalisera pleinement sous David. La tenue littéraire du poème épique dit « cantique de Débora » (qui, selon le v. 1, est aussi chanté par Baraq louant sa compagne de combat, cf. v. 12) n'a fait qu'ajouter à ce renom.
  - type: text
    content: 'L''histoire de '
  - type: text
    content: Gédéon,
  - type: text
    content: ' ce paysan qui refusa d''être roi (8.23), débute par une révélation divine qui rappelle celle du buisson ardent (chap. 6). Elle s''épanouit dans une série d''actions d''éclat où le monothéisme intrépide du héros lui vaut un nouveau nom, '
  - type: text
    content: Yeroub-Baal,
  - type: text
    content: ' pris au sens d''un défi : « Que Baal se défende lui-même ! » Le dieu Baal* n''a plus qu''à bien se tenir (6.32).'
  - type: text
    content: 'Gédéon est la figure accomplie de l''idéal chevaleresque du juge au noble cœur qui, d''un bout à l''autre du livre, habite cette geste. Avec lui se profile aussi nettement le double aspect de ces personnages, prophètes autant que chefs de guerre. Admirable meneur d''hommes, Gédéon parviendra à réaliser la coalition de quatre tribus : Aser, Zabulon, Nephtali et la sienne propre, Manassé. Le combat nocturne qu''il organise contre les positions madianites, avec une poignée d''hommes, ravit aussi bien l''expert en combat d''infanterie que le théologien heureux de lire dans cette victoire la seule action de Dieu. Les deux analyses sont vraies : Dieu a besoin des hommes et, dans sa souveraine liberté, il suscite ceux qu''il veut pour les attacher à sa cause, afin qu''ils remportent en son nom les victoires de la foi.'
  - type: text
    content: 'Les colons éphraïmites de Transjordanie sont persécutés par les Philistins et les Ammonites. Ces derniers s''enhardissent jusqu''à franchir le Jourdain pour venir provoquer les tribus de Juda, de Benjamin et d''Ephraïm sur leur propre terrain (10.8s). Au terme de dix-huit années de misère, une assemblée intertribale se tient à Mitspa pour trouver une solution. Les anciens de Galaad se tournent alors vers un marginal, fils d''une prostituée et d''un notable local : '
  - type: text
    content: Jephté
  - type: text
    content: ' (11.1). Rejeté par ses frères et devenu bandit de grand chemin, il répandait la terreur dans les campagnes à la tête d''une bande de mauvais garçons.'
  - type: text
    content: 'Jephté accepte de devenir le '
  - type: text
    content: qatsîn,
  - type: text
    content: ' le '
  - type: text
    content: capitaine
  - type: text
    content: ' des Galaadites, à condition de rester leur chef une fois la victoire remportée (11.6,9,11). Il envoie alors des messagers aux Ammonites (à moins que ce ne soit aux Moabites, 11.15,22'
  - type: text
    content: n
  - type: text
    content: ',24'
  - type: text
    content: n
  - type: text
    content: ') pour leur déclarer la guerre. Et solennellement il se lie par un serment horrible : à la manière des Moabites (cf. 2R 3.27) il offrira en holocauste quiconque sortira de sa maison à son retour victorieux, fût-ce son serviteur, sa femme ou sa fille. Las, ce fut sa fille, autre Iphigénie, offerte par l''inconscience de ce père trop épris de sa cause pour épargner son propre cœur. Il y a dans cette histoire quelque chose de fruste et de grand qui force le respect, même si les motivations nous échappent parce que notre code de l''honneur ne sait plus les rejoindre… Et depuis ce temps-là, dit-on, les jeunes filles d''Israël s''en vont chaque année pleurer sur les montagnes la fille de Jephté et sa vie inaccomplie (v. 38 et 40).'
  - type: text
    content: 'La jalousie des Ephraïmites est à l''origine d''une seconde campagne. Furieux de n''avoir pas été associés à la mobilisation contre les Ammonites, ils attaquent Jephté. Ils sont battus. Leurs fuyards, trahis par une particularité dialectale, sont exécutés. C''est l''affaire du '
  - type: text
    content: shibboleth
  - type: text
    content: ' (12.6), qui aboutit à un massacre.'
  - type: text
    content: Samson, l'enfant du miracle
  - type: text
    content: 'L''annonciation à Manoah et à son épouse, les futurs parents de '
  - type: text
    content: Samson
  - type: text
    content: ', illustre un genre biblique intéressant. Les récits d''envoi en mission de Moïse (Ex 3ss), de Gédéon (Jg 6), mais aussi d''Esaïe (Es 6) ou de Jérémie (Jr 1), et même l''annonce faite à Marie (Lc 1), en sont très proches. On y retrouve une parole de Dieu ou de son messager (ou ange*), souvent des réticences vaincues par des signes et finalement une « conversion » qui met le personnage en marche vers son destin de sauveur.'
  - type: text
    content: 'Juges 13 est un récit plein de finesse, d''humanité et de confiance en Dieu. Le nom de l''enfant du miracle, '
  - type: text
    content: Samson,
  - type: text
    content: ' est dérivé du mot '
  - type: text
    content: shémesh
  - type: text
    content: ' qui désigne le soleil et n''est peut-être pas sans lien avec les cultes solaires encore attestés dans le pays par le nom de la ville-sanctuaire de Beth-Shémesh (« Maison du Soleil »), toute proche de Tsorea où débute notre épopée (voir la carte p.${Xcartjg}).'
  - type: text
    content: Samson est un personnage déconcertant. A la différence des autres juges, il ne lève aucune armée ni ne gouverne qui que ce soit. Toujours, il agit seul. Et cette action, pour glorieuse qu'elle soit, ne laisse pas de chiffonner les lecteurs bien pensants. Car c'est un joyeux drille qui ridiculise l'adversaire par quantité d'actes bouffons autant que téméraires.
  - type: text
    content: 'Manifestement, son épopée est stylisée : les traits grossis jusqu''à la caricature opposent le charisme du nazir (13.5,13,14,24 ; 14.6,19 ; 15.14 ; 16.17) à la perfidie des femmes étrangères (il en rencontre au moins trois dans le fil du récit) et à la félonie des Philistins. Dans ces exploits la puissance du souffle divin se traduit en force musculaire : véritable Hercule, Samson va devenir une sorte de héros national dont la renommée s''étendra bien au-delà du groupuscule danite. Jusqu''à la consommation des siècles on parlera de ce héros qui à mains nues déchire un lion (14.6), défie trente hommes par des énigmes introuvables (14.15), attrape trois cents renards et s''en sert pour mettre le feu aux blés des Philistins (15.4), brise tous les liens, assomme un millier d''hommes avec une mâchoire d''âne (15.16), effondre enfin le temple de Dagôn dont il démolit les colonnes maîtresses (16.29). La puissance littéraire de la geste prend ici le pas sur l''anecdote. Son pouvoir évocateur outrepasse les contingences matérielles pour camper aux yeux des croyants la figure emblématique du nazir, cet élu sans mérite propre, mais que la force de Dieu contraint à accomplir des prodiges qui sont semence d''espoir.'
  - type: text
    content: Les « petits juges »
  - type: text
    content: 'D''une manière générale on appelle petits juges ceux dont nous ne savons rien, ou presque. Le souvenir détaillé de leurs actions n''est pas demeuré vivace ; des documents ont pu, ici comme souvent, être perdus avant la rédaction du livre biblique des Juges. Quoi qu''il en soit, certains apparaissent plutôt comme des résistants menant une vie rude faite de privations et d''actes de courage, dans un pays soumis à l''insécurité et à l''anarchie : on pense à '
  - type: text
    content: Shamgar
  - type: text
    content: ' pilotant ses groupes dans les chemins de traverse pour éviter les patrouilles philistines (suivant 5.6 ; cf. 3.31). De '
  - type: text
    content: Tola
  - type: text
    content: ' d''Issacar on ignore tout (10.2). Ses collègues '
  - type: text
    content: Yaïr
  - type: text
    content: ' le Galaadite (ou le Gadite, Galaad n''étant normalement pas une tribu mais un territoire, 10.3), '
  - type: text
    content: Ibtsân
  - type: text
    content: ' de Zabulon et '
  - type: text
    content: Abdôn
  - type: text
    content: ' l''Ephraïmite sont tous trois des dignitaires campagnards à la progéniture nombreuse. Le premier s''enorgueillissait d''avoir trente fils, le second trente fils et autant de filles, tandis que le troisième comptait quarante fils et trente petits-fils à qui il avait procuré, folie de nouveau riche, soixante-dix ânons ! Avec eux, il faut citer, à nouveau pour la tribu de Zabulon, le juge'
  - type: text
    content: Elôn
  - type: text
    content: .
  - type: text
    content: Abimélek
  - type: text
    content: ' n''est pas à proprement parler un juge. Pour autant, son rôle n''en est pas moins considérable dans cette phase de réflexion préparatoire à l''avènement de la monarchie israélite.'
  - type: text
    content: Abimélek entre en scène à Sichem, l'antique cité cananéenne (Gn 34). Après la mort de Gédéon (8.33) s'ouvre une lamentable lutte pour la succession. Gédéon avait refusé d'être roi (8.23), mais Abimélek, l'un de ses nombreux fils, ne partage pas ce point de vue. Avec un art politique si consommé qu'on le compare parfois au « tyran » du VIII
  - type: text
    content: e
  - type: text
    content: ' livre de '
  - type: text
    content: La République
  - type: text
    content: ' de Platon, cet individu parvient à séduire ses oncles maternels (8.1), en leur faisant observer que l''oligarchie n''est pas un régime efficace, et qu''ils se trouveraient bien de le mettre, lui, à leur tête à eux tous. Ce qu''ils font en effet. Sur quoi le nouveau '
  - type: text
    content: roi
  - type: text
    content: ' se livre à tous les excès qu''on peut attendre d''un monarque absolu. Comme premier acte de gouvernement, il se constitue une garde prétorienne de baroudeurs qui lui assureront l''impunité. Avec eux il perpètre un carnage où tous ses frères ('
  - type: text
    content: soixante-dix
  - type: text
    content: ' moins un) sont assassinés. Ainsi Abimélek pense-t-il se prémunir contre toute querelle ultérieure de légitimité : lui-même était un bâtard (8.31).'
  - type: text
    content: 'La fable de '
  - type: text
    content: Jotam
  - type: text
    content: ', où les arbres qui se cherchent un roi élisent finalement le buisson d''épines d''où jaillira un feu qui les embrasera tous, est une puissante prémonition des événements à venir : révolte des notables grugés, et incendie de Sichem par Abimélek (Jg 9.20 ; cf. v. 23-49).'
  - type: text
    content: 'Annexes : la migration de Dan et le crime de Benjamin'
  - type: text
    content: Le territoire attribué aux Danites entre la montagne d'Ephraïm et la Méditerranée ne fut jamais conquis. Les Philistins déjà bien implantés dans le pays s'y opposèrent. Et les exploits individuels d'un Samson ne changeaient rien à l'affaire. Les clans danites durent alors aller chercher fortune ailleurs, très loin au nord, dans le territoire notoirement mal défendu des Sidoniens (Jg 18.10,27s). Les péripéties qui accompagnent le récit de la prise de Laïsh donnent de la religion d'Israël dans cette période une image colorée, mais assez déconcertante. Le narrateur s'en excuse en rappelant qu'il n'y avait pas encore de roi en Israël à ce moment-là. Cela jette une lumière particulière sur le rôle ultérieur de la monarchie comme garante de l'orthodoxie du culte.
  - type: text
    content: 'Les histoires de lévites racontées en Juges chap. 17–21 relèvent probablement de la catéchèse populaire. Les conteurs prennent les gens là où ils sont, avec une simplicité qui n''est pas à confondre avec de la naïveté. L''histoire du jeune lévite Mika, qui vole l''argent de sa mère avant de devenir serviteur de Dieu pour racheter sa faute par l''usage de '
  - type: text
    content: l'éphod
  - type: text
    content: ' et des '
  - type: text
    content: téraphim
  - type: text
    content: ' (17.5 ; 18.17,18,20,24), est rattachée, non sans malice, à l''histoire des origines du sanctuaire de Dan, où s''érigera l''un des deux veaux d''or au moment de la révolution cultuelle de Jéroboam (1R 12.28). A une époque ultérieure, ces souvenirs des temps anciens, avec leurs leçons éternelles sur l''intégrité de la foi, pouvaient paraître pleins de sel.'
  - type: text
    content: 'L''affaire du '
  - type: text
    content: lévite d'Ephraïm
  - type: text
    content: ' (chap. 21) est d''abord la touchante histoire d''un couple séparé par une scène de ménage, puis celle de cinq merveilleuses journées de retrouvailles, à Beth-Léhem, grâce à l''hospitalité bienveillante du père de la jeune femme. Enfin l''on se remet en route pour rejoindre Ephraïm. L''idylle alors tourne à l''horreur. Les habitants — ou du moins les hooligans — de Guibéa de Benjamin, la ville d''étape, rançonnent les hôtes d''une manière qui le dispute en infamie à Sodome. Mais le narrateur a hâte d''en venir aux conséquences, à l''expédition punitive levée dans tout Israël par le message incontournable de la femme coupée en morceaux. En son temps le roi Saül usera d''un signal analogue pour mobiliser Israël au secours de la petite cité transjordanienne de Yabesh de Galaad (1S 11.2-7).'
  - type: text
    content: 'La '
  - type: text
    content: guerre civile
  - type: text
    content: ' qui s''ensuit est extrêmement rude et Benjamin, fort de ses troupes d''élite et de son organisation militaire (20.14ss), peut croire dans les débuts que le sort des armes lui restera favorable. Mais au terme d''une campagne de plusieurs mois (20.47s) l''affaire tourne au génocide. Au point que les survivants de ce sombre épisode devront enlever des jeunes filles, telles les fameuses Sabines des débuts de Rome, afin de repeupler le pays.'
  - type: text
    content: 'L''ère des Juges prendra fin avec le ministère du grand Samuel. Par ses mains, un Benjaminite sera sacré roi : il aura nom '
  - type: text
    content: Saül,
  - type: text
    content: ' « le demandé ». Et, de cette même tribu, naîtra un jour un autre Saül ou Saul qui deviendra l''apôtre Paul. La réinsertion de Benjamin dans le tissu social d''Israël aura été bien réussie !'
