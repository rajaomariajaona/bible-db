document_id: 2PE.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 'Syméon  : cette transcription, moins courante en grec que Simon ( Simon apparaît ici dans certains mss), est plus proche de la forme originale (sémitique) du nom (de même en Ac 15.14n). –  esclave  : autre traduction serviteur  ; Rm 1.1 ; Jc 1.1 ; Jd 1. –  apôtre ou envoyé , cf. Ga 1.1n. –  une foi de même prix  : cf. Ac 10.34 ; 11.17 ; Rm 1.12. – Voir justice . –  notre Dieu et Sauveur (v. 11 ; 2.20 ; 3.2,18) : on pourrait aussi traduire de notre Dieu et du sauveur…  ; cf. 2Th 1.12 ; Tt 2.13 ; voir aussi Jn 20.28 ; Rm 9.5 ; 2Tm 1.10+ ; Hé 1.8. –  Christ  : voir onction.'
  - type: text
    content: 'Syméon Pierre, esclave et apôtre de Jésus-Christ, à ceux qui ont reçu en partage une foi de même prix que la nôtre, par la justice de notre Dieu et Sauveur Jésus-Christ : '
  '10':
  - type: note
    content: 'efforcez-vous v. 5n  ; certains mss ajoutent par [vos] belles œuvres. –  de confirmer  : autres traductions d''affermir ; de rendre certain (v. 19 ; Rm 4.16n). –  appel / choix  : cf. Mt 22.14 ; Ap 17.14 ; voir aussi Ph 2.12s. –  trébucherez  : cf. Jc 2.10n  ; voir aussi Jd 24.'
  - type: text
    content: 'Aussi, mes frères, efforcez-vous d''autant plus de confirmer l''appel qui vous a été adressé et le choix dont vous avez été l''objet. Si vous faites cela, vous ne trébucherez jamais. '
  '11':
  - type: note
    content: 'largement  : litt. richement, cf. Col 3.16n  ; 1Tm 6.17 ; Tt 3.6. –  accordée v. 5n. –  l''entrée… Mt 7.21 ; 18.3 ; 19.23s/ / ; Jn 3.5. –  royaume éternel  : cf. Lc 1.33 ; Hé 1.8 ; Ap 1.5s ; voir aussi Ep 1.5 ; Col 1.13. –  Seigneur / Sauveur  : cf. 1.1n.'
  - type: text
    content: C'est ainsi que vous sera largement accordée l'entrée dans le royaume éternel de Jésus-Christ, notre Seigneur et Sauveur.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'rappeler Rm 15.15 ; 1Co 4.17 ; 2Tm 2.14 ; Tt 3.1 ; Jd 5,17. –  vous les sachiez  : cf. 1Jn 2.21. –  affermis 1P 5.10. –  la vérité présente ou advenue, établie  ; même terme au v. 9 ; un terme apparenté est traduit par avènement au v. 16 ; cf. Col 1.5s (le même terme décrit la bonne nouvelle parvenue à Colosses).'
  - type: text
    content: 'Voilà pourquoi je vais toujours vous rappeler ces choses, bien que vous les sachiez et que vous soyez affermis dans la vérité présente. '
  '13':
  - type: note
    content: 'Voir justice. –  cette tente (même mot au v. 14 et en Ac 7.46) : cf. 2Co 5.1ss (terme apparenté). –  éveil / rappels 3.1 ; cf. Mt 13.34/ /.'
  - type: text
    content: 'J''estime juste, aussi longtemps que je suis dans cette tente, de vous tenir en éveil par ces rappels, '
  '14':
  - type: note
    content: 'comme notre Seigneur… Jn 21.18s ; cf. Ac 20.23,25 ; 21.11 ; 23.11 ; 27.23s. –  me l''a… appris  : le même verbe est traduit par désigner en 1P 1.11. –  me défaire ou me séparer  ; le terme correspondant évoque peut-être, outre l''image de la tente, celle du vêtement qu''on enlève ; autre métaphore en 2Tm 4.6. –  imminent  : cf. 2.1n.'
  - type: text
    content: 'car je sais bien, comme notre Seigneur Jésus-Christ me l''a lui-même appris, que le moment où je vais me défaire de cette tente est imminent. '
  '15':
  - type: note
    content: 'mon départ  : le terme grec correspondant a donné notre mot exode, cf. Lc 9.31n  ; Hé 11.22.'
  - type: text
    content: Mais je m'efforcerai de faire en sorte qu'après mon départ vous puissiez en toute occasion vous souvenir de tout cela.
  - type: heading
    content: Nous avons vu sa gloire
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'suivant 2.2,15. –  des fables  : le mot grec a donné mythe  ; cf. 1Tm 1.4 ; 4.7 ; 2Tm 4.4 ; Tt 1.14. –  la puissance et l''avènement  : autre traduction l''avènement puissant  ; cf. Mt 24.3n. –  témoins oculaires  : le terme grec correspondant n''apparaît qu''ici dans le N.T. ; cf. Lc 1.2 ; Jn 1.14 ; 2.11 ; Ac 1.21s ; 4.20 ; 10.39-41 ; 1Co 15.5 ; 1Jn 1.1ss. –  sa grandeur Lc 9.43.'
  - type: text
    content: 'Ce n''est pas, en effet, en suivant des fables habilement conçues que nous vous avons fait connaître la puissance et l''avènement de notre Seigneur Jésus-Christ, mais parce que nous avons été témoins oculaires de sa grandeur ; '
  '17':
  - type: note
    content: 'Cf. Mt 17.1ss/ /. –  honneur et gloire 1P 1.7+. –  Fils bien-aimé  : Mt 3.17/ / ; 17.5/ / ; Col 1.13. –  c''est en lui…  : autre traduction c''est sur lui que j''ai porté mon choix  ; Mt 3.17/ / ; 17.5/ /.'
  - type: text
    content: 'car il a reçu honneur et gloire de Dieu, le Père, quand la voix vint à lui de la gloire magnifique : « Mon Fils bien-aimé, c''est lui ; c''est en lui que, moi, j''ai pris plaisir. » '
  '18':
  - type: note
    content: 'montagne sacrée ou sainte  : cf. Es 2.2s ; 11.9 ; Za 14.4 ; Ps 2.6+ ; Dn 9.16.'
  - type: text
    content: 'Nous avons nous-mêmes entendu cette voix venue du ciel lorsque nous étions avec lui sur la montagne sacrée. '
  '19':
  - type: note
    content: 'd''autant plus (autre traduction tout à fait) ferme ou confirmée (v. 10) ; cf. Rm 4.16n  ; Hé 2.2n. –  parole prophétique ou parole des prophètes  : cf. 3.15s ; Ac 3.24. –  comme à une lampe…  : cf. Mt 5.15 ; Jn 1.5 ; Rm 13.11ss ; 4 Esdras 12.42 : « De tous nos prophètes, tu (Esdras) es le seul qui nous reste, comme une grappe de la vigne, comme une lampe en un lieu obscur, comme un havre de salut pour le vaisseau dans la tempête. » –  l''étoile du matin Ap 2.28 ; 22.16 ; cf. Lc 1.78. – Voir cœur.'
  - type: text
    content: 'Et nous estimons d''autant plus ferme la parole prophétique, à laquelle vous faites bien de prêter attention comme à une lampe qui brille dans un lieu obscur, jusqu''à ce que le jour commence à poindre et que l''étoile du matin se lève dans votre cœur. '
  '2':
  - type: note
    content: 'Que la grâce et la paix… Rm 1.27+. –  connaissance  : le terme grec épignosis (ici, v. 3,8 ; 2.20s), dérivé du mot plus courant gnosis (1.5s ; 3.18), est peut-être employé dans l''épître au sens de vraie connaissance, par opposition à des pseudo-savoirs ; voir aussi Col 1.9ns ; 1Tm 2.4n.'
  - type: text
    content: Que la grâce et la paix vous soient multipliées par la connaissance de Dieu et de Jésus, notre Seigneur !
  - type: heading
    content: Efforcez-vous de confirmer l'appel que vous avez reçu
  '20':
  - type: note
    content: 'Vous savez…  : autre traduction sachez…  ; cf. 3.3. –  aucun message…  : litt. aucune prophétie de l''Ecriture. –  ne relève  : autre traduction possible ne résulte. –  interprétation particulière ou privée  : cf. Mc 4.34.'
  - type: text
    content: 'Vous savez, avant tout, qu''aucun message de prophète, dans l''Ecriture, ne relève d''une interprétation particulière. '
  '21':
  - type: note
    content: 'Cf. Jr 23.16 ; Za 7.12 ; Ac 3.21s ; 28.25 ; 2Tm 3.16 ; Hé 1.1 ; 1P 1.11. – Voir Esprit. –  des humains  : certains mss portent de saints hommes.'
  - type: text
    content: 'En effet, aucun message de prophète n''a jamais été apporté par une volonté humaine : c''est portés par l''Esprit saint que des humains ont parlé de la part de Dieu.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'appelés…  : cf. v. 7 ; 2Co 4.4,6 ; 1P 2.9 ; 5.10. – Voir gloire . –  force  : le même terme, traditionnellement rendu par vertu , reviendra au v. 5 au sens de force morale  ; en 1P 2.9n, au pluriel, il est traduit par hauts faits.'
  - type: text
    content: 'Sa divine puissance nous a donné tout ce qui contribue à la vie et à la piété, en nous faisant connaître celui qui nous a appelés par sa propre gloire et sa propre force. '
  '4':
  - type: note
    content: 'Par celles-ci  : probablement la gloire et la force de la fin du v. 3n. –  promesses  : peut-être au sens de choses promises cf. 3.3-13 ; 2Co 7.1 ; Hé 6.12n. –  précieuses  : un terme apparenté est traduit par honneur au v. 17, cf. 1P 2.4n,7+. –  par elles  : sans doute les promesses. –  échappiez… 2.18,20. –  la pourriture ou la décomposition, la corruption, le dépérissement (2.12,19) / le désir (2.10,18 ; 3.3) : litt. la pourriture qui (est) dans le monde en désir (ou par le désir ; par la convoitise) ; cf. Ep 4.22 ; 1P 1.4+,14 ; 1Jn 2.16s. –  vous ayez part à  : le terme correspondant est apparenté au mot habituellement traduit par communion ou solidarité 1P 4.13n. –  nature divine  : cf. Ac 17.29.'
  - type: text
    content: Par celles-ci, les promesses les plus précieuses et les plus grandes nous ont été données, afin que par elles vous échappiez à la pourriture que le désir entretient dans le monde et que vous ayez part à la nature divine.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tous vos efforts  : un verbe apparenté est traduit par s''efforcer aux v. 10,15 ; 3.14 ; expression analogue en Jd 3. –  joindre ou ajouter , même verbe au v. 11 ( accorder ). –  force morale v. 3n  ; même terme en Ph 4.8 ( ce qui est moralement bon ) ; cf. Ga 5.6,22+ ; 1Tm 6.11.'
  - type: text
    content: 'Pour cette raison même, faites tous vos efforts pour joindre à votre foi la force morale, à la force morale la connaissance, '
  '6':
  - type: note
    content: maîtrise de soi Ac 24.25 ; Ga 5.23 ; Tt 1.8 ; cf. 1Co 9.25. –  persévérance ou endurance Lc 21.19 ; Rm 2.7n  ; 2Co 1.6n  ; Hé 10.36 ; 12.1ss. –  piété v. 3 ; 2.9 ; 3.11 ; Ac 10.2+ ; 1Tm 2.2+.
  - type: text
    content: 'à la connaissance la maîtrise de soi, à la maîtrise de soi la persévérance, à la persévérance la piété, '
  '7':
  - type: note
    content: 'affection fraternelle  : cf. Rm 12.10+ ; 1P 1.22 ; 3.8. –  l''amour  : cf. 1Co 13.13 ; 2Co 8.7 ; Col 3.14 ; voir aussi Ga 6.10 ; 1Th 3.12.'
  - type: text
    content: 'à la piété l''affection fraternelle, à l''affection fraternelle l''amour. '
  '8':
  - type: note
    content: 'ces qualités  : litt. ces choses. –  foisonnent Rm 5.20n. –  laissent  : autre traduction laisseront. –  sans fruit  : autre traduction stériles  : cf. Mc 4.19/ / ; Tt 3.14+. –  connaissance v. 2n.'
  - type: text
    content: 'En effet, si ces qualités sont en vous et y foisonnent, elles ne vous laissent pas sans activité ni sans fruit pour la connaissance de notre Seigneur Jésus-Christ ; '
  '9':
  - type: note
    content: 'aveugle  : cf. Mt 15.14 ; 23.16 ; Jn 9.39ss ; voir aussi Dt 28.28s ; 1Jn 2.9ss. –  il a les yeux fermés ou il cligne des yeux  ; le verbe grec correspondant a donné le mot myopie. –  il oublie  : autre traduction il a laissé tomber dans l''oubli. –  purification de ses péchés 2.20 ; Ac 22.16 ; 1Co 6.11 ; Ep 5.26 ; Tt 3.5 ; 1P 3.21. –  autrefois  : cf. Rm 3.25 ; Ep 2.2 ; 1P 1.14 ; 4.3.'
  - type: text
    content: 'mais celui chez qui elles ne sont pas présentes est un aveugle ; il a les yeux fermés, il oublie la purification de ses péchés d''autrefois. '
