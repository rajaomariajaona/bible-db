  - type: text
    text: 'Et nous estimons d''autant plus ferme la parole prophétique, à laquelle vous faites bien de prêter attention comme à une lampe qui brille dans un lieu obscur, jusqu''à ce que le jour commence à poindre et que l''étoile du matin se lève dans votre cœur. '
