      - type: text
        text: '12.42 : « De tous nos prophètes, tu (Esdras) es le seul qui nous reste, comme une grappe de la vigne, comme une lampe en un lieu obscur, comme un havre de salut pour le vaisseau dans la tempête. » –  '
    - type: usfm
