    marker-yv: yv-n
  - type: text
    text: 'Quand ils se mettaient en campagne avec leurs troupeaux et leurs tentes, ils arrivaient comme une multitude de criquets : ils étaient innombrables, eux et leurs chameaux ; ils venaient dans le pays pour le ravager.'
