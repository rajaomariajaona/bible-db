document_id: JDG.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Madiân opprime Israël
  - type: text
    content: ' '
  - type: note
    content: V. 13 ; 2.11+,14. –  Madiân , peuple nomade parfois allié d'Israël (Gn 25.2n  ; Ex 2.15-22 ; 3.1 ; 18.1-12 ; Nb 10.29-32), ici ennemi (Nb 22.4,7 ; 25.6-18 ; 31.1-18 ; Jos 13.21).
  - type: text
    content: 'Les Israélites firent ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les livra à Madiân pour sept ans. '
  '10':
  - type: note
    content: 'Je suis le Seigneur … (voir noms divins) Ex 20.2 ; Lv 18.2,30 ; 19.2,4 etc. – Voir crainte. –  dieux des Amorites  : cf. 2.12n  ; voir Gn 10.16n  ; Jos 24.15. –  pas écouté 2.2+.'
  - type: text
    content: 'Je vous ai dit : « Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu. Vous ne craindrez pas les dieux des Amorites dont vous habitez le pays. » Mais vous ne m''avez pas écouté.'
  - type: heading
    content: Dieu charge Gédéon de sauver Israël
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 3 ; 1S 3 ; Es 6 ; Jr 1 ; Am 7.14s. –  le messager (ou l''ange ) du Seigneur 2.1n  ; cf. 6.14,16,20-23. –  térébinthe  : cf. v. 19 ; 4.5 ; 9.6,37n  ; Gn 12.6 ; 13.18 ; 18.1 ; 21.33 ; 35.4,8 ; Jos 24.26 ; 1S 14.2 ; 22.6 ; 1R 13.14. –  Ophra en Manassé (8.32), au nord de Sichem, à ne pas confondre avec l''Ophra de Benjamin (Jos 18.23). –  l''Abiezrite  : c.-à-d. d''Abi-Ezer , cf. v. 24 ; Jos 17.2n. –  Gédéon Hé 11.32s. – Le pressoir était sans doute taillé dans le rocher, à l''abri des regards de Madiân  ; on battait habituellement le blé sur une aire exposée au vent, et par conséquent visible de loin.'
  - type: text
    content: 'Puis le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' vint s''asseoir sous le térébinthe d''Ophra, qui appartenait à Joas l''Abiezrite. Gédéon, son fils, battait du froment au pressoir pour le mettre à l''abri de Madiân. '
  '12':
  - type: note
    content: 'Le Seigneur est avec toi  : cf. v. 16+,23ns ; Dt 2.7 ; Rt 2.4 ; 2Ch 15.2 ; Lc 1.26-28 ; 2Th 3.16. –  vaillant guerrier 11.1 ; Jos 1.14 ; 6.2 ; 8.3 ; 10.7 ; Rt 2.1n.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui apparut et lui dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec toi, vaillant guerrier ! '
  '13':
  - type: note
    content: 'monter d''Egypte v. 8 ; 2.1+. –  nous a livrés  : expression légèrement différente du v. 1 : ici litt. dans la paume de Madiân, là dans la main.'
  - type: text
    content: 'Gédéon lui dit : Pardon, mon seigneur, mais si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec nous, pourquoi tout cela nous est-il arrivé ? Où sont tous ses actes étonnants que nos pères nous racontent, quand ils disent : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne nous a-t-il pas fait monter d''Egypte ? » Maintenant, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a délaissés, il nous a livrés à Madiân !'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.22 ; 9.17. –  Le Seigneur  : cf. le messager du Seigneur au v. 11+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se tourna vers lui et dit : Va, avec cette force que tu as ; tu sauveras Israël de la main de Madiân ; n''est-ce pas moi qui t''envoie ? '
  '15':
  - type: note
    content: 'Cf. Ex 3.11 ; 1S 9.21 ; 1R 3.7 ; Jr 1.6 ; voir aussi Gn 21.12 ; 25.23 ; 37.7 ; 48.19 ; 1S 10.17-24 ; 16.1-13 ; Mt 19.30 ; 1Co 1.26-31. –  phratrie  : le mot est aussi traduit par millier  ; voir 5.8n  ; Nb 1.16n  ; Mi 5.1n. –  le plus petit ou le cadet, cf. Gn 25.23. –  ma famille  : autre traduction la maison de mon père.'
  - type: text
    content: 'Il lui répondit : Pardon, mon seigneur, mais avec quoi sauverais-je Israël ? Ma phratrie est la plus faible en Manassé, et je suis le plus petit dans ma famille ! '
  '16':
  - type: note
    content: Je serai avec toi cf. v. 12+ ; 2.18 ; comme en Ex 3.12n  ; voir aussi Gn 26.3,24 ; 28.15 ; 31.3 ; Dt 31.23 ; Jos 1.9 ; 3.7 ; Es 41.10 ; Jr 1.8.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Je serai avec toi, et tu battras Madiân comme un seul homme. '
  '17':
  - type: note
    content: 'Voir grâce. –  montre-moi…  : litt. tu feras pour moi un signe que tu parles avec moi  ; cf. v. 21,36-40 ; Gn 15.8 ; Ex 4.1-9 ; 33.16 ; 1R 13.3 ; 2R 20.8-11 ; Es 7.10-14 ; Mt 12.38+.'
  - type: text
    content: 'Il lui répondit : Si j''ai trouvé grâce à tes yeux, je t''en prie, montre-moi par un signe que c''est bien toi qui me parles. '
  '18':
  - type: note
    content: 'offrande  : le terme hébreu peut s''appliquer aussi bien à un sacrifice religieux qu''à un présent profane, cf. 3.15nss ; 13.15-19n  ; Gn 4.3n  ; voir aussi Gn 18.3-7.'
  - type: text
    content: 'Ne bouge pas d''ici, je t''en prie, jusqu''à ce que je revienne auprès de toi, que j''apporte mon offrande et que je la dépose devant toi. Il dit : Je resterai jusqu''à ce que tu reviennes.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'pains sans levain  : cf. Ex 12.8ss ; Lv 2.5.'
  - type: text
    content: 'Gédéon alla préparer un chevreau et fit avec un épha de farine des pains sans levain. Il mit la viande dans une corbeille et le jus dans un pot, puis il les lui apporta sous le térébinthe. '
  '2':
  - type: note
    content: 'Cf. 10.8s ; 1S 13.6 ; Hé 11.38. –  fit sentir son pouvoir  : cf. 3.10n. –  les endroits escarpés  : autre traduction les forteresses, cf. 1S 22.4n.'
  - type: text
    content: 'Madiân fit sentir son pouvoir à Israël. C''est à cause de Madiân que les Israélites aménagèrent dans les montagnes les crevasses, les grottes et les endroits escarpés. '
  '20':
  - type: note
    content: 13.19.
  - type: text
    content: 'Le messager de Dieu lui dit : Prends la viande et les pains sans levain, dépose-les sur ce rocher et répands le jus. Il fit ainsi. '
  '21':
  - type: note
    content: 'un feu  : litt. le feu  ; cf. Ex 3.2-6 ; Lv 9.24 ; 1R 18.38 ; 1Ch 21.26 ; 2Ch 7.1. –  disparut de sa vue  : litt. (s''en) alla de ses yeux.'
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' avança l''extrémité du bâton qu''il avait à la main et toucha la viande et les pains sans levain. Alors du rocher monta un feu qui dévora la viande et les pains sans levain. Et le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' disparut de sa vue. '
  '22':
  - type: note
    content: 'Cf. 13.16-21 ; Gn 18.1-15 ; 32.23-33 ; Jos 5.13-15. –  Seigneur / Seigneur  : hébreu YHWH / ’Adonaï, cf. Ex 3.15n. –  Ah ! comme en 11.35 ; Jos 7.7n.'
  - type: text
    content: 'Gédéon vit que c''était le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Alors Gédéon s''exclama : Ah ! Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! J''ai donc vu le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' face à face ! '
  '23':
  - type: note
    content: 'Sois tranquille  : litt. paix pour toi ! Cf. v. 12+,24 ; 19.20 ; Gn 26.24 ; 43.23 ; Es 41.10,13 ; Jr 30.10 ; Dn 10.19. –  peur  : voir crainte. –  tu ne mourras pas  : cf. 13.22 ; Gn 32.31 ; Ex 3.6 ; 19.21 ; 33.20ss ; Dt 5.24-26 ; Es 6.5.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Sois tranquille, n''aie pas peur ; tu ne mourras pas. '
  '24':
  - type: note
    content: 'un autel  : cf. v. 26 ; voir aussi Gn 33.20 ; 35.7 ; Ex 17.15s ; Jos 8.30 ; 22.34 ; 1S 7.17 ; 14.35. –  YHWH est tranquillité ou paix, cf. v. 23n  ; voir aussi Gn 22.14n.'
  - type: text
    content: 'Gédéon bâtit là un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et l''appela Adonaï-Shalom (« YHWH est tranquillité »). Il est encore à Ophra l''Abiezrite, jusqu''à ce jour.'
  - type: heading
    content: Gédéon démolit l'autel du Baal
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Le soir même  : litt. en cette nuit-là . –  et un second taureau  : certains modifient le texte hébreu traditionnel pour lire, en apposition à la première formule  : (un taureau), le taureau engraissé  ; cf. Lv 1.3 ; Nb 8.12 ; 1S 6.14. –  sept ans  : cf. v. 1 ; voir aussi Ex 13.15. –  Tu raseras (ou renverseras, démoliras )… Ex 34.13 ; Dt 7.5 ; 12.3 ; 2R 11.18 ; 2Ch 34.4. –  Baal  : cf. 2.11n. –  le poteau cultuel (l''ashéra)  : voir 3.7n. –  à côté  : autre traduction dessus.'
  - type: text
    content: 'Le soir même, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Gédéon : Prends le taureau de ton père et un second taureau de sept ans. Tu raseras l''autel du Baal qui appartient à ton père et tu couperas le poteau cultuel (l''ashéra) qui est à côté. '
  '26':
  - type: note
    content: 'selon les règles  : litt. en rang ou dans l''ordre, traduction incertaine ; cf. Ex 20.25. –  un autel  : cf. v. 24. –  holocauste  : voir sacrifices.'
  - type: text
    content: 'Tu bâtiras ensuite selon les règles un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, sur le haut de ce lieu fortifié. Tu prendras le second taureau et tu offriras un holocauste, avec le bois du poteau cultuel que tu auras coupé. '
  '27':
  - type: note
    content: 'sa famille  : autre traduction la maison de son père.'
  - type: text
    content: 'Gédéon prit dix hommes parmi ses serviteurs et fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit ; mais comme il craignait sa famille et les gens de la ville, il ne le fit pas de jour, il le fit de nuit. '
  '28':
  - type: text
    content: 'Lorsque les gens de la ville se levèrent, de bon matin, l''autel du Baal était démoli ; le poteau cultuel qui était à côté avait été coupé, et le second taureau avait été offert en holocauste sur l''autel qui venait d''être bâti. '
  '29':
  - type: text
    content: 'Ils se dirent l''un à l''autre : Qui a fait cela ? Ils s''informèrent, firent des recherches et conclurent : C''est Gédéon, fils de Joas, qui a fait cela ! '
  '3':
  - type: note
    content: 'V. 33 ; 7.12. –  Amalec 3.13+. –  fils de l''Orient  : terme générique qui s''applique à divers peuples nomades à l''est d''Israël ; cf. 7.12 ; 8.10 ; Gn 29.1n  ; Nb 23.7 ; Ez 25.4,10 ; Jb 1.3n. –  l''attaquaient  : litt. montaient sur lui.'
  - type: text
    content: 'Quand Israël avait semé, Madiân, Amalec et les fils de l''Orient l''attaquaient. '
  '30':
  - type: note
    content: Joas v. 11,25.
  - type: text
    content: 'Alors les gens de la ville dirent à Joas : Fais sortir ton fils, et qu''il meure, car il a démoli l''autel du Baal et coupé le poteau cultuel qui était à côté ! '
  '31':
  - type: note
    content: 'Cf. 1R 18.27. –  défendre la cause  : voir v. 32n. –  qu''on a démoli ou qu''il (Gédéon) a démoli.'
  - type: text
    content: 'Joas répondit à tous ceux qui se tenaient près de lui : Est-ce à vous de défendre la cause du Baal ? Est-ce vous qui allez le sauver ? – Quiconque défendra la cause du Baal sera mis à mort avant le matin ! – S''il est dieu, qu''il se défende lui-même, puisque c''est son autel qu''on a démoli ! '
  '32':
  - type: note
    content: 'on donna à Gédéon  : litt. on lui donna. –  Yeroub-Baal (Baal défendra, verbe qui apparaît trois fois au v. 31 ; mais le nom pourrait aussi signifier Baal est grand ou Baal rend grand) ; cf. 7.1 ; 9.1. En 2S 11.21 le nom apparaît sous la forme Yeroub-Bésheth, où le mot traduit par honte est substitué par mépris au nom du Baal.'
  - type: text
    content: 'En ce jour-là on donna à Gédéon le nom de Yeroub-Baal, en disant : Que le Baal se défende contre lui, puisque c''est son autel qu''il a démoli !'
  - type: heading
    content: Gédéon demande à Dieu une garantie
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'V. 3ns. –  fils de l''Orient 6.3n. –  le Jourdain  : sous-entendu dans le texte. –  Jizréel Jos 17.16 ; 19.18.'
  - type: text
    content: 'Tout Madiân, Amalec et les fils de l''Orient se rassemblèrent, passèrent le Jourdain et dressèrent leur camp dans la vallée de Jizréel. '
  '34':
  - type: note
    content: 'revêtu du souffle (ou de l''Esprit) du Seigneur  : cf. 3.10n  ; 1Ch 12.19 ; 2Ch 24.20. –  trompe 3.27+. –  pour appeler…  : litt. et Abiézer fut appelé après lui  ; même formule au v. 34 ; cf. 4.10n  ; 1S 14.20n.'
  - type: text
    content: 'Gédéon fut revêtu du souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il sonna de la trompe pour appeler Abiézer à sa suite. '
  '35':
  - type: note
    content: Cf. 7.23 ; 8.2 ; il s'agit des tribus du nord d'Israël.
  - type: text
    content: Il envoya des messagers dans tout Manassé, pour l'appeler aussi à sa suite. Il envoya des messagers dans Aser, dans Zabulon et dans Nephtali, qui montèrent à leur rencontre.
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 14-16.
  - type: text
    content: 'Gédéon dit à Dieu : Si tu veux sauver Israël par moi, comme tu l''as dit, '
  '37':
  - type: note
    content: 'V. 17+ ; cf. Am 4.7. –  je place  : même verbe en 7.5 ; 8.27.'
  - type: text
    content: 'je place une toison de laine sur l''aire ; s''il y a de la rosée sur la toison seule et que partout ailleurs le sol reste sec, je saurai que tu sauveras Israël par moi, comme tu l''as dit. '
  '38':
  - type: text
    content: 'Il en fut ainsi. Le lendemain, il se leva de bon matin, pressa la toison et fit sortir la rosée de la toison, une pleine coupe d''eau. '
  '39':
  - type: note
    content: 'Ne te mets pas en colère…  : cf. Gn 18.30,32. –  que la toison seule reste sèche  : signe plus étonnant encore que celui du v. 37.'
  - type: text
    content: 'Gédéon dit à Dieu : Ne te mets pas en colère contre moi, je t''en prie ; je ne parlerai plus que cette fois. Je voudrais procéder encore à une épreuve avec la toison : que la toison seule reste sèche et qu''il y ait de la rosée sur le sol partout ailleurs ! '
  '4':
  - type: note
    content: 'jusque vers  : litt. jusqu''à ce que tu arrives à, de même en 11.33. –  Gaza  : la plus méridionale des 5 villes de Philistie, près de la Méditerranée.'
  - type: text
    content: 'Ils dressaient leur camp contre lui, détruisaient la production du pays jusque vers Gaza et ne laissaient en Israël ni vivres, ni petit bétail, ni bœufs, ni ânes. '
  '40':
  - type: text
    content: Dieu fit ainsi cette nuit-là. La toison seule resta sèche et il y eut de la rosée sur le sol partout ailleurs.
  '5':
  - type: note
    content: criquets cf. 7.12 ; Jr 46.23 ; Jl 1.4–2.11 ; Am 7.1s ; Na 3.15.
  - type: text
    content: 'Quand ils se mettaient en campagne avec leurs troupeaux et leurs tentes, ils arrivaient comme une multitude de criquets : ils étaient innombrables, eux et leurs chameaux ; ils venaient dans le pays pour le ravager.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'affaibli  : cf. v. 15 ; 10.9 ; Ps 38.9 ; 2Ch 13.18 ; 28.19. –  crièrent 3.9+.'
  - type: text
    content: 'Israël fut très affaibli par Madiân, et les Israélites crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '7':
  - type: text
    content: 'Lorsque les Israélites crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au sujet de Madiân, '
  '8':
  - type: note
    content: 'envoya un prophète…  : litt. envoya aux fils d''Israël un homme, un prophète  ; cf. v. 11-22 ; 2.1 ; 13.2-24. Sur le contenu du message, voir aussi 2.1-5,12 ; 10.11-14 ; 1S 2.27-36 ; 10.18s ; Es 1.2s ; 5.1-7 ; Os 2.4-15 ; Am 2.6-16 ; 3.1s. –  monter d''Egypte Gn 12.10n. –  la maison des esclaves Ex 13.3+ ; Dt 5.6+ ; Jos 24.17s.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' envoya un prophète aux Israélites. Il leur dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Je vous ai fait monter d''Egypte et je vous ai fait sortir de la maison des esclaves. '
  '9':
  - type: note
    content: 'Cf. 2.18 ; Ex 3.17 ; 14.30 ; 1S 10.18. –  des Egyptiens  : autre traduction de l''Egypte.'
  - type: text
    content: 'Je vous ai délivrés de la main des Egyptiens et de la main de tous vos oppresseurs ; je les ai chassés devant vous et je vous ai donné leur pays. '
