        text: V. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' de l''Orient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Jourdain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jizréel '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jos 17.16 ; 19.18.
    marker-yv: yv-n
  - type: text
    text: 'Tout Madiân, Amalec et les fils de l''Orient se rassemblèrent, passèrent le Jourdain et dressèrent leur camp dans la vallée de Jizréel. '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'revêtu du souffle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Ch 12.19 ; 2Ch 24.20. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'trompe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.27+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour appeler…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et Abiézer fut appelé après lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même formule au v. 34 ; cf. 4.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 14.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Gédéon fut revêtu du souffle du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; il sonna de la trompe pour appeler Abiézer à sa suite. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 7.23 ; 8.2 ; il s'agit des tribus du nord d'Israël.
    marker-yv: yv-n
  - type: text
    text: Il envoya des messagers dans tout Manassé, pour l'appeler aussi à sa suite. Il envoya des messagers dans Aser, dans Zabulon et dans Nephtali, qui montèrent à leur rencontre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.36 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 14-16.
    marker-yv: yv-n
  - type: text
    text: 'Gédéon dit à Dieu : Si tu veux sauver Israël par moi, comme tu l''as dit, '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.37 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 17+ ; cf. Am 4.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je place
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe en 7.5 ; 8.27.'
    marker-yv: yv-n
  - type: text
    text: 'je place une toison de laine sur l''aire ; s''il y a de la rosée sur la toison seule et que partout ailleurs le sol reste sec, je saurai que tu sauveras Israël par moi, comme tu l''as dit. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: text
    text: 'Il en fut ainsi. Le lendemain, il se leva de bon matin, pressa la toison et fit sortir la rosée de la toison, une pleine coupe d''eau. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ne te mets pas en colère…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 18.30,32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que la toison seule reste sèche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : signe plus étonnant encore que celui du v. 37.'
    marker-yv: yv-n
  - type: text
    text: 'Gédéon dit à Dieu : Ne te mets pas en colère contre moi, je t''en prie ; je ne parlerai plus que cette fois. Je voudrais procéder encore à une épreuve avec la toison : que la toison seule reste sèche et qu''il y ait de la rosée sur le sol partout ailleurs ! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: text
    text: Dieu fit ainsi cette nuit-là. La toison seule resta sèche et il y eut de la rosée sur le sol partout ailleurs.
