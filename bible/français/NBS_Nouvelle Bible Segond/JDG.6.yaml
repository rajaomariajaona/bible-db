    text: ' dit à Gédéon : Prends le taureau de ton père et un second taureau de sept ans. Tu raseras l''autel du Baal qui appartient à ton père et tu couperas le poteau cultuel (l''ashéra) qui est à côté. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: selon les règles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'en rang '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans l'ordre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', traduction incertaine ; cf. Ex 20.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un autel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: holocauste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Tu bâtiras ensuite selon les règles un autel pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), ton Dieu, sur le haut de ce lieu fortifié. Tu prendras le second taureau et tu offriras un holocauste, avec le bois du poteau cultuel que tu auras coupé. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la maison de son père.
    marker-yv: yv-n
  - type: text
    text: 'Gédéon prit dix hommes parmi ses serviteurs et fit ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait dit ; mais comme il craignait sa famille et les gens de la ville, il ne le fit pas de jour, il le fit de nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'Lorsque les gens de la ville se levèrent, de bon matin, l''autel du Baal était démoli ; le poteau cultuel qui était à côté avait été coupé, et le second taureau avait été offert en holocauste sur l''autel qui venait d''être bâti. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Ils se dirent l''un à l''autre : Qui a fait cela ? Ils s''informèrent, firent des recherches et conclurent : C''est Gédéon, fils de Joas, qui a fait cela ! '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 11,25.
    marker-yv: yv-n
  - type: text
    text: 'Alors les gens de la ville dirent à Joas : Fais sortir ton fils, et qu''il meure, car il a démoli l''autel du Baal et coupé le poteau cultuel qui était à côté ! '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1R 18.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: défendre la cause
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir v. 32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qu''on a démoli '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu''il '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Gédéon) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: a démoli.
    marker-yv: yv-n
  - type: text
    text: 'Joas répondit à tous ceux qui se tenaient près de lui : Est-ce à vous de défendre la cause du Baal ? Est-ce vous qui allez le sauver ? – Quiconque défendra la cause du Baal sera mis à mort avant le matin ! – S''il est dieu, qu''il se défende lui-même, puisque c''est son autel qu''on a démoli ! '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on donna à Gédéon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'on lui donna. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Yeroub-Baal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Baal défendra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', verbe qui apparaît trois fois au v. 31 ; mais le nom pourrait aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Baal est grand '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Baal rend grand
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; cf. 7.1 ; 9.1. En 2S 11.21 le nom apparaît sous la forme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yeroub-Bésheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', où le mot traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'honte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est substitué par mépris au nom du Baal.
    marker-yv: yv-n
  - type: text
    text: 'En ce jour-là on donna à Gédéon le nom de Yeroub-Baal, en disant : Que le Baal se défende contre lui, puisque c''est son autel qu''il a démoli !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Gédéon demande à Dieu une garantie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: ft
