      - type: text
        text: ', de même en 11.33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gaza
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la plus méridionale des 5 villes de Philistie, près de la Méditerranée.'
    marker-yv: yv-n
  - type: text
    text: 'Ils dressaient leur camp contre lui, détruisaient la production du pays jusque vers Gaza et ne laissaient en Israël ni vivres, ni petit bétail, ni bœufs, ni ânes. '
  - type: usfm
    marker: v
