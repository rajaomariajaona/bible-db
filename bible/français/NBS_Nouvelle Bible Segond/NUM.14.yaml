document_id: NUM.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le peuple refuse d'entrer en Canaan
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 1.26ss. –  Toute la communauté v. 5,10. –  sanglota  : cf. 11.4,10 ; 20.3s ; 25.6 ; Ex 15.24 ; 16.2s,7ss ; Jg 2.4 ; 20.23 ; 1S 11.4. –  toute la nuit  : litt. cette nuit-là  ; autre traduction ce soir-là.'
  - type: text
    content: 'Toute la communauté se mit à crier ; le peuple sanglota toute la nuit. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'les lapider Ex 17.4 ; 1S 30.6 ; Jn 10.31ss. –  la gloire du Seigneur apparut  : LXX et Syr ajoutent dans la nuée  ; cf. 17.7 ; 20.6 ; Ex 16.7,10.'
  - type: text
    content: 'Toute la communauté parlait de les lapider, lorsque la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut, à la tente de la Rencontre, devant tous les Israélites. '
  '11':
  - type: note
    content: 'Jusqu''à quand Ex 16.28 ; Jos 18.3 ; cf. Ha 1.2 ; Ps 13.2s ; 62.4. –  tous les signes  : cf. chap. 11 ; Ex 7–12 ; 15–16 ; Ps 78.43.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Jusqu''à quand ce peuple me bafouera-t-il ? Jusqu''à quand refusera-t-il de mettre sa foi en moi, malgré tous les signes que j''ai produits en son sein ? '
  '12':
  - type: note
    content: 'peste  : cf. Ex 5.3 ; 9.3,15 ; Lv 26.25 ; Dt 28.21 ; 2S 24.13ss ; 1R 8.37 ; Jr 14.12 ; 21.6,9 ; Ez 5.12 ; Am 4.10 ; Ha 3.5. –  je le déposséderai  : ici la formule correspondante, habituellement réservée aux autres peuples, est appliquée à Israël ; cf. 21.32 ; 32.21,39 ; 33.51ss ; Ex 34.24 ; voir aussi Jos 14.12. –  je ferai de toi…  : cf. Ex 32.10 ; Dt 9.14 ; voir aussi Gn 12.2 ; 21.18.'
  - type: text
    content: 'Je le frapperai par la peste, je le déposséderai et je ferai de toi une nation plus grande et plus forte que lui ! '
  '13':
  - type: note
    content: 'Sur l’intercession de Moïse, cf. 11.11ss ; 12.13 ; 16.4 ; 17.11ss ; Ex 17.4 ; 32.11ss ; Dt 9.25ss ; voir aussi 2S 7.18ss ; 1R 3.6ss ; 8.22ss. –  Les Egyptiens ont appris (litt. entendu) …  : autre traduction les Egyptiens (ou l''Egypte) l''apprendront, eux du milieu desquels tu as fait monter ce peuple par ta force, (14) ils le diront…  ; cf. Ez 36.16-23. –  monter… d''Egypte Gn 12.10n.'
  - type: text
    content: 'Moïse répondit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Les Egyptiens ont appris que tu avais fait monter ce peuple d''Egypte par ta force, '
  '14':
  - type: note
    content: 'ils l''ont dit v. 13n  ; LXX tous les habitants de la terre ont même appris que tu es le Seigneur parmi ce peuple. –  face à face  : litt. œil à œil Es 52.8n  ; cf. Nb 12.8n. –  ta nuée 9.15+ss ; 12.5 ; Ex 13.21s.'
  - type: text
    content: 'et ils l''ont dit aux habitants de ce pays. Ils ont appris que, toi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), tu es au sein de ce peuple ; que tu apparais face à face, toi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ; que ta nuée se tient au-dessus d''eux ; que tu marches devant eux, le jour dans une colonne de nuée et la nuit dans une colonne de feu. '
  '15':
  - type: text
    content: 'Si tu fais mourir ce peuple comme un seul homme, les nations qui ont entendu parler de toi diront : '
  '16':
  - type: note
    content: 'le pays… serment  : cf. v. 23 ; Gn 22.16ss ; 26.3 ; voir aussi 13.15 ; 28.13. –  qu''il l''a immolé (LXX qu''il l''a fait tomber) dans le désert  : cf. Dt 9.28 ; 1Co 10.5.'
  - type: text
    content: '« Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne pouvait pas faire entrer ce peuple dans le pays qu''il lui avait promis par serment : c''est pour cela qu''il l''a immolé dans le désert ! » '
  '17':
  - type: note
    content: 'que la puissance du Seigneur  : LXX et Syr ont lu que ta puissance, Seigneur  ; de nombreux mss portent le tétragramme YHWH (= le Seigneur) au lieu de ’Adonaï, Seigneur  ; Jb 36.22 ; voir noms divins. –  se montre…  : litt. soit grande (ou grandie, exaltée).'
  - type: text
    content: 'Maintenant, que la puissance du Seigneur se montre dans sa grandeur, je t''en prie, comme tu l''as dit : '
  '18':
  - type: note
    content: 'Ex 34.6s ; cf. 20.5s ; Dt 5.9s ; Jon 4.2 ; Ps 86.15 ; 103.8ss. –  par la fidélité  : quelques mss, Smr et LXX ajoutent la loyauté ou la vérité  ; voir grâce. –  il pardonne…  : autres traductions il enlève la faute… ; il se charge de la faute…  ; quelques mss, Smr et LXX ajoutent et le péché. –  il ne tient pas…  : autre traduction il ne laisse rien impuni, cf. Na 1.3. –  aux fils  : cf. Jr 31.29s ; Ez 18.2-4 ; Jb 21.19. – Voir génération.'
  - type: text
    content: '« Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est patient et grand par la fidélité, il pardonne la faute et la transgression ; mais il ne tient pas le coupable pour innocent, et il fait rendre des comptes aux fils pour la faute des pères jusqu''à la troisième et la quatrième génération. » '
  '19':
  - type: note
    content: Ex 34.9 ; cf. Ps 51.3ss.
  - type: text
    content: Pardonne, je t'en prie, la faute de ce peuple, selon ta grande fidélité, comme tu as pardonné à ce peuple depuis l'Egypte jusqu'ici !
  '2':
  - type: note
    content: 17.6 ; 20.3 ; 21.5 ; Ex 14.11s ; 16.3.
  - type: text
    content: 'Tous les Israélites maugréèrent contre Moïse et Aaron ; toute la communauté leur dit : Si seulement nous étions morts en Egypte ! Si seulement nous étions morts dans ce désert ! '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Ex 32.14. –  Je pardonne  : autre traduction j''ai pardonné.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Je pardonne, selon ta parole. '
  '21':
  - type: note
    content: 'par ma vie  : cf. Gn 22.16. –  toute la terre  : autre traduction tout le pays  ; cf. Es 6.3 ; Ps 57.6 ; 72.19 ; Rm 1.20.'
  - type: text
    content: 'Mais, par ma vie, par la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui remplit toute la terre, '
  '22':
  - type: note
    content: 'qui ont vu ma gloire et les signes… v. 11 ; Dt 4.34 ; 10.21 ; 29.2 ; Ps 46.9 ; Mt 21.15 ; Jn 2.23. –  provoqué ou tenté, mis à l''épreuve, Ex 17.2,7n  ; cf. 14.11 ; 16.2s,20ss ; 32.1ss ; Nb 11.1ss etc. ; voir aussi Ps 95.7ss ; Hé 3.7ss. –  dix fois  : cf. Gn 31.7,41.'
  - type: text
    content: 'de tous les hommes qui ont vu ma gloire et les signes que j''ai produits en Egypte et dans le désert, qui m''ont provoqué déjà dix fois et qui ne m''ont pas écouté, '
  '23':
  - type: note
    content: 32.11. –  promis par serment… v. 16n. –  bafoué v. 11.
  - type: text
    content: 'aucun ne verra le pays que j''ai promis par serment à leurs pères ; aucun de ceux qui m''ont bafoué ne le verra. '
  '24':
  - type: note
    content: 'Caleb v. 6 ; 13.6,30 ; 32.12 ; Dt 1.36. –  un autre souffle ou un autre esprit. –  a rempli ses obligations envers moi  : litt. a rempli après moi  ; autre traduction a pleinement suivi ma voie  ; le terme correspondant à après est apparenté à celui qui est traduit par autre dans la première partie du v. ; cf. 32.11s ; Dt 1.36 ; Jos 14.8s,14 ; 1R 11.6. –  dans le pays où il s''est rendu  : cf. 13.22 ; Jos 14.6ss ; Jg 1.10-20.'
  - type: text
    content: 'Mais parce que Caleb, mon serviteur, a été animé d''un autre souffle et qu''il a rempli ses obligations envers moi, je le ferai entrer dans le pays où il s''est rendu, et sa descendance en prendra possession. '
  '25':
  - type: note
    content: 'Les Amalécites…  : certains modifient légèrement le texte hébreu traditionnel pour le rattacher au v. 24  : (Caleb prendra possession de son territoire) alors que les Amalécites et les Cananéens habiteront dans la vallée  ; cf. 13.29 ; Jos 5.1 ; 11.3 ; voir Jg 1.19 ; Syr porte la montagne au lieu de la vallée, cf. v. 45. –  repartez  : litt. tournez-vous et partez  ; cf. Dt 1.7n,39s ; 2.1 ; Jg 11.16. –  mer des Joncs Ex 10.19 ; 13.18n  ; 15.4,22.'
  - type: text
    content: – Les Amalécites et les Cananéens habitent la vallée. – Demain, repartez pour le désert, dans la direction de la mer des Joncs.
  - type: heading
    content: La première génération est condamnée
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 11.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '27':
  - type: text
    content: 'Jusqu''à quand cette communauté mauvaise maugréera-t-elle contre moi ? J''ai entendu les Israélites maugréer contre moi ! '
  '28':
  - type: note
    content: 'Par ma vie  : cf. v. 21. –  sans faute Es 5.9n. –  en ma présence  : litt. à mes oreilles  ; cf. v. 2s ; voir aussi Mt 12.36s ; Lc 19.22.'
  - type: text
    content: 'Dis-leur : Par ma vie, – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – je vous traiterai sans faute selon ce que vous avez dit en ma présence. '
  '29':
  - type: note
    content: Les mots traduits par cadavres et recensés sont assez ressemblants en hébreu ; cf. chap. 1 ; voir aussi v. 32 ; 26.65 ; Jn 6.49 ; 1Co 10.5 ; Hé 3.17 ; Jd 5.
  - type: text
    content: 'Vos cadavres tomberont dans ce désert. Vous tous, qu''on a recensés, en vous comptant depuis l''âge de vingt ans et au-dessus, et qui avez maugréé contre moi, '
  '3':
  - type: note
    content: '21.16. –  toutes nos familles ou nos enfants  : cf. 16.27+ ; Gn 34.29n  ; Jg 18.21n.'
  - type: text
    content: 'Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous fait-il entrer dans ce pays, si nous devons tomber par l''épée ? Nos femmes et toutes nos familles seront livrées au pillage ! N''est-ce pas mieux pour nous de retourner en Egypte ? '
  '30':
  - type: note
    content: 'vous n''entrerez pas…  : cf. 20.12,24 ; 32.10ss ; Dt 1.37. –  juré, à main levée Ex 6.8n  ; Ez 20.5n,9 ; cf. Gn 14.22s. –  Josué… v. 6 ; 13.16n  ; Dt 1.38.'
  - type: text
    content: 'vous n''entrerez pas dans le pays où j''avais juré, à main levée, de vous faire demeurer, excepté Caleb, fils de Yephounné, et Josué, fils de Noun. '
  '31':
  - type: note
    content: 'Elles seront livrées au pillage ! v. 3 ; Dt 1.39. –  auquel vous avez renoncé  : autres traductions que vous avez rejeté ; que vous avez méprisé.'
  - type: text
    content: 'Et vos familles, dont vous avez dit : « Elles seront livrées au pillage ! », je les y ferai entrer, et elles connaîtront le pays auquel vous avez renoncé. '
  '32':
  - type: text
    content: 'Vos cadavres, à vous, tomberont dans ce désert ; '
  '33':
  - type: note
    content: 'Voir fils. –  bergers  : Vg a compris nomades  ; certains modifient le texte hébreu traditionnel pour lire errants, vagabonds (cf. 32.13). –  quarante années 33.38 ; Ex 16.35 ; Dt 1.3 ; 2.7,14 ; 8.2 ; Jos 5.6 ; Am 2.10 ; 5.25 ; Ps 95.10 ; Ac 7.36 ; 13.18. –  votre prostitution 15.39 ; Jr 3.2,9 ; 13.27 ; Ez 23.27 ; 43.7,9 ; Os 1.2n  ; 4.11 ; 6.10. –  soient tous tombés  : litt. soient au complet, cf. v. 35 ; cf. aussi Ps 95.11 ; Hé 3.17 ; 4.11.'
  - type: text
    content: 'vos fils seront bergers dans le désert pendant quarante années et ils seront chargés de votre prostitution, jusqu''à ce que vos cadavres soient tous tombés dans le désert. '
  '34':
  - type: note
    content: 'Cf. Ez 4.4nss. –  vous serez chargés…  : cf. 18.1+. –  ma disgrâce  : traduction incertaine ; le même terme hébreu est rendu par griefs en Jb 33.10 ; on a aussi compris mon hostilité, mon refus, ma réprobation, ma frustration.'
  - type: text
    content: 'Selon le nombre de jours que vous avez mis à explorer le pays, c''est-à-dire quarante jours, vous serez chargés de vos fautes quarante années, une année pour chaque jour ; ainsi vous saurez ce qu''est ma disgrâce. '
  '35':
  - type: note
    content: 'Seigneur (YHWH)  : voir noms divins. –  sans faute  : cf. v. 18+. –  qui s''est liguée  : le verbe correspondant est apparenté au mot rendu par communauté  ; cf. v. 29 ; 16.5+.'
  - type: text
    content: 'Moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), j''ai parlé ; c''est ainsi que je traiterai, sans faute, toute cette communauté mauvaise qui s''est liguée contre moi : ils tomberont tous dans ce désert, ils y mourront.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. 13.1ss,25s,31s ; 1Co 10.10.
  - type: text
    content: 'Les hommes que Moïse avait envoyés explorer le pays et qui, à leur retour, avaient fait maugréer contre lui toute la communauté, en décriant le pays, '
  '37':
  - type: note
    content: 'par un fléau  : cf. 11.33n  ; 17.11 ; Ez 24.16n (d''un seul coup).'
  - type: text
    content: '– ces hommes qui avaient âprement décrié le pays moururent, frappés par un fléau, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '38':
  - type: note
    content: Josué / Caleb v. 6s,30 ; 26.65.
  - type: text
    content: Josué, fils de Noun, et Caleb, fils de Yephounné, restèrent seuls vivants parmi les hommes qui étaient allés explorer le pays.
  - type: heading
    content: Le peuple désobéit de nouveau
  '39':
  - type: text
    content: ' '
  - type: note
    content: Dt 1.41ss ; cf. Ex 33.4.
  - type: text
    content: 'Moïse dit cela à tous les Israélites : le peuple mena grand deuil. '
  '4':
  - type: note
    content: 'Donnons-nous un chef  : cf. 16.2,12ss ; Jr 42.13s ; Ac 7.39.'
  - type: text
    content: 'Et ils se dirent l''un à l''autre : Donnons-nous un chef et retournons en Egypte !'
  '40':
  - type: note
    content: 'de bon matin Gn 20.8 ; 22.3 ; Jos 6.12 ; 8.10ss. –  vers le sommet de la montagne  : autres traductions au sommet de la montagne ; vers les hauteurs de la montagne  ; cf. v. 44. –  nous avons péché 21.7.'
  - type: text
    content: 'Ils se levèrent de bon matin pour monter vers le sommet de la montagne, en disant : Nous montons vers le lieu dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a parlé : nous avons péché ! '
  '41':
  - type: note
    content: 'passez-vous outre  : cf. 22.18 ; 24.13 ; Dt 17.2+. –  ordres  : litt. bouche.'
  - type: text
    content: 'Moïse dit : Pourquoi passez-vous outre aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Cela ne réussira pas. '
  '42':
  - type: note
    content: 'Ne vous faites pas battre…  : autre traduction ne soyez pas frappés d''un fléau devant vos ennemis  ; terme apparenté au v. 37 ; cf. Lv 26.17n  ; Dt 1.42 ; 28.7,25.'
  - type: text
    content: 'Ne montez pas ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''est pas parmi vous. Ne vous faites pas battre par vos ennemis. '
  '43':
  - type: note
    content: 'Les Amalécites (13.29+) et les Cananéens (21.3 ; Jg 1.17) : cf. v. 25,45 ; Dt 1.44. –  vous vous êtes détournés  : litt. vous vous êtes détournés (ou vous êtes revenus) de derrière YHWH  ; autre traduction vous avez cessé de suivre le Seigneur  ; voir noms divins.'
  - type: text
    content: 'Les Amalécites et les Cananéens sont là, devant vous, et vous allez tomber par l''épée. Parce que vous vous êtes détournés du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne sera pas avec vous. '
  '44':
  - type: note
    content: 'le coffre…  : cf. 7.89 ; 10.33ss ; Dt 10.1ss ; 1S 4.'
  - type: text
    content: 'Ils s''obstinèrent à monter au sommet de la montagne ; mais le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et Moïse ne bougèrent pas du camp. '
  '45':
  - type: note
    content: 'qui habitaient cette montagne  : cf. v. 25n. –  Horma (Anathème, voir Dt 2.34n), sans doute à quelques kilomètres à l''est de Bersabée ; cf. Nb 21.3 ; Jos 15.30 ; 19.4 ; Jg 1.17 ; voir bénédiction.'
  - type: text
    content: Alors les Amalécites et les Cananéens qui habitaient cette montagne descendirent ; ils les battirent et les taillèrent en pièces jusqu'à Horma.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tombèrent… 16.4,22 ; 17.10 ; 20.6 ; cf. 1R 1.23n. –  toute l''assemblée  : terme omis par LXX  ; cf. Ex 12.6.'
  - type: text
    content: 'Moïse et Aaron tombèrent face contre terre, devant toute l''assemblée de la communauté des Israélites. '
  '6':
  - type: note
    content: 'Josué / Caleb v. 30,38 ; cf. 13.6,8,16,30 ; Jos 10.36 ; 11.21s. –  déchirèrent leurs vêtements  : signe de deuil, de tristesse, de pénitence ou d''indignation, Gn 37.29,34 ; 44.13 ; Lv 10.6.'
  - type: text
    content: 'Parmi ceux qui avaient exploré le pays, Josué, fils de Noun, et Caleb, fils de Yephounné, déchirèrent leurs vêtements '
  '7':
  - type: note
    content: 'Cf. Jg 18.9. –  merveilleux  : litt. très très bon.'
  - type: text
    content: 'et dirent à toute la communauté des Israélites : Ce pays que nous avons parcouru pour l''explorer est un pays merveilleux. '
  '8':
  - type: note
    content: '13.22s,27ss. –  Si le Seigneur prend plaisir en nous  : autre traduction si nous plaisons au Seigneur, même expression ou expressions semblables en Gn 34.19 ; 1S 18.22 ; 19.1 ; 2S 22.20 ; 1R 10.9 ; Es 56.4 ; 66.3 ; Ps 40.7,9,15 ; Jb 22.3 ; Est 2.14 etc.'
  - type: text
    content: 'Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prend plaisir en nous, il nous fera entrer dans ce pays et nous le donnera ; c''est un pays ruisselant de lait et de miel ! '
  '9':
  - type: note
    content: 'du peuple  : cf. 13.28. –  nous n''en ferons qu''une bouchée  : litt. ils sont notre pain, cf. Ps 14.4. –  Ils n''ont plus d''ombrage…  : litt. leur ombre s''est retirée de dessus eux (cf. Jg 16.20) ; l''expression évoque sans doute ici la protection des dieux, cf. Jg 9.15 ; Es 25.4 ; 32.2 ; Ps 91.1 ; 121.5 ; Lm 4.20 ; Lc 1.35 ; LXX leur temps a passé. –  le Seigneur est avec nous… Gn 26.24 ; 2Ch 20.17.'
  - type: text
    content: 'Seulement, ne vous rebellez pas contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et n''ayez pas peur du peuple du pays : nous n''en ferons qu''une bouchée. Ils n''ont plus d''ombrage pour les couvrir : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec nous. N''ayez pas peur d''eux !'
  - type: heading
    content: Moïse intercède pour le peuple
