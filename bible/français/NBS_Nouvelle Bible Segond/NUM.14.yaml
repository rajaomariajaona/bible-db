      children:
      - type: text
        text: déchirèrent leurs vêtements
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : signe de deuil, de tristesse, de pénitence ou d''indignation, Gn 37.29,34 ; 44.13 ; Lv 10.6.'
    marker-yv: yv-n
  - type: text
    text: 'Parmi ceux qui avaient exploré le pays, Josué, fils de Noun, et Caleb, fils de Yephounné, déchirèrent leurs vêtements '
  - type: usfm
    marker: v
