    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.22s,27ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' prend plaisir en nous'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'si nous plaisons au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même expression ou expressions semblables en Gn 34.19 ; 1S 18.22 ; 19.1 ; 2S 22.20 ; 1R 10.9 ; Es 56.4 ; 66.3 ; Ps 40.7,9,15 ; Jb 22.3 ; Est 2.14 etc.'
    marker-yv: yv-n
  - type: text
    text: 'Si le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' prend plaisir en nous, il nous fera entrer dans ce pays et nous le donnera ; c''est un pays ruisselant de lait et de miel ! '
  - type: usfm
    marker: v
