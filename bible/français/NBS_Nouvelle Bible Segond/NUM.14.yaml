    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 5.3 ; 9.3,15 ; Lv 26.25 ; Dt 28.21 ; 2S 24.13ss ; 1R 8.37 ; Jr 14.12 ; 21.6,9 ; Ez 5.12 ; Am 4.10 ; Ha 3.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je le déposséderai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ici la formule correspondante, habituellement réservée aux autres peuples, est appliquée à Israël ; cf. 21.32 ; 32.21,39 ; 33.51ss ; Ex 34.24 ; voir aussi Jos 14.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je ferai de toi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 32.10 ; Dt 9.14 ; voir aussi Gn 12.2 ; 21.18.'
    marker-yv: yv-n
  - type: text
    text: 'Je le frapperai par la peste, je le déposséderai et je ferai de toi une nation plus grande et plus forte que lui ! '
