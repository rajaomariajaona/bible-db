  - type: text
    text: ' dit à Moïse : Jusqu''à quand ce peuple me bafouera-t-il ? Jusqu''à quand refusera-t-il de mettre sa foi en moi, malgré tous les signes que j''ai produits en son sein ? '
  - type: usfm
    marker: v
