  - type: text
    text: 'Pourquoi le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous fait-il entrer dans ce pays, si nous devons tomber par l''épée ? Nos femmes et toutes nos familles seront livrées au pillage ! N''est-ce pas mieux pour nous de retourner en Egypte ? '
  - type: usfm
    marker: v
    metadata:
