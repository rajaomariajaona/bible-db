    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Jg 16.20) ; l''expression évoque sans doute ici la protection des dieux, cf. Jg 9.15 ; Es 25.4 ; 32.2 ; Ps 91.1 ; 121.5 ; Lm 4.20 ; Lc 1.35 ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur temps a passé
    - type: usfm
      marker: ft
      children:
      - type: text
