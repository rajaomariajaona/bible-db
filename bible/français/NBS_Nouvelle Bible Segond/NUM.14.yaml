    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' est avec nous… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 26.24 ; 2Ch 20.17.
    marker-yv: yv-n
  - type: text
    text: 'Seulement, ne vous rebellez pas contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et n''ayez pas peur du peuple du pays : nous n''en ferons qu''une bouchée. Ils n''ont plus d''ombrage pour les couvrir : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est avec nous. N''ayez pas peur d''eux !'
