    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Donnons-nous un chef
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.2,12ss ; Jr 42.13s ; Ac 7.39.'
    marker-yv: yv-n
  - type: text
    text: 'Et ils se dirent l''un à l''autre : Donnons-nous un chef et retournons en Egypte !'
