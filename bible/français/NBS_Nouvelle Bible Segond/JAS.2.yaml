          text: de tout
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au regard de tous les commandements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de toute la loi.
      marker-yv: yv-n
    - type: text
      text: 'En effet, quiconque observe toute la loi mais trébuche sur un seul point devient entièrement coupable. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ex 20.13s ; Dt 5.17s
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 5.21s,27s ; 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'meurtre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.2 ; 5.6 ; cf. Mt 5.21s ; 1Jn 3.15 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '34.26 : « C''est tuer son prochain que lui ôter ses moyens de vivre. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu deviens transgresseur…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tu as renié la loi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9+.
      marker-yv: yv-n
    - type: text
      text: 'Car celui qui a dit : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ne commets pas d'adultère
    - type: text
      text: ' a dit aussi : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ne commets pas de meurtre
    - type: text
      text: . Si donc tu ne commets pas d'adultère, mais que tu commettes un meurtre, tu deviens transgresseur de la loi.
