      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'avaient pas de quoi se vêtir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: étaient nus.
      marker-yv: yv-n
    - type: text
      text: 'Si un frère ou une sœur n''avaient pas de quoi se vêtir et manquaient de la nourriture de chaque jour, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jg 18.6 ; 1S 1.17 ; 29.7 ; 2S 15.9 ; Mc 5.34 ; Lc 7.50 ; 8.48 ; Ac 16.36. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et que l''un de vous leur dise : « Allez en paix, tenez-vous au chaud et mangez à votre faim ! » sans leur donner ce qui est nécessaire au corps, à quoi cela servirait-il ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 20,26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en elle-même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon elle-même ; sur elle-même ; contre elle-même ; tout à fait.
      marker-yv: yv-n
    - type: text
      text: 'Il en est ainsi de la foi : si elle n''a pas d''œuvres, elle est morte en elle-même.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mais quelqu'un dira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sur le procédé rhétorique, voir l''introduction ; ici on hésite sur l''étendue du discours de ce '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quelqu'un
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : consiste-t-il seulement dans la première partie du v. 18, ou bien dans l''ensemble des v. 18s ? En tout cas il ne semble pas s''agir en l''occurrence d''une objection, mais plutôt d''une reprise de l''argumentation de l''auteur. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par mes œuvres… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.13 ; Ga 5.6 ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par les œuvres, je te montrerai ma foi.
      marker-yv: yv-n
    - type: text
      text: 'Mais quelqu''un dira : Toi, tu as de la foi ; moi, j''ai des œuvres. Montre-moi ta foi en dehors des œuvres ; moi, par mes œuvres, je te montrerai la foi. '
