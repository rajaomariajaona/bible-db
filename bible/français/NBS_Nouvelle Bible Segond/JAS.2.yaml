      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lc 24.26 ; voir aussi Mt 25.31 ; Mc 8.38/ / ; 10.37/ / ; 13.26/ / ; 1Co 2.8.'
      marker-yv: yv-n
    - type: text
      text: 'Mes frères, ne mêlez pas de partialité à la foi de notre Seigneur glorieux, Jésus-Christ. '
