        children:
        - type: text
          text: '1.2ss,22ss ; 3.13 ; Mt 5.16,20 ; 7.12-27 ; 12.50 ; 18.23ss ; 25.31-46 ; cf. Rm 3.28 ; Ga 2.16 ; voir aussi Rm 2.6,15s ; Ga 5.6 ; Ep 2.8ss ; Col 1.10 ; 1Th 1.3 ; 2Th 1.11 ; Tt 3.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à quoi servirait-il… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 16 ; Mt 7.21 ; 21.28ss ; 1Jn 1.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le sauver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.21+.'
      marker-yv: yv-n
    - type: text
      text: 'Mes frères, à quoi servirait-il que quelqu''un dise avoir de la foi, s''il n''a pas d''œuvres ? La foi pourrait-elle le sauver ? '
