      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que la compassion triomphe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: soit fière aux dépens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même verbe en 3.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; verbe apparenté en 1.9+) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du jugement ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur l''idée, voir Mt 5.7 ; 6.14s ; 7.2 ; 18.29s,34s ; 25.31ss ; 1Jn 3.14-20 ; voir aussi Jr 9.23 ; Os 6.6 ; Mi 6.8 ; Mt 9.13 ; 12.7 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10 : « L''aumône (ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: acte de compassion
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Mt 6.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') délivre de la mort et empêche d''aller dans les ténèbres. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.4 : « Il n''a nulle pitié pour un homme, son semblable ; comment peut-il prier pour ses propres péchés ? » '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Testament
        - type: text
          text: ' de Zabulon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.3 : « Autant l''homme a pitié de son prochain, autant le Seigneur a pitié de lui. »'
      marker-yv: yv-n
    - type: text
      text: car le jugement est sans compassion pour qui ne montre pas de compassion. La compassion triomphe du jugement.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Sans œuvres, la foi est morte
    marker-yv: yv-h
