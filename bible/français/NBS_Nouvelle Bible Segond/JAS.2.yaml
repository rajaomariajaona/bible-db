document_id: JAS.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Pas de partialité en faveur des riches
  - type: text
    content: ' '
  - type: note
    content: 'Mes frères 1.2+. –  partialité  : le terme grec (Ac 10.34n) est ici au pluriel, peut-être pour désigner des marques concrètes de favoritisme, cf. v. 9 ; Jb 34.19 ; Rm 2.11 ; Ep 6.9 ; Col 3.25 ; 1P 1.17. –  la foi de Rm 3.22n  ; Ga 2.16n  ; cf. Jc 1.3,6 ; 2.14ss ; 5.15 ; voir aussi 1.27 ; Mt 17.20 ; 21.21/ /. –  notre Seigneur glorieux (litt. de la gloire ) …  : autres traductions notre Seigneur Jésus, le Christ glorieux ; la foi glorieuse (ou la foi en la gloire ) de notre Seigneur Jésus-Christ ou même mêlez-vous une partialité fondée sur l''apparence (ou l''opinion , autres sens possibles du mot correspondant à gloire ) à la foi de notre Seigneur…  : cf. 1.1n  ; Lc 24.26 ; voir aussi Mt 25.31 ; Mc 8.38/ / ; 10.37/ / ; 13.26/ / ; 1Co 2.8.'
  - type: text
    content: 'Mes frères, ne mêlez pas de partialité à la foi de notre Seigneur glorieux, Jésus-Christ. '
  '10':
  - type: note
    content: 'Cf. Dt 27.26 ; Mt 5.17-19 ; 23.23s ; Ga 3.10 ; 5.3. –  trébuche  : même verbe en 3.2 ; Rm 11.11 ; 2P 1.10. –  entièrement  : litt. de tous ou de tout, c.-à-d. au regard de tous les commandements ou de toute la loi.'
  - type: text
    content: 'En effet, quiconque observe toute la loi mais trébuche sur un seul point devient entièrement coupable. '
  '11':
  - type: note
    content: 'Ex 20.13s ; Dt 5.17s  ; cf. Mt 5.21s,27s ; 19.18 ; Mc 10.19 ; Lc 18.20 ; Rm 13.9. –  meurtre 4.2 ; 5.6 ; cf. Mt 5.21s ; 1Jn 3.15 ; Siracide 34.26 : « C''est tuer son prochain que lui ôter ses moyens de vivre. » –  tu deviens transgresseur…  : certains mss portent tu as renié la loi v. 9+.'
  - type: text
    content: 'Car celui qui a dit : '
  - type: text
    content: Ne commets pas d'adultère
  - type: text
    content: ' a dit aussi : '
  - type: text
    content: Ne commets pas de meurtre
  - type: text
    content: . Si donc tu ne commets pas d'adultère, mais que tu commettes un meurtre, tu deviens transgresseur de la loi.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 2.12. –  jugés  : cf. 5.9. –  loi de liberté 1.25+ ; cf. 2.8.'
  - type: text
    content: 'Parlez et agissez comme des gens qui vont être jugés d''après une loi de liberté, '
  '13':
  - type: note
    content: 'jugement 3.1 ; 4.11s ; 5.9,12s ; cf. Ac 17.31 ; 2Co 5.10 ; 1P 1.17 ; Ap 2.23. –  ne montre pas…  : litt. ne fait pas compassion. –  La compassion…  : certains mss portent  : que la compassion triomphe (litt. soit fière aux dépens  ; même verbe en 3.14n  ; verbe apparenté en 1.9+) du jugement ! Sur l''idée, voir Mt 5.7 ; 6.14s ; 7.2 ; 18.29s,34s ; 25.31ss ; 1Jn 3.14-20 ; voir aussi Jr 9.23 ; Os 6.6 ; Mi 6.8 ; Mt 9.13 ; 12.7 ; cf. Tobit 4.10 : « L''aumône (ou acte de compassion, Mt 6.2n) délivre de la mort et empêche d''aller dans les ténèbres. » Siracide 28.4 : « Il n''a nulle pitié pour un homme, son semblable ; comment peut-il prier pour ses propres péchés ? » Testament de Zabulon 8.3 : « Autant l''homme a pitié de son prochain, autant le Seigneur a pitié de lui. »'
  - type: text
    content: car le jugement est sans compassion pour qui ne montre pas de compassion. La compassion triomphe du jugement.
  - type: heading
    content: Sans œuvres, la foi est morte
  '14':
  - type: text
    content: ' '
  - type: note
    content: '1.2ss,22ss ; 3.13 ; Mt 5.16,20 ; 7.12-27 ; 12.50 ; 18.23ss ; 25.31-46 ; cf. Rm 3.28 ; Ga 2.16 ; voir aussi Rm 2.6,15s ; Ga 5.6 ; Ep 2.8ss ; Col 1.10 ; 1Th 1.3 ; 2Th 1.11 ; Tt 3.8. –  à quoi servirait-il… v. 16 ; Mt 7.21 ; 21.28ss ; 1Jn 1.6+. –  le sauver  : cf. 1.21+.'
  - type: text
    content: 'Mes frères, à quoi servirait-il que quelqu''un dise avoir de la foi, s''il n''a pas d''œuvres ? La foi pourrait-elle le sauver ? '
  '15':
  - type: note
    content: '1.27 ; Mt 25.35s ; 1Jn 3.17 ; cf. Es 58.7 ; Jb 31.16-20 ; Pr 3.27s. –  frère / sœur  : cf. 1.2+. –  n''avaient pas de quoi se vêtir  : litt. étaient nus.'
  - type: text
    content: 'Si un frère ou une sœur n''avaient pas de quoi se vêtir et manquaient de la nourriture de chaque jour, '
  '16':
  - type: note
    content: Cf. Jg 18.6 ; 1S 1.17 ; 29.7 ; 2S 15.9 ; Mc 5.34 ; Lc 7.50 ; 8.48 ; Ac 16.36. – Voir paix.
  - type: text
    content: 'et que l''un de vous leur dise : « Allez en paix, tenez-vous au chaud et mangez à votre faim ! » sans leur donner ce qui est nécessaire au corps, à quoi cela servirait-il ? '
  '17':
  - type: note
    content: 'V. 20,26. –  en elle-même  : autres traductions selon elle-même ; sur elle-même ; contre elle-même ; tout à fait.'
  - type: text
    content: 'Il en est ainsi de la foi : si elle n''a pas d''œuvres, elle est morte en elle-même.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Mais quelqu''un dira  : sur le procédé rhétorique, voir l''introduction ; ici on hésite sur l''étendue du discours de ce quelqu''un  : consiste-t-il seulement dans la première partie du v. 18, ou bien dans l''ensemble des v. 18s ? En tout cas il ne semble pas s''agir en l''occurrence d''une objection, mais plutôt d''une reprise de l''argumentation de l''auteur. –  par mes œuvres… 3.13 ; Ga 5.6 ; autre traduction par les œuvres, je te montrerai ma foi.'
  - type: text
    content: 'Mais quelqu''un dira : Toi, tu as de la foi ; moi, j''ai des œuvres. Montre-moi ta foi en dehors des œuvres ; moi, par mes œuvres, je te montrerai la foi. '
  '19':
  - type: note
    content: 'que Dieu est un  : autre traduction qu''il y a un seul Dieu  ; cf. Dt 6.4ss ; Mc 12.29/ /. –  les démons… Mt 8.29 ; Mc 1.24,34 ; 3.11s ; 5.7 ; Lc 4.34.'
  - type: text
    content: 'Toi, tu crois que Dieu est un ? Tu fais bien : les démons le croient aussi, et ils tremblent.'
  '2':
  - type: note
    content: 'Cf. 1Co 11.17ss ; 14.23. –  assemblée  : le terme grec correspondant a donné notre mot synagogue  ; terme apparenté en Hé 10.25+ ; voir Eglise. –  un homme…  : cf. Ac 17.7 ; 19.31 ; Rm 16.5,23 ; 1Co 16.15,19 ; Col 4.15 ; Phm. –  habits resplendissants  : cf. Lc 23.11 ; Ac 1.10 ; 10.30. –  pauvre  : cf. 1.9+. –  sales  : termes apparentés en 1.21n  ; 1P 3.21 ; Ap 22.11.'
  - type: text
    content: 'Supposons en effet qu''il entre dans votre assemblée un homme avec un anneau d''or et des habits resplendissants, et qu''il y entre aussi un pauvre avec des habits sales ; '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'tête creuse  : litt. homme vide ou futile (cf. 1Co 15.10n, inutile ). –  en dehors des œuvres  : autre traduction sans les œuvres , cf. v. 26 ; Rm 2.21n. –  stérile  : le terme correspondant fait assonance avec celui qui est traduit par œuvres  ; certains mss portent vide ou morte , cf. v. 17+.'
  - type: text
    content: 'Veux-tu donc savoir, tête creuse, que la foi en dehors des œuvres est stérile ? '
  '21':
  - type: note
    content: 'Cf. 1.2ss ; Rm 4.2,6 ; Ga 3.6-9 ; voir aussi Hé 11.17 ; 1 Maccabées 2.52 : « Abraham n''a-t-il pas été fidèle dans l''épreuve, et cela ne lui a-t-il pas été compté comme justice  ? » Siracide 44.20 : « Dans l''épreuve il (Abraham) fut trouvé fidèle. » –  Abraham, notre père Es 51.2 ; Mt 3.9 ; Lc 16.24,27,30 ; Jn 8.39,53 ; Rm 4.12. –  en vertu des œuvres ou d''œuvres Rm 4.2 ; cf. 11.6. –  offert son fils Gn 22.'
  - type: text
    content: 'Abraham, notre père, ne fut-il pas justifié en vertu des œuvres, pour avoir offert son fils Isaac sur l''autel ? '
  '22':
  - type: note
    content: 'agissait avec  : le verbe grec correspondant, apparenté au terme traduit par œuvre, a donné notre mot synergie  ; cf. Mc 16.20 (œuvrer avec) ; Rm 8.28 (coopérer) ; 1Co 16.16 (collaborer) ; 2Co 6.1 (être collaborateurs). –  de ces œuvres  : autre traduction des œuvres. –  portée à son accomplissement 1.4,17,25 ; 3.2.'
  - type: text
    content: 'Tu vois que la foi agissait avec ses œuvres, et que c''est en vertu de ces œuvres que la foi fut portée à son accomplissement. '
  '23':
  - type: note
    content: 'l''Ecriture v. 8 ; voir Gn 15.6  ; cf. Rm 4.3,9,22 ; Ga 3.6 ; voir aussi Dt 6.25 ; 24.13 ; Ps 106.30s ; Pr 27.14. –  ami de Dieu Gn 18.17 ; Es 41.8 ; 51.2 ; 2Ch 20.7 ; cf. Daniel grec 3.35 : « Ne nous retire pas ta miséricorde, à cause d''Abraham ton ami. » Sagesse 7.27 : « Au long des âges, elle (la Sagesse) passe dans les âmes saintes pour former des amis de Dieu et des prophètes. »'
  - type: text
    content: 'C''est ainsi que fut accomplie l''Ecriture qui dit : '
  - type: text
    content: Abraham crut Dieu, et cela lui fut compté comme justice,
  - type: text
    content: ' et qu''il fut appelé ami de Dieu. '
  '24':
  - type: note
    content: Cf. Jn 8.39. –  non pas seulement… autre traduction non en vertu de la foi seule.
  - type: text
    content: 'Vous le voyez, c''est en vertu des œuvres que l''être humain est justifié, et non pas seulement en vertu d''une foi. '
  '25':
  - type: note
    content: 'Rahab Jos 2.1ss ; 6.17ss ; Hé 11.31 ; cf. Mt 21.31. –  messagers  : le mot est souvent traduit par anges (cf. Hé 13.2n) ; certains mss portent les espions.'
  - type: text
    content: 'Rahab la prostituée ne fut-elle pas également justifiée en vertu des œuvres, pour avoir accueilli les messagers et les avoir renvoyés par un autre chemin ? '
  '26':
  - type: note
    content: 'V. 17+. –  sans esprit  : autre traduction sans souffle, cf. Gn 2.7n. –  sans œuvres ou en dehors des œuvres, expression très proche au v. 20.'
  - type: text
    content: Tout comme le corps sans esprit est mort, de même la foi sans œuvres est morte.
  '3':
  - type: note
    content: 'pleins d''attention  : même verbe en Lc 1.48 ; 9.38 (porter les regards). –  place d''honneur  : cf. Mt 23.6 ; Mc 12.39 ; Lc 11.43 ; 20.46. –  marchepied  : cf. Mt 5.35 ; Mc 12.36/ /.'
  - type: text
    content: 'si, pleins d''attention pour celui qui porte les habits resplendissants, vous lui dites : « Toi, assieds-toi ici à cette place d''honneur ! » tandis que vous dites au pauvre : « Toi, tiens-toi debout là-bas ! » ou bien : « Assieds-toi au bas de mon marchepied ! », '
  '4':
  - type: note
    content: 'ne faites-vous pas en vous-mêmes (ou parmi vous) une discrimination  : le même verbe signifiait hésiter (ou douter) en 1.6+ ; il a aussi le sens de juger, distinguer, discerner  ; cf. Mt 16.3 ; Ac 15.9 ; Rm 14.1 ; 1Co 4.7 ; 6.5 ; 11.29,31 ; 14.29 ; voir aussi Jb 34.19. –  raisonnements  : même terme en Mt 15.19/ / ; Lc 2.35 ; 5.22 ; 6.8 ; 9.46s ; 24.38n (doute) ; Rm 1.21 ; 14.1n (opinion) ; 1Co 3.20 ; Ph 2.14n  ; 1Tm 2.8 (discussion).'
  - type: text
    content: ne faites-vous pas en vous-mêmes une discrimination, et n'êtes-vous pas des juges aux raisonnements mauvais ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ecoutez… 1.2+,16,19. –  choisi ceux qui sont pauvres 1Co 1.26-31 ; cf. Mt 5.3 ; Lc 6.20 ; Ap 2.9. –  du point de vue du monde  : autre traduction quant à l''apparence . –  de foi  : autres traductions en foi, dans la foi . –  héritiers du royaume Mt 25.34 ; 1Co 6.9s ; 15.50 ; Ga 5.21. –  promis… 1.12+.'
  - type: text
    content: 'Ecoutez, mes frères bien-aimés : Dieu n''a-t-il pas choisi ceux qui sont pauvres, du point de vue du monde, pour qu''ils soient riches de foi et héritiers du royaume qu''il a promis à ceux qui l''aiment ? '
  '6':
  - type: note
    content: 'déshonoré ou outragé, même verbe en Mc 12.4/ / ; Jn 8.49 ; Ac 5.41 ; Rm 1.24 ; 2.23 ; cf. Pr 14.21,31 ; 1Co 11.22. –  oppriment  : même terme Ac 10.38 ; cf. Jr 5.26ss ; 7.6 ; 22.3 ; Ez 18.12 ; 22.7,29 ; Am 3.10 ; 4.1 ; 5.7ss ; 8.4 ; Mi 6.11s ; 7.6 ; Ha 1.4 ; Ml 3.5. –  traînent Ac 21.30. –  tribunaux  : cf. 5.6 ; Lc 18.3 ; Ac 16.16ss ; 19.21ss ; 1Co 6.'
  - type: text
    content: 'Et vous, vous avez déshonoré le pauvre ! Pourtant, ce sont bien les riches qui vous oppriment et qui vous traînent devant les tribunaux, n''est-ce pas ? '
  '7':
  - type: note
    content: 'calomnient  : autre traduction blasphèment  ; sur le verbe correspondant, cf. Mc 2.7/ / ; 7.22/ / ; Ep 4.31 ; Col 3.8 ; 1Tm 6.4 ; Tt 3.2 ; Ap 2.9 ; voir aussi Rm 2.24 ; 1Tm 1.20 ; 1P 4.4 ; 2P 2.2. –  le beau nom qui est invoqué sur vous (certains voient dans cette expression une allusion au rituel du baptême au nom de Jésus-Christ) ou que vous portez, cf. v. 1 ; Dt 28.10 ; Es 43.7 ; Jr 14.9 ; 2Ch 7.14 ; voir aussi Mt 10.22 ; 24.9 ; Lc 6.22 ; 21.12 ; Ac 2.38 ; 10.48 ; 15.17.'
  - type: text
    content: N'est-ce pas eux qui calomnient le beau nom qui est invoqué sur vous ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'loi royale  : cf. v. 12 ; 4.11. –  selon l''Ecriture v. 23. –  Tu aimeras… Lv 19.18  ; Mt 5.43ss ; Mc 12.28ss/ / ; Rm 13.8ss ; Ga 5.14 ; cf. Jn 13.34s ; 15.9ss ; 1Co 13 ; Col 3.14.'
  - type: text
    content: 'Sans doute, si vous accomplissez la loi royale, selon l''Ecriture : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même,
  - type: text
    content: ' vous faites bien. '
  '9':
  - type: note
    content: 'partialité v. 1+ ; cf. Lv 19.15 ; Dt 1.17. –  vous commettez un péché  : autre traduction vous faites œuvre de péché  ; 1.14+. –  convaincus de transgression (litt. comme des transgresseurs) …  : cf. Rm 2.15,25,27 ; Ga 2.18.'
  - type: text
    content: 'Mais si vous montrez de la partialité, vous commettez un péché, et vous êtes convaincus de transgression par la loi. '
