      marker-yv: yv-n
    - type: text
      text: 'Une femme est liée aussi longtemps que son mari est vivant ; mais si le mari vient à s''endormir dans la mort, elle est libre de se marier à qui elle veut ; seulement, que ce soit dans le Seigneur. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ep 5.25.
      marker-yv: yv-n
    - type: text
      text: 'Ce n''est pas la femme qui a autorité sur son propre corps, c''est son mari ; de même, ce n''est pas le mari qui a autorité sur son propre corps, c''est sa femme. '
  '40':
  - type: usfm
    marker: p
    children:
