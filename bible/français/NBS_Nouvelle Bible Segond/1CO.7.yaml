      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 10+,25+ ; cf. 2Co 10.7.
      marker-yv: yv-n
    - type: text
      text: Cependant, elle sera plus heureuse, à mon avis, si elle demeure comme elle est. Or moi aussi je pense avoir l'Esprit de Dieu.
  '5':
  - type: usfm
    marker: p
    children:
