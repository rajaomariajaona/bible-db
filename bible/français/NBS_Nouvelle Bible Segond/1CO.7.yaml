          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: respecter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: garder
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa vierge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', fille ou fiancée selon l''hypothèse de lecture choisie pour l''ensemble du passage (voir v. 36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Mais celui qui est bien résolu dans son cœur, sans contrainte et en pleine possession de sa volonté, et qui a décidé en son cœur de respecter sa vierge, celui-là fera bien. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui épouse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans les évangiles le verbe correspondant a le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'marier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'donner en mariage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Mt 22.30 ; 24.38 ; Mc 12.25 ; Lc 17.27 ; 20.35) ; tel est l'argument principal de ceux qui voient dans les v. 36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 'ss une instruction à un père chrétien. Néanmoins, le même verbe est très proche de celui qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: épouser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et des écrits contemporains du N.T. attestent que les deux formes ont pu être employées indifféremment. Les tenants de l''hypothèse du père traduisent le v. 38 comme suit'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Celui qui marie sa (fille) vierge fait bien, celui qui ne la marie pas fait mieux.
      marker-yv: yv-n
    - type: text
      text: Ainsi, celui qui épouse sa vierge fait bien, celui qui ne l'épouse pas fera mieux.
  '39':
