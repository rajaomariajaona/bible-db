      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'endormir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
