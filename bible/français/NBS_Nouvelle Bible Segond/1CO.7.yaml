document_id: 1CO.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mariage
  - type: text
    content: ' '
  - type: note
    content: 'Pour ce qui concerne  : même introduction (reprenant peut-être les différents points abordés par la lettre que les Corinthiens avaient adressée à Paul) au v. 25 ; 8.1,4 ; 12.1 ; 16.1,12 ; cf. 1Th 4.9 ; 5.1. –  ce que vous avez écrit  : cf. 5.9 ; 11.34. –  il est bien… ou il est bon  : cette phrase peut être lue comme une affirmation de Paul, ou comme une citation de ce que les Corinthiens lui ont écrit  ; cf. v. 8,26,40 ; comparer avec Gn 2.18.'
  - type: text
    content: 'Pour ce qui concerne ce que vous avez écrit, il est bien pour l''homme de ne pas toucher de femme. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'non pas moi, mais le Seigneur  : cf. v. 12,25,40 ; 9.14 ; 11.23 ; 14.37 ; 15.3 ; 1Th 4.8 ; voir Mt 5.32+ ; Mc 10.11-12/ /. –  injonction 11.17.'
  - type: text
    content: 'A ceux qui sont mariés, j''adresse – non pas moi, mais le Seigneur – cette injonction : que la femme ne se sépare pas de son mari ; '
  '11':
  - type: note
    content: 'abandonne  : autre traduction répudie (verbe grec différent en Mt 5.32 etc.) ; même possibilité v. 12s.'
  - type: text
    content: si elle s'est séparée, qu'elle demeure sans mari ou qu'elle se réconcilie avec son mari ; et que le mari n'abandonne pas sa femme.
  '12':
  - type: text
    content: ' '
  - type: note
    content: non pas le Seigneur, mais moi v. 10+.
  - type: text
    content: 'Aux autres, je dis – non pas le Seigneur, mais moi : si un frère a une femme non croyante, et qu''elle consente à habiter avec lui, qu''il ne l''abandonne pas ; '
  '13':
  - type: text
    content: 'si une femme a un mari non croyant, et qu''il consente à habiter avec elle, qu''elle n''abandonne pas son mari. '
  '14':
  - type: note
    content: 'Les termes traduits par consacré(e) et saints sont apparentés ; cf. 1.2n  ; 6.11,16s ; Rm 1.7 ; 11.16 ; un écrit fragmentaire de Qumrân (Lettre halakhique ou 4QMMT) semble avoir employé une formule hébraïque analogue à propos des enfants des prêtres nés hors du cadre des prescriptions sacerdotales. – Voir pur, impur. –  or  : litt. maintenant.'
  - type: text
    content: 'Car le mari non croyant est consacré par la femme, et la femme non croyante est consacrée par le frère ; autrement, vos enfants seraient impurs ; or ils sont saints. '
  '15':
  - type: note
    content: 'esclave  : autre traduction asservi (cf. v. 21ss). –  en pareil cas  : autre traduction, moins probable  : à de telles gens. –  dans la paix  : autre traduction à la paix  ; Rm 14.19. –  vous (ou, selon certains mss, nous) a appelés  : cf. 1.1 ; Ga 1.6 ; Ep 4.4 ; 1Th 4.7.'
  - type: text
    content: 'Mais si le non-croyant veut se séparer, qu''il se sépare ; le frère ou la sœur n''est pas esclave en pareil cas. C''est dans la paix que Dieu vous a appelés. '
  '16':
  - type: text
    content: En effet, comment savoir, femme, si tu sauveras ton mari ? Ou bien comment savoir, mari, si tu sauveras ta femme ?
  - type: heading
    content: Se conformer à l'appel reçu de Dieu
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'vive selon la condition…  : litt. marche comme le Seigneur a mesuré (cf. Rm 12.3) , comme Dieu a appelé  ; cf. v. 20-24,27. –  ce que je prescris  : cf. 11.34 ; 16.1. –  dans toutes les Eglises 4.17+.'
  - type: text
    content: 'Autrement, que chacun vive selon la condition que le Seigneur lui a donnée en partage, tel qu''il était quand Dieu l''a appelé. C''est ce que je prescris dans toutes les Eglises. '
  '18':
  - type: note
    content: 'Qu''il demeure circoncis ou, plus littéralement, qu''il ne (re)devienne pas incirconcis  ; le verbe grec évoque sans doute, au sens propre, l''opération consistant à reconstituer un prépuce par extension de la peau restante, pour masquer les traces de la circoncision ; cf. 1 Maccabées 1.15, à propos de Juifs gagnés à l''hellénisme : « Ils se refirent le prépuce » (autre formule en grec). –  Qu''il ne se fasse pas circoncire Ga 3.28 ; 5.2.'
  - type: text
    content: 'Quelqu''un était-il circoncis quand il a été appelé ? Qu''il demeure circoncis. Quelqu''un était-il incirconcis quand il a été appelé ? Qu''il ne se fasse pas circoncire. '
  '19':
  - type: note
    content: 'Cf. Rm 2.25-27 ; Ga 5.6 ; 6.15 ; Siracide 32.23 : « En tout ce que tu fais, sois fidèle à toi-même ; c''est là aussi observer les commandements. » ; voir loi.'
  - type: text
    content: 'La circoncision n''est rien, l''incirconcision n''est rien ; ce qui importe, c''est d''observer les commandements de Dieu. '
  '2':
  - type: note
    content: '1Th 4.3s. –  des risques…  : litt. des inconduites (sexuelles). –  son mari (le mot signifie également homme) 14.35.'
  - type: text
    content: 'Toutefois, à cause des risques d''inconduite sexuelle, que chacun ait sa femme, que chacune ait son mari. '
  '20':
  - type: note
    content: 'dans la condition…  : litt. dans l''appel dont il a été appelé, v. 17n.'
  - type: text
    content: 'Que chacun demeure dans la condition où il était lorsqu''il a été appelé. '
  '21':
  - type: note
    content: 'même si tu peux…  : d''autres comprennent  : mais si tu as l''occasion de devenir libre, profites-en.'
  - type: text
    content: 'Tu étais esclave quand tu as été appelé ? Ne t''en soucie pas ; même si tu peux devenir libre, mets plutôt à profit ta condition. '
  '22':
  - type: note
    content: 'un affranchi (terme apparenté à celui qui est traduit par libre) du Seigneur  : cf. Jn 8.36 ; voir aussi Ep 6.5-8 ; Phm 16 ; 1P 2.16,18.'
  - type: text
    content: 'En effet, l''esclave qui a été appelé, dans le Seigneur, est un affranchi du Seigneur ; de même, l''homme libre qui a été appelé est un esclave du Christ. '
  '23':
  - type: note
    content: 6.20+ ; Ga 5.2.
  - type: text
    content: 'Vous avez été achetés à un prix ; ne devenez pas esclaves des humains. '
  '24':
  - type: note
    content: V. 17+.
  - type: text
    content: Que chacun, mes frères, demeure devant Dieu dans la condition où il était lorsqu'il a été appelé.
  - type: heading
    content: Les personnes non mariées et les veuves
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'vierges v. 28,34,36n-38 ; le terme grec s''applique habituellement aux femmes, mais il peut aussi inclure les hommes (cf. v. 27 ; Ap 14.4). –  ordre du Seigneur  : cf. v. 10+. –  un avis v. 40 ; 2Co 8.10. –  grâce à la compassion du Seigneur 1Tm 1.12s,16. –  digne de confiance ou fidèle , cf. 4.1s ; voir aussi 1Th 2.4.'
  - type: text
    content: 'Pour ce qui concerne les vierges, je n''ai pas d''ordre du Seigneur ; mais je donne un avis en homme qui, grâce à la compassion du Seigneur, est digne de confiance. '
  '26':
  - type: note
    content: 'de la nécessité  : autre traduction du désarroi  ; cf. v. 29,37n  ; 3.22 ; 10.11 ; 2Co 6.4n. –  il est bien… v. 1+. –  pour chacun  : litt. pour l''homme, terme générique pour l''être humain, s''appliquant en principe à la femme aussi bien qu''à l''homme. –  d''être ainsi  : il faut probablement comprendre : de rester dans la condition des vierges (v. 25) ; d''autres comprennent, plus généralement  : de demeurer dans sa condition, quelle qu''elle soit (cf. v. 27).'
  - type: text
    content: 'Voici donc ce qui me paraît bien, à cause de la nécessité présente ; il est bien pour chacun d''être ainsi. '
  '27':
  - type: note
    content: 'V. 17+. –  Tu n''es pas lié…  : litt. tu es délié (le même verbe est traduit par rompre) d''une femme.'
  - type: text
    content: 'Tu es lié à une femme ? Ne cherche pas à rompre. Tu n''es pas lié à une femme ? Ne cherche pas de femme. '
  '28':
  - type: note
    content: 'les gens mariés…  : litt. de telles personnes auront de la détresse (Rm 5.3+ ; 1Th 3.3s ; voir aussi Lc 12.51-53 ; 21.23) dans la chair.'
  - type: text
    content: Si toutefois tu te mariais, tu ne pécherais pas ; et si la vierge se mariait, elle ne pécherait pas ; mais les gens mariés connaîtront la détresse, et moi, je voudrais vous épargner.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce que je dis 15.50. –  le temps se fait court  ; dans le vocabulaire de la navigation, le verbe grec correspondant signifiait ramener les voiles (cf. Ac 27.15n) ; il est traduit par envelopper en Ac 5.6 ; voir aussi Rm 13.11. –  comme s''ils n''en avaient pas  : cf. Lc 14.26.'
  - type: text
    content: 'Voici ce que je dis, mes frères : le temps se fait court ; désormais, que ceux qui ont une femme soient comme s''ils n''en avaient pas, '
  '3':
  - type: text
    content: 'Que le mari rende à sa femme ce qu''il lui doit ; de même la femme à son mari. '
  '30':
  - type: note
    content: Cf. Rm 12.15.
  - type: text
    content: 'ceux qui pleurent comme s''ils ne pleuraient pas, ceux qui se réjouissent comme s''ils ne se réjouissaient pas, ceux qui achètent comme s''ils ne possédaient pas, '
  '31':
  - type: note
    content: 'qui usent du monde  : cf. 3.21s. –  s''ils n''en usaient pas réellement ou pleinement  ; voir 9.18n. –  ce monde, tel qu''il est formé  : litt. la forme (ou la figure, l''aspect, même terme en Ph 2.7n) de ce monde  ; le terme correspondant à forme est apparenté au verbe traduit par se conformer en Rm 12.2n. –  passe 1Jn 2.17.'
  - type: text
    content: et ceux qui usent du monde comme s'ils n'en usaient pas réellement, car ce monde, tel qu'il est formé, passe.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'il se demande  : sous-entendu dans le texte, de même dans la suite. –  plaire au Seigneur 1Th 4.1.'
  - type: text
    content: 'Or je voudrais que vous soyez sans inquiétude. Celui qui n''est pas marié s''inquiète des choses du Seigneur, il se demande comment plaire au Seigneur. '
  '33':
  - type: note
    content: Ep 5.29.
  - type: text
    content: 'Celui qui est marié s''inquiète des choses du monde, il se demande comment plaire à sa femme '
  '34':
  - type: note
    content: 'et il est partagé…  : certains mss portent et il y a une différence entre la femme (mariée) et la vierge : celle qui est sans mari s''inquiète…  ; cf. 1Tm 5.5. –  sans mari ou non mariée, v. 8n. –  corps / esprit 5.3 ; 6.20 ; 1Th 5.23 ; Jc 2.26.'
  - type: text
    content: '– et il est partagé. De même la femme sans mari, comme la vierge, s''inquiète des choses du Seigneur, pour être sainte de corps et d''esprit. Celle qui est mariée s''inquiète des choses du monde, elle se demande comment plaire à son mari. '
  '35':
  - type: note
    content: '6.12+. –  tendre un piège  : litt. jeter un filet. –  convenable  : termes apparentés pour décent, décence en 12.23s ; 14.40 ; cf. 13.5n  ; Rm 13.13 ; 1Th 4.12. –  et que vous vous attachiez…  : autre traduction (ce qui est convenable) et propre au service du Seigneur  ; cf. 9.13n. –  sans distraction ou sans soucis, terme apparenté au verbe traduit par s''affairer en Lc 10.40.'
  - type: text
    content: Je dis cela dans votre intérêt ; ce n'est pas pour vous tendre un piège, c'est pour que vous fassiez ce qui est convenable et que vous vous attachiez au Seigneur sans distraction.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'L''interprétation des v. 36-38 est controversée. Selon l''hypothèse la plus probable, il s''agirait ici du cas de deux fiancés, d''où notre traduction ; mais certains pensent que ces v. s''adressent à un père qui se demanderait s''il doit ou non marier sa fille (v. 38n), et ils traduisent  : Si quelqu''un estime inconvenant pour sa (fille) vierge de dépasser la fleur de l''âge (sans s''être mariée) et qu''il doive en être ainsi, qu''il fasse ce qu''il veut, il ne pèche pas ; qu''on se marie . Des documents plus tardifs attestent l''existence, dans l''Eglise primitive, de mariages spirituels dans lesquels un homme et une vierge vivaient ensemble dans la chasteté, mais il est impossible de savoir si notre texte se réfère à une pratique analogue. –  qu''il agit…  : autre traduction qu''il risque de déshonorer sa vierge  ; cf. v. 34s.'
  - type: text
    content: 'Mais si quelqu''un estime qu''il agit de façon inconvenante envers sa vierge, s''il déborde de passion et qu''il doive en être ainsi, qu''il fasse ce qu''il veut, il ne pèche pas ; qu''ils se marient. '
  '37':
  - type: note
    content: 'contrainte ou nécessité (v. 26n). –  en pleine possession de  : litt. qui a autorité sur (verbe apparenté v. 4) ; le même terme sera traduit par droit en 8.4. –  décidé en son cœur Lc 1.66n. –  respecter  : litt. garder. –  sa vierge, fille ou fiancée selon l''hypothèse de lecture choisie pour l''ensemble du passage (voir v. 36n).'
  - type: text
    content: 'Mais celui qui est bien résolu dans son cœur, sans contrainte et en pleine possession de sa volonté, et qui a décidé en son cœur de respecter sa vierge, celui-là fera bien. '
  '38':
  - type: note
    content: 'qui épouse  : dans les évangiles le verbe correspondant a le sens de marier ou de donner en mariage (Mt 22.30 ; 24.38 ; Mc 12.25 ; Lc 17.27 ; 20.35) ; tel est l''argument principal de ceux qui voient dans les v. 36nss une instruction à un père chrétien. Néanmoins, le même verbe est très proche de celui qui signifie épouser, et des écrits contemporains du N.T. attestent que les deux formes ont pu être employées indifféremment. Les tenants de l''hypothèse du père traduisent le v. 38 comme suit  : Celui qui marie sa (fille) vierge fait bien, celui qui ne la marie pas fait mieux.'
  - type: text
    content: Ainsi, celui qui épouse sa vierge fait bien, celui qui ne l'épouse pas fera mieux.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 7.2s. –  s''endormir dans la mort  : litt. s''endormir , euphémisme pour mourir  ; cf. 15.6+.'
  - type: text
    content: 'Une femme est liée aussi longtemps que son mari est vivant ; mais si le mari vient à s''endormir dans la mort, elle est libre de se marier à qui elle veut ; seulement, que ce soit dans le Seigneur. '
  '4':
  - type: note
    content: Cf. Ep 5.25.
  - type: text
    content: 'Ce n''est pas la femme qui a autorité sur son propre corps, c''est son mari ; de même, ce n''est pas le mari qui a autorité sur son propre corps, c''est sa femme. '
  '40':
  - type: note
    content: V. 10+,25+ ; cf. 2Co 10.7.
  - type: text
    content: Cependant, elle sera plus heureuse, à mon avis, si elle demeure comme elle est. Or moi aussi je pense avoir l'Esprit de Dieu.
  '5':
  - type: note
    content: 'Ne vous privez pas 6.7n. –  sinon pour un temps…  : cf. Testament de Nephtali 8.8s : « Il y a un temps pour s''unir à sa femme, et un temps de continence réservé à la prière. Ce sont là deux commandements, mais s''ils ne sont pas accomplis dans l''ordre qui est le leur, ils sont une occasion de pécher. » –  puis reprenez votre vie conjugale  : litt. et (afin) que vous soyez de nouveau ensemble. –  Satan  : voir démon, diable, Satan. –  vous mette à l''épreuve ou vous tente, cf. 10.13n  ; Mt 4.1n. –  parce que…  : litt. à cause de votre manque de maîtrise (de vous-mêmes) cf. v. 9 ; 9.25 ; Mt 23.25n  ; 2Tm 3.3 ; Tt 1.8.'
  - type: text
    content: 'Ne vous privez pas l''un de l''autre, sinon pour un temps et d''un commun accord, afin de vous consacrer à la prière ; puis reprenez votre vie conjugale, de peur que le Satan vous mette à l''épreuve, parce que vous ne sauriez pas vous maîtriser. '
  '6':
  - type: note
    content: 2Co 8.8.
  - type: text
    content: 'Je dis cela comme une concession, non comme un ordre. '
  '7':
  - type: note
    content: 'tous  : litt. tous les humains ou tous les hommes (le terme grec s''applique, indifféremment en principe, aux hommes et aux femmes). –  un don… de la grâce 1.7n  ; Rm 12.6+ ; voir aussi Mt 19.11s.'
  - type: text
    content: Je voudrais bien que tous soient comme moi ; mais chacun tient de Dieu un don particulier de la grâce, l'un d'une manière, l'autre d'une autre.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ceux qui ne sont pas mariés  : v. 32 ; le même terme grec est traduit par l''expression sans mari aux v. 11,34. –  il est bien… v. 1+.'
  - type: text
    content: 'A ceux qui ne sont pas mariés et aux veuves, je dis qu''il est bien pour eux de demeurer comme moi. '
  '9':
  - type: note
    content: 's''ils ne peuvent pas se maîtriser  : cf. 9.25n  ; Ac 24.25 ; Ga 5.23 ; Tt 3.8 ; 2P 1.6. –  qu''ils se marient 1Tm 5.14. –  brûler  : il faut sans doute comprendre de désir (autre emploi du même verbe en 2Co 11.29n).'
  - type: text
    content: Mais s'ils ne peuvent pas se maîtriser, qu'ils se marient ; car il vaut mieux se marier que de brûler.
