verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le mariage
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pour ce qui concerne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même introduction (reprenant peut-être les différents points abordés par la lettre que les Corinthiens avaient adressée à Paul) au v. 25 ; 8.1,4 ; 12.1 ; 16.1,12 ; cf. 1Th 4.9 ; 5.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que vous avez écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.9 ; 11.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il est bien… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il est bon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette phrase peut être lue comme une affirmation de Paul, ou comme une citation de ce que les Corinthiens lui ont '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 8,26,40 ; comparer avec Gn 2.18.
      marker-yv: yv-n
    - type: text
      text: 'Pour ce qui concerne ce que vous avez écrit, il est bien pour l''homme de ne pas toucher de femme. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: non pas moi, mais le Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 12,25,40 ; 9.14 ; 11.23 ; 14.37 ; 15.3 ; 1Th 4.8 ; voir Mt 5.32+ ; Mc 10.11-12/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'injonction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.17.
      marker-yv: yv-n
    - type: text
      text: 'A ceux qui sont mariés, j''adresse – non pas moi, mais le Seigneur – cette injonction : que la femme ne se sépare pas de son mari ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: abandonne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'répudie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (verbe grec différent en Mt 5.32 etc.) ; même possibilité v. 12s.
      marker-yv: yv-n
    - type: text
      text: si elle s'est séparée, qu'elle demeure sans mari ou qu'elle se réconcilie avec son mari ; et que le mari n'abandonne pas sa femme.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'non pas le Seigneur, mais moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10+.
      marker-yv: yv-n
    - type: text
      text: 'Aux autres, je dis – non pas le Seigneur, mais moi : si un frère a une femme non croyante, et qu''elle consente à habiter avec lui, qu''il ne l''abandonne pas ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'si une femme a un mari non croyant, et qu''il consente à habiter avec elle, qu''elle n''abandonne pas son mari. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les termes traduits par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'consacré(e) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sont apparentés ; cf. 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.11,16s ; Rm 1.7 ; 11.16 ; un écrit fragmentaire de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ' ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lettre halakhique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou 4QMMT) semble avoir employé une formule hébraïque analogue à propos des enfants des prêtres nés hors du cadre des prescriptions sacerdotales. – Voir '
      - type: usfm
        marker: bdit
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: or
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant.
      marker-yv: yv-n
    - type: text
      text: 'Car le mari non croyant est consacré par la femme, et la femme non croyante est consacrée par le frère ; autrement, vos enfants seraient impurs ; or ils sont saints. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: esclave
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'asservi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 21ss). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en pareil cas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction, moins probable'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à de telles gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Rm 14.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou, selon certains mss, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a appelés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.1 ; Ga 1.6 ; Ep 4.4 ; 1Th 4.7.'
      marker-yv: yv-n
    - type: text
      text: 'Mais si le non-croyant veut se séparer, qu''il se sépare ; le frère ou la sœur n''est pas esclave en pareil cas. C''est dans la paix que Dieu vous a appelés. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: En effet, comment savoir, femme, si tu sauveras ton mari ? Ou bien comment savoir, mari, si tu sauveras ta femme ?
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Se conformer à l'appel reçu de Dieu
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vive selon la condition…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'marche comme le Seigneur a mesuré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Rm 12.3)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', comme Dieu a appelé'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. v. 20-24,27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que je prescris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 11.34 ; 16.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans toutes les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Eglises
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.17+.
      marker-yv: yv-n
    - type: text
      text: 'Autrement, que chacun vive selon la condition que le Seigneur lui a donnée en partage, tel qu''il était quand Dieu l''a appelé. C''est ce que je prescris dans toutes les Eglises. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''il demeure '
        - type: usfm
          marker: w
          children:
          - type: text
            text: circoncis
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'il ne (re)devienne pas incirconcis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe grec évoque sans doute, au sens propre, l''opération consistant à reconstituer un prépuce par extension de la peau restante, pour masquer les traces de la circoncision ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.15, à propos de Juifs gagnés à l''hellénisme : « Ils se refirent le prépuce » (autre formule en grec). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''il ne se fasse pas circoncire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ga 3.28 ; 5.2.
      marker-yv: yv-n
    - type: text
      text: 'Quelqu''un était-il circoncis quand il a été appelé ? Qu''il demeure circoncis. Quelqu''un était-il incirconcis quand il a été appelé ? Qu''il ne se fasse pas circoncire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Rm 2.25-27 ; Ga 5.6 ; 6.15 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.23 : « En tout ce que tu fais, sois fidèle à toi-même ; c''est là aussi observer les commandements. » ; voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La circoncision n''est rien, l''incirconcision n''est rien ; ce qui importe, c''est d''observer les commandements de Dieu. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Th 4.3s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des risques…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des inconduites (sexuelles)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son mari '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le mot signifie également '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) 14.35.
      marker-yv: yv-n
    - type: text
      text: 'Toutefois, à cause des risques d''inconduite sexuelle, que chacun ait sa femme, que chacune ait son mari. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la condition…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans l'appel dont il a été appelé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Que chacun demeure dans la condition où il était lorsqu''il a été appelé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: même si tu peux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''autres comprennent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mais si tu as l'occasion de devenir libre, profites-en.
      marker-yv: yv-n
    - type: text
      text: 'Tu étais esclave quand tu as été appelé ? Ne t''en soucie pas ; même si tu peux devenir libre, mets plutôt à profit ta condition. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un affranchi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(terme apparenté à celui qui est traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: libre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 8.36 ; voir aussi Ep 6.5-8 ; Phm 16 ; 1P 2.16,18.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, l''esclave qui a été appelé, dans le Seigneur, est un affranchi du Seigneur ; de même, l''homme libre qui a été appelé est un esclave du Christ. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.20+ ; Ga 5.2.
      marker-yv: yv-n
    - type: text
      text: 'Vous avez été achetés à un prix ; ne devenez pas esclaves des humains. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 17+.
      marker-yv: yv-n
    - type: text
      text: Que chacun, mes frères, demeure devant Dieu dans la condition où il était lorsqu'il a été appelé.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les personnes non mariées et les veuves
    marker-yv: yv-h
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '7.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vierges '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 28,34,36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-38 ; le terme grec s''applique habituellement aux femmes, mais il peut aussi inclure les hommes (cf. v. 27 ; Ap 14.4). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ordre du Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un avis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 40 ; 2Co 8.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grâce à la compassion du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Tm 1.12s,16. –  '
