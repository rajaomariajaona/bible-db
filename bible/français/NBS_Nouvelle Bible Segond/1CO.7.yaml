      marker-yv: yv-n
    - type: text
      text: 'Ne vous privez pas l''un de l''autre, sinon pour un temps et d''un commun accord, afin de vous consacrer à la prière ; puis reprenez votre vie conjugale, de peur que le Satan vous mette à l''épreuve, parce que vous ne sauriez pas vous maîtriser. '
