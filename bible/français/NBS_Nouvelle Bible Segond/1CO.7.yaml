        children:
        - type: text
          text: '8.8s : « Il y a un temps pour s''unir à sa femme, et un temps de continence réservé à la prière. Ce sont là deux commandements, mais s''ils ne sont pas accomplis dans l''ordre qui est le leur, ils sont une occasion de pécher. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puis reprenez votre vie conjugale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et (afin) que vous soyez de nouveau ensemble
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Satan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: démon
        - type: text
          text: ', diable, Satan. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous mette à l''épreuve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous tente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 10.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parce que…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à cause de votre manque de maîtrise (de vous-mêmes) '
      - type: usfm
        marker: ft
        children:
        - type: text
