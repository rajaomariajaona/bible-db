document_id: LEV.9,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Entrée en fonction d'Aaron et de ses fils
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: huitième jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 8.33-35.'
      marker-yv: yv-n
    - type: text
      text: 'Le huitième jour, Moïse appela Aaron et ses fils, ainsi que les anciens d''Israël. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.8-10.
      marker-yv: yv-n
    - type: text
      text: 'Il fit fumer sur l''autel la graisse, les rognons et le lobe du foie du sacrifice pour le péché, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''avait ordonné à Moïse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais il jeta au feu, hors du camp, la chair et la peau. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui remirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui firent trouver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 13,18.'
      marker-yv: yv-n
    - type: text
      text: 'Il immola l''holocauste. Les fils d''Aaron lui remirent le sang, et il en aspergea le pourtour de l''autel. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils lui remirent l''holocauste coupé en morceaux, avec la tête, et il fit fumer cela sur l''autel. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il lava les entrailles et les pattes, et il les fit fumer sur l''autel, par-dessus l''holocauste. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du sacrifice… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la même manière que le premier sacrifice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme le premier.
      marker-yv: yv-n
    - type: text
      text: 'Ensuite il offrit le présent du peuple. Il prit le bouc du sacrifice pour le péché du peuple, il l''immola et l''offrit en sacrifice pour le péché, de la même manière que le premier sacrifice. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: règle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 5.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il présenta l''holocauste et l''offrit selon la règle. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dont il remplit sa main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 8.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il présenta l''offrande végétale, dont il remplit sa main, et il la fit fumer sur l''autel, en plus de l''holocauste du matin. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il immola le taureau et le bélier en sacrifice de paix pour le peuple. Les fils d''Aaron lui remirent le sang, et il en aspergea le pourtour de l''autel, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les graisses du taureau et, du bélier, la queue… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la graisse qui couvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce qui couvre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 3.3,9 etc.) ; sans doute l'épiploon.
      marker-yv: yv-n
    - type: text
      text: 'ainsi que les graisses du taureau et celles du bélier – la queue, la graisse qui couvre les rognons et le lobe du foie ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour l'holocauste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même préposition en hébreu ; de même au v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour le péché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocauste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il dit à Aaron : Prends un taurillon en sacrifice pour le péché et un bélier pour l''holocauste, l''un et l''autre sans défaut, et présente-les devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils mirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Smr, LXX, Vg '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il mit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il fit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils firent.
      marker-yv: yv-n
    - type: text
      text: 'ils mirent les graisses sur les poitrines et il fit fumer les graisses sur l''autel. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dédia rituellement… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Aaron dédia rituellement les poitrines et la cuisse droite devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme Moïse l''avait ordonné.'
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Nb 6.24-26 ; 2S 6.18 ; 1R 8.14,54-58 ; Ps 134. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: descendit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : de l''autel (cf. Ex 27.1 ; 2Ch 4.1) ? d''une tribune (cf. 2Ch 6.13) ?'
      marker-yv: yv-n
    - type: text
      text: 'Aaron leva ses mains vers le peuple et le bénit. Puis il descendit, après avoir offert le sacrifice pour le péché, l''holocauste et le sacrifice de paix. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gloire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6+.
      marker-yv: yv-n
    - type: text
      text: 'Moïse et Aaron entrèrent dans la tente de la Rencontre. Lorsqu''ils en sortirent, ils bénirent le peuple, et la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' apparut à tout le peuple. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: feu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.5s ; 10.2 ; Gn 15.17 ; Jg 6.21 ; 1R 18.38 ; 1Ch 21.26 ; 2Ch 7.1 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.10 : « Moïse avait prié le Seigneur et… le feu était descendu du ciel et avait consumé les matières du sacrifice. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cris de joie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 95.1s.
      marker-yv: yv-n
    - type: text
      text: 'Un feu sortit de devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et dévora sur l''autel l''holocauste et les graisses. Tout le peuple le vit ; ils poussèrent des cris de joie et tombèrent face contre terre.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'âgés d''un an '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.6 ; 14.10 ; Ex 12.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu diras aux Israélites : Prenez un bouc en sacrifice pour le péché, un taurillon et un agneau âgés d''un an et sans défaut pour l''holocauste, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'paix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrande végétale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' va vous apparaître'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6.'
      marker-yv: yv-n
    - type: text
      text: 'un taureau et un bélier pour le sacrifice de paix, afin de les sacrifier devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; et une offrande végétale pétrie à l''huile. Car aujourd''hui le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' va vous apparaître.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils prirent ce que Moïse avait ordonné et l''amenèrent devant la tente de la Rencontre ; toute la communauté se présenta et se tint debout devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 23 ; cf. Ex 16.10 ; 24.16 ; 33.18-23 ; 40.34-38 ; 1R 8.10s ; 2Ch 7.1-3 ; voir aussi Es 40.5 ; Ez 9.3.
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit : Voici ce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a ordonné ; faites-le, et la gloire du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' va vous apparaître. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: offre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour ta maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), cf. 16.17 ; Hé 5.3 ; 7.27. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiation
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Moïse dit à Aaron : Présente-toi devant l''autel ; offre ton sacrifice pour le péché et ton holocauste, et fais l''expiation pour toi et pour le peuple ; offre aussi le présent du peuple et fais l''expiation pour lui, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' l''a ordonné.'
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du sacrifice…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de son sacrifice pour le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même construction au v. 15.
      marker-yv: yv-n
    - type: text
      text: 'Aaron se présenta devant l''autel et il immola le taurillon du sacrifice pour son propre péché. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les fils d''Aaron lui présentèrent le sang ; il trempa son doigt dans le sang, il en mit sur les cornes de l''autel et il versa le reste du sang sur le socle de l''autel. '
