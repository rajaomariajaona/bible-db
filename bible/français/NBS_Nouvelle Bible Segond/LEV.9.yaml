document_id: LEV.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Entrée en fonction d'Aaron et de ses fils
  - type: text
    content: ' '
  - type: note
    content: 'huitième jour  : cf. 8.33-35.'
  - type: text
    content: 'Le huitième jour, Moïse appela Aaron et ses fils, ainsi que les anciens d''Israël. '
  '10':
  - type: note
    content: 4.8-10.
  - type: text
    content: 'Il fit fumer sur l''autel la graisse, les rognons et le lobe du foie du sacrifice pour le péché, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait ordonné à Moïse. '
  '11':
  - type: text
    content: 'Mais il jeta au feu, hors du camp, la chair et la peau. '
  '12':
  - type: note
    content: 'lui remirent  : litt. lui firent trouver, de même aux v. 13,18.'
  - type: text
    content: 'Il immola l''holocauste. Les fils d''Aaron lui remirent le sang, et il en aspergea le pourtour de l''autel. '
  '13':
  - type: text
    content: 'Ils lui remirent l''holocauste coupé en morceaux, avec la tête, et il fit fumer cela sur l''autel. '
  '14':
  - type: text
    content: 'Il lava les entrailles et les pattes, et il les fit fumer sur l''autel, par-dessus l''holocauste. '
  '15':
  - type: note
    content: 'du sacrifice… v. 8n. –  de la même manière que le premier sacrifice  : litt. comme le premier.'
  - type: text
    content: 'Ensuite il offrit le présent du peuple. Il prit le bouc du sacrifice pour le péché du peuple, il l''immola et l''offrit en sacrifice pour le péché, de la même manière que le premier sacrifice. '
  '16':
  - type: note
    content: 'règle  : voir 5.10n  ; voir loi.'
  - type: text
    content: 'Il présenta l''holocauste et l''offrit selon la règle. '
  '17':
  - type: note
    content: 'dont il remplit sa main  : voir 8.33n.'
  - type: text
    content: 'Il présenta l''offrande végétale, dont il remplit sa main, et il la fit fumer sur l''autel, en plus de l''holocauste du matin. '
  '18':
  - type: text
    content: 'Il immola le taureau et le bélier en sacrifice de paix pour le peuple. Les fils d''Aaron lui remirent le sang, et il en aspergea le pourtour de l''autel, '
  '19':
  - type: note
    content: 'Autre traduction les graisses du taureau et, du bélier, la queue… –  la graisse qui couvre  : litt. ce qui couvre (cf. 3.3,9 etc.) ; sans doute l''épiploon.'
  - type: text
    content: 'ainsi que les graisses du taureau et celles du bélier – la queue, la graisse qui couvre les rognons et le lobe du foie ; '
  '2':
  - type: note
    content: 'en sacrifice / pour l''holocauste  : même préposition en hébreu ; de même au v. 3. –  pour le péché 4.1n. –  holocauste 1.3n.'
  - type: text
    content: 'Il dit à Aaron : Prends un taurillon en sacrifice pour le péché et un bélier pour l''holocauste, l''un et l''autre sans défaut, et présente-les devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: note
    content: 'ils mirent  : Smr, LXX, Vg il mit. –  il fit  : LXX ils firent.'
  - type: text
    content: 'ils mirent les graisses sur les poitrines et il fit fumer les graisses sur l''autel. '
  '21':
  - type: note
    content: dédia rituellement… 7.30n.
  - type: text
    content: 'Aaron dédia rituellement les poitrines et la cuisse droite devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme Moïse l''avait ordonné.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'le bénit  : cf. Nb 6.24-26 ; 2S 6.18 ; 1R 8.14,54-58 ; Ps 134. –  descendit  : de l''autel (cf. Ex 27.1 ; 2Ch 4.1) ? d''une tribune (cf. 2Ch 6.13) ?'
  - type: text
    content: 'Aaron leva ses mains vers le peuple et le bénit. Puis il descendit, après avoir offert le sacrifice pour le péché, l''holocauste et le sacrifice de paix. '
  '23':
  - type: note
    content: gloire v. 6+.
  - type: text
    content: 'Moïse et Aaron entrèrent dans la tente de la Rencontre. Lorsqu''ils en sortirent, ils bénirent le peuple, et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut à tout le peuple. '
  '24':
  - type: note
    content: 'feu  : cf. 6.5s ; 10.2 ; Gn 15.17 ; Jg 6.21 ; 1R 18.38 ; 1Ch 21.26 ; 2Ch 7.1 ; 2 Maccabées 2.10 : « Moïse avait prié le Seigneur et… le feu était descendu du ciel et avait consumé les matières du sacrifice. » –  cris de joie Ps 95.1s.'
  - type: text
    content: 'Un feu sortit de devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dévora sur l''autel l''holocauste et les graisses. Tout le peuple le vit ; ils poussèrent des cris de joie et tombèrent face contre terre.'
  '3':
  - type: note
    content: âgés d'un an 12.6 ; 14.10 ; Ex 12.5n.
  - type: text
    content: 'Tu diras aux Israélites : Prenez un bouc en sacrifice pour le péché, un taurillon et un agneau âgés d''un an et sans défaut pour l''holocauste, '
  '4':
  - type: note
    content: 'paix 3.1n. –  offrande végétale 2.1n. –  le Seigneur va vous apparaître  : cf. v. 6.'
  - type: text
    content: 'un taureau et un bélier pour le sacrifice de paix, afin de les sacrifier devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; et une offrande végétale pétrie à l''huile. Car aujourd''hui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' va vous apparaître.'
  '5':
  - type: text
    content: 'Ils prirent ce que Moïse avait ordonné et l''amenèrent devant la tente de la Rencontre ; toute la communauté se présenta et se tint debout devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: gloire v. 23 ; cf. Ex 16.10 ; 24.16 ; 33.18-23 ; 40.34-38 ; 1R 8.10s ; 2Ch 7.1-3 ; voir aussi Es 40.5 ; Ez 9.3.
  - type: text
    content: 'Moïse dit : Voici ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ordonné ; faites-le, et la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' va vous apparaître. '
  '7':
  - type: note
    content: 'offre  : litt. fais. –  pour le peuple  : LXX pour ta maison (c.-à-d. ta famille), cf. 16.17 ; Hé 5.3 ; 7.27. – Voir expiation.'
  - type: text
    content: 'Moïse dit à Aaron : Présente-toi devant l''autel ; offre ton sacrifice pour le péché et ton holocauste, et fais l''expiation pour toi et pour le peuple ; offre aussi le présent du peuple et fais l''expiation pour lui, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a ordonné.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'du sacrifice…  : autre traduction de son sacrifice pour le péché  ; même construction au v. 15.'
  - type: text
    content: 'Aaron se présenta devant l''autel et il immola le taurillon du sacrifice pour son propre péché. '
  '9':
  - type: note
    content: 4.7n. – Voir sang.
  - type: text
    content: 'Les fils d''Aaron lui présentèrent le sang ; il trempa son doigt dans le sang, il en mit sur les cornes de l''autel et il versa le reste du sang sur le socle de l''autel. '
