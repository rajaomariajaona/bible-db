document_id: PSA.121,104
type_code: fra
verses:
  '1':
  - type: heading
    content: D'où me viendra le secours ?
  - type: text
    content: ' '
  - type: note
    content: montées 120.1n. –  Je lève les yeux 123.1. –  vers les montagnes 3.5 ; 20.3 ; 125.2 ; 133.3. –  D'où… 4.7 ; 73.25 ; 94.16 ; 108.11.
  - type: text
    content: Chant pour les montées.
  - type: text
    content: Je lève les yeux vers les montagnes.
  - type: text
    content: D'où me viendra le secours ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 91.1ss. –  qui fait… 115.15+ ; cf. 124.8.
  - type: text
    content: 'Le secours me vient du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui fait le ciel et la terre.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 66.9 ; cf. 23.3s ; 84.6 ; 1S 2.9 ; Pr 3.23. –  qui te garde 127.1 ; Es 27.3.
  - type: text
    content: Il ne te laissera pas vaciller sur tes jambes ;
  - type: text
    content: celui qui te garde ne sommeille pas.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 8.52 ; 18.27 ; Es 5.27. –  qui garde Israël  : cf. 80.2.'
  - type: text
    content: Non, il ne sommeille ni ne dort,
  - type: text
    content: celui qui garde Israël.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ton ombre  : cf. 17.8+ ; 91.1 ; Es 25.4 ; Lc 1.35 ; voir aussi Nb 14.9 ; Lm 4.20. –  à ta droite 16.8 ; 109.31+.'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui te garde,'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est ton ombre à ta droite.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: le soleil… Es 49.10 ; Ap 7.16 ; cf. 2R 4.18ss ; Jon 4.3. On attribuait peut-être certaines maladies à une influence maléfique de la lune (cf. Mt 4.24n).
  - type: text
    content: Le jour, le soleil ne te frappera pas,
  - type: text
    content: ni la lune pendant la nuit.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '41.3 ; 97.10 ; cf. 91.3ss ; Gn 28.15 ; Mt 6.13 ; 1Th 5.23 ; 2Tm 4.18. –  il gardera ta vie  : autre traduction il te gardera.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te gardera de tout mal,'
  - type: text
    content: il gardera ta vie ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 15.5. –  lorsque tu sortiras et lorsque tu rentreras Dt 28.6n  ; 2R 19.27. –  dès maintenant… 113.2+.
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te gardera lorsque tu sortiras et lorsque tu rentreras,'
  - type: text
    content: dès maintenant et pour toujours.
