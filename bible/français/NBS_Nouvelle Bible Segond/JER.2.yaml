document_id: JER.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: De la source d'eau claire aux citernes crevassées
  - type: text
    content: ' '
  - type: note
    content: 1.2n. – Ce v. et le début du v. 2 sont absents de LXX.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Chypre  : l''hébreu Kittim désigne aussi, plus généralement, les îles de la Méditerranée et les rivages lointains, à l''ouest ; cf. Gn 10.4n  ; Nb 24.24. –  des messagers  : sous-entendu dans le texte. –  Qédar  : tribu nomade d''Arabie, à l''est ; cf. 49.28 ; Gn 25.13n  ; Es 21.16n. –  et regardez  : cf. 18.13.'
  - type: text
    content: Passez donc vers les îles de Chypre et regardez !
  - type: text
    content: Envoyez des messagers à Qédar, observez bien
  - type: text
    content: et regardez s'il y a rien de semblable !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'pas des dieux 5.7 ; 16.20 ; 2R 19.18 ; Es 41.23 ; 42.17 ; Ga 4.8 ; Sagesse 15.17 : « Mortel, il (l''idolâtre) ne peut produire de ses mains impies qu''une œuvre morte ; encore vaut-il mieux que les objets de son adoration : lui, il a reçu la vie, mais eux ne l''auront jamais. » Lettre de Jérémie 14 : « Ce ne sont pas des dieux ; ne les craignez donc pas ! » (aussi v. 22,28,39,44,56,64,68). –  sa gloire  : autre lecture traditionnelle ma gloire , c.-à-d. mon être ou ma vie même : cf. Ps 7.6+ ; Jb 19.9 ; 29.20 ; Lm 2.11n  ; 2Co 3.18 ; Col 1.11 ; 1P 4.14 ; voir aussi Os 4.7 ; Ps 106.20 ; Rm 1.23. –  aucune valeur v. 8+.'
  - type: text
    content: Une nation change-t-elle de dieux ?
  - type: text
    content: – pourtant ce ne sont pas des dieux !
  - type: text
    content: Mon peuple, lui, a échangé sa gloire
  - type: text
    content: contre ce qui n'a aucune valeur !
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 1.2n.
  - type: text
    content: Sois-en atterré, ciel !
  - type: text
    content: Frémis et dessèche-toi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'doublement  : cf. 16.18n  ; Os 10.10. –  ils m''ont abandonné v. 17,19 ; 1.16 ; 5.7,19 ; 15.6 ; 16.11 ; 17.13 ; 2Ch 12.5. –  source d''eau vive  : cf. 14.8n  ; 17.13 ; Ps 36.9s ; Jn 4.10nss ; Baruch 3.12 : « Tu (Israël) as délaissé la source de la Sagesse. » –  des citernes  : cf. 14.3 ; 2R 20.20 ; Es 22.11.'
  - type: text
    content: 'Car mon peuple a doublement mal agi :'
  - type: text
    content: ils m'ont abandonné, moi, la source d'eau vive,
  - type: text
    content: pour se creuser des citernes, des citernes crevassées,
  - type: text
    content: qui ne retiennent pas l'eau.
  - type: heading
    content: Un peuple qui a abandonné le Seigneur
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'acheté (le terme correspondant est sous-entendu dans le texte) ou né dans la maison  : cf. Gn 14.14 ; 17.12s,23,27 ; Lv 22.11 ; voir aussi Ex 21.4.'
  - type: text
    content: Israël est-il un esclave, acheté ou né dans la maison ?
  - type: text
    content: Pourquoi est-il livré au pillage ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'jeunes lions 4.7 ; 5.6 ; 12.8 ; 49.19 ; 50.44 ; 51.38 ; Es 5.29 ; 31.4 ; Na 2.12. –  dévastation  : cf. 9.10+ ; Es 1.7.'
  - type: text
    content: Contre lui les jeunes lions rugissent,
  - type: text
    content: ils font retentir leur voix
  - type: text
    content: et sèment la dévastation dans son pays ;
  - type: text
    content: ses villes incendiées n'ont plus d'habitants.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Noph ou Memphis, Tahpanhès ou Daphné : villes du delta du Nil ; cf. 43.7,9 ; 44.1 ; 46.14 ; Es 19.13n  ; Ez 30.13,16,18 ; voir aussi 2R 23.29-35. –  te tondent ou te broutent le crâne , sens possible (cf. 6.3 ; 12.10) ; certains modifient le texte hébreu traditionnel pour lire te défoncent le crâne  ; cf. 48.45 ; Es 3.17.'
  - type: text
    content: Même les fils de Noph et de Tahpanhès
  - type: text
    content: te tondent le crâne.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cela ne t''arrive-t-il pas…  : litt. n''est-ce pas cela que tu te fais en abandonnant le Seigneur v. 13+ ; cf. 5.25. –  il te conduisait v. 6 ; la dernière partie du v. est absente de LXX.'
  - type: text
    content: Cela ne t'arrive-t-il pas
  - type: text
    content: 'parce que tu as abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu,'
  - type: text
    content: au temps où il te conduisait sur le chemin ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Contre la recherche de l''appui politique de l''Egypte et de l''Assyrie  ; cf. v. 36 ; Es 18.1n  ; 20.5s ; 30.1ss ; 31.1ss ; Ez 29.16 ; Os 5.13 ; 7.11 ; 8.9 ; 12.2 ; 14.4. –  Shihor  : transcription d''un nom égyptien qui signifie étang d''Horus et désigne soit le bras oriental du Nil, soit l''un des lacs à l''est du delta ; ici il pourrait être pris comme un synonyme poétique du Nil lui-même ; cf. Jos 13.3 ; 19.26 ; Es 23.3 ; 1Ch 13.5. –  du Fleuve (c.-à-d. l''Euphrate) Gn 15.18 ; 31.21n  ; Dt 1.7 ; Jos 1.4 ; Es 7.20n  ; 8.7.'
  - type: text
    content: Et maintenant, que fais-tu sur le chemin de l'Egypte ?
  - type: text
    content: Vas-tu boire l'eau du Shihor ?
  - type: text
    content: Que fais-tu sur le chemin d'Assyrie ?
  - type: text
    content: Vas-tu boire l'eau du Fleuve ?
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Que ton mal (terme qui peut évoquer le mal commis comme le malheur subi) te corrige (ou t''instruise ) : cf. 6.19+ ; 14.16 ; Nb 14.34 ; Ez 4.4n  ; Ps 7.15-17 ; 107.17 ; Sagesse 4.20 : « Leurs crimes se dresseront contre eux pour les accuser. » 11.16 : « On est puni par où l''on a péché. » –  Vois bien  : litt. sache et vois ou reconnais et regarde  ; cf. v. 23 ; 5.1 ; 11.18 ; 12.3 ; 1R 20.7n. –  abandonner le Seigneur v. 13+. –  frayeur ou, plus littéralement, tremblement  ; cf. 5.22 ; 32.40 ; Dt 4.10+ ; Os 3.5 ; Jb 28.28 ; Pr 1.7+. –  du Seigneur Dieu (YHWH) des Armées (hébreu tseva''oth ) : formule légèrement différente en 5.14 ( YHWH Dieu des Armées ) ; cf. 10.16 ; 1S 1.3n.'
  - type: text
    content: Que ton mal te corrige,
  - type: text
    content: que tes infidélités te châtient !
  - type: text
    content: Vois bien comme c'est mauvais et amer
  - type: text
    content: 'd''abandonner le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu,'
  - type: text
    content: de n'éprouver aucune frayeur devant moi !
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Un peuple révolté et idolâtre
  '2':
  - type: note
    content: 'crie 3.12. –  à Jérusalem  : litt. aux oreilles de Jérusalem. –  ta fidélité (ou ton attachement, cf. 16.5 ; 31.3 ; 33.11 ; certains lui voient ici le sens de charme  ; cf. Es 40.6) de jeune fille… au désert (Dt 2.7 ; 8.2-4) : cf. Ez 16.60 ; Os 2.16ss ; Ap 2.4 ; voir aussi Ez 20.13 ; Am 5.25 ; Ps 78.40 ; 95.10 ; 106.14. –  où rien ne pousse  : litt. qu''on n''ensemence pas ou qui n''est pas ensemencée.'
  - type: text
    content: 'Va, crie à Jérusalem : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je me souviens de ta fidélité de jeune fille,
  - type: text
    content: de ton amour de jeune mariée,
  - type: text
    content: quand tu me suivais au désert,
  - type: text
    content: sur une terre où rien ne pousse.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Depuis longtemps ou depuis toujours  ; cf. 8.5 ; 13.23 ; Ez 20 ; 23 ; Ac 7.51. –  tu as brisé , d''après LXX  ; la vocalisation traditionnelle de l''hébreu pourrait se traduire j''ai brisé . –  joug / liens  : cf. 5.5 ; 11.10 ; 27.2ss ; 1R 12.4 ; Os 10.11 ; Mt 11.30. –  tu as dit  : la forme verbale suppose un sujet féminin. –  Je ne servirai plus ou je ne serai plus esclave , expression qui peut aussi être comprise au sens religieux ( servir Dieu = lui rendre un culte) autre tradition de lecture  : je ne passerai pas (outre) , c.-à-d. je ne transgresserai pas, je ne serai pas infidèle  ; cf. 22.21. –  colline / arbre  : allusion aux cultes pratiqués sur les hauts lieux ; cf. 3.6,13 ; 17.2 ; Dt 12.2+ ; Es 1.29n  ; 57.5 ; Ez 6.13+. –  prostituée 3.1-4 ; 5.7 ; 13.27 ; Es 57.3 ; Ez 16 ; 23 ; voir Os 1.2n.'
  - type: text
    content: Depuis longtemps tu as brisé ton joug,
  - type: text
    content: rompu tes liens ;
  - type: text
    content: 'tu as dit : Je ne servirai plus !'
  - type: text
    content: Sur toute colline élevée
  - type: text
    content: et sous tout arbre verdoyant
  - type: text
    content: tu t'étends, prostituée !
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'cépage de choix  : hébreu soréq , comme en Es 5.2n  ; cf. 5.1+ ; Ps 80.9s ; Jn 15.1. –  d''une qualité tout à fait sûre  : litt. toute semence de loyauté , c.-à-d. sûre  ; le même terme est traduit par vérité 4.2. –  vigne étrangère  : cf. Dt 32.32.'
  - type: text
    content: Moi, je t'avais plantée comme un cépage de choix,
  - type: text
    content: un plant d'une qualité tout à fait sûre ;
  - type: text
    content: comment as-tu pu te changer pour moi
  - type: text
    content: en boutures dégénérées d'une vigne étrangère ?
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'si tu te lavais…  : cf. Es 1.16-18 ; Jb 9.30. –  soude  : cf. Pr 25.20. –  lessive ou potasse  ; il s''agissait sans doute d''un détergent assez caustique, obtenu à partir de cendre végétale mélangée à de l''huile ; terme apparenté Es 1.25n  ; Jb 9.30. –  faute  : voir péché. –  resterait marquée 17.1+ ; cf. Ps 16.1n.'
  - type: text
    content: Même si tu te lavais avec de la soude,
  - type: text
    content: avec de la lessive, tant et plus,
  - type: text
    content: ta faute resterait marquée devant moi
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'impure  : voir pur. –  ton chemin  : cf. v. 36. –  la vallée  : peut-être celle de Hinnom, au sud et à l''ouest de Jérusalem : sur ce qui s''y pratiquait, cf. 7.31s ; 19.6 ; 32.35 ; 2R 23.10. –  légère  : le terme évoque généralement la rapidité (cf. 4.13 ; 46.6 ; Es 18.2 ; Am 2.14s) ; à cette idée s''ajoute ici celle d''un comportement fantasque et inconstant.'
  - type: text
    content: 'Comment peux-tu dire : Je ne me suis pas rendue impure,'
  - type: text
    content: je n'ai pas suivi les Baals !
  - type: text
    content: Regarde ton chemin dans la vallée,
  - type: text
    content: reconnais ce que tu as fait,
  - type: text
    content: chamelle légère qui vagabonde !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Anesse sauvage 14.6 ; Os 8.9. –  haletante…  : litt. elle respire le vent . –  son désir  : litt. le désir de son être ou de sa vie  ; le terme hébreu peut avoir ici le sens d’ aspiration , voire de gorge (cf. v. 25) ; cf. Gn 1.20n. –  pendant son mois  : il faut probablement comprendre pendant qu''elle est en chaleur.'
  - type: text
    content: Anesse sauvage, habituée du désert,
  - type: text
    content: haletante dans l'ardeur de son désir,
  - type: text
    content: qui pourra réfréner son rut ?
  - type: text
    content: Tous ceux qui la cherchent n'ont pas à s'épuiser ;
  - type: text
    content: ils la trouvent pendant son mois.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Dt 32.16 ; Ez 16.32 ; 23 ; Os 5.7 ; Ps 44.21 ; 81.10. –  Arrête-toi…  : litt. retiens ton pied de la nudité et ton gosier de la soif (cf. 31.16) ; on peut voir ici, outre l''appel (ironique ?) à revenir de la conduite précédemment décrite, une menace de l''exil qui en sera la conséquence. –  A quoi bon  : traduction incertaine ; on peut comprendre, ou bien peu m''importe , ou bien c''est sans espoir , 18.12 ; cf. 22.21 ; Es 57.10n. –  étrangers  : le terme peut désigner aussi bien les dieux des autres nations que ces nations elles-mêmes, les alliés du moment comme les futurs envahisseurs cf. 3.13 ; 5.19n  ; 8.19 ; 30.8 ; 51.2,51 ; voir aussi 19.4n  ; 22.20n  ; le terme a parfois le sens de profane (Nb 1.51n), ce qui pourrait suggérer ici l''idée d''une union rituellement illégitime.'
  - type: text
    content: Arrête-toi, sans quoi tu finiras nu-pieds
  - type: text
    content: et le gosier sec !
  - type: text
    content: 'Mais tu dis : A quoi bon !'
  - type: text
    content: Moi, j'aime les étrangers,
  - type: text
    content: je veux les suivre !
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'voleur  : cf. Ex 22.1. –  se couvre de honte 6.15. –  leurs rois… v. 8 ; 1.18 ; 4.9 ; 5.5 ; 32.32.'
  - type: text
    content: Comme un voleur a honte lorsqu'il est découvert,
  - type: text
    content: ainsi la maison d'Israël se couvre de honte
  - type: text
    content: – eux, leurs rois, leurs princes,
  - type: text
    content: leurs prêtres et leurs prophètes,
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'à un morceau de bois / à une pierre  : litt. au bois / à la pierre  ; cf. 3.9 ; il s''agit peut-être des stèles et des poteaux cultuels ou ashéras (Dt 7.5+ ; Jg 3.7n). –  mon père  : cf. 3.4 ; Dt 32.6,18 ; Es 63.16 ; Ml 2.10s. –  leur dos  : litt. leur nuque  ; cf. 18.17n  ; 32.33 ; voir aussi Ex 23.27n. –  Lève-toi, sauve-nous ! cf. Os 6.1s ; Ps 3.8.'
  - type: text
    content: 'eux qui disent à un morceau de bois : Tu es mon père !'
  - type: text
    content: 'et à une pierre : Tu m''as engendré !'
  - type: text
    content: Car ils ne m'ont pas présenté leur face, mais leur dos ;
  - type: text
    content: 'et quand ils sont dans le malheur, ils disent :'
  - type: text
    content: Lève-toi, sauve-nous !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Où…  : cf. 10.8,14 ; 11.12 ; 16.20 ; Dt 32.37s ; Jg 10.14 ; 1R 18.26ss ; Es 57.13 ; Os 14.4. –  autant de dieux que de villes…  : LXX ajoute et ils ont offert autant (d''encens) au Baal qu''il y a de rues dans Jérusalem  ; 11.13 ; cf. Es 2.8 ; Os 8.11 ; voir aussi Dt 12.5.'
  - type: text
    content: – Où sont donc tes dieux, ceux que tu t'es faits ?
  - type: text
    content: Qu'ils se lèvent, s'ils peuvent te sauver au temps du malheur !
  - type: text
    content: Car tu as autant de dieux que de villes, ô Juda !
  - type: heading
    content: Dieu se plaint de son peuple infidèle
  '29':
  - type: text
    content: ' '
  - type: note
    content: m'accuseriez-vous v. 9+.
  - type: text
    content: De quoi m'accuseriez-vous ?
  - type: text
    content: Vous vous êtes tous révoltés contre moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'un bien sacré ou saint 1.5n  ; cf. 11.15 ; 31.40 ; voir aussi Ex 19.5+. –  les prémices  : cf. Ex 23.6 ; Lv 23.10 ; Dt 26.2s ; voir aussi Ex 4.22. –  qui en mangeaient  : cf. 10.25 ; 12.14 ; 30.16,20 ; 50.7. –  se mettaient en tort  : cf. 50.7 ; 51.5n  ; autre traduction devaient faire réparation  ; cf. Lv 5.6n  ; voir Gn 12.3,17 ; 20.3,7 ; 35.5 ; Nb 22–24 ; Ps 105.14s ; voir aussi Es 10.5-19 ; 47.6ss ; Za 1.15.'
  - type: text
    content: 'Israël était un bien sacré pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: les prémices de sa récolte ;
  - type: text
    content: tous ceux qui en mangeaient se mettaient en tort,
  - type: text
    content: et le malheur fondait sur eux
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'ils n''ont pas voulu  : LXX vous n''avez pas voulu  ; sur l’ instruction ou la correction , cf. v. 19 ; 5.3+. –  votre épée  : LXX l''épée  ; cf. Es 1.20. –  vos prophètes  : cf. 26.20-24 ; 1R 19.10 ; Né 9.26 ; Mt 23.35.'
  - type: text
    content: C'est inutilement que j'ai frappé vos fils ;
  - type: text
    content: ils n'ont pas voulu recevoir l'instruction ;
  - type: text
    content: votre épée a dévoré vos prophètes,
  - type: text
    content: comme un lion destructeur.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'considérez  : litt. voyez  ; le verbe est souvent employé pour les visions prophétiques (cf. Am 1.1). –  Nous allons où nous voulons ou nous sommes libres ; nous sommes des vagabonds  ; traduction incertaine ; cf. v. 20 ; 14.10 ; 52.3 ; Gn 27.40.'
  - type: text
    content: 'Eh ! vous, gens de cette génération, considérez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Ai-je été pour Israël un désert,
  - type: text
    content: ou un pays de ténèbres ?
  - type: text
    content: 'Pourquoi mon peuple dit-il :'
  - type: text
    content: Nous allons où nous voulons,
  - type: text
    content: nous ne voulons pas revenir à toi !
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'jeune fille  : litt. vierge . –  ceinture  : comme en Es 3.20. –  m''a oublié 3.21 ; 13.25 ; 18.15 ; Dt 8.19 ; 32.18 ; Es 17.10+.'
  - type: text
    content: – La jeune fille oublie-t-elle sa parure,
  - type: text
    content: la mariée sa ceinture ?
  - type: text
    content: Mon peuple, lui, m'a oublié
  - type: text
    content: depuis des jours sans nombre.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'ton chemin et ta voie (22.21, litt. tes voies ) traduisent un même mot hébreu (cf. v. 23,36 ; 3.13n,21 ; 4.18), fréquemment employé pour désigner métaphoriquement la conduite. –  l''amour  : certains, d''après LXX, modifient le texte hébreu traditionnel pour lire l''amour illicite (litt. pas ainsi , cf. 8.6n  ; 23.10). –  Même aux pires des femmes tu donnerais des leçons  : traduction incertaine ; on pourrait aussi comprendre tu t''es exercée à faire le mal (cf. 13.23).'
  - type: text
    content: Comme tu as bien su faire ton chemin
  - type: text
    content: pour rechercher l'amour !
  - type: text
    content: Même aux pires des femmes tu donnerais des leçons !
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'sur les pans de ton vêtement  : LXX sur tes mains , cf. Es 1.15. –  le sang , litt. des êtres des pauvres innocents  ; sur le mot hébreu néphesh , qui correspond ici à êtres , voir Gn 1.20n  ; cf. Lm 4.14. –  que tu n''as pas surpris (ou que je n''ai pas surpris , d''après LXX et Vg) en flagrant délit d''effraction ou en cours d''effraction , comme en Ex 22.1 (c.-à-d. cette loi ne peut être invoquée comme excuse par les meurtriers). –  voilà ce qui te perd  : texte obscur, litt. parce que (c''est) sur (ou à cause de ) tous ceux-là ( ?) ; certains rattachent ce vers au v. 35 et traduisent et en plus de tout cela (35) tu dis…  ; d''autres modifient le texte hébreu traditionnel pour lire ton joug est une malédiction ou tous ceux-là sont pour toi une malédiction.'
  - type: text
    content: Jusque sur les pans de ton vêtement
  - type: text
    content: on retrouve le sang des pauvres, des innocents
  - type: text
    content: 'que tu n''as pas surpris en flagrant délit d''effraction :'
  - type: text
    content: voilà ce qui te perd.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Que sa colère se détourne  : autre traduction à coup sûr, sa colère s''est détournée  ; cf. 3.5. –  j''entre en jugement  : cf. v. 9+. –  Je n''ai pas péché  : sur ce verbe, cf. Pr 8.35-36n.'
  - type: text
    content: 'Et tu dis :'
  - type: text
    content: Je suis innocente !
  - type: text
    content: Que sa colère se détourne de moi !
  - type: text
    content: – Eh bien, j'entre en jugement avec toi,
  - type: text
    content: 'puisque tu dis : Je n''ai pas péché !'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Pourquoi couvrir tant de distance ou pourquoi t''en vas-tu si loin  ; certaines versions anciennes supposent une vocalisation légèrement différente des consonnes de l''hébreu, qu''on pourrait traduire  : Pourquoi agir à la légère, te rendre vile (cf. 15.19), ou méprisable (Lm 1.8). –  Egypte / Assyrie v. 18n. –  honte 48.13 ; Es 30.3.'
  - type: text
    content: Pourquoi couvrir tant de distance
  - type: text
    content: pour changer ton chemin ?
  - type: text
    content: Tu auras aussi honte de l'Egypte,
  - type: text
    content: comme tu as eu honte de l'Assyrie.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'les mains sur la tête  : signe d''humiliation (2S 13.19) ; certains voient ici une allusion à l''exil (attitude imposée aux prisonniers). –  rejette  : autre traduction méprise . –  tu ne réussiras pas  : autres traductions tu ne seras pas victorieuse ; tu ne prospèreras pas.'
  - type: text
    content: De là aussi tu sortiras,
  - type: text
    content: les mains sur la tête,
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rejette ceux à qui tu te fies :'
  - type: text
    content: tu ne réussiras pas avec eux.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Ecoutez… 7.2 ; 10.1 ; Ez 6.3 ; Os 4.1. –  Jacob / Israël 5.20 ; Gn 32.29 ; cf. Nb 23.21,23 ; 24.5 ; Dt 33.10 ; Es 2.5 ; 41.21. –  clans 1.15n.
  - type: text
    content: 'Ecoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', maison de Jacob, vous tous, clans de la maison d''Israël ! '
  '5':
  - type: note
    content: 'Quelle injustice Mi 6.3 ; cf. Dt 32.4s ; Es 1.1s ; Jb 34.10 ; voir justice. –  ce qui est futile / eux-mêmes futiles (8.19n  ; même terme qu''en Ec 1.2n) : cf. 2R 17.15 ; Os 9.10 ; Ps 115.8 ; 135.18 (voir 2Co 3.18) ; voir aussi Ac 14.15.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Quelle injustice vos pères ont-ils trouvée en moi
  - type: text
    content: pour s'éloigner de moi,
  - type: text
    content: pour suivre ce qui est futile
  - type: text
    content: et se rendre eux-mêmes futiles ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Où est le Seigneur … v. 8 ; cf. 2R 2.14 ; Es 63.11 ; Jb 35.10. –  qui nous a fait monter… 7.22 ; 16.14 ; Gn 12.10n  ; Dt 20.1 ; Ez 20.9 ; Am 2.10. –  qui nous a conduits Dt 32.10-12. –  terre de plaines arides… Dt 1.1n  ; 8.15. –  d''ombre de mort  : autre traduction d''obscurité profonde  ; LXX a lu stérile  ; cf. 13.16 ; Jb 3.5n.'
  - type: text
    content: 'Ils n''ont pas dit : Où est le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui nous a fait monter d'Egypte,
  - type: text
    content: qui nous a conduits dans le désert,
  - type: text
    content: dans une terre de plaines arides et de fosses,
  - type: text
    content: dans une terre de sécheresse et d'ombre de mort,
  - type: text
    content: dans une terre par où personne ne passe
  - type: text
    content: et où n'habite aucun être humain ?
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'de vergers  : litt. du verger (le même mot hébreu désigne le Carmel en 4.26) Dt 8.7-9 ; 32.13-18. –  pour que vous en mangiez…  : litt. pour manger son fruit et son bien . –  rendu mon pays impur  : cf. 3.1,9 ; 23.15 ; Es 24.5 ; Ps 106.38s ; voir pur.'
  - type: text
    content: Je vous ai fait entrer dans un pays de vergers
  - type: text
    content: pour que vous en mangiez le fruit et que vous jouissiez de ses biens ;
  - type: text
    content: mais quand vous êtes venus, vous avez rendu mon pays impur
  - type: text
    content: et vous avez fait de mon patrimoine une abomination.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.5 ; Mi 3.11. –  prêtres / spécialistes de la loi ou de l''instruction divine, de même 6.19 ; 9.12 ; 16.11 ; 18.18 ; 26.4 ; 31.33 ; 32.23 ; 44.10 ; cf. Lv 10.11 ; Nb 27.21 ; Dt 31.9-13 ; 33.10,12 ; 1S 14.36ss ; 2R 12.3n  ; Ez 7.26 ; Os 4.6 ; Ml 2.7 ; cf. Lc 11.52. –  Où est le Seigneur v. 6+. –  bergers 3.15 ; 6.3 ; 10.21 ; 12.10 ; 23.1-6 ; 50.6 ; Ez 34.2n. –  prophètes 5.13,31 ; 6.13 ; 8.10 ; 14.13-15 ; 23.9-40 ; 27.9,14-18,28 ; 29.8s,15 ; 37.9. –  parlent ou, plus littéralement, parlent ou agissent en prophètes  ; le verbe hébreu correspondant, apparenté au nom traduit par prophètes , est traditionnellement rendu par prophétiser , mais il n''évoque pas nécessairement une annonce de l''avenir ; on le retrouve, diversement traduit, en 5.31 ; 11.21 ; 14.14nss ; 19.14 ; 20.1,6 ; 23.13-32 ; 25.13,30 ; 26.9,20n  ; 27.10,14ss ; 28.6ss ; 29.9,21,26s,31 ; 32.3 ; 37.19 ; Ez 4.7n  ; Jl 3.1n  ; Am 2.12 ; 3.8+ ; Za 13.3n  ; il évoque une action accomplie ou une parole prononcée au nom de la divinité, à l''origine dans un état extatique (Nb 11.25nss ; 1S 10.5). –  par le Baal 23.13 ; cf. 1R 18. –  aucune valeur  : cf. v. 11 ; 16.19 ; 1S 12.21 ; Es 30.5 ; 44.9.'
  - type: text
    content: 'Les prêtres ne disent pas : Où est le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ?'
  - type: text
    content: Les spécialistes de la loi ne me connaissent pas,
  - type: text
    content: les bergers se sont révoltés contre moi,
  - type: text
    content: les prophètes parlent par le Baal,
  - type: text
    content: ils suivent ceux qui n'ont aucune valeur.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'j''accuse v. 29,35 ; Es 43.26. –  les fils de vos fils  : quelques mss et Vg ont lu simplement vos fils  ; cf. Ex 20.5.'
  - type: text
    content: C'est pourquoi je vous accuse encore,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: j'accuse aussi les fils de vos fils.
