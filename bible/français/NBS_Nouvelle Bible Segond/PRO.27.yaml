        text: '13.10ss : « Ne salue pas, dans ta violence, ton ennemi impulsif ; ne blesse pas ton propre cœur. Ne lui dis pas faussement : “Salut !”, quand il y a du mal au dedans de toi (litt. “dans ton ventre”). Ne parle pas faussement à un homme, c''est une abomination aux yeux du dieu. Ne coupe pas ton cœur de ta langue, pour que tu aies du succès dans toutes tes entreprises. » –  '
    - type: usfm
