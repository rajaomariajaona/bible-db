document_id: PRO.27,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Ne te vante pas  : cf. v. 2 ; le verbe hébreu est souvent traduit par être fier de . –  lendemain  : cf. 20.22n  ; Mt 6.34 ; Lc 12.19s ; Jc 4.13s.'
  - type: text
    content: 'Ne te vante pas du lendemain :'
  - type: text
    content: tu ne sais pas ce qu'un jour peut enfanter.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'N''abandonne pas…  : cf. 17.17 ; 18.24 ; Siracide 37.6 : « N''oublie pas un ami dans ton cœur et ne perds pas son souvenir au milieu de tes richesses. » –  au jour où…  : litt. au jour de ta catastrophe.'
  - type: text
    content: N'abandonne pas ton ami, ni l'ami de ton père ;
  - type: text
    content: ne va pas chez ton frère au jour où la catastrophe s'abat sur toi ;
  - type: text
    content: mieux vaut un voisin proche qu'un frère éloigné.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 119.42.
  - type: text
    content: Mon fils, deviens sage et réjouis mon cœur,
  - type: text
    content: et je pourrai répondre à celui qui m'outrage.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 22.3n.
  - type: text
    content: L'homme avisé voit le malheur, et il se cache.
  - type: text
    content: Les naïfs passent outre, et ils doivent en payer le prix.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 20.16n.
  - type: text
    content: Prends-lui son vêtement, s'il s'est porté garant pour un autre ;
  - type: text
    content: si c'est au profit d'une inconnue, exige de lui des gages.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'bénit  : autre traduction salue  ; selon une croyance répandue en Orient, féliciter quelqu''un prématurément ou trop bruyamment, c''est attirer sur lui la jalousie des puissances invisibles et, par suite, le malheur. –  son prochain  : certains modifient le texte hébreu traditionnel pour lire le mauvais ou en pensant à mal  ; cf. Instruction d''Aménémopé 13.10ss : « Ne salue pas, dans ta violence, ton ennemi impulsif ; ne blesse pas ton propre cœur. Ne lui dis pas faussement : “Salut !”, quand il y a du mal au dedans de toi (litt. “dans ton ventre”). Ne parle pas faussement à un homme, c''est une abomination aux yeux du dieu. Ne coupe pas ton cœur de ta langue, pour que tu aies du succès dans toutes tes entreprises. » –  de grand matin  : autre traduction souvent  ; cf. Jr 7.13n.'
  - type: text
    content: Celui qui bénit son prochain d'une voix forte et de grand matin,
  - type: text
    content: cela lui est compté comme une malédiction.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Une gouttière…  : cf. 19.13+.'
  - type: text
    content: Une gouttière qui ne cesse de couler par un jour de pluie
  - type: text
    content: 'et une femme querelleuse sont comparables :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'saisit  : sens incertain ; litt. appelle (convoque pour rassembler). Certains modifient les voyelles du verbe pour lire recueille de l''huile dans sa main ; sa main droite rencontre de l''huile . LXX a un texte différent  : Le vent du nord est un vent violent, mais on l''appelle du nom de favorable.'
  - type: text
    content: celui qui la retient retient le vent,
  - type: text
    content: sa main droite saisit de l'huile.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'le visage de son prochain  : on peut comprendre que les hommes s''affinent ou se stimulent réciproquement par leurs contacts ; ou bien, dans un sens négatif, qu''ils aiguisent leur colère les uns contre les autres.'
  - type: text
    content: Le fer aiguise le fer ;
  - type: text
    content: ainsi un homme aiguise le visage de son prochain.
  '18':
  - type: text
    content: Celui qui veille sur un figuier en mange le fruit ;
  - type: text
    content: celui qui garde son maître est honoré.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Comme dans l''eau…  : litt. comme l''eau le visage au visage, ainsi le cœur de l''homme à l''homme . LXX comme les visages ne ressemblent pas aux visages, ainsi les cœurs des hommes ne se ressemblent pas non plus.'
  - type: text
    content: Comme dans l'eau le visage correspond au visage,
  - type: text
    content: ainsi le cœur de l'homme correspond à l'homme.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2Co 10.12s.
  - type: text
    content: Que ce ne soit pas ta propre bouche qui te vante, mais quelqu'un d'autre ;
  - type: text
    content: non pas tes propres lèvres, mais un étranger.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.15s. –  séjour des morts 1.12n. –  monde des disparus  : cf. 15.11n. –  les yeux…  : cf. Ec 1.8 ; 2.10 ; 4.8. LXX ajoute  : celui qui ferme les yeux est une abomination pour le Seigneur (cf. 16.30) , de même les ignorants qui ne sont pas maîtres de leur langue.'
  - type: text
    content: Le séjour des morts et le monde des disparus ne peuvent être rassasiés ;
  - type: text
    content: de même les yeux de l'homme ne peuvent être rassasiés.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'creuset… 17.3+. –  sa renommée  : litt. sa louange (c.-à-d. l''éloge qu''on fait de lui ).'
  - type: text
    content: Il y a un creuset pour l'argent et un four pour l'or ;
  - type: text
    content: un homme est jugé d'après sa renommée.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'l''imbécile 1.7n. –  imbécillité  : cf. 15.21+.'
  - type: text
    content: Quand tu pilerais l'imbécile dans un mortier,
  - type: text
    content: avec un pilon, au milieu des grains,
  - type: text
    content: son imbécillité ne se séparerait pas de lui.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 12.10n.
  - type: text
    content: Connais bien chacun de tes moutons,
  - type: text
    content: donne tes soins à tes troupeaux ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'un diadème…  : sens incertain ; cf. Nb 6.7n. Certains modifient le texte hébreu traditionnel pour lire un trésor, un héritage.'
  - type: text
    content: car la richesse ne dure pas toujours,
  - type: text
    content: un diadème ne se garde pas de génération en génération.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Le foin…  : certains, s''appuyant partiellement sur LXX, voient dans les v. 25s une seule phrase  : le foin enlevé, la verdure apparue, l''herbage des montagnes est recueilli afin que tu aies des agneaux pour te vêtir… Cf. 1Tm 6.8.'
  - type: text
    content: Le foin enlevé, la verdure paraît,
  - type: text
    content: et l'herbage des montagnes est recueilli.
  '26':
  - type: text
    content: Tu as des moutons pour te vêtir,
  - type: text
    content: des boucs pour payer le champ ;
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'nourriture  : le mot hébreu est aussi traduit par pain . –  la subsistance  : litt. la vie.'
  - type: text
    content: le lait des chèvres suffit à ta nourriture, à la nourriture de ta maison
  - type: text
    content: et à la subsistance de tes servantes.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la contrariété d''un imbécile (1.7n) : on peut comprendre la contrariété causée par un imbécile , ou bien un imbécile contrarié.'
  - type: text
    content: La pierre est pesante, le sable est lourd ;
  - type: text
    content: la contrariété d'un imbécile pèse plus que l'une et l'autre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 6.34s.
  - type: text
    content: La fureur est cruelle, la colère impétueuse ;
  - type: text
    content: qui peut tenir devant la passion jalouse ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'un avertissement ou une réprimande 1.23n. –  qu''un amour tenu caché  : on pourrait aussi comprendre que des blâmes voilés par amitié.'
  - type: text
    content: Mieux vaut un avertissement ouvert
  - type: text
    content: qu'un amour tenu caché.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'd''un ami  : c.-à-d. infligées par un ami . –  d''un ennemi  : litt. de celui qui déteste ou qui hait  ; cf. 25.21. –  trompeurs ou nombreux , sens incertain et traduction conjecturale ; le terme dérive de la racine habituellement traduite, selon les formes, par supplier, intercéder, se laisser fléchir (Gn 25.21n  ; Ex 8.4n), d''où l''autre traduction possible on les réclame en vain  ; cf. Ez 35.13n. Certains modifient le texte hébreu traditionnel pour lire déplaisants, mauvais . Cf. 26.24-26 ; Mt 26.49.'
  - type: text
    content: Les blessures d'un ami sont dignes de confiance ;
  - type: text
    content: les baisers d'un ennemi sont trompeurs.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui est rassasié…  : autres traductions le gosier rassasié… le gosier affamé (sur le terme hébreu correspondant, voir Gn 1.20n).'
  - type: text
    content: Celui qui est rassasié foule aux pieds le rayon de miel ;
  - type: text
    content: celui qui est affamé trouve doux tout ce qui est amer.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'erre  : cf. 26.2n  ; Ps 11.1n. –  loin de son lieu  : autre traduction loin de chez lui.'
  - type: text
    content: Comme l'oiseau qui erre loin de son nid,
  - type: text
    content: tel est l'homme qui erre loin de son lieu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'la douceur d''un ami…  : on pourrait aussi comprendre la douceur d''un ami vient des conseils (ou du souci , cf. Ps 13.3n) de l''âme (sur ce dernier mot, voir Gn 1.20n).'
  - type: text
    content: L'huile et l'encens réjouissent le cœur ;
  - type: text
    content: la douceur d'un ami vaut mieux que les conseils qu'on se donne à soi-même.
