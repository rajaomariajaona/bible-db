type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Dans la Bible hébraïque (voir l''introduction à l''Ancien Testament, p.${Xintat}), le livre de Ruth est le premier des '
  - type: text
    content: cinq Rouleaux
  - type: text
    content: ' ('
  - type: text
    content: Megilloth
  - type: text
    content: ) qui sont lus à l'occasion des cinq principales fêtes du judaïsme. Ruth est lu à la fête des Moissons (cf. Rt 1.22), qu'on appelle également Pentecôte. En marge de la grande histoire où se joue le sort du peuple opprimé par ses voisins (Rt 1.1 renvoie au livre des Juges), il met en scène deux femmes frappées par le deuil et la misère, puis progressivement rétablies dans l'abondance et le bonheur.
  - type: text
    content: 'Derrière cette petite chronique familiale d''une belle tenue littéraire, une question de fond : certains sont-ils, de par leur naissance, irrémédiablement '
  - type: text
    content: exclus
  - type: text
    content: ' du grand dessein de Dieu, comme pouvaient sembler l''être les Moabites (Dt 23.4) ?'
  - type: text
    content: '*'
  - type: text
    content: '* *'
  - type: text
    content: 'Le personnage principal est en effet '
  - type: text
    content: Ruth la Moabite
  - type: text
    content: ', qui a donné son nom au livre. Chaque étape du récit met en évidence les qualités de cette jeune femme : dans l''adversité, elle ne se résout pas à abandonner Noémi, sa belle-mère (chap. 1) ; elle entreprend courageusement de glaner dans le champ de Booz, un parent de Noémi, pour assurer leur survie à toutes deux (chap. 2) ; sur le conseil de Noémi, elle agit de telle sorte que Booz la demande en mariage (chap. 3), ce qui procurera subsistance et pérennité à sa famille (chap. 4). Ruth devient ainsi la bisaïeule du roi David, dont la généalogie constitue l''épilogue de l''ouvrage.'
  - type: text
    content: 'Les événements décisifs ont lieu à Beth-Léhem ; mais le récit concerne aussi les liens généalogiques et politiques de '
  - type: text
    content: David
  - type: text
    content: ' avec la nation de '
  - type: text
    content: Moab
  - type: text
    content: ' et son territoire. L''arrière-grand-mère de David n''était-elle pas moabite ? David n''aurait-il pas tiré parti d''attaches personnelles pour mettre sa famille à l''abri tandis qu''il fuyait devant Saül (1S 22.3s) ?'
  - type: text
    content: 'Pour une bonne intelligence du récit, on pourra s''informer de '
  - type: text
    content: coutumes
  - type: text
    content: ' particulières, tels le droit de glane et surtout la '
  - type: text
    content: rédemption
  - type: text
    content: ' ou rachat familial, avec le rôle spécifique du '
  - type: text
    content: go'el
  - type: text
    content: ' (voir 2.20'
  - type: text
    content: n
  - type: text
    content: ') associé pour la circonstance au mariage léviratique. Les lois du Pentateuque fournissent quelques renseignements : Lévitique 19.9s ; 23.22 ; Deutéronome 24.19-22 (glanage) ; Lévitique 25.23-28 (rédemption) ; Deutéronome 25.5-10 (lévirat). C''est le livre de Ruth lui-même qui situe ces usages dans le cadre de la vie courante.'
  - type: text
    content: 'La question des '
  - type: text
    content: mariages mixtes
  - type: text
    content: ', qui sera si rudement traitée par Néhémie et Esdras, est ici abordée sous un angle tout différent (cf. Né 13.1-3 ; Esd 9.1s ; 10 ; voir aussi Dt 7.3). Au lieu d''un brutal rejet, le livre de Ruth honore les femmes de valeur, fussent-elles étrangères (Esd 10.15 va peut-être dans le même sens). Au lieu d''inciter à la répudiation, il enseigne à discerner chez elles la réalité d''une intelligence spirituelle qui remet en cause préventions et préjugés. Il n''est pas sans intérêt de rapprocher ce débat de l''histoire ambiguë des filles de Loth, qui explique l''origine des Moabites et des Ammonites en Gn 19.30ss (cf. v. 37'
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: L'exemple de Ruth deviendra celui de l'
  - type: text
    content: adhésion du cœur
  - type: text
    content: ' à la communauté de la foi et à son Dieu (1.16). La tradition juive a fait de cette histoire un modèle pour les femmes prosélytes : aujourd''hui encore, au moment de se joindre à la communauté israélite, elles prennent volontiers pour nouveau prénom celui de Ruth. Du côté chrétien, l''Evangile selon Matthieu fait à Ruth la pauvre veuve, l''étrangère, l''honneur d''une mention particulière parmi les ancêtres de Jésus (Mt 1.5).'
