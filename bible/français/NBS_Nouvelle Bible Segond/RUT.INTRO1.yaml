document_id: RUT.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans la Bible hébraïque (voir l''introduction à l''Ancien Testament, p.${Xintat}), le livre de Ruth est le premier des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: cinq Rouleaux
  - type: text
    text: ' ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Megilloth
  - type: text
    text: ) qui sont lus à l'occasion des cinq principales fêtes du judaïsme. Ruth est lu à la fête des Moissons (cf. Rt 1.22), qu'on appelle également Pentecôte. En marge de la grande histoire où se joue le sort du peuple opprimé par ses voisins (Rt 1.1 renvoie au livre des Juges), il met en scène deux femmes frappées par le deuil et la misère, puis progressivement rétablies dans l'abondance et le bonheur.
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Derrière cette petite chronique familiale d''une belle tenue littéraire, une question de fond : certains sont-ils, de par leur naissance, irrémédiablement '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: exclus
  - type: text
    text: ' du grand dessein de Dieu, comme pouvaient sembler l''être les Moabites (Dt 23.4) ?'
- type: usfm
  marker: is2
  children:
  - type: text
    text: '*'
- type: usfm
  marker: is2
  children:
  - type: text
    text: '* *'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le personnage principal est en effet '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Ruth la Moabite
  - type: text
    text: ', qui a donné son nom au livre. Chaque étape du récit met en évidence les qualités de cette jeune femme : dans l''adversité, elle ne se résout pas à abandonner Noémi, sa belle-mère (chap. 1) ; elle entreprend courageusement de glaner dans le champ de Booz, un parent de Noémi, pour assurer leur survie à toutes deux (chap. 2) ; sur le conseil de Noémi, elle agit de telle sorte que Booz la demande en mariage (chap. 3), ce qui procurera subsistance et pérennité à sa famille (chap. 4). Ruth devient ainsi la bisaïeule du roi David, dont la généalogie constitue l''épilogue de l''ouvrage.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les événements décisifs ont lieu à Beth-Léhem ; mais le récit concerne aussi les liens généalogiques et politiques de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: David
  - type: text
    text: ' avec la nation de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Moab
  - type: text
    text: ' et son territoire. L''arrière-grand-mère de David n''était-elle pas moabite ? David n''aurait-il pas tiré parti d''attaches personnelles pour mettre sa famille à l''abri tandis qu''il fuyait devant Saül (1S 22.3s) ?'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pour une bonne intelligence du récit, on pourra s''informer de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: coutumes
  - type: text
    text: ' particulières, tels le droit de glane et surtout la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rédemption
  - type: text
    text: ' ou rachat familial, avec le rôle spécifique du '
  - type: usfm
    marker: it
    children:
    - type: text
      text: go'el
  - type: text
    text: ' (voir 2.20'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ') associé pour la circonstance au mariage léviratique. Les lois du Pentateuque fournissent quelques renseignements : Lévitique 19.9s ; 23.22 ; Deutéronome 24.19-22 (glanage) ; Lévitique 25.23-28 (rédemption) ; Deutéronome 25.5-10 (lévirat). C''est le livre de Ruth lui-même qui situe ces usages dans le cadre de la vie courante.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La question des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: mariages mixtes
  - type: text
    text: ', qui sera si rudement traitée par Néhémie et Esdras, est ici abordée sous un angle tout différent (cf. Né 13.1-3 ; Esd 9.1s ; 10 ; voir aussi Dt 7.3). Au lieu d''un brutal rejet, le livre de Ruth honore les femmes de valeur, fussent-elles étrangères (Esd 10.15 va peut-être dans le même sens). Au lieu d''inciter à la répudiation, il enseigne à discerner chez elles la réalité d''une intelligence spirituelle qui remet en cause préventions et préjugés. Il n''est pas sans intérêt de rapprocher ce débat de l''histoire ambiguë des filles de Loth, qui explique l''origine des Moabites et des Ammonites en Gn 19.30ss (cf. v. 37'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ).
- type: usfm
  marker: ip
  children:
  - type: text
    text: L'exemple de Ruth deviendra celui de l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: adhésion du cœur
  - type: text
    text: ' à la communauté de la foi et à son Dieu (1.16). La tradition juive a fait de cette histoire un modèle pour les femmes prosélytes : aujourd''hui encore, au moment de se joindre à la communauté israélite, elles prennent volontiers pour nouveau prénom celui de Ruth. Du côté chrétien, l''Evangile selon Matthieu fait à Ruth la pauvre veuve, l''étrangère, l''honneur d''une mention particulière parmi les ancêtres de Jésus (Mt 1.5).'
