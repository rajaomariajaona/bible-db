document_id: PSA.69,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel au secours
  - type: text
    content: ' '
  - type: note
    content: « Les lis » 45.1n.
  - type: text
    content: Du chef de chœur. Sur « Les lis ». De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la passion jalouse de ta maison  : certains ont compris la jalousie que ta maison suscite (chez les ennemis) ; 119.139 ; Jn 2.17  ; cf. Esd ; Ag 1.4ss. –  les outrages v. 8n  ; Rm 15.3.'
  - type: text
    content: Car la passion jalouse de ta maison me dévore,
  - type: text
    content: et les outrages de ceux qui t'outragent tombent sur moi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je pleure…  : litt. je pleure, dans le jeûne, mon âme , texte incertain ; LXX et Syr semblent avoir lu j''humilie (ou j''afflige ) mon âme (c.-à-d. je me prive ) par le jeûne , comme en 35.13 ; cf. 6.4n  ; 109.24s ; Es 58.5 ; Za 7.3 ; voir aussi Jr 13.17n.'
  - type: text
    content: Je pleure, je jeûne,
  - type: text
    content: et cela me vaut des outrages ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'sac  : signe de deuil. –  une fable 44.15+.'
  - type: text
    content: je prends un sac pour vêtement,
  - type: text
    content: et je deviens pour eux une fable.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ceux qui sont assis à la porte ( de la ville , sous-entendu dans le texte), c.-à-d. les notables, qui font aussi office de juges (Dt 16.18n  ; 17.5 ; Rt 3.11). –  alcool Lv 10.9n.
  - type: text
    content: Ceux qui sont assis à la porte de la ville bavardent contre moi,
  - type: text
    content: et les buveurs d'alcool me mettent en chansons.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'temps favorable  : cf. 30.6+ ; Es 49.8. –  par ta grande fidélité  : cf. 5.8n. –  loyauté 85.11n.'
  - type: text
    content: 'Moi, je t''adresse ma prière, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Que ce soit le temps favorable, ô Dieu,
  - type: text
    content: par ta grande fidélité !
  - type: text
    content: Réponds-moi par ta loyauté, par ton salut !
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 2 ; 18.17s ; 40.3.
  - type: text
    content: Délivre-moi de la boue, et que je n'enfonce plus !
  - type: text
    content: Que je sois délivré de ceux qui me détestent
  - type: text
    content: et du tréfonds des eaux !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'le puits 55.24n. –  ne se referme…  : litt. ne ferme pas sa bouche (ou sa gueule ) sur moi , c.-à-d. ne m''engloutisse pas.'
  - type: text
    content: Que le courant de l'eau ne m'emporte pas,
  - type: text
    content: que les profondeurs ne m'engloutissent pas,
  - type: text
    content: et que le puits ne se referme pas sur moi !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'car ta fidélité est bonne  : cf. 109.21 ; Lm 3.32.'
  - type: text
    content: 'Réponds-moi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', car ta fidélité est bonne.'
  - type: text
    content: Selon ta grande compassion, tourne-toi vers moi,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'ne te détourne pas de moi  : litt. ne me cache pas ta face  ; cf. 13.2+ ; 102.3 ; 143.7. –  je suis dans la détresse  : certains comprennent l''ennemi est devant moi  ; cf. 60.13n. –  réponds-moi vite 31.3+.'
  - type: text
    content: et ne te détourne pas de moi, ton serviteur !
  - type: text
    content: Puisque je suis dans la détresse, réponds-moi vite !
  '19':
  - type: text
    content: ' '
  - type: note
    content: Approche-toi (ou rends-toi proche ) de moi Lm 3.57 ; un terme apparenté désigne le proche parent qui assure la rédemption  ; cf. Ps 19.15+ ; Rt 2.20n.
  - type: text
    content: Approche-toi de moi, assure ma rédemption !
  - type: text
    content: Libère-moi, à cause de mes ennemis !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'V. 15+. –  les eaux… 18.5 ; Es 8.7 ; Jon 2.4ss ; Lm 3.53s. –  la gorge  : mot traduit ailleurs par vie ou âme (6.4n) ; cf. Jon 2.6.'
  - type: text
    content: Sauve-moi, ô Dieu,
  - type: text
    content: car les eaux me viennent jusqu'à la gorge.
  '20':
  - type: text
    content: 'Toi, tu connais mon déshonneur, ma honte, ma confusion :'
  - type: text
    content: tous mes adversaires sont devant toi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Le déshonneur  : autre traduction les outrages  ; cf. v. 8n. – Voir cœur. –  je suis malade  : traduction incertaine ; on a aussi compris c''est incurable. –  j''espère… Es 51.19 ; 63.5. –  un signe de pitié ou un hochement de tête  ; cf. Jr 15.5n.'
  - type: text
    content: Le déshonneur me brise le cœur, et je suis malade ;
  - type: text
    content: j'espère un signe de pitié, mais rien ;
  - type: text
    content: des consolateurs, et je n'en trouve pas.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'du poison  : le mot est traditionnellement traduit par fiel  ; cf. Dt 29.17 ; Os 10.4 ; voir Mt 27.34,48/ / ; Jn 19.28-30. –  dans ma nourriture  : probablement celle qui était offerte pour la consolation, cf. 2S 3.35 ; 12.17 ; Jr 16.7.'
  - type: text
    content: Ils mettent du poison dans ma nourriture,
  - type: text
    content: et, pour apaiser ma soif, ils me font boire du vinaigre.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'et leur prospérité  : le sens du mot hébreu, qui fait assonance avec table , est incertain ; autre traduction possible et pour ceux qui sont en paix (avec eux) ; Tg et leurs sacrifices (ou repas ) de paix (Lv 3.1n) ; LXX et une rétribution  ; cf. Rm 11.9s.'
  - type: text
    content: Que leur table soit un piège devant eux,
  - type: text
    content: et leur prospérité un filet !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'fais-les constamment chanceler…  : cf. Ez 29.7n.'
  - type: text
    content: Que leurs yeux s'obscurcissent et ne voient plus,
  - type: text
    content: fais-les constamment chanceler sur leurs reins !
  '25':
  - type: text
    content: ' '
  - type: note
    content: Répands sur eux ta fureur 79.6 ; Jr 10.25 ; Ez 21.36 ; So 3.8 ; Ap 16.1.
  - type: text
    content: Répands sur eux ta fureur,
  - type: text
    content: et que ta colère ardente les atteigne !
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jb 8.22 ; Mt 23.38 ; Ac 1.20.
  - type: text
    content: Que leur campement soit dévasté,
  - type: text
    content: qu'il n'y ait plus personne pour habiter leurs tentes !
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ceux que tu as toi-même frappés Es 53.4,10. –  ils racontent la souffrance  : LXX et Syr ont lu ils ajoutent à la souffrance.'
  - type: text
    content: Car ils poursuivent ceux que tu as toi-même frappés,
  - type: text
    content: ils racontent la souffrance de ceux que tu as transpercés.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.11. –  faute  : voir péché. –  qu''ils n''aient pas accès…  : cf. Mt 5.20.'
  - type: text
    content: Ajoute cette faute à leurs fautes,
  - type: text
    content: et qu'ils n'aient pas accès à ta justice !
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 32.32s ; Es 4.3 ; 56.5 ; Ez 13.9 ; Dn 12.1 ; Lc 10.20 ; Ph 4.3 ; Ap 3.5+.
  - type: text
    content: Qu'ils soient effacés du livre de vie,
  - type: text
    content: et qu'ils ne soient pas inscrits avec les justes !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'dans la boue 40.3n  ; cf. Jr 38.6. –  des profondeurs  : autre traduction profonde  ; cf. v. 16. –  sans pouvoir tenir ou sans que rien ne m''arrête, sans rien trouver pour prendre appui. –  un courant m''emporte v. 16 ; 124.4s ; cf. 88.4-8.'
  - type: text
    content: J'enfonce dans la boue des profondeurs, sans pouvoir tenir ;
  - type: text
    content: je descends au fond des eaux, un courant m'emporte.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 40.18+ ; 70.6.
  - type: text
    content: 'Moi, je suis pauvre et souffrant :'
  - type: text
    content: ô Dieu, que ton salut me relève !
  '31':
  - type: text
    content: Je louerai le nom de Dieu par le chant,
  - type: text
    content: je le magnifierai par la reconnaissance ;
  '32':
  - type: text
    content: ' '
  - type: note
    content: '40.7+ss ; 50.14 ; Mi 6.6-8. –  un taureau  : litt. un bovin, un taureau.'
  - type: text
    content: 'cela plaira au '
  - type: text
    content: Seigneur
  - type: text
    content: ' plus qu''un taureau'
  - type: text
    content: avec cornes et sabots.
  '33':
  - type: text
    content: ' '
  - type: note
    content: '22.27+ ; 34.3. –  Les pauvres  : cf. v. 30 ; voir 9.13n. –  qui cherchez Dieu 9.11+.'
  - type: text
    content: Les pauvres voient, ils se réjouissent ;
  - type: text
    content: vous qui cherchez Dieu, que votre cœur vive !
  '34':
  - type: text
    content: ' '
  - type: note
    content: '140.13. –  ses prisonniers  : cf. Za 9.11 ; Ep 3.1+ ; Phm 1n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entend les pauvres,'
  - type: text
    content: il ne méprise pas ses prisonniers.
  '35':
  - type: text
    content: Que le ciel et la terre le louent,
  - type: text
    content: les mers et tout ce qui y fourmille !
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 10+ ; 51.20 ; 102.17 ; Es 44.26 ; Jr 30.18 ; Ez 36.10 ; Am 9.14. –  on s''y installera  : autre traduction ils s''y installeront.'
  - type: text
    content: Car Dieu sauvera Sion et bâtira les villes de Juda ;
  - type: text
    content: on s'y installera, on en prendra possession ;
  '37':
  - type: text
    content: ' '
  - type: note
    content: la descendance… Es 65.9. –  ceux qui aiment son nom 5.12+.
  - type: text
    content: la descendance de ses serviteurs l'aura pour patrimoine,
  - type: text
    content: et ceux qui aiment son nom y auront leur demeure.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Je me fatigue à force de crier 6.7 ; Jr 45.3. –  mes yeux s'épuisent… 119.82,123 ; cf. Jr 14.6 ; Jb 11.20 ; 17.5 ; Lm 2.11 ; 4.17. –  attendre mon Dieu 33.22 ; 130.5s.
  - type: text
    content: Je me fatigue à force de crier, mon gosier est brûlant,
  - type: text
    content: mes yeux s'épuisent à attendre mon Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'nombreux 3.2+ ; cf. 25.19 ; 38.20. –  que les cheveux… 40.13. –  ceux qui me détestent sans raison 35.19+ ; Jn 15.25. –  ceux qui veulent me réduire au silence  : Syr a lu ils sont plus puissants que mes os, ceux qui sont à tort…'
  - type: text
    content: Ils sont plus nombreux que les cheveux de ma tête,
  - type: text
    content: ceux qui me détestent sans raison ;
  - type: text
    content: ils sont puissants, ceux qui veulent me réduire au silence,
  - type: text
    content: qui sont à tort mes ennemis ;
  - type: text
    content: ce dont je n'ai dépouillé personne, il faut que je le restitue.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 32.5 ; 38.6 ; cf. 7.10+ ; 139.1ss.
  - type: text
    content: O Dieu, tu connais mon imbécillité,
  - type: text
    content: et mes torts ne te sont pas cachés.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 33. –  pas honteux  : cf. 34.6. –  confus 4.3+.'
  - type: text
    content: Que ceux qui t'espèrent ne soient pas honteux à cause de moi,
  - type: text
    content: 'Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées !'
  - type: text
    content: Que ceux qui te cherchent ne soient pas confus à cause de moi,
  - type: text
    content: Dieu d'Israël !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'c''est pour toi… 44.23 ; Jr 15.15. –  les outrages  : autre traduction le déshonneur , comme aux v. 20s ; de même aux v. 10s ; cf. 71.13 ; 79.4. –  la confusion… 4.3+ ; 44.16.'
  - type: text
    content: Car c'est pour toi que je supporte les outrages,
  - type: text
    content: que la confusion me couvre le visage ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: '31.12+ ; cf. 27.10 ; Jb 19.13,15. –  je suis devenu un inconnu  : une autre forme du même verbe est traduite par se pervertir en 58.4 ; autre traduction je suis devenu repoussant pour mes frères (cf. Jb 19.13).'
  - type: text
    content: je suis devenu un inconnu pour mes frères,
  - type: text
    content: un étranger pour les fils de ma mère.
