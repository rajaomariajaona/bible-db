  - type: text
    text: 'Nous refusons les secrets de la honte ; nous ne nous comportons pas avec ruse et nous n''altérons pas la parole de Dieu. Au contraire, en rendant la vérité manifeste, nous nous recommandons nous-mêmes à toute conscience humaine devant Dieu. '
