      - type: text
        text: '4.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pas abandonnés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hé 13.5.
    marker-yv: yv-n
  - type: text
    text: 'persécutés, mais non pas abandonnés ; abattus, mais non pas perdus ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
