document_id: 2CO.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un trésor dans des vases de terre
  - type: text
    content: ' '
  - type: note
    content: ce ministère 3.3n,6ss. –  selon la compassion… 1Co 7.25. –  ne perdons pas courage ou ne nous lassons pas , v. 8-11,16 ; Ga 6.9+.
  - type: text
    content: 'Dès lors, puisque nous avons ce ministère, selon la compassion dont nous avons été l''objet, nous ne perdons pas courage. '
  '10':
  - type: note
    content: 'la mort  : litt. la mise à mort ou le mourir  : cf. v. 16 ; 1.5 ; 13.4 ; Rm 6.8 ; 8.17 ; 1Co 15.31 ; Ga 6.17 ; Ph 1.20 ; 3.10s. –  se manifeste  : litt. soit manifestée, de même v. 11.'
  - type: text
    content: 'nous portons toujours avec nous, dans notre corps, la mort de Jésus, pour que la vie de Jésus aussi se manifeste dans notre corps. '
  '11':
  - type: note
    content: 6.9 ; Rm 8.36+. – Voir chair.
  - type: text
    content: 'Car nous qui vivons, nous sommes sans cesse livrés à la mort à cause de Jésus, pour que la vie de Jésus aussi se manifeste dans notre chair mortelle. '
  '12':
  - type: note
    content: 'Cf. 1.4n. –  est à l''œuvre  : sur le verbe grec correspondant voir 1Co 12.6n.'
  - type: text
    content: Ainsi, en nous, c'est la mort qui est à l'œuvre, mais en vous, c'est la vie.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Ps 116.10 . – Voir Esprit.
  - type: text
    content: 'Et comme nous avons le même Esprit, celui de la foi, ainsi qu''il est écrit : '
  - type: text
    content: J'ai cru, c'est pourquoi j'ai parlé
  - type: text
    content: '  – nous aussi nous croyons, c''est pourquoi nous parlons, '
  '14':
  - type: note
    content: Rm 8.11 ; 1Co 6.14. –  réveillé ou relevé, Rm 4.24n. –  nous fera paraître ou comparaître (en sa présence est sans doute sous-entendu dans le texte) ; cf. 5.10 ; 1Co 8.8n  ; Ep 5.27+.
  - type: text
    content: 'sachant que celui qui a réveillé le Seigneur Jésus nous réveillera aussi avec Jésus et nous fera paraître avec vous en sa présence. '
  '15':
  - type: note
    content: 'à cause de vous 1.6. –  en foisonnant  : le même verbe est traduit par avoir trop en 8.15 ; cf. Rm 5.20n  ; 6.1. –  les actions de grâces… 1.11 ; 9.11s ; 1Co 14.17 ; Ep 5.4 ; Col 2.7 ; 1Tm 2.1 ; 4.3s ; Ap 4.9.'
  - type: text
    content: Car tout cela arrive à cause de vous, pour que la grâce, en foisonnant, fasse abonder, à la gloire de Dieu, les actions de grâces d'un plus grand nombre.
  - type: heading
    content: Toujours pleins de courage
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'nous ne perdons pas courage v. 1+. –  chez nous l''homme extérieur  : litt. notre homme (ou être humain ) du dehors  ; cf. Ep 4.2n  ; Col 3.9. –  dépérit  : autres traductions périt, tombe en pourriture  ; verbe apparenté en 7.2 ( ruiner ) ; 11.3 ( se corrompre ). –  l''homme intérieur  : litt. notre dedans  ; cf. 12.2 ; Rm 7.22 ; Ep 3.16 ; 1P 3.4n. –  se renouvelle Ep 4.23s ; Col 3.10.'
  - type: text
    content: 'C''est pourquoi nous ne perdons pas courage. Et même si chez nous l''homme extérieur dépérit, l''homme intérieur se renouvelle de jour en jour. '
  '17':
  - type: note
    content: 'détresse (1.4n) : cf. Jn 16.22 ; Rm 8.17s ; Hé 12.11 ; 1P 1.6s. –  insignifiant  : autre traduction léger (même terme en Mt 11.30). – L''idée de poids est associée en hébreu à celle de gloire  ; cf. 3.7-10,18.'
  - type: text
    content: 'Car un moment de détresse insignifiant produit pour nous, au-delà de toute mesure, un poids éternel de gloire. '
  '18':
  - type: note
    content: 'ce qui se voit / ce qui ne se voit pas (certains comprennent ce qu''on ne voit pas encore) : cf. 5.7 ; Col 1.16 ; Hé 11.1,3.'
  - type: text
    content: Aussi nous regardons, non pas à ce qui se voit, mais à ce qui ne se voit pas ; car ce qui se voit est éphémère, mais ce qui ne se voit pas est éternel.
  '2':
  - type: note
    content: 'les secrets de la honte  : litt. les choses cachées de la honte  ; autre traduction les manœuvres secrètes et honteuses  ; cf. 1Co 4.5. –  nous ne nous comportons pas  : litt. nous ne marchons pas, cf. 5.7 ; 10.2s ; 12.18. –  ruse 11.3 ; 12.16n  ; 1Co 3.19. –  n''altérons pas la parole de Dieu 2.17 ; le verbe utilisé ici est apparenté au mot traduit par ruse en 1Th 2.3. –  nous nous recommandons 3.1+. –  à toute conscience 5.11.'
  - type: text
    content: 'Nous refusons les secrets de la honte ; nous ne nous comportons pas avec ruse et nous n''altérons pas la parole de Dieu. Au contraire, en rendant la vérité manifeste, nous nous recommandons nous-mêmes à toute conscience humaine devant Dieu. '
  '3':
  - type: note
    content: voilée 3.13ss. –  ceux qui vont à leur perte 2.15+ ; cf. 1Co 1.18 ; 2P 3.16.
  - type: text
    content: 'Si cependant notre bonne nouvelle est encore voilée, elle est voilée pour ceux qui vont à leur perte '
  '4':
  - type: note
    content: 'les gens sans foi ou les non-croyants (même terme 6.14s) ; Tt 1.15 ; Ap 21.8. –  dont l''intelligence…  : litt. dont le dieu de ce monde (Mt 12.32n  ; Rm 12.1n) a aveuglé l''intelligence  ; cf. Jn 12.31+ ; 1Co 2.6 ; 2Th 2.11. –  qu''ils ne voient pas…  : autre traduction que ne brille pas la lumière de la bonne nouvelle…  ; cf. v. 6 ; 3.7ss ; Mt 17.2/ /. –  resplendir…  : litt. l''illumination (de même v. 6) de la bonne nouvelle. –  la gloire du Christ 8.23 ; Lc 24.26 ; Jn 2.1 ; 2Th 2.14 ; 1Tm 3.16 ; Tt 2.13 ; Hé 5.5 ; 1P 1.11 ; 4.11,13 ; 2P 3.18. –  image de Dieu 3.18 ; cf. Gn 1.26s ; Rm 8.29 ; Col 1.15 ; Hé 1.3.'
  - type: text
    content: – pour les gens sans foi dont l'intelligence a été aveuglée par le dieu de ce monde, de sorte qu'ils ne voient pas resplendir la bonne nouvelle de la gloire du Christ, qui est l'image de Dieu.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ce n''est pas…  : litt. nous ne nous proclamons (1.19+) pas nous-mêmes, mais Jésus-Christ (11.4) Seigneur (1.2 ; cf. Rm 10.9+ ; 1Co 12.3 ; Ph 2.11) et nous-mêmes vos esclaves (ou vos serviteurs ) ; cf. 1Co 3.5 ; 9.19 ; 2Co 1.24.'
  - type: text
    content: 'En effet, ce n''est pas sur nous-mêmes que porte notre proclamation : nous proclamons que Jésus-Christ est le Seigneur, et que nous-mêmes sommes vos esclaves à cause de Jésus. '
  '6':
  - type: note
    content: 'des ténèbres… la lumière  : cf. Gn 1.3 ; Es 9.1 ; Ps 112.4 ; Jb 37.15. – Voir cœur. –  pour que resplendisse la connaissance  : litt. pour l''illumination de la connaissance, cf. v. 4n  ; Ep 1.18 ; 1P 2.9. –  sur le visage du Christ 3.7-18.'
  - type: text
    content: 'Car le Dieu qui a dit : « Du sein des ténèbres brillera la lumière » a brillé dans notre cœur, pour que resplendisse la connaissance de la gloire de Dieu sur le visage du Christ.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vases de terre  : cf. 5.1 ; 12.7-10 ; Lm 4.2 ; Ga 4.14 ; voir aussi Gn 2.7 ; Rm 9.21nss ; 1Co 15.47 ; 1Th 4.4.'
  - type: text
    content: 'Mais nous portons ce trésor dans des vases de terre, pour que cette puissance supérieure soit celle de Dieu et non la nôtre. '
  '8':
  - type: note
    content: Cf. 1Co 4.11+. –  pressés ou dans la détresse, 1.4n,8 ; 7.5. –  écrasés 6.4n,12. –  désemparés / désespérés 1.8n.
  - type: text
    content: 'Nous sommes pressés de toute manière, mais non pas écrasés ; désemparés, mais non pas désespérés ; '
  '9':
  - type: note
    content: pas abandonnés Hé 13.5.
  - type: text
    content: 'persécutés, mais non pas abandonnés ; abattus, mais non pas perdus ; '
