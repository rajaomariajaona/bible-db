    text: 'Nous sommes pressés de toute manière, mais non pas écrasés ; désemparés, mais non pas désespérés ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
