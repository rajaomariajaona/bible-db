    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'voilée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.13ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceux qui vont à leur perte '
    - type: usfm
      marker: ft
      children:
      - type: text
