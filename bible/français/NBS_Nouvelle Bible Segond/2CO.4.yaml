    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.7-18.
    marker-yv: yv-n
  - type: text
    text: 'Car le Dieu qui a dit : « Du sein des ténèbres brillera la lumière » a brillé dans notre cœur, pour que resplendisse la connaissance de la gloire de Dieu sur le visage du Christ.'
