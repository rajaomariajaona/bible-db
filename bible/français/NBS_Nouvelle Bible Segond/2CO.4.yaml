      - type: text
        text: '4.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: est à l'œuvre
    - type: usfm
      marker: ft
      children:
