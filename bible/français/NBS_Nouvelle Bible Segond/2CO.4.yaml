  - type: text
    text: 'nous portons toujours avec nous, dans notre corps, la mort de Jésus, pour que la vie de Jésus aussi se manifeste dans notre corps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
