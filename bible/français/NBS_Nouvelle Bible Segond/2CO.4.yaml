    text: 'Car nous qui vivons, nous sommes sans cesse livrés à la mort à cause de Jésus, pour que la vie de Jésus aussi se manifeste dans notre chair mortelle. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
