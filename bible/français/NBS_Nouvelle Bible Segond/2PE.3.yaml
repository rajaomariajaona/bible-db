    - type: usfm
      marker: ft
      children:
      - type: text
        text: '11.23–12.1 : « Tu as pitié de tous parce que tu peux tout, et tu détournes les yeux des péchés des hommes pour les amener au repentir. Tu aimes tous les êtres et ne détestes aucune de tes œuvres : aurais-tu haï l''une d''elles, tu ne l''aurais pas créée. Et comment un être quelconque aurait-il subsisté, si toi, tu ne l''avais voulu, ou aurait-il été conservé sans avoir été appelé par toi. Tu les épargnes tous, car ils sont à toi, Maître qui aimes la vie, et ton esprit incorruptible est dans tous les êtres. »'
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur ne retarde pas l''accomplissement de la promesse, comme quelques-uns le pensent. Il est patient envers vous : il ne souhaite pas que quelqu''un se perde, mais que tous accèdent à un changement radical.'
