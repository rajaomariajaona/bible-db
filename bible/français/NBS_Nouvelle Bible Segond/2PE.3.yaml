    - type: usfm
      marker: ft
      children:
      - type: text
        text: '83.3-5 : « J''ai vu en vision le ciel se détacher, s''effondrer et s''abattre sur la terre. Et comme il s''abattait sur la terre, j''ai vu celle-ci s''engloutir dans un vaste abîme… C''est la destruction de la terre. »'
    marker-yv: yv-n
  - type: text
