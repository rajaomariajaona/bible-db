document_id: 2PE.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Si le Seigneur tarde
  - type: text
    content: ' '
  - type: note
    content: 'Bien-aimés v. 8,14,17 ; Jd 3,17,20. –  seconde lettre  : on pense généralement que la première lettre est 1P ; quelques-uns estiment cependant qu''il s''agit de 2P 1–2, qui aurait constitué à l''origine une épître indépendante. –  souvenirs 1.12-15. –  claire 1Co 5.8n.'
  - type: text
    content: 'Bien-aimés, c''est déjà la seconde lettre que je vous écris. En toutes deux, je fais appel à des souvenirs, pour éveiller en vous une claire intelligence, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'jour du Seigneur 1Th 5.2+ss ; cf. Jl 3.4 ; Am 5.18ss ; 1Co 1.8 ; 3.13. –  comme un voleur  : certains mss ajoutent dans la nuit Mt 24.43ss/ / ; Ap 3.3 ; 16.15. –  les cieux passeront Mc 13.31/ /. –  les éléments v. 12 ; même terme en Ga 4.3n  ; Col 2.8n. –  ses œuvres  : litt. les œuvres en elle . –  mise à découvert  : litt., selon les meilleurs mss, trouvée  ; l''expression peut être comprise dans un sens judiciaire, c.-à-d. jugée et déclarée coupable  ; d''autres témoins anciens lisent ne sera pas trouvée, sera trouvée dissoute, sera consumée, disparaîtra  ; cf. Ap 20.11.'
  - type: text
    content: Cependant le jour du Seigneur viendra, comme un voleur. En ce jour-là, les cieux passeront avec fracas, les éléments embrasés se dissoudront et la terre, avec ses œuvres, sera mise à découvert.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'est appelé… autre traduction est ainsi en train de se dissoudre . –  comment…  : litt. quels (hommes) vous faut-il être en saints (actes) de conduite et de piété.'
  - type: text
    content: 'Puisque tout cela est appelé à se dissoudre ainsi, comment ne devriez-vous pas vivre ! C''est avec une conduite sainte et avec piété '
  '12':
  - type: note
    content: 'qu''il vous faut…  : litt. (cf. v. 11n) attendant et hâtant. –  attendre  : cf. Mt 11.3/ / ; 24.50/ / ; Lc 3.15. –  hâter  : certains comprennent, dans un sens affaibli, aspirer à ou faire tous vos efforts en vue de  ; voir cependant Es 60.22 ; Mc 13.20/ / ; 4 Esdras 4.38s : « Seigneur souverain, nous sommes tous pleins de péchés, et peut-être la moisson des justes sera-t-elle différée à cause des péchés des habitants de la terre. » Dans le Talmud, la venue du Messie a pour condition le retour d''Israël à Dieu. –  cieux / éléments v. 10+.'
  - type: text
    content: 'qu''il vous faut attendre et hâter l''avènement du jour de Dieu, où les cieux enflammés se dissoudront et où les éléments embrasés se fondront. '
  '13':
  - type: note
    content: 'Es 65.17 ; 66.22  ; cf. 2Co 5.17 ; Ap 21.1. –  la justice habite ou habitera  : cf. 1.1 ; Es 9.6 ; 11.3s ; 60.21 ; Jr 23.5s ; Za 9.9 ; voir aussi 1Co 6.9s ; Ap 21.27 ; 22.15.'
  - type: text
    content: 'Or nous attendons, selon sa promesse, '
  - type: text
    content: des cieux nouveaux et une terre nouvelle,
  - type: text
    content: ' où la justice habite.'
  - type: heading
    content: La patience du Seigneur est votre salut
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'bien-aimés v. 1+. –  efforcez-vous 1.5+. –  sans tache…  : cf. 2.13 ; Jd 24.'
  - type: text
    content: 'Aussi, bien-aimés, dans cette attente, efforcez-vous d''être trouvés par lui sans tache et sans défaut dans la paix. '
  '15':
  - type: note
    content: 'patience / salut v. 9+ ; Rm 2.4+. –  Paul  : cf. Ga 2.11ss. –  frère bien-aimé  : cf. Ep 6.21 ; Col 1.7,9 ; 1Th 3.2. –  la sagesse 1Co 2.7 ; Ep 1.7. –  donnée Rm 12.3 ; 15.15 ; 1Co 3.10 ; Ga 2.9 ; Ep 3.2,7 ; Col 1.25 ; cf. 2Tm 2.7.'
  - type: text
    content: 'Considérez que la patience de notre Seigneur est votre salut, comme Paul, notre frère bien-aimé, vous l''a aussi écrit selon la sagesse qui lui a été donnée. '
  '16':
  - type: note
    content: 'Cf. Rm 3.8 ; 1Co 6.12 ; 2Co 4.3 ; 10.10 ; Ga 5.13 ; 2Th 2.2. –  ignorants  : litt. non instruits  ; le terme s''oppose à celui qui est habituellement traduit par disciples, et qui est dérivé du verbe correspondant à apprendre. –  mal affermis 2.14. –  les autres Ecritures  : cf. v. 1-2+ ; 1.20. –  perdition 2.1+.'
  - type: text
    content: C'est ce qu'il fait dans toutes les lettres où il parle de ces sujets ; il s'y trouve des passages difficiles à comprendre, dont les gens ignorants et mal affermis tordent le sens, comme ils le font aussi avec les autres Ecritures, pour leur propre perdition.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'entraînés (Ga 2.13) par l''égarement 2.15+,18 ; Mc 13.5/ /. –  déchoir Ga 5.4 ; cf. 1Co 10.12. –  fermeté  : cf. 1.12.'
  - type: text
    content: 'Puisque vous êtes prévenus, bien-aimés, soyez sur vos gardes, de peur qu''entraînés par l''égarement des impies vous ne veniez à déchoir de votre fermeté ; '
  '18':
  - type: note
    content: 'croissez  : cf. 1Co 3.1s ; Ep 4.15 ; Col 1.10 ; 2.19 ; 1P 2.2. –  dans la grâce et la connaissance… 1.2+,11+ ; Ph 3.8. –  A lui la gloire  : cf. Rm 16.27+ ; Jd 25. –  jour de l''éternité  : cf. v. 8. –  Amen ! ce terme est absent de certains mss.'
  - type: text
    content: 'croissez plutôt dans la grâce et la connaissance de Jésus-Christ, notre Seigneur et Sauveur. A lui la gloire, maintenant et jusqu''au jour de l''éternité ! '
  - type: text
    content: Amen !
  '2':
  - type: note
    content: 'Jd 17. –  dites à l''avance  : autre traduction dites autrefois  ; cf. Rm 15.4n. –  saints prophètes / apôtres  : cf. 1.16-21. –  commandement 2.21+ ; certains comprennent du commandement du Seigneur et Sauveur transmis par vos apôtres  ; voir loi.'
  - type: text
    content: 'pour que vous vous souveniez des paroles dites à l''avance par les saints prophètes et du commandement de vos apôtres, commandement de celui qui est Seigneur et Sauveur. '
  '3':
  - type: note
    content: Vous savez… 1.20n. –  dans les derniers jours 2Tm 3.1+ ; Jd 18 ; cf. Mc 13.22/ / ; Ac 20.29ss ; 2Th 2.3ss ; 1Tm 4.1ss ; 1Jn 2.18s. –  désirs 1.4+ ; Jd 16.
  - type: text
    content: 'Vous savez, avant tout, que dans les derniers jours il viendra des moqueurs pleins de moqueries, qui iront au gré de leurs propres désirs '
  '4':
  - type: note
    content: 'Où est la promesse  : cf. Es 5.19 ; Jr 5.12s ; 17.15 ; Ez 12.22 ; Am 9.10 ; So 1.12 ; Ml 2.17 ; Ps 42.11 ; Mt 24.48. –  les pères se sont endormis (dans la mort est sous-entendu dans le texte : voir 1Th 4.13nss) : cf. Mt 10.23 ; Mc 9.1/ / ; 13.30/ /.'
  - type: text
    content: 'et diront : « Où est la promesse de son avènement ? Car, depuis que les pères se sont endormis dans la mort, tout demeure comme depuis le commencement de la création. »'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 1.2,6-10. –  surgit… et se tint  : ces deux verbes correspondent à un seul verbe grec, qui est traduit par se tenir en Col 1.17 ; autre traduction qui surgirent de l''eau et se tinrent… –  au milieu de l''eau  : autre traduction par l''eau.'
  - type: text
    content: 'En effet, ils oublient volontairement qu''il y eut, autrefois, des cieux et une terre qui surgit de l''eau et se tint au milieu de l''eau par la parole de Dieu, '
  '6':
  - type: note
    content: '2.5 ; Gn 7.11-21 ; cf. la description du déluge en 1 Hénoch 83.3-5 : « J''ai vu en vision le ciel se détacher, s''effondrer et s''abattre sur la terre. Et comme il s''abattait sur la terre, j''ai vu celle-ci s''engloutir dans un vaste abîme… C''est la destruction de la terre. »'
  - type: text
    content: 'et que par cela même le monde d''alors disparut, submergé par l''eau ; '
  '7':
  - type: note
    content: V. 10. –  gardés… 2.4ss. –  jour du jugement 2.9.
  - type: text
    content: or c'est par la même parole que les cieux et la terre de maintenant sont gardés en réserve pour le feu, en vue du jour du jugement et de la perdition des impies.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ps 90.4.
  - type: text
    content: 'Il est cependant un point que vous ne devez pas oublier, bien-aimés : c''est que pour le Seigneur un jour est comme mille ans et mille ans comme un jour. '
  '9':
  - type: note
    content: 'ne retarde pas  : autre traduction ne tarde pas à tenir sa promesse  ; cf. Es 42.14 ; 64.11 ; Ha 2.3 ; Hé 10.37 ; Ap 6.10. –  l''accomplissement de la promesse  : litt. la promesse. –  le pensent  : litt. considèrent (même verbe v. 15) retard, c.-à-d. selon ce que quelques-uns prennent pour un retard. –  patient v. 15 ; 1P 3.20 ; cf. Ex 34.6. –  quelqu''un  : litt. quelques-uns. –  se perde ou soit perdu  : cf. 2.1+. –  accèdent  : sur le verbe correspondant, voir Mt 19.11n. –  à un changement radical  : autres traductions à la repentance, à la conversion  ; voir Ac 2.38n  ; cf. Rm 2.4 ; 11.32 ; 1Tm 2.4 ; voir aussi Ez 18.23 ; Ap 2.21 ; Sagesse 11.23–12.1 : « Tu as pitié de tous parce que tu peux tout, et tu détournes les yeux des péchés des hommes pour les amener au repentir. Tu aimes tous les êtres et ne détestes aucune de tes œuvres : aurais-tu haï l''une d''elles, tu ne l''aurais pas créée. Et comment un être quelconque aurait-il subsisté, si toi, tu ne l''avais voulu, ou aurait-il été conservé sans avoir été appelé par toi. Tu les épargnes tous, car ils sont à toi, Maître qui aimes la vie, et ton esprit incorruptible est dans tous les êtres. »'
  - type: text
    content: 'Le Seigneur ne retarde pas l''accomplissement de la promesse, comme quelques-uns le pensent. Il est patient envers vous : il ne souhaite pas que quelqu''un se perde, mais que tous accèdent à un changement radical.'
