document_id: REV.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sept coupes
  - type: text
    content: ' '
  - type: note
    content: 'du sanctuaire (15.5n) une voix forte…  : cf. v. 17 ; Es 66.6. –  sept anges 15.1+. –  répandez… la fureur  : cf. Jr 10.25 ; Ez 14.19 ; 23.31 ; So 3.8 ; Ps 69.25.'
  - type: text
    content: 'J''entendis du sanctuaire une voix forte qui disait aux sept anges : Allez, répandez sur la terre les sept coupes de la fureur de Dieu !'
  '10':
  - type: text
    content: ' '
  - type: note
    content: le trône de la bête 13.2+. –  obscurci 9.1s ; Ex 10.21s ; Es 8.21s.
  - type: text
    content: 'Le cinquième répandit sa coupe sur le trône de la bête. Son royaume fut obscurci ; les gens se mordaient la langue de douleur ; '
  '11':
  - type: note
    content: V. 9+.
  - type: text
    content: ils blasphémèrent le Dieu du ciel à cause de leurs douleurs et de leurs ulcères, et ils ne revinrent pas de leurs œuvres.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'le grand fleuve, l''Euphrate 9.14+. –  L''eau en tarit Es 11.15 ; 44.27 ; Jr 50.38 ; 51.36. –  préparer le chemin… Es 11.16 ; 51.10 ; Ps 106.9. –  de l''Orient  : litt. du soleil levant  ; cf. Es 41.2,25 ; 46.11 ; on a souvent vu ici une allusion aux dangers que faisaient peser sur l''Empire romain les peuples « barbares » à l''est de ses frontières, notamment les Parthes.'
  - type: text
    content: 'Le sixième répandit sa coupe sur le grand fleuve, l''Euphrate. L''eau en tarit pour préparer le chemin aux rois qui viennent de l''Orient. '
  '13':
  - type: note
    content: 'dragon 12.3+. –  bête 13.1-8. –  prophète de mensonge ou faux prophète, pseudo-prophète  : cf. 13.11n-17 ; 19.20 ; 20.10 ; 1R 22.21-23. –  esprits impurs  : voir pur, impur. –  grenouilles Ex 8.3 ; Ps 78.45 ; 105.30.'
  - type: text
    content: 'Je vis sortir de la bouche du dragon, de la bouche de la bête et de la bouche du prophète de mensonge trois esprits impurs, semblables à des grenouilles. '
  '14':
  - type: note
    content: 'esprits de démons  : cf. 18.2 ; Lc 4.33. –  signes 13.13+. –  les rassembler pour la guerre  : cf. 2.16+ ; 19.19ss ; 20.8. –  Tout-Puissant 1.8+.'
  - type: text
    content: 'Ce sont des esprits de démons qui produisent des signes et qui s''en vont vers les rois de toute la terre habitée afin de les rassembler pour la guerre du grand jour de Dieu, le Tout-Puissant. '
  '15':
  - type: note
    content: 'comme un voleur 3.3+. –  sa honte ou ses parties indécentes  : cf. 3.18 ; 1Co 12.23s.'
  - type: text
    content: '– Je viens comme un voleur. Heureux celui qui veille et garde ses vêtements, pour ne pas marcher nu, pour qu''on ne voie pas sa honte ! – '
  '16':
  - type: note
    content: 'Harmaguédon  : c.-à-d. montagne (cf. Es 14.13) de Meguiddo, ville située près du mont Carmel et qui a été le théâtre de sanglantes batailles (cf. Jg 4.12-16 ; 5.19-21 ; 2R 9.27 ; 23.29s ; Za 12.11n).'
  - type: text
    content: Ils les rassemblèrent au lieu appelé en hébreu Harmaguédon.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'du sanctuaire… v. 1+. –  du trône 19.5 ; 21.3. –  C''est fait  : même expression 21.6 ; cf. 10.6s ; 11.15-17.'
  - type: text
    content: 'Le septième répandit sa coupe dans l''air. Il sortit du sanctuaire une voix forte venant du trône, qui disait : C''est fait ! '
  '18':
  - type: note
    content: 'éclairs… 4.5+. –  tremblement de terre 6.12+. –  tel qu''il n''y en a pas eu…  : cf. Ex 9.24 ; Dn 12.1 ; Mt 24.21/ /.'
  - type: text
    content: 'Il y eut des éclairs, des voix, des tonnerres et un grand tremblement de terre, tel qu''il n''y en a pas eu depuis qu''il y a des humains sur la terre. '
  '19':
  - type: note
    content: 'des nations 2.26n  ; voir non-Juifs. –  Babylone la Grande 14.8+. –  de sa colère ardente  : litt. de la fureur de sa colère  ; voir 14.10+.'
  - type: text
    content: 'La grande ville fut divisée en trois parties. Les villes des nations tombèrent, et Dieu se souvint de Babylone la Grande, pour lui donner la coupe du vin de sa colère ardente. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ulcère Ex 9.10s ; Dt 28.35. –  la marque… 13.15+,16. –  se prosternaient  : 3.9+ ; Mt 2.2+ ; voir culte.'
  - type: text
    content: Le premier partit et répandit sa coupe sur la terre. Un ulcère malin et douloureux atteignit les humains qui avaient la marque de la bête et qui se prosternaient devant son image.
  '20':
  - type: note
    content: îles / montagnes 6.14+.
  - type: text
    content: 'Toutes les îles s''enfuirent, et les montagnes ne furent pas retrouvées. '
  '21':
  - type: note
    content: 'grêle 11.19+. –  un talent  : environ 34 kg ; voir mesures. –  blasphémèrent v. 9+. –  c''était un très grand fléau (9.18+) ; cf. Nb 11.33.'
  - type: text
    content: Une grosse grêle, dont les grêlons pesaient environ un talent, tomba du ciel sur les humains ; les humains blasphémèrent Dieu à cause du fléau de la grêle, parce que c'était un très grand fléau.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sang 8.8+. –  tous les êtres vivants  : le mot correspondant à êtres est celui qui est traduit par âme en Mt 10.28n  ; cf. Gn 1.20n  ; Ap 8.9n.'
  - type: text
    content: Le deuxième répandit sa coupe dans la mer ; celle-ci devint du sang, comme celui d'un mort, et tous les êtres vivants qui étaient dans la mer moururent.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '8.10 ; Ps 78.44. –  tout devint  : autre traduction possible, surtout d''après certains mss ils devinrent.'
  - type: text
    content: Le troisième répandit sa coupe dans les fleuves et les sources des eaux ; tout devint du sang.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'l''ange des eaux  : cf. 1 Hénoch 66.2 : « Ces anges avaient été préposés à la puissance des eaux. » –  Tu es juste 15.3 ; Dt 32.4 ; Ps 119.137 ; 145.17. –  toi qui es et qui étais  : cf. 1.4+. –  Saint 15.4+.'
  - type: text
    content: 'J''entendis l''ange des eaux dire :'
  - type: text
    content: Tu es juste, toi qui es et qui étais, toi, le Saint,
  - type: text
    content: puisque tu as jugé ainsi.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ils ont répandu le sang… 6.10+ ; cf. Ps 79.3. –  du sang à boire  : cf. Es 49.26.'
  - type: text
    content: En effet, ils ont répandu le sang des saints et des prophètes,
  - type: text
    content: et tu leur as donné du sang à boire ;
  - type: text
    content: ils le méritent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: l'autel 6.9+. –  Tout-Puissant 1.8n. –  tes jugements… 19.2 ; cf. Ps 19.10 ; 119.137.
  - type: text
    content: 'J''entendis l''autel dire :'
  - type: text
    content: Oui, Seigneur Dieu, Tout-Puissant,
  - type: text
    content: tes jugements sont vrais et justes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: soleil 8.12.
  - type: text
    content: 'Le quatrième répandit sa coupe sur le soleil. Il lui fut donné de brûler les humains par le feu, '
  '9':
  - type: note
    content: 'Ils blasphémèrent ou ils calomnièrent v. 11,21 ; 2.9n  ; 13.6 ; cf. Es 52.5. –  le nom du Dieu  : autre traduction le nom de Dieu. –  ne revinrent pas ou ne changèrent pas radicalement, même verbe v. 11 ; voir 2.5n,21n  ; cf. 9.20s. –  lui donner gloire  : 14.7+.'
  - type: text
    content: et les humains furent brûlés par une chaleur torride. Ils blasphémèrent le nom du Dieu qui a le pouvoir sur ces fléaux, et ils ne revinrent pas pour lui donner gloire.
