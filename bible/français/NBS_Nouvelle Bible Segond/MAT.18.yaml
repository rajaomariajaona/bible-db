        children:
        - type: text
          text: '15.3 : « Reprenez-vous les uns les autres, non dans la colère, mais dans la paix, comme vous l''avez dans l''Evangile ; et que personne ne parle à celui qui offense autrui, qu''il n''entende pas un mot de vous avant qu''il ait fait pénitence. »'
      marker-yv: yv-n
    - type: text
      text: 'Si ton frère a péché contre toi, va et reprends-le seul à seul. S''il t''écoute, tu as gagné ton frère. '
