      - type: usfm
        marker: ft
        children:
        - type: text
          text: '48 : « Jésus a dit : “Si deux font la paix entre eux dans cette même maison, ils diront à la montagne : ‘Déplace-toi’, et elle se déplacera.” » 106 : « Jésus a dit : “Lorsque vous ferez de deux un, vous deviendrez des Fils de l''homme ; et si vous dites : ‘Montagne, déplace-toi’, elle se déplacera.” »'
      marker-yv: yv-n
    - type: usfm
