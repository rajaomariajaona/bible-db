      - type: usfm
        marker: ft
        children:
        - type: text
          text: '107 : « Jésus a dit : “Le Royaume est semblable à un berger qui avait cent brebis ; l''une d''entre elles, la plus grosse, s''égara ; alors, il quitta les quatre-vingt-dix-neuf et chercha celle-là seule jusqu''à ce qu''il l''eût trouvée. Après qu''il eut peiné ainsi, il dit à la brebis : ‘Je t''aime plus que les quatre-vingt-dix-neuf autres.’” »'
      marker-yv: yv-n
    - type: text
      text: 'Qu''en pensez-vous ? Si un homme a cent moutons et que l''un d''eux s''égare, ne laissera-t-il pas les quatre-vingt-dix-neuf autres dans la montagne pour aller chercher celui qui s''est égaré ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et s''il parvient à le retrouver, '
    - type: usfm
      marker: it
      children:
      - type: text
        text: amen,
    - type: text
      text: ' je vous le dis, il s''en réjouit plus que pour les quatre-vingt-dix-neuf qui ne se sont pas égarés. '
