document_id: MAT.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Qui est le plus grand ?
  - type: heading
    content: Mc 9.33-37  ; Lc 9.46-48
  - type: text
    content: ' '
  - type: note
    content: 'ce moment même  : litt. cette heure-là . –  plus grand… 11.11.'
  - type: text
    content: 'A ce moment même, les disciples vinrent demander à Jésus : Qui donc est le plus grand dans le royaume des cieux ? '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '25.45. –  leurs anges… Hé 1.7,14 ; cf. Tobit 12.15 : « Je suis Raphaël, l''un des sept anges qui se tiennent devant la gloire du Seigneur et pénètrent en sa présence. »'
  - type: text
    content: 'Gardez-vous de mépriser un seul de ces petits, car je vous dis que leurs anges dans les cieux voient constamment le visage de mon Père qui est dans les cieux. [ '
  '11':
  - type: note
    content: 'Certains mss ajoutent  : Car le Fils de l''homme (8.20n) est venu sauver ce qui était perdu (cf. Lc 19.10).'
  - type: text
    content: ']'
  - type: heading
    content: La parabole du mouton égaré
  - type: heading
    content: Lc 15.3-7
  '12':
  - type: text
    content: ' '
  - type: note
    content: '9.36+. Cf. Evangile selon Thomas 107 : « Jésus a dit : “Le Royaume est semblable à un berger qui avait cent brebis ; l''une d''entre elles, la plus grosse, s''égara ; alors, il quitta les quatre-vingt-dix-neuf et chercha celle-là seule jusqu''à ce qu''il l''eût trouvée. Après qu''il eut peiné ainsi, il dit à la brebis : ‘Je t''aime plus que les quatre-vingt-dix-neuf autres.’” »'
  - type: text
    content: 'Qu''en pensez-vous ? Si un homme a cent moutons et que l''un d''eux s''égare, ne laissera-t-il pas les quatre-vingt-dix-neuf autres dans la montagne pour aller chercher celui qui s''est égaré ? '
  '13':
  - type: text
    content: 'Et s''il parvient à le retrouver, '
  - type: text
    content: amen,
  - type: text
    content: ' je vous le dis, il s''en réjouit plus que pour les quatre-vingt-dix-neuf qui ne se sont pas égarés. '
  '14':
  - type: note
    content: 'Ez 33.11 ; Jn 6.39 ; 10.28s. –  la volonté de votre Père  : litt. une volonté devant votre Père.'
  - type: text
    content: De même, ce n'est pas la volonté de votre Père qui est dans les cieux qu'il se perde un seul de ces petits.
  - type: heading
    content: Pour gagner un frère qui a péché
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Si ton frère a péché…  : cf. v. 21 ; 6.12n. –  contre toi  : cette précision est absente de certains mss. –  reprends  : Mt emploie un verbe grec qui signifie aussi convaincre, confondre (Jn 16.8) ; cf. Lv 19.17 ; Lc 17.3n  ; Ga 6.1 ; 2Tm 4.2. Didachè 15.3 : « Reprenez-vous les uns les autres, non dans la colère, mais dans la paix, comme vous l''avez dans l''Evangile ; et que personne ne parle à celui qui offense autrui, qu''il n''entende pas un mot de vous avant qu''il ait fait pénitence. »'
  - type: text
    content: 'Si ton frère a péché contre toi, va et reprends-le seul à seul. S''il t''écoute, tu as gagné ton frère. '
  '16':
  - type: note
    content: 'que toute affaire…  : litt. que toute parole soit établie sur la bouche de deux ou trois témoins Nb 35.30 ; Dt 19.15  ; Jn 8.17+ ; 2Co 13.1 ; 1Tm 5.19 ; Hé 10.28.'
  - type: text
    content: 'Mais, s''il ne t''écoute pas, prends avec toi une ou deux personnes, afin que '
  - type: text
    content: toute affaire se règle sur la parole de deux ou trois témoins
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'Eglise 16.18n  ; 1Co 5.4. –  comme un non-Juif…  : cf. 5.46s ; 9.10n  ; 1Co 5.9-13 ; 2Th 3.14s ; Tt 3.10.'
  - type: text
    content: 'S''il refuse de les écouter, dis-le à l''Eglise ; et s''il refuse aussi d''écouter l''Eglise, qu''il soit pour toi comme un non-Juif et un collecteur des taxes. '
  '18':
  - type: note
    content: 16.19n  ; Jn 20.23.
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, tout ce que vous lierez sur la terre sera lié dans le ciel, et tout ce que vous délierez sur la terre sera délié dans le ciel.'
  - type: heading
    content: La prière en commun
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Amen  : certains mss omettent ce terme ici (cf. 5.18n). –  s''accordent  : c''est du verbe grec employé ici (cf. 20.2) que vient notre mot symphonie . – Voir aussi Jn 15.16 ; 1Jn 5.14. Evangile selon Thomas 48 : « Jésus a dit : “Si deux font la paix entre eux dans cette même maison, ils diront à la montagne : ‘Déplace-toi’, et elle se déplacera.” » 106 : « Jésus a dit : “Lorsque vous ferez de deux un, vous deviendrez des Fils de l''homme ; et si vous dites : ‘Montagne, déplace-toi’, elle se déplacera.” »'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous dis encore que si deux d''entre vous s''accordent sur la terre pour demander quoi que ce soit, cela leur sera donné par mon Père qui est dans les cieux. '
  '2':
  - type: note
    content: 'un enfant  : autre traduction un petit enfant, de même dans la suite.'
  - type: text
    content: 'Il appela un enfant, le plaça au milieu d''eux '
  '20':
  - type: note
    content: '28.20. –  rassemblés  : c''est du verbe grec correspondant que vient le mot synagogue. –  pour mon nom  : autre traduction en mon nom  ; cf. 28.19s. – Cf. Evangile selon Thomas 30 : « Là où il y a trois dieux, il y a des dieux ; là où il y en a deux ou un, je suis avec lui. » (Autre version dans un papyrus grec : « Là où ils sont trois, ils sont sans Dieu ; et là où il y en a un seul, je dis que je suis avec lui. »)'
  - type: text
    content: Car là où deux ou trois sont rassemblés pour mon nom, je suis au milieu d'eux.
  - type: heading
    content: Le pardon entre frères
  '21':
  - type: text
    content: ' '
  - type: note
    content: Lc 17.4. –  lorsqu'il péchera contre moi v. 15+.
  - type: text
    content: 'Alors Pierre vint lui demander : Seigneur, combien de fois pardonnerai-je à mon frère, lorsqu''il péchera contre moi ? Jusqu''à sept fois ? '
  '22':
  - type: note
    content: On pourrait aussi traduire soixante-dix-sept fois  ; cf. Gn 4.15,24.
  - type: text
    content: 'Jésus lui dit : Je ne te dis pas jusqu''à sept fois, mais jusqu''à soixante-dix fois sept fois.'
  - type: heading
    content: La parabole de l'esclave impitoyable
  '23':
  - type: text
    content: ' '
  - type: note
    content: '25.19 ; cf. Rm 14.12 ; 2Co 5.10. –  règne ou royaume 3.2n. –  un roi  : litt. un homme roi ou un homme, un roi.'
  - type: text
    content: 'C''est pourquoi il en va du règne des cieux comme d''un roi qui voulait faire rendre compte à ses esclaves. '
  '24':
  - type: note
    content: 'dix mille talents (voir mesures, poids et monnaies) : somme astronomique, que l''esclave ne pourra jamais rendre. A titre de comparaison, selon Flavius Josèphe l''impôt annuel de toute la Judée s''élevait à 600 talents. Cf. Ps 38.5 ; Lc 7.42.'
  - type: text
    content: 'Quand il commença à le faire, on lui en amena un qui devait dix mille talents. '
  '25':
  - type: note
    content: maître 12.8n. – 2R 4.1 ; Né 5.5.
  - type: text
    content: 'Comme il n''avait pas de quoi payer, son maître ordonna qu''on le vende, lui, sa femme, ses enfants et tout ce qu''il avait, afin de payer sa dette. '
  '26':
  - type: note
    content: 'se prosterna 2.2n  ; voir culte. –  Prends patience  : certains mss portent Seigneur, prends patience.'
  - type: text
    content: 'L''esclave tomba à ses pieds et se prosterna devant lui en disant : « Prends patience envers moi, et je te paierai tout ! » '
  '27':
  - type: note
    content: Mi 7.18s ; Ps 78.38 ; 103.8-14. –  Emu 9.36n.
  - type: text
    content: 'Emu, le maître de cet esclave le laissa aller et lui remit la dette. '
  '28':
  - type: note
    content: 'compagnons d''esclavage  : le même terme est traduit simplement par compagnon(s) aux v. 29,31,33 ; cf. 24.49s ; même terme en Col 1.7+ ; Ap 6.11+. –  cent deniers (voir mesures, poids et monnaies) : environ trois mois et demi de salaire selon 20.2.'
  - type: text
    content: 'En sortant, cet esclave trouva un de ses compagnons d''esclavage qui lui devait cent deniers. Il le saisit et se mit à le serrer à la gorge en disant : « Paie ce que tu dois ! » '
  '29':
  - type: text
    content: 'Son compagnon, tombé à ses pieds, le suppliait : « Prends patience envers moi, et je te paierai ! » '
  '3':
  - type: note
    content: 'Amen 5.18n. –  si vous ne faites pas demi-tour, ou si vous ne vous retournez pas, selon le sens propre du verbe (p. ex. 7.6), traditionnellement traduit par se convertir  ; cf. Lc 13.3,5 ; voir changement radical. –  vous n''entrerez jamais  : autre traduction vous n''entrerez même pas (cf. 5.20n). –  royaume des cieux 3.2n  ; 5.3,20+. – Cf. 19.14/ / ; Jn 3.3,5 ; 1Co 14.20 ; 1P 2.2. Evangile selon Thomas 22 : « Jésus vit des petits qui suçaient le lait. Il dit à ses disciples : “Ces petits qui sucent le lait sont semblables à ceux qui entrent dans le Royaume.” Ils lui dirent : “Alors, en devenant petits, nous entrerons dans le Royaume ?” Jésus leur répondit : “Lorsque vous ferez des deux un, et que vous ferez l''intérieur comme l''extérieur, et l''extérieur comme l''intérieur, et le haut comme le bas, et que vous ferez du mâle et de la femelle un seul et même être, de façon à ce que le mâle ne soit plus mâle et que la femelle ne soit plus femelle… c''est alors que vous entrerez dans le Royaume.” »'
  - type: text
    content: 'et dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, si vous ne faites pas demi-tour pour devenir comme les enfants, vous n''entrerez jamais dans le royaume des cieux. '
  '30':
  - type: note
    content: 'Cf. Dt 15.2. –  le faire jeter  : litt. le jeter.'
  - type: text
    content: 'Mais lui ne voulait pas ; il alla le faire jeter en prison, jusqu''à ce qu''il ait payé ce qu''il devait. '
  '31':
  - type: text
    content: 'En voyant ce qui arrivait, ses compagnons furent profondément attristés ; ils allèrent raconter à leur maître tout ce qui s''était passé. '
  '32':
  - type: text
    content: 'Alors le maître le fit appeler et lui dit : « Mauvais esclave, je t''avais remis toute ta dette, parce que tu m''en avais supplié ; '
  '33':
  - type: note
    content: Ep 4.32 ; Col 3.13 ; 1Jn 4.11.
  - type: text
    content: 'ne devais-tu pas avoir compassion de ton compagnon comme j''ai eu compassion de toi ? » '
  '34':
  - type: note
    content: 'en colère 22.7. –  bourreaux  : litt. tourmenteurs, du verbe employé en 8.6,29. Cf. 5.25s ; Pr 21.13.'
  - type: text
    content: 'Et son maître, en colère, le livra aux bourreaux jusqu''à ce qu''il ait payé tout ce qu''il devait. '
  '35':
  - type: note
    content: 'pardonne  : le même verbe (aussi v. 21) a été traduit par remettre aux v. 27,32 ; voir 6.12n,14s ; 7.2/ / ; Mc 11.25s. –  de tout son cœur  : voir 22.37.'
  - type: text
    content: C'est ainsi que mon Père céleste vous traitera si chacun de vous ne pardonne pas à son frère de tout son cœur.
  '4':
  - type: note
    content: Cf. 23.11s.
  - type: text
    content: 'C''est pourquoi quiconque se rendra humble comme cet enfant sera le plus grand dans le royaume des cieux. '
  '5':
  - type: note
    content: '10.40+ ; 25.40 ; cf. 1Co 8.12. –  en mon nom  : cf. v. 20 ; 24.5.'
  - type: text
    content: Et quiconque accueille en mon nom un enfant comme celui-ci m'accueille moi-même.
  - type: heading
    content: Les causes de chute
  - type: heading
    content: Mc 9.42-48  ; Lc 17.1-2
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'mettent leur foi  : autre traduction croient . –  meule de moulin  : litt. meule à âne , c.-à-d. la grosse pierre mobile, habituellement roulée par un âne, par opposition à la petite meule qu''on tournait à la main (cf. Jg 9.53) ; Ap 18.21. –  noie  : même verbe en 14.30 ( couler ).'
  - type: text
    content: Mais si quelqu'un devait causer la chute de l'un de ces petits qui mettent leur foi en moi, il serait avantageux pour lui qu'on lui suspende une meule de moulin au cou et qu'on le noie au fond de la mer.
  '7':
  - type: text
    content: ' '
  - type: note
    content: '26.24. –  Quel malheur…  : litt. quel malheur pour (11.21n) le monde à cause des scandales , de même plus loin : qu''il y ait…  : litt. que les scandales arrivent… l''homme par qui le scandale arrive  ; voir 11.6n.'
  - type: text
    content: Quel malheur pour le monde ! Il y a tant de causes de chute ! Certes, il est nécessaire qu'il y ait des causes de chute, mais quel malheur pour l'homme par qui cela arrive !
  '8':
  - type: text
    content: ' '
  - type: note
    content: '5.29+s. –  entrer dans la vie  : cf. 7.14 ; 19.16,29 ; 25.46.'
  - type: text
    content: 'Si ta main ou ton pied doivent causer ta chute, coupe-les et jette-les loin de toi ; mieux vaut pour toi entrer dans la vie manchot ou infirme que d''avoir deux pieds ou deux mains et d''être jeté dans le feu éternel. '
  '9':
  - type: note
    content: géhenne 5.22n.
  - type: text
    content: Et si ton œil doit causer ta chute, arrache-le et jette-le loin de toi ; mieux vaut pour toi entrer borgne dans la vie que d'avoir deux yeux et d'être jeté dans la géhenne de feu.
