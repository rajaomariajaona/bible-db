          text: '30 : « Là où il y a trois dieux, il y a des dieux ; là où il y en a deux ou un, je suis avec lui. » (Autre version dans un papyrus grec : « Là où ils sont trois, ils sont sans Dieu ; et là où il y en a un seul, je dis que je suis avec lui. »)'
      marker-yv: yv-n
    - type: text
      text: Car là où deux ou trois sont rassemblés pour mon nom, je suis au milieu d'eux.
