document_id: ACT.22,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Mes frères, mes pères 7.2+. –  défense  : le mot grec correspondant a donné apologie, apologétique  ; de même en 24.10 ; 25.8 ; 26.1s,24 ; verbe apparenté en 19.33 ; cf. 1Co 9.3 ; Ph 1.7.'
  - type: text
    content: Mes frères, mes pères, écoutez ce que j'ai maintenant à vous dire pour ma défense.
  '10':
  - type: note
    content: Que dois-je faire… 2.37+.
  - type: text
    content: 'Alors j''ai dit : « Que dois-je faire, Seigneur ? » Le Seigneur m''a dit : « Lève-toi, va à Damas, et là on te dira tout ce qu''il t''est ordonné de faire. » '
  '11':
  - type: note
    content: 'Dt 28.28s. –  l''éclat  : le mot grec est habituellement traduit par gloire.'
  - type: text
    content: Comme je ne voyais rien, à cause de l'éclat de cette lumière, ceux qui étaient avec moi m'ont conduit par la main, et je suis arrivé à Damas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: pieux 2.5+. – Voir loi . – Voir Juifs . –  bon témoignage 6.3+.
  - type: text
    content: 'Or un certain Ananias, un homme pieux selon la loi, de qui tous les Juifs qui habitaient là rendaient un bon témoignage, '
  '13':
  - type: note
    content: 'A ce moment même  : litt. à cette heure.'
  - type: text
    content: 'est venu à moi et m''a dit : « Saoul, mon frère, retrouve la vue ! » A ce moment même j''ai retrouvé la vue, et je l''ai vu. '
  '14':
  - type: note
    content: 'Le Dieu de nos pères  : cf. v. 3 ; Ex 3.15s. –  t''a destiné…  : cf. 3.20n  ; 26.16 ; voir aussi Ga 1.15s. –  connaître sa volonté  : cf. 20.27 ; Lc 12.47+. –  le Juste 3.14+. –  sa voix  : litt. la voix de sa bouche.'
  - type: text
    content: 'Il a dit : « Le Dieu de nos pères t''a destiné à connaître sa volonté, à voir le Juste et à entendre sa voix ; '
  '15':
  - type: note
    content: 'témoin  : cf. 1.8+,22 ; 13.31. –  vu et entendu 4.20+.'
  - type: text
    content: 'car tu seras pour lui témoin, devant tous, de ce que tu as vu et entendu. '
  '16':
  - type: note
    content: 'fais-toi baptiser ou reçois le baptême 1.5+. –  et laver  : litt. et sois lavé ou lave-toi  ; cf. 1Co 6.11n. – Voir péché. –  en invoquant son nom 2.21+ ; cf. 9.14.'
  - type: text
    content: Et maintenant, pourquoi tardes-tu ? Lève-toi, fais-toi baptiser et laver de tes péchés en invoquant son nom. »
  - type: heading
    content: Paul raconte comment il a été envoyé vers les non-Juifs
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'à Jérusalem  : cf. 9.26ss ; voir aussi 11.30 ; Ga 1.18. – Voir temple . –  extase 10.10n.'
  - type: text
    content: 'De retour à Jérusalem, comme je priais dans le temple, je suis tombé en extase '
  '18':
  - type: note
    content: 'j''ai vu le Seigneur  : litt. je l''ai vu, cf. 9.10+ ; 18.9. –  quitte…  : autre traduction sors vite de Jérusalem. –  le témoignage que tu me rends ou que tu me rendras  ; litt. ton témoignage sur moi.'
  - type: text
    content: 'et j''ai vu le Seigneur, qui m''a dit : « Dépêche-toi, quitte vite Jérusalem, car ils n''accueilleront pas le témoignage que tu me rends. » '
  '19':
  - type: note
    content: 8.3+.
  - type: text
    content: 'Moi, j''ai dit : « Seigneur, ils savent bien que j''allais de synagogue en synagogue pour faire emprisonner et battre ceux qui croient en toi ; '
  '2':
  - type: text
    content: ' '
  - type: note
    content: langue hébraïque 21.40n.
  - type: text
    content: 'Lorsqu''ils entendirent qu''il s''adressait à eux en langue hébraïque, le calme se fit plus grand encore. Il dit :'
  - type: heading
    content: 9.1-29  ; 26.9-20
  '20':
  - type: note
    content: 7.58 ; 8.1. –  ton témoin 1.8+ ; c'est du mot grec correspondant que vient notre terme martyr.
  - type: text
    content: 'et lorsqu''on a répandu le sang d''Etienne, ton témoin, j''étais moi-même présent, je les approuvais, je gardais même les vêtements de ceux qui l''ont supprimé. » '
  '21':
  - type: note
    content: Cf. 9.15 ; 13.2,46-48 ; 26.17s ; 28.28 ; voir aussi Jr 1.5 ; Lc 14.16-24. – Voir non-Juifs.
  - type: text
    content: 'Alors il m''a dit : « Va ; moi, je t''enverrai au loin, vers les non-Juifs… »'
  - type: heading
    content: Paul et le tribun militaire
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'A mort…  : litt. enlève (21.36n) de la terre un tel (individu), car il ne faut pas qu''il vive 25.24.'
  - type: text
    content: 'Ils l''avaient écouté jusqu''à cette parole, mais alors ils élevèrent la voix et dirent : A mort ! Il ne faut pas laisser un tel individu en vie ! '
  '23':
  - type: note
    content: Cf. 18.6+.
  - type: text
    content: 'Ils poussaient des cris, jetaient leurs vêtements et lançaient de la poussière en l''air. '
  '24':
  - type: note
    content: Cf. 21.34+.
  - type: text
    content: 'Le tribun militaire ordonna de le faire entrer dans la forteresse et de le fouetter pour le faire parler, afin de savoir pour quel motif on criait ainsi contre lui. '
  '25':
  - type: note
    content: 'avec des lanières  : autre traduction pour (le frapper avec) les lanières. –  citoyen romain  : cf. 16.21n  ; 21.37-39 ; 23.27.'
  - type: text
    content: 'Comme on l''attachait avec des lanières, Paul dit au centurion qui était là : Vous est-il permis de fouetter un citoyen romain qui n''est pas condamné ? '
  '26':
  - type: text
    content: 'Quand il eut entendu cela, le centurion alla l''annoncer au tribun, en disant : Que vas-tu faire ? Cet homme est un citoyen romain ! '
  '27':
  - type: text
    content: 'Le tribun vint donc et lui dit : Dis-moi, toi, tu es citoyen romain ? – Oui, répondit-il. '
  '28':
  - type: note
    content: La coutume voulait que les nouveaux citoyens prennent le nom de l'empereur régnant ; comme le tribun s'appelait Claude (23.26), il se peut qu'il n'ait acquis ce droit que peu avant, sous Claude (41-54). Longtemps auparavant, de nombreux Juifs de Cilicie avaient reçu la citoyenneté dans le cadre de la politique d'intégration romaine, de sorte que Paul pouvait l'avoir de naissance, ce qui lui conférait une dignité supérieure.
  - type: text
    content: 'Le tribun reprit : Moi, c''est avec beaucoup d''argent que j''ai acquis ce droit de citoyen ! – Moi, dit Paul, je l''ai de naissance. '
  '29':
  - type: note
    content: 16.38. – A la fin du v. le texte occidental ajoute et à l'instant même il le fit délier (et supprime cette action au v. 30).
  - type: text
    content: Aussitôt, ceux qui devaient le faire parler s'éloignèrent, et le tribun prit peur, comprenant que c'était bien un citoyen romain qu'il avait fait lier.
  - type: heading
    content: Paul devant le sanhédrin
  '3':
  - type: text
    content: ' '
  - type: note
    content: je suis un Juif… 21.39+ ; cf. 7.20-22. –  élevé 7.22. –  dans cette ville-ci 26.4 ; cf. Ga 1.22. –  aux pieds de Lc 8.35 ; 10.39 ; cf. 2R 6.1n. –  Gamaliel 5.34. – Voir loi . –  une passion jalouse ou du zèle , cf. 5.17+ ; Ga 1.14 ; voir aussi Rm 10.2 ; Ph 3.4-11.
  - type: text
    content: 'Moi, je suis un Juif né à Tarse de Cilicie ; mais j''ai été élevé dans cette ville-ci et éduqué, aux pieds de Gamaliel, dans la stricte conformité à la loi de nos pères. J''avais une passion jalouse pour Dieu, comme vous tous aujourd''hui. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: souhaitant savoir… 21.34+ ; cf. 23.28. – Voir Juifs . –  grands prêtres 4.23+ ; cf. Mt 2.4n  ; Mc 11.18n.
  - type: text
    content: Le lendemain, souhaitant savoir au juste de quoi les Juifs l'accusaient, il le fit délier et donna l'ordre aux grands prêtres et à tout le sanhédrin de se réunir ; puis il fit descendre Paul et le plaça devant eux.
  '4':
  - type: note
    content: 1Co 15.9 ; Ga 1.13,23. –  voie 9.2+. –  liant… 8.3+.
  - type: text
    content: 'J''ai persécuté à mort cette voie, liant hommes et femmes pour les mettre en prison. '
  '5':
  - type: note
    content: 'Le grand prêtre  : cf. 23.5. –  collège des anciens Lc 22.66. –  d''arrêter…  : litt. d''amener ceux qui seraient là, liés, à Jérusalem  ; cf. 9.2n. –  châtiés  : le même verbe est traduit par user de sévices en 26.11.'
  - type: text
    content: Le grand prêtre et tout le collège des anciens m'en sont témoins. J'ai même reçu d'eux des lettres pour les frères de Damas, où je me suis rendu afin d'arrêter ceux qui s'y trouveraient et de les amener à Jérusalem pour qu'ils soient châtiés.
  - type: heading
    content: Paul raconte sa conversion
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'vers midi  : cf. 8.26n.'
  - type: text
    content: 'J''étais en chemin et j''approchais de Damas quand, soudain, vers midi, une grande lumière venant du ciel a resplendi tout autour de moi. '
  '7':
  - type: note
    content: Saoul v. 13 ; voir 9.4n.
  - type: text
    content: 'Je suis tombé par terre et j''ai entendu une voix qui me disait : « Saoul, Saoul, pourquoi me persécutes-tu ? » '
  '8':
  - type: note
    content: Nazoréen 2.22+.
  - type: text
    content: 'J''ai répondu : « Qui es-tu, Seigneur ? » Il m''a dit : « Moi, je suis Jésus le Nazoréen, celui que, toi, tu persécutes. » '
  '9':
  - type: note
    content: 'Cf. 9.7+. –  celui qui me parlait  : litt. la voix de celui qui me parlait.'
  - type: text
    content: 'Ceux qui étaient avec moi ont bien vu la lumière, mais ils n''ont pas entendu celui qui me parlait. '
