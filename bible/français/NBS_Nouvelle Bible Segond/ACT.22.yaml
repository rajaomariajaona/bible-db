verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Mes frères, mes pères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: défense
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot grec correspondant a donné '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: apologie, apologétique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; de même en 24.10 ; 25.8 ; 26.1s,24 ; verbe apparenté en 19.33 ; cf. 1Co 9.3 ; Ph 1.7.
      marker-yv: yv-n
    - type: text
      text: Mes frères, mes pères, écoutez ce que j'ai maintenant à vous dire pour ma défense.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que dois-je faire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.37+.
      marker-yv: yv-n
    - type: text
      text: 'Alors j''ai dit : « Que dois-je faire, Seigneur ? » Le Seigneur m''a dit : « Lève-toi, va à Damas, et là on te dira tout ce qu''il t''est ordonné de faire. » '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 28.28s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'éclat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Comme je ne voyais rien, à cause de l'éclat de cette lumière, ceux qui étaient avec moi m'ont conduit par la main, et je suis arrivé à Damas.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.5+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bon témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.3+.
      marker-yv: yv-n
    - type: text
      text: 'Or un certain Ananias, un homme pieux selon la loi, de qui tous les Juifs qui habitaient là rendaient un bon témoignage, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A ce moment même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à cette heure.
      marker-yv: yv-n
    - type: text
      text: 'est venu à moi et m''a dit : « Saoul, mon frère, retrouve la vue ! » A ce moment même j''ai retrouvé la vue, et je l''ai vu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le Dieu de nos pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3 ; Ex 3.15s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: t'a destiné…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 3.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 26.16 ; voir aussi Ga 1.15s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: connaître sa volonté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.27 ; Lc 12.47+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juste
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sa voix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la voix de sa bouche.
      marker-yv: yv-n
    - type: text
      text: 'Il a dit : « Le Dieu de nos pères t''a destiné à connaître sa volonté, à voir le Juste et à entendre sa voix ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: témoin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.8+,22 ; 13.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vu et entendu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.20+.
      marker-yv: yv-n
    - type: text
      text: 'car tu seras pour lui témoin, devant tous, de ce que tu as vu et entendu. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fais-toi baptiser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'reçois le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: baptême
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et laver
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et sois lavé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lave-toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1Co 6.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en invoquant son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.21+ ; cf. 9.14.
      marker-yv: yv-n
    - type: text
      text: Et maintenant, pourquoi tardes-tu ? Lève-toi, fais-toi baptiser et laver de tes péchés en invoquant son nom. »
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul raconte comment il a été envoyé vers les non-Juifs
    marker-yv: yv-h
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 9.26ss ; voir aussi 11.30 ; Ga 1.18. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'extase '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'De retour à Jérusalem, comme je priais dans le temple, je suis tombé en extase '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ai vu le Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je l'ai vu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 9.10+ ; 18.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quitte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sors vite de Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le témoignage que tu me rends '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que tu me rendras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton témoignage sur moi.
      marker-yv: yv-n
    - type: text
      text: 'et j''ai vu le Seigneur, qui m''a dit : « Dépêche-toi, quitte vite Jérusalem, car ils n''accueilleront pas le témoignage que tu me rends. » '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.3+.
      marker-yv: yv-n
    - type: text
      text: 'Moi, j''ai dit : « Seigneur, ils savent bien que j''allais de synagogue en synagogue pour faire emprisonner et battre ceux qui croient en toi ; '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'langue hébraïque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsqu''ils entendirent qu''il s''adressait à eux en langue hébraïque, le calme se fit plus grand encore. Il dit :'
  - type: usfm
    marker: r
    children:
    - type: text
      text: 9.1-29  ; 26.9-20
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.58 ; 8.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ton témoin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.8+ ; c''est du mot grec correspondant que vient notre terme '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: martyr.
      marker-yv: yv-n
    - type: text
      text: 'et lorsqu''on a répandu le sang d''Etienne, ton témoin, j''étais moi-même présent, je les approuvais, je gardais même les vêtements de ceux qui l''ont supprimé. » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.15 ; 13.2,46-48 ; 26.17s ; 28.28 ; voir aussi Jr 1.5 ; Lc 14.16-24. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors il m''a dit : « Va ; moi, je t''enverrai au loin, vers les non-Juifs… »'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul et le tribun militaire
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A mort…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'enlève '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (21.36
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la terre un tel (individu), car il ne faut pas qu''il vive '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.24.
      marker-yv: yv-n
    - type: text
      text: 'Ils l''avaient écouté jusqu''à cette parole, mais alors ils élevèrent la voix et dirent : A mort ! Il ne faut pas laisser un tel individu en vie ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 18.6+.
      marker-yv: yv-n
    - type: text
      text: 'Ils poussaient des cris, jetaient leurs vêtements et lançaient de la poussière en l''air. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 21.34+.
      marker-yv: yv-n
    - type: text
      text: 'Le tribun militaire ordonna de le faire entrer dans la forteresse et de le fouetter pour le faire parler, afin de savoir pour quel motif on criait ainsi contre lui. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec des lanières
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour (le frapper avec) les lanières
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: citoyen romain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.37-39 ; 23.27.'
      marker-yv: yv-n
    - type: text
      text: 'Comme on l''attachait avec des lanières, Paul dit au centurion qui était là : Vous est-il permis de fouetter un citoyen romain qui n''est pas condamné ? '
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand il eut entendu cela, le centurion alla l''annoncer au tribun, en disant : Que vas-tu faire ? Cet homme est un citoyen romain ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le tribun vint donc et lui dit : Dis-moi, toi, tu es citoyen romain ? – Oui, répondit-il. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '22.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La coutume voulait que les nouveaux citoyens prennent le nom de l''empereur régnant ; comme le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tribun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 's''appelait Claude (23.26), il se peut qu''il n''ait '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'acquis ce droit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'que peu avant, sous Claude (41-54). Longtemps auparavant, de nombreux Juifs de Cilicie avaient reçu la citoyenneté dans le cadre de la politique d''intégration romaine, de sorte que Paul pouvait l''avoir '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de naissance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui lui conférait une dignité supérieure.'
      marker-yv: yv-n
    - type: text
      text: 'Le tribun reprit : Moi, c''est avec beaucoup d''argent que j''ai acquis ce droit de citoyen ! – Moi, dit Paul, je l''ai de naissance. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
