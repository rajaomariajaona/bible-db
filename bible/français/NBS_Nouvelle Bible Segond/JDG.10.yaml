        text: '10.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nous avons péché '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: traite-nous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fais-nous selon tout ce qui est bon à tes yeux.
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites dirent au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Nous avons péché ; traite-nous comme il te plaira. Seulement, s''il te plaît, délivre-nous en ce jour ! '
  - type: usfm
    marker: v
