  - type: text
    text: 'Les Israélites firent encore ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) ; ils se mirent à servir les Baals et les Astartés, les dieux d''Aram, les dieux de Sidon, les dieux de Moab, les dieux des Ammonites et les dieux des Philistins. Ils abandonnèrent le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) et cessèrent de le servir. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
