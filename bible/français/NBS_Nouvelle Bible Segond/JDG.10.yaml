  - type: text
    text: 'Après Abimélek, Tola, fils de Poua, fils de Dodo, homme d''Issacar, se leva pour sauver Israël ; il habitait à Shamir, dans la région montagneuse d''Ephraïm. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
