      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'crièrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.9+ ; cf. 10.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nous avons '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 15 ; Dt 1.41 ; 1S 12.10 ; 1R 8.47 ; 18.18 ; Ps 106.6 ; Dn 9.5.
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites crièrent vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Nous avons péché contre toi ; nous avons abandonné notre Dieu et nous avons servi les Baals. '
