      children:
      - type: text
        text: '3.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Maôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : nom d''une ville de Juda Jos 15.55 ; 1S 25.2 ; certains modifient légèrement la vocalisation traditionnelle de l''hébreu pour trouver ici les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Maonites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de 2Ch 26.7. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a lu soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Canaan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Madiân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (6.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') selon les mss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sauvés '
    - type: usfm
      marker: ft
      children:
      - type: text
