      - type: text
        text: '2.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Il fut juge en Israël pendant vingt-trois ans ; puis il mourut et il fut enseveli à Shamir.
