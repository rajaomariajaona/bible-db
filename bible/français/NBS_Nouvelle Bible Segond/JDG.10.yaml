    marker-yv: yv-n
  - type: text
    text: 'les Sidoniens, Amalec et Maôn vous ont opprimés. Lorsque vous avez crié vers moi, ne vous ai-je pas sauvés de leur main ? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.6+ ; cf. Jos 22.18 ; 24.16 ; 1Ch 5.25.
    marker-yv: yv-n
  - type: text
    text: 'Mais vous, vous m''avez abandonné et vous avez servi d''autres dieux. C''est pourquoi je ne vous sauverai plus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 32.37s ; Es 57.13 ; Jr 2.28.
    marker-yv: yv-n
  - type: text
    text: 'Allez ! Criez vers les dieux que vous avez choisis ! Qu''ils vous sauvent au temps de votre détresse ! '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
