      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 3.12-16.'
    marker-yv: yv-n
  - type: text
    text: 'Ceux-ci pressurèrent et écrasèrent les Israélites cette année-là et, pendant dix-huit ans, tous les Israélites qui étaient en Transjordanie, au pays des Amorites du Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2.15 ; 6.6+.
    marker-yv: yv-n
  - type: text
    text: 'Les Ammonites passèrent le Jourdain pour faire la guerre à Juda, à Benjamin et à la maison d''Ephraïm. Israël fut dans une grande détresse. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
