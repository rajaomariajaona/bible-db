document_id: JDG.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Autres juges : Tola, Yaïr'
  - type: text
    content: ' '
  - type: note
    content: 'Tola / Poua / Issacar  : cf. Gn 46.13 ; Nb 26.23 ; 1Ch 7.1. –  Dodo signifie son oncle , de sorte que plusieurs versions anciennes ont compris fils de l''oncle d''Abimélek . –  sauver 2.16+. –  Shamir  : localité inconnue, à ne pas confondre avec celle de Juda qui porte le même nom (Jos 15.48). –  la région montagneuse d''Ephraïm 3.27+.'
  - type: text
    content: 'Après Abimélek, Tola, fils de Poua, fils de Dodo, homme d''Issacar, se leva pour sauver Israël ; il habitait à Shamir, dans la région montagneuse d''Ephraïm. '
  '10':
  - type: note
    content: crièrent 3.9+ ; cf. 10.6. –  Nous avons péché v. 15 ; Dt 1.41 ; 1S 12.10 ; 1R 8.47 ; 18.18 ; Ps 106.6 ; Dn 9.5.
  - type: text
    content: 'Les Israélites crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Nous avons péché contre toi ; nous avons abandonné notre Dieu et nous avons servi les Baals. '
  '11':
  - type: note
    content: 'Egyptiens  : Ex 1–2. –  Amorites 1.34 ; Nb 21.21-35. –  Ammonites / Philistins v. 7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit aux Israélites : Des Egyptiens, des Amorites, des Ammonites, des Philistins, '
  '12':
  - type: note
    content: 'Sidoniens Gn 10.19n. –  Amalec 3.13+. –  Maôn  : nom d''une ville de Juda Jos 15.55 ; 1S 25.2 ; certains modifient légèrement la vocalisation traditionnelle de l''hébreu pour trouver ici les Maonites de 2Ch 26.7. LXX a lu soit Canaan, soit Madiân (6.1n) selon les mss. –  sauvés 2.16+ ; cf. 2S 22.4.'
  - type: text
    content: 'les Sidoniens, Amalec et Maôn vous ont opprimés. Lorsque vous avez crié vers moi, ne vous ai-je pas sauvés de leur main ? '
  '13':
  - type: note
    content: 3.6+ ; cf. Jos 22.18 ; 24.16 ; 1Ch 5.25.
  - type: text
    content: 'Mais vous, vous m''avez abandonné et vous avez servi d''autres dieux. C''est pourquoi je ne vous sauverai plus. '
  '14':
  - type: note
    content: Dt 32.37s ; Es 57.13 ; Jr 2.28.
  - type: text
    content: 'Allez ! Criez vers les dieux que vous avez choisis ! Qu''ils vous sauvent au temps de votre détresse ! '
  '15':
  - type: note
    content: 'Nous avons péché v. 10+. –  traite-nous…  : litt. fais-nous selon tout ce qui est bon à tes yeux.'
  - type: text
    content: 'Les Israélites dirent au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Nous avons péché ; traite-nous comme il te plaira. Seulement, s''il te plaît, délivre-nous en ce jour ! '
  '16':
  - type: note
    content: 'Ils supprimèrent… Gn 35.2 ; Jos 24.14,23 ; 1S 7.3s. –  qui fut touché  : litt. et son être (Gn 1.20n) se serra ou fut (trop) court  ; l''expression signifie souvent perdre patience  ; formule analogue en 16.16n  ; Ex 6.9 ; Nb 21.4n  ; Za 11.8 ; cf. Mi 2.7 ; Jb 21.4 où le mot pour souffle ou esprit remplace celui qui correspond à être.'
  - type: text
    content: 'Ils supprimèrent de leur sein les dieux étrangers et se mirent à servir le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui fut touché par l''oppression d''Israël.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: Les Ammonites… au Galaad v. 7-8+ ; cf. 1S 11.1ss. –  se mobilisèrent 7.23n. –  Mitspa ( Poste de guet ou de veille ), dans le Galaad (11.11,29 ; Gn 31.49n), à distinguer de la localité portant le même nom en Benjamin (20.1n  ; Jos 18.26 ; 1S 7.5 ; 10.17).
  - type: text
    content: 'Les Ammonites se mobilisèrent et dressèrent leur camp au Galaad ; les Israélites se rassemblèrent et dressèrent leur camp au Mitspa. '
  '18':
  - type: note
    content: 'engagera  : litt. commencera. –  chef  : le mot hébreu correspondant signifie aussi tête  ; il a souvent une connotation militaire 11.6-11 ; 1S 15.17 ; 2S 23.8,13,18.'
  - type: text
    content: 'Le peuple et les princes de Galaad se dirent les uns aux autres : Quel est l''homme qui engagera le combat contre les Ammonites ? Il sera chef de tous les habitants de Galaad !'
  '2':
  - type: note
    content: juge 2.16n.
  - type: text
    content: Il fut juge en Israël pendant vingt-trois ans ; puis il mourut et il fut enseveli à Shamir.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Yaïr  : cf. v. 4n  ; Nb 32.41 ; Dt 3.14+ ; Jos 13.30 ; 1R 4.13 ; 1Ch 2.21-23.'
  - type: text
    content: 'Après lui se leva Yaïr, le Galaadite, qui fut juge en Israël pendant vingt-deux ans. '
  '4':
  - type: note
    content: Les mots hébreux pour ânons (‘ayarim, cf. 5.10n) et villes (forme inhabituelle, ‘ayarim, homonyme du précédent, au lieu de ‘arim  ; traduction d'après des versions anciennes) font assonance avec le nom Yaïr (voir 10.3+ ; cf. 8.30 ; 12.14). –  Douars Nb 32.41n.
  - type: text
    content: 'Il avait trente fils, qui montaient trente ânons et possédaient trente villes ; jusqu''à ce jour celles-ci sont appelées Douars de Yaïr, dans le Galaad. '
  '5':
  - type: note
    content: 'Qamôn  : au sud-est de la mer de Galilée.'
  - type: text
    content: Puis Yaïr mourut et il fut enseveli à Qamôn.
  - type: heading
    content: Les Ammonites attaquent Israël
  '6':
  - type: text
    content: ' '
  - type: note
    content: '2.11n-13n. –  Seigneur (YHWH)  : voir noms divins. –  les dieux  : autre traduction le dieu.'
  - type: text
    content: 'Les Israélites firent encore ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ; ils se mirent à servir les Baals et les Astartés, les dieux d''Aram, les dieux de Sidon, les dieux de Moab, les dieux des Ammonites et les dieux des Philistins. Ils abandonnèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et cessèrent de le servir. '
  '7':
  - type: note
    content: 2.14+ ; 3.8 – Philistins 13.1 ; 1S 12.9.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Israël ; il les vendit aux Philistins et aux Ammonites. '
  '8':
  - type: note
    content: 'pressurèrent et écrasèrent  : les deux verbes, approximativement synonymes, font assonance en hébreu. –  Transjordanie 5.17n. –  Galaad 7.3n  ; Gn 31.21n  ; Dt 3.12-16.'
  - type: text
    content: 'Ceux-ci pressurèrent et écrasèrent les Israélites cette année-là et, pendant dix-huit ans, tous les Israélites qui étaient en Transjordanie, au pays des Amorites du Galaad. '
  '9':
  - type: note
    content: Cf. 2.15 ; 6.6+.
  - type: text
    content: 'Les Ammonites passèrent le Jourdain pour faire la guerre à Juda, à Benjamin et à la maison d''Ephraïm. Israël fut dans une grande détresse. '
