      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.14+ ; 3.8 – '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Philistins '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 13.1 ; 1S 12.9.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se mit en colère contre Israël ; il les vendit aux Philistins et aux Ammonites. '
  - type: usfm
    marker: v
