document_id: 2SA.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nathan dénonce la faute de David
  - type: text
    content: ' '
  - type: note
    content: 'Le récit des v. 1-4 est une parabole ; on en trouve quelques autres dans l''A.T., p. ex. 14.5-7 ; Jg 9.8-15 ; 2R 14.9 ; Es 5.1-7. Voir « Quelques paraboles de la Bible »♦. –  Nathan  : cf. 7.2-4 ; quelques mss hébreux ou des versions anciennes précisent le prophète voir aussi 24.11s. –  vint à lui  : cf. Ps 51.2. –  riche / pauvre  : cf. Lc 16.19-31.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' envoya Nathan à David. Nathan vint à lui et lui dit :'
  - type: text
    content: Il y avait dans une même ville deux hommes,
  - type: text
    content: l'un riche et l'autre pauvre.
  '10':
  - type: note
    content: 'l''épée ne s''écartera jamais de ta maison, c.-à-d. la mort violente ne cessera pas de frapper dans ta famille, affirmation qui prépare aux récits de 13.28s ; 18.14s ; 1R 2.23-25. –  tu m''as méprisé  : cf. 1S 2.30. –  tu as pris la femme d''Urie  : voir Ex 20.17.'
  - type: text
    content: 'Maintenant, l''épée ne s''écartera jamais de ta maison, parce que tu m''as méprisé et parce que tu as pris la femme d''Urie, le Hittite, pour en faire ta femme. '
  '11':
  - type: note
    content: Voir 16.21s.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je suscite un malheur contre toi du sein de ta maison ; je prendrai tes propres femmes sous tes yeux pour les donner à l''un de tes proches, et il couchera avec tes femmes sous les yeux de ce soleil. '
  '12':
  - type: note
    content: 'en secret…  : cf. Jb 34.22 ; Ec 12.14 ; Mt 10.26/ / ; Lc 12.2.'
  - type: text
    content: Toi, tu as agi en secret, mais moi, je ferai cela à la face de tout Israël et à la face du soleil.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai péché contre le Seigneur 24.10 ; Ps 32.5 ; 51.6 ; cf. Pr 28.13 ; Lc 15.21. –  laisse passer ton péché  : cf. Es 44.22 ; Mi 7.18 ; Ps 32.1s,5 ; 130.3s ; 1Jn 1.7-9. –  tu ne mourras pas Ez 33.11 ; cf. Lv 20.10 ; Nb 35.31.'
  - type: text
    content: 'David dit à Nathan : J''ai péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Nathan répondit à David : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' laisse passer ton péché ; tu ne mourras pas. '
  '14':
  - type: note
    content: 'tu as bafoué le Seigneur  : le texte hébreu traditionnel porte tu as bafoué les ennemis du Seigneur, leçon qui vise de toute évidence à éviter une tournure jugée blasphématoire (cf. 1S 20.16n  ; 25.22n) ; certains comprennent cependant tu as fait que les ennemis du Seigneur le bafouent  ; cf. Es 52.5 ; Rm 2.24. –  mourra  : cf. 1R 14.12 ; voir aussi Jos 6.26 ; 1R 16.34.'
  - type: text
    content: 'Mais, parce que tu as bafoué le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en cette affaire, le fils qui t''est né mourra. '
  '15':
  - type: note
    content: 'frappa  : cf. 1S 25.38n  ; le verbe hébreu évoque souvent un fléau, cf. Ex 7.27n  ; 1S 4.2n.'
  - type: text
    content: Puis Nathan s'en alla chez lui.
  - type: heading
    content: Mort de l'enfant de Bethsabée
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa l''enfant que la femme d''Urie avait donné à David : il tomba malade. '
  '16':
  - type: note
    content: 'rechercha Dieu  : la tournure de la phrase en hébreu suggère que David s''est rendu au sanctuaire pour prier Dieu. –  jeûner  : cf. Jl 2.12-14 ; Jon 3.5-9. –  couché par terre 13.31. LXX ajoute dans un sac. Rites de pénitence de David, qui espère ainsi fléchir Dieu et obtenir la guérison de l''enfant.'
  - type: text
    content: 'David rechercha Dieu pour le garçon et il se mit à jeûner. Rentré chez lui, il passait la nuit couché par terre. '
  '17':
  - type: note
    content: 'quoi que ce soit  : litt. du pain, cf. 3.35 ; 1S 28.20n.'
  - type: text
    content: 'Les anciens de sa maison insistèrent auprès de lui pour qu''il se relève de terre ; mais il ne voulut pas et il refusa de manger quoi que ce soit avec eux. '
  '18':
  - type: note
    content: 'il ne nous a pas écoutés  : litt. il n''a pas écouté notre voix. –  Il va très mal réagir  : litt. il fera du mal.'
  - type: text
    content: 'Le septième jour, l''enfant mourut. Les gens de la cour de David avaient peur de lui annoncer que l''enfant était mort. Ils disaient : Lorsque l''enfant était encore en vie, nous lui avons parlé, et il ne nous a pas écoutés ; comment pourrions-nous lui dire : « L''enfant est mort ! » Il va très mal réagir. '
  '19':
  - type: text
    content: 'David s''aperçut que ses gens chuchotaient entre eux et il comprit que l''enfant était mort. Il leur demanda : L''enfant est-il mort ? Ils répondirent : Il est mort. '
  '2':
  - type: text
    content: Le riche avait du petit bétail et du gros bétail en très grande quantité.
  '20':
  - type: note
    content: Contrairement à la coutume qui aurait voulu qu'il accomplisse un certain nombre de rites de deuil (on négligeait par exemple les soins corporels ordinaires), David reprend une vie normale, ce qui ne manque pas de surprendre son entourage (v. 21).
  - type: text
    content: 'Alors David se releva de terre. Il se lava, se parfuma et changea de vêtements ; puis il se rendit à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et se prosterna. Il rentra ensuite chez lui et demanda qu''on lui serve un repas ; il mangea. '
  '21':
  - type: text
    content: 'Les gens de sa cour lui dirent : Que fais-tu là ? Quand l''enfant était vivant, tu jeûnais et tu pleurais pour lui ; et maintenant que l''enfant est mort, tu te lèves et tu manges ! '
  '22':
  - type: note
    content: 'Qui sait si… grâce  : cf. 1R 21.27-29 ; Es 38.1-8.'
  - type: text
    content: 'Il répondit : Lorsque l''enfant était encore en vie, je jeûnais et je pleurais, car je disais : Qui sait si le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne me fera pas grâce et si l''enfant ne vivra pas ? '
  '23':
  - type: note
    content: 'C''est moi qui irai le rejoindre  : cf. Gn 37.35. –  il ne me reviendra pas  : cf. Jb 7.9s ; 10.21 ; 16.22.'
  - type: text
    content: Maintenant qu'il est mort, pourquoi jeûnerais-je ? Puis-je le faire revenir ? C'est moi qui irai le rejoindre ; lui, il ne me reviendra pas.
  - type: heading
    content: Naissance de Salomon
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'il alla avec elle 11.4n  ; Gn 16.2n. –  qu''il appela , selon une lecture traditionnelle, qu''elle appela selon une autre. –  Salomon  : ce nom évoque en hébreu l''idée de paix, bien-être  ; cf. 1Ch 22.9 ; Mt 1.6. –  qui fut aimé du Seigneur  : litt. et YHWH l''aima.'
  - type: text
    content: 'David consola Bethsabée, sa femme ; il alla avec elle, il coucha avec elle. Elle mit au monde un fils qu''il appela du nom de Salomon, et qui fut aimé du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: note
    content: 'Les sujets des deux verbes de ce v. ne sont pas expressément mentionnés ; litt. et il envoya par la main de Nathan, le prophète, et il appela son nom Yedidia, d''où plusieurs interprétations possibles  : Le Seigneur aima l''enfant et il envoya le prophète Nathan le communiquer à David ; il (= le Seigneur, ou David, ou Nathan, ou encore on) donna à l''enfant le nom de Yedidia, nom apparenté à celui de David ; cf. Ex 15.2n. –  Bien-Aimé  : cf. Né 13.26.'
  - type: text
    content: 'Par l''intermédiaire de Nathan, le prophète, il l''appela du nom de Yedidia (« Bien-Aimé du '
  - type: text
    content: Seigneur
  - type: text
    content: '  »), à cause du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: David s'empare de Rabba
  - type: heading
    content: 1Ch 20.1-3
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Le v. 26 reprend le récit interrompu de la guerre contre les Ammonites et du siège de leur capitale Rabba (voir 11.1). –  la cité royale  : on ignore quelle est la différence exacte entre cette appellation et celle du v. 27, Ville des Eaux  ; on peut penser que cité royale désignait la capitale d''une manière globale, capitale dont Joab aurait seulement commencé la prise par la partie basse ( la Ville des Eaux ), laissant au roi le soin d''achever la conquête de la citadelle et de recevoir le crédit de la victoire.'
  - type: text
    content: 'Joab attaqua Rabba-des-Ammonites et prit la cité royale. '
  '27':
  - type: note
    content: 'la Ville des Eaux  : peut-être un point d''eau fortifié. Le Yabboq (voir Gn 32.23 ; Jg 11.13,22) prend sa source dans les environs de Rabba (voir 10.3n), qu''il alimente en eau.'
  - type: text
    content: 'Il envoya des messagers à David, pour lui dire : J''ai attaqué Rabba et j''ai déjà pris la Ville des Eaux ; '
  '28':
  - type: note
    content: 'des troupes  : litt. du peuple, de même dans la suite ; cf. 10.9n,13 ; 1S 13.4n. –  que mon nom ne soit prononcé sur elle  : on peut comprendre d''une façon générale que l''honneur de la victoire ne me revienne, à moi et non à toi  ; ou bien qu''elle ne soit appelée de mon nom (et non du tien) (cf. Es 4.1, où la même formule hébraïque est appliquée à une femme qui porte le nom de son mari). Comparer avec 2S 5.6-9, où la forteresse de Jérusalem est appelée Ville de David à partir du moment où David s''en est emparé.'
  - type: text
    content: 'rassemble maintenant le reste des troupes, dresse ton camp contre la ville et prends-la, de peur que je ne la prenne moi-même et que mon nom ne soit prononcé sur elle. '
  '29':
  - type: text
    content: 'David rassembla toutes les troupes et marcha sur Rabba ; il l''attaqua et la prit. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: Dans un langage très imagé, Nathan exprime la profonde affection que le pauvre porte à sa brebis unique.
  - type: text
    content: Le pauvre n'avait rien qu'une petite brebis, qu'il avait achetée ;
  - type: text
    content: il la nourrissait, et elle grandissait chez lui avec ses fils ;
  - type: text
    content: elle mangeait de son pain,
  - type: text
    content: buvait dans sa coupe,
  - type: text
    content: couchait sur son sein.
  - type: text
    content: Elle était pour lui comme une fille.
  '30':
  - type: note
    content: 'de son roi  : litt. de leur roi (= le roi des Ammonites) ; la plupart des mss de LXX ont lu ici un nom propre, ce qui peut suggérer que le texte hébreu portait à l''origine de Milkom (nom du dieu des Ammonites, cf. 1R 11.5,33 ; 2R 23.13) ; on comprendrait mieux ainsi le poids de la couronne (un talent, c.-à-d. plus de trente kilos ; voir mesures, poids et monnaies) ornant une statue de la divinité. –  Elle fut…  : il s''agit peut-être, non pas de la couronne, mais de la pierre précieuse, qu''on aurait sertie dans la couronne royale de David (cf. 1R 5.31n).'
  - type: text
    content: 'Il prit la couronne de la tête de son roi ; son poids était d''un talent – un talent d''or – et elle était garnie d''une pierre précieuse. Elle fut dès lors sur la tête de David. Il emporta de la ville un très grand butin. '
  '31':
  - type: note
    content: 'Le texte de ce v. est peu clair, car le sens de plusieurs mots n''est pas assuré. L''idée la plus généralement admise est que les Ammonites sont condamnés à des travaux forcés ; on a cependant parfois compris qu''ils auraient été torturés au moyen des instruments énumérés. –  peuple et troupes traduisent le même mot hébreu. –  les condamna  : litt. les fit passer. –  au moulage des briques  : comme autrefois les Hébreux en Egypte, voir Ex 5.6-21.'
  - type: text
    content: Quant au peuple qui s'y trouvait, il le fit sortir ; il les affecta aux scies, aux herses de fer et aux haches de fer, et les condamna au moulage des briques ; il traita de même toutes les villes des Ammonites. Puis David revint à Jérusalem avec toutes les troupes.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 18.6-8 ; 1S 28.24s.
  - type: text
    content: Un voyageur arriva chez l'homme riche ;
  - type: text
    content: comme celui-ci voulait épargner son petit bétail et son gros bétail
  - type: text
    content: pour préparer un repas au voyageur qui était arrivé chez lui,
  - type: text
    content: il prit la brebis du pauvre
  - type: text
    content: et l'apprêta pour l'homme qui était arrivé chez lui.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'colère  : cf. 1S 11.6+. –  Par la vie du Seigneur 1S 14.39n. –  mérite la mort  : cf. 1S 20.31n.'
  - type: text
    content: 'David se mit dans une grande colère contre cet homme ; il dit à Nathan : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ', l''homme qui a fait cela mérite la mort ! '
  '6':
  - type: note
    content: 'il la compensera au quadruple  : cf. Ex 21.37 ; Lc 19.8 ; LXX dit au septuple.'
  - type: text
    content: Quant à la brebis, il la compensera au quadruple, puisqu'il a fait une chose pareille, qu'il n'a pas voulu l'épargner.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cet homme-là, c''est toi ! cf. 1R 20.40-42. –  conféré l''onction… sur Israël  : cf. 7.8s ; 1S 16.11-13n  ; voir aussi 1S 10.1 ; 15.17. –  délivré de la main de Saül  : cf. 22.1 ; 1S 19.11-17 ; 27.1.'
  - type: text
    content: 'Alors Nathan dit à David : Cet homme-là, c''est toi ! Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : C''est moi qui t''ai conféré l''onction pour que tu sois roi sur Israël, et c''est moi qui t''ai délivré de la main de Saül ; '
  '8':
  - type: note
    content: 'les femmes de ton seigneur  : cf. 3.7n. –  la maison d''Israël et de Juda  : voir 5.5. –  j''y ajouterais encore  : litt. j''ajouterais pour toi comme cela et comme cela.'
  - type: text
    content: 'je t''ai donné la maison de ton seigneur, j''ai placé sur ton sein les femmes de ton seigneur et je t''ai donné la maison d''Israël et de Juda. Et si cela ne suffisait pas, j''y ajouterais encore ! '
  '9':
  - type: note
    content: 'méprisé la parole du Seigneur  : une version grecque ancienne a lu méprisé le Seigneur, ce qui pourrait avoir été le texte primitif (cf. v. 10), adouci ultérieurement par l''insertion de la parole de. –  ce qui lui déplaisait  : voir Ex 20.13s ; Nb 15.31 ; 22.34n. –  Tu as abattu par l''épée Urie  : Nathan dénonce clairement la responsabilité entière du roi, tout en précisant ensuite la manière indirecte qu''il a utilisée : par l''épée des Ammonites (voir 11.17).'
  - type: text
    content: 'Pourquoi donc as-tu méprisé la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', en faisant ce qui lui déplaisait ? Tu as abattu par l''épée Urie, le Hittite ; tu as pris sa femme pour en faire ta femme, et lui, tu l''as tué par l''épée des Ammonites. '
