    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elle fut…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit peut-être, non pas de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la couronne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais de la '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pierre précieuse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qu''on aurait sertie dans la couronne royale de David (cf. 1R 5.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Il prit la couronne de la tête de son roi ; son poids était d''un talent – un talent d''or – et elle était garnie d''une pierre précieuse. Elle fut dès lors sur la tête de David. Il emporta de la ville un très grand butin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le texte de ce v. est peu clair, car le sens de plusieurs mots n''est pas assuré. L''idée la plus généralement admise est que les Ammonites sont condamnés à des travaux forcés ; on a cependant parfois compris qu''ils auraient été torturés au moyen des instruments énumérés. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'troupes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent le même mot hébreu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les condamna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les fit passer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au moulage des briques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comme autrefois les Hébreux en Egypte, voir Ex 5.6-21.'
    marker-yv: yv-n
  - type: text
    text: Quant au peuple qui s'y trouvait, il le fit sortir ; il les affecta aux scies, aux herses de fer et aux haches de fer, et les condamna au moulage des briques ; il traita de même toutes les villes des Ammonites. Puis David revint à Jérusalem avec toutes les troupes.
