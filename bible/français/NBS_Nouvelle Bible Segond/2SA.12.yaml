  - type: text
    text: 'David consola Bethsabée, sa femme ; il alla avec elle, il coucha avec elle. Elle mit au monde un fils qu''il appela du nom de Salomon, et qui fut aimé du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
