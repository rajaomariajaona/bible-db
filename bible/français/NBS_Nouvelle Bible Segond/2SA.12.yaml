  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rechercha Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la tournure de la phrase en hébreu suggère que David s''est rendu au sanctuaire pour prier Dieu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jeûner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jl 2.12-14 ; Jon 3.5-9. –  '
    - type: usfm
      marker: fq
