    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.31. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoute '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans un sac
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Rites de pénitence de David, qui espère ainsi fléchir Dieu et obtenir la guérison de l'enfant.
    marker-yv: yv-n
  - type: text
    text: 'David rechercha Dieu pour le garçon et il se mit à jeûner. Rentré chez lui, il passait la nuit couché par terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quoi que ce soit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.35 ; 1S 28.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les anciens de sa maison insistèrent auprès de lui pour qu''il se relève de terre ; mais il ne voulut pas et il refusa de manger quoi que ce soit avec eux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il ne nous a pas écoutés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il n'a pas écouté notre voix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il va très mal réagir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fera du mal.
    marker-yv: yv-n
  - type: text
    text: 'Le septième jour, l''enfant mourut. Les gens de la cour de David avaient peur de lui annoncer que l''enfant était mort. Ils disaient : Lorsque l''enfant était encore en vie, nous lui avons parlé, et il ne nous a pas écoutés ; comment pourrions-nous lui dire : « L''enfant est mort ! » Il va très mal réagir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'David s''aperçut que ses gens chuchotaient entre eux et il comprit que l''enfant était mort. Il leur demanda : L''enfant est-il mort ? Ils répondirent : Il est mort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Contrairement à la coutume qui aurait voulu qu'il accomplisse un certain nombre de rites de deuil (on négligeait par exemple les soins corporels ordinaires), David reprend une vie normale, ce qui ne manque pas de surprendre son entourage (v. 21).
    marker-yv: yv-n
  - type: text
    text: 'Alors David se releva de terre. Il se lava, se parfuma et changea de vêtements ; puis il se rendit à la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et se prosterna. Il rentra ensuite chez lui et demanda qu''on lui serve un repas ; il mangea. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: 'Les gens de sa cour lui dirent : Que fais-tu là ? Quand l''enfant était vivant, tu jeûnais et tu pleurais pour lui ; et maintenant que l''enfant est mort, tu te lèves et tu manges ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui sait si… '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 21.27-29 ; Es 38.1-8.'
    marker-yv: yv-n
  - type: text
    text: 'Il répondit : Lorsque l''enfant était encore en vie, je jeûnais et je pleurais, car je disais : Qui sait si le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne me fera pas grâce et si l''enfant ne vivra pas ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est moi qui irai le rejoindre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 37.35. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il ne me reviendra pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jb 7.9s ; 10.21 ; 16.22.'
    marker-yv: yv-n
  - type: text
    text: Maintenant qu'il est mort, pourquoi jeûnerais-je ? Puis-je le faire revenir ? C'est moi qui irai le rejoindre ; lui, il ne me reviendra pas.
