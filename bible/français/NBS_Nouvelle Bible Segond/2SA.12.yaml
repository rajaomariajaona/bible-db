document_id: 2SA.12
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Nathan dénonce la faute de David
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le récit des v. 1-4 est une parabole ; on en trouve quelques autres dans l''A.T., p. ex. 14.5-7 ; Jg 9.8-15 ; 2R 14.9 ; Es 5.1-7. Voir « Quelques paraboles de la Bible »♦. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nathan
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 7.2-4 ; quelques mss hébreux ou des versions anciennes précisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le prophète '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'voir aussi 24.11s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vint à lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ps 51.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'riche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pauvre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lc 16.19-31.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' envoya Nathan à David. Nathan vint à lui et lui dit :'
- type: usfm
  marker: q1
  children:
  - type: text
    text: Il y avait dans une même ville deux hommes,
- type: usfm
  marker: q1
  children:
  - type: text
    text: l'un riche et l'autre pauvre.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: Le riche avait du petit bétail et du gros bétail en très grande quantité.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans un langage très imagé, Nathan exprime la profonde affection que le pauvre porte à sa brebis unique.
    marker-yv: yv-n
  - type: text
    text: Le pauvre n'avait rien qu'une petite brebis, qu'il avait achetée ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: il la nourrissait, et elle grandissait chez lui avec ses fils ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: elle mangeait de son pain,
- type: usfm
  marker: q1
  children:
  - type: text
    text: buvait dans sa coupe,
- type: usfm
  marker: q1
  children:
  - type: text
    text: couchait sur son sein.
- type: usfm
  marker: q1
  children:
  - type: text
    text: Elle était pour lui comme une fille.
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Gn 18.6-8 ; 1S 28.24s.
    marker-yv: yv-n
  - type: text
    text: Un voyageur arriva chez l'homme riche ;
- type: usfm
  marker: q1
  children:
  - type: text
    text: comme celui-ci voulait épargner son petit bétail et son gros bétail
- type: usfm
  marker: q1
  children:
  - type: text
    text: pour préparer un repas au voyageur qui était arrivé chez lui,
- type: usfm
  marker: q1
  children:
  - type: text
    text: il prit la brebis du pauvre
- type: usfm
  marker: q1
  children:
  - type: text
    text: et l'apprêta pour l'homme qui était arrivé chez lui.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: colère
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 11.6+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Par la vie du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 14.39
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mérite la mort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 20.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'David se mit dans une grande colère contre cet homme ; il dit à Nathan : Par la vie du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', l''homme qui a fait cela mérite la mort ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il la compensera au quadruple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 21.37 ; Lc 19.8 ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' dit '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au septuple.
    marker-yv: yv-n
  - type: text
    text: Quant à la brebis, il la compensera au quadruple, puisqu'il a fait une chose pareille, qu'il n'a pas voulu l'épargner.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Cet homme-là, c''est toi ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cf. 1R 20.40-42. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'conféré '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
      - type: text
        text: … sur Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 7.8s ; 1S 16.11-13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi 1S 10.1 ; 15.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: délivré de la main de Saül
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 22.1 ; 1S 19.11-17 ; 27.1.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Nathan dit à David : Cet homme-là, c''est toi ! Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël : C''est moi qui t''ai conféré l''onction pour que tu sois roi sur Israël, et c''est moi qui t''ai délivré de la main de Saül ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les femmes de ton seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison d'Israël et de Juda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir 5.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'y ajouterais encore
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'ajouterais pour toi comme cela et comme cela.
    marker-yv: yv-n
  - type: text
    text: 'je t''ai donné la maison de ton seigneur, j''ai placé sur ton sein les femmes de ton seigneur et je t''ai donné la maison d''Israël et de Juda. Et si cela ne suffisait pas, j''y ajouterais encore ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'méprisé la parole du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : une version grecque ancienne a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'méprisé le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui pourrait avoir été le texte primitif (cf. v. 10), adouci ultérieurement par l''insertion de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la parole de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui lui déplaisait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Ex 20.13s ; Nb 15.31 ; 22.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu as abattu par l'épée Urie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Nathan dénonce clairement la responsabilité entière du roi, tout en précisant ensuite la manière indirecte qu''il a utilisée : '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par l''épée des Ammonites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 11.17).
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi donc as-tu méprisé la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', en faisant ce qui lui déplaisait ? Tu as abattu par l''épée Urie, le Hittite ; tu as pris sa femme pour en faire ta femme, et lui, tu l''as tué par l''épée des Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'épée ne s'écartera jamais de ta maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la mort violente ne cessera pas de frapper dans ta famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', affirmation qui prépare aux récits de 13.28s ; 18.14s ; 1R 2.23-25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu m'as méprisé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 2.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tu as pris la femme d'Urie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Ex 20.17.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, l''épée ne s''écartera jamais de ta maison, parce que tu m''as méprisé et parce que tu as pris la femme d''Urie, le Hittite, pour en faire ta femme. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir 16.21s.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je suscite un malheur contre toi du sein de ta maison ; je prendrai tes propres femmes sous tes yeux pour les donner à l''un de tes proches, et il couchera avec tes femmes sous les yeux de ce soleil. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en secret…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jb 34.22 ; Ec 12.14 ; Mt 10.26/ / ; Lc 12.2.'
    marker-yv: yv-n
  - type: text
    text: Toi, tu as agi en secret, mais moi, je ferai cela à la face de tout Israël et à la face du soleil.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'J''ai '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' contre le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.10 ; Ps 32.5 ; 51.6 ; cf. Pr 28.13 ; Lc 15.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: laisse passer ton péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Es 44.22 ; Mi 7.18 ; Ps 32.1s,5 ; 130.3s ; 1Jn 1.7-9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu ne mourras pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ez 33.11 ; cf. Lv 20.10 ; Nb 35.31.
    marker-yv: yv-n
  - type: text
    text: 'David dit à Nathan : J''ai péché contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Nathan répondit à David : Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' laisse passer ton péché ; tu ne mourras pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu as bafoué le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le texte hébreu traditionnel porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu as bafoué les ennemis du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', leçon qui vise de toute évidence à éviter une tournure jugée blasphématoire (cf. 1S 20.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; certains comprennent cependant '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu as fait que les ennemis du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' le bafouent'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Es 52.5 ; Rm 2.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: mourra
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 14.12 ; voir aussi Jos 6.26 ; 1R 16.34.'
    marker-yv: yv-n
  - type: text
    text: 'Mais, parce que tu as bafoué le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' en cette affaire, le fils qui t''est né mourra. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frappa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 25.38'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; le verbe hébreu évoque souvent un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fléau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ex 7.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1S 4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Puis Nathan s'en alla chez lui.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Mort de l'enfant de Bethsabée
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' frappa l''enfant que la femme d''Urie avait donné à David : il tomba malade. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
