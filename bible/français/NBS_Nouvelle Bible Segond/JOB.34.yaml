document_id: JOB.34,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elihou met Job en accusation
  - type: text
    content: ' '
  - type: note
    content: 'reprit  : le verbe correspondant est habituellement traduit par répondre  ; de même en 35.1 ; 40.1.'
  - type: text
    content: 'Elihou reprit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'hommes raisonnables  : litt. hommes de cœur , de même au v. 34. –  Puissant v. 12 ; 5.17n. –  Jamais ! 1S 2.30n.'
  - type: text
    content: Ecoutez-moi donc, hommes raisonnables !
  - type: text
    content: Dieu serait-il méchant,
  - type: text
    content: le Puissant injuste ? Jamais !
  '11':
  - type: text
    content: ' '
  - type: note
    content: Litt. car l'œuvre de l'humain, il lui paie de retour, et comme (est) le chemin de chacun, il lui fait trouver. Cf. Jr 32.19 ; Ps 62.13 ; Pr 24.12 ; Mt 16.27 ; Rm 2.6.
  - type: text
    content: Il paie de retour l'être humain selon ses actions,
  - type: text
    content: il rétribue chacun selon ses voies.
  '12':
  - type: text
    content: ' '
  - type: note
    content: '8.3+. –  n''agit pas comme un méchant  : on pourrait aussi comprendre ne condamne pas , même forme verbale aux v. 17,29 ; cf. 9.20n  ; 10.2 ( condamner = déclarer méchant ). –  Puissant 5.17n.'
  - type: text
    content: En vérité, Dieu n'agit pas comme un méchant ;
  - type: text
    content: le Puissant ne fausse pas le droit.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'assigné  : cf. 36.23n.'
  - type: text
    content: Qui lui a assigné la terre ?
  - type: text
    content: Qui lui a confié le monde entier ?
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'S''il ne pensait qu''à lui-même  : litt. s''il mettait son cœur vers lui-même . –  souffle ou Esprit , 33.4+.'
  - type: text
    content: S'il ne pensait qu'à lui-même,
  - type: text
    content: s'il ramenait à lui son souffle, son haleine,
  '15':
  - type: text
    content: ' '
  - type: note
    content: 12.10+ ; voir aussi Gn 3.19 ; 6.3 ; Ps 104.29 ; 146.
  - type: text
    content: tous expireraient en même temps,
  - type: text
    content: et l'être humain retournerait à la poussière.
  '16':
  - type: text
    content: Si tu as de l'intelligence, écoute ceci,
  - type: text
    content: prête l'oreille à mes propos !
  '17':
  - type: text
    content: ' '
  - type: note
    content: l'équité ou le droit , cf. v. 4n.
  - type: text
    content: Celui qui déteste l'équité pourrait-il vraiment gouverner ?
  - type: text
    content: Condamnerais-tu le juste, le puissant ?
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Dira-t-on  : avec un ms hébreu et plusieurs versions anciennes, on pourrait lire celui qui dit… (19), celui-là ne favorise pas les princes… –  Crapule  : hébreu beliya‘al  ; Dt 13.14n  ; 2S 16.7.'
  - type: text
    content: 'Dira-t-on à un roi : « Crapule ! »,'
  - type: text
    content: 'et à des nobles : « Méchant ! »'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : sous-entendu dans le texte (v. 18n) ; cf. 13.8n  ; Lv 19.15 ; Dt 10.17 ; voir aussi Es 40.23.'
  - type: text
    content: Dieu ne favorise pas les princes
  - type: text
    content: et ne distingue pas le riche du pauvre,
  - type: text
    content: parce que tous sont l'œuvre de ses mains.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'qui avez de la connaissance  : autre traduction qui savez.'
  - type: text
    content: Sages, écoutez mes propos !
  - type: text
    content: Vous qui avez de la connaissance, prêtez l'oreille à ce que je dis !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction conjecturale ; cf. 5.11+ ; 12.19 ; Ex 12.29 ; Lc 12.20. –  un peuple se soulève…  : autre traduction un peuple est ébranlé et périt  ; certains modifient le texte hébreu traditionnel pour lire il (Dieu) frappe les grands . –  on écarte  : un ms hébreu porte il écarte . –  le tyran  : un ms hébreu porte le pluriel les tyrans , ou les indomptables , cf. 24.22n  ; Gn 49.24n. –  sans effort  : litt. pas par (la) main , ce qui pourrait aussi signifier (s''il s''agit de Dieu) sans même intervenir.'
  - type: text
    content: En un instant ils meurent ;
  - type: text
    content: en pleine nuit un peuple se soulève et ils périssent ;
  - type: text
    content: on écarte le tyran sans effort.
  '21':
  - type: text
    content: ' '
  - type: note
    content: il (c.-à-d. Dieu) a les yeux… 14.16+ ; cf. Jr 32.19 ; Ps 33.14s.
  - type: text
    content: Car il a les yeux sur les voies de l'homme,
  - type: text
    content: il regarde tous ses pas.
  '22':
  - type: text
    content: ' '
  - type: note
    content: ténèbres / ombre de mort 3.5n  ; cf. Ps 139.11s.
  - type: text
    content: Il n'y a ni ténèbres ni ombre de mort
  - type: text
    content: où puissent se cacher les malfaisants.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''est pas besoin…  : on pourrait aussi comprendre Dieu n''a pas besoin de prêter attention longtemps à un homme pour que celui-ci entre en jugement avec lui  ; certains modifient le texte hébreu traditionnel pour lire car il n''a pas besoin de fixer un rendez-vous à quelqu''un… Cf. 7.18+.'
  - type: text
    content: Il n'est pas besoin de prêter attention longtemps à un homme
  - type: text
    content: pour qu'il entre en jugement avec Dieu ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 36.7 ; Dn 4.14.
  - type: text
    content: il brise les puissants sans faire d'enquête
  - type: text
    content: et il en nomme d'autres à leur place ;
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'reconnaît  : le verbe hébreu correspondant est traduit par distinguer au v. 19. –  nuit 27.20.'
  - type: text
    content: car il reconnaît leurs œuvres.
  - type: text
    content: Il les renverse de nuit, et ils sont écrasés ;
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'à la vue de tous  : litt. dans un lieu de voyants , c.-à-d. dans un lieu où on le voit  ; cf. Mt 26.67/ / ; Jn 18.22 ; Ac 23.2s.'
  - type: text
    content: il les frappe comme des méchants,
  - type: text
    content: à la vue de tous.
  '27':
  - type: text
    content: C'est parce qu'ils se sont écartés de lui
  - type: text
    content: et qu'ils n'ont pas su discerner toutes ses voies.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Ex 2.23s ; 22.22 ; 1S 9.16 ; Jc 5.4.
  - type: text
    content: Ils ont fait monter vers lui les cris du faible,
  - type: text
    content: et il entend les cris des pauvres.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur ; cf. 33.13 ; Rm 8.31-34. –  S''il donne de la tranquillité  : un ms hébreu porte s''il reste tranquille  ; certains interprètent s''il reste impassible, qui le condamnera ? –  S''il se détourne  : litt. s''il cache (sa) face . –  Nation ou homme…  : litt. sur (ou contre ) une nation et sur un homme réunis  ; certains modifient légèrement le texte hébreu traditionnel pour lire il veille cependant sur les nations et sur les hommes.'
  - type: text
    content: S'il donne de la tranquillité, qui condamnera ?
  - type: text
    content: S'il se détourne, qui pourra le regarder ?
  - type: text
    content: Nation ou homme, personne n'y peut rien.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 6.30+ ; 12.11+.
  - type: text
    content: Car l'oreille discerne les propos,
  - type: text
    content: comme le palais goûte la nourriture.
  '30':
  - type: text
    content: C'est pour qu'un impie ne règne pas
  - type: text
    content: qu'il ne soit pas un piège pour le peuple ;
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'a-t-il jamais dit  : autre traduction possible celui qui dit. –  J''ai supporté ma peine  : litt. j''ai porté  ; d''autres comprennent je lève (la main), c.-à-d. je le jure  ; certains, avec une légère modification du texte hébreu, traduisent  : je me suis laissé égarer . Cf. Jr 31.18.'
  - type: text
    content: 'car a-t-il jamais dit à Dieu :'
  - type: text
    content: « J'ai supporté ma peine, je n'agirai plus mal ;
  '32':
  - type: text
    content: ' '
  - type: note
    content: Ps 19.13.
  - type: text
    content: ce que je ne vois pas encore, montre-le-moi ;
  - type: text
    content: si j'ai commis une injustice, je ne recommencerai pas. »
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'd''après tes idées  : litt. d''avec toi . –  puisque tu renonces ou tu méprises, tu rejettes, tu t''en moques  ; cf. 7.16n  ; 42.6n. La traduction est conjecturale ; les pronoms ( tu , toi , moi ) peuvent renvoyer à Job, à Dieu ou à Elihou.'
  - type: text
    content: Est-ce d'après tes idées que Dieu doit payer de retour, puisque tu renonces ?
  - type: text
    content: C'est toi qui choisis, et non pas moi !
  - type: text
    content: Ce que tu connais, dis-le donc !
  '34':
  - type: text
    content: ' '
  - type: note
    content: hommes raisonnables v. 10n.
  - type: text
    content: Les hommes raisonnables,
  - type: text
    content: 'l''homme sage qui m''écoute, me diront :'
  '35':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.18 ; 38.2.
  - type: text
    content: Job parle sans la connaissance,
  - type: text
    content: et ses paroles manquent de bon sens.
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'La phrase commence par un mot que Vg a traduit comme une exclamation  : Mon père ! (cf. 1S 24.11-12n  ; 2R 5.13n). LXX l''a traduit par une simple formule de transition. Sur l''ensemble, cf. 19.28n. –  éprouvé 7.18n. –  comme  : litt. parmi , selon la plupart des mss ; quelques-uns portent la préposition plus naturellement traduite par comme . –  les hommes malfaisants  : cf. 4.8+ ; 22.15 ; 31.8+.'
  - type: text
    content: Que Job soit donc éprouvé jusqu'au bout,
  - type: text
    content: puisqu'il répond comme les hommes malfaisants !
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Voir péché. –  la révolte  : autre traduction la transgression  ; cf. v. 6 ; 35.6. –  il bat… parmi nous  : litt. il bat (ou frappe , même verbe au v. 26 ; 27.23 ; 36.18) entre nous . Le verbe hébreu correspondant a été diversement interprété. Certains, d''après l''araméen, traduisent  : il sème le doute . D''autres, en rattachant la proposition à ce qui précède, comprennent  : la révolte parmi nous suffit (ainsi, approximativement, LXX). La traduction adoptée rend compte du geste possible et de son sens supposé.'
  - type: text
    content: Car il ajoute à son péché la révolte,
  - type: text
    content: il bat des mains avec arrogance parmi nous,
  - type: text
    content: il multiplie les discours contre Dieu.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'l''équité  : autre traduction le droit (même terme aux v. 5s,12,17 ; cf. 32.9n).'
  - type: text
    content: Choisissons donc l'équité,
  - type: text
    content: reconnaissons entre nous ce qui est bon.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 27.2.
  - type: text
    content: 'Job dit : « Je suis juste,'
  - type: text
    content: Dieu a écarté mon droit ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'malgré mon équité (autre traduction mon droit , v. 4n) … menteur  : LXX il a menti quant à mon droit  ; cf. 9.30-33. –  ma blessure  : litt. ma flèche (c.-à-d. la blessure provoquée par la flèche) ; cf. 6.4+.'
  - type: text
    content: malgré mon équité, je passe pour un menteur ;
  - type: text
    content: ma blessure est incurable, sans que j'aie commis de transgression. »
  '7':
  - type: text
    content: ' '
  - type: note
    content: moquerie 11.3. –  comme de l'eau 15.16.
  - type: text
    content: Y a-t-il un homme semblable à Job,
  - type: text
    content: qui boive la moquerie comme de l'eau,
  '8':
  - type: text
    content: qui chemine dans la société des malfaisants,
  - type: text
    content: qui marche avec les méchants ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.7-15 ; 22.2 ; 35.5ss. –  de vouloir être agréé par Dieu  : autres traductions d''avoir la faveur de Dieu ; de s''intéresser à Dieu  ; cf. 9.22 ; 10.3 ; Ml 3.13s.'
  - type: text
    content: 'Car il a dit : « Il est inutile à l''homme'
  - type: text
    content: de vouloir être agréé par Dieu. »
