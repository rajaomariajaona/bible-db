        children:
        - type: text
          text: '34.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'car l''œuvre de l''humain, il lui paie de retour, et comme (est) le chemin de chacun, il lui fait trouver. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jr 32.19 ; Ps 62.13 ; Pr 24.12 ; Mt 16.27 ; Rm 2.6.
      marker-yv: yv-n
    - type: text
      text: Il paie de retour l'être humain selon ses actions,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il rétribue chacun selon ses voies.
