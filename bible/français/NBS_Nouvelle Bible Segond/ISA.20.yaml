document_id: ISA.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sans chaussures et sans vêtements
  - type: text
    content: ' '
  - type: note
    content: 'Ashdod  : l''une des cinq villes de Philistie (Am 1.6) ; alliée de l''Egypte, elle avait essayé d''engager Juda dans une coalition contre l''Assyrie. Sargon II la fit attaquer et la prit en 711 av. J.-C. –  général en chef  : litt. tartân , titre assyrien (2R 18.17n).'
  - type: text
    content: 'L''année de son arrivée à Ashdod, le général en chef envoyé par Sargon, roi d''Assyrie, fit la guerre à Ashdod et la prit. '
  '2':
  - type: note
    content: 'Esaïe, fils d''Amots 1.1n. –  détache le sac  : signe de deuil ou vêtement distinctif du prophète. Sur ce type d’action symbolique, cf. 8.1-4 ; 1R 11.29-31 ; Jr 13.1-7 ; Ez 12.1-15 ; Os 1–3. –  nu et déchaussé  : cf. 1S 19.24 ; Mi 1.8.'
  - type: text
    content: 'En ce temps-là le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait parlé par l''intermédiaire d''Esaïe, fils d''Amots, en disant : Va, détache le sac de tes reins et ôte tes sandales de tes pieds. Il fit ainsi. Il marcha nu et déchaussé.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: signe / présage 8.18n. –  Koush ou la Nubie  ; cf. 11.11 ; 18.1n  ; Gn 2.13n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : De même qu''Esaïe, mon serviteur, a marché nu et déchaussé – ce sera pour trois ans un signe et un présage pour l''Egypte et pour Koush – '
  '4':
  - type: note
    content: les fesses découvertes  ; cf. 2S 10.4. –  Honte ou nudité.
  - type: text
    content: 'de même le roi d''Assyrie emmènera les captifs égyptiens et les exilés koushites, les jeunes et les vieux, nus et déchaussés, les fesses découvertes. Honte pour l''Egypte ! '
  '5':
  - type: note
    content: 'leur espoir  : litt. leur regard, de même au v. 6 ; cf. 31.3. –  leur splendeur  : autre traduction leur parure.'
  - type: text
    content: 'Ainsi ils seront terrifiés et honteux à cause de Koush, leur espoir, et de l''Egypte, leur splendeur ; '
  '6':
  - type: note
    content: 'de cette côte  : litt. de cette île, cf. 11.11+ ; Gn 10.5n  ; il s''agit ici de la Philistie ; mais la leçon vise surtout Juda, dans l''arrière-pays. –  espoir v. 5n.'
  - type: text
    content: 'les habitants de cette côte diront en ce jour-là : Voilà bien notre espoir, notre refuge pour être secourus, pour être délivrés du roi d''Assyrie ! Comment pourrions-nous échapper ?'
