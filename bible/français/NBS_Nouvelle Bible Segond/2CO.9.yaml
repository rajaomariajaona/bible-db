document_id: 2CO.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Autres recommandations pour la collecte
  - type: text
    content: ' '
  - type: note
    content: ministère ou service , cf. v. 12s ; 3.3n  ; 5.18n. –  saints 8.1n,4+.
  - type: text
    content: 'Au sujet du ministère en faveur des saints, il est superflu que je vous écrive. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Es 55.10  ; cf. Os 10.12.
  - type: text
    content: 'Or celui qui fournit '
  - type: text
    content: de la semence au semeur et du pain pour la nourriture
  - type: text
    content: ' vous fournira la semence, la multipliera et fera croître le produit de votre justice. '
  '11':
  - type: note
    content: 'riches de tout 1Co 1.5. –  générosité  : comme en 8.2n (de même en 9.13). –  des actions de grâces v. 12 ; 1.11+.'
  - type: text
    content: 'Vous serez ainsi riches de tout, pour toute la générosité qui produira, par notre entremise, des actions de grâces envers Dieu. '
  '12':
  - type: note
    content: 'ministère ou service  : cf. v. 1n. –  cette offrande  : le terme grec correspondant, souvent traduit par service (Rm 13.6n), est celui qui a donné notre mot liturgie  ; voir Ac 13.2n. –  supplée à ce qui manque 8.14+. –  fait abonder…  : litt. abonde par de nombreuses actions de grâces.'
  - type: text
    content: 'Car le ministère de cette offrande, non seulement supplée à ce qui manque aux saints, mais encore fait abonder les actions de grâces envers Dieu. '
  '13':
  - type: note
    content: 'la valeur éprouvée 2.9n. –  ils  : c.-à-d. les saints, v. 12 (8.1n) ; ou, plus généralement, on glorifie, on glorifiera. –  l''obéissance…  : litt. l''obéissance de votre acte de reconnaissance (ou confession, cf. Mt 10.32n  ; Jn 12.42) pour la bonne nouvelle… –  générosité v. 11n. –  solidarité ou communion 8.4n.'
  - type: text
    content: 'Du fait de la valeur éprouvée de ce ministère, ils glorifient Dieu pour l''obéissance avec laquelle vous reconnaissez publiquement la bonne nouvelle du Christ et pour la générosité de votre solidarité avec eux et avec tous. '
  '14':
  - type: note
    content: avec une vive affection ou, plus littéralement, avec un vif désir pour vous.
  - type: text
    content: 'C''est avec une vive affection qu''ils prient pour vous à cause de la grâce surabondante que Dieu vous a faite. '
  '15':
  - type: note
    content: Rm 7.25+.
  - type: text
    content: Grâce soit rendue à Dieu pour son don ineffable !
  '2':
  - type: note
    content: Macédoniens 8.1n. –  l'Achaïe, c.-à-d. la province de Corinthe 1.1n  ; cf. 8.10s. –  passion ou zèle  ; le même terme est traduit ailleurs par passion jalouse (cf. 7.11 ; 11.2n).
  - type: text
    content: 'Je connais en effet votre ardeur, dont je fais ma fierté devant les Macédoniens : l''Achaïe est prête depuis l''année dernière, et votre passion a stimulé la plupart. '
  '3':
  - type: note
    content: '1.14+ ; 8.24. –  réduite à néant  : litt. vidée, cf. Ph 2.7n.'
  - type: text
    content: 'J''envoie les frères, pour que la fierté que nous avons montrée à votre sujet ne soit pas réduite à néant sur ce point-là, et que vous soyez prêts, comme je l''ai dit ; '
  '4':
  - type: note
    content: 'm''accompagnent  : cf. Ac 17.14s ; 20.4. –  la situation  : autre traduction cette assurance  ; même terme en 11.17n  ; Hé 3.14n.'
  - type: text
    content: 'de peur que, si les Macédoniens m''accompagnent et ne vous trouvent pas prêts, la situation ne tourne à notre honte – pour ne pas dire à la vôtre. '
  '5':
  - type: note
    content: 'largesse  : le mot grec correspondant est habituellement traduit par bénédiction  ; voir aussi v. 6n. –  promise Rm 1.2n. –  geste d''avarice  : le terme grec est habituellement traduit par avidité (p. ex. Rm 1.29).'
  - type: text
    content: J'ai donc estimé nécessaire d'encourager les frères à me devancer chez vous pour s'occuper de la largesse que vous avez promise, afin qu'elle soit prête comme une largesse et non comme un geste d'avarice.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 11.24s ; 19.17 ; 22.8 ; Siracide 35.10-12 : « Avec générosité glorifie le Seigneur et ne lésine pas en offrant les prémices de ton labeur. A chacune de tes offrandes montre un visage joyeux et avec joie consacre la dîme. Donne au Très-Haut à la mesure de ses dons, avec la générosité que te permettent tes moyens. » –  peu  : autres traductions chichement, avec parcimonie . –  largement  : la tournure correspondante reprend le terme traduit par largesse au v. 5n.'
  - type: text
    content: 'En fait, celui qui sème peu moissonnera peu, et celui qui sème largement moissonnera largement. '
  '7':
  - type: note
    content: comme il l'a résolu en son cœur 8.3 ; Dt 15.10 ; Phm 14. –  Dieu aime… Pr 22.8n.
  - type: text
    content: 'Que chacun donne comme il l''a résolu en son cœur, sans tristesse ni contrainte ; car '
  - type: text
    content: Dieu
  - type: text
    content: ' aime '
  - type: text
    content: celui qui donne avec joie
  - type: text
    content: '. '
  '8':
  - type: note
    content: 'pour toute œuvre bonne  : cf. Ep 2.10 ; Col 1.10 ; 2Th 2.17 ; 2Tm 3.17 ; Tt 2.14.'
  - type: text
    content: 'Et Dieu a le pouvoir de vous combler de toutes sortes de grâces, afin que, disposant toujours, à tous égards, de tout le nécessaire, vous ayez encore en abondance pour toute œuvre bonne, '
  '9':
  - type: note
    content: Ps 112.9. – Voir justice.
  - type: text
    content: 'ainsi qu''il est écrit :'
  - type: text
    content: Il a répandu ses bienfaits, il a donné aux pauvres ;
  - type: text
    content: sa justice demeure pour toujours
  - type: text
    content: .
