      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 12s ; 3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 5.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',4+.'
      marker-yv: yv-n
    - type: text
      text: 'Au sujet du ministère en faveur des saints, il est superflu que je vous écrive. '
  '10':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Es 55.10
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Os 10.12.
      marker-yv: yv-n
    - type: text
      text: 'Or celui qui fournit '
    - type: usfm
      marker: it
      children:
      - type: text
        text: de la semence au semeur et du pain pour la nourriture
    - type: text
      text: ' vous fournira la semence, la multipliera et fera croître le produit de votre justice. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'riches de tout '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 1.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: générosité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comme en 8.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (de même en 9.13). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des actions de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâces
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 12 ; 1.11+.
      marker-yv: yv-n
    - type: text
      text: 'Vous serez ainsi riches de tout, pour toute la générosité qui produira, par notre entremise, des actions de grâces envers Dieu. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ministère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cette offrande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme grec correspondant, souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'service '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Rm 13.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), est celui qui a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: liturgie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir Ac 13.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'supplée à ce qui manque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fait abonder…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: abonde par de nombreuses actions de grâces.
      marker-yv: yv-n
    - type: text
      text: 'Car le ministère de cette offrande, non seulement supplée à ce qui manque aux saints, mais encore fait abonder les actions de grâces envers Dieu. '
  '13':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la valeur éprouvée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les saints
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 12 (8.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; ou, plus généralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'on '
        - type: usfm
          marker: w
          children:
          - type: text
            text: glorifie
        - type: text
          text: ', on glorifiera'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'obéissance…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''obéissance de votre acte de reconnaissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: confession
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Mt 10.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jn 12.42) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour la bonne nouvelle… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'générosité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'solidarité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'communion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Du fait de la valeur éprouvée de ce ministère, ils glorifient Dieu pour l''obéissance avec laquelle vous reconnaissez publiquement la bonne nouvelle du Christ et pour la générosité de votre solidarité avec eux et avec tous. '
  '14':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avec une vive affection '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec un vif désir pour vous.
      marker-yv: yv-n
    - type: text
      text: 'C''est avec une vive affection qu''ils prient pour vous à cause de la grâce surabondante que Dieu vous a faite. '
  '15':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 7.25+.
      marker-yv: yv-n
    - type: text
      text: Grâce soit rendue à Dieu pour son don ineffable !
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Macédoniens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'Achaïe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. la province de Corinthe 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 8.10s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'passion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: zèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même terme est traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'passion jalouse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 7.11 ; 11.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Je connais en effet votre ardeur, dont je fais ma fierté devant les Macédoniens : l''Achaïe est prête depuis l''année dernière, et votre passion a stimulé la plupart. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.14+ ; 8.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réduite à néant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vidée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ph 2.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''envoie les frères, pour que la fierté que nous avons montrée à votre sujet ne soit pas réduite à néant sur ce point-là, et que vous soyez prêts, comme je l''ai dit ; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: m'accompagnent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ac 17.14s ; 20.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la situation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cette assurance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même terme en 11.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Hé 3.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'de peur que, si les Macédoniens m''accompagnent et ne vous trouvent pas prêts, la situation ne tourne à notre honte – pour ne pas dire à la vôtre. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: largesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec correspondant est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir aussi v. 6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'promise '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: geste d'avarice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme grec est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avidité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (p. ex. Rm 1.29).
      marker-yv: yv-n
    - type: text
      text: J'ai donc estimé nécessaire d'encourager les frères à me devancer chez vous pour s'occuper de la largesse que vous avez promise, afin qu'elle soit prête comme une largesse et non comme un geste d'avarice.
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pr 11.24s ; 19.17 ; 22.8 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '35.10-12 : « Avec générosité glorifie le Seigneur et ne lésine pas en offrant les prémices de ton labeur. A chacune de tes offrandes montre un visage joyeux et avec joie consacre la dîme. Donne au Très-Haut à la mesure de ses dons, avec la générosité que te permettent tes moyens. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chichement, avec parcimonie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: largement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la tournure correspondante reprend le terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'largesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En fait, celui qui sème peu moissonnera peu, et celui qui sème largement moissonnera largement. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme il l''a résolu en son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.3 ; Dt 15.10 ; Phm 14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dieu aime… '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Pr 22.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Que chacun donne comme il l''a résolu en son cœur, sans tristesse ni contrainte ; car '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Dieu
    - type: text
      text: ' aime '
    - type: usfm
      marker: it
      children:
      - type: text
        text: celui qui donne avec joie
    - type: text
      text: '. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour toute œuvre bonne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ep 2.10 ; Col 1.10 ; 2Th 2.17 ; 2Tm 3.17 ; Tt 2.14.'
      marker-yv: yv-n
    - type: text
      text: 'Et Dieu a le pouvoir de vous combler de toutes sortes de grâces, afin que, disposant toujours, à tous égards, de tout le nécessaire, vous ayez encore en abondance pour toute œuvre bonne, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.9 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ps 112.9
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
        - type: text
          text: .
