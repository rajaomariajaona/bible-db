verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Autres recommandations pour la collecte
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
