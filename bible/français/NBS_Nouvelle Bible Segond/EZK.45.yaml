document_id: EZK.45,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les territoires réservés
  - type: text
    content: ' '
  - type: note
    content: 'vous répartirez par le sort  : litt. vous ferez tomber (le sort) ; cf. 47.21-23 ; Nb 26.55 ; 33.54 ; 34.13 ; Jos 13.6ss. –  prélèvement v. 6s,13,16 ; 20.40+ ; cf. 48.8-12,18-21 ; voir aussi Ex 35.5 ; Jr 31.40. –  25 000 (≈ 13,1 km) coudées  : l''unité de mesure n''est pas spécifiée dans le texte, de même dans la suite ; cf. 40.5n  ; le texte hébreu répète en longueur . –  10 000 (≈ 5,2 km) : LXX 20 000  ; cf. v. 3-5. –  sur toute sa superficie  : litt. dans tout son territoire (ou sa frontière ) , tout autour  ; cf. 43.12n.'
  - type: text
    content: 'Lorsque vous répartirez par le sort le pays en patrimoines, vous ferez sur le pays un prélèvement sacré pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', long de 25 000 coudées et large de 10 000. Il sera sacré sur toute sa superficie. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Lv 19.35-36+ ; voir mesures, poids et monnaies, de même pour les v. suivants.
  - type: text
    content: 'Ayez des balances justes, un épha juste et un bath juste. '
  '11':
  - type: note
    content: Cf. v. 14.
  - type: text
    content: 'L''épha et le bath auront la même mesure : le bath contiendra le dixième du homer et l''épha le dixième du homer ; leur mesure sera réglée d''après le homer. '
  '12':
  - type: note
    content: 'Ex 30.13 ; Lv 27.25 ; Nb 3.47. –  sicle ≈ 9,8 g ; voir mesures, poids et monnaies. –  La mine…  : c.-à-d. soixante sicles (≈ 570 g) ; LXX que cinq sicles soient bien cinq sicles, dix sicles dix et que cinquante fassent bien une mine.'
  - type: text
    content: Le sicle sera de vingt guéras. La mine aura chez vous vingt sicles plus vingt-cinq sicles plus quinze sicles.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le prélèvement  : cf. v. 1+.'
  - type: text
    content: 'Voici le prélèvement que vous ferez : un sixième d''épha sur un homer de froment, et un sixième d''épha sur un homer d''orge. '
  '14':
  - type: note
    content: Cf. v. 11.
  - type: text
    content: 'Prescription pour l''huile, pour un bath d''huile : un dixième de bath sur un kor, soit un homer de dix baths, car dix baths font un homer. '
  '15':
  - type: note
    content: 'un mouton ou une chèvre  : le terme hébreu s''applique aussi bien à un mouton ou à une chèvre (cf. 34.2n  ; Ex 12.3n). –  dans les riches pâturages  : litt. du (pays) abreuvé ou irrigué, arrosé (comme en Gn 13.10n) ; LXX des clans (d''Israël)  ; certains modifient le texte hébreu traditionnel pour lire du troupeau (autre mot que ci-dessus). –  offrande végétale 42.13+ ; voir sacrifices. –  faire l''expiation sur eux, c.-à-d. sur les Israélites.'
  - type: text
    content: 'Et un mouton ou une chèvre sur un troupeau de deux cents dans les riches pâturages d''Israël. Ce sera pour l''offrande végétale, l''holocauste et le sacrifice de paix, afin de faire l''expiation sur eux – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '16':
  - type: note
    content: Litt. tout le peuple, le pays seront vers ce prélèvement… (v. 13) ; LXX omet le mot traduit par pays.
  - type: text
    content: 'Tout le peuple du pays devra opérer ce prélèvement pour le prince en Israël. '
  '17':
  - type: note
    content: 'Cf. Lv 7.2 ; Hé 5.1. –  libations  : cf. Nb 15.1-16. –  fêtes… Lv 23 ; cf. Os 2.13 ; 1Ch 23.31 ; 2Ch 2.3 ; 8.13 ; 31.3. –  nouvelles lunes 46.1+.'
  - type: text
    content: Le prince sera chargé des holocaustes, des offrandes végétales et des libations, aux fêtes, aux nouvelles lunes, aux sabbats, à toutes les rencontres festives de la maison d'Israël ; il offrira le sacrifice pour le péché, l'offrande végétale, l'holocauste et les sacrifices de paix en expiation pour la maison d'Israël.
  - type: heading
    content: Règles pour diverses fêtes
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 43.18-27. –  premier mois  : ici Abib ou Nisân (mars-avril) ; cf. v. 21 ; Ex 12.2n  ; voir aussi calendrier et fêtes. –  tu ôteras le péché du sanctuaire  : cf. Lv 16.16.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Le premier jour du premier mois, tu prendras un taureau sans défaut et tu ôteras le péché du sanctuaire. '
  '19':
  - type: note
    content: '43.20+ ; cf. Lv 16.14s,18s. – Voir sacrifices. –  les montants des portes  : cf. 41.21n  ; Ex 12.7,22.'
  - type: text
    content: 'Le prêtre prendra du sang du sacrifice pour le péché et il en mettra sur les montants des portes de la Maison, sur les quatre angles du socle de l''autel et sur les montants des portes de la cour intérieure. '
  '2':
  - type: note
    content: '500 coudées (≈ 260 m) : cf. v. 1n  ; en 42.16-19 il était question de 500 cannes. –  espace libre  : le terme correspondant est traduit par abords (de ville) en Nb 35.2n  ; autre expression qu''en 41.9n  ; cf. 42.20 ; 43.12.'
  - type: text
    content: 'Il y aura pour le sanctuaire 500 coudées sur 500 en carré, et 50 coudées pour un espace libre tout autour. '
  '20':
  - type: note
    content: 'par erreur  : cf. 34.6n  ; Lv 4.2n. –  par inadvertance  : on pourrait aussi comprendre par imprudence ou par sottise  ; le même mot désigne les naïfs ou les simples en Pr 1.4 ; 8.5 ; 9.4 etc. – Voir expiation.'
  - type: text
    content: Tu feras de même le septième jour du mois, pour l'homme qui a péché par erreur ou par inadvertance ; vous ferez ainsi l'expiation de la Maison.
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ex 12.3-15 ; Lv 23.5s ; Nb 9.2ss ; 28.16-25 ; Dt 16.1-8.
  - type: text
    content: 'Le quatorzième jour du premier mois, il y aura pour vous la Pâque. C''est une fête de sept jours ; on mangera des pains sans levain. '
  '22':
  - type: note
    content: Cf. 46.2 ; Lv 16.
  - type: text
    content: 'Le prince offrira ce jour-là, pour lui et pour tout le peuple du pays, un taureau en sacrifice pour le péché. '
  '23':
  - type: note
    content: Cf. 43.25.
  - type: text
    content: 'Pendant les sept jours de la fête, il offrira en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ' sept taureaux et sept béliers sans défaut chaque jour, pendant les sept jours, et un bouc en sacrifice pour le péché, chaque jour. '
  '24':
  - type: note
    content: Cf. 46.5,7,11 ; Nb 15.1-10. –  offrande végétale Lv 2.1n.
  - type: text
    content: Il fera une offrande végétale d'un épha pour chaque taureau et d'un épha pour chaque bélier, avec un hîn d'huile par épha.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'la fête par excellence, celle des Huttes ou des récoltes ; cf. Jg 21.19 ; 1S 1.3 ; 1R 8.2,65 ; Za 14.16 ; Né 8.14 ; 2Ch 5.3 ; 7.8 ; voir aussi Lv 23.33-36,39-43 ; Nb 29.12-39 ; Dt 16.13. –  et la même huile  : autre traduction avec la même quantité d''huile.'
  - type: text
    content: Le quinzième jour du septième mois, à la fête, il offrira pendant sept jours le même sacrifice pour le péché, le même holocauste, la même offrande végétale et la même huile.
  '3':
  - type: note
    content: Litt. sur (ou de) cette mesure tu mesureras une longueur de 25 000 et une largeur de 10 000, et là sera le sanctuaire…
  - type: text
    content: 'Sur cette étendue de 25 000 en longueur et 10 000 en largeur, tu mesureras un emplacement pour le sanctuaire, le Très-Sacré. '
  '4':
  - type: note
    content: Cf. 40.46n  ; 42.13. – Voir prêtre. –  lieu consacré et sanctuaire traduisent un même mot hébreu ; certains modifient le texte hébreu traditionnel pour lire avec un pâturage pour les troupeaux.
  - type: text
    content: 'C''est une portion sacrée prise sur le pays : elle appartient aux prêtres, les officiants du sanctuaire, qui se présentent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' afin d''officier pour lui ; c''est là que seront leurs maisons, et ce sera un lieu consacré pour le sanctuaire.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'lévites  : cf. 44.10-14. –  vingt salles  : LXX des villes pour (y) habiter  ; cf. Nb 35.1-8 ; Jos 21.1-42 ; 1Ch 6.39-66.'
  - type: text
    content: 25 000 coudées en longueur et 10 000 en largeur formeront la propriété des lévites, les officiants de la Maison, avec vingt salles.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la ville  : il s''agit évidemment de la capitale, la Jérusalem reconstruite ; elle a ici son propre territoire, de sorte qu''elle ne dépend plus d''une tribu en particulier ; cf. 48.15-20. –  5 000 coudées ≈ 2,6 km. –  correspondant (ou parallèlement ; le long du  ; même terme v. 7 ; 48.13,18,21) au prélèvement sacré v. 1+.'
  - type: text
    content: Comme propriété de la ville, vous mettrez 5 000 coudées en largeur et 25 000 en longueur, correspondant au prélèvement sacré ; ce sera pour toute la maison d'Israël.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'le prince  : cf. v. 9n  ; 34.24+ ; cf. 48.21s. –  l''ouest  : litt. la mer  ; cf. 41.12n. –  une part  : litt. une des parts.'
  - type: text
    content: 'Pour le prince il y aura des deux côtés du prélèvement sacré et de la propriété de la ville, le long du prélèvement sacré et le long de la propriété de la ville, du côté de l''ouest vers l''ouest et du côté de l''est vers l''est, sur une longueur correspondant à une part, depuis la frontière de l''ouest jusqu''à la frontière de l''est. '
  '8':
  - type: note
    content: 'ils laisseront  : litt. ils donneront  ; cf. v. 9 ; 22.6 ; 34.18 ; 46.18 ; 1R 21 ; Es 5.8 ; Am 5.11s ; Mi 2.2,9. –  selon ses tribus  : autre traduction par ses tribus  ; cf. 47.13,21.'
  - type: text
    content: Ce sera sa terre, sa propriété en Israël ; mes princes n'exploiteront plus mon peuple, mais ils laisseront le pays à la maison d'Israël, selon ses tribus.
  - type: heading
    content: Les droits et les devoirs du prince
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cela suffit 44.6. –  princes  : il s''agit de l''autorité civile en Israël (jusque-là les rois et leurs fonctionnaires, cf. 19.1), dont Ez semble restreindre les prérogatives dans sa vision du retour d''exil (v. 7s ; 43.7s ; 44.3). –  violence / ravage (ou dévastation ) ; cf. Jr 6.7 ; 20.8 ; Am 3.10 ; Ha 1.3. –  équité / justice 18.5+ ; cf. Es 5.7 ; Jr 23.5 ; 33.15. –  cessez…  : litt. enlevez (le verbe correspondant est rendu par faire un prélèvement au v. 1 etc.) de dessus mon peuple vos dépossessions (ou vos exactions ) ; cf. v. 8+ ; Dt 33.21 ; Jr 22.1-5.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Cela suffit, princes d''Israël ! Arrêtez la violence et le ravage, agissez selon l''équité et la justice, cessez de déposséder mon peuple – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
