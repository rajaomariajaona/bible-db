        children:
        - type: text
          text: Cf. 46.2 ; Lv 16.
      marker-yv: yv-n
    - type: text
      text: 'Le prince offrira ce jour-là, pour lui et pour tout le peuple du pays, un taureau en sacrifice pour le péché. '
