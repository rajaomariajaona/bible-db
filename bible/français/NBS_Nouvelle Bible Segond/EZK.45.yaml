      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 43.25.
      marker-yv: yv-n
    - type: text
      text: 'Pendant les sept jours de la fête, il offrira en holocauste au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' sept taureaux et sept béliers sans défaut chaque jour, pendant les sept jours, et un bouc en sacrifice pour le péché, chaque jour. '
