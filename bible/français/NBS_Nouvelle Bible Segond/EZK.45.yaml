document_id: EZK.45,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les territoires réservés
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous répartirez par le sort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'vous ferez tomber '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le sort) ; cf. 47.21-23 ; Nb 26.55 ; 33.54 ; 34.13 ; Jos 13.6ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prélèvement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6s,13,16 ; 20.40+ ; cf. 48.8-12,18-21 ; voir aussi Ex 35.5 ; Jr 31.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '25 000 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(≈ 13,1 km) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''unité de mesure n''est pas spécifiée dans le texte, de même dans la suite ; cf. 40.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; le texte hébreu répète '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en longueur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '10 000 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(≈ 5,2 km) : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 20 000
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. v. 3-5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur toute sa superficie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans tout son territoire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa frontière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', tout autour'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 43.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque vous répartirez par le sort le pays en patrimoines, vous ferez sur le pays un prélèvement sacré pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', long de 25 000 coudées et large de 10 000. Il sera sacré sur toute sa superficie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 19.35-36+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies, de même pour les v. suivants.'
      marker-yv: yv-n
    - type: text
      text: 'Ayez des balances justes, un épha juste et un bath juste. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 14.
      marker-yv: yv-n
    - type: text
      text: 'L''épha et le bath auront la même mesure : le bath contiendra le dixième du homer et l''épha le dixième du homer ; leur mesure sera réglée d''après le homer. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 30.13 ; Lv 27.25 ; Nb 3.47. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sicle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '≈ 9,8 g ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La mine…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. soixante sicles (≈ 570 g) ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que cinq sicles soient bien cinq sicles, dix sicles dix et que cinquante fassent bien une mine.
      marker-yv: yv-n
    - type: text
      text: Le sicle sera de vingt guéras. La mine aura chez vous vingt sicles plus vingt-cinq sicles plus quinze sicles.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le prélèvement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 1+.'
      marker-yv: yv-n
    - type: text
      text: 'Voici le prélèvement que vous ferez : un sixième d''épha sur un homer de froment, et un sixième d''épha sur un homer d''orge. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 11.
      marker-yv: yv-n
    - type: text
      text: 'Prescription pour l''huile, pour un bath d''huile : un dixième de bath sur un kor, soit un homer de dix baths, car dix baths font un homer. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un mouton ou une chèvre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu s''applique aussi bien à un mouton ou à une chèvre (cf. 34.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 12.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans les riches pâturages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du (pays) abreuvé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'irrigué, arrosé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (comme en Gn 13.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des clans (d'Israël)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'du troupeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre mot que ci-dessus). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrande végétale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.13+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faire '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'expiation
        - type: text
          text: ' sur eux'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur les Israélites.
      marker-yv: yv-n
    - type: text
      text: 'Et un mouton ou une chèvre sur un troupeau de deux cents dans les riches pâturages d''Israël. Ce sera pour l''offrande végétale, l''holocauste et le sacrifice de paix, afin de faire l''expiation sur eux – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout le peuple, le pays seront vers ce prélèvement… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 13) ; LXX omet le mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pays.
      marker-yv: yv-n
    - type: text
      text: 'Tout le peuple du pays devra opérer ce prélèvement pour le prince en Israël. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 7.2 ; Hé 5.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: libations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 15.1-16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fêtes… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 23 ; cf. Os 2.13 ; 1Ch 23.31 ; 2Ch 2.3 ; 8.13 ; 31.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nouvelles lunes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 46.1+.
      marker-yv: yv-n
    - type: text
      text: Le prince sera chargé des holocaustes, des offrandes végétales et des libations, aux fêtes, aux nouvelles lunes, aux sabbats, à toutes les rencontres festives de la maison d'Israël ; il offrira le sacrifice pour le péché, l'offrande végétale, l'holocauste et les sacrifices de paix en expiation pour la maison d'Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règles pour diverses fêtes
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 43.18-27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: premier mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ici Abib ou Nisân (mars-avril) ; cf. v. 21 ; Ex 12.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu ôteras le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' du sanctuaire'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lv 16.16.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Le premier jour du premier mois, tu prendras un taureau sans défaut et tu ôteras le péché du sanctuaire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '43.20+ ; cf. Lv 16.14s,18s. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les montants des portes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 41.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ex 12.7,22.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre prendra du sang du sacrifice pour le péché et il en mettra sur les montants des portes de la Maison, sur les quatre angles du socle de l''autel et sur les montants des portes de la cour intérieure. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '500 coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(≈ 260 m) : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; en 42.16-19 il était question de 500 cannes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: espace libre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'abords (de ville) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Nb 35.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; autre expression qu''en 41.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 42.20 ; 43.12.'
      marker-yv: yv-n
    - type: text
      text: 'Il y aura pour le sanctuaire 500 coudées sur 500 en carré, et 50 coudées pour un espace libre tout autour. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '45.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par erreur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 34.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: par inadvertance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par imprudence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par sottise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le même mot désigne les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'naïfs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'simples '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Pr 1.4 ; 8.5 ; 9.4 etc. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiation
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tu feras de même le septième jour du mois, pour l'homme qui a péché par erreur ou par inadvertance ; vous ferez ainsi l'expiation de la Maison.
  '21':
