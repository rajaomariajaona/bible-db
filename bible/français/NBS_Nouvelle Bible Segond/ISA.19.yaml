document_id: ISA.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre l'Egypte
  - type: text
    content: ' '
  - type: note
    content: 'Sentence 13.1n. –  monté (comme sur un cheval ou sur un char) sur un nuage rapide (litt. léger ) : cf. Dt 33.26 ; Na 1.3 ; Ps 18.10 ; 68.5. –  faux dieux v. 3 ; 2.8n. –  fond  : litt. fond en son sein (cf. v. 3n,14n,24n).'
  - type: text
    content: Sentence sur l'Egypte.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est monté sur un nuage rapide,'
  - type: text
    content: il arrive en Egypte.
  - type: text
    content: Les faux dieux de l'Egypte frémissent devant lui,
  - type: text
    content: le cœur de l'Egypte fond.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Les soutiens du pays  : litt. ses soutiens  ; LXX les tisserands. Certains pensent que le verset désigne les fabricants de bière. –  attristés ou découragés.'
  - type: text
    content: Les soutiens du pays seront écrasés,
  - type: text
    content: tous les travailleurs salariés seront attristés.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Tsoân  : la Tanis des Grecs, ville de l''est du delta du Nil (v. 13 ; 30.4 ; Nb 13.22n  ; Ez 30.14 ; Ps 78.12n,43). –  sages conseillers Gn 41.8 ; 1R 5.9s ; Ac 7.22. –  conseil v. 3n. –  fils des rois du temps jadis  : on pourrait aussi comprendre cette formule comme un titre donné au pharaon ; autre traduction fils des rois d''Orient.'
  - type: text
    content: Les princes de Tsoân sont vraiment des imbéciles,
  - type: text
    content: les sages conseillers du pharaon
  - type: text
    content: forment un conseil d'abrutis.
  - type: text
    content: 'Comment osez-vous dire au pharaon :'
  - type: text
    content: Je suis fils des sages, fils des rois du temps jadis !
  '12':
  - type: text
    content: Où sont-ils donc, tes sages ?
  - type: text
    content: Qu'ils te disent tout,
  - type: text
    content: 'et qu''on sache quel est le projet que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: a formé contre l'Egypte !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Noph  : la Memphis des Grecs, ancienne capitale de la Basse-Egypte, à quelques kilomètres au sud du Caire ; cf. Jr 2.16 ; 46.14 ; Ez 30.13,16. –  les chefs  : litt. l''angle (ou les angles , selon des versions anciennes) ; cf. 28.16 ; Jg 20.2n  ; Za 10.4n.'
  - type: text
    content: Les princes de Tsoân sont fous,
  - type: text
    content: les princes de Noph sont dans l'illusion,
  - type: text
    content: les chefs de ses tribus égarent l'Egypte ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'préparé  : litt. mêlé , comme pour la préparation d''une boisson alcoolisée, cf. 5.22n. –  pour elle  : litt. en son sein , cf. v 1n. –  comme un homme ivre  : cf. 28.7 ; Jr 48.26.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a préparé pour elle un souffle de vertige,'
  - type: text
    content: pour égarer l'Egypte dans tous ses actes,
  - type: text
    content: comme un homme ivre s'égare dans son vomissement.
  '15':
  - type: text
    content: ' '
  - type: note
    content: tête / queue… 9.13n.
  - type: text
    content: Et l'Egypte sera hors d'état de faire
  - type: text
    content: ce que font la tête et la queue,
  - type: text
    content: la branche de palmier et le roseau.
  - type: heading
    content: L'avenir de l'Egypte
  '16':
  - type: text
    content: ' '
  - type: note
    content: comme des femmes Na 3.13. –  s'agiter / l'agitera 10.32+.
  - type: text
    content: 'En ce jour-là, l''Egypte sera comme des femmes : elle tremblera, elle sera effrayée en voyant s''agiter la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, quand il l''agitera contre elle. '
  '17':
  - type: note
    content: 'La terre ou le sol, cf. Gn 2.5n. –  l''épouvante  : le terme hébreu correspondant n''apparaît qu''ici. –  chaque fois…  : autre traduction quiconque l''évoquera aura peur. –  projet 5.19n  ; 14.26+.'
  - type: text
    content: 'La terre de Juda sera l''épouvante de l''Egypte : chaque fois qu''on l''évoquera devant elle, elle sera effrayée, à cause du projet que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées a formé contre elle.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'cinq (cf. Gn 41.34n) villes  : il s''agit sans doute de colonies juives comme celle d''Eléphantine, en Haute-Egypte, qui est connue par les nombreux documents retrouvés sur place ; cf. Jr 44.1 ; voir aussi Dt 23.8. –  la langue de Canaan  : en l''occurrence l''hébreu ; cf. Gn 9.18n. –  prêteront serment 45.23. –  Ir-Hérès  : litt. ville de destruction ou ville de démolition (on pourrait traduire ville rasée ). Certains mss hébreux, dont le principal ms de Qumrân, ont une légère variante qui permet de lire ville du Soleil (cf. Jr 43.13n, autre mot hébreu), équivalent du grec Héliopolis. Au lieu de Hérès , LXX transcrit le mot hébreu signifiant justice (cf. Es 1.26).'
  - type: text
    content: 'En ce jour-là, il y aura cinq villes en Egypte qui parleront la langue de Canaan et qui prêteront serment par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : l''une d''elles sera appelée Ir-Hérès. '
  '19':
  - type: note
    content: 'autel  : cf. Dt 12.1-14. –  une pierre levée  : cf. Gn 28.18 ; 35.14 ; Dt 16.22 ; 2R 3.2 ; Os 3.4. Le terme hébreu est très proche de celui qui est rendu par souche en 6.13.'
  - type: text
    content: 'En ce jour-là, il y aura un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' au milieu de l''Egypte, et une pierre levée pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' près de la frontière. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'J''armerai  : cf. 9.10n. –  royaume contre royaume Mt 24.7/ / ; description des luttes intestines qui, entre 716 et 712 av. J.-C. environ (c.-à-d. au début du règne d''Ezéchias), ont ouvert la voie à la domination koushite sur l''Egypte (cf. v. 3 ; 18.1n).'
  - type: text
    content: 'J''armerai l''Egypte contre l''Egypte :'
  - type: text
    content: chacun se battra contre son frère et contre son ami,
  - type: text
    content: ville contre ville, royaume contre royaume.
  '20':
  - type: note
    content: 'signe 7.11n  ; 8.18. –  quand ils crieront…  : cf. Ex 2.23 ; Jg 2.16-18. –  prendra leur parti  : le verbe signifie défendre une cause, faire un procès, contester (cf. Mi 6.2 ; Ps 35.1) ; certains modifient le texte hébreu traditionnel pour lire et un défenseur.'
  - type: text
    content: 'Ce sera pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées un signe et un témoignage en Egypte : quand ils crieront vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) à cause des oppresseurs, il leur enverra un sauveur et prendra leur parti pour les délivrer. '
  '21':
  - type: note
    content: 'sera connu  : autre traduction se fera connaître. –  des Egyptiens  : autre traduction de l''Egypte, cf. v. 1s,14,22s. –  connaîtront  : cf. 11.9+ ; Ez 6.14+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) sera connu des Egyptiens ; les Egyptiens connaîtront le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) en ce jour-là. Ils le serviront par des sacrifices et des offrandes, ils feront des vœux au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et s''en acquitteront. '
  '22':
  - type: note
    content: 'frappera / guérira  : cf. 1.6 ; 30.26 ; Dt 32.39+ ; le verbe correspondant à frapper peut évoquer un fléau (Ex 7.27n) ou une défaite militaire (Lv 26.17n). –  reviendront  : cf. 1.27n  ; 18.7 ; voir aussi Ez 29.13-16. –  se laissera fléchir Gn 25.21n.'
  - type: text
    content: 'Ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) frappera les Egyptiens : il frappera, mais il guérira ; ils reviendront au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui se laissera fléchir et les guérira.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'les Egyptiens serviront (sous-entendu probable  : serviront le Seigneur ) avec les Assyriens  : LXX a compris  : Les Egyptiens serviront les Assyriens (c.-à-d. seront soumis aux Assyriens ), ce qui est une autre traduction possible du même texte hébreu (cf. Ex 3.12n).'
  - type: text
    content: 'En ce jour-là, il y aura une route d''Egypte en Assyrie : les Assyriens iront en Egypte, et les Egyptiens en Assyrie, et les Egyptiens serviront avec les Assyriens. '
  '24':
  - type: note
    content: 'bénédiction  : cf. Gn 12.2s ; Za 8.13. –  sur la terre  : litt. au sein de la terre (ou dans le pays, même expression en 7.22 ; 24.13).'
  - type: text
    content: 'En ce jour-là, Israël sera un troisième, avec l''Egypte et l''Assyrie, à être une bénédiction sur la terre, '
  '25':
  - type: note
    content: peuple / patrimoine Dt 9.26,29 ; 32.9 ; Ps 28.9. – Cf. Ps 87.
  - type: text
    content: 'que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées bénira, en disant : Bénis soient l''Egypte, mon peuple, l''Assyrie, œuvre de mes mains, et Israël, mon patrimoine !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'esprit  : le mot hébreu correspondant peut être traduit par souffle (cf. Ha 1.11n) ; certains le comprennent ici au sens de courage, d''intelligence. –  disparaîtra  : litt. sera vidé de son sein (cf. v. 1n), même verbe en 24.1,3 ; cf. Jr 19.7n. –  j''engloutirai  : autres traductions je rendrai confus, j''embrouillerai (cf. 3.12n). –  ses projets  : autre traduction possible son conseil  ; cf. v. 11,17 ; 5.19n  ; 11.2. –  faux dieux v. 1. –  esprits des morts  : autre traduction augures. –  spirites / médiums 8.19 ; cf. Gn 41.8 ; Ex 7.11,22 ; 8.3,14 ; Lv 19.31 ; 1S 28.3.'
  - type: text
    content: L'esprit de l'Egypte disparaîtra,
  - type: text
    content: et j'engloutirai ses projets ;
  - type: text
    content: on consultera les faux dieux et les esprits des morts,
  - type: text
    content: les spirites et les médiums.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 29.18-19+. –  livrerai Gn 9.2n. –  du Seigneur…  : cf. 1.24n.'
  - type: text
    content: Je livrerai l'Egypte à des maîtres durs,
  - type: text
    content: un roi cruel dominera sur eux
  - type: text
    content: '– déclaration du Seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 30.12.
  - type: text
    content: Les eaux de la mer tariront,
  - type: text
    content: le fleuve deviendra sec et aride ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: les bras du Nil, en Egypte 7.18n  ; le mot hébreu pour Egypte se présente ici sous une forme inhabituelle qui évoque peut-être l'idée d'oppression ; de même en 37.25. –  roseaux / joncs… Ex 10.19 ; Jb 8.11.
  - type: text
    content: les fleuves seront infects,
  - type: text
    content: les bras du Nil, en Egypte, se réduiront et s'assécheront,
  - type: text
    content: 'les roseaux et les joncs se flétriront :'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ce sera le dénuement  : autre traduction les herbes.'
  - type: text
    content: ce sera le dénuement le long du Nil, à l'embouchure du Nil !
  - type: text
    content: Tout ce qui aura été semé près du Nil se desséchera,
  - type: text
    content: sera emporté par le vent et disparaîtra.
  '8':
  - type: text
    content: Les pêcheurs gémiront,
  - type: text
    content: tous ceux qui jettent l'hameçon dans le Nil seront en deuil ;
  - type: text
    content: ceux qui lancent des filets sur les eaux dépériront.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Traduction incertaine, de même au v. 10. Pour la fin la traduction suit un ms de Qumrân  ; autre texte hébreu traditionnel ceux qui travaillent le lin peigné auront honte, les tisseurs d'étoffes blanches.
  - type: text
    content: Ceux qui travaillent le lin auront honte,
  - type: text
    content: peigneuses et tisserands pâliront.
