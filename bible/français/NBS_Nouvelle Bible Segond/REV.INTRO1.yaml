document_id: REV.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Tel le bouquet d''un feu d''artifice, l''Apocalypse laisse parfois le lecteur pantois. A maintes reprises, l''oreille est déchirée par le son des trompettes (8.7,8,10,12 ; 9.1,13 ; 11.15) ou par de fortes voix (14.7 ; 16.1) ; ou bien elle est bercée par le chant nouveau des '
    - type: usfm
      marker: it
      children:
      - type: text
        text: cent quarante-quatre mille
    - type: text
      text: ' (14.3). L''œil est frappé par des couleurs inattendues : un cheval '
    - type: usfm
      marker: it
      children:
      - type: text
        text: rouge feu
    - type: text
      text: ' (6.4), un cheval '
    - type: usfm
      marker: it
      children:
      - type: text
        text: verdâtre
    - type: text
      text: ' (6.8). L''esprit est subjugué par des descriptions extraordinaires, telle la nouvelle Jérusalem qui descend du ciel (21.10).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Pour le lecteur non averti, le mot '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: révélation
    - type: text
      text: ' qui ouvre ce livre (1.1) ne laissait pas présager pareil déferlement ! Le terme grec qu''il traduit ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: apocalupsis
    - type: text
      text: ' = Apocalypse, le titre même du livre) vient d''un verbe qui signifie littéralement « lever le voile ». Rarement mot d''introduction aura été plus paradoxal, car nous nous trouvons en fait devant un texte déroutant, difficile à comprendre et pour tout dire codé ; il est vrai qu''en grec ce terme d''apocalypse désigne souvent des ouvrages au langage chiffré. Très forte est dès lors la tentation, soit de passer son chemin, soit de forcer l''entrée sans chercher les combinaisons d''accès qui ont servi à la rédaction du texte. Tel a été au cours de l''histoire le sort de l''Apocalypse : tantôt elle a été l''objet d''interprétations fantaisistes, tantôt on l''a reléguée au rayon des accessoires inutiles, une fraction de la chrétienté orientale la rejetant même hors du canon du Nouveau Testament jusqu''à la fin du IV'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' siècle. Pourtant, bien des artistes – peintres, sculpteurs, maîtres tapissiers, musiciens – ont puisé à cette source les thèmes de leur inspiration.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Apocalypse et Ancien Testament
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Une bonne connaissance de l'Ancien Testament donne déjà des points de repère. De manière plus ou moins directe, l'Apocalypse y recourt constamment. Ainsi, entre autres, les thèmes du livre de l'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Exode
    - type: text
      text: ' y sont largement exploités : révélation du nom divin (comparer Ex 3.14 et Ap 1.4 ; 4.8 ; 16.5) ; plaies d''Egypte (comparer Ex 7–10 et Ap 9 et 16) ; passage de la mer (comparer Ex 14–15 et Ap 15.2s) ; coffre ou arche de l''alliance (comparer Ex 25 et Ap 11.19).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les emprunts aux '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: livres prophétiques
    - type: text
      text: ' ne sont pas moins significatifs, d''autant que l''Apocalypse met Jean au nombre des prophètes (1.3 ; 10.11 ; 22.9). C''est une relecture prophétique des prophètes ! Rien d''étonnant, dès lors, que telle ou telle métaphore se retrouve ici : l''ange qui rugit comme un lion (10.3) fait penser à Amos 3.7s ; le ciel qui se roule comme un livre (6.14) vient tout droit d''Esaïe 34.4 ; le geste accompagnant la destruction de Babylone la grande (18.21) rappelle celui de Jérémie sur l''antique Babylone (Jr 51.63s) ; la description des sauterelles (chap. 9) reprend des traits de Joël 2.4-11.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Apocalypse et littérature apocalyptique
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Si l''auteur de l''Apocalypse tire thèmes et images de l''Ancien Testament dans son ensemble, il s''inscrit nettement dans la voie originale balisée par Ezéchiel, Zacharie et surtout Daniel. Ainsi, pour dire les persécutions contre l''Eglise, il fait appel aux visions de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Daniel
    - type: text
      text: ' décrivant les agissements des quatre bêtes (comparer Dn 7 et Ap 13.1-8) ; ainsi la venue du Fils de l''homme en Apocalypse 14.14 fait écho à Daniel 7.13 ; ainsi la description du jugement dernier (Ap 20) calque la scène de l''Ancien des jours (Dn 7.22). A '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Ezéchiel,
    - type: text
      text: ' l''Apocalypse emprunte entre autres la vision du rouleau mangé (comparer Ap 5.1 ; 10.8ss et Ez 2.9–3.3), l''élégie sur la chute de Babylone rappelant celle de Tyr (comparer Ap 18 et Ez 27), l''assaut de Gog et Magog (comparer Ap 20.7-10 et Ez 38) et la mesure de la ville sainte (comparer Ap 21–22 et Ez 40–47). De '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Zacharie,
    - type: text
      text: ' enfin, proviennent entre autres la vision des chevaux (comparer Ap 6.1-8 et Za 1.8 ; 6.1-8) et l''allusion aux deux oliviers (comparer Ap 11.4 et Za 4).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tant de similitudes ne sont pas fortuites. Les livres d'Ezéchiel, de Zacharie et de Daniel esquissent en effet ce grand courant littéraire qu'on nommera l’
    - type: usfm
      marker: bd
      children:
      - type: text
        text: apocalyptique
    - type: text
      text: . Depuis l'exil des Israélites à Babylone (VI
    - type: usfm
      marker: ord
      children:
      - type: text
        text: e
    - type: text
      text: ' s. av. J.-C.) jusqu''au premier siècle apr. J.-C., ce mouvement connut un essor considérable. Ce sont des circonstances dramatiques qui l''ont fait naître, au point qu''on peut dire qu''il s''agit d''une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: littérature de crise.
    - type: text
      text: ' Le retour de l''exil n''avait apporté que de cruelles désillusions. Apparemment, il n''y avait plus grand-chose à attendre de l''histoire. Seul un grand bouleversement divin, l''irruption d''un monde totalement nouveau, rétablirait le peuple dans son droit. Du coup, toutes les puissances hostiles qui allaient se succéder sont décrites comme des types de l''ennemi suprême qui sera définitivement détruit. Ainsi l''empire persécuteur en Daniel 7, qu''on retrouve aussi dans l''Apocalypse (chap. 13 ; 17 ; 18).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Or notre Apocalypse porte aussi les traces d'une telle crise. La communauté chrétienne de la fin du premier siècle a été en butte à des persécutions, certes sporadiques, mais parfois cruelles, pour autant qu'elle se refusait à adorer l'empereur et, peut-être, à assumer des fonctions civiles ou militaires. L'Empire lui avait déjà fait endosser, quelques années auparavant, la responsabilité de ses malheurs (ainsi, en l'an 64, Néron aurait accusé faussement les chrétiens d'avoir mis le feu à Rome). Des tensions apparaissent fatalement entre les chrétiens qui, dans le feu de l'épreuve, sont portés à l'intransigeance (ainsi l'auteur de l'Apocalypse), et ceux qui, peut-être relativement épargnés, tendent à accepter des compromis qu'ils jugent raisonnables (par exemple l'Eglise de Laodicée, stigmatisée comme « tiède »).
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En pareilles circonstances, comment décrire l''opposition radicale entre le monde et le peuple de Dieu, qui tient tant à cœur à l''auteur ? Comment dire son espérance sans pouvoir lui donner un calendrier précis ? Le langage se charge de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: symboles
    - type: text
      text: ' et de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: métaphores.
    - type: text
      text: ' Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: nombres
    - type: text
      text: ' ne sont plus arithmétiques : ils expriment l''universalité terrestre (quatre), la plénitude (sept), le peuple de Dieu (douze) et peuvent se combiner en des multiples riches de signification ; par exemple, le carré de 12 multiplié par 1000 désigne certainement non pas une quantité précise –144 000 personnes – mais le rassemblement total des élus (7.4-8 ; 14.4). Les '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: couleurs
    - type: text
      text: ' aussi sont message : le blanc évoque pureté et victoire, le rouge meurtre et violence, le noir impiété et mort. Le symbolisme luxuriant de l''Apocalypse ne veut pas tant cacher quelque chose à l''ennemi qu''exprimer, dans le temps même de la douleur et du combat, une espérance inouïe. Le langage ordinaire y suffirait-il, d''ailleurs, quand le prophète est '
    - type: usfm
      marker: it
      children:
      - type: text
        text: saisi par l'Esprit
    - type: text
      text: ' (1.10 ; cf. 17.3 ; 21.10) ?'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Des procédés littéraires qui aident à la compréhension
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: plan
    - type: text
      text: ' de l''Apocalypse ne se découvre pas aisément. A la première lecture, on croit remarquer des doublets, des ruptures, des passages hors contexte, au point que certains ont imaginé un bouleversement accidentel du texte.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Un examen approfondi laisse pourtant apparaître plusieurs indices littéraires de structuration.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Tout d'abord une
    - type: usfm
      marker: bd
      children:
      - type: text
        text: structure binaire,
    - type: text
      text: ' fondamentale. En effet, bien des passages de l''Apocalypse présentent de manière fort contrastée des personnes, des groupes ou des événements. S''exprime ainsi un des principes essentiels du livre : il existe une opposition radicale et insurmontable entre le bien et le mal : entre Dieu et le Satan, agneau et dragon, vraie et fausse adoration, Jérusalem et Babylone, sceau de Dieu et marque de la bête, épouse et prostituée, anges de Dieu et esprits impurs…'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'A côté de cette structure binaire, on prêtera également attention aux '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: ensembles de sept.
    - type: text
      text: ' D''abord ceux qui donnent au livre son organisation formelle : les sept lettres (2.1–3.22), les sept sceaux (5.1–8.1), les sept trompettes (8.2–11.19) et les sept coupes (15.1–16.21). Mais aussi les sept esprits (1.4), les sept chandeliers (1.12), les sept étoiles (1.16), les sept lampes ardentes (10.4), les sept cornes et les sept yeux (5.6), sans oublier les sept tonnerres (10.4), les sept têtes couronnées (12.3 ; 13.1 ; 17.3,9s) et les sept montagnes qui sont sept rois (17.3,9).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'On a aussi discerné des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: ensembles de trois.
    - type: text
      text: ' Ainsi l''apparition successive du dragon céleste, du monstre marin et du monstre terrestre (12.1–13.18). La réaction à ce triple assaut satanique contre Dieu et contre son Eglise se trouve dans le triple message adressé par les anges aux habitants de la terre qui ont été égarés par le Satan (14.6-11). Le jugement dernier est aussi décrit en trois phases successives : la bête de l''abîme, le prophète de mensonge et le dragon sont jetés dans l''étang de feu (19.20 ; 20.10).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une révélation de Jésus-Christ
  - type: usfm
    marker: ip
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: Révélation de Jésus-Christ
    - type: text
      text: ' (1.1) : ces mots sont bien la clef de voûte de tout l''édifice. L''Apocalypse n''est pas un ensemble ésotérique de prédictions annonçant la suite des événements historiques. Le dernier livre de la Bible est avant tout'
    - type: usfm
      marker: bd
      children:
      - type: text
        text: la révélation d'une personne
    - type: text
      text: '. Et parce que cette personne est le Fils même de Dieu, symboles, visions et images surabondent pour tenter de faire comprendre l''ineffable. Pour ne pas avoir tenu compte de cette vérité initiale, bien des commentateurs se sont fourvoyés, transformant ce livre en un scénario des catastrophes à venir. En réalité, quand l''Apocalypse annonce la fin du monde et la délivrance, elle les relie à l''événement passé qui est la mort et la résurrection du Christ. C''est l''agneau immolé qui siège sur le trône (5.6). Le chrétien doit reconnaître en lui celui qui a vaincu les puissances mauvaises. Il ne s''agit pas tant de deviner ce que sera le terme de l''histoire que d''entendre et de recevoir dans le présent une exhortation qui donne sens et espérance en l''avenir : le Christ est vainqueur des puissances de mort (19.11-21). Ceux qui endurent la persécution doivent savoir que le mal est déjà vaincu. Au milieu des difficultés, ils doivent avoir la conviction qu''ils sont glorifiés avec le Christ (12.10-12 ; 20.4-10).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'En dépit des épreuves, la victoire est donc acquise. Mais face à l''assaut des puissances adverses, le Christ demande aux siens une '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: endurance
    - type: text
      text: ' extrême. Toute l''Apocalypse, surtout dans les premiers chapitres, contient de nombreuses paroles d''exhortation (2.10), des avertissements contre les hérésies et l''immoralité (2.6), des appels à la persévérance et à la conversion (3.19-20).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Enfin, la victoire doit être célébrée. L''Apocalypse abonde en références à la liturgie, aux usages cultuels de l''Eglise ancienne. Ainsi le verbe traduit par '
    - type: usfm
      marker: it
      children:
      - type: text
        text: se prosterner
    - type: text
      text: ' ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: adorer
    - type: text
      text: ' s''y trouve 24 fois (pour 60 fois dans tout le Nouveau Testament), à côté de termes comme '
    - type: usfm
      marker: it
      children:
      - type: text
        text: gloire, honneur, louange, action de grâces
    - type: text
      text: ' et de verbes comme '
    - type: usfm
      marker: it
      children:
      - type: text
        text: louer
    - type: text
      text: ' ou '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chanter
    - type: text
      text: . Le temps n'est plus au désespoir ni à la tristesse, mais à la gloire rendue à celui qui a triomphé et qui vient.
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les royaumes, les puissances et les pouvoirs temporels de toutes sortes se succèdent. Avec eux, un flot inévitable de souffrances, d''injustices et d''oppressions. L''histoire contemporaine engendrerait facilement le pessimisme sur notre monde. L''Apocalypse, elle, se montre résolument optimiste quant à l''avenir. Envers et contre tout, elle donne aux élus de Dieu cette certitude que personne ne devrait leur enlever : ils sont du côté du vainqueur. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Il aura sa demeure avec eux, ils seront ses peuples… Il essuiera toute larme de leurs yeux, la mort ne sera plus, et il n'y aura plus ni deuil, ni cri, ni douleur, car les premières choses ont disparu
    - type: text
      text: ' (21.3s). A elle seule, cette promesse résume l''Apocalypse : par la foi, le futur s''arc-boute sur une promesse déjà accomplie.'
