        - type: text
          text: quel malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 13.17+.'
      marker-yv: yv-n
    - type: text
      text: Le Fils de l'homme s'en va, selon ce qui est écrit de lui. Mais quel malheur pour cet homme par qui le Fils de l'homme est livré ! Mieux vaudrait pour cet homme ne pas être né.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La Cène
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
