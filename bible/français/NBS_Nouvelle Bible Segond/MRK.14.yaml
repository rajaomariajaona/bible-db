        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Fils
        - type: text
          text: ' de l''homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
