  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui mange avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 41.10 ; Jn 13.18.'
      marker-yv: yv-n
    - type: text
      text: 'Pendant qu''ils étaient à table et qu''ils mangeaient, Jésus dit : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen,
    - type: text
      text: ' je vous le dis, l''un de vous, qui mange avec moi, me livrera. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Attristés…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils commencèrent à être tristes et à lui dire…
      marker-yv: yv-n
    - type: text
      text: 'Attristés, ils se mirent à lui dire l''un après l''autre : Est-ce moi ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Car ils disaient : Pas en pleine fête, de peur qu''il n''y ait de l''agitation parmi le peuple.'
  - type: usfm
