document_id: MRK.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le complot contre Jésus
  - type: heading
    content: Mt 26.1-5  ; Lc 22.1-2
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jn 11.47-53. –  Pâque / Pains sans levain  : voir calendrier et fêtes ; Ex 12.1-20 ; Lv 23.5s ; Dt 16.1-8. –  grands prêtres (v. 43+ ; 11.18n  ; Mt 2.4n) / scribes  : cf. 8.31n.'
  - type: text
    content: 'La Pâque et les Pains sans levain devaient avoir lieu deux jours après. Les grands prêtres et les scribes cherchaient comment le faire arrêter par ruse et le tuer. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Judas Iscarioth 3.19+. –  grands prêtres  : cf. 11.18n  ; Mt 2.4n.'
  - type: text
    content: 'Judas Iscarioth, l''un des Douze, alla trouver les grands prêtres afin de le leur livrer. '
  '11':
  - type: note
    content: 'une occasion  : cf. 6.21n.'
  - type: text
    content: Quand ils l'entendirent, ils se réjouirent et promirent de lui donner de l'argent. Il cherchait une occasion pour le livrer.
  - type: heading
    content: Jésus prend le repas de la Pâque avec ses disciples
  - type: heading
    content: Mt 26.17-19  ; Lc 22.7-13
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'où l''on sacrifiait la Pâque (c.-à-d. l''agneau de la Pâque) : le verbe employé peut également signifier abattre , dans un sens « profane » (voir ses différents emplois en Mt 22.4 ; Lc 15.23ss ; Jn 10.10 ; Ac 10.13 ; 14.13,18 ; 1Co 5.7 ; 10.20). Cf. Ex 12.11n,14-21 ; Dt 16.2,6 ; Esd 6.20. –  Pâque  : 14.1+ ; voir calendrier et fêtes.'
  - type: text
    content: 'Le premier jour des Pains sans levain, le jour où l''on sacrifiait la Pâque, ses disciples lui disent : Où veux-tu que nous allions te préparer le repas de la Pâque ? '
  '13':
  - type: note
    content: 'Cf. 11.2ss ; 1S 10.2-7 ; Mt 17.27 ; comparer avec Mt 26.18. –  un homme  : autre traduction quelqu''un (ce sont habituellement les femmes qui portent l''eau, cf. Gn 24.11 ; Jn 4.7).'
  - type: text
    content: 'Il envoie deux de ses disciples et leur dit : Allez à la ville ; un homme portant une cruche d''eau viendra à votre rencontre ; suivez-le, '
  '14':
  - type: note
    content: 'maître  : au sens d’enseignant. –  la salle  : litt. ma salle.'
  - type: text
    content: 'et là où il entrera, dites au maître de maison : Le maître dit : Où est la salle où je mangerai la Pâque avec mes disciples ? '
  '15':
  - type: note
    content: 'aménagée  : litt. jonchée (de tapis ou de coussins où l''on s''étendait, selon l''usage, pour prendre le repas) ; même terme Ez 23.41 (LXX).'
  - type: text
    content: 'Il vous montrera une grande chambre à l''étage, aménagée et toute prête : c''est là que vous ferez pour nous les préparatifs. '
  '16':
  - type: note
    content: 'partirent  : litt. sortirent.'
  - type: text
    content: Les disciples partirent, arrivèrent à la ville, trouvèrent les choses comme il leur avait dit et préparèrent la Pâque.
  - type: heading
    content: Mt 26.20-25  ; Lc 22.21-23  ; Jn 13.21-26
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jn 13.21-30.
  - type: text
    content: 'Le soir venu, il arrive avec les Douze. '
  '18':
  - type: note
    content: 'qui mange avec moi  : cf. Ps 41.10 ; Jn 13.18.'
  - type: text
    content: 'Pendant qu''ils étaient à table et qu''ils mangeaient, Jésus dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, l''un de vous, qui mange avec moi, me livrera. '
  '19':
  - type: note
    content: 'Attristés…  : litt. ils commencèrent à être tristes et à lui dire…'
  - type: text
    content: 'Attristés, ils se mirent à lui dire l''un après l''autre : Est-ce moi ? '
  '2':
  - type: text
    content: 'Car ils disaient : Pas en pleine fête, de peur qu''il n''y ait de l''agitation parmi le peuple.'
  - type: heading
    content: L'onction à Béthanie
  - type: heading
    content: Mt 26.6-13  ; cf. Lc 7.36-50  ; Jn 12.1-8
  '20':
  - type: note
    content: 'dans le plat  : certains mss portent dans le même plat.'
  - type: text
    content: 'Il leur répondit : C''est l''un des Douze, celui qui met avec moi la main dans le plat. '
  '21':
  - type: note
    content: 'Cf. Mt 26.24+. –  Fils de l''homme 8.20n. –  quel malheur  : cf. 13.17+.'
  - type: text
    content: Le Fils de l'homme s'en va, selon ce qui est écrit de lui. Mais quel malheur pour cet homme par qui le Fils de l'homme est livré ! Mieux vaudrait pour cet homme ne pas être né.
  - type: heading
    content: La Cène
  - type: heading
    content: Mt 26.26-29  ; Lc 22.15-20  ; cf. 1Co 11.23-26
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.41n/ / ; 8.7 ; Lc 24.30. –  du pain ou un pain  ; cf. Dt 16.3. Règle de la Communauté (Qumrân) 6.4s : « Quand ils disposeront la table pour manger et prépareront le vin pour boire, le prêtre étendra en premier sa main pour qu''on prononce la bénédiction sur les prémices du pain et du vin. » Règle annexe de la Communauté 2.17ss : « Et quand ils se réuniront pour la table de la communauté et pour boire le vin, et qu''ils disposeront la table de la communauté et mêleront le vin pour boire, que personne n''étende sa main sur les prémices du pain et du vin avant le Prêtre ; car c''est lui qui bénira les prémices du pain et du vin et qui étendra sa main sur le pain en premier. Et ensuite le Messie d''Israël étendra ses mains sur le pain. Et ensuite toute la Congrégation de la Communauté bénira, chacun selon sa dignité. Et c''est selon ce rite qu''ils procéderont en tout repas quand ils seront réunis au moins à dix personnes. » – Voir aussi bénédiction.'
  - type: text
    content: 'Pendant qu''ils mangeaient, il prit du pain ; après avoir prononcé la bénédiction, il le rompit et le leur donna en disant : Prenez ; c''est mon corps. '
  '23':
  - type: note
    content: 'Cf. 8.6+ ; 1Co 10.16. –  avoir rendu grâce  : cf. Mt 26.27n.'
  - type: text
    content: 'Il prit ensuite une coupe ; après avoir rendu grâce, il la leur donna, et ils en burent tous. '
  '24':
  - type: note
    content: 'sang de l''alliance  : certains mss ajoutent nouvelle  ; cf. Ex 24.8 ; Za 9.11 ; Hé 9.20 ; voir aussi Jr 31.31ss. –  répandu  : cf. Gn 9.6 ; Es 59.7 ; Ez 18.10. –  pour une multitude ou pour beaucoup, cf. 10.45 ; Es 53.11s. Sur le sens de la construction correspondant à pour, cf. Jn 11.50 ; Rm 5.6 ; 8.32 ; 1Co 15.3,29 ; 2Co 5.14 ; 1P 2.21 ; voir aussi 2 Maccabées 8.21, « mourir pour les lois et pour la patrie. » 4 Maccabées 1.10, « ces hommes qui sont morts pour le bien. » Siracide 29.15 : « N''oublie pas les bienfaits de ton garant : aussi bien il s''est exposé en personne pour toi. »'
  - type: text
    content: 'Il leur dit alors : C''est mon sang, le sang de l''alliance, qui est répandu pour une multitude. '
  '25':
  - type: note
    content: 'Cf. Es 25.6. –  je ne boirai plus  : autre traduction je ne boirai plus jamais.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, je ne boirai plus du produit de la vigne jusqu''au jour où je le boirai, nouveau, dans le royaume de Dieu.'
  - type: heading
    content: Jésus annonce que Pierre le reniera
  - type: heading
    content: Mt 26.30-35  ; Lc 22.31-34  ; Jn 13.36-38
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Après avoir chanté , probablement des Psaumes, voir Mt 26.30n. –  le mont des Oliviers  : cf. 11.1n  ; Lc 22.39 ; Jn 18.1.'
  - type: text
    content: 'Après avoir chanté, ils sortirent vers le mont des Oliviers. '
  '27':
  - type: note
    content: 'Il y aura…  : autre traduction vous trébucherez tous, de même v. 29 ; cf. v. 50 ; 4.17+. –  il est écrit Za 13.7  ; cf. Mc 6.34+.'
  - type: text
    content: 'Jésus leur dit : Il y aura pour vous tous une cause de chute, car il est écrit :'
  - type: text
    content: Je frapperai le berger,
  - type: text
    content: et les moutons seront dispersés.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'après mon réveil ou après m''être relevé ; après ma résurrection  : voir Mt 26.32n. –  je vous précéderai (autre traduction je vous conduirai ) en Galilée 16.7/ / ; cf. 1.14 ; Mt 28.7,10,16 ; Jn 21.'
  - type: text
    content: 'Mais après mon réveil, je vous précéderai en Galilée. '
  '29':
  - type: text
    content: 'Pierre lui dit : Quand cela serait pour tous une cause de chute, cela ne le serait pas pour moi. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Béthanie 11.1n  ; cf. Jn 12.1. –  Simon le lépreux (cf. 1.40ss ; 2.14s ; 7.14ss) : comparer avec Lc 7.39s. –  flacon d''albâtre ou alabastre (voir illustration). –  nard pur Ct 1.12n  ; Jn 12.3n. –  sur la tête de Jésus  : litt. sur sa tête.'
  - type: text
    content: 'Comme il était à Béthanie, chez Simon le lépreux, une femme entra pendant qu''il était à table. Elle tenait un flacon d''albâtre plein d''un parfum de nard pur, de grand prix ; elle brisa le flacon et répandit le parfum sur la tête de Jésus. '
  '30':
  - type: note
    content: 'V. 68,72 ; Jn 13.38. –  deux fois  : la même précision figure dans un fragment de papyrus du IIIe s. découvert dans le Fayoum, en Egypte, qui contient un récit comparable aux v. 26-30, dans des termes légèrement différents cependant.'
  - type: text
    content: 'Jésus lui répond : '
  - type: text
    content: Amen,
  - type: text
    content: ' je te le dis, aujourd''hui, cette nuit même, avant qu''un coq ait chanté deux fois, toi, tu m''auras renié par trois fois. '
  '31':
  - type: note
    content: Cf. Jn 11.16.
  - type: text
    content: 'Mais lui n''en protestait que davantage : Quand il me faudrait mourir avec toi, je ne te renierais pas ! Et tous en disaient autant.'
  - type: heading
    content: La prière de Jésus à Gethsémani
  - type: heading
    content: Mt 26.36-46  ; Lc 22.39-46
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Gethsémani  : cf. v. 26+ ; Mt 26.36n. –  pendant que je prierai Hé 5.7.'
  - type: text
    content: 'Ils arrivent au lieu nommé Gethsémani, et il dit à ses disciples : Asseyez-vous ici pendant que je prierai. '
  '33':
  - type: note
    content: Pierre, Jacques et Jean 5.37+. –  effroi 9.15n.
  - type: text
    content: 'Il prend avec lui Pierre, Jacques et Jean. Il commença alors à éprouver l''effroi et l''angoisse. '
  '34':
  - type: note
    content: 'Je suis (autre traduction mon âme est, 8.35n) triste…  : cf. Ps 42.6n  ; Jn 12.27. –  à mourir  : litt. jusqu''à (la) mort, cf. Jon 4.9 (même expression dans LXX  ; c''est un verbe grec apparenté au terme traduit ici par triste qui évoque la colère dans ce passage de Jonas).'
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: Je suis triste
  - type: text
    content: ' à mourir ; demeurez ici et veillez. '
  '35':
  - type: note
    content: 'cette heure  : cf. Jn 2.4+ ; 12.27.'
  - type: text
    content: 'S''étant avancé un peu, il tombait à terre et priait pour que, s''il était possible, cette heure s''éloigne de lui. '
  '36':
  - type: note
    content: 'Abba, Père  : voir Rm 8.15n  ; Ga 4.6. –  tout est possible pour toi 10.27+. –  cette coupe 10.38+. –  ce que, toi, tu veux  : cf. Mt 6.10 ; Jn 5.30 ; 6.38.'
  - type: text
    content: 'Il disait : '
  - type: text
    content: Abba,
  - type: text
    content: ' Père, tout est possible pour toi ; éloigne de moi cette coupe. Toutefois, non pas ce que, moi, je veux, mais ce que, toi, tu veux. '
  '37':
  - type: note
    content: 'Pierre / Simon  : cf. 3.16.'
  - type: text
    content: 'Il vient et les trouve endormis ; il dit alors à Pierre : Simon, tu dors ! Tu n''as pas été capable de veiller une heure ! '
  '38':
  - type: note
    content: 'entrer dans l''épreuve ou en tentation  ; cf. Mt 6.13n. –  esprit / chair  : cf. Ps 51.7-14.'
  - type: text
    content: 'Veillez et priez, afin de ne pas entrer dans l''épreuve ; l''esprit est ardent, mais la chair est faible. '
  '39':
  - type: text
    content: 'Il s''éloigna encore et pria en répétant les mêmes paroles. '
  '4':
  - type: note
    content: 's''indignaient  : on peut comprendre s''indignaient entre eux ou s''indignaient en leur for intérieur (cf. Lc 7.39) ; ou encore s''indignaient les uns contre les autres  ; même verbe Mc 10.14,41 ; Mt 20.24 ; 21.15 ; 26.8 ; Lc 13.14. –  gaspiller  : le terme grec évoque habituellement une perte, une mort ou une disparition.'
  - type: text
    content: 'Quelques-uns s''indignaient : A quoi bon gaspiller ce parfum ? '
  '40':
  - type: note
    content: Ils ne savaient que lui répondre 9.6n.
  - type: text
    content: 'Puis il revint et les trouva endormis, car ils avaient les yeux lourds. Ils ne savaient que lui répondre. '
  '41':
  - type: note
    content: 'Vous dormez encore, vous vous reposez ! Autre traduction continuez à dormir et à vous reposer ! –  C''en est fait  : traduction incertaine ; on a aussi compris cela suffit (c.-à-d. vous avez assez dormi), ou encore ce n''est plus possible  ; le terme grec correspondant est employé dans des reçus pour signaler qu''une transaction est réglée (cf. « pour solde de tout compte ») ; certains y voient une allusion à la trahison de Judas (v. 42) ; certains mss portent c''est la fin. –  Fils de l''homme 2.10+ ; Mt 8.20n. –  aux pécheurs  : litt. aux mains des pécheurs  ; cf. Ga 2.15.'
  - type: text
    content: 'Il vient pour la troisième fois et leur dit : Vous dormez encore, vous vous reposez ! C''en est fait. L''heure est venue ; le Fils de l''homme est livré aux pécheurs. '
  '42':
  - type: note
    content: Cf. 1.15n  ; Mt 26.32n  ; Jn 14.31.
  - type: text
    content: Levez-vous, allons ; celui qui me livre s'est approché.
  - type: heading
    content: L'arrestation de Jésus
  - type: heading
    content: Mt 26.47-56  ; Lc 22.47-53  ; Jn 18.2-12
  '43':
  - type: text
    content: ' '
  - type: note
    content: Judas v. 10. –  grands prêtres / scribes / anciens v. 53,55 ; 8.31n  ; 11.27.
  - type: text
    content: 'Aussitôt, comme il parle encore, survient Judas, l''un des Douze, et avec lui une foule armée d''épées et de bâtons, envoyée par les grands prêtres, les scribes et les anciens. '
  '44':
  - type: note
    content: sous bonne garde, comme en Ac 16.23.
  - type: text
    content: 'Celui qui le livrait leur avait donné un signal : Celui que j''embrasserai, c''est lui ; arrêtez-le et emmenez-le sous bonne garde. '
  '45':
  - type: note
    content: 'Rabbi 9.5n. –  il l''embrassa  : le verbe est dérivé de celui qui est traduit par embrasser au v. 44 ; selon certains, il suggérerait une nuance particulière (embrasser tendrement, longuement), mais il peut aussi bien être considéré comme un simple synonyme ; de même Mt 26.49 ; Lc 7.38,45 ; 15.20 ; Ac 20.37.'
  - type: text
    content: 'Aussitôt arrivé, il s''approche de lui et lui dit : '
  - type: text
    content: Rabbi !
  - type: text
    content: ' Et il l''embrassa. '
  '46':
  - type: text
    content: 'Alors ils mirent la main sur lui et l''arrêtèrent. '
  '47':
  - type: note
    content: 'Cf. Jn 18.26. –  l''oreille  : autre traduction le lobe de l''oreille (même terme Jn 18.10).'
  - type: text
    content: Un de ceux qui étaient là tira l'épée, frappa l'esclave du grand prêtre et lui emporta l'oreille.
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'sortis  : cf. v. 26. –  comme si j''étais (litt. comme pour ) un bandit  : cf. 15.27n  ; Jn 18.40.'
  - type: text
    content: 'Jésus leur dit : Vous êtes sortis pour vous emparer de moi avec des épées et des bâtons, comme si j''étais un bandit. '
  '49':
  - type: note
    content: Lc 19.47 ; 21.37 ; Jn 18.20. –  enseigner dans le temple 12.35+.
  - type: text
    content: Tous les jours j'étais parmi vous à enseigner dans le temple, et vous n'êtes pas venus m'arrêter. Mais c'est pour que les Ecritures soient accomplies.
  '5':
  - type: note
    content: trois cents deniers (cf. 6.37n), soit un peu moins d'une année de salaire au tarif de Mt 20.1ss ; voir aussi mesures, poids et monnaies. –  ils s'emportaient 1.43n.
  - type: text
    content: 'On aurait pu vendre ce parfum plus de trois cents deniers, et les donner aux pauvres. Et ils s''emportaient contre elle. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: V. 27+ ; Jn 16.32.
  - type: text
    content: 'Alors tous l''abandonnèrent et prirent la fuite. '
  '51':
  - type: note
    content: 'Un jeune homme  : cf. 16.5. –  un drap  : cf. 15.46. –  On l''arrête ou on se saisit de lui.'
  - type: text
    content: 'Un jeune homme le suivait, vêtu seulement d''un drap. On l''arrête, '
  '52':
  - type: note
    content: Cf. Am 2.16.
  - type: text
    content: mais lui, lâchant le drap, s'enfuit tout nu.
  - type: heading
    content: Jésus comparaît devant le sanhédrin
  - type: heading
    content: Mt 26.57-58  ; Lc 22.54-55,63-71  ; Jn 18.13-15
  '53':
  - type: text
    content: ' '
  - type: note
    content: grands prêtres / anciens / scribes v. 43+.
  - type: text
    content: 'Ils emmenèrent Jésus chez le grand prêtre ; tous les grands prêtres, les anciens et les scribes se réunissent. '
  '54':
  - type: note
    content: 'jusqu''à l''intérieur…  : litt. jusqu''à l''intérieur, dans la cour (ou dans le palais) du grand prêtre v. 66 ; cf. 15.16 ; Mt 26.3n. –  près du feu  : litt. à la lumière.'
  - type: text
    content: Pierre l'avait suivi de loin, jusqu'à l'intérieur du palais du grand prêtre, dans la cour. Assis avec les gardes, il se chauffait près du feu.
  - type: heading
    content: Mt 26.59-68  ; Lc 22.63-71  ; Jn 18.19-24
  '55':
  - type: text
    content: ' '
  - type: note
    content: Cf. 15.1.
  - type: text
    content: 'Les grands prêtres et tout le sanhédrin cherchaient un témoignage contre Jésus pour le faire mettre à mort, et ils n''en trouvaient pas ; '
  '56':
  - type: note
    content: 'ne concordaient pas  : litt. n''étaient pas égaux, cf. v. 59 ; Dt 17.6 ; 19.15 ; cf. le récit de Daniel grec 13.48ss, où Daniel démasque les faux témoins qui accusent la pieuse Susanne en leur faisant préciser séparément sous quel arbre ils prétendent l''avoir surprise en flagrant délit d''adultère.'
  - type: text
    content: 'car beaucoup portaient de faux témoignages contre lui, mais les témoignages ne concordaient pas. '
  '57':
  - type: text
    content: 'Quelques-uns se levaient pour porter contre lui ce faux témoignage : '
  '58':
  - type: note
    content: Cf. 13.2 ; 15.29 ; Jn 2.19ss ; 4.21ss ; Ac 6.14. –  pas fabriqué par des mains humaines 2Co 5.1 ; Hé 9.11 ; cf. Ac 7.48ss ; 17.24.
  - type: text
    content: 'Nous l''avons entendu dire : « Je détruirai ce sanctuaire fabriqué par des mains humaines et en trois jours j''en construirai un autre qui ne sera pas fabriqué par des mains humaines. » '
  '59':
  - type: note
    content: 'même sur ce point…  : litt. même ainsi leur témoignage n''était pas égal, v. 56n.'
  - type: text
    content: 'Et même sur ce point-là, leurs témoignages ne concordaient pas. '
  '6':
  - type: note
    content: 'une belle œuvre  : cf. v. 8n.'
  - type: text
    content: 'Mais Jésus dit : Laissez-la. Pourquoi la tracassez-vous ? Elle a accompli une belle œuvre à mon égard ; '
  '60':
  - type: note
    content: 'Tu ne réponds rien…  : autre traduction tu ne réponds rien aux témoignages que ces gens portent contre toi ?'
  - type: text
    content: 'Alors le grand prêtre se leva au milieu de l''assemblée et demanda à Jésus : Tu ne réponds rien ? Que dis-tu des témoignages que ces gens portent contre toi ? '
  '61':
  - type: note
    content: gardait le silence 15.4s ; Es 50.6ss ; 53.7 ; Ps 39.3,10 ; Ac 8.32. –  le Christ ou le Messie, 1.1n  ; cf. 8.29s. –  du Béni (c.-à-d. de Dieu), formule juive pour éviter de prononcer le nom divin, en particulier dans une phrase supposée blasphématoire.
  - type: text
    content: 'Il gardait le silence ; il ne répondit rien. Le grand prêtre lui demandait encore : Est-ce toi qui es le Christ, le Fils du Béni ? '
  '62':
  - type: note
    content: 'C''est moi  : autre traduction je le suis, litt. je suis, voir 6.50n  ; cf. Mt 26.64 ; Lc 22.67. –  le Fils de l''homme… 13.26+ ; Dn 7.13. –  assis à la droite… Ps 110.1 ; Hé 1.3n. –  de la Puissance  : il faut de toute évidence comprendre de Dieu, dont on évite de prononcer le nom.'
  - type: text
    content: 'Jésus répondit : C''est moi. Et vous verrez '
  - type: text
    content: le Fils de l'homme
  - type: text
    content: ' assis à la droite de la Puissance et '
  - type: text
    content: venant avec les nuées du ciel
  - type: text
    content: '. '
  '63':
  - type: note
    content: 'déchire ses vêtements  : signe de deuil, de colère ou de tristesse, par lequel le grand prêtre marque ici sa réaction à une parole qu''il juge blasphématoire ; cf. Lv 21.10 ; 2R 18.37 ; 19.1.'
  - type: text
    content: 'Alors le grand prêtre déchire ses vêtements et dit : Qu''avons-nous encore besoin de témoins ? '
  '64':
  - type: note
    content: 'blasphème  : cf. 2.7/ / ; 3.28+ ; Lv 24.16 ; Jn 10.33 ; 19.7. –  le déclarant (sous-entendu dans le texte) passible de mort  : cf. 10.33.'
  - type: text
    content: Vous avez entendu le blasphème. Qu'en pensez-vous ? Tous le condamnèrent, le déclarant passible de mort.
  '65':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.34+ ; Es 50.6. –  voiler ou couvrir le visage . –  Fais le prophète , allusion sarcastique à la réputation de Jésus (cf. Lc 22.64).
  - type: text
    content: 'Quelques-uns se mirent à lui cracher dessus, à lui voiler le visage et à le frapper à coups de poing en lui disant : Fais le prophète ! Et les gardes le reçurent avec des gifles.'
  - type: heading
    content: Pierre renie Jésus
  - type: heading
    content: Mt 26.69-75  ; Lc 22.56-62  ; Jn 18.17,25-27
  '66':
  - type: text
    content: ' '
  - type: note
    content: cour v. 54n  ; 15.16. –  grand prêtre v. 47,53ss.
  - type: text
    content: 'Pendant que Pierre était en bas, dans la cour, une des servantes du grand prêtre arrive. '
  '67':
  - type: note
    content: 'Pierre qui se chauffait v. 54. –  le regarde  : même verbe 10.21. –  Nazaréen 1.24n.'
  - type: text
    content: 'Voyant Pierre qui se chauffait, elle le regarde et dit : Toi aussi, tu étais avec Jésus le Nazaréen. '
  '68':
  - type: note
    content: 'alors un coq chanta  : cette précision est absente de certains mss ; cf. v. 30,72.'
  - type: text
    content: 'Il le nia, en disant : Je ne sais pas, je ne comprends pas ce que tu veux dire, toi ! Puis il sortit pour aller dans le vestibule ; alors un coq chanta.'
  '69':
  - type: text
    content: 'La servante le vit et se remit à dire à ceux qui étaient là : C''est l''un d''entre eux. '
  '7':
  - type: note
    content: 'les pauvres…  : cf. Dt 15.11. –  vous ne m''avez pas toujours ou pour toujours 2.19s. – Cf. Epître de Barnabé 21.2 : « A vous les notables, si toutefois vous voulez accepter un conseil de ma bonne intention, voici ce que je demande : Vous avez autour de vous des gens à qui faire le bien, n''y manquez pas ! »'
  - type: text
    content: 'les pauvres, en effet, vous les avez toujours avec vous, et vous pouvez leur faire du bien quand vous voulez ; mais moi, vous ne m''avez pas toujours. '
  '70':
  - type: note
    content: A la fin du v. certains mss ajoutent et ta façon de parler est semblable, cf. Mt 26.73n.
  - type: text
    content: 'Lui, à nouveau, le niait. Peu après, ceux qui étaient là disaient encore à Pierre : Vraiment, tu es de ces gens-là, car tu es aussi galiléen. '
  '71':
  - type: note
    content: 'à jurer…  : litt. à anathématiser et à jurer  ; le premier verbe grec est apparenté au terme grec transcrit anathème (Ac 23.14 ; Rm 9.3n) ; ici l''anathème ou malédiction (conditionnelle) intervient pour renforcer le serment (cf. « que je sois maudit si je mens »). Même verbe Ac 23.12ss ; autre verbe apparenté en Mt 26.74 ; voir aussi bénédiction.'
  - type: text
    content: 'Alors il se mit à jurer, sous peine d''anathème : Je ne connais pas l''homme dont vous parlez ! '
  '72':
  - type: note
    content: 'pour la seconde fois… v. 30,68. –  Pierre se souvint 11.21. –  il se mit à pleurer  : la traduction du premier des deux verbes grecs correspondants est incertaine ; on a aussi compris  : il se couvrit (la tête) et pleura ; il se précipita dehors et pleura ; en y pensant, il pleurait ; il se mit à pleurer abondamment.'
  - type: text
    content: 'Aussitôt un coq chanta pour la seconde fois. Pierre se souvint de la parole que Jésus lui avait dite : Avant qu''un coq ait chanté deux fois, tu m''auras renié par trois fois. Alors il se mit à pleurer.'
  '8':
  - type: note
    content: 'pour l''ensevelissement  : donner une sépulture à un mort était considéré, dans le judaïsme du Ier s. apr. J.-C., comme une bonne œuvre au même titre que l''aumône (v. 6s) ; cf. 15.42–16.1 ; Jn 12.7 ; Epître d''Ignace d''Antioche aux Ephésiens 17.2 : « Si le Seigneur a reçu une onction sur la tête, c''est afin d''exhaler pour son Eglise un parfum d''incorruptibilité. »'
  - type: text
    content: 'Elle a fait ce qu''elle a pu ; elle a d''avance embaumé mon corps pour l''ensevelissement. '
  '9':
  - type: note
    content: 'Cf. 1.1n  ; 13.10+. –  Amen Mt 5.18n. –  de cette femme  : litt. d''elle.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, partout où la bonne nouvelle sera proclamée, dans le monde entier, on racontera aussi, en mémoire de cette femme, ce qu''elle a fait.'
  - type: heading
    content: Judas s'apprête à livrer Jésus
  - type: heading
    content: Mt 26.14-16  ; Lc 22.3-6
