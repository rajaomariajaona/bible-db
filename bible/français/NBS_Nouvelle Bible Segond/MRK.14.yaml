          - type: text
            text: LXX
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il vous montrera une grande chambre à l''étage, aménagée et toute prête : c''est là que vous ferez pour nous les préparatifs. '
