      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Dt 16.3. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règle de la Communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ') 6.4s : « Quand ils disposeront la table pour manger et prépareront le vin pour boire, le prêtre étendra en premier sa main pour qu''on prononce la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ' sur les prémices du pain et du vin. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Règle annexe de la Communauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.17ss : « Et quand ils se réuniront pour la table de la communauté et pour boire le vin, et qu''ils disposeront la table de la communauté et mêleront le vin pour boire, que personne n''étende sa main sur les prémices du pain et du vin avant le Prêtre ; car c''est lui qui bénira les prémices du pain et du vin et qui étendra sa main sur le pain en premier. Et ensuite le Messie d''Israël étendra ses mains sur le pain. Et ensuite toute la Congrégation de la Communauté bénira, chacun selon sa dignité. Et c''est selon ce rite qu''ils procéderont en tout repas quand ils seront réunis au moins à dix personnes. » – Voir aussi '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bénédiction.
      marker-yv: yv-n
    - type: text
      text: 'Pendant qu''ils mangeaient, il prit du pain ; après avoir prononcé la bénédiction, il le rompit et le leur donna en disant : Prenez ; c''est mon corps. '
  '23':
  - type: usfm
