      marker-yv: yv-n
    - type: text
      text: 'Le premier jour des Pains sans levain, le jour où l''on sacrifiait la Pâque, ses disciples lui disent : Où veux-tu que nous allions te préparer le repas de la Pâque ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 11.2ss ; 1S 10.2-7 ; Mt 17.27 ; comparer avec Mt 26.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quelqu''un '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (ce sont habituellement les femmes qui portent l'eau, cf. Gn 24.11 ; Jn 4.7).
      marker-yv: yv-n
    - type: text
      text: 'Il envoie deux de ses disciples et leur dit : Allez à la ville ; un homme portant une cruche d''eau viendra à votre rencontre ; suivez-le, '
  '14':
  - type: usfm
    marker: p
