document_id: DAN.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Deuxième vision : le bélier et le bouc'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: A partir d'ici le texte est de nouveau en hébreu (cf. 2.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Belshatsar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 7.1.'
      marker-yv: yv-n
    - type: text
      text: 'La troisième année du règne du roi Belshatsar, moi, Daniel, j''eus une vision, après celle que j''avais eue précédemment. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''armée du ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: étoiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 24s ; 7.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',14,18,27 ; 12.3 ; voir aussi Es 14.13s ; Ap 8.10 ; 12.4.'
      marker-yv: yv-n
    - type: text
      text: 'Elle s''éleva jusqu''à l''armée du ciel, fit tomber à terre une partie de cette armée et des étoiles, et elle les piétina. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.31 ; 12.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Prince '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
        - type: text
          text: ' constant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 29.38-46 ; Nb 28.3-6 ; Ez 46.13-15 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.54 : « Le roi (Antiochos) construisit l''abomination de la dévastation (un autel à Zeus Olympien) sur l''autel des holocaustes… », mettant ainsi fin aux sacrifices prescrits par la loi ; autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle lui enleva le sacrifice constant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . – Le texte hébreu de la fin du verset et jusqu'au v. 13 est obscur et a donné lieu à des traductions diverses.
      marker-yv: yv-n
    - type: text
      text: 'Elle grandit jusqu''au Prince de l''armée : le sacrifice constant lui fut enlevé, et le lieu de son sanctuaire fut rejeté. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à cause de la transgression '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour cause de révolte, avec perversité, pour la transgression. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la corne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sujet est sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et réussit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2Ch 31.21.'
      marker-yv: yv-n
    - type: text
      text: 'L''armée fut livrée, en plus du sacrifice constant, à cause de la transgression ; la corne jeta la vérité par terre et réussit dans ses entreprises. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jusqu''à quand '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.6 ; cf. Es 6.11 ; Ha 1.2 ; Ap 6.10.
      marker-yv: yv-n
    - type: text
      text: 'J''entendis parler un saint ; et un autre saint dit à celui qui parlait : Jusqu''à quand durera la vision sur le sacrifice constant, sur la transgression dévastatrice, sur le sanctuaire et l''armée livrés et piétinés ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux mille trois cents soirs et matins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d., selon toute probabilité, 1 150 jours ; il s''agit vraisemblablement d''une précision (cf. le chiffre plus symbolique de 7.25) sur la période pendant laquelle le sacrifice constant (offert soir et matin, cf. v. 11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 9.21) a été interrompu entre l''automne 167 et décembre 164 av. J.-C. Certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: deux mille trois cents jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rétabli
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: justifié
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rendu à sa juste fonction.
      marker-yv: yv-n
    - type: text
      text: 'Et il me dit : Jusqu''à deux mille trois cents soirs et matins ; après quoi le sanctuaire sera rétabli.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Interprétation de la deuxième vision
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''aspect '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un homme vaillant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 1.26.'
      marker-yv: yv-n
    - type: text
      text: 'Tandis que moi, Daniel, je regardais cette vision et que je cherchais à la comprendre, apparut quelqu''un qui avait l''aspect d''un homme vaillant ; il se tenait debout devant moi. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gabriel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce nom signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Homme vaillant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même mot qu''au v. 15) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu est mon héros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en fait l'un des quatre archanges, avec Michel (voir 10.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), Uriel et Raphaël ; cf. Dn 9.21-23 ; Lc 1.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vision
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce n''est pas exactement le terme ainsi traduit au v. 15, mais un synonyme, traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aspect '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 15. On le retrouve dans ce sens aux v. 26 (la première fois), 27 ; 9.23 ; 10.1 ; terme apparenté en 10.7s,16. Cf. Ez 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'J''entendis la voix d''un être humain au milieu de l''Oulaï ; il criait : Gabriel, fais comprendre la vision à celui-ci. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je tombai… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ez 1.28 ; Ap 1.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Comprends '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.22 ; 10.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: humain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''homme. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'car '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'temps de la fin '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 19 ; 11.35 ; cf. Ez 21.30
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',34 ; 35.5 ; Am 8.2 ; Ha 2.3 ; 1Co 15.24.'
      marker-yv: yv-n
    - type: text
      text: 'Il vint alors près de l''endroit où j''étais. A sa venue, je fus rempli d''effroi et je tombai face contre terre. Il me dit : Comprends, humain, car la vision est pour le temps de la fin. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'torpeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: profond sommeil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 2.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme il me parlait, je restai frappé de torpeur, face contre terre. Il me toucha et me fit tenir debout à l''endroit où j''étais. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: terme de la fureur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 3.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il y a un temps fixé pour la fin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au temps (de) la fin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il s'agit du temps de la fin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 17+ ; 11.27,35 ; 12.7-13.'
      marker-yv: yv-n
    - type: text
      text: 'Puis il me dit : Je te fais connaître ce qui arrivera au terme de la fureur, car il y a un temps fixé pour la fin. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Suse la citadelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Est 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Né 1.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Elam '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 10.22
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'Oulaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du canal Oulaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', identifié avec l''actuel Shaour, fleuve traversant la ville de Suse.'
      marker-yv: yv-n
    - type: text
      text: Je regardais, dans cette vision ; à ce que je voyais, j'étais à Suse la citadelle, dans la province d'Elam ; pendant que je regardais la vision, je me trouvais près de l'Oulaï.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 5.28.'
      marker-yv: yv-n
    - type: text
      text: 'Le bélier que tu as vu et qui avait deux cornes, ce sont les rois de Médie et de Perse. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 5-7 et notes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Grèce '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.20 ; 11.2 ; cf. Gn 10.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le premier roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Alexandre le Grand.'
      marker-yv: yv-n
    - type: text
      text: 'Le bouc velu, c''est le roi de Grèce. La grande corne entre ses yeux, c''est le premier roi. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
