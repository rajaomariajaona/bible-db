document_id: DAN.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Deuxième vision : le bélier et le bouc'
  - type: text
    content: ' '
  - type: note
    content: A partir d'ici le texte est de nouveau en hébreu (cf. 2.4n). –  Belshatsar 5.1n  ; cf. 7.1.
  - type: text
    content: 'La troisième année du règne du roi Belshatsar, moi, Daniel, j''eus une vision, après celle que j''avais eue précédemment. '
  '10':
  - type: note
    content: 'l''armée du ciel / étoiles  : cf. v. 24s ; 7.10n,14,18,27 ; 12.3 ; voir aussi Es 14.13s ; Ap 8.10 ; 12.4.'
  - type: text
    content: 'Elle s''éleva jusqu''à l''armée du ciel, fit tomber à terre une partie de cette armée et des étoiles, et elle les piétina. '
  '11':
  - type: note
    content: '11.31 ; 12.11. –  Prince v. 25+. –  sacrifice constant Ex 29.38-46 ; Nb 28.3-6 ; Ez 46.13-15 ; cf. 1 Maccabées 1.54 : « Le roi (Antiochos) construisit l''abomination de la dévastation (un autel à Zeus Olympien) sur l''autel des holocaustes… », mettant ainsi fin aux sacrifices prescrits par la loi ; autre lecture traditionnelle elle lui enleva le sacrifice constant. – Le texte hébreu de la fin du verset et jusqu''au v. 13 est obscur et a donné lieu à des traductions diverses.'
  - type: text
    content: 'Elle grandit jusqu''au Prince de l''armée : le sacrifice constant lui fut enlevé, et le lieu de son sanctuaire fut rejeté. '
  '12':
  - type: note
    content: 'Cf. v. 11n. –  à cause de la transgression ou pour cause de révolte, avec perversité, pour la transgression. –  la corne  : le sujet est sous-entendu dans le texte. –  et réussit  : cf. 2Ch 31.21.'
  - type: text
    content: 'L''armée fut livrée, en plus du sacrifice constant, à cause de la transgression ; la corne jeta la vérité par terre et réussit dans ses entreprises. '
  '13':
  - type: note
    content: un saint 4.10n. –  Jusqu'à quand 12.6 ; cf. Es 6.11 ; Ha 1.2 ; Ap 6.10.
  - type: text
    content: 'J''entendis parler un saint ; et un autre saint dit à celui qui parlait : Jusqu''à quand durera la vision sur le sacrifice constant, sur la transgression dévastatrice, sur le sanctuaire et l''armée livrés et piétinés ? '
  '14':
  - type: note
    content: 'deux mille trois cents soirs et matins  : c.-à-d., selon toute probabilité, 1 150 jours ; il s''agit vraisemblablement d''une précision (cf. le chiffre plus symbolique de 7.25) sur la période pendant laquelle le sacrifice constant (offert soir et matin, cf. v. 11n  ; 9.21) a été interrompu entre l''automne 167 et décembre 164 av. J.-C. Certains comprennent deux mille trois cents jours. –  rétabli  : litt. justifié, c.-à-d. rendu à sa juste fonction.'
  - type: text
    content: 'Et il me dit : Jusqu''à deux mille trois cents soirs et matins ; après quoi le sanctuaire sera rétabli.'
  - type: heading
    content: Interprétation de la deuxième vision
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'l''aspect (v. 16n) d''un homme vaillant  : cf. Ez 1.26.'
  - type: text
    content: 'Tandis que moi, Daniel, je regardais cette vision et que je cherchais à la comprendre, apparut quelqu''un qui avait l''aspect d''un homme vaillant ; il se tenait debout devant moi. '
  '16':
  - type: note
    content: 'Gabriel  : ce nom signifie Homme vaillant (même mot qu''au v. 15) de Dieu (hébreu ’El) ou Dieu est mon héros  ; 1 Hénoch en fait l''un des quatre archanges, avec Michel (voir 10.13n), Uriel et Raphaël ; cf. Dn 9.21-23 ; Lc 1.19n,26. –  vision  : ce n''est pas exactement le terme ainsi traduit au v. 15, mais un synonyme, traduit par aspect au v. 15. On le retrouve dans ce sens aux v. 26 (la première fois), 27 ; 9.23 ; 10.1 ; terme apparenté en 10.7s,16. Cf. Ez 1.1n.'
  - type: text
    content: 'J''entendis la voix d''un être humain au milieu de l''Oulaï ; il criait : Gabriel, fais comprendre la vision à celui-ci. '
  '17':
  - type: note
    content: 'je tombai… Ez 1.28 ; Ap 1.17. –  Comprends 9.22 ; 10.14. –  humain  : litt. fils d''homme. –  car ou que. –  temps de la fin v. 19 ; 11.35 ; cf. Ez 21.30n,34 ; 35.5 ; Am 8.2 ; Ha 2.3 ; 1Co 15.24.'
  - type: text
    content: 'Il vint alors près de l''endroit où j''étais. A sa venue, je fus rempli d''effroi et je tombai face contre terre. Il me dit : Comprends, humain, car la vision est pour le temps de la fin. '
  '18':
  - type: note
    content: 10.9s. –  torpeur ou profond sommeil  ; cf. Gn 2.21n.
  - type: text
    content: 'Comme il me parlait, je restai frappé de torpeur, face contre terre. Il me toucha et me fit tenir debout à l''endroit où j''étais. '
  '19':
  - type: note
    content: 'terme de la fureur  : cf. Mt 3.7. –  il y a un temps fixé pour la fin  : litt. au temps (de) la fin, ce qui pourrait aussi signifier il s''agit du temps de la fin  ; cf. v. 17+ ; 11.27,35 ; 12.7-13.'
  - type: text
    content: 'Puis il me dit : Je te fais connaître ce qui arrivera au terme de la fureur, car il y a un temps fixé pour la fin. '
  '2':
  - type: note
    content: 'Suse la citadelle Est 1.2n  ; Né 1.1. –  Elam Gn 10.22n. –  de l''Oulaï  : litt. du canal Oulaï, identifié avec l''actuel Shaour, fleuve traversant la ville de Suse.'
  - type: text
    content: Je regardais, dans cette vision ; à ce que je voyais, j'étais à Suse la citadelle, dans la province d'Elam ; pendant que je regardais la vision, je me trouvais près de l'Oulaï.
  '20':
  - type: note
    content: V. 3n  ; cf. 5.28.
  - type: text
    content: 'Le bélier que tu as vu et qui avait deux cornes, ce sont les rois de Médie et de Perse. '
  '21':
  - type: note
    content: 'Cf. v. 5-7 et notes. –  Grèce 10.20 ; 11.2 ; cf. Gn 10.2n. –  le premier roi  : Alexandre le Grand.'
  - type: text
    content: 'Le bouc velu, c''est le roi de Grèce. La grande corne entre ses yeux, c''est le premier roi. '
  '22':
  - type: note
    content: V. 8n.
  - type: text
    content: Les quatre qui se dressèrent à sa place quand elle fut brisée, ce sont quatre royaumes qui se dresseront à partir de cette nation, mais qui n'auront pas sa force.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'un roi  : probablement Antiochos (cf. v. 9-12 et notes). –  insolent et retors  : litt. fort de visage (tournure traduite par au visage farouche en Dt 28.50 et air effronté en Pr 7.13) et comprenant les énigmes  ; cf. v. 25 ; 11.21 ; Jg 14.12 ; 1R 10.1.'
  - type: text
    content: A la fin de leur règne,
  - type: text
    content: lorsque les transgresseurs auront comblé la mesure,
  - type: text
    content: un roi insolent et retors se dressera.
  '24':
  - type: text
    content: ' '
  - type: note
    content: V. 10-13 ; 7.25. –  inouïes ou monstrueuses  ; cf. 11.36 ; 12.6 ; Jd 16. –  peuple des saints 7.18s.
  - type: text
    content: Sa puissance s'affermira, mais ce ne sera pas par sa propre force ;
  - type: text
    content: il causera des destructions inouïes,
  - type: text
    content: réussira dans ses entreprises
  - type: text
    content: et détruira les puissants
  - type: text
    content: et le peuple des saints.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'l''arrogance dans le cœur Es 10.12 ; Jr 48.29 ; 49.16 ; Ab 1.3. –  il détruira une multitude de gens  : cf. 1 Maccabées 1.30 : « Il (l''émissaire d''Antiochos) adressa aux habitants (de Jérusalem) de fausses paroles de paix et on le crut. Puis il se jeta sur la ville à l''improviste… et fit périr beaucoup de gens en Israël. » –  contre le Prince des princes v. 11 ; 10.13n  ; 11.36 ; Ap 17.14 ; 19.16. –  sans l''action d''aucune main  : cf. 2.34,45.'
  - type: text
    content: Par son habileté,
  - type: text
    content: la tromperie lui réussira,
  - type: text
    content: il aura de l'arrogance dans le cœur,
  - type: text
    content: et en pleine paix, il détruira une multitude de gens ;
  - type: text
    content: il se dressera contre le Prince des princes,
  - type: text
    content: mais il sera brisé, sans l'action d'aucune main.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'soirs / matins v. 14n. –  secrète 12.10 ; cf. Ap 10.4. –  elle se rapporte à des jours lointains  : litt. (elle est) pour des jours nombreux  ; cf. v. 17,19 ; 10.14 ; Ez 12.27.'
  - type: text
    content: Cette vision des soirs et des matins est certaine.
  - type: text
    content: Quant à toi, tiens secrète cette vision,
  - type: text
    content: car elle se rapporte à des jours lointains.
  '27':
  - type: text
    content: ' '
  - type: note
    content: '2.1 ; 7.28. –  affaires du roi 2.48. –  je ne la comprenais pas  : autre traduction et personne ne la comprenait.'
  - type: text
    content: Moi, Daniel, je fus plusieurs jours affaibli et malade ; puis je me levai et m'occupai des affaires du roi. J'étais atterré à cause de la vision ; je ne la comprenais pas.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'V. 20 ; cf. Ap 13.11. –  la plus haute…  : la dynastie perse s''empara de l''empire sous Cyrus (549 av. J.-C.), après une période de domination mède.'
  - type: text
    content: 'Levant les yeux, je vis un bélier qui se tenait devant le canal. Il avait deux cornes ; ces cornes étaient hautes, mais l''une était plus haute que l''autre ; la plus haute s''éleva la dernière. '
  '4':
  - type: note
    content: 'le bélier qui frappait  : cf. 7.5 ; Ez 34.17s ; Za 10.3. –  de son pouvoir  : litt. de sa main  ; cf. v. 7 ; 11.16 ; Jg 2.14. Allusion aux conquêtes de l''empire perse : Lydie, Babylonie, Syrie, Israël, Egypte etc.'
  - type: text
    content: Je vis le bélier qui frappait de ses cornes à l'ouest, au nord et au sud. Aucun animal ne pouvait lui résister, et personne ne pouvait délivrer de son pouvoir ; il faisait ce qu'il voulait et grandissait.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'V. 21n. –  sans la toucher Es 41.3 ; image de la rapidité et de l''étendue des conquêtes d''Alexandre le Grand (cf. 7.6n). –  imposante  : le terme correspondant est absent d''une version grecque (Théodotion).'
  - type: text
    content: 'Comme je réfléchissais, un bouc arriva de l''ouest, parcourant toute la terre sans la toucher ; ce bouc avait une corne imposante entre les yeux. '
  '6':
  - type: note
    content: Alexandre franchit l'Hellespont pour conquérir l'Asie sous domination perse en 334 av. J.-C.
  - type: text
    content: 'Il arriva jusqu''au bélier qui avait deux cornes et que j''avais vu se tenant devant le canal ; il courut sur lui dans l''ardeur de sa force. '
  '7':
  - type: note
    content: 's''exaspérait  : cf. 11.11. –  piétina 7.7,19 ; cf. 2R 14.9. –  personne pour délivrer  : cf. Es 5.29 ; Os 5.14.'
  - type: text
    content: 'Je le vis qui s''approchait du bélier et s''exaspérait contre lui ; il frappa le bélier et lui brisa les deux cornes, sans que le bélier eût la force de lui résister ; il le jeta par terre et le piétina, et il n''y eut personne pour délivrer le bélier de son pouvoir. '
  '8':
  - type: note
    content: '11.4 : mort d''Alexandre (323 av. J.-C.) et partage de l''empire entre ses quatre généraux. –  quatre vents  : cf. 7.2+.'
  - type: text
    content: Le bouc devint très grand ; mais lorsqu'il fut puissant, la grande corne se brisa. Quatre cornes imposantes s'élevèrent à sa place, dans les directions des quatre vents du ciel.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'De l''une d''elles…  : autre traduction de l''une d''elles, de la petite, sortit une corne… A la mort d''Alexandre, Séleucos Ier hérite de la Syrie et de la Babylonie ; c''est de sa dynastie que sortira Antiochos IV, qui fera campagne contre l''Egypte, vers le sud , et contre les Parthes, vers l''est , avant de s''en prendre au plus beau des pays (litt. la beauté ou l''ornement ), Israël (cf. 11.16,41 ; Jr 3.19 ; Ez 20.6n  ; Za 7.14).'
  - type: text
    content: 'De l''une d''elles sortit une corne, toute petite, qui s''agrandit beaucoup vers le sud, vers l''est, et vers le plus beau des pays. '
