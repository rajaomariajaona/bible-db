        children:
        - type: text
          text: '2.38+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
