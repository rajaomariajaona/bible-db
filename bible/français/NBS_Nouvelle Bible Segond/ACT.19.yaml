document_id: ACT.19,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Ephèse
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Texte occidental
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Alors que Paul avait décidé, quant à lui, de se rendre à Jérusalem, l'Esprit lui dit de retourner en Asie. Passant donc par le haut-pays, il arriva à Ephèse…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-23 ; 20.16s ; 21.29 ; 1Co 15.32 ; 16.8 ; Ep 1.1 ; 1Tm 1.3 ; 2Tm 1.18 ; 4.12 ; Ap 1.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Apollos était à Corinthe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 18.24+,27s.
      marker-yv: yv-n
    - type: text
      text: 'Pendant qu''Apollos était à Corinthe, Paul, qui était passé par le haut-pays, descendit à Ephèse. Il y trouva quelques disciples '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: deux ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.11 ; voir aussi 19.8 ; 20.31 ; 1Co 16.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Asie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : région d''Ephèse (v. 1), cf. 16.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – D''après une reconstitution, le texte occidental aurait omis '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' et Grecs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ainsi que '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Seigneur.
      marker-yv: yv-n
    - type: text
      text: Cela dura deux ans, de sorte que tous ceux qui habitaient l'Asie, Juifs et Grecs, entendirent la parole du Seigneur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fils de Scéva
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 5.12-16 ; 14.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'miracles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 10.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dieu faisait des miracles extraordinaires par les mains de Paul, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 16.16-18 ; Lc 8.44/ /.
      marker-yv: yv-n
    - type: text
      text: au point qu'on appliquait sur les malades des linges ou des étoffes qui avaient touché son corps ; alors les maladies les quittaient et les esprits mauvais sortaient.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'exorcistes… '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 13.6 ; Mt 12.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' du Seigneur Jésus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.6+,16 ; cf. Lc 9.49s/ /.
      marker-yv: yv-n
    - type: text
      text: 'Quelques exorcistes ambulants, des Juifs, entreprirent de prononcer sur ceux qui avaient des esprits mauvais le nom du Seigneur Jésus, en disant : Je vous conjure par Jésus, celui que Paul proclame ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Texte occidental
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Parmi eux les [sept] fils de Scéva, un prêtre, voulaient faire la même chose. Ils avaient l''habitude d''exorciser de tels hommes ; s''approchant du possédé, ils commençaient à invoquer sur lui le nom en disant : « Nous t''ordonnons de sortir, par Jésus que Paul annonce. » '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. 16.18 ; le nom '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Scéva '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait transcrire un nom hébreu correspondant au chiffre '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sept '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. v. 16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un des grands '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un grand prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mt 2.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; le don d''exorcisme est attribué au grand prêtre dans le '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Testament
        - type: text
          text: ' de Lévi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir Lc 10.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il y avait sept fils d''un certain Scéva, un des grands prêtres juifs, qui faisaient cela. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 16.17 ; Lc 4.41/ /.
      marker-yv: yv-n
    - type: text
      text: 'L''esprit mauvais leur répondit : Jésus, je le connais, et je sais bien qui est Paul ; mais vous, qui êtes-vous ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prit l'avantage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les maîtrisa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe correspondant est apparenté au mot habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mc 10.42'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les deux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais il est susceptible d''un emploi plus large (cf. 23.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Et l''homme dans lequel était l''esprit mauvais se jeta sur eux, prit l''avantage et les battit tous avec une telle force qu''ils s''enfuirent de cette maison nus et blessés. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: connu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.19+ ; 4.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Juifs et Grecs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.43+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''empara '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Cela fut connu de tous ceux qui habitaient Ephèse, Juifs et Grecs ; la crainte s'empara d'eux tous, et le nom du Seigneur Jésus était magnifié.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui étaient devenus croyants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : texte occidental'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui devenaient croyants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: reconnaissant publiquement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en confessant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (verbe apparenté en 7.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Mc 1.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et annonçant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs pratiques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', probablement au sens de pratiques magiques (v. 19).'
      marker-yv: yv-n
    - type: text
      text: 'Beaucoup de ceux qui étaient devenus croyants venaient en reconnaissant publiquement leurs pratiques. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les sciences occultes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 18.10-14. Le terme correspondant n''apparaît qu''ici, avec ce sens, dans le N.T. ; en 1Tm 5.13 on le retrouve dans un sens plus courant, désignant le défaut consistant à se mêler des affaires d''autrui. Les « lettres éphésiennes », inscriptions figurant sur la statue d''Artémis à Ephèse, étaient réputées dans le monde antique pour leurs vertus magiques. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: livres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on a retrouvé de nombreux grimoires de ce genre, écrits en grec sur des papyrus. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on l'estima à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on trouva
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pièces d'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement des drachmes (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies).'
      marker-yv: yv-n
    - type: text
      text: 'Bon nombre de ceux qui avaient pratiqué les sciences occultes apportaient leurs livres et les brûlaient devant tous. On en calcula le prix et on l''estima à cinquante mille pièces d''argent. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 8.15-17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et leur dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un ms semble avoir lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il dit aux disciples '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(selon une reconstitution, la proposition '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il y trouva quelques disciples '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 1 était absente d''un état ancien du texte occidental). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entendu parler d''un Esprit saint '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, plus littéralement, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entendu dire qu'il y a un Esprit saint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jn 7.39. Texte occidental '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que certains reçoivent l'Esprit saint.
      marker-yv: yv-n
    - type: text
      text: 'et leur dit : Avez-vous reçu l''Esprit saint quand vous êtes devenus croyants ? Ils lui répondirent : Nous n''avons même pas entendu parler d''un Esprit saint. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se répandait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: croissait et se fortifiait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 2.41+,47 ; 6.7 ; 12.24.'
      marker-yv: yv-n
    - type: text
      text: C'est ainsi que, par le pouvoir du Seigneur, la Parole se répandait et gagnait en force.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Emeute à Ephèse et départ de Paul
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Après cela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'lorsque ces choses furent accomplies '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Lc 1.1). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: forma le projet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'mit dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: décida par l'Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.22 ; voir aussi 24.17 ; 1Co 16.5s ; 2Co 1.15s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Achaïe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '18.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rome
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 23.11 ; 27.24 ; Rm 1.10-15 ; 15.23 ; 2Co 10.16.'
      marker-yv: yv-n
    - type: text
      text: 'Après cela, Paul forma le projet d''aller à Jérusalem en passant par la Macédoine et l''Achaïe. Il disait : Quand je m''y serai rendu, il me faudra encore voir Rome. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses aides
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ceux qui le servaient '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir 6.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Timothée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.1+ ; cf. 1Co 4.17 ; 16.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Eraste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 16.23 ; 2Tm 4.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en Asie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il envoya en Macédoine deux de ses aides, Timothée et Eraste, mais lui-même resta quelque temps en Asie.
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 12.1 ; 1Co 15.32 ; 2Co 1.8-11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des troubles graves '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la Voie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.2.
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là survinrent des troubles graves au sujet de la Voie. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sanctuaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute des reproductions (porte-bonheur ?) du principal monument d''Ephèse (l''une des « Sept Merveilles » du monde antique), consacré à la déesse '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Artémis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= Diane), dont le culte local était proche des rites orientaux de la fécondité. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des gains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une activité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même terme au v. 25) ; cf. 16.16+.
      marker-yv: yv-n
    - type: text
      text: 'Un orfèvre nommé Démétrios fabriquait des sanctuaires d''Artémis en argent et procurait des gains considérables aux artisans. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mes amis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 35 ; 14.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il rassembla ces derniers, avec tous les ouvriers qui exerçaient le même genre de métier, et dit : Mes amis, vous savez que notre prospérité dépend de cette activité ; '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 17.24s,29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'or vous voyez et entendez que, non seulement à Ephèse, mais dans presque toute l''Asie, ce Paul a persuadé et détourné une foule importante en disant que les dieux faits par la main des hommes ne sont pas des dieux. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur notre profession
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ruiner toute estime
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que le temple… soit compté pour rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Es 40.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adorée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Cela risque non seulement de jeter le discrédit sur notre profession, mais encore de ruiner toute estime pour le temple de la grande déesse Artémis, et même de dépouiller de son prestige celle qui est adorée de toute l'Asie et de toute la terre habitée !
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: remplis de fureur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lc 4.28. – Xénophon (V'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: -IV
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C.), qui était lui-même originaire d''Ephèse, parle de « notre déesse ancestrale, la grande Artémis des Ephésiens » ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Daniel
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.18 où, alors que le culte païen est accusé de supercherie, le roi salue son dieu par ces mots : « Tu es grand, ô Bel ! et il n''y a en toi aucune fourberie ! »'
      marker-yv: yv-n
    - type: text
      text: 'Quand ils entendirent cela, ils furent remplis de fureur et se mirent à crier : Grande est l''Artémis des Ephésiens ! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se précipitèrent… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.57. – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'théâtre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd''Ephèse pouvait contenir au moins 24 000 personnes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gaïos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 16.23 ; 1Co 1.14 ; 3Jn 1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aristarque '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.4 ; 27.2 ; Col 4.10 ; Phm 24.
      marker-yv: yv-n
    - type: text
      text: 'La confusion gagna toute la ville. Tous, d''un commun accord, se précipitèrent au théâtre et entraînèrent avec eux les Macédoniens Gaïos et Aristarque, compagnons de voyage de Paul. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quel '
        - type: usfm
          marker: w
          children:
          - type: text
            text: baptême
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour quoi avez-vous donc été baptisés ?… pour le baptême de Jean
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 18.25 ; Jn 3.22 ; 4.1s.'
      marker-yv: yv-n
    - type: text
      text: 'Il dit : Quel baptême avez-vous donc reçu ? Ils répondirent : Le baptême de Jean. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Paul était décidé à se présenter devant le peuple, mais les disciples ne le lui permirent pas ; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '31'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.31 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'asiarques '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'étaient des représentants des villes d''Asie, élus chaque année ; certains d''entre eux au moins présidaient au culte de l''empereur. Peut-être s''agit-il ici de personnages qui avaient occupé cette fonction par le passé et en avaient gardé le titre. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des messagers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette précision est sous-entendue dans le texte grec. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: supplier…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.12.'
      marker-yv: yv-n
    - type: text
      text: 'et même quelques-uns des asiarques, qui étaient de ses amis, lui envoyèrent des messagers pour le supplier de ne pas se rendre au théâtre. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '32'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.32 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 21.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c''est le mot grec habituellement transcrit '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Eglise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 5.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; de même aux v. 39s.'
      marker-yv: yv-n
    - type: text
      text: 'Les uns criaient une chose, les autres une autre ; en effet, la confusion régnait dans l''assemblée, la plupart des gens ne sachant même pas pourquoi ils s''étaient réunis. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '33'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.33 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte obscur. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: renseignèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: convainquirent ; désignèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss portent un autre verbe, apparenté, qu''on pourrait traduire par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'firent descendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mirent en avant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Alexandre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on ignore de qui il s''agit ; cf. 1Tm 1.20 ; 2Tm 4.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: signe de la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'présenter sa défense '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '22.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dans la foule, des gens renseignèrent Alexandre, que les Juifs poussaient en avant ; Alexandre faisait signe de la main et voulait présenter sa défense devant le peuple. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '34'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.34 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juif
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.20.'
      marker-yv: yv-n
    - type: text
      text: 'Mais quand ils reconnurent en lui un Juif, tous se mirent à crier d''une seule voix, pendant près de deux heures : Grande est l''Artémis des Ephésiens !'
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son emblème tombé du ciel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui est tombé d'en haut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; certains pensent qu'il s'agit d'un météorite rappelant des formes féminines.
      marker-yv: yv-n
    - type: text
      text: 'Mais le secrétaire parvint à calmer la foule et dit : Hommes d''Ephèse, qui ne sait pas que la ville d''Ephèse est la gardienne du temple de la grande Artémis et de son emblème tombé du ciel ? '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Puisque cela est incontestable, vous devez vous tenir calmes et ne rien faire avec précipitation. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrilège
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 2.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En effet, ces hommes que vous avez amenés n''ont commis ni sacrilège ni blasphème envers notre déesse. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'proconsuls '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.7+.
      marker-yv: yv-n
    - type: text
      text: 'Si donc Démétrios et les artisans qui sont avec lui ont un grief contre quelqu''un, il y a des jours d''audience et des proconsuls : qu''ils portent plainte ! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: assemblée légale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Et si vous avez d''autres réclamations, cela se réglera dans l''assemblée légale. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.5+ ; 13.24 ; Lc 3.3,15-18/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: changement
        - type: text
          text: ' radical '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mettre sa foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: croire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'devenir croyant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 2,18.
      marker-yv: yv-n
    - type: text
      text: 'Alors Paul dit : Jean a baptisé d''un baptême de changement radical ; il disait au peuple de mettre sa foi en celui qui venait après lui, c''est-à-dire en Jésus. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.40 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sédition
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 15.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'existe…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sens probable d''un texte grec difficile, qui varie selon les mss ; certains le corrigent pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'bien que nous ne soyons coupables de rien dont nous ne puissions rendre compte en ce qui concerne cet attroupement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 23.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rendre compte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 16.2+.'
      marker-yv: yv-n
    - type: text
      text: Nous risquons, en effet, d'être accusés de sédition pour ce qui s'est passé aujourd'hui, car il n'existe aucun motif qui nous permette de rendre compte de cet attroupement. Après avoir dit cela, il renvoya l'assemblée.
  '5':
  - type: usfm
