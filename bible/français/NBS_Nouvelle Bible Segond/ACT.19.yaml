  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 18.6s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: obstinément réfractaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme quelques-uns s'endurcissaient et refusaient (de croire)…
      - type: usfm
