          text: 'comme quelques-uns d''entre eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les Juifs) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''endurcissaient… et parlaient en mal de la Voie devant la multitude des non-Juifs… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la Voie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il s''éloigna d''eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il rompit avec eux
      - type: usfm
        marker: ft
        children:
        - type: text
