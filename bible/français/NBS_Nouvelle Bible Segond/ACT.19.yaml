      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; formule analogue 8.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 28.19s. Le texte occidental ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour le pardon des péchés.
      marker-yv: yv-n
    - type: text
      text: 'Sur ces paroles, ils reçurent le baptême pour le nom du Seigneur Jésus. '
  '6':
  - type: usfm
    marker: p
