document_id: ACT.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul à Ephèse
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : Alors que Paul avait décidé, quant à lui, de se rendre à Jérusalem, l''Esprit lui dit de retourner en Asie. Passant donc par le haut-pays, il arriva à Ephèse…  : cf. v. 21n  ; 18.19n-23 ; 20.16s ; 21.29 ; 1Co 15.32 ; 16.8 ; Ep 1.1 ; 1Tm 1.3 ; 2Tm 1.18 ; 4.12 ; Ap 1.11+. –  Apollos était à Corinthe 18.24+,27s.'
  - type: text
    content: 'Pendant qu''Apollos était à Corinthe, Paul, qui était passé par le haut-pays, descendit à Ephèse. Il y trouva quelques disciples '
  '10':
  - type: note
    content: 'deux ans  : cf. 18.11 ; voir aussi 19.8 ; 20.31 ; 1Co 16.8. –  Asie  : région d''Ephèse (v. 1), cf. 16.6n. – D''après une reconstitution, le texte occidental aurait omis Juifs et Grecs ainsi que du Seigneur.'
  - type: text
    content: Cela dura deux ans, de sorte que tous ceux qui habitaient l'Asie, Juifs et Grecs, entendirent la parole du Seigneur.
  - type: heading
    content: Les fils de Scéva
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.12-16 ; 14.3. –  miracles Lc 10.13n.
  - type: text
    content: 'Dieu faisait des miracles extraordinaires par les mains de Paul, '
  '12':
  - type: note
    content: Cf. 16.16-18 ; Lc 8.44/ /.
  - type: text
    content: au point qu'on appliquait sur les malades des linges ou des étoffes qui avaient touché son corps ; alors les maladies les quittaient et les esprits mauvais sortaient.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'exorcistes… Juifs  : cf. 13.6 ; Mt 12.27. –  le nom du Seigneur Jésus 3.6+,16 ; cf. Lc 9.49s/ /.'
  - type: text
    content: 'Quelques exorcistes ambulants, des Juifs, entreprirent de prononcer sur ceux qui avaient des esprits mauvais le nom du Seigneur Jésus, en disant : Je vous conjure par Jésus, celui que Paul proclame ! '
  '14':
  - type: note
    content: 'Texte occidental  : Parmi eux les [sept] fils de Scéva, un prêtre, voulaient faire la même chose. Ils avaient l''habitude d''exorciser de tels hommes ; s''approchant du possédé, ils commençaient à invoquer sur lui le nom en disant : « Nous t''ordonnons de sortir, par Jésus que Paul annonce. » cf. 16.18 ; le nom Scéva pourrait transcrire un nom hébreu correspondant au chiffre sept (cf. v. 16n). –  un des grands prêtres  : autre traduction un grand prêtre  ; cf. Mt 2.4n  ; le don d''exorcisme est attribué au grand prêtre dans le Testament de Lévi (voir Lc 10.19n).'
  - type: text
    content: 'Il y avait sept fils d''un certain Scéva, un des grands prêtres juifs, qui faisaient cela. '
  '15':
  - type: note
    content: Cf. 16.17 ; Lc 4.41/ /.
  - type: text
    content: 'L''esprit mauvais leur répondit : Jésus, je le connais, et je sais bien qui est Paul ; mais vous, qui êtes-vous ? '
  '16':
  - type: note
    content: 'prit l''avantage  : autre traduction les maîtrisa  ; le verbe correspondant est apparenté au mot habituellement traduit par seigneur ou maître  ; cf. Mc 10.42n. –  tous  : le mot grec signifie habituellement tous les deux, mais il est susceptible d''un emploi plus large (cf. 23.8n).'
  - type: text
    content: 'Et l''homme dans lequel était l''esprit mauvais se jeta sur eux, prit l''avantage et les battit tous avec une telle force qu''ils s''enfuirent de cette maison nus et blessés. '
  '17':
  - type: note
    content: 'connu…  : cf. 1.19+ ; 4.16. –  Juifs et Grecs 14.1+. –  crainte 2.43+. –  s''empara 8.16n.'
  - type: text
    content: Cela fut connu de tous ceux qui habitaient Ephèse, Juifs et Grecs ; la crainte s'empara d'eux tous, et le nom du Seigneur Jésus était magnifié.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'qui étaient devenus croyants  : texte occidental  : qui devenaient croyants . –  reconnaissant publiquement  : litt. en confessant (verbe apparenté en 7.17n  ; cf. Mc 1.5n) et annonçant . –  leurs pratiques , probablement au sens de pratiques magiques (v. 19).'
  - type: text
    content: 'Beaucoup de ceux qui étaient devenus croyants venaient en reconnaissant publiquement leurs pratiques. '
  '19':
  - type: note
    content: 'les sciences occultes  : cf. Dt 18.10-14. Le terme correspondant n''apparaît qu''ici, avec ce sens, dans le N.T. ; en 1Tm 5.13 on le retrouve dans un sens plus courant, désignant le défaut consistant à se mêler des affaires d''autrui. Les « lettres éphésiennes », inscriptions figurant sur la statue d''Artémis à Ephèse, étaient réputées dans le monde antique pour leurs vertus magiques. –  livres  : on a retrouvé de nombreux grimoires de ce genre, écrits en grec sur des papyrus. –  on l''estima à  : litt. on trouva. –  pièces d''argent  : probablement des drachmes (voir mesures, poids et monnaies).'
  - type: text
    content: 'Bon nombre de ceux qui avaient pratiqué les sciences occultes apportaient leurs livres et les brûlaient devant tous. On en calcula le prix et on l''estima à cinquante mille pièces d''argent. '
  '2':
  - type: note
    content: 'Cf. 8.15-17. –  et leur dit  : un ms semble avoir lu et il dit aux disciples (selon une reconstitution, la proposition il y trouva quelques disciples au v. 1 était absente d''un état ancien du texte occidental). –  entendu parler d''un Esprit saint ou, plus littéralement, entendu dire qu''il y a un Esprit saint  ; cf. Jn 7.39. Texte occidental que certains reçoivent l''Esprit saint.'
  - type: text
    content: 'et leur dit : Avez-vous reçu l''Esprit saint quand vous êtes devenus croyants ? Ils lui répondirent : Nous n''avons même pas entendu parler d''un Esprit saint. '
  '20':
  - type: note
    content: 'se répandait…  : litt. croissait et se fortifiait  ; cf. 2.41+,47 ; 6.7 ; 12.24.'
  - type: text
    content: C'est ainsi que, par le pouvoir du Seigneur, la Parole se répandait et gagnait en force.
  - type: heading
    content: Emeute à Ephèse et départ de Paul
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Après cela  : litt. lorsque ces choses furent accomplies (cf. Lc 1.1). –  forma le projet  : litt. mit dans l''esprit  ; autre traduction décida par l''Esprit , cf. v. 1n  ; 20.22 ; voir aussi 24.17 ; 1Co 16.5s ; 2Co 1.15s. –  Achaïe 18.12+. –  Rome  : cf. 23.11 ; 27.24 ; Rm 1.10-15 ; 15.23 ; 2Co 10.16.'
  - type: text
    content: 'Après cela, Paul forma le projet d''aller à Jérusalem en passant par la Macédoine et l''Achaïe. Il disait : Quand je m''y serai rendu, il me faudra encore voir Rome. '
  '22':
  - type: note
    content: 'ses aides  : litt. ceux qui le servaient (voir 6.1n). –  Timothée 16.1+ ; cf. 1Co 4.17 ; 16.10. –  Eraste Rm 16.23 ; 2Tm 4.20. –  en Asie 16.6n.'
  - type: text
    content: Il envoya en Macédoine deux de ses aides, Timothée et Eraste, mais lui-même resta quelque temps en Asie.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 12.1 ; 1Co 15.32 ; 2Co 1.8-11. –  des troubles graves 12.18n. –  la Voie 9.2.
  - type: text
    content: 'En ce temps-là survinrent des troubles graves au sujet de la Voie. '
  '24':
  - type: note
    content: 'sanctuaires  : sans doute des reproductions (porte-bonheur ?) du principal monument d''Ephèse (l''une des « Sept Merveilles » du monde antique), consacré à la déesse Artémis (= Diane), dont le culte local était proche des rites orientaux de la fécondité. –  des gains  : autre traduction une activité (même terme au v. 25) ; cf. 16.16+.'
  - type: text
    content: 'Un orfèvre nommé Démétrios fabriquait des sanctuaires d''Artémis en argent et procurait des gains considérables aux artisans. '
  '25':
  - type: note
    content: 'Mes amis  : litt. Hommes  ; cf. v. 35 ; 14.15n.'
  - type: text
    content: 'Il rassembla ces derniers, avec tous les ouvriers qui exerçaient le même genre de métier, et dit : Mes amis, vous savez que notre prospérité dépend de cette activité ; '
  '26':
  - type: note
    content: 'Cf. 17.24s,29. –  des hommes  : sous-entendu dans le texte.'
  - type: text
    content: 'or vous voyez et entendez que, non seulement à Ephèse, mais dans presque toute l''Asie, ce Paul a persuadé et détourné une foule importante en disant que les dieux faits par la main des hommes ne sont pas des dieux. '
  '27':
  - type: note
    content: 'sur notre profession  : cf. 16.19. –  ruiner toute estime  : litt. que le temple… soit compté pour rien, cf. Es 40.17. –  adorée 13.43n  ; voir culte.'
  - type: text
    content: Cela risque non seulement de jeter le discrédit sur notre profession, mais encore de ruiner toute estime pour le temple de la grande déesse Artémis, et même de dépouiller de son prestige celle qui est adorée de toute l'Asie et de toute la terre habitée !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'remplis de fureur  : cf. Lc 4.28. – Xénophon (Ve-IVe s. av. J.-C.), qui était lui-même originaire d''Ephèse, parle de « notre déesse ancestrale, la grande Artémis des Ephésiens » ; cf. Daniel grec 14.18 où, alors que le culte païen est accusé de supercherie, le roi salue son dieu par ces mots : « Tu es grand, ô Bel ! et il n''y a en toi aucune fourberie ! »'
  - type: text
    content: 'Quand ils entendirent cela, ils furent remplis de fureur et se mirent à crier : Grande est l''Artémis des Ephésiens ! '
  '29':
  - type: note
    content: 'se précipitèrent… 7.57. – Le théâtre d''Ephèse pouvait contenir au moins 24 000 personnes. –  Gaïos  : cf. 20.4n  ; Rm 16.23 ; 1Co 1.14 ; 3Jn 1. –  Aristarque 20.4 ; 27.2 ; Col 4.10 ; Phm 24.'
  - type: text
    content: 'La confusion gagna toute la ville. Tous, d''un commun accord, se précipitèrent au théâtre et entraînèrent avec eux les Macédoniens Gaïos et Aristarque, compagnons de voyage de Paul. '
  '3':
  - type: note
    content: 'Quel baptême…  : litt. pour quoi avez-vous donc été baptisés ?… pour le baptême de Jean, cf. 18.25 ; Jn 3.22 ; 4.1s.'
  - type: text
    content: 'Il dit : Quel baptême avez-vous donc reçu ? Ils répondirent : Le baptême de Jean. '
  '30':
  - type: text
    content: 'Paul était décidé à se présenter devant le peuple, mais les disciples ne le lui permirent pas ; '
  '31':
  - type: note
    content: 'Les asiarques étaient des représentants des villes d''Asie, élus chaque année ; certains d''entre eux au moins présidaient au culte de l''empereur. Peut-être s''agit-il ici de personnages qui avaient occupé cette fonction par le passé et en avaient gardé le titre. –  des messagers  : cette précision est sous-entendue dans le texte grec. –  supplier…  : cf. 21.12.'
  - type: text
    content: 'et même quelques-uns des asiarques, qui étaient de ses amis, lui envoyèrent des messagers pour le supplier de ne pas se rendre au théâtre. '
  '32':
  - type: note
    content: 'Cf. 21.34. –  assemblée  : c''est le mot grec habituellement transcrit Eglise, cf. 5.11n  ; de même aux v. 39s.'
  - type: text
    content: 'Les uns criaient une chose, les autres une autre ; en effet, la confusion régnait dans l''assemblée, la plupart des gens ne sachant même pas pourquoi ils s''étaient réunis. '
  '33':
  - type: note
    content: 'Texte obscur. –  renseignèrent  : autres traductions convainquirent ; désignèrent  ; certains mss portent un autre verbe, apparenté, qu''on pourrait traduire par firent descendre ou mirent en avant. –  Alexandre  : on ignore de qui il s''agit ; cf. 1Tm 1.20 ; 2Tm 4.14. –  signe de la main  : cf. 12.17+. –  présenter sa défense 22.1n.'
  - type: text
    content: 'Dans la foule, des gens renseignèrent Alexandre, que les Juifs poussaient en avant ; Alexandre faisait signe de la main et voulait présenter sa défense devant le peuple. '
  '34':
  - type: note
    content: 'Juif  : cf. 16.20.'
  - type: text
    content: 'Mais quand ils reconnurent en lui un Juif, tous se mirent à crier d''une seule voix, pendant près de deux heures : Grande est l''Artémis des Ephésiens !'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'son emblème tombé du ciel  : traduction incertaine, litt. ce qui est tombé d''en haut  ; certains pensent qu''il s''agit d''un météorite rappelant des formes féminines.'
  - type: text
    content: 'Mais le secrétaire parvint à calmer la foule et dit : Hommes d''Ephèse, qui ne sait pas que la ville d''Ephèse est la gardienne du temple de la grande Artémis et de son emblème tombé du ciel ? '
  '36':
  - type: text
    content: 'Puisque cela est incontestable, vous devez vous tenir calmes et ne rien faire avec précipitation. '
  '37':
  - type: note
    content: 'sacrilège  : cf. Rm 2.22n  ; voir saint.'
  - type: text
    content: 'En effet, ces hommes que vous avez amenés n''ont commis ni sacrilège ni blasphème envers notre déesse. '
  '38':
  - type: note
    content: proconsuls 13.7+.
  - type: text
    content: 'Si donc Démétrios et les artisans qui sont avec lui ont un grief contre quelqu''un, il y a des jours d''audience et des proconsuls : qu''ils portent plainte ! '
  '39':
  - type: note
    content: 'assemblée légale  : cf. v. 32n.'
  - type: text
    content: 'Et si vous avez d''autres réclamations, cela se réglera dans l''assemblée légale. '
  '4':
  - type: note
    content: 1.5+ ; 13.24 ; Lc 3.3,15-18/ /. –  changement radical 2.38n. –  mettre sa foi ou croire, le même verbe est traduit par devenir croyant v. 2,18.
  - type: text
    content: 'Alors Paul dit : Jean a baptisé d''un baptême de changement radical ; il disait au peuple de mettre sa foi en celui qui venait après lui, c''est-à-dire en Jésus. '
  '40':
  - type: note
    content: 'sédition  : cf. 15.2n. –  il n''existe…  : sens probable d''un texte grec difficile, qui varie selon les mss ; certains le corrigent pour lire bien que nous ne soyons coupables de rien dont nous ne puissions rendre compte en ce qui concerne cet attroupement (cf. 23.12n). –  rendre compte  : cf. Lc 16.2+.'
  - type: text
    content: Nous risquons, en effet, d'être accusés de sédition pour ce qui s'est passé aujourd'hui, car il n'existe aucun motif qui nous permette de rendre compte de cet attroupement. Après avoir dit cela, il renvoya l'assemblée.
  '5':
  - type: note
    content: '2.38+. –  pour le nom  : cf. v. 3n  ; autre traduction au nom  ; formule analogue 8.16n  ; Mt 28.19s. Le texte occidental ajoute pour le pardon des péchés.'
  - type: text
    content: 'Sur ces paroles, ils reçurent le baptême pour le nom du Seigneur Jésus. '
  '6':
  - type: note
    content: leur imposa les mains 6.6+. –  l'Esprit saint vint 8.15+ ; cf. 10.46. –  parler en langues 2.4n. –  s'exprimer (ou agir) en prophètes 2.17s.
  - type: text
    content: 'Paul leur imposa les mains, et l''Esprit saint vint sur eux ; ils se mirent à parler en langues et à s''exprimer en prophètes. '
  '7':
  - type: note
    content: 'Texte occidental reconstitué  : Ces hommes étaient douze.'
  - type: text
    content: Ces hommes étaient une douzaine en tout.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'à la synagogue 13.5+. –  avec assurance  : cf. 2.29n. –  discussions 17.2n. –  règne de Dieu 1.3+.'
  - type: text
    content: 'Il se rendit à la synagogue, où il parla avec assurance ; pendant trois mois il eut des discussions où il usait de persuasion en ce qui concerne le règne de Dieu. '
  '9':
  - type: note
    content: 'Cf. 18.6s. –  obstinément réfractaires  : litt. comme quelques-uns s''endurcissaient et refusaient (de croire)…  ; texte occidental  : comme quelques-uns d''entre eux (les Juifs) s''endurcissaient… et parlaient en mal de la Voie devant la multitude des non-Juifs… –  la Voie 9.2+. –  il s''éloigna d''eux ou il rompit avec eux  : cf. 15.38+ ; Rm 16.17+ ; 2Co 6.17. –  chaque jour  : le texte occidental précise  : de la cinquième à la dixième heure, c.-à-d. entre 11 h du matin et 4 h de l''après-midi environ (le temps du repas et de la sieste, pendant lequel la salle était inoccupée). –  Tyrannos (un enseignant, ou le propriétaire de la salle ?) est inconnu par ailleurs.'
  - type: text
    content: 'Mais comme quelques-uns, obstinément réfractaires, parlaient en mal de la Voie devant la multitude, il s''éloigna d''eux et prit les disciples à part ; il discutait avec eux chaque jour dans l''école de Tyrannos. '
