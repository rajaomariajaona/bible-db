        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.17s.
      marker-yv: yv-n
    - type: text
      text: 'Paul leur imposa les mains, et l''Esprit saint vint sur eux ; ils se mirent à parler en langues et à s''exprimer en prophètes. '
  '7':
  - type: usfm
    marker: p
