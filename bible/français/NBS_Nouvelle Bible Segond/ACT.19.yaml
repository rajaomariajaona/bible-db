      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tyrannos '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (un enseignant, ou le propriétaire de la salle ?) est inconnu par ailleurs.
      marker-yv: yv-n
    - type: text
      text: 'Mais comme quelques-uns, obstinément réfractaires, parlaient en mal de la Voie devant la multitude, il s''éloigna d''eux et prit les disciples à part ; il discutait avec eux chaque jour dans l''école de Tyrannos. '
