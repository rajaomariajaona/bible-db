document_id: PSA.101,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le roi s'engage à respecter le droit
  - type: text
    content: ' '
  - type: note
    content: le jugement ou le droit  ; cf. 71.22 ; 72.1ss ; 89.2 ; 119.54,172 ; 122.5 ; Es 55.3 ; Os 12.7 ; Mi 6.8. –  je chanterai 7.18n.
  - type: text
    content: De David. Psaume.
  - type: text
    content: Je chanterai la fidélité et le jugement.
  - type: text
    content: 'C''est pour toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', que je chanterai.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.21ss. –  voie des gens intègres 119.1 ; cf. 15.2. –  Quand viendras-tu à moi  : certains modifient le texte hébreu traditionnel pour lire que la vérité (ou la loyauté ) vienne devant moi ! –  Je suivrai…  : cf. 15.2+ ; 26.1n. –  mon cœur intègre 78.72 ; Gn 20.5s ; 1R 9.4. –  au sein de ma maison  : cf. Jos 24.15 ; 1Tm 3.4,15.'
  - type: text
    content: Je serai attentif à la voie des gens intègres.
  - type: text
    content: Quand viendras-tu à moi ?
  - type: text
    content: Je suivrai la voie de mon cœur intègre,
  - type: text
    content: au sein de ma maison.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'rien de destructeur  : cf. 18.5n  ; 41.9n  ; Dt 13.14n  ; 15.9n  ; Na 2.1n. –  devant mes yeux  : cf. 40.5 ; Es 33.15. –  le comportement…  : LXX a lu ceux qui se comportent en dévoyés  ; cf. 139.21 ; Jd 23.'
  - type: text
    content: Je ne mettrai rien de destructeur devant mes yeux ;
  - type: text
    content: je déteste le comportement des dévoyés,
  - type: text
    content: il ne s'attachera pas à moi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'cœur tortueux  : cf. 18.27 ; Dt 32.5 ; Pr 11.20 ; 17.20. –  je ne connaîtrai pas  : cf. 24.4 ; Ep 5.11.'
  - type: text
    content: Le cœur tortueux se détournera de moi ;
  - type: text
    content: je ne connaîtrai pas le mal.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'calomnie…  : cf. 50.20 ; Lv 19.16 ; Jc 4.11 ; sur le verbe qui apparaît ici, voir Pr 30.10n. –  les yeux hautains…  : litt. hauteur d''yeux et largeur de cœur  ; cf. 18.28 ; 131.1 ; Es 2.11 ; Pr 21.4 ; 28.25. –  je ne les supporterai pas  : LXX et Syr ont lu je ne mangerai pas avec lui  ; cf. Es 1.13.'
  - type: text
    content: Celui qui calomnie en secret son prochain,
  - type: text
    content: je le réduirai au silence ;
  - type: text
    content: les yeux hautains et le cœur vaniteux,
  - type: text
    content: je ne les supporterai pas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les hommes sûrs du pays  : cf. 35.20 ; 119.63 ; Pr 2.20. –  qu''ils habitent auprès de moi  : cf. 15.1 ; 61.5 ; 84.5. –  celui qui suit  : litt. celui qui marche dans  ; cf. v. 2. –  sera à mon service  : cf. 1Ch 28.1 ; 2Ch 17.19 ; ou m''assistera  ; cf. Nb 8.2 ; ou officiera pour moi  ; cf. Dt 10.8 ; 17.12 ; 21.5 ; Ez 40.46 ; 44.15ss.'
  - type: text
    content: J'aurai les yeux sur les hommes sûrs du pays,
  - type: text
    content: pour qu'ils habitent auprès de moi ;
  - type: text
    content: celui qui suit la voie des gens intègres
  - type: text
    content: sera à mon service.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 26.4s ; 52.4. –  en ma présence  : litt. devant mes yeux , c.-à-d. sous mon regard  ; cf. Pr 20.8.'
  - type: text
    content: Le trompeur n'habitera pas dans ma maison.
  - type: text
    content: Le menteur ne subsistera pas en ma présence.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 72.4 ; 2S 23.3ss ; Es 11.4 ; Pr 20.26 ; 25.5 ; Ap 1.16. –  Chaque matin  : cf. 30.6+ ; voir aussi 2S 15.2 ; Jr 21.12. –  méchants  : voir justice. –  de la ville… Es 52.1 ; Ap 21.27 ; 22.15,19. –  malfaisants 5.6+.'
  - type: text
    content: Chaque matin je réduirai au silence tous les méchants du pays,
  - type: text
    content: 'pour retrancher de la ville du '
  - type: text
    content: Seigneur
  - type: text
    content: ' tous les malfaisants.'
