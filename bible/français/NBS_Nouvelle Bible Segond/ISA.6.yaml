      marker-yv: yv-n
    - type: text
      text: 'Je dis : Jusqu''à quand, Seigneur ? Et il répondit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jusqu'à ce que les villes soient saccagées, sans habitants,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les maisons sans hommes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la terre saccagée, dévastée ;
