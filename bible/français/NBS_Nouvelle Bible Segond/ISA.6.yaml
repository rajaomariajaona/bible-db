document_id: ISA.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Esaïe devient prophète du Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'L''année… ≈ 740 av. J.-C. –  mort du roi Ozias 1.1 ; 2Ch 26.21-23. –  trône 1R 22.19 ; Ap 4.2. –  très élevé  : mêmes termes hébreux en 2.13n  ; 52.13 ; 57.15n. –  le temple  : hébreu hékal  ; ce mot désigne normalement le lieu également dit sacré ou saint , par opposition au devir , le Secret , également appelé très-sacré ou saint des saints  ; l''ensemble est souvent désigné par le mot maison (cf. 1R 6.1-38). – Cf. Am 9.1.'
  - type: text
    content: 'L''année de la mort du roi Ozias, je vis le Seigneur assis sur un trône très élevé ; le bas de son vêtement remplissait le temple. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Engourdis  : litt. engraisse  ; cf. 1.5 ; 29.9-12 ; Jr 1.10 ; 5.21 ; Ez 2.3-10 ; 3.4 ; Za 7.11 ; Jc 5.5. – Voir cœur. –  rends-le dur d''oreille  : litt. alourdis ses oreilles . –  revienne 1.27n. – Cf. Ex 7.3n.'
  - type: text
    content: Engourdis le cœur de ce peuple,
  - type: text
    content: rends-le dur d'oreille
  - type: text
    content: et ferme-lui les yeux,
  - type: text
    content: de peur qu'il ne voie de ses yeux,
  - type: text
    content: qu'il n'entende de ses oreilles,
  - type: text
    content: que son cœur ne comprenne,
  - type: text
    content: qu'il ne revienne et ne soit guéri.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Jusqu'à quand Ha 1.2 ; Ps 6.4+ ; cf. Ex 32.11-13 ; Dt 9.26-29. –  saccagée / dévastée 1.7+.
  - type: text
    content: 'Je dis : Jusqu''à quand, Seigneur ? Et il répondit :'
  - type: text
    content: Jusqu'à ce que les villes soient saccagées, sans habitants,
  - type: text
    content: les maisons sans hommes,
  - type: text
    content: et la terre saccagée, dévastée ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'et que le pays…  : litt. et que l''abandonnée (ou l''abandon  ; le même terme apparaît en 54.6 ; Jr 4.29 ; So 2.4 ; il est traduit par délaissée en Es 60.15 ; 62.4) s''accroisse au sein du pays  ; cf. 7.16.'
  - type: text
    content: 'jusqu''à ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ait éloigné les hommes'
  - type: text
    content: et que le pays soit tout à fait abandonné.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'un dixième  : cf. 1S 11.8 ; 2S 19.44 ; 1R 11.31s. –  incendie 4.4n. –  térébinthe 1.29n. –  chêne 2.13. –  leur souche (sur ce mot, cf. 19.19n  ; 2S 18.18 [pierre levée]) …  : la dernière phrase est absente de nombreux mss. –  descendance  : le même mot peut aussi avoir le sens de semence  ; cf. Gn 3.15n. –  sainte ou sacrée.'
  - type: text
    content: S'il y reste encore un dixième des habitants,
  - type: text
    content: il repassera par l'incendie ;
  - type: text
    content: mais, comme le térébinthe et le chêne
  - type: text
    content: conservent leur souche quand ils sont abattus,
  - type: text
    content: sa souche donnera une descendance sainte.
  '2':
  - type: note
    content: 'seraphim  : ce nom, qui a donné notre mot séraphin, vient du verbe hébreu saraph, qui signifie brûler. Dans le Pentateuque, il qualifie des serpents venimeux du désert dont la morsure brûlait (Nb 21.6,8 ; Dt 8.15 ; cf. 2R 18.4). Ce nom ne réapparaît que dans Esaïe (14.29 ; 30.6 [dragon (volant)]). Ici, les seraphim apparaissent comme des êtres surnaturels, hérauts de YHWH considéré comme roi (v. 5). –  six ailes  : cf. Ez 1.11. –  les jambes  : autre traduction les pieds  ; certains voient dans cette expression un euphémisme pour les organes sexuels, de même en 7.20 (cf. Ex 4.25n).'
  - type: text
    content: 'Des seraphim se tenaient au-dessus de lui ; ils avaient chacun six ailes : deux dont ils se couvraient la face, deux dont ils se couvraient les jambes, et deux dont ils se servaient pour voler. '
  '3':
  - type: note
    content: 'Ils s''appelaient…  : autre traduction ils se criaient l''un à l''autre (cf. v. 4). –  Saint…  : cf. 1.4n  ; 57.15 ; Ap 4.8. –  Toute la terre…  : litt. plénitude de toute la terre sa gloire  ; cf. 8.8n  ; Nb 14.21 ; Ps 24.1+ ; 57.6,12 ; 72.19 ; 108.6 ; Jr 23.23 ; voir aussi Ps 29.9.'
  - type: text
    content: 'Ils s''appelaient l''un l''autre et disaient :'
  - type: text
    content: 'Saint, saint, saint est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées !'
  - type: text
    content: Toute la terre est remplie de sa gloire !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'soubassements  : le même mot hébreu signifie coudées  ; traduction incertaine. –  seuils Am 9.1. – Cf. 4.5 ; Ex 19.16-19 ; 20.18 ; 40.34 ; 1R 8.10 ; Ps 18.8-14 ; 29 ; 68.9,34 ; 77.18s ; Jb 37.2-4.'
  - type: text
    content: 'Les soubassements des seuils frémissaient à la voix de celui qui appelait, et la Maison se remplit de fumée. '
  '5':
  - type: note
    content: 'Quel malheur pour moi 24.16. –  Je suis perdu ou je suis réduit au silence. –  impures  : voir pur. –  mes yeux ont vu Ex 3.6n  ; 33.20 ; Jg 6.22 ; 13.22 ; 1R 19.13 ; Jb 42.5. –  le Roi  : cf. v. 1.'
  - type: text
    content: 'Alors je dis :'
  - type: text
    content: Quel malheur pour moi ! Je suis perdu,
  - type: text
    content: car je suis un homme aux lèvres impures,
  - type: text
    content: j'habite au milieu d'un peuple aux lèvres impures,
  - type: text
    content: 'et mes yeux ont vu le Roi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'une braise  : le mot hébreu correspondant est traduit par pierre chaude en 1R 19.6. –  l''autel  : sans doute l''autel des parfums, le seul à être situé à l''intérieur ; l''autel des sacrifices se trouvait dans la cour (Ex 40.5-8). – Cf. Ap 8.5.'
  - type: text
    content: 'Mais l''un des seraphim vola vers moi, tenant à la main une braise qu''il avait prise sur l''autel, avec des pincettes. '
  '7':
  - type: note
    content: 'Cf. Nb 31.21-23. –  bouche  : cf. Jr 1.9 ; Ez 2.8 ; Dn 10.16. –  ton péché est expié  : cf. 22.14 ; Ex 29.36s ; Lv 16 ; Jr 18.23.'
  - type: text
    content: 'Il toucha ma bouche et dit :'
  - type: text
    content: 'Ceci a touché tes lèvres :'
  - type: text
    content: ta faute est enlevée,
  - type: text
    content: ton péché est expié.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 40.6 ; 1R 22.20. –  le Seigneur  : litt. la voix du Seigneur.'
  - type: text
    content: 'J''entendis le Seigneur qui disait : Qui enverrai-je ? Qui ira pour nous ? Je répondis : Je suis là, envoie-moi ! '
  '9':
  - type: note
    content: 'ce peuple  : cf. v. 10 ; 8.6,11s ; 9.15 ; 28.11,14 ; 29.13s. –  n''apprendrez  : autre traduction ne saurez. – Cf. 43.8 ; les v. 9s sont cités plusieurs fois dans le N.T. d''après LXX  : Mt 13.14s ; Mc 4.12  ; Lc 8.9 ; Jn 12.40 ; Ac 28.26s.'
  - type: text
    content: 'Il dit alors :'
  - type: text
    content: 'Va dire à ce peuple :'
  - type: text
    content: Ecoutez toujours,
  - type: text
    content: mais vous ne comprendrez rien !
  - type: text
    content: Regardez toujours,
  - type: text
    content: mais vous n'apprendrez rien !
