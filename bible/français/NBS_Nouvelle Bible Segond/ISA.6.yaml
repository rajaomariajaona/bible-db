      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'brûler. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dans le Pentateuque, il qualifie des serpents venimeux du désert dont la morsure brûlait (Nb 21.6,8 ; Dt 8.15 ; cf. 2R 18.4). Ce nom ne réapparaît que dans Esaïe (14.29 ; 30.6 [
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dragon (volant)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ']). Ici, les '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seraphim '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'apparaissent comme des êtres surnaturels, hérauts de YHWH considéré comme roi (v. 5). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: six ailes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 1.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les jambes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les pieds
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains voient dans cette expression un euphémisme pour les organes sexuels, de même en 7.20 (cf. Ex 4.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Des seraphim se tenaient au-dessus de lui ; ils avaient chacun six ailes : deux dont ils se couvraient la face, deux dont ils se couvraient les jambes, et deux dont ils se servaient pour voler. '
