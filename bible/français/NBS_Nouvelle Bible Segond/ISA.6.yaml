    children:
    - type: text
      text: rends-le dur d'oreille
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ferme-lui les yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: de peur qu'il ne voie de ses yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qu'il n'entende de ses oreilles,
  - type: usfm
    marker: q1
    children:
