document_id: PSA.145,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ton règne dure à tout jamais
  - type: text
    content: ' '
  - type: note
    content: 'Psaume alphabétique (9.1n  ; 25.1n). –  Je t''exalterai… 30.2 ; 61.9 ; cf. Ex 15.1ss. –  roi 5.3 ; 44.5 ; 84.4. –  toujours…  : cf. v. 2,21 ; dans un ms de Qumrân chaque v. du psaume est suivi du refrain Béni soit le Seigneur, béni soit son nom pour toujours…'
  - type: text
    content: Louange. De David.
  - type: text
    content: Je t'exalterai, mon Dieu, toi qui es le roi ;
  - type: text
    content: pour toujours, à jamais je bénirai ton nom.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 103.22.
  - type: text
    content: 'Toutes tes œuvres te célébreront, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: et tes fidèles te béniront.
  '11':
  - type: text
    content: Ils diront la gloire de ton règne,
  - type: text
    content: et ils parleront de ta puissance,
  '12':
  - type: text
    content: ' '
  - type: note
    content: tes hauts faits / ton règne , d'après LXX  ; le texte hébreu traditionnel a la troisième personne ses hauts faits / son règne  ; cf. 1Ch 29.11.
  - type: text
    content: pour faire connaître aux humains tes hauts faits
  - type: text
    content: et la gloire magnifique de ton règne.
  '13':
  - type: text
    content: ' '
  - type: note
    content: '9.8+ ; 146.10 ; Ex 15.18 ; Dn 4.31. Un ms de Qumrân et plusieurs versions anciennes ajoutent à la fin du v. un vers supplémentaire, qui correspond à une lettre manquant dans l''ordre alphabétique hébreu (v. 1n)  : Le Seigneur est fidèle dans tous ses actes (ou dans toutes ses paroles ), et bon dans toutes ses œuvres  ; cf. 1Co 10.13.'
  - type: text
    content: Ton règne s'étend sur tous les âges,
  - type: text
    content: ta domination sur toutes les générations.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 37.24 ; 94.18 ; 146.8.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' soutient tous ceux qui tombent,'
  - type: text
    content: il redresse tous ceux qui sont courbés.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 104.27 ; 123.2 ; Mt 6.26/ /.
  - type: text
    content: Tous, avec espoir, tournent les yeux vers toi,
  - type: text
    content: c'est toi qui leur donnes leur nourriture en son temps.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 104.28 ; cf. Ac 14.17.
  - type: text
    content: Tu ouvres ta main
  - type: text
    content: et tu rassasies à souhait tout être vivant.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 18.31 ; Dt 32.4 ; Dn 9.14 ; Ap 15.3  ; 16.5.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est juste dans toutes ses voies'
  - type: text
    content: et fidèle dans toutes ses œuvres.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur est proche… 34.19 ; 119.151 ; Dt 4.7 ; Ac 17.27 ; Ph 4.5. –  avec loyauté  : autre traduction en vérité  ; cf. 85.11n  ; Ex 20.7 ; Es 58.9 ; Jr 29.13 ; Jn 4.23s.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est proche de tous ceux qui l''invoquent,'
  - type: text
    content: de tous ceux qui l'invoquent avec loyauté ;
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'il réalise  : litt. il fait . –  les souhaits Pr 10.24. –  ceux qui le craignent 15.4+. –  il entend… 34.18 ; cf. Jn 9.31.'
  - type: text
    content: il réalise les souhaits de ceux qui le craignent,
  - type: text
    content: il entend leurs appels au secours et il les sauve.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je te bénirai…  : cf. 34.2 ; 63.5 ; 68.20 ; 96.2. –  sans cesse  : litt. tout le jour.'
  - type: text
    content: Je te bénirai sans cesse ;
  - type: text
    content: pour toujours, à jamais je louerai ton nom.
  '20':
  - type: text
    content: ' '
  - type: note
    content: garde 37.28 ; 97.10 ; 121.4s.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' garde tous ceux qui l''aiment,'
  - type: text
    content: il détruit tous les méchants.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'pour toujours, à jamais  : cf. v. 1s. –  tout être  : litt. toute chair. –  sacré  : voir saint. – Plusieurs mss ajoutent  : Et nous, nous bénirons le Seigneur, dès maintenant et pour toujours ! Louez le Seigneur  ! (115.18).'
  - type: text
    content: 'Que ma bouche dise la louange du '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Que pour toujours, à jamais, tout être bénisse son nom sacré !
  '3':
  - type: text
    content: ' '
  - type: note
    content: Le Seigneur est grand 48.2+ ; 147.5.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand et digne de toute louange,'
  - type: text
    content: sa grandeur est insondable.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'De génération en génération…  : autre traduction que chaque génération fasse l''éloge…  ; cf. 19.3 ; 78.4.'
  - type: text
    content: De génération en génération, qu'on fasse l'éloge de tes œuvres,
  - type: text
    content: qu'on raconte tes hauts faits,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Autre lecture possible, d''après des versions anciennes  : on racontera la magnificence… on méditera tes actes étonnants. – Voir gloire.'
  - type: text
    content: la magnificence éclatante de ta gloire ;
  - type: text
    content: je méditerai le récit de tes actes étonnants.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'je raconterai tes hauts faits  : autre lecture traditionnelle je dirai ta grandeur  ; cf. 66.3.'
  - type: text
    content: On parlera de ta force redoutable,
  - type: text
    content: et je raconterai tes hauts faits.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'On proclamera  : litt. on fera jaillir , cf. 19.3n  ; 119.171n  ; cf. Es 63.7. –  le souvenir (ou l''évocation , 6.6n) …  : autre traduction ton nom immensément bon. –  on criera ta justice  : autre traduction on criera de joie pour ta justice (ou ta victoire ).'
  - type: text
    content: On proclamera le souvenir de ton immense bonté,
  - type: text
    content: on criera ta justice.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'grand par la fidélité  : expressions analogues en Nb 14.18s ; cf. 103.8 ; 111.4 ; Ex 34.6 ; Né 1.5.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est clément et compatissant,'
  - type: text
    content: patient et grand par la fidélité.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 86.5.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est bon envers tous,'
  - type: text
    content: sa compassion s'étend sur toutes ses œuvres.
