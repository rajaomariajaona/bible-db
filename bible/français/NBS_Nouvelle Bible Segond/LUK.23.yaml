document_id: LUK.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus comparaît devant Pilate
  - type: heading
    content: Mt 27.2,11-14  ; Mc 15.1-5  ; Jn 18.28,33-38
  - type: text
    content: ' '
  - type: note
    content: 'se levèrent  : cf. 1.39n. –  tous ensemble  : litt. toute leur assemblée  : le même terme est traduit par multitude en 1.10+. –  Pilate 3.1n  ; cf. 20.20 ; Jn 18.28s.'
  - type: text
    content: Ils se levèrent tous ensemble et le conduisirent devant Pilate.
  '10':
  - type: note
    content: 'Un témoin syriaque omet les v. 10-12. –  grands prêtres / scribes  : 9.22+ ; 22.66 ; Mt 2.4n  ; Mc 8.31n. –  avec véhémence Ac 18.28n.'
  - type: text
    content: 'Les grands prêtres et les scribes étaient là et l''accusaient avec véhémence. '
  '11':
  - type: note
    content: 'Cf. 9.22+ ; Mc 15.16ss. –  aussi  : le terme correspondant est absent de certains mss. –  habit resplendissant  : cf. 7.25 ; même expression Ac 10.30 ; voir aussi Jc 2.2s ; Ap 15.6n.'
  - type: text
    content: 'Alors Hérode aussi, avec ses gardes, le traita avec mépris ; et après s''être moqué de lui et l''avoir revêtu d''un habit resplendissant, il le renvoya à Pilate. '
  '12':
  - type: note
    content: Dans l’Evangile de Pierre (v. 5 ; voir ♦) Hérode appelle Pilate « frère Pilate ».
  - type: text
    content: Ce jour même, Pilate et Hérode devinrent amis, d'ennemis qu'ils étaient auparavant.
  - type: heading
    content: Jésus est condamné à mort
  - type: heading
    content: Mt 27.11-26  ; Mc 15.1-15  ; Jn 18.39–19.16
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'grands prêtres… 9.22+ ; 22.66 ; cf. Jn 18.38–19.1. –  les chefs (18.18+) et le peuple  : certains témoins ont lu les chefs du peuple  ; cf. v. 27,35 ; 18.43+ ; 19.48+ ; 24.19s.'
  - type: text
    content: 'Pilate convoqua les grands prêtres, les chefs et le peuple, '
  '14':
  - type: note
    content: 'Cf. v. 1s,4s,23. –  entraînerait… à la révolte  : verbe différent de celui qui a été employé au v. 2, mais apparenté ; il est traduit par détourner en Ac 3.26. –  interrogé  : sur le verbe correspondant, qui évoque souvent une procédure judiciaire, cf. Ac 4.9n  ; 28.18 ; terme apparenté en Ac 25.26 (interrogatoire).'
  - type: text
    content: 'et leur dit : Vous m''avez amené cet homme parce qu''il entraînerait le peuple à la révolte. Or moi, je l''ai interrogé devant vous et je n''ai rien trouvé chez lui qui mérite condamnation, rien de ce dont vous l''accusez. '
  '15':
  - type: note
    content: 'Cf. v. 22. –  il nous l''a renvoyé v. 7n,11 ; certains mss portent je vous ai envoyés à lui, d''autres je l''ai envoyé à vous. –  rien de ce qu''il a fait…  : autre traduction possible  : on (c.-à-d. Hérode) ne lui a rien fait qui (donne à penser qu''il) mérite la mort  ; cf. Ac 23.29+.'
  - type: text
    content: 'Hérode non plus, car il nous l''a renvoyé. Ainsi, rien de ce qu''il a fait ne mérite la mort. '
  '16':
  - type: note
    content: châtier ou corriger v. 22 ; le verbe est employé dans un sens analogue par LXX en 1R 12.11,14 ; cf. Mc 15.15ss ; Jn 19.1ss.
  - type: text
    content: 'Je le relâcherai donc, après l''avoir fait châtier. [ '
  '17':
  - type: note
    content: 'Certains mss ajoutent  : il était tenu de leur relâcher quelqu''un à chaque fête  ; cf. Mc 15.6/ / ; Jn 18.39.'
  - type: text
    content: ']'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ac 3.13ss. –  tous ensemble v. 1,13. –  Supprime…  : litt. enlève celui-ci  ; même verbe grec en Jn 19.15n  ; Ac 8.33 ; 21.36n. –  Barabbas Mt 27.16n.'
  - type: text
    content: 'Ils s''écrièrent tous ensemble : Supprime cet individu, et relâche-nous Barabbas ! '
  '19':
  - type: note
    content: Cf. Mc 15.7/ /.
  - type: text
    content: 'Ce dernier avait été mis en prison pour une émeute qui avait eu lieu dans la ville et pour un meurtre. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.48 ; 20.6,19,26 ; 22.2 ; voir aussi 1R 18.17s ; Ac 24.5. –  inciter… à la révolte  : autres traductions subvertir, pervertir  ; un terme apparenté est traduit par pervers en 9.41 ; Ac 20.30 ; même verbe en Ac 13.8,10 ( détourner ) ; certains témoins ajoutent et d''abolir la Loi et les Prophètes (cf. Mt 5.17). –  empêche de payer les impôts  : comparer avec 20.20ss ; certains témoins ajoutent et détourne les femmes et les enfants . –  Christ (ou messie ) , roi  : autre traduction un roi consacré par l''onction , cf. 2.11n  ; 22.67 ; Jn 19.12+ ; Ac 17.7.'
  - type: text
    content: 'Ils se mirent à l''accuser, en disant : Nous avons trouvé cet individu en train d''inciter notre nation à la révolte ; il empêche de payer les impôts à César, et il se dit lui-même Christ, roi. '
  '20':
  - type: text
    content: 'Pilate leur lança de nouveau le même appel, car il voulait relâcher Jésus. '
  '21':
  - type: note
    content: Cf. Jn 19.6.
  - type: text
    content: 'Mais eux criaient : Crucifie-le ! crucifie-le ! '
  '22':
  - type: note
    content: 'pour la troisième fois  : cf. v. 4,15s ; Jn 18.38 ; 19.4,6.'
  - type: text
    content: 'Il leur dit pour la troisième fois : Quel mal a-t-il donc fait ? Je n''ai rien trouvé en lui qui mérite la mort. Je le relâcherai donc, après l''avoir fait châtier. '
  '23':
  - type: text
    content: Mais ils insistèrent à grands cris, en demandant qu'il soit crucifié. Et leurs cris l'emportèrent.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Ac 3.13s.
  - type: text
    content: 'Pilate ordonna qu''advienne ce qu''ils avaient demandé. '
  '25':
  - type: note
    content: 'Cf. v. 19. –  leur volonté  : cf. Mt 17.12 ; Ac 24.27.'
  - type: text
    content: Il relâcha celui qui avait été jeté en prison pour une émeute et pour un meurtre, celui qu'ils demandaient ; quant à Jésus, il le livra à leur volonté.
  - type: heading
    content: Jésus est crucifié
  - type: heading
    content: Mt 27.31-44  ; Mc 15.20-32  ; Jn 19.17-24
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'ils l''emmenaient ou on l''emmenait  ; cf. v. 13,25,36,47 ; Jn 19.16. –  Cyrène Mt 27.32n  ; Ac 2.10 ; 6.9 ; 11.20. –  la croix, pour qu''il la porte…  : cf. 9.23 ; 14.27.'
  - type: text
    content: Comme ils l'emmenaient, ils prirent un certain Simon, de Cyrène, qui venait de la campagne, et ils le chargèrent de la croix, pour qu'il la porte derrière Jésus.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'peuple 19.48+. –  femmes  : cf. v. 49,55s ; 8.2s. –  se frappaient la poitrine  : autre formule en grec au v. 48 et en 18.13 ; ici on pourrait traduire simplement se lamentaient , comme en 8.52, en considérant que le texte juxtapose deux synonymes ; voir aussi Za 12.10ss.'
  - type: text
    content: 'Une grande multitude du peuple et de femmes le suivait ; celles-ci se frappaient la poitrine et se lamentaient sur lui. '
  '28':
  - type: note
    content: 'Filles de Jérusalem Ct 2.7 ; 5.16 ; 8.4 ; voir aussi Jr 9.19s ; So 3.14n  ; Za 9.9n. –  ne pleurez pas…  : cf. 7.13+ ; 19.41 ; voir aussi 10.20.'
  - type: text
    content: 'Jésus se tourna vers elles et dit : Filles de Jérusalem, ne pleurez pas sur moi ; mais pleurez sur vous et sur vos enfants. '
  '29':
  - type: note
    content: 'les jours viennent 5.35+ ; 19.43s. –  Heureuses (cf. 6.20+ ; 11.28) les femmes stériles… 21.23/ / ; cf. Es 54.1ss. –  les ventres…  : cf. 11.27ns ; Os 9.14.'
  - type: text
    content: 'Car les jours viennent où l''on dira : « Heureuses les femmes stériles, heureux les ventres qui n''ont pas mis au monde et les seins qui n''ont pas allaité ! » '
  '3':
  - type: note
    content: 'roi des Juifs  : cf. v. 38 ; Jn 18.33 ; 19.19. –  C''est toi…  : cf. 22.67s,70 ; Jn 18.37 ; voir aussi 1Tm 6.13.'
  - type: text
    content: 'Pilate lui demanda : Es-tu le roi des Juifs, toi ? Il lui répondit : C''est toi qui le dis. '
  '30':
  - type: note
    content: Cf. Os 10.8  ; Ap 6.16 ; 9.6.
  - type: text
    content: 'Alors on se mettra '
  - type: text
    content: 'à dire aux montagnes : « Tombez sur nous ! » et aux collines : « Recouvrez-nous ! »'
  - type: text
    content: ' '
  '31':
  - type: note
    content: 'si l''on fait  : autre traduction s''ils font. –  au bois  : autre traduction à l''arbre  ; cf. 3.9 ; 6.43 ; 13.6ss ; 19.41ss ; 21.20ss ; Ez 17.24 ; voir aussi Es 10.16ss ; Pr 11.31 ; 1P 4.17s.'
  - type: text
    content: Car si l'on fait cela au bois vert, qu'arrivera-t-il au bois sec ?
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 33,39ss ; 22.37+ ; Jn 19.18.
  - type: text
    content: On conduisait en même temps deux autres, des malfaiteurs, qu'on allait exécuter avec lui.
  '33':
  - type: text
    content: 'Lorsqu''ils furent arrivés au lieu appelé le Crâne, ils le crucifièrent là, ainsi que les deux malfaiteurs, l''un à droite et l''autre à gauche. '
  '34':
  - type: note
    content: 'Les mots entre crochets sont absents des meilleurs mss ; cf. Ac 7.60 ; voir aussi Es 53.12 ; Mt 5.44+. –  Père v. 46 ; 10.21+ ; 11.2. –  ils ne savent pas…  : cf. 12.10 ; voir aussi Ac 3.17 ; 13.27 ; 17.30 ; 1Co 2.8. –  Ils se partagèrent…  : cf. Ps 22.19.'
  - type: text
    content: '[Jésus disait : Père, pardonne-leur, car ils ne savent pas ce qu''ils font.] '
  - type: text
    content: Ils se partagèrent ses vêtements en tirant au sort
  - type: text
    content: .
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 22.8s. –  Quant aux chefs…  : autre traduction les chefs aussi le tournaient en dérision  ; cf. 16.14 ; voir aussi 23.11,13,36. –  qu''il se sauve lui-même  : cf. v. 39 ; 4.23. –  le Christ de Dieu 9.20+. –  celui qui a été choisi ou l''Elu (titre fréquent dans 1 Hénoch ) ; on pourrait aussi traduire le Christ choisi par Dieu  ; cf. 9.35 ; Es 42.1 ; 49.7. Certains mss portent le Christ, le Fils de Dieu (cf. Mt 27.40,43).'
  - type: text
    content: 'Le peuple se tenait là et regardait. Quant aux chefs, ils le tournaient en dérision en disant : Il en a sauvé d''autres ; qu''il se sauve lui-même, s''il est le Christ de Dieu, celui qui a été choisi ! '
  '36':
  - type: note
    content: 'vin aigre ou vinaigre  : voir Mt 27.48n  ; cf. Ps 69.22.'
  - type: text
    content: 'Les soldats aussi se moquaient de lui ; ils venaient lui présenter du vin aigre '
  '37':
  - type: note
    content: roi des Juifs v. 3,38.
  - type: text
    content: 'en disant : Si tu es le roi des Juifs, sauve-toi toi-même ! '
  '38':
  - type: note
    content: Certains mss précisent en lettres grecques, latines et hébraïques, cf. Jn 19.20.
  - type: text
    content: 'Il y avait aussi au-dessus de lui cette inscription :'
  - type: text
    content: « Cet homme est le roi des Juifs. »
  '39':
  - type: text
    content: ' '
  - type: note
    content: malfaiteurs v. 32s. –  l'injuriait ou le calomniait  ; le même verbe est traduit par blasphémer en 12.10 ; cf. 22.65.
  - type: text
    content: 'L''un des malfaiteurs suspendus en croix l''injuriait en disant : N''es-tu pas le Christ ? Sauve-toi toi-même et sauve-nous ! '
  '4':
  - type: note
    content: 'grands prêtres  : cf. Mt 2.4n. –  aux foules  : cf. v. 1n,13 ; comparer avec 19.47s ; 22.6. –  Je ne trouve rien…  : cf. v. 14s,22 ; Jn 18.38 ; 19.4,6 ; Ac 3.13 ; 13.28.'
  - type: text
    content: 'Pilate dit aux grands prêtres et aux foules : Je ne trouve rien qui mérite condamnation chez cet homme. '
  '40':
  - type: note
    content: 'rabroua 4.35+. –  crainte de Dieu  : cf. 12.5. –  peine  : le même mot est souvent traduit par jugement. Voir aussi « L’Evangile de Pierre  », p.$.'
  - type: text
    content: 'Mais l''autre le rabroua en disant : N''as-tu donc aucune crainte de Dieu, toi qui subis la même peine ? '
  '41':
  - type: note
    content: 'Voir justice. –  ce qu''ont mérité nos actes  : litt. des choses dignes de ce que nous avons fait. –  de mal  : litt. de sans-lieu (cf. notre mot déplacé) ; même terme Ac 25.5.'
  - type: text
    content: 'Pour nous, c''est justice, car nous recevons ce qu''ont mérité nos actes ; mais celui-ci n''a rien fait de mal. '
  '42':
  - type: note
    content: 'souviens-toi de moi  : cf. Gn 40.14 ; Ps 106.4. –  quand tu entreras…  : certains mss portent un texte légèrement différent, qu''on pourrait traduire quand tu viendras dans ta royauté  ; cf. 1.33 ; 19.12 ; 22.30 ; 24.26 ; Mt 16.28 ; 20.21.'
  - type: text
    content: 'Et il disait : Jésus, souviens-toi de moi quand tu entreras dans ton royaume. '
  '43':
  - type: note
    content: 'Amen 4.24+. –  aujourd''hui 2.11+. –  avec moi  : cf. Ph 1.23. –  paradis, en grec paradeisos  ; cf. 16.22ss ; sur ce terme d''origine perse, voir Gn 2.8n  ; Ez 28.13n  ; 31.8 ; Ct 4.13n  ; Ec 2.5n  ; Né 2.8n  ; 2Co 12.4 ; Ap 2.7n  ; 1 Hénoch 60.8 : « A l''est du Jardin qu''habitent les élus et les justes et où avait été transporté mon aïeul (Hénoch), le septième homme depuis Adam. » 61.12 : « Tous les Saints qui sont dans le ciel Le béniront, tous les élus habitant le Jardin de vie Le béniront. » Psaumes de Salomon 14.3 : « Le paradis du Seigneur, les arbres de vie, ce sont ses saints. »'
  - type: text
    content: 'Il lui répondit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je te le dis, aujourd''hui tu seras avec moi dans le paradis.'
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: Mt 27.45-56  ; Mc 15.33-41  ; Jn 19.28-30
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'la sixième heure  : entre onze heures et midi. –  ténèbres  : cf. 21.25 ; 22.53 ; Ex 10.22 ; Jl 2.10 ; 3.3s ; Am 8.9s ; So 1.15. –  toute la terre  : autre traduction tout le pays (cf. 4.25 ; 21.23 ; Ac 7.3). –  la neuvième heure  : entre deux et trois heures de l''après-midi.'
  - type: text
    content: 'C''était déjà la sixième heure environ ; il y eut des ténèbres sur toute la terre jusqu''à la neuvième heure ; '
  '45':
  - type: note
    content: 'avait disparu  : certains traduisent avait été éclipsé, mais une éclipse de soleil, au sens astronomique du terme, est impossible à la Pâque, à la pleine lune ; certains mss portent s''était obscurci  ; cf. Es 13.10 ; Ec 12.2. –  le voile…  : cf. Ex 26.31ss ; 36.35 ; Mt 27.51ss ; Mc 15.38+.'
  - type: text
    content: 'le soleil avait disparu. Et le voile du sanctuaire se déchira par le milieu. '
  '46':
  - type: note
    content: 'cria  : litt. cria d''une grande voix  ; même expression Ac 16.28 ; Ap 14.18. –  Père v. 34+ ; cf. 2.49. –  je remets… Ps 31.6  ; cf. Ac 7.59 ; 1P 4.19. – Voir esprit.'
  - type: text
    content: 'Jésus cria : Père, '
  - type: text
    content: je remets mon esprit entre tes mains
  - type: text
    content: . Après avoir dit cela, il expira.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 27.54 ; Mc 15.39. –  glorifia Dieu 2.20+. –  juste  : le terme peut être compris comme équivalent d’ innocent (v. 4,11,14s,22,41), cf. Mt 23.35 ; 27.19 ; voir aussi Ac 3.14 ; 7.52 ; 22.14.'
  - type: text
    content: 'Voyant ce qui était arrivé, le centurion glorifia Dieu en disant : Cet homme était réellement un juste. '
  '48':
  - type: note
    content: 'les foules  : cf. v. 35. –  pour assister…  : cf. Hé 10.33. –  ce qui était arrivé 24.12,18 ; Ac 13.12. –  se frappant la poitrine v. 27n  ; même formule en 18.13 ; cf. Za 12.10 ; Evangile de Pierre 25 : « Alors les Juifs, les anciens et les prêtres, ayant reconnu quel mal ils s''étaient fait à eux-mêmes, se mirent à se frapper la poitrine et à dire : “Malheur à nos péchés ! Le jugement et la fin de Jérusalem s''approchent.” » (Voir aussi « L’Evangile de Pierre  », p.$.)'
  - type: text
    content: Et les foules qui s'étaient rassemblées pour assister à ce spectacle, après avoir vu ce qui était arrivé, s'en retournèrent en se frappant la poitrine.
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 27.55 ; Mc 15.40. –  ceux qui le connaissaient  : litt. ses connaissances  ; cf. 2.44. –  les femmes…  : cf. v. 27s,55 ; 8.2+s ; 24.10. –  à distance  : cf. Ps 38.12 ; 88.9.'
  - type: text
    content: Tous ceux qui le connaissaient, et les femmes qui l'avaient accompagné depuis la Galilée, se tenaient à distance et regardaient ce qui se passait.
  - type: heading
    content: Le corps de Jésus est mis au tombeau
  - type: heading
    content: Mt 27.57-61  ; Mc 15.42-47  ; Jn 19.38-42
  '5':
  - type: note
    content: Cf. Mt 27.63n. –  dans toute la Judée… 1.5n. –  depuis la Galilée… Ac 10.37 ; cf. 1.22. –  commencé 1.3+ ; cf. 24.47.
  - type: text
    content: 'Mais ils insistèrent et dirent : Il soulève le peuple, en enseignant dans toute la Judée, depuis la Galilée, où il a commencé, jusqu''ici.'
  - type: heading
    content: Jésus devant Hérode
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'membre du conseil (probablement du sanhédrin , 22.66). –  nommé Joseph  : cf. 1.27 ; Mt 27.57n. – Voir justice .'
  - type: text
    content: 'Il y avait un membre du conseil nommé Joseph, un homme bon et juste, '
  '51':
  - type: note
    content: 'aux décisions et aux actes…  : cf. v. 1 ; 22.4s,71. –  Arimathée Mt 27.57n. –  ville des Juifs (ou des Judéens  ?) : cf. v. 38. –  il attendait… 2.25,38+.'
  - type: text
    content: 'qui n''avait pas participé aux décisions et aux actes des autres ; il était d''Arimathée, ville des Juifs, et il attendait le règne de Dieu. '
  '52':
  - type: text
    content: 'Il se rendit chez Pilate et demanda le corps de Jésus. '
  '53':
  - type: note
    content: 'Cf. Dt 21.22s ; Mt 27.58n. –  le descendit (de la croix est sous-entendu dans le texte) : cf. Ac 13.29. –  d''un drap  : cf. 24.12 ; Mc 14.51s. –  où personne…  : cf. 2.12n  ; 19.30 ; Mt 27.60 ; Jn 19.41.'
  - type: text
    content: 'Il le descendit de la croix, l''enveloppa d''un drap et le mit dans un tombeau taillé dans le roc où personne ne gisait encore. '
  '54':
  - type: note
    content: 'le jour de la Préparation, c.-à-d. le vendredi : cf. Mc 15.42 ; Jn 19.14n. –  allait commencer  : litt. commençait à luire  ; l''expression évoque peut-être l''apparition de la première étoile au coucher du soleil, ou bien le moment où l''on allume les lampes pour le sabbat (voir Mt 28.1n).'
  - type: text
    content: C'était le jour de la Préparation, et le sabbat allait commencer.
  '55':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 49+ ; Mt 27.61 ; Mc 15.47.
  - type: text
    content: 'Les femmes – celles-là même qui étaient venues de Galilée avec lui – suivirent, elles virent le tombeau et la manière dont son corps y fut mis, '
  '56':
  - type: note
    content: 'préparer…  : plus tard, la Mishna (voir Talmud) autorisera qu''on prépare un mort pour son ensevelissement le jour du sabbat  ; cf. Mc 16.1. –  repos / commandement Ex 12.16 ; 16.22ss ; 20.8ss ; Lv 23.8 ; Dt 5.12ss ; voir aussi loi.'
  - type: text
    content: et elles s'en retournèrent pour préparer des aromates et des parfums. Puis, pendant le sabbat, elles observèrent le repos, selon le commandement.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'galiléen  : cf. 22.59 ; comparer avec 1.26 ; 2.4ss ; 4.24 ; voir aussi Jn 7.41,52.'
  - type: text
    content: 'Quand Pilate entendit cela, il demanda si cet homme était galiléen ; '
  '7':
  - type: note
    content: 'Cf. Ac 23.34. –  autorité  : cf. 4.6+. –  Hérode Antipas, 3.1n  ; cf. Ac 4.27. –  l''envoya  : même verbe v. 11,15 (renvoyer) ; on le retrouve pour une situation comparable en Ac 25.21. –  Hérode… à Jérusalem  : cf. Ac 12.3s (où il s''agit d''un autre Hérode, neveu de celui-ci). –  en ces jours-là  : cf. 24.18.'
  - type: text
    content: ayant appris qu'il relevait de l'autorité d'Hérode, il l'envoya à Hérode qui se trouvait aussi à Jérusalem en ces jours-là.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'depuis longtemps (20.9n) … il voulait le voir 9.7-9 ; cf. Jn 12.21. –  le voir produire…  : litt. voir quelque signe (ou miracle ) arriver par lui  ; cf. 11.16,29ss.'
  - type: text
    content: 'Lorsque Hérode vit Jésus, il se réjouit grandement ; depuis longtemps, en effet, il voulait le voir à cause de ce qu''il avait entendu dire de lui, et il espérait le voir produire quelque signe. '
  '9':
  - type: note
    content: 'Cf. v. 3 ; 22.67,70 ; Mt 27.12/ /. –  Jésus ne lui répondit rien  : litt. il ne lui répondit rien.'
  - type: text
    content: 'Il l''interrogea longuement, mais Jésus ne lui répondit rien. '
