document_id: PRO.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Une femme infidèle séduit un jeune homme
  - type: text
    content: ' '
  - type: note
    content: préceptes 2.1n  ; cf. 1.8n.
  - type: text
    content: Mon fils, garde mes paroles
  - type: text
    content: et retiens bien mes préceptes.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'prostituée  : cf. Gn 38.14-19. –  la ruse au cœur  : autres traductions sans scrupules, l''artifice au cœur  ; certains modifient le texte hébreu traditionnel pour lire couverte d''un voile (cf. Gn 38.14) ; LXX capable de faire bondir le cœur des jeunes gens.'
  - type: text
    content: Une femme vint à sa rencontre,
  - type: text
    content: elle avait la mise d'une prostituée et la ruse au cœur.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'frivole  : le terme hébreu peut être compris au sens d’ agitée, bouillonnante , ou de bruyante (cf. 1.21 ; 9.13) ; voir aussi 5.6 ; une autre forme du même mot est traduite par frémir en Ct 5.4.'
  - type: text
    content: Elle est frivole et effrontée,
  - type: text
    content: ses pieds ne restent pas dans sa maison ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'elle est aux aguets  : le terme hébreu est habituellement traduit par tendre (ou dresser ) une embuscade  ; cf. 23.27s.'
  - type: text
    content: tantôt dans la rue, tantôt sur les places,
  - type: text
    content: dans tous les coins, elle est aux aguets.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'air effronté  : cf. Dn 8.23n.'
  - type: text
    content: Elle le saisit, l'embrassa
  - type: text
    content: 'et d''un air effronté lui dit :'
  '14':
  - type: text
    content: ' '
  - type: note
    content: sacrifice de paix Lv 3.1n. –  je me suis acquittée de mes vœux Lv 7.11-21.
  - type: text
    content: Je devais faire un sacrifice de paix,
  - type: text
    content: aujourd'hui je me suis acquittée de mes vœux.
  '15':
  - type: text
    content: C'est pourquoi je suis sortie à ta rencontre ;
  - type: text
    content: je cherchais à te voir, et je t'ai trouvé.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'couvertures  : mot rare, au sens incertain, apparenté au verbe ici rendu par garnir , on ne le retrouve qu''en 31.22. –  fil d''Egypte  : cf. Ez 27.7.'
  - type: text
    content: J'ai garni mon lit de couvertures,
  - type: text
    content: de tapis de fil d'Egypte ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'myrrhe… aloès… cinnamome  : cf. Ct 4.14.'
  - type: text
    content: j'ai parfumé ma couche
  - type: text
    content: de myrrhe, d'aloès et de cinnamome.
  '18':
  - type: text
    content: ' '
  - type: note
    content: enivrons-nous 5.19n.
  - type: text
    content: Viens, enivrons-nous de volupté jusqu'au matin,
  - type: text
    content: livrons-nous aux plaisirs de l'amour.
  '19':
  - type: text
    content: Car mon mari n'est pas à la maison,
  - type: text
    content: il est parti pour un long voyage ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Garde  : autre traduction observe  ; cf. 4.4n  ; Lv 18.5 ; Dt 11.8. –  enseignement 1.8n.'
  - type: text
    content: Garde mes préceptes, afin que tu vives,
  - type: text
    content: garde mon enseignement comme la prunelle de tes yeux.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'avec lui  : litt. dans sa main.'
  - type: text
    content: il a pris avec lui la bourse avec l'argent,
  - type: text
    content: il ne rentrera qu'à la pleine lune.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'son savoir-faire  : le même terme est traduit par savoir en 1.5+.'
  - type: text
    content: Elle le fléchit par son savoir-faire,
  - type: text
    content: elle l'entraîna par ses lèvres enjôleuses.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'comme un imbécile qu''on lie pour le corriger  : LXX comme un cerf qui est pris au piège.'
  - type: text
    content: Soudain il se mit à la suivre,
  - type: text
    content: comme le bœuf qui va à l'abattoir,
  - type: text
    content: comme un imbécile qu'on lie pour le corriger,
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'au prix de sa vie  : cf. v. 27 ; 1.17 ; Ec 7.26 ; 9.12.'
  - type: text
    content: jusqu'à ce qu'une flèche lui transperce le foie,
  - type: text
    content: comme l'oiseau qui se précipite dans le filet,
  - type: text
    content: sans savoir que c'est au prix de sa vie.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'mes fils  : litt. fils  ; LXX mon fils, écoute, prête attention . –  écoutez-moi 1.8n.'
  - type: text
    content: Maintenant donc, mes fils, écoutez-moi,
  - type: text
    content: et prêtez attention aux paroles de ma bouche !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'pour suivre une telle femme  : litt. vers ses voies (à elle).'
  - type: text
    content: Que ton cœur ne se dévoie pas pour suivre une telle femme,
  - type: text
    content: ne t'égare pas dans ses sentiers.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'victimes  : litt. ceux qui ont été transpercés  ; cf. v. 23.'
  - type: text
    content: Car elle a fait tomber beaucoup de victimes ;
  - type: text
    content: même les plus forts, elle les a tous tués.
  '27':
  - type: text
    content: ' '
  - type: note
    content: séjour des morts 1.12n  ; cf. 2.18.
  - type: text
    content: Sa maison, c'est le chemin du séjour des morts
  - type: text
    content: qui descend vers les chambres de la mort.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Attache-les… écris-les… 3.3+.
  - type: text
    content: Attache-les sur tes doigts,
  - type: text
    content: écris-les sur la tablette de ton cœur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'la sagesse  : cf. 1.20 ; 8 ; 9.1. –  ma sœur  : cf. Ct 4.9,10,12 ; 5.1. –  ta parente Rt 2.1 ; 3.2.'
  - type: text
    content: 'Dis à la sagesse : « Tu es ma sœur ! »'
  - type: text
    content: Appelle l'intelligence ta parente,
  '5':
  - type: text
    content: ' '
  - type: note
    content: l'autre femme 2.16n  ; 5.3.
  - type: text
    content: pour qu'elles te gardent de l'autre femme,
  - type: text
    content: de l'inconnue aux paroles enjôleuses.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'à la fenêtre  : LXX de la fenêtre de sa maison, elle se penche vers les rues . –  persiennes  : cf. Jg 5.28.'
  - type: text
    content: J'étais à la fenêtre de ma maison
  - type: text
    content: et je regardais à travers les persiennes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: dépourvu de raison 6.32n.
  - type: text
    content: J'aperçus, parmi les naïfs,
  - type: text
    content: je remarquai, parmi les jeunes gens, un garçon dépourvu de raison.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'la rue  : hébreu shouq (cf. notre mot souk , d''après un équivalent arabe). –  près du coin…  : litt. près de son angle (à elle).'
  - type: text
    content: Il passait dans la rue, près du coin où elle se tenait,
  - type: text
    content: 'il se dirigeait lentement du côté de sa maison :'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'à l''approche de  : le texte hébreu traditionnel porte le mot qui désigne la prunelle de l''œil au v. 2 ; certains interprètent  : en pleine nuit, au plus profond de l''obscurité  ; une légère modification permet de lire le terme qui apparaît dans un contexte analogue en 20.20.'
  - type: text
    content: c'était au crépuscule, pendant la soirée,
  - type: text
    content: à l'approche de la nuit et de l'obscurité.
