      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ici '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'ouest
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', par rapport au point de départ des Israélites qui viennent de passer de la rive est à la rive ouest du Jourdain (chap. 3–4) ; de même en 9.1 ; 12.7 ; 22.7 ; voir Nb 32.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 3.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la mer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la Méditerranée. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à ce qu'ils soient passés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après une lecture traditionnelle ; autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu'à ce que nous soyons passés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' fondit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.11+ ; Dt 1.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils perdirent le souffle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tous les rois des Amorites qui étaient au-delà du Jourdain, à l''ouest, et tous les rois des Cananéens, près de la mer, apprirent que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait mis à sec les eaux du Jourdain devant les Israélites, jusqu''à ce qu''ils soient passés, leur cœur fondit et ils perdirent le souffle devant les Israélites.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le quatorzième jour du mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.19+ ; Ex 12.6 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'plaines arides '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites campèrent au Guilgal ; ils célébrèrent la Pâque le quatorzième jour du mois, au soir, dans les plaines arides de Jéricho. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pains sans levain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: matsoth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) font partie du repas pascal, cf. Ex 12 ; voir aussi Mt 26.17/ /.
      marker-yv: yv-n
    - type: text
      text: 'Ils mangèrent des produits du pays, des pains sans levain et du grain rôti, le lendemain de la Pâque, en ce jour même. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La manne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 16 ; Nb 11.6-9 ; Dt 8.3,16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le lendemain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il faut peut-être comprendre le lendemain de la Pâque (comme au v. 11) plutôt que le surlendemain. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Canaan '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 9.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: La manne cessa le lendemain, quand ils mangèrent des produits du pays. Il n'y eut plus de manne pour les Israélites ; ils mangèrent des produits de Canaan cette année-là.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le chef de l''armée du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son épée tirée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Nb 22.23,31 ; 1Ch 21.16 ; voir aussi Es 21.15.'
      marker-yv: yv-n
    - type: text
      text: 'Comme Josué était à Jéricho, il leva les yeux et regarda : un homme se tenait en face de lui, son épée tirée. Josué marcha vers lui et lui dit : Es-tu pour nous ou pour nos adversaires ? '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je suis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: non, car je suis…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'non '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ni l''un ni l''autre… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. v. 13). Certains mss hébreux et des versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il lui dit : Je suis…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1S 8.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le chef de l''armée du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce personnage n''apparaît qu''ici ; il est plus fréquemment parlé de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''armée du ciel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1R 22.19 ; Jr 33.22 ; cf. Dn 4.34 etc.).
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Je suis le chef de l''armée du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; maintenant je suis arrivé. Josué tomba face contre terre, prosterné, et lui dit : Qu''as-tu à me dire, mon seigneur ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ote tes sandales…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 3.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le chef de l''armée du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Josué : Ote tes sandales de tes pieds, car le lieu où tu te tiens est sacré. Josué fit ainsi.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des couteaux de pierre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 4.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une seconde fois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Josué : Fais-toi des couteaux de pierre et circoncis de nouveau les Israélites, une seconde fois. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Araloth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prépuces.
      marker-yv: yv-n
    - type: text
      text: 'Josué se fit des couteaux de pierre et circoncit les Israélites, près de la colline des Araloth (« Prépuces »). '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la raison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant peut aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parole, chose, événement.
      marker-yv: yv-n
    - type: text
      text: 'Voici la raison pour laquelle Josué les circoncit : tout le peuple qui était sorti d''Egypte, les mâles, tous les hommes de guerre, étaient morts dans le désert, en chemin, alors qu''ils sortaient d''Egypte. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'Egypte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu à la première occurrence. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le désert
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6.'
      marker-yv: yv-n
    - type: text
      text: 'Tout le peuple qui était sorti d''Egypte avait été circoncis, mais de tout le peuple qui était né dans le désert, en chemin, alors qu''ils sortaient d''Egypte, on n''avait circoncis personne. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la nation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs mss hébreux et certains mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: génération
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' avait juré…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.43 ; Dt 1.8+ ; 6.10 ; 26.3 : 31.7 ; voir aussi Gn 13.14-17 ; 26.3 ; 28.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays ruisselant de lait et de miel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 3.8,17 ; 13.5 ; 33.3 ; Lv 20.24 ; Nb 13.27 ; 14.8 ; 16.13s ; Dt 6.3 ; 11.9 ; 26.9,15 ; 27.3 ; Jr 11.5 ; 32.22.
      marker-yv: yv-n
    - type: text
      text: 'En effet, les Israélites avaient marché quarante ans dans le désert, jusqu''à la disparition de toute la nation, des hommes de guerre sortis d''Egypte qui n''avaient pas écouté le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' leur avait juré de ne pas leur faire voir le pays que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait juré à leurs pères de nous donner, ce pays ruisselant de lait et de miel. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il suscita
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il installa.
      marker-yv: yv-n
    - type: text
      text: 'Il suscita leurs fils à leur place et ce sont eux que Josué circoncit. En effet, ils étaient incirconcis, puisqu''on ne les avait pas circoncis en route. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à leur guérison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu'à ce qu'ils vivent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 34.25.'
      marker-yv: yv-n
    - type: text
      text: Lorsqu'on eut achevé de circoncire toute la nation, ils restèrent sur place dans le camp jusqu'à leur guérison.
