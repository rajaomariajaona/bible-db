document_id: JOS.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Circoncision des Israélites au Guilgal
  - type: text
    content: ' '
  - type: note
    content: 'au-delà du Jourdain  : ici à l''ouest , par rapport au point de départ des Israélites qui viennent de passer de la rive est à la rive ouest du Jourdain (chap. 3–4) ; de même en 9.1 ; 12.7 ; 22.7 ; voir Nb 32.19n  ; Dt 3.20n. –  la mer  : la Méditerranée. –  jusqu''à ce qu''ils soient passés  : d''après une lecture traditionnelle ; autre lecture traditionnelle jusqu''à ce que nous soyons passés . –  leur cœur fondit 2.11+ ; Dt 1.28n. –  ils perdirent le souffle  : cf. 2.11n.'
  - type: text
    content: 'Lorsque tous les rois des Amorites qui étaient au-delà du Jourdain, à l''ouest, et tous les rois des Cananéens, près de la mer, apprirent que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait mis à sec les eaux du Jourdain devant les Israélites, jusqu''à ce qu''ils soient passés, leur cœur fondit et ils perdirent le souffle devant les Israélites.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'le quatorzième jour du mois  : cf. 4.19+ ; Ex 12.6 ; voir calendrier et fêtes. –  plaines arides 8.14n  ; Dt 1.1n.'
  - type: text
    content: 'Les Israélites campèrent au Guilgal ; ils célébrèrent la Pâque le quatorzième jour du mois, au soir, dans les plaines arides de Jéricho. '
  '11':
  - type: note
    content: Les pains sans levain (hébreu matsoth) font partie du repas pascal, cf. Ex 12 ; voir aussi Mt 26.17/ /.
  - type: text
    content: 'Ils mangèrent des produits du pays, des pains sans levain et du grain rôti, le lendemain de la Pâque, en ce jour même. '
  '12':
  - type: note
    content: 'La manne  : cf. Ex 16 ; Nb 11.6-9 ; Dt 8.3,16. –  le lendemain  : il faut peut-être comprendre le lendemain de la Pâque (comme au v. 11) plutôt que le surlendemain. –  Canaan Gn 9.18n.'
  - type: text
    content: La manne cessa le lendemain, quand ils mangèrent des produits du pays. Il n'y eut plus de manne pour les Israélites ; ils mangèrent des produits de Canaan cette année-là.
  - type: heading
    content: Le chef de l'armée du Seigneur
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'son épée tirée  : cf. Nb 22.23,31 ; 1Ch 21.16 ; voir aussi Es 21.15.'
  - type: text
    content: 'Comme Josué était à Jéricho, il leva les yeux et regarda : un homme se tenait en face de lui, son épée tirée. Josué marcha vers lui et lui dit : Es-tu pour nous ou pour nos adversaires ? '
  '14':
  - type: note
    content: 'Je suis  : litt. non, car je suis…  ; le non pourrait signifier ni l''un ni l''autre… (cf. v. 13). Certains mss hébreux et des versions anciennes portent il lui dit : Je suis…, cf. 1S 8.19n. –  le chef de l''armée du Seigneur  : ce personnage n''apparaît qu''ici ; il est plus fréquemment parlé de l''armée du ciel (1R 22.19 ; Jr 33.22 ; cf. Dn 4.34 etc.).'
  - type: text
    content: 'Il répondit : Je suis le chef de l''armée du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; maintenant je suis arrivé. Josué tomba face contre terre, prosterné, et lui dit : Qu''as-tu à me dire, mon seigneur ? '
  '15':
  - type: note
    content: 'Ote tes sandales…  : cf. Ex 3.5. –  sacré  : voir saint.'
  - type: text
    content: 'Le chef de l''armée du '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : Ote tes sandales de tes pieds, car le lieu où tu te tiens est sacré. Josué fit ainsi.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'des couteaux de pierre  : cf. Ex 4.25. –  une seconde fois  : absent de LXX.'
  - type: text
    content: 'En ce temps-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : Fais-toi des couteaux de pierre et circoncis de nouveau les Israélites, une seconde fois. '
  '3':
  - type: note
    content: Araloth signifie prépuces.
  - type: text
    content: 'Josué se fit des couteaux de pierre et circoncit les Israélites, près de la colline des Araloth (« Prépuces »). '
  '4':
  - type: note
    content: 'la raison  : le mot hébreu correspondant peut aussi signifier parole, chose, événement.'
  - type: text
    content: 'Voici la raison pour laquelle Josué les circoncit : tout le peuple qui était sorti d''Egypte, les mâles, tous les hommes de guerre, étaient morts dans le désert, en chemin, alors qu''ils sortaient d''Egypte. '
  '5':
  - type: note
    content: 'd''Egypte  : sous-entendu à la première occurrence. –  dans le désert  : cf. v. 6.'
  - type: text
    content: 'Tout le peuple qui était sorti d''Egypte avait été circoncis, mais de tout le peuple qui était né dans le désert, en chemin, alors qu''ils sortaient d''Egypte, on n''avait circoncis personne. '
  '6':
  - type: note
    content: 'la nation  : plusieurs mss hébreux et certains mss de Tg portent la génération. –  que le Seigneur avait juré…  : cf. 21.43 ; Dt 1.8+ ; 6.10 ; 26.3 : 31.7 ; voir aussi Gn 13.14-17 ; 26.3 ; 28.13. –  pays ruisselant de lait et de miel Ex 3.8,17 ; 13.5 ; 33.3 ; Lv 20.24 ; Nb 13.27 ; 14.8 ; 16.13s ; Dt 6.3 ; 11.9 ; 26.9,15 ; 27.3 ; Jr 11.5 ; 32.22.'
  - type: text
    content: 'En effet, les Israélites avaient marché quarante ans dans le désert, jusqu''à la disparition de toute la nation, des hommes de guerre sortis d''Egypte qui n''avaient pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur avait juré de ne pas leur faire voir le pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait juré à leurs pères de nous donner, ce pays ruisselant de lait et de miel. '
  '7':
  - type: note
    content: 'Il suscita  : autre traduction il installa.'
  - type: text
    content: 'Il suscita leurs fils à leur place et ce sont eux que Josué circoncit. En effet, ils étaient incirconcis, puisqu''on ne les avait pas circoncis en route. '
  '8':
  - type: note
    content: 'jusqu''à leur guérison  : litt. jusqu''à ce qu''ils vivent  ; cf. Gn 34.25.'
  - type: text
    content: Lorsqu'on eut achevé de circoncire toute la nation, ils restèrent sur place dans le camp jusqu'à leur guérison.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai roulé  : nouvelle explication du nom de Guilgal (4.19n). –  loin de vous  : litt. de dessus vous . –  le déshonneur (autre traduction l''outrage , cf. Es 51.7n) de l''Egypte  : bien qu''elle ait été pratiquée par d''autres peuples (et notamment en Egypte ), la circoncision, comme signe d''alliance, est une marque distinctive pour le peuple d''Israël (Gn 34.14 ; Jr 9.25 ; Ha 2.16). Par-delà l''incirconcision de la génération du désert, l''expression le déshonneur de l''Egypte évoque peut-être l''ensemble des humiliations qui ont accompagné le séjour en Egypte. –  jusqu''à ce jour 4.9n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : Aujourd''hui, j''ai roulé loin de vous le déshonneur de l''Egypte. C''est pourquoi on appelle ce lieu du nom de Guilgal, jusqu''à ce jour.'
  - type: heading
    content: Première Pâque en Canaan
