        - type: text
          text: témoin fidèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.5+.'
      marker-yv: yv-n
    - type: text
      text: 'Je sais bien où tu habites ; c''est là que se trouve le trône du Satan. Tu es attaché à mon nom, et tu n''as pas renié ma foi, même aux jours où Antipas, mon témoin fidèle, a été tué chez vous, là où le Satan habite. '
