      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'recourir à la prostitution ; se livrer à l''inconduite sexuelle '
      - type: usfm
