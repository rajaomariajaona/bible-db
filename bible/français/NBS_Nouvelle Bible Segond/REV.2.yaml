      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Antipas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'nous est inconnu par ailleurs. –  '
      - type: usfm
