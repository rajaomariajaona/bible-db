        - type: text
          text: '  ; 5.3 ; 6.10.'
      marker-yv: yv-n
    - type: text
      text: 'Mais j''ai contre toi certains griefs : tu as là des gens attachés à l''enseignement de Balaam, qui enseignait à Balaq comment causer la chute des Israélites en les incitant à manger des viandes sacrifiées aux idoles et à se prostituer. '
  '15':
