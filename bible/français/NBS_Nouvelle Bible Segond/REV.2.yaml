    - type: text
      text: 'A l''ange de l''Eglise d''Ephèse, écris :'
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Voici ce que dit celui qui tient les sept étoiles dans sa main droite, celui qui marche au milieu des sept porte-lampes d''or : '
  '10':
