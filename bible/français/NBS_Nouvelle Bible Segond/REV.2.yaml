document_id: REV.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Lettre à l'Eglise d'Ephèse
  - type: text
    content: ' '
  - type: note
    content: Voir ange et Eglise . –  Ephèse 1.11n. –  étoiles / porte-lampes 1.12s,16+,20.
  - type: text
    content: 'A l''ange de l''Eglise d''Ephèse, écris :'
  - type: text
    content: 'Voici ce que dit celui qui tient les sept étoiles dans sa main droite, celui qui marche au milieu des sept porte-lampes d''or : '
  '10':
  - type: note
    content: 'N''aie aucune peur…  : certains mss portent une formule plus courante, habituellement traduite par n''aie pas peur  ; cf. Mt 10.28+. –  vous connaîtrez la détresse  : litt. vous aurez de la détresse  ; cf. Jn 16.33. –  dix jours  : comparer avec 20.4 ; voir aussi Dn 1.12+. –  couronne  : l''image est ici celle de la couronne de lauriers reçue par le vainqueur des jeux de l''arène plutôt que celle de la couronne royale ou diadème ; cf. 3.11 ; 4.4,10 ; 6.2 ; 9.7 ; 12.1 ; 14.14+ ; Ps 21.4s ; 1Co 9.25+ ; Ph 4.1 ; Jc 1.12 ; voir aussi Za 6.14.'
  - type: text
    content: 'N''aie aucune peur de ce que tu vas souffrir. Le diable va jeter quelques-uns d''entre vous en prison, pour que vous soyez mis à l''épreuve : vous connaîtrez la détresse pendant dix jours. Sois fidèle jusqu''à la mort, et je te donnerai la couronne de la vie.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Que celui… v. 7+. –  l''Esprit dit 1Tm 4.1+. –  n''a rien à craindre…  : autre traduction, plus littérale  : la seconde mort ne lui fera aucun mal , c.-à-d. ne le touchera pas  ; le même verbe est traduit par faire du mal en 6.6 ; 7.2s ; 9.4,10,19 ; 11.5 ; il peut aussi signifier être injuste ou agir injustement (22.11) ; voir justice. –  la seconde mort 20.6,14 ; 21.8.'
  - type: text
    content: Que celui qui a des oreilles entende ce que l'Esprit dit aux Eglises !
  - type: text
    content: Le vainqueur n'a rien à craindre de la seconde mort.
  - type: heading
    content: Lettre à l'Eglise de Pergame
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pergame 1.11n. –  l'épée… 1.16+.
  - type: text
    content: 'A l''ange de l''Eglise de Pergame, écris :'
  - type: text
    content: 'Voici ce que dit celui qui a l''épée acérée à deux tranchants : '
  '13':
  - type: note
    content: 'où tu habites  : cf. Ez 12.2. –  trône du Satan (voir démon, diable, Satan) : Pergame était le centre du culte impérial pour la province d''Asie (1.4+) ; cf. 13.2+,15n. –  Tu es attaché  : autre traduction tu t''attaches, même verbe dans la suite, cf. v. 25 ; 3.11 ; Col 2.19n. – Voir nom. –  pas renié 3.8 ; Mt 10.33n  ; Jn 1.20n  ; 1Tm 5.8 ; 2Tm 2.12s. –  ma foi  : cf. Rm 3.22n  ; le terme grec est apparenté au mot traduit par fidèle. –  Antipas nous est inconnu par ailleurs. –  témoin fidèle  : cf. 1.5+.'
  - type: text
    content: 'Je sais bien où tu habites ; c''est là que se trouve le trône du Satan. Tu es attaché à mon nom, et tu n''as pas renié ma foi, même aux jours où Antipas, mon témoin fidèle, a été tué chez vous, là où le Satan habite. '
  '14':
  - type: note
    content: 'j''ai contre toi… v. 4+. –  Balaam  : cf. Nb 22–24 ; 25.1s ; 31.16 ; 2P 2.15 ; Jd 11 ; ce nom, par son étymologie supposée (en hébreu Bil‘am, qui peut être interprété comme celui qui dévore le peuple), rappelle peut-être celui des Nicolaïtes (v. 6n,15 ; Nicolas signifie en grec vainqueur du peuple). –  comment (ou à) causer la chute Mt 11.6n. –  Israélites Lc 1.16n. –  viandes sacrifiées aux idoles  : cf. 2.20 ; Ac 15.20,29 ; 1Co 8.1n-10. –  se prostituer  : autres traductions recourir à la prostitution ; se livrer à l''inconduite sexuelle (selon la traduction habituelle de ce terme dans le reste du N.T., cf. Mt 5.32n  ; 1Co 5.9n) ; termes de la même famille v. 20s ; 9.21 ; 14.8 ; 17.1ss ; 21.8. Sur le rapport entre idoles et prostitution, voir Os 1.2n  ; 5.3 ; 6.10.'
  - type: text
    content: 'Mais j''ai contre toi certains griefs : tu as là des gens attachés à l''enseignement de Balaam, qui enseignait à Balaq comment causer la chute des Israélites en les incitant à manger des viandes sacrifiées aux idoles et à se prostituer. '
  '15':
  - type: note
    content: V. 6n.
  - type: text
    content: 'De même, tu as, toi aussi, des gens qui sont pareillement attachés à l''enseignement des Nicolaïtes. '
  '16':
  - type: note
    content: 'Change… v. 5n. –  je viendrai  : litt. je viens, cf. 3.11+. –  je leur ferai la guerre 9.7,9 (un terme apparenté est traduit par combat) ; 11.7 ; 12.7,17 ; 13.4,7 ; 16.14 ; 17.14 ; 19.11,19 ; 20.8 ; voir aussi Jr 21.5. –  épée 1.16+.'
  - type: text
    content: Change donc radicalement ; sinon je viendrai à toi bientôt, et je leur ferai la guerre avec l'épée de ma bouche.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Que celui… v. 7+. –  l'Esprit dit 1Tm 4.1+. –  la manne Dt 8.2s ; Ps 78.24 ; Jn 6.31-58. –  cachée Ex 16.32-34 ; Hé 9.4 ; d'après une tradition rapportée en 2 Maccabées 2.4-8, lors de la destruction du temple de Jérusalem, Jérémie aurait caché le coffre de l'alliance et ce qu'il contenait (y compris la manne) dans une grotte du mont Nebo, et Dieu devait la faire réapparaître à la fin des temps (cf. Ap 11.19). – Le caillou est peut-être ici, comme en Ac 26.10n, l'expression du verdict ; le fait qu'il est blanc indiquerait alors l'acquittement, voire la gloire  ; d'autres interprétations sont possibles, compte tenu des multiples usages des pierres de toutes sortes dans la vie antique (pierres précieuses, mais aussi cartes d'invitation, amulettes). –  nom nouveau 3.12 ; 14.1 ; Es 62.2 ; 65.15 ; Ph 2.9 ; sur la nouveauté, voir aussi 5.9+ ; 21.1-5 ; Es 43.19 ; Jr 31.31s ; Ez 36.26 ; Mt 9.16s/ / ; Jn 13.34 ; Rm 6.4+ ; 1Co 11.25 ; 2Co 3.6 ; 5.17 ; Ga 6.15 ; Ep 2.15 ; 4.24. –  que personne ne connaît 19.12.
  - type: text
    content: Que celui qui a des oreilles entende ce que l'Esprit dit aux Eglises !
  - type: text
    content: Au vainqueur, je donnerai de la manne cachée et un caillou blanc ; sur ce caillou est écrit un nom nouveau que personne ne connaît, sinon celui qui le reçoit.
  - type: heading
    content: Lettre à l'Eglise de Thyatire
  '18':
  - type: text
    content: ' '
  - type: note
    content: Thyatire 1.11n. –  Fils de Dieu Mt 16.16+ ; Jn 1.34+. –  yeux / pieds 1.14-15+.
  - type: text
    content: 'A l''ange de l''Eglise de Thyatire, écris :'
  - type: text
    content: 'Voici ce que dit le Fils de Dieu, celui qui a les yeux comme un feu flamboyant et dont les pieds ressemblent à du bronze : '
  '19':
  - type: note
    content: 'V. 2+. –  ta foi ou ta fidélité  : cf. v. 13n. –  ton service ou ton ministère Mt 20.26n  ; Ac 6.1n  ; Rm 12.7n.'
  - type: text
    content: 'Je connais tes œuvres, ton amour, ta foi, ton service et ta persévérance ; je sais bien que tes dernières œuvres sont plus nombreuses que les premières. '
  '2':
  - type: note
    content: 'Je connais tes œuvres v. 19 ; 3.1,8,15 ; cf. 1Th 1.3. –  ton travail  : autre traduction ta peine  ; un verbe apparenté est traduit par se lasser au v. 3 ; cf. 14.13. –  persévérance v. 3,19 ; 1.9+ ; 3.10. –  méchants  : voir justice. –  apôtres 2Co 11.13 ; cf. 1Jn 4.1.'
  - type: text
    content: 'Je connais tes œuvres, ton travail et ta persévérance ; je sais bien que tu ne peux pas supporter les méchants : tu as mis à l''épreuve ceux qui se disent apôtres et ne le sont pas, et tu les as trouvés menteurs. '
  '20':
  - type: note
    content: contre toi v. 4+. –  cette (litt. la femme) Jézabel 1R 16.31ss ; 19.1s ; 2R 9.22. –  égarer 12.9+. –  esclaves ou serviteurs 1.1+. –  se prostituer / idoles v. 14n. –  viandes sacrifiées aux idoles 2.14+.
  - type: text
    content: 'Cependant, j''ai ceci contre toi : tu laisses cette Jézabel, qui se dit prophétesse, égarer mes esclaves en leur enseignant à se prostituer et à manger des viandes sacrifiées aux idoles. '
  '21':
  - type: note
    content: change radicalement et revenir de (de même v. 22 ; 9.20s ; 16.9,11) traduisent deux formes d'un même verbe grec ; voir v. 5n.
  - type: text
    content: 'Je lui ai donné du temps pour qu''elle change radicalement, mais elle ne veut pas revenir de sa prostitution. '
  '22':
  - type: note
    content: 'Autre traduction  : Je la jette sur un lit, et ceux qui commettent l''adultère avec elle dans une grande détresse  ; 1.9+ ; 7.14n. –  ses œuvres  : certains mss portent leurs œuvres.'
  - type: text
    content: 'Je vais la jeter sur un lit et dans une grande détresse, elle et ceux qui commettent l''adultère avec elle, à moins qu''ils ne reviennent de ses œuvres. '
  '23':
  - type: note
    content: 'Je ferai mourir  : litt. je tuerai de mort (cf. 6.8n). –  ses enfants  : il s''agit peut-être de ses disciples ; cf. Lc 7.35. –  qui sonde les reins et les cœurs Jr 11.20 ; Ps 7.10 ; Rm 8.27. –  selon ses œuvres 18.6 ; 20.12s ; 22.12 ; Jr 17.10 ; Ps 28.4 ; 62.13 ; Pr 24.12 ; Mt 16.27 ; Rm 2.6 ; 2Tm 4.14.'
  - type: text
    content: 'Je ferai mourir ses enfants ; toutes les Eglises sauront que c''est moi qui sonde les reins et les cœurs, et je vous rendrai, à chacun de vous, selon ses œuvres. '
  '24':
  - type: note
    content: 'les « profondeurs »  : allusion probable à un rite d''initiation ou à un enseignement ésotérique. –  Satan  : voir démon, diable, Satan.'
  - type: text
    content: 'Mais à vous, à tous les autres de Thyatire, qui n''ont pas cet enseignement et qui n''ont jamais connu les « profondeurs » du Satan, comme ils disent, je dis : je ne mets pas sur vous d''autre fardeau. '
  '25':
  - type: note
    content: ce que vous avez v. 13n  ; 3.11.
  - type: text
    content: Seulement, ce que vous avez, restez-y attachés jusqu'à ce que je vienne.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'qui garde mes œuvres , c.-à-d. qui continue d''agir à ma manière ou d''œuvrer pour moi . –  pouvoir ou autorité  ; même terme 6.8 ; 9.3,10,19 ; 11.6 ; 12.10 ; 13.2ss ; 14.18 ; 16.9 ; 17.12s ; 18.1 ; 20.6 ; 22.14n ( droit ) ; Mc 1.22n ( autorité ) ; Jn 1.12n ( pouvoir ). –  les nations  : cf. 10.11 ; 11.2,18 ; 12.5 ; 14.8 ; 15.3s ; 16.19 ; 17.15 ; 18.3,23 ; 19.15 ; 20.3,8 ; 21.24,26 ; 22.2 ; le terme désigne souvent, en particulier, les non-Juifs  ; cf. Mt 4.15n  ; Ac 10.45n  ; 1Co 5.1n.'
  - type: text
    content: 'Au vainqueur, à celui qui garde mes œuvres jusqu''à la fin, je donnerai pouvoir sur les nations. '
  '27':
  - type: note
    content: '12.5 ; 19.15 ; Ps 2.8-9  ; cf. Psaumes de Salomon 17.23s : « Qu''il (le Messie) écrase l''orgueil du pécheur comme vase de potier ! Qu''il brise d''un sceptre de fer toute leur assurance ! Qu''il extermine les nations impies d''une parole de sa bouche ! » –  vases  : le même terme est traduit par objet en 18.12 ; cf. Mt 12.29n  ; 2Co 4.7.'
  - type: text
    content: Avec un sceptre de fer il les fera paître – comme on brise
  - type: text
    content: ' les '
  - type: text
    content: vases d'argile,
  - type: text
    content: ' '
  '28':
  - type: note
    content: 'ainsi que…  : litt. comme moi aussi j''ai reçu de mon Père. On pourrait aussi rattacher la proposition à ce qui suit  : comme moi je l''ai reçue de mon Père, je lui donnerai l''étoile du matin  : cf. 22.16 ; Nb 24.17 ; Mt 2.2 ; 2P 1.19 (autre terme grec).'
  - type: text
    content: ainsi que j'en ai moi-même reçu le pouvoir de mon Père. Et je lui donnerai l'étoile du matin.
  '29':
  - type: text
    content: ' '
  - type: note
    content: Que celui… v. 7+. –  l'Esprit dit 1Tm 4.1+.
  - type: text
    content: Que celui qui a des oreilles entende ce que l'Esprit dit aux Eglises !
  '3':
  - type: note
    content: Voir nom.
  - type: text
    content: 'Tu as de la persévérance, tu as souffert à cause de mon nom et tu ne t''es pas lassé. '
  '4':
  - type: note
    content: 'j''ai ceci contre toi v. 14,20. –  amour  : cf. Jr 2.2 ; Mt 24.12 ; 1Tm 5.12.'
  - type: text
    content: 'Mais j''ai ceci contre toi : tu as abandonné ton amour premier. '
  '5':
  - type: note
    content: 'tombé Ga 5.4. –  change radicalement  : autres traductions repens-toi, convertis-toi  ; même terme v. 16,21ns ; 3.3,19 ; 9.20s ; 16.9,11. –  reviens…  : litt. fais les œuvres premières. –  j''enlèverai…  : litt. je bougerai…  ; même formule en 6.14.'
  - type: text
    content: 'Souviens-toi donc d''où tu es tombé, change radicalement et reviens à tes œuvres premières ; sinon, si tu ne changes pas radicalement, je viendrai à toi et j''enlèverai ton porte-lampes de sa place. '
  '6':
  - type: note
    content: tu détestes… Ps 139.21. –  Nicolaïtes v. 15 ; peut-être un courant de tendance gnostique et libertine (cf. v. 2,14n,20,24), dont on ignore tout par ailleurs ; une tradition le rattache au Nicolas d'Ac 6.5.
  - type: text
    content: 'Cependant, tu as ceci pour toi : tu détestes les œuvres des Nicolaïtes, œuvres que moi-même je déteste.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Que celui qui a des oreilles entende ou écoute  ; v. 11,17,29 ; 3.6,13,22 ; 13.9 ; Mt 11.15+ ; Mc 4.9+. – Voir Esprit . –  vainqueur v. 11,17,26 ; 3.5,12,21 ; 21.7. –  arbre de la vie  : cf. 22.2+ ; Gn 2.9 ; 3.22,24 ; voir aussi Ez 31.8 ; Testament de Lévi 18.10s : « C''est lui (le grand prêtre nouveau) qui ouvrira les portes du Paradis, et qui écartera l''épée qui menace Adam. Il donnera aux saints à manger du fruit de l''arbre de vie, et l''Esprit de sainteté sera sur eux. »'
  - type: text
    content: Que celui qui a des oreilles entende ce que l'Esprit dit aux Eglises !
  - type: text
    content: Au vainqueur, je donnerai de manger de l'arbre de la vie qui est dans le paradis de Dieu.
  - type: heading
    content: Lettre à l'Eglise de Smyrne
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Smyrne 1.11n. –  premier / dernier 1.17+. –  qui est mort…  : litt. qui devint mort et qui vécut (ou se mit à vivre ) 1.18 ; 13.14 ; 20.4 ; cf. Rm 14.9.'
  - type: text
    content: 'A l''ange de l''Eglise de Smyrne, écris :'
  - type: text
    content: 'Voici ce que dit le premier et le dernier, celui qui est mort et qui a repris vie : '
  '9':
  - type: note
    content: 'détresse v. 10 ; 1.9+. –  pauvreté / riche 2Co 6.10. –  calomnies ou blasphèmes  ; sur le mot correspondant, voir aussi 13.1,5s ; 16.9,11,21 ; 17.3. –  se disent juifs…  : cf. Rm 2.28s ; Ga 3.29 ; 6.16. –  synagogue du Satan 3.9 ; cf. Jn 8.31-47 ; 2Co 11.13ss ; voir démon, diable, Satan.'
  - type: text
    content: 'Je connais ta détresse, ta pauvreté – pourtant tu es riche – et les calomnies de ceux qui se disent juifs et ne le sont pas : ils sont une synagogue du Satan. '
