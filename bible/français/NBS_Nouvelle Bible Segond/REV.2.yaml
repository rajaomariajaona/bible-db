      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.4-8, lors de la destruction du temple de Jérusalem, Jérémie aurait caché le coffre de l''alliance et ce qu''il contenait (y compris la manne) dans une grotte du mont Nebo, et Dieu devait la faire réapparaître à la fin des temps (cf. Ap 11.19). – Le '
      - type: usfm
        marker: fq
