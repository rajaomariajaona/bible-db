        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'aie aucune peur…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent une formule plus courante, habituellement traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: n'aie pas peur
      - type: usfm
        marker: ft
        children:
        - type: text
