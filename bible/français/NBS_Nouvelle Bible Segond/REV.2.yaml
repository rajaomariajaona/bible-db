      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous aurez de la détresse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jn 16.33. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dix jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comparer avec 20.4 ; voir aussi Dn 1.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: couronne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''image est ici celle de la couronne de lauriers reçue par le vainqueur des jeux de l''arène plutôt que celle de la couronne royale ou diadème ; cf. 3.11 ; 4.4,10 ; 6.2 ; 9.7 ; 12.1 ; 14.14+ ; Ps 21.4s ; 1Co 9.25+ ; Ph 4.1 ; Jc 1.12 ; voir aussi Za 6.14.'
      marker-yv: yv-n
    - type: text
      text: 'N''aie aucune peur de ce que tu vas souffrir. Le diable va jeter quelques-uns d''entre vous en prison, pour que vous soyez mis à l''épreuve : vous connaîtrez la détresse pendant dix jours. Sois fidèle jusqu''à la mort, et je te donnerai la couronne de la vie.'
