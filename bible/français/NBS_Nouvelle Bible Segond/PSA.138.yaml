document_id: PSA.138,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Je te célèbre de tout mon cœur
  - type: text
    content: ' '
  - type: note
    content: Je te célèbre… 9.2 ; 118.28 ; quelques mss hébreux et des versions anciennes ajoutent YHWH (ou Seigneur ). –  de tout mon cœur 86.12+ ; LXX ajoute parce que tu as entendu les paroles de ma bouche. –  face aux dieux ou devant les dieux  ; LXX les anges  ; Syr les rois (v. 4) ; Tg les juges  ; cf. 29.1n  ; 82.1n  ; 86.8 ; 89.7 ; 96.4 ; 97.7,9 ; Ex 15.11 ; Es 43.10 ; 44.8 ; voir aussi Gn 1.1n  ; 1Co 11.10. –  je te chante 7.18n.
  - type: text
    content: De David.
  - type: text
    content: Je te célèbre de tout mon cœur ;
  - type: text
    content: face aux dieux je te chante.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'vers ton temple sacré  : cf. 5.8 ; 28.2 ; voir saint. –  tu as magnifié…  : texte obscur et traduction incertaine, litt. tu as grandi ta parole (comme en 119.11n) au-dessus (ou à cause ) de tout ton nom  ; certains modifient le texte hébreu traditionnel pour lire au-dessus du ciel  ; cf. 107.20 ; 119.38n  ; 130.5.'
  - type: text
    content: Je me prosterne vers ton temple sacré
  - type: text
    content: et je célèbre ton nom,
  - type: text
    content: à cause de ta fidélité et de ta loyauté,
  - type: text
    content: car tu as magnifié ta parole au-delà de tout renom.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'tu m''as répondu 22.22 ; 99.6. –  tu m''as donné…  : texte obscur et traduction incertaine, litt. tu as agité de la force en moi  ; certains modifient légèrement le texte hébreu traditionnel pour lire tu as augmenté la force en moi ou ma force vitale  ; cf. v. 7.'
  - type: text
    content: Le jour où je t'ai invoqué, tu m'as répondu,
  - type: text
    content: tu m'as donné de la hardiesse, de la force.
  '4':
  - type: text
    content: ' '
  - type: note
    content: les rois de la terre 68.33 ; cf. 22.28s ; 47.2ss ; 66.8 ; 67.4ss ; 96.7ss. –  quand ils entendront ou parce qu'ils ont entendu.
  - type: text
    content: 'Tous les rois de la terre te célébreront, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: quand ils entendront les paroles de ta bouche ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'les voies du Seigneur  : autre traduction sur les chemins du Seigneur . – Voir gloire.'
  - type: text
    content: 'ils chanteront les voies du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: 'car la gloire du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grande.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les gens hautains…  : c.-à-d. il ne les connaît que de loin , ou bien il les reconnaît de loin  ; certains modifient le texte hébreu traditionnel pour lire il humilie les gens hautains  ; 113.5ss ; cf. 14.2 ; 33.13ss ; 34.16s ; 102.20s ; voir aussi Es 57.15 ; Lc 1.48.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est élevé, mais il voit ce qui est abaissé ;'
  - type: text
    content: et les gens hautains, il les connaît de loin.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Si je marche… 23.4. –  la colère ou le nez. –  ta main droite 18.36 ; 118.15s.
  - type: text
    content: Si je marche au sein de la détresse, tu me fais vivre,
  - type: text
    content: tu étends ta main sur la colère de mes ennemis,
  - type: text
    content: ta main droite me sauve.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'mène tout… 57.3 ; cf. Ph 1.6. –  ta fidélité… 100.5+. –  N''abandonne pas ou ne laisse pas en suspens, ne relâche pas. –  les œuvres (ou l''œuvre , selon les mss) de tes mains  : cf. Jb 14.15.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' mène tout à bonne fin pour moi.'
  - type: text
    content: Seigneur
  - type: text
    content: ', ta fidélité est pour toujours !'
  - type: text
    content: N'abandonne pas les œuvres de tes mains !
