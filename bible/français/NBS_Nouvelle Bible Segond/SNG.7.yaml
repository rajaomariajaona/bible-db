document_id: SNG.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Autres
  - type: text
    content: ' '
  - type: note
    content: 'Shoulamite (hébreu Shoulammith  ; cf. la Shounamite de 1R 1.3n), autre terme de la racine évoquant la paix, qui fait pendant au nom de Salomon (cf. 1.1n,4n  ; 6.4n  ; 8.10). –  Qu''avez-vous à regarder la Shoulamite  : autre traduction que regardez-vous dans la Shoulamite . –  comme la danse…  : ces mots pourraient aussi être compris comme la réponse à la question que regardez-vous . –  des deux camps ou des deux troupes  ; hébreu mahanayim , comme en Gn 32.3n  ; il s''agissait peut-être d''une danse nuptiale à deux partenaires ou à deux groupes de danseurs.'
  - type: text
    content: Reviens, reviens, Shoulamite !
  - type: text
    content: Reviens, reviens, que nous te regardions !
  - type: text
    content: Qu'avez-vous à regarder la Shoulamite
  - type: text
    content: comme la danse des deux camps ?
  - type: heading
    content: Lui
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ta bouche  : litt. ton palais  ; 2.3n  ; 5.16n  ; cf. 4.11 ; 5.13. –  comme le vin du bonheur  : autre traduction comme le bon vin  ; cf. 1.2+. –  aisément  : cf. Pr 23.31n.'
  - type: text
    content: et ta bouche comme le vin du bonheur…
  - type: heading
    content: Elle
  - type: text
    content: Il coule aisément pour mon bien-aimé,
  - type: text
    content: il glisse sur les lèvres des dormeurs.
  - type: heading
    content: Le bonheur d'être aimé
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis à… 2.16+. –  son désir…  : le terme hébreu correspondant n''apparaît qu''ici et en Gn 3.16n  ; 4.7.'
  - type: text
    content: Je suis à mon bien-aimé,
  - type: text
    content: et son désir se porte vers moi.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Viens… cf. 2.10-14 ; Ap 22.17. –  dans les villages  : le même mot, au singulier, a été rendu henné en 1.14n.'
  - type: text
    content: Viens, mon bien-aimé, sortons dans les champs,
  - type: text
    content: passons les nuits dans les villages !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'vignes  : autre traduction vergers  ; autre terme au vers suivant. –  voir si la vigne… 6.11. –  mes caresses 1.2n.'
  - type: text
    content: Au petit matin nous irons dans les vignes,
  - type: text
    content: voir si la vigne bourgeonne, si la fleur s'ouvre,
  - type: text
    content: si les grenadiers fleurissent.
  - type: text
    content: Là je te donnerai mes caresses.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Les mandragores  : cf. Gn 30.14n-16. Le mot hébreu rappelle ceux pour caresses et bien-aimé (v. 13 ; cf. 1.13n). –  fruits exquis 4.13n,16. –  nouveaux / anciens  : cf. Lv 26.10 ; Mt 13.52.'
  - type: text
    content: Les mandragores exhalent leur senteur ;
  - type: text
    content: à nos portes sont tous les fruits exquis,
  - type: text
    content: les nouveaux comme les anciens ;
  - type: text
    content: mon bien-aimé, je les ai réservés pour toi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tes pieds  : litt. tes pas . –  fille de noble  : cf. 6.12n.'
  - type: text
    content: Que tes pieds sont beaux dans tes sandales, fille de noble !
  - type: text
    content: Les contours de tes cuisses sont comme des colliers,
  - type: text
    content: œuvre des mains d'un artiste.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Ton bassin  : d''après le sens d''un terme apparenté en Ez 16.4, il pourrait s''agir du nombril ; quoi qu''il en soit, il s''agit sans doute ici d''un euphémisme pour le sexe féminin. –  une coupe  : le même terme est traduit par bassine en Ex 24.6 ; Es 22.24. –  le vin parfumé  : litt. le mélange  ; cf. 8.2n.'
  - type: text
    content: Ton bassin est une coupe arrondie,
  - type: text
    content: où le vin parfumé ne manque pas ;
  - type: text
    content: ton ventre est un monceau de froment,
  - type: text
    content: entouré de lis.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 4.5n.
  - type: text
    content: Tes deux seins sont comme deux petits,
  - type: text
    content: jumeaux d'une gazelle.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'une tour d''ivoire  : litt. la tour d''ivoire  ; cf. 4.4n. –  yeux  : en hébreu, même mot que source(s) . –  Heshbôn Nb 21.25n  ; Es 15.4n  ; ville de Transjordanie où l''on a retrouvé d''anciens réservoirs d''eau. –  Bath-Rabbim  : fille de la multitude  ; ainsi a traduit la version latine (Vg). –  tour du Liban  : soit un édifice dont on ignore l''emplacement, soit un sommet du Liban décrit comme une tour ; cf. 4.8 ; 5.15. –  Damas Gn 14.15.'
  - type: text
    content: Ton cou est comme une tour d'ivoire ;
  - type: text
    content: tes yeux sont comme les réservoirs de Heshbôn,
  - type: text
    content: près de la porte de Bath-Rabbim ;
  - type: text
    content: ton nez est comme la tour du Liban
  - type: text
    content: qui guette du côté de Damas.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'comme le Carmel , imposant et luxuriant (Es 29.17n  ; 33.9n  ; 35.2) ; ce nom rappelle celui de la vigne (1.6n). –  tes nattes  : litt. les nattes ( ?) de ta tête . –  comme la pourpre rouge (hébreu ka''argamôn , assonance avec Carmel) qui faisait la richesse de la Phénicie, non loin de là (cf. Ex 25.4n). –  un roi 1.4n. –  ondulations  : le terme hébreu désigne habituellement (Gn 30.38,41 ; Ex 2.16) des auges ou des abreuvoirs où l''on verse de l''eau.'
  - type: text
    content: Ta tête se dresse comme le Carmel,
  - type: text
    content: et tes nattes sont comme la pourpre rouge ;
  - type: text
    content: un roi est enchaîné dans leurs ondulations !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Que tu es belle 1.15n. –  douce 1.16. –  mon amour…  : litt. amour (2.7n) , dans les délices  ; cf. Ec 2.8n.'
  - type: text
    content: Que tu es belle, que tu es douce,
  - type: text
    content: mon amour, mes délices !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'palmier  : hébreu tamar , souvent nom propre féminin ; cf. Gn 38.6 ; 2S 13.1 ; 14.27.'
  - type: text
    content: Ta stature ressemble au palmier,
  - type: text
    content: et tes seins à des grappes.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'fruits  : le mot hébreu correspondant n''apparaît qu''ici. Il désigne probablement les régimes de dattes. –  Que tes seins…  : cf. Pr 5.19. –  des pommes 2.3+,5.'
  - type: text
    content: 'J''ai dit : Je vais monter au palmier,'
  - type: text
    content: j'en saisirai les fruits !
  - type: text
    content: Que tes seins soient comme des grappes de raisin,
  - type: text
    content: la senteur de ton souffle comme celle des pommes,
