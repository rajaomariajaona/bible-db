document_id: ZEC.1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: PREMIÈRE PARTIE
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Revenez à moi
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le huitième mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : octobre-novembre 520 av. J.-C. ; cf. v. 7 ; 7.1 ; Ag 1.1,15 ; 2.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zacharie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH se souvient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') Esd 5.1 ; 6.14 ; cf. Né 12.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bérékia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Mt 23.35+.'
      marker-yv: yv-n
    - type: text
      text: 'Le huitième mois, la deuxième année de Darius, la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Zacharie, fils de Bérékia, fils d''Iddo, le prophète :'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 4.10 ; 6.7 ; Jb 1.7+.
      marker-yv: yv-n
    - type: text
      text: 'L''homme qui se tenait parmi les myrtes dit : Ce sont ceux que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a envoyés parcourir la terre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils dirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement les cavaliers, non mentionnés (cf. v. 8). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en repos et tranquille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 18.7,27 ; Ez 38.11 ; cette description se réfère vraisemblablement à la domination incontestée des Perses sur le Proche-Orient.'
      marker-yv: yv-n
    - type: text
      text: 'Ils dirent au messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' qui se tenait parmi les myrtes : Nous avons parcouru la terre ; toute la terre est en repos et tranquille. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jusqu''à quand '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 12.4 ; Ha 1.2 ; Ps 6.4 ; 13.2 ; 89.47 ; Dn 8.13 ; Ap 6.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soixante-dix ans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (environ) depuis la destruction de Jérusalem par Nabuchodonosor en 587/6 av. J.-C. ; cf. 7.5 ; Jr 25.11s ; 29.10 ; 2Ch 36.21.
      marker-yv: yv-n
    - type: text
      text: 'Le messager du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' reprit : '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, jusqu''à quand seras-tu sans compassion pour Jérusalem et pour les villes de Juda, contre lesquelles tu es en fureur depuis soixante-dix ans ? '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Es 40.1+ss.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' répondit par des paroles bienfaisantes, par des paroles de consolation, au messager qui parlait avec moi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.2 ; cf. Os 11.8 ; Jl 2.18 ; voir aussi Ex 20.5+.
      marker-yv: yv-n
    - type: text
      text: 'Et le messager qui parlait avec moi me dit : Proclame : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je suis pris d'une grande passion, d'une passion jalouse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour Jérusalem et pour Sion,
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''un peu irrité… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2 ; 7.12 ; 8.14 ; Es 47.6 ; 54.7-9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ajouté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aidé.
      marker-yv: yv-n
    - type: text
      text: et je suis saisi d'une grande irritation
  - type: usfm
    marker: q1
    children:
    - type: text
      text: contre les nations satisfaites ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car moi, je n'étais qu'un peu irrité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais elles, elles ont ajouté au malheur.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 40.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le cordeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pour mesurer le terrain en vue d'une reconstruction, 2.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Jr 31.38-40 ; Ez 40.3–48.35 ; Ap 21.15-17.'
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je reviens à Jérusalem avec compassion ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ma maison y sera rebâtie
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées –'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et le cordeau sera tendu sur Jérusalem.
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'déborderont '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: éclateront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le verbe hébreu a généralement été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: disperser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Gn 11.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'consolera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 51.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son choix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : 2.16 ; 3.2 ; cf. Dt 7.7s ; 12.5+ ; 1R 3.8 ; Ag 2.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 15.2.'
      marker-yv: yv-n
    - type: text
      text: 'Proclame encore ceci :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Mes villes déborderont encore de biens ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' consolera encore Sion ;'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il portera encore son choix sur Jérusalem.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'est irrité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'est beaucoup irrité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. v. 6,15.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''est irrité contre vos pères.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ml 3.7 ; cf. Es 31.6 ; Jr 3.12,14,22 ; Ez 14.6 ; 18.30 ; 33.11 ; Jl 2.13 ; Am 4.6 ; Jc 4.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu leur diras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d., sans doute, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu diras au peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains pensent qu''il y avait à l''origine quelque chose d''autre avant ces mots, p. ex. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: va vers ce peuple et tu leur diras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' … des Armées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1S 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Tu leur diras : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Revenez à moi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: '– déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées –'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et je reviendrai à vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'dit le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées.'
  '4':
  - type: usfm
    marker: m
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 18.11+ ; 25.5-7 ; Ps 78.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
        - type: text
          text: ' d''autrefois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.7+,12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voies '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'agissements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6 ; Jr 4.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ne soyez pas comme vos pères, à qui les prophètes d''autrefois proclamaient : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées : Revenez, je vous prie, de vos voies mauvaises, de vos agissements mauvais ! Mais ils n''ont pas écouté, ils n''ont pas prêté attention à moi – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jn 8.52.
      marker-yv: yv-n
    - type: text
      text: Vos pères, où sont-ils ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Et les prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vivent-ils à jamais ?
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme il avait décidé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.14s ; cf. Dt 30.1s ; Jos 23.14s ; 1R 8.46-51 ; Es 55.11 ; Jr 40.3 ; Lm 2.17 ; Dn 9.10s ; Né 9.34-37 ; Ap 10.7.
      marker-yv: yv-n
    - type: text
      text: Pourtant les paroles et les prescriptions
  - type: usfm
    marker: q1
    children:
    - type: text
      text: que j'avais instituées par mes serviteurs, les prophètes,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: n'ont-elles pas atteint vos pères ?
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sont revenus et ils ont dit : Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées nous a traités comme il avait décidé de le faire, selon nos voies et nos agissements.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Première vision : les chevaux'
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le vingt-quatrième jour…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : en février 519 av. J.-C. (cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: '. – En hébreu le v. s''achève sur la formule qui introduit habituellement le discours direct (correspondant aux deux points [ :] du v. 1 etc.) ; il faut sans doute comprendre que '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la parole du '
        - type: usfm
          marker: nd
          children:
          - type: text
