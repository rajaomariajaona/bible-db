document_id: ZEC.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: PREMIÈRE PARTIE
  - type: heading
    content: Revenez à moi
  - type: text
    content: ' '
  - type: note
    content: 'Le huitième mois  : octobre-novembre 520 av. J.-C. ; cf. v. 7 ; 7.1 ; Ag 1.1,15 ; 2.10. –  Zacharie ( YHWH se souvient ) Esd 5.1 ; 6.14 ; cf. Né 12.16. –  Bérékia  : cf. Mt 23.35+.'
  - type: text
    content: 'Le huitième mois, la deuxième année de Darius, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Zacharie, fils de Bérékia, fils d''Iddo, le prophète :'
  '10':
  - type: note
    content: Cf. 4.10 ; 6.7 ; Jb 1.7+.
  - type: text
    content: 'L''homme qui se tenait parmi les myrtes dit : Ce sont ceux que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a envoyés parcourir la terre. '
  '11':
  - type: note
    content: 'Ils dirent  : probablement les cavaliers, non mentionnés (cf. v. 8). –  en repos et tranquille  : cf. Jg 18.7,27 ; Ez 38.11 ; cette description se réfère vraisemblablement à la domination incontestée des Perses sur le Proche-Orient.'
  - type: text
    content: 'Ils dirent au messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui se tenait parmi les myrtes : Nous avons parcouru la terre ; toute la terre est en repos et tranquille. '
  '12':
  - type: note
    content: jusqu'à quand Jr 12.4 ; Ha 1.2 ; Ps 6.4 ; 13.2 ; 89.47 ; Dn 8.13 ; Ap 6.10. –  soixante-dix ans (environ) depuis la destruction de Jérusalem par Nabuchodonosor en 587/6 av. J.-C. ; cf. 7.5 ; Jr 25.11s ; 29.10 ; 2Ch 36.21.
  - type: text
    content: 'Le messager du '
  - type: text
    content: Seigneur
  - type: text
    content: ' reprit : '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, jusqu''à quand seras-tu sans compassion pour Jérusalem et pour les villes de Juda, contre lesquelles tu es en fureur depuis soixante-dix ans ? '
  '13':
  - type: note
    content: Cf. Es 40.1+ss.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit par des paroles bienfaisantes, par des paroles de consolation, au messager qui parlait avec moi. '
  '14':
  - type: note
    content: 8.2 ; cf. Os 11.8 ; Jl 2.18 ; voir aussi Ex 20.5+.
  - type: text
    content: 'Et le messager qui parlait avec moi me dit : Proclame : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Je suis pris d'une grande passion, d'une passion jalouse,
  - type: text
    content: pour Jérusalem et pour Sion,
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'qu''un peu irrité… v. 2 ; 7.12 ; 8.14 ; Es 47.6 ; 54.7-9. –  ajouté  : litt. aidé.'
  - type: text
    content: et je suis saisi d'une grande irritation
  - type: text
    content: contre les nations satisfaites ;
  - type: text
    content: car moi, je n'étais qu'un peu irrité,
  - type: text
    content: mais elles, elles ont ajouté au malheur.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'maison  : cf. Ez 40.5n. –  le cordeau pour mesurer le terrain en vue d''une reconstruction, 2.5n  ; cf. Jr 31.38-40 ; Ez 40.3–48.35 ; Ap 21.15-17.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je reviens à Jérusalem avec compassion ;
  - type: text
    content: ma maison y sera rebâtie
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: et le cordeau sera tendu sur Jérusalem.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'déborderont ou éclateront  ; le verbe hébreu a généralement été traduit par disperser  ; cf. Gn 11.4. –  consolera Es 51.3. –  son choix  : 2.16 ; 3.2 ; cf. Dt 7.7s ; 12.5+ ; 1R 3.8 ; Ag 2.23n  ; 1Ch 15.2.'
  - type: text
    content: 'Proclame encore ceci :'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Mes villes déborderont encore de biens ;
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' consolera encore Sion ;'
  - type: text
    content: il portera encore son choix sur Jérusalem.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 's''est irrité  : autre traduction s''est beaucoup irrité  ; cf. v. 6,15.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est irrité contre vos pères.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Ml 3.7 ; cf. Es 31.6 ; Jr 3.12,14,22 ; Ez 14.6 ; 18.30 ; 33.11 ; Jl 2.13 ; Am 4.6 ; Jc 4.8. –  Tu leur diras , c.-à-d., sans doute, tu diras au peuple  ; certains pensent qu'il y avait à l'origine quelque chose d'autre avant ces mots, p. ex. va vers ce peuple et tu leur diras . –  le Seigneur … des Armées 1S 1.3n  ; voir noms divins.
  - type: text
    content: 'Tu leur diras : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: Revenez à moi
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées –'
  - type: text
    content: et je reviendrai à vous,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jr 18.11+ ; 25.5-7 ; Ps 78.8. –  prophètes d'autrefois 7.7+,12. –  voies / agissements v. 6 ; Jr 4.4n.
  - type: text
    content: 'Ne soyez pas comme vos pères, à qui les prophètes d''autrefois proclamaient : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées : Revenez, je vous prie, de vos voies mauvaises, de vos agissements mauvais ! Mais ils n''ont pas écouté, ils n''ont pas prêté attention à moi – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jn 8.52.
  - type: text
    content: Vos pères, où sont-ils ?
  - type: text
    content: Et les prophètes,
  - type: text
    content: vivent-ils à jamais ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: comme il avait décidé 8.14s ; cf. Dt 30.1s ; Jos 23.14s ; 1R 8.46-51 ; Es 55.11 ; Jr 40.3 ; Lm 2.17 ; Dn 9.10s ; Né 9.34-37 ; Ap 10.7.
  - type: text
    content: Pourtant les paroles et les prescriptions
  - type: text
    content: que j'avais instituées par mes serviteurs, les prophètes,
  - type: text
    content: n'ont-elles pas atteint vos pères ?
  - type: text
    content: 'Ils sont revenus et ils ont dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées nous a traités comme il avait décidé de le faire, selon nos voies et nos agissements.'
  - type: heading
    content: 'Première vision : les chevaux'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Le vingt-quatrième jour…  : en février 519 av. J.-C. (cf. v. 1n) ; voir calendrier. – En hébreu le v. s''achève sur la formule qui introduit habituellement le discours direct (correspondant aux deux points [ :] du v. 1 etc.) ; il faut sans doute comprendre que la parole du Seigneur consiste ici dans le récit de la vision (v. 8ss).'
  - type: text
    content: 'Le vingt-quatrième jour du onzième mois (le mois de Shebath), la deuxième année de Darius, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Zacharie, fils de Bérékia, fils d''Iddo, le prophète :'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Voici ce que je vis 2.1,5 ; 5.1 ; 6.1 ; cf. Am 7.1,7 ; Dn 7.1 ; Ap 1.2. –  roux  : LXX rouge feu , comme en Ap 6.3. –  les myrtes  : cf. Es 41.19 ; 55.13 ; Né 8.15 ; LXX entre les deux montagnes (aussi v. 10s ; 6.2s). –  dans le gouffre ou dans la profondeur  ; même mot, avec une variante orthographique mineure, qu''en 10.11 ; Ex 15.5 ; Es 44.27 ; Mi 7.19 ; Ps 68.23 ; 69.3,16 ; 88.7 ; 107.24 ; Né 9.11 ; certains pensent qu''il s''agit ici d''un nom de lieu connu, près de Jérusalem. –  des chevaux…  : cf. 6.1-8 ; 2R 2.11 ; 6.17 ; Ap 6.1-8. –  fauves  : traduction incertaine ; on a aussi compris alezans, gris.'
  - type: text
    content: 'Voici ce que je vis pendant la nuit : Un homme monté sur un cheval roux se tenait parmi les myrtes dans le gouffre. Il y avait derrière lui des chevaux roux, fauves et blancs. '
  '9':
  - type: note
    content: 'Cf. v. 13s ; 2.4 ; 4.1 ; voir aussi Ez 40.3ss ; Dn 7.16 ; Ap 17.7 ; 21.9 ; 22.1. –  Qui sont-ils  : litt. que sont-ils, de même dans la suite. –  Le messager (ou l''ange) : cf. 2.2 ; 3.1 ; 4.1 ; 5.2 ; 6.5 ; 12.8.'
  - type: text
    content: 'Je dis : Qui sont-ils, mon seigneur ? Le messager qui parlait avec moi me dit : Moi, je vais te faire voir qui ils sont. '
