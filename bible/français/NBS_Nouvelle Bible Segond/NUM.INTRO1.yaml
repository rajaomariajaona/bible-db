document_id: NUM.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le livre des Nombres raconte l'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: histoire théologique
  - type: text
    text: '  du séjour du peuple de Dieu au désert pendant les fameuses quarante années d''épreuve qui précèdent son installation en Terre promise. Ce thème des quarante ans, déjà annoncé par l''Exode (16.35), parcourt les livres des Nombres, du Deutéronome et même de Josué (Jos 5.6). Mais c''est sans conteste le livre des Nombres qui lui donne consistance et signification.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''appellation hébraïque traditionnelle,  '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: 'Dans le désert  '
  - type: text
    text: (Nb 1.1
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: )
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: ','
  - type: text
    text: '  correspond assez bien, pour une fois, au contenu de l''ouvrage. Pourtant, les rabbins ont accueilli dans le  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Talmud*
  - type: text
    text: '  la désignation qui nous est familière,  '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Nombres
  - type: text
    text: '  (c.-à-d. « les comptages de la Torah »), en reprenant l''intitulé proposé par la  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Septante
  - type: text
    text: '  (voir LXX* et l''introduction à l''Ancien Testament, p.${Xbhlxx}). De fait, l''ouvrage comporte deux grands recensements, l''un situé au commencement de l''épopée, l''autre vers la fin (chap. 1–4 et 26), et encore plusieurs autres de moindre importance (chap. 7,8,15,29,31).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pourquoi un  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: second comptage
  - type: text
    text: '  au chapitre 26? Le premier dénombrement (chap. 1–4) était tourné vers le passé et vers la mort. C''était celui du peuple qui se montra rebelle au moment des épreuves et qui fut condamné à séjourner au désert jusqu''à sa complète disparition par mort naturelle. Le second recensement, en revanche, est celui des fils. C''est un recensement pour la vie, pour la Terre promise.'
- type: usfm
  marker: is1
  children:
  - type: text
    text:  Une mémoire d'avenir
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Qu''apporte en propre le livre, outre les comptages ? Il remplit une  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: fonction
  - type: text
    text: '  particulière aussi bien dans le cadre du Pentateuque, dont il fait maintenant partie, que par rapport à l''ensemble de l''histoire biblique.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Tandis que le livre de l''Exode raconte l''accession à la liberté, celui des Nombres ajoute  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: réflexion
  - type: text
    text: '  et enrichissement documentaire. On y apprendra que les chemins de la liberté sont semés d''obstacles et de pièges. Le récit ne dissimule rien des revers essuyés par Moïse et par le peuple saint. '
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les générations futures auront à puiser dans cette « mémoire d''avenir » pour parvenir à surmonter des difficultés de même nature. Par deux fois, le livre s''en explique :  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'C''est un  '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: rappel
  - type: text
    text: '  (ou  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: une évocation
  - type: text
    text: )
  - type: usfm
    marker: it
    children:
    - type: text
      text: '  pour les Israélites'
  - type: text
    text: '  (17.5; cf. 31.54). L''apôtre Paul notera :  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ce sont là des exemples pour nous
  - type: text
    text: '  (1Co 10.6).'
- type: usfm
  marker: is1
  children:
  - type: text
    text: Un itinéraire, des digressions
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Comme plus tard dans les évangiles, l''enseignement se greffe sur un  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: récit de voyage
  - type: text
    text: '. A certaines étapes, on s''attarde pour recevoir des instructions particulières, puis le mouvement reprend. Après les dix-neuf jours au Sinaï, les quarante années de voyage et surtout d''attente aux alentours de Qadesh-Barnéa (13.26; 20.1; 32.8), Israël se rend assez rapidement maître du pays de Moab, et l''on atteint la basse vallée du Jourdain, les  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: plaines arides de Moab
  - type: text
    text: '  (22.1).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le plan analytique ci-contre propose une répartition des textes en fonction de leur situation dans le parcours, mais aussi de leur contenu. Celui-ci fait apparaître des préoccupations sur lesquelles il faudra revenir. On notera que le « livret de Balaam » jouit d'un statut particulier.
- type: usfm
  marker: is1
  children:
  - type: text
    text: Des données pour l'histoire nationale
- type: usfm
  marker: ip
  children:
  - type: text
    text: Le cadre historique du livre des Nombres reste proche de celui de l'Exode. Mais, à partir du départ de la communauté, au chapitre 10, l'environnement géopolitique sera différent. Comme toujours, il convient de rappeler que la pérégrination dans le désert n'exclut pas la possibilité de rencontres avec d'
  - type: usfm
    marker: bd
    children:
    - type: text
      text: autres clans
  - type: text
    text: '  qui vivent dans les mêmes contrées. La tradition biblique a conservé de nombreuses (et précieuses) indications généalogiques d''où il ressort qu''Israël et ces clans sont apparentés. Hobab (10.29) peut ainsi être donné comme Madianite, bien que Juges 4.11 en fasse un Caïnite. Or les Caïnites ou Qénites ont leur « nid » (en hébreu  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: qen
  - type: text
    text: ') près des Amalécites (Nb 24.20s), Amalec est le petit-fils d''Esaü (Gn 36.12), et  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Esaü, c'est Edom
  - type: text
    text: '  (Gn 36.8,19,43), précisément cet Edom qui refusera aux Israélites un passage direct vers le nord (Nb 20.14; voir aussi 24.18). La Bible elle-même enseigne à lire les noms des grands ancêtres comme recouvrant aussi les peuples qui en sont issus, et leurs territoires.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces cousinages, on le voit, ne sont pas toujours très cordiaux. On perçoit ainsi un net durcissement des relations avec  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Madiân
  - type: text
    text: '  (chap. 25 ; 31), auprès de qui la médiation de Hobab, s''il a suivi Moïse comme ce dernier le lui demandait (10.29), ne semble plus très efficace. En Nombres 22.4,  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: les anciens de Madiân
  - type: text
    text: '  (appelés  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: rois
  - type: text
    text: '  en 31.7) exercent manifestement leur suzeraineté sur le roi de Moab, qui leur demande conseil et assistance. '
- type: usfm
  marker: is1
  children:
  - type: text
    text: Echecs et contestations
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La narration est particulièrement riche en incidents qui mettent en cause l''action de Dieu et le rôle de Moïse. Le deuxième dénombrement montre l''efficacité de la  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sanction
  - type: text
    text: '  appliquée à l''incrédulité (14.26-35), puisque, parmi ceux qui furent dénombrés par Moïse et Eléazar dans les plaines de Moab,  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: il n'y avait aucun de ceux qui avaient été recensés... dans le désert du Sinaï
  - type: text
    text: ', c''est-à-dire quarante ans plus tôt, du vivant d''Aaron (26.63s). Seuls Caleb et Josué font exception (v. 65).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cela constitue l''un des motifs du livre. Il importe en effet que plus tard, lorsqu''on répétera le récit pour l''instruction du peuple de Dieu, on sache que des  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: contestataires
  - type: text
    text: '  s''étaient fait entendre dès les origines, pour suggérer que le plan de Dieu n''était peut-être pas le bon, et que la médiation de Moïse et des siens (Aaron et ses successeurs) n''était pas exclusive d''autres voies de salut.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'C''est pourquoi le livre s''augmente de récits terribles. De simple chronique des événements du passé fondateur, le voici devenu  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: épopée
  - type: text
    text: '. Le ton monte, le verbe s''amplifie. Car devant une erreur intolérable, il faut parler très fort: la terre elle-même va s''ouvrir pour engloutir les prêtres rebelles de la communauté de Coré. L''incident le plus terrible, celui qui laissera le souvenir le plus douloureux, sera celui du piège de Baal-Péor. Ici, la prostitution sacrée entrave la progression du peuple de Dieu vers la Terre promise. Aussi les oppositions s''exacerbent. Face à l''idolâtrie, ce scandale par excellence, qu''il va falloir extirper du pays de Canaan, une seule méthode sera possible : l''éradication totale. En Nombres 25, Phinéas en sera l''exécuteur. Et comme pour lui en rendre hommage, la section de la Bible hébraïque qui relate ces faits terribles et mémorables porte son nom.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Tous les processus d’
  - type: usfm
    marker: bd
    children:
    - type: text
      text: anathème
  - type: text
    text: ', c''est-à-dire de destruction rituelle, mentionnés dans les récits de la conquête et jusqu''aux livres de Josué et de Samuel n''ont qu''une seule fonction : déraciner de l''âme des lecteurs de la Torah et de ceux de toute la Bible jusqu''à la pensée de l''idolâtrie, quels que soient les temps ou les circonstances.'
- type: usfm
  marker: is1
  children:
  - type: text
    text: Des améliorations juridiques au statut de la femme
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le droit des  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: femmes
  - type: text
    text: '  est encore bien mal reconnu dans ces époques lointaines. Le sort réservé aux  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: filles de Tselophhad
  - type: text
    text: '  lorsqu''elles sont veuves et sans enfants inaugure une nouvelle législation. Jusque-là, les veuves d''un époux n''ayant pas laissé de progéniture masculine ne pouvaient hériter de leur mari. Maintenant elles vont pouvoir se remarier. Et, pour autant qu''elles choisissent leur nouvel époux dans le clan qui était celui de leur défunt mari, le fils qui leur naîtra deviendra l''héritier du nom et des terres de leur premier mari. Ainsi ces jeunes veuves acquièrent-elles une véritable citoyenneté dans leurs villages.'
- type: usfm
  marker: is1
  children:
  - type: text
    text: L'histoire de Balaam
- type: usfm
  marker: is1
  children:
  - type: text
    text: (chap. 22–24)
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''histoire de Balaam constitue un  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: livre
  - type: text
    text: '  dans le livre. Elle entretient des rapports singuliers avec le recueil des Nombres, le Pentateuque et la Bible entière. Déjà le  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Talmud
  - type: text
    text: ', aux IV'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: '  et V'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: '  siècles apr. J.-C., prend acte de cette situation quand il note, dans une formulation pleine de respect :  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Moïse écrivit son propre livre
  - type: text
    text: '  — entendons par là la Torah —  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: puis la section de Balaam et le livre de Job
  - type: text
    text: '  ('
  - type: usfm
    marker: it
    children:
    - type: text
      text: Baba Bathra
  - type: text
    text: '  14a, reprenant l''idée déjà émise à propos de Job en  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sota
  - type: text
    text: '  20b).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le récit de la conquête de la Transjordanie est en effet interrompu par ce petit ensemble où le roi de Moab, effrayé de l''avance des forces d''Israël, imagine de leur opposer les puissances spirituelles détenues par un personnage auréolé de légende, le devin Balaam,  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'l''homme qui a l''œil clairvoyant  '
  - type: text
    text: '(24.3). On sait que ce dernier, après avoir passablement hésité, se met finalement en route. A ce moment-là, son ânesse, plus « clairvoyante » que lui, aperçoit l''ange du  '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  (YHWH) en travers du chemin et refuse d''avancer. A la suite de cette péripétie, les récits conduisent progressivement le lecteur à découvrir un Balaam par qui Dieu parle effectivement. Mandaté cette fois par le Dieu vivant, il prononce sur le peuple saint une série d''oracles de  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: bénédiction
  - type: text
    text: . On a vu dans l'un d'eux l'annonce de David, voire du Christ. 
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La figure même de Balaam intrigue à divers titres. On ne sait pas s''il est d''origine araméenne ou édomite. Sa grande  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: réputation
  - type: text
    text: '  dépasse le cadre des informations délivrées par la Bible à son sujet. Est-ce déjà lui, ce  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Béla fils de Beor
  - type: text
    text: '  de Genèse 36.32 qui régna sur Edom ? Est-ce encore lui, ce  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Balaam, fils de Beor, l'homme qui voyait les dieux,
  - type: text
    text: '  longuement évoqué dans l''inscription de Deir `Allah (voir « Les inscriptions de Deir `Allah », p.${Xbalaam})?'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Personnage en partie hors de l'histoire et hors du récit, Balaam délivre cependant des oracles qui font référence à la Genèse (Gn 12.1-3, voir aussi 49.9), mais également au contexte de l'Exode (comparer Ex 1.1 avec Nb 22.6,11; comparer aussi Ex 10.5,15 avec Nb 22.4,5,11).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Devenu momentanément prophète authentique, à la suite du retournement que Dieu a opéré en lui, il va cependant être  '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: jugé sévèrement
  - type: text
    text: '  par le chapitre 31 des Nombres (v. 16); ce texte lui impute la responsabilité de faits non explicités. Dans la ligne de cette notice de Nombres 31, et jusqu''à la deuxième épître de Pierre et à l''Apocalypse, cette opinion défavorable lui restera attachée.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: N'oublions cependant pas les pages fortes du récit principal où cet homme, saisi par Dieu, doit être considéré comme un des personnages extérieurs à Israël dont Dieu s'est servi, comme on le dira plus tard de Cyrus le Grand (Es 45.1).
- type: usfm
  marker: is1
  children:
  - type: text
    text: Relectures chrétiennes
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le chrétien perdrait beaucoup à ignorer le livre des Nombres. La pertinence d''un épisode comme celui du serpent de bronze (21) pour éclairer l''œuvre rédemptrice du Christ n''est plus à démontrer : le quatrième évangile s''en est chargé (Jn 3.14; voir aussi Col 2.14). On sait également ce qu''une institution comme le rituel de la vache rousse (19; voir aussi Hé 9.13) peut apporter à la compréhension du même mystère.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Reste surtout la leçon des quarante années de préparation avant l'entrée en Terre promise comme image de la vie du chrétien, qui doit mourir à lui-même pour entrer dans le Royaume de Dieu, au terme d'une pérégrination qui peut s'appeler le temps de l'Eglise. 
