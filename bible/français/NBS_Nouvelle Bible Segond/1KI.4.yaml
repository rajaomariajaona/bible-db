document_id: 1KI.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Organisation du royaume de Salomon
  - type: text
    content: ' '
  - type: note
    content: 'Le roi Salomon…  : les v. 1-6 présentent beaucoup de différences avec LXX et des noms incertains. –  sur tout Israël  : l''expression désigne la totalité des tribus israélites primitivement fédérées en 2 groupes, au nord et au sud ( Juda et Israël du v. 20 ; cf. 2S 5.1-5).'
  - type: text
    content: 'Le roi Salomon était roi sur tout Israël. '
  '10':
  - type: note
    content: 'Aroubboth (Les Fenêtres, peut-être ici au sens de passages, cf. Gn 7.11n) : c''est probablement une localité proche du Jourdain. –  Soko  : ville difficile à localiser, d''autres portant le même nom (une ville du Bas-Pays de Juda, Jos 15.35 ; 1S 17.1 ; 2Ch 11.7 ; 28.18 ; une ville du haut-pays de Juda, Jos 15.48 ; 1Ch 4.18). Il s''agit peut-être ici de l''actuel Tell Shouwéiké er-Ras, l''ancien Casal Socque des Croisés, à 10 km au nord-ouest de Samarie. –  Hépher  : cf. Jos 12.17.'
  - type: text
    content: 'Le fils de Hésed, à Aroubboth ; il avait Soko et tout le pays de Hépher. '
  '11':
  - type: note
    content: 'la contrée de Dor  : cf. Jos 17.11n.'
  - type: text
    content: 'Le fils d''Abinadab avait toute la contrée de Dor. Taphath, fille de Salomon, était sa femme. '
  '12':
  - type: note
    content: 'Taanak  : cf. Jos 17.11. –  Meguiddo Jos 17.11n. –  Beth-Shéân Jos 17.11n. –  Tsartân  : site incertain ; cf. 7.46 ; Jos 3.16. –  Jizréel Jos 17.16n  ; 19.18n. –  Abel-Mehola  : cf. 19.16 ; Jg 7.22. –  Yoqméam  : cf. 1Ch 6.53 ; voir aussi Jos 12.22 ; 21.34 (sous la forme Yoqnéam).'
  - type: text
    content: 'Baana, fils d''Ahiloud, avait Taanak, Meguiddo et tout Beth-Shéân, qui est près de Tsartân au-dessous de Jizréel, depuis Beth-Shéân jusqu''à Abel-Mehola, jusqu''au-delà de Yoqméam. '
  '13':
  - type: note
    content: 'Ramoth de Galaad  : en Transjordanie, entre le Yabboq et le Yarmouq ; 22.3-29 ; Dt 4.43 ; Jos 20.8 ; 21.38 ; 2R 8.28 ; 9.1,4,14 ; 1Ch 6.65 ; 2Ch 18.2-19,28 ; 22.5. –  les Douars de Yaïr Jos 13.30n  ; 1Ch 2.23. –  la contrée d''Argob, au nord du Yarmouq ; Dt 3.4,13s. –  Bashân  : région de hauts plateaux en Transjordanie, englobant le cours supérieur du Yarmouq. –  murailles et verrous de bronze  : cf. Dt 3.5 ; Ez 38.11 ; 2Ch 8.5.'
  - type: text
    content: 'Le fils de Guéber, à Ramoth de Galaad ; il avait les Douars de Yaïr, fils de Manassé, au Galaad ; il avait encore la contrée d''Argob au Bashân, soixante grandes villes avec murailles et verrous de bronze. '
  '14':
  - type: note
    content: Mahanaïm Jos 13.26n.
  - type: text
    content: 'Ahinadab, fils d''Iddo, à Mahanaïm. '
  '15':
  - type: text
    content: 'Ahimaats, en Nephtali. Lui aussi avait pris pour femme une fille de Salomon : Basmath. '
  '16':
  - type: note
    content: 'Béaloth  : localité inconnue ; cf. Jos 15.24. LXX Maalath  ; certains modifient le texte hébreu traditionnel pour lire Maaloth (Les Montées), qui pourrait désigner le littoral escarpé au nord d''Akko.'
  - type: text
    content: 'Baana, fils de Houshaï, en Aser et à Béaloth. '
  '17':
  - type: note
    content: LXX place le v. 19 avant ce v.
  - type: text
    content: 'Josaphat, fils de Parouah, en Issacar. '
  '18':
  - type: text
    content: 'Shiméi, fils d''Ela, en Benjamin. '
  '19':
  - type: note
    content: 'Sihôn, roi des Amorites… Og, roi du Bashân  : Jos 2.10n. –  préfet  : le texte hébreu porte ici un terme très proche de celui qui apparaît au v. 5 etc. ; il est également rendu par garnison. –  dans le pays  : il est possible que cette expression désigne ici le territoire de Juda, qui aurait eu un statut spécial.'
  - type: text
    content: Guéber, fils d'Ouri, au pays de Galaad ; il avait le pays de Sihôn, roi des Amorites, et d'Og, roi du Bashân. Il y avait un seul préfet dans le pays.
  '2':
  - type: note
    content: 'ses princes  : autre traduction ses chefs  ; le mot hébreu est rendu différemment, suivant le contexte. Même terme en 1.19,25 ; 2.5,32 etc. –  Azaria  : hébreu ‘Azaryahou  ; même forme longue, pour différents personnages, au v. 5 ; 2R 15.6,8 ; 2Ch 15.1 ; 21.2 ; 22.6 ; 23.1 ; 26.17,20 ; 28.12 ; 29.12 ; 31.10,13.'
  - type: text
    content: 'Voici ses princes :'
  - type: text
    content: Azaria, fils de Tsadoq, le prêtre ;
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'comme le sable…  : cf. 3.8 ; 5.9 ; Gn 22.17 ; 32.13 ; 41.49 ; Jos 11.4 ; Jg 7.12 ; 2S 17.11 ; Es 10.22 ; Jr 33.22 ; Os 2.1 ; Hé 11.12. –  On mangeait, on buvait…  : cf. 1S 30.16 ; Ec 2.24 ; 3.13. Certaines éditions attribuent 34 versets au chapitre 4 qui se poursuit jusqu''à 5.14, et la numérotation du chapitre 5 est décalée en conséquence.'
  - type: text
    content: Juda et Israël étaient nombreux, comme le sable qui est près de la mer. On mangeait, on buvait et on se réjouissait.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Shisha  : cf. 2S 20.25 ( Sheva ) ; 1Ch 18.16 Shavsha . – Voir scribe. –  Josaphat…  : cf. 2S 8.16 ; 20.24.'
  - type: text
    content: Elihoreph et Ahiya, fils de Shisha, scribes ;
  - type: text
    content: 'Josaphat, fils d''Ahiloud, l''archiviste ; '
  '4':
  - type: note
    content: 'Benaya / Tsadoq 1.8n. –  à la tête de  : litt. sur. –  Abiathar (1.7n) a été écarté de la prêtrise en 2.26s.'
  - type: text
    content: Benaya, fils de Joïada, à la tête de l'armée ;
  - type: text
    content: 'Tsadoq et Abiathar, prêtres ; '
  '5':
  - type: note
    content: 'préfets  : leur liste est donnée aux v. 8-19 ; voir aussi v. 7 ; 5.7,30. –  prêtre  : omis par LXX. –  ami du roi  : probablement un titre honorifique ; cf. 2S 15.37n  ; 16.16 ; 1Ch 27.33.'
  - type: text
    content: Azaria, fils de Nathan, à la tête des préfets ;
  - type: text
    content: 'Zaboud, fils de Nathan, prêtre, ami du roi ; '
  '6':
  - type: note
    content: 'intendant de la maison  : litt. sur la maison (de même 16.9 ; 18.3 ; 2R 10.5 ; 15.5 ; 18.18,37 ; 19.2 ; 1Ch 9.26 ; 26.20,22 ; 2Ch 26.21 ; cf. Gn 39.4s ; 41.40 ; 43.16,19 ; 44.1 ; Es 22.15 ; 36.3,22 ; 37.2) ; LXX précise la maison du roi et poursuit  : et Elias, fils de Joab, sur l''armée. –  Adoniram 5.28 ; on trouve aussi Adoram (12.18 ; 2S 20.24) et Hadoram (2Ch 10.18). –  intendant des corvées  : litt. sur la corvée. Cf. 5.27+ss ; 9.15-23 ; voir aussi Est 10.1n.'
  - type: text
    content: Ahishar, intendant de la maison ;
  - type: text
    content: Adoniram, fils d'Abda, intendant des corvées.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ils pourvoyaient à tous les besoins…  : pour cette expression, cf. 5.7 ; 17.4,9 ; Gn 45.11 ; 47.12 ; 50.21 ; 2S 19.33 ; 20.3 etc.'
  - type: text
    content: Salomon avait douze préfets sur tout Israël. Ils pourvoyaient à tous les besoins du roi et de sa maison, chacun y pourvoyait pendant un mois de l'année.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'la région montagneuse d''Ephraïm  : chacun des préfets étend sa juridiction sur un territoire qui correspond à chacune des provinces du royaume.'
  - type: text
    content: 'Voici leurs noms :'
  - type: text
    content: 'Le fils de Hour, dans la région montagneuse d''Ephraïm. '
  '9':
  - type: note
    content: 'Maqats et Beth-Hanân ne sont pas identifiés. –  Shaalbim  : à environ 30 km au nord-ouest de Jérusalem. –  Beth-Shémesh Jos 15.10n. –  Elôn  : cf. Jos 19.43.'
  - type: text
    content: 'Le fils de Déqer, à Maqats, à Shaalbim, à Beth-Shémesh, à Elôn et à Beth-Hanân. '
