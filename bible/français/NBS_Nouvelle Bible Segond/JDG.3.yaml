document_id: JDG.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 2.3+ ; cf. Jos 13.1-6. –  Canaan Gn 9.18n.
  - type: text
    content: 'Voici les nations que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' laissa en repos pour mettre par elles à l''épreuve Israël – tous ceux qui n''avaient pas connu toutes les guerres de Canaan ; '
  '10':
  - type: note
    content: 'Le souffle (ou l''Esprit) du Seigneur 6.34 ; 11.29 ; 13.25 ; 14.6,19 ; 15.14 ; cf. 1S 10.6,10 ; 11.6s ; 16.13 ; Es 11.2 ; 42.1. –  fut sur lui 11.29 ; Nb 24.2n. –  Il devint juge en Israël  : litt. il jugea Israël, 2.16n. –  il partit  : litt. il sortit (cf. 2.15n). –  il fit sentir son pouvoir…  : litt. sa main se fortifia sur Koushân-Rishéataïm, cf. 1.35n  ; 6.2.'
  - type: text
    content: 'Le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur lui. Il devint juge en Israël et il partit pour la guerre. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui livra Koushân-Rishéataïm, roi de Mésopotamie, et il fit sentir son pouvoir à Koushân-Rishéataïm. '
  '11':
  - type: note
    content: V. 30 ; 5.31 ; 8.28.
  - type: text
    content: Le pays fut tranquille pendant quarante ans. Puis Otniel, fils de Qenaz, mourut.
  - type: heading
    content: Ehoud
  '12':
  - type: text
    content: ' '
  - type: note
    content: '2.11+. –  rendit fort…  : autre traduction donna à Eglôn… pouvoir sur Israël . –  Moab Gn 19.37n.'
  - type: text
    content: 'Les Israélites firent encore ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rendit fort Eglôn, roi de Moab, aux dépens d''Israël, parce qu''ils avaient fait ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: les Ammonites au nord de Moab, Gn 19.38n. –  les Amalécites au sud de Moab, 5.14 ; 6.3,33 ; 7.12 ; 10.12 ; 12.15n  ; Ex 17.8n-16 ; Dt 25.17-19 ; 1S 15.3,7s ; 30.1s ; Ps 83.8. –  la Ville des Palmiers ou Jéricho 1.16n.
  - type: text
    content: 'Eglôn réunit à lui les Ammonites et les Amalécites, et il se mit en marche. Il battit Israël et prit possession de la Ville des Palmiers. '
  '14':
  - type: text
    content: Les Israélites furent soumis à Eglôn, roi de Moab, pendant dix-huit ans.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'sauveur  : cf. v. 9n. –  gaucher  : litt. lié de la main droite , ce qui pourrait aussi signifier infirme de la main droite  ; v. 16,21 ; le terme hébreu rappelle l''expression traduite par Benjaminite , cf. Gn 35.18n  ; LXX ambidextre (cf. Jg 20.16 ; 1Ch 12.2). –  un tribut  : le terme correspondant est traduit par offrande en 6.18n  ; Gn 4.3n  ; par présent en Gn 32.14ss ; voir aussi 1S 10.27 ; 2S 8.2,6 ; 1R 5.1 ; 2R 17.3s.'
  - type: text
    content: 'Les Israélites crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' leur suscita un sauveur, Ehoud, fils de Guéra, un Benjaminite, qui était gaucher. Les Israélites envoyèrent par lui un tribut à Eglôn, roi de Moab. '
  '16':
  - type: note
    content: 'une coudée  : hébreu gomed, unité de mesure ( ?) qui n''apparaît nulle part ailleurs dans la Bible. –  à son côté droit  : autre traduction sur sa cuisse droite (expression analogue v. 21 ; Ex 32.27).'
  - type: text
    content: 'Ehoud se fit une épée à deux tranchants, longue d''une coudée, et il la mit à sa ceinture sous ses vêtements, à son côté droit. '
  '17':
  - type: text
    content: 'Il présenta le tribut à Eglôn, roi de Moab ; or Eglôn était un homme très gras. '
  '18':
  - type: note
    content: 'il renvoya  : certains comprennent il raccompagna (cf. v. 19). –  les gens  : litt. le peuple.'
  - type: text
    content: 'Lorsqu''il eut achevé de présenter le tribut, il renvoya les gens qui l''avaient apporté. '
  '19':
  - type: note
    content: 'les Statues  : sans doute un lieu-dit à la frontière entre Moab et Benjamin ; le terme habituellement traduit par statue pouvant s''appliquer à n''importe quelle pierre taillée, certains pensent qu''il s''agit des pierres dressées au Guilgal, voir 2.1n  ; Dt 11.30n. –  Le roi dit  : litt. il dit. –  Silence ! même interjection Am 6.10 ; 8.3 ; Ha 2.20 ; So 1.7 ; Za 2.17.'
  - type: text
    content: 'Mais lui, il revint depuis les Statues qui sont près du Guilgal, et il dit : O roi, j''ai un message secret pour toi. Le roi dit : Silence ! Et tous ceux qui étaient auprès de lui sortirent. '
  '2':
  - type: note
    content: Voir génération.
  - type: text
    content: 'ce fut uniquement pour que les générations des Israélites connaissent et apprennent la guerre, ceux du moins qui ne l''avaient pas connue auparavant – : '
  '20':
  - type: note
    content: 'chambre… à l''étage  : le même terme est traduit par chambre aux v. 23ss ; il désigne habituellement une pièce construite sur le toit en terrasse des maisons. On le retrouve en 2S 19.1 ; 1R 17.19,23 ; 2R 4.10s ; 23.12 ; Es 38.8 ; Jr 22.13s ; Ps 104.3,13 ; Né 3.31s ; 1Ch 28.11 ; 2Ch 3.9 ; 9.4 ; cf. Ac 1.13n.'
  - type: text
    content: 'Ehoud vint donc vers lui alors qu''il était assis dans la chambre fraîche qui lui était réservée, à l''étage. Ehoud dit : J''ai une parole de Dieu pour toi. Eglôn se leva de son siège. '
  '21':
  - type: note
    content: planta 4.21.
  - type: text
    content: 'Alors Ehoud avança la main gauche, tira l''épée de son côté droit et la lui planta dans le ventre. '
  '22':
  - type: note
    content: 'lame  : le mot hébreu correspondant peut aussi avoir le sens de flamme. –  puis il sortit…  : autre traduction possible  : et l''épée ressortit par-derrière. Le mot traduit par derrière, tout comme celui qui sera rendu par vestibule au v. 23, n''apparaît qu''ici dans l''A.T., et son sens est incertain ; on a aussi compris Ehoud sortit par la cour, ou par le trou (celui des latrines ou de l''aération, v. 20,24n).'
  - type: text
    content: La poignée même entra après la lame, et la graisse se referma sur la lame, car il ne retira pas l'épée du ventre ; puis il sortit par-derrière.
  '23':
  - type: text
    content: 'Ehoud sortit par le vestibule, après avoir fermé sur lui les portes de la chambre en tirant le verrou. '
  '24':
  - type: note
    content: 'satisfaire un besoin naturel  : litt. se couvrir les pieds ou s''accroupir, cf. 1S 24.4.'
  - type: text
    content: 'Quand il fut sorti, les gens de la cour du roi vinrent regarder et constatèrent que les portes de la chambre étaient verrouillées. Ils se dirent : Il est sans doute en train de satisfaire un besoin naturel dans la chambre fraîche. '
  '25':
  - type: note
    content: 'jusqu''à n''y plus tenir  : litt. jusqu''à en avoir honte  ; même expression en 2R 2.17n  ; 8.11n.'
  - type: text
    content: 'Ils attendirent jusqu''à n''y plus tenir ; comme il n''ouvrait toujours pas les portes de la chambre, ils prirent la clef et ouvrirent : leur maître était étendu par terre, mort ! '
  '26':
  - type: note
    content: 's''était échappé et se sauva traduisent le même verbe hébreu ; cf. v. 29. –  Statues v. 19n. –  Séira  : il s''agit peut-être de la région au nord de Jéricho.'
  - type: text
    content: 'Pendant qu''ils tardaient, Ehoud s''était échappé ; il passa les Statues et se sauva vers la Séira. '
  '27':
  - type: note
    content: il sonna de la trompe 6.34 ; Jr 4.5. –  la région montagneuse d'Ephraïm, au nord de Benjamin, 4.5 ; 10.1 ; 17.1 ; 18.13 ; 19.1,16 ; Jos 17.15 ; 19.50 ; 20.7 ; 21.21.
  - type: text
    content: 'Dès qu''il fut arrivé, il sonna de la trompe dans la région montagneuse d''Ephraïm. Les Israélites descendirent avec lui de la montagne, et il se mit à leur tête. '
  '28':
  - type: note
    content: 'Suivez-moi  : litt. poursuivez (vos ennemis) derrière moi. –  vous a livré… 4.7,14 ; 7.9,14s. –  gués du Jourdain 7.24 ; 12.5s ; Jos 2.7.'
  - type: text
    content: 'Il leur dit : Suivez-moi, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a livré les Moabites, vos ennemis. Ils descendirent derrière lui, prirent les gués du Jourdain en face de Moab et ne laissèrent passer personne. '
  '29':
  - type: note
    content: 'En ce temps-là  : autre traduction à ce moment-là  ; cf. 12.6. –  bien nourris  : litt. gras.'
  - type: text
    content: 'En ce temps-là, ils battirent environ dix mille hommes de Moab – ils étaient tous bien nourris, c''étaient tous des hommes vaillants ; et pas un seul n''échappa. '
  '3':
  - type: note
    content: Jos 13.3-5.
  - type: text
    content: les cinq princes de la confédération des Philistins, tous les Cananéens, les Sidoniens et les Hivvites qui habitaient la région montagneuse du Liban, depuis le mont Baal-Hermon jusqu'à l'entrée de Hamath.
  '30':
  - type: note
    content: 'V. 11+. –  humilié par Israël  : litt. humilié sous la main d''Israël.'
  - type: text
    content: En ce jour, Moab fut humilié par Israël. Et le pays fut tranquille pendant quatre-vingts ans.
  - type: heading
    content: Shamgar
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Voir aussi 2S 23.8-12. –  Après lui  : cf. 4.1. –  Shamgar  : cf. 5.6. –  Anath  : cf. 1.33. –  Philistins  : cf. 13.1+.'
  - type: text
    content: Après lui, il y eut Shamgar, fils d'Anath. Il battit six cents hommes des Philistins avec un aiguillon à bœufs ; lui aussi sauva Israël.
  '4':
  - type: text
    content: ' '
  - type: note
    content: les commandements… Dt 4.2n.
  - type: text
    content: 'Ceux-là servirent à mettre les Israélites à l''épreuve, pour savoir s''ils écouteraient les commandements que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait institués pour leurs pères par l''intermédiaire de Moïse. '
  '5':
  - type: note
    content: 'Ex 3.8,17 ; Jos 3.10n  ; 11.3. –  habitèrent  : autre traduction s''installèrent, cf. 1.32n.'
  - type: text
    content: 'Ainsi les Israélites habitèrent parmi les Cananéens, les Hittites, les Amorites, les Perizzites, les Hivvites et les Jébusites. '
  '6':
  - type: note
    content: 2.19 ; 10.13 ; Ex 34.16 ; Dt 7.3s ; Jos 23.12 ; Ps 106.35s ; Esd 9.2.
  - type: text
    content: Ils prirent leurs filles pour femmes, donnèrent leurs propres filles à leurs fils et se mirent à servir leurs dieux.
  - type: heading
    content: LES AVENTURES DES JUGES
  - type: heading
    content: Otniel
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.11nss. –  ils oublièrent le Seigneur Dt 4.9+. –  Ashéras  : ce terme peut être le nom propre de la déesse Ashéra ou Atirat, épouse du dieu suprême El (voir Gn 21.33n) dans les textes plus anciens d''Ougarit, mais sans doute considérée dans les textes bibliques comme épouse de Baal à la place d''Anat (ainsi, probablement, en 1R 15.13 ; 18.19 ; 2R 21.7 ; 23.4,7 ; 2Ch 15.16 ; 24.18). Selon certains il pourrait s''appliquer à n''importe quelle déesse parèdre ou épouse d''un dieu principal. Toutefois il semble désigner le plus souvent des objets associés au culte de Baal (et d''Ashéra ?) : probablement des poteaux cultuels , peut-être taillés à l''image de la déesse ou simples symboles de fécondité ; le Talmud y voit des arbres sacrés (cf. Dt 16.21n  ; Mi 5.13 ; mais l’ ashéra semble distinguée des arbres en 1R 14.23 ; Jr 17.2) ; d''aucuns l''interprètent comme une appellation générale d''un lieu sacré planté d''arbres (voir hauts lieux) ; voir aussi 6.25nss ; Ex 34.13 ; Dt 7.5+ ; 1R 14.15,23 ; 16.33 ; 2R 13.6 ; 17.10 ; 18.4 ; 21.3 ; 23.4,6,14s ; Es 17.8 ; 27.9. Sur l''association d’ Ashéra (ou du poteau cultuel ) avec le culte de YHWH (le Seigneur , voir noms divins), voir 2R 23.4ss ; on a retrouvé en Juda plusieurs inscriptions portant la formule par YHWH et son ashéra , dont l''interprétation est discutée.'
  - type: text
    content: 'Les Israélites firent ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils oublièrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu, et ils se mirent à servir les Baals et les Ashéras. '
  '8':
  - type: note
    content: '2.14+. –  furent soumis à  : litt. servirent. –  Koushân  : cf. Ha 3.7n. –  Rishéataïm  : de la double méchanceté, nom probablement déformé par dérision (cf. Jr 50.21n) sur le modèle de celui qui est traduit par Mésopotamie (hébreu ’Aram-Naharaïm, Aram des deux fleuves, cf. Gn 10.22n  ; 24.10).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mit en colère contre Israël ; il les vendit à Koushân-Rishéataïm, roi de Mésopotamie. Les Israélites furent soumis à Koushân-Rishéataïm pendant huit ans. '
  '9':
  - type: note
    content: 'crièrent vers le Seigneur v. 15 ; 4.3n  ; 6.6s ; 10.10,14 ; cf. Ex 14.10 ; Jos 24.7 ; Ps 107.6+ ; Né 9.27. –  qui les délivra  : litt. qui les sauva  ; cf. v. 15 ; voir 2.16+ ; 2R 13.5 ; Ab 21 ; Né 9.27 ; voir aussi Es 43.3+. –  Otniel 1.13-15.'
  - type: text
    content: 'Les Israélites crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' suscita aux Israélites un sauveur qui les délivra : Otniel, fils de Qenaz, frère cadet de Caleb. '
