      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Moab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 19.37
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites firent encore ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' rendit fort Eglôn, roi de Moab, aux dépens d''Israël, parce qu''ils avaient fait ce qui déplaisait au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les Ammonites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au nord de Moab, Gn 19.38
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les Amalécites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au sud de Moab, 5.14 ; 6.3,33 ; 7.12 ; 10.12 ; 12.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 17.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '-16 ; Dt 25.17-19 ; 1S 15.3,7s ; 30.1s ; Ps 83.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la Ville des Palmiers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou Jéricho 1.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Eglôn réunit à lui les Ammonites et les Amalécites, et il se mit en marche. Il battit Israël et prit possession de la Ville des Palmiers. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: Les Israélites furent soumis à Eglôn, roi de Moab, pendant dix-huit ans.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sauveur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. v. 9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gaucher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: lié de la main droite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui pourrait aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: infirme de la main droite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; v. 16,21 ; le terme hébreu rappelle l''expression traduite par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Benjaminite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 35.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ambidextre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. Jg 20.16 ; 1Ch 12.2). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un tribut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme correspondant est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'offrande '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 6.18
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Gn 4.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'présent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Gn 32.14ss ; voir aussi 1S 10.27 ; 2S 8.2,6 ; 1R 5.1 ; 2R 17.3s.
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites crièrent vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' leur suscita un sauveur, Ehoud, fils de Guéra, un Benjaminite, qui était gaucher. Les Israélites envoyèrent par lui un tribut à Eglôn, roi de Moab. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une coudée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: gomed
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', unité de mesure ( ?) qui n''apparaît nulle part ailleurs dans la Bible. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à son côté droit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sur sa cuisse droite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (expression analogue v. 21 ; Ex 32.27).
    marker-yv: yv-n
  - type: text
    text: 'Ehoud se fit une épée à deux tranchants, longue d''une coudée, et il la mit à sa ceinture sous ses vêtements, à son côté droit. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Il présenta le tribut à Eglôn, roi de Moab ; or Eglôn était un homme très gras. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il renvoya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il raccompagna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 19). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il eut achevé de présenter le tribut, il renvoya les gens qui l''avaient apporté. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Statues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sans doute un lieu-dit à la frontière entre Moab et Benjamin ; le terme habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'statue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'pouvant s''appliquer à n''importe quelle pierre taillée, certains pensent qu''il s''agit des pierres dressées au '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guilgal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir 2.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Dt 11.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le roi dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Silence ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: même interjection Am 6.10 ; 8.3 ; Ha 2.20 ; So 1.7 ; Za 2.17.
    marker-yv: yv-n
  - type: text
    text: 'Mais lui, il revint depuis les Statues qui sont près du Guilgal, et il dit : O roi, j''ai un message secret pour toi. Le roi dit : Silence ! Et tous ceux qui étaient auprès de lui sortirent. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chambre… à l'étage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chambre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: aux v. 23ss ; il désigne habituellement une pièce construite sur le toit en terrasse des maisons. On le retrouve en 2S 19.1 ; 1R 17.19,23 ; 2R 4.10s ; 23.12 ; Es 38.8 ; Jr 22.13s ; Ps 104.3,13 ; Né 3.31s ; 1Ch 28.11 ; 2Ch 3.9 ; 9.4 ; cf. Ac 1.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ehoud vint donc vers lui alors qu''il était assis dans la chambre fraîche qui lui était réservée, à l''étage. Ehoud dit : J''ai une parole de Dieu pour toi. Eglôn se leva de son siège. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'planta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.21.
    marker-yv: yv-n
  - type: text
    text: 'Alors Ehoud avança la main gauche, tira l''épée de son côté droit et la lui planta dans le ventre. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lame
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant peut aussi avoir le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: flamme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: puis il sortit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction possible'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et l'épée ressortit par-derrière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le mot traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: derrière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', tout comme celui qui sera rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vestibule '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 23, n''apparaît qu''ici dans l''A.T., et son sens est incertain ; on a aussi compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ehoud sortit par la cour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par le trou '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (celui des latrines ou de l'aération, v. 20,24
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: La poignée même entra après la lame, et la graisse se referma sur la lame, car il ne retira pas l'épée du ventre ; puis il sortit par-derrière.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ehoud sortit par le vestibule, après avoir fermé sur lui les portes de la chambre en tirant le verrou. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: satisfaire un besoin naturel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se couvrir les pieds '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'accroupir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1S 24.4.'
    marker-yv: yv-n
  - type: text
    text: 'Quand il fut sorti, les gens de la cour du roi vinrent regarder et constatèrent que les portes de la chambre étaient verrouillées. Ils se dirent : Il est sans doute en train de satisfaire un besoin naturel dans la chambre fraîche. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'à n'y plus tenir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à en avoir honte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même expression en 2R 2.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 8.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils attendirent jusqu''à n''y plus tenir ; comme il n''ouvrait toujours pas les portes de la chambre, ils prirent la clef et ouvrirent : leur maître était étendu par terre, mort ! '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''était échappé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se sauva '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduisent le même verbe hébreu ; cf. v. 29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Statues '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Séira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit peut-être de la région au nord de Jéricho.'
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu''ils tardaient, Ehoud s''était échappé ; il passa les Statues et se sauva vers la Séira. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il sonna de la trompe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.34 ; Jr 4.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la région montagneuse d'Ephraïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au nord de Benjamin, 4.5 ; 10.1 ; 17.1 ; 18.13 ; 19.1,16 ; Jos 17.15 ; 19.50 ; 20.7 ; 21.21.'
    marker-yv: yv-n
  - type: text
    text: 'Dès qu''il fut arrivé, il sonna de la trompe dans la région montagneuse d''Ephraïm. Les Israélites descendirent avec lui de la montagne, et il se mit à leur tête. '
  - type: usfm
