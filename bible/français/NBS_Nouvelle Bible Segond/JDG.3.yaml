      children:
      - type: text
        text: gras.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, ils battirent environ dix mille hommes de Moab – ils étaient tous bien nourris, c''étaient tous des hommes vaillants ; et pas un seul n''échappa. '
