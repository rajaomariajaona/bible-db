    marker-yv: yv-n
  - type: text
    text: 'Il leur dit : Suivez-moi, car le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' vous a livré les Moabites, vos ennemis. Ils descendirent derrière lui, prirent les gués du Jourdain en face de Moab et ne laissèrent passer personne. '
  - type: usfm
    marker: v
    metadata:
