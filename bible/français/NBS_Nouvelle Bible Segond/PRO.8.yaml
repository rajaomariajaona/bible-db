      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.2s : « Tel le juge du peuple et ses ministres, tel celui qui dirige la cité et tels ses habitants. Un roi ignorant est la ruine de son peuple, une cité est fondée sur l''intelligence de ses princes. » –  '
      - type: usfm
