document_id: PRO.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Nouvel appel de la sagesse
  - type: text
    content: ' '
  - type: note
    content: 'La sagesse v. 22 ; 1.20-23 ; 8–9 ; Jb 28 ; cf. Sagesse 6.1ss : « Or donc, rois, écoutez et comprenez, laissez-vous instruire… afin que vous appreniez la Sagesse et ne trébuchiez pas… Car seuls sont aimés de Dieu ceux qui partagent l''intimité de la Sagesse… les hommes furent instruits de ce qui te plaît et sauvés par la Sagesse. » –  ne crie-t-elle pas  : autre traduction crie  ; même possibilité dans la suite.'
  - type: text
    content: La sagesse ne crie-t-elle pas ?
  - type: text
    content: L'intelligence ne fait-elle pas retentir sa voix ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: instruction 1.2n. –  l'argent… l'or 3.14n.
  - type: text
    content: Recevez mon instruction plutôt que de l'argent ;
  - type: text
    content: la connaissance plutôt que de l'or affiné ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: 3.14-15n  ; 16.16 ; Ps 19.11 ; Jb 28.15-19.
  - type: text
    content: car la sagesse vaut mieux que les coraux,
  - type: text
    content: aucun objet désirable n'a sa valeur.
  - type: heading
    content: La sagesse se présente
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'j''ai pour demeure  : cf. Sagesse 7.22–8.1 : « Car il y a en elle (la Sagesse) un esprit intelligent, sain… Elle s''étend avec force d''une extrémité du monde à l''autre, elle gouverne l''univers avec bonté. » –  l''esprit avisé 1.4n.'
  - type: text
    content: Moi, la sagesse, j'ai pour demeure l'esprit avisé,
  - type: text
    content: je sais trouver la connaissance de la réflexion.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'crainte du Seigneur 1.7n  ; cf. 11.2 ; 15.25. –  voie mauvaise  : litt. voie (ou chemin ) du mal  ; cf. 2.5.'
  - type: text
    content: 'La crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ', c''est détester le mal ;'
  - type: text
    content: la suffisance, l'orgueil, la voie mauvaise
  - type: text
    content: et la bouche perverse, je les déteste.
  '14':
  - type: text
    content: ' '
  - type: note
    content: conseil 1.25n  ; cf. Es 11.2-5. –  raison 2.7n.
  - type: text
    content: Le conseil et la raison m'appartiennent ;
  - type: text
    content: je suis l'intelligence, la force m'appartient.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les rois  : cf. 1R 3.4-15 ; Jr 23.5 ; Siracide 10.2s : « Tel le juge du peuple et ses ministres, tel celui qui dirige la cité et tels ses habitants. Un roi ignorant est la ruine de son peuple, une cité est fondée sur l''intelligence de ses princes. » –  légifèrent avec justice  : litt. tracent (cf. v. 27,29) la justice  ; autres traductions promulguent les décrets de justice ; décrètent la justice.'
  - type: text
    content: C'est par moi que les rois règnent
  - type: text
    content: et que les princes légifèrent avec justice ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'gouvernent les chefs (ou les princes  ; autre terme qu''au v. 15) : le verbe et son sujet sont apparentés ; cf. Es 32.1. –  de la terre  : certains mss hébreux portent de la justice  ; cf. Sagesse 9.11s : « Elle (la Sagesse) qui sait et comprend tout, elle me guidera dans ma conduite avec mesure et elle me protégera dans sa gloire. Ainsi mes actes pourront être agréés, je jugerai ton peuple avec équité et serai digne du trône de mon père. » Siracide 10.4 : « Dans la main du Seigneur est le gouvernement de la terre, il y suscitera l''homme approprié en temps voulu. »'
  - type: text
    content: c'est par moi que gouvernent les chefs,
  - type: text
    content: les nobles, tous les juges de la terre.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 7.7-11 ; Jn 14.21 ; Sagesse 6.12 : « La Sagesse brille et ne se flétrit pas, elle se laisse voir aisément par ceux qui l''aiment et trouver par ceux qui la cherchent. » Siracide 4.11 : « La sagesse exalte ses fils, et prend soin de ceux qui la recherchent. »'
  - type: text
    content: Moi, j'aime ceux qui m'aiment,
  - type: text
    content: et ceux qui me cherchent me trouvent.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'richesse  : cf. 2.4+. – Voir gloire. –  biens durables  : autre traduction prospérité, longévité . –  justice  : on pourrait aussi comprendre succès, prospérité, bonheur  ; cf. 3.16.'
  - type: text
    content: Avec moi il y a richesse et gloire,
  - type: text
    content: biens durables et justice.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Mon fruit  : cf. Siracide 6.19 : « Comme le laboureur et le semeur, approche-toi d''elle (la Sagesse) et attends ses fruits excellents. Car, à la cultiver, tu peineras quelque peu, mais tu mangeras bientôt de ses produits. » –  l''or… l''argent 3.14n  ; cf. Sagesse 7.14 : « Car elle est pour les hommes un trésor inépuisable. Ceux qui l''ont exploitée se sont concilié l''amitié de Dieu, recommandés à lui par les dons provenant de l''éducation. » –  ce que je rapporte  : cf. 3.9n.'
  - type: text
    content: Mon fruit est meilleur que l'or, que l'or fin,
  - type: text
    content: et ce que je rapporte vaut plus que l'argent de choix.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'à la croisée des chemins  : litt. à la maison des chemins.'
  - type: text
    content: Au sommet des hauteurs, près de la route,
  - type: text
    content: à la croisée des chemins, elle se place ;
  '20':
  - type: text
    content: ' '
  - type: note
    content: chemin… sentiers 2.13n. –  équité 1.3n.
  - type: text
    content: Je marche sur le chemin de la justice,
  - type: text
    content: par les sentiers de l'équité,
  '21':
  - type: text
    content: pour donner un patrimoine à ceux qui m'aiment
  - type: text
    content: et remplir leurs trésors.
  - type: heading
    content: La sagesse aux origines
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'produite  : autres traductions conçue ; engendrée ; acquise (cf. 4.5+ss) ; sur le verbe correspondant, voir Gn 4.1n  ; cf. 3.19s ; Ap 3.14. –  le commencement ou le principe, les prémices (cf. 3.9). –  de sa voie  : autre traduction de son action  ; cf. Jb 40.19.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a produite comme le commencement de sa voie,'
  - type: text
    content: avant ses œuvres du temps jadis.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis investie…  : autre traduction j''ai été investie (ou formée  ; cf. Ps 2.6n) dès les temps anciens . –  depuis l''origine…  : autre traduction dès avant l''origine de la terre  ; cf. v. 28 ; 3.20 ; Gn 1.1 ; Jn 1.1 ; Siracide 24.9 : « Avant que le temps ne commence, il m''a créée, et pour les siècles je ne cesserai pas d''exister. »'
  - type: text
    content: Je suis investie depuis toujours,
  - type: text
    content: depuis le commencement, depuis l'origine de la terre.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'mise au monde  : cf. Jb 28.20-27. –  abîmes Gn 1.2n.'
  - type: text
    content: J'ai été mise au monde quand il n'y avait pas d'abîmes,
  - type: text
    content: pas de sources chargées d'eaux ;
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'en place  : litt. immergées ; plongées  ; cf. Jb 28.9.'
  - type: text
    content: avant que les montagnes soient en place,
  - type: text
    content: avant les collines j'ai été mise au monde ;
  '26':
  - type: text
    content: il n'avait encore fait ni la terre, ni les campagnes,
  - type: text
    content: ni le premier grain de la poussière du monde.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'horizon  : litt. cercle  ; cf. Jb 22.14 ; 26.10 ; Es 40.22. –  sur l''abîme ou à la surface de l''abîme (cf. Jb 38.30) ; cf. v. 24 ; Gn 1.2n  ; Jb 26.10 ; Sagesse 9.9 : « Près de toi se tient la Sagesse qui connaît tes œuvres, et qui était présente lorsque tu créais le monde. » Siracide 24.5 : « Le cercle du ciel, je l''ai parcouru, moi seule (la Sagesse), et j''ai marché dans la profondeur des abîmes. »'
  - type: text
    content: Lorsqu'il installa le ciel, j'étais là ;
  - type: text
    content: lorsqu'il traça un horizon sur l'abîme,
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'lorsqu''il fixa  : litt. lorsqu''il affermit  ; autre traduction lorsqu''il consolida.'
  - type: text
    content: lorsqu'il fixa les nuages en haut
  - type: text
    content: et que les sources de l'abîme jaillirent avec force,
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'lorsqu''il assigna… bords  : le texte correspondant est absent de LXX. –  limites  : cf. Ps 104.7-9n  ; Jb 38.8-11. –  traça  : cf. v. 15n,27 ; d''après LXX, certains modifient le texte hébreu traditionnel pour lire affermit ou consolida.'
  - type: text
    content: lorsqu'il assigna à la mer ses limites,
  - type: text
    content: pour que les eaux n'en passent pas les bords,
  - type: text
    content: lorsqu'il traça les fondations de la terre,
  '3':
  - type: text
    content: ' '
  - type: note
    content: ses cris 1.20 ; cf. Jn 7.37.
  - type: text
    content: à côté des portes, au seuil de la ville,
  - type: text
    content: 'à l''approche des entrées, elle fait entendre ses cris :'
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'un maître d''œuvre (ou une harmonisatrice ) : en hébreu ’amôn , mot rare et de sens incertain ; il rappelle à la fois le nom du dieu égyptien Amôn et la racine hébraïque ’mn , qui a donné le mot Amen et évoque la solidité, la probité, la constance, la fidélité. Le même terme est traduit par artisan en Jr 52.15 ; un mot apparenté est rendu par artiste en Ct 7.2. D''autres lui donnent ici le sens de nourrisson ; enfant chéri (un autre terme de la même famille est traduit par nourrice en Nb 11.12n). LXX le rend par un terme apparenté à notre mot harmonie , mais dont le sens est en l''occurrence ambigu : ou bien celle qui accorde (l''ensemble) , ou bien celle qui est d''accord (ou qui acquiesce ) ; une autre possibilité serait que le terme hébreu s''applique ici, non pas à la sagesse personnifiée, mais à Dieu ( j''étais auprès de lui, le maître d''œuvre ) ; cf. Jn 5.17.'
  - type: text
    content: j'étais à ses côtés comme un maître d'œuvre,
  - type: text
    content: je faisais jour après jour ses délices,
  - type: text
    content: jouant devant lui en tout temps,
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'avec le monde…  : autre traduction dans le monde, sur sa terre . –  parmi les humains  : cf. Jn 1.14 ; Siracide 1.15 : « Parmi les hommes elle a fait son nid, fondation d''éternité, avec leur descendance elle restera fidèlement. » Baruch 3.38 : « Après cela (la création) on la vit sur terre et elle a vécu parmi les hommes. »'
  - type: text
    content: jouant avec le monde, avec sa terre,
  - type: text
    content: et trouvant mes délices parmi les humains.
  - type: heading
    content: Heureux celui qui écoute la sagesse
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'écoutez 1.8n. –  heureux Ps 119.1s ; 128.1 ; Lc 11.28 ; cf. Siracide 14.20 : « Heureux l''homme qui s''applique à la sagesse et qui exerce son intelligence à raisonner, qui en médite les voies dans son cœur et réfléchit sur ses secrets. »'
  - type: text
    content: Maintenant donc, mes fils, écoutez-moi ;
  - type: text
    content: heureux ceux qui gardent mes voies !
  '33':
  - type: text
    content: ' '
  - type: note
    content: Ce v. est absent de LXX.
  - type: text
    content: Ecoutez l'instruction, et devenez sages ;
  - type: text
    content: n'en faites pas peu de cas.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'des montants  : sur ce terme, voir Dt 6.9n  ; cf. Ap 3.20 ; Sagesse 6.14 : « Quiconque part tôt vers elle (la Sagesse) ne se fatiguera pas : il la trouvera assise à sa porte. »'
  - type: text
    content: Heureux celui qui m'écoute,
  - type: text
    content: qui veille jour après jour à mon seuil,
  - type: text
    content: qui monte la garde près des montants de mes portes !
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'la vie  : cf. 3.1s ; 1Jn 5.12. –  la faveur 11.1,20 ; 12.2,22.'
  - type: text
    content: Car celui qui me trouve trouve la vie
  - type: text
    content: 'et obtient la faveur du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'qui me manque  : autre traduction qui pèche contre moi  ; cf. 19.2n  ; 20.2n. –  aiment la mort  : cf. Sagesse 1.12 : « Ne recherchez pas la mort en fourvoyant votre vie, n''attirez pas à vous la ruine par les œuvres de vos mains. »'
  - type: text
    content: Mais celui qui me manque se fait du tort à lui-même ;
  - type: text
    content: tous mes ennemis aiment la mort.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'c''est aux humains…  : litt. ma voix vers les fils d''humain (ou d''Adam  ; cf. Gn 1.26n).'
  - type: text
    content: Hommes, c'est vers vous que je crie,
  - type: text
    content: c'est aux humains que je m'adresse !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Naïfs… 1.4n. –  stupides 1.22+. –  devenez intelligents  : litt. comprenez (même verbe au premier vers) le cœur  ; d''après LXX, certains lisent ici un autre verbe, affermissez le cœur , c.-à-d. affermissez votre jugement.'
  - type: text
    content: Naïfs, devenez avisés !
  - type: text
    content: Gens stupides, devenez intelligents !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Ecoutez 1.8+.
  - type: text
    content: Ecoutez, car j'ai des choses importantes à dire,
  - type: text
    content: et mes lèvres s'ouvrent pour enseigner ce qui est droit.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ma bouche  : litt. mon palais . –  la vérité  : autre traduction la loyauté.'
  - type: text
    content: Car ma bouche murmure la vérité,
  - type: text
    content: mais la méchanceté est une abomination pour mes lèvres ;
  '8':
  - type: text
    content: toutes les paroles de ma bouche sont justes,
  - type: text
    content: elles n'ont rien de retors, rien de tortueux ;
  '9':
  - type: text
    content: toutes sont claires pour celui qui est intelligent,
  - type: text
    content: droites pour ceux qui ont trouvé la connaissance.
