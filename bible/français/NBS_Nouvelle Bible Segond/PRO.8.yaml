      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 22 ; 1.20-23 ; 8–9 ; Jb 28 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.1ss : « Or donc, rois, écoutez et comprenez, laissez-vous instruire… afin que vous appreniez la Sagesse et ne trébuchiez pas… Car seuls sont aimés de Dieu ceux qui partagent l''intimité de la Sagesse… les hommes furent instruits de ce qui te plaît et sauvés par la Sagesse. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne crie-t-elle pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: crie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même possibilité dans la suite.
      marker-yv: yv-n
    - type: text
      text: La sagesse ne crie-t-elle pas ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: L'intelligence ne fait-elle pas retentir sa voix ?
