        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.19 : « Comme le laboureur et le semeur, approche-toi d''elle (la Sagesse) et attends ses fruits excellents. Car, à la cultiver, tu peineras quelque peu, mais tu mangeras bientôt de ses produits. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''or… l''argent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.14 : « Car elle est pour les hommes un trésor inépuisable. Ceux qui l''ont exploitée se sont concilié l''amitié de Dieu, recommandés à lui par les dons provenant de l''éducation. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que je rapporte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 3.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Mon fruit est meilleur que l'or, que l'or fin,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ce que je rapporte vaut plus que l'argent de choix.
