        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Moi, la sagesse, j'ai pour demeure l'esprit avisé,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: je sais trouver la connaissance de la réflexion.
