      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.11s : « Elle (la Sagesse) qui sait et comprend tout, elle me guidera dans ma conduite avec mesure et elle me protégera dans sa gloire. Ainsi mes actes pourront être agréés, je jugerai ton peuple avec équité et serai digne du trône de mon père. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.4 : « Dans la main du Seigneur est le gouvernement de la terre, il y suscitera l''homme approprié en temps voulu. »'
      marker-yv: yv-n
    - type: text
      text: c'est par moi que gouvernent les chefs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les nobles, tous les juges de la terre.
  '17':
  - type: usfm
