        - type: text
          text: '7.22–8.1 : « Car il y a en elle (la Sagesse) un esprit intelligent, sain… Elle s''étend avec force d''une extrémité du monde à l''autre, elle gouverne l''univers avec bonté. » –  '
      - type: usfm
