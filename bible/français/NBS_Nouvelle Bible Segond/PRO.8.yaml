        - type: text
          text: 'Sagesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.12 : « La Sagesse brille et ne se flétrit pas, elle se laisse voir aisément par ceux qui l''aiment et trouver par ceux qui la cherchent. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.11 : « La sagesse exalte ses fils, et prend soin de ceux qui la recherchent. »'
      marker-yv: yv-n
    - type: text
      text: Moi, j'aime ceux qui m'aiment,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et ceux qui me cherchent me trouvent.
