document_id: 1CH.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les descendants d'Issacar
  - type: heading
    content: Gn 46.13  ; Nb 26.23-24  ; Jg 10.1
  - type: text
    content: ' '
  - type: note
    content: 'Fils (le texte hébreu traditionnel porte aux fils ) d''Issacar  : cf. 6.57n. –  Poua  : légère variante orthographique en Gn 46.13 ; Nb 26.23 ; cf. Jg 10.1+. –  Yashoub  : selon LXX et Vg  ; le texte hébreu traditionnel porte Yashib  ; Tg Yob , cf. Gn 46.13.'
  - type: text
    content: 'Fils d''Issacar : Tola, Poua, Yashoub et Shimrôn, quatre. '
  '10':
  - type: note
    content: 'Yediaël  : Syr Eshkol, de même au v. 11. –  Yéoush  : autre lecture traditionnelle Yéish ou Yaïsh. –  Tarsis  : un ms de LXX porte Ramessaï.'
  - type: text
    content: 'Fils de Yediaël : Bilhân. Fils de Bilhân : Yéoush, Benjamin, Ehoud, Kenaana, Zétân, Tarsis et Ahishahar. '
  '11':
  - type: note
    content: 'hommes aptes à porter les armes  : litt. sortant (en) armée  ; cf. 5.18n.'
  - type: text
    content: 'Tous ceux-là sont les fils de Yediaël, des chefs de famille, de vaillants guerriers : 17 200 hommes aptes à porter les armes à la guerre. '
  '12':
  - type: note
    content: Les personnages mentionnés dans ce v. ne se rattachent à aucun de ceux qui précèdent, à moins qu'il faille identifier Ir avec Iri (v. 7). LXX Sapphim et Apphim et les fils de Raom, son fils Aer. Au lieu de fils d'Aher, on pourrait comprendre fils d'un autre.
  - type: text
    content: Shouppim et Houppim, fils d'Ir ; Houshim, les fils d'Aher.
  - type: heading
    content: Les descendants de Nephtali
  - type: heading
    content: Gn 46.24  ; Nb 26.48-50
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Yahtsiel  : quelques mss portent Yahtséel , comme en Gn 46.24 ; Nb 26.48.'
  - type: text
    content: 'Fils de Nephtali : Yahtsiel, Gouni, Yétser, Shalloum, fils de Bilha.'
  - type: heading
    content: Les descendants de Manassé
  '14':
  - type: text
    content: ' '
  - type: note
    content: Les v. 14ss présentent un texte difficile. –  Makir 2.21+.
  - type: text
    content: 'Fils de Manassé : Asriel que mit au monde sa concubine araméenne ; elle mit au monde Makir, père de Galaad. '
  '15':
  - type: note
    content: 'Houppim / Shouppim  : cf. v. 12. –  de sa sœur  : un ms hébreu porte ici de sa femme, cf. v. 16. –  du deuxième fils  : litt. du deuxième. –  Tselophhad / filles  : cf. Nb 26.33 ; 27.1-11 ; 36.1-12 ; Jos 17.3-6.'
  - type: text
    content: 'Makir prit une femme pour Houppim et pour Shouppim. Le nom de sa sœur était Maaka. Le nom du deuxième fils était Tselophhad ; et Tselophhad n''eut que des filles. '
  '16':
  - type: note
    content: 'Réqem  : absent de LXX.'
  - type: text
    content: 'Maaka, femme de Makir, mit au monde un fils et l''appela du nom de Péresh ; le nom de son frère était Sharesh, et ses fils étaient Oulam et Réqem. '
  '17':
  - type: note
    content: 'Fils  : au pluriel ; les massorètes ont proposé de remplacer par un singulier ; Vg porte le singulier. –  Bedân  : cf. 1S 12.11n.'
  - type: text
    content: 'Fils d''Oulam : Bedân. Ce sont là les fils de Galaad, fils de Makir, fils de Manassé. '
  '18':
  - type: note
    content: 'et Mahla  : omis par Syr  ; certains proposent de modifier le texte hébreu traditionnel pour lire et leur sœur Mahla.'
  - type: text
    content: 'Sa sœur Ha-Moléketh mit au monde Ishhod, Abiézer et Mahla. '
  '19':
  - type: note
    content: 'Certains proposent de lire ce v. à la suite du v. 15. –  Shemida  : LXX porte Sémira.'
  - type: text
    content: 'Les fils de Shemida étaient : Ahiân, Sichem, Liqhi et Aniam.'
  - type: heading
    content: Les descendants d'Ephraïm
  '2':
  - type: note
    content: 'Yahmaï  : des mss de LXX portent Yemou, d''autres encore Eikân ou Yamîn.'
  - type: text
    content: 'Fils de Tola : Ouzzi, Rephaya, Yeriel, Yahmaï, Yibsam et Samuel, chefs des familles de Tola, de vaillants guerriers, selon leur généalogie ; leur nombre, aux jours de David, était de 22 600. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Béred  : Syr porte Béker , comme en Nb 26.35. –  Tahath, son fils  : les mots hébreux correspondants, qui pourraient signifier à la place de son fils , sont omis par quelques mss hébreux la première fois ; un ms de LXX porte Thaham (cf. Nb 26.35 Tahân ). D''autres mss de LXX portent Noomé ou Noméé à la fin du v.'
  - type: text
    content: 'Fils d''Ephraïm : Shoutélah ; Béred, son fils ; Tahath, son fils ; Eléada, son fils ; Tahath, son fils ; '
  '21':
  - type: note
    content: 'Gath  : cf. 1S 5.1n,8.'
  - type: text
    content: 'Zabad, son fils ; Shoutélah, son fils ; Ezer et Eléad. Les hommes de Gath, nés dans le pays, les tuèrent, parce qu''ils étaient descendus pour prendre leurs troupeaux. '
  '22':
  - type: note
    content: Cf. Gn 37.34s ; Jb 2.11 ; 6.14 ; Rm 12.15.
  - type: text
    content: 'Ephraïm, leur père, fut longtemps dans le deuil, et ses frères vinrent pour le consoler. '
  '23':
  - type: note
    content: 'il l''appela (son fils) : quelques mss hébreux et des versions anciennes portent le féminin elle l''appela. –  Beria fait assonance avec le mot traduit par malheureuse. –  dans sa maison (celle d''Ephraïm) : LXX dans ma maison.'
  - type: text
    content: 'Puis il alla avec sa femme ; elle fut enceinte et mit au monde un fils ; il l''appela du nom de Beria, parce que, dans sa maison, elle avait été malheureuse. '
  '24':
  - type: note
    content: 'Beth-Horôn-le-Bas, Beth-Horôn-le-Haut 6.53 ; Jos 10.10n. –  et Ouzzên-Shééra  : LXX porte ici et des fils.'
  - type: text
    content: 'Sa fille était Shééra ; elle bâtit Beth-Horôn-le-Bas, Beth-Horôn-le-Haut et Ouzzên-Shééra. '
  '25':
  - type: note
    content: 'Résheph  : quelques mss hébreux et des mss de LXX ajoutent son fils. Certains proposent de lire les deux noms Résheph et Télah comme un seul, Shoutélah (cf. Nb 26.35).'
  - type: text
    content: 'Réphah, son fils, et Résheph ; Télah, son fils ; Tahân, son fils ; '
  '26':
  - type: text
    content: 'Ladân, son fils ; Ammihoud, son fils ; Elishama, son fils ; '
  '27':
  - type: note
    content: 'Nôn  : ailleurs mentionné sous l''appellation Noun, cf. Ex 33.11 ; Nb 13.8 ; LXX porte Noum. –  Josué Jos 1.1+.'
  - type: text
    content: 'Nôn, son fils ; Josué, son fils. '
  '28':
  - type: note
    content: 'les localités qui en dépendent  : litt. ses filles. –  Ayya  : localité proche de Beth-El (cf. Né 11.31). Certains mss hébreux et plusieurs versions anciennes portent Gaza.'
  - type: text
    content: 'Leur propriété, leurs lieux d''habitation : Beth-El et les localités qui en dépendent ; à l''est, Naarân ; à l''ouest, Guézer et les localités qui en dépendent, Sichem et les localités qui en dépendent, jusqu''à Ayya et aux localités qui en dépendent. '
  '29':
  - type: note
    content: 'Les fils de Manassé possédaient  : litt. aux mains des fils de Manassé  ; LXX jusqu''aux frontières des fils de Manassé. – LXX ajoute, avant Meguiddo  : Balad et les localités qui en dépendent. –  ces villes  : litt. celles-ci.'
  - type: text
    content: Les fils de Manassé possédaient Beth-Shéân et les localités qui en dépendent, Taanak et les localités qui en dépendent, Meguiddo et les localités qui en dépendent, Dor et les localités qui en dépendent. C'est dans ces villes qu'habitèrent les fils de Joseph, fils d'Israël.
  - type: heading
    content: Les descendants d'Aser
  - type: heading
    content: Gn 46.17  ; Nb 26.44-45
  '3':
  - type: note
    content: 'Fils (au pluriel dans les principaux manuscrits ; au singulier selon une lecture traditionnelle juive) d''Ouzzi (Syr porte un autre nom). –  Michel  : Syr Malkouel. –  cinq  : Syr porte quatre  ; d''autres comprennent cinq fils et petits-fils, descendants d’Ouzzi.'
  - type: text
    content: 'Fils d''Ouzzi : Yizrahia. Fils de Yizrahia : Michel, Abdias, Joël, Yishiya, en tout cinq chefs ; '
  '30':
  - type: text
    content: 'Fils d''Aser : Yimna, Yishva, Yishvi et Beria ; et leur sœur Sérah. '
  '31':
  - type: note
    content: Birzoth ou Berazoth, Birzith, Berzaïth, selon les diverses lectures traditionnelles du texte hébreu et les versions anciennes.
  - type: text
    content: 'Fils de Beria : Héber et Malkiel. Ce dernier est le père de Birzoth. '
  '32':
  - type: note
    content: Shomer semble être identique à Shémer du v. 34 ; de même beaucoup de spécialistes pensent que Hotam pourrait être une variante de Hélem du v. 35.
  - type: text
    content: 'Héber engendra Yaphleth, Shomer, Hotam et leur sœur Shoua. '
  '33':
  - type: text
    content: 'Fils de Yaphleth : Pasak, Bimhal et Ashvath. Ce sont là les fils de Yaphleth. '
  '34':
  - type: note
    content: 'Ahi  : certains, traduisant le mot correspondant au lieu de le transcrire comme un nom propre, comprennent fils de Shémer, son frère (celui de Yaphleth). –  Houbba  : autre lecture traditionnelle Yahba.'
  - type: text
    content: 'Fils de Shémer : Ahi, Rohega, Houbba et Aram. '
  '35':
  - type: note
    content: 'Hélem  : cf. v. 32 (Hotam).'
  - type: text
    content: 'Fils d''Hélem, son frère : Tsophah, Yimna, Shélesh et Amal. '
  '36':
  - type: note
    content: 'Béri, Yimra  : certains proposent de modifier le texte traditionnel et de lire ici fils de Yimna, cf. v. 35.'
  - type: text
    content: 'Fils de Tsophah : Souah, Harnépher, Shoual, Béri, Yimra, '
  '37':
  - type: note
    content: 'Yitrân  : un ms hébreu et un ms de LXX portent Yéter, cf. v. 38.'
  - type: text
    content: 'Bétser, Hod, Shamma, Shilsha, Yitrân et Bééra. '
  '38':
  - type: text
    content: 'Fils de Yéter : Yephounné, Pispa et Ara. '
  '39':
  - type: note
    content: 'Fils d''Oulla  : omis par Syr, de même que le dernier nom Ritsia.'
  - type: text
    content: 'Fils d''Oulla : Arah, Hanniel et Ritsia. '
  '4':
  - type: note
    content: 'troupes…  : LXX vaillants (hommes) [selon certains mss, équipés d''armes légères] rangés en ordre de bataille.'
  - type: text
    content: 'ils avaient avec eux, selon leur généalogie, famille par famille, des troupes armées pour le combat, 36 000 hommes – car ils avaient beaucoup de femmes et de fils. '
  '40':
  - type: text
    content: Tous ceux-là sont les fils d'Aser, des chefs de famille, des hommes d'élite, de vaillants guerriers, des chefs des princes, enregistrés et armés pour le combat, au nombre de 26 000 hommes.
  '5':
  - type: note
    content: 'Issacar  : cf. 6.57n.'
  - type: text
    content: Leurs frères, pour tous les clans d'Issacar, de vaillants guerriers, formaient un total de 87 000 hommes enregistrés.
  - type: heading
    content: Les descendants de Benjamin
  - type: heading
    content: Gn 46.21  ; Nb 26.38-39
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. chap. 8 ; les généalogies de Benjamin présentent de nombreuses divergences. –  Fils de Benjamin  : litt. Benjamin , cf. v. 1,13s,20,30.'
  - type: text
    content: 'Fils de Benjamin : Béla, Béker et Yediaël, trois. '
  '7':
  - type: note
    content: 'Fils de Béla  : cf. Nb 26.40. –  et Iri  : LXX porte Ouri.'
  - type: text
    content: 'Fils de Béla : Etsbôn, Ouzzi, Ouzziel, Yerimoth et Iri, cinq chefs de famille, de vaillants guerriers, enregistrés : 22 034. '
  '8':
  - type: note
    content: 'Zemira  : LXX porte Zamaria ou Zamarias. –  Abiya  : LXX porte Abioud ou Abiou, selon les mss. –  Anatoth et Alémeth  : noms de personnes (cf. 8.36 ; 9.42 ; Né 10.20) ou noms de ville (6.45 ; Jos 21.18 ; 1R 2.26n).'
  - type: text
    content: 'Fils de Béker : Zemira, Yoash, Eliézer, Elioénaï, Omri, Yerémoth, Abiya, Anatoth et Alémeth. Tous ceux-là sont les fils de Béker. '
  '9':
  - type: note
    content: '20 200  : des mss de LXX et Syr portent 22 200.'
  - type: text
    content: 'Ils furent enregistrés selon leur généalogie, comme chefs de famille, comme vaillants guerriers : 20 200. '
