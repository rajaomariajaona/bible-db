document_id: 2SA.10
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les émissaires de David déshonorés
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Ch 19.1-5
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le roi des Ammonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Nahash (dont le nom apparaît au v. 2) a déjà été mentionné en 1S 11.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; adversaire de Saül, il pourrait avoir entretenu des rapports autres avec David, puisqu''il n''est pas mentionné expressément parmi ses ennemis en 8.12.'
    marker-yv: yv-n
  - type: text
    text: 'Là-dessus, le roi des Ammonites mourut ; Hanoun, son fils, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: J'agirai avec fidélité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.8 ; 9.1,7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: envoya des gens de sa cour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: envoya par la main de ses serviteurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui présenter ses condoléances
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour le consoler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même dans la suite ; cf. Es 61.2 ; voir aussi Rm 12.15 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.34 : « Ne te détourne pas de ceux qui pleurent, avec les affligés, afflige-toi. » Cf. 1R 5.15.'
    marker-yv: yv-n
  - type: text
    text: 'David dit : J''agirai avec fidélité envers Hanoun, fils de Nahash, comme son père a agi avec fidélité envers moi. David envoya des gens de sa cour lui présenter ses condoléances pour son père. Lorsqu''ils arrivèrent au pays des Ammonites, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ces gens pour te présenter ses condoléances
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des consolateurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rabba '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(11.1) ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rabba-des-Ammonites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(12.26), capitale du royaume, aujourd''hui Amman. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: espionner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.25 ; 15.32-37 ; Gn 42.9,12 ; Nb 13 ; Jos 2.1 ; 7.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: détruire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 19.21+ ; 1Ch 19.3.'
    marker-yv: yv-n
  - type: text
    text: 'les princes des Ammonites dirent à Hanoun, leur maître : Penses-tu que David ait voulu honorer ton père en t''envoyant ces gens pour te présenter ses condoléances ? N''est-ce pas pour examiner la ville, pour l''espionner et la détruire que David envoie ses gens auprès de toi ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: raser… couper leurs habits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pour ridiculiser les ambassadeurs, Hanoun leur inflige ces traitements ignominieux, sans être pourtant aussi cruel que son père Nahash en 1S 11.2 ; cf. Mt 22.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fesses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Es 20.2-4 ; voir Es 47.2 ; Jr 13.22-26.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Hanoun saisit les gens de David, leur fit raser la moitié de la barbe et fit couper leurs habits à mi-longueur, au niveau des fesses ; puis il les renvoya. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'étaient… dans une grande confusion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: étaient écrasés de honte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 19.4 ; le même verbe peut évoquer l''insulte (1S 20.34 ; 25.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 16.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jéricho
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au bord du Jourdain, est la première localité israélite sur le chemin de retour des ambassadeurs.'
    marker-yv: yv-n
  - type: text
    text: 'On le dit à David, qui envoya quelqu''un à leur rencontre ; ces hommes étaient en effet dans une grande confusion ; le roi leur fit dire : Restez à Jéricho jusqu''à ce que votre barbe ait repoussé, puis vous reviendrez.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Guerre contre les Ammonites et les Araméens
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Ch 19.6-19
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: odieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 1S 13.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Beth-Rehob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsoba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 8.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Maaka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : nom d''un des douze fils de Nahor, frère d''Abraham (Gn 22.24) ; ce nom fut donné à l''un des petits royaumes syriens situés au nord-est d''Israël. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens de Tob
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''homme de Tob ; l''homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: a été compris soit comme un collectif (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), soit comme l''équivalent de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le roi, le chef
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jg 11.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Ammonites virent qu''ils s''étaient rendus odieux à David. Alors les Ammonites engagèrent vingt mille fantassins chez les Araméens de Beth-Rehob et chez les Araméens de Tsoba, mille hommes chez le roi de Maaka, et douze mille hommes chez les gens de Tob. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Joab '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 8.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les guerriers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les vaillants hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ce terme, placé en apposition à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'armée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', pourrait préciser qu''il ne s''agit ici que de la troupe d''élite dont il sera question en 23.8-39.'
    marker-yv: yv-n
  - type: text
    text: 'Quand David l''apprit, il envoya contre eux Joab avec toute l''armée, les guerriers. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mirent en campagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sortirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 14.8 ; Nb 27.17'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à l''entrée de la porte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de la ville '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est sous-entendu) désigne généralement l'entrée d'une ville fortifiée, donnant sur la place principale où se tiennent les assemblées. Les troupes mercenaires occupent d'autres positions dans les environs de la ville.
    marker-yv: yv-n
  - type: text
    text: 'Les Ammonites se mirent en campagne ; ils se rangèrent en ordre de bataille à l''entrée de la porte de la ville ; les Araméens de Tsoba et de Rehob, les hommes de Tob et de Maaka étaient à part dans la campagne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: devant et derrière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 8.3-22 ; 2Ch 13.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il fit… un choix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'élite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: correspondent à deux formes du même verbe hébreu.
    marker-yv: yv-n
  - type: text
    text: 'Joab vit qu''il avait à se battre sur deux fronts, devant et derrière. Il fit alors un choix dans l''élite d''Israël et se rangea face aux Araméens ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la troupe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'du peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 12), mais le mot hébreu correspondant peut désigner tout groupement de personnes (ici une armée) ; de même au v. 13 ; cf. 1S 13.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abishaï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 26.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'il confia le reste de la troupe à Abishaï, son frère, qui se rangea face aux Ammonites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Araméens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Aram
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', employé collectivement ; de même dans la suite du récit. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'secours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: secourir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même racine hébraïque prend aussi le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: salut / sauver.
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Si les Araméens sont plus forts que moi, tu viendras à mon secours ; et si les Ammonites sont plus forts que toi, j''irai te secourir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soyons forts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 31.6 ; Jos 1.6+,9 ; 1S 4.9+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. Jérusalem, capitale d''Israël, en opposition à leur propre capitale que les Ammonites défendent ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les villes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie l''ensemble du territoire national. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' fasse…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 3.18+.'
    marker-yv: yv-n
  - type: text
    text: 'Sois fort, soyons forts pour notre peuple et pour les villes de notre Dieu, et que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fasse ce qui lui plaira ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa troupe
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple qui était avec lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', v. 10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fuir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 68.2,13.'
