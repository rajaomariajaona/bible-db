document_id: 2SA.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les émissaires de David déshonorés
  - type: heading
    content: 1Ch 19.1-5
  - type: text
    content: ' '
  - type: note
    content: 'le roi des Ammonites  : Nahash (dont le nom apparaît au v. 2) a déjà été mentionné en 1S 11.1n  ; adversaire de Saül, il pourrait avoir entretenu des rapports autres avec David, puisqu''il n''est pas mentionné expressément parmi ses ennemis en 8.12.'
  - type: text
    content: 'Là-dessus, le roi des Ammonites mourut ; Hanoun, son fils, devint roi à sa place. '
  '10':
  - type: note
    content: 'de la troupe  : autre traduction du peuple (v. 12), mais le mot hébreu correspondant peut désigner tout groupement de personnes (ici une armée) ; de même au v. 13 ; cf. 1S 13.2n. –  Abishaï 1S 26.6n.'
  - type: text
    content: 'il confia le reste de la troupe à Abishaï, son frère, qui se rangea face aux Ammonites. '
  '11':
  - type: note
    content: 'les Araméens  : litt. Aram, employé collectivement ; de même dans la suite du récit. –  secours / secourir  : la même racine hébraïque prend aussi le sens de salut / sauver.'
  - type: text
    content: 'Il dit : Si les Araméens sont plus forts que moi, tu viendras à mon secours ; et si les Ammonites sont plus forts que toi, j''irai te secourir. '
  '12':
  - type: note
    content: 'soyons forts  : cf. Dt 31.6 ; Jos 1.6+,9 ; 1S 4.9+. –  les villes  : Vg a lu la ville, c.-à-d. Jérusalem, capitale d''Israël, en opposition à leur propre capitale que les Ammonites défendent ; les villes signifie l''ensemble du territoire national. –  que le Seigneur fasse…  : cf. 1S 3.18+.'
  - type: text
    content: 'Sois fort, soyons forts pour notre peuple et pour les villes de notre Dieu, et que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse ce qui lui plaira ! '
  '13':
  - type: note
    content: 'sa troupe  : litt. le peuple qui était avec lui, v. 10n. –  fuir  : cf. Ps 68.2,13.'
  - type: text
    content: 'Joab s''avança avec sa troupe pour attaquer les Araméens, qui durent fuir pour lui échapper. '
  '14':
  - type: text
    content: Quand les Ammonites virent que les Araméens avaient fui, ils fuirent aussi pour échapper à Abishaï et rentrèrent dans la ville. Joab revint de sa campagne contre les Ammonites et se rendit à Jérusalem.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'réunirent leurs forces  : litt. se réunirent ensemble.'
  - type: text
    content: 'Les Araméens, voyant qu''ils avaient été battus par Israël, réunirent leurs forces. '
  '16':
  - type: note
    content: 'Hadad-Ezer  : cf. 8.3n. –  de Transeuphratène  : litt. d''au-delà du fleuve (Euphrate). L''expression appartient au vocabulaire administratif des empires mésopotamiens, situés au nord-est de l''Euphrate ; elle désigne donc, de ce point de vue, la région s''étendant au sud-ouest du fleuve (en gros la Syrie actuelle). Cf. Esd 4.10n. –  Hélam  : localité non identifiée, peut-être Aléma, mentionnée en 1 Maccabées 5.26. –  Shobak  : nom d''origine inconnue ; 1Ch 19.16 Shophak.'
  - type: text
    content: 'Hadad-Ezer envoya mobiliser les Araméens de Transeuphratène, et ils arrivèrent à Hélam. Shobak, le chef de l''armée de Hadad-Ezer, était à leur tête. '
  '17':
  - type: note
    content: tout Israël, c.-à-d. toute l'armée d'Israël, tous les combattants potentiels et non plus seulement l'armée de métier, comme au v. 7n.
  - type: text
    content: 'On le dit à David. Celui-ci rassembla tout Israël, passa le Jourdain et vint à Hélam. Les Araméens se rangèrent face à David pour le combattre. '
  '18':
  - type: note
    content: 'les équipages (ou les attelages) de  : sous-entendu dans le texte. –  cavaliers ou équipages (de chars), hommes d''équipage, attelages, chevaux d''attelage  ; cf. 1.6n  ; certains mss de LXX ont lu ici fantassins, comme en 1Ch 19.18.'
  - type: text
    content: 'Les Araméens durent fuir pour échapper à Israël. David leur tua les équipages de sept cents chars et quarante mille cavaliers ; il abattit aussi le chef de leur armée, Shobak, qui mourut là. '
  '19':
  - type: note
    content: 'qui étaient soumis à  : litt. serviteurs de  ; cf. 8.2n. –  n''osèrent plus secourir  : litt. eurent peur de secourir encore  ; cf. v. 11n.'
  - type: text
    content: Tous les rois qui étaient soumis à Hadad-Ezer, se voyant battus par Israël, firent la paix avec Israël et lui furent soumis ; et les Araméens n'osèrent plus secourir les Ammonites.
  '2':
  - type: note
    content: 'J''agirai avec fidélité  : cf. 3.8 ; 9.1,7. –  envoya des gens de sa cour  : litt. envoya par la main de ses serviteurs. –  lui présenter ses condoléances  : litt. pour le consoler  ; de même dans la suite ; cf. Es 61.2 ; voir aussi Rm 12.15 ; Siracide 7.34 : « Ne te détourne pas de ceux qui pleurent, avec les affligés, afflige-toi. » Cf. 1R 5.15.'
  - type: text
    content: 'David dit : J''agirai avec fidélité envers Hanoun, fils de Nahash, comme son père a agi avec fidélité envers moi. David envoya des gens de sa cour lui présenter ses condoléances pour son père. Lorsqu''ils arrivèrent au pays des Ammonites, '
  '3':
  - type: note
    content: 'ces gens pour te présenter ses condoléances  : litt. des consolateurs. –  la ville  : Rabba (11.1) ou Rabba-des-Ammonites (12.26), capitale du royaume, aujourd''hui Amman. –  espionner  : cf. 3.25 ; 15.32-37 ; Gn 42.9,12 ; Nb 13 ; Jos 2.1 ; 7.2. –  détruire  : cf. Gn 19.21+ ; 1Ch 19.3.'
  - type: text
    content: 'les princes des Ammonites dirent à Hanoun, leur maître : Penses-tu que David ait voulu honorer ton père en t''envoyant ces gens pour te présenter ses condoléances ? N''est-ce pas pour examiner la ville, pour l''espionner et la détruire que David envoie ses gens auprès de toi ? '
  '4':
  - type: note
    content: 'raser… couper leurs habits  : pour ridiculiser les ambassadeurs, Hanoun leur inflige ces traitements ignominieux, sans être pourtant aussi cruel que son père Nahash en 1S 11.2 ; cf. Mt 22.6. –  fesses  : cf. Es 20.2-4 ; voir Es 47.2 ; Jr 13.22-26.'
  - type: text
    content: 'Alors Hanoun saisit les gens de David, leur fit raser la moitié de la barbe et fit couper leurs habits à mi-longueur, au niveau des fesses ; puis il les renvoya. '
  '5':
  - type: note
    content: étaient… dans une grande confusion ou étaient écrasés de honte  ; cf. 19.4 ; le même verbe peut évoquer l'insulte (1S 20.34 ; 25.7n  ; Ez 16.27n). –  Jéricho, au bord du Jourdain, est la première localité israélite sur le chemin de retour des ambassadeurs.
  - type: text
    content: 'On le dit à David, qui envoya quelqu''un à leur rencontre ; ces hommes étaient en effet dans une grande confusion ; le roi leur fit dire : Restez à Jéricho jusqu''à ce que votre barbe ait repoussé, puis vous reviendrez.'
  - type: heading
    content: Guerre contre les Ammonites et les Araméens
  - type: heading
    content: 1Ch 19.6-19
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'odieux  : cf. 1S 13.4n. –  Beth-Rehob / Tsoba  : cf. 8.3n. –  Maaka  : nom d''un des douze fils de Nahor, frère d''Abraham (Gn 22.24) ; ce nom fut donné à l''un des petits royaumes syriens situés au nord-est d''Israël. –  les gens de Tob  : litt. l''homme de Tob ; l''homme a été compris soit comme un collectif ( les gens ), soit comme l''équivalent de le roi, le chef . –  Tob Jg 11.3n.'
  - type: text
    content: 'Les Ammonites virent qu''ils s''étaient rendus odieux à David. Alors les Ammonites engagèrent vingt mille fantassins chez les Araméens de Beth-Rehob et chez les Araméens de Tsoba, mille hommes chez le roi de Maaka, et douze mille hommes chez les gens de Tob. '
  '7':
  - type: note
    content: 'Joab 2.13n  ; 8.16. –  les guerriers  : autre traduction les vaillants hommes  ; ce terme, placé en apposition à l''armée, pourrait préciser qu''il ne s''agit ici que de la troupe d''élite dont il sera question en 23.8-39.'
  - type: text
    content: 'Quand David l''apprit, il envoya contre eux Joab avec toute l''armée, les guerriers. '
  '8':
  - type: note
    content: 'se mirent en campagne  : litt. sortirent  ; cf. Gn 14.8 ; Nb 27.17n,21. –  à l''entrée de la porte (de la ville est sous-entendu) désigne généralement l''entrée d''une ville fortifiée, donnant sur la place principale où se tiennent les assemblées. Les troupes mercenaires occupent d''autres positions dans les environs de la ville.'
  - type: text
    content: 'Les Ammonites se mirent en campagne ; ils se rangèrent en ordre de bataille à l''entrée de la porte de la ville ; les Araméens de Tsoba et de Rehob, les hommes de Tob et de Maaka étaient à part dans la campagne. '
  '9':
  - type: note
    content: 'devant et derrière  : cf. Jos 8.3-22 ; 2Ch 13.14. –  Il fit… un choix et élite correspondent à deux formes du même verbe hébreu.'
  - type: text
    content: 'Joab vit qu''il avait à se battre sur deux fronts, devant et derrière. Il fit alors un choix dans l''élite d''Israël et se rangea face aux Araméens ; '
