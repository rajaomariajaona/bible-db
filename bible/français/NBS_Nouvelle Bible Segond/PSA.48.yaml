document_id: PSA.48,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La ville du grand roi
  - type: text
    content: ' '
  - type: note
    content: 42.1n.
  - type: text
    content: Chant. Psaume. Des fils de Coré.
  '10':
  - type: text
    content: ' '
  - type: note
    content: nous pensons à ou nous évoquons  ; le verbe peut avoir le sens de (se) représenter ou comparer.
  - type: text
    content: O Dieu, nous pensons à ta fidélité
  - type: text
    content: dans ton temple.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. 113.3.
  - type: text
    content: Comme ton nom, ô Dieu,
  - type: text
    content: ta louange retentit jusqu'aux extrémités de la terre ;
  - type: text
    content: ta main droite est pleine de justice.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Sion se réjouit 97.8. –  les filles de Juda  : probablement au sens métaphorique, pour désigner les autres villes de la région (Nb 21.25,32 ; Jos 15.45 ; 17.16 ; Ez 16.46n). –  à cause de tes jugements 97.8.'
  - type: text
    content: Le mont Sion se réjouit,
  - type: text
    content: les filles de Juda sont dans l'allégresse,
  - type: text
    content: à cause de tes jugements.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jos 6 ; Né 12.27-43. –  tournez autour  : le même verbe est traduit par encercler en 17.9 ; 22.17 ; 88.18.'
  - type: text
    content: Faites le tour de Sion, tournez autour d'elle,
  - type: text
    content: comptez ses tours,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'observez  : litt. mettez votre cœur à , locution qui signifie habituellement penser à. –  examinez  : traduction incertaine ; on pourrait aussi comprendre dénombrez. –  à la génération future 78.4 ; 102.19.'
  - type: text
    content: observez son rempart,
  - type: text
    content: examinez ses palais,
  - type: text
    content: pour le raconter à la génération future.
  '15':
  - type: text
    content: ' '
  - type: note
    content: pour toujours… 90.2. –  il sera notre guide 78.52 ; Dt 4.27 ; Es 49.10 ; 63.14. –  jusqu'à la mort , d'après les versions anciennes, qui ont aussi traduit jusque dans la mort, à tout jamais . Le sens de l'expression hébraïque correspondante est incertain ; certains comprennent au-delà de la mort  ; il s'agit peut-être d'une indication technique comme en 9.1n  ; 46.1n.
  - type: text
    content: Ce Dieu est notre Dieu pour toujours, à jamais ;
  - type: text
    content: il sera notre guide jusqu'à la mort.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur est grand 77.14 ; 86.10 ; 95.3 ; 96.4 ; 99.2 ; 104.1 ; 135.5 ; 145.3 ; 147.5 ; Jr 32.18s ; Dn 9.4. –  il est digne de toute louange  : litt. beaucoup loué . –  dans la ville… 99.2. –  sa montagne sacrée ou sainte  ; cf. 2.6+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand, il est digne de toute louange,'
  - type: text
    content: dans la ville de notre Dieu, sa montagne sacrée.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Belle… 50.2 ; Lm 2.15. –  Sion 2.6+. –  au plus profond du nord  : même expression en Ez 38.6,15 ; 39.2 ; le temple était situé au nord de Jérusalem ; mais le mot tsaphôn , qui est ici traduit par nord et fait assonance avec Sion ( Tsiyôn en hébreu), évoque aussi la montagne des dieux pour les Phéniciens (cf. 89.13n  ; Es 14.13n). –  la ville du grand roi  : cf. 47.3+ ; Mt 5.35.'
  - type: text
    content: Belle est la colline, gaieté de toute la terre,
  - type: text
    content: le mont Sion, au plus profond du nord,
  - type: text
    content: la ville du grand roi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 46.6,8. –  les palais de la ville  : litt. ses palais (le pronom personnel est au féminin). –  est connu 9.17 ; 76.2 ; cf. Es 19.21 ; Ez 20.5,9. –  citadelle 9.10+.'
  - type: text
    content: Dieu, dans les palais de la ville,
  - type: text
    content: est connu comme une citadelle.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.2 ; 46.6s ; 47.10. –  ligués  : cf. Nb 14.35 ; 16.11 ; Jos 11.5. –  ils se sont avancés  : litt. ils ont passé.'
  - type: text
    content: 'Car les rois s''étaient ligués :'
  - type: text
    content: ils se sont avancés ensemble.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 68.13 ; cf. 46.9-11 ; 77.17 ; 1S 14.15 ; Es 8.9 ; 17.13 ; 29.5ss ; 33.3 ; 36–37 ; 66.18.
  - type: text
    content: Ils ont regardé, stupéfaits ;
  - type: text
    content: saisis d'épouvante, ils se sont sauvés.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'frisson  : cf. 2.11+ ; 55.5s ; Ex 15.15 ; Dt 2.25 ; Es 33.14 ; Jb 4.14. –  femme qui accouche Ex 15.14n  ; Es 13.8 ; 21.3 ; Jr 4.31 ; 6.24.'
  - type: text
    content: Là, un frisson s'est emparé d'eux,
  - type: text
    content: comme les douleurs d'une femme qui accouche,
  '8':
  - type: text
    content: ' '
  - type: note
    content: le vent d'est Es 27.8 ; Jr 18.17 ; Ez 27.26 ; Jb 27.21. –  les bateaux de Tarsis ou les navires au long cours  ; cf. 72.10 ; 1R 10.22 ; Es 2.16n  ; Jon 1.3.
  - type: text
    content: comme par le vent d'est,
  - type: text
    content: qui brise les bateaux de Tarsis.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 46.2,6,9.
  - type: text
    content: Ce que nous avions entendu, nous l'avons vu
  - type: text
    content: 'dans la ville du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: 'dans la ville de notre Dieu :'
  - type: text
    content: 'Dieu l''affermira pour toujours. '
  - type: text
    content: Pause.
