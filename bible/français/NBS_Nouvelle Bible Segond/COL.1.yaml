document_id: COL.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: 1Co 1.1n  ; cf. 2Co 1.1 ; Ep 1.1s. – Voir apôtre . –  Timothée Ac 16.1+.
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par la volonté de Dieu, et le frère Timothée, '
  '10':
  - type: note
    content: que vous vous comportiez (litt. marchiez) d'une manière digne… Ep 4.1 ; Ph 1.27 ; 1Th 2.12+. –  portiez… v. 6n  ; cf. Rm 7.4. –  œuvres bonnes 2Co 9.8+. –  dans la connaissance v. 9n  ; cf. 2.2s ; 2P 1.2+.
  - type: text
    content: 'pour que vous vous comportiez d''une manière digne du Seigneur, afin de lui plaire à tous points de vue, que vous portiez du fruit par toutes sortes d''œuvres bonnes, que vous croissiez dans la connaissance de Dieu '
  '11':
  - type: note
    content: 'Ep 1.18-19n. –  sa force glorieuse  : litt. le pouvoir de sa gloire. –  persévérance… à toute épreuve 2Co 12.12. – Les mots Avec joie pourraient aussi être rattachés à la phrase qui précède ; cf. Ga 5.22 ; Ph 1.4 ; 4.4.'
  - type: text
    content: et que vous deveniez puissants à tous égards par sa force glorieuse, en vue d'une persévérance et d'une patience à toute épreuve.
  - type: heading
    content: Le Fils, image du Dieu invisible
  - type: text
    content: 'Avec joie, '
  '12':
  - type: note
    content: 'rendez grâce v. 3+. –  vous a rendus capables ou, selon certains mss, nous a rendus capables. –  d''accéder…  : litt. de la participation à la part d''héritage des saints  : cf. Ep 1.11n (terme apparenté) ; voir aussi Ac 20.32n.'
  - type: text
    content: 'rendez grâce au Père qui vous a rendus capables d''accéder à la part d''héritage des saints dans la lumière. '
  '13':
  - type: note
    content: 'autorité (Ep 1.21+ ; 2.2n) des ténèbres  : cf. Lc 22.53 ; voir aussi Jn 8.12 ; Ac 26.17s ; Ep 5.8+ ; 1P 2.9. –  son Fils bien-aimé  : litt. le Fils de son amour, cf. Mt 3.17/ / ; Ep 1.6+.'
  - type: text
    content: 'Il nous a délivrés de l''autorité des ténèbres pour nous transporter dans le royaume de son Fils bien-aimé, '
  '14':
  - type: note
    content: la rédemption, le pardon des péchés Ep 1.7+ ; cf. Rm 3.24n.
  - type: text
    content: en qui nous avons la rédemption, le pardon des péchés.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jn 1.1-18 ; Hé 1.1ss ; vers le début de l''ère chrétienne, Philon d''Alexandrie, un philosophe juif de langue grecque, décrivait la Sagesse ou le Verbe de Dieu comme le commencement, l''image de Dieu, la vision de Dieu, l''homme à son image, le fils premier-né etc. –  l''image Gn 1.26s ; 2Co 4.4+ ; Ph 2.6 ; Hé 1.3+. –  Dieu invisible 1Tm 1.17+ ; cf. Jn 1.18 ; Rm 1.20 ; Hé 11.27. –  premier-né de toute création (ou de toute créature , cf. v. 23) : cf. Rm 8.29 ; Hé 1.6 ; Ap 3.14 ; voir aussi Ex 13.11-16 ; Pr 8.22ss.'
  - type: text
    content: Il est l'image du Dieu invisible,
  - type: text
    content: le premier-né de toute création ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'en lui  : on pourrait aussi comprendre par lui  ; cf. Jn 1.3+ ; Hé 1.2. –  dans les cieux et sur la terre  : cf. Ep 1.10. –  visible / invisible  : cf. 2Co 4.18. –  trônes…  : noms donnés dans certains systèmes philosophico-religieux du Ier s. aux diverses puissances censées régir l''univers physique et spirituel ; cf. 2.10,15 ; Rm 8.38s ; 1Co 2.8 ; 15.24 ; Ep 1.21+ ; Ph 2.9-11 ; 1P 3.22. –  par lui et pour lui Rm 11.36 ; 1Co 8.6 ; cf. Pr 8.27-31.'
  - type: text
    content: car c'est en lui que tout a été créé
  - type: text
    content: dans les cieux et sur la terre,
  - type: text
    content: le visible et l'invisible,
  - type: text
    content: trônes, seigneuries,
  - type: text
    content: principats, autorités ;
  - type: text
    content: tout a été créé par lui et pour lui ;
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'avant tout  : cf. Pr 8.23-27 ; Jn 1.15 ; 3.31 ; 8.58 ; Sagesse 9.9 : « La Sagesse… était présente lorsque tu créais le monde. » Siracide 1.4 : « Avant toutes choses fut créée la sagesse. » 24.9 : « Avant que le temps ne commence, il m''a créée. » –  tout se tient ou subsiste, a consistance  : le terme correspondant était souvent employé, notamment dans la pensée stoïcienne (cf. Ac 17.18n  ; 1Co 8.6n), pour décrire la cohésion et l''unité du monde ; cf. Ep 1.22 ; Hé 1.3 ; 2P 3.5 ; Sagesse 1.7 : « L''Esprit du Seigneur remplit la terre et… contient l''univers. » Siracide 43.26 : « Par sa parole toutes choses s''arrangent (ou s''ordonnent). »'
  - type: text
    content: lui, il est avant tout,
  - type: text
    content: et c'est en lui que tout se tient ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'il est la tête… Ep 1.22-23n  ; 4.15+ ; pour Philon (v. 15n), le Verbe de Dieu est la tête qui dirige l''univers, lequel est conçu comme un corps. –  corps… Eglise  : litt. du corps de l''Eglise , cf. v. 24 ; Rm 12.4s ; 1Co 10.17 ; 12.13. –  le commencement ou le principe  ; le même terme, au pluriel, est traduit par principats au v. 16 ; voir Jn 1.1+ ; cf. Ac 3.15n  ; Ap 3.14n. –  premier-né (v. 15+) d''entre les morts  : cf. Ac 26.23 ; 1Co 15.20,23 ; Ap 1.5.'
  - type: text
    content: lui, il est la tête du corps – qui est l'Eglise.
  - type: text
    content: Il est le commencement,
  - type: text
    content: le premier-né d'entre les morts,
  - type: text
    content: afin d'être en tout le premier.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'il a plu…  : litt. il lui a plu…  ; autre traduction  : il a plu à toute la plénitude (grec plérôma ) d''habiter en lui  ; 2.9s ; voir Ep 1.10n,23 ; 3.19 ; 4.10,13 ; cf. Mc 1.11/ / ; Jn 1.14,16 ; voir aussi Es 6.3 ; Ps 68.17 ; 132.13s ; Pr 8.12ss.'
  - type: text
    content: Car il a plu à Dieu de faire habiter en lui toute plénitude
  '2':
  - type: note
    content: 'Rm 1.7n  ; Ep 1.1n. – Voir saints. –  Grâce et paix…  : plusieurs mss ajoutent à la fin et du Seigneur Jésus-Christ.'
  - type: text
    content: 'aux frères qui, à Colosses, sont saints et dignes de confiance dans le Christ : Grâce et paix à vous de la part de Dieu, notre Père !'
  - type: heading
    content: La bonne nouvelle est parvenue chez vous
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'tout réconcilier Rm 5.10 ; 2Co 5.18+ss ; cf. Ep 1.10. –  sur la terre / dans les cieux v. 16. –  en faisant la paix… Ep 2.13-17 ; cf. Rm 5.1. –  par lui  : cette répétition est absente de certains mss. –  par le sang de sa croix  : cf. 1Co 1.18 ; 2Co 5.19 ; Ph 2.8.'
  - type: text
    content: et, par lui, de tout réconcilier avec lui-même,
  - type: text
    content: aussi bien ce qui est sur la terre que
  - type: text
    content: ce qui est dans les cieux,
  - type: text
    content: en faisant la paix par lui,
  - type: text
    content: par le sang de sa croix.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'étrangers (Ep 2.12 ; 4.18) et ennemis (Rm 5.10) …  : cf. Jn 3.19+ss.'
  - type: text
    content: 'Quant à vous qui étiez autrefois étrangers et ennemis, dans votre façon de penser et par vos œuvres mauvaises, '
  '22':
  - type: note
    content: 'il vous a…  : certains mss portent vous avez maintenant été réconciliés, v. 20+. –  maintenant Rm 3.21 ; 5.9 ; 7.6 ; 11.30s ; 16.26 ; Ep 2.13 ; 3.5 ; 2Tm 1.10. –  dans son corps de chair  : litt. dans le corps de sa chair (sémitisme) ; cf. 2.11 ; Jn 1.14 ; Rm 1.3 ; 7.4 ; 8.3 ; 9.5 ; 2Co 5.16 ; Ep 2.14. –  pour vous faire paraître ou comparaître… v. 28n  ; cf. Rm 14.10 ; 2Co 11.2 ; Ep 1.4 ; 5.27+ ; voir aussi Ph 2.15 ; Hé 9.14 ; 1P 1.19. –  sans reproche 1Tm 3.10+.'
  - type: text
    content: 'il vous a maintenant réconciliés, par la mort, dans son corps de chair, pour vous faire paraître devant lui saints, sans défaut et sans reproche '
  '23':
  - type: note
    content: fondés Ep 3.17 ; cf. 1Co 3.10s ; 2Tm 2.19. –  fermement établis ou fermes  ; même terme 1Co 7.37 ; 15.58. –  l'espérance de la bonne nouvelle v. 5,27. –  à toute création ou à toute créature, cf. v. 6,15 ; Mc 16.15 ; Rm 8.19ss ; 1Th 1.8 ; 1Tm 3.16. –  ministre ou serviteur, de même au v. 25 ; cf. 1Co 3.5 ; 6.4 ; 2Co 3.6 ; 11.23 ; certains mss ajoutent et apôtre, d'autres héraut et apôtre.
  - type: text
    content: – si vraiment vous demeurez, dans la foi, fondés et fermement établis, sans vous laisser emporter loin de l'espérance de la bonne nouvelle que vous avez entendue, qui a été proclamée à toute création sous le ciel et dont moi, Paul, je suis devenu ministre.
  - type: heading
    content: Le combat de l'apôtre
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ep 3.1,13+ ; voir aussi Ac 9.16 ; 2Co 4.10-12 ; 11.23 ; 2Tm 2.10. –  je supplée  : verbe apparenté aux termes traduits par plénitude au v. 19 et par accomplir au v. 25. – L''expression détresses du Christ dans ma chair pourrait signifier simplement mes souffrances d''apôtre du Christ  ; d''autres comprennent je supplée dans ma chair à ce qui manque (cf. 1Th 3.10) aux détresses (cf. Rm 5.3+) du Christ pour son corps… –  son corps, qui est l''Eglise v. 18+.'
  - type: text
    content: 'Je me réjouis maintenant dans mes souffrances pour vous et je supplée à ce qui manque aux détresses du Christ dans ma chair pour son corps, qui est l''Eglise. '
  '25':
  - type: note
    content: 'ministre v. 23n  ; cf. Ep 3.7. –  l''intendance 1Co 4.1ns ; 9.17 ; Ep 3.2 ; même terme en Ep 1.10n  ; 3.9. –  pour vous…  : autre traduction afin d''accomplir pour vous la parole de Dieu ; accomplir la parole signifie peut-être annoncer pleinement la parole ou achever l''annonce de la parole  ; voir aussi Mc 13.9s ; Ac 20.24 ; Rm 15.16-21 ; 2Tm 4.17.'
  - type: text
    content: 'C''est d''elle que, moi, je suis devenu ministre, selon l''intendance de Dieu qui m''a été accordée pour vous, afin d''accomplir la parole de Dieu, '
  '26':
  - type: note
    content: 'ce mystère v. 27 ; Rm 16.25+ ; Ep 1.9+ ; 3.3ss. –  caché de tout temps…  : autre traduction possible caché aux éons et aux générations, voir Ep 3.5,9ns ; cf. 1Co 2.7 ; Tt 1.2s. –  qui s''est… manifesté  : litt. qui a été manifesté. –  à ses saints v. 2 ; 3.12.'
  - type: text
    content: 'ce mystère qui a été caché de tout temps et à toutes les générations, mais qui s''est maintenant manifesté à ses saints, '
  '27':
  - type: note
    content: 'faire connaître Ep 1.9n. – Voir non-Juifs. –  la glorieuse richesse  : litt. la richesse de la gloire, cf. Ep 1.7+,18. –  le Christ en vous ou parmi vous, cf. Rm 8.10+. –  l''espérance de la gloire 3.4 ; Rm 5.2 ; 8.19-21 ; 1P 1.21.'
  - type: text
    content: 'à qui Dieu a voulu faire connaître quelle est, parmi les non-Juifs, la glorieuse richesse de ce mystère : le Christ en vous, l''espérance de la gloire. '
  '28':
  - type: note
    content: 'Cf. 3.16. –  porter…  : litt. faire paraître (comme au v. 22) tout être humain (ou tout homme) accompli (ou parfait, adulte) : cf. 4.12 ; terme apparenté en 3.14 ; cf. 1Co 2.6 ; Ep 4.13n  ; voir aussi Mt 5.48 ; Rm 12.2 ; Jc 1.4,25 ; 3.2.'
  - type: text
    content: 'C''est lui que nous annonçons, en avertissant tout être humain et en instruisant tout être humain en toute sagesse, afin de porter tout être humain à son accomplissement dans le Christ. '
  '29':
  - type: note
    content: combattant 2.1 ; 4.12 ; 1Th 2.2. – Les termes grecs correspondant à son action (ou son opération, cf. 2.12) et est à l'œuvre sont apparentés ; voir 1Co 12.6n  ; Ep 1.19n  ; cf. Ep 3.7,20 ; Ph 2.13 ; 4.13 ; voir aussi 1Co 15.10.
  - type: text
    content: C'est pour cela que je me donne de la peine, en combattant par son action qui, avec puissance, est à l'œuvre en moi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 1.8 ; Ep 1.15s ; 1Th 1.2 ; Phm 4s. –  Nous rendons grâce v. 12 ; 2.7 ; 3.15-17 ; 4.2 ; Ep 5.4,20. –  Jésus-Christ  : certains mss portent seulement Jésus.'
  - type: text
    content: 'Nous rendons grâce à Dieu, le Père de notre Seigneur Jésus-Christ, et nous prions sans cesse pour vous ; '
  '4':
  - type: note
    content: foi / amour / espérance (v. 5), cf. 1Co 13.13+. –  pour tous les saints Ep 6.18+.
  - type: text
    content: 'nous avons en effet entendu parler de votre foi en Jésus-Christ et de l''amour que vous avez pour tous les saints, '
  '5':
  - type: note
    content: 'l''espérance Ep 1.18 ; Hé 6.18s ; 1P 1.3s. –  espérance dont vous avez entendu parler…  : litt. que vous avez entendue dans la parole de la vérité de la bonne nouvelle  ; Ep 1.13 ; 2Tm 2.15.'
  - type: text
    content: 'à cause de l''espérance qui vous est réservée dans les cieux, espérance dont vous avez entendu parler précédemment par la parole de la vérité, la bonne nouvelle. '
  '6':
  - type: note
    content: 'Cf. 2P 1.12. –  porte du fruit et croît (comme au v. 10) : cf. Mc 4.8,20/ /. –  dans le monde entier  : cf. v. 23 ; Mt 28.19s ; 1Tm 3.16. –  en vérité  : autre traduction dans la vérité.'
  - type: text
    content: 'Cette bonne nouvelle est parvenue chez vous, tout comme elle porte du fruit et croît dans le monde entier ; il en est de même chez vous, depuis le jour où vous avez entendu et connu la grâce de Dieu en vérité, '
  '7':
  - type: note
    content: 'Epaphras 4.12 ; Phm 23. –  compagnon d''esclavage ou de service, cf. 4.7n  ; Mt 18.28nss ; 24.49 ; Rm 1.1+ ; Ap 6.11+ ; voir aussi Lc 1.38n. –  pour vous  : plusieurs mss portent pour nous  ; certains comprennent  : qui nous représente comme un ministre digne de confiance (ou fidèle, Ep 1.1n  ; 6.21) …'
  - type: text
    content: 'd''après les instructions que vous avez reçues d''Epaphras, notre compagnon d''esclavage bien-aimé ; il est pour vous un ministre du Christ digne de confiance, '
  '8':
  - type: note
    content: 'de quel amour l''Esprit vous anime  : litt. votre amour dans l''Esprit, ou en Esprit  ; cf. 3.16 ; Rm 5.5 ; 15.30.'
  - type: text
    content: et il nous a appris de quel amour l'Esprit vous anime.
  - type: heading
    content: Intercession
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ep 1.15-17. –  connaissance (ou vraie connaissance, pleine connaissance même terme au v. 10 et en 2.2 ; 3.10 ; Rm 1.28n  ; Ep 1.17+ ; Ph 1.9 ; 1Tm 2.4n  ; 2Tm 3.7+ ; 2P 1.2n) de sa volonté Lc 12.47+. –  sagesse et intelligence  : cf. v. 28 ; 2.2s,23 ; 3.16 ; Ep 1.8+ ; 3.14-19. –  spirituelle  : voir esprit.'
  - type: text
    content: 'C''est pourquoi, nous aussi, depuis le jour où nous l''avons appris, nous ne cessons de prier Dieu pour vous et de demander que vous soyez remplis de la connaissance de sa volonté, en toute sagesse et intelligence spirituelle, '
