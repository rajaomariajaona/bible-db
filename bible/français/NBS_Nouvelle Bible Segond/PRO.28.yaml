document_id: PRO.28,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Le méchant prend la fuite…  : cf. Lv 26.36 ; Dt 28.28 ; Es 57.21.'
  - type: text
    content: Le méchant prend la fuite sans que personne le poursuive ;
  - type: text
    content: les justes ont confiance comme un jeune lion.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la fosse qu''il a creusée  : litt. sa fosse  ; cf. 26.27n.'
  - type: text
    content: Celui qui égare les gens droits sur une voie mauvaise
  - type: text
    content: tombe dans la fosse qu'il a creusée ;
  - type: text
    content: les gens intègres ont le bonheur pour patrimoine.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'se croit sage  : litt. (est) sage à ses yeux  ; cf. 3.7n. –  le mettre à l''épreuve 18.17n.'
  - type: text
    content: L'homme riche se croit sage ;
  - type: text
    content: un pauvre qui est intelligent peut le mettre à l'épreuve.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Quand les justes…  : cf. 11.10+s ; 29.2. –  honneur  : autre traduction splendeur . –  quand les méchants… v. 28. –  chacun se cache  : litt. un homme est cherché.'
  - type: text
    content: Quand les justes triomphent, c'est un grand honneur ;
  - type: text
    content: quand les méchants s'élèvent, chacun se cache.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui couvre (c.-à-d. dissimule ) ses offenses (ou ses transgressions  ; cf. 10.12n) …  : cf. Ps 32.5s ; 1Jn 1.9s ; Siracide 4.26 : « N''aie pas honte d''avouer tes péchés, ne prétends pas t''opposer au cours d''un fleuve. » –  ne réussit pas  : autre traduction ne prospère pas . –  reconnaît  : autre traduction confesse  ; cf. Ps 26.7n  ; 32.5 ; Dn 9.4 ; Esd 10.1 ; Né 9.3.'
  - type: text
    content: Celui qui couvre ses offenses ne réussit pas ;
  - type: text
    content: celui qui les reconnaît et les délaisse obtient compassion.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'de la frayeur  : cf. 1.26ss ; 3.24s ; il s''agit probablement ici de la crainte de Dieu (cf. 1.7n), évoquée par une expression inhabituellement forte (cf. Jr 2.19 ; Ps 36.2). –  Celui qui s''obstine  : litt. celui qui endurcit son cœur  ; cf. Siracide 3.26 : « Le cœur endurci finira dans le malheur, celui qui aime le danger y périra. »'
  - type: text
    content: Heureux celui qui éprouve constamment de la frayeur !
  - type: text
    content: Celui qui s'obstine tombe dans le malheur.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'déchaîné  : autres traductions errant ; qui attaque . –  gouverne  : autre traduction domine  ; cf. 29.2+.'
  - type: text
    content: Un lion qui gronde, un ours déchaîné,
  - type: text
    content: tel est le méchant qui gouverne un peuple pauvre.
  '16':
  - type: text
    content: Un chef dépourvu d'intelligence multiplie les actes d'oppression ;
  - type: text
    content: celui qui déteste le gain illicite prolonge ses jours.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'du sang d''un autre  : litt. du sang d''un être ou d''une vie (sur le terme correspondant, voir Gn 1.20n). –  jusqu''au gouffre  : autre traduction jusqu''au cachot . –  retienne 5.5n.'
  - type: text
    content: Celui qui est chargé du sang d'un autre
  - type: text
    content: 's''enfuit jusqu''au gouffre : qu''on ne le retienne pas !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'voies tortueuses  : cf. v. 6+.'
  - type: text
    content: Celui qui suit la voie de l'intégrité sera sauvé ;
  - type: text
    content: celui qui suit deux voies tortueuses tombera dans l'une d'elles.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 12.11n.
  - type: text
    content: Celui qui cultive sa terre est rassasié de pain ;
  - type: text
    content: celui qui poursuit des chimères est rassasié de pauvreté.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'il y a continuité  : litt. ainsi, il fera prolonger.'
  - type: text
    content: Quand un pays est en révolte, ses chefs sont nombreux ;
  - type: text
    content: avec quelqu'un qui a de l'intelligence et de la connaissance, il y a continuité.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Un homme sûr ou probe ; fidèle ; digne de confiance  ; cf. 20.6. –  est comblé…  : autre traduction sera comblé de bénédictions . –  celui qui a hâte d''être riche  : cf. 13.11+ ; 20.21+ ; 23.4.'
  - type: text
    content: Un homme sûr est comblé de bénédictions ;
  - type: text
    content: celui qui a hâte d'être riche ne sera pas tenu pour innocent.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''est pas bon…  : cf. 24.23n. Voir aussi 18.5.'
  - type: text
    content: Il n'est pas bon de se montrer partial ;
  - type: text
    content: pour un morceau de pain un homme se rend coupable.
  '22':
  - type: text
    content: ' '
  - type: note
    content: l'œil mauvais 23.6n.
  - type: text
    content: Celui qui a l'œil mauvais se presse vers la fortune ;
  - type: text
    content: il ne sait pas que la misère viendra sur lui.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui avertit…  : cf. 27.5-6+. – Voir grâce. –  enjôleuse  : cf. 2.16n  ; autre traduction flatteuse, complaisante.'
  - type: text
    content: Celui qui avertit quelqu'un trouve ensuite plus de grâce
  - type: text
    content: que la langue enjôleuse.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'crime  : le terme hébreu est généralement traduit par transgression, révolte (cf. 29.6) ou offense  ; cf. 10.12n. –  du destructeur  : litt. d''un homme de destruction  ; cf. 18.9n.'
  - type: text
    content: Celui qui dépouille son père et sa mère
  - type: text
    content: 'et qui dit : « Ce n''est pas un crime ! »'
  - type: text
    content: est le compagnon du destructeur.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'qui a de vastes ambitions  : litt. qui est large de gosier ou d''appétit (6.30n  ; voir Gn 1.20n). –  provoque (v. 4n) les disputes  : cf. 13.10 ; 15.18+ ; 29.22. –  est dans l''abondance 11.25n.'
  - type: text
    content: Celui qui a de vastes ambitions provoque les disputes ;
  - type: text
    content: 'celui qui met sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est dans l''abondance.'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'confiance en son propre jugement  : cf. 3.5+s. –  stupide 1.22+. –  est délivré  : litt. échappe ou échappera.'
  - type: text
    content: Celui qui met sa confiance en son propre jugement est stupide ;
  - type: text
    content: celui qui suit la voie de la sagesse est délivré.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Pour celui qui donne…  : cf. 11.25 ; 19.17+ ; 22.9 ; Dt 15.7s,10. –  qui ferme les yeux  : cf. Lv 20.4+.'
  - type: text
    content: Pour celui qui donne au pauvre, pas de privation ;
  - type: text
    content: pour celui qui ferme les yeux, beaucoup de malédictions.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Quand les méchants… v. 12+.
  - type: text
    content: Quand les méchants s'élèvent, chacun se cache ;
  - type: text
    content: quand ils disparaissent, les justes sont nombreux.
  '3':
  - type: text
    content: Un homme pauvre qui opprime les petites gens,
  - type: text
    content: c'est une pluie torrentielle, et ensuite il n'y a plus de pain.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ceux qui abandonnent l''enseignement (autre traduction la loi )… : cf. v. 7,9 ; 29.18 ; voir 1.8n. –  qui gardent  : autre traduction qui observent . –  s''emportent…  : autre traduction le provoquent , même verbe v. 25 ; 15.18 ; 29.22. –  contre lui  : litt. contre eux.'
  - type: text
    content: Ceux qui abandonnent l'enseignement louent le méchant ;
  - type: text
    content: ceux qui gardent l'enseignement s'emportent contre lui.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'équité 1.3n. –  ceux qui cherchent le Seigneur …  : cf. Sagesse 3.9 : « Ceux qui se confient en lui comprendront la vérité. »'
  - type: text
    content: Les hommes mauvais ne comprennent pas l'équité ;
  - type: text
    content: 'ceux qui cherchent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' comprennent tout.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Mieux vaut le pauvre… 19.1. –  voies tortueuses  : même expression v. 18 ; 10.9 ; cf. 2.15 ; 22.5n.'
  - type: text
    content: Mieux vaut le pauvre qui suit la voie de l'intégrité
  - type: text
    content: que celui qui a des voies tortueuses, fût-il riche.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'l''enseignement ou la loi , 1.8n. –  fréquente 13.20+ ; 29.3. –  les débauchés  : cf. 23.21n.'
  - type: text
    content: Celui qui garde l'enseignement est un fils intelligent ;
  - type: text
    content: celui qui fréquente les débauchés met son père dans la confusion.
  '8':
  - type: text
    content: ' '
  - type: note
    content: intérêts / rentes Lv 25.36n.
  - type: text
    content: Celui qui augmente ses biens par les intérêts et les rentes
  - type: text
    content: les amasse pour celui qui fait grâce aux pauvres.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'l''enseignement  : autre traduction la loi , cf. v. 4+. –  sa prière…  : cf. 15.8.'
  - type: text
    content: Celui qui détourne l'oreille pour ne pas écouter l'enseignement,
  - type: text
    content: sa prière même est une abomination.
