document_id: ISA.26,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Chant : Nous avons une ville forte'
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là 12.1+. –  il nous donne le salut…  : on peut comprendre  : il a installé des murailles et un rempart (cf. 2S 20.15) pour le salut  ; cf. 60.18.'
  - type: text
    content: 'En ce jour-là, dans le pays de Juda, on chantera :'
  - type: text
    content: Nous avons une ville forte ;
  - type: text
    content: il nous donne le salut pour murailles et pour rempart.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Si l''on fait grâce… Ec 8.11. –  pays de la droiture  : l''expression désigne probablement Israël. –  il n''a pas égard à  : litt. il ne voit pas  ; cf. 5.12.'
  - type: text
    content: Si l'on fait grâce au méchant,
  - type: text
    content: il n'apprend pas la justice ;
  - type: text
    content: il agit injustement au pays de la droiture
  - type: text
    content: 'et il n''a pas égard à la majesté du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ta passion jalouse pour le peuple  : litt. la passion jalouse du peuple  ; cf. 9.6+. –  un feu dévorera tes ennemis  : litt. le feu de (c.-à-d. destiné à ) tes ennemis les dévorera  ; cf. 30.27.'
  - type: text
    content: Seigneur
  - type: text
    content: ', ta main est si haute'
  - type: text
    content: qu'ils ne l'aperçoivent pas.
  - type: text
    content: Ils verront ta passion jalouse pour le peuple
  - type: text
    content: et ils en seront honteux ;
  - type: text
    content: ainsi un feu dévorera tes ennemis.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'toutes nos œuvres…  : cf. Ps 90.17 ; Ph 2.13.'
  - type: text
    content: Seigneur
  - type: text
    content: ', tu nous assignes la paix ;'
  - type: text
    content: toutes nos œuvres, en effet,
  - type: text
    content: c'est toi qui les accomplis pour nous.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'seigneurs  : les souverains étrangers et peut-être leurs dieux (cf. 25.8). Le terme ainsi traduit rappelle le mot ’Adonaï , lecture traditionnelle en hébreu du nom rendu par Seigneur (dans le texte : YHWH, cf. Ex 3.15n). Le verbe traduit par dominé est apparenté au nom pour Baal. –  nous évoquons  : verbe apparenté au mot rendu par souvenir (v. 8n,14) ; de même en 48.1 ; cf. 49.1 ; voir aussi Ex 23.13 ; Jos 23.7.'
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu,'
  - type: text
    content: d'autres seigneurs, à part toi, ont dominé sur nous ;
  - type: text
    content: mais c'est par toi seul que nous évoquons ton nom.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 19. –  ombres  : cf. 14.9n. –  souvenir ou évocation  ; cf. v. 8.'
  - type: text
    content: Les morts ne revivront pas,
  - type: text
    content: les ombres ne se relèveront pas ;
  - type: text
    content: ainsi tu es intervenu,
  - type: text
    content: tu les as détruits,
  - type: text
    content: tu as fait disparaître tout souvenir d'eux !
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'tu t''es glorifié  : autre traduction tu as été glorifié cf. Ex 14.4,17 ; Ez 28.22. –  reculé toutes les limites  : cf. Ez 47.15-20.'
  - type: text
    content: 'Tu as augmenté la nation, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Tu as augmenté la nation, tu t'es glorifié ;
  - type: text
    content: tu as reculé toutes les limites du pays.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ils t''ont (autre texte nous t''avons ) cherché  : litt. ils t''ont visité  ; cf. 10.12+ ; 24.22n. –  leurs (sous-entendu dans le texte) chuchotements  : sur ce sens, cf. 2S 12.19 ; Ps 41.8 ; le mot correspondant est parfois employé pour des incantations magiques (Es 3.3n). –  correction ou instruction, leçon  ; cf. 53.5 ; Jr 5.3+ ; Pr 1.2n.'
  - type: text
    content: Seigneur
  - type: text
    content: ', ils t''ont cherché,'
  - type: text
    content: quand ils étaient dans la détresse ;
  - type: text
    content: 'ils ont épanché leurs chuchotements :'
  - type: text
    content: ta correction était sur eux.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 13.8 ; Mt 24.8 ; Jn 16.21.
  - type: text
    content: Comme une femme enceinte qui est près d'accoucher
  - type: text
    content: souffre et crie dans ses douleurs,
  - type: text
    content: 'ainsi sommes-nous devant toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '18':
  - type: text
    content: ' '
  - type: note
    content: '37.3 ; cf. 33.11+. –  venus à la vie  : litt. tombés , expression très concrète pour décrire la naissance ; cf. v. 19.'
  - type: text
    content: Nous avons conçu, nous avons souffert,
  - type: text
    content: 'et quand nous accouchons, ce n''est que du vent :'
  - type: text
    content: nous n'avons pas produit d'actes salutaires pour la terre,
  - type: text
    content: et les habitants du monde ne sont pas venus à la vie.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Que tes morts revivent  : cf. v. 14 ; 25.8 ; Ez 37 ; Dn 12.2 ; Mt 11.5/  ; 1Co 15.12-56 ; voir résurrection. –  mes cadavres  : le mot est au singulier en hébreu. Il faut toutefois, probablement, le prendre comme un collectif puisque le verbe traduit par se relèvent est au pluriel. Syr leurs cadavres. –  ta rosée  : cf. 18.4 ; Os 4.6 ; voir aussi Gn 27.28 ; Ps 133.3 ; Pr 19.12. –  lumière  : le terme hébreu est au pluriel : l''image est-elle celle des éclairs (cf. Jb 36.32 ; 37.3,11,15) ou simplement celle de l''aurore (même mot en Jg 19.26 ; Né 8.3 ; cf. Os 6.3 ; Ps 110.3) ? Sur l''association lumière / vie, voir Ps 36.9s ; 56.14 ; Jb 33.28,30. –  redonnera le jour  : litt. fera tomber  ; cf. v. 18n.'
  - type: text
    content: Que tes morts revivent !
  - type: text
    content: Que mes cadavres se relèvent !
  - type: text
    content: Réveillez-vous et poussez des cris de joie,
  - type: text
    content: vous qui demeurez dans la poussière !
  - type: text
    content: Car ta rosée est une rosée de lumière,
  - type: text
    content: et la terre redonnera le jour aux ombres.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 24.3s ; 118.19s. – Voir justice. –  la probité  : autre traduction la fidélité.'
  - type: text
    content: Ouvrez les portes,
  - type: text
    content: pour qu'entre la nation juste
  - type: text
    content: qui garde la probité.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'entre…  : cf. Gn 7.16 ; Ex 12.22s ; 2R 4.4s,21,33 ; Mt 6.6. –  tes appartements  : litt. tes pièces ou tes chambres . –  quelques instants 10.25 ; Mt 24.22 ; LXX a ici l''expression grecque rendue par un peu – bien peu ! en Hé 10.37.'
  - type: text
    content: Va, mon peuple, entre dans tes appartements
  - type: text
    content: et ferme tes portes sur toi ;
  - type: text
    content: cache-toi pour quelques instants
  - type: text
    content: jusqu'à ce que la fureur soit passée.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'de son lieu  : cf. Jr 4.7n  ; Ez 3.12n  ; Mi 1.3. –  faire rendre des comptes  : le même verbe a été traduit par intervenir v. 14, de même en 27.1,3. Cf. 10.12+ ; 24.22n. –  sang  : comme en 1.15n. –  ne couvrira plus  : voir Gn 4.10n  ; Ps 106.38 ; Jb 16.18.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sort de son lieu'
  - type: text
    content: afin de faire rendre des comptes aux habitants de la terre pour leur faute ;
  - type: text
    content: la terre exposera son sang,
  - type: text
    content: elle ne couvrira plus ses tués.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Autre traduction ferme dans tes dispositions, tu assures une paix parfaite (à la nation, v. 2 ; cf. 1R 5.26) parce qu'elle met sa confiance en toi.
  - type: text
    content: A celui qui est ferme dans ses dispositions,
  - type: text
    content: tu assures la paix, la paix,
  - type: text
    content: parce qu'il met sa confiance en toi.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'confiance Ps 4.6+. –  le Seigneur (Yah), le Seigneur (YHWH)  : voir 12.2n. –  le rocher 17.10+. –  de tous les temps ou éternel (ainsi LXX) ; litt. des âges (traduction traditionnelle des siècles ).'
  - type: text
    content: 'Mettez votre confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour toujours,'
  - type: text
    content: 'car c''est dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah), le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: qu'est le rocher de tous les temps.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'hauteur cf. 24.4n. –  abaissée…  : cf. 25.2,12 ; voir aussi Jr 49.16 ; 50.31s ; Ab 3s ; Pr 16.5,18.'
  - type: text
    content: Il a renversé ceux qui habitaient la hauteur,
  - type: text
    content: il a abaissé la ville élevée ;
  - type: text
    content: il l'a abaissée jusqu'à terre,
  - type: text
    content: il lui a fait toucher la poussière.
  '6':
  - type: text
    content: ' '
  - type: note
    content: foulée 25.10.
  - type: text
    content: Elle est foulée aux pieds,
  - type: text
    content: par les pieds des pauvres,
  - type: text
    content: sous les pas des faibles.
  - type: heading
    content: 'Prière : Nous espérons en toi, Seigneur'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'toi qui es droit…  : autre traduction tu aplanis le droit chemin du juste  ; cf. Pr 5.21.'
  - type: text
    content: Le sentier du juste, c'est la droiture ;
  - type: text
    content: toi qui es droit, tu aplanis la route du juste.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'jugements , ici probablement au sens d''interventions disciplinaires, de même au v. 9. –  nous t''espérons 25.9. –  Evoquer…  : litt. pour ton nom et ton évocation (ou ton souvenir  ; cf. v. 14 ; Ex 3.15n) , désir de l''être  ; voir aussi v. 13s ; sur le terme correspondant à être , voir Gn 1.20n.'
  - type: text
    content: 'Aussi, sur le sentier de tes jugements, '
  - type: text
    content: Seigneur
  - type: text
    content: ', nous t''espérons.'
  - type: text
    content: Evoquer ton nom,
  - type: text
    content: tel est notre plus profond désir.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Oui, je te désire…  : litt. mon être (cf. Gn 1.20n) te désire… mon esprit au dedans de moi te cherche Ps 42.2 ; 63.2 ; 77.3. –  jugements v. 8n. –  s''exercent  : sous-entendu dans le texte. –  justice 51.5.'
  - type: text
    content: Oui, je te désire pendant la nuit,
  - type: text
    content: au plus profond de moi je te cherche,
  - type: text
    content: car, lorsque tes jugements s'exercent sur la terre,
  - type: text
    content: les habitants du monde apprennent la justice.
