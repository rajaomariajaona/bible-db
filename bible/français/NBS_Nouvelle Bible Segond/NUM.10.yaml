    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'départ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'aux v. 2,6, par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ordre de départ '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 28 ; cf. 33.1 ; Ex 17.1. –  '
    - type: usfm
      marker: fq
