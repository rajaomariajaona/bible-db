  - type: text
    text: 'En vos jours de joie, lors de vos rencontres festives et de vos nouvelles lunes, vous sonnerez des trompettes, en offrant vos holocaustes et vos sacrifices de paix ; ce sera une évocation pour vous devant votre Dieu. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: L'ordre des tribus dans les déplacements
