        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nouvelles lunes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '28–29 ; Lv 23 ; cf. Lv 25.9 ; 2S 6.15 ; 1R 1.39 ; 2R 9.13 ; Né 12.35ss ; 1Ch 23.13,30s ; 2Ch 2.3 ; 8.13 ; 31.3. – Voir '
