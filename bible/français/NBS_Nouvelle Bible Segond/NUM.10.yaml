  - type: text
    text: 'Ce sont les fils d''Aaron, les prêtres, qui sonneront des trompettes. C''est une prescription perpétuelle pour vous, pour toutes vos générations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un adversaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'adversaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le verbe traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'attaque '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est apparenté. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous serez évoqués…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous serez rappelés au souvenir du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 35s ; 31.5s ; Jos 6 ; 2Ch 13.12ss ; voir aussi Dt 20 ; 21.10 ; 23.15.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque, dans votre pays, vous irez à la guerre contre un adversaire qui vous attaque, vous sonnerez l''acclamation avec les trompettes, vous serez évoqués devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, et vous serez sauvés de vos ennemis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: En vos jours de joie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au jour de votre joie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Smr a le pluriel ; cf. 2R 11.14 ; Esd 3.10 ; 2Ch 5.12s ; 15.8ss ; 29.26ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rencontres festives '
