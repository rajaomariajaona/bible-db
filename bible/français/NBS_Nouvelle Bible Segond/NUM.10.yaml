document_id: NUM.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les trompettes d'argent
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'En vos jours de joie  : litt. au jour de votre joie  ; Smr a le pluriel ; cf. 2R 11.14 ; Esd 3.10 ; 2Ch 5.12s ; 15.8ss ; 29.26ss. –  rencontres festives / nouvelles lunes 28–29 ; Lv 23 ; cf. Lv 25.9 ; 2S 6.15 ; 1R 1.39 ; 2R 9.13 ; Né 12.35ss ; 1Ch 23.13,30s ; 2Ch 2.3 ; 8.13 ; 31.3. – Voir sacrifices. –  ce sera une évocation…  : autre traduction elles rappelleront votre souvenir à votre Dieu  ; cf. 31.54 ; Ex 28.12,29 ; 30.16. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'En vos jours de joie, lors de vos rencontres festives et de vos nouvelles lunes, vous sonnerez des trompettes, en offrant vos holocaustes et vos sacrifices de paix ; ce sera une évocation pour vous devant votre Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  - type: heading
    content: L'ordre des tribus dans les déplacements
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Smr intercale ici une adaptation de Dt 1.6ss. –  La deuxième année…  : cf. 1.1 ; 9.1 ; 20.1 ; Ex 19.1. –  la nuée 9.15+ss. –  la demeure… 1.50n.'
  - type: text
    content: 'La deuxième année, le vingtième jour du deuxième mois, la nuée s''éleva au-dessus de la demeure du Témoignage. '
  '12':
  - type: note
    content: 'pour leurs étapes  : le même terme est traduit par départ aux v. 2,6, par ordre de départ au v. 28 ; cf. 33.1 ; Ex 17.1. –  s''arrêta 9.17n. –  désert de Parân  : au nord de la péninsule du Sinaï, au sud du territoire de Juda.'
  - type: text
    content: 'Les Israélites partirent, pour leurs étapes, du désert du Sinaï. La nuée s''arrêta dans le désert de Parân. '
  '13':
  - type: note
    content: 'V. 33ss ; 9.18nss. –  Les premiers partirent  : autre traduction c''est la première fois qu''ils partirent.'
  - type: text
    content: 'Les premiers partirent, sur l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné par l''intermédiaire de Moïse. '
  '14':
  - type: note
    content: '1.5ss. –  La bannière 1.52n. –  Son armée  : c.-à-d. l''armée de Juda  ; voir 2.3n.'
  - type: text
    content: 'La bannière du camp des fils de Juda partit la première, armée par armée. Son armée était commandée par Nahshôn, fils d''Amminadab ; '
  '15':
  - type: text
    content: 'l''armée de la tribu des fils d''Issacar, par Netanéel, fils de Tsouar ; '
  '16':
  - type: text
    content: l'armée de la tribu des fils de Zabulon, par Eliab, fils de Hélôn.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'La Demeure fut démontée  : cf. v. 21 ; 2.17. –  fils de Guershôn 3.17ss ; 4.4ss ; 7.4ss.'
  - type: text
    content: 'La Demeure fut démontée ; les fils de Guershôn et les fils de Merari partirent, portant la Demeure. '
  '18':
  - type: note
    content: 'de Ruben  : Smr des fils de Ruben.'
  - type: text
    content: 'La bannière du camp de Ruben partit, armée par armée. Son armée était commandée par Elitsour, fils de Shedéour ; '
  '19':
  - type: text
    content: 'l''armée de la tribu des fils de Siméon, par Sheloumiel, fils de Tsourishaddaï ; '
  '2':
  - type: note
    content: 'trompettes  : cf. 31.6 ; Ps 98.6 ; Esd 3.10 ; 1Ch 13.8 ; 15.24,28 ; 2Ch 5.12s ; 13.12,14 ; 15.14 ; 20.28 ; 29.26ss ; voir aussi 2R 11.14 ; 12.14 ; Os 5.8 ; Mt 24.31 ; 1Co 15.52 ; 1Th 4.16 ; Ap 8.6ss ; 9.1,13 ; 10.7 ; 11.15 ; le Règlement de la guerre retrouvé à Qumrân comprend des instructions détaillées sur l''emploi de douze trompettes dans le combat final contre les ennemis de Dieu. –  métal martelé  : cf. 8.4n.'
  - type: text
    content: 'Fais-toi deux trompettes d''argent ; tu les feras de métal martelé. Elles te serviront pour la convocation de la communauté et pour le départ des camps. '
  '20':
  - type: text
    content: l'armée de la tribu des fils de Gad, par Eliasaph, fils de Déouel.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'sanctuaire  : il s''agit normalement du Coffre (voir cependant v. 33) et du reste du mobilier sacré, cf. v. 17 ; 3.27-31 ; 4.4ss ; voir aussi Jos 6.13 ; Jg 18.20 ; 1S 6.10s ; 2S 6.3ss,12ss ; 1R 8.3ss ; 1Ch 13.1ss ; 15.1ss ; 2Ch 5.4ss.'
  - type: text
    content: 'Les Qehatites partirent, portant le sanctuaire – on montait la Demeure en attendant leur arrivée. '
  '22':
  - type: text
    content: 'La bannière du camp des fils d''Ephraïm partit, armée par armée. Son armée était commandée par Elishama, fils d''Ammihoud ; '
  '23':
  - type: text
    content: 'l''armée de la tribu des fils de Manassé, par Gamliel, fils de Pedahtsour ; '
  '24':
  - type: text
    content: l'armée de la tribu des fils de Benjamin, par Abidân, fils de Guidéoni.
  '25':
  - type: text
    content: ' '
  - type: note
    content: l'arrière-garde 2.31 ; cf. Jos 6.9,13 ; Es 52.12 ; voir aussi Gn 49.17.
  - type: text
    content: 'La bannière du camp des fils de Dan partit, armée par armée : elle formait l''arrière-garde de tous les camps. Son armée était commandée par Ahiézer, fils d''Ammishaddaï ; '
  '26':
  - type: text
    content: 'l''armée de la tribu des fils d''Aser, par Paguiel, fils d''Okrân ; '
  '27':
  - type: text
    content: 'l''armée de la tribu des fils de Nephtali, par Ahira, fils d''Eïnân. '
  '28':
  - type: note
    content: l'ordre de départ v. 12n.
  - type: text
    content: Tel fut l'ordre de départ des Israélites, armée par armée ; c'est ainsi qu'ils partirent.
  - type: heading
    content: Moïse cherche un guide pour le voyage
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Hobab… le Madianite ou, selon d''autres textes, le Caïnite (ou le Qénite , de Caïn ou Qayîn, nom d''un clan qui a pu être rattaché aux Madianites) ; cf. 24.21ns ; 25.17s ; 31 ; Gn 37.28,36 ; Jg 1.16 ; 4.11 ; 1S 15.6 ; 27.10 ; 30.29 ; 1Ch 2.55 ; voir Ex 3.1 ; 4.18 ; 18.1ss. –  Réouel Ex 2.16ss. –  beau-père  : le terme hébreu s''applique parfois plus largement à des parents par alliance, par exemple aux beaux-frères. –  dont le Seigneur a dit…  : cf. Gn 12.7 ; 13.15 ; 26.3s. –  a parlé pour le bien  : cf. Est 7.9.'
  - type: text
    content: 'Moïse dit à Hobab, fils de Réouel, le Madianite, beau-père de Moïse : Nous partons pour le lieu dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit : « Je vous le donnerai. » Viens avec nous, et nous te ferons du bien, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a parlé pour le bien d''Israël. '
  '3':
  - type: note
    content: 'on en sonnera  : LXX tu en sonneras. – Les mots hébreux correspondants à communauté, se réunira et Rencontre (1.1+) sont apparentés.'
  - type: text
    content: 'Quand on en sonnera, toute la communauté se réunira auprès de toi, à l''entrée de la tente de la Rencontre. '
  '30':
  - type: note
    content: origines Gn 11.28n  ; voir aussi Lc 9.61 ; 14.15ss ; 18.18ss.
  - type: text
    content: 'Il lui répondit : Je n''irai pas ; j''irai dans mon pays, au lieu de mes origines. '
  '31':
  - type: note
    content: 'où nous pouvons camper  : autre traduction où nous campons  ; LXX tu étais avec nous dans le désert. –  tu seras…  : litt. tu seras pour nous des yeux  ; cf. 9.15ss ; Targum (Tg) Neofiti : tu connais les prodiges que Yahvé a accomplis pour nous dans tous les endroits où, dans le désert, nous avons campé et voyagé.'
  - type: text
    content: 'Il insista : Ne nous abandonne pas, je te prie ; puisque tu connais les lieux où nous pouvons camper dans le désert, tu seras notre guide. '
  '32':
  - type: note
    content: 'du bien que le Seigneur …  : cf. Gn 12.2s ; 14.18ss ; Ex 18.9ss.'
  - type: text
    content: 'Si tu viens avec nous, nous te ferons profiter du bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous fera.'
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'la montagne du Seigneur  : cf. Ex 3.1+. –  trois jours  : Syr un jour  ; cf. Gn 22.4 ; 30.36 ; Ex 3.18 ; 5.3 ; 8.23 ; 15.22. – Voir alliance. –  pour leur chercher  : le verbe est souvent traduit par explorer , cf. 13.2 etc.'
  - type: text
    content: 'Ils partirent de la montagne du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et firent trois jours de route ; le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' partit devant eux et fit trois jours de route pour leur chercher un lieu de repos. '
  '34':
  - type: note
    content: 'LXX place ce v. à la fin du chap. –  La nuée (9.15+) du Seigneur Ex 40.38. –  était au-dessus d''eux  : LXX les recouvrait de son ombre, cf. 9.17s ; 14.9 ; Lc 1.35 ; 1Co 10.1.'
  - type: text
    content: 'La nuée du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était au-dessus d''eux pendant le jour, lorsqu''ils partaient du camp.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.22ss. Dans le texte hébreu traditionnel, les v. 35 et 36 sont encadrés d''un signe critique dont le sens est aujourd''hui incertain (peut-être indiquait-il un déplacement, cf. v. 34n  ?) et qu''on ne retrouve qu''en Ps 107.21-26,40, ainsi que dans un ms de Job découvert à Qumrân. –  Quand le Coffre partait  : cf. 14.44s ; Jos 3.6 ; Jg 4.14 ; 1S 4.3ss ; 2S 5.24. –  Lève-toi Ps 3.8+ ; 68.2 ; cf. Es 33.3. –  devant toi  : litt. devant ta face.'
  - type: text
    content: 'Quand le Coffre partait, Moïse disait :'
  - type: text
    content: 'Lève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Que tes ennemis se dispersent !
  - type: text
    content: Que ceux qui te détestent fuient devant toi !
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'il s''arrêtait  : la racine hébraïque correspondante peut évoquer l''idée de repos . – La traduction s''inspire de versions anciennes ; le texte hébreu, obscur, porte simplement reviens, Seigneur, dizaines de milliers de milliers…  ; d''autres le modifient pour lire reviens (ou assieds-toi [comme un roi, ou comme un juge]) … et multiplie les phratries (ou les milliers ) … ou encore bénis les phratries (ou les milliers ) …  ; cf. 1.16n  ; Dt 33.17 ; Mi 5.1n.'
  - type: text
    content: 'Et quand il s''arrêtait, il disait :'
  - type: text
    content: 'Reviens, '
  - type: text
    content: Seigneur
  - type: text
    content: ', vers les dizaines de milliers des phratries d''Israël !'
  '4':
  - type: note
    content: 'd''une seule trompette  : autre traduction une seule fois. –  les princes, les chefs  : versions anciennes les princes et les chefs  ; sur les chefs des phratries, voir 1.16n.'
  - type: text
    content: 'Si on sonne d''une seule trompette, les princes, les chefs des phratries d''Israël, se réuniront auprès de toi. '
  '5':
  - type: note
    content: 'l''acclamation ou la clameur  : hébreu teroua‘, terme fréquent dans des passages liturgiques (23.21 ; 29.1 ; 31.6 ; Lv 23.24n  ; 25.9n  ; Ps 27.6+ ; 150.5+), qui évoque aussi dans d''autres contextes un cri de guerre (v. 9 ; Jos 6.5ss ; 1S 4.5s ; 17.20 ; 2S 6.15 ; Jr 4.19 ; Am 1.14 ; 2.2 ; So 1.14-16 ; Jb 39.25) ou, parfois, l''acclamation d''un souverain (Nb 23.21 ; 1R 1.34,39). Certains pensent qu''il s''agit ici d''un jeu de trompette spécial, par exemple d''une sorte de trille. –  ceux qui campent…  : cf. 2.3ss ; 3.23ss.'
  - type: text
    content: 'Quand vous sonnerez l''acclamation, ceux qui campent à l''est partiront ; '
  '6':
  - type: note
    content: 'au sud  : Smr au nord  ; LXX répète les indications pour l''ouest, puis pour le nord.'
  - type: text
    content: 'quand vous sonnerez l''acclamation pour la deuxième fois, ceux qui campent au sud partiront ; on sonnera l''acclamation pour leur départ. '
  '7':
  - type: note
    content: 'réunir l''assemblée  : litt. rassembler l''assemblée  ; cf. 1.18 ; 8.9 etc. ; 20.10.'
  - type: text
    content: 'Vous sonnerez aussi pour réunir l''assemblée, mais vous ne sonnerez pas l''acclamation. '
  '8':
  - type: note
    content: Cf. Jos 6.4 ; 1Ch 15.24 ; 2Ch 13.12,14. – Voir fils et prêtres. –  prescription perpétuelle Lv 10.9 ; voir loi. – Voir générations.
  - type: text
    content: 'Ce sont les fils d''Aaron, les prêtres, qui sonneront des trompettes. C''est une prescription perpétuelle pour vous, pour toutes vos générations. '
  '9':
  - type: note
    content: 'un adversaire  : litt. l''adversaire  ; le verbe traduit par attaque est apparenté. –  vous serez évoqués…  : autre traduction vous serez rappelés au souvenir du Seigneur  ; cf. v. 35s ; 31.5s ; Jos 6 ; 2Ch 13.12ss ; voir aussi Dt 20 ; 21.10 ; 23.15.'
  - type: text
    content: 'Lorsque, dans votre pays, vous irez à la guerre contre un adversaire qui vous attaque, vous sonnerez l''acclamation avec les trompettes, vous serez évoqués devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et vous serez sauvés de vos ennemis. '
