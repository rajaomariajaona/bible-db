    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rencontre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1.1+) sont apparentés.
    marker-yv: yv-n
  - type: text
    text: 'Quand on en sonnera, toute la communauté se réunira auprès de toi, à l''entrée de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'une seule trompette
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une seule fois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les princes, les chefs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : versions anciennes '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les princes et les chefs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; sur les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chefs des phratries
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir 1.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si on sonne d''une seule trompette, les princes, les chefs des phratries d''Israël, se réuniront auprès de toi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''acclamation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la clameur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: teroua‘
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', terme fréquent dans des passages liturgiques (23.21 ; 29.1 ; 31.6 ; Lv 23.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 25.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ps 27.6+ ; 150.5+), qui évoque aussi dans d''autres contextes un cri de guerre (v. 9 ; Jos 6.5ss ; 1S 4.5s ; 17.20 ; 2S 6.15 ; Jr 4.19 ; Am 1.14 ; 2.2 ; So 1.14-16 ; Jb 39.25) ou, parfois, l''acclamation d''un souverain (Nb 23.21 ; 1R 1.34,39). Certains pensent qu''il s''agit ici d''un jeu de trompette spécial, par exemple d''une sorte de trille. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ceux qui campent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.3ss ; 3.23ss.'
    marker-yv: yv-n
  - type: text
    text: 'Quand vous sonnerez l''acclamation, ceux qui campent à l''est partiront ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au sud
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Smr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: au nord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX répète les indications pour l''ouest, puis pour le nord.'
    marker-yv: yv-n
  - type: text
    text: 'quand vous sonnerez l''acclamation pour la deuxième fois, ceux qui campent au sud partiront ; on sonnera l''acclamation pour leur départ. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: réunir l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: rassembler l'assemblée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1.18 ; 8.9 etc. ; 20.10.'
    marker-yv: yv-n
  - type: text
    text: 'Vous sonnerez aussi pour réunir l''assemblée, mais vous ne sonnerez pas l''acclamation. '
