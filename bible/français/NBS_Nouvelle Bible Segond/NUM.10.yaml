  - type: text
    text: 'La bannière du camp des fils de Juda partit la première, armée par armée. Son armée était commandée par Nahshôn, fils d''Amminadab ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'l''armée de la tribu des fils d''Issacar, par Netanéel, fils de Tsouar ; '
