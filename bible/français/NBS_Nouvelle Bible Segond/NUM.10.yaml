      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Fais-toi deux trompettes d''argent ; tu les feras de métal martelé. Elles te serviront pour la convocation de la communauté et pour le départ des camps. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on en sonnera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu en sonneras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – Les mots hébreux correspondants à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: communauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
