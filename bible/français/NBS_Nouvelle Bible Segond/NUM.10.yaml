    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 31.6 ; Ps 98.6 ; Esd 3.10 ; 1Ch 13.8 ; 15.24,28 ; 2Ch 5.12s ; 13.12,14 ; 15.14 ; 20.28 ; 29.26ss ; voir aussi 2R 11.14 ; 12.14 ; Os 5.8 ; Mt 24.31 ; 1Co 15.52 ; 1Th 4.16 ; Ap 8.6ss ; 9.1,13 ; 10.7 ; 11.15 ; le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Règlement de la guerre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'retrouvé à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ' comprend des instructions détaillées sur l''emploi de douze trompettes dans le combat final contre les ennemis de Dieu. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
