document_id: 1CO.12,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les manifestations de l'Esprit saint
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les pratiques spirituelles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les expériences spirituelles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les spirituels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les choses spirituelles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; en grec, l''expression est la même que celle qui a été traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le spirituel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'biens spirituels '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 9.11 ; le même terme, au singulier, est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le spirituel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 15.46 ; voir aussi 14.1,12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 1.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je ne veux pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 1.13+.
      marker-yv: yv-n
    - type: text
      text: 'Pour ce qui concerne les pratiques spirituelles, je ne veux pas, mes frères, que vous soyez dans l''ignorance. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la capacité d'opérer des miracles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des opérations '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (voir v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d’(actes de) puissances
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Mc 6.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2Co 12.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'celle de parler en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la prophétie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 11.4 ; 14.1ss ; Rm 12.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: discernement des esprits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 14.29 ; 1Th 5.21 ; 1Jn 4.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à un autre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: diverses langues
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des genres de langues '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 28 ; 14.2ss,26 ; cf. Mc 16.17 ; Ac 2.4ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'interprétation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.5+.
      marker-yv: yv-n
    - type: text
      text: 'à un autre, la capacité d''opérer des miracles ; à un autre, celle de parler en prophète ; à un autre, le discernement des esprits ; à un autre, diverses langues ; à un autre, l''interprétation des langues. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 4-6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 7.7 ; Rm 12.3+.'
      marker-yv: yv-n
    - type: text
      text: Mais c'est un seul et même Esprit qui opère toutes ces choses, distribuant à chacun en particulier comme il le décide.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un seul corps formé de nombreuses parties
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 12.4s+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.16s ; 11.29.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, comme le corps est un, tout en ayant une multitude de parties, et comme toutes les parties du corps, en dépit de leur multitude, ne sont qu''un seul corps, ainsi en est-il du Christ. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ga 3.27s+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Grecs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 1.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',16+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: baptême
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour appartenir à un seul corps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'un seul corps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour un seul corps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans un seul corps '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (formule analogue à celle de 10.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir Rm 6.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: abreuvés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.4.'
      marker-yv: yv-n
    - type: text
      text: Car c'est dans un seul Esprit que nous tous – soit Juifs, soit Grecs, soit esclaves, soit hommes libres – nous avons reçu le baptême pour appartenir à un seul corps ; et nous avons tous été abreuvés d'un seul Esprit.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 20.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi le corps n''est pas une seule partie, mais une multitude. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'en ferait pas moins…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'en serait-il moins… ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Même possibilité au v. 16.
      marker-yv: yv-n
    - type: text
      text: 'Si le pied disait : « Parce que je ne suis pas une main, je ne fais pas partie du corps », il n''en ferait pas moins partie du corps. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Et si l''oreille disait : « Parce que je ne suis pas un œil, je ne fais pas partie du corps », elle n''en ferait pas moins partie du corps. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Si tout le corps était œil, où serait l''ouïe ? S''il était tout ouïe, où serait l''odorat ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 15.38 ; Gn 2.7 ; Ap 4.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: En fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant.
      marker-yv: yv-n
    - type: text
      text: 'En fait, Dieu a placé chacune des parties dans le corps comme il l''a voulu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Si tous étaient une seule partie, où serait le corps ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous savez comment…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte fait peut-être allusion aux manifestations extatiques associées aux cultes païens. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'quand vous étiez des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: non-Juifs
        - type: text
          text: ' comme les autres'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quand vous étiez des païens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des gens des nations
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'entraînés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dévoyés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent deux verbes grecs apparentés. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les idoles muettes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.19s ; Ga 4.8 ; 1Th 1.9 ; voir aussi Ha 2.18s ; Ps 115.5 ; Ac 17.29 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '3 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.16 parle de « dieux muets et inutiles ».
      marker-yv: yv-n
    - type: text
      text: 'Vous savez comment, quand vous étiez des non-Juifs comme les autres, vous étiez entraînés et dévoyés vers les idoles muettes. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 14.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant donc il y a une multitude de parties et un seul corps. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: 'L''œil ne peut pas dire à la main : « Je n''ai pas besoin de toi », ni la tête dire aux pieds : « Je n''ai pas besoin de vous. » '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les plus faibles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.7-13.'
      marker-yv: yv-n
    - type: text
      text: 'Bien au contraire, les parties du corps qui paraissent les plus faibles sont nécessaires ; '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'décentes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: décence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 7.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 13.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et celles que nous estimons être les moins honorables du corps, nous les entourons d''un plus grand honneur. Ainsi ce sont nos parties les moins décentes qui sont traitées avec le plus de décence, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'tandis que celles qui sont décentes n''en ont pas besoin. En fait, Dieu a disposé le corps de manière à donner plus d''honneur à ce qui en manquait, '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rm 12.15.'
      marker-yv: yv-n
    - type: text
      text: 'pour qu''il n''y ait pas de division dans le corps, mais que toutes les parties du corps s''inquiètent de la même façon les unes des autres. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souffre '
      - type: usfm
