document_id: 1CO.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les manifestations de l'Esprit saint
  - type: text
    content: ' '
  - type: note
    content: les pratiques spirituelles ou les expériences spirituelles , litt. les spirituels ou les choses spirituelles  ; en grec, l'expression est la même que celle qui a été traduite par le spirituel en 2.13n  ; biens spirituels en 9.11 ; le même terme, au singulier, est rendu par le spirituel en 15.46 ; voir aussi 14.1,12n,37n  ; Rm 1.11n. –  je ne veux pas… Rm 1.13+.
  - type: text
    content: 'Pour ce qui concerne les pratiques spirituelles, je ne veux pas, mes frères, que vous soyez dans l''ignorance. '
  '10':
  - type: note
    content: 'la capacité d''opérer des miracles  : litt. des opérations (voir v. 6n) d’(actes de) puissances  ; cf. Mc 6.2n  ; 2Co 12.12n. –  celle de parler en prophète  : litt. la prophétie, cf. 11.4 ; 14.1ss ; Rm 12.6. –  discernement des esprits  : cf. 11.31n  ; 14.29 ; 1Th 5.21 ; 1Jn 4.1-3. –  à un autre v. 9n. –  diverses langues  : autre traduction des genres de langues v. 28 ; 14.2ss,26 ; cf. Mc 16.17 ; Ac 2.4ss. –  interprétation 14.5+.'
  - type: text
    content: 'à un autre, la capacité d''opérer des miracles ; à un autre, celle de parler en prophète ; à un autre, le discernement des esprits ; à un autre, diverses langues ; à un autre, l''interprétation des langues. '
  '11':
  - type: note
    content: V. 4-6n  ; cf. 7.7 ; Rm 12.3+.
  - type: text
    content: Mais c'est un seul et même Esprit qui opère toutes ces choses, distribuant à chacun en particulier comme il le décide.
  - type: heading
    content: Un seul corps formé de nombreuses parties
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 12.4s+. –  du Christ  : cf. 10.16s ; 11.29.'
  - type: text
    content: 'En effet, comme le corps est un, tout en ayant une multitude de parties, et comme toutes les parties du corps, en dépit de leur multitude, ne sont qu''un seul corps, ainsi en est-il du Christ. '
  '13':
  - type: note
    content: 'Ga 3.27s+. – Voir Esprit. –  Juifs / Grecs Rm 1.14n,16+. – Voir baptême. –  pour appartenir à un seul corps  : autre traduction d''un seul corps  ; litt. pour un seul corps ou dans un seul corps (formule analogue à celle de 10.2n  ; voir Rm 6.3n). –  abreuvés  : cf. 10.4.'
  - type: text
    content: Car c'est dans un seul Esprit que nous tous – soit Juifs, soit Grecs, soit esclaves, soit hommes libres – nous avons reçu le baptême pour appartenir à un seul corps ; et nous avons tous été abreuvés d'un seul Esprit.
  '14':
  - type: text
    content: ' '
  - type: note
    content: V. 20.
  - type: text
    content: 'Ainsi le corps n''est pas une seule partie, mais une multitude. '
  '15':
  - type: note
    content: 'il n''en ferait pas moins…  : autre traduction en serait-il moins… ? Même possibilité au v. 16.'
  - type: text
    content: 'Si le pied disait : « Parce que je ne suis pas une main, je ne fais pas partie du corps », il n''en ferait pas moins partie du corps. '
  '16':
  - type: text
    content: 'Et si l''oreille disait : « Parce que je ne suis pas un œil, je ne fais pas partie du corps », elle n''en ferait pas moins partie du corps. '
  '17':
  - type: text
    content: 'Si tout le corps était œil, où serait l''ouïe ? S''il était tout ouïe, où serait l''odorat ? '
  '18':
  - type: note
    content: 'Cf. v. 28n  ; 15.38 ; Gn 2.7 ; Ap 4.11. –  En fait  : litt. maintenant.'
  - type: text
    content: 'En fait, Dieu a placé chacune des parties dans le corps comme il l''a voulu. '
  '19':
  - type: text
    content: 'Si tous étaient une seule partie, où serait le corps ? '
  '2':
  - type: note
    content: 'Vous savez comment…  : le texte fait peut-être allusion aux manifestations extatiques associées aux cultes païens. –  quand vous étiez des non-Juifs comme les autres  : litt. quand vous étiez des païens ou des gens des nations, voir 5.1n. –  entraînés et dévoyés traduisent deux verbes grecs apparentés. –  les idoles muettes  : cf. 10.19s ; Ga 4.8 ; 1Th 1.9 ; voir aussi Ha 2.18s ; Ps 115.5 ; Ac 17.29 ; 3 Maccabées 4.16 parle de « dieux muets et inutiles ».'
  - type: text
    content: 'Vous savez comment, quand vous étiez des non-Juifs comme les autres, vous étiez entraînés et dévoyés vers les idoles muettes. '
  '20':
  - type: note
    content: V. 14.
  - type: text
    content: 'Maintenant donc il y a une multitude de parties et un seul corps. '
  '21':
  - type: text
    content: 'L''œil ne peut pas dire à la main : « Je n''ai pas besoin de toi », ni la tête dire aux pieds : « Je n''ai pas besoin de vous. » '
  '22':
  - type: note
    content: 'les plus faibles  : cf. 8.7-13.'
  - type: text
    content: 'Bien au contraire, les parties du corps qui paraissent les plus faibles sont nécessaires ; '
  '23':
  - type: note
    content: 'décentes / décence  : cf. 7.35n  ; 13.5n.'
  - type: text
    content: 'et celles que nous estimons être les moins honorables du corps, nous les entourons d''un plus grand honneur. Ainsi ce sont nos parties les moins décentes qui sont traitées avec le plus de décence, '
  '24':
  - type: text
    content: 'tandis que celles qui sont décentes n''en ont pas besoin. En fait, Dieu a disposé le corps de manière à donner plus d''honneur à ce qui en manquait, '
  '25':
  - type: note
    content: 1.10n  ; Rm 12.15.
  - type: text
    content: 'pour qu''il n''y ait pas de division dans le corps, mais que toutes les parties du corps s''inquiètent de la même façon les unes des autres. '
  '26':
  - type: note
    content: 'souffre / est glorifiée  : cf. Lc 24.26 ; Rm 8.17.'
  - type: text
    content: Et si une partie du corps souffre, toutes les autres souffrent avec elle ; si une partie du corps est glorifiée, toutes les autres se réjouissent avec elle.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'le corps du Christ  : autre traduction un corps qui appartient au Christ  ; cf. v. 12+. –  chacun pour sa part  : cf. 13.9n-12.'
  - type: text
    content: 'Vous êtes le corps du Christ, vous en faites partie, chacun pour sa part. '
  '28':
  - type: note
    content: 'V. 5. –  a placé v. 18. –  apôtres (1.1n) / prophètes / maîtres (ou enseignants, traduction traditionnelle docteurs) : cf. Ep 2.20 ; 3.5 ; 4.11s ; voir aussi Ac 13.1n  ; 2Tm 1.11. –  miracles… v. 9s.'
  - type: text
    content: 'Or Dieu a placé dans l''Eglise premièrement des apôtres, deuxièmement des prophètes, troisièmement des maîtres ; ensuite il y a des miracles, ensuite des dons de guérison, des aptitudes à secourir, à gouverner, diverses langues. '
  '29':
  - type: text
    content: 'Tous sont-ils apôtres ? Tous sont-ils prophètes ? Tous sont-ils maîtres ? Tous font-ils des miracles ? '
  '3':
  - type: note
    content: 'Cf. Rm 8.9 ; 1Jn 4.2s. –  certifie  : le même verbe est traduit par confirmer en 15.1 ; il signifie habituellement faire connaître (Rm 9.22s) ; cf. 2Co 8.1 ; Ga 1.11 ; Ep 1.9n  ; Ph 1.22n  ; 2P 1.16. –  Anathème à Jésus  : autres traductions Jésus soit anathème, Jésus est anathème (c.-à-d. maudit) 16.22 ; voir Mc 9.39 ; Rm 9.3n  ; voir aussi bénédiction, malédiction. –  dire… par l''Esprit saint Mc 12.36 ; Ac 1.2 ; 4.25 ; 2P 1.21. –  Jésus est le Seigneur  : cf. Mt 7.21+ ; Jn 13.13 ; Ac 2.36 ; Rm 10.9+ ; Ph 2.11 ; 1Jn 5.1.'
  - type: text
    content: 'C''est pourquoi je vous certifie que personne, en parlant par l''Esprit de Dieu, ne dit : « Anathème à Jésus ! », et que personne ne peut dire : « Jésus est le Seigneur ! », sinon par l''Esprit saint.'
  '30':
  - type: text
    content: 'Tous ont-ils des dons de guérison ? Tous parlent-ils en langues ? Tous interprètent-ils ? '
  '31':
  - type: note
    content: 'Passionnez-vous pour les  : autre traduction aspirez aux  ; le verbe grec est apparenté au mot traduit habituellement par passion jalouse ou jalousie et qui a donné le mot zèle  ; cf. 14.1,12,39. –  dons de la grâce v. 4n. –  la voie qui surpasse tout ou une voie infiniment supérieure.'
  - type: text
    content: Passionnez-vous pour les meilleurs dons de la grâce.
  - type: text
    content: Et je vais vous montrer la voie qui surpasse tout.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'dons de la grâce  : le terme grec correspondant a donné notre mot charisme  ; il est apparenté au mot kharis , qui signifie grâce  ; il sera traduit simplement par dons v. 9,28,30 ; cf. v. 31 ; 1.7n  ; Rm 12.6 ; Hé 2.4. –  le même Esprit v. 11 ; Ep 4.4.'
  - type: text
    content: 'Or il y a diversité de dons de la grâce, mais c''est le même Esprit ; '
  '5':
  - type: note
    content: services ou ministères (cf. v. 28-30) ; le mot grec a donné diaconat  ; cf. 3.5 ; Mt 20.26n  ; Ac 6.1n  ; Rm 12.7n  ; 1P 4.11s. –  le même Seigneur 8.6.
  - type: text
    content: 'diversité de services, mais c''est le même Seigneur ; '
  '6':
  - type: note
    content: 'opérations ou activités, modes d''action  : le terme grec a donné notre mot énergie. C''est un verbe apparenté qui est rendu par opère (on pourrait aussi traduire met en œuvre) ; cf. Mc 6.14n/ / ; 2Co 1.6n  ; 4.12 ; Ga 2.8 ; 3.5 ; 5.6.'
  - type: text
    content: 'diversité d''opérations, mais c''est le même Dieu qui opère tout en tous. '
  '7':
  - type: note
    content: 'Cf. v. 11 ; Ep 1.11 ; Ph 2.13. –  l''utilité commune (litt. pour ce qui est utile) : cf. 6.12+ ; 14.26 ; Ep 4.12.'
  - type: text
    content: 'Or à chacun la manifestation de l''Esprit est donnée pour l''utilité commune. '
  '8':
  - type: note
    content: 'parole de sagesse  : cf. 2.6-16. –  parole de connaissance 13.2 ; 14.6.'
  - type: text
    content: 'En effet, à l''un est donnée par l''Esprit une parole de sagesse ; à un autre, une parole de connaissance, selon le même Esprit ; '
  '9':
  - type: note
    content: 'à un autre  : le mot grec (hétéros) qui introduit le v. n''est pas le même que celui (allos) qui est traduit ainsi dans le reste du passage ; il réapparaît au milieu du v. 10 pour introduire le don des langues  : certains pensent qu''il sert à distinguer différentes catégories de dons. –  de la foi  : il faut peut-être entendre ici une foi exceptionnelle, cf. 13.2 ; Rm 1.16s. –  guérison v. 28,30. –  l''unique ou le seul  ; certains mss portent le même, comme au début du v. ; cf. v. 11.'
  - type: text
    content: 'à un autre, de la foi, par le même Esprit ; à un autre, des dons de guérison, par l''unique Esprit ; '
