      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.13s ; 1Th 2.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'affermira '
      - type: usfm
