        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.16s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Seigneur de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.1+ ; Jn 14.27+ ; Rm 15.33+ ; Col 3.15 ; 1Th 5.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de toute manière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : quelques mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en tout lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1Co 1.2 ; 2Co 2.14 ; 1Th 1.8.
      marker-yv: yv-n
    - type: text
      text: Que le Seigneur de la paix vous donne lui-même la paix en tout temps, de toute manière ! Que le Seigneur soit avec vous tous !
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2.2 ; 1Co 16.21+ ; 1Th 5.27.
      marker-yv: yv-n
    - type: text
      text: La salutation est de ma main, à moi, Paul. C'est ma signature dans toutes mes lettres ; voilà mon écriture.
  '18':
  - type: usfm
    marker: p
