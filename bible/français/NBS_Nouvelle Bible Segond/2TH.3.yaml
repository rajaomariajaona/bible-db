        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Seconde aux Thessaloniciens [écrite d'Athènes / de Rome / de Laodicée de Pisidie] [par Paul, Silvain et Timothée].
      marker-yv: yv-n
    - type: text
      text: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous !
  '2':
