      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du Mauvais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 2 ; Mt 6.13 ; 13.19 ; Jn 17.15 ; Ep 6.16 ; 1Jn 2.13s ; voir aussi Rm 12.9 ; 1Th 5.22.'
      marker-yv: yv-n
    - type: text
      text: 'Mais le Seigneur est digne de confiance : il vous affermira et vous gardera du Mauvais. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
