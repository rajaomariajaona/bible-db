document_id: 2TH.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur est digne de confiance
  - type: text
    content: ' '
  - type: note
    content: 'Au reste… 1Th 4.1+. –  priez pour nous Rm 15.30+ ; Ep 6.19 ; Col 4.3 ; 1Th 5.25. –  la parole du Seigneur 1Th 1.8 ; 4.15. –  poursuive sa course  : litt. coure , cf. Ps 147.15 ; voir aussi 1Co 9.24,27 ; Ga 2.2 ; 5.7 ; Ph 2.16. –  soit glorifiée Ac 13.48. –  comme elle l''est ou comme elle l''a été  ; le verbe est sous-entendu dans le texte grec.'
  - type: text
    content: 'Au reste, frères, priez pour nous, afin que la parole du Seigneur poursuive sa course et soit glorifiée comme elle l''est chez vous, '
  '10':
  - type: note
    content: 'chez vous 1Th 3.4+. –  donnions cette injonction ou vous enjoignions, v. 4+. –  si quelqu''un…  : cf. Pr 10.4.'
  - type: text
    content: 'En effet, lorsque nous étions chez vous, nous vous donnions cette injonction : si quelqu''un ne veut pas travailler, qu''il ne mange pas non plus !'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'nous apprenons…  : cf. 1Co 1.11. –  indiscipline v. 6+s. –  au lieu d''agir ils s''agitent  : le texte grec comporte un jeu d''assonance comparable ; autre traduction au lieu de faire (litt. d''œuvrer, de travailler , même verbe v. 8,10) ils s''affairent  ; le second verbe signifie peut-être plus précisément ils font les officieux , ou ils se mêlent de ce qui ne les regarde pas , cf. 1Th 4.11s ; voir aussi 1Tm 5.13n.'
  - type: text
    content: 'Or nous apprenons que certains d''entre vous vivent dans l''indiscipline et qu''au lieu d''agir ils s''agitent. '
  '12':
  - type: note
    content: 'Nous enjoignons v. 4+. –  dans (ou par) le Seigneur Jésus-Christ  : cf. v. 6. –  nous les y encourageons ou exhortons, ou encore nous les en supplions. –  travailler paisiblement 1Th 4.11s. –  leur propre pain  : cf. v. 8 ; Gn 3.19.'
  - type: text
    content: 'Nous enjoignons à de telles gens – nous les y encourageons dans le Seigneur Jésus-Christ – de travailler paisiblement et de manger leur propre pain. '
  '13':
  - type: note
    content: Cf. Ga 6.9+.
  - type: text
    content: Quant à vous, frères, ne vous lassez pas de faire le bien.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'V. 6+. –  repérez-le bien  : autre traduction notez-le bien  ; le verbe correspondant (apparenté au mot souvent traduit par signe ) n''apparaît qu''ici dans le N.T. –  aucune relation 1Co 5.9-11.'
  - type: text
    content: 'Si quelqu''un n''obéit pas à ce que nous disons dans cette lettre, repérez-le bien et n''ayez avec lui aucune relation, pour qu''il ait honte. '
  '15':
  - type: note
    content: avertissez-le ou continuez de l'avertir  ; cf. 1Th 5.14 ; voir aussi Mt 18.15-18.
  - type: text
    content: Ne le considérez cependant pas comme un ennemi, mais avertissez-le comme un frère.
  - type: heading
    content: Bénédiction et salutations
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.16s. –  le Seigneur de la paix  : cf. 1.1+ ; Jn 14.27+ ; Rm 15.33+ ; Col 3.15 ; 1Th 5.23. –  de toute manière  : quelques mss portent en tout lieu  ; cf. 1Co 1.2 ; 2Co 2.14 ; 1Th 1.8.'
  - type: text
    content: Que le Seigneur de la paix vous donne lui-même la paix en tout temps, de toute manière ! Que le Seigneur soit avec vous tous !
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.2 ; 1Co 16.21+ ; 1Th 5.27.
  - type: text
    content: La salutation est de ma main, à moi, Paul. C'est ma signature dans toutes mes lettres ; voilà mon écriture.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 16.20,24 ; 1Co 16.23 ; 1Th 5.28 ; Ap 22.21. – A la fin du v. certains mss ajoutent Amen ! Quelques-uns portent, avec diverses variantes, l''indication suivante  : Seconde aux Thessaloniciens [écrite d''Athènes / de Rome / de Laodicée de Pisidie] [par Paul, Silvain et Timothée].'
  - type: text
    content: Que la grâce de notre Seigneur Jésus-Christ soit avec vous tous !
  '2':
  - type: note
    content: 'délivrés… Rm 15.31 ; 2Co 1.8ss ; cf. 1Th 1.10. –  méchants  : le même terme est traduit par mal en Lc 23.41n  ; Ac 25.5 ; 28.6 ; voir aussi justice. –  la foi  : le terme a aussi le sens de fidélité  ; cf. v. 3n.'
  - type: text
    content: et que nous soyons délivrés des gens méchants et mauvais ; car tous n'ont pas la foi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur (cf. 1.7s) est digne de confiance ou fidèle , v. 2n  ; cf. 1Co 1.9 ; 10.13 ; 2Co 1.18 ; 1Th 5.24 ; voir aussi Rm 3.3n. –  vous  : cf. 2.13s ; 1Th 2.14. –  affermira 2.17. –  gardera  : cf. Ps 12.8 ; 16.1 ; 41.3 ; 121.7. –  du Mauvais ou du mal , cf. v. 2 ; Mt 6.13 ; 13.19 ; Jn 17.15 ; Ep 6.16 ; 1Jn 2.13s ; voir aussi Rm 12.9 ; 1Th 5.22.'
  - type: text
    content: 'Mais le Seigneur est digne de confiance : il vous affermira et vous gardera du Mauvais. '
  '4':
  - type: note
    content: 'Cf. 1Th 4.1,10. –  Nous sommes persuadés  : autre traduction nous avons (cette) confiance  ; même verbe en Rm 14.14+ ; cf. 2Co 2.3 ; 7.16 ; Ga 5.10 ; Phm 21. –  ce que nous vous enjoignons… litt. ce que nous enjoignons, cf. v. 6,10ss ; 1Th 4.2n.'
  - type: text
    content: 'Nous sommes persuadés, dans le Seigneur, que vous faites et que vous ferez encore ce que nous vous enjoignons de faire. '
  '5':
  - type: note
    content: 'dirige votre cœur (litt. vos cœurs) : Pr 21.2n  ; 1Ch 29.18. –  l''amour de Dieu  : on peut comprendre l''amour pour Dieu ou l''amour que Dieu a  ; cf. 2.16 ; Jn 5.42+ ; Rm 5.5 ; 8.39 ; 2Co 13.13. –  la persévérance du Christ ou donnée par le Christ, ou encore pour le Christ, dans l''attente du Christ  ; cf. Rm 15.4s ; 1Th 1.3 ; Jc 5.11.'
  - type: text
    content: Que le Seigneur dirige votre cœur vers l'amour de Dieu et la persévérance du Christ !
  - type: heading
    content: Travailler à l'exemple de l'apôtre
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 16.17+ ; 1Th 4.11s ; 5.14. –  enjoignons v. 4+. –  au nom… 1Co 1.10 ; 5.4. –  vit  : litt. marche , de même au v. 11. –  indiscipline v. 7,11 ; 1Th 5.14. –  tradition 2.15+. –  reçue litt. qu''ils ont reçue ou, selon certains mss, que vous avez reçue  ; cf. 1Th 2.13+.'
  - type: text
    content: Nous vous enjoignons, frères, au nom de notre Seigneur Jésus-Christ, de vous éloigner de tout frère qui vit dans l'indiscipline et non pas selon la tradition reçue de nous.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Vous savez 1Th 1.5+ ; 2.1. –  comment il faut nous imiter  : cf. 1Th 1.6+ ; 4.1.'
  - type: text
    content: 'Vous savez vous-mêmes comment il faut nous imiter, car nous n''avons pas vécu parmi vous dans l''indiscipline ; '
  '8':
  - type: note
    content: 'mangé gratuitement le pain…  : cf. 2S 9.7 ; 2R 4.8 ; voir aussi 1Co 9.1ss ; 2Co 11.7 ; 1Th 2.5. –  dans le travail… 1Th 2.9 ; cf. 4.11 ; voir aussi 1Co 4.12+.'
  - type: text
    content: 'nous n''avons mangé gratuitement le pain de personne ; au contraire, dans le travail et la peine, nous avons œuvré nuit et jour pour n''être à charge à aucun de vous. '
  '9':
  - type: note
    content: 'le droit 1Co 8.9n  ; 9.4-18 ; cf. Mt 10.10. –  un modèle…  : cf. v. 7+ ; Ph 3.17+.'
  - type: text
    content: 'Ce n''est pas que nous n''en ayons pas le droit, mais nous avons voulu vous donner en nous-mêmes un modèle à imiter. '
