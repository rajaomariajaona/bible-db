document_id: 2TH.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le Seigneur est digne de confiance
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Au reste… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Th 4.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'priez pour nous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 15.30+ ; Ep 6.19 ; Col 4.3 ; 1Th 5.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la parole du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Th 1.8 ; 4.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: poursuive sa course
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: coure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Ps 147.15 ; voir aussi 1Co 9.24,27 ; Ga 2.2 ; 5.7 ; Ph 2.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soit '
        - type: usfm
          marker: w
          children:
          - type: text
            text: glorifiée
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ac 13.48. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme elle l''est '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme elle l'a été
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; le verbe est sous-entendu dans le texte grec.
      marker-yv: yv-n
    - type: text
      text: 'Au reste, frères, priez pour nous, afin que la parole du Seigneur poursuive sa course et soit glorifiée comme elle l''est chez vous, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chez vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Th 3.4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'donnions cette injonction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous enjoignions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si quelqu'un…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 10.4.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, lorsque nous étions chez vous, nous vous donnions cette injonction : si quelqu''un ne veut pas travailler, qu''il ne mange pas non plus !'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous apprenons…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1Co 1.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'indiscipline '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6+s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au lieu d'agir ils s'agitent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte grec comporte un jeu d''assonance comparable ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'au lieu de faire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'œuvrer, de travailler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même verbe v. 8,10) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils s'affairent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le second verbe signifie peut-être plus précisément '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils font les officieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils se mêlent de ce qui ne les regarde pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1Th 4.11s ; voir aussi 1Tm 5.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Or nous apprenons que certains d''entre vous vivent dans l''indiscipline et qu''au lieu d''agir ils s''agitent. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nous enjoignons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 4+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le Seigneur Jésus-Christ
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous les y encourageons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exhortons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous les en supplions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'travailler paisiblement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Th 4.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leur propre pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8 ; Gn 3.19.'
      marker-yv: yv-n
    - type: text
      text: 'Nous enjoignons à de telles gens – nous les y encourageons dans le Seigneur Jésus-Christ – de travailler paisiblement et de manger leur propre pain. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ga 6.9+.
      marker-yv: yv-n
    - type: text
      text: Quant à vous, frères, ne vous lassez pas de faire le bien.
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: repérez-le bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: notez-le bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le verbe correspondant (apparenté au mot souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: signe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') n''apparaît qu''ici dans le N.T. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aucune relation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Co 5.9-11.
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un n''obéit pas à ce que nous disons dans cette lettre, repérez-le bien et n''ayez avec lui aucune relation, pour qu''il ait honte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avertissez-le '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: continuez de l'avertir
      - type: usfm
        marker: ft
        children:
        - type: text
