document_id: 1CH.10,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: HISTOIRE DE DAVID, ROI D'ISRAËL
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Bataille de Guilboa ; mort de Saül
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1S 31.1-13
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Du chap. 10 au chap. 21, de nombreux textes ont des parallèles très étroits dans 1 Samuel 31, 2 Samuel et quelques Psaumes. Pour l''essentiel des notes, il faut se reporter à ces textes parallèles. L''annotation de 1 Chroniques relève ce qui est propre à cet ouvrage. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les hommes d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 7 ; la même formule est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gens d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 16.3 ; cf. 2Ch 5.3 ; voir Dt 27.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 9.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mont Guilboa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 28.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les Philistins livrèrent bataille à Israël. Les hommes d''Israël durent fuir pour échapper aux Philistins, et des victimes tombèrent au mont Guilboa. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de leur dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de leurs dieux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 1S 31.10 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Astartés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son crâne dans la maison de Dagôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.10 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son cadavre sur la muraille de Beth-Shân
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. A propos de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dagôn
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 1S 5.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils mirent les armes de Saül dans la maison de leur dieu, et ils clouèrent son crâne dans la maison de Dagôn. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout Yabesh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.11 précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les habitants de Yabesh
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX rajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et à Israël.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tout Yabesh de Galaad apprit tout ce que les Philistins avaient fait à Saül, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: emportèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.12 précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'marchèrent toute la nuit et prirent… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous le térébinthe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.13 parle d''un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tamaris.
      marker-yv: yv-n
    - type: text
      text: 'tous les hommes vaillants emportèrent le corps de Saül et ceux de ses fils, et les amenèrent à Yabesh. Ils ensevelirent leurs ossements sous le térébinthe, à Yabesh, et ils jeûnèrent sept jours. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il avait même eu recours…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'même pour interroger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le texte joue sur le nom de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1S 1.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le spirite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la spirite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'esprit d'un mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour chercher '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le verbe est parfois traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: consulter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 14). – Voir 1S 13.8-14 ; 15.1-31 ; 28 ; cf. Lv 19.31 ; 20.6.'
      marker-yv: yv-n
    - type: text
      text: 'Saül mourut à cause des sacrilèges qu''il avait commis envers le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', parce qu''il n''avait pas observé la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; il avait même eu recours au spiritisme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il ne chercha pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne consulta pas.
      marker-yv: yv-n
    - type: text
      text: 'Il ne chercha pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', qui le fit mourir et transféra la royauté à David, fils de Jessé.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: serrèrent de près
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: attrapèrent ; se lancèrent à la poursuite de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 18.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abinadab
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Aminadab.
      marker-yv: yv-n
    - type: text
      text: 'Les Philistins serrèrent de près Saül et ses fils. Ils tuèrent Jonathan, Abinadab et Malki-Shoua, fils de Saül. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et il se mit à trembler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : en modifiant la vocalisation du mot correspondant, d''après des versions anciennes, certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il fut blessé par eux.
      marker-yv: yv-n
    - type: text
      text: 'Le poids du combat se porta sur Saül ; les archers le trouvèrent, et il se mit à trembler devant eux. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: incirconcis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 14.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: me brutaliser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.4 ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: me transpercer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même Syr.'
      marker-yv: yv-n
    - type: text
      text: 'Saül dit alors à celui qui portait ses armes : Tire ton épée et transperce-moi, de peur que ces incirconcis ne viennent me brutaliser. Celui qui portait ses armes ne voulut pas : il avait très peur. Alors Saül prit l''épée et se jeta dessus. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et mourut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.5 ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même Syr.'
      marker-yv: yv-n
    - type: text
      text: 'Celui qui portait les armes de Saül, le voyant mort, se jeta aussi sur l''épée et mourut. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'LXX précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce jour-là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme Syr et 1S 31.6.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi moururent Saül, ses trois fils, et toute sa maison ; ils moururent tous ensemble. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui étaient dans la vallée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui étaient de l'autre côté de la vallée et de l'autre côté du Jourdain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on s'enfuyait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'ils s'enfuyaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'Israël s'enfuyait.
      marker-yv: yv-n
    - type: text
      text: Tous les hommes d'Israël qui étaient dans la vallée virent qu'on s'enfuyait et que Saül et ses fils étaient morts. Ils abandonnèrent leurs villes et s'enfuirent, et les Philistins vinrent s'y installer.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le lendemain, les Philistins vinrent dépouiller les cadavres et ils découvrirent Saül et ses fils, qui étaient tombés au mont Guilboa. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '10.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à leurs idoles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1S 31.9 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans les maisons de leurs idoles.
      marker-yv: yv-n
    - type: text
      text: 'Ils le dépouillèrent et emportèrent sa tête et ses armes. Puis ils firent annoncer la bonne nouvelle par tout le pays des Philistins à leurs idoles et au peuple. '
