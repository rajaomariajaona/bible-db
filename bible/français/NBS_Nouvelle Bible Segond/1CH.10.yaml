document_id: 1CH.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: HISTOIRE DE DAVID, ROI D'ISRAËL
  - type: heading
    content: Bataille de Guilboa ; mort de Saül
  - type: heading
    content: 1S 31.1-13
  - type: text
    content: ' '
  - type: note
    content: 'Du chap. 10 au chap. 21, de nombreux textes ont des parallèles très étroits dans 1 Samuel 31, 2 Samuel et quelques Psaumes. Pour l''essentiel des notes, il faut se reporter à ces textes parallèles. L''annotation de 1 Chroniques relève ce qui est propre à cet ouvrage. –  Les hommes d''Israël v. 7 ; la même formule est traduite par gens d''Israël en 16.3 ; cf. 2Ch 5.3 ; voir Dt 27.14n  ; Jos 9.6n. –  mont Guilboa  : cf. 1S 28.4n.'
  - type: text
    content: 'Les Philistins livrèrent bataille à Israël. Les hommes d''Israël durent fuir pour échapper aux Philistins, et des victimes tombèrent au mont Guilboa. '
  '10':
  - type: note
    content: 'de leur dieu ou de leurs dieux  ; 1S 31.10 des Astartés. –  son crâne dans la maison de Dagôn  : 1S 31.10 son cadavre sur la muraille de Beth-Shân. A propos de Dagôn, voir 1S 5.2n.'
  - type: text
    content: 'Ils mirent les armes de Saül dans la maison de leur dieu, et ils clouèrent son crâne dans la maison de Dagôn. '
  '11':
  - type: note
    content: 'tout Yabesh  : 1S 31.11 précise les habitants de Yabesh. –  à Saül  : LXX rajoute et à Israël.'
  - type: text
    content: 'Lorsque tout Yabesh de Galaad apprit tout ce que les Philistins avaient fait à Saül, '
  '12':
  - type: note
    content: 'emportèrent  : 1S 31.12 précise marchèrent toute la nuit et prirent… –  sous le térébinthe  : 1S 31.13 parle d''un tamaris.'
  - type: text
    content: 'tous les hommes vaillants emportèrent le corps de Saül et ceux de ses fils, et les amenèrent à Yabesh. Ils ensevelirent leurs ossements sous le térébinthe, à Yabesh, et ils jeûnèrent sept jours. '
  '13':
  - type: note
    content: 'il avait même eu recours…  : litt. même pour interroger (le texte joue sur le nom de Saül, cf. 1S 1.28n) le spirite (ou la spirite, ou l''esprit d''un mort) pour chercher (le verbe est parfois traduit par consulter, cf. v. 14). – Voir 1S 13.8-14 ; 15.1-31 ; 28 ; cf. Lv 19.31 ; 20.6.'
  - type: text
    content: 'Saül mourut à cause des sacrilèges qu''il avait commis envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', parce qu''il n''avait pas observé la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il avait même eu recours au spiritisme. '
  '14':
  - type: note
    content: 'Il ne chercha pas  : autre traduction il ne consulta pas.'
  - type: text
    content: 'Il ne chercha pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui le fit mourir et transféra la royauté à David, fils de Jessé.'
  '2':
  - type: note
    content: 'serrèrent de près  : autres traductions attrapèrent ; se lancèrent à la poursuite de  ; cf. Jg 18.22n. –  Abinadab  : LXX et Syr Aminadab.'
  - type: text
    content: 'Les Philistins serrèrent de près Saül et ses fils. Ils tuèrent Jonathan, Abinadab et Malki-Shoua, fils de Saül. '
  '3':
  - type: note
    content: 'et il se mit à trembler  : en modifiant la vocalisation du mot correspondant, d''après des versions anciennes, certains comprennent et il fut blessé par eux.'
  - type: text
    content: 'Le poids du combat se porta sur Saül ; les archers le trouvèrent, et il se mit à trembler devant eux. '
  '4':
  - type: note
    content: 'incirconcis  : cf. Jg 14.3n. –  me brutaliser  : 1S 31.4 ajoute me transpercer, de même Syr.'
  - type: text
    content: 'Saül dit alors à celui qui portait ses armes : Tire ton épée et transperce-moi, de peur que ces incirconcis ne viennent me brutaliser. Celui qui portait ses armes ne voulut pas : il avait très peur. Alors Saül prit l''épée et se jeta dessus. '
  '5':
  - type: note
    content: 'et mourut  : 1S 31.5 ajoute avec lui, de même Syr.'
  - type: text
    content: 'Celui qui portait les armes de Saül, le voyant mort, se jeta aussi sur l''épée et mourut. '
  '6':
  - type: note
    content: LXX précise ce jour-là, comme Syr et 1S 31.6.
  - type: text
    content: 'Ainsi moururent Saül, ses trois fils, et toute sa maison ; ils moururent tous ensemble. '
  '7':
  - type: note
    content: 'qui étaient dans la vallée  : 1S 31.7n qui étaient de l''autre côté de la vallée et de l''autre côté du Jourdain. –  qu''on s''enfuyait  : litt. qu''ils s''enfuyaient  ; LXX précise qu''Israël s''enfuyait.'
  - type: text
    content: Tous les hommes d'Israël qui étaient dans la vallée virent qu'on s'enfuyait et que Saül et ses fils étaient morts. Ils abandonnèrent leurs villes et s'enfuirent, et les Philistins vinrent s'y installer.
  '8':
  - type: text
    content: 'Le lendemain, les Philistins vinrent dépouiller les cadavres et ils découvrirent Saül et ses fils, qui étaient tombés au mont Guilboa. '
  '9':
  - type: note
    content: 'à leurs idoles  : 1S 31.9 dans les maisons de leurs idoles.'
  - type: text
    content: 'Ils le dépouillèrent et emportèrent sa tête et ses armes. Puis ils firent annoncer la bonne nouvelle par tout le pays des Philistins à leurs idoles et au peuple. '
