    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cinq coudées par annexe, donc une hauteur totale de quinze coudées (environ 6,7 m) ; cf. v. 5s.'
    marker-yv: yv-n
  - type: text
    text: Il bâtit les annexes contre la Maison ; elles avaient cinq coudées de hauteur et étaient fixées à la Maison par des bois de cèdre.
