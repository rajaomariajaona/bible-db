    marker-yv: yv-n
  - type: text
    text: 'L''annexe inférieure était large de cinq coudées, celle du milieu large de six coudées et la troisième large de sept coudées ; en effet, il avait ménagé des retraits à la Maison à l''extérieur, tout autour, afin que cela ne soit pas fixé dans les murs de la Maison. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pierre brute
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression, au pluriel, apparaît en Dt 27.5s et Jos 8.31 pour désigner des pierres non taillées (cf. Ex 20.25) ; ici il s''agit plutôt de pierres taillées ou fendues à l''avance et en dehors du chantier du temple.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''on bâtit la Maison, on se servit de pierre brute, préparée dans les carrières ; on n''entendit ni marteau, ni hache, ni aucun outil de fer dans la Maison pendant qu''on la bâtissait. '
  - type: usfm
