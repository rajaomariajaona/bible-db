  - type: text
    text: 'Salomon bâtit la Maison et l''acheva. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'au plafond
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'aux murs du plafond
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'aux poutres du plafond.
    marker-yv: yv-n
  - type: text
    text: 'Il en bâtit les murs intérieurs en planches de cèdre, depuis le sol de la Maison jusqu''au plafond ; il recouvrit ainsi de bois l''intérieur et recouvrit le sol de la Maison de planches de cyprès. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Secret, le Très-Sacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : terme qui désigne la partie la plus sacrée du temple ; v. 5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 7.50 ; 8.6 ; 2Ch 3.8,10 ; 4.22 ; 5.7 ; cf. Ex 26.33s ; Ez 41.4+ ; 45.3 ; Dn 9.24.'
    marker-yv: yv-n
  - type: text
    text: 'Il bâtit, sur vingt coudées, le fond de la Maison en planches de cèdre, depuis le sol jusqu''en haut des murs, et il bâtit ainsi l''intérieur pour en faire le Secret, le Très-Sacré. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quarante coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 18 m. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur le devant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devant moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on modifie souvent le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devant le Secret
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''après des versions anciennes.'
    marker-yv: yv-n
  - type: text
    text: 'Les quarante coudées sur le devant formaient la Maison, c''est-à-dire le temple. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coloquintes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cucurbitacées aux fruits non comestibles, abondantes dans la région ; 7.24 ; cf. 2R 4.39 (forme hébraïque légèrement différente). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fleurs épanouies '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 29,32,35.
    marker-yv: yv-n
  - type: text
    text: Le bois de cèdre à l'intérieur de la Maison offrait des sculptures de coloquintes et de fleurs épanouies ; tout était en cèdre, on ne voyait aucune pierre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Secret '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; de même aux v. 20-23.'
    marker-yv: yv-n
  - type: text
    text: 'Il fit le Secret à l''intérieur de la Maison, pour y placer le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Devant le Secret
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt… vingt… vingt
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le Très-Sacré du temple avait donc la forme d''un cube aux dimensions doubles de celles du Très-Sacré de la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'demeure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'du désert (Ex 26). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'or fin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'zahav '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: or
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sagour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fermé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), v. 21 ; 7.49s ; 10.21 ; 2Ch 4.20,22 ; 9.20.
    marker-yv: yv-n
  - type: text
    text: 'Devant le Secret, qui avait vingt coudées de longueur, vingt coudées de largeur et vingt coudées de hauteur, et qu''il avait recouvert d''or fin, il recouvrit de cèdre un autel. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Salomon recouvrit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les v. 21s sont différents dans LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''or fin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Salomon recouvrit d''or fin l''intérieur de la Maison et il fit passer des chaînettes d''or devant le Secret qu''il avait recouvert d''or. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: Il avait donc recouvert d'or toute la Maison, la Maison tout entière, et il avait recouvert d'or tout l'autel qui était devant le Secret.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il fit deux keroubim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ex 25.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '-22 ; 1Ch 28.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dix coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : environ 4,5 m.'
    marker-yv: yv-n
  - type: text
    text: 'Dans le Secret, il fit deux keroubim en bois d''olivier sauvage, ayant dix coudées de hauteur. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'La première aile d''un keroub avait cinq coudées, la seconde aile du keroub avait cinq coudées, ce qui faisait dix coudées de l''extrémité d''une de ses ailes à l''extrémité de l''autre. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Le second keroub avait aussi dix coudées. La mesure et la forme étaient les mêmes pour les deux keroubim. '
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: 'La hauteur du premier keroub était de dix coudées, de même pour le second keroub. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au milieu de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans, à l'intérieur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même terme au v. 19) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la Maison intérieure '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'intérieur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), c.-à-d. dans le Très-Sacré (le Secret). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: On déploya les ailes des keroubim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 25.20.'
    marker-yv: yv-n
  - type: text
    text: 'Il plaça les keroubim au milieu de la Maison intérieure. On déploya les ailes des keroubim : l''aile du premier touchait l''une des parois, et l''aile du second keroub touchait la seconde paroi ; leurs ailes se touchaient au milieu de la Maison, aile contre aile. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: Il recouvrit d'or les keroubim.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Il cisela sur tout le pourtour des murs de la Maison, à l''intérieur et à l''extérieur, des keroubim, des branches de palmiers et des fleurs épanouies. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: Il recouvrit d'or le sol de la Maison, à l'intérieur et à l'extérieur.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le pilier…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : fin de v. difficile, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pilier, les montants, un cinquième
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. On a pensé aussi à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un cinquième de la largeur de la porte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une porte à cinq côtés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le linteau rejoignant les montants par deux pentes.'
    marker-yv: yv-n
  - type: text
    text: 'Il fit à l''entrée du Secret des battants de porte en bois d''olivier sauvage ; le pilier et les montants équivalaient à un cinquième du mur. '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: text
    text: 'Les deux battants étaient en bois d''olivier sauvage. Il y cisela des keroubim, des branches de palmiers et des fleurs épanouies et il les recouvrit d''or ; il plaqua aussi de l''or sur les keroubim et sur les branches de palmiers. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ayant le quart de la dimension du mur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du quart
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Même difficulté qu'au v. 31.
    marker-yv: yv-n
  - type: text
    text: 'Il fit de même, pour l''entrée du temple, des montants en bois d''olivier sauvage, ayant le quart de la dimension du mur, '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'planches '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rideaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tselayim / qelayim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Beaucoup comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qelayim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'comme une faute pour '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tselayim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il s''agirait alors de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'planches '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans les deux cas.
    marker-yv: yv-n
  - type: text
    text: 'et deux battants en bois de cyprès ; deux planches pivotantes pour le premier battant et deux rideaux pivotants pour le second battant. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à la gravure
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit sans doute des sculptures précédemment décrites.'
    marker-yv: yv-n
  - type: text
    text: Il y cisela des keroubim, des branches de palmiers et des fleurs épanouies, et il les recouvrit d'or, ajusté à la gravure.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: Il bâtit la cour intérieure de trois rangées de pierres de taille et d'une rangée de poutres de cèdre.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '6.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'au mois '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la lune
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 38 et en 8.2) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de Ziv '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'La quatrième année, au mois de Ziv, les fondations de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
