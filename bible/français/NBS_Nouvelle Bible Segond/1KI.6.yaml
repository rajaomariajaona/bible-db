document_id: 1KI.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La construction du temple
  - type: heading
    content: 2Ch 3.1-14
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ac 7.47. –  quatre cent quatre-vingtième année  : LXX quatre cent quarantième année , cf. Ac 13.20. –  au mois de Ziv  : litt. au mois des fleurs (encore au v. 37) ; mois cananéen correspondant à avril-mai et, dans le calendrier juif actuel, au mois d''Iyyar (emprunté au calendrier babylonien et adopté au retour de l''exil). Absent de LXX. –  qu''il bâtit…  : absent de LXX.'
  - type: text
    content: 'C''est la quatre cent quatre-vingtième année après que les Israélites furent sortis d''Egypte, la quatrième année du règne de Salomon sur Israël, au mois de Ziv – le deuxième mois – qu''il bâtit la maison pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '10':
  - type: note
    content: 'cinq coudées de hauteur  : cinq coudées par annexe, donc une hauteur totale de quinze coudées (environ 6,7 m) ; cf. v. 5s.'
  - type: text
    content: Il bâtit les annexes contre la Maison ; elles avaient cinq coudées de hauteur et étaient fixées à la Maison par des bois de cèdre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: La parole du Seigneur parvint… 17.2,8 ; 18.31 ; 21.17,28 ; Gn 15.1 ; 1S 15.10 ; 2S 7.4 ; Es 38.4 ; Jr 1.4 ; Ez 1.3n  ; 3.16 ; Jon 1.1 ; Ag 2.10s,20 ; Za 4.8 ; Dn 9.2 ; 2Ch 11.2 ; 12.7. Expression fréquente dans la Bible, surtout dans les textes prophétiques (en particulier Jr et Ez). Les v. 11-14 sont absents de LXX.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Salomon : '
  '12':
  - type: note
    content: 'cette maison que tu bâtis…  : cf. 2S 7.13-16 ; 1Ch 22.10,19. –  si tu suis…  : cf. Lv 26.3 ; voir aussi 1R 2.4 ; 9.4s. –  prescriptions  : voir loi.'
  - type: text
    content: 'Quant à cette maison que tu bâtis, si tu suis mes prescriptions, si tu mets en pratique mes règles, si tu observes tous mes commandements et si tu les suis, je réaliserai à ton égard la parole que j''ai dite à David, ton père. '
  '13':
  - type: note
    content: Je demeurerai au milieu… Ex 25.8 ; 29.45 ; Ez 43.9 ; Za 2.14s ; cf. Lv 26.11 ; Nb 35.34.
  - type: text
    content: Je demeurerai au milieu des Israélites et je n'abandonnerai pas Israël, mon peuple.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 9n.
  - type: text
    content: 'Salomon bâtit la Maison et l''acheva. '
  '15':
  - type: note
    content: 'jusqu''au plafond  : litt. jusqu''aux murs du plafond. LXX jusqu''aux poutres du plafond.'
  - type: text
    content: 'Il en bâtit les murs intérieurs en planches de cèdre, depuis le sol de la Maison jusqu''au plafond ; il recouvrit ainsi de bois l''intérieur et recouvrit le sol de la Maison de planches de cyprès. '
  '16':
  - type: note
    content: 'le Secret, le Très-Sacré  : terme qui désigne la partie la plus sacrée du temple ; v. 5n  ; 7.50 ; 8.6 ; 2Ch 3.8,10 ; 4.22 ; 5.7 ; cf. Ex 26.33s ; Ez 41.4+ ; 45.3 ; Dn 9.24.'
  - type: text
    content: 'Il bâtit, sur vingt coudées, le fond de la Maison en planches de cèdre, depuis le sol jusqu''en haut des murs, et il bâtit ainsi l''intérieur pour en faire le Secret, le Très-Sacré. '
  '17':
  - type: note
    content: 'quarante coudées  : environ 18 m. –  sur le devant  : litt. devant moi  ; on modifie souvent le texte hébreu traditionnel pour lire devant le Secret, d''après des versions anciennes.'
  - type: text
    content: 'Les quarante coudées sur le devant formaient la Maison, c''est-à-dire le temple. '
  '18':
  - type: note
    content: 'coloquintes  : cucurbitacées aux fruits non comestibles, abondantes dans la région ; 7.24 ; cf. 2R 4.39 (forme hébraïque légèrement différente). –  fleurs épanouies v. 29,32,35.'
  - type: text
    content: Le bois de cèdre à l'intérieur de la Maison offrait des sculptures de coloquintes et de fleurs épanouies ; tout était en cèdre, on ne voyait aucune pierre.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Secret v. 5n  ; de même aux v. 20-23.
  - type: text
    content: 'Il fit le Secret à l''intérieur de la Maison, pour y placer le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '2':
  - type: note
    content: 'La maison…  : cette description du temple de Salomon correspond au plan général des sanctuaires de la région (Syrie, Canaan, Phénicie) ; dans la Bible, elle est à rapprocher de celle de la Demeure, au désert (Ex 25–26), et de la vision d''Ezéchiel (Ez 40–42). –  soixante (LXX quarante) coudées  : environ 27 m ; la coudée ancienne valait environ 45 cm (cf. Ez 40.5n). –  vingt de largeur  : environ 9 m. –  trente (LXX vingt-cinq, de même chez Flavius Josèphe) : environ 13 m.'
  - type: text
    content: 'La maison que le roi Salomon bâtit pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait soixante coudées de longueur, vingt de largeur, et trente coudées de hauteur. '
  '20':
  - type: note
    content: 'Devant le Secret  : absent de LXX. –  vingt… vingt… vingt  : le Très-Sacré du temple avait donc la forme d''un cube aux dimensions doubles de celles du Très-Sacré de la demeure du désert (Ex 26). –  d''or fin  : hébreu zahav (or) sagour (fin  ; litt. fermé), v. 21 ; 7.49s ; 10.21 ; 2Ch 4.20,22 ; 9.20.'
  - type: text
    content: 'Devant le Secret, qui avait vingt coudées de longueur, vingt coudées de largeur et vingt coudées de hauteur, et qu''il avait recouvert d''or fin, il recouvrit de cèdre un autel. '
  '21':
  - type: note
    content: 'Salomon recouvrit…  : les v. 21s sont différents dans LXX. –  d''or fin v. 20n.'
  - type: text
    content: 'Salomon recouvrit d''or fin l''intérieur de la Maison et il fit passer des chaînettes d''or devant le Secret qu''il avait recouvert d''or. '
  '22':
  - type: text
    content: Il avait donc recouvert d'or toute la Maison, la Maison tout entière, et il avait recouvert d'or tout l'autel qui était devant le Secret.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'il fit deux keroubim  : cf. Ex 25.18n-22 ; 1Ch 28.18. –  dix coudées  : environ 4,5 m.'
  - type: text
    content: 'Dans le Secret, il fit deux keroubim en bois d''olivier sauvage, ayant dix coudées de hauteur. '
  '24':
  - type: text
    content: 'La première aile d''un keroub avait cinq coudées, la seconde aile du keroub avait cinq coudées, ce qui faisait dix coudées de l''extrémité d''une de ses ailes à l''extrémité de l''autre. '
  '25':
  - type: text
    content: 'Le second keroub avait aussi dix coudées. La mesure et la forme étaient les mêmes pour les deux keroubim. '
  '26':
  - type: text
    content: 'La hauteur du premier keroub était de dix coudées, de même pour le second keroub. '
  '27':
  - type: note
    content: 'au milieu de (autre traduction dans, à l''intérieur, même terme au v. 19) la Maison intérieure (autre traduction à l''intérieur), c.-à-d. dans le Très-Sacré (le Secret). –  On déploya les ailes des keroubim  : cf. Ex 25.20.'
  - type: text
    content: 'Il plaça les keroubim au milieu de la Maison intérieure. On déploya les ailes des keroubim : l''aile du premier touchait l''une des parois, et l''aile du second keroub touchait la seconde paroi ; leurs ailes se touchaient au milieu de la Maison, aile contre aile. '
  '28':
  - type: text
    content: Il recouvrit d'or les keroubim.
  '29':
  - type: text
    content: 'Il cisela sur tout le pourtour des murs de la Maison, à l''intérieur et à l''extérieur, des keroubim, des branches de palmiers et des fleurs épanouies. '
  '3':
  - type: note
    content: 'vestibule  : hébreu ’oulam  ; 7.6-8,12,19,21 ; Ez 8.16 ; 40.7-9,15,39s,48s ; 41.15,25s ; 44.3 ; 46.2,8 ; Jl 2.17 ; 1Ch 28.11 ; 2Ch 3.4 ; 8.12 ; 15.8 ; 29.7,17. –  sur le devant  : autre traduction sur (toute la largeur de) la façade. –  temple  : hébreu hékal  ; v. 5,17,33 ; 7.21,50 ; 1S 1.9 ; 2R 18.16 ; 20.18 ; 23.4 ; 24.13 ; Es 6.1 ; Jr 7.4 ; Ez 8.16 ; Jl 4.5 ; Jon 2.5 ; Ha 2.20 ; Ag 2.15 ; Za 6.12 ; Ps 5.8 ; Esd 3.6,10 ; 4.1 ; Né 6.10s ; 2Ch 3.17 ; 4.8,22 ; 26.16 ; 27.2 ; 29.16. –  dix coudées ≈ 4,5 m.'
  - type: text
    content: Le vestibule, sur le devant du temple de la Maison, avait vingt coudées de longueur correspondant à la largeur de la Maison, et dix coudées de largeur, sur le devant de la Maison.
  '30':
  - type: text
    content: Il recouvrit d'or le sol de la Maison, à l'intérieur et à l'extérieur.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'le pilier…  : fin de v. difficile, litt. le pilier, les montants, un cinquième . On a pensé aussi à un cinquième de la largeur de la porte , ou à une porte à cinq côtés , le linteau rejoignant les montants par deux pentes.'
  - type: text
    content: 'Il fit à l''entrée du Secret des battants de porte en bois d''olivier sauvage ; le pilier et les montants équivalaient à un cinquième du mur. '
  '32':
  - type: text
    content: 'Les deux battants étaient en bois d''olivier sauvage. Il y cisela des keroubim, des branches de palmiers et des fleurs épanouies et il les recouvrit d''or ; il plaqua aussi de l''or sur les keroubim et sur les branches de palmiers. '
  '33':
  - type: note
    content: 'ayant le quart de la dimension du mur  : litt. du quart. Même difficulté qu''au v. 31.'
  - type: text
    content: 'Il fit de même, pour l''entrée du temple, des montants en bois d''olivier sauvage, ayant le quart de la dimension du mur, '
  '34':
  - type: note
    content: 'planches / rideaux  : hébreu tselayim / qelayim. Beaucoup comprennent qelayim comme une faute pour tselayim  ; il s''agirait alors de planches dans les deux cas.'
  - type: text
    content: 'et deux battants en bois de cyprès ; deux planches pivotantes pour le premier battant et deux rideaux pivotants pour le second battant. '
  '35':
  - type: note
    content: 'à la gravure  : il s''agit sans doute des sculptures précédemment décrites.'
  - type: text
    content: Il y cisela des keroubim, des branches de palmiers et des fleurs épanouies, et il les recouvrit d'or, ajusté à la gravure.
  '36':
  - type: text
    content: Il bâtit la cour intérieure de trois rangées de pierres de taille et d'une rangée de poutres de cèdre.
  '37':
  - type: text
    content: ' '
  - type: note
    content: au mois (litt. à la lune , de même au v. 38 et en 8.2) de Ziv v. 1n.
  - type: text
    content: 'La quatrième année, au mois de Ziv, les fondations de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' furent posées, '
  '38':
  - type: note
    content: 'au mois de Boul  : ce mois, comme celui de Ziv, fait partie d''un ancien calendrier hébreu et correspond probablement à octobre-novembre. Cf. 8.2n. –  dans toutes ses parties…  : litt. pour toutes ses choses et pour tout son droit. –  Il (c.-à-d. Salomon) la bâtit en sept ans  : absent de LXX.'
  - type: text
    content: et la onzième année, au mois de Boul, qui est le huitième mois, la Maison fut achevée dans toutes ses parties et telle qu'elle devait être. Il la bâtit en sept ans.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'fenêtres à claire-voie grillagées  : le sens exact de cette expression technique est mal connu ; cf. 7.4s ; Ez 40.16 ; 41.16,26.'
  - type: text
    content: 'Il fit pour la Maison des fenêtres à claire-voie grillagées. '
  '5':
  - type: note
    content: 'temple v. 3+. –  Secret  : hébreu devir (lieu retiré, salle du fond  ?) ; ce terme revient principalement dans 1R (v. 16,19-23,31 ; 7.49 ; 8.6,8) et 2Ch (3.16 ; 4.20 ; 5.7,9 ; voir aussi Ps 28.2), où il désigne la partie du temple dénommée ailleurs Très-Sacré ou Saint des saints. Le terme employé ici semble attirer l''attention sur la situation de cette pièce dans l''architecture de l''ensemble plutôt que sur son caractère particulièrement sacré. Dans des langues voisines de l''hébreu, des termes apparentés désignent aussi des sanctuaires comparables au fond d''un temple. –  pièces latérales  : cf. 2R 23.11 ; Jr 35.2,4 ; 36.10 ; Ez 40.17,38,44-46 etc. ; Esd 8.29 ; 10.6 ; Né 10.38-40.'
  - type: text
    content: 'Il adossa au mur des annexes de la Maison, tout autour des murs, tout autour du temple et du Secret, et il fit des pièces latérales tout autour. '
  '6':
  - type: note
    content: 'cinq… six… sept coudées  : environ 2,2 m, 2,7 m et 3,1 m ; voir mesures.'
  - type: text
    content: 'L''annexe inférieure était large de cinq coudées, celle du milieu large de six coudées et la troisième large de sept coudées ; en effet, il avait ménagé des retraits à la Maison à l''extérieur, tout autour, afin que cela ne soit pas fixé dans les murs de la Maison. '
  '7':
  - type: note
    content: 'pierre brute  : la même expression, au pluriel, apparaît en Dt 27.5s et Jos 8.31 pour désigner des pierres non taillées (cf. Ex 20.25) ; ici il s''agit plutôt de pierres taillées ou fendues à l''avance et en dehors du chantier du temple.'
  - type: text
    content: 'Lorsqu''on bâtit la Maison, on se servit de pierre brute, préparée dans les carrières ; on n''entendit ni marteau, ni hache, ni aucun outil de fer dans la Maison pendant qu''on la bâtissait. '
  '8':
  - type: note
    content: 'des pièces latérales : litt. de la pièce latérale, collectif. –  côté  : cf. 7.39 ; sur le terme correspondant, voir Ex 27.14n. –  intermédiaire  : LXX et Tg du bas. –  escalier  : sens probable d''un mot qui n''apparaît qu''ici.'
  - type: text
    content: 'L''entrée des pièces de l''étage intermédiaire était sur le côté droit de la Maison ; on montait à l''étage intermédiaire par un escalier, et de l''étage intermédiaire au troisième. '
  '9':
  - type: note
    content: 'Il bâtit  : il s''agit de Salomon, v. 14 ; cf. Ex 39.32. –  de moulures et de poutres  : omis par LXX. Deux mots techniques dont on connaît mal le sens.'
  - type: text
    content: 'Il bâtit la Maison et l''acheva. Il la recouvrit de moulures et de poutres de cèdre. '
