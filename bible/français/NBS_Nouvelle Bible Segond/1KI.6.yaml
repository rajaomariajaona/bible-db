    marker-yv: yv-n
  - type: text
    text: 'L''entrée des pièces de l''étage intermédiaire était sur le côté droit de la Maison ; on montait à l''étage intermédiaire par un escalier, et de l''étage intermédiaire au troisième. '
  - type: usfm
