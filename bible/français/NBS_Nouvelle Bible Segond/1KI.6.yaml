      children:
      - type: text
        text: '  ?) ; ce terme revient principalement dans 1R (v. 16,19-23,31 ; 7.49 ; 8.6,8) et 2Ch (3.16 ; 4.20 ; 5.7,9 ; voir aussi Ps 28.2), où il désigne la partie du temple dénommée ailleurs '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Très-Sacré '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
