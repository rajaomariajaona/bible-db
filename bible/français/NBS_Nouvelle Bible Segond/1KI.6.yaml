      - type: text
        text: '  : cf. 2R 23.11 ; Jr 35.2,4 ; 36.10 ; Ez 40.17,38,44-46 etc. ; Esd 8.29 ; 10.6 ; Né 10.38-40.'
    marker-yv: yv-n
  - type: text
    text: 'Il adossa au mur des annexes de la Maison, tout autour des murs, tout autour du temple et du Secret, et il fit des pièces latérales tout autour. '
