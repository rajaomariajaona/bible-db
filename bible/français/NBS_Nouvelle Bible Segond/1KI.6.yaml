  - type: text
    text: 'C''est la quatre cent quatre-vingtième année après que les Israélites furent sortis d''Egypte, la quatrième année du règne de Salomon sur Israël, au mois de Ziv – le deuxième mois – qu''il bâtit la maison pour le '
