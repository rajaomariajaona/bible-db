        children:
        - type: text
          text: Saint
      - type: text
        text: ' des saints'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le terme employé ici semble attirer l''attention sur la situation de cette pièce dans l''architecture de l''ensemble plutôt que sur son caractère particulièrement sacré. Dans des langues voisines de l''hébreu, des termes apparentés désignent aussi des sanctuaires comparables au fond d''un temple. –  '
    - type: usfm
