    marker-yv: yv-n
  - type: text
    text: 'Quant à cette maison que tu bâtis, si tu suis mes prescriptions, si tu mets en pratique mes règles, si tu observes tous mes commandements et si tu les suis, je réaliserai à ton égard la parole que j''ai dite à David, ton père. '
  - type: usfm
