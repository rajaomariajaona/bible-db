document_id: ISA.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un nouveau David
  - type: text
    content: ' '
  - type: note
    content: 'tronc ou souche (cf. 6.13, autre terme hébreu ; même mot 40.24 ; Jb 14.7-9). –  Jessé (nom également transcrit Isaï ), père de David v. 10 ; 1S 16.1. –  rejeton  : hébreu nétsèr , de même en 60.21 ; ce terme a été rapproché du mot nazoréen (voir Mt 2.23n). – Cf. 4.2+ ; 37.31 ; 53.2 ; Ap 22.16.'
  - type: text
    content: Alors un rameau sortira du tronc de Jessé,
  - type: text
    content: un rejeton de ses racines sera fécond.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Rm 15.12. –  racine de Jessé  : cf. v. 1. –  bannière v. 12 ; 5.26+ ; cf. 49.22. –  peuples / nations 2.2s. –  glorieux 4.5s.'
  - type: text
    content: En ce jour-là, la racine de Jessé
  - type: text
    content: se tiendra là comme une bannière pour les peuples ;
  - type: text
    content: les nations la chercheront,
  - type: text
    content: et son lieu de repos sera glorieux.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'étendra  : le verbe hébreu ainsi traduit signifie habituellement ajouter ou continuer, recommencer  ; le texte fait ici référence à l''Exode ; cf. v. 16 ; 10.26 ; 43.16-19 ; 48.20s ; Ex 3.20 ; Jr 23.7s. –  Patros  : la Haute-Egypte (Gn 10.14n  ; Jr 44.1 ; Ez 29.14 ; 30.14). –  Koush ou la Nubie  ; 18.1n  ; 20.3-5 ; Gn 2.13n. –  Elam  : la région de Suse, dans l''actuel Iran (21.2 ; Gn 10.22n). –  Shinéar ou Babylone (Gn 10.10n  ; 11.9n  ; Dn 1.2). –  Hamath en Syrie (10.9 ; 2R 17.24). –  îles 20.6n  ; 23.2,6 ; 24.15 ; 40.15 ; 41.1,5 ; 42.4,10,12,15 ; 49.1 ; 51.5 ; 59.18 ; 60.9 ; 66.19 ; cf. Gn 10.5n  ; Est 10.1.'
  - type: text
    content: En ce jour-là, le Seigneur étendra une seconde fois la main
  - type: text
    content: pour racheter le reste de son peuple,
  - type: text
    content: ceux qui seront restés en Assyrie et en Egypte,
  - type: text
    content: à Patros et à Koush,
  - type: text
    content: en Elam, à Shinéar, à Hamath
  - type: text
    content: et dans les îles de la mer.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'bannière v. 10. –  dispersés  : contrairement au parallèle bannis , le terme hébreu est au féminin ; certains comprennent les hommes et les femmes exilés , d''autres interprètent les humains et les choses dispersées (en hébreu le féminin tient parfois lieu de neutre). –  coins  : le mot signifie également ailes. – Cf. 43.5s ; 49.12,22 ; 56.8 ; 60.4 ; 66.20 ; Ps 147.2.'
  - type: text
    content: Il dressera une bannière pour les nations ;
  - type: text
    content: il rassemblera les bannis d'Israël
  - type: text
    content: et il recueillera les dispersés de Juda
  - type: text
    content: des quatre coins de la terre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 7.1-9,17 ; 9.20 ; voir aussi Jr 3.18 ; 23.5s ; 31.6 ; Ez 34.23 ; 37.15-28 ; Os 2.2 ; 3.5 ; Am 9.11. –  jalousie  : autre traduction passion jalouse  ; cf. 9.6+.'
  - type: text
    content: La jalousie d'Ephraïm disparaîtra,
  - type: text
    content: et les ennemis de Juda seront retranchés ;
  - type: text
    content: Ephraïm ne sera plus jaloux de Juda,
  - type: text
    content: et Juda ne sera plus hostile à Ephraïm.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Philistins 14.28-32 ; So 2.5-7. –  fils de l''Orient  : cf. Gn 29.1n. –  Edom / Moab 15—16 ; 21.11s ; 25.10-12 ; 34.5-15. –  subiront leur emprise  : litt. l''envoi de leur main. –  leur seront soumis  : le même terme, ou un homonyme, désigne la garde personnelle d''un roi en 1S 22.14n. – Cf. 2S 5.17-25 ; 8.1s,12-14 ; 12.26-31 ; Am 9.11s ; Ab 19s ; Ps 60.10.'
  - type: text
    content: Ils fondront sur l'épaule des Philistins à l'Occident,
  - type: text
    content: ils pilleront ensemble les fils de l'Orient,
  - type: text
    content: Edom et Moab subiront leur emprise,
  - type: text
    content: et les Ammonites leur seront soumis.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'frappera d''anathème 34.2+ ; voir bénédiction, malédiction ; LXX desséchera. –  agitera  : voir 10.32+ ; cf. Ex 14.16,21,26s ; 15.12. –  le Fleuve  : probablement l''Euphrate, comme en 7.20 ; 8.7. –  en soufflant avec énergie  : litt. dans l''ardeur (terme de sens incertain) de son souffle  ; cf. Ex 15.8. –  pour le partager  : sous-entendu dans le texte. –  canaux / sandales  : les termes hébreux correspondants font assonance ; cf. Ex 14.22,29 ; 15.19. –  on y marchera  : litt. il fera cheminer.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappera d''anathème'
  - type: text
    content: 'le golfe de la mer d''Egypte :'
  - type: text
    content: il agitera sa main sur le Fleuve
  - type: text
    content: en soufflant avec énergie ;
  - type: text
    content: il le frappera pour le partager en sept canaux,
  - type: text
    content: on y marchera en sandales.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. 19.23 ; 35.8 ; 40.3s ; 42.15s ; 43.19 ; 49.11 ; 51.10 ; 57.14 ; 62.10. –  Assyrie / Egypte v. 11 ; 7.18 ; 10.24-26 ; 27.13 ; cf. Os 9.3 ; 11.5,11. –  monta Gn 12.10n.
  - type: text
    content: Il y aura une route pour le reste de son peuple
  - type: text
    content: qui sera resté en Assyrie,
  - type: text
    content: comme il y en eut une pour Israël,
  - type: text
    content: le jour où il monta d'Egypte.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.5 ; 28.6 ; 42.1 ; 59.21 ; 61.1 ; 1S 16.13s ; 2S 23.2 ; Pr 8.12-16 ; Jn 1.32-34 ; 3.34 ; Ac 10.38. –  souffle ou Esprit  ; cf. v. 3n. –  conseil ou réflexion, décision 5.19n  ; 9.5n  ; les termes rendus ici par conseil et vaillance sont traduits respectivement par plan et force en 36.5. –  connaissance 1.3+ ; cf. Col 2.2s. –  crainte du Seigneur Pr 1.7.
  - type: text
    content: 'Le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' reposera sur lui :'
  - type: text
    content: souffle de sagesse et d'intelligence,
  - type: text
    content: souffle de conseil et de vaillance,
  - type: text
    content: 'souffle de connaissance et de crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Il respirera  : traduction incertaine ; le terme est apparenté au mot traduit par souffle au v. 2. LXX un esprit de crainte de Dieu le remplira , ou l''esprit le remplira de la crainte de Dieu. –  l''apparence / un ouï-dire  : litt. ce qui paraît à ses yeux / ce qu''entendent ses oreilles. –  arbitrera (comme en 2.4, de même au v. 4) ou punira. – Cf. 9.6 ; 32.1-5 ; 1S 16.7 ; 2S 14.17 ; 1R 3.16-28 ; Jr 23.5 ; Ps 72.1-7 ; Jn 2.24s.'
  - type: text
    content: 'Il respirera la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: il ne jugera pas sur l'apparence,
  - type: text
    content: il n'arbitrera pas sur un ouï-dire.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'pauvres / affligés 29.19s ; Ps 9.13n  ; 72.2,4,12s. – Voir justice. –  pays et terre traduisent un même mot hébreu. –  du sceptre de sa bouche  : autre traduction du bâton (9.3n) de sa bouche  ; cf. 9.7 ; Os 6.5 ; Ap 2.16. –  souffle (ou esprit ) v. 2-3n  ; cf. 2Th 2.8.'
  - type: text
    content: Il jugera les pauvres avec justice,
  - type: text
    content: il arbitrera avec droiture
  - type: text
    content: en faveur des affligés du pays ;
  - type: text
    content: il frappera la terre du sceptre de sa bouche,
  - type: text
    content: et du souffle de ses lèvres il fera mourir le méchant.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ep 6.14.
  - type: text
    content: La justice sera la ceinture de ses reins,
  - type: text
    content: et la probité, la ceinture de ses hanches.
  - type: heading
    content: Le loup séjournera avec le mouton
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'séjournera  : le verbe correspondant est apparenté au substantif rendu habituellement par immigré , cf. Ex 12.48n. –  se couchera  : même terme au v. 7 ; 13.20s ; 14.30 ; 17.2 ; 27.10 ; 54.11 ; mot apparenté en 35.7 ; 65.10 ; voir Gn 4.7n. –  le taurillon ou le veau  ; LXX le veau, le taureau et le lion paîtront ensemble  ; cf. 1.28n.'
  - type: text
    content: Le loup séjournera avec le mouton,
  - type: text
    content: la panthère se couchera avec le chevreau ;
  - type: text
    content: le taurillon, le jeune lion et les bêtes grasses seront ensemble,
  - type: text
    content: et un petit garçon les conduira.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'auront un même pâturage  : litt. paîtront . –  une même couche  : litt. se coucheront ensemble (comme au v. 6).'
  - type: text
    content: La vache et l'ourse auront un même pâturage,
  - type: text
    content: leurs petits une même couche ;
  - type: text
    content: le lion, comme le bœuf, mangera de la paille.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'trou  : le sens du mot hébreu est incertain. – Sur l''ensemble, cf. 35.9 ; 65.25 ; Gn 1.26,30 ; 2.19 ; 3.15 ; 9.2 ; Lv 26.6 ; Ez 34.25,28 ; Os 2.20 ; Jb 5.22s ; Mc 1.13.'
  - type: text
    content: Le nourrisson s'ébattra sur l'antre de la vipère,
  - type: text
    content: et l'enfant sevré mettra sa main dans le trou de l'aspic.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'aucun mal / aucune destruction… 65.25 ; cf. 2.2-4 ; Ps 101.8. –  montagne sacrée ou montagne sainte 2.2+ ; cf. 27.13 ; 56.7 ; cf. Za 8.3. –  la connaissance…  : cf. 19.21 ; Jr 31.33s ; Ha 2.14 ; Ps 33.5. –  la terre ou le pays  ; cf. 12.5.'
  - type: text
    content: Il ne se fera aucun mal, il n'y aura aucune destruction,
  - type: text
    content: dans toute ma montagne sacrée ;
  - type: text
    content: 'car la connaissance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' remplira la terre'
  - type: text
    content: comme les eaux recouvrent la mer.
  - type: heading
    content: Le retour des bannis d'Israël
