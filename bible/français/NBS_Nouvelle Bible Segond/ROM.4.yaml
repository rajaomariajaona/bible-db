  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui fait œuvre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui travaille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon le sens habituel du verbe grec ; 11.6 ; cf. Mt 20.1-16 ; Lc 17.7-11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le salaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot peut aussi avoir le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: récompense
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1Co 3.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: est compté…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction possible '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'n''est pas « compté », comme une '
      - type: usfm
        marker: w
        children:
        - type: text
          text: grâce
      - type: text
        text: '  : c''est un dû.'
    marker-yv: yv-n
  - type: text
    text: 'Or, à celui qui fait œuvre, le salaire est compté non comme une grâce, mais comme un dû. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ne fait pas œuvre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne travaille pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ga 5.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: justifie
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.24+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''impie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 5.6.
    marker-yv: yv-n
  - type: text
    text: 'Quant à celui qui ne fait pas œuvre, mais qui croit en celui qui justifie l''impie, sa foi lui est comptée comme justice. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'De même, David dit le bonheur de l''être humain à qui Dieu compte la justice en dehors des œuvres :'
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ps 32.1s
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les désordres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les (actes de) non-loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le même mot est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 6.19 ; voir 2Th 2.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',7. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: péchés
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sont recouverts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : traduction littérale de l''expression hébraïque du Ps 32, qui signifie également '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sont pardonnés.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Heureux ceux dont les désordres sont pardonnés
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: it
    children:
    - type: text
      text: et dont les péchés sont recouverts !
- type: usfm
  marker: q1
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Heureux l'homme à qui le Seigneur ne tient aucun compte du péché !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 3+.
    marker-yv: yv-n
  - type: text
    text: 'Ce bonheur n''est-il que pour les circoncis, ou également pour les incirconcis ? En effet, nous disons : Pour Abraham la foi fut comptée comme justice. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'comment lui fut-elle comptée ? Etant dans la circoncision ou dans l''incirconcision ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de même dans la suite). Cf. Gn 17.9-14 ; voir aussi Ga 3.7-9.
    marker-yv: yv-n
  - type: text
    text: 'Comment donc était-il lorsqu''elle lui fut comptée ? Etait-il circoncis ou incirconcis ? Il n''était pas circoncis, mais incirconcis. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sceau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: preuve, garantie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ep 1.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la justice…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la justice de la foi (qui est) dans l''incirconcision '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: circoncision
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; de même v. 12 (1.17+). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à eux aussi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant à cette formule d''insistance est absent de certains mss.'
    marker-yv: yv-n
  - type: text
    text: 'Il reçut le signe de la circoncision comme sceau de la justice qu''il avait obtenue par la foi quand il était incirconcis. Il est ainsi le père de tous ceux qui croient, tout en étant incirconcis, pour que la justice leur soit comptée à eux aussi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des circoncis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la circoncision
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: non pas de ceux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains traduisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'non seulement de ceux qui ont la circoncision, mais encore de ceux qui… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'marchent sur les traces '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2Co 12.18 ; 1P 2.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abraham, notre père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1+.
    marker-yv: yv-n
  - type: text
    text: Il est également le père des circoncis – non pas de ceux qui relèvent seulement de la circoncision, mais de ceux qui marchent sur les traces de la foi qu'avait Abraham, notre père, quand il était incirconcis.
- type: usfm
  marker: s1
  children:
