      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') d''Abraham comme une œuvre méritoire, cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '1 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.51s : « Souvenez-vous des actions accomplies par nos pères en leur temps… Abraham n''a-t-il pas été fidèle dans l''épreuve, et cela ne lui a-t-il pas été compté comme '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
      - type: text
        text: '  ? » '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Midrash
      - type: text
        text: ' Mekhilta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '35b (Ex 14.15) : « Suffisante fut la foi par laquelle Abraham, leur père, crut en moi pour que je leur fende la mer. » 40b (Ex 14.31) : « Pareillement Abraham reçut la possession de ce monde et du monde qui vient (cf. v. 13) uniquement par le mérite de la foi, par laquelle il crut en Dieu. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'lui fut compté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: imputé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme justice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. lui valut d''être considéré par Dieu comme un juste, d''avoir la faveur de Dieu ; le même verbe, qui revient tout au long de ce chapitre, est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tenir compte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 8 ; dans le reste de l''épître, on le retrouve, également traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'estimer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: considérer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', en 2.3,26 ; 3.28 ; 6.11 ; 8.18,36 ; 9.8 ; 14.14 ; autres emplois en Lc 22.37 ; Jn 11.50 ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se rendre compte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; Ac 19.27 ; 1Co 4.1 ; 13.5,11 (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: raisonner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; 2Co 3.5 ; 5.19 ; 10.2,7,11 ; 11.5 ; 12.6 ; Ga 3.6 ; Ph 3.13 ; 4.8 (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pensées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; 2Tm 4.16 ; Hé 11.19 ; Jc 2.23 ; 1P 5.12.
    marker-yv: yv-n
  - type: text
    text: 'en effet, que dit l''Ecriture ? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abraham crut Dieu, et cela lui fut compté comme justice
  - type: text
    text: '. '
  - type: usfm
    marker: v
