      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 9,22s ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Gn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.1-5 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cité d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ') ; Ga 3.6-9 ; cf. Ps 106.31 ; Jc 2.20-24. –  '
    - type: usfm
      marker: fq
