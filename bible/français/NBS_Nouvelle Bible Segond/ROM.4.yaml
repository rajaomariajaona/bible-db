      - type: text
        text: crut Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eut foi en Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le judaïsme considérait la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'foi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(les termes hébreu et grec correspondants peuvent aussi signifier '
    - type: usfm
      marker: fqa
