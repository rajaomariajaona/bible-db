    marker-yv: yv-n
  - type: text
    text: 'Si en effet Abraham a été justifié en vertu des œuvres, il a de quoi être fier. Mais devant Dieu il n''en est pas ainsi ; '
  - type: usfm
    marker: v
    metadata:
      v: '3'
