document_id: ROM.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'exemple d'Abraham
  - type: text
    content: ' '
  - type: note
    content: 'Les variantes de certains mss suggèrent la possibilité d''une autre traduction  : Que dirons-nous donc d''Abraham, notre père ? Qu''a-t-il obtenu selon la chair  ? –  Abraham Es 51.1s ; Mt 3.7-10. –  notre ancêtre ou notre père , selon les mss : voir v. 16. –  selon la chair  : cf. 1.3n  ; 9.3.'
  - type: text
    content: 'Que dirons-nous donc d''Abraham, notre ancêtre selon la chair ? Qu''a-t-il obtenu ? '
  '10':
  - type: note
    content: Litt. comment lui fut-elle comptée ? Etant dans la circoncision ou dans l'incirconcision ? (de même dans la suite). Cf. Gn 17.9-14 ; voir aussi Ga 3.7-9.
  - type: text
    content: 'Comment donc était-il lorsqu''elle lui fut comptée ? Etait-il circoncis ou incirconcis ? Il n''était pas circoncis, mais incirconcis. '
  '11':
  - type: note
    content: 'sceau  : c.-à-d. preuve, garantie  ; cf. Ep 1.13+. –  la justice…  : litt. la justice de la foi (qui est) dans l''incirconcision (voir circoncision ) ; de même v. 12 (1.17+). –  à eux aussi  : le terme correspondant à cette formule d''insistance est absent de certains mss.'
  - type: text
    content: 'Il reçut le signe de la circoncision comme sceau de la justice qu''il avait obtenue par la foi quand il était incirconcis. Il est ainsi le père de tous ceux qui croient, tout en étant incirconcis, pour que la justice leur soit comptée à eux aussi. '
  '12':
  - type: note
    content: 'des circoncis  : litt. de la circoncision. –  non pas de ceux…  : certains traduisent non seulement de ceux qui ont la circoncision, mais encore de ceux qui… –  marchent sur les traces 2Co 12.18 ; 1P 2.21. –  Abraham, notre père v. 1+.'
  - type: text
    content: Il est également le père des circoncis – non pas de ceux qui relèvent seulement de la circoncision, mais de ceux qui marchent sur les traces de la foi qu'avait Abraham, notre père, quand il était incirconcis.
  - type: heading
    content: La promesse de Dieu reçue par la foi
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'de la loi  : autre traduction d''une loi . –  héritier du monde v. 3n  ; Gn 12.2s ; 18.18 ; 22.17s ; Ga 3.15s ; Hé 11.7-12 ; voir aussi 2 Baruch 14.13 : « C''est pourquoi aussi ils (les justes) laissent ce monde sans crainte, dans la joyeuse confiance qu''ils recevront le monde que tu leur as promis. » 51.3 : « (Ils seront transformés) afin qu''ils puissent recevoir et accueillir le monde qui ne meurt pas et qui leur fut alors promis. » –  sa descendance  : cf. v. 18 ; Ac 3.25n  ; Ga 3.16,19. –  la justice de la foi  : autre traduction une justice de foi.'
  - type: text
    content: 'En effet, ce n''est pas au moyen de la loi que la promesse d''être héritier du monde a été faite à Abraham ou à sa descendance, c''est par la justice de la foi. '
  '14':
  - type: note
    content: Ga 3.18. –  vidée de son sens ou rendue inutile, litt. vidée, cf. 1Co 1.17n  ; 15.14n.
  - type: text
    content: 'Car si les héritiers sont ceux qui relèvent de la loi, la foi est vidée de son sens et la promesse est réduite à rien. '
  '15':
  - type: note
    content: 'loi / colère (de Dieu, 1.18+ ; 3.5+) : cf. 3.20 ; 5.13,20s ; 7.7-13 ; 1Co 15.56 ; Ga 3.10,19-22. –  produit  : le verbe grec est apparenté à celui qui est traduit par faire œuvre au v. 4n  ; cf. 2.9n. –  transgression  : voir péché.'
  - type: text
    content: En effet, la loi produit la colère ; et là où il n'y a pas de loi, il n'y a pas non plus de transgression.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'en vertu de la foi  : autre traduction en vertu d''une foi  ; la même expression est traduite plus loin par qui relèvent de la foi . – Voir grâce . –  se confirme  : litt. soit ferme , terme apparenté en 15.8n  ; cf. d''autres emplois de termes de la même famille en Mc 16.20 ; 1Co 1.6n  ; 2Co 1.7,21 ; Ph 1.7 ; Col 2.7 ; Hé 2.2n  ; 2P 1.10,19. –  toute la descendance v. 13 ; Ga 3.23-29. –  la foi d''Abraham  : autre traduction une foi d''Abraham . –  notre père à tous v. 1.'
  - type: text
    content: 'Donc c''est en vertu de la foi, pour qu''il s''agisse d''une grâce, afin que la promesse se confirme pour toute la descendance, non seulement pour ceux qui relèvent de la loi, mais aussi pour ceux qui relèvent de la foi d''Abraham – lequel est notre père à tous, '
  '17':
  - type: note
    content: 'Gn 17.5. –  Il l''est  : sous-entendu dans le texte. –  qui fait vivre les morts  : cf. Jn 5.21+ ; 2Co 1.9 ; Hé 11.19 ; voir aussi Dt 32.39 ; Ez 37.1-10. –  qui appelle…  : litt. qui appelle les choses qui ne sont pas comme étant.'
  - type: text
    content: 'ainsi qu''il est écrit : '
  - type: text
    content: J'ai fait de toi le père d'une multitude de nations
  - type: text
    content: . Il l'est devant le Dieu qu'il a cru, celui qui fait vivre les morts et qui appelle à l'existence ce qui n'existe pas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'contre toute espérance  : autre traduction au-delà de l''espérance . –  nations 1.5n  ; voir non-Juifs. –  Telle… Gn 15.5.'
  - type: text
    content: 'Espérant contre toute espérance, il a cru et il est ainsi devenu le père d''une multitude de nations, selon ce qui avait été dit : '
  - type: text
    content: Telle sera ta descendance
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'il considéra  : certains mss portent il ne considéra pas  ; autre traduction il considéra son propre corps comme déjà atteint par la mort. Le terme correspondant à déjà est absent de certains mss. – Cf. Gn 17.1,15-22 ; Hé 11.11s.'
  - type: text
    content: 'Sans faiblir dans la foi, il considéra son propre corps déjà atteint par la mort – il avait près de cent ans – et le ventre mort de Sara. '
  '2':
  - type: note
    content: des œuvres ou d'œuvres. –  de quoi être fier 2.17n.
  - type: text
    content: 'Si en effet Abraham a été justifié en vertu des œuvres, il a de quoi être fier. Mais devant Dieu il n''en est pas ainsi ; '
  '20':
  - type: note
    content: 'promesse Hé 6.13-15. –  n''hésita pas ou ne douta pas  ; 14.23 ; Mt 21.21/ /. –  rendu puissant dans la foi ou quant à la foi  ; cf. Mc 9.23s ; Hé 11.32-40. –  donna gloire à Dieu  : cf. Jos 7.19 ; 1S 6.5 ; Lc 17.18 ; Jn 9.24 ; Ac 12.23.'
  - type: text
    content: 'Mais face à la promesse de Dieu il n''hésita pas, dans un manque de foi ; au contraire, rendu puissant dans la foi, il donna gloire à Dieu, '
  '21':
  - type: note
    content: pleinement convaincu 14.5 ; Col 4.12. –  ce que Dieu (litt. ce qu'il) a promis… Gn 18.14 ; Jr 32.17-24 ; Lc 1.35-38.
  - type: text
    content: 'pleinement convaincu de ceci : ce que Dieu a promis, il a aussi le pouvoir de le faire. '
  '22':
  - type: note
    content: 'V. 3+. –  aussi  : le terme correspondant est absent de certains mss.'
  - type: text
    content: C'est aussi pourquoi cela lui fut compté comme justice.
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. 15.4 ; 1Co 9.10 ; 10.11.
  - type: text
    content: 'Mais ce n''est pas à cause de lui seul qu''il est écrit : '
  - type: text
    content: Cela lui fut compté,
  - type: text
    content: ' '
  '24':
  - type: note
    content: réveillé ou relevé  ; même verbe en 13.11 ; un verbe dérivé est traduit par susciter en 9.17 ; cf. 1.4n  ; voir aussi 8.11 ; 10.9 ; Ac 3.15n  ; Ep 1.20 ; 1P 1.21. Voir résurrection.
  - type: text
    content: 'c''est aussi à cause de nous, à qui cela va être compté, nous qui croyons en celui qui a réveillé d''entre les morts Jésus, notre Seigneur, '
  '25':
  - type: note
    content: 'livré pour (ou à cause de, même possibilité dans le second membre de phrase) nos fautes 5.15ss ; 11.11 ; voir aussi 8.32 ; Es 53.5s,10,12. –  réveillé (ou relevé, ressuscité) / justification  : cf. 5.18 ; 8.10 ; Jn 16.10 ; 1Co 15.17 ; Col 2.11-13 ; 1P 1.3.'
  - type: text
    content: qui a été livré pour nos fautes et réveillé pour notre justification.
  '3':
  - type: note
    content: 'V. 9,22s ; Gn 12.1-5 ; 15.6 (cité d''après LXX) ; Ga 3.6-9 ; cf. Ps 106.31 ; Jc 2.20-24. –  crut Dieu  : autre traduction eut foi en Dieu. Le judaïsme considérait la foi (les termes hébreu et grec correspondants peuvent aussi signifier fidélité, cf. 1.17n) d''Abraham comme une œuvre méritoire, cf. 1 Maccabées 2.51s : « Souvenez-vous des actions accomplies par nos pères en leur temps… Abraham n''a-t-il pas été fidèle dans l''épreuve, et cela ne lui a-t-il pas été compté comme justice  ? » Midrash Mekhilta 35b (Ex 14.15) : « Suffisante fut la foi par laquelle Abraham, leur père, crut en moi pour que je leur fende la mer. » 40b (Ex 14.31) : « Pareillement Abraham reçut la possession de ce monde et du monde qui vient (cf. v. 13) uniquement par le mérite de la foi, par laquelle il crut en Dieu. » –  lui fut compté (ou imputé) comme justice, c.-à-d. lui valut d''être considéré par Dieu comme un juste, d''avoir la faveur de Dieu ; le même verbe, qui revient tout au long de ce chapitre, est traduit par tenir compte au v. 8 ; dans le reste de l''épître, on le retrouve, également traduit par estimer ou considérer, en 2.3,26 ; 3.28 ; 6.11 ; 8.18,36 ; 9.8 ; 14.14 ; autres emplois en Lc 22.37 ; Jn 11.50 (se rendre compte) ; Ac 19.27 ; 1Co 4.1 ; 13.5,11 (raisonner) ; 2Co 3.5 ; 5.19 ; 10.2,7,11 ; 11.5 ; 12.6 ; Ga 3.6 ; Ph 3.13 ; 4.8 (pensées) ; 2Tm 4.16 ; Hé 11.19 ; Jc 2.23 ; 1P 5.12.'
  - type: text
    content: 'en effet, que dit l''Ecriture ? '
  - type: text
    content: Abraham crut Dieu, et cela lui fut compté comme justice
  - type: text
    content: '. '
  '4':
  - type: note
    content: 'qui fait œuvre ou qui travaille, selon le sens habituel du verbe grec ; 11.6 ; cf. Mt 20.1-16 ; Lc 17.7-11. –  le salaire  : le même mot peut aussi avoir le sens de récompense  ; cf. 1Co 3.8n. –  est compté…  : autre traduction possible n''est pas « compté », comme une grâce  : c''est un dû.'
  - type: text
    content: 'Or, à celui qui fait œuvre, le salaire est compté non comme une grâce, mais comme un dû. '
  '5':
  - type: note
    content: ne fait pas œuvre ou ne travaille pas  ; cf. Ga 5.6. –  justifie 3.24+. –  l'impie 5.6.
  - type: text
    content: 'Quant à celui qui ne fait pas œuvre, mais qui croit en celui qui justifie l''impie, sa foi lui est comptée comme justice. '
  '6':
  - type: text
    content: 'De même, David dit le bonheur de l''être humain à qui Dieu compte la justice en dehors des œuvres :'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 32.1s . –  les désordres  : litt. les (actes de) non-loi  ; le même mot est traduit par mal en 6.19 ; voir 2Th 2.3n,7. – Voir péchés . –  sont recouverts  : traduction littérale de l''expression hébraïque du Ps 32, qui signifie également sont pardonnés.'
  - type: text
    content: Heureux ceux dont les désordres sont pardonnés
  - type: text
    content: et dont les péchés sont recouverts !
  '8':
  - type: text
    content: ' '
  - type: text
    content: Heureux l'homme à qui le Seigneur ne tient aucun compte du péché !
  '9':
  - type: text
    content: ' '
  - type: note
    content: V. 3+.
  - type: text
    content: 'Ce bonheur n''est-il que pour les circoncis, ou également pour les incirconcis ? En effet, nous disons : Pour Abraham la foi fut comptée comme justice. '
