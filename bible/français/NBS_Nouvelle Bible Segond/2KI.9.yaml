        text: 'Que t''importe ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'quoi à toi et à la paix ? '
    - type: usfm
      marker: ft
      children:
