        text: de même au v. 19.
    marker-yv: yv-n
  - type: text
    text: 'Le cavalier alla à la rencontre de Jéhu et dit : Ainsi parle le roi : « Tout va bien ? » Et Jéhu répondit : Que t''importe ? Fais demi-tour et range-toi derrière moi. Le guetteur dit : Le messager est allé jusqu''à eux et ne revient pas. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: 'Il envoya un second cavalier qui arriva vers eux et dit : Ainsi parle le roi : « Tout va bien ? » Et Jéhu répondit : Que t''importe ? Fais demi-tour et range-toi derrière moi. '
  - type: usfm
