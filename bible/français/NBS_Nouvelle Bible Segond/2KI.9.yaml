document_id: 2KI.9
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jéhu est sacré roi d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
