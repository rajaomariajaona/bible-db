document_id: 2KI.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jéhu est sacré roi d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'l''un des prophètes  : litt. l''un des fils des prophètes , cf. 2.3n. –  fiole  : le mot hébreu ne se retrouve qu''en 1S 10.1 ; cf. 2R 4.2n.'
  - type: text
    content: 'Elisée, le prophète, appela l''un des prophètes et lui dit : Passe une ceinture à tes reins, prends cette fiole d''huile et va à Ramoth de Galaad. '
  '10':
  - type: note
    content: 'Cf. 1R 21.17-24. –  la parcelle de Jizréel  : sans doute celle qu''Achab avait volée à Naboth, 1R 21.2s,15s.'
  - type: text
    content: Les chiens mangeront Jézabel dans la parcelle de Jizréel, et il n'y aura personne pour l'ensevelir. Puis il ouvrit la porte et s'enfuit.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'on lui demanda  : plusieurs mss hébreux et des versions anciennes lisent ils demandèrent . –  Tout va bien ? litt. est-ce la paix ? cf. v. 17ss,22. –  ce fou  : terme apparenté au v. 20 ; les mots hébreux correspondants sont traduits ailleurs par délire, délirer  ; cf. Dt 28.28,34 ; 1S 21.15s ; Za 12.4 ; et, concernant les prophètes, en Jr 29.26 ; Os 9.7. –  et ses propos  : Syr a compris et sa folie.'
  - type: text
    content: 'Lorsque Jéhu sortit pour rejoindre les hommes de son seigneur, on lui demanda : Tout va bien ? Pourquoi ce fou est-il venu te voir ? Jéhu leur répondit : Vous connaissez bien l''homme et ses propos. '
  '12':
  - type: note
    content: Jéhu donne des faits une version conforme à l'ordre d'Elisée et se garde de rapporter tout ce qu'a ajouté le prophète.
  - type: text
    content: 'Mais ils répliquèrent : C''est faux ! Raconte-nous, s''il te plaît ! Il dit : Il m''a parlé de telle et telle manière ; il a dit : « Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je te confère l''onction pour que tu sois roi sur Israël ! » '
  '13':
  - type: note
    content: Cf. 1R 1.38-40 ; Mt 21.1-10/ /. –  en haut des marches ou à même les marches.
  - type: text
    content: 'Alors chacun d''eux se hâta de prendre son vêtement et de le placer sous Jéhu, en haut des marches ; ils sonnèrent de la trompe et dirent : Jéhu est roi !'
  - type: heading
    content: Jéhu tue Joram, roi d'Israël
  '14':
  - type: text
    content: 'Ainsi Jéhu, fils de Josaphat, fils de Nimshi, conspira contre Joram. – Or Joram et tout Israël gardaient Ramoth de Galaad contre Hazaël, roi d''Aram, '
  '15':
  - type: note
    content: 'Cf. 8.29. –  Si vous tenez à la vie  : litt. s''il y a votre vie ou votre être  ; certains mss portent une formule légèrement différente qu''on pourrait traduire si vous y consentez, comme en Gn 23.8 ; cf. 2R 10.15. –  que personne ne s''échappe  : litt. aucun rescapé ne sortira.'
  - type: text
    content: 'mais le roi Joram était revenu se faire soigner à Jizréel des blessures que les Araméens lui avaient infligées lorsqu''il combattait Hazaël, roi d''Aram. – Jéhu dit : Si vous tenez à la vie, que personne ne s''échappe de la ville pour aller porter la nouvelle à Jizréel ! '
  '16':
  - type: text
    content: Jéhu monta sur son char et partit pour Jizréel, car Joram y était alité, et Achazia, roi de Juda, était descendu pour voir Joram.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. chap. 1. –  cavalier  : autre traduction conducteur de char (terme apparenté au v. 16 ; même mot en 1R 22.34). –  Tout va bien ? autre traduction est-ce la paix ? c.-à-d. tes intentions sont-elles pacifiques ? même possibilité dans la suite (v. 18s,22 ; cf. v. 15).'
  - type: text
    content: 'Le guetteur placé sur la tour de Jizréel vit la foule qui arrivait avec Jéhu et dit : Je vois une foule. Joram dit : Prends un cavalier et envoie-le à leur rencontre. Qu''il dise : « Tout va bien ? » '
  '18':
  - type: note
    content: Tout va bien ? cf. v. 11,17n. –  Que t'importe ? litt. quoi à toi et à la paix ? de même au v. 19.
  - type: text
    content: 'Le cavalier alla à la rencontre de Jéhu et dit : Ainsi parle le roi : « Tout va bien ? » Et Jéhu répondit : Que t''importe ? Fais demi-tour et range-toi derrière moi. Le guetteur dit : Le messager est allé jusqu''à eux et ne revient pas. '
  '19':
  - type: text
    content: 'Il envoya un second cavalier qui arriva vers eux et dit : Ainsi parle le roi : « Tout va bien ? » Et Jéhu répondit : Que t''importe ? Fais demi-tour et range-toi derrière moi. '
  '2':
  - type: note
    content: 'fils de Josaphat  : texte absent de Syr et de certains mss grecs. –  dans une pièce retirée ou de pièce en pièce  ; il pourrait s''agir d''une pièce sans accès direct par l''extérieur ; cf. 1R 20.30n  ; 22.25/ /.'
  - type: text
    content: 'Là, tu iras voir Jéhu, fils de Josaphat, fils de Nimshi. Tu le feras lever du milieu de ses frères et tu le conduiras dans une pièce retirée. '
  '20':
  - type: note
    content: un fou v. 11n.
  - type: text
    content: 'Le guetteur dit : Il est allé jusqu''à eux et il ne revient pas, et la façon de conduire est celle de Jéhu, fils de Nimshi, car il conduit comme un fou.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'On attela  : litt. il attela  ; plusieurs versions anciennes portent des verbes au pluriel. –  dans la parcelle de Naboth  : cf. v. 10n.'
  - type: text
    content: 'Alors Joram dit : Attelle ! On attela son char. Joram, roi d''Israël, et Achazia, roi de Juda, sortirent chacun sur son char pour aller à la rencontre de Jéhu et ils le trouvèrent dans la parcelle de Naboth le Jizréélite. '
  '22':
  - type: note
    content: 'Tout va bien  : cf. v. 11n,17n. –  Comment cela irait-il bien, tant que…  : litt. quoi la paix tant que… –  sortilèges  : le terme d''origine akkadienne utilisé par Jéhu met Jézabel au rang des sorciers condamnés en Ex 22.17 ; Dt 18.10. Les accusations conjuguées de prostitution et de magie ne se retrouvent que contre Ninive en Na 3.4 ; sur la racine, cf. Ex 7.11 ; Es 47.9-12 ; Jr 27.9 ; Mi 5.11 ; Ml 3.5 ; Dn 2.2.'
  - type: text
    content: 'Dès que Joram vit Jéhu, il dit : Tout va bien, Jéhu ? Jéhu répondit : Comment cela irait-il bien, tant que durent la prostitution de ta mère Jézabel et ses multiples sortilèges ! '
  '23':
  - type: text
    content: 'Joram tourna bride et s''enfuit ; il dit à Achazia : Trahison, Achazia ! '
  '24':
  - type: note
    content: 'saisit son arc  : litt. remplit sa main de l''arc. –  entre les épaules  : litt. entre ses bras. –  sur son char  : en lisant un texte hébreu légèrement différent, LXX traduit sur ses genoux.'
  - type: text
    content: 'Mais Jéhu saisit son arc et frappa Joram entre les épaules : la flèche sortit par le cœur, et Joram s''affaissa sur son char. '
  '25':
  - type: note
    content: 'qui appartient à Naboth  : litt. de Naboth, cf. v. 21,36s. –  souviens-toi, lorsque moi et toi…  : LXX je me souviens lorsque toi…'
  - type: text
    content: 'Jéhu dit à Bidqar, son écuyer : Prends-le et jette-le dans la parcelle de terre qui appartient à Naboth le Jizréélite ; car, souviens-toi, lorsque moi et toi nous étions avec les équipages des chars d''Achab, son père, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononça contre lui cette sentence : '
  '26':
  - type: note
    content: 'Cf. 1R 21.21-29. –  Aussi vrai que j''ai vu  : litt. sinon (formule de serment sous-entendant une malédiction conditionnelle, cf. Es 5.9n), j''ai vu…  ; cf. Gn 4.10s. –  et le sang de ses fils  : 1R 21 ne mentionne pas la mort des fils de Naboth.'
  - type: text
    content: '« Aussi vrai que j''ai vu hier le sang de Naboth et le sang de ses fils – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – je te paierai de retour dans cette parcelle même ! – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '. » Maintenant prends-le et jette-le dans la parcelle, selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Jéhu fait tuer Achazia, roi de Juda
  - type: heading
    content: 2Ch 22.7-9
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Beth-Gân ( Maison [ou temple ] du jardin ) : également appelée Eïn-Gannim ( Source des jardins , en Jos 19.21 ; 21.29) et Anem (1Ch 6.58), cette ville est identifiée avec la cité moderne de Djenin, de l''autre côté du fleuve côtier Qishôn par rapport à Jizréel. –  abattez-le  : dans le texte hébreu traditionnel, l''indication du lieu semble faire partie de l''ordre donné par Jéhu ; LXX ils l''abattirent à la montée de Gour . Jéhu peut craindre qu''Achazia ne cherche à venger la mort de Joram, son beau-frère. –  sur le char  : précision absente ici (cf. v. 28) de certains mss de Syr et de Vg. –  montée de Gour  : ce lieu est évoqué dans une lettre datée du XVe s. av. J.-C. –  Yibléam  : à 25 km au nord de Sichem (= Naplouse) ; Jos 17.11 ; Jg 1.27.'
  - type: text
    content: 'Ayant vu cela, Achazia, roi de Juda, s''enfuit par le chemin de Beth-Gân. Jéhu le poursuivit et dit : Lui aussi, abattez-le sur le char à la montée de Gour, près de Yibléam. Il s''enfuit à Meguiddo, où il mourut. '
  '28':
  - type: note
    content: 'avec ses pères  : précision absente du texte de LXX. L''absence de la mention dans cette notice d''un successeur du roi laisserait entendre que la mort d''Achazia débouche sur une crise politique.'
  - type: text
    content: 'Ses serviteurs le transportèrent sur un char à Jérusalem et l''ensevelirent dans son tombeau, avec ses pères, dans la Ville de David. '
  '29':
  - type: note
    content: Cf. 8.25.
  - type: text
    content: Achazia était devenu roi de Juda la onzième année de Joram, fils d'Achab.
  - type: heading
    content: Jéhu fait tuer la reine Jézabel
  '3':
  - type: note
    content: 'Je te confère l''onction  : le verbe hébreu utilisé a donné le mot messie. Dans la Bible, trois rois sont oints par un prophète : Saül en 1S 10.1, David en 1S 16.13 et Jéhu ici ; aucun des trois n''est fils de roi.'
  - type: text
    content: 'Tu prendras la fiole d''huile que tu verseras sur sa tête, et tu diras : « Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je te confère l''onction pour que tu sois roi sur Israël ! » Puis tu ouvriras la porte et tu t''enfuiras sans attendre. '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'du fard  : cf. Jr 4.30 ; voir aussi Es 54.11n  ; Jb 42.14n. –  et regarda par la fenêtre  : même expression en Gn 26.8.'
  - type: text
    content: 'Jéhu entra dans Jizréel. Jézabel, l''ayant appris, mit du fard à ses yeux, arrangea sa coiffure et regarda par la fenêtre. '
  '31':
  - type: note
    content: 'à la porte  : LXX dans la ville. –  Zimri  : Jézabel compare Jéhu à Zimri qui a assassiné son seigneur, le roi Ela (cf. 1R 16.9s).'
  - type: text
    content: 'Comme Jéhu arrivait à la porte, elle dit : Tout va bien, Zimri, toi qui as assassiné ton seigneur ? '
  '32':
  - type: note
    content: 'le visage  : un ms hébreu, des mss de LXX et de Syr ont lu les yeux. –  Qui est avec moi ? LXX qui es-tu ? Descends jusqu''à moi. –  ou trois  : absent de LXX. –  eunuques  : autre traduction hauts fonctionnaires, cf. 8.6n.'
  - type: text
    content: 'Il leva le visage vers la fenêtre et dit : Qui est avec moi ? Qui ? Deux ou trois eunuques regardèrent d''en haut vers lui. '
  '33':
  - type: note
    content: 'Jéhu la foula aux pieds  : pour LXX, ce sont les chevaux qui piétinent le cadavre de Jézabel.'
  - type: text
    content: 'Il dit : Jetez-la dehors ! Ils la jetèrent dehors : le mur et les chevaux furent aspergés de son sang. Jéhu la foula aux pieds ; '
  '34':
  - type: note
    content: 'maudite  : voir bénédiction, malédiction. –  ensevelissez-la  : le fait qu''un cadavre ne soit pas enseveli est pour l''Orient ancien un signe de malédiction (Dt 21.23 ; Jos 8.29). Le nouveau roi d''Israël ne tient peut-être pas à offenser davantage son voisin le roi de Tyr, parent de la défunte. –  fille de roi  : cf. 1R 16.31.'
  - type: text
    content: 'puis il entra, mangea et but ; après quoi il dit : Occupez-vous de cette maudite, je vous prie, et ensevelissez-la : elle est fille de roi. '
  '35':
  - type: note
    content: 'les mains  : autre traduction les paumes des mains. – A la différence du roi de Juda dont le corps a été enseveli dans le tombeau de ses pères (v. 28), celui de Jézabel est dévoré par les chiens.'
  - type: text
    content: 'Ils allèrent l''ensevelir ; mais ils ne trouvèrent d''elle que le crâne, les pieds et les mains. '
  '36':
  - type: note
    content: Les chiens… v. 10 ; cf. 1R 21.23.
  - type: text
    content: 'Ils revinrent rapporter à Jéhu ce qu''ils avaient vu ; celui-ci dit : C''est la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a prononcée par l''intermédiaire d''Elie le Tishbite, son serviteur : « Les chiens mangeront la chair de Jézabel dans la parcelle de Jizréel. » '
  '37':
  - type: note
    content: 'fumier  : le terme correspondant apparaît en Jr 8.2+ ; Ps 83.11. –  dans les champs  : litt. sur la face de la campagne. –  dans la parcelle de Jizréel  : absent de certains mss de LXX.'
  - type: text
    content: 'Le cadavre de Jézabel deviendra comme du fumier dans les champs, dans la parcelle de Jizréel, de sorte qu''on ne pourra plus dire : C''est Jézabel.'
  '4':
  - type: note
    content: 'Le jeune homme, le jeune prophète  : le texte hébreu est difficile ; certains mss hébreux, LXX et Syr portent le jeune homme, le prophète  ; d''autres mss hébreux, Tg et Vg portent le jeune homme, serviteur du prophète.'
  - type: text
    content: 'Le jeune homme, le jeune prophète, partit pour Ramoth de Galaad. '
  '5':
  - type: note
    content: 'chefs  : le mot hébreu correspondant est parfois rendu par princes. –  installés  : autre traduction assis.'
  - type: text
    content: 'Quand il arriva, les chefs de l''armée étaient installés. Il dit : Chef, j''ai une parole pour toi. Jéhu dit : Pour lequel de nous tous ? Il répondit : Pour toi, chef. '
  '6':
  - type: note
    content: 'pour que tu sois roi  : litt. pour roi.'
  - type: text
    content: 'Jéhu entra dans la maison, et le jeune homme versa l''huile sur sa tête, en lui disant : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Je te confère l''onction pour que tu sois roi sur le peuple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', sur Israël. '
  '7':
  - type: note
    content: 'Le programme de gouvernement communiqué par le prophète n''était pas évoqué dans son ordre de mission au v. 3. –  Tu abattras  : litt. tu frapperas  ; LXX tu retrancheras. –  je vengerai le sang de mes serviteurs  : cf. Dt 32.43 ; Ps 79.10. –  je le ferai payer à Jézabel  : litt. de la main de Jézabel  ; on peut comprendre  : je vengerai le sang… de la main de Jézabel, c.-à-d. je lui en ferai rendre compte  ; ou bien le sang (qui a été versé) par la main de Jézabel.'
  - type: text
    content: 'Tu abattras la maison d''Achab, ton seigneur ; ainsi je vengerai le sang de mes serviteurs, les prophètes, et le sang de tous les serviteurs du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; je le ferai payer à Jézabel. '
  '8':
  - type: note
    content: 'Toute la maison d''Achab…  : LXX relie les premiers mots de ce v. à ce qui précède de la main de Jézabel et de la main de toute la maison d''Achab. –  je retrancherai  : LXX tu retrancheras. –  tout mâle  : litt. tous ceux qui urinent contre un mur  ; cf. 1S 25.22+,34 ; 1R 14.10n. –  l''esclave comme l''homme libre  : cf. 14.26 ; voir aussi Dt 32.36n  ; 1R 14.10n.'
  - type: text
    content: 'Toute la maison d''Achab disparaîtra ; je retrancherai de chez Achab tout mâle, l''esclave comme l''homme libre en Israël, '
  '9':
  - type: note
    content: 'la maison de Jéroboam  : cf. 1R 14.11 ; 15.29s. –  la maison de Basha  : cf. 1R 16.3s,11-13.'
  - type: text
    content: 'et je rendrai la maison d''Achab semblable à la maison de Jéroboam, fils de Nebath, et à la maison de Basha, fils d''Ahiya. '
