          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le guetteur dit : Il est allé jusqu''à eux et il ne revient pas, et la façon de conduire est celle de Jéhu, fils de Nimshi, car il conduit comme un fou.'
