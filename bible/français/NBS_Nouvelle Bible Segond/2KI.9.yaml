  - type: text
    text: 'mais le roi Joram était revenu se faire soigner à Jizréel des blessures que les Araméens lui avaient infligées lorsqu''il combattait Hazaël, roi d''Aram. – Jéhu dit : Si vous tenez à la vie, que personne ne s''échappe de la ville pour aller porter la nouvelle à Jizréel ! '
