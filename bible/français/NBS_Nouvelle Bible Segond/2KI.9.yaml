  - type: text
    text: 'Le guetteur placé sur la tour de Jizréel vit la foule qui arrivait avec Jéhu et dit : Je vois une foule. Joram dit : Prends un cavalier et envoie-le à leur rencontre. Qu''il dise : « Tout va bien ? » '
  - type: usfm
    marker: v
