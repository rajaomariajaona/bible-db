  - type: text
    text: 'Ayant vu cela, Achazia, roi de Juda, s''enfuit par le chemin de Beth-Gân. Jéhu le poursuivit et dit : Lui aussi, abattez-le sur le char à la montée de Gour, près de Yibléam. Il s''enfuit à Meguiddo, où il mourut. '
