  - type: text
    text: 'Alors Joram dit : Attelle ! On attela son char. Joram, roi d''Israël, et Achazia, roi de Juda, sortirent chacun sur son char pour aller à la rencontre de Jéhu et ils le trouvèrent dans la parcelle de Naboth le Jizréélite. '
