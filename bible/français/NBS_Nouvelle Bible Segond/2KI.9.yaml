  - type: text
    text: 'Jéhu dit à Bidqar, son écuyer : Prends-le et jette-le dans la parcelle de terre qui appartient à Naboth le Jizréélite ; car, souviens-toi, lorsque moi et toi nous étions avec les équipages des chars d''Achab, son père, le '
  - type: usfm
