  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''un des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''un des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' des prophètes'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 2.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fiole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le mot hébreu ne se retrouve qu''en 1S 10.1 ; cf. 2R 4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Elisée, le prophète, appela l''un des prophètes et lui dit : Passe une ceinture à tes reins, prends cette fiole d''huile et va à Ramoth de Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fils de Josaphat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' et de certains mss grecs. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans une pièce retirée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de pièce en pièce
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il pourrait s''agir d''une pièce sans accès direct par l''extérieur ; cf. 1R 20.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 22.25/ /.'
    marker-yv: yv-n
  - type: text
    text: 'Là, tu iras voir Jéhu, fils de Josaphat, fils de Nimshi. Tu le feras lever du milieu de ses frères et tu le conduiras dans une pièce retirée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Je te confère '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe hébreu utilisé a donné le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: messie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Dans la Bible, trois rois sont oints par un prophète : Saül en 1S 10.1, David en 1S 16.13 et Jéhu ici ; aucun des trois n''est fils de roi.'
    marker-yv: yv-n
  - type: text
    text: 'Tu prendras la fiole d''huile que tu verseras sur sa tête, et tu diras : « Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je te confère l''onction pour que tu sois roi sur Israël ! » Puis tu ouvriras la porte et tu t''enfuiras sans attendre. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le jeune homme, le jeune prophète
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le texte hébreu est difficile ; certains mss hébreux, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et Syr portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le jeune homme, le prophète
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; d''autres mss hébreux, '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le jeune homme, serviteur du prophète.
    marker-yv: yv-n
  - type: text
    text: 'Le jeune homme, le jeune prophète, partit pour Ramoth de Galaad. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chefs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant est parfois rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: princes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: installés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: assis.
    marker-yv: yv-n
  - type: text
    text: 'Quand il arriva, les chefs de l''armée étaient installés. Il dit : Chef, j''ai une parole pour toi. Jéhu dit : Pour lequel de nous tous ? Il répondit : Pour toi, chef. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour que tu sois roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour roi.
    marker-yv: yv-n
  - type: text
    text: 'Jéhu entra dans la maison, et le jeune homme versa l''huile sur sa tête, en lui disant : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël : Je te confère l''onction pour que tu sois roi sur le peuple du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', sur Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le programme de gouvernement communiqué par le prophète n''était pas évoqué dans son ordre de mission au v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu abattras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu frapperas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu retrancheras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je vengerai le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' de mes serviteurs'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 32.43 ; Ps 79.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je le ferai payer à Jézabel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la main de Jézabel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on peut comprendre'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je vengerai le sang… de la main de Jézabel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je lui en ferai rendre compte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ou bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le sang (qui a été versé) par la main de Jézabel.
    marker-yv: yv-n
  - type: text
    text: 'Tu abattras la maison d''Achab, ton seigneur ; ainsi je vengerai le sang de mes serviteurs, les prophètes, et le sang de tous les serviteurs du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; je le ferai payer à Jézabel. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Toute la maison d'Achab…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX relie les premiers mots de ce v. à ce qui précède '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de la main de Jézabel et de la main de toute la maison d'Achab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je retrancherai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu retrancheras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout mâle
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tous ceux qui urinent contre un mur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1S 25.22+,34 ; 1R 14.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'esclave comme l'homme libre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.26 ; voir aussi Dt 32.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1R 14.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Toute la maison d''Achab disparaîtra ; je retrancherai de chez Achab tout mâle, l''esclave comme l''homme libre en Israël, '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison de Jéroboam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 14.11 ; 15.29s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la maison de Basha
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 16.3s,11-13.'
    marker-yv: yv-n
  - type: text
    text: 'et je rendrai la maison d''Achab semblable à la maison de Jéroboam, fils de Nebath, et à la maison de Basha, fils d''Ahiya. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1R 21.17-24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la parcelle de Jizréel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sans doute celle qu''Achab avait volée à Naboth, 1R 21.2s,15s.'
    marker-yv: yv-n
  - type: text
    text: Les chiens mangeront Jézabel dans la parcelle de Jizréel, et il n'y aura personne pour l'ensevelir. Puis il ouvrit la porte et s'enfuit.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on lui demanda
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : plusieurs mss hébreux et des versions anciennes lisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils demandèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tout va bien ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'est-ce la paix ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'cf. v. 17ss,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce fou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : terme apparenté au v. 20 ; les mots hébreux correspondants sont traduits ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: délire, délirer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. Dt 28.28,34 ; 1S 21.15s ; Za 12.4 ; et, concernant les prophètes, en Jr 29.26 ; Os 9.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et ses propos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : Syr a compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et sa folie.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Jéhu sortit pour rejoindre les hommes de son seigneur, on lui demanda : Tout va bien ? Pourquoi ce fou est-il venu te voir ? Jéhu leur répondit : Vous connaissez bien l''homme et ses propos. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jéhu donne des faits une version conforme à l'ordre d'Elisée et se garde de rapporter tout ce qu'a ajouté le prophète.
    marker-yv: yv-n
  - type: text
    text: 'Mais ils répliquèrent : C''est faux ! Raconte-nous, s''il te plaît ! Il dit : Il m''a parlé de telle et telle manière ; il a dit : « Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Je te confère l''onction pour que tu sois roi sur Israël ! » '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 1R 1.38-40 ; Mt 21.1-10/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en haut des marches '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à même les marches.
    marker-yv: yv-n
  - type: text
    text: 'Alors chacun d''eux se hâta de prendre son vêtement et de le placer sous Jéhu, en haut des marches ; ils sonnèrent de la trompe et dirent : Jéhu est roi !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jéhu tue Joram, roi d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ainsi Jéhu, fils de Josaphat, fils de Nimshi, conspira contre Joram. – Or Joram et tout Israël gardaient Ramoth de Galaad contre Hazaël, roi d''Aram, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
