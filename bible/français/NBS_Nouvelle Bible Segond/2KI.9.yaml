      - type: text
        text: avec ses pères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : précision absente du texte de LXX. L''absence de la mention dans cette notice d''un successeur du roi laisserait entendre que la mort d''Achazia débouche sur une crise politique.'
    marker-yv: yv-n
  - type: text
    text: 'Ses serviteurs le transportèrent sur un char à Jérusalem et l''ensevelirent dans son tombeau, avec ses pères, dans la Ville de David. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.29 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 8.25.
    marker-yv: yv-n
  - type: text
    text: Achazia était devenu roi de Juda la onzième année de Joram, fils d'Achab.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jéhu fait tuer la reine Jézabel
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du fard
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Jr 4.30 ; voir aussi Es 54.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jb 42.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et regarda par la fenêtre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même expression en Gn 26.8.'
    marker-yv: yv-n
  - type: text
    text: 'Jéhu entra dans Jizréel. Jézabel, l''ayant appris, mit du fard à ses yeux, arrangea sa coiffure et regarda par la fenêtre. '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à la porte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Zimri
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Jézabel compare Jéhu à Zimri qui a assassiné son seigneur, le roi Ela (cf. 1R 16.9s).'
    marker-yv: yv-n
  - type: text
    text: 'Comme Jéhu arrivait à la porte, elle dit : Tout va bien, Zimri, toi qui as assassiné ton seigneur ? '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le visage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un ms hébreu, des mss de LXX et de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les yeux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Qui est avec moi ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui es-tu ? Descends jusqu'à moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ou trois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: eunuques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hauts fonctionnaires
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 8.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il leva le visage vers la fenêtre et dit : Qui est avec moi ? Qui ? Deux ou trois eunuques regardèrent d''en haut vers lui. '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jéhu la foula aux pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : pour LXX, ce sont les chevaux qui piétinent le cadavre de Jézabel.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Jetez-la dehors ! Ils la jetèrent dehors : le mur et les chevaux furent aspergés de son sang. Jéhu la foula aux pieds ; '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maudite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ', malédiction. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ensevelissez-la
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le fait qu''un cadavre ne soit pas enseveli est pour l''Orient ancien un signe de malédiction (Dt 21.23 ; Jos 8.29). Le nouveau roi d''Israël ne tient peut-être pas à offenser davantage son voisin le roi de Tyr, parent de la défunte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fille de roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1R 16.31.'
    marker-yv: yv-n
  - type: text
    text: 'puis il entra, mangea et but ; après quoi il dit : Occupez-vous de cette maudite, je vous prie, et ensevelissez-la : elle est fille de roi. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les mains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les paumes des mains
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . – A la différence du roi de Juda dont le corps a été enseveli dans le tombeau de ses pères (v. 28), celui de Jézabel est dévoré par les chiens.
    marker-yv: yv-n
  - type: text
    text: 'Ils allèrent l''ensevelir ; mais ils ne trouvèrent d''elle que le crâne, les pieds et les mains. '
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Les chiens… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 10 ; cf. 1R 21.23.
    marker-yv: yv-n
  - type: text
    text: 'Ils revinrent rapporter à Jéhu ce qu''ils avaient vu ; celui-ci dit : C''est la parole que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a prononcée par l''intermédiaire d''Elie le Tishbite, son serviteur : « Les chiens mangeront la chair de Jézabel dans la parcelle de Jizréel. » '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fumier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme correspondant apparaît en Jr 8.2+ ; Ps 83.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans les champs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur la face de la campagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans la parcelle de Jizréel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de certains mss de LXX.'
    marker-yv: yv-n
  - type: text
    text: 'Le cadavre de Jézabel deviendra comme du fumier dans les champs, dans la parcelle de Jizréel, de sorte qu''on ne pourra plus dire : C''est Jézabel.'
