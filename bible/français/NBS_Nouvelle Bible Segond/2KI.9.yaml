      - type: text
        text: '  : le terme d''origine akkadienne utilisé par Jéhu met Jézabel au rang des sorciers condamnés en Ex 22.17 ; Dt 18.10. Les accusations conjuguées de prostitution et de magie ne se retrouvent que contre Ninive en Na 3.4 ; sur la racine, cf. Ex 7.11 ; Es 47.9-12 ; Jr 27.9 ; Mi 5.11 ; Ml 3.5 ; Dn 2.2.'
    marker-yv: yv-n
  - type: text
    text: 'Dès que Joram vit Jéhu, il dit : Tout va bien, Jéhu ? Jéhu répondit : Comment cela irait-il bien, tant que durent la prostitution de ta mère Jézabel et ses multiples sortilèges ! '
  - type: usfm
    marker: v
