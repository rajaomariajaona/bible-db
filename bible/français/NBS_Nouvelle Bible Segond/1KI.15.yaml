document_id: 1KI.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Abiyam, roi de Juda
  - type: heading
    content: 2Ch 13.1-3
  - type: text
    content: ' '
  - type: note
    content: 'La dix-huitième année…  : cf. 14.21. –  Abiyam 14.31n.'
  - type: text
    content: 'La dix-huitième année du roi Jéroboam, fils de Nebath, Abiyam devint roi sur Juda. '
  '10':
  - type: note
    content: 'quarante et un ans  : jusqu''à 870 av. J.-C. environ. –  Maaka  : LXX Ana  ; cf. v. 2n.'
  - type: text
    content: 'Il régna quarante et un ans à Jérusalem. Le nom de sa mère était Maaka, fille d''Abishalom. '
  '11':
  - type: note
    content: ce qui convenait au Seigneur v. 5+.
  - type: text
    content: 'Asa fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme David, son père. '
  '12':
  - type: note
    content: 'les prostitués sacrés 14.24n. –  les idoles  : la racine hébraïque du mot fait penser qu''il s''agit d''une sculpture, en fait d''une idole. Les voyelles employées ici seraient celles d''un mot signifiant fumier. Même phénomène en 21.26 ; Lv 26.30n  ; Dt 29.16 ; 2R 17.12 ; Jr 50.2 ; Ez 6.4 ; 14.3 etc.'
  - type: text
    content: Il fit disparaître du pays les prostitués sacrés, et il supprima toutes les idoles que ses pères avaient faites.
  - type: heading
    content: 2Ch 15.16-18
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'il lui retira  : le même verbe hébreu est traduit par supprimer au v. 12. –  grande dame  : litt. puissante , 11.19n  ; voir aussi 2.19+. –  une idole  : autre traduction une horreur . Le mot hébreu correspondant n''apparaît qu''ici et dans 2Ch 15.16. –  Ashéra  : cf. Jg 3.7n  ; voir aussi Baal. –  abattit  : litt. coupa . –  l''oued Cédron 2.37n.'
  - type: text
    content: 'Quant à Maaka, sa mère, il lui retira la dignité de grande dame, parce qu''elle avait fait une idole pour l''Ashéra. Asa abattit son idole et la brûla dans l''oued Cédron. '
  '14':
  - type: note
    content: 'Voir hauts lieux. –  le cœur… fût tout entier  : cf. v. 3n.'
  - type: text
    content: 'Mais les hauts lieux ne disparurent pas, quoique le cœur d''Asa fût tout entier avec le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pendant tous ses jours. '
  '15':
  - type: note
    content: '7.51n. –  consacré  : voir saint.'
  - type: text
    content: 'Il apporta à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ce que son père avait consacré et ce qu''il avait lui-même consacré, de l''argent, de l''or et divers objets.'
  - type: heading
    content: 2Ch 16.1-6
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Basha  : la signification de ce nom, attesté dans une inscription néo-punique, est inconnue.'
  - type: text
    content: 'Il y eut guerre entre Asa et Basha, roi d''Israël, pendant tous leurs jours. '
  '17':
  - type: note
    content: 'Il bâtit  : c.-à-d. il fortifia, de même dans la suite et en 2Ch 16.1ss ; cf. 1R 12.25n. –  Rama  : Elevée  ; poste militaire, à 8 km au nord de Jérusalem, cf. 1S 1.1. –  pour barrer la route à Asa  : litt. pour ne pas laisser de sortant et d''entrant pour Asa, c.-à-d., sans doute, pour faire obstacle à ses campagnes militaires  ; d''autres comprennent pour ne laisser personne aller et venir vers Asa  ; cf. Nb 27.17n  ; 1S 18.5n.'
  - type: text
    content: 'Basha, roi d''Israël, partit à l''attaque de Juda. Il bâtit Rama, pour barrer la route à Asa, roi de Juda. '
  '18':
  - type: note
    content: 'qui étaient restés après le pillage, cf. 14.26. –  Ben-Hadad  : il s''agit de Ben-Hadad Ier, dont on trouve le nom sur une stèle dressée en l''honneur du dieu Melqart vers 860 av. J.-C. Plusieurs rois de Damas portent ce nom : Ben-Hadad II (20.1-34 ; 2R 6.24 ; 8.7,9,14ss), Ben-Hadad III (2R 13.24ss).'
  - type: text
    content: 'Asa prit tout l''argent et tout l''or qui étaient restés dans les trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les trésors de la maison du roi ; et il les confia aux gens de sa cour. Puis le roi Asa les envoya à Ben-Hadad, fils de Tabrimmôn, fils de Héziôn, roi d''Aram, qui habitait à Damas, pour lui dire : '
  '19':
  - type: text
    content: 'Il y a alliance entre moi et toi, entre mon père et ton père. Je t''envoie de l''argent et de l''or en présent. Va, romps ton alliance avec Basha, roi d''Israël, afin qu''il s''éloigne de moi. '
  '2':
  - type: note
    content: 'Le nom de sa mère  : cf. v. 10 ; voir aussi 2Ch 13.2n. –  Abishalom ou Absalom, d''après 2Ch 11.20s.'
  - type: text
    content: 'Il régna trois ans à Jérusalem. Le nom de sa mère était Maaka, fille d''Abishalom. '
  '20':
  - type: note
    content: 'mit à mal  : litt. frappa  ; Syr, Vg et des mss de LXX portent le pluriel comme en 2Ch 16.4. –  Iyôn, Dan, Abel-Beth-Maaka  : villes situées au nord du royaume d''Israël. –  Kinroth ou Kinnereth, cf. Jos 11.2n  ; 13.27.'
  - type: text
    content: 'Ben-Hadad écouta le roi Asa ; il envoya les chefs de ses soldats contre les villes d''Israël et mit à mal Iyôn, Dan, Abel-Beth-Maaka, tout Kinroth, en plus de tout le pays de Nephtali. '
  '21':
  - type: note
    content: 'cessa de bâtir  : cf. v. 17n. –  Rama v. 17n. –  resta  : LXX il revint (en lisant d''autres voyelles). –  Tirtsa 14.17n  ; capitale du royaume du Nord jusqu''à la fondation de Samarie (16.24).'
  - type: text
    content: 'Lorsque Basha l''apprit, il cessa de bâtir Rama et resta à Tirtsa. '
  '22':
  - type: note
    content: 'pour bâtir Rama  : cf. v. 17n,21. –  Guéba ou Guibéa, Jos 18.24n. –  le Mitspa (Poste de guet) : plusieurs sites portent ce nom. Ici, il s''agit du Mitspa de Benjamin, à 13 km au nord de Jérusalem. Cf. Jg 20.1-3.'
  - type: text
    content: Alors le roi Asa fit appel à tout Juda, sans exempter personne, afin d'emporter les pierres et le bois que Basha employait pour bâtir Rama ; et le roi Asa s'en servit pour bâtir Guéba de Benjamin et le Mitspa.
  - type: heading
    content: 2Ch 16.11–17.1
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'le reste de l''histoire… 11.41n. –  le livre des chroniques des rois de Juda 14.19n. –  les jambes  : autre traduction les pieds  ; cf. 2S 4.4n.'
  - type: text
    content: 'Tout le reste de l''histoire d''Asa, toute sa vaillance, tout ce qu''il a fait, et les villes qu''il a bâties, cela est écrit dans le livre des chroniques des rois de Juda. Toutefois, au temps de sa vieillesse, il eut les jambes malades. '
  '24':
  - type: note
    content: 'se coucha avec ses pères 1.21n. –  Ville de David  : voir 2S 5.7. –  Josaphat…  : cf. 2Ch 17.1.'
  - type: text
    content: Asa se coucha avec ses pères et il fut enseveli avec ses pères dans la Ville de David, son père. Josaphat, son fils, devint roi à sa place.
  - type: heading
    content: Nadab, roi d'Israël
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Nadab (ce nom signifie volontaire ou généreux ) , fils de Jéroboam  : cf. 14.20+. –  Il régna deux ans… ≈ 910-909 av. J.-C.'
  - type: text
    content: 'Nadab, fils de Jéroboam, devint roi sur Israël, la deuxième année d''Asa, roi de Juda. Il régna deux ans sur Israël. '
  '26':
  - type: note
    content: 'Il fit ce qui déplaisait au Seigneur 11.6n  ; Nb 22.34n. –  suivit la voie de son père  : cf. 22.53 ; 2Ch 20.32. –  le péché…  : tel est le jugement que le livre des Rois portera sur le règne de tous les souverains du royaume du Nord, sans exception ; voir 12.28-31.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il suivit la voie de son père et le péché qu''il avait fait commettre à Israël. '
  '27':
  - type: note
    content: 'Basha v. 16n-22. –  Guibbetôn  : ville située probablement à l''ouest de Guézer, dans la plaine côtière. Cf. 16.15 ; Jos 19.44.'
  - type: text
    content: 'Basha, fils d''Ahiya, de la maison d''Issacar, conspira contre lui, et Basha l''abattit à Guibbetôn, qui appartenait aux Philistins, pendant que Nadab et tout Israël assiégeaient Guibbetôn. '
  '28':
  - type: text
    content: 'Basha le mit à mort la troisième année d''Asa, roi de Juda, et il devint roi à sa place. '
  '29':
  - type: note
    content: 'il abattit ou il frappa…  : cf. 16.11s ; Jg 9.5 ; 2R 10.1-17 ; 11.1. –  aucun être vivant  : litt. aucun souffle (cf. Gn 2.7n). –  Ahiya de Silo 14.14n.'
  - type: text
    content: 'Lorsqu''il fut roi, il abattit toute la maison de Jéroboam : il ne laissa aucun être vivant à Jéroboam ; il le fit disparaître, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite par l''intermédiaire de son serviteur Ahiya de Silo, '
  '3':
  - type: note
    content: 'Il se livra à tous les péchés  : litt. il alla dans… –  son cœur…  : cf. v. 14 ; 8.61 ; 11.4 ; voir aussi 2R 20.3 ; Es 38.3 ; 1Ch 28.9 ; 29.9 ; 2Ch 15.17 ; 16.9 ; 19.9 ; 25.2.'
  - type: text
    content: 'Il se livra à tous les péchés que son père avait commis avant lui ; son cœur ne fut pas tout entier avec le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, comme l''avait été le cœur de David, son père. '
  '30':
  - type: text
    content: 'à cause des péchés que Jéroboam avait commis et qu''il avait fait commettre à Israël, contrariant ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 11.41n. –  le livre des chroniques des rois d'Israël 14.19n.
  - type: text
    content: 'Le reste de l''histoire de Nadab, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '32':
  - type: note
    content: 'Il y eut la guerre…  : absent de LXX.'
  - type: text
    content: Il y eut la guerre entre Asa et Basha, roi d'Israël, pendant tous leurs jours.
  - type: heading
    content: Basha, roi d'Israël
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'sur tout Israël  : LXX a simplement sur Israël . –  vingt-quatre ans ≈ 909-886 av. J.-C.'
  - type: text
    content: 'La troisième année d''Asa, roi de Juda, Basha, fils d''Ahiya, devint roi sur tout Israël à Tirtsa pour vingt-quatre ans. '
  '34':
  - type: note
    content: 'fit ce qui déplaisait au Seigneur  : cf. v. 26+ ; 11.6n  ; Nb 22.34n.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et suivit la voie de Jéroboam et le péché qu''il avait fait commettre à Israël.'
  '4':
  - type: note
    content: 'à cause de David  : cf. 11.12-13n. –  une lampe 11.36n. –  son fils  : LXX ses fils.'
  - type: text
    content: 'Mais à cause de David, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, lui donna une lampe à Jérusalem, en installant son fils après lui et en laissant subsister Jérusalem. '
  '5':
  - type: note
    content: 'ce qui convenait au Seigneur  : cf. v. 11 ; 11.33 ; 14.8n  ; Ex 15.26 ; Dt 6.18 ; 12.25 ; 13.19 ; 21.9 ; Jr 34.15. –  Urie, le Hittite  : voir 2S 11–12. Cette réserve est omise dans plusieurs mss de LXX.'
  - type: text
    content: 'Car David avait fait ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; tous les jours de sa vie il ne s''était pas écarté de tout ce qu''il lui avait ordonné, excepté dans l''affaire d''Urie, le Hittite. '
  '6':
  - type: note
    content: 'Il y eut guerre…  : cf. 14.30. –  Roboam  : certains mss portent Abiyam. –  de sa vie  : dans l''état actuel du texte, il faudrait comprendre : celle de Roboam (cf. v. 7). Plusieurs mss de LXX omettent l''ensemble du v.'
  - type: text
    content: Il y eut guerre entre Roboam et Jéroboam, tous les jours de sa vie.
  - type: heading
    content: 2Ch 13.22-23
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Le reste de l''histoire… 11.41n. –  le livre des chroniques des rois de Juda 14.19n. –  Il y eut guerre…  : cf. 2Ch 13.2-20.'
  - type: text
    content: 'Le reste de l''histoire d''Abiyam, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. Il y eut guerre entre Abiyam et Jéroboam. '
  '8':
  - type: note
    content: 'se coucha avec ses pères 1.21n. –  Ville de David  : voir 2S 5.7. –  Asa  : l''étymologie de ce nom est incertaine ; on l''a rapproché de l''akkadien asou, qui signifie médecin.'
  - type: text
    content: Abiyam se coucha avec ses pères, et on l'ensevelit dans la Ville de David. Asa, son fils, devint roi à sa place.
  - type: heading
    content: Asa, roi de Juda
  - type: heading
    content: 2Ch 14.1-2
  '9':
  - type: text
    content: ' '
  - type: note
    content: La vingtième année de Jéroboam ≈ 911 av. J.-C.
  - type: text
    content: 'La vingtième année de Jéroboam, roi d''Israël, Asa devint roi de Juda. '
