document_id: 2CH.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias organise le service du temple
  - type: text
    content: ' '
  - type: note
    content: '2R 18.4. –  tous les gens d''Israël  : litt. tout Israël.'
  - type: text
    content: Lorsque tout cela fut terminé, tous les gens d'Israël qui étaient présents partirent pour les villes de Juda ; ils brisèrent les pierres levées, abattirent les poteaux cultuels (les ashéras) et démolirent les hauts lieux et les autels de tout Juda et Benjamin ainsi que dans Ephraïm et Manassé. Puis tous les Israélites revinrent dans leurs villes, chacun dans sa propriété.
  '10':
  - type: note
    content: 'Azaria  : hébreu ‘Azaryahou, cf. v. 13 ; 1R 4.2n. –  prêtre en chef  : cf. Esd 7.5n. – Voir bénédiction.'
  - type: text
    content: 'Alors Azaria, le prêtre en chef de la maison de Tsadoq, lui répondit : Depuis qu''on a commencé d''apporter le prélèvement dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', il y a eu de quoi manger et se rassasier, tout en laissant un surplus considérable, car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a béni son peuple ; quant au surplus, c''est cet amoncellement que voici.'
  '11':
  - type: text
    content: 'Ezéchias ordonna de préparer des salles dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; on les prépara. '
  '12':
  - type: note
    content: avec probité v. 15,18 ; 19.9n.
  - type: text
    content: 'On y apporta avec probité le prélèvement, la dîme et les offrandes sacrées. Le chef Konania, lévite, en assurait l''intendance avec Shiméi, son frère, comme second. '
  '13':
  - type: note
    content: 'Azazia / Yismakia / Benaya / Konania  : hébreu ‘Azazyahou / Yismakyahou / Benayahou / Konanyahou  ; voir Jg 17.1n.'
  - type: text
    content: 'Yehiel, Azazia, Nahath, Asaël, Yerimoth, Yozabad, Eliel, Yismakia, Mahath et Benaya étaient inspecteurs sous la direction de Konania et de Shiméi, son frère, par disposition du roi Ezéchias et d''Azaria, chef de la maison de Dieu. '
  '14':
  - type: text
    content: 'Le lévite Coré, fils de Yimna, portier à l''est, avait l''intendance des dons volontaires faits à Dieu, pour distribuer le prélèvement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les choses très sacrées. '
  '15':
  - type: text
    content: 'Dans les villes des prêtres, Eden, Minyamîn, Josué, Shemaya, Amaria et Shekania étaient placés à ses côtés pour faire avec probité les distributions à leurs frères, grands et petits, d''après leurs classes, '
  '16':
  - type: text
    content: 'non seulement aux mâles enregistrés depuis l''âge de trois ans et au-dessus, mais à tous ceux qui entraient selon l''ordre de chaque jour dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour faire leur service d''après leurs postes, selon leurs classes ; '
  '17':
  - type: note
    content: 'famille par famille  : litt. pour leurs maisons paternelles, voir 1Ch 7.7,9,40.'
  - type: text
    content: 'aux prêtres enregistrés famille par famille, et aux lévites depuis l''âge de vingt ans et au-dessus, d''après leurs postes et leurs classes, '
  '18':
  - type: note
    content: 'leurs familles… 20.13n. –  aux choses sacrées  : autre traduction au sanctuaire.'
  - type: text
    content: 'à tous ceux de l''assemblée qui avaient été enregistrés, avec toutes leurs familles, leurs femmes, leurs fils et leurs filles, car ils se consacraient avec probité aux choses sacrées. '
  '19':
  - type: note
    content: 'fils d''Aaron  : Ex 28.1. –  à tous les lévites enregistrés  : litt. à tous les enregistrés parmi les lévites.'
  - type: text
    content: Pour les fils d'Aaron, les prêtres qui étaient dans la campagne, aux abords de leurs villes, il y avait dans chaque ville des hommes désignés par leur nom pour distribuer les parts à tous les mâles parmi les prêtres et à tous les lévites enregistrés.
  '2':
  - type: text
    content: ' '
  - type: note
    content: les holocaustes et les sacrifices de paix 7.7 ; 29.35 ; 31.2 ; 1Ch 16.1 ; 21.26.
  - type: text
    content: 'Ezéchias installa les classes des prêtres et des lévites, d''après leurs classes, chacun selon son service, prêtres et lévites pour les holocaustes et les sacrifices de paix, pour officier, pour les célébrations et les louanges, aux portes du camp du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: text
    content: 'Voilà ce que fit Ezéchias dans tout Juda ; il agit selon le bien, la droiture et la loyauté devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. '
  '21':
  - type: note
    content: 'de tout son cœur 1R 8.23+. –  il réussit  : autre traduction il prospéra  ; même verbe en 32.30.'
  - type: text
    content: Dans toute l'œuvre qu'il avait entreprise pour le service de la maison de Dieu, pour la loi et pour le commandement, en cherchant son Dieu, il agit de tout son cœur et il réussit.
  '3':
  - type: note
    content: holocaustes pour les sabbats… comme il est écrit dans la loi Lv 23.11s,38.
  - type: text
    content: 'Le roi donna une part de ses biens pour les holocaustes – les holocaustes du matin et du soir, les holocaustes pour les sabbats, les nouvelles lunes et les rencontres festives, comme il est écrit dans la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '4':
  - type: text
    content: 'Il dit au peuple, aux habitants de Jérusalem, de donner la part des prêtres et des lévites, afin qu''ils s''attachent à la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '5':
  - type: note
    content: 'vin  : autre traduction vin nouveau, cf. Gn 27.28n. –  récoltes de la campagne  : une expression analogue est rendue par revenus du champ en 2R 8.6.'
  - type: text
    content: 'Lorsque cette parole se fut répandue, les Israélites donnèrent en abondance les prémices du blé, du vin, de l''huile, du miel et de toutes les récoltes de la campagne ; ils apportèrent aussi en quantité la dîme de tout. '
  '6':
  - type: text
    content: 'De même, les Israélites et les Judéens qui habitaient dans les villes de Juda donnèrent la dîme du gros bétail et du petit bétail, et la dîme des choses consacrées au '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu ; ils en firent des tas et des tas. '
  '7':
  - type: text
    content: 'Ils commencèrent à former les tas au troisième mois et ils achevèrent au septième mois. '
  '8':
  - type: text
    content: 'Ezéchias et les princes vinrent voir les tas ; ils bénirent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et Israël, son peuple. '
  '9':
  - type: text
    content: 'Ezéchias interrogea les prêtres et les lévites au sujet de ces tas. '
