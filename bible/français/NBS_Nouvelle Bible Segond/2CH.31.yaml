document_id: 2CH.31,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezéchias organise le service du temple
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2R 18.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les gens d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout Israël.
      marker-yv: yv-n
    - type: text
      text: Lorsque tout cela fut terminé, tous les gens d'Israël qui étaient présents partirent pour les villes de Juda ; ils brisèrent les pierres levées, abattirent les poteaux cultuels (les ashéras) et démolirent les hauts lieux et les autels de tout Juda et Benjamin ainsi que dans Ephraïm et Manassé. Puis tous les Israélites revinrent dans leurs villes, chacun dans sa propriété.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Azaria
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ‘Azaryahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 13 ; 1R 4.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' en chef'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Esd 7.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. – Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Alors Azaria, le prêtre en chef de la maison de Tsadoq, lui répondit : Depuis qu''on a commencé d''apporter le prélèvement dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', il y a eu de quoi manger et se rassasier, tout en laissant un surplus considérable, car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a béni son peuple ; quant au surplus, c''est cet amoncellement que voici.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Ezéchias ordonna de préparer des salles dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; on les prépara. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avec probité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 15,18 ; 19.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On y apporta avec probité le prélèvement, la dîme et les offrandes sacrées. Le chef Konania, lévite, en assurait l''intendance avec Shiméi, son frère, comme second. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Azazia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Yismakia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Benaya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Konania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ‘Azazyahou / Yismakyahou / Benayahou / Konanyahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir Jg 17.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Yehiel, Azazia, Nahath, Asaël, Yerimoth, Yozabad, Eliel, Yismakia, Mahath et Benaya étaient inspecteurs sous la direction de Konania et de Shiméi, son frère, par disposition du roi Ezéchias et d''Azaria, chef de la maison de Dieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'Le lévite Coré, fils de Yimna, portier à l''est, avait l''intendance des dons volontaires faits à Dieu, pour distribuer le prélèvement pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et les choses très sacrées. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Dans les villes des prêtres, Eden, Minyamîn, Josué, Shemaya, Amaria et Shekania étaient placés à ses côtés pour faire avec probité les distributions à leurs frères, grands et petits, d''après leurs classes, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'non seulement aux mâles enregistrés depuis l''âge de trois ans et au-dessus, mais à tous ceux qui entraient selon l''ordre de chaque jour dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour faire leur service d''après leurs postes, selon leurs classes ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: famille par famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour leurs maisons paternelles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 1Ch 7.7,9,40.'
      marker-yv: yv-n
    - type: text
      text: 'aux prêtres enregistrés famille par famille, et aux lévites depuis l''âge de vingt ans et au-dessus, d''après leurs postes et leurs classes, '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leurs familles… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux choses sacrées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au sanctuaire.
      marker-yv: yv-n
    - type: text
      text: 'à tous ceux de l''assemblée qui avaient été enregistrés, avec toutes leurs familles, leurs femmes, leurs fils et leurs filles, car ils se consacraient avec probité aux choses sacrées. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.19 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Aaron'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Ex 28.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à tous les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: ' enregistrés'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à tous les enregistrés parmi les lévites.
      marker-yv: yv-n
    - type: text
      text: Pour les fils d'Aaron, les prêtres qui étaient dans la campagne, aux abords de leurs villes, il y avait dans chaque ville des hommes désignés par leur nom pour distribuer les parts à tous les mâles parmi les prêtres et à tous les lévites enregistrés.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les holocaustes et les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: ' de paix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.7 ; 29.35 ; 31.2 ; 1Ch 16.1 ; 21.26.
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias installa les classes des prêtres et des lévites, d''après leurs classes, chacun selon son service, prêtres et lévites pour les holocaustes et les sacrifices de paix, pour officier, pour les célébrations et les louanges, aux portes du camp du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Voilà ce que fit Ezéchias dans tout Juda ; il agit selon le bien, la droiture et la loyauté devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de tout son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1R 8.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il réussit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il prospéra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même verbe en 32.30.'
      marker-yv: yv-n
    - type: text
      text: Dans toute l'œuvre qu'il avait entreprise pour le service de la maison de Dieu, pour la loi et pour le commandement, en cherchant son Dieu, il agit de tout son cœur et il réussit.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocaustes pour les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbats
        - type: text
          text: '… comme il est écrit dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 23.11s,38.
      marker-yv: yv-n
    - type: text
      text: 'Le roi donna une part de ses biens pour les holocaustes – les holocaustes du matin et du soir, les holocaustes pour les sabbats, les nouvelles lunes et les rencontres festives, comme il est écrit dans la loi du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Il dit au peuple, aux habitants de Jérusalem, de donner la part des prêtres et des lévites, afin qu''ils s''attachent à la loi du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vin nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 27.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: récoltes de la campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : une expression analogue est rendue par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'revenus du champ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 2R 8.6.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque cette parole se fut répandue, les Israélites donnèrent en abondance les prémices du blé, du vin, de l''huile, du miel et de toutes les récoltes de la campagne ; ils apportèrent aussi en quantité la dîme de tout. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'De même, les Israélites et les Judéens qui habitaient dans les villes de Juda donnèrent la dîme du gros bétail et du petit bétail, et la dîme des choses consacrées au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', leur Dieu ; ils en firent des tas et des tas. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
      text: 'Ils commencèrent à former les tas au troisième mois et ils achevèrent au septième mois. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: 'Ezéchias et les princes vinrent voir les tas ; ils bénirent le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et Israël, son peuple. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'Ezéchias interrogea les prêtres et les lévites au sujet de ces tas. '
