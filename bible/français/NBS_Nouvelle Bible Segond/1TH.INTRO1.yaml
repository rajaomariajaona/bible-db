document_id: 1TH.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: Les liens très étroits qui unissent les deux épîtres, malgré des différences notables, nous conduisent à les présenter ensemble.
  - type: text
    content: La fondation de l'Eglise de Thessalonique
  - type: text
    content: Après Philippes, Thessalonique a été la deuxième ville d'Europe dans laquelle Paul et ses compagnons ont séjourné (Ac 17.1-9 et 1Th 2.1ss).
  - type: text
    content: 'Paul est resté à Thessalonique au maximum deux ou trois mois. Dans le livre des Actes, Luc mentionne des discussions avec les Juifs, dans la synagogue, pendant '
  - type: text
    content: trois sabbats
  - type: text
    content: . Cela n'implique pas que la persécution qui a chassé Paul ait immédiatement suivi ces entretiens. L'apôtre et ses compagnons ont probablement continué de proclamer la bonne nouvelle et d'enseigner un certain temps avant que les menées de leurs adversaires n'obligent Paul à prendre la fuite (cf. Ac 17.5-10).
  - type: text
    content: Les premières épîtres apostoliques ?
  - type: text
    content: Si elle a été écrite vers 50/51, ce qui est probable, la Première aux Thessaloniciens pourrait bien être le plus ancien des écrits du Nouveau Testament. Il se peut que la Seconde l'ait suivie de peu, quoique certains l'estiment beaucoup plus tardive, au point de l'attribuer à un disciple de l'apôtre qui se serait inspiré de la Première.
  - type: text
    content: 'La première épître, comme la seconde, est une '
  - type: text
    content: véritable lettre
  - type: text
    content: ' et non un texte didactique sous forme épistolaire. Certes, l''apôtre emploie les formules de salutation et d''introduction communément utilisées à l''époque, mais aussitôt après, il évoque des souvenirs communs et exprime les sentiments qui l''unissent à cette Eglise « modèle ».'
  - type: text
    content: 'Ainsi il rappelle les '
  - type: text
    content: relations
  - type: text
    content: ' qui se sont nouées entre lui et ses correspondants : il a eu à leur égard l''amour d''une mère (1Th 2.7), d''un frère (1Th 2.9) et d''un père (1Th 2.11) plus que l''autorité d''un apôtre (1Th 2.6).'
  - type: text
    content: Le langage apocalyptique
  - type: text
    content: 'Le mélange d''enseignements et d''exhortations caractérise presque tous les grands textes du Nouveau Testament relatifs à la '
  - type: text
    content: fin des temps
  - type: text
    content: ', textes parmi lesquels ces deux épîtres figurent en bonne place (c''est aussi le cas du discours de Jésus en Mc 13/ /).'
  - type: text
    content: Ainsi les épîtres aux Thessaloniciens mettent-elles en œuvre des matériaux provenant de l'
  - type: text
    content: Ancien Testament,
  - type: text
    content: ' du '
  - type: text
    content: judaïsme
  - type: text
    content: ' contemporain et de l''enseignement de '
  - type: text
    content: Jésus
  - type: text
    content: . Elles utilisent des termes et des idées provenant de l'apocalyptique, fréquents dans diverses écoles du judaïsme du I
  - type: text
    content: er
  - type: text
    content: ' siècle apr. J.-C. (voir les introductions à Daniel, p.${Xapocdn}, et à l''Apocalypse de Jean, p.${Xintap}). Ce langage typique est fortement '
  - type: text
    content: imagé
  - type: text
    content: '  : '
  - type: text
    content: voix d'un archange, son de la trompette de Dieu, nuées
  - type: text
    content: ' (1Th 4.16s), '
  - type: text
    content: fils de la lumière et fils du jour
  - type: text
    content: ' (1Th 5.5 ; l''expression '
  - type: text
    content: fils de la lumière
  - type: text
    content: ' revient souvent à Qumrân*), '
  - type: text
    content: feu flamboyant
  - type: text
    content: ' (2Th 1.8), '
  - type: text
    content: signes, prodiges
  - type: text
    content: ' (2Th 2.9), etc. D''autres traits de l''apocalyptique apparaissent également, comme la distinction de l''âge présent et de l''âge à venir, sous-jacente à l''espérance du '
  - type: text
    content: royaume
  - type: text
    content: ' de Dieu (voir 1Th 2.12 ; 2Th 1.5) et surtout l''idée d''une '
  - type: text
    content: détermination
  - type: text
    content: ' rigoureuse des '
  - type: text
    content: temps
  - type: text
    content: ' (voir spécialement '
  - type: text
    content: ce qui retient, pour qu'il
  - type: text
    content: ' [le '
  - type: text
    content: Sans-loi
  - type: text
    content: '] '
  - type: text
    content: ne se révèle qu'en son temps
  - type: text
    content: ', 2Th 2.6).'
  - type: text
    content: LA PREMIÈRE AUX THESSALONICIENS
  - type: text
    content: Epître de l'espérance chrétienne
  - type: text
    content: 'L''espérance chrétienne, c''est l''attente de '
  - type: text
    content: l'avènement
  - type: text
    content: ' (venue ou présence, en grec '
  - type: text
    content: parousia
  - type: text
    content: ') du Christ. L''enseignement de Paul à ce sujet était un élément essentiel de la foi, mais il demeurait sans doute des zones d''ombre. Chez les Thessaloniciens, l''attente du Seigneur était vive : ils croyaient sa venue imminente. Les deux lettres avaient précisément pour but de mettre les choses au point : l''avènement du Christ est aussi '
  - type: text
    content: imprévisible
  - type: text
    content: ' que l''irruption d''un voleur (5.2) et aussi soudain qu''une naissance au terme d''une grossesse (5.3) ; la seconde épître, en revanche, soulignera les '
  - type: text
    content: préalables
  - type: text
    content: ' nécessaires (2Th 2.1-12).'
  - type: text
    content: La piété des chrétiens de Thessalonique
  - type: text
    content: 'Paul rend aux Thessaloniciens un témoignage sans réserve. Ils ont reçu la bonne nouvelle avec l''Esprit saint et une pleine conviction (1Th 1.5). Ils ont imité le Seigneur et l''apôtre (1.6), ils sont devenus un modèle pour d''autres (1.7). S''il semble présenter une apologie de son ministère (2.1-12), c''est surtout pour préparer l''évocation de ses '
  - type: text
    content: inquiétudes
  - type: text
    content: ' à leur sujet (2.17ss). Amené à quitter précipitamment ces nouveaux convertis, quelques semaines peut-être après les avoir évangélisés, Paul est en souci pour leur foi, déjà soumise à la persécution (2.14ss). Au retour de la mission de Timothée à Thessalonique, il a été pleinement rassuré (3.1-6). Le rappel des exigences éthiques (4.1-12) répond peut-être à des préoccupations dont Timothée s''était fait l''écho, mais l''apôtre ne formule aucune espèce de soupçon ni de reproche.'
  - type: text
    content: Le programme de l'avènement du Christ
  - type: text
    content: Le passage de 1 Thessaloniciens 4.13–5.11 est la pointe de la lettre. Les rappels de l'activité de Paul à Thessalonique et des expériences des destinataires avaient manifestement un caractère préparatoire. Paul répond à la question brûlante qui troublait le plus les Thessaloniciens.
  - type: text
    content: 'Des tensions s''étaient manifestées au sein de l''Eglise (4.13ss). On craignait que les croyants morts ne puissent bénéficier de l''avènement du Seigneur et en particulier de la '
  - type: text
    content: résurrection
  - type: text
    content: ' finale. Il est donc établi que les chrétiens déjà décédés participeront pleinement à l''avènement du Christ et à ses bienfaits.'
  - type: text
    content: LA SECONDE AUX THESSALONICIENS
  - type: text
    content: 'La Seconde aux Thessaloniciens est à lire en fonction de la Première. L''enseignement relatif à la fin des temps, qui était au cœur de celle-ci, n''avait pas été bien compris. Une effervescence malsaine et des idées fausses appelaient, semble-t-il, certaines mises au point. Elles étaient d''autant plus urgentes que des perturbateurs attribuaient à l''apôtre des paroles ou des lettres qui n''étaient pas de son fait (2Th 2.2). L''auteur (Paul lui-même, ou l''un de ses disciples, pour ceux qui pensent que l''épître a été écrite nettement plus tard) s''empresse donc d''apporter les '
  - type: text
    content: éclaircissements
  - type: text
    content: ' nécessaires.'
  - type: text
    content: 'Néanmoins il se consacre d''abord (chap. 1) à encourager les chrétiens de Thessalonique. En effet, la '
  - type: text
    content: persécution
  - type: text
    content: ' se prolongeait ; si elle n''était que larvée, peu violente, elle n''en était pas moins éprouvante. A l''approfondissement de la foi chez beaucoup (v. 3ss) s''opposait, chez d''autres, une inquiétante '
  - type: text
    content: dérive
  - type: text
    content: ' (2.2).'
  - type: text
    content: 'L''épître souligne que Dieu est le juste juge, et elle évoque le '
  - type: text
    content: châtiment
  - type: text
    content: ' des impies. Est-ce à dire que le chrétien ne puiserait son courage ici-bas que dans l''attente de l''au-delà ou d''un retournement futur des situations ? L''auteur évoque le sort des impies dans un langage commun à la plupart des milieux juifs de l''époque. Il fait ainsi mieux ressortir la grandeur des privilèges promis aux croyants. Il poursuit en les assurant de son intercession (v. 11, où l''on retrouve les deux aspects de la piété mentionnés au v. 3, la foi et l''amour concrétisés dans des œuvres bonnes).'
  - type: text
    content: Les préliminaires de l'avènement du Christ
  - type: text
    content: 'La première partie du chapitre 2 n''est pas d''un abord facile, même si le sens général est clair : l''auteur entend '
  - type: text
    content: calmer l'impatience
  - type: text
    content: ' de certains croyants qui pouvaient se laisser persuader que '
  - type: text
    content: le jour du Seigneur était déjà là
  - type: text
    content: ' (v. 2). Pour cela, il souligne qu''auparavant doivent se manifester '
  - type: text
    content: l'apostasie
  - type: text
    content: ' et '
  - type: text
    content: le Sans-loi
  - type: text
    content: ' (ou « l''Impie »). L''apostasie agit déjà, mais non pas d''une manière pleine et évidente (v. 3,7). L''avènement du Sans-loi (v. 3ss) est empêché par une réalité énigmatique, présentée à la fois comme quelque chose et comme quelqu''un (v. 6s).'
  - type: text
    content: La notion d'
  - type: text
    content: apostasie
  - type: text
    content: ' provient du tableau des événements de la fin, tel que le christianisme l''avait reçu du judaïsme. Un temps d''épreuve pour les croyants était attendu avant la venue du Messie et du royaume. Pour Jésus également, selon les évangiles synoptiques*, les temps de la fin étaient des temps de détresse et d''impiété. La mention explicite d''une apostasie finale (v. 3) n''apparaît toutefois que rarement. Cette apostasie doit être distinguée de l''influence de Satan, décrite comme '
  - type: text
    content: le mystère du mal
  - type: text
    content: ' (v. 7), bien que les deux soient liées.'
  - type: text
    content: 'La description du '
  - type: text
    content: Sans-loi
  - type: text
    content: ' (v. 8s) s''inspire de l''Ancien Testament (cf. Es 14.13ss ; Ez 28.2 ; Dn 11.36 ; Ps 89). La perspective du passage ressemble aussi à celle du discours de Jésus sur la fin des temps. On trouve quelques expressions voisines (cf. Mc 13.5ss,26/ /). Les exhortations montrent la même intention : tempérer l''impatience et le sentiment de l''imminence de la fin. Enfin l''idée de '
  - type: text
    content: signe
  - type: text
    content: ' attachée à la notion d''une manifestation finale de l''impiété rapproche les deux textes. La présentation du '
  - type: text
    content: Sans-loi
  - type: text
    content: ' rappelle le sacrilège mentionné en Mc 13.14/ /, mais tout porte à croire qu''il ne s''agit pas d''un simple emprunt. L''auteur livre sans doute le fruit d''une réflexion portant sur les prophéties de l''Ancien Testament comme sur les paroles de Jésus, ainsi que des révélations qu''il a personnellement reçues.'
  - type: text
    content: 'Le texte présente un '
  - type: text
    content: individu
  - type: text
    content: ' qui doit en quelque sorte personnifier les forces du mal, mais il ne nous dit rien de plus, ni sur ses origines ni sur la nature de son entreprise ; le contexte suggère sans doute une action plus religieuse que politique. Plusieurs rapprochent le '
  - type: text
    content: Sans-loi
  - type: text
    content: ' de la figure de l''Antichrist, telle qu''elle apparaît dans les épîtres de Jean.'
  - type: text
    content: 'Comment comprendre '
  - type: text
    content: ce
  - type: text
    content: ' (ou '
  - type: text
    content: celui
  - type: text
    content: ') '
  - type: text
    content: qui
  - type: text
    content: ' '
  - type: text
    content: retient
  - type: text
    content: ' (v. 6s) ? L''allusion est obscure. On rejoint volontiers Augustin (354-430) s''exclamant : « Qu''a voulu dire l''apôtre ? J''avoue que je n''en sais rien. » ('
  - type: text
    content: La Cité de Dieu,
  - type: text
    content: ' 20.19.) En se souvenant de la parenté évidente entre 2 Thessaloniciens 2 et le discours de Jésus relatif à la fin des temps, certains y recherchent l''explication de l''énigme. Une promesse de Jésus peut éclairer en effet les formules de l''épître : la bonne nouvelle doit être proclamée à toutes les nations avant la fin, donc avant l''ultime manifestation de l''impiété (Mc 13.10/ / ; cf. Rm 11.25).'
  - type: text
    content: Les implications éthiques
  - type: text
    content: 'Sous l''apparence un peu décousue du chapitre 3, on découvre une ligne directrice. L''apôtre demande la '
  - type: text
    content: prière
  - type: text
    content: ' pour son activité missionnaire et développe les conséquences '
  - type: text
    content: éthiques
  - type: text
    content: ' des enseignements précédents. L''accent est mis sur la fidélité aux instructions reçues (v. 4,6,14 ; cf. déjà 2.15), sur la nécessité de mener une vie bien réglée (v. 6,7,11) et de travailler paisiblement (v. 8-10), bref de poursuivre en tout le bien (v. 13).'
  - type: text
    content: 'Déjà la première lettre aux Thessaloniciens avait parlé de la nécessité de '
  - type: text
    content: travailler de ses mains
  - type: text
    content: ', avec la même finalité qu''ici : vivre d''une manière honorable et n''avoir besoin de personne (1Th 4.9-12). Sans doute cet appel n''avait-il pas été pleinement entendu. Il est même possible que la situation se soit dégradée. Tout se tient en effet dans les directives de l''épître : la conviction de l''imminence de l''avènement du Christ avait probablement conduit certains exaltés à délaisser leur gagne-pain. Ils se livraient à des occupations qu''ils jugeaient plus « spirituelles », attitude que l''auteur qualifie d’'
  - type: text
    content: indiscipline
  - type: text
    content: ' (2Th 3.11). La communauté elle-même est invitée à veiller à l''application de ses directives (v. 14s). La discipline est nécessaire, mais elle doit s''exercer dans un esprit fraternel et avec mesure.'
  - type: text
    content: CONCLUSION
  - type: text
    content: 'En définitive, nous avons ici la vision d''une jeune Eglise remplie de zèle, d''amour et de foi après avoir reçu la bonne nouvelle, annoncée non pas '
  - type: text
    content: en parole seulement, mais aussi avec puissance, avec l'Esprit saint et avec une pleine conviction
  - type: text
    content: ' (1Th 1.5). Cette Eglise est en butte à l''hostilité conservatrice de la communauté plus vaste et plus ancienne dont elle est issue et cependant se distingue (1Th 2.13-16). Elle est aussi troublée par les excès de ceux de ses membres qui, mal affermis encore ou peu éclairés (1Th 5.14), vont au-delà de ce qui leur a été révélé (2Th 2.1s). Dans l''exaltation de leur piété (2Th 2.1ss), ils en viennent à oublier les devoirs élémentaires de la vie quotidienne (2Th 3.6-12). Cependant, l''auteur garde toute sa confiance en l''action du Seigneur qui les affermira à tous égards (2Th 3.1-5).'
