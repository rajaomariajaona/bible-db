  - type: text
    text: 'Elle appela le garçon I-Kabod (« Où est la gloire ? »), en disant : La gloire est exilée d''Israël ! – c''était à cause de la prise du coffre de Dieu et à cause de son beau-père et de son mari. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Elle dit : La gloire est exilée d''Israël, car le coffre de Dieu a été pris !'
