      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins se rangèrent en ordre de bataille face à Israël, et le combat s''engagea. Israël fut battu par les Philistins, qui abattirent environ quatre mille hommes dans ses lignes sur le champ de bataille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pourquoi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 29.23 ; Es 59.1s ; Ps 74.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous a-t-il battus… devant les Philistins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous a-t-il fait battre par les Philistins ; nous a-t-il frappés d'un fléau devant les Philistins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le coffre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 14.18 ; Nb 10.35. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il nous sauve…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 8 ; 7.8.'
    marker-yv: yv-n
  - type: text
    text: 'Le peuple rentra au camp, et les anciens d''Israël dirent : Pourquoi le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' nous a-t-il battus aujourd''hui devant les Philistins ? Allons prendre à Silo le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; qu''il vienne parmi nous et qu''il nous sauve de la main de nos ennemis ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un détachement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'on apporta le coffre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 6.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (YHWH) des Armées'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui est assis sur les keroubim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 25.22 ; Ps 80.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hophni et Phinéas…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.3 ; 2.34.'
    marker-yv: yv-n
  - type: text
    text: 'Le peuple envoya un détachement à Silo, d''où l''on apporta le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) des Armées qui est assis sur les keroubim. Hophni et Phinéas, les deux fils d''Eli, étaient là avec le coffre de l''alliance de Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'acclamation '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: clameur, ovation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. Nb 10.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 6.5,20 ; ce cri, à la fois cri de joie et cri de guerre, est un élément de la liturgie du Coffre et du temple, voir aussi 2S 6.15 ; Ps 33.3 ; 47.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la terre en fut ébranlée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''émotion gagna tout le pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays fut saisi de panique
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 1R 1.40.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' arriva au camp, tout Israël lança une grande acclamation ; la terre en fut ébranlée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'acclamation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'la voix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le bruit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'acclamation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hébreux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : appellation désignant les Israélites, que l''on trouve surtout dans la bouche des étrangers ou des Israélites parlant à des étrangers ; cf. 14.11 ; Gn 10.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 14.13 ; 39.14 ; Ex 1.15s ; 9.1.'
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins entendirent l''acclamation ; ils dirent : Qu''est-ce donc que cette grande acclamation dans le camp des Hébreux ? Ils surent ainsi que le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' était arrivé au camp. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Quel malheur pour nous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Nb 21.29 ; Es 6.5 ; Jr 48.46 ; Lm 5.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rien ne sera plus…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce n'était pas comme cela hier, avant-hier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 31.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 5.7s,14 ; Rt 2.11.'
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins eurent peur ; ils disaient : Dieu est arrivé au camp ! Quel malheur pour nous ! Rien ne sera plus comme d''habitude ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ces dieux formidables
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce Dieu formidable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''accord au pluriel semble ici évoquer des conceptions polythéistes ; sur le terme correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', voir Gn 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: formidables
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant est aussi traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: magnifique(s)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ps 8.2,10 ; 76.5 ; 93.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Egyptiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fléaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: coups ; défaites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 10 ; Ex 7–12 ; 14 ; voir aussi Ap 11.6+.'
    marker-yv: yv-n
  - type: text
    text: 'Quel malheur pour nous ! Qui nous délivrera de la main de ces dieux formidables ? Ce sont ces dieux qui ont frappé les Egyptiens de toutes sortes de fléaux dans le désert. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Soyez forts, soyez des hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2S 10.12 ; 13.28 ; Jl 4.10 ; 1Co 16.13 ; Ep 6.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que vous ne soyez soumis…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que vous ne serviez les Hébreux comme ils vous ont servis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 10.6-8 ; 13.1.'
    marker-yv: yv-n
  - type: text
    text: 'Soyez forts, soyez des hommes, Philistins, de peur que vous ne soyez soumis aux Hébreux comme ils vous ont été soumis ! Soyez des hommes et combattez ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à sa tente '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à ses tentes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chez soi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cette expression qui évoque le nomadisme n''implique pas que les Israélites vivaient encore sous la tente à l''époque de Samuel ; cf. 13.2 ; Jos 22.6-8 ; Jg 7.8 ; 2S 18.17 ; 19.9 ; 1R 12.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: La défaite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même mot hébreu a été rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fléaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 8 (voir aussi 6.19 ; 19.8 ; 23.5) ; un autre mot hébreu de sens analogue est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'défaite '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 17. Cf. Lv 26.17 ; Ps 78.60-62.
    marker-yv: yv-n
  - type: text
    text: 'Les Philistins livrèrent donc bataille, et Israël fut battu. Chacun s''enfuit à sa tente. La défaite fut très grande, et il tomba trente mille fantassins en Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le coffre de Dieu fut pris
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ps 78.61. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hophni et Phinéas… moururent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.34.'
    marker-yv: yv-n
  - type: text
    text: Le coffre de Dieu fut pris ; Hophni et Phinéas, les deux fils d'Eli, moururent.
