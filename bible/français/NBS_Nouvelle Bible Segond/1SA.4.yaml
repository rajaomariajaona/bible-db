  - type: text
    text: 'Sa belle-fille, la femme de Phinéas, était enceinte ; elle était sur le point d''accoucher. Lorsqu''elle apprit que le coffre de Dieu avait été pris et que son beau-père et son mari étaient morts, elle se courba et accoucha, car les douleurs l''avaient saisie. '
