  - type: text
    text: A peine avait-il évoqué le coffre de Dieu qu'Eli tomba à la renverse de son siège, près de la porte de la ville ; il se rompit la nuque et mourut ; car c'était un homme vieux et pesant. Il avait été juge en Israël pendant quarante ans.
