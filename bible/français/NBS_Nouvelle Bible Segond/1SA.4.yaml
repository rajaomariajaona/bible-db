  - type: text
    text: 'Lorsqu''il arriva, Eli était en train de guetter, assis sur son siège près de la route, car son cœur tremblait pour le coffre de Dieu. A son arrivée, l''homme annonça la nouvelle, et toute la ville se mit à pousser des cris. '
  - type: usfm
