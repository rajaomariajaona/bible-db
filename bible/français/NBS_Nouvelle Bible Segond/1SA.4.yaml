    marker-yv: yv-n
  - type: text
    text: Ainsi la parole de Samuel était pour tout Israël.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Israël vaincu par les Philistins
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Israël sortit à la rencontre des Philistins pour le combat. Ils dressèrent leur camp près d''Eben-Ezer, et les Philistins dressèrent leur camp à Apheq. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: abattirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: frappèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
