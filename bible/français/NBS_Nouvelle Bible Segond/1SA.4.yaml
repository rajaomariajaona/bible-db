document_id: 1SA.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Ainsi la parole…  : cette phrase est absente de LXX  ; elle y est remplacée par en ces jours-là les Philistins se rassemblèrent pour le combat contre Israël , phrase qui introduit le récit suivant. – Les Philistins , installés probablement depuis le XIIe s. av. J.-C. sur la côte méditerranéenne, sont depuis lors des ennemis d''Israël. –  Eben-Ezer  : nom d''un endroit (signifiant la pierre du secours ) où eurent lieu plusieurs affrontements entre Israël et les Philistins ; cf. 5.1 ; 7.12. –  Apheq  : localité de la plaine côtière ; cf. 29.1 ; Jos 12.18.'
  - type: text
    content: Ainsi la parole de Samuel était pour tout Israël.
  - type: heading
    content: Israël vaincu par les Philistins
  - type: text
    content: 'Israël sortit à la rencontre des Philistins pour le combat. Ils dressèrent leur camp près d''Eben-Ezer, et les Philistins dressèrent leur camp à Apheq. '
  '10':
  - type: note
    content: 'à sa tente (litt. à ses tentes) signifie chez soi  ; cette expression qui évoque le nomadisme n''implique pas que les Israélites vivaient encore sous la tente à l''époque de Samuel ; cf. 13.2 ; Jos 22.6-8 ; Jg 7.8 ; 2S 18.17 ; 19.9 ; 1R 12.16. –  La défaite  : le même mot hébreu a été rendu par fléaux au v. 8 (voir aussi 6.19 ; 19.8 ; 23.5) ; un autre mot hébreu de sens analogue est traduit par défaite au v. 17. Cf. Lv 26.17 ; Ps 78.60-62.'
  - type: text
    content: 'Les Philistins livrèrent donc bataille, et Israël fut battu. Chacun s''enfuit à sa tente. La défaite fut très grande, et il tomba trente mille fantassins en Israël. '
  '11':
  - type: note
    content: 'Le coffre de Dieu fut pris  : cf. Ps 78.61. –  Hophni et Phinéas… moururent  : cf. 2.34.'
  - type: text
    content: Le coffre de Dieu fut pris ; Hophni et Phinéas, les deux fils d'Eli, moururent.
  - type: heading
    content: Mort du prêtre Eli
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Messager d''une défaite  : cf. 2S 1.2 ; 18.19-32. –  de Benjamin  : c.-à-d. de la tribu de Benjamin . –  du front  : le même mot a été traduit par lignes au v. 2 ; cf. v. 16 ; 17.8n. –  vêtements déchirés / tête couverte de terre  : signes de deuil ou de profond accablement ; cf. Gn 37.29,34 ; Jos 7.6 ; Jg 11.35 ; 2S 15.32 ; Ez 27.30.'
  - type: text
    content: 'Un homme de Benjamin accourut du front et arriva à Silo le même jour, les vêtements déchirés et la tête couverte de terre. '
  '13':
  - type: note
    content: 'son siège 1.9n. –  près de  : litt. (à la) main (de), c.-à-d. au bord de  ; une autre lecture traditionnelle présente un mot incompréhensible. –  cris  : cf. 28.12 ; Es 14.31 ; 15.4.'
  - type: text
    content: 'Lorsqu''il arriva, Eli était en train de guetter, assis sur son siège près de la route, car son cœur tremblait pour le coffre de Dieu. A son arrivée, l''homme annonça la nouvelle, et toute la ville se mit à pousser des cris. '
  '14':
  - type: text
    content: 'Quand il entendit les cris, Eli demanda : Qu''est-ce que ce tumulte ? L''homme s''empressa de venir annoncer la nouvelle à Eli. '
  '15':
  - type: note
    content: 'ne pouvait plus voir  : cf. 3.2+.'
  - type: text
    content: 'Or Eli avait quatre-vingt-dix-huit ans, il avait les yeux fixes et ne pouvait plus voir. '
  '16':
  - type: note
    content: 'du front  : cf. v. 12n  ; LXX du camp. –  Eli lui demanda  : litt. il dit.'
  - type: text
    content: 'L''homme dit à Eli : J''arrive du front ; moi, je me suis enfui du front aujourd''hui. Eli lui demanda : Que s''est-il passé, mon fils ? '
  '17':
  - type: note
    content: 'défaite  : le mot hébreu correspondant a souvent été rendu par fléau, cf. v. 10n  ; voir Ex 7.27n  ; 9.14 ; Nb 25 ; 2S 24.21ss.'
  - type: text
    content: 'Celui qui apportait la nouvelle répondit : Israël a fui devant les Philistins, et le peuple a subi une grande défaite ; même Hophni et Phinéas, tes deux fils, sont morts ; et le coffre de Dieu a été pris ! '
  '18':
  - type: note
    content: 'Eli tomba  : litt. il tomba. –  près de  : litt. à la main de (cf. v. 13n) ; on pourrait aussi traduire ici en travers de. –  de la ville  : sous-entendu dans le texte ; cf. Dt 16.18n. –  juge  : à la différence des héros du livre des Juges (cf. Jg 2.16n), Eli semble ne devoir ce titre qu''à sa qualité de prêtre. –  quarante ans  : cf. Jg 3.9-11 ; 5.31 ; 8.28 ; 1R 2.11 ; 11.42 ; LXX vingt ans.'
  - type: text
    content: A peine avait-il évoqué le coffre de Dieu qu'Eli tomba à la renverse de son siège, près de la porte de la ville ; il se rompit la nuque et mourut ; car c'était un homme vieux et pesant. Il avait été juge en Israël pendant quarante ans.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'se courba  : autres traductions s''affaissa ; s''effondra ; s''accroupit (position habituelle à cette époque pour l''accouchement). –  les douleurs l''avaient saisie  : on retrouve la même expression hébraïque en Dn 10.16n.'
  - type: text
    content: 'Sa belle-fille, la femme de Phinéas, était enceinte ; elle était sur le point d''accoucher. Lorsqu''elle apprit que le coffre de Dieu avait été pris et que son beau-père et son mari étaient morts, elle se courba et accoucha, car les douleurs l''avaient saisie. '
  '2':
  - type: note
    content: 'abattirent  : litt. frappèrent. –  dans ses lignes sur le champ de bataille  : on pourrait aussi traduire dans une bataille rangée en rase campagne  ; cf. v. 12n.'
  - type: text
    content: 'Les Philistins se rangèrent en ordre de bataille face à Israël, et le combat s''engagea. Israël fut battu par les Philistins, qui abattirent environ quatre mille hommes dans ses lignes sur le champ de bataille. '
  '20':
  - type: note
    content: 'Cf. Gn 35.17s. –  ne voulut pas…  : litt. ne plaça pas son cœur, le cœur étant ici considéré comme le siège de la pensée et de l''intelligence.'
  - type: text
    content: 'Comme elle allait mourir, celles qui se tenaient auprès d''elle lui dirent : N''aie pas peur : tu as mis au monde un fils ! Mais elle ne répondit pas, elle ne voulut pas y prêter attention. '
  '21':
  - type: note
    content: 'I-Kabod (cf. 14.3) peut signifier où est la gloire  ? ou, peut-être, pas de gloire ! LXX semble avoir lu l''interjection habituellement rendue par quel malheur ! La gloire désigne ici, concrètement, le coffre de Dieu ; cf. 1R 8.3-11. –  exilée  : cf. Ez 11.22ss.'
  - type: text
    content: 'Elle appela le garçon I-Kabod (« Où est la gloire ? »), en disant : La gloire est exilée d''Israël ! – c''était à cause de la prise du coffre de Dieu et à cause de son beau-père et de son mari. '
  '22':
  - type: text
    content: 'Elle dit : La gloire est exilée d''Israël, car le coffre de Dieu a été pris !'
  '3':
  - type: note
    content: 'Pourquoi  : cf. Dt 29.23 ; Es 59.1s ; Ps 74.1. –  nous a-t-il battus… devant les Philistins  ; autres traductions nous a-t-il fait battre par les Philistins ; nous a-t-il frappés d''un fléau devant les Philistins. –  le coffre  : cf. 14.18 ; Nb 10.35. –  qu''il nous sauve…  : cf. v. 8 ; 7.8.'
  - type: text
    content: 'Le peuple rentra au camp, et les anciens d''Israël dirent : Pourquoi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a-t-il battus aujourd''hui devant les Philistins ? Allons prendre à Silo le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; qu''il vienne parmi nous et qu''il nous sauve de la main de nos ennemis ! '
  '4':
  - type: note
    content: 'un détachement  : sous-entendu dans le texte. –  l''on apporta le coffre  : cf. 2S 6.2. –  Seigneur (YHWH) des Armées  : cf. 1.3n  ; voir noms divins. –  qui est assis sur les keroubim  : cf. Ex 25.22 ; Ps 80.2. –  Hophni et Phinéas…  : cf. 1.3 ; 2.34.'
  - type: text
    content: 'Le peuple envoya un détachement à Silo, d''où l''on apporta le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées qui est assis sur les keroubim. Hophni et Phinéas, les deux fils d''Eli, étaient là avec le coffre de l''alliance de Dieu.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'acclamation ou clameur, ovation  ; cf. Nb 10.5n  ; Jos 6.5,20 ; ce cri, à la fois cri de joie et cri de guerre, est un élément de la liturgie du Coffre et du temple, voir aussi 2S 6.15 ; Ps 33.3 ; 47.6. –  la terre en fut ébranlée  : autres traductions l''émotion gagna tout le pays ou le pays fut saisi de panique  ; cf. 1R 1.40.'
  - type: text
    content: 'Lorsque le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' arriva au camp, tout Israël lança une grande acclamation ; la terre en fut ébranlée. '
  '6':
  - type: note
    content: 'l''acclamation  : litt. la voix (ou le bruit) de l''acclamation  ; cf. v. 5n. –  Hébreux  : appellation désignant les Israélites, que l''on trouve surtout dans la bouche des étrangers ou des Israélites parlant à des étrangers ; cf. 14.11 ; Gn 10.21n  ; 14.13 ; 39.14 ; Ex 1.15s ; 9.1.'
  - type: text
    content: 'Les Philistins entendirent l''acclamation ; ils dirent : Qu''est-ce donc que cette grande acclamation dans le camp des Hébreux ? Ils surent ainsi que le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était arrivé au camp. '
  '7':
  - type: note
    content: 'Quel malheur pour nous  : cf. Nb 21.29 ; Es 6.5 ; Jr 48.46 ; Lm 5.16. –  Rien ne sera plus…  : litt. ce n''était pas comme cela hier, avant-hier  ; cf. Gn 31.2n  ; Ex 5.7s,14 ; Rt 2.11.'
  - type: text
    content: 'Les Philistins eurent peur ; ils disaient : Dieu est arrivé au camp ! Quel malheur pour nous ! Rien ne sera plus comme d''habitude ! '
  '8':
  - type: note
    content: 'ces dieux formidables  : autre traduction ce Dieu formidable  ; l''accord au pluriel semble ici évoquer des conceptions polythéistes ; sur le terme correspondant à Dieu ou dieux, voir Gn 1.1n. –  formidables  : le mot hébreu correspondant est aussi traduit par magnifique(s), cf. Ps 8.2,10 ; 76.5 ; 93.4. –  les Egyptiens  : autre traduction l''Egypte. –  fléaux  : autres traductions coups ; défaites  ; cf. v. 10 ; Ex 7–12 ; 14 ; voir aussi Ap 11.6+.'
  - type: text
    content: 'Quel malheur pour nous ! Qui nous délivrera de la main de ces dieux formidables ? Ce sont ces dieux qui ont frappé les Egyptiens de toutes sortes de fléaux dans le désert. '
  '9':
  - type: note
    content: 'Soyez forts, soyez des hommes  : cf. 2S 10.12 ; 13.28 ; Jl 4.10 ; 1Co 16.13 ; Ep 6.10. –  que vous ne soyez soumis…  : litt. que vous ne serviez les Hébreux comme ils vous ont servis  ; cf. Jg 10.6-8 ; 13.1.'
  - type: text
    content: 'Soyez forts, soyez des hommes, Philistins, de peur que vous ne soyez soumis aux Hébreux comme ils vous ont été soumis ! Soyez des hommes et combattez ! '
