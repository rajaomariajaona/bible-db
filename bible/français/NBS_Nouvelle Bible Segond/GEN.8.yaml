        - type: text
          text: n
      - type: text
        text: ' ( ?) ; même mot hébreu Ez 40.16ss.'
    marker-yv: yv-n
  - type: text
    text: 'Au bout de quarante jours, Noé ouvrit la fenêtre qu''il avait faite à l''arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
