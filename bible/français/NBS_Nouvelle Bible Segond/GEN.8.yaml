    marker-yv: yv-n
  - type: text
    text: 'Tous les animaux qui sont avec toi, de toute sorte, tant les oiseaux que le bétail, et toutes les bestioles qui fourmillent sur la terre, fais-les sortir avec toi : qu''ils peuplent la terre, qu''ils soient féconds et se multiplient sur la terre ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Noé sortit, lui, ses fils, sa femme et les femmes de ses fils avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.19 '
    - type: usfm
      marker: fq
      children:
