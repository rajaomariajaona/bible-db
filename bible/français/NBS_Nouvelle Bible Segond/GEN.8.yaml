      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Tous les animaux, toutes les bestioles, tous les oiseaux et tout ce qui fourmille sur la terre, tous ceux-là sortirent de l'arche, famille par famille.
