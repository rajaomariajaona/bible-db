      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.18+.
    marker-yv: yv-n
  - type: text
    text: 'Sors de l''arche, toi, ta femme, tes fils et les femmes de tes fils avec toi. '
  - type: usfm
