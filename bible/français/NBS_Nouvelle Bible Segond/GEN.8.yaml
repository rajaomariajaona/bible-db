    marker-yv: yv-n
  - type: text
    text: 'L''an six cent un, le premier jour du premier mois, les eaux avaient séché sur la terre. Noé retira la couverture de l''arche et vit que la terre avait séché. '
  - type: usfm
    marker: vlbl
