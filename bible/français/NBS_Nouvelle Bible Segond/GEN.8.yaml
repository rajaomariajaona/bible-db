      - type: text
        text: '  : probablement en Arménie, au nord de l''Assyrie (cf. 2R 19.37/ / ; Jr 51.27). A cause du récit biblique, ce nom a été donné au plus haut sommet de cette région (5 156 m).'
    marker-yv: yv-n
  - type: text
    text: 'Le dix-septième jour du septième mois, l''arche se posa sur les montagnes d''Ararat. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.18-20.
    marker-yv: yv-n
  - type: text
    text: 'Les eaux allèrent en diminuant jusqu''au dixième mois. Le premier jour du dixième mois, les sommets des montagnes apparurent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
