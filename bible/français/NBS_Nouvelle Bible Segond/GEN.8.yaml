      children:
      - type: text
        text: v. 14.
    marker-yv: yv-n
  - type: text
    text: 'Il lâcha le corbeau, qui sortit et revint à plusieurs reprises, jusqu''à ce que les eaux aient séché sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
