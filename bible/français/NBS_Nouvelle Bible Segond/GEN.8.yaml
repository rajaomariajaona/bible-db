  - type: text
    text: 'Dieu se souvint de Noé, de tous les animaux et de tout le bétail qui se trouvaient avec lui dans l''arche ; Dieu fit passer un souffle sur la terre, et les eaux s''apaisèrent. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '-12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les sources de l''abîme et les fenêtres du ciel se fermèrent, et la pluie fut arrêtée depuis le ciel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.24.
    marker-yv: yv-n
  - type: text
    text: 'Les eaux se retirèrent de la terre peu à peu ; les eaux diminuèrent au bout de cent cinquante jours. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
