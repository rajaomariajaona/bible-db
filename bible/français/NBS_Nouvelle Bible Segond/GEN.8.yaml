  - type: text
    text: 'Mais la colombe ne trouva pas de quoi se poser et revint à lui dans l''arche, car il y avait de l''eau sur toute la terre. Il tendit la main, la prit et la fit rentrer auprès de lui dans l''arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il attendit encore sept autres jours et lâcha de nouveau la colombe hors de l''arche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'La colombe revint à lui sur le soir : elle tenait dans son bec une feuille d''olivier toute fraîche ! Noé sut ainsi que les eaux avaient baissé sur la terre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il attendit encore sept autres jours, puis il lâcha la colombe. Mais elle ne revint plus à lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'six cent un '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. C''est le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'premier jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'du septième siècle de la vie de Noé ; cf. Gn 2.1-3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la couverture '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le toit
    - type: usfm
