      children:
      - type: text
        text: 'corbeau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'colombe '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 8ss), le récit de Gilgamesh (voir ♦) ajoute une hirondelle. Ce procédé semble avoir été celui des marins de l''Antiquité, qui emmenaient des oiseaux à bord pour connaître la direction et la distance des terres ; voir aussi Lv 11.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui sortit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
