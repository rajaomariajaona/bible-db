    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sèche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.9s.'
    marker-yv: yv-n
  - type: text
    text: Le vingt-septième jour du deuxième mois, la terre était sèche.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
