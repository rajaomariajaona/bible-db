document_id: GEN.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Noé sort de l'arche
  - type: text
    content: ' '
  - type: note
    content: 'se souvint de  : autre traduction pensa à 9.15s ; 19.29 ; 30.22 ; Ex 2.24 etc. –  animaux / bétail 7.21n. –  souffle ou vent  : cf. 1.2n  ; voir aussi esprit .'
  - type: text
    content: 'Dieu se souvint de Noé, de tous les animaux et de tout le bétail qui se trouvaient avec lui dans l''arche ; Dieu fit passer un souffle sur la terre, et les eaux s''apaisèrent. '
  '10':
  - type: text
    content: 'Il attendit encore sept autres jours et lâcha de nouveau la colombe hors de l''arche. '
  '11':
  - type: text
    content: 'La colombe revint à lui sur le soir : elle tenait dans son bec une feuille d''olivier toute fraîche ! Noé sut ainsi que les eaux avaient baissé sur la terre. '
  '12':
  - type: text
    content: 'Il attendit encore sept autres jours, puis il lâcha la colombe. Mais elle ne revint plus à lui. '
  '13':
  - type: note
    content: 'six cent un 7.11n. C''est le premier jour du septième siècle de la vie de Noé ; cf. Gn 2.1-3. –  la couverture ou le toit  : cf. 6.16n (autre mot) ; même terme hébreu Ex 26.14 ; 35.11 etc. –  la terre (litt. la face du sol, autre terme au début du v. et au v. 14) avait séché  : autre traduction était sèche (autre terme au v. 14).'
  - type: text
    content: 'L''an six cent un, le premier jour du premier mois, les eaux avaient séché sur la terre. Noé retira la couverture de l''arche et vit que la terre avait séché. '
  '14':
  - type: note
    content: 'sèche  : cf. 1.9s.'
  - type: text
    content: Le vingt-septième jour du deuxième mois, la terre était sèche.
  '15':
  - type: text
    content: 'Alors Dieu dit à Noé : '
  '16':
  - type: note
    content: ta femme, tes fils… 6.18+.
  - type: text
    content: 'Sors de l''arche, toi, ta femme, tes fils et les femmes de tes fils avec toi. '
  '17':
  - type: note
    content: 'de toute sorte  : litt. de toute chair  ; cf. 6.19. –  qu''ils peuplent la terre  : litt. qu''ils grouillent (1.20ns) sur la terre  ; cf. 9.7n. –  féconds / multiplient 1.22,28.'
  - type: text
    content: 'Tous les animaux qui sont avec toi, de toute sorte, tant les oiseaux que le bétail, et toutes les bestioles qui fourmillent sur la terre, fais-les sortir avec toi : qu''ils peuplent la terre, qu''ils soient féconds et se multiplient sur la terre ! '
  '18':
  - type: text
    content: 'Noé sortit, lui, ses fils, sa femme et les femmes de ses fils avec lui. '
  '19':
  - type: note
    content: famille par famille ou espèce par espèce  ; le même terme est traduit par clan en 10.5,20,31s etc. ; cf. 12.3n  ; voir aussi Jr 15.3n.
  - type: text
    content: Tous les animaux, toutes les bestioles, tous les oiseaux et tout ce qui fourmille sur la terre, tous ceux-là sortirent de l'arche, famille par famille.
  '2':
  - type: note
    content: 7.11n-12n.
  - type: text
    content: 'Les sources de l''abîme et les fenêtres du ciel se fermèrent, et la pluie fut arrêtée depuis le ciel. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: autel 12.7s ; 13.4,18 ; 22.9 ; 26.25 ; 33.20 ; 35.1-7 ; cf. Ex 20.24. –  pur(es) 7.2+. – Sur les holocaustes , sacrifices par excellence, voir 22.2ss ; Lv 1.3n.
  - type: text
    content: 'Noé bâtit un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il prit de toutes les bêtes pures et de tous les oiseaux purs, et il offrit des holocaustes sur l''autel. '
  '21':
  - type: note
    content: 'agréable  : litt. de repos, mot qui rappelle encore le nom de Noé, v. 9n  ; 5.29n. La phrase Le Seigneur sentit une odeur agréable reprend la terminologie traditionnelle des sacrifices (Lv 1.9n) : elle signifie ici que Dieu accueille favorablement l''offrande ; cf. Ez 20.41. –  se dit  : litt. dit à son cœur. –  maudirai  : le verbe hébreu (différent de celui qui a été employé dans la formule parallèle en 3.17) peut aussi être rendu par traiter à la légère, faire peu de cas de, mépriser  ; voir bénédiction, malédiction ; 12.3n. –  terre (’adama) / humains 2.5n  ; 9.20n. –  cœur… disposé au mal 6.5. –  depuis leur jeunesse  : cf. Ps 51.7. –  tout ce qui est vivant… 6.7.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sentit une odeur agréable, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se dit : Je ne maudirai plus la terre à cause des humains, parce que le cœur des humains est disposé au mal depuis leur jeunesse ; et je ne frapperai plus tout ce qui est vivant, comme je l''ai fait.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Tant que la terre subsistera  : cf. Ps 104.5 ; voir aussi Ec 1.4 ; Mt 5.18/ / ; 24.35/ /. –  semailles / moisson…  : cf. Jr 33.20ss ; voir aussi Za 14.6s ; Ec 3.1ss ; Mt 5.45. –  ne cesseront pas  : sur le verbe correspondant, voir 2.2n.'
  - type: text
    content: Tant que la terre subsistera,
  - type: text
    content: les semailles et la moisson,
  - type: text
    content: le froid et la chaleur,
  - type: text
    content: l'été et l'hiver,
  - type: text
    content: le jour et la nuit
  - type: text
    content: ne cesseront pas.
  '3':
  - type: note
    content: 7.24.
  - type: text
    content: 'Les eaux se retirèrent de la terre peu à peu ; les eaux diminuèrent au bout de cent cinquante jours. '
  '4':
  - type: note
    content: 'dix-septième jour 7.11n. –  se posa ou s''arrêta  ; le verbe hébreu rappelle le nom de Noé, cf. v. 9n  ; 2.15n  ; 5.29n. –  Ararat  : probablement en Arménie, au nord de l''Assyrie (cf. 2R 19.37/ / ; Jr 51.27). A cause du récit biblique, ce nom a été donné au plus haut sommet de cette région (5 156 m).'
  - type: text
    content: 'Le dix-septième jour du septième mois, l''arche se posa sur les montagnes d''Ararat. '
  '5':
  - type: note
    content: 7.18-20.
  - type: text
    content: 'Les eaux allèrent en diminuant jusqu''au dixième mois. Le premier jour du dixième mois, les sommets des montagnes apparurent. '
  '6':
  - type: note
    content: fenêtre 6.16n ( ?) ; même mot hébreu Ez 40.16ss.
  - type: text
    content: 'Au bout de quarante jours, Noé ouvrit la fenêtre qu''il avait faite à l''arche. '
  '7':
  - type: note
    content: 'Il lâcha ou il envoya  : cf. v. 9n. Outre le corbeau et la colombe (v. 8ss), le récit de Gilgamesh (voir ♦) ajoute une hirondelle. Ce procédé semble avoir été celui des marins de l''Antiquité, qui emmenaient des oiseaux à bord pour connaître la direction et la distance des terres ; voir aussi Lv 11.15. –  qui sortit…  : litt. qui sortit, sortant et rentrant. –  séché v. 14.'
  - type: text
    content: 'Il lâcha le corbeau, qui sortit et revint à plusieurs reprises, jusqu''à ce que les eaux aient séché sur la terre. '
  '8':
  - type: note
    content: 'Il lâcha  : litt. il lâcha (ou il envoya) d''auprès de lui. –  colombe  : cf. Lv 1.14+ ; Mt 3.16/ / ; 10.16.'
  - type: text
    content: 'Il lâcha la colombe pour voir si les eaux avaient baissé sur la terre. '
  '9':
  - type: note
    content: 'de quoi se poser  : litt. de repos (mot apparenté au nom de Noé, cf. v. 4n) pour son pied. –  tendit  : même verbe (généralement traduit par envoyer) que celui qui a été rendu par lâcher aux v. 7s.'
  - type: text
    content: 'Mais la colombe ne trouva pas de quoi se poser et revint à lui dans l''arche, car il y avait de l''eau sur toute la terre. Il tendit la main, la prit et la fit rentrer auprès de lui dans l''arche. '
