document_id: ACT.18,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul à Corinthe
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il quitta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss précisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Paul quitta
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Corinthe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : colonie romaine et capitale de la province d''Achaïe (v. 12+). Située au carrefour d''une voie terrestre et d''une voie maritime, c''était un centre commercial cosmopolite connu pour son luxe et sa débauche.'
      marker-yv: yv-n
    - type: text
      text: 'Après cela, il quitta Athènes pour se rendre à Corinthe. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je suis avec toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 3.12 ; Mt 28.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai un peuple nombreux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.14 ; cf. Jn 10.16 ; 1Co 16.9.
      marker-yv: yv-n
    - type: text
      text: car moi, je suis avec toi. Personne ne mettra la main sur toi pour te faire du mal, parce que j'ai un peuple nombreux dans cette ville.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un an et six mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.10.'
      marker-yv: yv-n
    - type: text
      text: Il resta un an et six mois à enseigner parmi eux la parole de Dieu.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul comparaît devant Gallion
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gallion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a été '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'proconsul '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(13.7+) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''Achaïe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (18.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',27 ; 19.21 ; Rm 15.26 ; 2Co 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') entre 51 et 53. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un commun accord…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : texte occidental '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''étant concertés entre eux contre Paul. Ayant mis la main sur lui, ils le conduisirent devant le [proconsul] en vociférant… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant le tribunal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.38.'
      marker-yv: yv-n
    - type: text
      text: 'Alors que Gallion était proconsul de l''Achaïe, les Juifs se dressèrent d''un commun accord contre Paul et le conduisirent devant le tribunal, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'adorer Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'contraire à la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ou bien la loi romaine, qui reconnaissait la religion '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juive
        - type: text
          text: ', mais pas encore le christianisme (les chrétiens ont été persécutés dès lors qu''ils ont été perçus par Rome comme extérieurs au judaïsme) ; ou bien la loi juive elle-même (v. 15), dans le champ d''application qui lui était reconnu par Rome ; cf. 6.13 ; 21.28 ; 25.8 ; voir aussi 17.7.'
      marker-yv: yv-n
    - type: text
      text: 'en disant : Cet individu persuade les gens d''adorer Dieu d''une manière contraire à la loi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 23.29 ; 25.18-20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prendre la parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je vous écouterais patiemment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je vous supporterais.
      marker-yv: yv-n
    - type: text
      text: 'Paul allait prendre la parole lorsque Gallion dit aux Juifs : S''il s''agissait d''un forfait ou d''un délit grave, quel qu''il soit, je vous écouterais patiemment, ô Juifs, comme il se doit ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur des personnes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: votre propre loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 18.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je ne souhaite pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.35-39 ; 17.8s ; 19.37s ; 23.29 ; 24.20-22 ; 26.31s.'
      marker-yv: yv-n
    - type: text
      text: 'mais s''il s''agit de débats sur des mots, sur des noms et sur votre propre loi, cela vous regarde ; moi, je ne souhaite pas en être juge. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et il les renvoya du tribunal. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : plusieurs mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tous les Grecs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(texte occidental), quelques-uns '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sosthène
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Co 1.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans que Gallion…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte occidental reconstitué '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Gallion feignait de ne rien voir.
      marker-yv: yv-n
    - type: text
      text: Alors tous prirent Sosthène, le chef de la synagogue, et se mirent à le battre devant le tribunal, sans que Gallion s'en soucie le moins du monde.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul retourne à Antioche et repart en mission
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bien des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 16.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Syrie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme inclut peut-être la Judée (cf. v. 22 ; 20.3+). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Priscille et Aquilas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2+ ; cf. 1Co 16.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cenchrées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : port de Corinthe ; cf. Rm 16.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car il avait fait un vœu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 21.23-27 ; Nb 6.1-21.'
      marker-yv: yv-n
    - type: text
      text: 'Paul demeura encore là bien des jours. Ensuite il prit congé des frères et embarqua pour la Syrie, avec Priscille et Aquilas. Il s''était fait raser la tête à Cenchrées, car il avait fait un vœu. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ephèse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ville principale de la province romaine d''Asie. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il les laissa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.26 ; 19.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'synagogue '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'discuta… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand ils arrivèrent à Ephèse, il les laissa. Il se rendit à la synagogue et discuta avec les Juifs, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aquilas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Priscille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 18s,26 ; Rm 16.3-5 ; 1Co 16.19 ; 2Tm 4.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pont
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : province du nord de l''Asie Mineure, au bord de la mer Noire (cf. 2.9). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Claude '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; son décret est rapporté par l''historien latin Suétone, qui l''attribue à des troubles nés parmi les Juifs à cause d''un certain Chrestus (Christ ?) ; il daterait de 49 ou 50 ; cf. 28.17.'
      marker-yv: yv-n
    - type: text
      text: 'Il y trouva un Juif nommé Aquilas, originaire du Pont, récemment arrivé d''Italie avec sa femme Priscille, parce que Claude avait ordonné à tous les Juifs de quitter Rome. Il se lia avec eux ; '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Jn 4.40+.
      marker-yv: yv-n
    - type: text
      text: 'qui lui demandèrent de demeurer là quelque temps. Mais il n''y consentit pas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en disant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss occidentaux ajoutent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il faut absolument que je célèbre la fête prochaine à Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 20.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si Dieu le veut
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 1.10 ; 15.32 ; 1Co 4.19 ; 16.7 ; Hé 6.3 ; Jc 4.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: D'Ephèse…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte occidental'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Il laissa Aquilas à Ephèse (et fit voile…)
      marker-yv: yv-n
    - type: text
      text: 'Il prit congé d''eux en disant : Je reviendrai chez vous, si Dieu le veut. D''Ephèse il fit voile '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Césarée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Eglise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement celle de Jérusalem, ville où l''on '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'monte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: habituellement, en particulier depuis la côte (cf. 21.15) ; voir aussi 5.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Antioche '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss.
      marker-yv: yv-n
    - type: text
      text: vers Césarée, où il débarqua ; il monta saluer l'Eglise, puis il descendit à Antioche.
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: successivement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: systématiquement (par tout le pays…)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le même adverbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''une manière suivie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Lc 1.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pays galate '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Phrygie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
