document_id: ACT.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Paul à Corinthe
  - type: text
    content: ' '
  - type: note
    content: 'il quitta  : certains mss précisent Paul quitta . –  Corinthe  : colonie romaine et capitale de la province d''Achaïe (v. 12+). Située au carrefour d''une voie terrestre et d''une voie maritime, c''était un centre commercial cosmopolite connu pour son luxe et sa débauche.'
  - type: text
    content: 'Après cela, il quitta Athènes pour se rendre à Corinthe. '
  '10':
  - type: note
    content: je suis avec toi Ex 3.12 ; Mt 28.20. –  j'ai un peuple nombreux 15.14 ; cf. Jn 10.16 ; 1Co 16.9.
  - type: text
    content: car moi, je suis avec toi. Personne ne mettra la main sur toi pour te faire du mal, parce que j'ai un peuple nombreux dans cette ville.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'un an et six mois  : cf. 19.10.'
  - type: text
    content: Il resta un an et six mois à enseigner parmi eux la parole de Dieu.
  - type: heading
    content: Paul comparaît devant Gallion
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Gallion a été proconsul (13.7+) de l''Achaïe (18.1n,27 ; 19.21 ; Rm 15.26 ; 2Co 1.1n) entre 51 et 53. –  d''un commun accord…  : texte occidental s''étant concertés entre eux contre Paul. Ayant mis la main sur lui, ils le conduisirent devant le [proconsul] en vociférant… –  devant le tribunal  : cf. 19.38.'
  - type: text
    content: 'Alors que Gallion était proconsul de l''Achaïe, les Juifs se dressèrent d''un commun accord contre Paul et le conduisirent devant le tribunal, '
  '13':
  - type: note
    content: 'adorer Dieu 13.43n  ; voir culte. –  contraire à la loi  : ou bien la loi romaine, qui reconnaissait la religion juive, mais pas encore le christianisme (les chrétiens ont été persécutés dès lors qu''ils ont été perçus par Rome comme extérieurs au judaïsme) ; ou bien la loi juive elle-même (v. 15), dans le champ d''application qui lui était reconnu par Rome ; cf. 6.13 ; 21.28 ; 25.8 ; voir aussi 17.7.'
  - type: text
    content: 'en disant : Cet individu persuade les gens d''adorer Dieu d''une manière contraire à la loi. '
  '14':
  - type: note
    content: 'Cf. 23.29 ; 25.18-20. –  prendre la parole 8.35n. –  je vous écouterais patiemment  : litt. je vous supporterais.'
  - type: text
    content: 'Paul allait prendre la parole lorsque Gallion dit aux Juifs : S''il s''agissait d''un forfait ou d''un délit grave, quel qu''il soit, je vous écouterais patiemment, ô Juifs, comme il se doit ; '
  '15':
  - type: note
    content: 'sur des noms  : autre traduction sur des personnes. –  votre propre loi  : cf. Jn 18.31. –  je ne souhaite pas…  : cf. 16.35-39 ; 17.8s ; 19.37s ; 23.29 ; 24.20-22 ; 26.31s.'
  - type: text
    content: 'mais s''il s''agit de débats sur des mots, sur des noms et sur votre propre loi, cela vous regarde ; moi, je ne souhaite pas en être juge. '
  '16':
  - type: text
    content: 'Et il les renvoya du tribunal. '
  '17':
  - type: note
    content: 'tous  : plusieurs mss portent tous les Grecs (texte occidental), quelques-uns tous les Juifs. –  Sosthène  : cf. 1Co 1.1. –  sans que Gallion…  : texte occidental reconstitué Gallion feignait de ne rien voir.'
  - type: text
    content: Alors tous prirent Sosthène, le chef de la synagogue, et se mirent à le battre devant le tribunal, sans que Gallion s'en soucie le moins du monde.
  - type: heading
    content: Paul retourne à Antioche et repart en mission
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'bien des jours  : cf. 16.40. –  la Syrie  : le terme inclut peut-être la Judée (cf. v. 22 ; 20.3+). –  Priscille et Aquilas v. 2+ ; cf. 1Co 16.19. –  Cenchrées  : port de Corinthe ; cf. Rm 16.1. –  car il avait fait un vœu  : cf. 21.23-27 ; Nb 6.1-21.'
  - type: text
    content: 'Paul demeura encore là bien des jours. Ensuite il prit congé des frères et embarqua pour la Syrie, avec Priscille et Aquilas. Il s''était fait raser la tête à Cenchrées, car il avait fait un vœu. '
  '19':
  - type: note
    content: 'Ephèse  : ville principale de la province romaine d''Asie. –  il les laissa  : cf. 18.26 ; 19.1ss. –  synagogue 13.5+. –  discuta… 17.2n.'
  - type: text
    content: 'Quand ils arrivèrent à Ephèse, il les laissa. Il se rendit à la synagogue et discuta avec les Juifs, '
  '2':
  - type: note
    content: 'Aquilas / Priscille v. 18s,26 ; Rm 16.3-5 ; 1Co 16.19 ; 2Tm 4.19. –  Pont  : province du nord de l''Asie Mineure, au bord de la mer Noire (cf. 2.9). –  Claude 11.28n  ; son décret est rapporté par l''historien latin Suétone, qui l''attribue à des troubles nés parmi les Juifs à cause d''un certain Chrestus (Christ ?) ; il daterait de 49 ou 50 ; cf. 28.17.'
  - type: text
    content: 'Il y trouva un Juif nommé Aquilas, originaire du Pont, récemment arrivé d''Italie avec sa femme Priscille, parce que Claude avait ordonné à tous les Juifs de quitter Rome. Il se lia avec eux ; '
  '20':
  - type: note
    content: Cf. Jn 4.40+.
  - type: text
    content: 'qui lui demandèrent de demeurer là quelque temps. Mais il n''y consentit pas. '
  '21':
  - type: note
    content: 'en disant  : certains mss occidentaux ajoutent  : il faut absolument que je célèbre la fête prochaine à Jérusalem  ; cf. 20.16. –  si Dieu le veut  : cf. Rm 1.10 ; 15.32 ; 1Co 4.19 ; 16.7 ; Hé 6.3 ; Jc 4.15. –  D''Ephèse…  : texte occidental  : Il laissa Aquilas à Ephèse (et fit voile…)'
  - type: text
    content: 'Il prit congé d''eux en disant : Je reviendrai chez vous, si Dieu le veut. D''Ephèse il fit voile '
  '22':
  - type: note
    content: 'Césarée 8.40n. –  l''Eglise  : probablement celle de Jérusalem, ville où l''on monte habituellement, en particulier depuis la côte (cf. 21.15) ; voir aussi 5.11n. –  Antioche 11.19nss.'
  - type: text
    content: vers Césarée, où il débarqua ; il monta saluer l'Eglise, puis il descendit à Antioche.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'successivement  : autre traduction systématiquement (par tout le pays…)  ; le même adverbe est traduit par d''une manière suivie en Lc 1.3. –  pays galate / Phrygie  : cf. 16.6n. –  affermissant 14.22+.'
  - type: text
    content: Après quelque temps, il repartit et passa successivement par le pays galate et la Phrygie, en affermissant tous les disciples.
  - type: heading
    content: Apollos à Ephèse, puis à Corinthe
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Apollos 19.1 ; 1Co 1.12 ; 3.4-6,22 ; 4.6 ; 16.12 ; Tt 3.13. –  éloquent…  : cf. 6.10. –  versé  : litt. puissant . –  les Ecritures 8.35n.'
  - type: text
    content: 'Or un Juif nommé Apollos, originaire d''Alexandrie, homme éloquent et versé dans les Ecritures, était arrivé à Ephèse. '
  '25':
  - type: note
    content: 'la voie du Seigneur  : cf. v. 26 ; 9.2n  ; texte occidental il avait été instruit de la parole du Seigneur dans son pays. –  fervent d''esprit ou par l''Esprit  ; cf. Rm 12.11. –  que le baptême de Jean  : cf. 1.5+ ; 19.1-7.'
  - type: text
    content: 'Il était instruit dans la voie du Seigneur et, fervent d''esprit, il disait et enseignait avec exactitude ce qui concernait Jésus, alors qu''il ne connaissait que le baptême de Jean. '
  '26':
  - type: note
    content: 'parler avec assurance 2.29n  ; cf. 19.8. –  dans la synagogue 13.5+. –  Priscille et Aquilas  : cf. v. 18s. –  le prirent avec eux  : autre traduction l''accueillirent  ; même verbe 17.5 ; 28.2 ; Rm 14.1+.'
  - type: text
    content: 'Il se mit à parler avec assurance dans la synagogue. Après l''avoir entendu, Priscille et Aquilas le prirent avec eux et lui exposèrent plus exactement la voie de Dieu. '
  '27':
  - type: note
    content: 'en Achaïe v. 12+ ; 19.1. –  les frères 1.15+. –  ils écrivirent…  : cf. Rm 16.1s ; 2Co 3.1 ; Col 4.10. –  par la grâce 15.11+. – Texte occidental  : L''ayant entendu, des Corinthiens résidant à Ephèse l''invitèrent à se rendre avec eux dans leur pays. Comme il avait accepté, les Ephésiens écrivirent aux disciples (6.1+) de Corinthe de bien l''accueillir. Il résida en Achaïe et fut très utile aux Eglises.'
  - type: text
    content: 'Comme il était décidé à passer en Achaïe, les frères l''y encouragèrent et ils écrivirent aux disciples de lui faire bon accueil. Arrivé là, il se rendit très utile à ceux qui, par la grâce, étaient devenus croyants, '
  '28':
  - type: note
    content: 'avec vigueur  : même adverbe en Lc 23.10 (avec véhémence). – Voir Juifs. –  publiquement 20.20. –  démontrait par les Ecritures… 8.35n  ; 18.4-5+. –  Christ  : voir onction.'
  - type: text
    content: car, avec vigueur, il réfutait les Juifs publiquement et démontrait par les Ecritures que Jésus est le Christ.
  '3':
  - type: note
    content: 'travaillait  : certains mss portent ils travaillaient (ensemble)  ; cf. 20.34 ; 1Co 4.12+.'
  - type: text
    content: 'comme il avait le même métier, il demeurait chez eux et travaillait : ils étaient, de leur métier, fabricants de tentes.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Texte occidental  : se rendant à la synagogue chaque sabbat, il avait des discussions (où), ayant introduit le nom du Seigneur Jésus, il persuadait non seulement des Juifs, mais aussi des Grecs . –  Chaque sabbat… dans la synagogue 13.5+,12+. –  discutait 17.2n. –  persuadait… 13.43+ ; 14.1+. –  des Juifs et des Grecs  : autre traduction Juifs et Grecs.'
  - type: text
    content: 'Chaque sabbat, il discutait dans la synagogue et persuadait des Juifs et des Grecs. '
  '5':
  - type: note
    content: 'Silas (15.22+) et Timothée (16.1+) : cf. 17.14s ; 1Th 1.1 ; 3.1-6. –  Paul se consacra entièrement à la Parole  : autre traduction Paul fut pris par la parole  ; certains mss portent Paul, pris par l''Esprit, attestait…  ; cf. 2Co 11.9. –  attestait ou rendait témoignage  ; cf. Lc 16.28n. –  que Jésus est le Christ 9.20-22+ ; voir onction.'
  - type: text
    content: 'Mais quand Silas et Timothée furent descendus de Macédoine, Paul se consacra entièrement à la Parole ; il attestait aux Juifs que Jésus est le Christ. '
  '6':
  - type: note
    content: 'calomnies 13.45n. –  il secoua ses vêtements  : cf. 13.51+. –  Que votre sang soit sur votre tête  : c.-à-d. vous porterez vous-mêmes la responsabilité de votre perte  ; cf. 5.28 ; Mt 27.25+ ; voir aussi Lv 20.9n  ; Ez 33.4. –  j''en suis pur  : litt. je suis pur 20.26. –  vers les non-Juifs 13.46+ ; cf. Rm 11.11.'
  - type: text
    content: 'Mais comme les Juifs s''opposaient à lui avec des calomnies, il secoua ses vêtements et leur dit : Que votre sang soit sur votre tête ! Moi, j''en suis pur ; dorénavant j''irai vers les non-Juifs. '
  '7':
  - type: note
    content: 'Cf. 19.8s. –  de là  : texte occidental de chez Aquilas. –  chez…  : litt. dans la maison de… –  Titius ou Titus Justus, selon les mss ; ce nom latin indique qu''il s''agit d''un non-Juif. –  adorateur de Dieu  : voir 13.43n  ; 16.14n.'
  - type: text
    content: 'Il partit de là et se rendit chez un nommé Titius Justus, un adorateur de Dieu dont la maison était contiguë à la synagogue. '
  '8':
  - type: note
    content: 'Crispos 1Co 1.14. –  crut le Seigneur ou crut au Seigneur 16.15,34 ; cf. 5.14n. –  toute sa maison 10.2n  ; 11.14n. –  devenaient croyants  : texte occidental eurent foi (= devinrent croyants) [en Dieu] par le nom du (ou de notre) Seigneur Jésus-Christ. –  recevaient le baptême  : autre traduction possible ici se faisaient baptiser 2.41+.'
  - type: text
    content: Pourtant Crispos, le chef de la synagogue, crut le Seigneur, avec toute sa maison. Et beaucoup de Corinthiens qui écoutaient devenaient croyants et recevaient le baptême.
  '9':
  - type: text
    content: ' '
  - type: note
    content: en vision 9.10+. –  N'aie pas peur 27.24 ; Jos 1.9 ; Es 41.10 ; 43.5 ; Jr 1.8,19 ; cf. 1Co 2.3 ; voir crainte.
  - type: text
    content: 'Pendant la nuit, le Seigneur dit à Paul en vision : N''aie pas peur ! Parle, ne te tais pas, '
