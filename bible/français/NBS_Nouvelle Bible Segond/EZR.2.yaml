document_id: EZR.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Liste des Judéens qui revinrent dans leur pays
  - type: heading
    content: Né 7.6-72
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Né 7.6ss, où les chiffres sont souvent différents. Certains ont tenté d''expliquer ces différences par des confusions nées du système d''écriture des chiffres. –  ceux de la province  : litt. les fils de la province , c.-à-d. la région de Jérusalem ; le terme fils peut aussi désigner les habitants d''une ville ou d''une région (v. 21ss) ; 5.8 ; Né 1.3 ; 11.3 ; cf. Est 1.1. –  de captivité 3.8 ; 8.35 ; 9.7 ; Né 1.2.'
  - type: text
    content: 'Voici ceux de la province qui montèrent de captivité, ceux que Nabuchodonosor, roi de Babylone, avait exilés à Babylone, et qui revinrent à Jérusalem et en Juda, chacun dans sa ville. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Bani ou Binnouï , Né 7.15.
  - type: text
    content: 'les fils de Bani : 642 ;'
  '11':
  - type: text
    content: 'les fils de Bébaï : 623 ;'
  '12':
  - type: text
    content: 'les fils d''Azgad : 1 222 ;'
  '13':
  - type: text
    content: 'les fils d''Adoniqam : 666 ;'
  '14':
  - type: text
    content: 'les fils de Bigvaï : 2 056 ;'
  '15':
  - type: text
    content: 'les fils d''Adîn : 454 ;'
  '16':
  - type: text
    content: 'les fils d''Ater, pour Ezéchias : 98 ;'
  '17':
  - type: text
    content: 'les fils de Betsaï : 323 ;'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Yora  : LXX Oura , Né 7.24 Hariph.'
  - type: text
    content: 'les fils de Yora : 112 ;'
  '19':
  - type: text
    content: 'les fils de Hashoum : 223 ;'
  '2':
  - type: note
    content: 'Zorobabel, responsable du rapatriement, sans doute peu après Sheshbatsar (1.8n,11) ; 3.2 ; 5.2 ; Ag 1.1n  ; 2.2,21-23+ ; Za 4.6ss ; 6.12n  ; Né 7.7 ; 12.1 ; 1Ch 3.19. –  Josué, le futur (v. 63) grand prêtre, fils de Yehotsadaq et petit-fils de Seraya v. 36 ; 3.2 ; 5.2 ; 2R 25.18 ; Ag 1.1 ; 2.2 ; Za 3.1nss ; 6.11 ; Né 7.7 ; 12.1,10 ; 1Ch 5.40. Dans Esd-Né ce nom est écrit Yéshoua‘ (comme en Né 11.26), forme qui se rapproche du grec Iésous, Jésus (aussi 1Ch 24.11 ; 2Ch 31.15). –  Néhémie et Mardochée  : à distinguer des personnages connus qui portent le même nom (Est 2.5 ; Né 1.1). –  Seraya ou Azaria, Réélaya ou Raamia selon Né 7.7, qui rajoute aussitôt après un douzième nom, Nahamani. –  Mispar ou Mispéreth, Rehoum ou Nehoum (Né 7.7) : cf. Esd 4.8s ; Né 3.17 ; 10.25 ; 12.3.'
  - type: text
    content: Ils vinrent avec Zorobabel, Josué, Néhémie, Seraya, Réélaya, Mardochée, Bilshân, Mispar, Bigvaï, Rehoum, Baana.
  - type: text
    content: 'Nombre des hommes du peuple d''Israël :'
  '20':
  - type: text
    content: ' '
  - type: note
    content: Guibbar ou Gabaon (Né 7.25), nom d'une localité (3.7).
  - type: text
    content: 'les fils de Guibbar : 95 ;'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Les localités mentionnées à partir de ce v. sont toutes assez proches de Jérusalem (v. 1n). –  fils v. 1n  ; Né 7.26. –  Beth-Léhem au sud.
  - type: text
    content: 'les fils de Beth-Léhem : 123 ;'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'les gens  : litt. les hommes , de même dans la suite. –  Netopha , au sud de Beth-Léhem, 2S 23.28s ; Jr 48.8.'
  - type: text
    content: 'les gens de Netopha : 56 ;'
  '23':
  - type: text
    content: ' '
  - type: note
    content: Anatoth Jos 21.18 ; Jr 1.1.
  - type: text
    content: 'les gens d''Anatoth : 128 ;'
  '24':
  - type: text
    content: ' '
  - type: note
    content: Azmaveth ou Beth-Azmaveth , Né 7.28 ; cf. 2S 23.31.
  - type: text
    content: 'les fils d''Azmaveth : 42 ;'
  '25':
  - type: text
    content: ' '
  - type: note
    content: Qiriath-Arim ou Qiriath-Yéarim , Jos 9.17 ; Né 7.29.
  - type: text
    content: 'les fils de Qiriath-Arim, de Kephira et de Bééroth : 743 ;'
  '26':
  - type: text
    content: ' '
  - type: note
    content: Rama Jos 18.25 ; 1S 7.17. –  Guéba Jos 21.17.
  - type: text
    content: 'les fils de Rama et de Guéba : 621 ;'
  '27':
  - type: text
    content: ' '
  - type: note
    content: Mikmas ou Mikmash , cf. 1S 13.2ss.
  - type: text
    content: 'les gens de Mikmas : 122 ;'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Beth-El et Aï au nord de Jérusalem, Gn 28.19 ; Jos 7.2n.
  - type: text
    content: 'les gens de Beth-El et du Aï : 223 ;'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.43.
  - type: text
    content: 'les fils de Nebo : 52 ;'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Les listes sont classées en fonction de l'appartenance familiale ou ethnique (v. 3-20), de l'origine géographique (v. 20n,21-35n) ou de l'organisation du culte (v. 36ss). –  Paréosh 8.3 ; 10.25 ; Né 3.25 ; 10.15.
  - type: text
    content: 'les fils de Paréosh : 2 172 ;'
  '30':
  - type: text
    content: ' '
  - type: note
    content: Omis en Né 7.33s ; cf. 10.21.
  - type: text
    content: 'les fils de Magbish : 156 ;'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 7.
  - type: text
    content: 'les fils de l''autre Elam : 1 254 ;'
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 39 ; 10.31 ; Né 10.28.
  - type: text
    content: 'les fils de Harim : 320 ;'
  '33':
  - type: text
    content: ' '
  - type: note
    content: Villes à l'ouest de Jérusalem, cf. Né 7.37 ; voir aussi 6.2n  ; 11.34s ; 1Ch 8.12.
  - type: text
    content: 'les fils de Lod, de Hadid et d''Ono : 725 ;'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Jéricho  : à l''est de Jérusalem (Jos 2.1ss).'
  - type: text
    content: 'les fils de Jéricho : 345 ;'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Senaa  : peut-être une localité proche de Jéricho (cf. Né 3.2s ; 7.38).'
  - type: text
    content: 'les fils de Senaa : 3 630.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: Cf. chap. 10 ; voir aussi 1Ch 24.
  - type: text
    content: 'Prêtres : les fils de Yedaya, pour la maison de Josué : 973 ;'
  '37':
  - type: text
    content: 'les fils d''Immer : 1 052 ;'
  '38':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jr 20.1ss ; Né 11.12 ; 1Ch 9.12.
  - type: text
    content: 'les fils de Pashhour : 1 247 ;'
  '39':
  - type: text
    content: 'les fils de Harim : 1 017.'
  '4':
  - type: text
    content: 'les fils de Shephatia : 372 ;'
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Lévites 1.5 ; sur le petit nombre des lévites, cf. 8.15 ; Ez 44.10ss ; Né 12.24 ; 13.10 ; 1Ch 24–26. –  pour les fils de  : certains, d''après 3 Esdras , lisent un autre nom propre  : de Binnouï et de Hodavia (cf. 3.9n).'
  - type: text
    content: 'Lévites : les fils de Josué et de Qadmiel, pour les fils de Hodavia : 74.'
  '41':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.10 ; Né 12.46 ; 1Ch 6.16ss ; 16.37ss ; 25.1ss ; 2Ch 29.30.
  - type: text
    content: 'Chantres : les fils d''Asaph : 128.'
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 35.4 ; Né 7.45 ; 11.19 ; 1Ch 9.17. –  Portiers  : litt. fils des portiers.'
  - type: text
    content: 'Portiers : les fils de Shalloum, les fils d''Ater, les fils de Talmôn, les fils d''Aqqoub, les fils de Hatita, les fils de Shobaï, en tout : 139.'
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Netinim  : ce sont les esclaves ou serviteurs du temple (v. 58 ; 8.20 ; Nb 3.9n  ; 31.28ss,47 ; Jos 9.23ss ; Ez 44.7ss ; Né 10.29) ; ils ne portent ce nom qu''en Esd, Né et 1Ch 9.2n. –  Tsiha  : cf. Né 11.21.'
  - type: text
    content: 'Netinim : les fils de Tsiha, les fils de Hasoupha, les fils de Tabbaoth, '
  '44':
  - type: text
    content: 'les fils de Qéros, les fils de Siaha, les fils de Padôn, '
  '45':
  - type: note
    content: Cf. Né 7.48.
  - type: text
    content: 'les fils de Lebana, les fils de Hagaba, les fils d''Aqqoub, '
  '46':
  - type: text
    content: 'les fils de Hagab, les fils de Shamlaï, les fils de Hanân, '
  '47':
  - type: text
    content: 'les fils de Guiddel, les fils de Gahar, les fils de Réaya, '
  '48':
  - type: text
    content: 'les fils de Retsîn, les fils de Neqoda, les fils de Gazzam, '
  '49':
  - type: text
    content: 'les fils d''Ouzza, les fils de Paséah, les fils de Bésaï, '
  '5':
  - type: text
    content: 'les fils d''Arah : 775 ;'
  '50':
  - type: note
    content: Cf. Né 7.52.
  - type: text
    content: 'les fils d''Asna, les fils de Méounim, les fils de Nephousim, '
  '51':
  - type: text
    content: 'les fils de Baqbouq, les fils de Haqoupha, les fils de Harhour, '
  '52':
  - type: text
    content: 'les fils de Batslouth, les fils de Mehida, les fils de Harsha, '
  '53':
  - type: text
    content: 'les fils de Barqos, les fils de Sisera, les fils de Tamah, '
  '54':
  - type: text
    content: les fils de Netsiah, les fils de Hatipha.
  '55':
  - type: text
    content: ' '
  - type: note
    content: 'Fils des gens de la cour (litt. des serviteurs ) de Salomon  : autre traduction les gens de la cour de Salomon  ; cf. 7.24n  ; 1R 9.20s ; Né 7.57ss ; 11.3 ; 2Ch 8.7ss. –  Sophéreth  : terme de forme féminine (comme Pokéreth-Tsebaïm au v. 57, ou Qohéleth Ec 1.1n) ; certains voient ici le nom d''une corporation de scribes ( sopher ).'
  - type: text
    content: 'Fils des gens de la cour de Salomon : les fils de Sotaï, les fils de Sophéreth, les fils de Perouda, '
  '56':
  - type: text
    content: 'les fils de Yaala, les fils de Darqôn, les fils de Guiddel, '
  '57':
  - type: note
    content: 'Pokéreth-Tsebaïm  : gardiens des biches  ? (cf. v. 55n). –  Ami ou Amôn, Né 7.59.'
  - type: text
    content: les fils de Shephatia, les fils de Hattil, les fils de Pokéreth-Tsebaïm, les fils d'Ami.
  '58':
  - type: text
    content: ' '
  - type: note
    content: Né 7.60 ; 11.3.
  - type: text
    content: 'Total des Netinim et des fils des gens de la cour de Salomon : 392.'
  '59':
  - type: text
    content: ' '
  - type: note
    content: 'Tel-Mélah…  : lieux d''exil non identifiés, probablement en Babylonie. –  ne purent faire connaître  : cf. v. 62 ; Né 7.5 ; 1Ch 5.7,17. –  ascendance  : le mot hébreu est habituellement traduit par descendance.'
  - type: text
    content: 'Voici ceux qui montèrent de Tel-Mélah, de Tel-Harsha, de Keroub-Addân et d''Immer, et qui ne purent faire connaître leur famille et leur ascendance pour prouver qu''ils étaient d''Israël. '
  '6':
  - type: text
    content: ' '
  - type: note
    content: Pahath-Moab pourrait être une désignation ethnique (cf. 8.4).
  - type: text
    content: 'les fils de Pahath-Moab, pour les fils de Josué et de Joab : 2 812 ;'
  '60':
  - type: note
    content: 'Delaya  : cf. Jr 36.12 ; Né 6.10 ; 1Ch 3.24 ; 24.18. –  Tobiya  : cf. Za 6.10,14 ; Né 2.10,19. –  Neqoda  : cf. v. 48.'
  - type: text
    content: 'Les fils de Delaya, les fils de Tobiya, les fils de Neqoda : 652. '
  '61':
  - type: note
    content: 'parmi les fils des prêtres  : autre traduction parmi les prêtres  ; cf. 10.18. –  Haqqots Né 3.4,21. –  Barzillaï 2S 17.27ss ; 19.32ss ; 1R 2.7. –  appelé de leur nom  : l''expression fait sans doute référence à une adoption.'
  - type: text
    content: 'Et parmi les fils des prêtres : les fils de Habaya, les fils de Haqqots, les fils de Barzillaï, qui avait pris pour femme une des filles de Barzillaï, le Galaadite, et fut appelé de leur nom. '
  '62':
  - type: note
    content: 'leurs titres généalogiques  : litt. leur écrit (2Ch 35.4n) d''enregistrement (cf. Esd 8.1,3). –  déchus  : litt. (considérés comme) souillés pour le sacerdoce  ; même verbe So 3.1 ; Ml 1.7 ; voir pur.'
  - type: text
    content: 'Ils cherchèrent leurs titres généalogiques, mais ne les trouvèrent pas. Ils furent déchus du sacerdoce, '
  '63':
  - type: note
    content: 'Son Excellence  : hébreu tirshata’, transcription d''un titre perse (litt. révérend) désignant probablement le gouverneur (8.36+) ; il s''agit sans doute, en l''occurrence, de Zorobabel (v. 2+) ; cf. Né 7.65,69 ; 8.9 ; 10.2. –  ne pas manger… Lv 2.3,10 ; 6.22 ; 7.7,21ss,31ss ; 10.14s ; 22.10ss. –  sacrées  : voir saint. –  un prêtre  : Syr un grand prêtre  ; cf. 2.2+ ; cf. 1 Maccabées 4.46 : « (Les purificateurs du temple) déposèrent les pierres (de l''autel profané) sur la montagne de la Demeure… en attendant la venue d''un prophète qui se prononcerait à leur sujet. » –  l''ourim et le toummim, ou les ourim et les toummim Ex 28.30n  ; Lv 8.8 ; Nb 27.21 ; cf. Dt 33.8 ; 1S 14.41ns ; 28.6.'
  - type: text
    content: et Son Excellence leur dit de ne pas manger des choses très sacrées jusqu'à ce qu'un prêtre soit là pour consulter l'ourim et le toummim.
  '64':
  - type: text
    content: ' '
  - type: note
    content: 'tout entière  : litt. comme un(e) seul(e)  ; même expression en 3.9 ; 6.20 ( tous ensemble ). –  42 360  : ce chiffre ne correspond pas à la somme des chiffres précédents (29 818). Cf. 1.11n.'
  - type: text
    content: 'L''assemblée tout entière était de 42 360 personnes, '
  '65':
  - type: note
    content: 'chantres et chanteuses  : peut-être des chanteurs profanes, en plus des chantres du temple (v. 41,70).'
  - type: text
    content: 'sans compter leurs serviteurs et leurs servantes, au nombre de 7 337. Parmi eux se trouvaient 200 chantres et chanteuses. '
  '66':
  - type: text
    content: 'Ils avaient 736 chevaux, 245 mulets ; '
  '67':
  - type: text
    content: 435 chameaux et 6 720 ânes.
  '68':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.2ss ; Ex 25.2ss ; 35.4ss ; Nb 7.1ss ; Né 7.68ss. –  offrandes  : voir sacrifices.'
  - type: text
    content: 'Plusieurs chefs de famille, lors de leur arrivée à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Jérusalem, firent des offrandes volontaires pour la maison de Dieu, pour qu''elle soit rétablie sur son emplacement. '
  '69':
  - type: note
    content: 'fonds  : voir Né 7.70n. –  drachmes  : monnaie grecque, normalement d''argent ; l''identification de l''unité de poids ou monnaie équivalente à l''époque perse est incertaine (darique ?) ; 3 Esdras indique 1 000 mines  ; selon les diverses hypothèses la quantité varierait entre 600 kg et trois tonnes d''or (voir mesures). –  5 000 mines  : environ trois tonnes.'
  - type: text
    content: 'Ils donnèrent au fonds des travaux, selon leurs moyens, 61 000 drachmes d''or, 5 000 mines d''argent et 100 tuniques sacerdotales. '
  '7':
  - type: text
    content: 'les fils d''Elam : 1 254 ;'
  '70':
  - type: note
    content: 3 Esdras 5.46 place les prêtres, les lévites et une partie du peuple « à Jérusalem et dans les environs » (cf. 3.2ss).
  - type: text
    content: Les prêtres et les lévites, une partie du peuple, les chantres, les portiers et les Netinim s'installèrent dans leurs villes, ainsi que tous les Israélites dans leurs villes.
  '8':
  - type: text
    content: 'les fils de Zattou : 945 ;'
  '9':
  - type: text
    content: 'les fils de Zakkaï : 760 ;'
