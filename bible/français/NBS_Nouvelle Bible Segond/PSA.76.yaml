document_id: PSA.76,104
type_code: fra
verses:
  '1':
  - type: heading
    content: A Sion, Dieu met fin à la guerre
  - type: text
    content: ' '
  - type: note
    content: instruments à cordes 4.1+. –  Psaume. D'Asaph. Chant 75.1+. –  LXX ajoute pour (ou contre ) l'Assyrien  ; cf. 2R 19.32-35.
  - type: text
    content: Du chef de chœur. Avec instruments à cordes. Psaume. D'Asaph. Chant.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'pour l''équité  : autre traduction pour faire régner le droit . –  pour sauver… 12.6 ; 34.7 ; 72.2,4,12 ; 82.3 ; Es 11.4 ; Jr 20.13. –  les pauvres 9.13n. –  du pays ou de la terre.'
  - type: text
    content: lorsque Dieu s'est levé pour l'équité,
  - type: text
    content: 'pour sauver tous les pauvres du pays. '
  - type: text
    content: Pause.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et diversement interprété. Au lieu de tu te ceins LXX a lu te fera fête ou te louera. Certains modifient la vocalisation traditionnelle pour lire respectivement Hamath et Edom (ennemis ancestraux d''Israël) au lieu de fureurs et humains , ce qui pourrait donner la traduction suivante  : même Edom le farouche te célébrera, ce qui restera de Hamath te louera.'
  - type: text
    content: La fureur même des humains te célèbre ;
  - type: text
    content: tu te ceins des restes de fureurs.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.11 ; 68.30 ; Es 18.7. –  vœux 22.26+. –  au Redoutable  : terme apparenté au v. 8.'
  - type: text
    content: 'Faites des vœux au '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et acquittez-vous-en !'
  - type: text
    content: Que tous ceux qui l'entourent
  - type: text
    content: apportent des dons au Redoutable !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'souffle  : le mot hébreu peut aussi être traduit par esprit. –  les rois de la terre 2.10 ; 48.5.'
  - type: text
    content: Il coupe le souffle aux chefs,
  - type: text
    content: il est redoutable pour les rois de la terre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu est connu…  : cf. 48.2-4. –  son nom est grand  : cf. 99.3 ; Jos 7.9 ; 1S 12.22 ; 1R 8.42 ; Jr 10.6 ; 44.26 ; Ez 36.23 ; Ml 1.11 ; 2Ch 6.32.'
  - type: text
    content: Dieu est connu en Juda,
  - type: text
    content: son nom est grand en Israël.
  '3':
  - type: text
    content: ' '
  - type: note
    content: Sa hutte 27.5n  ; cf. 68.18 ; 132.3-5 ; 2S 6.17 ; 7.2. –  à Salem , c.-à-d. Jérusalem (aussi appelée Sion  ; cf. 137.3) ; LXX a traduit en paix  ; cf. 122.6 ; Gn 14.18n  ; Es 2.4 ; 11.9 ; Hé 7.2. –  son séjour 26.8n  ; 132.13s ; 1R 8.12s.
  - type: text
    content: Sa hutte est à Salem,
  - type: text
    content: son séjour à Sion.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 46.10 ; 48.5-9 ; 1S 2.4 ; Os 2.20. –  les foudres de l''arc  : cf. Es 50.11.'
  - type: text
    content: C'est là qu'il a brisé les foudres de l'arc,
  - type: text
    content: 'le bouclier, l''épée et la guerre. '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'resplendissant  : traduction incertaine ; le verbe rappelle le mot hébreu pour lumière  ; avec Tg, certains intervertissent les lettres du texte hébreu traditionnel pour lire redoutable , comme au v. 8. –  les montagnes des ravisseurs  : traduction incertaine, litt. les montagnes de proie ou de butin (autre mot qu''au v. 6) ; LXX les montagnes éternelles  ; cf. 68.16s ; Gn 49.26 ; Dt 33.15.'
  - type: text
    content: Tu es plus resplendissant, plus magnifique
  - type: text
    content: que les montagnes des ravisseurs.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 48.5ss. –  au cœur indomptable  : cf. Es 46.12n. –  ils se sont endormis… Jr 51.39,57 ; Jb 27.19 ; cf. 2R 19.35. –  dernier  : sous-entendu dans le texte. –  ils n''ont pas su se défendre  : litt. ils n''ont pas trouvé leurs mains.'
  - type: text
    content: Ils ont été pris comme butin, ces hommes au cœur indomptable,
  - type: text
    content: ils se sont endormis de leur dernier sommeil ;
  - type: text
    content: ils n'ont pas su se défendre, tous ces vaillants hommes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Quand tu les as rabroués  : cf. 9.6+ ; 18.16 ; 104.7 ; Es 17.13 ; 50.2. –  Dieu de Jacob 75.10+ ; cf. 46.8,12. –  cavaliers ou conducteurs (ou attelages ) de chars de guerre  ; Ez 39.20n  ; cf. Ex 14.25 ; 15.1. –  sont tombés en torpeur  : cf. Gn 2.21+ ; autre traduction se sont endormis  ; cf. Jg 4.21 ; Jon 1.5 ; Es 43.17.'
  - type: text
    content: Quand tu les as rabroués, Dieu de Jacob,
  - type: text
    content: cavaliers et chevaux sont tombés en torpeur.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'redoutable v. 5n,12n  ; cf. 47.3. –  au temps de ta colère  : litt. depuis ta colère , c.-à-d. dès que tu te mets en colère  ; certains modifient légèrement le texte hébreu traditionnel pour lire devant la force de ta colère  ; cf. 90.11 ; Na 1.6.'
  - type: text
    content: C'est toi qui es redoutable, toi !
  - type: text
    content: Qui peut tenir en face de toi, au temps de ta colère ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 46.7. –  le verdict ou le jugement  ; cf. 50.6+ ; 75.8.
  - type: text
    content: Du ciel tu as fait entendre le verdict ;
  - type: text
    content: la terre a eu peur, elle s'est tenue tranquille,
