document_id: MRK.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'homme à la main paralysée
  - type: heading
    content: Mt 12.9-14  ; Lc 6.6-11
  - type: text
    content: ' '
  - type: note
    content: 'à la synagogue  : certains mss portent dans une synagogue  ; cf. 1.21. –  paralysée  : litt. desséchée , cf. v. 3 ; 4.6 ; 5.29n  ; 9.18 ; 11.20s ; voir Mt 12.10n.'
  - type: text
    content: 'Il retourna à la synagogue. Il se trouvait là un homme qui avait la main paralysée. '
  '10':
  - type: note
    content: 'Mt 15.30. –  maladies  : litt. fléaux  ; le même terme grec est traduit par mal en 5.29,34 ; cf. Lc 7.21 ; il évoque le châtiment du fouet en Ac 22.24 ; Hé 11.36. –  le toucher 1.41+ ; cf. 5.28.'
  - type: text
    content: 'En effet, comme il guérissait beaucoup de gens, tous ceux qui avaient des maladies se jetaient sur lui pour le toucher. '
  '11':
  - type: note
    content: 'esprits impurs  : voir pur, impur. –  tombaient devant lui ou se jetaient à ses pieds (verbe apparenté au v. 10). –  Fils de Dieu  : cf. 1.1n,24,34 ; 5.7 ; Mt 8.29 ; Lc 4.41.'
  - type: text
    content: 'Les esprits impurs, quand ils le voyaient, tombaient devant lui et s''écriaient : Toi, tu es le Fils de Dieu ! '
  '12':
  - type: note
    content: 'rabrouait 1.25n. –  avec sévérité  : litt. beaucoup  ; cette précision est absente de certains mss. –  ne parlent pas de lui  : litt. ne le rendent pas (Jésus) manifeste ou célèbre, cf. 4.22n  ; 6.14n.'
  - type: text
    content: Mais il les rabrouait avec sévérité pour qu'ils ne parlent pas de lui.
  - type: heading
    content: Jésus choisit les Douze
  - type: heading
    content: Mt 10.1-4  ; Lc 6.12-16  ; Ac 1.13
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'sur la montagne 6.46 ; 9.2. –  il appelle…  : cf. 1.16ss ; 2.14.'
  - type: text
    content: Il monte ensuite sur la montagne ; il appelle ceux qu'il voulait, et ils vinrent à lui.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Il en choisit  : litt. il fit  ; le verbe correspondant peut décrire la mise en place d''une institution ou la nomination de quelqu''un à une fonction ; cf. v. 16n. –  douze  : cf. Epître de Barnabé 8.3 : « Il les a investis de l''autorité de l''évangile qu''ils vont prêcher, eux qui sont douze en témoignage pour les tribus – qui sont douze en Israël. » –  à qui il donna aussi le nom d''apôtres  : cette précision est absente de certains mss ; le terme transcrit apôtres est dérivé du verbe rendu par envoyer 6.7, cf. 6.30n  ; voir Mt 10.1+,2n. –  qu''ils soient avec lui , cf. 5.18. –  proclamer 1.4n,38n.'
  - type: text
    content: 'Il en choisit douze, à qui il donna aussi le nom d''apôtres, pour qu''ils soient avec lui et pour les envoyer proclamer, '
  '15':
  - type: note
    content: avec (litt. et avoir) l'autorité pour ou le pouvoir de 1.22n  ; 2.24n  ; cf. 6.7. –  chasser les démons 1.34,39 ; 3.15,22 ; 6.13 ; 9.38 ; 16.9,17.
  - type: text
    content: avec l'autorité pour chasser les démons.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Il choisit (ou nomma , litt. fit ) les Douze  : cette phrase est omise par certains mss ; cf. v. 14n. –  Simon / Pierre  : cf. 14.37 ; Mt 16.16-18 ; Jn 1.42.'
  - type: text
    content: 'Il choisit les Douze : Simon, à qui il attribua le nom de Pierre, '
  '17':
  - type: note
    content: '1.19+. –  le nom  : litt. (selon certains mss) les noms. –  Boanergès  : transcription en grec d''une expression, sans doute araméenne, que le texte traduit par Fils (au pluriel) du tonnerre mais dont on n''a pas identifié avec certitude la forme originale ; autres transcriptions de l''araméen en 5.41 ; 7.11,34 ; 11.9s ; 14.36 ; 15.22,34 ; cf. Lc 9.49,54.'
  - type: text
    content: 'Jacques, fils de Zébédée, et Jean, frère de Jacques, auxquels il attribua le nom de Boanergès, qui signifie « Fils du tonnerre » ; '
  '18':
  - type: note
    content: 'Matthieu Mt 9.9. –  Thomas Jn 11.16+. –  fils (ou peut-être frère) d''Alphée, comme en 2.14n  ; de même en Mt 10.3 ; Lc 6.15 ; Ac 1.13. –  Thaddée  : un ms (occidental, voir introductions au N.T. et aux Actes des Apôtres) porte Lebbée (de même Mt 10.3). –  Cananite Mt 10.4n  ; voir zélote.'
  - type: text
    content: 'André, Philippe, Barthélemy, Matthieu, Thomas, Jacques, fils d''Alphée, Thaddée, Simon le Cananite '
  '19':
  - type: note
    content: Iscarioth ou Iscariote Mt 10.4n  ; cf. Jn 6.71 ; 13.26.
  - type: text
    content: et Judas Iscarioth, celui qui le livra.
  - type: heading
    content: Jésus a-t-il partie liée avec les démons ?
  '2':
  - type: note
    content: 'Ils observaient Jésus  : litt. ils l''observaient. – La casuistique juive dont témoigne le Talmud définit précisément les soins essentiels que l''on peut donner à un malade le jour du sabbat  ; seul le danger de mort prime automatiquement sur l''observance du sabbat (cf. 2.27+).'
  - type: text
    content: 'Ils observaient Jésus pour voir s''il le guérirait un jour de sabbat, afin de l''accuser. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'il revient  : litt. il vient  ; certains mss portent ils viennent . –  à la maison  : cf. 2.1n. –  la foule v. 7s ; 2.2. –  manger  : litt. manger du pain  ; cf. 6.31,44 ; 7.2n,5 ; Mt 15.2+.'
  - type: text
    content: 'Puis il revient à la maison, et la foule se rassemble encore : ils ne pouvaient pas même manger. '
  '21':
  - type: note
    content: 'Cf. v. 31-35/ /. –  les gens de sa parenté  : litt. ceux de chez lui. –  se saisir de lui  : le même verbe sera traduit par (faire) arrêter en 6.17. –  ils disaient  : certains comprennent on disait. –  Il a perdu la raison  : le même verbe grec évoque la stupéfaction en 2.12n  ; il a un sens comparable en 2Co 5.13 ; cf. Jn 10.20 ; voir aussi Za 13.3 ; Ps 69.9.'
  - type: text
    content: 'A cette nouvelle, les gens de sa parenté sortirent pour se saisir de lui, car ils disaient : Il a perdu la raison.'
  - type: heading
    content: Mt 12.24-29  ; Lc 11.15-22
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Les scribes… 2.6+ ; cf. 7.1. –  Il a  : l''expression correspondante évoque habituellement la possession démoniaque, cf. v. 30 ; 5.15 ; 7.25 ; 9.17 ; voir aussi Jn 7.20 ; 8.48,52 ; 10.20. –  Béelzéboul (d''autres témoins anciens ont lu Béézéboul ou Béelzébub ) : ce nom donné au prince des démons (cf. 1.13+ ; 3.30 ; Mt 9.34n  ; 10.25 ; Jn 7.20+) résulte d''une déformation d''un titre de divinité sémitique signifiant Baal le prince (ou peut-être Baal de la demeure élevée ) ; on en retrouve sans doute une autre déformation dans le nom Baal-Zeboub (2R 1.2ss).'
  - type: text
    content: 'Les scribes qui étaient descendus de Jérusalem disaient : Il a Béelzéboul ; c''est par le prince des démons qu''il chasse les démons !'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'paraboles 4.2+. –  Satan  : autre traduction un satan v. 22n  ; 1.13n.'
  - type: text
    content: 'Il les appela et se mit à leur dire, en paraboles : Comment Satan peut-il chasser Satan ? '
  '24':
  - type: text
    content: 'Si un royaume est divisé contre lui-même, ce royaume ne peut tenir ; '
  '25':
  - type: text
    content: 'et si une maison est divisée contre elle-même, cette maison ne peut tenir. '
  '26':
  - type: text
    content: 'Si donc le Satan se dresse contre lui-même, il est divisé et il ne peut tenir : c''en est fini de lui. '
  '27':
  - type: note
    content: 'homme fort ou puissant  : cf. 1.7. –  ses biens Mt 12.29n  ; cf. Es 49.24s ; 53.12 ; Psaumes de Salomon 5.3 : « On ne peut s''emparer du butin d''un héros ; qui donc peut s''emparer de tout ce que tu as créé, si toi-même tu ne le donnes ? » Evangile selon Thomas 35 : « Jésus a dit : “Il n''est pas possible que quelqu''un entre dans la maison d''un homme puissant et la prenne par la force, à moins qu''il ne lui ait lié les mains ; alors seulement il pourra piller sa maison.” »'
  - type: text
    content: Personne ne peut entrer dans la maison d'un homme fort et piller ses biens sans avoir d'abord lié cet homme fort ; alors seulement il pillera sa maison.
  - type: heading
    content: Mt 12.31-33  ; Lc 12.10
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Amen Mt 5.18n. –  pardonné  : cf. 4.12. –  péchés  : le terme employé ici et au v. 29 n''apparaît que cinq fois dans le N.T. (aussi en Rm 3.25 ; 1Co 6.18 ; 2P 1.9). Dérivé du mot habituellement traduit par péché (Mc 1.4 etc.) il désignait plus particulièrement en grec classique des fautes concrètes, des actes pécheurs du point de vue de leur résultat ; cette nuance semble cependant s''être estompée dans le grec du N.T. –  blasphèmes  : cf. 2.7/ / ; 14.64/ / ; 15.29/ / ; Lc 22.65 ; 23.39 ; Jn 10.33-36 ; Ac 6.11 ; 1Tm 1.13-16 ; voir aussi Ex 22.27 ; Lv 24.11-16 ; Ez 35.12. –  autant qu''ils en auront proférés  : litt. tout ce qu''ils blasphèment (comme au v. 29).'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, tout sera pardonné aux fils des hommes, péchés et blasphèmes autant qu''ils en auront proférés ; '
  '29':
  - type: note
    content: 'Cf. Hé 6.4-8 ; 10.26-29 ; 1Jn 5.16. –  blasphème contre  : autres traductions calomnie, insulte  ; la même expression est utilisée par LXX en Dn 3.29 pour parler inconsidérément contre  ; cf. Nb 11.17 ; 27.18 ; Dt 34.9 ; Es 63.7-14 ; Ps 106.32s ; voir aussi Lv 24.11ss ; Nb 15.30s ; Es 22.14. Didachè 11.7 : « Par ailleurs, vous n''éprouverez aucun prophète qui parle sous l''inspiration de l''esprit et vous ne le jugerez pas non plus. Car tout péché sera remis, mais celui-là ne le sera pas. » – Voir aussi Esprit.'
  - type: text
    content: 'mais quiconque blasphème contre l''Esprit saint n''obtiendra jamais de pardon : il est coupable d''un péché éternel. '
  '3':
  - type: note
    content: 'paralysée  : litt. sèche, cf. v. 1n.'
  - type: text
    content: 'Alors il dit à l''homme qui avait la main paralysée : Lève-toi, là, au milieu. '
  '30':
  - type: note
    content: Cf. v. 22 ; voir aussi démon.
  - type: text
    content: 'C''est qu''ils disaient : Il a un esprit impur.'
  - type: heading
    content: La vraie parenté de Jésus
  - type: heading
    content: Mt 12.46-50  ; Lc 8.19-21
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 21 ; Mt 12.46+. –  se tenant  : autre traduction se tenant debout  ; cf. v. 34 ; même verbe en 11.25.'
  - type: text
    content: 'Sa mère et ses frères arrivent ; se tenant dehors, ils le firent appeler. '
  '32':
  - type: note
    content: 'et tes sœurs  : cette précision est absente de certains mss ; cf. Mt 13.56.'
  - type: text
    content: 'La foule était assise autour de lui et on lui dit : Ta mère, tes frères et tes sœurs sont dehors, et ils te cherchent. '
  '33':
  - type: text
    content: 'Il répond : Ma mère et mes frères, qui est-ce ? '
  '34':
  - type: note
    content: 'promenant ses regards… v. 5+. –  tout autour  : litt. en cercle autour.'
  - type: text
    content: 'Puis, promenant ses regards sur ceux qui étaient assis tout autour de lui, il dit : Voici ma mère et mes frères ! '
  '35':
  - type: note
    content: 'En effet  : le terme correspondant est absent de certains mss. –  Evangile selon Thomas 99 : « Les disciples lui dirent : “Ta mère et tes frères se tiennent dehors.” Il leur répondit : “Ceux que voici, qui font la volonté de mon Père, ceux-là sont mes frères et ma mère. Ce sont eux qui entreront dans le Royaume de mon Père.” »'
  - type: text
    content: En effet, quiconque fait la volonté de Dieu, celui-là est mon frère, ma sœur et ma mère.
  '4':
  - type: note
    content: 'Qu''est-ce qui est permis… (2.24n) : autre traduction qu''a-t-on le droit de faire un jour de sabbat : du bien ou du mal… ? cf. Lc 14.3 ; Jn 5.10 ; voir aussi Jc 4.17. –  de sauver  : litt. de sauver une vie ou un être  ; sur le terme grec correspondant, voir 8.35n. –  tuer  : cf. v. 6.'
  - type: text
    content: 'Puis il leur dit : Qu''est-ce qui est permis, un jour de sabbat ? Est-ce de faire du bien ou de faire du mal, de sauver ou de tuer ? Mais ils gardaient le silence. '
  '5':
  - type: note
    content: 'promenant ses regards  : même verbe grec v. 34 ; 5.32 (regarder autour) ; 10.23 ; 11.11 (tout regarder) ; Lc 6.10. –  avec colère 1.41n,43n. –  de les voir si obtus  : litt. de l''endurcissement de leur cœur, expression qui, conformément au sens figuré du mot cœur dans la Bible, évoque moins l''insensibilité affective que l''incapacité de comprendre ; cf. 6.52 ; 8.17 ; 10.5 ; 16.14 ; Ex 7.13 ; Es 6.9s ; Jn 12.40 ; Ac 7.51 ; 28.27 ; Rm 2.5 ; 11.25 ; Ep 4.18 ; Hé 3.8. –  fut rétablie ou fut rendue, c.-à-d. redevint saine (cf. Mt 12.10n) ; même verbe 8.25 ; 9.12 ; Ac 1.6 (rétablir) ; Hé 13.19 (rendre).'
  - type: text
    content: 'Alors, promenant ses regards sur eux avec colère, navré de les voir si obtus, il dit à l''homme : Tends ta main. Il la tendit, et sa main fut rétablie.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'tenaient (litt. donnaient ) conseil  : expressions légèrement différentes en 15.1 ; Mt 12.14. –  les hérodiens sont peut-être des partisans d''Hérode Antipas, tétrarque de Galilée (mais pas de Judée) de 4 av. J.-C. à 39 apr. J.-C., ou plus généralement des gens qui soutiennent la politique hérodienne de collaboration avec l''occupant romain. Globalement les rapports étaient plutôt bons entre les pharisiens et les Hérode. Hérode le Grand déjà (37-4 av. J.-C.) avait considéré les pharisiens avec une neutralité bienveillante, et Hérode Agrippa Ier (41-44) sera connu pour sa politique pro-pharisienne ; cf. 6.17 ; 8.15/ / ; 12.13/ /. –  le faire disparaître  : cf. v. 4 ; Ex 31.14 ; Mt 12.14+.'
  - type: text
    content: A peine sortis, les pharisiens tenaient conseil avec les hérodiens contre lui, sur les moyens de le faire disparaître.
  - type: heading
    content: Les foules viennent à Jésus
  - type: heading
    content: Mt 4.23-25  ; 12.15-16  ; Lc 6.17-19
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'la mer 1.16n. –  multitude  : cf. 1.5 ; voir aussi 2.13+.'
  - type: text
    content: 'Jésus se retira vers la mer avec ses disciples. Une grande multitude le suivit, venue de Galilée, de Judée, '
  '8':
  - type: note
    content: 'L’Idumée tient son nom de l''ancien Edom, au sud-ouest de la mer Morte, mais elle recouvre à l''époque romaine le sud de l''ancien territoire de Juda, à partir d''Hébron : ses habitants, en partie d''origine édomite ou arabe, avaient été soumis par les Maccabées environ un siècle et demi auparavant et avaient embrassé le judaïsme ; c''était la patrie d''Hérode (v. 6n). –  Tyr (7.24/ /) et Sidon (7.31), villes phéniciennes du littoral méditerranéen, au nord de la Galilée.'
  - type: text
    content: de Jérusalem, d'Idumée, de Transjordanie et des environs de Tyr et de Sidon. Une grande multitude, apprenant tout ce qu'il faisait, vint à lui.
  '9':
  - type: text
    content: ' '
  - type: note
    content: '4.1/ / ; Lc 5.3. –  tenir à sa disposition  : le verbe grec évoque une relation permanente (cf. Ac 8.13 ne pas quitter  ; 10.7 être attaché et dans un autre sens 1.14 ; 2.42,46 etc. persévérer ). –  une barque  : diminutif du terme habituellement traduit par bateau (aussi Jn 6.22ss ; 21.8) ; mais il n''a pas forcément de nuance particulière dans Mc. –  presse  : le verbe est apparenté au mot habituellement traduit par détresse (traditionnellement tribulation ) 4.17 ; 13.19 ; verbe apparenté en 5.24,31 ; Mt 7.14n  ; 24.9n  ; 2Co 4.8.'
  - type: text
    content: 'Il dit à ses disciples de tenir à sa disposition une barque, pour que la foule ne le presse pas. '
