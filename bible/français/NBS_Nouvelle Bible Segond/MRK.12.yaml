document_id: MRK.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole des vignerons
  - type: heading
    content: Mt 21.33-46  ; Lc 20.9-19
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Evangile selon Thomas 65 : « Un homme honnête avait une vigne. Il la donna à des vignerons pour qu''ils la cultivent et qu''il puisse en recevoir le fruit de leurs mains. Il envoya son serviteur pour que les vignerons lui donnent le fruit de la vigne. Ils saisirent son serviteur, le rouèrent de coups et peu s''en fallait qu''ils ne le tuent. Le serviteur retourna et raconta à son maître ce qui s''était passé. Le maître dit : “Peut-être ne l''ont-ils pas reconnu.” Il envoya alors un autre serviteur. Les vignerons le rouèrent à son tour de coups. Alors le maître envoya son fils, et dit : “Peut-être montreront-ils du respect pour mon fils.” Quand ces vignerons surent qu''il était l''héritier de la vigne, ils le saisirent et le tuèrent. Celui qui a des oreilles, qu''il entende. » –  en paraboles 4.2. –  une vigne…  : voir Es 5.1s ; Ps 80.8s. –  tour Mt 21.33n  ; Lc 14.28. –  partit en voyage 13.34.'
  - type: text
    content: 'Il se mit à leur parler en paraboles : Un homme planta une vigne. Il l''entoura d''une haie, creusa un pressoir et construisit une tour ; puis il la loua à des vignerons et partit en voyage. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la principale, celle de l''angle  : litt. la tête de l''angle ; Ps 118.22n s ; cf. Es 28.16 ; Ac 4.11 ; Rm 9.33 ; 1P 2.6-8 ; cf. Evangile selon Thomas 66 : « Jésus a dit : “Montrez-moi la pierre que les bâtisseurs ont rejetée : c''est elle, la pierre d''angle.” »'
  - type: text
    content: 'N''avez-vous pas lu cette Ecriture :'
  - type: text
    content: C'est la pierre que les constructeurs ont rejetée
  - type: text
    content: qui est devenue la principale, celle de l'angle ;
  '11':
  - type: text
    content: ' '
  - type: text
    content: cela est venu du Seigneur,
  - type: text
    content: c'est une chose étonnante à nos yeux
  - type: text
    content: .
  '12':
  - type: text
    content: ' '
  - type: note
    content: '11.18+. –  compris  : autre traduction su.'
  - type: text
    content: Ils cherchaient à le faire arrêter, mais ils eurent peur de la foule. Ils avaient compris que c'était pour eux qu'il avait dit cette parabole. Ils le laissèrent et s'en allèrent.
  - type: heading
    content: L'impôt dû à César
  - type: heading
    content: Mt 22.15-22  ; Lc 20.20-26
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'pharisiens / hérodiens 3.6n. –  le prendre au piège  : litt. l''attraper (autre terme Mt 22.15).'
  - type: text
    content: 'Ils envoient auprès de lui quelques-uns des pharisiens et des hérodiens afin de le prendre au piège en parole. '
  '14':
  - type: note
    content: 'Cf. Evangile selon Thomas 100 : « Ils montrèrent à Jésus une pièce d''or et lui dirent : “Les hommes de César réclament de nous des impôts.” Il leur répondit : “Donnez à César ce qui est à César, donnez à Dieu ce qui est à Dieu, et donnez-moi ce qui est à moi.” » Un papyrus égyptien (Egerton 2) du IIe ou du IIIe s., reconstitué, porterait le texte suivant : « (Ils) vinrent à lui et le tentaient (c.-à-d. : le mettaient à l''épreuve) par des questions, lui disant : “Maître Jésus, nous savons que c''est de Dieu que tu viens, car ce que tu fais en témoigne, mieux que pour tous les prophètes. Dis-nous donc : est-il permis de rendre aux rois ce qui revient à leur pouvoir ? le leur rendrons-nous ou pas ?” Mais Jésus, connaissant leur pensée, s''irrita et leur dit : “Pourquoi m''appelez-vous maître de la bouche et n''écoutez-vous pas ce que je dis ? Isaïe a bien prophétisé à votre sujet quand il a dit : ‘Ce peuple m''honore des lèvres mais son cœur est loin de moi…’” » (Cf. Mc 7.6s). –  Maître  : au sens d’enseignant (de même v. 19,32). –  franc  : litt. véridique ou vrai  ; cf. Jn 3.33+. –  tu ne te soucies de personne  : cf. 11.31s. –  à l''apparence  : litt. à la face, cf. Mt 22.16n  ; Lc 20.21n  ; Ac 10.34n. –  tu enseignes…  : cf. Ac 18.25s. –  capitation Mt 17.25n  ; 22.17n.'
  - type: text
    content: 'Ceux-ci viennent lui dire : Maître, nous savons que tu es franc et que tu ne te soucies de personne ; en effet, tu ne regardes pas à l''apparence des gens, mais tu enseignes la voie de Dieu selon la vérité. Est-il permis de payer la capitation à César ? Devons-nous payer ou ne pas payer ?'
  '15':
  - type: text
    content: ' '
  - type: note
    content: à l'épreuve 1.13+ ; 8.11.
  - type: text
    content: 'Connaissant leur hypocrisie, il leur répondit : Pourquoi me mettez-vous à l''épreuve ? Apportez-moi un denier, que je le voie. '
  '16':
  - type: note
    content: 'cette image…  : chaque denier portait l''effigie de Tibère César et une inscription latine signifiant Tibère César, fils du divin Auguste, Auguste  ; la monnaie était considérée comme appartenant à César  ; comparer avec Ex 20.4,23 ; voir aussi mesures, poids et monnaies.'
  - type: text
    content: 'Ils en apportèrent un. Il leur demande : De qui sont cette image et cette inscription ? – De César, lui répondirent-ils. '
  '17':
  - type: note
    content: 'Rm 13.7. –  ce qui est à Dieu  : litt. les choses de Dieu  ; même expression grecque 8.33 ; 1Co 2.11 ; cf. 2.14 ; 7.32ss.'
  - type: text
    content: 'Alors Jésus leur dit : Rendez à César ce qui est à César et à Dieu ce qui est à Dieu. Et ils s''étonnaient beaucoup à son sujet.'
  - type: heading
    content: Une question sur la résurrection
  - type: heading
    content: Mt 22.23-33  ; Lc 20.27-38
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Les sadducéens (sur leur nom, voir Ez 40.46n) étaient surtout issus de l''aristocratie sacerdotale ; pour eux, seule la loi de Moïse (c.-à-d. le Pentateuque, cf. v. 19,26) était vraiment normative (et non, par exemple, des textes comme Dn 12.2). –  résurrection  : litt. relèvement (des morts)  ; un verbe apparenté est traduit par susciter au v. 19 ; de même v. 23 ; cf. 8.31+ ; voir aussi Ac 4.1s ; 23.8.'
  - type: text
    content: 'Des sadducéens, qui disent qu''il n''y a pas de résurrection, viennent l''interroger : '
  '19':
  - type: note
    content: 'nous a prescrit  : litt. a écrit pour nous. –  Si quelqu''un…  : litt. si le frère de quelqu''un meurt et laisse une femme et n''a pas d''enfant, que son frère prenne la femme et suscite (verbe apparenté à ressusciter) une descendance pour son frère Dt 25.5ss  ; cf. Gn 38.8.'
  - type: text
    content: 'Maître, voici ce que Moïse nous a prescrit : '
  - type: text
    content: Si quelqu'un meurt sans enfant,
  - type: text
    content: ' laissant une femme derrière lui, '
  - type: text
    content: son frère prendra la femme et suscitera une descendance au défunt
  - type: text
    content: '. '
  '2':
  - type: note
    content: 'Mt 21.34n. –  Le moment  : autre traduction la saison, cf. 1.15n.'
  - type: text
    content: 'Le moment venu, il envoya un esclave chez les vignerons pour recevoir de leur part des fruits de la vigne. '
  '20':
  - type: note
    content: 'Cf. Tobit 3.8 : « Elle avait été donnée sept fois en mariage, et… Asmodée, le démon mauvais, avait tué chaque fois ses maris avant qu''ils ne se soient unis à elle, selon le devoir qu''on a envers une épouse. »'
  - type: text
    content: 'Il y avait sept frères. Le premier prit femme et mourut sans laisser de descendance. '
  '21':
  - type: note
    content: 'prit la femme  : litt. la prit.'
  - type: text
    content: 'Le deuxième prit la femme et mourut sans laisser de descendance. Il en fut ainsi du troisième, '
  '22':
  - type: text
    content: 'et aucun des sept ne laissa de descendance. Après eux tous, la femme mourut aussi. '
  '23':
  - type: note
    content: quand ils se relèveront ou quand on se relèvera  ; l'expression correspondante (de même v. 25), qui n'est ici présente que dans certains mss, est apparentée au substantif traduit par résurrection.
  - type: text
    content: A la résurrection, quand ils se relèveront, duquel sera-t-elle la femme ? Car les sept l'ont eue pour femme !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'vous vous égarez  : cf. v. 27n  ; Mt 22.29n  ; 24.4+.'
  - type: text
    content: 'Jésus leur dit : Voilà pourquoi vous vous égarez ; vous ne comprenez ni les Ecritures, ni la puissance de Dieu. '
  '25':
  - type: note
    content: 'Cf. Ac 23.8. –  on ne prend…  : litt. on ne se marie ni l''on n''est donnée en mariage  ; cf. 1 Hénoch 15.6s (à propos des anges déchus, cf. Gn 6.1ss) : « Mais vous, vous étiez de nature des esprits, éternellement vivants, soustraits à la mort pour toutes les générations du monde, et c''est pourquoi Je n''ai pas créé chez vous de femelles. Les esprits célestes ont le ciel pour demeure. »'
  - type: text
    content: 'En effet, quand on se relève d''entre les morts, on ne prend ni femme ni mari, mais on est comme des anges dans les cieux. '
  '26':
  - type: note
    content: se réveillent ou se relèvent, ressuscitent, autre verbe que dans les v. précédents ; cf. v. 23n  ; 1.31n  ; voir résurrection. –  dans le livre de Moïse v. 18n  ; voir Ex 3. 1ss, 6, 15s.
  - type: text
    content: 'Quant au fait que les morts se réveillent, n''avez-vous pas lu, dans le livre de Moïse, ce que Dieu lui a dit près du buisson : '
  - type: text
    content: C'est moi, le Dieu d'Abraham, le Dieu d'Isaac et le Dieu de Jacob !
  - type: text
    content: ' '
  '27':
  - type: note
    content: 'Vous vous égarez complètement  : autre traduction votre erreur est grande, cf. v. 24+.'
  - type: text
    content: Il n'est pas le Dieu des morts, mais des vivants. Vous vous égarez complètement.
  - type: heading
    content: Le premier de tous les commandements
  - type: heading
    content: Mt 22.34-40  ; cf. Lc 10.25-28
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 10.25-28. – Voir scribes . –  commandements  : voir loi.'
  - type: text
    content: 'Un des scribes, qui les avait entendus débattre et voyait qu''il leur avait bien répondu, vint lui demander : Quel est le premier de tous les commandements ? '
  '29':
  - type: note
    content: 'Dt 6.4  ; cf. 1Co 8.6. –  Ecoute  : autre traduction entends.'
  - type: text
    content: 'Jésus répondit : Le premier, c''est : '
  - type: text
    content: Ecoute, Israël ! Le Seigneur, notre Dieu, le Seigneur est un,
  - type: text
    content: ' '
  '3':
  - type: text
    content: 'Ils le prirent, le battirent et le renvoyèrent les mains vides. '
  '30':
  - type: note
    content: Dt 6.5 ; Jos 22.5  ; cf. 2R 23.25 ; voir aussi cœur.
  - type: text
    content: et tu aimeras le Seigneur, ton Dieu, de tout ton cœur, de toute ton âme, de toute ton intelligence et de toute ta force
  - type: text
    content: '. '
  '31':
  - type: note
    content: 'Lv 19.18  ; Rm 13.9 ; Ga 5.14 ; Jc 2.8 ; cf. Jn 15.12. Evangile selon Thomas 25 : « Jésus a dit : “Aime ton frère comme ton âme ; veille sur lui comme sur la pupille de ton œil.” »'
  - type: text
    content: 'Le second, c''est : '
  - type: text
    content: Tu aimeras ton prochain comme toi-même
  - type: text
    content: . Il n'y a pas d'autre commandement plus grand que ceux-là.
  '32':
  - type: text
    content: ' '
  - type: note
    content: Cf. Lc 20.39. –  il est un… Dt 4.35 ; Es 45.21.
  - type: text
    content: 'Le scribe lui dit : C''est bien, maître ; tu as dit avec vérité qu’'
  - type: text
    content: il est un et
  - type: text
    content: ' qu’'
  - type: text
    content: il n'y en a pas d'autre que lui,
  - type: text
    content: ' '
  '33':
  - type: note
    content: 'intelligence  : autre terme qu''au v. 30 (synonyme). –  de toute sa force  : certains mss portent de toute son âme, d''autres de toute son âme et de toute sa force. –  plus que tous les holocaustes… 1S 15.22 ; Os 6.6 ; voir aussi sacrifices.'
  - type: text
    content: 'et que '
  - type: text
    content: l'aimer de tout son cœur, de toute son intelligence et de toute sa force,
  - type: text
    content: ' et '
  - type: text
    content: aimer son prochain comme soi-même,
  - type: text
    content: ' c''est plus que tous les holocaustes et les sacrifices. '
  '34':
  - type: note
    content: 'pas loin du royaume 1.15. –  personne n''osait plus…  : cf. Mt 22.46/ /.'
  - type: text
    content: 'Jésus, voyant qu''il avait répondu judicieusement, lui dit : Tu n''es pas loin du royaume de Dieu.'
  - type: text
    content: Et personne n'osait plus l'interroger.
  - type: heading
    content: Le Christ et David
  - type: heading
    content: Mt 22.41-46  ; Lc 20.41-44
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'enseignait dans le temple 2.13 ; 14.49 ; Mt 21.23 ; 26.55/ / ; Lc 19.47 ; 20.1 ; 21.37 ; Jn 7.14,28 ; 8.20. –  scribes 2.6+. –  peuvent-ils dire  : litt. disent-ils . –  le Christ 1.1n. –  fils de David 10.47n  ; Jn 7.42 ; cf. 2S 7.12,16 ; Es 11.1ss ; Jr 23.5 ; 33.15 ; Psaumes de Salomon 17.21 : « Suscite-leur leur roi, fils de David, au moment que tu sais, ô Dieu, pour qu''il règne sur Israël ton serviteur ! » Epître de Barnabé 12.10s : « Et, comme David redoutait, en la percevant, l''erreur des pécheurs qui allaient dire que le Christ est fils de David, il fait lui-même cette prophétie : “Le Seigneur a dit mon Seigneur…” Et voici encore ce que dit Isaïe : “Le Seigneur a dit au Christ mon Seigneur : Je l''ai pris par la main droite… (cf. Es 45.1).” Voyez comment David l''appelle Seigneur et non pas fils ! »'
  - type: text
    content: 'Jésus enseignait dans le temple : Comment les scribes peuvent-ils dire que le Christ est fils de David ? '
  '36':
  - type: note
    content: 'par l''Esprit saint 2S 23.2. –  jusqu''à ce que je mette…  : autre traduction que je mette…  ; ou, d''après certains mss, que je fasse de tes ennemis ton marchepied, cf. Ps 110.1  ; Mt 22.44+.'
  - type: text
    content: 'David lui-même, par l''Esprit saint, a dit :'
  - type: text
    content: 'Le Seigneur a dit à mon Seigneur :'
  - type: text
    content: Assieds-toi à ma droite,
  - type: text
    content: jusqu'à ce que je mette tes ennemis sous tes pieds.
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 1.3s. –  d''où  : autre traduction comment . –  la foule, nombreuse  : certains mss portent une grande foule  ; Lc 19.48 ; 21.38.'
  - type: text
    content: David lui-même l'appelle Seigneur ; d'où peut-il donc être son fils ?
  - type: text
    content: Et la foule, nombreuse, l'écoutait avec plaisir.
  - type: heading
    content: Contre les scribes
  - type: heading
    content: Mt 23.1-36  ; Lc 20.45-47
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'scribes 2.6+. –  aiment  : litt. veulent . –  se promener  : litt. marcher . –  longues robes  : cf. Mt 23.5 ; certains témoins anciens semblent avoir lu, ici et en Lc 20.46 se promener sous les portiques , cf. Ac 3.11 ; 5.12.'
  - type: text
    content: 'Il leur disait, dans son enseignement : Gardez-vous des scribes ; ils aiment se promener avec de longues robes, être salués sur les places publiques, '
  '39':
  - type: note
    content: Lc 11.43 ; 14.7 ; Jn 5.44.
  - type: text
    content: 'avoir les premiers sièges dans les synagogues et les premières places dans les dîners ; '
  '4':
  - type: text
    content: 'Il leur envoya encore un autre esclave ; ils le frappèrent à la tête et le déshonorèrent. '
  '40':
  - type: note
    content: 'ils dévorent…  : cf. Ex 22.21ss ; Es 10.2 ; Assomption de Moïse 7.3ss (il s''agit selon toute vraisemblance d''une description des pharisiens et des sadducéens par les esséniens) : « Alors régneront des hommes pestilentiels et impies qui se prétendront justes… des hommes trompeurs, contents d''eux-mêmes, simulés en tout ce qui les concerne, et à toute heure du jour épris de banquets (et) avides du gosier… Mangeurs des biens des pauvres, disant agir ainsi à cause de la justice, alors qu''ils bannissent ceux qui se plaignent ; trompeurs qui se cachent pour ne pas être reconnus, impies… » –  pour l''apparence  : autre traduction comme prétexte  ; le même terme est traduit par excuse en Jn 15.22, prétexte en Ac 27.30. –  un jugement particulièrement sévère Jc 3.1.'
  - type: text
    content: ils dévorent les maisons des veuves et, pour l'apparence, ils font de longues prières. Ils recevront un jugement particulièrement sévère.
  - type: heading
    content: L'offrande de la veuve
  - type: heading
    content: Lc 21.1-4
  '41':
  - type: text
    content: ' '
  - type: note
    content: 'Sur le Trésor du temple, cf. 2R 12.9s ; Né 12.44 ; Mt 27.6 ; Jn 8.20. –  y mettait  : litt. mettait (ou jetait, versait , de même dans la suite) dans le Trésor  ; le terme peut désigner plus spécifiquement les caisses ou « troncs » destinés à recevoir les dons. –  de la monnaie de bronze ou des chalques (cf. 6.8n).'
  - type: text
    content: 'S''étant assis en face du Trésor, il regardait comment la foule y mettait de la monnaie de bronze. Nombre de riches mettaient beaucoup. '
  '42':
  - type: note
    content: 'leptes  : les plus petites pièces de bronze alors en circulation, valant chacune 1/7 de chalque, cf. 6.8n  ; voir mesures, poids et monnaies. –  un quadrant = le quart d''un as (Mt 5.26n) ; cf. Lc 12.59n.'
  - type: text
    content: 'Vint aussi une pauvre veuve qui mit deux leptes valant un quadrant. '
  '43':
  - type: note
    content: 'Amen Mt 5.18n. –  plus que tous…  : cf. Lc 21.3n.'
  - type: text
    content: 'Alors il appela ses disciples et leur dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, cette pauvre veuve a mis plus que tous ceux qui ont mis quelque chose dans le Trésor ; '
  '44':
  - type: note
    content: 'abondance / manque  : cf. 2Co 8.12-14 ; voir aussi Ph 4.11. –  tout ce qu''elle avait pour vivre ou toutes ses ressources  ; sur le terme grec correspondant voir 1Jn 2.16n.'
  - type: text
    content: car tous ont mis de leur abondance, mais elle, elle a mis, de son manque, tout ce qu'elle possédait, tout ce qu'elle avait pour vivre.
  '5':
  - type: text
    content: 'Il en envoya un autre, qu''ils tuèrent ; puis beaucoup d''autres qu''ils battirent ou tuèrent. '
  '6':
  - type: note
    content: son fils bien-aimé 1.11/ / ; 9.7/ / ; cf. Gn 22.2 ; Hé 1.1s.
  - type: text
    content: 'Seul son fils bien-aimé lui restait ; il le leur envoya le dernier, en disant : « Ils respecteront mon fils ! » '
  '7':
  - type: note
    content: Cf. Gn 37.20.
  - type: text
    content: 'Mais ces vignerons se dirent : « C''est l''héritier ! Venez, tuons-le, et l''héritage sera à nous. » '
  '8':
  - type: note
    content: 'le prirent, le tuèrent et le jetèrent…  : cf. Mt 21.39 ; Jn 19.17 ; Hé 13.12s. Le verbe traduit par jeter est rendu par chasser en 1.12n etc., ainsi que dans les parallèles de Mt 21.39 et Lc 20.12,15.'
  - type: text
    content: 'Ils le prirent, le tuèrent et le jetèrent hors de la vigne. '
  '9':
  - type: text
    content: Que fera donc le maître de la vigne ? Il viendra, il fera disparaître les vignerons et il donnera la vigne à d'autres.
