      - type: text
        text: '100 : « Ils montrèrent à Jésus une pièce d''or et lui dirent : “Les hommes de César réclament de nous des impôts.” Il leur répondit : “Donnez à César ce qui est à César, donnez à Dieu ce qui est à Dieu, et donnez-moi ce qui est à moi.” » Un papyrus égyptien (Egerton 2) du II'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' ou du III'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' s., reconstitué, porterait le texte suivant : « (Ils) vinrent à lui et le tentaient (c.-à-d. : le mettaient à l''épreuve) par des questions, lui disant : “Maître Jésus, nous savons que c''est de Dieu que tu viens, car ce que tu fais en témoigne, mieux que pour tous les prophètes. Dis-nous donc : est-il permis de rendre aux rois ce qui revient à leur pouvoir ? le leur rendrons-nous ou pas ?” Mais Jésus, connaissant leur pensée, s''irrita et leur dit : “Pourquoi m''appelez-vous maître de la bouche et n''écoutez-vous pas ce que je dis ? Isaïe a bien prophétisé à votre sujet quand il a dit : ‘Ce peuple m''honore des lèvres mais son cœur est loin de moi…’” » (Cf. Mc 7.6s). –  '
