  - type: text
    text: 'Ceux-ci viennent lui dire : Maître, nous savons que tu es franc et que tu ne te soucies de personne ; en effet, tu ne regardes pas à l''apparence des gens, mais tu enseignes la voie de Dieu selon la vérité. Est-il permis de payer la capitation à César ? Devons-nous payer ou ne pas payer ?'
