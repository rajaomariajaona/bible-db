      - type: text
        text: '65 : « Un homme honnête avait une vigne. Il la donna à des vignerons pour qu''ils la cultivent et qu''il puisse en recevoir le fruit de leurs mains. Il envoya son serviteur pour que les vignerons lui donnent le fruit de la vigne. Ils saisirent son serviteur, le rouèrent de coups et peu s''en fallait qu''ils ne le tuent. Le serviteur retourna et raconta à son maître ce qui s''était passé. Le maître dit : “Peut-être ne l''ont-ils pas reconnu.” Il envoya alors un autre serviteur. Les vignerons le rouèrent à son tour de coups. Alors le maître envoya son fils, et dit : “Peut-être montreront-ils du respect pour mon fils.” Quand ces vignerons surent qu''il était l''héritier de la vigne, ils le saisirent et le tuèrent. Celui qui a des oreilles, qu''il entende. » –  '
