document_id: REV.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les sept anges et les sept fléaux
  - type: text
    content: ' '
  - type: note
    content: dans le ciel… 12.1,3. –  sept anges (cf. 8.6) / sept fléaux 9.18+ ; 15.6–17.1 ; 21.9 ; cf. Lv 26.21. –  s'accomplit v. 8n  ; 10.7n.
  - type: text
    content: Alors je vis dans le ciel un autre signe, grand et étonnant ; sept anges qui tenaient sept fléaux, les derniers, car c'est par eux que s'accomplit la colère de Dieu.
  '2':
  - type: text
    content: ' '
  - type: note
    content: mer de cristal 4.6+. –  bête… 13.1+,14-18. – Voir nom . –  lyres 5.8+.
  - type: text
    content: 'Je vis comme une mer de cristal, mêlée de feu, et les vainqueurs de la bête, de son image et du chiffre de son nom, debout sur la mer de cristal et tenant les lyres de Dieu. '
  '3':
  - type: note
    content: '4.11+. –  le chant de Moïse  : cf. 5.9+ ; Ex 15. –  l''esclave ou le serviteur (1.1+ ; 10.7+) de Dieu Nb 12.7 ; Dt 34.5 ; Jos 1.2,7 ; 14.7. –  Tes œuvres… Ps 111.2-4 ; 139.14  ; cf. Ex 15.11 ; 34.10. –  Tout-Puissant 1.8+. –  Tes voies… Dt 32.4 ; Ps 145.17. –  Roi des nations Jr 10.7  ; certains mss portent Roi de (tous) les temps, comme en 1Tm 1.17n  ; cf. Jr 10.10.'
  - type: text
    content: 'Ils chantent le chant de Moïse, l''esclave de Dieu, et le chant de l''agneau :'
  - type: text
    content: Tes œuvres sont grandes et étonnantes,
  - type: text
    content: Seigneur Dieu, Tout-Puissant !
  - type: text
    content: Tes voies sont justes et vraies,
  - type: text
    content: Roi des nations !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Jr 10.7 . –  craindrait 14.7. –  saint 16.5 ; Lc 1.75+ ; Ep 4.24n. –  toutes les nations… 2.26n  ; Ps 86.9  ; voir aussi Es 2.2 ; Jr 16.19 ; Ml 1.11 ; voir non-Juifs. –  se prosterneront  : 3.9+ ; Mt 2.2+ ; voir culte. –  ta justice…  : litt. tes jugements (ou tes actes de justice, tes justes décrets  ; même terme en 19.8 ; cf. Rm 5.18n) ont été manifestés.'
  - type: text
    content: Qui ne craindrait
  - type: text
    content: et ne glorifierait ton nom, Seigneur ?
  - type: text
    content: Toi seul es saint.
  - type: text
    content: 'En effet, '
  - type: text
    content: toutes les nations viendront
  - type: text
    content: et se prosterneront devant toi,
  - type: text
    content: parce que ta justice s'est manifestée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: sanctuaire 7.15+ ; cf. 11.19 ; on pourrait aussi comprendre le (vrai) sanctuaire, la tente (7.15n) du Témoignage…  ; dans LXX cette dernière expression correspond à tente de la Rencontre en Ex 40.34 (cf. Ex 16.34 ; 38.21 ; Ac 7.44).
  - type: text
    content: 'Après cela, je regardai : le sanctuaire de la tente du Témoignage fut ouvert dans le ciel. '
  '6':
  - type: note
    content: 'sept anges / sept fléaux v. 1+. –  lin pur 19.8,14. –  resplendissant  : même terme en 18.14 (splendide) ; 19.8 ; 22.1 (limpide), 16 ; cf. Lc 23.11n. –  ceinture d''or 1.13 (autre terme grec pour poitrine) ; Dn 10.5s.'
  - type: text
    content: 'Les sept anges qui tenaient les sept fléaux sortirent du sanctuaire ; ils étaient revêtus d''un lin pur, resplendissant, et ils portaient une ceinture d''or autour de la poitrine. '
  '7':
  - type: note
    content: êtres vivants 4.6+. –  sept coupes 16.1 ; 17.1 ; 21.9. –  fureur 14.10+. –  qui vit… 4.9+.
  - type: text
    content: 'L''un des quatre êtres vivants donna aux sept anges sept coupes d''or, pleines de la fureur de Dieu qui vit à tout jamais. '
  '8':
  - type: note
    content: 'sanctuaire v. 5n. –  rempli de fumée  : cf. Ex 40.34s ; 1R 8.10s ; Es 6.4 ; Ez 44.4 ; 2Ch 5.13s ; 7.1-3. –  la gloire de Dieu 21.11+. –  soient achevés  : le même verbe est traduit par s''accomplir au v. 1 ; cf. 10.7n.'
  - type: text
    content: Le sanctuaire fut rempli de fumée, à cause de la gloire de Dieu et de sa puissance, et personne ne pouvait entrer dans le sanctuaire, jusqu'à ce que les sept fléaux des sept anges soient achevés.
