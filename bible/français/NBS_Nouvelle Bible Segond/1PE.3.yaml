      - type: usfm
        marker: w
        children:
        - type: text
          text: l'esprit
      - type: text
        text: ' doux et paisible '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 5.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 1Tm 2.11.'
    marker-yv: yv-n
  - type: text
    text: 'mais plutôt celle du cœur, l''être secret, la parure impérissable d''un esprit doux et paisible ; voilà qui est d''un grand prix devant Dieu. '
  - type: usfm
