        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'celle du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: …
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
