    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos prières
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', celles des maris ou celles du couple, cf. Mt 5.23 ; 6.12,14 ; 18.21ss ; 1Co 11.33s ; voir aussi 1Co 7.5.'
    marker-yv: yv-n
  - type: text
    text: Vous de même, maris, menez la vie commune avec compréhension, en tenant compte de la plus grande faiblesse du sexe féminin. Honorez votre femme puisque, avec vous, elle hérite la grâce de la vie, pour que rien ne fasse obstacle à vos prières.
