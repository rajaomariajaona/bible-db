    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Tm 2.9 ; cf. Es 3.18ss ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Testament
      - type: text
        text: ' de Ruben '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.4s : « La femme ne peut vaincre l''homme à visage découvert, mais, par des attitudes de prostituée, elle le leurre. Fuyez donc la luxure, mes enfants, et interdisez à vos femmes et à vos filles de parer leur tête et leur visage pour tromper l''esprit, car toute femme qui use de ces artifices est réservée pour le jugement éternel. »'
    marker-yv: yv-n
  - type: text
    text: 'Que votre parure ne soit pas ce qui est extérieur – cheveux tressés, ornements d''or, vêtements élégants – '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
