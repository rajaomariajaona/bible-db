document_id: 1PE.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie conjugale des chrétiens
  - type: text
    content: ' '
  - type: note
    content: 'femmes 1Co 14.35+ ; Ep 5.22 ; Col 3.18 ; Tt 2.5. –  votre mari  : litt. vos propres maris . –  gagnés 1Co 9.19ss.'
  - type: text
    content: 'Vous de même, femmes, soyez soumises à votre mari ; afin que, s''il en est qui refusent d''obéir à la Parole, ils soient gagnés, sans parole, par la conduite de leur femme, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 34.13-17 . –  aimer la vie  : cf. Jn 12.43 ; 2Tm 4.8,10 ; voir aussi Ec 2.17. –  langue… Jc 1.26 ; 3.1-12. –  de la ruse  : litt. pour ne pas parler (avec) ruse.'
  - type: text
    content: Si,
  - type: text
    content: ' en effet, '
  - type: text
    content: quelqu'un veut aimer la vie
  - type: text
    content: et voir des jours heureux,
  - type: text
    content: qu'il préserve sa langue du mal
  - type: text
    content: et ses lèvres de la ruse ;
  '11':
  - type: text
    content: ' '
  - type: note
    content: cherche la paix Mt 5.9 ; Rm 12.18.
  - type: text
    content: qu'il s'éloigne du mal et fasse le bien,
  - type: text
    content: qu'il cherche la paix et la poursuive ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: Voir justice .
  - type: text
    content: car le Seigneur a les yeux sur les justes,
  - type: text
    content: et ses oreilles sont attentives à leur prière ;
  - type: text
    content: mais la face du Seigneur est contre ceux qui font le mal
  - type: text
    content: .
  - type: heading
    content: Prêts à témoigner de l'espérance
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 14 ; Es 50.9 ; Rm 8.31,34ss ; 13.3 ; Ga 5.23 ; Tt 2.14.
  - type: text
    content: 'Qui donc pourra vous faire du mal, si vous vous passionnez pour le bien ? '
  '14':
  - type: note
    content: '2.20+ ; 4.14. –  justice  : cf. 2.14 ; le terme a ici le sens de fidélité à la volonté divine. –  heureux 1.6s ; Mt 5.10s. –  Ne craignez pas ce qu''ils craignent  : certains comprennent ne craignez pas les autres  ; voir Es 8.12s  ; Mt 10.28 ; Ap 2.10.'
  - type: text
    content: 'D''ailleurs, quand vous souffririez pour la justice, heureux seriez-vous ! '
  - type: text
    content: Ne craignez pas ce qu'ils craignent, et ne soyez pas troublés
  - type: text
    content: '. '
  '15':
  - type: note
    content: 'dans votre cœur  : cf. v. 4n. –  consacrez…  : autre traduction reconnaissez la sainteté du Christ Seigneur  ; cf. 1.2n  ; Es 8.13. –  présenter votre défense  : autre traduction rendre compte  ; le terme grec correspondant a donné notre mot apologie  ; il est apparenté à l''expression traduite par demande de rendre compte (cf. 1Co 9.3 ; voir aussi Lc 16.2) ; cf. Mt 10.16ss ; Lc 12.11s ; 21.14 ; voir aussi Col 4.6. –  espérance 1.3+.'
  - type: text
    content: 'Mais, dans votre cœur, '
  - type: text
    content: consacrez
  - type: text
    content: ' le Christ comme '
  - type: text
    content: Seigneur ;
  - type: text
    content: ' soyez toujours prêts à présenter votre défense devant quiconque vous demande de rendre compte de l''espérance qui est en vous, '
  '16':
  - type: note
    content: 'douceur (v. 4+) et respect (litt. crainte) : cf. v. 2n  ; 2.17 ; Rm 13.7s. –  bonne conscience v. 21 ; 2.19 ; Ac 23.1+ ; cf. 1Co 4.1ss. –  ceux qui injurient… 2.12,15 ; 4.3ss ; cf. Lc 6.28n. –  dans le Christ 5.10,13.'
  - type: text
    content: 'mais faites-le avec douceur et respect, en ayant une bonne conscience ; afin que, sur le point même où l''on vous accuse, ceux qui injurient votre bonne conduite dans le Christ soient pris de honte. '
  '17':
  - type: note
    content: '2.20+. –  si telle est…  : litt. si le veut la volonté de Dieu.'
  - type: text
    content: Mieux vaut en effet souffrir en faisant le bien, si telle est la volonté de Dieu, qu'en faisant le mal.
  - type: heading
    content: De la mort du Christ à sa victoire
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.18-21 ; 2.21-25. –  a souffert  : quelques mss portent est mort  ; certains mss ajoutent pour vous , d''autres pour nous . –  une fois pour toutes Rm 6.10 ; Hé 7.27 ; 9.8,26ss. –  en rapport avec les péchés  : autre traduction pour les péchés , cf. Lv 5.6 ; Rm 8.3n. –  juste…  : cf. Es 53.11 ; Ac 3.14+. –  vous amener ou nous amener , selon certains mss ; cf. Rm 5.2 ; Ep 2.18. –  chair / Esprit  : cf. 4.1,6 ; Rm 1.3s ; 1Tm 3.16 ; voir aussi Rm 8.10 ; 1Co 15.42ss.'
  - type: text
    content: Car le Christ lui-même a souffert une fois pour toutes en rapport avec les péchés,
  - type: text
    content: lui, juste, pour des injustes,
  - type: text
    content: afin de vous amener à Dieu.
  - type: text
    content: Mis à mort quant à la chair,
  - type: text
    content: il a été rendu vivant quant à l'Esprit.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'C''est ainsi…  : le sens exact de la transition n''est pas clair ; on pourrait aussi comprendre c''est par cet Esprit qu''il est aussi allé… , ou encore c''est alors qu''il est allé…  ; cf. 1.11. –  faire la proclamation  : litt. proclamer , cf. 4.6 ; Mc 1.4n. –  aux esprits en prison , soit les anges déchus (voir 2P 2.4ns ; Jd 6), soit les contemporains de Noé v. 20,22 ; 4.6 ; cf. Mc 1.23n,27 ; 1Tm 4.1 ; Hé 12.23 ; voir aussi Ac 2.31 ; Rm 10.7 ; Ep 1.20s ; 4.8ss.'
  - type: text
    content: C'est ainsi qu'il est aussi allé faire la proclamation aux esprits en prison,
  '2':
  - type: note
    content: 'voyant votre conduite 2.12. –  pure 2Co 7.11 ; 11.2 ; Ph 4.8 ; 1Tm 5.22 ; Tt 2.5 ; Jc 3.17 ; 1Jn 3.3. –  et respectueuse  : litt. dans la crainte ou par crainte, expression qui peut désigner soit le respect envers le mari, soit la piété (« crainte de Dieu »), cf. v. 6,14s ; 1.17 ; 2.17.'
  - type: text
    content: 'en voyant votre conduite pure et respectueuse. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 6.1–7.24 ; Hé 11.7 ; 2P 2.5n. –  huit  : litt. huit âmes , cf. 1.9+. –  sauvées Mt 14.36n. –  à travers l''eau  : l''expression peut également signifier par l''eau.'
  - type: text
    content: 'à ceux qui avaient refusé d''obéir autrefois, lorsque la patience de Dieu attendait – aux jours où Noé bâtissait l''arche dans laquelle un petit nombre de personnes, huit, furent sauvées à travers l''eau. '
  '21':
  - type: note
    content: 'C''était une figure…  : texte difficile et traduction incertaine ; litt. dont l''antitype (c.-à-d. la réplique  ; cf. Hé 8.5n), le baptême, vous sauve aussi à présent  ; cf. Jn 3.5 ; Rm 6.3s ; Ga 3.27 ; Tt 3.5. –  baptême qui n''ôte pas…  : litt. non la mise à l''écart de la saleté de la chair  ; cf. Nb 8 ; 19 ; Col 2.11s ; Hé 9.13. –  l''engagement envers Dieu  : autre traduction la demande faite à Dieu. –  d''une bonne conscience  : l''expression peut signifier en vue d''une bonne conscience, par une bonne conscience ou avec une bonne conscience v. 16+ ; cf. Hé 10.22. –  par la résurrection… 1.3 ; Rm 6.4ss ; Col 3.1.'
  - type: text
    content: 'C''était une figure du baptême qui vous sauve à présent – baptême qui n''ôte pas la saleté de la chair, mais qui est l''engagement envers Dieu d''une bonne conscience – par la résurrection de Jésus-Christ '
  '22':
  - type: note
    content: 'Cf. Ph 2.9ss. –  s''en est allé au ciel Ac 1.10n. –  à la droite de Dieu  : cf. Ps 110.1 ; Ac 7.56 ; Rm 8.34 ; Ep 1.20 ; Col 3.1. –  anges / autorités / puissances 1Co 15.24 ; Ep 1.21+ ; Col 2.15 ; Hé 1.4 ; 2.8.'
  - type: text
    content: qui s'en est allé au ciel, qui est à la droite de Dieu et à qui anges, autorités et puissances ont été soumis.
  '3':
  - type: note
    content: '1Tm 2.9 ; cf. Es 3.18ss ; Testament de Ruben 5.4s : « La femme ne peut vaincre l''homme à visage découvert, mais, par des attitudes de prostituée, elle le leurre. Fuyez donc la luxure, mes enfants, et interdisez à vos femmes et à vos filles de parer leur tête et leur visage pour tromper l''esprit, car toute femme qui use de ces artifices est réservée pour le jugement éternel. »'
  - type: text
    content: 'Que votre parure ne soit pas ce qui est extérieur – cheveux tressés, ornements d''or, vêtements élégants – '
  '4':
  - type: note
    content: 'celle du cœur…  : litt. l''homme (au sens d’être humain, homme ou femme) secret du cœur ou l''homme secret, c''est-à-dire le cœur  ; cf. Rm 2.29 ; 1Co 14.25 ; 2Co 4.16 ; Ep 3.16+ ; voir aussi Mt 6.1ss. –  la parure…  : autre traduction dans la vie impérissable (1.4+) de l''esprit doux et paisible Mt 5.5n  ; cf. 1Tm 2.11.'
  - type: text
    content: 'mais plutôt celle du cœur, l''être secret, la parure impérissable d''un esprit doux et paisible ; voilà qui est d''un grand prix devant Dieu. '
  '5':
  - type: text
    content: 'Ainsi se paraient autrefois les femmes saintes qui espéraient en Dieu, soumises à leur mari, '
  '6':
  - type: note
    content: 'Sara  : cf. Gn 16.2,6 ; 18.11ss ; 21.9ss. –  seigneur ou maître Gn 18.12, texte souvent commenté dans le même sens par la tradition rabbinique. –  les filles  : litt. les enfants  ; cf. Es 51.2 ; Jn 8.39 ; Rm 4.11s,19 ; 9.7ss. –  aucune crainte  : comparer avec v. 2n  ; Pr 3.25.'
  - type: text
    content: telle Sara qui obéissait à Abraham et l'appelait seigneur. C'est d'elle que vous êtes devenues les filles en faisant le bien, sans vous laisser troubler par aucune crainte.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'maris Ep 5.25 ; Col 3.19. –  avec compréhension…  : litt. selon (la) connaissance, comme (s''agissant) d''un objet (cf. 1Th 4.4n) plus faible, le féminin . –  Honorez…  : litt. rendant honneur comme à des (êtres qui sont) aussi cohéritiers d''une grâce de vie 1.4. –  vos prières , celles des maris ou celles du couple, cf. Mt 5.23 ; 6.12,14 ; 18.21ss ; 1Co 11.33s ; voir aussi 1Co 7.5.'
  - type: text
    content: Vous de même, maris, menez la vie commune avec compréhension, en tenant compte de la plus grande faiblesse du sexe féminin. Honorez votre femme puisque, avec vous, elle hérite la grâce de la vie, pour que rien ne fasse obstacle à vos prières.
  - type: heading
    content: La règle de l'amour
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'en parfait accord  : cf. Rm 15.5+. –  sensibles aux autres…  : cf. Hé 4.15. –  tendre bienveillance Ep 4.32n.'
  - type: text
    content: 'Enfin, soyez tous en parfait accord, sensibles aux autres, pleins d''affection fraternelle, d''une tendre bienveillance, d''humilité. '
  '9':
  - type: note
    content: 'Cf. 2.23 ; Rm 12.17+ ; 1Th 5.15. –  bénissez… Lc 6.28 ; Rm 12.14 ; 1Co 4.12 ; cf. Nb 6.23ss ; Mt 5.44+. –  afin d''hériter  : autre traduction à hériter  : cf. v. 7+ ; Hé 2.17 ; voir aussi Mt 25.34ss.'
  - type: text
    content: Ne rendez pas mal pour mal, ni insulte pour insulte ; au contraire, bénissez, car c'est à cela que vous avez été appelés, afin d'hériter une bénédiction.
