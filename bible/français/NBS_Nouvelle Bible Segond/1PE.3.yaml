    - type: usfm
      marker: ft
      children:
      - type: text
        text: (au sens d’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être humain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', homme ou femme) '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'secret du cœur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'homme secret, c'est-à-dire le cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Rm 2.29 ; 1Co 14.25 ; 2Co 4.16 ; Ep 3.16+ ; voir aussi Mt 6.1ss. –  '
    - type: usfm
      marker: fq
