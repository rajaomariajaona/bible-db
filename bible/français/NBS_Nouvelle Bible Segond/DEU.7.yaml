document_id: DEU.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Israël, peuple consacré au Seigneur
  - type: text
    content: ' '
  - type: note
    content: 'prendre possession 1.21+. –  délogé  : même verbe au v. 22 ; cf. 2R 16.6. –  une multitude de et nombreuses traduisent le même terme hébreu ; cf. v. 17. –  Hittites… Gn 10.15n-16n  ; 13.7n  ; 14.5n  ; cf. 15.19-21 ; Ex 3.8. –  sept nations Ac 13.19.'
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura fait entrer dans le pays où tu vas entrer pour en prendre possession, et qu''il aura délogé devant toi une multitude de nations, les Hittites, les Guirgasites, les Amorites, les Cananéens, les Perizzites, les Hivvites et les Jébusites, sept nations plus nombreuses et plus fortes que toi ; '
  '10':
  - type: note
    content: 'il paie directement…  : litt. il rétribue à sa face (cf. 4.37n) ; cf. 24.16 ; 32.41. –  à agir  : sous-entendu dans le texte.'
  - type: text
    content: 'Mais il paie directement de retour ceux qui le détestent : il les fait disparaître ; il ne tarde pas à agir envers celui qui le déteste ; il le paie de retour, directement. '
  '11':
  - type: note
    content: 'Tu observeras  : litt. tu garderas, comme au v. 9, cf. v. 12 ; 4.6n. –  que j''institue 4.2n. –  afin de les mettre en pratique 5.1+.'
  - type: text
    content: Tu observeras donc le commandement, les prescriptions et les règles que j'institue pour toi aujourd'hui, afin de les mettre en pratique.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Pour autant que…  : autres traductions parce que vous écouterez (ou vous obéirez à ) ; si vous obéissez…  ; le terme hébreu évoque la réciprocité ; cf. 28.1-14 ; Ex 15.26. –  observerez et gardera traduisent un même verbe hébreu ; cf. v. 9,11n. –  gardera… l''alliance et la fidélité Né 1.5+.'
  - type: text
    content: 'Pour autant que vous écouterez ces règles, que vous les observerez et que vous les mettrez en pratique, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, gardera envers toi l''alliance et la fidélité qu''il a jurées à tes pères. '
  '13':
  - type: note
    content: 'Cf. Os 2.10s. –  t''aimera v. 8 ; 4.37+. – Voir bénédiction. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n. –  reproduction / portées  : traduction incertaine ; le deuxième mot rappelle le nom d''Astarté, déesse cananéenne de la fécondité et de l''amour ; de même en 28.4,18,51. –  sur la terre 11.9 ; 28.4,11 ; 30.20 ; 31.13,20. –  juré 1.8+.'
  - type: text
    content: 'Il t''aimera, il te bénira et te multipliera ; il bénira le fruit de ton ventre et le fruit de ta terre, ton blé, ton vin et ton huile, la reproduction de tes bovins et les portées de ton petit bétail, sur la terre qu''il a juré à tes pères de te donner. '
  '14':
  - type: text
    content: 'Tu seras béni plus que tous les peuples ; il n''y aura chez toi ni homme ni femme stérile, ni bête stérile parmi tes troupeaux. '
  '15':
  - type: note
    content: '4.34+. –  ceux qui te détestent  : autre traduction tes ennemis.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' éloignera de toi toute maladie ; il ne t''infligera aucune de ces terribles épidémies d''Egypte que tu connais ; il en frappera tous ceux qui te détestent. '
  '16':
  - type: note
    content: sans pitié 13.9 ; 19.13,21 ; 25.12. –  tu ne serviras pas v. 4+. –  piège Ex 23.33+.
  - type: text
    content: 'Tu dévoreras tous les peuples que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, va te livrer ; ton œil sera sans pitié pour eux ; tu ne serviras pas leurs dieux, car ce serait un piège pour toi.'
  - type: heading
    content: Le Seigneur, protecteur de son peuple
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque tu te diras  : litt. lorsque tu diras dans ton cœur.'
  - type: text
    content: 'Lorsque tu te diras : « Ces nations sont plus nombreuses que moi ; comment pourrai-je les déposséder ? », '
  '18':
  - type: note
    content: 'tu n''auras pas peur d''eux 1.21+ ; 3.2 ; 20.1. –  Souviens-toi  : autre traduction rappelle à ton souvenir, cf. 5.15+.'
  - type: text
    content: 'tu n''auras pas peur d''eux. Souviens-toi plutôt de ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a fait au pharaon et à toute l''Egypte, '
  '19':
  - type: note
    content: 'signes… 4.34+. –  fait sortir  : cf. 1.27 ; 5.6+ ; 9.29n  ; voir aussi Es 43.16-20 ; 48.20s ; Jr 23.7s.'
  - type: text
    content: 'des grandes épreuves que tes yeux ont vues, des signes et des prodiges, de la main forte, du bras étendu, quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a fait sortir : ainsi fera le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, à tous les peuples dont tu as peur. '
  '2':
  - type: note
    content: anathème 2.34n  ; voir bénédiction, malédiction. –  pas d'alliance Ex 34.15s ; cf. Jos 9 ; voir aussi Mt 5.43. – Voir grâce.
  - type: text
    content: 'lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les aura livrées devant toi et que tu les auras battues, tu les frapperas d''anathème ; tu ne concluras pas d''alliance pour eux et tu ne leur feras pas grâce. '
  '20':
  - type: note
    content: 'les frelons  : cf. Ex 23.28n. –  en se cachant  : litt. et qui se cacheront de ta face.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, enverra les frelons contre eux, jusqu''à ce qu''aient disparu même ceux qui seront restés en se cachant. '
  '21':
  - type: note
    content: '1.29+. –  en ton sein  : cf. 4.7+. –  Dieu  : hébreu ’El, cf. Gn 21.33n.'
  - type: text
    content: 'Ne sois pas effrayé à cause d''eux ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui est en ton sein, est le Dieu grand et redoutable. '
  '22':
  - type: note
    content: Ex 23.29n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, délogera ces nations devant toi peu à peu ; tu ne pourras pas les exterminer vite, de peur que les animaux sauvages ne se multiplient devant toi. '
  '23':
  - type: note
    content: 'jusqu''à ce qu''elles soient détruites  : formule analogue en 28.20.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les livrera devant toi ; il les frappera de panique, jusqu''à ce qu''elles soient détruites. '
  '24':
  - type: note
    content: Jos 8.1 ; 10.8,16-43. –  tu feras disparaître leur nom 9.14+ ; 12.3 ; 25.19n  ; 32.26.
  - type: text
    content: 'Il te livrera leurs rois, et tu feras disparaître leur nom de dessous le ciel ; personne ne tiendra devant toi, jusqu''à ce que tu les aies détruits. '
  '25':
  - type: note
    content: 'argent / or  : cf. Rm 2.22n. –  ce serait une abomination…  : cf. v. 26 ; 12.31 ; 13.15 ; 14.3 ; 17.1-4 ; 18.9-12 ; 20.18 ; 22.5 ; 23.19 ; 24.4 ; 25.16 ; 27.15 ; 32.16 ; Lv 18.26ss ; Jr 32.35 ; Ez 5.9n  ; 8.6-17.'
  - type: text
    content: 'Vous jetterez au feu les statues de leurs dieux. Tu ne convoiteras ni l''argent, ni l''or qui sont sur elles, et tu ne le prendras pas pour toi, de peur que cela ne devienne pour toi un piège : ce serait une abomination pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. '
  '26':
  - type: note
    content: 'chez toi  : litt. dans ta maison. –  anathème 2.34ns ; voir bénédiction, malédiction.'
  - type: text
    content: Tu n'introduiras pas une abomination chez toi, afin que tu ne sois pas, comme elle, frappé d'anathème ; tu la traiteras comme une horreur et une abomination, car elle est frappée d'anathème.
  '3':
  - type: note
    content: 'leur  : litt. son ou sa.'
  - type: text
    content: 'Tu ne t''allieras pas par des mariages avec ces peuples, tu ne donneras pas ta fille à leur fils et tu ne prendras pas leur fille pour ton fils ; '
  '4':
  - type: note
    content: 'car ils éloigneraient de moi tes fils  : litt. car il (ou cela) éloignerait de moi (Moïse, ou plutôt Dieu lui-même ; cf. 11.13n) ton fils  ; cf. 4.25-27 ; Nb 25 ; 31.15s. –  serviraient…  : cf. v. 16 ; 6.13 ; 8.19 ; 11.16 ; 13.3,7,14 ; 29.25 ; voir 10.12n.'
  - type: text
    content: 'car ils éloigneraient de moi tes fils, ceux-ci serviraient d''autres dieux, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mettrait en colère contre vous : il te détruirait bien vite. '
  '5':
  - type: note
    content: 12.2s ; 16.21s ; Ex 34.13+. –  poteaux cultuels / ashéras Jg 3.7n.
  - type: text
    content: 'Voici, au contraire, comment vous agirez à leur égard : vous démolirez leurs autels, vous briserez leurs pierres levées, vous abattrez leurs poteaux cultuels (leurs ashéras) et vous jetterez au feu leurs statues.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'peuple saint ou sacré 14.2,21 ; 26.18s ; 28.9 ; Ex 19.6 ; 22.30. –  son bien propre  : cf. Ex 19.5n.'
  - type: text
    content: 'Car tu es un peuple saint pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''a choisi pour que tu sois son bien propre parmi tous les peuples de la terre.'
  - type: heading
    content: Fidélité du Seigneur à son alliance
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.5 ; Es 51.1s ; Ez 16.1-14 ; Am 9.7 ; 1Co 1.26-31. –  épris  : même verbe en 10.15 ; 21.11 ; Gn 34.8 ; 1R 9.19n  ; Es 38.17 ; Ps 91.14.'
  - type: text
    content: 'Ce n''est pas parce que vous surpassez en nombre tous les peuples que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est épris de vous et qu''il vous a choisis, car vous êtes le plus petit de tous les peuples. '
  '8':
  - type: note
    content: le Seigneur vous aime 4.37+ ; cf. 1Jn 4.10. –  serment 1.8+. –  d'une main forte 3.24+ ; 6.21n. –  libérés ou rachetés, dégagés 9.26 ; 13.6 ; 15.15 ; 21.8 ; 24.18 ; Mi 6.4 ; voir les emplois juridiques et rituels du même verbe, au sens de libérer contre rançon, en Ex 13.13,15 ; 21.8,30 ; 34.20 ; Lv 19.20 ; 27.27 ; Nb 3.46ss ; 18.15ss ; 1S 14.45 ; voir aussi rédemption. –  maison des esclaves 5.6+.
  - type: text
    content: 'C''est parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous aime, parce qu''il a voulu garder le serment qu''il avait fait à vos pères, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vous a fait sortir, d''une main forte ; il vous a libérés de la maison des esclaves et de la main du pharaon, le roi d''Egypte. '
  '9':
  - type: note
    content: 'Dieu (hébreu ’El, Gn 21.33n) digne de confiance, terme apparenté au mot amen  ; cf. Es 65.16n  ; 1Co 1.9+ ; 10.13 ; 2Co 1.18 ; voir aussi noms divins. –  fidélité  : cf. 5.10+ ; Ex 20.6 ; Né 1.5 ; voir grâce.'
  - type: text
    content: 'Tu sauras donc que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, qui est Dieu, le Dieu digne de confiance, qui garde l''alliance et la fidélité jusqu''à la millième génération envers ceux qui l''aiment et qui observent ses commandements. '
