        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 34.24 ; 37.25.'
      marker-yv: yv-n
    - type: text
      text: Celui qui ouvre la brèche monte devant eux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils ouvrent la brèche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: passent la porte et en sortent ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: leur roi passe devant eux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est à leur tête.'
  '2':
  - type: usfm
