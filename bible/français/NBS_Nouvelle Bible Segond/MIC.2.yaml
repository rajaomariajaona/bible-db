document_id: MIC.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ceux qui abusent de leurs pouvoirs
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 11.2 ; Am 8.4ss ; Pr 6.18. –  Quel malheur Es 5.8ss ; 28.1 ; Am 6.1 ; Ha 2.6ss ; Lc 6.24ss. –  qui préparent… Ez 11.2 ; Ps 36.5. –  qui trament… Ps 36.5. –  ils passent à l''exécution  : litt. ils le font . –  quand ils ont le pouvoir en main  : traduction incertaine ; on a aussi compris car ils ont leur main (c.-à-d. leur capacité d''action) pour dieu (cf. Ha 1.11), ou (Vg) car leur main est contre Dieu  ; comme l''indiquent ses autres emplois (Gn 31.29 ; Dt 28.32 ; Pr 3.27 ; Né 5.5) l''expression signifie sans doute plus simplement car ils en ont le pouvoir.'
  - type: text
    content: Quel malheur pour ceux qui préparent des plans malfaisants
  - type: text
    content: et qui trament le mal sur leur lit !
  - type: text
    content: Dès l'aube ils passent à l'exécution,
  - type: text
    content: quand ils ont le pouvoir en main.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Marchez  : litt. levez-vous et marchez  ; cf. 4.13 ; 6.1. –  lieu de repos  : cf. Ex 33.14 ; Dt 12.9s ; Jos 21.43ss ; 1R 8.56 ; 1Ch 23.25 ; Hé 4.1ss ; 13.14. –  impureté  : voir pur, impur. –  elle causera des douleurs ou elle provoquera sa destruction ou encore une corde douloureuse enserre , texte et traduction incertains ; sur le mot correspondant à violentes  ; cf. 1R 2.8n  ; Jb 6.25n.'
  - type: text
    content: Marchez !
  - type: text
    content: Car cette terre n'est pas un lieu de repos ;
  - type: text
    content: à cause de son impureté,
  - type: text
    content: elle causera des douleurs,
  - type: text
    content: des douleurs violentes.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'mensonges  : hébreu shéqer , en assonance avec alcool , hébreu shékar  : cf. Jr 5.31 ; Am 2.12 ; voir aussi Jr 28.15 ; 29.9,31. –  vaticiner / vaticinateur v. 6n. –  sur le vin…  : autre traduction pour du vin et des boissons alcoolisées  ; cf. Es 5.11,22s ; Am 4.1.'
  - type: text
    content: Qu'un homme, au gré du vent,
  - type: text
    content: 'se mette à débiter des mensonges :'
  - type: text
    content: Je vais vaticiner pour toi
  - type: text
    content: sur le vin et l'alcool !
  - type: text
    content: Ce sera le vaticinateur qu'il faut à ce peuple !
  - type: heading
    content: Dieu rassemblera le reste d'Israël
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.6s ; Es 11.12 ; Jr 29.14 ; 31.8,10 ; Ez 34.11s ; 37.21ss ; Os 2.2 ; Jn 11.52. –  reste 4.6ss ; 5.6ss ; Es 1.9+. –  comme des moutons Es 40.11 ; Jr 23.3ss ; Jn 10.1ss. –  dans une bergerie , autre traduction dans un enclos  ; cf. Ez 36.37s ; Jn 10.16 ; certains lisent dans le mot hébreu correspondant le nom de Botsra, ville d''Edom (Gn 36.33 ; Es 34.6 ; 63.1 ; Jr 49.13,22 ; Am 1.12 ; cf. Ps 137.7). –  pâturage Es 5.17. –  une foule bruyante  : le terme hébreu peut évoquer l''agitation (Ps 55.3) ou le bruit de la foule (Es 17.12) ; cf. Ez 34.31 ; certains modifient la vocalisation du dernier mot ( d''hommes ) pour lire un bruit venu d''Edom.'
  - type: text
    content: Oui, je te rassemblerai tout entier, Jacob !
  - type: text
    content: Oui, je te regrouperai, reste d'Israël !
  - type: text
    content: Je le réunirai comme des moutons dans une bergerie,
  - type: text
    content: comme un troupeau dans son pâturage ;
  - type: text
    content: il y aura une foule bruyante d'hommes.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale. –  monte devant eux  : cf. Ex 13.21s ; Dt 31.3 ; Es 40.3ss ; 42.13 ; 45.1s ; 52.12 ; Ps 68.8 ; 77.21 ; 78.14,52s ; Jn 10.3s. –  passent la porte Es 62.10. –  en sortent  : cf. Es 52.11 ; Jr 50.6ss ; voir aussi Jn 10.9. –  leur roi  : cf. Ez 34.24 ; 37.25.'
  - type: text
    content: Celui qui ouvre la brèche monte devant eux ;
  - type: text
    content: ils ouvrent la brèche,
  - type: text
    content: passent la porte et en sortent ;
  - type: text
    content: leur roi passe devant eux,
  - type: text
    content: 'et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est à leur tête.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Ils convoitent… Ex 20.17 ; Dt 27.17 ; Es 5.8 ; cf. 1R 21 ; Am 3.10 ; 8.4ss. –  ils oppriment Lv 19.13 ; Am 4.1. –  le citoyen  : litt. l''homme , autre mot hébreu qu''au vers suivant (parallélismes analogues en Jr 22.30 ; 23.9).'
  - type: text
    content: Ils convoitent des champs et ils s'en emparent,
  - type: text
    content: des maisons, et ils s'en saisissent ;
  - type: text
    content: ils oppriment le citoyen et sa maison,
  - type: text
    content: l'homme et son patrimoine.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Je prépare (v. 1) un malheur Ez 7.5,26. –  votre cou , sous le pied ou le joug du vainqueur ; cf. Gn 49.8 ; Jos 10.24 ; Es 10.27 ; Jr 27.2 ; 30.8 ; Ps 110.1 ; Lm 1.14. –  temps du malheur  : cf. Am 5.7-13.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: Je prépare un malheur contre ce clan ;
  - type: text
    content: vous n'en retirerez pas votre cou,
  - type: text
    content: et vous ne marcherez pas la tête haute,
  - type: text
    content: car c'est le temps du malheur.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là Am 2.16+. –  on fera de vous une fable Ha 2.6 ; cf. Dt 28.37 ; Jr 14.9 ; Ez 14.8n. –  on entonnera une complainte  : le texte hébreu traditionnel ajoute un terme supplémentaire dont le sens est incertain ; peut-être on l''entonne déjà . –  Il aliène…  : d''après LXX, certains modifient le texte hébreu traditionnel pour lire on mesure au cordeau la part de mon peuple, et personne ne s''y oppose ; ceux qui nous emmènent captifs se partagent nos champs  ; Am 7.17.'
  - type: text
    content: 'En ce jour-là, on fera de vous une fable, on entonnera une complainte, on dira :'
  - type: text
    content: Nous voilà entièrement ravagés !
  - type: text
    content: Il aliène la part de mon peuple !
  - type: text
    content: Comment ! Il me la retire !
  - type: text
    content: Il distribue nos champs au rebelle !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tu n''auras  : certains modifient le texte hébreu traditionnel pour lire vous n''aurez…  ; d''autres estiment que ce v. constitue la réponse menaçante des riches au prophète, qui serait ainsi privé d''héritage ; cf. Es 34.17 ; Ps 16.5s ; 78.55. –  un lot  : le terme évoque un tirage au sort, cf. Lv 16.8n. –  dans l''assemblée du Seigneur  : certains pensent qu''il s''agissait d''une cérémonie cultuelle où s''opérait le partage des terres (cf. Nb 26.55s ; 33.54 ; 36.2) ; d''autres rattachent l''expression au v. 6  : ne vaticinez pas dans l''assemblée du Seigneur (cf. Am 7.10,16).'
  - type: text
    content: C'est pourquoi tu n'auras personne
  - type: text
    content: qui tende le cordeau sur un lot
  - type: text
    content: 'dans l''assemblée du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Ceux qui contestent le message du prophète
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Ne vaticinez pas  : litt. ne distillez pas ou ne répandez pas , verbe habituellement appliqué aux prophètes, peut-être ici dans un sens péjoratif (cf. en français baver / bavarder, v. 11 ; Ez 21.2n,7 ; Am 7.16 ; même verbe en 9.13 ruisseler ) ; voir aussi Es 30.10 ; Jr 11.21 ; Os 9.7s ; Am 2.12. –  Les insultes…  : texte obscur, diversement traduit par les versions anciennes ; avec de légères modifications du texte hébreu traditionnel certains comprennent  : la confusion ne (nous) atteindra pas (cf. Ez 16.27n) ; d''autres recourent à une possible homonymie pour traduire qu''ils ne fassent pas de discours.'
  - type: text
    content: « Ne vaticinez pas ! » vaticinent-ils.
  - type: text
    content: Qu'on ne vaticine pas ainsi !
  - type: text
    content: Les insultes n'en finissent pas !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Est-ce ainsi que tu parles  : traduction conjecturale ; certains modifient le texte hébreu traditionnel pour lire serait-elle maudite, la maison de Jacob ? cf. 6.4s ; Gn 12.3 ; 27.27ss ; Nb 23.7s,18ss ; 24.9. –  Le Seigneur a-t-il perdu patience (ou est-il prompt à s''irriter ) : litt. le souffle (ou l''esprit ) de YHWH est-il (trop) court ? Cf. Nb 21.4n  ; Jg 16.16n. –  sa manière d''agir  : le même terme est traduit par agissements en 3.4 ; 7.13 ; cf. Jr 4.4+ ; Ps 77.12n. –  Mes paroles  : LXX ses paroles . –  avec droiture  : litt. avec (l''homme) droit  ; cf. 3.9.'
  - type: text
    content: Est-ce ainsi que tu parles, maison de Jacob ?
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a-t-il perdu patience ?'
  - type: text
    content: Est-ce là sa manière d'agir ?
  - type: text
    content: Mes paroles ne sont-elles pas bonnes
  - type: text
    content: pour celui qui marche avec droiture ?
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Texte très obscur. –  Hier  : autre traduction déjà  ; cf. Es 30.33. –  en ennemi  : certains comprennent contre un ennemi (à la guerre ) ; d''autres modifient le texte hébreu traditionnel pour lire et vous, vous n''êtes pas mon peuple (cf. Os 1.9), vous vous êtes dressés en ennemis de mon peuple  : cf. 4.6ss ; 5.6s ; Es 49.13 ; Ps 149.4. –  vous enlevez (même verbe en 3.3) le manteau  : cf. Ex 22.24ss ; Dt 22.3 ; 24.10ss,17. –  en revenant de la guerre  : certains interprètent et vous en faites des rescapés de guerre  ; d''autres modifient le texte hébreu traditionnel pour lire les habits en lambeaux (cf. Es 51.6 ; Jr 38.11s).'
  - type: text
    content: Hier mon peuple s'est dressé en ennemi ;
  - type: text
    content: vous enlevez le manteau que portent, sur leurs vêtements,
  - type: text
    content: ceux qui passent en toute sécurité
  - type: text
    content: en revenant de la guerre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ex 22.21ss ; Dt 24.17s ; 27.19 ; 2R 4.1. –  leurs maisons chéries  : litt. la maison de leurs délices  ; cf. 1.16. –  la gloire d''être à moi  : litt. ma gloire  ; on pourrait aussi comprendre la gloire que je leur ai donnée  ; cf. v. 4-5n.'
  - type: text
    content: Vous chassez de leurs maisons chéries
  - type: text
    content: les femmes de mon peuple,
  - type: text
    content: vous ôtez pour toujours à leurs enfants
  - type: text
    content: la gloire d'être à moi.
