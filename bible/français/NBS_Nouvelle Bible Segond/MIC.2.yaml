      marker-yv: yv-n
    - type: text
      text: Ils convoitent des champs et ils s'en emparent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des maisons, et ils s'en saisissent ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ils oppriment le citoyen et sa maison,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: l'homme et son patrimoine.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
