          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: levez-vous et marchez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 4.13 ; 6.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lieu de repos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 33.14 ; Dt 12.9s ; Jos 21.43ss ; 1R 8.56 ; 1Ch 23.25 ; Hé 4.1ss ; 13.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: impureté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'elle causera des douleurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'elle provoquera sa destruction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une corde douloureuse enserre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', texte et traduction incertains ; sur le mot correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: violentes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1R 2.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jb 6.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Marchez !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Car cette terre n'est pas un lieu de repos ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de son impureté,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle causera des douleurs,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: des douleurs violentes.
