      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vaticinateur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur le vin…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour du vin et des boissons alcoolisées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Es 5.11,22s ; Am 4.1.
      marker-yv: yv-n
    - type: text
      text: Qu'un homme, au gré du vent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'se mette à débiter des mensonges :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je vais vaticiner pour toi
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sur le vin et l'alcool !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ce sera le vaticinateur qu'il faut à ce peuple !
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu rassemblera le reste d'Israël
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 4.6s ; Es 11.12 ; Jr 29.14 ; 31.8,10 ; Ez 34.11s ; 37.21ss ; Os 2.2 ; Jn 11.52. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'reste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.6ss ; 5.6ss ; Es 1.9+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme des moutons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 40.11 ; Jr 23.3ss ; Jn 10.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans une bergerie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans un enclos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Ez 36.37s ; Jn 10.16 ; certains lisent dans le mot hébreu correspondant le nom de Botsra, ville d''Edom (Gn 36.33 ; Es 34.6 ; 63.1 ; Jr 49.13,22 ; Am 1.12 ; cf. Ps 137.7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pâturage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 5.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une foule bruyante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu peut évoquer l''agitation (Ps 55.3) ou le bruit de la foule (Es 17.12) ; cf. Ez 34.31 ; certains modifient la vocalisation du dernier mot ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un bruit venu d'Edom.
      marker-yv: yv-n
    - type: text
      text: Oui, je te rassemblerai tout entier, Jacob !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Oui, je te regrouperai, reste d'Israël !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je le réunirai comme des moutons dans une bergerie,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: comme un troupeau dans son pâturage ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il y aura une foule bruyante d'hommes.
