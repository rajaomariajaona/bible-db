      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sous le pied ou le joug du vainqueur ; cf. Gn 49.8 ; Jos 10.24 ; Es 10.27 ; Jr 27.2 ; 30.8 ; Ps 110.1 ; Lm 1.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: temps du malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Am 5.7-13.'
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Je prépare un malheur contre ce clan ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: vous n'en retirerez pas votre cou,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et vous ne marcherez pas la tête haute,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car c'est le temps du malheur.
