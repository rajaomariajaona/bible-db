        children:
        - type: text
          text: alcool
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shékar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jr 5.31 ; Am 2.12 ; voir aussi Jr 28.15 ; 29.9,31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vaticiner '
      - type: usfm
        marker: ft
        children:
        - type: text
