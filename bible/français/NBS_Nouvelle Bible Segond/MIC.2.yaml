      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils oppriment '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 19.13 ; Am 4.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le citoyen
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
