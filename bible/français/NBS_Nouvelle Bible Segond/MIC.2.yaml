document_id: MIC.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ceux qui abusent de leurs pouvoirs
    marker-yv: yv-h
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ez 11.2 ; Am 8.4ss ; Pr 6.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quel malheur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Es 5.8ss ; 28.1 ; Am 6.1 ; Ha 2.6ss ; Lc 6.24ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui préparent… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ez 11.2 ; Ps 36.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui trament… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 36.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils passent à l'exécution
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils le font
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quand ils ont le pouvoir en main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction incertaine ; on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'car ils ont leur main (c.-à-d. leur capacité d''action) pour dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Ha 1.11), ou (
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car leur main est contre Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; comme l''indiquent ses autres emplois (Gn 31.29 ; Dt 28.32 ; Pr 3.27 ; Né 5.5) l''expression signifie sans doute plus simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car ils en ont le pouvoir.
      marker-yv: yv-n
    - type: text
      text: Quel malheur pour ceux qui préparent des plans malfaisants
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qui trament le mal sur leur lit !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dès l'aube ils passent à l'exécution,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: quand ils ont le pouvoir en main.
  '10':
  - type: usfm
    marker: q1
    children:
