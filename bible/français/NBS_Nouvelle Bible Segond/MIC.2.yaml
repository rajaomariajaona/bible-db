        children:
        - type: text
          text: 'En ce jour-là '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Am 2.16+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on fera de vous une fable '
      - type: usfm
