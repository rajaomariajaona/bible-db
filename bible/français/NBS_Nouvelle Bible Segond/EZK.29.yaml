          text: 'ce sera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: elle (l'Egypte) sera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la campagne de Nabuchodonosor contre le pharaon Amasis (≈ 570-525 av. J.-C.) n''aboutira cependant pas à une conquête.'
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : je donne l''Egypte à Nabuchodonosor, roi de Babylone ; il emportera son abondance, il y prendra du butin, il la pillera : ce sera un salaire pour son armée, '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tourne-toi vers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
