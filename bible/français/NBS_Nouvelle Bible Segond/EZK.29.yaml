        - type: text
          text: 'Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(29–32) : cf. Es 19 ; Jr 46.'
      marker-yv: yv-n
    - type: text
      text: 'Humain, tourne-toi vers le pharaon, le roi d''Egypte, et parle en prophète sur lui et sur toute l''Egypte ! '
  '20':
  - type: usfm
    marker: p
