document_id: EZK.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre l'Egypte
  - type: text
    content: ' '
  - type: note
    content: 'dixième année…  : 588/7 av. J.-C. (cf. 1.2n  ; 24.1n).'
  - type: text
    content: 'La dixième année, le douzième jour du dixième mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: 'depuis Migdol, à l''extrémité nord du pays (Ex 14.2n  ; Jr 44.1n  ; 46.14) jusqu''à Syène ou Assouan, tout au sud : l''Egypte dans sa totalité ; cf. 30.6. –  Koush ou Nubie, Ethiopie  ; cf. 30.4s,9 ; 38.5 ; Gn 2.13n  ; Es 11.11n.'
  - type: text
    content: 'C''est pourquoi je m''oppose à toi et aux bras de ton Nil ; je ferai de l''Egypte un champ de ruines : ruines et lieux dévastés depuis Migdol jusqu''à Syène et aux frontières de Koush. '
  '11':
  - type: note
    content: 'Aucun pied d''humain…  : cf. 32.13. –  quarante ans  : cf. 4.6n.'
  - type: text
    content: 'Aucun pied d''humain n''y passera, aucun pied de bête n''y passera, et il restera quarante ans sans être habité. '
  '12':
  - type: note
    content: 'Cf. 30.7. –  les Egyptiens  : autre traduction l''Egypte (même possibilité au v. 13). –  dans tous les pays  : cf. 6.8n  ; 30.23,26.'
  - type: text
    content: Je ferai de l'Egypte un lieu dévasté parmi les pays dévastés, et de ses villes des lieux dévastés parmi les villes en ruine, pendant quarante ans. Je disperserai les Egyptiens parmi les nations, je les disséminerai dans tous les pays.
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.17+ ; Es 19.21-25.
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Au bout de quarante ans je rassemblerai les Egyptiens d''entre les peuples où ils auront été dispersés. '
  '14':
  - type: note
    content: 'Je rétablirai…  : cf. 16.53n. –  je les ramènerai  : il s''agit des Egyptiens ; des versions anciennes ont lu je les ferai habiter. –  Patros  : la Haute-Egypte, Es 11.11n  ; Jr 44.1n  ; cf. Gn 10.14n.'
  - type: text
    content: 'Je rétablirai la situation de l''Egypte ; je les ramènerai au pays de Patros, au pays de leur origine, et là ils formeront un royaume abaissé ; '
  '15':
  - type: text
    content: 'il sera le plus abaissé des royaumes et ne s''élèvera plus au-dessus des nations ; je les diminuerai, afin qu''ils ne dominent pas sur les nations. '
  '16':
  - type: note
    content: 'une sécurité ou un objet de confiance  : c.-à-d. une puissance susceptible d''inspirer de nouveau confiance à Israël au point de l''inciter à conclure avec elle de nouvelles alliances politiques, comme celles qui ont abouti à la ruine de Juda ; cf. v. 6s ; 16.26+ ; 17.15. –  pour évoquer le souvenir…  : cf. 21.28. –  vers eux  : litt. après eux, c.-à-d. après les Egyptiens. L''expression évoque sans doute métaphoriquement une infidélité conjugale (cf. chap. 16 ; 23).'
  - type: text
    content: 'Ce ne sera plus pour la maison d''Israël une sécurité – pour évoquer le souvenir de la faute qu''ils ont commise en se tournant vers eux – et ainsi ils sauront que je suis le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Le roi Nabuchodonosor va conquérir l'Egypte
  '17':
  - type: text
    content: ' '
  - type: note
    content: vingt-septième année… ≈ 571 av. J.-C. (cf. 1.2n  ; 26.1n).
  - type: text
    content: 'La vingt-septième année, le premier jour du premier mois, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Nabuchodonosor / Tyr 26.7n. –  pénible  : litt. grand . –  tondue (ou chauve ) / écorchée (ou luisante  ; cf. 21.14n) : à cause des charges transportées sur la tête ou sur l’ épaule pendant les treize ans qu''avait duré le siège. –  aucun salaire  : Tyr avait finalement dû se soumettre au joug babylonien, mais elle n''avait pas été pillée.'
  - type: text
    content: 'Humain, Nabuchodonosor, roi de Babylone, a fait faire à son armée un service pénible contre Tyr ; toute tête est tondue, toute épaule est écorchée, et il n''a retiré de Tyr aucun salaire, ni lui, ni son armée, pour le service qu''il a fait contre elle. '
  '19':
  - type: note
    content: 30.10s ; 32.11s ; cf. Es 19.4 ; Jr 43.8-13 ; 46.25s. –  abondance ou sa multitude  ; cf. 7.11n  ; 30.4. –  ce sera ou elle (l'Egypte) sera  ; la campagne de Nabuchodonosor contre le pharaon Amasis (≈ 570-525 av. J.-C.) n'aboutira cependant pas à une conquête.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : je donne l''Egypte à Nabuchodonosor, roi de Babylone ; il emportera son abondance, il y prendra du butin, il la pillera : ce sera un salaire pour son armée, '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tourne-toi vers (ou contre ) : cf. 4.3+ ; 35.2. –  Egypte (29–32) : cf. Es 19 ; Jr 46.'
  - type: text
    content: 'Humain, tourne-toi vers le pharaon, le roi d''Egypte, et parle en prophète sur lui et sur toute l''Egypte ! '
  '20':
  - type: note
    content: 'la rétribution…  : LXX a traduit en rétribution de son service (ou travail) contre Tyr. –  ses hommes  : sous-entendu dans le texte.'
  - type: text
    content: 'la rétribution pour laquelle il aura servi : je lui donne l''Egypte ; car ses hommes ont travaillé pour moi – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '. '
  '21':
  - type: note
    content: 'je ferai pousser (Ps 132.17) une corne  : image de puissance ou de fierté ; cf. 1S 2.1,10 ; Jr 48.25 ; Am 6.13 ; Ps 92.11. –  j''ouvrirai ta bouche  : litt. je te donnerai ouverture de bouche  ; cf. 3.26+.'
  - type: text
    content: 'En ce jour-là, je ferai pousser une corne pour la maison d''Israël ; j''ouvrirai ta bouche au milieu d''eux, et ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '3':
  - type: note
    content: '32.2. –  Je m''oppose à toi… 5.8+. –  dragon  : le mot hébreu a ici (également en 32.2) une forme légèrement différente de celle qu''il a dans ses autres emplois (Dt 32.33 ; Es 27.1 ; 51.9 ; Jr 51.34 ; Ps 91.13 ; Jb 7.12) ; il est aussi traduit ailleurs par monstre marin (Gn 1.21 ; Ps 148.7) ; reptile (Ex 7.9ss) ; il désigne sans doute ici, en particulier, le crocodile du Nil, dont le texte s''inspire de toute évidence. –  des bras de ton Nil  : le terme ainsi traduit désigne généralement le Nil au singulier (à la fin du v. 3 et au v. 9) et ses ramifications (les bras du Nil) au pluriel, cf. Ex 7.19n  ; de même dans la suite. –  Mon Nil ou mon fleuve  : LXX a lu les fleuves et traduit la fin c''est moi qui les ai faits (cf. v. 9), au lieu de qui me suis fait (texte hébreu traditionnel) ; cette dernière formule pourrait cependant être une allusion au dieu égyptien du soleil, auquel le pharaon était identifié et qui était censé s''être créé lui-même.'
  - type: text
    content: 'Dis : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  :'
  - type: text
    content: Je m'oppose à toi, pharaon, roi d'Egypte,
  - type: text
    content: grand dragon
  - type: text
    content: qui te couches au milieu des bras de ton Nil,
  - type: text
    content: 'qui dis : « Mon Nil est à moi,'
  - type: text
    content: c'est moi qui me suis fait ! »
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'des boucles…  : cf. 19.4+ ; 38.4 ; 2R 19.28 ; Es 37.29.'
  - type: text
    content: Je mettrai des boucles à tes mâchoires, je collerai à tes écailles les poissons des bras de ton Nil et je te tirerai du milieu des bras de ton Nil, avec tous les poissons des bras de ton Nil qui seront collés à tes écailles.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'on ne rassemblera pas tes restes  : litt. tu ne seras pas rassemblé  ; quelques mss hébreux et Tg portent tu ne seras pas enseveli  ; cf. 2R 9.37 ; Jr 8.1-3 ; 22.19. –  en pâture ou pour qu''ils te dévorent  ; cf. 15.4,6 ; 21.37 ; 39.4 ; Jr 7.33 ; 19.7. –  animaux de la terre Gn 1.24n,30.'
  - type: text
    content: Je te laisserai dans le désert,
  - type: text
    content: toi et tous les poissons des bras de ton Nil.
  - type: text
    content: Tu tomberas dans les champs,
  - type: text
    content: tu ne seras pas enseveli, on ne rassemblera pas tes restes ;
  - type: text
    content: je te donnerai en pâture
  - type: text
    content: aux animaux de la terre et aux oiseaux du ciel.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les habitants de l''Egypte…  : cf. 14.4. –  ils ont été  : des versions anciennes ont lu tu as été . –  comme l''appui d''un roseau 2R 18.21 ; 24.7 ; Es 36.6 ; cf. 30.1-7.'
  - type: text
    content: Ainsi tous les habitants de l'Egypte sauront
  - type: text
    content: 'que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: parce qu'ils ont été comme l'appui d'un roseau
  - type: text
    content: pour la maison d'Israël.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ils t''ont saisi  : litt. ils t''ont saisi dans la main , autre lecture traditionnelle dans ta main  ; LXX dans leur main . –  l''épaule  : LXX et Syr ont lu la main , comme au début du v. –  tu leur as complètement paralysé les reins  : litt. tu leur as fait tenir debout tous les reins ( ?), peut-être au sens de tu les as obligés à se tenir debout tout seuls  ; des versions anciennes (LXX, Syr) ont lu tu as brisé tous leurs reins ou tu les as fait chanceler sur leurs reins , comme en Ps 69.24.'
  - type: text
    content: Lorsqu'ils t'ont saisi, tu t'es cassé
  - type: text
    content: et tu leur as déchiré toute l'épaule ;
  - type: text
    content: lorsqu'ils se sont appuyés sur toi, tu t'es brisé
  - type: text
    content: et tu leur as complètement paralysé les reins.
  '8':
  - type: text
    content: ' '
  - type: note
    content: l'épée 11.8+ ; 30.4. –  les humains et les bêtes 14.13+.
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je fais venir contre toi l''épée et je retrancherai de toi les humains et les bêtes. '
  '9':
  - type: text
    content: 'L''Egypte deviendra un lieu dévasté et une ruine, et ainsi on saura que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) – parce qu''il a dit : « Le Nil m''appartient, c''est moi qui l''ai fait ! » '
