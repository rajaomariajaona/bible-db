          text:  ; cf. 21.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : à cause des charges transportées sur la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou sur l’
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'épaule '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'pendant les treize ans qu''avait duré le siège. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aucun salaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Tyr avait finalement dû se soumettre au joug babylonien, mais elle n''avait pas été pillée.'
      marker-yv: yv-n
    - type: text
      text: 'Humain, Nabuchodonosor, roi de Babylone, a fait faire à son armée un service pénible contre Tyr ; toute tête est tondue, toute épaule est écorchée, et il n''a retiré de Tyr aucun salaire, ni lui, ni son armée, pour le service qu''il a fait contre elle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.10s ; 32.11s ; cf. Es 19.4 ; Jr 43.8-13 ; 46.25s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'abondance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa multitude
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 7.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
