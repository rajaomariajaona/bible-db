      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : image de puissance ou de fierté ; cf. 1S 2.1,10 ; Jr 48.25 ; Am 6.13 ; Ps 92.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: j'ouvrirai ta bouche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je te donnerai ouverture de bouche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 3.26+.'
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là, je ferai pousser une corne pour la maison d''Israël ; j''ouvrirai ta bouche au milieu d''eux, et ainsi ils sauront que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
