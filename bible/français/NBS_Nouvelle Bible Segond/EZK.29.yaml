        - type: text
          text: 'jusqu''à Syène '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou Assouan, tout au sud : l''Egypte dans sa totalité ; cf. 30.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Koush '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Nubie, Ethiopie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 30.4s,9 ; 38.5 ; Gn 2.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Es 11.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'C''est pourquoi je m''oppose à toi et aux bras de ton Nil ; je ferai de l''Egypte un champ de ruines : ruines et lieux dévastés depuis Migdol jusqu''à Syène et aux frontières de Koush. '
  '11':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Aucun pied d'humain…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 32.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quarante ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Aucun pied d''humain n''y passera, aucun pied de bête n''y passera, et il restera quarante ans sans être habité. '
  '12':
  - type: usfm
    marker: m
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 30.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même possibilité au v. 13). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans tous les pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 30.23,26.'
      marker-yv: yv-n
    - type: text
      text: Je ferai de l'Egypte un lieu dévasté parmi les pays dévastés, et de ses villes des lieux dévastés parmi les villes en ruine, pendant quarante ans. Je disperserai les Egyptiens parmi les nations, je les disséminerai dans tous les pays.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 11.17+ ; Es 19.21-25.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Au bout de quarante ans je rassemblerai les Egyptiens d''entre les peuples où ils auront été dispersés. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je rétablirai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.53'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je les ramènerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agit des Egyptiens ; des versions anciennes ont lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je les ferai habiter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Patros
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la Haute-Egypte, Es 11.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 44.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Gn 10.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je rétablirai la situation de l''Egypte ; je les ramènerai au pays de Patros, au pays de leur origine, et là ils formeront un royaume abaissé ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'il sera le plus abaissé des royaumes et ne s''élèvera plus au-dessus des nations ; je les diminuerai, afin qu''ils ne dominent pas sur les nations. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une sécurité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un objet de confiance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. une puissance susceptible d''inspirer de nouveau confiance à Israël au point de l''inciter à conclure avec elle de nouvelles alliances politiques, comme celles qui ont abouti à la ruine de Juda ; cf. v. 6s ; 16.26+ ; 17.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour évoquer le souvenir…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 21.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vers eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: après les Egyptiens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . L'expression évoque sans doute métaphoriquement une infidélité conjugale (cf. chap. 16 ; 23).
      marker-yv: yv-n
    - type: text
      text: 'Ce ne sera plus pour la maison d''Israël une sécurité – pour évoquer le souvenir de la faute qu''ils ont commise en se tournant vers eux – et ainsi ils sauront que je suis le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: ' (YHWH).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le roi Nabuchodonosor va conquérir l'Egypte
    marker-yv: yv-h
