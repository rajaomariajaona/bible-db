document_id: JOB.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention de Tsophar : le triomphe des méchants est de courte durée'
  - type: text
    content: 'Tsophar le Naamatite répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'devront payer…  : autre traduction demanderont l''aumône aux pauvres  ; certains rapprochent le verbe hébreu qui apparaît ici de celui qui est traduit par écraser au v. 19, d''où une autre possibilité  : seront assaillis par les pauvres  ; cf. 27.17. –  ses mains  : certains modifient le texte hébreu traditionnel pour lire leurs mains.'
  - type: text
    content: Ses fils devront payer les pauvres,
  - type: text
    content: ses mains restitueront ce qui faisait sa fortune.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Tout son corps  : litt. ses os (cf. 21.24). –  jeunesse  : le même terme est traduit par adolescence en 33.25 ; il se retrouve en Es 54.4 ; Ps 89.46. –  dans la poussière 17.16.'
  - type: text
    content: Tout son corps était plein de jeunesse,
  - type: text
    content: mais celle-ci se couchera avec lui dans la poussière.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Pr 20.17.
  - type: text
    content: Si le mal est doux à sa bouche,
  - type: text
    content: s'il le cache sous sa langue,
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'conserve  : le verbe hébreu correspondant est traduit par épargner en 16.13n.'
  - type: text
    content: s'il le conserve sans l'abandonner,
  - type: text
    content: s'il le retient à l'intérieur de son palais,
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ez 3.3 ; Ap 10.9s.
  - type: text
    content: sa nourriture se transformera dans ses entrailles,
  - type: text
    content: elle deviendra au dedans de lui du fiel de vipère.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les arrachera…  : ou, selon la traduction habituelle du verbe correspondant, en dépossédera son ventre.'
  - type: text
    content: Il a englouti des richesses, il les vomira ;
  - type: text
    content: Dieu les arrachera de son ventre.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 32.33 ; Ps 58.5 ; Jc 3.8.
  - type: text
    content: Il suce le venin des vipères,
  - type: text
    content: la langue du cobra le tuera.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '29.6. –  torrents  : le même terme hébreu est traduit par oueds en 6.15n. –  lait fermenté 29.6 ; Gn 18.8n.'
  - type: text
    content: Il ne verra plus les ruisseaux,
  - type: text
    content: les fleuves, les torrents de miel et de lait fermenté !
  '18':
  - type: text
    content: ' '
  - type: note
    content: '15.29. –  son commerce  : litt. son échange.'
  - type: text
    content: Il rendra ce qu'il a gagné et il ne l'engloutira plus ;
  - type: text
    content: il ne jouira plus des biens de son commerce.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'il a écrasé… les pauvres  : cf. v. 10n. –  il a pillé…  : on pourrait aussi traduire il s''est emparé d''une maison qu''il n''a pas bâtie  ; cf. Mc 12.40.'
  - type: text
    content: Car il a écrasé et abandonné les pauvres,
  - type: text
    content: il a pillé une maison qu'il ne rebâtira pas.
  '2':
  - type: text
    content: Voilà pourquoi mes pensées inquiètes me forcent à répondre,
  - type: text
    content: à cause de l'agitation qui est en moi.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 15.29. –  trêve  : le terme hébreu correspondant est traduit par tranquille en 16.12, par insouciant en 21.23. –  dans son avidité  : litt. dans son ventre . –  dans sa convoitise…  : autre traduction il ne préservera rien de ce qu''il a convoité.'
  - type: text
    content: Il n'a pas connu de trêve dans son avidité,
  - type: text
    content: dans sa convoitise il ne laisse rien échapper,
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'rien n''était soustrait…  : autre traduction nul ne survivait… , cf. v. 26n  ; 18.19 ; 27.15.'
  - type: text
    content: rien n'était soustrait à sa voracité ;
  - type: text
    content: mais son bien-être ne durera pas.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'tous les coups…  : litt. toute main de peine (ou de peinant ) arrivera à lui , ce qui pourrait aussi signifier il sera frappé par ceux qui peinaient (pour lui).'
  - type: text
    content: Au milieu de son abondance il sera dans la détresse ;
  - type: text
    content: tous les coups du malheur le frapperont.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 12.19s. –  Dieu enverra  : litt. il enverra . –  et la fera… dans sa chair  : traduction conjecturale ; le terme correspondant à chair est très rare (seulement ici et en So 1.17) ; on a aussi compris (sa colère) pleuvra sur lui en guise de nourriture , ou encore et il fera pleuvoir sur lui ses flèches.'
  - type: text
    content: Alors qu'il se remplit le ventre,
  - type: text
    content: Dieu enverra sur lui sa colère ardente
  - type: text
    content: et la fera pleuvoir sur lui, dans sa chair.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 24.18 ; Am 5.19.
  - type: text
    content: S'il fuit pour échapper à des armes de fer,
  - type: text
    content: un arc de bronze le transpercera.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'la lame étincelante  : litt. un éclair . –  terreurs 9.34+.'
  - type: text
    content: S'il arrache de son corps la flèche
  - type: text
    content: et la lame étincelante de son foie,
  - type: text
    content: des terreurs viendront sur lui.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'tenues en réserve  : litt. cachées . –  que personne n''attise  : litt. qui ne sera pas soufflé  ; il faut peut-être comprendre un feu d''origine divine (cf. Dn 2.34,45). –  ce qui restera  : autre traduction celui qui aura survécu , cf. v. 21n. –  dans sa tente 15.34.'
  - type: text
    content: Toutes les ténèbres sont tenues en réserve pour ses trésors,
  - type: text
    content: un feu que personne n'attise le dévorera,
  - type: text
    content: et ce qui restera dans sa tente en deviendra la pâture.
  '27':
  - type: text
    content: Le ciel mettra sa faute à découvert,
  - type: text
    content: la terre se dressera contre lui.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'la colère de Dieu  : litt. sa colère , cf. So 1.18 ; Pr 11.4.'
  - type: text
    content: Les revenus de sa maison seront balayés,
  - type: text
    content: emportés au jour de la colère de Dieu.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 27.13n  ; 31.2 ; Ap 21.8. –  méchant  : voir justice. –  le patrimoine…  : litt. le patrimoine de sa parole venant de Dieu (hébreu ’El  ; cf. 5.8n) ; autre traduction le patrimoine que Dieu lui destine  ; ou, en modifiant le texte hébreu traditionnel, le patrimoine que Dieu réserve au méchant.'
  - type: text
    content: Telle est la part que Dieu réserve à l'homme méchant,
  - type: text
    content: le patrimoine que Dieu lui promet !
  '3':
  - type: text
    content: ' '
  - type: note
    content: reproches 12.18n. –  m'insultent ou me mettent dans la confusion  ; cf. 19.3+. –  le souffle ou l'esprit  ; d'après LXX, d'autres modifient légèrement le texte pour comprendre un souffle sans intelligence m'oblige à répondre.
  - type: text
    content: J'entends des reproches qui m'insultent ;
  - type: text
    content: le souffle de mon intelligence donnera la réplique.
  '4':
  - type: text
    content: Ne sais-tu pas que, de tout temps,
  - type: text
    content: depuis que l'être humain a été placé sur la terre,
  '5':
  - type: text
    content: ' '
  - type: note
    content: '18.5-21 ; cf. Ps 37 ; 73.17-28. –  le triomphe  : litt. le cri (de joie) . –  momentanée  : litt. jusqu''à un instant.'
  - type: text
    content: le triomphe des méchants est court,
  - type: text
    content: et la joie de l'impie momentanée ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. Gn 11.4 ; Es 14.13s ; Ps 37.35 ; Dn 4.8,17.
  - type: text
    content: Quand sa taille s'élèverait jusqu'au ciel,
  - type: text
    content: quand sa tête toucherait aux nuages,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'comme son ordure (ou ses ordures , cf. 1R 14.10) : certains comprennent comme un fantôme . –  Où est-il ? 21.28.'
  - type: text
    content: il disparaîtra pour toujours, comme son ordure,
  - type: text
    content: 'et ceux qui le voyaient diront : « Où est-il ? »'
  '8':
  - type: text
    content: ' '
  - type: note
    content: Ps 73.20 ; 90.5.
  - type: text
    content: Il s'envolera comme un rêve,
  - type: text
    content: et on ne le trouvera plus ;
  - type: text
    content: il sera chassé comme une vision nocturne ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'ne le regardera plus  : litt. ne continuera pas . –  le lieu… 7.10n.'
  - type: text
    content: l'œil qui le regardait ne le regardera plus,
  - type: text
    content: le lieu qu'il habitait ne l'apercevra plus.
