document_id: JOB.20,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Intervention de Tsophar : le triomphe des méchants est de courte durée'
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tsophar le Naamatite répondit :'
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devront payer…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: demanderont l'aumône aux pauvres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; certains rapprochent le verbe hébreu qui apparaît ici de celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'écraser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 19, d'où une autre possibilité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seront assaillis par les pauvres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 27.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leurs mains.
      marker-yv: yv-n
    - type: text
      text: Ses fils devront payer les pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ses mains restitueront ce qui faisait sa fortune.
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout son corps
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ses os '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 21.24). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jeunesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'adolescence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 33.25 ; il se retrouve en Es 54.4 ; Ps 89.46. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la poussière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.16.
      marker-yv: yv-n
    - type: text
      text: Tout son corps était plein de jeunesse,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais celle-ci se couchera avec lui dans la poussière.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pr 20.17.
      marker-yv: yv-n
    - type: text
      text: Si le mal est doux à sa bouche,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s'il le cache sous sa langue,
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: conserve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'épargner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 16.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: s'il le conserve sans l'abandonner,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: s'il le retient à l'intérieur de son palais,
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Ez 3.3 ; Ap 10.9s.
      marker-yv: yv-n
    - type: text
      text: sa nourriture se transformera dans ses entrailles,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle deviendra au dedans de lui du fiel de vipère.
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les arrachera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ou, selon la traduction habituelle du verbe correspondant, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en dépossédera son ventre.
      marker-yv: yv-n
    - type: text
      text: Il a englouti des richesses, il les vomira ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu les arrachera de son ventre.
  '16':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Dt 32.33 ; Ps 58.5 ; Jc 3.8.
      marker-yv: yv-n
    - type: text
      text: Il suce le venin des vipères,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la langue du cobra le tuera.
  '17':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '29.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: torrents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même terme hébreu est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'oueds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 6.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lait fermenté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 29.6 ; Gn 18.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Il ne verra plus les ruisseaux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: les fleuves, les torrents de miel et de lait fermenté !
  '18':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son commerce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son échange.
      marker-yv: yv-n
    - type: text
      text: Il rendra ce qu'il a gagné et il ne l'engloutira plus ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il ne jouira plus des biens de son commerce.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a écrasé… les pauvres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a pillé…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il s'est emparé d'une maison qu'il n'a pas bâtie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Mc 12.40.
      marker-yv: yv-n
    - type: text
      text: Car il a écrasé et abandonné les pauvres,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il a pillé une maison qu'il ne rebâtira pas.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Voilà pourquoi mes pensées inquiètes me forcent à répondre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à cause de l'agitation qui est en moi.
  '20':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 15.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trêve
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu correspondant est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tranquille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 16.12, par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'insouciant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 21.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans son avidité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans son ventre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans sa convoitise…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne préservera rien de ce qu'il a convoité.
      marker-yv: yv-n
    - type: text
      text: Il n'a pas connu de trêve dans son avidité,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: dans sa convoitise il ne laisse rien échapper,
  '21':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rien n'était soustrait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nul ne survivait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.19 ; 27.15.'
      marker-yv: yv-n
    - type: text
      text: rien n'était soustrait à sa voracité ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: mais son bien-être ne durera pas.
  '22':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les coups…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toute main de peine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de peinant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: arrivera à lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il sera frappé par ceux qui peinaient (pour lui).
      marker-yv: yv-n
    - type: text
      text: Au milieu de son abondance il sera dans la détresse ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: tous les coups du malheur le frapperont.
  '23':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lc 12.19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Dieu enverra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il enverra
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et la fera… dans sa chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction conjecturale ; le terme correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chair '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est très rare (seulement ici et en So 1.17) ; on a aussi compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (sa colère) pleuvra sur lui en guise de nourriture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou encore '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il fera pleuvoir sur lui ses flèches.
      marker-yv: yv-n
    - type: text
      text: Alors qu'il se remplit le ventre,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Dieu enverra sur lui sa colère ardente
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la fera pleuvoir sur lui, dans sa chair.
  '24':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Es 24.18 ; Am 5.19.
      marker-yv: yv-n
    - type: text
      text: S'il fuit pour échapper à des armes de fer,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: un arc de bronze le transpercera.
  '25':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '20.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la lame étincelante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un éclair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terreurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.34+.
      marker-yv: yv-n
    - type: text
      text: S'il arrache de son corps la flèche
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et la lame étincelante de son foie,
  - type: usfm
    marker: q1
