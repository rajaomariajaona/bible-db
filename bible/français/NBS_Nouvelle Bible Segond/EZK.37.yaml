        children:
        - type: text
          text: '37.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur l''ensemble, voir le récit du schisme entre Juda (au sud) et Ephraïm (au nord) en 1R 12 ; cf. Za 11.7-14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un morceau de bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot correspondant peut aussi désigner un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: arbre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'A Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: A Joseph
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : formule couramment utilisée pour indiquer, sur toutes sortes d''objets, le nom de leur propriétaire. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui lui sont associés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est associée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses compagnons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Joseph '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ephraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 41.50-52 ; 48.13s.
      marker-yv: yv-n
    - type: text
      text: 'Toi, humain, prends un morceau de bois et écris dessus : « A Juda et aux Israélites qui lui sont associés. » Prends un autre morceau de bois, et écris dessus : « A Joseph, bois d''Ephraïm, et à toute la maison d''Israël qui lui est associée. » '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Es 11.13 ; Jr 3.18.
      marker-yv: yv-n
    - type: text
      text: 'Rapproche-les l''un de l''autre, que tu n''aies plus qu''un seul morceau de bois, qu''ils soient unis dans ta main. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 33.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce que cela signifie pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 12.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque les gens de ton peuple te diront : Ne nous expliqueras-tu pas ce que cela signifie pour toi ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les tribus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu peut aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bâton(s)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'associées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: unis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un seul.
      marker-yv: yv-n
    - type: text
      text: 'réponds-leur : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je prends le bois de Joseph qui est dans la main d''Ephraïm et les tribus d''Israël qui lui sont associées ; je les joindrai au bois de Juda et j''en formerai un seul bois. Ils seront unis dans ma main. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: auprès d'eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sur eux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vers eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la vallée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur la face de la vallée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: très secs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 17.22.'
      marker-yv: yv-n
    - type: text
      text: 'Il me fit passer auprès d''eux, tout autour : ils étaient très nombreux, dans la vallée, et ils étaient très secs.'
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sous leurs yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.12+.
      marker-yv: yv-n
    - type: text
      text: Les morceaux de bois sur lesquels tu écriras seront dans ta main, sous leurs yeux.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.17+.
      marker-yv: yv-n
    - type: text
      text: 'Tu leur diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Je prends les Israélites d''entre les nations où ils sont allés ; je les rassemblerai de toutes parts et je les ramènerai sur leur terre. '
  '22':
  - type: usfm
    marker: p
    children:
