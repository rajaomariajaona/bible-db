document_id: EZK.37,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vision des ossements desséchés
  - type: text
    content: ' '
  - type: note
    content: 'La main… 1.3+ ; 8.1. –  par un souffle  : autres traductions par le Souffle, par l''Esprit, par un esprit, en esprit , cf. 2.2n  ; c''est le même mot qui est traduit par vent dans la suite (cf. v. 5n,9n). On peut aussi comprendre il me fit sortir par le souffle du Seigneur . –  la vallée  : probablement celle de 3.22s ; 8.4. –  ossements non ensevelis ; cf. Gn 35.29 ; 50.5 ; Jr 25.33.'
  - type: text
    content: 'La main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur moi ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me fit sortir par un souffle et me déposa au milieu de la vallée ; celle-ci était remplie d''ossements. '
  '10':
  - type: note
    content: 'V. 5+ ; Ap 11.11. –  une très grande armée…  : litt. une armée très très grande  ; 9.9n.'
  - type: text
    content: Je parlai en prophète, comme il me l'avait ordonné. Alors le souffle vint en eux, ils reprirent vie et se tinrent debout sur leurs jambes. C'était une très grande armée, une armée immense.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'toute la maison d''Israël  : cf. v. 16ss. –  perdus  : litt. coupés ou exclus , cf. Es 53.8 ; Lm 3.54 ; certains comprennent notre sort est arrêté.'
  - type: text
    content: 'Il me dit : Humain, ces ossements, c''est toute la maison d''Israël. Ils disent : Nos ossements sont desséchés, notre espoir s''est évanoui, nous sommes perdus ! '
  '12':
  - type: note
    content: Cf. Es 26.19 ; Os 13.14 ; Dn 12.2 ; Mt 27.52 ; Jn 5.28s ; Rm 8.11. –  sur la terre d'Israël v. 21 ; 11.17+.
  - type: text
    content: 'A cause de cela, parle en prophète ! Tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : J''ouvre vos tombes, je vous ferai remonter de vos tombes, ô mon peuple, et je vous ramènerai sur la terre d''Israël. '
  '13':
  - type: text
    content: 'Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), lorsque j''ouvrirai vos tombes et que je vous ferai remonter de vos tombes, ô mon peuple ! '
  '14':
  - type: note
    content: 'V. 5+. –  reprendrez vie  : autre traduction vivrez. –  ramènerai  : autre traduction ferai reposer. –  parlé et agi 17.24+.'
  - type: text
    content: 'Je mettrai mon souffle en vous, et vous reprendrez vie ; je vous ramènerai sur votre terre, et ainsi vous saurez que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui ai parlé et agi – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Le Seigneur va rétablir l'unité du peuple
  '15':
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Sur l''ensemble, voir le récit du schisme entre Juda (au sud) et Ephraïm (au nord) en 1R 12 ; cf. Za 11.7-14. –  un morceau de bois  : le mot correspondant peut aussi désigner un arbre . –  A Juda / A Joseph  : formule couramment utilisée pour indiquer, sur toutes sortes d''objets, le nom de leur propriétaire. –  qui lui sont associés / est associée  : litt. ses compagnons , de même au v. 19. –  Joseph / Ephraïm Gn 41.50-52 ; 48.13s.'
  - type: text
    content: 'Toi, humain, prends un morceau de bois et écris dessus : « A Juda et aux Israélites qui lui sont associés. » Prends un autre morceau de bois, et écris dessus : « A Joseph, bois d''Ephraïm, et à toute la maison d''Israël qui lui est associée. » '
  '17':
  - type: note
    content: Cf. Es 11.13 ; Jr 3.18.
  - type: text
    content: 'Rapproche-les l''un de l''autre, que tu n''aies plus qu''un seul morceau de bois, qu''ils soient unis dans ta main. '
  '18':
  - type: note
    content: 'gens  : litt. fils, cf. 33.2+. –  ce que cela signifie pour toi  : cf. 12.9n.'
  - type: text
    content: 'Lorsque les gens de ton peuple te diront : Ne nous expliqueras-tu pas ce que cela signifie pour toi ? '
  '19':
  - type: note
    content: 'les tribus  : le mot hébreu peut aussi signifier bâton(s). –  associées v. 16n. –  unis  : litt. un seul.'
  - type: text
    content: 'réponds-leur : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je prends le bois de Joseph qui est dans la main d''Ephraïm et les tribus d''Israël qui lui sont associées ; je les joindrai au bois de Juda et j''en formerai un seul bois. Ils seront unis dans ma main. '
  '2':
  - type: note
    content: 'auprès d''eux  : litt. sur eux ou vers eux. –  dans la vallée  : litt. sur la face de la vallée. –  très secs  : cf. Pr 17.22.'
  - type: text
    content: 'Il me fit passer auprès d''eux, tout autour : ils étaient très nombreux, dans la vallée, et ils étaient très secs.'
  '20':
  - type: note
    content: sous leurs yeux 4.12+.
  - type: text
    content: Les morceaux de bois sur lesquels tu écriras seront dans ta main, sous leurs yeux.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 11.17+.
  - type: text
    content: 'Tu leur diras : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Je prends les Israélites d''entre les nations où ils sont allés ; je les rassemblerai de toutes parts et je les ramènerai sur leur terre. '
  '22':
  - type: note
    content: 'montagnes d''Israël 36.1ss. –  ils auront tous un même roi  : litt. un seul roi sera roi pour eux tous  ; LXX a lu prince au lieu de roi comme au v. 25 ; 34.24+ ; de même dans la suite ; cf. Es 11.1-13.'
  - type: text
    content: 'Je ferai d''eux une seule nation dans le pays, dans les montagnes d''Israël ; ils auront tous un même roi, ils ne formeront plus deux nations et ne seront plus divisés en deux royaumes. '
  '23':
  - type: note
    content: '11.18. –  de tous les lieux d''habitation  : une version ancienne a lu de leur apostasie. – Voir péché. –  je les purifierai 36.25 ; cf. Tt 2.14. –  ils seront… 11.20+.'
  - type: text
    content: 'Ils ne se rendront plus impurs avec leurs idoles, leurs horreurs et toutes leurs transgressions ; je les sauverai de tous les lieux d''habitation où ils ont péché, et je les purifierai ; ils seront mon peuple, et moi, je serai leur Dieu. '
  '24':
  - type: note
    content: Cf. v. 22n  ; 34.23+,24.
  - type: text
    content: 'David, mon serviteur, sera leur roi, et ils auront tous un seul berger. Ils suivront mes règles, ils observeront mes prescriptions et les mettront en pratique. '
  '25':
  - type: note
    content: '28.25+. –  pour toujours  : cf. Jn 12.34.'
  - type: text
    content: 'Ils habiteront le pays que j''ai donné à Jacob, mon serviteur, celui qu''ont habité vos pères ; ils y habiteront pour toujours, eux, leurs fils et les fils de leurs fils, et David, mon serviteur, sera leur prince pour toujours. '
  '26':
  - type: note
    content: '34.25n. –  alliance perpétuelle 16.60+. –  Je les établirai  : litt. je les donnerai, traduction incertaine ; Tg je les bénirai  ; LXX omet cette proposition et la suivante. –  multiplierai 36.10+. –  mon sanctuaire  : cf. v. 28 ; 11.16 ; 40–44 ; 48.35.'
  - type: text
    content: 'Je conclurai pour eux une alliance de paix ; ce sera une alliance perpétuelle avec eux. Je les établirai, je les multiplierai et j''établirai mon sanctuaire au milieu d''eux pour toujours. '
  '27':
  - type: note
    content: Lv 26.11s ; Jn 1.14 ; 14.23 ; 2Co 6.16 ; Ap 7.15 ; 21.3.
  - type: text
    content: 'Ma demeure sera parmi eux ; je serai leur Dieu, et eux, ils seront mon peuple ; '
  '28':
  - type: note
    content: V. 26+. –  qui rends Israël saint ou qui consacre Israël, le terme correspondant est apparenté à celui qui est traduit par sanctuaire.
  - type: text
    content: 'ainsi les nations sauront que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui rends Israël saint, lorsque mon sanctuaire sera pour toujours au milieu d''eux.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'pourront-ils revivre  : litt. vivront-ils  ; voir résurrection. –  c''est toi…  : cf. Ap 7.13s.'
  - type: text
    content: 'Il me dit : Humain, ces ossements pourront-ils revivre ? Je répondis : Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', c''est toi qui le sais ! '
  '4':
  - type: text
    content: 'Il me dit : Parle en prophète sur ces ossements. Tu leur diras : Ossements desséchés, écoutez la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! '
  '5':
  - type: note
    content: 'Voici ce que dit  : la formule correspondante est habituellement traduite par ainsi parle (p. ex. v. 9,12,19,21). –  venir  : autre traduction entrer. –  souffle ou esprit, v. 1n,6,10,14 ; cf. 36.27 ; voir aussi Gn 2.7 ; 7.22n  ; Ps 104.30 ; Ec 12.7.'
  - type: text
    content: 'Voici ce que dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' à ces ossements : Je fais venir en vous un souffle, et vous vivrez ; '
  '6':
  - type: note
    content: tendons ou ligaments.
  - type: text
    content: 'je placerai sur vous des tendons, je ferai pousser de la chair sur vous, je vous recouvrirai de peau, je mettrai en vous un souffle, vous vivrez, et ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Je parlai en prophète 4.7n. –  un frémissement  : autres traductions un tremblement ; un grondement  ; cf. 3.12ns. –  les uns des autres  : litt. os contre os.'
  - type: text
    content: 'Je parlai en prophète, selon ce qui m''avait été ordonné. Et comme je parlais en prophète, il y eut un bruit, il y eut un frémissement – et les ossements se rapprochèrent les uns des autres. '
  '8':
  - type: text
    content: Je constatai qu'il y avait sur eux des tendons. La chair se mit à pousser, et la peau les recouvrit par-dessus, mais il n'y avait pas de souffle en eux.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'au souffle  : le mot hébreu est ici précédé de l''article ; on pourrait aussi traduire au Souffle ; à l''Esprit ; au vent (même mot pour les quatre vents , cf. Ap 7.1). –  Souffle sur  : le verbe correspondant n''est pas apparenté au mot traduit par souffle  ; cf. Gn 2.7 ; voir aussi Jn 20.22. –  ces tués  : le mot hébreu suppose une mort violente.'
  - type: text
    content: 'Il me dit : Parle en prophète sur le souffle, parle en prophète, humain ! Tu diras au souffle : Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Viens des quatre vents, ô souffle ! Souffle sur ces tués, et qu''ils revivent ! '
