        - type: text
          text: '  : cf. v. 28 ; 11.16 ; 40–44 ; 48.35.'
      marker-yv: yv-n
    - type: text
      text: 'Je conclurai pour eux une alliance de paix ; ce sera une alliance perpétuelle avec eux. Je les établirai, je les multiplierai et j''établirai mon sanctuaire au milieu d''eux pour toujours. '
  '27':
