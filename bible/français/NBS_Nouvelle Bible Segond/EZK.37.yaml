      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parlé et agi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.24+.
      marker-yv: yv-n
    - type: text
      text: 'Je mettrai mon souffle en vous, et vous reprendrez vie ; je vous ramènerai sur votre terre, et ainsi vous saurez que c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui ai parlé et agi – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' va rétablir l''unité du peuple'
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' me parvint :'
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
