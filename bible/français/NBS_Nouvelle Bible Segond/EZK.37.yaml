        marker: fqa
        children:
        - type: text
          text: je les bénirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX omet cette proposition et la suivante. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'multiplierai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '36.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon sanctuaire
      - type: usfm
        marker: ft
