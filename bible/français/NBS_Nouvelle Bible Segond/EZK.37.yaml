      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 12.34.'
      marker-yv: yv-n
    - type: text
      text: 'Ils habiteront le pays que j''ai donné à Jacob, mon serviteur, celui qu''ont habité vos pères ; ils y habiteront pour toujours, eux, leurs fils et les fils de leurs fils, et David, mon serviteur, sera leur prince pour toujours. '
