      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montagnes d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '36.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils auront tous un même roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un seul roi sera roi pour eux tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prince '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme au v. 25 ; 34.24+ ; de même dans la suite ; cf. Es 11.1-13.
      marker-yv: yv-n
    - type: text
      text: 'Je ferai d''eux une seule nation dans le pays, dans les montagnes d''Israël ; ils auront tous un même roi, ils ne formeront plus deux nations et ne seront plus divisés en deux royaumes. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.18. –  '
      - type: usfm
        marker: fq
        children:
