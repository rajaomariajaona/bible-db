        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Je parlai en prophète, comme il me l'avait ordonné. Alors le souffle vint en eux, ils reprirent vie et se tinrent debout sur leurs jambes. C'était une très grande armée, une armée immense.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toute la maison d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 16ss. –  '
      - type: usfm
        marker: fq
