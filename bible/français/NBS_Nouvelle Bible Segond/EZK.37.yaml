        - type: text
          text: '37.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lv 26.11s ; Jn 1.14 ; 14.23 ; 2Co 6.16 ; Ap 7.15 ; 21.3.
      marker-yv: yv-n
    - type: text
      text: 'Ma demeure sera parmi eux ; je serai leur Dieu, et eux, ils seront mon peuple ; '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
