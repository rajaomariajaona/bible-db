      - type: usfm
        marker: fqa
        children:
        - type: text
          text: notre sort est arrêté.
      marker-yv: yv-n
    - type: text
      text: 'Il me dit : Humain, ces ossements, c''est toute la maison d''Israël. Ils disent : Nos ossements sont desséchés, notre espoir s''est évanoui, nous sommes perdus ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '37.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Es 26.19 ; Os 13.14 ; Dn 12.2 ; Mt 27.52 ; Jn 5.28s ; Rm 8.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur la terre d''Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 21 ; 11.17+.
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, parle en prophète ! Tu leur diras : Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : J''ouvre vos tombes, je vous ferai remonter de vos tombes, ô mon peuple, et je vous ramènerai sur la terre d''Israël. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), lorsque j''ouvrirai vos tombes et que je vous ferai remonter de vos tombes, ô mon peuple ! '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
