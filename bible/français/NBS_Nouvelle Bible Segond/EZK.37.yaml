        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 34.23+,24.'
      marker-yv: yv-n
    - type: text
      text: 'David, mon serviteur, sera leur roi, et ils auront tous un seul berger. Ils suivront mes règles, ils observeront mes prescriptions et les mettront en pratique. '
  '25':
  - type: usfm
    marker: p
    children:
