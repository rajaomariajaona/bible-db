        - type: text
          text: 11.20+.
      marker-yv: yv-n
    - type: text
      text: 'Ils ne se rendront plus impurs avec leurs idoles, leurs horreurs et toutes leurs transgressions ; je les sauverai de tous les lieux d''habitation où ils ont péché, et je les purifierai ; ils seront mon peuple, et moi, je serai leur Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
