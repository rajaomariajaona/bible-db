document_id: JHN.15,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La vraie vigne
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la vraie vigne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le vrai cep
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 5.1-7 ; Jr 2.21 ; Ez 15.1-8 ; 19.10-14 ; Ps 80.9-20 ; Mt 20.1-16 ; 21.28-41/ / ; Lc 13.6-9 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.17 : « Comme une vigne j''ai (la Sagesse) produit des pousses gracieuses, et mes fleurs ont donné des fruits de gloire et de richesse. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le vigneron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cultivateur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 1Co 3.6-9 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '4 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.29 : « La raison (terme grec apparenté à celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Jn 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), cultivateur universel (terme grec apparenté à celui qui est traduit ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vigneron
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), émondant et taillant, liant, arrosant et transplantant de toutes manières, s'emploie à élever la substance des passions. »
      marker-yv: yv-n
    - type: text
      text: 'C''est moi qui suis la vraie vigne, et c''est mon Père qui est le vigneron. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: commandements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comme moi j''ai gardé… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.29 ; 14.31.
      marker-yv: yv-n
    - type: text
      text: Si vous gardez mes commandements, vous demeurerez dans mon amour, comme moi j'ai gardé les commandements de mon Père et je demeure dans son amour.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que votre joie soit complète '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.29 ; 16.20-24 ; 17.13 ; 1Jn 1.4 ; 2Jn 12 ; cf. Mt 25.21,23 ; Lc 1.14 ; 2.10 ; voir aussi Es 9.2 ; 35.10 ; 55.12 ; 65.18 ; So 3.14 ; Ps 126.3-5.
      marker-yv: yv-n
    - type: text
      text: Je vous ai parlé ainsi pour que ma joie soit en vous et que votre joie soit complète.
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.34+.
      marker-yv: yv-n
    - type: text
      text: 'Voici mon commandement : que vous vous aimiez les uns les autres comme je vous ai aimés. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 13.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se défait de sa vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Rm 5.6-8.'
      marker-yv: yv-n
    - type: text
      text: 'Personne n''a de plus grand amour que celui qui se défait de sa vie pour ses amis. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mes amis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 12.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si vous faites…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.31+ ; Mt 12.50.'
      marker-yv: yv-n
    - type: text
      text: 'Vous, vous êtes mes amis si vous faites ce que, moi, je vous commande. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 16.12. –  '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'esclave(s) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteur(s)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 20 ; 8.31-36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'amis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 33.11 ; Jc 2.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fait connaître
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe 17.26 ; Lc 2.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: révéler
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entendu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 3.11+ ; voir aussi 1.18.'
      marker-yv: yv-n
    - type: text
      text: 'Je ne vous appelle plus esclaves, parce que l''esclave ne sait pas ce que fait son maître. Je vous ai appelés amis, parce que je vous ai fait connaître tout ce que j''ai entendu de mon Père. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'choisis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.70+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'institués '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'investis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(d''une mission) : cf. Ac 13.47 ; 20.28 ; 1Co 12.28 ; 2Tm 1.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'portiez du fruit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que vous lui demanderez… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.13+. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ce n'est pas vous qui m'avez choisi, c'est moi qui vous ai choisis et institués pour que, vous, vous alliez, que vous portiez du fruit et que votre fruit demeure ; afin que le Père vous donne tout ce que vous lui demanderez en mon nom.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 13.34+.
      marker-yv: yv-n
    - type: text
      text: Ce que je vous commande, c'est que vous vous aimiez les uns les autres.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Haine du monde pour Jésus et ses disciples
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.7 ; 17.14 ; Mt 10.22+ ; 24.9/ / ; Lc 6.22 ; 1Th 2.15s ; 1Jn 3.13.
      marker-yv: yv-n
    - type: text
      text: 'Si le monde vous déteste, sachez qu''il m''a détesté avant vous. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: serait ami…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous aimerait comme siens.
      marker-yv: yv-n
    - type: text
      text: 'Si vous étiez du monde, le monde serait ami de ce qui lui est propre. Si le monde vous déteste, c''est parce que vous n''êtes pas du monde, alors que, moi, je vous ai choisis du milieu du monde. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tout sarment…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout sarment en moi qui ne porte pas de fruit ; tout sarment qui ne porte pas de fruit en moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.3s ; 4.36 ; 12.24 ; Mt 3.8-10/ / ; voir aussi Rm 1.13 ; 6.20-23 ; Ph 1.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il l'enlève
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 15.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il le purifie en le taillant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe grec évoque à la fois la taille de la vigne et la purification, cf. v. 3+.'
      marker-yv: yv-n
    - type: text
      text: 'Tout sarment qui, en moi, ne porte pas de fruit, il l''enlève ; tout sarment qui porte du fruit, il le purifie en le taillant, pour qu''il porte encore plus de fruit. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 1Th 1.6 ; 1P 4.12-19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gardé ma parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.51+.
      marker-yv: yv-n
    - type: text
      text: 'Souvenez-vous de la parole que, moi, je vous ai dite : L''esclave n''est pas plus grand que son maître. S''ils m''ont persécuté, ils vous persécuteront aussi ; s''ils ont gardé ma parole, ils garderont aussi la vôtre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à cause de mon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 5.11 ; 10.22+ ; Ac 5.40s ; Ap 2.3,13 ; 3.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parce qu''ils ne connaissent pas… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.28+ ; cf. 16.3.
      marker-yv: yv-n
    - type: text
      text: 'Mais tout cela, ils vous le feront à cause de mon nom, parce qu''ils ne connaissent pas celui qui m''a envoyé. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils n''auraient pas de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.41 ; cf. 8.21-24 ; 16.9 ; voir aussi Mt 12.31-32/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pas d'excuse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 1.20s.'
      marker-yv: yv-n
    - type: text
      text: 'Si je n''étais pas venu et si je ne leur avais pas parlé, ils n''auraient pas de péché. Maintenant, ils n''ont pas d''excuse pour leur péché. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 5.23 ; Lc 10.16 ; 1Jn 2.23.
      marker-yv: yv-n
    - type: text
      text: 'Celui qui me déteste déteste aussi mon Père. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les œuvres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.36+ ; 14.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que nul autre n'a faites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 7.31 ; 11.47. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ils ont vu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.36.
      marker-yv: yv-n
    - type: text
      text: 'Si je n''avais pas fait parmi eux les œuvres que nul autre n''a faites, ils n''auraient pas de péché. Maintenant ils ont vu, et ils ont détesté, et moi et mon Père. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '15.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Rm 3.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils m''ont détesté sans raison '
