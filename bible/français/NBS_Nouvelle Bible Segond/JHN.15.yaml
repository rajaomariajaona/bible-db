document_id: JHN.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vraie vigne
  - type: text
    content: ' '
  - type: note
    content: 'la vraie vigne ou le vrai cep  : cf. Es 5.1-7 ; Jr 2.21 ; Ez 15.1-8 ; 19.10-14 ; Ps 80.9-20 ; Mt 20.1-16 ; 21.28-41/ / ; Lc 13.6-9 ; Siracide 24.17 : « Comme une vigne j''ai (la Sagesse) produit des pousses gracieuses, et mes fleurs ont donné des fruits de gloire et de richesse. » –  le vigneron ou le cultivateur  ; cf. 1Co 3.6-9 ; 4 Maccabées 1.29 : « La raison (terme grec apparenté à celui qui est traduit par Parole en Jn 1.1n), cultivateur universel (terme grec apparenté à celui qui est traduit ici par vigneron ), émondant et taillant, liant, arrosant et transplantant de toutes manières, s''emploie à élever la substance des passions. »'
  - type: text
    content: 'C''est moi qui suis la vraie vigne, et c''est mon Père qui est le vigneron. '
  '10':
  - type: note
    content: '14.15+. –  commandements  : voir loi. –  comme moi j''ai gardé… 8.29 ; 14.31.'
  - type: text
    content: Si vous gardez mes commandements, vous demeurerez dans mon amour, comme moi j'ai gardé les commandements de mon Père et je demeure dans son amour.
  '11':
  - type: text
    content: ' '
  - type: note
    content: que votre joie soit complète 3.29 ; 16.20-24 ; 17.13 ; 1Jn 1.4 ; 2Jn 12 ; cf. Mt 25.21,23 ; Lc 1.14 ; 2.10 ; voir aussi Es 9.2 ; 35.10 ; 55.12 ; 65.18 ; So 3.14 ; Ps 126.3-5.
  - type: text
    content: Je vous ai parlé ainsi pour que ma joie soit en vous et que votre joie soit complète.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 13.34+.
  - type: text
    content: 'Voici mon commandement : que vous vous aimiez les uns les autres comme je vous ai aimés. '
  '13':
  - type: note
    content: Cf. 13.1n. –  se défait de sa vie 10.11n  ; cf. Rm 5.6-8.
  - type: text
    content: 'Personne n''a de plus grand amour que celui qui se défait de sa vie pour ses amis. '
  '14':
  - type: note
    content: 'mes amis Lc 12.4. –  si vous faites…  : cf. 8.31+ ; Mt 12.50.'
  - type: text
    content: 'Vous, vous êtes mes amis si vous faites ce que, moi, je vous commande. '
  '15':
  - type: note
    content: 'Cf. 16.12. –  esclave(s) ou serviteur(s)  ; cf. v. 20 ; 8.31-36. –  amis Ex 33.11 ; Jc 2.23. –  fait connaître  : même verbe 17.26 ; Lc 2.15n (révéler). –  entendu, cf. 3.11+ ; voir aussi 1.18.'
  - type: text
    content: 'Je ne vous appelle plus esclaves, parce que l''esclave ne sait pas ce que fait son maître. Je vous ai appelés amis, parce que je vous ai fait connaître tout ce que j''ai entendu de mon Père. '
  '16':
  - type: note
    content: 'choisis 6.70+. –  institués ou investis (d''une mission) : cf. Ac 13.47 ; 20.28 ; 1Co 12.28 ; 2Tm 1.11. –  portiez du fruit v. 2+. –  ce que vous lui demanderez… 14.13+. – Voir nom.'
  - type: text
    content: Ce n'est pas vous qui m'avez choisi, c'est moi qui vous ai choisis et institués pour que, vous, vous alliez, que vous portiez du fruit et que votre fruit demeure ; afin que le Père vous donne tout ce que vous lui demanderez en mon nom.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 13.34+.
  - type: text
    content: Ce que je vous commande, c'est que vous vous aimiez les uns les autres.
  - type: heading
    content: Haine du monde pour Jésus et ses disciples
  '18':
  - type: text
    content: ' '
  - type: note
    content: 7.7 ; 17.14 ; Mt 10.22+ ; 24.9/ / ; Lc 6.22 ; 1Th 2.15s ; 1Jn 3.13.
  - type: text
    content: 'Si le monde vous déteste, sachez qu''il m''a détesté avant vous. '
  '19':
  - type: note
    content: '8.23+. –  serait ami…  : c.-à-d. vous aimerait comme siens.'
  - type: text
    content: 'Si vous étiez du monde, le monde serait ami de ce qui lui est propre. Si le monde vous déteste, c''est parce que vous n''êtes pas du monde, alors que, moi, je vous ai choisis du milieu du monde. '
  '2':
  - type: note
    content: 'Tout sarment…  : autres traductions tout sarment en moi qui ne porte pas de fruit ; tout sarment qui ne porte pas de fruit en moi  ; cf. 1.3s ; 4.36 ; 12.24 ; Mt 3.8-10/ / ; voir aussi Rm 1.13 ; 6.20-23 ; Ph 1.22. –  il l''enlève  : cf. Mt 15.13. –  il le purifie en le taillant  : le verbe grec évoque à la fois la taille de la vigne et la purification, cf. v. 3+.'
  - type: text
    content: 'Tout sarment qui, en moi, ne porte pas de fruit, il l''enlève ; tout sarment qui porte du fruit, il le purifie en le taillant, pour qu''il porte encore plus de fruit. '
  '20':
  - type: note
    content: 13.16n  ; cf. 1Th 1.6 ; 1P 4.12-19. –  gardé ma parole 8.51+.
  - type: text
    content: 'Souvenez-vous de la parole que, moi, je vous ai dite : L''esclave n''est pas plus grand que son maître. S''ils m''ont persécuté, ils vous persécuteront aussi ; s''ils ont gardé ma parole, ils garderont aussi la vôtre. '
  '21':
  - type: note
    content: 'à cause de mon nom  : cf. 1.12n  ; Mt 5.11 ; 10.22+ ; Ac 5.40s ; Ap 2.3,13 ; 3.8. –  parce qu''ils ne connaissent pas… 7.28+ ; cf. 16.3.'
  - type: text
    content: 'Mais tout cela, ils vous le feront à cause de mon nom, parce qu''ils ne connaissent pas celui qui m''a envoyé. '
  '22':
  - type: note
    content: 'ils n''auraient pas de péché 9.41 ; cf. 8.21-24 ; 16.9 ; voir aussi Mt 12.31-32/ /. –  pas d''excuse  : cf. Rm 1.20s.'
  - type: text
    content: 'Si je n''étais pas venu et si je ne leur avais pas parlé, ils n''auraient pas de péché. Maintenant, ils n''ont pas d''excuse pour leur péché. '
  '23':
  - type: note
    content: Cf. 5.23 ; Lc 10.16 ; 1Jn 2.23.
  - type: text
    content: 'Celui qui me déteste déteste aussi mon Père. '
  '24':
  - type: note
    content: 'les œuvres  : cf. 5.36+ ; 14.11. –  que nul autre n''a faites  : cf. 7.31 ; 11.47. –  ils ont vu 6.36.'
  - type: text
    content: 'Si je n''avais pas fait parmi eux les œuvres que nul autre n''a faites, ils n''auraient pas de péché. Maintenant ils ont vu, et ils ont détesté, et moi et mon Père. '
  '25':
  - type: note
    content: leur loi 10.34n  ; cf. Rm 3.19. –  Ils m'ont détesté sans raison (litt. gratuitement, c.-à-d. pour rien) Ps 35.19 ; 69.5.
  - type: text
    content: 'Mais c''est pour que soit accomplie cette parole, écrite dans leur loi : '
  - type: text
    content: Ils m'ont détesté sans raison
  - type: text
    content: .
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Défenseur 14.16n. –  que, moi, je vous enverrai 16.7 ; 1Jn 3.24 ; 4.13 ; cf. Mc 1.8 ; Lc 24.49 ; Ac 2.33. –  du Père  : autres traductions d''auprès du Père ; de la part du Père  ; la même formule est traduite dans la suite par qui provient du Père . –  l''Esprit de la vérité 14.17+ ; cf. 1Jn 5.6. –  provient du Père 14.26+.'
  - type: text
    content: 'Quand viendra le Défenseur, celui que, moi, je vous enverrai du Père, l''Esprit de la vérité, qui provient du Père, c''est lui qui me rendra témoignage ; '
  '27':
  - type: note
    content: vous rendrez témoignage 19.35 ; 21.24 ; cf. Lc 1.2 ; Ac 1.8,21s ; 5.32 ; 1Jn 4.14.
  - type: text
    content: et vous aussi, vous rendrez témoignage, parce que vous êtes avec moi depuis le commencement.
  '3':
  - type: note
    content: 'vous êtes déjà purs  : cf. v. 2n  ; 2.6+ ; 13.10 ; Ac 15.9.'
  - type: text
    content: 'Vous, vous êtes déjà purs, à cause de la parole que je vous ai dite. '
  '4':
  - type: note
    content: 'Demeurez en moi… 6.56+ ; cf. 15.7,9s ; 1Jn 2.10,27 ; 3.9-15 ; 4.12-16 ; voir aussi Rm 12.4s ; 1Co 12.12,27. –  ne peut de lui-même…  : cf. Rm 11.17s ; 2Co 3.5+ ; Ph 2.13.'
  - type: text
    content: 'Demeurez en moi, comme moi en vous. Tout comme le sarment ne peut de lui-même porter du fruit, s''il ne demeure dans la vigne, vous non plus, si vous ne demeurez en moi. '
  '5':
  - type: note
    content: C'est moi qui suis… 6.35+. –  hors de moi ou sans moi  ; cf. 1.3 ; 6.63 ; voir aussi Mt 15.13n.
  - type: text
    content: 'C''est moi qui suis la vigne ; vous, vous êtes les sarments. Celui qui demeure en moi, comme moi en lui, celui-là porte beaucoup de fruit ; hors de moi, en effet, vous ne pouvez rien faire. '
  '6':
  - type: note
    content: 'Cf. Ez 15.1-8 ; Mt 3.10+/ /. –  jeté dehors  : cf. 12.31+. –  on ramasse les sarments  : litt. on les ramasse  ; certains mss portent on le ramasse (le sarment), on le jette…'
  - type: text
    content: 'Si quelqu''un ne demeure pas en moi, il est jeté dehors comme le sarment et il se dessèche ; on ramasse les sarments, on les jette au feu et ils brûlent. '
  '7':
  - type: note
    content: 'demeurez en moi v. 4+. –  mes paroles  : cf. 8.31+. –  demandez…  : cf. 14.13+.'
  - type: text
    content: 'Si vous demeurez en moi et que mes paroles demeurent en vous, demandez tout ce que vous voudrez, et cela vous arrivera. '
  '8':
  - type: note
    content: 'Mon Père est glorifié…  : autre traduction en cela (v. 7) mon Père est glorifié, pour que vous portiez…  ; 13.31+ ; cf. Mt 5.16+ ; Ph 1.11. –  que vous soyez  : autre traduction que vous deveniez  ; certains mss portent vous serez (ou vous deviendrez) ; cf. 13.35.'
  - type: text
    content: 'Mon Père est glorifié en ceci : que vous portiez beaucoup de fruit et que vous soyez mes disciples.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'le Père m''a aimé 3.35+. –  je vous ai aimés 13.1+. –  Demeurez dans mon amour  : cf. Sagesse 3.9 : « Ceux qui se confient en lui (Dieu) comprendront la vérité, ceux qui restent fermes dans l''amour demeureront auprès de lui. » Odes de Salomon 8.22 : « Faites mainte requête, demeurez en la tendresse du Seigneur, bien-aimés dans le Bien-aimé, vous qui êtes gardés en celui qui est vivant, sauvés en celui qui fut sauvé. »'
  - type: text
    content: 'Comme le Père m''a aimé, moi aussi, je vous ai aimés. Demeurez dans mon amour. '
