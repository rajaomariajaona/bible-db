document_id: EST.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mardochée demande à Esther d'intervenir
  - type: text
    content: ' '
  - type: note
    content: 'il déchira…  : litt. Mardochée déchira…  ; signes de deuil, de tristesse ou de pénitence ; cf. v. 3 ; Gn 37.29,34 ; Jos 7.6 ; 2S 12.16,19-21 ; 13.19 ; Es 58.5 ; Jr 6.26 ; Dn 9.3 ; Lc 10.13. –  grands cris amers Gn 27.34.'
  - type: text
    content: 'Lorsque Mardochée eut connaissance de tout ce qui se faisait, il déchira ses vêtements et prit le sac et la cendre pour aller dans la ville. Il poussait de grands cris amers. '
  '10':
  - type: note
    content: 'de le rapporter  : sous-entendu dans le texte.'
  - type: text
    content: 'Esther dit à Hathak, en lui ordonnant de le rapporter à Mardochée : '
  '11':
  - type: note
    content: Cf. 1.14n  ; 2.14 ; 5.1s ; 8.4.
  - type: text
    content: 'Tous les gens de la cour du roi, ainsi que le peuple de toutes les provinces royales, savent que quiconque, homme ou femme, se présente au roi dans la cour intérieure sans avoir été convoqué est mis à mort en vertu d''une loi, la même pour tous ; seul peut rester en vie celui à qui le roi tend son sceptre d''or. Or moi, voilà trente jours que je n''ai plus été invitée à venir chez le roi. '
  '12':
  - type: text
    content: On rapporta à Mardochée les paroles d'Esther.
  '13':
  - type: text
    content: ' '
  - type: note
    content: parce que tu fais partie de la maison du roi ou parce que tu es dans la maison du roi.
  - type: text
    content: 'Mardochée fit répondre à Esther : Ne t''imagine pas que tu échapperas seule d''entre tous les Juifs parce que tu fais partie de la maison du roi. '
  '14':
  - type: note
    content: 'pour une occasion…  : cf. Gn 45.7 ; 50.20.'
  - type: text
    content: 'Si tu ne dis rien en cette occasion, le soulagement et la libération des Juifs surgiront d''un autre côté, alors que, toi et ta famille, vous disparaîtrez. D''ailleurs, qui sait si ce n''est pas pour une occasion comme celle-ci que tu es parvenue à la royauté ? '
  '15':
  - type: text
    content: 'Esther fit répondre à Mardochée : '
  '16':
  - type: note
    content: 'Jeûnez Jon 3.3,6-9 ; Esd 8.21 ; 2Ch 20.3 ; Mt 17.21 ; 18.19. –  ni la nuit ni le jour  : cf. 2S 1.12 ; 3.35 ; Dn 10.2s ; 2 Maccabées 13.12 : « (Les Juifs menacés par Antiochos V ont)… imploré le Seigneur miséricordieux avec des larmes et des jeûnes, prosternés pendant trois jours sans interruption. » –  Si je dois disparaître…  : cf. Ps 37.5 ; Pr 21.1 ; Dn 3.17 ; Mt 16.25 ; 1Jn 3.16.'
  - type: text
    content: 'Va rassembler tous les Juifs qui se trouvent à Suse. Jeûnez pour moi, sans manger ni boire, ni la nuit ni le jour, pendant trois jours. Moi aussi je jeûnerai de même avec mes servantes. Sur quoi j''irai chez le roi, malgré la loi. Si je dois disparaître, je disparaîtrai ! '
  '17':
  - type: note
    content: 's''en alla  : litt. passa  ; certains comprennent traversa le fleuve qui séparait la ville haute de la ville basse, 1.2n.'
  - type: text
    content: Mardochée s'en alla pour faire exactement ce qu'Esther lui avait ordonné.
  '2':
  - type: note
    content: 'porte du Roi 2.19n. –  impossible d''accéder…  : cf. Gn 50.4.'
  - type: text
    content: Il parvint ainsi jusqu'en face de la porte du Roi ; car il était impossible d'accéder à la porte du Roi revêtu d'un sac.
  '3':
  - type: text
    content: ' '
  - type: note
    content: V. 1+ ; 3.15 ; cf. 9.31. Certains pensent que ce v. se trouvait à l'origine à la fin du chap. 3.
  - type: text
    content: Dans chaque province, partout où parvenaient l'ordre et l'édit du roi, il y eut grand deuil chez les Juifs, jeûnes, pleurs et lamentations ; beaucoup se couchaient sur le sac et la cendre.
  '4':
  - type: text
    content: ' '
  - type: note
    content: servantes 2.9n. –  eunuques 1.10n. –  vêtements v. 1ns.
  - type: text
    content: 'Les servantes d''Esther et ses eunuques vinrent le lui dire ; la reine en fut toute bouleversée. Elle envoya des vêtements à Mardochée pour qu''il les mette à la place du sac qu''il portait. Mais il n''accepta pas. '
  '5':
  - type: note
    content: 'avait mis à son service  : litt. avait fait se tenir devant elle.'
  - type: text
    content: 'Alors Esther appela Hathak, l''un des eunuques que le roi avait mis à son service. Elle lui donna des ordres au sujet de Mardochée, pour savoir de quoi il s''agissait et quelle en était la raison. '
  '6':
  - type: note
    content: Ce v. est absent de LXX.
  - type: text
    content: 'Hathak sortit vers Mardochée sur la place de la ville qui est en face de la porte du Roi. '
  '7':
  - type: note
    content: 3.9.
  - type: text
    content: 'Mardochée lui dit tout ce qui arrivait, ainsi que le détail de l''argent que Haman avait promis de peser dans les coffres du roi pour qu''on fasse disparaître les Juifs. '
  '8':
  - type: note
    content: 3.15. –  en faveur de son peuple 7.3 ; cf. 5.2.
  - type: text
    content: 'Il lui donna aussi une copie de l''écrit signifiant l''édit de destruction qui avait été publié à Suse, pour qu''il la montre à Esther ; il devait lui faire un rapport et lui ordonner d''aller chez le roi pour le supplier et l''implorer en faveur de son peuple. '
  '9':
  - type: text
    content: 'Hathak vint rapporter à Esther les paroles de Mardochée. '
