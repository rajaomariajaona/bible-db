document_id: EST.4,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mardochée demande à Esther d'intervenir
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il déchira…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mardochée déchira…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; signes de deuil, de tristesse ou de pénitence ; cf. v. 3 ; Gn 37.29,34 ; Jos 7.6 ; 2S 12.16,19-21 ; 13.19 ; Es 58.5 ; Jr 6.26 ; Dn 9.3 ; Lc 10.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grands cris amers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 27.34.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Mardochée eut connaissance de tout ce qui se faisait, il déchira ses vêtements et prit le sac et la cendre pour aller dans la ville. Il poussait de grands cris amers. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de le rapporter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: 'Esther dit à Hathak, en lui ordonnant de le rapporter à Mardochée : '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.14 ; 5.1s ; 8.4.'
      marker-yv: yv-n
    - type: text
      text: 'Tous les gens de la cour du roi, ainsi que le peuple de toutes les provinces royales, savent que quiconque, homme ou femme, se présente au roi dans la cour intérieure sans avoir été convoqué est mis à mort en vertu d''une loi, la même pour tous ; seul peut rester en vie celui à qui le roi tend son sceptre d''or. Or moi, voilà trente jours que je n''ai plus été invitée à venir chez le roi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: On rapporta à Mardochée les paroles d'Esther.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parce que tu fais partie de la maison du roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parce que tu es dans la maison du roi.
      marker-yv: yv-n
    - type: text
      text: 'Mardochée fit répondre à Esther : Ne t''imagine pas que tu échapperas seule d''entre tous les Juifs parce que tu fais partie de la maison du roi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour une occasion…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 45.7 ; 50.20.'
      marker-yv: yv-n
    - type: text
      text: 'Si tu ne dis rien en cette occasion, le soulagement et la libération des Juifs surgiront d''un autre côté, alors que, toi et ta famille, vous disparaîtrez. D''ailleurs, qui sait si ce n''est pas pour une occasion comme celle-ci que tu es parvenue à la royauté ? '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Esther fit répondre à Mardochée : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jeûnez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jon 3.3,6-9 ; Esd 8.21 ; 2Ch 20.3 ; Mt 17.21 ; 18.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ni la nuit ni le jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 1.12 ; 3.35 ; Dn 10.2s ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.12 : « (Les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' menacés par Antiochos V ont)… imploré le Seigneur miséricordieux avec des larmes et des jeûnes, prosternés pendant trois jours sans interruption. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Si je dois disparaître…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ps 37.5 ; Pr 21.1 ; Dn 3.17 ; Mt 16.25 ; 1Jn 3.16.'
      marker-yv: yv-n
    - type: text
      text: 'Va rassembler tous les Juifs qui se trouvent à Suse. Jeûnez pour moi, sans manger ni boire, ni la nuit ni le jour, pendant trois jours. Moi aussi je jeûnerai de même avec mes servantes. Sur quoi j''irai chez le roi, malgré la loi. Si je dois disparaître, je disparaîtrai ! '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'en alla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: passa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'traversa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: le fleuve qui séparait la ville haute de la ville basse, 1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Mardochée s'en alla pour faire exactement ce qu'Esther lui avait ordonné.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte du Roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: impossible d'accéder…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 50.4.'
      marker-yv: yv-n
    - type: text
      text: Il parvint ainsi jusqu'en face de la porte du Roi ; car il était impossible d'accéder à la porte du Roi revêtu d'un sac.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 1+ ; 3.15 ; cf. 9.31. Certains pensent que ce v. se trouvait à l'origine à la fin du chap. 3.
      marker-yv: yv-n
    - type: text
      text: Dans chaque province, partout où parvenaient l'ordre et l'édit du roi, il y eut grand deuil chez les Juifs, jeûnes, pleurs et lamentations ; beaucoup se couchaient sur le sac et la cendre.
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'servantes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'eunuques '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vêtements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'Les servantes d''Esther et ses eunuques vinrent le lui dire ; la reine en fut toute bouleversée. Elle envoya des vêtements à Mardochée pour qu''il les mette à la place du sac qu''il portait. Mais il n''accepta pas. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait mis à son service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avait fait se tenir devant elle.
      marker-yv: yv-n
    - type: text
      text: 'Alors Esther appela Hathak, l''un des eunuques que le roi avait mis à son service. Elle lui donna des ordres au sujet de Mardochée, pour savoir de quoi il s''agissait et quelle en était la raison. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ce v. est absent de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Hathak sortit vers Mardochée sur la place de la ville qui est en face de la porte du Roi. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.9.
      marker-yv: yv-n
    - type: text
      text: 'Mardochée lui dit tout ce qui arrivait, ainsi que le détail de l''argent que Haman avait promis de peser dans les coffres du roi pour qu''on fasse disparaître les Juifs. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '4.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en faveur de son peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.3 ; cf. 5.2.
      marker-yv: yv-n
    - type: text
      text: 'Il lui donna aussi une copie de l''écrit signifiant l''édit de destruction qui avait été publié à Suse, pour qu''il la montre à Esther ; il devait lui faire un rapport et lui ordonner d''aller chez le roi pour le supplier et l''implorer en faveur de son peuple. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Hathak vint rapporter à Esther les paroles de Mardochée. '
