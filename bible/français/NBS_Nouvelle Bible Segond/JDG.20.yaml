      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), en Benjamin, à 13 km au nord de Jérusalem ; 20.3 ; 21.1,5 ; 1S 7.5-7 ; 10.17 ; Os 5.1
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '2 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Maccabées
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.46 : « Ils se rassemblèrent et vinrent à Maspha (= Mitspa), en face de Jérusalem, car il y avait eu jadis à Maspha un lieu de prière pour Israël. »'
    marker-yv: yv-n
  - type: text
    text: 'Tous les Israélites se mirent en campagne ; la communauté se rassembla comme un seul homme, depuis Dan jusqu''à Bersabée et le Galaad, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', au Mitspa. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les chefs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les angles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; au sens concret, le terme peut désigner une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pierre angulaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'dans une construction ou une '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tour d''angle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans une fortification ; on retrouve un sens métaphorique comparable en 1S 14.38 ; Es 19.13 ; cf. So 1.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Za 10.4 ; 2Ch 26.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: quatre cent mille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 16ss.'
    marker-yv: yv-n
  - type: text
    text: 'Les chefs de tout le peuple, de toutes les tribus d''Israël, se tenaient debout dans l''assemblée du peuple de Dieu : quatre cent mille fantassins tirant l''épée. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les Israélites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' d''Israël'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; expression courante, mais comparable ici à celle qui est traduite par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fils de Benjamin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 32.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Benjamin apprirent que les Israélites étaient montés au Mitspa. Les Israélites dirent : Parlez. Comment ce malheur est-il arrivé ? '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 19.12-30.
    marker-yv: yv-n
  - type: text
    text: 'Alors le lévite, le mari de la femme qui avait été assassinée, dit : J''étais arrivé, avec ma concubine, à Guibéa de Benjamin pour y passer la nuit. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Les notables de Guibéa se sont dressés contre moi et ont entouré pendant la nuit la maison où j''étais. C''est moi qu''ils avaient l''intention de tuer, mais c''est de ma concubine qu''ils ont abusé, et elle en est morte. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le territoire…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le champ du patrimoine d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'folie en Israël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '19.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Gn 34.7.'
    marker-yv: yv-n
  - type: text
    text: 'J''ai saisi ma concubine, je l''ai découpée en morceaux et je l''ai envoyée ainsi dans tout le territoire qui constitue le patrimoine d''Israël ; car ils avaient commis une infamie et une folie en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: Vous êtes tous là, Israélites ; tenez conseil et prenez ici une décision !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 21.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comme un seul homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne se retirera dans
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne fera un détour par.
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple se leva comme un seul homme en disant : Aucun d''entre nous n''ira dans sa tente, personne ne se retirera dans sa maison. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Nous marcherons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe correspondant est sous-entendu en hébreu ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous monterons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''après le sort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici maintenant ce que nous allons faire à Guibéa : Nous marcherons contre elle d''après le sort. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à leur retour…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte et traduction incertains ; autre possibilité '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour qu'ils aillent traiter Guibéa…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ou, d''après certains mss de LXX, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour ceux qui iront traiter Guibéa… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guibéa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la plupart des mss hébreux portent ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Guéba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même au v. 33.'
    marker-yv: yv-n
  - type: text
    text: 'Nous prendrons dans toutes les tribus d''Israël dix hommes sur cent, cent sur mille, mille sur dix mille ; ils iront chercher des vivres pour le peuple, afin qu''à leur retour Guibéa de Benjamin ait été traitée à la pleine mesure de la folie qu''elle a commise en Israël. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu est au singulier (collectif, ici litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tout homme d'Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; de même dans la suite ; cf. Jos 9.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comme un seul homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 1+.
    marker-yv: yv-n
  - type: text
    text: Ainsi tous les hommes d'Israël se rassemblèrent contre la ville, unis comme un seul homme.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dans toutes les tribus de Benjamin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme correspondant à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tribu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'semble désigner ici une subdivision de la tribu, comme le terme habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'clan '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 18.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans toute la tribu de Benjamin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 1S 9.21.
    marker-yv: yv-n
  - type: text
    text: 'Les tribus d''Israël envoyèrent des hommes dans toutes les tribus de Benjamin, pour dire : Quel est ce malheur qui est arrivé parmi vous ? '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'hommes sans morale '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 19.22 ; Dt 13.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Jg 20.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'que nous éliminions… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 13.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leurs frères, les Israélites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leurs frères israélites.
    marker-yv: yv-n
  - type: text
    text: Livrez maintenant les hommes sans morale qui sont à Guibéa, afin que nous les mettions à mort et que nous éliminions d'Israël ce qui est mauvais. Mais les fils de Benjamin ne voulurent pas écouter leurs frères, les Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Les fils de Benjamin sortirent de leurs villes et se rassemblèrent à Guibéa pour faire la guerre aux Israélites. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt-six mille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 35,46 ; les chiffres varient dans les versions anciennes ; LXX donne 23 000 ou 25 000 selon les mss.'
    marker-yv: yv-n
  - type: text
    text: 'On recensa ce jour-là les fils de Benjamin venus des villes : vingt-six mille hommes tirant l''épée, sans compter les habitants de Guibéa qui furent recensés : sept cents hommes d''élite. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gauchers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le manquer
    - type: usfm
      marker: ft
      children:
      - type: text
