      marker: fqa
      children:
      - type: text
        text: eux.
    marker-yv: yv-n
  - type: text
    text: 'Dix mille hommes d''élite de tout Israël arrivèrent en face de Guibéa. Le combat fut rude, et les Benjaminites ne se doutaient pas que le malheur allait les atteindre. '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.35 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 44-46. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: battit…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fit battre Benjamin par Israël ; frappa Benjamin d'un fléau devant Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 32.'
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' battit Benjamin devant Israël ; les Israélites abattirent ce jour-là vingt-cinq mille cent hommes de Benjamin, tous des hommes tirant l''épée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '36'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se virent battus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 32) : certains comprennent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'crurent que les hommes d''Israël étaient battus parce qu''ils cédaient du terrain… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. v. 39) ; le récit semble revenir sur le déroulement de la bataille, cf. v. 29ss.
    marker-yv: yv-n
  - type: text
    text: 'Les fils de Benjamin se virent battus, alors que les hommes d''Israël cédaient du terrain à Benjamin, car ils comptaient sur l''embuscade qu''ils avaient placée contre Guibéa. '
  - type: usfm
    marker: v
    metadata:
      v: '37'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '37'
  - type: text
    text: 'Les gens placés en embuscade se déployèrent vite sur Guibéa, ils se portèrent en avant et passèrent toute la ville au fil de l''épée. '
  - type: usfm
    marker: v
    metadata:
      v: '38'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '38'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.38 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 40 ; Jos 8.20.
    marker-yv: yv-n
  - type: text
    text: 'Suivant un signal convenu avec les hommes d''Israël, les hommes de l''embuscade devaient faire monter de la ville une épaisse fumée. '
  - type: usfm
    marker: v
    metadata:
      v: '39'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '39'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.39 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'volte-face '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jos 8.21.
    marker-yv: yv-n
  - type: text
    text: 'Les hommes d''Israël firent alors volte-face dans la bataille. Benjamin avait déjà tué une trentaine des hommes d''Israël. Ils se disaient : A coup sûr, nous les battons comme dans le premier combat ! '
  - type: usfm
    marker: v
    metadata:
      v: '40'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '40'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.40 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de toute la ville…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la ville entière montait vers le ciel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le terme hébreu correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'entière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rappelle l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'offrande entière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Lv 6.15s ; Dt 33.10), comme le verbe correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'monter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: rappelle l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'holocauste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Lv 1.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Cependant une colonne de fumée épaisse commençait à s''élever de la ville. Benjamin se retourna : de toute la ville des flammes s''élevaient vers le ciel ! '
  - type: usfm
    marker: v
    metadata:
      v: '41'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '41'
  - type: text
    text: 'Les hommes d''Israël avaient fait volte-face ; les hommes de Benjamin furent saisis d''épouvante quand ils virent que le malheur les avait atteints. '
  - type: usfm
    marker: v
    metadata:
      v: '42'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '42'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.42 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils prirent la fuite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils se retournèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ceux qui venaient des villes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de la ville '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il pourrait s''agir de l''embuscade du v. 29 (cf. v. 33) ; quelques-uns pensent qu''il s''agit des Benjaminites des v. 14s ; cf. Jos 8.22.'
    marker-yv: yv-n
  - type: text
    text: 'Ils prirent la fuite devant les hommes d''Israël, vers le chemin du désert. Mais la bataille ne les lâchait pas et ceux qui venaient des villes les tuaient, puisqu''ils étaient au milieu d''eux. '
  - type: usfm
    marker: v
    metadata:
      v: '43'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '43'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.43 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le poursuivirent sans répit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : traduction incertaine d''un texte hébreu obscur, litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le poursuivirent repos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre possibilité '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le poursuivirent jusque dans son lieu de repos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un ms de LXX a lu ici un nom de lieu ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de Noua jusqu'en face…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Ils cernèrent Benjamin, le poursuivirent sans répit et l''écrasèrent jusqu''en face de Guibéa, du côté du soleil levant. '
  - type: usfm
    marker: v
    metadata:
      v: '44'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '44'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.44 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 46.
    marker-yv: yv-n
  - type: text
    text: 'Il tomba dix-huit mille hommes de Benjamin – c''étaient tous des hommes vaillants. '
  - type: usfm
    marker: v
    metadata:
      v: '45'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '45'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.45 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'V. 47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'enfuirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se tournèrent et fuirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 47 ; cf. v. 42'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vers le rocher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression sera traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'au rocher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au v. 47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rimmôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à l''est de Beth-El. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rattrapa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: grappilla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jusqu'à Guidéom
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : nom de lieu inconnu ; une légère modification de la vocalisation traditionnelle permettrait de lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à les retrancher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 21.6.'
    marker-yv: yv-n
  - type: text
    text: 'Parmi ceux qui s''enfuirent au désert, vers le rocher de Rimmôn, on en rattrapa cinq mille sur les routes ; on les poursuivit jusqu''à Guidéom, et on en tua deux mille. '
  - type: usfm
    marker: v
    metadata:
      v: '46'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.46 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vingt-cinq mille hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : total des chiffres des v. 44s (cf. v. 35).'
    marker-yv: yv-n
  - type: text
    text: 'Le total des Benjaminites qui tombèrent ce jour-là fut de vingt-cinq mille hommes tirant l''épée – c''étaient tous des hommes vaillants. '
  - type: usfm
    marker: v
    metadata:
      v: '47'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 45
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 21.13.'
    marker-yv: yv-n
  - type: text
    text: 'Six cents hommes s''enfuirent au désert, au rocher de Rimmôn, et ils restèrent là pendant quatre mois. '
  - type: usfm
    marker: v
    metadata:
      v: '48'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '48'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '20.48 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la ville dans sa totalité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les villes dans leur totalité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ou encore '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les hommes de la ville '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des villes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la ville des hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), si l'on adopte la vocalisation de l'expression presque identique qui apparaît en Dt 2.34 ; 3.6. Ici la vocalisation du texte hébreu traditionnel est différente ; cf. Dt 13.13-17.
    marker-yv: yv-n
  - type: text
    text: Les hommes d'Israël revinrent vers les fils de Benjamin et les passèrent au fil de l'épée, depuis la ville dans sa totalité jusqu'aux bêtes, et tout ce que l'on trouva. Ils mirent aussi le feu à toutes les villes qu'ils trouvèrent.
