    text: 'Les fils de Benjamin sortirent à la rencontre du peuple et se laissèrent attirer loin de la ville. Ils commencèrent à faire des victimes parmi le peuple comme les autres fois, sur les routes qui montent, l''une à Beth-El et l''autre à Guibéa par la campagne : environ trente hommes d''Israël. '
