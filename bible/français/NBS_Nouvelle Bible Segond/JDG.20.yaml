document_id: JDG.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Guerre punitive contre Benjamin
  - type: text
    content: ' '
  - type: note
    content: 'se mirent en campagne 2.15n. –  la communauté se rassembla  : l''expression s''applique d''ordinaire à l’ assemblée cultuelle (v. 2 ; 21.5,8) ; cf. 21.10 ; Ex 12.3 ; 16.1 ; 35.1 ; Lv 4.13 ; 8.3-5 ; 16.5 ; 19.2 ; Nb 1.18 ; 16.9 ; 27.17 ; 31.16 ; 32.4 ; Jos 9.18 ; 22.18. –  comme un seul homme v. 8,11n  ; cf. 6.16. –  depuis Dan jusqu''à Bersabée  : de l''extrémité nord (18.29) à l''extrémité sud (Gn 21.14n) du territoire d''Israël, expression consacrée pour tout Israël (1S 3.20 ; 2S 3.10 ; 17.11 ; 24.2,15). –  le Galaad , en Transjordanie du Nord, 10.8+. –  au Mitspa (10.17n), en Benjamin, à 13 km au nord de Jérusalem ; 20.3 ; 21.1,5 ; 1S 7.5-7 ; 10.17 ; Os 5.1n  ; cf. 2 Maccabées 3.46 : « Ils se rassemblèrent et vinrent à Maspha (= Mitspa), en face de Jérusalem, car il y avait eu jadis à Maspha un lieu de prière pour Israël. »'
  - type: text
    content: 'Tous les Israélites se mirent en campagne ; la communauté se rassembla comme un seul homme, depuis Dan jusqu''à Bersabée et le Galaad, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', au Mitspa. '
  '10':
  - type: note
    content: 'à leur retour…  : texte et traduction incertains ; autre possibilité pour qu''ils aillent traiter Guibéa…  ; ou, d''après certains mss de LXX, pour ceux qui iront traiter Guibéa… –  Guibéa  : la plupart des mss hébreux portent ici Guéba, de même au v. 33.'
  - type: text
    content: 'Nous prendrons dans toutes les tribus d''Israël dix hommes sur cent, cent sur mille, mille sur dix mille ; ils iront chercher des vivres pour le peuple, afin qu''à leur retour Guibéa de Benjamin ait été traitée à la pleine mesure de la folie qu''elle a commise en Israël. '
  '11':
  - type: note
    content: 'les hommes  : le terme hébreu est au singulier (collectif, ici litt. tout homme d''Israël) ; de même dans la suite ; cf. Jos 9.6n. –  comme un seul homme v. 1+.'
  - type: text
    content: Ainsi tous les hommes d'Israël se rassemblèrent contre la ville, unis comme un seul homme.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'dans toutes les tribus de Benjamin  : le terme correspondant à tribu semble désigner ici une subdivision de la tribu, comme le terme habituellement traduit par clan (cf. 18.2n) ; certains modifient le texte hébreu traditionnel pour lire dans toute la tribu de Benjamin  ; cf. 1S 9.21.'
  - type: text
    content: 'Les tribus d''Israël envoyèrent des hommes dans toutes les tribus de Benjamin, pour dire : Quel est ce malheur qui est arrivé parmi vous ? '
  '13':
  - type: note
    content: 'hommes sans morale 19.22 ; Dt 13.14n  ; cf. Jg 20.5. –  que nous éliminions… Dt 13.6n. –  leurs frères, les Israélites  : autre traduction leurs frères israélites.'
  - type: text
    content: Livrez maintenant les hommes sans morale qui sont à Guibéa, afin que nous les mettions à mort et que nous éliminions d'Israël ce qui est mauvais. Mais les fils de Benjamin ne voulurent pas écouter leurs frères, les Israélites.
  '14':
  - type: text
    content: 'Les fils de Benjamin sortirent de leurs villes et se rassemblèrent à Guibéa pour faire la guerre aux Israélites. '
  '15':
  - type: note
    content: 'vingt-six mille  : cf. v. 35,46 ; les chiffres varient dans les versions anciennes ; LXX donne 23 000 ou 25 000 selon les mss.'
  - type: text
    content: 'On recensa ce jour-là les fils de Benjamin venus des villes : vingt-six mille hommes tirant l''épée, sans compter les habitants de Guibéa qui furent recensés : sept cents hommes d''élite. '
  '16':
  - type: note
    content: 'gauchers  : cf. 3.15n. –  le manquer  : le verbe correspondant est souvent traduit par pécher  ; cf. Pr 8.35-36n.'
  - type: text
    content: 'Parmi tout ce peuple, il y avait sept cents hommes d''élite, gauchers ; tous ceux-là pouvaient, en lançant une pierre avec la fronde, viser un cheveu sans le manquer. '
  '17':
  - type: text
    content: 'On recensa aussi les hommes d''Israël, sans compter ceux de Benjamin : quatre cent mille hommes tirant l''épée, tous des hommes de guerre. '
  '18':
  - type: note
    content: à Beth-El v. 26-28 ; 1.22 ; 21.2-4 ; cf. Gn 12.8 ; 28.10-22 ; 31.13 ; 35.1-15 ; 1R 12.28-33 ; 2R 23.15-18 ; Os 10.15 ; Am 3.14 ; 4.4 ; 5.5s ; Vg a traduit à la maison de Dieu (= Beth-El, cf. Gn 21.33n  ; 28.19n) qui est à Silo, sans doute à cause de la mention du coffre de l'alliance au v. 27n. –  interrogèrent Dieu 1.1+ ; cf. 20.23,27. –  Juda 1.2.
  - type: text
    content: 'Les Israélites montèrent à Beth-El et interrogèrent Dieu : Qui de nous ira le premier faire la guerre aux fils de Benjamin ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit : C''est Juda qui ira le premier.'
  '19':
  - type: text
    content: 'Au matin, les Israélites dressèrent leur camp contre Guibéa. '
  '2':
  - type: note
    content: 'Les chefs  : litt. les angles  ; au sens concret, le terme peut désigner une pierre angulaire dans une construction ou une tour d''angle dans une fortification ; on retrouve un sens métaphorique comparable en 1S 14.38 ; Es 19.13 ; cf. So 1.16n  ; Za 10.4 ; 2Ch 26.15. –  quatre cent mille  : cf. v. 16ss.'
  - type: text
    content: 'Les chefs de tout le peuple, de toutes les tribus d''Israël, se tenaient debout dans l''assemblée du peuple de Dieu : quatre cent mille fantassins tirant l''épée. '
  '20':
  - type: note
    content: 'firent la guerre  : litt. sortirent (2.15n) pour la guerre (le même mot est traduit plus loin par bataille).'
  - type: text
    content: 'Les hommes d''Israël firent la guerre à Benjamin ; les hommes d''Israël se rangèrent en ordre de bataille contre eux devant Guibéa. '
  '21':
  - type: text
    content: 'Les fils de Benjamin sortirent de Guibéa et abattirent sur le terrain, ce jour-là, vingt-deux mille hommes d''Israël. '
  '22':
  - type: note
    content: 'Certains commentateurs intervertissent les v. 22 et 23. –  reprirent courage  : autres traductions reprirent des forces ; se montrèrent forts.'
  - type: text
    content: 'Le peuple, les hommes d''Israël, reprirent courage ; ils se rangèrent de nouveau en ordre de bataille au lieu où ils s''étaient placés le premier jour. '
  '23':
  - type: note
    content: pleurèrent 2.4+ ; 21.2. –  interrogèrent v. 18 ; 1.1+.
  - type: text
    content: 'Les Israélites montèrent ; ils pleurèrent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' jusqu''au soir. Ils interrogèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Dois-je encore engager le combat contre les fils de Benjamin, mon frère ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit : Allez-y. '
  '24':
  - type: text
    content: 'Les Israélites se présentèrent donc devant les fils de Benjamin le deuxième jour. '
  '25':
  - type: note
    content: tirant l'épée v. 15.
  - type: text
    content: 'En ce deuxième jour, Benjamin sortit de Guibéa à leur rencontre ; ils abattirent sur le terrain dix-huit mille hommes des Israélites, tous des hommes tirant l''épée. '
  '26':
  - type: note
    content: 'restèrent là  : autre traduction restèrent assis  ; cf. Es 3.26 ; 47.1 ; Ps 137.1 ; Jb 2.13 ; Esd 9.3. –  pleurer v. 23 ; cf. Nb 11.4n. –  jeûnèrent 1S 7.6 ; 2S 12.16. –  des holocaustes et des sacrifices de paix 21.4 ; cf. Ex 20.24 ; Lv 1.3n  ; 3.1n  ; Jos 8.31.'
  - type: text
    content: 'Tous les Israélites, tout le peuple, montèrent à Beth-El ; ils restèrent là à pleurer devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ce jour-là, ils jeûnèrent jusqu''au soir, et ils offrirent des holocaustes et des sacrifices de paix devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '27':
  - type: note
    content: D'autres textes (18.31 ; Jos 18.1 ; 1S 1 ; 4.11) situent le coffre de l'alliance à Silo ; cf. v. 18n  ; 21.19-23.
  - type: text
    content: 'Les Israélites interrogèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: '  – c''était là que se trouvait le coffre de l''alliance de Dieu en ces jours-là, '
  '28':
  - type: note
    content: 'Phinéas, fils d''Eléazar Ex 6.25 ; Nb 25.6-13 ; 31.6 ; Jos 22.13,30-32 ; 24.33 ; voir aussi 1S 1.3 ; 2.34 ; 4.4,11. –  se tenait à son service  : litt. se tenait (debout) devant lui (pour officier) ; par devant lui, on peut comprendre devant Dieu ou devant le Coffre (expression analogue en 1R 17.1).'
  - type: text
    content: 'et c''était Phinéas, fils d''Eléazar, fils d''Aaron, qui se tenait à son service en ces jours-là. Ils dirent : Dois-je encore me mettre en campagne pour faire la guerre aux fils de Benjamin, mon frère, ou dois-je m''en abstenir ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' répondit : Allez-y, car demain je vous les livrerai.'
  '29':
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble du récit qui suit, cf. Jos 8.3-25 ; voir aussi Jg 9.34+.
  - type: text
    content: 'Alors Israël plaça une embuscade autour de Guibéa. '
  '3':
  - type: note
    content: 'Les Israélites  : litt. les fils d''Israël  ; expression courante, mais comparable ici à celle qui est traduite par fils de Benjamin  ; cf. Gn 32.29n.'
  - type: text
    content: 'Les fils de Benjamin apprirent que les Israélites étaient montés au Mitspa. Les Israélites dirent : Parlez. Comment ce malheur est-il arrivé ? '
  '30':
  - type: note
    content: comme les autres fois 16.20.
  - type: text
    content: 'Les Israélites partirent à l''attaque des fils de Benjamin le troisième jour ; ils se rangèrent en ordre de bataille devant Guibéa, comme les autres fois. '
  '31':
  - type: note
    content: Cf. Jos 7.5 ; chap. 8. – Certains modifient le texte hébreu traditionnel pour lire ici Gabaon au lieu de Guibéa.
  - type: text
    content: 'Les fils de Benjamin sortirent à la rencontre du peuple et se laissèrent attirer loin de la ville. Ils commencèrent à faire des victimes parmi le peuple comme les autres fois, sur les routes qui montent, l''une à Beth-El et l''autre à Guibéa par la campagne : environ trente hommes d''Israël. '
  '32':
  - type: note
    content: 'Jos 8.6,16. –  Nous les battons  : autre traduction ils sont frappés d''un fléau devant nous, cf. v. 35s,39 ; Lv 26.17n.'
  - type: text
    content: 'Les fils de Benjamin disaient : Nous les battons comme la première fois ! Mais les Israélites disaient : Fuyons et attirons-les loin de la ville, sur les routes ! '
  '33':
  - type: note
    content: 'les hommes d''Israël v. 11n. –  quittèrent leur position  : litt. se levèrent de son lieu. –  les gens d''Israël placés en embuscade  : litt. l''embuscade d''Israël. –  de Maaré-Guéba ou des alentours de Guéba, localité située à quelques kilomètres au nord-est de Guibéa (Jos 18.24 ; 1S 14.5).'
  - type: text
    content: 'Tous les hommes d''Israël quittèrent leur position et se rangèrent à Baal-Tamar ; et les gens d''Israël placés en embuscade s''élancèrent du lieu où ils étaient, de Maaré-Guéba. '
  '34':
  - type: note
    content: 'rude  : litt. lourd. –  les Benjaminites  : litt. eux.'
  - type: text
    content: 'Dix mille hommes d''élite de tout Israël arrivèrent en face de Guibéa. Le combat fut rude, et les Benjaminites ne se doutaient pas que le malheur allait les atteindre. '
  '35':
  - type: note
    content: 'Cf. v. 44-46. –  battit…  : autres traductions fit battre Benjamin par Israël ; frappa Benjamin d''un fléau devant Israël, cf. v. 32.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' battit Benjamin devant Israël ; les Israélites abattirent ce jour-là vingt-cinq mille cent hommes de Benjamin, tous des hommes tirant l''épée.'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'se virent battus (v. 32) : certains comprennent crurent que les hommes d''Israël étaient battus parce qu''ils cédaient du terrain… (cf. v. 39) ; le récit semble revenir sur le déroulement de la bataille, cf. v. 29ss.'
  - type: text
    content: 'Les fils de Benjamin se virent battus, alors que les hommes d''Israël cédaient du terrain à Benjamin, car ils comptaient sur l''embuscade qu''ils avaient placée contre Guibéa. '
  '37':
  - type: text
    content: 'Les gens placés en embuscade se déployèrent vite sur Guibéa, ils se portèrent en avant et passèrent toute la ville au fil de l''épée. '
  '38':
  - type: note
    content: V. 40 ; Jos 8.20.
  - type: text
    content: 'Suivant un signal convenu avec les hommes d''Israël, les hommes de l''embuscade devaient faire monter de la ville une épaisse fumée. '
  '39':
  - type: note
    content: volte-face Jos 8.21.
  - type: text
    content: 'Les hommes d''Israël firent alors volte-face dans la bataille. Benjamin avait déjà tué une trentaine des hommes d''Israël. Ils se disaient : A coup sûr, nous les battons comme dans le premier combat ! '
  '4':
  - type: note
    content: 19.12-30.
  - type: text
    content: 'Alors le lévite, le mari de la femme qui avait été assassinée, dit : J''étais arrivé, avec ma concubine, à Guibéa de Benjamin pour y passer la nuit. '
  '40':
  - type: note
    content: 'de toute la ville…  : litt. la ville entière montait vers le ciel  ; le terme hébreu correspondant à entière rappelle l’offrande entière (Lv 6.15s ; Dt 33.10), comme le verbe correspondant à monter rappelle l’holocauste (Lv 1.3n).'
  - type: text
    content: 'Cependant une colonne de fumée épaisse commençait à s''élever de la ville. Benjamin se retourna : de toute la ville des flammes s''élevaient vers le ciel ! '
  '41':
  - type: text
    content: 'Les hommes d''Israël avaient fait volte-face ; les hommes de Benjamin furent saisis d''épouvante quand ils virent que le malheur les avait atteints. '
  '42':
  - type: note
    content: 'Ils prirent la fuite  : litt. ils se retournèrent. –  ceux qui venaient des villes  : certains mss de LXX ont lu de la ville ou dans la ville  ; il pourrait s''agir de l''embuscade du v. 29 (cf. v. 33) ; quelques-uns pensent qu''il s''agit des Benjaminites des v. 14s ; cf. Jos 8.22.'
  - type: text
    content: 'Ils prirent la fuite devant les hommes d''Israël, vers le chemin du désert. Mais la bataille ne les lâchait pas et ceux qui venaient des villes les tuaient, puisqu''ils étaient au milieu d''eux. '
  '43':
  - type: note
    content: 'le poursuivirent sans répit  : traduction incertaine d''un texte hébreu obscur, litt. le poursuivirent repos  ; autre possibilité le poursuivirent jusque dans son lieu de repos  ; un ms de LXX a lu ici un nom de lieu (de Noua jusqu''en face…).'
  - type: text
    content: 'Ils cernèrent Benjamin, le poursuivirent sans répit et l''écrasèrent jusqu''en face de Guibéa, du côté du soleil levant. '
  '44':
  - type: note
    content: Cf. v. 46.
  - type: text
    content: 'Il tomba dix-huit mille hommes de Benjamin – c''étaient tous des hommes vaillants. '
  '45':
  - type: note
    content: 'V. 47. –  s''enfuirent  : litt. se tournèrent et fuirent  ; de même au v. 47 ; cf. v. 42n. –  vers le rocher  : la même expression sera traduite par au rocher au v. 47. –  Rimmôn  : à l''est de Beth-El. –  rattrapa  : litt. grappilla. –  jusqu''à Guidéom  : nom de lieu inconnu ; une légère modification de la vocalisation traditionnelle permettrait de lire jusqu''à les retrancher, comme en 21.6.'
  - type: text
    content: 'Parmi ceux qui s''enfuirent au désert, vers le rocher de Rimmôn, on en rattrapa cinq mille sur les routes ; on les poursuivit jusqu''à Guidéom, et on en tua deux mille. '
  '46':
  - type: note
    content: 'vingt-cinq mille hommes  : total des chiffres des v. 44s (cf. v. 35).'
  - type: text
    content: 'Le total des Benjaminites qui tombèrent ce jour-là fut de vingt-cinq mille hommes tirant l''épée – c''étaient tous des hommes vaillants. '
  '47':
  - type: note
    content: V. 45n  ; cf. 21.13.
  - type: text
    content: 'Six cents hommes s''enfuirent au désert, au rocher de Rimmôn, et ils restèrent là pendant quatre mois. '
  '48':
  - type: note
    content: 'la ville dans sa totalité  : autre traduction les villes dans leur totalité  ; ou encore les hommes de la ville ou des villes (litt. la ville des hommes), si l''on adopte la vocalisation de l''expression presque identique qui apparaît en Dt 2.34 ; 3.6. Ici la vocalisation du texte hébreu traditionnel est différente ; cf. Dt 13.13-17.'
  - type: text
    content: Les hommes d'Israël revinrent vers les fils de Benjamin et les passèrent au fil de l'épée, depuis la ville dans sa totalité jusqu'aux bêtes, et tout ce que l'on trouva. Ils mirent aussi le feu à toutes les villes qu'ils trouvèrent.
  '5':
  - type: text
    content: 'Les notables de Guibéa se sont dressés contre moi et ont entouré pendant la nuit la maison où j''étais. C''est moi qu''ils avaient l''intention de tuer, mais c''est de ma concubine qu''ils ont abusé, et elle en est morte. '
  '6':
  - type: note
    content: '19.29n. –  le territoire…  : litt. le champ du patrimoine d''Israël. –  folie en Israël 19.23n  ; cf. Gn 34.7.'
  - type: text
    content: 'J''ai saisi ma concubine, je l''ai découpée en morceaux et je l''ai envoyée ainsi dans tout le territoire qui constitue le patrimoine d''Israël ; car ils avaient commis une infamie et une folie en Israël. '
  '7':
  - type: text
    content: Vous êtes tous là, Israélites ; tenez conseil et prenez ici une décision !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 21.5. –  comme un seul homme v. 1+. –  ne se retirera dans  : autre traduction ne fera un détour par.'
  - type: text
    content: 'Tout le peuple se leva comme un seul homme en disant : Aucun d''entre nous n''ira dans sa tente, personne ne se retirera dans sa maison. '
  '9':
  - type: note
    content: 'Nous marcherons  : le verbe correspondant est sous-entendu en hébreu ; LXX nous monterons. –  d''après le sort 1.3n.'
  - type: text
    content: 'Voici maintenant ce que nous allons faire à Guibéa : Nous marcherons contre elle d''après le sort. '
