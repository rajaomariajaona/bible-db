document_id: SNG.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Lui
  - type: text
    content: ' '
  - type: note
    content: '1.15+. –  derrière ton voile  : la mariée apparaissait voilée le jour du mariage Gn 24.66 ; 29.23,25. –  un troupeau de chèvres 6.5 ; les chèvres sont noires dans les pays bibliques (cf. 1.5n et le contraste en 4.2 avec les brebis, image de la blancheur des dents). –  les monts du Galaad ou la région montagneuse du Galaad , à l''est du Jourdain ; cf. Gn 31.21n  ; Nb 32.1.'
  - type: text
    content: Que tu es belle, mon amie, que tu es belle !
  - type: text
    content: Tes yeux sont des colombes
  - type: text
    content: derrière ton voile.
  - type: text
    content: Ta chevelure est comme un troupeau de chèvres
  - type: text
    content: qui dévale les monts du Galaad.
  '10':
  - type: text
    content: ' '
  - type: note
    content: caresses / vin 1.2,4. –  parfums 1.3n.
  - type: text
    content: Que de beauté dans tes caresses, ô mariée, ma sœur !
  - type: text
    content: Combien tes caresses valent mieux que le vin,
  - type: text
    content: et la senteur de tes parfums que toutes les essences odoriférantes !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Tes lèvres / ta langue  : cf. v. 3 ; description du baiser (1.2 ; 5.1) ou du discours (cf. Ps 19.11 ; 119.103) ; voir aussi Pr 5.3. –  distillent  : même verbe en 5.5,13 ( ruisseler ). –  miel / lait Ex 3.8n. –  la senteur de tes vêtements Gn 27.27 ; Ps 45.9 ; cf. Pr 7.17. –  senteur du Liban Os 14.6ns.'
  - type: text
    content: Tes lèvres distillent le miel, ô mariée ;
  - type: text
    content: il y a sous ta langue du miel et du lait,
  - type: text
    content: et la senteur de tes vêtements est comme la senteur du Liban.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Au lieu de fontaine , des mss hébreux et des versions anciennes répètent jardin  ; cf. 1.12n. –  close / scellée  : cf. Pr 5.15-18.'
  - type: text
    content: Tu es un jardin clos, ô mariée, ma sœur,
  - type: text
    content: une fontaine close, une source scellée.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'pousses  : le terme hébreu vient d''un verbe souvent traduit par envoyer  ; il peut désigner un canal ou un conduit (cf. Jb 33.18n), mais aussi le rejeton d''une plante (cf. Ez 31.5). Un terme de la même racine désignait la dot apportée par un père à sa fille (1R 9.16). –  verger  : hébreu pardés , d''un terme perse qui a donné notre mot paradis  ; cf. Ec 2.5n  ; Né 2.8n  ; Lc 23.43 ; 2Co 12.4 ; Ap 2.7. –  fruits v. 16 ; 7.14. –  exquis v. 16 ; 7.14 ; le mot rappelle les largesses de Gn 24.53, don traditionnellement offert par le gendre au beau-père. –  henné 1.14n. –  nard 1.12n.'
  - type: text
    content: Tes pousses sont un verger de grenadiers
  - type: text
    content: aux fruits exquis,
  - type: text
    content: avec du henné et du nard ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: Sur ces parfums, cf. Ps 45.9 ; Pr 7.17.
  - type: text
    content: du nard et du safran, du roseau et du cinnamome,
  - type: text
    content: avec tous les arbres à encens ;
  - type: text
    content: de la myrrhe et de l'aloès,
  - type: text
    content: avec toutes les meilleures essences odoriférantes.
  - type: heading
    content: Elle
  '15':
  - type: text
    content: ' '
  - type: note
    content: On pourrait aussi considérer que le discours du bien-aimé se poursuit jusqu'au milieu du v. 16, qui se conclut en tout cas sur une invitation de la bien-aimée. –  puits d'eau vive Gn 26.19 ; cf. Jn 4.10ss ; 7.38.
  - type: text
    content: C'est une source des jardins,
  - type: text
    content: c'est un puits d'eau vive,
  - type: text
    content: ce sont des ruissellements du Liban.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'vent du nord / vent du sud  : litt. nord / sud . –  jardin v. 12+.'
  - type: text
    content: Eveille-toi, vent du nord ! Viens, vent du sud !
  - type: text
    content: Souffle sur mon jardin, et que ruissellent ses essences odoriférantes !
  - type: text
    content: Que mon bien-aimé entre dans son jardin,
  - type: text
    content: et qu'il mange de ses fruits exquis !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'dents / brebis  : cf. v. 1n  ; 6.6. –  chacune a sa jumelle  : autre traduction toutes ont des jumeaux  ; l''image illustre en tout cas la régularité de sa dentition. –  n''en est privée  : autre traduction n''est privée d''enfants.'
  - type: text
    content: Tes dents sont comme un troupeau de brebis à tondre
  - type: text
    content: qui remontent du bain ;
  - type: text
    content: chacune a sa jumelle,
  - type: text
    content: aucune n'en est privée.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'cordon écarlate  : cf. Gn 38.28 ; Jos 2.18 ; voir aussi Ex 25.4n. –  ta bouche  : autre traduction ton langage  ; le mot hébreu (autre qu''au v. 11), au pluriel (en parallèle avec Tes lèvres ), vient du verbe habituellement traduit par parler . –  ta joue  : litt. ta tempe (même mot dans Jg 4.21s ; 5.26), de même en 6.7. –  grenade  : cf. v. 13 ; 6.11 ; 7.13 ; 8.2. –  derrière ton voile v. 1n.'
  - type: text
    content: Tes lèvres sont comme un cordon écarlate,
  - type: text
    content: et ta bouche est jolie ;
  - type: text
    content: ta joue est comme une moitié de grenade
  - type: text
    content: derrière ton voile.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Ton cou  : cf. 1.10 ; 7.5. –  la tour de David (cf. 1.13n) : sans doute un édifice de Jérusalem, dont l''emplacement n''est plus connu. –  arsenal  : mot rare et diversement interprété ; certains y voient un autre nom de lieu, d''autres traduisent pour porter des trophées , en continuité avec l''image des boucliers et des carquois (ou petits boucliers  ; cf. 2S 8.7n) ; cf. Ez 27.10s ; voir aussi 1R 10.16s.'
  - type: text
    content: Ton cou est comme la tour de David,
  - type: text
    content: 'bâtie pour être un arsenal :'
  - type: text
    content: les mille boucliers y sont suspendus,
  - type: text
    content: tous les carquois des guerriers.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '7.4 ; voir aussi 7.8s ; 8.10 ; Pr 5.19. –  petits  : le terme hébreu s''applique aussi bien au petit d''une gazelle qu''au faon d''une biche (cf. 2.9,17). –  paissent parmi les lis 2.16n.'
  - type: text
    content: Tes deux seins sont comme deux petits,
  - type: text
    content: jumeaux d'une gazelle,
  - type: text
    content: qui paissent parmi les lis.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 2.17n. – On a rapproché l'expression montagne de la myrrhe (hébreu mor  ; cf. 1.13+) du mont Moriya (Gn 22.2 ; 2Ch 3.1). –  l'encens Ex 30.34n.
  - type: text
    content: Avant que souffle la brise du jour
  - type: text
    content: et que les ombres fuient,
  - type: text
    content: j'irai à la montagne de la myrrhe
  - type: text
    content: et à la colline de l'encens.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'belle 1.15+. –  défaut (physique, cf. Lv 21.17ss ; 22.20ss) : cf. Ep 5.25-27.'
  - type: text
    content: Tu es toute belle, mon amie,
  - type: text
    content: en toi, pas de défaut.
  '8':
  - type: text
    content: ' '
  - type: note
    content: Cf. 7.5. –  Liban 3.9n. –  Amana , Senir et Hermon sont des montagnes de l'Anti-Liban, au nord du pays d'Israël ; cf. Dt 3.8s ; 1Ch 5.23. –  lions… Jr 5.6 ; Na 2.12s.
  - type: text
    content: Viens avec moi du Liban, ô mariée,
  - type: text
    content: viens avec moi du Liban !
  - type: text
    content: Regarde du sommet de l'Amana,
  - type: text
    content: du sommet du Senir et de l'Hermon,
  - type: text
    content: des tanières des lions,
  - type: text
    content: des montagnes des léopards.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Tu me ravis le cœur  : certains voient dans ce v. une allusion comparative à des pratiques magiques ( regards  ; cf. 6.5 ; colliers ). –  ma sœur  : terme d''affection, également attesté dans la poésie égyptienne ; v. 10,12 ; 5.1s ; cf. 8.1.'
  - type: text
    content: Tu me ravis le cœur, ô mariée, ma sœur,
  - type: text
    content: tu me ravis le cœur par un seul de tes regards,
  - type: text
    content: par une seule maille de tes colliers.
