document_id: DEU.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Coutumes mortuaires interdites
  - type: text
    content: ' '
  - type: note
    content: 'fils  : cf. 1.31+ ; Es 1.2-4 ; Rm 8.14 ; 9.4. –  sur le front  : litt. entre vos yeux . –  pour un mort ou, selon certains, pour (le dieu de) la Mort , même possibilité en 26.14 ; cf. Lv 19.27s ; 21.5 ; sur ces rites de deuil, voir aussi Jr 7.29 ; 16.6 ; 41.5 ; 47.5 ; cf. 1R 18.28.'
  - type: text
    content: 'Vous êtes des fils pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. Vous ne vous ferez pas d''incisions et vous ne vous ferez pas de tonsure sur le front pour un mort. '
  '10':
  - type: text
    content: Mais vous ne mangerez aucun de ceux qui n'ont ni nageoires ni écailles – ceux-là sont impurs pour vous.
  '11':
  - type: text
    content: 'Vous pourrez manger tout oiseau pur. '
  '12':
  - type: text
    content: 'Mais voici ceux dont vous ne mangerez pas : le vautour, l''orfraie et l''aigle de mer ; '
  '13':
  - type: text
    content: 'la buse, le faucon, le milan selon ses espèces ; '
  '14':
  - type: text
    content: 'le corbeau selon toutes ses espèces ; '
  '15':
  - type: text
    content: 'l''autruche, le hibou, la mouette, l''épervier selon ses espèces ; '
  '16':
  - type: text
    content: 'le chat-huant, la chouette et le cygne ; '
  '17':
  - type: text
    content: 'le pélican, le cormoran et le plongeon ; '
  '18':
  - type: text
    content: 'la cigogne, le héron selon ses espèces, la huppe et la chauve-souris. '
  '19':
  - type: text
    content: 'Toute petite bête ailée sera impure pour vous : on n''en mangera pas. '
  '2':
  - type: note
    content: 7.6+ ; cf. Ac 15.14 ; Tt 2.14. – Voir saint.
  - type: text
    content: 'Car tu es un peuple saint pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu ; c''est toi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a choisi pour que tu sois son bien propre parmi tous les peuples de la terre.'
  - type: heading
    content: Viandes autorisées et viandes interdites
  '20':
  - type: text
    content: Mais vous pourrez manger tout oiseau pur.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'bête crevée Lv 17.15 ; 22.8. –  dans tes villes  : litt. dans tes portes , de même aux v. 27ss. –  peuple saint 7.6+. –  Tu ne feras pas cuire… Ex 23.19n.'
  - type: text
    content: 'Vous ne mangerez aucune bête crevée ; tu donneras cela à l''immigré qui est dans tes villes, afin qu''il la mange, ou tu le vendras à un étranger ; car tu es un peuple saint pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu.'
  - type: text
    content: Tu ne feras pas cuire un chevreau dans le lait de sa mère.
  - type: heading
    content: Dîme annuelle et dîme triennale
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'dîme  : cf. v. 28s ; 12.6 ; 26.12-15 ; Gn 14.20n  ; Lv 27.30-33 ; Nb 18.21-32 ; Mt 23.23/ / ; Tobit 1.7s : « Je donnais aussi la dîme du blé, du vin… aux fils de Lévi en service à Jérusalem ; la deuxième dîme, je la prélevais en argent et j''allais la dépenser chaque année à Jérusalem. Je donnais la troisième aux orphelins, aux veuves et aux étrangers résidant avec les fils d''Israël ; je l''apportais et la leur donnais tous les trois ans, et nous la mangions selon la prescription faite à ce sujet dans la Loi de Moïse. »'
  - type: text
    content: 'Tu prendras la dîme de tout ce que ta semence produira, de tout ce que tes champs rapporteront chaque année. '
  '23':
  - type: note
    content: 'Tu mangeras… 12.7+. –  y faire demeurer son nom 16.2 ; 26.2. –  lieu qu''il choisira 12.5+. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n. –  craindre 4.10+. –  toujours  : litt. tous les jours.'
  - type: text
    content: 'Tu mangeras devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, au lieu qu''il choisira pour y faire demeurer son nom, la dîme de ton blé, de ton vin et de ton huile, les premiers-nés de ton gros et de ton petit bétail, afin que tu apprennes à craindre toujours le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu. '
  '24':
  - type: note
    content: trop long 12.21.
  - type: text
    content: 'Peut-être le chemin sera-t-il trop long pour le transport, parce que le lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, choisira pour y placer son nom, sera trop loin de toi, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura béni. '
  '25':
  - type: note
    content: 'Tu échangeras… ta dîme  : litt. tu donneras.'
  - type: text
    content: 'Tu échangeras alors ta dîme contre de l''argent, tu serreras cet argent dans ta main et tu iras au lieu que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, aura choisi. '
  '26':
  - type: note
    content: 'tu désireras  : autre traduction ton gosier désirera  ; cf. 12.20n. –  boissons alcoolisées 29.5 ; Lv 10.9n. –  ce qui te fera plaisir  : litt. ce que ton être te demandera ou ton gosier (cf. Gn 1.20n) te demandera. –  tu mangeras… 12.7+ ; cf. Siracide 35.11 : « A chacune de tes offrandes montre un visage joyeux et avec joie consacre la dîme. » –  ta famille  : litt. ta maison ou ta maisonnée.'
  - type: text
    content: 'Là, tu échangeras l''argent contre tout ce que tu désireras, gros bétail et petit bétail, vin et boissons alcoolisées, tout ce qui te fera plaisir, tu mangeras là devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et tu te réjouiras, toi et ta famille. '
  '27':
  - type: note
    content: 12.12n,19+.
  - type: text
    content: Tu ne délaisseras pas le lévite qui est dans tes villes, car il n'a aucune part à ton patrimoine.
  '28':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 22+ ; 26.12-15 ; cette disposition était sans doute conçue à l'origine en faveur des déshérités (v. 29), qui ne pouvaient pas se rendre au sanctuaire unique les deux autres années.
  - type: text
    content: 'Au bout de trois ans, tu sortiras toute la dîme de tes produits de cette année-là et tu la déposeras dans tes villes. '
  '29':
  - type: note
    content: 'V. 27 ; 10.18+. –  afin que le Seigneur … te bénisse  : cf. Lc 14.13 ; Siracide 7.32 : « Tends la main au mendiant, pour que tu sois pleinement béni. »'
  - type: text
    content: 'Alors viendront le lévite, qui n''a aucune part à ton patrimoine, l''immigré, l''orphelin et la veuve, qui sont dans tes villes ; ils mangeront et seront rassasiés, afin que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te bénisse dans tous les travaux que tu feras de tes mains.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Tu / vous (v. 4) 1.8n. –  abomination  : cf. 7.25+.'
  - type: text
    content: 'Tu ne mangeras aucune abomination. '
  '4':
  - type: note
    content: Cf. Lv 11.1-38 ; Ac 10.12-16 ; l'identification de plusieurs des animaux énumérés ici est incertaine ; elle repose sur les versions anciennes.
  - type: text
    content: 'Voici les bêtes que vous pourrez manger : le bœuf, le mouton et la chèvre ; '
  '5':
  - type: note
    content: cerf / gazelle 12.15+. –  chevreuil 1R 5.3.
  - type: text
    content: 'le cerf, la gazelle et le chevreuil ; le bouquetin, le chamois, le mouflon et l''antilope. '
  '6':
  - type: note
    content: 'et qui rumine  : l''hébreu ajoute parmi les bêtes.'
  - type: text
    content: 'Vous pourrez manger toute bête qui a les sabots fendus, les pieds fourchus avec deux sabots, et qui rumine. '
  '7':
  - type: note
    content: daman Lv 11.5n  ; Ps 104.18 ; cf. Pr 3.26n. – Voir pur, impur.
  - type: text
    content: 'Mais voici ceux que vous ne mangerez pas parmi ceux qui ruminent et qui ont les sabots fendus et fourchus : le chameau, le lièvre et le daman, qui ruminent, mais qui n''ont pas les sabots fendus – ils sont impurs pour vous ; '
  '8':
  - type: text
    content: le porc, qui a les sabots fendus, mais qui ne rumine pas – il est impur pour vous ; vous ne mangerez pas de leur chair et vous ne toucherez pas leurs cadavres.
  '9':
  - type: text
    content: 'De tout ce qui est dans l''eau, voici ce que vous pourrez manger : vous pourrez manger de tout ce qui a des nageoires et des écailles. '
