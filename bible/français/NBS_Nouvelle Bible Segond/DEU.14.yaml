document_id: DEU.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Coutumes mortuaires interdites
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1.31+ ; Es 1.2-4 ; Rm 8.14 ; 9.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur le front
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entre vos yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour un mort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon certains, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour (le dieu de) la Mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même possibilité en 26.14 ; cf. Lv 19.27s ; 21.5 ; sur ces '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: rites de deuil
        - type: text
          text: ', voir aussi Jr 7.29 ; 16.6 ; 41.5 ; 47.5 ; cf. 1R 18.28.'
      marker-yv: yv-n
    - type: text
      text: 'Vous êtes des fils pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu. Vous ne vous ferez pas d''incisions et vous ne vous ferez pas de tonsure sur le front pour un mort. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: Mais vous ne mangerez aucun de ceux qui n'ont ni nageoires ni écailles – ceux-là sont impurs pour vous.
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Vous pourrez manger tout oiseau pur. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Mais voici ceux dont vous ne mangerez pas : le vautour, l''orfraie et l''aigle de mer ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'la buse, le faucon, le milan selon ses espèces ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'le corbeau selon toutes ses espèces ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'l''autruche, le hibou, la mouette, l''épervier selon ses espèces ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'le chat-huant, la chouette et le cygne ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'le pélican, le cormoran et le plongeon ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: 'la cigogne, le héron selon ses espèces, la huppe et la chauve-souris. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: 'Toute petite bête ailée sera impure pour vous : on n''en mangera pas. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.6+ ; cf. Ac 15.14 ; Tt 2.14. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Car tu es un peuple saint pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu ; c''est toi que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, a choisi pour que tu sois son bien propre parmi tous les peuples de la terre.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Viandes autorisées et viandes interdites
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: Mais vous pourrez manger tout oiseau pur.
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bête crevée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 17.15 ; 22.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans tes villes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans tes portes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 27ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'peuple '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu ne feras pas cuire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 23.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous ne mangerez aucune bête crevée ; tu donneras cela à l''immigré qui est dans tes villes, afin qu''il la mange, ou tu le vendras à un étranger ; car tu es un peuple saint pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu.'
  - type: usfm
    marker: p
    children:
    - type: text
      text: Tu ne feras pas cuire un chevreau dans le lait de sa mère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dîme annuelle et dîme triennale
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dîme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 28s ; 12.6 ; 26.12-15 ; Gn 14.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 27.30-33 ; Nb 18.21-32 ; Mt 23.23/ / ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tobit
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.7s : « Je donnais aussi la dîme du blé, du vin… aux fils de Lévi en service à Jérusalem ; la deuxième dîme, je la prélevais en argent et j''allais la dépenser chaque année à Jérusalem. Je donnais la troisième aux orphelins, aux veuves et aux étrangers résidant avec les fils d''Israël ; je l''apportais et la leur donnais tous les trois ans, et nous la mangions selon la prescription faite à ce sujet dans la Loi de Moïse. »'
      marker-yv: yv-n
    - type: text
      text: 'Tu prendras la dîme de tout ce que ta semence produira, de tout ce que tes champs rapporteront chaque année. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu mangeras… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.7+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'y faire demeurer son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.2 ; 26.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lieu qu''il choisira '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vin nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 27.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: craindre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.10+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les jours.
      marker-yv: yv-n
    - type: text
      text: 'Tu mangeras devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, au lieu qu''il choisira pour y faire demeurer son nom, la dîme de ton blé, de ton vin et de ton huile, les premiers-nés de ton gros et de ton petit bétail, afin que tu apprennes à craindre toujours le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trop long '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.21.
      marker-yv: yv-n
    - type: text
      text: 'Peut-être le chemin sera-t-il trop long pour le transport, parce que le lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, choisira pour y placer son nom, sera trop loin de toi, parce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, t''aura béni. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu échangeras… ta dîme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu donneras.
      marker-yv: yv-n
    - type: text
      text: 'Tu échangeras alors ta dîme contre de l''argent, tu serreras cet argent dans ta main et tu iras au lieu que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, aura choisi. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu désireras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ton gosier désirera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'boissons alcoolisées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 29.5 ; Lv 10.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui te fera plaisir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce que ton être te demandera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ton gosier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: te demandera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu mangeras… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.7+ ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Siracide
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '35.11 : « A chacune de tes offrandes montre un visage joyeux et avec joie consacre la dîme. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ta famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ta maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ta maisonnée.
      marker-yv: yv-n
    - type: text
      text: 'Là, tu échangeras l''argent contre tout ce que tu désireras, gros bétail et petit bétail, vin et boissons alcoolisées, tout ce qui te fera plaisir, tu mangeras là devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, et tu te réjouiras, toi et ta famille. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',19+.'
      marker-yv: yv-n
    - type: text
      text: Tu ne délaisseras pas le lévite qui est dans tes villes, car il n'a aucune part à ton patrimoine.
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. v. 22+ ; 26.12-15 ; cette disposition était sans doute conçue à l'origine en faveur des déshérités (v. 29), qui ne pouvaient pas se rendre au sanctuaire unique les deux autres années.
      marker-yv: yv-n
    - type: text
      text: 'Au bout de trois ans, tu sortiras toute la dîme de tes produits de cette année-là et tu la déposeras dans tes villes. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 27 ; 10.18+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'afin que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' … te '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénisse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lc 14.13 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Siracide '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.32 : « Tends la main au mendiant, pour que tu sois pleinement béni. »'
      marker-yv: yv-n
    - type: text
      text: 'Alors viendront le lévite, qui n''a aucune part à ton patrimoine, l''immigré, l''orphelin et la veuve, qui sont dans tes villes ; ils mangeront et seront rassasiés, afin que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te bénisse dans tous les travaux que tu feras de tes mains.'
