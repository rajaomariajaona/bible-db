      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Dt 4.8 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Voici les règles que tu placeras devant eux : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'S''il prend une autre femme, il ne diminuera en rien la nourriture, le vêtement et le droit conjugal de la première. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans rien payer…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour rien, sans argent.
      marker-yv: yv-n
    - type: text
      text: S'il ne fait pas pour elle ces trois choses, elle pourra sortir sans rien payer, sans verser d'argent.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fautes passibles de la peine de mort
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 20.13+.
      marker-yv: yv-n
    - type: text
      text: 'Celui qui frappe un homme mortellement sera mis à mort. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur les '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: villes de refuge
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: pour meurtriers involontaires, cf. Nb 35.9-15 ; Dt 4.41-43 ; 19.1-13 ; Jos 20.
      marker-yv: yv-n
    - type: text
      text: 'S''il ne l''a pas traqué, et que Dieu l''ait fait tomber sous sa main, je te fixerai un lieu où il pourra s''enfuir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: agit avec arrogance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'échauffe ; se met en rage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'même de mon autel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(considéré habituellement comme lieu de refuge) : cf. 1R 1.50ss ; 2.28-34.'
      marker-yv: yv-n
    - type: text
      text: Mais lorsque quelqu'un agit avec arrogance contre son prochain pour le tuer par ruse, tu l'arracheras même de mon autel pour le mettre à mort.
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Code '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hammourabi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '195 : « Si un fils a frappé son père, on lui coupera la main. »'
      marker-yv: yv-n
    - type: text
      text: Celui qui frappe son père ou sa mère sera mis à mort.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: ft
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' intervertit ce v. et le v. 17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui enlève
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui vole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 20.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Code d''Hammourabi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14 : « Si un homme a enlevé (ou volé) le fils d''un autre homme, il sera mis à mort. »'
      marker-yv: yv-n
    - type: text
      text: Celui qui enlève un homme – qu'il l'ait vendu ou qu'on le retrouve entre ses mains – sera mis à mort.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
