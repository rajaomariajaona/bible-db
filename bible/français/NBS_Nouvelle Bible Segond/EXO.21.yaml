      marker-yv: yv-n
    - type: text
      text: 'Lorsque des hommes se querellent, heurtent une femme enceinte et que son enfant sort, sans autre accident, ils seront condamnés à une amende fixée par le mari de la femme, sur l''avis d''arbitres. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
