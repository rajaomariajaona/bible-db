          - type: text
            text: d'Hammourabi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '209ss : « Si un homme a frappé la fille d''un autre homme (de l''aristocratie, cf. v. 24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') et qu''il lui ait fait faire une fausse couche, il paiera dix sicles d''argent pour son enfant. Si la femme est morte, on mettra sa propre fille à mort. S''il a fait faire une fausse couche à une fille de quelqu''un du peuple, en la frappant, il paiera cinq sicles d''argent. Si la femme est morte, il paiera la moitié d''une mine d''argent. S''il a frappé la servante d''un homme et lui a fait faire une fausse couche, il paiera deux sicles d''argent. Si la servante est morte, il paiera le tiers d''une mine d''argent. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que son enfant sort, sans autre accident
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : selon la plupart des spécialistes, le texte hébreu signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'elle fait une fausse couche, mais que rien d'autre ne lui arrive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' en revanche traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que son enfant sort non formé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en utilisant un terme grec qui rappelle celui qui correspond à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'image '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en Gn 1.26 ; 9.6 ; dans cette perspective, c'est le stade de développement du fœtus qui deviendrait le critère de l'application du talion (v. 23
        - type: usfm
