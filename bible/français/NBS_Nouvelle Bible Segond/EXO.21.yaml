    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 20.12 ; Lv 20.9 ; Dt 21.18 ; 27.16 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Mt 15.4
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maudit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction.'
      marker-yv: yv-n
    - type: text
      text: Celui qui maudit son père ou sa mère sera mis à mort.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Coups et blessures
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se querellent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même verbe en Jg 8.1.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque des hommes se querellent, que l''un d''eux frappe son prochain avec une pierre ou avec le poing, et que l''autre ne meurt pas mais doit rester alité, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: s'il peut ensuite se lever et se promener dehors avec une canne, celui qui l'aura frappé sera quitte. Seulement, il le dédommagera de son interruption de travail et le fera soigner jusqu'à sa guérison.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 25.35-55 ; Dt 15.12-18 ; Jr 34.14. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Code '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hammourabi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '117 : « Si un homme est dans l''obligation de vendre sa femme, son fils ou sa fille, ou s''il a été lui-même réduit à l''esclavage, ils travailleront chez leur acquéreur ou leur créancier pendant trois ans ; la quatrième année ils recouvreront la liberté. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans rien payer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même au v. 11.'
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu achètes un esclave hébreu, il servira six années ; la septième, il sortira libre, sans rien payer. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Lorsqu''un homme frappe son esclave ou sa servante avec un bâton, si l''esclave ou la servante meurt sous sa main, celui-ci sera vengé. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'il survit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il se tient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Certains comprennent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il est arrêté un jour ou deux dans son travail.
      marker-yv: yv-n
    - type: text
      text: Mais s'il survit un jour ou deux, il ne sera pas vengé, car c'est son argent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
