document_id: EXO.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Loi sur les esclaves hébreux
  - type: text
    content: ' '
  - type: note
    content: 'règles  : le terme correspondant est souvent traduit par droit, équité (Pr 1.3n) ou jugement  ; cf. Dt 4.8 ; voir loi.'
  - type: text
    content: 'Voici les règles que tu placeras devant eux : '
  '10':
  - type: text
    content: 'S''il prend une autre femme, il ne diminuera en rien la nourriture, le vêtement et le droit conjugal de la première. '
  '11':
  - type: note
    content: 'sans rien payer…  : litt. pour rien, sans argent.'
  - type: text
    content: S'il ne fait pas pour elle ces trois choses, elle pourra sortir sans rien payer, sans verser d'argent.
  - type: heading
    content: Fautes passibles de la peine de mort
  '12':
  - type: text
    content: ' '
  - type: note
    content: 20.13+.
  - type: text
    content: 'Celui qui frappe un homme mortellement sera mis à mort. '
  '13':
  - type: note
    content: Sur les villes de refuge pour meurtriers involontaires, cf. Nb 35.9-15 ; Dt 4.41-43 ; 19.1-13 ; Jos 20.
  - type: text
    content: 'S''il ne l''a pas traqué, et que Dieu l''ait fait tomber sous sa main, je te fixerai un lieu où il pourra s''enfuir. '
  '14':
  - type: note
    content: 'agit avec arrogance  : autres traductions s''échauffe ; se met en rage. –  même de mon autel (considéré habituellement comme lieu de refuge) : cf. 1R 1.50ss ; 2.28-34.'
  - type: text
    content: Mais lorsque quelqu'un agit avec arrogance contre son prochain pour le tuer par ruse, tu l'arracheras même de mon autel pour le mettre à mort.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Code d''Hammourabi 195 : « Si un fils a frappé son père, on lui coupera la main. »'
  - type: text
    content: Celui qui frappe son père ou sa mère sera mis à mort.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'LXX intervertit ce v. et le v. 17. –  qui enlève  : litt. qui vole  ; cf. 20.15n. Cf. Code d''Hammourabi 14 : « Si un homme a enlevé (ou volé) le fils d''un autre homme, il sera mis à mort. »'
  - type: text
    content: Celui qui enlève un homme – qu'il l'ait vendu ou qu'on le retrouve entre ses mains – sera mis à mort.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.12 ; Lv 20.9 ; Dt 21.18 ; 27.16 ; Mt 15.4 . –  maudit  : voir bénédiction, malédiction.'
  - type: text
    content: Celui qui maudit son père ou sa mère sera mis à mort.
  - type: heading
    content: Coups et blessures
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'se querellent  : même verbe en Jg 8.1.'
  - type: text
    content: 'Lorsque des hommes se querellent, que l''un d''eux frappe son prochain avec une pierre ou avec le poing, et que l''autre ne meurt pas mais doit rester alité, '
  '19':
  - type: text
    content: s'il peut ensuite se lever et se promener dehors avec une canne, celui qui l'aura frappé sera quitte. Seulement, il le dédommagera de son interruption de travail et le fera soigner jusqu'à sa guérison.
  '2':
  - type: note
    content: 'Lv 25.35-55 ; Dt 15.12-18 ; Jr 34.14. Cf. Code d''Hammourabi 117 : « Si un homme est dans l''obligation de vendre sa femme, son fils ou sa fille, ou s''il a été lui-même réduit à l''esclavage, ils travailleront chez leur acquéreur ou leur créancier pendant trois ans ; la quatrième année ils recouvreront la liberté. » –  sans rien payer  : litt. pour rien  ; de même au v. 11.'
  - type: text
    content: 'Lorsque tu achètes un esclave hébreu, il servira six années ; la septième, il sortira libre, sans rien payer. '
  '20':
  - type: text
    content: 'Lorsqu''un homme frappe son esclave ou sa servante avec un bâton, si l''esclave ou la servante meurt sous sa main, celui-ci sera vengé. '
  '21':
  - type: note
    content: 's''il survit  : litt. s''il se tient. Certains comprennent  : s''il est arrêté un jour ou deux dans son travail.'
  - type: text
    content: Mais s'il survit un jour ou deux, il ne sera pas vengé, car c'est son argent.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Code d''Hammourabi 209ss : « Si un homme a frappé la fille d''un autre homme (de l''aristocratie, cf. v. 24n) et qu''il lui ait fait faire une fausse couche, il paiera dix sicles d''argent pour son enfant. Si la femme est morte, on mettra sa propre fille à mort. S''il a fait faire une fausse couche à une fille de quelqu''un du peuple, en la frappant, il paiera cinq sicles d''argent. Si la femme est morte, il paiera la moitié d''une mine d''argent. S''il a frappé la servante d''un homme et lui a fait faire une fausse couche, il paiera deux sicles d''argent. Si la servante est morte, il paiera le tiers d''une mine d''argent. » –  que son enfant sort, sans autre accident  : selon la plupart des spécialistes, le texte hébreu signifie qu''elle fait une fausse couche, mais que rien d''autre ne lui arrive  ; LXX en revanche traduit que son enfant sort non formé , en utilisant un terme grec qui rappelle celui qui correspond à image en Gn 1.26 ; 9.6 ; dans cette perspective, c''est le stade de développement du fœtus qui deviendrait le critère de l''application du talion (v. 23n). –  ils seront condamnés  : autre traduction le coupable sera condamné. –  sur l''avis d''arbitres  : autres traductions on (ou il ) la paiera devant les juges ; on la fixera d''après une estimation  ; le terme qui est ici rendu par arbitres , ou un homonyme, est traduit par juges en Dt 32.31 ; Jb 31.11 ; termes apparentés en 1S 2.25 ( arbitrer ) ; Es 16.3 ; 28.7 ( décision ) ; Ez 16.52 ( condamner ) ; Ps 106.30 ( régler l''affaire ) ; Jb 31.28 ( jugement ).'
  - type: text
    content: 'Lorsque des hommes se querellent, heurtent une femme enceinte et que son enfant sort, sans autre accident, ils seront condamnés à une amende fixée par le mari de la femme, sur l''avis d''arbitres. '
  '23':
  - type: note
    content: 's''il y a accident  : LXX s''il était (déjà) formé.'
  - type: text
    content: 'Mais s''il y a accident, tu donneras vie pour vie, '
  '24':
  - type: note
    content: 'Lv 24.20 ; Dt 19.21 ; cf. Ab 15 ; Mt 5.38. Ce principe, dit « loi du talion », limite la peine au dommage causé (cf. Gn 4.23s). Cf. Code d''Hammourabi 196ss : « Si un homme a fait perdre un œil à un autre homme (litt. “un fils d''homme”, expression qui pourrait aussi signifier “un membre de l''aristocratie” ou, moins probablement, “un homme plus jeune que lui”), on lui fera perdre un œil. S''il a brisé un membre à un autre homme, on lui brisera un membre. S''il a fait perdre un œil à quelqu''un du peuple ou s''il a brisé un membre à quelqu''un du peuple, il paiera une mine d''argent. S''il a fait perdre un œil à l''esclave d''un homme ou s''il a brisé un membre à l''esclave d''un homme, il paiera la moitié de sa valeur. Si un homme a cassé une dent à un homme de son rang, on lui cassera une dent. S''il a cassé une dent à quelqu''un du peuple, il paiera le tiers d''une mine d''argent. »'
  - type: text
    content: 'œil pour œil, dent pour dent, main pour main, pied pour pied, '
  '25':
  - type: text
    content: brûlure pour brûlure, blessure pour blessure, meurtrissure pour meurtrissure.
  '26':
  - type: text
    content: 'Lorsqu''un homme frappe l''œil de son esclave ou de sa servante et lui fait perdre son œil, il le renverra libre, pour son œil. '
  '27':
  - type: text
    content: S'il fait tomber une dent à son esclave ou à sa servante, il le renverra libre, pour sa dent.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 19.13 ; Gn 9.5. Voir Code d''Hammourabi 250ss : « Si un bœuf, en passant dans la rue, donne un coup de corne mortel à un homme, aucune plainte ne sera recevable. Si un homme a un bœuf connu pour donner des coups de corne, que le conseil de sa ville l''en ait averti, mais qu''il n''ait pas attaché son bœuf ou recouvert (ou rogné) ses cornes, et que le bœuf ait donné un coup de corne mortel à un homme (de l''aristocratie, cf. v. 24n), il donnera la moitié d''une mine d''argent. S''il s''agissait de l''esclave d''un homme, il donnera le tiers d''une mine d''argent. »'
  - type: text
    content: 'Lorsqu''un bœuf donne un coup de corne mortel à un homme ou à une femme, le bœuf sera lapidé, sa viande ne sera pas mangée, et le propriétaire du bœuf sera quitte. '
  '29':
  - type: note
    content: 'avait l''habitude de…  : autre traduction avait déjà donné des coups de corne auparavant.'
  - type: text
    content: 'Mais si le bœuf avait l''habitude de donner des coups de corne, qu''on en ait averti le propriétaire et que celui-ci ne l''ait pas surveillé, le bœuf sera lapidé, dans le cas où il provoquerait la mort d''un homme ou d''une femme, et son propriétaire aussi sera mis à mort. '
  '3':
  - type: note
    content: 'seul  : litt. avec son corps.'
  - type: text
    content: 'S''il est entré seul, il sortira seul ; s''il avait une femme, sa femme sortira avec lui. '
  '30':
  - type: note
    content: Litt. si une rançon (c.-à-d. une indemnité, 30.12 ; Nb 35.31ns ; voir expiation) est placée sur lui, il donnera une libération de son être (ou de sa vie, Gn 1.20n) selon tout ce qui a été placé sur lui.
  - type: text
    content: 'Si l''on impose une rançon au propriétaire, celui-ci donnera tout ce qui lui sera imposé pour se dégager. '
  '31':
  - type: note
    content: 'cette règle  : voir 15.25n.'
  - type: text
    content: 'Que le bœuf frappe un fils ou une fille, on agira envers lui selon cette règle ; '
  '32':
  - type: note
    content: 'trente sicles d''argent  : un peu moins de 300 g ; voir mesures, poids et monnaies. –  au maître  : litt. à leur maître (celui de l''esclave ou de la servante).'
  - type: text
    content: si le bœuf frappe un esclave ou une servante, on donnera trente sicles d'argent au maître, et le bœuf sera lapidé.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 14.5. –  tranchée  : autre traduction citerne.'
  - type: text
    content: 'Lorsqu''un homme laisse une tranchée ouverte, ou lorsqu''un homme creuse une tranchée sans la couvrir, s''il y tombe un bœuf ou un âne, '
  '34':
  - type: text
    content: le propriétaire de la tranchée donnera une compensation en argent au propriétaire de l'animal et gardera pour lui l'animal mort.
  '35':
  - type: text
    content: 'Lorsque le bœuf d''un homme frappe mortellement de ses cornes le bœuf de son prochain, ils vendront le bœuf vivant et se partageront l''argent ; ils partageront aussi le bœuf mort. '
  '36':
  - type: text
    content: Mais s'il est reconnu que le bœuf avait l'habitude de donner des coups de corne, et que son propriétaire ne l'ait pas surveillé, celui-ci donnera bœuf pour bœuf en compensation et gardera pour lui le bœuf mort.
  - type: heading
    content: Les vols d'animaux
  '37':
  - type: text
    content: ' '
  - type: note
    content: Plusieurs éditions font commencer ici le chap. 22, dont la numérotation est décalée en conséquence. –  quatre 2S 12.6 ; Lc 19.8. –  du mouton ou de la chèvre 12.3n.
  - type: text
    content: Lorsqu'un homme vole un bœuf, un mouton ou une chèvre, s'il l'égorge ou le vend, il donnera cinq bœufs en compensation du bœuf et quatre têtes de petit bétail en compensation du mouton ou de la chèvre.
  '4':
  - type: note
    content: 'maître  : dans d''autres contextes le mot est aussi traduit par seigneur.'
  - type: text
    content: 'Si c''est son maître qui lui a donné une femme, et qu''elle lui ait donné des fils ou des filles, la femme et ses enfants appartiendront à son maître : il sortira seul. '
  '5':
  - type: text
    content: 'Si l''esclave dit : « J''aime mon maître, ma femme et mes fils, je ne veux pas sortir libre », '
  '6':
  - type: note
    content: 'de Dieu  : l''hébreu a l''article défini, de sorte qu''on pourrait comprendre du dieu ou des dieux (voir Gn 3.6n). LXX a interprété  : du tribunal de Dieu, Tg et Syr des juges (cf. Ps 82.1). Voir aussi 22.7. –  un poinçon  : litt. le poinçon.'
  - type: text
    content: alors son maître le fera approcher de Dieu ; il le fera approcher du battant ou du montant de la porte. Son maître lui percera l'oreille avec un poinçon, et l'esclave sera pour toujours à son service.
  '7':
  - type: text
    content: ' '
  - type: note
    content: La servante (hébreu ’ama ) joue ici le rôle d'une concubine , mais sans doute son statut, proche de celui de l'esclave (cf. v. 20,26s,32 ; 20.7), était-il différent de celui des épouses de second rang appelées concubines (hébreu pilégesh , 2S 5.13n) dans la Bible ; voir Gn 12.16n (le terme qui apparaît ici est celui de Gn 20.17 etc.).
  - type: text
    content: 'Lorsqu''un homme vend sa fille pour qu''elle soit servante, elle ne sortira pas comme sortent les esclaves. '
  '8':
  - type: note
    content: 'alors qu''il se l''était destinée  : d''après une lecture traditionnelle. Autre lecture traditionnelle qui ne l''a pas destinée ( ?), expression qui pourrait signifier alors qu''il n''a pas pris de décision à son sujet ou alors qu''il ne se l''est pas destinée  ; certains modifient le texte traditionnel pour lire alors qu''il l''a (ou ne l''a pas) connue, c.-à-d. qu''il a (ou n''a pas) eu de relations avec elle. –  il fera en sorte…  : c.-à-d., selon toute vraisemblance, il permettra à un proche parent de la dégager (cf. 13.13, même verbe hébreu) par une compensation. –  après l''avoir trahie  : autre traduction par traîtrise.'
  - type: text
    content: 'Si elle ne plaît pas à son maître, alors qu''il se l''était destinée, il fera en sorte qu''elle soit dégagée ; mais il n''aura pas le droit de la vendre à un peuple étranger, après l''avoir trahie. '
  '9':
  - type: text
    content: 'S''il la destine à son fils, il agira envers elle selon le droit des filles. '
