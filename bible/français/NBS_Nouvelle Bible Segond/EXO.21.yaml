        marker: fqa
        children:
        - type: text
          text: 'eu de relations avec elle. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il fera en sorte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d., selon toute vraisemblance, il permettra à un proche parent de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dégager '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 13.13, même verbe hébreu) par une compensation. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: après l'avoir trahie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par traîtrise.
      marker-yv: yv-n
    - type: text
      text: 'Si elle ne plaît pas à son maître, alors qu''il se l''était destinée, il fera en sorte qu''elle soit dégagée ; mais il n''aura pas le droit de la vendre à un peuple étranger, après l''avoir trahie. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'S''il la destine à son fils, il agira envers elle selon le droit des filles. '
