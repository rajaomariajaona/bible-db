document_id: EZK.40,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: VISION DU TEMPLE
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'La vingt-cinquième année… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 573 av. J.-C. (1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'commencement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ro'sh ha-shana
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', nom encore donné aujourd''hui au nouvel an juif (septembre-octobre) qui correspond au début du septième mois de l''année prescrite en Ex 12.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le dixième jour du mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Lv 16.29 ; 25.9s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quatorze ans après…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 33.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: là-bas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 48.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'La vingt-cinquième année de notre exil, au commencement de l''année, le dixième jour du mois, quatorze ans après la ruine de la ville, ce jour même la main du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fut sur moi, et il me conduisit là-bas. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''un côté… de l''autre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de chaque côté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'ici… d'ici
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'Les loges de la porte qui donnait sur l''est : trois d''un côté et trois de l''autre ; toutes les trois avaient la même dimension, et les piliers de chaque côté avaient aussi la même dimension. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 41.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de l'entrée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'ouverture
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dix coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '≈ 5,2 m ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'treize coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ≈ 6,8 m.
      marker-yv: yv-n
    - type: text
      text: 'Il mesura la largeur de l''entrée de la porte : dix coudées, et la longueur de la porte : treize coudées. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un espace
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot signifie habituellement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'frontière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: territoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on pourrait éventuellement comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une barrière
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: d'un côté et de l'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sans doute d''un couloir central (cf. v. 7). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: six coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 7 (une canne).'
      marker-yv: yv-n
    - type: text
      text: 'Il y avait devant les loges un espace d''une coudée d''un côté et de l''autre ; chaque loge avait six coudées d''un côté, et six coudées de l''autre. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'au toit de l'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jusqu'à son toit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'paroi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'toit. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'L''expression signifierait alors '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du fond d'une loge à l'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vingt-cinq coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '≈ 13 m. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entre les deux entrées opposées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entrée face à entrée.
      marker-yv: yv-n
    - type: text
      text: 'Il mesura la porte depuis le toit d''une loge jusqu''au toit de l''autre. Il y avait une largeur de vingt-cinq coudées entre les deux entrées opposées. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte très obscur et traduction conjecturale. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les piliers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le vestibule
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soixante coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(≈ 31,5 m) LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vingt.
      marker-yv: yv-n
    - type: text
      text: 'Il fit de même pour les piliers : soixante coudées. Vers le pilier, la cour était tout autour de la porte. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cinquante coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ≈ 26 m.
      marker-yv: yv-n
    - type: text
      text: 'L''espace entre la porte d''entrée et le vestibule de la porte intérieure était de cinquante coudées. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fenêtres grillagées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '41.16,26 (comme en 1R 6.4), sans doute pour surveiller les entrées du temple ; cf. 44.7,9,11 ; Es 56.6-8 ; 60.11 ; 1Ch 26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'branches de palmiers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 26,31 ; 41.18s,26 ; 1R 6.29,32,35 ; 7.36.
      marker-yv: yv-n
    - type: text
      text: Il y avait des fenêtres grillagées aux loges et à leurs piliers à l'intérieur de la porte, tout autour ; il y avait aussi des fenêtres dans les vestibules tout autour, vers l'intérieur ; des branches de palmiers étaient sculptées sur les piliers.
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cour extérieure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '42.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: salles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même terme v. 38,44ss ; 41.10 ; 42.1ss ; 44.19 ; 45.5 ; 46.19 ; cf. 2R 23.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 35.2 ; 36.10 ; 1Ch 28.12.'
      marker-yv: yv-n
    - type: text
      text: 'Il me conduisit dans la cour extérieure, où se trouvaient des salles et un dallage aménagés tout autour de la cour ; il y avait trente salles sur ce dallage. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le côté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme aux v. 40s,44 ; 41.2,26 ; 46.19 ; 47.2 ; voir Ex 27.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le dallage inférieur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la cour extérieure est située plus bas que la cour intérieure (cf. 41.7s).'
      marker-yv: yv-n
    - type: text
      text: 'Le dallage, sur le côté des portes, correspondait à la longueur des portes : c''était le dallage inférieur. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la distance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la largeur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; LXX précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cent coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(≈ 52 m) v. 23,27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'est et au nord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 27 ; 41.12-15.'
      marker-yv: yv-n
    - type: text
      text: 'Il mesura la distance depuis le devant de la porte Basse jusqu''à la limite extérieure de la cour intérieure : cent coudées, à l''est et au nord.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'visions divines '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une très haute montagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.2s ; 20.40+ ; 36.1ss ; 43.12 ; Mt 4.8/ / ; 17.1/ / ; Ap 21.10.'
      marker-yv: yv-n
    - type: text
      text: 'Dans des visions divines il m''amena en Israël et me déposa sur une très haute montagne ; au midi, il y avait là comme les bâtiments d''une ville. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: 'Il mesura la longueur et la largeur de la porte de la cour extérieure qui donnait sur le nord. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 13,15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'piliers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vestibules
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à partir d''ici et jusqu''au v. 37, la tradition textuelle hésite pour ces mots entre le singulier et le pluriel. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vingt-cinq coudées '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13.
      marker-yv: yv-n
    - type: text
      text: 'Ses loges, trois d''un côté et trois de l''autre, ses piliers et ses vestibules avaient la même dimension que la première porte, cinquante coudées de longueur et vingt-cinq coudées de largeur. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sept marches
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 6,26.'
      marker-yv: yv-n
    - type: text
      text: 'Ses fenêtres, ses vestibules, ses branches de palmiers, avaient la même dimension que la porte qui donnait sur l''est. On y montait par sept marches, devant lesquelles étaient ses vestibules. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 19+.
      marker-yv: yv-n
    - type: text
      text: 'Il y avait une porte à la cour intérieure, en face de la porte nord – et de même à l''est. Il mesura la distance d''une porte à l''autre : cent coudées.'
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Il me fit aller du côté sud, où se trouvait la porte qui donnait sur le sud. Il en mesura les piliers et les vestibules, qui avaient les mêmes dimensions. '
  '25':
  - type: usfm
    marker: p
    children:
