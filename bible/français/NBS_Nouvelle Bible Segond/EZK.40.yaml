document_id: EZK.40,104
type_code: fra
verses:
  '1':
  - type: heading
    content: VISION DU TEMPLE
  - type: text
    content: ' '
  - type: note
    content: 'La vingt-cinquième année… 573 av. J.-C. (1.2n). –  commencement (litt. tête ) de l''année  : hébreu ro''sh ha-shana , nom encore donné aujourd''hui au nouvel an juif (septembre-octobre) qui correspond au début du septième mois de l''année prescrite en Ex 12.1s. –  le dixième jour du mois  : cf. Lv 16.29 ; 25.9s. –  quatorze ans après…  : cf. 33.21n. –  là-bas  : cf. 48.35n.'
  - type: text
    content: 'La vingt-cinquième année de notre exil, au commencement de l''année, le dixième jour du mois, quatorze ans après la ruine de la ville, ce jour même la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut sur moi, et il me conduisit là-bas. '
  '10':
  - type: note
    content: 'd''un côté… de l''autre / de chaque côté  : litt. d''ici… d''ici, de même dans la suite.'
  - type: text
    content: 'Les loges de la porte qui donnait sur l''est : trois d''un côté et trois de l''autre ; toutes les trois avaient la même dimension, et les piliers de chaque côté avaient aussi la même dimension. '
  '11':
  - type: note
    content: 'Cf. 41.2. –  de l''entrée  : autre traduction de l''ouverture, de même dans la suite. –  dix coudées ≈ 5,2 m ; treize coudées ≈ 6,8 m.'
  - type: text
    content: 'Il mesura la largeur de l''entrée de la porte : dix coudées, et la longueur de la porte : treize coudées. '
  '12':
  - type: note
    content: 'un espace  : le mot signifie habituellement frontière ou territoire  ; on pourrait éventuellement comprendre une barrière. –  d''un côté et de l''autre, sans doute d''un couloir central (cf. v. 7). –  six coudées  : cf. v. 7 (une canne).'
  - type: text
    content: 'Il y avait devant les loges un espace d''une coudée d''un côté et de l''autre ; chaque loge avait six coudées d''un côté, et six coudées de l''autre. '
  '13':
  - type: note
    content: 'jusqu''au toit de l''autre  : litt. jusqu''à son toit  ; certains modifient le texte hébreu traditionnel pour lire paroi au lieu de toit. L''expression signifierait alors du fond d''une loge à l''autre. –  vingt-cinq coudées ≈ 13 m. –  entre les deux entrées opposées  : litt. entrée face à entrée.'
  - type: text
    content: 'Il mesura la porte depuis le toit d''une loge jusqu''au toit de l''autre. Il y avait une largeur de vingt-cinq coudées entre les deux entrées opposées. '
  '14':
  - type: note
    content: 'Texte très obscur et traduction conjecturale. –  les piliers  : LXX le vestibule. –  soixante coudées (≈ 31,5 m) LXX vingt.'
  - type: text
    content: 'Il fit de même pour les piliers : soixante coudées. Vers le pilier, la cour était tout autour de la porte. '
  '15':
  - type: note
    content: cinquante coudées ≈ 26 m.
  - type: text
    content: 'L''espace entre la porte d''entrée et le vestibule de la porte intérieure était de cinquante coudées. '
  '16':
  - type: note
    content: fenêtres grillagées 41.16,26 (comme en 1R 6.4), sans doute pour surveiller les entrées du temple ; cf. 44.7,9,11 ; Es 56.6-8 ; 60.11 ; 1Ch 26. –  branches de palmiers v. 26,31 ; 41.18s,26 ; 1R 6.29,32,35 ; 7.36.
  - type: text
    content: Il y avait des fenêtres grillagées aux loges et à leurs piliers à l'intérieur de la porte, tout autour ; il y avait aussi des fenêtres dans les vestibules tout autour, vers l'intérieur ; des branches de palmiers étaient sculptées sur les piliers.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'cour extérieure 42.1-3. –  salles  : même terme v. 38,44ss ; 41.10 ; 42.1ss ; 44.19 ; 45.5 ; 46.19 ; cf. 2R 23.11n  ; Jr 35.2 ; 36.10 ; 1Ch 28.12.'
  - type: text
    content: 'Il me conduisit dans la cour extérieure, où se trouvaient des salles et un dallage aménagés tout autour de la cour ; il y avait trente salles sur ce dallage. '
  '18':
  - type: note
    content: 'le côté  : même terme aux v. 40s,44 ; 41.2,26 ; 46.19 ; 47.2 ; voir Ex 27.14n. –  le dallage inférieur  : la cour extérieure est située plus bas que la cour intérieure (cf. 41.7s).'
  - type: text
    content: 'Le dallage, sur le côté des portes, correspondait à la longueur des portes : c''était le dallage inférieur. '
  '19':
  - type: note
    content: 'la distance  : litt. la largeur  ; LXX précise de la cour. –  cent coudées (≈ 52 m) v. 23,27. –  à l''est et au nord  : cf. v. 27 ; 41.12-15.'
  - type: text
    content: 'Il mesura la distance depuis le devant de la porte Basse jusqu''à la limite extérieure de la cour intérieure : cent coudées, à l''est et au nord.'
  '2':
  - type: note
    content: 'visions divines 1.1n. –  une très haute montagne  : cf. 6.2s ; 20.40+ ; 36.1ss ; 43.12 ; Mt 4.8/ / ; 17.1/ / ; Ap 21.10.'
  - type: text
    content: 'Dans des visions divines il m''amena en Israël et me déposa sur une très haute montagne ; au midi, il y avait là comme les bâtiments d''une ville. '
  '20':
  - type: text
    content: 'Il mesura la longueur et la largeur de la porte de la cour extérieure qui donnait sur le nord. '
  '21':
  - type: note
    content: 'V. 13,15. –  piliers / vestibules  : à partir d''ici et jusqu''au v. 37, la tradition textuelle hésite pour ces mots entre le singulier et le pluriel. –  vingt-cinq coudées v. 13.'
  - type: text
    content: 'Ses loges, trois d''un côté et trois de l''autre, ses piliers et ses vestibules avaient la même dimension que la première porte, cinquante coudées de longueur et vingt-cinq coudées de largeur. '
  '22':
  - type: note
    content: 'sept marches  : cf. v. 6,26.'
  - type: text
    content: 'Ses fenêtres, ses vestibules, ses branches de palmiers, avaient la même dimension que la porte qui donnait sur l''est. On y montait par sept marches, devant lesquelles étaient ses vestibules. '
  '23':
  - type: note
    content: V. 19+.
  - type: text
    content: 'Il y avait une porte à la cour intérieure, en face de la porte nord – et de même à l''est. Il mesura la distance d''une porte à l''autre : cent coudées.'
  '24':
  - type: text
    content: 'Il me fit aller du côté sud, où se trouvait la porte qui donnait sur le sud. Il en mesura les piliers et les vestibules, qui avaient les mêmes dimensions. '
  '25':
  - type: note
    content: V. 13,15.
  - type: text
    content: 'Cette porte et ses vestibules avaient des fenêtres tout autour, comme les autres fenêtres. Ils avaient cinquante coudées de longueur et vingt-cinq coudées de largeur. '
  '26':
  - type: note
    content: V. 16+.
  - type: text
    content: 'On y montait par sept marches, devant lesquelles étaient ses vestibules. Il y avait de chaque côté des branches de palmiers sur ses piliers. '
  '27':
  - type: note
    content: 'V. 19+. –  d''une porte à l''autre…  : d''après certains mss hébreux, LXX et Tg  ; texte hébreu traditionnel d''une porte à la porte qui donnait sur le sud.'
  - type: text
    content: 'La cour intérieure avait une porte qui donnait sur le sud. Il mesura la distance d''une porte à l''autre, vers le sud : cent coudées.'
  - type: heading
    content: Les cours et les portes intérieures
  '28':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 32-34,35-37 ; cf. 1R 6.36.
  - type: text
    content: 'Il me conduisit dans la cour intérieure, par la porte sud. Il mesura la porte sud qui avait les mêmes dimensions. '
  '29':
  - type: note
    content: V. 21,24s. –  cinquante et vingt-cinq coudées ≈ 26 et 13 m ; voir mesures, poids et monnaies.
  - type: text
    content: 'Ses loges, ses piliers et ses vestibules avaient la même dimension. Cette porte et ses vestibules avaient des fenêtres tout autour. Ils avaient cinquante coudées de longueur et vingt-cinq coudées de largeur. '
  '3':
  - type: note
    content: 'bronze 1.7. –  dans la main  : litt. dans sa main. –  cordeau  : cf. 47.3 ; Za 2.5. –  une canne ou un roseau  ; cf. Ap 11.1 ; 21.15. –  porte  : cf. 48.31n.'
  - type: text
    content: 'Il me conduisit là-bas ; il y avait là un homme dont l''aspect était comme celui du bronze ; il avait dans la main un cordeau de lin et une canne à mesurer, et il se tenait à la porte. '
  '30':
  - type: note
    content: LXX omet ce v. –  cinq coudées ≈ 2,60 m.
  - type: text
    content: 'Il y avait, tout autour, des vestibules de vingt-cinq coudées de longueur et de cinq de largeur. '
  '31':
  - type: note
    content: V. 26s.
  - type: text
    content: Ses vestibules aboutissaient à la cour extérieure. Il y avait des branches de palmiers sur ses piliers et huit marches pour y monter.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'dans la cour…  : LXX vers la porte qui donnait sur l''est  ; cf. v. 28-31.'
  - type: text
    content: 'Il me conduisit dans la cour intérieure en allant vers l''est. Il mesura la porte, qui avait les mêmes dimensions. '
  '33':
  - type: text
    content: 'Ses loges, ses piliers et ses vestibules avaient les mêmes dimensions. Cette porte et ses vestibules avaient des fenêtres tout autour. Ils avaient cinquante coudées de longueur et vingt-cinq coudées de largeur. '
  '34':
  - type: text
    content: Ses vestibules aboutissaient à la cour extérieure. Il y avait de chaque côté des branches de palmiers sur ses piliers et huit marches pour y monter.
  '35':
  - type: text
    content: ' '
  - type: note
    content: V. 28+ ; cf. 47.2.
  - type: text
    content: 'Il me conduisit vers la porte nord. Il la mesura : elle avait les mêmes dimensions. '
  '36':
  - type: text
    content: 'Elle avait ses loges, ses piliers et ses vestibules, et des fenêtres tout autour. Elle avait cinquante coudées de longueur et vingt-cinq coudées de largeur. '
  '37':
  - type: note
    content: 'piliers  : LXX ses vestibules, de même au v. 38.'
  - type: text
    content: Ses piliers aboutissaient à la cour extérieure. Il y avait de chaque côté des branches de palmiers sur ses piliers, et huit marches pour y monter.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'C''est là…  : LXX omet cette fin de v. et le début du v. 39. –  nettoyer les holocaustes  : cf. Lv 1.3n,9 ; 2Ch 4.6.'
  - type: text
    content: 'Il y avait une salle dont l''entrée était au milieu des piliers des portes. C''est là qu''on devait nettoyer les holocaustes. '
  '39':
  - type: note
    content: Cf. 42.13 ; 44.29 ; 46.20. –  sacrifice pour le péché Lv 4.1+. –  sacrifice de réparation Lv 5.6n,15+.
  - type: text
    content: 'Dans le vestibule de la porte, il y avait deux tables d''une part et deux tables d''autre part, sur lesquelles on devait immoler l''holocauste, le sacrifice pour le péché et le sacrifice de réparation. '
  '4':
  - type: note
    content: 'Humain 2.1n. –  Fais attention  : litt. mets ton cœur, de même en 44.5. –  pour regarder  : litt. pour qu''on te fasse voir  ; cf. Es 30.20s.'
  - type: text
    content: 'Cet homme me dit : Humain, regarde de tes yeux et écoute de tes oreilles ! Fais attention à tout ce que je vais te faire voir, car tu as été conduit ici pour regarder. Explique à la maison d''Israël tout ce que tu vas voir.'
  - type: heading
    content: La cour et les portes extérieures
  '40':
  - type: text
    content: 'Sur l''un des côtés extérieurs par où l''on montait, à l''entrée de la porte nord, il y avait deux tables ; et sur l''autre côté, vers le vestibule de la porte, il y avait deux tables. '
  '41':
  - type: text
    content: 'Il y avait, sur les côtés de la porte, quatre tables d''une part et quatre tables d''autre part : huit tables, sur lesquelles on devait immoler. '
  '42':
  - type: note
    content: une coudée et demie ≈ 80 cm.
  - type: text
    content: 'Il y avait encore pour les holocaustes quatre tables en pierres de taille, d''une coudée et demie de longueur, d''une coudée et demie de largeur et d''une coudée de hauteur ; on devait y poser les ustensiles avec lesquels on immolait les holocaustes et les sacrifices. '
  '43':
  - type: note
    content: 'bordures  : traduction incertaine, obtenue par une légère modification du texte hébreu traditionnel qui permet de lire lèvres  ; autres possibilités crochets ; rainures. –  un palme = 7,5 cm. –  adaptées à la Maison  : autre traduction aménagées à l''intérieur. –  offerte en présent  : cf. 20.28+.'
  - type: text
    content: Des bordures d'un palme étaient adaptées à la Maison tout autour ; et la viande offerte en présent devait être mise sur les tables.
  '44':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur ; au lieu des salles des chantres (cf. 1Ch 6.16-32 ; 9.33 ; 25), LXX porte deux salles  ; cf. 8.14-16.
  - type: text
    content: 'A l''extérieur de la porte intérieure il y avait les salles des chantres, dans la cour intérieure : l''une était sur le côté de la porte nord et donnait sur le sud, l''autre était sur le côté de la porte est et donnait sur le nord. '
  '45':
  - type: note
    content: 'qui assurent le service  : même formule Lv 8.35n  ; Nb 1.53n  ; 3.25 ; de même au v. 46 et en 44.8,14s ; 48.11 ; Ml 3.14n.'
  - type: text
    content: 'Il me dit : Cette salle qui donne sur le sud est pour les prêtres qui assurent le service de la Maison. '
  '46':
  - type: note
    content: 'fils de Tsadoq 43.19 ; 44.15 ; 48.11 ; Tsadoq, grand prêtre associé à David et à Salomon et dont le nom évoque la justice, est souvent présenté comme un modèle de fidélité incorruptible (2S 8.17 ; 15.24 ; 1R 1.8,32-34,38 ; 2.35 ; cf. 1Ch 5.34 ; 2Ch 31.10) ; c''est sans doute de lui que, plus tard, les sadducéens tireront le nom de leur parti ; il sera aussi l''une des principales références de la communauté de Qumrân  ; Ez attribue à sa classe sacerdotale le droit exclusif d''officier dans le sanctuaire (44.10-16) ; cf. Siracide 51.12 (selon un ms) : « Louez celui qui a choisi comme prêtres les fils de Sadoq (= Tsadoq). » –  se présentent  : autre traduction s''approchent  ; cf. 42.13n  ; 43.19 ; 44.15s ; 45.4 ; cf. 46.1-3. –  officier pour lui  : autre traduction être à son service  ; il s''agit ici d''un terme technique du service religieux, qu''Ez semble souvent distinguer du verbe habituellement traduit par servir (travailler en 48.18s, pour un service civil) ; voir cependant 44.11n,14n.'
  - type: text
    content: 'La salle qui donne sur le nord est pour les prêtres qui assurent le service de l''autel. Parmi les fils de Lévi, ce sont les fils de Tsadoq qui se présentent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' afin d''officier pour lui.'
  - type: heading
    content: Description du temple
  '47':
  - type: text
    content: ' '
  - type: note
    content: cent coudées ≈ 52 m ; voir mesures, poids et monnaies. –  autel 1R 8.64 ; 9.25.
  - type: text
    content: 'Il mesura la cour : cent coudées de longueur et cent coudées de largeur, en carré. L''autel était devant la Maison.'
  '48':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 5n  ; 1R 6. –  les piliers du vestibule (cf. 1R 6.3 ; 2Ch 3.4) : texte obscur, traduction d''après LXX. –  cinq et trois coudées ≈ 2,60 et 1,60 m respectivement. –  La largeur…  : LXX la largeur de la porte : quatorze coudées ; les épaulements ( ? cf. 41.2n) de la porte : trois coudées d''un côté et trois coudées de l''autre.'
  - type: text
    content: 'Il me conduisit dans le vestibule de la Maison. Il mesura les piliers du vestibule : cinq coudées d''un côté et cinq coudées de l''autre. La largeur de la porte était de trois coudées d''un côté et de trois coudées de l''autre. '
  '49':
  - type: note
    content: 'vingt coudées ≈ 10,50 m. –  onze coudées (≈ 5,80 m) : LXX douze. –  des marches  : LXX dix marches. –  colonnes 1R 7.15-22 ; 2Ch 3.15-17.'
  - type: text
    content: Le vestibule avait une longueur de vingt coudées et une largeur de onze coudées ; on y montait par des marches. Il y avait des colonnes près des piliers, l'une d'un côté, et l'autre de l'autre.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'La description qui commence ici présente de multiples difficultés de traduction, dues à la fois à un vocabulaire technique mal connu et à un nombre particulièrement important de variantes dans les mss hébreux et les versions anciennes. –  Une muraille extérieure  : voir 42.20 ; cf. Ex 19.12 ; Ac 21.28n  ; Ap 21.12-17. –  la Maison  : le terme englobe tous les bâtiments du temple ; sur le sanctuaire proprement dit ; cf. 40.48–41.4. –  chaque coudée…  : litt. d''une coudée et d''un palme  ; la coudée employée ici est donc la grande coudée (= 7 palmes ≈ 52,5 cm), celle qui mesure un palme (= 7,5 cm) de plus que la petite coudée (= 6 palmes ≈ 45 cm), celle-ci étant sans doute à identifier à la coudée d''homme de Dt 3.11 et à la coudée de l''ancienne mesure de 2Ch 3.3 ; la canne mesure dès lors un peu plus de 3 m (cf. 41.8n) ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Une muraille extérieure entourait la Maison de tous côtés. Dans la main de l''homme était une canne à mesurer de six coudées, chaque coudée ayant un palme de plus que la coudée ordinaire. Il mesura la largeur de la construction : une canne, et sa hauteur : une canne.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la porte (v. 3n) qui donnait sur l''est 42.15 ; 43.1,4+ ; 44.1. –  une canne en largeur rien que pour le seuil  : litt. un seul seuil, une canne en largeur  ; cette répétition est omise par LXX.'
  - type: text
    content: 'Il alla vers la porte qui donnait sur l''est et en monta les marches. Il mesura le seuil de la porte : une canne en largeur, une canne en largeur rien que pour le seuil. '
  '7':
  - type: note
    content: 'loge  : voir v. 10 ; cf. 44.3n. –  cinq coudées (≈ 2,60 m) : LXX un pilier. –  à l''intérieur  : litt. (du côté) de la Maison, c.-à-d. sur la face intérieure de l''enceinte, de même dans la suite.'
  - type: text
    content: 'Chaque loge était longue d''une canne et large d''une canne. Il y avait cinq coudées entre les loges. Le seuil de la porte, près du vestibule de la porte, à l''intérieur, avait une canne. '
  '8':
  - type: note
    content: 'à l''intérieur… (9)… de la porte  : la section de texte correspondant à cette répétition est absente de nombreux mss hébreux et des versions anciennes ; certains l''interprètent cependant comme l''indice de deux mesures successives (largeur et longueur p. ex.).'
  - type: text
    content: 'Il mesura le vestibule de la porte à l''intérieur : une canne. '
  '9':
  - type: note
    content: huit coudées ≈ 4,20 m ; deux coudées ≈ 1,05 m.
  - type: text
    content: 'Il mesura le vestibule de la porte : huit coudées ; et ses piliers : deux coudées ; le vestibule de la porte était à l''intérieur. '
