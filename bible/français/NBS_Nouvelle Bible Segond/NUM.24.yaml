document_id: NUM.24,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'comme les autres fois  : cf. 23.3,15. –  à la recherche  : autre traduction à la rencontre  ; cf. 22.36 ; 23.3. –  présages  : le mot hébreu, habituellement traduit par divination , rappelle celui qui désigne le serpent.'
  - type: text
    content: 'Voyant qu''il plaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' de bénir Israël, Balaam n''alla pas, comme les autres fois, à la recherche de présages : il se tourna du côté du désert. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'par trois fois  : cf. v. 5ss ; 23.7ss,11,18ss.'
  - type: text
    content: 'Balaq se mit en colère contre Balaam ; il battit des mains et dit à Balaam : C''est pour vouer mes ennemis à la malédiction que je t''ai appelé, et par trois fois déjà tu les as bénis ! '
  '11':
  - type: note
    content: 'chez toi  : litt. vers ton lieu. –  gloire  : cf. 22.17n  ; Jos 24.10 ; Mi 6.5. –  te prive  : le même verbe est traduit par empêcher en 22.16.'
  - type: text
    content: 'Maintenant, fuis, va-t''en chez toi ! J''avais dit que je te couvrirais de gloire, mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te prive de cette gloire !'
  - type: heading
    content: Balaam annonce l'avenir glorieux d'Israël
  '12':
  - type: text
    content: ' '
  - type: note
    content: messagers 22.5.
  - type: text
    content: 'Balaam répondit à Balaq : N''ai-je pas dit aux messagers que tu m''as envoyés : '
  '13':
  - type: note
    content: '22.17ss,35,38 ; Dt 18.18 ; 1R 22.14. –  de moi-même  : litt. de mon (propre) cœur (16.28n). –  pour faire du bien ou du mal  : l''expression peut signifier simplement pour faire quoi que ce soit, cf. 22.18n  ; mais on pourrait aussi comprendre, dans un sens plus fort, pour faire du bonheur ou du malheur  ; cf. Gn 2.17 ; 24.50n  ; 31.24n,29.'
  - type: text
    content: '« Quand Balaq me donnerait tout l''argent et l''or de sa maison, je ne pourrais, de moi-même, passer outre aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour faire du bien ou du mal ; je dirai ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dira. » '
  '14':
  - type: note
    content: 'Viens  : cf. 23.27n. –  je t''aviserai  : comme le verbe hébreu pourrait aussi signifier je te donnerai un conseil (Ex 18.19), on a parfois vu ici une allusion au mauvais conseil de Nb 31.16 (cf. Ap 2.14), mais le présent contexte n''autorise guère ce sens. –  dans la suite des temps (litt. des jours) Gn 49.1+ ; Dt 4.30 ; 31.29 ; Es 2.2n  ; Jr 23.20 ; 48.47 ; Os 3.5 ; Mi 4.1.'
  - type: text
    content: Maintenant je m'en vais vers mon peuple. Viens, je t'aviserai de ce que ce peuple fera à ton peuple dans la suite des temps.
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 3n.
  - type: text
    content: 'Il prononça son poème :'
  - type: text
    content: Déclaration de Balaam, fils de Béor,
  - type: text
    content: déclaration de l'homme qui a l'œil clairvoyant,
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El , cf. Gn 21.33n. –  la connaissance ou le savoir , cf. v. 4n. –  Très-Haut Gn 14.18ss.'
  - type: text
    content: déclaration de celui qui entend les paroles de Dieu,
  - type: text
    content: de celui qui connaît la connaissance du Très-Haut,
  - type: text
    content: de celui qui voit la vision du Puissant,
  - type: text
    content: de celui qui tombe à terre et dont les yeux s'ouvrent.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Je le vois / Je le contemple  : LXX je le montrerai / je le déclare heureux  ; cf. 23.9. –  mais ce n''est pas de près  : autre traduction mais ce n''est pas proche . –  Un astre ou une étoile , sans doute emblème du roi (comme le sceptre , cf. v. 7 ; Gn 49.10) en Es 14.12 ; Ez 32.7 ; cf. Mt 2.2ss ; Lc 1.78 ; Ap 2.26ss ; 22.16 ; Testament de Lévi 18.3 : « Son astre (celui du Prêtre nouveau) se lèvera dans le ciel comme celui d''un roi, resplendissant de la lumière de la Connaissance, comme le soleil brille en plein jour. » Testament de Juda 24.1ss : « Après cela, une étoile se lèvera pour vous de Jacob, dans la paix, et un homme se lèvera de ma descendance, comme un soleil de justice, marchant avec les hommes dans la douceur et la justice, et on ne trouvera en lui aucun péché. Les cieux s''ouvriront sur lui, pour répandre l''Esprit, la bénédiction du Père saint, et c''est lui qui répandra l''Esprit de grâce sur vous… Alors le sceptre de ma royauté resplendira, et de votre racine naîtra un tronc, d''où poussera un sceptre de justice pour les nations, pour juger et sauver tous ceux qui invoquent le Seigneur. » Un autre texte de Qumrân ( Ecrit de Damas 7.18ss) identifie l''astre et le sceptre au Maître de justice, fondateur de la communauté. –  sort  : litt. piétine  ; autres traductions est sorti victorieux, domine  ; LXX se lèvera  ; cf. Gn 49.8ss ; 2S 7.6-16 ; 23.1ss ; Ps 110. –  Jacob / Israël 23.7+. –  fracasse v. 8n. –  tempes ou flancs  : voir Jr 48.45n. –  Moab 21.27ss ; 2S 8.2-13 ; 1R 11.15. –  le crâne  : selon Smr, cf. Jr 48.45 ; le texte hébreu traditionnel porte il abat . –  fils de Seth  : c''est une expression assez proche qui est traduite par hommes violents (litt. fils de la violence ) en Jr 48.45 ; peut-être le mot que la vocalisation traditionnelle lit Seth (comme en Gn 4.25 ; Lc 3.38) désignait-il à l''origine une peuplade ( Shoutou ) associée à Moab dans plusieurs textes égyptiens et assyriens.'
  - type: text
    content: Je le vois – mais ce n'est pas maintenant.
  - type: text
    content: Je le contemple – mais ce n'est pas de près.
  - type: text
    content: Un astre sort de Jacob,
  - type: text
    content: un sceptre s'élève d'Israël.
  - type: text
    content: Il fracasse les tempes de Moab
  - type: text
    content: et le crâne de tous les fils de Seth.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale ; dans une citation du Règlement de la Guerre (Qumrân) le v. 19 précède le v. 18. –  Edom / Séir (= Esaü ) 20.14ss ; Gn 32.4+ ; 36.1+,8+ss ; 2S 8.14 ; Ez 35.2ss ; Ab 10 ; Ps 60.10 ; cf. Am 9.12 ; Ab 18. –  pays conquis  : litt. possession . –  déploie sa force  : même expression 1S 14.48 ; Ps 60.14 ; 118.15s ; Rt 4.11.'
  - type: text
    content: Edom sera pays conquis,
  - type: text
    content: Séir – ses ennemis – sera pays conquis.
  - type: text
    content: Israël déploie sa force.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'domine Ps 110.2n. –  des villes  : litt. de la ville , ou encore d''Ir (ville de Moab), 21.15n.'
  - type: text
    content: Celui qui sort de Jacob domine,
  - type: text
    content: il fait disparaître des villes tout survivant.
  - type: heading
    content: Balaam annonce la chute des ennemis d'Israël
  '2':
  - type: note
    content: 'campé  : litt. demeurant  ; cf. v. 5 ; voir aussi 2.2. –  le souffle (ou l''Esprit) de Dieu  : cf. 23.5,16 ; 2S 23.2 ; voir aussi Gn 41.38 ; Ex 31.3 ; Jg 6.34 ; 11.25 ; 1S 10.6,10 ; 19.20ss ; 2R 3.15 ; Es 42.1 ; 59.21 ; 61.1 ; Ez 11.5. –  fut sur lui  : autre traduction lui parvint, cf. Jr 1.2n  ; voir aussi Jg 3.10 ; 11.29 ; 1S 19.9,20,23 ; 2Ch 15.1 ; 20.14.'
  - type: text
    content: 'Balaam leva les yeux et vit Israël campé tribu par tribu. Alors le souffle de Dieu fut sur lui. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Amalec , population nomade au sud de Canaan ; cf. v. 7n  ; 13.29 ; 14.43 ; Gn 36.12 ; Ex 17.8ss ; Dt 25.17ss ; Jg 3.13 ; 6.33 ; 7.12 ; 1S 15.3ss ; 27.8. –  sa fin…  : litt. sa suite (ou son avenir ) se perd (ou périt ) à jamais  ; autre traduction sa postérité disparaîtra à jamais (23.10n).'
  - type: text
    content: 'Il vit Amalec. Il prononça son poème :'
  - type: text
    content: Amalec est la première des nations,
  - type: text
    content: mais sa fin, c'est de disparaître à jamais.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'les Caïnites ou Qénites , au sud de la mer Morte, à l''ouest de la Araba 10.29n  ; Gn 15.19 ; Jg 1.16 ; 4.11 ; 1S 15.6 ; 27.10 ; 30.29. –  ton nid  : le terme hébreu fait assonance avec le nom des Caïnites (cf. v. 22) ; voir aussi Jr 49.16 ; Ab 3s.'
  - type: text
    content: 'Il vit les Caïnites. Il prononça son poème :'
  - type: text
    content: Ton habitation est solide,
  - type: text
    content: ton nid est posé sur le roc.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur jusqu''au v. 24, traduit diversement par les versions anciennes. –  Caïn  : en hébreu Qayîn , cf. v. 21n  ; Gn 4.1n  ; Jg 4.11 ; certains modifient le texte hébreu pour lire, p. ex.  : ton nid (v. 21n) sera décombres, et ta demeure un tas d''ordures . –  quand  : litt. jusqu''à quand , cf. Ps 74.9 ; 79.5. –  Ashour  : ce nom désigne habituellement l''Assyrie ou son ancienne capitale (cf. Gn 10.11n  ; 2R 15.29), mais il s''agit peut-être ici d''un autre peuple situé plus au sud, plus près des précédents (peut-être au centre de Canaan) ; cf. Gn 25.3 ; 2S 2.9 et les noms voisins en Gn 10.11 ; 25.18 ; 1S 27.8 ; voir aussi Os 5.13 ; 10.6 ; Ps 83.9.'
  - type: text
    content: Mais Caïn sera brûlé
  - type: text
    content: quand Ashour t'emmènera captif.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Dans LXX le v. commence par il vit Og , cf. v. 20s ; 21.33ss. –  Quel malheur…  : texte et traduction incertains ; quelques-uns modifient le texte hébreu traditionnel pour lire, p. ex., les îles se rassemblent au nord  ; cf. v. 24. –  Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: 'Il prononça son poème :'
  - type: text
    content: Quel malheur ! Qui vivra quand Dieu l'aura fait ?
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Chypre  : hébreu Kittim  ; ce mot désigne habituellement Chypre, puis plus généralement les Grecs, cf. Dn 11.30n (Vg d''Italie ) ; certains modifient le texte hébreu traditionnel pour lire des navires des extrémités de la mer  ; les envahisseurs pourraient être ici les Philistins ; cf. 1S 4.1ss ; 13.19ss ; 17 ; 2S 5.17ss. –  Héber  : c''est le nom qui a donné hébreu d''après Gn 10.21nss ; 11.14ss ; 14.13 ; 1S 14.21 ; certains y voient ici une désignation très générale de la Transeuphratène (en hébreu ‘éver-nahar , voir Esd 4.10n), donc de l''ensemble des peuples mentionnés ci-dessus.'
  - type: text
    content: Mais des navires viendront de Chypre,
  - type: text
    content: ils affligeront Ashour, ils affligeront Héber ;
  - type: text
    content: lui aussi disparaîtra à jamais !
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 31.8,16 ; Mi 6.5. –  retourna chez lui  : litt. se leva, s''en alla et retourna à son lieu.'
  - type: text
    content: Balaam retourna chez lui, et Balaq aussi s'en alla de son côté.
  '3':
  - type: note
    content: 'V. 15s. –  poème 23.7n. –  Déclaration  : cf. 2S 23.1 ; Jr 23.31 ; voir aussi Am 3.10. –  l''œil clairvoyant  : traduction incertaine ; on pourrait aussi comprendre l''œil parfait (d''après LXX), l''œil ouvert (d''après Syr), voire l''œil fermé (d''après Vg  ; pour le recueillement préalable à l''inspiration) ; de même au v. 15.'
  - type: text
    content: 'Il prononça son poème :'
  - type: text
    content: Déclaration de Balaam, fils de Béor,
  - type: text
    content: déclaration de l'homme qui a l'œil clairvoyant,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'de Dieu (hébreu ’El , cf. Gn 21.33n) : un ms hébreu ajoute de celui qui connaît la connaissance du Très-Haut , comme au v. 16. –  du Puissant Gn 17.1n  ; Ex 6.3. –  qui tombe v. 16 ; certains comprennent qui se prosterne (cf. 22.31), mais il s''agit sans doute ici d''une manifestation extatique ; cf. 1S 19.24 ; voir aussi Gn 17.3 ; Jos 5.14. –  s''ouvrent ou se dessillent , litt. sont découverts.'
  - type: text
    content: déclaration de celui qui entend les paroles de Dieu,
  - type: text
    content: de celui qui voit la vision du Puissant,
  - type: text
    content: de celui qui tombe à terre et dont les yeux s'ouvrent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'tentes / demeures  : cf. v. 2 ; Jg 8.11 ; 2S 7.6 ; voir aussi Ps 84.2. –  Jacob / Israël 23.7+.'
  - type: text
    content: Qu'elles sont belles, tes tentes, Jacob,
  - type: text
    content: tes demeures, Israël !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 2.8ss ; Jr 17.7s ; Ez 47.1ss ; Ps 1.3 ; Ap 22.2. –  comme des oueds ou comme des torrents  ; d''autres comprennent comme des palmiers  ; cf. Gn 26.17n. –  comme des aloès…  : LXX comme les tentes qu''a dressées le Seigneur , les mots correspondants à tentes et à aloès (Ps 45.9) étant presque homonymes en hébreu ; cf. Ps 104.16.'
  - type: text
    content: Elles s'étendent comme des oueds,
  - type: text
    content: comme des jardins près d'un fleuve,
  - type: text
    content: 'comme des aloès que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a plantés,'
  - type: text
    content: comme des cèdres le long des eaux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale ; certains le remanient pour lire ses nuages déversent les eaux, et ses nuées débordent d''eaux abondantes (cf. 20.1n). LXX un homme sortira de sa semence (ou descendance ) et dominera sur des nations nombreuses  ; cf. v. 17 ; Gn 3.15 ; 12.7 ; 49.3s,10 ; 2S 7.12 ; voir aussi Es 9.5 ; 11.1 ; Ps 72.6 ; Jn 7.37s. –  Son roi  : LXX sa royauté 23.21n. –  Agag  : ce nom, qui est au temps de Saül celui d''un roi d’ Amalec (v. 20+), semble évoquer l''idée de fureur ou de violence ; cf. 1S 15.8ss ; Est 3.1n  ; Smr et LXX ont lu Gog (cf. Ez 38–39 ; Ap 20.7).'
  - type: text
    content: L'eau coule de ses seaux,
  - type: text
    content: sa semence est fécondée par de grandes eaux.
  - type: text
    content: Son roi s'élève au-dessus d'Agag,
  - type: text
    content: et son royaume devient puissant.
  '8':
  - type: text
    content: ' '
  - type: note
    content: '23.22n. –  Dieu  : hébreu ’El , cf. v. 4n. –  le fait sortir d''Egypte ou, d''après Smr et LXX, l''a guidé depuis l''Egypte  ; cf. Mt 2.15. –  ses adversaires  : cf. Gn 49.23 (autre terme). –  les crible de ses flèches  : autre traduction fracasse leurs reins  ; cf. v. 17 où le même verbe est traduit par fracasser.'
  - type: text
    content: Dieu le fait sortir d'Egypte,
  - type: text
    content: il est pour lui comme les cornes de l'aurochs.
  - type: text
    content: Il dévore les nations de ses adversaires,
  - type: text
    content: il brise leurs os, il les crible de ses flèches.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Il s''accroupit…  : cf. 23.24 ; Gn 49.9. –  Béni…  : cf. v. 22+ ; Gn 12.3 ; 27.29.'
  - type: text
    content: Il s'accroupit, il se couche comme un lion,
  - type: text
    content: 'comme une lionne : qui le fera lever ?'
  - type: text
    content: Béni soit quiconque te bénira,
  - type: text
    content: maudit soit quiconque te maudira !
