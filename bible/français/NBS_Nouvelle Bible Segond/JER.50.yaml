      marker-yv: yv-n
    - type: text
      text: Votre mère est dans une grande honte,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: celle qui vous a mis au monde rougit ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est la dernière des nations,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: c'est un désert, une terre desséchée, une plaine aride.
