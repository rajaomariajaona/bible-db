document_id: JER.50,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ruine de Babylone, délivrance d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'Babylone  : cf. 46.13 ; voir aussi 25.26n  ; Es 13–14 ; 21.1-10 ; 47 ; 48.14 ; Ps 137.8s ; Ap 18. –  Chaldéens 21.4n.'
  - type: text
    content: 'Parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononça au sujet de Babylone, du pays des Chaldéens, par l''intermédiaire de Jérémie, le prophète.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Za 2.13.
  - type: text
    content: La Chaldée sera livrée comme butin,
  - type: text
    content: tous ceux qui y prendront du butin seront rassasiés.
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'réjouissez-vous…  : une autre tradition textuelle lit les impératifs de ce v. au féminin singulier ( réjouis-toi [femme]… ) ; autre traduction possible  : bien que vous vous réjouissiez…  ; voir cependant Lm 4.21. –  mon patrimoine 10.16+. –  une génisse agile  : autre traduction qui foule (le grain) ; des versions anciennes ont lu une génisse (ou un taurillon ) dans l''herbe . –  étalons 47.3+.'
  - type: text
    content: Oui, réjouissez-vous, exultez,
  - type: text
    content: vous qui avez dépouillé mon patrimoine !
  - type: text
    content: Oui, bondissez comme une génisse agile,
  - type: text
    content: hennissez comme des étalons !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Votre mère  : la ville de Babylone. –  un désert… 51.43.'
  - type: text
    content: Votre mère est dans une grande honte,
  - type: text
    content: celle qui vous a mis au monde rougit ;
  - type: text
    content: elle est la dernière des nations,
  - type: text
    content: c'est un désert, une terre desséchée, une plaine aride.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'la colère  : cf. 4.8+ (autre terme) ; 10.10 ; 21.5+ ; voir aussi Es 13.13 ; 34.2. –  dévastée et sera atterré traduisent deux termes apparentés ; cf. 18.16n  ; 49.17+ ; 51.37.'
  - type: text
    content: 'A cause de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: elle ne sera plus habitée,
  - type: text
    content: elle sera entièrement dévastée.
  - type: text
    content: Quiconque passera près de Babylone
  - type: text
    content: sera atterré et sifflera d'horreur à cause de toutes ses plaies.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'V. 9,29 ; 51.11. –  Car elle a péché…  : ce dernier vers est omis par LXX ; cf. v. 7.'
  - type: text
    content: Rangez-vous contre Babylone, tout autour,
  - type: text
    content: vous tous qui bandez l'arc !
  - type: text
    content: Tirez contre elle,
  - type: text
    content: n'épargnez pas les flèches !
  - type: text
    content: 'Car elle a péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'guerrières  : sous-entendu dans le texte ; cf. 49.2+. –  Elle tend les mains  : cf. Lm 5.6. –  murailles 51.44,58. –  vengeance v. 28 ; 5.9+ ; 11.20+ ; 46.10 ; 51.6,11,36 ; cf. 50.29 ; Dt 32.35 ; Ps 94.1 ; Ap 18.6.'
  - type: text
    content: De tous côtés, lancez des acclamations guerrières contre elle !
  - type: text
    content: Elle tend les mains ;
  - type: text
    content: ses fondations s'écroulent ;
  - type: text
    content: 'ses murailles sont rasées :'
  - type: text
    content: 'c''est la vengeance du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Vengez-vous sur elle !
  - type: text
    content: Faites-lui comme elle a fait !
  '16':
  - type: text
    content: ' '
  - type: note
    content: l'épée du destructeur 25.38n. –  que chacun s'en retourne… 46.16 ; 51.9 ; Es 13.14.
  - type: text
    content: Retranchez de Babylone celui qui sème,
  - type: text
    content: et celui qui manie la faucille au temps de la moisson !
  - type: text
    content: Devant l'épée du destructeur,
  - type: text
    content: que chacun s'en retourne vers son peuple,
  - type: text
    content: que chacun fuie vers son pays !
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'mouton égaré  : cf. v. 6+. –  lions 2.15+ ; Es 5.29. –  chassé  : comme en 23.2n. –  Le roi d''Assyrie…  : allusion à la chute de Samarie en 722/1 av. J.-C. (cf. 2R 17). –  Nabuchodonosor 21.2n  ; cf. 51.34 ; 52.4ss.'
  - type: text
    content: Israël est un mouton égaré
  - type: text
    content: que les lions ont chassé.
  - type: text
    content: 'Le roi d''Assyrie l''a dévoré le premier ; le dernier à lui briser les os, c''est Nabuchodonosor, roi de Babylone. '
  '18':
  - type: note
    content: 'Je ferai rendre des comptes au 6.15n. –  comme j''ai fait rendre des comptes au…  : cf. 46.2n  ; Es 10.12.'
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je ferai rendre des comptes au roi de Babylone et à son pays, comme j''ai fait rendre des comptes au roi d''Assyrie.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 23.3 ; Ez 34.13s. –  Carmel / Bashân / Galaad Mi 7.14 ; cf. Es 33.9n. –  il sera rassasié  : autre traduction son désir sera comblé (cf. 2.24n).'
  - type: text
    content: Je ramènerai Israël dans son domaine ;
  - type: text
    content: il aura ses pâturages du Carmel et du Bashân,
  - type: text
    content: il sera rassasié
  - type: text
    content: dans la région montagneuse d'Ephraïm et du Galaad.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Annoncez-le… cf. 46.14. –  dressez une bannière ! Faites-le entendre  : omis par LXX  ; cf. 4.6 ; Es 13.2. –  Babylone est prise v. 24 ; 51.31. –  Bel signifie maître ou seigneur , comme Baal  ; c''est, entre autres, un titre de Merodak ou Mardouk , dieu de Babylone (cf. 51.44 ; Es 46.1). –  Ses statues  : le terme, synonyme de celui qui apparaît au vers suivant, est habituellement traduit par idoles (1S 31.9 ; 2S 5.21 ; Es 10.11 ; 46.1 ; Os 4.17 ; 8.4 ; 13.2 ; 14.9 ; Mi 1.7 ; Za 13.2 ; Ps 106.36,38 ; 115.4 ; 135.15 ; 1Ch 10.9 ; 2Ch 24.18). –  ses idoles  : cf. v. 38 ; Es 21.9 ; sur le terme hébreu, à connotation extrêmement péjorative, voir Lv 26.30n.'
  - type: text
    content: Annoncez-le parmi les nations,
  - type: text
    content: faites-le entendre,
  - type: text
    content: dressez une bannière !
  - type: text
    content: Faites-le entendre, ne le cachez pas !
  - type: text
    content: 'Dites : Babylone est prise !'
  - type: text
    content: Bel est couvert de honte,
  - type: text
    content: Merodak est terrifié !
  - type: text
    content: Ses statues sont couvertes de honte,
  - type: text
    content: ses idoles sont terrifiées !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'on cherchera la faute…  : cf. Mi 7.18s ; Ps 10.15n. –  je pardonnerai 31.34 ; cf. Es 33.24. –  reste 11.23+.'
  - type: text
    content: En ces jours-là, en ce temps-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: on cherchera la faute d'Israël,
  - type: text
    content: et elle ne sera plus
  - type: text
    content: – le péché de Juda,
  - type: text
    content: et on ne le trouvera plus ;
  - type: text
    content: car je pardonnerai au reste que j'aurai laissé.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Merataïm rappelle l''akkadien (babylonien) marratôn , qui signifie lagune et désigne la région à l''embouchure du Tigre et de l''Euphrate ; de par sa vocalisation traditionnelle, le mot signifie en hébreu double révolte ou double amertume . –  Peqod désigne peut-être un peuple de la même région (cf. Ez 23.23n) ; mais ce nom évoque en hébreu le verbe habituellement traduit par faire rendre des comptes à ou intervenir (contre) ; cf. v. 18,27 ; 6.15n. –  Ruine (ou massacre , si l''on rattache ce verbe au mot pour épée ) leurs arrières (peut-être au sens de rescapés ou de descendants ), frappe-les d''anathème (v. 26 ; 25.9+ ; 51.3) : les trois termes hébreux font assonance ; voir bénédiction.'
  - type: text
    content: Attaque le pays de Merataïm,
  - type: text
    content: les habitants de Peqod !
  - type: text
    content: Ruine leurs arrières, frappe-les d'anathème !
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: Fais exactement ce que je t'ai ordonné !
  '22':
  - type: text
    content: ' '
  - type: note
    content: fracas ou désastre  ; cf. 4.6n  ; 51.54.
  - type: text
    content: Ce sont des cris de guerre dans le pays
  - type: text
    content: et un grand fracas.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'le marteau  : cf. 23.29 ; voir aussi 51.20n,41 ; Es 10.5 ; 14.5. –  dévastée v. 3+ ; Ap 18.19.'
  - type: text
    content: Comment ! Il est cassé, brisé,
  - type: text
    content: le marteau qui frappait toute la terre !
  - type: text
    content: Comment ! Babylone est dévastée parmi les nations !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Je t''ai tendu…  : LXX ils te tendront (ou on te tendra ) un piège . –  trouvée et capturée  : cf. 48.7. –  provoqué  : même verbe Dt 2.5+ ; 2R 14.10 ; Pr 15.18+ ; Dn 11.10n.'
  - type: text
    content: Je t'ai tendu un piège,
  - type: text
    content: et tu as été prise, Babylone,
  - type: text
    content: sans que tu le saches ;
  - type: text
    content: tu as été trouvée et capturée,
  - type: text
    content: 'parce que tu as provoqué le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'son arsenal  : litt. son trésor  ; cf. Dt 28.12 ; Ps 33.7n  ; Jb 38.22n. –  les armes (ou les instruments, les ustensiles  ; le mot signifie d''une façon générale objet et, dans certains contextes, récipient, poterie ) de sa fureur , comme en Es 13.5 ; cf. Rm 9.21ns. –  des Armées  : omis par LXX.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a ouvert son arsenal'
  - type: text
    content: et il en a tiré les armes de sa fureur ;
  - type: text
    content: c'est là l'œuvre
  - type: text
    content: 'du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: au pays des Chaldéens.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'à elle , c.-à-d. à Babylone. –  du bout du monde  : on pourrait aussi comprendre de toutes les directions (formule analogue pour d''une extrémité à l''autre en 51.31). –  Empilez-la…  : certains modifient légèrement le texte hébreu traditionnel pour traduire mettez-la en tas  ; on a aussi compris élevez contre elle des remblais (ouvrages de siège). –  anathème v. 21+.'
  - type: text
    content: Venez à elle du bout du monde,
  - type: text
    content: ouvrez ses granges,
  - type: text
    content: Empilez-la comme les tas de gerbes !
  - type: text
    content: 'Frappez-la d''anathème :'
  - type: text
    content: qu'il n'y ait en elle aucun reste !
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Tuez ou massacrez  ; cf. v. 21n. –  taureaux  : cf. Es 34.7 ; Ez 39.18 ; Ps 22.13. –  descendent à l''abattoir 48.15+. –  le temps où…  : cf. v. 31 ; 6.15n  ; 46.21.'
  - type: text
    content: Tuez tous ses taureaux,
  - type: text
    content: qu'ils descendent à l'abattoir !
  - type: text
    content: Quel malheur pour eux ! Leur jour est arrivé,
  - type: text
    content: le temps où ils rendront des comptes.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'fuyards v. 8. –  annoncent  : cf. v. 2 ; 51.10. –  vengeance v. 15+. –  la vengeance de son temple  : omis par LXX ; cf. 51.11.'
  - type: text
    content: Les cris des fuyards, des rescapés du pays de Babylone
  - type: text
    content: 'annoncent dans Sion la vengeance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: la vengeance de son temple !
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'des archers  : en modifiant légèrement la vocalisation traditionnelle, qui ferait lire les nombreux ou la multitude  ; cf. v. 14+. –  Payez-la de retour ou rendez-lui  ; cf. v. 15 ; 16.18n  ; 51.6,24,56 ; Ab 15 ; Ps 137.8 ; Ap 18.6. –  arrogante v. 31s ; cf. 48.26+. –  le Saint d''Israël 51.5 ; Es 1.4+.'
  - type: text
    content: Appelez contre Babylone des archers,
  - type: text
    content: tous ceux qui manient l'arc !
  - type: text
    content: Dressez votre camp autour d'elle,
  - type: text
    content: que personne n'échappe !
  - type: text
    content: Payez-la de retour selon son action,
  - type: text
    content: faites-lui exactement ce qu'elle a fait !
  - type: text
    content: 'Car elle s''est montrée arrogante envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: envers le Saint d'Israël.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'du nord  : cf. v. 9,41 ; 1.14n  ; 51.48. –  lieu dévasté v. 13,23 ; 51.29,37,43,62 ; Es 13.9. –  depuis les humains… 4.25+ ; cf. 9.9.'
  - type: text
    content: Car du nord une nation l'envahit,
  - type: text
    content: elle réduit son pays en un lieu dévasté,
  - type: text
    content: il n'y a plus d'habitants ;
  - type: text
    content: depuis les humains jusqu'aux bêtes, tout s'en est allé.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 49.26 ; 51.3s.
  - type: text
    content: 'C''est pourquoi ses jeunes gens tomberont sur ses places, et tous ses hommes de guerre seront réduits au silence en ce jour-là – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''oppose à toi  : cf. 21.13n  ; 51.25. –  arrogante v. 29+. –  ton jour  : cf. Ap 18.8. –  le temps… v. 27+ ; 6.15n  ; 49.8n.'
  - type: text
    content: Je m'oppose à toi, arrogante !
  - type: text
    content: '– déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées.'
  - type: text
    content: Car ton jour est arrivé,
  - type: text
    content: le temps où je te ferai rendre des comptes.
  '32':
  - type: text
    content: ' '
  - type: note
    content: personne ne la relèvera 51.64. –  je mettrai le feu 21.14.
  - type: text
    content: L'arrogante va trébucher et tomber,
  - type: text
    content: et personne ne la relèvera ;
  - type: text
    content: je mettrai le feu à ses villes,
  - type: text
    content: et il dévorera tous les alentours.
  - type: heading
    content: Le Seigneur, sauveur d'Israël
  '33':
  - type: text
    content: ' '
  - type: note
    content: refusent de les relâcher Es 14.17.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées :'
  - type: text
    content: les Israélites et les Judéens sont ensemble opprimés ;
  - type: text
    content: tous ceux qui les ont emmenés captifs les retiennent
  - type: text
    content: et refusent de les relâcher.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'rédempteur Es 41.14n. –  dont le nom… 10.16+ ; 51.29. –  il défendra leur cause  : la tournure correspondante a parfois une valeur intensive, qu''on pourrait ici traduire il défendra résolument leur cause , ou il défendra leur cause jusqu''au bout 51.36 ; Es 51.22. –  donner la tranquillité et faire trembler font assonance en hébreu  : hirgia‘ ( rendre tranquille , cf. 31.2 ; mais le même verbe est traduit par agiter en 31.35) et hirgiz ( faire trembler, ébranler, secouer ). –  au pays  : autre traduction à la terre.'
  - type: text
    content: Mais leur rédempteur est fort,
  - type: text
    content: 'lui dont le nom est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ;'
  - type: text
    content: il défendra leur cause
  - type: text
    content: afin de donner la tranquillité au pays
  - type: text
    content: et de faire trembler les habitants de Babylone.
  - type: heading
    content: Le projet du Seigneur contre Babylone
  '35':
  - type: text
    content: ' '
  - type: note
    content: L'épée 46.10+. –  ses princes et ses sages 51.57.
  - type: text
    content: L'épée contre les Chaldéens,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: contre les habitants de Babylone,
  - type: text
    content: ses princes et ses sages !
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'les vantards  : cf. 48.30 ; un terme akkadien dont la transcription hébraïque serait très proche signifie devin(s)  ; cf. Es 44.25.'
  - type: text
    content: L'épée contre les vantards !
  - type: text
    content: Qu'ils deviennent fous !
  - type: text
    content: L'épée contre ses guerriers !
  - type: text
    content: Qu'ils soient terrifiés !
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'ses chevaux et ses chars  : cf. 51.21. –  population mêlée 25.20n. –  Qu''ils deviennent des femmes  : les femmes, considérées comme faibles, ne participaient habituellement pas aux combats ; cf. 51.30 ; Es 19.16 ; Na 3.13. –  ses trésors  : cf. v. 25n.'
  - type: text
    content: L'épée contre ses chevaux et ses chars,
  - type: text
    content: contre toute la population mêlée qui est au milieu d'elle !
  - type: text
    content: Qu'ils deviennent des femmes !
  - type: text
    content: L'épée contre ses trésors !
  - type: text
    content: Qu'ils soient pillés !
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'La sécheresse  : le mot hébreu ainsi traduit est composé des mêmes consonnes que le mot pour l''épée au v. 37 ; cf. 51.36. –  ils ont perdu la tête…  : autre traduction ils se vantent des terreurs , ce dernier terme désignant les statues des dieux babyloniens (cf. v. 2).'
  - type: text
    content: La sécheresse contre ses eaux !
  - type: text
    content: Qu'elles tarissent !
  - type: text
    content: Car c'est un pays de statues,
  - type: text
    content: ils ont perdu la tête devant les terreurs.
  '39':
  - type: text
    content: ' '
  - type: note
    content: Cf. 51.37 ; voir Es 13.19-22 et notes.
  - type: text
    content: C'est pourquoi les habitants du désert y habiteront avec les hyènes,
  - type: text
    content: et les autruches y feront leur habitation ;
  - type: text
    content: elle ne sera plus jamais habitée ;
  - type: text
    content: de génération en génération on n'y demeurera plus.
  '4':
  - type: text
    content: ' '
  - type: note
    content: Cf. 3.18+ ; 31.31. –  ils marcheront en pleurant… 31.9 ; cf. Os 3.5.
  - type: text
    content: En ces jours-là, en ce temps-là
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: les Israélites et les Judéens reviendront ensemble ;
  - type: text
    content: ils marcheront en pleurant
  - type: text
    content: 'et chercheront le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu.'
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Comme… de Sodome et de Gomorrhe 49.18+ ; formule identique en Es 13.19 ; Am 4.11. –  séjournera  : cf. 49.18n.'
  - type: text
    content: Comme lors de la destruction divine de Sodome et de Gomorrhe, et des villes voisines,
  - type: text
    content: '– déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  –'
  - type: text
    content: personne n'y habitera plus,
  - type: text
    content: aucun être humain n'y séjournera.
  '41':
  - type: text
    content: ' '
  - type: note
    content: V. 3+. – Cf. 6.22-24 et les notes.
  - type: text
    content: Un peuple vient du nord,
  - type: text
    content: une grande nation et des rois puissants
  - type: text
    content: qui s'éveillent des confins de la terre.
  '42':
  - type: text
    content: ' '
  - type: note
    content: 'ils grondent comme la mer 5.22 ; 6.23 ; 51.55 ; Es 17.12. –  Babylone la belle  : litt. fille de Babylone  ; cf. 46.11n  ; 51.33n.'
  - type: text
    content: Ils brandissent l'arc et le javelot ;
  - type: text
    content: ils sont cruels, sans compassion ;
  - type: text
    content: ils grondent comme la mer ;
  - type: text
    content: ils sont montés sur des chevaux,
  - type: text
    content: ils sont rangés comme un seul homme pour le combat,
  - type: text
    content: contre toi, Babylone la belle !
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'il a perdu courage  : litt. ses mains se sont affaiblies  ; cf. 6.24+.'
  - type: text
    content: Le roi de Babylone a entendu la nouvelle,
  - type: text
    content: il a perdu courage ;
  - type: text
    content: la détresse l'a saisi,
  - type: text
    content: des douleurs comme celles d'une femme qui accouche…
  '44':
  - type: text
    content: ' '
  - type: note
    content: Cf. 49.19-21 et les notes.
  - type: text
    content: Tel un lion, il monte des fourrés du Jourdain
  - type: text
    content: contre un domaine inépuisable ;
  - type: text
    content: soudain je les en ferai fuir,
  - type: text
    content: et j'y mettrai en place celui que j'ai choisi.
  - type: text
    content: Qui donc est semblable à moi ?
  - type: text
    content: Qui me donnera des consignes ?
  - type: text
    content: Et quel est le berger qui tiendra devant moi ?
  '45':
  - type: text
    content: ' '
  - type: note
    content: Cf. 51.12,29 ; Es 14.24.
  - type: text
    content: 'A cause de cela, écoutez le projet que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a formé contre Babylone,'
  - type: text
    content: et les plans qu'il a préparés contre le pays des Chaldéens !
  - type: text
    content: Sans faute, ils seront traînés comme les petits du troupeau ;
  - type: text
    content: Sans faute, il dévastera leur domaine.
  '46':
  - type: text
    content: ' '
  - type: note
    content: 51.29 ; cf. 10.10.
  - type: text
    content: Au bruit de la prise de Babylone
  - type: text
    content: la terre tremble ;
  - type: text
    content: des cris se font entendre parmi les nations.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ils s''informeront…  : litt. ils demanderont Sion, le visage (tourné) vers ici  ; cf. 31.6. –  Venez, attachez-vous  : litt. venez et ils s''attacheront  ; on pourrait aussi comprendre, d''après des versions anciennes  : venez, attachons-nous ou bien ils viendront et s''attacheront . –  alliance perpétuelle 32.40+.'
  - type: text
    content: Ils s'informeront de Sion
  - type: text
    content: 'et se tourneront vers elle :'
  - type: text
    content: 'Venez, attachez-vous au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: par une alliance perpétuelle qui ne soit jamais oubliée !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'un troupeau de moutons  : le mot hébreu désigne le petit bétail ( troupeau au v. 8) en général, moutons et chèvres ; cf. v. 17 ; 12.3n  ; 23.8n  ; Nb 27.17 ; 1R 22.17 ; Es 53.6 ; Ez 34.3ss ; Za 10.2 ; voir aussi Ps 119.176 ; Mt 10.6 ; Lc 15.6. –  bergers 2.8+ ; cf. 23.1. –  le lieu de leur repos  : cf. Pr 24.15n.'
  - type: text
    content: – Mon peuple était un troupeau de moutons perdus ;
  - type: text
    content: leurs bergers les égaraient,
  - type: text
    content: ils les faisaient tourner en rond dans les montagnes ;
  - type: text
    content: ils allaient de montagne en colline,
  - type: text
    content: oubliant le lieu de leur repos.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'les dévoraient / pas en tort  : cf. 2.3n. –  le domaine de la justice 31.23+. –  contre le Seigneur est omis la deuxième fois par LXX. –  espérance 14.8n.'
  - type: text
    content: Tous ceux qui les trouvaient les dévoraient,
  - type: text
    content: 'et leurs adversaires disaient :'
  - type: text
    content: Nous ne sommes pas en tort,
  - type: text
    content: 'puisqu''ils ont péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: le domaine de la justice,
  - type: text
    content: 'contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: l'espérance de leurs pères.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Allez-vous-en  : autre traduction possible ils s''en iront  ; cf. v. 16 ; 51.6,45 ; Es 48.20+ ; Za 2.10s ; Ap 18.4. –  à la tête…  : cf. Jn 10.4.'
  - type: text
    content: – Allez-vous-en de Babylone,
  - type: text
    content: sortez du pays des Chaldéens,
  - type: text
    content: et soyez comme des boucs à la tête du troupeau !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je suscite…  : litt. j''éveille et je fais monter  ; cf. v. 14 ; 6.22+ ; le second verbe est omis par LXX. –  de grandes nations (51.27) … du nord v. 3+ ; cf. 6.22s. –  et la prendront  : litt. de là elle sera prise . –  comme celles d''un habile guerrier  : autre traduction comme un habile guerrier . Le choix de l''adjectif habile s''appuie sur certains mss hébreux et des versions anciennes ; autre lecture traditionnelle un guerrier (ou un héros  ; cf. 9.22n) qui prive d''enfants (cf. 15.7).'
  - type: text
    content: Car je suscite et je lance à l'attaque de Babylone
  - type: text
    content: une assemblée de grandes nations du pays du nord ;
  - type: text
    content: elles se rangeront contre elle
  - type: text
    content: et la prendront ;
  - type: text
    content: leurs flèches sont comme celles d'un habile guerrier,
  - type: text
    content: qui ne revient pas à vide.
