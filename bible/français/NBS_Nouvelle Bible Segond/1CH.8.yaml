document_id: 1CH.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Autre liste de descendants de Benjamin
  - type: heading
    content: Gn 46.21  ; Nb 26.38-40
  - type: text
    content: ' '
  - type: note
    content: 'Benjamin  : cf. 7.6n-12. –  Ahrah  : cf. Nb 26.38 Ahiram.'
  - type: text
    content: 'Benjamin engendra Béla, son premier-né, Ashbel le deuxième, Ahrah le troisième, '
  '10':
  - type: note
    content: 'Sakia  : plusieurs mss hébreux ainsi que LXX et Tg portent Shavia. –  ses fils  : omis par LXX.'
  - type: text
    content: Yeouts, Sakia et Mirma. Ce sont là ses fils, des chefs de famille.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Abitoub  : quelques mss hébreux et Syr portent Ahitoub.'
  - type: text
    content: 'Avec Houshim, il engendra Abitoub et Elpaal. '
  '12':
  - type: note
    content: 'Eber  : quelques mss hébreux portent Ebed. –  Shémer  : plusieurs mss hébreux et versions anciennes ; le texte hébreu traditionnel porte Shémed (cf. 1.6n).'
  - type: text
    content: 'Fils d''Elpaal : Eber, Mishéam et Shémer qui bâtit Ono, Lod et les localités qui en dépendent.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ayyalôn  : cf. 1S 14.31n. –  Gath  : cf. 1S 5.1n,8.'
  - type: text
    content: Beria et Shéma, qui étaient chefs de famille parmi les habitants d'Ayyalôn, mirent en fuite les habitants de Gath.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Ahio  : certains proposent de traduire et leurs frères , comme certains mss de LXX le suggèrent. –  Yerémoth  : certains proposent de lire ici Yeroham (v. 27), y voyant une même personne ; ou encore de comprendre Yerémoth au v. 27.'
  - type: text
    content: 'Ahio, Shashaq, Yerémoth, '
  '15':
  - type: note
    content: 'Arad, Eder  : un ms de LXX a lu Orér et Oded.'
  - type: text
    content: 'Zebadia, Arad, Eder, '
  '16':
  - type: note
    content: 'Yishpha  : certains mss de LXX portent Esphakh.'
  - type: text
    content: 'Michel, Yishpha et Yoha étaient fils de Beria. '
  '17':
  - type: text
    content: 'Zebadia, Meshoullam, Hizqi, Héber, '
  '18':
  - type: text
    content: 'Yishmeraï, Yizlia et Yobab étaient fils d''Elpaal. '
  '19':
  - type: text
    content: 'Yaqim, Zikri, Zabdi, '
  '2':
  - type: text
    content: 'Noha le quatrième et Rapha le cinquième. '
  '20':
  - type: note
    content: 'Eliénaï  : certains proposent de lire Elioénaï, comme le font des mss de LXX, Tg et Vg.'
  - type: text
    content: 'Eliénaï, Tsiltaï, Eliel, '
  '21':
  - type: note
    content: 'Shiméi  : il s''agit probablement de Shéma, cf. v. 13.'
  - type: text
    content: 'Adaya, Beraya et Shimrath étaient fils de Shiméi. '
  '22':
  - type: note
    content: 'Eber  : LXX porte Obed, cf. v. 12.'
  - type: text
    content: 'Yishpân, Eber, Eliel, '
  '23':
  - type: text
    content: 'Abdôn, Zikri, Hanân, '
  '24':
  - type: note
    content: 'Hanania  : LXX ajoute ici Ambri (Omri  ?). –  Antotiya  : quelques mss hébreux portent Antotya.'
  - type: text
    content: 'Hanania, Elam, Antotiya, '
  '25':
  - type: note
    content: 'LXX rajoute Athin au début du v. –  Yiphdeya  : LXX Yepheria. –  Penouel  : selon plusieurs mss hébreux, LXX, Tg et Vg ; le texte hébreu traditionnel porte Peniel. –  Shashaq  : cf. v. 14n.'
  - type: text
    content: 'Yiphdeya et Penouel étaient fils de Shashaq. '
  '26':
  - type: note
    content: 'Shamsheraï  : des mss de LXX portent Samsaïa.'
  - type: text
    content: 'Shamsheraï, Sheharia, Athalia, '
  '27':
  - type: note
    content: 'Yaaréshia  : un ms de LXX porte Yasaraïa. –  Yeroham  : cf. v. 14n.'
  - type: text
    content: 'Yaaréshia, Eliya et Zikri étaient fils de Yeroham. '
  '28':
  - type: note
    content: Les v. 28-38 sont répétés presque mot pour mot en 9.34-44.
  - type: text
    content: Ce sont là des chefs de famille, chefs selon leur généalogie. Ils habitaient à Jérusalem.
  - type: heading
    content: La famille de Saül
  - type: heading
    content: 9.35-43  ; 1S 14.49-51
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Le texte parallèle de 9.35 et un ms de LXX précisent que le père de Gabaon s''appelait Yéiel . –  habitait  : selon un ms hébreu, LXX et Syr  ; le texte hébreu traditionnel porte le pluriel.'
  - type: text
    content: 'Le père de Gabaon habitait à Gabaon, et le nom de sa femme était Maaka. '
  '3':
  - type: note
    content: 'Addar  : quelques mss hébreux et de LXX portent Ard. –  Abihoud  : certains pensent qu''il faudrait ici décomposer le nom propre et lire père d''Ehoud (cf. v. 6) ; cf. Jg 3.15.'
  - type: text
    content: 'Les fils de Béla furent : Addar, Guéra, Abihoud, '
  '30':
  - type: note
    content: 'son fils premier-né  : l''hébreu signifie le fils premier-né de son père  ; LXX porte le féminin son fils (à elle) premier-né. – Le texte parallèle de 9.36 et certains mss de LXX insèrent Ner entre Baal et Nadab.'
  - type: text
    content: 'Abdôn, son fils premier-né, puis Tsour, Qish, Baal, Nadab, '
  '31':
  - type: note
    content: 'Ahio  : LXX porte et son frère, comprenant ici le nom commun au lieu du nom propre ; cf. v. 14. –  Zéker  : cf. 9.37 Zacharie. – Des versions anciennes ajoutent à la fin du v. Miqloth, cf. v. 32.'
  - type: text
    content: 'Guedor, Ahio et Zéker. '
  '32':
  - type: note
    content: 'Shiméa  : cf. 9.38 Shiméam. –  avec leurs frères  : omis par Syr.'
  - type: text
    content: 'Miqloth engendra Shiméa. Ils étaient aussi auprès de leurs frères ; ils habitaient à Jérusalem, avec leurs frères. '
  '33':
  - type: note
    content: 'Ner / Qish  : cf. 1S 14.51 ; certains proposent de lire Ner engendra Abner ; Qish engendra Saül. –  Abinadab  : LXX Aminadab, de même 9.39 ; cf. 10.2n. –  Esh-Baal  : cf. 2S 2.8n.'
  - type: text
    content: 'Ner engendra Qish ; Qish engendra Saül ; Saül engendra Jonathan, Malki-Shoua, Abinadab et Esh-Baal. '
  '34':
  - type: note
    content: 'Merib-Baal  : un ms de LXX a lu Meri-Baal, comme Syr ; cf. 2S 4.4n. –  Michée  : plusieurs personnes ont porté ce nom dans l''A.T., il ne s''agit évidemment pas ici du prophète qui a donné son nom au livre biblique ; cf. 2S 9.12n.'
  - type: text
    content: 'Fils de Jonathan : Merib-Baal. Merib-Baal engendra Michée. '
  '35':
  - type: note
    content: 'Mélek  : certains mss de LXX portent Melkhel. –  Taréa  : orthographe légèrement différente en 9.41 Tahréa.'
  - type: text
    content: 'Fils de Michée : Pitôn, Mélek, Taréa et Achaz. '
  '36':
  - type: note
    content: 'Yehoadda  : un ms de LXX porte Yada, d''autres Yehoyada, comme Syr. –  Azmaveth  : des mss de LXX, Syr et Vg portent ici Azmoth. –  Motsa  : LXX Maïsa.'
  - type: text
    content: 'Achaz engendra Yehoadda ; Yehoadda engendra Alémeth, Azmaveth et Zimri ; Zimri engendra Motsa ; '
  '37':
  - type: note
    content: 'Binéa  : quelques mss hébreux portent Kinéa, de même que Syr ; LXX Baana. –  Rapha  : LXX a compris Rephaya, cf. 9.43.'
  - type: text
    content: 'Motsa engendra Binéa. Rapha, son fils ; Eléasa, son fils ; Atsel, son fils ; '
  '38':
  - type: note
    content: 'Bokrou  : certains mss hébreux, LXX et Syr portent son premier-né. – Après Shéaria, certains mss de LXX ajoutent Azaria.'
  - type: text
    content: 'Atsel eut six fils ; voici leurs noms : Azriqam, Bokrou, Ismaël, Shéaria, Abdias et Hanân. Tous ceux-là sont les fils d''Atsel. '
  '39':
  - type: note
    content: 'Esheq  : LXX porte, selon les mss, Asel, Eselekh ou Esel.'
  - type: text
    content: 'Fils d''Esheq, son frère : Oulam, son premier-né, Yéoush, le deuxième, et Eliphéleth, le troisième. '
  '4':
  - type: note
    content: 'Ahoah  : certains proposent de lire ici Ahiya, comme l''ont compris un ms de LXX et Syr  ; cf. v. 7.'
  - type: text
    content: 'Abishoua, Naaman, Ahoah, '
  '40':
  - type: note
    content: 'tirant à l''arc  : cf. 12.2. –  cent cinquante  : certains mss de LXX portent cent quatre-vingt-dix.'
  - type: text
    content: 'Les fils d''Oulam furent de vaillants guerriers tirant à l''arc ; ils eurent beaucoup de fils et de petits-fils : cent cinquante.'
  - type: text
    content: Tous ceux-là sont des fils de Benjamin.
  '5':
  - type: note
    content: 'Guéra  : omis par Syr. –  Shephouphân  : quelques mss hébreux et Tg portent Shephoupham.'
  - type: text
    content: Guéra, Shephouphân et Houram.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'exila  : autre traduction déplaça  ; il pourrait s''agir en l''occurrence d''une migration plus ou moins volontaire ; cf. v. 7. –  Manahath  : cf. 2.54n.'
  - type: text
    content: 'Voici les fils d''Ehoud, qui étaient chefs de famille parmi les habitants de Guéba ; on les exila à Manahath : '
  '7':
  - type: note
    content: 'Il engendra  : certains mss de LXX précisent Guéra engendra…'
  - type: text
    content: Naaman, Ahiya et Guéra – c'est lui qui les exila. Il engendra Ouzza et Ahihoud.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Texte difficile. –  Baara  : un ms de LXX porte Baada . –  ses femmes  : LXX sa femme.'
  - type: text
    content: 'Shaharaïm engendra au pays de Moab, après avoir renvoyé Houshim et Baara, ses femmes. '
  '9':
  - type: note
    content: 'Hodesh  : LXX Ada. –  Mésha  : en hébreu le nom est écrit différemment qu''en 2.42 ; 2R 3.4 etc.'
  - type: text
    content: 'Avec Hodesh, sa femme, il engendra Yobab, Tsibia, Mésha, Malkam, '
