document_id: 2CH.29,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Règne d'Ezéchias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 18.1-3
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abiya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Abi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après 2R 18.2.'
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias devint roi à l''âge de vingt-cinq ans ; il régna vingt-neuf ans à Jérusalem. Le nom de sa mère était Abiya, fille de Zacharie. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai à '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.7 ; 24.4 ; 2S 7.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'conclure une '
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' pour'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : forme rare, probablement ici au sens d''un engagement total, cf. Esd 10.3 ; voir Ex 34.12,15 ; Jos 9.15 ; 24.25 ; Jg 2.2 ; Ps 89.4.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant j''ai à cœur de conclure une alliance pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu d''Israël, afin que sa colère ardente se détourne de nous. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mes '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 2.24. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et maintenant ; Vetus latina '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bâtissez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'choisis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: officier pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 18.5 ; 21.5 ; 1Ch 15.2.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, mes fils, ne soyez plus négligents : vous avez été choisis par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour vous tenir debout devant lui afin d''officier pour lui, pour être ses officiants et pour lui offrir de l''encens.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des Qehatites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des fils des Qehatites.
      marker-yv: yv-n
    - type: text
      text: 'Alors les lévites se levèrent : Mahath, fils d''Amasaï, Joël, fils d''Azaria, des Qehatites ; des fils de Merari, Qish, fils d''Abdi, Azaria, fils de Yehalléléel ; des Guershonites, Yoah, fils de Zimma, Eden, fils de Yoah ; '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yéiel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yéouel.
      marker-yv: yv-n
    - type: text
      text: 'des fils d''Elitsaphân, Shimri et Yéiel ; des fils d''Asaph, Zacharie et Mattania ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: des fils de Hémân, Yehiel et Shiméi ; et des fils de Yedoutoun, Shemaya et Ouzziel.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils rassemblèrent leurs frères et, après s''être consacrés, ils vinrent purifier la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', selon le commandement du roi, par les paroles du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: purifier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour purifier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: emporter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'oued Cédron '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 15.16 ; 30.14 ; 1R 2.37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les prêtres entrèrent à l''intérieur de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour la purifier ; ils sortirent toutes les impuretés qu''ils trouvèrent dans le temple du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' jusque dans la cour de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', où les lévites les reçurent pour les emporter dehors, dans l''oued Cédron. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils commencèrent la consécration le premier jour du premier mois ; le huitième jour du mois, ils entrèrent dans le vestibule du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et mirent huit jours à consacrer la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  ; le seizième jour du premier mois, ils avaient achevé.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pains exposés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 24.6s ; Né 10.34+.'
      marker-yv: yv-n
    - type: text
      text: 'Ils entrèrent ensuite chez le roi Ezéchias et dirent : Nous avons purifié toute la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', l''autel des holocaustes et tous ses ustensiles, la table des pains exposés et tous ses ustensiles. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'objets '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ustensiles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses sacrilèges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son sacrilège.
      marker-yv: yv-n
    - type: text
      text: 'Nous avons remis en état et consacré tous les objets que le roi Achaz, par ses sacrilèges, avait profanés pendant son règne : ils sont devant l''autel du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Ezéchias rétablit le culte et les sacrifices
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui convenait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comme l'avait fait David, son père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: sans doute au sens d’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ancêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cette comparaison favorable avec le grand David est rare dans les Chroniques, cf. 11.17 ; 17.3 (Josaphat) ; 34.2s (Josias).'
      marker-yv: yv-n
    - type: text
      text: 'Il fit ce qui convenait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', exactement comme l''avait fait David, son père.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Purification du temple
    marker-yv: yv-h
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi Ezéchias se leva de bon matin, rassembla les chefs de la ville et monta à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On amena
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils amenèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Aaron… '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ex 28.1.
      marker-yv: yv-n
    - type: text
      text: 'On amena en sacrifice pour le péché sept taureaux, sept béliers, sept agneaux et sept boucs, pour la royauté, pour le sanctuaire et pour Juda. Le roi dit aux fils d''Aaron, les prêtres, de les offrir sur l''autel du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fk
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Les prêtres immolèrent le gros bétail, recueillirent le sang et en aspergèrent l''autel ; ils immolèrent les béliers et aspergèrent l''autel de leur sang ; ils immolèrent les agneaux et aspergèrent l''autel de leur sang. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils firent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: on fit.
      marker-yv: yv-n
    - type: text
      text: 'Ils firent ensuite approcher les boucs du sacrifice pour le péché devant le roi et l''assemblée, et ils posèrent les mains sur eux. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiation
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour tout Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Esd 8.35 ; 1Ch 29.21.'
      marker-yv: yv-n
    - type: text
      text: 'Les prêtres les immolèrent et mirent leur sang sur l''autel en sacrifice pour le péché, afin de faire l''expiation sur tout Israël ; car le roi avait dit que l''holocauste et le sacrifice pour le péché seraient pour tout Israël. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: '… avec des cymbales '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'David '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gad '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nathan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1Ch 29.29. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il fit placer les lévites dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avec des cymbales, des luths et des lyres, selon le commandement de David, de Gad, le visionnaire du roi, et de Nathan, le prophète : c''était un commandement du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', transmis par l''intermédiaire de ses prophètes. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se mirent en place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se tinrent debout
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: instruments de David
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Né 12.36+.'
      marker-yv: yv-n
    - type: text
      text: 'Les lévites se mirent en place avec les instruments de David, et les prêtres avec les trompettes. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ordonna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dit.
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias ordonna qu''on offre l''holocauste sur l''autel ; et au moment où commença l''holocauste, commença aussi le chant du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', avec les trompettes et l''accompagnement des instruments de David, roi d''Israël. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Toute l'assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 31s.'
      marker-yv: yv-n
    - type: text
      text: 'Toute l''assemblée se prosterna, on chanta et on sonna des trompettes, le tout jusqu''à ce que l''holocauste fût achevé. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand on eut achevé d''offrir l''holocauste, le roi et tous ceux qui se trouvaient avec lui s''agenouillèrent et se prosternèrent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ouvrit les portes de la maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : Ezéchias défait les actions de son prédécesseur, cf. 28.24. Dès le départ et dans la plus grande partie du récit les Chroniques soulignent la réforme religieuse d''Ezéchias, ainsi que l''intérêt de ce dernier pour les rites et les cérémonies. Le passage parallèle des Rois n''y accorde que très peu de place (18.4-6) mais s''intéresse davantage à la confrontation entre Ezéchias et Sennachérib, roi d''Assyrie, événement relaté dans les Chroniques mais avec beaucoup moins de détail (32.1-23).'
      marker-yv: yv-n
    - type: text
      text: 'C''est lui qui, la première année de son règne, au premier mois, ouvrit les portes de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et les répara. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'inclinèrent et se prosternèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.18 ; 1R 1.16+.'
      marker-yv: yv-n
    - type: text
      text: 'Puis le roi Ezéchias et les princes dirent aux lévites de louer le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avec les paroles de David et d''Asaph, le visionnaire ; ils le louèrent avec des transports de joie, ils s''inclinèrent et se prosternèrent.'
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: ' et des offrandes…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des sacrifices de reconnaissance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 33.16 ; Lv 7.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Hé 13.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tous ceux qui avaient le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' généreux'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ex 25.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ezéchias dit alors : Maintenant que vous avez été investis pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', approchez-vous, apportez des sacrifices et des offrandes de reconnaissance à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. L''assemblée apporta des sacrifices et des offrandes de reconnaissance, et tous ceux qui avaient le cœur généreux apportèrent des holocaustes. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le nombre des holocaustes apportés par l''assemblée fut de soixante-dix têtes de gros bétail, cent béliers et deux cents agneaux, le tout en holocauste pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'On consacra encore six cents têtes de gros bétail et trois mille têtes de petit bétail. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Comparer avec 35.11 et Lv 1.5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se soient consacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 5.11 ; 30.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avaient eu plus à cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (furent plus) droits de cœur.
      marker-yv: yv-n
    - type: text
      text: 'Mais les prêtres étaient en trop petit nombre pour dépouiller tous les holocaustes ; leurs frères, les lévites, leur prêtèrent main-forte jusqu''à ce que l''ouvrage soit achevé et jusqu''à ce que les autres prêtres se soient consacrés, car les lévites avaient eu plus à cœur de se consacrer que les prêtres. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rétabli
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'préparer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 36 ; cf. 35.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y avait en effet beaucoup d''holocaustes, avec les graisses des sacrifices de paix et avec les libations pour les holocaustes. Ainsi fut rétabli le service de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: leur cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout s'était passé très vite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la chose avait eu lieu à l''improviste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'était faite instantanément.
      marker-yv: yv-n
    - type: text
      text: Ezéchias et tout le peuple se réjouirent de ce que Dieu avait tout préparé pour le peuple, car tout s'était passé très vite.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' et les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : encore une fois les Chroniques montrent un grand intérêt pour le sacerdoce.'
      marker-yv: yv-n
    - type: text
      text: 'Il fit venir les prêtres et les lévites ; il les rassembla sur la place orientale '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4 et comparer avec 1Ch 15.11s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'consacrez-vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sanctifiez-vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ', consacrez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sanctifiez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sanctuaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'sont des termes apparentés en hébreu ; cf. v. 15-19 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: débarrassez…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faites sortir la souillure hors du sanctuaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souillure '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne normalement l'impureté rituelle de la femme pendant ses règles ; il s'applique ici à l'idolâtrie ; cf. Lv 12.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Esd 9.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'et leur dit : Ecoutez-moi, lévites ! Maintenant consacrez-vous, consacrez la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', le Dieu de vos pères, et débarrassez le sanctuaire de toute souillure. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ont commis des sacrilèges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ont été infidèles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 12.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce qui déplaisait au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils se sont détournés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ont détourné leur face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils lui ont tourné le dos
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils ont donné la nuque.
      marker-yv: yv-n
    - type: text
      text: 'Car nos pères ont commis des sacrilèges, ils ont fait ce qui déplaisait au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, ils l''ont abandonné, ils se sont détournés de la demeure du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ils lui ont tourné le dos. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ezéchias veut rétablir les choses comme au temps de Salomon, cf. 2.4 ; 4.7. Certains pensent que dans les Chroniques Ezéchias est considéré comme un nouveau Salomon, vu les événements que l''auteur choisit de relater : la célébration de la Pâque (chap. 30), les objets et activités du culte (29.7,18,35 ; 31.2s), l''étendue de la domination d''Ezéchias (30.25), l''honneur que lui accordent les nations étrangères (32.23), sa richesse (32.27-29). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fermé les portes du vestibule
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'interdit tout accès au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 6.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils n'ont offert… ni encens ni holocauste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils n'ont pas fait fumer d'encens ni fait monter d'holocauste pour le Dieu d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ils ont même fermé les portes du vestibule, ils ont éteint les lampes, ils n''ont offert au Dieu d''Israël ni encens ni holocauste dans le sanctuaire. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''atterrement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de stupéfaction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le mot hébreu correspondant a aussi été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dévastation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 30.7 ; Lv 26.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 28.37. L''ensemble des expressions utilisées ici fait écho à de nombreux textes de Jérémie (15.4 ; 19.8 ; 24.9 ; 25.9,18 ; 29.18 ; 51.37).'
      marker-yv: yv-n
    - type: text
      text: 'Aussi la colère du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' s''est-elle abattue sur Juda et Jérusalem, et il en a fait un sujet de terreur, d''atterrement et de sifflement d''horreur, comme vous le voyez de vos yeux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '29.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 28.6-8.
      marker-yv: yv-n
    - type: text
      text: 'Nos pères sont tombés par l''épée ; nos fils, nos filles et nos femmes sont en captivité à cause de cela. '
