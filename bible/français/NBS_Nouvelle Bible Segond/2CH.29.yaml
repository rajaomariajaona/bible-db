document_id: 2CH.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne d'Ezéchias
  - type: heading
    content: 2R 18.1-3
  - type: text
    content: ' '
  - type: note
    content: Abiya ou Abi , d'après 2R 18.2.
  - type: text
    content: 'Ezéchias devint roi à l''âge de vingt-cinq ans ; il régna vingt-neuf ans à Jérusalem. Le nom de sa mère était Abiya, fille de Zacharie. '
  '10':
  - type: note
    content: 'j''ai à cœur 6.7 ; 24.4 ; 2S 7.3. –  conclure une alliance pour  : forme rare, probablement ici au sens d''un engagement total, cf. Esd 10.3 ; voir Ex 34.12,15 ; Jos 9.15 ; 24.25 ; Jg 2.2 ; Ps 89.4.'
  - type: text
    content: 'Maintenant j''ai à cœur de conclure une alliance pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, afin que sa colère ardente se détourne de nous. '
  '11':
  - type: note
    content: 'mes fils  : cf. 1S 2.24. LXX et maintenant ; Vetus latina (voir Vg) bâtissez. –  choisis / officier pour lui  : cf. Dt 18.5 ; 21.5 ; 1Ch 15.2.'
  - type: text
    content: 'Maintenant, mes fils, ne soyez plus négligents : vous avez été choisis par le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour vous tenir debout devant lui afin d''officier pour lui, pour être ses officiants et pour lui offrir de l''encens.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'des Qehatites  : litt. des fils des Qehatites.'
  - type: text
    content: 'Alors les lévites se levèrent : Mahath, fils d''Amasaï, Joël, fils d''Azaria, des Qehatites ; des fils de Merari, Qish, fils d''Abdi, Azaria, fils de Yehalléléel ; des Guershonites, Yoah, fils de Zimma, Eden, fils de Yoah ; '
  '13':
  - type: note
    content: 'Yéiel  : autre lecture traditionnelle Yéouel.'
  - type: text
    content: 'des fils d''Elitsaphân, Shimri et Yéiel ; des fils d''Asaph, Zacharie et Mattania ; '
  '14':
  - type: text
    content: des fils de Hémân, Yehiel et Shiméi ; et des fils de Yedoutoun, Shemaya et Ouzziel.
  '15':
  - type: text
    content: 'Ils rassemblèrent leurs frères et, après s''être consacrés, ils vinrent purifier la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', selon le commandement du roi, par les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'pour la purifier  : litt. pour purifier. –  emporter  : litt. sortir. –  oued Cédron 15.16 ; 30.14 ; 1R 2.37n.'
  - type: text
    content: 'Les prêtres entrèrent à l''intérieur de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour la purifier ; ils sortirent toutes les impuretés qu''ils trouvèrent dans le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ' jusque dans la cour de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', où les lévites les reçurent pour les emporter dehors, dans l''oued Cédron. '
  '17':
  - type: text
    content: 'Ils commencèrent la consécration le premier jour du premier mois ; le huitième jour du mois, ils entrèrent dans le vestibule du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et mirent huit jours à consacrer la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le seizième jour du premier mois, ils avaient achevé.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: pains exposés 2.3n  ; Lv 24.6s ; Né 10.34+.
  - type: text
    content: 'Ils entrèrent ensuite chez le roi Ezéchias et dirent : Nous avons purifié toute la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', l''autel des holocaustes et tous ses ustensiles, la table des pains exposés et tous ses ustensiles. '
  '19':
  - type: note
    content: 'objets ou ustensiles 5.1n. –  ses sacrilèges  : litt. son sacrilège.'
  - type: text
    content: 'Nous avons remis en état et consacré tous les objets que le roi Achaz, par ses sacrilèges, avait profanés pendant son règne : ils sont devant l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Ezéchias rétablit le culte et les sacrifices
  '2':
  - type: note
    content: 'ce qui convenait…  : cf. 20.32n. –  comme l''avait fait David, son père  : père sans doute au sens d’ancêtre  ; cette comparaison favorable avec le grand David est rare dans les Chroniques, cf. 11.17 ; 17.3 (Josaphat) ; 34.2s (Josias).'
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait David, son père.'
  - type: heading
    content: Purification du temple
  '20':
  - type: text
    content: 'Le roi Ezéchias se leva de bon matin, rassembla les chefs de la ville et monta à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '21':
  - type: note
    content: 'On amena  : litt. ils amenèrent. –  fils d''Aaron… prêtres Ex 28.1.'
  - type: text
    content: 'On amena en sacrifice pour le péché sept taureaux, sept béliers, sept agneaux et sept boucs, pour la royauté, pour le sanctuaire et pour Juda. Le roi dit aux fils d''Aaron, les prêtres, de les offrir sur l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '22':
  - type: note
    content: Voir sacrifices et sang.
  - type: text
    content: 'Les prêtres immolèrent le gros bétail, recueillirent le sang et en aspergèrent l''autel ; ils immolèrent les béliers et aspergèrent l''autel de leur sang ; ils immolèrent les agneaux et aspergèrent l''autel de leur sang. '
  '23':
  - type: note
    content: 'Ils firent  : autre traduction on fit.'
  - type: text
    content: 'Ils firent ensuite approcher les boucs du sacrifice pour le péché devant le roi et l''assemblée, et ils posèrent les mains sur eux. '
  '24':
  - type: note
    content: 'Voir expiation. –  pour tout Israël  : cf. Esd 8.35 ; 1Ch 29.21.'
  - type: text
    content: 'Les prêtres les immolèrent et mirent leur sang sur l''autel en sacrifice pour le péché, afin de faire l''expiation sur tout Israël ; car le roi avait dit que l''holocauste et le sacrifice pour le péché seraient pour tout Israël. '
  '25':
  - type: note
    content: 'les lévites… avec des cymbales 5.12. –  David / Gad / Nathan  : cf. 1Ch 29.29. – Voir prophète.'
  - type: text
    content: 'Il fit placer les lévites dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec des cymbales, des luths et des lyres, selon le commandement de David, de Gad, le visionnaire du roi, et de Nathan, le prophète : c''était un commandement du '
  - type: text
    content: Seigneur
  - type: text
    content: ', transmis par l''intermédiaire de ses prophètes. '
  '26':
  - type: note
    content: 'se mirent en place  : autre traduction se tinrent debout. –  instruments de David  : voir Né 12.36+.'
  - type: text
    content: 'Les lévites se mirent en place avec les instruments de David, et les prêtres avec les trompettes. '
  '27':
  - type: note
    content: 'ordonna  : litt. dit.'
  - type: text
    content: 'Ezéchias ordonna qu''on offre l''holocauste sur l''autel ; et au moment où commença l''holocauste, commença aussi le chant du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec les trompettes et l''accompagnement des instruments de David, roi d''Israël. '
  '28':
  - type: note
    content: 'Toute l''assemblée  : cf. v. 31s.'
  - type: text
    content: 'Toute l''assemblée se prosterna, on chanta et on sonna des trompettes, le tout jusqu''à ce que l''holocauste fût achevé. '
  '29':
  - type: text
    content: 'Quand on eut achevé d''offrir l''holocauste, le roi et tous ceux qui se trouvaient avec lui s''agenouillèrent et se prosternèrent. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'ouvrit les portes de la maison du Seigneur  : Ezéchias défait les actions de son prédécesseur, cf. 28.24. Dès le départ et dans la plus grande partie du récit les Chroniques soulignent la réforme religieuse d''Ezéchias, ainsi que l''intérêt de ce dernier pour les rites et les cérémonies. Le passage parallèle des Rois n''y accorde que très peu de place (18.4-6) mais s''intéresse davantage à la confrontation entre Ezéchias et Sennachérib, roi d''Assyrie, événement relaté dans les Chroniques mais avec beaucoup moins de détail (32.1-23).'
  - type: text
    content: 'C''est lui qui, la première année de son règne, au premier mois, ouvrit les portes de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les répara. '
  '30':
  - type: note
    content: 's''inclinèrent et se prosternèrent  : cf. 20.18 ; 1R 1.16+.'
  - type: text
    content: 'Puis le roi Ezéchias et les princes dirent aux lévites de louer le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avec les paroles de David et d''Asaph, le visionnaire ; ils le louèrent avec des transports de joie, ils s''inclinèrent et se prosternèrent.'
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'des sacrifices et des offrandes…  : autre traduction des sacrifices de reconnaissance  ; cf. 33.16 ; Lv 7.12n  ; voir aussi Hé 13.15. –  tous ceux qui avaient le cœur généreux  : cf. Ex 25.2n.'
  - type: text
    content: 'Ezéchias dit alors : Maintenant que vous avez été investis pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', approchez-vous, apportez des sacrifices et des offrandes de reconnaissance à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. L''assemblée apporta des sacrifices et des offrandes de reconnaissance, et tous ceux qui avaient le cœur généreux apportèrent des holocaustes. '
  '32':
  - type: text
    content: 'Le nombre des holocaustes apportés par l''assemblée fut de soixante-dix têtes de gros bétail, cent béliers et deux cents agneaux, le tout en holocauste pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '33':
  - type: text
    content: 'On consacra encore six cents têtes de gros bétail et trois mille têtes de petit bétail. '
  '34':
  - type: note
    content: 'Comparer avec 35.11 et Lv 1.5s. –  se soient consacrés  : 5.11 ; 30.3. –  avaient eu plus à cœur  : litt. (furent plus) droits de cœur.'
  - type: text
    content: 'Mais les prêtres étaient en trop petit nombre pour dépouiller tous les holocaustes ; leurs frères, les lévites, leur prêtèrent main-forte jusqu''à ce que l''ouvrage soit achevé et jusqu''à ce que les autres prêtres se soient consacrés, car les lévites avaient eu plus à cœur de se consacrer que les prêtres. '
  '35':
  - type: note
    content: 'rétabli  : le même verbe est traduit par préparer au v. 36 ; cf. 35.10n.'
  - type: text
    content: 'Il y avait en effet beaucoup d''holocaustes, avec les graisses des sacrifices de paix et avec les libations pour les holocaustes. Ainsi fut rétabli le service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '36':
  - type: note
    content: 'pour le peuple  : certains modifient le texte hébreu traditionnel pour lire leur cœur. –  tout s''était passé très vite  : autres traductions la chose avait eu lieu à l''improviste ou s''était faite instantanément.'
  - type: text
    content: Ezéchias et tout le peuple se réjouirent de ce que Dieu avait tout préparé pour le peuple, car tout s'était passé très vite.
  '4':
  - type: note
    content: 'les prêtres et les lévites  : encore une fois les Chroniques montrent un grand intérêt pour le sacerdoce.'
  - type: text
    content: 'Il fit venir les prêtres et les lévites ; il les rassembla sur la place orientale '
  '5':
  - type: note
    content: 'lévites  : cf. v. 4 et comparer avec 1Ch 15.11s. –  consacrez-vous (ou sanctifiez-vous), consacrez (ou sanctifiez) et sanctuaire sont des termes apparentés en hébreu ; cf. v. 15-19 ; voir saint. –  débarrassez…  : litt. faites sortir la souillure hors du sanctuaire  ; le terme correspondant à souillure désigne normalement l''impureté rituelle de la femme pendant ses règles ; il s''applique ici à l''idolâtrie ; cf. Lv 12.2n  ; Esd 9.11n.'
  - type: text
    content: 'et leur dit : Ecoutez-moi, lévites ! Maintenant consacrez-vous, consacrez la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de vos pères, et débarrassez le sanctuaire de toute souillure. '
  '6':
  - type: note
    content: 'ont commis des sacrilèges  : autre traduction ont été infidèles  ; cf. 12.2n. –  ce qui déplaisait au Seigneur 1R 11.6n. –  ils se sont détournés  : litt. ils ont détourné leur face. –  ils lui ont tourné le dos  : litt. ils ont donné la nuque.'
  - type: text
    content: 'Car nos pères ont commis des sacrilèges, ils ont fait ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, ils l''ont abandonné, ils se sont détournés de la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ils lui ont tourné le dos. '
  '7':
  - type: note
    content: 'Ezéchias veut rétablir les choses comme au temps de Salomon, cf. 2.4 ; 4.7. Certains pensent que dans les Chroniques Ezéchias est considéré comme un nouveau Salomon, vu les événements que l''auteur choisit de relater : la célébration de la Pâque (chap. 30), les objets et activités du culte (29.7,18,35 ; 31.2s), l''étendue de la domination d''Ezéchias (30.25), l''honneur que lui accordent les nations étrangères (32.23), sa richesse (32.27-29). –  fermé les portes du vestibule, c.-à-d. interdit tout accès au temple  ; cf. 1R 6.3+. –  ils n''ont offert… ni encens ni holocauste  : litt. ils n''ont pas fait fumer d''encens ni fait monter d''holocauste pour le Dieu d''Israël  ; voir sacrifices.'
  - type: text
    content: 'Ils ont même fermé les portes du vestibule, ils ont éteint les lampes, ils n''ont offert au Dieu d''Israël ni encens ni holocauste dans le sanctuaire. '
  '8':
  - type: note
    content: d'atterrement ou de stupéfaction  ; le mot hébreu correspondant a aussi été traduit par dévastation, cf. 30.7 ; Lv 26.32n  ; Dt 28.37. L'ensemble des expressions utilisées ici fait écho à de nombreux textes de Jérémie (15.4 ; 19.8 ; 24.9 ; 25.9,18 ; 29.18 ; 51.37).
  - type: text
    content: 'Aussi la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est-elle abattue sur Juda et Jérusalem, et il en a fait un sujet de terreur, d''atterrement et de sifflement d''horreur, comme vous le voyez de vos yeux. '
  '9':
  - type: note
    content: Cf. 28.6-8.
  - type: text
    content: 'Nos pères sont tombés par l''épée ; nos fils, nos filles et nos femmes sont en captivité à cause de cela. '
