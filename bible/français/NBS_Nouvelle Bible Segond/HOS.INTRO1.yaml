document_id: HOS.INTRO1,104
type_code: fra
verses:
  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Les douze livrets (Osée, Joël, Amos, Abdias, Jonas, Michée, Nahum, Habacuc, Sophonie, Aggée, Zacharie et Malachie) qui achèvent l''ensemble dit des Prophètes dans l''ordre traditionnel de la Bible hébraïque forment depuis bien longtemps un recueil à part. Leurs auteurs (ou acteurs) sont déjà réunis dans une même bénédiction en '
  - type: text
    content: Siracide
  - type: text
    content: '* 49.10 : « Quant aux os des '
  - type: text
    content: douze prophètes
  - type: text
    content: ', qu''ils refleurissent de leur tombe, car ils ont encouragé Jacob (= Israël) et ils l''ont délivré par la fidélité de l''espérance. » On les a parfois dénommés « petits prophètes », à cause de la taille relativement réduite de leurs œuvres, comparée aux grands volumes d''Esaïe, de Jérémie et d''Ezéchiel. L''ordre dans lequel celles-ci se présentent dans la Bible hébraïque (ce n''est pas le même dans la '
  - type: text
    content: Septante ;
  - type: text
    content: ' voir LXX* et l''introduction à l''Ancien Testament, p.${Xbhlxx}) se veut approximativement chronologique : d''Osée, un prophète du royaume du Nord (royaume tombé au VIII'
  - type: text
    content: e
  - type: text
    content: ' s. av. J.-C.) à Malachie, considéré comme le dernier des prophètes, après l''exil de Juda (VI'
  - type: text
    content: e
  - type: text
    content: ' s.). Mais il ne l''est pas strictement : Osée, déjà, est certainement postérieur à Amos.'
  - type: text
    content: L'époque du prophète Osée
  - type: text
    content: 'Selon toute vraisemblance, en effet, à peine la voix d''Amos s''est-elle tue en Israël que s''élève celle d''un nouveau porte-parole de Dieu. Osée, à la différence du Judéen Amos, a ses racines dans le '
  - type: text
    content: royaume du Nord
  - type: text
    content: ' même. Il intervient par intermittence pendant plus de vingt-cinq ans, au cours d''une période de plus en plus troublée, qui s''étend des dernières années de Jéroboam II jusqu''au siège de Samarie par les forces assyriennes.'
  - type: text
    content: 'Osée voit se succéder sept '
  - type: text
    content: rois
  - type: text
    content: ' sur le trône d''Israël. Quatre sont renversés par un coup d''Etat : Zacharie, Shalloum, Peqahya et Péqah (voir 2R 14.23-29 ; 15.8-31 ; 17.1-6). Face à l''expansionnisme assyrien, le roi Menahem pratique une politique de soumission. Péqah, au contraire, une politique de résistance qui l''amène à s''allier aux Araméens (ou Syriens) de Damas contre le royaume de Juda. C''est la guerre « syro-éphraïmite », vers 735/4 av. J.-C., à laquelle Osée 5.8-14 semble faire allusion. Le roi Osée, fils d''Ela (à ne pas confondre avec le prophète), passera de la soumission à la révolte contre la puissance assyrienne. Il provoquera ainsi la riposte des Assyriens, qui entraînera la chute de Samarie et la disparition du royaume du Nord.'
  - type: text
    content: 'Osée appelle les tribus du Nord '
  - type: text
    content: (maison d')
  - type: text
    content: Israël
  - type: text
    content: ' (1.4,6 ; 4.16 ; 5.1,3, etc.) ; parfois '
  - type: text
    content: Jacob
  - type: text
    content: ' (10.11 ; 12.3), avec une nuance péjorative ; et surtout '
  - type: text
    content: Ephraïm
  - type: text
    content: ' (4.17 ; 5.3, etc. ; 13.1 ; 14.9, en tout 35 fois). Amos et Ezéchiel emploient parfois dans le même sens le nom de '
  - type: text
    content: Joseph
  - type: text
    content: ', le père d''Ephraïm (Am 5.6 ; 6.6 ; Ez 37.16). Ephraïm est le nom d''une des principales tribus du royaume du Nord ; après l''intervention assyrienne de 732 av. J.-C., le territoire d''Israël ne s''étend plus guère au-delà de celui d''Ephraïm.'
  - type: text
    content: 'Israël traverse une crise profonde dans sa relation avec Dieu. Comme Osée le montre, le peuple succombe à l''attirance de la religion de '
  - type: text
    content: Baal
  - type: text
    content: '*, divinité cananéenne censée assurer la fertilité des champs et la fécondité des troupeaux. A côté du culte du Dieu de l''alliance, Israël rend aussi hommage à l''idole (voir ci-dessous « Le “veau d''or” »,).'
  - type: text
    content: 'Or Osée assimile cette infidélité à un '
  - type: text
    content: adultère
  - type: text
    content: ' ou à une '
  - type: text
    content: prostitution
  - type: text
    content: ' (5.3s).'
  - type: text
    content: Le message d'Osée
  - type: text
    content: 'Osée comprend et présente d''une manière originale le lien unissant Dieu à son peuple. Il en parle comme d''une '
  - type: text
    content: relation intime
  - type: text
    content: ' marquée par une forte affectivité. Les images du père et du fils (11.1-4,10) et surtout celle des époux (2.4-15) expriment cette alliance unique entre Dieu et Israël. Courtiser Baal, c''est commettre un adultère (2.4), c''est se prostituer (1.2 ; 2.7 ; 5.3s ; 6.10). Les faux dieux sont des '
  - type: text
    content: amants
  - type: text
    content: ' (2.7,9,12,14,15), des rivaux de YHWH (le '
  - type: text
    content: Seigneur)
  - type: text
    content: . Tout l'effort de Dieu va désormais viser à combattre l'infidélité de son peuple (2.8s,11s,15) et à reconquérir son cœur (2.9,16-19, 21s).
  - type: text
    content: 'Dans cette perspective, Osée met en relief les mots '
  - type: text
    content: connaître
  - type: text
    content: ' (2.10,22 ; 5.3s ; 6.3 ; 8.2 ; 11.3 ; 13.4s) et '
  - type: text
    content: connaissance
  - type: text
    content: ' (4.1,6 ; 6.6). L''usage qu''il en fait suggère une relation intime entre le sujet qui « connaît » et la personne « connue ». Prolongeant la symbolique du mariage et de l''adultère, il semble jouer sur l''emploi du verbe hébreu correspondant habituellement au verbe « connaître » comme euphémisme pour les relations sexuelles (cf. Gn 4.1'
  - type: text
    content: n
  - type: text
    content: ). On mesure dès lors toute la force de paroles comme celles de 2.22 ou 13.4s. YHWH connaît Israël et l'invite, en retour, à ne connaître que lui.
  - type: text
    content: Le mariage d'Osée
  - type: text
    content: 'Des événements de la '
  - type: text
    content: vie d'Osée
  - type: text
    content: ' servent à illustrer la relation mouvementée de Dieu avec Israël. Le prophète épouse une prostituée et doit châtier son inconduite.'
  - type: text
    content: 'A la femme achetée du chapitre 3, il impose une abstinence prolongée (v. 3). YHWH dénonce ainsi dans le comportement de son « épouse » Israël celui d''une '
  - type: text
    content: prostituée
  - type: text
    content: . Il lui annonce une quasi-répudiation (2.4), mais il ouvre en même temps une porte à l'espérance (2.17). Lui aussi imposera une privation purificatrice à son peuple, celle de l'exil (3.4).
  - type: text
    content: 'Comment comprendre les épisodes racontés ? S''agit-il d''une notice autobiographique ? Si tel est le cas, Osée s''est-il marié deux fois ou une seule ? Sommes-nous en présence d''une allégorie littéraire ou bien, solution plus attrayante, s''agit-il de mimes prophétiques, de '
  - type: text
    content: paroles-gestes
  - type: text
    content: ' comme les prophètes en employaient pour mettre en scène leur message (Es 20.1-6 ; Jr 13.1-11 ; Ez 5.1-12 etc. ; voir « Les paroles-gestes des prophètes », p.${Xgstproph}) ?'
  - type: text
    content: 'L''essentiel demeure le message : même offensé dans sa tendresse, Dieu ne se lasse pas d''aimer et de pardonner. Il est le Dieu de la '
  - type: text
    content: réconciliation
  - type: text
    content: .
  - type: text
    content: Les prolongementsdu message d'Osée
  - type: text
    content: 'Le ministère d''Osée ayant pris fin avec la disparition du royaume d''Israël (habitants exilés et remplacés par des colons étrangers, voir 2R 17.6,24-41), des éléments de son message ont été apportés en Juda par des réfugiés du Nord. Le titre du livre (1.1), qui omet six des sept rois d''Israël qu''a connus Osée, mais mentionne tous les rois de Juda contemporains du prophète, montre que la « publication » du livre d''Osée a été destinée d''abord à '
  - type: text
    content: Juda
  - type: text
    content: '  : il fallait éviter que le royaume du Sud ne suive le même chemin que son frère ennemi du Nord ; la parole de Dieu transmise par Osée à Israël devait être entendue aussi par Juda.'
  - type: text
    content: 'Parmi les nombreuses références que le '
  - type: text
    content: Nouveau Testament
  - type: text
    content: ' fait explicitement ou implicitement à Osée, on en relèvera deux. Pour souligner combien son message concerne la vie plutôt que le rite, Jésus se réfère deux fois dans l''Evangile selon Matthieu (Mt 9.13 ; 12.7) à la fameuse formule d''Osée 6.6 : '
  - type: text
    content: Je ne prends pas plaisir aux sacrifices, mais à la fidélité
  - type: text
    content: . L'épître de Paul aux Romains (Rm 9.25s) et celle de Pierre (1P 2.10), de leur côté, s'appuient toutes deux sur la belle déclaration d'Osée 2.1,3,25 (cf. 1.6,9) pour montrer que Dieu veut constituer son peuple d'hommes et de femmes de toutes les nations.
  - type: text
    content: Un Dieu inattendu
  - type: text
    content: 'Le livre d''Osée présente Dieu sous des traits inhabituels. Sur le fond de l''imagerie royale qui décrit les divinités à la manière des potentats de l''Antiquité, se détache le portrait original d''un Seigneur plein de bonté, de tendresse et de fidélité, comme un '
  - type: text
    content: époux
  - type: text
    content: ' ou un '
  - type: text
    content: père
  - type: text
    content: ' aimant (2.18 ; 11.1). Bafoué, il est bouleversé, il souffre, il réagit (11.8), il menace, il supplie (10.12 ; 12.7 ; 14.2ss). C''est son amour, gratuit et généreux, qui motive sa jalousie à l''égard du culte de Baal. Le culte rendu au vrai Dieu prend son sens dans une relation de confiance conjugale et filiale où tous les biens matériels sont donnés par surcroît (cf. Mt 6.33).'
