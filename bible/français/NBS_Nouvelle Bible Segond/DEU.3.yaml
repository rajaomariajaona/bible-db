document_id: DEU.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Occupation du royaume d'Og
  - type: text
    content: ' '
  - type: note
    content: 1.4+,7n  ; Nb 21.33-35.
  - type: text
    content: 'Puis nous sommes remontés par le chemin du Bashân. Og, roi du Bashân, est venu à notre rencontre pour le combat à Edréi, avec tout son peuple. '
  '10':
  - type: note
    content: 'plateau  : le haut plateau fertile à l''est du Jourdain (4.43). –  Galaad Gn 31.21n. –  Bashân 1.4+. –  Salka, peut-être à une soixantaine de kilomètres à l''est d’Edréi (1.4+) Jos 12.5 ; 13.11 ; 1Ch 5.11.'
  - type: text
    content: 'toutes les villes du plateau, tout le Galaad et tout le Bashân jusqu''à Salka et Edréi, villes du royaume d''Og au Bashân. '
  '11':
  - type: note
    content: 'Rephaïtes 2.11+. –  Rabba-des-Ammonites, l''actuelle Amman, capitale de la Jordanie, dans le bassin du Yabboq, à 37 km à l''est du Jourdain ; Jos 13.25 ; 2S 11.1 ; 12.26 ; 17.27 ; Jr 49.2s ; Ez 21.25 ; 25.5 ; Am 1.14 ; 1Ch 20.1. –  neuf coudées…  : soit plus de quatre mètres sur un peu moins de deux ; voir mesures. –  coudées d''homme  : cf. Ez 40.5n  ; Ap 21.17.'
  - type: text
    content: – Og, roi du Bashân, avait survécu seul du reste des Rephaïtes. Son lit, un lit de fer, est à Rabba-des-Ammonites. Sa longueur est de neuf coudées, et sa largeur de quatre coudées, en coudées d'homme. –
  '12':
  - type: text
    content: ' '
  - type: note
    content: Nb 32.33ss ; Jos 13.15-28.
  - type: text
    content: 'En ce temps-là, nous avons pris possession de ce pays. J''ai donné aux Rubénites et aux Gadites le territoire à partir d''Aroër, sur l''oued Arnon, et la moitié de la région montagneuse du Galaad, avec ses villes. '
  '13':
  - type: note
    content: Jos 13.29-31.
  - type: text
    content: 'J''ai donné à la demi-tribu de Manassé le reste du Galaad et tout le royaume d''Og au Bashân : toute la contrée d''Argob, avec tout le Bashân, ce qu''on appelle le pays des Rephaïtes. '
  '14':
  - type: note
    content: Douars de Yaïr Nb 32.41n  ; Jos 13.30 ; cf. Jg 10.3-5 ; 1R 4.13 ; 1Ch 2.22s.
  - type: text
    content: '– Yaïr, fils de Manassé, a pris toute la contrée d''Argob jusqu''à la frontière des Gueshourites et des Maakatites ; il a donné son nom au Bashân, qu''on appelle Douars de Yaïr jusqu''à ce jour. – '
  '15':
  - type: note
    content: Makir Gn 50.23n  ; Nb 26.29+ ; Jg 5.14n.
  - type: text
    content: 'J''ai donné le Galaad à Makir. '
  '16':
  - type: note
    content: 'le cours… et son rivage  : litt. le milieu de l''oued et frontière  ; le sens exact de l''expression est incertain ; on pourrait aussi comprendre le milieu de l''oued formant la frontière, cf. Nb 34.6n  ; Jos 15.12,47.'
  - type: text
    content: 'Aux Rubénites et aux Gadites j''ai donné une partie du Galaad jusqu''à l''oued Arnon (le cours de l''oued et son rivage) et jusqu''à l''oued Yabboq, frontière des Ammonites ; '
  '17':
  - type: note
    content: 'le Jourdain et son rivage ou le Jourdain formant la frontière, litt. le Jourdain et frontière, cf. v. 16n  ; Jos 13.23,27. –  Kinnéreth, sur la rive nord-ouest de la mer de Galilée ou lac de Tibériade, a donné son nom à ce lac que l''A.T. appelle aussi mer de Kinnéreth (Nb 34.11 ; Jos 13.27). –  la mer de la plaine aride (hébreu ‘arava, cf. 1.1n), la mer du Sel  : c.-à-d. la mer Morte. –  Pisga v. 27 ; 4.49 ; 34.1 ; Nb 21.20n.'
  - type: text
    content: ainsi que la plaine aride (le Jourdain et son rivage) depuis Kinnéreth jusqu'à la mer de la plaine aride, la mer du Sel, sous les pentes du Pisga, vers l'est.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Ces paroles s'adressent aux Rubénites, aux Gadites et aux Manassites établis à l'est du Jourdain ; cf. 1.8+ ; Nb 32.17-32. –  pour passer (c.-à-d. pour traverser le Jourdain) ; cf. Nb 31.3 ; 32.17ss.
  - type: text
    content: 'En ce temps-là, je vous ai donné cet ordre : le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous a livré ce pays, pour que vous en preniez possession. Vous tous, vaillants hommes, vous prendrez les armes pour passer devant vos frères, les Israélites. '
  '19':
  - type: note
    content: 'vos familles  : autre traduction vos enfants  ; cf. Gn 34.29n.'
  - type: text
    content: 'Seulement vos femmes, vos familles et vos troupeaux – je sais que vous avez de nombreux troupeaux – resteront dans les villes que je vous ai données, '
  '2':
  - type: note
    content: '1.21+ ; Nb 21.34n. –  qui habitait  : autre traduction qui régnait.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : N''aie pas peur de lui : je te l''ai livré, lui, tout son peuple et son pays ; tu le traiteras comme tu as traité Sihôn, roi des Amorites, qui habitait à Heshbôn. '
  '20':
  - type: note
    content: 'repos 12.9s ; 1R 8.56 ; Ps 95.11 ; Hé 3.11–4.11. –  du pays que le Seigneur … donne 4.1,21 ; 11.31 ; 15.4 ; 19.2 ; 20.16 ; 21.23 ; 24.4 ; 25.19 ; 26.1. –  de l''autre côté du Jourdain  : la même expression hébraïque était traduite par en Transjordanie au v. 8, où elle désignait la région située à l''est du Jourdain du point de vue israélite courant ; cette fois-ci elle désigne la région à l''ouest du Jourdain (= Canaan), l''autre côté par rapport au lieu du discours de Moïse ; de même au v. 25 et en 11.30 ; cf. 1.1n  ; Nb 32.19n.'
  - type: text
    content: 'jusqu''à ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ait accordé le repos à vos frères comme à vous, et qu''ils aient eux-mêmes pris possession du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, leur donne de l''autre côté du Jourdain. Après quoi vous reviendrez, chacun dans la possession que je lui ai donnée.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: Josué 1.38+. –  Tes yeux ont vu 1.31+ ; cf. 3.3.
  - type: text
    content: 'En ce temps-là, j''ai donné des ordres à Josué. Je lui ai dit : Tes yeux ont vu comment le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, a traité ces deux rois : c''est ainsi que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' traitera tous les royaumes où tu vas passer. '
  '22':
  - type: note
    content: N'ayez pas peur d'eux 1.21+. –  combat 1.30+.
  - type: text
    content: 'N''ayez pas peur d''eux : le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, combat lui-même pour vous.'
  - type: heading
    content: Moïse n'entrera pas en Canaan
  '23':
  - type: text
    content: 'En ce temps-là, j''ai supplié le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : '
  '24':
  - type: note
    content: 'ta grandeur 5.24 ; 11.2s ; cf. Ex 15.6. –  main forte 6.21n  ; 7.8 ; 9.26 ; 34.12 ; cf. 4.34+. –  dieu  : hébreu ’el, cf. Gn 21.33n. –  imiter tes œuvres…  : litt. faire comme ce que tu fais (ou agir comme tes actes) et comme tes puissances  ; cf. Ex 15.11 ; Es 40.18+ ; Ps 86.8.'
  - type: text
    content: 'Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ', tu as commencé à me montrer, à moi, ton serviteur, ta grandeur et ta main forte : quel dieu, au ciel et sur la terre, peut imiter tes œuvres et tes hauts faits ? '
  '25':
  - type: note
    content: 'bon pays 1.25+. –  de l''autre côté… v. 20n. –  ces belles montagnes  : au singulier dans le texte hébreu.'
  - type: text
    content: 'Laisse-moi passer, je t''en prie, pour que je voie ce bon pays de l''autre côté du Jourdain, ces belles montagnes et le Liban. '
  '26':
  - type: note
    content: 1.37+. –  Cela suffit ! cf. Nb 16.3n.
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''était irrité contre moi, à cause de vous, et il ne m''a pas écouté. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : Cela suffit ! Ne me parle plus de cette affaire ! '
  '27':
  - type: note
    content: 'Cf. Mt 4.8. –  Pisga v. 17+. –  mais  : autre traduction car.'
  - type: text
    content: 'Monte au sommet du Pisga, lève les yeux vers l''ouest, vers le nord, vers le sud et vers l''est, et regarde de tes yeux ; mais tu ne passeras pas ce Jourdain. '
  '28':
  - type: note
    content: 'Josué v. 21. –  fort et courageux  : cf. 31.6-8,23 ; Jos 1.6,18 ; 10.25 ; 1Ch 22.13 ; 28.20 ; 2Ch 32.7.'
  - type: text
    content: 'Donne des ordres à Josué, rends-le fort et courageux : c''est lui qui passera devant ce peuple et qui lui donnera comme patrimoine le pays que tu verras. '
  '29':
  - type: note
    content: Beth-Péor ou Baal-Péor, sans doute au pied du mont Pisga 4.3,46 ; 34.6 ; cf. Nb 25 ; Jos 13.20 ; Os 9.10 ; Ps 106.28.
  - type: text
    content: Nous sommes donc restés dans la vallée, en face de Beth-Péor.
  '3':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous a encore livré Og, roi du Bashân, avec tout son peuple ; nous l''avons battu et nous ne lui avons laissé aucun survivant. '
  '4':
  - type: note
    content: Cf. 2.34+ ; 1R 4.13.
  - type: text
    content: 'En ce temps-là, nous avons pris toutes ses villes ; il n''y a pas une seule ville que nous n''ayons prise : soixante villes, toute la contrée d''Argob, le royaume d''Og au Bashân. '
  '5':
  - type: note
    content: villes sans murailles 1S 6.18 ; Ez 38.11 (pays ouvert) ; Za 2.8 ; Est 9.19n  ; voir aussi Jg 5.7n.
  - type: text
    content: 'Toutes ces villes étaient fortifiées, avec de hautes murailles, des portes et des verrous ; il y avait aussi des villes sans murailles, en très grand nombre. '
  '6':
  - type: note
    content: '2.34n. –  anathème  : voir bénédiction, malédiction.'
  - type: text
    content: 'Nous les avons frappées d''anathème, comme nous avions agi envers Sihôn, roi de Heshbôn ; nous avons frappé toutes les villes d''anathème : les hommes, les femmes et les familles entières. '
  '7':
  - type: note
    content: 2.35.
  - type: text
    content: Mais nous avons pillé toutes les bêtes et les biens de ces villes.
  - type: heading
    content: Partage du Galaad
  '8':
  - type: text
    content: ' '
  - type: note
    content: de Transjordanie 1.1n  ; cf. 3.20n.
  - type: text
    content: 'Ainsi, en ce temps-là, nous avons pris leur pays aux deux rois des Amorites de Transjordanie, depuis l''oued Arnon jusqu''au mont Hermon, '
  '9':
  - type: note
    content: Siriôn Ps 29.6n. –  Senir Ez 27.5n  ; Ct 4.8n  ; 1Ch 5.23.
  - type: text
    content: '– les Sidoniens appellent l''Hermon Siriôn, et les Amorites Senir – '
