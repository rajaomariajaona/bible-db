      - type: text
        text: 1.4+,7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 21.33-35.'
    marker-yv: yv-n
  - type: text
    text: 'Puis nous sommes remontés par le chemin du Bashân. Og, roi du Bashân, est venu à notre rencontre pour le combat à Edréi, avec tout son peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.21+ ; Nb 21.34
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui habitait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui régnait.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' m''a dit : N''aie pas peur de lui : je te l''ai livré, lui, tout son peuple et son pays ; tu le traiteras comme tu as traité Sihôn, roi des Amorites, qui habitait à Heshbôn. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', notre Dieu, nous a encore livré Og, roi du Bashân, avec tout son peuple ; nous l''avons battu et nous ne lui avons laissé aucun survivant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 2.34+ ; 1R 4.13.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, nous avons pris toutes ses villes ; il n''y a pas une seule ville que nous n''ayons prise : soixante villes, toute la contrée d''Argob, le royaume d''Og au Bashân. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'villes sans murailles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 6.18 ; Ez 38.11 (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pays ouvert
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; Za 2.8 ; Est 9.19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Jg 5.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Toutes ces villes étaient fortifiées, avec de hautes murailles, des portes et des verrous ; il y avait aussi des villes sans murailles, en très grand nombre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: anathème
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ', malédiction.'
    marker-yv: yv-n
  - type: text
    text: 'Nous les avons frappées d''anathème, comme nous avions agi envers Sihôn, roi de Heshbôn ; nous avons frappé toutes les villes d''anathème : les hommes, les femmes et les familles entières. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.35.
    marker-yv: yv-n
  - type: text
    text: Mais nous avons pillé toutes les bêtes et les biens de ces villes.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Partage du Galaad
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de Transjordanie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 3.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ainsi, en ce temps-là, nous avons pris leur pays aux deux rois des Amorites de Transjordanie, depuis l''oued Arnon jusqu''au mont Hermon, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Siriôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ps 29.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Senir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ez 27.5
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ct 4.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 1Ch 5.23.'
    marker-yv: yv-n
  - type: text
    text: '– les Sidoniens appellent l''Hermon Siriôn, et les Amorites Senir – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plateau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le haut plateau fertile à l''est du Jourdain (4.43). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Galaad '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 31.21
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Bashân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Salka
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peut-être à une soixantaine de kilomètres à l''est d’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Edréi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1.4+) Jos 12.5 ; 13.11 ; 1Ch 5.11.
    marker-yv: yv-n
  - type: text
    text: 'toutes les villes du plateau, tout le Galaad et tout le Bashân jusqu''à Salka et Edréi, villes du royaume d''Og au Bashân. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rephaïtes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rabba-des-Ammonites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', l''actuelle Amman, capitale de la Jordanie, dans le bassin du Yabboq, à 37 km à l''est du Jourdain ; Jos 13.25 ; 2S 11.1 ; 12.26 ; 17.27 ; Jr 49.2s ; Ez 21.25 ; 25.5 ; Am 1.14 ; 1Ch 20.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: neuf coudées…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : soit plus de quatre mètres sur un peu moins de deux ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coudées d'homme
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ez 40.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ap 21.17.'
    marker-yv: yv-n
  - type: text
    text: – Og, roi du Bashân, avait survécu seul du reste des Rephaïtes. Son lit, un lit de fer, est à Rabba-des-Ammonites. Sa longueur est de neuf coudées, et sa largeur de quatre coudées, en coudées d'homme. –
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 32.33ss ; Jos 13.15-28.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, nous avons pris possession de ce pays. J''ai donné aux Rubénites et aux Gadites le territoire à partir d''Aroër, sur l''oued Arnon, et la moitié de la région montagneuse du Galaad, avec ses villes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jos 13.29-31.
    marker-yv: yv-n
  - type: text
    text: 'J''ai donné à la demi-tribu de Manassé le reste du Galaad et tout le royaume d''Og au Bashân : toute la contrée d''Argob, avec tout le Bashân, ce qu''on appelle le pays des Rephaïtes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Douars de Yaïr '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Nb 32.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 13.30 ; cf. Jg 10.3-5 ; 1R 4.13 ; 1Ch 2.22s.'
    marker-yv: yv-n
  - type: text
    text: '– Yaïr, fils de Manassé, a pris toute la contrée d''Argob jusqu''à la frontière des Gueshourites et des Maakatites ; il a donné son nom au Bashân, qu''on appelle Douars de Yaïr jusqu''à ce jour. – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Makir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Gn 50.23
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 26.29+ ; Jg 5.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'J''ai donné le Galaad à Makir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le cours… et son rivage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le milieu de l'oued et frontière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le sens exact de l''expression est incertain ; on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le milieu de l'oued formant la frontière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Nb 34.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 15.12,47.'
    marker-yv: yv-n
  - type: text
    text: 'Aux Rubénites et aux Gadites j''ai donné une partie du Galaad jusqu''à l''oued Arnon (le cours de l''oued et son rivage) et jusqu''à l''oued Yabboq, frontière des Ammonites ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le Jourdain et son rivage '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Jourdain formant la frontière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le Jourdain et frontière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jos 13.23,27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Kinnéreth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', sur la rive nord-ouest de la mer de Galilée ou lac de Tibériade, a donné son nom à ce lac que l''A.T. appelle aussi mer de Kinnéreth (Nb 34.11 ; Jos 13.27). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la mer de la plaine aride '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ‘arava
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 1.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: )
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ', la mer du Sel'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la mer Morte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pisga '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 27 ; 4.49 ; 34.1 ; Nb 21.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: ainsi que la plaine aride (le Jourdain et son rivage) depuis Kinnéreth jusqu'à la mer de la plaine aride, la mer du Sel, sous les pentes du Pisga, vers l'est.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ces paroles s''adressent aux Rubénites, aux Gadites et aux Manassites établis à l''est du Jourdain ; cf. 1.8+ ; Nb 32.17-32. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour passer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour traverser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: le Jourdain) ; cf. Nb 31.3 ; 32.17ss.
    marker-yv: yv-n
  - type: text
    text: 'En ce temps-là, je vous ai donné cet ordre : le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous a livré ce pays, pour que vous en preniez possession. Vous tous, vaillants hommes, vous prendrez les armes pour passer devant vos frères, les Israélites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vos familles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vos enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 34.29'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Seulement vos femmes, vos familles et vos troupeaux – je sais que vous avez de nombreux troupeaux – resteront dans les villes que je vous ai données, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'repos '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '12.9s ; 1R 8.56 ; Ps 95.11 ; Hé 3.11–4.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du pays que le '
      - type: usfm
        marker: nd
        children:
