  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Prière de Daniel
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Darius '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Xerxès
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : nom d''un monarque connu qui ne correspond pas à l''époque où se situe ce récit (cf. Esd 4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Est 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; les tentatives d''identification sont ici incertaines. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la dynastie…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'de la semence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la descendance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Mèdes.
      marker-yv: yv-n
    - type: text
      text: 'La première année de Darius, fils de Xerxès, de la dynastie mède, qui était devenu roi du royaume des Chaldéens, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ses '
        - type: usfm
          marker: w
          children:
          - type: text
            text: lois
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toroth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', pluriel de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) Jr 32.23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 105.45.'
      marker-yv: yv-n
    - type: text
      text: 'Nous n''avons pas écouté le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, pour suivre ses lois qu''il avait mises devant nous par l''intermédiaire de ses serviteurs, les prophètes. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'a passé outre… sans t''écouter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 18.10 ; 42.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se sont répandues
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 42.18 ; 44.6 ; 2Ch 12.7 ; 34.21,25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les malédictions…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la malédiction et le serment
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur le terme traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: malédiction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Gn 24.41'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lv 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 5.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ss ; Dt 29.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Dt 27–28 ; 29.20 ; Né 10.29s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moïse, serviteur de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 34.5 ; Jos 1.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contre Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; quelques mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; l''ensemble de la prière passe souvent de la 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' à la 3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' personne.'
      marker-yv: yv-n
    - type: text
      text: 'Tout Israël a passé outre à ta loi et s''est écarté, sans t''écouter. Alors se sont répandues sur nous les malédictions liées aux serments qui sont écrits dans la loi de Moïse, serviteur de Dieu, parce que nous avons péché contre Dieu. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa parole
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après une note en marge des mss ; autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses paroles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jr 1.12 ; Za 1.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les chefs qui nous ont gouvernés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nos juges qui nous ont jugés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais ces termes ne se limitent pas au pouvoir judiciaire et s''étendent fréquemment au pouvoir exécutif (témoin le livre des Juges) ; cf. Rt 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous le ciel entier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 2.25 ; 4.19 ; Jb 28.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Jérusalem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2R 25 ; Lm 1.12.
      marker-yv: yv-n
    - type: text
      text: 'Il a réalisé la parole qu''il avait prononcée contre nous et contre les chefs qui nous ont gouvernés, en faisant venir sur nous un malheur si grand qu''il n''en est jamais arrivé sous le ciel entier de semblable à celui qui est arrivé à Jérusalem. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cherché à apaiser
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'caressé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: adouci
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la face de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 32.11+.'
      marker-yv: yv-n
    - type: text
      text: 'Comme cela est écrit dans la loi de Moïse, tout ce malheur est venu sur nous ; et nous n''avons pas cherché à apaiser le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, nous ne sommes pas revenus de nos fautes, nous n''avons pas discerné ta vérité. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' a veillé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jr 1.12 ; 31.28 ; 44.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'juste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 119.137-144 ; cf. Rm 3.4.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a veillé sur ce malheur, et il l''a fait venir sur nous ; car le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', notre Dieu, est juste dans toutes les œuvres qu''il a faites, et nous ne l''avons pas écouté. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui as fait sortir… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 4.34 ; Jr 32.21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Es 63.12+ ; au lieu de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'voilà pourquoi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'on pourrait traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le nom que tu as en ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jr 32.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Né 9.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: agi en méchants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre forme du même verbe hébreu au v. 5.'
      marker-yv: yv-n
    - type: text
      text: 'Et maintenant, Seigneur, notre Dieu, toi qui as fait sortir ton peuple d''Egypte d''une main forte et qui t''es fait un nom – voilà pourquoi il en est ainsi en ce jour – nous avons péché, nous avons agi en méchants. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ez 25.3,8 ; 36.2-4 ; Ps 79.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout ce que tu fais…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toutes tes '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justices
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: victoires, hauts faits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. v. 18 ; Jg 5.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 12.7 ; Es 33.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 51.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ez 3.20+ ; Mi 6.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ps 103.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montagne sacrée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sainte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 20,24 ; 11.45. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'outrages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.2.'
      marker-yv: yv-n
    - type: text
      text: 'Seigneur, s''il te plaît, selon tout ce que tu fais pour la justice, que ta colère et ta fureur se détournent de ta ville, Jérusalem, ta montagne sacrée ; car, à cause de nos péchés et des fautes de nos pères, Jérusalem et ton peuple sont exposés aux outrages de tous ceux qui nous entourent. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pour le Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : des versions anciennes ont traduit '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour toi, Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour tes serviteurs, Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 19 ; Es 48.9-11 ; Jr 14.7-9 ; Ez 36.22 ; cf. Lc 18.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ton sanctuaire dévasté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ps 74.3-7.
      marker-yv: yv-n
    - type: text
      text: 'Maintenant donc, notre Dieu, entends ma prière et mes supplications, à moi, ton serviteur ! Pour le Seigneur, fais briller ta face sur ton sanctuaire dévasté ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tends l''oreille '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ouvre les yeux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2R 19.16/ / ; Ps 80.15-17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que nous avons fait… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous te présentons nos supplications
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'nous faisons tomber '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous déposons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nos supplications devant toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jr 36.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mon Dieu, tends l''oreille et entends ! Ouvre les yeux et vois nos lieux dévastés et la ville sur laquelle ton nom est invoqué ! Car ce n''est pas à cause de ce que nous avons fait pour la justice que nous te présentons nos supplications, c''est à cause de ta grande compassion. '
  '19':
