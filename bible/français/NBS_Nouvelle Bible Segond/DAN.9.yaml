document_id: DAN.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Prière de Daniel
  - type: text
    content: ' '
  - type: note
    content: 'Darius 6.1n. –  Xerxès  : nom d''un monarque connu qui ne correspond pas à l''époque où se situe ce récit (cf. Esd 4.6n  ; Est 1.1n) ; les tentatives d''identification sont ici incertaines. –  de la dynastie…  : litt. de la semence (ou de la descendance ) des Mèdes.'
  - type: text
    content: 'La première année de Darius, fils de Xerxès, de la dynastie mède, qui était devenu roi du royaume des Chaldéens, '
  '10':
  - type: note
    content: ses lois (hébreu toroth, pluriel de tora) Jr 32.23n  ; Ps 105.45.
  - type: text
    content: 'Nous n''avons pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, pour suivre ses lois qu''il avait mises devant nous par l''intermédiaire de ses serviteurs, les prophètes. '
  '11':
  - type: note
    content: 'a passé outre… sans t''écouter Jr 18.10 ; 42.13. –  se sont répandues  : cf. Jr 42.18 ; 44.6 ; 2Ch 12.7 ; 34.21,25. –  les malédictions…  : litt. la malédiction et le serment  ; sur le terme traduit par malédiction, voir Gn 24.41n  ; Lv 5.1n  ; Nb 5.21nss ; Dt 29.11n  ; cf. Dt 27–28 ; 29.20 ; Né 10.29s. –  Moïse, serviteur de Dieu Dt 34.5 ; Jos 1.1. –  contre Dieu  : litt. contre lui  ; quelques mss portent contre toi  ; l''ensemble de la prière passe souvent de la 2e à la 3e personne.'
  - type: text
    content: 'Tout Israël a passé outre à ta loi et s''est écarté, sans t''écouter. Alors se sont répandues sur nous les malédictions liées aux serments qui sont écrits dans la loi de Moïse, serviteur de Dieu, parce que nous avons péché contre Dieu. '
  '12':
  - type: note
    content: 'la parole  : sa parole, d''après une note en marge des mss ; autre lecture traditionnelle ses paroles  ; cf. Jr 1.12 ; Za 1.6. –  les chefs qui nous ont gouvernés  : litt. nos juges qui nous ont jugés, mais ces termes ne se limitent pas au pouvoir judiciaire et s''étendent fréquemment au pouvoir exécutif (témoin le livre des Juges) ; cf. Rt 1.1n. –  sous le ciel entier  : cf. Dt 2.25 ; 4.19 ; Jb 28.24n. –  à Jérusalem 2R 25 ; Lm 1.12.'
  - type: text
    content: 'Il a réalisé la parole qu''il avait prononcée contre nous et contre les chefs qui nous ont gouvernés, en faisant venir sur nous un malheur si grand qu''il n''en est jamais arrivé sous le ciel entier de semblable à celui qui est arrivé à Jérusalem. '
  '13':
  - type: note
    content: 'cherché à apaiser  : litt. caressé (ou adouci) la face de  ; cf. Ex 32.11+.'
  - type: text
    content: 'Comme cela est écrit dans la loi de Moïse, tout ce malheur est venu sur nous ; et nous n''avons pas cherché à apaiser le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, nous ne sommes pas revenus de nos fautes, nous n''avons pas discerné ta vérité. '
  '14':
  - type: note
    content: Le Seigneur a veillé Jr 1.12 ; 31.28 ; 44.27. –  juste Ps 119.137-144 ; cf. Rm 3.4.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a veillé sur ce malheur, et il l''a fait venir sur nous ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, est juste dans toutes les œuvres qu''il a faites, et nous ne l''avons pas écouté. '
  '15':
  - type: note
    content: 'qui as fait sortir… Dt 4.34 ; Jr 32.21. –  un nom…  : cf. Es 63.12+ ; au lieu de voilà pourquoi… on pourrait traduire le nom que tu as en ce jour  ; cf. Jr 32.20n  ; Né 9.10n. –  agi en méchants  : autre forme du même verbe hébreu au v. 5.'
  - type: text
    content: 'Et maintenant, Seigneur, notre Dieu, toi qui as fait sortir ton peuple d''Egypte d''une main forte et qui t''es fait un nom – voilà pourquoi il en est ainsi en ce jour – nous avons péché, nous avons agi en méchants. '
  '16':
  - type: note
    content: 'Cf. Ez 25.3,8 ; 36.2-4 ; Ps 79.4. –  tout ce que tu fais…  : litt. toutes tes justices (autres traductions victoires, hauts faits) ; cf. v. 18 ; Jg 5.11n  ; 1S 12.7 ; Es 33.15n  ; Jr 51.10n  ; Ez 3.20+ ; Mi 6.5n  ; Ps 103.6n. –  montagne sacrée ou sainte, de même aux v. 20,24 ; 11.45. –  outrages 11.18n  ; 12.2.'
  - type: text
    content: 'Seigneur, s''il te plaît, selon tout ce que tu fais pour la justice, que ta colère et ta fureur se détournent de ta ville, Jérusalem, ta montagne sacrée ; car, à cause de nos péchés et des fautes de nos pères, Jérusalem et ton peuple sont exposés aux outrages de tous ceux qui nous entourent. '
  '17':
  - type: note
    content: 'Pour le Seigneur  : des versions anciennes ont traduit pour toi, Seigneur ou pour tes serviteurs, Seigneur  ; cf. v. 19 ; Es 48.9-11 ; Jr 14.7-9 ; Ez 36.22 ; cf. Lc 18.13. –  ton sanctuaire dévasté Ps 74.3-7.'
  - type: text
    content: 'Maintenant donc, notre Dieu, entends ma prière et mes supplications, à moi, ton serviteur ! Pour le Seigneur, fais briller ta face sur ton sanctuaire dévasté ! '
  '18':
  - type: note
    content: 'tends l''oreille / Ouvre les yeux 2R 19.16/ / ; Ps 80.15-17. –  ce que nous avons fait… v. 16n. –  nous te présentons nos supplications  : litt. nous faisons tomber (c.-à-d. nous déposons) nos supplications devant toi  ; cf. Jr 36.7n.'
  - type: text
    content: 'Mon Dieu, tends l''oreille et entends ! Ouvre les yeux et vois nos lieux dévastés et la ville sur laquelle ton nom est invoqué ! Car ce n''est pas à cause de ce que nous avons fait pour la justice que nous te présentons nos supplications, c''est à cause de ta grande compassion. '
  '19':
  - type: note
    content: 'pour toi-même  : cf. v. 17n.'
  - type: text
    content: Seigneur, entends ! Seigneur, pardonne ! Seigneur, sois attentif ! Agis, ne tarde pas, pour toi-même, mon Dieu ! Car ton nom est invoqué sur ta ville et sur ton peuple.
  - type: heading
    content: Gabriel et les soixante-dix semaines
  '2':
  - type: note
    content: Jr 25.11s ; 29.10s ; 2Ch 36.21. –  ruines de Jérusalem Es 44.26.
  - type: text
    content: 'la première année de son règne, moi, Daniel, je compris par les livres le nombre d''années qui devait s''accomplir sur les ruines de Jérusalem, d''après la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui était parvenue à Jérémie, le prophète : soixante-dix ans. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'en faveur de  : litt. sur , préposition qui peut aussi signifier au sujet de.'
  - type: text
    content: 'Je parlais encore, je priais, je confessais mon péché et le péché d''Israël, mon peuple, et je présentais ma supplication au '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, en faveur de la montagne sacrée de mon Dieu ; '
  '21':
  - type: note
    content: 'Gabriel, l''homme… 8.15s ; Lc 1.19. –  vol Es 6.2 ; Ez 1.6. –  à l''heure (ou au moment) de l''offrande (autre traduction l''offrande végétale) du soir  : cf. 8.14n  ; Ex 29.41 ; Nb 28.4 ; 1R 18.29,36 ; Esd 9.4s ; Lc 1.10n  ; Ac 3.1.'
  - type: text
    content: 'je parlais encore, en prière, quand Gabriel, l''homme que j''avais vu précédemment dans la vision, s''approcha de moi d''un vol rapide, à l''heure de l''offrande du soir. '
  '22':
  - type: note
    content: 'Il m''instruisit  : des versions anciennes ont lu il vint. –  je suis sorti  : même verbe hébreu pour la parole émise au v. 23. –  l''intelligence  : le terme correspondant est apparenté à celui qui est traduit par instruire au début du v., et par saisir et comprendre au v. 23 ; cf. 8.17.'
  - type: text
    content: 'Il m''instruisit en me disant : Daniel, je suis sorti, maintenant, pour te communiquer l''intelligence. '
  '23':
  - type: note
    content: 'Au commencement… 10.12. –  tu es un bien-aimé  : litt. tu (es un homme de, terme ici sous-entendu mais exprimé en 10.11,19) désirs (ou prédilection), c.-à-d. désirable, choisi  ; le même terme est traduit par délicat en 10.3 ; LXX (homme) dont on a compassion.'
  - type: text
    content: Au commencement de tes supplications, une parole a été émise, et je suis venu te l'annoncer ; car tu es un bien-aimé. Saisis la parole et comprends la vision.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Texte difficile, susceptible d''interprétations diverses. Soixante-dix semaines  : aux 70 ans du v. 2 correspondent 70 semaines (d''années : cf. le système sabbatique de Lv 25.2-18 rapproché des 70 ans en 2Ch 36.21). –  faire cesser  : autre traduction mener à son comble. –  la transgression  : cf. 8.12s. –  mettre fin…  : litt. sceller les péchés. –  faire l''expiation de la faute  : cf. Es 40.2. –  la justice pour toujours Ps 119.142. –  conférer l''onction (c.-à-d. oindre d''huile, verbe apparenté au terme messie ) à un « très-sacré »  : cf. Ex 30.26+ ; il s''agit peut-être ici de la nouvelle dédicace du temple (dont le Très-Sacré ou Saint des saints constitue la partie principale) après la profanation d''Antiochos, en décembre 164, dédicace que le judaïsme commémore encore par la fête de la Dédicace ou Hanoukka (cf. Jn 10.22n  ; voir aussi calendrier et fêtes) ; ou, plus particulièrement, de l''investiture conférée au grand prêtre à cette occasion (cf. 1Ch 23.13n) ; voir aussi Ac 10.38.'
  - type: text
    content: Soixante-dix semaines ont été fixées
  - type: text
    content: sur ton peuple et sur ta ville sacrée,
  - type: text
    content: pour faire cesser la transgression
  - type: text
    content: et mettre fin aux péchés,
  - type: text
    content: pour faire l'expiation de la faute
  - type: text
    content: et amener la justice pour toujours,
  - type: text
    content: pour sceller vision et prophète
  - type: text
    content: et pour conférer l'onction à un « très-sacré ».
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'émise  : cf. v. 22ns. – Cyrus est présenté comme l''homme qui a reçu l''onction de YHWH en Es 44.26–45.1n, son édit autorisant la reconstruction de Jérusalem se situe en 538 av. J.-C., soit 49 ans ( sept semaines d''années) après la destruction de la ville en 587/6. Certains identifient le chef ayant reçu l''onction (cf. Ps 2.2n) à Josué, le grand prêtre du retour d''exil (Ag 1.1,14 ; Za 3.1ss ; cf. Ex 29.7 ; Za 4.14). Une interprétation ancienne additionne les sept semaines aux soixante-deux (483 ans) et part de la reconstruction des murailles de Jérusalem sous Artaxerxès Ier (vers 456 av. J.-C.) pour arriver à l''époque de Jésus-Christ. –  pendant (litt. et ) soixante-deux semaines  : cf. Es 15.3 ; Jr 5.1 ; Pr 1.20 ; 7.12. Si les soixante-deux semaines débutent avec la reconstruction vers la fin du VIe s. av. J.-C., elles conduisent approximativement à l''époque d''Antiochos, le roi persécuteur.'
  - type: text
    content: Sache-le donc et comprends !
  - type: text
    content: Depuis qu'a été émise la parole
  - type: text
    content: disant de rétablir, de rebâtir Jérusalem,
  - type: text
    content: jusqu'à un chef ayant reçu l'onction,
  - type: text
    content: il y a sept semaines ;
  - type: text
    content: pendant soixante-deux semaines,
  - type: text
    content: places et fossés seront rétablis, rebâtis,
  - type: text
    content: mais en des temps d'angoisse.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'un homme ayant reçu l''onction (ou un oint, un messie ) sera retranché  : il s''agit peut-être de l''assassinat du grand prêtre (voir v. 25n) Onias III en 170 av. J.-C. –  il n''aura personne pour lui  : litt. il n''y a pas pour lui , phrase obscure qu''une version grecque (Théodotion) explique en ajoutant de jugement ou de faute . Cf. 2 Maccabées 4.34 : « Il (le substitut d''Antiochos) le mit à mort (Onias) sur-le-champ, sans égard pour la justice. » –  ville / sanctuaire  : cf. v. 17s ; 7.25 ; 8.11-13. –  dans un déferlement ou dans une inondation , texte obscur ; cf. 11.10,22,40 ; Na 1.8.'
  - type: text
    content: Après les soixante-deux semaines,
  - type: text
    content: un homme ayant reçu l'onction sera retranché,
  - type: text
    content: et il n'aura personne pour lui.
  - type: text
    content: Le peuple d'un chef qui vient détruira la ville et le sanctuaire,
  - type: text
    content: et sa fin arrivera dans un déferlement ;
  - type: text
    content: jusqu'à la fin de la guerre
  - type: text
    content: des dévastations sont décidées.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Il fera…  : autre traduction il imposera une alliance à la multitude  : cf. 11.33,39 ; 12.3 ; même terme en 8.25 ; 11.14,18,34,44 ; 12.2,4,10 ; 1 Maccabées 1.11 : « En ces jours-là (ceux d''Antiochos) des vauriens surgirent d''Israël, et ils séduisirent beaucoup de gens en disant : “Allons, faisons alliance avec les nations qui nous entourent.” » 1.52 : « Beaucoup de gens du peuple – entendons tous ceux qui abandonnaient la Loi –, se rallièrent à eux (aux inspecteurs d''Antiochos et à leur politique d''apostasie). » –  une semaine  : la 70e et dernière (cf. v. 24-26). –  durant la moitié de la semaine  : c.-à-d. trois ans et demi ; cf. 7.25n. –  il fera cesser le sacrifice 8.11-13. –  sur l''aile ou le bord  ; certains voient dans ce terme une désignation des cornes de l''autel du temple, profané ; voir aussi Mt 4.5n  ; le terme traduit par horreurs désigne souvent les idoles. –  un dévastateur…  : hébreu meshomem , qui rappelle peut-être le nom de Baal Shamem ou Shamîn ( Seigneur du ciel ), le dieu syrien identifié à Zeus Olympien dans le panthéon grec, celui à qui Antiochos IV Epiphane aurait érigé un autel dans le temple de Jérusalem en 167 av. J.-C. ; voir aussi chap. 3 ; 11.31n  ; 12.1 ; cf. 1 Maccabées 1.54 : « Le roi construisit l''abomination de la dévastation sur l''autel des holocaustes. » Voir aussi Mt 24.15/ . –  destruction décidée  : cf. 2.44 ; 8.25 ; 11.36,45 ; Es 28.22.'
  - type: text
    content: Il fera avec la multitude une solide alliance d'une semaine,
  - type: text
    content: et durant la moitié de la semaine
  - type: text
    content: il fera cesser le sacrifice et l'offrande ;
  - type: text
    content: sur l'aile des horreurs, il y aura un dévastateur, jusqu'à ce que la destruction décidée fonde sur le dévastateur.
  '3':
  - type: note
    content: 'Je me tournai  : litt. je tournai ma face  ; cf. 10.15 ; 11.19n  ; voir aussi 6.12. –  en quête de  : litt. pour chercher la prière…  ; d''autres comprennent pour le chercher (Dieu) par la prière. –  prières 6.11ss. –  jeûne Né 1.4 ; 2Ch 20.3. –  sac / cendre  : signes d''humiliation, de repentance ou de deuil ; cf. Es 58.5 ; Est 4.1 ; Mt 11.21.'
  - type: text
    content: 'Je me tournai vers le Seigneur Dieu, en quête de prières et de supplications, par le jeûne, le sac et la cendre. '
  '4':
  - type: note
    content: 'Cf. Esd 9.6-15 ; Né 1.5-11 ; 9.5-37. –  le Seigneur / Seigneur  : hébreu YHWH / ’Adonaï, cf. Ex 3.15n. –  Dieu traduit ici, successivement, les termes hébreux ’Elohim (Gn 1.1n) et ’El (Gn 21.33n). –  toi qui gardes l''alliance… Dt 7.9,12 ; Né 1.5+. –  envers ceux qui t''aiment… Ex 20.6.'
  - type: text
    content: 'Je priai le '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, et je lui fis cette confession :'
  - type: text
    content: 'S''il te plaît, Seigneur, Dieu grand et redoutable, toi qui gardes l''alliance et la fidélité envers ceux qui t''aiment et qui observent tes commandements ! '
  '5':
  - type: note
    content: Nous avons péché Jg 10.10+.
  - type: text
    content: 'Nous avons péché, nous avons commis des fautes, nous avons agi en méchants et en rebelles, nous nous sommes détournés de tes commandements et de tes règles. '
  '6':
  - type: note
    content: V. 10,14 ; Jr 7.26 ; 2Ch 33.10 ; 36.15s. –  tes serviteurs, les prophètes 2R 21.10+.
  - type: text
    content: 'Nous n''avons pas écouté tes serviteurs, les prophètes, qui ont parlé en ton nom à nos rois, à nos princes, à nos pères et à tout le peuple du pays. '
  '7':
  - type: note
    content: 'la honte  : litt. la honte du visage, de même dans la suite. –  voilà pourquoi…  : cf. Dt 2.30n. – Cf. 2R 17.6ss ; 24.14-16 ; 25.11.'
  - type: text
    content: 'A toi, Seigneur, la justice, et à nous la honte – voilà pourquoi il en est ainsi en ce jour – oui, aux hommes de Juda, aux habitants de Jérusalem et à tout Israël, à ceux qui sont proches comme à ceux qui sont loin, dans tous les pays où tu les as chassés à cause des sacrilèges qu''ils ont commis envers toi. '
  '8':
  - type: text
    content: Seigneur
  - type: text
    content: ', à nous la honte, à nos rois, à nos princes et à nos pères, parce que nous avons péché contre toi. '
  '9':
  - type: text
    content: 'Au Seigneur, notre Dieu, la compassion et le pardon, car nous avons été rebelles envers lui. '
