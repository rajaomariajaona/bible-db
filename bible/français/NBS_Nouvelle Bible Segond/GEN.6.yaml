document_id: GEN.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fils de Dieu et les filles des humains
  - type: text
    content: ' '
  - type: note
    content: 'les humains  : hébreu ’adam , 1.26n. –  commencé 4.26n. –  se multiplier 1.28. –  filles 5.4 etc.'
  - type: text
    content: 'Lorsque les humains eurent commencé à se multiplier sur la terre et que des filles leur furent nées, '
  '10':
  - type: note
    content: 5.32n.
  - type: text
    content: 'Noé engendra trois fils : Sem, Cham et Japhet. '
  '11':
  - type: note
    content: 'pervertie ou corrompue  : le même verbe (voir v. 13n) est traduit ailleurs par ravager (Ex 8.20), abîmer (Jr 13.7), manquer (Jr 18.4) ; cf. Ez 20.44. –  aux yeux de  : litt. devant  ; cf. 7.1. –  pleine de violence Ez 7.23 ; 8.17 ; 28.16.'
  - type: text
    content: 'La terre était pervertie aux yeux de Dieu, la terre était pleine de violence. '
  '12':
  - type: note
    content: 'Dieu vit  : cf. 1.31. –  tous s''étaient pervertis  : litt. toute chair (cf. v. 13n,17,19 ; 7.15s ; 9.11,15ss) avait perverti son chemin ou sa voie, sa conduite.'
  - type: text
    content: Dieu vit que la terre était pervertie, car tous s'étaient pervertis sur la terre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'La fin… décidée  : litt. la fin de toute chair est venue devant moi . –  je vais les anéantir  : autre traduction je les anéantis (même construction au v. 17, je fais venir ) ; anéantir ou détruire (autre traduction courante du même verbe) est un autre sens du verbe traduit par pervertir aux v. 11ns ; cf. v. 17 ; 9.11,15 ; 13.10 ; 18.31s ; 19.13,29 ; voir aussi Ap 11.18.'
  - type: text
    content: 'Alors Dieu dit à Noé : La fin de tous est arrivée, je l''ai décidée, car la terre est pleine de violence à cause d''eux ; je vais les anéantir avec la terre. '
  '14':
  - type: note
    content: 'arche  : même mot hébreu Ex 2.3n,5 (caisse) ; c''est un autre mot hébreu qui désignera le coffre ou arche de l''alliance ou du témoignage (Ex 25.10n) ; LXX emploie le même terme grec dans les deux cas. –  résineux  : le terme hébreu qui apparaît ici, et que certains se contentent de transcrire (gopher), fait assonance avec les termes traduits dans le même v. par couvrir et enduit (voir ci-après). Il s''agit probablement du nom d''un arbre, mais on en ignore l''identification exacte (cyprès ? teck ?). –  cellules  : litt. nids  ; en vocalisant différemment les consonnes du texte hébreu on a aussi compris tu la feras avec des roseaux. –  couvriras / enduit  : mots de la même racine kpr, qui a aussi fourni le vocabulaire technique de l''expiation ou annulation des péchés (cf. le jour de l''Expiation, en hébreu yom ha-kippourim  ; voir aussi Ex 25.17n). –  dedans / dehors  : cf. 1R 7.9.'
  - type: text
    content: 'Fais-toi une arche en bois de résineux ; tu diviseras cette arche en cellules et tu la couvriras d''un enduit, au dedans et au dehors. '
  '15':
  - type: note
    content: 'trois cents coudées  : près de 150 m (voir mesures). –  cinquante coudées  : près de 25 m. –  trente coudées  : près de 15 m.'
  - type: text
    content: 'Voici comment tu la feras : l''arche aura trois cents coudées de longueur, cinquante coudées de largeur et trente coudées de hauteur. '
  '16':
  - type: note
    content: 'ouverture (cf. 8.6) ou toit dépassant d''une coudée (cf. 8.13) ? Le terme correspondant n''apparaît qu''ici et son sens est très incertain ; sur la disposition en trois étages, comparer avec l''architecture générale du temple en 1R 6.6. –  porte  : litt. ouverture, entrée.'
  - type: text
    content: 'Tu feras à l''arche une ouverture d''une coudée, disposée tout en haut ; tu placeras la porte de l''arche sur le côté ; tu feras un étage inférieur, un deuxième et un troisième. '
  '17':
  - type: note
    content: 'le déluge  : cf. 7.6s,10,17 ; 9.11,15,28 ; 10.1,32 ; 11.10 ; d''autres récits de la grande inondation ont circulé dans l''Antiquité (voir « Le déluge dans la Genèse et dans l’Epopée de Gilgamesh  »♦) ; certains d''entre eux emploient un vocabulaire apparenté au terme hébreu qui apparaît ici pour évoquer le déferlement de l''élément liquide (cf. Es 30.25). Dans certains passages de l''A.T. ce terme désigne vraisemblablement, non pas l''inondation elle-même, mais les eaux d''en haut (Gn 1.6n) qui en sont la cause ; cf. 7.10 ; 9.11 ; Ps 29.10n. –  anéantir  : voir v. 13n. –  tous ceux  : litt. toute chair, voir v. 12n. –  souffle ou esprit v. 3n  ; 7.15. –  périra  : litt. expirera.'
  - type: text
    content: 'Quant à moi, je fais venir sur la terre le déluge – les eaux – pour anéantir tous ceux qui ont souffle de vie sous le ciel ; tout ce qui est sur la terre périra. '
  '18':
  - type: note
    content: 'Cf. Hé 11.7 ; 1P 2.20 ; 2P 2.5. –  j''établirai  : litt. je dresserai ou je dresse, de même en 9.9,11 ; 17.7,19 ; Ex 6.4 ; Lv 26.9n  ; Dt 8.18n  ; Jr 34.18n  ; Ez 16.62. –  alliance 9.9n-17 ; 14.13 ; 15.18 ; 17.2-21. –  tes fils, ta femme… 7.7,13 ; 8.16,18.'
  - type: text
    content: 'Mais j''établirai mon alliance avec toi ; tu entreras dans l''arche, toi, tes fils, ta femme et les femmes de tes fils avec toi. '
  '19':
  - type: note
    content: 'De toutes les sortes…  : litt. de tout vivant, de toute chair, deux de chaque tu feras entrer dans l''arche  ; cf. 8.17 ; voir aussi 7.2. –  mâle / femelle 1.27n.'
  - type: text
    content: 'De toutes les sortes d''êtres vivants, tu feras entrer dans l''arche deux de chaque espèce, pour qu''ils restent en vie avec toi : un mâle et une femelle. '
  '2':
  - type: note
    content: 'fils de Dieu ou fils des dieux  ; cette expression désigne en général des êtres divins ou célestes ; cf. 1.1n  ; 3.5n  ; Ps 29.1 ; 82.1,6 ; 89.7s ; Jb 1.6 ; 2.1 ; 38.7 ; Dn 3.25 ; cf. Jd 6s ; 2P 2.4. Voir cependant 2S 7.14 ; Ps 2.7 ; 89.27 ; voir aussi 1R 11. –  belles  : litt. bonnes, cf. 1.4n. –  ils prirent…  : cf. 4.19 ; 12.10-20 ; 29 ; Ex 34.15s ; 2S 11–12 ; voir aussi 1 Hénoch 6.1s : « Il arriva que lorsque les humains se furent multipliés, il leur naquit des filles fraîches et jolies. Les anges, fils du ciel, les regardèrent et les désirèrent. Ils se dirent l''un à l''autre : “Allons nous choisir des femmes parmi les humains et engendrons-nous des enfants.” » 7.1ss : « (Ils) prirent pour eux des femmes, une pour chacun d''eux, et ils se mirent à les approcher et à se souiller à leur contact. Ils leur enseignèrent les drogues, les charmes, la botanique et ils leur montrèrent les herbes. Les femmes conçurent et enfantèrent des géants, hauts de trois mille coudées, qui dévorèrent tout le fruit du labeur des hommes. »'
  - type: text
    content: 'les fils de Dieu virent que les filles des humains étaient belles et ils prirent pour femmes toutes celles qu''ils choisirent. '
  '20':
  - type: note
    content: 'De chaque espèce…  : litt. de l''oiseau selon son espèce, du bétail selon son espèce, de toute bestiole (1.24n) de la terre (2.5n) selon son espèce…  ; cf. 1.11+ ; 7.14 etc. –  viendra  : cf. 2.19.'
  - type: text
    content: 'De chaque espèce parmi les oiseaux, le bétail et toutes les bestioles qui fourmillent sur la terre, un couple viendra vers toi pour rester en vie. '
  '21':
  - type: note
    content: nourriture 1.29s.
  - type: text
    content: 'Et toi, prends de tout ce qui se mange et fais-t''en des provisions ; cela te servira de nourriture, ainsi qu''à eux. '
  '22':
  - type: note
    content: '7.5 ; Ex 12.28 ; Nb 1.54+. –  ordonné ou commandé  : le verbe employé ici (cf. déjà 2.16 ; 3.11,17) revient souvent dans les codes de lois, cf. Ex 24.3,7 ; Dt 6.17.'
  - type: text
    content: Noé fit exactement ce que Dieu lui avait ordonné. Ainsi fit-il.
  '3':
  - type: note
    content: 'Cf. 3.22,24 ; 11.6s. –  souffle ou Esprit v. 17 ; 1.2n  ; 7.15,22 ; cf. 2.7n (autre mot hébreu). –  restera  : d''après LXX  ; autres traductions proposées  : contestera, régnera, s''humiliera. Le terme hébreu rappelle un verbe souvent traduit par juger (cf. Es 11.4s ; Ps 72.1). –  pas toujours  : l''hébreu pourrait aussi signifier jamais plus, mais le contexte favorise la traduction choisie. –  dans l''être humain…  : ou bien dans les humains, car ceux-ci… (le terme hébreu traduit par être humain étant un singulier collectif, 1.26n). –  n''est que chair  : autre traduction possible car lui aussi est (ou eux aussi sont) chair. Certains, interprétant différemment le terme hébreu, lisent  : à cause de leur égarement (comme en 1S 26.21, erreur)  : ils sont chair  ; cf. Es 40.26. –  cent vingt ans  : cf. 11.10-26 ; 50.26.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Mon souffle ne restera pas toujours dans l''être humain, car celui-ci n''est que chair ; ses jours seront de cent vingt ans. '
  '4':
  - type: note
    content: 'Nephilim  : peut-être ceux qui sont tombés (du ciel ? dans la mort ?) ; LXX géants. Même terme Nb 13.33 ; voir aussi Ez 32.20-27n où revient plusieurs fois le verbe apparenté (tomber) et où figure également le mot traduit ici par héros (Gn 10.8n). –  sur la terre  : dans d''autres contextes, la même expression peut aussi signifier dans le pays. –  vinrent vers…  : cf. 30.16 ; 38.16. –  renom  : litt. nom (cf. 5.32n).'
  - type: text
    content: 'En ces jours-là – et encore après cela – les Nephilim étaient sur la terre, lorsque les fils de Dieu vinrent vers les filles des humains et qu''elles leur donnèrent des enfants : ce sont là les héros d''autrefois, les hommes de renom.'
  - type: heading
    content: Dieu décide d'anéantir l'humanité et d'épargner Noé
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 17.9 ; Ps 14.1s ; Jb 22.15s. –  le mal  : autre traduction la méchanceté  ; le terme hébreu peut aussi désigner un malheur  ; c''est un adjectif apparenté qui est traduit par mauvaises dans la suite du v. –  leur cœur…  : litt. toute forme de pensée de son cœur (celui de l''humain, ’adam , 1.26n) (n''était) que mal (les derniers mots font assonance en hébreu) tout le jour  ; cf. 1Ch 28.9 ; 29.18.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' vit que le mal des humains était grand sur la terre, et que leur cœur ne concevait jamais que des pensées mauvaises. '
  '6':
  - type: note
    content: 'regretta  : le terme hébreu évoque un regret ou un changement d''avis ; une autre forme du verbe est traduite par consoler en 5.29 ; cf. 8.21 ; 1S 15.11 ; Jon 3.9s ; voir aussi Nb 23.19+. –  affligé  : le verbe hébreu rappelle le mot traduit par peine en 3.16s ; 5.29.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' regretta d''avoir fait les humains sur la terre, et son cœur fut affligé. '
  '7':
  - type: note
    content: J'effacerai (le verbe n'apparaît qu'une fois dans le texte) 7.4,23. –  humains 1.26n. –  depuis les humains jusqu'au bétail… 1.24-28 ; 2.19s.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : J''effacerai de la terre les humains que j''ai créés ; j''effacerai depuis les humains jusqu''au bétail, aux bestioles et aux oiseaux du ciel ; car je regrette de les avoir faits. '
  '8':
  - type: note
    content: trouva grâce… 18.3n  ; 19.19 ; 30.27 ; 32.6ss etc. ; cf. 39.21 ; Ex 33.12ss ; Rt 2.2+ ; Est 2.15n.
  - type: text
    content: 'Mais Noé trouva grâce aux yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'généalogie 2.4n. –  juste 7.1n  ; 18.24ss. –  intègre 17.1 ; cf. 20.5s ; Ex 12.5n. –  parmi les générations de son temps  : litt. dans ses générations  ; cf. 7.1 ; 9.12n. –  marchait avec Dieu 5.22+.'
  - type: text
    content: 'Voici la généalogie de Noé. Noé était un homme juste et intègre parmi les générations de son temps ; Noé marchait avec Dieu. '
