document_id: PSA.95,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Si vous l'écoutiez !
  - type: text
    content: ' '
  - type: note
    content: '32.11+ ; 59.18. –  Poussons des cris de joie  : litt. allez, poussons des cris de joie . –  Rocher 18.3+ ; 89.27.'
  - type: text
    content: 'Poussons des cris de joie pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: Acclamons le Rocher de notre salut !
  '10':
  - type: text
    content: ' '
  - type: note
    content: quarante ans Nb 14.33s. –  dont le cœur est égaré Es 21.4 ; 29.24.
  - type: text
    content: Pendant quarante ans, j'ai eu cette génération en dégoût
  - type: text
    content: 'et je dis : C''est un peuple dont le cœur est égaré ;'
  - type: text
    content: ils ne connaissent pas mes voies.
  '11':
  - type: text
    content: ' '
  - type: note
    content: j'ai juré 106.26. –  mon repos ou mon lieu de repos  ; cf. Nb 14.30 ; Dt 12.9 ; Hé 4.3,5.
  - type: text
    content: 'Aussi j''ai juré dans ma colère :'
  - type: text
    content: En aucun cas ils n'entreront dans mon repos !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'au-devant de lui ou devant lui  ; cf. 89.15 ; 100.4 ; 1Ch 16. –  avec reconnaissance  : on pourrait aussi comprendre avec un sacrifice de reconnaissance , ou dans une procession de reconnaissance  ; cf. 26.7n  ; 100.1,4 ; 147.7 ; Lv 7.12ns.'
  - type: text
    content: Allons au-devant de lui avec reconnaissance,
  - type: text
    content: avec des psaumes acclamons-le.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.3+ ; 24.7ss ; 47.3ss ; 48.2+ ; 93.1+ ; 96.4 ; 97.9 ; 135.5 ; 136.2 ; 149.2 ; voir aussi Ex 15.11 ; Jr 10.7,10 ; Ml 1.14 ; 2Ch 2.5 ; 1Tm 1.17 ; 6.15. –  Dieu  : hébreu ’El , cf. Gn 21.33n.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) est un grand Dieu,'
  - type: text
    content: c'est un grand roi au-dessus de tous les dieux.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 24.1+ ; 89.12. –  profondeurs  : cf. 68.23 ; Jb 11.7 ; 38.16.'
  - type: text
    content: Il tient dans sa main les profondeurs de la terre,
  - type: text
    content: et les sommets des montagnes lui appartiennent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: terre ferme ou sèche , terme apparenté en Gn 1.9ns ; cf. Es 48.13.
  - type: text
    content: La mer lui appartient, c'est lui qui l'a faite ;
  - type: text
    content: la terre ferme aussi, ses mains l'ont façonnée.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'prosternons-nous…  : cf. 2S 14.33 ; 1R 1.23 ; 8.54 ; 2Ch 29.28s. –  qui nous fait  : cf. 100.3s ; 149.2 ; Dt 32.6 ; Es 43.1+ ; Ep 2.10.'
  - type: text
    content: Venez, prosternons-nous, courbons-nous,
  - type: text
    content: 'fléchissons le genou devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui nous fait.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Hé 3.7-11. –  le peuple… 74.1n  ; 79.13 ; 100.3 ; Es 40.11 ; Jr 23.1 ; Ez 34.11s,31 ; cf. Jn 10.3 ; Ap 21.3. –  que sa main conduit  : litt. de sa main  ; cf. 78.42n  ; Ex 14.31 ; Jr 16.21. –  Si aujourd''hui (cf. Dt 1.10+) …  : la phrase pourrait aussi se rattacher à ce qui précède  : nous sommes son peuple aujourd''hui encore, si vous l''écoutez (le verbe hébreu peut signifier écouter, entendre ou obéir , Dt 4.30n) ; cf. Ps 50.7 ; 81.9,14s ; Es 48.18s ; LXX l''a traduite comme une simple conditionnelle  : si vous écoutez (ou entendez ) sa voix…  ; voir Hé 3.7.'
  - type: text
    content: Car il est notre Dieu,
  - type: text
    content: et nous sommes le peuple qu'il fait paître,
  - type: text
    content: le troupeau que sa main conduit.
  - type: text
    content: Si aujourd'hui vous l'écoutiez !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ne vous obstinez pas  : litt. n''endurcissez pas vos cœurs  ; cf. Ex 7.3n. –  Meriba ( Contestation, Dispute ) 81.8 ; Nb 20.13 ; Dt 33.8. –  Massa ( Provocation, Epreuve  ; cf. v. 9) 78.18+ ; 106.14 ; voir Ex 17.7n  ; Dt 6.16 ; 9.22 ; 33.8n  ; 1Co 10.11.'
  - type: text
    content: Ne vous obstinez pas comme à Meriba,
  - type: text
    content: comme au jour de Massa, dans le désert,
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'm''ont provoqué 78.18+ ; c''est le même verbe qui est traduit par mettre à l''épreuve en 26.2. –  en m''éprouvant  : autre traduction en me sondant  ; cf. 7.10n  ; 26.2.'
  - type: text
    content: où vos pères m'ont provoqué
  - type: text
    content: en m'éprouvant, bien qu'ils aient vu mon action.
