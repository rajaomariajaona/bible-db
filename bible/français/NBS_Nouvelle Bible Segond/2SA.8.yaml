document_id: 2SA.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoires de David sur les nations voisines
  - type: heading
    content: 1Ch 18.1-13
  - type: text
    content: ' '
  - type: note
    content: 'Après cela  : la première partie du chap. 8 (v. 1-14) énumère de façon sommaire quelques faits d''armes marquants du règne de David ; ils ne sont pas nécessairement présentés dans un ordre chronologique strict. –  les rênes du pouvoir  : les deux mots hébreux correspondants signifient respectivement bride (d''où rênes ) et coudée  ; on ne les trouve ensemble qu''ici, et le sens de l''expression est fort peu clair. Autres traductions le contrôle de la métropole, le contrôle de l''aqueduc, le contrôle de l''Amma (nom propre de lieu ?). Le texte parallèle de 1Ch 18.1 dit que David s''empara de Gath et des localités qui en dépendent.'
  - type: text
    content: Après cela, David battit les Philistins et les humilia. Il prit aux Philistins les rênes du pouvoir.
  '10':
  - type: note
    content: 'Joram  : appelé Hadoram en 1Ch 18.10, nom qui dérive de celui du dieu syrien Hadad (voir Baal). –  comment il allait  : litt. pour la paix, cf. 11.7n  ; 1S 10.4n  ; LXX emploie ici une expression grecque très proche de celle qui est traduite par demander les conditions de paix en Lc 14.32n. –  féliciter  : le verbe hébreu correspondant signifie souvent bénir. –  Toï était en guerre avec Hadad-Ezer  : litt. Hadad-Ezer était un homme de guerres (= adversaire) de Toï. –  apporta en cadeau ; voir 1R 10.25.'
  - type: text
    content: Il envoya Joram, son fils, auprès du roi David, pour lui demander comment il allait et pour le féliciter d'avoir fait la guerre à Hadad-Ezer et de l'avoir battu. Car Toï était en guerre avec Hadad-Ezer. Joram apporta des objets d'argent, des objets d'or et des objets de bronze.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'consacra  : voir 1R 7.51 ; 1Ch 22.14 ; cf. 2R 12.19 ; voir saint.'
  - type: text
    content: 'Le roi David les consacra au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme il avait déjà consacré l''argent et l''or pris à toutes les nations qu''il avait vaincues, '
  '12':
  - type: note
    content: 'Aram pourrait être une erreur de copie pour Edom, qui semblerait mieux en place dans ce contexte. –  Hadad-Ezer  : voir v. 3.'
  - type: text
    content: à Aram, à Moab, aux Ammonites, aux Philistins, à Amalec, ou provenant du butin de Hadad-Ezer, fils de Rehob, roi de Tsoba.
  '13':
  - type: text
    content: ' '
  - type: note
    content: La vallée du Sel se situait entre la mer Morte et le golfe d'Aqaba, en territoire édomite ; certains spécialistes voudraient donc, ici aussi, remplacer Aram par Edom (cf. Ps 60.2).
  - type: text
    content: 'David se fit un nom lorsqu''il revint après avoir battu Aram dans la vallée du Sel : dix-huit mille hommes. '
  '14':
  - type: note
    content: 'des garnisons  : cf. v. 6n  ; 1S 10.5n. –  dans tout Edom…  : la répétition insiste sur l''étendue de la domination de David. –  fut soumis  : cf. v. 2 ; voir aussi Gn 25.23 ; Nb 24.18 ; Ps 108.10. –  donnait la victoire  : cf. v. 6n.'
  - type: text
    content: 'Il installa des garnisons en Edom, dans tout Edom il installa des garnisons ; et tout Edom fut soumis à David. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donnait la victoire à David partout où il allait.'
  - type: heading
    content: Liste des fonctionnaires de David
  - type: heading
    content: 1Ch 18.14-17
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Voir 23.3 ; Jr 22.15 ; Ps 78.72 ; Pr 29.4 ; cf. Es 9.6 ; Jr 23.5. – Voir en 20.23-26 une notice analogue à celle des v. 15-18. –  l''équité  : autre traduction le droit  ; voir aussi justice.'
  - type: text
    content: 'David régna sur tout Israël. Il agissait envers tout son peuple selon l''équité et la justice. '
  '16':
  - type: note
    content: 'Joab 2.13n. –  archiviste  : cf. 1R 4.3 ; le sens précis du mot hébreu correspondant n''est pas assuré ; on l''a aussi rendu par chancelier, porte-parole ou secrétaire.'
  - type: text
    content: 'Joab, fils de Tserouya, était à la tête de l''armée ; Josaphat, fils d''Ahiloud, était archiviste ; '
  '17':
  - type: note
    content: Abiathar est présenté ailleurs comme fils d'Ahimélek, voir 1S 22.20 ; 30.7 ; cf. Mc 2.26. – Voir scribe.
  - type: text
    content: 'Tsadoq, fils d''Ahitoub, et Ahimélek, fils d''Abiathar, étaient prêtres ; Seraya était scribe ; '
  '18':
  - type: note
    content: 'Benaya  : hébreu Benayahou. –  était avec les Kérétites  : litt. et les Kérétites (20.23 ; 1Ch 18.17) ; autre traduction Benaya… était à la tête des Kérétites. –  Kérétites / Pélétites  : deux groupes de soldats au service du roi David (cf. 15.18 ; 20.7 ; 1R 1.38,44) ; ils pourraient avoir été des mercenaires venant respectivement de Crète et de Philistie. –  les fils de David étaient prêtres  : affirmation surprenante après le v. 17 ; LXX traduit en grec par un néologisme qui pourrait signifier maîtres du palais ou ministres de la cour (du temple ?). Le rédacteur des Chroniques dira de manière vague qu''ils étaient au premier rang après le roi. En fait, il n''est pas impossible qu''à cette époque ancienne les fils du roi aient assumé des tâches sacerdotales.'
  - type: text
    content: Benaya, fils de Joïada, était avec les Kérétites et les Pélétites ; et les fils de David étaient prêtres.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'les Moabites  : litt. Moab , au sens collectif de les habitants de Moab . Ils sont déjà mentionnés comme adversaires des Israélites en 1S 14.47n  ; cf. Nb 24.17 ; 2R 1.1 ; 3.4-27. –  il les mesura…  : allusion à ce que fut probablement la méthode pour désigner de manière neutre un certain pourcentage de victimes dans les rangs des vaincus : les soldats ennemis étaient, semble-t-il, couchés côte à côte à terre ; avec un cordeau , on mesurait deux premiers groupes de soldats, destinés à être exécutés, puis un troisième groupe, qu''on laissait en vie. –  furent soumis  : litt. furent serviteurs ou esclaves  ; cf. v. 6 ; 10.19 ; Ps 18.44. –  un tribut  : litt. une offrande , mot hébreu employé parfois de manière euphémique pour désigner la contribution imposée par le vainqueur au pays vaincu (Jg 3.15n). Dans de nombreux textes sacrificiels, ce mot a pris un sens particulier, désignant les offrandes végétales (grain, farine, huile) par opposition aux sacrifices d''animaux.'
  - type: text
    content: Il battit les Moabites et il les mesura avec un cordeau, en les faisant coucher par terre ; il en mesura deux cordeaux pour les mettre à mort et un plein cordeau pour leur laisser la vie. Les Moabites furent soumis à David et assujettis à un tribut.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Hadad-Ezer reparaîtra en 10.16-19 et en 1R 11.23 ; dans plusieurs mss hébreux, ce nom est orthographié Hadar-Ezer , probablement pour faire disparaître le nom Hadad , qui est celui du dieu de Syrie ; voir Baal. –  Rehob apparaît comme nom de lieu ( Beth-Rehob ) en 10.6-14. –  Tsoba  : nom de l''un des petits royaumes composant la Syrie ; voir 1S 14.47 ; 1R 11.23 ; 2Ch 8.3. –  lorsqu''il alla  : il est difficile de savoir, dans cette brève notice, si le sujet il se rapporte à David (qui profiterait d''une expédition plus lointaine, sur l''Euphrate , pour au passage rappeler à l''ordre Hadad-Ezer) ou à Hadad-Ezer lui-même (qui voudrait remettre la main sur un territoire qu''il aurait perdu, mais qui verrait ses velléités contrecarrées par David). –  sur l''Euphrate  : selon une tradition juive de lecture du texte ; une autre tradition dit seulement sur le fleuve , mais le sens est le même.'
  - type: text
    content: 'David battit Hadad-Ezer, fils de Rehob, roi de Tsoba, lorsqu''il alla rétablir sa domination sur l''Euphrate. '
  '4':
  - type: note
    content: 'équipages de chars  : autres traductions hommes d''équipage, attelages, chevaux d''attelage  ; cf. 1Ch 18.4. –  coupa les jarrets  : les chevaux ainsi mutilés n''étaient plus aptes à tirer les chars de guerre ; cf. Jos 11.6-9. –  une centaine  : cf. Dt 17.16 ; Es 31.1 ; Mi 5.9 ; Ps 20.8.'
  - type: text
    content: 'David lui prit mille sept cents équipages de chars et vingt mille fantassins ; il coupa les jarrets à tous les attelages, après en avoir conservé une centaine. '
  '5':
  - type: note
    content: 'Les Araméens de Damas  : un autre royaume de Syrie. –  abattit  : litt. frappa, au sens de tua (1S 4.2n) ou de battit.'
  - type: text
    content: 'Les Araméens de Damas vinrent au secours de Hadad-Ezer, roi de Tsoba, et David abattit vingt-deux mille hommes parmi les Araméens. '
  '6':
  - type: note
    content: 'des garnisons  : autres traductions des préfets ; des colonies  ; de même au v. 14 ; cf. 1S 10.5n. –  un tribut v. 2n. –  donnait la victoire v. 14 ; cf. 1Co 15.57. Le verbe hébreu correspondant peut aussi signifier sauver.'
  - type: text
    content: 'David installa des garnisons chez les Araméens de Damas ; les Araméens furent soumis à David et assujettis à un tribut. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donnait la victoire à David partout où il allait. '
  '7':
  - type: note
    content: 'carquois  : le mot hébreu correspondant (cf. 2R 11.10 ; Jr 51.11 ; Ez 27.11 ; Ct 4.4 ; 1Ch 18.7 ; 2Ch 23.9) a parfois été compris comme désignant des boucliers de combat (petits et ronds, par opposition aux grands boucliers protégeant tout le corps). Cf. 1R 10.16s (autres mots hébreux). –  LXX ajoute ici que ces armes en or ont aussi été prises ultérieurement, comme butin de guerre, par le roi d''Egypte Shishaq (voir 1R 14.25s).'
  - type: text
    content: 'David prit les carquois d''or que portaient les hommes de Hadad-Ezer et les apporta à Jérusalem. '
  '8':
  - type: note
    content: 'Salomon utilisera une très grande quantité de bronze lorsqu''il édifiera le temple de Jérusalem ; LXX précise ici même cet usage ultérieur du métal. Cf. 1R 7.15-47 ; 1Ch 18.8. –  Bétah  : Syr Tébah  ; LXX Masbak ou Matbak  ; 1Ch 18.8 Tibhath  ; localité non identifiée. –  Bérotaï  : à une cinquantaine de kilomètres au nord de Damas ; 1Ch 18.8 Koun.'
  - type: text
    content: Le roi David prit encore une très grande quantité de bronze à Bétah et à Bérotaï, villes de Hadad-Ezer.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Toï  : appelé Tôou en 1Ch 18.9. –  Hamath  : royaume syrien situé au nord de celui de Tsoba (v. 3).'
  - type: text
    content: 'Toï, roi de Hamath, apprit que David avait battu toute l''armée de Hadad-Ezer. '
