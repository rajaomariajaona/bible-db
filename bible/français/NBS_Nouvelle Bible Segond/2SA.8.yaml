document_id: 2SA.8
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Victoires de David sur les nations voisines
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Ch 18.1-13
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Après cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : la première partie du chap. 8 (v. 1-14) énumère de façon sommaire quelques faits d''armes marquants du règne de David ; ils ne sont pas nécessairement présentés dans un ordre chronologique strict. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les rênes du pouvoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : les deux mots hébreux correspondants signifient respectivement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'bride '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(d''où '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rênes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: coudée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; on ne les trouve ensemble qu''ici, et le sens de l''expression est fort peu clair. Autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le contrôle de la métropole, le contrôle de l''aqueduc, le contrôle de l''Amma '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(nom propre de lieu ?). Le texte parallèle de 1Ch 18.1 dit que David s''empara de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gath et des localités qui en dépendent.
    marker-yv: yv-n
  - type: text
    text: Après cela, David battit les Philistins et les humilia. Il prit aux Philistins les rênes du pouvoir.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Moabites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Moab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au sens collectif de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les habitants de Moab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . Ils sont déjà mentionnés comme adversaires des Israélites en 1S 14.47
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Nb 24.17 ; 2R 1.1 ; 3.4-27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il les mesura…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : allusion à ce que fut probablement la méthode pour désigner de manière neutre un certain pourcentage de victimes dans les rangs des vaincus : les soldats ennemis étaient, semble-t-il, couchés côte à côte à terre ; '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: avec un cordeau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', on mesurait deux premiers groupes de soldats, destinés à être exécutés, puis un troisième groupe, qu''on laissait en vie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: furent soumis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'furent serviteurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: esclaves
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. v. 6 ; 10.19 ; Ps 18.44. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un tribut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: une offrande
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mot hébreu employé parfois de manière euphémique pour désigner la contribution imposée par le vainqueur au pays vaincu (Jg 3.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). Dans de nombreux textes sacrificiels, ce mot a pris un sens particulier, désignant les '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'offrandes végétales '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (grain, farine, huile) par opposition aux sacrifices d'animaux.
    marker-yv: yv-n
  - type: text
    text: Il battit les Moabites et il les mesura avec un cordeau, en les faisant coucher par terre ; il en mesura deux cordeaux pour les mettre à mort et un plein cordeau pour leur laisser la vie. Les Moabites furent soumis à David et assujettis à un tribut.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hadad-Ezer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'reparaîtra en 10.16-19 et en 1R 11.23 ; dans plusieurs mss hébreux, ce nom est orthographié '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hadar-Ezer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', probablement pour faire disparaître le nom '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hadad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui est celui du dieu de Syrie ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Rehob '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: apparaît comme nom de lieu (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Beth-Rehob
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') en 10.6-14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsoba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : nom de l''un des petits royaumes composant la Syrie ; voir 1S 14.47 ; 1R 11.23 ; 2Ch 8.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lorsqu'il alla
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : il est difficile de savoir, dans cette brève notice, si le sujet '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'se rapporte à David (qui profiterait d''une expédition plus lointaine, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur l'Euphrate
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', pour au passage rappeler à l''ordre Hadad-Ezer) ou à Hadad-Ezer lui-même (qui voudrait remettre la main sur un territoire qu''il aurait perdu, mais qui verrait ses velléités contrecarrées par David). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur l'Euphrate
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : selon une tradition juive de lecture du texte ; une autre tradition dit seulement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur le fleuve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', mais le sens est le même.'
    marker-yv: yv-n
  - type: text
    text: 'David battit Hadad-Ezer, fils de Rehob, roi de Tsoba, lorsqu''il alla rétablir sa domination sur l''Euphrate. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: équipages de chars
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: hommes d'équipage, attelages, chevaux d'attelage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1Ch 18.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: coupa les jarrets
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les chevaux ainsi mutilés n''étaient plus aptes à tirer les chars de guerre ; cf. Jos 11.6-9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une centaine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 17.16 ; Es 31.1 ; Mi 5.9 ; Ps 20.8.'
    marker-yv: yv-n
  - type: text
    text: 'David lui prit mille sept cents équipages de chars et vingt mille fantassins ; il coupa les jarrets à tous les attelages, après en avoir conservé une centaine. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les Araméens de Damas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un autre royaume de Syrie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: abattit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: frappa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', au sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tua '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1S 4.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ou de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: battit.
    marker-yv: yv-n
  - type: text
    text: 'Les Araméens de Damas vinrent au secours de Hadad-Ezer, roi de Tsoba, et David abattit vingt-deux mille hommes parmi les Araméens. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des garnisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des préfets ; des colonies
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 14 ; cf. 1S 10.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un tribut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'donnait la victoire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 14 ; cf. 1Co 15.57. Le verbe hébreu correspondant peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sauver.
    marker-yv: yv-n
  - type: text
    text: 'David installa des garnisons chez les Araméens de Damas ; les Araméens furent soumis à David et assujettis à un tribut. Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' donnait la victoire à David partout où il allait. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: carquois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu correspondant (cf. 2R 11.10 ; Jr 51.11 ; Ez 27.11 ; Ct 4.4 ; 1Ch 18.7 ; 2Ch 23.9) a parfois été compris comme désignant des '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'boucliers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de combat (petits et ronds, par opposition aux grands boucliers protégeant tout le corps). Cf. 1R 10.16s (autres mots hébreux). –  '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' ajoute ici que ces armes en or ont aussi été prises ultérieurement, comme butin de guerre, par le roi d''Egypte Shishaq (voir 1R 14.25s).'
    marker-yv: yv-n
  - type: text
    text: 'David prit les carquois d''or que portaient les hommes de Hadad-Ezer et les apporta à Jérusalem. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Salomon utilisera '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une très grande quantité de bronze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'lorsqu''il édifiera le temple de Jérusalem ; LXX précise ici même cet usage ultérieur du métal. Cf. 1R 7.15-47 ; 1Ch 18.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bétah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tébah
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Masbak '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Matbak
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; 1Ch 18.8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Tibhath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; localité non identifiée. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bérotaï
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : à une cinquantaine de kilomètres au nord de Damas ; 1Ch 18.8 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Koun.
    marker-yv: yv-n
  - type: text
    text: Le roi David prit encore une très grande quantité de bronze à Bétah et à Bérotaï, villes de Hadad-Ezer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '8.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Toï
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : appelé '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tôou '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1Ch 18.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hamath
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : royaume syrien situé au nord de celui de Tsoba (v. 3).'
    marker-yv: yv-n
  - type: text
    text: 'Toï, roi de Hamath, apprit que David avait battu toute l''armée de Hadad-Ezer. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
