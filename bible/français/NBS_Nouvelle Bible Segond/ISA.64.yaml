document_id: ISA.64,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'forge  : le terme hébreu n''apparaît qu''ici et sa traduction est incertaine. Certains le rendent par taillis ou broussailles (cf. 10.16s). –  s''évapore  : sous-entendu dans le texte. –  tes ennemis connaîtraient ton nom  : litt. (si tu descendais…) pour faire connaître ton nom à tes ennemis.'
  - type: text
    content: comme s'allume un feu de forge,
  - type: text
    content: comme s'évapore l'eau qui bouillonne ;
  - type: text
    content: tes ennemis connaîtraient ton nom,
  - type: text
    content: et les nations trembleraient devant toi.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Notre maison sacrée et splendide  : autre traduction la maison de notre sainteté et de notre splendeur  ; il s''agit du temple, cf. 63.15. –  la proie des flammes Jr 52.13 ; 2Ch 36.19. –  précieux / ruiné Lm 1.10 ; 2.4.'
  - type: text
    content: Notre maison sacrée et splendide,
  - type: text
    content: où nos pères célébraient tes louanges,
  - type: text
    content: est devenue la proie des flammes ;
  - type: text
    content: tout ce que nous avions de précieux a été ruiné.
  '11':
  - type: text
    content: ' '
  - type: note
    content: Cf. Za 1.12. –  te contiendras-tu ? même verbe en 63.15n. –  Vas-tu te taire 42.14+.
  - type: text
    content: 'Devant tout cela, '
  - type: text
    content: Seigneur
  - type: text
    content: ', te contiendras-tu ?'
  - type: text
    content: Vas-tu te taire
  - type: text
    content: et nous affliger à l'excès ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: les montagnes croulèrent 63.19.
  - type: text
    content: Lorsque tu fis des choses redoutables, que nous n'espérions pas,
  - type: text
    content: tu descendis, et les montagnes croulèrent devant toi.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Jamais on n''a appris…  : cf. Dt 4.32ss ; 1Co 2.9. –  aucun dieu 45.5+ ; cf. Dt 4.34 ; 2S 7.23. –  agisse ainsi  : autre traduction agisse cf. 45.20 ; 46.7. –  celui qui l''attend 30.18+.'
  - type: text
    content: Jamais on n'a appris
  - type: text
    content: ni entendu dire,
  - type: text
    content: jamais l'œil n'a vu
  - type: text
    content: qu'aucun dieu, à part toi,
  - type: text
    content: agisse ainsi pour celui qui l'attend.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, rendu diversement par les versions anciennes ; cf. v. 8. Au lieu de Tu allais à la rencontre de (ou tu intervenais pour ), certains traduisent tu as surpris  ; au lieu de par qui, par lesquelles (voies) ; cf. 63.17 ; Jr 6.16 ; 18.15. Mot à mot, les deux derniers vers se lisent ainsi  : Voici, toi tu t''es irrité (47.6+) et nous avons péché  ; par eux perpétuellement et nous avons été sauvés.'
  - type: text
    content: Tu allais à la rencontre
  - type: text
    content: de celui qui était content d'agir selon la justice,
  - type: text
    content: de ceux qui se souvenaient de tes voies,
  - type: text
    content: par qui, de tout temps, nous étions sauvés ;
  - type: text
    content: mais tu t'es irrité parce que nous avons péché ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'comme impurs  : autres traductions comme l''impur ; comme un objet impur  ; Lv 13.45 ; voir pur, impur. –  tout ce que nous faisons…  : autres traductions toute notre justice  ; tous nos actes de justice ; toutes nos victoires . –  souillé  : litt. de règles (cf. Lv 12.2n  ; 15.19-33 ; Ez 36.17 ; Lm 1.8,17). –  flétris…  : cf. 1.30 ; 34.4 ; 40.6-8. –  comme le vent 57.13.'
  - type: text
    content: nous sommes tous devenus comme impurs,
  - type: text
    content: et tout ce que nous faisons pour la justice est comme un vêtement souillé ;
  - type: text
    content: nous sommes tous flétris comme des feuilles mortes,
  - type: text
    content: et nos fautes nous emportent comme le vent.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'personne  : cf. 41.28+ ; Ps 14.1-3. –  qui invoque ton nom  : cf. 65.1n. –  tu t''es détourné de nous  : litt. tu nous as caché ta face  ; cf. 54.8+. –  tu nous as laissés fondre…  : litt. tu nous as fait fondre (ou mollir ) dans la main de nos fautes , image qui est peut-être à opposer à celle du potier divin au v. 7.'
  - type: text
    content: Il n'y a personne qui invoque ton nom,
  - type: text
    content: qui s'éveille pour s'attacher à toi.
  - type: text
    content: Car tu t'es détourné de nous,
  - type: text
    content: et tu nous as laissés fondre
  - type: text
    content: à cause de nos fautes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Pourtant  : litt. maintenant . –  notre Père 63.8+,16 ; cf. Ps 103.13s. –  potier 29.16+ ; 43.1+ ; cf. Gn 2.7n  ; Ps 103.14.'
  - type: text
    content: 'Pourtant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu es notre Père ;'
  - type: text
    content: nous sommes l'argile,
  - type: text
    content: 'tu es notre potier :'
  - type: text
    content: nous sommes tous l'œuvre de tes mains.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'ne te souviens pas Ps 25.7 ; 130.3. –  ton peuple  : cf. 63.8+.'
  - type: text
    content: 'Ne t''irrite pas à l''extrême, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: ne te souviens pas toujours de la faute ;
  - type: text
    content: 'regarde, s''il te plaît : nous sommes tous ton peuple.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 44.26-28.
  - type: text
    content: Tes villes sacrées sont devenues un désert ;
  - type: text
    content: Sion est devenue un désert,
  - type: text
    content: Jérusalem un lieu dévasté.
