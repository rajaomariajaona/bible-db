document_id: GAL.4
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Tu n'es plus esclave, mais fils
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le maître '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le seigneur.
    marker-yv: yv-n
  - type: text
    text: 'Or je le dis : aussi longtemps que l''héritier est tout petit, il ne diffère en rien d''un esclave, alors qu''il est le maître de tout ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tuteurs '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: intendants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's ; dans le droit hellénistique, c''est '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le père '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qui fixait le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'temps '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de la majorité pour son fils.
    marker-yv: yv-n
  - type: text
    text: 'il est soumis à des tuteurs et à des intendants jusqu''au temps marqué par le père. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'esclaves des '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: asservis aux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 3.22s ; 5.1) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: éléments du monde
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. aux principes constitutifs des structures et des phénomènes du monde, derrière lesquels les Anciens discernaient des puissances occultes que le judaïsme identifiait à des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: anges
      - type: text
        text: ', bons ou mauvais ; v. 9 ; cf. 3.19'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Col 2.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Nous aussi, lorsque nous étions des tout-petits, nous étions esclaves des éléments du monde ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lorsque les temps furent accomplis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand est venue la plénitude du temps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Mc 1.15 ; Ep 1.10 ; Col 1.19 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tobit
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.5 : « Jusqu''au moment où s''accompliront les temps fixés. » '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '4 '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Esdras
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.36s : « Il a pesé le monde à la balance et Il a mesuré les temps à la mesure. D''un nombre Il les a comptés. Il ne troublera ni ne suscitera rien, jusqu''à ce que la mesure déterminée soit remplie. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu a envoyé son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jn 5.36 ; 1Jn 4.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: né…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'devenu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'issu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Rm 1.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'd''une femme, devenu sous la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on pourrait aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: né d'une femme et assujetti à la loi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jb 14.1 ; voir aussi Lc 2 ; Jn 1.14 ; Rm 1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; Ph 2.7.
    marker-yv: yv-n
  - type: text
    text: 'mais lorsque les temps furent accomplis, Dieu a envoyé son Fils, né d''une femme et sous la loi, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'racheter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.13 ; 1Co 6.20+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''adoption filiale '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le statut de fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.26ss ; Rm 8.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'afin de racheter ceux qui étaient sous la loi, pour que nous recevions l''adoption filiale. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans notre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' l''Esprit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Rm 5.5 ; 2Co 1.22 ; voir aussi 3.2-5,14 ; 5.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abba ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'invocation araméenne équivalente à '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Père ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Le mot est transcrit puis traduit en grec dans le texte ; voir Rm 8.15
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; cf. Mc 14.36 ; voir aussi Mt 11.25 ; Jn 17.1.
    marker-yv: yv-n
  - type: text
    text: 'Et parce que vous êtes des fils, Dieu a envoyé dans notre cœur l''Esprit de son Fils, qui crie : «  '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Abba !
  - type: text
    text: ' Père ! » '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'plus esclave '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Jn 15.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'héritier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '3.29 ; Rm 8.16s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du fait de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: grâce à Dieu.
    marker-yv: yv-n
  - type: text
    text: Ainsi tu n'es plus esclave, mais fils ; et si tu es fils, tu es aussi héritier, du fait de Dieu.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Souci de Paul pour la foi des Galates
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous ne connaissiez pas Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 17.23 ; 1Th 4.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous étiez esclaves…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous serviez des dieux ; vous étiez asservis à des dieux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même verbe aux v. 9,25, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être dans l'esclavage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; cf. v. 1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de dieux qui… n''en sont pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1Co 8.4-6 ; 12.2 ; cf. Es 37.19 ; Jr 2.11 ; 2Ch 13.9.
    marker-yv: yv-n
  - type: text
    text: 'Autrefois vous ne connaissiez pas Dieu et vous étiez esclaves de dieux qui, par nature, n''en sont pas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'connus de Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 8.3 ; 13.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'éléments '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: impuissants…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: faibles et pauvres.
    marker-yv: yv-n
  - type: text
    text: 'Mais maintenant que vous connaissez Dieu – ou, plutôt, que vous êtes connus de Dieu – comment pouvez-vous retourner à ces éléments impuissants et misérables, et vouloir à nouveau en être esclaves ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Rm 14.5 ; Col 2.16ss ; voir aussi Es 1.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les saisons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'temps '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'occasion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 6.9-10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Rm 3.26'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Vous observez scrupuleusement les jours, les mois, les saisons et les années ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour rien '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.2+.
    marker-yv: yv-n
  - type: text
    text: Je crains de m'être donné de la peine pour rien en ce qui vous concerne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Soyez comme moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 11.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je suis comme vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Co 9.19-22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aucun tort
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 2Co 2.5.'
    marker-yv: yv-n
  - type: text
    text: 'Soyez comme moi, puisque moi aussi je suis comme vous. Je vous en supplie, mes frères. Vous ne m''avez fait aucun tort. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une maladie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une faiblesse de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 2Co 12.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ',9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir Ac 16.6.'
    marker-yv: yv-n
  - type: text
    text: 'Vous le savez, c''est à cause d''une maladie que je vous ai annoncé la bonne nouvelle pour la première fois. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si éprouvante…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: '(malgré) votre épreuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tentation
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans ma chair
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; un verbe apparenté est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'mettre à l''épreuve '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 6.1 ; cf. 1Co 10.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2Co 13.5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous ne m''avez témoigné ni mépris '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 2Co 10.10) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ni dégoût
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous n'avez ni méprisé ni craché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; selon certains, ce dernier terme évoquerait un geste superstitieux destiné à se prémunir contre les conséquences d''une mauvaise rencontre. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'comme un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: ange
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
