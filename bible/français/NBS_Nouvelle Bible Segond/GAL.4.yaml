document_id: GAL.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Tu n'es plus esclave, mais fils
  - type: text
    content: ' '
  - type: note
    content: le maître ou le seigneur.
  - type: text
    content: 'Or je le dis : aussi longtemps que l''héritier est tout petit, il ne diffère en rien d''un esclave, alors qu''il est le maître de tout ; '
  '10':
  - type: note
    content: 'Cf. Rm 14.5 ; Col 2.16ss ; voir aussi Es 1.13. –  les saisons  : le même terme est traduit par temps et occasion en 6.9-10n  ; cf. Rm 3.26n.'
  - type: text
    content: 'Vous observez scrupuleusement les jours, les mois, les saisons et les années ! '
  '11':
  - type: note
    content: pour rien 2.2+.
  - type: text
    content: Je crains de m'être donné de la peine pour rien en ce qui vous concerne.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Soyez comme moi 1Co 11.1+. –  je suis comme vous 1Co 9.19-22. –  aucun tort  : cf. 2Co 2.5.'
  - type: text
    content: 'Soyez comme moi, puisque moi aussi je suis comme vous. Je vous en supplie, mes frères. Vous ne m''avez fait aucun tort. '
  '13':
  - type: note
    content: 'une maladie  : litt. une faiblesse de la chair  ; cf. 2Co 12.7n,9n  ; voir Ac 16.6.'
  - type: text
    content: 'Vous le savez, c''est à cause d''une maladie que je vous ai annoncé la bonne nouvelle pour la première fois. '
  '14':
  - type: note
    content: 'si éprouvante…  : litt. (malgré) votre épreuve (ou tentation) dans ma chair  ; un verbe apparenté est traduit par mettre à l''épreuve en 6.1 ; cf. 1Co 10.13n  ; 2Co 13.5. –  vous ne m''avez témoigné ni mépris (cf. 2Co 10.10) ni dégoût  : litt. vous n''avez ni méprisé ni craché  ; selon certains, ce dernier terme évoquerait un geste superstitieux destiné à se prémunir contre les conséquences d''une mauvaise rencontre. –  comme un ange (ou un messager) de Dieu  : cf. 1.8. –  comme Jésus-Christ cf. Mt 10.40+ ; Jn 13.20 ; 1Co 2.3-5 ; 2Co 4.5-11.'
  - type: text
    content: 'Et, si éprouvante qu''ait pu être pour vous ma chair, vous ne m''avez témoigné ni mépris ni dégoût ; vous m''avez, au contraire, accueilli comme un ange de Dieu, comme Jésus-Christ. '
  '15':
  - type: note
    content: 'votre bonheur ou votre béatitude  ; le terme grec évoque habituellement la parole par laquelle on déclare quelqu''un (ou on se déclare soi-même) heureux (Rm 4.6,9). On pourrait donc comprendre où donc est l''éloge qu''on faisait de vous ou le temps où vous vous félicitiez ? –  vous vous seriez arraché les yeux…  : il s''agit sans doute d''une expression proverbiale pour décrire une authentique amitié.'
  - type: text
    content: 'Où donc est votre bonheur ? Car je vous rends ce témoignage que, si cela avait été possible, vous vous seriez arraché les yeux pour me les donner. '
  '16':
  - type: note
    content: Cf. Am 5.10. –  parce que je vous dis (ou vous ai dit) la vérité 2.5 ; 5.7 ; Jn 8.45 ; Ep 4.15.
  - type: text
    content: 'Suis-je donc devenu votre ennemi parce que je vous dis la vérité ? '
  '17':
  - type: note
    content: 'Cf. 1.7 ; Ac 20.30 ; Ph 2.21. –  passion ou zèle, jalousie, 1.14n. –  vous détacher de nous  : autres traductions vous exclure, vous isoler.'
  - type: text
    content: 'La passion qu''ils ont pour vous n''est pas bonne ; ils veulent seulement vous détacher de nous, afin que vous vous preniez de passion pour eux. '
  '18':
  - type: text
    content: 'Il est bien d''être l''objet d''une passion bonne en tout temps – pas seulement quand je suis présent parmi vous, '
  '19':
  - type: note
    content: 'mes enfants 1Co 4.14s. –  de nouveau ou encore. –  douleurs de l''accouchement…  : cf. Rm 8.18ss ; voir aussi 2Co 4.12 ; Col 1.24s. –  le Christ soit formé en vous ou parmi vous  : cf. 2.20 ; Rm 8.9s,29.'
  - type: text
    content: 'mes enfants, pour qui j''éprouve de nouveau les douleurs de l''accouchement, jusqu''à ce que le Christ soit formé en vous… '
  '2':
  - type: note
    content: 'tuteurs / intendants  : cf. 3.24ns ; dans le droit hellénistique, c''est le père qui fixait le temps de la majorité pour son fils.'
  - type: text
    content: 'il est soumis à des tuteurs et à des intendants jusqu''au temps marqué par le père. '
  '20':
  - type: note
    content: 'trouver le ton qui convient  : litt. changer ma voix, expression de sens incertain ; on a aussi compris  : vous parler de vive voix (plutôt que de vous écrire).'
  - type: text
    content: Je voudrais être maintenant présent parmi vous et trouver le ton qui convient, car je suis dans l'embarras à votre sujet.
  - type: heading
    content: Hagar et Sara, figures des deux alliances
  '21':
  - type: text
    content: ' '
  - type: note
    content: sous la loi v. 3s,9 ; 3.23. –  n'entendez-vous pas (aussi dans le sens de ne comprenez-vous pas ) ou n'écoutez-vous pas.
  - type: text
    content: 'Dites-moi, vous qui voulez être sous la loi, n''entendez-vous pas la loi ? '
  '22':
  - type: note
    content: 'Gn 16.15 ; 21.2. –  servante  : il s''agit en l''occurrence d''une esclave (v. 24s).'
  - type: text
    content: 'Car il est écrit qu''Abraham eut deux fils, un de la servante et un de la femme libre. '
  '23':
  - type: note
    content: 3.29 ; Gn 17.15s ; Rm 9.7-9. –  est né ou a été engendré, a été mis au monde v. 24,29. – Voir chair.
  - type: text
    content: 'Mais celui de la servante est né selon la chair, et celui de la femme libre du fait de la promesse. '
  '24':
  - type: note
    content: 'une allégorie  : ce terme indique que Paul a ici recours à une méthode d''interprétation des textes anciens qui cherche, derrière leur sens littéral ou obvie, un sens plus profond et plus général susceptible d''une application présente ; ce type de lecture était beaucoup pratiqué dans le monde judéo-hellénistique ; cf. 1Co 10.6. –  alliances ou testaments, cf. 3.15n.'
  - type: text
    content: 'Il y a là une allégorie ; car ces femmes sont deux alliances. L''une, celle du mont Sinaï, fait naître pour l''esclavage : c''est Hagar '
  '25':
  - type: note
    content: 'or ou, selon certains mss, car. –  Hagar…  : peut-être Paul appuie-t-il son raisonnement sur une ressemblance entre le nom de Hagar et une appellation (en arabe ?) du mont Sinaï (cf. 1.17) ; certains mss omettent le nom de Hagar au début du v., laissant une simple indication géographique  : le mont Sinaï est en Arabie. –  la Jérusalem de maintenant  : c.-à-d. le judaïsme, cf. Mt 23.37 ; Lc 13.34. –  dans l''esclavage 5.1 ; cf. Jn 8.33-35.'
  - type: text
    content: '– or Hagar, c''est le mont Sinaï en Arabie – et elle correspond à la Jérusalem de maintenant, car elle est dans l''esclavage avec ses enfants. '
  '26':
  - type: note
    content: 'la Jérusalem d''en haut  : cf. Hé 12.22 ; Ap 3.12 ; 21.2,10. –  notre mère  : cf. Ps 87.5.'
  - type: text
    content: 'Mais la Jérusalem d''en haut est libre, et c''est elle qui est notre mère. '
  '27':
  - type: note
    content: 'Es 54.1. –  qui n''as pas d''enfants  : litt. qui n''accouches pas. –  Eclate… litt. Eclate et crie. –  qui n''as pas éprouvé…  : litt. qui n''as pas de douleurs. –  délaissée  : le mot signifie aussi désert(e). –  sont ou seront  : le verbe est sous-entendu dans le texte.'
  - type: text
    content: 'En effet, il est écrit :'
  - type: text
    content: Sois en fête, femme stérile, toi qui n'as pas d'enfants !
  - type: text
    content: Eclate en cris de joie, toi qui n'as pas éprouvé les douleurs de l'accouchement !
  - type: text
    content: Car les enfants de la délaissée
  - type: text
    content: sont plus nombreux que ceux de la femme qui a son mari
  - type: text
    content: .
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Quant à vous…  : litt. vous, frères…  ; certains mss ont la première personne  : Quant à nous, frères, nous sommes… v. 23 ; Rm 9.7.'
  - type: text
    content: 'Quant à vous, mes frères, comme Isaac, vous êtes enfants de la promesse. '
  '29':
  - type: note
    content: Cf. Gn 21.9 ; voir aussi 1Th 2.14. –  celui qui l'était…, c.-à-d. celui qui était né selon l'Esprit  ; autre traduction celui qui était selon l'Esprit.
  - type: text
    content: 'Mais tout comme autrefois celui qui était né selon la chair persécutait celui qui l''était selon l''Esprit, ainsi en est-il encore maintenant. '
  '3':
  - type: note
    content: esclaves des (ou asservis aux, 3.22s ; 5.1) éléments du monde, c.-à-d. aux principes constitutifs des structures et des phénomènes du monde, derrière lesquels les Anciens discernaient des puissances occultes que le judaïsme identifiait à des anges, bons ou mauvais ; v. 9 ; cf. 3.19n  ; voir Col 2.8n.
  - type: text
    content: 'Nous aussi, lorsque nous étions des tout-petits, nous étions esclaves des éléments du monde ; '
  '30':
  - type: note
    content: Gn 21.10  ; cf. Jn 8.35.
  - type: text
    content: 'Or que dit l''Ecriture ? '
  - type: text
    content: Chasse la servante et son fils, car le fils de la servante n'héritera pas avec le fils
  - type: text
    content: ' de la femme libre. '
  '31':
  - type: note
    content: Cf. 3.29.
  - type: text
    content: Ainsi, mes frères, nous ne sommes pas les enfants de la servante, mais ceux de la femme libre.
  '4':
  - type: note
    content: 'lorsque les temps furent accomplis  : litt. quand est venue la plénitude du temps  ; cf. Mc 1.15 ; Ep 1.10 ; Col 1.19 ; Tobit 14.5 : « Jusqu''au moment où s''accompliront les temps fixés. » 4 Esdras 4.36s : « Il a pesé le monde à la balance et Il a mesuré les temps à la mesure. D''un nombre Il les a comptés. Il ne troublera ni ne suscitera rien, jusqu''à ce que la mesure déterminée soit remplie. » –  Dieu a envoyé son Fils Jn 5.36 ; 1Jn 4.9. –  né…  : litt. devenu (le même terme est traduit par issu en Rm 1.3n) d''une femme, devenu sous la loi  ; on pourrait aussi traduire né d''une femme et assujetti à la loi  ; cf. Jb 14.1 ; voir aussi Lc 2 ; Jn 1.14 ; Rm 1.3ns ; Ph 2.7.'
  - type: text
    content: 'mais lorsque les temps furent accomplis, Dieu a envoyé son Fils, né d''une femme et sous la loi, '
  '5':
  - type: note
    content: racheter 3.13 ; 1Co 6.20+. –  l'adoption filiale ou le statut de fils, cf. 3.26ss ; Rm 8.15n.
  - type: text
    content: 'afin de racheter ceux qui étaient sous la loi, pour que nous recevions l''adoption filiale. '
  '6':
  - type: note
    content: des fils 3.26. –  dans notre cœur l'Esprit Rm 5.5 ; 2Co 1.22 ; voir aussi 3.2-5,14 ; 5.18. –  Abba ! invocation araméenne équivalente à Père ! Le mot est transcrit puis traduit en grec dans le texte ; voir Rm 8.15ns ; cf. Mc 14.36 ; voir aussi Mt 11.25 ; Jn 17.1.
  - type: text
    content: 'Et parce que vous êtes des fils, Dieu a envoyé dans notre cœur l''Esprit de son Fils, qui crie : «  '
  - type: text
    content: Abba !
  - type: text
    content: ' Père ! » '
  '7':
  - type: note
    content: 'plus esclave Jn 15.15. –  héritier 3.29 ; Rm 8.16s. –  du fait de Dieu  : autre traduction grâce à Dieu.'
  - type: text
    content: Ainsi tu n'es plus esclave, mais fils ; et si tu es fils, tu es aussi héritier, du fait de Dieu.
  - type: heading
    content: Souci de Paul pour la foi des Galates
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'vous ne connaissiez pas Dieu Ac 17.23 ; 1Th 4.5. –  vous étiez esclaves…  : autres traductions vous serviez des dieux ; vous étiez asservis à des dieux (même verbe aux v. 9,25, être dans l''esclavage ) ; cf. v. 1ss. –  de dieux qui… n''en sont pas 1Co 8.4-6 ; 12.2 ; cf. Es 37.19 ; Jr 2.11 ; 2Ch 13.9.'
  - type: text
    content: 'Autrefois vous ne connaissiez pas Dieu et vous étiez esclaves de dieux qui, par nature, n''en sont pas. '
  '9':
  - type: note
    content: 'connus de Dieu 1Co 8.3 ; 13.12. –  éléments v. 3n. –  impuissants…  : litt. faibles et pauvres.'
  - type: text
    content: 'Mais maintenant que vous connaissez Dieu – ou, plutôt, que vous êtes connus de Dieu – comment pouvez-vous retourner à ces éléments impuissants et misérables, et vouloir à nouveau en être esclaves ? '
