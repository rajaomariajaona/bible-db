      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'celui qui était né selon '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'Esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui était selon l'Esprit.
    marker-yv: yv-n
  - type: text
    text: 'Mais tout comme autrefois celui qui était né selon la chair persécutait celui qui l''était selon l''Esprit, ainsi en est-il encore maintenant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.30 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gn 21.10
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jn 8.35.'
    marker-yv: yv-n
  - type: text
    text: 'Or que dit l''Ecriture ? '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Chasse la servante et son fils, car le fils de la servante n'héritera pas avec le fils
  - type: text
    text: ' de la femme libre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '4.31 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 3.29.
    marker-yv: yv-n
  - type: text
    text: Ainsi, mes frères, nous ne sommes pas les enfants de la servante, mais ceux de la femme libre.
