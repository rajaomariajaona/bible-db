document_id: JHN.16,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous ai parlé 13.19+. –  afin qu''il n''y ait…  : autre traduction pour que vous ne trébuchiez pas  ; cf. 6.61+.'
  - type: text
    content: 'Je vous ai parlé ainsi afin qu''il n''y ait pour vous aucune cause de chute. '
  '10':
  - type: note
    content: 'de justice  : il faut sans doute comprendre, avant tout, que Jésus lui-même est justifié par son élévation auprès du Père, élévation que l''Esprit discerne dans le fait même de son absence physique. Cf. 7.39 ; 1Tm 3.16 ; voir aussi Es 5.15s ; Ac 7.55. –  vers le Père v. 5,28. –  vous ne me verrez plus 7.33+,34 ; cf. 14.19 ; 16.16-19 ; 20.29 ; voir aussi Rm 4.25.'
  - type: text
    content: 'en matière de justice, parce que je m''en vais vers le Père, et que vous ne me verrez plus ; '
  '11':
  - type: note
    content: 12.31+ ; cf. 16.33.
  - type: text
    content: en matière de jugement, parce que le prince de ce monde est jugé.
  '12':
  - type: text
    content: ' '
  - type: note
    content: vous ne pouvez pas le porter (c.-à-d. c'est un fardeau trop lourd à porter ), cf. 19.17 ; voir aussi 13.7,33 ; 15.15 ; 1Co 3.1s.
  - type: text
    content: 'J''ai encore beaucoup à vous dire, mais vous ne pouvez pas le porter maintenant. '
  '13':
  - type: note
    content: 'l''Esprit de la vérité 14.17+. –  il vous conduira…  : cf. 14.26+ ; Ps 25.5. –  pas de sa propre initiative  : litt. de lui-même  ; cf. 5.19+ ; 7.17ns ; 12.49.'
  - type: text
    content: 'Quand il viendra, lui, l''Esprit de la vérité, il vous conduira dans toute la vérité ; car il ne parlera pas de sa propre initiative, mais il dira tout ce qu''il entendra et il vous annoncera ce qui est à venir. '
  '14':
  - type: note
    content: me glorifiera 8.54+.
  - type: text
    content: 'Lui me glorifiera, parce qu''il prendra de ce qui est à moi pour vous l''annoncer. '
  '15':
  - type: note
    content: 17.10+.
  - type: text
    content: Tout ce qu'a le Père est à moi ; c'est pourquoi j'ai dit qu'il prendra de ce qui est à moi pour vous l'annoncer.
  - type: heading
    content: La tristesse changée en joie
  '16':
  - type: text
    content: ' '
  - type: note
    content: '7.33+ ; 14.19 ; ici et dans la suite le terme correspondant à encore est sous-entendu dans le texte grec (litt. un peu , cf. v. 18). Sur le terme correspondant à puis , voir v. 28n ( maintenant ). –  verrez traduit ici deux verbes différents, mais synonymes (cf. 11.5n) ; certains mss ajoutent à la fin du v.  : parce que je m''en vais vers le Père.'
  - type: text
    content: 'Encore un peu, et vous ne me verrez plus ; puis encore un peu, et vous me verrez. '
  '17':
  - type: text
    content: 'Quelques-uns de ses disciples se dirent donc les uns aux autres : Qu''est-ce qu''il nous dit là ? « Encore un peu, et vous ne me verrez plus ; puis encore un peu, et vous me verrez », et : « Je m''en vais vers le Père. » '
  '18':
  - type: note
    content: 'Que dit-il là  : autre traduction que veut-il dire ? Certains mss portent qu''est-ce que ce « un peu » ?'
  - type: text
    content: 'Ils disaient donc : Que dit-il là : « un peu » ? Nous ne savons pas de quoi il parle.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Sachant… 2.25+ ; 13.1+. –  qu''ils voulaient l''interroger  : cf. v. 30 ; Lc 9.45. –  Vous débattez  : le verbe est traduit ailleurs par chercher , cf. 1.38+.'
  - type: text
    content: 'Sachant qu''ils voulaient l''interroger, Jésus leur dit : Vous débattez entre vous de ce que j''ai dit : « Encore un peu, et vous ne me verrez plus ; puis encore un peu, et vous me verrez. » '
  '2':
  - type: note
    content: 'Ils vous excluront 9.22+. –  vous tuera Mt 10.17-21. –  pensera offrir un culte  : cf. Ac 8.1 ; 17.5-9 ; 18.12s ; 26.9-11 ; Ga 1.13s.'
  - type: text
    content: 'Ils vous excluront des synagogues ; l''heure vient même où quiconque vous tuera pensera offrir un culte à Dieu. '
  '20':
  - type: note
    content: 'Amen, amen 1.51n  ; cf. Mt 5.18n. –  vous vous lamenterez Mc 16.10 ; Lc 5.35/ /. –  le monde (1.10n) se réjouira  : cf. Ap 11.10. –  votre tristesse se changera en joie Lc 6.21 ; 2Co 4.17 ; 1P 1.6.'
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, vous, vous pleurerez et vous vous lamenterez, tandis que le monde se réjouira : vous, vous serez tristes, mais votre tristesse se changera en joie. '
  '21':
  - type: note
    content: de la détresse Mt 24.9n  ; cf. Es 13.8 ; 21.3s ; 26.16-20 ; 66.7-14 ; Jr 30.6 ; Os 13.13 ; Mi 4.9 ; Mc 13.8/ / ; Rm 8.22 ; 1Th 5.3 ; Ap 12.2.
  - type: text
    content: 'La femme, lorsqu''elle accouche, a de la tristesse, parce que son heure est venue ; mais quand elle a donné le jour à l''enfant, elle ne se souvient plus de la détresse, tant elle a de joie qu''un homme soit venu au monde. '
  '22':
  - type: note
    content: 'vous éprouvez  : litt. vous avez. –  tristesse v. 6. –  votre cœur se réjouira 20.20 ; Lc 24.52. –  ne vous enlèvera  : litt. ne vous enlève.'
  - type: text
    content: 'Ainsi, vous, maintenant, vous éprouvez de la tristesse ; mais je vous reverrai : votre cœur se réjouira, et personne ne vous enlèvera votre joie.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'En ce jour-là 14.20+. –  vous ne me demanderez plus rien  : le verbe grec, différent de celui qui apparaît dans la suite du v., est traduit par interroger aux v. 19,30 ; c''est celui qui figure dans l''expression demander au Père au v. 26, où les deux verbes synonymes apparaissent à nouveau ; voir 14.16n. –  ce que vous demanderez… 14.13+.'
  - type: text
    content: 'En ce jour-là, vous ne me demanderez plus rien. '
  - type: text
    content: Amen, amen,
  - type: text
    content: ' je vous le dis, ce que vous demanderez au Père, il vous le donnera en mon nom. '
  '24':
  - type: note
    content: 'demandé en mon nom 14.13+. –  Demandez…  : cf. Mt 7.7-11/ /. –  que votre joie soit complète 15.11+.'
  - type: text
    content: Jusqu'à présent, vous n'avez rien demandé en mon nom. Demandez et vous recevrez, pour que votre joie soit complète.
  - type: heading
    content: Jésus, vainqueur du monde
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous ai dit tout cela en discours figurés  : v. 29 ; voir 10.6n  ; cf. 2.22+ ; Mt 13.34-35/ /.'
  - type: text
    content: 'Je vous ai dit tout cela en discours figurés. L''heure vient où je ne vous tiendrai plus de discours figurés, mais où je vous annoncerai ouvertement ce qui concerne le Père. '
  '26':
  - type: note
    content: en mon nom 14.13+. –  demanderai au Père v. 23n.
  - type: text
    content: 'En ce jour-là, vous demanderez en mon nom, et je ne vous dis pas que c''est moi qui demanderai au Père pour vous ; '
  '27':
  - type: note
    content: le Père… est votre ami ou vous aime (11.3n) 14.21+ ; cf. 3.35+. –  vous avez acquis la conviction ou vous croyez  ; sur le temps du verbe (v. 30s), voir 11.27n. –  sorti de Dieu ou d'auprès de Dieu, même possibilité v. 28 ; la préposition se retrouve dans l'expression traduite par issu(e) de en 1.14n  ; 6.46+ ; cf. 1.1,13 ; 8.42+.
  - type: text
    content: 'en effet, le Père lui-même est votre ami, parce que, vous, vous avez été mes amis et vous avez acquis la conviction que, moi, je suis sorti de Dieu. '
  '28':
  - type: note
    content: '13.1+. –  maintenant  : le terme correspondant est celui qui a été rendu par puis au v. 16 ; il peut signifier de nouveau (1.35), encore (4.13), en retour (associé à un verbe de mouvement, pour retourner en 4.3 etc.), d''autre part (1Jn 2.8). –  je vais  : autre traduction je retourne.'
  - type: text
    content: Je suis sorti du Père et je suis venu dans le monde ; maintenant, je quitte le monde et je vais vers le Père.
  '29':
  - type: text
    content: ' '
  - type: note
    content: V. 17-19,25.
  - type: text
    content: 'Ses disciples disent : Maintenant, tu parles ouvertement et tu ne tiens plus de discours figurés. '
  '3':
  - type: note
    content: 7.28+ ; cf. 15.21 ; Ac 13.27 ; 1Co 2.8 ; 1Jn 3.1.
  - type: text
    content: 'Et ils feront cela parce qu''ils n''ont jamais connu ni le Père ni moi. '
  '30':
  - type: note
    content: 'tu sais tout  : cf. 2.25+. –  besoin que personne t''interroge (v. 23n) v. 19. –  nous croyons v. 31n. –  sorti de Dieu v. 27 ; cf. 6.69.'
  - type: text
    content: 'Maintenant, nous savons que tu sais tout et que tu n''as pas besoin que personne t''interroge ; c''est pourquoi nous croyons que tu es sorti de Dieu. '
  '31':
  - type: note
    content: 'Vous croyez (v. 30) ou vous avez foi  : cf. 1.7n,50.'
  - type: text
    content: 'Jésus leur répondit : Vous croyez, maintenant ? '
  '32':
  - type: note
    content: 'Cf. Za 13.7 ; Mt 26.31/ /. –  elle est venue  : autre traduction elle est là. –  chacun de son côté  : autre traduction chacun chez soi (même expression 19.27). –  je ne suis pas seul… 8.16+,29 ; cf. 10.30 ; Mc 15.34/ /.'
  - type: text
    content: 'L''heure vient – elle est venue – où vous serez dispersés chacun de son côté, et où vous me laisserez seul ; mais je ne suis pas seul, car le Père est avec moi. '
  '33':
  - type: note
    content: 'la paix 14.27+. –  vous connaissez la détresse  : litt. vous avez de la détresse (terme traditionnellement rendu par tribulation) ; cf. v. 21n  ; Mt 24.9n,21/ / ; Mc 4.17 ; Ac 11.19 ; Rm 5.3+ ; 2Co 1.8 ; 2.4 ; 4.17 ; 6.4 ; 7.4 ; 1Th 1.6 ; 3.3,7 ; 2Th 1.4s. –  courage Mt 9.2+. –  j''ai vaincu le monde  : cf. 1.10n  ; 12.31+ ; 1Jn 5.4s ; voir aussi 2.13s ; 4.4 ; Ap 2.7,11,17,26 ; 3.5,12,21 ; 5.5 ; 6.2.'
  - type: text
    content: Je vous ai parlé ainsi pour que vous ayez la paix en moi. Dans le monde, vous connaissez la détresse, mais courage ! Moi, j'ai vaincu le monde.
  '4':
  - type: note
    content: '2.22+ ; cf. 14.29 ; 16.1. –  l''heure venue  : cf. 12.23+. –  j''étais avec vous 17.12.'
  - type: text
    content: Je vous ai parlé ainsi pour que, l'heure venue, vous vous souveniez que, moi, je vous l'ai dit.
  - type: heading
    content: L'œuvre du « Défenseur »
  - type: text
    content: 'Je ne vous l''ai pas dit depuis le commencement, parce que j''étais avec vous. '
  '5':
  - type: note
    content: Cf. v. 28 ; 7.33+ ; 13.36+.
  - type: text
    content: 'Maintenant, je m''en vais vers celui qui m''a envoyé, et aucun de vous ne me demande : « Où vas-tu ? » '
  '6':
  - type: note
    content: V. 20-22 ; Mt 17.23/ /. –  cœur Lc 1.66n.
  - type: text
    content: 'Mais parce que je vous ai parlé ainsi, la tristesse a rempli votre cœur. '
  '7':
  - type: note
    content: 'Cf. 14.2. –  je vous dis la vérité 18.37+. –  Défenseur 14.16n. –  si je m''en vais  : autre verbe que celui qui a été traduit par s''en aller au début du v. –  je vous l''enverrai 15.26+.'
  - type: text
    content: 'Cependant, moi, je vous dis la vérité : il est avantageux pour vous que, moi, je m''en aille ; car si je ne m''en vais pas, le Défenseur ne viendra pas à vous ; mais si je m''en vais, je vous l''enverrai. '
  '8':
  - type: note
    content: Cf. Ac 24.25. – Voir péché.
  - type: text
    content: 'Quand il sera venu, lui, il confondra le monde en matière de péché, de justice et de jugement : '
  '9':
  - type: note
    content: Voir 3.18 ; 8.24 ; 15.22.
  - type: text
    content: 'en matière de péché, parce qu''ils ne mettent pas leur foi en moi ; '
