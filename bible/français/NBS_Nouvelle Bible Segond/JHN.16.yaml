        - type: text
          text: '16.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous ne pouvez pas le porter '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est un fardeau trop lourd à porter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), cf. 19.17 ; voir aussi 13.7,33 ; 15.15 ; 1Co 3.1s.
      marker-yv: yv-n
    - type: text
      text: 'J''ai encore beaucoup à vous dire, mais vous ne pouvez pas le porter maintenant. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.13 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
        - type: text
          text: ' de la vérité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il vous conduira…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 14.26+ ; Ps 25.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pas de sa propre initiative
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de lui-même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 5.19+ ; 7.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s ; 12.49.
      marker-yv: yv-n
    - type: text
      text: 'Quand il viendra, lui, l''Esprit de la vérité, il vous conduira dans toute la vérité ; car il ne parlera pas de sa propre initiative, mais il dira tout ce qu''il entendra et il vous annoncera ce qui est à venir. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'me '
        - type: usfm
          marker: w
          children:
          - type: text
            text: glorifiera
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.54+.
      marker-yv: yv-n
    - type: text
      text: 'Lui me glorifiera, parce qu''il prendra de ce qui est à moi pour vous l''annoncer. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 17.10+.
      marker-yv: yv-n
    - type: text
      text: Tout ce qu'a le Père est à moi ; c'est pourquoi j'ai dit qu'il prendra de ce qui est à moi pour vous l'annoncer.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La tristesse changée en joie
    marker-yv: yv-h
