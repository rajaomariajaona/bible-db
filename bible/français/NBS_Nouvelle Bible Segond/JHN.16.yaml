  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: justice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il faut sans doute comprendre, avant tout, que Jésus lui-même est justifié par son élévation auprès du Père, élévation que l''Esprit discerne dans le fait même de son absence physique. Cf. 7.39 ; 1Tm 3.16 ; voir aussi Es 5.15s ; Ac 7.55. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vers le Père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 5,28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous ne me verrez plus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.33+,34 ; cf. 14.19 ; 16.16-19 ; 20.29 ; voir aussi Rm 4.25.
      marker-yv: yv-n
    - type: text
      text: 'en matière de justice, parce que je m''en vais vers le Père, et que vous ne me verrez plus ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.31+ ; cf. 16.33.
      marker-yv: yv-n
    - type: text
