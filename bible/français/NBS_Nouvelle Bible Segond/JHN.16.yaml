        - type: text
          text: '16.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je vous ai parlé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.19+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: afin qu'il n'y ait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que vous ne trébuchiez pas
      - type: usfm
        marker: ft
        children:
