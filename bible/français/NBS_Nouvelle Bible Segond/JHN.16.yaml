      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 18). Sur le terme correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: puis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir v. 28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ('
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'verrez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduit ici deux verbes différents, mais synonymes (cf. 11.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; certains mss ajoutent à la fin du v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parce que je m'en vais vers le Père.
      marker-yv: yv-n
    - type: text
      text: 'Encore un peu, et vous ne me verrez plus ; puis encore un peu, et vous me verrez. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Quelques-uns de ses disciples se dirent donc les uns aux autres : Qu''est-ce qu''il nous dit là ? « Encore un peu, et vous ne me verrez plus ; puis encore un peu, et vous me verrez », et : « Je m''en vais vers le Père. » '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Que dit-il là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'que veut-il dire ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'est-ce que ce « un peu » ?
      marker-yv: yv-n
    - type: text
      text: 'Ils disaient donc : Que dit-il là : « un peu » ? Nous ne savons pas de quoi il parle.'
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sachant… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.25+ ; 13.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'ils voulaient l'interroger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 30 ; Lc 9.45. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Vous débattez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe est traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chercher
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.38+.'
      marker-yv: yv-n
    - type: text
      text: 'Sachant qu''ils voulaient l''interroger, Jésus leur dit : Vous débattez entre vous de ce que j''ai dit : « Encore un peu, et vous ne me verrez plus ; puis encore un peu, et vous me verrez. » '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ils vous excluront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous tuera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mt 10.17-21. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pensera offrir un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: culte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ac 8.1 ; 17.5-9 ; 18.12s ; 26.9-11 ; Ga 1.13s.'
      marker-yv: yv-n
    - type: text
      text: 'Ils vous excluront des synagogues ; l''heure vient même où quiconque vous tuera pensera offrir un culte à Dieu. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amen, amen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.51'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Mt 5.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vous vous lamenterez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Mc 16.10 ; Lc 5.35/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le monde '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se réjouira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ap 11.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'votre tristesse se changera en joie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 6.21 ; 2Co 4.17 ; 1P 1.6.
      marker-yv: yv-n
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen, amen,
    - type: text
      text: ' je vous le dis, vous, vous pleurerez et vous vous lamenterez, tandis que le monde se réjouira : vous, vous serez tristes, mais votre tristesse se changera en joie. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la détresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 24.9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Es 13.8 ; 21.3s ; 26.16-20 ; 66.7-14 ; Jr 30.6 ; Os 13.13 ; Mi 4.9 ; Mc 13.8/ / ; Rm 8.22 ; 1Th 5.3 ; Ap 12.2.'
      marker-yv: yv-n
    - type: text
      text: 'La femme, lorsqu''elle accouche, a de la tristesse, parce que son heure est venue ; mais quand elle a donné le jour à l''enfant, elle ne se souvient plus de la détresse, tant elle a de joie qu''un homme soit venu au monde. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous éprouvez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous avez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tristesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'votre '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' se réjouira '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.20 ; Lc 24.52. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne vous enlèvera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne vous enlève.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi, vous, maintenant, vous éprouvez de la tristesse ; mais je vous reverrai : votre cœur se réjouira, et personne ne vous enlèvera votre joie.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '16.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'En ce jour-là '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.20+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous ne me demanderez plus rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe grec, différent de celui qui apparaît dans la suite du v., est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'interroger '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 19,30 ; c''est celui qui figure dans l''expression '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'demander au Père '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 26, où les deux verbes synonymes apparaissent à nouveau ; voir 14.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce que vous demanderez… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 14.13+.
      marker-yv: yv-n
    - type: text
      text: 'En ce jour-là, vous ne me demanderez plus rien. '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen, amen,
    - type: text
      text: ' je vous le dis, ce que vous demanderez au Père, il vous le donnera en mon nom. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
