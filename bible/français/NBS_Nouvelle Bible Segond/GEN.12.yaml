document_id: GEN.12,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Dieu appelle Abram à quitter son pays
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Va-t'en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : mot à mot la formule hébraïque pourrait être transcrite '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'va à toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: va pour toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . On retrouvera cette tournure idiomatique en 22.2, au pluriel en Jos 22.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du lieu de tes origines '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ta parenté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 11.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la maison de ton père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de ta famille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . – Sur l'ensemble voir 11.27ss ; Jos 24.2s ; Né 9.7 ; cf. Ac 7.2-4 ; Hé 11.8-10,13-16.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Abram : Va-t''en de ton pays, du lieu de tes origines et de la maison de ton père, vers le pays que je te montrerai. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 20.1-18 ; 26.1-11 ; Ps 105.12-15. – Depuis la région montagneuse de Canaan, on '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'descend '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Egypte ; inversement on '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'monte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'd''Egypte en Canaan (13.1). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.10 ; 42.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: séjourner en immigré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 19.9 ; 20.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 47.4 ; Ex 12.48'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il y eut une famine dans le pays ; Abram descendit en Egypte pour y séjourner en immigré, car la famine pesait sur le pays. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''il fut près d''arriver en Egypte, il dit à Saraï, sa femme : Je sais que tu es une belle femme. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand les Egyptiens te verront et qu''ils diront : « C''est sa femme ! », ils me tueront, et toi, ils te laisseront la vie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sœur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '20.2,12 ; 26.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''aie la vie sauve '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je vive.
      marker-yv: yv-n
    - type: text
      text: 'Dis que tu es ma sœur, je te prie, afin que je sois bien traité à cause de toi, et que grâce à toi j''aie la vie sauve. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque Abram arriva en Egypte, les Egyptiens virent que la femme était fort belle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du pharaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de Pharaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; ce titre des souverains d''Egypte est le plus souvent utilisé dans la Bible comme s''il était le nom propre du monarque ; de même chap. 40–47 ; Ex 1–15 ; 2S 8.13s ; 1R 3.1 ; 7.8 ; 9.16 ; 11.14ss ; des pharaons ne sont désignés par leur nom propre qu''en 2R 23.29ss ; Jr 44.30 ; 46.2 ; 2Ch 35.20 ; 36.3s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fut emmenée…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fut prise dans la maison de Pharaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. dans son harem.'
      marker-yv: yv-n
    - type: text
      text: 'Les princes du pharaon la virent aussi et firent son éloge auprès du pharaon ; alors la femme fut emmenée chez le pharaon. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'on le traita bien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le pharaon) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le traita bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des serviteurs et des servantes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des esclaves, hommes et femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'servante '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: peut correspondre à deux termes hébreux différents (celui qui apparaît ici se retrouve en 16.1ss ; 20.14 etc. ; l'autre en 20.17 ; 21.10ss etc.) ; ceux-ci ont pu correspondre à une différence de statut, mais dans le texte biblique ils sont le plus souvent employés de façon pratiquement interchangeable (cf. 1S 25.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Quant à Abram, on le traita bien à cause d''elle ; Abram reçut du petit bétail et du gros bétail, des ânes, des serviteurs et des servantes, des ânesses et des chameaux. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fléaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 7–11 ; Ps 105.14s,28-36.'
      marker-yv: yv-n
    - type: text
      text: 'Mais le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' frappa le pharaon et sa maison de grands fléaux à cause de Saraï, femme d''Abram. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors le pharaon appela Abram ; il lui dit : Qu''est-ce que tu m''as fait ? Pourquoi ne m''as-tu pas fait savoir qu''elle était ta femme ? '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Pourquoi as-tu dit : « C''est ma sœur ! » Du coup je l''ai prise pour femme. Maintenant, voilà ta femme, prends-la et va-t''en ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.5,20,31s. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 18.18 ; 22.18 ; 26.3s ; voir aussi 1.22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je rendrai ton nom grand
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.4 ; voir aussi 2S 7.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et tu seras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sois donc
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une bénédiction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 19.24 ; Za 8.13.
      marker-yv: yv-n
    - type: text
      text: 'Je ferai de toi une grande nation et je te bénirai ; je rendrai ton nom grand, et tu seras une bénédiction. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le reconduisirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans d''autres contextes le même verbe pourrait être traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'laisser partir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: renvoyer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 18.16 ; Ex 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.31-36 ; 1S 9.26.'
      marker-yv: yv-n
    - type: text
      text: Le pharaon donna des ordres à ses gens, et ceux-ci le reconduisirent, lui, sa femme et tout ce qui lui appartenait.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le verbe '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'maudire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduit ici deux verbes hébreux différents : '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je maudirai '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme en 3.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'maudira '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: comme en 8.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Certains mss hébreux et des versions anciennes ont le pluriel '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui te maudiront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 27.29 ; Nb 24.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'clans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: familles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même terme en 10.5,20,31s ; 28.14 ; voir aussi 8.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.38-41 ; 36.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ’adama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) 2.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 28.14 ; Am 3.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se béniront par toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le sens premier de l''expression semble être le suivant : ton sort sera tellement enviable que, dans toutes les nations, on s''y référera pour appeler le bien sur quelqu''un, en disant p. ex. : « sois heureux, prospère comme Abraham » (cf. 48.20) ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a compris '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'seront bénies par '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même formule en 18.18 ; 28.14 ; tournure équivalente en 22.18 ; 26.4 ; Dt 29.18 ; Es 65.16 ; Jr 4.2 ; Ps 72.17 ; cf. Ac 3.25 ; Ga 3.8.'
      marker-yv: yv-n
    - type: text
      text: 'Je bénirai ceux qui te béniront, je maudirai celui qui te maudira. Tous les clans de la terre se béniront par toi. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Hé 11.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Loth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.27+,31.
      marker-yv: yv-n
    - type: text
      text: 'Abram partit, comme le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le lui avait dit, et Loth partit avec lui. Abram avait soixante-quinze ans lorsqu''il quitta Harrân. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Loth, son neveu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Loth le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de son frère'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 14.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les biens…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toutes les acquisitions qu''ils avaient acquises et les êtres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(hommes et bêtes ?) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''ils avaient faits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(sans doute aussi au sens de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'ils avaient acquis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; d''autres comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'ils faisaient vivre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; sur le mot correspondant ici à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: êtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Harrân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '11.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
