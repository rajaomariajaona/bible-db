document_id: GEN.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu appelle Abram à quitter son pays
  - type: text
    content: ' '
  - type: note
    content: 'Va-t''en  : mot à mot la formule hébraïque pourrait être transcrite va à toi ou va pour toi . On retrouvera cette tournure idiomatique en 22.2, au pluriel en Jos 22.4n. –  du lieu de tes origines ou de ta parenté , 11.28n. –  de la maison de ton père  : autre traduction de ta famille . – Sur l''ensemble voir 11.27ss ; Jos 24.2s ; Né 9.7 ; cf. Ac 7.2-4 ; Hé 11.8-10,13-16.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Abram : Va-t''en de ton pays, du lieu de tes origines et de la maison de ton père, vers le pays que je te montrerai. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.1-18 ; 26.1-11 ; Ps 105.12-15. – Depuis la région montagneuse de Canaan, on descend en Egypte ; inversement on monte d''Egypte en Canaan (13.1). –  Egypte 13.10 ; 42.1s. –  séjourner en immigré  : cf. 19.9 ; 20.1n  ; 47.4 ; Ex 12.48n.'
  - type: text
    content: 'Il y eut une famine dans le pays ; Abram descendit en Egypte pour y séjourner en immigré, car la famine pesait sur le pays. '
  '11':
  - type: text
    content: 'Lorsqu''il fut près d''arriver en Egypte, il dit à Saraï, sa femme : Je sais que tu es une belle femme. '
  '12':
  - type: text
    content: 'Quand les Egyptiens te verront et qu''ils diront : « C''est sa femme ! », ils me tueront, et toi, ils te laisseront la vie. '
  '13':
  - type: note
    content: sœur 20.2,12 ; 26.7. –  j'aie la vie sauve ou je vive.
  - type: text
    content: 'Dis que tu es ma sœur, je te prie, afin que je sois bien traité à cause de toi, et que grâce à toi j''aie la vie sauve. '
  '14':
  - type: text
    content: 'Lorsque Abram arriva en Egypte, les Egyptiens virent que la femme était fort belle. '
  '15':
  - type: note
    content: 'du pharaon  : litt. de Pharaon  ; ce titre des souverains d''Egypte est le plus souvent utilisé dans la Bible comme s''il était le nom propre du monarque ; de même chap. 40–47 ; Ex 1–15 ; 2S 8.13s ; 1R 3.1 ; 7.8 ; 9.16 ; 11.14ss ; des pharaons ne sont désignés par leur nom propre qu''en 2R 23.29ss ; Jr 44.30 ; 46.2 ; 2Ch 35.20 ; 36.3s. –  fut emmenée…  : litt. fut prise dans la maison de Pharaon, c.-à-d. dans son harem.'
  - type: text
    content: 'Les princes du pharaon la virent aussi et firent son éloge auprès du pharaon ; alors la femme fut emmenée chez le pharaon. '
  '16':
  - type: note
    content: 'on le traita bien ou il (le pharaon) le traita bien. –  des serviteurs et des servantes  : autre traduction des esclaves, hommes et femmes  ; le mot servante peut correspondre à deux termes hébreux différents (celui qui apparaît ici se retrouve en 16.1ss ; 20.14 etc. ; l''autre en 20.17 ; 21.10ss etc.) ; ceux-ci ont pu correspondre à une différence de statut, mais dans le texte biblique ils sont le plus souvent employés de façon pratiquement interchangeable (cf. 1S 25.41n).'
  - type: text
    content: 'Quant à Abram, on le traita bien à cause d''elle ; Abram reçut du petit bétail et du gros bétail, des ânes, des serviteurs et des servantes, des ânesses et des chameaux. '
  '17':
  - type: note
    content: 'fléaux  : cf. Ex 7–11 ; Ps 105.14s,28-36.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' frappa le pharaon et sa maison de grands fléaux à cause de Saraï, femme d''Abram. '
  '18':
  - type: text
    content: 'Alors le pharaon appela Abram ; il lui dit : Qu''est-ce que tu m''as fait ? Pourquoi ne m''as-tu pas fait savoir qu''elle était ta femme ? '
  '19':
  - type: text
    content: 'Pourquoi as-tu dit : « C''est ma sœur ! » Du coup je l''ai prise pour femme. Maintenant, voilà ta femme, prends-la et va-t''en ! '
  '2':
  - type: note
    content: 'nation  : cf. 10.5,20,31s. –  bénirai  : cf. 18.18 ; 22.18 ; 26.3s ; voir aussi 1.22+. –  je rendrai ton nom grand  : cf. 11.4 ; voir aussi 2S 7.9. –  et tu seras (autre traduction sois donc) une bénédiction Es 19.24 ; Za 8.13.'
  - type: text
    content: 'Je ferai de toi une grande nation et je te bénirai ; je rendrai ton nom grand, et tu seras une bénédiction. '
  '20':
  - type: note
    content: 'le reconduisirent  : dans d''autres contextes le même verbe pourrait être traduit par laisser partir ou renvoyer  ; cf. 18.16 ; Ex 5.1n  ; 12.31-36 ; 1S 9.26.'
  - type: text
    content: Le pharaon donna des ordres à ses gens, et ceux-ci le reconduisirent, lui, sa femme et tout ce qui lui appartenait.
  '3':
  - type: note
    content: 'Le verbe maudire traduit ici deux verbes hébreux différents : je maudirai comme en 3.14n, maudira comme en 8.21n. Certains mss hébreux et des versions anciennes ont le pluriel ceux qui te maudiront  ; cf. 27.29 ; Nb 24.9. –  clans ou familles  ; même terme en 10.5,20,31s ; 28.14 ; voir aussi 8.19n  ; 24.38-41 ; 36.40. –  terre (hébreu ’adama) 2.5n  ; cf. 28.14 ; Am 3.2. –  se béniront par toi  : le sens premier de l''expression semble être le suivant : ton sort sera tellement enviable que, dans toutes les nations, on s''y référera pour appeler le bien sur quelqu''un, en disant p. ex. : « sois heureux, prospère comme Abraham » (cf. 48.20) ; LXX a compris seront bénies par (ou en) toi  ; même formule en 18.18 ; 28.14 ; tournure équivalente en 22.18 ; 26.4 ; Dt 29.18 ; Es 65.16 ; Jr 4.2 ; Ps 72.17 ; cf. Ac 3.25 ; Ga 3.8.'
  - type: text
    content: 'Je bénirai ceux qui te béniront, je maudirai celui qui te maudira. Tous les clans de la terre se béniront par toi. '
  '4':
  - type: note
    content: Hé 11.8. –  Loth 11.27+,31.
  - type: text
    content: 'Abram partit, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui avait dit, et Loth partit avec lui. Abram avait soixante-quinze ans lorsqu''il quitta Harrân. '
  '5':
  - type: note
    content: 'Loth, son neveu  : litt. Loth le fils de son frère, cf. 14.14n. –  tous les biens…  : litt. toutes les acquisitions qu''ils avaient acquises et les êtres (hommes et bêtes ?) qu''ils avaient faits (sans doute aussi au sens de qu''ils avaient acquis  ; d''autres comprennent qu''ils faisaient vivre) ; sur le mot correspondant ici à êtres, voir 1.20n. –  Harrân 11.31ns.'
  - type: text
    content: 'Abram prit Saraï, sa femme, et Loth, son neveu, avec tous les biens et les gens qu''ils avaient acquis à Harrân. Ils partirent pour Canaan, et ils arrivèrent en Canaan. '
  '6':
  - type: note
    content: 'Sichem  : aujourd''hui Naplouse, dans la région montagneuse au centre du pays, au pied des monts Ebal et Garizim (33.18 ; 34 ; 35.4 ; 37.12 ; cf. 48.22n). Le lieu (terme à entendre sans doute au sens de sanctuaire) dit térébinthe de Moré (térébinthe du Maître) devait se situer dans le voisinage ; cf. 13.18 ; 14.13 ; 18.1,4,8 ; certains pensent qu''il est question du même arbre en 35.4, cf. 35.8n  ; Dt 11.29s ; Jos 24.24 ; Jg 9.6,37n. –  Les Cananéens  : litt. le Cananéen  ; 10.15-19n  ; 13.7.'
  - type: text
    content: 'Abram traversa le pays jusqu''au lieu de Sichem, jusqu''au térébinthe de Moré. Les Cananéens étaient alors dans le pays. '
  '7':
  - type: note
    content: 'Sur la promesse du pays (ou de la terre) à la descendance (ou aux descendants, cf. 3.15n) du patriarche, voir 13.15 ; 15.18 ; 17.8 ; 24.7 ; 26.4 ; Ex 32.13 ; Dt 1.8 ; 34.4 ; Ps 105.11 ; Ac 7.5. –  Abram bâtit  : litt. il bâtit, cf. v. 8.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut à Abram et dit : Je donnerai ce pays à ta descendance. Abram bâtit là un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui lui était apparu. '
  '8':
  - type: note
    content: 'Beth-El ou Béthel, cf. 28.19n. –  l''ouest  : l''hébreu dit du côté de la mer (Méditerranée) ; de même en 13.14. –  le Aï Jos 7.2n. –  invoqua le nom… 4.26n.'
  - type: text
    content: 'Puis il leva le camp pour se rendre dans la montagne, à l''est de Beth-El ; il dressa sa tente entre Beth-El, à l''ouest, et le Aï, à l''est. Il bâtit là un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et invoqua le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '9':
  - type: note
    content: 'le Néguev  : le terme peut désigner la direction du sud, en général (cf. 13.14n), mais aussi, en particulier, la région semi-désertique au sud d''Hébron.'
  - type: text
    content: Abram repartit, en se rendant par étapes vers le Néguev.
  - type: heading
    content: Abram en Egypte
