document_id: JER.40,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie s'installe auprès de Guedalia
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Parole… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de Rama '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '31.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 39.13s.'
      marker-yv: yv-n
    - type: text
      text: 'Parole qui parvint à Jérémie de la part du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', après que Nebouzaradân, chef des gardes, l''eut renvoyé de Rama. Quand il le fit prendre, Jérémie était lié de chaînes au milieu de tous les exilés de Jérusalem et de Juda, ceux qu''on exilait à Babylone.'
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à la disposition des Chaldéens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (21.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant les Chaldéens.
      marker-yv: yv-n
    - type: text
      text: Quant à moi, je reste au Mitspa, pour me tenir à la disposition des Chaldéens qui viendront vers nous ; vous, recueillez le vin, les fruits d'été et l'huile, mettez-les dans vos récipients, et restez dans les villes que vous occupez.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Moab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '48.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un reste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 15 ; 11.23+ ; 42.15.'
      marker-yv: yv-n
    - type: text
      text: 'De même tous les Judéens qui étaient en Moab, chez les Ammonites, en Edom et dans tous les pays apprirent que le roi de Babylone avait laissé un reste en Juda et qu''il avait nommé à leur tête Guedalia, fils d''Ahiqam, fils de Shaphân. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Et tous les Judéens revinrent de tous les lieux où ils avaient été bannis ; ils se rendirent dans le pays de Juda vers Guedalia, au Mitspa, et ils recueillirent une grande abondance de vin et de fruits d'été.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'assassinat de Guedalia
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Yohanân, fils de Qaréah, et tous les chefs de l''armée qui étaient dans les campagnes vinrent auprès de Guedalia, au Mitspa, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Baalis '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ce nom a été retrouvé sur un sceau ammonite datant à peu près de cette époque), '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'roi des Ammonites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Transjordanie ; cf. v. 11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ismaël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8 ; 41.1ss.
      marker-yv: yv-n
    - type: text
      text: 'et ils lui dirent : Sais-tu bien que Baalis, roi des Ammonites, a envoyé Ismaël, fils de Netania, pour t''abattre ? Mais Guedalia, fils d''Ahiqam, ne les crut pas. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Et Yohanân, fils de Qaréah, dit secrètement à Guedalia, au Mitspa : Laisse-moi, je te prie, aller abattre Ismaël, fils de Netania. Personne ne le saura. Pourquoi t''abattrait-il ? Pourquoi tous les gens de Juda qui sont rassemblés auprès de toi seraient-ils dispersés, et le reste de Juda serait-il perdu ? '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Guedalia, fils d''Ahiqam, répondit à Yohanân, fils de Qaréah : Ne fais pas cela ; ce que tu dis sur Ismaël est faux.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le chef des gardes fit prendre Jérémie et lui dit : Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, avait annoncé ce malheur contre ce lieu. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Za 1.6 ; Lm 2.17. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a fait venir ce qu''il avait annoncé, il l''a fait parce que vous avez péché contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et que vous ne l''avez pas écouté. Ce qu''il avait annoncé vous est donc arrivé. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.4 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '39.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon certains mss hébreux et des versions anciennes ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', selon le texte hébreu traditionnel. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 's''il te plaît '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne te plaît pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: s'il est bon / mauvais à tes yeux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'je veillerai sur toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 44.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne viens pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cesse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: abstiens-toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le pays '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la terre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est devant toi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 13.9 ; 20.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: où il te plaît et où il te convient d'aller
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: où il sera bon et droit à tes yeux d'aller.
      marker-yv: yv-n
    - type: text
      text: 'Aujourd''hui même, je t''affranchis des chaînes que tu as aux mains ; s''il te plaît de venir avec moi à Babylone, viens, je veillerai sur toi ; s''il ne te plaît pas de venir avec moi à Babylone, ne viens pas ; regarde, tout le pays est devant toi, va où il te plaît et où il te convient d''aller. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Et, comme il n'avait pas encore répondu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : texte et traduction incertains ; autre traduction, d''après des versions anciennes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et s'il ne te convient pas de rester (avec moi), retourne vers Guedalia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 39.14+ ; 2R 25.22ss.'
      marker-yv: yv-n
    - type: text
      text: '– Et, comme il n''avait pas encore répondu : Retourne, ajouta-t-il, vers Guedalia, fils d''Ahiqam, fils de Shaphân, que le roi de Babylone a nommé à la tête des villes de Juda, et reste avec lui au milieu du peuple ; ou bien va partout où il te convient d''aller. Le chef des gardes lui donna des vivres et des présents, et il le renvoya. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au Mitspa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', au nord de Jérusalem, non loin de Rama ; cf. Jg 20.1,3 ; 21.1,5 ; 1S 7.5-7 ; 1R 15.22 ; 2R 25.23 ; Né 3.7.'
      marker-yv: yv-n
    - type: text
      text: Jérémie alla trouver Guedalia, fils d'Ahiqam, au Mitspa, et il resta avec lui au milieu du peuple qui était resté dans le pays.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les Judéens se regroupent autour de Guedalia
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Cf. 2R 25.22-26
    marker-yv: yv-h
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '39.10 ; 2R 24.14 ; 25.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nommé à la tête du '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'confié '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent deux constructions différentes du même verbe hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des hommes, des femmes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des hommes, des femmes, des enfants, et ceux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Gn 34.29
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tous les officiers qui étaient dans les campagnes apprirent, eux et leurs hommes, que le roi de Babylone avait nommé à la tête du pays Guedalia, fils d''Ahiqam, et qu''il lui avait confié des hommes, des femmes et leurs familles, les petites gens du pays, ceux qu''on n''avait pas exilés à Babylone. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Netania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Netanyahou
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et Jonathan
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : omis par quelques mss hébreux et par '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yezania
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yezanyahou.
      marker-yv: yv-n
    - type: text
      text: 'Ils se rendirent auprès de Guedalia, au Mitspa : c''étaient Ismaël, fils de Netania, Yohanân et Jonathan, fils de Qaréah, Seraya, fils de Tanhoumeth, les fils d''Ephaï le Netophatite et Yezania, fils du Maakatite, eux et leurs hommes. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '40.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 27.12.
      marker-yv: yv-n
    - type: text
      text: 'Guedalia, fils d''Ahiqam, fils de Shaphân, leur fit un serment, à eux et à leurs hommes ; il leur dit : N''ayez pas peur de vous soumettre aux Chaldéens ; restez dans le pays, soumettez-vous au roi de Babylone, et vous vous en trouverez bien. '
