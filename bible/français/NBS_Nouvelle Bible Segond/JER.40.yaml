document_id: JER.40,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie s'installe auprès de Guedalia
  - type: text
    content: ' '
  - type: note
    content: Parole… 1.1n-2n. –  de Rama 31.15n  ; cf. 39.13s.
  - type: text
    content: 'Parole qui parvint à Jérémie de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ', après que Nebouzaradân, chef des gardes, l''eut renvoyé de Rama. Quand il le fit prendre, Jérémie était lié de chaînes au milieu de tous les exilés de Jérusalem et de Juda, ceux qu''on exilait à Babylone.'
  '10':
  - type: note
    content: 'à la disposition des Chaldéens (21.4n) : litt. devant les Chaldéens.'
  - type: text
    content: Quant à moi, je reste au Mitspa, pour me tenir à la disposition des Chaldéens qui viendront vers nous ; vous, recueillez le vin, les fruits d'été et l'huile, mettez-les dans vos récipients, et restez dans les villes que vous occupez.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Moab 48.1n. –  un reste  : cf. v. 15 ; 11.23+ ; 42.15.'
  - type: text
    content: 'De même tous les Judéens qui étaient en Moab, chez les Ammonites, en Edom et dans tous les pays apprirent que le roi de Babylone avait laissé un reste en Juda et qu''il avait nommé à leur tête Guedalia, fils d''Ahiqam, fils de Shaphân. '
  '12':
  - type: text
    content: Et tous les Judéens revinrent de tous les lieux où ils avaient été bannis ; ils se rendirent dans le pays de Juda vers Guedalia, au Mitspa, et ils recueillirent une grande abondance de vin et de fruits d'été.
  - type: heading
    content: L'assassinat de Guedalia
  '13':
  - type: text
    content: 'Yohanân, fils de Qaréah, et tous les chefs de l''armée qui étaient dans les campagnes vinrent auprès de Guedalia, au Mitspa, '
  '14':
  - type: note
    content: Baalis (ce nom a été retrouvé sur un sceau ammonite datant à peu près de cette époque), roi des Ammonites en Transjordanie ; cf. v. 11. –  Ismaël v. 8 ; 41.1ss.
  - type: text
    content: 'et ils lui dirent : Sais-tu bien que Baalis, roi des Ammonites, a envoyé Ismaël, fils de Netania, pour t''abattre ? Mais Guedalia, fils d''Ahiqam, ne les crut pas. '
  '15':
  - type: text
    content: 'Et Yohanân, fils de Qaréah, dit secrètement à Guedalia, au Mitspa : Laisse-moi, je te prie, aller abattre Ismaël, fils de Netania. Personne ne le saura. Pourquoi t''abattrait-il ? Pourquoi tous les gens de Juda qui sont rassemblés auprès de toi seraient-ils dispersés, et le reste de Juda serait-il perdu ? '
  '16':
  - type: text
    content: 'Guedalia, fils d''Ahiqam, répondit à Yohanân, fils de Qaréah : Ne fais pas cela ; ce que tu dis sur Ismaël est faux.'
  '2':
  - type: text
    content: 'Le chef des gardes fit prendre Jérémie et lui dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, avait annoncé ce malheur contre ce lieu. '
  '3':
  - type: note
    content: Cf. Za 1.6 ; Lm 2.17. – Voir péché.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait venir ce qu''il avait annoncé, il l''a fait parce que vous avez péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et que vous ne l''avez pas écouté. Ce qu''il avait annoncé vous est donc arrivé. '
  '4':
  - type: note
    content: '39.12. –  aux mains, selon certains mss hébreux et des versions anciennes ; à la main, selon le texte hébreu traditionnel. –  s''il te plaît / ne te plaît pas litt. s''il est bon / mauvais à tes yeux. –  je veillerai sur toi Gn 44.21n. –  ne viens pas  : litt. cesse, c.-à-d. abstiens-toi. –  le pays (ou la terre) est devant toi…  : cf. Gn 13.9 ; 20.15. –  où il te plaît et où il te convient d''aller  : litt. où il sera bon et droit à tes yeux d''aller.'
  - type: text
    content: 'Aujourd''hui même, je t''affranchis des chaînes que tu as aux mains ; s''il te plaît de venir avec moi à Babylone, viens, je veillerai sur toi ; s''il ne te plaît pas de venir avec moi à Babylone, ne viens pas ; regarde, tout le pays est devant toi, va où il te plaît et où il te convient d''aller. '
  '5':
  - type: note
    content: 'Et, comme il n''avait pas encore répondu…  : texte et traduction incertains ; autre traduction, d''après des versions anciennes  : et s''il ne te convient pas de rester (avec moi), retourne vers Guedalia  ; cf. 39.14+ ; 2R 25.22ss.'
  - type: text
    content: '– Et, comme il n''avait pas encore répondu : Retourne, ajouta-t-il, vers Guedalia, fils d''Ahiqam, fils de Shaphân, que le roi de Babylone a nommé à la tête des villes de Juda, et reste avec lui au milieu du peuple ; ou bien va partout où il te convient d''aller. Le chef des gardes lui donna des vivres et des présents, et il le renvoya. '
  '6':
  - type: note
    content: au Mitspa, au nord de Jérusalem, non loin de Rama ; cf. Jg 20.1,3 ; 21.1,5 ; 1S 7.5-7 ; 1R 15.22 ; 2R 25.23 ; Né 3.7.
  - type: text
    content: Jérémie alla trouver Guedalia, fils d'Ahiqam, au Mitspa, et il resta avec lui au milieu du peuple qui était resté dans le pays.
  - type: heading
    content: Les Judéens se regroupent autour de Guedalia
  - type: heading
    content: Cf. 2R 25.22-26
  '7':
  - type: text
    content: ' '
  - type: note
    content: '39.10 ; 2R 24.14 ; 25.12. –  nommé à la tête du et confié traduisent deux constructions différentes du même verbe hébreu. –  des hommes, des femmes…  : autre traduction des hommes, des femmes, des enfants, et ceux…  ; cf. Gn 34.29n.'
  - type: text
    content: 'Tous les officiers qui étaient dans les campagnes apprirent, eux et leurs hommes, que le roi de Babylone avait nommé à la tête du pays Guedalia, fils d''Ahiqam, et qu''il lui avait confié des hommes, des femmes et leurs familles, les petites gens du pays, ceux qu''on n''avait pas exilés à Babylone. '
  '8':
  - type: note
    content: 'Netania  : hébreu Netanyahou. –  et Jonathan  : omis par quelques mss hébreux et par LXX. –  Yezania  : hébreu Yezanyahou.'
  - type: text
    content: 'Ils se rendirent auprès de Guedalia, au Mitspa : c''étaient Ismaël, fils de Netania, Yohanân et Jonathan, fils de Qaréah, Seraya, fils de Tanhoumeth, les fils d''Ephaï le Netophatite et Yezania, fils du Maakatite, eux et leurs hommes. '
  '9':
  - type: note
    content: Cf. 27.12.
  - type: text
    content: 'Guedalia, fils d''Ahiqam, fils de Shaphân, leur fit un serment, à eux et à leurs hommes ; il leur dit : N''ayez pas peur de vous soumettre aux Chaldéens ; restez dans le pays, soumettez-vous au roi de Babylone, et vous vous en trouverez bien. '
