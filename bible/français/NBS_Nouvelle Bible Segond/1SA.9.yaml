document_id: 1SA.9,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül et les ânesses perdues
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Benjamin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : nom d''une des tribus d''Israël. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qish
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 14.51 ; 1Ch 8.33 ; 9.39. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vaillant guerrier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cette appellation s''appliquait d''abord à des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: guerriers courageux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', puis également à des gens jouissant d''une certaine aisance matérielle ; en effet, les hommes soumis au service armé, devant fournir leur équipement personnel, étaient généralement issus des classes favorisées de la société.'
      marker-yv: yv-n
    - type: text
      text: 'Il y avait un homme de Benjamin, nommé Qish, fils d''Abiel, fils de Tseror, fils de Bekorath, fils d''Aphiah, fils d''un Benjaminite, qui était un vaillant guerrier. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Saül dit à son serviteur : Bien dit ! Viens, allons-y ! Et ils allèrent à la ville où était l''homme de Dieu.'
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sortaient pour puiser de l'eau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : la ville étant construite sur une hauteur, la source se trouvait probablement au pied de la colline. Cf. Gn 24.11 ; Ex 2.15s.'
      marker-yv: yv-n
    - type: text
      text: 'Comme ils montaient à la ville, ils trouvèrent des jeunes filles qui sortaient pour puiser de l''eau, et ils leur demandèrent : Le voyant est-il ici ? '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il est là, devant toi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il vient d'arriver, juste avant toi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il y a un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.2s ; 20.6,29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: haut
        - type: text
          text: ' lieu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 3.2.'
      marker-yv: yv-n
    - type: text
      text: 'Elles leur répondirent : Oui, il est là, devant toi ; mais maintenant va vite, car aujourd''hui il est venu à la ville, parce qu''il y a un sacrifice pour le peuple au haut lieu. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'En hébreu, plusieurs éléments de ce v. ne sont pas parfaitement clairs. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour manger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains sacrifices étaient accompagnés d''un repas sacré ; cf. Ex 18.12 ; Lv 7.11-21 ; Dt 12.6s. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénir
        - type: text
          text: ' le sacrifice'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : une telle bénédiction n''est pas mentionnée ailleurs dans l''A.T. ; cf. Lc 9.16 ; 24.30.'
      marker-yv: yv-n
    - type: text
      text: 'Quand vous serez entrés dans la ville, vous le trouverez avant qu''il monte au haut lieu pour manger : le peuple ne mangera pas avant qu''il soit arrivé, parce qu''il doit bénir le sacrifice ; après cela, les invités mangeront. Montez donc maintenant et vous le trouverez tout de suite.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Saül rencontre Samuel
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Comme ils arrivaient au milieu de la ville, Samuel sortit à leur rencontre en montant au haut lieu.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait informé Samuel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avait découvert l'oreille de Samuel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 20.2,12s ; voir aussi 1R 14.5 ; Am 3.7 ; Ac 9.10-16.
      marker-yv: yv-n
    - type: text
      text: 'Or, un jour avant l''arrivée de Saül, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait informé Samuel, en disant : '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'enverrai un homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 20.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu lui conféreras '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'onction
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu l'oindras, tu le consacreras avec de l'huile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 9.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chef
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui est désigné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le mot hébreu est appliqué le plus souvent à un futur roi, cf. 10.1 ; 25.30 ; 2S 5.2 ; 1R 1.35 ; 14.7 ; 16.2 ; voir aussi 1S 2.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il sauvera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il délivrera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai vu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: regardé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'j''ai vu l''humiliation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la misère
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de mon peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses cris sont venus jusqu'à moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 2.23ss ; 3.7ss ; Nb 20.16 ; Ps 18.7 ; 106.44.'
      marker-yv: yv-n
    - type: text
      text: 'Demain, à cette heure-ci, je t''enverrai un homme du pays de Benjamin, et tu lui conféreras l''onction pour qu''il soit chef sur Israël, mon peuple. Il sauvera mon peuple de la main des Philistins ; en effet, j''ai vu mon peuple, et ses cris sont venus jusqu''à moi. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: détiendra le pouvoir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu employé dans ce v. évoque plus l''idée de domination, de contrainte, que celle de libération (v. 16). Voir Ac 13.21.'
      marker-yv: yv-n
    - type: text
      text: 'Samuel aperçut Saül, et le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' lui dit : Voici l''homme dont je t''ai parlé ; c''est lui qui détiendra le pouvoir sur mon peuple. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à l'intérieur de la porte de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 3.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Saül s''approcha de Samuel à l''intérieur de la porte de la ville et dit : Indique-moi, je te prie, où est la maison du voyant. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; par anticipation, Samuel attribue la première place au futur roi. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je te renseignerai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'indiquer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 6,8,18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui t'inquiète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ce qui est dans ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Samuel répondit à Saül : Je suis le voyant. Monte avec moi au haut lieu : vous mangerez aujourd''hui avec moi. Je te laisserai partir au matin et je te renseignerai sur tout ce qui t''inquiète. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Saül
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jeune
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu rappelle le verbe habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: choisir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains comprennent ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un homme d'élite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mais en règle générale le mot désigne simplement un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'jeune homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ainsi en 8.16, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jeunes gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'beau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''adjectif hébreu peut avoir un sens autant moral que physique, et suggérer les notions de compétence et d''aptitude. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il les dépassait tous d'une tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à partir de son épaule et au-dessus, il était plus grand que tout le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on trouve en 10.23 une affirmation presque identique ; cf. 16.7.'
      marker-yv: yv-n
    - type: text
      text: Il avait un fils nommé Saül ; celui-ci était jeune et beau ; aucun des Israélites n'était plus beau que lui, il les dépassait tous d'une tête.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ne t''inquiète pas de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne te préoccupe pas de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne place pas ton cœur sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'précieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: désirable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Le désir peut être, comme on l'a généralement compris, celui de Saül, à savoir une aspiration au pouvoir, dont Samuel lui fait prendre conscience. Mais il pourrait aussi s'agir du désir d'Israël lui-même, de son aspiration à avoir un roi ; dans ce cas il faudrait traduire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Vers qui se porte le désir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'attente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Israélites ? N'est-ce pas vers toi, vers la maison de ton père ?
      marker-yv: yv-n
    - type: text
      text: 'Ne t''inquiète pas de tes ânesses, qui ont été perdues il y a aujourd''hui trois jours : elles ont été retrouvées. A qui sera tout ce qu''il y a de précieux en Israël ? N''est-ce pas à toi et à toute la maison de ton père ? '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Benjaminite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'une des plus petites tribus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : des versions anciennes disent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la plus petite tribu
      - type: usfm
        marker: ft
        children:
        - type: text
