document_id: 1SA.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Saül et les ânesses perdues
  - type: text
    content: ' '
  - type: note
    content: 'Benjamin  : nom d''une des tribus d''Israël. –  Qish  : cf. 14.51 ; 1Ch 8.33 ; 9.39. –  vaillant guerrier  : cette appellation s''appliquait d''abord à des guerriers courageux , puis également à des gens jouissant d''une certaine aisance matérielle ; en effet, les hommes soumis au service armé, devant fournir leur équipement personnel, étaient généralement issus des classes favorisées de la société.'
  - type: text
    content: 'Il y avait un homme de Benjamin, nommé Qish, fils d''Abiel, fils de Tseror, fils de Bekorath, fils d''Aphiah, fils d''un Benjaminite, qui était un vaillant guerrier. '
  '10':
  - type: text
    content: 'Saül dit à son serviteur : Bien dit ! Viens, allons-y ! Et ils allèrent à la ville où était l''homme de Dieu.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'sortaient pour puiser de l''eau  : la ville étant construite sur une hauteur, la source se trouvait probablement au pied de la colline. Cf. Gn 24.11 ; Ex 2.15s.'
  - type: text
    content: 'Comme ils montaient à la ville, ils trouvèrent des jeunes filles qui sortaient pour puiser de l''eau, et ils leur demandèrent : Le voyant est-il ici ? '
  '12':
  - type: note
    content: 'il est là, devant toi (LXX devant vous) ; autre traduction il vient d''arriver, juste avant toi. –  il y a un sacrifice  : cf. 16.2s ; 20.6,29. –  au haut lieu  : cf. 1R 3.2.'
  - type: text
    content: 'Elles leur répondirent : Oui, il est là, devant toi ; mais maintenant va vite, car aujourd''hui il est venu à la ville, parce qu''il y a un sacrifice pour le peuple au haut lieu. '
  '13':
  - type: note
    content: 'En hébreu, plusieurs éléments de ce v. ne sont pas parfaitement clairs. –  pour manger  : certains sacrifices étaient accompagnés d''un repas sacré ; cf. Ex 18.12 ; Lv 7.11-21 ; Dt 12.6s. –  bénir le sacrifice  : une telle bénédiction n''est pas mentionnée ailleurs dans l''A.T. ; cf. Lc 9.16 ; 24.30.'
  - type: text
    content: 'Quand vous serez entrés dans la ville, vous le trouverez avant qu''il monte au haut lieu pour manger : le peuple ne mangera pas avant qu''il soit arrivé, parce qu''il doit bénir le sacrifice ; après cela, les invités mangeront. Montez donc maintenant et vous le trouverez tout de suite.'
  - type: heading
    content: Saül rencontre Samuel
  '14':
  - type: text
    content: Comme ils arrivaient au milieu de la ville, Samuel sortit à leur rencontre en montant au haut lieu.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'avait informé Samuel  : litt. avait découvert l''oreille de Samuel  ; cf. 20.2,12s ; voir aussi 1R 14.5 ; Am 3.7 ; Ac 9.10-16.'
  - type: text
    content: 'Or, un jour avant l''arrivée de Saül, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait informé Samuel, en disant : '
  '16':
  - type: note
    content: 'je t''enverrai un homme  : cf. Pr 20.24. –  tu lui conféreras l''onction ou tu l''oindras, tu le consacreras avec de l''huile  ; cf. Jg 9.15. –  chef  : litt. celui qui est désigné  ; le mot hébreu est appliqué le plus souvent à un futur roi, cf. 10.1 ; 25.30 ; 2S 5.2 ; 1R 1.35 ; 14.7 ; 16.2 ; voir aussi 1S 2.7s. –  Il sauvera ou il délivrera. –  de la main  : cf. 4.3n. –  j''ai vu ou regardé  ; LXX j''ai vu l''humiliation (ou la misère) de mon peuple. –  et (autre traduction car) ses cris sont venus jusqu''à moi  : cf. Ex 2.23ss ; 3.7ss ; Nb 20.16 ; Ps 18.7 ; 106.44.'
  - type: text
    content: 'Demain, à cette heure-ci, je t''enverrai un homme du pays de Benjamin, et tu lui conféreras l''onction pour qu''il soit chef sur Israël, mon peuple. Il sauvera mon peuple de la main des Philistins ; en effet, j''ai vu mon peuple, et ses cris sont venus jusqu''à moi. '
  '17':
  - type: note
    content: 'détiendra le pouvoir  : le verbe hébreu employé dans ce v. évoque plus l''idée de domination, de contrainte, que celle de libération (v. 16). Voir Ac 13.21.'
  - type: text
    content: 'Samuel aperçut Saül, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Voici l''homme dont je t''ai parlé ; c''est lui qui détiendra le pouvoir sur mon peuple. '
  '18':
  - type: note
    content: 'à l''intérieur de la porte de la ville  : cf. 2S 3.27n.'
  - type: text
    content: 'Saül s''approcha de Samuel à l''intérieur de la porte de la ville et dit : Indique-moi, je te prie, où est la maison du voyant. '
  '19':
  - type: note
    content: 'avec moi  : litt. devant moi  ; par anticipation, Samuel attribue la première place au futur roi. –  je te renseignerai  : le même verbe est traduit par indiquer aux v. 6,8,18. –  ce qui t''inquiète  : litt. ce qui est dans ton cœur, cf. v. 20n.'
  - type: text
    content: 'Samuel répondit à Saül : Je suis le voyant. Monte avec moi au haut lieu : vous mangerez aujourd''hui avec moi. Je te laisserai partir au matin et je te renseignerai sur tout ce qui t''inquiète. '
  '2':
  - type: note
    content: 'Saül  : cf. 1.28n. –  jeune  : le terme hébreu rappelle le verbe habituellement traduit par choisir  ; certains comprennent ici un homme d''élite  ; mais en règle générale le mot désigne simplement un jeune homme (ainsi en 8.16, jeunes gens). –  beau ou bon  : l''adjectif hébreu peut avoir un sens autant moral que physique, et suggérer les notions de compétence et d''aptitude. –  il les dépassait tous d''une tête  : litt. à partir de son épaule et au-dessus, il était plus grand que tout le peuple  ; on trouve en 10.23 une affirmation presque identique ; cf. 16.7.'
  - type: text
    content: Il avait un fils nommé Saül ; celui-ci était jeune et beau ; aucun des Israélites n'était plus beau que lui, il les dépassait tous d'une tête.
  '20':
  - type: note
    content: 'Ne t''inquiète pas de ou ne te préoccupe pas de  : litt. ne place pas ton cœur sur. –  précieux ou désirable. Le désir peut être, comme on l''a généralement compris, celui de Saül, à savoir une aspiration au pouvoir, dont Samuel lui fait prendre conscience. Mais il pourrait aussi s''agir du désir d''Israël lui-même, de son aspiration à avoir un roi ; dans ce cas il faudrait traduire  : Vers qui se porte le désir (ou l''attente) des Israélites ? N''est-ce pas vers toi, vers la maison de ton père ?'
  - type: text
    content: 'Ne t''inquiète pas de tes ânesses, qui ont été perdues il y a aujourd''hui trois jours : elles ont été retrouvées. A qui sera tout ce qu''il y a de précieux en Israël ? N''est-ce pas à toi et à toute la maison de ton père ? '
  '21':
  - type: note
    content: 'Benjaminite  : cf. v. 1. –  l''une des plus petites tribus  : des versions anciennes disent la plus petite tribu  ; voir Nb 1.20-43 ; elle avait été décimée au temps des Juges, voir Jg 20.46. Cf. Ex 3.11 ; 4.1 ; Jg 6.15 ; 1S 18.18 ; Jr 1.6. –  des tribus de Benjamin  : versions anciennes de la tribu de Benjamin  ; cf. Jg 20.12n.'
  - type: text
    content: 'Saül répondit : Ne suis-je pas Benjaminite, de l''une des plus petites tribus d''Israël ? Mon clan n''est-il pas le plus petit de tous les clans des tribus de Benjamin ? Pourquoi donc me parles-tu de la sorte ?'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'la salle  : même terme en 2R 23.11n. –  à la tête des invités  : encore une fois une place d''honneur, cf. v. 19n. –  trente hommes  : LXX et l''écrivain ancien Flavius Josèphe parlent de soixante-dix hommes.'
  - type: text
    content: 'Samuel prit Saül et son serviteur, les fit entrer dans la salle et leur donna une place à la tête des invités, qui étaient environ trente hommes. '
  '23':
  - type: note
    content: 'la part  : cf. 1.4s. –  Mets-la de côté  : litt. place-la près de toi, c.-à-d. garde-la en réserve.'
  - type: text
    content: 'Samuel dit au cuisinier : Sers la part que je t''ai donnée en te disant : « Mets-la de côté. » '
  '24':
  - type: note
    content: 'préleva  : LXX dit fit cuire. –  et ce qui l''entoure  : litt. et ce qui est au-dessus, ou ce qui est en plus, expression dont on ne sait guère ce qu''elle désigne concrètement ; on a parfois modifié le texte hébreu traditionnel pour lire et la queue. –  Il dit  : le sujet semble être le cuisinier  ; des versions anciennes ont compris qu''il s''agissait de Samuel. La suite est peu claire en hébreu, et les versions anciennes en ont deviné le sens plus qu''elles ne l''ont traduite. –  ce qui a été réservé  : autre traduction ce qui reste. –  pour la rencontre festive  : autre traduction au temps fixé, cf. 13.8,11 ; Gn 1.14n. –  quand j''ai invité  : litt. en disant (c.-à-d. quand j''ai dit  ? quand on a dit  ?)  : J''ai invité le peuple.'
  - type: text
    content: 'Le cuisinier préleva la cuisse et ce qui l''entoure et il la plaça devant Saül. Il dit : Voici ce qui a été réservé ; mets-le devant toi et mange, car c''est ce qu''on t''a gardé pour la rencontre festive quand j''ai invité le peuple. Ainsi Saül mangea avec Samuel ce jour-là.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Samuel s''entretint avec Saül  : LXX on prépara un lit pour Saül sur le toit (26) et il se coucha . –  en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n  ; 2S 11.2 ; Jr 19.13 ; Ac 10.9.'
  - type: text
    content: Ils descendirent du haut lieu à la ville, et Samuel s'entretint avec Saül sur le toit en terrasse.
  - type: heading
    content: Samuel oint Saül comme roi d'Israël
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'se levèrent de bon matin  : voir dans la note précédente la variante de LXX.'
  - type: text
    content: 'Puis ils se levèrent de bon matin. Dès l''aurore, Samuel appela Saül sur le toit ; il lui dit : Lève-toi, je vais te reconduire. Saül se leva, et ils sortirent tous deux de la maison, lui et Samuel. '
  '27':
  - type: note
    content: 'à l''extrémité de la ville  : probablement à la limite du territoire appartenant à la ville. –  de passer devant nous  : autre traduction de partir en avant (pour les laisser seuls). –  Celui-ci passa devant  : le mot correspondant est omis par LXX et Syr. –  reprit Samuel  : sous-entendu en hébreu. –  je te ferai entendre…  : cf. Dt 4.10 ; 30.12s.'
  - type: text
    content: 'Quand ils furent descendus à l''extrémité de la ville, Samuel dit à Saül : Dis à ton serviteur de passer devant nous. Celui-ci passa devant. Arrête-toi un instant, reprit Samuel, et je te ferai entendre la parole de Dieu.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'va rechercher  : litt. lève-toi, va rechercher.'
  - type: text
    content: 'Les ânesses de Qish, père de Saül, s''égarèrent ; Qish dit à Saül, son fils : Prends avec toi l''un des serviteurs, je te prie, et va rechercher les ânesses. '
  '4':
  - type: note
    content: 'traversa  : en hébreu, les deux premiers emplois de ce verbe, ainsi que le dernier, sont au singulier, mais le troisième est au pluriel (litt. ils traversèrent) ; les autres verbes sont au pluriel (litt. ils ne trouvèrent pas). Les versions anciennes présentent plusieurs variantes à cet égard ; certaines harmonisent en mettant tous les verbes au pluriel. –  la région montagneuse d''Ephraïm est située au nord du territoire de la tribu de Benjamin ; cf. 1.1n. –  pays de Shalisha (cf. Baal-Shalisha en 2R 4.42) et pays de Shaalim (peut-être identique à Shaalbim Jg 1.35) : régions non identifiées avec certitude. –  pays de Benjamin  : retour au point de départ. La recherche est d''autant plus longue et minutieuse qu''elle est infructueuse.'
  - type: text
    content: 'Il traversa la région montagneuse d''Ephraïm et traversa le pays de Shalisha sans les trouver ; il traversa le pays de Shaalim, et toujours rien ! Il traversa le pays de Benjamin sans les trouver. '
  '5':
  - type: note
    content: 'pays de Tsouph  : cf. Ramataïm-Tsophim et Tsouph en 1.1n. –  de penser  : sous-entendu en hébreu.'
  - type: text
    content: 'Ils étaient arrivés au pays de Tsouph, lorsque Saül dit à son serviteur qui était avec lui : Viens, retournons, de peur que mon père, cessant de penser aux ânesses, ne soit en peine de nous. '
  '6':
  - type: note
    content: 'cette ville  : peut-être Rama, la ville de Samuel, ou l''une des villes où il exerçait son activité itinérante de juge, cf. 7.15ss. –  homme de Dieu  : cf. 2.27n. –  tout ce qu''il dit arrive  : cf. 3.19s ; Jr 28.9 ; Za 1.6. –  nous indiquera-t-il le chemin  : cf. Jg 18.5 ; Jr 10.23 ; Ps 25.12.'
  - type: text
    content: 'Il lui répondit : Il y a justement dans cette ville un homme de Dieu, un homme considéré ; tout ce qu''il dit arrive. Allons-y maintenant ; peut-être nous indiquera-t-il le chemin que nous devons prendre. '
  '7':
  - type: note
    content: 'présent  : il s''agit d''une rétribution correcte offerte au prophète ; cf. Nb 22.7 ; Jg 6.18 ; 1R 14.3 ; 2R 5.5,15 ; 8.8.'
  - type: text
    content: 'Saül dit à son serviteur : Mais si nous y allons, qu''apporterons-nous à l''homme de Dieu ? Il n''y a plus de pain dans nos sacs, et nous n''avons aucun présent à offrir à l''homme de Dieu. Qu''est-ce que nous avons ? '
  '8':
  - type: note
    content: 'J''ai sur moi  : litt. il se trouve dans ma main  ; même expression en Gn 44.16s. –  le quart d''un sicle d''argent  : il ne s''agit pas d''une monnaie, mais d''un poids de métal (un peu plus de 2 g) ; voir mesures, poids et monnaies. Cf. Gn 23.15 ; Ex 21.32 ; Lv 27.3 ; Jos 7.21.'
  - type: text
    content: 'Le serviteur répondit à Saül : J''ai sur moi le quart d''un sicle d''argent ; je le donnerai à l''homme de Dieu, et il nous indiquera notre chemin. '
  '9':
  - type: note
    content: 'Ce v. constitue une remarque marginale visant à expliquer le terme hébreu désuet rendu par voyant au v. 11 ; certains pensent que le v. 9 serait mieux en place à la suite du v. 11. –  voyant  : cf. Es 30.10 ; 1Ch 9.22 ; 26.28 ; 29.29 ; voir prophète.'
  - type: text
    content: '– Autrefois, en Israël, l''homme qui allait consulter Dieu disait : Allons chez le voyant ! Car le prophète d''aujourd''hui, on l''appelait autrefois le voyant. – '
