document_id: PSA.45,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Poème pour le mariage du roi
  - type: text
    content: ' '
  - type: note
    content: 'Sur « Les lis »  : cf. 60.1 ; 69.1 ; 80.1 ; il s''agit ou bien du titre d''une mélodie connue, ou bien d''un instrument de musique (à six cordes, selon certains, d''après un rapprochement avec l''akkadien) ; cf. 8.1n  ; 9.1 ; 22.1n. –  Poème… 42.1n. –  Chant d''amour  : autres traductions chant des bien-aimées ; chant des amours  ; LXX pour le bien-aimé  ; ce psaume est probablement un épithalame chanté à l''occasion d''un mariage royal.'
  - type: text
    content: Du chef de chœur. Sur « Les lis ». Des fils de Coré. Poème. Chant d'amour.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Des filles de roi  : Syr la fille du roi  ; cf. Ct 6.8. –  parmi tes favorites  : traduction incertaine ; LXX a compris sont là en ton honneur  ; certains modifient le texte hébreu traditionnel pour lire viennent (ou vient ) à ta rencontre. –  la reine  : le terme ainsi traduit n''apparaît qu''ici et en Né 2.6 ; ici il pourrait désigner la reine-mère ; cf. 1R 2.19. –  or d''Ophir  : cf. 1R 9.28n  ; Es 13.12.'
  - type: text
    content: Des filles de roi sont parmi tes favorites ;
  - type: text
    content: la reine se tient à ta droite, parée d'or d'Ophir.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Gn 41.51 ; Rt 1.16. –  ta famille  : litt. la maison de ton père  ; cf. Gn 12.1n.'
  - type: text
    content: Ecoute, ma fille, regarde et tends l'oreille ;
  - type: text
    content: oublie ton peuple et ta famille.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ep 5.24 ; 1P 3.6.
  - type: text
    content: Le roi désire ta beauté ;
  - type: text
    content: puisqu'il est ton seigneur, prosterne-toi devant lui.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'fille de Tyr  : il s''agit vraisemblablement de la mariée à qui le poème s''adresse depuis le v. 11 ; cf. 1R 16.31 ; certains cependant comprennent la fille de Tyr (= Tyr, cf. Es 1.8n) et les plus riches bdu peuple (ou des peuples , Tg) chercheront ta faveur (litt. caresseront ta face cf. Jb 11.19n  ; Pr 19.6, voir aussi Ex 32.11+ ; le pronom étant au féminin : on cherche la faveur de l''épouse) ; cf. Ps 72.10ns ; 1R 10.24 ; Es 60.3ss.'
  - type: text
    content: Et, avec des présents, fille de Tyr,
  - type: text
    content: les plus riches du peuple chercheront ta faveur.
  '14':
  - type: text
    content: La fille du roi est toute glorieuse à l'intérieur du palais ;
  - type: text
    content: son vêtement est fait de broderies d'or.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'des jeunes filles  : litt. des vierges.'
  - type: text
    content: Elle est conduite au roi, vêtue de ses habits de couleurs.
  - type: text
    content: Derrière elle, des jeunes filles, ses amies, sont amenées auprès de toi ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: Ct 1.4.
  - type: text
    content: on les conduit dans la joie et l'allégresse ;
  - type: text
    content: elles entrent dans le palais du roi.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'dans tout le pays  : on pourrait aussi comprendre sur toute la terre  ; cf. 2.8ss ; voir aussi 2Ch 11.23.'
  - type: text
    content: Tes fils prendront la place de tes pères ;
  - type: text
    content: tu les installeras comme princes dans tout le pays.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'J''évoquerai ton nom  : cf. 79.13 ; 102.13 ; 145.7.'
  - type: text
    content: J'évoquerai ton nom de génération en génération,
  - type: text
    content: aussi les peuples te célébreront toujours, à jamais.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Mon cœur frémit  : cf. Jb 32.18-20. –  d''un message de bonheur  : on pourrait aussi comprendre de belles paroles. –  le stylet Jb 19.24n. –  un scribe habile  : même expression en Esd 7.6 pour scribe versé (dans la loi).'
  - type: text
    content: Mon cœur frémit d'un message de bonheur.
  - type: text
    content: 'Je dis : Mes œuvres sont pour un roi !'
  - type: text
    content: Que ma langue soit comme le stylet d'un scribe habile !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'beau  : cf. 50.2 ; Ez 28.12ss. –  êtres humains  : litt. fils de l''homme. –  la grâce… Ec 10.12 ; Lc 4.22. –  c''est pourquoi  : cf. v. 8. –  Dieu t''a béni… 21.7s.'
  - type: text
    content: Tu es le plus beau des êtres humains,
  - type: text
    content: 'la grâce est répandue sur tes lèvres :'
  - type: text
    content: c'est pourquoi Dieu t'a béni pour toujours.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.9 ; 21.9s,13 ; 110.2. –  Mets ton épée…  : litt. ceins ton épée sur la cuisse ou au côté . –  ton éclat… 21.6.'
  - type: text
    content: Mets ton épée à la ceinture, vaillant guerrier,
  - type: text
    content: ton éclat et ta magnificence,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Elance-toi  : autres traductions sois victorieux ; réussis . –  pour la cause… 72.4 ; Es 11.2ss. –  loyauté ou vérité. –  de l''humilité  : autre traduction des affligés  ; cf. 18.36n  ; So 2.3 ; Pr 15.33 ; 18.12 ; 22.4 ; autre traduction des humbles , c.-à-d. des pauvres ; cf. 9.13n. –  t''entraîne…  : texte obscur et traduction incertaine ; autre possibilité t''enseigne des coups redoutables  ; cf. 17.7+ ; 47.3+.'
  - type: text
    content: oui, ta magnificence ! Elance-toi, monte sur ton char,
  - type: text
    content: pour la cause de la loyauté, de l'humilité et de la justice !
  - type: text
    content: Que ta main droite t'entraîne dans des actions redoutables !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Tes flèches…  : cf. Es 5.28. –  elles pénétreront (sous-entendu dans le texte) …  : certains modifient le texte hébreu traditionnel pour lire les ennemis du roi perdront courage.'
  - type: text
    content: 'Tes flèches sont aiguës :'
  - type: text
    content: des peuples tomberont sous toi ;
  - type: text
    content: elles pénétreront dans le cœur des ennemis du roi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'ô Dieu  : ici (et peut-être au v. 8) cette interpellation semble s''adresser au roi ; il est toutefois possible de comprendre Dieu est ton trône pour toujours… ou ton trône est (comme celui) de Dieu, (il subsiste) pour toujours…  ; cf. 9.8+ ; 89.5 ; 93.2 ; voir aussi 2.7 ; 82.1,6s ; Ex 4.16 ; 2S 7.16 ; 14.17,20 ; Es 9.6 ; Za 12.8 ; 1Ch 29.23 ; Hé 1.8s. –  le sceptre 2.9+ ; 110.2.'
  - type: text
    content: Ton trône, ô Dieu, est pour toujours, à jamais ;
  - type: text
    content: le sceptre de ton règne est un sceptre de droiture.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Tu aimes la justice…  : cf. 5.7 ; 11.7 ; Es 61.8. –  Dieu (autre traduction ô Dieu  ; cf. v. 7n) , ton Dieu, t''a conféré une onction  : c''est le verbe dont vient le terme messie  ; cf. 2.2n  ; 89.21 ; voir aussi Jg 9.8 ; 1S 10.1 ; 15.17 ; 16.6-13 ; 2S 2.4 ; 5.3 ; 12.7 ; 1R 1.45 ; 19.15 ; 2R 9.6 ; 11.12 ; Es 61.1-3.'
  - type: text
    content: Tu aimes la justice et tu détestes la méchanceté.
  - type: text
    content: C'est pourquoi Dieu, ton Dieu, t'a conféré une onction
  - type: text
    content: d'huile de gaieté, de préférence à tes compagnons.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'myrrhe / aloès / casse  : il s''agit probablement des aromates de l''huile d''onction ; cf. 133.2 ; Ct 4.13ss. –  parfument  : sous-entendu dans le texte. –  palais d''ivoire 1R 22.39 ; Am 3.15 ; cf. 1R 10.18n. –  les instruments…  : cf. 150.4 ; 1S 16.16ss.'
  - type: text
    content: La myrrhe, l'aloès et la casse parfument tous tes vêtements ;
  - type: text
    content: depuis les palais d'ivoire,
  - type: text
    content: les instruments à cordes te réjouissent.
