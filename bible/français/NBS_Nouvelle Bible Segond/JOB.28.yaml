        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'La première partie du chapitre (v. 1-11) décrit le travail et les techniques des mineurs. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'argent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
