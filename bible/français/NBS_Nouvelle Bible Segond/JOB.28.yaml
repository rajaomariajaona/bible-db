      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe hébreu correspondant peut signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cacher, dissimuler '
      - type: usfm
