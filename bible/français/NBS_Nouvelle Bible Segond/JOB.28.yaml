      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'assombrir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 6.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 42.3 ; 1R 10.3/ /) ; c''est de lui que vient le terme traduit habituellement par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'perpétuel, pour toujours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: etc.
      marker-yv: yv-n
    - type: text
      text: Elle est soustraite aux regards de tout être vivant,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle est cachée aux oiseaux du ciel.
  '22':
  - type: usfm
    marker: q1
