        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1R 10.22.'
      marker-yv: yv-n
    - type: text
      text: Il y a bien un endroit pour extraire l'argent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et un lieu pour affiner l'or ;
  '10':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
