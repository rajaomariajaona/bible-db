document_id: JOB.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le mystère de la sagesse
  - type: text
    content: ' '
  - type: note
    content: 'La première partie du chapitre (v. 1-11) décrit le travail et les techniques des mineurs. –  argent / or  : cf. 1R 10.22.'
  - type: text
    content: Il y a bien un endroit pour extraire l'argent,
  - type: text
    content: et un lieu pour affiner l'or ;
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'tranchées  : ce mot désigne habituellement des fleuves , et plus spécialement le Nil (Gn 41.1n).'
  - type: text
    content: il ouvre des tranchées dans les rochers,
  - type: text
    content: et son œil voit tout ce qui est précieux ;
  '11':
  - type: text
    content: il arrête l'écoulement des eaux ;
  - type: text
    content: il amène à la lumière ce qui est caché.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'V. 20,28 ; 1R 3 ; cf. Ec 7.23s ; Baruch 3.15,31 : « Qui a trouvé la résidence de la Sagesse et qui est entré dans ses trésors ?… Il n''est personne qui en connaisse le chemin, personne même qui désire en suivre le sentier. »'
  - type: text
    content: Mais la sagesse, où se trouve-t-elle ?
  - type: text
    content: Où est donc le lieu de l'intelligence ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le prix  : LXX le chemin.'
  - type: text
    content: L'homme n'en connaît pas le prix ;
  - type: text
    content: elle ne se trouve pas sur la terre des vivants.
  '14':
  - type: text
    content: 'L''abîme dit : Elle n''est pas en moi.'
  - type: text
    content: 'Et la mer dit : Elle n''est pas chez moi.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Voir pur. –  l''acheter  : litt. (de) son prix  ; Pr 2.1-5 ; 3.13-15 ; cf. Sagesse 7.9 : « Je ne l''ai pas comparée (la Sagesse) à la pierre inestimable car tout l''or du monde, face à elle, ne serait qu''un peu de sable et l''argent, devant elle, paraîtrait de la boue. »'
  - type: text
    content: On ne peut l'obtenir contre de l'or pur,
  - type: text
    content: ni l'acheter pour un poids d'argent ;
  '16':
  - type: text
    content: ' '
  - type: note
    content: or d'Ophir 22.24+.
  - type: text
    content: on ne la met pas dans la balance avec l'or d'Ophir,
  - type: text
    content: ni avec le précieux onyx, ni avec le lapis-lazuli ;
  '17':
  - type: text
    content: ni l'or ni le verre ne peuvent lui être comparés,
  - type: text
    content: on ne peut l'échanger contre un vase d'or fin.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Le corail  : le terme correspondant n''apparaît qu''ici ; sur le terme traduit par coraux au vers suivant, voir Pr 3.15n. –  posséder  : le mot hébreu ainsi traduit, très rare, pourrait désigner le sac où l''on recueille de l''argent ou un trésor (cf. Ps 126.6n).'
  - type: text
    content: Le corail et le cristal ne peuvent même pas être évoqués ;
  - type: text
    content: posséder la sagesse vaut plus que les coraux.
  '19':
  - type: text
    content: ' '
  - type: note
    content: de Koush ou de Nubie , cf. Gn 2.13n.
  - type: text
    content: La topaze de Koush ne peut lui être comparée,
  - type: text
    content: et on ne la met pas dans la balance avec l'or pur.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'fer / bronze  : cf. Dt 8.9.'
  - type: text
    content: le fer est tiré de la poussière,
  - type: text
    content: et la pierre fondue produit le bronze.
  '20':
  - type: text
    content: ' '
  - type: note
    content: V. 12+.
  - type: text
    content: Mais la sagesse, d'où vient-elle ?
  - type: text
    content: Où est donc le lieu de l'intelligence ?
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'soustraite  : le verbe hébreu correspondant peut signifier cacher, dissimuler (cf. le synonyme employé dans le vers parallèle) ou assombrir (cf. 6.16n  ; 42.3 ; 1R 10.3/ /) ; c''est de lui que vient le terme traduit habituellement par perpétuel, pour toujours etc.'
  - type: text
    content: Elle est soustraite aux regards de tout être vivant,
  - type: text
    content: elle est cachée aux oiseaux du ciel.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'monde des disparus 26.6n. –  la mort 18.13n. –  Nous en avons entendu parler  : litt. dans (ou par ) nos oreilles nous avons entendu sa rumeur (le verbe et son complément sont apparentés).'
  - type: text
    content: 'Le monde des disparus et la mort disent :'
  - type: text
    content: « Nous en avons entendu parler ! »
  '23':
  - type: text
    content: C'est Dieu qui en comprend le chemin,
  - type: text
    content: c'est lui qui en connaît le lieu ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'tout sous le ciel  : litt. sous tout le ciel (cf. Dn 9.12+).'
  - type: text
    content: car c'est lui qui regarde jusqu'aux extrémités de la terre ;
  - type: text
    content: il voit tout sous le ciel.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 36.27s ; 38.28 ; Es 40.12-14.
  - type: text
    content: Quand il détermina le poids du vent
  - type: text
    content: et qu'il fixa la mesure des eaux,
  '26':
  - type: text
    content: quand il donna une prescription à la pluie,
  - type: text
    content: une route à l'éclair et aux coups de tonnerre,
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'il la vit  : c.-à-d. la sagesse. –  la conta (c.-à-d. la fit connaître , cf. Ex 9.16) : autre traduction la compta (c.-à-d. l''évalua ). Cf. Pr 8.22-31 ; Siracide 1.9 : « Le Seigneur lui-même l''a créée, il l''a vue et mesurée, il l''a répandue sur toutes ses œuvres. » –  l''examina à fond v. 3n.'
  - type: text
    content: alors il la vit et la conta,
  - type: text
    content: il en posa les fondements et l'examina à fond.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'il dit à l''être humain  : cf. 11.6+. –  crainte du Seigneur 1.1,8 ; 2.3 ; Ps 111.10 ; Pr 1.7 ; 9.10 ; cf. Dt 29.28 ; Baruch 3.32,37 : « Celui qui sait toutes choses la connaît, il l''a découverte par son intelligence… Il a découvert tout le chemin qui mène à la science et l''a indiqué à Jacob, son serviteur, et à Israël, son bien-aimé. »'
  - type: text
    content: 'Puis il dit à l''être humain :'
  - type: text
    content: « La crainte du Seigneur, voilà la sagesse !
  - type: text
    content: S'écarter du mal, c'est là l'intelligence ! »
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'On met  : litt. il met , probablement l''homme. –  ténèbres / ombre de mort 3.5n. –  explore  : le même verbe est traduit par examiner à fond au v. 27 ; cf. 5.27n'
  - type: text
    content: On met fin aux ténèbres ;
  - type: text
    content: on explore, jusque dans les endroits les plus profonds,
  - type: text
    content: les pierres cachées dans l'obscurité et dans l'ombre de mort.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Verset difficile : litt. on pratique (le verbe peut signifier ouvrir une brèche, faire éclater ) un ravin ( une galerie ? le même mot est traduit par oued en 6.15n) loin de celui qui séjourne (le verbe correspondant est apparenté au substantif habituellement rendu par immigré , cf. Ex 12.48n) ; oubliés du pied, ils sont suspendus, balancés loin de l''homme.'
  - type: text
    content: On creuse un ravin loin des lieux habités ;
  - type: text
    content: le pied ne leur vient plus en aide,
  - type: text
    content: ils sont suspendus, balancés loin des hommes.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'terre / pain Ps 104.14s. –  dans ses profondeurs  : litt. sous elle . –  retournée  : cf. 12.15n. –  comme par un feu  : litt. comme un feu.'
  - type: text
    content: La terre d'où provient le pain
  - type: text
    content: est, dans ses profondeurs, retournée comme par un feu.
  '6':
  - type: text
    content: ' '
  - type: note
    content: lapis-lazuli v. 16 ; cf. Ex 24.10n.
  - type: text
    content: Ses pierres sont le lieu du lapis-lazuli,
  - type: text
    content: c'est là qu'est la poudre d'or.
  '7':
  - type: text
    content: L'oiseau de proie n'en connaît pas le sentier,
  - type: text
    content: 'l''œil du faucon ne l''a pas vu :'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'plus fiers animaux  : litt. fils de l''orgueil , de même en 41.26.'
  - type: text
    content: les plus fiers animaux ne l'ont pas foulé,
  - type: text
    content: le lion n'y est jamais passé.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'L''homme…  : litt. il… –  granit  : cf. Dt 8.15n.'
  - type: text
    content: L'homme porte sa main sur le granit ;
  - type: text
    content: il renverse les montagnes depuis la racine ;
