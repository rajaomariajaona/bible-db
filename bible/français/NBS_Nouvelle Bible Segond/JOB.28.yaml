        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: posséder
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le mot hébreu ainsi traduit, très rare, pourrait désigner le sac où l''on recueille de l''argent ou un trésor (cf. Ps 126.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Le corail et le cristal ne peuvent même pas être évoqués ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: posséder la sagesse vaut plus que les coraux.
  '19':
  - type: usfm
    marker: q1
    children:
    - type: usfm
