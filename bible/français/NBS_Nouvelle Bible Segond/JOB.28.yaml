          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: La topaze de Koush ne peut lui être comparée,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et on ne la met pas dans la balance avec l'or pur.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: bronze
      - type: usfm
