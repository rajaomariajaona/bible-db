    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tranchées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ce mot désigne habituellement des '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fleuves
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', et plus spécialement le Nil (Gn 41.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: il ouvre des tranchées dans les rochers,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et son œil voit tout ce qui est précieux ;
  '11':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: il arrête l'écoulement des eaux ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il amène à la lumière ce qui est caché.
  '12':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 20,28 ; 1R 3 ; cf. Ec 7.23s ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Baruch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.15,31 : « Qui a trouvé la résidence de la Sagesse et qui est entré dans ses trésors ?… Il n''est personne qui en connaisse le chemin, personne même qui désire en suivre le sentier. »'
      marker-yv: yv-n
    - type: text
      text: Mais la sagesse, où se trouve-t-elle ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Où est donc le lieu de l'intelligence ?
  '13':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le prix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le chemin.
      marker-yv: yv-n
    - type: text
      text: L'homme n'en connaît pas le prix ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elle ne se trouve pas sur la terre des vivants.
  '14':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: text
      text: 'L''abîme dit : Elle n''est pas en moi.'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Et la mer dit : Elle n''est pas chez moi.'
  '15':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'acheter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (de) son prix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; Pr 2.1-5 ; 3.13-15 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.9 : « Je ne l''ai pas comparée (la Sagesse) à la pierre inestimable car tout l''or du monde, face à elle, ne serait qu''un peu de sable et l''argent, devant elle, paraîtrait de la boue. »'
      marker-yv: yv-n
    - type: text
      text: On ne peut l'obtenir contre de l'or pur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni l'acheter pour un poids d'argent ;
  '16':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'or d''Ophir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 22.24+.
      marker-yv: yv-n
    - type: text
      text: on ne la met pas dans la balance avec l'or d'Ophir,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ni avec le précieux onyx, ni avec le lapis-lazuli ;
  '17':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: ni l'or ni le verre ne peuvent lui être comparés,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: on ne peut l'échanger contre un vase d'or fin.
  '18':
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le corail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme correspondant n''apparaît qu''ici ; sur le terme traduit par '
