      - type: text
        text: '35.15ss : « Le Seigneur est un juge et il n''y a pas en lui considération de personne. Il n''a pas de partialité contre le pauvre, il exauce la prière de celui qu''on traite injustement. Jamais il ne dédaigne la supplication de l''orphelin, ni la veuve quand elle épanche sa plainte. Est-ce que les larmes de la veuve ne descendent pas sur sa joue et son cri n''accuse-t-il pas celui qui les provoque ? (…) La prière de l''humble traverse les nues et il ne se console pas tant qu''elle n''a pas atteint son but, il n''a de cesse que le Très-Haut ne soit intervenu, qu''il n''ait fait droit aux justes et rendu justice. Le Seigneur ne tardera pas, il n''aura pas de patience avec eux jusqu''à ce qu''il ait brisé les reins des hommes sans pitié. »'
    marker-yv: yv-n
  - type: text
    text: 'Et Dieu ne ferait pas justice à ceux qu''il a choisis, alors qu''ils crient vers lui jour et nuit ? Il les ferait attendre ? '
