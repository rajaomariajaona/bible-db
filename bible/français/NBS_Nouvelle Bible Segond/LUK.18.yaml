        text: bien vite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 9.27 ; 17.22ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'quand le '
      - type: usfm
