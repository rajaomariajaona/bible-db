  - type: text
    text: 'Le pharisien, debout, priait ainsi en lui-même : « O Dieu, je te rends grâce de ce que je ne suis pas comme le reste des hommes, qui sont rapaces, injustes, adultères, ou encore comme ce collecteur des taxes : '
