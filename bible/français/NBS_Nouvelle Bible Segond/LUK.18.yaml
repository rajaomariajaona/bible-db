document_id: LUK.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La parabole du juge et de la veuve
  - type: text
    content: ' '
  - type: note
    content: parabole 5.36+ ; cf. 11.5ss. –  toujours prier 3.21+ ; 21.36 ; 22.41 ; Ac 12.5 ; Rm 1.10 ; 12.12 ; Ep 6.18 ; Ph 1.4 ; Col 1.3 ; 4.2 ; 1Th 1.2 ; 5.17 ; 2Th 1.11 ; Phm 4. –  sans se lasser 2Co 4.1,16 ; Ga 6.9 ; Ep 3.13 ; 2Th 3.13.
  - type: text
    content: 'Il leur disait une parabole, pour montrer qu''il faut toujours prier, sans se lasser. '
  '10':
  - type: note
    content: 'montèrent (2.42+) au temple pour prier  : cf. 1.9s ; 9.28 ; Ac 3.1 ; voir aussi Ps 122.1. –  pharisien 5.17+. –  collecteur des taxes 3.12+ ; 19.2ss ; Mc 2.15n.'
  - type: text
    content: 'Deux hommes montèrent au temple pour prier ; l''un était pharisien, et l''autre collecteur des taxes. '
  '11':
  - type: note
    content: 'debout  : c''était l''attitude normale de la prière ; dans d''autres contextes, cf. 19.8 ; Ac 2.14 ; 5.20 ; 17.22 ; 27.21. –  en lui-même  : autre traduction, appuyée par certains mss à propos de lui-même  ; cf. 2Co 2.17. –  je te rends grâce Jn 11.41 ; Ac 27.35 ; 28.15 ; cf. Hymnes (Qumrân) 7.34 : « Je te rends grâces, ô Adonaï [Seigneur] ! Car tu n''as pas fait tomber mon lot dans la congrégation de vanité, et dans l''assemblée des hypocrites tu n''as pas placé mon décret. » –  je ne suis pas…  : cf. Ga 1.14 ; 2.15 ; Ph 3.4ss. –  qui sont… Rm 1.29+. –  injustes ou malhonnêtes, trompeurs  : cf. v. 9 ; 16.8n.'
  - type: text
    content: 'Le pharisien, debout, priait ainsi en lui-même : « O Dieu, je te rends grâce de ce que je ne suis pas comme le reste des hommes, qui sont rapaces, injustes, adultères, ou encore comme ce collecteur des taxes : '
  '12':
  - type: note
    content: je jeûne… 5.33+,35n. –  la dîme de tous mes revenus (litt. de tout ce que j'acquiers) 11.42n.
  - type: text
    content: 'je jeûne deux fois la semaine, je donne la dîme de tous mes revenus. » '
  '13':
  - type: note
    content: 'lever les yeux Ps 121.1 ; 123.1 ; Dn 4.31 ; Mc 6.41/ / ; Jn 6.5 ; 11.41 ; cf. 1 Hénoch 103.5 : « Eux-mêmes (les anges déchus) ne pouvaient plus parler, ni même lever les yeux au ciel, tant ils avaient honte de leur péché et de leur condamnation. » –  se frappait la poitrine 23.48. –  prends en pitié  : litt. sois apaisé envers  ; le verbe correspondant est traduit par faire l''expiation Hé 2.17n  ; en 2R 5.18 LXX l''emploie pour rendre le verbe hébreu traduit par pardonner  ; voir aussi Ps 25.11 ; 51.3 ; 79.9 ; Dn 9.19. –  pécheur 1Tm 1.15.'
  - type: text
    content: 'Le collecteur des taxes, lui, se tenait à distance ; il n''osait même pas lever les yeux au ciel, mais il se frappait la poitrine et disait : « O Dieu, prends en pitié le pécheur que je suis ! » '
  '14':
  - type: note
    content: 'je vous le dis v. 8+. –  chez lui  : litt. dans sa maison. –  justifié 7.29+ ; cf. Ph 3.9. –  plutôt que celui-là  : autre traduction plus que celui-là (tournure analogue pour un comparatif en 13.2,4) ; cf. Mt 21.31. –  quiconque… 14.11+.'
  - type: text
    content: Eh bien, je vous le dis, c'est celui-ci qui redescendit chez lui justifié, plutôt que celui-là. Car quiconque s'élève sera abaissé, mais celui qui s'abaisse sera élevé.
  - type: heading
    content: Jésus et les enfants
  - type: heading
    content: Mt 19.13-15  ; Mc 10.13-16
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'nouveau-nés 1.41n. –  qu''il les touche de la main  : litt. qu''il les touche 5.13 ; 6.19. –  les rabrouaient v. 39 ; 4.35n.'
  - type: text
    content: 'Des gens lui apportaient même les nouveau-nés pour qu''il les touche de la main. Les disciples, en voyant cela, les rabrouaient. '
  '16':
  - type: note
    content: 'ordonna qu''on les lui apporte  : litt. les fit appeler (selon le texte le plus probable, il ne peut s''agir que des nouveau-nés). –  enfants ou petits enfants, de même v. 17 (cf. Mc 7.27n). –  ne les en empêchez pas ou n''essayez pas de les en empêcher  ; même verbe 6.29 ; 9.49s ; 11.52 ; 23.2 ; Ac 8.36 ; 10.47n  ; 16.6 ; 24.23 ; 27.43. –  le royaume ou le règne de Dieu… 4.43+ ; 6.20.'
  - type: text
    content: 'Mais Jésus ordonna qu''on les lui apporte et dit : Laissez les enfants venir à moi ; ne les en empêchez pas, car le royaume de Dieu est pour ceux qui sont comme eux. '
  '17':
  - type: note
    content: 'Cf. 7.32 ; 9.47s ; 10.21 ; Mt 18.3/ /. –  Amen 4.24+ ; cf. Mt 5.18n. –  n''accueillera pas le royaume  : cf. 17.21. –  n''y entrera jamais ou n''y entrera même pas, n''y entrera en aucun cas  ; v. 24s ; cf. 13.24 ; Mt 5.20 ; Jn 3.5 ; Ac 14.22.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, quiconque n''accueillera pas le royaume de Dieu comme un enfant n''y entrera jamais.'
  - type: heading
    content: Jésus et le riche
  - type: heading
    content: Mt 19.16-30  ; Mc 10.17-31
  '18':
  - type: text
    content: ' '
  - type: note
    content: Cf. 10.25nss. –  Un chef 8.41 ; 12.58 ; 14.1 ; 23.13,35 ; 24.20 ; le même mot a été traduit par prince en 11.15. –  maître 3.12n. –  vie éternelle v. 30.
  - type: text
    content: 'Un chef lui demanda : Bon maître, que dois-je faire pour hériter la vie éternelle ? '
  '19':
  - type: note
    content: Comparer avec 6.45 ; 11.13 ; Mc 10.18n.
  - type: text
    content: 'Jésus lui dit : Pourquoi me dis-tu bon ? Personne n''est bon, sinon Dieu seul. '
  '2':
  - type: note
    content: 'Voir crainte. –  personne  : litt. (aucun) humain.'
  - type: text
    content: 'Il dit : Il y avait dans une ville un juge qui ne craignait pas Dieu et qui n''avait d''égard pour personne. '
  '20':
  - type: note
    content: Ex 20.12-16 ; Dt 5.16-20  ; Rm 13.9 ; voir aussi loi.
  - type: text
    content: 'Tu connais les commandements : '
  - type: text
    content: Ne commets pas d'adultère ; ne commets pas de meurtre ; ne commets pas de vol ; ne fais pas de faux témoignage ; honore ton père et ta mère
  - type: text
    content: '. '
  '21':
  - type: note
    content: Cf. Ac 26.4.
  - type: text
    content: 'J''ai observé tout cela depuis le plus jeune âge, répondit-il. '
  '22':
  - type: note
    content: 'Cf. 5.11,28 ; 14.33. –  manque  : autre verbe grec qu''en Mc 10.21 ; on le retrouve dans ce sens en Tt 3.13. –  trésor dans les cieux 12.33+ ; 16.9.'
  - type: text
    content: 'Jésus, l''ayant entendu, lui dit : Il te manque encore une seule chose : vends tout ce que tu as, distribue-le aux pauvres, et tu auras un trésor dans les cieux. Puis viens et suis-moi. '
  '23':
  - type: note
    content: 'Un ajout dans un texte d''Origène attribue à un « Evangile selon les hébreux » (voir Evangile des nazaréens) le développement suivant : « Le riche se mit alors à se gratter la tête ; cela ne lui plaisait pas. Et le Seigneur lui dit : “Comment peux-tu dire : ‘J''ai pratiqué la Loi et les Prophètes’ ? alors qu''il est écrit dans la Loi : ‘Tu aimeras ton prochain comme toi-même’, voici qu''un grand nombre de tes frères, fils d''Abraham, sont couverts d''ordures, mourant de faim, tandis que ta demeure regorge de biens et qu''il n''en sort absolument rien pour eux !” Et il ajouta, en se tournant vers son disciple Simon qui était assis à côté de lui : “Simon, fils de Jonas, il est plus facile à un chameau de passer par le chas d''une aiguille qu''à un riche d''entrer dans le royaume des cieux.” »'
  - type: text
    content: Lorsqu'il entendit cela, il fut très triste, car il était fort riche.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'En le voyant si triste  : certains mss portent seulement en le voyant . –  entrer dans le royaume de Dieu v. 17+ ; 6.20,24.'
  - type: text
    content: 'En le voyant si triste, Jésus dit : Qu''il est difficile à ceux qui ont des biens d''entrer dans le royaume de Dieu ! '
  '25':
  - type: note
    content: 'Cf. 13.24 ; voir aussi Mt 23.24. –  aiguille à coudre  : Lc emploie un terme différent de celui qui apparaît en Mt 19.24 ; Mc 10.25.'
  - type: text
    content: 'Il est plus facile, en effet, à un chameau de passer par un trou d''aiguille à coudre qu''à un riche d''entrer dans le royaume de Dieu. '
  '26':
  - type: note
    content: Cf. 13.23.
  - type: text
    content: 'Ceux qui l''écoutaient dirent : Alors, qui peut être sauvé ? '
  '27':
  - type: note
    content: 1.37+ ; Gn 18.14.
  - type: text
    content: 'Il répondit : Ce qui est impossible pour les humains est possible pour Dieu.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: Pierre 5.8+. –  quitté… 5.11,28 ; cf. Ac 4.32.
  - type: text
    content: 'Pierre dit : Nous, nous avons quitté ce qui nous appartenait pour te suivre. '
  '29':
  - type: note
    content: 14.26n. –  Amen… 4.24n.
  - type: text
    content: 'Il leur dit : '
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, il n''est personne qui, ayant quitté, à cause du règne de Dieu, maison, femme, frères, parents ou enfants, '
  '3':
  - type: note
    content: 'veuve 2.37+ ; 20.47 ; Ex 22.21ss ; Dt 10.18 ; 24.17 ; Es 54.4 ; Ml 3.5 ; Ps 68.6 ; Rt 1.20s ; Lm 1.1 ; Jc 1.27. –  Rends-moi justice  : dans d''autres contextes, le même verbe pourrait signifier venge-moi  ; terme apparenté v. 7s ; cf. Rm 12.19 ; Ap 6.10 ; 19.2. –  contre mon adversaire  : autres traductions et délivre-moi de mon adversaire ; donne-moi raison contre mon adversaire.'
  - type: text
    content: 'Il y avait aussi dans cette ville une veuve qui venait lui dire : « Rends-moi justice contre mon adversaire ! » '
  '30':
  - type: note
    content: 'beaucoup plus  : certains mss portent sept fois plus, d''autres cent fois plus. –  le monde qui vient  : cf. 16.8 ; 20.34s ; Mt 12.32n  ; Mc 10.30. –  vie éternelle v. 18+.'
  - type: text
    content: ne reçoive beaucoup plus dans ce temps-ci et, dans le monde qui vient, la vie éternelle.
  - type: heading
    content: Jésus annonce encore sa mort et sa résurrection
  - type: heading
    content: Mt 20.17-19  ; Mc 10.32-34
  '31':
  - type: text
    content: ' '
  - type: note
    content: '9.22,44 ; 12.50 ; 13.32s ; 17.25. –  Il prit… 9.10+. –  les Douze 6.13 ; 8.1+. –  Nous montons à Jérusalem v. 10 ; 2.4n,42+ ; 9.51+. –  écrit 4.17+. –  par l''entremise des prophètes  : cf. 24.25ss,45s ; Ac 2.23 ; 3.18 ; 13.27ss ; 17.3 ; 26.22s. –  au sujet du Fils de l''homme 5.24+ ; 9.22 ; cf. Jn 5.39 ; autre traduction possible, quoique moins probable  : tout ce qui a été écrit par l''entremise des prophètes s''accomplira sur le Fils de l''homme . –  s''accomplira  : litt. sera accompli  ; cf. 12.50 ; 13.32 ; 22.37 ; Ac 2.23 ; 13.29 ; voir aussi Jn 19.28,30 ; Ap 17.17.'
  - type: text
    content: 'Il prit les Douze auprès de lui et leur dit : Nous montons à Jérusalem ; tout ce qui a été écrit par l''entremise des prophètes au sujet du Fils de l''homme s''accomplira. '
  '32':
  - type: note
    content: 9.22+. –  livré aux non-Juifs (ou aux nations) 20.20. –  on se moquera ou ils se moqueront  ; même possibilité dans la suite ; 22.63 ; 23.11,36. –  on le maltraitera ou on l'insultera  ; même verbe en Ac 14.5.
  - type: text
    content: 'Car il sera livré aux non-Juifs ; on se moquera de lui, on le maltraitera, on lui crachera dessus, '
  '33':
  - type: note
    content: 'Cf. Es 50.6. –  le troisième jour 9.22+. –  il se relèvera  : cf. 1Th 1.10 ; 4.14 ; voir résurrection.'
  - type: text
    content: 'on le fouettera, puis on le tuera ; et le troisième jour il se relèvera. '
  '34':
  - type: note
    content: 'Cf. 2.50 ; 9.45 ; 24.13-35. –  le sens de  : sous-entendu dans le texte. –  ils ne savaient pas…  : litt. ils ne connaissaient pas ce qui était dit.'
  - type: text
    content: Mais ils n'y comprirent rien ; le sens de cette parole leur restait caché ; ils ne savaient pas ce que cela voulait dire.
  - type: heading
    content: Jésus guérit un aveugle à Jéricho
  - type: heading
    content: Mt 20.29-34  ; Mc 10.46-52
  '35':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 9.27ss. –  Jéricho 10.30n  ; cf. 19.1ss,11.
  - type: text
    content: 'Comme il approchait de Jéricho, un aveugle était assis au bord du chemin et mendiait. '
  '36':
  - type: note
    content: Cf. 15.26.
  - type: text
    content: 'Il entendit une foule en mouvement et demanda ce qui arrivait. '
  '37':
  - type: note
    content: 'Cf. 4.14,37 ; 5.17. –  Nazoréen  : comparer avec 4.34 ; 24.19 ; cf. Mt 2.23n  ; Ac 2.22+.'
  - type: text
    content: 'On lui répondit : C''est Jésus le Nazoréen qui passe ! '
  '38':
  - type: note
    content: Fils de David 1.27,32 ; 2.4 ; 20.41ss. –  aie compassion 16.24+.
  - type: text
    content: 'Il s''écria : Jésus, Fils de David, aie compassion de moi ! '
  '39':
  - type: note
    content: rabrouaient v. 15+.
  - type: text
    content: 'Ceux qui marchaient en avant le rabrouaient pour le faire taire, mais il criait d''autant plus : Fils de David, aie compassion de moi ! '
  '4':
  - type: note
    content: 'longtemps  : autre traduction un certain temps. –  il se dit 12.17+ ; 16.3.'
  - type: text
    content: 'Pendant longtemps il ne voulut pas. Mais ensuite il se dit : « Bien que je ne craigne pas Dieu et que je n''aie d''égard pour personne, '
  '40':
  - type: text
    content: 'Jésus s''arrêta et ordonna qu''on le lui amène ; quand il se fut approché, il lui demanda : '
  '41':
  - type: note
    content: Que veux-tu… Mc 10.36. –  Seigneur 5.8+.
  - type: text
    content: 'Que veux-tu que je fasse pour toi ? Il répondit : Seigneur, que je retrouve la vue ! '
  '42':
  - type: note
    content: Retrouve la vue Ac 9.17s. –  ta foi t'a sauvé 7.50+.
  - type: text
    content: 'Jésus lui dit : Retrouve la vue ; ta foi t''a sauvé. '
  '43':
  - type: note
    content: A l'instant même 1.64+. –  glorifiant Dieu 2.20+. –  Tout le peuple 1.10+ ; 7.29 ; 19.47s ; 20.6,45 ; 21.38 ; 24.19 ; Ac 3.9,11 ; 4.10 ; 5.34 ; 10.41 ; 13.24. –  louer Dieu 2.13,20 ; 19.37.
  - type: text
    content: A l'instant même il retrouva la vue et se mit à le suivre en glorifiant Dieu. Tout le peuple, en voyant cela, se mit à louer Dieu.
  '5':
  - type: note
    content: 'Cf. 11.7s. –  de peur que…  : autre traduction, moins probable, sans quoi elle finira par me frapper  ; le verbe correspondant n''apparaît qu''ici et en 1Co 9.27n (malmener).'
  - type: text
    content: 'néanmoins, parce que cette veuve m''importune, je vais lui rendre justice, de peur que jusqu''à la fin elle ne vienne me casser la tête. » '
  '6':
  - type: note
    content: 'Le Seigneur 7.13+. –  Entendez  : autre traduction écoutez. –  injuste 16.8n.'
  - type: text
    content: 'Le Seigneur ajouta : Entendez ce que dit le juge injuste. '
  '7':
  - type: note
    content: 'ne ferait pas justice ou ne vengerait pas  ; cf. v. 3n  ; 21.22. –  ceux qu''il a choisis ou ses élus  ; cf. Mc 13.20,22,27 ; voir aussi Es 42.1 ; 43.20 ; 65.9,15,23 ; Ps 105.6,43. –  jour et nuit  : cf. v. 1 ; 2.37+ ; Ps 22.3. –  Il les ferait attendre ? traduction incertaine ; autres possibilités les fera-t-il attendre longtemps (ou inutilement)  ? ou même s''il les fait attendre ; tandis qu''il les fait attendre ; alors qu''il est patient à leur égard  ; cf. Za 1.12 ; Ps 44.23ss ; 2P 3.9 ; Ap 6.9ss ; Siracide 35.15ss : « Le Seigneur est un juge et il n''y a pas en lui considération de personne. Il n''a pas de partialité contre le pauvre, il exauce la prière de celui qu''on traite injustement. Jamais il ne dédaigne la supplication de l''orphelin, ni la veuve quand elle épanche sa plainte. Est-ce que les larmes de la veuve ne descendent pas sur sa joue et son cri n''accuse-t-il pas celui qui les provoque ? (…) La prière de l''humble traverse les nues et il ne se console pas tant qu''elle n''a pas atteint son but, il n''a de cesse que le Très-Haut ne soit intervenu, qu''il n''ait fait droit aux justes et rendu justice. Le Seigneur ne tardera pas, il n''aura pas de patience avec eux jusqu''à ce qu''il ait brisé les reins des hommes sans pitié. »'
  - type: text
    content: 'Et Dieu ne ferait pas justice à ceux qu''il a choisis, alors qu''ils crient vers lui jour et nuit ? Il les ferait attendre ? '
  '8':
  - type: note
    content: 'Je vous le dis v. 14 ; 11.8+. –  bien vite  : cf. 9.27 ; 17.22ss. –  quand le Fils de l''homme (5.24+) viendra  : cf. 17.20,30. –  trouvera-t-il…  : cf. 7.9/ / ; voir aussi 12.35,40,43,46 ; Mt 24.10ss ; 2Th 2.3 ; 2Tm 4.7.'
  - type: text
    content: Je vous le dis, il leur fera justice bien vite. Mais quand le Fils de l'homme viendra, trouvera-t-il la foi sur la terre ?
  - type: heading
    content: La parabole du pharisien et du collecteur des taxes
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Pour certains ou, peut-être, contre certains  ; cf. 20.19. –  qui étaient persuadés…  : litt. qui s''étaient persuadés, quant à eux-mêmes, qu''ils étaient justes  ; cf. v. 11 ; 5.32 ; 10.29+ ; 15.7 ; 16.14s ; voir aussi Ez 33.13 ; Rm 10.3. –  parabole 5.36+ ; cf. 10.30ss.'
  - type: text
    content: 'Pour certains, qui étaient persuadés d''être des justes et qui méprisaient les autres, il dit encore cette parabole : '
