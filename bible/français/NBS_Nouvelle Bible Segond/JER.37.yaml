document_id: JER.37,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le roi Sédécias fait consulter Jérémie
  - type: text
    content: ' '
  - type: note
    content: Sédécias 1.3n  ; 2R 24.17 ; 2Ch 36.10. –  Konia 22.24n. –  Nabuchodonosor 21.2n.
  - type: text
    content: 'Le roi Sédécias, fils de Josias, devint roi à la place de Konia, fils de Joïaqim ; Nabuchodonosor, roi de Babylone, l''investit de la royauté sur le pays de Juda. '
  '10':
  - type: note
    content: 'Cf. Lc 19.40. –  des hommes transpercés  : on peut comprendre des blessés ou des morts.'
  - type: text
    content: Même si vous battiez toute l'armée des Chaldéens qui vous font la guerre, s'il ne restait d'eux que des hommes transpercés, chacun d'eux se relèverait dans sa tente pour mettre le feu à cette ville.
  - type: heading
    content: Jérémie accusé de trahison
  '11':
  - type: text
    content: 'Pendant que l''armée des Chaldéens s''était éloignée de Jérusalem à cause de l''armée du pharaon, '
  '12':
  - type: note
    content: 'pour y recevoir (à Anatoth, en Benjamin) sa part…  : texte et traduction incertains ; on a aussi compris pour s''échapper de là (Jérusalem), du milieu du peuple, pour prendre sa part au milieu du peuple ou bien afin d''y régler un partage au milieu des siens  ; cf. 32.7ss. –  de son peuple  : litt. du peuple.'
  - type: text
    content: 'Jérémie voulut sortir de Jérusalem pour aller au pays de Benjamin et pour y recevoir sa part d''héritage au milieu de son peuple. '
  '13':
  - type: note
    content: porte de Benjamin 38.7.
  - type: text
    content: 'Lorsqu''il fut à la porte de Benjamin, le commandant de la garde, nommé Yiriya, fils de Shélémia, fils de Hanania, se trouvait là ; il arrêta Jérémie, le prophète, en disant : Tu te rends aux Chaldéens ! '
  '14':
  - type: text
    content: 'Jérémie répondit : C''est faux ! Je ne me rends pas aux Chaldéens ! Mais Yiriya ne l''écouta pas ; il arrêta Jérémie et le conduisit aux princes. '
  '15':
  - type: text
    content: 'Les princes, irrités contre Jérémie, le frappèrent et l''incarcérèrent dans la maison de Jonathan, le scribe ; car ils en avaient fait une maison de détention. '
  '16':
  - type: note
    content: 'au cachot, dans une cellule…  : litt. dans la maison de la fosse (ou citerne, comme en 38.6ss), dans la pièce voûtée  ; cf. Ex 12.29.'
  - type: text
    content: C'est ainsi que Jérémie entra au cachot, dans une cellule ; Jérémie y resta longtemps.
  - type: heading
    content: Sédécias consulte secrètement Jérémie
  '17':
  - type: text
    content: ' '
  - type: note
    content: Cf. 38.14.
  - type: text
    content: 'Le roi Sédécias l''envoya chercher ; chez lui, le roi l''interrogea secrètement : Y a-t-il une parole de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ? Jérémie répondit : Oui ! Et il dit : Tu seras livré au roi de Babylone. '
  '18':
  - type: note
    content: 'En quoi ai-je péché contre toi  : même expression en Gn 20.9.'
  - type: text
    content: 'Jérémie dit encore au roi Sédécias : En quoi ai-je péché contre toi, contre les gens de ta cour et contre ce peuple, pour que vous m''ayez mis dans cette maison de détention ? '
  '19':
  - type: note
    content: Voir prophète.
  - type: text
    content: 'Et où sont vos prophètes qui vous annonçaient : Le roi de Babylone ne viendra pas contre vous ni contre ce pays ! '
  '2':
  - type: note
    content: le peuple du pays 1.18n. –  n'écoutèrent… 7.13+,26+ ; cf. 2Ch 36.12.
  - type: text
    content: 'Ni lui, ni les gens de sa cour, ni le peuple du pays n''écoutèrent les paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononça par l''intermédiaire de Jérémie, le prophète.'
  '20':
  - type: note
    content: Que ma supplication parvienne 36.7n  ; cf. 38.26.
  - type: text
    content: 'Maintenant, ô roi, mon seigneur, entends, je te prie ! Que ma supplication parvienne devant toi ! Ne me fais pas retourner dans la maison de Jonathan, le scribe, de peur que je n''y meure ! '
  '21':
  - type: note
    content: 'pain  : cf. 38.9 ; voir Ex 29.23n. –  dans la cour de la garde 33.1 ; 38.6,13,28 ; voir aussi 32.2+.'
  - type: text
    content: Le roi Sédécias ordonna que Jérémie soit détenu dans la cour de la garde et qu'on lui donne chaque jour un pain rond de la rue des boulangers, jusqu'à épuisement de tout le pain de la ville. Ainsi Jérémie resta dans la cour de la garde.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Sophonie 21.1+. –  S''il te plaît  : le terme correspondant est habituellement traduit par je te prie, je t''en prie  ; mais il est distinct du verbe rendu ici par prier . –  prie  : cf. 7.16+ ; 42.2 ; 1S 7.8 ; 1R 13.6 ; 2R 19.4.'
  - type: text
    content: 'Le roi Sédécias envoya Yehoukal, fils de Shélémia, et Sophonie, fils de Maaséya, le prêtre, dire à Jérémie, le prophète : S''il te plaît, prie pour nous le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu.'
  '4':
  - type: text
    content: 'Or Jérémie allait et venait au milieu du peuple ; on ne l''avait pas encore mis en prison. '
  '5':
  - type: note
    content: 'L''armée du pharaon Hophra ; cf. 44.30n  ; Ez 17.11-21. –  s''en éloignèrent  : litt. s''éloignèrent de Jérusalem  ; cf. 34.21n  ; expression analogue v. 9,11 ; cf. 21.3+ss.'
  - type: text
    content: L'armée du pharaon sortit d'Egypte ; ayant appris cette nouvelle, les Chaldéens qui assiégeaient Jérusalem s'en éloignèrent.
  '6':
  - type: text
    content: 'Alors la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie, le prophète : '
  '7':
  - type: note
    content: me consulter 21.2+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël : Vous direz au roi de Juda qui vous a envoyés me consulter : L''armée du pharaon qui sortait vous secourir retourne dans son pays, en Egypte ; '
  '8':
  - type: note
    content: les Chaldéens reviendront 32.24 ; 34.22. –  y mettront le feu 17.27+.
  - type: text
    content: 'et les Chaldéens reviendront, ils s''attaqueront à cette ville, ils la prendront et y mettront le feu. '
  '9':
  - type: note
    content: 'Ne vous faites pas d''illusion  : autre traduction ne vous trompez pas vous-mêmes.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Ne vous faites pas d''illusion, en disant : « Les Chaldéens s''en iront loin de nous ! » Car ils ne s''en iront pas. '
