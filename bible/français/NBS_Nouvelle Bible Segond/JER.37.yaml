document_id: JER.37
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le roi Sédécias fait consulter Jérémie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sédécias '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2R 24.17 ; 2Ch 36.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Konia '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nabuchodonosor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi Sédécias, fils de Josias, devint roi à la place de Konia, fils de Joïaqim ; Nabuchodonosor, roi de Babylone, l''investit de la royauté sur le pays de Juda. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le peuple du pays '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'n''écoutèrent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 7.13+,26+ ; cf. 2Ch 36.12.
    marker-yv: yv-n
  - type: text
    text: 'Ni lui, ni les gens de sa cour, ni le peuple du pays n''écoutèrent les paroles que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' prononça par l''intermédiaire de Jérémie, le prophète.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sophonie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: S'il te plaît
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le terme correspondant est habituellement traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je te prie, je t'en prie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; mais il est distinct du verbe rendu ici par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: prier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: prie
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 7.16+ ; 42.2 ; 1S 7.8 ; 1R 13.6 ; 2R 19.4.'
    marker-yv: yv-n
  - type: text
    text: 'Le roi Sédécias envoya Yehoukal, fils de Shélémia, et Sophonie, fils de Maaséya, le prêtre, dire à Jérémie, le prophète : S''il te plaît, prie pour nous le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', notre Dieu.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Or Jérémie allait et venait au milieu du peuple ; on ne l''avait pas encore mis en prison. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'L''armée du pharaon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hophra ; cf. 44.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 17.11-21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'en éloignèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'éloignèrent de Jérusalem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 34.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; expression analogue v. 9,11 ; cf. 21.3+ss.'
    marker-yv: yv-n
  - type: text
    text: L'armée du pharaon sortit d'Egypte ; ayant appris cette nouvelle, les Chaldéens qui assiégeaient Jérusalem s'en éloignèrent.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Alors la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' parvint à Jérémie, le prophète : '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'me consulter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 21.2+.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël : Vous direz au roi de Juda qui vous a envoyés me consulter : L''armée du pharaon qui sortait vous secourir retourne dans son pays, en Egypte ; '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les Chaldéens reviendront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '32.24 ; 34.22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'y mettront le feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.27+.
    marker-yv: yv-n
  - type: text
    text: 'et les Chaldéens reviendront, ils s''attaqueront à cette ville, ils la prendront et y mettront le feu. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ne vous faites pas d'illusion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne vous trompez pas vous-mêmes.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Ne vous faites pas d''illusion, en disant : « Les Chaldéens s''en iront loin de nous ! » Car ils ne s''en iront pas. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Lc 19.40. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des hommes transpercés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des blessés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des morts.
    marker-yv: yv-n
  - type: text
    text: Même si vous battiez toute l'armée des Chaldéens qui vous font la guerre, s'il ne restait d'eux que des hommes transpercés, chacun d'eux se relèverait dans sa tente pour mettre le feu à cette ville.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jérémie accusé de trahison
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Pendant que l''armée des Chaldéens s''était éloignée de Jérusalem à cause de l''armée du pharaon, '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour y recevoir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(à Anatoth, en '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Benjamin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa part…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte et traduction incertains ; on a aussi compris '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pour s''échapper de là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Jérusalem)
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', du milieu du peuple, pour prendre sa part au milieu du peuple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou bien '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: afin d'y régler un partage au milieu des siens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 32.7ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de son peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du peuple.
    marker-yv: yv-n
  - type: text
    text: 'Jérémie voulut sortir de Jérusalem pour aller au pays de Benjamin et pour y recevoir sa part d''héritage au milieu de son peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'porte de Benjamin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 38.7.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il fut à la porte de Benjamin, le commandant de la garde, nommé Yiriya, fils de Shélémia, fils de Hanania, se trouvait là ; il arrêta Jérémie, le prophète, en disant : Tu te rends aux Chaldéens ! '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Jérémie répondit : C''est faux ! Je ne me rends pas aux Chaldéens ! Mais Yiriya ne l''écouta pas ; il arrêta Jérémie et le conduisit aux princes. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Les princes, irrités contre Jérémie, le frappèrent et l''incarcérèrent dans la maison de Jonathan, le scribe ; car ils en avaient fait une maison de détention. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au cachot, dans une cellule…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans la maison de la fosse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: citerne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 38.6ss)'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', dans la pièce voûtée'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Ex 12.29.'
    marker-yv: yv-n
  - type: text
    text: C'est ainsi que Jérémie entra au cachot, dans une cellule ; Jérémie y resta longtemps.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Sédécias consulte secrètement Jérémie
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 38.14.
    marker-yv: yv-n
  - type: text
    text: 'Le roi Sédécias l''envoya chercher ; chez lui, le roi l''interrogea secrètement : Y a-t-il une parole de la part du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ? Jérémie répondit : Oui ! Et il dit : Tu seras livré au roi de Babylone. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En quoi ai-je '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: ' contre toi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même expression en Gn 20.9.'
    marker-yv: yv-n
  - type: text
    text: 'Jérémie dit encore au roi Sédécias : En quoi ai-je péché contre toi, contre les gens de ta cour et contre ce peuple, pour que vous m''ayez mis dans cette maison de détention ? '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Et où sont vos prophètes qui vous annonçaient : Le roi de Babylone ne viendra pas contre vous ni contre ce pays ! '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que ma supplication parvienne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '36.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 38.26.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, ô roi, mon seigneur, entends, je te prie ! Que ma supplication parvienne devant toi ! Ne me fais pas retourner dans la maison de Jonathan, le scribe, de peur que je n''y meure ! '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '37.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pain
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 38.9 ; voir Ex 29.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dans la cour de la garde '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 33.1 ; 38.6,13,28 ; voir aussi 32.2+.
    marker-yv: yv-n
  - type: text
    text: Le roi Sédécias ordonna que Jérémie soit détenu dans la cour de la garde et qu'on lui donne chaque jour un pain rond de la rue des boulangers, jusqu'à épuisement de tout le pain de la ville. Ainsi Jérémie resta dans la cour de la garde.
