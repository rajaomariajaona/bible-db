document_id: 2PE.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les propagateurs de faux enseignements
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2Th 2.3ss ; 1Tm 4.1+. –  prophètes de mensonge  : autres traductions faux prophètes, pseudo-prophètes  ; cf. Mt 7.15 ; 24.11,24+ ; Lc 6.26 ; Ac 13.6 ; 1Jn 4.1 ; Ap 16.13+ ; voir aussi Dt 13.1ss ; Es 28.7ss ; Jr 23.9ss ; 28.1ss ; Ez 13.1ss ; Za 13.2. –  maîtres ou enseignants de mensonge  ; autres traductions faux maîtres ; pseudo-maîtres . –  introduiront insidieusement  : cf. Ga 2.4. –  doctrines (grec hairésis , qui a donné hérésie ) ou partis , ou encore opinions  ; cf. Ac 5.17n  ; 1Co 11.19n  ; Ga 5.20. –  renier (Mt 10.33n  ; 1Tm 5.8 ; 2Tm 2.12 ; 3.5 ; Tt 1.16 ; 1Jn 2.22s) le Maître (autre terme, qui désigne, non le maître au sens d''enseignant, mais le maître de l''esclave) Jd 4 ; cf. Lc 2.29 ; Ac 4.24 ; 2Tm 2.21 ; Ap 6.10. –  achetés  : autre traduction rachetés  ; cf. 1Co 6.20+ ; 7.23 ; Ga 3.13 ; 4.5 ; Ap 5.9 ; voir rédemption. –  perdition Ph 3.19+. –  soudaine  : autre traduction rapide  ; le même terme est traduit par imminent en 1.14.'
  - type: text
    content: 'Cependant il y a eu des prophètes de mensonge parmi le peuple ; de même, il y aura parmi vous des maîtres de mensonge qui introduiront insidieusement des doctrines de perdition, allant jusqu''à renier le Maître qui les a achetés. Ils attireront sur eux une perdition soudaine. '
  '10':
  - type: note
    content: 'Voir Jd 7ss,16. –  souillure  : voir pur, impur. –  courent après  : litt. vont derrière  ; cf. v. 18 ; Jd 7n. –  la seigneurie  : cf. v. 1 ; voir aussi Ep 1.21+ ; Col 2.16 ; certains comprennent ici l''autorité du Seigneur (Dieu ou le Christ), mais l''expression peut avoir un sens plus large. –  injurier  : autre traduction calomnier  ; le verbe signifie aussi blasphémer  ; voir v. 2n. –  les gloires  : le terme semble désigner ici des êtres célestes, peut-être en particulier des anges déchus ; cf. v. 4,11 ; Jd 8n  ; voir aussi 3.15s ; 1Co 6.3 ; Ga 1.8 ; 3.19 ; Col 2.16-23.'
  - type: text
    content: surtout ceux qui, dans un appétit de souillure, courent après la chair et méprisent la seigneurie.
  - type: text
    content: 'Présomptueux, arrogants, ils n''ont pas peur d''injurier les gloires, '
  '11':
  - type: note
    content: Jd 9 ; cf. 1 Hénoch 9–10, où les anges fidèles se contentent de demander à Dieu de juger les anges déchus.
  - type: text
    content: alors que des anges, supérieurs en force et en puissance, ne portent pas contre elles de jugement injurieux devant le Seigneur !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Jd 10. –  destinés  : litt. (selon certains mss) nés . –  ils pourriront…  : litt. de leur pourriture (celle des animaux ) eux aussi pourriront  ; d''autres comprennent  : ils pourriront de leur propre corruption (le terme grec ayant parfois ce sens moral, cf. v. 19 ; 1.4).'
  - type: text
    content: 'Mais eux, semblables à des animaux dépourvus de raison et destinés par nature à être capturés et à tomber en pourriture, ils injurient ce qu''ils ne connaissent pas ; ils pourriront comme pourrissent les bêtes, '
  '13':
  - type: note
    content: 'recueillant l''injustice…  : autre traduction se faisant à eux-mêmes du tort en salaire du tort (qu''ils ont fait)  ; cf. v. 15. –  taches / défauts 3.14 ; cf. Jd 9,12n  ; voir aussi Lv 21.17s ; 22.20. –  leurs tromperies ou leurs impostures  ; le mot est aussi traduit par égarement  ; il pourrait ici avoir le sens de jouissance, cf. Mc 4.19+ ; certains mss portent leurs repas fraternels, comme en Jd 12n  ; les deux termes se ressemblent en grec.'
  - type: text
    content: 'recueillant l''injustice en salaire de l''injustice. Ils trouvent leur plaisir à se livrer à la volupté en plein jour. Ils ne sont que taches et défauts, ils se délectent de leurs tromperies tout en festoyant avec vous, '
  '14':
  - type: note
    content: 'pleins d''adultère  : litt. pleins de la femme adultère (même terme en Rm 7.3) ; cf. Mt 5.28. –  ils séduisent  : même verbe au v. 18 ; Jc 1.14. –  les gens  : autre traduction les âmes, même terme v. 8 ; cf. Mt 10.28n  ; 1P 1.9n. –  mal affermis 3.16 ; cf. 1.12. –  cœur exercé  : cf. 1Tm 4.7s ; Hé 5.14. –  avidité v. 3+. –  des enfants maudits  : litt. des enfants de malédiction, hébraïsme qu''on pourrait aussi traduire  : des maudits (cf. Ep 2.2s) ; voir bénédiction, malédiction.'
  - type: text
    content: ils ont les yeux pleins d'adultère et, insatiables de péché, ils séduisent les gens mal affermis ; ils ont le cœur exercé à l'avidité ; ce sont des enfants maudits.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Jd 11. –  voie droite  : cf. v. 2 (même mot pour voie ) ; 1S 12.23 ; Es 40.3 ; Os 14.10 ; Pr 2.13. –  égarés v. 18 ; 3.17. –  suivant 1.16+. –  Balaam de Bosor (ou, selon certains mss, de Béor ) : on pourrait comprendre fils de Bosor ou de Béor  ; cf. Nb 22–24 ; 31.16 ; Dt 23.5 ; Né 13.2 ; Ap 2.14. –  le salaire de l''injustice  : litt. un salaire d''injustice  ; cf. Nb 22.17s ; Ac 1.18.'
  - type: text
    content: 'Après avoir quitté la voie droite, ils se sont égarés en suivant la voie de Balaam de Bosor, qui aima le salaire de l''injustice, '
  '16':
  - type: note
    content: 'Cf. Nb 22.28. Les termes grecs pour transgression et démence (ou extravagance, cf. 2Co 11.23n) font assonance. –  langage  : autre traduction voix.'
  - type: text
    content: 'mais qui fut repris pour sa propre transgression : une bête de somme dépourvue de langage fit entendre un langage humain et arrêta la démence du prophète.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Jd 12s. –  fontaines sans eau  : cf. Jr 2.13 ; 14.3 ; Pr 13.14 ; 18.4. –  l''obscurité…  : cf. v. 4 ; Dn 12.3.'
  - type: text
    content: 'Ce sont des fontaines sans eau, des nuages que chasse la tempête ; l''obscurité des ténèbres leur est réservée. '
  '18':
  - type: note
    content: 'Jd 16n. –  creux ou vains, vides  ; cf. Rm 1.21 ; 8.20 ; 1Co 3.20 ; Ep 4.17 ; Tt 1.10. –  séduisent v. 14n. –  les désirs…  : autre traduction par les désirs et les débauches de la chair, cf. v. 2n. –  échapper v. 20 ; 1.4. –  égarement v. 15+ ; cf. Rm 1.27 ; Tt 3.3.'
  - type: text
    content: 'Avec des discours creux, d''une monstrueuse insolence, ils séduisent, par les désirs de débauche de la chair, ceux qui viennent à peine d''échapper aux gens qui vivent dans l''égarement ; '
  '19':
  - type: note
    content: 'Cf. Jn 8.34 ; Rm 6.15ss ; 8.21 ; Ga 5.13 ; 1P 2.16. –  pourriture  : autre traduction corruption 1.4+. –  ce qui le domine  : autre traduction celui qui le domine  ; cf. v. 20 ; voir Rm 6.16ss.'
  - type: text
    content: 'ils leur promettent la liberté, alors qu''ils sont eux-mêmes esclaves de la pourriture – car chacun est l''esclave de ce qui le domine. '
  '2':
  - type: note
    content: 'suivront  : cf. 1.16. –  débauches  : le terme grec correspondant a habituellement une connotation (d''immoralité) sexuelle v. 7,18 ; Mc 7.22+ ; Jd 4. –  on calomniera ou on blasphémera  : cf. v. 10nss ; Es 52.5 ; Rm 2.24. –  la voie de la vérité  : cf. v. 21 ; Ps 119.30 ; Ac 9.2n  ; Sagesse 5.6 : « Nous nous sommes égarés loin du chemin de la vérité. »'
  - type: text
    content: 'Beaucoup les suivront dans leurs débauches et, à cause d''eux, on calomniera la voie de la vérité. '
  '20':
  - type: note
    content: 'échappé v. 18+. –  notre Seigneur  : certains mss portent le Seigneur. –  leur condition dernière… Mt 12.45/ /.'
  - type: text
    content: 'En effet, si après avoir échappé aux souillures du monde par la connaissance de Jésus-Christ, notre Seigneur et Sauveur, ils se laissent de nouveau prendre et dominer par elles, leur condition dernière est pire que la première. '
  '21':
  - type: note
    content: 'Cf. Lc 12.47s ; Hé 6.4ss ; 10.26 ; Jc 4.17. –  voie de la justice  : cf. Pr 21.16 ; Mt 21.32+. –  saint commandement  : cf. 3.2 ; Rm 7.12 ; 1Tm 6.14 ; 1Jn 3.3 ; voir aussi Jd 3n.'
  - type: text
    content: 'Car il aurait mieux valu pour eux ne pas avoir connu la voie de la justice que de l''avoir connue et de se détourner du saint commandement qui leur avait été transmis. '
  '22':
  - type: note
    content: Cf. Pr 26.11 ; Mt 7.6 ; les expressions de ce v. ont plusieurs parallèles dans des textes grecs et orientaux.
  - type: text
    content: 'Il leur est arrivé ce que dit le proverbe véridique : Le chien est retourné à son vomissement, et la truie à peine lavée va se vautrer dans le bourbier.'
  '3':
  - type: note
    content: 'avidité Mc 7.22 ; Lc 12.15 ; 1Th 2.5 ; cf. 2Co 7.2 ; 11.7ss ; 12.17s ; 1Tm 6.5 ; Tt 1.11 ; 1P 5.2 ; voir aussi Rm 16.18. –  artificieuses ou trompeuses  ; l''adjectif grec, qui n''apparaît qu''ici dans le N.T., est dérivé du verbe traduit par façonner en Rm 9.20 ; 1Tm 2.13. –  jugement  : autre traduction châtiment  ; cf. v. 6,9 ; 3.7. –  n''est pas inactif  : cf. 1.8 (terme apparenté pour sans activité) ; voir aussi Jd 4.'
  - type: text
    content: 'Par avidité, ils vous exploiteront au moyen de paroles artificieuses. Pour eux, depuis longtemps, le jugement n''est pas inactif : leur perdition n''est pas en sommeil.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'les anges qui avaient péché  : cf. Gn 6.1-2n  ; Jd 6. –  s''il les a livrés…  : cf. 1 Hénoch 10.11ss : « Tous ceux (les anges) qui se sont unis aux femmes… enchaîne-les pour soixante-dix générations dans les replis de la terre, jusqu''au jour de leur jugement et de l''accomplissement, où sera exécutée la sentence éternelle… Quiconque aura été condamné à la perdition, dès maintenant, sera enchaîné avec eux. » Jubilés 5.6,10 : « Il ordonna de les destituer de toute leur autorité et Il nous dit de les enchaîner dans les profondeurs de la terre. Et les y voilà enchaînés et mis au secret… jusqu''au jour du grand Jugement, destiné à la condamnation de tous ceux qui ont corrompu leur conduite et leurs actes devant le Seigneur. » –  précipités  : le verbe grec est dérivé du mot tartaros (= « Tartare ») qui apparaît en 1 Hénoch (20.2) et qui désignait dans la mythologie antique le plus profond des enfers, le lieu où étaient tourmentés les condamnés ; cf. Oracles sibyllins 4.186 : « Dans l''humide Tartare, ils seront cachés dans les replis infernaux de la géhenne » (cf. Mt 5.22n). –  chaînes de ténèbres  : certains mss portent des fosses ou des antres.'
  - type: text
    content: 'Si Dieu, en effet, n''a pas épargné les anges qui avaient péché, mais s''il les a livrés et précipités dans des chaînes de ténèbres où ils sont gardés en vue du jugement ; '
  '5':
  - type: note
    content: 'le monde ancien 3.6 ; cf. Gn 6–9 ; Mt 24.38/ /. –  le huitième homme  : litt. le huitième  ; on comprend habituellement huit personnes, dont Noé (cf. Gn 7.13 ; 8.16ss ; Hé 11.7 ; 1P 3.20) ; mais l''expression veut sans doute souligner, comme souvent dans l''Eglise ancienne, l''ordinal huitième comme symbole du (re)commencement après un cycle de sept ; cf. Lv 12.3 ; 14.10 ; 15.14,29 ; 2Ch 7.9 ; 29.16s ; Lc 9.28 ; Jn 20.26. –  héraut (1Tm 2.7n) de la justice  : cf. 1 Clément 7.6 : « Noé prêcha la repentance et ceux qui l''écoutèrent furent sauvés. »'
  - type: text
    content: 's''il n''a pas épargné le monde ancien, mais s''il a gardé le huitième homme, Noé, héraut de la justice, lorsqu''il a fait venir le déluge sur un monde d''impies ; '
  '6':
  - type: note
    content: 'à la destruction  : cette précision est absente de certains mss. –  Sodome et Gomorrhe Gn 19.24+ss ; Es 1.9+s ; Mt 10.15+ ; Jd 7 ; Siracide 16.8 : « Il n''a pas épargné la ville de Loth, dont il avait l''orgueil en abomination. » –  les donnant aux impies… ou, selon certains mss, faisant d''elles un exemple pour les impies à venir  ; cf. Sagesse 10.7 : « En témoignage de leur perversité subsistent toujours une terre aride et fumante, des plantes aux fruits que les saisons ne mûrissent pas, et une colonne de sel dressée en mémorial d''une âme incrédule. »'
  - type: text
    content: 's''il a condamné à la destruction et réduit en cendres les villes de Sodome et Gomorrhe, les donnant aux impies comme exemple de ce qui les attend, '
  '7':
  - type: note
    content: 'délivré Loth le juste Gn 19.1-9,16,29 ; Lc 17.28s ; Sagesse 10.6 : « Alors que les impies périssaient, elle (la Sagesse) délivra le juste fuyant devant le feu qui s''abattait sur les cinq villes. » –  profondément affligé  : même terme en Ac 7.24 (opprimé). –  conduite 3.11 ; cf. 1P 1.15,18 ; 2.12 ; 3.1s,16. –  débauchée v. 2n  ; cf. Gn 19.4s.'
  - type: text
    content: 'mais s''il a délivré Loth le juste, profondément affligé par la conduite débauchée de ces criminels '
  '8':
  - type: note
    content: 'tourmentait  : cf. Mt 8.6 ; Ap 9.5+. –  du mal  : litt. des œuvres mauvaises, l''adjectif étant apparenté (et opposé) au terme habituellement traduit par loi Mt 7.23n  ; 2Th 2.3n.'
  - type: text
    content: '– car ce juste, qui habitait au milieu d''eux, tourmentait jour après jour son âme de juste à cause du mal qu''il voyait et entendait – '
  '9':
  - type: note
    content: 'délivrer de l''épreuve (ou de la tentation) : cf. Mt 6.13 ; 1Th 1.10 ; 2Tm 4.17s ; Ap 3.10. –  réserver…  : cf. v. 4 ; Jd 6.'
  - type: text
    content: 'c''est donc que le Seigneur sait délivrer de l''épreuve les gens pieux et réserver les injustes pour les châtier au jour du jugement, '
