    - type: text
      text: 'Cependant il y a eu des prophètes de mensonge parmi le peuple ; de même, il y aura parmi vous des maîtres de mensonge qui introduiront insidieusement des doctrines de perdition, allant jusqu''à renier le Maître qui les a achetés. Ils attireront sur eux une perdition soudaine. '
