document_id: ISA.4,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'pain / manteau  : cf. Ex 21.10. –  fais-nous seulement porter ton nom  : litt. que ton nom soit seulement proclamé sur nous (cf. 2S 12.28n). –  Enlève notre déshonneur  : autre traduction lave les outrages que nous subissons  ; cf. 54.1 ; Gn 30.23n  ; Lc 1.25.'
  - type: text
    content: Sept femmes saisiront en ce jour-là
  - type: text
    content: 'un seul homme pour lui dire :'
  - type: text
    content: Nous mangerons notre propre pain,
  - type: text
    content: et nous nous vêtirons de notre propre manteau ;
  - type: text
    content: fais-nous seulement porter ton nom !
  - type: text
    content: Enlève notre déshonneur !
  - type: heading
    content: Les rescapés d'Israël
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'le germe  : cf. 6.12s ; 11.1 ; 53.2 ; même terme hébreu en 61.11 ; Jr 23.5 ; 33.15 ; Za 3.8 ; 6.12 (titre messianique). –  rescapés d''Israël 10.20 ; 37.31.'
  - type: text
    content: 'En ce jour-là, le germe du '
  - type: text
    content: Seigneur
  - type: text
    content: ' deviendra beauté et gloire, et le fruit du pays deviendra orgueil et splendeur pour les rescapés d''Israël. '
  '3':
  - type: note
    content: 'restera 1.9+. –  saints 1.4n  ; cf. Ex 19.5. –  inscrits pour obtenir (le verbe est sous-entendu dans le texte) la vie  : cf. Ex 32.32+. –  à Jérusalem Ps 87.6 ; cf. Ez 13.9n.'
  - type: text
    content: 'Alors celui qui restera à Sion et celui qui sera laissé à Jérusalem seront appelés saints, tous ceux qui seront inscrits pour obtenir la vie à Jérusalem. '
  '4':
  - type: note
    content: 'filles de Sion 3.16ss ; l''expression désigne peut-être ici l''ensemble de la population de Jérusalem. –  nettoyé 2Ch 4.6n. –  du sang  : litt. des sangs (voir 1.15n). –  souffle ou esprit, vent. –  d''équité ou de droit, de jugement  ; cf. 28.6. –  destruction  : terme de la même racine que le verbe traduit par dévorer (3.14n) ou éliminer (Dt 13.6n) ; autre traduction incendie (6.13n).'
  - type: text
    content: 'Après que le Seigneur aura lavé les ordures des filles de Sion et nettoyé Jérusalem du sang qui est en son sein, par un souffle d''équité et par un souffle de destruction, '
  '5':
  - type: note
    content: 'Cf. 6.3s ; 24.23. –  une nuée…  : autre traduction une nuée pendant le jour et de la fumée avec la clarté d''un feu flamboyant (cf. Os 7.6 ; Lm 2.3) pendant la nuit  ; voir Ex 13.21+. –  tout ce qui est glorieux…  : litt. sur toute gloire un dais (le dernier mot désigne habituellement la chambre nuptiale, cf. Jl 2.16 ; Ps 19.6) ; autre traduction sur toutes choses la gloire (du Seigneur) sera un dais.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' créera, sur toute l''étendue du mont Sion et sur ses assemblées convoquées, une nuée et de la fumée pendant le jour, et la clarté d''un feu flamboyant pendant la nuit ; car tout ce qui est glorieux sera mis à couvert. '
  '6':
  - type: note
    content: 'une hutte  : cf. 25.4 ; 32.2 ; Jon 4.5 ; Ps 14.6 ; 18.12 ; 27.5n  ; 76.3 ; 91.2.'
  - type: text
    content: Il y aura une hutte pour faire de l'ombre pendant la chaleur du jour, pour servir d'abri et de cachette pendant l'averse et la pluie violentes.
