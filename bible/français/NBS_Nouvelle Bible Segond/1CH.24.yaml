      marker: fr
      children:
      - type: text
        text: '24.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tsadoq, Ahimélek
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il en fut ainsi…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : phrase très obscure, dont le sens pourrait être que le tirage au sort (pour l''ordre de service des classes de lévites) permettait de ne pas avantager un aîné parmi les chefs de familles par rapport au '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: moindre de ses frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. par rapport à un plus jeune. Cf. 25.8 ; 26.13.'
    marker-yv: yv-n
  - type: text
    text: Eux aussi, comme leurs frères, les fils d'Aaron, ils tirèrent au sort devant le roi David, Tsadoq, Ahimélek et les chefs de famille des prêtres et des lévites. Il en fut ainsi pour chaque chef de famille comme pour le moindre de ses frères.
