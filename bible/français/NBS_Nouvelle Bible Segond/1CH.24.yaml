  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.1 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Ex 6.23.
    marker-yv: yv-n
  - type: text
    text: 'Classes des fils d''Aaron :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Fils d''Aaron : Nadab, Abihou, Eléazar et Itamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Voir Lv 10.1-7.
    marker-yv: yv-n
  - type: text
    text: 'Nadab et Abihou moururent avant leur père, sans avoir de fils ; Eléazar et Itamar exercèrent le sacerdoce. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Tsadoq '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(5.30-34) / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ahimélek '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2S 8.17 ; cf. 1Ch 18.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: David, ainsi que Tsadoq parmi les fils d'Eléazar et Ahimélek parmi les fils d'Itamar, classa les fils d'Aaron selon les charges de leur service.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: plus de chefs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'plus de chefs d''hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (du terme hébreu qui désigne habituellement l'homme adulte ou l'homme fort).
    marker-yv: yv-n
  - type: text
    text: 'Il se trouva parmi les fils d''Eléazar plus de chefs que parmi les fils d''Itamar ; on les répartit ainsi : pour les fils d''Eléazar, seize chefs de famille ; pour les fils d''Itamar, huit chefs de famille. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.39'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'princes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. v. 6 ; ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chefs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', autre terme qu''au v. 4) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du sanctuaire '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sainteté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même expression hébraïque en Es 43.28) / '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: princes de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on ignore ce que recouvrent ces deux appellations ; il pourrait y avoir eu, entre les groupes de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: ', des tensions ou des rivalités qu''on s''efforce de surmonter. Autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il y avait des ministres du sanctuaire et des ministre de Dieu parmi les fils d'Eléazar et parmi les fils d'Itamar.
    marker-yv: yv-n
  - type: text
    text: 'On les répartit par le sort, les uns avec les autres, car les princes du sanctuaire et les princes de Dieu étaient des fils d''Eléazar et des fils d''Itamar. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribe
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''entre les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du lévite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; quelques mss hébreux portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. – En hébreu, la dernière phrase du v. est très obscure. On pourrait la comprendre, compte tenu du v. 4, dans le sens que chacun des seize '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chefs de famille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: du groupe d’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Eléazar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était à la tête d''une classe comptant une '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'famille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 9.9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), tandis que chacun des huit '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'chefs de famille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: du groupe d’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Itamar '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'était à la tête d''une classe comptant deux '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: familles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: on prenait une famille pour Eléazar, puis une autre, quand on prenait une famille pour Itamar.
    marker-yv: yv-n
  - type: text
    text: Shemaya, le scribe, fils de Netanéel, d'entre les lévites, les inscrivit devant le roi, les princes, Tsadoq le prêtre, Ahimélek, fils d'Abiathar, et les chefs de famille des prêtres et des lévites. On prenait une famille pour Eléazar et on en prenait une autre pour Itamar.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Plusieurs des noms qui constituent la liste des v. 7-18 apparaissent dans d'autres textes de l'A.T. (p. ex. Né 12), sans pourtant qu'ils désignent les mêmes personnages.
    marker-yv: yv-n
  - type: text
    text: 'Le premier sort échut à Yehoyarib ; le deuxième, à Yedaya ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'le troisième, à Harim ; le quatrième, à Séorim ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'le cinquième, à Malkiya ; le sixième, à Miyamîn ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Abiya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 1.5.'
    marker-yv: yv-n
  - type: text
    text: 'le septième, à Haqqots ; le huitième, à Abiya ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Shekania
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Shekanyahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même en 2Ch 31.15.'
    marker-yv: yv-n
  - type: text
    text: 'le neuvième, à Josué ; le dixième, à Shekania ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'le onzième, à Eliashib ; le douzième, à Yaqim ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'le treizième, à Houppa ; le quatorzième, à Yéshébéab ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'le quinzième, à Bilga ; le seizième, à Immer ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'le dix-septième, à Hézir ; le dix-huitième, à Happitsets ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: 'le dix-neuvième, à Petahia ; le vingtième, à Ezéchiel ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'le vingt et unième, à Yakîn ; le vingt-deuxième, à Gamoul ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Delaya '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Maazia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Delayahou / Ma‘azyahou.
    marker-yv: yv-n
  - type: text
    text: le vingt-troisième, à Delaya, le vingt-quatrième, à Maazia.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour entrer dans la maison du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Lc 1.8s.'
    marker-yv: yv-n
  - type: text
    text: 'C''est ainsi qu''ils furent chargés de leur service, pour entrer dans la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' selon la règle instituée pour eux par l''intermédiaire d''Aaron, leur père, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël, l''avait ordonné.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Liste complémentaire des lévites
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'La liste des v. 20-30 présente plusieurs analogies et de nombreuses divergences par rapport à celle du chap. 23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yéhdeya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
