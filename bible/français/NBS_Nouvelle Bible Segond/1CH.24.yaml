    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yaazia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ya‘aziyahou.
    marker-yv: yv-n
  - type: text
    text: 'fils de Merari, Mahli et Moushi ; fils de Yaazia, son fils ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: text
    text: 'fils de Merari, pour Yaazia, son fils, Shoham, Zakkour et Ibri ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: 'pour Mahli, Eléazar, qui n''eut pas de fils ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'pour Qish, les fils de Qish, Yerahméel ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
      - type: text
        text: ' des lévites.'
    marker-yv: yv-n
  - type: text
