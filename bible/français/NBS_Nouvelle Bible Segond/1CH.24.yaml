    marker-yv: yv-n
  - type: text
    text: 'Pour les autres fils de Lévi : pour les fils d''Amram, Shoubaël ; pour les fils de Shoubaël, Yéhdeya ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Rehabia
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Rehabiahou.
    marker-yv: yv-n
  - type: text
    text: 'pour Rehabia, pour les fils de Rehabia, le chef Yishiya ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'pour les Yitseharites, Shelomoth ; pour les fils de Shelomoth, Yahath ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Benaï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'est un nom propre que l''on ne rencontre nulle part ailleurs ; il pourrait bien être la déformation involontaire du nom commun '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les fils de
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', après la disparition accidentelle de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hébron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', que l''on restitue souvent d''après le parallèle de 23.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yeriya, Amaria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Yeriyahou, ’Amaryahou.
    marker-yv: yv-n
  - type: text
    text: 'Benaï, Yeriya, Amaria le deuxième, Yahaziel le troisième, Yeqaméam, le quatrième ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'fils d''Ouzziel, Michée ; pour les fils de Michée, Shamir ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'frère de Michée, Yishiya ; pour les fils de Yishiya, Zacharie ; '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '24.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
