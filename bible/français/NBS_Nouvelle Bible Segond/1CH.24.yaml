document_id: 1CH.24,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les classes de prêtres
  - type: text
    content: ' '
  - type: note
    content: Voir Ex 6.23.
  - type: text
    content: 'Classes des fils d''Aaron :'
  - type: text
    content: 'Fils d''Aaron : Nadab, Abihou, Eléazar et Itamar. '
  '10':
  - type: note
    content: 'Abiya  : cf. Lc 1.5.'
  - type: text
    content: 'le septième, à Haqqots ; le huitième, à Abiya ; '
  '11':
  - type: note
    content: 'Shekania  : hébreu Shekanyahou, de même en 2Ch 31.15.'
  - type: text
    content: 'le neuvième, à Josué ; le dixième, à Shekania ; '
  '12':
  - type: text
    content: 'le onzième, à Eliashib ; le douzième, à Yaqim ; '
  '13':
  - type: text
    content: 'le treizième, à Houppa ; le quatorzième, à Yéshébéab ; '
  '14':
  - type: text
    content: 'le quinzième, à Bilga ; le seizième, à Immer ; '
  '15':
  - type: text
    content: 'le dix-septième, à Hézir ; le dix-huitième, à Happitsets ; '
  '16':
  - type: text
    content: 'le dix-neuvième, à Petahia ; le vingtième, à Ezéchiel ; '
  '17':
  - type: text
    content: 'le vingt et unième, à Yakîn ; le vingt-deuxième, à Gamoul ; '
  '18':
  - type: note
    content: 'Delaya / Maazia  : hébreu Delayahou / Ma‘azyahou.'
  - type: text
    content: le vingt-troisième, à Delaya, le vingt-quatrième, à Maazia.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'pour entrer dans la maison du Seigneur  : cf. Lc 1.8s.'
  - type: text
    content: 'C''est ainsi qu''ils furent chargés de leur service, pour entrer dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' selon la règle instituée pour eux par l''intermédiaire d''Aaron, leur père, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, l''avait ordonné.'
  - type: heading
    content: Liste complémentaire des lévites
  '2':
  - type: note
    content: Voir Lv 10.1-7.
  - type: text
    content: 'Nadab et Abihou moururent avant leur père, sans avoir de fils ; Eléazar et Itamar exercèrent le sacerdoce. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'La liste des v. 20-30 présente plusieurs analogies et de nombreuses divergences par rapport à celle du chap. 23. –  Yéhdeya  : hébreu Yéhdeyahou , de même en 27.30.'
  - type: text
    content: 'Pour les autres fils de Lévi : pour les fils d''Amram, Shoubaël ; pour les fils de Shoubaël, Yéhdeya ; '
  '21':
  - type: note
    content: 'Rehabia  : hébreu Rehabiahou.'
  - type: text
    content: 'pour Rehabia, pour les fils de Rehabia, le chef Yishiya ; '
  '22':
  - type: text
    content: 'pour les Yitseharites, Shelomoth ; pour les fils de Shelomoth, Yahath ; '
  '23':
  - type: note
    content: 'Benaï est un nom propre que l''on ne rencontre nulle part ailleurs ; il pourrait bien être la déformation involontaire du nom commun les fils de, après la disparition accidentelle de Hébron, que l''on restitue souvent d''après le parallèle de 23.19. –  Yeriya, Amaria  : hébreu Yeriyahou, ’Amaryahou.'
  - type: text
    content: 'Benaï, Yeriya, Amaria le deuxième, Yahaziel le troisième, Yeqaméam, le quatrième ; '
  '24':
  - type: text
    content: 'fils d''Ouzziel, Michée ; pour les fils de Michée, Shamir ; '
  '25':
  - type: text
    content: 'frère de Michée, Yishiya ; pour les fils de Yishiya, Zacharie ; '
  '26':
  - type: note
    content: 'Le texte hébreu des v. 26s n''est pas absolument clair. –  Yaazia  : hébreu Ya‘aziyahou.'
  - type: text
    content: 'fils de Merari, Mahli et Moushi ; fils de Yaazia, son fils ; '
  '27':
  - type: text
    content: 'fils de Merari, pour Yaazia, son fils, Shoham, Zakkour et Ibri ; '
  '28':
  - type: text
    content: 'pour Mahli, Eléazar, qui n''eut pas de fils ; '
  '29':
  - type: text
    content: 'pour Qish, les fils de Qish, Yerahméel ; '
  '3':
  - type: note
    content: Tsadoq (5.30-34) / Ahimélek 2S 8.17 ; cf. 1Ch 18.16n.
  - type: text
    content: David, ainsi que Tsadoq parmi les fils d'Eléazar et Ahimélek parmi les fils d'Itamar, classa les fils d'Aaron selon les charges de leur service.
  '30':
  - type: note
    content: 'les lévites  : litt. les fils des lévites.'
  - type: text
    content: 'fils de Moushi, Mahli, Eder et Yerimoth. Ce sont là les lévites, famille par famille. '
  '31':
  - type: note
    content: 'Tsadoq, Ahimélek  : cf. v. 3. –  Il en fut ainsi…  : phrase très obscure, dont le sens pourrait être que le tirage au sort (pour l''ordre de service des classes de lévites) permettait de ne pas avantager un aîné parmi les chefs de familles par rapport au moindre de ses frères, c.-à-d. par rapport à un plus jeune. Cf. 25.8 ; 26.13.'
  - type: text
    content: Eux aussi, comme leurs frères, les fils d'Aaron, ils tirèrent au sort devant le roi David, Tsadoq, Ahimélek et les chefs de famille des prêtres et des lévites. Il en fut ainsi pour chaque chef de famille comme pour le moindre de ses frères.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'plus de chefs  : litt. plus de chefs d''hommes (du terme hébreu qui désigne habituellement l''homme adulte ou l''homme fort).'
  - type: text
    content: 'Il se trouva parmi les fils d''Eléazar plus de chefs que parmi les fils d''Itamar ; on les répartit ainsi : pour les fils d''Eléazar, seize chefs de famille ; pour les fils d''Itamar, huit chefs de famille. '
  '5':
  - type: note
    content: 'sort 6.39n. –  princes (cf. v. 6 ; ou chefs, autre terme qu''au v. 4) du sanctuaire (ou de sainteté  ; même expression hébraïque en Es 43.28) / princes de Dieu  : on ignore ce que recouvrent ces deux appellations ; il pourrait y avoir eu, entre les groupes de prêtres, des tensions ou des rivalités qu''on s''efforce de surmonter. Autre traduction il y avait des ministres du sanctuaire et des ministre de Dieu parmi les fils d''Eléazar et parmi les fils d''Itamar.'
  - type: text
    content: 'On les répartit par le sort, les uns avec les autres, car les princes du sanctuaire et les princes de Dieu étaient des fils d''Eléazar et des fils d''Itamar. '
  '6':
  - type: note
    content: 'Voir scribe. –  d''entre les lévites  : litt. du lévite  ; quelques mss hébreux portent des lévites. – En hébreu, la dernière phrase du v. est très obscure. On pourrait la comprendre, compte tenu du v. 4, dans le sens que chacun des seize chefs de famille du groupe d’Eléazar était à la tête d''une classe comptant une famille (cf. 9.9n), tandis que chacun des huit chefs de famille du groupe d’Itamar était à la tête d''une classe comptant deux familles. Autre traduction on prenait une famille pour Eléazar, puis une autre, quand on prenait une famille pour Itamar.'
  - type: text
    content: Shemaya, le scribe, fils de Netanéel, d'entre les lévites, les inscrivit devant le roi, les princes, Tsadoq le prêtre, Ahimélek, fils d'Abiathar, et les chefs de famille des prêtres et des lévites. On prenait une famille pour Eléazar et on en prenait une autre pour Itamar.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Plusieurs des noms qui constituent la liste des v. 7-18 apparaissent dans d'autres textes de l'A.T. (p. ex. Né 12), sans pourtant qu'ils désignent les mêmes personnages.
  - type: text
    content: 'Le premier sort échut à Yehoyarib ; le deuxième, à Yedaya ; '
  '8':
  - type: text
    content: 'le troisième, à Harim ; le quatrième, à Séorim ; '
  '9':
  - type: text
    content: 'le cinquième, à Malkiya ; le sixième, à Miyamîn ; '
