document_id: PSA.91,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Sous la protection du Très-Haut
  - type: text
    content: ' '
  - type: note
    content: 'LXX donne la suscription suivante  : Chant. Psaume de David. –  au secret  : autre traduction dans la cachette  ; cf. 27.5n. –  repose  : litt. passe la nuit ou loge , cf. 25.13 ; voir aussi 15.1. –  à l''ombre v. 4+. –  du Puissant  : hébreu de Shaddaï  ; cf. 68.15 ; Gn 17.1n.'
  - type: text
    content: Celui qui habite au secret du Très-Haut
  - type: text
    content: repose à l'ombre du Puissant.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 54.14 ; Siracide 33.1 : « Celui qui craint le Seigneur ne connaîtra pas le malheur mais de l''épreuve il sera chaque fois délivré. »'
  - type: text
    content: Aucun malheur ne t'arrivera,
  - type: text
    content: aucun fléau n'approchera de ta tente.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Mt 4.6  ; 26.53 ; Lc 4.10s. –  messagers ou anges  ; cf. 103.20s ; Gn 24.7 ; Hé 1.14. –  dans toutes tes voies  : cf. 23.1ss ; 84.7s.'
  - type: text
    content: Car il donnera pour toi des ordres à ses messagers
  - type: text
    content: pour te garder dans toutes tes voies ;
  '12':
  - type: text
    content: ' '
  - type: note
    content: ils te porteront Es 63.9. –  que ton pied ne heurte Pr 3.23.
  - type: text
    content: ils te porteront sur leurs mains,
  - type: text
    content: de peur que ton pied ne heurte une pierre.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 11.8 ; Jb 5.19-23 ; Lc 10.19 ; Siracide 39.30s : « Les crocs des bêtes féroces, les scorpions, les vipères, l''épée châtiant les impies pour leur perte se réjouissent d''accomplir son ordre » (c.-à-d. d''exécuter la sentence divine contre les méchants). –  dragon 74.13+.'
  - type: text
    content: Tu marcheras sur le lion et sur la vipère,
  - type: text
    content: tu piétineras le jeune lion et le dragon.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'épris de moi  : cf. Dt 7.7n. –  protégerai  : verbe apparenté au mot rendu par citadelle (9.10+). –  il connaît mon nom 9.11.'
  - type: text
    content: – Puisqu'il s'est épris de moi, je lui donnerai d'échapper ;
  - type: text
    content: je le protégerai, puisqu'il connaît mon nom.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 50.15 ; Es 30.19. – Voir gloire.
  - type: text
    content: Il m'invoquera, et je lui répondrai ;
  - type: text
    content: je serai moi-même avec lui dans la détresse,
  - type: text
    content: je le délivrerai et le glorifierai.
  '16':
  - type: text
    content: ' '
  - type: note
    content: la longueur des jours 21.5+. –  voir mon salut 50.23.
  - type: text
    content: Je le rassasierai de la longueur des jours
  - type: text
    content: et lui ferai voir mon salut.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Je dis  : LXX il dit ou qu''il dise  ; cf. 34.4 ; 118.2 ; 124.1 ; 129.1. –  Mon abri… 7.2+ ; 59.17 ; 62.8 ; 71.7 ; 94.22. –  confiance 4.6+.'
  - type: text
    content: 'Je dis au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Mon abri et ma forteresse,'
  - type: text
    content: mon Dieu en qui je mets ma confiance !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'filet de l''oiseleur 124.7 ; cf. 7.16+. –  la peste…  : litt. la peste des calamités ou des perfidies  ; plusieurs versions anciennes ont compris la parole qui fait des ravages ou la parole perfide  ; cf. v. 6 ; 5.10 ; 38.13 ; 52.4,6 ; Pr 2.12'
  - type: text
    content: Car c'est lui qui te délivre du filet de l'oiseleur,
  - type: text
    content: de la peste terrible.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'plumage / ailes  : cf. 17.8+ ; 68.14. –  loyauté ou vérité. –  grand bouclier 5.13n. –  une cuirasse ou un rempart , traduction incertaine.'
  - type: text
    content: Il te couvrira de son plumage,
  - type: text
    content: tu trouveras un abri sous ses ailes ;
  - type: text
    content: sa loyauté est un grand bouclier et une cuirasse.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 121.6 ; les dangers évoqués ici et au v. 6 ont parfois été interprétés comme désignant des puissances démoniaques ; voir aussi Mc 16.18 ; Rm 8.38ss ; 1Jn 5.4. –  la frayeur de la nuit  : cf. Ex 11.4ss ; Es 37.36 ; Ct 3.8n. –  flèche 38.3 ; Jb 6.4 ; Lm 3.13.'
  - type: text
    content: Tu ne craindras ni la frayeur de la nuit,
  - type: text
    content: ni la flèche qui vole de jour,
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 3n. –  épidémie Dt 32.24n.
  - type: text
    content: ni la peste qui marche dans l'obscurité,
  - type: text
    content: ni l'épidémie qui frappe en plein midi.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'mille…  : cf. 3.7s ; 34.8. –  rien ne t''atteindra 32.6.'
  - type: text
    content: Que mille tombent à ton côté,
  - type: text
    content: dix mille à ta droite,
  - type: text
    content: rien ne t'atteindra ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: '37.34. –  méchants  : voir justice.'
  - type: text
    content: tu regarderas seulement de tes yeux
  - type: text
    content: et tu verras la rétribution des méchants.
  '9':
  - type: text
    content: ' '
  - type: note
    content: ton refuge 71.3n  ; 90.1.
  - type: text
    content: 'Car tu es mon abri, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  - type: text
    content: – Tu fais du Très-Haut ton refuge.
