  - type: text
    text: 'Samuel dit à tout Israël : J''ai écouté tout ce que vous m''avez dit ; j''ai mis un roi à votre tête. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui marchera devant vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette expression suggère peut-être une idée de service plutôt que de domination ; cf. 2.30,35. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je suis vieux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: j'ai les cheveux blancs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jb 15.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mes fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 8.1,5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sont avec vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette formule souligne peut-être qu''ils appartiennent à la nouvelle génération.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, voici le roi qui marchera devant vous. Moi, je suis vieux, j''ai les cheveux blancs. Mes fils, eux, sont avec vous. Quant à moi, j''ai marché devant vous depuis ma jeunesse jusqu''à ce jour. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Déposez contre moi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: apportez votre témoignage contre moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''homme qui a reçu son '
      - type: usfm
        marker: w
        children:
        - type: text
