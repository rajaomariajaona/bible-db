    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 10.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Astartés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 2.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: nous te servirons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 10.16.'
    marker-yv: yv-n
  - type: text
    text: 'Ils ont crié vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : « Nous avons péché ! Nous avons abandonné le '
  - type: usfm
    marker: nd
