    - type: usfm
      marker: fq
      children:
      - type: text
        text: un pot-de-vin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'une rançon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: expiation
      - type: text
        text: ) ; cf. Ex 21.30
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 30.12,16 ; Nb 35.31'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: s ; Am 5.12
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jb 36.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Pr 6.35'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fermer les yeux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Lv 20.4+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je vous rendrai votre dû '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je vous en donnerai compensation, je le restituerai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Lv 5.23. – Voir aussi « Samuel dans le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Siracide
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  »♦.'
    marker-yv: yv-n
  - type: text
    text: 'Je suis là ! Déposez contre moi devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et devant l''homme qui a reçu son onction. De qui ai-je pris le bœuf ? De qui ai-je pris l''âne ? Qui ai-je opprimé ? Qui ai-je écrasé ? De qui ai-je accepté un pot-de-vin, pour fermer les yeux sur son cas ? Dites-le-moi, et je vous rendrai votre dû. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ps 15.
    marker-yv: yv-n
  - type: text
    text: 'Ils dirent : Tu ne nous as pas opprimés, tu ne nous as pas écrasés et tu n''as rien accepté de personne. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le peuple dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il dit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le sujet au singulier désigne probablement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Quelques mss hébreux et plusieurs versions anciennes ont le pluriel '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils dirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Témoin ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils en sont témoins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; l''hébreu biblique ne connaissait pas de mot équivalant à notre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: oui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; pour donner une réponse affirmative, on reprenait le mot sur lequel l''interlocuteur avait mis l''accent, dans le cas particulier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: témoin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', employé deux fois par Samuel. Cf. Ac 24.16 ; voir aussi Rm 1.9.'
    marker-yv: yv-n
  - type: text
    text: 'Il leur dit encore : Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est témoin contre vous, et l''homme qui a reçu son onction est témoin en ce jour, que vous n''avez rien trouvé dans ma main. Le peuple dit : Témoin !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
