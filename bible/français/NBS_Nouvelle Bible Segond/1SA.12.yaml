      - type: text
        text: '12.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Comparer les v. 6-25 avec Dt 30.15-20 ; Jos 23.14–24.24 ; Jr 2.4-8 ; Mi 6.1-5 ; Ac 7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'C''est le '
      - type: usfm
