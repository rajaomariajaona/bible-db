document_id: 1SA.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Discours d'adieu de Samuel
  - type: text
    content: ' '
  - type: note
    content: 'J''ai écouté  : litt. j''ai écouté votre voix  ; cf. 8.5,19ss ; 25.35. –  j''ai mis un roi…  : cf. 10.24.'
  - type: text
    content: 'Samuel dit à tout Israël : J''ai écouté tout ce que vous m''avez dit ; j''ai mis un roi à votre tête. '
  '10':
  - type: note
    content: 'ont crié vers le Seigneur  : cf. Jg 3.9+. –  Nous avons péché… les Baals  : cf. Jg 10.10+. –  les Astartés  : cf. Jg 2.13n. –  nous te servirons  : cf. Jg 10.16.'
  - type: text
    content: 'Ils ont crié vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : « Nous avons péché ! Nous avons abandonné le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et nous avons servi les Baals et les Astartés ; délivre-nous maintenant de la main de nos ennemis, et nous te servirons ! » '
  '11':
  - type: note
    content: 'Yeroub-Baal ou Gédéon  : cf. Jg 6–8. –  Bedân  : aucun personnage de ce nom n''est mentionné dans le livre des Juges (mais on en trouve un en 1Ch 7.17). LXX le remplace par Baraq, l''allié de la prophétesse Débora en Jg 4–5. Certains commentateurs juifs pensent que ce nom pourrait être une abréviation de fils de Dan et désigner par conséquent Samson (Jg 13–16), membre de la tribu de Dan. –  Jephté  : cf. Jg 11.1–12.7. –  habiter en sécurité  : voir par exemple Dt 12.10 ; Jg 18.7 ; 1R 5.5.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a envoyé Yeroub-Baal, puis Bedân, Jephté et Samuel. Il vous a délivrés de la main des ennemis qui vous entouraient, et vous avez pu habiter en sécurité. '
  '12':
  - type: note
    content: 'arrivait sur vous  : autre traduction venait contre vous. –  Il faut…  : cette exigence n''est pas mentionnée explicitement dans le chap. 11, relatif à Nahash, mais elle correspond à la demande du peuple en 8.5,19n  ; 10.19. –  c''est le Seigneur …  : cf. Jg 8.23 ; Es 33.22 ; Ps 93.1 ; 96.10 ; 97.1 ; 99.1.'
  - type: text
    content: 'Puis, voyant que Nahash, roi des Ammonites, arrivait sur vous, vous m''avez dit : « Non ! Il faut qu''un roi règne sur nous ! », alors que c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, qui est votre roi. '
  '13':
  - type: note
    content: 'choisi  : cf. 8.18. –  celui que vous avez demandé 10.19 ; cf. 1.17n,20n,28n  ; les mots correspondants sont absents de plusieurs mss de LXX. –  a placé un roi…  : autre traduction vous a donné un roi  ; cf. Os 13.11.'
  - type: text
    content: 'Maintenant, voici le roi que vous avez choisi, celui que vous avez demandé ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a placé un roi à votre tête. '
  '14':
  - type: note
    content: 'Cf. Lv 26.3-13 ; Dt 13.5 ; 28.1-14. –  Si vous craignez le Seigneur  : cf. Ec 7.18. –  aux ordres  : litt. à la bouche  ; de même au v. 15. –  vous suivrez…  : on peut aussi traduire cette fin de verset  : si vous suivez… sur vous, c''est bien, une telle conclusion (c''est bien) pouvant être sous-entendue en hébreu.'
  - type: text
    content: 'Si vous craignez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', si vous le servez, si vous l''écoutez et si vous n''êtes pas rebelles aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous suivrez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous et le roi qui règne sur vous. '
  '15':
  - type: note
    content: 'sera contre vous  : cf. Lv 26.14-33 ; Dt 28.15-68 ; Jos 24.20. –  comme elle a été contre vos pères  : litt. et contre vos pères  ; cf. Jg 2.13-15. LXX dit et contre votre roi.'
  - type: text
    content: 'Mais si vous n''écoutez pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et si vous êtes rebelles aux ordres du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sera contre vous, comme elle a été contre vos pères. '
  '16':
  - type: note
    content: tenez-vous debout ou restez en place, cf. v. 7 ; Ex 14.13 ; 2Ch 20.17. –  cette grande chose désigne un événement prodigieux, une intervention spectaculaire.
  - type: text
    content: 'Maintenant, tenez-vous debout, et regardez cette grande chose que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' va faire sous vos yeux. '
  '17':
  - type: note
    content: 'la moisson des blés  : dans le courant de mai-juin, période habituellement sans pluie dans la région ; cf. Pr 26.1. –  aujourd''hui ou actuellement. –  J''invoquerai le Seigneur  : cf. Ps 99.6. –  il fera retentir…  : litt. il donnera des voix et de la pluie  ; le mot correspondant à voix (ou bruit) désigne souvent le tonnerre, cf. Ex 9.23-33 ; Ps 18.14 ; 29.3. –  vous verrez bien  : litt. vous saurez et vous verrez  ; cf. 14.38 ; 1R 20.7.'
  - type: text
    content: 'N''est-ce pas la moisson des blés aujourd''hui ? J''invoquerai le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il fera retentir des coups de tonnerre et tomber la pluie. Ainsi vous verrez bien que vous avez très mal agi aux yeux du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en demandant un roi.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'eut une grande crainte  : autre traduction eut très peur  ; cf. v. 14 ( craignez ) ; Ex 14.31. Ici, au respect à l''égard de Dieu (et de Samuel) se mêle une certaine dose de crainte effective, face à leur puissance d''intervention.'
  - type: text
    content: 'Samuel invoqua le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le jour même, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit retentir des coups de tonnerre et tomber la pluie. Tout le peuple eut une grande crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de Samuel. '
  '19':
  - type: note
    content: 'Prie le Seigneur  : cf. 7.5+ ; Ex 9.28 ; Jc 5.16 ; 1Jn 5.16.'
  - type: text
    content: 'Tout le peuple dit à Samuel : Prie le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, pour nous, tes serviteurs, afin que nous ne mourions pas ; car nous avons ajouté à tous nos péchés celui de demander un roi. '
  '2':
  - type: note
    content: 'qui marchera devant vous  : cette expression suggère peut-être une idée de service plutôt que de domination ; cf. 2.30,35. –  je suis vieux  : cf. 8.1+. –  j''ai les cheveux blancs  : cf. Jb 15.10. –  Mes fils  : cf. 8.1,5. –  sont avec vous  : cette formule souligne peut-être qu''ils appartiennent à la nouvelle génération.'
  - type: text
    content: 'Maintenant, voici le roi qui marchera devant vous. Moi, je suis vieux, j''ai les cheveux blancs. Mes fils, eux, sont avec vous. Quant à moi, j''ai marché devant vous depuis ma jeunesse jusqu''à ce jour. '
  '20':
  - type: note
    content: 'N''ayez pas peur  : cf. Gn 50.19 ; Ex 20.20 ; Dt 31.6 ; Jos 10.25. –  de tout votre cœur  : cf. Dt 6.5 ; 10.12 ; 11.13 ; Jos 24.23.'
  - type: text
    content: 'Samuel dit au peuple : N''ayez pas peur ! Vous avez fait tout ce mal ; mais ne vous écartez pas du '
  - type: text
    content: Seigneur
  - type: text
    content: ', servez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' de tout votre cœur. '
  '21':
  - type: note
    content: 'Ne vous écartez pas  : cf. Ps 73.27. –  pour vous rallier à du néant  : litt. car derrière le néant ou le chaos (Gn 1.2n). Samuel désigne ainsi les faux dieux qu''on adore dans les idoles ; cf. Es 41.29 ; Jr 10.14s ; Ps 115.4ss. –  ni profit ni délivrance  : cf. Es 46.7 ; Jr 10.5 ; Jon 2.9.'
  - type: text
    content: 'Ne vous écartez pas de lui pour vous rallier à du néant, qui n''apporte ni profit ni délivrance, parce que ce n''est que du néant. '
  '22':
  - type: note
    content: 'ne délaissera pas son peuple  : cf. 1R 6.13 ; Ps 94.14 ; Rm 11.1s. –  à cause de son grand nom  : cf. Es 48.11 ; Ez 20.9 ; Ps 106.8. –  faire de vous son peuple  : cf. Dt 7.6ss ; 26.18 ; 27.9 ; 2S 7.24.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne délaissera pas son peuple, à cause de son grand nom : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a décidé de faire de vous son peuple. '
  '23':
  - type: note
    content: 'Jamais…  : cf. 2.30n. –  en cessant de prier  : cf. Ps 122.6-8 ; 137.5s. –  le chemin…  : cf. Dt 26.17 ; Ps 25.4s.'
  - type: text
    content: 'Jamais je ne pécherais contre le '
  - type: text
    content: Seigneur
  - type: text
    content: ' en cessant de prier pour vous ! Je vous enseignerai le chemin qui est bon et droit. '
  '24':
  - type: note
    content: 'les grandes choses qu''il a faites  : autre traduction comme il s''est montré grand avec vous  ; cf. Dt 29.2-4 ; Jl 2.21 ; Ps 126.2s.'
  - type: text
    content: 'Seulement craignez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et servez-le loyalement, de tout votre cœur : voyez les grandes choses qu''il a faites avec vous. '
  '25':
  - type: note
    content: 'vous serez emportés  : c.-à-d. vous périrez  ; cf. 26.10 ; 27.1 ; Gn 19.15,17 ; Jos 24.20.'
  - type: text
    content: Mais si vous faites du mal, vous serez emportés, vous et votre roi.
  '3':
  - type: note
    content: 'Déposez contre moi ou apportez votre témoignage contre moi. –  l''homme qui a reçu son onction ou son messie, c.-à-d. le roi  ; cf. 2.10n  ; 2S 1.14. – Liste des torts : voir Lv 5.21-24 ; Nb 16.15 ; Ac 20.33 ; 2Co 7.2 ; 1Th 2.5-10. –  un pot-de-vin  : litt. une rançon (voir expiation) ; cf. Ex 21.30n  ; 30.12,16 ; Nb 35.31ns ; Am 5.12n  ; Jb 36.18n  ; Pr 6.35n. –  fermer les yeux Lv 20.4+. –  je vous rendrai votre dû ou je vous en donnerai compensation, je le restituerai  ; cf. Lv 5.23. – Voir aussi « Samuel dans le Siracide  »♦.'
  - type: text
    content: 'Je suis là ! Déposez contre moi devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et devant l''homme qui a reçu son onction. De qui ai-je pris le bœuf ? De qui ai-je pris l''âne ? Qui ai-je opprimé ? Qui ai-je écrasé ? De qui ai-je accepté un pot-de-vin, pour fermer les yeux sur son cas ? Dites-le-moi, et je vous rendrai votre dû. '
  '4':
  - type: note
    content: Cf. Ps 15.
  - type: text
    content: 'Ils dirent : Tu ne nous as pas opprimés, tu ne nous as pas écrasés et tu n''as rien accepté de personne. '
  '5':
  - type: note
    content: 'Le peuple dit  : litt. il dit  ; le sujet au singulier désigne probablement le peuple. Quelques mss hébreux et plusieurs versions anciennes ont le pluriel ils dirent. –  Témoin ! c.-à-d. ils en sont témoins  ; l''hébreu biblique ne connaissait pas de mot équivalant à notre oui  ; pour donner une réponse affirmative, on reprenait le mot sur lequel l''interlocuteur avait mis l''accent, dans le cas particulier témoin, employé deux fois par Samuel. Cf. Ac 24.16 ; voir aussi Rm 1.9.'
  - type: text
    content: 'Il leur dit encore : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est témoin contre vous, et l''homme qui a reçu son onction est témoin en ce jour, que vous n''avez rien trouvé dans ma main. Le peuple dit : Témoin !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Comparer les v. 6-25 avec Dt 30.15-20 ; Jos 23.14–24.24 ; Jr 2.4-8 ; Mi 6.1-5 ; Ac 7. –  C''est le Seigneur qui  : LXX a lu le Seigneur en est témoin, lui qui… –  qui a nommé Moïse  : litt. qui a fait Moïse  ; autre traduction qui a agi avec Moïse . –  monter d''Egypte  : cf. Gn 12.10n  ; Ex 6.26 ; Mi 6.4 ; Ps 77.21.'
  - type: text
    content: 'Alors Samuel dit au peuple : C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' qui a nommé Moïse et Aaron, et qui a fait monter d''Egypte vos pères. '
  '7':
  - type: note
    content: 'tenez-vous debout ou tenez-vous là, cf. 3.10. –  sur tout…  : autre traduction pour tout…  ; LXX et je vous raconterai tout… –  ce que le Seigneur a fait pour la justice  : cf. Jg 5.11n.'
  - type: text
    content: 'Maintenant, tenez-vous debout ; j''entrerai en jugement avec vous devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', sur tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait pour la justice, avec vous et avec vos pères. '
  '8':
  - type: note
    content: 'Jacob… en Egypte  : cf. Gn 46. LXX ajoute ici avec ses fils, et que l''Egypte les opprima. –  ont crié vers le Seigneur  : cf. Ex 2.23. –  a envoyé Moïse et Aaron  : cf. Ex 3.10 ; 5–12 ; Ps 105.26. –  les ont fait habiter dans ce lieu  : le récit résumé ne fait pas mention de Josué ; cf. Jos 21.43.'
  - type: text
    content: 'Après que Jacob est venu en Egypte, vos pères ont crié vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a envoyé Moïse et Aaron qui ont fait sortir vos pères d''Egypte et les ont fait habiter dans ce lieu. '
  '9':
  - type: note
    content: 'ils ont oublié le Seigneur  : cf. Dt 6.12 ; 8.11 ; Jg 3.7. –  qui les a vendus  : cf. Jg 2.14+. –  à Sisera  : cf. Jg 4–5. –  aux Philistins  : cf. Jg 13–16. –  au roi de Moab  : cf. Jg 3.12-30. –  leur ont fait la guerre  : cf. Jg 10.9 ; 11.4-27.'
  - type: text
    content: 'Mais ils ont oublié le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, qui les a vendus à Sisera, le chef de l''armée de Hatsor, aux Philistins et au roi de Moab, qui leur ont fait la guerre. '
