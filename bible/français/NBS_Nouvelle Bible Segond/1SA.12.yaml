        text: leur ont fait la guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 10.9 ; 11.4-27.'
    marker-yv: yv-n
  - type: text
    text: 'Mais ils ont oublié le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu, qui les a vendus à Sisera, le chef de l''armée de Hatsor, aux Philistins et au roi de Moab, qui leur ont fait la guerre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ont crié vers le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 3.9+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nous avons '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
      - type: text
        text: '… les '
      - type: usfm
        marker: w
        children:
        - type: text
