          text: LXX
      - type: text
        text: ' a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' en est témoin, lui qui… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui a nommé Moïse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui a fait Moïse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui a agi avec Moïse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: monter d'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Gn 12.10'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 6.26 ; Mi 6.4 ; Ps 77.21.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Samuel dit au peuple : C''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' qui a nommé Moïse et Aaron, et qui a fait monter d''Egypte vos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tenez-vous debout '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tenez-vous là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur tout…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour tout…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et je vous raconterai tout… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ce que le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' a fait pour la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justice
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 5.11'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, tenez-vous debout ; j''entrerai en jugement avec vous devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', sur tout ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a fait pour la justice, avec vous et avec vos pères. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jacob… en Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 46. LXX ajoute ici '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: avec ses fils, et que l'Egypte les opprima
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ont crié vers le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 2.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: a envoyé Moïse et Aaron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 3.10 ; 5–12 ; Ps 105.26. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les ont fait habiter dans ce lieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le récit résumé ne fait pas mention de Josué ; cf. Jos 21.43.'
    marker-yv: yv-n
  - type: text
    text: 'Après que Jacob est venu en Egypte, vos pères ont crié vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a envoyé Moïse et Aaron qui ont fait sortir vos pères d''Egypte et les ont fait habiter dans ce lieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '12.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ils ont oublié le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 6.12 ; 8.11 ; Jg 3.7. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui les a vendus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 2.14+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Sisera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 4–5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aux Philistins
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 13–16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au roi de Moab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 3.12-30. –  '
    - type: usfm
      marker: fq
      children:
