document_id: PSA.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Auprès de toi est la source de la vie
  - type: text
    content: ' '
  - type: note
    content: Cf. 18.1.
  - type: text
    content: 'Du chef de chœur. Du serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: . De David.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'la source de la vie  : cf. Jr 2.13+ ; Za 14.8 ; Jn 4.14+. –  par ta lumière 4.7 ; 27.1 ; 43.3 ; 44.4 ; 80.4,8,20 ; 89.16 ; Jn 8.12+. –  nous voyons la lumière  : cf. 49.20 ; 56.14 ; Jb 3.16.'
  - type: text
    content: Car auprès de toi est la source de la vie ;
  - type: text
    content: par ta lumière nous voyons la lumière.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Conserve ta fidélité 109.12 ; Jr 31.3. –  ceux qui te connaissent  : cf. 9.11 ; 79.6 ; 87.4.'
  - type: text
    content: Conserve ta fidélité à ceux qui te connaissent,
  - type: text
    content: et ta justice à ceux qui ont le cœur droit !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'les pieds / les mains  : litt. le pied / la main  ; cf. 110.1. –  de l''orgueilleux  : litt. de l''orgueil.'
  - type: text
    content: Que les pieds de l'orgueilleux ne viennent pas jusqu'à moi,
  - type: text
    content: et que les mains des méchants ne me fassent pas fuir !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'C''est là que tombent  : cf. 14.5 ; 73.17ss ; Os 14.10. –  malfaisants v. 4n  ; 5.6n. –  ne peuvent pas se relever 18.39.'
  - type: text
    content: C'est là que tombent les malfaisants ;
  - type: text
    content: ils sont renversés et ne peuvent pas se relever.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la déclaration  : le terme signale assez fréquemment les déclarations divines, notamment chez les prophètes (cf. Gn 22.16 ; Es 1.24 etc.) ; on pourrait aussi traduire la parole de révolte du méchant  ; certains modifient le texte hébreu traditionnel pour lire la transgression plaît au méchant. –  de mon cœur  : quelques mss hébreux et des versions anciennes portent de son cœur  ; à la première personne l''expression pourrait signifier je ne peux pas m''empêcher d''y penser. –  aucune frayeur de Dieu…  : cf. 10.4,11,13 ; 14.1,3 ; 73.11s ; 94.7s ; Rm 3.18. Voir crainte.'
  - type: text
    content: Pour le méchant, la déclaration de transgression est au fond de mon cœur,
  - type: text
    content: aucune frayeur de Dieu devant ses yeux.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction  : il se regarde avec trop de complaisance… pour trouver (c.-à-d. reconnaître ) sa faute et la détester  ; cf. 10.5 ; voir aussi 10.15n  ; 17.3 ; Gn 44.16 ; 1S 29.3,6 ; Os 12.9 ; sur le terme correspondant ici à complaisance , voir 5.10n.'
  - type: text
    content: Car il se regarde avec complaisance,
  - type: text
    content: pour consommer sa faute, pour assouvir sa haine.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'malfaisance  : cf. v. 5,13 ; 5.6+ ; 41.7 ; 55.4. –  bon sens ou prudence, discernement  ; on pourrait comprendre il renonce à avoir du bon sens pour faire le bien  ; Pr 10.5,19 ; 14.35 ; 15.24.'
  - type: text
    content: Les paroles de sa bouche sont malfaisance et tromperie ;
  - type: text
    content: il renonce au bon sens, au bien.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'des plans malfaisants (v. 4n) sur son lit  : cf. 4.5 ; Mi 2.1. –  une voie qui n''est pas bonne Es 65.2n  ; Pr 16.29.'
  - type: text
    content: Il prépare des plans malfaisants sur son lit,
  - type: text
    content: il se tient sur une voie qui n'est pas bonne,
  - type: text
    content: il ne rejette pas le mal.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 57.11s ; 108.5s ; Ep 3.18s.
  - type: text
    content: Seigneur
  - type: text
    content: ', ta fidélité est dans le ciel,'
  - type: text
    content: ta constance va jusqu'aux nues.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Voir justice. –  les montagnes de Dieu (hébreu ’El , cf. Gn 21.33n) : l''expression signifie probablement ici les plus hautes montagnes  ; cf. 50.10 ; 68.16 ; 80.11 ; Es 14.13n. –  le grand abîme  : cf. 24.2 ; voir aussi 107.26 ; 148.7 ; Gn 7.11 ; 49.25. –  les humains et les bêtes 104.14,21,27s ; 147.9 ; Jb 38.39ss.'
  - type: text
    content: Ta justice est comme les montagnes de Dieu,
  - type: text
    content: tes jugements comme le grand abîme.
  - type: text
    content: Seigneur
  - type: text
    content: ', tu sauves les humains et les bêtes.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Combien… 8.2,5 ; 31.20 ; 104.24. –  A l''ombre de tes ailes 17.8+. –  les humains  : litt. les fils d''humains  ; cf. 65.3.'
  - type: text
    content: Combien précieuse est ta fidélité, ô Dieu !
  - type: text
    content: A l'ombre de tes ailes les humains trouvent un abri.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Ils se rassasient  : litt. ils s''abreuvent . –  de l''abondance  : litt. de la graisse  ; cf. 23.5 ; 63.6 ; 65.5 ; Gn 45.18n  ; Lv 3.3n  ; Es 43.24 ; Jr 31.14 ; voir aussi Jb 36.16n. –  au torrent…  : le même terme est traduit par oued en 83.10 ; cf. Gn 26.17n  ; Jb 6.15n  ; voir aussi 46.5 ; 65.10 ; Ez 47.1ss ; Jl 4.18 ; Ap 22.1. –  délices  : le même mot a donné le nom propre Eden (Gn 2.8n).'
  - type: text
    content: Ils se rassasient de l'abondance de ta maison,
  - type: text
    content: et tu les fais boire au torrent de tes délices.
