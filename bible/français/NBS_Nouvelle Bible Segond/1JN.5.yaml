document_id: 1JN.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Croire le témoignage de Dieu
  - type: text
    content: ' '
  - type: note
    content: 'que Jésus est le Christ 2.22 ; cf. 4.15+ ; 5.5 ; Jn 11.26 ; Ac 9.22. –  né de Dieu 2.29+ ; cf. 4.7 ; 5.20n. –  celui qui fait naître (ou qui engendre ), ou bien qui a fait naître ( qui a engendré ) : le temps du verbe grec évoque un acte ponctuel, sans indication temporelle à proprement parler ; de même v. 18n, à la voix passive. –  aime aussi… 4.20s ; cf. Jn 8.42 ; 1P 1.22s.'
  - type: text
    content: 'Quiconque croit que Jésus est le Christ est né de Dieu, et quiconque aime celui qui fait naître aime aussi celui qui est né de lui. '
  '10':
  - type: note
    content: 'met sa foi / n''a pas foi  : le même verbe est traduit par croire aux v. 1,5. –  Fils de Dieu 4.15+. –  a ce témoignage  : cf. Jn 3.33,36 ; Rm 8.14-16 ; voir Ap 12.17n. –  fait de lui un menteur 1.10 ; cf. 1Co 15.15. –  n''a pas mis sa foi dans le témoignage Jn 5.37-40.'
  - type: text
    content: Celui qui met sa foi dans le Fils de Dieu a ce témoignage en lui-même ; celui qui n'a pas foi en Dieu fait de lui un menteur, puisqu'il n'a pas mis sa foi dans le témoignage que Dieu a rendu à son Fils.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.5. –  la vie éternelle  : cf. v. 20 ; Jn 3.15+ ; 5.37-40 ; 17.3.'
  - type: text
    content: 'Ce témoignage, c''est que Dieu nous a donné la vie éternelle ; et cette vie est en son Fils. '
  '12':
  - type: note
    content: Cf. 2.23 ; Jn 3.36 ; 2Jn 9.
  - type: text
    content: Celui qui a le Fils a la vie ; celui qui n'a pas le Fils de Dieu n'a pas la vie.
  - type: heading
    content: L'assurance de la foi
  '13':
  - type: text
    content: ' '
  - type: note
    content: Jn 20.31. –  qui mettez votre foi dans le nom… 3.23 ; Jn 1.12n.
  - type: text
    content: 'Cela, je vous l''ai écrit pour que vous sachiez que vous avez la vie éternelle, vous qui mettez votre foi dans le nom du Fils de Dieu. '
  '14':
  - type: note
    content: '3.21-22+. –  il nous entend  : autre traduction il nous écoute ; il nous exauce (Jn 9.31n  ; 11.41s).'
  - type: text
    content: 'L''assurance que nous avons auprès de lui, c''est que, si nous demandons quoi que ce soit selon sa volonté, il nous entend. '
  '15':
  - type: note
    content: Cf. Mc 11.24 ; Jc 1.5.
  - type: text
    content: Et si nous savons qu'il nous entend, quoi que nous demandions, nous savons que nous avons ce que nous lui avons demandé.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'commettre un péché…  : litt. péchant d''un péché (qui n''est) pas pour la mort , cf. Jn 11.4 ; voir aussi 5.14 ; 8.19ss ; sur le thème du péché impardonnable, voir Nb 15.30 ; Dt 22.26n  ; Mc 3.28s/ / ; Hé 6.4-6 ; 10.26s ; 2P 2.20s ; Ap 20.6,14 ; ici l''allusion semble viser les adversaires de la communauté (voir l''introduction♦). –  qu''il demande Jc 5.16ss. –  il lui donnera la vie  : l''expression pourrait signifier celui qui prie lui donnera la vie  ; mais il faut peut-être entendre Dieu lui donnera la vie . –  ce n''est pas…  : cf. Jn 17.9. –  demander traduit deux verbes grecs différents dans ce v. ; voir Jn 14.16n.'
  - type: text
    content: 'Si quelqu''un voit son frère commettre un péché qui ne mène pas à la mort, qu''il demande, et il lui donnera la vie ; il s''agit de ceux qui commettent un péché qui ne mène pas à la mort. Il y a un péché qui mène à la mort, ce n''est pas pour celui-là que je dis de demander. '
  '17':
  - type: note
    content: 'Toute injustice est péché  : cf. 1.9 ; 3.4n.'
  - type: text
    content: Toute injustice est péché – et il y a un péché qui ne mène pas à la mort.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Nous savons  : cf. v. 19s. –  né de Dieu 2.29+. –  ne pèche pas 3.6+,9. –  celui qui naît ou qui est né  : même verbe que dans l''expression quiconque est né , mais à un autre temps (comme au v. 1n) ; cf. 3.7s. –  le garde  : certains mss portent se garde lui-même  ; cf. Jn 17.11s,15+ ; Jd 1. –  le Mauvais 2.13+. –  ne le touche pas cf. Jn. 14.30.'
  - type: text
    content: 'Nous savons que quiconque est né de Dieu ne pèche pas ; mais celui qui naît de Dieu le garde, et le Mauvais ne le touche pas. '
  '19':
  - type: note
    content: 'nous sommes de Dieu 4.6+. –  le monde entier…  : cf. 2.15-17 ; Jn 1.10n  ; 12.31+ ; Ga 1.4+ ; Col 1.13.'
  - type: text
    content: 'Nous savons que nous sommes de Dieu, et que le monde entier gît au pouvoir du Mauvais. '
  '2':
  - type: note
    content: 'Cf. 2.3+ ; 3.23. –  agissons selon  : litt. faisons. –  commandements  : voir loi.'
  - type: text
    content: 'A ceci nous savons que nous aimons les enfants de Dieu : quand nous aimons Dieu et que nous agissons selon ses commandements. '
  '20':
  - type: note
    content: 'est venu  : autre verbe qu''en 4.2, comme en Jn 8.42 ; Ap 2.25 ; on pourrait aussi traduire est arrivé. –  l''intelligence  : cf. Jr 31.33 ; Jn 1.18 ; Ep 1.17s ; Col 1.10. –  pour que nous connaissions  : sur le temps du verbe, cf. 4.6ns. –  le vrai Dieu  : cf. Jn 17.3 ; 20.28 ; Rm 9.5. –  la vie éternelle v. 11+ ; Jn 11.25+. – Autre traduction  : C''est lui qui est le Vrai ; il est Dieu et la vie éternelle  ; cf. Ap 3.7+.'
  - type: text
    content: Mais nous savons aussi que le Fils de Dieu est venu, et qu'il nous a donné l'intelligence pour que nous connaissions celui qui est le Vrai ; et nous sommes dans le Vrai, en son Fils Jésus-Christ. C'est lui le vrai Dieu et la vie éternelle.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'gardez-vous  : cf. 2P 3.17. –  des idoles  : cf. Ez 11.19-21 ; 1Co 10.14 ; cf. la conclusion de la Lettre de Jérémie (v. 72) : « Mieux vaut donc un homme juste qui n''a pas d''idoles : il sera à l''abri de la honte. »'
  - type: text
    content: Mes enfants, gardez-vous des idoles.
  '3':
  - type: note
    content: 'Cf. 2.5 ; Jn 14.15+ ; 2Jn 6. –  pas un fardeau  : litt. pas lourds, cf. Dt 30.11 ; Mt 11.29s ; 23.4 ; Ap 2.24.'
  - type: text
    content: 'Car l''amour de Dieu, c''est que nous gardions ses commandements. Et ses commandements ne sont pas un fardeau, '
  '4':
  - type: note
    content: 'né de Dieu v. 1. –  est vainqueur du (litt. vainc, comme en 2.13+) monde Jn 1.10n  ; 16.33. –  foi  : cf. Ep 6.16.'
  - type: text
    content: parce que tout ce qui est né de Dieu est vainqueur du monde ; et la victoire qui a vaincu le monde, c'est notre foi.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Jésus est le Fils de Dieu Mt 16.16+ ; Jn 1.34+.
  - type: text
    content: 'Qui est vainqueur du monde, sinon celui qui croit que Jésus est le Fils de Dieu ? '
  '6':
  - type: note
    content: 'eau / sang / Esprit  : cf. Jn 1.31,33 ; 3.5 ; 19.34. –  avec  : litt. dans. –  avec le sang  : certains mss ajoutent et avec l''Esprit. –  témoignage Jn 15.26 ; cf. 19.35. –  l''Esprit est la vérité (1.6+) : cf. Jn 4.23s ; 14.17+ ; 17.17.'
  - type: text
    content: 'C''est lui, Jésus-Christ, qui est venu par l''eau et le sang ; non pas avec l''eau seulement, mais avec l''eau et avec le sang ; et c''est l''Esprit qui rend témoignage, parce que l''Esprit est la vérité. '
  '7':
  - type: note
    content: 'trois… témoignage  : cf. Dt 19.15 ; Jn 5.31-37. – A la fin du v. certains mss très tardifs ajoutent dans le ciel : le Père, la Parole (comme en Jn 1.1n) et l''Esprit saint ; et ces trois sont un. (8) Et il y en a trois qui rendent témoignage sur la terre : l''Esprit, l''eau…'
  - type: text
    content: 'Car il y en a trois qui rendent témoignage : '
  '8':
  - type: note
    content: sont d'accord ou sont un, litt. sont vers l'un, c.-à-d. convergent (cf. v. 11) ou aboutissent à l'unité ; cf. Jn 11.52n  ; 17.23n.
  - type: text
    content: 'l''Esprit, l''eau et le sang, et les trois sont d''accord. '
  '9':
  - type: note
    content: Jn 5.32,36s ; 8.18.
  - type: text
    content: 'Si nous recevons le témoignage des humains, le témoignage de Dieu est plus grand ; car le témoignage de Dieu, c''est qu''il rend témoignage à son Fils. '
