document_id: 1JN.5,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Croire le témoignage de Dieu
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que Jésus est le Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.22 ; cf. 4.15+ ; 5.5 ; Jn 11.26 ; Ac 9.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'né de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.29+ ; cf. 4.7 ; 5.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'celui qui fait naître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui engendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), ou bien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui a fait naître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui a engendré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : le temps du verbe grec évoque un acte ponctuel, sans indication temporelle à proprement parler ; de même v. 18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', à la voix passive. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aime aussi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 4.20s ; cf. Jn 8.42 ; 1P 1.22s.
      marker-yv: yv-n
    - type: text
      text: 'Quiconque croit que Jésus est le Christ est né de Dieu, et quiconque aime celui qui fait naître aime aussi celui qui est né de lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'met sa foi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: n'a pas foi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'croire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 1,5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Fils de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: a ce témoignage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 3.33,36 ; Rm 8.14-16 ; voir Ap 12.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fait de lui un menteur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.10 ; cf. 1Co 15.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'n''a pas mis sa foi dans le témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jn 5.37-40.
      marker-yv: yv-n
    - type: text
      text: Celui qui met sa foi dans le Fils de Dieu a ce témoignage en lui-même ; celui qui n'a pas foi en Dieu fait de lui un menteur, puisqu'il n'a pas mis sa foi dans le témoignage que Dieu a rendu à son Fils.
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la vie éternelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 20 ; Jn 3.15+ ; 5.37-40 ; 17.3.'
      marker-yv: yv-n
    - type: text
      text: 'Ce témoignage, c''est que Dieu nous a donné la vie éternelle ; et cette vie est en son Fils. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2.23 ; Jn 3.36 ; 2Jn 9.
      marker-yv: yv-n
    - type: text
      text: Celui qui a le Fils a la vie ; celui qui n'a pas le Fils de Dieu n'a pas la vie.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'assurance de la foi
    marker-yv: yv-h
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jn 20.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui mettez votre foi dans le nom… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 3.23 ; Jn 1.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Cela, je vous l''ai écrit pour que vous sachiez que vous avez la vie éternelle, vous qui mettez votre foi dans le nom du Fils de Dieu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.21-22+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il nous entend
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il nous écoute ; il nous exauce '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Jn 9.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.41s).'
      marker-yv: yv-n
    - type: text
      text: 'L''assurance que nous avons auprès de lui, c''est que, si nous demandons quoi que ce soit selon sa volonté, il nous entend. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Mc 11.24 ; Jc 1.5.
      marker-yv: yv-n
    - type: text
      text: Et si nous savons qu'il nous entend, quoi que nous demandions, nous savons que nous avons ce que nous lui avons demandé.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: commettre un péché…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: péchant d'un péché (qui n'est) pas pour la mort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jn 11.4 ; voir aussi 5.14 ; 8.19ss ; sur le thème du péché impardonnable, voir Nb 15.30 ; Dt 22.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mc 3.28s/ / ; Hé 6.4-6 ; 10.26s ; 2P 2.20s ; Ap 20.6,14 ; ici l''allusion semble viser les adversaires de la communauté (voir l''introduction♦). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qu''il demande '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jc 5.16ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il lui donnera la vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''expression pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: celui qui prie lui donnera la vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; mais il faut peut-être entendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Dieu lui donnera la vie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce n'est pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jn 17.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'demander '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduit deux verbes grecs différents dans ce v. ; voir Jn 14.16
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un voit son frère commettre un péché qui ne mène pas à la mort, qu''il demande, et il lui donnera la vie ; il s''agit de ceux qui commettent un péché qui ne mène pas à la mort. Il y a un péché qui mène à la mort, ce n''est pas pour celui-là que je dis de demander. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Toute injustice est péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.9 ; 3.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Toute injustice est péché – et il y a un péché qui ne mène pas à la mort.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Nous savons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 19s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'né de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne pèche pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.6+,9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'celui qui naît '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui est né
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même verbe que dans l''expression '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quiconque est né
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais à un autre temps (comme au v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; cf. 3.7s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le garde
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se garde lui-même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. Jn 17.11s,15+ ; Jd 1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le Mauvais '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '2.13+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ne le touche pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: cf. Jn. 14.30.
      marker-yv: yv-n
    - type: text
      text: 'Nous savons que quiconque est né de Dieu ne pèche pas ; mais celui qui naît de Dieu le garde, et le Mauvais ne le touche pas. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous sommes de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le monde entier…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2.15-17 ; Jn 1.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 12.31+ ; Ga 1.4+ ; Col 1.13.'
      marker-yv: yv-n
    - type: text
      text: 'Nous savons que nous sommes de Dieu, et que le monde entier gît au pouvoir du Mauvais. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 2.3+ ; 3.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: agissons selon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faisons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: commandements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'A ceci nous savons que nous aimons les enfants de Dieu : quand nous aimons Dieu et que nous agissons selon ses commandements. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: est venu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre verbe qu''en 4.2, comme en Jn 8.42 ; Ap 2.25 ; on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: est arrivé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'intelligence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 31.33 ; Jn 1.18 ; Ep 1.17s ; Col 1.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour que nous connaissions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sur le temps du verbe, cf. 4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le vrai Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 17.3 ; 20.28 ; Rm 9.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la vie éternelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 11+ ; Jn 11.25+. – Autre traduction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: C'est lui qui est le Vrai ; il est Dieu et la vie éternelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ap 3.7+.'
      marker-yv: yv-n
    - type: text
      text: Mais nous savons aussi que le Fils de Dieu est venu, et qu'il nous a donné l'intelligence pour que nous connaissions celui qui est le Vrai ; et nous sommes dans le Vrai, en son Fils Jésus-Christ. C'est lui le vrai Dieu et la vie éternelle.
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gardez-vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2P 3.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des idoles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 11.19-21 ; 1Co 10.14 ; cf. la conclusion de la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Lettre de '
        - type: usfm
          marker: w
          children:
          - type: text
