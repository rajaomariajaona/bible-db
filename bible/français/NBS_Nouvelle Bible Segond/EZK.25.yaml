        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: s.
      marker-yv: yv-n
    - type: text
      text: 'à cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : J''étends la main sur Edom, j''en retranche les humains et les bêtes, je le réduis en ruines depuis Témân jusqu''à Dedân ; ils tomberont par l''épée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'par l''intermédiaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par la main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'd''Israël… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ab 18.
      marker-yv: yv-n
    - type: text
      text: 'J''exercerai ma vengeance contre Edom par l''intermédiaire d''Israël, mon peuple ; il traitera Edom selon ma colère et ma fureur ; ainsi ils connaîtront ma vengeance – déclaration du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: .
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les Philistins
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Philistins
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à l''ouest ; jadis soumis à Juda (1R 5.1), ils ont vraisemblablement profité de l''invasion babylonienne pour secouer leur joug ; cf. Es 11.14+ ; Jr 47.1-7 ; Jl 4.4-8 ; Am 1.6-8 ; So 2.4-7 ; Za 9.5-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'hostilité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (Gn 3.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de toujours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jg 15–16.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Parce que les Philistins ont agi par vengeance, parce qu''ils se sont vengés avec mépris et du fond de l''âme, pour détruire, dans leur hostilité de toujours ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
