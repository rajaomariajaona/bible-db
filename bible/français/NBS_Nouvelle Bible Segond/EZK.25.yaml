        children:
        - type: text
          text: les Ammonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à l''est de Juda 21.25,33+ ; cf. Gn 19.36-38 ; 2R 24.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parle… en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Humain, tourne-toi vers les Ammonites et parle sur eux en prophète ! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ah ! ah ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 26.2 ; 36.2 ; Es 44.16 ; Ps 35.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',25 ; 40.16.'
      marker-yv: yv-n
    - type: text
      text: 'Tu diras aux Ammonites : Ecoutez la parole du Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  ! Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Parce que tu as dit : « Ah ! ah ! » sur mon sanctuaire quand il a été profané, sur la terre d''Israël quand elle a été dévastée, et sur la maison de Juda quand ils sont partis en exil, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en possession
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 10 ; 11.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' de l''Orient'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les nomades du désert situé à l''est d''Ammon, qui envahiront son territoire ; cf. Gn 29.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jg 6.3 ; Jb 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'à cause de cela, je te donne en possession aux fils de l''Orient ; ils installeront au milieu de toi leurs campements, ils placeront au milieu de toi leurs demeures ; ce sont eux qui mangeront ton fruit, ce sont eux qui boiront ton lait. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Rabba '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: du pays des Ammonites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Ammonites.
      marker-yv: yv-n
    - type: text
      text: 'Je ferai de Rabba un domaine pour les chameaux, et du pays des Ammonites un bercail pour le petit bétail. Ainsi vous saurez que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH). '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Pr 24.17. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: battu des mains…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 6.11 (autre verbe hébreu). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'du fond de l''âme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 15 ; on pourrait aussi traduire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'âprement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 16.27
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : Parce que tu as battu des mains et tapé du pied, parce que tu t''es réjoui de tout ton mépris et du fond de l''âme au sujet de la terre d''Israël, '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '25.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à cause de cela '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 9,13,16 ; terme inconnu par ailleurs. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''étends la main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 13,16 ; 6.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au pillage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après une lecture traditionnelle et certains mss (cf. 26.5 ; 34.8,22,28 ; 36.4 ; So 2.9s) ; l''autre lecture traditionnelle comporte un terme inconnu.'
      marker-yv: yv-n
    - type: text
      text: 'à cause de cela j''étends la main sur toi ; je te livrerai au pillage des nations, je te retrancherai d''entre les peuples, je te ferai disparaître des pays, je te détruirai. Ainsi tu sauras que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les Moabites
    marker-yv: yv-h
