          text: aux fils de l'Orient et aux Ammonites ; aux fils de l'Orient qui marchent contre les Ammonites.
      marker-yv: yv-n
    - type: text
      text: 'aux fils de l''Orient ; en plus des Ammonites, je le leur donne en possession, afin qu''on ne se souvienne plus des Ammonites parmi les nations. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'J''exécuterai mes jugements contre Moab, et ainsi ils sauront que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH).'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Contre les Edomites
