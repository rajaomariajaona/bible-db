        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il s''est mis en tort '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il s'est rendu coupable
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Jl 4.19 ; Am 1.11 ; Ab 11 ; Ps 137.7 ; à la suite de la dévastation de Juda, Edom a réussi à étendre sa domination sur la région du sud de Juda qui a reçu le nom d'Idumée (cf. Mc 3.8). Il a dû plus tard se replier sur cette région devant la pression nabatéenne à l'est.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : A cause des actes de vengeance auxquels Edom s''est livré envers la maison de Juda, parce qu''il s''est mis en tort en se vengeant d''eux, '
  '13':
  - type: usfm
    marker: p
