      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Dedân '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '27.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
