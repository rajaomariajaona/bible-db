        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 47.4 ; Am 9.7 ; So 2.5s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui reste…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le reste de la côte de la mer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Am 1.8.'
      marker-yv: yv-n
    - type: text
      text: 'à cause de cela, ainsi parle le Seigneur '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Dieu
    - type: text
      text: '  : J''étends la main sur les Philistins ; je retrancherai les Kérétites et je ferai disparaître ce qui reste sur la côte de la mer. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'J''exercerai sur eux de grandes et furieuses vengeances. Ainsi ils sauront que je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), quand j''exercerai sur eux ma vengeance.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
