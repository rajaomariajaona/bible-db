document_id: EZK.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Contre les Ammonites
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' me parvint :'
  '10':
  - type: note
    content: en plus des Ammonites, peut-être déjà échus en partage aux fils de l'Orient (v. 4n) ; autres traductions aux fils de l'Orient et aux Ammonites ; aux fils de l'Orient qui marchent contre les Ammonites.
  - type: text
    content: 'aux fils de l''Orient ; en plus des Ammonites, je le leur donne en possession, afin qu''on ne se souvienne plus des Ammonites parmi les nations. '
  '11':
  - type: text
    content: 'J''exécuterai mes jugements contre Moab, et ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Contre les Edomites
  '12':
  - type: text
    content: ' '
  - type: note
    content: Edom , au sud 35.1-15 ; Es 34.5n. –  il s'est mis en tort ou il s'est rendu coupable  ; cf. Jl 4.19 ; Am 1.11 ; Ab 11 ; Ps 137.7 ; à la suite de la dévastation de Juda, Edom a réussi à étendre sa domination sur la région du sud de Juda qui a reçu le nom d'Idumée (cf. Mc 3.8). Il a dû plus tard se replier sur cette région devant la pression nabatéenne à l'est.
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : A cause des actes de vengeance auxquels Edom s''est livré envers la maison de Juda, parce qu''il s''est mis en tort en se vengeant d''eux, '
  '13':
  - type: note
    content: à cause de cela v. 7+ ; cf. 35.3,7. –  Témân 47.19n  ; Gn 36.11+ ; Jb 2.11n. –  Dedân 27.12n  ; 38.13 ; Gn 10.7+ ; Es 21.13ns.
  - type: text
    content: 'à cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : J''étends la main sur Edom, j''en retranche les humains et les bêtes, je le réduis en ruines depuis Témân jusqu''à Dedân ; ils tomberont par l''épée. '
  '14':
  - type: note
    content: par l'intermédiaire (litt. par la main) d'Israël… Ab 18.
  - type: text
    content: 'J''exercerai ma vengeance contre Edom par l''intermédiaire d''Israël, mon peuple ; il traitera Edom selon ma colère et ma fureur ; ainsi ils connaîtront ma vengeance – déclaration du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Contre les Philistins
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'les Philistins , à l''ouest ; jadis soumis à Juda (1R 5.1), ils ont vraisemblablement profité de l''invasion babylonienne pour secouer leur joug ; cf. Es 11.14+ ; Jr 47.1-7 ; Jl 4.4-8 ; Am 1.6-8 ; So 2.4-7 ; Za 9.5-7. –  hostilité (Gn 3.15n) de toujours  : cf. Jg 15–16.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que les Philistins ont agi par vengeance, parce qu''ils se sont vengés avec mépris et du fond de l''âme, pour détruire, dans leur hostilité de toujours ; '
  '16':
  - type: note
    content: 'à cause… v. 7+. –  Kérétites ou Crétois, autre nom des Philistins ; cf. Gn 10.14n  ; Dt 2.23 ; 1S 30.14n  ; Jr 47.4 ; Am 9.7 ; So 2.5s. –  ce qui reste…  : litt. le reste de la côte de la mer  ; cf. Am 1.8.'
  - type: text
    content: 'à cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : J''étends la main sur les Philistins ; je retrancherai les Kérétites et je ferai disparaître ce qui reste sur la côte de la mer. '
  '17':
  - type: text
    content: 'J''exercerai sur eux de grandes et furieuses vengeances. Ainsi ils sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand j''exercerai sur eux ma vengeance.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'tourne-toi  : litt. tourne ta face 4.3+. –  les Ammonites , à l''est de Juda 21.25,33+ ; cf. Gn 19.36-38 ; 2R 24.2. –  parle… en prophète 4.7n.'
  - type: text
    content: 'Humain, tourne-toi vers les Ammonites et parle sur eux en prophète ! '
  '3':
  - type: note
    content: Ah ! ah ! 26.2 ; 36.2 ; Es 44.16 ; Ps 35.21n,25 ; 40.16.
  - type: text
    content: 'Tu diras aux Ammonites : Ecoutez la parole du Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  ! Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que tu as dit : « Ah ! ah ! » sur mon sanctuaire quand il a été profané, sur la terre d''Israël quand elle a été dévastée, et sur la maison de Juda quand ils sont partis en exil, '
  '4':
  - type: note
    content: 'en possession  : cf. v. 10 ; 11.15. –  fils de l''Orient  : les nomades du désert situé à l''est d''Ammon, qui envahiront son territoire ; cf. Gn 29.1n  ; Jg 6.3 ; Jb 1.3n.'
  - type: text
    content: 'à cause de cela, je te donne en possession aux fils de l''Orient ; ils installeront au milieu de toi leurs campements, ils placeront au milieu de toi leurs demeures ; ce sont eux qui mangeront ton fruit, ce sont eux qui boiront ton lait. '
  '5':
  - type: note
    content: 'Rabba 21.25+. –  du pays des Ammonites  : litt. des Ammonites.'
  - type: text
    content: 'Je ferai de Rabba un domaine pour les chameaux, et du pays des Ammonites un bercail pour le petit bétail. Ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '6':
  - type: note
    content: 'Cf. Pr 24.17. –  battu des mains…  : cf. 6.11 (autre verbe hébreu). –  du fond de l''âme v. 15 ; on pourrait aussi traduire âprement (cf. 16.27n).'
  - type: text
    content: 'Car ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que tu as battu des mains et tapé du pied, parce que tu t''es réjoui de tout ton mépris et du fond de l''âme au sujet de la terre d''Israël, '
  '7':
  - type: note
    content: à cause de cela v. 9,13,16 ; terme inconnu par ailleurs. –  j'étends la main v. 13,16 ; 6.14+. –  au pillage, d'après une lecture traditionnelle et certains mss (cf. 26.5 ; 34.8,22,28 ; 36.4 ; So 2.9s) ; l'autre lecture traditionnelle comporte un terme inconnu.
  - type: text
    content: 'à cause de cela j''étends la main sur toi ; je te livrerai au pillage des nations, je te retrancherai d''entre les peuples, je te ferai disparaître des pays, je te détruirai. Ainsi tu sauras que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Contre les Moabites
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Moab , au sud-est ; cf. Es 15.1n. –  Séir  : nom du territoire d''Edom (v. 12ss ; 35 ; cf. Gn 32.4 ; Nb 24.18), ne figure pas dans LXX. –  comme toutes les nations  : c.-à-d. elle n''est plus l''objet d''un traitement de faveur ; cf. 20.32 ; Lm 4.12.'
  - type: text
    content: 'Ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: '  : Parce que Moab et Séir ont dit : « Elle est comme toutes les nations, la maison de Juda ! », '
  '9':
  - type: note
    content: 'j''ouvre  : autre traduction je dénude. –  le côté  : litt. l''épaule (cf. Es 11.14) ; autre traduction le flanc  ; l''expression désigne sans doute les falaises de la rive orientale du Jourdain. –  depuis les villes, depuis ses villes  : certains modifient le texte hébreu traditionnel pour lire et je rase ses villes. –  depuis ses extrémités autre traduction sans exception. –  le plus beau du pays ou l''ornement du pays  ; expression comparable en 20.6,15. –  Beth-Yeshimoth Jos 12.3 ; 13.20. –  Baal-Méôn Nb 32.38 ; cf. Jos 13.17. –  Qiriataïm Jos 13.19.'
  - type: text
    content: 'à cause de cela, j''ouvre le côté de Moab depuis les villes, depuis ses villes, depuis ses extrémités – le plus beau du pays, Beth-Yeshimoth, Baal-Méôn et Qiriataïm – '
