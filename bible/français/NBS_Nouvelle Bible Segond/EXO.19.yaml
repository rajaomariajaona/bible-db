document_id: EXO.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: DIEU FAIT ALLIANCE AVEC ISRAËL
  - type: heading
    content: Dieu propose une alliance à Israël
  - type: text
    content: ' '
  - type: note
    content: 'jour pour jour  : litt. ce jour-là ou ce jour-ci  : l''ensemble du texte est peut-être destiné à une lecture commémorative pour l''anniversaire du don de la loi. –  Sinaï 16.1n  ; Nb 33.15.'
  - type: text
    content: 'Le troisième mois à compter de leur sortie d''Egypte, jour pour jour, les Israélites arrivèrent au désert du Sinaï. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 14 ; cf. Gn 35.2n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Va vers le peuple ; consacre-le, aujourd''hui et demain ; qu''ils lavent leurs vêtements. '
  '11':
  - type: note
    content: 'Qu''ils soient prêts  : cf. 34.2.'
  - type: text
    content: 'Qu''ils soient prêts pour le troisième jour ; car le troisième jour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' descendra, sous les yeux de tout le peuple, sur le mont Sinaï. '
  '12':
  - type: note
    content: 'au peuple  : une famille de mss hébreux porte à la montagne, cf. v. 23. –  Gardez-vous… 34.3. –  mort Hé 12.20.'
  - type: text
    content: 'Tu fixeras au peuple des limites tout autour, en disant : Gardez-vous de monter dans la montagne ou d''en toucher le bord. Quiconque touchera la montagne sera mis à mort. '
  '13':
  - type: note
    content: 'on le lapidera  : cf. Dt 13.10-11+. –  on le criblera de flèches, ou d''autres projectiles ; le complément est sous-entendu dans le texte et le verbe peut évoquer l''usage de diverses armes de trait ; il est traduit par précipiter en 15.4. –  Quand la corne… retentira (ou, peut-être, retentira longuement, d''une sonnerie traînante  ; même verbe en Jos 6.5). LXX quand les voix (= les tonnerres), les trompettes (ou les sonneries de trompette) et la nuée auront quitté la montagne  ; Syr quand la corne se sera tue vous pourrez monter. –  ceux-ci (litt. eux) monteront  : peut-être s''agit-il de ceux qui sont mentionnés en 24.1,9-11.'
  - type: text
    content: 'Celui-là, on ne portera pas la main sur lui, mais on le lapidera, ou bien on le criblera de flèches : que ce soit une bête ou un homme, il ne restera pas en vie. Quand la corne de bélier retentira, ceux-ci monteront dans la montagne.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: V. 10.
  - type: text
    content: 'Moïse descendit de la montagne vers le peuple ; il consacra le peuple, et ils lavèrent leurs vêtements. '
  '15':
  - type: note
    content: femme 1S 21.5 ; cf. Lv 15.18+.
  - type: text
    content: 'Il dit au peuple : Soyez prêts dans trois jours ; ne vous approchez pas d''une femme.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: coups de tonnerre 9.23n  ; cf. Dt 4.10-13 ; Ps 29 ; 50.3 ; 77.19 ; Ap 4.5 ; 8.5 ; 11.1 ; 16.18. –  nuée v. 9+.
  - type: text
    content: 'Le troisième jour, au matin, il y eut des coups de tonnerre, des éclairs et une épaisse nuée sur la montagne, avec un fort son de trompe ; tout le peuple qui était dans le camp se mit à trembler. '
  '17':
  - type: text
    content: 'Moïse fit sortir le peuple du camp à la rencontre de Dieu ; ils se tinrent debout au bas de la montagne. '
  '18':
  - type: note
    content: Cf. Ap 9.2.
  - type: text
    content: 'Le mont Sinaï était tout en fumée, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' y était descendu dans le feu ; sa fumée montait comme celle d''un fourneau, et toute la montagne tremblait avec violence. '
  '19':
  - type: note
    content: 'lui répondait  : litt. lui répondait par une voix, ou par le tonnerre  ; cf. v. 13,16n  ; 9.23n  ; 20.18 ; Ps 81.8.'
  - type: text
    content: 'Le son de la trompe se faisait de plus en plus fort. Moïse parlait, et Dieu lui répondait. '
  '2':
  - type: note
    content: Partis (12.37n) de Rephidim 17.1n.
  - type: text
    content: Partis de Rephidim, ils arrivèrent au désert du Sinaï et campèrent dans le désert ; Israël campa là, en face de la montagne.
  '20':
  - type: text
    content: 'Ainsi le '
  - type: text
    content: Seigneur
  - type: text
    content: ' descendit sur le mont Sinaï, au sommet de la montagne ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' appela Moïse au sommet de la montagne, et Moïse monta.'
  '21':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Descends, avertis le peuple, de peur qu''il ne se précipite vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour regarder, et qu''il n''en tombe un grand nombre. '
  '22':
  - type: note
    content: 'Voir prêtres. –  ne cause des pertes dans leurs rangs  : autres traductions n''explose parmi eux ; n''éclate contre eux  ; mêmes possibilités au v. 24 ; cf. 1.12n  ; Jg 21.15n.'
  - type: text
    content: 'Que les prêtres qui s''approchent du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se consacrent aussi, de peur que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne cause des pertes dans leurs rangs. '
  '23':
  - type: text
    content: 'Moïse dit au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Le peuple ne pourra pas monter au mont Sinaï, car tu nous as toi-même avertis, en disant : « Fixe des limites à la montagne et consacre-la. » '
  '24':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit : Va, descends ; tu monteras ensuite avec Aaron ; mais que les prêtres et le peuple ne se précipitent pas pour monter vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', de peur qu''il ne cause des pertes dans leurs rangs. '
  '25':
  - type: note
    content: 'et lui parla  : litt. et leur dit. La phrase semble inachevée.'
  - type: text
    content: Moïse descendit vers le peuple et lui parla.
  '3':
  - type: text
    content: 'Moïse monta vers Dieu ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''appela de la montagne et lui dit : Voici ce que tu diras à la maison de Jacob, ce que tu annonceras aux Israélites : '
  '4':
  - type: note
    content: Vous avez vu Dt 29.1. –  portés Es 46.4 ; 63.9. –  aigle Dt 32.11.
  - type: text
    content: 'Vous avez vu vous-mêmes ce que j''ai fait à l''Egypte : je vous ai portés sur des ailes d''aigle et je vous ai fait venir à moi. '
  '5':
  - type: note
    content: alliance 24.3-8. –  vous serez mon bien propre Dt 7.6 ; 14.2 ; 26.18 ; Ml 3.17 ; Ps 135.4 ; cf. Tt 2.14 ; 1P 2.9 ; voir aussi Rm 9.4. Le même mot hébreu est traduit par trésor en Ec 2.8 ; cf. 1Ch 29.3. –  toute la terre m'appartient 9.29+.
  - type: text
    content: 'Maintenant, si vous m''écoutez et si vous gardez mon alliance, vous serez mon bien propre parmi tous les peuples – car toute la terre m''appartient. '
  '6':
  - type: note
    content: 'royaume de prêtres  : l''expression signifiait peut-être à l''origine un royaume gouverné par des prêtres et non par des rois. Voir cependant 1P 2.9 ; Ap 1.6 ; 5.10. –  nation sainte ou sacrée, cf. 22.30 ; Es 4.3. –  ce que tu diras  : litt. les paroles que tu diras.'
  - type: text
    content: Quant à vous, vous serez pour moi un royaume de prêtres et une nation sainte. Voilà ce que tu diras aux Israélites.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'leur exposa  : litt. mit devant eux , cf. Dt 30.1.'
  - type: text
    content: 'Moïse vint appeler les anciens du peuple et leur exposa toutes ces paroles, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le lui avait ordonné. '
  '8':
  - type: note
    content: 'ensemble  : cf. Jos 24.16-24.'
  - type: text
    content: 'Tout le peuple répondit ensemble : Tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit, nous le ferons. Moïse répéta au '
  - type: text
    content: Seigneur
  - type: text
    content: ' les paroles du peuple. '
  '9':
  - type: note
    content: 'la nuée épaisse  : litt. le nuage de la nuée  ; autres formules au v. 16 ; 20.21 ; cf. 13.21+. –  qu''il mette… sa foi  : autre traduction qu''il croie (cf. 4.1+) ; 14.31.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Je viens à toi dans la nuée épaisse, afin que le peuple entende quand je te parlerai et qu''il mette pour toujours sa foi en toi. Moïse rapporta au '
  - type: text
    content: Seigneur
  - type: text
    content: ' les paroles du peuple.'
  - type: heading
    content: Dieu rencontre Moïse sur le mont Sinaï
