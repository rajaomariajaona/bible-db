  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Moïse dit au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Le peuple ne pourra pas monter au mont Sinaï, car tu nous as toi-même avertis, en disant : « Fixe des limites à la montagne et consacre-la. » '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui dit : Va, descends ; tu monteras ensuite avec Aaron ; mais que les prêtres et le peuple ne se précipitent pas pour monter vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', de peur qu''il ne cause des pertes dans leurs rangs. '
