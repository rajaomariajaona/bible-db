  - type: text
    text: 'Le mont Sinaï était tout en fumée, parce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' y était descendu dans le feu ; sa fumée montait comme celle d''un fourneau, et toute la montagne tremblait avec violence. '
  - type: usfm
    marker: v
