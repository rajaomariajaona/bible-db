document_id: EXO.19
type_code: fra
segments:
- type: usfm
  marker: ms1
  children:
  - type: text
    text: DIEU FAIT ALLIANCE AVEC ISRAËL
  marker-yv: yv-h
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu propose une alliance à Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: jour pour jour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce jour-là '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce jour-ci
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : l''ensemble du texte est peut-être destiné à une lecture commémorative pour l''anniversaire du don de la loi. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Sinaï '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Nb 33.15.'
    marker-yv: yv-n
  - type: text
    text: 'Le troisième mois à compter de leur sortie d''Egypte, jour pour jour, les Israélites arrivèrent au désert du Sinaï. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Partis '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (12.37
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de Rephidim '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Partis de Rephidim, ils arrivèrent au désert du Sinaï et campèrent dans le désert ; Israël campa là, en face de la montagne.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'Moïse monta vers Dieu ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''appela de la montagne et lui dit : Voici ce que tu diras à la maison de Jacob, ce que tu annonceras aux Israélites : '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous avez vu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 29.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'portés '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 46.4 ; 63.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aigle '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dt 32.11.
    marker-yv: yv-n
  - type: text
    text: 'Vous avez vu vous-mêmes ce que j''ai fait à l''Egypte : je vous ai portés sur des ailes d''aigle et je vous ai fait venir à moi. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.5 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.3-8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous serez mon bien propre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 7.6 ; 14.2 ; 26.18 ; Ml 3.17 ; Ps 135.4 ; cf. Tt 2.14 ; 1P 2.9 ; voir aussi Rm 9.4. Le même mot hébreu est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'trésor '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Ec 2.8 ; cf. 1Ch 29.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'toute la terre m''appartient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.29+.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, si vous m''écoutez et si vous gardez mon alliance, vous serez mon bien propre parmi tous les peuples – car toute la terre m''appartient. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'royaume de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''expression signifiait peut-être à l''origine un royaume gouverné par des prêtres et non par des rois. Voir cependant 1P 2.9 ; Ap 1.6 ; 5.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nation '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sainte
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sacrée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 22.30 ; Es 4.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce que tu diras
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les paroles que tu diras.
    marker-yv: yv-n
  - type: text
    text: Quant à vous, vous serez pour moi un royaume de prêtres et une nation sainte. Voilà ce que tu diras aux Israélites.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur exposa
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mit devant eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Dt 30.1.'
    marker-yv: yv-n
  - type: text
    text: 'Moïse vint appeler les anciens du peuple et leur exposa toutes ces paroles, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' le lui avait ordonné. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ensemble
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jos 24.16-24.'
    marker-yv: yv-n
  - type: text
    text: 'Tout le peuple répondit ensemble : Tout ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit, nous le ferons. Moïse répéta au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' les paroles du peuple. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la nuée épaisse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le nuage de la nuée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autres formules au v. 16 ; 20.21 ; cf. 13.21+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il mette… sa foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu''il croie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 4.1+) ; 14.31.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Je viens à toi dans la nuée épaisse, afin que le peuple entende quand je te parlerai et qu''il mette pour toujours sa foi en toi. Moïse rapporta au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' les paroles du peuple.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu rencontre Moïse sur le mont Sinaï
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 14 ; cf. Gn 35.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Va vers le peuple ; consacre-le, aujourd''hui et demain ; qu''ils lavent leurs vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qu'ils soient prêts
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 34.2.'
    marker-yv: yv-n
  - type: text
    text: 'Qu''ils soient prêts pour le troisième jour ; car le troisième jour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' descendra, sous les yeux de tout le peuple, sur le mont Sinaï. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : une famille de mss hébreux porte '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à la montagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Gardez-vous… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '34.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'mort '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Hé 12.20.
    marker-yv: yv-n
  - type: text
    text: 'Tu fixeras au peuple des limites tout autour, en disant : Gardez-vous de monter dans la montagne ou d''en toucher le bord. Quiconque touchera la montagne sera mis à mort. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on le lapidera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 13.10-11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on le criblera de flèches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou d''autres projectiles ; le complément est sous-entendu dans le texte et le verbe peut évoquer l''usage de diverses armes de trait ; il est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'précipiter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 15.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Quand la corne… retentira '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou, peut-être, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: retentira longuement, d'une sonnerie traînante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; même verbe en Jos 6.5). '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand les voix (= les tonnerres), les trompettes (ou les sonneries de trompette) et la nuée auront quitté la montagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quand la corne se sera tue vous pourrez monter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ceux-ci '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: monteront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être s''agit-il de ceux qui sont mentionnés en 24.1,9-11.'
    marker-yv: yv-n
  - type: text
    text: 'Celui-là, on ne portera pas la main sur lui, mais on le lapidera, ou bien on le criblera de flèches : que ce soit une bête ou un homme, il ne restera pas en vie. Quand la corne de bélier retentira, ceux-ci monteront dans la montagne.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: V. 10.
    marker-yv: yv-n
  - type: text
    text: 'Moïse descendit de la montagne vers le peuple ; il consacra le peuple, et ils lavèrent leurs vêtements. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'femme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 21.5 ; cf. Lv 15.18+.
    marker-yv: yv-n
  - type: text
    text: 'Il dit au peuple : Soyez prêts dans trois jours ; ne vous approchez pas d''une femme.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'coups de tonnerre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '9.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. Dt 4.10-13 ; Ps 29 ; 50.3 ; 77.19 ; Ap 4.5 ; 8.5 ; 11.1 ; 16.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'nuée '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 9+.
    marker-yv: yv-n
  - type: text
    text: 'Le troisième jour, au matin, il y eut des coups de tonnerre, des éclairs et une épaisse nuée sur la montagne, avec un fort son de trompe ; tout le peuple qui était dans le camp se mit à trembler. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Moïse fit sortir le peuple du camp à la rencontre de Dieu ; ils se tinrent debout au bas de la montagne. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
