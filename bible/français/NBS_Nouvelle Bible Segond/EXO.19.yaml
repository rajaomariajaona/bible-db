  - type: text
    text: 'Que les prêtres qui s''approchent du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se consacrent aussi, de peur que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' ne cause des pertes dans leurs rangs. '
  - type: usfm
    marker: v
