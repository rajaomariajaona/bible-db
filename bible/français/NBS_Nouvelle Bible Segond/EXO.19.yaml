  - type: text
    text: 'Le son de la trompe se faisait de plus en plus fort. Moïse parlait, et Dieu lui répondait. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Ainsi le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' descendit sur le mont Sinaï, au sommet de la montagne ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' appela Moïse au sommet de la montagne, et Moïse monta.'
