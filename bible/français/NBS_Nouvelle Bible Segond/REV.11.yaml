document_id: REV.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les deux témoins
  - type: text
    content: ' '
  - type: note
    content: 'roseau  : cf. 21.15 ; Ez 40.3,5 ; Za 2.5s. –  baguette ou bâton  : c''est le même mot qui est traduit par sceptre en 2.27 ; 12.5 ; 19.15. –  sanctuaire 7.15+. –  autel 6.9+. –  adorent  : voir culte.'
  - type: text
    content: 'On me donna un roseau semblable à une baguette, en disant : Lève-toi et mesure le sanctuaire de Dieu, l''autel et ceux qui y adorent. '
  '10':
  - type: note
    content: habitants de la terre 3.10+. –  se réjouiront Jn 16.20 ; cf. Ps 105.38.
  - type: text
    content: Les habitants de la terre se réjouiront à leur sujet, ils feront la fête, ils s'enverront des présents les uns aux autres, parce que ces deux prophètes avaient tourmenté les habitants de la terre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ez 37.5,10 . –  une grande crainte…  : cf. Gn 15.12 ; Ex 15.16.'
  - type: text
    content: 'Après les trois jours et demi, '
  - type: text
    content: un esprit de vie
  - type: text
    content: ' venant de Dieu '
  - type: text
    content: entra en eux, et ils se tinrent sur leurs pieds ;
  - type: text
    content: ' une grande crainte s''empara de ceux qui les voyaient. '
  '12':
  - type: note
    content: 'Montez ici 4.1+. –  Ils montèrent au ciel  : cf. 2R 2.11.'
  - type: text
    content: 'Ils entendirent du ciel une voix forte qui leur disait : Montez ici ! Ils montèrent au ciel dans la nuée, et leurs ennemis les virent. '
  '13':
  - type: note
    content: 'tremblement de terre 8.5+ ; cf. Ez 38.19s. –  humains  : litt. noms d''humains  ; cf. 1R 19.18. –  Dieu du ciel  : cf. 16.11 ; Jon 1.9 ; Dn 2.18s ; Esd 1.2.'
  - type: text
    content: A cette heure-là, il y eut un grand tremblement de terre, et le dixième de la ville s'écroula. Sept mille humains furent tués dans ce tremblement de terre ; les autres furent effrayés et donnèrent gloire au Dieu du ciel.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 8.13+. –  bientôt 1.1n.
  - type: text
    content: Le deuxième « malheur » est passé. Le troisième « malheur » vient bientôt.
  - type: heading
    content: La septième trompette
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'ange / trompette 8.2+ ; 10.7. –  est passé à  : litt. est devenu (celui) de 12.10 ; 19.6 ; cf. Ps 2.2 ; 10.16 ; 22.28s ; Dn 2.44 ; 7.4,27. –  son Christ  : 12.10 ; Ac 3.18 ; voir onction. –  il régnera… 4.11+.'
  - type: text
    content: 'Alors le septième ange sonna de la trompette. De grandes voix retentirent dans le ciel, qui disaient :'
  - type: text
    content: Le royaume du monde est passé à notre Seigneur et à son Christ ;
  - type: text
    content: il régnera à tout jamais !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'anciens 4.4+,10 ; 7.11. –  prosternés  : 3.9+ ; Mt 2.2+ ; voir culte.'
  - type: text
    content: 'Les vingt-quatre anciens qui étaient assis devant Dieu sur leurs trônes tombèrent face contre terre, prosternés devant Dieu, '
  '17':
  - type: note
    content: '4.11+. –  Nous te rendons grâce  : cf. Mt 26.27n. –  Tout-Puissant 1.8+. –  qui es et qui étais  : cf. 1.4+. –  instauré ton règne v. 15 ; cf. Ex 15.18 ; Ab 21 ; Za 14.9 ; Ps 93.1 ; 97.1 ; 99.1 ; 1Ch 16.31.'
  - type: text
    content: 'en disant :'
  - type: text
    content: Nous te rendons grâce, Seigneur Dieu, Tout-Puissant,
  - type: text
    content: toi qui es et qui étais,
  - type: text
    content: d'avoir saisi ta grande puissance
  - type: text
    content: et d'avoir instauré ton règne.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'nations v. 2+ ; cf. Ex 15.14 ; Ps 2.1,5 ; 46.7 ; voir non-Juifs. –  ta colère 15.1. –  juger les morts 20.12. –  récompenser  : autre traduction donner leur salaire à , cf. 22.12 ; Mt 5.12+. –  esclaves / prophètes 10.7+. – Voir saints . –  qui craignent ton nom Ps 61.6 ; cf. Mi 6.9n. –  petits / grands 13.16 ; 19.5,18 ; 20.12 ; Ps 115.13. –  ruiner…  : autre traduction détruire ceux qui détruisent la terre  ; même verbe grec en 8.9 ( périr ) ; verbe apparenté en 19.2 ; cf. Gn 6.11-13 ; Jr 51.25.'
  - type: text
    content: Les nations se sont mises en colère,
  - type: text
    content: mais ta colère est venue,
  - type: text
    content: ainsi que le temps de juger les morts,
  - type: text
    content: de récompenser tes esclaves, les prophètes,
  - type: text
    content: les saints et ceux qui craignent ton nom,
  - type: text
    content: les petits et les grands,
  - type: text
    content: et de ruiner ceux qui ruinent la terre !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'sanctuaire 7.15+. –  dans le ciel  : cf. Ex 25.9,40 ; Hé 8.5. –  ouvert 15.5. –  coffre (ou arche ) de son alliance  : cf. 2.17n  ; Ex 25.10 ; 1R 8.6 ; Jr 3.16. –  éclairs… 4.5+. –  tremblement de terre v. 13. –  forte grêle 16.21 ; cf. Ex 9.24.'
  - type: text
    content: Le sanctuaire de Dieu qui est dans le ciel fut ouvert, et le coffre de son alliance apparut dans son sanctuaire. Il y eut des éclairs, des voix, des tonnerres, un tremblement de terre et une forte grêle.
  '2':
  - type: note
    content: 'laisse-la de côté  : litt. chasse-la ou jette-la dehors (le même mot est traduit par extérieure). –  nations  : autre traduction non-Juifs 2.26n  ; voir aussi Za 12.3n. –  fouleront Es 63.18 ; Ps 79.1 ; Lc 21.24. –  ville sainte ou sacrée 21.2,10 ; 22.19 ; Mt 4.5n. –  quarante-deux (cf. 1.12n  ; Mt 1.17) mois  : cf. v. 3 ; 12.6,14 ; 13.5 ; Dn 7.25n.'
  - type: text
    content: 'Mais la cour extérieure du sanctuaire, laisse-la de côté et ne la mesure pas, car elle a été donnée aux nations ; celles-ci fouleront aux pieds la ville sainte pendant quarante-deux mois. '
  '3':
  - type: note
    content: 'deux témoins v. 10 ; cf. Jn 8.17. –  de parler ou d''agir en prophètes  : litt. de prophétiser. –  sacs  : signe de deuil, de tristesse ou de pénitence ; cf. 6.12 ; 2R 19.2 ; Jr 6.26 ; Jon 3.8.'
  - type: text
    content: 'Je donnerai à mes deux témoins de parler en prophètes, vêtus de sacs, pendant mille deux cent soixante jours. '
  '4':
  - type: note
    content: Za 4.3,11ss.
  - type: text
    content: 'Ce sont là les deux oliviers et les deux porte-lampes qui se tiennent devant le Seigneur de la terre. '
  '5':
  - type: note
    content: faire du mal 2.11n. –  feu / bouche 2S 22.9 ; Jr 5.14 ; cf. 2R 1.10,14 ; Ps 97.3.
  - type: text
    content: 'Si quelqu''un veut leur faire du mal, du feu sort de leur bouche et dévore leurs ennemis. Oui, si quelqu''un voulait leur faire du mal, il faudrait qu''il soit tué de cette manière. '
  '6':
  - type: note
    content: 'pluie 1R 17.1 ; Jc 5.17. –  de leur ministère de prophètes  : litt. de leur prophétie (cf. v. 3 ; 22.10). –  eaux / sang 8.8+. –  toutes sortes de fléaux 9.18+ ; 1S 4.8.'
  - type: text
    content: Ils ont le pouvoir de fermer le ciel pour qu'il ne tombe pas de pluie pendant les jours de leur ministère de prophètes, et ils ont le pouvoir de changer les eaux en sang et de frapper la terre de toutes sortes de fléaux, chaque fois qu'ils le veulent.
  '7':
  - type: text
    content: ' '
  - type: note
    content: bête / abîme (cf. 9.1+) 13.1 ; 17.8 ; cf. Dn 7.3. –  guerre 2.16+ ; Dn 7.21.
  - type: text
    content: 'Quand ils auront achevé leur témoignage, la bête qui monte de l''abîme leur fera la guerre, les vaincra et les tuera. '
  '8':
  - type: note
    content: 'cadavres  : cf. Ez 11.6. –  grande ville Jr 22.8. –  spirituel  : voir esprit. –  Sodome Gn 18.20–19.29 ; Dt 29.22 ; 32.32 ; Es 1.9s ; Jr 23.14 ; Ez 16.46,49. –  Egypte Ex 13.14 ; Es 19.1-3 ; Jl 4.19. –  là même où…  : cf. v. 2 ; Mt 27/ /.'
  - type: text
    content: 'Leurs cadavres seront dans la grande rue de la grande ville qui est appelée, dans un sens spirituel, Sodome et Egypte, là même où leur Seigneur a été crucifié. '
  '9':
  - type: note
    content: 'Des gens de tout peuple…  : litt. d''entre les peuples et tribus et langues et nations, cf. 5.9+. –  cadavres / tombeau  : cf. Ps 79.2s.'
  - type: text
    content: 'Des gens de tout peuple, tribu, langue et nation verront leurs cadavres pendant trois jours et demi, et ils ne permettront pas qu''on mette leurs cadavres dans un tombeau. '
