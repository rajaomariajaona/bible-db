      marker-yv: yv-n
    - type: text
      text: 'Salomon s''allia par mariage avec le pharaon, le roi d''Egypte. Il prit pour femme la fille du pharaon et il l''amena dans la Ville de David, jusqu''à ce qu''il eût achevé de bâtir sa propre maison, la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et le mur d''enceinte de Jérusalem.'
