        - type: text
          text: on n'avait pas bâti de maison…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 8.17-20 ; Dt 12.5 ; 2S 7.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 5.17,19 ; 8.17,20 ; 10.1.
      marker-yv: yv-n
    - type: text
      text: 'Cependant le peuple sacrifiait dans les hauts lieux, car jusqu''à ce temps-là on n''avait pas bâti de maison pour le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tandis que, moi, ta servante, je dormais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : précision absente de LXX.'
      marker-yv: yv-n
    - type: text
      text: 'Elle s''est levée en pleine nuit, elle a pris mon fils à mes côtés tandis que, moi, ta servante, je dormais, et elle l''a couché sur son sein ; et son fils, qui était mort, elle l''a couché sur mon sein. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au matin, je me suis levée pour allaiter mon fils ; mais il était mort. Je l''ai examiné au matin : ce n''était pas mon fils, celui que j''avais mis au monde ! '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'L''autre femme dit : Pas du tout ! C''est mon fils qui est vivant, et c''est ton fils qui est mort. Mais la première femme répliqua : Pas du tout ! C''est ton fils qui est mort, et c''est mon fils qui est vivant. C''est ainsi qu''elles parlèrent devant le roi.'
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit : L''une dit : « C''est ici mon fils, qui est vivant ; c''est ton fils qui est mort ! » L''autre dit : « Pas du tout ! C''est ton fils qui est mort, et c''est mon fils qui est vivant ! » '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Allez me chercher une épée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: prenez une épée pour moi.
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit alors : Allez me chercher une épée ! On apporta l''épée au roi. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le roi dit : Coupez en deux l''enfant vivant, donnez la moitié à l''une et la moitié à l''autre. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.26 '
      - type: usfm
        marker: fq
