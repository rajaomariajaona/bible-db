      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je prolongerai tes jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 20.12 ; Dt 6.2 ; 30.20 ; voir aussi Dt 4.26,40 ; 11.9 ; 17.20 ; 22.7.'
      marker-yv: yv-n
    - type: text
      text: Et si tu suis mes voies, en observant mes prescriptions et mes commandements, comme l'a fait David, ton père, je prolongerai tes jours.
