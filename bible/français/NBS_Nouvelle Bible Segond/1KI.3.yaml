        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ec 1.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'y aura jamais eu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.23.'
      marker-yv: yv-n
    - type: text
      text: 'j''agirai selon ta parole. Je te donnerai un cœur sage et intelligent, de telle sorte qu''il n''y aura jamais eu avant toi et qu''il ne se lèvera jamais plus après toi personne de semblable à toi. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Je te donnerai…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 6.33 ; Ep 3.20. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'y aura…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.23+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous tes jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : absent de LXX. Cf. v. 11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je te donnerai, en outre, ce que tu n''as pas demandé, aussi bien la richesse que la gloire, de telle sorte qu''il n''y aura pendant tous tes jours aucun homme parmi les rois qui soit semblable à toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si tu suis mes voies…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 11.38 ; voir aussi Za 3.7. –  '
      - type: usfm
        marker: fq
