          text: à Sion.
      marker-yv: yv-n
    - type: text
      text: 'Salomon s''éveilla : c''était un rêve. Il revint à Jérusalem et se tint devant le coffre de l''alliance du Seigneur. Il offrit des holocaustes et des sacrifices de paix et donna un banquet pour tous les gens de sa cour.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salomon rend la justice avec sagesse
    marker-yv: yv-h
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se présentèrent devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : pour demander justice ; cf. 2S 14.2ss ; 15.3s ; 2R 6.26-29 ; 8.3-6. Voir aussi Ps 72.1-4 ; Pr 16.10 ; 25.2.'
      marker-yv: yv-n
    - type: text
      text: 'Alors deux prostituées vinrent chez le roi et se présentèrent devant lui. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pardon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'par moi ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de même au v. 26 ; cf. Gn 43.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 1.26'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'L''une des femmes dit : Pardon, mon seigneur ! Moi et cette femme nous habitons la même maison, et j''ai accouché près d''elle dans la maison. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: personne d'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aucun étranger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la première occurrence de l''expression correspondante est absente de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le troisième jour après mon accouchement, cette femme aussi a accouché. Nous étions ensemble, personne d''autre n''était avec nous dans la maison, il n''y avait que nous deux dans la maison. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le fils de cette femme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le fils de cette femme, sur lequel elle était couchée, est mort pendant la nuit.
      marker-yv: yv-n
    - type: text
      text: 'Le fils de cette femme est mort pendant la nuit, parce qu''elle s''était couchée sur lui. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
