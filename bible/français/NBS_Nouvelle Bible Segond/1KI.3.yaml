    - type: text
      text: 'Alors Dieu lui dit : Puisque c''est là ce que tu demandes, puisque tu ne demandes pas pour toi une longue vie, que tu ne demandes pas pour toi la richesse, que tu ne demandes pas la mort de tes ennemis, puisque tu demandes pour toi de l''intelligence afin d''être attentif à l''équité, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un cœur sage et intelligent
      - type: usfm
        marker: ft
        children:
        - type: text
