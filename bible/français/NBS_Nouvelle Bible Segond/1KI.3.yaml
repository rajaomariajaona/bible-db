            text: hauts
        - type: text
          text: ' lieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3s ; 12.31s ; 13.2,32s ; 14.23 ; 15.14 ; 22.43 ; 2R 23.8 ; Lv 26.30
        - type: usfm
