document_id: 1KI.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salomon épouse une fille du pharaon
  - type: text
    content: ' '
  - type: note
    content: 's''allia par mariage  : cf. 9.16,24. –  le pharaon  : difficile à identifier. Il ne s''agit pas de Shishaq (11.40n). C''est peut-être Psousennès II (≈ 959-945 av. J.-C., XXIe dynastie), ou l''un de ses prédécesseurs. –  Il prit pour femme  : litt. il prit . –  la fille du pharaon 7.8 ; 9.16,24 ; 2Ch 8.11. –  la Ville de David 2.10n. –  le mur d''enceinte de Jérusalem  : litt. la muraille de Jérusalem, autour.'
  - type: text
    content: 'Salomon s''allia par mariage avec le pharaon, le roi d''Egypte. Il prit pour femme la fille du pharaon et il l''amena dans la Ville de David, jusqu''à ce qu''il eût achevé de bâtir sa propre maison, la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et le mur d''enceinte de Jérusalem.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cette demande…  : litt. la chose (ou parole ) fut bonne aux yeux du Seigneur que Salomon avait demandé cette chose (ou parole ). – Ce v. n''a pas de parallèle en 2Ch 1.'
  - type: text
    content: 'Cette demande de Salomon plut au Seigneur. '
  '11':
  - type: note
    content: 'une longue vie  : litt. des jours nombreux. –  la mort  : litt. l''être ou la vie, cf. Gn 1.20n. –  être attentif à l''équité  : litt. écouter (ou obéir à) l''équité (ou le droit).'
  - type: text
    content: 'Alors Dieu lui dit : Puisque c''est là ce que tu demandes, puisque tu ne demandes pas pour toi une longue vie, que tu ne demandes pas pour toi la richesse, que tu ne demandes pas la mort de tes ennemis, puisque tu demandes pour toi de l''intelligence afin d''être attentif à l''équité, '
  '12':
  - type: note
    content: 'un cœur sage et intelligent  : cf. v. 9n  ; Ec 1.16. –  il n''y aura jamais eu…  : cf. 10.23.'
  - type: text
    content: 'j''agirai selon ta parole. Je te donnerai un cœur sage et intelligent, de telle sorte qu''il n''y aura jamais eu avant toi et qu''il ne se lèvera jamais plus après toi personne de semblable à toi. '
  '13':
  - type: note
    content: 'Je te donnerai…  : cf. Mt 6.33 ; Ep 3.20. – Voir gloire. –  il n''y aura…  : cf. 10.23+. –  tous tes jours  : absent de LXX. Cf. v. 11n.'
  - type: text
    content: 'Je te donnerai, en outre, ce que tu n''as pas demandé, aussi bien la richesse que la gloire, de telle sorte qu''il n''y aura pendant tous tes jours aucun homme parmi les rois qui soit semblable à toi. '
  '14':
  - type: note
    content: 'si tu suis mes voies…  : cf. 11.38 ; voir aussi Za 3.7. –  prescriptions  : voir loi. –  je prolongerai tes jours  : cf. Ex 20.12 ; Dt 6.2 ; 30.20 ; voir aussi Dt 4.26,40 ; 11.9 ; 17.20 ; 22.7.'
  - type: text
    content: Et si tu suis mes voies, en observant mes prescriptions et mes commandements, comme l'a fait David, ton père, je prolongerai tes jours.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'du Seigneur  : plusieurs mss hébreux portent de YHWH ( du Seigneur ) ; LXX ajoute à Sion.'
  - type: text
    content: 'Salomon s''éveilla : c''était un rêve. Il revint à Jérusalem et se tint devant le coffre de l''alliance du Seigneur. Il offrit des holocaustes et des sacrifices de paix et donna un banquet pour tous les gens de sa cour.'
  - type: heading
    content: Salomon rend la justice avec sagesse
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'se présentèrent devant lui  : pour demander justice ; cf. 2S 14.2ss ; 15.3s ; 2R 6.26-29 ; 8.3-6. Voir aussi Ps 72.1-4 ; Pr 16.10 ; 25.2.'
  - type: text
    content: 'Alors deux prostituées vinrent chez le roi et se présentèrent devant lui. '
  '17':
  - type: note
    content: 'Pardon  : litt. par moi ! de même au v. 26 ; cf. Gn 43.20n  ; 1S 1.26n.'
  - type: text
    content: 'L''une des femmes dit : Pardon, mon seigneur ! Moi et cette femme nous habitons la même maison, et j''ai accouché près d''elle dans la maison. '
  '18':
  - type: note
    content: 'personne d''autre  : litt. aucun étranger. –  dans la maison  : la première occurrence de l''expression correspondante est absente de LXX et de Syr.'
  - type: text
    content: 'Le troisième jour après mon accouchement, cette femme aussi a accouché. Nous étions ensemble, personne d''autre n''était avec nous dans la maison, il n''y avait que nous deux dans la maison. '
  '19':
  - type: note
    content: 'Le fils de cette femme…  : litt. le fils de cette femme, sur lequel elle était couchée, est mort pendant la nuit.'
  - type: text
    content: 'Le fils de cette femme est mort pendant la nuit, parce qu''elle s''était couchée sur lui. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'hauts lieux v. 3s ; 12.31s ; 13.2,32s ; 14.23 ; 15.14 ; 22.43 ; 2R 23.8 ; Lv 26.30n  ; voir aussi Dt 12.2-5,13s ; 1S 9.12s,22-25 et les notes. –  on n''avait pas bâti de maison…  : cf. 8.17-20 ; Dt 12.5 ; 2S 7.13. –  pour le nom… 5.17,19 ; 8.17,20 ; 10.1.'
  - type: text
    content: 'Cependant le peuple sacrifiait dans les hauts lieux, car jusqu''à ce temps-là on n''avait pas bâti de maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: note
    content: 'tandis que, moi, ta servante, je dormais  : précision absente de LXX.'
  - type: text
    content: 'Elle s''est levée en pleine nuit, elle a pris mon fils à mes côtés tandis que, moi, ta servante, je dormais, et elle l''a couché sur son sein ; et son fils, qui était mort, elle l''a couché sur mon sein. '
  '21':
  - type: text
    content: 'Au matin, je me suis levée pour allaiter mon fils ; mais il était mort. Je l''ai examiné au matin : ce n''était pas mon fils, celui que j''avais mis au monde ! '
  '22':
  - type: text
    content: 'L''autre femme dit : Pas du tout ! C''est mon fils qui est vivant, et c''est ton fils qui est mort. Mais la première femme répliqua : Pas du tout ! C''est ton fils qui est mort, et c''est mon fils qui est vivant. C''est ainsi qu''elles parlèrent devant le roi.'
  '23':
  - type: text
    content: 'Le roi dit : L''une dit : « C''est ici mon fils, qui est vivant ; c''est ton fils qui est mort ! » L''autre dit : « Pas du tout ! C''est ton fils qui est mort, et c''est mon fils qui est vivant ! » '
  '24':
  - type: note
    content: 'Allez me chercher une épée  : litt. prenez une épée pour moi.'
  - type: text
    content: 'Le roi dit alors : Allez me chercher une épée ! On apporta l''épée au roi. '
  '25':
  - type: text
    content: 'Le roi dit : Coupez en deux l''enfant vivant, donnez la moitié à l''une et la moitié à l''autre. '
  '26':
  - type: note
    content: 's''émut  : même expression en Gn 43.30n. –  Pardon v. 17n. –  vivant  : la deuxième occurrence de ce terme est omise par deux mss hébreux et LXX ; de même au v. 27.'
  - type: text
    content: 'Alors la femme dont le fils était vivant s''émut pour son fils et dit au roi : Pardon, mon seigneur ! Donnez-lui l''enfant vivant, ne le mettez pas à mort ! Tandis que l''autre disait : Il ne sera ni à moi ni à toi ; coupez-le ! '
  '27':
  - type: note
    content: 'Donnez-lui  : c.-à-d. donnez à la première femme, la vraie mère. –  vivant v. 26n.'
  - type: text
    content: 'Alors le roi dit : Donnez-lui l''enfant vivant, ne le mettez pas à mort. C''est elle qui est sa mère.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Voir crainte. –  pour agir selon l''équité  : autres traductions pour exercer le droit, pour défendre le droit  ; cf. 8.45n  ; 10.9+ ; Gn 18.19n  ; Dt 10.18n.'
  - type: text
    content: Tout Israël apprit le jugement que le roi avait prononcé ; on craignit le roi, car on avait vu que la sagesse de Dieu était en lui pour agir selon l'équité.
  '3':
  - type: note
    content: 'suivait les prescriptions de David, son père  : cf. 15.11 ; 2R 18.3 ; 22.2. –  offrait des sacrifices…  : cf. 22.44 ; 2R 12.4 ; 14.4 ; 15.4. –  hauts lieux v. 2+.'
  - type: text
    content: 'Salomon aimait le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et suivait les prescriptions de David, son père. Cependant lui aussi offrait des sacrifices et de l''encens dans les hauts lieux.'
  - type: heading
    content: Salomon demande à Dieu la sagesse pour régner
  - type: heading
    content: 2Ch 1.3-13
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Gabaon Jos 9.3n. –  hauts lieux v. 2+. –  offrit mille holocaustes  : cf. 2Ch 1.6 ; voir sacrifices, offrandes.'
  - type: text
    content: 'Le roi se rendit à Gabaon pour y sacrifier, car c''était le principal des hauts lieux. Salomon offrit mille holocaustes sur cet autel. '
  '5':
  - type: note
    content: 'le Seigneur apparut…  : cf. Gn 28.10-17 ; 31.10-13 ; 37.5-11 ; 2Ch 1.7 ; voir aussi Nb 12.6 ; Jr 23.28 ; Jl 3.1. –  Demande…  : litt. demande ce que je te donnerai. Cette manifestation de Dieu légitime une nouvelle fois la royauté de Salomon.'
  - type: text
    content: 'A Gabaon, pendant la nuit, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' apparut en rêve à Salomon. Dieu lui dit : Demande ce que tu veux, je te le donnerai. '
  '6':
  - type: note
    content: 'devant toi  : cf. 9.4 ; Gn 17.1 ; voir aussi Gn 5.22 ; Mi 6.8. – Voir justice. –  voilà pourquoi il en est ainsi en ce jour  : cf. Dt 2.30n.'
  - type: text
    content: 'Salomon répondit : Tu as agi avec une grande fidélité envers ton serviteur David, mon père, parce qu''il marchait devant toi en suivant la voie de la loyauté, de la justice et de la droiture de cœur envers toi ; tu as gardé envers lui cette grande fidélité et tu lui as donné un fils qui est assis sur son trône – voilà pourquoi il en est ainsi en ce jour. '
  '7':
  - type: note
    content: 'je ne sais rien faire  : litt. je ne sais pas sortir et rentrer, expression qui pourrait se comprendre ici dans un sens plus spécifiquement politique (je ne sais pas gouverner), mais qui apparaît ailleurs dans un sens militaire (Nb 27.17n  ; Jos 14.11) ou plus général (Dt 28.6n  ; 31.2).'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ', mon Dieu, c''est toi qui m''as fait roi, moi, ton serviteur, à la place de David, mon père ; je ne suis qu''un petit garçon, je ne sais rien faire. '
  '8':
  - type: note
    content: 'ni compté, à cause de son grand nombre  : absent de LXX  ; cf. 8.5+ ; voir Gn 15.5+.'
  - type: text
    content: 'Je suis au milieu de ton peuple, celui que tu as choisi, peuple nombreux, qui ne peut être ni évalué ni compté, à cause de son grand nombre. '
  '9':
  - type: note
    content: 'un cœur attentif ou obéissant, litt. un cœur qui entend. –  pour gouverner  : litt. pour juger (cf. Jg 2.16n  ; Rt 1.1n) ; cf. v. 16ss ; 2S 15.2-6 ; Sagesse 9.12 : « Je jugerai ton peuple avec équité et serai digne du trône de mon père. » –  pour discerner le bon du mauvais  : cf. Gn 2.9n  ; Pr 14.16,22.'
  - type: text
    content: Donne-moi un cœur attentif pour gouverner ton peuple, pour discerner le bon du mauvais ! Qui donc pourrait gouverner ton peuple, ce peuple si important ?
