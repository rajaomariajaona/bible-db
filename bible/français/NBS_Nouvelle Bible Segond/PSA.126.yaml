document_id: PSA.126,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Des pleurs changés en joie
  - type: text
    content: ' '
  - type: note
    content: 'montées 120.1n. –  a rétabli…  : texte incertain ; la traduction s''appuie sur quelques mss hébreux et LXX, qui lit ici comme au v. 4 ( rétablir la situation de ) ; voir 14.7n  ; Dt 30.3n  ; Jr 29.14n  ; quelques-uns comprennent quand le Seigneur a ramené les captifs de Sion , et au v. 4 ramène nos captifs. –  comme des gens qui font un rêve  : certains comprennent, avec Tg  : comme des gens guéris  ; LXX comme des gens consolés  ; cf. Ac 12.7ss.'
  - type: text
    content: Chant des montées.
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a rétabli Sion,'
  - type: text
    content: nous étions comme des gens qui font un rêve.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Cf. 63.6 ; Jb 8.21. –  parmi les nations 79.10 ; 115.2 ; cf. 96.10.
  - type: text
    content: Alors notre bouche était pleine de rires,
  - type: text
    content: et notre langue poussait des cris de joie ;
  - type: text
    content: 'alors on disait parmi les nations :'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait pour eux de grandes choses !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jl 2.21 ; Lc 1.49.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait pour nous de grandes choses ;'
  - type: text
    content: nous nous réjouissons.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'rétablis notre situation  : cf. v. 1n  ; voir aussi Es 59.9ss ; Ag 2.16. – Le Néguev , région semi-désertique au sud de Juda, est parcourue d''oueds ou de torrents qui sont à sec tout l''été mais qui réapparaissent brusquement avec les premières pluies d''automne ; cf. 18.16n  ; Es 35.'
  - type: text
    content: Seigneur
  - type: text
    content: ', rétablis notre situation'
  - type: text
    content: comme les torrents dans le Néguev !
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 30.6,12 ; Es 25.8s ; 61.3 ; 65.19 ; Jr 31.9,13 ; Lc 6.21s ; Jn 16.20 ; Baruch 4.23 (Jérusalem parle à ses habitants comme une mère à ses enfants) : « Je vous ai laissés partir dans la souffrance et la tristesse, mais Dieu vous rendra à moi dans la joie et l''allégresse pour toujours. » –  sèment / moissonneront  : cf. 4.8 ; Es 9.2 ; 28.24ss.'
  - type: text
    content: Ceux qui sèment avec des larmes
  - type: text
    content: moissonneront avec des cris de joie.
  '6':
  - type: text
    content: ' '
  - type: note
    content: la semence à répandre ou un sac de semence , traduction incertaine (cf. Jb 28.18n) ; certains modifient légèrement le texte hébreu traditionnel pour lire répandant la semence.
  - type: text
    content: Celui qui s'en va en pleurant, quand il porte la semence à répandre,
  - type: text
    content: revient avec des cris de joie, quand il porte ses gerbes.
