        - type: text
          text: ', de même au v. 9 ; 15.5ss ; 16.4,26,28 ; 17.15s ; Nb 19.7ss,19.'
      marker-yv: yv-n
    - type: text
      text: 'Celui qui se purifie lavera ses vêtements, rasera tout son poil et se lavera avec de l''eau, après quoi il sera pur. Ensuite il pourra rentrer dans le camp, mais il restera sept jours hors de sa tente. '
