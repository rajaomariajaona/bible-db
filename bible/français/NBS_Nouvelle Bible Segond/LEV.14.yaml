  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''oiseau vivant '
      - type: usfm
