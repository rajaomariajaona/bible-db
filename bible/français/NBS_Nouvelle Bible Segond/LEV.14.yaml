        children:
        - type: text
          text: v. 53 ; cf. 16.10,20-26.
      marker-yv: yv-n
    - type: text
      text: 'Quant à l''oiseau vivant, il le prendra, avec le bois de cèdre, l''écarlate et l''hysope ; il les trempera, avec l''oiseau vivant, dans le sang de l''oiseau immolé au-dessus de l''eau vive. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: text
