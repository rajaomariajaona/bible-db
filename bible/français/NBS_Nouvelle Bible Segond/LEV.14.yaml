          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre sortira du camp. Si le prêtre voit que le « lépreux » est guéri du fléau de la « lèpre », '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '30'
    - type: text
      text: 'Puis il offrira la première tourterelle ou la première colombe, selon ce qu''il aura pu se procurer ; '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
