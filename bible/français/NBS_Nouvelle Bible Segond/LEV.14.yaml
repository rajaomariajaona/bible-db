  '48':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '48'
    - type: text
      text: 'Si le prêtre, en retournant dans la maison, voit que la tache ne s''est pas étendue après que la maison a été recrépie, le prêtre déclarera la maison pure ; le mal est guéri. '
  '49':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '49'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.49 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: péché
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 52.
      marker-yv: yv-n
    - type: text
      text: 'Il prendra, pour ôter le péché de la maison, deux oiseaux, du bois de cèdre, de l''écarlate et de l''hysope. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: eau vive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. courante, non stagnante.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre ordonnera qu''on immole le premier oiseau sur un récipient de terre, au-dessus d''une eau vive. '
  '50':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '50'
    - type: text
      text: 'Il immolera le premier oiseau sur un récipient de terre, au-dessus de l''eau vive. '
  '51':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '51'
    - type: text
      text: 'Il prendra le bois de cèdre, l''hysope, l''écarlate et l''oiseau vivant ; il les trempera dans le sang de l''oiseau immolé et dans l''eau vive, et il en fera sept fois l''aspersion sur la maison. '
  '52':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '52'
    - type: text
      text: 'Il ôtera le péché de la maison avec le sang de l''oiseau, de l''eau vive, l''oiseau vivant, avec le bois de cèdre, l''hysope et l''écarlate. '
  '53':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '53'
