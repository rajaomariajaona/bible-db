      marker-yv: yv-n
    - type: text
      text: 'le prêtre ordonnera qu''on ôte les pierres où se trouve la tache, et qu''on les jette hors de la ville, dans un lieu impur. '
  '41':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '41'
    - type: text
