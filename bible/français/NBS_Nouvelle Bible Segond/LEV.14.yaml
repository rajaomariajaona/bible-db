  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lavera '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se lavera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe traduit ici deux verbes hébreux différents ; le premier est réservé au lavage des vêtements, le second s''emploie plutôt pour celui des personnes. Autre traduction possible, pour le second'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se baignera dans l'eau
      - type: usfm
        marker: ft
        children:
        - type: text
