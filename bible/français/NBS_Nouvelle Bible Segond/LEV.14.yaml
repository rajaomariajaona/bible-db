        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'le prêtre ordonnera qu''on prenne, pour celui qui doit être purifié, deux oiseaux purs vivants, du bois de cèdre, de l''écarlate et de l''hysope. '
  '40':
  - type: usfm
    marker: p
