      marker-yv: yv-n
    - type: text
      text: 'S''il est pauvre et que ses ressources soient insuffisantes, il prendra un seul mouton en sacrifice de réparation, pour le dédier rituellement afin de faire l''expiation sur lui. Il prendra un dixième de fleur de farine pétrie à l''huile, pour l''offrande végétale, un log d''huile '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: 'et deux tourterelles ou deux colombes, selon les ressources dont il dispose, l''une en sacrifice pour le péché, et l''autre en holocauste. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: purification
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le huitième jour, il apportera pour sa purification toutes ces offrandes au prêtre, à l''entrée de la tente de la Rencontre, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '24'
    - type: text
      text: 'Le prêtre prendra le mouton pour le sacrifice de réparation et le log d''huile ; le prêtre les dédiera rituellement devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '25'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il immolera le mouton du sacrifice de réparation. Le prêtre prendra du sang du sacrifice de réparation ; il en mettra sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '26'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.26 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre versera de l''huile dans le creux de sa main gauche. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '27'
    - type: text
      text: 'Avec le doigt de sa main droite, il fera sept fois l''aspersion de l''huile qui est dans sa main gauche, devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '28'
    - type: text
      text: 'Le prêtre mettra de l''huile qui est dans sa main sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit, à la place où il a mis du sang du sacrifice de réparation. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '29'
    - type: text
      text: 'Le prêtre mettra ce qui lui reste d''huile dans la main sur la tête de celui qui se purifie, afin de faire sur lui l''expiation devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
