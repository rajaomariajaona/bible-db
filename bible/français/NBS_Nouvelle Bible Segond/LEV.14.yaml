  '57':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '57'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.57 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour enseigner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe hébreu correspondant est apparenté au terme traduit par '
      - type: usfm
