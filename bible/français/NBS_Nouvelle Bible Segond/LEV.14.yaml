        - type: text
          text: '), un en '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sacrifice pour le péché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (vraisemblablement l'agnelle, v. 10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') et un en '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocauste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Puis le prêtre offrira le sacrifice pour le péché ; il fera sur celui qui se purifie l''expiation de son impureté. Ensuite il immolera l''holocauste. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: purification
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mt 8.4/ / ; Lc 17.14.
      marker-yv: yv-n
    - type: text
      text: 'Voici quelle sera la loi concernant le « lépreux », le jour de sa purification. On l''amènera au prêtre. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: offrira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fera monter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le prêtre offrira sur l'autel l'holocauste et l'offrande végétale ; le prêtre fera sur cet homme l'expiation, et il sera pur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Purification d'un « lépreux » pauvre
    marker-yv: yv-h
  '21':
