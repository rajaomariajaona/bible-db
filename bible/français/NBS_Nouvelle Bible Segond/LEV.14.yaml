      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque vous serez arrivés en Canaan, le pays que je vous donne comme propriété, si je mets une tache de « lèpre » sur une maison du pays qui est votre propriété, '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.35 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'celui à qui appartient la maison ira le déclarer au prêtre en disant : « Une sorte de tache est apparue dans ma maison. » '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: text
      text: 'Le prêtre donnera des ordres : on videra la maison avant que le prêtre entre pour examiner la tache ; ainsi tout ce qui est dans la maison ne deviendra pas impur. Après cela, le prêtre entrera pour examiner la maison.'
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: 'Il examinera la tache. S''il voit que la tache sur les murs de la maison présente des cavités verdâtres ou rougeâtres qui paraissent plus enfoncées que le mur, '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il fera fermer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'le prêtre sortira de la maison ; quand il sera à l''entrée de la maison, il fera fermer la maison pour sept jours. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: 'Le prêtre y retournera le septième jour. S''il voit que la tache s''est étendue sur les murs de la maison, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'on prenne
      - type: usfm
        marker: ft
