      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sortira du camp '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.46. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
