          text: ) ; certains pensent qu'elle résulte d'une erreur de copie.
      marker-yv: yv-n
    - type: text
      text: 'selon ce qu''il aura pu se procurer, il offrira l''une en sacrifice pour le péché, et l''autre en holocauste, avec l''offrande végétale ; et le prêtre fera sur celui qui se purifie l''expiation devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
