      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un log
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 30 centilitres (voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Le huitième jour, il prendra deux moutons sans défaut et une agnelle d''un an sans défaut, trois dixièmes de fleur de farine pétrie à l''huile, en offrande végétale, et un log d''huile. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Le prêtre qui fait la purification placera l''homme qui se purifie et ces offrandes devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', à l''entrée de la tente de la Rencontre. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dédiera… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre prendra le premier mouton et le présentera en sacrifice de réparation, avec le log d''huile ; il les dédiera rituellement devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le sacrifice pour le péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'animal offert en sacrifice pour le péché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même expression dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le lieu sacré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il immolera le mouton dans le lieu où on immole le sacrifice pour le péché et l''holocauste, dans le lieu sacré : le sacrifice de réparation, comme le sacrifice pour le péché, appartient au prêtre : c''est une chose très sacrée. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 8.23s.
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre prendra du sang du sacrifice de réparation ; le prêtre en mettra sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de sa main gauche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de la main gauche du prêtre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 26.'
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre prendra du log d''huile et il en versera dans le creux de sa main gauche. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 4.6,17.
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre trempera le doigt de sa main droite dans l''huile qui est dans le creux de sa main gauche ; avec son doigt, il fera sept fois l''aspersion de l''huile devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Le prêtre mettra de l''huile qui lui reste dans la main sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit, par-dessus le sang du sacrifice de réparation. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: expiation
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prêtre mettra ce qui lui reste d''huile dans la main sur la tête de celui qui se purifie ; le prêtre fera sur lui l''expiation devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'D''après le v. 10, trois animaux sont immolés : un en '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
