document_id: LEV.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Purification d'un « lépreux »
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'V. 19n. –  sans défaut 1.3n. –  une agnelle  : bien qu''elle ne soit plus spécifiquement mentionnée dans la suite, celle-ci est selon toute vraisemblance réservée au sacrifice pour le péché (v. 19n), selon les règles exposées en 4.27-35. –  d''un an 9.3+. –  un log  : environ 30 centilitres (voir mesures).'
  - type: text
    content: 'Le huitième jour, il prendra deux moutons sans défaut et une agnelle d''un an sans défaut, trois dixièmes de fleur de farine pétrie à l''huile, en offrande végétale, et un log d''huile. '
  '11':
  - type: text
    content: 'Le prêtre qui fait la purification placera l''homme qui se purifie et ces offrandes devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à l''entrée de la tente de la Rencontre. '
  '12':
  - type: note
    content: V. 19n. –  dédiera… 7.30n.
  - type: text
    content: 'Le prêtre prendra le premier mouton et le présentera en sacrifice de réparation, avec le log d''huile ; il les dédiera rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '13':
  - type: note
    content: 'le sacrifice pour le péché  : litt. le péché, c.-à-d. l''animal offert en sacrifice pour le péché, même expression dans la suite. –  dans le lieu sacré  : cf. 10.17n  ; voir saint.'
  - type: text
    content: 'Il immolera le mouton dans le lieu où on immole le sacrifice pour le péché et l''holocauste, dans le lieu sacré : le sacrifice de réparation, comme le sacrifice pour le péché, appartient au prêtre : c''est une chose très sacrée. '
  '14':
  - type: note
    content: Cf. 8.23s.
  - type: text
    content: 'Le prêtre prendra du sang du sacrifice de réparation ; le prêtre en mettra sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit. '
  '15':
  - type: note
    content: 'de sa main gauche  : litt. de la main gauche du prêtre, de même au v. 26.'
  - type: text
    content: 'Le prêtre prendra du log d''huile et il en versera dans le creux de sa main gauche. '
  '16':
  - type: note
    content: Cf. 4.6,17.
  - type: text
    content: 'Le prêtre trempera le doigt de sa main droite dans l''huile qui est dans le creux de sa main gauche ; avec son doigt, il fera sept fois l''aspersion de l''huile devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: text
    content: 'Le prêtre mettra de l''huile qui lui reste dans la main sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit, par-dessus le sang du sacrifice de réparation. '
  '18':
  - type: note
    content: Voir expiation.
  - type: text
    content: 'Le prêtre mettra ce qui lui reste d''huile dans la main sur la tête de celui qui se purifie ; le prêtre fera sur lui l''expiation devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '19':
  - type: note
    content: 'D''après le v. 10, trois animaux sont immolés : un en sacrifice de réparation (v. 12 ; 5.6n), un en sacrifice pour le péché (vraisemblablement l''agnelle, v. 10n  ; cf. 4.1n) et un en holocauste (1.3n).'
  - type: text
    content: 'Puis le prêtre offrira le sacrifice pour le péché ; il fera sur celui qui se purifie l''expiation de son impureté. Ensuite il immolera l''holocauste. '
  '2':
  - type: note
    content: purification 13.3. –  au prêtre Mt 8.4/ / ; Lc 17.14.
  - type: text
    content: 'Voici quelle sera la loi concernant le « lépreux », le jour de sa purification. On l''amènera au prêtre. '
  '20':
  - type: note
    content: 'offrira  : litt. fera monter, cf. 1.3n  ; 2.12n.'
  - type: text
    content: Le prêtre offrira sur l'autel l'holocauste et l'offrande végétale ; le prêtre fera sur cet homme l'expiation, et il sera pur.
  - type: heading
    content: Purification d'un « lépreux » pauvre
  '21':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.11n. – Voir sacrifices et expiation.
  - type: text
    content: 'S''il est pauvre et que ses ressources soient insuffisantes, il prendra un seul mouton en sacrifice de réparation, pour le dédier rituellement afin de faire l''expiation sur lui. Il prendra un dixième de fleur de farine pétrie à l''huile, pour l''offrande végétale, un log d''huile '
  '22':
  - type: text
    content: 'et deux tourterelles ou deux colombes, selon les ressources dont il dispose, l''une en sacrifice pour le péché, et l''autre en holocauste. '
  '23':
  - type: note
    content: Voir purification.
  - type: text
    content: 'Le huitième jour, il apportera pour sa purification toutes ces offrandes au prêtre, à l''entrée de la tente de la Rencontre, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '24':
  - type: text
    content: 'Le prêtre prendra le mouton pour le sacrifice de réparation et le log d''huile ; le prêtre les dédiera rituellement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '25':
  - type: note
    content: Voir sang.
  - type: text
    content: 'Il immolera le mouton du sacrifice de réparation. Le prêtre prendra du sang du sacrifice de réparation ; il en mettra sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit. '
  '26':
  - type: note
    content: V. 15n.
  - type: text
    content: 'Le prêtre versera de l''huile dans le creux de sa main gauche. '
  '27':
  - type: text
    content: 'Avec le doigt de sa main droite, il fera sept fois l''aspersion de l''huile qui est dans sa main gauche, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '28':
  - type: text
    content: 'Le prêtre mettra de l''huile qui est dans sa main sur le lobe de l''oreille droite de celui qui se purifie, sur le pouce de sa main droite et sur le pouce de son pied droit, à la place où il a mis du sang du sacrifice de réparation. '
  '29':
  - type: text
    content: 'Le prêtre mettra ce qui lui reste d''huile dans la main sur la tête de celui qui se purifie, afin de faire sur lui l''expiation devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: sortira du camp 13.46. –  voit 13.3n. –  fléau 13.2n.
  - type: text
    content: 'Le prêtre sortira du camp. Si le prêtre voit que le « lépreux » est guéri du fléau de la « lèpre », '
  '30':
  - type: text
    content: 'Puis il offrira la première tourterelle ou la première colombe, selon ce qu''il aura pu se procurer ; '
  '31':
  - type: note
    content: 'selon ce qu''il aura pu se procurer  : LXX n''a pas la répétition de cette formule (5.11n) ; certains pensent qu''elle résulte d''une erreur de copie.'
  - type: text
    content: 'selon ce qu''il aura pu se procurer, il offrira l''une en sacrifice pour le péché, et l''autre en holocauste, avec l''offrande végétale ; et le prêtre fera sur celui qui se purifie l''expiation devant le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '32':
  - type: text
    content: Telle est la loi concernant celui qui a été atteint de la « lèpre » et dont les ressources sont insuffisantes pour sa purification.
  - type: heading
    content: Moisissures sur les murs des maisons
  '33':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse et à Aaron : '
  '34':
  - type: note
    content: Lorsque vous serez arrivés… 19.23-25 ; 23.10 ; Gn 17.8. –  Canaan Gn 9.18n. –  tache de « lèpre » 13.2n.
  - type: text
    content: 'Lorsque vous serez arrivés en Canaan, le pays que je vous donne comme propriété, si je mets une tache de « lèpre » sur une maison du pays qui est votre propriété, '
  '35':
  - type: note
    content: Voir prêtre.
  - type: text
    content: 'celui à qui appartient la maison ira le déclarer au prêtre en disant : « Une sorte de tache est apparue dans ma maison. » '
  '36':
  - type: text
    content: 'Le prêtre donnera des ordres : on videra la maison avant que le prêtre entre pour examiner la tache ; ainsi tout ce qui est dans la maison ne deviendra pas impur. Après cela, le prêtre entrera pour examiner la maison.'
  '37':
  - type: text
    content: 'Il examinera la tache. S''il voit que la tache sur les murs de la maison présente des cavités verdâtres ou rougeâtres qui paraissent plus enfoncées que le mur, '
  '38':
  - type: note
    content: il fera fermer 13.4n.
  - type: text
    content: 'le prêtre sortira de la maison ; quand il sera à l''entrée de la maison, il fera fermer la maison pour sept jours. '
  '39':
  - type: text
    content: 'Le prêtre y retournera le septième jour. S''il voit que la tache s''est étendue sur les murs de la maison, '
  '4':
  - type: note
    content: 'qu''on prenne  : litt. qu''il prenne  ; Smr, LXX, Syr qu''ils prennent ou qu''on prenne. –  écarlate Ex 25.4n  ; 26.1+. –  hysope Ex 12.22n.'
  - type: text
    content: 'le prêtre ordonnera qu''on prenne, pour celui qui doit être purifié, deux oiseaux purs vivants, du bois de cèdre, de l''écarlate et de l''hysope. '
  '40':
  - type: note
    content: 'un lieu impur  : c.-à-d. dont l''accès est interdit.'
  - type: text
    content: 'le prêtre ordonnera qu''on ôte les pierres où se trouve la tache, et qu''on les jette hors de la ville, dans un lieu impur. '
  '41':
  - type: text
    content: 'Il fera racler tout l''intérieur de la maison ; on répandra hors de la ville, dans un lieu impur, la poussière qu''on aura raclée. '
  '42':
  - type: note
    content: 'On prendra…  : la tournure indéfinie traduit la première fois un pluriel (comme on répandra au v. 41), la seconde un singulier (litt. il  ; Smr, LXX ils ou on) ; le texte ne dit pas à qui, pratiquement, incombait la tâche. –  premières  : sous-entendu dans le texte. –  mortier  : le même mot est traduit par poussière aux v. 41,45.'
  - type: text
    content: On prendra d'autres pierres, pour les mettre à la place des premières pierres ; et on prendra un autre mortier pour recrépir la maison.
  '43':
  - type: text
    content: 'Si la tache revient et fait éruption dans la maison après qu''on a ôté les pierres, raclé et recrépi la maison, '
  '44':
  - type: text
    content: 'le prêtre y retournera. S''il voit que la tache s''est étendue dans la maison, c''est une « lèpre » pernicieuse dans la maison : celle-ci est impure. '
  '45':
  - type: note
    content: 'sa charpente  : litt. ses bois.'
  - type: text
    content: 'On démolira la maison ; ses pierres, sa charpente, et toute la poussière de la maison, on les emportera hors de la ville, dans un lieu impur. '
  '46':
  - type: note
    content: jusqu'au soir Gn 1.5n.
  - type: text
    content: 'Celui qui entrera dans la maison pendant tout le temps qu''elle est fermée sera impur jusqu''au soir. '
  '47':
  - type: text
    content: Celui qui couchera dans la maison lavera ses vêtements. Celui qui mangera dans la maison lavera ses vêtements.
  '48':
  - type: text
    content: 'Si le prêtre, en retournant dans la maison, voit que la tache ne s''est pas étendue après que la maison a été recrépie, le prêtre déclarera la maison pure ; le mal est guéri. '
  '49':
  - type: note
    content: péché v. 52.
  - type: text
    content: 'Il prendra, pour ôter le péché de la maison, deux oiseaux, du bois de cèdre, de l''écarlate et de l''hysope. '
  '5':
  - type: note
    content: 'eau vive  : c.-à-d. courante, non stagnante.'
  - type: text
    content: 'Le prêtre ordonnera qu''on immole le premier oiseau sur un récipient de terre, au-dessus d''une eau vive. '
  '50':
  - type: text
    content: 'Il immolera le premier oiseau sur un récipient de terre, au-dessus de l''eau vive. '
  '51':
  - type: text
    content: 'Il prendra le bois de cèdre, l''hysope, l''écarlate et l''oiseau vivant ; il les trempera dans le sang de l''oiseau immolé et dans l''eau vive, et il en fera sept fois l''aspersion sur la maison. '
  '52':
  - type: text
    content: 'Il ôtera le péché de la maison avec le sang de l''oiseau, de l''eau vive, l''oiseau vivant, avec le bois de cèdre, l''hysope et l''écarlate. '
  '53':
  - type: note
    content: expiation 1.4+ ; cf. 14.49.
  - type: text
    content: Il lâchera l'oiseau vivant hors de la ville, dans la campagne. C'est ainsi qu'il fera sur la maison l'expiation, et elle sera pure.
  '54':
  - type: text
    content: 'Telle est la loi relative à tout cas de « lèpre » et à la teigne, '
  '55':
  - type: text
    content: 'à la « lèpre » des vêtements et des maisons, '
  '56':
  - type: text
    content: 'aux tumeurs, aux dartres et aux taches luisantes, '
  '57':
  - type: note
    content: 'pour enseigner  : le verbe hébreu correspondant est apparenté au terme traduit par loi.'
  - type: text
    content: pour enseigner quand il y a impureté et quand il y a pureté. Telle est la loi concernant la « lèpre ».
  '6':
  - type: note
    content: l'oiseau vivant v. 53 ; cf. 16.10,20-26.
  - type: text
    content: 'Quant à l''oiseau vivant, il le prendra, avec le bois de cèdre, l''écarlate et l''hysope ; il les trempera, avec l''oiseau vivant, dans le sang de l''oiseau immolé au-dessus de l''eau vive. '
  '7':
  - type: text
    content: Il en fera sept fois l'aspersion sur celui qui se purifie de la « lèpre ». Puis il le déclarera pur et lâchera l'oiseau vivant dans la campagne.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'lavera / se lavera  : le même verbe traduit ici deux verbes hébreux différents ; le premier est réservé au lavage des vêtements, le second s''emploie plutôt pour celui des personnes. Autre traduction possible, pour le second  : se baignera dans l''eau , de même au v. 9 ; 15.5ss ; 16.4,26,28 ; 17.15s ; Nb 19.7ss,19.'
  - type: text
    content: 'Celui qui se purifie lavera ses vêtements, rasera tout son poil et se lavera avec de l''eau, après quoi il sera pur. Ensuite il pourra rentrer dans le camp, mais il restera sept jours hors de sa tente. '
  '9':
  - type: note
    content: 'son corps  : litt. sa chair.'
  - type: text
    content: 'Le septième jour, il rasera tout son poil, sa tête, sa barbe, ses sourcils, il rasera tout son poil ; il lavera ses vêtements et lavera son corps avec de l''eau, après quoi il sera pur. '
