document_id: LEV.1
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: 'Règles pour les sacrifices : l''holocauste'
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: appela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : c''est le verbe correspondant ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: wayyiqra’
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ), le premier mot du texte hébreu, qui constitue le titre traditionnel du livre dans la Bible hébraïque. Cf. Ex 25.22 ; 40.34-38 ; Hé 9.1-14.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' appela Moïse ; depuis la tente de la Rencontre il lui dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: présent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qorbân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Mc 7.11
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ce qu''on fait approcher '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de l''autel, de Dieu), substantif dérivé en hébreu du verbe traduit ici par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: offrir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', puis par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'présenter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 3ss) ; ce terme s'applique dans Lv et Nb à toute sorte d'offrande ; ailleurs il n'apparaît qu'en Ez 20.28 ; 40.43 ; voir aussi Né 10.35
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Parle aux Israélites ; tu leur diras :'
- type: usfm
  marker: p
  children:
  - type: text
    text: 'Lorsque l''un de vous offre une bête en présent au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', vous offrirez un présent pris sur le gros bétail ou sur le petit bétail.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'holocauste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(v. 3-17) : ce terme d''origine grecque signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'brûlé tout entier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir cependant 7.8) ; le mot hébreu correspondant est apparenté au verbe habituellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: monter
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', soit à cause du mouvement de la fumée vers le ciel, soit parce qu''on faisait monter la victime sur l''autel (cf. 2.12'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ) ; voir 6.1-6 ; cf. Jg 13.16-20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Os 6.6 ; Ps 51.18-21 ; Mc 12.33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sans défaut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entier, intact, parfait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. sans tare et non castré, cf. Ml 1.8 ; un terme apparenté peut s''appliquer à l''intégrité morale (Jb 1.1+). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pour qu''il soit agréé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (le sacrifice, ou bien celui qui l'offre) cf. v. 4 ; 7.18 ; 19.5,7 ; 22.19ss ; 23.11 ; Ex 28.38
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Es 56.7+ ; Jr 6.20.'
    marker-yv: yv-n
  - type: text
    text: 'Si son présent est un holocauste pris sur le gros bétail, il présentera un mâle sans défaut ; il le présentera à l''entrée de la tente de la Rencontre, pour qu''il soit agréé devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il posera la main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : par ce geste, celui qui offre le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifice
      - type: text
        text: ' atteste vraisemblablement que l''offrande est bien la sienne ; selon certains, il s''identifierait, symboliquement, à l''animal offert 4.4 ; cf. 16.21s ; 24.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'holocauste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'animal offert en holocauste
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: expiation
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.20 ; 8.34 ; 9.7 ; 14.53 ; 16 ; 17.11 ; Ez 45.15,17 ; 2Ch 29.24.
    marker-yv: yv-n
  - type: text
    text: 'Il posera la main sur la tête de l''holocauste, et celui-ci sera agréé pour faire l''expiation sur lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il immolera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' porte le pluriel, de même au v. 11 ; cf. 4.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 44.11 ; Esd 8.35 ; 2Ch 29.22-24 ; 35.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: bovin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: '. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: aspergeront
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe au v. 11 ; 3.2,8,13 ; 7.2,14 ; 8.19,24 ; 9.12,18 ; 17.6 ; Ex 24.6,8 ; 29.16,20 ; Nb 18.17 ; 2R 16.13,15 ; Ez 36.25 ; 43.18 ; 2Ch 29.22 ; 30.16 ; 34.11 ; 35.11 ; il signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'jeter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de la suie, de la poussière), en Ex 9.8,10 ; Es 28.25 ; Ez 10.2 ; Jb 2.12 ; 2Ch 34.4. Une aspersion (peut-être selon un rite différent) semble également évoquée par un autre verbe en Lv 4.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ', en ce qui concerne le sacrifice pour le péché. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: sang
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 17.10-14 ; Hé 9.15-28.
    marker-yv: yv-n
  - type: text
    text: 'Il immolera le bovin devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; les fils d''Aaron, les prêtres, présenteront le sang et aspergeront de sang le pourtour de l''autel qui est à l''entrée de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Il dépouillera l''holocauste et le coupera en morceaux. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les fils d''Aaron, le prêtre, mettront du feu sur l''autel et disposeront du bois sur le feu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur le bois…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sur les bois qui (sont) sur le feu qui (est) sur l'autel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 7 ; de même dans la suite.'
    marker-yv: yv-n
  - type: text
    text: 'Les fils d''Aaron, les prêtres, disposeront les morceaux, la tête et la graisse sur le bois, sur le feu de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il lavera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit probablement de celui qui offre le sacrifice, plutôt que du prêtre, cf. v. 5 ; comparer avec Ez 44.11 ; 2Ch 29.22ss ; 35.6 ; voir aussi Ez 40.38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fera fumer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : verbe apparenté au terme qui désigne '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''encens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 4.7 ; Ex 30.34+, de même dans la suite. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: une offrande consumée par le feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot ainsi traduit rappelle le terme hébreu habituellement rendu par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'feu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et désigne toujours un sacrifice (Dt 18.1 ; 1S 2.28). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: odeur agréable
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: odeur apaisante
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 13,17 ; 2.2,9,12 ; 3.5,16 ; 4.31 ; 6.8,14 ; 8.21,28 ; 17.6 ; 23.13,18 ; 26.31 ; voir Gn 8.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ex 29.18,25,41 ; Ez 6.13.'
    marker-yv: yv-n
  - type: text
    text: 'Il lavera avec de l''eau les entrailles et les pattes, et le prêtre fera fumer le tout sur l''autel. C''est un holocauste, une offrande consumée par le feu, une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son présent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Smr
      - type: text
        text: ' et LXX semblent avoir lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'son présent au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si son présent est un holocauste pris sur le petit bétail, sur les moutons ou sur les chèvres, il présentera un mâle sans défaut. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au nord
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ez 40.38-43.'
    marker-yv: yv-n
  - type: text
    text: 'Il l''immolera à côté de l''autel, au nord, devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; les fils d''Aaron, les prêtres, aspergeront de son sang le pourtour de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'Il le coupera en morceaux, avec la tête et la graisse, et le prêtre disposera les morceaux sur le bois, sur le feu de l''autel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'Il lavera avec de l''eau les entrailles et les pattes. Le prêtre présentera le tout et le fera fumer sur l''autel. C''est un holocauste, une offrande consumée par le feu, une odeur agréable pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: .
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'oiseaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.7-10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'colombes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pigeons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; même terme en Gn 8.8ss etc.
    marker-yv: yv-n
  - type: text
    text: 'Si le présent qu''il offre au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' est un holocauste d''oiseaux, il présentera des tourterelles ou des colombes. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '1.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: présentera l'oiseau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le présentera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il lui tordra le cou…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il lui pincera la tête et (la) brûlera
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 5.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'il fera couler '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il fera gicler
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même en 5.9. Le même verbe signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'faire sortir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(l''eau d''une toison mouillée, par essorage) en Jg 6.38 et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vider '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (une coupe, en la buvant) en Es 51.17 ; Ez 23.34 ; Ps 75.9.
    marker-yv: yv-n
  - type: text
    text: 'Le prêtre présentera l''oiseau sur l''autel, et il lui tordra le cou ; il fera fumer la tête sur l''autel, et il fera couler le sang contre la paroi de l''autel. '
  - type: usfm
