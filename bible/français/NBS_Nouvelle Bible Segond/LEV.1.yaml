document_id: LEV.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Règles pour les sacrifices : l''holocauste'
  - type: text
    content: ' '
  - type: note
    content: 'appela  : c''est le verbe correspondant ( wayyiqra’ ), le premier mot du texte hébreu, qui constitue le titre traditionnel du livre dans la Bible hébraïque. Cf. Ex 25.22 ; 40.34-38 ; Hé 9.1-14.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' appela Moïse ; depuis la tente de la Rencontre il lui dit : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'son présent  : Smr et LXX semblent avoir lu son présent au Seigneur.'
  - type: text
    content: 'Si son présent est un holocauste pris sur le petit bétail, sur les moutons ou sur les chèvres, il présentera un mâle sans défaut. '
  '11':
  - type: note
    content: 'au nord  : cf. Ez 40.38-43.'
  - type: text
    content: 'Il l''immolera à côté de l''autel, au nord, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; les fils d''Aaron, les prêtres, aspergeront de son sang le pourtour de l''autel. '
  '12':
  - type: text
    content: 'Il le coupera en morceaux, avec la tête et la graisse, et le prêtre disposera les morceaux sur le bois, sur le feu de l''autel. '
  '13':
  - type: text
    content: 'Il lavera avec de l''eau les entrailles et les pattes. Le prêtre présentera le tout et le fera fumer sur l''autel. C''est un holocauste, une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: note
    content: oiseaux 5.7-10. –  colombes ou pigeons  ; même terme en Gn 8.8ss etc.
  - type: text
    content: 'Si le présent qu''il offre au '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un holocauste d''oiseaux, il présentera des tourterelles ou des colombes. '
  '15':
  - type: note
    content: 'présentera l''oiseau  : litt. le présentera. –  il lui tordra le cou…  : litt. il lui pincera la tête et (la) brûlera, cf. 5.8n. –  il fera couler ou il fera gicler  ; de même en 5.9. Le même verbe signifie faire sortir (l''eau d''une toison mouillée, par essorage) en Jg 6.38 et vider (une coupe, en la buvant) en Es 51.17 ; Ez 23.34 ; Ps 75.9.'
  - type: text
    content: 'Le prêtre présentera l''oiseau sur l''autel, et il lui tordra le cou ; il fera fumer la tête sur l''autel, et il fera couler le sang contre la paroi de l''autel. '
  '16':
  - type: note
    content: 'ses plumes  : autre traduction son ordure (le contenu du jabot ?), cf. v. 9.'
  - type: text
    content: 'Il détachera le jabot avec ses plumes et le jettera près de l''autel, vers l''est, dans le lieu où on met les cendres grasses. '
  '17':
  - type: note
    content: 'entre les ailes ou par les ailes. –  sans en séparer les moitiés  : litt. il ne séparera pas  ; cf. 5.8 ; Gn 15.10. Selon certains, l''interdiction de séparer en deux les oiseaux irait à l''encontre de rites divinatoires d''origine babylonienne. –  sur le feu de bois  : litt. sur le bois qui (est) sur le feu, cf. v. 8n.'
  - type: text
    content: 'Il le fendra entre les ailes, sans en séparer les moitiés ; et le prêtre le fera fumer sur l''autel, sur le feu de bois. C''est un holocauste, une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: note
    content: 'présent  : hébreu qorbân (cf. Mc 7.11n), litt. ce qu''on fait approcher (de l''autel, de Dieu), substantif dérivé en hébreu du verbe traduit ici par offrir, puis par présenter (v. 3ss) ; ce terme s''applique dans Lv et Nb à toute sorte d''offrande ; ailleurs il n''apparaît qu''en Ez 20.28 ; 40.43 ; voir aussi Né 10.35n.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras :'
  - type: text
    content: 'Lorsque l''un de vous offre une bête en présent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', vous offrirez un présent pris sur le gros bétail ou sur le petit bétail.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'holocauste (v. 3-17) : ce terme d''origine grecque signifie brûlé tout entier (voir cependant 7.8) ; le mot hébreu correspondant est apparenté au verbe habituellement rendu par monter , soit à cause du mouvement de la fumée vers le ciel, soit parce qu''on faisait monter la victime sur l''autel (cf. 2.12n) ; voir 6.1-6 ; cf. Jg 13.16-20n  ; Os 6.6 ; Ps 51.18-21 ; Mc 12.33. –  sans défaut ou entier, intact, parfait , c.-à-d. sans tare et non castré, cf. Ml 1.8 ; un terme apparenté peut s''appliquer à l''intégrité morale (Jb 1.1+). –  pour qu''il soit agréé (le sacrifice, ou bien celui qui l''offre) cf. v. 4 ; 7.18 ; 19.5,7 ; 22.19ss ; 23.11 ; Ex 28.38n  ; Es 56.7+ ; Jr 6.20.'
  - type: text
    content: 'Si son présent est un holocauste pris sur le gros bétail, il présentera un mâle sans défaut ; il le présentera à l''entrée de la tente de la Rencontre, pour qu''il soit agréé devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '4':
  - type: note
    content: 'Il posera la main  : par ce geste, celui qui offre le sacrifice atteste vraisemblablement que l''offrande est bien la sienne ; selon certains, il s''identifierait, symboliquement, à l''animal offert 4.4 ; cf. 16.21s ; 24.14. –  l''holocauste  : c.-à-d. l''animal offert en holocauste. –  expiation 4.20 ; 8.34 ; 9.7 ; 14.53 ; 16 ; 17.11 ; Ez 45.15,17 ; 2Ch 29.24.'
  - type: text
    content: 'Il posera la main sur la tête de l''holocauste, et celui-ci sera agréé pour faire l''expiation sur lui. '
  '5':
  - type: note
    content: 'Il immolera  : LXX porte le pluriel, de même au v. 11 ; cf. 4.15n  ; Ez 44.11 ; Esd 8.35 ; 2Ch 29.22-24 ; 35.6. –  bovin  : cf. v. 3. – Voir prêtres. –  aspergeront  : même verbe au v. 11 ; 3.2,8,13 ; 7.2,14 ; 8.19,24 ; 9.12,18 ; 17.6 ; Ex 24.6,8 ; 29.16,20 ; Nb 18.17 ; 2R 16.13,15 ; Ez 36.25 ; 43.18 ; 2Ch 29.22 ; 30.16 ; 34.11 ; 35.11 ; il signifie jeter (de la suie, de la poussière), en Ex 9.8,10 ; Es 28.25 ; Ez 10.2 ; Jb 2.12 ; 2Ch 34.4. Une aspersion (peut-être selon un rite différent) semble également évoquée par un autre verbe en Lv 4.6n, en ce qui concerne le sacrifice pour le péché. –  sang 17.10-14 ; Hé 9.15-28.'
  - type: text
    content: 'Il immolera le bovin devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; les fils d''Aaron, les prêtres, présenteront le sang et aspergeront de sang le pourtour de l''autel qui est à l''entrée de la tente de la Rencontre. '
  '6':
  - type: text
    content: 'Il dépouillera l''holocauste et le coupera en morceaux. '
  '7':
  - type: text
    content: 'Les fils d''Aaron, le prêtre, mettront du feu sur l''autel et disposeront du bois sur le feu. '
  '8':
  - type: note
    content: 'sur le bois…  : litt. sur les bois qui (sont) sur le feu qui (est) sur l''autel, cf. v. 7 ; de même dans la suite.'
  - type: text
    content: 'Les fils d''Aaron, les prêtres, disposeront les morceaux, la tête et la graisse sur le bois, sur le feu de l''autel. '
  '9':
  - type: note
    content: 'Il lavera  : il s''agit probablement de celui qui offre le sacrifice, plutôt que du prêtre, cf. v. 5 ; comparer avec Ez 44.11 ; 2Ch 29.22ss ; 35.6 ; voir aussi Ez 40.38. –  fera fumer  : verbe apparenté au terme qui désigne l''encens en 4.7 ; Ex 30.34+, de même dans la suite. –  une offrande consumée par le feu  : le mot ainsi traduit rappelle le terme hébreu habituellement rendu par feu et désigne toujours un sacrifice (Dt 18.1 ; 1S 2.28). –  odeur agréable  : autre traduction odeur apaisante  : cf. v. 13,17 ; 2.2,9,12 ; 3.5,16 ; 4.31 ; 6.8,14 ; 8.21,28 ; 17.6 ; 23.13,18 ; 26.31 ; voir Gn 8.21n  ; Ex 29.18,25,41 ; Ez 6.13.'
  - type: text
    content: 'Il lavera avec de l''eau les entrailles et les pattes, et le prêtre fera fumer le tout sur l''autel. C''est un holocauste, une offrande consumée par le feu, une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
