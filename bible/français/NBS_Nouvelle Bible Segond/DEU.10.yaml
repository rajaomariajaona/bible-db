document_id: DEU.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pardon du Seigneur
  - type: text
    content: ' '
  - type: note
    content: tablettes 4.13+ ; cf. Ex 24.12 ; 34.1-4. –  coffre Ex 25.10 ; 37.1-5.
  - type: text
    content: 'En ce temps-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : Taille deux tablettes de pierre comme les premières et monte vers moi dans la montagne ; tu feras aussi un coffre en bois. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 9.9+.
  - type: text
    content: 'Je suis resté dans la montagne, comme la première fois, quarante jours et quarante nuits. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a entendu cette fois encore ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas voulu te détruire. '
  '11':
  - type: note
    content: 'Ex 33.1. –  Va, pars  : litt. lève-toi, va, pars. –  du pays… 1.8+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a dit : Va, pars à la tête du peuple. Qu''ils entrent pour prendre possession du pays que j''ai juré à leurs pères de leur donner.'
  - type: heading
    content: La loi d'amour et d'obéissance
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'que demande de toi Mi 6.8. –  craignes 4.10+. –  en aimant…  : cf. 6.5+. –  en servant ou en rendant un culte , comme au v. 20 et en 7.4+. –  de tout ton cœur et de toute ton âme (cf. Gn 1.20n) 4.29+.'
  - type: text
    content: 'Maintenant, Israël, que demande de toi le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, si ce n''est que tu craignes le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en suivant toutes ses voies, en aimant et en servant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, de tout ton cœur et de toute ton âme, '
  '13':
  - type: note
    content: que je les institue 4.2n. –  heureux 4.40n.
  - type: text
    content: 'en observant les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et ses prescriptions, tels que je les institue pour toi aujourd''hui, afin que tu sois heureux ? '
  '14':
  - type: note
    content: 'le ciel du ciel (ou les cieux des cieux, cf. Gn 1.1n) : tournure superlative comme celles du v. 17 ; 1R 8.27 ; Ps 148.4 ; cf. 2Co 12.2.'
  - type: text
    content: 'C''est au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qu''appartiennent le ciel et le ciel du ciel, la terre et tout ce qui s''y trouve. '
  '15':
  - type: note
    content: 4.31,37+ ; 7.7+. –  voilà pourquoi… 2.30n.
  - type: text
    content: 'C''est de tes pères seulement que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''est épris, ce sont eux qu''il a aimés ; et, après eux, c''est leur descendance, c''est vous qu''il a choisis d''entre tous les peuples – voilà pourquoi il en est ainsi en ce jour. '
  '16':
  - type: note
    content: 'Vous circoncirez… votre cœur (litt. le prépuce ou l''incirconcision de votre cœur) 30.6 ; cf. Gn 17.10 ; Lv 26.41+ ; Jr 4.4 ; Rm 2.29+. –  vous ne vous montrerez plus rétifs  : litt. vous ne raidirez plus votre nuque, cf. 9.6n.'
  - type: text
    content: 'Vous circoncirez donc votre cœur et vous ne vous montrerez plus rétifs. '
  '17':
  - type: note
    content: 'Dieu des dieux…  : voir v. 14n  ; cf. Dn 2.47+ ; 1Tm 6.15 ; Ap 17.14 ; 19.16. –  Dieu (hébreu ’El, cf. Gn 21.33n) grand, vaillant et redoutable  : cf. Né 9.32 ; le terme correspondant à vaillant signifie aussi guerrier, héros, cf. Gn 10.8n  ; voir noms divins. –  qui ne fait pas de favoritisme  : litt. qui ne relève pas le(s) visage(s), cf. 1.17n  ; 28.50n  ; voir aussi 2Ch 19.7 ; Ac 10.34 ; Rm 2.11 ; Ga 2.6 ; Ep 6.9 ; Col 3.25 ; 1P 1.17. –  qui n''accepte pas de pot-de-vin 16.19 ; Ex 23.7-8+.'
  - type: text
    content: 'Car le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, est le Dieu des dieux, le Seigneur des seigneurs, le Dieu grand, vaillant et redoutable, qui ne fait pas de favoritisme et qui n''accepte pas de pot-de-vin, '
  '18':
  - type: note
    content: 'Cf. 14.29 ; 16.11-14 ; 24.17,19-21 ; 26.12s ; 27.19 ; Ex 22.20s ; Jr 7.6 ; Ez 22.7 ; Za 7.10 ; Ml 3.5 ; Ps 65.6 ; 94.6 ; 146.9. –  qui défend le droit  : autre traduction qui agit pour le droit de, litt. qui fait le droit de  ; cf. Gn 18.19n. –  l''immigré Ex 12.48n.'
  - type: text
    content: 'qui défend le droit de l''orphelin et de la veuve, qui aime l''immigré et lui donne du pain et un manteau. '
  '19':
  - type: note
    content: 23.8 ; Ex 22.20 ; 23.9 ; Lv 19.33s.
  - type: text
    content: 'Vous aimerez l''immigré, car vous avez été des immigrés en Egypte. '
  '2':
  - type: note
    content: 9.17.
  - type: text
    content: 'J''écrirai sur ces tablettes les paroles qui étaient sur les premières tablettes que tu as brisées, et tu les mettras dans le Coffre. '
  '20':
  - type: note
    content: '6.13 ; Mt 4.10/ /. –  tu t''attacheras 4.4 ; 11.22 ; 13.5 ; 30.20 ; Jos 22.5 ; 23.8 ; 2R 18.6 ; Jr 13.11n  ; Ps 63.9 ; cf. 1Co 6.17. –  prêteras serment  : le même verbe hébreu est traduit par jurer au v. 11.'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, que tu craindras ; c''est lui que tu serviras, c''est à lui que tu t''attacheras, c''est par son nom que tu prêteras serment. '
  '21':
  - type: note
    content: 'ta gloire  : litt. ta louange, comme en Jr 17.14 ; cf. Rm 2.29n. –  c''est lui qui a fait…  : cf. Lc 1.49. –  chez toi  : autre traduction avec toi. –  que tes yeux ont vues 1.31+.'
  - type: text
    content: 'Il est ta gloire, il est ton Dieu : c''est lui qui a fait chez toi ces œuvres grandes et redoutables que tes yeux ont vues. '
  '22':
  - type: note
    content: 'descendus Gn 12.10n. –  soixante-dix  : cf. Gn 46.27 ; Ex 1.5 ; Ac 7.14. –  étoiles 1.10+.'
  - type: text
    content: 'Tes pères sont descendus en Egypte au nombre de soixante-dix ; et maintenant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a fait de toi une multitude pareille aux étoiles du ciel.'
  '3':
  - type: text
    content: 'J''ai fait un coffre en bois d''acacia, j''ai taillé deux tablettes de pierre comme les premières et je suis monté dans la montagne, les deux tablettes dans ma main. '
  '4':
  - type: note
    content: 5.6-21.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a écrit sur les tablettes ce qui avait été écrit sur les premières, les dix paroles qu''il vous avait dites dans la montagne, du milieu du feu, au jour de l''assemblée ; et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me les a données. '
  '5':
  - type: note
    content: Je suis redescendu 1.7n  ; 9.15n.
  - type: text
    content: 'Je suis redescendu de la montagne, j''ai mis les tablettes dans le coffre que j''avais fait, et elles sont restées là, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me l''avait ordonné.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 6-9, qui portent sur des événements postérieurs à l''épisode du Sinaï, constituent une parenthèse dans le discours principal (cf. 9.22-24). –  Bééroth-Bené-Yaaqân  : litt. Puits (au pluriel) des fils de Yaaqân , cf. Nb 33.31n. –  Moséra  : cf. Moséroth en Nb 33.30. –  Aaron  : cf. Nb 20.22-29 ; 33.37s ; voir aussi Lv 6.15+. –  sacerdoce  : voir prêtre.'
  - type: text
    content: 'Les Israélites partirent de Bééroth-Bené-Yaaqân pour Moséra. C''est là que mourut Aaron et qu''il fut enseveli ; son fils Eléazar lui succéda dans le sacerdoce. '
  '7':
  - type: note
    content: Cf. Nb 33.32s.
  - type: text
    content: Ils partirent de là pour Goudgoda, et de Goudgoda pour Yotbata, pays où il y a des cours d'eau.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'sépara  : autre traduction mit à part  ; cf. 4.41n. –  lévites  : cf. 18.1-8 ; 31.9,25 ; 33.8 ; Ex 32.25-29 ; Nb 3.6-12. –  pour qu''elle porte le coffre  : cf. v. 1,3,5 ; Jos 3.3. –  se tienne (ou se tienne debout… ; se tienne au service du Seigneur , cf. 1.38) / officier  : expressions consacrées pour le service officiel, en particulier au temple  ; cf. 17.12 ; 18.5,7 ; 21.5 ; 33.10 ; Nb 4.9,12,14 ; Jg 20.28 ; 1R 10.8n  ; Es 60.7 ; 61.6 ; cf. Hé 10.11. – Voir bénédiction et nom.'
  - type: text
    content: 'En ce temps-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sépara la tribu des lévites pour qu''elle porte le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour qu''elle se tienne devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' afin d''officier pour lui et de bénir le peuple en son nom – jusqu''à ce jour. '
  '9':
  - type: note
    content: 12.12 ; 14.27 ; 18.2 ; Nb 18.20+ss ; Jos 13.33 ; Ez 44.28.
  - type: text
    content: 'C''est pourquoi Lévi n''a aucune part au patrimoine de ses frères : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est son patrimoine, selon ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, a dit à son sujet.'
