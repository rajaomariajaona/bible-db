document_id: DEU.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les villes de refuge
  - type: text
    content: ' '
  - type: note
    content: retranché 12.29. –  dépossédées 4.38+. –  dans leurs villes… 6.10s.
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, aura retranché les nations dont le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne le pays, lorsque tu les auras dépossédées et que tu habiteras dans leurs villes et dans leurs maisons, '
  '10':
  - type: note
    content: du pays… 3.20+.
  - type: text
    content: 'Ainsi, on ne répandra pas de sang innocent au sein du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine, et il n''y aura pas de sang sur toi.'
  '11':
  - type: text
    content: 'Mais si un homme déteste son prochain, s''il lui tend une embuscade, s''il se dresse contre lui et le frappe mortellement, de sorte que l''autre meure ; s''il s''enfuit dans l''une de ces villes, '
  '12':
  - type: text
    content: 'les anciens de sa ville le feront arrêter et le livreront au rédempteur du sang, afin qu''il meure. '
  '13':
  - type: note
    content: 'sans pitié 7.16+. –  tu élimineras 13.6n. –  le sang de l''innocent  : certains mss portent le sang innocent  ; on peut comprendre  : tu élimineras les meurtres, les meurtriers ou encore  : tu vengeras les victimes (cf. 21.8ns ; Nb 35.33). –  heureux 4.40n.'
  - type: text
    content: Ton œil sera sans pitié pour lui ; tu élimineras d'Israël le sang de l'innocent, et tu seras heureux.
  - type: heading
    content: Les limites des terrains
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'les bornes  : le terme correspondant est habituellement traduit par territoire, frontière, limite  ; 27.17 ; cf. Lv 25.23-28 ; Os 5.10.'
  - type: text
    content: 'Tu ne déplaceras pas les bornes de ton prochain, qui ont été posées par les anciens, dans le patrimoine que tu recevras au pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne pour que tu en prennes possession.'
  - type: heading
    content: Les témoins
  '15':
  - type: text
    content: ' '
  - type: note
    content: '17.6+ ; Mt 18.16/ / ; 2Co 13.1 ; 1Tm 5.19. –  Un seul témoin…  : cf. Ps 27.12 ; 35.11 ; Jb 16.8.'
  - type: text
    content: Un seul témoin ne pourra se dresser contre un homme pour établir une faute ou un péché quelconque de tous les péchés qu'on peut commettre ; un fait ne sera établi que sur la déposition de deux ou trois témoins.
  '16':
  - type: text
    content: ' '
  - type: note
    content: subversion 13.6n  ; cf. 1R 21.10,13.
  - type: text
    content: 'Lorsqu''un témoin malveillant se dresse contre quelqu''un pour l''accuser de subversion, '
  '17':
  - type: note
    content: Cf. 17.9. – Voir prêtre.
  - type: text
    content: 'les deux hommes en litige se tiendront devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', devant les prêtres et les juges qui seront en fonction en ces jours-là. '
  '18':
  - type: note
    content: recherche 13.15+. –  faux témoin 5.20.
  - type: text
    content: 'Les juges procéderont à une recherche sérieuse : le témoin est-il un faux témoin, a-t-il fait contre son frère une fausse déposition, '
  '19':
  - type: note
    content: Tu élimineras… 13.6n.
  - type: text
    content: 'alors vous le traiterez comme il avait projeté de traiter son frère. Tu élimineras ainsi de ton sein ce qui est mauvais. '
  '2':
  - type: note
    content: 'V. 7,9 ; cf. 4.41nss (à l''est du Jourdain) ; Jos 20.7 (à l''ouest). –  du pays  : litt. de ton pays, de même dans la suite.'
  - type: text
    content: 'tu mettras à part trois villes au milieu du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne pour que tu en prennes possession. '
  '20':
  - type: note
    content: 13.12+.
  - type: text
    content: 'Les autres l''apprendront, et ils auront peur : on ne commettra plus une action aussi mauvaise en ton sein. '
  '21':
  - type: note
    content: 'sans pitié 7.16+. –  vie pour vie…  : cf. Ex 21.23-24+ ; Mt 5.38.'
  - type: text
    content: 'Ton œil sera sans pitié : vie pour vie, œil pour œil, dent pour dent, main pour main, pied pour pied.'
  '3':
  - type: note
    content: 'Tu construiras des routes  : certains comprennent tu dresseras un plan ou tu garantiras leur libre accès. –  Ainsi tout meurtrier… Nb 35.9-29.'
  - type: text
    content: 'Tu construiras des routes et tu diviseras en trois parties le territoire du pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, t''aura donné comme patrimoine. Ainsi tout meurtrier pourra s''y enfuir. '
  '4':
  - type: note
    content: 'par méprise  : litt. sans connaissance  ; LXX involontairement, cf. 4.42 ; Jos 20.3,5.'
  - type: text
    content: 'Voici dans quel cas le meurtrier pourra s''enfuir là pour rester en vie : s''il a tué son prochain par méprise, alors que d''habitude il ne le détestait pas ; '
  '5':
  - type: note
    content: 'que sa main ait brandi la hache  : autre traduction que sa main soit entraînée par la hache lorsqu''il coupe un arbre. –  le fer se soit échappé du manche  : autre traduction le fer projeté loin de l''arbre (le même mot hébreu peut désigner l’arbre, le manche ou plus généralement le bois  ; cf. 16.21n  ; 21.22n). –  atteint  : litt. trouvé.'
  - type: text
    content: 's''il s''est rendu avec son prochain dans la forêt pour abattre des arbres, que sa main ait brandi la hache pour couper un arbre, que le fer se soit échappé du manche, qu''il ait atteint son prochain et que celui-ci soit mort, alors il pourra s''enfuir dans l''une de ces villes pour rester en vie, '
  '6':
  - type: note
    content: 'rédempteur du sang Nb 35.12n  ; cf. Ex 6.6n. –  dans l''ardeur de sa colère  : litt. parce que son cœur s''échauffe. –  mortellement  : litt. (à) la vie ou à l''être, de même au v. 11 ; sur le terme hébreu correspondant, cf. Gn 1.20n.'
  - type: text
    content: 'de peur que le rédempteur du sang, dans l''ardeur de sa colère, ne le poursuive et ne le rattrape, parce que le chemin serait trop long, et qu''il ne le frappe mortellement, alors qu''il ne mérite pas la mort, puisque d''habitude il ne détestait pas son prochain. '
  '7':
  - type: text
    content: 'C''est pourquoi je t''ordonne de mettre à part trois villes. '
  '8':
  - type: note
    content: 12.20. –  comme il l'a juré 1.8+.
  - type: text
    content: 'Si le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, agrandit ton territoire, comme il l''a juré à tes pères, et s''il te donne tout le pays qu''il a promis de donner à tes pères, '
  '9':
  - type: note
    content: 'que tu observes… 5.1n. –  tout ce commandement (5.31+) que j''institue pour toi…  : autre traduction tout ce commandement, ce que je t''ordonne  ; cf. 4.2n. –  en aimant 5.10+. –  toujours  : litt. tous les jours. –  tu ajouteras…  : cf. v. 2n.'
  - type: text
    content: '– pourvu que tu observes, en le mettant en pratique, tout ce commandement que j''institue pour toi aujourd''hui, en aimant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, et en suivant toujours ses voies – alors tu ajouteras encore trois villes à ces trois-là. '
