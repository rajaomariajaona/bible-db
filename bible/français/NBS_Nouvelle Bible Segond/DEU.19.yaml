    marker-yv: yv-n
  - type: text
    text: 'Ainsi, on ne répandra pas de sang innocent au sein du pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, te donne comme patrimoine, et il n''y aura pas de sang sur toi.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Mais si un homme déteste son prochain, s''il lui tend une embuscade, s''il se dresse contre lui et le frappe mortellement, de sorte que l''autre meure ; s''il s''enfuit dans l''une de ces villes, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: 'les anciens de sa ville le feront arrêter et le livreront au rédempteur du sang, afin qu''il meure. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '19.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sans pitié '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tu élimineras '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '13.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
