    marker-yv: yv-n
  - type: text
    text: 's''il s''est rendu avec son prochain dans la forêt pour abattre des arbres, que sa main ait brandi la hache pour couper un arbre, que le fer se soit échappé du manche, qu''il ait atteint son prochain et que celui-ci soit mort, alors il pourra s''enfuir dans l''une de ces villes pour rester en vie, '
  - type: usfm
    marker: vlbl
