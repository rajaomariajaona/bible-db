        text: le sang de l'innocent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le sang innocent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on peut comprendre'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu élimineras les meurtres, les meurtriers '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ou encore
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu vengeras les victimes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 21.8
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: 's ; Nb 35.33). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'heureux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.40'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Ton œil sera sans pitié pour lui ; tu élimineras d'Israël le sang de l'innocent, et tu seras heureux.
