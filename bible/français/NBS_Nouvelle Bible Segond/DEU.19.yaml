    marker-yv: yv-n
  - type: text
    text: 'Voici dans quel cas le meurtrier pourra s''enfuir là pour rester en vie : s''il a tué son prochain par méprise, alors que d''habitude il ne le détestait pas ; '
  - type: usfm
    marker: vlbl
