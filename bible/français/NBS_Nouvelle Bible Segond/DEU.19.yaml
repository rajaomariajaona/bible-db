  - type: text
    text: 'de peur que le rédempteur du sang, dans l''ardeur de sa colère, ne le poursuive et ne le rattrape, parce que le chemin serait trop long, et qu''il ne le frappe mortellement, alors qu''il ne mérite pas la mort, puisque d''habitude il ne détestait pas son prochain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
