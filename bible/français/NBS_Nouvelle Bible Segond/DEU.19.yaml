    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: que sa main soit entraînée par la hache lorsqu'il coupe un arbre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le fer se soit échappé du manche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le fer projeté loin de l''arbre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (le même mot hébreu peut désigner l’
    - type: usfm
      marker: fq
      children:
      - type: text
        text: arbre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', le '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'manche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou plus généralement le '
    - type: usfm
      marker: fqa
      children:
      - type: text
