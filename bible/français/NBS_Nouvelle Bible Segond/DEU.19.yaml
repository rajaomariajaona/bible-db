    marker-yv: yv-n
  - type: text
    text: 'Tu construiras des routes et tu diviseras en trois parties le territoire du pays que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ton Dieu, t''aura donné comme patrimoine. Ainsi tout meurtrier pourra s''y enfuir. '
  - type: usfm
    marker: vlbl
