      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi Mc 6.31.'
    marker-yv: yv-n
  - type: text
    text: 'Quelques jours après, il revint à Capharnaüm. On apprit qu''il était à la maison, '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 3.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'devant la porte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la Parole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 4.33 ; 8.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'et il se rassembla un si grand nombre de gens qu''il n''y avait plus de place, même devant la porte. Il leur disait la Parole. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: text
    text: 'On vient lui amener un paralytique porté par quatre hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en terrasse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte, cf. Dt 22.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. Il s''agissait sans doute d''une terrasse de bois et de terre battue ; le mot grec traduit ici par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'toit en terrasse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'n''apparaît qu''ici et en Mt 8.8/ / ; autre terme en Mc 13.15/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le grabat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme grec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: krabattos
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''où vient le mot français correspondant, désignait, déjà, un lit misérable, la couche du pauvre ; de même 6.55 ; Jn 5.8ss ; Ac 5.15 ; 9.33.'
    marker-yv: yv-n
  - type: text
    text: 'Comme ils ne pouvaient pas l''amener jusqu''à lui, à cause de la foule, ils découvrirent le toit en terrasse au-dessus de l''endroit où il se tenait et y firent une ouverture, par laquelle ils descendent le grabat où le paralytique était couché. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.40 ; 5.34,36 ; 9.23 ; 10.52 ; 11.23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mon enfant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tes '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péchés
      - type: text
        text: '… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 7.48.
    marker-yv: yv-n
  - type: text
    text: 'Voyant leur foi, Jésus dit au paralytique : Mon enfant, tes péchés sont pardonnés. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribes
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 16 ; 1.22 ; 3.22 ; 7.1 ; 8.31 ; 9.11 ; 10.32 ; 11.18 ; 12.28 etc. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui tenaient ce raisonnement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui raisonnaient en leurs '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même à la fin du v. 8.'
    marker-yv: yv-n
  - type: text
    text: 'Il y avait là quelques scribes, assis, qui tenaient ce raisonnement : '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'blasphème '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 3.28 ; 14.64 ; 15.29
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jn 5.18 ; 10.30-39 ; cf. Lv 24.10s,14ss,23 ; 2R 19.4,6,22. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'un seul, Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Dieu seul
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 10.18 ; voir aussi Es 43.25 ; 55.7 ; Ps 103.3 ; 130.4 ; 1Jn 1.9.'
    marker-yv: yv-n
  - type: text
    text: 'Pourquoi parle-t-il ainsi ? Il blasphème. Qui peut pardonner les péchés, sinon un seul, Dieu ? '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'connut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Mt 12.25 ; Jn 2.25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'par son '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : on peut comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans son esprit
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui reviendrait à dire, plus simplement'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jésus sut qu'ils raisonnaient ainsi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais on peut aussi voir dans l’'
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'esprit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en question l''Esprit divin qui donne à Jésus une faculté de perception extraordinaire ; de même 8.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les raisonnements…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qu''ils raisonnaient ainsi en eux-mêmes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: entre eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; cf. Mt 16.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pourquoi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 16.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tenez-vous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'raisonnez-vous cela en vos cœurs ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. v. 6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Jésus connut aussitôt, par son esprit, les raisonnements qu''ils tenaient ; il leur dit : Pourquoi tenez-vous de tels raisonnements ? '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Qu''est-ce qui est le plus facile, de dire au paralytique : « Tes péchés sont pardonnés », ou de dire : « Lève-toi, prends ton grabat et marche ! » '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: afin que vous sachiez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : selon certains, cette proposition serait adressée par l''évangéliste à ses lecteurs ; elle est plus fréquemment comprise comme une parole de Jésus à ceux qui l''entourent, expliquant d''avance l''ordre de guérison. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
      - type: text
        text: ' de l''homme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 28 ; 8.31 ; 9.9 ; 10.33 ; 13.23 ; 14.21 ; Mt 8.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''autorité pour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le pouvoir de '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Eh bien, afin que vous sachiez que le Fils de l''homme a l''autorité pour pardonner les péchés sur la terre – il dit au paralytique : '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Jn 5.8s.
    marker-yv: yv-n
  - type: text
    text: 'Je te le dis, lève-toi, prends ton grabat et retourne chez toi. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sortit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 13 ; 1.29,38. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: stupéfaits
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le verbe grec correspondant signifie proprement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être hors de soi-même
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; c''est de lui que vient notre terme '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: extase
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 5.42'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 6.51 ; 16.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: glorifiaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: gloire
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'rien vu de pareil '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 9.33.
    marker-yv: yv-n
  - type: text
    text: 'L''homme se leva, prit aussitôt son grabat et sortit devant tout le monde, de sorte que, stupéfaits, tous glorifiaient Dieu en disant : Nous n''avons jamais rien vu de pareil.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Lévi, le collecteur des taxes
  marker-yv: yv-h
- type: usfm
