  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'du côté de la mer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.16+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la foule '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 1s ; 3.7s,20 ; 4.1 ; 5.21 ; 6.31,34,54 ; 8.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: instruisait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'enseigner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 1.22.
    marker-yv: yv-n
  - type: text
    text: 'Il sortit encore du côté de la mer ; toute la foule venait à lui, et il les instruisait. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Lévi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Jacques
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, moins probablement, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'frère '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: d'Alphée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Lévi d'Alphée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 3.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '/ / ; Mt 9.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'taxes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: douanes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : il s''agit de l''impôt indirect prélevé sur les marchandises en circulation, soit pour le compte de Rome, soit pour le compte de l''autorité locale ('
      - type: usfm
        marker: w
        children:
        - type: text
