document_id: MRK.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le paralytique de Capharnaüm
  - type: heading
    content: Mt 9.1-8  ; Lc 5.17-26
  - type: text
    content: ' '
  - type: note
    content: 'à la maison  : cf. 1.29 ; même expression en 3.20 ; 9.28 ; 1Co 11.34 ( chez lui ) ; 14.35 ; cf. Mc 2.15n  ; Mt 4.13n  ; voir aussi Mc 6.31.'
  - type: text
    content: 'Quelques jours après, il revint à Capharnaüm. On apprit qu''il était à la maison, '
  '10':
  - type: note
    content: 'afin que vous sachiez…  : selon certains, cette proposition serait adressée par l''évangéliste à ses lecteurs ; elle est plus fréquemment comprise comme une parole de Jésus à ceux qui l''entourent, expliquant d''avance l''ordre de guérison. –  le Fils de l''homme v. 28 ; 8.31 ; 9.9 ; 10.33 ; 13.23 ; 14.21 ; Mt 8.20n. –  l''autorité pour ou le pouvoir de 1.22n.'
  - type: text
    content: 'Eh bien, afin que vous sachiez que le Fils de l''homme a l''autorité pour pardonner les péchés sur la terre – il dit au paralytique : '
  '11':
  - type: note
    content: Cf. Jn 5.8s.
  - type: text
    content: 'Je te le dis, lève-toi, prends ton grabat et retourne chez toi. '
  '12':
  - type: note
    content: 'sortit v. 13 ; 1.29,38. –  stupéfaits  : le verbe grec correspondant signifie proprement être hors de soi-même  ; c''est de lui que vient notre terme extase  ; cf. 3.21n  ; 5.42n  ; 6.51 ; 16.8. –  glorifiaient  : voir gloire. –  rien vu de pareil Mt 9.33.'
  - type: text
    content: 'L''homme se leva, prit aussitôt son grabat et sortit devant tout le monde, de sorte que, stupéfaits, tous glorifiaient Dieu en disant : Nous n''avons jamais rien vu de pareil.'
  - type: heading
    content: Lévi, le collecteur des taxes
  - type: heading
    content: Mt 9.9-13  ; Lc 5.27-32
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'du côté de la mer 1.16+. –  la foule v. 1s ; 3.7s,20 ; 4.1 ; 5.21 ; 6.31,34,54 ; 8.1. –  instruisait  : le même verbe est traduit par enseigner en 1.22.'
  - type: text
    content: 'Il sortit encore du côté de la mer ; toute la foule venait à lui, et il les instruisait. '
  '14':
  - type: note
    content: 'Lévi (certains mss portent Jacques), fils ou, moins probablement, frère d''Alphée  : litt. Lévi d''Alphée  ; cf. 3.18n/ / ; Mt 9.9. –  taxes ou douanes  : il s''agit de l''impôt indirect prélevé sur les marchandises en circulation, soit pour le compte de Rome, soit pour le compte de l''autorité locale (Hérode Antipas en Galilée). –  Suis-moi  : cf. 1.16ss ; Jn 1.43.'
  - type: text
    content: 'En passant, il vit Lévi, fils d''Alphée, assis au bureau des taxes. Il lui dit : Suis-moi. Celui-ci se leva et le suivit.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'chez lui  : litt. dans sa maison  ; on comprend habituellement chez Lévi (cf. Lc 5.29), mais l''expression de Mc est ambiguë et pourrait aussi désigner la maison de Jésus (v. 1+). –  collecteurs des taxes  : ce sont les subalternes des publicains à qui l''autorité civile avait confié la perception des droits de douane (v. 14n) ; sur leur réputation de pécheurs (en l''occurrence, de non-pratiquants de la loi religieuse, cf. 8.38 ; 14.41 ; Jn 9.16,24) infréquentables, voir Mt 11.19 ; 18.17 ; 21.31 ; Lc 3.12s ; 7.29 ; 18.9-14 ; 19.7s. –  ils étaient nombreux  : cf. v. 1. –  à le suivre  : on pourrait aussi rattacher ces derniers mots au v. 16 et lire  : même les scribes des pharisiens le suivaient ; le voyant…'
  - type: text
    content: 'Comme il était à table chez lui, beaucoup de collecteurs des taxes et de pécheurs avaient pris place avec Jésus et ses disciples, car ils étaient nombreux à le suivre. '
  '16':
  - type: note
    content: 'Les scribes des pharisiens, c.-à-d. les scribes du parti des pharisiens  ; voir v. 6+,15n. –  Pourquoi mange-t-il avec…  : cf. Mt 9.11 ; 11.19 ; Lc 7.34 ; 15.1s ; 19.7 ; Ga 2.12-15.'
  - type: text
    content: 'Les scribes des pharisiens, le voyant manger avec les collecteurs des taxes et les pécheurs, disaient à ses disciples : Pourquoi mange-t-il avec les collecteurs des taxes et les pécheurs ? '
  '17':
  - type: note
    content: 'les bien portants  : litt. ceux qui sont forts (ou en bonne santé). –  Je ne suis pas venu…  : cf. 4.21n  ; 9.11ss ; 10.45 ; 11.9 ; Jn 3.17. –  justes / pécheurs  : cf. Mt 18.11n  ; 21.31 ; Lc 19.10 ; 1Tm 1.15.'
  - type: text
    content: 'Jésus, qui avait entendu, leur dit : Ce ne sont pas les bien portants qui ont besoin de médecin, mais les malades. Je ne suis pas venu appeler des justes, mais des pécheurs.'
  - type: heading
    content: Jésus et le jeûne
  - type: heading
    content: Mt 9.14-17  ; Lc 5.33-38
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'disciples de Jean (le Baptiseur) Mt 11.2 ; 14.2 ; Lc 11.1 ; Jn 3.25 ; 4.1 ; Ac 18.25 ; 19.1. –  On vient  : autre traduction ils viennent . –  jeûnent Lv 16.29ss ; 23.27ss ; Nb 29.7 ; 2S 12.16,21 ; 1R 21.27 ; Es 58.1ss ; Jl 1.14 ; 2.15-27 ; Za 7.3ss ; 8.19 ; Ps 35.13 ; Est 9.31 ; Dn 9.3 ; Esd 10.6 ; Né 9.1.'
  - type: text
    content: 'Les disciples de Jean et les pharisiens jeûnaient. On vient lui dire : Pourquoi tes disciples à toi ne jeûnent-ils pas, alors que les disciples de Jean et les disciples des pharisiens jeûnent ? '
  '19':
  - type: note
    content: 'Jésus répondit  : litt. Jésus leur dit. –  Les amis du marié  : litt. les fils de la salle des noces (Mt 22.10) ou de la chambre nuptiale (selon les deux sens possibles du mot grec) ; selon certains, l''expression désignerait tous les invités à la noce ; mais il s''agit plus probablement de ceux qui jouaient un rôle central, autour du marié, dans le déroulement des noces ; voir aussi Jn 3.29n  ; cf. Es 61.10 ; voir aussi Mt 25.1ss ; 2Co 11.2 ; Ep 5.25 ; Ap 21.2,9 ; 22.17.'
  - type: text
    content: 'Jésus répondit : Les amis du marié peuvent-ils jeûner pendant que le marié est avec eux ? Aussi longtemps qu''ils ont le marié avec eux, ils ne peuvent jeûner. '
  '2':
  - type: note
    content: Cf. 3.7+. –  devant la porte 1.33. –  la Parole 1.45n  ; 4.33 ; 8.32n.
  - type: text
    content: 'et il se rassembla un si grand nombre de gens qu''il n''y avait plus de place, même devant la porte. Il leur disait la Parole. '
  '20':
  - type: note
    content: Cf. 14.7/ / ; Lc 17.22 ; Jn 16.20. Voir aussi Lc 5.35n.
  - type: text
    content: Les jours viendront où le marié leur sera enlevé ; alors ils jeûneront, en ce jour-là.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lc 5.39n. –  neuf  : litt. non foulé , c.-à-d. non lavé ou non apprêté (autre terme dans la suite) ; cf. 9.3n. –  la pièce…  : litt. le complément (sur le mot correspondant voir Mt 9.16n) s''enlève de lui, le neuf du vieux  ; cf. Ga 2.18.'
  - type: text
    content: 'Personne ne coud un morceau de drap neuf sur un vieil habit ; autrement la pièce tire sur le vêtement, le neuf sur le vieux, et il en résulte une déchirure pire. '
  '22':
  - type: note
    content: 'à vin nouveau…  : litt. vin nouveau en outres neuves  ; certains mss portent on met ou il faut mettre le vin nouveau dans des outres neuves. Le vin nouveau est celui dont la fermentation n''est pas terminée, et qui peut faire éclater de vieilles outres dont l''élasticité n''est plus suffisante ; cf. Jb 32.19 ; voir aussi Jn 1.17 ; 2Co 5.17 ; Ga 4.9 ; Ep 4.22ss ; Col 3.9ss ; Ap 21.1-5.'
  - type: text
    content: Et personne ne met du vin nouveau dans de vieilles outres ; autrement le vin fait éclater les outres, et le vin et les outres sont perdus ; à vin nouveau, outres neuves !
  - type: heading
    content: Les épis arrachés
  - type: heading
    content: Mt 12.1-8  ; Lc 6.1-5
  '23':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 23.26.
  - type: text
    content: 'Comme il traversait des champs de blé un jour de sabbat, ses disciples, chemin faisant, se mirent à arracher des épis. '
  '24':
  - type: note
    content: 'Ex 31.13-17 ; 34.21 ; Mt 12.2n. –  lui disaient  : autre traduction lui dirent (cf. v. 16). –  ce qui n''est pas permis  : le terme grec (de même au v. 26 ; 3.4 etc.) est apparenté au mot traduit par autorité, lequel peut aussi avoir le sens de droit (1.22n  ; Jn 1.12n  ; 1Co 8.9n).'
  - type: text
    content: 'Les pharisiens lui disaient : Pourquoi font-ils ce qui n''est pas permis un jour de sabbat ? '
  '25':
  - type: note
    content: 1S 21.2-7.
  - type: text
    content: 'Il leur dit : N''avez-vous jamais lu ce que fit David, lorsqu''il fut dans le besoin et qu''il eut faim, lui et ceux qui étaient avec lui ? '
  '26':
  - type: note
    content: 'Abiathar  : cf. 2S 8.17n  ; 15.35. –  qu''aux prêtres Mt 12.4+ ; cf. Lv 24.9.'
  - type: text
    content: '– comment il entra dans la maison de Dieu du temps du grand prêtre Abiathar, mangea les pains offerts, alors qu''il n''est permis qu''aux prêtres d''en manger, et en donna même à ceux qui étaient avec lui ? '
  '27':
  - type: note
    content: 'il leur disait  : autre traduction il leur dit. – Cf. 3.4+ ; Ex 20.10 ; 23.12 ; Dt 5.14 ; cf. 1 Maccabées 2.40s (à la suite d''un massacre de Juifs qui avaient refusé à la fois de se rendre et de se battre le jour du sabbat) : « Si nous ne luttons pas… ils auront tôt fait de nous exterminer… Tout homme qui viendrait nous attaquer le jour du sabbat, combattons-le et nous ne mourrons donc pas tous comme sont morts nos frères. » Midrash Mekhilta (commentaire rabbinique sur l''Exode) : « A vous le sabbat est livré et vous n''êtes pas livrés au sabbat. »'
  - type: text
    content: 'Et il leur disait : Le sabbat a été fait pour l''homme, et non l''homme pour le sabbat, '
  '28':
  - type: note
    content: le Fils de l'homme v. 10+. –  maître ou Seigneur  ; cf. Jn 5.16ss.
  - type: text
    content: de sorte que le Fils de l'homme est maître même du sabbat.
  '3':
  - type: text
    content: 'On vient lui amener un paralytique porté par quatre hommes. '
  '4':
  - type: note
    content: 'en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n. Il s''agissait sans doute d''une terrasse de bois et de terre battue ; le mot grec traduit ici par toit en terrasse n''apparaît qu''ici et en Mt 8.8/ / ; autre terme en Mc 13.15/ /. –  le grabat  : le terme grec krabattos, d''où vient le mot français correspondant, désignait, déjà, un lit misérable, la couche du pauvre ; de même 6.55 ; Jn 5.8ss ; Ac 5.15 ; 9.33.'
  - type: text
    content: 'Comme ils ne pouvaient pas l''amener jusqu''à lui, à cause de la foule, ils découvrirent le toit en terrasse au-dessus de l''endroit où il se tenait et y firent une ouverture, par laquelle ils descendent le grabat où le paralytique était couché. '
  '5':
  - type: note
    content: 'foi  : cf. 4.40 ; 5.34,36 ; 9.23 ; 10.52 ; 11.23. –  Mon enfant 10.24. –  tes péchés… Lc 7.48.'
  - type: text
    content: 'Voyant leur foi, Jésus dit au paralytique : Mon enfant, tes péchés sont pardonnés. '
  '6':
  - type: note
    content: 'scribes v. 16 ; 1.22 ; 3.22 ; 7.1 ; 8.31 ; 9.11 ; 10.32 ; 11.18 ; 12.28 etc. –  qui tenaient ce raisonnement  : litt. qui raisonnaient en leurs cœurs, de même à la fin du v. 8.'
  - type: text
    content: 'Il y avait là quelques scribes, assis, qui tenaient ce raisonnement : '
  '7':
  - type: note
    content: 'blasphème 3.28 ; 14.64 ; 15.29n  ; Jn 5.18 ; 10.30-39 ; cf. Lv 24.10s,14ss,23 ; 2R 19.4,6,22. –  un seul, Dieu ou Dieu seul  : cf. 10.18 ; voir aussi Es 43.25 ; 55.7 ; Ps 103.3 ; 130.4 ; 1Jn 1.9.'
  - type: text
    content: 'Pourquoi parle-t-il ainsi ? Il blasphème. Qui peut pardonner les péchés, sinon un seul, Dieu ? '
  '8':
  - type: note
    content: 'connut Mt 12.25 ; Jn 2.25. –  par son esprit  : on peut comprendre dans son esprit, ce qui reviendrait à dire, plus simplement  : Jésus sut qu''ils raisonnaient ainsi  ; mais on peut aussi voir dans l’esprit en question l''Esprit divin qui donne à Jésus une faculté de perception extraordinaire ; de même 8.12. –  les raisonnements…  : litt. qu''ils raisonnaient ainsi en eux-mêmes (ou entre eux) ; cf. Mt 16.7n. –  Pourquoi  : cf. Mt 16.8. –  tenez-vous…  : litt. raisonnez-vous cela en vos cœurs ? cf. v. 6n.'
  - type: text
    content: 'Jésus connut aussitôt, par son esprit, les raisonnements qu''ils tenaient ; il leur dit : Pourquoi tenez-vous de tels raisonnements ? '
  '9':
  - type: text
    content: 'Qu''est-ce qui est le plus facile, de dire au paralytique : « Tes péchés sont pardonnés », ou de dire : « Lève-toi, prends ton grabat et marche ! » '
