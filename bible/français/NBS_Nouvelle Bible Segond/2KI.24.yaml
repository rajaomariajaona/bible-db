      marker-yv: yv-n
    - type: text
      text: 'Alors Joïakîn, roi de Juda, se rendit au roi de Babylone, lui et sa mère, ses hommes, ses princes et ses hauts fonctionnaires. Le roi de Babylone le fit prisonnier, la huitième année de son règne. '
