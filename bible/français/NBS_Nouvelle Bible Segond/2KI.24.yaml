document_id: 2KI.24,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'En ses jours , c.-à-d. du temps de Joïaqim. –  Nabuchodonosor  : hébreu Nevoukadnetsar , akkadien Nabou-koudourri-ousour , ce fils de Nabopolassar régna de 605 à 562 av. J.-C. –  se mit en campagne  : litt. monta . –  il changea  : litt. il revint.'
  - type: text
    content: 'En ses jours, Nabuchodonosor, roi de Babylone, se mit en campagne. Joïaqim lui fut soumis pendant trois ans ; mais il changea et se rebella contre lui. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Le siège de Jérusalem est rapporté dans la chronique babylonienne. –  partirent à l''attaque  : litt. montèrent , comme au v. 1 ; une autre lecture traditionnelle porte le singulier monta  ; LXX et Syr lisent Nabuchodonosor monta.'
  - type: text
    content: 'En ce temps-là, les hommes de Nabuchodonosor, roi de Babylone, partirent à l''attaque de Jérusalem, et la ville fut assiégée. '
  '11':
  - type: text
    content: 'Nabuchodonosor, roi de Babylone, arriva devant la ville pendant que ses hommes l''assiégeaient. '
  '12':
  - type: note
    content: 'ses hauts fonctionnaires ou ses eunuques  : cf. 8.6n. On date généralement cette première prise de Jérusalem suivie d''un exil du 16 mars 597 av. J.-C.'
  - type: text
    content: 'Alors Joïakîn, roi de Juda, se rendit au roi de Babylone, lui et sa mère, ses hommes, ses princes et ses hauts fonctionnaires. Le roi de Babylone le fit prisonnier, la huitième année de son règne. '
  '13':
  - type: note
    content: 'Il emporta  : litt. il sortit de là. –  les trésors… dans le temple 1R 7.51 ; 14.26.'
  - type: text
    content: 'Il emporta tous les trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les trésors de la maison du roi ; il mit en pièces tous les ustensiles d''or que Salomon, roi d''Israël, avait faits dans le temple du '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''avait dit. '
  '14':
  - type: note
    content: 'tout Jérusalem, tous les princes  : texte absent de LXX. –  les vaillants guerriers  : autres traductions les vaillants hommes ; les gens importants (cf. v. 16 ; 5.1 ; 15.20 ; 1R 11.28 ; Rt 2.1n). –  le petit peuple du pays  : autre traduction les petites gens du pays  ; cf. 25.12 ; plusieurs expressions analogues désignent les Judéens et les Israélites qui n''ont pas connu l''exil (cf. Esd 3.3n  ; 9.2 ; 10.2 ; voir aussi Gn 23 ; Jr 1.18n  ; 40.7).'
  - type: text
    content: 'Il exila tout Jérusalem, tous les princes et tous les vaillants guerriers, au nombre de dix mille exilés, avec tous les artisans et les serruriers : il ne resta que le petit peuple du pays. '
  '15':
  - type: note
    content: 'ses hauts fonctionnaires ou ses eunuques  : cf. v. 12n. –  les puissants  : sens probable d''un terme qui signifie également béliers (Ex 15.15 ; Ez 17.13), attesté par plusieurs mss ; une autre lecture traditionnelle porte un terme qui convient assez peu au contexte (imbéciles, gens stupides  ?). La captivité de Joïakîn est confirmée par un document babylonien.'
  - type: text
    content: 'Il exila Joïakîn à Babylone ; il emmena en exil de Jérusalem à Babylone la mère du roi, les femmes du roi et ses hauts fonctionnaires, ainsi que les puissants du pays, '
  '16':
  - type: note
    content: Selon certains, les chiffres ici mentionnés seraient à inclure dans ceux du v. 14 (cf. Jr 52.28-30).
  - type: text
    content: tous les guerriers au nombre de sept mille, les artisans et les serruriers au nombre de mille – c'étaient tous des hommes vaillants et aptes à la guerre. Le roi de Babylone les emmena en exil à Babylone.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Mattania  : Don de YHWH . –  son oncle  : c.-à-d. l''oncle de Joïakîn ; il s''agit du frère de son père, un fils de Josias. –  Sédécias  : YHWH est ma justice  ; sur le changement de nom, cf. 23.34.'
  - type: text
    content: A sa place, le roi de Babylone investit de la royauté Mattania, son oncle, et il changea son nom en Sédécias.
  - type: heading
    content: Sédécias, roi de Juda
  - type: heading
    content: Jr 52.1-3  ; 2Ch 36.11-12
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jr 52.1-3. –  Hamoutal ou Hamital , voir Jr 52.1n. –  de Libna  : texte absent de LXX.'
  - type: text
    content: 'Sédécias avait vingt et un ans lorsqu''il devint roi ; il régna onze ans à Jérusalem. Le nom de sa mère était Hamoutal, fille de Jérémie, de Libna. '
  '19':
  - type: note
    content: ce qui déplaisait… v. 9+.
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait Joïaqim. '
  '2':
  - type: note
    content: 'le Seigneur envoya  : LXX il envoya (le sujet pourrait être Nabuchodonosor). –  des troupes d''Ammonites  : certains mss de LXX ajoutent ici et de Samarie, comme dans le texte grec développé de 2Ch 36.5n. –  ses serviteurs, les prophètes 21.10+.'
  - type: text
    content: 'Alors le '
  - type: text
    content: Seigneur
  - type: text
    content: ' envoya contre lui des troupes de Chaldéens, des troupes d''Araméens, des troupes de Moabites et des troupes d''Ammonites ; il les envoya contre Juda pour le faire disparaître, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait prononcée par l''intermédiaire de ses serviteurs, les prophètes.'
  '20':
  - type: note
    content: 'Cela arriva…  : autre traduction ceci arriva…  ; cette formule peut renvoyer aux fautes morales et religieuses de Sédécias, v. 19 (ce qui arriva à Jérusalem et en Juda irrita tellement le Seigneur qu''il les rejeta…), ou à sa révolte contre Nabuchodonosor (voir la suite). –  loin de lui  : litt. loin de sa face.'
  - type: text
    content: 'Cela arriva à Jérusalem et en Juda à cause de la colère du '
  - type: text
    content: Seigneur
  - type: text
    content: ', jusqu''à ce qu''il les rejette loin de lui. Sédécias se rebella contre le roi de Babylone.'
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'sur l''ordre du Seigneur  : comme en 2Ch 36.5, LXX a lu un texte hébreu un peu différent en traduisant à cause de la colère du Seigneur  ; cf. v. 20. –  qui voulait écarter…  : litt. pour écarter de sur sa face . –  à cause de tous les péchés…  : litt. dans (ou par ) les péchés de Manassé, selon tout ce qu''il avait fait . La chute de Juda est expliquée par les péchés de Manassé , comme la chute du royaume du Nord par ceux de Jéroboam (17.21s).'
  - type: text
    content: 'Cela arriva uniquement sur l''ordre du '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui voulait écarter Juda de sa vue, à cause de tous les péchés commis par Manassé, '
  '4':
  - type: note
    content: 'sang… qu''il avait répandu  : un ms hébreu, un ms de LXX et un ms de Tg précisent que Manassé avait répandu. Cependant certains mss de LXX attribuent ici l''action à Joïaqim, comme dans le texte développé de 2Ch 36.5n.'
  - type: text
    content: 'et aussi à cause du sang innocent qu''il avait répandu, du sang innocent dont il avait rempli Jérusalem. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas voulu pardonner.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: 'Le reste de l''histoire de Joïaqim, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '6':
  - type: note
    content: 'se coucha avec ses pères  : cf. 8.24+ ; 1R 1.21+ ; certains mss de LXX ajoutent et il fut enterré dans le jardin d''Ouzza, avec ses pères, cf. 21.18,26 ; voir aussi 2Ch 36.8 (LXX).'
  - type: text
    content: 'Joïaqim se coucha avec ses pères. Joïakîn, son fils, devint roi à sa place. '
  '7':
  - type: note
    content: oued d'Egypte 1R 8.65n  ; Es 27.12.
  - type: text
    content: Le roi d'Egypte ne sortit plus de son pays, car le roi de Babylone avait pris tout ce qui appartenait au roi d'Egypte, depuis l'oued d'Egypte jusqu'à l'Euphrate.
  - type: heading
    content: Joïakîn, roi de Juda ; premier exil
  - type: heading
    content: 2Ch 36.9-10
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Nehoushta  : ce nom pourrait être lié à celui du Nehoushtân , serpent d''airain conservé dans le temple (18.4). Pour d''autres il pourrait dériver d''un mot akkadien signifiant luxuriant . –  Elnathan  : cf. Jr 26.22 ; 36.12,25.'
  - type: text
    content: 'Joïakîn avait dix-huit ans lorsqu''il devint roi ; il régna trois mois à Jérusalem. Le nom de sa mère était Nehoushta, fille d''Elnathan, de Jérusalem. '
  '9':
  - type: note
    content: 'ce qui déplaisait au Seigneur  : cf. 3.2n  ; 1R 11.6+.'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait son père.'
