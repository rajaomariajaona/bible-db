document_id: EXO.27,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'autel des sacrifices
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'autel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '38.1-7 (cf. 20.24) ; Nb 4.13s ; 1R 9.25 ; 2R 16.14s ; Ez 43.13-17 ; 2Ch 4.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cinq coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : environ 2,20 m ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu feras l''autel en bois d''acacia ; sa longueur sera de cinq coudées, et sa largeur de cinq coudées. L''autel sera carré, et sa hauteur sera de trois coudées. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tringles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cercles, colliers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; mêmes possibilités dans la suite.'
      marker-yv: yv-n
    - type: text
      text: 'avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles seront d''argent. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Dans la direction du nord, il y aura également des tentures sur une longueur de cent coudées, avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles seront d''argent. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '26.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cinquante coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 22 m.'
      marker-yv: yv-n
    - type: text
      text: 'Pour la largeur de la cour, dans la direction de l''ouest, il y aura cinquante coudées de tentures, avec leurs dix colonnes et leurs dix socles. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Pour la largeur de la cour, dans la direction de l''est, au levant, il y aura cinquante coudées ; '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quinze coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 6,70 m. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: côté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'épaule '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (de même au v. 15 ; 38.14s ; 1R 6.8 ; 7.39/ / ; 2R 11.11/ / ; Ez 25.9 ; 40.18
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; il s'agit ici des deux côtés de la largeur de la cour (qui mesure en tout 50 coudées, v. 12) situés de part et d'autre de l'entrée (laquelle mesure 20 coudées, v. 16).
      marker-yv: yv-n
    - type: text
      text: 'quinze coudées de tentures pour un côté, avec leurs trois colonnes et leurs trois socles, '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'et quinze coudées de tentures pour l''autre côté, avec leurs trois colonnes et leurs trois socles. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vingt coudées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : environ 9 m.'
      marker-yv: yv-n
    - type: text
      text: 'Pour la porte de la cour il y aura un rideau de vingt coudées, de pourpre violette et rouge, d''écarlate et de fin lin retors ; ce sera un ouvrage de brodeur, avec quatre colonnes et leurs quatre socles. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Toutes les colonnes qui formeront l''enceinte de la cour auront leurs tringles d''argent, leurs crochets d''argent et leurs socles de bronze. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de fin lin…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement les tentures délimitant la cour, cf. 38.16.'
      marker-yv: yv-n
    - type: text
      text: La longueur de la cour sera de cent coudées, sa largeur de cinquante de chaque côté, et sa hauteur de cinq coudées – de fin lin retors, et les socles de bronze.
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: text
      text: Tous les ustensiles destinés au service de la Demeure, tous ses piquets et tous les piquets de la cour seront de bronze.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'huile pour le luminaire
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses cornes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : dans l''Antiquité, les autels étaient souvent pourvus de quatre angles relevés ou cornes, symboles de puissance ou rappel des victimes immolées (cf. 29.12 ; Lv 4.7+ ; Ez 43.15). Il semble qu''on y attachait parfois les victimes (Ps 118.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Voir aussi 1R 1.50
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Am 3.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses cornes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de lui seront ses cornes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'des cornes sortiront de lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 25.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu le couvriras de bronze
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Nb 17.3.'
      marker-yv: yv-n
    - type: text
      text: 'Tu feras ses cornes aux quatre angles ; ses cornes seront d''une seule pièce avec lui ; tu le couvriras de bronze. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lv 24.2-4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'luminaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: huile d'olive fine et vierge
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: huile pure d'olives concassées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 28.5 ; Lv 24.3 ; Nb 28.5ss ; 1R 5.25. Pour obtenir de l''huile vierge, les olives étaient concassées mais pas pressées. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entretenir… les lampes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire monter une lampe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 25.37'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Toi, tu ordonneras aux Israélites de te procurer, pour le luminaire, de l''huile d''olive fine et vierge, afin d''entretenir constamment les lampes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tente de la Rencontre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même mot en 13.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; 25.22 ; 33.7-11 (voir aussi Es 14.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aaron et ses '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: disposeront les lampes…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la disposeront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(la '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lampe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', v. 20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', ou peut-être l’'
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: huile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du soir au matin devant YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 4.16 ; 1S 3.3 ; Za 4.2 ; 1Ch 9.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prescription perpétuelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.14+ ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour toutes les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.14+.
      marker-yv: yv-n
    - type: text
      text: 'C''est dans la tente de la Rencontre, à l''extérieur du voile qui est devant le Témoignage, qu''Aaron et ses fils disposeront les lampes pour qu''elles soient du soir au matin devant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: . C'est une prescription perpétuelle, pour toutes les générations des Israélites.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: récipients
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'marmites '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 16.3 ; voir aussi 38.3 ; 1R 7.45 ; 2R 25.14 ; Jr 52.18s ; 2Ch 4.11
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cendres grasses '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 4.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pelles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'calices '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (terme dérivé de celui qui désigne l'aspersion en Lv 1.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') 1R 7.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cassolettes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 25.38'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Tu feras ses récipients pour recueillir les cendres grasses, ses pelles, ses calices, ses fourchettes et ses cassolettes ; tu feras tous ses ustensiles de bronze. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'Tu lui feras une grille de bronze, une sorte de treillis, et tu mettras quatre anneaux de bronze aux quatre coins. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rebord
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; il peut s''agir d''une marche destinée à faciliter le travail des prêtres (voir cependant 20.26).'
      marker-yv: yv-n
    - type: text
      text: 'Tu le mettras au-dessous du rebord de l''autel, à partir du bas ; le treillis arrivera à la moitié de la hauteur de l''autel. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: 'Tu feras des barres pour l''autel, des barres en bois d''acacia, et tu les couvriras de bronze. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On introduira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Smr, LXX, Syr, Vg '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu introduiras.
      marker-yv: yv-n
    - type: text
      text: 'On introduira les barres dans les anneaux ; et les barres seront des deux côtés de l''autel quand on le portera. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: text
      text: Tu le feras creux, avec des panneaux ; on le fera tel qu'il t'a été montré dans la montagne.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: L'enceinte de la cour
    marker-yv: yv-h
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '27.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '38.9-20 ; Nb 4.26 ; 1R 6.36 ; 8.64 ; Ez 40.17-47 ; 2Ch 4.9 ; 7.7. –  '
      - type: usfm
        marker: fq
        children:
