document_id: EXO.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'autel des sacrifices
  - type: text
    content: ' '
  - type: note
    content: 'autel 38.1-7 (cf. 20.24) ; Nb 4.13s ; 1R 9.25 ; 2R 16.14s ; Ez 43.13-17 ; 2Ch 4.1. –  cinq coudées  : environ 2,20 m ; voir mesures.'
  - type: text
    content: 'Tu feras l''autel en bois d''acacia ; sa longueur sera de cinq coudées, et sa largeur de cinq coudées. L''autel sera carré, et sa hauteur sera de trois coudées. '
  '10':
  - type: note
    content: 'tringles  : autres traductions cercles, colliers  ; mêmes possibilités dans la suite.'
  - type: text
    content: 'avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles seront d''argent. '
  '11':
  - type: text
    content: 'Dans la direction du nord, il y aura également des tentures sur une longueur de cent coudées, avec leurs vingt colonnes et leurs vingt socles de bronze ; les crochets des colonnes et leurs tringles seront d''argent. '
  '12':
  - type: note
    content: '26.22n. –  cinquante coudées  : environ 22 m.'
  - type: text
    content: 'Pour la largeur de la cour, dans la direction de l''ouest, il y aura cinquante coudées de tentures, avec leurs dix colonnes et leurs dix socles. '
  '13':
  - type: text
    content: 'Pour la largeur de la cour, dans la direction de l''est, au levant, il y aura cinquante coudées ; '
  '14':
  - type: note
    content: 'quinze coudées  : environ 6,70 m. –  côté  : litt. épaule (de même au v. 15 ; 38.14s ; 1R 6.8 ; 7.39/ / ; 2R 11.11/ / ; Ez 25.9 ; 40.18n) ; il s''agit ici des deux côtés de la largeur de la cour (qui mesure en tout 50 coudées, v. 12) situés de part et d''autre de l''entrée (laquelle mesure 20 coudées, v. 16).'
  - type: text
    content: 'quinze coudées de tentures pour un côté, avec leurs trois colonnes et leurs trois socles, '
  '15':
  - type: text
    content: 'et quinze coudées de tentures pour l''autre côté, avec leurs trois colonnes et leurs trois socles. '
  '16':
  - type: note
    content: 'vingt coudées  : environ 9 m.'
  - type: text
    content: 'Pour la porte de la cour il y aura un rideau de vingt coudées, de pourpre violette et rouge, d''écarlate et de fin lin retors ; ce sera un ouvrage de brodeur, avec quatre colonnes et leurs quatre socles. '
  '17':
  - type: text
    content: 'Toutes les colonnes qui formeront l''enceinte de la cour auront leurs tringles d''argent, leurs crochets d''argent et leurs socles de bronze. '
  '18':
  - type: note
    content: 'de fin lin…  : probablement les tentures délimitant la cour, cf. 38.16.'
  - type: text
    content: La longueur de la cour sera de cent coudées, sa largeur de cinquante de chaque côté, et sa hauteur de cinq coudées – de fin lin retors, et les socles de bronze.
  '19':
  - type: text
    content: Tous les ustensiles destinés au service de la Demeure, tous ses piquets et tous les piquets de la cour seront de bronze.
  - type: heading
    content: L'huile pour le luminaire
  '2':
  - type: note
    content: 'ses cornes  : dans l''Antiquité, les autels étaient souvent pourvus de quatre angles relevés ou cornes, symboles de puissance ou rappel des victimes immolées (cf. 29.12 ; Lv 4.7+ ; Ez 43.15). Il semble qu''on y attachait parfois les victimes (Ps 118.27n). Voir aussi 1R 1.50n  ; Am 3.14n. –  ses cornes…  : litt. de lui seront ses cornes  ; autre traduction des cornes sortiront de lui (cf. 25.19n). –  tu le couvriras de bronze  : cf. Nb 17.3.'
  - type: text
    content: 'Tu feras ses cornes aux quatre angles ; ses cornes seront d''une seule pièce avec lui ; tu le couvriras de bronze. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Lv 24.2-4. –  luminaire 25.6n. –  huile d''olive fine et vierge  : autre traduction huile pure d''olives concassées  ; cf. 28.5 ; Lv 24.3 ; Nb 28.5ss ; 1R 5.25. Pour obtenir de l''huile vierge, les olives étaient concassées mais pas pressées. –  entretenir… les lampes  : litt. faire monter une lampe , cf. 25.37n.'
  - type: text
    content: 'Toi, tu ordonneras aux Israélites de te procurer, pour le luminaire, de l''huile d''olive fine et vierge, afin d''entretenir constamment les lampes. '
  '21':
  - type: note
    content: 'tente de la Rencontre (même mot en 13.10n) ; 25.22 ; 33.7-11 (voir aussi Es 14.13n). –  Aaron et ses fils  : voir prêtre. –  disposeront les lampes…  : litt. la disposeront (la lampe, v. 20n, ou peut-être l’huile) du soir au matin devant YHWH  ; cf. Nb 4.16 ; 1S 3.3 ; Za 4.2 ; 1Ch 9.29. –  prescription perpétuelle 12.14+ ; voir loi. –  pour toutes les générations 12.14+.'
  - type: text
    content: 'C''est dans la tente de la Rencontre, à l''extérieur du voile qui est devant le Témoignage, qu''Aaron et ses fils disposeront les lampes pour qu''elles soient du soir au matin devant le '
  - type: text
    content: Seigneur
  - type: text
    content: . C'est une prescription perpétuelle, pour toutes les générations des Israélites.
  '3':
  - type: note
    content: 'récipients  : le même terme est traduit par marmites en 16.3 ; voir aussi 38.3 ; 1R 7.45 ; 2R 25.14 ; Jr 52.18s ; 2Ch 4.11n,16. –  cendres grasses Lv 4.12. –  pelles / calices (terme dérivé de celui qui désigne l''aspersion en Lv 1.5n) 1R 7.40. –  cassolettes  : cf. 25.38n.'
  - type: text
    content: 'Tu feras ses récipients pour recueillir les cendres grasses, ses pelles, ses calices, ses fourchettes et ses cassolettes ; tu feras tous ses ustensiles de bronze. '
  '4':
  - type: text
    content: 'Tu lui feras une grille de bronze, une sorte de treillis, et tu mettras quatre anneaux de bronze aux quatre coins. '
  '5':
  - type: note
    content: 'rebord  : traduction incertaine ; il peut s''agir d''une marche destinée à faciliter le travail des prêtres (voir cependant 20.26).'
  - type: text
    content: 'Tu le mettras au-dessous du rebord de l''autel, à partir du bas ; le treillis arrivera à la moitié de la hauteur de l''autel. '
  '6':
  - type: text
    content: 'Tu feras des barres pour l''autel, des barres en bois d''acacia, et tu les couvriras de bronze. '
  '7':
  - type: note
    content: 'On introduira  : Smr, LXX, Syr, Vg tu introduiras.'
  - type: text
    content: 'On introduira les barres dans les anneaux ; et les barres seront des deux côtés de l''autel quand on le portera. '
  '8':
  - type: text
    content: Tu le feras creux, avec des panneaux ; on le fera tel qu'il t'a été montré dans la montagne.
  - type: heading
    content: L'enceinte de la cour
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'cour 38.9-20 ; Nb 4.26 ; 1R 6.36 ; 8.64 ; Ez 40.17-47 ; 2Ch 4.9 ; 7.7. –  cent coudées  : environ 45 m ; voir mesures.'
  - type: text
    content: 'Tu feras la cour de la Demeure. Dans la direction du midi, au sud, il y aura, pour former la cour, des tentures de fin lin retors, sur une longueur de cent coudées dans cette première direction, '
