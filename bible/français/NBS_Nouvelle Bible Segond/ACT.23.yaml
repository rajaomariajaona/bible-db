document_id: ACT.23,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bonne conscience '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 24.16 ; 2Co 1.12 ; 1Tm 3.9+ ; 1P 3.16,21.
      marker-yv: yv-n
    - type: text
      text: 'Fixant le sanhédrin, Paul dit : Mes frères, quant à moi, c''est en toute bonne conscience que je me suis conduit, devant Dieu, jusqu''à ce jour. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 21.34.
      marker-yv: yv-n
    - type: text
      text: 'Comme la dispute allait croissant, le tribun militaire, craignant qu''ils ne mettent Paul en pièces, donna à la troupe l''ordre de descendre pour l''enlever du milieu d''eux et l''amener à la forteresse. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 18.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Courage ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '28.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Rome '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 19.21 ; 27.24 ; 28.16,23.
      marker-yv: yv-n
    - type: text
      text: 'La nuit suivante, le Seigneur survint devant lui et dit : Courage ! De même que tu m''as rendu témoignage à Jérusalem, de même il faut que tu portes ce témoignage à Rome.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Un complot contre Paul
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.23-29 ; 20.3 ; 25.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plusieurs mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: certains Juifs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: montèrent un complot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: formèrent une bande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le même terme a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'attroupement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 19.40. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sous peine d'anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir Rm 9.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Jn 16.2 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction. –  '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '1 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Hénoch
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.4 : « Jurons tous en nous vouant mutuellement à l''anathème de ne pas renoncer à ce dessein que nous ne l''ayons accompli et que nous n''ayons fait la chose. »'
      marker-yv: yv-n
    - type: text
      text: 'Quand le jour fut venu, les Juifs montèrent un complot et s''engagèrent, sous peine d''anathème, à ne pas manger ni boire avant d''avoir tué Paul. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les conjurés étaient plus de quarante. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'grands '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtres
        - type: text
          text: ' / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.23+.'
      marker-yv: yv-n
    - type: text
      text: 'Ils allèrent trouver les grands prêtres et les anciens pour leur dire : Nous nous sommes engagés, sous peine d''anathème, à ne rien manger avant d''avoir tué Paul. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.2s. Texte occidental reconstitué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Maintenant donc, nous vous demandons de faire ceci pour nous : Rassemblez le sanhédrin et faites au tribun…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'faites… un rapport '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faire savoir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 22 et par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'porter plainte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 24.1 ; 25.2,15 ; ailleurs il a le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se manifester '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Mt 27.53 ; Jn 14.21s), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'paraître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Hé 9.24), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'montrer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Hé 11.14). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de plus près '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'plus exactement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le supprimer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 21,27 ; 9.23,29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il arrive
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'il approche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Le texte occidental ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: même s'il (nous) faut mourir aussi.
      marker-yv: yv-n
    - type: text
      text: Vous donc, maintenant, avec l'accord du sanhédrin, faites au tribun militaire un rapport qui l'incite à le faire descendre devant vous, comme si vous deviez examiner son cas de plus près ; quant à nous, nous nous tenons prêts à le supprimer avant qu'il arrive.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.24+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le fils de la sœur…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 22.3 ; 24.23+.'
      marker-yv: yv-n
    - type: text
      text: 'Le fils de la sœur de Paul entendit parler du guet-apens et se rendit à la forteresse, où il entra pour informer Paul. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Paul appela un des centurions et lui dit : Conduis ce jeune homme au tribun, car il a une information à lui donner. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le prisonnier Paul '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 25.14,27 ; 28.17.
      marker-yv: yv-n
    - type: text
      text: 'Le centurion le prit donc avec lui, l''amena au tribun et dit : Le prisonnier Paul m''a appelé et il m''a demandé de t''amener ce jeune homme, qui a quelque chose à te dire. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui demanda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se renseigner '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 20 (cf. Lc 15.26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Le tribun le prit par la main, se retira à l''écart et lui demanda : Quelle information as-tu à me donner ? '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ananias '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(24.1) a été grand prêtre de 47 à 59 environ ; il mourra assassiné en 66. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le frapper
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 18.22s.'
      marker-yv: yv-n
    - type: text
      text: 'Le grand prêtre Ananias donna à ceux qui étaient près de lui l''ordre de le frapper sur la bouche. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 12-15+.
      marker-yv: yv-n
    - type: text
      text: 'Il répondit : Les Juifs se sont mis d''accord pour te demander, demain, de faire descendre Paul devant le sanhédrin, comme si celui-ci devait se renseigner plus exactement sur son cas. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne te fie pas à eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne te laisse pas persuader par eux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 5.40'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 13.43+ ; de même 27.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ton consentement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: promesse.
      marker-yv: yv-n
    - type: text
      text: 'Toi, donc, ne te fie pas à eux, car plus de quarante hommes parmi eux préparent un guet-apens contre lui ; ils se sont engagés, sous peine d''anathème, à ne pas manger ni boire avant de l''avoir supprimé ; dès maintenant ils se tiennent prêts et n''attendent que ton consentement. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fait savoir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le tribun renvoya le jeune homme, après lui avoir enjoint de ne parler à personne de ce qu'il lui avait fait savoir.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Paul est transféré à Césarée
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 9.25+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Césarée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 33 ; 8.40
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 25.1,4,6,13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la troisième heure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à partir de 21 h environ.'
      marker-yv: yv-n
    - type: text
      text: 'Il appela ensuite deux des centurions et leur dit : Prenez deux cents soldats, soixante-dix cavaliers et deux cents lanciers ; qu''ils se tiennent prêts à partir pour Césarée dès la troisième heure de la nuit. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.24 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et de préparer des bêtes de somme pour y faire monter Paul et le mener… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Félix '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'a été '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gouverneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ou procurateur de Samarie et de Judée de 52 à 59 ou 60 apr. J.-C. ; cf. 24.3,24.
      marker-yv: yv-n
    - type: text
      text: 'Préparez aussi des montures, afin de mener Paul sain et sauf au gouverneur Félix. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.25 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Certains mss, dont des témoins du texte occidental, ajoutent au début du v.
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Il craignait en effet que les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: ' ne s''emparent de lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Paul) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et ne le tuent, et qu'il soit lui-même accusé ensuite d'avoir touché de l'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ainsi conçue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ayant ce type '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 7.43
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il écrivit une lettre ainsi conçue :'
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Claude Lysias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 22.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 24.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'très excellent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '24.3 ; 26.25 ; Lc 1.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bonjour ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '15.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Claude Lysias, au très excellent gouverneur Félix, bonjour ! '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.30ss ; 22.25+ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'citoyen romain '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Cet homme, les Juifs s''en étaient emparés, et ils allaient le supprimer lorsque je suis intervenu avec la troupe pour le délivrer – j''avais appris qu''il était citoyen romain. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.28 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 21.34+ ; 22.30.
      marker-yv: yv-n
    - type: text
      text: 'Souhaitant savoir pour quel motif ils l''accusaient, je l''ai fait descendre devant leur sanhédrin. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 6 ; 18.14+s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le texte occidental ajoute '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à Moïse et à un certain Jésus
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rien dans l'accusation…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 9 ; 25.11,18,25 ; 26.31s ; 28.18 ; Lc 23.4,14s,22/ /. Le texte occidental ajoute à la fin du v.'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je l'ai fait sortir avec peine, par la force
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 24.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la prison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les liens.
      marker-yv: yv-n
    - type: text
      text: 'J''ai constaté que, s''il était accusé, c''était dans le cadre de débats relatifs à leur loi, mais qu''il n''y avait rien dans l''accusation portée contre lui qui mérite la mort ou la prison. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est Dieu qui va te frapper
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 28.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: muraille blanchie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 13.10-16 ; Mt 23.27. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'contre la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 7.50-53 ; Lv 19.15 ; Jn 7.51.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Paul lui dit : C''est Dieu qui va te frapper, muraille blanchie ! Toi, tu es assis là pour me juger selon la loi et, contre la loi, tu ordonnes qu''on me frappe ! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Avisé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Lc 20.37
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'complot '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 12ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: plaider
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 24.1ss ; 25.5. – Certains mss terminent la lettre par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Adieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 15.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Avisé d'un complot contre cet homme, je te l'ai envoyé immédiatement, en enjoignant à ses accusateurs d'aller plaider contre lui devant toi.
  '31':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Antipatris
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : à peu près à mi-chemin entre Jérusalem et Césarée.'
      marker-yv: yv-n
    - type: text
      text: 'Les soldats, selon l''ordre qu''ils avaient reçu, prirent Paul et le conduisirent pendant la nuit jusqu''à Antipatris. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la forteresse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le lendemain, ils retournèrent à la forteresse en laissant les cavaliers partir avec lui. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Arrivés à Césarée, ceux-ci remirent la lettre au gouverneur et lui présentèrent Paul. '
  '34':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.34 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Lc 23.6s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la lettre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le gouverneur demanda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il demanda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; texte occidental reconstitué '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il demanda à Paul : « De quelle province es-tu ? » Il répondit : « Cilicien. » L''ayant appris… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Cilicie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 21.39+. Un procès pouvait avoir lieu dans la province d''origine de l''accusé, dans celle où il avait été arrêté ou dans celle où le délit avait été commis, selon des règles assez complexes qui ont varié au fil du temps. Le texte suppose peut-être qu''à l''époque la Cilicie n''était pas tout à fait indépendante de la Syrie ; elle l''est devenue dans les premières années de Néron (54-68 apr. J.-C.). Dans cette perspective, rien ne justifiait vraiment que le gouverneur renvoie Paul à une autre juridiction.'
      marker-yv: yv-n
    - type: text
      text: 'Après avoir lu la lettre, le gouverneur demanda de quelle province il était. Apprenant qu''il était de Cilicie : '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le prétoire '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hérode
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. le palais construit par Hérode le Grand, devenu la résidence du procurateur romain de Judée.'
      marker-yv: yv-n
    - type: text
      text: Je t'entendrai, dit-il, quand tes accusateurs aussi seront arrivés. Et il donna l'ordre de le garder dans le prétoire d'Hérode.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui étaient là
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui étaient près de lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même verbe v. 2).
      marker-yv: yv-n
    - type: text
      text: 'Ceux qui étaient là dirent : Tu insultes le grand prêtre de Dieu ! '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 22.5 ; '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ex 22.27.
      marker-yv: yv-n
    - type: text
      text: 'Paul répondit : Je ne savais pas, mes frères, que c''était le grand prêtre ; en effet, il est écrit : '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Tu ne diras pas de mal d'un chef de ton peuple
    - type: text
      text: .
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.6 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sadducéens
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.1+,2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je suis pharisien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 5.34 ; 26.5 ; Ph 3.5-9 ; voir aussi '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de l''espérance, de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: résurrection
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de l'espérance et de la résurrection
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 24.15,21 ; 26.6-8 ; 28.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des morts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : d''après une reconstitution, cette précision aurait été absente du texte occidental.'
      marker-yv: yv-n
    - type: text
      text: 'Sachant que l''assemblée était composée en partie de sadducéens et en partie de pharisiens, Paul se mit à crier dans le sanhédrin : Mes frères, moi je suis pharisien, fils de pharisiens ! Si, moi, je suis mis en jugement, c''est à cause de l''espérance, de la résurrection des morts ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dispute '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10 ; 15.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Quand il eut dit cela, il se produisit une dispute entre les pharisiens et les sadducéens, et la multitude se divisa. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ni résurrection '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 20.27-33/ /. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ange
        - type: text
          text: ' / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 8.26,29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: croient à tout cela
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'confessent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: déclarent, reconnaissent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 24.14) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''un et l''autre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les uns et les autres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: toutes ces choses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 19.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Les sadducéens, en effet, disent qu''il n''y a ni résurrection, ni ange, ni esprit, tandis que les pharisiens croient à tout cela. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '23.9 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: scribes
        - type: text
          text: ' / '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pharisiens
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lc 5.21+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aucun mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 29+. – A la fin du v. certains mss ajoutent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne combattons pas contre Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 5.39).
      marker-yv: yv-n
    - type: text
      text: 'Il y eut une grande clameur, et quelques scribes du parti des pharisiens se levèrent et protestèrent vivement, en disant : Nous ne trouvons aucun mal en cet homme ; et si un esprit ou un ange lui avait parlé ?'
