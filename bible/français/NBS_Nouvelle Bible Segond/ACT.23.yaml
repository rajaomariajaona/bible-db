document_id: ACT.23,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: bonne conscience 24.16 ; 2Co 1.12 ; 1Tm 3.9+ ; 1P 3.16,21.
  - type: text
    content: 'Fixant le sanhédrin, Paul dit : Mes frères, quant à moi, c''est en toute bonne conscience que je me suis conduit, devant Dieu, jusqu''à ce jour. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 21.34.
  - type: text
    content: 'Comme la dispute allait croissant, le tribun militaire, craignant qu''ils ne mettent Paul en pièces, donna à la troupe l''ordre de descendre pour l''enlever du milieu d''eux et l''amener à la forteresse. '
  '11':
  - type: note
    content: Cf. 18.9. –  Courage ! 28.15. –  à Rome 19.21 ; 27.24 ; 28.16,23.
  - type: text
    content: 'La nuit suivante, le Seigneur survint devant lui et dit : Courage ! De même que tu m''as rendu témoignage à Jérusalem, de même il faut que tu portes ce témoignage à Rome.'
  - type: heading
    content: Un complot contre Paul
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.23-29 ; 20.3 ; 25.3. –  les Juifs  : plusieurs mss portent certains Juifs . –  montèrent un complot  : autre traduction formèrent une bande  ; le même terme a été traduit par attroupement en 19.40. –  sous peine d''anathème  : voir Rm 9.3n  ; cf. Jn 16.2 ; voir bénédiction, malédiction. –  1 Hénoch 6.4 : « Jurons tous en nous vouant mutuellement à l''anathème de ne pas renoncer à ce dessein que nous ne l''ayons accompli et que nous n''ayons fait la chose. »'
  - type: text
    content: 'Quand le jour fut venu, les Juifs montèrent un complot et s''engagèrent, sous peine d''anathème, à ne pas manger ni boire avant d''avoir tué Paul. '
  '13':
  - type: text
    content: 'Les conjurés étaient plus de quarante. '
  '14':
  - type: note
    content: 'grands prêtres / anciens  : cf. 4.23+.'
  - type: text
    content: 'Ils allèrent trouver les grands prêtres et les anciens pour leur dire : Nous nous sommes engagés, sous peine d''anathème, à ne rien manger avant d''avoir tué Paul. '
  '15':
  - type: note
    content: '25.2s. Texte occidental reconstitué  : Maintenant donc, nous vous demandons de faire ceci pour nous : Rassemblez le sanhédrin et faites au tribun…  ; le verbe traduit par faites… un rapport est rendu par faire savoir au v. 22 et par porter plainte en 24.1 ; 25.2,15 ; ailleurs il a le sens de se manifester (Mt 27.53 ; Jn 14.21s), paraître (Hé 9.24), montrer (Hé 11.14). –  de plus près ou plus exactement v. 20. –  le supprimer v. 21,27 ; 9.23,29. –  qu''il arrive  : litt. qu''il approche. Le texte occidental ajoute même s''il (nous) faut mourir aussi.'
  - type: text
    content: Vous donc, maintenant, avec l'accord du sanhédrin, faites au tribun militaire un rapport qui l'incite à le faire descendre devant vous, comme si vous deviez examiner son cas de plus près ; quant à nous, nous nous tenons prêts à le supprimer avant qu'il arrive.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.24+. –  Le fils de la sœur…  : cf. 22.3 ; 24.23+.'
  - type: text
    content: 'Le fils de la sœur de Paul entendit parler du guet-apens et se rendit à la forteresse, où il entra pour informer Paul. '
  '17':
  - type: text
    content: 'Paul appela un des centurions et lui dit : Conduis ce jeune homme au tribun, car il a une information à lui donner. '
  '18':
  - type: note
    content: Le prisonnier Paul 25.14,27 ; 28.17.
  - type: text
    content: 'Le centurion le prit donc avec lui, l''amena au tribun et dit : Le prisonnier Paul m''a appelé et il m''a demandé de t''amener ce jeune homme, qui a quelque chose à te dire. '
  '19':
  - type: note
    content: 'lui demanda  : le même verbe est traduit par se renseigner au v. 20 (cf. Lc 15.26n).'
  - type: text
    content: 'Le tribun le prit par la main, se retira à l''écart et lui demanda : Quelle information as-tu à me donner ? '
  '2':
  - type: note
    content: 'Ananias (24.1) a été grand prêtre de 47 à 59 environ ; il mourra assassiné en 66. –  le frapper  : cf. Jn 18.22s.'
  - type: text
    content: 'Le grand prêtre Ananias donna à ceux qui étaient près de lui l''ordre de le frapper sur la bouche. '
  '20':
  - type: note
    content: V. 12-15+.
  - type: text
    content: 'Il répondit : Les Juifs se sont mis d''accord pour te demander, demain, de faire descendre Paul devant le sanhédrin, comme si celui-ci devait se renseigner plus exactement sur son cas. '
  '21':
  - type: note
    content: 'ne te fie pas à eux  : autre traduction ne te laisse pas persuader par eux, cf. 5.40n  ; 13.43+ ; de même 27.11. –  ton consentement  : le mot grec est habituellement traduit par promesse.'
  - type: text
    content: 'Toi, donc, ne te fie pas à eux, car plus de quarante hommes parmi eux préparent un guet-apens contre lui ; ils se sont engagés, sous peine d''anathème, à ne pas manger ni boire avant de l''avoir supprimé ; dès maintenant ils se tiennent prêts et n''attendent que ton consentement. '
  '22':
  - type: note
    content: fait savoir v. 15n.
  - type: text
    content: Le tribun renvoya le jeune homme, après lui avoir enjoint de ne parler à personne de ce qu'il lui avait fait savoir.
  - type: heading
    content: Paul est transféré à Césarée
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 9.25+. –  Césarée v. 33 ; 8.40n  ; 25.1,4,6,13. –  la troisième heure  : à partir de 21 h environ.'
  - type: text
    content: 'Il appela ensuite deux des centurions et leur dit : Prenez deux cents soldats, soixante-dix cavaliers et deux cents lanciers ; qu''ils se tiennent prêts à partir pour Césarée dès la troisième heure de la nuit. '
  '24':
  - type: note
    content: Litt. et de préparer des bêtes de somme pour y faire monter Paul et le mener… –  Félix a été gouverneur ou procurateur de Samarie et de Judée de 52 à 59 ou 60 apr. J.-C. ; cf. 24.3,24.
  - type: text
    content: 'Préparez aussi des montures, afin de mener Paul sain et sauf au gouverneur Félix. '
  '25':
  - type: note
    content: 'Certains mss, dont des témoins du texte occidental, ajoutent au début du v.  : Il craignait en effet que les Juifs ne s''emparent de lui (Paul) et ne le tuent, et qu''il soit lui-même accusé ensuite d''avoir touché de l''argent. –  ainsi conçue  : litt. ayant ce type (cf. 7.43n).'
  - type: text
    content: 'Il écrivit une lettre ainsi conçue :'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Claude Lysias  : cf. 22.28n  ; 24.22. –  très excellent 24.3 ; 26.25 ; Lc 1.3. –  bonjour ! 15.23n.'
  - type: text
    content: 'Claude Lysias, au très excellent gouverneur Félix, bonjour ! '
  '27':
  - type: note
    content: 21.30ss ; 22.25+ss. –  citoyen romain 16.21n.
  - type: text
    content: 'Cet homme, les Juifs s''en étaient emparés, et ils allaient le supprimer lorsque je suis intervenu avec la troupe pour le délivrer – j''avais appris qu''il était citoyen romain. '
  '28':
  - type: note
    content: 21.34+ ; 22.30.
  - type: text
    content: 'Souhaitant savoir pour quel motif ils l''accusaient, je l''ai fait descendre devant leur sanhédrin. '
  '29':
  - type: note
    content: 'Cf. v. 6 ; 18.14+s. –  à leur loi  : le texte occidental ajoute à Moïse et à un certain Jésus. –  rien dans l''accusation…  : cf. v. 9 ; 25.11,18,25 ; 26.31s ; 28.18 ; Lc 23.4,14s,22/ /. Le texte occidental ajoute à la fin du v.  : je l''ai fait sortir avec peine, par la force, cf. 24.6n. –  la prison  : litt. les liens.'
  - type: text
    content: 'J''ai constaté que, s''il était accusé, c''était dans le cadre de débats relatifs à leur loi, mais qu''il n''y avait rien dans l''accusation portée contre lui qui mérite la mort ou la prison. '
  '3':
  - type: note
    content: 'C''est Dieu qui va te frapper  : cf. Dt 28.22. –  muraille blanchie  : cf. Ez 13.10-16 ; Mt 23.27. –  contre la loi  : cf. 7.50-53 ; Lv 19.15 ; Jn 7.51.'
  - type: text
    content: 'Alors Paul lui dit : C''est Dieu qui va te frapper, muraille blanchie ! Toi, tu es assis là pour me juger selon la loi et, contre la loi, tu ordonnes qu''on me frappe ! '
  '30':
  - type: note
    content: 'Avisé Lc 20.37n. –  complot v. 12ss. –  plaider  : cf. 24.1ss ; 25.5. – Certains mss terminent la lettre par Adieu, comme en 15.29n.'
  - type: text
    content: Avisé d'un complot contre cet homme, je te l'ai envoyé immédiatement, en enjoignant à ses accusateurs d'aller plaider contre lui devant toi.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Antipatris  : à peu près à mi-chemin entre Jérusalem et Césarée.'
  - type: text
    content: 'Les soldats, selon l''ordre qu''ils avaient reçu, prirent Paul et le conduisirent pendant la nuit jusqu''à Antipatris. '
  '32':
  - type: note
    content: la forteresse 21.34n.
  - type: text
    content: 'Le lendemain, ils retournèrent à la forteresse en laissant les cavaliers partir avec lui. '
  '33':
  - type: text
    content: 'Arrivés à Césarée, ceux-ci remirent la lettre au gouverneur et lui présentèrent Paul. '
  '34':
  - type: note
    content: 'Cf. Lc 23.6s. –  la lettre  : sous-entendu dans le texte. –  le gouverneur demanda  : litt. il demanda  ; texte occidental reconstitué il demanda à Paul : « De quelle province es-tu ? » Il répondit : « Cilicien. » L''ayant appris… –  Cilicie 9.11n  ; 21.39+. Un procès pouvait avoir lieu dans la province d''origine de l''accusé, dans celle où il avait été arrêté ou dans celle où le délit avait été commis, selon des règles assez complexes qui ont varié au fil du temps. Le texte suppose peut-être qu''à l''époque la Cilicie n''était pas tout à fait indépendante de la Syrie ; elle l''est devenue dans les premières années de Néron (54-68 apr. J.-C.). Dans cette perspective, rien ne justifiait vraiment que le gouverneur renvoie Paul à une autre juridiction.'
  - type: text
    content: 'Après avoir lu la lettre, le gouverneur demanda de quelle province il était. Apprenant qu''il était de Cilicie : '
  '35':
  - type: note
    content: le prétoire d'Hérode, c.-à-d. le palais construit par Hérode le Grand, devenu la résidence du procurateur romain de Judée.
  - type: text
    content: Je t'entendrai, dit-il, quand tes accusateurs aussi seront arrivés. Et il donna l'ordre de le garder dans le prétoire d'Hérode.
  '4':
  - type: note
    content: 'qui étaient là  : autre traduction qui étaient près de lui (même verbe v. 2).'
  - type: text
    content: 'Ceux qui étaient là dirent : Tu insultes le grand prêtre de Dieu ! '
  '5':
  - type: note
    content: Cf. 22.5 ; Ex 22.27.
  - type: text
    content: 'Paul répondit : Je ne savais pas, mes frères, que c''était le grand prêtre ; en effet, il est écrit : '
  - type: text
    content: Tu ne diras pas de mal d'un chef de ton peuple
  - type: text
    content: .
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'sadducéens 4.1+,2+. –  je suis pharisien  : cf. 5.34 ; 26.5 ; Ph 3.5-9 ; voir aussi fils . –  de l''espérance, de la résurrection  : litt. de l''espérance et de la résurrection  ; cf. 24.15,21 ; 26.6-8 ; 28.20. –  des morts  : d''après une reconstitution, cette précision aurait été absente du texte occidental.'
  - type: text
    content: 'Sachant que l''assemblée était composée en partie de sadducéens et en partie de pharisiens, Paul se mit à crier dans le sanhédrin : Mes frères, moi je suis pharisien, fils de pharisiens ! Si, moi, je suis mis en jugement, c''est à cause de l''espérance, de la résurrection des morts ! '
  '7':
  - type: note
    content: dispute v. 10 ; 15.2n.
  - type: text
    content: 'Quand il eut dit cela, il se produisit une dispute entre les pharisiens et les sadducéens, et la multitude se divisa. '
  '8':
  - type: note
    content: 'ni résurrection Lc 20.27-33/ /. –  ange / esprit  : cf. 8.26,29. –  croient à tout cela  : litt. confessent (ou déclarent, reconnaissent, cf. 24.14) l''un et l''autre (ou les uns et les autres, c.-à-d. toutes ces choses  ; cf. 19.16n).'
  - type: text
    content: 'Les sadducéens, en effet, disent qu''il n''y a ni résurrection, ni ange, ni esprit, tandis que les pharisiens croient à tout cela. '
  '9':
  - type: note
    content: 'scribes / pharisiens Lc 5.21+. –  aucun mal  : cf. v. 29+. – A la fin du v. certains mss ajoutent  : ne combattons pas contre Dieu (cf. 5.39).'
  - type: text
    content: 'Il y eut une grande clameur, et quelques scribes du parti des pharisiens se levèrent et protestèrent vivement, en disant : Nous ne trouvons aucun mal en cet homme ; et si un esprit ou un ange lui avait parlé ?'
