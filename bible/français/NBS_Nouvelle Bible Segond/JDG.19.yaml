document_id: JDG.19,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le crime des Benjaminites de Guibéa
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'En ces jours-là… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévite
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'région montagneuse d''Ephraïm '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Beth-Léhem de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 17.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'séjournait en immigré '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'concubine '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou épouse de second rang ; peut-être le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lévite '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: était-il trop pauvre pour payer la dot nécessaire à un mariage en bonne et due forme ; cf. 8.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2S 5.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, il n''y avait pas de roi en Israël. Un lévite qui séjournait en immigré au fin fond de la région montagneuse d''Ephraïm prit pour concubine une femme de Beth-Léhem de Juda. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jébus '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jérusalem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.21 ; Jos 15.8,63 ; 18.16,28 ; 2S 5.6-8 ; 1Ch 11.4-8), à deux heures environ de Beth-Léhem (v. 1s).
      marker-yv: yv-n
    - type: text
      text: 'Mais le mari ne voulut pas passer la nuit, il se leva et partit. Il arriva jusque devant Jébus (c''est-à-dire Jérusalem) avec les deux ânes bâtés et avec sa concubine. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsqu''ils furent près de Jébus, le jour avait beaucoup baissé. Le serviteur dit alors à son maître : Allons, je t''en prie, faisons un détour par cette ville des Jébusites, nous y passerons la nuit. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Guibéa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Colline
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) v. 14 ; Jos 18.28 ; 1S 11.4 ; 13.2 ; à 6 km au nord de Jérusalem ; comparer la suite avec Os 9.9 ; 10.9.
      marker-yv: yv-n
    - type: text
      text: 'Son maître lui répondit : Nous ne ferons pas de détour par une ville étrangère où il n''y a pas d''Israélites ; nous passerons la nuit à Guibéa. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Rama
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à 3 km au nord de Guibéa (4.5).'
      marker-yv: yv-n
    - type: text
      text: 'Il dit encore à son serviteur : Allons, rapprochons-nous de Guibéa ou de Rama, et nous passerons la nuit dans l''un de ces lieux. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils passèrent leur chemin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils passèrent et allèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le soleil se coucha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 28.11.'
      marker-yv: yv-n
    - type: text
      text: 'Ils passèrent leur chemin, et le soleil se coucha quand ils furent près de Guibéa, qui appartient à Benjamin. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 19.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur la place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à l''entrée de la porte principale de la ville. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: personne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: personne qui les recueillît dans la maison pour passer la nuit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 3-9,18.'
      marker-yv: yv-n
    - type: text
      text: Ils firent un détour pour aller passer la nuit à Guibéa. Il entra et s'arrêta sur la place de la ville, mais personne ne leur offrit l'hospitalité pour la nuit.
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il séjournait… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1 ; 17.7
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Gn 13.10-13 ; 19.9.'
      marker-yv: yv-n
    - type: text
      text: 'Or un vieillard revenait, le soir, de travailler aux champs ; cet homme était de la région montagneuse d''Ephraïm, il séjournait en immigré à Guibéa, tandis que les gens du lieu étaient Benjaminites. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il leva les yeux et vit le voyageur sur la place de la ville. Le vieillard lui dit : Où vas-tu, et d''où viens-tu ? '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je me rends à '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je fréquente
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute le sanctuaire où le lévite officie, en Ephraïm ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dans ma maison '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chez moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Il lui répondit : Nous allons de Beth-Léhem de Juda jusqu''au fin fond de la région montagneuse d''Ephraïm, d''où je suis. J''étais allé à Beth-Léhem de Juda. Je me rends à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', mais personne ne m''offre l''hospitalité. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Gn 24.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour ma femme…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour ta servante et pour le serviteur qui est avec tes serviteurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (autre mot hébreu).
      marker-yv: yv-n
    - type: text
      text: 'Nous avons cependant de la paille et du fourrage pour nos ânes ; nous avons aussi du pain et du vin pour moi, pour ma femme et pour le serviteur qui nous accompagne. Nous n''avons besoin de rien. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lui fut infidèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se prostitua contre lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains, rattachant le verbe hébreu à une autre racine, comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se disputa avec lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez son père
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 38.11 ; Lv 22.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pendant quatre mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des jours, quatre mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des jours et quatre mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ce qui pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un an et quatre mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. 17.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Sa concubine lui fut infidèle, puis elle le quitta pour retourner chez son père, à Beth-Léhem de Juda ; elle y resta pendant quatre mois. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sois tranquille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' pour toi'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 6.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le vieillard dit : Sois tranquille ! Je me charge de tout ce dont tu as besoin ; tu ne passeras pas la nuit sur la place ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Les voyageurs '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se lavèrent les pieds '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 18.4 ; 19.2 ; 24.32 ; 43.24 ; cf. Lc 7.44 ; Jn 13.1-15.
      marker-yv: yv-n
    - type: text
      text: Il les fit entrer chez lui et donna du fourrage aux ânes. Les voyageurs se lavèrent les pieds ; puis ils mangèrent et burent.
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 19.4s,9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des hommes sans morale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 13.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que nous ayons…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 25 ; Gn 4.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme leur cœur était content, des hommes de la ville, des hommes sans morale, entourèrent la maison et se mirent à tambouriner à la porte en disant au vieillard, le maître de la maison : Fais sortir l''homme qui est entré chez toi, pour que nous ayons des relations avec lui ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 19.6-8 ; l''échelle des valeurs que ce passage reflète (la protection de l''hôte passe avant celle de la femme) correspond aux lois de l''hospitalité en vigueur dans l''ancien Orient. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans ma maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: folie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: scandale ; infamie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 24 ; 20.6,11 ; Gn 34.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le maître de la maison sortit vers eux et leur dit : Non, mes frères, n''agissez pas mal, je vous en prie ; puisque cet homme est entré chez moi, ne commettez pas une telle folie ! '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ma fille…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 19.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la concubine de cet homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ce détail anticipe peut-être sur le v. 25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: abusez d'elles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 20.5 ; Gn 34.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce qui vous plaira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui est bon à vos yeux.
      marker-yv: yv-n
    - type: text
      text: 'Voici ma fille, qui est vierge, ainsi que la concubine de cet homme. Laissez-moi les faire sortir, je vous prie, abusez d''elles et faites-leur ce qui vous plaira. Mais ne vous livrez pas à une telle folie sur cet homme ! '
  '25':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Ils ne voulurent pas l'écouter. Alors l'homme saisit sa concubine et la leur amena dehors. Ils eurent des relations avec elle et la brutalisèrent toute la nuit, jusqu'au matin ; puis ils la renvoyèrent au lever de l'aurore.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son maître '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son mari
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le terme correspondant (de même dans la suite) est souvent traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Gn 18.12
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vers le matin, cette femme s''en vint tomber à l''entrée de la maison de l''homme chez qui était son maître, jusqu''à ce qu''il fît jour. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au matin, son maître se leva, ouvrit la porte de la maison et sortit pour continuer son chemin. Mais la femme, sa concubine, était étendue à l''entrée de la maison, les mains sur le seuil. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il n'y eut pas de réponse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car elle était morte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chez lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à son lieu.
      marker-yv: yv-n
    - type: text
      text: 'Il lui dit : Lève-toi et allons-nous-en. Mais il n''y eut pas de réponse. Alors le mari la mit sur son âne et s''en alla chez lui. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le couteau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme en Gn 22.6,10 ; Pr 30.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: membre par membre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: selon ses os
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'envoya ainsi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''envoya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(la femme) ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les envoya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(les morceaux). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans tout le territoire d'Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 11.7.'
      marker-yv: yv-n
    - type: text
      text: 'Il entra dans sa maison, prit le couteau, saisit sa concubine, la découpa, membre par membre, en douze morceaux et l''envoya ainsi dans tout le territoire d''Israël. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'parler à son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: lui faire entendre raison ; se réconcilier avec elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; Gn 34.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Os 2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Son mari décida d''aller la voir pour parler à son cœur et la ramener. Il avait avec lui son serviteur et deux ânes. Elle le fit entrer dans la maison de son père ; quand le père de la jeune femme le vit, il l''accueillit avec joie. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.30 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'depuis… d''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1S 8.8 ; 2S 7.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'montés d''Egypte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 12.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: jusqu'à ce jour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX ajoute'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'et il donna cet ordre aux hommes qu''il envoya : Vous parlerez ainsi à tous les hommes d''Israël : Jamais rien de pareil…'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 20.4-7 ; Gn 34.7 ; Jr 2.10.'
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui virent cela disaient : Jamais rien de pareil n''est arrivé ni ne s''est vu depuis que les Israélites sont montés d''Egypte jusqu''à ce jour ; réfléchissez, tenez conseil et parlez.'
  '4':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Son beau-père, le père de la jeune femme, le retint, et il resta trois jours chez lui. Ils mangèrent et burent, et ils passèrent les nuits là.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se disposait à partir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se leva pour (s'en) aller
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme au v. 7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Mange…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'soutiens ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' d''un morceau de pain'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 8 ; cf. Gn 18.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 28.22 ; Ps 104.15 ; sur '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: l'hospitalité et la politesse orientales
        - type: text
          text: ', voir aussi Gn 24.54-59 ; 33.12-17.'
      marker-yv: yv-n
    - type: text
      text: 'Le quatrième jour, ils se levèrent de bon matin. Comme il se disposait à partir, le père de la jeune femme dit à son gendre : Mange quelque chose, restaure-toi ; vous partirez ensuite. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au mari
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à l'homme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', même possibilité dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que ton cœur soit content '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 9,22 ; cf. 16.25
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 18.20.'
      marker-yv: yv-n
    - type: text
      text: 'Ils s''assirent, ils mangèrent et ils burent tous les deux. Puis le père de la jeune femme dit au mari : Accepte de passer la nuit, je te prie, que ton cœur soit content ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'insista '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 19.3,9
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le mari se levait pour s'en aller ; mais son beau-père insista tellement qu'il passa encore la nuit là.
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: restez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'attardez-vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. Gn 19.16) ; certains mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils s'attardèrent.
      marker-yv: yv-n
    - type: text
      text: 'Le cinquième jour, il se leva de bon matin pour partir. Alors le père de la jeune femme dit : Restaure-toi, je te prie ; restez jusqu''au déclin du jour. Et ils mangèrent tous deux. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '19.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le jour baisse, il se fait tard
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le jour faiblit pour le soir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Lc 24.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: décline
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'campe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: installe son camp
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Demain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 11.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans ta tente '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 22.4.
      marker-yv: yv-n
    - type: text
      text: 'Le mari se levait pour s''en aller, avec sa concubine et son serviteur ; mais son beau-père, le père de la jeune femme, lui dit : Le jour baisse, il se fait tard ; passez la nuit, je vous prie ; le jour décline, passez ici la nuit, que ton cœur soit content ! Demain vous vous lèverez de bon matin pour vous mettre en route, et tu t''en iras dans ta tente. '
