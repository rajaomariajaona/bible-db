document_id: JDG.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le crime des Benjaminites de Guibéa
  - type: text
    content: ' '
  - type: note
    content: 'En ces jours-là… 17.6+. –  lévite / région montagneuse d''Ephraïm / Beth-Léhem de Juda  : cf. 17.7ns. –  séjournait en immigré 17.7n. –  concubine ou épouse de second rang ; peut-être le lévite était-il trop pauvre pour payer la dot nécessaire à un mariage en bonne et due forme ; cf. 8.31n  ; 2S 5.13n.'
  - type: text
    content: 'En ces jours-là, il n''y avait pas de roi en Israël. Un lévite qui séjournait en immigré au fin fond de la région montagneuse d''Ephraïm prit pour concubine une femme de Beth-Léhem de Juda. '
  '10':
  - type: note
    content: Jébus / Jérusalem (1.21 ; Jos 15.8,63 ; 18.16,28 ; 2S 5.6-8 ; 1Ch 11.4-8), à deux heures environ de Beth-Léhem (v. 1s).
  - type: text
    content: 'Mais le mari ne voulut pas passer la nuit, il se leva et partit. Il arriva jusque devant Jébus (c''est-à-dire Jérusalem) avec les deux ânes bâtés et avec sa concubine. '
  '11':
  - type: text
    content: 'Lorsqu''ils furent près de Jébus, le jour avait beaucoup baissé. Le serviteur dit alors à son maître : Allons, je t''en prie, faisons un détour par cette ville des Jébusites, nous y passerons la nuit. '
  '12':
  - type: note
    content: Guibéa (Colline) v. 14 ; Jos 18.28 ; 1S 11.4 ; 13.2 ; à 6 km au nord de Jérusalem ; comparer la suite avec Os 9.9 ; 10.9.
  - type: text
    content: 'Son maître lui répondit : Nous ne ferons pas de détour par une ville étrangère où il n''y a pas d''Israélites ; nous passerons la nuit à Guibéa. '
  '13':
  - type: note
    content: 'Rama  : à 3 km au nord de Guibéa (4.5).'
  - type: text
    content: 'Il dit encore à son serviteur : Allons, rapprochons-nous de Guibéa ou de Rama, et nous passerons la nuit dans l''un de ces lieux. '
  '14':
  - type: note
    content: 'Ils passèrent leur chemin  : litt. ils passèrent et allèrent. –  le soleil se coucha  : cf. Gn 28.11.'
  - type: text
    content: 'Ils passèrent leur chemin, et le soleil se coucha quand ils furent près de Guibéa, qui appartient à Benjamin. '
  '15':
  - type: note
    content: 'Cf. Gn 19.1ss. –  sur la place  : à l''entrée de la porte principale de la ville. –  personne…  : litt. personne qui les recueillît dans la maison pour passer la nuit  ; cf. v. 3-9,18.'
  - type: text
    content: Ils firent un détour pour aller passer la nuit à Guibéa. Il entra et s'arrêta sur la place de la ville, mais personne ne leur offrit l'hospitalité pour la nuit.
  '16':
  - type: text
    content: ' '
  - type: note
    content: il séjournait… v. 1 ; 17.7n  ; cf. Gn 13.10-13 ; 19.9.
  - type: text
    content: 'Or un vieillard revenait, le soir, de travailler aux champs ; cet homme était de la région montagneuse d''Ephraïm, il séjournait en immigré à Guibéa, tandis que les gens du lieu étaient Benjaminites. '
  '17':
  - type: text
    content: 'Il leva les yeux et vit le voyageur sur la place de la ville. Le vieillard lui dit : Où vas-tu, et d''où viens-tu ? '
  '18':
  - type: note
    content: 'Je me rends à (autre traduction je fréquente) la maison du Seigneur  : sans doute le sanctuaire où le lévite officie, en Ephraïm ; LXX dans ma maison (c.-à-d. chez moi).'
  - type: text
    content: 'Il lui répondit : Nous allons de Beth-Léhem de Juda jusqu''au fin fond de la région montagneuse d''Ephraïm, d''où je suis. J''étais allé à Beth-Léhem de Juda. Je me rends à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', mais personne ne m''offre l''hospitalité. '
  '19':
  - type: note
    content: 'Cf. Gn 24.25. –  pour ma femme…  : litt. pour ta servante et pour le serviteur qui est avec tes serviteurs (autre mot hébreu).'
  - type: text
    content: 'Nous avons cependant de la paille et du fourrage pour nos ânes ; nous avons aussi du pain et du vin pour moi, pour ma femme et pour le serviteur qui nous accompagne. Nous n''avons besoin de rien. '
  '2':
  - type: note
    content: 'lui fut infidèle  : litt. se prostitua contre lui  ; certains, rattachant le verbe hébreu à une autre racine, comprennent se disputa avec lui. –  chez son père  : cf. Gn 38.11 ; Lv 22.13. –  pendant quatre mois  : litt. des jours, quatre mois  ; certains mss portent des jours et quatre mois, ce qui pourrait signifier un an et quatre mois (cf. 17.10n).'
  - type: text
    content: 'Sa concubine lui fut infidèle, puis elle le quitta pour retourner chez son père, à Beth-Léhem de Juda ; elle y resta pendant quatre mois. '
  '20':
  - type: note
    content: 'Sois tranquille  : litt. paix pour toi, cf. 6.23n.'
  - type: text
    content: 'Le vieillard dit : Sois tranquille ! Je me charge de tout ce dont tu as besoin ; tu ne passeras pas la nuit sur la place ! '
  '21':
  - type: note
    content: Les voyageurs (litt. ils) se lavèrent les pieds Gn 18.4 ; 19.2 ; 24.32 ; 43.24 ; cf. Lc 7.44 ; Jn 13.1-15.
  - type: text
    content: Il les fit entrer chez lui et donna du fourrage aux ânes. Les voyageurs se lavèrent les pieds ; puis ils mangèrent et burent.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 19.4s,9. –  des hommes sans morale Dt 13.14n. –  que nous ayons…  : cf. v. 25 ; Gn 4.1n.'
  - type: text
    content: 'Comme leur cœur était content, des hommes de la ville, des hommes sans morale, entourèrent la maison et se mirent à tambouriner à la porte en disant au vieillard, le maître de la maison : Fais sortir l''homme qui est entré chez toi, pour que nous ayons des relations avec lui ! '
  '23':
  - type: note
    content: 'Gn 19.6-8 ; l''échelle des valeurs que ce passage reflète (la protection de l''hôte passe avant celle de la femme) correspond aux lois de l''hospitalité en vigueur dans l''ancien Orient. –  chez moi  : litt. dans ma maison. –  folie  : autres traductions scandale ; infamie  ; cf. v. 24 ; 20.6,11 ; Gn 34.7n.'
  - type: text
    content: 'Le maître de la maison sortit vers eux et leur dit : Non, mes frères, n''agissez pas mal, je vous en prie ; puisque cet homme est entré chez moi, ne commettez pas une telle folie ! '
  '24':
  - type: note
    content: 'ma fille…  : cf. Gn 19.8. –  la concubine de cet homme  : ce détail anticipe peut-être sur le v. 25. –  abusez d''elles  : cf. 20.5 ; Gn 34.2n. –  ce qui vous plaira  : litt. ce qui est bon à vos yeux.'
  - type: text
    content: 'Voici ma fille, qui est vierge, ainsi que la concubine de cet homme. Laissez-moi les faire sortir, je vous prie, abusez d''elles et faites-leur ce qui vous plaira. Mais ne vous livrez pas à une telle folie sur cet homme ! '
  '25':
  - type: text
    content: Ils ne voulurent pas l'écouter. Alors l'homme saisit sa concubine et la leur amena dehors. Ils eurent des relations avec elle et la brutalisèrent toute la nuit, jusqu'au matin ; puis ils la renvoyèrent au lever de l'aurore.
  '26':
  - type: text
    content: ' '
  - type: note
    content: son maître ou son mari  ; le terme correspondant (de même dans la suite) est souvent traduit par seigneur  ; cf. Gn 18.12n.
  - type: text
    content: 'Vers le matin, cette femme s''en vint tomber à l''entrée de la maison de l''homme chez qui était son maître, jusqu''à ce qu''il fît jour. '
  '27':
  - type: text
    content: 'Au matin, son maître se leva, ouvrit la porte de la maison et sortit pour continuer son chemin. Mais la femme, sa concubine, était étendue à l''entrée de la maison, les mains sur le seuil. '
  '28':
  - type: note
    content: 'il n''y eut pas de réponse  : LXX précise car elle était morte. –  chez lui  : litt. à son lieu.'
  - type: text
    content: 'Il lui dit : Lève-toi et allons-nous-en. Mais il n''y eut pas de réponse. Alors le mari la mit sur son âne et s''en alla chez lui. '
  '29':
  - type: note
    content: 'le couteau  : même terme en Gn 22.6,10 ; Pr 30.14. –  membre par membre  : litt. selon ses os. –  l''envoya ainsi  : litt. l''envoya (la femme) ; LXX les envoya (les morceaux). –  dans tout le territoire d''Israël  : cf. 1S 11.7.'
  - type: text
    content: 'Il entra dans sa maison, prit le couteau, saisit sa concubine, la découpa, membre par membre, en douze morceaux et l''envoya ainsi dans tout le territoire d''Israël. '
  '3':
  - type: note
    content: 'parler à son cœur  : autres traductions lui faire entendre raison ; se réconcilier avec elle  ; Gn 34.3n  ; Os 2.16n.'
  - type: text
    content: 'Son mari décida d''aller la voir pour parler à son cœur et la ramener. Il avait avec lui son serviteur et deux ânes. Elle le fit entrer dans la maison de son père ; quand le père de la jeune femme le vit, il l''accueillit avec joie. '
  '30':
  - type: note
    content: 'depuis… d''Egypte 1S 8.8 ; 2S 7.6. –  montés d''Egypte Gn 12.10n. –  jusqu''à ce jour  : LXX ajoute  : et il donna cet ordre aux hommes qu''il envoya : Vous parlerez ainsi à tous les hommes d''Israël : Jamais rien de pareil…  ; cf. 20.4-7 ; Gn 34.7 ; Jr 2.10.'
  - type: text
    content: 'Tous ceux qui virent cela disaient : Jamais rien de pareil n''est arrivé ni ne s''est vu depuis que les Israélites sont montés d''Egypte jusqu''à ce jour ; réfléchissez, tenez conseil et parlez.'
  '4':
  - type: text
    content: Son beau-père, le père de la jeune femme, le retint, et il resta trois jours chez lui. Ils mangèrent et burent, et ils passèrent les nuits là.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'se disposait à partir  : litt. se leva pour (s''en) aller , comme au v. 7. –  Mange…  : litt. soutiens ton cœur d''un morceau de pain , de même au v. 8 ; cf. Gn 18.5n  ; 1S 28.22 ; Ps 104.15 ; sur l''hospitalité et la politesse orientales, voir aussi Gn 24.54-59 ; 33.12-17.'
  - type: text
    content: 'Le quatrième jour, ils se levèrent de bon matin. Comme il se disposait à partir, le père de la jeune femme dit à son gendre : Mange quelque chose, restaure-toi ; vous partirez ensuite. '
  '6':
  - type: note
    content: 'au mari  : autre traduction à l''homme, même possibilité dans la suite. –  que ton cœur soit content v. 9,22 ; cf. 16.25n  ; 18.20.'
  - type: text
    content: 'Ils s''assirent, ils mangèrent et ils burent tous les deux. Puis le père de la jeune femme dit au mari : Accepte de passer la nuit, je te prie, que ton cœur soit content ! '
  '7':
  - type: note
    content: insista Gn 19.3,9n.
  - type: text
    content: Le mari se levait pour s'en aller ; mais son beau-père insista tellement qu'il passa encore la nuit là.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'restez  : litt. attardez-vous (cf. Gn 19.16) ; certains mss de LXX portent ils s''attardèrent.'
  - type: text
    content: 'Le cinquième jour, il se leva de bon matin pour partir. Alors le père de la jeune femme dit : Restaure-toi, je te prie ; restez jusqu''au déclin du jour. Et ils mangèrent tous deux. '
  '9':
  - type: note
    content: 'Le jour baisse, il se fait tard  : litt. le jour faiblit pour le soir  ; cf. Lc 24.29. –  décline  : litt. campe ou installe son camp. –  Demain  : cf. 2S 11.12. –  dans ta tente Jos 22.4.'
  - type: text
    content: 'Le mari se levait pour s''en aller, avec sa concubine et son serviteur ; mais son beau-père, le père de la jeune femme, lui dit : Le jour baisse, il se fait tard ; passez la nuit, je vous prie ; le jour décline, passez ici la nuit, que ton cœur soit content ! Demain vous vous lèverez de bon matin pour vous mettre en route, et tu t''en iras dans ta tente. '
