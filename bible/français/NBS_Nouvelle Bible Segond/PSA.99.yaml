document_id: PSA.99,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur est roi, il est saint
  - type: text
    content: ' '
  - type: note
    content: 'C''est le Seigneur qui est roi 93.1n. –  tremblent  : autre traduction sont bouleversés. –  sur les keroubim 80.2n. –  vacille  : autre verbe qu''en 10.6 ; 13.5 ; 15.5 ; 16.8 ; 17.5 etc. (synonyme, de forme proche).'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui est roi ! Les peuples tremblent.'
  - type: text
    content: Il est assis sur les keroubim ! La terre vacille.
  '2':
  - type: text
    content: ' '
  - type: note
    content: grand (96.4) dans Sion 48.2 ; Es 12.6 ; 24.23 ; Mi 4.7. –  élevé… 113.4.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est grand dans Sion,'
  - type: text
    content: c'est lui qui est élevé au-dessus de tous les peuples.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'ton nom…  : autre traduction son nom : Grand et Redoutable  ; 47.3 ; 76.2+ ; 95.3 ; 96.4 ; 111.9. –  Il est saint  : on pourrait aussi comprendre il (son nom) est sacré  ; v. 5,9 ; cf. 1S 6.20 ; Es 6.3.'
  - type: text
    content: Qu'on célèbre ton nom grand et redoutable !
  - type: text
    content: Il est saint !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Qu''on célèbre…  : traduction conjecturale (litt. force d''un roi… ) ; quelques-uns comprennent la puissance d''un roi, c''est d''aimer l''équité (ou le droit ) ; d''autres modifient la vocalisation traditionnelle pour lire un puissant est roi, il aime l''équité ! Cf. 24.8-10 ; 72.1s ; 93.5 ; 97.2,6 ; Pr 16.12. –  Jacob 14.7+.'
  - type: text
    content: Qu'on célèbre la puissance du roi qui aime l'équité !
  - type: text
    content: – C'est toi qui affermis la droiture,
  - type: text
    content: c'est toi qui agis en Jacob pour le droit et la justice.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Exaltez v. 9 ; 107.32 ; Ex 15.2 ; Es 25.1. –  notre Dieu 95.7 ; 98.3. –  prosternez-vous (95.6 ; 96.9) devant son marchepied 132.7 ; cf. Es 6.1 ; 66.1 ; 1Ch 28.2 ; Mt 5.35. –  saint v. 3n.
  - type: text
    content: 'Exaltez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: et prosternez-vous devant son marchepied !
  - type: text
    content: Il est saint !
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 77.21+ ; 106.23 ; Ex 17.8ss ; 32.11ss,30ss ; Nb 12.13 ; 14.13ss ; 16.22 ; 21.7ss ; 1S 7.8ss ; 8.6s,21 ; 12.8ss,23 ; Jr 15.1.
  - type: text
    content: Moïse et Aaron parmi ses prêtres,
  - type: text
    content: et Samuel parmi ceux qui invoquent son nom,
  - type: text
    content: 'invoquèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et il leur répondit.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: dans la colonne de nuée Ex 13.21+ ; 33.9 ; Nb 12.5 ; 1R 8.10s. –  préceptes ou témoignages  ; voir loi.
  - type: text
    content: Il leur parla dans la colonne de nuée ;
  - type: text
    content: ils ont gardé ses préceptes
  - type: text
    content: et le décret qu'il leur avait donné.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'un Dieu (hébreu ’El , Gn 21.33n) qui pardonne (litt. qui [re-]lève ou qui enlève, qui porte, qui prend en charge , cf. Gn 4.7n) ; certains comprennent un Dieu patient, qui supporte  ; Ex 34.6s ; Mi 7.18. –  leurs agissements  : ou bien ceux du peuple, ou bien ceux des intercesseurs ; cf. Nb 20.12,24 ; 27.14.'
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, c''est toi qui leur as répondu.'
  - type: text
    content: Tu fus pour eux un Dieu qui pardonne,
  - type: text
    content: mais qui tire vengeance de leurs agissements.
  '9':
  - type: text
    content: ' '
  - type: note
    content: vers sa montagne sacrée (ou sainte ) 3.5 ; cf. 121.1 ; Dn 6.11. –  il est saint v. 3n  ; Lv 19.2.
  - type: text
    content: 'Exaltez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu,'
  - type: text
    content: et prosternez-vous vers sa montagne sacrée !
  - type: text
    content: 'Car il est saint, le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu !'
