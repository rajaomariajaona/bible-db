document_id: 2PE.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: is2
  children:
  - type: text
    text: Un testament spirituel
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'A plusieurs reprises, les pages de la Bible offrent au lecteur un message rédigé sous la forme d''un testament. Ainsi, dès Genèse 49, '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Jacob
  - type: text
    text: ' mourant adresse aux douze patriarches, ancêtres des tribus d''Israël, une série de prédictions ou d''avertissements. Après quoi il annonce sa mort imminente et donne ses instructions pour son ensevelissement. Le Nouveau Testament prend le relais avec les pages sublimes du quatrième évangile (Jn 14 à 17) où '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Jésus
  - type: text
    text: ' confie à ses disciples ses intentions ultimes pour la vie de l''Eglise et le salut du monde. D''une manière analogue, dans les Actes, le discours de l''apôtre '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Paul
  - type: text
    text: ' aux anciens d''Ephèse réunis à Milet revêt les formes de l''avertissement prophétique à court terme et celui, plus poignant, des ultimes adieux avant la séparation définitive (Ac 20.17-38). Il existe encore un schéma analogue en 2 Timothée (chap. 4 en particulier).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La Seconde de Pierre s''inscrit dans ce même cadre. L''auteur y parle ouvertement de sa mort prochaine : c''est elle qui rend si pressante la communication dont cet écrit est le support (1.13ss).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: L'enjeu
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Un grave conflit secoue la chrétienté à la fin de l''âge apostolique, au moment où notre épître est mise en circulation. D''une certaine façon, à cette époque, il y a déjà une querelle des anciens et des modernes. En effet, si quelques-uns (les destinataires de la lettre) sont demeurés relativement fidèles, plusieurs se sont lancés à corps perdu dans la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: licence morale
  - type: text
    text: ' et '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: intellectuelle
  - type: text
    text: .
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Pour les combattre, la Seconde de Pierre s''attache à mettre en évidence une méthode de raisonnement : la référence au '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: « canon »
  - type: text
    text: ' des Ecritures. Elle l''applique ensuite aux deux domaines de dévoiement déjà évoqués : le dérèglement des mœurs et celui de la théologie.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Le canon des Ecritures
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'En théologie biblique, le mot « canon » désigne la liste officielle (« homologuée », dira Origène) des écrits inspirés. C''est toujours au moment des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: bilans
  - type: text
    text: ' consécutifs aux crises graves que le peuple de la foi songe à réexaminer ce problème, car il s''agit, en dernière analyse, de déterminer où se trouve la vérité. Dans l''Evangile selon Luc, au lendemain de la Résurrection, la référence aux trois parties de l''Ancien Testament, Loi, Prophètes, Ecrits, apparaît déjà comme un recours profitable (voir Lc 24.27,32,44). La Seconde de Pierre suppose une démarche comparable en ce qui concerne, cette fois, le canon du Nouveau Testament (dont cet écrit esquisse déjà la clôture).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'L''auteur tient, en effet, pour essentielle et définitive la référence aux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: apôtres
  - type: text
    text: ' et aux proches du cercle apostolique (3.2). Avec vigueur, il cite l''évangile (selon Matthieu ?), transportant ses lecteurs, en esprit, sur la montagne même de la Transfiguration, pour revivre l''investiture de leur Seigneur et Sauveur et renouer avec '
  - type: usfm
    marker: it
    children:
    - type: text
      text: la parole prophétique
  - type: text
    text: ' (1.16ss). Il se réfère aussi aux lettres de l''apôtre Paul (3.15s), peut-être à l''Apocalypse (comparer 2P 2.15 et Ap 2.14), mais surtout, au chapitre 2, à l''épître de Jude (voir le tableau comparatif : les ressemblances et les différences entre les deux épîtres s''expliquent beaucoup mieux si Pierre a retravaillé Jude que dans l''hypothèse inverse).'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Vraie connaissance et maîtres de mensonge
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La Seconde de Pierre affectionne l''idée d''une '
  - type: usfm
    marker: it
    children:
    - type: text
      text: connaissance de notre Seigneur Jésus-Christ
  - type: text
    text: ' (1.8), une connaissance objective qui constitue l''élément déterminant de la condition chrétienne. Ce '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: vrai savoir,
  - type: text
    text: ' évoqué par sept fois (1.2,3,6,8,12,14,16), sera opposé, à la page suivante, à des pseudo-savoirs. Dans cette perspective, on peut reconnaître le souci d''une Eglise qui, face à l''hérésie naissante, met en avant la solidité du témoignage apostolique.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le chapitre 2 donne un bel exemple de ce combat. On y voit l''auteur travailler pour ses lecteurs sur une page du Nouveau Testament (l''épître de Jude). '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Scriptura sacra sui ipsius interpres
  - type: text
    text: ', dit un célèbre adage (« L''Ecriture sainte s''interprète elle-même »).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: maîtres de mensonge
  - type: text
    text: ' ou faux docteurs (cf. 2.1) n''apparaissent sous ce nom que dans notre épître. Ils appartiennent manifestement à la communauté chrétienne. Ils rappellent les '
  - type: usfm
    marker: it
    children:
    - type: text
      text: loups féroces
  - type: text
    text: ' qui, selon le livre des Actes, devaient s''introduire dans le troupeau après le départ de l''apôtre Paul (Ac 20.29).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces agents de subversion étaient-ils déjà les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: « gnostiques »
  - type: text
    text: ' devenus fameux au II'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: e
  - type: text
    text: ' siècle, qui prétendaient initier les chrétiens à une existence neuve et libérée grâce à la « connaissance » (en grec '
  - type: usfm
    marker: it
    children:
    - type: text
      text: gnosis
  - type: text
    text: ) de tous les mystères (voir « La question gnostique », p.${Xgnose}) ? L'apôtre Paul les visait-il déjà en opposant la connaissance qui gonfle d'orgueil à l'amour qui construit (1Co 8.1) ?
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'En tout état de cause, les meilleurs éléments de réponse à ces adversaires sont apportés par l''épître de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Jude
  - type: text
    text: ', si largement évoquée dans notre épître. Se servant des procédés habituels de la démagogie, les maîtres de mensonge bernent les fidèles pour se remplir le ventre (2.13), voire les poches (2.3,14). Les plaisirs « charnels » (2.10,18) désignent au sens large toutes les goinfreries et toutes les licences acceptées au nom de faux principes. Ces sujets de réflexion, voire de conversion, demeurent toujours actuels.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les notions rares
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Au fil du discours, la Seconde de Pierre évoque des notions rares, telles '
  - type: usfm
    marker: it
    children:
    - type: text
      text: les gloires
  - type: text
    text: ' (2.10), empruntées à l''épître de Jude. L''argumentation, déjà difficile, l''est rendue plus encore pour nous qui ne disposons pas de '
  - type: usfm
    marker: it
    children:
    - type: text
      text: L'Assomption de Moïse,
  - type: text
    text: ' l''ouvrage auquel Jude se référait. En substance, le passage veut dire que c''est à Dieu seul qu''il appartient de juger ses anges, et non aux maîtres de mensonge au sein de l''Eglise.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Balaam est une figure bonne ou mauvaise selon les contextes où on le situe. En Nombres 31.16, l''ambiguïté est tranchée dans un sens négatif. La tradition ultérieure qui, dans cette ligne, voit en lui un personnage diabolique, est reprise par l''Apocalypse (2.14) comme elle l''est ici (2P 2.15). Le '
  - type: usfm
    marker: it
    children:
    - type: text
      text: salaire de l'injustice
  - type: text
    text: ' évoque la cupidité de Balaam.'
- type: usfm
  marker: is2
  children:
  - type: text
    text: Comme un voleur dans la nuit
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Le ton du chapitre 3 est neuf. On en a parfois déduit qu''il constituait une seconde lettre, tandis que la première, mentionnée en 3.1, serait faite des chapitres 1 et 2 de l''écrit (beaucoup estiment cependant plus vraisemblable que la « première lettre » soit tout simplement celle que nous appelons Première de Pierre). Quoi qu''il en soit, le fragment 3.1s opère un rappel de la méthode préconisée au chapitre 1 : il y a continuité entre les prophéties de l''Ancien Testament, l''Evangile et la tradition apostolique qui le véhicule. Ainsi, le '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: retard de l'avènement du Christ
  - type: text
    text: ' est un faux problème né d''une triple méconnaissance des saintes Ecritures. Il faut souligner, en effet, les points suivants :'
- type: usfm
  marker: im
  children:
  - type: text
    text: '–la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: notion de temps
  - type: text
    text: ' n''est pas la même pour le Seigneur et pour nous (Ps 90.4, cité en 2P 3.8) ;'
- type: usfm
  marker: im
  children:
  - type: text
    text: '– il faut tenir compte de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: patience de Dieu
  - type: text
    text: ' laissant aux hommes le temps de se convertir (3.9) ;'
- type: usfm
  marker: im
  children:
  - type: text
    text: '– le thème du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: voleur dans la nuit
  - type: text
    text: ' (3.10), présent déjà chez l''apôtre Paul (1Th 5.2) et chez l''évangéliste Matthieu (chap. 24), souligne le caractère absolument imprévisible de cette venue soudaine du Seigneur. Quiconque prétend connaître à l''avance la chronologie s''égare lui-même et égare les autres (Mt 24.36). Qui entend l''avertissement veille et redouble de zèle et d''espérance (2P 3.11ss).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: Les temps changent, les générations passent, la science profane se développe, mais parallèlement l'humanité est de plus en plus convaincue d'habiter un monde limité dans son espace et dans son temps. L'éternelle réflexion des humains passe encore et toujours par l'angoisse de l'avenir. Le testament spirituel de l'apôtre montre quelle liberté communique dans ce monde la sûre parole de l'Evangile.
