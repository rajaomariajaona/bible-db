document_id: JOB.27,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job (suite) : un coupable ferait-il appel à Dieu ?'
  - type: text
    content: ' '
  - type: note
    content: 'poème  : le même mot est traduit par maxime, proverbe ou sentence , cf. 29.1 ; Nb 23.7+ ; Ez 14.8n  ; Ps 78.2n  ; Pr 1.1n.'
  - type: text
    content: 'Job reprit son poème :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: Puissant 5.17n. –  délices 22.26+.
  - type: text
    content: Fait-il du Puissant ses délices ?
  - type: text
    content: Invoque-t-il Dieu en tout temps ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'du pouvoir  : litt. de (ou par, dans ) la main . –  les desseins du Puissant  : litt. ce qui est avec (ou chez ) le Puissant . Cf. 6.10.'
  - type: text
    content: Je vous apporte l'enseignement du pouvoir de Dieu,
  - type: text
    content: je ne vous cacherai pas les desseins du Puissant.
  '12':
  - type: text
    content: 'Vous tous, vous l''avez bien vu :'
  - type: text
    content: pourquoi donc vous perdre en futilités ?
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le patrimoine que la brute reçoit  : litt. le patrimoine des brutes , mais la suite est au singulier. La ressemblance entre ce verset et la fin du discours de Tsophar (20.29+), ainsi que le contenu des v. 13-23, ont fait penser à certains que ce passage pourrait contenir des éléments d''un troisième discours de Tsophar (cf. 24.18n), mais cette hypothèse n''est appuyée par aucun manuscrit. –  Puissant 5.17n.'
  - type: text
    content: Telle est la part que Dieu réserve à l'homme méchant,
  - type: text
    content: 'le patrimoine que la brute reçoit du Puissant :'
  '14':
  - type: text
    content: s'il a des fils en grand nombre, c'est pour l'épée,
  - type: text
    content: et ses rejetons ne peuvent se rassasier de pain ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'la mort  : voir 18.13n. Certains modifient le texte hébreu traditionnel pour lire seront ensevelis (ou ne seront pas ensevelis ) dans un tumulus (en lisant ici le mot hébreu traduit ailleurs par hauteur ou haut lieu ). –  leurs veuves  : litt. ses veuves  ; LXX leurs veuves.'
  - type: text
    content: ceux qui lui survivent seront ensevelis par la mort,
  - type: text
    content: et leurs veuves ne les pleureront pas.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jc 5.3.
  - type: text
    content: S'il amasse l'argent comme la poussière,
  - type: text
    content: s'il entasse les vêtements comme de l'argile,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 20.10. –  qui aura son argent en partage  : autre traduction qui répartira l''argent (aux siens).'
  - type: text
    content: c'est lui qui entasse,
  - type: text
    content: mais c'est le juste qui s'en revêtira,
  - type: text
    content: c'est l'innocent qui aura son argent en partage.
  '18':
  - type: text
    content: ' '
  - type: note
    content: maison… 8.14n.
  - type: text
    content: Il a bâti sa maison comme le fait la mite,
  - type: text
    content: comme la hutte que se fait un gardien.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'sans que ce soit déjà enlevé…  : litt. il ne sera pas réuni ( aux siens , cf. Gn 25.8n), d''où une autre traduction possible sans (pourtant) être enseveli, il ouvre les yeux et il n''est plus . Avec des versions anciennes et une légère modification du texte hébreu, on pourrait aussi comprendre  : mais il ne recommencera pas , c.-à-d.  : il se couche pour la dernière fois.'
  - type: text
    content: 'Riche, il se couche, sans que ce soit déjà enlevé :'
  - type: text
    content: il ouvre les yeux, et il n'y a plus rien !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Par la vie de Dieu  : cette formule de serment peut être comprise comme un appel à Dieu, qui contraindrait celui-ci à intervenir en cas de parjure ; ce genre d''appel est censé mettre fin à toute controverse humaine (cf. Ex 22.6ss) ; les protestations d''innocence de Job et les malédictions conditionnelles qu''il s''adresse à lui-même au chap. 31 jouent un rôle analogue. –  écarte mon droit  : cf. 34.5. –  Puissant v. 10ss ; 5.17n. –  amertume 7.11+.'
  - type: text
    content: Par la vie de Dieu, qui écarte mon droit,
  - type: text
    content: du Puissant qui me remplit d'amertume,
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'épouvante  : cf. 6.4+. –  nuit 34.25.'
  - type: text
    content: L'épouvante le surprend comme les eaux ;
  - type: text
    content: un ouragan l'enlève pendant la nuit.
  '21':
  - type: text
    content: ' '
  - type: note
    content: vent d'est 38.24+ ; Jr 18.17n. –  du lieu qu'il habitait v. 23 ; 7.10n.
  - type: text
    content: Le vent d'est l'emporte, et il s'en va ;
  - type: text
    content: il l'arrache violemment du lieu qu'il habitait.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'On (litt. il , c.-à-d. Dieu ?) lance…  : cf. 6.4+ ; voir aussi 33.18+.'
  - type: text
    content: On lance des projectiles sur lui,
  - type: text
    content: on ne l'épargnera pas ;
  - type: text
    content: il lui faut prendre la fuite.
  '23':
  - type: text
    content: ' '
  - type: note
    content: De dégoût, on bat des mains 34.37n  ; Lm 2.15s. –  on siffle d'horreur Jr 18.16n  ; 19.8.
  - type: text
    content: De dégoût, on bat des mains sur lui,
  - type: text
    content: et on siffle d'horreur sur lui depuis le lieu qu'il habitait.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'je respirerai  : litt. le souffle (comme en Gn 2.7n) sera en moi  ; le second mot traduit par souffle (ou Esprit ) est celui de Gn 1.2n  ; cf. Jb 4.9 ; voir aussi 33.4 ; Ps 104.30.'
  - type: text
    content: tant que je respirerai,
  - type: text
    content: tant que le souffle de Dieu sera dans mes narines,
  '4':
  - type: text
    content: ' '
  - type: note
    content: 6.28-30 ; 42.7s ; cf. Es 59.3.
  - type: text
    content: mes lèvres ne diront pas l'injustice,
  - type: text
    content: ma langue ne murmurera rien de faux.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Jamais 1S 2.30n. –  je ne vous donnerai raison  : autre traduction je ne vous justifierai.'
  - type: text
    content: Jamais je ne vous donnerai raison !
  - type: text
    content: Jusqu'à ce que j'expire, je ne renoncerai pas à mon intégrité ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: '13.18 ; 17.9 ; cf. Ps 143.2 ; Rm 3.10. – Voir cœur. –  ne me reproche  : litt. ne déshonore ou n''outrage  ; cf. 16.10 ; 17.5.'
  - type: text
    content: je tiens à ma justice, je ne faiblirai pas ;
  - type: text
    content: mon cœur ne me reproche aucun de mes jours.
  '7':
  - type: text
    content: Que mon ennemi soit traité comme un méchant,
  - type: text
    content: et celui qui se dresse contre moi comme un homme injuste !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Quel espoir…  : autre traduction que reste-t-il à l''impie quand on tranche le fil de son existence  ; cf. 6.9n.'
  - type: text
    content: Quel espoir reste-t-il à l'impie
  - type: text
    content: quand il est retranché,
  - type: text
    content: quand Dieu lui retire sa vie ?
  '9':
  - type: text
    content: Dieu entend-il ses cris,
  - type: text
    content: quand la détresse arrive sur lui ?
