document_id: EST.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Esther devient reine
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Pr 20.25. –  Il se souvint  : LXX il ne se souvint plus.'
  - type: text
    content: 'Après cela, la fureur du roi Xerxès s''apaisa. Il se souvint de Vashti, de ce qu''elle avait fait et de la décision qui avait été prise à son sujet. '
  '10':
  - type: note
    content: 'V. 20. –  interdit…  : litt. ordonné (même terme au v. 20) qu''elle ne les dise pas.'
  - type: text
    content: 'Esther ne fit pas connaître son peuple et ses origines, car Mardochée lui avait interdit de les faire connaître. '
  '11':
  - type: note
    content: 'savoir comment allait Esther  : litt. connaître la paix d''Esther  ; cf. v. 19.'
  - type: text
    content: Chaque jour, Mardochée arpentait les abords du harem pour savoir comment allait Esther et comment on la traitait.
  '12':
  - type: text
    content: ' '
  - type: note
    content: chacune des jeunes filles v. 3,8.
  - type: text
    content: 'Le tour de chacune des jeunes filles d''aller chez le roi Xerxès arrivait au bout de douze mois qui lui étaient assignés suivant le protocole des femmes, car la période de leurs apprêts était ainsi remplie : six mois avec de l''huile de myrrhe et six mois avec des essences odoriférantes et des cosmétiques de femmes. '
  '13':
  - type: text
    content: 'Lorsque la jeune fille allait vers le roi, tout ce qu''elle demandait lui était donné pour qu''elle l''emporte avec elle du harem à la maison du roi. '
  '14':
  - type: note
    content: 'Sur le second harem (v. 3n) où vivaient les concubines, c.-à-d. les femmes que le roi avait déjà connues, cf. 2S 16.21s ; 1R 2.22. –  Elle ne revenait plus… 1.14n  ; 4.11. –  ne désire la voir  : litt. ne la désire ou ne se plaise avec elle  ; cf. Nb 14.8n. –  ne l''appelle  : cf. 1.11s.'
  - type: text
    content: Le soir elle y allait, le matin elle rentrait dans un second harem sous l'autorité de Shaashgaz, eunuque du roi, gardien des concubines. Elle ne revenait plus chez le roi, à moins que le roi ne désire la voir et ne l'appelle par son nom.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Abihaïl, oncle de Mardochée  : cf. v. 7 ; 9.29. –  avait grâce…  : litt. levait (ou suscitait ) grâce…  : cf. v. 9n,17 ; 5.2.'
  - type: text
    content: 'Quand son tour d''aller chez le roi fut arrivé, Esther, fille d''Abihaïl, oncle de Mardochée qui l''avait adoptée, ne demanda rien d''autre que ce qui avait été indiqué par Hégaï, eunuque du roi et gardien des femmes. Esther avait grâce aux yeux de tous ceux qui la voyaient. '
  '16':
  - type: note
    content: 'Tébeth  : décembre-janvier.'
  - type: text
    content: 'On vint prendre Esther pour l''emmener chez le roi Xerxès, dans sa maison royale, le dixième mois, c''est-à-dire le mois de Tébeth, la septième année de son règne. '
  '17':
  - type: note
    content: sa grâce et sa faveur v. 9,15. –  couronne royale 1.11+. –  Vashti 1.9n.
  - type: text
    content: 'Le roi aima Esther plus que toutes les autres femmes, elle eut sa grâce et sa faveur plus que toutes les autres vierges. Alors, il mit sur sa tête la couronne royale et la fit reine à la place de Vashti. '
  '18':
  - type: note
    content: 'banquet 1.3n. –  un dégrèvement  : sens incertain ; il s''agit peut-être d''une amnistie, d''un dégrèvement fiscal ou d''un temps de repos. –  des présents royaux  : litt. un présent selon la main du roi  ; cf. 1.7n.'
  - type: text
    content: 'Le roi donna un grand banquet pour tous ses princes et pour toute sa cour, le banquet d''Esther. Il accorda un dégrèvement aux provinces et fit des présents royaux. '
  '19':
  - type: note
    content: 'on rassembla des vierges pour la seconde fois  : certains comprennent quand on se remit à rassembler des vierges v. 3,8. –  porte du Roi v. 21 ; 3.2s ; 4.2,6 ; 5.9,13 ; 6.10,12 ; cf. 1Ch 9.18 ; il s''agit vraisemblablement d''un bâtiment abritant des services administratifs ; voir Esther grec A.2 : « C''était un personnage important qui servait à la cour du roi. »'
  - type: text
    content: 'Quand on rassembla des vierges pour la seconde fois, Mardochée était assis à la porte du Roi. '
  '2':
  - type: note
    content: 'Les serviteurs personnels du roi  : litt. les jeunes gens (ou serviteurs) qui étaient au service du roi (comme en 1.10), même expression en 6.3. –  Qu''on recherche pour toi…  : litt. qu''on recherche pour le roi… (de même dans la suite ; dans le texte, les serviteurs s''adressent au roi à la troisième personne). –  belles  : cf. v. 3 ; 1.11 ; voir aussi 1R 1.2s.'
  - type: text
    content: 'Les serviteurs personnels du roi lui dirent : Qu''on recherche pour toi, ô roi, des jeunes filles, vierges et belles. '
  '20':
  - type: note
    content: V. 10. –  sous sa tutelle v. 7.
  - type: text
    content: Esther ne faisait toujours pas connaître ses origines, ni son peuple, comme le lui avait ordonné Mardochée. Esther faisait ce que lui disait Mardochée, comme lorsqu'elle était sous sa tutelle.
  - type: heading
    content: Mardochée déjoue un complot
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 6.1s. –  porter la main sur  : même expression en 3.6 ; 6.2 ; 8.7 ; 9.2,10,15s.'
  - type: text
    content: 'En ces jours-là, alors que Mardochée était assis à la porte du Roi, deux eunuques du roi, de la garde du seuil, Bigtân et Téresh, dans un accès de colère, cherchèrent à porter la main sur le roi Xerxès. '
  '22':
  - type: text
    content: 'La chose vint à la connaissance de Mardochée qui la fit connaître à la reine Esther. Esther le dit au roi, au nom de Mardochée. '
  '23':
  - type: note
    content: 'On entreprit une enquête…  : litt. la parole (ou la chose) fut cherchée et fut trouvée. –  eunuques  : sous-entendu dans le texte. –  une potence  : litt. un bois, de même en 5.14 ; 7.9s ; 9.13+ ; cf. Gn 40.22 ; Dt 21.22s ; Ga 3.13. –  chroniques ou annales (royales)  : litt. les paroles (ou les événements) des jours  ; cf. 6.1 ; 10.2 ; cf. Esd 4.15.'
  - type: text
    content: 'On entreprit une enquête qui aboutit : on pendit les deux eunuques à une potence. Cela fut écrit, devant le roi, dans le livre des chroniques.'
  '3':
  - type: note
    content: 'le harem  : litt. la maison des femmes. –  Suse la citadelle 1.2n. –  sous l''autorité de  : litt. à la main de, de même aux v. 8,14. –  Hégué  : son nom est orthographié Hégaï aux v. 8,15.'
  - type: text
    content: 'Nomme donc des inspecteurs dans toutes les provinces de ton royaume pour qu''ils rassemblent toutes les jeunes filles vierges et belles dans le harem de Suse la citadelle, sous l''autorité de Hégué, eunuque du roi et gardien des femmes, et qu''on leur donne des cosmétiques. '
  '4':
  - type: note
    content: qui te plaira 1.21n  ; cf. Dn 5.19.
  - type: text
    content: La jeune fille qui te plaira deviendra reine à la place de Vashti. Cette proposition plut au roi, et ainsi fut fait.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Juif  : autre traduction Judéen  ; c''est dans le livre d''Esther que ce terme apparaît le plus souvent ; voir 2R 16.6n. –  Mardochée  : ce nom rappelle celui du dieu babylonien Mardouk ; cf. Esd 2.2 ; Né 7.7. –  Shiméi  : cf. 2S 16.5. –  Qish  : cf. 1S 9.1 ; 1Ch 8.33 ; voir aussi 3.1n.'
  - type: text
    content: 'Il y avait à Suse la citadelle un Juif nommé Mardochée, fils de Yaïr, fils de Shiméi, fils de Qish, Benjaminite. '
  '6':
  - type: note
    content: 'parmi ceux…  : litt. avec l''exil qui avait été exilé avec Jékonia. –  Jékonia ou Jéchonias, ailleurs identifié à Joïakîn, exilé en 597 av. J.-C. ; cf. 2R 24.10-17 ; Jr 22.4 ; 24.1 ; 29.1s.'
  - type: text
    content: 'Il avait été exilé de Jérusalem parmi ceux qui avaient été exilés avec Jékonia, roi de Juda, par Nabuchodonosor, roi de Babylone. '
  '7':
  - type: note
    content: 'Hadassa  : nom hébreu qui signifie Myrte. –  Esther  : certains ont rapproché ce nom de celui de la déesse babylonienne Ishtar, d''autres du mot grec qui a donné astre  ; la tradition juive l''a expliqué par une racine hébraïque signifiant cacher (Dt 31.17 ; Es 8.17 ; 54.8). –  fille de son oncle (à lui) : cf. v. 15+ ; Jg 10.1n.'
  - type: text
    content: C'était le tuteur de Hadassa (c'est-à-dire Esther), la fille de son oncle. Elle n'avait plus, en effet, ni père, ni mère ; or cette jeune fille était d'une très grande beauté. A la mort de son père et de sa mère, Mardochée l'avait adoptée.
  '8':
  - type: text
    content: ' '
  - type: note
    content: V. 3n.
  - type: text
    content: 'Lorsqu''on eut publié l''ordre et l''édit du roi, de nombreuses jeunes filles furent rassemblées à Suse la citadelle, sous l''autorité de Hégaï. On emmena ainsi Esther dans la maison du roi, sous l''autorité de Hégaï, gardien des femmes. '
  '9':
  - type: note
    content: 'lui plut 1.21n. –  eut (litt. leva ou suscita) sa faveur (le terme correspondant est habituellement traduit par fidélité) : cf. v. 15n,17 ; 5.2,8 ; 7.3 ; 8.5 ; Gn 39.4,21 ; Dn 1.9 ; voir aussi Rt 1.8n  ; Esd 7.28n. –  nourriture  : cf. 9.19n. –  sept (1.10+) servantes (le même mot est traduit par jeunes filles au v. 2) : cf. 4.4. –  place  : sous-entendu dans le texte.'
  - type: text
    content: 'La jeune fille lui plut, elle eut sa faveur. Il s''empressa de lui donner ce qu''il lui fallait pour sa toilette et pour sa nourriture, ainsi que sept servantes choisies dans la maison du roi, et il la fit passer avec ses servantes à la meilleure place du harem. '
