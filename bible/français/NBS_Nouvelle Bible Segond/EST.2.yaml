document_id: EST.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Esther devient reine
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Pr 20.25. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il se souvint
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne se souvint plus.
      marker-yv: yv-n
    - type: text
      text: 'Après cela, la fureur du roi Xerxès s''apaisa. Il se souvint de Vashti, de ce qu''elle avait fait et de la décision qui avait été prise à son sujet. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: interdit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ordonné '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(même terme au v. 20) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'elle ne les dise pas.
      marker-yv: yv-n
    - type: text
      text: 'Esther ne fit pas connaître son peuple et ses origines, car Mardochée lui avait interdit de les faire connaître. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: savoir comment allait Esther
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'connaître la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: paix
        - type: text
          text: ' d''Esther'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 19.'
      marker-yv: yv-n
    - type: text
      text: Chaque jour, Mardochée arpentait les abords du harem pour savoir comment allait Esther et comment on la traitait.
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chacune des jeunes filles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3,8.
      marker-yv: yv-n
    - type: text
      text: 'Le tour de chacune des jeunes filles d''aller chez le roi Xerxès arrivait au bout de douze mois qui lui étaient assignés suivant le protocole des femmes, car la période de leurs apprêts était ainsi remplie : six mois avec de l''huile de myrrhe et six mois avec des essences odoriférantes et des cosmétiques de femmes. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Lorsque la jeune fille allait vers le roi, tout ce qu''elle demandait lui était donné pour qu''elle l''emporte avec elle du harem à la maison du roi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'second harem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') où vivaient les '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: concubines
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. les femmes que le roi avait déjà connues, cf. 2S 16.21s ; 1R 2.22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Elle ne revenait plus… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 4.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne désire la voir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne la désire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne se plaise avec elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 14.8'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne l'appelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.11s.'
      marker-yv: yv-n
    - type: text
      text: Le soir elle y allait, le matin elle rentrait dans un second harem sous l'autorité de Shaashgaz, eunuque du roi, gardien des concubines. Elle ne revenait plus chez le roi, à moins que le roi ne désire la voir et ne l'appelle par son nom.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abihaïl, oncle de Mardochée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 7 ; 9.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avait '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: …
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'levait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: suscitait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: grâce…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',17 ; 5.2.'
      marker-yv: yv-n
    - type: text
      text: 'Quand son tour d''aller chez le roi fut arrivé, Esther, fille d''Abihaïl, oncle de Mardochée qui l''avait adoptée, ne demanda rien d''autre que ce qui avait été indiqué par Hégaï, eunuque du roi et gardien des femmes. Esther avait grâce aux yeux de tous ceux qui la voyaient. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tébeth
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : décembre-janvier.'
      marker-yv: yv-n
    - type: text
      text: 'On vint prendre Esther pour l''emmener chez le roi Xerxès, dans sa maison royale, le dixième mois, c''est-à-dire le mois de Tébeth, la septième année de son règne. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sa grâce et sa faveur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 9,15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'couronne royale '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Vashti '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi aima Esther plus que toutes les autres femmes, elle eut sa grâce et sa faveur plus que toutes les autres vierges. Alors, il mit sur sa tête la couronne royale et la fit reine à la place de Vashti. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'banquet '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un dégrèvement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sens incertain ; il s''agit peut-être d''une amnistie, d''un dégrèvement fiscal ou d''un temps de repos. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des présents royaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un présent selon la main du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le roi donna un grand banquet pour tous ses princes et pour toute sa cour, le banquet d''Esther. Il accorda un dégrèvement aux provinces et fit des présents royaux. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: on rassembla des vierges pour la seconde fois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quand on se remit à rassembler des vierges '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 3,8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte du Roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 21 ; 3.2s ; 4.2,6 ; 5.9,13 ; 6.10,12 ; cf. 1Ch 9.18 ; il s''agit vraisemblablement d''un bâtiment abritant des services administratifs ; voir '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esther
        - type: text
          text: ' grec '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A.2 : « C''était un personnage important qui servait à la cour du roi. »'
      marker-yv: yv-n
    - type: text
      text: 'Quand on rassembla des vierges pour la seconde fois, Mardochée était assis à la porte du Roi. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les serviteurs personnels du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les jeunes gens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui étaient au service du roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(comme en 1.10), même expression en 6.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Qu'on recherche pour toi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''on recherche pour le roi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(de même dans la suite ; dans le texte, les serviteurs s''adressent au roi à la troisième personne). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: belles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 3 ; 1.11 ; voir aussi 1R 1.2s.'
      marker-yv: yv-n
    - type: text
      text: 'Les serviteurs personnels du roi lui dirent : Qu''on recherche pour toi, ô roi, des jeunes filles, vierges et belles. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sous sa tutelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 7.
      marker-yv: yv-n
    - type: text
      text: Esther ne faisait toujours pas connaître ses origines, ni son peuple, comme le lui avait ordonné Mardochée. Esther faisait ce que lui disait Mardochée, comme lorsqu'elle était sous sa tutelle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mardochée déjoue un complot
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 6.1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porter la main sur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : même expression en 3.6 ; 6.2 ; 8.7 ; 9.2,10,15s.'
      marker-yv: yv-n
    - type: text
      text: 'En ces jours-là, alors que Mardochée était assis à la porte du Roi, deux eunuques du roi, de la garde du seuil, Bigtân et Téresh, dans un accès de colère, cherchèrent à porter la main sur le roi Xerxès. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'La chose vint à la connaissance de Mardochée qui la fit connaître à la reine Esther. Esther le dit au roi, au nom de Mardochée. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On entreprit une enquête…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la parole '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la chose
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fut cherchée et fut trouvée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: eunuques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une potence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même en 5.14 ; 7.9s ; 9.13+ ; cf. Gn 40.22 ; Dt 21.22s ; Ga 3.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'chroniques '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: annales (royales)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les paroles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les événements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 6.1 ; 10.2 ; cf. Esd 4.15.'
      marker-yv: yv-n
    - type: text
      text: 'On entreprit une enquête qui aboutit : on pendit les deux eunuques à une potence. Cela fut écrit, devant le roi, dans le livre des chroniques.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le harem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la maison des femmes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Suse la citadelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
