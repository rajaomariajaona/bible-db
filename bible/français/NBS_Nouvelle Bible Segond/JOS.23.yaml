  - type: text
    text: 'Bien des jours s''étaient écoulés depuis que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait accordé le repos à Israël, en le délivrant de tous les ennemis qui l''entouraient. Josué était vieux, avancé en âge. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: ancien
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'secrétaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: greffiers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1.10+.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Josué convoqua tout Israël, ses anciens, ses chefs, ses juges et ses secrétaires. Il leur dit : Je suis vieux, avancé en âge. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'c''est le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' …'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 10 ; 10.14,42 ; Ex 14.14 ; Dt 1.30+ ; 3.22.'
    marker-yv: yv-n
  - type: text
    text: 'Vous, vous avez vu tout ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, a fait à toutes ces nations à cause de vous : c''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, qui a combattu pour vous. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Regardez '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: voyez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', même verbe hébreu au v. 3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je vous ai attribué…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: j'ai fait tomber pour vous comme patrimoine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 13.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui restent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 7,12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la grande mer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Regardez, je vous ai attribué par le sort comme patrimoine, tribu par tribu, ces nations qui restent, à partir du Jourdain, et toutes les nations que j''ai retranchées, jusqu''à la grande mer, vers le soleil couchant. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, les repoussera loin de vous et les dépossédera devant vous ; vous prendrez possession de leur pays, comme le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous l''a dit. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'd''observer et de mettre en pratique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dt 28.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le livre de la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: loi
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.31+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ni à droite ni à gauche '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Efforcez-vous vraiment d''observer et de mettre en pratique tout ce qui est écrit dans le livre de la loi de Moïse, sans vous en écarter ni à droite ni à gauche, '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ex 23.13 ; Jr 5.7 ; So 1.5 ; Ps 16.4. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous mêler à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'venir dans '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: parmi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous n''évoquerez pas le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' de leurs dieux'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous ne rappellerez pas le souvenir… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Ex 23.13
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'sans vous mêler à ces nations qui restent avec vous. Vous n''évoquerez pas le nom de leurs dieux, vous ne prêterez pas serment par lui ; vous ne les servirez pas et vous ne vous prosternerez pas devant eux. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous vous attacherez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 10.20+ ; 11.22.'
    marker-yv: yv-n
  - type: text
    text: 'C''est seulement au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu, que vous vous attacherez, comme vous l''avez fait jusqu''à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'jusqu''à ce jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dépossédé devant vous des nations grandes et fortes ; personne n''a pu tenir contre vous jusqu''à ce jour. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Un seul d'entre vous…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lv 26.8 ; Dt 32.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'car c''est le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' …'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 3+.'
    marker-yv: yv-n
  - type: text
    text: 'Un seul d''entre vous en poursuivait mille, car c''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, qui combattait pour vous, comme il vous l''avait dit. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: 'Prenez donc bien garde à vous-mêmes et aimez le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: détournez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 22.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si vous vous mêlez à elles
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: si vous venez en elles et elles en vous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car si vous vous détournez, si vous vous attachez à ces nations qui restent avec vous, si vous vous alliez à elles par des mariages et si vous vous mêlez à elles, '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'sachez bien que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, ne continuera pas à déposséder ces nations devant vous ; elles seront pour vous un filet et un piège, un fouet pour vos flancs et des épines dans vos yeux, jusqu''à ce que vous disparaissiez de cette bonne terre que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous a donnée.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: selon le sort commun à tous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dans la voie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: par le chemin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de toute la terre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 1R 2.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de tout votre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' et de toute votre âme '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. Gn 1.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') 22.5 ; Dt 4.29+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'aucune… n''est restée sans effet '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '21.45'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Je m''en vais aujourd''hui selon le sort commun à tous. Vous le savez, de tout votre cœur et de toute votre âme, aucune de toutes les bonnes paroles que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, a prononcées sur vous n''est restée sans effet ; toutes se sont réalisées sur vous : aucune n''est restée sans effet. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il vous ait fait disparaître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Comme toutes les bonnes paroles que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous avait dites se sont réalisées sur vous, de même le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' réalisera sur vous toutes les paroles mauvaises, jusqu''à ce qu''il vous ait détruits, qu''il vous ait fait disparaître de cette bonne terre que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, vous a donnée. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '23.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Si vous passez outre… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.11+. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: alliance
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Si vous passez outre à l''alliance que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu, a instituée pour vous, si vous allez servir d''autres dieux et vous prosterner devant eux, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se mettra en colère contre vous, et vous disparaîtrez bien vite du bon pays qu''il vous a donné.'
