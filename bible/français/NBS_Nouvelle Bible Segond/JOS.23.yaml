document_id: JOS.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le testament de Josué
  - type: text
    content: ' '
  - type: note
    content: 'accordé le repos  : cf. 22.4+. –  en le délivrant  : sous-entendu dans le texte. –  vieux… 13.1+.'
  - type: text
    content: 'Bien des jours s''étaient écoulés depuis que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait accordé le repos à Israël, en le délivrant de tous les ennemis qui l''entouraient. Josué était vieux, avancé en âge. '
  '10':
  - type: note
    content: 'Un seul d''entre vous…  : cf. Lv 26.8 ; Dt 32.30. –  car c''est le Seigneur …  : cf. v. 3+.'
  - type: text
    content: 'Un seul d''entre vous en poursuivait mille, car c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, qui combattait pour vous, comme il vous l''avait dit. '
  '11':
  - type: text
    content: 'Prenez donc bien garde à vous-mêmes et aimez le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. '
  '12':
  - type: note
    content: 'détournez  : cf. 22.16n. –  si vous vous mêlez à elles  : litt. si vous venez en elles et elles en vous  ; cf. v. 7n.'
  - type: text
    content: 'Car si vous vous détournez, si vous vous attachez à ces nations qui restent avec vous, si vous vous alliez à elles par des mariages et si vous vous mêlez à elles, '
  '13':
  - type: text
    content: 'sachez bien que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, ne continuera pas à déposséder ces nations devant vous ; elles seront pour vous un filet et un piège, un fouet pour vos flancs et des épines dans vos yeux, jusqu''à ce que vous disparaissiez de cette bonne terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous a donnée.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'selon le sort commun à tous  : litt. dans la voie (ou par le chemin ) de toute la terre  ; cf. 1R 2.2n. –  de tout votre cœur et de toute votre âme (cf. Gn 1.20n) 22.5 ; Dt 4.29+. –  aucune… n''est restée sans effet 21.45n.'
  - type: text
    content: 'Je m''en vais aujourd''hui selon le sort commun à tous. Vous le savez, de tout votre cœur et de toute votre âme, aucune de toutes les bonnes paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, a prononcées sur vous n''est restée sans effet ; toutes se sont réalisées sur vous : aucune n''est restée sans effet. '
  '15':
  - type: note
    content: 'qu''il vous ait fait disparaître  : sous-entendu dans le texte.'
  - type: text
    content: 'Comme toutes les bonnes paroles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous avait dites se sont réalisées sur vous, de même le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalisera sur vous toutes les paroles mauvaises, jusqu''à ce qu''il vous ait détruits, qu''il vous ait fait disparaître de cette bonne terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous a donnée. '
  '16':
  - type: note
    content: Si vous passez outre… 7.11+. – Voir alliance.
  - type: text
    content: 'Si vous passez outre à l''alliance que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, a instituée pour vous, si vous allez servir d''autres dieux et vous prosterner devant eux, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se mettra en colère contre vous, et vous disparaîtrez bien vite du bon pays qu''il vous a donné.'
  '2':
  - type: note
    content: Voir ancien. –  secrétaires ou greffiers  ; cf. 1.10+.
  - type: text
    content: 'Alors Josué convoqua tout Israël, ses anciens, ses chefs, ses juges et ses secrétaires. Il leur dit : Je suis vieux, avancé en âge. '
  '3':
  - type: note
    content: 'c''est le Seigneur …  : cf. v. 10 ; 10.14,42 ; Ex 14.14 ; Dt 1.30+ ; 3.22.'
  - type: text
    content: 'Vous, vous avez vu tout ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, a fait à toutes ces nations à cause de vous : c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, qui a combattu pour vous. '
  '4':
  - type: note
    content: 'Regardez ou voyez, même verbe hébreu au v. 3. –  je vous ai attribué…  : litt. j''ai fait tomber pour vous comme patrimoine  ; cf. 13.6. –  qui restent  : cf. v. 7,12. –  la grande mer 1.4n.'
  - type: text
    content: 'Regardez, je vous ai attribué par le sort comme patrimoine, tribu par tribu, ces nations qui restent, à partir du Jourdain, et toutes les nations que j''ai retranchées, jusqu''à la grande mer, vers le soleil couchant. '
  '5':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, les repoussera loin de vous et les dépossédera devant vous ; vous prendrez possession de leur pays, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous l''a dit. '
  '6':
  - type: note
    content: d'observer et de mettre en pratique Dt 28.13. –  le livre de la loi 8.31+. –  ni à droite ni à gauche 1.7n.
  - type: text
    content: 'Efforcez-vous vraiment d''observer et de mettre en pratique tout ce qui est écrit dans le livre de la loi de Moïse, sans vous en écarter ni à droite ni à gauche, '
  '7':
  - type: note
    content: 'Cf. Ex 23.13 ; Jr 5.7 ; So 1.5 ; Ps 16.4. –  vous mêler à  : litt. venir dans ou parmi. –  Vous n''évoquerez pas le nom de leurs dieux  : autre traduction vous ne rappellerez pas le souvenir… (Ex 23.13n).'
  - type: text
    content: 'sans vous mêler à ces nations qui restent avec vous. Vous n''évoquerez pas le nom de leurs dieux, vous ne prêterez pas serment par lui ; vous ne les servirez pas et vous ne vous prosternerez pas devant eux. '
  '8':
  - type: note
    content: 'vous vous attacherez  : cf. Dt 10.20+ ; 11.22.'
  - type: text
    content: 'C''est seulement au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, que vous vous attacherez, comme vous l''avez fait jusqu''à ce jour. '
  '9':
  - type: note
    content: jusqu'à ce jour 4.9n.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dépossédé devant vous des nations grandes et fortes ; personne n''a pu tenir contre vous jusqu''à ce jour. '
