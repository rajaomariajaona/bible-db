      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Ceux-ci répondirent : Ce monde rebelle et sans foi gît au pouvoir du Satan, qui ne permet pas que la vérité et la puissance de Dieu soient reçues par les esprits impurs ; révèle donc dès maintenant ta justice. Ils disaient cela au Christ. Le Christ leur répondit : Le terme des années de l''autorité du Satan est arrivé, mais d''autres épreuves approchent. Et moi, j''ai été livré à la mort pour ceux qui ont péché, afin qu''ils se convertissent à la vérité et ne pèchent plus, de sorte qu''ils héritent de la gloire spirituelle et impérissable de la justice, qui est au ciel.'
    marker-yv: yv-n
  - type: text
    text: 'Enfin, il se manifesta aux Onze, pendant qu''ils étaient à table, et il leur reprocha sévèrement leur manque de foi et leur obstination, parce qu''ils n''avaient pas cru ceux qui l''avaient vu après son réveil. '
  - type: usfm
