          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à Marie-Madeleine '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.40+ ; Lc 24.10 ; Jn 20.11-18. –  '
    - type: usfm
