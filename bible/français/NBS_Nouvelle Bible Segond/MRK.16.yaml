      children:
      - type: text
        text: 'La conclusion longue qui figure dans les éditions traditionnelles (v. 9-20) soulève plusieurs difficultés : 1) ce texte est absent des deux mss anciens considérés comme les meilleurs pour l''établissement du texte ('
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Vaticanus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Sinaïticus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; 2) il y a une rupture évidente entre 16.8 et 16.9 ; 3) le vocabulaire et le style de ces v. diffèrent sensiblement de ce qu''on lit ailleurs dans le deuxième évangile. Ce passage semble donc constituer une sorte d''appendice, ajouté sans doute pour compenser la fin abrupte du v. 8. (Le v. 8 constituait-il primitivement la fin de l''Evangile selon Marc ? Une autre conclusion aurait-elle été perdue très tôt ? La question reste débattue, bien que la majorité des commentateurs penchent aujourd''hui pour la première hypothèse.) Cependant la conclusion longue est connue et citée par des auteurs anciens comme Irénée de Lyon (vers 190) et Tatien, dans son '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Diatessarôn '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (ou harmonie évangélique), au II
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' s. apr. J.-C. Qui plus est, elle résume fidèlement les apparitions et les paroles du Ressuscité rapportées par les autres évangiles, en particulier dans Luc et les Actes. C''est pourquoi la grande Eglise l''a reconnue comme canonique, c.-à-d. comme faisant partie intégrante du N.T. Quelques mss tardifs lui substituent ou lui ajoutent la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'conclusion courte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'traduite après le v. 20. –  '
    - type: usfm
      marker: fq
      children:
