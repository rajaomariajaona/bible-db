        text: v. 17 ; Lc 8.2.
    marker-yv: yv-n
  - type: text
    text: '[Après s''être relevé, au matin du premier jour de la semaine, il apparut d''abord à Marie-Madeleine, de laquelle il avait chassé sept démons. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Elle alla porter la nouvelle à ceux qui avaient été avec lui, alors qu''ils étaient en deuil et qu''ils pleuraient. '
  - type: usfm
    marker: v
    metadata:
