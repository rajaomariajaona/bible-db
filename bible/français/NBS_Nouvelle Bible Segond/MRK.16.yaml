        text: 's''être relevé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: être ressuscité
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'premier jour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2
      - type: usfm
        marker: ord
        children:
