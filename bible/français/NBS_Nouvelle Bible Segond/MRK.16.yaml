        text: (entre 8 h et 9 h du matin environ)
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', il y eut des ténèbres sur toute la terre, et des anges descendirent des cieux (tandis qu''il se levait ?) à la clarté du Dieu vivant ; ils remontèrent avec lui, et il y eut de la lumière. Alors elles arrivèrent au tombeau.'
    marker-yv: yv-n
  - type: text
    text: 'Elles disaient entre elles : Qui roulera pour nous la pierre de l''entrée du tombeau ? '
  - type: usfm
