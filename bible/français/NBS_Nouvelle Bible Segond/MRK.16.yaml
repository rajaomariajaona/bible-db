document_id: MRK.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La résurrection de Jésus
  - type: heading
    content: Mt 28.1-8  ; Lc 24.1-11  ; Jn 20.1-2
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque le sabbat…  : c.-à-d. le samedi soir, après le coucher du soleil. –  Marie, mère de Jacques  : litt. Marie, celle de Jacques , cf. 15.40+. –  l''embaumer  : cf. 14.8 ; Jn 19.40.'
  - type: text
    content: 'Lorsque le sabbat fut passé, Marie-Madeleine, Marie, mère de Jacques, et Salomé achetèrent des aromates, pour venir l''embaumer. '
  '10':
  - type: text
    content: 'Elle alla porter la nouvelle à ceux qui avaient été avec lui, alors qu''ils étaient en deuil et qu''ils pleuraient. '
  '11':
  - type: note
    content: 'Lc 24.11,22-24. –  ils ne le crurent pas  : autres traductions ils ne la crurent pas, ils ne crurent pas.'
  - type: text
    content: Quand ils entendirent qu'il était vivant et qu'elle l'avait vu, ils ne le crurent pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Lc 24.13-35. –  une autre apparence ou une autre forme , cf. 9.2n.
  - type: text
    content: 'Après cela, il se manifesta, sous une autre apparence, à deux d''entre eux qui allaient à la campagne. '
  '13':
  - type: text
    content: Ils revinrent eux aussi l'annoncer aux autres, qui ne les crurent pas non plus.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Mt 28.16 ; Lc 24.25,36-43 ; Jn 20.19-23,26-29. –  reprocha sévèrement  : cf. Mt 11.20n. –  obstination 10.5n. –  son réveil ou son relèvement (1.31n), sa résurrection . – A la fin du v. un ms intercale le dialogue suivant  : Ceux-ci répondirent : Ce monde rebelle et sans foi gît au pouvoir du Satan, qui ne permet pas que la vérité et la puissance de Dieu soient reçues par les esprits impurs ; révèle donc dès maintenant ta justice. Ils disaient cela au Christ. Le Christ leur répondit : Le terme des années de l''autorité du Satan est arrivé, mais d''autres épreuves approchent. Et moi, j''ai été livré à la mort pour ceux qui ont péché, afin qu''ils se convertissent à la vérité et ne pèchent plus, de sorte qu''ils héritent de la gloire spirituelle et impérissable de la justice, qui est au ciel.'
  - type: text
    content: 'Enfin, il se manifesta aux Onze, pendant qu''ils étaient à table, et il leur reprocha sévèrement leur manque de foi et leur obstination, parce qu''ils n''avaient pas cru ceux qui l''avaient vu après son réveil. '
  '15':
  - type: note
    content: 13.10+ ; cf. Mt 28.18ss. –  proclamez v. 20 ; 1.4n.
  - type: text
    content: 'Puis il leur dit : Allez dans le monde entier et proclamez la bonne nouvelle à toute la création. '
  '16':
  - type: note
    content: 'Cf. Jn 3.16,18,36 ; Ac 2.38 ; 16.31ss. –  deviendra croyant  : autres traductions croira, aura foi  ; de même v. 17. –  recevra le baptême  : cf. 10.38n.'
  - type: text
    content: 'Celui qui deviendra croyant et recevra le baptême sera sauvé, mais celui qui ne croira pas sera condamné. '
  '17':
  - type: note
    content: 'Voir nom. –  chasseront les démons ou des démons  : cf. v. 9 ; 6.7,13 ; Mt 10.8 ; Lc 10.17 ; Ac 8.7 ; 16.18. –  des langues nouvelles  : cf. Ac 2.4,11 ; 10.46 ; 19.6 ; 1Co 14.2ss.'
  - type: text
    content: 'Voici les signes qui accompagneront ceux qui deviendront croyants : par mon nom, ils chasseront les démons ; ils parleront des langues nouvelles ; '
  '18':
  - type: note
    content: 'des serpents  : cf. Lc 10.19 ; Ac 28.3ss. –  poseront les mains 5.23+. –  malades 6.5+. –  guéris  : cf. Ac 4.30 ; 5.16 ; Jc 5.14ss.'
  - type: text
    content: ils saisiront des serpents ; s'ils boivent un breuvage mortel, quel qu'il soit, il ne leur fera aucun mal ; ils poseront les mains sur les malades et ceux-ci seront guéris.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'enlevé au ciel  : cf. 2R 2.11 ; Lc 24.50s ; Ac 1.9-11 ; 1Tm 3.16. –  à la droite de Dieu 12.36/ / ; 14.62 ; Ps 110.1.'
  - type: text
    content: 'Le Seigneur Jésus, après leur avoir parlé, fut enlevé au ciel et il s''assit à la droite de Dieu. '
  '2':
  - type: note
    content: 'Le premier jour  : litt. le (jour) un (cf. Gn 1.5n), c.-à-d. le dimanche matin ; même expression Ps 24.1n (LXX) ; cf. Ac 20.7 ; 1Co 16.2. Dans le paganisme gréco-romain le jour du sabbat juif (samedi, jour de Saturne, cf. l''anglais Saturday) était tenu pour un jour « néfaste », alors que le jour suivant, dimanche, était considéré comme « faste ».'
  - type: text
    content: 'Le premier jour de la semaine, elles viennent au tombeau de bon matin, au lever du soleil. '
  '20':
  - type: note
    content: 'Cf. Ac 8.6 ; 14.3 ; Hé 2.4. –  s''en allèrent  : litt. sortirent. –  proclamer… le message 1.38n. –  de dire  : sous-entendu dans le texte. Sur l''ensemble de la « conclusion courte », voir v. 9n.'
  - type: text
    content: Et ils s'en allèrent proclamer partout le message. Le Seigneur œuvrait avec eux et confirmait la Parole par les signes qui l'accompagnaient.]
  - type: heading
    content: '* * *'
  - type: heading
    content: Conclusion courte
  - type: text
    content: '[Mais elles annoncèrent brièvement aux compagnons de Pierre tout ce qu''on leur avait enjoint de dire. Après cela Jésus lui-même les envoya porter de l''Orient à l''Occident la proclamation sacrée et impérissable du salut éternel. '
  - type: text
    content: Amen
  - type: text
    content: .]
  '3':
  - type: note
    content: 'l''entrée  : cf. 15.46n  ; Jn 11.38s. – Un ms latin du IVe ou du Ve s. ajoute  : Soudain, à la troisième heure (entre 8 h et 9 h du matin environ), il y eut des ténèbres sur toute la terre, et des anges descendirent des cieux (tandis qu''il se levait ?) à la clarté du Dieu vivant ; ils remontèrent avec lui, et il y eut de la lumière. Alors elles arrivèrent au tombeau.'
  - type: text
    content: 'Elles disaient entre elles : Qui roulera pour nous la pierre de l''entrée du tombeau ? '
  '4':
  - type: text
    content: Levant les yeux, elles voient que la pierre, qui était très grande, a été roulée.
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.3 ; 14.51s ; Ac 1.10 ; Ap 7.9,13.
  - type: text
    content: 'En entrant dans le tombeau, elles virent un jeune homme assis à droite, vêtu d''une robe blanche ; elles furent effrayées. '
  '6':
  - type: note
    content: 'Ne vous effrayez pas  : cf. 6.50+ ; 9.15n  ; voir aussi crainte. –  le Nazaréen 1.24n. –  il s''est réveillé ou il s''est relevé, c.-à-d. il est ressuscité  ; cf. 1.31n  ; Ac 2.23s ; 3.15 ; 4.10 ; 5.30 ; 10.40 ; 13.28-30.'
  - type: text
    content: 'Il leur dit : Ne vous effrayez pas ; vous cherchez Jésus le Nazaréen, le crucifié ; il s''est réveillé, il n''est pas ici ; voici le lieu où on l''avait mis. '
  '7':
  - type: note
    content: Cf. 14.28+ ; Lc 24.34 ; 1Co 15.5.
  - type: text
    content: 'Mais allez dire à ses disciples et à Pierre qu''il vous précède en Galilée : c''est là que vous le verrez, comme il vous l''a dit.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'stupéfaites  : cf. 2.12n. –  ne dirent rien  : cf. 1.25+.'
  - type: text
    content: Elles sortirent du tombeau et s'enfuirent tremblantes et stupéfaites. Et elles ne dirent rien à personne, car elles avaient peur.
  - type: heading
    content: '* * *'
  - type: heading
    content: Conclusion longue
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'La conclusion longue qui figure dans les éditions traditionnelles (v. 9-20) soulève plusieurs difficultés : 1) ce texte est absent des deux mss anciens considérés comme les meilleurs pour l''établissement du texte ( Vaticanus et Sinaïticus ) ; 2) il y a une rupture évidente entre 16.8 et 16.9 ; 3) le vocabulaire et le style de ces v. diffèrent sensiblement de ce qu''on lit ailleurs dans le deuxième évangile. Ce passage semble donc constituer une sorte d''appendice, ajouté sans doute pour compenser la fin abrupte du v. 8. (Le v. 8 constituait-il primitivement la fin de l''Evangile selon Marc ? Une autre conclusion aurait-elle été perdue très tôt ? La question reste débattue, bien que la majorité des commentateurs penchent aujourd''hui pour la première hypothèse.) Cependant la conclusion longue est connue et citée par des auteurs anciens comme Irénée de Lyon (vers 190) et Tatien, dans son Diatessarôn (ou harmonie évangélique), au IIe s. apr. J.-C. Qui plus est, elle résume fidèlement les apparitions et les paroles du Ressuscité rapportées par les autres évangiles, en particulier dans Luc et les Actes. C''est pourquoi la grande Eglise l''a reconnue comme canonique, c.-à-d. comme faisant partie intégrante du N.T. Quelques mss tardifs lui substituent ou lui ajoutent la conclusion courte traduite après le v. 20. –  s''être relevé ou être ressuscité . –  premier jour v. 2n. –  à Marie-Madeleine 15.40+ ; Lc 24.10 ; Jn 20.11-18. –  sept démons v. 17 ; Lc 8.2.'
  - type: text
    content: '[Après s''être relevé, au matin du premier jour de la semaine, il apparut d''abord à Marie-Madeleine, de laquelle il avait chassé sept démons. '
