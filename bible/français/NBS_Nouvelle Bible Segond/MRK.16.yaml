      - type: text
        text: ils ne le crurent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils ne la crurent pas, ils ne crurent pas.
    marker-yv: yv-n
  - type: text
    text: Quand ils entendirent qu'il était vivant et qu'elle l'avait vu, ils ne le crurent pas.
