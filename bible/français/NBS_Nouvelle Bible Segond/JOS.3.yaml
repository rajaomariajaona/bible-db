document_id: JOS.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La traversée du Jourdain
  - type: text
    content: ' '
  - type: note
    content: 'Shittim 2.1n. –  la traversée  : litt. de le passer.'
  - type: text
    content: 'Josué se leva de bon matin. Partis de Shittim, ils arrivèrent au Jourdain, lui et tous les Israélites, et ils passèrent la nuit là avant la traversée. '
  '10':
  - type: note
    content: 'Dieu (hébreu ’El, Gn 21.33n  ; voir aussi noms divins) vivant Os 2.1 ; Ps 42.3 ; 84.3. –  les Cananéens…  : cette liste de peuples revient plusieurs fois dans le Pentateuque (voir notamment Ex 3.8,17). Certains d''entre eux désignent parfois d''une manière générale l''ensemble des populations de la région : ainsi les Cananéens, les Hittites (1.4n), les Amorites. Les Jébusites sont les habitants de Jébus (l''un des noms donnés à Jérusalem avant sa conquête par David, voir Jg 19.10). Plusieurs identifications ont été proposées pour les Guirgashites  ; on y a notamment vu un des « peuples de la Mer » apparentés aux Philistins ; les Perizzites sont par ailleurs inconnus, mais il n''est pas impossible que ce nom soit une variante phonétique de Philistins.'
  - type: text
    content: 'Josué dit : A ceci vous saurez que le Dieu vivant est parmi vous et qu''il dépossédera bien devant vous les Cananéens, les Hittites, les Hivvites, les Perizzites, les Guirgashites, les Amorites et les Jébusites. '
  '11':
  - type: note
    content: Le coffre de l'alliance du Seigneur (hébreu ’adôn) ; certains proposent de lire le coffre de YHWH (= le Seigneur), d'après Syr.
  - type: text
    content: 'Le coffre de l''alliance du Seigneur de toute la terre passe le Jourdain devant vous. '
  '12':
  - type: note
    content: prenez douze hommes 4.2.
  - type: text
    content: 'Maintenant, prenez douze hommes parmi les tribus d''Israël, un homme par tribu. '
  '13':
  - type: note
    content: 'Seigneur (YHWH)  : voir noms divins. –  les eaux du Jourdain…  : cf. Ex 14.21-29 ; Ps 114.3. –  en amont  : litt. qui descendent d''en haut  ; de même au v. 16. –  en une seule masse  : cf. Ex 15.8.'
  - type: text
    content: 'Dès que les prêtres qui portent le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Seigneur de toute la terre, poseront les pieds dans les eaux du Jourdain, les eaux du Jourdain seront coupées en amont, et elles s''arrêteront en une seule masse.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: Cf. Ac 7.45.
  - type: text
    content: 'Lorsque le peuple partit de ses tentes pour passer le Jourdain, les prêtres qui portaient le coffre de l''alliance allèrent devant le peuple. '
  '15':
  - type: note
    content: 'le Jourdain déborde…  : cf. 4.18 ; 1Ch 12.16 ; Siracide 24.26 : « (La Loi) qui inonde d''intelligence comme l''Euphrate et comme le Jourdain aux jours de la moisson. » –  le temps de la moisson  : au premier mois de l''année, d''après 4.19, c.-à-d. en mars-avril.'
  - type: text
    content: 'Dès que ceux qui portaient le Coffre arrivèrent au Jourdain et que les prêtres qui portaient le Coffre plongèrent les pieds dans l''eau, au bord – le Jourdain déborde sur toutes ses rives tout le temps de la moisson – '
  '16':
  - type: note
    content: 'à Adam  : autre lecture traditionnelle d''Adam  ; ce nom de lieu pourrait correspondre à la ville actuelle de Damiyeh, au confluent du Yabboq et du Jourdain (voir ci-dessus « Un “miracle” naturel ? »). –  la mer de la plaine aride, la mer du Sel, c.-à-d. la mer Morte, cf. 12.3 ; 15.2,5 ; 18.19 ; Dt 3.17.'
  - type: text
    content: 'les eaux d''amont s''arrêtèrent et s''élevèrent en une seule masse à une très grande distance, à Adam, la ville qui est à côté de Tsartân, et celles qui descendent vers la mer de la plaine aride, la mer du Sel, furent complètement coupées. Le peuple traversa en face de Jéricho. '
  '17':
  - type: text
    content: 'Les prêtres qui portaient le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se tinrent immobiles sur la terre ferme, au milieu du Jourdain – tout Israël passait sur la terre ferme – jusqu''à ce que toute la nation eût achevé de passer le Jourdain.'
  '2':
  - type: note
    content: 'Au bout de trois jours  : cf. 1.11. –  les secrétaires 1.10+.'
  - type: text
    content: 'Au bout de trois jours, les secrétaires parcoururent le camp '
  '3':
  - type: note
    content: les prêtres-lévites 8.33 ; l'expression revient souvent dans le Deutéronome (17.9,18 ; 18.1 ; 24.8 ; 27.9).
  - type: text
    content: 'et donnèrent cet ordre au peuple : Lorsque vous verrez le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, porté par les prêtres-lévites, vous partirez du lieu où vous êtes et vous le suivrez. '
  '4':
  - type: note
    content: 'deux mille coudées  : environ 900 m ; cf. Nb 1.51 ; 3.10 ; 4.15,17-20 ; 1S 6.6 ; 2S 6.6s ; voir mesures. –  n''en approchez pas  : cf. Ex 19.12 ; 1S 6.19s ; 2S 6.6s. –  auparavant  : litt. ni hier ni avant-hier.'
  - type: text
    content: 'Mais il y aura entre vous et lui une distance d''environ deux mille coudées : n''en approchez pas. Ainsi vous saurez par quel chemin vous devez aller, car vous n''êtes jamais passés par ce chemin auparavant. '
  '5':
  - type: note
    content: Consacrez-vous 7.13 ; cf. Ex 19.10,15 ; voir saint.
  - type: text
    content: 'Josué dit au peuple : Consacrez-vous, car demain le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fera des choses étonnantes parmi vous. '
  '6':
  - type: note
    content: 'Portez le coffre de l''alliance  : cf. 4.9ss ; 6.6ss ; 8.33 ; Dt 10.8 ; 31.9 ; 1S 4.4 ; 2S 6 ; 15.24ss ; 1R 2.26 ; 8.3 ; 1Ch 15.2ss ; 2Ch 5.4ss.'
  - type: text
    content: 'Josué dit aux prêtres : Portez le coffre de l''alliance et passez devant le peuple. Ils portèrent le coffre de l''alliance et marchèrent devant le peuple.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: je serai avec toi 1.5+.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : Aujourd''hui, je commence à te rendre grand aux yeux de tout Israël, afin qu''ils sachent que je serai avec toi comme j''ai été avec Moïse. '
  '8':
  - type: text
    content: 'Toi, donne cet ordre aux prêtres qui portent le coffre de l''alliance : Quand vous arriverez au bord des eaux du Jourdain, vous vous tiendrez dans le Jourdain. '
  '9':
  - type: text
    content: 'Puis Josué dit aux Israélites : Approchez ici et écoutez les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu. '
