    marker-yv: yv-n
  - type: text
    text: 'Josué se leva de bon matin. Partis de Shittim, ils arrivèrent au Jourdain, lui et tous les Israélites, et ils passèrent la nuit là avant la traversée. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Au bout de trois jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les secrétaires '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.10+.
    marker-yv: yv-n
  - type: text
    text: 'Au bout de trois jours, les secrétaires parcoururent le camp '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'les '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
      - type: text
        text: '-'
      - type: usfm
        marker: w
        children:
        - type: text
          text: lévites
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.33 ; l'expression revient souvent dans le Deutéronome (17.9,18 ; 18.1 ; 24.8 ; 27.9).
    marker-yv: yv-n
  - type: text
    text: 'et donnèrent cet ordre au peuple : Lorsque vous verrez le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu, porté par les prêtres-lévites, vous partirez du lieu où vous êtes et vous le suivrez. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: deux mille coudées
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : environ 900 m ; cf. Nb 1.51 ; 3.10 ; 4.15,17-20 ; 1S 6.6 ; 2S 6.6s ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: mesures
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: n'en approchez pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 19.12 ; 1S 6.19s ; 2S 6.6s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: auparavant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ni hier ni avant-hier.
    marker-yv: yv-n
  - type: text
    text: 'Mais il y aura entre vous et lui une distance d''environ deux mille coudées : n''en approchez pas. Ainsi vous saurez par quel chemin vous devez aller, car vous n''êtes jamais passés par ce chemin auparavant. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Consacrez-vous '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.13 ; cf. Ex 19.10,15 ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: saint
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Josué dit au peuple : Consacrez-vous, car demain le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fera des choses étonnantes parmi vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Portez le coffre de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'alliance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.9ss ; 6.6ss ; 8.33 ; Dt 10.8 ; 31.9 ; 1S 4.4 ; 2S 6 ; 15.24ss ; 1R 2.26 ; 8.3 ; 1Ch 15.2ss ; 2Ch 5.4ss.'
    marker-yv: yv-n
  - type: text
    text: 'Josué dit aux prêtres : Portez le coffre de l''alliance et passez devant le peuple. Ils portèrent le coffre de l''alliance et marchèrent devant le peuple.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je serai avec toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1.5+.
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Josué : Aujourd''hui, je commence à te rendre grand aux yeux de tout Israël, afin qu''ils sachent que je serai avec toi comme j''ai été avec Moïse. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Toi, donne cet ordre aux prêtres qui portent le coffre de l''alliance : Quand vous arriverez au bord des eaux du Jourdain, vous vous tiendrez dans le Jourdain. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: text
    text: 'Puis Josué dit aux Israélites : Approchez ici et écoutez les paroles du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', votre Dieu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ’El
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', Gn 21.33'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vivant '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Os 2.1 ; Ps 42.3 ; 84.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Cananéens…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette liste de peuples revient plusieurs fois dans le Pentateuque (voir notamment Ex 3.8,17). Certains d''entre eux désignent parfois d''une manière générale l''ensemble des populations de la région : ainsi les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Cananéens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Hittites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Amorites. '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Jébusites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont les habitants de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Jébus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(l''un des noms donnés à Jérusalem avant sa conquête par David, voir Jg 19.10). Plusieurs identifications ont été proposées pour les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Guirgashites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; on y a notamment vu un des « peuples de la Mer » apparentés aux Philistins ; les '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Perizzites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'sont par ailleurs inconnus, mais il n''est pas impossible que ce nom soit une variante phonétique de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Philistins.
    marker-yv: yv-n
  - type: text
    text: 'Josué dit : A ceci vous saurez que le Dieu vivant est parmi vous et qu''il dépossédera bien devant vous les Cananéens, les Hittites, les Hivvites, les Perizzites, les Guirgashites, les Amorites et les Jébusites. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le coffre de l''alliance du Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ’adôn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') ; certains proposent de lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le coffre de YHWH '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(= '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), d''après '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le coffre de l''alliance du Seigneur de toute la terre passe le Jourdain devant vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'prenez douze hommes '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.2.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant, prenez douze hommes parmi les tribus d''Israël, un homme par tribu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.13 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (YHWH)'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les eaux du Jourdain…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 14.21-29 ; Ps 114.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en amont
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qui descendent d'en haut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; de même au v. 16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en une seule masse
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 15.8.'
    marker-yv: yv-n
  - type: text
    text: 'Dès que les prêtres qui portent le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), le Seigneur de toute la terre, poseront les pieds dans les eaux du Jourdain, les eaux du Jourdain seront coupées en amont, et elles s''arrêteront en une seule masse.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 7.45.
    marker-yv: yv-n
  - type: text
    text: 'Lorsque le peuple partit de ses tentes pour passer le Jourdain, les prêtres qui portaient le coffre de l''alliance allèrent devant le peuple. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Jourdain déborde…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.18 ; 1Ch 12.16 ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.26 : « (La Loi) qui inonde d''intelligence comme l''Euphrate et comme le Jourdain aux jours de la moisson. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le temps de la moisson
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : au premier mois de l''année, d''après 4.19, c.-à-d. en mars-avril.'
    marker-yv: yv-n
  - type: text
    text: 'Dès que ceux qui portaient le Coffre arrivèrent au Jourdain et que les prêtres qui portaient le Coffre plongèrent les pieds dans l''eau, au bord – le Jourdain déborde sur toutes ses rives tout le temps de la moisson – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Adam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre lecture traditionnelle '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'Adam
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ce nom de lieu pourrait correspondre à la ville actuelle de Damiyeh, au confluent du Yabboq et du Jourdain (voir ci-dessus « Un “miracle” naturel ? »). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la mer de la plaine aride, la mer du Sel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. la mer Morte, cf. 12.3 ; 15.2,5 ; 18.19 ; Dt 3.17.'
    marker-yv: yv-n
  - type: text
    text: 'les eaux d''amont s''arrêtèrent et s''élevèrent en une seule masse à une très grande distance, à Adam, la ville qui est à côté de Tsartân, et celles qui descendent vers la mer de la plaine aride, la mer du Sel, furent complètement coupées. Le peuple traversa en face de Jéricho. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: text
    text: 'Les prêtres qui portaient le coffre de l''alliance du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se tinrent immobiles sur la terre ferme, au milieu du Jourdain – tout Israël passait sur la terre ferme – jusqu''à ce que toute la nation eût achevé de passer le Jourdain.'
