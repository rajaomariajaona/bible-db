document_id: PSA.23,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le Seigneur est mon berger
  - type: text
    content: ' '
  - type: note
    content: mon berger 28.9 ; 74.1 ; 80.2 ; 95.7 ; 100.3 ; Es 40.11 ; 49.9s ; Jr 23.4 ; Ez 34.11-16,23 ; Lc 15.3-7 ; Jn 10.11-16 ; Hé 13.20 ; 1P 2.25.
  - type: text
    content: Psaume. De David.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est mon berger : je ne manquerai de rien.'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'verts pâturages Ez 34.14. –  il me dirige 73.24 ; Pr 4.11. –  eaux paisibles  : litt. eaux de repos  ; cf. Dt 12.9 ; Ap 7.17.'
  - type: text
    content: Il me fait coucher dans de verts pâturages,
  - type: text
    content: il me dirige vers des eaux paisibles.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Il restaure ma vie  : cf. 19.8. –  sur les sentiers de la justice  : on peut comprendre sur de bons chemins. –  à cause de son nom 25.11 ; 31.4 ; 79.9 ; 106.8 ; 109.21 ; 143.11 ; Jr 14.7 ; Ez 20.9.'
  - type: text
    content: Il restaure ma vie,
  - type: text
    content: il me conduit sur les sentiers de la justice,
  - type: text
    content: à cause de son nom.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 138.7. –  ombre de mort  : autre traduction obscurité profonde  ; cf. 44.20 ; 107.10,14 ; Jb 3.5n. –  mon réconfort ou ma consolation  ; cf. Es 40.1.'
  - type: text
    content: Même si je marche dans la vallée de l'ombre de mort,
  - type: text
    content: 'je ne crains aucun mal, car tu es avec moi :'
  - type: text
    content: ta houlette et ton bâton, voilà mon réconfort.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'une table  : de l''image du berger on passe à celle du festin ; cf. 78.19. –  tu enduis ma tête d''huile  : autre traduction tu me parfumes  ; cf. 92.11 ; 104.15 ; 133.2 ; Ec 9.8 ; Lc 7.46.'
  - type: text
    content: Tu dresses devant moi une table,
  - type: text
    content: en face de mes adversaires ;
  - type: text
    content: tu enduis ma tête d'huile,
  - type: text
    content: ma coupe déborde.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'le bonheur ou le bien . –  m''accompagneront  : litt. me poursuivront. –  je reviendrai à  : plusieurs versions anciennes ont lu j''habiterai dans , ce qui correspond à une autre vocalisation possible du texte hébreu ; cf. 27.4+ ; Dt 30.20. –  pour la longueur des jours  : cf. 21.5+ ; 93.5.'
  - type: text
    content: Oui, le bonheur et la fidélité m'accompagneront
  - type: text
    content: tous les jours de ma vie,
  - type: text
    content: 'et je reviendrai à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: pour la longueur des jours.
