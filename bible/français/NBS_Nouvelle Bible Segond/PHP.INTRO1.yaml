  '1':
  - type: text
    content: INTRODUCTION
  - type: text
    content: 'Les ruines de Philippes (l''ancienne Crénides), telles qu''on peut les voir aujourd''hui, donnent une faible idée de l''importance qu''avait cette ville dans l''Antiquité. En 358 av. J.-C., Philippe II de Macédoine en avait fait sa capitale. Les ressources minières alentour étaient considérables (mines d''or et d''argent), la situation géographique excellente (point de passage obligé sur la '
  - type: text
    content: via Egnatia
  - type: text
    content: ' reliant Rome à Byzance). Quelques pages mémorables de l''histoire romaine se sont écrites à Philippes : la victoire de Marc Antoine et d''Octave sur Brutus et Cassius (42 av. J.-C.) et le succès d''Octave à Actium, tout près de là (31 av. J.-C.). La ville jouissait d''un statut privilégié : ses habitants étaient '
  - type: text
    content: citoyens romains
  - type: text
    content: . Le droit romain (
  - type: text
    content: jus italicum
  - type: text
    content: ') y était sans doute appliqué en signe de reconnaissance pour les nombreux vétérans militaires qui y avaient établi résidence. Même l''architecture lui donnait des airs de grandeur : plusieurs monuments étaient des répliques de ceux de Rome.'
  - type: text
    content: 'Selon le récit des Actes, c''est une vision nocturne qui conduit Paul à Philippes, celle d''un Macédonien suppliant qui l''appelle au secours (Ac 16.9). Les plans de l''apôtre étaient pourtant différents. Il avait voulu évangéliser la région d''Ephèse, mais l''Esprit avait fermé la porte. Il serpenta alors vers l''est de la Turquie d''Asie, puis vers le nord, enfin vers la côte égéenne, avant de remonter vers la région de Byzance (Ac 16.7-10). Mais là encore, la boussole de l''Esprit indiqua un autre cap : la Macédoine, de l''autre côté des Dardanelles. Quand, au cours de son deuxième voyage missionnaire, en 49/50, l''apôtre débarque donc au port de Néapolis, à 12 km de Philippes, il foule pour la première fois le sol de l''Europe, accompagné de trois collaborateurs : Timothée, Silas et peut-être Luc (c''est à partir de Philippes que le livre des Actes est rédigé en partie à la première personne du pluriel ; cf. Ac 16.10'
  - type: text
    content: n
  - type: text
    content: ).
  - type: text
    content: Une Eglise à part dans le cœur de l'apôtre
  - type: text
    content: 'Visitée la première en Europe d''après la chronologie des Actes, la ville de Philippes connaîtra probablement deux autres passages de Paul au cours de son troisième voyage (cf. Ac 20.1-6). Ce lieu est associé à des '
  - type: text
    content: expériences
  - type: text
    content: ' fortes et marquantes : la conversion de Lydie, commerçante de Thyatire rencontrée en un lieu de prière à l''extérieur de la ville (Ac 16.13-15) ; l''exorcisme de la jeune servante habitée par un esprit de Python (Ac 16.16-18) ; la première arrestation accompagnée de rudes sévices ; la libération miraculeuse (Ac 16.19-34) ; la première comparution devant les autorités romaines (Ac 16.35-40).'
  - type: text
    content: 'L''Eglise de Philippes est surtout la seule communauté de laquelle Paul ait accepté un '
  - type: text
    content: soutien matériel.
  - type: text
    content: ' On sait que l''apôtre mettait son point d''honneur à ne pas dépendre des Eglises (cf. 1Co 4.12 ; 9.15 ; 1Th 2.9 ; 2Th 3.7ss). L''aide des Philippiens (2Co 11.7-9) lui permettra de supporter sa condition de prisonnier (à l''époque, ce sont surtout la famille ou les amis qui doivent assurer la subsistance des détenus). La communauté de Philippes a même détaché Epaphrodite au service du prisonnier. Du coup, cette épître est, avec le billet à Philémon, la plus cordiale et la plus familière de toutes. Paul « chérit » tous les Philippiens avec la tendresse du Christ (1.9). Il évoque son avenir incertain et espère revenir bientôt à Philippes (1.22-26). Il n''hésite pas à donner des nouvelles personnelles (2.19-29). Il se répand en remerciements (4.10-20).'
  - type: text
    content: Une lettre aux circonstancesimprécises
  - type: text
    content: 'Paul, certes, est en prison, mais quel est le '
  - type: text
    content: lieu
  - type: text
    content: ' de sa détention ? On pense aussitôt à sa captivité à Rome, entre 60 et 62. Mais d''autres propositions ont été avancées : Césarée ou Ephèse. L''apôtre mentionne de fréquents échanges entre lui et les Philippiens (2.19,25). Même si les communications étaient assez bien organisées dans l''Empire romain, un aller et retour Rome-Philippes durait 80 jours. La durée du trajet était à peine plus courte entre Césarée et Philippes. Une origine éphésienne de la lettre serait donc plus probable (il fallait seulement vingt jours pour faire le voyage dans les deux sens), d''autant que la tonalité générale de Philippiens rappelle les lettres aux Corinthiens, écrites de cette même ville.'
  - type: text
    content: 'Les fréquents échanges mentionnés ci-dessus ont aussi fait penser que notre épître pourrait regrouper '
  - type: text
    content: plusieurs correspondances
  - type: text
    content: '. La rupture bien nette entre 3.2 et ce qui précède donne l''idée d''un écrit de remerciement (1.1–3.1 ; 4.10-23), entrecoupé par la lettre d''avertissement contre les '
  - type: text
    content: chiens
  - type: text
    content: ' (3.2–4.9). Cependant ces théories, qui n''emportent pas l''adhésion du plus grand nombre des commentateurs, ne changent guère la lecture de l''épître. Par ailleurs, on s''explique mal l''intention du rédacteur final qui aurait aussi maladroitement recomposé le texte. Enfin, l''analyse rhétorique semble plutôt confirmer aujourd''hui l''unité fondamentale de l''écrit.'
  - type: text
    content: Une lettre « à cœur ouvert » pour ceux que Paul chérit
  - type: text
    content: Plusieurs raisons conduisent Paul à écrire aux Philippiens. Il leur renvoie
  - type: text
    content: Epaphrodite,
  - type: text
    content: ' qu''ils avaient détaché à son service, et lui confie sa lettre, dans laquelle il exprime sa gratitude pour leur générosité.'
  - type: text
    content: 'C''est aussi l''occasion pour l''apôtre de '
  - type: text
    content: rassurer
  - type: text
    content: ' ceux qui, à Philippes, s''inquiétaient de son sort. La nouvelle de son emprisonnement était parvenue en Macédoine. Contrairement à ce qu''ils auraient pu craindre, le moral de Paul n''est pas au plus bas. Tout contribue à la proclamation de la bonne nouvelle (1.13s). Même si l''issue juridique est incertaine, l''acquittement est assuré devant le tribunal céleste (1.18ss).'
  - type: text
    content: 'C''est enfin l''occasion pour Paul de '
  - type: text
    content: mettre en garde
  - type: text
    content: ' contre ceux qui menacent l''Eglise. Paul a sans doute des noms en tête. Mais de qui s''agit-il exactement ? Il n''est pas aisé de répondre précisément à cette question. On a suggéré plusieurs solutions. Les '
  - type: text
    content: chiens
  - type: text
    content: ' pourraient être des missionnaires judaïsants venus de Thessalonique pour prêcher la circoncision, la prépondérance de la loi et la nécessité, pour les chrétiens, de demeurer dans le cadre du judaïsme. D''autres ont cru repérer deux tendances différentes chez les opposants : la première serait judéo-chrétienne (3.2-6), la deuxième gnostique ou prégnostique (3.18s ; voir « La question gnostique », p. XXX). D''autres même ont pensé que la démarche de Paul relevait seulement de l''admonition : prévenir les Philippiens contre les tendances constatées dans le judaïsme d''alors.'
  - type: text
    content: 'L''épître elle-même met en évidence les caractéristiques suivantes : les opposants se glorifient de la '
  - type: text
    content: circoncision
  - type: text
    content: ', alors que pour Paul, qui manie l''ironie, elle n''est qu''une '
  - type: text
    content: mutilation
  - type: text
    content: ' (3.2). Ils mettent leur '
  - type: text
    content: confiance
  - type: text
    content: ' dans la '
  - type: text
    content: chair*
  - type: text
    content: ', alors que Paul met sa '
  - type: text
    content: fierté
  - type: text
    content: ' en '
  - type: text
    content: Jésus-Christ
  - type: text
    content: ' et rend à Dieu un '
  - type: text
    content: culte
  - type: text
    content: ' par '
  - type: text
    content: l'Esprit*
  - type: text
    content: ' (3.3). Ils cherchent à établir leur '
  - type: text
    content: justice
  - type: text
    content: ' devant Dieu par la '
  - type: text
    content: loi
  - type: text
    content: ', alors que Paul a obtenu une '
  - type: text
    content: justice provenant de Dieu et fondée sur la foi
  - type: text
    content: ' (3.6,9). '
  - type: text
    content: Ils ne pensent qu'aux choses de la
  - type: text
    content: ' '
  - type: text
    content: terre
  - type: text
    content: ', alors que la '
  - type: text
    content: citoyenneté
  - type: text
    content: ' de Paul '
  - type: text
    content: est dans les
  - type: text
    content: ' '
  - type: text
    content: cieux
  - type: text
    content: ' (3.19s).'
  - type: text
    content: 'Ces traits, même approximatifs, semblent renvoyer à une tendance '
  - type: text
    content: composite
  - type: text
    content: ' du judéo-christianisme, où se mêleraient des germes de gnosticisme et de libertinisme, débouchant immanquablement sur une remise en cause radicale de la conception chrétienne du salut (ce sont des '
  - type: text
    content: ennemis de la croix du Christ,
  - type: text
    content: ' 3.18) et sur l''immoralité ('
  - type: text
    content: ils mettent leur gloire dans ce qui fait leur honte,
  - type: text
    content: ' 3.19).'
  - type: text
    content: Le Christ au centre de l'espérance
  - type: text
    content: 'Les circonstances ne sont pas favorables. En prison, l''apôtre garde néanmoins courage. Mieux encore, une indéniable sérénité et la '
  - type: text
    content: joie
  - type: text
    content: ' (évoquée 14 fois) rythment son écrit. Son espérance est inébranlable. Elle s''exprime de diverses manières. C''est d''abord l''utilisation insistante d''expressions comme '
  - type: text
    content: dans le Christ, en Jésus-Christ, dans le Seigneur,
  - type: text
    content: ' qui reviennent une vingtaine de fois (1.13,14,26 etc.). C''est ensuite la référence au '
  - type: text
    content: jour
  - type: text
    content: ' du Christ (1.6,10 ; 2.16), jour de la gloire promise. C''est aussi '
  - type: text
    content: le désir de [s’]en aller et d'être avec le Christ
  - type: text
    content: ' (1.23). C''est encore le développement du chapitre 3 qui se conclut avec la '
  - type: text
    content: puissance de la résurrection*
  - type: text
    content: ' (v. 10).'
  - type: text
    content: 'Enfin et surtout, au cœur de l''épître retentit l''hymne du chapitre 2, expression significative de la façon dont Paul conçoit le Christ. Cite-t-il ici une composition liturgique préexistante, d''origine araméenne ou hellénistique, utilisée pour la Cène ou le baptême ? Ou s''agit-il d''une composition qui lui est propre ? En tout cas, et malgré les difficultés que pose son interprétation, ce poème est un joyau inestimable. On y voit émerger l''un des plus anciens credos de l''Eglise : '
  - type: text
    content: Jésus-Christ est le Seigneur
  - type: text
    content: .
  - type: text
    content: 'La seigneurie du Christ a été acquise au prix d''un dépouillement total, jusqu''à la mort sur la croix. C''est '
  - type: text
    content: l'abaissement
  - type: text
    content: ' du Christ qui fonde son élévation. L''analogie avec l''apôtre est frappante : le prisonnier est démuni, dépouillé, réduit à l''impuissance. Mais cette situation sert ici de levier existentiel à sa prédication. En reliant ainsi sa mission et sa condition à l''élévation du crucifié, l''apôtre ouvre à ses lecteurs une compréhension non moins paradoxale de leur propre existence. Justement parce que '
  - type: text
    content: c'est Dieu qui opère en
  - type: text
    content: ' eux '
  - type: text
    content: le vouloir et le faire,
  - type: text
    content: ' il n''est nul lieu, nulle situation humaine, où ils ne soient appelés à '
  - type: text
    content: mettre en œuvre
  - type: text
    content: ' leur '
  - type: text
    content: salut… avec crainte et tremblement
  - type: text
    content: ' (2.12s).'
  - type: text
    content: Actualité de l'épître
  - type: text
    content: 'Comme hier à Philippes, ce sont aujourd''hui '
  - type: text
    content: les choses de la terre
  - type: text
    content: ' qui constituent souvent les préoccupations essentielles. Comme pour l''apôtre emprisonné, les conditions de vie sont défavorables pour bien des croyants. Entre la résignation et la révolte, entre la tristesse et la conquête à tout prix, l''épître aux Philippiens ouvre une autre voie : la vraie vie ne consiste pas à mordre, à prendre, à se prévaloir de quoi que ce soit, mais à avoir '
  - type: text
    content: les dispositions qui sont en Jésus-Christ
  - type: text
    content: ' (2.5). Il ne s''agit pas de posséder, mais de tout perdre, pour gagner celui qui est tout.'
