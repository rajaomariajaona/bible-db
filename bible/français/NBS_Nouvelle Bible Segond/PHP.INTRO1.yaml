document_id: PHP.INTRO1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: imt1
    children:
    - type: text
      text: INTRODUCTION
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les ruines de Philippes (l''ancienne Crénides), telles qu''on peut les voir aujourd''hui, donnent une faible idée de l''importance qu''avait cette ville dans l''Antiquité. En 358 av. J.-C., Philippe II de Macédoine en avait fait sa capitale. Les ressources minières alentour étaient considérables (mines d''or et d''argent), la situation géographique excellente (point de passage obligé sur la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: via Egnatia
    - type: text
      text: ' reliant Rome à Byzance). Quelques pages mémorables de l''histoire romaine se sont écrites à Philippes : la victoire de Marc Antoine et d''Octave sur Brutus et Cassius (42 av. J.-C.) et le succès d''Octave à Actium, tout près de là (31 av. J.-C.). La ville jouissait d''un statut privilégié : ses habitants étaient '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: citoyens romains
    - type: text
      text: . Le droit romain (
    - type: usfm
      marker: it
      children:
      - type: text
        text: jus italicum
    - type: text
      text: ') y était sans doute appliqué en signe de reconnaissance pour les nombreux vétérans militaires qui y avaient établi résidence. Même l''architecture lui donnait des airs de grandeur : plusieurs monuments étaient des répliques de ceux de Rome.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Selon le récit des Actes, c''est une vision nocturne qui conduit Paul à Philippes, celle d''un Macédonien suppliant qui l''appelle au secours (Ac 16.9). Les plans de l''apôtre étaient pourtant différents. Il avait voulu évangéliser la région d''Ephèse, mais l''Esprit avait fermé la porte. Il serpenta alors vers l''est de la Turquie d''Asie, puis vers le nord, enfin vers la côte égéenne, avant de remonter vers la région de Byzance (Ac 16.7-10). Mais là encore, la boussole de l''Esprit indiqua un autre cap : la Macédoine, de l''autre côté des Dardanelles. Quand, au cours de son deuxième voyage missionnaire, en 49/50, l''apôtre débarque donc au port de Néapolis, à 12 km de Philippes, il foule pour la première fois le sol de l''Europe, accompagné de trois collaborateurs : Timothée, Silas et peut-être Luc (c''est à partir de Philippes que le livre des Actes est rédigé en partie à la première personne du pluriel ; cf. Ac 16.10'
    - type: usfm
      marker: ord
      children:
      - type: text
        text: n
    - type: text
      text: ).
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une Eglise à part dans le cœur de l'apôtre
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Visitée la première en Europe d''après la chronologie des Actes, la ville de Philippes connaîtra probablement deux autres passages de Paul au cours de son troisième voyage (cf. Ac 20.1-6). Ce lieu est associé à des '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: expériences
    - type: text
      text: ' fortes et marquantes : la conversion de Lydie, commerçante de Thyatire rencontrée en un lieu de prière à l''extérieur de la ville (Ac 16.13-15) ; l''exorcisme de la jeune servante habitée par un esprit de Python (Ac 16.16-18) ; la première arrestation accompagnée de rudes sévices ; la libération miraculeuse (Ac 16.19-34) ; la première comparution devant les autorités romaines (Ac 16.35-40).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''Eglise de Philippes est surtout la seule communauté de laquelle Paul ait accepté un '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: soutien matériel.
    - type: text
      text: ' On sait que l''apôtre mettait son point d''honneur à ne pas dépendre des Eglises (cf. 1Co 4.12 ; 9.15 ; 1Th 2.9 ; 2Th 3.7ss). L''aide des Philippiens (2Co 11.7-9) lui permettra de supporter sa condition de prisonnier (à l''époque, ce sont surtout la famille ou les amis qui doivent assurer la subsistance des détenus). La communauté de Philippes a même détaché Epaphrodite au service du prisonnier. Du coup, cette épître est, avec le billet à Philémon, la plus cordiale et la plus familière de toutes. Paul « chérit » tous les Philippiens avec la tendresse du Christ (1.9). Il évoque son avenir incertain et espère revenir bientôt à Philippes (1.22-26). Il n''hésite pas à donner des nouvelles personnelles (2.19-29). Il se répand en remerciements (4.10-20).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une lettre aux circonstancesimprécises
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Paul, certes, est en prison, mais quel est le '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: lieu
    - type: text
      text: ' de sa détention ? On pense aussitôt à sa captivité à Rome, entre 60 et 62. Mais d''autres propositions ont été avancées : Césarée ou Ephèse. L''apôtre mentionne de fréquents échanges entre lui et les Philippiens (2.19,25). Même si les communications étaient assez bien organisées dans l''Empire romain, un aller et retour Rome-Philippes durait 80 jours. La durée du trajet était à peine plus courte entre Césarée et Philippes. Une origine éphésienne de la lettre serait donc plus probable (il fallait seulement vingt jours pour faire le voyage dans les deux sens), d''autant que la tonalité générale de Philippiens rappelle les lettres aux Corinthiens, écrites de cette même ville.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les fréquents échanges mentionnés ci-dessus ont aussi fait penser que notre épître pourrait regrouper '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: plusieurs correspondances
    - type: text
      text: '. La rupture bien nette entre 3.2 et ce qui précède donne l''idée d''un écrit de remerciement (1.1–3.1 ; 4.10-23), entrecoupé par la lettre d''avertissement contre les '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chiens
    - type: text
      text: ' (3.2–4.9). Cependant ces théories, qui n''emportent pas l''adhésion du plus grand nombre des commentateurs, ne changent guère la lecture de l''épître. Par ailleurs, on s''explique mal l''intention du rédacteur final qui aurait aussi maladroitement recomposé le texte. Enfin, l''analyse rhétorique semble plutôt confirmer aujourd''hui l''unité fondamentale de l''écrit.'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Une lettre « à cœur ouvert » pour ceux que Paul chérit
  - type: usfm
    marker: ip
    children:
    - type: text
      text: Plusieurs raisons conduisent Paul à écrire aux Philippiens. Il leur renvoie
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Epaphrodite,
    - type: text
      text: ' qu''ils avaient détaché à son service, et lui confie sa lettre, dans laquelle il exprime sa gratitude pour leur générosité.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'C''est aussi l''occasion pour l''apôtre de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: rassurer
    - type: text
      text: ' ceux qui, à Philippes, s''inquiétaient de son sort. La nouvelle de son emprisonnement était parvenue en Macédoine. Contrairement à ce qu''ils auraient pu craindre, le moral de Paul n''est pas au plus bas. Tout contribue à la proclamation de la bonne nouvelle (1.13s). Même si l''issue juridique est incertaine, l''acquittement est assuré devant le tribunal céleste (1.18ss).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'C''est enfin l''occasion pour Paul de '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: mettre en garde
    - type: text
      text: ' contre ceux qui menacent l''Eglise. Paul a sans doute des noms en tête. Mais de qui s''agit-il exactement ? Il n''est pas aisé de répondre précisément à cette question. On a suggéré plusieurs solutions. Les '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chiens
    - type: text
      text: ' pourraient être des missionnaires judaïsants venus de Thessalonique pour prêcher la circoncision, la prépondérance de la loi et la nécessité, pour les chrétiens, de demeurer dans le cadre du judaïsme. D''autres ont cru repérer deux tendances différentes chez les opposants : la première serait judéo-chrétienne (3.2-6), la deuxième gnostique ou prégnostique (3.18s ; voir « La question gnostique », p. XXX). D''autres même ont pensé que la démarche de Paul relevait seulement de l''admonition : prévenir les Philippiens contre les tendances constatées dans le judaïsme d''alors.'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'L''épître elle-même met en évidence les caractéristiques suivantes : les opposants se glorifient de la '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: circoncision
    - type: text
      text: ', alors que pour Paul, qui manie l''ironie, elle n''est qu''une '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mutilation
    - type: text
      text: ' (3.2). Ils mettent leur '
    - type: usfm
      marker: it
      children:
      - type: text
        text: confiance
    - type: text
      text: ' dans la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: chair*
    - type: text
      text: ', alors que Paul met sa '
    - type: usfm
      marker: it
      children:
      - type: text
        text: fierté
    - type: text
      text: ' en '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Jésus-Christ
    - type: text
      text: ' et rend à Dieu un '
    - type: usfm
      marker: it
      children:
      - type: text
        text: culte
    - type: text
      text: ' par '
    - type: usfm
      marker: it
      children:
      - type: text
        text: l'Esprit*
    - type: text
      text: ' (3.3). Ils cherchent à établir leur '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: justice
    - type: text
      text: ' devant Dieu par la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: loi
    - type: text
      text: ', alors que Paul a obtenu une '
    - type: usfm
      marker: it
      children:
      - type: text
        text: justice provenant de Dieu et fondée sur la foi
    - type: text
      text: ' (3.6,9). '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Ils ne pensent qu'aux choses de la
    - type: text
      text: ' '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: terre
    - type: text
      text: ', alors que la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: citoyenneté
    - type: text
      text: ' de Paul '
    - type: usfm
      marker: it
      children:
      - type: text
        text: est dans les
    - type: text
      text: ' '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: cieux
    - type: text
      text: ' (3.19s).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Ces traits, même approximatifs, semblent renvoyer à une tendance '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: composite
    - type: text
      text: ' du judéo-christianisme, où se mêleraient des germes de gnosticisme et de libertinisme, débouchant immanquablement sur une remise en cause radicale de la conception chrétienne du salut (ce sont des '
    - type: usfm
      marker: it
      children:
      - type: text
        text: ennemis de la croix du Christ,
    - type: text
      text: ' 3.18) et sur l''immoralité ('
    - type: usfm
      marker: it
      children:
      - type: text
        text: ils mettent leur gloire dans ce qui fait leur honte,
    - type: text
      text: ' 3.19).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Le Christ au centre de l'espérance
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Les circonstances ne sont pas favorables. En prison, l''apôtre garde néanmoins courage. Mieux encore, une indéniable sérénité et la '
    - type: usfm
      marker: bdit
      children:
      - type: text
        text: joie
    - type: text
      text: ' (évoquée 14 fois) rythment son écrit. Son espérance est inébranlable. Elle s''exprime de diverses manières. C''est d''abord l''utilisation insistante d''expressions comme '
    - type: usfm
      marker: it
      children:
      - type: text
        text: dans le Christ, en Jésus-Christ, dans le Seigneur,
    - type: text
      text: ' qui reviennent une vingtaine de fois (1.13,14,26 etc.). C''est ensuite la référence au '
    - type: usfm
      marker: it
      children:
      - type: text
        text: jour
    - type: text
      text: ' du Christ (1.6,10 ; 2.16), jour de la gloire promise. C''est aussi '
    - type: usfm
      marker: it
      children:
      - type: text
        text: le désir de [s’]en aller et d'être avec le Christ
    - type: text
      text: ' (1.23). C''est encore le développement du chapitre 3 qui se conclut avec la '
    - type: usfm
      marker: it
      children:
      - type: text
        text: puissance de la résurrection*
    - type: text
      text: ' (v. 10).'
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Enfin et surtout, au cœur de l''épître retentit l''hymne du chapitre 2, expression significative de la façon dont Paul conçoit le Christ. Cite-t-il ici une composition liturgique préexistante, d''origine araméenne ou hellénistique, utilisée pour la Cène ou le baptême ? Ou s''agit-il d''une composition qui lui est propre ? En tout cas, et malgré les difficultés que pose son interprétation, ce poème est un joyau inestimable. On y voit émerger l''un des plus anciens credos de l''Eglise : '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: Jésus-Christ est le Seigneur
    - type: text
      text: .
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'La seigneurie du Christ a été acquise au prix d''un dépouillement total, jusqu''à la mort sur la croix. C''est '
    - type: usfm
      marker: bd
      children:
      - type: text
        text: l'abaissement
    - type: text
      text: ' du Christ qui fonde son élévation. L''analogie avec l''apôtre est frappante : le prisonnier est démuni, dépouillé, réduit à l''impuissance. Mais cette situation sert ici de levier existentiel à sa prédication. En reliant ainsi sa mission et sa condition à l''élévation du crucifié, l''apôtre ouvre à ses lecteurs une compréhension non moins paradoxale de leur propre existence. Justement parce que '
    - type: usfm
      marker: it
      children:
      - type: text
        text: c'est Dieu qui opère en
    - type: text
      text: ' eux '
    - type: usfm
      marker: it
      children:
      - type: text
        text: le vouloir et le faire,
    - type: text
      text: ' il n''est nul lieu, nulle situation humaine, où ils ne soient appelés à '
    - type: usfm
      marker: it
      children:
      - type: text
        text: mettre en œuvre
    - type: text
      text: ' leur '
    - type: usfm
      marker: it
      children:
      - type: text
        text: salut… avec crainte et tremblement
    - type: text
      text: ' (2.12s).'
  - type: usfm
    marker: is2
    children:
    - type: text
      text: Actualité de l'épître
  - type: usfm
    marker: ip
    children:
    - type: text
      text: 'Comme hier à Philippes, ce sont aujourd''hui '
    - type: usfm
      marker: it
      children:
      - type: text
        text: les choses de la terre
    - type: text
      text: ' qui constituent souvent les préoccupations essentielles. Comme pour l''apôtre emprisonné, les conditions de vie sont défavorables pour bien des croyants. Entre la résignation et la révolte, entre la tristesse et la conquête à tout prix, l''épître aux Philippiens ouvre une autre voie : la vraie vie ne consiste pas à mordre, à prendre, à se prévaloir de quoi que ce soit, mais à avoir '
    - type: usfm
      marker: it
      children:
      - type: text
        text: les dispositions qui sont en Jésus-Christ
    - type: text
      text: ' (2.5). Il ne s''agit pas de posséder, mais de tout perdre, pour gagner celui qui est tout.'
