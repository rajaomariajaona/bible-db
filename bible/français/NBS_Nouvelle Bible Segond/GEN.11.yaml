        text: donc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même expression aux v. 4,7 ; 38.16 ; Ex 1.10.'
    marker-yv: yv-n
  - type: text
    text: 'Ils se dirent l''un à l''autre : Faisons donc des briques et cuisons-les au feu ! La brique leur servit de pierre et le bitume leur servit de mortier. '
  - type: usfm
    marker: v
