      children:
      - type: text
        text: 'bitume '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 14.10 ; Ex 2.3) et aux procédés de construction babyloniens. Le récit met en valeur le génie créatif de l''humanité, qui réussit à fabriquer des pierres artificielles dans une région où il n''y a pas de pierre. –  '
    - type: usfm
      marker: fq
