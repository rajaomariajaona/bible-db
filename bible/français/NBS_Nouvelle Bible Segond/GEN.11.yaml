document_id: GEN.11,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La tour de Babel
  - type: text
    content: ' '
  - type: note
    content: Litt. toute la terre était lèvre une et paroles unes . Cf. 10.5,20,31 ; So 3.9n.
  - type: text
    content: 'Toute la terre parlait la même langue, avec les mêmes mots. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Sur l'ensemble, cf. 5.3nss. –  généalogie 2.4n. –  Sem 5.32n. –  Arpakshad 10.22,24.
  - type: text
    content: 'Voici la généalogie de Sem : Sem, à l''âge de cent ans, engendra Arpakshad, deux ans après le déluge. '
  '11':
  - type: text
    content: Après la naissance d'Arpakshad, Sem vécut cinq cents ans ; il engendra des fils et des filles.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 10.24n. Ici et au v. 14 la construction verbale traduite par vécut est légèrement différente de celle qui reviendra dans la suite.
  - type: text
    content: 'Arpakshad vécut trente-cinq ans, puis il engendra Shélah. '
  '13':
  - type: text
    content: Après la naissance de Shélah, Arpakshad vécut quatre cent trois ans ; il engendra des fils et des filles.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 10.21,24.
  - type: text
    content: 'Shélah vécut trente ans, puis il engendra Héber. '
  '15':
  - type: text
    content: Après la naissance de Héber, Shélah vécut quatre cent trois ans ; il engendra des fils et des filles.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 10.25.
  - type: text
    content: 'Héber vécut trente-quatre ans, puis il engendra Péleg. '
  '17':
  - type: text
    content: Après la naissance de Péleg, Héber vécut quatre cent trente ans ; il engendra des fils et des filles.
  '18':
  - type: text
    content: 'Péleg vécut trente ans, puis il engendra Réou. '
  '19':
  - type: text
    content: Après la naissance de Réou, Péleg vécut deux cent neuf ans ; il engendra des fils et des filles.
  '2':
  - type: note
    content: est 2.8n  ; 10.30. –  Shinéar 10.10n.
  - type: text
    content: 'Partis de l''est, ils trouvèrent une vallée au pays de Shinéar, et ils s''y installèrent. '
  '20':
  - type: text
    content: 'Réou vécut trente-deux ans, puis il engendra Seroug. '
  '21':
  - type: text
    content: Après la naissance de Seroug, Réou vécut deux cent sept ans ; il engendra des fils et des filles.
  '22':
  - type: text
    content: 'Seroug vécut trente ans, puis il engendra Nahor. '
  '23':
  - type: text
    content: Après la naissance de Nahor, Seroug vécut deux cents ans ; il engendra des fils et des filles.
  '24':
  - type: text
    content: 'Nahor vécut vingt-neuf ans, puis il engendra Térah. '
  '25':
  - type: text
    content: Après la naissance de Térah, Nahor vécut cent dix-neuf ans ; il engendra des fils et des filles.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.32. Sur Abram ou Abraham et l'ensemble de l'histoire des patriarches, voir l'introduction (♦).
  - type: text
    content: Térah vécut soixante-dix ans, puis il engendra Abram, Nahor et Harân.
  '27':
  - type: text
    content: ' '
  - type: note
    content: généalogie 2.4n. –  Térah Jos 24.2. –  Loth 12.4s ; 13.5ss ; 19 ; 2P 2.7s.
  - type: text
    content: 'Voici la généalogie de Térah : Térah engendra Abram, Nahor et Harân. Harân engendra Loth. '
  '28':
  - type: note
    content: 'de ses origines ou de sa parenté, de sa famille, de sa naissance  ; le terme hébreu est dérivé du verbe traduit par engendrer ou mettre au monde, cf. 12.1 ; 24.4,7 ; 31.3,13 ; 32.10 ; 43.7 ; 48.6n  ; Jr 22.10n  ; Ez 16.3n  ; Rt 2.11 ; Est 2.10+. –  Our-des-Chaldéens  : Ourou ou Ur, en Babylonie méridionale, sur la rive droite de l''Euphrate, à environ 150 km de son confluent avec le Tigre ; on a aussi pensé à Oura, beaucoup plus au nord, en Anatolie, mais cette identification semble beaucoup moins probable. –  Chaldéens  : hébreu Kasdim, cf. 22.22n  ; habituellement ce qualificatif s''applique à la dynastie qui a fondé l''empire néo-babylonien au VIIe s. av. J.-C. (cf. « Babylone et les Babyloniens »♦). Cf. v. 31 ; 15.7 ; Né 9.7 ; 1Ch 11.35.'
  - type: text
    content: 'Harân mourut devant Térah, son père, au pays de ses origines, à Our-des-Chaldéens. '
  '29':
  - type: note
    content: 'Saraï (sans doute une forme archaïque du nom Sara, princesse) : cf. 17.15n. –  Milka (Reine) 22.20-23 ; 24.15,24,47. –  Yiska  : Abri ( ?).'
  - type: text
    content: 'Abram et Nahor prirent femme ; la femme d''Abram se nommait Saraï, et la femme de Nahor Milka, fille de Harân, père de Milka et père de Yiska. '
  '3':
  - type: note
    content: 'Faisons…  : cf. 1.26. La description correspond aux matériaux (briques  : cf. Ex 1.14 ; 5.7-19 ; Ez 4.1 ; bitume Gn 14.10 ; Ex 2.3) et aux procédés de construction babyloniens. Le récit met en valeur le génie créatif de l''humanité, qui réussit à fabriquer des pierres artificielles dans une région où il n''y a pas de pierre. –  donc  : même expression aux v. 4,7 ; 38.16 ; Ex 1.10.'
  - type: text
    content: 'Ils se dirent l''un à l''autre : Faisons donc des briques et cuisons-les au feu ! La brique leur servit de pierre et le bitume leur servit de mortier. '
  '30':
  - type: note
    content: stérile 16.1 ; 18.11 ; cf. 25.21 ; 29.31 ; Jg 13.2s ; 1S 2.5 ; voir aussi Ex 23.26 ; Dt 7.14 ; Es 54.1 ; Ps 113.9 ; Jb 24.21.
  - type: text
    content: 'Saraï était stérile : elle n''avait pas d''enfant. '
  '31':
  - type: note
    content: Le nom de Harân, fils de Térah, diffère en hébreu de celui de la ville de Harrân (c'est en fait le H qui transcrit deux lettres différentes) ; celle-ci se situe au nord-ouest d'Our, à une centaine de kilomètres à l'est de l'Euphrate et au nord de la Syrie (cf. 24.10n  ; 25.20n  ; 27.43). –  Canaan 9.18n.
  - type: text
    content: 'Térah prit son fils Abram, son petit-fils Loth, fils de Harân, et sa belle-fille Saraï, femme d''Abram, son fils. Ils quittèrent ensemble Our-des-Chaldéens pour se rendre en Canaan. Ils arrivèrent à Harrân et ils s''y installèrent. '
  '32':
  - type: note
    content: 'deux cent cinq ans  : Smr cent quarante-cinq ans, cf. Ac 7.4.'
  - type: text
    content: Les jours de Térah furent de deux cent cinq ans ; puis Térah mourut à Harrân.
  '4':
  - type: note
    content: 'ville 4.17 ; 10.10ss ; cf. Es 14.21n  ; Dn 4.27. –  tour  : de nombreux temples assyro-babyloniens comportaient une tour ou ziggourat (cf. Ez 43.14n), une sorte de pyramide à étages souvent haute d''une centaine de mètres et consacrée au culte du dieu du ciel (voir illustration). –  sommet  : mot habituellement traduit par tête. –  atteigne le ciel  : litt. (soit) au ciel  ; cf. Jb 20.6+. –  faisons-nous un nom  : cf. 6.4n  ; 12.2n  ; 19.32 ; Ps 115.1. –  dispersions  : cf. v. 8s ; 10.18,32.'
  - type: text
    content: 'Ils dirent alors : Bâtissons-nous donc une ville et une tour dont le sommet atteigne le ciel, et faisons-nous un nom, afin que nous ne nous dispersions pas sur toute la terre ! '
  '5':
  - type: note
    content: 'que bâtissaient  : on pourrait aussi traduire qu''avaient bâties. –  les humains  : litt. les fils de l''homme (ou de l''humain).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' descendit pour voir la ville et la tour que bâtissaient les humains. '
  '6':
  - type: note
    content: 'ce n''est là que le commencement…  : on pourrait aussi traduire et ce n''est que le début de leur entreprise ! Cf. 3.22 ; 4.26n. –  rien ne les empêchera…  : formule analogue Jb 42.2n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Ainsi ils sont un seul peuple, ils parlent tous la même langue, et ce n''est là que le commencement de leurs œuvres ! Maintenant, rien ne les empêchera de réaliser tous leurs projets ! '
  '7':
  - type: note
    content: 'Cf. v. 3s ; Ac 2.1-11. –  ne comprennent plus  : litt. n''entendent pas.'
  - type: text
    content: 'Descendons donc, et là, brouillons leur langue, afin qu''ils ne comprennent plus la langue les uns des autres ! '
  '8':
  - type: note
    content: dispersa v. 4+ ; 9.19 ; cf. Es 33.3.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les dispersa de là sur toute la terre ; ils cessèrent de bâtir la ville. '
  '9':
  - type: note
    content: Le nom de Babylone, en hébreu Babel, 10.10n, en babylonien Bab ’ili ou Bab-’ilani, traditionnellement interprété au sens de Porte des dieux (cf. 28.17 ; Es 13.2n  ; Jr 51.53), est ici tourné en dérision par une étymologie populaire qui le rapproche du verbe hébreu balal, brouiller.
  - type: text
    content: 'C''est pourquoi on l''a appelée du nom de Babylone (« Brouillage »), car c''est là que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' brouilla la langue de toute la terre, et c''est de là que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' les dispersa sur toute la terre.'
  - type: heading
    content: Liste des ancêtres depuis Sem jusqu'à Abram
  - type: heading
    content: 1Ch 1.24-27  ; Lc 3.34-36
