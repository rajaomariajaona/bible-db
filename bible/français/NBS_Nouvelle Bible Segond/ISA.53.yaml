document_id: ISA.53,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui nous était annoncé  : autres traductions ce qui nous était raconté ; ce que nous racontions  ; LXX ce qu''on a entendu de nous ; Jn 12.38 ; Rm 10.16. –  bras 40.10+ ; 52.10. –  pour qui…  : autre traduction à qui s''est-il révélé ? Cf. 40.5 ; 56.1.'
  - type: text
    content: Qui a cru ce qui nous était annoncé ?
  - type: text
    content: 'Le bras du '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour qui s''est-il dévoilé ?'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Le Seigneur …  : autres traductions quant au Seigneur, il a pris plaisir à l''écraser ; le Seigneur a pris plaisir en celui qu''il avait écrasé. –  par la souffrance  : litt. il a fait souffrir ou il a rendu malade  ; cf. v. 4. –  si tu as fait…  : autre traduction si tu as livré sa vie en sacrifice…  ; certains modifient le texte hébreu traditionnel pour lire s''il s''est livré en sacrifice… ou si sa vie a été livrée… –  sacrifice de réparation  : cf. Lv 5.6n,15s ; 6.10 ; 19.21 ; cf. Rm 3.25 ; 8.3 ; Hé 2.17 ; 1Jn 2.2. –  la volonté (autre traduction le bon plaisir ) du Seigneur se réalisera (litt. réussira , cf. 48.15 ; 54.17n) 44.26 ; 46.10 ; 48.14 ; Mt 6.10/ / ; 26.42/ / ; Jn 4.34. –  par lui  : litt. par (ou dans ) sa main.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a voulu l''écraser par la souffrance ;'
  - type: text
    content: si tu as fait de lui un sacrifice de réparation,
  - type: text
    content: il verra une descendance,
  - type: text
    content: il prolongera ses jours,
  - type: text
    content: 'et la volonté du '
  - type: text
    content: Seigneur
  - type: text
    content: ' se réalisera par lui.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'A cause de ses tourments ou de sa peine, de son oppression (59.4 ; Gn 41.51) ; autres traductions depuis, après, au prix de ses tourments… –  il verra  : (cf. v. 10) les mss de Qumrân et LXX ont lu  : il verra la lumière. –  il sera rassasié  : l''expression peut évoquer la longévité, cf. Gn 25.8. –  mon serviteur (42.1+) , le juste, apportera la justice  : cf. Dn 12.3n  ; Ac 3.13s ; 7.52 ; Rm 3.26 ; 5.18 ; 1P 3.18.'
  - type: text
    content: A cause de ses tourments,
  - type: text
    content: il verra,
  - type: text
    content: il sera rassasié par sa connaissance ;
  - type: text
    content: mon serviteur, le juste, apportera la justice à la multitude
  - type: text
    content: et il se chargera de leurs fautes.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'la multitude (litt. les nombreux ) : le terme hébreu signifie aussi grand  ; on pourrait donc comprendre je lui donnerai sa part avec les grands  ; réciproquement, l''expression les puissants peut désigner un grand nombre  ; cf. 54.1ss ; 60.22 ; Gn 18.18 ; Nb 14.12 ; mêmes termes en Am 5.12 ( multitude / nombreux ) ; Pr 7.26 ( beaucoup / forts ) ; voir aussi Ps 2.8 ; 35.18 ; Jn 12.32. –  butin Lc 11.21s. –  il s''est livré lui-même  : litt. il a dénudé (ou dépouillé ) son être (ou son âme, sa vie , cf. Gn 1.20n) (jusqu’)à la mort  ; cf. Ph 2.7s. –  il a été compté… Lc 22.37. –  il a porté le péché (ou il a pardonné le péché ) d''une multitude (ou de beaucoup ) : cf. Mt 20.28/ / ; 26.28/ / ; Jn 1.29 ; Rm 8.34 ; Hé 9.28. –  il est intervenu ou il a intercédé  ; même verbe v. 6n  ; 59.16 ; Jr 15.11n  ; Lc 23.34 ; Hé 7.25.'
  - type: text
    content: C'est pourquoi je lui donnerai une part avec la multitude ;
  - type: text
    content: il partagera le butin avec les puissants,
  - type: text
    content: parce qu'il s'est livré lui-même à la mort
  - type: text
    content: et qu'il a été compté parmi les transgresseurs
  - type: text
    content: – alors qu'il a porté le péché d'une multitude
  - type: text
    content: et qu'il est intervenu pour les transgresseurs.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'devant lui  : probablement devant le Seigneur  ; certains comprennent devant lui-même , au sens de livré à lui-même. –  rejeton  : ce terme hébreu, différent de celui qui est traduit par le même mot français en 11.1n, signifie litt. nourrisson (Nb 11.12) ; terme apparenté en Jb 14.7 ; 15.30. –  racine 11.1,10 ; 37.31. –  ni apparence… 52.14.'
  - type: text
    content: Il s'est élevé devant lui comme un rejeton,
  - type: text
    content: comme une racine qui sort d'une terre assoiffée ;
  - type: text
    content: il n'avait ni apparence, ni éclat
  - type: text
    content: pour que nous le regardions,
  - type: text
    content: et son aspect n'avait rien pour nous attirer.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Méprisé 49.7 ; Ps 22.7 ; Mc 9.12. –  habitué à  : litt. connu de , d''après le texte hébreu traditionnel ; connaissant , d''après un ms de Qumrân et des versions anciennes. –  souffrance  : le mot ainsi traduit (de même aux v. 4,10) est habituellement rendu par maladie (cf. 1.5 ; 38.9). –  on se détourne  : litt. on cache la face.'
  - type: text
    content: Méprisé et abandonné des hommes,
  - type: text
    content: homme de douleur
  - type: text
    content: et habitué à la souffrance,
  - type: text
    content: semblable à celui de qui on se détourne,
  - type: text
    content: il était méprisé,
  - type: text
    content: nous ne l'avons pas estimé.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'ce sont nos souffrances (ou nos maladies , v. 3n) qu''il a portées…  : cf. Ez 4.4 ; Mt 8.17  ; Hé 2.10. –  pensions  : le même verbe est traduit par estimer au v. 3.'
  - type: text
    content: En fait, ce sont nos souffrances qu'il a portées,
  - type: text
    content: c'est de nos douleurs qu'il s'était chargé ;
  - type: text
    content: et nous, nous le pensions atteint d'un fléau,
  - type: text
    content: frappé par Dieu et affligé.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'transpercé  : cf. Za 12.10 (autre verbe) ; certains, s''appuyant sur Tg, modifient la vocalisation du texte et lisent profané, traité en profane (comme en 43.28n) ; cf. Ez 9.7n  ; voir aussi 2Co 5.21 ; Ga 3.13. –  la correction (le même mot peut être traduit par instruction, leçon , cf. 26.16+ ; Pr 1.2n) …  : litt. la correction de notre paix (était) sur lui  ; cf. Rm 4.25 ; 1Co 15.3 ; Ep 2.14,17. –  par ses meurtrissures… 1P 2.24.'
  - type: text
    content: Or il était transpercé à cause de nos transgressions,
  - type: text
    content: écrasé à cause de nos fautes ;
  - type: text
    content: la correction qui nous vaut la paix est tombée sur lui,
  - type: text
    content: et c'est par ses meurtrissures que nous avons été guéris.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'du petit bétail (moutons et chèvres) ou comme un troupeau  ; cf. Nb 27.17 ; 1R 22.17 ; Jr 10.21 ; 50.6 ; Ez 34.5 ; Na 3.18 ; Za 13.7 ; Mt 9.36/ / ; 1P 2.25. –  a fait venir…  : autre traduction lui a fait subir la peine que nous méritions tous  ; le même verbe revient au v. 12 avec le sens d’ intervenir ou d’ intercéder.'
  - type: text
    content: Nous étions tous errants comme du petit bétail,
  - type: text
    content: chacun suivait sa propre voie ;
  - type: text
    content: 'et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait venir sur lui notre faute à tous.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: Ac 8.32s. –  Maltraité ou pressé, opprimé , cf. 3.5+ ; Ex 3.7n. –  pas ouvert la bouche Ps 38.14-16 ; Mt 26.63 ; 27.12-13/ / ; Jn 19.9. –  semblable au mouton… Ex 12.3-6 ; Jr 11.19 ; Jn 1.29 ; 1P 1.19. Le mot hébreu traduit ici par mouton désigne plus exactement une tête de petit bétail, c.-à-d. un mouton ou une chèvre.
  - type: text
    content: Maltraité, affligé,
  - type: text
    content: il n'a pas ouvert la bouche ;
  - type: text
    content: semblable au mouton qu'on mène à l'abattoir,
  - type: text
    content: à une brebis muette devant ceux qui la tondent,
  - type: text
    content: il n'a pas ouvert la bouche.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'pris  : cf. 52.5 ; Gn 5.24+ ; Mt 9.15. –  dans sa génération…  : autre traduction qui s''est soucié de sa génération (ou de son existence, de sa demeure  ; cf. 38.12n)  ? Car il a été exclu… –  exclu  : le même verbe est traduit par tailler en 9.19 ; cf. Ps 88.6 ; Lm 3.54n  ; 2Ch 26.21. –  terre des vivants 38.11 ; Ps 27.13+. –  de mon peuple  : un ms de Qumrân porte de son peuple (cf. 40.7+). –  qui l''avait atteint  : c.-à-d. probablement qui avait atteint le peuple  ; litt. pour lui . Certains, s''appuyant sur LXX, modifient le texte hébreu traditionnel pour lire il a été frappé à mort (cf. v. 12).'
  - type: text
    content: Il a été pris par la violence et le jugement ;
  - type: text
    content: dans sa génération, qui s'est soucié
  - type: text
    content: de ce qu'il était exclu
  - type: text
    content: de la terre des vivants,
  - type: text
    content: à cause des transgressions de mon peuple,
  - type: text
    content: du fléau qui l'avait atteint ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'On a mis  : litt. il a mis  ; un ms de Qumrân porte le pluriel, qui correspond plus naturellement à l''indéfini on . –  son sépulcre  : d''après un ms de Qumrân, on aurait ici le même mot qu''en Ez 43.7 ( hauts lieux ou tumulus servant de sépulture ; voir aussi Jb 27.15n). Le texte hébreu traditionnel porte parmi ( ?) ses morts (cf. Lm 3.6 ; Baruch 3.4 : « Ecoute la prière des morts d''Israël, des fils de ceux qui ont péché contre toi. ») –  avec celui du riche  : cf. Mt 27.57-60/ /. –  pas commis… Ps 44.18-22 ; 1P 2.22  ; 1Jn 3.5. –  et qu''il n''y ait pas eu de tromperie… So 3.13 (autre terme pour mensonge , terme apparenté pour [langue] trompeuse ) ; Ap 14.5.'
  - type: text
    content: On a mis sa tombe parmi celles des méchants,
  - type: text
    content: son sépulcre avec celui du riche,
  - type: text
    content: bien qu'il n'ait pas commis de violence
  - type: text
    content: et qu'il n'y ait pas eu de tromperie dans sa bouche.
