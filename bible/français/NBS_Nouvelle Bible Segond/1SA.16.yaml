document_id: 1SA.16,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Samuel oint David comme roi d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'pleureras-tu  : cf. 15.35. –  je l''ai rejeté 8.7n  ; 15.23 ; Ac 13.22 ; cf. 1S 16.7. –  corne d''huile  : cf. v. 13 ; 10.1 ; 2R 9.1-3. –  Jessé  : cf. 17.12,58 ; 2S 23.1 ; Es 11.1 ; Rt 4.17,22 ; Ac 13.22 ; Rm 15.12. –  le Bethléhémite  : de Beth-Léhem (orthographe traditionnelle, d''après le grec, Bethléem ), localité du territoire de Juda, à 7 km au sud de Jérusalem ; cf. Gn 35.19 ; Jg 17.7-9 ; Mi 5.1 ; Rt 1.1s. –  mon roi  : litt. un roi pour moi  ; cf. v. 12.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Samuel : Jusqu''à quand pleureras-tu sur Saül ? Moi, je l''ai rejeté : il ne sera plus roi sur Israël. Remplis ta corne d''huile et va. Je t''envoie chez Jessé, le Bethléhémite, car j''ai vu mon roi parmi ses fils. '
  '10':
  - type: note
    content: 'sept de ses fils  : Jessé avait huit fils selon 17.12 ; on a parfois traduit ses sept fils, d''après 1Ch 2.13-15.'
  - type: text
    content: 'Jessé fit passer sept de ses fils devant Samuel, et Samuel dit à Jessé : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a choisi aucun d''eux.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'N''y a-t-il plus d''autres jeunes gens ? litt. les jeunes gens sont-ils achevés (c.-à-d. au complet )  ? Cf. 10.22. –  le petit , c.-à-d. le plus jeune . –  il fait paître le troupeau v. 19 ; 17.15,34 ; 2S 7.8 ; Ps 78.70s ; cf. Ex 3.1 ; Ps 23. –  le troupeau  : il s''agit du petit bétail, moutons et chèvres. –  nous ne nous installerons pas ou nous ne passerons pas à table.'
  - type: text
    content: 'Puis Samuel dit à Jessé : N''y a-t-il plus d''autres jeunes gens ? Et il répondit : Il reste encore le petit, mais il fait paître le troupeau. Alors Samuel dit à Jessé : Envoie quelqu''un le chercher, car nous ne nous installerons pas avant qu''il soit arrivé ici. '
  '12':
  - type: note
    content: 'l''envoya chercher  : cf. 10.23. –  il était roux  : cf. Gn 25.25 ; mais l''adjectif ne se rapporte pas forcément à la chevelure ; on pourrait aussi traduire il avait le teint clair. –  de beaux yeux  : autres traductions un beau regard ; un bel aspect. –  une belle apparence  : cf. 17.42 ; Gn 39.6 ; Ps 45.3. –  à Samuel  : d''après LXX ; ce complément est laissé implicite en hébreu. –  Confère-lui l''onction  : litt. lève-toi et confère-lui l''onction. –  c''est lui 9.17 ; cf. Jn 1.33.'
  - type: text
    content: 'Jessé l''envoya chercher. Or il était roux, il avait de beaux yeux et une belle apparence. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Samuel : Confère-lui l''onction, c''est lui ! '
  '13':
  - type: note
    content: 'lui conféra l''onction Ps 89.21 ; Ac 13.22 ; cf. 1S 10.1 ; 1R 1.39 ; 2R 9.6 ; Ps 45.8. –  A partir de ce jour-là  : alors que Saül n''a été que temporairement sous l''emprise du souffle (10.10-13 ; 16.14), David le sera de manière permanente. –  le souffle du Seigneur  : cf. 10.6 ; Jg 3.10+ ; voir esprit. –  David  : ce nom est voisin du mot hébreu signifiant chéri, bien-aimé  ; voir aussi « David dans le Siracide  »♦. –  s''en alla  : litt. se leva et s''en alla. –  à Rama  : cf. 15.34n.'
  - type: text
    content: 'Samuel prit la corne d''huile et lui conféra l''onction parmi ses frères. A partir de ce jour-là, le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''empara de David. Quant à Samuel, il s''en alla à Rama.'
  - type: heading
    content: David entre au service de Saül
  '14':
  - type: text
    content: ' '
  - type: note
    content: 's''éloigna de Saül  : cf. 18.12 ; 28.15 ; Jg 16.20 ; Ps 51.13. –  un souffle (ou esprit ) mauvais  : cf. 18.10-12 ; 19.9s ; Jg 9.23n.'
  - type: text
    content: 'Le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' s''éloigna de Saül, tandis qu''un souffle mauvais venant du '
  - type: text
    content: Seigneur
  - type: text
    content: ' le remplissait d''effroi. '
  '15':
  - type: text
    content: 'Les gens de la cour de Saül lui dirent : Un mauvais souffle de Dieu te remplit d''effroi. '
  '16':
  - type: note
    content: 'Nous sommes à ton service  : litt. tes serviteurs sont devant toi (cf. 1R 10.8), c.-à-d. nous, qui sommes tes serviteurs, nous sommes prêts à exécuter tes ordres. –  lyre  : autre traduction harpe. –  il en jouera  : litt. il jouera de sa main  ; de même au v. 23. –  sera sur toi  : cf. Nb 24.2n. –  et tu iras mieux  : litt. et (ce sera) bon pour toi  ; LXX ajoute et il (= le souffle mauvais) te laissera tranquille. Sur la musique et ses effets, cf. 10.5s ; 2R 3.15.'
  - type: text
    content: 'S''il te plaît, parle, notre maître ! Nous sommes à ton service. Nous chercherons un homme qui sache jouer de la lyre ; il en jouera quand un mauvais souffle de Dieu sera sur toi, et tu iras mieux. '
  '17':
  - type: note
    content: 'Trouvez-moi  : litt. voyez pour moi, dans le sens de pourvoir  ; cf. Gn 22.8n. –  amenez-le-moi  : cf. 8.11,16.'
  - type: text
    content: 'Saül leur répondit : Trouvez-moi, je vous prie, un homme qui joue bien, et amenez-le-moi.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'J''ai vu , c.-à-d. je connais . –  un combattant…  : la mention de ces qualités prépare les récits de guerre des chapitres suivants ; cf. 2S 17.8-10 ; Ps 89.20s. –  un bel homme  : cf. v. 12. –  le Seigneur est avec lui  : cf. 3.19+.'
  - type: text
    content: 'L''un des serviteurs dit : J''ai vu un fils de Jessé, le Bethléhémite, qui sait jouer ; c''est aussi un combattant, un vaillant guerrier ; il parle bien, c''est un bel homme, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est avec lui. '
  '19':
  - type: text
    content: 'Saül envoya des messagers à Jessé, pour lui dire : Envoie-moi ton fils David, qui est avec le troupeau. '
  '2':
  - type: note
    content: 'Comment irais-je ? la question porte sur le secret indispensable entourant ce déplacement. –  me tuera  : cf. 18.10s ; 19.1,10 ; 20.1 ; 24.3 ; 26.2. –  un sacrifice  : cf. 9.12 ; 20.29.'
  - type: text
    content: 'Samuel dit : Comment irais-je ? Saül l''apprendra et il me tuera. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Tu emmèneras avec toi une génisse et tu diras : « Je viens offrir un sacrifice au '
  - type: text
    content: Seigneur
  - type: text
    content: '. » '
  '20':
  - type: note
    content: Cf. 17.17s ; Gn 43.11 ; 2S 16.1s ; Pr 18.16.
  - type: text
    content: 'Jessé prit un âne, qu''il chargea de pain, d''une outre de vin et d''un chevreau, et l''envoya à Saül par l''intermédiaire de David, son fils. '
  '21':
  - type: note
    content: 'se présenta devant Saül  : autre traduction se tint au service de Saül  ; cf. v. 16n. Cf. Pr 22.29. –  son porteur d''armes ou son écuyer, cf. Jg 9.54+.'
  - type: text
    content: 'David arriva et se présenta devant Saül ; celui-ci l''aima beaucoup, et il fit de lui son porteur d''armes. '
  '22':
  - type: note
    content: 'Je te prie de me laisser David  : litt. que David se tienne devant moi (cf. v. 21n), c.-à-d. je souhaite que David reste à mon service. –  il a trouvé grâce à mes yeux, c.-à-d. ma bienveillance lui est acquise  ; cf. 20.3,29 ; 25.8 ; 27.5 ; 2S 14.22 ; 15.24 ; 16.4.'
  - type: text
    content: 'Saül fit dire à Jessé : Je te prie de me laisser David, car il a trouvé grâce à mes yeux. '
  '23':
  - type: note
    content: 'respirait alors  : le verbe hébreu ainsi traduit exprime aussi de manière plus générale une idée de soulagement. –  s''éloignait de lui  : au v. 14, c''est le souffle de Dieu qui s''éloignait de Saül, pour faire place au souffle mauvais. La présence de David éloigne à son tour le souffle mauvais.'
  - type: text
    content: Lorsque le souffle de Dieu était sur Saül, David prenait la lyre et en jouait ; Saül respirait alors et se trouvait mieux ; le souffle mauvais s'éloignait de lui.
  '3':
  - type: note
    content: 'à qui je te dirai  : cf. Dt 17.15.'
  - type: text
    content: Tu inviteras Jessé au sacrifice ; je te ferai savoir moi-même ce que tu dois faire, et tu conféreras pour moi l'onction à qui je te dirai.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'en tremblant  : la crainte des anciens s''explique par le caractère extraordinaire de la venue de Samuel. –  et lui dirent  : d''après de nombreux mss et la plupart des versions anciennes ; certains mss portent et il dit (c.-à-d. et l''un d''eux dit ). –  Bienvenue ! autre traduction viens-tu pour la paix  ? cf. 1R 2.13. LXX et un ms hébreu de Qumrân ajoutent le vocatif ô voyant (cf. 9.9).'
  - type: text
    content: 'Samuel fit ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit ; il se rendit à Beth-Léhem. Les anciens de la ville vinrent en tremblant à sa rencontre et lui dirent : Bienvenue ! '
  '5':
  - type: note
    content: 'Bonjour ! litt. paix ! (cf. v. 4n). –  Consacrez-vous  : cette consécration comportait essentiellement des rites de purification. Cf. Gn 35.2s ; Ex 19.10,22 ; Nb 11.18 ; Jos 3.5 ; 7.13 ; Jb 1.5.'
  - type: text
    content: 'Il répondit : Bonjour ! Je viens pour offrir un sacrifice au '
  - type: text
    content: Seigneur
  - type: text
    content: . Consacrez-vous et venez avec moi au sacrifice. Il consacra aussi Jessé et ses fils et les invita au sacrifice.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Eliab  : cf. 17.13,28 ; 1Ch 2.13 ; cf. 1Ch 27.18, où il est appelé Eliab dans LXX, mais Elihou dans le texte hébreu. –  le Seigneur …  : litt. devant YHWH (est) son oint  ; cf. 2.10n  ; 12.3n.'
  - type: text
    content: 'Lorsqu''ils arrivèrent, il se dit, en voyant Eliab : A coup sûr, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a devant lui l''homme de son onction ! '
  '7':
  - type: note
    content: 'Ne prête pas attention à ou ne regarde pas. –  haute taille  : cf. 9.2 ; 10.23. –  je l''ai rejeté  : cf. v. 1 ; ici le sens peut être plus faible  : je ne l''ai pas choisi, cf. v. 8. –  Il ne s''agit pas… voit  : litt. pas ce que l''homme voit, c.-à-d. ce n''est pas ce que l''homme voit qui compte  ; LXX ce n''est pas ce que l''homme regarde que Dieu voit. –  ce qui frappe les yeux, c.-à-d. les apparences  ; litt. aux yeux. –  au cœur  : cf. 1R 8.39 ; Jr 11.20 ; 12.3 ; 17.10 ; 20.12 ; Ps 7.10 ; 17.3 ; Jb 10.4 ; Pr 15.11 ; 1Ch 28.9 ; Lc 16.15 ; voir aussi Es 55.8.'
  - type: text
    content: 'Mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Samuel : Ne prête pas attention à son apparence et à sa haute taille, car je l''ai rejeté. Il ne s''agit pas de ce que l''homme voit ; l''homme voit ce qui frappe les yeux, mais le '
  - type: text
    content: Seigneur
  - type: text
    content: ' voit au cœur. '
  '8':
  - type: note
    content: Abinadab 1Ch 2.13.
  - type: text
    content: 'Jessé appela Abinadab et le fit passer devant Samuel. Samuel dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas non plus choisi celui-ci. '
  '9':
  - type: note
    content: 'Shamma  : appelé Shiméa en 2S 13.3 ; 21.21 ; 1Ch 2.13.'
  - type: text
    content: 'Jessé fit passer Shamma, et Samuel dit : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' n''a pas non plus choisi celui-ci. '
