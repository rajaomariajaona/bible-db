document_id: PSA.4,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Exaucé au milieu de l'hostilité
  - type: text
    content: ' '
  - type: note
    content: 'Du (ou au  ; en hébreu, même préposition que pour de David  ; cf. 3.1n) chef de chœur  : cette expression, diversement traduite par les versions anciennes, revient 35 fois dans le psautier ; autre traduction de (ou à ) l''Excellent  ; cf. Ha 3.19 ; 1Ch 15.21. –  instruments à cordes  : cf. 6 ; 54–55 ; 61.1n  ; 67 ; 76 ; voir aussi 68.26 ; 1S 16.16ss ; 18.10 ; 2R 3.15 ; Es 38.20.'
  - type: text
    content: Du chef de chœur. Avec instruments à cordes. Psaume. De David.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'je crie  : autre traduction j''invoque  ; même verbe au v. 4 ; 3.5+. –  réponds-moi 17.6 ; 20.10 ; 102.3. –  Dans la détresse…  : ou, pour faire ressortir l''image contrastée de l''hébreu  : quand je suis à l''étroit, tu me mets au large  ; cf. 18.20 ; 25.17n  ; 31.9n  ; 118.5. –  Fais-moi grâce  : même verbe en 6.3 ; 9.14 ; 25.16 ; 26.11 ; 27.7 ; 30.11 ; 31.10 ; 37.21,26 ; 41.5,11 ; 51.3 ; 56.2 ; 57.2 ; 59.6 ; 67.2 ; 77.10 ; 86.3,16 ; 102.14 ; 109.12 ; 112.5 ; 119.29,58,132 ; 123.2s.'
  - type: text
    content: Quand je crie, réponds-moi, Dieu de ma justice !
  - type: text
    content: Dans la détresse, tu me mets au large.
  - type: text
    content: Fais-moi grâce, entends ma prière !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Hommes  : litt. fils d''homme  ; cf. 49.3n. –  ma gloire  : cf. 3.4+ ; 7.6n. –  confusion 35.4,26 ; 40.15 ; 44.10,16 ; 69.7s,20 ; 70.3 ; 71.13 ; 74.21 ; 109.29 ; cf. Ez 16.27n. –  ce qui est creux / mensonge  : cf. Jr 8.19n.'
  - type: text
    content: Hommes, jusqu'à quand ma gloire sera-t-elle changée en confusion ?
  - type: text
    content: Jusqu'à quand aimerez-vous ce qui est creux,
  - type: text
    content: 'rechercherez-vous le mensonge ? '
  - type: text
    content: Pause.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'distingue celui qui lui est fidèle  : texte incertain ; le mot rendu par fidèle dérive du terme traduit le plus souvent par bonté (25.10n) ; cf. 12.2 ; 145.17 ; voir aussi 18.26 ; 30.5 ; 31.24 ; 37.28 ; 50.5 ; 52.11 etc. Ici, quelques-uns modifient le texte hébreu traditionnel pour lire a montré pour moi une bonté étonnante , comme en 31.22. –  le Seigneur entend 6.10 ; 18.7 ; 34.7 ; 116.1 ; 145.19 ; Gn 16.11 ; Ex 2.24 ; 3.7 ; 22.22,26 ; Es 30.19 ; Jon 2.3 ; Né 9.9.'
  - type: text
    content: 'Sachez que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' distingue celui qui lui est fidèle ;'
  - type: text
    content: 'quand je l''invoque, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' entend.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Ep 4.26. – Voir cœur. –  sur votre lit  : cf. 149.5. –  taisez-vous 39.2-4 ; Ez 24.17 ; cf. Jb 2.10.'
  - type: text
    content: Agitez-vous, mais ne péchez pas ;
  - type: text
    content: parlez en votre cœur, sur votre lit,
  - type: text
    content: 'puis taisez-vous. '
  - type: text
    content: Pause.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'des sacrifices de justice  : c.-à-d. conformes à ce que Dieu demande ; 51.21 ; Dt 33.19 ; Ml 3.3. –  mettez votre confiance (v. 9n) dans le Seigneur 9.11 ; 18.31 ; 21.8 ; 22.5s ; 25.2 ; 26.1 ; 31.7 ; 32.10 ; 37.3 ; 52.10 ; 55.24 ; 56.4s ; 62.6,9 ; 71.5 ; 84.13 ; 86.2 ; 91.2 ; 104.27 ; 112.7 ; 115.9-11 ; 125.1 ; 143.8 ; Es 26.4 ; Jr 17.7n.'
  - type: text
    content: Offrez des sacrifices de justice
  - type: text
    content: 'et mettez votre confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Fais lever sur nous…  : traduction incertaine ; on pourrait aussi comprendre  : elle nous a quittés, la lumière…  ; cf. 31.17+ ; 44.4 ; 67.2 ; 80.4,8,20 ; 89.16 ; Nb 6.25s.'
  - type: text
    content: 'Beaucoup disent : Qui nous fera voir le bonheur ?'
  - type: text
    content: 'Fais lever sur nous la lumière de ta face, '
  - type: text
    content: Seigneur
  - type: text
    content: '  !'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ec 5.19. –  vin  : autre traduction vin nouveau , cf. Gn 27.28n.'
  - type: text
    content: Tu mets dans mon cœur plus de joie
  - type: text
    content: qu'au temps où abondent leur froment et leur vin.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'je m''endors en paix  : cf. 3.6+ ; Jb 11.18. –  toi seul…  : on pourrait aussi comprendre moi qui suis seul, tu me fais habiter en sécurité  ; ce dernier mot traduit un terme hébreu apparenté au verbe traduit par mettre sa confiance au v. 6 ; cf. Dt 12.10 ; 33.28.'
  - type: text
    content: Aussitôt couché, je m'endors en paix,
  - type: text
    content: 'car toi seul, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu me fais habiter en sécurité.'
