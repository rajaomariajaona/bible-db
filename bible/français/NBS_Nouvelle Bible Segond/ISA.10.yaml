document_id: ISA.10,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Quel malheur v. 5 ; 5.8-24 ; 29.15. –  décrets malfaisants  : litt. décrets d''injustice  ; cf. 1.13+ ; voir aussi 29.21 ; 59.4 ; Ps 94.20.'
  - type: text
    content: Quel malheur pour ceux qui promulguent des décrets malfaisants,
  - type: text
    content: qui écrivent des arrêts oppressifs,
  '10':
  - type: text
    content: ' '
  - type: note
    content: faux dieux 2.8n.
  - type: text
    content: De même que ma main a su trouver les royaumes des faux dieux,
  - type: text
    content: dont les statues dépassaient celles de Jérusalem et de Samarie,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'faux dieux / idoles  : cf. 37.12 ; Lv 19.4.'
  - type: text
    content: de même ce que j'ai fait à Samarie et à ses faux dieux,
  - type: text
    content: ne le ferai-je pas à Jérusalem et à ses idoles ?
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'son œuvre 5.12+. –  je ferai rendre des comptes ou j''interviendrai contre  ; cf. 13.11 ; 23.17n  ; 24.21-22n  ; 26.14,16n,21 ; 27.1,3n  ; 29.6. –  au roi d''Assyrie… cœur présomptueux  : litt. le fruit de la grandeur de cœur du roi d''Assyrie (cf. 9.8n). –  pour l''arrogance…  : litt. pour la parure (ou la splendeur , cf. 13.19) de l''élévation de ses yeux (cf. 37.23). – Cf. 2.12 ; 33.1.'
  - type: text
    content: 'Mais alors, quand le Seigneur aura accompli toute son œuvre au mont Sion, à Jérusalem, je ferai rendre des comptes au roi d''Assyrie pour le fruit de son cœur présomptueux et pour l''arrogance de ses regards hautains. '
  '13':
  - type: note
    content: 'par la force…  : cf. Dt 8.17. –  par ma sagesse 5.21. –  bousculé les frontières Dt 32.8 ; Ps 74.17 ; cf. 2R 17.6,24. –  comme un indomptable…  : autre traduction j''ai fait descendre ceux qui étaient installés comme un indomptable (cf. 1.24+). Au lieu de ceux qui étaient installés en maîtres, certains comprennent les habitants, le même verbe hébreu signifiant être installé ou assis (comme roi, ou comme juge) et habiter. – Cf. 37.24s.'
  - type: text
    content: 'Car il a dit :'
  - type: text
    content: C'est par la force de ma main que j'ai agi,
  - type: text
    content: c'est par ma sagesse, car je suis intelligent ;
  - type: text
    content: j'ai bousculé les frontières des peuples,
  - type: text
    content: je les ai dépouillés de leurs trésors
  - type: text
    content: et, comme un indomptable,
  - type: text
    content: j'ai fait descendre ceux qui étaient installés.
  '14':
  - type: text
    content: ' '
  - type: note
    content: richesse 8.4n. –  poussé un pépiement 8.19n.
  - type: text
    content: Ma main a su trouver, comme au nid, la richesse des peuples,
  - type: text
    content: et, comme on ramasse des œufs abandonnés,
  - type: text
    content: 'j''ai ramassé toute la terre :'
  - type: text
    content: nul n'a remué l'aile,
  - type: text
    content: ni ouvert le bec, ni poussé un pépiement.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'hache / scie 14.8 ; 37.24 ; cf. 29.16 ; 45.9. –  se vante-t-elle  : le même verbe est traduit par montrer sa splendeur en 44.23 ; 49.3 ; 60.21 ; 61.3. –  bâton / trique v. 5+.'
  - type: text
    content: La hache se vante-t-elle aux dépens de celui qui s'en sert ?
  - type: text
    content: La scie se grandit-elle aux dépens de celui qui la manie ?
  - type: text
    content: Comme si le bâton maniait celui qui le soulève,
  - type: text
    content: comme si la trique soulevait celui qui n'est pas en bois !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur… des Armées v. 33 ; 1.24n. –  dépérissement Ps 106.15. –  ses hommes corpulents  : litt. ses corpulents. –  parmi ses nobles  : autre traduction sous sa gloire  ; cf. v. 3n  ; 5.13n. –  feu 9.1,4 ; 26.11 ; cf. 1.31+ ; 31.9.'
  - type: text
    content: 'C''est pourquoi le Seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, enverra'
  - type: text
    content: le dépérissement parmi ses hommes corpulents.
  - type: text
    content: Et, parmi ses nobles, s'allumera un embrasement,
  - type: text
    content: tel l'embrasement d'un feu.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Saint v. 20 ; 1.4+. –  épines / ronces 5.6+. –  en un seul jour 9.13 ; cf. 27.4 ; 37.36.
  - type: text
    content: La lumière d'Israël deviendra un feu,
  - type: text
    content: et son Saint une flamme
  - type: text
    content: qui brûlera et dévorera ses épines et ses ronces
  - type: text
    content: en un seul jour ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'anéantira  : un terme apparenté est traduit par destruction au v. 22. –  corps et âme  : litt. depuis l''âme (cf. Gn 1.20n) jusqu''à la chair. –  forêt / verger 29.17+ ; cf. 2.12s ; 9.17. –  comme d''un malade qui tombe en défaillance  : le sujet et le verbe sont de la même racine, de sens incertain (voir 8.6n) ; cf. Ps 39.4.'
  - type: text
    content: qui anéantira, corps et âme,
  - type: text
    content: la gloire de sa forêt et de son verger.
  - type: text
    content: Il en sera comme d'un malade qui tombe en défaillance.
  '19':
  - type: text
    content: ' '
  - type: note
    content: reste v. 20s ; 1.9+.
  - type: text
    content: Le reste des arbres de sa forêt feront un compte
  - type: text
    content: qu'un enfant pourrait inscrire.
  - type: heading
    content: Un reste reviendra
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'justice / pauvres  : cf. 3.14-15+. –  dépouillant…  : cf. Ec 5.7n. –  veuves / orphelins 1.17+. –  butin  : hébreu shalal , cf. 8.1,3. –  pillant  : même racine en 8.1,3 ( Baz ).'
  - type: text
    content: refusant aux faibles la justice,
  - type: text
    content: dépouillant de leur droit les pauvres de mon peuple,
  - type: text
    content: faisant des veuves leur butin
  - type: text
    content: et pillant les orphelins !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 's''appuyer sur celui qui les frappait  : cf. 9.12 ; il s''agit sans doute ici de l''Assyrie 2R 16.7ss ; Os 5.13 ; 2Ch 28.16ss. –  loyauté Os 4.1n. –  Saint d''Israël v. 17.'
  - type: text
    content: 'En ce jour-là, le reste d''Israël et les rescapés de la maison de Jacob cesseront de s''appuyer sur celui qui les frappait ; ils s''appuieront avec loyauté sur le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Saint d''Israël. '
  '21':
  - type: note
    content: 'Un reste (1.9+) reviendra (1.27n) : hébreu she''ar yashouv, nom du fils d''Esaïe (7.3n), de même au v. 22 ; voir aussi 1.27n. –  Dieu-Héros 9.5n.'
  - type: text
    content: 'Un reste reviendra, le reste de Jacob, au Dieu-Héros. '
  '22':
  - type: note
    content: Rm 9.27. –  comme le sable… 48.19 ; Gn 22.17 ; Os 2.1 ; Ha 1.9. –  seul un reste reviendra v. 21n. –  destruction… décidée 14.24+ ; 28.22 ; Dn 5.28n  ; 9.27 ; Rm 9.28n. –  un déferlement ou une inondation 8.8 ; 28.2n,15-18 ; 30.28. – Voir justice.
  - type: text
    content: 'Quand Israël, ton peuple, serait comme le sable de la mer, seul un reste reviendra. La destruction est décidée, c''est un déferlement de justice. '
  '23':
  - type: note
    content: Rm 9.28.
  - type: text
    content: 'Car cette destruction qui est décidée, le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées l''exécute dans tout le pays.'
  - type: heading
    content: Le Seigneur se tournera contre l'Assyrie
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'n''aie pas peur de l''Assyrien 37.6. –  trique / bâton v. 5+ ; cf. v. 26+. –  comme le faisait l''Egypte  : autre traduction sur le chemin de l''Egypte  ; de même au v. 26 ; cf. 52.4 ; Ex 5.14-16.'
  - type: text
    content: 'A cause de cela, ainsi parle le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: ' (YHWH) des Armées : Mon peuple, toi qui habites en Sion, n''aie pas peur de l''Assyrien ! Il te frappe de la trique, il lève sur toi son bâton, comme le faisait l''Egypte. '
  '25':
  - type: note
    content: 'la fureur…  : autres traductions ma fureur et ma colère, qui voulaient leur ruine, cesseront ; ma fureur et ma colère extermineront jusqu''à leur ruine. Des mss portent un mot qu''on pourrait traduire par extermination au lieu de ruine, ce qui représente une variante d''une lettre en hébreu. Certains modifient le texte hébreu traditionnel pour traduire la fureur cessera, et ma colère sera complètement assouvie, ou … et ma colère contre la terre sera assouvie. Voir 31.8s ; 37.36.'
  - type: text
    content: 'Mais encore un peu de temps, et la fureur cessera ; ma colère sera leur ruine. '
  '26':
  - type: note
    content: 'brandira  : litt. éveillera  ; cf. 13.17n  ; 14.9 ; 2S 23.18. –  défaite  : le mot hébreu correspondant est parfois traduit par coup, cf. 1S 4.10n. –  Madiân 9.3n. –  rocher d''Oreb Jg 7.25 ; Ps 83.12. –  bâton / comme en Egypte v. 24n  ; 11.11,15s ; 30.31s ; cf. Ex 14.16.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées brandira le fouet contre lui, comme à la défaite de Madiân au rocher d''Oreb ; son bâton est sur la mer, il l''élève comme en Egypte. '
  '27':
  - type: note
    content: 'son fardeau…  : cf. 9.3n  ; 14.25. –  tu seras si gras…  : litt. le joug sera détruit à cause de la graisse (symbole d''abondance, cf. Gn 27.39n  ; 45.18n) ; autres traductions le joug cédera sous la pression de la graisse ou le joug cédera devant l''abondance  ; certains modifient le texte hébreu traditionnel pour lire l''ennemi monte à Samarie ou le destructeur s''avance du côté de Rimmôn  ; LXX le joug qui était sur vos épaules sera détruit.'
  - type: text
    content: En ce jour-là,
  - type: text
    content: son fardeau sera ôté de ton épaule
  - type: text
    content: et son joug de ton cou ;
  - type: text
    content: tu seras si gras que le joug cédera.
  - type: heading
    content: Guerre éclair aux environs de Jérusalem
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Jusqu''au v. 32, description d''une armée qui progresse par étapes vers Jérusalem. Les localités citées se situent au nord de la capitale, à une quinzaine de kilomètres pour les plus éloignées et dans les faubourgs mêmes pour les plus proches. Cf. 5.26 ; Mi 1.10-12. –  Ayyath  : probablement Aï (Gn 12.8 ; Jos 7.2 ; Esd 2.28) ou Avvim (Jos 18.23) ; cf. Né 11.31. –  Migrôn 1S 14.2. –  Mikmas ou Mikmash  ; 1S 13.2ss.'
  - type: text
    content: Il arrive à Ayyath, traverse Migrôn,
  - type: text
    content: laisse son équipement à Mikmas.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Ils passent  : LXX il passe. –  le défilé 1S 13.23 ; 14.4. –  Guéba Jos 18.24 ; 1S 13.3 ; 14.5 ; 2S 5.25 ; 1R 15.22 ; 2R 23.8 ; Esd 2.26. –  Rama Jos 18.25 ; Jg 19.13 ; 1S 1.19 ; 7.17 ; 1R 15.17,22. –  Guibéa de Saül Jos 15.57 ; 18.28 ; 1S 10.26 ; 14.2 ; 15.34.'
  - type: text
    content: Ils passent le défilé
  - type: text
    content: – Notre campement est à Guéba ! –
  - type: text
    content: Rama tremble,
  - type: text
    content: Guibéa de Saül prend la fuite.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Que ferez-vous Jr 5.31 ; Jb 31.14. –  le jour (2.12) où vous allez rendre des comptes  : autre traduction au jour du châtiment  ; cf. Jr 6.15n. –  Vers qui fuirez-vous 20.6 ; 24.18 ; 30.16s. –  votre gloire  : autre traduction votre richesse  ; cf. 5.13n  ; 61.6 ; voir aussi Gn 31.1n  ; Jg 18.21n. – Cf. 2.7-21 ; So 1.18.'
  - type: text
    content: Que ferez-vous le jour où vous allez rendre des comptes,
  - type: text
    content: le jour où la tourmente arrivera de loin ?
  - type: text
    content: Vers qui fuirez-vous pour trouver du secours,
  - type: text
    content: et où laisserez-vous votre gloire ?
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Bath-Gallim  : litt. fille de Gallim  ; cf. v. 32n  ; 1S 25.44 ( ?). –  Laïsha ( Lionne ) n''est pas à confondre avec la Laïsh de Jg 18.7, dans la tribu de Dan. –  Anatoth (Jos 21.18 ; Jr 1.1 ; 11.21 ; 23 ; 32.7s). Le mot traduit par Pauvre ( ‘aniya ) fait aussi assonance avec ce nom de lieu.'
  - type: text
    content: Eclate en sanglots, Bath-Gallim.
  - type: text
    content: Prête attention, Laïsha !
  - type: text
    content: Pauvre Anatoth !
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Madména (probablement pas la Madmanna de Jos 15.31, au sud) / Guébim ( Citernes ) : localités inconnues.'
  - type: text
    content: Madména se disperse,
  - type: text
    content: les habitants de Guébim cherchent un refuge.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Nob 2S 21.2 ; 22.9,19 : aujourd''hui le mont Scopus, au nord du mont des Oliviers, d''où l''on domine Jérusalem. –  il agite…  : cf. 11.15 ; 13.2 ; 19.16 ; 30.28n,32n  ; Jb 31.21. –  Sion la belle  : litt. la fille de Sion ou, selon une autre lecture traditionnelle, la maison de Sion  ; cf. v. 30n  ; voir 1.8n.'
  - type: text
    content: Aujourd'hui même une halte à Nob,
  - type: text
    content: et il agite sa main
  - type: text
    content: contre la montagne de Sion la belle,
  - type: text
    content: la colline de Jérusalem.
  - type: heading
    content: La puissante forêt abattue
  '33':
  - type: text
    content: ' '
  - type: note
    content: les plus hautes cimes ou ceux qui sont de haute stature.
  - type: text
    content: 'Le Seigneur, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: 'brise les rameaux avec violence :'
  - type: text
    content: les plus hautes cimes sont coupées,
  - type: text
    content: les plus élevés sont jetés bas.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'taillis 9.17n. –  le Liban…  : LXX le Liban et ses hauteurs (ou splendeurs , autre lecture du terme rendu par Magnifique ) tombent , allusion probable aux forêts de cèdres qui couvraient la chaîne montagneuse du Liban dans l''Antiquité ; cf. v. 18s ; 2.13+ ; 29.17 ; 33.9 ; 35.2 ; 37.24 ; Na 1.4.'
  - type: text
    content: Il abat par le fer les taillis de la forêt,
  - type: text
    content: et le Liban tombe sous le Magnifique.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Il ne reste qu''à se courber  : litt. sans qu''il se courbe. Cf. Jr 15.2 ; Lm 3.28-30.'
  - type: text
    content: Il ne reste qu'à se courber avec les détenus
  - type: text
    content: et à tomber avec ceux qui sont tués.
  - type: text
    content: Malgré tout cela, sa colère ne s'en retourne pas,
  - type: text
    content: sa main est encore étendue.
  - type: heading
    content: Quel malheur pour l'Assyrie et pour son roi !
  '5':
  - type: text
    content: ' '
  - type: note
    content: Assyrien v. 24-27 ; 14.24-27 ; 30.27-33 ; 37.22-35. –  bâton / trique (v. 15,24 ; 9.3n), instrument de Dieu, 5.26-30 ; 7.18,20 ; 8.7 ; cf. 13.5 ; 30.27 ; 36.10 ; 37.26 ; Jr 51.20-23 ; ici la traduction est incertaine ; en modifiant l'ordre des mots on pourrait comprendre le bâton de ma colère, la trique de ma fureur est dans sa (litt. leur ) main.
  - type: text
    content: Quel malheur pour l'Assyrien,
  - type: text
    content: le bâton de ma colère !
  - type: text
    content: La trique dans sa main,
  - type: text
    content: c'est ma fureur.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'dépêche  : cf. Ps 42.9n. –  le peuple qui provoque ma colère  : litt. le peuple de ma colère  ; cf. 1.4 ; Jr 7.29. –  amasse du butin / se livrant au pillage  : hébreu shelol shalal / boz baz  : cf. 8.1-4 ; 10.2. –  comme la boue 41.25 ; 2S 22.43.'
  - type: text
    content: Je le lâche contre une nation impie,
  - type: text
    content: je le dépêche contre le peuple qui provoque ma colère,
  - type: text
    content: pour qu'il amasse du butin en se livrant au pillage,
  - type: text
    content: pour qu'il le foule aux pieds comme la boue des rues.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Mi 4.11s. –  qu''il le pense  : litt. que son cœur le pense. –  il songe…  : litt. pour détruire est son cœur  ; cf. 63.4. –  nombreuses  : litt. pas un peu ou pas en petit nombre.'
  - type: text
    content: Mais il n'en juge pas ainsi,
  - type: text
    content: et ce n'est pas ainsi qu'il le pense ;
  - type: text
    content: car il songe à détruire,
  - type: text
    content: à retrancher des nations nombreuses ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'il dit…  : 36.18-20. –  princes / rois 36.9. –  autant de 1.28n.'
  - type: text
    content: 'car il dit :'
  - type: text
    content: Mes princes ne sont-ils pas autant de rois ?
  '9':
  - type: text
    content: ' '
  - type: note
    content: Villes syriennes (à l'exception de Samarie , capitale de l'Israël du Nord) conquises par les rois assyriens Tiglath-Piléser III et Sargon II entre 742 ( Hamath ) et 717 av. J.-C. ( Karkemish ) environ. L'énumération, par couples, suit une progression du nord au sud qui accentue la menace sur Jérusalem. Cf. 36.19 ; 37.13. –  Kalno Gn 10.10. –  Samarie / Damas 8.4.
  - type: text
    content: N'en a-t-il pas été de Kalno comme de Karkemish ?
  - type: text
    content: Ou encore de Hamath comme d'Arpad ?
  - type: text
    content: Ou encore de Samarie comme de Damas ?
