document_id: MAL.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Commandement aux prêtres
  - type: text
    content: ' '
  - type: note
    content: prêtres 1.6+.
  - type: text
    content: Maintenant, à vous ce commandement, prêtres !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jb 31.15 ; Pr 22.2. –  un seul Père  : cf. 1.6+ ; Es 63.16 ; Jr 3.4 ; Mt 23.9 ; Jn 8.41 ; 1Co 8.6 ; Ep 4.6. –  Dieu  : hébreu ’El , de même au v. 11 ; cf. Gn 21.33n. –  créés Gn 1.1n  ; cf. Es 43.1,15. –  nous trahissons-nous v. 11,14-16. –  en profanant…  : autre traduction profanant ainsi l''alliance…  ; cf. v. 4+ ; Ex 19.5 ; 24.8 ; Né 9.8.'
  - type: text
    content: N'avons-nous pas tous un seul Père ?
  - type: text
    content: N'est-ce pas un seul Dieu qui nous a créés ?
  - type: text
    content: Pourquoi donc nous trahissons-nous les uns les autres,
  - type: text
    content: en profanant l'alliance de nos pères ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'trahi v. 10+ ; Jr 3.20 ; 5.11 ; Os 5.7 ; 6.7. –  abomination Dt 7.25n. –  profané  : cf. Lv 18.25 ; Jr 3.9 ; 16.18 ; Ez 36.17. –  le bien sacré du Seigneur  : autre traduction le sanctuaire du Seigneur  ; voir saint. –  ce qu''il aime  : on peut comprendre ce que le Seigneur aime  ; certains comprennent lui qui aime le Seigneur . –  il s''est marié…  : cf. 1R 11.1ss ; Esd 9–10 ; Né 13.23ss ; sur l''expression la fille d''un dieu , cf. Dt 32.19.'
  - type: text
    content: Juda a trahi ;
  - type: text
    content: une abomination a été commise
  - type: text
    content: en Israël et à Jérusalem.
  - type: text
    content: 'Car Juda a profané le bien sacré du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ce qu''il aime : il s''est marié à la fille d''un dieu étranger. '
  '12':
  - type: note
    content: 'retranchera Lv 7.20n  ; Mi 5.9ss. –  celui qui veille et celui qui répond  : expression obscure, que l''on comprend habituellement comme une expression de la totalité (en l''occurrence, de la famille sur qui s''abat le châtiment ; cf. pas de quartier) ; certains l''ont cependant appliquée à Dieu  : il y veille et il en répond  ; LXX jusqu''à ce qu''il soit humilié  ; Tg son fils et son petit-fils. Beaucoup modifient le texte hébreu traditionnel pour lire témoin et répondant  ; il pourrait alors s''agir d''une expression désignant l''ensemble des parties concernées par l''affaire. –  tentes de Jacob Nb 24.5 ; 1R 12.16.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' retranchera l''homme qui fait cela – celui qui veille et celui qui répond ; il le retranchera des tentes de Jacob, il retranchera celui qui apporte une offrande au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Za 7.3 ; 8.18s. –  parce qu''il ne se tourne plus  : cf. 1.10+ ; voir aussi Es 1.15 ; Am 5.22.'
  - type: text
    content: 'Voici, en deuxième lieu, ce que vous faites :'
  - type: text
    content: 'vous couvrez l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ' de larmes,'
  - type: text
    content: de pleurs et de gémissements,
  - type: text
    content: parce qu'il ne se tourne plus vers l'offrande
  - type: text
    content: et qu'il n'agrée plus rien de votre main.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur a été témoin…  : cf. 3.5 ; Gn 31.48s. –  la femme de ta jeunesse Es 54.6 ; Pr 5.18s. –  ta compagne  : forme unique dérivée d''un verbe signifiant lier , qui fait assonance avec le mot pour alliance (v. 4+). –  la femme de ton alliance ou ton alliée , Ab 7n  ; cf. Ez 16.8 ; voir aussi Ep 5.25ss.'
  - type: text
    content: 'Et vous dites : « Pourquoi ? »'
  - type: text
    content: 'Parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a été témoin'
  - type: text
    content: entre toi et la femme de ta jeunesse
  - type: text
    content: que tu as trahie,
  - type: text
    content: bien qu'elle soit ta compagne
  - type: text
    content: et la femme de ton alliance.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Texte très obscur, fort diversement traduit par les versions anciennes et modernes ; certains y voient une allusion à l''histoire d''Abraham (Gn 16), d''autres pensent qu''il vise un cas de répudiation contemporain de Malachie ; avec quelques modifications de texte, d''autres encore y devinent une allusion à Gn 2.7,23s et traduisent  : N''a-t-il pas fait un seul être de chair et d''esprit  ? Et cet unique, que cherche-t-il ? une descendance de Dieu . Dans notre traduction bon sens (on pourrait aussi comprendre vitalité ) et esprit traduisent un même mot hébreu, habituellement rendu par souffle . Sur l''importance de la descendance en Israël, cf. Gn 1.28 ; 30.1-24 ; Lv 20.20 ; Dt 25.5ss ; Ps 127. –  Prenez donc garde…  : litt. vous garderez en votre esprit (vitalité ?) v. 16 ; cf. Dt 2.4 ; 4.15. –  sa jeunesse  : litt. ta jeunesse  ; plusieurs mss hébreux et versions anciennes ont lu ne trahis pas la femme de ta jeunesse (v. 14+).'
  - type: text
    content: Personne n'a fait cela,
  - type: text
    content: avec un reste de bon sens en lui.
  - type: text
    content: Un seul l'a fait, et pourquoi ?
  - type: text
    content: Parce qu'il cherchait
  - type: text
    content: la descendance que Dieu lui avait promise.
  - type: text
    content: Prenez donc garde à votre esprit.
  - type: text
    content: Que personne ne trahisse la femme de sa jeunesse !
  '16':
  - type: text
    content: ' '
  - type: note
    content: Texte incertain ; autre traduction il déteste la répudiation… et il couvre de violence… Certains modifient légèrement la vocalisation traditionnelle du texte pour lire répudier par haine, dit le Seigneur…, c'est couvrir de violence son vêtement  ; cf. Ps 73.6. Certains voient dans cette dernière expression une allusion au cérémonial du mariage, où le mari couvrait la femme du pan de son vêtement (Ez 16.8 ; Rt 3.9). Sur la répudiation , voir aussi Dt 24.1 ; Mt 5.32 ; 19.6ss.
  - type: text
    content: Car détestable est la répudiation
  - type: text
    content: '– dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël –'
  - type: text
    content: comme celui qui couvre de violence son vêtement
  - type: text
    content: '– dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: text
    content: Vous prendrez donc garde à votre esprit,
  - type: text
    content: et vous ne trahirez pas.
  - type: heading
    content: Le messager du jugement
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Vous fatiguez le Seigneur  : cf. 1.13 (autre terme) ; Es 43.24. –  En quoi… 1.2+. –  Quiconque agit mal…  : cf. 3.15,18 ; Es 5.19s ; 66.5 ; Jr 12.1s ; 17.15 ; Ha 1.13 ; So 1.12 ; Ps 10.4,13 ; 37.1 ; 73.3ss ; Jb 19.7 ; 21.7ss ; 30.20 ; Ec 8.11,14 ; 9.2s ; 2P 3.4. –  plaît au Seigneur  : litt. est bon aux yeux de YHWH . –  qu''il prend plaisir ou qu''il prendrait plaisir . –  jugement  : le mot hébreu correspondant (de même en 3.5) est souvent traduit par droit.'
  - type: text
    content: 'Vous fatiguez le '
  - type: text
    content: Seigneur
  - type: text
    content: ' par vos paroles,'
  - type: text
    content: 'et vous dites :'
  - type: text
    content: « En quoi le fatiguons-nous ? »
  - type: text
    content: 'C''est en disant : « Quiconque agit mal'
  - type: text
    content: 'plaît au '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: c'est en de telles personnes qu'il prend plaisir ! »
  - type: text
    content: 'Ou bien : « Où est le Dieu du jugement ? »'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'ne décidez pas  : litt. ne mettez pas sur le cœur  ; cf. Dt 11.18n  ; Es 47.7 ; 57.1,11n  ; Jr 12.11 ; Dn 1.8n. –  donner gloire  : cf. 1.6n  ; voir aussi Jos 7.19 ; 1S 6.5 ; Es 42.12 ; Jr 13.16 ; Ps 115.1 ; Jn 9.24 ; Ac 12.23 ; Ap 11.13. –  j''enverrai… la malédiction Dt 28.20 ; cf. Gn 27.12s,34ss ; Za 5.3s ; Ps 109.17ss ; Pr 3.33 ; 2Ch 34.24. –  je maudirai (1.14) vos bénédictions ou votre bénédiction (LXX) ; la deuxième fois le texte hébreu porte seulement je la maudis ou je l''ai maudite  ; cf. 3.10 ; Lv 26 ; Nb 6.23ss ; Dt 21.5 ; 27–28 ; voir aussi Dt 23.6 ; Né 13.2.'
  - type: text
    content: Si vous n'écoutez pas,
  - type: text
    content: si vous ne décidez pas
  - type: text
    content: de donner gloire à mon nom,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: j'enverrai parmi vous la malédiction
  - type: text
    content: et je maudirai vos bénédictions ;
  - type: text
    content: oui, je maudis votre bénédiction,
  - type: text
    content: parce que vous ne vous décidez pas.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'A cause de vous…  : texte et traduction incertains ; LXX je brise votre bras (peut-être au sens de je vous arrache votre sacerdoce ) ; cf. 1S 2.31n  ; Za 11.17. –  je… jetterai  : litt. je disséminerai . –  du fumier  : litt. des excréments , ou peut-être des vomissures  ; il s''agit de ce qui était retiré des intestins ou de l''estomac des animaux offerts en sacrifice  ; cf. Ex 29.14 ; Lv 4.11s ; 8.17 ; 16.27 ; Nb 19.5. –  on vous emportera  : litt. il vous portera . –  avec lui  : traduction incertaine, d''après LXX et Syr  ; hébreu vers lui.'
  - type: text
    content: A cause de vous je rabroue votre descendance ;
  - type: text
    content: je vous jetterai du fumier au visage,
  - type: text
    content: le fumier de vos fêtes,
  - type: text
    content: et on vous emportera avec lui.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'alliance (v. 5,8,10,14 ; 3.1) avec Lévi  : cf. 3.3 ; sur le sacerdoce lévitique, cf. Ex 28 ; 32.25ss ; Nb 25.10ss ; Dt 18.1ss ; 33.8ss ; Jr 33.20ss ; Ps 106.30s ; Né 13.29.'
  - type: text
    content: Vous saurez alors
  - type: text
    content: que je vous ai adressé ce commandement,
  - type: text
    content: afin que mon alliance avec Lévi demeure,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: paix Ez 37.26. –  la terreur de mon nom Dt 1.21 ; voir crainte.
  - type: text
    content: Mon alliance demeurait avec lui,
  - type: text
    content: c'était la vie et la paix.
  - type: text
    content: Je les lui ai données pour qu'il me craigne,
  - type: text
    content: et il a eu pour moi de la crainte.
  - type: text
    content: Il a eu la terreur de mon nom.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'loi ou enseignement , hébreu tora  : sur le sens de ce mot en rapport avec le sacerdoce, cf. v. 7 ; Dt 21.5 ; 33.8ss,10n  ; Mi 3.11n  ; Ag 2.11nss ; voir aussi Lv 10.11 ; Jr 2.8 ; 18.18 ; Ez 7.26 ; Os 4.6 ; Za 7.3 ; Esd 7.10,25 ; Né 8.1ss ; 2Ch 15.3 ; 17.7ss. –  de vérité ou de loyauté  ; cf. Ps 85.11n  ; 119.142 ; Né 9.13. –  pas d''injustice sur ses lèvres  : cf. Es 59.3 ; voir justice. –  marchait avec moi Gn 5.22,24 ; 6.9 ; Mi 6.8. –  faute  : voir péché.'
  - type: text
    content: Une loi de vérité était dans sa bouche,
  - type: text
    content: on ne trouvait pas d'injustice sur ses lèvres ;
  - type: text
    content: il marchait avec moi dans la paix et dans la droiture,
  - type: text
    content: ramenant de la faute une multitude.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'V. 6n. –  messager (ou ange , hébreu mal''ak ) du Seigneur  : cf. 1.1n  ; la figure du messager du Seigneur peut servir à évoquer une intervention de Dieu lui-même ; cf. Gn 16.7ss ; Ex 3.2ss ; Nb 22.22s ; Jos 5.13ss ; Jg 5.23 ; 6.11ss ; 13.3ss ; voir aussi Es 44.26 ; Ag 1.13 ; 2Ch 36.15.'
  - type: text
    content: Car les lèvres du prêtre
  - type: text
    content: gardent la connaissance ;
  - type: text
    content: c'est à sa bouche qu'on demande la loi,
  - type: text
    content: parce que c'est un messager
  - type: text
    content: 'du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'écartés de la voie ou du chemin  ; cf. Ex 32.8 ; Dt 9.12,16 ; 11.28 ; 31.29 ; Jg 2.17 ; 1S 12.20s ; 2R 22.2. –  fait trébucher  : cf. Jr 18.15 ; So 1.3n  ; Pr 4.16 ; 2Ch 28.23. –  violé l''alliance des lévites v. 4+ ; Né 13.29.'
  - type: text
    content: Mais vous, vous vous êtes écartés de la voie,
  - type: text
    content: vous avez fait trébucher une multitude au moyen de la loi.
  - type: text
    content: Vous avez violé l'alliance des lévites,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'mépris  : cf. 1.7,12. –  ne gardez pas mes voies Gn 18.19 ; Jg 2.22 ; 2S 22.22. –  vous faites preuve de favoritisme  : litt. vous relevez la face (voir 1.8n) dans (ou par ) la loi  ; cf. Lv 19.15 ; Dt 10.17 ; Ps 82.2ss ; Rm 2.11+ ; Jc 2.1ss ; voir aussi Dt 17.8s ; 19.17 ; Mi 3.5.'
  - type: text
    content: Quant à moi, je vous ai livrés
  - type: text
    content: au mépris et à l'abaissement
  - type: text
    content: devant tout le peuple,
  - type: text
    content: parce que vous ne gardez pas mes voies
  - type: text
    content: et que vous faites preuve de favoritisme
  - type: text
    content: au moyen de la loi.
  - type: heading
    content: Rupture d'alliance
