document_id: 2CH.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: HISTOIRE DE SALOMON, ROI D'ISRAËL
  - type: heading
    content: Salomon demande à Dieu la sagesse pour régner
  - type: heading
    content: 1R 3.4-15
  - type: text
    content: ' '
  - type: note
    content: 'Le rédacteur des Chroniques suit de près le texte parallèle des Rois ; les principales différences entre les deux textes seront signalées dans les notes. –  devint fort  : cf. 12.13 ; 13.7,21 ; 17.1 ; 21.4 ; 23.1 ; 25.11 ; 27.6 ; 32.5.'
  - type: text
    content: 'Salomon, fils de David, devint fort dans sa royauté ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, était avec lui et l''éleva très haut. '
  '10':
  - type: note
    content: 'que je sache conduire…  : litt. que je sorte devant ce peuple et que je rentre  ; dans des contextes militaires, l''expression peut signifier mener les troupes en campagne et les ramener victorieuses  ; cf. Nb 27.17n  ; Jos 14.11 ; voir aussi Dt 28.6n  ; 31.2 ; 1R 3.7n. –  gouverner  : litt. juger  ; cf. Jg 2.16n  ; Rt 1.1n.'
  - type: text
    content: 'Donne-moi maintenant sagesse et connaissance, afin que je sache conduire ce peuple ! Qui donc peut gouverner ton peuple, ce peuple si grand ? '
  '11':
  - type: note
    content: 'ce qui est dans ton cœur 2S 7.3n. –  tes ennemis  : litt. ceux qui te détestent (autre terme en 1R 3.11) ; même expression en 2S 19.7.'
  - type: text
    content: 'Dieu dit à Salomon : Puisque c''est là ce qui est dans ton cœur, puisque tu ne demandes ni richesse, ni biens, ni gloire, ni la mort de tes ennemis, que tu ne demandes pas même une longue vie, puisque tu demandes sagesse et connaissance afin de gouverner mon peuple, sur lequel je t''ai investi de la royauté, '
  '12':
  - type: note
    content: 'la sagesse et la connaissance v. 10. –  richesse, biens et gloire  : cf. Ec 6.2.'
  - type: text
    content: la sagesse et la connaissance te sont données. Je te donnerai richesse, biens et gloire, comme n'en ont jamais eu les rois qui étaient avant toi et comme n'en auront jamais plus ceux qui viendront après toi.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Texte difficile ; on pourrait lire Salomon vint au haut lieu de Gabaon, à Jérusalem… ( ?) ; d''après des versions anciennes, certains modifient le texte hébreu traditionnel pour lire Salomon vint du haut lieu de Gabaon à Jérusalem… –  il régna  : autre traduction il devint roi.'
  - type: text
    content: Salomon – qui se trouvait au haut lieu de Gabaon – vint à Jérusalem, depuis la tente de la Rencontre, et il régna sur Israël.
  - type: heading
    content: Puissance et richesse de Salomon
  - type: heading
    content: 9.25-28  ; 1R 10.26-29
  '14':
  - type: text
    content: ' '
  - type: note
    content: équipages 1R 5.6n.
  - type: text
    content: 'Salomon rassembla des chars et des équipages ; il avait mille quatre cents chars et douze mille équipages, qu''il installa dans des villes de garnison et à Jérusalem, près du roi. '
  '15':
  - type: note
    content: 'Bas-Pays  : hébreu shephéla.'
  - type: text
    content: 'Le roi rendit l''argent et l''or aussi communs à Jérusalem que les pierres ; il rendit les cèdres aussi nombreux que les sycomores qui sont dans le Bas-Pays. '
  '16':
  - type: note
    content: Cf. 1R 10.28n.
  - type: text
    content: 'On amenait les chevaux pour Salomon d''Egypte et de Qevé. Les marchands du roi allaient les acheter à Qevé : '
  '17':
  - type: note
    content: 'ils faisaient monter  : litt. ils faisaient monter et sortir, cf. Gn 12.10n. –  six cents sicles d''argent (litt. six cents d''argent) : environ 6 kg ; cent cinquante sicles (litt. cent cinquante) : environ 1,5 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: ils faisaient monter d'Egypte un char pour six cents sicles d'argent, et un cheval pour cent cinquante sicles. Ils en amenaient aussi avec eux pour tous les rois des Hittites et pour les rois d'Aram.
  - type: heading
    content: Salomon prépare la construction du temple
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Certaines versions commencent ici le chap. 2, et la numérotation de la suite est décalée en conséquence. –  ordonna  : litt. dit . –  une maison pour le nom du Seigneur  : cf. 2.3 ; 6.7s,10 ; 1R 5.17+ ; 8.17 ; 1Ch 22.7 ; voir aussi 1Ch 28.3 ; 29.16. –  une maison royale  : litt. une maison pour son règne (ou sa royauté ), de même en 2.11.'
  - type: text
    content: 'Salomon ordonna que l''on bâtisse une maison pour le nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et une maison royale pour lui-même.'
  '2':
  - type: note
    content: 'Salomon parla…  : le déplacement de Salomon à Gabaon est ici l''occasion d''un grand rassemblement national. –  chefs  : ces mots rendent deux mots hébreux différents : le premier peut également être rendu par prince (c''est un autre terme qui est ainsi traduit dans la suite du v.) ; le second a aussi le sens de tête. –  à tous les princes de tout Israël  : cf. 5.2.'
  - type: text
    content: 'Salomon parla à tout Israël, aux chefs de mille et de cent, aux juges, à tous les princes de tout Israël, aux chefs de famille. '
  '3':
  - type: note
    content: 'Cf. 1Ch 21.29. –  Salomon… avec toute l''assemblée  : 1R 3.4 le roi. –  haut lieu qui était à Gabaon Jos 9.3n  ; 1Ch 16.39+. –  la tente de la Rencontre  : cf. Ex 27.21 ; 33.7. Cette explication est propre aux Chroniques.'
  - type: text
    content: 'Salomon se rendit avec toute l''assemblée au haut lieu qui était à Gabaon, car c''est là qu''était la tente de la Rencontre de Dieu, celle que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avait faite dans le désert ; '
  '4':
  - type: note
    content: 'David l''avait fait monter…  : cf. 2S 6.1-23 ; 1Ch 13.5-14 ; 15.25-29 ; 16.1-3. –  à la place…  : LXX car il lui a préparé une tente à Jérusalem.'
  - type: text
    content: 'mais le coffre de Dieu, David l''avait fait monter de Qiriath-Yéarim à la place qu''il lui avait préparée, car il avait dressé pour lui une tente à Jérusalem. '
  '5':
  - type: note
    content: 'l''autel de bronze  : cf. Ex 27.1-8 ; 38.1-7. –  Betsaléel  : cf. Ex 31.2-5 ; 35.30-33 ; 36.1-3. –  il l''avait placé  : d''après certains mss, Syr et Tg  ; d''autres mss, LXX et Vg portent  : (il se trouvait) là. –  cherchèrent le Seigneur  : litt. le cherchèrent  ; autre traduction consultèrent (le Seigneur ).'
  - type: text
    content: 'Quant à l''autel de bronze qu''avait fait Betsaléel, fils d''Ouri, fils de Hour, il l''avait placé devant la demeure du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ainsi Salomon et l''assemblée cherchèrent le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'devant le Seigneur …  : on pourrait aussi comprendre devant le Seigneur, qui était à la tente…  ; cf. Ex 25.22. –  holocaustes 2.3 ; 4.6 ; 7.7 ; 23.18 ; 29.31 ; Lv 1.3nss ; voir aussi sacrifices.'
  - type: text
    content: 'Là, Salomon monta à l''autel de bronze, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', à la tente de la Rencontre, et il y offrit mille holocaustes.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu apparut à Salomon  : 1R 3.5 le Seigneur (YHWH) apparut en rêve à Salomon . –  ce que tu veux…  : litt. ce que je te donnerai.'
  - type: text
    content: 'Cette nuit-là, Dieu apparut à Salomon et lui dit : Demande ce que tu veux, je te le donnerai. '
  '8':
  - type: text
    content: 'Salomon répondit à Dieu : Tu as agi avec une grande fidélité envers David, mon père, et tu m''as investi de la royauté à sa place. '
  '9':
  - type: note
    content: 'que ta parole… se confirme  : cf. 1Ch 17.23s. –  aussi nombreux…  : litt. nombreux comme la poussière de la terre (ou du pays) ; cf. Gn 13.16 ; 28.14.'
  - type: text
    content: 'Maintenant, '
  - type: text
    content: Seigneur
  - type: text
    content: ' Dieu, que ta parole à David, mon père, se confirme, puisque c''est toi qui m''as investi de la royauté sur un peuple aussi nombreux que les grains de poussière de la terre. '
