document_id: 2CH.1,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: ms1
    children:
    - type: text
      text: HISTOIRE DE SALOMON, ROI D'ISRAËL
    marker-yv: yv-h
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salomon demande à Dieu la sagesse pour régner
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 1R 3.4-15
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Le rédacteur des Chroniques suit de près le texte parallèle des Rois ; les principales différences entre les deux textes seront signalées dans les notes. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devint fort
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 12.13 ; 13.7,21 ; 17.1 ; 21.4 ; 23.1 ; 25.11 ; 27.6 ; 32.5.'
      marker-yv: yv-n
    - type: text
      text: 'Salomon, fils de David, devint fort dans sa royauté ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', son Dieu, était avec lui et l''éleva très haut. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que je sache conduire…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que je sorte devant ce peuple et que je rentre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; dans des contextes militaires, l''expression peut signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mener les troupes en campagne et les ramener victorieuses
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Nb 27.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jos 14.11 ; voir aussi Dt 28.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 31.2 ; 1R 3.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gouverner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: juger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Rt 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Donne-moi maintenant sagesse et connaissance, afin que je sache conduire ce peuple ! Qui donc peut gouverner ton peuple, ce peuple si grand ? '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce qui est dans ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2S 7.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes ennemis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ceux qui te détestent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (autre terme en 1R 3.11) ; même expression en 2S 19.7.
      marker-yv: yv-n
    - type: text
      text: 'Dieu dit à Salomon : Puisque c''est là ce qui est dans ton cœur, puisque tu ne demandes ni richesse, ni biens, ni gloire, ni la mort de tes ennemis, que tu ne demandes pas même une longue vie, puisque tu demandes sagesse et connaissance afin de gouverner mon peuple, sur lequel je t''ai investi de la royauté, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la sagesse et la connaissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'richesse, biens et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: gloire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ec 6.2.'
      marker-yv: yv-n
    - type: text
      text: la sagesse et la connaissance te sont données. Je te donnerai richesse, biens et gloire, comme n'en ont jamais eu les rois qui étaient avant toi et comme n'en auront jamais plus ceux qui viendront après toi.
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte difficile ; on pourrait lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Salomon vint au haut lieu de Gabaon, à Jérusalem… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '( ?) ; d''après des versions anciennes, certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Salomon vint du haut lieu de Gabaon à Jérusalem… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il régna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il devint roi.
      marker-yv: yv-n
    - type: text
      text: Salomon – qui se trouvait au haut lieu de Gabaon – vint à Jérusalem, depuis la tente de la Rencontre, et il régna sur Israël.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Puissance et richesse de Salomon
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 9.25-28  ; 1R 10.26-29
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'équipages '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 5.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Salomon rassembla des chars et des équipages ; il avait mille quatre cents chars et douze mille équipages, qu''il installa dans des villes de garnison et à Jérusalem, près du roi. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bas-Pays
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: shephéla.
      marker-yv: yv-n
    - type: text
      text: 'Le roi rendit l''argent et l''or aussi communs à Jérusalem que les pierres ; il rendit les cèdres aussi nombreux que les sycomores qui sont dans le Bas-Pays. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.16 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1R 10.28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On amenait les chevaux pour Salomon d''Egypte et de Qevé. Les marchands du roi allaient les acheter à Qevé : '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils faisaient monter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils faisaient monter et sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'six cents sicles d''argent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: six cents d'argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : environ 6 kg ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cent cinquante sicles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cent cinquante
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : environ 1,5 kg ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: mesures
        - type: text
          text: ', poids et monnaies.'
      marker-yv: yv-n
    - type: text
      text: ils faisaient monter d'Egypte un char pour six cents sicles d'argent, et un cheval pour cent cinquante sicles. Ils en amenaient aussi avec eux pour tous les rois des Hittites et pour les rois d'Aram.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Salomon prépare la construction du temple
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certaines versions commencent ici le chap. 2, et la numérotation de la suite est décalée en conséquence. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ordonna
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une maison pour le nom du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.3 ; 6.7s,10 ; 1R 5.17+ ; 8.17 ; 1Ch 22.7 ; voir aussi 1Ch 28.3 ; 29.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une maison royale
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'une maison pour son règne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa royauté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ), de même en 2.11.
      marker-yv: yv-n
    - type: text
      text: 'Salomon ordonna que l''on bâtisse une maison pour le nom du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et une maison royale pour lui-même.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Salomon parla…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le déplacement de Salomon à Gabaon est ici l''occasion d''un grand rassemblement national. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chefs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : ces mots rendent deux mots hébreux différents : le premier peut également être rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prince '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c''est un autre terme qui est ainsi traduit dans la suite du v.) ; le second a aussi le sens de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tête
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à tous les princes de tout Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.2.'
      marker-yv: yv-n
    - type: text
      text: 'Salomon parla à tout Israël, aux chefs de mille et de cent, aux juges, à tous les princes de tout Israël, aux chefs de famille. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 1Ch 21.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Salomon… avec toute l'assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 1R 3.4 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: haut
        - type: text
          text: ' lieu qui était à Gabaon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 9.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1Ch 16.39+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la tente de la Rencontre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 27.21 ; 33.7. Cette explication est propre aux Chroniques.'
      marker-yv: yv-n
    - type: text
      text: 'Salomon se rendit avec toute l''assemblée au haut lieu qui était à Gabaon, car c''est là qu''était la tente de la Rencontre de Dieu, celle que Moïse, serviteur du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', avait faite dans le désert ; '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: David l'avait fait monter…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 6.1-23 ; 1Ch 13.5-14 ; 15.25-29 ; 16.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la place…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car il lui a préparé une tente à Jérusalem.
      marker-yv: yv-n
    - type: text
      text: 'mais le coffre de Dieu, David l''avait fait monter de Qiriath-Yéarim à la place qu''il lui avait préparée, car il avait dressé pour lui une tente à Jérusalem. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '1.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'autel de bronze
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 27.1-8 ; 38.1-7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Betsaléel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 31.2-5 ; 35.30-33 ; 36.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il l'avait placé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après certains mss, '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Syr
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Tg
        - type: text
          text: '  ; d''autres mss, LXX et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ' portent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '(il se trouvait) là. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cherchèrent le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le cherchèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'consultèrent (le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' ).'
      marker-yv: yv-n
