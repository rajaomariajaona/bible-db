    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Nabuchodonosor dit : Béni soit le Dieu de Shadrak, de Méshak et d''Abed-Nego, lui qui a envoyé son messager et délivré ses serviteurs, car ils ont eu confiance en lui. Ils ont transgressé l''ordre du roi et livré leur corps plutôt que de servir aucun autre dieu que leur Dieu, en l''adorant.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
