    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Les satrapes, les intendants, les gouverneurs et les conseillers du roi se rassemblèrent ; ils virent que le feu n'avait eu aucun pouvoir sur le corps de ces hommes, que les cheveux de leur tête n'avaient pas été brûlés, que leurs habits n'étaient pas endommagés, et qu'ils ne sentaient même pas le brûlé.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
