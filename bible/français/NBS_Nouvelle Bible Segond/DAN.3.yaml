      - type: text
        text: '  ; voir Ps 148.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Et ces trois hommes, Shadrak, Méshak et Abed-Nego tombèrent liés dans la fournaise ardente.
- type: usfm
