    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Le roi Nabuchodonosor fit une statue d'or haute de soixante coudées et large de six coudées. Il la dressa dans la vallée de Doura, dans la province de Babylone.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: satrapes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir 6.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: intendants…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : liste de fonctionnaires dont les attributions sont difficiles à préciser ; cf. v. 3,27.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Le roi Nabuchodonosor fit convoquer les satrapes, les intendants et les gouverneurs, les magistrats, les trésoriers, les juristes, les juges et toutes les autorités des provinces, pour qu'ils se rendent à l'inauguration de la statue qu'avait dressée le roi Nabuchodonosor.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Alors les satrapes, les intendants et les gouverneurs, les magistrats, les trésoriers, les juristes, les juges et toutes les autorités de la province se rassemblèrent pour l'inauguration de la statue qu'avait dressée le roi Nabuchodonosor. Ils se placèrent devant la statue qu'avait dressée Nabuchodonosor.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: héraut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme araméen '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: kerouz
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui apparaît ici seulement, a été rapproché du grec '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: kerux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; mais il pourrait aussi avoir une origine perse. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gens…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: peuples, nations et langues
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; formules analogues dans la suite et en 5.19 ; 6.26 ; 7.14 ; cf. Es 66.18 ; Ap 5.9 ; 7.9 ; 10.11 ; 13.7 ; 14.6 ; 17.15.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Le héraut cria avec force : Voici ce qu''on vous ordonne, gens de tous peuples, nations et langues !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Plusieurs des noms d''instruments qui apparaissent ici sont d''origine grecque (de même aux v. 7,10,15). Ainsi le nom araméen pour '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'cornemuse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: soumponya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') est la transcription du terme grec qui a donné notre mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'symphonie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Lc 15.25
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vous vous prosternerez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vous tomberez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: adorer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.46'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Au moment où vous entendrez le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion, de la cornemuse et de toutes sortes d'instruments de musique, vous vous prosternerez pour adorer la statue d'or que le roi Nabuchodonosor a dressée.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Quiconque…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ex 20.3-5 ; Ap 13.14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fournaise
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 29.21s ; Mt 13.42,50 ; 1Co 13.3.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Quiconque ne se prosternera pas pour l'adorer sera jeté à l'instant même dans une fournaise ardente.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 5.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: C'est pourquoi, au moment où tous les peuples entendirent le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion et de toutes sortes d'instruments de musique, les gens de tous peuples, nations et langues se prosternèrent pour adorer la statue d'or qu'avait dressée le roi Nabuchodonosor.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les amis de Daniel restent fidèles à Dieu
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Chaldéens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : il s''agit ici soit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Chaldéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'au sens ethnique, soit de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'chaldéens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: initiés aux arts occultes (cf. 2.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'accuser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dénoncer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'manger les morceaux des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des Judéens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Est 2.5'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), expression peut-être d'origine akkadienne.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Aussitôt après, des Chaldéens vinrent accuser les Juifs.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.4+.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Ils dirent au roi Nabuchodonosor : O roi, puisses-tu vivre toujours !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: it
    children:
    - type: text
      text: O roi, tu as donné un ordre d'après lequel tout homme qui entendrait le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion, de la cornemuse et de toutes sortes d'instruments devrait se prosterner pour adorer la statue d'or,
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: it
    children:
    - type: text
      text: et d'après lequel quiconque ne se prosternerait pas pour l'adorer serait jeté dans une fournaise ardente.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'à qui tu as remis… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.49. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne tiennent aucun compte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la même expression est traduite par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'donner (un ordre) '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au v. 10 ; 6.14 ; cf. Est 3.2.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Or il y a des Juifs, ceux à qui tu as remis l'administration de la province de Babylone, Shadrak, Méshak et Abed-Nego, qui ne tiennent aucun compte de ton ordre, ô roi ! Ils refusent de servir tes dieux et d'adorer la statue d'or que tu as dressée !
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Alors Nabuchodonosor, irrité et furieux, donna l'ordre d'amener Shadrak, Méshak et Abed-Nego. Et ces hommes furent amenés devant le roi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Est-il vrai…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: est-ce de propos délibéré… ?
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Nabuchodonosor leur demanda : Est-il vrai, Shadrak, Méshak et Abed-Nego, que vous refusez de servir mes dieux et d''adorer la statue d''or que j''ai dressée ?'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.15 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Judith
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '6.2 : « Qui est dieu sinon Nabuchodonosor ?… leur Dieu ne les délivrera pas. »'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Maintenant tenez-vous prêts : au moment où vous entendrez le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion, de la cornemuse et de toutes sortes d''instruments, vous vous prosternerez pour adorer la statue que j''ai faite. Si vous ne l''adorez pas, vous serez jetés à l''instant même dans une fournaise ardente. Et quel est le dieu qui vous délivrera de ma main ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Shadrak, Méshak et Abed-Nego répliquèrent au roi Nabuchodonosor : Nous n''avons pas besoin de te répondre là-dessus.'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'peut nous délivrer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 6.17 ; Ps 37.39s.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Si notre Dieu que nous servons peut nous délivrer, il nous délivrera de la fournaise ardente et de ta main, ô roi.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Sinon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ha 3.16-19.'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Sinon, sache quand même, ô roi, que nous ne servirons pas tes dieux et que nous n'adorerons pas la statue d'or que tu as dressée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'aspect
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'image
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; le même terme araméen désigne la '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'statue '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: dans le reste du chapitre.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Alors Nabuchodonosor fut rempli de fureur, et l'aspect de son visage changea devant Shadrak, Méshak et Abed-Nego. Il ordonna de chauffer la fournaise sept fois plus qu'il n'était habituel de la chauffer.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Puis il ordonna à quelques soldats parmi les plus vigoureux de son armée de lier Shadrak, Méshak et Abed-Nego, et de les jeter dans la fournaise ardente.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: habits…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mots araméens de l''énumération sont mal connus et diversement traduits (pantalons ? bonnets ?).'
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Ils furent donc liés, revêtus de leurs habits, de leurs tuniques, de leurs manteaux et de leurs autres vêtements, et jetés dans la fournaise ardente.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: it
    children:
    - type: text
      text: Comme, sur l'ordre sévère du roi, la fournaise avait été excessivement chauffée, les flammes tuèrent les hommes qui y avaient jeté Shadrak, Méshak et Abed-Nego.
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '3.23 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Dans les versions grecques (
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et Théodotion), un long passage (66 versets) est intercalé ici et contient un cantique chanté par les trois jeunes gens dans la fournaise. Les éditions catholiques de la Bible l''ont retenu parmi les écrits '
      - type: usfm
