    text: ' '
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Alors le roi Nabuchodonosor fut effrayé et se leva précipitamment. Il dit à ses conseillers : N''avons-nous pas jeté dans le feu trois hommes liés ? Ils répondirent au roi : Bien sûr, ô roi !'
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
