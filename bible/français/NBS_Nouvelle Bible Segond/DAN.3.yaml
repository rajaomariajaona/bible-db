      - type: text
        text: '3.30 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.49.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: Après cela, le roi fit prospérer Shadrak, Méshak et Abed-Nego dans la province de Babylone.
