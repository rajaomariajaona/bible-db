        text: un fils de Dieu.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Il reprit : Eh bien, je vois quatre hommes sans entraves qui marchent indemnes dans le feu ; et l''aspect du quatrième ressemble à celui d''un fils des dieux.'
  - type: text
    text: ' '
