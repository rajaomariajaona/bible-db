document_id: DAN.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'ordre d'adorer la statue d'or
  - type: text
    content: ' '
  - type: note
    content: 'statue d''or  : cf. 2.31s,38 ; 9.27n  ; 11.31n. –  soixante et six coudées ≈ 27 m et 2,70 m respectivement ; voir mesures, poids et monnaies. Sur soixante et six , cf. Ap 13.18n. –  Doura signifie le mur ou la demeure.'
  - type: text
    content: Le roi Nabuchodonosor fit une statue d'or haute de soixante coudées et large de six coudées. Il la dressa dans la vallée de Doura, dans la province de Babylone.
  - type: text
    content: ' '
  '10':
  - type: text
    content: O roi, tu as donné un ordre d'après lequel tout homme qui entendrait le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion, de la cornemuse et de toutes sortes d'instruments devrait se prosterner pour adorer la statue d'or,
  - type: text
    content: ' '
  '11':
  - type: text
    content: et d'après lequel quiconque ne se prosternerait pas pour l'adorer serait jeté dans une fournaise ardente.
  - type: text
    content: ' '
  '12':
  - type: note
    content: 'à qui tu as remis… 2.49. –  ne tiennent aucun compte  : la même expression est traduite par donner (un ordre) au v. 10 ; 6.14 ; cf. Est 3.2.'
  - type: text
    content: Or il y a des Juifs, ceux à qui tu as remis l'administration de la province de Babylone, Shadrak, Méshak et Abed-Nego, qui ne tiennent aucun compte de ton ordre, ô roi ! Ils refusent de servir tes dieux et d'adorer la statue d'or que tu as dressée !
  '13':
  - type: text
    content: ' '
  - type: text
    content: Alors Nabuchodonosor, irrité et furieux, donna l'ordre d'amener Shadrak, Méshak et Abed-Nego. Et ces hommes furent amenés devant le roi.
  - type: text
    content: ' '
  '14':
  - type: note
    content: 'Est-il vrai…  : autre traduction est-ce de propos délibéré… ?'
  - type: text
    content: 'Nabuchodonosor leur demanda : Est-il vrai, Shadrak, Méshak et Abed-Nego, que vous refusez de servir mes dieux et d''adorer la statue d''or que j''ai dressée ?'
  - type: text
    content: ' '
  '15':
  - type: note
    content: 'Cf. Judith 6.2 : « Qui est dieu sinon Nabuchodonosor ?… leur Dieu ne les délivrera pas. »'
  - type: text
    content: 'Maintenant tenez-vous prêts : au moment où vous entendrez le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion, de la cornemuse et de toutes sortes d''instruments, vous vous prosternerez pour adorer la statue que j''ai faite. Si vous ne l''adorez pas, vous serez jetés à l''instant même dans une fournaise ardente. Et quel est le dieu qui vous délivrera de ma main ?'
  '16':
  - type: text
    content: ' '
  - type: text
    content: 'Shadrak, Méshak et Abed-Nego répliquèrent au roi Nabuchodonosor : Nous n''avons pas besoin de te répondre là-dessus.'
  - type: text
    content: ' '
  '17':
  - type: note
    content: peut nous délivrer 6.17 ; Ps 37.39s.
  - type: text
    content: Si notre Dieu que nous servons peut nous délivrer, il nous délivrera de la fournaise ardente et de ta main, ô roi.
  - type: text
    content: ' '
  '18':
  - type: note
    content: 'Sinon  : cf. Ha 3.16-19.'
  - type: text
    content: Sinon, sache quand même, ô roi, que nous ne servirons pas tes dieux et que nous n'adorerons pas la statue d'or que tu as dressée.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'l''aspect  : litt. l''image  ; le même terme araméen désigne la statue dans le reste du chapitre.'
  - type: text
    content: Alors Nabuchodonosor fut rempli de fureur, et l'aspect de son visage changea devant Shadrak, Méshak et Abed-Nego. Il ordonna de chauffer la fournaise sept fois plus qu'il n'était habituel de la chauffer.
  - type: text
    content: ' '
  '2':
  - type: note
    content: 'satrapes  : voir 6.2n. –  intendants…  : liste de fonctionnaires dont les attributions sont difficiles à préciser ; cf. v. 3,27.'
  - type: text
    content: Le roi Nabuchodonosor fit convoquer les satrapes, les intendants et les gouverneurs, les magistrats, les trésoriers, les juristes, les juges et toutes les autorités des provinces, pour qu'ils se rendent à l'inauguration de la statue qu'avait dressée le roi Nabuchodonosor.
  - type: text
    content: ' '
  '20':
  - type: text
    content: Puis il ordonna à quelques soldats parmi les plus vigoureux de son armée de lier Shadrak, Méshak et Abed-Nego, et de les jeter dans la fournaise ardente.
  - type: text
    content: ' '
  '21':
  - type: note
    content: 'habits…  : certains mots araméens de l''énumération sont mal connus et diversement traduits (pantalons ? bonnets ?).'
  - type: text
    content: Ils furent donc liés, revêtus de leurs habits, de leurs tuniques, de leurs manteaux et de leurs autres vêtements, et jetés dans la fournaise ardente.
  - type: text
    content: ' '
  '22':
  - type: text
    content: Comme, sur l'ordre sévère du roi, la fournaise avait été excessivement chauffée, les flammes tuèrent les hommes qui y avaient jeté Shadrak, Méshak et Abed-Nego.
  - type: text
    content: ' '
  '23':
  - type: note
    content: Dans les versions grecques (LXX et Théodotion), un long passage (66 versets) est intercalé ici et contient un cantique chanté par les trois jeunes gens dans la fournaise. Les éditions catholiques de la Bible l'ont retenu parmi les écrits deutérocanoniques  ; voir Ps 148.1n.
  - type: text
    content: Et ces trois hommes, Shadrak, Méshak et Abed-Nego tombèrent liés dans la fournaise ardente.
  - type: heading
    content: Les trois amis sauvés de la fournaise
  '24':
  - type: text
    content: ' '
  - type: text
    content: 'Alors le roi Nabuchodonosor fut effrayé et se leva précipitamment. Il dit à ses conseillers : N''avons-nous pas jeté dans le feu trois hommes liés ? Ils répondirent au roi : Bien sûr, ô roi !'
  - type: text
    content: ' '
  '25':
  - type: note
    content: 'Cf. les v. 49s de la version grecque de Théodotion (voir v. 23n  ; texte presque identique dans LXX) : « Mais l''Ange du Seigneur descendit dans la fournaise avec Azarya et ses compagnons, et il rejeta la flamme du feu hors de la fournaise ; il rendit le milieu de la fournaise comme un vent de rosée rafraîchissant : le feu ne les toucha pas du tout, et il ne leur causa ni tort ni dommage. » Cf. Es 43.2 ; Hé 11.34. –  qui marchent indemnes dans le feu  : autre traduction qui marchent dans le feu et qui n''ont aucun mal  ; cf. 6.24n. –  un fils des dieux  : LXX un ange de Dieu  ; autre traduction grecque (Théodotion) un fils de Dieu.'
  - type: text
    content: 'Il reprit : Eh bien, je vois quatre hommes sans entraves qui marchent indemnes dans le feu ; et l''aspect du quatrième ressemble à celui d''un fils des dieux.'
  - type: text
    content: ' '
  '26':
  - type: note
    content: serviteurs v. 28. –  Dieu Très-Haut v. 32 ; 4.14 ; 5.18,21 ; 7.18n,22,25,27 ; cf. Gn 14.18 ; Nb 24.16 ; Ps 47.3.
  - type: text
    content: 'Puis Nabuchodonosor s''approcha de l''ouverture de la fournaise ardente et dit : Shadrak, Méshak et Abed-Nego, serviteurs du Dieu Très-Haut, sortez et venez ! Et Shadrak, Méshak et Abed-Nego sortirent du feu.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ils ne sentaient même pas le brûlé  : litt. l''odeur du feu ne s''était pas attachée à eux.'
  - type: text
    content: Les satrapes, les intendants, les gouverneurs et les conseillers du roi se rassemblèrent ; ils virent que le feu n'avait eu aucun pouvoir sur le corps de ces hommes, que les cheveux de leur tête n'avaient pas été brûlés, que leurs habits n'étaient pas endommagés, et qu'ils ne sentaient même pas le brûlé.
  - type: text
    content: ' '
  '28':
  - type: note
    content: 'Béni soit…  : cf. Gn 14.20 ; 1R 5.21 ; 2Ch 2.11. –  qui a envoyé son messager (ou ange) : cf. 6.23 ; Gn 24.7 ; Ex 33.2 ; Nb 20.16 ; Ac 12.11. –  transgressé  : litt. changé  ; cf. Esd 6.11.'
  - type: text
    content: 'Nabuchodonosor dit : Béni soit le Dieu de Shadrak, de Méshak et d''Abed-Nego, lui qui a envoyé son messager et délivré ses serviteurs, car ils ont eu confiance en lui. Ils ont transgressé l''ordre du roi et livré leur corps plutôt que de servir aucun autre dieu que leur Dieu, en l''adorant.'
  - type: text
    content: ' '
  '29':
  - type: note
    content: 'Cf. 6.27. –  qui parlera inconsidérément  : LXX qui blasphémera. –  mis en pièces… 2.5+.'
  - type: text
    content: 'Voici maintenant l''ordre que je donne : Tout homme, de quelque peuple, nation ou langue qu''il soit, qui parlera inconsidérément contre le Dieu de Shadrak, de Méshak et d''Abed-Nego sera mis en pièces, et sa maison sera réduite en un tas d''immondices, parce qu''il n''y a aucun autre Dieu qui puisse délivrer comme lui.'
  - type: text
    content: ' '
  '3':
  - type: text
    content: Alors les satrapes, les intendants et les gouverneurs, les magistrats, les trésoriers, les juristes, les juges et toutes les autorités de la province se rassemblèrent pour l'inauguration de la statue qu'avait dressée le roi Nabuchodonosor. Ils se placèrent devant la statue qu'avait dressée Nabuchodonosor.
  - type: text
    content: ' '
  '30':
  - type: note
    content: 2.49.
  - type: text
    content: Après cela, le roi fit prospérer Shadrak, Méshak et Abed-Nego dans la province de Babylone.
  - type: heading
    content: 'Deuxième rêve de Nabuchodonosor : le grand arbre'
  '31':
  - type: text
    content: ' '
  - type: note
    content: Plusieurs éditions commencent ici le chap. 4 dont la numérotation est décalée en conséquence. –  peuples, nations et langues v. 4n. –  soit grande ou s'accroisse. Sur cette interpellation épistolaire, cf. 6.26 ; 1P 1.1s.
  - type: text
    content: Nabuchodonosor, roi, aux gens de tous peuples, nations et langues, qui habitent sur toute la terre. Que votre paix soit grande !
  '32':
  - type: text
    content: ' '
  - type: note
    content: signes / prodiges v. 33 ; 6.28 ; Ex 7.3 ; Dt 4.34 ; 6.22 ; 7.19. –  Dieu Très-Haut v. 26+.
  - type: text
    content: Il m'a semblé bon d'indiquer les signes et les prodiges que le Dieu Très-Haut a produits pour moi.
  '33':
  - type: text
    content: ' '
  - type: note
    content: Son règne… 2.44+.
  - type: text
    content: Que ses signes sont grands !
  - type: text
    content: Que ses prodiges sont puissants !
  - type: text
    content: Son règne durera toujours,
  - type: text
    content: sa domination subsiste de génération en génération.
  '4':
  - type: note
    content: 'héraut  : le terme araméen kerouz, qui apparaît ici seulement, a été rapproché du grec kerux  ; mais il pourrait aussi avoir une origine perse. –  gens…  : litt. peuples, nations et langues  ; formules analogues dans la suite et en 5.19 ; 6.26 ; 7.14 ; cf. Es 66.18 ; Ap 5.9 ; 7.9 ; 10.11 ; 13.7 ; 14.6 ; 17.15.'
  - type: text
    content: 'Le héraut cria avec force : Voici ce qu''on vous ordonne, gens de tous peuples, nations et langues !'
  - type: text
    content: ' '
  '5':
  - type: note
    content: 'Plusieurs des noms d''instruments qui apparaissent ici sont d''origine grecque (de même aux v. 7,10,15). Ainsi le nom araméen pour cornemuse (soumponya) est la transcription du terme grec qui a donné notre mot symphonie (Lc 15.25n). –  vous vous prosternerez  : litt. vous tomberez, de même dans la suite. –  adorer  : cf. 2.46n.'
  - type: text
    content: Au moment où vous entendrez le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion, de la cornemuse et de toutes sortes d'instruments de musique, vous vous prosternerez pour adorer la statue d'or que le roi Nabuchodonosor a dressée.
  - type: text
    content: ' '
  '6':
  - type: note
    content: 'Quiconque…  : cf. Ex 20.3-5 ; Ap 13.14s. –  fournaise  : cf. Jr 29.21s ; Mt 13.42,50 ; 1Co 13.3.'
  - type: text
    content: Quiconque ne se prosternera pas pour l'adorer sera jeté à l'instant même dans une fournaise ardente.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 5.
  - type: text
    content: C'est pourquoi, au moment où tous les peuples entendirent le son du cor, de la flûte, de la cithare, de la sambuque, du psaltérion et de toutes sortes d'instruments de musique, les gens de tous peuples, nations et langues se prosternèrent pour adorer la statue d'or qu'avait dressée le roi Nabuchodonosor.
  - type: heading
    content: Les amis de Daniel restent fidèles à Dieu
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Chaldéens  : il s''agit ici soit de Chaldéens au sens ethnique, soit de chaldéens initiés aux arts occultes (cf. 2.2n). –  accuser ou dénoncer  : litt. manger les morceaux des Juifs (ou des Judéens , cf. Est 2.5n), expression peut-être d''origine akkadienne.'
  - type: text
    content: Aussitôt après, des Chaldéens vinrent accuser les Juifs.
  - type: text
    content: ' '
  '9':
  - type: note
    content: 2.4+.
  - type: text
    content: 'Ils dirent au roi Nabuchodonosor : O roi, puisses-tu vivre toujours !'
  - type: text
    content: ' '
