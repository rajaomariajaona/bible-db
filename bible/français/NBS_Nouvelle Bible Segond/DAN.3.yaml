  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Puis Nabuchodonosor s''approcha de l''ouverture de la fournaise ardente et dit : Shadrak, Méshak et Abed-Nego, serviteurs du Dieu Très-Haut, sortez et venez ! Et Shadrak, Méshak et Abed-Nego sortirent du feu.'
