        text: 2.5+.
    marker-yv: yv-n
  - type: usfm
    marker: it
    children:
    - type: text
      text: 'Voici maintenant l''ordre que je donne : Tout homme, de quelque peuple, nation ou langue qu''il soit, qui parlera inconsidérément contre le Dieu de Shadrak, de Méshak et d''Abed-Nego sera mis en pièces, et sa maison sera réduite en un tas d''immondices, parce qu''il n''y a aucun autre Dieu qui puisse délivrer comme lui.'
  - type: text
    text: ' '
