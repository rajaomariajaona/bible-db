document_id: NUM.29,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Pour le premier jour du septième mois
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 28.11,18+ ; Lv 23.23ss ; cette fête deviendra celle du nouvel an juif (octobre-novembre). –  sacrée  : voir saint. –  un jour d''acclamation ou de clameur , cf. 10.5n  ; 23.21 ; Lv 23.24n  ; Jos 6.5,20 ; 1S 4.5s ; Am 1.14 ; 2.2 ; So 1.16 ; Ps 47.2,6.'
  - type: text
    content: 'Le premier jour du septième mois, il y aura pour vous convocation sacrée : vous ne ferez aucun travail servile. Ce sera pour vous un jour d''acclamation. '
  '10':
  - type: text
    content: 'et un dixième pour chacun des sept agneaux ; '
  '11':
  - type: note
    content: 'le sacrifice pour le péché…  : litt. le sacrifice-pour-le-péché de l''expiation ou des expiations  ; il faut peut-être comprendre ici du jour de l''Expiation  ; cf. Ex 30.10 ; Lv 16.6nss,9,15-20,27,32 ; 23.27n.'
  - type: text
    content: et un bouc en sacrifice pour le péché, outre le sacrifice pour le péché offert pour l'expiation, l'holocauste constant, son offrande végétale et leurs libations.
  - type: heading
    content: Pour la fête des Huttes
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Sur la fête des Huttes (ici identifiée par sa date), cf. Lv 23.33ss,39ss ; voir aussi Ex 23.16n  ; 34.22 ; Dt 16.13ss ; 1R 8.2 ; 12.32n  ; Ez 45.23ss ; Esd 3.4 ; Né 8.14ss. Voir calendrier et fêtes. –  sacrée  : voir saint.'
  - type: text
    content: 'Le quinzième jour du septième mois, il y aura pour vous convocation sacrée : vous ne ferez aucun travail servile. Vous célébrerez une fête pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pendant sept jours. '
  '13':
  - type: note
    content: Le nombre des taureaux diminuant d'un par jour, on finira le septième jour avec sept taureaux (v. 32) et on en aura offert en tout soixante-dix.
  - type: text
    content: 'Vous présenterez en holocauste, en offrande consumée par le feu, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', treize taureaux, deux béliers et quatorze agneaux d''un an sans défaut ; '
  '14':
  - type: text
    content: 'leur offrande végétale sera de la fleur de farine pétrie à l''huile, trois dixièmes pour chacun des treize taureaux, deux dixièmes pour chacun des deux béliers, '
  '15':
  - type: text
    content: 'un dixième pour chacun des quatorze agneaux ; '
  '16':
  - type: note
    content: Voir sacrifices et péché.
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et sa libation.
  '17':
  - type: text
    content: 'Le deuxième jour, douze taureaux, deux béliers et quatorze agneaux d''un an sans défaut, '
  '18':
  - type: note
    content: 'en nombre adéquat  : litt. en leur nombre, de même dans la suite. –  règle  : voir loi.'
  - type: text
    content: 'leur offrande végétale et leurs libations – pour les taureaux, les béliers et les agneaux, en nombre adéquat, selon la règle ; '
  '19':
  - type: note
    content: 'leurs libations  : certains mss hébreux, Syr et Vg portent sa libation.'
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et leurs libations.
  '2':
  - type: text
    content: 'Vous offrirez en holocauste, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', un taureau, un bélier et sept agneaux d''un an sans défaut ; '
  '20':
  - type: text
    content: 'Le troisième jour, onze taureaux, deux béliers et quatorze agneaux d''un an sans défaut, '
  '21':
  - type: text
    content: 'leur offrande végétale et leurs libations – pour les taureaux, les béliers et les agneaux, en nombre adéquat, selon la règle ; '
  '22':
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et sa libation.
  '23':
  - type: text
    content: 'Le quatrième jour, dix taureaux, deux béliers et quatorze agneaux d''un an sans défaut, '
  '24':
  - type: text
    content: 'leur offrande végétale et leurs libations – pour les taureaux, les béliers et les agneaux, en nombre adéquat, selon la règle ; '
  '25':
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et sa libation.
  '26':
  - type: text
    content: 'Le cinquième jour, neuf taureaux, deux béliers et quatorze agneaux d''un an sans défaut, '
  '27':
  - type: text
    content: 'leur offrande végétale et leurs libations – pour les taureaux, les béliers et les agneaux, en nombre adéquat, selon la règle ; '
  '28':
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et sa libation.
  '29':
  - type: text
    content: 'Le sixième jour, huit taureaux, deux béliers et quatorze agneaux d''un an sans défaut, '
  '3':
  - type: note
    content: 'leur offrande végétale sera  : cf. 28.20+ ; voir sacrifices.'
  - type: text
    content: 'leur offrande végétale sera de la fleur de farine pétrie à l''huile, trois dixièmes pour le taureau, deux dixièmes pour le bélier, '
  '30':
  - type: text
    content: 'leur offrande végétale et leurs libations – pour les taureaux, les béliers et les agneaux, en nombre adéquat, selon la règle ; '
  '31':
  - type: note
    content: 'ses libations  : certains mss portent sa libation, de même que Syr, Tg, Vg.'
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et ses libations.
  '32':
  - type: text
    content: 'Le septième jour, sept taureaux, deux béliers et quatorze agneaux d''un an sans défaut, '
  '33':
  - type: text
    content: 'leur offrande végétale et leurs libations – pour les taureaux, les béliers et les agneaux, en nombre adéquat, selon la règle ; '
  '34':
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et sa libation.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'assemblée solennelle  : autre traduction cérémonie de clôture  : voir Lv 23.36n  ; Dt 16.8n  ; cf. Jn 7.37.'
  - type: text
    content: 'Le huitième jour, il y aura pour vous une assemblée solennelle : vous ne ferez aucun travail servile. '
  '36':
  - type: note
    content: Cf. v. 2,8.
  - type: text
    content: 'Vous présenterez en holocauste, en offrande consumée par le feu, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', un taureau, un bélier et sept agneaux d''un an sans défaut, '
  '37':
  - type: text
    content: 'leur offrande végétale et leurs libations – pour le taureau, le bélier et les agneaux, en nombre adéquat, selon la règle ; '
  '38':
  - type: text
    content: et un bouc en sacrifice pour le péché, outre l'holocauste constant, son offrande végétale et sa libation.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'Lv 23.37s. –  ce que vous offrirez…  : autre traduction ce que vous ferez pour le Seigneur  ; cf. 28.4n. –  vœux 15.3 ; 30.3ss. – Voir paix.'
  - type: text
    content: 'C''est là ce que vous offrirez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' lors de vos rencontres festives, outre vos vœux et offrandes volontaires, pour vos holocaustes, vos offrandes végétales, vos libations et vos sacrifices de paix.'
  '4':
  - type: text
    content: 'un dixième pour chacun des sept agneaux ; '
  '5':
  - type: note
    content: Voir péché et expiation.
  - type: text
    content: 'et un bouc en sacrifice pour le péché, pour faire l''expiation sur vous, '
  '6':
  - type: note
    content: 'Cf. 28.7,14. –  leurs  : Smr sa. –  leur règle  : le mot hébreu est aussi traduit par droit  ; il peut aussi avoir le sens de coutume.'
  - type: text
    content: 'outre l''holocauste de chaque mois et son offrande végétale, l''holocauste constant et son offrande végétale et leurs libations, selon leur règle. C''est une odeur agréable, une offrande consumée par le feu pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Pour le jour de l'Expiation
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Lv 16.6ss,29ss ; 23.27ss ; Ez 45.18ss. –  vous vous priverez  : cf. 30.14n  ; Lv 16.29n  ; Es 58.3,5 ; Ps 35.13. –  vous ne ferez aucun travail  : LXX, Syr et Vg précisent servile  ; cf. v. 1,12.'
  - type: text
    content: 'Le dixième jour de ce septième mois, il y aura pour vous convocation sacrée : vous vous priverez, vous ne ferez aucun travail. '
  '8':
  - type: note
    content: vous prendrez… 28.19n.
  - type: text
    content: 'Vous présenterez en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme une odeur agréable, un taureau, un bélier et sept agneaux d''un an ; vous prendrez des bêtes sans défaut ; '
  '9':
  - type: note
    content: 'pour chaque bélier  : litt. pour un bélier (cf. v. 13).'
  - type: text
    content: 'leur offrande végétale sera de la fleur de farine pétrie à l''huile, trois dixièmes pour le taureau, deux dixièmes pour chaque bélier '
