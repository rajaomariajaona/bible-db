document_id: PRO.14,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Dame Sagesse  : autres traductions les femmes sages ; la plus sage des femmes  ; cf. 9.1n  ; 24.3. –  Imbécillité  : autre traduction la femme imbécile.'
  - type: text
    content: Dame Sagesse a bâti sa maison ;
  - type: text
    content: Imbécillité la rase de ses propres mains.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'sa propre amertume  : autre traduction l''amertume (ou le malheur ) de son âme (sur le terme hébreu correspondant, voir Gn 1.20n). –  un autre  : autre traduction un étranger.'
  - type: text
    content: Le cœur connaît sa propre amertume ;
  - type: text
    content: un autre ne saurait partager sa joie.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'méchants  : cf. 2.22 ; 10.30 ; Jb 8.22 ; voir justice. –  sera  : autre traduction est.'
  - type: text
    content: La maison des méchants sera détruite ;
  - type: text
    content: la tente des gens droits sera florissante.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Devant l''homme…  : autres traductions telle voie paraît droite (ou convient ) à un homme… ; devant chaque homme il y a une voie droite (ou une voie qui lui convient ) …  ; cf. 2.13n  ; 12.15n  ; 16.25. –  par la suite  : autre traduction à la fin (cf. v. 13 ; 5.4). –  les voies de la mort  : LXX les profondeurs du séjour des morts.'
  - type: text
    content: Devant l'homme il y a une voie droite ;
  - type: text
    content: par la suite, ce sont les voies de la mort.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'rire / joie  : cf. Ec 2.1s ; Lc 6.25.'
  - type: text
    content: Dans le rire même le cœur peut souffrir ;
  - type: text
    content: par la suite, la joie peut devenir chagrin.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'dévoyé  : autre traduction qui se dérobe  ; cf. Ps 44.19 ; 53.4+. –  rassasié… 1.31. –  a plus que lui  : litt. de sur lui  ; on pourrait comprendre l''homme de bien est plus rassasié que celui dont le cœur est dévoyé ; l''homme de bien se rassasie de ce qu''il fait ; a plus que lui-même  ; certains modifient le texte hébreu traditionnel pour lire l''homme de bien se rassasie de ses œuvres.'
  - type: text
    content: Le cœur dévoyé est rassasié de ses propres voies ;
  - type: text
    content: l'homme de bien a plus que lui.
  '15':
  - type: text
    content: ' '
  - type: note
    content: naïf 1.4n. –  homme avisé 1.4n.
  - type: text
    content: Le naïf croit tout ce qu'on dit ;
  - type: text
    content: l'homme avisé est attentif à ses pas.
  '16':
  - type: text
    content: ' '
  - type: note
    content: craint ou a peur  ; cf. 1.7+. –  l'homme stupide 1.22+.
  - type: text
    content: Le sage craint et s'écarte du mal ;
  - type: text
    content: l'homme stupide s'emporte, il est tout confiant.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'impatient ou coléreux  ; litt. court de narines , ce dernier mot évoquant aussi la colère  ; cf. v. 29n. –  homme d''intrigues  : litt. homme de réflexions . LXX l''homme avisé supporte  ; cf. v. 29 ; 12.2n  ; 15.18 ; 19.11 ; 29.22.'
  - type: text
    content: Celui qui est impatient agit comme un imbécile ;
  - type: text
    content: l'homme d'intrigues est détesté.
  '18':
  - type: text
    content: ' '
  - type: note
    content: naïfs 1.4n. –  hommes avisés 1.4n.
  - type: text
    content: Les naïfs ont l'imbécillité pour patrimoine ;
  - type: text
    content: les hommes avisés ont la connaissance pour couronne.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'se courbent  : autre traduction s''inclinent  ; cf. Es 2.9n  ; 60.14 ; Ps 10.10.'
  - type: text
    content: Les mauvais se courbent devant les bons ;
  - type: text
    content: les méchants, aux portes du juste.
  '2':
  - type: text
    content: ' '
  - type: note
    content: craint le Seigneur 1.7n.
  - type: text
    content: 'Celui qui suit la voie de la droiture craint le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: celui qui prend des chemins sinueux le méprise.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'pauvre / riche  : cf. 19.4,6s ; 22.2n  ; Siracide 13.21 : « Le riche qui chancelle est soutenu par ses amis, mais l''humble qui tombe est repoussé par les siens. »'
  - type: text
    content: Le pauvre est détesté même par ses proches ;
  - type: text
    content: les amis du riche sont nombreux.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Celui qui méprise… 11.12. –  qui prend pitié… Ps 41.2. –  des affligés  : cf. 3.34 ; 16.19 ; cf. Ps 9.13n.'
  - type: text
    content: Celui qui méprise son prochain est un pécheur ;
  - type: text
    content: heureux celui qui prend pitié des affligés !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Fidélité et loyauté…  : litt. fidélité et loyauté, ceux qui trament le bien.'
  - type: text
    content: Ne s'égarent-ils pas, ceux qui trament le mal ?
  - type: text
    content: Fidélité et loyauté sont pour ceux qui trament le bien.
  '23':
  - type: text
    content: A toute peine il y a profit ;
  - type: text
    content: les paroles ne mènent qu'à la privation.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'couronne des sages  : cf. v. 18.'
  - type: text
    content: La couronne des sages, c'est leur richesse ;
  - type: text
    content: l'imbécillité des gens stupides reste de l'imbécillité.
  '25':
  - type: text
    content: ' '
  - type: note
    content: témoin loyal ou témoin véridique  ; cf. v. 5 ; 6.19 ; 12.17 ; Jr 42.5.
  - type: text
    content: Le témoin loyal sauve des vies ;
  - type: text
    content: celui qui profère le mensonge est trompeur.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Dans la crainte…  : cf. 19.23. –  une forte confiance  : autres traductions une force fiable ; une puissante sécurité (cf. 21.22). –  pour ses fils  : certains comprennent pour les fils de celui qui craint le Seigneur.'
  - type: text
    content: 'Dans la crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' il y a une forte confiance ;'
  - type: text
    content: pour ses fils il y a un abri.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'crainte du Seigneur 1.7n. –  source de vie  : cf. 10.11n  ; 19.23.'
  - type: text
    content: 'La crainte du '
  - type: text
    content: Seigneur
  - type: text
    content: ' est une source de vie,'
  - type: text
    content: pour s'écarter des pièges de la mort.
  '28':
  - type: text
    content: Quand le peuple est nombreux, c'est l'ornement du roi ;
  - type: text
    content: quand la population diminue, c'est la ruine du prince.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'patient  : litt. long de narines ou lent à la colère  ; cf. v. 17n  ; 15.18 ; 16.32 ; 19.11 ; Ex 34.6 ; Nb 14.18. –  celui qui s''emporte vite  : litt. celui qui est court de souffle ou d''esprit . –  proclame son imbécillité  : litt. élève l''imbécillité  ; autre traduction est le dernier des imbéciles (tournure superlative comparable en 3.35).'
  - type: text
    content: Celui qui est patient est grand par l'intelligence ;
  - type: text
    content: celui qui s'emporte vite proclame son imbécillité.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'l''imbécile 1.7n. –  un rameau d''orgueil  : autre traduction un bâton pour son orgueil . On peut soit comprendre que l''orgueil pousse dans la bouche de l''imbécile comme un rameau (même terme hébreu en Es 11.1), ou bien que la bouche de l''imbécile le punit de son orgueil.'
  - type: text
    content: Dans la bouche de l'imbécile, il y a un rameau d'orgueil ;
  - type: text
    content: les lèvres des sages les gardent.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'Un cœur…  : litt. un cœur guéri (ou en bonne santé ) est la vie des chairs  ; cf. 17.22. –  carie des os  : cf. 12.4.'
  - type: text
    content: Un cœur calme est la vie du corps ;
  - type: text
    content: la passion jalouse est la carie des os.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Qui opprime…  : cf. v. 21 ; 17.5. –  outrage  : autre traduction déshonore . –  qui fait grâce au pauvre  : cf. 19.17 ; 28.8 ; voir aussi 22.2n.'
  - type: text
    content: Qui opprime le faible outrage celui qui le fait ;
  - type: text
    content: qui fait grâce au pauvre le glorifie.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'par son mal  : on peut comprendre par le malheur qui lui arrive ou à cause du mal qu''il fait . –  dans son intégrité  : d''après LXX. Le texte hébreu porte en sa mort , ce qui pourrait signifier lors de la mort du méchant , ou bien face à sa propre mort.'
  - type: text
    content: Le méchant est renversé par son mal ;
  - type: text
    content: le juste trouve un abri dans son intégrité.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'elle (c.-à-d. la sagesse) est reconnue ou elle se fait connaître ( bruyamment , par opposition à son repos chez les hommes intelligents  ? ou bien  : la sagesse de l''homme intelligent se voit même quand il est parmi les gens stupides  ?). Autres traductions sera-t-elle reconnue ? ou bien elle est anéantie  ; LXX elle n''est pas reconnue  ; cf. 10.14 ; 12.23 ; 13.16.'
  - type: text
    content: Dans le cœur des hommes intelligents repose la sagesse ;
  - type: text
    content: parmi les gens stupides elle est reconnue.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'l''ignominie  : il s''agit ici, selon toute vraisemblance, d''un homonyme du mot hébreu le plus souvent traduit par fidélité  ; autre interprétation, ancienne mais peu probable  : mais la fidélité (ou la bienveillance ) est pour les peuples (comme) un sacrifice pour le péché . On le retrouve dans un sens analogue en Lv 20.17. Certains s''appuient sur LXX pour modifier le texte hébreu traditionnel et traduire le péché fait diminuer (ou décliner ) les peuples.'
  - type: text
    content: La justice élève une nation ;
  - type: text
    content: le péché est l'ignominie des peuples.
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'faveur du roi  : cf. 16.13 ; 19.12 ; Gn 41.37-44. –  le serviteur…  : cf. Mt 24.45 ; Siracide 8.8 : « Ne méprise pas les récits des sages, mais consacre-toi à l''étude de leurs maximes. Car c''est d''eux que tu apprendras l''instruction, et à remplir ton office auprès des grands. »'
  - type: text
    content: La faveur du roi est pour le serviteur qui a du bon sens ;
  - type: text
    content: sa colère est pour celui qui fait honte.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'vide  : le mot hébreu traduit par vide peut aussi signifier pur , ou encore désigner le blé  ; autres traductions possibles la mangeoire est sans blé , ou au contraire il y a du blé dans la mangeoire . –  récoltes ou revenus  ; cf. 3.9n.'
  - type: text
    content: Quand il n'y a pas de taureaux, la mangeoire est vide ;
  - type: text
    content: c'est à la force du bœuf qu'on doit l'abondance des récoltes.
  '5':
  - type: text
    content: ' '
  - type: note
    content: témoin probe ou sûr, digne de confiance , v. 25 ; cf. 12.17. –  faux témoin… 6.19n  ; cf. 12.17 ; Ex 23.1. LXX un faux témoin attise le mensonge.
  - type: text
    content: Le témoin probe ne ment pas ;
  - type: text
    content: le faux témoin profère le mensonge.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'L''insolent 1.22n  ; 13.1. –  peu de chose  : autre traduction chose facile.'
  - type: text
    content: L'insolent cherche la sagesse et ne la trouve pas ;
  - type: text
    content: pour l'homme intelligent la connaissance est peu de chose.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'stupide 1.22+. –  puisque…  : litt. et tu n''as pas (re)connu des lèvres de connaissance  ; cf. 13.7.'
  - type: text
    content: Tiens-toi à distance de l'homme stupide,
  - type: text
    content: puisque tu n'as pas trouvé de connaissance sur ses lèvres.
  '8':
  - type: text
    content: ' '
  - type: note
    content: homme avisé 1.4n.
  - type: text
    content: La sagesse de l'homme avisé, c'est de comprendre sa voie ;
  - type: text
    content: l'imbécillité des gens stupides, c'est la tromperie.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'imbéciles 1.7n. –  refusent avec insolence  : autre traduction se moquent de  ; cf. 1.22n. –  toute réparation  : autre traduction le sacrifice de réparation (Lv 5.6n) ; ou encore, les imbéciles considèrent avec insolence leurs propres torts ; c''est la réparation qui leur sert d''intercesseur ; leurs torts leur servent d''entente . Le texte est incertain ; LXX les maisons des transgresseurs devront être purifiées, mais les maisons des gens droits sont agréées  ; certains modifient le texte hébreu traditionnel pour lire dans les tentes des moqueurs habite la faute, mais dans la maison des gens droits la faveur . Le mot traduit par bonne volonté peut aussi signifier faveur, bienveillance, contentement, entente.'
  - type: text
    content: Les imbéciles refusent avec insolence toute réparation ;
  - type: text
    content: parmi les gens droits règne la bonne volonté.
