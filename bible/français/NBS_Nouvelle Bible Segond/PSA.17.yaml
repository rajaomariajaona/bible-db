document_id: PSA.17,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Déclare-moi innocent
  - type: text
    content: ' '
  - type: note
    content: Prière 86.1 ; 90.1 ; 102.1 ; 142.1 ; cf. 4.2 ; 35.13 ; 72.20 ; 80.5 ; 109.4 ; 141.2 ; 1R 8.38 ; Ha 3.1. –  entends / sois attentif / Prête l'oreille 5.2+,3+.
  - type: text
    content: Prière. De David.
  - type: text
    content: Seigneur
  - type: text
    content: ', entends la justice, sois attentif à mon cri !'
  - type: text
    content: Prête l'oreille à ma prière, qui ne vient pas de lèvres trompeuses !
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'ils se renferment…  : litt. ils ont fermé leur graisse  ; cf. 73.4,7 ; 119.70 ; Dt 32.15 ; Jb 15.27 ; 1Jn 3.17n. –  parle avec orgueil 73.8s ; 1S 2.3'
  - type: text
    content: ils se renferment dans leur graisse,
  - type: text
    content: leur bouche parle avec orgueil,
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ils sont sur nos pas…  : les mss hébreux et les versions anciennes présentent plusieurs variantes, mais l''idée générale de poursuite et d''embuscade est assez claire. –  ils ne visent…  : litt. ils placent leurs yeux pour étendre à terre.'
  - type: text
    content: ils sont sur nos pas, déjà ils nous entourent,
  - type: text
    content: ils ne visent qu'à nous étendre à terre.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'On dirait un lion  : litt. sa ressemblance est comme un lion  ; cf. 7.3+ ; 10.9.'
  - type: text
    content: On dirait un lion avide de déchiqueter,
  - type: text
    content: un jeune lion aux aguets dans son repaire.
  '13':
  - type: text
    content: 'Lève-toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tiens-lui tête, fais-le plier !'
  - type: text
    content: Fais-moi échapper au méchant par ton épée,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur, diversement rendu par les versions anciennes ; certains modifient le texte hébreu traditionnel pour lire ici une invocation du châtiment divin  : que la mort par ta main, Seigneur, que la mort mette fin à leur part dans la vie ! Tu rempliras leur ventre de ce que tu as mis en réserve, leurs fils en seront rassasiés, ils laisseront leur superflu…'
  - type: text
    content: 'fais-moi échapper aux hommes par ta main, '
  - type: text
    content: Seigneur
  - type: text
    content: ', aux hommes de ce monde !'
  - type: text
    content: Leur part est dans la vie,
  - type: text
    content: et tu remplis leur ventre de ce que tu as mis en réserve ;
  - type: text
    content: leurs fils sont rassasiés,
  - type: text
    content: et ils laissent leur superflu à leurs enfants.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'je verrai ta face 11.7+ ; cf. Ex 24.10 ; 33.20ss ; Nb 12.8 ; Jb 33.25s ; Mt 5.8 ; Ap 22.4. –  dès le réveil  : ce détail a été diversement interprété (résurrection, fin de l''épreuve, etc.) ; on a suggéré qu''à l''origine il s''agissait d''une révélation divine justifiant le fidèle injustement accusé : préalablement celui-ci aurait dû passer une nuit dans le temple, à la fois pour se préparer à la rencontre de Dieu et pour prouver son innocence ; cf. v. 3 ; 3.6 ; 30.6 ; 46.6 ; Lm 3.23. –  ta forme  : cf. Nb 12.8+.'
  - type: text
    content: Quant à moi, dans la justice, je verrai ta face ;
  - type: text
    content: dès le réveil, je me rassasierai de ta forme.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Que sur ton ordre…  : litt. que de devant toi sorte mon droit , c.-à-d. que mon droit soit établi (ou rétabli ) par toi  ; cf. 7.9+ ; voir aussi 37.6n  ; Es 42.1n. –  que tes yeux voient ou regardent (cf. 11.7n).'
  - type: text
    content: Que sur ton ordre mon droit s'impose,
  - type: text
    content: que tes yeux voient la droiture !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Tu sondes mon cœur 7.10n  ; cf. 66.10. –  tu l''inspectes  : cf. 8.5n  ; Jb 7.18. –  tu ne trouveras rien… 26.1-8 ; Jb 23.10-12 ; certains modifient légèrement la vocalisation et la ponctuation traditionnelles pour lire tu ne trouveras pas d''infamie en moi ; ma bouche ne dépasse pas (la mesure) , c.-à-d. je n''ai pas péché en parole  ; cf. Ps 73.7 ; Jb 27.4 ; Pr 30.32.'
  - type: text
    content: Tu sondes mon cœur, tu l'inspectes la nuit,
  - type: text
    content: 'tu m''éprouves, tu ne trouveras rien :'
  - type: text
    content: je réfléchis, mais ma bouche ne va pas au-delà.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Traduction incertaine ; on pourrait aussi comprendre, en découpant et en vocalisant différemment le texte hébreu traditionnel  : … ma parole ne dépasse pas la mesure (4) à la vue des actions (ou de la rétribution ) des hommes. Je m''en tiens à la parole de tes lèvres. Des sentiers des violents (5) je garde mes pas. Dans tes voies je ne vacille pas sur mes jambes. –  A la vue des actions  : litt. aux actions.'
  - type: text
    content: A la vue des actions des hommes, par la parole de tes lèvres,
  - type: text
    content: je me garde des sentiers des violents ;
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Pr 3.23.
  - type: text
    content: mes pas sont fermes dans tes voies,
  - type: text
    content: je ne vacille pas sur mes jambes.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'tu me réponds ou tu me répondras. –  Dieu  : hébreu ’El , cf. Gn 21.33n. –  Tends vers moi ton oreille 31.3 ; 71.2 ; 102.3 ; cf. 86.1 ; 88.3 ; voir aussi 5.2+ ; Né 1.6.'
  - type: text
    content: Je t'invoque, car tu me réponds, ô Dieu !
  - type: text
    content: Tends vers moi ton oreille, entends ma parole !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Montre…  : texte incertain, qu''on pourrait aussi modifier pour lire comme en 4.4n distingue ton fidèle  ; sur le terme traduit par ce que tu fais dans ta fidélité (litt. tes fidélités ), cf. 23.6 ; 25.6n,10+ ; 31.22 ; 62.13 ; 63.4 ; 69.17 ; 89.2,50 ; 106.7 ; 107.43 ; 119.41. –  toi qui sauves…  : on pourrait aussi comprendre toi qui sauves par ta main droite ceux qui trouvent un abri… ou toi qui sauves ceux qui trouvent un abri contre ceux qui se rebellent contre ta main droite  ; sur la main droite de Dieu, cf. 18.36 ; 20.7 ; 21.9 ; 44.4 ; 45.5 ; 48.11 ; 60.7 ; 77.11 ; 80.16 ; 98.1 ; 108.7 ; 118.15s ; 139.10 ; Ex 15.6,12 ; Es 41.10 ; 48.13 ; Ac 2.33n.'
  - type: text
    content: Montre ce que tu fais dans ta fidélité,
  - type: text
    content: toi qui sauves ceux qui trouvent dans ta main droite
  - type: text
    content: un abri contre les agresseurs.
  '8':
  - type: text
    content: ' '
  - type: note
    content: comme la prunelle de l'œil Dt 32.10. –  à l'ombre de tes ailes 36.8 ; 57.2 ; 61.5 ; 63.8 ; cf. 91.4 ; Dt 32.11 ; Lc 13.34.
  - type: text
    content: Garde-moi comme la prunelle de l'œil,
  - type: text
    content: cache-moi à l'ombre de tes ailes ;
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'fais-moi échapper  : sous-entendu dans le texte. –  qui me frappent  : même verbe en 91.6 ; 137.8 ( ravager ). –  ennemis acharnés  : litt. ennemis dans l''âme ou éventuellement contre (ma) vie , c.-à-d. ennemis mortels  ; sur le terme correspondant à âme , cf. 6.4n  ; 27.12n  ; 35.4n  ; Gn 1.20n.'
  - type: text
    content: fais-moi échapper aux méchants qui me frappent,
  - type: text
    content: aux ennemis acharnés qui m'encerclent,
