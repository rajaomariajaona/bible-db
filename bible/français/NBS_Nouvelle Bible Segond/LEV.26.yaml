document_id: LEV.26,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: faux dieux 19.4n. –  pierre ornée Nb 33.52n.
  - type: text
    content: 'Vous ne vous ferez pas de faux dieux, vous ne dresserez pour vous ni statue, ni pierre levée, et vous ne placerez dans votre pays aucune pierre ornée pour vous prosterner devant elle : je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  '10':
  - type: note
    content: Cf. 25.21s ; Lc 12.16-21 ; 1Co 5.7.
  - type: text
    content: 'Vous mangerez l''ancienne récolte et vous devrez sortir l''ancienne pour faire place à la nouvelle. '
  '11':
  - type: note
    content: ma demeure 15.31+ ; cf. Ez 37.27.
  - type: text
    content: 'Je placerai ma demeure au milieu de vous, et je n''aurai pas d''aversion pour vous. '
  '12':
  - type: note
    content: 11.45+ ; cf. Ez 36.28 ; 2Co 6.16  ; Ap 21.3,7.
  - type: text
    content: 'Je marcherai au milieu de vous, je serai votre Dieu, et vous, vous serez mon peuple. '
  '13':
  - type: note
    content: '25.55+. –  Seigneur (YHWH)  : voir noms divins. –  joug Ez 34.27 ; cf. Jr 27–28 ; Mt 11.29s.'
  - type: text
    content: 'Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu ; je vous ai fait sortir d''Egypte pour que vous n''en soyez plus les esclaves ; j''ai brisé les barres de votre joug, et je vous ai fait marcher la tête haute.'
  - type: heading
    content: Malédictions
  '14':
  - type: text
    content: ' '
  - type: note
    content: Dt 28.15+.
  - type: text
    content: 'Mais si vous ne m''écoutez pas, si vous ne mettez pas en pratique tous ces commandements, '
  '15':
  - type: note
    content: 'rejetez  : autre traduction méprisez, cf. v. 43s. –  prescriptions  : voir loi. – Voir alliance.'
  - type: text
    content: 'si vous rejetez mes prescriptions, si vous avez de l''aversion pour mes règles, si vous ne mettez pas en pratique tous mes commandements et si vous rompez mon alliance, '
  '16':
  - type: note
    content: 'je vous livrerai au pouvoir de  : litt. j''établirai sur vous (comme des intendants)  ; le même verbe, à une autre forme, peut être traduit par intervenir ou faire rendre des comptes  ; cf. 18.25 ; Ex 32.34n  ; Jr 6.15n. –  qui épuiseront (autre verbe au v. 20) vos yeux  : cf. Dt 28.65 ; 1S 2.33+ ; Ps 69.4+ ; Jb 11.20+. –  votre vie ou votre gorge, votre être, votre âme, cf. Gn 1.20n. –  semailles…  : cf. Jg 6.3-6.'
  - type: text
    content: 'voici alors ce que je vous ferai : je vous livrerai au pouvoir de l''épouvante, du dépérissement et de la fièvre, qui épuiseront vos yeux et rongeront votre vie ; vous ferez des semailles pour rien : ce sont vos ennemis qui s''en nourriront. '
  '17':
  - type: note
    content: 'vous serez battus…  : autre traduction vous serez frappés d''un fléau devant vos ennemis, cf. Ex 7.27n  ; Nb 14.42 ; Dt 1.42 ; 28.7,25 ; 1S 4.2nss. –  vous fuirez… v. 36s ; Pr 28.1.'
  - type: text
    content: Je me retournerai contre vous, et vous serez battus par vos ennemis ; ceux qui vous détestent domineront sur vous, et vous fuirez sans qu'on vous poursuive.
  '18':
  - type: text
    content: ' '
  - type: note
    content: corrigerai v. 23,28. –  sept fois plus v. 21,24,28 ; cf. Am 4.6-12 ; Ap 15.1,6. – Voir péchés.
  - type: text
    content: 'Si pour autant vous ne m''écoutez pas, je vous corrigerai sept fois plus pour vos péchés. '
  '19':
  - type: note
    content: 'Je briserai l''orgueil Ez 33.28. –  votre ciel comme du fer…  : description figurée d''une situation de sécheresse et de famine.'
  - type: text
    content: 'Je briserai l''orgueil de votre force, je rendrai votre ciel comme du fer et votre terre comme du bronze. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 19.30n  ; cf. v. 34n  ; chap. 25. – Voir sabbats.
  - type: text
    content: 'Vous observerez mes sabbats, et vous respecterez mon sanctuaire. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  - type: heading
    content: Bénédictions
  '20':
  - type: note
    content: 'Dt 11.17. –  votre pays  : autre traduction votre terre (v. 4).'
  - type: text
    content: Votre force s'épuisera pour rien ; votre pays ne donnera pas sa production, et les arbres de la terre ne donneront pas leur fruit.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Si vous me résistez  : litt. si vous marchez en opposition avec moi , tournures comparables dans la suite. –  sept fois plus v. 18+.'
  - type: text
    content: 'Si vous me résistez, si vous ne voulez pas m''écouter, je vous frapperai sept fois plus, selon vos péchés. '
  '22':
  - type: note
    content: 'Ez 5.17 ; 14.15. –  les animaux sauvages  : litt. l''animal de la campagne (ou des champs) ; cf. Gn 3.14n. –  abattront  : litt. retrancheront. –  déserts ou dévastés (termes de la même racine aux v. 31ss).'
  - type: text
    content: J'enverrai contre vous les animaux sauvages ; ils tueront vos enfants, ils abattront vos bêtes, et ils vous réduiront à un petit nombre ; vos chemins resteront déserts.
  '23':
  - type: text
    content: ' '
  - type: note
    content: corriger ou instruire , v. 18,28 ; voir Pr 1.2n.
  - type: text
    content: 'Si pour autant vous ne vous laissez pas corriger par moi, si vous me résistez, '
  '24':
  - type: text
    content: 'moi aussi, je vous résisterai : je vous frapperai sept fois plus pour vos péchés. '
  '25':
  - type: note
    content: 'l''épée (cf. Ez 21.14-22) associée à la peste et à la famine (cf. v. 26) : description typique des villes assiégées ; cf. Jr 21.7 ; 38.2 ; 42.17,22 ; 44.13 ; Ez 5.12-17 ; 6.11s ; 7.15.'
  - type: text
    content: 'Je ferai venir sur vous l''épée vengeresse, qui vengera l''alliance ; quand vous vous rassemblerez dans vos villes, j''enverrai la peste au milieu de vous, et vous serez livrés à l''ennemi. '
  '26':
  - type: note
    content: 'je vous retirerai…  : litt. je vous briserai le bâton de pain, comme en Ez 4.16n  ; Ps 105.16 ; l''expression correspondante désigne soit un bâton sur lequel on enfilait des pains en forme de galette ou de couronne, soit, métaphoriquement, le pain lui-même comme bâton (c.-à-d. soutien) de la vie (cf. Es 3.1). –  dix femmes…  : cf. Es 4.1.'
  - type: text
    content: Lorsque je vous retirerai le pain, dix femmes feront cuire votre pain dans un seul four et rapporteront votre pain au poids ; vous mangerez, mais vous ne serez pas rassasiés.
  '27':
  - type: text
    content: ' '
  - type: note
    content: V. 21n.
  - type: text
    content: 'Si pour autant vous ne m''écoutez pas, si vous me résistez, '
  '28':
  - type: note
    content: V. 18+.
  - type: text
    content: 'je vous résisterai aussi avec ardeur : je vous corrigerai sept fois plus pour vos péchés. '
  '29':
  - type: note
    content: Dt 28.53+.
  - type: text
    content: 'Vous mangerez la chair de vos fils et vous mangerez la chair de vos filles. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Pour la suite du chap., cf. Dt 28–30. –  prescriptions  : voir loi.'
  - type: text
    content: 'Si vous suivez mes prescriptions, si vous observez mes commandements et si vous les mettez en pratique, '
  '30':
  - type: note
    content: 'hauts lieux 1R 3.4. –  je retrancherai  : autre traduction je couperai. –  brasiers à encens  : le sens exact du mot hébreu correspondant (aussi Es 17.8 ; 27.9 ; Ez 6.4ss ; 2Ch 14.4 ; 34.4,7) est incertain ; on a aussi pensé à un objet associé au culte du soleil, d''où une autre traduction obélisques. –  cadavres  : cf. Ez 43.7n. –  idoles  : le terme désignait sans doute à l''origine de simples sculptures, mais sa forme dans le texte hébreu traditionnel évoque à la fois les excréments (cf. So 1.17n) et un terme habituellement traduit par horreur ou abomination (voir aussi pur, impur), ce qui lui donne une forte connotation péjorative ; de même en Dt 29.16 ; Jr 50.2 ; Ez 6.4s ; 14.3 ; 20.7 etc.'
  - type: text
    content: 'Je détruirai vos hauts lieux, je retrancherai vos brasiers à encens, je mettrai vos cadavres sur les cadavres de vos idoles, j''aurai de l''aversion pour vous. '
  '31':
  - type: note
    content: 'odeur agréable  : cf. 1.9+. –  offrandes  : voir sacrifices.'
  - type: text
    content: 'Je réduirai vos villes en ruines, je dévasterai vos sanctuaires, et je ne respirerai plus l''odeur agréable de vos offrandes. '
  '32':
  - type: note
    content: dévasterai et atterrés (autre traduction stupéfaits) sont deux formes du même verbe hébreu, cf. v. 22n. –  qui s'y installeront ou qui l'habiteront (même verbe aux v. 5,35).
  - type: text
    content: 'Je dévasterai moi-même le pays, et vos ennemis, qui s''y installeront, en seront atterrés. '
  '33':
  - type: note
    content: Je vous disséminerai 2R 25.11 ; Jr 52.15. –  Votre pays sera dévasté Es 1.7 ; Jr 34.22.
  - type: text
    content: Je vous disséminerai parmi les nations et je tirerai l'épée derrière vous. Votre pays sera dévasté, et vos villes seront en ruine.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'le pays ou la terre . –  fera sabbat ou se reposera  ; cf. 25.2n. –  s''acquittera de  : autre traduction jouira de , cf. v. 41n. –  ses sabbats v. 2 ; 25.2-7 ; 2Ch 36.20s.'
  - type: text
    content: 'Alors le pays s''acquittera de ses sabbats, tout le temps qu''il sera dévasté et que vous serez dans le pays de vos ennemis ; alors le pays fera sabbat, il s''acquittera de ses sabbats. '
  '35':
  - type: note
    content: 'il fera le sabbat…  : autre traduction il aura le repos qu''il n''avait pas eu.'
  - type: text
    content: 'Tout le temps qu''il sera dévasté, il fera le sabbat qu''il n''avait pas fait lors de vos sabbats, tandis que vous l''habitiez. '
  '36':
  - type: note
    content: 'je rendrai leur cœur pusillanime  : litt. je ferai venir la pusillanimité dans leur cœur  ; cf. Ez 21.12.'
  - type: text
    content: 'Quant à ceux d''entre vous qui resteront, je rendrai leur cœur pusillanime dans les pays de leurs ennemis ; le bruit d''une feuille emportée par le vent les poursuivra ; ils fuiront comme on fuit devant l''épée et tomberont sans qu''on les poursuive. '
  '37':
  - type: note
    content: V. 17.
  - type: text
    content: 'Ils trébucheront les uns sur les autres comme devant l''épée, sans qu''on les poursuive. Vous ne tiendrez pas devant vos ennemis ; '
  '38':
  - type: note
    content: 'vous disparaîtrez  : autre traduction vous périrez.'
  - type: text
    content: 'vous disparaîtrez parmi les nations, et le pays de vos ennemis vous dévorera. '
  '39':
  - type: note
    content: 'pourriront dans (ou à cause de) leur faute  : cf. Ez 4.17n. –  les fautes de leurs pères  : cf. Ex 20.5 ; Ez 18.'
  - type: text
    content: Dans les pays de vos ennemis, ceux d'entre vous qui resteront pourriront dans leur faute ; ils pourriront aussi dans les fautes de leurs pères.
  - type: heading
    content: Dieu se souviendra de son alliance
  '4':
  - type: note
    content: 'vos pluies  : il y a deux saisons des pluies, l''une en automne et l''autre au printemps (Jl 2.23) ; cf. Dt 11.13-15 ; Ez 34.26s ; Ac 14.17. –  le pays  : autre traduction la terre.'
  - type: text
    content: 'je vous donnerai vos pluies en leur saison ; le pays donnera sa production, et les arbres des champs donneront leur fruit. '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 4.29-31 ; 30.1-10. –  ils confesseront… Ps 106 ; Dn 9.4-19 ; Esd 9 ; Né 9. –  sacrilèges  : voir saint.'
  - type: text
    content: 'Alors ils confesseront leur faute et la faute de leurs pères, les sacrilèges qu''ils ont commis envers moi et la résistance qu''ils m''ont opposée '
  '41':
  - type: note
    content: 'cœur incirconcis Jr 4.4 ; 9.25 ; Ac 7.51 ; cf. Dt 10.16 ; voir circoncire. –  ils s''acquitteront de (v. 34n,43) leur faute  : c.-à-d. ils finiront par purger leur peine ; cf. Es 40.2n  ; voir péché.'
  - type: text
    content: '– moi aussi je leur résisterai et les amènerai dans le pays de leurs ennemis. Alors leur cœur incirconcis s''humiliera, et ils s''acquitteront de leur faute. '
  '42':
  - type: note
    content: Cf. Gn 17.1-14 ; 26.3s ; 28.13-22 ; 35.9-12 ; 2R 13.23 ; Lc 1.72s.
  - type: text
    content: 'Je me souviendrai de mon alliance avec Jacob, je me souviendrai de mon alliance avec Isaac et de mon alliance avec Abraham, je me souviendrai du pays. '
  '43':
  - type: note
    content: 's''acquittera / s''acquitteront  : cf. v. 34n,41n. – Voir sabbats. –  rejeté  : autre traduction méprisé, cf. v. 15,44. –  prescriptions  : voir loi.'
  - type: text
    content: 'Le pays sera abandonné par eux. Il s''acquittera de ses sabbats pendant qu''il restera dévasté, sans eux ; ils s''acquitteront de leur faute, puisqu''ils ont rejeté mes règles et qu''ils ont eu de l''aversion pour mes prescriptions. '
  '44':
  - type: note
    content: 'Cf. Lm 3.22s,31s ; 5.21s ; 2Ch 33.11-13. –  Seigneur (YHWH)  : voir noms divins.'
  - type: text
    content: 'Pourtant, lorsqu''ils seront dans le pays de leurs ennemis, je ne les rejetterai pas ; je n''aurai pas d''aversion pour eux au point de les exterminer, de rompre mon alliance avec eux : je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), leur Dieu. '
  '45':
  - type: note
    content: 'l''alliance avec les anciens  : litt. l''alliance des premiers, c.-à-d. l''alliance que j''ai conclue avec les ancêtres. –  pour être leur Dieu 11.45+.'
  - type: text
    content: 'Je me souviendrai en leur faveur de l''alliance avec les anciens, ceux que j''ai fait sortir d''Egypte, sous les yeux des nations, pour être leur Dieu. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH).'
  '46':
  - type: text
    content: ' '
  - type: note
    content: 'par l''intermédiaire de Moïse  : cf. Ga 3.19.'
  - type: text
    content: 'Telles sont les prescriptions, les règles et les lois que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' mit entre lui et les Israélites au mont Sinaï, par l''intermédiaire de Moïse.'
  '5':
  - type: note
    content: Am 9.13.
  - type: text
    content: 'Pour vous, le vannage durera jusqu''à la vendange et la vendange durera jusqu''aux semailles ; vous mangerez votre pain à satiété et vous habiterez en sécurité dans votre pays. '
  '6':
  - type: text
    content: 'Je mettrai la paix dans le pays ; quand vous vous coucherez, il n''y aura personne pour vous troubler ; je ferai disparaître du pays les animaux féroces, et l''épée ne passera pas dans votre pays. '
  '7':
  - type: text
    content: 'Vous poursuivrez vos ennemis, et ils tomberont par l''épée devant vous. '
  '8':
  - type: text
    content: 'Cinq d''entre vous en poursuivront cent, cent d''entre vous en poursuivront dix mille, et vos ennemis tomberont par l''épée devant vous. '
  '9':
  - type: note
    content: 'j''établirai (autres traductions je réaliserai, je confirmerai) mon alliance  : cf. Gn 6.18n  ; Dt 8.18n  ; voir aussi Ex 34.10-28.'
  - type: text
    content: 'Je me tournerai vers vous, je vous rendrai féconds, je vous multiplierai, et j''établirai mon alliance avec vous. '
