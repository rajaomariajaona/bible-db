    - type: text
      text: ' (YHWH), votre Dieu ; je vous ai fait sortir d''Egypte pour que vous n''en soyez plus les esclaves ; j''ai brisé les barres de votre joug, et je vous ai fait marcher la tête haute.'
  - type: usfm
