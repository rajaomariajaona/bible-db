      text: 'Le pays sera abandonné par eux. Il s''acquittera de ses sabbats pendant qu''il restera dévasté, sans eux ; ils s''acquitteront de leur faute, puisqu''ils ont rejeté mes règles et qu''ils ont eu de l''aversion pour mes prescriptions. '
