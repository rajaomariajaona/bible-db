      marker-yv: yv-n
    - type: text
      text: 'Vous ne vous ferez pas de faux dieux, vous ne dresserez pour vous ni statue, ni pierre levée, et vous ne placerez dans votre pays aucune pierre ornée pour vous prosterner devant elle : je suis le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), votre Dieu.'
