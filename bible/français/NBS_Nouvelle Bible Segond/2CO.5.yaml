document_id: 2CO.5,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tente '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 4 ; le terme ici employé désigne souvent le corps dans la littérature grecque ; cf. 2P 1.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; voir aussi Es 38.12 ; Jb 4.19 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '9.15 : « Le corps, soumis à la corruption, alourdit l''âme, l''enveloppe de terre est un fardeau pour l''esprit sollicité en tous sens. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'construction '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: édifice
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1Co 3.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui n''a pas été fabriquée… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mc 14.58 ; Hé 8.2+ ; 9.11 ; voir aussi Col 2.11.
      marker-yv: yv-n
    - type: text
      text: 'Nous savons, en effet, que si notre demeure terrestre, qui n''est qu''une tente, est détruite, nous avons dans les cieux une construction qui est l''ouvrage de Dieu, une demeure éternelle qui n''a pas été fabriquée par des mains humaines. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 11.15+ ; Rm 14.10 ; 1Co 3.11-15 ; Ep 6.8 ; voir aussi Ac 10.42+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comparaître en pleine lumière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être manifestés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même v. 11 ; cf. 2.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.3 ; 4.2,10s ; 7.12 ; 11.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soit du bien, soit du mal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ec 12.14.
      marker-yv: yv-n
    - type: text
      text: 'Car il nous faudra tous comparaître en pleine lumière devant le tribunal du Christ, pour que chacun recueille selon ce qu''il aura pratiqué avec son corps : soit du bien, soit du mal.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Au service de la réconciliation
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: ' du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.1 ; 1P 1.17+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les humains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les hommes ; les gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'en pleine lumière '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 10+.
      marker-yv: yv-n
    - type: text
      text: 'Connaissant donc la crainte du Seigneur, nous cherchons à persuader les humains ; nous sommes en pleine lumière devant Dieu, et j''espère être aussi en pleine lumière dans votre conscience. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'nous recommander '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.1+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une occasion d''être fiers '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les apparences '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la face
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') : cf. 10.12 ; 1S 16.7 ; 1Th 2.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Nous n''allons pas nous remettre à nous recommander nous-mêmes à vous ; mais nous vous donnons une occasion d''être fiers de nous, pour que vous ayez de quoi répondre à ceux qui mettent leur fierté non pas dans le cœur, mais dans les apparences. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si nous avons perdu la raison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 5.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '-9 ; 12.1ss ; sur le verbe grec, apparenté au terme qui a donné notre mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: extase
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir Mc 2.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 14.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'raisonnables '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Mc 5.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; un terme apparenté est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pondération '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Rm 12.3 ; 1Tm 3.2+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour vous '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'En effet, si nous avons perdu la raison, c''est pour Dieu ; si nous sommes raisonnables, c''est pour vous. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''amour du Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 8.35,39 ; Ga 2.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous presse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nous domine ; nous retient ; nous entoure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le verbe grec est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'peser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Lc 12.50), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'serrer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'presser '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Lc 8.45 ; 19.43), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tenir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Lc 22.63) ; au passif, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'être en proie à '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(un mal, une émotion, Mt 4.24 ; Lc 4.38 ; 8.37 ; Ac 28.8), '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'être enfermé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Ph 1.23). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: discerné
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jugé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mort pour tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jn 11.50-52 ; 1Tm 2.6+ ; voir aussi Rm 5.6-8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous sont morts
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Rm 5.12-18 ; 6.6,11 ; 1P 4.1.'
      marker-yv: yv-n
    - type: text
      text: 'Car l''amour du Christ nous presse, nous qui avons discerné ceci : un seul est mort pour tous, donc tous sont morts ; '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 6.11 ; 7.4 ; 14.7-9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui est mort…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui est mort pour eux et s''est réveillé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: relevé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Rm 4.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: et s'il est mort pour tous, c'est afin que les vivants ne vivent plus pour eux-mêmes, mais pour celui qui est mort et s'est réveillé pour eux.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'selon la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: chair
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',17+ ; cf. Col 1.22 ; voir aussi Rm 1.3s.'
      marker-yv: yv-n
    - type: text
      text: 'Ainsi, nous, dès maintenant, nous ne connaissons personne selon la chair ; même si nous avons connu le Christ selon la chair, maintenant nous ne le connaissons plus de cette manière. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'est dans le Christ '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 8.1 ; Ga 3.28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: c'est une création nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il est une créature nouvelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Rm 6.4 ; 12.2 ; Ga 6.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ap 21.5s ; voir aussi Ep 2.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il y a là du nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on pourrait aussi comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qui était ancien est devenu nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; quelques mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tout est devenu nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Es 43.18s ; Rm 8.18-30.'
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un est dans le Christ, c''est une création nouvelle. Ce qui est ancien est passé : il y a là du nouveau. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vient de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1Co 1.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'réconciliés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Rm 5.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ministère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 3.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: –4.1 ; cf. Ac 20.24.
      marker-yv: yv-n
    - type: text
      text: 'Et tout vient de Dieu, qui nous a réconciliés avec lui par le Christ, et qui nous a donné le ministère de la réconciliation. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Autre traduction
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: car c'est Dieu qui, dans le Christ, réconciliait le monde…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Col 1.19-22. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans tenir compte aux humains…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'sans leur tenir compte… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Rm 4.8.
      marker-yv: yv-n
    - type: text
      text: Car Dieu était dans le Christ, réconciliant le monde avec lui-même, sans tenir compte aux humains de leurs fautes, et mettant en nous la parole de la réconciliation.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: nous soupirons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme est apparenté à celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'écrasés '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 4.8 et à celui qui est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'angoisse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 6.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
