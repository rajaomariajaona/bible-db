document_id: 2CO.5,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'tente v. 4 ; le terme ici employé désigne souvent le corps dans la littérature grecque ; cf. 2P 1.13ns ; voir aussi Es 38.12 ; Jb 4.19 ; Sagesse 9.15 : « Le corps, soumis à la corruption, alourdit l''âme, l''enveloppe de terre est un fardeau pour l''esprit sollicité en tous sens. » –  construction ou édifice  : cf. 1Co 3.9n. –  qui n''a pas été fabriquée… Mc 14.58 ; Hé 8.2+ ; 9.11 ; voir aussi Col 2.11.'
  - type: text
    content: 'Nous savons, en effet, que si notre demeure terrestre, qui n''est qu''une tente, est détruite, nous avons dans les cieux une construction qui est l''ouvrage de Dieu, une demeure éternelle qui n''a pas été fabriquée par des mains humaines. '
  '10':
  - type: note
    content: Cf. 11.15+ ; Rm 14.10 ; 1Co 3.11-15 ; Ep 6.8 ; voir aussi Ac 10.42+. –  comparaître en pleine lumière ou être manifestés, de même v. 11 ; cf. 2.14n  ; 3.3 ; 4.2,10s ; 7.12 ; 11.6. –  soit du bien, soit du mal Ec 12.14.
  - type: text
    content: 'Car il nous faudra tous comparaître en pleine lumière devant le tribunal du Christ, pour que chacun recueille selon ce qu''il aura pratiqué avec son corps : soit du bien, soit du mal.'
  - type: heading
    content: Au service de la réconciliation
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'crainte du Seigneur 7.1 ; 1P 1.17+. –  les humains  : autres traductions les hommes ; les gens . –  en pleine lumière v. 10+.'
  - type: text
    content: 'Connaissant donc la crainte du Seigneur, nous cherchons à persuader les humains ; nous sommes en pleine lumière devant Dieu, et j''espère être aussi en pleine lumière dans votre conscience. '
  '12':
  - type: note
    content: 'nous recommander 3.1+. –  une occasion d''être fiers 1.12n,14+. –  le cœur / les apparences (litt. la face) : cf. 10.12 ; 1S 16.7 ; 1Th 2.17n.'
  - type: text
    content: 'Nous n''allons pas nous remettre à nous recommander nous-mêmes à vous ; mais nous vous donnons une occasion d''être fiers de nous, pour que vous ayez de quoi répondre à ceux qui mettent leur fierté non pas dans le cœur, mais dans les apparences. '
  '13':
  - type: note
    content: 'si nous avons perdu la raison  : cf. 5.6n-9 ; 12.1ss ; sur le verbe grec, apparenté au terme qui a donné notre mot extase, voir Mc 2.12n  ; 3.21n. –  pour Dieu 1Co 14.2. –  raisonnables Mc 5.15n  ; un terme apparenté est traduit par pondération en Rm 12.3 ; 1Tm 3.2+. –  pour vous 1.4n.'
  - type: text
    content: 'En effet, si nous avons perdu la raison, c''est pour Dieu ; si nous sommes raisonnables, c''est pour vous. '
  '14':
  - type: note
    content: 'l''amour du Christ Rm 8.35,39 ; Ga 2.20. –  nous presse  : autres traductions nous domine ; nous retient ; nous entoure  ; le verbe grec est traduit par peser (Lc 12.50), serrer ou presser (Lc 8.45 ; 19.43), tenir (Lc 22.63) ; au passif, être en proie à (un mal, une émotion, Mt 4.24 ; Lc 4.38 ; 8.37 ; Ac 28.8), être enfermé (Ph 1.23). –  discerné  : litt. jugé. –  mort pour tous  : cf. Jn 11.50-52 ; 1Tm 2.6+ ; voir aussi Rm 5.6-8. –  tous sont morts  : cf. Rm 5.12-18 ; 6.6,11 ; 1P 4.1.'
  - type: text
    content: 'Car l''amour du Christ nous presse, nous qui avons discerné ceci : un seul est mort pour tous, donc tous sont morts ; '
  '15':
  - type: note
    content: 'Rm 6.11 ; 7.4 ; 14.7-9. –  qui est mort…  : autre traduction qui est mort pour eux et s''est réveillé (ou relevé, Rm 4.24n).'
  - type: text
    content: et s'il est mort pour tous, c'est afin que les vivants ne vivent plus pour eux-mêmes, mais pour celui qui est mort et s'est réveillé pour eux.
  '16':
  - type: text
    content: ' '
  - type: note
    content: selon la chair 1.12n,17+ ; cf. Col 1.22 ; voir aussi Rm 1.3s.
  - type: text
    content: 'Ainsi, nous, dès maintenant, nous ne connaissons personne selon la chair ; même si nous avons connu le Christ selon la chair, maintenant nous ne le connaissons plus de cette manière. '
  '17':
  - type: note
    content: 'est dans le Christ Rm 8.1 ; Ga 3.28. –  c''est une création nouvelle  : autre traduction il est une créature nouvelle  ; cf. Rm 6.4 ; 12.2 ; Ga 6.15n  ; Ap 21.5s ; voir aussi Ep 2.15. –  il y a là du nouveau  : on pourrait aussi comprendre ce qui était ancien est devenu nouveau  ; quelques mss portent tout est devenu nouveau  ; cf. Es 43.18s ; Rm 8.18-30.'
  - type: text
    content: 'Si quelqu''un est dans le Christ, c''est une création nouvelle. Ce qui est ancien est passé : il y a là du nouveau. '
  '18':
  - type: note
    content: vient de Dieu 1Co 1.30. –  réconciliés Rm 5.10. –  ministère ou service, 3.3n–4.1 ; cf. Ac 20.24.
  - type: text
    content: 'Et tout vient de Dieu, qui nous a réconciliés avec lui par le Christ, et qui nous a donné le ministère de la réconciliation. '
  '19':
  - type: note
    content: 'Autre traduction  : car c''est Dieu qui, dans le Christ, réconciliait le monde…  ; cf. Col 1.19-22. –  sans tenir compte aux humains…  : litt. sans leur tenir compte… Rm 4.8.'
  - type: text
    content: Car Dieu était dans le Christ, réconciliant le monde avec lui-même, sans tenir compte aux humains de leurs fautes, et mettant en nous la parole de la réconciliation.
  '2':
  - type: note
    content: 'nous soupirons  : le terme est apparenté à celui qui est traduit par écrasés en 4.8 et à celui qui est rendu par angoisse en 6.4n  ; cf. Rm 8.22ns ; voir aussi Mc 8.12+. –  dans cette condition  : litt. en cela. –  revêtir notre domicile  : l''image du vêtement se superpose ici à celle de la demeure (maison ou tente) ; de même v. 3s.'
  - type: text
    content: 'Aussi nous soupirons dans cette condition ; nous souhaitons vivement revêtir notre domicile céleste par-dessus l''autre, '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'ambassadeurs Ep 6.20 ; cf. Es 52.7. –  c''est Dieu qui  : autres traductions  : de Dieu qui ; (nous sommes) convaincus que c''est Dieu qui . –  encourage  : autres traductions exhorte, invite, supplie . –  au nom du Christ  : litt. pour (le) Christ . –  Laissez-vous réconcilier  : autre traduction Réconciliez-vous.'
  - type: text
    content: 'Nous sommes donc ambassadeurs pour le Christ ; c''est Dieu qui encourage par notre entremise ; au nom du Christ, nous supplions : Laissez-vous réconcilier avec Dieu ! '
  '21':
  - type: note
    content: 'pas connu le péché  : cf. Rm 3.20 ; 7.7 ; voir aussi Jn 8.46+ ; Hé 4.15+ ; 1P 2.22. –  il l''a fait… péché, c.-à-d. il l''a identifié au péché, cf. Rm 8.3 ; Ga 3.13 ; certains comprennent il en a fait (un sacrifice pour le) péché (cf. Lv 4.1+,25n). –  justice de Dieu Rm 1.17+ ; 5.18s ; 1Co 1.30 ; Ph 3.9.'
  - type: text
    content: Celui qui n'a pas connu le péché, il l'a fait pour nous péché, afin qu'en lui nous devenions justice de Dieu.
  '3':
  - type: note
    content: 'Sens incertain ; autres traductions possibles si du moins nous sommes trouvés vêtus et non pas nus ; puisque nous serons trouvés vêtus et non pas nus  ; on comprend habituellement : vêtus de notre corps, c.-à-d. vivants, et non pas nus ou dépouillés de ce corps, c.-à-d. morts ; cf. 1Co 15.44s,53-55 ; 1Th 4.15 ; voir aussi Rm 13.14 ; Ga 3.27 ; Ap 16.15.'
  - type: text
    content: 's''il est vrai qu''une fois vêtus nous ne serons pas trouvés nus. '
  '4':
  - type: note
    content: tente v. 1+. –  soupirons v. 2+. –  dévêtir / revêtir v. 3n. –  que le mortel… 4.11 ; cf. 1Co 15.54.
  - type: text
    content: 'Car, tandis que nous sommes dans cette tente, nous soupirons, accablés, parce que nous voulons, non pas nous dévêtir, mais nous revêtir, pour que le mortel soit englouti par la vie. '
  '5':
  - type: note
    content: nous a donné autre traduction a déposé en nous, cf. 1.22n. –  arrhes de l'Esprit 1.22+ ; cf. Rm 8.23,26.
  - type: text
    content: Et c'est Dieu qui nous a produits à cette fin même, lui qui nous a donné les arrhes de l'Esprit.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Les verbes traduits par être chez soi et être en exil (v. 8s) sont apparentés. –  pleins de courage ou de confiance (7.16), de hardiesse (10.1s) ; de même v. 8 ; Hé 13.6.
  - type: text
    content: 'Nous sommes donc toujours pleins de courage, sachant que tant que nous sommes chez nous, dans le corps, nous sommes en exil loin du Seigneur '
  '7':
  - type: note
    content: 4.18+ ; Rm 8.23-25 ; 1Co 13.12 ; Hé 11.13 ; 1P 1.8.
  - type: text
    content: '– car nous marchons par la foi et non par la vue. '
  '8':
  - type: note
    content: 'être en exil / chez nous  : voir v. 6n  ; cf. Ph 1.23.'
  - type: text
    content: 'Nous sommes cependant pleins de courage et nous aimons mieux être en exil loin du corps pour être chez nous auprès du Seigneur. '
  '9':
  - type: note
    content: un point d'honneur Rm 15.20n. –  être agréés par lui ou lui être agréables Rm 14.18 ; Ep 5.10 ; Hé 13.21.
  - type: text
    content: 'C''est pour cela aussi que nous mettons un point d''honneur à être agréés par lui, que nous soyons chez nous ou en exil. '
