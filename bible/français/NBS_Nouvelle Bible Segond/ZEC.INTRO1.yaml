document_id: ZEC.INTRO1
type_code: fra
segments:
- type: usfm
  marker: imt1
  children:
  - type: text
    text: INTRODUCTION
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les messages prophétiques de Zacharie suivent de près les déclarations divines énoncées par Aggée (voir l''introduction à Aggée, p.${Xintag}). Mais les troubles qui secouaient tout l''empire perse avant la prédication d''Aggée se sont maintenant éloignés, et la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: stabilité
  - type: text
    text: ' retrouvée éloigne aussi la perspective d''un effondrement des structures du monde qui favoriserait une pleine restauration de Juda, de Jérusalem et de la royauté davidique. Pour autant, va-t-on cesser de reconstruire le temple, et tout le programme politique et spirituel de Zorobabel et de Josué va-t-il tourner court ? Les visions de Zacharie (chap. 1–6), entrecoupées de quelques messages en clair, vont susciter le ressaisissement nécessaire.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Zacharie reçoit toute une série de visions colorées, huit au total, dont chacune illustre un aspect du plan de salut divin. Comme l''ensemble des chapitres 1 à 8, elles appartiennent à un genre littéraire particulier, dit '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: apocalyptique
  - type: text
    text: ', qui se développera jusqu''à l''Apocalypse de Jean (cf. p.${Xapocat} ; {Xapocdn} ; {Xintap}). Le prophète y est mis en présence d''images qui requièrent une explication. Celle-ci est apportée par des '
  - type: usfm
    marker: it
    children:
    - type: text
      text: messagers
  - type: text
    text: ' de Dieu (des « anges* ») qui font partie intégrante de la vision. Sans pouvoir aller jusqu''à définir entre eux un rapport hiérarchique, on constate que l''un de ces personnages est généralement dénommé '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le messager du Seigneur,
  - type: text
    text: ' tandis que l''autre, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: le messager qui parlait avec moi,
  - type: text
    text: ' est plutôt un interprète qui explique la portée des proclamations officielles du premier. Tout cela établit une distance entre la parole de Dieu et son destinataire. Cette distance a pour fonction de sauvegarder le respect dû à Dieu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: première vision
  - type: text
    text: ' (1.8-17), celle des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: cavaliers
  - type: text
    text: ', apprend à Zacharie que Darius est parvenu à mater les rébellions dans son empire et que maintenant '
  - type: usfm
    marker: it
    children:
    - type: text
      text: toute la terre est en repos et tranquille
  - type: text
    text: ' (v. 11). Apparemment, plus d''espoir d''indépendance pour les Judéens. Cependant, le joug des nations ne s''appesantira pas toujours sur Jérusalem, car YHWH y est revenu. La colère divine s''exercera désormais contre les nations.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Les '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: forgerons
  - type: text
    text: ' de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: deuxième vision
  - type: text
    text: ' (2.1-4) démolissent — sans doute à coups de marteau — les cornes, c''est-à-dire les puissances militaires hostiles. Le texte désigne assez précisément les nations visées (v. 2).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: troisième vision
  - type: text
    text: ' (2.5-9) est suivie (v. 10-17) d''un appel lancé aux exilés encore à Babylone, pour qu''ils se hâtent de reprendre le chemin de Jérusalem où Dieu lui-même va demeurer (v. 14s ; cf. Jn 1.14). L''image porteuse est celle d''un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: arpenteur
  - type: text
    text: ' qui s''apprête à prendre des mesures pour délimiter les contours de la ville. Le messager du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' proclame que la Jérusalem nouvelle sera sans frontières, ouverte à tous. Elle n''aura pas besoin de murailles, car YHWH lui-même l''entourera d''une muraille de feu.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: quatrième vision
  - type: text
    text: ' (3.1-10) met en évidence le retour en grâce de Jérusalem et de ses habitants. Selon toute apparence, pendant soixante-dix ans (1.12) le péché de Juda lui avait valu un châtiment de Dieu. La quatrième vision s''attaque de front à ce problème en décrivant la saleté des vêtements sacerdotaux du '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: grand prêtre
  - type: text
    text: . Est en fait visée l'impureté rituelle (voir pur*) accumulée par le peuple du fait de l'impossibilité, depuis tant d'années, de pratiquer le cérémonial du grand jour de l'Expiation* (
  - type: usfm
    marker: it
    children:
    - type: text
      text: yom ha-Kippourim,
  - type: text
    text: ' cf. Lv 16). On assiste alors à un retournement de situation : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: l'Adversaire,
  - type: text
    text: ' l''Accusateur ou le « Satan » qui reproche à Josué, le grand prêtre, d''être si sale ou impur se fait lui-même réprimander. Quant à Josué, il est revêtu solennellement de vêtements purs, car YHWH a porté son choix sur Jérusalem (v. 2) et sur son temple (v. 7).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: cinquième vision
  - type: text
    text: ' (4.1-14) est celle où Zacharie contemple un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: porte-lampes d'or
  - type: text
    text: ' et deux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: oliviers
  - type: text
    text: '. Un jeu de signification s''opère entre l''olivier produisant l''huile qui éclaire le sanctuaire par le moyen du grand porte-lampes, cette même huile qui a le reflet de l''or, et le rôle de ces éléments dans le sacre royal et l''investiture sacerdotale. Rois et prêtres, rappelons-le, étaient consacrés par une onction* d''huile, de sorte qu''on les appelait souvent « oints » — en hébreu '
  - type: usfm
    marker: it
    children:
    - type: text
      text: mashiah,
  - type: text
    text: ' mot qui a donné « messie ». Bien que Zacharie n''emploie pas ce terme-là, '
  - type: usfm
    marker: it
    children:
    - type: text
      text: les deux hommes de l'huile nouvelle
  - type: text
    text: ' mentionnés au v. 14 sont de toute évidence le bâtisseur royal Zorobabel et — encore qu''il ne soit pas nommé — le grand prêtre Josué. Ce sont donc bien deux « messies » en puissance qui sont là, au milieu du peuple.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: sixième vision
  - type: text
    text: ' (5.1-4) met en relief le statut particulier de la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: loi*
  - type: text
    text: ' assimilée à une parole de Dieu. On y voit en effet un livre aux dimensions fantastiques (10 m x 5 m) qui plane au-dessus du pays de Juda. Il contient de graves menaces à l''endroit de ceux qui violent le droit, voleurs et parjures. Il s''agit d''un appel à extirper du pays les pratiques frauduleuses de ceux — exilés revenus de Babylone ou résidents n''ayant jamais quitté le pays — qui essayent de s''arroger des droits de propriété foncière. La Torah divine va rentrer en vigueur.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'La '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: septième vision
  - type: text
    text: ' (5.5-11) montre le personnage allégorique d''une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: femme
  - type: text
    text: ' enfermée dans une mesure (d''environ 20 litres, donc toute petite). Cette femme est '
  - type: usfm
    marker: it
    children:
    - type: text
      text: la méchanceté
  - type: text
    text: ', prudemment bloquée dans sa prison par un lourd couvercle de plomb. Surviennent alors deux femmes dont l''allure symbolise vraisemblablement la piété ou la fidélité (le mot hébreu désignant la '
  - type: usfm
    marker: it
    children:
    - type: text
      text: cigogne, hasida,
  - type: text
    text: ' proprement « la fidèle », suggère sans doute cette idée). Ce sera donc la fidélité à Dieu qui expédiera le péché à Babylone, qui est sa vraie place. On pense au bouc pour Azazel de Lévitique 16.8, dans le rituel du jour de l''Expiation.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Une '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: huitième vision
  - type: text
    text: ' (6.1-8) reprend quelques éléments de la première, avec des '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: chars
  - type: text
    text: ' attelés de chevaux de diverses couleurs. L''un de ces chars parcourt la terre ; deux autres s''en vont vers le nord, c''est-à-dire sur la route de Babylone ; le dernier part au sud, vers l''Egypte. Cette réduction de la rose des vents à deux points cardinaux désigne les deux grandes puissances qui dominaient naguère le monde, mais qui sont maintenant soumises aux Perses. L''envoi de ces chars indique l''universalité du dessein de Dieu dont le souffle (ou l''Esprit*) reposera même sur ces peuples lointains et abhorrés (voir v. 8'
  - type: usfm
    marker: ord
    children:
    - type: text
      text: n
  - type: text
    text: ).
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On est un peu étonné d''apprendre que l''offrande envoyée par les Juifs de Babylonie pour faire une couronne à Zorobabel sera finalement attribuée à '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: Josué
  - type: text
    text: ' (6.9ss), qui récupère maintenant tous les titres de Zorobabel. Que s''est-il donc passé ? Il est possible que le pouvoir perse, s''inquiétant de la tournure triomphaliste que prenaient les événements à Jérusalem, ait destitué Zorobabel dès 518. On est fondé à émettre cette hypothèse à partir de l''information recueillie en Esd 5.3-17, qui rapporte comment le gouverneur de Transeuphratène, un certain Tathnaï, était venu enquêter à Jérusalem au sujet de l''effervescence née de la reprise des travaux de reconstruction du temple et des murs de la ville. Mais cet homme placide ne fit pas arrêter les travaux. Comme on l''informait que toute l''affaire était partie d''un édit de Cyrus, il en référa par écrit à Darius, le monarque en place sur le trône de la dynastie perse des Achéménides. On retrouva finalement à Ecbatane le texte de l''édit de Cyrus, ce qui mit fin à l''alerte (Esd 6).'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Dans cet ensemble des chapitres 1 à 8, la prédication de Zacharie jette les bases d''un renouveau de ferveur au sein de la communauté judéenne issue de la captivité à Babylone. En annonçant l''avènement d''un '
  - type: usfm
    marker: bdit
    children:
    - type: text
      text: Germe
  - type: text
    text: ' messianique (3.8 ; 6.12), elle prépare les approfondissements qui permettront beaucoup plus tard à la communauté chrétienne de saluer en Jésus le « Messie » ou « Christ » — celui à qui Dieu lui-même a conféré l''onction.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: La tradition, en nous proposant le livre tel qu'il nous est parvenu, attribue au même prophète Zacharie les chapitres 1 à 8 et les chapitres 9 à 14, qui seraient sans doute issus d'une période ultérieure de son ministère. Des spécialistes modernes sont d'un autre avis et supposent pour les chapitres 9 à 14 un ou plusieurs autre(s) auteur(s), resté(s) anonyme(s).
- type: usfm
  marker: is2
  children:
  - type: text
    text: Les chapitres 9 à 14
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Cette seconde partie du recueil se distingue de la précédente par un changement de cadre et de ton. Le discours précis concernant les personnages, les dates et les événements fait place à un message stylisé dont il est difficile de préciser le cadre historique. Certes, le messianisme y reste présent, mais il se manifeste maintenant au travers de '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: figures anonymes
  - type: text
    text: ' qui excitent la curiosité et incitent à la réflexion. Faut-il considérer que le « roi humble » (9.9), le prophète-berger (11.4), le transpercé (12.10), le berger frappé par l''épée (13.7), sont un seul et même personnage, ou les instruments d''un même agir divin ? Toujours est-il que le message s''adresse à une Jérusalem désemparée par de multiples épreuves, mais promise à un avenir glorieux.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'Ces figures messianiques peuvent être rapportées aux deux conceptions du roi-messie présentes dans l''Ancien Testament. Ce sont, d''une part, les attentes d''un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: roi-berger
  - type: text
    text: ' de type davidique qui sera un bon politique et qui réunira le troupeau dispersé (cf. Ez 34 ; 37 ; et déjà Jr 23 ; 33) et, d''autre part, les pages d''Esaïe concernant le mystérieux '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: serviteur souffrant
  - type: text
    text: ' de YHWH (voir Es 42 ; 49.4 ; 50.4ss ; 53). Certes, le message de Zacharie 9–14 n''a pas les mêmes visées immédiates, mais il offre un exemple des développements et des recoupements possibles, à l''intérieur même de la Bible, de thèmes originellement distincts.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'On pourrait discerner dans ce recueil le fil conducteur suivant : même les nations de la côte méditerranéenne, au nord et à l''ouest du pays d''Israël, participeront un jour à la communauté messianique, car un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: roi paradoxal
  - type: text
    text: ' paraîtra (chap. 9). Aux dommages causés par le culte des idoles succédera un '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: nouvel exode
  - type: text
    text: ' qui rassemblera tous les dispersés de Juda-Israël (chap. 10). Le « berger » de YHWH sera rejeté par son troupeau qui suit de faux bergers (chap. 11). Après une rude bataille, Jérusalem et Juda seront sauvés par une intervention divine. Mais le roi-berger sera « transpercé », et on portera son deuil (chap. 12). Son action spirituelle entraînera l''exclusion des idoles et des faux prophètes, à leur tour « transpercés », tandis que le roi-berger sera encore blessé et frappé (chap. 13). A l''issue d''un combat fantastique, « Jérusalem » se révélera dans toute sa gloire et deviendra le centre de l''univers au cours d''une fête des Huttes (chap. 14) pour toutes les nations.'
- type: usfm
  marker: ip
  children:
  - type: text
    text: 'C''est cependant la '
  - type: usfm
    marker: bd
    children:
    - type: text
      text: lecture chrétienne
  - type: text
    text: ' qui a valu à ces chapitres leurs meilleurs titres de notoriété. Les allusions sont nombreuses dans les évangiles. Ainsi les discours de Jean 4 et 7 empruntent l''image de l'''
  - type: usfm
    marker: it
    children:
    - type: text
      text: eau vive
  - type: text
    text: ' à Zacharie 14.8 (qui relit lui-même Ez 47.1-12) ; de même, le récit des Rameaux (Mt 21/ /) exploite Zacharie 9.9 ; celui des vendeurs chassés du temple (Jn 2.13ss) fait référence à Zacharie 14.21 ; l''annonce par Jésus de la dispersion des disciples (Mc 14.27/ /) cite Zacharie 13.7 ; l''évangile du coup de lance (Jn 19.34ss) renvoie à Zacharie 12.10 ; les trente deniers et le champ du potier (Mt 26.15 ; 27.3-10) interprètent Zacharie 11.12s. L''Apocalypse de Jean (1.7), de son côté, voit en Zacharie 12.10 une allusion au Christ glorifié.'
- type: usfm
  marker: iot
  children:
  - type: text
    text: Une vue d'ensemble des chapitres 9–14
- type: text
  text: 1 annonce du dessein de dieu concernant les nationsfigures du messieles guerres de yhwhéradication de l'idolâtrie9.1-8Châtiment et salut pour les peuples de la région9.9-10Le roi-messie9.11–10.1YHWH combat pour Juda et Israël (Ephraïm) contre les Grecs10.2-3Idolâtrie et châtiment10.3–11.3YHWH combat pour Juda et Israël (Joseph) contre l'Assyrie et l'Egypte11.4-17Le berger de YHWH et le berger stupide (v. 15)12.1-9YHWH combat les nations coalisées contre Jérusalem et Juda12.10-14« Celui qu'ils ont transpercé » est réhabilité et pleuré13.1-6Les idoles et les faux prophètes neutralisés13.7-9Le berger de YHWH frappé14.1-15YHWH combat les nations qui ont pris Jérusalem14.16-21Châtiment et salut du reste des nations venues contre Jérusalem
