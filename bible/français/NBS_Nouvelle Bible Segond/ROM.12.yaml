      - type: usfm
        marker: w
        children:
        - type: text
          text: Testament
      - type: text
        text: ' de Benjamin '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.2ss : « L''homme bon n''a pas un œil aveuglé par les ténèbres, car il a pitié de tous, même des pécheurs. Quand bien même voudraient-ils lui nuire, c''est en faisant le bien qu''il vainc le mal, protégé qu''il est par Dieu ; mais les justes, il les aime comme lui-même. Si quelqu''un est honoré, il n''en est pas jaloux ; si quelqu''un s''enrichit, il ne l''envie pas ; si quelqu''un se montre courageux, il en fait l''éloge ; celui qui est chaste, il l''aime ; l''indigent, il en a pitié ; avec le faible, il souffre ; Dieu, il chante ses louanges… Si donc, vous aussi, vous avez une pensée bien disposée, alors les hommes méchants seront en paix avec vous ; les débauchés, pris de respect pour vous, se tourneront vers le bien… Si quelqu''un insulte un homme saint, il se repent, car l''homme pieux a pitié de l''insulteur et garde le silence. »'
    marker-yv: yv-n
  - type: text
    text: Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien.
