        - type: text
          text: Qumrân
      - type: text
        text: ') 10.17ss : « Je ne rendrai à personne la rétribution du mal : c''est par le bien que je poursuivrai un chacun ; car c''est auprès de Dieu qu''est le jugement de tout vivant, et c''est Lui qui paiera à chacun sa rétribution. (…) Quant à la multitude des hommes de la Fosse (les impies), je ne me saisirai pas d''eux jusqu''au Jour de la Vengeance ; mais je ne ramènerai pas ma colère loin des hommes pervers, et je ne serai pas satisfait jusqu''à ce qu''Il ait inauguré le Jugement. Je serai sans rancune et sans colère envers ceux qui se sont convertis de la rébellion, mais je serai sans miséricorde à l''égard de ceux qui se sont écartés de la voie ; je ne consolerai pas ceux qui sont frappés jusqu''à ce que leur voie soit parfaite. » '
    - type: usfm
