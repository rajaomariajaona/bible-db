      - type: text
        text: '16.54 : « Que le pécheur ne dise pas qu''il n''a pas péché, car Dieu fera brûler des charbons ardents sur la tête de celui qui dit : “Je n''ai pas péché devant Dieu ni devant sa gloire.” »'
