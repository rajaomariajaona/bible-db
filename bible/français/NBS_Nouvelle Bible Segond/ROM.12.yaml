document_id: ROM.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La vie nouvelle
  - type: text
    content: ' '
  - type: note
    content: 'encourage ou exhorte , cf. v. 8n  ; 15.30 ; 16.17 ; Ac 2.40n  ; 11.23+ ; 1Co 1.10+ ; Ep 4.1+ ; Ph 2.1+ ; 1Th 2.3+ ; 1Tm 1.3+ ; 1P 2.11+. –  au nom de toute la magnanimité  : litt. par les magnanimités  ; le terme correspondant, souvent équivalent à celui qui est traduit par compassion (cf. 9.15 ; 11.30-36), pourrait aussi être rendu par générosité, clémence, miséricorde  ; cf. Dn 2.18 ; 2Co 1.3n. –  offrir…  : autre traduction mettre votre corps à la disposition de Dieu comme un sacrifice…  ; cf. 6.13n. –  votre corps  : litt. vos corps 6.6+ ; 12.5ss ; 1Co 6.13,15,19s. –  sacrifice Ep 5.2. –  vivant 6.11. –  saint 6.19. –  agréé de Dieu 15.16 ; 1P 2.5. –  conforme à (ou digne de ) la Parole  : autres traductions raisonnable, rationnel  ; le grec logikos (qui a donné notre mot logique ) dérive de logos, parole ou raison (cf. Jn 1.1n). Il est traduit de la Parole en 1P 2.2 ; dans d''autres textes de la même époque il qualifie le culte authentique, intérieur ou spirituel (quoiqu''il ne s''agisse pas du mot habituellement traduit par spirituel et apparenté à celui qui désigne l’ Esprit ), par opposition au rituel de pure forme ; cf. Os 6.6 ; Testament de Lévi 3.6 : « Ils (les “anges de la Face”, ceux qui se tiennent en présence de Dieu et qui intercèdent pour les justes) offrent au Seigneur un parfum de bonne odeur, un sacrifice en paroles et non sanglant. » Entretiens d''Epictète  : « Si j''étais un rossignol, je ferais ce qui sied à un rossignol ; si j''étais un cygne, je ferais ce qui sied à un cygne ; mais je suis un être rationnel (ou parlant , en grec logikos ), et je dois louer Dieu. »'
  - type: text
    content: 'Je vous encourage donc, mes frères, au nom de toute la magnanimité de Dieu, à offrir votre corps comme un sacrifice vivant, saint et agréé de Dieu ; voilà quel sera pour vous le culte conforme à la Parole. '
  '10':
  - type: note
    content: 'affection fraternelle 1Th 4.9 ; Hé 13.1 ; 1P 1.22 ; 2.17 ; 2P 1.7. –  Soyez les premiers…  : autres traductions  : quant à l''honneur (v. 11n  ; 13.7), préférez les autres à vous-mêmes ; rivalisez d''estime les uns pour les autres  ; cf. Ph 2.3.'
  - type: text
    content: 'Quant à l''affection fraternelle, soyez pleins de tendresse les uns pour les autres. Soyez les premiers à honorer les autres. '
  '11':
  - type: note
    content: 'On pourrait aussi traduire, en serrant de plus près la forme du texte grec (cf. v. 10n)  : quant à l''empressement, ne soyez pas paresseux ; quant à l''esprit, soyez fervents ; quant au Seigneur, servez-le… ; (12) quant à l''espérance, réjouissez-vous ; quant à la détresse, endurez ; quant à la prière, soyez-y assidus ; (13) quant aux besoins des saints, soyez solidaires. –  fervents (litt. bouillants, cf. Ap 3.15ns) d''esprit ou par l''Esprit Ac 18.25. –  Servez… comme des esclaves  : sur le verbe correspondant, voir 7.6n  ; Ac 20.19 ; Col 3.24. Au lieu du mot grec kurios (Seigneur) certains mss portent le mot kairos, qui est habituellement traduit par temps ou occasion (même mot 3.26n  ; 13.11 ; Ep 5.16).'
  - type: text
    content: 'Ne soyez pas paresseux, mais empressés. Soyez fervents d''esprit. Servez le Seigneur, comme des esclaves. '
  '12':
  - type: note
    content: Réjouissez-vous… 5.2s+. –  Endurez ou persévérez, cf. 2.7n. –  prière Ac 1.14 ; 2.42 ; Ep 6.18 ; Ph 4.6 ; Col 4.2 ; 1Th 5.17 ; 1Tm 2.1.
  - type: text
    content: 'Réjouissez-vous dans l''espérance. Endurez dans la détresse. Consacrez-vous assidûment à la prière. '
  '13':
  - type: note
    content: 'Soyez solidaires  : verbe apparenté au mot habituellement traduit par communion, cf. Ac 2.42n  ; 28.10 ; Ph 4.14. –  saints 1.7+. –  Poursuivez, c.-à-d. cherchez à exercer  ; cf. 9.30n  ; le même verbe a le sens de persécuter au v. 14. –  hospitalité  : le mot grec signifie, étymologiquement, amour de l''étranger  ; il s''applique sans doute, en particulier, à l''accueil des missionnaires ou prédicateurs itinérants ; cf. 1Tm 3.2 ; 5.10 ; Tt 1.8 ; Hé 13.2 ; 1P 4.9 ; 3Jn 5.'
  - type: text
    content: Soyez solidaires des saints qui sont dans le besoin. Poursuivez l'hospitalité.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Voir bénédiction, malédiction. –  ceux qui vous persécutent (certains mss omettent le vous) : c''est le même verbe qui correspond à poursuivre au v. 13n, dans un autre sens ; cf. Mt 5.44+.'
  - type: text
    content: Bénissez ceux qui vous persécutent, bénissez et ne maudissez pas.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Lc 1.58 ; 1Co 12.26 ; Siracide 7.34 : « Ne te détourne pas de ceux qui pleurent, avec les affligés, afflige-toi. »'
  - type: text
    content: 'Réjouissez-vous avec ceux qui se réjouissent ; pleurez avec ceux qui pleurent. '
  '16':
  - type: note
    content: 'Soyez bien d''accord  : autre traduction ayez les mêmes égards les uns envers les autres, litt. pensez (v. 3n) de même les uns envers les autres  ; formule presque identique en 15.5n  ; cf. 1Co 1.10 ; 2Co 13.11 ; Ph 2.2 ; 4.2 ; 1P 3.8. –  Ne soyez pas orgueilleux  : autre traduction n''aspirez pas à ce qui est élevé, litt. ne pensez pas (v. 3n) les choses élevées  ; la formule est presque identique à celle qui est traduite par n''en tire pas orgueil en 11.20n  ; 1Tm 6.17. –  laissez-vous attirer…  : autre traduction associez-vous à ceux qui sont humbles (ou abaissés). –  Ne vous croyez pas… 11.25n  ; Es 5.21 ; Pr 3.7.'
  - type: text
    content: Soyez bien d'accord entre vous. Ne soyez pas orgueilleux, mais laissez-vous attirer par ce qui est humble. Ne vous croyez pas trop avisés.
  '17':
  - type: text
    content: ' '
  - type: note
    content: Ne rendez à personne… 1Th 5.15+ ; 1P 3.9. –  devant tous Pr 3.4 ; 2Co 8.21.
  - type: text
    content: 'Ne rendez à personne le mal pour le mal. Efforcez-vous de faire ce qui est bien devant tous. '
  '18':
  - type: note
    content: 14.19 ; Mc 9.50 ; 1Co 7.15 ; 1Th 5.13 ; Hé 12.14. – Voir paix.
  - type: text
    content: 'S''il est possible, pour autant que cela dépende de vous, soyez en paix avec tous. '
  '19':
  - type: note
    content: 'Ne vous faites pas justice vous-mêmes  : autre traduction ne vous vengez pas  ; cf. Lv 19.18 ; Siracide 28.1 : « Celui qui se venge éprouvera la vengeance du Seigneur qui de ses péchés tiendra un compte rigoureux. » –  laissez place  : litt. donnez un lieu  ; même expression en Lc 14.9 (céder la place) ; Ep 4.27. –  la colère, c.-à-d. la colère de Dieu  ; 1.18+ ; 3.5+ ; 13.4. –  C''est moi qui fais justice  : litt. à moi la justice ou la vengeance Dt 32.35  ; Hé 10.30.'
  - type: text
    content: 'Ne vous faites pas justice vous-mêmes, bien-aimés, mais laissez place à la colère, car il est écrit : '
  - type: text
    content: C'est moi qui fais justice !
  - type: text
    content: ' C''est moi qui '
  - type: text
    content: paierai de retour,
  - type: text
    content: ' dit le Seigneur. '
  '2':
  - type: note
    content: 'Ne vous conformez pas  : même terme en 1P 1.14 ; cf. Ph 2.6-7n  ; 3.21 (terme apparenté pour transformer). –  à ce monde-ci ou à ce temps-ci, à cet âge-ci  ; le terme correspondant a été traditionnellement traduit par siècle (11.36n) ; cf. Mt 12.32n  ; Ga 1.4-5n  ; Ep 2.2n. –  soyez transfigurés ou laissez-vous transfigurer  ; même verbe en Mc 9.2n  ; 2Co 3.18 ; cf. Ph 3.21n. –  renouvellement… 6.4+ ; 8.14-16,26s ; 2Co 5.17 ; Ep 4.23 ; Col 3.10 ; Tt 3.5. –  votre intelligence  : litt. l''intelligence, cf. 1.28+. –  discerner… la volonté de Dieu 1.28n  ; 2.18 ; Ep 5.10,17 ; Ph 1.10. –  agréé v. 1. –  parfait ou accompli, cf. 1Co 2.6n.'
  - type: text
    content: 'Ne vous conformez pas à ce monde-ci, mais soyez transfigurés par le renouvellement de votre intelligence, pour discerner quelle est la volonté de Dieu : ce qui est bon, agréé et parfait.'
  '20':
  - type: note
    content: 'Pr 25.21-22n  ; cf. 2R 6.22 ; Mt 5.44 ; 25.35. –  ce sont des braises…  : la formule peut être interprétée de deux manières ; ou bien tu l''amèneras à avoir honte de sa conduite et à changer (interprétation majoritaire), ou bien tu augmenteras sa culpabilité et donc son châtiment  ; cf. 6 Esdras 16.54 : « Que le pécheur ne dise pas qu''il n''a pas péché, car Dieu fera brûler des charbons ardents sur la tête de celui qui dit : “Je n''ai pas péché devant Dieu ni devant sa gloire.” »'
  - type: text
    content: 'Mais '
  - type: text
    content: si ton ennemi a faim, donne-lui à manger ; s'il a soif, donne-lui à boire ; car en agissant ainsi, ce sont des braises que tu amasseras sur sa tête
  - type: text
    content: '. '
  '21':
  - type: note
    content: 'Mt 5.39 ; cf. Règle de la Communauté (Qumrân) 10.17ss : « Je ne rendrai à personne la rétribution du mal : c''est par le bien que je poursuivrai un chacun ; car c''est auprès de Dieu qu''est le jugement de tout vivant, et c''est Lui qui paiera à chacun sa rétribution. (…) Quant à la multitude des hommes de la Fosse (les impies), je ne me saisirai pas d''eux jusqu''au Jour de la Vengeance ; mais je ne ramènerai pas ma colère loin des hommes pervers, et je ne serai pas satisfait jusqu''à ce qu''Il ait inauguré le Jugement. Je serai sans rancune et sans colère envers ceux qui se sont convertis de la rébellion, mais je serai sans miséricorde à l''égard de ceux qui se sont écartés de la voie ; je ne consolerai pas ceux qui sont frappés jusqu''à ce que leur voie soit parfaite. » Testament de Benjamin 4.2ss : « L''homme bon n''a pas un œil aveuglé par les ténèbres, car il a pitié de tous, même des pécheurs. Quand bien même voudraient-ils lui nuire, c''est en faisant le bien qu''il vainc le mal, protégé qu''il est par Dieu ; mais les justes, il les aime comme lui-même. Si quelqu''un est honoré, il n''en est pas jaloux ; si quelqu''un s''enrichit, il ne l''envie pas ; si quelqu''un se montre courageux, il en fait l''éloge ; celui qui est chaste, il l''aime ; l''indigent, il en a pitié ; avec le faible, il souffre ; Dieu, il chante ses louanges… Si donc, vous aussi, vous avez une pensée bien disposée, alors les hommes méchants seront en paix avec vous ; les débauchés, pris de respect pour vous, se tourneront vers le bien… Si quelqu''un insulte un homme saint, il se repent, car l''homme pieux a pitié de l''insulteur et garde le silence. »'
  - type: text
    content: Ne te laisse pas vaincre par le mal, mais sois vainqueur du mal par le bien.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'la grâce qui m''a été accordée 1.5+ ; cf. 1Co 3.10 ; Ep 3.2+ ; 2P 3.15. –  de ne pas entretenir…  : le texte grec joue sur des termes apparentés, litt. de ne pas penser au-delà (cf. 1Co 4.6n) de ce qu''il faut penser mais de penser en vue d''un sain-penser (ce dernier verbe étant traduit avec toute sa raison en Mc 5.15/ / ; cf. 2Co 5.13 ; Tt 2.6 être pondéré ) ; le verbe correspondant à penser (Rm 12.16n  ; 14.6 tenir compte de ) est celui qui est traduit par s''accorder aux tendances de en 8.5nss ; il s''agit ici d''une mise en garde contre la vanité et l''ambition ; cf. Ph 2.3. –  selon…  : on peut comprendre selon la mesure de foi que Dieu lui a donnée… ou bien selon la mesure que Dieu lui a donnée…, celle de la foi  ; cf. Mt 25.15 ; 1Co 12.11+ ; 2Co 10.13 ; Ep 4.7.'
  - type: text
    content: 'Par la grâce qui m''a été accordée, je dis à chacun d''entre vous de ne pas entretenir de prétentions excessives, mais de tendre à vivre avec pondération, chacun selon la mesure de la foi que Dieu lui a donnée en partage. '
  '4':
  - type: note
    content: 'Cf. v. 1 ; 1Co 6.15+ ; 10.17. –  il y a…  : litt. nous avons beaucoup de parties (ou de membres, cf. 6.13n) en un seul corps, et toutes les parties…'
  - type: text
    content: 'En effet, tout comme il y a une multitude de parties dans notre corps, qui est un seul, et que toutes les parties de ce corps n''ont pas la même fonction, '
  '5':
  - type: note
    content: 'Ep 1.23 ; 4.4,25 ; 5.30 ; Col 3.15 ; cf. 1Co 12.25. –  la multitude  : litt. les beaucoup ou les plusieurs, même formule 5.15,19. –  faisons tous partie ou sommes tous membres, 6.13n.'
  - type: text
    content: 'ainsi, nous, la multitude, nous sommes un seul corps dans le Christ et nous faisons tous partie les uns des autres. '
  '6':
  - type: note
    content: 'des dons… de la grâce 1.11n  ; cf. 1Co 12.4-11 ; Ep 4.11-13 ; 1P 4.10s. –  selon la grâce… v. 3. –  de parler en prophètes  : litt. la prophétie, cf. 1Co 14. –  dans la logique de la foi ou en accord avec la foi  : l''expression est traditionnellement traduite, par simple transcription du grec, selon l''analogie de la foi  ; cf. v. 3n.'
  - type: text
    content: 'Mais nous avons des dons différents de la grâce, selon la grâce qui nous a été accordée : si c''est de parler en prophètes, que ce soit dans la logique de la foi ; '
  '7':
  - type: note
    content: 'de servir  : litt. le service ou le ministère  ; le mot grec a donné le terme diaconat 11.13 ; 13.4 ; 15.8,25,31n  ; 16.1n  ; cf. Ac 6.1n  ; Col 4.17 ; 1P 4.10s. –  enseignement 1Tm 4.13.'
  - type: text
    content: 'si c''est de servir, qu''on se consacre au service ; que celui qui enseigne se consacre à l''enseignement ; '
  '8':
  - type: note
    content: 'encouragement ou exhortation, ou encore consolation v. 1 ; 15.4s ; 1Co 4.13n  ; 14.3 ; 2Co 1.3nss ; Ph 2.1 ; 1Th 2.3n  ; Hé 13.22. –  donne Ep 4.28. –  générosité  : litt. simplicité  ; voir Mt 6.22n  ; 2Co 8.2n  ; Jc 1.5n. –  qui dirige  : on pourrait aussi comprendre qui s''occupe des autres (en veillant à leurs besoins matériels) ; terme apparenté en 16.2n  ; cf. 1Th 5.12 ; 1Tm 3.4+. –  exerce la compassion  : cf. Mt 6.2ns. –  avec joie  : terme apparenté en 2Co 9.7.'
  - type: text
    content: celui qui encourage, à l'encouragement ; que celui qui donne le fasse avec générosité ; celui qui dirige, avec empressement ; celui qui exerce la compassion, avec joie.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Que l''amour soit sans hypocrisie  : autre traduction l''amour n''est pas hypocrite 2Co 6.6 ; cf. 1Co 13.6 ; 1Tm 1.5 ; 2Tm 1.5 ; 1P 1.22. –  Ayez le mal en horreur… v. 21 ; Am 5.15 ; Ps 97.10.'
  - type: text
    content: 'Que l''amour soit sans hypocrisie. Ayez le mal en horreur ; attachez-vous au bien. '
