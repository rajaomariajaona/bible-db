document_id: NEH.2,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Néhémie autorisé à retourner à Jérusalem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Nisân, la vingtième année… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c''était au tour de Néhémie d''accomplir sa tâche d''échanson (1.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. Gn 40.11). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jamais je n'avais paru triste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : traduction conjecturale ; le texte porte simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'je n''étais pas triste '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; d''après des versions anciennes, certains comprennent au contraire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'étais triste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: personne d'autre n'était devant lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Est 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',10.'
      marker-yv: yv-n
    - type: text
      text: 'Au mois de Nisân, la vingtième année du roi Artaxerxès, comme le vin était devant lui, je pris le vin et je l''offris au roi. Jamais je n''avais paru triste devant lui. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 19 ; 4.1 ; 6.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Sanballat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : nom d''origine babylonienne (v. 19 ; 3.33 ; 4.1 ; 6.1ss ; 13.28) ; c''est probablement le successeur de Rehoum (Esd 4.8). Le nom de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sanballat '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: figure dans des documents retrouvés à Samarie et à Eléphantine (cf. Esd 10.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ) ; plusieurs gouverneurs de Samarie ont manifestement porté ce nom aux IV
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' et III'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Horonite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Horôn est le nom d''une divinité cananéenne associée soit à Beth-Horôn, à une vingtaine de kilomètres au nord-ouest de Jérusalem, soit à Horonaïm en Moab (Es 15.5). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tobiya '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'YHWH est bon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: YHWH est mon bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') n''était pas forcément originaire d''Ammon, en Transjordanie ; c''était peut-être le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gouverneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(v. 7+) de cette région ; cf. 4.1 ; 6.1,12,14,17ss ; 13.4s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'administrateur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prirent très mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jon 4.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour le bien…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour chercher le bien des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' d''Israël.'
      marker-yv: yv-n
    - type: text
      text: Sanballat, le Horonite, et Tobiya, l'administrateur ammonite, l'ayant appris, prirent très mal le fait qu'un homme soit venu pour le bien des Israélites.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Néhémie inspecte l'état des murailles
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: trois jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Est 4.16 ; Esd 8.15,32 ; 10.8s.'
      marker-yv: yv-n
    - type: text
      text: 'J''arrivai à Jérusalem et j''y passai trois jours. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mis au '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.5. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour Jérusalem
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour Israël.
      marker-yv: yv-n
    - type: text
      text: 'Puis je me levai pendant la nuit avec quelques hommes, sans avoir indiqué à personne ce que mon Dieu m''avait mis au cœur de faire pour Jérusalem. Il n''y avait pas avec moi d''autre bête de somme que celle que je montais. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porte de la Vallée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', au sud-ouest de la ville v. 15 ; 3.13 ; 2Ch 26.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'source du Dragon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Figues
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '), peut-être Eïn-Roguel, à la jonction du Cédron et de la vallée de Hinnom (1R 1.9), mais cette source pourrait être aussi celle dont il est question au v. 14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte du Fumier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(3.13s ; 12.31), sans doute la même que la porte des Tessons (Jr 19.2), au sud, vers la vallée de Hinnom. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les murailles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la muraille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.3.'
      marker-yv: yv-n
    - type: text
      text: 'Je sortis de nuit par la porte de la Vallée, dans la direction de la source du Dragon et vers la porte du Fumier, en inspectant les murailles de Jérusalem où il y avait des brèches, et ses portes qui avaient été dévorées par le feu. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: porte de la Source
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', au sud-est (cf. 3.15 ; 12.37). – Le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Réservoir du Roi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''est pas identifié avec certitude ; peut-être s''agit-il de la source de Guihôn ; cf. 3.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pas de place
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sans doute à cause des ruines datant de la destruction de Jérusalem par les Babyloniens.'
      marker-yv: yv-n
    - type: text
      text: 'Je passai près de la porte de la Source et près du Réservoir du Roi, et il n''y avait pas de place où la bête que je montais puisse passer. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''oued '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le torrent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 26.17
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '), sans doute le Cédron, à l''est de Jérusalem auquel on pouvait accéder par la porte du Fumier. Ou bien Néhémie a contourné les ruines pour boucler le tour de la ville par l''extérieur, ou bien il est revenu sur ses pas jusqu''à la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte de la Vallée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 13).
      marker-yv: yv-n
    - type: text
      text: Je montai de nuit par l'oued et j'inspectai la muraille. Puis je rentrai par la porte de la Vallée et je fus ainsi de retour.
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les magistrats
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les gardes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 4.8,13 ; 5.7 ; 7.5 ; 12.40 ; 13.11 ; Esd 9.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux Judéens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : sans doute les gens du peuple, par opposition aux autres catégories. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: notables
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 4.13 ; 5.7 ; 6.17 ; 7.5 ; 13.17 ; Es 34.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous ceux qui exerçaient…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au reste de ceux qui faisaient l'ouvrage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', texte incertain.'
      marker-yv: yv-n
    - type: text
      text: 'Les magistrats ne savaient pas où j''étais allé et ce que je faisais. Jusqu''à ce moment, je n''avais rien raconté aux Judéens, ni aux prêtres, ni aux notables, ni aux magistrats, ni à tous ceux qui exerçaient quelque autre fonction. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans le déshonneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un déshonneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: exposés aux outrages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1.3 ; 3.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 5.9.'
      marker-yv: yv-n
    - type: text
      text: 'Je leur dis alors : Vous voyez le malheur où nous sommes. Jérusalem est un champ de ruines, ses portes ont été détruites par le feu. Venez, rebâtissons la muraille de Jérusalem, et nous ne serons plus dans le déshonneur. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '2.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'comment la bonne main… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'combien la main de Dieu avait été bonne pour moi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils dirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je dis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Bâtissons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: levons-nous et bâtissons
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 20 ; 3.1. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils prirent courage…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ils fortifièrent leurs mains pour la bonne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(chose), ce qui pourrait signifier plus simplement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils se mirent au travail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 6.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Esd 1.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.22+.'
      marker-yv: yv-n
    - type: text
      text: 'Je leur racontai comment la bonne main de mon Dieu était sur moi, et quelles paroles le roi m''avait adressées. Ils dirent : Bâtissons ! Et ils prirent courage pour cette œuvre bonne.'
  '19':
  - type: usfm
    marker: p
