document_id: NEH.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Néhémie autorisé à retourner à Jérusalem
  - type: text
    content: ' '
  - type: note
    content: 'Nisân, la vingtième année… 1.1n. –  devant lui  : LXX devant moi  : c''était au tour de Néhémie d''accomplir sa tâche d''échanson (1.11n  ; cf. Gn 40.11). –  Jamais je n''avais paru triste  : traduction conjecturale ; le texte porte simplement je n''étais pas triste (litt. mauvais ) devant lui  ; d''après des versions anciennes, certains comprennent au contraire j''étais triste  ; LXX personne d''autre n''était devant lui  ; cf. Est 1.3n,10.'
  - type: text
    content: 'Au mois de Nisân, la vingtième année du roi Artaxerxès, comme le vin était devant lui, je pris le vin et je l''offris au roi. Jamais je n''avais paru triste devant lui. '
  '10':
  - type: note
    content: 'V. 19 ; 4.1 ; 6.1. –  Sanballat  : nom d''origine babylonienne (v. 19 ; 3.33 ; 4.1 ; 6.1ss ; 13.28) ; c''est probablement le successeur de Rehoum (Esd 4.8). Le nom de Sanballat figure dans des documents retrouvés à Samarie et à Eléphantine (cf. Esd 10.6n) ; plusieurs gouverneurs de Samarie ont manifestement porté ce nom aux IVe et IIIe s. av. J.-C. –  Horonite  : Horôn est le nom d''une divinité cananéenne associée soit à Beth-Horôn, à une vingtaine de kilomètres au nord-ouest de Jérusalem, soit à Horonaïm en Moab (Es 15.5). –  Tobiya (YHWH est bon ou YHWH est mon bien) n''était pas forcément originaire d''Ammon, en Transjordanie ; c''était peut-être le gouverneur (v. 7+) de cette région ; cf. 4.1 ; 6.1,12,14,17ss ; 13.4s. –  l''administrateur  : litt. le serviteur, de même au v. 19. –  prirent très mal  : cf. Jon 4.1. –  pour le bien…  : litt. pour chercher le bien des fils d''Israël.'
  - type: text
    content: Sanballat, le Horonite, et Tobiya, l'administrateur ammonite, l'ayant appris, prirent très mal le fait qu'un homme soit venu pour le bien des Israélites.
  - type: heading
    content: Néhémie inspecte l'état des murailles
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'trois jours  : cf. Est 4.16 ; Esd 8.15,32 ; 10.8s.'
  - type: text
    content: 'J''arrivai à Jérusalem et j''y passai trois jours. '
  '12':
  - type: note
    content: 'mis au cœur 7.5. –  pour Jérusalem  : LXX pour Israël.'
  - type: text
    content: 'Puis je me levai pendant la nuit avec quelques hommes, sans avoir indiqué à personne ce que mon Dieu m''avait mis au cœur de faire pour Jérusalem. Il n''y avait pas avec moi d''autre bête de somme que celle que je montais. '
  '13':
  - type: note
    content: 'porte de la Vallée, au sud-ouest de la ville v. 15 ; 3.13 ; 2Ch 26.9. –  source du Dragon (LXX des Figues), peut-être Eïn-Roguel, à la jonction du Cédron et de la vallée de Hinnom (1R 1.9), mais cette source pourrait être aussi celle dont il est question au v. 14. –  porte du Fumier (3.13s ; 12.31), sans doute la même que la porte des Tessons (Jr 19.2), au sud, vers la vallée de Hinnom. –  les murailles  : LXX la muraille  ; cf. 1.3.'
  - type: text
    content: 'Je sortis de nuit par la porte de la Vallée, dans la direction de la source du Dragon et vers la porte du Fumier, en inspectant les murailles de Jérusalem où il y avait des brèches, et ses portes qui avaient été dévorées par le feu. '
  '14':
  - type: note
    content: 'porte de la Source, au sud-est (cf. 3.15 ; 12.37). – Le Réservoir du Roi n''est pas identifié avec certitude ; peut-être s''agit-il de la source de Guihôn ; cf. 3.15. –  pas de place  : sans doute à cause des ruines datant de la destruction de Jérusalem par les Babyloniens.'
  - type: text
    content: 'Je passai près de la porte de la Source et près du Réservoir du Roi, et il n''y avait pas de place où la bête que je montais puisse passer. '
  '15':
  - type: note
    content: l'oued ou le torrent (cf. Gn 26.17n), sans doute le Cédron, à l'est de Jérusalem auquel on pouvait accéder par la porte du Fumier. Ou bien Néhémie a contourné les ruines pour boucler le tour de la ville par l'extérieur, ou bien il est revenu sur ses pas jusqu'à la porte de la Vallée (v. 13).
  - type: text
    content: Je montai de nuit par l'oued et j'inspectai la muraille. Puis je rentrai par la porte de la Vallée et je fus ainsi de retour.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Les magistrats  : LXX les gardes  ; cf. 4.8,13 ; 5.7 ; 7.5 ; 12.40 ; 13.11 ; Esd 9.2. –  aux Judéens  : sans doute les gens du peuple, par opposition aux autres catégories. –  notables  : cf. 4.13 ; 5.7 ; 6.17 ; 7.5 ; 13.17 ; Es 34.12+. –  tous ceux qui exerçaient…  : litt. au reste de ceux qui faisaient l''ouvrage , texte incertain.'
  - type: text
    content: 'Les magistrats ne savaient pas où j''étais allé et ce que je faisais. Jusqu''à ce moment, je n''avais rien raconté aux Judéens, ni aux prêtres, ni aux notables, ni aux magistrats, ni à tous ceux qui exerçaient quelque autre fonction. '
  '17':
  - type: note
    content: '1.3. –  dans le déshonneur  : litt. un déshonneur  ; autre traduction exposés aux outrages  ; cf. 1.3 ; 3.36n  ; 5.9.'
  - type: text
    content: 'Je leur dis alors : Vous voyez le malheur où nous sommes. Jérusalem est un champ de ruines, ses portes ont été détruites par le feu. Venez, rebâtissons la muraille de Jérusalem, et nous ne serons plus dans le déshonneur. '
  '18':
  - type: note
    content: 'comment la bonne main… ou combien la main de Dieu avait été bonne pour moi v. 8+. –  Ils dirent  : LXX je dis. –  Bâtissons  : litt. levons-nous et bâtissons, de même au v. 20 ; 3.1. –  ils prirent courage…  : litt. ils fortifièrent leurs mains pour la bonne (chose), ce qui pourrait signifier plus simplement ils se mirent au travail  ; cf. 6.9n  ; Esd 1.6n  ; 6.22+.'
  - type: text
    content: 'Je leur racontai comment la bonne main de mon Dieu était sur moi, et quelles paroles le roi m''avait adressées. Ils dirent : Bâtissons ! Et ils prirent courage pour cette œuvre bonne.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'V. 7n,10n. –  Guéshem 6.1n,6s. On a trouvé un bol d''argent du Ve s. av. J.-C. portant ce nom en araméen. –  l''Arabe  : autre traduction le Bédouin  ; cf. 4.1 ; 6.1 ; Es 13.20 ; Jr 3.2 ; 2Ch 17.11n. –  nous traitèrent avec mépris  : LXX vinrent vers nous . –  Vous rebellez-vous  : cf. Esd 4.12-22.'
  - type: text
    content: 'Sanballat, le Horonite, Tobiya, l''administrateur ammonite, et Guéshem, l''Arabe, l''ayant appris, se moquèrent de nous et nous traitèrent avec mépris. Ils dirent : Que faites-vous là ? Vous rebellez-vous contre le roi ? '
  '2':
  - type: note
    content: 'Pourquoi…  : cf. Gn 40.7 ; Pr 25.20 ; Ec 7.3. –  une tristesse de cœur  : la même expression, prise en mauvaise part, pourrait aussi signifier un cœur mauvais, cf. 1S 17.28. –  peur  : l''état de Jérusalem, cause du tourment de Néhémie, était probablement lié à une décision antérieure du même roi (cf. 1.3n  ; Esd 4.21).'
  - type: text
    content: 'Le roi me dit : Pourquoi as-tu le visage triste ? Tu n''es pourtant pas malade ; ce ne peut être qu''une tristesse de cœur. J''eus très peur, '
  '20':
  - type: note
    content: 'nous bâtirons  : cf. v. 18n. –  vous n''avez…  : on pourrait aussi comprendre vous n''aurez ni part, ni droit (litt. justice), cf. Esd 4.3. –  évocation  : autres traductions souvenir, nom, cf. Ex 3.15 ; 12.14n.'
  - type: text
    content: 'Je leur fis cette réponse : Le Dieu du ciel nous fera réussir. Nous, ses serviteurs, nous bâtirons ; mais vous, vous n''avez ni part, ni droit, ni évocation dans Jérusalem.'
  '3':
  - type: note
    content: 'Que le roi vive… 1R 1.31 ; Dn 2.4 ; 3.9. –  où sont les tombeaux  : litt. maison des tombeaux  ; cf. 1S 25.1 ; 1R 2.34 ; 2R 21.18 ; 2Ch 33.20. –  portes… v. 17 ; 1.3+.'
  - type: text
    content: 'et je répondis au roi : Que le roi vive toujours ! Pourquoi n''aurais-je pas le visage triste, alors que la ville où sont les tombeaux de mes pères est détruite et que ses portes ont été dévorées par le feu ? '
  '4':
  - type: note
    content: le Dieu du ciel 1.5+.
  - type: text
    content: 'Le roi me dit : Au fait, que demandes-tu donc ? Je priai le Dieu du ciel '
  '5':
  - type: note
    content: 'Si cela te semble bon…  : litt. si (cela est) bon pour le roi et si ton serviteur est bon devant toi  ; v. 7 ; Est 1.19+.'
  - type: text
    content: 'et je répondis au roi : Si cela te semble bon, et si moi, ton serviteur, j''ai ta faveur, envoie-moi en Juda, dans la ville des tombeaux de mes pères, pour que je la rebâtisse. '
  '6':
  - type: note
    content: 'la reine  : traduction incertaine ; le sens est peut-être la favorite (dans le cadre du harem royal) ; même terme en Ps 45.10n  ; cf. Est ; Dn 5.2. –  Il plut au roi  : litt. (cela) fut bon devant le roi. –  durée  : cf. 5.14 ; 13.6.'
  - type: text
    content: 'Le roi, auprès duquel la reine était assise, me dit alors : Combien de temps ton voyage durera-t-il et quand seras-tu de retour ? Il plut au roi de me laisser partir, et je lui indiquai une durée. '
  '7':
  - type: note
    content: 'les gouverneurs  : cf. v. 9s,19 ; Esd 8.36n. –  Transeuphratène v. 9 ; 3.7 ; Esd 4.10n.'
  - type: text
    content: 'Puis je dis au roi : Si cela te semble bon, ô roi, qu''on me donne des lettres pour les gouverneurs de Transeuphratène, afin qu''ils me laissent passer jusqu''à mon arrivée en Juda, '
  '8':
  - type: note
    content: 'Cf. Esd 7.15ss. –  parc  : hébreu pardés, terme d''origine perse qui signifie parc ou verger et qui a donné, en passant par le grec, notre mot paradis (cf. Ct 4.13 ; Ec 2.5). –  bois de charpente  : cf. 1R 5.17ss ; 2Ch 2.8s,16. –  de la citadelle (1.1n  ; 7.2), près de la Maison (c.-à-d. du temple) : cette précision est absente de LXX. –  la bonne main… v. 18 ; Esd 7.6+,9.'
  - type: text
    content: et une lettre pour Asaph, gardien du parc royal, afin qu'il me fournisse du bois de charpente pour les portes de la citadelle, près de la Maison, pour la muraille de la ville et pour la maison où je me rendrai. Le roi me l'accorda, car la bonne main de mon Dieu était sur moi.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'auprès des gouverneurs , sans doute à Samarie (Esd 4.10n  ; 5.8n). –  fait accompagner…  : cf. Esd 8.22+. –  chars ou cavaliers , cf. Esd 8.22n.'
  - type: text
    content: 'Je me rendis auprès des gouverneurs de Transeuphratène et je leur remis les lettres du roi. Le roi m''avait fait accompagner par des officiers et par des chars. '
