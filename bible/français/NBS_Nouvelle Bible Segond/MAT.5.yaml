      - type: usfm
        marker: w
        children:
        - type: text
          text: non-Juifs
      - type: text
        text: ) eux-mêmes n'en font-ils pas autant ? Vous, aimez ceux qui vous haïssent et vous n'aurez pas d'ennemis. Abstiens-toi des désirs charnels et corporels. Si quelqu'un te donne une gifle sur la joue droite, tends-lui aussi l'autre et tu seras parfait. Si quelqu'un te requiert pour un mille, fais-en deux avec lui. Si quelqu'un t'enlève ton manteau, donne-lui aussi la tunique. Si quelqu'un te prend ton bien, ne le réclame pas, car tu ne le peux pas. Donne à tout homme qui t'implore et ne réclame pas. Car le Père veut qu'on fasse partager à tous ses propres dons. »
    marker-yv: yv-n
  - type: text
    text: 'Mais moi, je vous dis de ne pas vous opposer au mauvais. Si quelqu''un te frappe sur la joue droite, tends-lui aussi l''autre. '
