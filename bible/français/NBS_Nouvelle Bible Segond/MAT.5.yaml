document_id: MAT.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le « Sermon sur la montagne »
  - type: heading
    content: Mc 3.13  ; Lc 6.12-13
  - type: text
    content: ' '
  - type: note
    content: 'montagne  : peut-être une des collines à quelque distance du lac ; ce terme peut également avoir une valeur symbolique (lieu de la révélation ; voir « Quelques montagnes et régions montagneuses de la Bible »♦) ; cf. 8.1 ; 14.23/ / ; 15.29 ; 28.16 ; voir aussi 24.3 ; Ex 19 ; 1R 20 ; Es 2.2ss ; Lc 6.12,20-49 ; Jn 6.3. –  disciples  : le mot pourrait être traduit par élèves.'
  - type: text
    content: 'Voyant les foules, il monta sur la montagne, il s''assit, et ses disciples vinrent à lui. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 1P 3.14.
  - type: text
    content: Heureux ceux qui sont persécutés à cause de la justice,
  - type: text
    content: car le royaume des cieux est à eux !
  '11':
  - type: text
    content: ' '
  - type: note
    content: '10.22 ; Es 51.7 ; Jn 15.20 ; Ac 5.41 ; Jc 1.2,12 ; 1P 4.13s. –  faussement  : cette précision est absente de certains mss. –  Evangile selon Thomas 68s : « Jésus a dit : “Bienheureux serez-vous quand on vous haïra et quand on vous persécutera ; et on n''atteindra pas le lieu là où on vous a persécutés.” Jésus a dit : “Bienheureux ceux qui ont été persécutés dans leur cœur. Ce sont eux qui ont véritablement connu le Père. Bienheureux, les affamés, car le ventre de celui qui désire sera rempli.” »'
  - type: text
    content: 'Heureux êtes-vous lorsqu''on vous insulte, qu''on vous persécute et qu''on répand faussement sur vous toutes sortes de méchancetés, à cause de moi. '
  '12':
  - type: note
    content: 'récompense  : le terme peut aussi avoir le sens de salaire  ; voir ses emplois au v. 46 ; 6.1s,5,16 ; 10.41s ; 20.8n  ; Mc 9.41 ; Lc 6.23,35 ; 10.7n  ; Jn 4.36n  ; Ac 1.18n  ; Rm 4.4n  ; 1Co 3.8n  ; 2Jn 8 ; Ap 11.18+. –  prophètes 10.41 ; 13.17 ; 23.29-35 ; 1Th 2.15 ; Hé 11.32-38 ; Jc 5.10s ; cf. 2Co 12.10.'
  - type: text
    content: Réjouissez-vous et soyez transportés d'allégresse, parce que votre récompense est grande dans les cieux ; car c'est ainsi qu'on a persécuté les prophètes qui vous ont précédés.
  - type: heading
    content: Sel de la terre et lumière du monde
  - type: heading
    content: Mc 9.50  ; Lc 14.34-35
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'sel  : cf. Lv 2.13 ; Nb 18.19 ; Jb 6.6 ; Lm 2.14 ; 2Ch 13.5 ; Mc 9.50 ; Lc 14.34. –  devient fade  : le même verbe a le sens de devenir fou en Rm 1.22 et, à un autre mode, il est traduit par frapper de folie en 1Co 1.20. L''affadissement du sel est décrit comme une chose impossible dans le Talmud . Cependant l''image évoque surtout le sel peu raffiné utilisé dans les temps bibliques, en fait un mélange de sel et de gypse qui pouvait effectivement perdre son sel (au sens propre) : ne restait alors plus qu''un résidu non salé ; cf. 25.29. –  foulé aux pieds  : le même verbe est traduit par piétiner en 7.6. –  les gens  : autres traductions les humains ; les hommes (v. 16,19 ; 6.1s,5,14nss etc.).'
  - type: text
    content: C'est vous qui êtes le sel de la terre. Mais si le sel devient fade, avec quoi le salera-t-on ? Il n'est plus bon qu'à être jeté dehors et foulé aux pieds par les gens.
  - type: heading
    content: Mc 4.21  ; Lc 8.16  ; 11.33
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'lumière du monde  : cf. Jn 8.12 ; Ep 5.8 ; Ph 2.15 ; voir aussi Es 42.6 ; 49.6 ; 60.1. –  ville… Es 2.2 ; Ap 21.10s. –  Testament de Lévi 14.3s : « Le ciel est plus pur que la terre : vous aussi, les flambeaux d''Israël, soyez plus purs que les nations. Mais si vous êtes plongés dans les ténèbres de l''impiété, que feront les nations qui vivent dans l''aveuglement ? Vous attirerez alors la malédiction sur notre race, car la lumière de la Loi, qui a été donnée pour illuminer tout homme, vous aurez voulu la supprimer. » Evangile selon Thomas 32s : « Jésus a dit : “Une ville édifiée sur une montagne ne peut tomber ni rester cachée.” Jésus a dit : “Ce que tu entendras dans ton oreille, proclame-le sur les toits à l''oreille d''autrui. Car personne n''allume une lampe pour la mettre sous le boisseau, ni dans un endroit caché ; mais au contraire il la place sur un lampadaire, de façon à ce que quiconque entre et sort puisse voir la lumière.” »'
  - type: text
    content: 'C''est vous qui êtes la lumière du monde. Une ville située sur une montagne ne peut être cachée. '
  '15':
  - type: note
    content: lampe Mc 4.21 ; Lc 8.16 ; 11.33.
  - type: text
    content: 'On n''allume pas une lampe pour la mettre sous le boisseau, mais on la met sur le porte-lampe, et elle brille pour tous ceux qui sont dans la maison. '
  '16':
  - type: note
    content: Cf. 6.1ss. –  glorifient Jn 15.8 ; 1Co 10.31 ; 1Tm 5.25 ; 1P 2.12. –  Père v. 45.
  - type: text
    content: Que votre lumière brille ainsi devant les gens, afin qu'ils voient vos belles œuvres et glorifient votre Père qui est dans les cieux.
  - type: heading
    content: Jésus et la Loi
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Ne pensez pas… 10.34 ; cf. 9.13 ; 20.28. –  Loi / Prophètes  : désignation hébraïque courante de l''ensemble de la Bible juive (notre Ancien Testament, voir l''introduction à l''Ancien Testament♦) ; cf. 7.12 ; 11.13 ; 22.40 ; Rm 13.8ss ; Ga 5.14 ; voir aussi Za 7.12. –  accomplir  : le verbe grec correspondant, qui signifie d''abord remplir (cf. 13.48 ; 23.32), est utilisé pour exprimer la réalisation des paroles des prophètes (1.22+ ; cf. 3.15n) aussi bien que l''obéissance à la loi (Rm 13.8 ; Ga 5.14) ; voir aussi Es 42.21 ; Jn 10.35 ; Rm 3.31 ; 8.4.'
  - type: text
    content: 'Ne pensez pas que je sois venu pour abolir la Loi ou les Prophètes. Je ne suis pas venu pour abolir, mais pour accomplir. '
  '18':
  - type: note
    content: 'Amen  : traduction traditionnelle en vérité  ; on a ici et dans la suite (v. 26 ; 6.2,5,16 etc.) la transcription, dans le texte grec, d''un terme hébreu ou araméen qui signifie qu''il en soit ainsi ! (Dt 27.15n) ; cet emploi du terme est caractéristique des paroles de Jésus dans les évangiles ; cf. Jn 1.51n  ; 2Co 1.19s. –  ciel / terre 24.35 ; Lc 16.17. Baruch 4.1 : « La Sagesse c''est le livre des commandements de Dieu, c''est la Loi qui existe pour toujours. » 4 Esdras 9.37 : « La loi, elle, ne périt pas mais demeure dans sa gloire. » 2 Baruch 77.15 : « Même si nous passons, la Loi demeure. » –  pas un seul  : autres traductions jamais, en aucun cas un seul… (de même v. 20,26). –  iota  : nom de la plus petite lettre de l''alphabet grec, qui correspond au yod hébreu encore plus petit. Pour l''idée, cf. Jc 2.10.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, en effet, jusqu''à ce que le ciel et la terre passent, pas un seul iota ou un seul trait de lettre de la Loi ne passera, jusqu''à ce que tout soit arrivé. '
  '19':
  - type: note
    content: 'violera  : le verbe grec correspondant est apparenté à celui qui est traduit par abolir au v. 17. Autres emplois en 16.19 (délier) et Ac 27.41 ; cf. Jn 5.18n. –  plus petit  : cf. 11.11n  ; 1Co 15.9 (moindre). –  les mettra en pratique (litt. les fera)… 7.24 ; Ps 119.4 ; Dn 12.3. Cf. Testament de Lévi 13.9 : « Quiconque enseigne cela et le met en pratique trônera avec les rois, comme Joseph, mon frère. »'
  - type: text
    content: Celui donc qui violera l'un de ces plus petits commandements et qui enseignera aux gens à faire de même sera appelé le plus petit dans le royaume des cieux, mais celui qui les mettra en pratique et les enseignera, celui-là sera appelé grand dans le royaume des cieux.
  '2':
  - type: note
    content: 'Cf. Dt 18.18 ; Jn 7.46 ; Hé 1.2. –  il prit la parole  : litt. il ouvrit la bouche  ; cf. 13.35n  ; voir aussi 17.27 ; Ac 8.35n. –  instruire  : le même verbe grec est traduit par enseigner 4.23.'
  - type: text
    content: 'Puis il prit la parole et se mit à les instruire :'
  - type: heading
    content: Bonheurs
  - type: heading
    content: Lc 6.20-26
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'justice  : cf. 3.15n  ; Rm 10.3. –  ne surpasse pas  : litt. n''abonde pas plus que  ; cf. 12.34 ; 13.12 ; 14.20n  ; 25.29. –  scribes / pharisiens 23.2ss. –  jamais  : autres traductions même pas, en aucun cas . –  royaume des cieux 3.2n  ; 18.3 ; 23.13.'
  - type: text
    content: Car, je vous le dis, si votre justice ne surpasse pas celle des scribes et des pharisiens, vous n'entrerez jamais dans le royaume des cieux.
  - type: heading
    content: Offense et réconciliation
  - type: heading
    content: Mc 11.25  ; Lc 12.57-59
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'anciens  : il ne s''agit pas ici des responsables du peuple ou de l''assemblée, mais des ancêtres. Cf. v. 27,31,33,38,43 ; 19.18s. –  Ex 20.13  ; 21.12 ; Lv 24.17 ; Nb 35.16-18 ; Dt 5.17.'
  - type: text
    content: 'Vous avez entendu qu''il a été dit aux anciens : '
  - type: text
    content: Tu ne commettras pas de meurtre ;
  - type: text
    content: ' celui qui commet un meurtre sera passible du jugement. '
  '22':
  - type: note
    content: 'moi, je vous dis v. 28,32,34,39,44. Cf. 7.29. –  colère Ps 37.8 ; Ep 4.26 ; Jc 1.19s ; 1Jn 3.15. –  jugement Rm 1.32. –  raka  : transcription, dans le texte grec, d''une insulte probablement araméenne, qui figure dans le Talmud et qui dérive sans doute d''une racine signifiant vide (tête creuse  ?). Cf. 12.36 ; 15.11. –  sanhédrin  : cf. 10.17 ; 26.59 ; voir Dt 17.8n  ; Mc 8.31n. –  fou  : cf. 7.26 ; 23.17 ; 25.2ss ; sur le caractère moral ou religieux de cette insulte, voir Dt 32.6 ; 1Co 4.10. –  géhenne  : transcription grecque d''une expression hébraïque qui désignait à l''origine la vallée de Hinnom, au sud de Jérusalem, ancien lieu de sacrifices humains ; par la suite, lieu du châtiment associé au Jugement dernier, cf. v. 29 ; 10.28 ; 23.15,33 ; cf. 2R 16.3 ; 21.6 ; 23.10 ; Jr 7.31n  ; 19.4ss ; 32.34s ; 2Ch 28.3 ; 33.6 ; 1 Hénoch 27.2 : « Le ravin maudit (c.-à-d. la géhenne) est destiné à ceux qui sont maudits pour l''éternité. » 4 Esdras 7.36 : « La fosse du tourment apparaîtra ; en face sera le lieu du repos ; on verra la fournaise de la géhenne, en face, le paradis de délices. » –  feu  : cf. 3.12 ; Dt 32.22 ; Es 32.10 ; 66.24+ ; Mc 9.48 ; Ap 14.10 ; 1 Hénoch 10.13 : « Ils seront conduits dans l''abîme de feu, dans le tourment et dans la geôle de réclusion perpétuelle. » 90.26 : « Un gouffre semblable s''était ouvert dans la terre, plein de feu. On fit comparaître les moutons aveuglés, et tous furent jugés, reconnus coupables et précipités dans ce gouffre de feu pour y brûler. »'
  - type: text
    content: 'Mais moi, je vous dis : Quiconque se met en colère contre son frère sera passible du jugement. Celui qui traitera son frère de '
  - type: text
    content: raka
  - type: text
    content: ' sera passible du sanhédrin. Celui qui le traitera de fou sera passible de la géhenne de feu.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'présenter  : cf. 8.4 ; voir aussi Gn 4.3. –  autel 23.18-20 ; cf. Mc 11.25 ; 1Tm 2.8. Didachè 14.2 : « Mais que celui qui a un différend avec son compagnon ne se joigne pas à vous avant de s''être réconcilié, de peur que votre sacrifice ne soit profané. »'
  - type: text
    content: 'Si donc tu vas présenter ton offrande sur l''autel, et que là tu te souviennes que ton frère a quelque chose contre toi, '
  '24':
  - type: text
    content: laisse ton offrande là, devant l'autel, et va d'abord te réconcilier avec ton frère, puis viens présenter ton offrande.
  '25':
  - type: text
    content: ' '
  - type: note
    content: garde (cf. 26.58/ / ; Jn 7.32+) ou officier, serviteur (Lc 1.2+), servant (Lc 4.20), auxiliaire (Ac 13.5) ; il s'agit ici de celui qui est chargé d'exécuter la sentence. Cf. Lc 12.57ss ; 1Co 6.1-9 ; Jc 5.9.
  - type: text
    content: 'Arrange-toi vite avec ton adversaire, pendant que tu es encore en chemin avec lui, de peur que l''adversaire ne te livre au juge, le juge au garde, et que tu ne sois mis en prison. '
  '26':
  - type: note
    content: 'pas  : autres traductions jamais, en aucun cas. –  quadrant  : monnaie équivalant à 1/4 d''as (cf. 10.29n  ; Mc 12.42n) ; voir mesures, poids et monnaies ; cf. 18.34s.'
  - type: text
    content: Amen,
  - type: text
    content: ' je te le dis, tu ne sortiras pas de là avant d''avoir payé jusqu''au dernier quadrant.'
  - type: heading
    content: L'adultère et les pièges pour la foi
  - type: heading
    content: Mt 18.8-9  ; Mc 9.43,47-48
  '27':
  - type: text
    content: ' '
  - type: note
    content: V. 21n  ; Ex 20.14  ; Lv 20.10 ; Dt 5.18.
  - type: text
    content: 'Vous avez entendu qu''il a été dit : '
  - type: text
    content: Tu ne commettras pas d'adultère
  - type: text
    content: '. '
  '28':
  - type: note
    content: 'V. 22n. –  une femme mariée ou fiancée, comme en 1.20,24 ; 14.3 ; cf. Ex 20.17n  ; Jb 31.1 ; 2P 2.14. –  de façon à la désirer  : autres traductions possibles au point de la convoiter ; pour éveiller son désir. –  dans son cœur  : cf. v. 11 ; 6.21.'
  - type: text
    content: 'Mais moi, je vous dis : Quiconque regarde une femme de façon à la désirer a déjà commis l''adultère avec elle dans son cœur. '
  '29':
  - type: note
    content: '18.8s ; 1Co 9.27 ; Ga 5.24 ; Col 3.5. –  causer ta chute 11.6n. –  une partie de ton corps  : cf. Rm 6.13n. –  géhenne v. 22n.'
  - type: text
    content: 'Si ton œil droit doit causer ta chute, arrache-le et jette-le loin de toi. Car il est avantageux pour toi de perdre seulement une partie de ton corps et que celui-ci ne soit pas jeté tout entier dans la géhenne. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'pauvres en esprit  : selon toute vraisemblance, ceux qui ont l''esprit d''humilité, qui sentent leur pauvreté spirituelle, les humbles (cf. Es 57.15 ; 61.1 ; Ps 34.19 ; 40.18 ; Lc 4.18 ; 12.32). Une expression analogue apparaît à plusieurs reprises dans les écrits de Qumrân. Selon certains, il s''y trouvait également des séries de béatitudes comparables à Mt 5.3-12 (mais il s''agit de textes fragmentaires qui exigent une reconstitution).'
  - type: text
    content: Heureux les pauvres en esprit,
  - type: text
    content: car le royaume des cieux est à eux !
  '30':
  - type: note
    content: Cf. Dt 25.12.
  - type: text
    content: Si ta main droite doit causer ta chute, coupe-la et jette-la loin de toi, car il est avantageux pour toi de perdre seulement une partie de ton corps et que celui-ci n'aille pas tout entier dans la géhenne.
  - type: heading
    content: La répudiation
  - type: heading
    content: Mt 19.7-9  ; Mc 10.4-5,10-12  ; Lc 16.18
  '31':
  - type: text
    content: ' '
  - type: note
    content: Dt 24.1  ; Mt 19.3-9 ; cf. Ml 2.14ss.
  - type: text
    content: 'Il a été dit : '
  - type: text
    content: Que celui qui répudie sa femme lui donne une attestation de rupture
  - type: text
    content: '. '
  '32':
  - type: note
    content: '19.9 ; Mc 10.11 ; Lc 16.18 ; 1Co 7.10s ; cf. Rouleau du Temple (Qumrân) 57.17s : « Il (le roi) ne prendra pas d''autre femme en plus, mais celle-là seule sera avec lui tous les jours de sa vie. » Ecrit de Damas (Qumrân) 4.20s : « Ils ont été attrapés… par la luxure… en épousant deux femmes de leur vivant, alors que le principe de la nature, c''est  : Mâle et femelle, Il les créa. » –  inconduite sexuelle  : le mot grec pornéia, d''où dérive notre mot « pornographie », vient d''un verbe grec qui signifie vendre (en particulier des prisonniers ou des prisonnières). Il signifie parfois prostitution (cf. 21.31s ; Jn 8.41n  ; Ap 17.1ss), mais il peut aussi s''appliquer à toutes formes de rapports sexuels illicites (15.19 ; Ac 15.28s ; 1Co 5.1n  ; 6.13 ; cf. Os 1.2n). Il est fort probable que Matthieu se réfère à Dt 24.1n, cité au v. 31, dont le sens a été beaucoup débattu dans les écoles rabbiniques. Dans ce cas, il identifierait le motif de répudiation (facultative ? obligatoire ?) de Dt 24 à l''adultère ou plus généralement à une inconduite d''ordre sexuel de la part de la femme. Certains croient cependant que le terme désigne plus spécialement ici (et en Ac 15.28s) les unions illicites décrites en Lv 18.6-18. Dans cette hypothèse, le texte exclurait en fait toute possibilité de répudiation dans le cadre des unions licites. –  la rend adultère  : autre traduction l''expose à l''adultère.'
  - type: text
    content: 'Mais moi, je vous dis : Quiconque répudie sa femme – sauf en cas d''inconduite sexuelle – la rend adultère, et celui qui épouse une femme répudiée commet l''adultère.'
  - type: heading
    content: Les serments
  '33':
  - type: text
    content: ' '
  - type: note
    content: Lv 19.12 ; Nb 30.3 ; Dt 23.22-24 ; cf. Za 8.17 ; Ps 15.4 ; 1Tm 1.10.
  - type: text
    content: 'Vous avez encore entendu qu''il a été dit aux anciens : Tu ne te parjureras pas, mais tu t''acquitteras envers le Seigneur de tes serments. '
  '34':
  - type: note
    content: Cf. Jc 5.12+. –  ciel trône 23.22 ; Es 66.1 ; Ps 11.4.
  - type: text
    content: 'Mais moi, je vous dis de ne pas jurer du tout : ni par le ciel, parce que c''est le trône de Dieu, '
  '35':
  - type: note
    content: 'son marchepied  : litt. le marchepied de ses pieds, Es 66.1 ; Ps 99.5 ; Lm 2.1. –  ville du grand roi Ps 48.3.'
  - type: text
    content: 'ni par la terre, parce que c''est son marchepied, ni par Jérusalem, parce que c''est la ville du grand roi. '
  '36':
  - type: note
    content: Cf. 6.27.
  - type: text
    content: 'Ne jure pas non plus par ta tête, car tu ne peux en rendre un seul cheveu blanc ou noir. '
  '37':
  - type: note
    content: Autre traduction que votre oui soit oui, votre non, non  ; cf. 2Co 1.17 ; Jc 5.12 ; voir aussi Za 8.16 ; Ep 4.25. –  du Mauvais ou du méchant  ; le même mot est traduit par méchanceté au v. 11 ; cf. v. 39,45 ; voir aussi 6.13n  ; 13.19,38 ; Jn 17.15.
  - type: text
    content: Que votre parole soit « oui, oui », « non, non » ; ce qu'on y ajoute vient du Mauvais.
  - type: heading
    content: La vengeance
  - type: heading
    content: Lc 6.29-30
  '38':
  - type: text
    content: ' '
  - type: note
    content: Ex 21.24s ; Lv 24.20 ; Dt 19.21.
  - type: text
    content: 'Vous avez entendu qu''il a été dit : '
  - type: text
    content: Œil pour œil,
  - type: text
    content: ' et '
  - type: text
    content: dent pour dent
  - type: text
    content: '. '
  '39':
  - type: note
    content: 'vous opposer ou résister Lc 21.15 ; Ac 13.8 ; Rm 13.2 ; Ga 2.11 ; Jc 4.7 ; 1P 5.9. –  au mauvais  : cf. v. 37+. –  joue Es 50.6 ; Lm 3.30. – Sur l''ensemble, voir Pr 20.22 ; 24.29 ; Rm 12.17ss ; 1Th 5.15 ; 1P 2.21-23. Cf. Didachè 1.2-5 : « Voici donc la voie de la vie : Tu aimeras d''abord Dieu qui t''a créé, puis ton prochain comme toi-même, et tout ce que tu ne veux pas qu''il te soit fait, toi non plus ne le fais pas à autrui. Voici l''enseignement de ces paroles : Bénissez ceux qui vous maudissent, priez pour vos ennemis et jeûnez pour ceux qui vous persécutent. Quel mérite (le mot est habituellement traduit par grâce) y a-t-il en effet d''aimer ceux qui vous aiment ? Les païens (ou les non-Juifs) eux-mêmes n''en font-ils pas autant ? Vous, aimez ceux qui vous haïssent et vous n''aurez pas d''ennemis. Abstiens-toi des désirs charnels et corporels. Si quelqu''un te donne une gifle sur la joue droite, tends-lui aussi l''autre et tu seras parfait. Si quelqu''un te requiert pour un mille, fais-en deux avec lui. Si quelqu''un t''enlève ton manteau, donne-lui aussi la tunique. Si quelqu''un te prend ton bien, ne le réclame pas, car tu ne le peux pas. Donne à tout homme qui t''implore et ne réclame pas. Car le Père veut qu''on fasse partager à tous ses propres dons. »'
  - type: text
    content: 'Mais moi, je vous dis de ne pas vous opposer au mauvais. Si quelqu''un te frappe sur la joue droite, tends-lui aussi l''autre. '
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'pleurent  : litt. mènent deuil  ; Es 61.2s ; Ps 126.5 ; 147.3 ; 2Co 1.3s ; Ap 7.16s ; 21.4. Certains mss intervertissent les v. 4 et 5.'
  - type: text
    content: Heureux ceux qui pleurent,
  - type: text
    content: car ils seront consolés !
  '40':
  - type: note
    content: 'tunique  : vêtement de dessous, cf. Gn 37.23. –  vêtement  : autre traduction manteau  ; il s''agit du vêtement de dessus, par opposition à la tunique  ; cf. Ex 22.25 ; Dt 24.12 ; comparer avec Lc 6.29s ; 1Co 6.7.'
  - type: text
    content: 'Si quelqu''un veut te faire un procès pour te prendre ta tunique, laisse-lui aussi ton vêtement. '
  '41':
  - type: note
    content: 'te réquisitionne  : c''était un droit exercé par les autorités romaines (cf. 27.32/ /). –  un mille  : près de 1 500 mètres (voir mesures).'
  - type: text
    content: 'Si quelqu''un te réquisitionne pour faire un mille, fais-en deux avec lui. '
  '42':
  - type: note
    content: Dt 15.7ss ; Ps 37.21,26 ; Pr 21.26.
  - type: text
    content: Donne à celui qui te demande, et ne te détourne pas de celui qui veut t'emprunter quelque chose.
  - type: heading
    content: L'amour et les ennemis
  - type: heading
    content: Lc 6.27-28,32-36
  '43':
  - type: text
    content: ' '
  - type: note
    content: 'Lv 19.18 (Mt 22.39) ; voir aussi Dt 7.2 ; 23.7 ; 30.7 ; Ps 5.5 ; 26.5 ; 31.7 ; 119.113ss ; 139.19ss ; 2Ch 19.2 ; Rm 5.10 ; 2Th 3.15 ; Règle de la Communauté (Qumrân) 1.3s : « Pour aimer tout ce qu''Il a élu et pour haïr tout ce qu''Il a méprisé. » 1.9ss : « Afin qu''ils aiment tous les fils de lumière… et afin qu''ils haïssent tous les fils de ténèbres, chacun selon sa faute, dans la Vengeance de Dieu. »'
  - type: text
    content: 'Vous avez entendu qu''il a été dit : '
  - type: text
    content: Tu aimeras ton prochain
  - type: text
    content: ' et tu détesteras ton ennemi. '
  '44':
  - type: note
    content: 'Après vos ennemis, certains mss portent un texte plus long  : bénissez ceux qui vous maudissent, faites du bien à ceux qui vous détestent, priez pour ceux qui vous maltraitent et qui vous persécutent. Cf. Lc 6.27s. Voir Ex 23.4s ; Lv 19.34 ; Jb 31.28s ; Pr 24.17 ; 25.21 ; Ac 7.60 ; 1P 3.9 ; Testament de Joseph 18.2 : « Si quelqu''un cherche à vous nuire, vous, en faisant le bien, priez pour lui, et vous serez libérés de tout mal par le Seigneur. » Testament de Benjamin 4.3 : « Quand bien même voudraient-ils lui nuire, c''est en faisant le bien qu''il vainc le mal, protégé qu''il est par Dieu ; mais les justes, il les aime comme lui-même. »'
  - type: text
    content: 'Mais moi, je vous dis : Aimez vos ennemis et priez pour ceux qui vous persécutent. '
  '45':
  - type: note
    content: '22.10 ; Ps 145.9 ; Lc 6.35 ; Ac 14.17 ; Ep 5.1. –  mauvais ou méchants  : cf. v. 37+ ; 7.11 ; 12.34s ; 13.49.'
  - type: text
    content: 'Alors vous serez fils de votre Père qui est dans les cieux, car il fait lever son soleil sur les mauvais et sur les bons, et il fait pleuvoir sur les justes et sur les injustes. '
  '46':
  - type: note
    content: 'aurez-vous  : litt. avez-vous, de même en 6.1. –  collecteurs des taxes 9.9ss ; 10.3 ; 11.19 ; 18.17 ; 21.31s ; voir Mc 2.14n,15n.'
  - type: text
    content: 'En effet, si vous aimez ceux qui vous aiment, quelle récompense aurez-vous ? Les collecteurs des taxes eux-mêmes n''en font-ils pas autant ? '
  '47':
  - type: note
    content: non-Juifs ou païens 18.17 ; cf. 4.15n.
  - type: text
    content: 'Et si vous ne saluez que vos frères, que faites-vous d''extraordinaire ? Les non-Juifs eux-mêmes n''en font-ils pas autant ? '
  '48':
  - type: note
    content: 'Autres traductions  : Soyez donc parfaits ou accomplis… Cf. 19.21 ; Lv 19.2+ ; Dt 18.13 ; 1Co 14.20 ; Col 3.14.'
  - type: text
    content: Vous serez donc parfaits, comme votre Père céleste est parfait.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'doux  : le terme grec évoque l''humilité, la modestie, la considération pour autrui ; cf. 11.29 ; 21.5 ; 1P 3.4 ; terme apparenté en 1Co 4.21 ; Ga 5.23 ; 6.1 ; Ep 4.2 ; Tt 3.2 ; Jc 1.21 ; 3.13 ; 1P 3.16 ; cf. Dt 4.38 ; Ps 37.9,11 . Didachè 3.7 : « Sois doux, car les doux recevront la terre en partage. »'
  - type: text
    content: Heureux ceux qui sont doux,
  - type: text
    content: car ils hériteront la terre !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'faim / soif  : cf. Ps 107.5 ; Jn 6.35 ; Ap 7.16s. –  justice v. 20 ; cf. Pr 21.21.'
  - type: text
    content: Heureux ceux qui ont faim et soif de justice,
  - type: text
    content: car ils seront rassasiés !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'compatissants ou miséricordieux  : ceux qui se laissent émouvoir par les besoins des autres et leur viennent en aide (cf. 6.2n  ; 9.13,36 ; 18.33 ; Lc 10.37) ; voir aussi Es 58.7-10 ; Pr 14.21 ; Jc 2.13.'
  - type: text
    content: Heureux ceux qui sont compatissants,
  - type: text
    content: car ils obtiendront compassion !
  '8':
  - type: text
    content: ' '
  - type: note
    content: cœur pur Gn 20.5s ; Ps 24.3s ; 73.1 ; Ac 15.9 ; 1Tm 1.5 ; 2Tm 2.22 ; Hé 10.22. –  verront Dieu Ex 24.10 ; Hé 12.14 ; Ap 22.4.
  - type: text
    content: Heureux ceux qui ont le cœur pur,
  - type: text
    content: car ils verront Dieu !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'les artisans de paix  : litt. les faiseurs de paix  ; terme apparenté en Col 1.20 ; cf. Pr 10.10n  ; 12.20 ; Lc 10.5 ; Hé 12.14 ; Jc 3.18. –  fils de Dieu v. 45 ; Os 2.1 ; Rm 8.14.'
  - type: text
    content: Heureux les artisans de paix,
  - type: text
    content: car ils seront appelés fils de Dieu !
