      - type: text
        text: '1.2-5 : « Voici donc la voie de la vie : Tu aimeras d''abord Dieu qui t''a créé, puis ton prochain comme toi-même, et tout ce que tu ne veux pas qu''il te soit fait, toi non plus ne le fais pas à autrui. Voici l''enseignement de ces paroles : Bénissez ceux qui vous maudissent, priez pour vos ennemis et jeûnez pour ceux qui vous persécutent. Quel mérite (le mot est habituellement traduit par '
    - type: usfm
