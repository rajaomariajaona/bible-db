document_id: 2KI.10,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jéhu fait massacrer la famille d'Achab
  - type: text
    content: ' '
  - type: note
    content: 'aux chefs de Jizréel  : un ms hébreu et certains mss de LXX disent Samarie , d''autres mss de LXX portent la ville . –  précepteurs  : le même mot est traduit par tuteur en Est 2.7 ; cf. 2S 4.4 ; Rt 4.16. –  des fils  : selon certains mss grecs ; le texte hébreu est lacunaire.'
  - type: text
    content: 'Il y avait à Samarie soixante-dix fils d''Achab. Jéhu écrivit des lettres qu''il envoya à Samarie, aux chefs de Jizréel, aux anciens, et aux précepteurs des fils d''Achab. Il y était dit : '
  '10':
  - type: note
    content: 'rien ne restera sans effet de la parole…  : litt. elle n''est pas tombée à terre, la parole…  ; cf. Jos 21.45 ; 23.14 ; 1R 8.56.'
  - type: text
    content: 'Sachez donc que rien ne restera sans effet de la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', rien de ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a dit contre la maison d''Achab ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fait ce qu''il a dit par l''intermédiaire d''Elie, son serviteur.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'ses grands  : certains mss de LXX portent ses proches parents  ; ils ont peut-être lu le terme habituellement traduit par rédempteur(s).'
  - type: text
    content: Jéhu abattit tous ceux qui restaient de la maison d'Achab à Jizréel, tous ses grands, ses familiers et ses prêtres, sans lui laisser aucun survivant.
  - type: heading
    content: Jéhu fait massacrer des parents d'Achazia
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'il partit…  : litt. il se leva, vint et alla à Samarie . –  Beth-Eqed ( Maison du Tas de sable ) : identifié avec Bet Qad, à 14 km à l''ouest de Beth-Shéân.'
  - type: text
    content: 'Puis il partit pour Samarie. A Beth-Eqed-des-Bergers, sur le chemin, '
  '13':
  - type: note
    content: 'saluer  : litt. pour la paix  ; voir 1S 10.4n. –  grande dame ou reine-mère  : même terme en 1R 11.19 ; 15.13 ; Jr 13.18n.'
  - type: text
    content: 'Jéhu trouva les frères d''Achazia, roi de Juda, et dit : Qui êtes-vous ? Ils répondirent : Nous sommes les frères d''Achazia, et nous descendons saluer les fils du roi et les fils de la grande dame. '
  '14':
  - type: note
    content: 'On les prit / on les égorgea  : autre traduction ils les prirent / ils les égorgèrent.'
  - type: text
    content: 'Il dit : Prenez-les vivants ! On les prit vivants et on les égorgea pour les jeter dans la citerne de Beth-Eqed. Il y avait là quarante-deux hommes ; Jéhu n''en laissa échapper aucun.'
  - type: heading
    content: Jéhu rencontre Jonadab
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Jonadab, fils de Rékab  : cf. Jr 35.6ss où les Rékabites sont les représentants d''une religion austère que Jérémie montre en exemple à ses contemporains. –  bénit  : autre traduction salua . –  Ton cœur est-il sincère  : litt. y a-t-il droiture avec ton cœur  ; cf. 9.15n  ; LXX ton cœur est-il droit envers mon cœur comme mon cœur l''est envers ton cœur ? –  répliqua Jéhu  : selon LXX (probablement sous-entendu dans le texte hébreu). –  donne-moi la main  : signe d''engagement et d''allégeance, cf. Ez 17.18n  ; Esd 10.19n  ; 1Ch 29.24n  ; 2Ch 30.8n.'
  - type: text
    content: 'Parti de là, il trouva Jonadab, fils de Rékab, qui venait à sa rencontre. Il le bénit et lui dit : Ton cœur est-il sincère, comme mon cœur l''est envers le tien ? Jonadab répondit : Il l''est. – S''il l''est, répliqua Jéhu, donne-moi la main. Jonadab lui donna la main. Alors Jéhu le fit monter auprès de lui sur son char. '
  '16':
  - type: text
    content: 'Il lui dit : Viens avec moi et tu verras la passion jalouse que j''ai pour le '
  - type: text
    content: Seigneur
  - type: text
    content: . Il l'emmena ainsi sur son char.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'il le fit disparaître  : cf. v. 28n  ; en éliminant tous les membres de la maison d''Achab, Jéhu fait disparaître tout ce qui rappelait le roi. On trouve peut-être un écho de cette disparition de la maison d''Achab (et d''Omri) sur la stèle de Mésha.'
  - type: text
    content: 'Arrivé à Samarie, il abattit les gens qui restaient à Achab en Samarie ; il le fit disparaître, selon la parole que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dite à Elie.'
  - type: heading
    content: Jéhu supprime le culte du Baal
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Achab a servi le Baal  : cf. 1R 16.32n. –  Jéhu le servira  : certains mss de LXX portent moi, je le servirai.'
  - type: text
    content: 'Puis Jéhu rassembla tout le peuple. Il leur dit : Achab a servi le Baal un peu, Jéhu le servira beaucoup. '
  '19':
  - type: note
    content: 'convoquez auprès de moi tous les prophètes du Baal…  : cf. 1R 18.19ss. –  tous ceux qui le servent  : certains mss omettent ces mots. –  d''une manière insidieuse ou avec tromperie, avec un terme de la même famille que le verbe utilisé pour Jacob vis-à-vis d''Esaü (Gn 27.36) ou pour les Judéens entre eux (Jr 9.3).'
  - type: text
    content: 'Maintenant, convoquez auprès de moi tous les prophètes du Baal, tous ceux qui le servent et tous ses prêtres, sans qu''il en manque un seul, car je veux offrir un grand sacrifice au Baal : quiconque manquera ne restera pas en vie. Jéhu agissait d''une manière insidieuse, pour faire disparaître ceux qui servaient le Baal. '
  '2':
  - type: text
    content: 'Maintenant, quand cette lettre vous sera parvenue – puisque vous avez avec vous les fils de votre seigneur, les chars et les chevaux, une ville forte et les armes – '
  '20':
  - type: text
    content: 'Jéhu dit : Consacrez une assemblée solennelle pour le Baal. Ils l''annoncèrent. '
  '21':
  - type: note
    content: 'des messagers  : sous-entendu dans le texte. –  tous ceux qui servaient le Baal…  : LXX présente ici un texte long qui reprend par deux fois, à la première personne, l''ordre de Jéhu rapporté au v. 19. –  pas un seul…  : l''élimination des partisans de Baal sera aussi totale que celle des proches d''Achab. –  la maison (c.-à-d. le temple) du Baal  : peut-être située en dehors de la ville (v. 25n). –  d''un bout à l''autre  : litt. de bouche à bouche, peut-être au sens de d''une porte à l''autre.'
  - type: text
    content: 'Jéhu envoya des messagers dans tout Israël ; et tous ceux qui servaient le Baal arrivèrent, il n''en resta pas un seul qui ne vînt pas. Ils entrèrent dans la maison du Baal, et la maison du Baal fut remplie d''un bout à l''autre. '
  '22':
  - type: note
    content: 'intendant du vestiaire  : litt. qui est sur le vestiaire  ; l''existence d''une telle réserve de vêtements est peut-être attestée en Jr 38.11 pour le temple de Jérusalem.'
  - type: text
    content: 'Jéhu dit à celui qui était intendant du vestiaire : Sors des habits pour tous ceux qui servent le Baal ; et il sortit les habillements. '
  '23':
  - type: text
    content: 'Alors Jéhu vint à la maison du Baal avec Jonadab, fils de Rékab, et il dit à ceux qui servaient le Baal : Cherchez et regardez, afin qu''il n''y ait pas ici avec vous de serviteurs du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), mais qu''il y ait seulement des gens qui servent le Baal. '
  '24':
  - type: note
    content: 'ils entrèrent  : LXX porte il entra, le texte hébreu laisse entendre que seuls les adeptes de Baal pénètrent dans le temple, Jéhu restant dehors pour donner des ordres à ses troupes. –  quatre-vingts  : LXX trois mille, Syr trois cent quatre-vingts.'
  - type: text
    content: Ensuite ils entrèrent pour offrir des sacrifices et des holocaustes.
  - type: text
    content: 'Jéhu avait placé dehors quatre-vingts hommes, en leur disant : Si un homme parmi les hommes que je remets entre vos mains s''échappe, ce sera vie pour vie. '
  '25':
  - type: note
    content: 'Comparer avec 1R 18.40. –  au fil de l''épée  : litt. à bouche d''épée. –  les jetèrent là  : le texte hébreu est elliptique. –  la ville de  : l''expression correspondante est absente d''un ms hébreu et de certains mss de LXX.'
  - type: text
    content: 'Lorsqu''on eut achevé d''offrir les holocaustes, Jéhu dit aux gardes du corps et aux écuyers : Entrez, abattez-les, que pas un ne sorte ! Ils les passèrent alors au fil de l''épée. Les gardes du corps et les écuyers les jetèrent là, puis ils allèrent jusqu''à la ville de la maison du Baal. '
  '26':
  - type: note
    content: 'et les jetèrent au feu  : litt. et les brûlèrent.'
  - type: text
    content: 'Ils sortirent les pierres levées de la maison du Baal et les jetèrent au feu. '
  '27':
  - type: note
    content: 'des latrines  : le mot hébreu correspondant n''apparaît qu''ici ; il rappelle celui qui désigne la fiente de pigeon en 6.25 et les excréments en Es 36.12.'
  - type: text
    content: Ils démolirent la pierre levée du Baal ; ils démolirent aussi la maison du Baal et en firent des latrines – jusqu'à aujourd'hui.
  - type: heading
    content: Jéhu, roi d'Israël
  '28':
  - type: text
    content: ' '
  - type: note
    content: détruisit et fit disparaître traduisent un seul verbe hébreu (cf. v. 17). – Voir Baal.
  - type: text
    content: 'Jéhu détruisit le Baal, il le fit disparaître d''Israël, '
  '29':
  - type: text
    content: mais il ne s'écarta pas des péchés que Jéroboam, fils de Nebath, avait fait commettre à Israël – les taurillons d'or qui étaient à Beth-El et à Dan.
  '3':
  - type: note
    content: 'le meilleur et le plus qualifié des fils  : litt. le bon et le droit d''entre les fils.'
  - type: text
    content: 'vous verrez quel est le meilleur et le plus qualifié des fils de votre seigneur, vous le mettrez sur le trône de son père ; puis combattez pour la maison de votre seigneur ! '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui me convenait  : litt. ce qui (était) droit à mes yeux  ; cf. 12.3 ; 14.3 ; 15.3,34 ; 16.2 ; 18.3 ; 22.2. –  comme je le voulais  : litt. comme tout ce qui est dans mon cœur . –  tes fils seront assis…  : litt. quatre fils siégeront pour toi…  ; cf. 15.12.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Jéhu : Parce que tu as bien agi, en faisant ce qui me convenait, parce que tu as agi envers la maison d''Achab exactement comme je le voulais, tes fils seront assis sur le trône d''Israël jusqu''à la quatrième génération. '
  '31':
  - type: note
    content: 'suivre de tout son cœur la loi 23.3,25 ; 1R 14.8. –  des péchés que Jéroboam…  : voir 1R 12.26–13.5 ; cf. v. 29 ; 13.2,11 ; 14.23 ; 15.9,18,24,28 ; 17.22.'
  - type: text
    content: 'Toutefois, Jéhu ne veilla pas à suivre de tout son cœur la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël ; il ne s''écarta pas des péchés que Jéroboam avait fait commettre à Israël.'
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1R 11.14n. En 841 av. J.-C. Salmanasar III, roi d''Assyrie, bat Hazaël , roi de Damas ; il impose le tribut à plusieurs rois, dont un certain Yaoua qualifié de fils d''Omri , qui a souvent été identifié à Jéhu (cf. 1R 16.27n). Les actions d''Hazaël contre Israël sont peut-être postérieures à ces événements. –  amputer  : même verbe en Pr 26.6 ; certains modifient le texte hébreu traditionnel pour lire s''irriter contre Israël . –  sur toute la frontière  : autre traduction dans tout le territoire.'
  - type: text
    content: 'En ces jours-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' commença à amputer Israël ; Hazaël les mit à mal sur toute la frontière d''Israël. '
  '33':
  - type: note
    content: 'depuis Aroër sur l''oued Arnon  : la possession des territoires situés au nord de l''Arnon est revendiquée à cette époque par Mésha, roi de Moab. En tout cas Israël a perdu le contrôle sur la Transjordanie, que Moabites et Araméens se disputent.'
  - type: text
    content: 'Depuis le Jourdain, en direction du soleil levant, il mit à mal tout le Galaad, les Gadites, les Rubénites et les Manassites, depuis Aroër sur l''oued Arnon jusqu''au Galaad et au Bashân. '
  '34':
  - type: note
    content: Le reste de l'histoire… 1R 11.41n.
  - type: text
    content: 'Le reste de l''histoire de Jéhu, tout ce qu''il a fait, toute sa vaillance, cela est écrit dans le livre des chroniques des rois d''Israël. '
  '35':
  - type: note
    content: se coucha… 8.24+ ; 1R 1.21+.
  - type: text
    content: 'Jéhu se coucha avec ses pères, et on l''ensevelit à Samarie. Joachaz, son fils, devint roi à sa place. '
  '36':
  - type: text
    content: La durée du règne de Jéhu sur Israël, à Samarie, fut de vingt-huit ans.
  '4':
  - type: text
    content: 'Ils eurent très peur ; ils dirent : Deux rois n''ont pas pu tenir devant lui, comment pourrions-nous tenir nous-mêmes ? '
  '5':
  - type: note
    content: 'L''intendant de la maison et l''intendant de la ville  : litt. qui-sur-la maison et qui-sur-la ville, 1R 4.6n. –  fais  : LXX nous ferons. –  comme il te plaira  : litt. ce qui est bon à tes yeux.'
  - type: text
    content: 'L''intendant de la maison et l''intendant de la ville, les anciens et les précepteurs firent dire à Jéhu : Nous sommes tes serviteurs ; tout ce que tu nous diras, nous le ferons. Nous n''investirons personne de la royauté ; fais comme il te plaira.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les têtes de ces hommes, les fils…  : litt. les têtes des hommes des fils…  ; des mss hébreux, LXX, Syr et Vg lisent les têtes des fils… , d''autres les têtes des hommes de la maison… –  venez me voir  : litt. venez , LXX amenez[-les].'
  - type: text
    content: 'Jéhu leur écrivit une seconde lettre, où il était dit : Si vous êtes pour moi, si vous m''écoutez, prenez les têtes de ces hommes, les fils de votre maître, et venez me voir à Jizréel demain, à cette heure-ci. Or les soixante-dix fils du roi étaient chez les grands de la ville qui les élevaient. '
  '7':
  - type: note
    content: 'et ils égorgèrent (autre traduction abattirent) soixante-dix hommes  : certains mss hébreux, LXX et Syr ont lu et ils les égorgèrent : soixante-dix hommes. Voir aussi Jg 9. –  corbeilles  : le mot hébreu désigne soit une corbeille (ou un panier), comme en Jr 24.2 et peut-être en Ps 81.7, soit un chaudron, comme en 1S 2.14 ; Jb 41.12 ; 2Ch 35.13. Des scènes analogues sont représentées sur des bas-reliefs assyriens.'
  - type: text
    content: 'Quand la lettre leur fut parvenue, ils prirent les fils du roi et ils égorgèrent soixante-dix hommes ; puis ils mirent leurs têtes dans des corbeilles et les envoyèrent à Jéhu, à Jizréel. '
  '8':
  - type: text
    content: 'Le messager vint lui dire : Ils ont apporté les têtes des fils du roi. Jéhu dit alors : Mettez-les en deux tas à l''entrée de la porte de la ville, jusqu''au matin. '
  '9':
  - type: note
    content: Vous n'êtes pas coupables ! litt. vous êtes justes.
  - type: text
    content: 'Au matin, il sortit et, se présentant à tout le peuple, il dit : Vous n''êtes pas coupables ! C''est moi qui ai conspiré contre mon seigneur et qui l''ai tué ; mais tous ceux-ci, qui les a abattus ? '
