  - type: text
    text: 'Parti de là, il trouva Jonadab, fils de Rékab, qui venait à sa rencontre. Il le bénit et lui dit : Ton cœur est-il sincère, comme mon cœur l''est envers le tien ? Jonadab répondit : Il l''est. – S''il l''est, répliqua Jéhu, donne-moi la main. Jonadab lui donna la main. Alors Jéhu le fit monter auprès de lui sur son char. '
  - type: usfm
    marker: vlbl
