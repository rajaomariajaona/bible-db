    marker-yv: yv-n
  - type: text
    text: 'Maintenant, convoquez auprès de moi tous les prophètes du Baal, tous ceux qui le servent et tous ses prêtres, sans qu''il en manque un seul, car je veux offrir un grand sacrifice au Baal : quiconque manquera ne restera pas en vie. Jéhu agissait d''une manière insidieuse, pour faire disparaître ceux qui servaient le Baal. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: text
    text: 'Jéhu dit : Consacrez une assemblée solennelle pour le Baal. Ils l''annoncèrent. '
