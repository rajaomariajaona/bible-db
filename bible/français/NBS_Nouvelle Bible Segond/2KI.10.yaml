      - type: text
        text: 'corbeille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: panier
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '), comme en Jr 24.2 et peut-être en Ps 81.7, soit un '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chaudron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en 1S 2.14 ; Jb 41.12 ; 2Ch 35.13. Des scènes analogues sont représentées sur des bas-reliefs assyriens.'
    marker-yv: yv-n
  - type: text
    text: 'Quand la lettre leur fut parvenue, ils prirent les fils du roi et ils égorgèrent soixante-dix hommes ; puis ils mirent leurs têtes dans des corbeilles et les envoyèrent à Jéhu, à Jizréel. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: 'Le messager vint lui dire : Ils ont apporté les têtes des fils du roi. Jéhu dit alors : Mettez-les en deux tas à l''entrée de la porte de la ville, jusqu''au matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Vous n''êtes pas coupables ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vous êtes '
      - type: usfm
        marker: w
        children:
        - type: text
          text: justes
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Au matin, il sortit et, se présentant à tout le peuple, il dit : Vous n''êtes pas coupables ! C''est moi qui ai conspiré contre mon seigneur et qui l''ai tué ; mais tous ceux-ci, qui les a abattus ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: rien ne restera sans effet de la parole…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elle n'est pas tombée à terre, la parole…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jos 21.45 ; 23.14 ; 1R 8.56.'
    marker-yv: yv-n
  - type: text
    text: 'Sachez donc que rien ne restera sans effet de la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', rien de ce que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' a dit contre la maison d''Achab ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fait ce qu''il a dit par l''intermédiaire d''Elie, son serviteur.'
