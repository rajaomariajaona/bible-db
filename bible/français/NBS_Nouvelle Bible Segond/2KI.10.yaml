      children:
      - type: text
        text: '10.32 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1R 11.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. En 841 av. J.-C. Salmanasar III, roi d''Assyrie, bat '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hazaël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', roi de Damas ; il impose le tribut à plusieurs rois, dont un certain '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Yaoua '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'qualifié de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fils d'Omri
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', qui a souvent été identifié à Jéhu (cf. 1R 16.27'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). Les actions d''Hazaël contre Israël sont peut-être postérieures à ces événements. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: amputer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même verbe en Pr 26.6 ; certains modifient le texte hébreu traditionnel pour lire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'irriter contre Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur toute la frontière
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans tout le territoire.
    marker-yv: yv-n
  - type: text
    text: 'En ces jours-là, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' commença à amputer Israël ; Hazaël les mit à mal sur toute la frontière d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.33 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: depuis Aroër sur l'oued Arnon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la possession des territoires situés au nord de l''Arnon est revendiquée à cette époque par Mésha, roi de Moab. En tout cas Israël a perdu le contrôle sur la Transjordanie, que Moabites et Araméens se disputent.'
    marker-yv: yv-n
  - type: text
    text: 'Depuis le Jourdain, en direction du soleil levant, il mit à mal tout le Galaad, les Gadites, les Rubénites et les Manassites, depuis Aroër sur l''oued Arnon jusqu''au Galaad et au Bashân. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.34 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le reste de l''histoire… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 11.41
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le reste de l''histoire de Jéhu, tout ce qu''il a fait, toute sa vaillance, cela est écrit dans le livre des chroniques des rois d''Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se coucha… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.24+ ; 1R 1.21+.
    marker-yv: yv-n
  - type: text
    text: 'Jéhu se coucha avec ses pères, et on l''ensevelit à Samarie. Joachaz, son fils, devint roi à sa place. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '36'
  - type: text
    text: La durée du règne de Jéhu sur Israël, à Samarie, fut de vingt-huit ans.
