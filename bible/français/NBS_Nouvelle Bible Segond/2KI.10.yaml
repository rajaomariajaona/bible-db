    marker-yv: yv-n
  - type: text
    text: 'Il y avait à Samarie soixante-dix fils d''Achab. Jéhu écrivit des lettres qu''il envoya à Samarie, aux chefs de Jizréel, aux anciens, et aux précepteurs des fils d''Achab. Il y était dit : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: 'Maintenant, quand cette lettre vous sera parvenue – puisque vous avez avec vous les fils de votre seigneur, les chars et les chevaux, une ville forte et les armes – '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le meilleur et le plus qualifié des fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le bon et le droit d'entre les fils.
    marker-yv: yv-n
  - type: text
    text: 'vous verrez quel est le meilleur et le plus qualifié des fils de votre seigneur, vous le mettrez sur le trône de son père ; puis combattez pour la maison de votre seigneur ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Ils eurent très peur ; ils dirent : Deux rois n''ont pas pu tenir devant lui, comment pourrions-nous tenir nous-mêmes ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'intendant de la maison et l'intendant de la ville
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
