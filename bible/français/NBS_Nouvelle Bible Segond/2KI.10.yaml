    marker-yv: yv-n
  - type: text
    text: 'Jéhu trouva les frères d''Achazia, roi de Juda, et dit : Qui êtes-vous ? Ils répondirent : Nous sommes les frères d''Achazia, et nous descendons saluer les fils du roi et les fils de la grande dame. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'On les prit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: on les égorgea
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils les prirent / ils les égorgèrent.
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Prenez-les vivants ! On les prit vivants et on les égorgea pour les jeter dans la citerne de Beth-Eqed. Il y avait là quarante-deux hommes ; Jéhu n''en laissa échapper aucun.'
