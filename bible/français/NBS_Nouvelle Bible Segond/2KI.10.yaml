        text: saluer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour la paix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir 1S 10.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grande dame '
    - type: usfm
      marker: ft
      children:
      - type: text
