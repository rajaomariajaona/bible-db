    marker-yv: yv-n
  - type: text
    text: 'Jéhu envoya des messagers dans tout Israël ; et tous ceux qui servaient le Baal arrivèrent, il n''en resta pas un seul qui ne vînt pas. Ils entrèrent dans la maison du Baal, et la maison du Baal fut remplie d''un bout à l''autre. '
