        text: ') : identifié avec Bet Qad, à 14 km à l''ouest de Beth-Shéân.'
    marker-yv: yv-n
  - type: text
    text: 'Puis il partit pour Samarie. A Beth-Eqed-des-Bergers, sur le chemin, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.13 '
    - type: usfm
