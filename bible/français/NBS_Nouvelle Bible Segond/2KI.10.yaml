    - type: usfm
      marker: fq
      children:
      - type: text
        text: fais
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : LXX '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: nous ferons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme il te plaira
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ce qui est bon à tes yeux.
    marker-yv: yv-n
  - type: text
    text: 'L''intendant de la maison et l''intendant de la ville, les anciens et les précepteurs firent dire à Jéhu : Nous sommes tes serviteurs ; tout ce que tu nous diras, nous le ferons. Nous n''investirons personne de la royauté ; fais comme il te plaira.'
