    marker-yv: yv-n
  - type: text
    text: 'Jéhu leur écrivit une seconde lettre, où il était dit : Si vous êtes pour moi, si vous m''écoutez, prenez les têtes de ces hommes, les fils de votre maître, et venez me voir à Jizréel demain, à cette heure-ci. Or les soixante-dix fils du roi étaient chez les grands de la ville qui les élevaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '10.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'et ils égorgèrent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: abattirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soixante-dix hommes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss hébreux, LXX et Syr ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et ils les égorgèrent : soixante-dix hommes'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Voir aussi Jg 9. –  '
    - type: usfm
      marker: fq
