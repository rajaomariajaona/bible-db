  - type: text
    text: 'Lorsqu''on eut achevé d''offrir les holocaustes, Jéhu dit aux gardes du corps et aux écuyers : Entrez, abattez-les, que pas un ne sorte ! Ils les passèrent alors au fil de l''épée. Les gardes du corps et les écuyers les jetèrent là, puis ils allèrent jusqu''à la ville de la maison du Baal. '
