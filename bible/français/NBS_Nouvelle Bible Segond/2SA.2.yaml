    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''arrière '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(et non la pointe). Abner voulait peut-être seulement empêcher Asaël de continuer la poursuite, par un coup qui le jetterait à terre ; mais Asaël, dans son impétuosité, vient s''empaler sur la lance de son adversaire. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'arrêtaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.12.'
    marker-yv: yv-n
  - type: text
    text: Mais Asaël refusa de se détourner. Sur quoi Abner le frappa au ventre avec l'extrémité inférieure de sa lance, et la lance sortit par-derrière. Il tomba et mourut sur place. Tous ceux qui arrivaient à l'endroit où Asaël était tombé mort s'arrêtaient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Les détails géographiques de ce v. ne permettent pas d'identifier les lieux précis où se déroule l'action.
    marker-yv: yv-n
  - type: text
    text: 'Joab et Abishaï poursuivirent Abner, et le soleil se couchait quand ils arrivèrent au coteau d''Amma, qui est en face de Guiah, sur le chemin du désert de Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: text
    text: 'Les fils de Benjamin se rassemblèrent derrière Abner, formèrent une troupe et s''arrêtèrent au sommet d''une colline. '
