document_id: 2SA.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: A Hébron, David devient roi de Juda
  - type: text
    content: ' '
  - type: note
    content: 'interrogea 1S 22.10+. –  Monterai-je ou me rendrai-je  ; l''hébreu met ici l''accent moins sur la différence d''altitude que sur la nuance théologique du verbe, cf. 1S 1.3n. –  A Hébron  : cf. 5.1-3 ; au centre des monts de Judée, cette ville est déjà citée dans les récits concernant les patriarches (Gn 13.18 ; 23.2), et au moment du partage du pays de Canaan (Jos 14.13 ; 21.11s).'
  - type: text
    content: 'Après cela, David interrogea le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Monterai-je dans une des villes de Juda ? Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui répondit : Monte. David demanda : Où monterai-je ? Il répondit : A Hébron. '
  '10':
  - type: note
    content: seule la maison de Juda v. 4.
  - type: text
    content: 'Ish-Bosheth, fils de Saül, avait quarante ans lorsqu''il devint roi sur Israël, et il régna deux ans ; seule la maison de Juda avait suivi David. '
  '11':
  - type: note
    content: 'Le temps  : litt. le compte des jours. –  sept ans et six mois  : cf. 5.5 ; 1R 2.11 ; 1Ch 29.27.'
  - type: text
    content: Le temps que David fut roi, à Hébron, sur la maison de Juda, fut de sept ans et six mois.
  - type: heading
    content: Bataille entre Juda et Israël à Gabaon
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'se mirent en campagne  : litt. sortirent  ; cf. 1S 8.20n. –  Gabaon  : localité située à 10 km au nord-ouest de Jérusalem ; cf. Jos 9.3.'
  - type: text
    content: 'Abner, fils de Ner, et les hommes d''Ish-Bosheth, fils de Saül, se mirent en campagne à Mahanaïm et partirent en direction de Gabaon. '
  '13':
  - type: note
    content: 'Joab, neveu de David, qui deviendra le général en chef de son armée ; voir 8.16 ; 1S 26.6. –  partirent aussi en campagne  : litt. sortirent, v. 12. –  Les deux troupes se rencontrèrent  : litt. ils les rencontrèrent. –  du réservoir  : les fouilles archéologiques de Gabaon ont mis au jour une grande citerne qui pourrait bien être identifiée à ce réservoir.'
  - type: text
    content: 'Joab, fils de Tserouya, et les hommes de David partirent aussi en campagne. Les deux troupes se rencontrèrent près du réservoir de Gabaon et s''arrêtèrent de part et d''autre du réservoir. '
  '14':
  - type: note
    content: 'Voici…  : litt. que les jeunes gens se lèvent, je te prie, et qu''ils se mesurent… Abner propose d''éviter un combat général en s''en remettant au résultat d''un combat singulier entre quelques soldats choisis dans les deux camps. Le verbe traduit par se mesurer en combat singulier a ailleurs le sens de s''amuser, se divertir, jouer. –  D''accord ! litt. qu''ils se lèvent !'
  - type: text
    content: 'Abner dit à Joab : Voici ce que je te propose : que des jeunes gens se mesurent devant nous en combat singulier ! Joab répondit : D''accord ! '
  '15':
  - type: note
    content: 'en nombre égal  : litt. en nombre. –  douze… douze  : le choix de ce nombre pourrait signifier que chaque camp a la prétention de représenter les douze tribus d''Israël.'
  - type: text
    content: 'Ils se levèrent et s''avancèrent en nombre égal, douze pour Benjamin et pour Ish-Bosheth, fils de Saül, et douze parmi les hommes de David. '
  '16':
  - type: note
    content: 'son adversaire  : litt. son compagnon, c.-à-d. celui qui lui fait face. –  lui enfonça  : sous-entendu dans le texte. –  Helqath-Tsourim  : ce nom signifie champ des rochers  ; ce pourrait être une appellation métaphorique pour les jeunes soldats solides comme des rochers  ; au contraire, certains commentateurs pensent que le nom n''a rien à voir avec l''épisode raconté. D''autres, avec ou sans modification du texte hébreu traditionnel, traduisent champ des épées acérées ou champ des flancs.'
  - type: text
    content: 'Chacun, saisissant son adversaire par la tête, lui enfonça son épée dans le flanc : ils tombèrent tous ensemble. Et on donna à ce lieu de Gabaon le nom de Helqath-Tsourim. '
  '17':
  - type: note
    content: 'L''issue du combat singulier n''ayant pas permis de départager les adversaires, une bataille s''engage entre les deux camps. –  furent battus  : la victoire ne sera que temporaire, le conflit se poursuivant, comme le montre 3.1 ; cf. 1S 4.2n.'
  - type: text
    content: Il y eut en ce jour-là une bataille extrêmement rude, dans laquelle Abner et les hommes d'Israël furent battus par les gens de David.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Tserouya  : cf. v. 13 ; 1S 26.6n. –  était rapide  : litt. était léger quant à ses pieds  ; on trouve un même qualificatif appliqué à Achille par le poète grec Homère. –  comme une de ces gazelles…  : litt. cf. Ct 8.14 ; 1Ch 12.9.'
  - type: text
    content: 'Il y avait là les trois fils de Tserouya : Joab, Abishaï et Asaël. Asaël était rapide comme une de ces gazelles qui courent dans la campagne : '
  '19':
  - type: note
    content: 'ni à droite ni à gauche  : c.-à-d. à la poursuite d''un autre adversaire.'
  - type: text
    content: 'il poursuivit Abner, sans s''écarter de ses traces ni à droite ni à gauche. '
  '2':
  - type: note
    content: femme de Nabal, c.-à-d. veuve de Nabal, selon 1S 25.42s.
  - type: text
    content: 'David y monta, ainsi que ses deux femmes, Ahinoam, la Jizréélite, et Abigaïl, femme de Nabal, le Carmélite. '
  '20':
  - type: note
    content: 'Oui, c''est moi  : litt. moi.'
  - type: text
    content: 'Abner se retourna et demanda : Est-ce toi, Asaël ? Il répondit : Oui, c''est moi. '
  '21':
  - type: note
    content: 'à droite ou à gauche  : n''importe où (sous-entendu : mais cesse de me poursuivre). –  dépouille son cadavre  : essentiellement pour récupérer son équipement et ses armes, voir Jg 14.19. –  de lui  : litt. de derrière lui, de même dans la suite.'
  - type: text
    content: 'Abner lui dit : Ecarte-toi à droite ou à gauche ; attrape l''un de ces jeunes gens et dépouille son cadavre. Mais Asaël ne voulut pas se détourner de lui. '
  '22':
  - type: note
    content: pourquoi devrais-je t'abattre ? litt. pourquoi te frapperais-je à terre ? c.-à-d. pourquoi me mets-tu dans l'obligation de te tuer ?
  - type: text
    content: 'Abner dit encore à Asaël : Détourne-toi de moi ; pourquoi devrais-je t''abattre ? Comment pourrais-je ensuite regarder en face Joab, ton frère ? '
  '23':
  - type: note
    content: 'au ventre  : cf. 3.27 ; 4.6 ; 20.9s ; Jg 3.21 ; voir aussi Dt 27.24. –  l''extrémité inférieure  : litt. l''arrière (et non la pointe). Abner voulait peut-être seulement empêcher Asaël de continuer la poursuite, par un coup qui le jetterait à terre ; mais Asaël, dans son impétuosité, vient s''empaler sur la lance de son adversaire. –  s''arrêtaient  : cf. 20.12.'
  - type: text
    content: Mais Asaël refusa de se détourner. Sur quoi Abner le frappa au ventre avec l'extrémité inférieure de sa lance, et la lance sortit par-derrière. Il tomba et mourut sur place. Tous ceux qui arrivaient à l'endroit où Asaël était tombé mort s'arrêtaient.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Les détails géographiques de ce v. ne permettent pas d'identifier les lieux précis où se déroule l'action.
  - type: text
    content: 'Joab et Abishaï poursuivirent Abner, et le soleil se couchait quand ils arrivèrent au coteau d''Amma, qui est en face de Guiah, sur le chemin du désert de Gabaon. '
  '25':
  - type: text
    content: 'Les fils de Benjamin se rassemblèrent derrière Abner, formèrent une troupe et s''arrêtèrent au sommet d''une colline. '
  '26':
  - type: note
    content: 'Après le regroupement des fuyards en débandade (v. 25), Abner réclame un arrêt des combats, au nom de l''unité d''Israël (les deux troupes adverses sont composées de frères). –  L''épée dévorera-t-elle  : voir 1S 15.8n. –  finira par de l''amertume  : cf. Mt 26.52.'
  - type: text
    content: 'Abner appela Joab et lui dit : L''épée dévorera-t-elle toujours ? Ne sais-tu pas que cela finira par de l''amertume ? Quand finiras-tu par dire aux hommes de ne plus poursuivre leurs frères ? '
  '27':
  - type: note
    content: 'Par la vie de Dieu  : variante unique de la formule fréquente de serment par la vie du Seigneur (voir 1S 14.39n) ; LXX et Syr présentent la formule habituelle. –  les hommes…  : autre traduction ce n''est qu''au matin que les hommes auraient cessé de poursuivre leurs frères. –  pas cessé  : cf. Pr 17.14.'
  - type: text
    content: 'Joab répondit : Par la vie de Dieu, si tu n''avais pas parlé, les hommes n''auraient pas cessé de poursuivre leurs frères avant le matin. '
  '28':
  - type: note
    content: 'sonna de la trompe  : cf. 15.10 ; 18.16 ; 20.22 ; 1R 1.39. –  cessèrent le combat  : litt. ne continuèrent plus à se battre.'
  - type: text
    content: Joab sonna de la trompe, et tous les hommes s'arrêtèrent ; ils ne poursuivirent plus Israël et cessèrent le combat.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'la plaine aride  : nom hébreu de la vallée du Jourdain et de la dépression où s''étend la mer Morte ; cf. Jos 8.14n  ; 1S 23.24n. –  tout le Bitrôn  : le mot hébreu correspondant ne se rencontre qu''ici ; il est interprété comme un nom propre de lieu, désignant le vallon qui conduit à Mahanaïm ; certains spécialistes y voient plutôt un nom commun, signifiant soit tout le ravin , soit toute la matinée . –  Mahanaïm v. 8,12.'
  - type: text
    content: 'Abner et ses hommes marchèrent toute la nuit dans la plaine aride ; ils passèrent le Jourdain, traversèrent tout le Bitrôn et arrivèrent à Mahanaïm. '
  '3':
  - type: note
    content: 'les hommes qui étaient avec lui  : cf. 1S 22.1-2n. –  sa famille  : litt. sa maison ou sa maisonnée. –  les villes d''Hébron  : c.-à-d. les localités proches d''Hébron.'
  - type: text
    content: David fit aussi monter les hommes qui étaient avec lui, chacun avec sa famille, et ils s'installèrent dans les villes d'Hébron.
  '30':
  - type: text
    content: 'Joab revint de la poursuite d''Abner et rassembla toute l''armée ; il manquait dix-neuf des hommes de David, ainsi qu''Asaël. '
  '31':
  - type: text
    content: 'Mais les hommes de David avaient abattu trois cent soixante des hommes de Benjamin et d''Abner. '
  '32':
  - type: note
    content: 'le tombeau de son père  : le nom du père d''Asaël est inconnu, mais sa mère était Tserouya, sœur de David ; il n''est donc pas étonnant que la famille soit installée à Beth-Léhem, sa patrie. –  ils arrivèrent…  : litt. (la lumière) brilla pour eux à Hébron.'
  - type: text
    content: Ils emportèrent Asaël et l'ensevelirent dans le tombeau de son père, à Beth-Léhem. Joab et ses hommes marchèrent toute la nuit, et ils arrivèrent à Hébron à l'aube.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'l''onction  : cette consécration royale publique confirme l''onction secrète de 1S 16.12s. Elle sera suivie (5.3) d''une nouvelle onction faisant de David le roi de l''ensemble du peuple d''Israël. –  enseveli Saül 1S 31.11-13.'
  - type: text
    content: Les hommes de Juda vinrent ; là, ils conférèrent l'onction à David pour qu'il soit roi sur la maison de Juda.
  - type: text
    content: 'On dit à David que les hommes de Yabesh de Galaad avaient enseveli Saül. '
  '5':
  - type: note
    content: 'Soyez bénis  : cf. 1S 15.13n  ; 23.21. –  fidélité Jg 8.35.'
  - type: text
    content: 'David envoya des messagers aux gens de Yabesh de Galaad, pour leur dire : Soyez bénis du '
  - type: text
    content: Seigneur
  - type: text
    content: ', puisque vous avez agi avec fidélité envers Saül, votre seigneur, et que vous l''avez enseveli. '
  '6':
  - type: note
    content: 'fidélité et loyauté  : cf. 15.20 ; Gn 24.27,49 ; 47.29 ; Jos 2.14.'
  - type: text
    content: 'A présent, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' agisse envers vous avec fidélité et loyauté ! Moi aussi je vous ferai du bien, puisque vous avez agi de la sorte. '
  '7':
  - type: note
    content: 'Prenez courage  : cf. Jg 7.11 ; Za 8.9,13 ; voir aussi 1S 23.16. –  soyez vaillants  : cf. 1S 14.52.'
  - type: text
    content: 'Prenez courage, soyez vaillants : Saül, votre seigneur, est mort, et c''est à moi que la maison de Juda a conféré l''onction pour que je sois roi sur elle.'
  - type: heading
    content: Ish-Bosheth désigné comme roi d'Israël
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Abner 1S 14.50n. –  Ish-Bosheth  : ce nom signifie homme de honte  ; il est probablement la déformation méprisante du nom Ish-Baal ( Homme de Baal  ; voir Esh-Baal en 1Ch 8.33), lequel a été volontairement modifié par des copistes anciens pour éviter d''écrire le nom du dieu cananéen Baal , concurrent dangereux du Dieu d''Israël. –  Mahanaïm  : localité située à l''est du Jourdain (cf. 17.24,27 ; Gn 32.3 ; Jos 13.26 ; 21.38) ; Abner pense que le roi (v. 9) y sera moins exposé qu''en Cisjordanie.'
  - type: text
    content: 'Cependant Abner, fils de Ner, le chef de l''armée de Saül, prit Ish-Bosheth, fils de Saül, et le fit passer à Mahanaïm. '
  '9':
  - type: note
    content: 'Il l''investit de la royauté ou il le fit roi  ; cf. 1S 11.15 ; 1R 1.43 ; 16.16. –  le Galaad  : région de Transjordanie, voir Dt 3.12-17. –  les Ashourites  : peuplade non identifiée ; LXX a lu les Tassirites, Tg les Ashérites, et Vg et Syr les Geshourites. –  Jizréel  : cf. 1S 29.1n. –  Ephraïm / Benjamin  : deux des tribus d''Israël. –  tout Israël  : expression récapitulative, désignant sans doute ici Israël au sens étroit de ce qui sera plus tard le royaume du Nord.'
  - type: text
    content: 'Il l''investit de la royauté sur le Galaad, sur les Ashourites, sur Jizréel, sur Ephraïm, sur Benjamin, sur tout Israël. '
