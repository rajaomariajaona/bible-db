    - type: usfm
      marker: fqa
      children:
      - type: text
        text: était léger quant à ses pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; on trouve un même qualificatif appliqué à Achille par le poète grec Homère. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: comme une de ces gazelles…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. cf. Ct 8.14 ; 1Ch 12.9.'
    marker-yv: yv-n
  - type: text
    text: 'Il y avait là les trois fils de Tserouya : Joab, Abishaï et Asaël. Asaël était rapide comme une de ces gazelles qui courent dans la campagne : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ni à droite ni à gauche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. à la poursuite d''un autre adversaire.'
    marker-yv: yv-n
  - type: text
    text: 'il poursuivit Abner, sans s''écarter de ses traces ni à droite ni à gauche. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Oui, c'est moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: moi.
    marker-yv: yv-n
  - type: text
    text: 'Abner se retourna et demanda : Est-ce toi, Asaël ? Il répondit : Oui, c''est moi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à droite ou à gauche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : n''importe où (sous-entendu : mais cesse de me poursuivre). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: dépouille son cadavre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : essentiellement pour récupérer son équipement et ses armes, voir Jg 14.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de derrière lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', de même dans la suite.'
    marker-yv: yv-n
  - type: text
    text: 'Abner lui dit : Ecarte-toi à droite ou à gauche ; attrape l''un de ces jeunes gens et dépouille son cadavre. Mais Asaël ne voulut pas se détourner de lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pourquoi devrais-je t''abattre ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pourquoi te frapperais-je à terre ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pourquoi me mets-tu dans l'obligation de te tuer ?
    marker-yv: yv-n
  - type: text
    text: 'Abner dit encore à Asaël : Détourne-toi de moi ; pourquoi devrais-je t''abattre ? Comment pourrais-je ensuite regarder en face Joab, ton frère ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au ventre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.27 ; 4.6 ; 20.9s ; Jg 3.21 ; voir aussi Dt 27.24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
