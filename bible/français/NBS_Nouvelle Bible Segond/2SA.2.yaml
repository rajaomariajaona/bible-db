    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.26 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Après le regroupement des fuyards en débandade (v. 25), Abner réclame un arrêt des combats, au nom de l''unité d''Israël (les deux troupes adverses sont composées de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: frères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: L'épée dévorera-t-elle
    - type: usfm
      marker: ft
      children:
