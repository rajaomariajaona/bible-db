      children:
      - type: text
        text: '  : cf. Pr 17.14.'
    marker-yv: yv-n
  - type: text
    text: 'Joab répondit : Par la vie de Dieu, si tu n''avais pas parlé, les hommes n''auraient pas cessé de poursuivre leurs frères avant le matin. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
