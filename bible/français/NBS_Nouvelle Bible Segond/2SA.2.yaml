      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: finira par de l'amertume
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 26.52.'
    marker-yv: yv-n
  - type: text
    text: 'Abner appela Joab et lui dit : L''épée dévorera-t-elle toujours ? Ne sais-tu pas que cela finira par de l''amertume ? Quand finiras-tu par dire aux hommes de ne plus poursuivre leurs frères ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Par la vie de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : variante unique de la formule fréquente de serment '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'par la vie du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir 1S 14.39
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' présentent la formule habituelle. –  '
    - type: usfm
      marker: fq
