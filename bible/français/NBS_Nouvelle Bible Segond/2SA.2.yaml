    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Mahanaïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 8,12.
    marker-yv: yv-n
  - type: text
    text: 'Abner et ses hommes marchèrent toute la nuit dans la plaine aride ; ils passèrent le Jourdain, traversèrent tout le Bitrôn et arrivèrent à Mahanaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Joab revint de la poursuite d''Abner et rassembla toute l''armée ; il manquait dix-neuf des hommes de David, ainsi qu''Asaël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: text
    text: 'Mais les hommes de David avaient abattu trois cent soixante des hommes de Benjamin et d''Abner. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le tombeau de son père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le nom du père d''Asaël est inconnu, mais sa mère était Tserouya, sœur de David ; il n''est donc pas étonnant que la famille soit installée à Beth-Léhem, sa patrie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils arrivèrent…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (la lumière) brilla pour eux à Hébron.
    marker-yv: yv-n
  - type: text
    text: Ils emportèrent Asaël et l'ensevelirent dans le tombeau de son père, à Beth-Léhem. Joab et ses hommes marchèrent toute la nuit, et ils arrivèrent à Hébron à l'aube.
