document_id: 2SA.2
type_code: fra
segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: A Hébron, David devient roi de Juda
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'interrogea '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1S 22.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Monterai-je '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: me rendrai-je
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; l'hébreu met ici l'accent moins sur la différence d'altitude que sur la nuance théologique du verbe, cf. 1S 1.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: A Hébron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. 5.1-3 ; au centre des monts de Judée, cette ville est déjà citée dans les récits concernant les patriarches (Gn 13.18 ; 23.2), et au moment du partage du pays de Canaan (Jos 14.13 ; 21.11s).'
    marker-yv: yv-n
  - type: text
    text: 'Après cela, David interrogea le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : Monterai-je dans une des villes de Juda ? Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui répondit : Monte. David demanda : Où monterai-je ? Il répondit : A Hébron. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: femme de Nabal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: veuve de Nabal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', selon 1S 25.42s.'
    marker-yv: yv-n
  - type: text
    text: 'David y monta, ainsi que ses deux femmes, Ahinoam, la Jizréélite, et Abigaïl, femme de Nabal, le Carmélite. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les hommes qui étaient avec lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 22.1-2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sa famille
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'sa maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sa maisonnée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les villes d'Hébron
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. les localités proches d''Hébron.'
    marker-yv: yv-n
  - type: text
    text: David fit aussi monter les hommes qui étaient avec lui, chacun avec sa famille, et ils s'installèrent dans les villes d'Hébron.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.4 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: l'onction
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cette consécration royale publique confirme l''onction secrète de 1S 16.12s. Elle sera suivie (5.3) d''une nouvelle onction faisant de David le roi de l''ensemble du peuple d''Israël. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'enseveli Saül '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 31.11-13.
    marker-yv: yv-n
  - type: text
    text: Les hommes de Juda vinrent ; là, ils conférèrent l'onction à David pour qu'il soit roi sur la maison de Juda.
- type: usfm
  marker: p
  children:
  - type: text
    text: 'On dit à David que les hommes de Yabesh de Galaad avaient enseveli Saül. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Soyez '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 15.13'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 23.21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fidélité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jg 8.35.
    marker-yv: yv-n
  - type: text
    text: 'David envoya des messagers aux gens de Yabesh de Galaad, pour leur dire : Soyez bénis du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', puisque vous avez agi avec fidélité envers Saül, votre seigneur, et que vous l''avez enseveli. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fidélité et loyauté
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.20 ; Gn 24.27,49 ; 47.29 ; Jos 2.14.'
    marker-yv: yv-n
  - type: text
    text: 'A présent, que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' agisse envers vous avec fidélité et loyauté ! Moi aussi je vous ferai du bien, puisque vous avez agi de la sorte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Prenez courage
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 7.11 ; Za 8.9,13 ; voir aussi 1S 23.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: soyez vaillants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 14.52.'
    marker-yv: yv-n
  - type: text
    text: 'Prenez courage, soyez vaillants : Saül, votre seigneur, est mort, et c''est à moi que la maison de Juda a conféré l''onction pour que je sois roi sur elle.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Ish-Bosheth désigné comme roi d'Israël
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Abner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1S 14.50
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ish-Bosheth
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce nom signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: homme de honte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; il est probablement la déformation méprisante du nom '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Ish-Baal
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Homme de Baal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; voir '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Esh-Baal '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 1Ch 8.33), lequel a été volontairement modifié par des copistes anciens pour éviter d''écrire le nom du dieu cananéen '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Baal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', concurrent dangereux du Dieu d''Israël. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mahanaïm
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : localité située à l''est du Jourdain (cf. 17.24,27 ; Gn 32.3 ; Jos 13.26 ; 21.38) ; Abner pense que le roi (v. 9) y sera moins exposé qu''en Cisjordanie.'
    marker-yv: yv-n
  - type: text
    text: 'Cependant Abner, fils de Ner, le chef de l''armée de Saül, prit Ish-Bosheth, fils de Saül, et le fit passer à Mahanaïm. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Il l''investit de la royauté '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il le fit roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1S 11.15 ; 1R 1.43 ; 16.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Galaad
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : région de Transjordanie, voir Dt 3.12-17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Ashourites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peuplade non identifiée ; '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les Tassirites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les Ashérites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' et '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les Geshourites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jizréel
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1S 29.1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ephraïm '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Benjamin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : deux des tribus d''Israël. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tout Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression récapitulative, désignant sans doute ici Israël au sens étroit de ce qui sera plus tard le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: royaume du Nord.
    marker-yv: yv-n
  - type: text
    text: 'Il l''investit de la royauté sur le Galaad, sur les Ashourites, sur Jizréel, sur Ephraïm, sur Benjamin, sur tout Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'seule la maison de Juda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 4.
    marker-yv: yv-n
  - type: text
    text: 'Ish-Bosheth, fils de Saül, avait quarante ans lorsqu''il devint roi sur Israël, et il régna deux ans ; seule la maison de Juda avait suivi David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Le temps
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le compte des jours
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sept ans et six mois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.5 ; 1R 2.11 ; 1Ch 29.27.'
    marker-yv: yv-n
  - type: text
    text: Le temps que David fut roi, à Hébron, sur la maison de Juda, fut de sept ans et six mois.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Bataille entre Juda et Israël à Gabaon
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se mirent en campagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sortirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. 1S 8.20
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Gabaon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : localité située à 10 km au nord-ouest de Jérusalem ; cf. Jos 9.3.'
    marker-yv: yv-n
  - type: text
    text: 'Abner, fils de Ner, et les hommes d''Ish-Bosheth, fils de Saül, se mirent en campagne à Mahanaïm et partirent en direction de Gabaon. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Joab
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', neveu de David, qui deviendra le général en chef de son armée ; voir 8.16 ; 1S 26.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: partirent aussi en campagne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sortirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', v. 12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les deux troupes se rencontrèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils les rencontrèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: du réservoir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les fouilles archéologiques de Gabaon ont mis au jour une grande citerne qui pourrait bien être identifiée à ce '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: réservoir.
    marker-yv: yv-n
  - type: text
    text: 'Joab, fils de Tserouya, et les hommes de David partirent aussi en campagne. Les deux troupes se rencontrèrent près du réservoir de Gabaon et s''arrêtèrent de part et d''autre du réservoir. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Voici…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que les jeunes gens se lèvent, je te prie, et qu''ils se mesurent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Abner propose d''éviter un combat général en s''en remettant au résultat d''un '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'combat singulier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'entre quelques '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'soldats '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'choisis dans les deux camps. Le verbe traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'se mesurer en combat singulier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'a ailleurs le sens de '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'amuser, se divertir, jouer
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'D''accord ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: qu'ils se lèvent !
    marker-yv: yv-n
  - type: text
    text: 'Abner dit à Joab : Voici ce que je te propose : que des jeunes gens se mesurent devant nous en combat singulier ! Joab répondit : D''accord ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en nombre égal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en nombre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: douze… douze
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le choix de ce nombre pourrait signifier que chaque camp a la prétention de représenter les douze tribus d''Israël.'
    marker-yv: yv-n
  - type: text
    text: 'Ils se levèrent et s''avancèrent en nombre égal, douze pour Benjamin et pour Ish-Bosheth, fils de Saül, et douze parmi les hommes de David. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: son adversaire
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: son compagnon
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: celui qui lui fait face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: lui enfonça
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Helqath-Tsourim
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ce nom signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: champ des rochers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; ce pourrait être une appellation métaphorique pour les jeunes soldats '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: solides comme des rochers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; au contraire, certains commentateurs pensent que le nom n''a rien à voir avec l''épisode raconté. D''autres, avec ou sans modification du texte hébreu traditionnel, traduisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'champ des épées acérées '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: champ des flancs.
    marker-yv: yv-n
  - type: text
    text: 'Chacun, saisissant son adversaire par la tête, lui enfonça son épée dans le flanc : ils tombèrent tous ensemble. Et on donna à ce lieu de Gabaon le nom de Helqath-Tsourim. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'L''issue du combat singulier n''ayant pas permis de départager les adversaires, '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'une bataille '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 's''engage entre les deux camps. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: furent battus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la victoire ne sera que temporaire, le conflit se poursuivant, comme le montre 3.1 ; cf. 1S 4.2'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Il y eut en ce jour-là une bataille extrêmement rude, dans laquelle Abner et les hommes d'Israël furent battus par les gens de David.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tserouya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
