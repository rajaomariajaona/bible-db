document_id: EXO.6,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: main forte 3.19s ; 11.1.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Tu verras maintenant ce que je vais faire au pharaon. C''est sous l''action d''une main forte qu''il les laissera partir, c''est sous l''action d''une main forte qu''il les chassera de son pays.'
  - type: heading
    content: Dieu interviendra pour délivrer Israël
  '10':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '11':
  - type: text
    content: Va, parle au pharaon, le roi d'Egypte, pour qu'il laisse partir les Israélites de son pays.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'qui suis incirconcis des lèvres (aussi v. 30) : dans ce récit, il faut sans doute comprendre qui n''ai pas la parole facile (autre expression en 4.10). Sur d''autres références métaphoriques à l''incirconcision, voir Dt 10.16 ; Jr 6.10 ; voir aussi Es 6.5,7 ; voir aussi circoncision.'
  - type: text
    content: 'Moïse dit, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Si les Israélites ne m''ont pas écouté, comment le pharaon m''écouterait-il, moi qui suis incirconcis des lèvres ?'
  '13':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parla à Moïse et à Aaron ; il leur donna des ordres au sujet des Israélites et du pharaon, le roi d''Egypte, pour faire sortir d''Egypte les Israélites.'
  - type: heading
    content: Liste des ancêtres de Moïse et d'Aaron
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'chefs de leurs familles  : litt. têtes des maisons de leurs pères . Cf. Gn 46.8-11. –  Ruben Nb 26.5-9 ; 1Ch 5.1-10.'
  - type: text
    content: Voici les chefs de leurs familles.
  - type: text
    content: 'Fils de Ruben, premier-né d''Israël : Hénoch, Pallou, Hetsrôn et Karmi. Voilà les clans de Ruben.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Siméon Nb 26.12-14 ; 1Ch 4.24-43. –  la Cananéenne  : ici LXX porte la Phénicienne (cf. Gn 46.10).'
  - type: text
    content: 'Fils de Siméon : Yemouel, Yamîn, Ohad, Yakîn, Tsohar et Saül, le fils de la Cananéenne. Voilà les clans de Siméon.'
  '16':
  - type: text
    content: ' '
  - type: note
    content: Lévi Nb 3.17-20 ; 26.57-61 ; 1Ch 5.27-29 ; 6.1-8. –  généalogie v. 19 ; 28.10n  ; Gn 2.4n.
  - type: text
    content: 'Voici les noms des fils de Lévi, selon leur généalogie : Guershôn, Qehath et Merari. La durée de la vie de Lévi fut de cent trente-sept ans. '
  '17':
  - type: text
    content: 'Fils de Guershôn : Libni et Shiméi, avec leurs clans. '
  '18':
  - type: text
    content: 'Fils de Qehath : Amram, Yitsehar, Hébron et Ouzziel. La durée de la vie de Qehath fut de cent trente-trois ans.'
  '19':
  - type: text
    content: 'Fils de Merari : Mahli et Moushi. Voilà les clans des lévites, selon leur généalogie.'
  '2':
  - type: text
    content: 'Dieu dit encore à Moïse : Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '20':
  - type: text
    content: ' '
  - type: note
    content: '2.1s. –  sa tante  : le terme désigne normalement la sœur du père ; Tg, LXX la fille du frère de son père  ; cf. Lv 18.12-14 ; 20.20n.'
  - type: text
    content: 'Amram prit pour femme Yokébed, sa tante : elle lui donna pour fils Aaron et Moïse. La durée de la vie d''Amram fut de cent trente-sept ans. '
  '21':
  - type: note
    content: Coré Nb 16.
  - type: text
    content: 'Fils de Yitsehar : Coré, Népheg et Zikri. '
  '22':
  - type: text
    content: 'Fils d''Ouzziel : Mishaël, Eltsaphân et Sitri.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Nahshôn  : cf. 1Ch 2.10. –  Nadab / Abihou 24.1 ; Lv 10.1-7. –  Eléazar / Itamar Lv 10.12ss ; Nb 17.1 ; 20.25-28.'
  - type: text
    content: Aaron prit pour femme Elishéba, fille d'Amminadab, sœur de Nahshôn ; elle lui donna pour fils Nadab, Abihou, Eléazar et Itamar.
  '24':
  - type: text
    content: 'Fils de Coré : Assir, Elqana et Abiasaph. Voilà les clans des Coréites.'
  '25':
  - type: text
    content: ' '
  - type: note
    content: Phinéas Nb 25.7-13. – Voir lévites.
  - type: text
    content: Eléazar, fils d'Aaron, prit pour femme une des filles de Poutiel ; elle lui donna pour fils Phinéas. Voilà les chefs de famille des lévites, avec leurs clans.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'rangés en armées  : litt. selon leurs armées  ; cf. 7.4n  ; 12.17,41,51.'
  - type: text
    content: 'Ce sont là Aaron et Moïse, à qui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit : Faites sortir d''Egypte les Israélites, rangés en armées. '
  '27':
  - type: text
    content: Ce sont eux, Moïse et Aaron, qui parlèrent au pharaon, le roi d'Egypte, pour faire sortir d'Egypte les Israélites.
  - type: heading
    content: Dieu renouvelle sa promesse à Moïse
  '28':
  - type: text
    content: 'Lorsque le '
  - type: text
    content: Seigneur
  - type: text
    content: ' parla à Moïse en Egypte, '
  '29':
  - type: note
    content: 'YHWH  : voir noms divins.'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Dis au pharaon, le roi d''Egypte, tout ce que je te dis. '
  '3':
  - type: note
    content: 'comme (litt. en) Dieu-Puissant, traduction traditionnelle de El-Shaddaï, voir Gn 17.1n  ; LXX traduit ici comme leur Dieu. –  Seigneur (YHWH)  : cf. 3.14n-15n  ; voir aussi noms divins.'
  - type: text
    content: 'Je suis apparu à Abraham, à Isaac et à Jacob comme Dieu-Puissant (El-Shaddaï) ; mais je ne me suis pas fait connaître d''eux sous mon nom de '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). '
  '30':
  - type: note
    content: incirconcis des lèvres v. 12n  ; voir circoncision.
  - type: text
    content: 'Moïse dit, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je suis incirconcis des lèvres ; comment le pharaon m''écouterait-il ?'
  '4':
  - type: note
    content: 'alliance / pays Gn 12.7+ ; 17.7+ ; Lv 26.42. –  Canaan Gn 9.18n. –  le pays…  : litt. le pays de leur immigration où ils ont immigré  ; cf. 3.22+ ; Gn 17.8+.'
  - type: text
    content: 'J''ai aussi établi mon alliance avec eux, pour leur donner Canaan, le pays où ils ont séjourné en immigrés. '
  '5':
  - type: note
    content: '2.24s. –  les Egyptiens  : autre traduction l''Egypte.'
  - type: text
    content: 'Moi, j''ai entendu les soupirs des Israélites que les Egyptiens réduisent en esclavage, et je me suis souvenu de mon alliance. '
  '6':
  - type: note
    content: 'je vous affranchirai  : litt. je vous ferai sortir de sous (les fardeaux). –  l''esclavage auquel on vous soumet  : litt. leur esclavage. –  j''assurerai votre rédemption ou je vous rédimerai, je vous délivrerai 15.13 ; Gn 48.16 ; Lv 25.24n  ; Nb 5.8n  ; 35.12n  ; 2S 14.11 ; 1R 16.11 ; Es 35.9n  ; 41.14n  ; Jr 31.11n  ; Os 13.14n  ; Mi 4.10 ; Ps 19.15n  ; Jb 19.25 ; Pr 23.11 ; Rt 2.20n.'
  - type: text
    content: 'Aussi, dis aux Israélites : « Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ; je vous affranchirai des corvées de l''Egypte, je vous délivrerai de l''esclavage auquel on vous soumet ; d''un bras étendu, par de grands jugements, j''assurerai votre rédemption. '
  '7':
  - type: text
    content: 'Je vous prendrai pour que vous soyez mon peuple, je serai votre Dieu, et ainsi vous saurez que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, celui qui vous affranchit des corvées de l''Egypte. '
  '8':
  - type: note
    content: 'j''ai juré, à main levée  : litt. j''ai levé ma main, cf. Gn 14.22+ ; 22.15 ; voir Nb 14.30 ; Ez 20.5nss. –  donner Gn 15.18ss ; 24.7 ; 26.3 ; 28.13.'
  - type: text
    content: 'Je vous ferai entrer dans le pays que j''ai juré, à main levée, de donner à Abraham, à Isaac et à Jacob ; moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je vous le donnerai en possession. »'
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'leur impatience  : litt. la brièveté du souffle (ou de l''esprit ) ; on pourrait aussi comprendre leur découragement . –  dur esclavage 1.14n. – Cf. 14.11+.'
  - type: text
    content: C'est ainsi que Moïse parla aux Israélites. Mais ils n'écoutèrent pas Moïse, à cause de leur impatience sous ce dur esclavage.
