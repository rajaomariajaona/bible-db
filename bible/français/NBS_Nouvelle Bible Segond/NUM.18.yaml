  - type: text
    text: 'Présente aussi avec toi tes frères, la tribu de Lévi, la tribu de ton père, afin qu''ils te soient attachés et qu''ils t''assistent ; toi et tes fils avec toi, vous serez devant la tente du Témoignage. '
