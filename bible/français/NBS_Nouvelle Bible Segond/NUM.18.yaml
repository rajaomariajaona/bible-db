    marker-yv: yv-n
  - type: text
    text: 'Ils te seront attachés et ils assureront le service de la tente de la Rencontre, tout le service de la tente. Aucun profane n''approchera de vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la Colère… '
    - type: usfm
      marker: ft
