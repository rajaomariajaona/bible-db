  - type: text
    text: 'Toi et tes fils avec toi, vous exercerez votre sacerdoce pour tout ce qui concerne l''autel et pour ce qui est à l''intérieur, au-delà du voile : ce sera votre service. Votre sacerdoce est le service dont je vous fais don. Le profane qui approchera sera mis à mort.'
