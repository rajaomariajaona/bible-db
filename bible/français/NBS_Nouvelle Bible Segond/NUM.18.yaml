      - type: text
        text: '  ; 7.5.'
    marker-yv: yv-n
  - type: text
    text: 'Moi, j''ai pris vos frères, les lévites, d''entre les Israélites : donnés au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ils vous sont remis en don pour accomplir le service de la tente de la Rencontre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
