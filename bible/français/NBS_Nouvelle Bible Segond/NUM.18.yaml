document_id: NUM.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le rôle des prêtres et des lévites
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.28. –  ta famille (litt. la maison de ton père ), c.-à-d. l''ensemble des lévites (v. 2-4,6,21ss), par opposition à toi et tes fils , les seuls prêtres 1.44n  ; 17.17. –  vous serez chargés  : autres traductions vous vous chargerez, vous porterez  ; cf. v. 23 ; 5.31 ; 9.13 ; 14.34 ; Lv 7.18 ; 10.17 ; 19.8 ; 20.17 ; Ez 14.10 ; 16.52,54 ; 23.35 etc. –  des fautes (voir péché) …  : litt. de la faute du sanctuaire  ; de même plus loin, litt. la faute de votre sacerdoce . Au lieu de sanctuaire (3.38n) on pourrait traduire les choses sacrées , mobilier (cf. 10.21) ou offrandes (le même terme est rendu par portion consacrée au v. 29) ; voir aussi Ex 28.38n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Aaron : Toi, tes fils et ta famille avec toi, vous serez chargés des fautes commises envers le sanctuaire ; toi et tes fils avec toi, vous serez chargés des fautes commises envers votre sacerdoce. '
  '10':
  - type: note
    content: 'comme des choses très sacrées  : on pourrait aussi comprendre dans le Très-Sacré (ou Saint des saints), mais on n''a pas d''autre exemple d''une telle pratique (cf. Lv 16.2), ou dans un lieu très sacré  ; cf. Lv 6.9,19 ; 7.6. –  tout mâle, c.-à-d. tout mâle de la famille des prêtres.'
  - type: text
    content: Tu les mangeras comme des choses très sacrées ; tout mâle pourra les manger ; elles seront sacrées pour toi.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ez 44.30. –  tout ou sur tout . –  dédie rituellement  : cf. v. 18 ; 5.25+. –  Quiconque est pur  : voir Lv 7.19ss ; 22.1-11.'
  - type: text
    content: 'Voici encore ce qui sera pour toi : le prélèvement sur les dons des Israélites, tout ce qu''on dédie rituellement, je te le donne, à toi, à tes fils et à tes filles avec toi, comme une prescription perpétuelle. Quiconque est pur dans ta maison pourra le manger. '
  '12':
  - type: note
    content: 'prémices Ex 22.28 ; 23.19 ; 34.22,26 ; Dt 18.4 ; Ez 44.30. –  ce qu''il y a de meilleur  : litt. la graisse, de même aux v. 29s,32. –  vin  : autre traduction vin nouveau, cf. Gn 27.28n.'
  - type: text
    content: 'Je te donne les prémices qu''ils offrent au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : tout ce qu''il y a de meilleur en huile, tout ce qu''il y a de meilleur en vin et en blé. '
  '13':
  - type: note
    content: 'Ex 23.16 ; Lv 2.14 ; 23.17ss ; Né 10.36ss. –  premiers fruits  : cf. 13.20n  ; 28.26.'
  - type: text
    content: 'Les premiers fruits de tout ce que produit leur terre, ceux qu''ils apportent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', seront pour toi. Quiconque est pur dans ta maison pourra les manger. '
  '14':
  - type: note
    content: 'frappé d''anathème  : cf. 21.2s ; Ex 22.19 ; Lv 27.21n,28s ; Ez 44.29 ; voir Dt 2.34n  ; Rm 9.3n  ; voir aussi l''introduction à Josué♦.'
  - type: text
    content: 'Tout ce qui est frappé d''anathème en Israël sera pour toi. '
  '15':
  - type: note
    content: 'Cf. 3.12+s,44ss ; 8.16 ; Ex 13.11ss ; 34.19s. –  qu''on présente ou qu''ils présenteront. –  tu dégageras  : un terme apparenté est traduit par rançon… pour dégager aux v. 16s ; cf. 3.46ss ; Ex 13.13 ; Dt 7.8n  ; voir aussi rédemption. –  bête impure, au sens sacrificiel ; cf. v. 17 ; voir pur.'
  - type: text
    content: 'Tout être né le premier de sa mère parmi les humains ou les bêtes, celui qu''on présente au '
  - type: text
    content: Seigneur
  - type: text
    content: ', sera pour toi. Seulement, tu dégageras le premier-né de l''homme, et tu dégageras le premier-né d''une bête impure. '
  '16':
  - type: note
    content: 'Cf. 3.45ss ; Ex 30.13 ; Lv 27.6,11s,27 ; Dt 14.24ss. –  La rançon… pour les dégager  : litt. son dégagement, cf. v. 15n. –  valeur fixée Lv 5.15n. –  cinq sicles  : près de 50 g ; voir mesures, poids et monnaies.'
  - type: text
    content: 'La rançon que tu prendras pour les dégager, dès l''âge d''un mois, d''après la valeur fixée, sera de cinq sicles d''argent, selon le sicle du sanctuaire qui est de vingt guéras. '
  '17':
  - type: note
    content: 'rançon…  : cf. v. 15. – Voir sang. –  tu feras fumer Lv 1.9,13,17 ; 3.5,11 ; 17.6.'
  - type: text
    content: 'Mais tu ne prendras pas de rançon pour dégager le premier-né des bovins, ni le premier-né des moutons, ni le premier-né des chèvres ; ils sont sacrés. Tu aspergeras l''autel de leur sang et tu feras fumer leur graisse en offrande consumée par le feu, comme une odeur agréable pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '18':
  - type: note
    content: Cf. v. 11 ; Ex 29.27 ; Lv 7.30nss.
  - type: text
    content: 'Leur viande sera pour toi comme la poitrine qu''on dédie rituellement et comme la cuisse droite. '
  '19':
  - type: note
    content: une alliance de sel, sans doute au sens d'alliance irrévocable, le mot alliance étant ici pratiquement équivalent de prescription, disposition  ; cf. Lv 2.13n  ; 2Ch 13.5 ; voir loi.
  - type: text
    content: 'Je te donne, à toi, à tes fils et à tes filles avec toi, comme une prescription perpétuelle, tous les prélèvements que les Israélites font pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur leurs offrandes sacrées. C''est une alliance de sel, à perpétuité, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour toi et pour ta descendance avec toi.'
  '2':
  - type: note
    content: '3.5ss ; 8.9. –  Présente  : autre traduction fais approcher, cf. v. 3n  ; le même verbe est souvent employé pour la présentation des offrandes ; cf. 1.51n  ; Lv 1.2n. –  tribu  : dans ce v. ce mot traduit deux termes hébreux différents (sur le premier voir 17.17n) ; de même en 36.3. –  qu''ils te soient attachés  : le verbe hébreu est plusieurs fois associé au nom de Lévi, cf. Gn 29.34n. –  devant la tente du Témoignage 1.50+ ; 3.7 ; 8.15 ; Hé 9.6.'
  - type: text
    content: 'Présente aussi avec toi tes frères, la tribu de Lévi, la tribu de ton père, afin qu''ils te soient attachés et qu''ils t''assistent ; toi et tes fils avec toi, vous serez devant la tente du Témoignage. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: V. 23 ; 26.62 ; cf. 35.1ss ; Dt 10.8-9+ ; 18.1s ; Jos 13.14,33 ; 14.3s ; 18.7 ; Ez 44.28 ; 48.10ss ; voir aussi Ps 16.5 ; 142.6 ; Lm 3.24.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Aaron : Tu n''auras pas de patrimoine dans leur pays, et il n''y aura pas de part pour toi au milieu d''eux ; c''est moi qui suis ta part et ton patrimoine au milieu des Israélites.'
  - type: heading
    content: Les revenus des lévites
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'dîme  : cf. v. 24,26 ; Gn 14.20 ; 28.22 ; Lv 27.30ss ; Dt 12.17ss ; 14.22nss ; 26.12ss ; 1S 8.15 ; Am 4.4 ; Ml 3.10 ; Né 10.33-40 ; 12.44ss ; 13.5,10ss ; 2Ch 31.4s,11ss ; Mt 23.23 ; Hé 7.5.'
  - type: text
    content: 'J''ai donné comme patrimoine aux fils de Lévi toute dîme en Israël, en échange du service qu''ils accomplissent, le service de la tente de la Rencontre. '
  '22':
  - type: note
    content: Cf. 1.51 ; 3.10,38 ; 16.5 ; 17.5. –  se chargent v. 1+,23. – Voir péché.
  - type: text
    content: 'Les Israélites n''approcheront plus de la tente de la Rencontre, de peur qu''ils ne se chargent d''un péché et qu''ils ne meurent. '
  '23':
  - type: note
    content: 'V. 1+,20+. –  Les lévites accompliront  : litt. le lévite accomplira  ; Syr et Vg ont lu le pluriel, en accord avec la suite. –  prescription perpétuelle  : cf. Lv 10.9. – Voir générations. –  pas de patrimoine  : cf. v. 20+ ; 35.1ss.'
  - type: text
    content: 'Les lévites accompliront le service de la tente de la Rencontre et ils se chargeront de leur faute. C''est une prescription perpétuelle, pour toutes vos générations ; ils n''auront pas de patrimoine au milieu des Israélites. '
  '24':
  - type: note
    content: 'la dîme  : cf. v. 21+. –  j''ai dit, à leur sujet…  : autre traduction je leur ai dit qu''ils n''auraient pas…'
  - type: text
    content: 'Je donne comme patrimoine aux lévites la dîme dont les Israélites font le prélèvement pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; c''est pourquoi j''ai dit, à leur sujet, qu''ils n''auront pas de patrimoine au milieu des Israélites.'
  '25':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '26':
  - type: note
    content: prélèvement 5.9+ ; cf. Né 10.39.
  - type: text
    content: 'Tu diras aux lévites : Lorsque vous recevez des Israélites la dîme que je vous donne sur ce qui leur appartient, comme votre patrimoine, vous en déduirez le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: ', la dîme de la dîme ; '
  '27':
  - type: note
    content: 'Ex 22.28. –  aire / pressoir  : cf. v. 12,30 ; Dt 15.14 ; 16.13.'
  - type: text
    content: 'ce prélèvement vous sera compté comme celui qu''on prend sur le blé de l''aire et sur la pleine cuvée du pressoir. '
  '28':
  - type: note
    content: Aaron, le prêtre 3.6.
  - type: text
    content: 'C''est ainsi que vous ferez, vous aussi, le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sur toutes les dîmes que vous recevez des Israélites ; vous donnerez le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Aaron, le prêtre. '
  '29':
  - type: note
    content: ce qu'il y a de meilleur v. 12n.
  - type: text
    content: 'Sur tous les dons qui vous sont faits, vous ferez le prélèvement du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; sur tout ce qu''il y a de meilleur, vous prélèverez la portion consacrée. '
  '3':
  - type: note
    content: 'Sur les fonctions des lévites, cf. 1.50s ; 4.5-20. –  ils n''approcheront  : le même verbe (aussi dans la suite) a été traduit par présenter au v. 2n  ; cf. 1.51n.'
  - type: text
    content: 'Ils assureront ton service et celui de toute la tente, mais ils n''approcheront ni des ustensiles sacrés, ni de l''autel ; ainsi vous ne mourrez pas, ni eux ni vous. '
  '30':
  - type: note
    content: V. 27+.
  - type: text
    content: 'Tu leur diras : Quand vous en aurez prélevé le meilleur, la dîme sera comptée aux lévites comme le produit de l''aire et comme le produit de la cuve. '
  '31':
  - type: note
    content: Cf. v. 21 ; Dt 12.17 ; 14.23. –  c'est votre salaire v. 8+ ; Mt 10.10 ; Lc 10.7 ; 1Co 9.13 ; 1Tm 5.18.
  - type: text
    content: 'Vous pourrez la manger en tout lieu, vous et votre maison : c''est votre salaire en échange du service que vous faites dans la tente de la Rencontre. '
  '32':
  - type: note
    content: 'le meilleur v. 12n,29s. –  offrandes sacrées  : voir sacrifices et saint. –  vous ne mourrez pas  : cf. v. 22.'
  - type: text
    content: Vous ne serez chargés pour cela d'aucun péché, quand vous en aurez prélevé le meilleur ; vous ne profanerez pas les offrandes sacrées des Israélites, – vous ne mourrez pas.
  '4':
  - type: note
    content: 'service  : traduit deux mots hébreux différents ; le second signifie également culte  ; cf. v. 7 ; 8.26n. Sur le service de la tente, cf. 8.19,24 ; 18.21,23 ; Ex 30.16. –  profane v. 7 ; 1.51n  ; 3.10 ; cf. 4.19s.'
  - type: text
    content: 'Ils te seront attachés et ils assureront le service de la tente de la Rencontre, tout le service de la tente. Aucun profane n''approchera de vous. '
  '5':
  - type: note
    content: la Colère… 1.53n  ; cf. 16.31 ; 17.11ss,27s.
  - type: text
    content: 'Vous, vous assurerez le service du sanctuaire et le service de l''autel ; ainsi la Colère ne s''abattra plus sur les Israélites. '
  '6':
  - type: note
    content: 'donnés…  : litt. (ils sont) pour vous un don, donnés à YHWH  ; plusieurs versions anciennes omettent le pour vous, qui est marqué d''un signe particulier dans le texte hébreu traditionnel ; cf. 3.8ss,12,45 ; 8.5-19. –  pour accomplir le service  : cf. 3.7n  ; 7.5.'
  - type: text
    content: 'Moi, j''ai pris vos frères, les lévites, d''entre les Israélites : donnés au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ils vous sont remis en don pour accomplir le service de la tente de la Rencontre. '
  '7':
  - type: note
    content: 'au-delà du voile, c.-à-d. dans le Très-Sacré, cf. Ex 26.31ss. –  Votre sacerdoce…  : texte obscur et traduction conjecturale ; on pourrait aussi traduire je fais de votre sacerdoce un service de don. –  Le profane… v. 4+.'
  - type: text
    content: 'Toi et tes fils avec toi, vous exercerez votre sacerdoce pour tout ce qui concerne l''autel et pour ce qui est à l''intérieur, au-delà du voile : ce sera votre service. Votre sacerdoce est le service dont je vous fais don. Le profane qui approchera sera mis à mort.'
  - type: heading
    content: Les revenus des prêtres
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 31+ ; Lv 7.7ss,29ss ; Dt 18.1ss ; Jos 13.14 ; 1S 2.12ss,28 ; voir aussi Os 4.8 ; 1Co 9.13s. –  garde  : le même mot est traduit par service dans les v. précédents ; autre traduction la portion conservée ou réservée , cf. 17.25n  ; 19.9. –  prélèvements  : cf. 5.9+. – Voir fils. –  droit de l''onction d''huile  : litt. en onction , c.-à-d. ou bien comme chose consacrée par l''huile sainte , ou bien comme prérogative liée à votre onction (sacre du sacerdoce).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Aaron : Moi, je te donne la garde de mes prélèvements ; je te les donne, à toi et à tes fils, avec tout ce que consacrent les Israélites, comme droit de l''onction d''huile, comme une prescription perpétuelle. '
  '9':
  - type: note
    content: 'Cf. Lv 2.3,10 ; 4—7 ; Ez 44.28ss. –  qui n''auront pas été brûlées  : litt. hors du feu  ; autre traduction retirées du feu. –  qu''ils m''offrent  : litt. qu''ils me rendent  ; Smr porte le verbe spécifique des sacrifices de réparation, 5.7+.'
  - type: text
    content: 'Voici ce qui sera pour toi parmi les choses très sacrées qui n''auront pas été brûlées : tous leurs présents, toutes leurs offrandes végétales, tous leurs sacrifices pour le péché et tous les sacrifices de réparation qu''ils m''offrent ; ces choses très sacrées seront pour toi et pour tes fils. '
