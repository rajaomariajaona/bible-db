        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: (ils sont) pour vous un don, donnés à YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; plusieurs versions anciennes omettent le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour vous
    - type: usfm
      marker: ft
      children:
      - type: text
