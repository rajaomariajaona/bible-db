        text: Très-Sacré
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Ex 26.31ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Votre sacerdoce…
    - type: usfm
      marker: ft
