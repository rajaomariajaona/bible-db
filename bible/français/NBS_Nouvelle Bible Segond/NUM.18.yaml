    text: 'Voici ce qui sera pour toi parmi les choses très sacrées qui n''auront pas été brûlées : tous leurs présents, toutes leurs offrandes végétales, tous leurs sacrifices pour le péché et tous les sacrifices de réparation qu''ils m''offrent ; ces choses très sacrées seront pour toi et pour tes fils. '
