      - type: text
        text: '1.53'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; cf. 16.31 ; 17.11ss,27s.'
    marker-yv: yv-n
  - type: text
    text: 'Vous, vous assurerez le service du sanctuaire et le service de l''autel ; ainsi la Colère ne s''abattra plus sur les Israélites. '
