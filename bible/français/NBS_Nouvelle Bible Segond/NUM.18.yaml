  - type: text
    text: 'Ils assureront ton service et celui de toute la tente, mais ils n''approcheront ni des ustensiles sacrés, ni de l''autel ; ainsi vous ne mourrez pas, ni eux ni vous. '
  - type: usfm
    marker: vlbl
