  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 24.36.
    marker-yv: yv-n
  - type: text
    text: 'Abraham donna tout ce qui lui appartenait à Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.6 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 21.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'en Orient '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vers le pays de l''Est '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (comme précédemment).
    marker-yv: yv-n
  - type: text
    text: Quant aux fils de ses concubines, Abraham leur fit des dons et, de son vivant, il les envoya loin d'Isaac, son fils, du côté de l'est, en Orient.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: et voici les jours des années de la vie d'Abraham qu'il vécut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 17.
    marker-yv: yv-n
  - type: text
    text: 'Voici la durée de la vie d''Abraham : cent soixante-quinze ans. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.8 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '15.15 ; cf. 35.28s ; 49.29-33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: réuni…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'réuni vers ses peuples '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'vers les siens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 17.14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; l''expression, qui évoquait peut-être à l''origine l''ensevelissement dans le tombeau familial, est employée ailleurs indépendamment du lieu de sépulture (49.29,33 ; Nb 20.24,26 ; 27.13 ; 31.2) ; elle peut aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: compté au nombre des ancêtres.
    marker-yv: yv-n
  - type: text
    text: 'Puis Abraham expira ; il mourut dans une heureuse vieillesse, âgé et rassasié, et il fut réuni aux siens. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 23.1-20.
    marker-yv: yv-n
  - type: text
    text: 'Isaac et Ismaël, ses fils, l''ensevelirent dans la grotte de Makpéla, dans le champ d''Ephrôn, fils de Tsohar, le Hittite, en face de Mamré. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'C''était le champ qu''Abraham avait acheté aux Hittites. Là furent ensevelis Abraham et Sara, sa femme. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 16.13-14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 24.62'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Après la mort d'Abraham, Dieu bénit Isaac, son fils, qui habitait près du Puits Lahaï-Roï.
- type: usfm
  marker: r
  children:
  - type: text
    text: 1Ch 1.29-31
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'généalogie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 13,19 ; 2.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ismaël '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 16.1-16 ; 21.17-21.
    marker-yv: yv-n
  - type: text
    text: 'Voici la généalogie d''Ismaël, fils d''Abraham, que l''Egyptienne Hagar, servante de Sara, avait donné à Abraham. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1Ch 1.29-31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nebayoth '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(28.9 ; 36.3 ; Es 60.7) a parfois été associé aux Nabatéens, mais cette identification est peu probable. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Qédar
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : tribu nomade du nord de l''Arabie ; Es 21.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 27.21 ; 1Ch 1.29.'
    marker-yv: yv-n
  - type: text
    text: 'Voici les noms des fils d''Ismaël, leur nom selon leur généalogie : Nebayoth, premier-né d''Ismaël, Qédar, Adbéel, Mibsam, '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Mishma, Douma, Massa, '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Téma
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : tribu du nord de l''Arabie, cf. Jr 25.23 ; 1Ch 1.30. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Yetour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. l''Iturée de Lc 3.1.'
    marker-yv: yv-n
  - type: text
    text: 'Hadad, Téma, Yetour, Naphish et Qedma. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'douze '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '17.20'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ce sont là les fils d''Ismaël ; ce sont là leurs noms, dans leurs villages et leurs campements : douze princes, peuplade par peuplade. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la durée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les années.
    marker-yv: yv-n
  - type: text
    text: 'Voici la durée de la vie d''Ismaël : cent trente-sept ans ; puis il expira ; il mourut et fut réuni aux siens. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les Ismaélites…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ils demeurèrent… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Havila '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.11+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Shour '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '16.7+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ismaël s''établit '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: s'était établi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il tomba
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ce qui pourrait aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il fut abaissé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou même '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il mourut
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; voir cependant 16.12 ; le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''abattre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Jg 7.12. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en face
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à l'est.
    marker-yv: yv-n
  - type: text
    text: Les Ismaélites demeurèrent depuis Havila jusqu'à Shour, qui est en face de l'Egypte, en allant vers l'Assyrie. Ismaël s'établit en face de tous ses frères.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Esaü et Jacob
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'généalogie '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici la généalogie d''Isaac, fils d''Abraham. Abraham engendra Isaac. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.20 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '22.23 ; 24. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Paddân-Aram '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: pourrait être un autre nom de Harrân (cf. 24.10
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 27.43 ; 28.2,6) ou d''une région de Mésopotamie (cf. 10.22'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Isaac avait quarante ans quand il prit pour femme Rébecca, fille de Betouel, l''Araméen de Paddân-Aram, et sœur de Laban, l''Araméen. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.21 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 11.30 ; 20.17. Les verbes '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'intercéda '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'se laissa fléchir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: correspondent à deux formes du même verbe hébreu ; cf. Ex 8.4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 2S 21.14 ; 24.25 ; Es 19.22 ; Esd 8.23 ; 1Ch 5.20 ; 2Ch 33.13,19.'
    marker-yv: yv-n
  - type: text
