document_id: GEN.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Mort d'Abraham ; ses autres descendants
  - type: heading
    content: 1Ch 1.32-33
  - type: text
    content: ' '
  - type: note
    content: Cf. 1Ch 1.32s.
  - type: text
    content: 'Abraham prit encore une femme nommée Qetoura. '
  '10':
  - type: text
    content: 'C''était le champ qu''Abraham avait acheté aux Hittites. Là furent ensevelis Abraham et Sara, sa femme. '
  '11':
  - type: note
    content: 16.13-14n  ; 24.62n. – Voir bénédiction.
  - type: text
    content: Après la mort d'Abraham, Dieu bénit Isaac, son fils, qui habitait près du Puits Lahaï-Roï.
  - type: heading
    content: 1Ch 1.29-31
  '12':
  - type: text
    content: ' '
  - type: note
    content: généalogie v. 13,19 ; 2.4n. –  Ismaël 16.1-16 ; 21.17-21.
  - type: text
    content: 'Voici la généalogie d''Ismaël, fils d''Abraham, que l''Egyptienne Hagar, servante de Sara, avait donné à Abraham. '
  '13':
  - type: note
    content: '1Ch 1.29-31. –  Nebayoth (28.9 ; 36.3 ; Es 60.7) a parfois été associé aux Nabatéens, mais cette identification est peu probable. –  Qédar  : tribu nomade du nord de l''Arabie ; Es 21.16n  ; Ez 27.21 ; 1Ch 1.29.'
  - type: text
    content: 'Voici les noms des fils d''Ismaël, leur nom selon leur généalogie : Nebayoth, premier-né d''Ismaël, Qédar, Adbéel, Mibsam, '
  '14':
  - type: text
    content: 'Mishma, Douma, Massa, '
  '15':
  - type: note
    content: 'Téma  : tribu du nord de l''Arabie, cf. Jr 25.23 ; 1Ch 1.30. –  Yetour  : cf. l''Iturée de Lc 3.1.'
  - type: text
    content: 'Hadad, Téma, Yetour, Naphish et Qedma. '
  '16':
  - type: note
    content: douze 17.20n.
  - type: text
    content: 'Ce sont là les fils d''Ismaël ; ce sont là leurs noms, dans leurs villages et leurs campements : douze princes, peuplade par peuplade. '
  '17':
  - type: note
    content: 'la durée  : litt. les années.'
  - type: text
    content: 'Voici la durée de la vie d''Ismaël : cent trente-sept ans ; puis il expira ; il mourut et fut réuni aux siens. '
  '18':
  - type: note
    content: 'Les Ismaélites…  : litt. ils demeurèrent… –  Havila 2.11+. –  Shour 16.7+. –  Ismaël s''établit (ou s''était établi) : litt. il tomba, ce qui pourrait aussi signifier il fut abaissé ou même il mourut  ; voir cependant 16.12 ; le même verbe est traduit par s''abattre en Jg 7.12. –  en face  : autre traduction à l''est.'
  - type: text
    content: Les Ismaélites demeurèrent depuis Havila jusqu'à Shour, qui est en face de l'Egypte, en allant vers l'Assyrie. Ismaël s'établit en face de tous ses frères.
  - type: heading
    content: Esaü et Jacob
  '19':
  - type: text
    content: ' '
  - type: note
    content: généalogie 2.4n.
  - type: text
    content: 'Voici la généalogie d''Isaac, fils d''Abraham. Abraham engendra Isaac. '
  '2':
  - type: note
    content: Il s'agit ici de tribus arabes. –  Medân 37.36n. –  Madiân, peuple nomade et voisin d'Israël, au sud du Néguev, dans le nord de la péninsule du Sinaï (Ex 2.15).
  - type: text
    content: 'Elle lui donna des fils : Zimrân, Yoqshân, Medân, Madiân, Yishbaq et Shouah. '
  '20':
  - type: note
    content: 22.23 ; 24. –  Paddân-Aram pourrait être un autre nom de Harrân (cf. 24.10n  ; 27.43 ; 28.2,6) ou d'une région de Mésopotamie (cf. 10.22n).
  - type: text
    content: 'Isaac avait quarante ans quand il prit pour femme Rébecca, fille de Betouel, l''Araméen de Paddân-Aram, et sœur de Laban, l''Araméen. '
  '21':
  - type: note
    content: Cf. 11.30 ; 20.17. Les verbes intercéda et se laissa fléchir correspondent à deux formes du même verbe hébreu ; cf. Ex 8.4n  ; 2S 21.14 ; 24.25 ; Es 19.22 ; Esd 8.23 ; 1Ch 5.20 ; 2Ch 33.13,19.
  - type: text
    content: 'Isaac intercéda auprès du '
  - type: text
    content: Seigneur
  - type: text
    content: ' en faveur de sa femme, car elle était stérile, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se laissa fléchir. Rébecca, sa femme, fut enceinte. '
  '22':
  - type: note
    content: 'Les enfants  : litt. les fils. –  se heurtaient  : LXX utilise le terme qui sera traduit par tressaillir en Lc 1.41,44. –  Pourquoi cela m''arrive-t-il ? litt. s’(il en est) ainsi, pourquoi cela moi ? Syr comprend à quoi me sert la vie ? (cf. 27.46). On peut aussi conjecturer  : à quoi suis-je bonne ? –  Elle alla consulter le Seigneur  : l''expression donne à penser que Rébecca se rend à l''un des lieux sacrés signalés dans les récits de la vie d''Abraham.'
  - type: text
    content: 'Les enfants se heurtaient en elle, et elle dit : Pourquoi cela m''arrive-t-il ? Elle alla consulter le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '23':
  - type: note
    content: 'Cf. 2S 8.14 ; Rm 9.12. –  le grand servira le petit  : autre traduction l''aîné sera assujetti au cadet.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui dit :'
  - type: text
    content: Deux nations sont dans ton ventre,
  - type: text
    content: deux peuples se sépareront au sortir de ton sein ;
  - type: text
    content: un de ces peuples sera plus fort que l'autre,
  - type: text
    content: et le grand servira le petit.
  '24':
  - type: text
    content: ' '
  - type: note
    content: Cf. 38.27-30.
  - type: text
    content: 'Au terme de sa grossesse, il apparut qu''il y avait des jumeaux dans son ventre. '
  '25':
  - type: note
    content: 'roux  : hébreu ’admoni, cf. v. 30n. – Le nom d’Esaü est proche du mot hébreu traduit par poil (sé‘ar  ; cf. 27.11n), ainsi que de Séir, nom du pays des Edomites (14.6n  ; 33.14-16 ; Nb 24.18). On l''a aussi rapproché du verbe hébreu habituellement traduit par faire.'
  - type: text
    content: 'Le premier sortit entièrement roux, comme un manteau de poil : on l''appela du nom d''Esaü (« Poilu »). '
  '26':
  - type: note
    content: 'on l''appela…  : litt. il appela son nom. – Le nom de Jacob (hébreu Ya‘aqov) est proche du mot traduit par talon (‘aqév, 3.15+). Le verbe ‘aqav, qui peut signifier saisir (ou retenir, cf. Jb 37.4n) le talon, a au figuré le sens de supplanter ou d’usurper (cf. 27.36 ; Jr 9.3n  ; Os 12.4). Sur Jacob hors du Pentateuque, voir Gn 17.5n.'
  - type: text
    content: Après quoi sortit son frère, dont la main tenait le talon d'Esaü ; et on l'appela du nom de Jacob (« Il talonne »). Isaac avait soixante ans lorsqu'ils naquirent.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'tranquille  : le terme hébreu correspondant est aussi traduit par intègre . –  restait  : autre traduction habitait.'
  - type: text
    content: 'Les garçons grandirent. Esaü devint un habile chasseur, un homme de la campagne ; mais Jacob était un homme tranquille, qui restait sous les tentes. '
  '28':
  - type: note
    content: 'il appréciait le gibier  : litt. le gibier (était) dans sa bouche.'
  - type: text
    content: Isaac aimait Esaü, parce qu'il appréciait le gibier ; Rébecca, elle, aimait Jacob.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'une soupe  : autre traduction un ragoût  ; cf. 2R 4.38ss.'
  - type: text
    content: 'Un jour que Jacob faisait cuire une soupe, Esaü revint de la campagne, épuisé. '
  '3':
  - type: note
    content: Saba et Dedân 10.7n.
  - type: text
    content: 'Yoqshân engendra Saba et Dedân. Fils de Dedân : les Ashourites, les Letoushites et les Léoumites. '
  '30':
  - type: note
    content: 'Laisse-moi… manger  : litt. fais-moi avaler. –  ce potage roux ou ce plat roux, litt. ce roux  ; en hébreu ’adom, terme qui fait assonance avec le nom propre Edom, cf. v. 25n.'
  - type: text
    content: 'Esaü dit à Jacob : Laisse-moi, je te prie, manger de ce potage roux, – oui, ce potage roux ! – car je suis épuisé. C''est pourquoi on l''a appelé du nom d''Edom (« Roux »). '
  '31':
  - type: note
    content: 'Cf. Dt 21.15-17. –  d''abord  : autre traduction aujourd''hui même, ou encore tout de suite  ; même expression au v. 33 et en 1S 2.16 ; 1R 1.51 ; 22.5.'
  - type: text
    content: 'Jacob dit : Vends-moi d''abord ton droit d''aînesse ! '
  '32':
  - type: note
    content: Cf. Jg 15.18.
  - type: text
    content: 'Esaü répondit : Je suis sur le point de mourir ; à quoi me sert ce droit d''aînesse ? '
  '33':
  - type: note
    content: 'd''abord  : litt. dès aujourd''hui.'
  - type: text
    content: 'Alors Jacob dit : Jure-le-moi d''abord. Il le lui jura. Ainsi il vendit son droit d''aînesse à Jacob. '
  '34':
  - type: note
    content: Cf. Hé 12.16.
  - type: text
    content: Alors Jacob donna à Esaü du pain et de la soupe de lentilles. Il mangea et but, puis il se leva et s'en alla. Ainsi Esaü méprisa le droit d'aînesse.
  '4':
  - type: note
    content: 'Epha Es 60.6 ; 1Ch 1.33. –  Hénoch  : cf. 4.17s ; 5.18ss.'
  - type: text
    content: 'Fils de Madiân : Epha, Epher, Hénoch, Abida et Eldaa. Tous ceux-là sont les fils de Qetoura.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 24.36.
  - type: text
    content: 'Abraham donna tout ce qui lui appartenait à Isaac. '
  '6':
  - type: note
    content: Cf. 21.10. –  en Orient litt. vers le pays de l'Est (comme précédemment).
  - type: text
    content: Quant aux fils de ses concubines, Abraham leur fit des dons et, de son vivant, il les envoya loin d'Isaac, son fils, du côté de l'est, en Orient.
  '7':
  - type: text
    content: ' '
  - type: note
    content: Litt. et voici les jours des années de la vie d'Abraham qu'il vécut  ; cf. v. 17.
  - type: text
    content: 'Voici la durée de la vie d''Abraham : cent soixante-quinze ans. '
  '8':
  - type: note
    content: '15.15 ; cf. 35.28s ; 49.29-33. –  réuni…  : litt. réuni vers ses peuples ou vers les siens (cf. 17.14n) ; l''expression, qui évoquait peut-être à l''origine l''ensevelissement dans le tombeau familial, est employée ailleurs indépendamment du lieu de sépulture (49.29,33 ; Nb 20.24,26 ; 27.13 ; 31.2) ; elle peut aussi signifier compté au nombre des ancêtres.'
  - type: text
    content: 'Puis Abraham expira ; il mourut dans une heureuse vieillesse, âgé et rassasié, et il fut réuni aux siens. '
  '9':
  - type: note
    content: 23.1-20.
  - type: text
    content: 'Isaac et Ismaël, ses fils, l''ensevelirent dans la grotte de Makpéla, dans le champ d''Ephrôn, fils de Tsohar, le Hittite, en face de Mamré. '
