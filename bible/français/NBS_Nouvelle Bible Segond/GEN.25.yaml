    marker-yv: yv-n
  - type: text
    text: 'Abraham prit encore une femme nommée Qetoura. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.2 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Il s''agit ici de tribus arabes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Medân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '37.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Madiân
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', peuple nomade et voisin d''Israël, au sud du Néguev, dans le nord de la péninsule du Sinaï (Ex 2.15).'
    marker-yv: yv-n
  - type: text
    text: 'Elle lui donna des fils : Zimrân, Yoqshân, Medân, Madiân, Yishbaq et Shouah. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Saba et Dedân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Yoqshân engendra Saba et Dedân. Fils de Dedân : les Ashourites, les Letoushites et les Léoumites. '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '25.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Epha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Es 60.6 ; 1Ch 1.33. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hénoch
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.17s ; 5.18ss.'
    marker-yv: yv-n
  - type: text
    text: 'Fils de Madiân : Epha, Epher, Hénoch, Abida et Eldaa. Tous ceux-là sont les fils de Qetoura.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
