document_id: 1CH.18,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Victoire de David sur les nations voisines
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 8.1-14
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 5.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les localités qui en dépendent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses filles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. Nb 21.25+.
      marker-yv: yv-n
    - type: text
      text: Après cela, David battit les Philistins et les humilia. Il prit aux Philistins Gath et les localités qui en dépendent.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hadoram
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : nom probablement dérivé de celui du dieu syrien '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hadad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il envoya
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu la deuxième fois.'
      marker-yv: yv-n
    - type: text
      text: 'Il envoya Hadoram, son fils, auprès du roi David, pour lui demander comment il allait et le féliciter d''avoir fait la guerre à Hadad-Ezer et de l''avoir battu. Car Tôou était en guerre avec Hadad-Ezer. Il envoya aussi toutes sortes d''objets d''or, d''argent et de bronze. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Edom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'remplace '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'à Aram '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de 2S 8.12.
      marker-yv: yv-n
    - type: text
      text: 'Le roi David les consacra au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', avec l''argent et l''or qu''il avait enlevés à toutes les nations, à Edom, à Moab, aux Ammonites, aux Philistins et à Amalec.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon 2S 8.13, c''est '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'David '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'qui a battu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les Araméens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en cette circonstance. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abshaï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 11.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dix-huit mille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ps 60.2.'
      marker-yv: yv-n
    - type: text
      text: 'Abshaï, fils de Tserouya, battit dans la vallée du Sel dix-huit mille Edomites. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Il installa des garnisons en Edom, et tout Edom fut soumis à David. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' donnait la victoire à David partout où il allait.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Liste des fonctionnaires de David
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2S 8.15-18
    marker-yv: yv-h
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David régna sur tout Israël. Il agissait envers tout son peuple selon l''équité et la justice. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Josaphat… archiviste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 8.16'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 20.24 ; 1R 4.3.'
      marker-yv: yv-n
    - type: text
      text: 'Joab, fils de Tserouya, était à la tête de l''armée ; Josaphat, fils d''Ahiloud, était archiviste ; '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Abimélek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 8.17 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ahimélek
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shavsha était '
        - type: usfm
          marker: w
          children:
          - type: text
            text: scribe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 8.17 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Seraya.
      marker-yv: yv-n
    - type: text
      text: 'Tsadoq, fils d''Ahitoub, et Abimélek, fils d''Abiathar, étaient prêtres ; Shavsha était scribe ; '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Selon 2S 8.18, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les fils de David étaient prêtres
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: représentants du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 11.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Benaya, fils de Joïada, était chef des Kérétites et des Pélétites, et les fils de David étaient les premiers représentants du roi.
  '2':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Le texte parallèle de 2S 8.2 est plus développé.
      marker-yv: yv-n
    - type: text
      text: Il battit les Moabites, qui lui furent soumis et assujettis à un tribut.
  '3':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hadad-Ezer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : plusieurs mss hébreux et versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Hadar-Ezer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite et en 19.16,19 ; cf. 2S 8.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hamath
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2S 8.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David battit Hadad-Ezer, roi de Tsoba, vers Hamath, lorsqu''il alla établir sa domination sur l''Euphrate. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sept mille
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : 2S 8.4 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mille sept cents
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: hommes d'équipage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: équipages de chars, attelages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: attelages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chars.
      marker-yv: yv-n
    - type: text
      text: David lui prit mille chars, sept mille hommes d'équipage et vingt mille fantassins ; il coupa les jarrets à tous les attelages, après en avoir conservé une centaine.
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Araméens de Damas vinrent au secours de Hadad-Ezer, roi de Tsoba, et David abattit vingt-deux mille hommes parmi les Araméens. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des garnisons '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des préfets
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', d''après des versions anciennes et 2S 8.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; le mot hébreu correspondant est absent dans le texte hébreu traditionnel, et apparaît au v. 13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: donnait la victoire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2S 3.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',14.'
      marker-yv: yv-n
    - type: text
      text: 'David établit des garnisons chez les Araméens de Damas, et les Araméens furent soumis à David et assujettis à un tribut. Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' donnait la victoire à David partout où il allait. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'carquois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: boucliers
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2S 8.7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'David prit les carquois d''or que portaient les hommes de Hadad-Ezer et les apporta à Jérusalem. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '18.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tibhath '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Koun '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'remplacent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bétah '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Bérotaï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de 2S 8.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Salomon… objets de bronze
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 7.15-47 ; les mots correspondants sont absents de 2S 8.8.'
      marker-yv: yv-n
    - type: text
      text: David prit encore une très grande quantité de bronze à Tibhath et à Koun, villes de Hadad-Ezer. Salomon en fit la Mer de bronze, les colonnes et les objets de bronze.
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tôou, roi de Hamath, apprit que David avait battu toute l''armée de Hadad-Ezer, roi de Tsoba. '
