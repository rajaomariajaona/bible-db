document_id: 1CH.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Victoire de David sur les nations voisines
  - type: heading
    content: 2S 8.1-14
  - type: text
    content: ' '
  - type: note
    content: 'Gath  : cf. 1S 5.1n. –  les localités qui en dépendent  : litt. ses filles  ; cf. Nb 21.25+.'
  - type: text
    content: Après cela, David battit les Philistins et les humilia. Il prit aux Philistins Gath et les localités qui en dépendent.
  '10':
  - type: note
    content: 'Hadoram  : nom probablement dérivé de celui du dieu syrien Hadad. –  Il envoya  : sous-entendu la deuxième fois.'
  - type: text
    content: 'Il envoya Hadoram, son fils, auprès du roi David, pour lui demander comment il allait et le féliciter d''avoir fait la guerre à Hadad-Ezer et de l''avoir battu. Car Tôou était en guerre avec Hadad-Ezer. Il envoya aussi toutes sortes d''objets d''or, d''argent et de bronze. '
  '11':
  - type: note
    content: à Edom remplace à Aram de 2S 8.12.
  - type: text
    content: 'Le roi David les consacra au '
  - type: text
    content: Seigneur
  - type: text
    content: ', avec l''argent et l''or qu''il avait enlevés à toutes les nations, à Edom, à Moab, aux Ammonites, aux Philistins et à Amalec.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Selon 2S 8.13, c''est David qui a battu les Araméens en cette circonstance. –  Abshaï  : cf. 2.16n  ; 11.20. –  dix-huit mille  : cf. Ps 60.2.'
  - type: text
    content: 'Abshaï, fils de Tserouya, battit dans la vallée du Sel dix-huit mille Edomites. '
  '13':
  - type: text
    content: 'Il installa des garnisons en Edom, et tout Edom fut soumis à David. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donnait la victoire à David partout où il allait.'
  - type: heading
    content: Liste des fonctionnaires de David
  - type: heading
    content: 2S 8.15-18
  '14':
  - type: text
    content: 'David régna sur tout Israël. Il agissait envers tout son peuple selon l''équité et la justice. '
  '15':
  - type: note
    content: 'Josaphat… archiviste  : cf. 2S 8.16n  ; 20.24 ; 1R 4.3.'
  - type: text
    content: 'Joab, fils de Tserouya, était à la tête de l''armée ; Josaphat, fils d''Ahiloud, était archiviste ; '
  '16':
  - type: note
    content: 'Abimélek  : cf. 2S 8.17 Ahimélek. –  Shavsha était scribe  : cf. 2S 8.17 Seraya.'
  - type: text
    content: 'Tsadoq, fils d''Ahitoub, et Abimélek, fils d''Abiathar, étaient prêtres ; Shavsha était scribe ; '
  '17':
  - type: note
    content: 'Selon 2S 8.18, les fils de David étaient prêtres. –  représentants du roi  : cf. Né 11.24n.'
  - type: text
    content: Benaya, fils de Joïada, était chef des Kérétites et des Pélétites, et les fils de David étaient les premiers représentants du roi.
  '2':
  - type: text
    content: ' '
  - type: note
    content: Le texte parallèle de 2S 8.2 est plus développé.
  - type: text
    content: Il battit les Moabites, qui lui furent soumis et assujettis à un tribut.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Hadad-Ezer  : plusieurs mss hébreux et versions anciennes portent Hadar-Ezer , de même dans la suite et en 19.16,19 ; cf. 2S 8.3n –  Hamath  : cf. 2S 8.9n.'
  - type: text
    content: 'David battit Hadad-Ezer, roi de Tsoba, vers Hamath, lorsqu''il alla établir sa domination sur l''Euphrate. '
  '4':
  - type: note
    content: 'sept mille  : 2S 8.4 mille sept cents. –  hommes d''équipage  : autres traductions équipages de chars, attelages. –  attelages  : litt. chars.'
  - type: text
    content: David lui prit mille chars, sept mille hommes d'équipage et vingt mille fantassins ; il coupa les jarrets à tous les attelages, après en avoir conservé une centaine.
  '5':
  - type: text
    content: 'Les Araméens de Damas vinrent au secours de Hadad-Ezer, roi de Tsoba, et David abattit vingt-deux mille hommes parmi les Araméens. '
  '6':
  - type: note
    content: 'des garnisons ou des préfets, d''après des versions anciennes et 2S 8.6n  ; le mot hébreu correspondant est absent dans le texte hébreu traditionnel, et apparaît au v. 13. –  donnait la victoire  : cf. 2S 3.6n,14.'
  - type: text
    content: 'David établit des garnisons chez les Araméens de Damas, et les Araméens furent soumis à David et assujettis à un tribut. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' donnait la victoire à David partout où il allait. '
  '7':
  - type: note
    content: carquois ou boucliers, cf. 2S 8.7n.
  - type: text
    content: 'David prit les carquois d''or que portaient les hommes de Hadad-Ezer et les apporta à Jérusalem. '
  '8':
  - type: note
    content: 'Tibhath et Koun remplacent Bétah et Bérotaï de 2S 8.8. –  Salomon… objets de bronze  : cf. 1R 7.15-47 ; les mots correspondants sont absents de 2S 8.8.'
  - type: text
    content: David prit encore une très grande quantité de bronze à Tibhath et à Koun, villes de Hadad-Ezer. Salomon en fit la Mer de bronze, les colonnes et les objets de bronze.
  '9':
  - type: text
    content: 'Tôou, roi de Hamath, apprit que David avait battu toute l''armée de Hadad-Ezer, roi de Tsoba. '
