document_id: PSA.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les paroles pures du Seigneur
  - type: text
    content: ' '
  - type: note
    content: Sur la lyre… 6.1n.
  - type: text
    content: Du chef de chœur. Sur la lyre à huit cordes. Psaume. De David.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 4.4n  ; 14.3 ; Es 57.1 ; Jr 5.1 ; Os 4.1 ; Mi 7.2 ; Rm 3.10-12. –  fidèles  : cf. 17.7n. –  sûrs ou dignes de confiance  ; cf. 31.24.'
  - type: text
    content: 'Sauve, '
  - type: text
    content: Seigneur
  - type: text
    content: ', car c''en est fini des fidèles,'
  - type: text
    content: les hommes sûrs disparaissent.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'parle faussement  : cf. 41.7 ; 144.8,11 ; Jr 9.2-8. –  lèvres enjôleuses ou flatteuses, complaisantes  ; cf. 5.10n  ; 55.22 ; 59.8,13 ; 140.4 ; cf. 28.3+. –  un cœur double  : litt. cœur et cœur  ; cf. 1Ch 12.34.'
  - type: text
    content: Chacun parle faussement à son prochain.
  - type: text
    content: On se parle avec des lèvres enjôleuses
  - type: text
    content: et un cœur double.
  '4':
  - type: text
    content: ' '
  - type: note
    content: '31.19. –  discourt avec arrogance  : litt. dit de grandes choses.'
  - type: text
    content: 'Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' retranche toutes les lèvres enjôleuses,'
  - type: text
    content: la langue qui discourt avec arrogance,
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Nous sommes puissants…  : LXX a lu nous fortifierons notre langue. –  maître ou seigneur.'
  - type: text
    content: 'ceux qui disent : Nous sommes puissants par notre langue,'
  - type: text
    content: nos lèvres sont avec nous ;
  - type: text
    content: qui serait notre maître ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'pauvres (9.13n) / déshérités  : cf. 35.10 ; 37.14 ; 40.18 ; 70.6 ; 72.4 ; 74.21 ; 82.3s ; 86.1 ; 109.16,22 ; 140.13 ; Es 32.7 ; 41.17 ; Ez 16.49 ; 18.12 ; 22.29 ; Am 8.4. –  sont opprimés… 72.4 ; Dt 24.14 ; Es 3.15 ; 10.2 ; Am 2.6 ; 5.12 ; Pr 14.31 ; 22.16. –  maintenant… je me lève Es 33.10. –  le salut Es 12.2. –  à ceux sur qui l''on souffle  : cf. 10.5 ; on a aussi compris  : à ceux contre qui l''on témoigne (Pr 6.19n  ; 12.17n)  ; à ceux qui soupirent après lui  ; LXX (et) je paraîtrai ouvertement en lui.'
  - type: text
    content: Parce que les pauvres sont opprimés,
  - type: text
    content: parce que les déshérités gémissent,
  - type: text
    content: 'maintenant, dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', je me lève :'
  - type: text
    content: j'apporte le salut à ceux sur qui l'on souffle.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 18.31 ; 19.8-10 ; 119.140 ; Pr 30.5. –  au creuset de la terre  : traduction et sens incertains.'
  - type: text
    content: 'Les paroles du '
  - type: text
    content: Seigneur
  - type: text
    content: ' sont des paroles pures ;'
  - type: text
    content: un argent éprouvé au creuset de la terre,
  - type: text
    content: et sept fois épuré.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'tu les garderas  : quelques mss hébreux et des versions anciennes portent tu nous garderas. –  de cette génération  : autre traduction de cette engeance.'
  - type: text
    content: 'Toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ', tu les garderas,'
  - type: text
    content: tu nous préserveras de cette génération pour toujours.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'quand la bassesse s''élève…  : le dernier vers, assez obscur en hébreu, a été diversement compris par les versions anciennes.'
  - type: text
    content: Les méchants se promènent de toutes parts,
  - type: text
    content: quand la bassesse s'élève parmi les humains.
