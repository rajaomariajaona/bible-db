document_id: 2CH.35,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Josias célèbre la fête de la Pâque
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2R 23.21-23
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pâque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: calendrier
        - type: text
          text: ' et fêtes.'
      marker-yv: yv-n
    - type: text
      text: 'Josias célébra la Pâque pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' à Jérusalem, et on immola la Pâque le quatorzième jour du premier mois. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'organisa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même verbe (aussi au v. 16) est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'préparer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'aux v. 6,14s ; par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'rétablir '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 20 ; 29.35.
      marker-yv: yv-n
    - type: text
      text: 'Le service s''organisa, et les prêtres se tinrent debout à leur place ainsi que les lévites, suivant leurs classes, selon le commandement du roi. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: reçurent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'firent l''aspersion de leur main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(probablement de la main des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: lévites
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; certains supposent que le terme correspondant à '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: est sous-entendu, d'autres pensent qu'il a ici disparu par une erreur de copie.
      marker-yv: yv-n
    - type: text
      text: 'Ils immolèrent la Pâque ; les prêtres reçurent le sang et en firent l''aspersion, et les lévites dépouillèrent les animaux. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mirent à part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: préparèrent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'holocaustes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour le gros bétail
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss hébreux et des versions anciennes portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: chaque matin.
      marker-yv: yv-n
    - type: text
      text: 'Ils mirent à part les holocaustes pour les donner aux différentes familles des gens du peuple, afin qu''ils les présentent au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', comme il est écrit dans le livre de Moïse ; il en fut de même pour le gros bétail. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils firent cuire la Pâque au feu, selon la règle, et ils firent cuire les offrandes sacrées dans des marmites, des chaudrons et des plats, et ils les servirent rapidement à tous les gens du peuple. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: furent occupés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte.'
      marker-yv: yv-n
    - type: text
      text: Puis ils préparèrent ce qui était pour eux et pour les prêtres, car les prêtres, les fils d'Aaron, furent occupés jusqu'à la nuit à offrir les holocaustes et les graisses ; c'est pourquoi les lévites préparèrent ce qui était pour eux et pour les prêtres, les fils d'Aaron.
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans leurs fonctions
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à leur poste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; même terme en 9.4 ; 1Ch 23.28.
      marker-yv: yv-n
    - type: text
      text: 'Les chantres, fils d''Asaph, étaient dans leurs fonctions, selon le commandement de David, d''Asaph, de Hémân et de Yedoutoun, le visionnaire du roi, et les portiers étaient à chaque porte ; ils n''eurent pas à s''écarter de leur service, car leurs frères, les lévites, préparèrent ce qui était pour eux. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ainsi fut organisé ce jour-là tout le service du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' pour célébrer la Pâque et pour offrir des holocaustes sur l''autel du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', selon le commandement du roi Josias.'
  '17':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Les Israélites qui se trouvaient là célébrèrent la Pâque en ce temps et la fête des Pains sans levain pendant sept jours. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 2R 23.22s.
      marker-yv: yv-n
    - type: text
      text: 'On n''avait pas célébré une Pâque comme celle-là en Israël depuis les jours de Samuel, le prophète. Aucun des rois d''Israël n''avait célébré une Pâque pareille à celle que célébrèrent Josias, les prêtres et les lévites, avec tout Juda et les gens d''Israël qui s''y trouvaient, et les habitants de Jérusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: C'est la dix-huitième année du règne de Josias qu'on célébra cette Pâque.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin du règne de Josias
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: Cf. 2R 23.24-30
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: attacha
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: encouragea.
      marker-yv: yv-n
    - type: text
      text: 'Il installa les prêtres à leur poste et les attacha au service de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la Maison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : c.-à-d. le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: temple
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Après tout cela, après que Josias eut rétabli la Maison, Néko, roi d''Egypte, alla faire la guerre à Karkemish sur l''Euphrate. Josias sortit à sa rencontre. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Pourquoi te mêles-tu de mes affaires
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jg 11.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'contre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: traduit ici deux prépositions hébraïques différentes.
      marker-yv: yv-n
    - type: text
      text: 'Néko lui envoya des messagers pour lui dire : Pourquoi te mêles-tu de mes affaires, roi de Juda ? Ce n''est pas contre toi que je viens aujourd''hui ; c''est contre une maison avec laquelle je suis en guerre. Dieu m''a dit de me hâter. Ne t''oppose pas à Dieu, qui est avec moi, de peur qu''il ne te détruise. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Mais Josias ne se détourna pas de lui, et il se déguisa pour le combattre sans écouter les paroles de Néko, qui venaient de la bouche de Dieu. Il vint pour combattre dans la vallée de Meguiddo. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Emportez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'prendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: car je suis grièvement blessé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 22.34.'
      marker-yv: yv-n
    - type: text
      text: 'Les archers tirèrent sur le roi Josias, et le roi dit à ses hommes : Emportez-moi, car je suis grièvement blessé. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le second de ses chars
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 41.43'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans le tombeau '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: dans les tombeaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 16.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de ses pères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 23.30.'
      marker-yv: yv-n
    - type: text
      text: 'Ses hommes le prirent de son char et le mirent sur le second de ses chars pour l''amener à Jérusalem. Il mourut et fut enseveli dans le tombeau de ses pères. Tout Juda et Jérusalem prirent le deuil de Josias. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jérémie fit une complainte sur Josias
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jr 22.10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prescription
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme hébreu correspondant peut aussi être rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'coutume '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Jg 11.39
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: Jérémie fit une complainte sur Josias ; tous les chanteurs et toutes les chanteuses ont parlé de Josias dans leurs complaintes, jusqu'à aujourd'hui ; on en a fait une prescription en Israël. Ces chants sont écrits dans les Complaintes.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ce qu''il a fait avec fidélité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '32.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'conformément à ce qui est écrit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: comme il est écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Jos 23.6.
      marker-yv: yv-n
    - type: text
      text: 'Le reste de l''histoire de Josias, ce qu''il a fait avec fidélité, conformément à ce qui est écrit dans la loi du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le début et la fin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: livre des rois d'Israël et de Juda
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 16.11'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: le début et la fin de son histoire, cela est écrit dans le livre des rois d'Israël et de Juda.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.3 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: lévites
        - type: text
          text: ' qui instruisaient'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Né 8.1ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il dit aux lévites qui instruisaient tout Israël et qui étaient consacrés au '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Placez le coffre sacré dans la maison qu''a bâtie Salomon, fils de David, roi d''Israël ; vous n''avez plus à le porter sur l''épaule. Servez maintenant le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', votre Dieu, et Israël, son peuple ! '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écrit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même terme en 1Ch 28.19 ; 2Ch 2.10 ; il est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'écriture '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Est 1.22 ; 3.12 ; 8.9 ; par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'texte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Est 3.14 ; 4.8 ; 8.8,13 ; par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'titres (généalogiques) '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Esd 2.62/ /. C''est un terme apparenté qui est rendu ici par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: protocole.
      marker-yv: yv-n
    - type: text
      text: 'Faites des préparatifs, famille par famille, d''après vos classes, suivant l''écrit de David, roi d''Israël, et le protocole de Salomon, son fils. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les gens du peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les '
        - type: usfm
          marker: w
          children:
          - type: text
            text: fils
        - type: text
          text: ' du peuple'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les laïcs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même aux v. 7,12s ; cf. Jr 17.19'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 26.23 ; voir aussi 2R 23.6.'
      marker-yv: yv-n
    - type: text
      text: 'Tenez-vous dans le sanctuaire, selon les divisions des familles de vos frères, les gens du peuple, et d''après la classification des familles des lévites. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacrez-vous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 4s ; certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: immolez la Pâque et les offrandes sacrées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: préparez-la
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: préparez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en agissant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour qu'ils agissent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: celle qu'il a prononcée…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par la main de Moïse.
      marker-yv: yv-n
    - type: text
      text: 'Immolez la Pâque, consacrez-vous et préparez-la pour vos frères en agissant selon la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', celle qu''il a prononcée par l''intermédiaire de Moïse.'
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josias préleva pour les gens du peuple du petit bétail, moutons et chèvres, le tout pour la Pâque, pour tous ceux qui se trouvaient là, au nombre de trente mille, ainsi que trois mille têtes de gros bétail ; cela fut pris sur les biens du roi. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '35.8 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'offrande volontaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Lv 7.16 ; 22.18ss ; 23.38 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: animaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte, de même au v. 9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour la Pâque
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en pâques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 9 ; cf. 30.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ses princes firent un prélèvement en vue d''une offrande volontaire pour le peuple, pour les prêtres et les lévites. Hilqiya, Zacharie et Yehiel, chefs dans la maison de Dieu, donnèrent aux prêtres deux mille six cents animaux pour la Pâque et trois cents têtes de gros bétail. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: text
      text: Konania, Shemaya et Netanéel, ses frères, Hashabia, Yéiel et Yozabad, chefs des lévites, prélevèrent pour les lévites cinq mille animaux pour la Pâque et cinq cents têtes de gros bétail.
