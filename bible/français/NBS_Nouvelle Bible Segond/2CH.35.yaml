document_id: 2CH.35,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Josias célèbre la fête de la Pâque
  - type: heading
    content: 2R 23.21-23
  - type: text
    content: ' '
  - type: note
    content: 'Pâque  : voir calendrier et fêtes.'
  - type: text
    content: 'Josias célébra la Pâque pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' à Jérusalem, et on immola la Pâque le quatorzième jour du premier mois. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 's''organisa  : le même verbe (aussi au v. 16) est traduit par préparer aux v. 6,14s ; par rétablir au v. 20 ; 29.35.'
  - type: text
    content: 'Le service s''organisa, et les prêtres se tinrent debout à leur place ainsi que les lévites, suivant leurs classes, selon le commandement du roi. '
  '11':
  - type: note
    content: 'reçurent…  : litt. firent l''aspersion de leur main (probablement de la main des lévites) ; certains supposent que le terme correspondant à sang est sous-entendu, d''autres pensent qu''il a ici disparu par une erreur de copie.'
  - type: text
    content: 'Ils immolèrent la Pâque ; les prêtres reçurent le sang et en firent l''aspersion, et les lévites dépouillèrent les animaux. '
  '12':
  - type: note
    content: 'mirent à part  : LXX préparèrent. –  holocaustes 1.6+. –  pour le gros bétail  : certains mss hébreux et des versions anciennes portent chaque matin.'
  - type: text
    content: 'Ils mirent à part les holocaustes pour les donner aux différentes familles des gens du peuple, afin qu''ils les présentent au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme il est écrit dans le livre de Moïse ; il en fut de même pour le gros bétail. '
  '13':
  - type: text
    content: 'Ils firent cuire la Pâque au feu, selon la règle, et ils firent cuire les offrandes sacrées dans des marmites, des chaudrons et des plats, et ils les servirent rapidement à tous les gens du peuple. '
  '14':
  - type: note
    content: 'furent occupés  : sous-entendu dans le texte.'
  - type: text
    content: Puis ils préparèrent ce qui était pour eux et pour les prêtres, car les prêtres, les fils d'Aaron, furent occupés jusqu'à la nuit à offrir les holocaustes et les graisses ; c'est pourquoi les lévites préparèrent ce qui était pour eux et pour les prêtres, les fils d'Aaron.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'dans leurs fonctions  : autre traduction à leur poste  ; même terme en 9.4 ; 1Ch 23.28.'
  - type: text
    content: 'Les chantres, fils d''Asaph, étaient dans leurs fonctions, selon le commandement de David, d''Asaph, de Hémân et de Yedoutoun, le visionnaire du roi, et les portiers étaient à chaque porte ; ils n''eurent pas à s''écarter de leur service, car leurs frères, les lévites, préparèrent ce qui était pour eux. '
  '16':
  - type: text
    content: 'Ainsi fut organisé ce jour-là tout le service du '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour célébrer la Pâque et pour offrir des holocaustes sur l''autel du '
  - type: text
    content: Seigneur
  - type: text
    content: ', selon le commandement du roi Josias.'
  '17':
  - type: text
    content: 'Les Israélites qui se trouvaient là célébrèrent la Pâque en ce temps et la fête des Pains sans levain pendant sept jours. '
  '18':
  - type: note
    content: Cf. 2R 23.22s.
  - type: text
    content: 'On n''avait pas célébré une Pâque comme celle-là en Israël depuis les jours de Samuel, le prophète. Aucun des rois d''Israël n''avait célébré une Pâque pareille à celle que célébrèrent Josias, les prêtres et les lévites, avec tout Juda et les gens d''Israël qui s''y trouvaient, et les habitants de Jérusalem. '
  '19':
  - type: text
    content: C'est la dix-huitième année du règne de Josias qu'on célébra cette Pâque.
  - type: heading
    content: Fin du règne de Josias
  - type: heading
    content: Cf. 2R 23.24-30
  '2':
  - type: note
    content: 'attacha  : autre traduction encouragea.'
  - type: text
    content: 'Il installa les prêtres à leur poste et les attacha au service de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'la Maison  : c.-à-d. le temple.'
  - type: text
    content: 'Après tout cela, après que Josias eut rétabli la Maison, Néko, roi d''Egypte, alla faire la guerre à Karkemish sur l''Euphrate. Josias sortit à sa rencontre. '
  '21':
  - type: note
    content: 'Pourquoi te mêles-tu de mes affaires  : cf. Jg 11.12n. –  contre traduit ici deux prépositions hébraïques différentes.'
  - type: text
    content: 'Néko lui envoya des messagers pour lui dire : Pourquoi te mêles-tu de mes affaires, roi de Juda ? Ce n''est pas contre toi que je viens aujourd''hui ; c''est contre une maison avec laquelle je suis en guerre. Dieu m''a dit de me hâter. Ne t''oppose pas à Dieu, qui est avec moi, de peur qu''il ne te détruise. '
  '22':
  - type: text
    content: 'Mais Josias ne se détourna pas de lui, et il se déguisa pour le combattre sans écouter les paroles de Néko, qui venaient de la bouche de Dieu. Il vint pour combattre dans la vallée de Meguiddo. '
  '23':
  - type: note
    content: 'Emportez  : le même verbe est rendu par prendre au v. 24. –  car je suis grièvement blessé  : cf. 1R 22.34.'
  - type: text
    content: 'Les archers tirèrent sur le roi Josias, et le roi dit à ses hommes : Emportez-moi, car je suis grièvement blessé. '
  '24':
  - type: note
    content: 'le second de ses chars  : cf. Gn 41.43n. –  dans le tombeau (litt. dans les tombeaux  ; cf. 16.14n) de ses pères  : cf. 2R 23.30.'
  - type: text
    content: 'Ses hommes le prirent de son char et le mirent sur le second de ses chars pour l''amener à Jérusalem. Il mourut et fut enseveli dans le tombeau de ses pères. Tout Juda et Jérusalem prirent le deuil de Josias. '
  '25':
  - type: note
    content: 'Jérémie fit une complainte sur Josias  : cf. Jr 22.10. –  prescription  : le terme hébreu correspondant peut aussi être rendu par coutume (cf. Jg 11.39n).'
  - type: text
    content: Jérémie fit une complainte sur Josias ; tous les chanteurs et toutes les chanteuses ont parlé de Josias dans leurs complaintes, jusqu'à aujourd'hui ; on en a fait une prescription en Israël. Ces chants sont écrits dans les Complaintes.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  ce qu'il a fait avec fidélité 32.32n. –  conformément à ce qui est écrit (litt. comme il est écrit ) dans la loi Jos 23.6.
  - type: text
    content: 'Le reste de l''histoire de Josias, ce qu''il a fait avec fidélité, conformément à ce qui est écrit dans la loi du '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '27':
  - type: note
    content: 'le début et la fin  : cf. 9.29+. –  livre des rois d''Israël et de Juda  : cf. 16.11n.'
  - type: text
    content: le début et la fin de son histoire, cela est écrit dans le livre des rois d'Israël et de Juda.
  '3':
  - type: note
    content: 'lévites qui instruisaient  : cf. Né 8.1ss. –  consacrés  : voir saint.'
  - type: text
    content: 'Il dit aux lévites qui instruisaient tout Israël et qui étaient consacrés au '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Placez le coffre sacré dans la maison qu''a bâtie Salomon, fils de David, roi d''Israël ; vous n''avez plus à le porter sur l''épaule. Servez maintenant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, et Israël, son peuple ! '
  '4':
  - type: note
    content: 'écrit  : même terme en 1Ch 28.19 ; 2Ch 2.10 ; il est traduit par écriture en Est 1.22 ; 3.12 ; 8.9 ; par texte en Est 3.14 ; 4.8 ; 8.8,13 ; par titres (généalogiques) en Esd 2.62/ /. C''est un terme apparenté qui est rendu ici par protocole.'
  - type: text
    content: 'Faites des préparatifs, famille par famille, d''après vos classes, suivant l''écrit de David, roi d''Israël, et le protocole de Salomon, son fils. '
  '5':
  - type: note
    content: 'les gens du peuple  : litt. les fils du peuple, c.-à-d. les laïcs, de même aux v. 7,12s ; cf. Jr 17.19n  ; 26.23 ; voir aussi 2R 23.6.'
  - type: text
    content: 'Tenez-vous dans le sanctuaire, selon les divisions des familles de vos frères, les gens du peuple, et d''après la classification des familles des lévites. '
  '6':
  - type: note
    content: 'consacrez-vous  : cf. v. 4s ; certains modifient le texte hébreu traditionnel pour lire immolez la Pâque et les offrandes sacrées. –  préparez-la  : litt. préparez. –  en agissant  : autre traduction pour qu''ils agissent. –  celle qu''il a prononcée…  : litt. par la main de Moïse.'
  - type: text
    content: 'Immolez la Pâque, consacrez-vous et préparez-la pour vos frères en agissant selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celle qu''il a prononcée par l''intermédiaire de Moïse.'
  '7':
  - type: text
    content: 'Josias préleva pour les gens du peuple du petit bétail, moutons et chèvres, le tout pour la Pâque, pour tous ceux qui se trouvaient là, au nombre de trente mille, ainsi que trois mille têtes de gros bétail ; cela fut pris sur les biens du roi. '
  '8':
  - type: note
    content: 'offrande volontaire Lv 7.16 ; 22.18ss ; 23.38 ; voir sacrifices. –  animaux  : sous-entendu dans le texte, de même au v. 9. –  pour la Pâque  : litt. en pâques, de même au v. 9 ; cf. 30.17n.'
  - type: text
    content: 'Ses princes firent un prélèvement en vue d''une offrande volontaire pour le peuple, pour les prêtres et les lévites. Hilqiya, Zacharie et Yehiel, chefs dans la maison de Dieu, donnèrent aux prêtres deux mille six cents animaux pour la Pâque et trois cents têtes de gros bétail. '
  '9':
  - type: text
    content: Konania, Shemaya et Netanéel, ses frères, Hashabia, Yéiel et Yozabad, chefs des lévites, prélevèrent pour les lévites cinq mille animaux pour la Pâque et cinq cents têtes de gros bétail.
