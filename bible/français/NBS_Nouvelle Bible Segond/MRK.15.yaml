  - type: text
    text: Dès le matin, les grands prêtres tinrent conseil avec les anciens, les scribes et tout le sanhédrin. Après avoir lié Jésus, ils l'emmenèrent et le livrèrent à Pilate.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le roi des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 9,12,18,26,32 ; cf. Mt 2.2 ; Lc 23.1s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est toi qui le dis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Mt 26.25 ; Jn 18.34.'
    marker-yv: yv-n
  - type: text
    text: 'Pilate lui demanda : Es-tu le roi des Juifs, toi ? Il lui répond : C''est toi qui le dis. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.3 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Lc 23.3,5,14.
    marker-yv: yv-n
  - type: text
    text: 'Les grands prêtres portaient contre lui beaucoup d''accusations. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: text
    text: 'Pilate lui demandait encore : Tu ne réponds rien ? Vois tout ce dont ils t''accusent ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 14.60-61+.
    marker-yv: yv-n
  - type: text
    text: Mais Jésus ne répondit plus rien, ce qui étonna Pilate.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est condamné à mort
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 27.15-26  ; Lc 23.13-25  ; Jn 18.39–19.16
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fête
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: calendrier
      - type: text
        text: ' et fêtes.'
    marker-yv: yv-n
  - type: text
    text: 'A chaque fête, il leur relâchait un prisonnier, celui qu''ils réclamaient. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.7 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Mt 27.16
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: était en prison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: était lié.
    marker-yv: yv-n
  - type: text
    text: 'Un nommé Barabbas était en prison avec des émeutiers pour avoir, lors d''une émeute, commis un meurtre. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'La foule '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(cf. 12.37) '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'monta '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: au palais du procurateur (Mt 27.2
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '), situé sur une colline ; certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: la foule cria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qu'il agisse…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: comme il faisait pour eux.
    marker-yv: yv-n
  - type: text
    text: 'La foule monta et se mit à demander qu''il agisse envers eux comme il avait coutume de le faire. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le roi des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 2+.
    marker-yv: yv-n
  - type: text
    text: 'Pilate leur répondit : Voulez-vous que je vous relâche le roi des Juifs ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.10 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Jn 11.47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'grands '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prêtres
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.18'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Mt 2.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Car il savait que c''était par envie que les grands prêtres l''avaient livré. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Ac 3.13s ; 13.27s.
    marker-yv: yv-n
  - type: text
    text: 'Mais les grands prêtres soulevèrent la foule, pour qu''il leur relâche plutôt Barabbas. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Que voulez-vous donc que je fasse… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon certains mss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'que ferai-je donc… ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '–  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de celui que vous appelez…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: du roi des Juifs.
    marker-yv: yv-n
  - type: text
    text: 'Pilate reprit : Que voulez-vous donc que je fasse de celui que vous appelez le roi des Juifs ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.13 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 2.36.
    marker-yv: yv-n
  - type: text
    text: 'Ils se remirent à crier : Crucifie-le ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.14 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. Ac 3.13 ; 13.28.
    marker-yv: yv-n
  - type: text
    text: 'Pilate leur disait : Quel mal a-t-il donc fait ? Mais ils crièrent de plus belle : Crucifie-le !'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: après avoir fait flageller…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : dans l''usage romain, la flagellation précède la crucifixion, qui est la peine la plus cruelle et la plus infamante ; cf. Lc 23.16-22 ; Jn 19.1 ; Ac 5.40 ; 16.37 ; 22.19 ; 2Co 11.25.'
    marker-yv: yv-n
  - type: text
    text: 'Pilate décida de satisfaire la foule : il leur relâcha Barabbas ; et, après avoir fait flageller Jésus, il le livra pour qu''il soit crucifié.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Les soldats se moquent de Jésus
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 27.27-31  ; Jn 19.2-3
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.16 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Philon
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: In Flaccum
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', 36-38 (récit de la scène de dérision organisée à Alexandrie pour ridiculiser le « roi des '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Juifs
      - type: text
        text: '  » '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Hérode
      - type: text
        text: ' Agrippa) : « Il y avait un dénommé Carabas, atteint de folie, non pas de folie sauvage et bestiale… mais de folie bénigne et plus douce… Ils poussèrent ensemble ce malheureux jusqu''au gymnase, l''installèrent dans le haut, bien en vue de tout le monde. Ils aplanissent une feuille de papyrus qu''ils lui mettent sur la tête en guise de diadème. Ils lui couvrent le reste du corps d''une carpette en guise de chlamyde et, en guise de sceptre, l''un d''eux lui remet un petit bout de tige de papyrus du pays, qu''il avait aperçu, jeté au rebut, sur la route. Quand on lui eut remis, comme au théâtre dans les farces, les insignes de la royauté et qu''il fut attifé en roi, de jeunes garçons…, bâton sur l''épaule, lui firent la haie des deux côtés, en jouant les gardes du corps. Ensuite, d''autres s''avancèrent, qui pour le saluer, qui pour se faire rendre justice, qui pour lui présenter des requêtes d''intérêt public. » –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'palais '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '14.54'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la cohorte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: est, au sens strict, une unité d'environ 600 hommes en général ; ici il s'agit peut-être seulement des soldats présents dans le palais de Pilate ; cf. Ac 21.31
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les soldats l''amenèrent à l''intérieur du palais – le prétoire – et ils appellent toute la cohorte. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'pourpre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'et '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: couronne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', emblèmes de la royauté dont on affuble Jésus par dérision (v. 2+).'
    marker-yv: yv-n
  - type: text
    text: 'Ils l''habillent de pourpre et posent sur sa tête une couronne d''épines tressées. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Bonjour
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'réjouis-toi ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: C'est la salutation grecque courante ; cf. Mt 26.49
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Puis ils se mirent à le saluer : Bonjour, roi des Juifs ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '10.34+ ; cf. Mi 4.14. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se prosterner
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: culte
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils lui frappaient la tête avec un roseau, lui crachaient dessus et fléchissaient les genoux pour se prosterner devant lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'moqués de lui '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 31 ; Ps 22.8 ; 44.14 ; 52.8.
    marker-yv: yv-n
  - type: text
    text: Après s'être moqués de lui, ils lui ôtèrent la pourpre et lui remirent ses vêtements.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus est crucifié
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 27.32-44  ; Lc 23.26-43  ; Jn 19.16-24
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: text
    text: Puis ils l'emmènent pour le crucifier.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '15.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'porter sa croix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Mt 27.32
      - type: usfm
        marker: ord
        children:
