document_id: MRK.15,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus comparaît devant Pilate
  - type: heading
    content: Mt 27.1-2,11-14  ; Lc 23.1-5  ; Jn 18.28-38
  - type: text
    content: ' '
  - type: note
    content: 'grands prêtres (11.18 ; Mt 2.4n) / anciens / scribes  : cf. 8.31n. –  tinrent conseil  : certains mss portent préparèrent un conseil  ; cf. v. 3,11 ; Lc 22.66. –  Pilate Mt 27.2n.'
  - type: text
    content: Dès le matin, les grands prêtres tinrent conseil avec les anciens, les scribes et tout le sanhédrin. Après avoir lié Jésus, ils l'emmenèrent et le livrèrent à Pilate.
  '10':
  - type: note
    content: 'Cf. Jn 11.47. –  grands prêtres  : cf. 11.18n  ; Mt 2.4n.'
  - type: text
    content: 'Car il savait que c''était par envie que les grands prêtres l''avaient livré. '
  '11':
  - type: note
    content: Ac 3.13s ; 13.27s.
  - type: text
    content: 'Mais les grands prêtres soulevèrent la foule, pour qu''il leur relâche plutôt Barabbas. '
  '12':
  - type: note
    content: 'Que voulez-vous donc que je fasse… ou, selon certains mss, que ferai-je donc… ? –  de celui que vous appelez…  : certains mss portent du roi des Juifs.'
  - type: text
    content: 'Pilate reprit : Que voulez-vous donc que je fasse de celui que vous appelez le roi des Juifs ? '
  '13':
  - type: note
    content: Cf. Ac 2.36.
  - type: text
    content: 'Ils se remirent à crier : Crucifie-le ! '
  '14':
  - type: note
    content: Cf. Ac 3.13 ; 13.28.
  - type: text
    content: 'Pilate leur disait : Quel mal a-t-il donc fait ? Mais ils crièrent de plus belle : Crucifie-le !'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'après avoir fait flageller…  : dans l''usage romain, la flagellation précède la crucifixion, qui est la peine la plus cruelle et la plus infamante ; cf. Lc 23.16-22 ; Jn 19.1 ; Ac 5.40 ; 16.37 ; 22.19 ; 2Co 11.25.'
  - type: text
    content: 'Pilate décida de satisfaire la foule : il leur relâcha Barabbas ; et, après avoir fait flageller Jésus, il le livra pour qu''il soit crucifié.'
  - type: heading
    content: Les soldats se moquent de Jésus
  - type: heading
    content: Mt 27.27-31  ; Jn 19.2-3
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Philon, In Flaccum , 36-38 (récit de la scène de dérision organisée à Alexandrie pour ridiculiser le « roi des Juifs  » Hérode Agrippa) : « Il y avait un dénommé Carabas, atteint de folie, non pas de folie sauvage et bestiale… mais de folie bénigne et plus douce… Ils poussèrent ensemble ce malheureux jusqu''au gymnase, l''installèrent dans le haut, bien en vue de tout le monde. Ils aplanissent une feuille de papyrus qu''ils lui mettent sur la tête en guise de diadème. Ils lui couvrent le reste du corps d''une carpette en guise de chlamyde et, en guise de sceptre, l''un d''eux lui remet un petit bout de tige de papyrus du pays, qu''il avait aperçu, jeté au rebut, sur la route. Quand on lui eut remis, comme au théâtre dans les farces, les insignes de la royauté et qu''il fut attifé en roi, de jeunes garçons…, bâton sur l''épaule, lui firent la haie des deux côtés, en jouant les gardes du corps. Ensuite, d''autres s''avancèrent, qui pour le saluer, qui pour se faire rendre justice, qui pour lui présenter des requêtes d''intérêt public. » –  palais 14.54n. –  la cohorte est, au sens strict, une unité d''environ 600 hommes en général ; ici il s''agit peut-être seulement des soldats présents dans le palais de Pilate ; cf. Ac 21.31n.'
  - type: text
    content: 'Les soldats l''amenèrent à l''intérieur du palais – le prétoire – et ils appellent toute la cohorte. '
  '17':
  - type: note
    content: pourpre et couronne, emblèmes de la royauté dont on affuble Jésus par dérision (v. 2+).
  - type: text
    content: 'Ils l''habillent de pourpre et posent sur sa tête une couronne d''épines tressées. '
  '18':
  - type: note
    content: 'Bonjour  : litt. réjouis-toi ! C''est la salutation grecque courante ; cf. Mt 26.49n.'
  - type: text
    content: 'Puis ils se mirent à le saluer : Bonjour, roi des Juifs ! '
  '19':
  - type: note
    content: '10.34+ ; cf. Mi 4.14. –  se prosterner  : voir culte.'
  - type: text
    content: 'Ils lui frappaient la tête avec un roseau, lui crachaient dessus et fléchissaient les genoux pour se prosterner devant lui. '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'le roi des Juifs v. 9,12,18,26,32 ; cf. Mt 2.2 ; Lc 23.1s. –  C''est toi qui le dis  : cf. Mt 26.25 ; Jn 18.34.'
  - type: text
    content: 'Pilate lui demanda : Es-tu le roi des Juifs, toi ? Il lui répond : C''est toi qui le dis. '
  '20':
  - type: note
    content: moqués de lui v. 31 ; Ps 22.8 ; 44.14 ; 52.8.
  - type: text
    content: Après s'être moqués de lui, ils lui ôtèrent la pourpre et lui remirent ses vêtements.
  - type: heading
    content: Jésus est crucifié
  - type: heading
    content: Mt 27.32-44  ; Lc 23.26-43  ; Jn 19.16-24
  - type: text
    content: Puis ils l'emmènent pour le crucifier.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'porter sa croix Mt 27.32n  ; comparer avec Jn 19.17. –  ils réquisitionnent  : voir Mt 5.41n. –  qui vient (ou qui revient ) de la campagne ou des champs , c.-à-d. de l''extérieur de la ville ; cf. Hé 13.12. –  Simon de Cyrène Mt 27.32n. –  Rufus  : cf. Rm 16.13.'
  - type: text
    content: Pour porter sa croix, ils réquisitionnent un passant qui vient de la campagne, Simon de Cyrène, père d'Alexandre et de Rufus.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'ils conduisent Jésus  : litt. ils le conduisent . –  Golgotha (transcription de l''araméen) ou Lieu du Crâne (traduction en grec dans le texte ; le terme sera traduit en latin calvaria , ce qui a donné notre mot calvaire ), sans doute d''après la forme d''un rocher ; l''identification précise du lieu demeure incertaine.'
  - type: text
    content: 'Et ils conduisent Jésus au lieu dit Golgotha, ce qui se traduit « Lieu du Crâne ». '
  '23':
  - type: note
    content: 'Ils voulurent lui donner ou on voulut lui donner, litt. ils lui donnaient (ou on lui donnait) : cf. Pr 31.6 ; Mt 27.34n  ; d''après le Talmud de Babylone, les femmes de Jérusalem se chargeaient de faire boire aux condamnés du vin aromatisé avec de l''encens, pour leur faire perdre connaissance. –  myrrhe  : cf. Mt 2.11 ; Jn 19.39.'
  - type: text
    content: 'Ils voulurent lui donner du vin aromatisé de myrrhe, mais il n''en prit pas. '
  '24':
  - type: note
    content: Cf. Ps 22.19  ; Jn 19.24.
  - type: text
    content: 'Ils le crucifient et '
  - type: text
    content: se partagent ses vêtements en tirant au sort
  - type: text
    content: ' ce que chacun emporterait. '
  '25':
  - type: note
    content: la troisième heure, c.-à-d. entre 8 h et 9 h du matin ; selon certains, les précisions horaires de ce chapitre (aussi v. 33s) feraient correspondre les trois moments marquants de la crucifixion aux trois heures traditionnelles de la prière ; cf. Jn 19.14 ; Ac 3.1+.
  - type: text
    content: 'C''était la troisième heure quand ils le crucifièrent. '
  '26':
  - type: note
    content: Cf. 15.2+ ; Jn 19.19-22. –  Le roi des Juifs 15.2+.
  - type: text
    content: 'L''inscription indiquant le motif de sa condamnation portait ces mots :'
  - type: text
    content: « Le roi des Juifs. »
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'ils crucifient  : autre traduction on crucifie . –  bandits  : peut-être des partisans de la lutte armée contre Rome ; cf. v. 7 ; 11.17 ; 14.48 ; Jn 18.40n. –  l''un à sa droite…  : cf. 10.37-40.'
  - type: text
    content: 'Avec lui ils crucifient deux bandits, l''un à sa droite, l''autre à sa gauche. [ '
  '28':
  - type: note
    content: 'Certains mss ajoutent ici  : Ainsi fut accomplie l''Ecriture qui dit : Il a même été compté avec les sans-loi  ; cf. Es 53.12  ; Lc 22.37.'
  - type: text
    content: ']'
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'l''injuriaient ou le calomniaient  : le verbe est traduit par blasphémer en 2.7 ; le substantif apparenté est rendu tantôt par blasphème (3.28s), tantôt par calomnie (7.22). –  hochant la tête  : geste de dégoût ou de moquerie (v. 31) ; cf. Ps 22.8 ; 109.25 ; Jb 16.4 ; Lm 2.15 ; voir Jr 18.16n. –  toi qui détruis… 14.58+.'
  - type: text
    content: 'Les passants l''injuriaient en hochant la tête. Ils disaient : Hé ! toi qui détruis le sanctuaire et reconstruis en trois jours, '
  '3':
  - type: note
    content: Lc 23.3,5,14.
  - type: text
    content: 'Les grands prêtres portaient contre lui beaucoup d''accusations. '
  '30':
  - type: note
    content: Mt 27.43+.
  - type: text
    content: 'sauve-toi toi-même et descends de la croix ! '
  '31':
  - type: note
    content: 'grands prêtres (Mt 2.4n) / scribes  : cf. 8.31n.'
  - type: text
    content: 'Les grands prêtres aussi, avec les scribes, se moquaient entre eux et disaient : Il en a sauvé d''autres, et il ne peut pas se sauver lui-même ! '
  '32':
  - type: note
    content: 'le Christ ou le Messie  : 1.1n. –  roi d''Israël  : cf. v. 2+ ; So 3.15. –  Ceux qui étaient crucifiés…  : cf. Mt 27.44 ; comparer avec Lc 23.39-43.'
  - type: text
    content: Que le Christ, le roi d'Israël, descende maintenant de la croix, afin que nous voyions et que nous croyions ! Ceux qui étaient crucifiés avec lui l'insultaient aussi.
  - type: heading
    content: La mort de Jésus
  - type: heading
    content: Mt 27.45-56  ; Lc 23.44-49  ; Jn 19.28-30
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'A la sixième heure…  : entre 11 h du matin et 3 h de l''après-midi environ ; cf. v. 25n. –  ténèbres  : cf. Ex 10.22 ; Am 8.9s. –  sur toute la terre  : autre traduction dans tout le pays.'
  - type: text
    content: 'A la sixième heure, il y eut des ténèbres sur toute la terre, jusqu''à la neuvième heure. '
  '34':
  - type: note
    content: 'cria  : litt. cria d''une grande voix. –  Eloï… Ps 22.2, ici d''après l''araméen (cf. Mt 27.46).'
  - type: text
    content: 'A la neuvième heure, Jésus cria :'
  - type: text
    content: Eloï, Eloï, lema sabachthani ?
  - type: text
    content: 'ce qui se traduit : '
  - type: text
    content: Mon Dieu, mon Dieu, pourquoi m'as-tu abandonné ?
  - type: text
    content: ' '
  '35':
  - type: note
    content: 'Tiens  : litt. Voyez. –  Elie  : cf. 9.11+ss.'
  - type: text
    content: 'Quelques-uns de ceux qui étaient là l''entendirent ; ils disaient : Tiens, il appelle Elie. '
  '36':
  - type: note
    content: 'Cf. Ps 69.22. –  vin aigre ou vinaigre, voir Mt 27.48n. –  le descendre de là  : cf. v. 46.'
  - type: text
    content: 'Quelqu''un courut remplir de vin aigre une éponge et la fixa à un roseau pour lui donner à boire, en disant : Laissez, voyons si Elie va venir le descendre de là. '
  '37':
  - type: note
    content: 'laissa échapper Mt 27.50n. –  un grand cri  : litt. une grande voix  ; cf. v. 34n. –  expira  : le verbe ainsi traduit (également au v. 39) est apparenté au mot grec qui signifie souffle, vent et esprit, cf. Jn 7.39 ; 19.30.'
  - type: text
    content: Mais Jésus laissa échapper un grand cri et expira.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 11.16s ; 13.2 ; Ex 26.31-37 ; Hé 6.19s ; 9.3,6-12 ; 10.19s ; Testament de Lévi 10.3 : « Vous commettrez des iniquités en Israël, au point qu''Il ne supportera pas Jérusalem à cause de votre malice, mais le voile du Temple sera déchiré pour qu''il ne cache pas votre indécence. » Testament de Benjamin 9.3s : « Le rideau du Temple sera déchiré et l''Esprit de Dieu descendra sur les nations » (ajouts chrétiens à des textes juifs ?).'
  - type: text
    content: 'Le voile du sanctuaire se déchira en deux, d''en haut jusqu''en bas. '
  '39':
  - type: note
    content: 'expiré v. 37n. –  le centurion  : à la différence des autres auteurs du N.T. qui utilisent un terme grec formé sur le chiffre cent (p. ex. Mt 8.5 ; Ac 10.1), Marc emploie ici et dans la suite (v. 44s) une transcription grecque du terme latin ; la centurie est en fait une unité de 60 à 100 hommes. –  Fils de Dieu 1.1n  ; cf. Mt 14.33n.'
  - type: text
    content: 'Voyant qu''il avait expiré de la sorte, le centurion qui était là, en face de lui, dit : Cet homme était vraiment Fils de Dieu.'
  '4':
  - type: text
    content: 'Pilate lui demandait encore : Tu ne réponds rien ? Vois tout ce dont ils t''accusent ! '
  '40':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 27.56n  ; Jn 19.24-27. –  Marie, mère de Jacques… v. 47 ; 16.1 ; cf. 6.3.
  - type: text
    content: 'Il y avait aussi des femmes qui regardaient de loin. Parmi elles, Marie-Madeleine, Marie, mère de Jacques le Mineur et de José, et Salomé, '
  '41':
  - type: note
    content: 'le servaient  : cf. 1.13 ; Lc 8.2s ; 24.10. –  beaucoup d''autres  : autre traduction plusieurs autres.'
  - type: text
    content: qui le suivaient et le servaient lorsqu'il était en Galilée, et beaucoup d'autres qui étaient montées avec lui à Jérusalem.
  - type: heading
    content: Le corps de Jésus est mis au tombeau
  - type: heading
    content: Mt 27.57-61  ; Lc 23.50-55  ; Jn 19.38-42
  '42':
  - type: text
    content: ' '
  - type: note
    content: Cf. Dt 21.22s. – Voir aussi sabbat.
  - type: text
    content: 'Le soir était déjà là, et comme c''était le jour de la Préparation – la veille du sabbat – '
  '43':
  - type: note
    content: 'Mt 27.57n. –  du conseil  : sans doute le sanhédrin. –  qui attendait… Lc 23.50s ; cf. 2.38. –  demander le corps  : cf. 6.29 ; voir aussi Ac 13.29.'
  - type: text
    content: 'Joseph d''Arimathée, un membre honoré du conseil, qui attendait lui aussi le règne de Dieu, arriva. Il osa se rendre chez Pilate pour demander le corps de Jésus. '
  '44':
  - type: note
    content: Cf. v. 39n.
  - type: text
    content: 'Etonné qu''il soit déjà mort, Pilate fit appeler le centurion et lui demanda s''il était mort depuis longtemps. '
  '45':
  - type: text
    content: 'Renseigné par le centurion, il donna le corps à Joseph. '
  '46':
  - type: note
    content: 'un drap  : cf. 14.51s. –  descendit Jésus de la croix  : litt. le descendit  ; cf. v. 36. –  contre ou sur l''entrée (litt. la porte) du tombeau.'
  - type: text
    content: 'Celui-ci acheta un drap, descendit Jésus de la croix, l''enveloppa avec le drap et le mit dans un tombeau taillé dans le roc, puis il roula une pierre contre l''entrée du tombeau. '
  '47':
  - type: note
    content: 'Marie…  : litt. Marie, celle de José, cf. v. 40+.'
  - type: text
    content: Marie-Madeleine et Marie, mère de José, regardaient où on l'avait mis.
  '5':
  - type: note
    content: 14.60-61+.
  - type: text
    content: Mais Jésus ne répondit plus rien, ce qui étonna Pilate.
  - type: heading
    content: Jésus est condamné à mort
  - type: heading
    content: Mt 27.15-26  ; Lc 23.13-25  ; Jn 18.39–19.16
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'fête  : voir calendrier et fêtes.'
  - type: text
    content: 'A chaque fête, il leur relâchait un prisonnier, celui qu''ils réclamaient. '
  '7':
  - type: note
    content: 'Cf. Mt 27.16n. –  était en prison  : litt. était lié.'
  - type: text
    content: 'Un nommé Barabbas était en prison avec des émeutiers pour avoir, lors d''une émeute, commis un meurtre. '
  '8':
  - type: note
    content: 'La foule (cf. 12.37) monta au palais du procurateur (Mt 27.2n), situé sur une colline ; certains mss portent la foule cria. –  qu''il agisse…  : litt. comme il faisait pour eux.'
  - type: text
    content: 'La foule monta et se mit à demander qu''il agisse envers eux comme il avait coutume de le faire. '
  '9':
  - type: note
    content: le roi des Juifs v. 2+.
  - type: text
    content: 'Pilate leur répondit : Voulez-vous que je vous relâche le roi des Juifs ? '
