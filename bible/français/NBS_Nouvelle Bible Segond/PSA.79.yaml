      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.2ss : « (Antiochos IV envoya un représentant) pour profaner le temple de Jérusalem et le dédier à Zeus Olympien… Le temple était… rempli de débauches et d''orgies : des païens se divertissaient avec des courtisanes, avaient commerce avec des femmes dans les parvis sacrés et y apportaient des choses défendues. L''autel était couvert des victimes impures, interdites par les lois. » –  '
