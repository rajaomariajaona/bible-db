document_id: PSA.79,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Nous sommes bien affaiblis : secours-nous !'
  - type: text
    content: ' '
  - type: note
    content: 'D''Asaph 73.1+. –  les nations (ou les non-Juifs, les païens ) ont envahi… Lm 1.10. –  ton patrimoine 74.2. –  rendu impur ton temple sacré 74.3+ss ; 2R 25.9ss ; cf. Ap 11.2 ; voir pur  ; voir aussi 2 Maccabées 6.2ss : « (Antiochos IV envoya un représentant) pour profaner le temple de Jérusalem et le dédier à Zeus Olympien… Le temple était… rempli de débauches et d''orgies : des païens se divertissaient avec des courtisanes, avaient commerce avec des femmes dans les parvis sacrés et y apportaient des choses défendues. L''autel était couvert des victimes impures, interdites par les lois. » –  de Jérusalem…  : cf. Jr 9.11.'
  - type: text
    content: Psaume. D'Asaph.
  - type: text
    content: O Dieu, les nations ont envahi ton patrimoine,
  - type: text
    content: elles ont rendu impur ton temple sacré,
  - type: text
    content: elles ont fait de Jérusalem un monceau de pierres.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Où est leur Dieu 42.4+ ; 115.2 ; Jl 2.17. –  la vengeance (18.48+) du sang v. 3 ; cf. Nb 35.9ss ; Dt 32.43 ; Ap 6.10 ; 19.2.
  - type: text
    content: 'Pourquoi les nations diraient-elles :'
  - type: text
    content: Où est leur Dieu ?
  - type: text
    content: Qu'elle soit connue parmi les nations, sous nos yeux,
  - type: text
    content: la vengeance du sang de tes serviteurs, qui a été répandu !
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'parviennent jusque devant toi  : cf. 88.3 ; 102.2. –  préserve  : litt. fais rester  ; d''après Syr, certains modifient le texte hébreu traditionnel pour lire relâche . –  ceux qui sont en danger de mort  : litt. les fils de la mort  ; cf. 102.21.'
  - type: text
    content: Que les soupirs du prisonnier parviennent jusque devant toi !
  - type: text
    content: Par ton grand bras, préserve ceux qui sont en danger de mort !
  '12':
  - type: text
    content: ' '
  - type: note
    content: '89.51. –  directement  : litt. dans leur sein , c.-à-d. dans le pli du vêtement, là où l''on amasse ce qu''on va emporter, notamment le salaire (approximativement, donc  : dans leur poche, dans leur musette ) ; Es 65.6ns. –  sept fois  : cf. Gn 4.15,24 ; Lv 26.18,21,24 ; Siracide 40.8 : « Pour tout être de chair, de l''homme à la bête, mais pour les pécheurs sept fois plus : mort, sang, discorde, épée, calamités, famine, destruction, fléau. »'
  - type: text
    content: Rends directement à nos voisins
  - type: text
    content: les outrages qu'ils t'ont faits,
  - type: text
    content: rends-les-leur sept fois, Seigneur !
  '13':
  - type: text
    content: ' '
  - type: note
    content: peuple / troupeau 74.1+ ; 95.7 ; 100.3.
  - type: text
    content: Quant à nous, ton peuple, le troupeau que tu fais paître,
  - type: text
    content: nous te célébrerons toujours ;
  - type: text
    content: de génération en génération nous dirons ta louange.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Dt 28.26 ; Jr 7.33 ; 14.16 ; 19.7 ; 36.30 ; Ap 11.9 ; cf. 1 Maccabées 7.16s : « Il (l''apostat Alkime, nommé grand prêtre par Démétrios Ier, successeur d''Antiochos V sur le trône de Syrie) fit appréhender soixante d''entre eux (les hasidim ou fidèles ) et les fit périr en un seul jour, selon qu''il est écrit : La chair de tes saints et leur sang, ils ont répandu autour de Jérusalem, et il n''y avait personne pour les ensevelir. »'
  - type: text
    content: Elles ont livré les cadavres de tes serviteurs
  - type: text
    content: en pâture aux oiseaux du ciel,
  - type: text
    content: la chair de tes fidèles aux animaux de la terre ;
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'leur sang comme de l''eau  : cf. Dt 15.23 ; Ap 16.6.'
  - type: text
    content: elles ont répandu leur sang comme de l'eau
  - type: text
    content: aux alentours de Jérusalem,
  - type: text
    content: et il n'y avait personne pour les ensevelir.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 44.14+ ; 80.7 ; 89.42 ; Lm 2.15.
  - type: text
    content: Nous sommes exposés aux outrages de nos voisins,
  - type: text
    content: aux moqueries, aux railleries de ceux qui nous entourent.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 89.47 ; cf. 44.24ss ; 85.6. –  Jusqu'à quand 6.4+. –  sans cesse 74.1+.
  - type: text
    content: 'Jusqu''à quand, '
  - type: text
    content: Seigneur
  - type: text
    content: ', seras-tu sans cesse en colère,'
  - type: text
    content: jusqu'à quand ta passion jalouse s'embrasera-t-elle comme un feu ?
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 69.25 ; Jr 10.25 ; Za 1.15. –  qui ne te connaissent pas  : cf. 1Th 4.5. –  les royaumes Jr 1.15.'
  - type: text
    content: Répands ta fureur sur les nations
  - type: text
    content: qui ne te connaissent pas,
  - type: text
    content: et sur les royaumes
  - type: text
    content: qui n'invoquent pas ton nom !
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'on a dévoré  : autre traduction il a dévoré  ; plusieurs mss hébreux et des versions anciennes portent ils ont dévoré  ; cf. Es 1.7. –  Jacob 14.7+. –  dévasté  : litt. ils ont dévasté  ; même expression en Jr 10.25.'
  - type: text
    content: Car on a dévoré Jacob
  - type: text
    content: et dévasté son domaine.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Litt. ne rappelle pas pour nous les fautes premières , ce qui peut aussi signifier  : ne nous fais pas payer les fautes de nos ancêtres  ; cf. 25.7 ; Es 64.8. –  vite 31.3+. –  affaiblis 142.7.'
  - type: text
    content: Ne te souviens plus de nos fautes passées !
  - type: text
    content: Que ta compassion vienne vite au-devant de nous !
  - type: text
    content: Car nous sommes bien affaiblis.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 25.11+ ; 78.38 ; Jr 33.8s ; cf. Lc 18.13. –  fais l'expiation sur ou efface , 65.4n. –  à cause de ton nom 25.11 ; 31.4 ; 109.21.
  - type: text
    content: Secours-nous, Dieu de notre salut,
  - type: text
    content: pour la gloire de ton nom !
  - type: text
    content: Délivre-nous et fais l'expiation sur nos péchés,
  - type: text
    content: à cause de ton nom !
