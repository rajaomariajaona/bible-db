      text: Où est leur Dieu ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Qu'elle soit connue parmi les nations, sous nos yeux,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: la vengeance du sang de tes serviteurs, qui a été répandu !
