        marker: fq
        children:
        - type: text
          text: de Jérusalem…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Jr 9.11.'
      marker-yv: yv-n
    - type: text
      text: Psaume. D'Asaph.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: O Dieu, les nations ont envahi ton patrimoine,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont rendu impur ton temple sacré,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: elles ont fait de Jérusalem un monceau de pierres.
