document_id: GEN.39,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joseph chez Potiphar
  - type: text
    content: ' '
  - type: note
    content: '37.36n. –  amené  : litt. fait descendre , cf. 12.10n.'
  - type: text
    content: 'On avait amené Joseph en Egypte ; un Egyptien, Potiphar, haut fonctionnaire du pharaon, commandant des gardes, l''acheta aux Ismaélites qui l''y avaient amené. '
  '10':
  - type: text
    content: 'Elle avait beau parler jour après jour à Joseph, il ne l''écoutait pas ; il ne voulait pas coucher auprès d''elle pour s''unir à elle. '
  '11':
  - type: text
    content: 'Un beau jour, il entra dans la maison pour faire son travail. De tous les gens de la maison, personne n''était dans la maison ; '
  '12':
  - type: note
    content: V. 8 ; Pr 5.8.
  - type: text
    content: 'alors elle le saisit par son vêtement en disant : Couche avec moi ! Il abandonna son vêtement dans sa main et s''enfuit dehors. '
  '13':
  - type: text
    content: 'Lorsqu''elle vit qu''il avait abandonné son vêtement dans sa main et qu''il s''était enfui dehors, '
  '14':
  - type: note
    content: 'elle appela et j''ai crié traduisent deux formes d''un même verbe hébreu. –  il nous a amené  : sujet sous-entendu mon mari. –  un Hébreu  : litt. un homme hébreu, voir 10.21n. –  pour qu''il s''amuse de nous  : autre traduction pour se moquer de nous  ; v. 17 ; sur le verbe correspondant, cf. 21.9n  ; 26.8.'
  - type: text
    content: 'elle appela les gens de sa maison et leur dit : Regardez, il nous a amené un Hébreu pour qu''il s''amuse de nous. Il est venu vers moi pour coucher avec moi ; mais j''ai crié très fort. '
  '15':
  - type: text
    content: 'Quand il m''a entendue élever la voix et crier, il a abandonné son vêtement auprès de moi et il s''est enfui dehors. '
  '16':
  - type: text
    content: 'Elle posa le vêtement de Joseph auprès d''elle, jusqu''à ce que son maître rentre à la maison. '
  '17':
  - type: text
    content: 'Alors elle lui dit, de la même manière : L''esclave hébreu que tu nous as amené est venu vers moi pour s''amuser de moi. '
  '18':
  - type: note
    content: 'je me mettais à crier  : litt. j''ai élevé ma voix et j''ai crié, cf. v. 15.'
  - type: text
    content: 'Comme je me mettais à crier, il a abandonné son vêtement auprès de moi et il s''est enfui dehors. '
  '19':
  - type: note
    content: colère Pr 6.29ss.
  - type: text
    content: 'Après avoir entendu les paroles de sa femme, qui lui disait : « Voilà ce que m''a fait ton esclave ! », il se mit en colère. '
  '2':
  - type: note
    content: 'Dt 2.7. –  tout lui réussissait…  : litt. ce fut un homme de réussite.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut avec Joseph ; tout lui réussissait ; il était dans la maison de son maître, l''Egyptien. '
  '20':
  - type: note
    content: 'prison  : l''expression hébraïque beth (= maison de) hassohar n''apparaît que dans ce récit. Il vient d''une racine évoquant l''idée de rondeur et pourrait désigner une tour ou une sorte de puits (cf. 40.15n), à moins qu''il ne s''agisse d''un mot égyptien ou d''un nom propre. – Ps 105.18.'
  - type: text
    content: Le maître de Joseph le fit arrêter et mettre en prison, là où étaient enfermés les prisonniers du roi ; il resta là, en prison.
  - type: heading
    content: Joseph en prison
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 106.46. –  il lui accorda de la faveur  : litt. il étendit sur lui la fidélité (ou bienveillance, faveur ) ; on peut comprendre il lui témoigna sa fidélité, il lui accorda sa faveur , mais des formules analogues évoquent ailleurs la faveur d''autorités humaines, obtenue par l''action de Dieu (Esd 7.28 ; 9.9 ; voir aussi Est 2.9,17 ; Dn 1.9). –  donna de la grâce aux yeux du chef 6.8+.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut avec Joseph et il lui accorda de la faveur. Il lui donna de la grâce aux yeux du chef de la prison. '
  '22':
  - type: note
    content: 'passait par lui  : litt. c''était lui qui le faisait.'
  - type: text
    content: 'Le chef de la prison confia à Joseph tous les prisonniers qui étaient dans la prison, et tout ce qui s''y faisait passait par lui. '
  '23':
  - type: note
    content: 'Cf. v. 3-6 ; Ac 7.10 ; Sagesse 10.13s : « Elle (la Sagesse) n''abandonna pas non plus le juste qui fut vendu, mais elle l''arracha au péché ; elle descendit avec lui dans la fosse et ne l''abandonna pas dans ses liens avant de lui avoir procuré le sceptre de la royauté et l''autorité sur ceux qui étaient ses maîtres ; par là elle convainquit de mensonges ses calomniateurs et elle lui conféra une gloire éternelle. » –  ses entreprises  : litt. ce qu''il faisait.'
  - type: text
    content: 'Le chef de la prison ne regardait rien de ce dont Joseph s''occupait, parce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec lui ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' faisait réussir ses entreprises.'
  '3':
  - type: note
    content: 'V. 23 ; 26.3 ; cf. 1S 18.14 ; Ps 1.3. –  le faisait réussir  : litt. faisait réussir en (ou par) sa main.'
  - type: text
    content: 'Son maître vit que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec lui : tout ce qu''il entreprenait, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' le faisait réussir. '
  '4':
  - type: note
    content: 'trouva grâce… 6.8+. –  et il resta à son service  : autre traduction et il devint son auxiliaire  ; même verbe en 40.4 ; Ex 24.13 ; 33.11 ; Nb 3.6n (assister) ; 1R 1.4. –  intendant v. 5 ; 40.4n  ; 41.40 ; cf. 1R 4.6n  ; Est 2.9+ ; Dn 1.9+.'
  - type: text
    content: 'Joseph trouva grâce aux yeux de son maître et il resta à son service. Son maître le nomma intendant de sa maison et lui confia tout ce qui lui appartenait. '
  '5':
  - type: note
    content: 30.27. – Voir bénédiction.
  - type: text
    content: 'Dès qu''il l''eut nommé intendant de sa maison et de tout ce qui lui appartenait, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' bénit la maison de l''Egyptien, à cause de Joseph ; la bénédiction du '
  - type: text
    content: Seigneur
  - type: text
    content: ' était sur tout ce qui lui appartenait, à la maison comme aux champs. '
  '6':
  - type: note
    content: 'V. 4. –  avec lui…  : cf. v. 8. –  s''occupait… de  : litt. connaissait. –  de sa propre nourriture  : litt. du pain qu''il mangeait  ; cf. v. 9 ; 43.32 ; voir aussi Jg 14.14n  ; Pr 30.20n.'
  - type: text
    content: Il abandonna à Joseph tout ce qui lui appartenait ; avec lui, il ne s'occupait plus de rien, sinon de sa propre nourriture.
  - type: heading
    content: Joseph et la femme de son maître
  - type: text
    content: Or Joseph était d'une très grande beauté.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 1S 16.12.
  - type: text
    content: 'Après cela, la femme de son maître leva les yeux vers Joseph, en disant : Couche avec moi ! '
  '8':
  - type: note
    content: V. 12 ; Pr 5.3-7 ; 7.5-27 ; Ec 7.26 ; 1Co 6.9,13.
  - type: text
    content: 'Il refusa et dit à la femme de son maître : Avec moi, mon maître ne s''occupe plus de rien dans la maison, il m''a confié tout ce qui lui appartient ; '
  '9':
  - type: note
    content: personne de plus grand 41.40 ; 45.8. –  pécher ainsi contre Dieu 2S 12.13 ; Ps 51.6.
  - type: text
    content: 'il n''y a personne de plus grand que moi dans cette maison, et il ne m''a rien interdit, sauf toi, parce que tu es sa femme. Comment pourrais-je faire un aussi grand mal, et pécher ainsi contre Dieu ? '
