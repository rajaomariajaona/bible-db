    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '37.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: amené
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: fait descendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 12.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On avait amené Joseph en Egypte ; un Egyptien, Potiphar, haut fonctionnaire du pharaon, commandant des gardes, l''acheta aux Ismaélites qui l''y avaient amené. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: 'Elle avait beau parler jour après jour à Joseph, il ne l''écoutait pas ; il ne voulait pas coucher auprès d''elle pour s''unir à elle. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'Un beau jour, il entra dans la maison pour faire son travail. De tous les gens de la maison, personne n''était dans la maison ; '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 8 ; Pr 5.8.
      marker-yv: yv-n
    - type: text
      text: 'alors elle le saisit par son vêtement en disant : Couche avec moi ! Il abandonna son vêtement dans sa main et s''enfuit dehors. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: 'Lorsqu''elle vit qu''il avait abandonné son vêtement dans sa main et qu''il s''était enfui dehors, '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'elle appela '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'j''ai crié '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduisent deux formes d''un même verbe hébreu. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il nous a amené
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sujet sous-entendu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: mon mari
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un Hébreu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un homme hébreu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', voir 10.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour qu'il s'amuse de nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour se moquer de nous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; v. 17 ; sur le verbe correspondant, cf. 21.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 26.8.'
      marker-yv: yv-n
    - type: text
      text: 'elle appela les gens de sa maison et leur dit : Regardez, il nous a amené un Hébreu pour qu''il s''amuse de nous. Il est venu vers moi pour coucher avec moi ; mais j''ai crié très fort. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: 'Quand il m''a entendue élever la voix et crier, il a abandonné son vêtement auprès de moi et il s''est enfui dehors. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: text
      text: 'Elle posa le vêtement de Joseph auprès d''elle, jusqu''à ce que son maître rentre à la maison. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: 'Alors elle lui dit, de la même manière : L''esclave hébreu que tu nous as amené est venu vers moi pour s''amuser de moi. '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je me mettais à crier
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai élevé ma voix et j'ai crié
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 15.'
      marker-yv: yv-n
    - type: text
      text: 'Comme je me mettais à crier, il a abandonné son vêtement auprès de moi et il s''est enfui dehors. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'colère '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Pr 6.29ss.
      marker-yv: yv-n
    - type: text
      text: 'Après avoir entendu les paroles de sa femme, qui lui disait : « Voilà ce que m''a fait ton esclave ! », il se mit en colère. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 2.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tout lui réussissait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce fut un homme de réussite.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fut avec Joseph ; tout lui réussissait ; il était dans la maison de son maître, l''Egyptien. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: prison
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : l''expression hébraïque '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'beth '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(= '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maison de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'hassohar '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: n'apparaît que dans ce récit. Il vient d'une racine évoquant l'idée de rondeur et pourrait désigner une tour ou une sorte de puits (cf. 40.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ), à moins qu'il ne s'agisse d'un mot égyptien ou d'un nom propre. – Ps 105.18.
      marker-yv: yv-n
    - type: text
      text: Le maître de Joseph le fit arrêter et mettre en prison, là où étaient enfermés les prisonniers du roi ; il resta là, en prison.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joseph en prison
    marker-yv: yv-h
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.21 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 106.46. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il lui accorda de la faveur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il étendit sur lui la fidélité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bienveillance, faveur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; on peut comprendre '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il lui témoigna sa fidélité, il lui accorda sa faveur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais des formules analogues évoquent ailleurs la faveur d''autorités humaines, obtenue par l''action de Dieu (Esd 7.28 ; 9.9 ; voir aussi Est 2.9,17 ; Dn 1.9). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'donna de la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: ' aux yeux du chef '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.8+.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fut avec Joseph et il lui accorda de la faveur. Il lui donna de la grâce aux yeux du chef de la prison. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: passait par lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'était lui qui le faisait.
      marker-yv: yv-n
    - type: text
      text: 'Le chef de la prison confia à Joseph tous les prisonniers qui étaient dans la prison, et tout ce qui s''y faisait passait par lui. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.23 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 3-6 ; Ac 7.10 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Sagesse
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.13s : « Elle (la Sagesse) n''abandonna pas non plus le juste qui fut vendu, mais elle l''arracha au péché ; elle descendit avec lui dans la fosse et ne l''abandonna pas dans ses liens avant de lui avoir procuré le sceptre de la royauté et l''autorité sur ceux qui étaient ses maîtres ; par là elle convainquit de mensonges ses calomniateurs et elle lui conféra une gloire éternelle. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ses entreprises
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce qu'il faisait.
      marker-yv: yv-n
    - type: text
      text: 'Le chef de la prison ne regardait rien de ce dont Joseph s''occupait, parce que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était avec lui ; le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' faisait réussir ses entreprises.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 23 ; 26.3 ; cf. 1S 18.14 ; Ps 1.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le faisait réussir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'faisait réussir en '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sa main.
      marker-yv: yv-n
    - type: text
      text: 'Son maître vit que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était avec lui : tout ce qu''il entreprenait, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' le faisait réussir. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'trouva '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.8+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et il resta à son service
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et il devint son auxiliaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même verbe en 40.4 ; Ex 24.13 ; 33.11 ; Nb 3.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: assister
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; 1R 1.4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'intendant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 5 ; 40.4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 41.40 ; cf. 1R 4.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Est 2.9+ ; Dn 1.9+.'
      marker-yv: yv-n
    - type: text
      text: 'Joseph trouva grâce aux yeux de son maître et il resta à son service. Son maître le nomma intendant de sa maison et lui confia tout ce qui lui appartenait. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.27. – Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Dès qu''il l''eut nommé intendant de sa maison et de tout ce qui lui appartenait, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' bénit la maison de l''Egyptien, à cause de Joseph ; la bénédiction du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' était sur tout ce qui lui appartenait, à la maison comme aux champs. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '39.6 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 4. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec lui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'occupait… de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: connaissait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de sa propre nourriture
      - type: usfm
