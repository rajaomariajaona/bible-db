document_id: LEV.20,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les cultes condamnés
  - type: text
    content: ' '
  - type: note
    content: Ce chap. reprend les fautes décrites au chap. 18, en mentionnant les peines dont elles sont passibles.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'avec une femme mariée…  : litt. avec la femme d''un homme qui commet l''adultère avec la femme de son prochain (la répétition pourrait être due à une erreur de copie) ; 18.20+ ; cf. Dt 22.22n  ; Jn 8.1-11.'
  - type: text
    content: 'Si un homme commet l''adultère avec une femme mariée, s''il commet l''adultère avec la femme de son prochain, l''homme et la femme adultères seront mis à mort. '
  '11':
  - type: note
    content: 18.8+.
  - type: text
    content: 'Si un homme couche avec la femme de son père et expose ainsi la nudité de son père, ils seront tous deux mis à mort : leur sang sera sur eux. '
  '12':
  - type: note
    content: 18.15+.
  - type: text
    content: 'Si un homme couche avec sa belle-fille, tous deux seront mis à mort ; ils ont commis une perversion : leur sang sera sur eux. '
  '13':
  - type: note
    content: 'avec un autre homme  : litt. avec un mâle, 18.22+. –  ils ont commis…  : autre traduction ils ont commis une abomination, ils seront tous deux mis à mort.'
  - type: text
    content: 'Si un homme couche avec un autre homme comme on couche avec une femme, ils ont commis tous deux une abomination ; ils seront mis à mort : leur sang sera sur eux. '
  '14':
  - type: note
    content: 18.17+.
  - type: text
    content: 'Si un homme prend pour femmes une fille et sa mère, c''est une infamie : on les jettera au feu, lui et elles, afin que cette infamie ne se produise pas au milieu de vous. '
  '15':
  - type: note
    content: 18.23+.
  - type: text
    content: 'Si un homme a des rapports sexuels avec une bête, il sera mis à mort, et vous tuerez la bête. '
  '16':
  - type: text
    content: 'Si une femme s''approche d''une bête pour s''accoupler à elle, tu tueras la femme et la bête ; elles seront mises à mort : leur sang sera sur elles.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: '18.9+. –  ignominie  : voir Pr 14.34n.'
  - type: text
    content: 'Si un homme prend sa sœur, fille de son père ou fille de sa mère, s''il voit sa nudité et qu''elle voie la sienne, c''est une ignominie ; ils seront retranchés sous les yeux de leur peuple : il a exposé la nudité de sa sœur, il sera chargé de sa faute. '
  '18':
  - type: note
    content: 18.19+.
  - type: text
    content: 'Si un homme couche avec une femme qui a ses règles et expose sa nudité, s''il met à nu son flux et qu''elle expose le flux de son sang, tous deux seront retranchés du sein de leur peuple. '
  '19':
  - type: note
    content: '18.12ns. –  ceux qui agissent…  : litt. ils seront chargés de leur faute.'
  - type: text
    content: 'Tu n''exposeras pas la nudité de la sœur de ta mère, ni celle de la sœur de ton père, car c''est mettre à nu sa proche parente : ceux qui agissent de la sorte seront chargés de leur faute. '
  '2':
  - type: note
    content: 'immigrés 16.29+ ; cf. Ex 12.48n. –  Molek 18.21n. –  de ses enfants  : litt. de sa descendance, de même aux v. 3s ; cf. Gn 3.15n. –  le peuple du pays  : cf. 4.27 ; Gn 23.7n.'
  - type: text
    content: 'Tu diras aux Israélites : Quiconque, parmi les Israélites ou parmi les immigrés qui séjournent en Israël, livre au Molek un de ses enfants sera mis à mort : le peuple du pays le lapidera. '
  '20':
  - type: note
    content: '18.14. –  sa tante  : c.-à-d. la femme de son oncle  ; cf. Ex 6.20n.'
  - type: text
    content: 'Si un homme couche avec sa tante, il a exposé la nudité de son oncle ; ils seront chargés de leur péché : ils mourront sans enfants. '
  '21':
  - type: note
    content: '18.16+. –  souillure 12.2n  ; voir pur. –  sans enfants  : autre traduction stériles.'
  - type: text
    content: 'Si un homme prend la femme de son frère, c''est une souillure ; il a exposé la nudité de son frère : ils seront sans enfants.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 18.25+. –  prescriptions 18.3n.
  - type: text
    content: 'Vous observerez toutes mes prescriptions et toutes mes règles, vous les mettrez en pratique ; ainsi le pays où je vous amène pour que vous y habitiez ne vous vomira pas. '
  '23':
  - type: text
    content: 'Vous ne suivrez pas les prescriptions des nations que je vais chasser devant vous : c''est parce qu''elles ont commis toutes ces actions que je les ai prises en horreur. '
  '24':
  - type: note
    content: 'lait / miel Ex 3.8n. –  séparés  : cf. v. 25s ; 10.10n  ; Gn 1.4n.'
  - type: text
    content: 'Je vous ai dit : « C''est vous qui prendrez possession de leur terre ; je vous la donnerai moi-même en possession : c''est un pays ruisselant de lait et de miel. Je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu, c''est moi qui vous ai séparés des peuples. » '
  '25':
  - type: note
    content: 'Chap. 11. –  séparerez  : autre traduction distinguerez  ; cf. v. 24+. –  sur la terre ou sur le sol, cf. Gn 2.5n.'
  - type: text
    content: 'Vous séparerez les bêtes pures des impures, les oiseaux impurs des purs, afin de ne pas faire de vous-mêmes une horreur à cause de ces bêtes, de ces oiseaux et de toutes ces bestioles qui fourmillent sur la terre, de tout ce que j''ai séparé pour vous en le déclarant impur. '
  '26':
  - type: note
    content: 11.44+ ; cf. 19.2.
  - type: text
    content: 'Vous serez saints pour moi, car moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), je suis saint ; je vous ai séparés des peuples pour que vous m''apparteniez.'
  '27':
  - type: text
    content: ' '
  - type: note
    content: '19.31+ ; cf. 20.6. –  des pouvoirs…  : autre traduction un esprit…'
  - type: text
    content: 'Si un homme ou une femme ont des pouvoirs de spirite ou de médium, ils seront mis à mort ; on les lapidera : leur sang sera sur eux.'
  '3':
  - type: note
    content: 'retrancherai… 7.20n. –  rendant… mon sanctuaire impur  : cf. Ecrit de Damas (Qumrân) 12.1s : « Que nul ne couche avec une femme dans la ville du Sanctuaire, de peur de rendre impure la ville du Sanctuaire par leur souillure. » Voir pur. –  profanant mon nom sacré  : autres traductions mon saint nom, le nom de ma sainteté 18.21+.'
  - type: text
    content: 'Moi aussi, je me retournerai contre cet homme et je le retrancherai du sein de son peuple, parce qu''il a livré un de ses enfants au Molek, rendant ainsi mon sanctuaire impur et profanant mon nom sacré. '
  '4':
  - type: note
    content: 'ferme les yeux  : cf. 4.13n  ; 1S 12.3 ; Pr 28.27 ; voir aussi Es 1.15 ; Lm 3.56.'
  - type: text
    content: 'Si le peuple du pays ferme les yeux sur cet homme, qui livre un de ses enfants au Molek, s''il ne le met pas à mort, '
  '5':
  - type: note
    content: 'se prostituent 17.7n. –  avec  : litt. derrière. –  le Molek  : LXX a lu ici le pluriel et traduit par les princes.'
  - type: text
    content: je me tournerai, moi, contre cet homme et contre son clan, et je le retrancherai du sein de son peuple, lui et tous ceux qui se prostituent avec lui, en se prostituant avec le Molek.
  '6':
  - type: text
    content: ' '
  - type: note
    content: '19.31+. –  avec eux  : litt. derrière eux.'
  - type: text
    content: 'Si quelqu''un se tourne vers les spirites ou vers les médiums pour se prostituer avec eux, je me retournerai contre lui et je le retrancherai du sein de son peuple. '
  '7':
  - type: text
    content: 'Vous deviendrez saints, vous serez saints, car je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), votre Dieu.'
  - type: heading
    content: Relations sexuelles interdites
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'prescriptions  : voir loi. –  Seigneur (YHWH)  : voir noms divins. –  qui vous rends saints  : autre traduction qui vous consacre.'
  - type: text
    content: 'Vous observerez mes prescriptions et vous les mettrez en pratique. C''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui vous rends saints.'
  '9':
  - type: text
    content: ' '
  - type: note
    content: '19.3+ ; Mt 15.4/ /. –  maudira  : voir bénédiction, malédiction. –  son sang sera sur lui  : c.-à-d. c''est lui qui est responsable de sa propre perte , personne d''autre ne peut en être tenu pour coupable ; de même dans la suite ; cf. Jos 2.19 ; Ac 18.6.'
  - type: text
    content: 'Quiconque maudira son père ou sa mère sera mis à mort : il a maudit son père ou sa mère, son sang sera sur lui.'
