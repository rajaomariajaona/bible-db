  - type: text
    text: 'Vous séparerez les bêtes pures des impures, les oiseaux impurs des purs, afin de ne pas faire de vous-mêmes une horreur à cause de ces bêtes, de ces oiseaux et de toutes ces bestioles qui fourmillent sur la terre, de tout ce que j''ai séparé pour vous en le déclarant impur. '
