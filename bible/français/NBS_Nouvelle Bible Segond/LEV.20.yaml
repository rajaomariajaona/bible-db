        text: ils seront chargés de leur faute.
    marker-yv: yv-n
  - type: text
    text: 'Tu n''exposeras pas la nudité de la sœur de ta mère, ni celle de la sœur de ton père, car c''est mettre à nu sa proche parente : ceux qui agissent de la sorte seront chargés de leur faute. '
