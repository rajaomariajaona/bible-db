  - type: text
    text: 'Je vous ai dit : « C''est vous qui prendrez possession de leur terre ; je vous la donnerai moi-même en possession : c''est un pays ruisselant de lait et de miel. Je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), votre Dieu, c''est moi qui vous ai séparés des peuples. » '
