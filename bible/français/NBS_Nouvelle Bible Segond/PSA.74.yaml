document_id: PSA.74,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Appel à Dieu devant les ruines du temple
  - type: text
    content: ' '
  - type: note
    content: 'Poème 32.1n. –  D''Asaph 50.1+ ; 73.1+. –  Pourquoi (10.1 ; 22.2 etc.) … rejettes-tu (44.10+) sans cesse (ou définitivement  ; litt. tout le jour ) : cf. 77.8 ; 79.5 ; 89.39,47 ; voir aussi Za 7.1ss. –  fume  : cf. 80.5n. –  contre le troupeau…  : le terme s''applique au petit bétail (moutons et chèvres) ; cf. 23.1+ ; 78.52 ; 79.13 ; 80.2 ; 95.7+ ; 100.3 ; Jr 23.1ss ; voir aussi Dt 7.6 ; 32.8 ; Mi 7.14.'
  - type: text
    content: Poème. D'Asaph.
  - type: text
    content: Pourquoi, ô Dieu, rejettes-tu sans cesse ?
  - type: text
    content: Pourquoi ta colère fume-t-elle
  - type: text
    content: contre le troupeau que tu fais paître ?
  '10':
  - type: text
    content: ' '
  - type: note
    content: V. 18 ; cf. 10.3,13.
  - type: text
    content: Jusqu'à quand, ô Dieu, l'adversaire se répandra-t-il en outrages ?
  - type: text
    content: L'ennemi bafouera-t-il sans cesse ton nom ?
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'retires-tu ta main… Lm 2.3. –  Sors-la ! Extermine ! traduction conjecturale : avec une légère modification du texte hébreu traditionnel on pourrait aussi comprendre (pourquoi) la retenir contre ton sein (ou sur ta poitrine , cf. Ex 4.6ns) ; autre lecture traditionnelle au milieu de ton décret ( ?).'
  - type: text
    content: Pourquoi retires-tu ta main, ta main droite ?
  - type: text
    content: Sors-la ! Extermine !
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu est mon roi 5.3+ ; Es 33.22 ; 63.16. –  des victoires ou des délivrances  ; c''est le pluriel du mot souvent traduit par salut. –  dans le pays  : autre traduction au milieu de la terre.'
  - type: text
    content: Dieu est mon roi depuis le temps jadis,
  - type: text
    content: lui qui réalise des victoires dans le pays.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 77.17 ; 89.10s ; 93.3s ; 104.7 ; 107.29 ; 114.5. –  fendu  : autres traductions maîtrisé, effrayé, fait échec à  ; cf. Ex 14.21s. –  dragons ou monstres marins  ; 148.7 ; Gn 1.21n  ; cf. Es 51.9n  ; voir aussi Jb 9.13n  ; 26.12n.'
  - type: text
    content: C'est toi qui as fendu la mer par ta puissance,
  - type: text
    content: tu as brisé les têtes des dragons sur les eaux ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Léviathan 104.26n  ; Es 27.1 ; Jb 3.8n  ; 40.25. –  habitants du désert  : le terme hébreu désigne habituellement des animaux ou des démons (72.9n  ; cf. Es 13.21n) ; leur rapport au peuple a été diversement compris par les versions anciennes.'
  - type: text
    content: c'est toi qui as écrasé les têtes de Léviathan.
  - type: text
    content: Tu l'as donné en pâture
  - type: text
    content: à un peuple, aux habitants du désert.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 66.6 ; 114.5 ; Ex 17.1-7 ; Nb 20.2-13 ; Jos 3.7-17. –  torrent ou oued  ; cf. 83.10 ; Gn 26.17n  ; Jb 6.15n.
  - type: text
    content: C'est toi qui as fait jaillir source et torrent.
  - type: text
    content: C'est toi qui as mis à sec des fleuves intarissables.
  '16':
  - type: text
    content: ' '
  - type: note
    content: '104.19. –  la lune  : litt. le luminaire  ; cf. 90.8n  ; autre traduction le luminaire, le soleil  ; cf. Gn 1.14nss.'
  - type: text
    content: A toi appartient le jour, à toi aussi appartient la nuit ;
  - type: text
    content: c'est toi qui as installé la lune et le soleil.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'limites  : autre traduction frontières  ; Ac 17.26. –  L''été et l''hiver Gn 8.22.'
  - type: text
    content: C'est toi qui as fixé toutes les limites de la terre.
  - type: text
    content: L'été et l'hiver, c'est toi qui les as façonnés.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Souviens-toi de ceci  : autre traduction pense à ceci. –  c''est le Seigneur que l''ennemi outrage v. 10,22 ; 79.12. –  fou 14.1.'
  - type: text
    content: 'Souviens-toi de ceci : c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' que l''ennemi outrage,'
  - type: text
    content: un peuple fou bafoue ton nom !
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'ta tourterelle  : litt. l''âme (ou la vie  ; cf. 6.4n) de ta tourterelle  ; LXX et Syr ont lu l''âme qui te rend grâce. –  aux animaux  : traduction conjecturale du terme qui est traduit plus loin par vie  ; certains modifient le texte hébreu traditionnel pour lire à la destruction ou à la mort.'
  - type: text
    content: Ne livre pas ta tourterelle aux animaux,
  - type: text
    content: n'oublie pas sans cesse la vie de tes pauvres !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Souviens-toi 119.49 ; 132.2 ; Ex 32.13 ; Ha 3.2 ; Lm 5.1. –  ta communauté 22.17n  ; Ex 12.3n  ; cf. Hé 12.22. –  acquise  : autres traductions achetée ; produite  ; cf. Gn 4.1n  ; Ex 15.16n  ; voir aussi Ac 20.28. –  tu as assuré sa rédemption ou tu l''as délivrée  ; cf. 19.15+. –  ta tribu…  : litt. la tribu de ton patrimoine  ; autre traduction la tribu qui constitue ton patrimoine  ; 28.9 ; 33.12 ; Dt 32.9 ; 1R 8.53 ; Jr 10.16 ; 51.19. –  du mont Sion… 68.17 ; cf. Ex 15.16s.'
  - type: text
    content: Souviens-toi de ta communauté !
  - type: text
    content: Au temps jadis tu l'as acquise, tu as assuré sa rédemption,
  - type: text
    content: elle est ta tribu, ton patrimoine !
  - type: text
    content: Souviens-toi du mont Sion, où tu as fait ta demeure !
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Considère  : litt. regarde. – Voir alliance. –  les lieux sombres…  : traduction incertaine ; Ez 8.12ss. –  repaires  : litt. pâturages , même mot hébreu en Ps 23.2.'
  - type: text
    content: Considère l'alliance !
  - type: text
    content: Car les lieux sombres du pays
  - type: text
    content: sont pleins de repaires de violence.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'écrasé  : cf. 9.10. –  confus 4.3+. –  pauvre / déshérité 12.6+.'
  - type: text
    content: Que celui qui est écrasé ne s'en retourne pas confus !
  - type: text
    content: Que le pauvre et le déshérité louent ton nom !
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'Lève-toi 3.8+. –  Souviens-toi…  : autre traduction pense aux outrages (ou au déshonneur , v. 18+).'
  - type: text
    content: Lève-toi, ô Dieu, défends ta cause !
  - type: text
    content: Souviens-toi des outrages
  - type: text
    content: que le fou te fait sans cesse !
  '23':
  - type: text
    content: N'oublie pas les cris de tes adversaires,
  - type: text
    content: le vacarme qui s'élève de ceux qui se dressent contre toi !
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Porte  : litt. élève . –  tes pas  : LXX tes mains  ; Syr ton action  ; cf. 77.13 ; voir aussi Es 6.1s ; Mi 1.3. –  L''ennemi a tout saccagé… 79.1 ; 2R 25.8ss ; Es 63.18 ; Jr 51.51. –  sanctuaire 20.3 ; 60.8n  ; 150.1 ; 1R 8.8 ; Ml 3.1.'
  - type: text
    content: Porte tes pas vers ces ruines éternelles !
  - type: text
    content: L'ennemi a tout saccagé dans le sanctuaire.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'rugi  : cf. Lm 2.7 ; Ha 2.20. –  dans le lieu même où l''on te rencontrait  : litt. au sein de ta rencontre , même terme au v. 8 ; on le retrouve ailleurs dans l''expression tente de la Rencontre  ; quand il désigne une fête, il est parfois traduit par rencontre festive  ; il s''agit sans doute ici du temple  ; cf. Gn 1.14n  ; Ex 13.10n  ; 27.21+ ; Lv 23.2n  ; Lm 2.6n  ; certains mss ont ici le pluriel, comme au v. 8n. –  signes et enseignes traduisent un même mot hébreu (également au v. 9) ; cf. les bannières en Nb 2.2ss ; voir aussi Dn 11.31.'
  - type: text
    content: Tes adversaires ont rugi dans le lieu même où l'on te rencontrait ;
  - type: text
    content: ils y ont placé pour signes leurs enseignes.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 5s sont obscurs et leur traduction est conjecturale ; le texte semble comparer les ennemis qui saccagent le temple à des bûcherons ; cf. Jr 46.22. –  On les a reconnus  : LXX rattache le verbe au v. 4 ( et ils n''ont pas connu ) ; certains modifient le texte hébreu traditionnel pour lire ils abattent. –  la hache  : le terme hébreu correspondant est au pluriel.'
  - type: text
    content: On les a reconnus, pareils à celui qui lève
  - type: text
    content: la hache sur des arbres touffus ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'les sculptures  : LXX les portes  ; cf. Lm 2.9.'
  - type: text
    content: et maintenant ils ont brisé toutes les sculptures
  - type: text
    content: à coups de haches et de marteaux.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'feu 2R 25.9ss ; Es 64.10 ; Jr 52.13 ; 2Ch 36.19 ; 1 Maccabées 4.38 : « Ils virent le sanctuaire déserté, l''autel profané, les portes consumées ; dans les parvis, la végétation avait poussé comme dans un bois ou sur une montagne, et les salles étaient détruites. » –  ton sanctuaire  : certains mss portent tes sanctuaires  ; cf. 73.17+. –  profané  : cf. 79.1. – Voir nom.'
  - type: text
    content: Ils ont mis le feu à ton sanctuaire ;
  - type: text
    content: ils ont profané à terre la demeure de ton nom.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Ils se disaient  : litt. ils ont dit dans leur cœur. –  Exterminons-les  : traduction conjecturale ; litt. leur progéniture ensemble  ; certains modifient le texte hébreu traditionnel, en s''inspirant de LXX, pour lire cette engeance s''est concertée pour dire : Brûlons…  ; ou encore ils se disaient : Détruisons leur domaine (Ex 15.13 ; 2S 15.25 ; Jr 25.30) , brûlons… –  dans le pays ou sur la terre. –  tout lieu…  : litt. toutes les rencontres de Dieu (hébreu ’El , Gn 21.33n) ; voir v. 4n.'
  - type: text
    content: 'Ils se disaient : Exterminons-les !'
  - type: text
    content: Ils ont brûlé dans le pays tout lieu où l'on rencontrait Dieu.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'signes v. 4n  ; cf. Jg 6.17 ; Es 7.11,14. –  plus de prophète  : cf. 77.9 ; 1S 3.1 ; Ez 7.26 ; Lm 2.9 ; 1 Maccabées 9.27 : « Ce fut en Israël une oppression comme il n''y en avait pas eu depuis la fin des temps des prophètes. » –  jusqu''à quand 6.4+.'
  - type: text
    content: Nous ne voyons plus nos signes ;
  - type: text
    content: il n'y a plus de prophète,
  - type: text
    content: et personne parmi nous qui sache jusqu'à quand…
