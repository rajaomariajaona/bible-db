          text: '6.14s : « Pour châtier les autres nations, le souverain Maître attend en effet avec longanimité qu''elles arrivent à combler la mesure de leurs iniquités ; mais ce n''est pas ainsi qu''il a jugé juste d''agir avec nous, afin qu''il n''ait pas à nous punir à la dernière extrémité, à un moment où nos péchés auraient atteint leur terme. » –  '
