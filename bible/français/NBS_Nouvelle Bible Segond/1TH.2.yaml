    - type: text
      text: 'C''est pourquoi, nous aussi, nous rendons continuellement grâce à Dieu de ce qu''en recevant la parole de Dieu que nous vous avons fait entendre, vous l''avez accueillie, non pas comme une parole humaine, mais comme ce qu''elle est vraiment : une parole de Dieu, qui est aussi à l''œuvre en vous qui croyez.'
