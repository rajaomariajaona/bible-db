document_id: 1TH.2,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'vous le savez vous-mêmes ou vous le savez bien , 1.5+. –  frères  : autre traduction frères et sœurs  ; l''expression désigne souvent l''ensemble des chrétiens, hommes et femmes ; cf. v. 17 ; 4.1,13 ; 5.1,12,14. –  l''accueil… 1.9n. –  inutile ou sans résultat  ; cf. 3.5 ; 1Co 15.10n,58 ; 2Co 6.1 ; Ga 2.2 ; Ph 2.16.'
  - type: text
    content: 'En effet, vous le savez vous-mêmes, frères, l''accueil que nous avons trouvé chez vous n''a pas été inutile. '
  '10':
  - type: note
    content: 'témoins  : cf. v. 5. –  sainte / juste  : voir Ep 4.24n. –  envers vous  : autre traduction parmi vous. –  qui croyez ou qui avez foi, cf. v. 13 ; 1.7.'
  - type: text
    content: 'Vous êtes témoins, et Dieu aussi, que nous nous sommes comportés d''une manière sainte, juste et irréprochable envers vous qui croyez. '
  '11':
  - type: note
    content: 'nous avons été…  : le verbe est sous-entendu dans le texte grec ; on pourrait aussi traduire nous avons élevé chacun de vous comme un père élève ses enfants  ; cf. 1Co 4.14ss ; 2Co 6.11-13 ; Ga 4.19s ; voir aussi Ac 20.31.'
  - type: text
    content: 'Vous savez aussi que nous avons été pour chacun de vous ce qu''un père est pour ses enfants ; '
  '12':
  - type: note
    content: 'Cf. 2Th 1.5. –  encouragés (ou exhortés, v. 3n) / réconfortés  : cf. 5.14 ; 1Co 14.3 ; Ph 2.1. –  vous comporter  : litt. marcher, cf. 4.1,12n  ; Rm 13.13 ; Ga 5.16 ; 2Th 3.6,11. –  d''une manière digne Ep 4.1 ; Ph 1.27 ; Col 1.10. –  qui vous appelle 4.7 ; 5.24 ; 1Co 1.9 ; Ga 1.6 ; 5.8 ; 2Th 2.14. –  royaume 1Co 6.9s ; 15.24,50 ; Ga 5.21. –  sa gloire Rm 8.18ss ; 1Co 15.42ss ; Ph 3.20s ; 1P 5.10.'
  - type: text
    content: nous vous avons encouragés, réconfortés, adjurés de vous comporter d'une manière digne de Dieu qui vous appelle à son royaume et à sa gloire.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'nous rendons…  : cf. 1.2+,8s ; 2Th 2.13. –  recevant  : même verbe 4.1n  ; 1Co 15.3 ; Ga 1.12 ; Col 2.6 ; 2Th 3.6 ; Hé 4.2 ; voir aussi Mc 4.16 ; Ac 8.14+. –  fait entendre  : cf. Rm 10.16s ; Ga 3.2,5. –  non… une parole humaine (litt. d''humains ) Ga 1.11s. –  une parole de Dieu, qui est aussi à l''œuvre  : cf. 1.5s ; Hé 4.12 ; voir aussi Ph 2.13. –  en vous  : autre traduction parmi vous.'
  - type: text
    content: 'C''est pourquoi, nous aussi, nous rendons continuellement grâce à Dieu de ce qu''en recevant la parole de Dieu que nous vous avons fait entendre, vous l''avez accueillie, non pas comme une parole humaine, mais comme ce qu''elle est vraiment : une parole de Dieu, qui est aussi à l''œuvre en vous qui croyez.'
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'imité 1.6+. –  les Eglises…  : litt. les Eglises de Dieu qui sont en Judée en Christ Jésus  ; cf. 1.1 ; 1Co 10.32 ; 11.16,22 ; 2Co 1.1 ; voir Ga 1.22. –  de vos propres compatriotes  : cf. Ac 17.5-13. –  de la part des Juifs  : cf. Ga 1.22 ; 6.12s ; on pourrait aussi traduire des Judéens  ; le terme grec est directement dérivé du mot traduit par Judée , cf. Jr 32.12n. Ce passage (v. 14-16) ne doit évidemment pas être pris dans un sens antisémite : son auteur est juif, de même que les chrétiens persécutés de Judée auxquels il se réfère. Ces lignes reflètent, comme beaucoup d''autres textes du N.T., le conflit qui oppose les premiers chrétiens, juifs ou non, à certaines tendances au moins du judaïsme, notamment en Judée.'
  - type: text
    content: 'En effet, frères, vous avez vous-mêmes imité les Eglises de Dieu en Jésus-Christ qui sont en Judée : vous avez souffert de la part de vos propres compatriotes ce qu''elles ont souffert de la part des Juifs. '
  '15':
  - type: note
    content: 'Cf. Mt 23.31ss ; Rm 9–11 ; voir aussi Ap 2.9 ; 3.9. –  tué… Jésus  : cf. Mc 10.33s/ / ; Jn 5.18 ; 7.1 ; 8.59 ; 11.45ss ; 18.14,31 ; Ac 2.23,36 ; 3.13. –  les prophètes 2Ch 36.15s ; Mt 23.29-37/ / ; Lc 11.47ss ; 13.34 ; Ac 7.52 ; Rm 11.3. –  nous ont persécutés  : autre sens possible nous ont chassés  : cf. Ac 17.5ss ; 2Co 11.24ss ; Ga 5.11.'
  - type: text
    content: 'Ce sont eux qui ont tué le Seigneur Jésus et les prophètes, ce sont eux qui nous ont persécutés ; ils ne plaisent pas à Dieu et ils sont hostiles à tous les humains ; '
  '16':
  - type: note
    content: 'Cf. Ac 13.45ss ; 14.2,19 ; 17.5ss,13 ; 18.12 ; Rm 11.28,32. –  aux non-Juifs ou aux (autres) nations, cf. 4.5 ; Mt 4.15n  ; Ac 10.45n. –  pour qu''ils soient sauvés 1Co 10.33. –  mettre le comble à leurs péchés  : cf. Gn 15.16 ; Dn 8.23 ; Mt 23.32s ; 2 Maccabées 6.14s : « Pour châtier les autres nations, le souverain Maître attend en effet avec longanimité qu''elles arrivent à combler la mesure de leurs iniquités ; mais ce n''est pas ainsi qu''il a jugé juste d''agir avec nous, afin qu''il n''ait pas à nous punir à la dernière extrémité, à un moment où nos péchés auraient atteint leur terme. » –  la colère  : certains mss précisent de Dieu  ; cf. 1.10+ ; 5.9. –  a fini par les atteindre  : litt. les a atteints (même verbe Mt 12.28/ /, parvenir jusqu''à), à la fin (cf. 1Co 1.8 ; 2Co 1.13) ; autres sens possibles, quoique moins probables  : jusqu''à la fin, définitivement, pour toujours  ; cf. Testament de Lévi 6.11 : « Mais la colère de Dieu les a frappés (les habitants de Sichem, cf. Gn 34) à jamais. »'
  - type: text
    content: ils nous empêchent de parler aux non-Juifs pour qu'ils soient sauvés, et ils ne cessent ainsi de mettre le comble à leurs péchés. Mais la colère a fini par les atteindre.
  - type: heading
    content: Paul désire revoir les Thessaloniciens
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'frères v. 1+. –  séparés  : litt. rendus orphelins ou privés d''enfants  ; cf. v. 6s,11s. –  loin des yeux…  : litt. de face et non de cœur  ; cf. 1Co 5.3 ; 2Co 5.12n  ; Col 2.5. –  vous revoir  : litt. voir votre face 3.10 ; Rm 1.11+. –  désir  : cf. Ph 1.23n.'
  - type: text
    content: 'Quant à nous, frères, séparés de vous pour un temps, – loin des yeux mais non pas du cœur – nous avons cherché avec d''autant plus d''empressement à vous revoir, car nous en avions un vif désir. '
  '18':
  - type: note
    content: 'Plus d''une fois  : litt. et une fois et deux fois, même expression en Ph 4.16. –  moi, Paul  : cf. 1.1n. –  le Satan (voir démon, diable, Satan) : cf. 3.5 ; Rm 16.20 ; 1Co 7.5 ; 2Co 2.11 ; 11.13ss ; 12.7 ; 2Th 2.8ss ; voir aussi Za 3.1s ; Jb 1.6ss ; 1Ch 21.1. –  empêchés  : cf. Rm 15.22+.'
  - type: text
    content: 'Plus d''une fois nous avons voulu venir vous voir, en tout cas moi, Paul, mais le Satan nous en a empêchés. '
  '19':
  - type: note
    content: 'Cf. 1Co 9.2. –  joie (1.6 ; 3.9) / couronne (Ap 2.11+) Ph 4.1. –  de fierté  : cf. Pr 16.31 ; 2Co 1.14+ ; 8.24 ; Ph 2.16 ; 2Th 1.4. –  son avènement 3.13 ; 4.15 ; 5.23 ; 1Co 15.23ss ; 2Th 2.1,8 ; voir Mt 24.3nss ; Jc 5.7+.'
  - type: text
    content: 'Qui donc est en effet notre espérance, notre joie, notre couronne de fierté ? N''est-ce pas vous aussi, devant notre Seigneur Jésus, à son avènement ? '
  '2':
  - type: note
    content: 'maltraités (ou insultés, outragés  ; cf. 2Co 12.10 ; 1Tm 1.13n) à Philippes Ac 16.19ss ; cf. 2Co 11.23ss ; Ph 1.30. –  en notre Dieu ou grâce à notre Dieu. –  l''assurance ou la hardiesse, le courage Ac 2.29n  ; 2Co 3.12+. –  la bonne nouvelle (1.5n) de Dieu v. 8s ; Mc 1.14 ; Rm 1.1 ; 15.16, 2Co 11.7 ; 1P 4.17. –  combats  : cf. v. 13ss ; 1.6 ; Ac 17.1-9 ; Col 1.29+.'
  - type: text
    content: 'Après avoir souffert et avoir été maltraités à Philippes, comme vous le savez, nous avons puisé en notre Dieu l''assurance nécessaire pour vous dire la bonne nouvelle de Dieu au milieu de bien des combats. '
  '20':
  - type: note
    content: Voir gloire.
  - type: text
    content: Oui, c'est vous qui êtes notre gloire et notre joie.
  '3':
  - type: note
    content: 'Cf. 2Co 2.17 ; 4.2. –  encouragements ou exhortations  ; le terme correspondant peut aussi avoir le sens de consolation ou de supplication (cf. v. 12+ ; 3.2,7 ; 4.18n  ; 5.11n,14) ; un verbe apparenté est traduit par encourager en 2Co 5.20 ; 6.1 ; voir aussi Rm 12.8n. –  égarement  : autres traductions erreur, imposture  ; cf. 2Co 6.8n. –  impureté  : voir pur, impur. –  ruse 2Co 12.16.'
  - type: text
    content: 'Nos encouragements ne relevaient ni de l''égarement, ni de l''impureté, ni de la ruse ; '
  '4':
  - type: note
    content: 'éprouvés et approuvés  : ces deux verbes traduisent un seul verbe grec, qui revient à la fin du v. dans la formule Dieu qui éprouve les cœurs (Jr 11.20 ; 12.3 ; 17.10 ; Ps 7.10 ; 17.3 ; cf. Rm 8.27) ; en 1Th 5.21 il est traduit par examiner  ; voir Rm 1.28n. –  nous confier la bonne nouvelle v. 2+ ; Ga 2.7 ; cf. 1.16 ; 1Tm 1.11+. –  non pas pour plaire (une seule fois dans le texte) à des humains ou aux hommes Ga 1.10 ; cf. 2Co 5.9 ; comparer avec 1Co 9.19ss.'
  - type: text
    content: mais comme c'est Dieu qui nous a éprouvés et approuvés pour nous confier la bonne nouvelle, nous parlons, non pas pour plaire à des humains, mais pour plaire à Dieu qui éprouve les cœurs.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'vous le savez v. 1+. –  avidité Rm 1.29 ; Col 3.5 ; 2P 2.3 ; cf. Ac 20.33. –  mobile  : le même mot est traduit par apparence en Mc 12.40n/ /. –  Dieu en est témoin v. 10 ; Rm 1.9 ; Ph 1.8 ; voir aussi Ps 89.38 ; Jb 16.19'
  - type: text
    content: 'Jamais, en effet, vous le savez, nous n''avons usé de paroles flatteuses ; jamais nous n''avons eu l''avidité pour mobile, Dieu en est témoin. '
  '6':
  - type: note
    content: 'Nous n''avons pas cherché la gloire…  : autre traduction nous n''avons pas exigé d''honneur de la part des humains  ; cf. v. 4 ; Jn 5.41,44.'
  - type: text
    content: 'Nous n''avons pas cherché la gloire qui vient des humains, ni auprès de vous ni auprès des autres ; '
  '7':
  - type: note
    content: 'apôtres  : autre traduction envoyés  ; cf. 1.1 ; 1Co 9.1 ; 15.3-10 ; voir aussi Ac 14.4,14. –  nous imposer  : d''autres comprennent vous être à charge, cf. v. 9 ; 1Co 9.3ss,12 ; 2Co 11.9. –  nous nous sommes faits tout petits  : litt. nous sommes devenus des tout-petits  ; même terme en Rm 2.20 ; 1Co 3.1 ; 13.11 ; Ga 4.1,3 ; certains mss portent nous avons été pleins de douceur au milieu de vous. –  comme une mère…  : autre traduction comme une nourrice prend soin (cf. Ep 5.29) de ses propres enfants  ; la comparaison pourrait aussi se rapporter à ce qui précède ; voir aussi 1Co 3.2 ; Ga 4.19.'
  - type: text
    content: 'et pourtant, comme apôtres du Christ, nous aurions pu nous imposer. Mais nous nous sommes faits tout petits au milieu de vous ; comme une mère prend soin des enfants qu''elle nourrit, '
  '8':
  - type: note
    content: 'la bonne nouvelle de Dieu v. 2n. –  notre propre vie  : autre traduction notre propre âme, cf. Jn 15.13. –  chers  : litt. aimés, c.-à-d. bien-aimés.'
  - type: text
    content: nous aurions voulu, dans notre tendresse pour vous, vous donner non seulement la bonne nouvelle de Dieu, mais encore notre propre vie, tant vous nous étiez devenus chers.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Vous vous rappelez  : autre traduction rappelez-vous  ; cf. 1.4-5+. –  travail (1.3+) / peine 2Co 11.27 ; 2Th 3.8. Sur le travail en général, cf. 4.11s ; 2Th 3.7ss ; sur celui que Paul fournit, en plus de sa mission, pour ne pas être à la charge des Eglises, cf. Ac 18.3 ; 20.33ss ; 1Co 4.11-12+ ; 9.6,14ss ; 2Co 11.7ss ; 12.13ss ; comparer avec Ph 4.15s. –  proclamé Mc 1.4n.'
  - type: text
    content: 'Vous vous rappelez en effet, frères, notre travail et notre peine : c''est en œuvrant nuit et jour, pour n''être à charge à aucun de vous, que nous vous avons proclamé la bonne nouvelle de Dieu. '
