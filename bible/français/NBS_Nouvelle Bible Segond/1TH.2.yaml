      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1Co 4.14ss ; 2Co 6.11-13 ; Ga 4.19s ; voir aussi Ac 20.31.'
      marker-yv: yv-n
    - type: text
      text: 'Vous savez aussi que nous avons été pour chacun de vous ce qu''un père est pour ses enfants ; '
