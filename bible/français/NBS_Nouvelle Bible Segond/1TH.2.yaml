      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des Judéens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le terme grec est directement dérivé du mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Judée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Jr 32.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. Ce passage (v. 14-16) ne doit évidemment pas être pris dans un sens antisémite : son auteur est juif, de même que les chrétiens persécutés de Judée auxquels il se réfère. Ces lignes reflètent, comme beaucoup d''autres textes du N.T., le conflit qui oppose les premiers chrétiens, juifs ou non, à certaines tendances au moins du judaïsme, notamment en Judée.'
      marker-yv: yv-n
    - type: text
      text: 'En effet, frères, vous avez vous-mêmes imité les Eglises de Dieu en Jésus-Christ qui sont en Judée : vous avez souffert de la part de vos propres compatriotes ce qu''elles ont souffert de la part des Juifs. '
