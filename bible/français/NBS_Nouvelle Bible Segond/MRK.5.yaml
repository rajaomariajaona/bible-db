document_id: MRK.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus guérit un démoniaque
  - type: heading
    content: Mt 8.28-34  ; Lc 8.26-39
  - type: text
    content: ' '
  - type: note
    content: le pays des Géraséniens ou, selon les mss, des Gadaréniens, des Gergusténiens ou des Gergéséniens , d'après les noms de diverses localités situées à l'est ou au sud-est du lac de Tibériade, en pays non juif (v. 2,11,20+) ; cf. Mt 8.28n.
  - type: text
    content: 'Ils arrivèrent sur l''autre rive de la mer, dans le pays des Géraséniens. '
  '10':
  - type: note
    content: 'il le suppliait  : autre traduction ils le suppliaient. –  les envoyer hors du pays  : cf. Mt 12.43/ /.'
  - type: text
    content: Et il le suppliait instamment de ne pas les envoyer hors du pays.
  '11':
  - type: text
    content: ' '
  - type: note
    content: cochons , animaux impurs ; cf. v. 1n  ; Lv 11.7 ; Dt 14.8 ; Es 65.4.
  - type: text
    content: 'Or il y avait là, près de la montagne, un vaste troupeau de cochons en train de paître. '
  '12':
  - type: note
    content: 'Les esprits impurs supplièrent Jésus  : litt. ils le supplièrent.'
  - type: text
    content: 'Les esprits impurs supplièrent Jésus : Envoie-nous dans ces cochons, que nous entrions en eux. '
  '13':
  - type: text
    content: Il le leur permit. Les esprits impurs sortirent, entrèrent dans les cochons, et le troupeau se précipita dans la mer du haut de l'escarpement. Il y en avait environ deux mille ; ils se noyèrent dans la mer.
  '14':
  - type: text
    content: 'Ceux qui les faisaient paître s''enfuirent et répandirent la nouvelle dans la ville et dans les hameaux, et les gens vinrent voir ce qui s''était passé. '
  '15':
  - type: note
    content: 'démoniaque 1.32+. –  vêtu  : cf. Lc 8.27,35. –  et avec toute sa raison  : le même terme est traduit par pondération en Rm 12.3n, être raisonnable en 2Co 5.13. –  qui avait eu (3.22n) Légion  : autre traduction qui avait eu la légion (v. 9n). –  peur  : voir crainte.'
  - type: text
    content: 'Ils arrivent auprès de Jésus et voient le démoniaque assis, vêtu et avec toute sa raison – lui qui avait eu Légion – et ils eurent peur. '
  '16':
  - type: note
    content: 'ce qui s''était passé  : sous-entendu dans le texte.'
  - type: text
    content: 'Ceux qui avaient vu ce qui s''était passé leur racontèrent ce qui était arrivé au démoniaque et l''histoire des cochons. '
  '17':
  - type: note
    content: 'supplier Jésus  : litt. le supplier.'
  - type: text
    content: Alors ils se mirent à supplier Jésus de s'en aller de leur territoire.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'de le garder avec lui  : litt. pour qu''il soit avec lui , cf. 3.14n.'
  - type: text
    content: 'Comme il montait dans le bateau, celui qui avait été démoniaque le suppliait de le garder avec lui. '
  '19':
  - type: note
    content: 'Va-t''en chez toi (litt. dans ta maison) : cf. 8.26 ; Mt 9.6/ /. –  le Seigneur  : cf. 11.3. –  compassion 10.47s ; Mt 5.7n  ; 9.27+.'
  - type: text
    content: 'Il ne le lui permit pas, mais il lui dit : Va-t''en chez toi, auprès des tiens, et raconte-leur tout ce que le Seigneur a fait pour toi, comment il a eu compassion de toi. '
  '2':
  - type: note
    content: 'possédé d''un esprit impur  : 1.23n  ; voir aussi pur, impur.'
  - type: text
    content: 'Sitôt qu''il fut descendu du bateau, un homme sortant des tombeaux et possédé d''un esprit impur vint au-devant de lui. '
  '20':
  - type: note
    content: proclamer 1.45n. –  Décapole 7.31 ; Mt 4.25n.
  - type: text
    content: Il s'en alla et se mit à proclamer dans la Décapole tout ce que Jésus avait fait pour lui. Et tous étaient étonnés.
  - type: heading
    content: La fille de Jaïros et la femme qui touche le vêtement de Jésus
  - type: heading
    content: Mt 9.18-26  ; Lc 8.40-56
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'l''autre rive  : cf. v. 1 ; 4.35. –  en bateau  : litt. dans le bateau  ; cette précision est absente de certains mss. –  une grande foule  : certains mss portent une grande foule se rassembla encore auprès de lui . –  au bord de la mer 1.16+ ; 2.13+.'
  - type: text
    content: 'Jésus regagna l''autre rive en bateau, et une grande foule se rassembla auprès de lui. Il était au bord de la mer. '
  '22':
  - type: note
    content: 'Jaïros  : forme grecque (litt. Iaïros) du nom hébreu Yaïr, aussi chez Luc (Nb 32.41 ; Dt 3.14 ; Jos 13.30). –  tombe à ses pieds  : cf. 7.25 ; Jn 11.32 ; Ac 10.25 ; sur l''ensemble du récit voir aussi 1R 17.17-24 ; 2R 4.8,17-37 ; Ac 9.36-42.'
  - type: text
    content: 'Un des chefs de la synagogue, nommé Jaïros, arrive ; le voyant, il tombe à ses pieds '
  '23':
  - type: note
    content: 'Ma fille  : autre traduction ma petite fille (cf. 7.27n) ; même terme en 7.25. –  est sur le point de mourir  : litt. est à la fin. –  impose-lui les mains 6.5 ; 16.18 ; Mt 9.18+.'
  - type: text
    content: 'et le supplie instamment : Ma fille est sur le point de mourir ; viens, impose-lui les mains, afin qu''elle soit sauvée et qu''elle vive. '
  '24':
  - type: note
    content: le pressait de toutes parts 3.9n.
  - type: text
    content: Il s'en alla avec lui. Une grande foule le suivait et le pressait de toutes parts.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'perte de sang  : cf. Lv 15.25ss. –  douze ans  : cf. v. 42.'
  - type: text
    content: 'Or il y avait là une femme atteinte d''une perte de sang depuis douze ans. '
  '26':
  - type: text
    content: 'Elle avait beaucoup souffert du fait de nombreux médecins, et elle avait dépensé tout ce qu''elle possédait sans en tirer aucun avantage ; au contraire, son état avait plutôt empiré. '
  '27':
  - type: note
    content: toucha 1.41+.
  - type: text
    content: 'Ayant entendu parler de Jésus, elle vint dans la foule, par-derrière, et toucha son vêtement. '
  '28':
  - type: note
    content: sauvée, c.-à-d. guérie v. 23,34 ; cf. 3.4 ; 6.56 ; 8.35 ; 10.26,52 ; 13.13,20 ; 15.30s ; 16.16 ; Ac 5.15 ; 19.11s.
  - type: text
    content: 'Car elle disait : Si je touche ne serait-ce que ses vêtements, je serai sauvée ! '
  '29':
  - type: note
    content: 'sa perte de sang s''arrêta  : litt. la source de son sang (terme différent v. 25 et Lc 8.43 ; cf. Lv 12.7n) s''assécha. –  elle sut  : litt. elle connut, cf. v. 30n. –  de son mal  : litt. du fléau 3.10n.'
  - type: text
    content: Aussitôt sa perte de sang s'arrêta, et elle sut, dans son corps, qu'elle était guérie de son mal.
  '3':
  - type: note
    content: 'tombeaux Nb 19.11,14,16 ; Es 65.4 ; Ez 39.11ss ; Mt 23.27 ; Rouleau du Temple (Qumrân) 48.11s : « Vous n''agirez pas comme le font les nations – c''est partout qu''elles ensevelissent leurs morts, elles les ensevelissent même au milieu de leurs maisons. » 50.4ss : « Quiconque touche dans la campagne l''os d''un homme mort… ou un tombeau, se purifiera… »'
  - type: text
    content: 'Il avait sa demeure dans les tombeaux, et personne ne pouvait plus le lier, même avec une chaîne ; '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'sut  : litt. connut ou reconnut , verbe dérivé de celui qui est employé au v. 29. –  une force  : le même terme grec ( dunamis , d''où vient notre mot dynamique ) a aussi le sens de miracle  ; il est traduit par puissance en Lc 5.17+ ; cf. 6.19.'
  - type: text
    content: 'Jésus sut aussitôt, en lui-même, qu''une force était sortie de lui. Il se retourna dans la foule et se mit à dire : Qui a touché mes vêtements ? '
  '31':
  - type: note
    content: V. 24+.
  - type: text
    content: 'Ses disciples lui disaient : Tu vois la foule qui te presse de toutes parts, et tu dis : « Qui m''a touché ? » '
  '32':
  - type: text
    content: 'Mais il regardait autour de lui pour voir celle qui avait fait cela. '
  '33':
  - type: note
    content: 'tremblant de peur  : cf. v. 15,36+ ; voir aussi crainte.'
  - type: text
    content: 'Sachant ce qui lui était arrivé, la femme, tremblant de peur, vint se jeter à ses pieds et lui dit toute la vérité. '
  '34':
  - type: note
    content: 'ta foi  : cf. 10.52 ; Mt 8.13+ ; Lc 7.50 ; 17.19 ; 18.42. –  t''a sauvée v. 28n. –  va en paix 1S 1.17 ; 20.42 ; 29.7 ; 2S 15.9 ; 2R 5.19 ; Lc 7.50 ; Ac 16.36 ; Jc 2.16. –  sois guérie  : litt. sois saine, c.-à-d. débarrassée de ton mal v. 29n  ; cf. Ac 3.16.'
  - type: text
    content: 'Mais il lui dit : Ma fille, ta foi t''a sauvée ; va en paix et sois guérie de ton mal.'
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jn 11.21,32. –  maître  : au sens d’ enseignant.'
  - type: text
    content: 'Il parlait encore lorsque arrivent de chez le chef de la synagogue des gens qui disent : Ta fille est morte ; pourquoi importuner encore le maître ? '
  '36':
  - type: note
    content: 'qui avait surpris ces paroles  : autre traduction sans tenir compte de ces paroles  ; certains mss portent entendant [aussitôt] ces paroles. –  N''aie pas peur 6.50 ; cf. 16.6. –  crois (ou continue à croire, comparer avec Lc 8.50n) seulement  : cf. Jn 11.26.'
  - type: text
    content: 'Mais Jésus, qui avait surpris ces paroles, dit au chef de la synagogue : N''aie pas peur, crois seulement. '
  '37':
  - type: note
    content: Pierre / Jacques / Jean 1.29 ; 9.2 ; 13.3 ; 14.33 ; Mt 17.1+.
  - type: text
    content: 'Et il ne laissa personne l''accompagner, si ce n''est Pierre, Jacques et Jean, frère de Jacques. '
  '38':
  - type: text
    content: 'Ils arrivent chez le chef de la synagogue ; là il voit de l''agitation, des gens qui pleurent et qui poussent de grands cris. '
  '39':
  - type: note
    content: 'L''enfant n''est pas morte : elle dort Jn 11.4,11ss ; cf. Ac 7.60 ; 13.36 ; 20.10 ; voir aussi Mt 27.52n  ; 1Co 11.30n  ; 15.6n,18ss ; 1Th 4.13ss.'
  - type: text
    content: 'Il entre et leur dit : Pourquoi cette agitation et ces pleurs ? L''enfant n''est pas morte : elle dort. '
  '4':
  - type: note
    content: 'maîtriser  : le même verbe est traduit par dompter en Jc 5.7s.'
  - type: text
    content: 'car souvent il avait eu les fers aux pieds et avait été lié de chaînes, mais il avait rompu les chaînes et brisé les fers, et personne n''avait la force de le maîtriser. '
  '40':
  - type: note
    content: les chasse tous, comme en 11.15 ; même verbe en 1.12n  ; cf. Ac 9.40.
  - type: text
    content: 'Eux se moquaient de lui. Mais lui les chasse tous, prend avec lui le père et la mère de l''enfant, ainsi que ceux qui l''accompagnaient, et il entre là où se trouvait l''enfant. '
  '41':
  - type: note
    content: 'Il saisit l''enfant par la main  : cf. Mt 8.15+ ; voir aussi Es 41.13 ; 42.6 ; Ps 73.23. –  Talitha koum  : transcription en grec d''une formule araméenne (3.17n  ; cf. 7.34n) ; certains mss portent koumi au lieu de koum, ce qui correspondrait mieux à la forme féminine de l''araméen (qoumi). La forme transcrite koum pourrait s''adresser à un homme ou à un garçon, mais aussi à une femme ou à une jeune fille dans la mesure où le i final n''était pas prononcé en araméen. –  réveille-toi ! autre traduction lève-toi ! (autre verbe au v. 42), cf. 9.27n  ; Lc 7.14.'
  - type: text
    content: 'Il saisit l''enfant par la main et lui dit : '
  - type: text
    content: Talitha koum,
  - type: text
    content: ' ce qui se traduit : Jeune fille, je te le dis, réveille-toi ! '
  '42':
  - type: note
    content: 'douze ans  : elle allait atteindre l''âge nubile ; cf. v. 25. –  Ils furent saisis…  : litt. ils s''extasièrent (aussitôt, selon de nombreux mss) d''une grande extase  ; cf. 2.12n  ; 3.21n  ; voir aussi Ac 10.10n.'
  - type: text
    content: 'Aussitôt la jeune fille se leva et se mit à marcher – en effet, elle avait douze ans. Ils furent saisis d''une grande stupéfaction. '
  '43':
  - type: note
    content: 'que personne ne le sache  : cf. 1.25+,34 ; Mt 8.4+.'
  - type: text
    content: Il leur fit de sévères recommandations pour que personne ne le sache, et il dit de lui donner à manger.
  '5':
  - type: text
    content: Il était sans cesse dans les tombeaux et sur les montagnes, nuit et jour, criant et se blessant avec des pierres.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'se prosterna  : voir culte.'
  - type: text
    content: 'Il vit Jésus de loin, accourut, se prosterna devant lui '
  '7':
  - type: note
    content: 'cria  : litt. cria d''une grande voix  ; cf. 1.26 ; 15.34. –  Pourquoi… 1.24n. –  Fils  : cf. 1.1+ ; 3.11. –  Dieu Très-Haut Gn 14.18 ; Lc 1.32 ; 6.35 ; Ac 16.17. –  Je t''en conjure…  : c''est ici le sens naturel de l''expression, qui imite une formule d''exorcisme ; mais on pourrait aussi comprendre je t''en conjure, ô Dieu  ; cf. Gn 24.3 ; Mt 26.63.'
  - type: text
    content: 'et cria : Pourquoi te mêles-tu de mes affaires, Jésus, Fils du Dieu Très-Haut ? Je t''en conjure au nom de Dieu, ne me tourmente pas ! '
  '8':
  - type: note
    content: 'Jésus lui disait  : litt. il lui disait.'
  - type: text
    content: 'Car Jésus lui disait : Sors de cet homme, esprit impur ! '
  '9':
  - type: note
    content: 'Dans certains cas, connaître le nom de quelqu''un semble impliquer qu''on puisser exercer un pouvoir sur lui ; cf. Gn 32.30 ; Jg 13.17s. –  Mon nom…  : litt. Légion est un nom pour moi  ; le mot légion désigne habituellement une unité de l''armée romaine forte de 6 000 hommes ; cf. Mt 12.45/ / ; Lc 8.2,27.'
  - type: text
    content: 'Il lui demandait : Quel est ton nom ? – Mon nom, lui répond-il, c''est Légion, car nous sommes beaucoup. '
