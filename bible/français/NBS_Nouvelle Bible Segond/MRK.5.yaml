segments:
- type: usfm
  marker: s1
  children:
  - type: text
    text: Jésus guérit un démoniaque
  marker-yv: yv-h
- type: usfm
  marker: r
  children:
  - type: text
    text: Mt 8.28-34  ; Lc 8.26-39
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '1'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '1'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.1 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le pays des Géraséniens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon les mss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'des Gadaréniens, des Gergusténiens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des Gergéséniens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', d''après les noms de diverses localités situées à l''est ou au sud-est du lac de Tibériade, en pays non juif (v. 2,11,20+) ; cf. Mt 8.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils arrivèrent sur l''autre rive de la mer, dans le pays des Géraséniens. '
  - type: usfm
    marker: v
    metadata:
      v: '2'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'possédé d''un '
      - type: usfm
        marker: w
        children:
        - type: text
          text: esprit
      - type: text
        text: ' impur'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : 1.23'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; voir aussi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: pur
      - type: text
        text: ', impur.'
    marker-yv: yv-n
  - type: text
    text: 'Sitôt qu''il fut descendu du bateau, un homme sortant des tombeaux et possédé d''un esprit impur vint au-devant de lui. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tombeaux '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Nb 19.11,14,16 ; Es 65.4 ; Ez 39.11ss ; Mt 23.27 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rouleau du Temple '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: ') 48.11s : « Vous n''agirez pas comme le font les nations – c''est partout qu''elles ensevelissent leurs morts, elles les ensevelissent même au milieu de leurs maisons. » 50.4ss : « Quiconque touche dans la campagne l''os d''un homme mort… ou un tombeau, se purifiera… »'
    marker-yv: yv-n
  - type: text
    text: 'Il avait sa demeure dans les tombeaux, et personne ne pouvait plus le lier, même avec une chaîne ; '
  - type: usfm
    marker: v
    metadata:
      v: '4'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: maîtriser
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'dompter '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Jc 5.7s.
    marker-yv: yv-n
  - type: text
    text: 'car souvent il avait eu les fers aux pieds et avait été lié de chaînes, mais il avait rompu les chaînes et brisé les fers, et personne n''avait la force de le maîtriser. '
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: Il était sans cesse dans les tombeaux et sur les montagnes, nuit et jour, criant et se blessant avec des pierres.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se prosterna
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: culte
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il vit Jésus de loin, accourut, se prosterna devant lui '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: cria d'une grande voix
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1.26 ; 15.34. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Pourquoi… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 1.1+ ; 3.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Dieu Très-Haut '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Gn 14.18 ; Lc 1.32 ; 6.35 ; Ac 16.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Je t'en conjure…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c''est ici le sens naturel de l''expression, qui imite une formule d''exorcisme ; mais on pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je t'en conjure, ô Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Gn 24.3 ; Mt 26.63.'
    marker-yv: yv-n
  - type: text
    text: 'et cria : Pourquoi te mêles-tu de mes affaires, Jésus, Fils du Dieu Très-Haut ? Je t''en conjure au nom de Dieu, ne me tourmente pas ! '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Jésus lui disait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il lui disait.
    marker-yv: yv-n
  - type: text
    text: 'Car Jésus lui disait : Sors de cet homme, esprit impur ! '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.9 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Dans certains cas, connaître le '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'de quelqu''un semble impliquer qu''on puisser exercer un pouvoir sur lui ; cf. Gn 32.30 ; Jg 13.17s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Mon nom…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Légion est un nom pour moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le mot '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'légion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne habituellement une unité de l'armée romaine forte de 6 000 hommes ; cf. Mt 12.45/ / ; Lc 8.2,27.
    marker-yv: yv-n
  - type: text
    text: 'Il lui demandait : Quel est ton nom ? – Mon nom, lui répond-il, c''est Légion, car nous sommes beaucoup. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il le suppliait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils le suppliaient
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les envoyer hors du pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Mt 12.43/ /.'
    marker-yv: yv-n
  - type: text
    text: Et il le suppliait instamment de ne pas les envoyer hors du pays.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cochons
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', animaux impurs ; cf. v. 1'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Lv 11.7 ; Dt 14.8 ; Es 65.4.'
    marker-yv: yv-n
  - type: text
    text: 'Or il y avait là, près de la montagne, un vaste troupeau de cochons en train de paître. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les esprits impurs supplièrent Jésus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils le supplièrent.
    marker-yv: yv-n
  - type: text
    text: 'Les esprits impurs supplièrent Jésus : Envoie-nous dans ces cochons, que nous entrions en eux. '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: Il le leur permit. Les esprits impurs sortirent, entrèrent dans les cochons, et le troupeau se précipita dans la mer du haut de l'escarpement. Il y en avait environ deux mille ; ils se noyèrent dans la mer.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Ceux qui les faisaient paître s''enfuirent et répandirent la nouvelle dans la ville et dans les hameaux, et les gens vinrent voir ce qui s''était passé. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.15 '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: démoniaque
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.32+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vêtu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Lc 8.27,35. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et avec toute sa raison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même terme est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'pondération '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en Rm 12.3
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'être raisonnable '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en 2Co 5.13. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'qui avait eu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (3.22
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Légion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'qui avait eu la légion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (v. 9
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: peur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils arrivent auprès de Jésus et voient le démoniaque assis, vêtu et avec toute sa raison – lui qui avait eu Légion – et ils eurent peur. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce qui s'était passé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte.'
    marker-yv: yv-n
  - type: text
    text: 'Ceux qui avaient vu ce qui s''était passé leur racontèrent ce qui était arrivé au démoniaque et l''histoire des cochons. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: supplier Jésus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le supplier.
    marker-yv: yv-n
  - type: text
    text: Alors ils se mirent à supplier Jésus de s'en aller de leur territoire.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de le garder avec lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour qu'il soit avec lui
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.14'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Comme il montait dans le bateau, celui qui avait été démoniaque le suppliait de le garder avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '5.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Va-t''en chez toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans ta maison
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : cf. 8.26 ; Mt 9.6/ /. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 11.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'compassion '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.47s ; Mt 5.7
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
