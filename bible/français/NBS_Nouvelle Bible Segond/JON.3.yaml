document_id: JON.3,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jonas à Ninive
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.1s.
  - type: text
    content: 'La parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jonas une deuxième fois : '
  '10':
  - type: note
    content: 'qu''ils revenaient  : cf. v. 8 ; Es 1.27n  ; voir aussi Ep 3.6. –  renonça…  : autre traduction regretta le mal  ; cf. v. 9n.'
  - type: text
    content: Dieu vit qu'ils agissaient ainsi et qu'ils revenaient de leur voie mauvaise. Alors Dieu renonça au mal qu'il avait parlé de leur faire ; il ne le fit pas.
  '2':
  - type: note
    content: 'Lève-toi…  : cf. 1.2n. –  que je te dis  : autre traduction que je te dirai.'
  - type: text
    content: 'Lève-toi, va à Ninive, la grande ville, et fais-y la proclamation que je te dis ! '
  '3':
  - type: note
    content: 'une grande ville devant Dieu  : certains comprennent cette expression comme une sorte de superlatif, pour dire une ville extraordinairement grande  ; cf. Gn 10.8s,12. –  il fallait…  : litt. de trois jours de marche  ; la circonférence de Ninive était d''une douzaine de kilomètres ; certains pensent cependant que cette description se réfère à l''agglomération qui pouvait englober d''autres villes.'
  - type: text
    content: 'Alors Jonas se leva et alla à Ninive, selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Or Ninive était une grande ville devant Dieu ; il fallait trois jours de marche pour en faire le tour. '
  '4':
  - type: note
    content: 'proclamait 1.2n. –  quarante jours  : cf. 1R 19.8 ; Ac 1.3+. –  détruite  : autres traductions retournée, renversée  ; cf. Gn 19.21n  ; voir aussi Jr 36.6s.'
  - type: text
    content: 'Jonas commença par faire dans la ville une journée de marche. Il proclamait : Encore quarante jours, et Ninive est détruite !'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'mirent leur foi en Dieu ou crurent Dieu  : cf. Ez 3.5-6+. –  jeûne / sac  : signes de deuil ou de pénitence, de même aux v. suivants ; cf. 1R 21.9 ; Jr 36.9 ; Jl 1.14 ; Ps 35.13 ; Est 4.1SS ; Mt 11.21/ / ; voir 12.41/ /.'
  - type: text
    content: 'Les gens de Ninive mirent leur foi en Dieu ; ils proclamèrent un jeûne et se revêtirent d''un sac, depuis le plus grand jusqu''au plus petit d''entre eux. '
  '6':
  - type: note
    content: 'La nouvelle parvint au roi  : litt. la parole atteignit le roi. –  il se leva…  : cf. Ez 26.16 ; Jb 2.8,12s.'
  - type: text
    content: 'La nouvelle parvint au roi de Ninive ; il se leva de son trône, ôta son manteau, se couvrit d''un sac et s''assit sur la cendre. '
  '7':
  - type: note
    content: 'Il fit crier (1.2n  ; c''est ici le même verbe qu''en 1.5) : cf. Ez 27.30s. –  les humains et les bêtes  : cf. 4.11 ; selon Hérodote, les Perses avaient coutume d''associer les animaux à leurs rites de deuil.'
  - type: text
    content: 'Il fit crier dans Ninive : Par décision du roi et de ses grands, que les humains et les bêtes, le gros bétail et le petit bétail, ne goûtent de rien, ne paissent pas et ne boivent pas d''eau ! '
  '8':
  - type: note
    content: 'Cf. Jr 25.5s ; 26.3 ; 35.15 ; 36.3,7 ; Ez 36.31. –  qu''ils invoquent Dieu  : autres traductions qu''ils crient vers Dieu ; qu''ils invoquent les dieux ; qu''ils crient vers les dieux (cf. Gn 1.1n) ; mais le v. 9 se réfère à Dieu au singulier. –  violence / mains  : cf. Jb 16.17 ; 31.7.'
  - type: text
    content: 'Que les humains et les bêtes soient couverts d''un sac, qu''ils invoquent Dieu avec force, et que chacun revienne de sa voie mauvaise et de la violence de ses mains ! '
  '9':
  - type: note
    content: 'Jl 2.14 ; Am 5.15. –  s''il ne renoncera pas  : autres traductions s''il ne regrettera pas ; s''il n''aura pas pitié ; s''il ne changera pas d''avis  ; cf. v. 10 ; 4.2 ; Gn 6.6n  ; Jr 18.7-12 ; Am 7.3 ; cf. Nb 23.19+.'
  - type: text
    content: 'Qui sait si Dieu ne reviendra pas, s''il ne renoncera pas, s''il ne reviendra pas de sa colère ardente, pour que nous ne disparaissions pas ? '
