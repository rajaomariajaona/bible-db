document_id: JON.3,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jonas à Ninive
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 1.1s.
      marker-yv: yv-n
    - type: text
      text: 'La parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Jonas une deuxième fois : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'ils revenaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 8 ; Es 1.27'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Ep 3.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: renonça…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: regretta le mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Dieu vit qu'ils agissaient ainsi et qu'ils revenaient de leur voie mauvaise. Alors Dieu renonça au mal qu'il avait parlé de leur faire ; il ne le fit pas.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Lève-toi…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que je te dis
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que je te dirai.
      marker-yv: yv-n
    - type: text
      text: 'Lève-toi, va à Ninive, la grande ville, et fais-y la proclamation que je te dis ! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une grande ville devant Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains comprennent cette expression comme une sorte de superlatif, pour dire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une ville extraordinairement grande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 10.8s,12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il fallait…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de trois jours de marche
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; la circonférence de Ninive était d''une douzaine de kilomètres ; certains pensent cependant que cette description se réfère à l''agglomération qui pouvait englober d''autres villes.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Jonas se leva et alla à Ninive, selon la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Or Ninive était une grande ville devant Dieu ; il fallait trois jours de marche pour en faire le tour. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'proclamait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '1.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quarante jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1R 19.8 ; Ac 1.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: détruite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: retournée, renversée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 19.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Jr 36.6s.'
      marker-yv: yv-n
    - type: text
      text: 'Jonas commença par faire dans la ville une journée de marche. Il proclamait : Encore quarante jours, et Ninive est détruite !'
  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mirent leur foi en Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: crurent Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Ez 3.5-6+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jeûne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sac
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : signes de deuil ou de pénitence, de même aux v. suivants ; cf. 1R 21.9 ; Jr 36.9 ; Jl 1.14 ; Ps 35.13 ; Est 4.1SS ; Mt 11.21/ / ; voir 12.41/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Les gens de Ninive mirent leur foi en Dieu ; ils proclamèrent un jeûne et se revêtirent d''un sac, depuis le plus grand jusqu''au plus petit d''entre eux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La nouvelle parvint au roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole atteignit le roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il se leva…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ez 26.16 ; Jb 2.8,12s.'
      marker-yv: yv-n
    - type: text
      text: 'La nouvelle parvint au roi de Ninive ; il se leva de son trône, ôta son manteau, se couvrit d''un sac et s''assit sur la cendre. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Il fit crier '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (1.2
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; c''est ici le même verbe qu''en 1.5) : cf. Ez 27.30s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les humains et les bêtes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 4.11 ; selon Hérodote, les Perses avaient coutume d''associer les animaux à leurs rites de deuil.'
      marker-yv: yv-n
    - type: text
      text: 'Il fit crier dans Ninive : Par décision du roi et de ses grands, que les humains et les bêtes, le gros bétail et le petit bétail, ne goûtent de rien, ne paissent pas et ne boivent pas d''eau ! '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Jr 25.5s ; 26.3 ; 35.15 ; 36.3,7 ; Ez 36.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'ils invoquent Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qu''ils crient vers Dieu ; qu''ils invoquent les dieux ; qu''ils crient vers les dieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; mais le v. 9 se réfère à Dieu au singulier. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'violence '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jb 16.17 ; 31.7.'
      marker-yv: yv-n
    - type: text
      text: 'Que les humains et les bêtes soient couverts d''un sac, qu''ils invoquent Dieu avec force, et que chacun revienne de sa voie mauvaise et de la violence de ses mains ! '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '3.9 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Jl 2.14 ; Am 5.15. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: s'il ne renoncera pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''il ne regrettera pas ; s''il n''aura pas pitié ; s''il ne '
        - type: usfm
          marker: w
          children:
          - type: text
            text: changera
        - type: text
          text: ' pas d''avis'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 10 ; 4.2 ; Gn 6.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 18.7-12 ; Am 7.3 ; cf. Nb 23.19+.'
      marker-yv: yv-n
    - type: text
      text: 'Qui sait si Dieu ne reviendra pas, s''il ne renoncera pas, s''il ne reviendra pas de sa colère ardente, pour que nous ne disparaissions pas ? '
