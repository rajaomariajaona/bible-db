document_id: AMO.1,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'Amos  : le nom vient d''un verbe qui signifie porter  ; peut-être s''agit-il d''une abréviation d''Amasia, YHWH a porté . –  éleveurs  : il pourrait s''agir de responsables des troupeaux appartenant au roi de Juda ou au temple de Jérusalem (pour les sacrifices) ; cf. v. 2 ; 7.14 ; 2R 3.4 (même mot). –  Teqoa , au sud de Beth-Léhem, dans le royaume de Juda ; cf. 7.12 ; 2S 14.2 ; Jr 6.1 ; Né 3.5n  ; 2Ch 11.6. –  ce qu''il a vu 7.1ss ; 8.1ss ; 9.1 ; cf. Es 2.1 ; Mi 1.1 ; voir aussi Jr 2.31n. –  Israël est ici le royaume des dix tribus, par opposition à Juda 2.4,6 ; autres noms 3.13 ; 5.6,15 ; 6.6,8 ; 7.2,5,9,16 ; cf. 9.14. –  Ozias (≈ 781-740 av. J.-C.) 2R 15.1ss. –  Jéroboam II (≈ 783-743 av. J.-C.) ; 7.9ss ; 2R 14.23ss ; cf. Os 1.1n. –  tremblement de terre  : cf. 4.11 ; 6.8ss ; 8.8 ; 9.1,5 ; Za 14.5.'
  - type: text
    content: Paroles d'Amos, l'un des éleveurs de Teqoa ; ce qu'il a vu au sujet d'Israël aux jours d'Ozias, roi de Juda, et aux jours de Jéroboam, fils de Joas, roi d'Israël, deux ans avant le tremblement de terre.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. v. 4+ ; Ez 28.18 ; Za 9.3s.
  - type: text
    content: j'enverrai le feu contre la muraille de Tyr,
  - type: text
    content: et il dévorera ses palais.
  - type: heading
    content: Les Edomites
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Edom , au sud v. 6,9 ; cf. Es 34 ; Jr 49.7ss ; Ez 25.12ss ; 35 ; Ab ; Ml 1.2ss. –  son frère  : allusion à l''histoire d''Esaü (= Edom), frère de Jacob (= Israël) Gn 25 ; 27 ; 36 ; cf. Nb 20.14ss ; Jl 4.19 ; Ab 10s ; Ps 137.7 ; Lm 4.21. –  déchire ou déchiquette  ; un terme apparenté est traduit par proie en 3.4 ; cf. Os 5.14n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions d'Edom,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: parce qu'il a poursuivi son frère avec l'épée
  - type: text
    content: en étouffant sa compassion,
  - type: text
    content: parce que sa colère déchire sans cesse
  - type: text
    content: et qu'il garde continuellement sa fureur,
  '12':
  - type: text
    content: ' '
  - type: note
    content: Témân et Botsra , en Edom Gn 36.11ss,33,42 ; Es 63.1 ; Jr 49.7,13,20 ; Ab 9.
  - type: text
    content: j'enverrai le feu contre Témân,
  - type: text
    content: et il dévorera les palais de Botsra.
  - type: heading
    content: Les Ammonites
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ammonites  : cf. Gn 19.30ss ; Jr 49.1ss ; Ez 21.33ss ; 25.1ss ; So 2.8ss. –  éventré… 2R 8.12 ; 15.16. –  Galaad v. 3n.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions des Ammonites,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: parce qu'ils ont éventré les femmes enceintes du Galaad
  - type: text
    content: afin d'agrandir leur territoire,
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 4+ ; Jr 49.2. –  Rabba d''Ammon, aujourd''hui Amman, capitale de la Jordanie Dt 33.11 ; 2S 11.1 ; 12.26. –  acclamations ( guerrières sous-entendu dans le texte ; de même en 2.2) : cf. Nb 10.5n  ; Jos 6.20. –  ouragan Es 28.2.'
  - type: text
    content: je mettrai le feu à la muraille de Rabba,
  - type: text
    content: et il dévorera ses palais.
  - type: text
    content: Au milieu des acclamations guerrières, au jour du combat,
  - type: text
    content: au milieu de la tempête, au jour de l'ouragan ;
  '15':
  - type: text
    content: ' '
  - type: note
    content: leur roi , en hébreu malkam , que des versions anciennes ont lu comme le nom d'un dieu ; cf. Jr 48.7 ; 49.3.
  - type: text
    content: leur roi s'en ira en exil,
  - type: text
    content: lui et ses chefs avec lui,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'De Sion 2S 5.9 ; 6.12ss ; 15.25 ; Jl 4.17 ; Ps 2.6+ ; 48.2 ; 68.17 ; 78.68 ; 87.2 ; 132.13s. –  le Seigneur rugit…  : cf. 3.4,8 ; Es 5.29 ; Jr 25.30 ; Os 11.10 ; Jl 4.16 ; cf. Es 29.6 ; 30.30 ; Ps 18.14 ; 29.3ss ; 97.2ss ; Ap 10.3. –  pâturages… Es 24.4 ; 33.9 ; Jr 4.28 ; 12.4,11 ; 14.2 ; 23.10 ; Os 4.3 ; Jl 1.10. –  le sommet du Carmel (9.3), montagne du nord-ouest du pays, couverte d''une forêt luxuriante Es 33.9 ; 35.2 ; Jr 50.19 ; Ct 7.6.'
  - type: text
    content: 'Il dit :'
  - type: text
    content: 'De Sion le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rugit,'
  - type: text
    content: de Jérusalem il fait retentir sa voix.
  - type: text
    content: Les pâturages des bergers sont en deuil,
  - type: text
    content: et le sommet du Carmel est desséché.
  - type: heading
    content: Les reproches du Seigneur à Israël et à ses voisins
  - type: heading
    content: Les Araméens
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'trois / quatre  : la formule signifie vraisemblablement que la mesure est comble ; cf. v. 6,9,11,13 ; 2.1,4,6 ; Os 6.2 ; Jb 5.19 ; Pr 6.16 ; 30.15,18,21,29 ; Ec 11.2. –  transgressions  : autres traductions révoltes, crimes  ; même terme en 1.3,6,9,11,13 ; 2.1,4,6 ; 3.14 ; 5.12 ; verbe apparenté en 4.4 ; voir aussi Gn 31.36n  ; voir péché. –  Damas , en Syrie, au nord-est d''Israël (Es 17.1ss ; Jr 49.23ss), et le Galaad , territoire disputé à l''est du Jourdain, voir Gn 31.21,47ss ; 2R 10.32s ; 14.25. –  je ne révoquerai pas mon arrêt  : litt. je ne le ferai pas revenir , ce qui a aussi été compris de l''envahisseur, de même dans la suite ; cf. 7.3. –  foulé Jg 8.7n. –  herses (Jl 4.14n) de fer  : cf. 2S 12.31n  ; voir aussi 2R 8.12 ; 13.7 ; Es 21.10 ; 25.10 ; 28.27s ; 41.15 ; Mi 4.12s.'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions de Damas,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: parce qu'ils ont foulé le Galaad avec des herses de fer,
  '4':
  - type: text
    content: ' '
  - type: note
    content: Jr 49.27 ; cf. 2R 16.7ss. –  feu v. 7,10,12,14 ; 2.2,5. –  Hazaël et Ben-Hadad , rois d'Aram 2R 8.7ss,12 ; 10.32s ; 13.3ss ; cf. 1R 15.18ss ; 19.15ss ; 20.1ss.
  - type: text
    content: j'enverrai le feu contre la maison d'Hazaël,
  - type: text
    content: et il dévorera les palais de Ben-Hadad.
  '5':
  - type: text
    content: ' '
  - type: note
    content: verrous 1R 4.13 ; Na 3.13n. –  Biqath-Aven ( Vallée d'injustice, de malfaisance ou de nullité , cf. Os 4.15n), et Beth-Eden ( Maison de plaisir , cf. 2R 19.12) ne sont pas connus comme noms de lieux ; il s'agit probablement de sobriquets désignant Damas , dans la vallée de l'Abana (2R 5.12). –  Qir ou Qour en Mésopotamie (localisation incertaine) ; cf. 9.7 ; 2R 16.9n  ; Es 22.6.
  - type: text
    content: Je briserai les verrous de Damas,
  - type: text
    content: je retrancherai de Biqath-Aven les habitants
  - type: text
    content: et de Beth-Eden celui qui tient le sceptre ;
  - type: text
    content: le peuple d'Aram sera exilé à Qir,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Les Philistins
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Gaza, Ashdod, Ashqelôn, Eqrôn (v. 7s) et Gath (6.2, peut-être non mentionnée ici à cause d''une récente défaite, cf. 2R 12.18 ; Jr 25.20) sont les villes fédérées des Philistins (9.7), au sud-ouest d''Israël ; cf. Jr 47 ; Ez 25.15ss ; So 2.4ss ; Za 9.5s. –  exilé / livrer (v. 9 ; 6.8 ; Dt 23.16n) : cf. 2R 5.2 ; 2Ch 21.16s. –  Edom v. 9,11s ; cf. Jl 4.4ss ; ici et au v. 9 certains modifient le texte hébreu traditionnel pour lire Aram (= la Syrie).'
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions de Gaza,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: parce qu'ils ont exilé tout un peuple pour le livrer à Edom,
  '7':
  - type: text
    content: j'enverrai le feu contre la muraille de Gaza,
  - type: text
    content: et il dévorera ses palais.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'je tournerai ma main Ez 38.12 ; Za 13.7 ; Ps 81.15. –  reste  : cf. 5.3,15 ; Es 1.9+ ; Ez 25.15ss.'
  - type: text
    content: Je retrancherai d'Ashdod tout habitant
  - type: text
    content: 'et d''Ashqelôn celui qui tient le sceptre :'
  - type: text
    content: je tournerai ma main contre Eqrôn
  - type: text
    content: et le reste des Philistins disparaîtra,
  - type: text
    content: 'dit le Seigneur '
  - type: text
    content: Dieu
  - type: text
    content: .
  - type: heading
    content: Les Phéniciens
  '9':
  - type: text
    content: ' '
  - type: note
    content: Tyr en Phénicie, au nord-ouest Es 23 ; Ez 26–28. –  Edom v. 6n,11n. –  l'alliance fraternelle entre Tyr et Israël 2S 5.11 ; 1R 5.15,26 ; 9.10ss.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  :'
  - type: text
    content: A cause de trois transgressions de Tyr,
  - type: text
    content: 'à cause de quatre, je ne révoquerai pas mon arrêt :'
  - type: text
    content: parce qu'ils ont livré à Edom tout un peuple d'exilés
  - type: text
    content: et qu'ils ne se sont pas souvenus de l'alliance fraternelle,
