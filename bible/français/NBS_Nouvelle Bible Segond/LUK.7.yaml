      - type: text
        text: '7.50 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.48 ; cf. 1.79+ ; 17.19 ; 18.42 ; Mc 5.34+ ; Ac 3.16 ; 16.36. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'va en '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
