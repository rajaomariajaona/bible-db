document_id: LUK.7,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jésus et le centurion de Capharnaüm
  - type: heading
    content: Mt 8.5-13  ; cf. Jn 4.46-54
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 7.28+. –  Capharnaüm 4.23+.
  - type: text
    content: Après avoir achevé tous ces discours au peuple qui l'écoutait, il entra à Capharnaüm.
  '10':
  - type: note
    content: 'l''esclave  : quelques mss portent l''esclave malade ou le malade.'
  - type: text
    content: De retour à la maison, les envoyés trouvèrent l'esclave en bonne santé.
  - type: heading
    content: Le jeune homme de Naïn
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Ensuite  : certains mss portent le (jour) suivant  ; cf. 8.1. –  Naïn  : dans le sud de la Galilée, à près d''une quarantaine de kilomètres de Capharnaüm. –  ses disciples ou, selon quelques mss, un assez grand nombre de ses disciples  ; cf. v. 9 ; 6.17.'
  - type: text
    content: 'Ensuite il se rendit dans une ville appelée Naïn ; ses disciples et une grande foule faisaient route avec lui. '
  '12':
  - type: note
    content: 'Cf. 8.49ss ; 1R 17.17-24 ; 2R 4.32-37. –  Lorsqu''il approcha…  : cf. 15.25 ; 19.29,41 ; 1R 17.10. –  fils unique 8.42 ; 9.38 ; cf. 1R 17.12 ; Jr 6.26 ; Am 8.10 ; Za 12.10.'
  - type: text
    content: 'Lorsqu''il approcha de la porte de la ville, on portait en terre un mort, fils unique de sa mère, qui était veuve ; et il y avait avec elle une importante foule de la ville. '
  '13':
  - type: note
    content: Le Seigneur v. 19 ; 10.1,39,41 ; 11.39 ; 12.42 ; 13.15 ; 17.5s ; 18.6 ; 19.8,31,34 ; 20.44 ; 22.61 ; 24.3,34 ; cf. 1.43 ; 2.11 ; Mt 21.3 ; Mc 11.3 ; Ac 1.21 ; 4.33 ; 5.14 ; 8.16 etc. –  ému 10.33 ; 15.20 ; Mt 9.36n. –  Ne pleure pas 8.52 ; Ap 5.5.
  - type: text
    content: 'Le Seigneur la vit ; il fut ému par elle et lui dit : Ne pleure pas ! '
  '14':
  - type: note
    content: 'toucha 5.13+. –  je te l''ordonne  : litt. je te dis. –  réveille-toi ou lève-toi (même verbe v. 16, et pour ressusciter v. 22) ; cf. 1.69n  ; 5.23s ; 6.8 ; 8.54 ; 9.7,22 ; 20.37 ; 24.6,34 ; voir aussi Mc 5.41/ / ; Ac 3.15n.'
  - type: text
    content: 'Il s''approcha et toucha le cercueil. Ceux qui le portaient s''arrêtèrent. Il dit : Jeune homme, je te l''ordonne, réveille-toi ! '
  '15':
  - type: note
    content: s'assit… Ac 9.40ss. –  le rendit à sa mère 9.42 ; 1R 17.23 ; cf. 2R 4.36.
  - type: text
    content: 'Et le mort s''assit et se mit à parler. Il le rendit à sa mère. '
  '16':
  - type: note
    content: saisis de crainte 1.65+. –  glorifiaient Dieu 2.20+. –  prophète 24.19 ; cf. 4.24,27 ; 9.8 ; 13.33 ; Mt 21.11 ; voir aussi Dt 18.15ss ; 1R 17.17ss ; Ml 3.23s. –  s'est levé ou a été suscité v. 14n  ; 9.8,19 ; cf. 3.8n  ; 11.31 ; Jg 2.16ss ; 3.9 ; Es 45.13 ; Dn 8.18. –  est intervenu… 1.68n.
  - type: text
    content: 'Tous furent saisis de crainte ; ils glorifiaient Dieu et disaient : Un grand prophète s''est levé parmi nous, et : Dieu est intervenu en faveur de son peuple. '
  '17':
  - type: note
    content: Cette parole… ou cette histoire… 4.14+,37 ; 5.15 ; Ac 11.22. –  la Judée 1.5n  ; 4.44n.
  - type: text
    content: Cette parole se répandit à son sujet dans la Judée tout entière et dans tous les environs.
  - type: heading
    content: Les envoyés de Jean le Baptiseur
  - type: heading
    content: Mt 11.2-19
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'disciples de Jean 5.33n  ; cf. 3.16-20 ; Jn 3.25s. –  deux  : cf. Dt 19.15.'
  - type: text
    content: 'Les disciples de Jean lui racontèrent tout cela. Jean appela deux de ses disciples '
  '19':
  - type: note
    content: au Seigneur v. 13+. –  celui qui vient, cf. 3.16 ; 13.35 ; 19.38 ; voir Mt 11.3n (voir aussi 3.11+) ; comparer avec 1P 1.10s.
  - type: text
    content: 'et les envoya demander au Seigneur : Est-ce toi, celui qui vient, ou devons-nous en attendre un autre ? '
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Un centurion  : cf. Ac 10.1ss. –  sur le point de mourir  : même construction, avec un autre verbe équivalent, en Jn 4.47. –  qui lui était très cher  : comparer l''attitude de ce non-juif avec celle du Samaritain de 10.25ss.'
  - type: text
    content: 'Un centurion avait un esclave malade qui était sur le point de mourir et qui lui était très cher. '
  '20':
  - type: note
    content: le Baptiseur v. 33 ; 9.19.
  - type: text
    content: 'Arrivés auprès de lui, les hommes dirent : Jean le Baptiseur nous a envoyés te demander : « Est-ce toi, celui qui vient, ou devons-nous en attendre un autre ? » '
  '21':
  - type: note
    content: 'A ce moment même  : litt. en cette heure-là  ; autre traduction il venait de guérir… –  il rendit la vue  : litt. il fit grâce de voir  ; le verbe correspondant à faire grâce, apparenté au mot habituellement traduit par grâce, revient avec des sens différents v. 42s ; Ac 3.14 ; 25.11,16 ; 27.24 ; Rm 8.32n. –  aveugles  : cf. 4.18 ; 18.35ss.'
  - type: text
    content: 'A ce moment même, il guérit beaucoup de gens de maladies, d''infirmités et d''esprits mauvais, et il rendit la vue à de nombreux aveugles. '
  '22':
  - type: note
    content: Cf. Es 26.19 ; 29.18 ; 35.5-6 ; 42.18  ; 61.1. –  lépreux… purifiés 4.27 ; Mt 8.3/ / ; 10.8. –  se réveillent ou se relèvent, cf. 1.69n  ; voir aussi résurrection.
  - type: text
    content: 'Et il leur répondit : Allez raconter à Jean ce que vous avez vu et entendu :'
  - type: text
    content: les aveugles retrouvent la vue,
  - type: text
    content: ' les infirmes marchent,'
  - type: text
    content: 'les lépreux sont purifiés, '
  - type: text
    content: les sourds entendent,
  - type: text
    content: les morts se réveillent,
  - type: text
    content: ' la bonne nouvelle est annoncée aux pauvres.'
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Heureux  : cf. 6.20+ ; Jn 20.29. –  cause de chute 17.1ss ; voir Mt 11.6n.'
  - type: text
    content: Heureux celui pour qui je ne serai pas une cause de chute !
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Autre traduction possible (de même dans la suite)  : Pourquoi êtes-vous allés au désert ? Pour voir… ? 3.7. –  désert 1.80 ; 3.2,4. –  Un roseau…  : cf. 1R 14.15 ; voir Mt 11.7n. –  Evangile selon Thomas 78 : « Jésus a dit : “Pourquoi êtes-vous allés à la campagne ? Pour voir un roseau agité par le vent, et pour voir un homme revêtu d''habits raffinés, comme vos rois et vos magnats ? Ce sont eux qui portent des habits raffinés, mais ils ne pourront pas connaître la vérité.” »'
  - type: text
    content: 'Après le départ des messagers de Jean, il se mit à dire aux foules à propos de Jean : Qu''êtes-vous allés voir au désert ? Un roseau agité par le vent ? '
  '25':
  - type: note
    content: 'vêtu…  : cf. Mt 3.4/ / ; 11.8n. –  somptueux ou glorieux, même terme 13.17. –  luxe  : cf. v. 33 ; 8.14.'
  - type: text
    content: 'Alors, qu''êtes-vous allés voir ? Un homme vêtu avec raffinement ? Mais ceux qui portent des vêtements somptueux et qui vivent dans le luxe sont dans les palais royaux ! '
  '26':
  - type: note
    content: 'prophète 1.76+. –  plus…  : cf. 11.31s ; voir aussi Jn 1.21.'
  - type: text
    content: 'Qu''êtes-vous donc allés voir ? Un prophète ? Oui, je vous le dis, et plus qu''un prophète. '
  '27':
  - type: note
    content: '1.17n,76 ; Ex 23.20 ; Ml 3.1. –  devant toi  : voir Mt 11.10n.'
  - type: text
    content: 'C''est à son sujet qu''il est écrit :'
  - type: text
    content: J'envoie devant
  - type: text
    content: ' toi '
  - type: text
    content: mon messager,
  - type: text
    content: pour frayer ton chemin devant
  - type: text
    content: ' toi.'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 1.15,57 ; 16.16 ; voir Mt 11.11n. –  il n''y en a pas…  : certains mss portent aucun prophète n''est plus grand que Jean . Evangile selon Thomas 46 : « Jésus a dit : “Parmi ceux qui sont nés de femmes, depuis Adam jusqu''à Jean-Baptiste, il n''y a personne qui soit plus grand que Jean-Baptiste, si bien que tous doivent baisser les yeux devant lui. Mais j''ai dit que quiconque d''entre vous deviendra petit connaîtra le Royaume et deviendra plus grand que Jean.” »'
  - type: text
    content: Je vous le dis, parmi ceux qui sont nés de femmes, il n'y en a pas de plus grand que Jean. Cependant, le plus petit dans le royaume de Dieu est plus grand que lui.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Tout le peuple… 3.7,12,21 ; cf. Mt 21.32. –  l''avait écouté  : cf. Rm 10.17 ; on pourrait aussi traduire qui l''a écouté… ont justifié… (30) ont rejeté… Les v. 29s peuvent se comprendre comme la suite des paroles de Jésus ou, plus probablement, comme un commentaire de l''auteur. –  collecteurs des taxes 3.12+ ; Mc 2.15n. –  avaient justifié Dieu (c.-à-d. lui avaient donné raison ) : le même verbe revient v. 35 ; 10.29 ; 16.15 ; 18.14.'
  - type: text
    content: 'Tout le peuple qui l''avait écouté, et les collecteurs des taxes, avaient justifié Dieu en recevant le baptême de Jean ; '
  '3':
  - type: note
    content: 'entendit parler de Jésus 4.37. –  anciens  : cf. 20.1 ; 22.52 ; Ac 4.5,8,23. –  sauver  : voir Mt 14.36n (même verbe).'
  - type: text
    content: 'Il entendit parler de Jésus et lui envoya quelques anciens des Juifs pour lui demander de venir sauver son esclave. '
  '30':
  - type: note
    content: 'les spécialistes de la loi 10.25 ; 11.45s,52 ; 14.3 ; Mt 22.35. Voir scribe et pharisiens  ; 5.21+. –  avaient rejeté  : autres traductions ont fait échouer, ont réduit à néant, cf. 10.16 ; Ps 33.10s ; Rm 10.3. –  les décisions (ou la décision) de Dieu à leur égard  : autre traduction ont rejeté, pour leur part, les décisions de Dieu  ; même mot en 23.51 ; voir aussi 10.22 ; 22.42n  ; on retrouve le même terme Ac 2.23 ; 4.28 ; 13.36 ; 20.27 ; Ep 1.11.'
  - type: text
    content: mais les pharisiens et les spécialistes de la loi, en ne recevant pas de lui le baptême, avaient rejeté les décisions de Dieu à leur égard.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Cf. 13.18,20 ; Es 40.18,25 ; 46.5 ; Ez 31.2 ; Lm 2.13. –  génération 1.48,50 ; 9.41 ; 11.29ss,50s ; 17.25 ; 21.32 ; Ac 2.40 ; voir aussi Mt 12.39+.
  - type: text
    content: 'A qui donc comparerai-je les gens de cette génération ? A qui sont-ils semblables ? '
  '32':
  - type: note
    content: 'Cf. Pr 29.9. –  nous avons chanté  : certains mss précisent nous vous avons chanté.'
  - type: text
    content: 'Voici à quoi ils sont semblables : des enfants assis sur la place publique, qui s''appellent les uns les autres pour dire :'
  - type: text
    content: Nous vous avons joué de la flûte, et vous n'avez pas dansé ;
  - type: text
    content: nous avons chanté des complaintes, et vous n'avez pas pleuré.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'pas de vin  : cf. 1.15. –  Il a un démon  : l''expression peut signifier il est fou , cf. Jn 10.20s.'
  - type: text
    content: 'Car Jean le Baptiseur est venu, il ne mangeait pas de pain et ne buvait pas de vin, et vous dites : « Il a un démon ! » '
  '34':
  - type: note
    content: 'Fils de l''homme 5.24+. –  mangeant et buvant v. 36ss ; 11.37 ; 14.1 ; 15.2 ; 19.7. –  glouton…  : cf. Dt 21.20 ; 1Co 15.32. –  ami…  : cf. v. 36ss ; 5.27ss ; 15.1ss ; 19.1ss ; 23.40ss ; voir aussi péché.'
  - type: text
    content: 'Le Fils de l''homme est venu, mangeant et buvant, et vous dites : « C''est un glouton et un buveur, un ami des collecteurs des taxes, des pécheurs ! » '
  '35':
  - type: note
    content: 'la sagesse  : cf. 2.40,52 ; 11.31,49n  ; 21.15 ; voir aussi 1Co 1.24ss. –  justifiée v. 29+. –  par ou de par tous ses enfants  : cf. Pr 8.32 ; Siracide 4.11 : « La sagesse exalte ses fils, et prend soin de ceux qui la recherchent. » Voir aussi Jn 1.12.'
  - type: text
    content: Mais la sagesse a été justifiée par tous ses enfants.
  - type: heading
    content: Jésus et la pécheresse
  - type: heading
    content: Cf. Mt 26.6-13  ; Mc 14.3-9  ; Jn 12.1-8
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 34+. –  pharisiens v. 30 ; 5.17+ ; cf. 11.37 ; 14.1. –  chez le pharisien  : litt. dans la maison du pharisien , de même dans la suite. –  s''installa à table  : litt. s''étendit (en s''accoudant, comme on le faisait dans les grandes occasions, la tête vers la table et les pieds vers l''extérieur, v. 38) ; cf. 11.37 ; 12.37 ; 13.29 ; 14.7ss ; 17.7 ; 20.46 ; 22.14 ; 24.30.'
  - type: text
    content: 'Un des pharisiens l''invita à manger avec lui. Il entra donc chez le pharisien et s''installa à table. '
  '37':
  - type: note
    content: Mc 14.3/ /. –  pécheresse v. 39,47.
  - type: text
    content: 'Or une femme, une pécheresse de la ville, sut qu''il était à table chez le pharisien ; elle apporta un flacon d''albâtre plein de parfum '
  '38':
  - type: note
    content: 'Cf. Jn 12.3. –  derrière lui  : cf. 9.23n. –  les pieds de Jésus  : litt. ses pieds. –  les embrassait v. 45 ; Mc 14.45n.'
  - type: text
    content: 'et se tint derrière lui, à ses pieds. Elle pleurait et se mit à mouiller de ses larmes les pieds de Jésus ; elle les essuyait avec ses cheveux, les embrassait et répandait sur eux du parfum. '
  '39':
  - type: note
    content: prophète v. 16+,26 ; Jn 4.19 ; certains mss portent le prophète (cf. Dt 18.15 ; Ac 3.22s ; 7.37).
  - type: text
    content: 'En voyant cela, le pharisien qui l''avait invité se dit : Si cet homme était prophète, il saurait qui est la femme qui le touche et ce qu''elle est : une pécheresse.'
  '4':
  - type: note
    content: 'Il est digne…  : cf. v. 6s.'
  - type: text
    content: 'Ils arrivèrent auprès de Jésus et le supplièrent d''une manière pressante en disant : Il est digne que tu lui accordes cela, '
  '40':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.22 ; 6.8 ; voir aussi Gn 24.33s. –  Simon  : cf. Mc 14.3. –  Maître 3.12n.'
  - type: text
    content: 'Jésus lui dit : Simon, j''ai quelque chose à te dire. – Maître, parle, répondit-il. '
  '41':
  - type: note
    content: 'débiteurs  : cf. 16.5. –  deniers  : pièces d''argent ; un denier correspondait au salaire d''une journée de travail d''un ouvrier selon Mt 20.2 (voir mesures, poids et monnaies).'
  - type: text
    content: '– Un créancier avait deux débiteurs ; l''un devait cinq cents deniers et l''autre cinquante. '
  '42':
  - type: note
    content: il leur fit grâce v. 21n  ; Col 2.13 ; cf. Mt 18.26s.
  - type: text
    content: 'Comme ils n''avaient pas de quoi le rembourser, il leur fit grâce à tous les deux. Lequel des deux l''aimera le plus ? '
  '43':
  - type: note
    content: 'bien jugé  : cf. 10.28 ; 20.21n.'
  - type: text
    content: 'Simon répondit : Je suppose que c''est celui à qui il a fait grâce de la plus grosse somme. Il lui dit : Tu as bien jugé. '
  '44':
  - type: note
    content: 'tu ne m''as pas donné d''eau pour mes pieds  : autre traduction, moins vraisemblable, tu ne m''as pas versé d''eau sur les pieds  ; cf. Gn 18.4 ; 19.2 ; 24.32 ; 43.24 ; 1S 25.41 ; voir aussi Jn 12.3 ; 13.5nss ; 1Tm 5.10.'
  - type: text
    content: 'Puis il se tourna vers la femme et dit à Simon : Tu vois cette femme ? Je suis entré chez toi, et tu ne m''as pas donné d''eau pour mes pieds ; mais elle, elle a mouillé mes pieds de ses larmes et les a essuyés avec ses cheveux. '
  '45':
  - type: note
    content: 'depuis que je suis entré  : on a aussi compris elle, de chez qui je suis venu (chez toi)  ; certains mss portent depuis qu''elle est entrée. –  m''embrasser v. 38+ ; cf. 22.47s ; Rm 16.16+.'
  - type: text
    content: 'Tu ne m''as pas donné de baiser, mais elle, depuis que je suis entré, elle n''a pas cessé de m''embrasser les pieds. '
  '46':
  - type: note
    content: 'sur mes pieds  : cette précision est omise par certains mss ; cf. Jn 11.2 ; voir aussi Ps 23.5.'
  - type: text
    content: 'Tu n''as pas répandu d''huile sur ma tête ; mais elle, elle a répandu du parfum sur mes pieds. '
  '47':
  - type: note
    content: 'Cf. 19.8s. –  celui à qui…  : cf. 18.10ss.'
  - type: text
    content: 'C''est pourquoi, je te le dis, ses nombreux péchés sont pardonnés, puisqu''elle a beaucoup aimé. Mais celui à qui l''on pardonne peu aime peu. '
  '48':
  - type: note
    content: Cf. 5.20/ /.
  - type: text
    content: 'Et il dit à la femme : Tes péchés sont pardonnés.'
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'qui va jusqu''à pardonner…  : autre traduction qui pardonne même les péchés  ; cf. 5.21+.'
  - type: text
    content: 'Ceux qui étaient à table avec lui commencèrent à se dire : Qui est-il, celui-ci, qui va jusqu''à pardonner les péchés ? '
  '5':
  - type: note
    content: 'Cf. Ac 10.2. –  il aime…  : cf. 6.27. –  synagogue  : cf. 4.33.'
  - type: text
    content: 'car il aime notre nation, et c''est lui qui a construit notre synagogue. '
  '50':
  - type: note
    content: 8.48 ; cf. 1.79+ ; 17.19 ; 18.42 ; Mc 5.34+ ; Ac 3.16 ; 16.36. –  va en paix 8.48.
  - type: text
    content: 'Mais il dit à la femme : Ta foi t''a sauvée ; va en paix.'
  '6':
  - type: note
    content: 's''en alla avec eux  : cf. Ac 10.20,23. –  ne prends pas tant de peine  : le même verbe grec est traduit par importuner 8.49. –  ce serait trop d''honneur…  : cf. 3.16+ ; voir aussi 17.10. –  que tu entres…  : cf. Ac 10.28 ; 11.3,12.'
  - type: text
    content: 'Jésus s''en alla avec eux. Il n''était plus très loin de la maison quand le centurion envoya des amis lui dire : Seigneur, ne prends pas tant de peine, car ce serait trop d''honneur pour moi que tu entres sous mon toit. '
  '7':
  - type: note
    content: 'dis une parole ou un mot  ; comparer avec 5.17 ; 6.19. –  et que…  : certains mss portent et mon serviteur (voir Mt 8.6n) sera guéri, comme dans Mt 8.8.'
  - type: text
    content: 'C''est aussi pour cela que je ne me suis pas jugé digne de venir en personne vers toi. Mais dis une parole, et que mon serviteur soit guéri ! '
  '8':
  - type: note
    content: 'de mes supérieurs  : sous-entendu dans le texte. Sur l’autorité de Jésus, cf. 4.32+.'
  - type: text
    content: 'Car je suis moi-même soumis à l''autorité de mes supérieurs et j''ai des soldats sous mes ordres ; je dis à l''un : « Va ! » et il va, à l''autre : « Viens ! » et il vient, et à mon esclave : « Fais ceci ! » et il le fait. '
  '9':
  - type: note
    content: 'se tourna…  : autre traduction se tourna et dit à la foule…  ; cf. v. 44 ; 9.55 ; 10.23 ; 14.25 ; 22.61 ; 23.28. –  trouvé une telle foi  : cf. 18.8.'
  - type: text
    content: 'Lorsque Jésus entendit ces paroles, il s''étonna à son sujet, se tourna vers la foule qui le suivait et dit : Je vous le dis, même en Israël je n''ai pas trouvé une telle foi. '
