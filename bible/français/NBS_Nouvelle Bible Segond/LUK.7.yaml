    marker-yv: yv-n
  - type: text
    text: 'Ceux qui étaient à table avec lui commencèrent à se dire : Qui est-il, celui-ci, qui va jusqu''à pardonner les péchés ? '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '50'
  - type: usfm
    marker: f
    children:
    - type: usfm
