      marker: ft
      children:
      - type: text
        text: 4.23+.
    marker-yv: yv-n
  - type: text
    text: Après avoir achevé tous ces discours au peuple qui l'écoutait, il entra à Capharnaüm.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Un centurion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : cf. Ac 10.1ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur le point de mourir
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même construction, avec un autre verbe équivalent, en Jn 4.47. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: qui lui était très cher
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : comparer l''attitude de ce '
      - type: usfm
        marker: w
        children:
        - type: text
          text: non-juif
      - type: text
        text: ' avec celle du '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samaritain
      - type: text
        text: ' de 10.25ss.'
    marker-yv: yv-n
  - type: text
    text: 'Un centurion avait un esclave malade qui était sur le point de mourir et qui lui était très cher. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'entendit parler de Jésus '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.37. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: anciens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 20.1 ; 22.52 ; Ac 4.5,8,23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sauver
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Mt 14.36'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ' (même verbe).'
    marker-yv: yv-n
  - type: text
    text: 'Il entendit parler de Jésus et lui envoya quelques anciens des Juifs pour lui demander de venir sauver son esclave. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il est digne…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. v. 6s.'
    marker-yv: yv-n
  - type: text
    text: 'Ils arrivèrent auprès de Jésus et le supplièrent d''une manière pressante en disant : Il est digne que tu lui accordes cela, '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.5 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. Ac 10.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il aime…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 6.27. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: synagogue
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.33.'
    marker-yv: yv-n
  - type: text
    text: 'car il aime notre nation, et c''est lui qui a construit notre synagogue. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: s'en alla avec eux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 10.20,23. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ne prends pas tant de peine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe grec est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'importuner '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '8.49. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ce serait trop d'honneur…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 3.16+ ; voir aussi 17.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: que tu entres…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 10.28 ; 11.3,12.'
    marker-yv: yv-n
  - type: text
    text: 'Jésus s''en alla avec eux. Il n''était plus très loin de la maison quand le centurion envoya des amis lui dire : Seigneur, ne prends pas tant de peine, car ce serait trop d''honneur pour moi que tu entres sous mon toit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'dis une parole '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un mot
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; comparer avec 5.17 ; 6.19. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: et que…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'et mon serviteur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (voir Mt 8.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sera guéri
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme dans Mt 8.8.'
    marker-yv: yv-n
  - type: text
    text: 'C''est aussi pour cela que je ne me suis pas jugé digne de venir en personne vers toi. Mais dis une parole, et que mon serviteur soit guéri ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de mes supérieurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : sous-entendu dans le texte. Sur l’'
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'autorité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: de Jésus, cf. 4.32+.
    marker-yv: yv-n
  - type: text
    text: 'Car je suis moi-même soumis à l''autorité de mes supérieurs et j''ai des soldats sous mes ordres ; je dis à l''un : « Va ! » et il va, à l''autre : « Viens ! » et il vient, et à mon esclave : « Fais ceci ! » et il le fait. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se tourna…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: se tourna et dit à la foule…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 44 ; 9.55 ; 10.23 ; 14.25 ; 22.61 ; 23.28. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: trouvé une telle foi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.8.'
    marker-yv: yv-n
  - type: text
    text: 'Lorsque Jésus entendit ces paroles, il s''étonna à son sujet, se tourna vers la foule qui le suivait et dit : Je vous le dis, même en Israël je n''ai pas trouvé une telle foi. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'esclave
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : quelques mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''esclave malade '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le malade.
    marker-yv: yv-n
  - type: text
    text: De retour à la maison, les envoyés trouvèrent l'esclave en bonne santé.
- type: usfm
  marker: s1
  children:
  - type: text
    text: Le jeune homme de Naïn
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ensuite
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : certains mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le (jour) suivant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' ; cf. 8.1. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Naïn
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : dans le sud de la Galilée, à près d''une quarantaine de kilomètres de Capharnaüm. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ses disciples '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou, selon quelques mss, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: un assez grand nombre de ses disciples
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text:  ; cf. v. 9 ; 6.17.
    marker-yv: yv-n
  - type: text
    text: 'Ensuite il se rendit dans une ville appelée Naïn ; ses disciples et une grande foule faisaient route avec lui. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 8.49ss ; 1R 17.17-24 ; 2R 4.32-37. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lorsqu'il approcha…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 15.25 ; 19.29,41 ; 1R 17.10. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'fils unique '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.42 ; 9.38 ; cf. 1R 17.12 ; Jr 6.26 ; Am 8.10 ; Za 12.10.
    marker-yv: yv-n
  - type: text
    text: 'Lorsqu''il approcha de la porte de la ville, on portait en terre un mort, fils unique de sa mère, qui était veuve ; et il y avait avec elle une importante foule de la ville. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Le Seigneur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'v. 19 ; 10.1,39,41 ; 11.39 ; 12.42 ; 13.15 ; 17.5s ; 18.6 ; 19.8,31,34 ; 20.44 ; 22.61 ; 24.3,34 ; cf. 1.43 ; 2.11 ; Mt 21.3 ; Mc 11.3 ; Ac 1.21 ; 4.33 ; 5.14 ; 8.16 etc. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'ému '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 10.33 ; 15.20 ; Mt 9.36
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ne pleure pas '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 8.52 ; Ap 5.5.
    marker-yv: yv-n
  - type: text
    text: 'Le Seigneur la vit ; il fut ému par elle et lui dit : Ne pleure pas ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'toucha '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '5.13+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: je te l'ordonne
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: je te dis
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'réveille-toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'lève-toi '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(même verbe v. 16, et pour '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: ressusciter
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 22) ; cf. 1.69
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 5.23s ; 6.8 ; 8.54 ; 9.7,22 ; 20.37 ; 24.6,34 ; voir aussi Mc 5.41/ / ; Ac 3.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Il s''approcha et toucha le cercueil. Ceux qui le portaient s''arrêtèrent. Il dit : Jeune homme, je te l''ordonne, réveille-toi ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''assit… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Ac 9.40ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le rendit à sa mère '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 9.42 ; 1R 17.23 ; cf. 2R 4.36.
    marker-yv: yv-n
  - type: text
    text: 'Et le mort s''assit et se mit à parler. Il le rendit à sa mère. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'saisis de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '1.65+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifiaient
      - type: text
        text: ' Dieu '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2.20+. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophète
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '24.19 ; cf. 4.24,27 ; 9.8 ; 13.33 ; Mt 21.11 ; voir aussi Dt 18.15ss ; 1R 17.17ss ; Ml 3.23s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''est levé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'a été suscité '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 14
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 9.8,19 ; cf. 3.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 11.31 ; Jg 2.16ss ; 3.9 ; Es 45.13 ; Dn 8.18. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'est intervenu… '
    - type: usfm
      marker: ft
      children:
