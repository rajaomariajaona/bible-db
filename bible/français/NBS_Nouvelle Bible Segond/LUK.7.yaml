    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'm''embrasser '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 38+ ; cf. 22.47s ; Rm 16.16+.
    marker-yv: yv-n
  - type: text
    text: 'Tu ne m''as pas donné de baiser, mais elle, depuis que je suis entré, elle n''a pas cessé de m''embrasser les pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '46'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.46 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur mes pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cette précision est omise par certains mss ; cf. Jn 11.2 ; voir aussi Ps 23.5.'
    marker-yv: yv-n
  - type: text
    text: 'Tu n''as pas répandu d''huile sur ma tête ; mais elle, elle a répandu du parfum sur mes pieds. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '47'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.47 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 19.8s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: celui à qui…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 18.10ss.'
    marker-yv: yv-n
  - type: text
    text: 'C''est pourquoi, je te le dis, ses nombreux péchés sont pardonnés, puisqu''elle a beaucoup aimé. Mais celui à qui l''on pardonne peu aime peu. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
