  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.48 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 5.20/ /.
    marker-yv: yv-n
  - type: text
    text: 'Et il dit à la femme : Tes péchés sont pardonnés.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
