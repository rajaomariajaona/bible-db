document_id: JOB.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Réplique de Job : l''homme pourrait-il discuter avec Dieu ?'
  - type: text
    content: 'Job répondit :'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 5.9+.
  - type: text
    content: Il fait des choses grandes et insondables,
  - type: text
    content: des choses étonnantes, sans nombre.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 23.3,8s ; 35.14.
  - type: text
    content: Il passe près de moi, et je ne le vois pas ;
  - type: text
    content: il disparaît, et je ne le comprends pas.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Qui ramènera…  : litt. voici, il arrache ; qui le ramènera ?'
  - type: text
    content: Qui ramènera ce qu'il arrache ?
  - type: text
    content: 'Qui lui dira : « Que fais-tu ? »'
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'les appuis (litt. les aides ) de Rahav  : monstre marin associé au chaos, qui s''oppose à l''œuvre créatrice de Dieu ; certains comprennent ici les appuis de l''orgueilleux  ; cf. 26.12n  ; Es 30.7n  ; 51.9 ; Ps 87.4n  ; 89.11n.'
  - type: text
    content: Dieu ne retire pas sa colère ;
  - type: text
    content: devant lui s'effondrent les appuis de Rahav.
  '14':
  - type: text
    content: ' '
  - type: note
    content: V. 32 ; Es 29.16 ; Ec 6.10 ; cf. Rm 9.20.
  - type: text
    content: Et moi, comment pourrais-je lui répondre ?
  - type: text
    content: Quelles paroles choisirais-je devant lui ?
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'je ne répondrais pas  : des versions anciennes ont lu il (ou on ) ne m''exaucerait pas.'
  - type: text
    content: Quand je serais juste, je ne répondrais pas ;
  - type: text
    content: je supplierais mon juge.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'qu''il me réponde  : un ms de LXX porte qu''il ne m''écoute pas . –  qu''il ait prêté l''oreille  : litt. qu''il ait prêté l''oreille à ma voix.'
  - type: text
    content: Si j'appelais et qu'il me réponde,
  - type: text
    content: je ne croirais pas qu'il ait prêté l'oreille,
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'par une tempête 38.1 ; 40.6 ; autre lecture possible de l''hébreu  : pour un cheveu . –  sans raison 1.9n.'
  - type: text
    content: lui qui m'assaille par une tempête,
  - type: text
    content: qui multiplie sans raison mes blessures,
  '18':
  - type: text
    content: ' '
  - type: note
    content: 7.19+.
  - type: text
    content: qui ne me laisse pas reprendre mon souffle,
  - type: text
    content: tant il me rassasie d'amertume.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'qui me fera comparaître  : certains modifient la vocalisation du texte hébreu traditionnel pour lire qui le fera comparaître  ; cf. Jr 49.19n.'
  - type: text
    content: S'il s'agit de force, le puissant, c'est lui !
  - type: text
    content: Et s'il s'agit de droit, qui me fera comparaître ?
  '2':
  - type: text
    content: ' '
  - type: note
    content: avec Dieu 4.17+.
  - type: text
    content: C'est vrai, je sais bien qu'il en est ainsi ;
  - type: text
    content: comment l'homme serait-il juste avec Dieu ?
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'me condamnerait  : autre traduction me déclarerait méchant  ; voir juste  ; cf. v. 29 ; même formule en 10.2 ; 15.6 ; 32.2s ; 34.12n,17,29 ; 40.8 ; Dt 25.1n  ; 1R 8.32n. –  elle me donnerait tort  : autre traduction il me donnerait tort  ; cf. 10.15.'
  - type: text
    content: Si j'étais juste, ma propre bouche me condamnerait ;
  - type: text
    content: si j'étais intègre, elle me donnerait tort.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Suis-je intègre…  : litt. intègre moi, je ne connais pas mon être (autre traduction ma vie , cf. Gn 1.20n). On pourrait aussi comprendre  : intègre, je le suis, mais je ne tiens pas à ma vie . –  je rejette  : autres traductions je méprise ; je renonce à  ; cf. 7.16n.'
  - type: text
    content: Suis-je intègre ? Je ne m'occupe pas de moi-même,
  - type: text
    content: je rejette ma propre vie.
  '22':
  - type: text
    content: ' '
  - type: note
    content: Ec 7.15 ; 8.14 ; 9.2s ; cf. Ez 21.8.
  - type: text
    content: Qu'importe, après tout ?
  - type: text
    content: 'C''est pourquoi je le dis :'
  - type: text
    content: il supprime l'homme intègre aussi bien que le méchant.
  '23':
  - type: text
    content: ' '
  - type: note
    content: '8.20. –  une destruction  : autre traduction une inondation (cf. Es 28.15,18) ; le même terme (ou un synonyme) désigne un fouet en 1R 12.11,14 etc.'
  - type: text
    content: Quand une destruction répand soudain la mort,
  - type: text
    content: il se moque de l'épreuve des innocents.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'livrée Gn 9.2n. –  voile  : litt. couvre . –  des juges  : litt. de ses juges (ceux de la terre) ; cf. Ec 4.1.'
  - type: text
    content: La terre est livrée aux méchants ;
  - type: text
    content: il voile la face des juges.
  - type: text
    content: Si ce n'est pas lui, qui est-ce donc ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: rapides 7.6. –  coureur ou courrier (2Ch 30.6n).
  - type: text
    content: Mes jours sont plus rapides qu'un coureur ;
  - type: text
    content: ils fuient sans avoir vu le bonheur ;
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'aigle 39.27-30. –  proie  : litt. nourriture  ; cf. Ha 1.8.'
  - type: text
    content: ils passent comme les bateaux de jonc,
  - type: text
    content: comme l'aigle qui fond sur sa proie.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 8.21. –  ma tristesse  : litt. ma face.'
  - type: text
    content: 'Si je dis : « Je veux oublier ma plainte,'
  - type: text
    content: laisser ma tristesse, reprendre courage »,
  '28':
  - type: text
    content: ' '
  - type: note
    content: 8.6.
  - type: text
    content: je suis effrayé par toutes mes peines.
  - type: text
    content: Je sais que tu ne me tiendras pas pour innocent.
  '29':
  - type: text
    content: ' '
  - type: note
    content: le méchant ou le coupable  ; autres traductions qui serai condamné ; qui aurai tort  ; cf. v. 20 ; 13.18.
  - type: text
    content: C'est moi qui serai le méchant !
  - type: text
    content: Pourquoi me fatiguer futilement ?
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'V. 32 ; 13.18 ; 22.4 ; 33.13 ; cf. Es 41.1 ; Mi 6.1-8. –  chercher querelle  : le verbe hébreu correspondant est traduit ailleurs par accuser, faire un procès (cf. 33.13 ; voir aussi 10.2 ; 13.19 ; 23.6 ; 40.2). On peut comprendre si l''homme voulait chercher querelle à Dieu , ou le contraire.'
  - type: text
    content: S'il voulait lui chercher querelle,
  - type: text
    content: il ne lui répondrait pas même une fois sur mille.
  '30':
  - type: text
    content: ' '
  - type: note
    content: 14.4,17 ; Es 1.18 ; Jr 2.22 ; Ps 51.9 ; Mc 9.3 ; sur la lessive (autre traduction potasse , cf. Es 1.25n), voir Jr 2.22n (terme apparenté) ; le mot qui apparaît ici est traduit par pureté en 22.30 ; Ps 18.21,25.
  - type: text
    content: Si je me lavais dans la neige,
  - type: text
    content: si je me nettoyais les mains avec de la lessive,
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'fosse  : peut-être ici une sorte de fosse à purin ; ailleurs le terme évoque la mort (17.14 ; 33.18,22,24,28,30). Des versions anciennes portent la fange . Cf. 30.19.'
  - type: text
    content: tu me plongerais dans la fosse,
  - type: text
    content: et mes vêtements m'auraient en abomination.
  '32':
  - type: text
    content: ' '
  - type: note
    content: V. 3+,14+. –  pas un homme Nb 23.19 ; Os 11.9n.
  - type: text
    content: Il n'est pas un homme comme moi,
  - type: text
    content: pour que je lui réponde,
  - type: text
    content: pour que nous entrions ensemble en jugement.
  '33':
  - type: text
    content: ' '
  - type: note
    content: 'Il n''y a pas…  : quelques mss hébreux et versions anciennes portent s''il existait… –  arbitre  : autres traductions médiateur, conciliateur  ; 16.21.'
  - type: text
    content: Il n'y a pas entre nous d'arbitre
  - type: text
    content: qui puisse poser sa main sur nous deux.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'son bâton 21.9 ; cf. Es 9.3n  ; Ps 23.4 ; Lm 3.1. –  ne me remplisse plus d''effroi  : même racine hébraïque en 6.4+ ; même verbe en 13.21 ; 15.24 ; 33.7. Voir crainte.'
  - type: text
    content: Qu'il éloigne son bâton de moi,
  - type: text
    content: que sa terreur ne me remplisse plus d'effroi !
  '35':
  - type: text
    content: ' '
  - type: note
    content: 'je parlerai 7.11+. –  Mais…  : litt. car pas ainsi moi avec moi  ; certains modifient le texte hébreu et traduisent mais je ne suis pas comme cela avec lui (Dieu) ; mais il (Dieu) n''est pas juste avec moi ou bien que je ne sois pas juste devant lui.'
  - type: text
    content: Alors je parlerai et je ne le craindrai pas.
  - type: text
    content: Mais puisqu'il n'en est pas ainsi, je reste seul avec moi !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Sage…  : litt. sage de cœur (même formule en 37.24 ; autre traduction habile ) et vigoureux de puissance (formule très proche en 36.19 ; la même formule est traduite par force puissante en Es 40.26) ; certains comprennent l''expression comme s''appliquant à Dieu et traduisent il est sage et puissant . –  impunément  : litt. et resterait entier.'
  - type: text
    content: Sage ou puissant,
  - type: text
    content: qui lui résisterait impunément ?
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'renverse  : cf. 34.25, le verbe correspondant est traduit par détruire en Gn 19.21n.'
  - type: text
    content: Il déplace les montagnes sans qu'elles le sachent,
  - type: text
    content: il les renverse dans sa colère.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Il fait trembler Es 13.13 ; Ps 114.7 ; Hé 12.26. –  sur sa base (litt. hors de son lieu ) / ses colonnes  : cf. 14.18 ; 38.6 ; 1S 2.8 ; Es 13.13 ; Ps 75.4 ; 104.5.'
  - type: text
    content: Il fait trembler la terre sur sa base,
  - type: text
    content: et ses colonnes sont ébranlées.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 13.10 ; Jl 2.10 ; Am 8.9 ; Mt 24.29/ /. –  il appose un sceau  : autre traduction il cache.'
  - type: text
    content: Il parle au soleil, et le soleil ne paraît pas ;
  - type: text
    content: il appose un sceau sur les étoiles.
  '8':
  - type: text
    content: ' '
  - type: note
    content: déploie le ciel Es 40.22 ; 44.24 ; Jr 10.12 ; Ps 104.2. –  mer 7.12+ ; cf. Gn 1.6ns ; Am 4.13 ; Mt 14.25/ /.
  - type: text
    content: Seul, il déploie le ciel,
  - type: text
    content: il marche sur les hauteurs de la mer.
  '9':
  - type: text
    content: ' '
  - type: note
    content: les Chambres du Sud ou les Chambres de Témân (cf. 2.11n). Il s'agit peut-être d'une constellation ou d'un groupe de constellations particulier du ciel austral, mais nous ne pouvons plus le savoir avec certitude. L'identification des autres constellations mentionnées dans ce verset est plus probable, mais elle ne correspond pas pour autant à une certitude absolue (voir aussi 38.31s ; Am 5.8). Sur Orion , voir aussi Es 13.10n.
  - type: text
    content: Il fait la Grande Ourse, Orion et les Pléiades,
  - type: text
    content: et les Chambres du Sud.
