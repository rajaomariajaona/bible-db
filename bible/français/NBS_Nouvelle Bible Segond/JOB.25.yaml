document_id: JOB.25,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Intervention de Bildad : on ne discute pas avec le Puissant'
  - type: text
    content: 'Bildad le Shouhite répondit :'
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'C''est à lui qu''appartiennent  : litt. avec lui , c.-à-d. avec Dieu . –  domination Ps 103.19 ; cf. 1Jn 5.19. –  frayeur  : voir crainte. – Voir paix.'
  - type: text
    content: C'est à lui qu'appartiennent la domination et la frayeur ;
  - type: text
    content: il fait la paix dans ses hauteurs.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'troupes  : cf. Es 24.21 ; 40.26.'
  - type: text
    content: Y a-t-il une limite au nombre de ses troupes ?
  - type: text
    content: Sur qui sa lumière ne se lève-t-elle pas ?
  '4':
  - type: text
    content: ' '
  - type: note
    content: 4.17+ ; 14.1-4. – Voir justice et pur.
  - type: text
    content: Comment un homme serait-il juste devant Dieu ?
  - type: text
    content: Comment celui qui est né de la femme serait-il pur ?
  '5':
  - type: text
    content: La lune elle-même n'est pas brillante,
  - type: text
    content: les étoiles ne sont pas pures à ses yeux ;
  '6':
  - type: text
    content: ' '
  - type: note
    content: '4.19. –  être humain  : litt. fils d''homme  ; cf. 16.21.'
  - type: text
    content: combien moins l'homme, qui n'est qu'un ver,
  - type: text
    content: l'être humain, qui n'est qu'un vermisseau !
