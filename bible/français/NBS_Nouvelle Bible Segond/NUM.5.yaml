    - type: text
      text: 'Le prêtre fera prononcer un serment à la femme ; il lui dira : « Si aucun homme n''a couché avec toi et si, étant sous l''autorité de ton mari, tu ne t''es pas dévoyée en te rendant impure, sois innocentée par cette eau amère qui apporte la malédiction. '
