document_id: NUM.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les gens en état d'impureté exclus du camp
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'Texte obscur et traduction incertaine, litt. un homme, ses choses consacrées seront à lui ; un homme, ce qu''il donne au prêtre sera à lui. Ce v. indique peut-être que les dons volontaires viennent en surplus de la part réservée aux prêtres sur les offrandes. –  aura pour lui  : certains mss portent une négation, qui pourrait signifier nul n''aura pour lui-même ce qu''il consacre.'
  - type: text
    content: Il aura pour lui ce que chacun consacre ; il aura pour lui ce que chacun donne au prêtre.
  - type: heading
    content: La femme soupçonnée d'adultère
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Cette loi, unique en son genre dans l''A.T., prescrit ce qu''on appelle communément une « ordalie », c.-à-d. une procédure qui remet le sort de l''accusé entre les mains du dieu pour déterminer sa culpabilité. Souvent, dans le Proche-Orient ancien, cette sorte de rituel comporte un geste dangereux, voire mortel (absorption de poison, épreuve du feu ou de l''eau) : la divinité doit intervenir pour sauver l''innocent le cas échéant. Ici le rituel imposé à la femme ne semble pas impliquer un péril naturel. Sur ce type de démarche, comparer Jos 7.10s ; 1S 14.41s ; Jr 8.14ss ; Ez 23.31ss ; Jon 1.7 ; Mi 6.1-16. Cf. Code d''Hammourabi 131s : « Si une femme est accusée par son mari, mais qu''elle n''ait pas été surprise en train de coucher avec un autre homme, elle déclarera (son innocence) devant le dieu et elle retournera chez elle. Si l''on a pointé du doigt la femme d''un homme à cause d''un autre homme, mais qu''elle n''ait pas été surprise en train de coucher avec cet autre homme, elle se jettera dans la rivière (épreuve de l''eau) à cause de son mari. »'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '12':
  - type: note
    content: 'lui est infidèle  : la racine hébraïque correspondante évoque habituellement un sacrilège envers Dieu (v. 6+) ; ici, exceptionnellement, il s''agit d''une faute envers un homme ; de même au v. 27 ; voir aussi Jb 21.34n  ; Pr 16.10n.'
  - type: text
    content: 'Parle aux Israélites ; tu leur diras : Si un homme a une femme qui se dévoie et qui lui est infidèle ; '
  '13':
  - type: note
    content: 'si un autre homme…  : litt. qu''un homme couche avec elle, couche de semence (c.-à-d. avec éjaculation), cf. v. 19. –  sans que son mari s''en aperçoive  : litt. et cela est caché aux yeux de son mari (cf. Lv 4.13n) ; plusieurs mss de Smr ont lu et qu''elle l''ait caché…  ; cf. Lv 20.10 ; Dt 22.22 ; Jn 8.1-11. –  impure  : voir pur. –  sans qu''il y ait de témoin contre elle  : cf. 35.30 ; Dt 17.6 ; 19.15.'
  - type: text
    content: 'si un autre homme a des rapports sexuels avec elle, sans que son mari s''en aperçoive ; si elle s''est rendue impure en secret, sans qu''il y ait de témoin contre elle et sans qu''elle ait été prise sur le fait ; '
  '14':
  - type: note
    content: un souffle (ou un esprit, l'Esprit) de passion jalouse (ou de jalousie) v. 30 ; cf. Os 4.12n.
  - type: text
    content: 'si un souffle de passion jalouse passe sur lui, s''il est jaloux de sa femme, celle-ci s''étant rendue impure ; ou bien si un souffle de passion jalouse passe sur lui, s''il est jaloux de sa femme, alors qu''elle ne s''est pas rendue impure ; '
  '15':
  - type: note
    content: 'un dixième d''épha  : environ 3,6 l. –  farine d''orge, nourriture des plus pauvres Jg 7.13 ; Rt 2.17 ; Jn 6.9,13. –  il n''y versera pas d''huile ou, d''après certains mss, il ne versera pas d''huile sur elle  ; cf. Lv 2 ; 5.11s. –  encens Ex 30.34n  ; Lv 2.1n. –  offrande végétale  : cf. 4.16 ; Lv 2.1n  ; voir sacrifices. –  évocation  : cf. Hé 10.3.'
  - type: text
    content: 'alors l''homme amènera sa femme au prêtre et apportera en présent pour elle un dixième d''épha de farine d''orge ; il n''y versera pas d''huile et n''y mettra pas d''encens, car c''est une offrande végétale pour la passion jalouse, une offrande végétale d''évocation, qui évoque une faute. '
  '16':
  - type: text
    content: 'Le prêtre la présentera, debout, devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'de l''eau sacrée  : peut-être, à l''origine, provenant d''une source sacrée ; cf. 19.9 ; Ex 30.18 ; 40.30ss ; LXX de l''eau pure, vive, cf. 19.17 ; Lv 14.5s,52 ; voir aussi saint. –  récipient de terre  : cf. Lv 6.21. –  de la poussière  : ce geste rituel est peut-être à interpréter dans la ligne des signes de deuil, de tristesse ou de pénitence, comme les cheveux défaits au v. 18 ; voir cependant 19.17n.'
  - type: text
    content: 'Le prêtre prendra de l''eau sacrée dans un récipient de terre ; le prêtre prendra de la poussière sur le sol de la Demeure et la mettra dans l''eau. '
  '18':
  - type: note
    content: 'défera les cheveux (litt. la tête) v. 17n  ; 6.5n  ; Lv 10.6 ; 13.45 ; 21.10. –  l''eau amère…  : jeu d''assonance en hébreu, mé ha-marim ha-me''ararim  ; des versions anciennes ont compris qui révèle, qui confond, qui condamne, au lieu de qui apporte la malédiction  ; cf. v. 19,24,27 ; Ex 15.23ss ; voir aussi Gn 14.7n  ; Nb 20.13n.'
  - type: text
    content: 'Le prêtre placera la femme debout devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; il lui défera les cheveux et déposera dans ses mains l''offrande végétale d''évocation, l''offrande végétale pour la passion jalouse ; le prêtre aura dans sa main l''eau amère qui apporte la malédiction. '
  '19':
  - type: note
    content: 'étant…  : litt. sous ton mari ou à la place de ton mari  ; expression analogue en Ez 16.32n  ; 23.5n  ; Os 4.12n  ; de même aux v. 20,29. –  sois innocentée par  : autre traduction sois indemne de.'
  - type: text
    content: 'Le prêtre fera prononcer un serment à la femme ; il lui dira : « Si aucun homme n''a couché avec toi et si, étant sous l''autorité de ton mari, tu ne t''es pas dévoyée en te rendant impure, sois innocentée par cette eau amère qui apporte la malédiction. '
  '2':
  - type: note
    content: 'expulser…  : cf. 12.14s. –  « lépreux »  : voir Lv 13.2n,45s ; 22.4 ; Nb 12.14s. –  un écoulement génital  : cf. Lv 15.2nss ; Dt 23.10ss ; 1S 21.5ss. –  un mort, c.-à-d. un cadavre ; cf. 6.6,11 ; 9.6ss,10 ; 19.11ss ; Lv 5.3 ; 19.28n  ; 21.1ss ; 22.4.'
  - type: text
    content: 'Ordonne aux Israélites d''expulser du camp tout « lépreux », quiconque est atteint d''un écoulement génital et quiconque est impur à cause d''un mort. '
  '20':
  - type: text
    content: 'Mais si, étant sous l''autorité de ton mari, tu t''es dévoyée et rendue impure, si un autre homme que ton mari a eu des rapports sexuels avec toi… » '
  '21':
  - type: note
    content: 'malédiction ou adjuration  : le terme hébreu qui apparaît ici et aux v. 23,27 (sujet de malédiction  ; autre terme aux v. 18,22 etc.) désigne une malédiction conditionnelle, en l''occurrence une malédiction qui ne doit s''accomplir qu''en cas d''adultère ; cf. Gn 24.41n  ; Lv 5.1n  ; Jb 31.30 ; voir aussi Es 65.15 ; Jr 29.22 ; 42.18 ; Ps 109.18 ; voir bénédiction, malédiction. –  tes cuisses / ton ventre  : il s''agit probablement d''euphémismes désignant les organes sexuels ; la formule évoque vraisemblablement la stérilité (v. 28).'
  - type: text
    content: '– le prêtre fera prononcer à la femme un serment de malédiction ; il dira à la femme : « Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te livre à la malédiction de ce serment au milieu de ton peuple, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse dépérir tes cuisses et enfler ton ventre, '
  '22':
  - type: note
    content: 'Qu''il en soit ainsi  : en hébreu ’amen, cf. Dt 27.15nss.'
  - type: text
    content: 'et que cette eau qui apporte la malédiction entre dans tes entrailles pour faire enfler ton ventre et dépérir tes cuisses ! » Et la femme dira : « Qu''il en soit ainsi ! Qu''il en soit ainsi ! » '
  '23':
  - type: note
    content: Cf. Ez 2.8–3.3 ; Ps 109.18.
  - type: text
    content: '– Le prêtre écrira ces malédictions dans un livre, puis il les effacera avec l''eau amère. '
  '24':
  - type: text
    content: 'Il fera boire à la femme l''eau amère qui apporte la malédiction, et l''eau amère qui apporte la malédiction entrera en elle pour produire l''amertume. '
  '25':
  - type: note
    content: 'l''offrande végétale pour la passion jalouse v. 15n,18. –  dédiera…  : cf. 6.20 ; 8.11nss ; 18.11,18 ; voir Lv 7.30n.'
  - type: text
    content: 'Le prêtre prendra des mains de la femme l''offrande végétale pour la passion jalouse ; il dédiera rituellement l''offrande végétale devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et il la présentera sur l''autel ; '
  '26':
  - type: note
    content: 'prendra une poignée de  : Smr et Syr ont lu prélèvera (ou élèvera) ; cf. 18.19,24 ; Ex 35.22,24. –  en évocation Lv 2.2n. –  C''est après cela…  : cf. v. 24.'
  - type: text
    content: 'le prêtre prendra une poignée de cette offrande en évocation, et il la fera fumer sur l''autel. C''est après cela qu''il fera boire l''eau à la femme. '
  '27':
  - type: note
    content: 'Quand… l''eau  : portion de texte omise par LXX et Syr ; cf. v. 20ss. –  infidèle v. 12n. –  un sujet de malédiction ou d''adjuration, v. 21n.'
  - type: text
    content: 'Quand il lui aura fait boire l''eau, si elle s''est rendue impure et si elle a été infidèle à son mari, l''eau qui apporte la malédiction entrera en elle pour produire l''amertume ; son ventre enflera, ses cuisses dépériront, et cette femme sera un sujet de malédiction au sein de son peuple. '
  '28':
  - type: text
    content: 'Mais si la femme ne s''est pas rendue impure, si elle est pure, elle sera innocentée : elle aura une descendance. '
  '29':
  - type: note
    content: V. 19ns.
  - type: text
    content: 'Telle est la loi concernant la passion jalouse, pour le cas où une femme sous l''autorité de son mari se dévoie et se rend impure, '
  '3':
  - type: note
    content: 'Homme ou femme  : litt. du mâle jusqu''à la femelle. –  qu''ils ne rendent pas impur ou qu''ils ne souillent pas, cf. Dt 21.23 ; Jr 2.7 ; 16.18 ; voir pur. –  leur camp…  : autre traduction leur camp au milieu duquel je demeure  ; Syr votre camp… au milieu de vous, cf. 2.2 ; 35.34 ; Ex 25.8 ; 29.45s ; Lv 15.31 ; Ez 43.9 ; voir aussi Jn 1.14 ; 1Co 3.16 ; 2Co 6.16.'
  - type: text
    content: 'Homme ou femme, vous les expulserez du camp ; vous les expulserez afin qu''ils ne rendent pas impur leur camp, où je demeure au milieu d''eux. '
  '30':
  - type: text
    content: 'et pour le cas où un souffle de passion jalouse passe sur un homme, de sorte qu''il est jaloux de sa femme : il placera la femme debout devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et le prêtre lui appliquera toute cette loi. '
  '31':
  - type: note
    content: 'sera chargée de sa faute (si elle est coupable) 18.1n  ; cf. Mt 19.9 ; Protévangile de Jacques 16.1ss : « Le grand prêtre dit : “Je vous ferai boire (à Joseph et Marie) l''eau d''épreuve du Seigneur, et il fera apparaître votre faute à vos yeux.” Et, ayant pris l''eau, le grand prêtre fit boire Joseph et l''envoya au désert ; et ce dernier revint sain et sauf. Et il fit boire aussi la jeune fille et l''envoya au désert ; et elle redescendit saine et sauve… Et le grand prêtre dit : “Si le Seigneur Dieu n''a pas rendu manifeste votre faute, moi non plus, je ne vous condamne pas.” » Voir aussi péché.'
  - type: text
    content: Le mari sera déclaré innocent de toute faute, mais la femme sera chargée de sa faute.
  '4':
  - type: text
    content: 'Les Israélites firent ainsi ; ils les expulsèrent du camp ; les Israélites firent ce que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait dit à Moïse.'
  - type: heading
    content: Réparation pour les délits commis
  '5':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '6':
  - type: note
    content: 'un péché humain…  : d''autres comprennent un péché envers un être humain, qui constitue…  ; voir cependant Lv 5.20-26 ; sur le tort causé à autrui comme offense envers Dieu, voir aussi Dt 24.10-22 ; Es 1.16-20 ; Am 5.7-17. –  sacrilège v. 12n  ; cf. Lv 5.15n,21 ; Jos 22.16,20,31 ; Ez 14.13 ; 20.27 ; Esd 9.2+ ; 1Ch 5.25 ; voir saint. –  se met ainsi en tort ou fait ainsi du tort  : cf. v. 7n.'
  - type: text
    content: 'Parle aux Israélites : Lorsqu''un homme ou une femme commet un péché humain qui constitue un sacrilège envers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', et qu''il se met ainsi en tort, '
  '7':
  - type: note
    content: 'il confessera le péché qu''il a commis  : litt. ils confesseront le péché qu''ils ont commis, mais la suite est au singulier (le singulier pouvant aussi s''appliquer à un ensemble de personnes, cf. 6.23n) ; voir aussi Gn 41.9 ; Lv 5.5 ; Jos 7.19 ; 2S 19.20s ; Ps 32.5. –  restituera en sa totalité… ou restituera la valeur de l''objet du délit  ; le mot traduit par objet du délit est apparenté au verbe traduit ici par faire du tort et au v. 6n par se mettre en tort  ; ailleurs il désigne le sacrifice de réparation (Lv 5.6n,15ss) ; cf. Lv 5.24 ; Lc 19.8.'
  - type: text
    content: 'il confessera le péché qu''il a commis et restituera en sa totalité l''objet du délit, en y ajoutant un cinquième ; il le remettra à celui à qui il a fait du tort. '
  '8':
  - type: note
    content: 'Si l''homme lésé n''a pas  : litt. s''il n''y a pas pour l''homme. –  rédempteur ou ayant droit, en hébreu go''el, terme qui désigne le proche parent qui est en droit, suivant les cas, d''assurer la rédemption de quelqu''un ou de le venger ; en l''espèce, la victime est probablement décédée sans héritier direct, cf. 7.8 ; 35.12n  ; Lv 25.25 ; Rt 2.20 ; 3.12s ; 4.1ss. –  la restitution…  : autre traduction la réparation du tort sera faite au Seigneur. –  bélier… Lv 5.14ss. –  de l''expiation  : cf. 29.11 ; Ex 29.36 ; 30.10 ; Lv 23.27n. –  sur le coupable  : litt. sur lui.'
  - type: text
    content: 'Si l''homme lésé n''a pas de rédempteur à qui l''on puisse restituer l''objet du délit, la restitution de cet objet sera due au '
  - type: text
    content: Seigneur
  - type: text
    content: '  – au prêtre – en plus du bélier de l''expiation, avec lequel on fera l''expiation sur le coupable. '
  '9':
  - type: note
    content: 'Cf. 18.8-19 ; Ex 29.27s ; Lv 7.7-10,32ss ; 22.10-16. –  prélèvement 6.20 ; 15.19ss ; 18.8ss,24ss ; 31.29,41,52 ; cf. Ex 25.2n. –  appartiendra au prêtre…  : d''après LXX, on pourrait aussi comprendre tout prélèvement… qu''ils présentent au Seigneur sera pour le prêtre  ; cf. Lv 7.8.'
  - type: text
    content: 'Tout prélèvement fait sur les offrandes sacrées des Israélites appartiendra au prêtre à qui l''on a présenté l''offrande. '
