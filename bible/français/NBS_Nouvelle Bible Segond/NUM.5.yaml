        children:
        - type: text
          text: '5.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Texte obscur et traduction incertaine, litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un homme, ses choses consacrées seront à lui ; un homme, ce qu'il donne au prêtre sera à lui
      - type: usfm
