        children:
        - type: text
          text: aura pour lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent une négation, qui pourrait signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: nul n'aura pour lui-même ce qu'il consacre.
      marker-yv: yv-n
    - type: text
      text: Il aura pour lui ce que chacun consacre ; il aura pour lui ce que chacun donne au prêtre.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La femme soupçonnée d'adultère
    marker-yv: yv-h
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '5.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cette loi, unique en son genre dans l''A.T., prescrit ce qu''on appelle communément une « ordalie », c.-à-d. une procédure qui remet le sort de l''accusé entre les mains du dieu pour déterminer sa culpabilité. Souvent, dans le Proche-Orient ancien, cette sorte de rituel comporte un geste dangereux, voire mortel (absorption de poison, épreuve du feu ou de l''eau) : la divinité doit intervenir pour sauver l''innocent le cas échéant. Ici le rituel imposé à la femme ne semble pas impliquer un péril naturel. Sur ce type de démarche, comparer Jos 7.10s ; 1S 14.41s ; Jr 8.14ss ; Ez 23.31ss ; Jon 1.7 ; Mi 6.1-16. Cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Code '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hammourabi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '131s : « Si une femme est accusée par son mari, mais qu''elle n''ait pas été surprise en train de coucher avec un autre homme, elle déclarera (son innocence) devant le dieu et elle retournera chez elle. Si l''on a pointé du doigt la femme d''un homme à cause d''un autre homme, mais qu''elle n''ait pas été surprise en train de coucher avec cet autre homme, elle se jettera dans la rivière (épreuve de l''eau) à cause de son mari. »'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
