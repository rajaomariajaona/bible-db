      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 35.30 ; Dt 17.6 ; 19.15.'
      marker-yv: yv-n
    - type: text
      text: 'si un autre homme a des rapports sexuels avec elle, sans que son mari s''en aperçoive ; si elle s''est rendue impure en secret, sans qu''il y ait de témoin contre elle et sans qu''elle ait été prise sur le fait ; '
