      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : la racine hébraïque correspondante évoque habituellement un sacrilège envers Dieu (v. 6+) ; ici, exceptionnellement, il s''agit d''une faute envers un homme ; de même au v. 27 ; voir aussi Jb 21.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Pr 16.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Parle aux Israélites ; tu leur diras : Si un homme a une femme qui se dévoie et qui lui est infidèle ; '
