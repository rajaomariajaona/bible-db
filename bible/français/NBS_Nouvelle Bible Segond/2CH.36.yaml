  - type: text
    text: 'La première année de Cyrus, roi de Perse, afin que s''accomplisse la parole du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' prononcée par Jérémie, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' éveilla l''esprit de Cyrus, roi de Perse, qui diffusa dans tout son royaume cette proclamation – même par écrit : '
  - type: usfm
    marker: v
    metadata:
