    marker-yv: yv-n
  - type: text
    text: 'Mais ils se moquaient des messagers de Dieu, ils méprisaient ses paroles et raillaient ses prophètes, jusqu''à ce que la fureur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' monte contre son peuple et soit sans remède.'
