document_id: 2CH.36,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Règne de Joachaz
  - type: heading
    content: 2R 23.30-34
  - type: text
    content: ' '
  - type: note
    content: 'Le peuple du pays  : cf. 23.20 ; 33.25 ; voir aussi 26.1.'
  - type: text
    content: 'Le peuple du pays prit Joachaz, fils de Josias ; ils l''investirent de la royauté à Jérusalem, à la place de son père. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'A l''année nouvelle  : litt. au retour de l''année  ; cf. 1R 20.22n.'
  - type: text
    content: 'A l''année nouvelle, le roi Nabuchodonosor le fit amener à Babylone avec les objets précieux de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: . Il investit Sédécias, frère de Joïaqim, de la royauté sur Juda et Jérusalem.
  - type: heading
    content: Règne de Sédécias
  - type: heading
    content: 2R 24.18-20
  '11':
  - type: text
    content: 'Sédécias avait vingt et un ans lorsqu''il devint roi ; il régna onze ans à Jérusalem. '
  '12':
  - type: note
    content: 'ne s''humilia (12.6+) pas devant… le prophète v. 15s. –  qui parlait…  : litt. de la bouche de YHWH (cf. v. 22n).'
  - type: text
    content: 'Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu ; il ne s''humilia pas devant Jérémie, le prophète, qui parlait de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Exil à Babylone
  - type: heading
    content: Cf. 2R 25.1-21
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'il se montra rétif…  : litt. il raidit sa nuque (30.8) et affermit son cœur.'
  - type: text
    content: 'Il se rebella même contre le roi Nabuchodonosor, qui lui avait fait prêter serment par Dieu ; il se montra rétif et s''entêta, au lieu de revenir au '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël. '
  '14':
  - type: note
    content: 'les chefs des prêtres…  : certains modifient le texte pour lire les princes de Juda, les prêtres et le peuple, avec LXX. – Voir pur, impur.'
  - type: text
    content: 'Tous les chefs des prêtres et le peuple multiplièrent aussi les sacrilèges, en imitant toutes les abominations des nations ; ils rendirent impure la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', celle qu''il avait consacrée, à Jérusalem.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'avait envoyé…  : autre traduction avait envoyé inlassablement (des avertissements) par l''intermédiaire de ses messagers . –  inlassablement  : cf. Jr 7.13n. –  messagers  : voir ange. –  son propre séjour , c.-à-d. le temple  ; cf. 30.27 ; Dt 26.15n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de leurs pères, leur avait envoyé, inlassablement, ses messagers, car il voulait épargner son peuple et son propre séjour. '
  '16':
  - type: note
    content: 'raillaient ses prophètes  : une autre forme du même verbe est traduite par se moquer de en Gn 27.12 ; Jr 20.8 ; 24.9.'
  - type: text
    content: 'Mais ils se moquaient des messagers de Dieu, ils méprisaient ses paroles et raillaient ses prophètes, jusqu''à ce que la fureur du '
  - type: text
    content: Seigneur
  - type: text
    content: ' monte contre son peuple et soit sans remède.'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'Le sujet des verbes tua et n''épargna n''est pas explicité ; d''après le contexte, il est plus vraisemblable qu''il s''agisse de Dieu que du roi des Chaldéens. –  jeune fille  : litt. vierge.'
  - type: text
    content: 'Alors il les fit attaquer par le roi des Chaldéens ; il tua par l''épée leurs jeunes gens dans leur sanctuaire ; il n''épargna ni le jeune homme, ni la jeune fille, ni le vieillard, ni l''homme aux cheveux blancs. Il lui livra tout. '
  '18':
  - type: text
    content: 'Il emporta à Babylone tous les objets de la maison de Dieu, grands et petits, les trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les trésors du roi et de ses princes. '
  '19':
  - type: note
    content: 'ils mirent le feu à  : litt. ils brûlèrent par le feu.'
  - type: text
    content: 'Ils brûlèrent la maison de Dieu, ils démolirent la muraille de Jérusalem ; ils mirent le feu à tous ses palais et détruisirent tous les objets précieux. '
  '2':
  - type: text
    content: Joachaz avait vingt-trois ans lorsqu'il devint roi ; il régna trois mois à Jérusalem.
  '20':
  - type: note
    content: 'ceux qui avaient échappé  : le terme est souvent traduit par reste  ; Gn 45.7n  ; cf. Né 1.2s. –  ses fils  : c.-à-d. ses successeurs.'
  - type: text
    content: 'Il exila à Babylone ceux qui avaient échappé à l''épée ; ils lui furent soumis, à lui ainsi qu''à ses fils, jusqu''à la domination du royaume de Perse, '
  '21':
  - type: note
    content: 'par la bouche de Jérémie cf. Jr 25.12 ; 29.10. –  se soit acquitté de ses sabbats Lv 26.34n,43. –  il fit sabbat  : autre traduction il se reposa.'
  - type: text
    content: 'afin que s''accomplisse la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononcée par la bouche de Jérémie : jusqu''à ce que le pays se soit acquitté de ses sabbats, tout le temps qu''il fut dévasté, il fit sabbat, jusqu''à l''accomplissement de soixante-dix ans.'
  - type: heading
    content: Cyrus autorise la reconstruction du temple
  - type: heading
    content: Esd 1.1-3
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'prononcée par  : litt. par (ou dans ) la bouche de.'
  - type: text
    content: 'La première année de Cyrus, roi de Perse, afin que s''accomplisse la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' prononcée par Jérémie, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' éveilla l''esprit de Cyrus, roi de Perse, qui diffusa dans tout son royaume cette proclamation – même par écrit : '
  '23':
  - type: text
    content: 'Ainsi parle Cyrus, roi de Perse : Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu du ciel, m''a donné tous les royaumes de la terre, et il m''a chargé de lui bâtir une maison à Jérusalem, en Juda. Quiconque d''entre vous appartient à son peuple, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu, soit avec lui, et qu''il monte !'
  '3':
  - type: text
    content: ' '
  - type: note
    content: '2R 23.33n. –  le détrôna (litt. l''écarta ) à Jérusalem même  : LXX l''emmena en Egypte . –  frappa… d''une contribution  : le verbe hébreu correspondant est traduit par condamner à une amende en Ex 21.22 ; terme apparenté en 2R 23.33. –  cent talents ≈ 3,42 t ; un talent ≈ 34,2 kg ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Le roi d''Egypte le détrôna à Jérusalem même et frappa le pays d''une contribution de cent talents d''argent et d''un talent d''or. '
  '4':
  - type: note
    content: 'frère de Joachaz  : litt. son frère. –  changea son nom  : 2R 23.34n  ; Dn 1.7n.'
  - type: text
    content: Le roi d'Egypte investit Eliaqim, frère de Joachaz, de la royauté sur Juda et Jérusalem, et il changea son nom en Joïaqim. Néko prit son frère Joachaz et l'emmena en Egypte.
  - type: heading
    content: Règne de Joïaqim
  - type: heading
    content: 2R 23.36-37
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ce qui déplaisait…  : cf. v. 9,12 ; 1R 11.6n  ; LXX porte ici un texte plus long, qui correspond au passage de 2R 23.37–24.4.'
  - type: text
    content: 'Joïaqim avait vingt-cinq ans lorsqu''il devint roi ; il régna onze ans à Jérusalem. Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', son Dieu. '
  '6':
  - type: note
    content: 'Il l''attacha…  : précisions absentes des Rois, jusqu''au v. 7. –  avec des entraves de bronze 33.11n.'
  - type: text
    content: 'Nabuchodonosor, roi de Babylone, partit en campagne contre lui. Il l''attacha avec des entraves de bronze pour le conduire à Babylone. '
  '7':
  - type: note
    content: 'dans son palais à Babylone  : cf. Dn 1.1s ; Esd 1.7.'
  - type: text
    content: 'Nabuchodonosor emporta à Babylone des objets de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et les mit dans son palais à Babylone. '
  '8':
  - type: note
    content: 'Le reste de l''histoire… 1R 11.41n. –  ce qui lui est arrivé  : litt. ce qui a été trouvé sur (ou contre) lui  ; traduction incertaine.'
  - type: text
    content: Le reste de l'histoire de Joïaqim, les abominations qu'il a commises et ce qui lui est arrivé, cela est écrit dans le livre des rois d'Israël et de Juda. Joïakîn, son fils, devint roi à sa place.
  - type: heading
    content: Règne de Joïakîn
  - type: heading
    content: 2R 24.8-17
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'huit ans / trois mois et dix jours  : cf. 2R 24.8 dix-huit ans / trois mois.'
  - type: text
    content: 'Joïakîn avait huit ans lorsqu''il devint roi ; il régna trois mois et dix jours à Jérusalem. Il fit ce qui déplaisait au '
  - type: text
    content: Seigneur
  - type: text
    content: .
