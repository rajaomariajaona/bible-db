      - type: usfm
        marker: w
        children:
        - type: text
          text: fils
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : c.-à-d. ses successeurs.'
    marker-yv: yv-n
  - type: text
    text: 'Il exila à Babylone ceux qui avaient échappé à l''épée ; ils lui furent soumis, à lui ainsi qu''à ses fils, jusqu''à la domination du royaume de Perse, '
  - type: usfm
    marker: v
