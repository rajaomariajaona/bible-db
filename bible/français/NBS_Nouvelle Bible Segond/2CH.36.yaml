  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Ainsi parle Cyrus, roi de Perse : Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu du ciel, m''a donné tous les royaumes de la terre, et il m''a chargé de lui bâtir une maison à Jérusalem, en Juda. Quiconque d''entre vous appartient à son peuple, que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', son Dieu, soit avec lui, et qu''il monte !'
