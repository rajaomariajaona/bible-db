  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu de leurs pères, leur avait envoyé, inlassablement, ses messagers, car il voulait épargner son peuple et son propre séjour. '
  - type: usfm
    marker: v
    metadata:
