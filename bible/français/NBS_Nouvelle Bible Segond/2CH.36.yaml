    marker-yv: yv-n
  - type: text
    text: 'Alors il les fit attaquer par le roi des Chaldéens ; il tua par l''épée leurs jeunes gens dans leur sanctuaire ; il n''épargna ni le jeune homme, ni la jeune fille, ni le vieillard, ni l''homme aux cheveux blancs. Il lui livra tout. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Il emporta à Babylone tous les objets de la maison de Dieu, grands et petits, les trésors de la maison du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' et les trésors du roi et de ses princes. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '36.19 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils mirent le feu à
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ils brûlèrent par le feu.
    marker-yv: yv-n
  - type: text
    text: 'Ils brûlèrent la maison de Dieu, ils démolirent la muraille de Jérusalem ; ils mirent le feu à tous ses palais et détruisirent tous les objets précieux. '
  - type: usfm
    marker: v
