        text: '36.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'raillaient ses '
      - type: usfm
        marker: w
        children:
        - type: text
          text: prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : une autre forme du même verbe est traduite par '
    - type: usfm
