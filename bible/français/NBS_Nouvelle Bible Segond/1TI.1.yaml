document_id: 1TI.1,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Salutation
  - type: text
    content: ' '
  - type: note
    content: apôtre (ou envoyé , Rm 1.1n  ; Ga 1.1n) de Jésus-Christ 2Co 1.1 ; Ep 1.1 ; Col 1.1 ; voir aussi onction. –  par ordre Tt 1.3 ; même terme Rm 16.26 ; 1Co 7.6 ; 2Co 8.8 ; cf. Ac 9.15 ; 26.19 ; Ga 1.15 ; Ep 3.8. –  Dieu, notre Sauveur 2.3s ; 4.10 ; Lc 1.47 ; 3.6 ; Tt 1.3 ; 2.10 ; 3.4 ; Jd 25 ; cf. Es 12.2 ; 45.15 ; Ps 24.5 ; 95.1 ; voir aussi Lc 2.11 ; Jn 4.42 ; 2Tm 1.9s ; Tt 1.4 ; 2.13 ; 3.6. –  Jésus-Christ, notre espérance Col 1.27 ; Tt 1.2.
  - type: text
    content: 'Paul, apôtre de Jésus-Christ par ordre de Dieu, notre Sauveur, et de Jésus-Christ, notre espérance, '
  '10':
  - type: note
    content: 'les gens qui se livrent à l''inconduite sexuelle  : autre traduction possible, dans ce contexte, les prostitués  ; cf. 1Co 5.1n,9n  ; Ap 21.8 ; 22.15 ; voir aussi 1R 14.24 ; 15.12 ; 22.47 ; 2R 23.7. –  les hommes…  : le terme grec désigne normalement les partenaires actifs dans les relations homosexuelles ; c''est le premier des deux mots qui sont traduits par la même expression en 1Co 6.9n. –  trafiquants d''esclaves  : litt. trafiquants d''hommes  ; cf. Ex 20.15n  ; Ap 18.13. –  parjures  : cf. Dt 5.11 ; Mt 5.33. –  et tout…  : cf. Rm 13.9 ; Ga 5.21. –  s''opposer  : un terme apparenté est traduit par adversaire en 5.14 ; cf. 1Co 16.9 ; Ga 5.17. –  l''enseignement sain 2Tm 4.3 ; Tt 1.9 ; 2.1 ; cf. 1Tm 6.3 ; 2Tm 1.13 ; Tt 1.13 ; 2.2,8.'
  - type: text
    content: 'les gens qui se livrent à l''inconduite sexuelle, les hommes qui couchent avec des hommes, les trafiquants d''esclaves, les menteurs, les parjures, et tout ce qui peut encore s''opposer à l''enseignement sain, '
  '11':
  - type: note
    content: 'la bonne nouvelle de la gloire…  : autre traduction la bonne nouvelle glorieuse du Dieu bienheureux (6.15) ; cf. 2Co 4.4 ; voir aussi Ep 1.6 ; Tt 2.13. –  confiée  : le verbe qui apparaît ici est apparenté aux mots habituellement traduits par foi, fidèle, digne de confiance (v. 12n,15n) ; autre terme au v. 18n  ; Ga 2.7 ; 1Th 2.4 ; Tt 1.3.'
  - type: text
    content: d'après la bonne nouvelle de la gloire du Dieu bienheureux, bonne nouvelle qui m'a été confiée.
  - type: heading
    content: Reconnaissance envers Dieu
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis plein de gratitude  : même formule en 2Tm 1.3. –  qui m''a rendu puissant ou qui me rend puissant, qui me remplit de puissance Ph 4.13+ ; cf. Ac 9.22 ; 2Co 3.5 ; 2Tm 4.17 ; voir aussi Rm 4.20 ; 1Co 4.20 ; 5.4 ; 2Co 6.7 ; 12.9 ; Ep 6.10 ; Col 1.29 ; 1Th 1.5 ; 2Tm 1.7 ; 2.1 ; Hé 11.34. –  digne de confiance ou fidèle  ; le même terme est traduit par certaine v. 15 etc. ; il est apparenté à celui qui est habituellement traduit par foi  ; cf. 1Co 4.2 ; 7.25 ; 2Tm 2.2 ; Hé 3.2ss ; voir aussi Ac 9.15+. –  quand il m''a institué…  : autre traduction en me prenant à son service 2.7 ; 2Tm 1.11. –  ministère ou service , cf. 3.10 ; Rm 11.13 ; 2Co 4.1 ; 5.18 ; 6.3 ; Ep 4.12 ; cf. Ga 1.15s.'
  - type: text
    content: 'Je suis plein de gratitude envers celui qui m''a rendu puissant, Jésus-Christ, notre Seigneur, parce qu''il m''a estimé digne de confiance quand il m''a institué dans un ministère, '
  '13':
  - type: note
    content: 'Cf. Ac 8.3+ ; 9.1s ; 1Co 15.9 ; Ga 1.13 ; Ep 3.8 ; Ph 3.6. –  blasphémateur  : cf. v. 20 ; 6.1n,4 ; 2Tm 3.2 ; Tt 3.2n  ; 2P 2.1 ; voir aussi Ac 13.45n  ; 26.11n  ; 1Co 12.3. –  persécuteur Ac 9.4s ; 22.4,7. –  insolent  : autre traduction violent  ; même terme en Rm 1.30 ; termes apparentés en 2Co 12.10 (outrages) ; 1Th 2.2 (maltraiter). –  compassion v. 2,16 ; 1Co 7.25 ; cf. Rm 11.30s ; 2Co 4.1. –  ignorance ou méconnaissance, Ac 3.17+ ; cf. Lv 4.2n  ; Lc 23.34.'
  - type: text
    content: 'moi qui étais auparavant un blasphémateur, un persécuteur, un insolent. J''ai cependant été traité avec compassion, parce que j''agissais dans l''ignorance, par manque de foi. '
  '14':
  - type: note
    content: 'la grâce… a surabondé Rm 5.20 ; 1Co 15.10. –  notre Seigneur 2Tm 1.8 ; Hé 7.14. –  la foi… 2Tm 1.13 ; cf. Rm 8.39 ; Col 1.4 ; 1Tm 3.13 ; 2Tm 3.15. –  qui est  : autre traduction qui sont.'
  - type: text
    content: 'Et la grâce de notre Seigneur a surabondé, avec la foi et l''amour qui est en Jésus-Christ. '
  '15':
  - type: note
    content: 'une parole certaine ou digne de foi, terme apparenté au mot habituellement traduit par foi (il est rendu par digne de confiance au v. 12 et a souvent, ailleurs, le sens de croyant) 3.1 ; 4.9,12n  ; 2Tm 2.11 ; Tt 3.8. –  accueillie 2.3n. –  venu dans le monde  : cf. Jn 1.9+. –  pour sauver les pécheurs Lc 15.2 ; 19.10+ ; cf. Jn 3.16 ; 1Jn 3.5. –  le premier  : cf. 1Co 15.9+s ; Ep 3.8 ; voir aussi Lc 18.13n.'
  - type: text
    content: 'C''est une parole certaine et digne d''être pleinement accueillie : Jésus-Christ est venu dans le monde pour sauver les pécheurs ; je suis, moi, le premier d''entre eux. '
  '16':
  - type: note
    content: 'Cf. Rm 9.22s ; 11.32. –  montre  : cf. Rm 3.25 ; Ep 2.7. –  sa patience  : cf. Rm 2.4 ; 1P 3.20 ; 2P 3.9,15. –  exemple ou modèle, même terme 2Tm 1.13. –  croire…  : cf. Ac 13.48. –  vie éternelle 6.12 ; Tt 1.2 ; 3.7.'
  - type: text
    content: 'Mais j''ai été traité avec compassion, afin qu''en moi, le premier, Jésus-Christ montre toute sa patience, comme un exemple pour ceux qui allaient croire en lui, en vue de la vie éternelle. '
  '17':
  - type: note
    content: 'Cf. 6.15s ; pour d''autres formules d''allure liturgique, voir aussi 2.5s ; 3.16 ; 5.21 ; 2Tm 1.9s ; 2.8 ; 4.1. –  Roi de tous les temps (litt. des âges, des éons, traduction traditionnelle des siècles, voir Ga 1.5n  ; Ep 2.2n  ; Hé 1.2n) ; c.-à-d. roi éternel ou peut-être roi du monde  ; même expression en Tobit 13.7,11 (« Roi des siècles ») ; c''est le même terme qui est employé, de façon redoublée, dans la formule traduite par à tout jamais (traduction traditionnelle aux siècles des siècles). –  impérissable  : autre traduction incorruptible, cf. 6.5 ; Rm 1.23+ ; 2Tm 1.10. –  invisible Rm 1.20 ; Col 1.15 ; Hé 11.27 ; cf. Jn 1.18+. –  seul Dieu 2.5 ; 6.15 ; Jn 5.44+ ; 1Co 8.4s ; Ep 4.6 ; Jd 25 ; certains mss portent Dieu seul sage, cf. Rm 16.27+. – Voir gloire.'
  - type: text
    content: 'Au Roi de tous les temps, impérissable, invisible, seul Dieu, honneur et gloire à tout jamais ! '
  - type: text
    content: Amen !
  - type: heading
    content: Mener le beau combat
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'L''injonction v. 3+. –  confie  : autre terme au v. 11n  ; terme apparenté en 6.20n  ; cf. 2Tm 2.2. –  les messages de prophètes  : litt. les prophéties  ; certains comprennent les messages de prophètes énoncés d''avance à ton sujet  ; d''autres, les messages de prophètes qui t''ont mis en avant 4.14 ; cf. Ac 13.1ss. –  t''appuyant sur eux ou d''après eux , litt. en eux  ; cf. 2Co 3.5 ; 2Tm 2.1. –  le beau (v. 8n) combat 6.12 (autre terme) ; cf. 2.3s ; 1Co 9.7n  ; 2Co 10.3 ; voir aussi Ph 2.25 ; 2Tm 4.7 ; Phm 2 ; Jd 3.'
  - type: text
    content: 'L''injonction que je te confie, Timothée, mon enfant, selon les messages de prophètes énoncés précédemment à ton intention, c''est que, t''appuyant sur eux, tu mènes le beau combat, '
  '19':
  - type: note
    content: bonne conscience v. 5 ; 3.9+. –  répudiée ou repoussée (Ac 7.27,39 ; 13.46), rejetée (Rm 11.1s) ; on pourrait aussi comprendre la foi et la bonne conscience que quelques-uns ont répudiées.
  - type: text
    content: 'en gardant la foi et une bonne conscience. Cette conscience, quelques-uns l''ont répudiée et ont ainsi fait naufrage en ce qui concerne la foi. '
  '2':
  - type: note
    content: 'Timothée Ac 16.1+. –  mon enfant véritable Tt 1.4 ; cf. Ph 2.19-23 ; voir aussi 1Co 4.15,17 ; Ga 4.19 ; 1Th 2.11 ; Phm 10 ; 3Jn 4. –  dans la foi  : litt. en foi. –  Grâce / paix… Rm 1.7+.'
  - type: text
    content: 'à Timothée, mon enfant véritable dans la foi : Grâce, compassion et paix de la part de Dieu, le Père, et de Jésus-Christ, notre Seigneur !'
  - type: heading
    content: Pas d'autres enseignements
  '20':
  - type: note
    content: 'Hyménée 2Tm 2.17. –  Alexandre  : cf. 2Tm 4.14s ; voir aussi Ac 19.33. –  livrés au Satan (cf. Jb 1.6nss ; voir démon, diable, Satan) : l''expression signifie probablement exclus de l''Eglise  ; cf. 1Co 5.5 ; voir cependant Ac 13.8ss ; voir aussi 1Tm 3.6n. –  afin qu''ils apprennent (par la correction) ; le même verbe est traduit par châtier en Lc 23.16,22 ; 2Co 6.9 ; corriger en 1Co 11.32 ; 2Tm 2.25 ; Hé 12.6ss ; Ap 3.19 ; apprendre en Tt 2.12 ; il s''applique d''abord à l''éducation des enfants (Ac 7.22 ; 22.3) ; terme apparenté en Ep 6.4 ; 2Tm 3.16. –  blasphémer v. 13+.'
  - type: text
    content: Hyménée et Alexandre sont de ce nombre ; je les ai livrés au Satan afin qu'ils apprennent à ne pas blasphémer.
  '3':
  - type: text
    content: ' '
  - type: note
    content: encouragé ou exhorté  ; cf. 2.1 ; 4.13 ; 5.1 ; 6.2 ; 2Tm 4.2 ; Tt 1.9 ; 2.6,15 ; voir aussi Rm 12.1+. –  en partant pour la Macédoine Ac 20.1+. –  Ephèse Ac 18.19n. –  enjoindre ou donner injonction , cf. v. 5,18 ; 4.11 ; 5.7 ; 6.13,17 ; 1Th 4.2+. –  propager d'autres enseignements (ou d'autres doctrines ) ; même verbe en 6.3 ; cf. Ac 20.29s ; 2Co 11.4 ; Ga 1.6ss ; Hé 13.9 ; 2P 2.1.
  - type: text
    content: 'Comme je t''y ai encouragé en partant pour la Macédoine, demeure à Ephèse, afin d''enjoindre à quelques-uns de ne pas propager d''autres enseignements '
  '4':
  - type: note
    content: 's''attacher  : même formule 4.13 (s''appliquer). –  fables  : le terme grec a donné notre mot mythe  ; de même 4.7 ; 2Tm 4.4 ; Tt 1.14 ; 2P 1.16. –  généalogies  : il s''agit vraisemblablement de spéculations apocalyptiques ou allégoriques sur des personnages de l''Ancien Testament, comme celles qu''on trouve dans les écrits du judaïsme tardif et dont le gnosticisme (voir « La question gnostique »♦) s''inspirera pour la présentation de ses théories métaphysiques Tt 3.9 ; cf. Gn 2.4n. –  sans fin ou qui ne mènent à rien. –  débats  : le terme pourrait signifier aussi étude, recherche  ; terme apparenté en 6.4 ; 2Tm 2.23 ; Tt 3.9. –  l''intendance  : voir Ep 1.10n  ; 3.2+ ; un terme apparenté est traduit par intendant en Tt 1.7. –  qui s''exerce dans la foi  : litt. dans une foi ou par la foi.'
  - type: text
    content: 'et de ne pas s''attacher à des fables ni à des généalogies sans fin qui favorisent les débats plutôt que l''intendance de Dieu, qui s''exerce dans la foi. '
  '5':
  - type: note
    content: Le but ou la fin, cf. Rm 13.10. –  cette injonction, cf. v. 3+,18. –  l'amour v. 14 ; 2.15 ; 4.12 ; 6.11 ; 2Tm 1.7,13 ; 2.22 ; 3.10 ; 4.8 ; Tt 2.2 ; cf. Jn 13.35 ; 1Co 13. –  cœur pur Mt 5.8+ ; 2Tm 2.22. –  bonne conscience v. 19 ; cf. 3.9+ ; 1P 3.16. –  foi sans hypocrisie 2Tm 1.5 ; cf. 2Co 6.6+.
  - type: text
    content: 'Le but de cette injonction, c''est l''amour qui vient d''un cœur pur, d''une bonne conscience et d''une foi sans hypocrisie. '
  '6':
  - type: note
    content: 'Cf. 6.4,20s. –  étant passés à côté de tout cela  : autre traduction s''en étant détournés, cf. 6.21 ; 2Tm 2.18. –  ont dévié  : même verbe grec en 5.15 ; 6.20 (éviter) ; 2Tm 4.4 ; Hé 12.13. –  discours futiles Tt 1.10 ; 3.9 ; autre terme synonyme 1Tm 6.20 ; 2Tm 2.16 ; cf. Rm 1.21 ; 1Co 3.20 ; Ep 4.17.'
  - type: text
    content: 'Quelques-uns, étant passés à côté de tout cela, ont dévié vers des discours futiles. '
  '7':
  - type: note
    content: 'Ils veulent  : cf. Ga 6.13 ; voir aussi Jc 3.1. –  maîtres (ou enseignants) de la loi  : cette expression semble viser en particulier des judaïsants, cf. v. 4n  ; Tt 1.10,14 ; 3.9 ; voir aussi Lc 2.46 ; Jn 3.10 ; Ac 5.34.'
  - type: text
    content: Ils veulent être des maîtres de la loi et ils ne comprennent pas ce qu'ils disent, pas même ce qu'ils affirment catégoriquement.
  - type: heading
    content: Le rôle de la loi
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Rm 3.19 ; 7.12-16. –  Nous savons bien Rm 2.2 ; 8.28 ; 1Co 8.1,4 ; 2Co 5.1. –  bonne  : litt. belle , adjectif fréquemment employé dans les Pastorales (voir introduction ♦), avec un sens voisin de celui qui est habituellement traduit par bon  ; cf. v. 18 ; 2.3 ; 3.1+,7,13 ; 4.4,6 ; 6.12s,19 ; 2Tm 1.14 ; 2.3 ; 4.7. –  un usage légitime  : même terme, apparenté à celui qui est traduit par loi , en 2Tm 2.5 ( selon les règles ).'
  - type: text
    content: 'Nous savons bien que la loi est bonne, pourvu qu''on en fasse un usage légitime ; '
  '9':
  - type: note
    content: 'la loi n''est pas faite pour le juste  : cf. Ga 5.23. On a remarqué dans l''énumération qui suit une progression analogue à celle des Dix Paroles (Ex 20/ /). –  les sans-loi  : un terme apparenté est traduit par mal en Tt 2.14 ; cf. Ac 2.23 ; 2Th 2.3n,8 ; 2P 2.8. –  insoumis Tt 1.6,10. –  impies (Rm 4.5 ; 5.6 ; 2P 2.5 ; 3.7) / pécheurs 1P 4.18. –  profanateurs ou profanes  : cf. 4.7 ; 6.20 ; 2Tm 2.16 ; Hé 12.16 ; voir saint.'
  - type: text
    content: 'sachant que la loi n''est pas faite pour le juste, mais pour les sans-loi et les insoumis, les impies et les pécheurs, les sacrilèges et les profanateurs, les parricides et les matricides, les meurtriers, '
