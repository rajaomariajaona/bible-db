document_id: JER.28,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Jérémie et le prophète Hanania
  - type: text
    content: ' '
  - type: note
    content: 'La même année  : cf. 27.1n  ; LXX n''a que l''indication de la quatrième année  ; cf. 51.59, dont le cinquième mois correspondrait à juillet-août 594 av. J.-C. –  Hanania… le prophète , à ne pas confondre avec ceux de 36.12 et 37.13. –  Gabaon , à cinq km environ d''Anatoth, 1.1n  ; 1R 3.4.'
  - type: text
    content: 'La même année, au commencement du règne de Sédécias, roi de Juda, le cinquième mois de la quatrième année, Hanania, fils d''Azzour, le prophète de Gabaon, me dit dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', sous les yeux des prêtres et de tout le peuple : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: la barre 27.2.
  - type: text
    content: 'Alors le prophète Hanania prit la barre de dessus le cou du prophète Jérémie et il la brisa ; '
  '11':
  - type: text
    content: 'et Hanania dit sous les yeux de tout le peuple : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : C''est ainsi que, dans deux années, je briserai le joug que Nabuchodonosor, roi de Babylone, fait peser sur toutes les nations. Et le prophète Jérémie passa son chemin.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 11.18 ; 42.4,7s.
  - type: text
    content: 'Après que le prophète Hanania eut brisé la barre qui était sur le cou du prophète Jérémie, la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: ' parvint à Jérémie : '
  '13':
  - type: note
    content: 'tu les remplaceras  : LXX je les remplacerai.'
  - type: text
    content: 'Va, tu diras à Hanania : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Tu peux briser des barres de bois, tu les remplaceras par des barres de fer. '
  '14':
  - type: note
    content: joug de fer Dt 28.48. –  pour qu'elles se soumettent… 27.6.
  - type: text
    content: 'Car ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : J''ai mis un joug de fer sur le cou de toutes ces nations, pour qu''elles se soumettent à Nabuchodonosor, roi de Babylone, et elles se soumettront à lui ; je lui ai même livré les animaux sauvages.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: pas envoyé 14.14+. –  mettre sa confiance dans un mensonge 13.25n  ; 29.31.
  - type: text
    content: 'Et le prophète Jérémie dit au prophète Hanania : Ecoute, je te prie, Hanania ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ne t''a pas envoyé, et toi, tu incites ce peuple à mettre sa confiance dans un mensonge. '
  '16':
  - type: note
    content: renvoie de la terre Gn 2.5n  ; 3.23. –  subversion 29.32 ; Dt 13.6n  ; cf. 18.20.
  - type: text
    content: 'A cause de cela, ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : Je te renvoie de la terre ; tu mourras cette année ; car tu as appelé à la subversion contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '17':
  - type: note
    content: 'septième mois  : cf. v. 1n.'
  - type: text
    content: Le prophète Hanania mourut cette année-là, au septième mois.
  '2':
  - type: note
    content: Cf. 27.2+.
  - type: text
    content: 'Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées, le Dieu d''Israël : Je brise le joug du roi de Babylone ! '
  '3':
  - type: note
    content: Cf. 27.19-22.
  - type: text
    content: 'Encore deux années, et je ramène en ce lieu tous les objets de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', que Nabuchodonosor, roi de Babylone, a pris de ce lieu et qu''il a emportés à Babylone. '
  '4':
  - type: note
    content: 'Jékonia  : cf. 22.24n  ; 27.20 ; 2R 24.12-16.'
  - type: text
    content: 'Et je ramène en ce lieu – déclaration du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – Jékonia, fils de Joïaqim, roi de Juda, et tous les exilés de Juda qui sont allés à Babylone, car je briserai le joug du roi de Babylone.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: Cf. Mt 10.19.
  - type: text
    content: 'Le prophète Jérémie répondit au prophète Hanania, sous les yeux des prêtres et de tout le peuple qui se tenaient dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '6':
  - type: note
    content: 'Qu''il en soit ainsi ! Dt 27.15n  ; 1R 1.36. –  Que le Seigneur fasse ainsi 17.16 ; 20.8. –  réalise  : autre traduction confirme. –  que tu as dites en prophète ou que tu as prophétisées  ; même verbe traduit par annoncer v. 8s ; cf. 2.8n  ; 26.12n.'
  - type: text
    content: 'Le prophète Jérémie dit : Qu''il en soit ainsi ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fasse ainsi ! Que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' réalise les paroles que tu as dites en prophète, et qu''il ramène de Babylone en ce lieu les objets de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et tous les exilés ! '
  '7':
  - type: note
    content: 'à toi et à tout le peuple  : litt. à tes oreilles et aux oreilles de tout le peuple.'
  - type: text
    content: 'Seulement écoute, je te prie, cette parole que je te dis, à toi et à tout le peuple : '
  '8':
  - type: note
    content: '26.18,20 ; cf. Am 1.3ss. –  malheur  : certains mss portent famine  ; cf. 14.12+.'
  - type: text
    content: 'Les prophètes qui ont paru avant moi et avant toi, depuis toujours, ont annoncé contre de nombreux pays et de grands royaumes la guerre, le malheur et la peste ; '
  '9':
  - type: note
    content: que tout ira bien ou la paix  ; cf. 4.10n  ; 6.14. –  quand viendra… Dt 18.22. Voir « Le prophète de malheur peut-il être un faux prophète ? »♦.
  - type: text
    content: 'mais si un prophète annonce que tout ira bien, c''est quand viendra ce qu''il a annoncé qu''il sera reconnu comme un prophète vraiment envoyé par le '
  - type: text
    content: Seigneur
  - type: text
    content: .
