document_id: JER.28,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Jérémie et le prophète Hanania
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: La même année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 27.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' n''a que l''indication de la '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: quatrième année
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 51.59, dont le '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cinquième mois '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'correspondrait à juillet-août 594 av. J.-C. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hanania… le prophète
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à ne pas confondre avec ceux de 36.12 et 37.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Gabaon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', à cinq km environ d''Anatoth, 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 3.4.'
      marker-yv: yv-n
    - type: text
      text: 'La même année, au commencement du règne de Sédécias, roi de Juda, le cinquième mois de la quatrième année, Hanania, fils d''Azzour, le prophète de Gabaon, me dit dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', sous les yeux des prêtres et de tout le peuple : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la barre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 27.2.
      marker-yv: yv-n
    - type: text
      text: 'Alors le prophète Hanania prit la barre de dessus le cou du prophète Jérémie et il la brisa ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'et Hanania dit sous les yeux de tout le peuple : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : C''est ainsi que, dans deux années, je briserai le joug que Nabuchodonosor, roi de Babylone, fait peser sur toutes les nations. Et le prophète Jérémie passa son chemin.'
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.12 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 11.18 ; 42.4,7s.
      marker-yv: yv-n
    - type: text
      text: 'Après que le prophète Hanania eut brisé la barre qui était sur le cou du prophète Jérémie, la parole du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' parvint à Jérémie : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu les remplaceras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: je les remplacerai.
      marker-yv: yv-n
    - type: text
      text: 'Va, tu diras à Hanania : Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Tu peux briser des barres de bois, tu les remplaceras par des barres de fer. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'joug de fer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Dt 28.48. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour qu''elles se soumettent… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 27.6.
      marker-yv: yv-n
    - type: text
      text: 'Car ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : J''ai mis un joug de fer sur le cou de toutes ces nations, pour qu''elles se soumettent à Nabuchodonosor, roi de Babylone, et elles se soumettront à lui ; je lui ai même livré les animaux sauvages.'
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas envoyé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mettre sa confiance dans un mensonge '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 29.31.'
      marker-yv: yv-n
    - type: text
      text: 'Et le prophète Jérémie dit au prophète Hanania : Ecoute, je te prie, Hanania ! Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ne t''a pas envoyé, et toi, tu incites ce peuple à mettre sa confiance dans un mensonge. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'renvoie de la terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 2.5
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 3.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'subversion '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 29.32 ; Dt 13.6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 18.20.'
      marker-yv: yv-n
    - type: text
      text: 'A cause de cela, ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : Je te renvoie de la terre ; tu mourras cette année ; car tu as appelé à la subversion contre le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: septième mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Le prophète Hanania mourut cette année-là, au septième mois.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 27.2+.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi parle le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH) des Armées, le Dieu d''Israël : Je brise le joug du roi de Babylone ! '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 27.19-22.
      marker-yv: yv-n
    - type: text
      text: 'Encore deux années, et je ramène en ce lieu tous les objets de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', que Nabuchodonosor, roi de Babylone, a pris de ce lieu et qu''il a emportés à Babylone. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Jékonia
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 22.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 27.20 ; 2R 24.12-16.'
      marker-yv: yv-n
    - type: text
      text: 'Et je ramène en ce lieu – déclaration du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  – Jékonia, fils de Joïaqim, roi de Juda, et tous les exilés de Juda qui sont allés à Babylone, car je briserai le joug du roi de Babylone.'
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.5 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Mt 10.19.
      marker-yv: yv-n
    - type: text
      text: 'Le prophète Jérémie répondit au prophète Hanania, sous les yeux des prêtres et de tout le peuple qui se tenaient dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Qu''il en soit ainsi ! '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 27.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1R 1.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Que le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' fasse ainsi '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '17.16 ; 20.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réalise
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: confirme
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que tu as dites en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que tu as prophétisées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; même verbe traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'annoncer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 8s ; cf. 2.8
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 26.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le prophète Jérémie dit : Qu''il en soit ainsi ! Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' fasse ainsi ! Que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' réalise les paroles que tu as dites en prophète, et qu''il ramène de Babylone en ce lieu les objets de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et tous les exilés ! '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à toi et à tout le peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à tes oreilles et aux oreilles de tout le peuple.
      marker-yv: yv-n
    - type: text
      text: 'Seulement écoute, je te prie, cette parole que je te dis, à toi et à tout le peuple : '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '26.18,20 ; cf. Am 1.3ss. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: malheur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: famine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 14.12+.'
      marker-yv: yv-n
    - type: text
      text: 'Les prophètes qui ont paru avant moi et avant toi, depuis toujours, ont annoncé contre de nombreux pays et de grands royaumes la guerre, le malheur et la peste ; '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '28.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que tout ira bien '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la paix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 4.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 6.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'quand viendra… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Dt 18.22. Voir « Le prophète de malheur peut-il être un faux prophète ? »♦.
      marker-yv: yv-n
    - type: text
      text: 'mais si un prophète annonce que tout ira bien, c''est quand viendra ce qu''il a annoncé qu''il sera reconnu comme un prophète vraiment envoyé par le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
