    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les pères
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', c.-à-d. les patriarches (cf. Ex 13.5 ; Jn 7.22). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de qui est issu '
    - type: usfm
      marker: ft
      children:
