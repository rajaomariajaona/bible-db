    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tous ceux qui sont issus d''Israël… '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 2.28s ; voir Gn 32.29 ; cf. Ga 6.16.
    marker-yv: yv-n
  - type: text
    text: 'Ce n''est pas que la parole de Dieu soit devenue caduque. Car tous ceux qui sont issus d''Israël ne sont pas Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
