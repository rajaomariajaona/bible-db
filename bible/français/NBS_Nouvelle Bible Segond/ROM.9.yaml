  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Pour être…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: pour être la descendance d'Abraham, tous ne sont pas ses enfants
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 8,29 ; 4.13+,16,18 ; 11.1 ; Mt 3.9 ; Jn 8.31-44 ; Ga 3.7,29 ; 4.21-31. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est en Isaac…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en Isaac sera appelée pour toi une descendance
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 11 ; '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Gn 21.12
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; Hé 11.18.'
    marker-yv: yv-n
  - type: text
    text: 'Pour être les enfants d''Abraham, tous ne sont pas sa descendance ; mais : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: C'est en Isaac que tu auras ce qui sera appelé ta descendance ;
  - type: text
    text: ' '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: c'est-à-dire
    - type: usfm
      marker: ft
      children:
