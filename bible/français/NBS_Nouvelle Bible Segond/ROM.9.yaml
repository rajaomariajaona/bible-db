  - type: text
    text: 'Je dis la vérité dans le Christ, je ne mens pas, ma conscience m''en rend témoignage par l''Esprit saint : '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '2'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.2 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tristesse… dans le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Jn 16.6.
    marker-yv: yv-n
  - type: text
    text: 'j''ai une grande tristesse et un tourment continuel dans le cœur. '
  - type: usfm
    marker: vlbl
