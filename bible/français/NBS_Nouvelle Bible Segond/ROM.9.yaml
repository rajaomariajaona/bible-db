      - type: text
        text: ' emploie, p. ex., en Dt 7.26 (sur le terme hébreu correspondant, voir Dt 2.34'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ') ; Za 14.11+ ; il évoque ici une condamnation ou une malédiction (voir '
