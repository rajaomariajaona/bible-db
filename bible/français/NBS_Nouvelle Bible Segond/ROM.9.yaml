      marker: fr
      children:
      - type: text
        text: '9.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la parole de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
