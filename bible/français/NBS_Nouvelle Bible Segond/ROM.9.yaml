document_id: ROM.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Dieu et le peuple qu'il a choisi
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.15 ; 8.16 ; 2Co 2.17 ; 11.31 ; Ga 1.20 ; 1Tm 2.7. –  m''en rend témoignage  : autre traduction en rend témoignage avec moi  ; cf. 8.16n. – Voir Esprit, saint.'
  - type: text
    content: 'Je dis la vérité dans le Christ, je ne mens pas, ma conscience m''en rend témoignage par l''Esprit saint : '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Rébecca / Isaac Gn 24.67 ; 25.21. –  d''un seul homme  : cf. 5.12ss.'
  - type: text
    content: 'Bien plus, il en fut ainsi de Rébecca, qui conçut d''un seul homme, Isaac, notre père ; '
  '11':
  - type: note
    content: 'fait  : litt. pratiqué, cf. 1.32ss ; 7.15,19. –  le projet de Dieu 8.28n. –  selon son choix  : litt. selon un choix (mot traditionnellement rendu par élection) 8.33 ; 11.5ss,28 ; 1Th 1.4 ; 2P 1.10.'
  - type: text
    content: 'les enfants, en effet, n''étaient pas encore nés et ils n''avaient encore fait ni bien ni mal, et pourtant – afin que demeure le projet de Dieu qui est selon son choix, '
  '12':
  - type: note
    content: sera l'esclave du (ou servira le) plus petit Gn 25.23.
  - type: text
    content: 'relevant, non pas des œuvres, mais de celui qui appelle – il fut dit à Rébecca : '
  - type: text
    content: Le plus grand sera l'esclave du plus petit,
  - type: text
    content: ' '
  '13':
  - type: note
    content: Ml 1.2s. Sur l'antithèse aimer / détester (ou haïr), qui peut aussi avoir le sens de préférer (l'un à l'autre), cf. Gn 29.31 ; Lc 14.26/ /.
  - type: text
    content: 'ainsi qu''il est écrit : '
  - type: text
    content: J'ai aimé Jacob et j'ai détesté Esaü
  - type: text
    content: .
  '14':
  - type: text
    content: ' '
  - type: note
    content: Dt 32.4 ; Ps 36.7 ; 89.15 ; 119.75 ; Mt 20.13.
  - type: text
    content: 'Que dirons-nous donc ? Y a-t-il en Dieu de l''injustice ? Jamais de la vie ! '
  '15':
  - type: note
    content: Ex 33.19.
  - type: text
    content: 'Car il dit à Moïse : '
  - type: text
    content: J'aurai compassion de qui j'aurai compassion, et je serai magnanime envers qui je serai magnanime
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'ni de celui qui veut…  : c.-à-d. ni de la volonté ni des efforts. –  Dieu, qui a compassion 11.31s ; 15.9 ; Es 49.10 ; Ep 2.4 ; Tt 3.5 ; cf. Ec 9.11.'
  - type: text
    content: 'Ainsi donc, cela ne dépend ni de celui qui veut, ni de celui qui court, mais de Dieu, qui a compassion. '
  '17':
  - type: note
    content: 'Ex 9.16. –  suscité  : 1Co 6.14n. – Voir nom. –  annoncé  : même verbe grec en Lc 9.60 ; Ac 21.26.'
  - type: text
    content: 'Car l''Ecriture dit au pharaon : '
  - type: text
    content: Je t'ai suscité tout exprès pour montrer en toi ma puissance et pour que mon nom soit annoncé par toute la terre
  - type: text
    content: '. '
  '18':
  - type: note
    content: 'il fait s''obstiner  : litt. il endurcit, cf. 2.5 ; voir Ex 4.21n  ; 7.3n.'
  - type: text
    content: Ainsi donc, il a compassion de qui il veut, et il fait s'obstiner qui il veut.
  - type: heading
    content: La colère et la compassion de Dieu
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 3.5-8+ ; Sagesse 12.12 : « Qui donc en effet osera te dire : Qu''as-tu fait ? Qui s''opposera à ta décision ? » –  comment peut-il…  : autre traduction de quoi se plaint-il encore ?'
  - type: text
    content: 'Alors, diras-tu, comment peut-il encore faire des reproches ? En effet, qui peut s''opposer à sa décision ? '
  '2':
  - type: note
    content: tristesse… dans le cœur Jn 16.6.
  - type: text
    content: 'j''ai une grande tristesse et un tourment continuel dans le cœur. '
  '20':
  - type: note
    content: Es 29.16  ; 45.9 ; cf. Jb 9.12 ; 11.7 ; 38.2.
  - type: text
    content: 'Mais toi, humain, qui es-tu donc pour discuter avec Dieu ? '
  - type: text
    content: 'L''objet façonné dira-t-il à celui qui l''a façonné : Pourquoi m''as-tu fait'
  - type: text
    content: ' ainsi ? '
  '21':
  - type: note
    content: 'n''a-t-il pas autorité (Mc 1.22n) ; cf. Es 64.7 ; Jr 18.6+ ; voir aussi Gn 2.7n  ; Sagesse 15.7 : « Ainsi ce potier qui pétrit laborieusement de la terre molle et qui façonne chacun de nos objets domestiques. Avec la même glaise il modèle et les ustensiles destinés aux emplois propres et ceux qui servent à des usages opposés, le tout pareillement : mais quelle sera alors la fonction de ces objets, c''est le potier qui en décide. » –  pâte  : même terme en 11.16. –  un objet  : le mot est traditionnellement rendu par vase, mais il signifie souvent d''une façon assez générale ustensile, instrument. –  pour un usage noble / vil  : litt. pour l''honneur / pour le déshonneur, cf. 1.26 ; 2Tm 2.20.'
  - type: text
    content: 'Le potier n''a-t-il pas autorité sur l''argile, pour faire avec la même pâte un objet pour un usage noble et un objet pour un usage vil ? '
  '22':
  - type: note
    content: 'Cf. 2.4 ; 3.25s ; Es 13.5 ; 54.16 ; Jr 50.25n. –  faire connaître  : même verbe v. 23 ; 16.26 (porter à la connaissance de) ; Lc 2.15n  ; Jn 15.15+ ; il est aussi traduit par certifier (1Co 12.3n), rappeler (15.1) ; Ep 1.9n.'
  - type: text
    content: 'Et si Dieu, voulant montrer sa colère et faire connaître son pouvoir, a supporté avec une grande patience des objets de colère formés pour la perdition, '
  '23':
  - type: note
    content: '8.29s ; Ep 1.3-12 ; 2.1-7. –  la richesse 10.12 ; 11.33 ; Ep 1.18 ; 3.16 ; Ph 4.19 ; Col 1.27. – Voir gloire. –  objets (v. 21n) : cf. Ac 9.15.'
  - type: text
    content: 'afin de faire connaître la richesse de sa gloire à des objets de compassion qu''il avait d''avance préparés pour la gloire '
  '24':
  - type: note
    content: appelés 1.6+ ; 2Th 2.14. – Voir Juifs et non-Juifs.
  - type: text
    content: '– c''est-à-dire à nous qu''il a appelés, non seulement d''entre les Juifs, mais encore d''entre les non-Juifs, '
  '25':
  - type: note
    content: Os 2.25  ; 1P 2.10.
  - type: text
    content: 'comme il le dit dans Osée :'
  - type: text
    content: Celui qui n'était pas mon peuple,
  - type: text
    content: je l'appellerai mon peuple,
  - type: text
    content: et celle qui n'était pas la bien-aimée,
  - type: text
    content: je l'appellerai bien-aimée ;
  '26':
  - type: text
    content: ' '
  - type: note
    content: Os 2.1 . – Voir fils.
  - type: text
    content: 'et là même où on leur disait :'
  - type: text
    content: « Vous n'êtes pas mon peuple ! »
  - type: text
    content: ils seront appelés fils du Dieu vivant
  - type: text
    content: .
  '27':
  - type: text
    content: ' '
  - type: note
    content: Es 10.22s . –  Israélites Lc 1.16n. –  un reste 11.5.
  - type: text
    content: 'Esaïe, de son côté, s''écrie au sujet d''Israël :'
  - type: text
    content: Quand le nombre des Israélites serait comme le sable de la mer,
  - type: text
    content: c'est un reste qui sera sauvé ;
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'pleinement et rapidement  : litt. en achevant (ou en accomplissant ) et en retranchant (ou en abrégeant ) ; les deux verbes grecs correspondants sont également associés dans LXX en Es 10.22s  ; 28.22 (pour l''expression hébraïque traduite par la destruction est décidée ) ; Dn 5.28n.'
  - type: text
    content: car le Seigneur exécutera pleinement et rapidement sa parole sur la terre
  - type: text
    content: .
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'l''a dit d''avance  : autre traduction, moins probable, l''avait dit auparavant ; Es 1.9  ; cf. Mt 10.15+. –  Sabaoth  : transcription en grec du mot hébreu ( tseva''oth ) traduit par des Armées dans l''A.T. ; cf. Es 1.9n  ; Jc 5.4 ; voir aussi noms divins.'
  - type: text
    content: 'Et, comme Esaïe l''a dit d''avance :'
  - type: text
    content: Si le Seigneur Sabaoth ne nous avait pas laissé une descendance,
  - type: text
    content: nous serions devenus comme Sodome,
  - type: text
    content: nous aurions été semblables à Gomorrhe
  - type: text
    content: .
  - type: heading
    content: 'Israël et la justice : un malentendu'
  '3':
  - type: note
    content: 'être… anathème  : cette expression transcrit le mot grec qui figure ici et que LXX emploie, p. ex., en Dt 7.26 (sur le terme hébreu correspondant, voir Dt 2.34n) ; Za 14.11+ ; il évoque ici une condamnation ou une malédiction (voir bénédiction, malédiction) irrémédiable ; 1Co 12.3 ; 16.22 ; Ga 1.8s ; cf. Ac 23.12,14 ; voir aussi Ex 32.32 ; 2Co 11.29 ; 1Jn 3.16. –  séparé (terme sous-entendu dans le texte grec) du Christ  : certains mss portent par le Christ  ; cf. 8.35ss. –  les gens de ma parenté…  : cf. 16.7,11,21. –  selon la chair  : cf. v. 5 ; 1.3n  ; 4.1.'
  - type: text
    content: 'Car je souhaiterais être moi-même anathème, séparé du Christ, pour mes frères, les gens de ma parenté selon la chair, '
  '30':
  - type: text
    content: ' '
  - type: note
    content: poursuivaient ou recherchaient  ; cf. 10.20 ; voir aussi 12.13n  ; 14.19n  ; 1Co 14.1n  ; Ph 3.12nss ; 1Tm 6.11n  ; 2Tm 2.22n. Autre traduction des non-Juifs qui ne recherchaient pas de justice ont obtenu une justice – celle qui est en vertu d'une foi.
  - type: text
    content: 'Que dirons-nous donc ? Des non-Juifs, qui ne poursuivaient pas la justice, ont obtenu une justice – celle qui relève de la foi – '
  '31':
  - type: note
    content: 'une loi de justice  : on peut comprendre une loi qui exige la justice ou bien une loi destinée à donner la justice, à conduire à la justice  ; cf. 10.2-9+ ; 11.7 ; cf. Dt 16.20 ; Es 51.1 ; Pr 15.9 ; Lc 18.9-14 ; Siracide 27.8 : « Si tu poursuis la justice, tu l''atteindras et tu t''en revêtiras comme d''un manteau glorieux. » –  est passé à côté…  : litt. n''a pas atteint la loi ou n''est pas parvenu à la loi  ; voir aussi 2.21ss ; sur le verbe correspondant, voir Lc 11.20n.'
  - type: text
    content: 'tandis qu''Israël, qui poursuivait une loi de justice, est passé à côté de cette loi. '
  '32':
  - type: note
    content: 'Parce qu''il…  : litt. parce que non (en vertu) d''une foi, mais comme (en vertu) d''œuvres. –  pierre d''achoppement 1P 2.8.'
  - type: text
    content: 'Pourquoi ? Parce qu''il l''a poursuivie, non pas en vertu de la foi, mais comme si elle relevait des œuvres. Ils se sont achoppés à la pierre d''achoppement, '
  '33':
  - type: note
    content: '10.11 ; Es 8.14 ; 28.16  ; Mt 21.42+ ; Lc 2.34 ; 1P 2.6-8. –  qui cause la chute  : traduction traditionnelle de scandale  ; autre traduction qui fait trébucher, cf. 11.9 ; 14.13 ; 16.17 ; Mt 11.6n.'
  - type: text
    content: 'ainsi qu''il est écrit :'
  - type: text
    content: Je mets en Sion une pierre d'achoppement, un rocher qui cause la chute,
  - type: text
    content: et celui qui croit en lui ne sera pas pris de honte
  - type: text
    content: .
  '4':
  - type: note
    content: Israélites 2Co 11.22 ; cf. Gn 32.29. –  l'adoption filiale 8.15n  ; cf. Ex 4.22 ; Dt 14.1 ; Os 11.1 ; 2Co 11.22. –  la gloire Ex 16.10 ; Es 40.5 ; Ps 85.10 ; 2Co 3.7. – Voir aussi 3.2 ; Gn 12.2s ; Ex 19.5s ; 24.7s ; Dt 7.6 ; 2S 7.11-16 ; Ps 89.29 ; Ac 13.17 ; Ep 2.12 ; voir aussi alliances, culte et loi.
  - type: text
    content: 'eux qui sont les Israélites, à qui appartiennent l''adoption filiale, la gloire, les alliances, la loi, le culte, les promesses, '
  '5':
  - type: note
    content: 'les pères, c.-à-d. les patriarches (cf. Ex 13.5 ; Jn 7.22). –  de qui est issu (cf. Mt 1 ; Lc 3.23-38 ; Ga 4.4)… : autre traduction  : de qui est issu le Christ selon la chair (cf. v. 3+ ; 1.3), Dieu, qui est au-dessus de tout (ou de tous, cf. 10.11-13), soit béni pour toujours (cf. 1.25 ; Ps 41.14 ; 2Co 1.3 ; 11.31 ; Ep 1.3 ; 4.6). Voir aussi, dans le sens de la traduction choisie, Jn 1.1,18 ; 3.31 ; Tt 2.13 ; 1Jn 5.20.'
  - type: text
    content: 'les pères, et de qui est issu, selon la chair, le Christ, qui est au-dessus de tout, Dieu béni pour toujours ! '
  - type: text
    content: Amen !
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'la parole de Dieu  : cf. Nb 23.19 ; Es 55.10s ; Hé 4.12. –  tous ceux qui sont issus d''Israël… 2.28s ; voir Gn 32.29 ; cf. Ga 6.16.'
  - type: text
    content: 'Ce n''est pas que la parole de Dieu soit devenue caduque. Car tous ceux qui sont issus d''Israël ne sont pas Israël. '
  '7':
  - type: note
    content: 'Pour être…  : autre traduction pour être la descendance d''Abraham, tous ne sont pas ses enfants  ; cf. v. 8,29 ; 4.13+,16,18 ; 11.1 ; Mt 3.9 ; Jn 8.31-44 ; Ga 3.7,29 ; 4.21-31. –  C''est en Isaac…  : litt. en Isaac sera appelée pour toi une descendance, cf. v. 11 ; Gn 21.12  ; Hé 11.18.'
  - type: text
    content: 'Pour être les enfants d''Abraham, tous ne sont pas sa descendance ; mais : '
  - type: text
    content: C'est en Isaac que tu auras ce qui sera appelé ta descendance ;
  - type: text
    content: ' '
  '8':
  - type: note
    content: 'c''est-à-dire  : cf. 10.6n. –  promesse 4.13 ; 15.8 ; cf. Ga 4.23.'
  - type: text
    content: '– c''est-à-dire : ce ne sont pas les enfants de la chair qui sont enfants de Dieu, mais ce sont les enfants de la promesse qui sont comptés comme descendance. '
  '9':
  - type: note
    content: 'Gn 18.10,14. –  A cette même époque  : litt. en ce temps-ci, cf. 3.26n.'
  - type: text
    content: 'Voici, en effet, la parole de la promesse : '
  - type: text
    content: A cette même époque, je viendrai et Sara aura un fils
  - type: text
    content: .
