    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', soit béni pour toujours '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (cf. 1.25 ; Ps 41.14 ; 2Co 1.3 ; 11.31 ; Ep 1.3 ; 4.6). Voir aussi, dans le sens de la traduction choisie, Jn 1.1,18 ; 3.31 ; Tt 2.13 ; 1Jn 5.20.
    marker-yv: yv-n
  - type: text
    text: 'les pères, et de qui est issu, selon la chair, le Christ, qui est au-dessus de tout, Dieu béni pour toujours ! '
  - type: usfm
    marker: it
    children:
    - type: text
      text: Amen !
