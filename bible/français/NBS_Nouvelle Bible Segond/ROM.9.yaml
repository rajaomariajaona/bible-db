      marker: fqa
      children:
      - type: text
        text: par le Christ
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 8.35ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les gens de ma parenté…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 16.7,11,21. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'selon la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: chair
    - type: usfm
