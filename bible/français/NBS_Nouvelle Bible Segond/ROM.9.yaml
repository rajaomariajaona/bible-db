        text: '  : cf. 10.6'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'promesse '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 4.13 ; 15.8 ; cf. Ga 4.23.
    marker-yv: yv-n
  - type: text
    text: '– c''est-à-dire : ce ne sont pas les enfants de la chair qui sont enfants de Dieu, mais ce sont les enfants de la promesse qui sont comptés comme descendance. '
