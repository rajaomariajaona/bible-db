  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.4 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Israélites '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '2Co 11.22 ; cf. Gn 32.29. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''adoption '
      - type: usfm
        marker: w
        children:
        - type: text
