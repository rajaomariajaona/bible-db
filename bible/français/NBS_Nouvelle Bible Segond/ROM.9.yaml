      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Voici, en effet, la parole de la promesse : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: A cette même époque, je viendrai et Sara aura un fils
  - type: text
    text: .
