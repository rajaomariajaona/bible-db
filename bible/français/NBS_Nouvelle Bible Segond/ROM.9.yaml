      text: '15'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '9.15 '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Ex 33.19.
    marker-yv: yv-n
  - type: text
    text: 'Car il dit à Moïse : '
  - type: usfm
    marker: it
    children:
    - type: text
      text: J'aurai compassion de qui j'aurai compassion, et je serai magnanime envers qui je serai magnanime
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
