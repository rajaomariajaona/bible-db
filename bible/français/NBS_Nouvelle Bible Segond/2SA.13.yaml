document_id: 2SA.13,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Amnon et Tamar
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Absalom '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (3.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') et '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amnon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(3.2) sont des demi-frères par leur père David ; '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tamar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sœur d’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Absalom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', est donc une demi-sœur d’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amnon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''aimait '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tomba amoureux d'elle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . – Comparer le présent chapitre avec Gn 34.
      marker-yv: yv-n
    - type: text
      text: 'Après cela, voici ce qui arriva : Absalom, fils de David, avait une sœur qui était belle et qui se nommait Tamar ; Amnon, fils de David, l''aimait. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Alors Amnon dit à Tamar : Apporte-le-moi dans la chambre, et nourris-moi de ta propre main. Tamar prit les gâteaux qu''elle avait faits et les apporta à Amnon, son frère, dans la chambre. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: couche avec moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 39.12.'
      marker-yv: yv-n
    - type: text
      text: 'Comme elle les lui présentait, pour qu''il mange, il la saisit et lui dit : Viens, couche avec moi, ma sœur ! '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: cela est inadmissible en Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cela ne se fait pas en Israël '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(voir Gn 20.9 ; 29.26 ; 34.7 ; cf. Jg 19.30). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne commets pas une telle folie
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Gn 34.7 ; Jg 19.23.'
      marker-yv: yv-n
    - type: text
      text: 'Elle lui répondit : Non, mon frère, n''abuse pas de moi, car cela est inadmissible en Israël ; ne commets pas une telle folie. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon déshonneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'outrage qui m'a été fait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: parle au roi ; il ne refusera pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le droit ancien autorisait un mariage entre demi-frère et demi-sœur (voir en Gn 20.11-13 le cas d''Abraham et Sara), alors que des législations ultérieures comme celles de Lv 18.9 ; 20.17 ; Dt 27.22 l''excluaient.'
      marker-yv: yv-n
    - type: text
      text: 'Où irais-je, moi, avec mon déshonneur ? Et toi, tu serais comme un fou en Israël. Maintenant, je te prie, parle au roi ; il ne refusera pas de me donner à toi. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il abusa d''elle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il la maîtrisa, il la viola
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 34.2 ; Jg 19.24 ; 20.5 ; Lm 5.11.'
      marker-yv: yv-n
    - type: text
      text: 'Mais il ne voulut pas l''écouter ; comme il était plus fort qu''elle, il abusa d''elle ; ainsi il coucha avec elle. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de tout son être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'd''une détestation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: d'une haine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: très grande
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. Sa passion assouvie, '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amnon '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: se met à détester Tamar, qui n'est plus pour lui que le reproche vivant de sa violence.
      marker-yv: yv-n
    - type: text
      text: 'Puis Amnon se mit à la détester de tout son être ; il la détesta plus encore qu''il ne l''avait aimée. Il lui dit : Lève-toi, va-t''en ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un plus grand mal encore
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ce mal (serait) plus grand que l'autre que tu as fait avec moi.
      marker-yv: yv-n
    - type: text
      text: 'Elle lui répondit : Tu ferais un plus grand mal encore en me renvoyant. Mais il ne voulut pas l''écouter. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son serviteur personnel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son serviteur, son auxiliaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; sur ce dernier mot, cf. Ex 24.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 11.28 ; Jos 1.1 ; 1R 10.5 ; 2R 4.43 ; Est 2.2+.'
      marker-yv: yv-n
    - type: text
      text: 'Il appela son serviteur personnel et lui dit : Renvoyez-moi celle-là dehors, je vous prie ! Verrouille la porte derrière elle ! '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'une tunique multicolore '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une tunique à longues manches
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le sens du terme hébreu correspondant est très incertain (cf. Gn 37.3). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le serviteur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, selon la traduction habituelle du terme, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'auxiliaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Elle portait une tunique multicolore, car c''était le vêtement dont étaient vêtues les filles vierges du roi. Le serviteur d''Amnon la mit dehors et verrouilla la porte derrière elle. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'répandit de la cendre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déchira la tunique
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir 1.2 ; 1S 4.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'sur sa tête '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou peut-être '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sur son visage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', pour cacher sa honte ; cf. Jr 2.37.'
      marker-yv: yv-n
    - type: text
      text: 'Tamar répandit de la cendre sur sa tête et déchira la tunique multicolore qu''elle portait ; elle mit sa main sur sa tête et s''en alla en poussant des cris. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tourmenté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 13.12 ; '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Judith
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.16 : « Judith entra… ; le cœur d''Holopherne fut transporté par elle et son âme fut agitée. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il paraissait difficile…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les filles nubiles ne vivaient pas dans les mêmes appartements que les hommes, fussent-ils leurs frères ou demi-frères. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la moindre tentative
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'quelque chose '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: quoi que ce soit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit probablement d''un euphémisme.'
      marker-yv: yv-n
    - type: text
      text: 'Amnon était tourmenté jusqu''à se rendre malade à cause de Tamar, sa sœur ; car elle était vierge, et il paraissait difficile à Amnon de faire auprès d''elle la moindre tentative. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amnon a-t-il été avec toi ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'euphémisme pour '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Amnon a-t-il abusé de toi ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ne te soucie pas de cette affaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne prends pas cette affaire trop à '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on ne sait pas si Absalom, en minimisant l’'
      - type: usfm
        marker: fq
        children:
        - type: text
          text: affaire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', veut apaiser sa sœur, ou camoufler ses propres sentiments de haine à l''égard d''Amnon (cf. v. 22), afin que celui-ci ne soit pas sur ses gardes. Une chose est sûre : il prend l’'
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'affaire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en main (cf. v. 28s).
      marker-yv: yv-n
    - type: text
      text: 'Absalom, son frère, lui dit : Ton frère Amnon a-t-il été avec toi ? Maintenant, ma sœur, garde le silence ; c''est ton frère. Ne te soucie pas de cette affaire. Tamar, délaissée, s''installa chez Absalom, son frère.'
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: très fâché
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 12.5 ; Gn 34.7 ; 38.24 ; 1S 2.22-25. – Certaines versions anciennes, avec l''appui d''un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ', ont en plus la phrase suivante'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Toutefois, il ne chagrina pas l''esprit d''Amnon son fils, car il l''aimait, parce qu''il était son aîné. Chagriner l''esprit de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie concrètement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: faire des reproches à.
      marker-yv: yv-n
    - type: text
      text: 'Le roi David apprit tout cela et il fut très fâché. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne dit rien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne parla ni en mal ni en bien
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 31.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il le détestait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Lv 19.17s ; Pr 10.18.'
      marker-yv: yv-n
    - type: text
      text: Absalom ne dit rien à Amnon ; mais il le détestait, parce qu'il avait abusé de Tamar, sa sœur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Absalom fait tuer Amnon et s'enfuit
    marker-yv: yv-h
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les tondeurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : voir Gn 38.12 ; 1S 25.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Baal-Hatsor '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ephraïm
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : noms de deux localités situées à environ 25 km au nord de Jérusalem (cf. Jn 11.54).'
      marker-yv: yv-n
    - type: text
      text: 'Deux ans après, comme Absalom avait les tondeurs à Baal-Hatsor, près d''Ephraïm, il invita tous les fils du roi. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Absalom alla trouver le roi et lui dit : J''ai chez moi les tondeurs ; accepte, ô roi, de venir chez moi avec les gens de ta cour. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : salutation d''adieu.'
      marker-yv: yv-n
    - type: text
      text: 'Le roi dit à Absalom : Non, mon fils, je t''en prie ! Nous n''irons pas tous, nous te serions à charge. Absalom insista auprès de lui, mais le roi ne voulut pas y aller et il le bénit. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Amnon
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', en tant que fils aîné, sera le représentant du roi à la fête. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Pourquoi irait-il chez toi ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: il semble que le roi se méfie de quelque chose.
      marker-yv: yv-n
    - type: text
      text: 'Absalom dit : Laisse au moins Amnon, mon frère, venir avec nous, je te prie. Le roi lui répondit : Pourquoi irait-il chez toi ? '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.27 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Certaines versions anciennes, avec l''appui d''un ms de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Qumrân
        - type: text
          text: ', ajoutent'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Alors Absalom fit un festin pareil au festin du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1S 25.36.'
      marker-yv: yv-n
    - type: text
      text: Sur l'insistance d'Absalom, le roi laissa aller avec lui Amnon et tous les fils du roi.
  '28':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu ainsi traduit peut aussi signifier '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: jeunes gens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; de même aux v. 29,32,34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: content, à cause du vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 1S 25.36 ; Ps 104.15 ; Lc 21.34. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: que je vous dirai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2R 10.24s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vaillants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2.7 ; 1S 14.52.'
      marker-yv: yv-n
    - type: text
      text: 'Absalom donna cet ordre à ses serviteurs : Regardez, je vous prie. Quand Amnon aura le cœur content, à cause du vin, et que je vous dirai : « Frappez Amnon ! », alors vous le mettrez à mort. N''ayez pas peur : n''est-ce pas moi qui vous l''ordonne ? Soyez forts et vaillants ! '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.29 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: La mort d'Amnon est une première réalisation de l'annonce de 12.10
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sur son mulet
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c''est la monture des rois et des princes, cf. 18.9 ; 1R 1.33.'
      marker-yv: yv-n
    - type: text
      text: 'Les serviteurs d''Absalom traitèrent Amnon comme Absalom l''avait ordonné. Alors tous les fils du roi montèrent chacun sur son mulet et s''enfuirent. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Shiméa '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '21.21 ; il est appelé '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Shamma '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 1S 16.9 ; 17.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: habile
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu correspondant signifie souvent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais le contexte met ici l''accent sur le caractère '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'avisé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'astucieux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: de Jonadab ; cf. 14.2.
      marker-yv: yv-n
    - type: text
      text: 'Amnon avait un ami nommé Jonadab, fils de Shiméa, frère de David, et Jonadab était un homme très habile. '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Comme ils étaient en chemin, cette nouvelle parvint à David : Absalom a tué tous les fils du roi, il n''en est pas resté un seul ! '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: déchira ses vêtements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: se leva et déchira ses vêtements
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; voir 1S 4.12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'se coucha par terre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 12.16.
      marker-yv: yv-n
    - type: text
      text: 'Le roi déchira ses vêtements et se coucha par terre ; et tous les gens de sa cour se tenaient là, les vêtements déchirés. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.32 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jonadab '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Ne dis pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne te dis pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ne pense pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les fils du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'les jeunes gens '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les fils du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Cela, Absalom l'avait résolu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cela était placé sur la bouche d'Absalom.
      marker-yv: yv-n
    - type: text
      text: 'Jonadab, fils de Shiméa, frère de David, dit : Ne dis pas, mon seigneur, qu''on a mis à mort tous les fils du roi : Amnon seul est mort. Cela, Absalom l''avait résolu depuis le jour où Amnon a abusé de sa sœur Tamar. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne fais pas attention à ce qu'on t'a dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne place pas dans ton '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: ' une parole disant'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 19.20.'
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, ô roi, mon seigneur, ne fais pas attention à ce qu''on t''a dit, comme quoi tous les fils du roi seraient morts : Amnon seul est mort.'
  '34':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.34 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Absalom prit la fuite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : ces mots pourraient aussi être rattachés au discours direct de Jonadab, à la fin du v. 33'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et Absalom a pris la fuite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le guetteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'le jeune homme '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le serviteur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui faisait le guet. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '– Ce verset est plus long dans '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ', qui pourrait avoir conservé des mots omis par un copiste du texte hébreu'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'venait par le chemin de Horonaïm ; le guetteur vint l''annoncer au roi et lui dit : J''ai vu des hommes arriver par le chemin de Horonaïm, du côté de la montagne.'
      marker-yv: yv-n
    - type: text
      text: Absalom prit la fuite.
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Le guetteur leva les yeux et vit une grande troupe venir par le chemin qui était derrière lui, du côté de la montagne. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.35 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: C'est bien ce que je disais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 32.'
      marker-yv: yv-n
    - type: text
      text: 'Jonadab dit au roi : Ce sont les fils du roi qui arrivent ! C''est bien ce que je disais. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.36 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se mirent à sangloter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1S 11.4'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Comme il achevait de parler, les fils du roi arrivèrent. Ils se mirent à sangloter ; le roi et tous les gens de sa cour pleurèrent aussi abondamment. '
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Talmaï… roi de Gueshour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'était le grand-père maternel d''Absalom, voir 3.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ammihoud
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : d''après une tradition juive ; une autre tradition juive propose '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ammihour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: portait tous les jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: portait toujours ; porta longtemps.
      marker-yv: yv-n
    - type: text
      text: Absalom avait pris la fuite et était allé chez Talmaï, fils d'Ammihoud, roi de Gueshour ; David portait tous les jours le deuil de son fils.
  '38':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à Gueshour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : un des petits royaumes araméens, situé à l''est du lac de Gennésareth ; voir 14.23,32.'
      marker-yv: yv-n
    - type: text
      text: 'Absalom, qui avait pris la fuite pour aller à Gueshour, y resta trois ans. '
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Le roi David cessa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : en hébreu, la forme verbale exige un sujet féminin, qui est attesté dans un ms de Qumrân et dans LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'l''esprit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(féminin en hébreu) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du roi cessa
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Le sens de ce verset n'est pas certain ; on pourrait aussi comprendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Le roi David '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'esprit du roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cessa de pencher en faveur d'Absalom, car il avait de la peine à cause de la mort d'Amnon.
      marker-yv: yv-n
    - type: text
      text: Le roi David cessa de poursuivre Absalom, car il était consolé de la mort d'Amnon.
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'misérable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: déprimé, désespéré, abattu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. 1R 21.5.'
      marker-yv: yv-n
    - type: text
      text: 'Il lui dit : Pourquoi as-tu l''air si misérable matin après matin, fils du roi ? Ne veux-tu pas me le dire ? Amnon lui répondit : J''aime Tamar, la sœur d''Absalom, mon frère. '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à manger
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du pain
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 1S 14.24'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'elle me la donne…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: que je mange de sa main.
      marker-yv: yv-n
    - type: text
      text: 'Jonadab lui dit : Couche-toi et fais le malade. Quand ton père viendra te voir, tu lui diras : « Je t''en prie, que ma sœur Tamar vienne me donner à manger ; qu''elle prépare la nourriture sous mes yeux, afin que je la voie et qu''elle me la donne de sa propre main ! » '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: gâteaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot hébreu ressemble à celui qui signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on a donc pensé à des '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'gâteaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en forme de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', mais il pourrait aussi s''agir d''une tout autre racine hébraïque, désignant des sortes de '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: crêpes.
      marker-yv: yv-n
    - type: text
      text: 'Amnon se coucha et fit le malade. Le roi vint le voir, et Amnon dit au roi : Je te prie, que ma sœur Tamar vienne faire deux gâteaux sous mes yeux, et qu''elle me nourrisse de sa propre main. '
  '7':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'David fit dire à Tamar, chez elle : Va, je te prie, chez Amnon, ton frère, et prépare-lui à manger. '
  '8':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Tamar alla chez Amnon, son frère, qui était couché. Elle prit de la pâte, la pétrit, prépara devant lui des gâteaux et les fit cuire. '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '13.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: poêle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre terme en Lv 2.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le servit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la vida devant lui ; devant lui '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie probablement ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à sa place, à table
      - type: usfm
        marker: ft
        children:
        - type: text
          text: . Mais Amnon exige (v. 10) qu'elle lui apporte cette nourriture au lit.
      marker-yv: yv-n
    - type: text
      text: 'Puis elle prit la poêle et le servit. Mais Amnon refusa de manger. Il dit : Faites sortir tout le monde de chez moi ! Et tout le monde sortit de chez lui. '
