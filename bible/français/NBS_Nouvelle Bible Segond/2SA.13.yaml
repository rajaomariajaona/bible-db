document_id: 2SA.13,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Amnon et Tamar
  - type: text
    content: ' '
  - type: note
    content: Absalom (3.3n) et Amnon (3.2) sont des demi-frères par leur père David ; Tamar , sœur d’ Absalom , est donc une demi-sœur d’ Amnon . –  l'aimait ou tomba amoureux d'elle . – Comparer le présent chapitre avec Gn 34.
  - type: text
    content: 'Après cela, voici ce qui arriva : Absalom, fils de David, avait une sœur qui était belle et qui se nommait Tamar ; Amnon, fils de David, l''aimait. '
  '10':
  - type: text
    content: 'Alors Amnon dit à Tamar : Apporte-le-moi dans la chambre, et nourris-moi de ta propre main. Tamar prit les gâteaux qu''elle avait faits et les apporta à Amnon, son frère, dans la chambre. '
  '11':
  - type: note
    content: 'couche avec moi  : cf. Gn 39.12.'
  - type: text
    content: 'Comme elle les lui présentait, pour qu''il mange, il la saisit et lui dit : Viens, couche avec moi, ma sœur ! '
  '12':
  - type: note
    content: 'cela est inadmissible en Israël  : litt. cela ne se fait pas en Israël (voir Gn 20.9 ; 29.26 ; 34.7 ; cf. Jg 19.30). –  ne commets pas une telle folie  : voir Gn 34.7 ; Jg 19.23.'
  - type: text
    content: 'Elle lui répondit : Non, mon frère, n''abuse pas de moi, car cela est inadmissible en Israël ; ne commets pas une telle folie. '
  '13':
  - type: note
    content: 'mon déshonneur  : autre traduction l''outrage qui m''a été fait. –  parle au roi ; il ne refusera pas…  : le droit ancien autorisait un mariage entre demi-frère et demi-sœur (voir en Gn 20.11-13 le cas d''Abraham et Sara), alors que des législations ultérieures comme celles de Lv 18.9 ; 20.17 ; Dt 27.22 l''excluaient.'
  - type: text
    content: 'Où irais-je, moi, avec mon déshonneur ? Et toi, tu serais comme un fou en Israël. Maintenant, je te prie, parle au roi ; il ne refusera pas de me donner à toi. '
  '14':
  - type: note
    content: il abusa d'elle ou il la maîtrisa, il la viola  ; cf. Gn 34.2 ; Jg 19.24 ; 20.5 ; Lm 5.11.
  - type: text
    content: 'Mais il ne voulut pas l''écouter ; comme il était plus fort qu''elle, il abusa d''elle ; ainsi il coucha avec elle. '
  '15':
  - type: note
    content: 'de tout son être  : litt. d''une détestation (ou d''une haine) très grande. Sa passion assouvie, Amnon se met à détester Tamar, qui n''est plus pour lui que le reproche vivant de sa violence.'
  - type: text
    content: 'Puis Amnon se mit à la détester de tout son être ; il la détesta plus encore qu''il ne l''avait aimée. Il lui dit : Lève-toi, va-t''en ! '
  '16':
  - type: note
    content: 'un plus grand mal encore  : litt. ce mal (serait) plus grand que l''autre que tu as fait avec moi.'
  - type: text
    content: 'Elle lui répondit : Tu ferais un plus grand mal encore en me renvoyant. Mais il ne voulut pas l''écouter. '
  '17':
  - type: note
    content: 'son serviteur personnel  : autre traduction son serviteur, son auxiliaire  ; sur ce dernier mot, cf. Ex 24.13n  ; Nb 11.28 ; Jos 1.1 ; 1R 10.5 ; 2R 4.43 ; Est 2.2+.'
  - type: text
    content: 'Il appela son serviteur personnel et lui dit : Renvoyez-moi celle-là dehors, je vous prie ! Verrouille la porte derrière elle ! '
  '18':
  - type: note
    content: une tunique multicolore ou une tunique à longues manches  ; le sens du terme hébreu correspondant est très incertain (cf. Gn 37.3). –  Le serviteur ou, selon la traduction habituelle du terme, l'auxiliaire, cf. v. 17n.
  - type: text
    content: 'Elle portait une tunique multicolore, car c''était le vêtement dont étaient vêtues les filles vierges du roi. Le serviteur d''Amnon la mit dehors et verrouilla la porte derrière elle. '
  '19':
  - type: note
    content: 'répandit de la cendre / déchira la tunique  : voir 1.2 ; 1S 4.12n. –  sur sa tête ou peut-être sur son visage, pour cacher sa honte ; cf. Jr 2.37.'
  - type: text
    content: 'Tamar répandit de la cendre sur sa tête et déchira la tunique multicolore qu''elle portait ; elle mit sa main sur sa tête et s''en alla en poussant des cris. '
  '2':
  - type: note
    content: 'tourmenté  : cf. Pr 13.12 ; Judith 12.16 : « Judith entra… ; le cœur d''Holopherne fut transporté par elle et son âme fut agitée. » –  il paraissait difficile…  : les filles nubiles ne vivaient pas dans les mêmes appartements que les hommes, fussent-ils leurs frères ou demi-frères. –  la moindre tentative  : litt. quelque chose ou quoi que ce soit  ; il s''agit probablement d''un euphémisme.'
  - type: text
    content: 'Amnon était tourmenté jusqu''à se rendre malade à cause de Tamar, sa sœur ; car elle était vierge, et il paraissait difficile à Amnon de faire auprès d''elle la moindre tentative. '
  '20':
  - type: note
    content: 'Amnon a-t-il été avec toi ? euphémisme pour Amnon a-t-il abusé de toi ? –  Ne te soucie pas de cette affaire  : autre traduction ne prends pas cette affaire trop à cœur  ; on ne sait pas si Absalom, en minimisant l’affaire, veut apaiser sa sœur, ou camoufler ses propres sentiments de haine à l''égard d''Amnon (cf. v. 22), afin que celui-ci ne soit pas sur ses gardes. Une chose est sûre : il prend l’affaire en main (cf. v. 28s).'
  - type: text
    content: 'Absalom, son frère, lui dit : Ton frère Amnon a-t-il été avec toi ? Maintenant, ma sœur, garde le silence ; c''est ton frère. Ne te soucie pas de cette affaire. Tamar, délaissée, s''installa chez Absalom, son frère.'
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'très fâché  : cf. 12.5 ; Gn 34.7 ; 38.24 ; 1S 2.22-25. – Certaines versions anciennes, avec l''appui d''un ms de Qumrân, ont en plus la phrase suivante  : Toutefois, il ne chagrina pas l''esprit d''Amnon son fils, car il l''aimait, parce qu''il était son aîné. Chagriner l''esprit de signifie concrètement faire des reproches à.'
  - type: text
    content: 'Le roi David apprit tout cela et il fut très fâché. '
  '22':
  - type: note
    content: 'ne dit rien  : litt. ne parla ni en mal ni en bien  ; cf. Gn 31.24. –  il le détestait  : cf. Lv 19.17s ; Pr 10.18.'
  - type: text
    content: Absalom ne dit rien à Amnon ; mais il le détestait, parce qu'il avait abusé de Tamar, sa sœur.
  - type: heading
    content: Absalom fait tuer Amnon et s'enfuit
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'les tondeurs  : voir Gn 38.12 ; 1S 25.2n. –  Baal-Hatsor / Ephraïm  : noms de deux localités situées à environ 25 km au nord de Jérusalem (cf. Jn 11.54).'
  - type: text
    content: 'Deux ans après, comme Absalom avait les tondeurs à Baal-Hatsor, près d''Ephraïm, il invita tous les fils du roi. '
  '24':
  - type: text
    content: 'Absalom alla trouver le roi et lui dit : J''ai chez moi les tondeurs ; accepte, ô roi, de venir chez moi avec les gens de ta cour. '
  '25':
  - type: note
    content: 'il le bénit  : salutation d''adieu.'
  - type: text
    content: 'Le roi dit à Absalom : Non, mon fils, je t''en prie ! Nous n''irons pas tous, nous te serions à charge. Absalom insista auprès de lui, mais le roi ne voulut pas y aller et il le bénit. '
  '26':
  - type: note
    content: Amnon, en tant que fils aîné, sera le représentant du roi à la fête. –  Pourquoi irait-il chez toi ? il semble que le roi se méfie de quelque chose.
  - type: text
    content: 'Absalom dit : Laisse au moins Amnon, mon frère, venir avec nous, je te prie. Le roi lui répondit : Pourquoi irait-il chez toi ? '
  '27':
  - type: note
    content: 'Certaines versions anciennes, avec l''appui d''un ms de Qumrân, ajoutent  : Alors Absalom fit un festin pareil au festin du roi  ; cf. 1S 25.36.'
  - type: text
    content: Sur l'insistance d'Absalom, le roi laissa aller avec lui Amnon et tous les fils du roi.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'serviteurs  : le terme hébreu ainsi traduit peut aussi signifier jeunes gens  ; de même aux v. 29,32,34. –  content, à cause du vin  : cf. 1S 25.36 ; Ps 104.15 ; Lc 21.34. –  que je vous dirai  : cf. 2R 10.24s. –  vaillants  : cf. 2.7 ; 1S 14.52.'
  - type: text
    content: 'Absalom donna cet ordre à ses serviteurs : Regardez, je vous prie. Quand Amnon aura le cœur content, à cause du vin, et que je vous dirai : « Frappez Amnon ! », alors vous le mettrez à mort. N''ayez pas peur : n''est-ce pas moi qui vous l''ordonne ? Soyez forts et vaillants ! '
  '29':
  - type: note
    content: 'La mort d''Amnon est une première réalisation de l''annonce de 12.10n. –  sur son mulet  : c''est la monture des rois et des princes, cf. 18.9 ; 1R 1.33.'
  - type: text
    content: 'Les serviteurs d''Absalom traitèrent Amnon comme Absalom l''avait ordonné. Alors tous les fils du roi montèrent chacun sur son mulet et s''enfuirent. '
  '3':
  - type: note
    content: 'Shiméa 21.21 ; il est appelé Shamma en 1S 16.9 ; 17.13. –  habile  : le mot hébreu correspondant signifie souvent sage, mais le contexte met ici l''accent sur le caractère avisé ou astucieux de Jonadab ; cf. 14.2.'
  - type: text
    content: 'Amnon avait un ami nommé Jonadab, fils de Shiméa, frère de David, et Jonadab était un homme très habile. '
  '30':
  - type: text
    content: 'Comme ils étaient en chemin, cette nouvelle parvint à David : Absalom a tué tous les fils du roi, il n''en est pas resté un seul ! '
  '31':
  - type: note
    content: 'déchira ses vêtements  : litt. se leva et déchira ses vêtements  ; voir 1S 4.12n. –  se coucha par terre 12.16.'
  - type: text
    content: 'Le roi déchira ses vêtements et se coucha par terre ; et tous les gens de sa cour se tenaient là, les vêtements déchirés. '
  '32':
  - type: note
    content: 'Jonadab v. 3. –  Ne dis pas ou ne te dis pas, c.-à-d. ne pense pas. –  les fils du roi  : litt. les jeunes gens (ou serviteurs, cf. v. 28n) les fils du roi. –  Cela, Absalom l''avait résolu  : litt. cela était placé sur la bouche d''Absalom.'
  - type: text
    content: 'Jonadab, fils de Shiméa, frère de David, dit : Ne dis pas, mon seigneur, qu''on a mis à mort tous les fils du roi : Amnon seul est mort. Cela, Absalom l''avait résolu depuis le jour où Amnon a abusé de sa sœur Tamar. '
  '33':
  - type: note
    content: 'ne fais pas attention à ce qu''on t''a dit  : litt. ne place pas dans ton cœur une parole disant  ; cf. 19.20.'
  - type: text
    content: 'Maintenant, ô roi, mon seigneur, ne fais pas attention à ce qu''on t''a dit, comme quoi tous les fils du roi seraient morts : Amnon seul est mort.'
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Absalom prit la fuite  : ces mots pourraient aussi être rattachés au discours direct de Jonadab, à la fin du v. 33  : et Absalom a pris la fuite . –  Le guetteur  : litt. le jeune homme (ou le serviteur , cf. v. 28n) qui faisait le guet. – Ce verset est plus long dans LXX, qui pourrait avoir conservé des mots omis par un copiste du texte hébreu  : venait par le chemin de Horonaïm ; le guetteur vint l''annoncer au roi et lui dit : J''ai vu des hommes arriver par le chemin de Horonaïm, du côté de la montagne.'
  - type: text
    content: Absalom prit la fuite.
  - type: text
    content: 'Le guetteur leva les yeux et vit une grande troupe venir par le chemin qui était derrière lui, du côté de la montagne. '
  '35':
  - type: note
    content: 'C''est bien ce que je disais  : cf. v. 32.'
  - type: text
    content: 'Jonadab dit au roi : Ce sont les fils du roi qui arrivent ! C''est bien ce que je disais. '
  '36':
  - type: note
    content: 'se mirent à sangloter  : cf. 1S 11.4n.'
  - type: text
    content: 'Comme il achevait de parler, les fils du roi arrivèrent. Ils se mirent à sangloter ; le roi et tous les gens de sa cour pleurèrent aussi abondamment. '
  '37':
  - type: note
    content: 'Talmaï… roi de Gueshour était le grand-père maternel d''Absalom, voir 3.3. –  Ammihoud  : d''après une tradition juive ; une autre tradition juive propose Ammihour. –  portait tous les jours  : autres traductions portait toujours ; porta longtemps.'
  - type: text
    content: Absalom avait pris la fuite et était allé chez Talmaï, fils d'Ammihoud, roi de Gueshour ; David portait tous les jours le deuil de son fils.
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'à Gueshour  : un des petits royaumes araméens, situé à l''est du lac de Gennésareth ; voir 14.23,32.'
  - type: text
    content: 'Absalom, qui avait pris la fuite pour aller à Gueshour, y resta trois ans. '
  '39':
  - type: note
    content: 'Le roi David cessa  : en hébreu, la forme verbale exige un sujet féminin, qui est attesté dans un ms de Qumrân et dans LXX l''esprit (féminin en hébreu) du roi cessa. Le sens de ce verset n''est pas certain ; on pourrait aussi comprendre  : Le roi David (ou l''esprit du roi) cessa de pencher en faveur d''Absalom, car il avait de la peine à cause de la mort d''Amnon.'
  - type: text
    content: Le roi David cessa de poursuivre Absalom, car il était consolé de la mort d'Amnon.
  '4':
  - type: note
    content: misérable ou déprimé, désespéré, abattu  ; cf. 1R 21.5.
  - type: text
    content: 'Il lui dit : Pourquoi as-tu l''air si misérable matin après matin, fils du roi ? Ne veux-tu pas me le dire ? Amnon lui répondit : J''aime Tamar, la sœur d''Absalom, mon frère. '
  '5':
  - type: note
    content: 'à manger  : litt. du pain, 1S 14.24n. –  qu''elle me la donne…  : litt. que je mange de sa main.'
  - type: text
    content: 'Jonadab lui dit : Couche-toi et fais le malade. Quand ton père viendra te voir, tu lui diras : « Je t''en prie, que ma sœur Tamar vienne me donner à manger ; qu''elle prépare la nourriture sous mes yeux, afin que je la voie et qu''elle me la donne de sa propre main ! » '
  '6':
  - type: note
    content: 'gâteaux  : le mot hébreu ressemble à celui qui signifie cœur  ; on a donc pensé à des gâteaux en forme de cœur, mais il pourrait aussi s''agir d''une tout autre racine hébraïque, désignant des sortes de crêpes.'
  - type: text
    content: 'Amnon se coucha et fit le malade. Le roi vint le voir, et Amnon dit au roi : Je te prie, que ma sœur Tamar vienne faire deux gâteaux sous mes yeux, et qu''elle me nourrisse de sa propre main. '
  '7':
  - type: text
    content: 'David fit dire à Tamar, chez elle : Va, je te prie, chez Amnon, ton frère, et prépare-lui à manger. '
  '8':
  - type: text
    content: 'Tamar alla chez Amnon, son frère, qui était couché. Elle prit de la pâte, la pétrit, prépara devant lui des gâteaux et les fit cuire. '
  '9':
  - type: note
    content: 'poêle  : autre terme en Lv 2.5n. –  le servit  : litt. la vida devant lui ; devant lui signifie probablement ici à sa place, à table. Mais Amnon exige (v. 10) qu''elle lui apporte cette nourriture au lit.'
  - type: text
    content: 'Puis elle prit la poêle et le servit. Mais Amnon refusa de manger. Il dit : Faites sortir tout le monde de chez moi ! Et tout le monde sortit de chez lui. '
