document_id: SNG.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Autres
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.7 ; 3.1.
  - type: text
    content: Où est allé ton bien-aimé ?
  - type: text
    content: Dis-le-nous, toi, la plus belle des femmes !
  - type: text
    content: Par où ton bien-aimé est-il parti,
  - type: text
    content: que nous le cherchions avec toi ?
  - type: heading
    content: Elle
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Qui est celle-ci 3.6n. –  comme l''aurore  : cf. Es 14.12. –  lune / soleil  : en hébreu, mêmes termes poétiques qu''en Es 24.23n  ; cf. Ap 12.1 ; Siracide 26.16 : « Semblable au soleil qui s''élève dans les hauteurs du ciel est la beauté d''une femme parfaite dans sa maison bien tenue. » –  troublante… v. 4.'
  - type: text
    content: Qui est celle-ci qui apparaît comme l'aurore,
  - type: text
    content: belle comme la lune, resplendissante comme le soleil,
  - type: text
    content: troublante comme les apparitions ?
  - type: heading
    content: Lui
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Je descends…  : le texte hébreu ne permet pas de savoir avec certitude qui prononce les paroles des v. 11s. –  l''oued Gn 26.17n  ; Jb 6.15n. –  voir si la vigne… 7.13.'
  - type: text
    content: Je descends au jardin des noyers,
  - type: text
    content: pour voir les jeunes pousses de l'oued,
  - type: text
    content: pour voir si la vigne bourgeonne,
  - type: text
    content: si les grenadiers fleurissent.
  - type: heading
    content: Elle
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur : litt. Je ne connais pas mon âme elle m''a mis(e) chars…  ; on pourrait aussi comprendre  : mon désir m''a placé(e) sur les chars . Une autre possibilité consiste à couper en deux le mot traduit par chars pour lire il m''a rendue timide (mot rendu par pusillanime en Lv 26.36) (bien que) fille de gens nobles (cf. 7.2) ; ou encore, en modifiant la vocalisation traditionnelle  : tu m''as rendu timide, fille de nobles . –  Ammi-Nadib  : hébreu ‘Ammi-Nadiv ( Mon parent noble ) ; plusieurs mss hébreux et des versions anciennes portent Amminadab (cf. Ex 6.23 ; Nb 1.7 etc. ; 1Ch 2.10 etc. ; Rt 4.19s ; voir aussi 2S 6.3s).'
  - type: text
    content: Je ne sais, je me suis mise…
  - type: text
    content: chars d'Ammi-Nadib !
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'à son jardin 2.1s ; 4.12–5.1. –  parterre d''essences odoriférantes 5.13. –  pour paître  : c.-à-d. pour paître (soi-même) ou pour faire paître un troupeau  ; cf. 2.16n.'
  - type: text
    content: Mon bien-aimé est descendu à son jardin,
  - type: text
    content: au parterre d'essences odoriférantes,
  - type: text
    content: pour paître dans les jardins
  - type: text
    content: et pour cueillir des lis.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 2.16n.
  - type: text
    content: Je suis à mon bien-aimé, et mon bien-aimé est à moi ;
  - type: text
    content: il paît parmi les lis.
  - type: heading
    content: Portrait de la bien-aimée
  - type: heading
    content: Lui
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Tu es belle 1.15+. –  Tirtsa  : Elle plaît , nom de la première capitale du royaume du Nord ; cf. 1R 14.17 ; 15.21,33 ; 16.8,23s. –  Jérusalem (3.2+), dont le nom rappelle le mot traduit par paix  ; cf. 1.1+ ; 7.1+ ; 8.10. –  troublante… v. 10. –  comme les apparitions  : traduction incertaine (terme apparenté 2.4n) ; on pourrait aussi comprendre  : comme des bataillons.'
  - type: text
    content: Tu es belle, mon amie, comme Tirtsa,
  - type: text
    content: jolie comme Jérusalem,
  - type: text
    content: troublante comme les apparitions.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'ils me troublent  : certains comprennent, au sens fort  : ils m''ensorcellent (cf. 4.9n) ; Syr et Vg ont lu ils me font m''envoler. –  Ta chevelure… 4.1n.'
  - type: text
    content: Détourne de moi tes yeux, car ils me troublent.
  - type: text
    content: Ta chevelure est comme un troupeau de chèvres
  - type: text
    content: dévalant du Galaad.
  '6':
  - type: text
    content: ' '
  - type: note
    content: 4.2n.
  - type: text
    content: Tes dents sont comme un troupeau de brebis
  - type: text
    content: qui remontent du bain ;
  - type: text
    content: chacune a sa jumelle,
  - type: text
    content: aucune n'en est privée.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 4.3n.
  - type: text
    content: Ta joue est comme une moitié de grenade
  - type: text
    content: derrière ton voile…
  '8':
  - type: text
    content: ' '
  - type: note
    content: Evocation de Salomon ; cf. 3.11 ; 8.11-12n  ; voir 1R 11.3 ; Ec 2.8. –  les jeunes filles 1.3n  ; cf. Est 2.12ss.
  - type: text
    content: Les reines sont soixante,
  - type: text
    content: les concubines quatre-vingts,
  - type: text
    content: les jeunes filles innombrables.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'colombe / parfaite 5.2 ; cf. 2.14. –  l''unique… mère  : cf. Pr 4.3. –  resplendissante ou pure , de même au v. 10 ; d''autres comprennent la préférée . –  jeunes filles 2.2n. –  la déclarent heureuse (cf. Ps 1.1+ ; Mt 5.3+) / la louent Pr 31.28.'
  - type: text
    content: Unique est ma colombe, ma parfaite ;
  - type: text
    content: elle est l'unique de sa mère,
  - type: text
    content: resplendissante pour celle qui lui donna le jour.
  - type: text
    content: Les jeunes filles la voient, elles la déclarent heureuse ;
  - type: text
    content: les reines et les concubines la voient, elles la louent.
  - type: heading
    content: Autres
