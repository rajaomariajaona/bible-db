      children:
      - type: text
        text: '  : cf. Jos 4.19ss.'
    marker-yv: yv-n
  - type: text
    text: 'Alors Elie prit son manteau, le roula et en frappa les eaux, qui se divisèrent de part et d''autre ; et ils passèrent tous les deux à sec. '
