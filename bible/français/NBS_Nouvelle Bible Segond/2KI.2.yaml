  - type: text
    text: 'Les prophètes qui étaient à Beth-El sortirent vers Elisée et lui dirent : Sais-tu qu''aujourd''hui le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
