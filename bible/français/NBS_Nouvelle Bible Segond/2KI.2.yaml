document_id: 2KI.2,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Elie enlevé au ciel ; débuts d'Elisée
  - type: text
    content: ' '
  - type: note
    content: 'Quand le Seigneur fit monter Elie au ciel dans une tempête  : le début du v. peut être lu comme le titre de ce qui suit. –  Guilgal  : cf. Dt 11.30n  ; Jos 4.19nss.'
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit monter Elie au ciel dans une tempête, Elie partait du Guilgal avec Elisée. '
  '10':
  - type: note
    content: 'si tu me vois  : cf. Ac 1.9ss.'
  - type: text
    content: 'Elie dit : Tu demandes une chose difficile. Mais si tu me vois pendant que je serai pris d''auprès de toi, cela t''arrivera ainsi ; sinon, cela n''arrivera pas.'
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'un char de feu et des chevaux de feu  : dans le cycle d''Elie, le feu est souvent le signe de la proximité du Seigneur, cf. 1.10ss ; 1R 18.38 ; 19.12 ; voir aussi Ac 2.3. –  Elie monta  : LXX interprète fut enlevé , terme repris pour Jésus en Mc 16.19 ; Ac 1.2,11,22 ; 1Tm 3.16 ; cf. Ac 10.16.'
  - type: text
    content: 'Comme ils continuaient à marcher en parlant, un char de feu et des chevaux de feu les séparèrent l''un de l''autre. Alors Elie monta au ciel dans une tempête. '
  '12':
  - type: note
    content: 'Père  : litt. mon père  ; cf. v. 3n  ; 6.21 ; 13.14 ; Gn 22.7n. –  Chars ou char  : le terme hébreu est au singulier mais il est souvent employé dans un sens collectif ; cf. 6.14s. –  attelages  : autre traduction équipages  ; LXX porte un terme au singulier (cavalier ou conducteur de char). En 13.14, c''est Elisée que le roi d''Israël implore par ces mots, peut-être en souvenir des chevaux et des chars de feu venus au secours de Samarie assiégée (6.17). Cet enlèvement d''Elie est à l''origine de la tradition concernant son retour, qui se reflète en Ml 3.23 ; Mt 17.3s,10ss ; 27.47/ / ainsi que dans de nombreux écrits juifs contemporains du N.T. ou postérieurs. Voir aussi le char du Seigneur en Ez 1.4ss. –  il les déchira en deux  : en signe de deuil (Gn 37.34 ; 2S 1.11), à moins qu''il ne s''agisse ici pour Elisée de bien signifier qu''il abandonne une ancienne vie ; cf. Mc 10.50. Sur le don d''un manteau pour signifier la transmission d''un pouvoir, cf. Gn 37.3 ; 1R 11.30s ; Siracide 48.12-14 : « Lorsque Elie eut été caché dans le tourbillon, Elisée fut rempli de son esprit. Ses jours durant, il ne fut ébranlé par aucun chef et personne ne put lui en imposer. Rien n''était trop difficile pour lui, même dans le sommeil de la mort son corps prophétisa. Pendant sa vie, il fit des prodiges, même après sa mort, ses œuvres furent merveilleuses. »'
  - type: text
    content: 'Elisée regardait et criait : Père ! Père ! Chars et attelages d''Israël ! Puis il ne le vit plus. Saisissant alors ses vêtements, il les déchira en deux morceaux '
  '13':
  - type: text
    content: 'et ramassa le manteau qu''Elie avait laissé tomber. Puis il revint et s''arrêta sur la rive du Jourdain ; '
  '14':
  - type: note
    content: 'il en frappa les eaux  : certains mss de LXX ajoutent elles ne se séparèrent pas. –  le Seigneur  : absent de Vg et de LXX. –  Lui aussi  : ces mots pourraient aussi se rattacher à ce qui précède  : où est le Seigneur (YHWH), le Dieu d''Elie, lui aussi ? LXX semble avoir lu un texte un peu différent  : où est le Dieu d''Elie, où donc ?'
  - type: text
    content: 'il prit le manteau qu''Elie avait laissé tomber, il en frappa les eaux et dit : Où est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), le Dieu d''Elie ? Lui aussi, il frappa les eaux, qui se divisèrent de part et d''autre. Elisée passa.'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Les prophètes  : litt. les fils des prophètes.'
  - type: text
    content: 'Les prophètes de Jéricho le virent d''en face ; ils dirent : Le souffle d''Elie s''est posé sur Elisée ! Ils allèrent à sa rencontre et se prosternèrent devant lui jusqu''à terre. '
  '16':
  - type: note
    content: 'Peut-être le souffle…  : cf. Ac 8.39.'
  - type: text
    content: 'Ils lui dirent : Il y a parmi nous, tes serviteurs, cinquante vaillants hommes. Qu''ils aillent donc chercher ton maître ! Peut-être le souffle du '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a-t-il emporté et jeté quelque part, dans une montagne ou dans une vallée. Il répondit : Ne les envoyez pas ! '
  '17':
  - type: note
    content: 'ils insistèrent  : cf. 5.16 ; Gn 19.9n. –  tant et plus  : litt. jusqu''à la honte  ; cf. Jg 3.25n.'
  - type: text
    content: 'Mais ils insistèrent tant et plus, si bien qu''il finit par dire : Envoyez-les. Ils envoyèrent les cinquante hommes qui cherchèrent Elie pendant trois jours et ne le trouvèrent pas. '
  '18':
  - type: text
    content: 'Ils revinrent vers lui qui était resté à Jéricho, et il leur dit : Ne vous avais-je pas dit : N''y allez pas !'
  - type: heading
    content: Elisée à Jéricho et à Beth-El
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Avec ce v. commence le cycle d''Elisée au sein duquel on peut distinguer des notices biographiques (2.23-25 ; 8.3-6 ; 13.20), des récits de miracles (2.19-22 ; 4.1-7,38-44 ; 6.1-7 ; 8.1s ; 13.20s), ceux où apparaît le serviteur Guéhazi (4.8-37 ; 5.1-27 ; 6.8-23) et ceux qui mettent en scène les responsables politiques (3.4-27 ; 6.24–7.20 ; 8.7-15 ; 9 ; 13.14-19). –  la terre ou le pays . –  provoque des fausses couches  : autres traductions est stérile ; rend stérile (ainsi LXX).'
  - type: text
    content: 'Les hommes de la ville dirent à Elisée : La ville est agréable à habiter, comme tu le vois, mon seigneur ; mais l''eau est mauvaise, et la terre provoque des fausses couches. '
  '2':
  - type: note
    content: 'Beth-El  : cf. Gn 28.19n  ; 35.1ss ; Jg 1.22 ; 1S 10.3. –  Par la vie…  : litt. le Seigneur est vivant et ton être (cf. Gn 1.20n) est vivant, cf. 1S 14.39n. –  je ne te quitterai pas  : formule elliptique de malédiction conditionnelle, litt. si je te quitte (sous-entendu  : qu''il m''arrive tel ou tel malheur) ; de même aux v. 4,6 ; 4.30 ; cf. 1R 19.2+.'
  - type: text
    content: 'Elie dit à Elisée : Reste ici, je te prie : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''envoie jusqu''à Beth-El. Elisée répondit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et par ta propre vie, je ne te quitterai pas ! Ils descendirent à Beth-El.'
  '20':
  - type: note
    content: 'un plat  : le mot hébreu désigne une petite poterie.'
  - type: text
    content: 'Il dit : Apportez-moi un plat neuf, et mettez-y du sel. Ils le lui apportèrent. '
  '21':
  - type: note
    content: 'la source  : peut-être celle d''Aïn-es-Sultan qui surgit au pied des ruines de la cité antique de Jéricho.'
  - type: text
    content: 'Il sortit vers la source de l''eau, y jeta du sel et dit : Ainsi parle le '
  - type: text
    content: Seigneur
  - type: text
    content: '  : J''ai assaini cette eau ; elle ne causera plus ni mort, ni fausse couche. '
  '22':
  - type: text
    content: L'eau fut assainie, jusqu'à ce jour, selon la parole qu'Elisée avait prononcée.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'chauve  : ce terme renvoie soit à une calvitie naturelle d''Elisée (par opposition à Elie ? cf. 1.8n), soit à une tonsure qui ferait partie des caractéristiques des prophètes (cf. 1R 20.38,41).'
  - type: text
    content: 'De là il monta à Beth-El ; comme il montait par le chemin, des gamins sortirent de la ville pour se moquer de lui, en disant : Monte, chauve ! Monte, chauve ! '
  '24':
  - type: note
    content: 'maudit au nom du…  : voir bénédiction, malédiction.'
  - type: text
    content: 'Il se retourna, les vit et les maudit au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Alors deux ourses sortirent de la forêt et mirent en pièces quarante-deux de ces enfants. '
  '25':
  - type: note
    content: Cf. 1R 18 ; 21.
  - type: text
    content: De là il se rendit au mont Carmel ; de là il revint à Samarie.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Les prophètes  : litt. les fils des prophètes , membres d''une confrérie peut-être rassemblée autour d''un maître spirituel (cf. l''appellation père au v. 12+) ; de même aux v. 5,7,15 ; 4.1,38 ; 5.22 ; 6.1 ; 9.1 ; cf. 1S 10.5 ; 1R 20.35 ; Am 2.11. –  te prend  : litt. prend de dessus ta tête , de même dans la suite.'
  - type: text
    content: 'Les prophètes qui étaient à Beth-El sortirent vers Elisée et lui dirent : Sais-tu qu''aujourd''hui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te prend ton maître ? Il répondit : Je le sais, moi aussi ; taisez-vous. '
  '4':
  - type: note
    content: 'Jéricho  : cf. Nb 22.1n  ; Jos 2.'
  - type: text
    content: 'Elie lui dit : Elisée, reste ici, je te prie : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''envoie à Jéricho. Il répondit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et par ta propre vie, je ne te quitterai pas ! Ils arrivèrent à Jéricho.'
  '5':
  - type: text
    content: 'Les prophètes qui étaient à Jéricho vinrent dire à Elisée : Sais-tu qu''aujourd''hui le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te prend ton maître ? Il répondit : Je le sais, moi aussi ; taisez-vous. '
  '6':
  - type: text
    content: 'Elie lui dit : Reste ici, je te prie : le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''envoie au Jourdain. Il répondit : Par la vie du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et par ta propre vie, je ne te quitterai pas ! Ils continuèrent à marcher tous les deux.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'arrivèrent  : absent de LXX. –  au bord du Jourdain  : Syr précise sur la rive du Jourdain , comme au v. 13.'
  - type: text
    content: 'Cinquante hommes d''entre les prophètes arrivèrent et s''arrêtèrent en face, à quelque distance ; eux deux s''arrêtèrent au bord du Jourdain. '
  '8':
  - type: note
    content: 'manteau  : cf. 1R 19.13n. –  à sec  : cf. Jos 4.19ss.'
  - type: text
    content: 'Alors Elie prit son manteau, le roula et en frappa les eaux, qui se divisèrent de part et d''autre ; et ils passèrent tous les deux à sec. '
  '9':
  - type: note
    content: 'Pendant qu''ils passaient  : c.-à-d. comme ils passaient (hébreu) ou lors de leur traversée (LXX). –  une double part  : c''est la portion du premier-né Dt 21.17. –  souffle  : voir esprit.'
  - type: text
    content: 'Pendant qu''ils passaient, Elie dit à Elisée : Demande ce que tu veux que je fasse pour toi, avant que je ne sois pris d''auprès de toi. Elisée répondit : Qu''il y ait sur moi, je te prie, une double part de ton souffle ! '
