      - type: text
        text: '2.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un char de feu et des chevaux de feu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : dans le cycle d''Elie, le feu est souvent le signe de la proximité du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', cf. 1.10ss ; 1R 18.38 ; 19.12 ; voir aussi Ac 2.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Elie monta
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : LXX interprète '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: fut enlevé
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', terme repris pour Jésus en Mc 16.19 ; Ac 1.2,11,22 ; 1Tm 3.16 ; cf. Ac 10.16.'
    marker-yv: yv-n
  - type: text
    text: 'Comme ils continuaient à marcher en parlant, un char de feu et des chevaux de feu les séparèrent l''un de l''autre. Alors Elie monta au ciel dans une tempête. '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.12 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: mon père
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 3'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 6.21 ; 13.14 ; Gn 22.7'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Chars '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: char
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le terme hébreu est au singulier mais il est souvent employé dans un sens collectif ; cf. 6.14s. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: attelages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: équipages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; LXX porte un terme au singulier ('
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'cavalier '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: conducteur de char
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). En 13.14, c''est Elisée que le roi d''Israël implore par ces mots, peut-être en souvenir des chevaux et des chars de feu venus au secours de Samarie assiégée (6.17). Cet enlèvement d''Elie est à l''origine de la tradition concernant son retour, qui se reflète en Ml 3.23 ; Mt 17.3s,10ss ; 27.47/ / ainsi que dans de nombreux écrits juifs contemporains du N.T. ou postérieurs. Voir aussi le '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'char du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'en Ez 1.4ss. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il les déchira en deux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : en signe de deuil (Gn 37.34 ; 2S 1.11), à moins qu''il ne s''agisse ici pour Elisée de bien signifier qu''il abandonne une ancienne vie ; cf. Mc 10.50. Sur le '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: don d'un manteau pour signifier la transmission d'un pouvoir
      - type: text
        text: ', cf. Gn 37.3 ; 1R 11.30s ; '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Siracide
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '48.12-14 : « Lorsque Elie eut été caché dans le tourbillon, Elisée fut rempli de son esprit. Ses jours durant, il ne fut ébranlé par aucun chef et personne ne put lui en imposer. Rien n''était trop difficile pour lui, même dans le sommeil de la mort son corps prophétisa. Pendant sa vie, il fit des prodiges, même après sa mort, ses œuvres furent merveilleuses. »'
    marker-yv: yv-n
  - type: text
    text: 'Elisée regardait et criait : Père ! Père ! Chars et attelages d''Israël ! Puis il ne le vit plus. Saisissant alors ses vêtements, il les déchira en deux morceaux '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: text
    text: 'et ramassa le manteau qu''Elie avait laissé tomber. Puis il revint et s''arrêta sur la rive du Jourdain ; '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.14 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: il en frappa les eaux
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : certains mss de LXX ajoutent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: elles ne se séparèrent pas
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : absent de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: ' et de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Lui aussi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : ces mots pourraient aussi se rattacher à ce qui précède'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'où est le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (YHWH), le Dieu d''Elie, lui aussi ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: LXX semble avoir lu un texte un peu différent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: où est le Dieu d'Elie, où donc ?
    marker-yv: yv-n
  - type: text
    text: 'il prit le manteau qu''Elie avait laissé tomber, il en frappa les eaux et dit : Où est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), le Dieu d''Elie ? Lui aussi, il frappa les eaux, qui se divisèrent de part et d''autre. Elisée passa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.15 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les prophètes
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les fils des prophètes.
    marker-yv: yv-n
  - type: text
    text: 'Les prophètes de Jéricho le virent d''en face ; ils dirent : Le souffle d''Elie s''est posé sur Elisée ! Ils allèrent à sa rencontre et se prosternèrent devant lui jusqu''à terre. '
  - type: usfm
    marker: v
    metadata:
      v: '16'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '16'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.16 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Peut-être le souffle…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 8.39.'
    marker-yv: yv-n
  - type: text
    text: 'Ils lui dirent : Il y a parmi nous, tes serviteurs, cinquante vaillants hommes. Qu''ils aillent donc chercher ton maître ! Peut-être le souffle du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' l''a-t-il emporté et jeté quelque part, dans une montagne ou dans une vallée. Il répondit : Ne les envoyez pas ! '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: ils insistèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.16 ; Gn 19.9'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tant et plus
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: jusqu'à la honte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Jg 3.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Mais ils insistèrent tant et plus, si bien qu''il finit par dire : Envoyez-les. Ils envoyèrent les cinquante hommes qui cherchèrent Elie pendant trois jours et ne le trouvèrent pas. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: text
    text: 'Ils revinrent vers lui qui était resté à Jéricho, et il leur dit : Ne vous avais-je pas dit : N''y allez pas !'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Elisée à Jéricho et à Beth-El
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Avec ce v. commence le cycle d''Elisée au sein duquel on peut distinguer des notices biographiques (2.23-25 ; 8.3-6 ; 13.20), des récits de miracles (2.19-22 ; 4.1-7,38-44 ; 6.1-7 ; 8.1s ; 13.20s), ceux où apparaît le serviteur Guéhazi (4.8-37 ; 5.1-27 ; 6.8-23) et ceux qui mettent en scène les responsables politiques (3.4-27 ; 6.24–7.20 ; 8.7-15 ; 9 ; 13.14-19). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'la terre '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: le pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: provoque des fausses couches
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'est stérile ; rend stérile '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ainsi '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ).
    marker-yv: yv-n
  - type: text
    text: 'Les hommes de la ville dirent à Elisée : La ville est agréable à habiter, comme tu le vois, mon seigneur ; mais l''eau est mauvaise, et la terre provoque des fausses couches. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un plat
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le mot hébreu désigne une petite poterie.'
    marker-yv: yv-n
  - type: text
    text: 'Il dit : Apportez-moi un plat neuf, et mettez-y du sel. Ils le lui apportèrent. '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la source
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : peut-être celle d''Aïn-es-Sultan qui surgit au pied des ruines de la cité antique de Jéricho.'
    marker-yv: yv-n
  - type: text
    text: 'Il sortit vers la source de l''eau, y jeta du sel et dit : Ainsi parle le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  : J''ai assaini cette eau ; elle ne causera plus ni mort, ni fausse couche. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: L'eau fut assainie, jusqu'à ce jour, selon la parole qu'Elisée avait prononcée.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: chauve
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ce terme renvoie soit à une calvitie naturelle d''Elisée (par opposition à Elie ? cf. 1.8'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: ), soit à une tonsure qui ferait partie des caractéristiques des prophètes (cf. 1R 20.38,41).
    marker-yv: yv-n
  - type: text
    text: 'De là il monta à Beth-El ; comme il montait par le chemin, des gamins sortirent de la ville pour se moquer de lui, en disant : Monte, chauve ! Monte, chauve ! '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'maudit au '
      - type: usfm
        marker: w
        children:
        - type: text
          text: nom
      - type: text
        text: ' du…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
      - type: text
        text: ', malédiction.'
    marker-yv: yv-n
  - type: text
    text: 'Il se retourna, les vit et les maudit au nom du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Alors deux ourses sortirent de la forêt et mirent en pièces quarante-deux de ces enfants. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.25 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. 1R 18 ; 21.
    marker-yv: yv-n
  - type: text
    text: De là il se rendit au mont Carmel ; de là il revint à Samarie.
