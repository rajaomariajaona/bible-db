      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Pendant qu''ils passaient, Elie dit à Elisée : Demande ce que tu veux que je fasse pour toi, avant que je ne sois pris d''auprès de toi. Elisée répondit : Qu''il y ait sur moi, je te prie, une double part de ton souffle ! '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '2.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: si tu me vois
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ac 1.9ss.'
    marker-yv: yv-n
  - type: text
    text: 'Elie dit : Tu demandes une chose difficile. Mais si tu me vois pendant que je serai pris d''auprès de toi, cela t''arrivera ainsi ; sinon, cela n''arrivera pas.'
- type: usfm
  marker: p
