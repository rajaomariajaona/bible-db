document_id: PSA.89,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Où sont les promesses faites à David ?
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 88.1+. –  Etân  : cf. 1R 5.11 ; 1Ch 2.6 ; 15.19.'
  - type: text
    content: Poème. D'Etân, l'Ezrahite.
  '10':
  - type: text
    content: ' '
  - type: note
    content: 65.8 ; 74.13 ; 107.29 ; Jb 38.8ss ; cf. Mc 4.39+/ /.
  - type: text
    content: C'est toi qui domines l'orgueil de la mer ;
  - type: text
    content: quand ses vagues se soulèvent, c'est toi qui les apaises.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Rahav  : nom du monstre marin associé au chaos primordial, qui est parfois pris comme emblème de l''antique Egypte (87.4n) ; cf. 74.13s ; Es 51.9ss ; Jb 26.12 ; voir aussi 7.12. –  dispersé tes ennemis…  : cf. Lc 1.51.'
  - type: text
    content: C'est toi qui as écrasé Rahav comme un cadavre ;
  - type: text
    content: tu as dispersé tes ennemis par ton bras puissant.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 24.1ns ; 50.12 ; 95.4s ; Dt 10.14 ; Jon 1.9 ; 1Ch 29.11 ; 1Co 10.26.
  - type: text
    content: A toi appartient le ciel, à toi aussi appartient la terre ;
  - type: text
    content: c'est toi qui as fondé le monde avec tout ce qui s'y trouve.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'le Tabor (Os 5.1) et l''Hermon (Ps 42.7n) : montagnes du nord du pays ; le Nord (hébreu Tsaphôn  ; cf. 48.3n  ; Es 14.13n) et le Sud pourraient désigner d''autres montagnes (beaucoup de montagnes, à l''époque, sont considérées comme sacrées).'
  - type: text
    content: Le Nord et le Sud, c'est toi qui les as créés ;
  - type: text
    content: le Tabor et l'Hermon crient ton nom.
  '14':
  - type: text
    content: ' '
  - type: note
    content: Ex 15.6.
  - type: text
    content: Tu as le bras armé de vaillance ;
  - type: text
    content: ta main est puissante, ta main droite est élevée.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 9.8 ; 72.2 ; 97.2 ; 2S 8.15 ; Es 9.6 ; 16.5 ; Pr 16.12 ; 25.5.
  - type: text
    content: La justice et l'équité sont la base de ton trône.
  - type: text
    content: La fidélité et la loyauté se tiennent devant toi.
  '16':
  - type: text
    content: ' '
  - type: note
    content: Heureux 1.1+. –  acclamations 27.6+. –  la lumière de ta face 80.4.
  - type: text
    content: Heureux le peuple qui connaît les acclamations !
  - type: text
    content: Seigneur
  - type: text
    content: ', il marche à la lumière de ta face,'
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'sans cesse  : litt. tout le jour.'
  - type: text
    content: par ton nom, il est sans cesse dans l'allégresse ;
  - type: text
    content: par ta justice, il s'élève.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'sa splendeur et sa puissance  : litt. la splendeur de leur puissance. –  notre corne s''élève  : cf. v. 25 ; autre lecture traditionnelle tu élèves notre corne  ; cf. 75.5n  ; 92.11n  ; 112.9n  ; 132.17n  ; 148.14n  ; 1S 2.10 ; Lc 1.69.'
  - type: text
    content: Car tu es sa splendeur et sa puissance ;
  - type: text
    content: c'est par ta faveur que notre corne s'élève.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'notre bouclier (3.4+), ici peut-être équivalent de notre roi  : cf. 47.10 ; 84.10n. –  Saint d''Israël 71.22+ ; autre traduction au Seigneur, au Saint d''Israël, notre roi.'
  - type: text
    content: 'Car notre bouclier appartient au '
  - type: text
    content: Seigneur
  - type: text
    content: – notre roi, au Saint d'Israël.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'la fidélité du Seigneur  : litt. les fidélités de YHWH , au sens de ce que YHWH a fait avec fidélité (cf. 25.10+) ; de même au v. 50 ; cf. 17.7n  ; 107.43 ; 119.41n  ; Es 55.3n  ; 63.7. –  ma bouche… 71.15 ; 109.30n  ; 145.21. –  ta constance…  : synonyme du terme traduit par fidélité  ; cf. v. 3,6,9,25,34,50 ; Lc 1.50.'
  - type: text
    content: 'Je chanterai toujours la fidélité du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ;'
  - type: text
    content: ma bouche fera connaître ta constance de génération en génération.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'à tes fidèles ou, d''après d''autres mss hébreux et des versions anciennes, à ton fidèle  ; cf. 2S 7.8. –  vision 2S 7.17 ; 1Ch 17.15. –  J''ai prêté secours…  : certains modifient le texte hébreu traditionnel pour lire j''ai placé un diadème sur un vaillant guerrier  ; cf. v. 40 ; 132.18 ; 2S 1.10 ; 2R 11.12 ; Jr 13.18 ; Ez 21.30s. –  du milieu du peuple 78.70. –  un jeune homme  : autres traductions possibles un homme d''élite ou un élu , c.-à-d. quelqu''un que j''ai choisi.'
  - type: text
    content: Alors tu parlas à tes fidèles dans une vision ;
  - type: text
    content: 'tu dis : J''ai prêté secours à un vaillant guerrier,'
  - type: text
    content: j'ai élevé du milieu du peuple un jeune homme ;
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'je lui ai conféré l''onction  : c''est du verbe hébreu correspondant que vient le mot messie (cf. v. 39,52 ; 2.2n  ; 1S 16.1-13 ; 2S 7.1ss ; Ac 13.22). –  huile sacrée ou sainte  ; cf. v. 6,8,19,36.'
  - type: text
    content: j'ai trouvé David, mon serviteur,
  - type: text
    content: je lui ai conféré l'onction de mon huile sacrée.
  '22':
  - type: text
    content: C'est lui que ma main soutiendra ;
  - type: text
    content: mon bras le rendra fort.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'surprendra 55.16n. –  l''homme injuste  : litt. le fils de l''injustice  ; cf. 2S 3.34n  ; 7.10 ; 2Th 2.3n (LXX a traduit par le mot rendu par mal dans ce dernier texte). Voir justice.'
  - type: text
    content: L'ennemi ne le surprendra pas,
  - type: text
    content: l'homme injuste ne l'affligera pas.
  '24':
  - type: text
    content: ' '
  - type: note
    content: je frapperai ou je battrai  ; le verbe hébreu correspondant peut évoquer un fléau (Ex 7.27n) ou une défaite militaire (Lv 26.17n).
  - type: text
    content: Je taillerai en pièces ses adversaires devant lui,
  - type: text
    content: je frapperai ceux qui le détestent.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Pr 20.28. –  constance  : cf. v. 2n,34. –  sa corne v. 18n. –  par mon nom  : cf. v. 17 ; 21.8.'
  - type: text
    content: Ma constance et ma fidélité seront avec lui,
  - type: text
    content: et sa corne s'élèvera par mon nom.
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 72.8+.
  - type: text
    content: Je soumettrai la mer à sa main,
  - type: text
    content: les fleuves à sa main droite.
  '27':
  - type: text
    content: ' '
  - type: note
    content: 'mon père  : cf. 2.7 ; 2S 7.14. –  mon Dieu 22.2,11+. –  rocher 18.3+.'
  - type: text
    content: 'Lui, il m''invoquera en disant : Tu es mon père,'
  - type: text
    content: mon Dieu, le rocher de mon salut !
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'le premier-né Hé 1.6. –  le plus haut placé  : appliqué à Dieu, le terme hébreu est traduit par Très-Haut (7.18 ; 9.3 ; 18.14 etc. ; Gn 14.18n  ; Dt 26.19n) ; cf. 45.7n  ; voir aussi Ap 1.5.'
  - type: text
    content: Et moi, je ferai de lui le premier-né,
  - type: text
    content: le plus haut placé des rois de la terre.
  '29':
  - type: text
    content: ' '
  - type: note
    content: sûre ou fidèle, digne de confiance  ; cf. v. 38 ; 78.8,37.
  - type: text
    content: Je lui conserverai toujours ma fidélité,
  - type: text
    content: et mon alliance avec lui sera sûre ;
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur. –  je dis  : LXX tu as dit. –  c''est dans le ciel…  : certains modifient le texte hébreu pour lire ta constance est (solidement) installée comme le ciel  ; cf. v. 37s ; 72.5,7,17 ; 119.89s.'
  - type: text
    content: 'Car je dis : La fidélité est bâtie pour toujours ;'
  - type: text
    content: c'est dans le ciel que tu installes ta constance.
  '30':
  - type: text
    content: ' '
  - type: note
    content: V. 5+.
  - type: text
    content: j'établirai ses descendants à jamais
  - type: text
    content: et son trône pour tous les jours du ciel.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Voir loi.
  - type: text
    content: Si ses fils abandonnent ma loi
  - type: text
    content: et ne suivent pas mes règles,
  '32':
  - type: text
    content: s'ils profanent mes prescriptions
  - type: text
    content: et n'observent pas mes commandements,
  '33':
  - type: text
    content: ' '
  - type: note
    content: 2S 7.14. –  je leur ferai rendre des comptes et je les châtierai traduisent un seul verbe hébreu ; cf. Jr 6.15n.
  - type: text
    content: c'est avec un bâton que je leur ferai rendre des comptes pour leur révolte,
  - type: text
    content: c'est par des coups que je les châtierai pour leur faute ;
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'je ne mettrai pas fin… ou, d''après certains mss hébreux et des versions anciennes, je n''éloignerai pas de lui ma fidélité  ; cf. 2S 7.15 ; Es 54.10. –  je ne trahirai pas ma constance  : litt. je ne mentirai pas contre ma constance (ou ma probité, ma fidélité ) ; cf. 44.18.'
  - type: text
    content: mais je ne mettrai pas fin à ma fidélité envers lui,
  - type: text
    content: je ne trahirai pas ma constance ;
  '35':
  - type: text
    content: je ne profanerai pas mon alliance
  - type: text
    content: et je ne changerai pas ce qui est sorti de mes lèvres.
  '36':
  - type: text
    content: ' '
  - type: note
    content: J'ai fait un seul serment ou j'ai juré une fois pour toutes  ; cf. Am 4.2.
  - type: text
    content: J'ai fait un seul serment par ma sainteté ;
  - type: text
    content: mentirais-je à David ?
  '37':
  - type: text
    content: ' '
  - type: note
    content: 72.5 ; Jr 33.20ss.
  - type: text
    content: Sa descendance subsistera toujours ;
  - type: text
    content: son trône sera devant moi comme le soleil ;
  '38':
  - type: text
    content: ' '
  - type: note
    content: 'le témoin  : l''expression peut désigner ici la lune comme le trône lui-même (v. 37) ; cf. Ap 1.5.'
  - type: text
    content: comme la lune il sera fermement établi pour toujours,
  - type: text
    content: 'le témoin qui est dans la nue est sûr. '
  - type: text
    content: Pause.
  '39':
  - type: text
    content: ' '
  - type: note
    content: 'rejeté / méprisé 44.10 ; cf. 74.1 ; 77.8 ; 2R 23.27 ; Jr 7.15,29 ; 14.19 ; 33.24 ; Lm 3.31 ; 5.22. –  emporté  : autre traduction mis en fureur . –  l''homme qui a reçu ton onction v. 21 ; 2.2n  ; ici et dans la suite il semble représenter l''ensemble du peuple ; cf. Es 53 ; Ha 3.13.'
  - type: text
    content: Pourtant, toi, tu as rejeté, tu as méprisé !
  - type: text
    content: Tu t'es emporté contre l'homme qui a reçu ton onction !
  '4':
  - type: text
    content: ' '
  - type: note
    content: 132.11s. – Voir alliance. –  mon serviteur v. 21 ; 78.70 ; 132.10 ; 144.10 ; 2S 3.18 ; 7.5,8,11s ; Jr 23.21s.
  - type: text
    content: – J'ai conclu une alliance pour celui que j'ai choisi ;
  - type: text
    content: 'j''ai fait ce serment à David, mon serviteur :'
  '40':
  - type: text
    content: ' '
  - type: note
    content: dédaigné ou renié, brisé. –  profané Ez 24.21 ; Lm 2.2. –  diadème 132.18 ; Nb 6.7n.
  - type: text
    content: Tu as dédaigné l'alliance de ton serviteur ;
  - type: text
    content: tu as profané à terre son diadème.
  '41':
  - type: text
    content: ' '
  - type: note
    content: 80.13s ; Es 5.5.
  - type: text
    content: Tu as ouvert des brèches dans toutes ses clôtures,
  - type: text
    content: tu as démoli ses forteresses.
  '42':
  - type: text
    content: ' '
  - type: note
    content: exposé aux outrages… 79.4.
  - type: text
    content: Tous les passants l'ont pillé ;
  - type: text
    content: il est exposé aux outrages de ses voisins.
  '43':
  - type: text
    content: Tu as élevé la main droite de ses adversaires,
  - type: text
    content: tu as réjoui tous ses ennemis ;
  '44':
  - type: text
    content: ' '
  - type: note
    content: 'le tranchant  : litt. le rocher  ; cf. Jos 5.2 ; certains modifient le texte hébreu traditionnel pour lire tu as fait reculer son épée devant son ennemi  ; cf. Ps 44.11ss.'
  - type: text
    content: tu as fait reculer le tranchant de son épée,
  - type: text
    content: tu ne l'as pas soutenu dans le combat ;
  '45':
  - type: text
    content: ' '
  - type: note
    content: 'son éclat  : litt. sa pureté  ; certains modifient le texte hébreu traditionnel pour lire tu as brisé le sceptre de sa force  ; cf. 2.9+ ; 45.7 ; 110.2 ; Jr 48.17.'
  - type: text
    content: tu as mis un terme à son éclat,
  - type: text
    content: tu as jeté son trône à terre ;
  '46':
  - type: text
    content: tu as abrégé les jours de sa jeunesse,
  - type: text
    content: 'tu l''as couvert de honte. '
  - type: text
    content: Pause.
  '47':
  - type: text
    content: ' '
  - type: note
    content: 6.4+ ; 74.1+ ; 79.5.
  - type: text
    content: 'Jusqu''à quand, '
  - type: text
    content: Seigneur
  - type: text
    content: ', te cacheras-tu sans cesse,'
  - type: text
    content: et ta fureur s'embrasera-t-elle comme le feu ?
  '48':
  - type: text
    content: ' '
  - type: note
    content: Texte obscur et traduction conjecturale ; cf. 39.5ss ; 90.9s ; 102.12 ; 103.15s ; Jb 10.20s ; 14.1s.
  - type: text
    content: Souviens-toi de ce qu'est la durée de ma vie,
  - type: text
    content: et pour quelle illusion tu as créé tous les êtres humains.
  '49':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 49.9ss ; Lc 2.34. –  l''emprise  : litt. la main. – Voir séjour des morts.'
  - type: text
    content: Quel est l'homme qui peut vivre et ne pas voir la mort,
  - type: text
    content: 'ou échapper à l''emprise du séjour des morts ? '
  - type: text
    content: Pause.
  '5':
  - type: text
    content: ' '
  - type: note
    content: V. 30,37 ; cf. 45.7 ; 61.8 ; 2S 7.13ss ; 23.5 ; Jn 7.42 ; Ac 2.30.
  - type: text
    content: J'affermirai ta descendance pour toujours
  - type: text
    content: 'et je bâtirai ton trône de génération en génération. '
  - type: text
    content: Pause.
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'ta fidélité  : litt. tes fidélités. –  fidélité / constance  : cf. v. 2ns ; 92.3 ; 98.3.'
  - type: text
    content: Où est ta fidélité d'autrefois, Seigneur,
  - type: text
    content: celle que, dans ta constance, tu as jurée à David ?
  '51':
  - type: text
    content: ' '
  - type: note
    content: 'Lm 5.1. –  des outrages…  : autre traduction du déshonneur de tes serviteurs (ou, d''après d''autres mss, de ton serviteur ). –  sur mon sein  : cf. 79.12n. –  toute la multitude des peuples  : texte obscur, que certains modifient pour lire les insultes des peuples  ; le texte hébreu traditionnel pourrait aussi signifier des outrages… que je porte dans mes bras (devant) toute la multitude…  ; cf. 69.7 ; Jr 15.5.'
  - type: text
    content: Souviens-toi, Seigneur, des outrages que tes serviteurs subissent.
  - type: text
    content: Souviens-toi que je porte sur mon sein toute la multitude des peuples.
  '52':
  - type: text
    content: ' '
  - type: note
    content: 'Texte obscur et traduction conjecturale. –  ils outragent les pas (litt. les talons ) de l''homme qui a reçu ton onction  : cf. Hé 11.26 ; 13.13 ; 1P 4.14.'
  - type: text
    content: Seigneur
  - type: text
    content: ', souviens-toi que tes ennemis se répandent en outrages,'
  - type: text
    content: qu'ils outragent les pas de l'homme qui a reçu ton onction !
  '53':
  - type: text
    content: ' '
  - type: note
    content: 41.14n.
  - type: text
    content: 'Béni soit pour toujours le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Qu''il en soit ainsi ! Qu''il en soit ainsi !'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Le ciel (ou les cieux  ; cf. Gn 1.1n) / l''assemblée des saints  : cf. v. 8 ; 16.3n  ; 19.2 ; 82.1 ; 148.1ss ; 149.1 ; voir aussi Ex 15.11 ; Dt 33.3 ; Za 14.5 ; Jb 5.1 ; 15.15 ; Dn 8.13 ; 2Th 1.10.'
  - type: text
    content: 'Le ciel célèbre tes actes étonnants, '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: oui, ta constance – dans l'assemblée des saints.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'V. 9 ; cf. 18.32 ; 35.10+ ; 86.8 ; Ex 15.11 ; 2S 7.22 ; 1R 8.23 ; Es 40.18,25 ; 46.5 ; voir aussi Ap 13.4. –  fils des dieux  : hébreu bené-’élim (pluriel de ’el , même terme aux v. 8+,27) ; cf. Gn 6.2n.'
  - type: text
    content: 'Qui donc, dans la nue, peut se mesurer au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) ?'
  - type: text
    content: 'Qui est comparable au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) parmi les fils des dieux ?'
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Dieu  : hébreu ’El  ; cf. Gn 21.33n. –  terrible  : LXX glorifié  ; cf. 2Th 1.10. –  conseil secret (25.14n) des saints (v. 6+) : cf. Jr 23.18 ; voir aussi 1R 22.19ss ; Es 6.1ss ; Jb 1.6ss.'
  - type: text
    content: Dieu est terrible dans le conseil secret des saints,
  - type: text
    content: redoutable pour tous ceux qui l'entourent.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'V. 7+. –  Seigneur (Yah)  : cf. Ex 15.2n. –  constance  : cf. v. 2n.'
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), Dieu des Armées, qui est puissant comme toi, '
  - type: text
    content: Seigneur
  - type: text
    content: ' (Yah) ?'
  - type: text
    content: Ta constance est tout autour de toi.
