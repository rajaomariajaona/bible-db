    - type: usfm
      marker: fq
      children:
      - type: text
        text: se tint
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : le verbe hébreu est apparenté au terme traduit par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'colonne '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (13.21+).
    marker-yv: yv-n
  - type: text
    text: 'Le messager de Dieu qui allait devant les troupes d''Israël partit et alla derrière eux ; et la colonne de nuée partit de devant eux et se tint derrière eux. '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: elle était nuée…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte hébreu difficile ; l''interprétation traditionnelle suppose que la nuée était ténèbres du côté des Egyptiens et lumière du côté d''Israël. '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ' a lu'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il y eut obscurité et ténèbres, et la nuit passa.
    marker-yv: yv-n
  - type: text
    text: Elle vint entre les troupes de l'Egypte et les troupes d'Israël – elle était nuée et ténèbres, et elle éclairait la nuit. Ils ne s'approchèrent pas les uns des autres pendant toute la nuit.
