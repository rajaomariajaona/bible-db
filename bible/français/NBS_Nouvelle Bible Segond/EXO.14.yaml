    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: dans la (partie) sèche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en Gn 1.9 ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à pied sec
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Sur cette '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: traversée
      - type: text
        text: ', cf. Es 43.16 ; 44.27 ; 50.2 ; Ps 66.6 ; 77.17-21 ; 78.13 ; 106.9s ; 114.3,5 ; 1Co 10.1s ; Hé 11.29.'
    marker-yv: yv-n
  - type: text
    text: 'Toi, lève ton bâton, étends ta main sur la mer et fends-la ; les Israélites entreront au milieu de la mer, sur la terre ferme. '
  - type: usfm
    marker: v
    metadata:
      v: '17'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '17'
  - type: usfm
    marker: f
    children:
