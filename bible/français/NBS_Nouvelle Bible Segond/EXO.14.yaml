      marker: fr
      children:
      - type: text
        text: '14.27 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à son approche
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à sa rencontre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la fuite des Egyptiens (v. 25) les précipite vers la mer qui revient (v. 21,26). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: se débarrassa…
    - type: usfm
      marker: ft
      children:
