document_id: EXO.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le pharaon poursuit les Israélites
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: text
    content: 'Le pharaon approchait. Les Israélites levèrent les yeux et virent que les Egyptiens s''étaient lancés à leur poursuite. Les Israélites eurent très peur, et ils crièrent vers le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '11':
  - type: note
    content: Sur les protestations des Israélites, cf. 15.24 ; 16.3 ; 17.3 ; Nb 11.4-6 ; 14.1-4 ; 20.2-5 ; 21.5 ; Ps 78.40 ; 106.7.
  - type: text
    content: 'Ils dirent à Moïse : N''y avait-il pas assez de tombeaux en Egypte, que tu nous aies emmenés mourir au désert ? Que nous as-tu fait en nous faisant sortir d''Egypte ? '
  '12':
  - type: note
    content: 'Cf. 6.9. –  l''Egypte  : autre traduction les Egyptiens, cf. v. 4n.'
  - type: text
    content: 'N''est-ce pas là ce que nous te disions en Egypte : « Laisse-nous servir l''Egypte, car mieux vaut pour nous servir l''Egypte que de mourir au désert ! » '
  '13':
  - type: note
    content: 'N''ayez pas peur 20.20 ; Gn 15.1+ ; voir crainte. –  tenez-vous debout  : autre traduction restez en place  ; cf. 1S 12.16 ; 2Ch 20.17. –  regardez  : le même verbe est traduit par voir à la fin du v. –  le salut…  : litt. le salut du Seigneur, (celui) qu''il fera pour vous.'
  - type: text
    content: 'Moïse répondit au peuple : N''ayez pas peur, tenez-vous debout, et regardez le salut que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' va vous accorder aujourd''hui ; car les Egyptiens que vous voyez aujourd''hui, vous ne les verrez jamais plus. '
  '14':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' combattra pour vous, et vous, vous garderez le silence.'
  - type: heading
    content: Dieu ouvre un passage à travers la mer
  '15':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Pourquoi cries-tu vers moi ? Parle aux Israélites, et qu''ils partent. '
  '16':
  - type: note
    content: 'sur la terre ferme  : litt. dans la (partie) sèche, comme en Gn 1.9 ; autre traduction à pied sec. Sur cette traversée, cf. Es 43.16 ; 44.27 ; 50.2 ; Ps 66.6 ; 77.17-21 ; 78.13 ; 106.9s ; 114.3,5 ; 1Co 10.1s ; Hé 11.29.'
  - type: text
    content: 'Toi, lève ton bâton, étends ta main sur la mer et fends-la ; les Israélites entreront au milieu de la mer, sur la terre ferme. '
  '17':
  - type: note
    content: 's''entêtent 4.21n. –  je me glorifierai v. 4n. –  au moyen…  : autre traduction aux dépens du pharaon…, même possibilité au v. 18.'
  - type: text
    content: 'Quant à moi, je fais en sorte que les Egyptiens s''entêtent, pour qu''ils y entrent derrière eux ; je me glorifierai au moyen du pharaon et de toute son armée, de ses chars et de ses attelages ; '
  '18':
  - type: note
    content: 'YHWH  : voir noms divins.'
  - type: text
    content: 'ainsi les Egyptiens sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), quand je me serai glorifié au moyen du pharaon, de ses chars et de ses attelages.'
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'messager  : autre traduction ange , 3.2+. –  les troupes  : autre traduction les camps . –  se tint  : le verbe hébreu est apparenté au terme traduit par colonne (13.21+).'
  - type: text
    content: 'Le messager de Dieu qui allait devant les troupes d''Israël partit et alla derrière eux ; et la colonne de nuée partit de devant eux et se tint derrière eux. '
  '2':
  - type: note
    content: 'Pi-Hiroth (l''embouchure du canal, d''après l''akkadien, ou peut-être des canaux) / Migdol (tour  : probablement un poste de guet à la frontière, cf. Ez 29.10n) / Baal-Tsephôn (Baal [ou Seigneur] du Nord, sans doute un sanctuaire de la divinité ainsi nommée, qui est également connue par des inscriptions) : ces trois localités non identifiées sont peut-être à situer dans la région des lacs Amers, vers le milieu de l''actuel canal de Suez ; mais d''autres localisations ont été proposées, près du golfe d''Aqaba ou de la Méditerranée.'
  - type: text
    content: 'Parle aux Israélites ; qu''ils reviennent et qu''ils campent devant Pi-Hiroth, entre Migdol et la mer, en face de Baal-Tsephôn. C''est devant cet endroit que vous camperez, près de la mer. '
  '20':
  - type: note
    content: 'elle était nuée…  : texte hébreu difficile ; l''interprétation traditionnelle suppose que la nuée était ténèbres du côté des Egyptiens et lumière du côté d''Israël. LXX a lu  : il y eut obscurité et ténèbres, et la nuit passa.'
  - type: text
    content: Elle vint entre les troupes de l'Egypte et les troupes d'Israël – elle était nuée et ténèbres, et elle éclairait la nuit. Ils ne s'approchèrent pas les uns des autres pendant toute la nuit.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'V. 16+. –  vent (cf. 15.10n) d''est  : voir Jr 18.17n.'
  - type: text
    content: 'Alors Moïse étendit sa main sur la mer ; le '
  - type: text
    content: Seigneur
  - type: text
    content: ' refoula la mer toute la nuit par un puissant vent d''est ; il mit la mer à sec, et les eaux se fendirent. '
  '22':
  - type: text
    content: 'Les Israélites entrèrent au milieu de la mer, sur la terre ferme ; les eaux étaient pour eux une muraille à leur droite et à leur gauche. '
  '23':
  - type: text
    content: 'Les Egyptiens les poursuivirent. Tous les chevaux du pharaon, ses chars et ses attelages, entrèrent après eux au milieu de la mer. '
  '24':
  - type: note
    content: 'veille du matin  : la nuit était divisée en trois veilles : approximativement, du crépuscule à 22 h (Lm 2.19), de 22 h à 2 h du matin (Jg 7.19), de 2 h à l''aube (ici et 1S 11.11).'
  - type: text
    content: 'Pendant la veille du matin, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' regarda les troupes de l''Egypte depuis la colonne de feu et de nuée, et il frappa de panique les troupes de l''Egypte. '
  '25':
  - type: note
    content: 'Il enleva  : Smr, LXX et Syr ont lu il bloqua (ou il enraya). –  Les Egyptiens dirent  : autre traduction l''Egypte dit.'
  - type: text
    content: 'Il enleva les roues de leurs chars : ils ne les conduisaient plus qu''avec difficulté. Les Egyptiens dirent alors : Fuyons pour échapper à Israël, car c''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui combat l''Egypte pour eux !'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'sur les Egyptiens…  : autre traduction sur l''Egypte, sur ses chars et sur ses attelages (ou ses équipages ).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : Etends ta main sur la mer ; les eaux reviendront sur les Egyptiens, sur leurs chars et sur leurs attelages. '
  '27':
  - type: note
    content: 'à son approche  : autre traduction à sa rencontre  : la fuite des Egyptiens (v. 25) les précipite vers la mer qui revient (v. 21,26). –  se débarrassa…  : litt. secoua les Egyptiens (ou l''Egypte) ; même verbe en Né 5.13.'
  - type: text
    content: 'Moïse étendit sa main sur la mer ; vers le matin, la mer revint à sa place habituelle ; les Egyptiens s''enfuirent à son approche, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se débarrassa des Egyptiens au milieu de la mer. '
  '28':
  - type: note
    content: 'derrière les Israélites  : litt. derrière eux. –  pas même un seul  : cf. Dt 11.4 ; Ps 106.11 ; 136.15.'
  - type: text
    content: 'Les eaux revinrent et recouvrirent les chars, les attelages et toute l''armée du pharaon qui étaient entrés dans la mer derrière les Israélites ; il n''en resta pas même un seul. '
  '29':
  - type: text
    content: 'Mais les Israélites marchèrent sur la terre ferme au milieu de la mer ; les eaux étaient pour eux une muraille à leur droite et à leur gauche. '
  '3':
  - type: note
    content: 'Ils errent… en pleine confusion  : même verbe en Jl 1.18 ; Est 3.15.'
  - type: text
    content: 'Le pharaon dira des Israélites : « Ils errent dans le pays, en pleine confusion ; le désert s''est refermé sur eux ! » '
  '30':
  - type: note
    content: 'des Egyptiens / les Egyptiens  : autre traduction de l''Egypte / l''Egypte (morte).'
  - type: text
    content: 'Ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' sauva Israël de la main des Egyptiens ; Israël vit les Egyptiens morts sur le rivage de la mer. '
  '31':
  - type: note
    content: 'puissante  : litt. grande  ; autre traduction Israël vit la main puissante par laquelle le Seigneur avait agi… –  contre l''Egypte  : autres traductions contre les Egyptiens ; en Egypte. – Voir crainte. –  mirent leur foi ou crurent 4.1+ ; 19.9 ; Ps 106.12 ; cf. Gn 15.6.'
  - type: text
    content: 'Israël vit par quelle main puissante le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait agi contre l''Egypte, et le peuple craignit le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils mirent leur foi dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' et en Moïse, son serviteur.'
  '4':
  - type: note
    content: 's''entête 4.21n  ; cf. 7.3n. –  je me glorifierai  : autre traduction je serai glorifié  ; cf. v. 17s ; Lv 10.3n  ; Ez 28.22n. –  les Egyptiens  : autre traduction l''Egypte (de même aux v. 9s,12s,17s,20,23ss,30s). –  sauront 7.17+. –  YHWH  : voir noms divins.'
  - type: text
    content: 'Je ferai en sorte que le pharaon s''entête ; il les poursuivra, mais je me glorifierai au moyen du pharaon et de toute son armée, et les Egyptiens sauront que je suis le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH). Ainsi firent-ils.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'les sentiments  : litt. le cœur.'
  - type: text
    content: 'On dit au roi d''Egypte que le peuple avait pris la fuite. Alors les sentiments du pharaon et des gens de sa cour changèrent à l''égard du peuple. Ils dirent : Qu''avons-nous fait en laissant partir Israël, alors qu''il était à notre service ? '
  '6':
  - type: text
    content: 'Le pharaon attela son char et prit son peuple avec lui. '
  '7':
  - type: note
    content: 'six cents chars…  : autre traduction six cents chars d''élite et tous les chars de l''Egypte. –  sur chacun d''eux…  : litt. des troisièmes sur tous. Le mot hébreu correspondant à troisième désigne souvent l’écuyer (1R 9.22), le troisième homme de l''équipage d''un char de guerre antique, celui qui, aux côtés du conducteur et du combattant principal, tenait le bouclier.'
  - type: text
    content: 'Il prit six cents chars d''élite, tous les chars de l''Egypte ; sur chacun d''eux il y avait un équipage de trois hommes. '
  '8':
  - type: note
    content: 'librement  : litt. à main levée. On pourrait aussi comprendre sous la protection de la main de Dieu, cf. 3.19s ; 6.1,8 ; voir aussi Nb 33.3 ; même expression en Nb 15.30n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit en sorte que le pharaon, le roi d''Egypte, s''entête : il poursuivit les Israélites, alors que les Israélites étaient sortis librement. '
  '9':
  - type: note
    content: 'attelages  : autre traduction équipages (de chars), même possibilité aux v. 17s,23,26,28.'
  - type: text
    content: Les Egyptiens les poursuivirent ; tous les chevaux et les chars du pharaon, ses attelages et son armée, les atteignirent alors qu'ils campaient près de la mer, vers Pi-Hiroth, en face de Baal-Tsephôn.
