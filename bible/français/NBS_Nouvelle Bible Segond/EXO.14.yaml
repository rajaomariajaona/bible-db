      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Egyptiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'l''Egypte '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(de même aux v. 9s,12s,17s,20,23ss,30s). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'sauront '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '7.17+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins.'
    marker-yv: yv-n
  - type: text
    text: 'Je ferai en sorte que le pharaon s''entête ; il les poursuivra, mais je me glorifierai au moyen du pharaon et de toute son armée, et les Egyptiens sauront que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH). Ainsi firent-ils.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '5'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.5 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les sentiments
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'On dit au roi d''Egypte que le peuple avait pris la fuite. Alors les sentiments du pharaon et des gens de sa cour changèrent à l''égard du peuple. Ils dirent : Qu''avons-nous fait en laissant partir Israël, alors qu''il était à notre service ? '
  - type: usfm
    marker: v
    metadata:
      v: '6'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: text
    text: 'Le pharaon attela son char et prit son peuple avec lui. '
  - type: usfm
    marker: v
    metadata:
      v: '7'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.7 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: six cents chars…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: six cents chars d'élite et tous les chars de l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sur chacun d'eux…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des troisièmes sur tous
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le mot hébreu correspondant à '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'troisième '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: désigne souvent l’
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'écuyer '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (1R 9.22), le troisième homme de l'équipage d'un char de guerre antique, celui qui, aux côtés du conducteur et du combattant principal, tenait le bouclier.
    marker-yv: yv-n
  - type: text
    text: 'Il prit six cents chars d''élite, tous les chars de l''Egypte ; sur chacun d''eux il y avait un équipage de trois hommes. '
  - type: usfm
    marker: v
    metadata:
      v: '8'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: librement
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: à main levée
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. On pourrait aussi comprendre '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: sous la protection de la main de Dieu
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 3.19s ; 6.1,8 ; voir aussi Nb 33.3 ; même expression en Nb 15.30'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fit en sorte que le pharaon, le roi d''Egypte, s''entête : il poursuivit les Israélites, alors que les Israélites étaient sortis librement. '
  - type: usfm
    marker: v
    metadata:
      v: '9'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: attelages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'équipages '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (de chars), même possibilité aux v. 17s,23,26,28.
    marker-yv: yv-n
  - type: text
    text: Les Egyptiens les poursuivirent ; tous les chevaux et les chars du pharaon, ses attelages et son armée, les atteignirent alors qu'ils campaient près de la mer, vers Pi-Hiroth, en face de Baal-Tsephôn.
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Le pharaon approchait. Les Israélites levèrent les yeux et virent que les Egyptiens s''étaient lancés à leur poursuite. Les Israélites eurent très peur, et ils crièrent vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: v
    metadata:
      v: '11'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.11 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Sur les '
      - type: usfm
        marker: bdit
        children:
        - type: text
          text: protestations
      - type: text
        text: ' des Israélites, cf. 15.24 ; 16.3 ; 17.3 ; Nb 11.4-6 ; 14.1-4 ; 20.2-5 ; 21.5 ; Ps 78.40 ; 106.7.'
    marker-yv: yv-n
  - type: text
    text: 'Ils dirent à Moïse : N''y avait-il pas assez de tombeaux en Egypte, que tu nous aies emmenés mourir au désert ? Que nous as-tu fait en nous faisant sortir d''Egypte ? '
  - type: usfm
    marker: v
    metadata:
      v: '12'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '12'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.12 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. 6.9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les Egyptiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. v. 4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'N''est-ce pas là ce que nous te disions en Egypte : « Laisse-nous servir l''Egypte, car mieux vaut pour nous servir l''Egypte que de mourir au désert ! » '
  - type: usfm
    marker: v
    metadata:
      v: '13'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '13'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.13 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'N''ayez pas peur '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '20.20 ; Gn 15.1+ ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: crainte
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: tenez-vous debout
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: restez en place
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 1S 12.16 ; 2Ch 20.17. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: regardez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le même verbe est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'voir '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'à la fin du v. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le salut…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le salut du '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ', (celui) qu''il fera pour vous.'
    marker-yv: yv-n
  - type: text
    text: 'Moïse répondit au peuple : N''ayez pas peur, tenez-vous debout, et regardez le salut que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' va vous accorder aujourd''hui ; car les Egyptiens que vous voyez aujourd''hui, vous ne les verrez jamais plus. '
  - type: usfm
    marker: v
    metadata:
      v: '14'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '14'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' combattra pour vous, et vous, vous garderez le silence.'
- type: usfm
  marker: s1
  children:
  - type: text
    text: Dieu ouvre un passage à travers la mer
  marker-yv: yv-h
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
    text: 'Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' dit à Moïse : Pourquoi cries-tu vers moi ? Parle aux Israélites, et qu''ils partent. '
  - type: usfm
    marker: v
    metadata:
