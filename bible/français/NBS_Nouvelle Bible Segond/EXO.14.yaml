    marker-yv: yv-n
  - type: text
    text: 'Les eaux revinrent et recouvrirent les chars, les attelages et toute l''armée du pharaon qui étaient entrés dans la mer derrière les Israélites ; il n''en resta pas même un seul. '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: text
    text: 'Mais les Israélites marchèrent sur la terre ferme au milieu de la mer ; les eaux étaient pour eux une muraille à leur droite et à leur gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.30 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'des Egyptiens '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Egyptiens
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de l'Egypte / l'Egypte (morte).
    marker-yv: yv-n
  - type: text
    text: 'Ce jour-là, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' sauva Israël de la main des Egyptiens ; Israël vit les Egyptiens morts sur le rivage de la mer. '
  - type: usfm
    marker: v
