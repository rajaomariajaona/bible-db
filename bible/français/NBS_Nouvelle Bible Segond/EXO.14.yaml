      - type: text
        text: l'Egypte
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ) ; même verbe en Né 5.13.
    marker-yv: yv-n
  - type: text
    text: 'Moïse étendit sa main sur la mer ; vers le matin, la mer revint à sa place habituelle ; les Egyptiens s''enfuirent à son approche, et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' se débarrassa des Egyptiens au milieu de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: usfm
    marker: f
    children:
