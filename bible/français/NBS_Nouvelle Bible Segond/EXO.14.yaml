      - type: text
        text: ', sans doute un sanctuaire de la divinité ainsi nommée, qui est également connue par des inscriptions) : ces trois localités non identifiées sont peut-être à situer dans la région des lacs Amers, vers le milieu de l''actuel canal de Suez ; mais d''autres localisations ont été proposées, près du golfe d''Aqaba ou de la Méditerranée.'
    marker-yv: yv-n
  - type: text
    text: 'Parle aux Israélites ; qu''ils reviennent et qu''ils campent devant Pi-Hiroth, entre Migdol et la mer, en face de Baal-Tsephôn. C''est devant cet endroit que vous camperez, près de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '3'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils errent… en pleine confusion
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : même verbe en Jl 1.18 ; Est 3.15.'
    marker-yv: yv-n
  - type: text
    text: 'Le pharaon dira des Israélites : « Ils errent dans le pays, en pleine confusion ; le désert s''est refermé sur eux ! » '
  - type: usfm
    marker: v
    metadata:
