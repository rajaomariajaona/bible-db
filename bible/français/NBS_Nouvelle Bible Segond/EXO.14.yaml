    marker-yv: yv-n
  - type: text
    text: 'Quant à moi, je fais en sorte que les Egyptiens s''entêtent, pour qu''ils y entrent derrière eux ; je me glorifierai au moyen du pharaon et de toute son armée, de ses chars et de ses attelages ; '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: YHWH
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins.'
    marker-yv: yv-n
  - type: text
    text: 'ainsi les Egyptiens sauront que je suis le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), quand je me serai glorifié au moyen du pharaon, de ses chars et de ses attelages.'
- type: usfm
