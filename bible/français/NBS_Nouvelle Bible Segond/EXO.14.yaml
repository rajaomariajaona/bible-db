    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je me '
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifierai
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
