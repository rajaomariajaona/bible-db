  - type: text
    text: 'Alors Moïse étendit sa main sur la mer ; le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' refoula la mer toute la nuit par un puissant vent d''est ; il mit la mer à sec, et les eaux se fendirent. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: text
    text: 'Les Israélites entrèrent au milieu de la mer, sur la terre ferme ; les eaux étaient pour eux une muraille à leur droite et à leur gauche. '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: text
    text: 'Les Egyptiens les poursuivirent. Tous les chevaux du pharaon, ses chars et ses attelages, entrèrent après eux au milieu de la mer. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: veille du matin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : la nuit était divisée en trois veilles : approximativement, du crépuscule à 22 h (Lm 2.19), de 22 h à 2 h du matin (Jg 7.19), de 2 h à l''aube (ici et 1S 11.11).'
    marker-yv: yv-n
  - type: text
    text: 'Pendant la veille du matin, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' regarda les troupes de l''Egypte depuis la colonne de feu et de nuée, et il frappa de panique les troupes de l''Egypte. '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '14.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il enleva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : Smr, LXX et Syr ont lu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'il bloqua '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: il enraya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Les Egyptiens dirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: l'Egypte dit.
    marker-yv: yv-n
  - type: text
    text: 'Il enleva les roues de leurs chars : ils ne les conduisaient plus qu''avec difficulté. Les Egyptiens dirent alors : Fuyons pour échapper à Israël, car c''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) qui combat l''Egypte pour eux !'
