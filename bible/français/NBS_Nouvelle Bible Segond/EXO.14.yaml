    marker-yv: yv-n
  - type: text
    text: 'Israël vit par quelle main puissante le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' avait agi contre l''Egypte, et le peuple craignit le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ils mirent leur foi dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
