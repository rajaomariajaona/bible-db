      marker: fr
      children:
      - type: text
        text: '14.17 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 's''entêtent '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '4.21'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'je me '
      - type: usfm
        marker: w
        children:
        - type: text
          text: glorifierai
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: v. 4
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: au moyen…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
