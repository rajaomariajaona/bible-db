document_id: JOS.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Conquête du Aï
  - type: text
    content: ' '
  - type: note
    content: 'N''aie pas peur  : cf. 10.25+ ; Dt 1.21 ; 7.18. –  prépare-toi… v. 3n. –  je t''ai livré  : litt. j''ai donné en ta main  ; cf. 1.3n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : N''aie pas peur, ne sois pas terrifié. Prends avec toi tous les hommes de guerre, et prépare-toi à attaquer le Aï. Regarde, je t''ai livré le roi du Aï, son peuple, sa ville et son pays. '
  '10':
  - type: text
    content: 'Josué se leva de bon matin et passa le peuple en revue. Il monta, avec les anciens d''Israël, en tête du peuple, vers le Aï. '
  '11':
  - type: note
    content: 'entre eux…  : autre lecture traditionnelle entre lui et le Aï.'
  - type: text
    content: 'Tous les hommes de guerre qui étaient avec lui montèrent et s''approchèrent ; lorsqu''ils furent arrivés en face de la ville, ils dressèrent leur camp au nord du Aï. La vallée était entre eux et le Aï. '
  '12':
  - type: note
    content: 'Il  : c.-à-d. Josué. –  de la ville  : quelques mss portent du Aï, de même au v. 13n.'
  - type: text
    content: 'Il prit environ cinq mille hommes et les plaça en embuscade entre Beth-El et le Aï, à l''ouest de la ville. '
  '13':
  - type: note
    content: 'de la ville (à la première occurrence) : cf. v. 12n.'
  - type: text
    content: Quand le peuple eut installé tout le camp au nord de la ville et son arrière-garde à l'ouest de la ville, Josué alla, cette nuit-là, au milieu de la vallée.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'au lieu convenu  : le terme hébreu correspondant peut aussi désigner un temps fixé (cf. Gn 1.14n  ; 17.21n). –  la plaine aride  : hébreu ‘arava , nom qui s''applique le plus souvent à des régions situées plus au sud (voir Dt 1.1n,7n). Il s''agit ici de la vallée du Jourdain, qui correspond à la partie nord de la dépression qui s''étend depuis la mer Rouge jusqu''au Liban, en passant par la mer Morte.'
  - type: text
    content: 'Lorsque le roi du Aï s''en aperçut, les hommes de la ville se levèrent en toute hâte et sortirent à la rencontre d''Israël pour le combat – lui et tout son peuple – au lieu convenu, en face de la plaine aride. Il ne savait pas qu''il y avait une embuscade contre lui derrière la ville. '
  '15':
  - type: text
    content: 'Josué et tout Israël cédèrent devant eux et s''enfuirent par le chemin du désert. '
  '16':
  - type: note
    content: 'de la ville  : autre lecture traditionnelle à la première occurrence du Aï  ; cf. v. 12n.'
  - type: text
    content: 'On appela tout le peuple de la ville à leur poursuite. Ils poursuivirent donc Josué et furent coupés de la ville. '
  '17':
  - type: note
    content: 'et Beth-El  : absent de LXX.'
  - type: text
    content: Il ne resta pas un seul homme dans le Aï et Beth-El qui ne soit sorti à la poursuite d'Israël en abandonnant la ville ouverte, afin de poursuivre Israël.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Brandis… le javelot  : litt. étends avec le javelot , sans doute un geste de prophète (cf. Ex 8.1n  ; 2R 13.14-19 ; Ez 30.25) et un signal pour les hommes de l''embuscade (v. 19).'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Josué : Brandis vers le Aï le javelot que tu as à la main, car je te le livre. Josué brandit vers la ville le javelot qu''il avait à la main. '
  '19':
  - type: text
    content: 'Au moment où il étendit le bras, les hommes de l''embuscade sortirent vite de leur position et s''élancèrent ; ils arrivèrent à la ville et la prirent, puis ils se hâtèrent de mettre le feu à la ville. '
  '2':
  - type: note
    content: 'traité Jéricho et son roi  : cf. 10.1,28. –  vous pourrez piller…  : litt. vous pillerez pour vous son butin et ses bêtes  ; il s''agit d''un anathème partiel, comme en Dt 2.35 ; 3.7 ; 6.10s ; 20.14 ; voir aussi Jos 11.14s.'
  - type: text
    content: Tu traiteras le Aï et son roi comme tu as traité Jéricho et son roi. Seulement, vous pourrez piller ses biens et ses bêtes. Quant à toi, tends une embuscade à la ville, par-derrière.
  '20':
  - type: note
    content: 'Ils n''eurent…  : litt. il n''y eut plus pour eux deux mains pour fuir ici et ici. –  Alors ceux…  : cette deuxième partie de verset est absente de LXX. –  leurs poursuivants  : litt. le poursuivant.'
  - type: text
    content: 'Les gens du Aï se retournèrent : ils virent la fumée de la ville qui montait jusqu''au ciel. Ils n''eurent même plus la place de fuir d''un côté ou de l''autre. Alors ceux qui fuyaient au désert firent volte-face pour affronter leurs poursuivants. '
  '21':
  - type: text
    content: 'Quand Josué et tout Israël virent que les hommes de l''embuscade avaient pris la ville et que la fumée de la ville montait, ils firent volte-face et battirent les gens du Aï. '
  '22':
  - type: note
    content: 'sans leur laisser aucun survivant…  : cf. Dt 7.2.'
  - type: text
    content: 'Les autres sortirent de la ville à leur rencontre et ils se trouvèrent pris de part et d''autre, au milieu d''Israël qui les battit sans leur laisser aucun survivant, aucun rescapé. '
  '23':
  - type: text
    content: 'Quant au roi du Aï, ils le prirent vivant et le présentèrent devant Josué. '
  '24':
  - type: note
    content: au fil de l'épée 6.21n.
  - type: text
    content: 'Lorsque Israël eut achevé de tuer tous les habitants du Aï dans la campagne, dans le désert où ceux-ci l''avaient poursuivi, et que tous, jusqu''au dernier, furent tombés sous l''épée, tout Israël revint au Aï et le passa au fil de l''épée. '
  '25':
  - type: note
    content: 'au nombre de  : sous-entendu dans le texte. –  tous habitants du Aï ou toute la population du Aï (LXX tous les habitants du Aï).'
  - type: text
    content: 'Tous ceux qui tombèrent ce jour-là, hommes et femmes, furent au nombre de douze mille, tous habitants du Aï. '
  '26':
  - type: note
    content: 'ne reposa pas  : litt. ne ramena pas la main (ou le bras, cf. v. 9) qu''il étendait avec le javelot. –  anathème  : voir bénédiction, malédiction.'
  - type: text
    content: 'Josué ne reposa pas le javelot qu''il brandissait avant d''avoir frappé d''anathème tous les habitants du Aï. '
  '27':
  - type: note
    content: 'butin  : cf. v. 2n  ; Nb 31.32,53. –  l''ordre…  : litt. la parole que YHWH avait commandée à Josué, cf. v. 1s. –  le Seigneur voir noms divins.'
  - type: text
    content: 'Toutefois, Israël prit pour lui comme butin les bêtes et les biens de cette ville-là, selon l''ordre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donné à Josué. '
  '28':
  - type: note
    content: 'un tertre de dévastation  : cf. Dt 13.17 ; Jr 49.2 qui décrivent le même traitement pour une ville israélite coupable d''idolâtrie ; cf. Jr 30.18n. –  jusqu''à ce jour 4.9n, de même au v. 29.'
  - type: text
    content: 'Josué mit le feu au Aï et en fit pour toujours un tertre de dévastation, jusqu''à ce jour. '
  '29':
  - type: note
    content: 'descendre le cadavre du bois  : cf. Dt 21.22s qui réglemente la pendaison à un bois (arbre ou gibet) ; voir aussi Jos 10.26s ; exception à la règle : 2S 21.10ss. –  on dressa sur lui… 7.26.'
  - type: text
    content: Quant au roi du Aï, il le pendit au bois jusqu'au soir ; au coucher du soleil, Josué donna l'ordre de descendre le cadavre du bois. On le jeta à l'entrée de la porte de la ville et on dressa sur lui un grand tas de pierres, qui est là jusqu'à ce jour.
  - type: heading
    content: Lecture de la loi sur le mont Ebal
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Josué…  : litt. Josué se leva avec… pour attaquer le Aï.'
  - type: text
    content: 'Josué, avec tous les hommes de guerre, se prépara à attaquer le Aï. Josué choisit trente mille vaillants guerriers et les fit partir de nuit, '
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'LXX insère les derniers v. de ce chap. à la suite de 9.2. –  au mont Ebal  : haut de 940 m, au nord de Sichem, souvent cité avec le mont Garizim (881 m) au sud de Sichem. C''est sur le mont Garizim que les Samaritains construisirent leur temple, rival de celui de Jérusalem (Jn 4.20). Cf. Gn 12.6n  ; Dt 11.29s ; 27.1-8,11-26 ; voir aussi 2R 2.1 ; 4.38.'
  - type: text
    content: 'Alors Josué bâtit un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël, au mont Ebal, '
  '31':
  - type: note
    content: 'comme il est écrit…  : cf. Dt 27.1-8. –  le livre de la loi v. 34 ; 23.6 ; 24.26 ; 2R 14.6 ; 22.8 ; Né 8.1,8,18 ; 9.3 ; 2Ch 17.9 ; 34.14s. –  pas passé le fer  : cf. Ex 20.25. – Voir sacrifices.'
  - type: text
    content: 'selon ce que Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', avait ordonné aux Israélites, comme il est écrit dans le livre de la loi de Moïse : un autel de pierres brutes sur lesquelles on n''avait pas passé le fer. Ils y présentèrent des holocaustes au '
  - type: text
    content: Seigneur
  - type: text
    content: ' et offrirent des sacrifices de paix. '
  '32':
  - type: note
    content: 'Josué (litt. il) écrivit sur les pierres  : soit les pierres de l''autel, soit plutôt celles qui ont été prévues en Dt 27.2-4,8. –  un double de la loi  : cf. Dt 17.18.'
  - type: text
    content: 'Là, Josué écrivit sur les pierres un double de la loi que Moïse avait écrite, devant les Israélites. '
  '33':
  - type: note
    content: 'secrétaires 1.10+. –  immigrés / autochtones  : cf. Ex 12.48ns. –  prêtres-lévites 3.3 ; Dt 17.9n,18 ; 18.1 ; 24.8 ; 27.9. –  Garizim / Ebal v. 30n  ; Dt 11.29 ; 27.12s.'
  - type: text
    content: 'Tout Israël, ses anciens, ses secrétaires et ses juges se tenaient de part et d''autre du Coffre, immigrés et autochtones, en face des prêtres-lévites qui portaient le coffre de l''alliance du '
  - type: text
    content: Seigneur
  - type: text
    content: ', moitié du côté du mont Garizim et moitié du côté du mont Ebal, selon l''ordre de Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour bénir le peuple d''Israël en premier lieu. '
  '34':
  - type: note
    content: 'Josué (litt. il) proclama  : autre traduction Josué lut. –  la bénédiction et la malédiction  : cf. Dt 28. –  le livre de la loi v. 31+.'
  - type: text
    content: 'Ensuite Josué proclama toutes les paroles de la loi, la bénédiction et la malédiction, exactement comme elles sont écrites dans le livre de la loi. '
  '35':
  - type: note
    content: 'toute l''assemblée d''Israël  : cf. Dt 31.11. –  les familles entières  : autre traduction les enfants  ; cf. Gn 34.29n.'
  - type: text
    content: De tout ce que Moïse avait ordonné, il n'y eut pas une seule parole que Josué ne proclama devant toute l'assemblée d'Israël, avec les femmes et les familles entières, ainsi que les immigrés qui marchaient parmi eux.
  '4':
  - type: note
    content: Regardez v. 8.
  - type: text
    content: 'en leur donnant cet ordre : Regardez ! Vous allez tendre une embuscade à la ville, derrière la ville. Ne vous éloignez pas trop de la ville ; tenez-vous tous prêts. '
  '5':
  - type: text
    content: 'Moi et tout le peuple qui est avec moi, nous approcherons de la ville. Au moment où ils sortiront à notre rencontre, comme la première fois, nous fuirons devant eux. '
  '6':
  - type: text
    content: 'Ils sortiront à notre poursuite, jusqu''à ce que nous les ayons coupés de la ville ; car ils diront : « Ils fuient devant nous comme la première fois ! » Tandis que nous fuirons devant eux, '
  '7':
  - type: note
    content: 'vous surgirez  : litt. vous vous lèverez. –  vous vous emparerez ou, selon la traduction habituelle du verbe correspondant, vous prendrez possession de.'
  - type: text
    content: 'vous surgirez de l''embuscade et vous vous emparerez de la ville. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, vous la livrera. '
  '8':
  - type: note
    content: 'vous mettrez le feu…  : cf. v. 19. –  la parole  : LXX cette parole.'
  - type: text
    content: 'Quand vous aurez pris la ville, vous mettrez le feu à la ville. Vous agirez selon la parole du '
  - type: text
    content: Seigneur
  - type: text
    content: . Regardez, je vous en donne l'ordre.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'à l''ouest  : litt. du côté de la mer , de même aux v. 12s.'
  - type: text
    content: Josué les fit partir, et ils allèrent se placer en embuscade. Ils s'installèrent entre Beth-El et le Aï, à l'ouest du Aï. Josué passa toute la nuit au milieu du peuple.
