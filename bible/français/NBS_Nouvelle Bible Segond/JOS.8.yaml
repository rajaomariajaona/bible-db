  '5':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Moi et tout le peuple qui est avec moi, nous approcherons de la ville. Au moment où ils sortiront à notre rencontre, comme la première fois, nous fuirons devant eux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Ils sortiront à notre poursuite, jusqu''à ce que nous les ayons coupés de la ville ; car ils diront : « Ils fuient devant nous comme la première fois ! » Tandis que nous fuirons devant eux, '
