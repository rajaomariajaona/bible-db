document_id: JOS.8,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Conquête du Aï
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'aie pas peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 10.25+ ; Dt 1.21 ; 7.18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prépare-toi… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je t'ai livré
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: j'ai donné en ta main
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 1.3
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Josué : N''aie pas peur, ne sois pas terrifié. Prends avec toi tous les hommes de guerre, et prépare-toi à attaquer le Aï. Regarde, je t''ai livré le roi du Aï, son peuple, sa ville et son pays. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué se leva de bon matin et passa le peuple en revue. Il monta, avec les anciens d''Israël, en tête du peuple, vers le Aï. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: entre eux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entre lui et le Aï.
      marker-yv: yv-n
    - type: text
      text: 'Tous les hommes de guerre qui étaient avec lui montèrent et s''approchèrent ; lorsqu''ils furent arrivés en face de la ville, ils dressèrent leur camp au nord du Aï. La vallée était entre eux et le Aï. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Il
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Josué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : quelques mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du Aï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Il prit environ cinq mille hommes et les plaça en embuscade entre Beth-El et le Aï, à l''ouest de la ville. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'de la ville '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(à la première occurrence) : cf. v. 12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Quand le peuple eut installé tout le camp au nord de la ville et son arrière-garde à l'ouest de la ville, Josué alla, cette nuit-là, au milieu de la vallée.
  '14':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au lieu convenu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le terme hébreu correspondant peut aussi désigner un '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'temps fixé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (cf. Gn 1.14
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 17.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la plaine aride
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ‘arava
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', nom qui s''applique le plus souvent à des régions situées plus au sud (voir Dt 1.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',7'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ). Il s'agit ici de la vallée du Jourdain, qui correspond à la partie nord de la dépression qui s'étend depuis la mer Rouge jusqu'au Liban, en passant par la mer Morte.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque le roi du Aï s''en aperçut, les hommes de la ville se levèrent en toute hâte et sortirent à la rencontre d''Israël pour le combat – lui et tout son peuple – au lieu convenu, en face de la plaine aride. Il ne savait pas qu''il y avait une embuscade contre lui derrière la ville. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Josué et tout Israël cédèrent devant eux et s''enfuirent par le chemin du désert. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de la ville
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre lecture traditionnelle à la première occurrence '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: du Aï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. v. 12'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'On appela tout le peuple de la ville à leur poursuite. Ils poursuivirent donc Josué et furent coupés de la ville. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et Beth-El
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : absent de LXX.'
      marker-yv: yv-n
    - type: text
      text: Il ne resta pas un seul homme dans le Aï et Beth-El qui ne soit sorti à la poursuite d'Israël en abandonnant la ville ouverte, afin de poursuivre Israël.
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Brandis… le javelot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: étends avec le javelot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', sans doute un geste de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophète
        - type: text
          text: ' (cf. Ex 8.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 2R 13.14-19 ; Ez 30.25) et un signal pour les hommes de l''embuscade (v. 19).'
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Josué : Brandis vers le Aï le javelot que tu as à la main, car je te le livre. Josué brandit vers la ville le javelot qu''il avait à la main. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Au moment où il étendit le bras, les hommes de l''embuscade sortirent vite de leur position et s''élancèrent ; ils arrivèrent à la ville et la prirent, puis ils se hâtèrent de mettre le feu à la ville. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: traité Jéricho et son roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 10.1,28. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vous pourrez piller…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vous pillerez pour vous son butin et ses bêtes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit d''un anathème partiel, comme en Dt 2.35 ; 3.7 ; 6.10s ; 20.14 ; voir aussi Jos 11.14s.'
      marker-yv: yv-n
    - type: text
      text: Tu traiteras le Aï et son roi comme tu as traité Jéricho et son roi. Seulement, vous pourrez piller ses biens et ses bêtes. Quant à toi, tends une embuscade à la ville, par-derrière.
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ils n'eurent…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il n'y eut plus pour eux deux mains pour fuir ici et ici
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Alors ceux…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cette deuxième partie de verset est absente de LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: leurs poursuivants
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le poursuivant.
      marker-yv: yv-n
    - type: text
      text: 'Les gens du Aï se retournèrent : ils virent la fumée de la ville qui montait jusqu''au ciel. Ils n''eurent même plus la place de fuir d''un côté ou de l''autre. Alors ceux qui fuyaient au désert firent volte-face pour affronter leurs poursuivants. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quand Josué et tout Israël virent que les hommes de l''embuscade avaient pris la ville et que la fumée de la ville montait, ils firent volte-face et battirent les gens du Aï. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sans leur laisser aucun survivant…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 7.2.'
      marker-yv: yv-n
    - type: text
      text: 'Les autres sortirent de la ville à leur rencontre et ils se trouvèrent pris de part et d''autre, au milieu d''Israël qui les battit sans leur laisser aucun survivant, aucun rescapé. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Quant au roi du Aï, ils le prirent vivant et le présentèrent devant Josué. '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'au fil de l''épée '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Lorsque Israël eut achevé de tuer tous les habitants du Aï dans la campagne, dans le désert où ceux-ci l''avaient poursuivi, et que tous, jusqu''au dernier, furent tombés sous l''épée, tout Israël revint au Aï et le passa au fil de l''épée. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: au nombre de
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sous-entendu dans le texte. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tous habitants du Aï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'toute la population du Aï '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les habitants du Aï
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Tous ceux qui tombèrent ce jour-là, hommes et femmes, furent au nombre de douze mille, tous habitants du Aï. '
  '26':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ne reposa pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne ramena pas la main '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le bras
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 9) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'il étendait avec le javelot
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: anathème
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction.'
      marker-yv: yv-n
    - type: text
      text: 'Josué ne reposa pas le javelot qu''il brandissait avant d''avoir frappé d''anathème tous les habitants du Aï. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: butin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Nb 31.32,53. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'ordre…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la parole que YHWH avait commandée à Josué
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 1s. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins.'
      marker-yv: yv-n
    - type: text
      text: 'Toutefois, Israël prit pour lui comme butin les bêtes et les biens de cette ville-là, selon l''ordre que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' avait donné à Josué. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un tertre de dévastation
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Dt 13.17 ; Jr 49.2 qui décrivent le même traitement pour une ville israélite coupable d''idolâtrie ; cf. Jr 30.18'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'jusqu''à ce jour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.9'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ', de même au v. 29.'
      marker-yv: yv-n
    - type: text
      text: 'Josué mit le feu au Aï et en fit pour toujours un tertre de dévastation, jusqu''à ce jour. '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '8.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
