      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.26.
      marker-yv: yv-n
    - type: text
      text: Quant au roi du Aï, il le pendit au bois jusqu'au soir ; au coucher du soleil, Josué donna l'ordre de descendre le cadavre du bois. On le jeta à l'entrée de la porte de la ville et on dressa sur lui un grand tas de pierres, qui est là jusqu'à ce jour.
  - type: usfm
