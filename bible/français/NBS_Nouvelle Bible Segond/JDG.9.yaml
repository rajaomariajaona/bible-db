            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: maudirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction.'
      marker-yv: yv-n
    - type: text
      text: 'Ils sortirent dans la campagne, vendangèrent leurs vignes, foulèrent le raisin et se livrèrent à des réjouissances ; ils se rendirent à la maison de leur dieu, ils mangèrent et burent, et ils maudirent Abimélek. '
  '28':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.28 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: N'est-ce pas…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains modifient la vocalisation du texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Yeroub-Baal et Zeboul, son inspecteur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son agent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: )
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ', sont soumis aux hommes de Hamor'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Gaal '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: rappelle qu’
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Abimélek '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'n''est qu''à moitié de '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Sichem '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 1ss ; 8.31) ; sur l’
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ancêtre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'de la ville (= '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Hamor
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') et ses rapports avec Israël, voir Gn 33.18s ; 34 ; Jos 24.32 ; cf. 1R 12.16. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Zeboul '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (v. 30), dont le nom rappelle celui de Zabulon, ne semble pas être un Ephraïmite.
      marker-yv: yv-n
    - type: text
      text: 'Gaal, fils d''Ebed, dit : Qui est Abimélek, et qui est Sichem, pour que nous soyons soumis à Abimélek ? N''est-ce pas le fils de Yeroub-Baal ? Zeboul n''est-il pas son inspecteur ? Soumettez-vous aux hommes de Hamor, père de Sichem ; pourquoi, nous, serions-nous soumis à Abimélek ? '
  '29':
  - type: usfm
    marker: p
    children:
    - type: usfm
