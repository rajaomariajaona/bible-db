          text: ', Gn 12.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Dt 11.30.'
      marker-yv: yv-n
    - type: text
      text: 'Gaal reprit : C''est bien une troupe qui descend du centre du pays, et une bande arrive par le chemin du térébinthe des Devins. '
