          text: Arouma
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : probablement à une dizaine de kilomètres au sud-sud-est de Sichem.'
      marker-yv: yv-n
    - type: text
      text: Abimélek s'arrêta à Arouma. Zeboul chassa Gaal et ses frères, ceux-ci ne purent rester à Sichem.
  '42':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.42 '
      - type: usfm
        marker: fq
        children:
