          text: tu prends pour des hommes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu vois comme des hommes.
      marker-yv: yv-n
    - type: text
      text: 'Gaal aperçut la troupe et dit à Zeboul : Il y a une troupe qui descend du sommet des montagnes. Zeboul lui répondit : C''est l''ombre des montagnes que tu prends pour des hommes. '
