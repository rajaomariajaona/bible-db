        children:
        - type: text
          text: ', cf. 1R 2.28.'
      marker-yv: yv-n
    - type: text
      text: 'Les frères de sa mère dirent tout cela pour lui à tous les notables de Sichem ; leur cœur inclina en faveur d''Abimélek, car ils se disaient : C''est notre frère ! '
  '30':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.30 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 28
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Zeboul, gouverneur de la ville, apprit ce que disait Gaal, fils d''Ebed, et il se mit en colère. '
  '31':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.31 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: secrètement
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Zeboul joue double jeu (v. 36ss).'
      marker-yv: yv-n
    - type: text
      text: 'Il envoya secrètement des messagers à Abimélek, pour lui dire : Gaal, fils d''Ebed, et ses frères sont venus à Sichem et ils soulèvent la ville contre toi. '
  '32':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Maintenant donc, lève-toi de nuit, avec ta troupe, et mets-toi en embuscade dans la campagne. '
  '33':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.33 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'fondras '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 44
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu feras de lui…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu lui feras ce que ta main trouvera.
      marker-yv: yv-n
    - type: text
      text: Au matin, au lever du soleil, tu te lèveras et tu fondras sur la ville. Lorsque Gaal et sa troupe sortiront à ta rencontre, tu feras de lui ce que tu voudras.
  '34':
  - type: usfm
    marker: p
    children:
