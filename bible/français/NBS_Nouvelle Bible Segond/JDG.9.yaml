      marker-yv: yv-n
    - type: text
      text: 'Abimélek et toute sa troupe se levèrent de nuit et se mirent en embuscade près de Sichem, en quatre bandes. '
  '35':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaal, fils d''Ebed, sortit et se tint à l''entrée de la porte de la ville. Abimélek et toute sa troupe surgirent alors de l''embuscade. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
