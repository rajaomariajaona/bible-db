document_id: JDG.9,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Abimélek devient roi à Sichem
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 8.29-31.
      marker-yv: yv-n
    - type: text
      text: 'Abimélek, fils de Yeroub-Baal, se rendit à Sichem pour parler aux frères de sa mère, ainsi qu''à tout le clan familial de sa mère. Il leur dit : '
  '10':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les arbres dirent alors au figuier :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens, toi, sois notre roi !
  '11':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Mais le figuier leur répondit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renoncerais-je à ma douceur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: à mon fruit excellent,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour aller me balancer au-dessus des autres arbres ?
  '12':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Les arbres dirent alors à la vigne :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens, toi, sois notre roi !
  '13':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ps 104.15 ; Ec 9.7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: vin
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: vin nouveau
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Gn 27.28'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Mais la vigne leur répondit :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Renoncerais-je à mon vin
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui réjouit les dieux et les humains,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour aller me balancer au-dessus des autres arbres ?
  '14':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Alors tous les arbres dirent au buisson d''épines :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Viens, toi, sois notre roi !
  '15':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.15 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 20 ; cf. Es 10.34
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le buisson d''épines répondit aux arbres :'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Si c'est loyalement que vous voulez me conférer l'onction
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour que je sois roi sur vous,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: venez, abritez-vous sous mon ombrage ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: sinon, qu'un feu sorte du buisson d'épines
  - type: usfm
    marker: q1
    children:
    - type: text
      text: et qu'il dévore les cèdres du Liban !
  '16':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Maintenant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en réalité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'avec loyauté '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(la même formule est traduite par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'loyalement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'au v. 15) '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'et intégrité '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 19 ; cf. Jos 24.14 ; Os 4.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en faisant roi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. v. 6,18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: agi avec bonté
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: bien agi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Yeroub-Baal
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '6.32'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Maintenant, est-ce avec loyauté et intégrité que vous avez agi en faisant roi Abimélek ? Avez-vous agi avec bonté envers Yeroub-Baal et sa maison ? L''avez-vous traité comme il le méritait ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a exposé sa vie au front
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a lancé sa vie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: son être
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', Gn 1.20'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en avant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Jg 5.2,18. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'il vous a délivrés… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 6.14 ; 8.22.
      marker-yv: yv-n
    - type: text
      text: 'Car mon père a combattu pour vous, il a exposé sa vie au front, et il vous a délivrés de la main de Madiân ; '
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 5s.
      marker-yv: yv-n
    - type: text
      text: 'et vous, vous vous êtes dressés contre la maison de mon père aujourd''hui, vous avez tué ses fils, soixante-dix hommes, sur une même pierre, et vous avez investi Abimélek, le fils de sa servante, de la royauté sur les notables de Sichem, parce qu''il est votre frère. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.19 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: V. 16.
      marker-yv: yv-n
    - type: text
      text: 'Si c''est avec loyauté et intégrité que vous avez agi envers Yeroub-Baal et sa maison en ce jour, qu''Abimélek fasse votre joie, et que vous fassiez aussi la sienne ! '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux oreilles de tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même au v. 3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'les notables '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: les seigneurs, les propriétaires (terriens)
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', hébreu '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: ba`al
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'soient vos maîtres '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '8.22'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'os '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: chair
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : comme en Gn 29.14 ; cf. Gn 2.23.'
      marker-yv: yv-n
    - type: text
      text: 'Dites, je vous prie, à tous les notables de Sichem : Vaut-il mieux pour vous que soixante-dix hommes, tous les fils de Yeroub-Baal, soient vos maîtres, ou qu''un seul homme soit votre maître ? Souvenez-vous que je suis vos os et votre chair ! '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 15,49. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Millo '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 6
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Sinon, qu''un feu sorte d''Abimélek et dévore les notables de Sichem et de la maison de Millo, et qu''un feu sorte des notables de Sichem et de la maison de Millo et dévore Abimélek ! '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Béer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : au nord de Beth-Shéân, à une quinzaine de kilomètres au sud-est du mont Tabor.'
      marker-yv: yv-n
    - type: text
      text: Jotam se retira et prit la fuite ; il s'en alla habiter à Béer, loin d'Abimélek, son frère.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: La révolte de Sichem contre Abimélek
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Abimélek fut prince pendant trois ans sur Israël. '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un souffle mauvais
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : c.-à-d., en l''occurrence, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un '
        - type: usfm
          marker: w
          children:
          - type: text
            text: esprit
        - type: text
          text: ' de discorde'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 1S 16.14ss ; 1R 22.21-23 ; Es 19.14 ; 29.10.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Dieu envoya un souffle mauvais entre Abimélek et les notables de Sichem : les notables de Sichem trahirent Abimélek, '
  '24':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.24 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de sorte que…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pour que vienne la violence des soixante-dix fils de Yeroub-Baal et leur '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sang
        - type: text
          text: ', pour (les) mettre sur Abimélek… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. Jr 51.35. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui lui avaient prêté main-forte
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui avaient fortifié ses mains
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 4s ; autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui l'avaient encouragé.
      marker-yv: yv-n
    - type: text
      text: 'de sorte que la violence faite aux soixante-dix fils de Yeroub-Baal et leur sang retombent sur Abimélek, leur frère, qui les avait tués, et sur les notables de Sichem qui lui avaient prêté main-forte pour tuer ses frères. '
  '25':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.25 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contre lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : les embuscades détournent peut-être au profit des notables de Sichem les marchandises sur lesquelles Abimélek prélevait un droit de passage. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dépouillaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même verbe est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'enlever '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 21.23.
      marker-yv: yv-n
    - type: text
      text: Les notables de Sichem placèrent contre lui en embuscade, sur les sommets des montagnes, des gens qui dépouillaient tous ceux qui passaient près d'eux sur le chemin. Cela fut rapporté à Abimélek.
  '26':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.26 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: passèrent à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : certains modifient le texte hébreu traditionnel pour lire '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 's''installèrent à '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'se mirent au service de '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(verbe apparenté au nom '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ebed
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', qui apparaît au v. 28 au sens d’'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: être soumis à
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Gaal, fils d''Ebed, vint avec ses frères ; ils passèrent à Sichem. Les notables de Sichem lui firent confiance. '
  '27':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.27 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans la campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : à distance et à l''abri (v. 25'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') de l''administration d''Abimélek, lequel n''habite d''ailleurs pas personnellement Sichem (v. 31,41) ; cf. v. 43. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des réjouissances
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même terme est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'louange '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Lv 19.24. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la maison de leur dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 4
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ',46'
        - type: usfm
