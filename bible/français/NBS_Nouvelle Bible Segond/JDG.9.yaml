        - type: text
          text: '9.29 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ce peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme correspondant est aussi traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'troupe '
      - type: usfm
        marker: ft
