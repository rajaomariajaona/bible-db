document_id: JDG.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Abimélek devient roi à Sichem
  - type: text
    content: ' '
  - type: note
    content: 8.29-31.
  - type: text
    content: 'Abimélek, fils de Yeroub-Baal, se rendit à Sichem pour parler aux frères de sa mère, ainsi qu''à tout le clan familial de sa mère. Il leur dit : '
  '10':
  - type: text
    content: 'Les arbres dirent alors au figuier :'
  - type: text
    content: Viens, toi, sois notre roi !
  '11':
  - type: text
    content: 'Mais le figuier leur répondit :'
  - type: text
    content: Renoncerais-je à ma douceur,
  - type: text
    content: à mon fruit excellent,
  - type: text
    content: pour aller me balancer au-dessus des autres arbres ?
  '12':
  - type: text
    content: 'Les arbres dirent alors à la vigne :'
  - type: text
    content: Viens, toi, sois notre roi !
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 104.15 ; Ec 9.7. –  vin  : autre traduction vin nouveau , cf. Gn 27.28n.'
  - type: text
    content: 'Mais la vigne leur répondit :'
  - type: text
    content: Renoncerais-je à mon vin
  - type: text
    content: qui réjouit les dieux et les humains,
  - type: text
    content: pour aller me balancer au-dessus des autres arbres ?
  '14':
  - type: text
    content: 'Alors tous les arbres dirent au buisson d''épines :'
  - type: text
    content: Viens, toi, sois notre roi !
  '15':
  - type: text
    content: ' '
  - type: note
    content: V. 20 ; cf. Es 10.34n.
  - type: text
    content: 'Le buisson d''épines répondit aux arbres :'
  - type: text
    content: Si c'est loyalement que vous voulez me conférer l'onction
  - type: text
    content: pour que je sois roi sur vous,
  - type: text
    content: venez, abritez-vous sous mon ombrage ;
  - type: text
    content: sinon, qu'un feu sorte du buisson d'épines
  - type: text
    content: et qu'il dévore les cèdres du Liban !
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Maintenant  : autre traduction en réalité . –  avec loyauté (la même formule est traduite par loyalement au v. 15) et intégrité v. 19 ; cf. Jos 24.14 ; Os 4.1n. –  en faisant roi  : cf. v. 6,18. –  agi avec bonté  : autre traduction bien agi . –  Yeroub-Baal 6.32n.'
  - type: text
    content: 'Maintenant, est-ce avec loyauté et intégrité que vous avez agi en faisant roi Abimélek ? Avez-vous agi avec bonté envers Yeroub-Baal et sa maison ? L''avez-vous traité comme il le méritait ? '
  '17':
  - type: note
    content: 'il a exposé sa vie au front  : litt. il a lancé sa vie (ou son être, Gn 1.20n) en avant  ; cf. Jg 5.2,18. –  il vous a délivrés… 6.14 ; 8.22.'
  - type: text
    content: 'Car mon père a combattu pour vous, il a exposé sa vie au front, et il vous a délivrés de la main de Madiân ; '
  '18':
  - type: note
    content: V. 5s.
  - type: text
    content: 'et vous, vous vous êtes dressés contre la maison de mon père aujourd''hui, vous avez tué ses fils, soixante-dix hommes, sur une même pierre, et vous avez investi Abimélek, le fils de sa servante, de la royauté sur les notables de Sichem, parce qu''il est votre frère. '
  '19':
  - type: note
    content: V. 16.
  - type: text
    content: 'Si c''est avec loyauté et intégrité que vous avez agi envers Yeroub-Baal et sa maison en ce jour, qu''Abimélek fasse votre joie, et que vous fassiez aussi la sienne ! '
  '2':
  - type: note
    content: 'à tous  : litt. aux oreilles de tous, de même au v. 3. –  les notables ou les seigneurs, les propriétaires (terriens), hébreu ba`al, de même dans la suite. –  soient vos maîtres 8.22ns. –  os / chair  : comme en Gn 29.14 ; cf. Gn 2.23.'
  - type: text
    content: 'Dites, je vous prie, à tous les notables de Sichem : Vaut-il mieux pour vous que soixante-dix hommes, tous les fils de Yeroub-Baal, soient vos maîtres, ou qu''un seul homme soit votre maître ? Souvenez-vous que je suis vos os et votre chair ! '
  '20':
  - type: note
    content: V. 15,49. –  Millo v. 6n.
  - type: text
    content: 'Sinon, qu''un feu sorte d''Abimélek et dévore les notables de Sichem et de la maison de Millo, et qu''un feu sorte des notables de Sichem et de la maison de Millo et dévore Abimélek ! '
  '21':
  - type: note
    content: 'Béer  : au nord de Beth-Shéân, à une quinzaine de kilomètres au sud-est du mont Tabor.'
  - type: text
    content: Jotam se retira et prit la fuite ; il s'en alla habiter à Béer, loin d'Abimélek, son frère.
  - type: heading
    content: La révolte de Sichem contre Abimélek
  '22':
  - type: text
    content: 'Abimélek fut prince pendant trois ans sur Israël. '
  '23':
  - type: note
    content: 'un souffle mauvais  : c.-à-d., en l''occurrence, un esprit de discorde, cf. 1S 16.14ss ; 1R 22.21-23 ; Es 19.14 ; 29.10.'
  - type: text
    content: 'Alors Dieu envoya un souffle mauvais entre Abimélek et les notables de Sichem : les notables de Sichem trahirent Abimélek, '
  '24':
  - type: note
    content: 'de sorte que…  : litt. pour que vienne la violence des soixante-dix fils de Yeroub-Baal et leur sang, pour (les) mettre sur Abimélek… cf. Jr 51.35. –  qui lui avaient prêté main-forte  : litt. qui avaient fortifié ses mains, cf. v. 4s ; autre traduction qui l''avaient encouragé.'
  - type: text
    content: 'de sorte que la violence faite aux soixante-dix fils de Yeroub-Baal et leur sang retombent sur Abimélek, leur frère, qui les avait tués, et sur les notables de Sichem qui lui avaient prêté main-forte pour tuer ses frères. '
  '25':
  - type: note
    content: 'contre lui  : les embuscades détournent peut-être au profit des notables de Sichem les marchandises sur lesquelles Abimélek prélevait un droit de passage. –  dépouillaient  : le même verbe est traduit par enlever en 21.23.'
  - type: text
    content: Les notables de Sichem placèrent contre lui en embuscade, sur les sommets des montagnes, des gens qui dépouillaient tous ceux qui passaient près d'eux sur le chemin. Cela fut rapporté à Abimélek.
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'passèrent à  : certains modifient le texte hébreu traditionnel pour lire s''installèrent à ou se mirent au service de (verbe apparenté au nom Ebed , qui apparaît au v. 28 au sens d’ être soumis à ).'
  - type: text
    content: 'Gaal, fils d''Ebed, vint avec ses frères ; ils passèrent à Sichem. Les notables de Sichem lui firent confiance. '
  '27':
  - type: note
    content: 'dans la campagne  : à distance et à l''abri (v. 25n) de l''administration d''Abimélek, lequel n''habite d''ailleurs pas personnellement Sichem (v. 31,41) ; cf. v. 43. –  des réjouissances  : le même terme est traduit par louange en Lv 19.24. –  la maison de leur dieu v. 4n,46n. –  maudirent  : voir bénédiction, malédiction.'
  - type: text
    content: 'Ils sortirent dans la campagne, vendangèrent leurs vignes, foulèrent le raisin et se livrèrent à des réjouissances ; ils se rendirent à la maison de leur dieu, ils mangèrent et burent, et ils maudirent Abimélek. '
  '28':
  - type: note
    content: 'N''est-ce pas…  : certains modifient la vocalisation du texte hébreu traditionnel pour lire Yeroub-Baal et Zeboul, son inspecteur (ou son agent), sont soumis aux hommes de Hamor. Gaal rappelle qu’Abimélek n''est qu''à moitié de Sichem (v. 1ss ; 8.31) ; sur l’ancêtre de la ville (= Hamor) et ses rapports avec Israël, voir Gn 33.18s ; 34 ; Jos 24.32 ; cf. 1R 12.16. –  Zeboul (v. 30), dont le nom rappelle celui de Zabulon, ne semble pas être un Ephraïmite.'
  - type: text
    content: 'Gaal, fils d''Ebed, dit : Qui est Abimélek, et qui est Sichem, pour que nous soyons soumis à Abimélek ? N''est-ce pas le fils de Yeroub-Baal ? Zeboul n''est-il pas son inspecteur ? Soumettez-vous aux hommes de Hamor, père de Sichem ; pourquoi, nous, serions-nous soumis à Abimélek ? '
  '29':
  - type: note
    content: 'ce peuple  : le terme correspondant est aussi traduit par troupe dans la suite du récit (v. 32s,38,42s,45,48s). –  il dit  : il faut peut-être comprendre il fit dire  ; LXX je dirai(s)  ; cf. v. 38. –  mets-toi en campagne  : litt. sors, cf. 2.15n.'
  - type: text
    content: 'Ah ! si ce peuple m''était confié ! J''écarterais Abimélek. Et il dit à Abimélek : Renforce ton armée, mets-toi en campagne !'
  '3':
  - type: note
    content: 'à tous  : litt. aux oreilles de tous. –  leur cœur inclina en faveur d’  : autre traduction prit parti pour, cf. 1R 2.28.'
  - type: text
    content: 'Les frères de sa mère dirent tout cela pour lui à tous les notables de Sichem ; leur cœur inclina en faveur d''Abimélek, car ils se disaient : C''est notre frère ! '
  '30':
  - type: text
    content: ' '
  - type: note
    content: V. 28n.
  - type: text
    content: 'Zeboul, gouverneur de la ville, apprit ce que disait Gaal, fils d''Ebed, et il se mit en colère. '
  '31':
  - type: note
    content: 'secrètement  : Zeboul joue double jeu (v. 36ss).'
  - type: text
    content: 'Il envoya secrètement des messagers à Abimélek, pour lui dire : Gaal, fils d''Ebed, et ses frères sont venus à Sichem et ils soulèvent la ville contre toi. '
  '32':
  - type: text
    content: 'Maintenant donc, lève-toi de nuit, avec ta troupe, et mets-toi en embuscade dans la campagne. '
  '33':
  - type: note
    content: 'fondras v. 44n. –  tu feras de lui…  : litt. tu lui feras ce que ta main trouvera.'
  - type: text
    content: Au matin, au lever du soleil, tu te lèveras et tu fondras sur la ville. Lorsque Gaal et sa troupe sortiront à ta rencontre, tu feras de lui ce que tu voudras.
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'bandes  : litt. têtes , de même aux v. 43s ; cf. 7.16+.'
  - type: text
    content: 'Abimélek et toute sa troupe se levèrent de nuit et se mirent en embuscade près de Sichem, en quatre bandes. '
  '35':
  - type: text
    content: 'Gaal, fils d''Ebed, sortit et se tint à l''entrée de la porte de la ville. Abimélek et toute sa troupe surgirent alors de l''embuscade. '
  '36':
  - type: note
    content: 'tu prends pour des hommes  : litt. tu vois comme des hommes.'
  - type: text
    content: 'Gaal aperçut la troupe et dit à Zeboul : Il y a une troupe qui descend du sommet des montagnes. Zeboul lui répondit : C''est l''ombre des montagnes que tu prends pour des hommes. '
  '37':
  - type: note
    content: du centre du pays ou, litt., du nombril de la terre, peut-être le nom d'une colline particulière ; sur l'expression, cf. Ez 38.12n. –  térébinthe des Devins ou, selon la traduction habituelle du terme, des chercheurs de présages  ; il s'agit peut-être du même arbre (ou du même lieu) que le térébinthe de Moré, Gn 12.6n  ; Dt 11.30.
  - type: text
    content: 'Gaal reprit : C''est bien une troupe qui descend du centre du pays, et une bande arrive par le chemin du térébinthe des Devins. '
  '38':
  - type: note
    content: 'tes beaux discours  : litt. ta bouche  ; cf. v. 28s.'
  - type: text
    content: 'Zeboul lui répondit : Où sont donc tes beaux discours, toi qui disais : « Qui est Abimélek, pour que nous lui soyons soumis ? » N''est-ce pas là la troupe que tu méprisais ? Maintenant tente une sortie, je te prie, engage le combat contre lui ! '
  '39':
  - type: text
    content: 'Gaal s''avança à la tête des notables de Sichem et engagea le combat contre Abimélek. '
  '4':
  - type: note
    content: 'soixante-dix sicles  : près de 700 g ; voir mesures, poids et monnaies. Le mot transcrit sicles est ici sous-entendu dans le texte. –  de la maison, c.-à-d. du temple. –  Baal-Berith 8.33n. –  Avec cette somme  : litt. avec eux. –  de rien  : litt. vides  ; cf. 11.3 ; 1S 22.2 ; 1R 11.24.'
  - type: text
    content: 'Ils lui donnèrent soixante-dix sicles d''argent de la maison de Baal-Berith. Avec cette somme, Abimélek embaucha des hommes de rien et des aventuriers, qui le suivirent. '
  '40':
  - type: note
    content: 'de la ville  : sous-entendu dans le texte ; cf. Dt 16.18n.'
  - type: text
    content: 'Poursuivi par Abimélek, il dut fuir pour lui échapper ; un grand nombre de victimes tombèrent jusqu''à l''entrée de la porte de la ville. '
  '41':
  - type: note
    content: 'Arouma  : probablement à une dizaine de kilomètres au sud-sud-est de Sichem.'
  - type: text
    content: Abimélek s'arrêta à Arouma. Zeboul chassa Gaal et ses frères, ceux-ci ne purent rester à Sichem.
  '42':
  - type: text
    content: ' '
  - type: note
    content: le peuple ou la troupe , v. 29n. Ici il s'agit sans doute moins d'une expédition militaire que d'une sortie pour s'occuper des récoltes, qui ne pouvaient attendre (cf. v. 27).
  - type: text
    content: 'Le lendemain, le peuple sortit dans la campagne. Abimélek en fut informé. '
  '43':
  - type: note
    content: la troupe ou le peuple, c.-à-d. ceux qui étaient avec lui (v. 34s). –  dans la campagne v. 27ss,32.
  - type: text
    content: 'Il prit la troupe, la partagea en trois bandes et se mit en embuscade dans la campagne. Quand il vit le peuple sortir de la ville, il se dressa contre eux et les battit. '
  '44':
  - type: note
    content: 'les bandes  : avec certains mss de LXX, quelques-uns modifient le texte hébreu traditionnel pour lire le singulier la bande (cf. v. 34n). –  se déployèrent et fondirent (v. 33) traduisent un même verbe hébreu. –  les deux bandes  : autre traduction les deux autres bandes.'
  - type: text
    content: 'Abimélek et les bandes qui étaient avec lui se déployèrent et se placèrent à l''entrée de la porte de la ville ; les deux bandes fondirent sur tous ceux qui étaient dans la campagne et les battirent. '
  '45':
  - type: note
    content: 'du sel  : symbole de stérilité et de malédiction Dt 29.22 ; Jr 17.6 ; Ps 107.34.'
  - type: text
    content: 'Abimélek combattit toute la journée contre la ville ; il prit la ville et tua les gens qui s''y trouvaient. Puis il démolit la ville et y sema du sel. '
  '46':
  - type: note
    content: 'citadelle de Sichem  : cf. v. 6n. –  la cave ou la crypte, traduction incertaine ; on a aussi pensé à une tour  ; le mot hébreu correspondant n''apparaît qu''ici, au v. 49 et en 1S 13.6. –  la maison du dieu Berith ou d''El-Berith ; du dieu de l''alliance (v. 4n  ; 8.33n  ; sur le nom divin El, voir Gn 21.33n), située de toute évidence hors de la ville (v. 27,45), peut-être sur les pentes du mont Ebal ou du mont Garizim (v. 48n).'
  - type: text
    content: 'A cette nouvelle, tous les notables de la citadelle de Sichem se rendirent dans la cave de la maison du dieu Berith. '
  '47':
  - type: text
    content: 'On informa Abimélek que tous les notables de la citadelle de Sichem s''étaient rassemblés. '
  '48':
  - type: note
    content: Tsalmôn (Sombre) est peut-être le nom d'un versant du mont Ebal ou du mont Garizim (Dt 11.29n  ; cf. Ps 68.15).
  - type: text
    content: 'Alors Abimélek monta au mont Tsalmôn avec toute sa troupe. Abimélek prit une hache, coupa une branche d''arbre et la chargea sur son épaule. Ensuite il dit à la troupe qui était avec lui : Vous avez vu ce que j''ai fait ; faites comme moi, dépêchez-vous. '
  '49':
  - type: note
    content: Cf. v. 20.
  - type: text
    content: Chaque homme de la troupe coupa une branche, et tous suivirent Abimélek ; ils placèrent les branches contre la cave et y mirent le feu, incendiant la cave avec ceux qui s'y trouvaient. Ainsi moururent tous les gens de la citadelle de Sichem, au nombre d'environ mille, hommes et femmes.
  - type: heading
    content: Mort d'Abimélek
  '5':
  - type: note
    content: 'Cf. v. 2,18,24,56 ; 2R 10.1-17 ; 11.1-3 ; Mt 2.16-18. –  à la maison de son père  : autre traduction dans sa famille.'
  - type: text
    content: 'Il se rendit à la maison de son père, à Ophra, et il tua ses frères, les fils de Yeroub-Baal, soixante-dix hommes, sur une même pierre. Il ne resta que Jotam, le plus jeune fils de Yeroub-Baal, car il s''était caché. '
  '50':
  - type: text
    content: ' '
  - type: note
    content: 'Tébets  : sans doute à une quinzaine de kilomètres au nord-est de Sichem, à moins qu''il ne s''agisse d''un autre nom de Tirtsa (1R 14.17n).'
  - type: text
    content: 'Abimélek marcha contre Tébets. Il dressa son camp contre Tébets et la prit. '
  '51':
  - type: note
    content: 'en terrasse  : sous-entendu dans le texte, cf. Dt 22.8n  ; autre traduction au sommet de la tour.'
  - type: text
    content: 'Il y avait au milieu de la ville une tour forte, où tous s''enfuirent, hommes et femmes, ainsi que tous les notables de la ville ; ils s''enfermèrent et montèrent sur le toit en terrasse de la tour. '
  '52':
  - type: note
    content: 'y mettre le feu  : litt. la brûler au feu  ; cf. Nb 31.10.'
  - type: text
    content: 'Abimélek parvint jusqu''à la tour ; il combattit contre elle et s''approcha de l''entrée de la tour pour y mettre le feu. '
  '53':
  - type: note
    content: 'une meule  : c.-à-d. la pierre supérieure et mobile d''un petit moulin domestique ; cf. 2S 11.21.'
  - type: text
    content: 'Alors une femme lança sur la tête d''Abimélek une meule de moulin et lui fracassa le crâne. '
  '54':
  - type: note
    content: 'le serviteur qui portait ses armes ou son écuyer  : cf. 1S 31.4 ; 1Ch 10.4. –  C''est une femme  : cf. 4.9+.'
  - type: text
    content: 'Aussitôt il appela le serviteur qui portait ses armes et lui dit : Tire ton épée et donne-moi la mort, de peur qu''on ne dise de moi : « C''est une femme qui l''a tué. » Son serviteur le transperça, et il mourut. '
  '55':
  - type: note
    content: 7.7n.
  - type: text
    content: Quand les hommes d'Israël virent qu'Abimélek était mort, ils s'en allèrent chacun chez soi.
  '56':
  - type: text
    content: ' '
  - type: note
    content: V. 5.
  - type: text
    content: 'Ainsi Dieu fit retomber sur Abimélek le mal qu''il avait fait à son père en tuant ses soixante-dix frères, '
  '57':
  - type: note
    content: 'V. 20. –  se réalisa  : litt. vint, arriva  ; expression analogue en 13.12,17 (cf. Jos 21.45n). – Voir bénédiction, malédiction.'
  - type: text
    content: et Dieu fit retomber sur la tête des gens de Sichem tout le mal qu'ils avaient fait. Ainsi se réalisa sur eux la malédiction de Jotam, fils de Yeroub-Baal.
  '6':
  - type: note
    content: La maison de Millo (ou du Terre-plein) est parfois identifiée à la citadelle de Sichem (v. 46-49) ; l'une des places fortifiées de Jérusalem portait le même nom ; cf. 2S 5.9n  ; 1R 9.15-24 ; 11.27 ; 2R 12.21 (Beth-Millo = maison de Millo). –  pierre dressée ou stèle, Jos 24.26 ; cf. Gn 12.6 ; 35.4.
  - type: text
    content: Tous les notables de Sichem et toute la maison de Millo se rassemblèrent pour aller investir Abimélek de la royauté près du térébinthe de la pierre dressée, à Sichem.
  - type: heading
    content: La fable de Jotam
  '7':
  - type: text
    content: ' '
  - type: note
    content: Le mont Garizim domine Sichem , cf. Dt 11.29n. –  Ecoutez et entende traduisent le même verbe hébreu.
  - type: text
    content: 'Jotam en fut informé. Il alla se placer au sommet du mont Garizim, et il leur cria :'
  - type: text
    content: Ecoutez-moi, notables de Sichem,
  - type: text
    content: et que Dieu vous entende !
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2R 14.9 ; Ez 17. –  conférer l''onction  : rite de sacre royal.'
  - type: text
    content: Les arbres s'en allèrent conférer l'onction à leur roi.
  - type: text
    content: 'Ils dirent à l''olivier :'
  - type: text
    content: Sois notre roi !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'les dieux ou Dieu , de même au v. 13 ; cf. Gn 1.1n  ; 3.5n  ; sur l''usage religieux et profane de l’ huile , voir Ex 30.23-38 ; Lv 2 ; 1S 10.1 ; 16.13 ; Ps 104.15 ; cf. Rm 11.17ss. D''après certains mss de LXX, quelques-uns modifient le texte hébreu traditionnel pour lire plus simplement que les dieux et les hommes apprécient (litt. glorifient ). –  autres  : sous-entendu dans le texte, de même dans la suite.'
  - type: text
    content: 'Mais l''olivier leur répondit :'
  - type: text
    content: Renoncerais-je à mon huile,
  - type: text
    content: ce que les dieux et les humains apprécient chez moi,
  - type: text
    content: pour aller me balancer au-dessus des autres arbres ?
