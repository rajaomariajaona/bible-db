      marker-yv: yv-n
    - type: text
      text: 'Ils lui donnèrent soixante-dix sicles d''argent de la maison de Baal-Berith. Avec cette somme, Abimélek embaucha des hommes de rien et des aventuriers, qui le suivirent. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.40 '
      - type: usfm
        marker: fq
