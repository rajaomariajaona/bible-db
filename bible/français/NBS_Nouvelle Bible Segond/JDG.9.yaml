          text: '  ; cf. v. 38. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mets-toi en campagne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: sors
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2.15'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Ah ! si ce peuple m''était confié ! J''écarterais Abimélek. Et il dit à Abimélek : Renforce ton armée, mets-toi en campagne !'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '9.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à tous
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux oreilles de tous
      - type: usfm
        marker: ft
        children:
        - type: text
