      marker-yv: yv-n
    - type: text
      text: 'Zeboul lui répondit : Où sont donc tes beaux discours, toi qui disais : « Qui est Abimélek, pour que nous lui soyons soumis ? » N''est-ce pas là la troupe que tu méprisais ? Maintenant tente une sortie, je te prie, engage le combat contre lui ! '
  '39':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'Gaal s''avança à la tête des notables de Sichem et engagea le combat contre Abimélek. '
