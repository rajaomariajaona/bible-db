        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Poursuivi par Abimélek, il dut fuir pour lui échapper ; un grand nombre de victimes tombèrent jusqu''à l''entrée de la porte de la ville. '
  '41':
  - type: usfm
    marker: p
    children:
