        children:
        - type: text
          text: chercheurs de présages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; il s''agit peut-être du même arbre (ou du même lieu) que le '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: térébinthe de Moré
      - type: usfm
        marker: ft
        children:
