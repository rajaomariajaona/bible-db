  '35':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '35'
    - type: text
      text: 'Si elles veulent apprendre quelque chose, qu''elles interrogent leur mari à la maison ; car il est choquant qu''une femme parle dans l''Eglise. '
  '36':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '36'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.36 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: C.-à-d. vous n'êtes ni la source ni les destinataires exclusifs de l'Evangile, vous n'êtes qu'une Eglise parmi d'autres (cf. 11.16+).
      marker-yv: yv-n
    - type: text
      text: Est-ce de chez vous que la parole de Dieu est sortie ? Ou bien est-ce à vous seuls qu'elle est parvenue ?
  '37':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '37'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.37 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: être spirituel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 12.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il reconnaisse
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 2Co 13.6 ; 1Jn 4.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'commandement du Seigneur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.10+ ; cf. Lc 10.16.
      marker-yv: yv-n
    - type: text
      text: 'Si quelqu''un se considère comme un prophète ou un être spirituel, qu''il reconnaisse dans ce que je vous écris un commandement du Seigneur. '
  '38':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '38'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.38 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si quelqu'un…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: si quelqu'un ne connaît pas, il n'est pas connu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; on a compris'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il n''est pas connu de Dieu ; l''Eglise ne le reconnaîtra pas '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (comme prophète ou inspiré, v. 37) ; certains mss portent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si quelqu''un veut l''ignorer, qu''il (l’)ignore '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (sous-entendu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: c'est son affaire, il aura été averti
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ) ; cf. 8.3+ ; 11.16.
      marker-yv: yv-n
    - type: text
      text: Et si quelqu'un ne le reconnaît pas, c'est qu'il n'est pas reconnu.
  '39':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '39'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.39 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aspirez à parler en prophètes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1+.
      marker-yv: yv-n
    - type: text
      text: 'Ainsi donc, mes frères, aspirez à parler en prophètes, sans empêcher qu''on parle en langues, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'construit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'édifie '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(10.23+) '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Eglise
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'assemblée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite ; cf. 14.12.'
      marker-yv: yv-n
    - type: text
      text: 'Celui qui parle en langue se construit lui-même ; celui qui parle en prophète construit l''Eglise. '
  '40':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '40'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.40 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. v. 33 ; 16.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'convenablement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '7.35'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 13.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'ordre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Col 2.5.
      marker-yv: yv-n
    - type: text
      text: mais que tout se fasse convenablement et dans l'ordre.
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'que vous parliez en prophètes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Nb 11.29. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'interprète '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 13,27s ; 12.10.
      marker-yv: yv-n
    - type: text
      text: Je veux bien que vous parliez tous en langues, mais je préfère encore que vous parliez en prophètes. Celui qui parle en prophète est plus grand que celui qui parle en langues, à moins que ce dernier n'interprète, pour que cela contribue à la construction de l'Eglise.
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'révélation '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 26,30 ; cf. 2Co 12.1,7. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'connaissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'enseignement '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 26.
      marker-yv: yv-n
    - type: text
      text: 'Et maintenant, mes frères, de quelle utilité vous serais-je si je venais à vous en parlant en langues au lieu de vous apporter une parole de révélation, de connaissance, de prophétie ou d''enseignement ? '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui produisent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui donnent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même dans la suite. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'lyre '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Ap 5.8+.
      marker-yv: yv-n
    - type: text
      text: 'Si des objets inanimés qui produisent un son, comme la flûte ou la lyre, ne produisent pas des sons distincts, comment reconnaîtra-t-on ce que joue la flûte ou la lyre ? '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Nb 10.
      marker-yv: yv-n
    - type: text
      text: 'Et si la trompette produit un son incertain, qui se préparera au combat ? '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.9 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en l'air
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 9.26.'
      marker-yv: yv-n
    - type: text
      text: 'De même, vous aussi, si par la langue vous ne produisez pas une parole significative, comment saura-t-on ce qui est dit ? Vous parlerez en l''air ! '
