document_id: 1CO.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Le culte chrétien et les gens du dehors
  - type: text
    content: ' '
  - type: note
    content: 'Poursuivez  : autre traduction recherchez , Rm 9.30n. –  l''amour 13.1-13. –  Aspirez 12.31n. –  pratiques spirituelles 12.1n. –  à celle qui consiste à parler en prophètes  : litt. pour que vous prophétisiez  ; v. 3,24s,29-32,39 ; 11.4s ; 12.10 ; 13.2 ; Ac 2.18+ ; 1Th 5.20.'
  - type: text
    content: Poursuivez l'amour. Aspirez aussi aux pratiques spirituelles, surtout à celle qui consiste à parler en prophètes.
  '10':
  - type: note
    content: 'langages  : le mot grec signifie aussi voix. –  aucun n''est dépourvu de sens  : autre traduction possible  : personne n''est sans langage.'
  - type: text
    content: 'Si nombreux que soient les divers langages du monde, aucun n''est dépourvu de sens ; '
  '11':
  - type: note
    content: 'le sens  : litt. la puissance. –  un barbare  : celui qui ne comprend pas le grec et dont la langue est incompréhensible pour un Grec (cf. Rm 1.14n).'
  - type: text
    content: 'si donc je ne connais pas le sens d''un langage, je serai un barbare pour celui qui le parle, et celui qui le parle sera un barbare pour moi. '
  '12':
  - type: note
    content: 'aspirez… v. 1-5 ; 12.31n. –  aux manifestations de l''Esprit  : litt. aux esprits (terme apparenté à celui qui est traduit par pratiques spirituelles au v. 1 ; 12.1n) ; autre traduction possible aux inspirations.'
  - type: text
    content: De même, vous aussi, puisque vous aspirez aux manifestations de l'Esprit, cherchez à y exceller, mais pour la construction de l'Eglise.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'V. 5+. –  qu''il lui soit donné…  : litt. pour qu''il interprète.'
  - type: text
    content: 'Que celui qui parle en langue prie donc pour qu''il lui soit donné d''interpréter. '
  '14':
  - type: note
    content: 'mon esprit  : autre traduction l''Esprit en moi, cf. Rm 8.16 ; Ga 6.18 ; Ph 4.23. –  mon intelligence  : autre traduction ma pensée.'
  - type: text
    content: 'Car si je prie en langue, mon esprit est en prière, mais mon intelligence demeure stérile. '
  '15':
  - type: note
    content: 'je chanterai  : le verbe grec est apparenté au mot traduit par cantique au v. 26n. –  de façon intelligible  : autre traduction par l''intelligence, cf. v. 14,19 ; Rm 1.28+.'
  - type: text
    content: 'Que faire alors ? Je prierai par l''Esprit, mais je prierai aussi de façon intelligible ; je chanterai par l''Esprit, mais je chanterai aussi de façon intelligible. '
  '16':
  - type: note
    content: 'si c''est…  : litt. si tu bénis en esprit, c.-à-d. par la seule inspiration. –  assis parmi les simples auditeurs  : litt. qui occupe la place du non-initié (même terme aux v. 23ns ; il est traduit par gens du peuple en Ac 4.13 et par profane en 2Co 11.6). –  Amen 2Co 1.20n  ; cf. 1Ch 16.36. –  il ne sait pas  : autre traduction il ne comprend pas.'
  - type: text
    content: 'En effet, si c''est par l''Esprit seulement que tu prononces la bénédiction, comment celui qui est assis parmi les simples auditeurs répondra-t-il «  '
  - type: text
    content: Amen !
  - type: text
    content: '  » à ton action de grâces, puisqu''il ne sait pas ce que tu dis ? '
  '17':
  - type: text
    content: Toi, certes, tu prononces de belles actions de grâces, mais cela n'est pas constructif pour l'autre.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Je rends grâce 1.14.
  - type: text
    content: 'Je rends grâce à Dieu de ce que je parle en langues plus que vous tous ; '
  '19':
  - type: note
    content: 'instruire  : même verbe en Rm 2.18 ; Ga 6.6 (enseigner).'
  - type: text
    content: mais, dans l'Eglise, je préfère dire cinq paroles avec mon intelligence, pour instruire les autres, plutôt que dix mille paroles en langue.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'en langue  : cf. 12.10+ ; l''usage du singulier et du pluriel, ici et dans la suite, correspond à l''original. –  à Dieu v. 28 ; cf. 2Co 5.13. –  comprend  : le verbe signifie aussi entendre, écouter . –  mystères 2.1+.'
  - type: text
    content: 'En effet, celui qui parle en langue ne parle pas aux humains, mais à Dieu, car personne ne le comprend, et c''est en esprit qu''il dit des mystères. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 13.11 ; Jr 4.22 ; Mt 18.3s/ / ; Rm 16.19. –  mal  : le même terme a été traduit par malfaisance en 5.8 ; Rm 1.29 ; Ep 4.31 ; Col 3.8 etc. –  des adultes ou des hommes faits  : le même mot a été traduit ailleurs par accompli ou parfait , 2.6n  ; 13.10n  ; Mt 5.48+ ; cf. Ep 4.13s ; Ph 3.15.'
  - type: text
    content: 'Mes frères, ne soyez pas des enfants pour ce qui est du jugement ; pour ce qui est du mal, soyez des enfants, mais pour ce qui est du jugement, soyez des adultes. '
  '21':
  - type: note
    content: Es 28.11s. –  écrit dans la loi 9.9 ; Lc 2.23 ; 10.26 ; Ac 24.14.
  - type: text
    content: 'Il est écrit dans la loi :'
  - type: text
    content: C'est par des gens d'une autre langue
  - type: text
    content: et par des lèvres d'étrangers
  - type: text
    content: que je parlerai à ce peuple,
  - type: text
    content: et même
  - type: text
    content: ' ainsi '
  - type: text
    content: ils ne
  - type: text
    content: ' m’'
  - type: text
    content: écouteront pas,
  - type: text
    content: ' dit le Seigneur.'
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'un signe  : le terme pourrait être compris au sens de signe de condamnation , révélant l''incrédulité (cf. v. 23) ; Mt 12.39. –  le message de prophète  : litt. la prophétie , comme au v. 6. Autre traduction le message de prophète n''est pas pour les non-croyants, mais pour les croyants.'
  - type: text
    content: 'Par conséquent, les langues sont un signe, non pas pour les croyants, mais pour les non-croyants ; le message de prophète, au contraire, est un signe, non pas pour les non-croyants, mais pour les croyants. '
  '23':
  - type: note
    content: 'Admettons  : litt. si donc. –  l''Eglise… se rassemble 11.20. –  simples auditeurs v. 16n  : il s''agit ici de gens extérieurs à l''Eglise. –  fous  : cf. Ac 2.13.'
  - type: text
    content: 'Admettons que l''Eglise entière se rassemble et que tous parlent en langues ; s''il survient de simples auditeurs ou des non-croyants, ne diront-ils pas que vous êtes fous ? '
  '24':
  - type: note
    content: Cf. 2.15 ; Jn 16.8ss ; Ac 2.34-37 ; Ep 5.13. –  jugé 2.14n.
  - type: text
    content: 'En revanche, si tous parlent en prophètes et qu''il survienne un non-croyant ou un simple auditeur, il est confondu par tous, il est jugé par tous ; '
  '25':
  - type: note
    content: 'les secrets de son cœur…  : cf. 4.5 ; Dn 2.47 ; Jn 4.19 ; 2Co 4.2 ; 1Th 2.4. –  tombant… 1R 18.39. –  il adorera Dieu ou il se prosternera devant Dieu, cf. Mt 2.2n  ; 4.10 ; voir culte. –  Dieu est réellement… Es 45.14  ; 61.9 ; Za 8.23.'
  - type: text
    content: 'les secrets de son cœur deviennent manifestes. Alors, tombant face contre terre, il adorera Dieu en déclarant : '
  - type: text
    content: Dieu est réellement parmi vous !
  - type: heading
    content: L'ordre dans les assemblées
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'Lorsque vous vous réunissez 11.18. –  un cantique  : le même mot est traduit par psaume(s) en Lc 20.42 ; 24.44 ; Ac 1.20 ; 13.33 ; il s''agit ici d''un chant chrétien, cf. v. 15n  ; Ep 5.19 ; Col 3.16. –  un enseignement… v. 6 ; 12.7-10. –  constructif 10.23+ ; cf. Ep 4.12.'
  - type: text
    content: 'Que faire alors, mes frères ? Lorsque vous vous réunissez, chacun ayant un cantique, un enseignement, une révélation, une langue, une interprétation, que tout soit constructif. '
  '27':
  - type: note
    content: 'deux ou trois fois  : litt. deux ou trois, cf. v. 29-31. Autre traduction si quelqu''un parle en langue, deux ou trois tout au plus, et à tour de rôle. –  qu''il y ait aussi…  : autre traduction qu''un seul interprète v. 5+.'
  - type: text
    content: 'Si l''on parle en langue – deux ou trois fois tout au plus, et à la suite – qu''il y ait aussi quelqu''un qui interprète. '
  '28':
  - type: note
    content: V. 2.
  - type: text
    content: 'S''il n''y a pas d''interprète, qu''on se taise dans l''Eglise, qu''on parle pour soi-même et pour Dieu. '
  '29':
  - type: note
    content: 'Cf. v. 27. –  jugent  : litt. discernent, voir 11.31n  ; cf. 12.10 ; Ac 17.11 ; 1Th 5.19-21.'
  - type: text
    content: 'Quant aux prophètes, que deux ou trois parlent, et que les autres jugent. '
  '3':
  - type: note
    content: 'Cf. Ac 9.31 ; Rm 12.8 ; 1Th 2.12. –  il construit  : autres traductions il est constructif, il édifie 3.9n  ; 8.1n. –  encourage ou exhorte v. 31 ; 1.10+ ; Rm 12.8n  ; 1Th 2.3n. –  réconforte  : cf. Ph 2.1 ; 1Th 2.12+.'
  - type: text
    content: 'Celui qui parle en prophète, au contraire, parle aux humains : il construit, il encourage, il réconforte. '
  '30':
  - type: note
    content: 'assistant  : litt. assis. –  révélation v. 6.'
  - type: text
    content: 'Si un autre assistant a une révélation, que le premier se taise. '
  '31':
  - type: note
    content: 'vous pouvez  : cf. v. 32. –  encouragés ou exhortés.'
  - type: text
    content: 'En effet, vous pouvez tous parler en prophètes, un par un, pour que tous soient instruits et encouragés. '
  '32':
  - type: note
    content: 'Les esprits des prophètes  : cf. Ap 22.6 ; voir aussi 2P 1.21 ; on peut comprendre ici les prophètes sont maîtres de leur inspiration (cf. v. 31,33).'
  - type: text
    content: 'Les esprits des prophètes sont soumis aux prophètes, '
  '33':
  - type: note
    content: 'V. 40. –  un Dieu  : sous-entendu dans le texte. –  de paix Rm 15.33+. –  dans toutes les Eglises 4.17+. –  des saints 1.2+.'
  - type: text
    content: car Dieu n'est pas un Dieu de désordre, mais un Dieu de paix.
  - type: text
    content: 'Comme dans toutes les Eglises des saints, '
  '34':
  - type: note
    content: 'Certains mss placent les v. 34 et 35 après le v. 40 ; cf. 11.3-5 ; Ph 4.2s ; voir aussi Ep 5.22-24 ; 1Tm 2.11-15 ; Tt 2.5 ; 1P 3.1,5. –  dans les Eglises (comme au v. 33) ou dans les assemblées, cf. 11.18n. –  comme le dit aussi la loi  : cf. Gn 3.16.'
  - type: text
    content: 'que les femmes se taisent dans les Eglises, car il ne leur est pas permis d''y parler ; qu''elles soient soumises, comme le dit aussi la loi. '
  '35':
  - type: text
    content: 'Si elles veulent apprendre quelque chose, qu''elles interrogent leur mari à la maison ; car il est choquant qu''une femme parle dans l''Eglise. '
  '36':
  - type: note
    content: C.-à-d. vous n'êtes ni la source ni les destinataires exclusifs de l'Evangile, vous n'êtes qu'une Eglise parmi d'autres (cf. 11.16+).
  - type: text
    content: Est-ce de chez vous que la parole de Dieu est sortie ? Ou bien est-ce à vous seuls qu'elle est parvenue ?
  '37':
  - type: text
    content: ' '
  - type: note
    content: 'être spirituel , cf. 12.1n. –  qu''il reconnaisse  : cf. 2Co 13.6 ; 1Jn 4.6. –  commandement du Seigneur 7.10+ ; cf. Lc 10.16.'
  - type: text
    content: 'Si quelqu''un se considère comme un prophète ou un être spirituel, qu''il reconnaisse dans ce que je vous écris un commandement du Seigneur. '
  '38':
  - type: note
    content: 'si quelqu''un…  : litt. si quelqu''un ne connaît pas, il n''est pas connu  ; on a compris  : il n''est pas connu de Dieu ; l''Eglise ne le reconnaîtra pas (comme prophète ou inspiré, v. 37) ; certains mss portent  : si quelqu''un veut l''ignorer, qu''il (l’)ignore (sous-entendu  : c''est son affaire, il aura été averti) ; cf. 8.3+ ; 11.16.'
  - type: text
    content: Et si quelqu'un ne le reconnaît pas, c'est qu'il n'est pas reconnu.
  '39':
  - type: text
    content: ' '
  - type: note
    content: aspirez à parler en prophètes v. 1+.
  - type: text
    content: 'Ainsi donc, mes frères, aspirez à parler en prophètes, sans empêcher qu''on parle en langues, '
  '4':
  - type: note
    content: construit ou édifie (10.23+) l'Eglise ou l'assemblée, de même dans la suite ; cf. 14.12.
  - type: text
    content: 'Celui qui parle en langue se construit lui-même ; celui qui parle en prophète construit l''Eglise. '
  '40':
  - type: note
    content: Cf. v. 33 ; 16.14. –  convenablement 7.35n  ; 13.5n. –  ordre Col 2.5.
  - type: text
    content: mais que tout se fasse convenablement et dans l'ordre.
  '5':
  - type: note
    content: que vous parliez en prophètes Nb 11.29. –  interprète v. 13,27s ; 12.10.
  - type: text
    content: Je veux bien que vous parliez tous en langues, mais je préfère encore que vous parliez en prophètes. Celui qui parle en prophète est plus grand que celui qui parle en langues, à moins que ce dernier n'interprète, pour que cela contribue à la construction de l'Eglise.
  '6':
  - type: text
    content: ' '
  - type: note
    content: révélation v. 26,30 ; cf. 2Co 12.1,7. –  connaissance 12.8. –  enseignement v. 26.
  - type: text
    content: 'Et maintenant, mes frères, de quelle utilité vous serais-je si je venais à vous en parlant en langues au lieu de vous apporter une parole de révélation, de connaissance, de prophétie ou d''enseignement ? '
  '7':
  - type: note
    content: 'qui produisent  : litt. qui donnent, de même dans la suite. –  lyre Ap 5.8+.'
  - type: text
    content: 'Si des objets inanimés qui produisent un son, comme la flûte ou la lyre, ne produisent pas des sons distincts, comment reconnaîtra-t-on ce que joue la flûte ou la lyre ? '
  '8':
  - type: note
    content: Cf. Nb 10.
  - type: text
    content: 'Et si la trompette produit un son incertain, qui se préparera au combat ? '
  '9':
  - type: note
    content: 'en l''air  : cf. 9.26.'
  - type: text
    content: 'De même, vous aussi, si par la langue vous ne produisez pas une parole significative, comment saura-t-on ce qui est dit ? Vous parlerez en l''air ! '
