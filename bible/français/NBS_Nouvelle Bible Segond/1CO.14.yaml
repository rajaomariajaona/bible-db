        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'l''amour '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.1-13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Aspirez '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pratiques spirituelles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.1'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à celle qui consiste à parler en '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prophètes
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour que vous prophétisiez
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; v. 3,24s,29-32,39 ; 11.4s ; 12.10 ; 13.2 ; Ac 2.18+ ; 1Th 5.20.
      marker-yv: yv-n
    - type: text
      text: Poursuivez l'amour. Aspirez aussi aux pratiques spirituelles, surtout à celle qui consiste à parler en prophètes.
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: langages
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: voix
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aucun n'est dépourvu de sens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: personne n'est sans langage.
      marker-yv: yv-n
    - type: text
      text: 'Si nombreux que soient les divers langages du monde, aucun n''est dépourvu de sens ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.11 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le sens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la puissance
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un barbare
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : celui qui ne comprend pas le grec et dont la langue est incompréhensible pour un Grec (cf. Rm 1.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'si donc je ne connais pas le sens d''un langage, je serai un barbare pour celui qui le parle, et celui qui le parle sera un barbare pour moi. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aspirez… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 1-5 ; 12.31
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'aux manifestations de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'aux esprits '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(terme apparenté à celui qui est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'pratiques spirituelles '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 1 ; 12.1
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ') ; autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: aux inspirations.
      marker-yv: yv-n
    - type: text
      text: De même, vous aussi, puisque vous aspirez aux manifestations de l'Esprit, cherchez à y exceller, mais pour la construction de l'Eglise.
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.13 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'V. 5+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qu'il lui soit donné…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour qu'il interprète.
      marker-yv: yv-n
    - type: text
      text: 'Que celui qui parle en langue prie donc pour qu''il lui soit donné d''interpréter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'Esprit en moi
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Rm 8.16 ; Ga 6.18 ; Ph 4.23. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mon intelligence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ma pensée.
      marker-yv: yv-n
    - type: text
      text: 'Car si je prie en langue, mon esprit est en prière, mais mon intelligence demeure stérile. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: je chanterai
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le verbe grec est apparenté au mot traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cantique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: au v. 26
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de façon intelligible
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: par l'intelligence
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. v. 14,19 ; Rm 1.28+.'
      marker-yv: yv-n
    - type: text
      text: 'Que faire alors ? Je prierai par l''Esprit, mais je prierai aussi de façon intelligible ; je chanterai par l''Esprit, mais je chanterai aussi de façon intelligible. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: si c'est…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'si tu '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénis
        - type: text
          text: ' en esprit'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. par la seule inspiration. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: assis parmi les simples auditeurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui occupe la place du non-initié '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (même terme aux v. 23
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: 's ; il est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'gens du peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Ac 4.13 et par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'profane '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 2Co 11.6). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Amen '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2Co 1.20
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 1Ch 16.36. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il ne sait pas
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: il ne comprend pas.
      marker-yv: yv-n
    - type: text
      text: 'En effet, si c''est par l''Esprit seulement que tu prononces la bénédiction, comment celui qui est assis parmi les simples auditeurs répondra-t-il «  '
    - type: usfm
      marker: it
      children:
      - type: text
        text: Amen !
    - type: text
      text: '  » à ton action de grâces, puisqu''il ne sait pas ce que tu dis ? '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: text
      text: Toi, certes, tu prononces de belles actions de grâces, mais cela n'est pas constructif pour l'autre.
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Je rends '
        - type: usfm
          marker: w
          children:
          - type: text
            text: grâce
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1.14.
      marker-yv: yv-n
    - type: text
      text: 'Je rends grâce à Dieu de ce que je parle en langues plus que vous tous ; '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: instruire
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même verbe en Rm 2.18 ; Ga 6.6 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enseigner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: mais, dans l'Eglise, je préfère dire cinq paroles avec mon intelligence, pour instruire les autres, plutôt que dix mille paroles en langue.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: en langue
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 12.10+ ; l''usage du singulier et du pluriel, ici et dans la suite, correspond à l''original. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'à Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'v. 28 ; cf. 2Co 5.13. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: comprend
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le verbe signifie aussi '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entendre, écouter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'mystères '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 2.1+.
      marker-yv: yv-n
    - type: text
      text: 'En effet, celui qui parle en langue ne parle pas aux humains, mais à Dieu, car personne ne le comprend, et c''est en esprit qu''il dit des mystères. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.20 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 13.11 ; Jr 4.22 ; Mt 18.3s/ / ; Rm 16.19. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: mal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même terme a été traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'malfaisance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en 5.8 ; Rm 1.29 ; Ep 4.31 ; Col 3.8 etc. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'des adultes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: des hommes faits
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le même mot a été traduit ailleurs par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'accompli '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: parfait
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', 2.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 13.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Mt 5.48+ ; cf. Ep 4.13s ; Ph 3.15.'
      marker-yv: yv-n
    - type: text
      text: 'Mes frères, ne soyez pas des enfants pour ce qui est du jugement ; pour ce qui est du mal, soyez des enfants, mais pour ce qui est du jugement, soyez des adultes. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.21 '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Es 28.11s
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'écrit dans la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: loi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 9.9 ; Lc 2.23 ; 10.26 ; Ac 24.14.
      marker-yv: yv-n
    - type: text
      text: 'Il est écrit dans la loi :'
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: C'est par des gens d'une autre langue
  - type: usfm
    marker: q1
    children:
    - type: usfm
      marker: it
      children:
      - type: text
        text: et par des lèvres d'étrangers
  - type: usfm
