document_id: PSA.14,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les fidèles et leur Dieu dans un monde corrompu
    marker-yv: yv-h
  - type: usfm
    marker: d
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.1 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Ps 53. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: se dit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'dit en son '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas de Dieu '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 10.4+.
      marker-yv: yv-n
    - type: text
      text: Du chef de chœur. De David.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le fou se dit : Il n''y a pas de Dieu !'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Ils se sont pervertis, ils se sont livrés à des agissements abominables ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'en est pas un qui agisse bien.
  '2':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 11.4+ ; cf. Gn 11.5.
      marker-yv: yv-n
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', du ciel, se penche sur les êtres humains,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour voir s'il y a quelqu'un qui ait du bon sens,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: qui cherche Dieu.
  '3':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'A la fin du v., plusieurs mss de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' et '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Vg
        - type: text
          text: ', et même deux mss hébreux, reconstituent l''ensemble de la citation faite par Paul en '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Rm 3.10-18 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: (citation d'abord formée de textes épars comme Ps 5.10 ; 10.7 ; 36.2 ; 50.19 ; 140.4 ; Es 59.7s ; Pr 1.16 ; 6.18).
      marker-yv: yv-n
    - type: text
      text: Tous se sont égarés, ensemble ils se sont corrompus ;
  - type: usfm
    marker: q1
    children:
    - type: text
      text: il n'en est pas un qui agisse bien,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pas même un seul.
  '4':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'malfaisants '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pas de connaissance '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '79.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dévorent mon peuple '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 79.7 ; Jr 2.3+ ; Mi 3.3.
      marker-yv: yv-n
    - type: text
      text: Tous les malfaisants n'ont-ils pas de connaissance ?
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Eux qui dévorent mon peuple comme on dévore du pain,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'ils n''invoquent pas le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: .
  '5':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.5 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'frayeur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '48.6s ; LXX '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils seront saisis de peur, là où il n'y avait pas de (motif de ?) peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; cf. 53.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'la '
        - type: usfm
          marker: w
          children:
          - type: text
            text: génération
        - type: text
          text: ' des justes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'la génération '
        - type: usfm
          marker: w
          children:
          - type: text
            text: juste
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 73.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi 46.6.'
      marker-yv: yv-n
    - type: text
      text: C'est là qu'ils seront saisis de frayeur,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: car Dieu est parmi la génération des justes.
  '6':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'son abri '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 7.2+ ; 46.2.
      marker-yv: yv-n
    - type: text
      text: Vous faites tourner à sa honte les projets du pauvre.
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' est son abri.'
  '7':
  - type: usfm
    marker: q1
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '14.7 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Ah ! si de Sion…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'qui fera venir de Sion le salut d''Israël ? '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'cf. 2.6+ ; 20.3 ; 110.2 ; 128.5 ; 133.3 ; 134.3 ; voir aussi 118.26 ; Rm 11.26. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: rétablira la situation de son peuple
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 85.2 ; 126.1-4 ; Dt 30.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Jr 29.14'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Os 6.11 ; Jb 42.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Lm 2.14. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jacob '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '/ '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Israël
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Gn 32.29'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Ah ! si de Sion venait le salut d'Israël !
  - type: usfm
    marker: q1
    children:
    - type: text
      text: 'Quand le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' rétablira la situation de son peuple,'
  - type: usfm
    marker: q1
    children:
    - type: text
      text: Jacob sera dans l'allégresse, Israël se réjouira.
