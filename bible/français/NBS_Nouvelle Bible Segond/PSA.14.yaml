document_id: PSA.14,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les fidèles et leur Dieu dans un monde corrompu
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ps 53. –  se dit  : litt. dit en son cœur. –  pas de Dieu 10.4+.'
  - type: text
    content: Du chef de chœur. De David.
  - type: text
    content: 'Le fou se dit : Il n''y a pas de Dieu !'
  - type: text
    content: Ils se sont pervertis, ils se sont livrés à des agissements abominables ;
  - type: text
    content: il n'en est pas un qui agisse bien.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 11.4+ ; cf. Gn 11.5.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', du ciel, se penche sur les êtres humains,'
  - type: text
    content: pour voir s'il y a quelqu'un qui ait du bon sens,
  - type: text
    content: qui cherche Dieu.
  '3':
  - type: text
    content: ' '
  - type: note
    content: A la fin du v., plusieurs mss de LXX et Vg, et même deux mss hébreux, reconstituent l'ensemble de la citation faite par Paul en Rm 3.10-18 (citation d'abord formée de textes épars comme Ps 5.10 ; 10.7 ; 36.2 ; 50.19 ; 140.4 ; Es 59.7s ; Pr 1.16 ; 6.18).
  - type: text
    content: Tous se sont égarés, ensemble ils se sont corrompus ;
  - type: text
    content: il n'en est pas un qui agisse bien,
  - type: text
    content: pas même un seul.
  '4':
  - type: text
    content: ' '
  - type: note
    content: malfaisants 5.6n. –  pas de connaissance 79.6. –  dévorent mon peuple 79.7 ; Jr 2.3+ ; Mi 3.3.
  - type: text
    content: Tous les malfaisants n'ont-ils pas de connaissance ?
  - type: text
    content: Eux qui dévorent mon peuple comme on dévore du pain,
  - type: text
    content: 'ils n''invoquent pas le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'frayeur 48.6s ; LXX ils seront saisis de peur, là où il n''y avait pas de (motif de ?) peur  ; cf. 53.6. –  la génération des justes  : litt. la génération juste  ; cf. 73.15n  ; voir aussi 46.6.'
  - type: text
    content: C'est là qu'ils seront saisis de frayeur,
  - type: text
    content: car Dieu est parmi la génération des justes.
  '6':
  - type: text
    content: ' '
  - type: note
    content: son abri 7.2+ ; 46.2.
  - type: text
    content: Vous faites tourner à sa honte les projets du pauvre.
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est son abri.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Ah ! si de Sion…  : autre traduction qui fera venir de Sion le salut d''Israël ? cf. 2.6+ ; 20.3 ; 110.2 ; 128.5 ; 133.3 ; 134.3 ; voir aussi 118.26 ; Rm 11.26. –  rétablira la situation de son peuple  : cf. 85.2 ; 126.1-4 ; Dt 30.3n  ; Jr 29.14n  ; Os 6.11 ; Jb 42.10n  ; Lm 2.14. –  Jacob / Israël  : cf. Gn 32.29n.'
  - type: text
    content: Ah ! si de Sion venait le salut d'Israël !
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ' rétablira la situation de son peuple,'
  - type: text
    content: Jacob sera dans l'allégresse, Israël se réjouira.
