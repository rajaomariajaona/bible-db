document_id: DEU.6,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Tu aimeras le Seigneur, ton Dieu
  - type: text
    content: ' '
  - type: note
    content: '1.21+. –  commandement / prescriptions…  : voir loi.'
  - type: text
    content: 'Voici le commandement, les prescriptions et les règles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, a ordonné de vous apprendre, afin que vous les mettiez en pratique dans le pays vers lequel vous passez pour en prendre possession, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: '1.8+,25+. –  avec  : sous-entendu dans le texte. –  que tu n''as pas bâties  : cf. 19.1.'
  - type: text
    content: 'Quand le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te fera entrer dans le pays qu''il a juré à tes pères, Abraham, Isaac et Jacob, de te donner, avec de grandes et bonnes villes que tu n''as pas bâties, '
  '11':
  - type: note
    content: Cf. 8.7-14 ; 11.15 ; 31.20.
  - type: text
    content: 'des maisons pleines de toutes sortes de biens, que tu n''as pas remplies, des citernes creusées, que tu n''as pas creusées, des vignes et des oliviers que tu n''as pas plantés ; lorsque tu mangeras et que tu seras rassasié, '
  '12':
  - type: note
    content: oublier le Seigneur 4.9+ ; Pr 30.8s. –  qui t'a fait sortir… 5.6+.
  - type: text
    content: 'garde-toi d''oublier le '
  - type: text
    content: Seigneur
  - type: text
    content: ', qui t''a fait sortir de l''Egypte, de la maison des esclaves. '
  '13':
  - type: note
    content: 10.20. –  craindras 4.10+. –  c'est lui… Mt 4.10/ /. – Voir nom.
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), ton Dieu, que tu craindras, c''est lui que tu serviras et c''est par son nom que tu jureras. '
  '14':
  - type: note
    content: 'Vous ne suivrez pas  : litt. vous ne marcherez pas derrière (le dernier mot est apparenté à celui qui est traduit par autres) ; autre traduction vous n''irez pas après  ; cf. 8.19 ; 11.28 ; 13.3,7s,14 ; 28.14,64 ; 29.25 ; 32.17 ; Ex 20.3+ ; Lv 19.4 ; Jr 7.6+ ; Os 2.7n.'
  - type: text
    content: 'Vous ne suivrez pas d''autres dieux, d''entre les dieux des peuples qui vous entourent ; '
  '15':
  - type: note
    content: 'en ton sein  : cf. 4.7. –  Dieu (hébreu ’El, Gn 21.33n) à la passion jalouse 4.24+. –  il te ferait disparaître  : sous-entendu dans le texte. –  de la terre  : cf. Gn 2.5n.'
  - type: text
    content: 'car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, qui est en ton sein, est un Dieu à la passion jalouse. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, se mettrait en colère contre toi : il te détruirait, il te ferait disparaître de la terre. '
  '16':
  - type: note
    content: Mt 4.7/ /. –  Massa 9.22 ; 33.8 ; Ex 17.1-7n.
  - type: text
    content: 'Vous ne provoquerez pas le '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, comme vous l''avez provoqué à Massa (« Provocation »). '
  '17':
  - type: note
    content: préceptes 4.45n.
  - type: text
    content: 'Vous observerez les commandements du '
  - type: text
    content: Seigneur
  - type: text
    content: ', votre Dieu, ses préceptes et ses prescriptions, tels qu''il les a institués pour toi. '
  '18':
  - type: note
    content: 'ce qui convient…  : litt. ce qui est droit et bien aux yeux de YHWH, cf. 12.25,28 ; 13.19 ; 21.9 ; Ex 15.26 ; 1R 11.33 ; 14.8 ; Jr 34.15. –  heureux 4.40n. –  bon pays 1.25+. –  a promis par serment  : le verbe hébreu correspondant est traduit par jurer au v. 10 ; cf. v. 23 ; 1.8+.'
  - type: text
    content: 'Tu feras ce qui convient au '
  - type: text
    content: Seigneur
  - type: text
    content: ', ce qui lui plaît, afin que tu sois heureux et que tu entres en possession du bon pays que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a promis par serment à tes pères, '
  '19':
  - type: text
    content: 'pour repousser tous tes ennemis devant toi, comme le '
  - type: text
    content: Seigneur
  - type: text
    content: ' l''a dit.'
  '2':
  - type: note
    content: 'craignes 4.10+. –  que j''institue  : cf. 4.2n. –  se prolongent 4.26+.'
  - type: text
    content: 'afin que tu craignes le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, en observant, tous les jours de ta vie, toi, ton fils et le fils de ton fils, toutes ses prescriptions et tous ses commandements, ceux que j''institue pour toi, et que tes jours se prolongent. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Ex 10.2+.
  - type: text
    content: 'Lorsque, demain, ton fils te demandera : « Que signifient ces préceptes, ces prescriptions et ces règles que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, a institués pour vous ? », '
  '21':
  - type: note
    content: 5.15+ ; cf. 26.5. –  d'une main forte 3.24+.
  - type: text
    content: 'tu diras à ton fils : « Nous étions esclaves du pharaon en Egypte, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a fait sortir d''Egypte d''une main forte. '
  '22':
  - type: note
    content: '4.34+. –  terribles  : litt. mauvais.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a produit, sous nos yeux, des signes et des prodiges grands et terribles contre l''Egypte, contre le pharaon et contre toute sa maison ; '
  '23':
  - type: note
    content: 'il nous a fait sortir v. 12. –  pour nous faire entrer…  : litt. pour nous faire entrer (ou nous amener) pour nous donner le pays… –  qu''il avait promis par serment  : cf. v. 18n.'
  - type: text
    content: 'il nous a fait sortir de là pour nous faire entrer dans le pays qu''il avait promis par serment à nos pères, afin de nous le donner. '
  '24':
  - type: note
    content: 'craindre 4.10+. –  toujours  : litt. tous les jours. –  heureux 4.40n. –  voilà pourquoi 2.30n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a ordonné de mettre en pratique toutes ces prescriptions et de craindre le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, afin que nous soyons toujours heureux et qu''il nous garde en vie – voilà pourquoi il en est ainsi en ce jour. '
  '25':
  - type: note
    content: 'Pour nous, ce sera justice…  : autre traduction ce sera notre justice  ; même formule en 24.13 ; cf. 9.4-6 ; 16.20 ; Gn 15.6 ; Rm 4 ; 10.5. –  veiller à mettre en pratique  : comme en 5.1+. –  tout ce commandement 5.31+.'
  - type: text
    content: 'Pour nous, ce sera justice que de veiller à mettre en pratique tout ce commandement devant le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, comme il nous l''a ordonné. »'
  '3':
  - type: note
    content: tu veilleras à mettre en pratique 5.1n. –  heureux 4.40n. –  le Dieu de tes pères 1.11+. –  dans (sous-entendu dans le texte) ce pays ruisselant… 11.9+.
  - type: text
    content: 'Tu écouteras donc, Israël, et tu veilleras à mettre en pratique, afin que tu sois heureux, que vous vous multipliiez et deveniez très nombreux, comme te l''a dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu de tes pères, dans ce pays ruisselant de lait et de miel.'
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Les v. 4-9 constituent avec 11.13-21 et Nb 15.37-41 la profession de foi traditionnelle du judaïsme, connue d''après ses premiers mots comme le Shema‘ Yisrael ( Ecoute, Israël  : cf. 4.1+ ; Mc 12.29 ). Les dernières lettres du premier et du dernier mot de ce v. sont plus grandes que les autres dans les mss traditionnels ; elles forment le mot habituellement traduit par témoin (cf. Gn 1.1n). –  Le Seigneur, notre Dieu…  : litt. YHWH (est) notre Dieu, YHWH (est) un (voir Ex 3.15n) ; cf. Dt 4.35,39 ; 12.2-12 ; Za 14.9 ; 1Co 8.4 ; Jc 2.19 ; voir noms divins.'
  - type: text
    content: 'Ecoute, Israël ! Le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' est un. '
  '5':
  - type: note
    content: 10.12 ; 30.6 ; Mt 22.37/ /. –  Tu aimeras 5.10+. –  de tout ton cœur, de toute ton âme (cf. Gn 1.20n) 4.29+.
  - type: text
    content: 'Tu aimeras le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, de tout ton cœur, de toute ton âme et de toute ta force. '
  '6':
  - type: note
    content: sur ton cœur 4.39n  ; 11.18 ; Jr 31.33.
  - type: text
    content: 'Ces paroles que j''institue pour toi aujourd''hui seront sur ton cœur. '
  '7':
  - type: note
    content: 'inculqueras  : la traduction de la forme verbale qui apparaît ici est incertaine ; il faut sans doute la rapprocher de celle qui signifie aiguiser (32.41) ; certains y voient l''idée de répétition ; cf. Ex 10.2+. –  chez toi  : litt. assis dans ta maison, cf. 11.19.'
  - type: text
    content: 'Tu les inculqueras à tes fils et tu en parleras quand tu seras chez toi et quand tu seras en chemin, quand tu te coucheras et quand tu te lèveras. '
  '8':
  - type: note
    content: Ex 13.9+ ; d'où la pratique juive (plus récente) consistant à attacher sur le bras gauche et sur le front, pour la prière, des boîtes en cuir (les phylactères de Mt 23.5) contenant des textes de la loi. –  fronteau Ex 13.16n.
  - type: text
    content: 'Tu les attacheras comme un signe sur ta main, et elles seront un fronteau entre tes yeux. '
  '9':
  - type: note
    content: '11.20. –  les montants de la porte  : hébreu mezouzoth, nom encore donné à la petite boîte fixée sur le montant de la porte d''entrée des maisons juives et contenant une copie de Dt 6.4-9 ; 11.13-21. –  aux portes de tes villes  : litt. à tes portes.'
  - type: text
    content: Tu les écriras sur les montants de la porte de ta maison et aux portes de tes villes.
  - type: heading
    content: Israël ne doit pas oublier son Dieu
