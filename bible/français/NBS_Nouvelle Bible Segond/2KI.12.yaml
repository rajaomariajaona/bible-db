document_id: 2KI.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Joas, roi de Juda
  - type: heading
    content: 2Ch 24.1-3
  - type: text
    content: ' '
  - type: note
    content: 'sept ans  : l''âge du roi explique l''importance du rôle de Joïada (v. 3) qui, en l''absence de membre proche de la famille royale, put jouer un rôle de régent.'
  - type: text
    content: 'Joas avait sept ans lorsqu''il devint roi. '
  '10':
  - type: note
    content: 'un coffre  : le mot désigne ailleurs le coffre (traditionnellement « arche ») de l''alliance, cf. Ex 25.10n. –  son couvercle  : le terme est habituellement traduit par porte ou battant. –  l''autel, à droite  : LXX a lu la stèle. –  Les prêtres gardiens du seuil  : il s''agissait d''une haute responsabilité dans le temple, cf. 22.4 ; 23.4 ; 25.18 ; Jr 39.4 ; 52.24 ; 2Ch 34.9. Ils sont à distinguer des simples portiers cités en 1Ch 9.17-27.'
  - type: text
    content: 'Alors Joïada, le prêtre, prit un coffre, perça un trou dans son couvercle et le plaça à côté de l''autel, à droite, sur le passage par lequel on entrait dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. Les prêtres gardiens du seuil y mettaient tout l''argent qu''on apportait dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '11':
  - type: note
    content: 'Voir scribe. –  ils mettaient en sac…  : autre traduction possible ils faisaient fondre ensemble et le pesaient  ; cf. Ex 32.4. La monnaie sous forme de pièces n''apparaît qu''au Ve s. av. J.-C.'
  - type: text
    content: 'Quand ils voyaient qu''il y avait beaucoup d''argent dans le coffre, le scribe du roi montait avec le grand prêtre, et ils mettaient en sac et comptaient l''argent qui se trouvait dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '12':
  - type: note
    content: 'contrôlé  : autre traduction pesé. –  ceux qui avaient…  : il y a plusieurs lectures traditionnelles du texte hébreu, qui peuvent donner lieu aux traductions suivantes  : ceux qui étaient chargés des travaux ; ceux qui inspectaient les travaux ; les travailleurs recensés. –  On employait cet argent  : litt. ils le faisaient sortir. –  qui travaillaient…  : litt. qui faisaient la maison de YHWH.'
  - type: text
    content: 'Ils confiaient l''argent contrôlé à ceux qui avaient la responsabilité de faire les travaux dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. On employait cet argent pour les charpentiers et pour les bâtisseurs qui travaillaient à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '13':
  - type: text
    content: 'pour les maçons et les tailleurs de pierre, pour les achats de bois et de pierres de taille nécessaires pour réparer les fissures de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et pour toutes les dépenses destinées à réparer la maison. '
  '14':
  - type: note
    content: 'pour la maison du Seigneur  : précision absente de certains mss de LXX. –  bassins Ex 12.22+ ; 1R 7.50. –  ni couteaux  : il pourrait s''agir de petits couteaux servant à couper les mèches des lampes ; cf. 25.14 ; 1R 7.50 ; Jr 52.18 ; 2Ch 4.22 ; selon d''autres, il s''agirait d''instruments de musique (flûtes ?). LXX y a vu des clous d''apparat. –  calices  : le même mot se trouve en Ex 27.3 ; 38.3 ; Nb 4.14 ; 7.13ss etc.'
  - type: text
    content: 'Mais, avec l''argent qu''on apportait dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', on ne fit pour la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' ni bassins d''argent, ni couteaux, ni calices, ni trompettes, ni aucun objet d''or ou d''argent : '
  '15':
  - type: text
    content: 'on le donnait à ceux qui faisaient les travaux, afin qu''ils l''utilisent pour réparer la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '16':
  - type: note
    content: 'avec probité  : autre traduction avec fidélité.'
  - type: text
    content: 'On ne demandait aucun compte aux hommes à qui on confiait l''argent pour qu''ils le donnent à ceux qui faisaient les travaux, car ils agissaient avec probité. '
  '17':
  - type: note
    content: 'sacrifices de réparation  : voir Lv 5.6n (autre terme que celui qui est traduit précédemment par réparer).'
  - type: text
    content: 'L''argent des sacrifices de réparation et des sacrifices pour le péché n''était pas apporté dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: '  : il était pour les prêtres.'
  - type: heading
    content: Fin du règne de Joas
  - type: heading
    content: 2Ch 24.23-27
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'avait l''intention…  : litt. plaça sa face pour monter sur (ou contre ) Jérusalem.'
  - type: text
    content: 'Alors Hazaël, roi d''Aram, alla faire la guerre à Gath, qu''il prit. Hazaël avait l''intention d''attaquer Jérusalem. '
  '19':
  - type: note
    content: 'consacrées  : voir saint.'
  - type: text
    content: 'Joas, roi de Juda, prit toutes les choses consacrées, celles qu''avaient consacrées Josaphat, Joram et Achazia, ses pères, rois de Juda, celles qu''il avait lui-même consacrées, et tout l''or qui se trouvait dans les trésors de la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et de la maison du roi. Il envoya le tout à Hazaël, roi d''Aram, qui s''éloigna de Jérusalem.'
  '2':
  - type: note
    content: quarante ans ≈ 835-796 av. J.-C. –  Tsibia signifie petite gazelle  ; cf. Ct 2.7 ; 3.5 ; 4.5 ; 7.4.
  - type: text
    content: 'La septième année de Jéhu, Joas devint roi ; il régna quarante ans à Jérusalem. Le nom de sa mère était Tsibia ; elle était de Bersabée. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: Le reste de l'histoire… 1R 11.41n. –  le livre des chroniques des rois de Juda 1R 14.19n.
  - type: text
    content: 'Le reste de l''histoire de Joas, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '21':
  - type: note
    content: 'Les gens de sa cour  : litt. ses serviteurs. –  la descente de Silla  : lieu non identifié ; LXX porte en Gaalla.'
  - type: text
    content: 'Les gens de sa cour se soulevèrent et formèrent une conspiration ; ils abattirent Joas à Beth-Millo, qui est à la descente de Silla. '
  '22':
  - type: note
    content: 'Yozabad  : certains mss portent Yozakar. –  des gens de sa cour  : cf. v. 21n.'
  - type: text
    content: Yozabad, fils de Shiméath, et Yehozabad, fils de Shomer, des gens de sa cour, le mirent à mort. On l'ensevelit avec ses pères, dans la Ville de David. Son fils Amatsia devint roi à sa place.
  '3':
  - type: note
    content: 'Joas fit ce qui convenait au Seigneur 10.30n. –  durant tous ses jours…  : certains comprennent tout le temps que le prêtre Joïada l''instruisit (cf. 2Ch 24.2 ; LXX tous les jours que le prêtre Joïada l''éclaira) ; le verbe correspondant à instruire (ou enseigner) est celui dont dérive le mot tora, habituellement traduit par loi ou enseignement  ; sur l''association de ce terme avec le prêtre, voir Jr 2.8+.'
  - type: text
    content: 'Joas fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ' durant tous ses jours, parce que Joïada, le prêtre, l''instruisait. '
  '4':
  - type: note
    content: Voir hauts lieux et sacrifices.
  - type: text
    content: Toutefois les hauts lieux ne disparurent pas ; le peuple offrait encore des sacrifices et de l'encens dans les hauts lieux.
  - type: heading
    content: Joas fait réparer le temple
  - type: heading
    content: 2Ch 24.4-14
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Comparer avec 22.1ss. –  consacré  : voir saint. –  l''argent qui circule  : traduction très incertaine ; on a aussi compris l''argent ayant cours, l''argent de ceux qui passent au recensement , cf. Ex 30.11ss ; voir aussi 2Ch 24.9. –  l''argent pour le rachat…  : litt. l''argent des êtres de l''estimation , cf. Lv 5.15n  ; 27.1ss. –  qu''on apporte spontanément  : litt. qu''on a sur le cœur d''apporter.'
  - type: text
    content: 'Joas dit aux prêtres : Tout l''argent consacré qu''on apporte à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', l''argent qui circule, l''argent pour le rachat des personnes d''après la valeur fixée, et tout l''argent qu''on apporte spontanément à la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ', '
  '6':
  - type: note
    content: 'ses gens  : le texte hébreu emploie un terme qui n''apparaît qu''ici et dont le sens est incertain ; en le rapprochant d''une racine qui signifie reconnaître, on a interprété des gens de sa connaissance  ; en le rapportant à une racine qui signifie vendre, on a supposé qu''il désignait un fonctionnaire du temple chargé de percevoir des fonds.'
  - type: text
    content: que les prêtres le prennent, chacun sur ce qui appartient à ses gens, pour réparer les fissures de la Maison partout où on en trouvera.
  '7':
  - type: text
    content: 'Pourtant, la vingt-troisième année du roi Joas, les prêtres n''avaient pas réparé les fissures de la Maison. '
  '8':
  - type: note
    content: 'les autres prêtres  : litt. les prêtres.'
  - type: text
    content: 'Le roi Joas appela Joïada, le prêtre, ainsi que les autres prêtres et leur dit : Pourquoi n''avez-vous pas réparé les fissures de la Maison ? Maintenant, vous ne prendrez plus l''argent de vos gens, mais vous le donnerez pour les réparations de la Maison. '
  '9':
  - type: note
    content: 'pour réparer…  : litt. et à ne pas réparer…'
  - type: text
    content: 'Les prêtres consentirent à ne plus prendre l''argent du peuple pour réparer les fissures de la Maison. '
