document_id: 2KI.12,104
type_code: fra
verses:
  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Joas, roi de Juda
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 24.1-3
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.1 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sept ans
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : l''âge du roi explique l''importance du rôle de Joïada (v. 3) qui, en l''absence de membre proche de la famille royale, put jouer un rôle de régent.'
      marker-yv: yv-n
    - type: text
      text: 'Joas avait sept ans lorsqu''il devint roi. '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un coffre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot désigne ailleurs le coffre (traditionnellement « arche ») de l''alliance, cf. Ex 25.10'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son couvercle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le terme est habituellement traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'porte '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: battant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: l'autel, à droite
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' a lu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: la stèle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les prêtres gardiens du seuil
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il s''agissait d''une haute responsabilité dans le temple, cf. 22.4 ; 23.4 ; 25.18 ; Jr 39.4 ; 52.24 ; 2Ch 34.9. Ils sont à distinguer des simples portiers cités en 1Ch 9.17-27.'
      marker-yv: yv-n
    - type: text
      text: 'Alors Joïada, le prêtre, prit un coffre, perça un trou dans son couvercle et le plaça à côté de l''autel, à droite, sur le passage par lequel on entrait dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Les prêtres gardiens du seuil y mettaient tout l''argent qu''on apportait dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: scribe
        - type: text
          text: '. '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '–  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils mettaient en sac…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction possible '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils faisaient fondre ensemble et le pesaient
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ex 32.4. La monnaie sous forme de pièces n''apparaît qu''au V'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: e
        - type: text
          text: ' s. av. J.-C.'
      marker-yv: yv-n
    - type: text
      text: 'Quand ils voyaient qu''il y avait beaucoup d''argent dans le coffre, le scribe du roi montait avec le grand prêtre, et ils mettaient en sac et comptaient l''argent qui se trouvait dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: contrôlé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pesé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ceux qui avaient…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il y a plusieurs lectures traditionnelles du texte hébreu, qui peuvent donner lieu aux traductions suivantes'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ceux qui étaient chargés des travaux ; ceux qui inspectaient les travaux ; les travailleurs recensés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: On employait cet argent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils le faisaient sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: qui travaillaient…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui faisaient la maison de YHWH.
      marker-yv: yv-n
    - type: text
      text: 'Ils confiaient l''argent contrôlé à ceux qui avaient la responsabilité de faire les travaux dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. On employait cet argent pour les charpentiers et pour les bâtisseurs qui travaillaient à la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', '
  '13':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'pour les maçons et les tailleurs de pierre, pour les achats de bois et de pierres de taille nécessaires pour réparer les fissures de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', et pour toutes les dépenses destinées à réparer la maison. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pour la maison du '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : précision absente de certains mss de LXX. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'bassins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ex 12.22+ ; 1R 7.50. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ni couteaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : il pourrait s''agir de petits couteaux servant à couper les mèches des lampes ; cf. 25.14 ; 1R 7.50 ; Jr 52.18 ; 2Ch 4.22 ; selon d''autres, il s''agirait d''instruments de musique (flûtes ?). LXX y a vu des clous d''apparat. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: calices
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le même mot se trouve en Ex 27.3 ; 38.3 ; Nb 4.14 ; 7.13ss etc.'
      marker-yv: yv-n
    - type: text
      text: 'Mais, avec l''argent qu''on apportait dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', on ne fit pour la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' ni bassins d''argent, ni couteaux, ni calices, ni trompettes, ni aucun objet d''or ou d''argent : '
  '15':
  - type: usfm
    marker: p
    children:
    - type: text
      text: 'on le donnait à ceux qui faisaient les travaux, afin qu''ils l''utilisent pour réparer la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avec probité
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec fidélité.
      marker-yv: yv-n
    - type: text
      text: 'On ne demandait aucun compte aux hommes à qui on confiait l''argent pour qu''ils le donnent à ceux qui faisaient les travaux, car ils agissaient avec probité. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.17 '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sacrifices
        - type: text
          text: ' de réparation'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir Lv 5.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ' (autre terme que celui qui est traduit précédemment par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: réparer
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'L''argent des sacrifices de réparation et des sacrifices pour le péché n''était pas apporté dans la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '  : il était pour les prêtres.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Fin du règne de Joas
    marker-yv: yv-h
  - type: usfm
    marker: r
    children:
    - type: text
      text: 2Ch 24.23-27
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: avait l'intention…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'plaça sa face pour monter sur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: contre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Jérusalem.
      marker-yv: yv-n
    - type: text
      text: 'Alors Hazaël, roi d''Aram, alla faire la guerre à Gath, qu''il prit. Hazaël avait l''intention d''attaquer Jérusalem. '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: consacrées
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Joas, roi de Juda, prit toutes les choses consacrées, celles qu''avaient consacrées Josaphat, Joram et Achazia, ses pères, rois de Juda, celles qu''il avait lui-même consacrées, et tout l''or qui se trouvait dans les trésors de la maison du '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' et de la maison du roi. Il envoya le tout à Hazaël, roi d''Aram, qui s''éloigna de Jérusalem.'
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.2 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'quarante ans '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '≈ 835-796 av. J.-C. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tsibia '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: petite gazelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Ct 2.7 ; 3.5 ; 4.5 ; 7.4.'
      marker-yv: yv-n
    - type: text
      text: 'La septième année de Jéhu, Joas devint roi ; il régna quarante ans à Jérusalem. Le nom de sa mère était Tsibia ; elle était de Bersabée. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Le reste de l''histoire… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 11.41
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le livre des chroniques des rois de Juda '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1R 14.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Le reste de l''histoire de Joas, tout ce qu''il a fait, cela est écrit dans le livre des chroniques des rois de Juda. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Les gens de sa cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ses serviteurs
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: la descente de Silla
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : lieu non identifié ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' porte '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en Gaalla.
      marker-yv: yv-n
    - type: text
      text: 'Les gens de sa cour se soulevèrent et formèrent une conspiration ; ils abattirent Joas à Beth-Millo, qui est à la descente de Silla. '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Yozabad
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains mss portent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Yozakar
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: des gens de sa cour
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. v. 21'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Yozabad, fils de Shiméath, et Yehozabad, fils de Shomer, des gens de sa cour, le mirent à mort. On l'ensevelit avec ses pères, dans la Ville de David. Son fils Amatsia devint roi à sa place.
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.3 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Joas fit ce qui convenait au '
        - type: usfm
          marker: nd
          children:
          - type: text
            text: Seigneur
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '10.30'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: durant tous ses jours…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains comprennent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout le temps que le '
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: ' Joïada l''instruisit '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(cf. 2Ch 24.2 ; '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tous les jours que le prêtre Joïada l'éclaira
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') ; le verbe correspondant à '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'instruire '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: enseigner
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') est celui dont dérive le mot '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tora
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', habituellement traduit par '
      - type: usfm
        marker: fqa
