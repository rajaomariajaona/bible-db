document_id: EZK.19,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Complainte des lions
  - type: text
    content: ' '
  - type: note
    content: 'complainte v. 14+ ; cf. 17.2n. –  princes  : cf. 45.9n  ; voir aussi 34.24+.'
  - type: text
    content: 'Quant à toi, entonne une complainte sur les princes d''Israël. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'cep 15.2+ ; cf. 17.5s ; voir aussi Ps 128.3. –  à ton image  : texte obscur, interprété d''après Tg  ; certains mss portent de ta vigne  ; texte hébreu traditionnel dans ton sang.'
  - type: text
    content: Ta mère était comme un cep, à ton image.
  - type: text
    content: Elle était plantée près des eaux,
  - type: text
    content: elle était féconde et chargée de ramure
  - type: text
    content: du fait des grandes eaux.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'rameaux / sceptres  : LXX a lu le singulier, qui viserait Sédécias ; cf. 17.4 ; le pluriel lui associe peut-être ses fils (2R 25.7) ou d''autres princes (v. 1).'
  - type: text
    content: Elle avait de vigoureux rameaux,
  - type: text
    content: pour des sceptres de dominateurs ;
  - type: text
    content: sa taille l'élevait au-dessus des buissons touffus ;
  - type: text
    content: elle était remarquable par sa hauteur
  - type: text
    content: et par la multitude de ses branches.
  '12':
  - type: text
    content: ' '
  - type: note
    content: Cf. 17.10.
  - type: text
    content: Mais elle a été déracinée avec fureur
  - type: text
    content: et jetée à terre ;
  - type: text
    content: le vent d'est a desséché son fruit ;
  - type: text
    content: ses rameaux vigoureux ont été arrachés et se sont desséchés ;
  - type: text
    content: le feu les a dévorés.
  '13':
  - type: text
    content: Et maintenant elle est plantée dans le désert,
  - type: text
    content: dans une terre de sécheresse et de soif.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'de ses rameaux  : litt. du rameau  ; cf. v. 11n. –  complainte v. 1 ; 26.17+ ; 32.2,16.'
  - type: text
    content: Le feu est sorti de ses rameaux
  - type: text
    content: et il a dévoré ses sarments et son fruit ;
  - type: text
    content: elle n'a plus de rameau vigoureux,
  - type: text
    content: sceptre de domination.
  - type: text
    content: C'est là une complainte ; elle a servi de complainte.
  '2':
  - type: note
    content: 'Ta mère…  : litt. qu’(est) ta mère. –  lionne  : cf. Gn 49.9 ; l''allégorie peut ici s''appliquer à Jérusalem ou à l''ensemble de la nation.'
  - type: text
    content: 'Tu diras :'
  - type: text
    content: Ta mère, qui était-elle ? Une lionne.
  - type: text
    content: Elle était couchée parmi les lions ;
  - type: text
    content: C'est au milieu des jeunes lions
  - type: text
    content: qu'elle a élevé ses petits.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'un jeune lion  : il s''agit vraisemblablement de Joachaz (voir v. 4). –  déchiqueter sa proie… 22.25.'
  - type: text
    content: Elle a dressé l'un de ses petits
  - type: text
    content: qui devint un jeune lion
  - type: text
    content: et qui apprit à déchiqueter sa proie ;
  - type: text
    content: il dévora des hommes.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'entendirent parler de lui  : certains comprennent entendirent battre le rappel contre lui  ; d''autres modifient le texte pour lire on appela des nations contre lui (cf. 1R 15.22 ; Jr 50.29 ; 51.27) ; voir Es 31.4. –  boucle v. 9 ; cf. 29.4+. –  à ses narines  : sous-entendu dans le texte. –  Egypte  : 2R 23.31-34.'
  - type: text
    content: Les nations entendirent parler de lui,
  - type: text
    content: et il fut pris dans leur fosse ;
  - type: text
    content: avec une boucle à ses narines elles l'emmenèrent
  - type: text
    content: en Egypte.
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'en vain  : sous-entendu dans le texte. –  un autre  : sans doute Joïakîn (cf. v. 9).'
  - type: text
    content: Quand la lionne vit qu'elle attendait en vain,
  - type: text
    content: que son espoir s'évanouissait,
  - type: text
    content: elle prit un autre de ses petits
  - type: text
    content: et en fit un jeune lion.
  '6':
  - type: text
    content: ' '
  - type: note
    content: V. 3.
  - type: text
    content: Il se promenait au milieu des lions,
  - type: text
    content: il devint un jeune lion
  - type: text
    content: et il apprit à déchiqueter sa proie ;
  - type: text
    content: il dévora des hommes.
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Il viola (litt. connut ) leurs veuves  : Tg  : il démolit leurs donjons , variante possible du texte hébreu.'
  - type: text
    content: Il viola leurs veuves
  - type: text
    content: et rendit désertes leurs villes ;
  - type: text
    content: le pays, avec tout ce qui s'y trouvait, fut dévasté
  - type: text
    content: au bruit de son rugissement.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Contre lui…  : autre traduction on tourna contre lui les nations…  ; cf. v. 4n. –  de toutes les provinces  : litt. des provinces , cf. Est 1.1n  ; le terme désigne sans doute les pays conquis où sont recrutées les troupes de l''empire. –  leur filet 12.13+.'
  - type: text
    content: Contre lui se rangèrent les nations qui l'entouraient,
  - type: text
    content: de toutes les provinces,
  - type: text
    content: elles tendirent sur lui leur filet,
  - type: text
    content: et il fut pris dans leur fosse.
  '9':
  - type: text
    content: ' '
  - type: note
    content: Cf. 1.2n  ; 2R 24.15 ; 25.27.
  - type: text
    content: Elles l'ont mis dans une cage avec une boucle,
  - type: text
    content: elles l'ont emmené auprès du roi de Babylone ;
  - type: text
    content: elles l'ont emmené dans des forteresses,
  - type: text
    content: afin qu'on n'entende plus sa voix
  - type: text
    content: sur les montagnes d'Israël.
  - type: heading
    content: Complainte de la vigne
