  - type: text
    text: 'Il dominait sur le mont Hermon, sur Salka, sur tout le Bashân, jusqu''à la frontière des Gueshourites et des Maakatites, et sur la moitié du Galaad – la frontière de Sihôn, roi de Heshbôn. '
