  - type: text
    text: 'Sihôn, roi des Amorites, qui habitait à Heshbôn. Il dominait depuis Aroër, qui est sur la rive de l''oued Arnon – et le milieu de l''oued – sur la moitié du Galaad, jusqu''à l''oued Yabboq, frontière des Ammonites ; '
