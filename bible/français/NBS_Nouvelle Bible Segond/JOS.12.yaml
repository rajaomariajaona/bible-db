document_id: JOS.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Liste des conquêtes d'Israël
  - type: text
    content: ' '
  - type: note
    content: 'en Transjordanie, du côté du soleil levant  : cf. 1.15. –  l''oued Arnon  : cf. Nb 21.13n  ; Dt 2.24+. –  mont Hermon 11.3n. –  la plaine aride 8.14n.'
  - type: text
    content: 'Voici les rois du pays que les Israélites battirent – ceux-là, ils prirent possession de leur pays en Transjordanie, du côté du soleil levant, depuis l''oued Arnon jusqu''au mont Hermon, avec toute la plaine aride, à l''est :'
  '10':
  - type: text
    content: le roi de Jérusalem, un ;
  - type: text
    content: le roi d'Hébron, un ;
  '11':
  - type: text
    content: le roi de Yarmouth, un ;
  - type: text
    content: le roi de Lakish, un ;
  '12':
  - type: text
    content: le roi d'Eglôn, un ;
  - type: text
    content: le roi de Guézer, un ;
  '13':
  - type: text
    content: le roi de Debir, un ;
  - type: text
    content: le roi de Guéder, un ;
  '14':
  - type: text
    content: le roi de Horma, un ;
  - type: text
    content: le roi d'Arad, un ;
  '15':
  - type: text
    content: le roi de Libna, un ;
  - type: text
    content: le roi d'Adoullam, un ;
  '16':
  - type: text
    content: le roi de Maqqéda, un ;
  - type: text
    content: le roi de Beth-El, un ;
  '17':
  - type: text
    content: le roi de Tappouah, un ;
  - type: text
    content: le roi de Hépher, un ;
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Apheq  : sans doute à une dizaine de kilomètres au nord-est de Jaffa ; cf. 13.4n  ; même nom (pas forcément pour la même localité) en 19.30n  ; 1S 4.1 ; 29.1 ; il désigne aussi une ville du Golân, en territoire syrien, en 1R 20.26ss ; 2R 13.17. –  Lasharôn  : certains modifient le texte hébreu traditionnel pour lire le roi de la plaine côtière ( Sharôn ) ; LXX ne voit là qu''un roi et une ville ( le roi d''Apheq du Sharôn  ; cf. Es 33.9n).'
  - type: text
    content: le roi d'Apheq, un ;
  - type: text
    content: le roi de Lasharôn, un ;
  '19':
  - type: text
    content: le roi de Madôn, un ;
  - type: text
    content: le roi de Hatsor, un ;
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Sihôn 2.10+. –  Aroër  : probablement sur la rive nord de l''oued Arnon , à 27 km au sud de Medba (13.9n) ; cf. Nb 32.34n  ; Dt 2.36+. –  et le milieu de l''oued  : cf. 13.9,16 ; Dt 2.36. –  l''oued Yabboq, frontière des Ammonites  : cf. Dt 2.37 ; 3.16.'
  - type: text
    content: 'Sihôn, roi des Amorites, qui habitait à Heshbôn. Il dominait depuis Aroër, qui est sur la rive de l''oued Arnon – et le milieu de l''oued – sur la moitié du Galaad, jusqu''à l''oued Yabboq, frontière des Ammonites ; '
  '20':
  - type: text
    content: le roi de Shimrôn-Merôn, un ;
  - type: text
    content: le roi d'Akshaph, un ;
  '21':
  - type: text
    content: le roi de Taanak, un ;
  - type: text
    content: le roi de Meguiddo, un ;
  '22':
  - type: text
    content: le roi de Qédesh, un ;
  - type: text
    content: le roi de Yoqnéam, au Carmel, un ;
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'dans la contrée  : certains mss et Tg portent sur les hauteurs . –  de Goyim  : litt. des nations ( ?) ; LXX Guééi . –  près du Guilgal  : cette localité, située au nord du pays, doit être distinguée de la ville du même nom, près de Jéricho (4.19+) ; LXX de Galilée.'
  - type: text
    content: le roi de Dor, dans la contrée de Dor, un ;
  - type: text
    content: le roi de Goyim, près du Guilgal, un ;
  '24':
  - type: text
    content: ' '
  - type: note
    content: Tirtsa 1R 14.17n.
  - type: text
    content: le roi de Tirtsa, un.
  - type: text
    content: 'Total des rois : trente et un.'
  '3':
  - type: note
    content: 'Kinroth 11.2n. –  la mer du Sel  : la mer Morte, cf. 3.16+. –  Pisga  : cf. Nb 21.20n  ; Dt 3.17+ ; 4.49 ; 34.1.'
  - type: text
    content: la plaine aride, jusqu'à la mer de Kinroth, à l'est, et jusqu'à la mer de la plaine aride, la mer du Sel, à l'est, vers Beth-Yeshimoth ; et du côté du midi, sous les pentes du Pisga.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'Og 2.10+ ; cf. Nb 21.33-35 ; Dt 3.1-11. –  Rephaïtes  : première mention en Gn 14.5n  ; voir aussi Jos 13.12 ; 15.8 ; 17.15 ; 18.16 ; Dt 2.11+. –  Ashtaroth 9.10n  ; ville dans le Bashân , même localisation des Rephaïtes . –  Edréi  : première mention Nb 21.33n  ; ville conquise par Manassé, cf. 13.12,31 ; voir aussi Dt 1.4 ; 3.1,10. On l''identifie à la ville syrienne actuelle de Dera''a, à 37 km à l''ouest de Botsra.'
  - type: text
    content: 'Le territoire d''Og, roi du Bashân, du reste des Rephaïtes, qui habitait à Ashtaroth et à Edréi. '
  '5':
  - type: note
    content: 'Salka  : peut-être à une soixantaine de kilomètres à l''est d''Edréi. Cf. Dt 3.10 ; 1Ch 5.11. –  Gueshourites / Maakatites  : habitants de Gueshour (13.2,13 ; 2S 3.3 ; 13.37 ; 1Ch 2.23 ; 3.2) et de Maaka (première mention en Gn 22.24n). –  la frontière de Sihôn  : certains mss de LXX portent jusqu''à la frontière…'
  - type: text
    content: 'Il dominait sur le mont Hermon, sur Salka, sur tout le Bashân, jusqu''à la frontière des Gueshourites et des Maakatites, et sur la moitié du Galaad – la frontière de Sihôn, roi de Heshbôn. '
  '6':
  - type: note
    content: 'leur pays  : sous-entendu dans le texte, de même au v. 7. –  aux Rubénites…  : cf. Nb 32 ; Dt 3.12-17.'
  - type: text
    content: 'Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et les Israélites les battirent ; Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', donna leur pays en possession aux Rubénites, aux Gadites et à la demi-tribu de Manassé.'
  '7':
  - type: text
    content: ' '
  - type: note
    content: au-delà du Jourdain 5.1n.
  - type: text
    content: 'Voici les rois du pays que Josué et les Israélites battirent au-delà du Jourdain, à l''ouest, depuis Baal-Gad, dans la dépression du Liban, jusqu''au mont Chauve qui s''élève vers Séir. Josué donna leur pays en possession aux tribus d''Israël, selon leur répartition, '
  '8':
  - type: note
    content: 'Bas-Pays (hébreu shephéla) et plaine aride (hébreu ‘arava) : cf. 8.14n  ; 11.2n. –  sur les coteaux 10.40n.'
  - type: text
    content: dans la montagne, dans le Bas-Pays, dans la plaine aride, sur les coteaux, dans le désert et dans le Néguev – les Hittites, les Amorites, les Cananéens, les Perizzites, les Hivvites et les Jébusites.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Le roi…  : dans cette liste des rois vaincus (v. 7-24), beaucoup de noms de localités ont été déjà mentionnés dans les chap. précédents. D''autres sont de localisation incertaine.'
  - type: text
    content: Le roi de Jéricho, un ;
  - type: text
    content: le roi du Aï, du côté de Beth-El, un ;
