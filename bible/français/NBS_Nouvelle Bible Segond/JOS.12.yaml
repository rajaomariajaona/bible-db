  - type: text
    text: 'Voici les rois du pays que les Israélites battirent – ceux-là, ils prirent possession de leur pays en Transjordanie, du côté du soleil levant, depuis l''oued Arnon jusqu''au mont Hermon, avec toute la plaine aride, à l''est :'
