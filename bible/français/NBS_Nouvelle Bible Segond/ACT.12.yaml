        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: (il descendit…), car il était en conflit…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; le récit de la mort '
        - type: usfm
          marker: w
          children:
          - type: text
            text: d'Hérode
        - type: text
          text: ' Agrippa I'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' présente de nombreuses analogies avec celui qu''en fait Flavius Josèphe. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: les Tyriens et les Sidoniens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', habitants des villes phéniciennes de Tyr et de Sidon, sur la côte méditerranéenne, qui dépendaient de l''arrière-pays pour leur approvisionnement en céréales ; cf. 1R 5.23-25 ; 9.11 ; Ez 27.17.'
      marker-yv: yv-n
    - type: text
      text: 'Il était en conflit avec les Tyriens et les Sidoniens. Mais ceux-ci, d''un commun accord, vinrent le trouver ; après avoir persuadé Blastos, le chambellan du roi, ils demandèrent la paix, parce que leur pays tirait sa subsistance de celui du roi. '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Au jour fixé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : un rapprochement avec le récit de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Josèphe
        - type: text
          text: ' suggère qu''il s''agit du jour où l''on commémorait la fondation de Césarée par Hérode le Grand (le 5 mars 44). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: revêtu…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : Josèphe : « Vêtu d''une robe toute cousue d''argent et d''un tissu admirable… il fut pris de maux d''intestins. » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la tribune
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : même expression grecque en 25.6,10,17 ; Mt 27.19 ; Jn 19.13 ('
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: au tribunal
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'Au jour fixé, Hérode, revêtu de ses habits royaux, s''était assis à la tribune et les haranguait, '
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.22 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Josèphe : « Puisses-tu être bien disposé envers nous ; si jusqu''ici nous t''avons craint comme un homme, désormais nous reconnaissons en toi plus qu''un mortel. » Le peuple de Rome attribuera aussi à Néron (54-68 apr. J.-C.) une « voix sacrée » en l''identifiant à Hercule et à Apollon ; cf. 14.15 ; 28.6 ; Ez 28.2,6,9.'
      marker-yv: yv-n
    - type: text
      text: 'tandis que le peuple criait : Ce n''est pas la voix d''un être humain, mais celle d''un dieu ! '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
