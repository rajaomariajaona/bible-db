          text: de les exécuter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: de les faire emmener
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. Lc 23.26+ ; texte occidental '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qu'ils soient mis à mort.
      marker-yv: yv-n
    - type: text
      text: Hérode le fit rechercher, mais il ne le trouva pas ; il fit interroger les gardes et donna l'ordre de les exécuter. Ensuite il descendit de la Judée à Césarée pour y séjourner.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Mort du roi Hérode Agrippa
    marker-yv: yv-h
  '2':
  - type: usfm
    marker: p
    children:
