      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'fit arrêter… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.3+. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'Eglise
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : le texte occidental précise '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: en Judée.
      marker-yv: yv-n
    - type: text
      text: 'En ce temps-là, le roi Hérode mit la main sur quelques membres de l''Eglise pour les maltraiter ; '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils sortirent
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le principal ms témoin du texte occidental ajoute'
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: descendirent les sept marches et s'avancèrent…
      marker-yv: yv-n
    - type: text
      text: Lorsqu'ils eurent passé la première garde, puis la seconde, ils arrivèrent à la porte de fer qui donne sur la ville ; elle s'ouvrit d'elle-même devant eux ; ils sortirent et s'avancèrent dans une rue, et aussitôt l'ange s'éloigna de lui.
