document_id: ACT.12,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Exécution de Jacques, emprisonnement de Pierre
  - type: text
    content: ' '
  - type: note
    content: 'Hérode Agrippa Ier (41-44), petit-fils d''Hérode le Grand et neveu d''Hérode Antipas (Lc 23.8-12), est connu pour avoir favorisé le judaïsme pharisien. –  mit la main sur… ou fit arrêter… 4.3+. –  l''Eglise  : le texte occidental précise en Judée.'
  - type: text
    content: 'En ce temps-là, le roi Hérode mit la main sur quelques membres de l''Eglise pour les maltraiter ; '
  '10':
  - type: note
    content: 'ils sortirent  : le principal ms témoin du texte occidental ajoute  : descendirent les sept marches et s''avancèrent…'
  - type: text
    content: Lorsqu'ils eurent passé la première garde, puis la seconde, ils arrivèrent à la porte de fer qui donne sur la ville ; elle s'ouvrit d'elle-même devant eux ; ils sortirent et s'avancèrent dans une rue, et aussitôt l'ange s'éloigna de lui.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'le Seigneur a envoyé son ange…  : cf. Ex 18.4 ; Dn 3.28 ; 6.23. –  ce qu''attendait le peuple juif  : litt. l''attente du peuple des Juifs.'
  - type: text
    content: 'Revenu à lui, Pierre dit : Maintenant je sais vraiment que le Seigneur a envoyé son ange et qu''il m''a délivré de la main d''Hérode et de tout ce qu''attendait le peuple juif. '
  '12':
  - type: note
    content: Quand il eut compris 14.6. –  Jean surnommé Marc v. 25 ; 13.5,13 ; 15.37-39 ; Col 4.10 ; 2Tm 4.11 ; Phm 24 ; 1P 5.13.
  - type: text
    content: 'Quand il eut compris, il se rendit à la maison de Marie, mère de Jean surnommé Marc, où bon nombre de gens étaient réunis et priaient. '
  '13':
  - type: note
    content: 'à la porte d''entrée  : cf. 10.17. –  Rhode  : le mot grec qui a donné ce nom propre signifie rose.'
  - type: text
    content: 'Quand il eut frappé à la porte d''entrée, une servante nommée Rhode s''approcha pour écouter. '
  '14':
  - type: note
    content: Cf. Lc 24.41.
  - type: text
    content: 'Elle reconnut la voix de Pierre et, dans sa joie, au lieu d''ouvrir, elle courut annoncer que Pierre était là, à la porte d''entrée. '
  '15':
  - type: note
    content: 'Tu es folle  : cf. 26.24 ; Lc 24.11. –  son ange  : cf. Mt 18.10 ; Hé 1.14.'
  - type: text
    content: 'Ils lui dirent : Tu es folle ! Mais elle soutenait qu''il en était bien ainsi. Eux disaient : C''est son ange ! '
  '16':
  - type: note
    content: stupéfaits 3.10 ; 10.10n.
  - type: text
    content: 'Cependant Pierre continuait à frapper. Ils ouvrirent et furent stupéfaits de le voir. '
  '17':
  - type: note
    content: 'De la main… 13.16 ; 19.33 ; 21.40 ; 26.1. –  Annoncez-le  : cf. Lc 24.9. –  Jacques (à ne pas confondre avec celui du v. 2n) : cf. 15.13 ; 21.18 ; Mt 13.55/ / ; 1Co 15.7 ; Ga 1.19 ; 2.9,12 ; Jc 1.1 ; Jd 1 ; cf. Evangile selon Thomas 12 : « Les disciples dirent à Jésus : “Nous savons que tu nous quitteras. Qui deviendra le plus grand parmi nous ?” Jésus leur dit : “Où que vous soyez allés, vous irez vers Jacques, pour qui ont été faits le ciel et la terre.” » –  aux frères  : cf. 1.15+. –  dans un autre lieu  : sur la destinée de Pierre, cf. 15.7-11 ; Jn 21.18s ; 1Co 9.5 ; Ga 2.7 ; 1P 1.1 ; 5.13.'
  - type: text
    content: 'De la main, il leur fit signe de se taire, leur raconta comment le Seigneur l''avait fait sortir de la prison et dit : Annoncez-le à Jacques et aux frères. Puis il sortit et s''en alla dans un autre lieu.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 5.21-24. –  grande agitation  : litt. une agitation (même terme traduit par troubles 19.23) pas petite , ou pas mal d''agitation  ; on trouve, en grec, une manière analogue d''exprimer la quantité ou l''intensité en 14.28 ( longtemps ) ; 15.2 ( violente ) ; 17.4 ( nombre de ), 12 ( en grand nombre ) ; 19.23 ( graves ), 24 ( considérable ) ; 27.20 ( forte ).'
  - type: text
    content: 'Quand il fit jour, grande agitation parmi les soldats : qu''était donc devenu Pierre ? '
  '19':
  - type: note
    content: 'de les exécuter  : litt. de les faire emmener, cf. Lc 23.26+ ; texte occidental qu''ils soient mis à mort.'
  - type: text
    content: Hérode le fit rechercher, mais il ne le trouva pas ; il fit interroger les gardes et donna l'ordre de les exécuter. Ensuite il descendit de la Judée à Césarée pour y séjourner.
  - type: heading
    content: Mort du roi Hérode Agrippa
  '2':
  - type: note
    content: il supprima même ou il fit même supprimer. –  Jacques, frère de Jean 1.13 ; cf. Mc 10.35-40/ /.
  - type: text
    content: 'il supprima même par l''épée Jacques, frère de Jean. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'Le texte occidental rattache ce v. à ce qui précède  : (il descendit…), car il était en conflit…  ; le récit de la mort d''Hérode Agrippa Ier présente de nombreuses analogies avec celui qu''en fait Flavius Josèphe. –  les Tyriens et les Sidoniens , habitants des villes phéniciennes de Tyr et de Sidon, sur la côte méditerranéenne, qui dépendaient de l''arrière-pays pour leur approvisionnement en céréales ; cf. 1R 5.23-25 ; 9.11 ; Ez 27.17.'
  - type: text
    content: 'Il était en conflit avec les Tyriens et les Sidoniens. Mais ceux-ci, d''un commun accord, vinrent le trouver ; après avoir persuadé Blastos, le chambellan du roi, ils demandèrent la paix, parce que leur pays tirait sa subsistance de celui du roi. '
  '21':
  - type: note
    content: 'Au jour fixé  : un rapprochement avec le récit de Josèphe suggère qu''il s''agit du jour où l''on commémorait la fondation de Césarée par Hérode le Grand (le 5 mars 44). –  revêtu…  : Josèphe : « Vêtu d''une robe toute cousue d''argent et d''un tissu admirable… il fut pris de maux d''intestins. » –  à la tribune  : même expression grecque en 25.6,10,17 ; Mt 27.19 ; Jn 19.13 (au tribunal).'
  - type: text
    content: 'Au jour fixé, Hérode, revêtu de ses habits royaux, s''était assis à la tribune et les haranguait, '
  '22':
  - type: note
    content: 'Cf. Josèphe : « Puisses-tu être bien disposé envers nous ; si jusqu''ici nous t''avons craint comme un homme, désormais nous reconnaissons en toi plus qu''un mortel. » Le peuple de Rome attribuera aussi à Néron (54-68 apr. J.-C.) une « voix sacrée » en l''identifiant à Hercule et à Apollon ; cf. 14.15 ; 28.6 ; Ez 28.2,6,9.'
  - type: text
    content: 'tandis que le peuple criait : Ce n''est pas la voix d''un être humain, mais celle d''un dieu ! '
  '23':
  - type: note
    content: 'Cf. 1.18+ ; 5.5 ; Es 66.24+ ; Dn 5.20 ; 2 Maccabées 9.4ss : « Il (Antiochos IV Epiphane) avait dit en effet dans son orgueil : “Je ferai de Jérusalem la fosse commune des Juifs quand j''y serai arrivé.” Mais le Seigneur qui voit tout, le Dieu d''Israël, le frappa d''une plaie incurable et invisible. A peine avait-il achevé cette phrase qu''une douleur d''entrailles sans remède et une colique aiguë le saisirent… il tomba du char qui roulait avec fracas : entraînés dans une chute malheureuse, tous les membres de son corps furent tordus… C''était au point que les yeux de l''impie fourmillaient de vers, qu''avec d''atroces douleurs sa chair encore vive partait en lambeaux et que, à cause de la puanteur, toute l''armée avait le cœur soulevé par cette pourriture… Comme il ne pouvait supporter lui-même l''odeur qu''il répandait, il avoua : “Il est juste de se soumettre à Dieu et, simple mortel, de renoncer à s''égaler à la divinité.” » –  A l''instant même  : autre traduction tout à coup. –  l''ange du Seigneur 5.19n  ; cf. 2S 24.16 ; 2R 19.35. –  donné gloire à Dieu Rm 4.20+. –  Et, rongé…  : texte occidental Et, descendu de la tribune, il fut rongé de vers, alors qu''il était encore vivant. C''est ainsi qu''il expira.'
  - type: text
    content: A l'instant même, l'ange du Seigneur le frappa, parce qu'il n'avait pas donné gloire à Dieu. Et, rongé par des vers, il expira.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 2.41+ ; 6.7 ; 19.20. –  progressait ou se multipliait , 9.31n.
  - type: text
    content: 'Cependant la parole du Seigneur se répandait et progressait. '
  '25':
  - type: note
    content: 'en faveur de Jérusalem  : traduction incertaine ; le sens le plus naturel du texte grec le plus probable serait  : après s''être acquittés de leur service (ou ministère, 6.1n, secours, cf. 11.29ns), Barnabé et Saul s''en retournèrent à Jérusalem  ; mais la logique du récit (11.27–13.1) suggère plutôt qu''ils quittent Jérusalem (certains mss portent de Jérusalem) pour Antioche. –  Jean surnommé Marc v. 12+.'
  - type: text
    content: Barnabé et Saul, après s'être acquittés de leur service en faveur de Jérusalem, s'en retournèrent en prenant avec eux Jean surnommé Marc.
  '3':
  - type: note
    content: 'cela  : texte occidental probable son attaque (terme apparenté à l''expression traduite par mettre la main sur v. 1) contre [les saints] et les croyants. –  plaisait aux Juifs 24.27+. –  il décida… aussi  : cf. Lc 3.20 où le même verbe est traduit par ajouter. –  Pains sans levain  : cf. Lc 22.1/ / ; voir calendrier et fêtes.'
  - type: text
    content: 'Voyant que cela plaisait aux Juifs, il décida de s''emparer aussi de Pierre. C''était pendant les jours des Pains sans levain. '
  '4':
  - type: note
    content: 'pris et jeté (ou fait prendre et jeter) en prison 4.3 ; 5.18. – Les quatre escouades se relayaient vraisemblablement par veilles de trois heures. –  la Pâque  : cf. Ex 12 ; Mc 14.1ss/ /.'
  - type: text
    content: 'Après l''avoir pris et jeté en prison, il le fit garder par quatre escouades de quatre soldats chacune, décidé à le faire comparaître devant le peuple après la Pâque. '
  '5':
  - type: note
    content: 'l''Eglise…  : litt. la prière de l''Eglise arrivait (ou se faisait) avec ferveur vers (ou devant) Dieu à son sujet. –  avec ferveur ou instamment, sans relâche  ; terme apparenté en 26.7 ; même terme Lc 22.44 ; 1P 1.22 ; cf. Jc 5.16 ; Judith 4.9 : « Tous les hommes d''Israël crièrent vers Dieu avec une grande ardeur et ils jeûnèrent avec une grande ardeur. »'
  - type: text
    content: Pierre était donc gardé dans la prison ; mais l'Eglise priait Dieu pour lui avec ferveur.
  - type: heading
    content: Pierre est délivré
  '6':
  - type: text
    content: ' '
  - type: note
    content: Cf. 5.18-24 ; 16.24-26. –  Hérode v. 1n.
  - type: text
    content: 'Hérode allait le faire comparaître ; cette nuit-là, Pierre, lié de deux chaînes, était endormi entre deux soldats, tandis que, devant la porte, des sentinelles gardaient la prison. '
  '7':
  - type: note
    content: 'Cf. v. 23 ; 5.19+ ; 27.23 ; Lc 2.9+. –  L''ange réveilla Pierre  : cf. 3.15n  ; 1R 19.5.'
  - type: text
    content: 'Soudain l''ange du Seigneur survint et une lumière brilla dans la cellule. L''ange réveilla Pierre en le frappant au côté et lui dit : Lève-toi vite ! Les chaînes tombèrent de ses mains. '
  '8':
  - type: text
    content: 'L''ange lui dit : Mets ta ceinture et attache tes sandales. Il le fit. L''ange lui dit : Mets ton vêtement et suis-moi. '
  '9':
  - type: note
    content: 'Texte occidental probable  : Il (l''ange) le saisit, l''entraîna et le fit sortir. –  l''intervention de l''ange  : litt. ce qui arrivait par l''ange. –  réelle  : litt. vraie. –  une vision 9.10+.'
  - type: text
    content: 'Il sortit et le suivit ; il ne savait pas que l''intervention de l''ange était réelle : il pensait avoir une vision. '
