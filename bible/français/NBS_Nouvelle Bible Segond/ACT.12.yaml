        children:
        - type: text
          text: 'l''attente du peuple des '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Juifs
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Revenu à lui, Pierre dit : Maintenant je sais vraiment que le Seigneur a envoyé son ange et qu''il m''a délivré de la main d''Hérode et de tout ce qu''attendait le peuple juif. '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Quand il eut compris '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '14.6. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Jean surnommé Marc '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: v. 25 ; 13.5,13 ; 15.37-39 ; Col 4.10 ; 2Tm 4.11 ; Phm 24 ; 1P 5.13.
      marker-yv: yv-n
    - type: text
      text: 'Quand il eut compris, il se rendit à la maison de Marie, mère de Jean surnommé Marc, où bon nombre de gens étaient réunis et priaient. '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
