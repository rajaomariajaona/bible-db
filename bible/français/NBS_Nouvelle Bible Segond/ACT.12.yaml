        marker: fr
        children:
        - type: text
          text: '12.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Tu es folle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 26.24 ; Lc 24.11. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: son ange
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Mt 18.10 ; Hé 1.14.'
      marker-yv: yv-n
    - type: text
      text: 'Ils lui dirent : Tu es folle ! Mais elle soutenait qu''il en était bien ainsi. Eux disaient : C''est son ange ! '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
