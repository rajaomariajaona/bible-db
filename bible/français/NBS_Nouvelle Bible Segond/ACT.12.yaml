          text: Et, descendu de la tribune, il fut rongé de vers, alors qu'il était encore vivant. C'est ainsi qu'il expira.
      marker-yv: yv-n
    - type: text
      text: A l'instant même, l'ange du Seigneur le frappa, parce qu'il n'avait pas donné gloire à Dieu. Et, rongé par des vers, il expira.
