        - type: text
          text: ') : cf. 15.13 ; 21.18 ; Mt 13.55/ / ; 1Co 15.7 ; Ga 1.19 ; 2.9,12 ; Jc 1.1 ; Jd 1 ; cf. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'Evangile selon '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Thomas
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12 : « Les disciples dirent à Jésus : “Nous savons que tu nous quitteras. Qui deviendra le plus grand parmi nous ?” Jésus leur dit : “Où que vous soyez allés, vous irez vers Jacques, pour qui ont été faits le ciel et la terre.” » –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aux frères
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 1.15+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: dans un autre lieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : sur la destinée de Pierre, cf. 15.7-11 ; Jn 21.18s ; 1Co 9.5 ; Ga 2.7 ; 1P 1.1 ; 5.13.'
      marker-yv: yv-n
    - type: text
      text: 'De la main, il leur fit signe de se taire, leur raconta comment le Seigneur l''avait fait sortir de la prison et dit : Annoncez-le à Jacques et aux frères. Puis il sortit et s''en alla dans un autre lieu.'
