        - type: usfm
          marker: ord
          children:
          - type: text
            text: er
        - type: text
          text: ' (41-44), petit-fils d''Hérode le Grand et neveu d''Hérode Antipas (Lc 23.8-12), est connu pour avoir favorisé le judaïsme '
        - type: usfm
