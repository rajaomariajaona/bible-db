      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : le mot grec qui a donné ce nom propre signifie '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: rose.
      marker-yv: yv-n
    - type: text
      text: 'Quand il eut frappé à la porte d''entrée, une servante nommée Rhode s''approcha pour écouter. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '12.14 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. Lc 24.41.
      marker-yv: yv-n
    - type: text
      text: 'Elle reconnut la voix de Pierre et, dans sa joie, au lieu d''ouvrir, elle courut annoncer que Pierre était là, à la porte d''entrée. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
