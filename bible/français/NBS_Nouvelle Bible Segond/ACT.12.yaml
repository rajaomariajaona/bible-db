        children:
        - type: text
          text: '9.4ss : « Il (Antiochos IV Epiphane) avait dit en effet dans son orgueil : “Je ferai de Jérusalem la fosse commune des Juifs quand j''y serai arrivé.” Mais le Seigneur qui voit tout, le Dieu d''Israël, le frappa d''une plaie incurable et invisible. A peine avait-il achevé cette phrase qu''une douleur d''entrailles sans remède et une colique aiguë le saisirent… il tomba du char qui roulait avec fracas : entraînés dans une chute malheureuse, tous les membres de son corps furent tordus… C''était au point que les yeux de l''impie fourmillaient de vers, qu''avec d''atroces douleurs sa chair encore vive partait en lambeaux et que, à cause de la puanteur, toute l''armée avait le cœur soulevé par cette pourriture… Comme il ne pouvait supporter lui-même l''odeur qu''il répandait, il avoua : “Il est juste de se soumettre à Dieu et, simple mortel, de renoncer à s''égaler à la divinité.” » –  '
