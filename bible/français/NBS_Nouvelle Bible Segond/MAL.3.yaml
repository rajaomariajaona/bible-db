document_id: MAL.3,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'J''envoie (v. 23) mon messager (ou mon ange , hébreu mal''aki ) : cf. 1.1n  ; 2.7n  ; Mt 11 .3, 10 ; Mc 1.2 ; Lc 7.27  ; Ap 22.16. –  il fraiera un chemin Es 40.3 ; 57.14 ; 62.10 ; Lc 1.17,76. –  à l''improviste ou bientôt , le terme peut avoir les deux sens ; cf. Es 29.5s ; 47.9 ; Jr 51.8 ; Ps 64.8 ; 1Th 5.3. –  le Seigneur / le Seigneur  : hébreu ’Adonaï / YHWH (cf. Ex 3.15n) ; Za 4.14+ ; cf. 2.14 ; 8.3. –  que vous cherchez  : cf. 2.17. –  messager (ou ange  ; cf. 1.1n) de l''alliance (2.4+) : cf. Ac 7.53 ; Ga 3.19 ; Hé 2.2 ; voir aussi Es 59.21 ; Jr 31.31ss ; Ez 16.59ss ; 36.24ss ; Lc 22.20 ; 2Co 3.6 ; Hé 8.8 ; 9.15+.'
  - type: text
    content: 'J''envoie mon messager :'
  - type: text
    content: il fraiera un chemin devant moi.
  - type: text
    content: Il arrivera dans son temple à l'improviste,
  - type: text
    content: le Seigneur que vous cherchez ;
  - type: text
    content: le messager de l'alliance
  - type: text
    content: que vous désirez, il arrive,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Pr 3.9s ; Mt 6.33. –  dîme v. 8n. –  au Trésor  : litt. à la maison du trésor  ; Né 10.38ss ; 12.44 ; 13.5,12. –  de quoi manger , c.-à-d. des victimes pour les sacrifices. –  mettez-moi… à l''épreuve  : cf. Ex 17.7 ; Dt 6.16 ; même verbe en Ps 95.9 ; voir aussi Jg 6.33ss. –  j''ouvrirai sans faute (Es 5.9n) : autre traduction pour voir si je n''ouvrirai pas . –  les fenêtres du ciel , par où passe la pluie nécessaire aux récoltes ; cf. Gn 7.11 ; 8.2 ; 2R 7.2,19 ; Es 24.18. –  la bénédiction 2.2 ; Dt 28.8ss ; Ez 34.26.'
  - type: text
    content: Apportez toute la dîme au Trésor,
  - type: text
    content: qu'il y ait de quoi manger dans ma maison ;
  - type: text
    content: mettez-moi ainsi à l'épreuve, je vous prie,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ;'
  - type: text
    content: j'ouvrirai sans faute pour vous
  - type: text
    content: les fenêtres du ciel,
  - type: text
    content: et je déverserai pour vous la bénédiction
  - type: text
    content: au-delà de toute mesure.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'je rabrouerai  : cf. 2.3 ; Es 17.13+. –  celui qui dévore  : l''expression désigne probablement le fléau des sauterelles ; cf. Jl 1.4n. –  de la terre  : litt. du sol  ; cf. Gn 2.5n.'
  - type: text
    content: Pour vous, je rabrouerai celui qui dévore,
  - type: text
    content: et il ne vous détruira pas le fruit de la terre,
  - type: text
    content: et la vigne ne sera pas stérile dans vos campagnes,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'vous déclareront heureux  : cf. v. 15 ; Gn 30.13 ; Ps 72.17 ; Jb 29.11 ; Pr 31.28 ; Lc 1.48. –  pays de délices  : cf. Jr 3.19 ; 12.10 ; Za 7.14 ; voir aussi Ps 106.20.'
  - type: text
    content: Toutes les nations vous déclareront heureux,
  - type: text
    content: car vous serez un pays de délices,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Le jour où Dieu révélera sa justice
  '13':
  - type: text
    content: ' '
  - type: note
    content: Cf. Jd 15.
  - type: text
    content: Vos paroles ont été dures contre moi,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: text
    content: 'Et vous avez dit :'
  - type: text
    content: « En quoi avons-nous parlé entre nous contre toi ? »
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 18 ; Jb 21.14s. –  assurer son service ou garder (cf. v. 7) ses observances  ; le même terme est fréquent en Nb (1.53n) et Ez (40.45n) ; cf. Lv 8.35n  ; Za 3.7. –  la mine sombre ou dans le deuil  ; expressions comparables en Ps 35.14n  ; 38.7 ; 42.10 ; 43.2 ; cf. Es 58.3ss ; Za 7.1ss ; 8.18s. –  à cause du  : autres traductions possibles loin du ou devant le  ; cf. Gn 17.1 ; 24.40 ; 48.15 ; 1R 8.23ss ; Ps 56.14 ; 116.9.'
  - type: text
    content: 'Vous avez dit :'
  - type: text
    content: '« C''est inutilement que l''on sert Dieu :'
  - type: text
    content: qu'avons-nous gagné à assurer son service
  - type: text
    content: et à marcher la mine sombre
  - type: text
    content: 'à cause du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées ?'
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.17+. –  nous déclarons heureux  : cf. v. 12. –  gens arrogants v. 19 ; Ps 19.14+. –  ont prospéré  : litt. ont été bâtis , c.-à-d. sont solidement établis ; cf. Jr 12.16n.'
  - type: text
    content: Maintenant nous déclarons heureux les gens arrogants ;
  - type: text
    content: oui, ceux qui agissent en méchants ont prospéré ;
  - type: text
    content: oui, ils ont mis Dieu à l'épreuve et ils échappent ! »
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Alors  : LXX ainsi . –  ceux qui craignent le Seigneur  : cette expression désigne peut-être ici une classe particulière de fidèles  ; cf. v. 5+ ; Ps 15.4+ ; Ac 10.2n. –  livre d''évocation (ou de souvenir , cf. v. 22) : cf. Est 6.1ss ; voir aussi Ex 32.32 ; Es 4.3 ; 65.6 ; Ez 13.9 ; Ps 56.9 ; 69.29 ; 139.16n  ; Jb 19.23s ; Né 13.1ss ; Lc 10.20 ; Ap 3.5+. –  qui respectent  : litt. qui estiment , c.-à-d. qui vénèrent (vraiment) ; le verbe hébreu correspondant est traduit par vouloir en Jr 23.27.'
  - type: text
    content: 'Alors ceux qui craignent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' se parlèrent l''un à l''autre ;'
  - type: text
    content: 'le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut attentif, il entendit.'
  - type: text
    content: Un livre d'évocation fut écrit devant lui
  - type: text
    content: 'pour ceux qui craignent le '
  - type: text
    content: Seigneur
  - type: text
    content: et qui respectent son nom.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'ils m''appartiendront en propre  : cf. Ex 19.5 ; Dt 7.6 ; 14.2 ; 26.18 ; Ps 135.4 ; 1Ch 29.3 ; voir aussi Ep 1.14 ; Tt 2.14 ; 1P 2.9. –  que je prépare  : litt. que je fais ou que je suis en train de faire , de même au v. 21 ; certains comprennent le jour où j''agirai . –  je les épargnerai ou j''aurai des égards pour eux, j''aurai pitié d''eux  ; cf. 1S 23.21 ; Jr 15.5 ; Jl 2.18 ; voir aussi Es 63.9. –  son fils qui le sert  : cf. 1.6 ; 2S 7.14 ; Ps 103.13 ; 2Co 3.18.'
  - type: text
    content: Ils seront à moi,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: ils m'appartiendront en propre
  - type: text
    content: au jour que je prépare ;
  - type: text
    content: je les épargnerai,
  - type: text
    content: comme un homme épargne son fils qui le sert.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 14s ; 2.17 ; Mt 13.24ss,36ss. –  vous verrez de nouveau  : autre traduction possible vous reviendrez (v. 7) et vous verrez… –  la différence  : sous-entendu dans le texte.'
  - type: text
    content: Ainsi vous verrez de nouveau la différence
  - type: text
    content: entre un juste et un méchant,
  - type: text
    content: entre celui qui sert Dieu
  - type: text
    content: et celui qui ne le sert pas.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Certaines éditions font commencer ici un nouveau chapitre (4.1-6 au lieu de 3.19-24). –  il arrive, le jour v. 2+. –  ardent…  : cf. Dt 32.22 ; Es 10.16s ; 30.27 ; 42.25 ; Jr 21.14 ; So 1.18 ; 3.8 ; Ps 21.10 ; 57.5 ; 83.15s ; 97.3 ; 1Co 3.13. –  arrogants v. 15+. –  comme du chaume Es 5.24 ; 47.14 ; Ab 18. –  rameau ou ramure  ; cf. Ez 17.8,23 ; 19.10 ; 31.3 ; 36.8.'
  - type: text
    content: Car il arrive, le jour,
  - type: text
    content: ardent comme une fournaise.
  - type: text
    content: Tous les arrogants
  - type: text
    content: et tous ceux qui agissent en méchants
  - type: text
    content: seront comme du chaume ;
  - type: text
    content: ce jour qui vient les embrasera,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées,'
  - type: text
    content: il ne leur laissera ni racine ni rameau.
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. v. 19,23 ; Jr 10.10 ; Jl 2.11 ; Na 1.6 ; Ap 6.17 ; voir aussi Jl 1.15+ ; Am 5.18ss. –  de sa venue  : autre traduction de son arrivée . –  le feu du fondeur v. 3 ; Es 48.10 ; Jr 6.29 ; 9.6 ; Za 13.9 ; Ps 17.3. –  lessive  : le mot hébreu rappelle celui qui signifie alliance (v. 1) ; cf. Jr 2.22n.'
  - type: text
    content: Qui pourra soutenir le jour de sa venue ?
  - type: text
    content: Quel est celui qui tiendra debout quand il paraîtra ?
  - type: text
    content: Car il est comme le feu du fondeur,
  - type: text
    content: comme la lessive des blanchisseurs.
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'qui craignez mon nom v. 16+. –  le soleil…  : cf. Lc 1.78n  ; la divinité perse était souvent symbolisée par un disque solaire ailé. –  justice v. 3n  ; Es 41.2n. –  guérison Es 57.18 ; Jr 33.6. –  comme des veaux (ou des taurillons ) à l''étable (c.-à-d. qu''on engraisse ) : d''après LXX, certains modifient légèrement le texte hébreu pour lire comme des veaux lâchés de l''étable (et de la perspective de l''abattage) ; cf. 1S 28.24 ; Jr 46.21 ; Am 6.4 ; voir aussi Jr 50.11.'
  - type: text
    content: Mais pour vous qui craignez mon nom se lèvera
  - type: text
    content: le soleil de la justice,
  - type: text
    content: et la guérison sera sous ses ailes ;
  - type: text
    content: vous sortirez et vous sauterez
  - type: text
    content: comme des veaux à l'étable.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Es 11.14 ; Ab 18s ; Mi 4.11ss ; So 2.9 ; 3.8 ; Ps 149.6ss. –  comme de la cendre  : cf. v. 19. –  au jour… v. 17n.'
  - type: text
    content: Vous foulerez les méchants,
  - type: text
    content: car ils seront comme de la cendre
  - type: text
    content: sous vos pieds
  - type: text
    content: au jour que je prépare,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: heading
    content: Le retour d'Elie
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'LXX place ce v. tout à la fin du livre. –  loi de Moïse  : cf. Dt 33.4 ; Jos 1.7 ; 1R 2.3 ; 2R 23.25 ; Dn 9.11,13 ; Esd 7.6 ; Né 8.1 ; Lc 24.44. –  Moïse Es 63.11s ; Jr 15.1 ; Mi 6.4 ; il est aussi associé à Elie (v. 23) en Mt 17.1ss/ /. –  mon serviteur Ex 14.31 ; Nb 12.7s ; Dt 34.5 ; Jos 1.1s,7,13,15 etc. –  donné  : litt. ordonné , terme apparenté à celui qui est habituellement traduit par commandement  ; cf. Za 1.6. –  Horeb (ou Sinaï ) Ex 3.1n  ; 17.6 ; 33.6 ; Dt 1.2,6 etc. ; 1R 19. –  prescriptions / règles Dt 4.1,5,8,14 etc.'
  - type: text
    content: Souvenez-vous de la loi de Moïse, mon serviteur ;
  - type: text
    content: c'est à lui que j'ai donné, à l'Horeb,
  - type: text
    content: pour tout Israël,
  - type: text
    content: des prescriptions et des règles.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Je vous envoie  : cf. v. 1n. –  Elie 1R 17–2R 2 ; cf. Mt 11.14 ; 17.10ss/  ; 27.47 ; Lc 1.17 ; 9.8 ; Jn 1.21 ; Siracide 48.10 : « Toi (Elie) qui fus désigné, dans les reproches pour les temps à venir, pour apaiser la colère avant qu''elle ne se déchaîne, ramener le cœur du père vers le fils et rétablir les tribus de Jacob (hébreu  : ramener les tribus d''Israël à la lucidité ). » –  avant que n''arrive le jour… v. 2+,19 ; Jl 3.4 ; So 2.2.'
  - type: text
    content: Je vous envoie
  - type: text
    content: Elie, le prophète,
  - type: text
    content: 'avant que n''arrive le jour du '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: jour grand et redoutable.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Ez 22.7 ; Mi 7.5s ; Mc 9.12 ; Lc 1.17 ; Ac 1.6. – Voir cœur . –  anathème  : cf. Nb 21.2 ; Dt 2.34n  ; Jos 6–7 ; 1R 20.42 ; Za 14.11n.'
  - type: text
    content: Il ramènera le cœur des pères vers les fils
  - type: text
    content: et le cœur des fils vers leurs pères,
  - type: text
    content: de peur que je ne vienne mettre à mal le pays en le frappant d'anathème.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Lévi  : cf. 2.4+. –  comme on épure l''or… v. 2+ ; Es 1.25 ; Za 13.9 ; Ps 12.7 ; Pr 17.3 ; 1P 1.7. –  selon la justice  : litt. avec justice , c.-à-d. conformément aux normes établies (cf. 1.7s) ; Ps 4.6n.'
  - type: text
    content: 'Il s''assiéra, tel celui qui fond et purifie l''argent, pour purifier les fils de Lévi, il les épurera comme on épure l''or et l''argent, et ils seront pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' ceux qui apportent l''offrande selon la justice. '
  '4':
  - type: note
    content: Cf. 1.10+ ; Dt 33.8-11. –  comme aux jours… Es 1.26.
  - type: text
    content: 'Alors l''offrande de Juda et de Jérusalem sera douce au '
  - type: text
    content: Seigneur
  - type: text
    content: ', comme aux jours d''autrefois, comme aux années de jadis.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'Je me présenterai à vous  : autre traduction je m''approcherai de vous . –  jugement 2.17n. –  témoigner 2.14 ; Mi 1.2 ; Ps 50.7ss. –  sorciers Ex 22.17 ; Lv 19.26 ; Dt 18.10ss ; 2R 9.22 ; Es 47.9,12 ; Mi 5.11 ; Na 3.4 ; Dn 2.2 ; Ga 5.20. –  adultères  : cf. 2.14ss ; voir aussi Ez 16.15ss ; Os 1.2n  ; Né 5.5. –  faux serments Lv 5.22ss ; 19.12+ ; Jr 5.2 ; 7.9 ; Za 5.4 ; cf. Jr 4.2. –  le salarié (litt. le salaire du salarié , Lv 19.13 ; 25.6 ; Dt 24.14 ; Jc 5.4) , la veuve et l''orphelin…  : cf. Ex 22.21s ; Dt 10.18 ; 14.29 ; 16.11 ; 24.17-21 ; 27.19 ; Jr 5.28 ; 7.6 ; 22.3 ; Ez 22.7 ; Za 7.10 ; voir aussi Am 4.1 ; Pr 14.31 ; 22.16 ; 28.3. –  l''immigré Ex 12.48n. –  ne me craignent pas  : cf. v. 16ss ; 1.6n.'
  - type: text
    content: Je me présenterai à vous pour le jugement,
  - type: text
    content: et je me hâterai de témoigner
  - type: text
    content: contre les sorciers et les adultères,
  - type: text
    content: contre ceux qui font de faux serments,
  - type: text
    content: contre ceux qui oppriment le salarié, la veuve et l'orphelin,
  - type: text
    content: qui lèsent l'immigré
  - type: text
    content: et ne me craignent pas,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'je n''ai pas changé  : cf. Nb 23.19 ; Ps 102.27s ; Rm 11.29 ; Jc 1.17 ; voir aussi Os 11.9. –  fils de Jacob Gn 49.2 ; 2R 17.34 ; Ps 77.16 ; 105.6 ; 1Ch 16.13. –  vous n''avez pas été exterminés Lm 3.22 ; certains comprennent  : vous n''en avez pas fini (de votre attitude perfide, comparable à celle de Jacob 1.2n  ; cf. Es 43.27 ; Os 12.3ss,13ss). Dans ce sens la phrase introduirait les versets suivants.'
  - type: text
    content: 'Car moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH),'
  - type: text
    content: je n'ai pas changé ;
  - type: text
    content: et vous, fils de Jacob,
  - type: text
    content: vous n'avez pas été exterminés.
  - type: heading
    content: Revenir au Seigneur
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'vos pères Jr 3.25 ; 7.24s ; 22.21 ; 32.30 ; Ez 2.3 ; 20.8ss. –  écartés Ex 32.8 ; Dt 17.20 ; 28.14 ; Jos 23.6. –  mes prescriptions  : cf. Dt 4.6 ; 6.24 ; 16.12 ; 17.19. –  pas gardées v. 14n. –  Revenez… Za 1.3 ; cf. Os 2.25 ; Jc 4.8. –  En quoi… 1.2+ ; 2.14.'
  - type: text
    content: Depuis le temps de vos pères,
  - type: text
    content: vous vous êtes écartés de mes prescriptions,
  - type: text
    content: vous ne les avez pas gardées.
  - type: text
    content: Revenez à moi,
  - type: text
    content: et je reviendrai à vous,
  - type: text
    content: 'dit le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées.'
  - type: text
    content: 'Et vous dites :'
  - type: text
    content: « En quoi devons-nous revenir ? »
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'frustrer  : même verbe en Pr 22.23 ; certains intervertissent ici deux lettres du texte hébreu traditionnel pour lire un autre verbe signifiant tromper, circonvenir, supplanter , qui est apparenté au nom de Jacob (v. 6n) ; voir 1.14 ; Ac 5.1ss. –  Dieu , ou plus généralement un dieu, les dieux (cf. Gn 1.1n  ; 3.5n). –  dîme (Gn 14.20 ; Lv 27.30ss ; Nb 18.20ss ; Dt 14.28s ; 26.12 ; Am 4.4) et prélèvement (Ex 25.2s ; 30.14s ; 35.5,21,24 ; 36.3 ; Nb 15.19 ; Ez 44.30 ; 45.13ss) sont aussi associés en Dt 12.6,11,17 ; Né 10.38ss ; 12.44 ; cf. 13.12.'
  - type: text
    content: Un être humain peut-il frustrer Dieu ?
  - type: text
    content: Oui, vous me frustrez,
  - type: text
    content: 'et vous dites :'
  - type: text
    content: « En quoi t'avons-nous frustré ? »
  - type: text
    content: – C'est sur la dîme et le prélèvement !
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'frappés  : litt. maudits  ; cf. 1.14 ; 2.2 ; Lv 26.14ss ; Dt 28.15ss ; Ag 1.5s,10s ; Za 5.2ss ; voir aussi Am 4.6-12. – Voir bénédiction .'
  - type: text
    content: Vous êtes frappés par la malédiction
  - type: text
    content: et vous me frustrez,
  - type: text
    content: vous, la nation tout entière !
