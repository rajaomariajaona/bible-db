document_id: ISA.8,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Un fils d'Esaïe au nom symbolique
  - type: text
    content: ' '
  - type: note
    content: 'tablette  : le même mot hébreu est traduit par miroirs en 3.23. Certains, le rapprochant ici d''une autre racine, pensent qu''il désigne un sceau (cylindrique) destiné à l''usage de l''enfant à naître. –  écris  : cf. 30.8 ; Jr 30.2 ; 36.2 ; Ha 2.2. –  d''une manière intelligible  : litt. avec un burin (même terme en Ex 32.4n) d''homme. Expression obscure, qui suggère un support de pierre ou d''argile. –  Maher-Shalal-Hash-Baz signifie vite au butin, en hâte au pillage ou prompt butin, proche pillage  ; c''est le nom de 8.3n, précédé ici de la préposition correspondant à à ou de , ce qui conviendrait à un sceau utilisé pour authentifier des documents ou pour marquer la propriété ; cf. 10.2n,6n.'
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Prends une grande tablette et écris dessus, d''une manière intelligible : Maher-Shalal-Hash-Baz (« Vite au butin, en hâte au pillage ! ») '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'projet ou dessein , cf. 5.19n  ; Ps 33.10s ; Pr 21.30. –  parole  : cf. Os 10.4. –  ne tiendra pas 7.7+. –  Dieu est avec nous  : hébreu ‘immanou ’el , cf. v. 8 ; 7.14n  ; voir aussi Rm 8.31.'
  - type: text
    content: Faites un projet ;
  - type: text
    content: il échouera !
  - type: text
    content: Dites une parole ;
  - type: text
    content: elle ne tiendra pas !
  - type: text
    content: Car Dieu est avec nous.
  - type: heading
    content: C'est le Seigneur que vous devez craindre
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'quand sa main m''a saisi  : litt. dans le saisissement (ou le renforcement ) de la main , expression ambiguë ; cf. 41.13 ; 42.6 ; 51.18 ; Ex 3.19 ; 14.31 ; 1R 18.46 ; 2R 3.15 ; Ez 3.14. –  ce peuple 6.9+. – Cf. Jr 15.17 ; 20.7 ; Ez 2.8.'
  - type: text
    content: 'Car ainsi m''a parlé le '
  - type: text
    content: Seigneur
  - type: text
    content: ' quand sa main m''a saisi, quand il m''a instruit pour que je ne suive pas la voie de ce peuple :'
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Vous  : cf. 8.16. –  conspiration  : même terme en 2S 15.12 ; 1R 16.20 ; 2R 11.14 ; 12.21 ; 14.19 ; 15.15,30 ; 17.4 ; verbe de la même racine en Ps 31.14 ; Né 4.2 ( se liguer ) ; cf. Am 7.10. –  vous ne craindrez pas 7.2,4+. –  vous ne le redouterez pas  : litt. vous ne redouterez pas.'
  - type: text
    content: Vous n'appellerez pas conspiration
  - type: text
    content: tout ce que ce peuple appelle conspiration ;
  - type: text
    content: vous ne craindrez pas ce qu'il craint,
  - type: text
    content: vous ne le redouterez pas.
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Texte cité d''après LXX en 1P 3.14s. –  reconnaître pour saint  : traduction traditionnelle sanctifier 5.16+ ; cf. 29.22s.'
  - type: text
    content: 'C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: que vous devez reconnaître pour saint,
  - type: text
    content: c'est lui que vous devez craindre,
  - type: text
    content: c'est lui que vous devez redouter.
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'sanctuaire Ez 11.16 ; Ap 21.22. –  pierre de malheur (mot habituellement traduit par fléau , cf. Ex 12.13 ; 30.12 ; Nb 8.19+ ; terme apparenté pour heurter en Ps 91.12 ; Pr 3.23 ; LXX pierre d''achoppement ) / rocher qui cause la chute  : cf. Es 28.16 ; ces deux expressions (cf. 57.14n) n''apparaissent qu''ici dans l''A.T. ; cf. Jr 6.21n  ; Ez 3.20n  ; 7.19n  ; Ps 119.165 ; voir Lc 2.34 ; Rm 9.32s ; 1P 2.6-8. Sur le renversement de l''image habituellement positive de la pierre et du rocher (17.10+ ; Gn 49.24 ; Dt 32.4,15,18,30,31 ; 1S 7.12 ; 2S 22.2), cf. 31.1. –  les deux maisons  : sans doute Samarie et Jérusalem. –  filet Ez 12.13+ ; Ps 9.16+.'
  - type: text
    content: Alors il sera un sanctuaire,
  - type: text
    content: mais aussi une pierre de malheur,
  - type: text
    content: un rocher qui cause la chute,
  - type: text
    content: pour les deux maisons d'Israël,
  - type: text
    content: un filet et un piège
  - type: text
    content: pour les habitants de Jérusalem.
  '15':
  - type: text
    content: ' '
  - type: note
    content: Cf. 28.13 ; Mt 21.44/ /.
  - type: text
    content: Beaucoup y trébucheront ;
  - type: text
    content: ils tomberont et se briseront,
  - type: text
    content: ils seront pris au piège et capturés.
  - type: heading
    content: Attente et espérance du prophète
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'Conserve  : même verbe en Dt 14.25 ; Ez 5.3 ( serrer ). –  ce témoignage ou cette attestation  ; cf. v. 2,20 ; 30.8 ; même terme Rt 4.7. –  scelle 29.11 ( cacheté ) ; 1R 21.8 ; Jr 32.11,14 ; Dn 12.4. –  cette loi  : autre traduction cet enseignement , litt. une loi ou un enseignement , en hébreu tora  ; cf. 1.10n  ; Pr 1.8n.'
  - type: text
    content: Conserve ce témoignage,
  - type: text
    content: scelle cette loi parmi mes disciples.
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'J''attends le Seigneur 30.18 ; 64.3 ; Ps 33.20. –  qui se détourne de…  : litt. qui cache sa face à…  ; cf. 54.8+. –  maison de Jacob 2.5+. –  j''ai mis en lui mon espérance Hé 2.13.'
  - type: text
    content: 'J''attends le '
  - type: text
    content: Seigneur
  - type: text
    content: ','
  - type: text
    content: qui se détourne de la maison de Jacob ;
  - type: text
    content: j'ai mis en lui mon espérance.
  '18':
  - type: text
    content: ' '
  - type: note
    content: Moi-même… Hé 2.13. –  enfants 7.3 ; 8.1-4 ; cf. 59.21 ; Jr 16.1-8 ; Ez 24.15-24 ; Os 1–3. –  signes 7.11n. –  présages ou prodiges , voir Ez 12.6+. –  Sion 2.2-3+ ; Ps 132.13.
  - type: text
    content: 'Moi-même et les enfants que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' m''a donnés,'
  - type: text
    content: nous sommes des signes et des présages en Israël
  - type: text
    content: 'de la part du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) des Armées'
  - type: text
    content: qui demeure au mont Sion.
  '19':
  - type: text
    content: ' '
  - type: note
    content: 'Si l''on vous dit  : on hésite sur l''étendue de la citation ; celle-ci pourrait s''arrêter au milieu du v. ou se poursuivre jusqu''à la fin, voire jusqu''au premier vers du v. 20. –  chuchotent  : même verbe en 10.14 ( pousser un pépiement ) ; 38.14 ( pousser des petits cris ). –  murmurent  : même verbe en 38.14 ( gémir ). –  Un peuple…  : LXX un peuple ne (va-t-il) pas vers son Dieu ? Pourquoi cherchent-ils les morts pour les vivants ? (Cf. Dt 18.14s ; 1S 28.9). On pourrait aussi traduire  : Un peuple ne consultera-t-il pas son Dieu ? (Gn 1.1n  ; 3.5n  ; cf. 1S 28.13 ; 2R 1.3)  ; doit-on s''adresser aux morts pour des vivants ? Cf. Lv 19.31 ; 20.6,27 ; Dt 18.11 ; 1S 28.3ss ; 2R 21.6 ; 23.24.'
  - type: text
    content: 'Si l''on vous dit :'
  - type: text
    content: Consultez les spirites et les médiums,
  - type: text
    content: qui chuchotent et murmurent !
  - type: text
    content: Un peuple ne consulte-t-il pas ses dieux ?
  - type: text
    content: Ne s'adresse-t-on pas aux morts pour les vivants ?
  '2':
  - type: note
    content: 'Je fis témoigner pour moi  : un ms hébreu et des versions anciennes ont lu l''impératif  : fais témoigner. –  des témoins Dt 19.15. –  Urie, le prêtre 2R 16.10s ; cf. Jos 17.4 ; 1S 23.9 ; 2S 15.27 ; 1R 1.7s ; 4.2 ; 2R 11.10-12. –  Zacharie pourrait être le grand-père maternel d''Ezéchias, c.-à-d. le beau-père d''Achaz 2R 18.2 ; 2Ch 29.1. –  Yebérékia  : hébreu Yebérékyahou.'
  - type: text
    content: 'Je fis témoigner pour moi des témoins sûrs : Urie, le prêtre, et Zacharie, fils de Yebérékia. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'A la loi…  : on pourrait aussi rattacher ce vers au v. 19 pour lire afin d''en recevoir enseignement et avertissement  ; cf. v. 16n. –  Si on ne parle pas ainsi…  : autre traduction sans faute (formule de serment) c''est ainsi qu''on parlera (ou qu''il faut parler ) ; cf. 5.9n. –  c''est qu''il n''y aura pas…  : litt. pas pour lui d''aurore ou de conjuration (cf. 47.11n).'
  - type: text
    content: A la loi et au témoignage !
  - type: text
    content: Si on ne parle pas ainsi,
  - type: text
    content: c'est qu'il n'y aura pas d'aurore pour le peuple.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'le pays  : sous-entendu dans le texte. –  maudira…  : cf. Ex 22.27 ; 1R 21.10 ; voir bénédiction. –  son Dieu ou ses dieux (cf. v. 19n).'
  - type: text
    content: Il traversera le pays accablé et affamé ;
  - type: text
    content: et, quand il aura faim,
  - type: text
    content: il s'irritera,
  - type: text
    content: maudira son roi et son Dieu,
  - type: text
    content: il se tournera vers le haut.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'vers la terre  : cf. 5.30 ; 51.6. –  il sera repoussé dans d''épaisses ténèbres  : autre traduction et d''épaisses ténèbres sans cesse reculées  ; même racine en 16.3s ( réfugiés ) ; 27.13 ( dispersés ) ; Dt 30.4 et 2S 14.13 ( banni ). – Cf. Mi 3.6 ; Rm 2.9.'
  - type: text
    content: 'Puis il regardera vers la terre :'
  - type: text
    content: ce sera la détresse, l'obscurité et de sombres angoisses ;
  - type: text
    content: il sera repoussé dans d'épaisses ténèbres.
  - type: heading
    content: Le Prince de la paix
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Mais les ténèbres… angoisses  : interprétation traditionnelle d''un vers dont le sens reste obscur. Autre traduction il ne s''en tirera pas, celui qui connaît ces angoisses. Des versions anciennes (grec et araméen) ont lu  : il ne sera pas abandonné, celui qui est dans l''angoisse. La plupart des traducteurs modernes modifient le texte hébreu traditionnel. On pourrait traduire l''hébreu en référence au roi d''Assyrie (7.20 ; 8.4,7)  : car il n''est pas fatigué, celui qui cause sa détresse , en rattachant le membre de phrase au paragraphe précédent. – Les territoires désignés par ce v., au nord du royaume d''Israël, ont été envahis et soumis par les Assyriens (vers 732 ; cf. 2R 15.29) : la route de la mer était probablement la grande route qui reliait l''Egypte à la Syrie en longeant le littoral méditerranéen. L''expression l''autre côté du Jourdain , souvent traduite Transjordanie (Nb 22.1n  ; 32.19n  ; Dt 1.1n), désigne ici la région souvent disputée de Galaad (Gn 31.21n  ; 2S 2.9 ; 1R 22.3-6 ; 2R 10.32s) ; territoire (ou circonscription ) des nations (ou non-Juifs, païens ), en hébreu gelil haggoyim , a donné le nom propre Galilée (Jos 20.7 ; 21.32 ; 1R 9.11 ; 2R 15.29 ; Mt 4.15 ). – Voir gloire.'
  - type: text
    content: Mais les ténèbres ne régneront pas toujours
  - type: text
    content: sur la terre où il y a maintenant des angoisses.
  - type: text
    content: Si le passé a réduit à peu de chose
  - type: text
    content: le pays de Zabulon et le pays de Nephtali,
  - type: text
    content: l'avenir donnera de la gloire
  - type: text
    content: à la route de la mer, à l'autre côté du Jourdain,
  - type: text
    content: au territoire des nations.
  '3':
  - type: note
    content: 'Je m''étais approché  : euphémisme évoquant des relations sexuelles. –  la prophétesse  : la femme du prophète (cf. Os 1.1-9) ; ailleurs ce terme désigne des femmes prophètes (Ex 15.20 ; Jg 4.4 ; 2R 22.14 ; Né 6.14 ; 2Ch 34.22). –  Maher-Shalal-Hash-Baz v. 1n.'
  - type: text
    content: 'Je m''étais approché de la prophétesse ; elle fut enceinte et mit au monde un fils. Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit : Appelle-le du nom de Maher-Shalal-Hash-Baz (« Vite au butin, en hâte au pillage ! ») ; '
  '4':
  - type: note
    content: 'avant que l''enfant…  : cf. 7.16. –  Papa ! Maman ! ou Père ! Mère ! (Gn 22.7n etc.), litt. mon père et ma mère. –  richesses  : le mot hébreu correspondant signifie aussi force ou armée  ; de même en 10.14 ; 60.5. – Voir Samaritains. – Cf. 7.20 ; 10.9 ; 17.1-3.'
  - type: text
    content: 'car, avant que l''enfant sache dire : « Papa ! Maman ! », on emportera les richesses de Damas et le butin de Samarie devant le roi d''Assyrie.'
  - type: heading
    content: L'invasion assyrienne
  '5':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' me dit encore :'
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'ce peuple 6.9+. –  a rejeté  : autres traductions a méprisé ; a renoncé (aux)  ; cf. Jb 7.16n. –  les eaux de Siloé  : référence au système qui alimentait Jérusalem en eau potable à partir de la source de Guihôn (cf. 12.3 ; 1R 8.38 ; Jr 2.13) avant le canal d''Ezéchias (2R 20.20 ; 2Ch 32.30). Le nom Siloé peut signifier envoyé ou canal (cf. Né 3.15n  ; Jn 9.7-11). Symbole de l''eau vivifiante par opposition à l''eau dévastatrice (v. 7). –  doucement  : cf. 30.15 ; Ez 47.1-12. –  il s''est réjoui…  : il y avait probablement une faction à Jérusalem en faveur du régime qu''Ephraïm voulait instaurer en la personne du fils de Tabéel (cf. 7.1-9,13). Certains modifient le texte hébreu traditionnel pour lire il tombe en défaillance (comme en 10.18).'
  - type: text
    content: Parce que ce peuple a rejeté
  - type: text
    content: les eaux de Siloé
  - type: text
    content: qui coulent doucement
  - type: text
    content: et qu'il s'est réjoui au sujet de Retsîn
  - type: text
    content: et du fils de Remalia,
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'contre eux ou sur eux, au-dessus d''eux . –  fleuve 7.20n  ; cf. 17.12-14 ; Jr 46.7 ; 47.2 ; 51.42 ; Dn 9.26 ; 11.10,40. –  sa gloire  : autre traduction sa noblesse. –  de son lit  : cf. Ps 18.16n.'
  - type: text
    content: voilà pourquoi le Seigneur
  - type: text
    content: fait monter contre eux
  - type: text
    content: les eaux puissantes, les grandes eaux du fleuve
  - type: text
    content: – le roi d'Assyrie et toute sa gloire.
  - type: text
    content: Partout il débordera de son lit
  - type: text
    content: et il s'en ira par-dessus toutes ses rives ;
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'il balaiera  : cf. 2.18n  ; 21.1. –  déferlera ou inondera , 10.22+. –  jusqu''au cou 30.28. –  déploiement de ses ailes  : cf. Jr 48.40s ; 49.22 ; Os 8.1. –  remplira l''étendue de ton pays  : l''expression rappelle celle de 6.3 ( toute la terre est remplie… ) ; c''est le même mot hébreu qui est traduit tantôt par terre , tantôt par pays. Cf. 10.28-32 ; 36.1. –  Immanou-El  : cf. v. 10n  ; 7.14n.'
  - type: text
    content: il balaiera Juda,
  - type: text
    content: il déferlera et submergera,
  - type: text
    content: il montera jusqu'au cou.
  - type: text
    content: Le déploiement de ses ailes
  - type: text
    content: remplira l'étendue de ton pays, Immanou-El !
  - type: heading
    content: Dieu est avec nous
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Sur l''ensemble, cf. Ps 48 ; 76 ; 110. –  Poussez une clameur  : traduction incertaine ; on pourrait aussi comprendre soyez malheureux  ; LXX a lu Sachez(-le) , ce qui correspondrait à une légère modification du texte hébreu. –  au plus lointain de la terre ou du pays (v. 8n) cf. 10.3 ; 17.13 ; 30.27 ; Ps 2.8 ; 46.7,11. –  Préparez-vous au combat (litt. ceignez-vous , cf. 45.5)  ; vous serez terrifiés (le verbe correspondant est rendu par brisé en 7.8 ; autre forme du même verbe hébreu en début de v.) : ces deux verbes sont répétés deux fois dans les principaux mss.'
  - type: text
    content: Poussez une clameur, peuples ;
  - type: text
    content: vous serez terrifiés !
  - type: text
    content: Prêtez l'oreille, vous tous,
  - type: text
    content: au plus lointain de la terre !
  - type: text
    content: Préparez-vous au combat ;
  - type: text
    content: vous serez terrifiés !
  - type: text
    content: Préparez-vous au combat ;
  - type: text
    content: vous serez terrifiés !
