      - type: usfm
        marker: fqa
        children:
        - type: text
          text: et ce sera la ville…
      marker-yv: yv-n
    - type: text
      text: 'Quand on aura déterminé la ville la plus proche du cadavre, les anciens de cette ville prendront une génisse qui n''a servi à aucun travail, qui n''a jamais porté le joug. '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.4 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'cours d''eau pérenne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'torrent intarissable '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(Am 5.24) ; c.-à-d. qui coule toute l''année. Le mot traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'pérenne '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: désigne aussi le septième mois (septembre-octobre, cf. 1R 8.2), c.-à-d. la fin de la saison sèche, où seuls les torrents pérennes coulent encore ; voir aussi Ps 74.15 ; Jb 12.19
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: . – Cf. Ex 13.13.
      marker-yv: yv-n
    - type: text
      text: 'Les anciens de cette ville feront descendre la génisse vers un cours d''eau pérenne où il n''y a ni culture ni semence ; là, ils briseront la nuque de la génisse, dans le cours d''eau. '
