          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le cadavre d'un homme gisant
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'un transpercé '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. un homme mort de mort violente) '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tombé.
      marker-yv: yv-n
    - type: text
      text: 'Si, sur la terre que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te donne en possession, on trouve le cadavre d''un homme gisant dans la campagne, sans qu''on sache qui l''a abattu, '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.10 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Cf. 20.14-16.
      marker-yv: yv-n
    - type: text
      text: 'Lorsque tu pars en guerre contre tes ennemis, que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' te les livre et que tu fais des captifs, '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: text
      text: 'si tu vois parmi les captives une belle femme, que tu t''éprennes d''elle et que tu la prennes pour femme, '
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.12 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Elle se rasera…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : signes de rupture avec son existence passée.'
      marker-yv: yv-n
    - type: text
      text: 'alors tu l''amèneras dans ta maison. Elle se rasera la tête et se coupera les ongles, '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: un mois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: une lune de jours
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 2R 15.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; voir aussi Dt 34.8.'
      marker-yv: yv-n
    - type: text
      text: 'elle quittera son manteau de captive, elle habitera chez toi et pleurera son père et sa mère pendant un mois. Après cela, tu iras avec elle, tu l''épouseras et elle sera ta femme. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu ne pourras pas la vendre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Ex 21.8. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: réduire en esclavage
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : traduction incertaine ; même verbe en 24.7 ; certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: maltraiter
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tu auras abusé d''elle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: tu l'auras humiliée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', de même 22.24,29 ; Gn 34.2+.'
      marker-yv: yv-n
    - type: text
      text: Si elle cesse de te plaire, tu la laisseras aller où elle voudra ; tu ne pourras pas la vendre pour de l'argent ni la réduire en esclavage, parce que tu auras abusé d'elle.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les droits du fils aîné
    marker-yv: yv-h
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: aime l'une et n'aime pas l'autre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: l'une aimée et l'une détestée
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: haïe
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' ; de même, dans la suite, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'ne pas aimer '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'traduit le verbe habituellement rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: détester
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 22.13
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Gn 29.30-31'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 1S 1.5 ; voir aussi Lc 14.26.'
      marker-yv: yv-n
    - type: text
      text: 'Si un homme qui a deux femmes aime l''une et n''aime pas l''autre, qu''il ait des fils de celle qu''il aime et de celle qu''il n''aime pas, et que le premier-né soit de la femme qu''il n''aime pas, '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'droit d''aînesse '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 25.31 ; 27.36 ; 1Ch 5.1s.
      marker-yv: yv-n
    - type: text
      text: 'il ne pourra pas, le jour où il partagera son patrimoine entre ses fils, donner le droit d''aînesse au fils de celle qu''il aime, de préférence au fils de celle qu''il n''aime pas, celui-ci étant le premier-né. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.17 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: une double part
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. 2R 2.9. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'prémices de sa vigueur '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Gn 49.3.
      marker-yv: yv-n
    - type: text
      text: 'Il reconnaîtra pour premier-né le fils de celle qu''il n''aime pas et lui donnera une double part de tout son avoir : ce fils est les prémices de sa vigueur, le droit d''aînesse lui appartient.'
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le fils indocile
    marker-yv: yv-h
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: fils… rebelle
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. Es 1.2 ; Os 11.2. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui n''écoute… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Pr 1.8 ; 6.20. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'corrigent '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '4.36'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; cf. 11.2.'
      marker-yv: yv-n
    - type: text
      text: 'Si un homme a un fils indocile et rebelle, qui n''écoute ni son père, ni sa mère, s''ils le corrigent et qu''il ne les écoute pas, '
  '19':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '19'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.19 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: le mèneront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: le feront sortir
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 17.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à la porte…
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à la porte de son lieu.
      marker-yv: yv-n
    - type: text
      text: 'le père et la mère le saisiront et le mèneront vers les anciens de sa ville, à la porte de sa ville. '
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: anciens
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tes juges
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Smr
        - type: text
          text: ' porte ici '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tes scribes '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(le même mot est traduit par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'secrétaires '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: en 1.15
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: ).
      marker-yv: yv-n
    - type: text
      text: 'tes anciens et tes juges iront mesurer les distances à partir du cadavre jusqu''aux villes des environs. '
  '20':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '20'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.20 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'débauché '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: glouton
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') / '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ivrogne
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Pr 23.20s ; 28.7 ; voir aussi Mt 11.19/ /.'
      marker-yv: yv-n
    - type: text
      text: 'Ils diront aux anciens de sa ville : « Voici notre fils, il est indocile et rebelle, il ne nous écoute pas ; c''est un débauché et un ivrogne. » '
  '21':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '21'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.21 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'le lapideront '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.11+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Tu élimineras… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.6'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'tout Israël l''apprendra '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: entendra, écoutera
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: '… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '13.12+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: peur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: crainte
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: Tous les hommes de sa ville le lapideront, et il mourra. Tu élimineras ainsi de ton sein ce qui est mauvais ; tout Israël l'apprendra, et ils auront peur.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le cadavre d'un pendu
    marker-yv: yv-h
  '22':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '22'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.22 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: et que tu l'aies pendu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : on comprend habituellement qu''il s''agit de l''exposition d''un cadavre après la mise à mort (par lapidation p. ex.), mais on a aussi interprété ce v. comme la description d''une exécution par pendaison ou crucifixion. Voir Ga 3.13'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: à un bois
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: à un arbre
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text:  ; cf. 16.21
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; 19.5'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Est 2.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '  ; Ac 5.30 ; 10.39 ; 1P 2.24.'
      marker-yv: yv-n
    - type: text
      text: 'Si un homme coupable d''un péché passible de mort a été mis à mort et que tu l''aies pendu à un bois, '
  '23':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '23'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '21.23 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tu l'enseveliras le jour même
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Jos 8.29 ; 10.26 ; Mt 27.57-60/ / ; Jn 19.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'est une malédiction de Dieu '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: Ga 3.13
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; 1P 2.24 ; voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: bénédiction
        - type: text
          text: ', malédiction. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: impure
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
        - type: text
          text: ', impur.'
      marker-yv: yv-n
    - type: text
      text: 'son cadavre ne passera pas la nuit sur le bois : tu l''enseveliras le jour même, car celui qui est pendu est une malédiction de Dieu ; tu ne rendras pas impure la terre que le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ', ton Dieu, te donne comme patrimoine.'
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
