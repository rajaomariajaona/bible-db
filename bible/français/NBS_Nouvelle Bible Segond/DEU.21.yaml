      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. Nb 19.2 ; voir aussi Ex 20.25 ; Mc 11.2 ; Lc 19.30. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Quand on aura déterminé la ville…
      - type: usfm
        marker: ft
        children:
        - type: text
