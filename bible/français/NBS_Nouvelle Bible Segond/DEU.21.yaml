          children:
          - type: text
            text: d'Hammourabi
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '23s : « Si l''on n''a pas pris le voleur, l''homme qui a été victime du vol décrira en détail, devant le dieu, ce qu''il a perdu, et la ville et le gouverneur dans le territoire ou la juridiction desquels le vol a été commis lui donneront compensation du bien qu''il a perdu. S''il s''agit d''une vie, la ville et le gouverneur paieront une mine d''argent aux ayants droit. »'
      marker-yv: yv-n
    - type: text
      text: 'Ils déclareront : « Nos mains n''ont pas répandu ce sang, et nos yeux ne l''ont pas vu répandre. '
