document_id: DEU.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Meurtre dont l'auteur est inconnu
  - type: text
    content: ' '
  - type: note
    content: 'la terre  : cf. v. 23 ; Gn 2.5n  ; 4.10n. –  le cadavre d''un homme gisant  : litt. un transpercé (c.-à-d. un homme mort de mort violente) tombé.'
  - type: text
    content: 'Si, sur la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne en possession, on trouve le cadavre d''un homme gisant dans la campagne, sans qu''on sache qui l''a abattu, '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. 20.14-16.
  - type: text
    content: 'Lorsque tu pars en guerre contre tes ennemis, que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' te les livre et que tu fais des captifs, '
  '11':
  - type: text
    content: 'si tu vois parmi les captives une belle femme, que tu t''éprennes d''elle et que tu la prennes pour femme, '
  '12':
  - type: note
    content: 'Elle se rasera…  : signes de rupture avec son existence passée.'
  - type: text
    content: 'alors tu l''amèneras dans ta maison. Elle se rasera la tête et se coupera les ongles, '
  '13':
  - type: note
    content: 'un mois  : litt. une lune de jours, cf. 2R 15.13n  ; voir aussi Dt 34.8.'
  - type: text
    content: 'elle quittera son manteau de captive, elle habitera chez toi et pleurera son père et sa mère pendant un mois. Après cela, tu iras avec elle, tu l''épouseras et elle sera ta femme. '
  '14':
  - type: note
    content: 'tu ne pourras pas la vendre  : cf. Ex 21.8. –  réduire en esclavage  : traduction incertaine ; même verbe en 24.7 ; certains traduisent maltraiter. –  tu auras abusé d''elle ou tu l''auras humiliée, de même 22.24,29 ; Gn 34.2+.'
  - type: text
    content: Si elle cesse de te plaire, tu la laisseras aller où elle voudra ; tu ne pourras pas la vendre pour de l'argent ni la réduire en esclavage, parce que tu auras abusé d'elle.
  - type: heading
    content: Les droits du fils aîné
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'aime l''une et n''aime pas l''autre  : litt. l''une aimée et l''une détestée , ou haïe  ; de même, dans la suite, ne pas aimer traduit le verbe habituellement rendu par détester  ; cf. 22.13n  ; Gn 29.30-31n  ; 1S 1.5 ; voir aussi Lc 14.26.'
  - type: text
    content: 'Si un homme qui a deux femmes aime l''une et n''aime pas l''autre, qu''il ait des fils de celle qu''il aime et de celle qu''il n''aime pas, et que le premier-né soit de la femme qu''il n''aime pas, '
  '16':
  - type: note
    content: droit d'aînesse Gn 25.31 ; 27.36 ; 1Ch 5.1s.
  - type: text
    content: 'il ne pourra pas, le jour où il partagera son patrimoine entre ses fils, donner le droit d''aînesse au fils de celle qu''il aime, de préférence au fils de celle qu''il n''aime pas, celui-ci étant le premier-né. '
  '17':
  - type: note
    content: 'une double part  : cf. 2R 2.9. –  prémices de sa vigueur Gn 49.3.'
  - type: text
    content: 'Il reconnaîtra pour premier-né le fils de celle qu''il n''aime pas et lui donnera une double part de tout son avoir : ce fils est les prémices de sa vigueur, le droit d''aînesse lui appartient.'
  - type: heading
    content: Le fils indocile
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'fils… rebelle  : cf. Es 1.2 ; Os 11.2. –  qui n''écoute… Pr 1.8 ; 6.20. –  corrigent 4.36n  ; cf. 11.2.'
  - type: text
    content: 'Si un homme a un fils indocile et rebelle, qui n''écoute ni son père, ni sa mère, s''ils le corrigent et qu''il ne les écoute pas, '
  '19':
  - type: note
    content: 'le mèneront  : litt. le feront sortir, cf. 17.5n. –  à la porte…  : litt. à la porte de son lieu.'
  - type: text
    content: 'le père et la mère le saisiront et le mèneront vers les anciens de sa ville, à la porte de sa ville. '
  '2':
  - type: note
    content: 'Voir anciens. –  tes juges  : Smr porte ici tes scribes (le même mot est traduit par secrétaires en 1.15n).'
  - type: text
    content: 'tes anciens et tes juges iront mesurer les distances à partir du cadavre jusqu''aux villes des environs. '
  '20':
  - type: note
    content: 'débauché (autre traduction glouton) / ivrogne  : cf. Pr 23.20s ; 28.7 ; voir aussi Mt 11.19/ /.'
  - type: text
    content: 'Ils diront aux anciens de sa ville : « Voici notre fils, il est indocile et rebelle, il ne nous écoute pas ; c''est un débauché et un ivrogne. » '
  '21':
  - type: note
    content: 'le lapideront 13.11+. –  Tu élimineras… 13.6n. –  tout Israël l''apprendra (ou entendra, écoutera) … 13.12+. –  peur  : voir crainte.'
  - type: text
    content: Tous les hommes de sa ville le lapideront, et il mourra. Tu élimineras ainsi de ton sein ce qui est mauvais ; tout Israël l'apprendra, et ils auront peur.
  - type: heading
    content: Le cadavre d'un pendu
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'et que tu l''aies pendu  : on comprend habituellement qu''il s''agit de l''exposition d''un cadavre après la mise à mort (par lapidation p. ex.), mais on a aussi interprété ce v. comme la description d''une exécution par pendaison ou crucifixion. Voir Ga 3.13n. –  à un bois  : autre traduction à un arbre  ; cf. 16.21n  ; 19.5n  ; Est 2.23n  ; Ac 5.30 ; 10.39 ; 1P 2.24.'
  - type: text
    content: 'Si un homme coupable d''un péché passible de mort a été mis à mort et que tu l''aies pendu à un bois, '
  '23':
  - type: note
    content: 'tu l''enseveliras le jour même  : cf. Jos 8.29 ; 10.26 ; Mt 27.57-60/ / ; Jn 19.31. –  est une malédiction de Dieu Ga 3.13  ; 1P 2.24 ; voir bénédiction, malédiction. –  impure  : voir pur, impur.'
  - type: text
    content: 'son cadavre ne passera pas la nuit sur le bois : tu l''enseveliras le jour même, car celui qui est pendu est une malédiction de Dieu ; tu ne rendras pas impure la terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, te donne comme patrimoine.'
  '3':
  - type: note
    content: 'Cf. Nb 19.2 ; voir aussi Ex 20.25 ; Mc 11.2 ; Lc 19.30. –  Quand on aura déterminé la ville…  : litt. et ce sera la ville…'
  - type: text
    content: 'Quand on aura déterminé la ville la plus proche du cadavre, les anciens de cette ville prendront une génisse qui n''a servi à aucun travail, qui n''a jamais porté le joug. '
  '4':
  - type: note
    content: cours d'eau pérenne ou torrent intarissable (Am 5.24) ; c.-à-d. qui coule toute l'année. Le mot traduit par pérenne désigne aussi le septième mois (septembre-octobre, cf. 1R 8.2), c.-à-d. la fin de la saison sèche, où seuls les torrents pérennes coulent encore ; voir aussi Ps 74.15 ; Jb 12.19n. – Cf. Ex 13.13.
  - type: text
    content: 'Les anciens de cette ville feront descendre la génisse vers un cours d''eau pérenne où il n''y a ni culture ni semence ; là, ils briseront la nuque de la génisse, dans le cours d''eau. '
  '5':
  - type: note
    content: 'prêtres / fils de Lévi  : cf. 17.9+. –  afin d''officier… 10.8+. – Voir bénédiction et nom. –  ce sont eux…  : litt. (c''est) sur leur bouche (que) sera tout litige et tout coup (ou blessure), cf. 17.8n  ; Nb 19.18.'
  - type: text
    content: 'Alors les prêtres, les fils de Lévi, s''approcheront ; car le '
  - type: text
    content: Seigneur
  - type: text
    content: ', ton Dieu, les a choisis afin d''officier pour lui et de bénir au nom du '
  - type: text
    content: Seigneur
  - type: text
    content: ', et ce sont eux qui doivent se prononcer sur tout litige et sur tout dommage corporel. '
  '6':
  - type: note
    content: Cf. Ps 26.6 ; Mt 27.24.
  - type: text
    content: 'Tous les anciens de cette ville – ceux qui sont les plus proches du cadavre – se laveront les mains sur la génisse à laquelle on a brisé la nuque dans le cours d''eau. '
  '7':
  - type: note
    content: 'Cf. Code d''Hammourabi 23s : « Si l''on n''a pas pris le voleur, l''homme qui a été victime du vol décrira en détail, devant le dieu, ce qu''il a perdu, et la ville et le gouverneur dans le territoire ou la juridiction desquels le vol a été commis lui donneront compensation du bien qu''il a perdu. S''il s''agit d''une vie, la ville et le gouverneur paieront une mine d''argent aux ayants droit. »'
  - type: text
    content: 'Ils déclareront : « Nos mains n''ont pas répandu ce sang, et nos yeux ne l''ont pas vu répandre. '
  '8':
  - type: note
    content: 'Voir expiation. –  que tu as libéré 7.8+. –  n''impute pas…  : litt. ne donne pas (ou ne place pas) de sang innocent au sein de ton peuple Israël, cf. 19.13n.'
  - type: text
    content: 'Fais l''expiation, '
  - type: text
    content: Seigneur
  - type: text
    content: ', pour Israël, ton peuple, que tu as libéré ; n''impute pas du sang innocent à Israël, ton peuple. » Ainsi sera faite pour eux l''expiation du sang. '
  '9':
  - type: note
    content: tu élimineras… 13.6n  ; 19.13. –  en faisant ce qui convient… 6.18+.
  - type: text
    content: 'Et toi, tu élimineras de ton sein le sang innocent, en faisant ce qui convient au '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: Le mariage avec une prisonnière
