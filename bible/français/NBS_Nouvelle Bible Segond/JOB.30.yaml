      marker-yv: yv-n
    - type: text
      text: Et maintenant, de plus jeunes que moi rient de moi,
  - type: usfm
    marker: q1
    children:
    - type: text
      text: eux dont je méprisais trop les pères
  - type: usfm
    marker: q1
    children:
    - type: text
      text: pour les mettre parmi les chiens de mon troupeau.
