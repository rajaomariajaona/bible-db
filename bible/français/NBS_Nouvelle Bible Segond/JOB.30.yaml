document_id: JOB.30,104
type_code: fra
verses:
  '1':
  - type: heading
    content: 'Dernière réplique de Job (suite) : et maintenant ?'
  - type: text
    content: ' '
  - type: note
    content: 'plus jeunes  : litt. plus petits quant aux jours  ; cf. 16.11 ; 32.6. –  rient  : le même verbe hébreu est traduit par sourire en 29.24 ; cf. 12.4+.'
  - type: text
    content: Et maintenant, de plus jeunes que moi rient de moi,
  - type: text
    content: eux dont je méprisais trop les pères
  - type: text
    content: pour les mettre parmi les chiens de mon troupeau.
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 50.6 ; Mt 26.67.
  - type: text
    content: Ils m'ont en abomination et s'éloignent de moi,
  - type: text
    content: ils ne se retiennent pas de me cracher au visage.
  '11':
  - type: text
    content: ' '
  - type: note
    content: 'Puisqu''il (c.-à-d. Dieu) a détendu la corde de mon arc (ou de ma tente ) : litt. parce qu''il a ouvert ma ( sa , d''après une autre lecture traditionnelle) corde ( ?). Le mot traduit par corde (cf. Jg 16.7n  ; Ps 11.2) peut aussi signifier reste , de sorte que certains comprennent puisqu''il a mis à découvert ce qui me restait . Selon l''autre lecture traditionnelle, on pourrait aussi comprendre même ceux qui ont dénoué leur corde (qui sont sans force ?) m''affligent (ou m''humilient , cf. 10.15n) ou ils m''affligent sans retenue  ; cf. 29.20.'
  - type: text
    content: Puisqu'il a détendu la corde de mon arc et qu'il m'a affligé,
  - type: text
    content: ils rejettent tout frein devant moi.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Verset difficile et traduction conjecturale. –  à ma droite  : cf. Za 3.1 ; Ps 109.6. –  me poussent  : litt. envoient mes pieds ( ?), c.-à-d., peut-être, me font trébucher . –  ils fraient…  : l''image est peut-être celle des travaux de siège entrepris pour prendre une ville.'
  - type: text
    content: Ces misérables se lèvent à ma droite et me poussent,
  - type: text
    content: ils fraient jusqu'à moi les chemins de la catastrophe ;
  '13':
  - type: text
    content: ils coupent mon sentier et travaillent à ma ruine,
  - type: text
    content: eux que personne ne secourait ;
  '14':
  - type: text
    content: ' '
  - type: note
    content: 'comme par une large brèche  : litt. comme une large brèche.'
  - type: text
    content: ils arrivent comme par une large brèche,
  - type: text
    content: ils tournoient dans la tourmente.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'épouvante  : cf. 6.4+.'
  - type: text
    content: L'épouvante s'est tournée contre moi,
  - type: text
    content: ma noblesse est emportée comme par le vent,
  - type: text
    content: mon salut a passé comme un nuage.
  '16':
  - type: text
    content: ' '
  - type: note
    content: 'ma vie s''écoule de moi  : autres traductions possibles je me répands sur moi-même ; je m''épanche (cf. 16.13) ; expressions comparables en 1S 1.15 ; Ps 42.5 ; 62.9 ; Lm 2.19.'
  - type: text
    content: Et maintenant, ma vie s'écoule de moi,
  - type: text
    content: les jours d'affliction m'ont saisi.
  '17':
  - type: text
    content: ' '
  - type: note
    content: '33.19. –  m''arrache  : litt. creuse de dessus moi  ; autre traduction la nuit, il m''arrache les os.'
  - type: text
    content: La nuit m'arrache les os,
  - type: text
    content: les douleurs qui me rongent ne se couchent pas.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'il me saisit par le vêtement  : d''après LXX  ; texte hébreu traditionnel mon vêtement (c.-à-d. ma peau ) se défigure . –  par ma tunique…  : autres traductions comme le col de ma tunique il me serre ; mon mal colle à moi comme ma tunique attachée à la ceinture.'
  - type: text
    content: Avec violence il me saisit par le vêtement,
  - type: text
    content: par ma tunique il me serre.
  '19':
  - type: text
    content: ' '
  - type: note
    content: Cf. 9.31.
  - type: text
    content: Il m'a jeté dans la boue,
  - type: text
    content: je ressemble à la poussière et à la cendre.
  '2':
  - type: text
    content: ' '
  - type: note
    content: vigueur 5.26n.
  - type: text
    content: A quoi m'aurait servi la force de leurs mains ?
  - type: text
    content: Leur vigueur avait disparu.
  '20':
  - type: text
    content: ' '
  - type: note
    content: '13.22+. –  pour que tu fasses attention  : plusieurs versions anciennes ont traduit  : et tu ne fais pas attention.'
  - type: text
    content: Je t'appelle au secours, et tu ne me réponds pas ;
  - type: text
    content: je me tiens debout pour que tu fasses attention à moi.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 10.16s ; 16.14. –  cruel  : même terme en 41.2n.'
  - type: text
    content: Tu deviens cruel envers moi,
  - type: text
    content: tu m'attaques avec toute la force de ta main.
  '22':
  - type: text
    content: ' '
  - type: note
    content: 'tu me le fais chevaucher ou tu m''emmènes (comme sur un char)  ; cf. Dt 32.13n  ; Ps 18.11n. –  tu me fais fondre…  : texte et traduction incertains ; autre possibilité tu fais fondre ma raison (ou mes ressources ), cf. 5.12n.'
  - type: text
    content: Tu m'emportes sur le vent, tu me le fais chevaucher,
  - type: text
    content: tu me fais fondre dans la tempête.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Gn 3.19 ; Ps 90.3 ; Ec 12.5. –  au lieu  : litt. à la maison.'
  - type: text
    content: Je le sais bien, tu me mènes à la mort,
  - type: text
    content: au lieu de rendez-vous de tous les vivants.
  '24':
  - type: text
    content: ' '
  - type: note
    content: 'Verset particulièrement difficile, traduction incertaine. –  Celui qui va périr  : litt. dans une ruine ou un monceau de pierres ( ?) ; même terme en Jr 26.18 ; Mi 1.6 ; 3.12 ; Ps 79.1 ; certains modifient le texte hébreu traditionnel pour traduire on ne lève pas la main contre le pauvre quand dans son malheur il appelle au secours.'
  - type: text
    content: Celui qui va périr ne tend-il pas les mains ?
  - type: text
    content: Celui qui est dans le malheur n'appelle-t-il pas au secours ?
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Ps 35.13s ; Rm 12.15. –  N''ai-je pas pleuré…  : on pourrait aussi comprendre la tournure qui apparaît ici comme une formule de serment  : si je n''ai pas pleuré… (sous-entendu que je sois maudit ), cf. 27.2n  ; chap. 31.'
  - type: text
    content: N'ai-je pas pleuré pour celui dont les jours étaient durs ?
  - type: text
    content: N'étais-je pas triste pour le pauvre ?
  '26':
  - type: text
    content: ' '
  - type: note
    content: Es 59.9 ; Jr 8.15.
  - type: text
    content: J'espérais le bonheur,
  - type: text
    content: c'est le malheur qui est venu ;
  - type: text
    content: j'attendais la lumière,
  - type: text
    content: c'est l'obscurité qui est venue.
  '27':
  - type: text
    content: ' '
  - type: note
    content: Jr 4.19 ; Ps 38.8 ; Lm 1.20.
  - type: text
    content: Mes entrailles bouillonnent sans relâche.
  - type: text
    content: Les jours de l'affliction m'ont atteint.
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'Je m''assombris  : autres traductions je marche noirci ; je déambule, l''air sombre  ; cf. 5.11n  ; Ps 35.14n  ; Lm 4.8. –  le soleil  : litt. la chaude (cf. Es 30.26n).'
  - type: text
    content: Je m'assombris, mais ce n'est pas à cause du soleil ;
  - type: text
    content: je me lève dans l'assemblée et j'appelle au secours.
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'Je suis devenu… chacals / autruches (autre traduction effraies  ; autre terme qu''en 39.13) : sans doute à cause de ses cris semblables à ceux de ces animaux sauvages, dont l''identification est d''ailleurs incertaine (cf. Mi 1.8 ; Ps 102.7s).'
  - type: text
    content: Je suis devenu le frère des chacals,
  - type: text
    content: le compagnon des autruches.
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 24.5-8. Traduction très incertaine. –  crépuscule  : le même terme hébreu est traduit par nuit dernière  ; cf. Gn 31.29. –  tourmente / ravage  : en hébreu, ces deux termes font assonance ; cf. 38.27 ; So 1.15.'
  - type: text
    content: Emaciés par la privation et la faim,
  - type: text
    content: ils rongeaient le sol desséché,
  - type: text
    content: dans un crépuscule de tourmente et de ravage ;
  '30':
  - type: text
    content: ' '
  - type: note
    content: 'fièvre  : litt. sécheresse . Cf. Ps 102.4-6 ; Lm 3.4.'
  - type: text
    content: Ma peau noircit sur moi,
  - type: text
    content: mes os sont brûlants de fièvre.
  '31':
  - type: text
    content: ' '
  - type: note
    content: Am 8.10 ; Lm 5.15.
  - type: text
    content: Ma lyre ne sert plus qu'au chant de deuil,
  - type: text
    content: et mon chalumeau n'accompagne plus que le chant des pleureuses.
  '4':
  - type: text
    content: ' '
  - type: note
    content: 'les herbes sauvages  : litt. l’(herbe) salée , que l''on identifie parfois à l''arroche, une plante des bords de la mer Morte, cf. 24.24n.'
  - type: text
    content: ils arrachaient les herbes sauvages près des buissons
  - type: text
    content: et ils n'avaient rien d'autre à manger que la racine des genêts.
  '5':
  - type: text
    content: ' '
  - type: note
    content: '24.4. –  on poussait des cris  : le même verbe est aussi traduit par lancer des acclamations  ; cf. Jg 15.14n.'
  - type: text
    content: On les chassait d'entre les hommes,
  - type: text
    content: on poussait des cris contre eux comme contre un voleur,
  '6':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. Jg 6.2 ; 1S 13.6. –  oueds 6.15n. –  les antres de la terre  : litt. les trous de la poussière.'
  - type: text
    content: pour qu'ils demeurent dans les escarpements des oueds,
  - type: text
    content: dans les antres de la terre et dans les rochers ;
  '7':
  - type: text
    content: ils allaient braire parmi les buissons,
  - type: text
    content: ils s'entassaient sous les mauvaises herbes.
  '8':
  - type: text
    content: ' '
  - type: note
    content: 'Etres vils et innommables  : litt. fils de fou, fils de sans-nom (cf. Dt 25.10). –  repoussés  : cf. Gn 21.10 ; Jg 11.2.'
  - type: text
    content: Etres vils et innommables,
  - type: text
    content: ils étaient repoussés du pays.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 16.11+ ; 17.6 ; cf. Ps 69.13 ; Lm 3.14,63.
  - type: text
    content: Et maintenant, je suis l'objet de leurs chansons,
  - type: text
    content: je suis en butte à leurs propos.
