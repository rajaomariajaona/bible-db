document_id: GEN.5,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Liste des ancêtres depuis Adam jusqu'à Noé
  - type: heading
    content: 1Ch 1.1-4
  - type: text
    content: ' '
  - type: note
    content: 'généalogie 2.4n. – Ici et au v. 2 Adam et les humains sont respectivement la transcription et la traduction d''un même mot hébreu ; voir 1.26n  ; 4.25n. –  il les fit  : le pronom objet est au singulier dans le texte, voir 1.27n. –  ressemblance v. 3 ; 1.26ns.'
  - type: text
    content: 'Voici le livre de la généalogie d''Adam. Le jour où Dieu créa les humains, il les fit à la ressemblance de Dieu. '
  '10':
  - type: text
    content: 'Après la naissance de Caïnân, Enosh vécut huit cent quinze ans ; il engendra des fils et des filles. '
  '11':
  - type: text
    content: La totalité des jours d'Enosh fut de neuf cent cinq ans ; puis il mourut.
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'Mahalaléel  : « il loue Dieu » (hébreu ’El , 21.33n) ; cf. 4.18n.'
  - type: text
    content: 'Caïnân vécut soixante-dix ans, puis il engendra Mahalaléel. '
  '13':
  - type: text
    content: 'Après la naissance de Mahalaléel, Caïnân vécut huit cent quarante ans ; il engendra des fils et des filles. '
  '14':
  - type: text
    content: La totalité des jours de Caïnân fut de neuf cent dix ans ; puis il mourut.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Yéred  : cf. 4.18n.'
  - type: text
    content: 'Mahalaléel vécut soixante-cinq ans, puis il engendra Yéred. '
  '16':
  - type: text
    content: 'Après la naissance de Yéred, Mahalaléel vécut huit cent trente ans ; il engendra des fils et des filles. '
  '17':
  - type: text
    content: La totalité des jours de Mahalaléel fut de huit cent quatre-vingt-quinze ans ; puis il mourut.
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Hénoch  : cf. 4.17n.'
  - type: text
    content: 'Yéred vécut cent soixante-deux ans, puis il engendra Hénoch. '
  '19':
  - type: text
    content: 'Après la naissance d''Hénoch, Yéred vécut huit cents ans ; il engendra des fils et des filles. '
  '2':
  - type: note
    content: Homme / femme 1.27n. – Voir bénédiction et nom. –  humains / Adam 1.26n  ; 4.1.
  - type: text
    content: Homme et femme il les créa, il les bénit et les appela du nom d’« humains » – Adam – le jour où ils furent créés.
  '20':
  - type: text
    content: La totalité des jours de Yéred fut de neuf cent soixante-deux ans ; puis il mourut.
  '21':
  - type: text
    content: ' '
  - type: note
    content: 'Mathusalem  : hébreu Metoushélah  ; cf. 4.18n.'
  - type: text
    content: 'Hénoch vécut soixante-cinq ans, puis il engendra Mathusalem. '
  '22':
  - type: note
    content: marcha avec Dieu 6.9 ; cf. 17.1 ; Dt 13.5 ; Mi 6.8 ; Ml 3.6. LXX fut agréable à Dieu, de même au v. 24.
  - type: text
    content: 'Hénoch marcha avec Dieu trois cents ans encore après la naissance de Mathusalem ; il engendra des fils et des filles. '
  '23':
  - type: note
    content: Cf. 7.11n. Ce chiffre correspond au nombre des jours de l'année solaire, qui tient une place importante dans la littérature attribuée à Hénoch  ; voir aussi calendrier, Qumrân.
  - type: text
    content: 'La totalité des jours d''Hénoch fut de trois cent soixante-cinq ans. '
  '24':
  - type: note
    content: 'il disparut  : autre traduction il n''était plus là, formule analogue en 1R 20.40. –  Dieu le prit ou Dieu l''avait pris Hé 11.5s ; cf. Jd 14s ; voir aussi 2R 2.3,9,11 ; Es 53.8.'
  - type: text
    content: Hénoch marcha avec Dieu ; puis il disparut, parce que Dieu le prit.
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'Lémek  : cf. 4.18n.'
  - type: text
    content: 'Mathusalem vécut cent quatre-vingt-sept ans, puis il engendra Lémek. '
  '26':
  - type: text
    content: 'Après la naissance de Lémek, Mathusalem vécut sept cent quatre-vingt-deux ans ; il engendra des fils et des filles. '
  '27':
  - type: text
    content: La totalité des jours de Mathusalem fut de neuf cent soixante-neuf ans ; puis il mourut.
  '28':
  - type: text
    content: 'Lémek vécut cent quatre-vingt-deux ans, puis il engendra un fils. '
  '29':
  - type: note
    content: 'consolera  : le verbe hébreu naham est ici rapproché du nom de Noé (hébreu Noah, qui signifie repos, cf. 8.9n,21n). –  sur cette terre  : litt. à cause du sol (’adama, 2.5n). –  maudite 3.17n-19 ; cf. 9.20-27 ; Jg 9.13 ; Ps 104.15 ; Pr 31.6s.'
  - type: text
    content: 'Il l''appela du nom de Noé, en disant : Celui-ci nous consolera de notre travail et de la peine de nos mains sur cette terre que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a maudite. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Les âges attribués aux divers personnages diffèrent dans Smr et les versions anciennes (LXX, Syr), ce qui fait varier d''autant la durée de la période globale création-déluge (1 656 ans pour le texte hébreu traditionnel, mais 1 307 pour Smr et 2 242 pour LXX). La longévité extraordinaire, mais en diminution progressive, des ancêtres des temps originels est un trait commun de plusieurs documents de l''Orient ancien. –  engendra…  : litt. engendra à sa ressemblance ( un fils est sous-entendu dans le texte) ; voir aussi 9.28s ; 11.10ss. –  Seth 4.25.'
  - type: text
    content: 'Adam vécut cent trente ans, puis il engendra un fils à sa ressemblance, selon son image, et il l''appela du nom de Seth. '
  '30':
  - type: text
    content: 'Après la naissance de Noé, Lémek vécut cinq cent quatre-vingt-quinze ans ; il engendra des fils et des filles. '
  '31':
  - type: text
    content: La totalité des jours de Lémek fut de sept cent soixante-dix-sept ans ; puis il mourut.
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Sem  : hébreu Shem, « Nom » . –  Cham  : hébreu Ham, « Chaud » . –  Japhet  : hébreu Yapheth, « Il élargira » ( ?), cf. 9.27. – Voir aussi 6.10 ; 9.18–10.32.'
  - type: text
    content: Noé vécut cinq cents ans, puis il engendra Sem, Cham et Japhet.
  '4':
  - type: text
    content: 'Les jours d''Adam, après qu''il eut engendré Seth, furent de huit cents ans ; il engendra des fils et des filles. '
  '5':
  - type: text
    content: La totalité des jours qu'Adam vécut fut de neuf cent trente ans ; puis il mourut.
  '6':
  - type: text
    content: ' '
  - type: note
    content: Enosh 4.26.
  - type: text
    content: 'Seth vécut cent cinq ans, puis il engendra Enosh. '
  '7':
  - type: text
    content: 'Après la naissance d''Enosh, Seth vécut huit cent sept ans ; il engendra des fils et des filles. '
  '8':
  - type: text
    content: La totalité des jours de Seth fut de neuf cent douze ans ; puis il mourut.
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Caïnân ou Qénân  : cf. 4.1n,17 ; 10.24n.'
  - type: text
    content: 'Enosh vécut quatre-vingt-dix ans, puis il engendra Caïnân. '
