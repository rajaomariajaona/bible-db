      children:
      - type: text
        text: '18.36 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: garda le silence
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : ici, comme en 1S 10.27 ; 2S 19.11, ce verbe pourrait aussi signifier '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ne rien faire.
    marker-yv: yv-n
  - type: text
    text: 'Le peuple garda le silence ; il ne lui répondit pas un mot, car le roi avait donné cet ordre : « Vous ne lui répondrez pas. » '
  - type: usfm
    marker: v
    metadata:
