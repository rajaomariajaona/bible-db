  - type: text
    text: 'C''est lui qui supprima les hauts lieux, brisa les pierres levées, coupa le poteau cultuel (l''ashéra) et mit en pièces le serpent de bronze que Moïse avait fait, car jusqu''alors les Israélites lui avaient offert de l''encens : on l''appelait Nehoushtân. '
  - type: usfm
    marker: v
    metadata:
