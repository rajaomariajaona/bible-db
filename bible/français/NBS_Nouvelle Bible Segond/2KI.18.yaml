  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', leur Dieu, et qu''ils avaient passé outre à son alliance ; tout ce qu''avait ordonné Moïse, serviteur du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', ils ne l''avaient ni écouté ni mis en pratique.'
