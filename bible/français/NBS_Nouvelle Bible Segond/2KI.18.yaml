  - type: text
    text: 'La quatrième année du roi Ezéchias, qui était la septième année d''Osée, fils d''Ela, roi d''Israël, Salmanasar, roi d''Assyrie, arriva devant Samarie et l''assiégea. '
  - type: usfm
    marker: v
    metadata:
      v: '10'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: text
    text: 'Il la prit au bout de trois ans, la sixième année d''Ezéchias. C''est la neuvième année d''Osée, roi d''Israël, que Samarie fut prise. '
  - type: usfm
    marker: v
