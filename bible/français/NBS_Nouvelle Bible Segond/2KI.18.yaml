  - type: text
    text: 'Ezéchias, roi de Juda, fit dire au roi d''Assyrie, à Lakish : « J''ai péché ! Eloigne-toi de moi. Ce que tu m''imposeras, je le supporterai. » Alors le roi d''Assyrie imposa à Ezéchias, roi de Juda, trois cents talents d''argent et trente talents d''or. '
  - type: usfm
    marker: v
    metadata:
      v: '15'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '15'
  - type: text
