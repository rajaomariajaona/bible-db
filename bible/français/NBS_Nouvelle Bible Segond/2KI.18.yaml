      - type: text
        text: '18.37 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hilqiya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le nom est ici écrit en hébreu sous la forme plus courte, cf. v. 18'
      - type: usfm
        marker: ord
