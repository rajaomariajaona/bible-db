  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' était avec lui. Il réussissait dans toutes ses entreprises. Il se rebella contre le roi d''Assyrie et ne lui fut plus soumis. '
  - type: usfm
