  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '5'
  - type: text
    text: 'Il mit sa confiance dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', le Dieu d''Israël ; et parmi tous les rois de Juda qui vinrent après lui ou qui le précédèrent, il n''y en eut pas de semblable à lui. '
  - type: usfm
    marker: v
