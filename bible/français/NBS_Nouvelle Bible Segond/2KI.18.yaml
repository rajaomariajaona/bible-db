  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: text
    text: C'est lui qui mit à mal les Philistins jusqu'à Gaza et son territoire, depuis les tours des gardes jusqu'aux villes fortes.
