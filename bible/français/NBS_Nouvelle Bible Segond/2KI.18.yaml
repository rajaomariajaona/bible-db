document_id: 2KI.18,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Ezéchias, roi de Juda
  - type: heading
    content: 2Ch 29.1-2
  - type: text
    content: 'La troisième année d''Osée, fils d''Ela, roi d''Israël, Ezéchias, fils d''Achaz, devint roi de Juda. '
  '10':
  - type: text
    content: 'Il la prit au bout de trois ans, la sixième année d''Ezéchias. C''est la neuvième année d''Osée, roi d''Israël, que Samarie fut prise. '
  '11':
  - type: note
    content: 'Cf. 17.6n. –  les Israélites  : litt. Israël, LXX la Samarie.'
  - type: text
    content: 'Le roi d''Assyrie exila les Israélites en Assyrie et il les conduisit à Halah et sur le Habor, la rivière de Gozân, ainsi que dans les villes des Mèdes, '
  '12':
  - type: text
    content: 'parce qu''ils n''avaient pas écouté le '
  - type: text
    content: Seigneur
  - type: text
    content: ', leur Dieu, et qu''ils avaient passé outre à son alliance ; tout ce qu''avait ordonné Moïse, serviteur du '
  - type: text
    content: Seigneur
  - type: text
    content: ', ils ne l''avaient ni écouté ni mis en pratique.'
  - type: heading
    content: Sennachérib envahit le royaume de Juda
  '13':
  - type: text
    content: ' '
  - type: note
    content: 'Es 36.1 ; 2Ch 32.1. –  Sennachérib  : akkadien Sîn-ah-erib , roi d''Assyrie (704-681). Selon les annales assyriennes, cette expédition contre Jérusalem daterait de 701. –  toutes  : absent de LXX.'
  - type: text
    content: 'La quatorzième année du roi Ezéchias, Sennachérib, roi d''Assyrie, attaqua toutes les villes fortes de Juda et les prit. '
  '14':
  - type: note
    content: 'fit dire  : litt. envoya  ; LXX ajoute des messagers. –  Lakish  : cf. 14.19n  ; sur la prise de cette ville par Sennachérib, voir l''illustration ♦. –  J''ai péché, c.-à-d. j''ai eu tort. –  Eloigne-toi  : litt. retourne. –  Ce que tu m''imposeras  : un ms hébreu, Tg et Vg lisent tout ce que tu m''imposeras. –  trois cents talents  : plus de 10 tonnes ; trente talents  : environ 1 tonne ; voir mesures, poids et monnaies.'
  - type: text
    content: 'Ezéchias, roi de Juda, fit dire au roi d''Assyrie, à Lakish : « J''ai péché ! Eloigne-toi de moi. Ce que tu m''imposeras, je le supporterai. » Alors le roi d''Assyrie imposa à Ezéchias, roi de Juda, trois cents talents d''argent et trente talents d''or. '
  '15':
  - type: text
    content: 'Ezéchias donna tout l''argent qui se trouvait dans la maison du '
  - type: text
    content: Seigneur
  - type: text
    content: ' et dans les trésors de la maison du roi. '
  '16':
  - type: note
    content: 'linteaux  : le sens du mot hébreu n''est pas sûr. D''autres traduisent poteaux. – Voir temple.'
  - type: text
    content: 'En ce temps-là Ezéchias mit en pièces les portes et les linteaux du temple du '
  - type: text
    content: Seigneur
  - type: text
    content: '  – Ezéchias, roi de Juda, les avait plaqués d''or – et il les livra au roi d''Assyrie.'
  - type: heading
    content: Sennachérib menace Jérusalem
  - type: heading
    content: Es 36.2-22  ; 2Ch 32.9-16
  '17':
  - type: text
    content: ' '
  - type: note
    content: 'le général en chef, le chef des hauts fonctionnaires (ou grand eunuque, chef des eunuques ) et le chef d''intendance (ou grand échanson , autre traduction chef d''état-major ) : traduction incertaine de titres assyriens ou babyloniens ; on les a aussi compris comme des noms propres et transcrits respectivement Tartân (Es 20.1) , Rab-Saris (Jr 39.3) et Rab-Shaqé (Es 36.2, texte parallèle qui ne mentionne que ce troisième personnage). –  Ils montèrent et arrivèrent à Jérusalem. Lorsqu''ils furent montés et arrivés  : texte absent d''Es 36.2. –  l''aqueduc  : même terme en 20.20 ; Es 7.3 ; 36.2 ; cf. 1R 18.32n  ; Ez 31.4n  ; Jb 38.25n.'
  - type: text
    content: 'Le roi d''Assyrie envoya de Lakish à Jérusalem, vers le roi Ezéchias, le général en chef, le chef des hauts fonctionnaires et le chef d''intendance, avec une puissante armée. Ils montèrent et arrivèrent à Jérusalem. Lorsqu''ils furent montés et arrivés, ils se tinrent à l''aqueduc du réservoir supérieur, sur la route du Champ du Teinturier. '
  '18':
  - type: note
    content: 'le roi  : précision absente d''Es 36.3. –  Hilqiya  : hébreu Hilqiyahou. –  intendant de la maison 1R 4.6n. – Voir scribe.'
  - type: text
    content: 'Ils appelèrent le roi ; alors Eliaqim, fils de Hilqiya, l''intendant de la maison, sortit vers eux, avec Shebna, le scribe, et Yoah, fils d''Asaph, l''archiviste. '
  '19':
  - type: note
    content: Le discours de propagande militaire qui commence ici (cf. v. 27) présente des analogies avec certains passages des annales assyriennes. –  En quoi donc as-tu placé ta confiance ? autre traduction quelle est cette confiance sur laquelle tu t'appuies ?
  - type: text
    content: 'Le chef d''intendance leur dit : Dites, je vous prie, à Ezéchias : Ainsi parle le grand roi, le roi d''Assyrie : En quoi donc as-tu placé ta confiance ? '
  '2':
  - type: note
    content: 'il régna vingt-neuf ans ≈ 716-687 av. J.-C. –  Abi  : cf. 2Ch 29.1 (Abiya).'
  - type: text
    content: 'Il avait vingt-cinq ans lorsqu''il devint roi ; il régna vingt-neuf ans à Jérusalem. Le nom de sa mère était Abi, fille de Zacharie. '
  '20':
  - type: note
    content: 'Tu n''as prononcé…  : litt. tu n''as dit qu''une parole de lèvres, conseil et vaillance pour la guerre  ; autre traduction tu t''es dit : Des paroles en l''air tiendront lieu de plan…  ; cf. Es 36.5 (texte légèrement différent). –  pour te rebeller contre moi  : l''épisode des envoyés de Sennachérib semble contredire les v. 14-16, à moins que le texte ne laisse entendre qu''Ezéchias n''a pas pu réunir la somme réclamée par le roi assyrien, qui interprète cette défaillance comme une nouvelle rébellion.'
  - type: text
    content: 'Tu n''as prononcé que des paroles en l''air, et tu crois avoir un plan et la force pour la guerre ? Et maintenant, en qui donc as-tu mis ta confiance, pour te rebeller contre moi ? '
  '21':
  - type: note
    content: 'Maintenant  : texte absent de LXX, Vetus latina (voir Vg), Syr, et Es 36.6 ; autre traduction en fait. –  l''Egypte, ce roseau cassé…  : cf. Ez 29.6s.'
  - type: text
    content: 'Maintenant tu as mis ta confiance dans le soutien de l''Egypte, ce roseau cassé qui pénètre et transperce la main de quiconque s''appuie dessus : tel est le pharaon, le roi d''Egypte, pour tous ceux qui mettent leur confiance en lui. '
  '22':
  - type: note
    content: 'à Jérusalem  : précision absente d''Es 36.7.'
  - type: text
    content: 'Peut-être me direz-vous : « C''est dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), notre Dieu, que nous avons mis notre confiance. » Mais n''est-ce pas ses hauts lieux et ses autels qu''Ezéchias a supprimés, en disant à Juda et à Jérusalem : « C''est devant cet autel, à Jérusalem, que vous vous prosternerez ! » '
  '23':
  - type: note
    content: 'des cavaliers…  : autre traduction des conducteurs de chars.'
  - type: text
    content: 'Maintenant fais, je te prie, un pari avec mon maître, le roi d''Assyrie : je te donnerai deux mille chevaux, si tu peux trouver des cavaliers pour les monter. '
  '24':
  - type: note
    content: 'gouverneur  : responsable d''une province, cf. 1R 10.15n  ; 20.24 ; certains pensent qu''il résulte ici d''une erreur de copie. –  le moindre…  : litt. des plus petits serviteurs de mon maître, ou, selon certains mss (ici et en Es 36.9), d''entre les plus petits serviteurs de mon maître. –  les attelages  : autres traductions les équipages (de chars) ; les cavaliers.'
  - type: text
    content: 'Comment repousserais-tu un seul gouverneur, le moindre parmi les hommes de mon maître ? C''est dans l''Egypte que tu mets ta confiance en ce qui concerne les chars et les attelages ! '
  '25':
  - type: note
    content: 'D''ailleurs  : autre traduction maintenant. – Selon les conceptions de l''Antiquité, la prise d''une ville implique souvent un revirement de la part de son dieu, qui décide de soutenir le conquérant contre ses propres fidèles et légitime ainsi la conquête. Voir « Cyrus à Babylone »♦. Cependant elle peut aussi être interprétée comme une victoire du dieu du conquérant sur les dieux des vaincus (cf. v. 34).'
  - type: text
    content: 'D''ailleurs, est-ce indépendamment du '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) que j''ai attaqué ce lieu, pour le détruire ? C''est le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) qui m''a dit : « Attaque ce pays et détruis-le. »'
  '26':
  - type: text
    content: ' '
  - type: note
    content: 'fils de Hilqiya  : absent d''un ms hébreu et d''Es 36.11. –  en présence du peuple  : litt. aux oreilles du peuple.'
  - type: text
    content: 'Eliaqim, fils de Hilqiya, Shebna et Yoah dirent au chef d''intendance : S''il te plaît, parle-nous en araméen, nous le comprenons ; ne nous parle pas en judéen, en présence du peuple qui est sur la muraille. '
  '27':
  - type: note
    content: 'Cf. v. 19n. –  cela  : litt. ces paroles ou ces choses. –  leurs excréments / leur urine  : une lecture traditionnelle indique ici les euphémismes correspondants leur évacuation / l''eau de leurs pieds  ; le premier terme a été rapproché de celui qui est traduit par fiente de pigeon en 6.25.'
  - type: text
    content: 'Le chef d''intendance leur répondit : Est-ce à ton maître et à toi que mon maître m''a envoyé dire cela ? N''est-ce pas à ces hommes qui sont assis sur la muraille, eux qui mangent leurs excréments et boivent leur urine avec vous ?'
  '28':
  - type: text
    content: ' '
  - type: note
    content: 'la parole  : les paroles selon Es 36.13.'
  - type: text
    content: 'Puis le chef d''intendance se redressa et cria à pleine voix, en judéen : Ecoutez la parole du grand roi, du roi d''Assyrie ! '
  '29':
  - type: note
    content: 'de ma main  : avec plusieurs mss hébreux et des versions anciennes. D''autres mss portent de sa main.'
  - type: text
    content: 'Ainsi parle le roi : Qu''Ezéchias ne vous trompe pas, car il ne pourra pas vous délivrer de ma main. '
  '3':
  - type: note
    content: ce qui convenait au Seigneur 10.30n.
  - type: text
    content: 'Il fit ce qui convenait au '
  - type: text
    content: Seigneur
  - type: text
    content: ', exactement comme l''avait fait David, son père. '
  '30':
  - type: text
    content: 'Qu''Ezéchias ne vous amène pas à mettre votre confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), en disant : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) nous délivrera ! Cette ville ne sera pas livrée au roi d''Assyrie ! » '
  '31':
  - type: note
    content: 'Faites la paix avec moi  : autre traduction capitulez. Le mot traduit ici par paix semble être celui qui est rendu ailleurs par bénédiction  ; il pourrait cependant se rattacher à un autre sens de la même racine, s''agenouiller (d''où l''idée de capitulation).'
  - type: text
    content: 'N''écoutez pas Ezéchias ; car ainsi parle le roi d''Assyrie : Faites la paix avec moi, rendez-vous à moi ; chacun de vous mangera de sa vigne et de son figuier, chacun boira de l''eau de sa citerne, '
  '32':
  - type: note
    content: 'vin  : autre traduction vin nouveau, cf. Gn 27.28n. –  un pays d''oliviers… Ezéchias  : texte absent d''Es 36.17.'
  - type: text
    content: 'jusqu''à ce que je vienne et que je vous emmène dans un pays comme le vôtre, dans un pays de blé et de vin, un pays de pain et de vignes, un pays d''oliviers à huile et de miel ; ainsi vous vivrez, vous ne mourrez pas. N''écoutez donc pas Ezéchias, qui veut vous entraîner en disant : « Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) nous délivrera ! » '
  '33':
  - type: text
    content: 'Les dieux des nations ont-ils donc délivré chacun son pays de la main du roi d''Assyrie ? '
  '34':
  - type: note
    content: 'Cf. v. 25. –  de Héna et d''Ivva  : texte absent d''Es 36.19 (mais attesté à Qumrân). Héna correspondrait au pays de Nî’, connu par des textes égyptiens depuis le XVe s. av. J.-C. et situé au nord de Hama sur l''Oronte. Pour Ivva ou Avva, cf. 17.24n. –  Ont-ils délivré Samarie de ma main ? On peut s''étonner de la question qui laisse supposer que Samarie aurait pu être sauvée par des dieux étrangers. Comme les villes mentionnées ont fait partie d''une même coalition, l''émissaire assyrien souligne que les dieux de la coalition ont été incapables de sauver ne serait-ce qu''une des villes de celle-ci.'
  - type: text
    content: 'Où sont les dieux de Hamath et d''Arpad ? Où sont les dieux de Sepharvaïm, de Héna et d''Ivva ? Ont-ils délivré Samarie de ma main ? '
  '35':
  - type: note
    content: 'des pays  : un ms hébreu, Syr et un ms de Tg lisent de ces pays, comme en Es 36.20.'
  - type: text
    content: 'Parmi tous les dieux des pays, quels sont ceux qui ont délivré leur pays de ma main, pour que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) délivre Jérusalem de ma main ?'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'garda le silence  : ici, comme en 1S 10.27 ; 2S 19.11, ce verbe pourrait aussi signifier ne rien faire.'
  - type: text
    content: 'Le peuple garda le silence ; il ne lui répondit pas un mot, car le roi avait donné cet ordre : « Vous ne lui répondrez pas. » '
  '37':
  - type: note
    content: 'Hilqiya  : le nom est ici écrit en hébreu sous la forme plus courte, cf. v. 18n  ; voir Jg 17.1n.'
  - type: text
    content: Eliaqim, fils de Hilqiya, l'intendant de la maison, Shebna, le scribe, et Yoah, fils d'Asaph, l'archiviste, vinrent trouver Ezéchias, les vêtements déchirés ; ils lui rapportèrent les paroles du chef d'intendance.
  '4':
  - type: note
    content: 'Cf. 11.18s ; 23.5,19 ; 2Ch 31.1 ; voir hauts lieux. –  le poteau cultuel (l''ashéra)  : voir Baal  ; le mot est au pluriel dans un ms hébreu et dans LXX, Syr, Vg et un ms de Tg  ; voir aussi Jg 3.7n. –  mit en pièces  : le verbe correspondant est absent de LXX. –  Nehoushtân  : ce nom hébreu rappelle les deux termes qui signifient serpent et bronze (cf. Nb 21.8s).'
  - type: text
    content: 'C''est lui qui supprima les hauts lieux, brisa les pierres levées, coupa le poteau cultuel (l''ashéra) et mit en pièces le serpent de bronze que Moïse avait fait, car jusqu''alors les Israélites lui avaient offert de l''encens : on l''appelait Nehoushtân. '
  '5':
  - type: text
    content: 'Il mit sa confiance dans le '
  - type: text
    content: Seigneur
  - type: text
    content: ', le Dieu d''Israël ; et parmi tous les rois de Juda qui vinrent après lui ou qui le précédèrent, il n''y en eut pas de semblable à lui. '
  '6':
  - type: note
    content: 'commandements  : voir loi. –  donnés ou institués, cf. 17.13+.'
  - type: text
    content: 'Il fut attaché au '
  - type: text
    content: Seigneur
  - type: text
    content: ', il ne s''écarta pas de lui et observa les commandements que le '
  - type: text
    content: Seigneur
  - type: text
    content: ' avait donnés à Moïse, '
  '7':
  - type: note
    content: 'dans toutes ses entreprises  : litt. chaque fois qu''il sortait  ; cf. Dt 28.6n. –  Il se rebella  : l''expression indique que jusque-là le royaume de Juda était vassal de l''Assyrie.'
  - type: text
    content: 'et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' était avec lui. Il réussissait dans toutes ses entreprises. Il se rebella contre le roi d''Assyrie et ne lui fut plus soumis. '
  '8':
  - type: text
    content: C'est lui qui mit à mal les Philistins jusqu'à Gaza et son territoire, depuis les tours des gardes jusqu'aux villes fortes.
  - type: heading
    content: Rappel de la prise de Samarie
  '9':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 17.5ss. –  Salmanasar  : cf. 17.3n.'
  - type: text
    content: 'La quatrième année du roi Ezéchias, qui était la septième année d''Osée, fils d''Ela, roi d''Israël, Salmanasar, roi d''Assyrie, arriva devant Samarie et l''assiégea. '
