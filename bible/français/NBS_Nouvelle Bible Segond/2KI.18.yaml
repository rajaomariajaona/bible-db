    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Assyrie exila les Israélites en Assyrie et il les conduisit à Halah et sur le Habor, la rivière de Gozân, ainsi que dans les villes des Mèdes, '
  - type: usfm
    marker: v
