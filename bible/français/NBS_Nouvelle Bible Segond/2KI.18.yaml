          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: Eliaqim, fils de Hilqiya, l'intendant de la maison, Shebna, le scribe, et Yoah, fils d'Asaph, l'archiviste, vinrent trouver Ezéchias, les vêtements déchirés ; ils lui rapportèrent les paroles du chef d'intendance.
