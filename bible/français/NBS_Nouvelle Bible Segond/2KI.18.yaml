        text: 'et le chef d''intendance '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: grand échanson
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: chef d'état-major
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') : traduction incertaine de titres assyriens ou babyloniens ; on les a aussi compris comme des noms propres et transcrits respectivement '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Tartân '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (Es 20.1)
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ', Rab-Saris '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Jr 39.3) et '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Rab-Shaqé '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(Es 36.2, texte parallèle qui ne mentionne que ce troisième personnage). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils montèrent et arrivèrent à Jérusalem. Lorsqu'ils furent montés et arrivés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : texte absent d''Es 36.2. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'aqueduc
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : même terme en 20.20 ; Es 7.3 ; 36.2 ; cf. 1R 18.32'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Ez 31.4'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; Jb 38.25'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Le roi d''Assyrie envoya de Lakish à Jérusalem, vers le roi Ezéchias, le général en chef, le chef des hauts fonctionnaires et le chef d''intendance, avec une puissante armée. Ils montèrent et arrivèrent à Jérusalem. Lorsqu''ils furent montés et arrivés, ils se tinrent à l''aqueduc du réservoir supérieur, sur la route du Champ du Teinturier. '
  - type: usfm
    marker: v
    metadata:
      v: '18'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '18'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.18 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le roi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : précision absente d''Es 36.3. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Hilqiya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : hébreu '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Hilqiyahou
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'intendant de la maison '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 1R 4.6
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. – Voir '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: scribe
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils appelèrent le roi ; alors Eliaqim, fils de Hilqiya, l''intendant de la maison, sortit vers eux, avec Shebna, le scribe, et Yoah, fils d''Asaph, l''archiviste. '
  - type: usfm
    marker: v
    metadata:
      v: '19'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '19'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.19 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Le discours de propagande militaire qui commence ici (cf. v. 27) présente des analogies avec certains passages des annales assyriennes. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'En quoi donc as-tu placé ta confiance ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: quelle est cette confiance sur laquelle tu t'appuies ?
    marker-yv: yv-n
  - type: text
    text: 'Le chef d''intendance leur dit : Dites, je vous prie, à Ezéchias : Ainsi parle le grand roi, le roi d''Assyrie : En quoi donc as-tu placé ta confiance ? '
  - type: usfm
    marker: v
    metadata:
      v: '20'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '20'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.20 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Tu n'as prononcé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: tu n'as dit qu'une parole de lèvres, conseil et vaillance pour la guerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'tu t''es dit : Des paroles en l''air tiendront lieu de plan…'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. Es 36.5 (texte légèrement différent). –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: pour te rebeller contre moi
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : l''épisode des envoyés de Sennachérib semble contredire les v. 14-16, à moins que le texte ne laisse entendre qu''Ezéchias n''a pas pu réunir la somme réclamée par le roi assyrien, qui interprète cette défaillance comme une nouvelle rébellion.'
    marker-yv: yv-n
  - type: text
    text: 'Tu n''as prononcé que des paroles en l''air, et tu crois avoir un plan et la force pour la guerre ? Et maintenant, en qui donc as-tu mis ta confiance, pour te rebeller contre moi ? '
  - type: usfm
    marker: v
    metadata:
      v: '21'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '21'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.21 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Maintenant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: LXX
      - type: text
        text: ', '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'Vetus latina '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Vg
      - type: text
        text: '), '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Syr
      - type: text
        text: ', et Es 36.6 ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en fait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: l'Egypte, ce roseau cassé…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Ez 29.6s.'
    marker-yv: yv-n
  - type: text
    text: 'Maintenant tu as mis ta confiance dans le soutien de l''Egypte, ce roseau cassé qui pénètre et transperce la main de quiconque s''appuie dessus : tel est le pharaon, le roi d''Egypte, pour tous ceux qui mettent leur confiance en lui. '
  - type: usfm
    marker: v
    metadata:
      v: '22'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '22'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.22 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: à Jérusalem
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : précision absente d''Es 36.7.'
    marker-yv: yv-n
  - type: text
    text: 'Peut-être me direz-vous : « C''est dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), notre Dieu, que nous avons mis notre confiance. » Mais n''est-ce pas ses hauts lieux et ses autels qu''Ezéchias a supprimés, en disant à Juda et à Jérusalem : « C''est devant cet autel, à Jérusalem, que vous vous prosternerez ! » '
  - type: usfm
    marker: v
    metadata:
      v: '23'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '23'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.23 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des cavaliers…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des conducteurs de chars.
    marker-yv: yv-n
  - type: text
    text: 'Maintenant fais, je te prie, un pari avec mon maître, le roi d''Assyrie : je te donnerai deux mille chevaux, si tu peux trouver des cavaliers pour les monter. '
  - type: usfm
    marker: v
    metadata:
      v: '24'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '24'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.24 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: gouverneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : responsable d''une province, cf. 1R 10.15'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '  ; 20.24 ; certains pensent qu''il résulte ici d''une erreur de copie. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le moindre…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: des plus petits serviteurs de mon maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', ou, selon certains mss (ici et en Es 36.9), '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: d'entre les plus petits serviteurs de mon maître
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les attelages
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les équipages (de chars) ; les cavaliers.
    marker-yv: yv-n
  - type: text
    text: 'Comment repousserais-tu un seul gouverneur, le moindre parmi les hommes de mon maître ? C''est dans l''Egypte que tu mets ta confiance en ce qui concerne les chars et les attelages ! '
  - type: usfm
    marker: v
    metadata:
      v: '25'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '25'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.25 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: D'ailleurs
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: maintenant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: . – Selon les conceptions de l'Antiquité, la prise d'une ville implique souvent un revirement de la part de son dieu, qui décide de soutenir le conquérant contre ses propres fidèles et légitime ainsi la conquête. Voir « Cyrus à Babylone »♦. Cependant elle peut aussi être interprétée comme une victoire du dieu du conquérant sur les dieux des vaincus (cf. v. 34).
    marker-yv: yv-n
  - type: text
    text: 'D''ailleurs, est-ce indépendamment du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) que j''ai attaqué ce lieu, pour le détruire ? C''est le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) qui m''a dit : « Attaque ce pays et détruis-le. »'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '26'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '26'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.26 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: fils de Hilqiya
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : absent d''un ms hébreu et d''Es 36.11. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: en présence du peuple
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: aux oreilles du peuple.
    marker-yv: yv-n
  - type: text
    text: 'Eliaqim, fils de Hilqiya, Shebna et Yoah dirent au chef d''intendance : S''il te plaît, parle-nous en araméen, nous le comprenons ; ne nous parle pas en judéen, en présence du peuple qui est sur la muraille. '
  - type: usfm
    marker: v
    metadata:
      v: '27'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '27'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.27 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: Cf. v. 19
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: cela
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'ces paroles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: ces choses
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'leurs excréments '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '/ '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: leur urine
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : une lecture traditionnelle indique ici les euphémismes correspondants '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: leur évacuation / l'eau de leurs pieds
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; le premier terme a été rapproché de celui qui est traduit par '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'fiente de pigeon '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: en 6.25.
    marker-yv: yv-n
  - type: text
    text: 'Le chef d''intendance leur répondit : Est-ce à ton maître et à toi que mon maître m''a envoyé dire cela ? N''est-ce pas à ces hommes qui sont assis sur la muraille, eux qui mangent leurs excréments et boivent leur urine avec vous ?'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: v
    metadata:
      v: '28'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '28'
  - type: text
    text: ' '
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.28 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: la parole
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ' : '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'les paroles '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: selon Es 36.13.
    marker-yv: yv-n
  - type: text
    text: 'Puis le chef d''intendance se redressa et cria à pleine voix, en judéen : Ecoutez la parole du grand roi, du roi d''Assyrie ! '
  - type: usfm
    marker: v
    metadata:
      v: '29'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '29'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.29 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de ma main
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : avec plusieurs mss hébreux et des versions anciennes. D''autres mss portent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de sa main.
    marker-yv: yv-n
  - type: text
    text: 'Ainsi parle le roi : Qu''Ezéchias ne vous trompe pas, car il ne pourra pas vous délivrer de ma main. '
  - type: usfm
    marker: v
    metadata:
      v: '30'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '30'
  - type: text
    text: 'Qu''Ezéchias ne vous amène pas à mettre votre confiance dans le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), en disant : « Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) nous délivrera ! Cette ville ne sera pas livrée au roi d''Assyrie ! » '
  - type: usfm
    marker: v
    metadata:
      v: '31'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '31'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.31 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Faites la '
      - type: usfm
        marker: w
        children:
        - type: text
          text: paix
      - type: text
        text: ' avec moi'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: capitulez
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. Le mot traduit ici par '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'paix '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'semble être celui qui est rendu ailleurs par '
    - type: usfm
      marker: fqa
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: bénédiction
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; il pourrait cependant se rattacher à un autre sens de la même racine, '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 's''agenouiller '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: (d'où l'idée de capitulation).
    marker-yv: yv-n
  - type: text
    text: 'N''écoutez pas Ezéchias ; car ainsi parle le roi d''Assyrie : Faites la paix avec moi, rendez-vous à moi ; chacun de vous mangera de sa vigne et de son figuier, chacun boira de l''eau de sa citerne, '
  - type: usfm
    marker: v
    metadata:
      v: '32'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '32'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.32 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: vin
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: vin nouveau
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. Gn 27.28'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un pays d'oliviers… Ezéchias
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent d''Es 36.17.'
    marker-yv: yv-n
  - type: text
    text: 'jusqu''à ce que je vienne et que je vous emmène dans un pays comme le vôtre, dans un pays de blé et de vin, un pays de pain et de vignes, un pays d''oliviers à huile et de miel ; ainsi vous vivrez, vous ne mourrez pas. N''écoutez donc pas Ezéchias, qui veut vous entraîner en disant : « Le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) nous délivrera ! » '
  - type: usfm
    marker: v
    metadata:
      v: '33'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '33'
  - type: text
    text: 'Les dieux des nations ont-ils donc délivré chacun son pays de la main du roi d''Assyrie ? '
  - type: usfm
    marker: v
    metadata:
      v: '34'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '34'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.34 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Cf. v. 25. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de Héna et d'Ivva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : texte absent d''Es 36.19 (mais attesté à '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Qumrân
      - type: text
        text: '). '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Héna '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: correspondrait au pays de Nî’, connu par des textes égyptiens depuis le XV
      - type: usfm
        marker: ord
        children:
        - type: text
          text: e
      - type: text
        text: ' s. av. J.-C. et situé au nord de Hama sur l''Oronte. Pour '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ivva '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Avva
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', cf. 17.24'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ont-ils délivré '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Samarie
      - type: text
        text: ' de ma main ? '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: On peut s'étonner de la question qui laisse supposer que Samarie aurait pu être sauvée par des dieux étrangers. Comme les villes mentionnées ont fait partie d'une même coalition, l'émissaire assyrien souligne que les dieux de la coalition ont été incapables de sauver ne serait-ce qu'une des villes de celle-ci.
    marker-yv: yv-n
  - type: text
    text: 'Où sont les dieux de Hamath et d''Arpad ? Où sont les dieux de Sepharvaïm, de Héna et d''Ivva ? Ont-ils délivré Samarie de ma main ? '
  - type: usfm
    marker: v
    metadata:
      v: '35'
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '35'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '18.35 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: des pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : un ms hébreu, Syr et un ms de '
      - type: usfm
        marker: w
        children:
        - type: text
          text: Tg
      - type: text
        text: ' lisent '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: de ces pays
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ', comme en Es 36.20.'
    marker-yv: yv-n
  - type: text
    text: 'Parmi tous les dieux des pays, quels sont ceux qui ont délivré leur pays de ma main, pour que le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) délivre Jérusalem de ma main ?'
