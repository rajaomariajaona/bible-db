    marker-yv: yv-n
  - type: text
    text: 'Samuel dit : Rassemblez tout Israël au Mitspa ; je prierai le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pour vous. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '6'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.6 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: puisèrent de l'eau et la répandirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : le sens de ce rite n''est pas clair ; l''emploi de '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'l''eau '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'suggère une idée de purification, comme en Ez 36.25 ; cf. Nb 19.9 ; Ps 51.4,9. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Ils jeûnèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 20.26 ; Né 9.1+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: C'est là
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : les mots correspondants sont absents de LXX. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Nous avons '
      - type: usfm
        marker: w
        children:
        - type: text
          text: péché
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 12.10 ; Nb 14.40 ; Dt 1.41 ; Jg 10.10 ; 1R 8.47 ; Ps 106.6 ; Dn 9.5 ; Né 1.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Samuel était juge…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: Samuel jugea les Israélites
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. v. 15s ; 8.5s,20 ; Jg 2.16'
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Ils se rassemblèrent au Mitspa, puisèrent de l''eau et la répandirent devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Ils jeûnèrent en ce jour-là. C''est là qu''ils dirent : Nous avons péché contre le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ! Samuel était juge des Israélites au Mitspa.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '7'
  - type: text
    text: 'Les Philistins apprirent que les Israélites s''étaient rassemblés au Mitspa, et les princes de la confédération des Philistins partirent à l''attaque d''Israël. Les Israélites l''apprirent et ils eurent peur des Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '8'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.8 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Ne garde pas le silence ! '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: cf. 2R 18.36
      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'Crie pour nous vers le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'signifie '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'supplie le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' en notre faveur'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; les Israélites rappellent à Samuel sa promesse du v. 5. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: sauve…
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 4.3.'
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites dirent à Samuel : Ne garde pas le silence ! Crie pour nous vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ', notre Dieu, pour qu''il nous sauve de la main des Philistins ! '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '9'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.9 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: un agneau de lait
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : expression unique dans la Bible hébraïque, désignant certainement un tout jeune agneau, qui tète encore sa mère. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'tout entier en holocauste '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'ou '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: en holocauste intégral
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autre expression unique dans la Bible hébraïque ; voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: sacrifices
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Il cria
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jr 15.1 ; Ps 99.6. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' lui répondit'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : par le tonnerre et l''intervention salvatrice du v. 10 ; on peut aussi traduire '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: 'le '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' l''exauça.'
    marker-yv: yv-n
  - type: text
    text: 'Samuel prit un agneau de lait et l''offrit tout entier en holocauste au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. Il cria vers le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' pour Israël, et le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' lui répondit. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '10'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.10 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: le tonnerre
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 2.10+. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les frappa de panique
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. 5.9ss ; voir Jos 10.10+ ; Jg 4.15. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'battus par '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '(litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: devant
    - type: usfm
      marker: ft
      children:
      - type: text
        text: ') '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : comme les Israélites l''avaient été par eux ; autre traduction '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: frappés d'un fléau devant Israël
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; cf. 4.2s,10.'
    marker-yv: yv-n
  - type: text
    text: 'Pendant que Samuel offrait l''holocauste, les Philistins s''approchèrent pour faire la guerre à Israël. Ce jour-là, le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' fit retentir le tonnerre à grand bruit sur les Philistins et les frappa de panique. Ils furent battus par Israël. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '11'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.11 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les battirent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : litt. '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les frappèrent
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  ; autres traductions '
    - type: usfm
      marker: fqa
      children:
      - type: text
        text: les abattirent ; les mirent à mal
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: Beth-Kar
    - type: usfm
      marker: ft
      children:
      - type: text
