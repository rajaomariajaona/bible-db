    - type: usfm
      marker: fq
      children:
      - type: text
        text: servez-le, lui seul
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 6.13 ; Mt 4.10 ; Lc 4.8. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: de la main
    - type: usfm
      marker: ft
      children:
      - type: text
