      - type: usfm
        marker: ord
        children:
        - type: text
          text: n
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Samuel dit à toute la maison d''Israël : Si c''est de tout votre cœur que vous revenez au '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH), supprimez du milieu de vous les dieux étrangers et les Astartés ; décidez-vous pour le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) et servez-le, lui seul ; alors il vous délivrera de la main des Philistins. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '4'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.4 '
    - type: usfm
      marker: ft
      children:
      - type: text
        text: 'Voir '
    - type: usfm
      marker: fk
      children:
      - type: usfm
        marker: w
        children:
        - type: text
          text: Baal
      - type: text
        text: .
    marker-yv: yv-n
  - type: text
    text: 'Les Israélites supprimèrent donc les Baals et les Astartés, et ils servirent le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: ' (YHWH) seul.'
- type: usfm
  marker: p
  children:
  - type: usfm
    marker: vlbl
