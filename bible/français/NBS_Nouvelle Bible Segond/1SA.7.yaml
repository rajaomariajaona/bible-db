  - type: text
    text: 'Il s''était passé bien des jours – vingt ans – depuis le jour où le Coffre avait été installé à Qiriath-Yéarim. Alors toute la maison d''Israël se mit à gémir devant le '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '. '
  - type: usfm
    marker: vlbl
    children:
    - type: text
      text: '3'
  - type: usfm
    marker: f
    children:
    - type: usfm
      marker: fr
      children:
      - type: text
        text: '7.3 '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'de tout votre '
      - type: usfm
        marker: w
        children:
        - type: text
          text: cœur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Dt 4.29 ; 1R 8.48. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: 'vous revenez au '
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir Jl 2.12ss ; Lm 3.40. –  '
    - type: usfm
      marker: fq
      children:
      - type: usfm
        marker: nd
        children:
        - type: text
          text: Seigneur
      - type: text
        text: ' (YHWH)'
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : voir '
      - type: usfm
        marker: w
        children:
        - type: text
          text: noms
      - type: text
        text: ' divins. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: supprimez… les dieux étrangers
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Gn 35.2 ; Jos 24.14 ; Jg 10.16. –  '
    - type: usfm
      marker: fq
      children:
      - type: text
        text: les Astartés
    - type: usfm
      marker: ft
      children:
      - type: text
        text: '  : cf. Jg 2.13'
