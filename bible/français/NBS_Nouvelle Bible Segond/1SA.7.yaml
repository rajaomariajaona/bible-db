  - type: text
    text: 'Les hommes de Qiriath-Yéarim vinrent et firent monter le coffre du '
  - type: usfm
    marker: nd
    children:
    - type: text
      text: Seigneur
  - type: text
    text: '  ; ils l''emportèrent dans la maison d''Abinadab, sur la colline, et ils consacrèrent Eléazar, son fils, pour garder le coffre du '
  - type: usfm
    marker: nd
