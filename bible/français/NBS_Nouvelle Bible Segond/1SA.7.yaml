document_id: 1SA.7,104
type_code: fra
verses:
  '1':
  - type: text
    content: ' '
  - type: note
    content: 'sur la colline  : cf. 2S 6.3 ; cette précision suggère elle aussi l''idée de la montée , cf. 1.3n  ; 6.20n. –  consacrèrent  : voir saint  ; seul un homme dûment mandaté par Dieu pouvait s''occuper sans risque du coffre sacré.'
  - type: text
    content: 'Les hommes de Qiriath-Yéarim vinrent et firent monter le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: '  ; ils l''emportèrent dans la maison d''Abinadab, sur la colline, et ils consacrèrent Eléazar, son fils, pour garder le coffre du '
  - type: text
    content: Seigneur
  - type: text
    content: .
  - type: heading
    content: L'assemblée du Mitspa ; les Philistins vaincus par Israël
  '10':
  - type: note
    content: 'le tonnerre  : cf. 2.10+. –  les frappa de panique  : cf. 5.9ss ; voir Jos 10.10+ ; Jg 4.15. –  battus par (litt. devant) Israël  : comme les Israélites l''avaient été par eux ; autre traduction frappés d''un fléau devant Israël  ; cf. 4.2s,10.'
  - type: text
    content: 'Pendant que Samuel offrait l''holocauste, les Philistins s''approchèrent pour faire la guerre à Israël. Ce jour-là, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' fit retentir le tonnerre à grand bruit sur les Philistins et les frappa de panique. Ils furent battus par Israël. '
  '11':
  - type: note
    content: 'les battirent  : litt. les frappèrent  ; autres traductions les abattirent ; les mirent à mal. –  Beth-Kar  : localité inconnue.'
  - type: text
    content: 'Les hommes d''Israël sortirent du Mitspa, poursuivirent les Philistins et les battirent jusqu''au-dessous de Beth-Kar. '
  '12':
  - type: note
    content: 'prit une pierre  : cf. Gn 28.18 ; 31.45 ; Jos 24.26. –  la Dent  : lieu-dit, dont le nom (hébreu ha-shên) provient probablement d''une dent de rocher ; LXX semble avoir lu Yeshana, cf. 2Ch 13.19n. –  Eben-Ezer  : cf. 4.1 ; 5.1. –  Jusqu''ici  : le sens peut être temporel aussi bien que géographique.'
  - type: text
    content: 'Samuel prit une pierre qu''il plaça entre le Mitspa et la Dent, et il l''appela du nom d''Eben-Ezer (« Pierre du Secours »), en disant : Jusqu''ici le '
  - type: text
    content: Seigneur
  - type: text
    content: ' nous a secourus. '
  '13':
  - type: note
    content: 'furent humiliés  : cf. Jg 3.30 ; 8.28 ; 11.33 ; 1Ch 20.4 ; 2Ch 13.18. –  La main du Seigneur fut contre les Philistins  : autre traduction le Seigneur fit sentir aux Philistins sa puissance  ; cf. 4.3n.'
  - type: text
    content: 'Ainsi les Philistins furent humiliés et ne vinrent plus sur le territoire d''Israël. La main du '
  - type: text
    content: Seigneur
  - type: text
    content: ' fut contre les Philistins pendant tous les jours de Samuel. '
  '14':
  - type: note
    content: 'Eqrôn / Gath  : cf. 5.1n. –  Amorites  : terme général désignant les populations de Canaan.'
  - type: text
    content: Les villes que les Philistins avaient prises sur Israël revinrent à Israël, depuis Eqrôn jusqu'à Gath, avec leur territoire ; Israël les délivra de la main des Philistins. Et il y eut la paix entre Israël et les Amorites.
  '15':
  - type: text
    content: ' '
  - type: note
    content: 'Samuel fut juge  : cf. Jg 10.1-5 ; 12.8-15 ; Ac 13.20.'
  - type: text
    content: 'Samuel fut juge en Israël tous les jours de sa vie. '
  '16':
  - type: note
    content: 'Beth-El  : sanctuaire dans le territoire de Benjamin (10.3n  ; Gn 28.10-22 ; Jg 20.18,26). –  le Guilgal  : nom de plusieurs localités en Israël ; il s''agit probablement ici du sanctuaire situé près de Jéricho (Jos 4.19s ; 5.9s). –  il était juge ou il jugeait  ; cf. v. 6,15,17.'
  - type: text
    content: 'Il allait d''année en année faire un circuit par Beth-El, le Guilgal et le Mitspa ; il était juge d''Israël dans tous ces lieux. '
  '17':
  - type: note
    content: 'Puis il revenait  : le terme qui apparaît ici évoque habituellement le retour de l''année, c.-à-d. le printemps (le début de la nouvelle année selon l''un des calendriers en usage). Cf. 2S 11.1 ; 1R 20.22,26 ; 2Ch 36.10. –  Rama  : cf. 1.1n. –  bâtit là un autel  : cf. Jg 6.24n.'
  - type: text
    content: 'Puis il revenait à Rama où était sa maison ; là aussi il était juge d''Israël ; il bâtit là un autel pour le '
  - type: text
    content: Seigneur
  - type: text
    content: .
  '2':
  - type: text
    content: ' '
  - type: note
    content: 'gémir  : le verbe hébreu, rare, peut signifier soit se lamenter , soit se tourner vers  ; les traducteurs anciens étaient déjà hésitants : LXX tourner les regards vers  ; Tg se rassembler  ; Vg se reposer . –  devant  : litt. derrière, après.'
  - type: text
    content: 'Il s''était passé bien des jours – vingt ans – depuis le jour où le Coffre avait été installé à Qiriath-Yéarim. Alors toute la maison d''Israël se mit à gémir devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. '
  '3':
  - type: note
    content: 'de tout votre cœur  : cf. Dt 4.29 ; 1R 8.48. –  vous revenez au Seigneur  : voir Jl 2.12ss ; Lm 3.40. –  Seigneur (YHWH)  : voir noms divins. –  supprimez… les dieux étrangers  : cf. Gn 35.2 ; Jos 24.14 ; Jg 10.16. –  les Astartés  : cf. Jg 2.13n. –  servez-le, lui seul  : cf. Dt 6.13 ; Mt 4.10 ; Lc 4.8. –  de la main  : cf. 4.3n.'
  - type: text
    content: 'Samuel dit à toute la maison d''Israël : Si c''est de tout votre cœur que vous revenez au '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), supprimez du milieu de vous les dieux étrangers et les Astartés ; décidez-vous pour le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) et servez-le, lui seul ; alors il vous délivrera de la main des Philistins. '
  '4':
  - type: note
    content: Voir Baal.
  - type: text
    content: 'Les Israélites supprimèrent donc les Baals et les Astartés, et ils servirent le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH) seul.'
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'au Mitspa  : cf. Jg 20.1n  ; voir aussi Gn 31.49n  ; Jos 11.3n  ; 1S 10.17. –  je prierai le Seigneur pour vous 8.6 ; 12.19,23 ; cf. Jr 37.3 ; Jb 42.8.'
  - type: text
    content: 'Samuel dit : Rassemblez tout Israël au Mitspa ; je prierai le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour vous. '
  '6':
  - type: note
    content: 'puisèrent de l''eau et la répandirent  : le sens de ce rite n''est pas clair ; l''emploi de l''eau suggère une idée de purification, comme en Ez 36.25 ; cf. Nb 19.9 ; Ps 51.4,9. –  Ils jeûnèrent  : cf. Jg 20.26 ; Né 9.1+. –  C''est là  : les mots correspondants sont absents de LXX. –  Nous avons péché  : cf. 12.10 ; Nb 14.40 ; Dt 1.41 ; Jg 10.10 ; 1R 8.47 ; Ps 106.6 ; Dn 9.5 ; Né 1.6. –  Samuel était juge…  : autre traduction Samuel jugea les Israélites  ; cf. v. 15s ; 8.5s,20 ; Jg 2.16n.'
  - type: text
    content: 'Ils se rassemblèrent au Mitspa, puisèrent de l''eau et la répandirent devant le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Ils jeûnèrent en ce jour-là. C''est là qu''ils dirent : Nous avons péché contre le '
  - type: text
    content: Seigneur
  - type: text
    content: '  ! Samuel était juge des Israélites au Mitspa.'
  '7':
  - type: text
    content: 'Les Philistins apprirent que les Israélites s''étaient rassemblés au Mitspa, et les princes de la confédération des Philistins partirent à l''attaque d''Israël. Les Israélites l''apprirent et ils eurent peur des Philistins. '
  '8':
  - type: note
    content: 'Ne garde pas le silence ! cf. 2R 18.36n. –  Crie pour nous vers le Seigneur signifie supplie le Seigneur en notre faveur  ; les Israélites rappellent à Samuel sa promesse du v. 5. –  sauve…  : cf. 4.3.'
  - type: text
    content: 'Les Israélites dirent à Samuel : Ne garde pas le silence ! Crie pour nous vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ', notre Dieu, pour qu''il nous sauve de la main des Philistins ! '
  '9':
  - type: note
    content: 'un agneau de lait  : expression unique dans la Bible hébraïque, désignant certainement un tout jeune agneau, qui tète encore sa mère. –  tout entier en holocauste ou en holocauste intégral  ; autre expression unique dans la Bible hébraïque ; voir sacrifices. –  Il cria  : cf. Jr 15.1 ; Ps 99.6. –  le Seigneur lui répondit  : par le tonnerre et l''intervention salvatrice du v. 10 ; on peut aussi traduire le Seigneur l''exauça.'
  - type: text
    content: 'Samuel prit un agneau de lait et l''offrit tout entier en holocauste au '
  - type: text
    content: Seigneur
  - type: text
    content: '. Il cria vers le '
  - type: text
    content: Seigneur
  - type: text
    content: ' pour Israël, et le '
  - type: text
    content: Seigneur
  - type: text
    content: ' lui répondit. '
