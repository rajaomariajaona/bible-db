          text: '3.24ss (châtiment et conversion d''Héliodore, envoyé par Séleucos IV pour piller le temple de Jérusalem) : « Il était déjà, avec sa garde, près du Trésor, quand le Souverain des Esprits et de toute puissance fit une grande apparition, de sorte que tous ceux qui avaient osé venir là furent frappés par la force de Dieu et en perdirent vigueur et courage… Héliodore tomba tout d''un coup à terre et fut enveloppé d''épaisses ténèbres. On le ramassa pour le mettre dans une litière, et cet homme, qui venait d''entrer dans le trésor susdit avec une nombreuse suite et toute sa garde, fut emporté, désormais incapable de s''aider lui-même… Cet homme gisait donc sans voix, privé de tout espoir et de tout secours. Quant aux autres, ils bénissaient le Seigneur qui avait miraculeusement glorifié son saint lieu, et le sanctuaire qui, peu de temps avant, était rempli de frayeur et de trouble, débordait de joie et d''allégresse. » Au cours d''une seconde vision lui annonçant son rétablissement, Héliodore recevra le message suivant (3.34) : « Toi, fustigé du Ciel, va annoncer à tous la grande force de Dieu. »'
      marker-yv: yv-n
