document_id: ACT.9,104
type_code: fra
verses:
  '1':
  - type: heading
    content: La conversion de Saul
  - type: heading
    content: 22.3-21  ; 26.9-20
  - type: text
    content: ' '
  - type: note
    content: 'Saul v. 3+. –  qui respirait… la menace…  : cf. 4.29 ; Ps 18.16. –  disciples 6.1+.'
  - type: text
    content: 'Cependant Saul, qui respirait encore la menace et le meurtre contre les disciples du Seigneur, se rendit chez le grand prêtre '
  '10':
  - type: text
    content: ' '
  - type: note
    content: 'Ananias  : cf. 22.12. –  dans une vision 10.3,17,19 ; 11.5 ; 12.9 ; 16.9s ; 18.9 ; 22.17s ; 23.11 ; 27.23 ; Mt 17.9.'
  - type: text
    content: 'Or il y avait à Damas un disciple nommé Ananias. Le Seigneur lui dit, dans une vision : Ananias ! Celui-ci répondit : Je suis là, Seigneur ! '
  '11':
  - type: note
    content: 'Va  : litt. lève-toi et va. –  de Tarse  : capitale de la Cilicie (actuellement en Turquie ; cf. 15.23+), où se trouvait une importante colonie juive 9.30 ; 11.25 ; 21.39+ ; 22.3 ; cf. Ga 1.21.'
  - type: text
    content: 'Le Seigneur lui dit : Va dans la rue appelée la Droite et cherche, dans la maison de Judas, un nommé Saul de Tarse. Car il prie '
  '12':
  - type: note
    content: '(il prie) et il a vu…  : cf. 10.3,19s,30 ; 22.17 ; Lc 1.10s ; 3.21 ; 9.28-36. –  en vision  : le terme correspondant est absent de certains mss. –  lui imposait les mains 6.6+ ; cf. Mc 8.23-25.'
  - type: text
    content: 'et il a vu en vision un nommé Ananias, qui entrait et lui imposait les mains pour qu''il retrouve la vue. '
  '13':
  - type: note
    content: tes saints, c.-à-d. les chrétiens v. 32,41 ; 26.10,18 ; cf. 3.14+ ; 20.32 ; Dn 7.18 ; Rm 1.7n  ; 1Co 1.2n.
  - type: text
    content: 'Ananias répondit : Seigneur, j''ai entendu dire par beaucoup de gens tout le mal que cet homme a fait à tes saints à Jérusalem ; '
  '14':
  - type: note
    content: 'V. 1s+. –  grands prêtres Mt 2.4n. –  arrêter  : litt. lier. –  ceux qui invoquent ton nom  : cf. 1.21 ; 9.21 ; 22.16 ; Rm 10.12s ; 1Co 1.2+.'
  - type: text
    content: 'ici même, il a été investi par les grands prêtres de l''autorité pour arrêter tous ceux qui invoquent ton nom. '
  '15':
  - type: note
    content: 'cet homme…  : litt. celui-ci est pour moi un instrument de choix pour porter…  ; le mot correspondant à instrument est traduit par objet en 10.11,16 ; 11.5 ; cf. 27.17n  ; Rm 9.21-23 ; cf. Jr 50.25n. –  porter (ou apporter) mon nom 3.16+. –  devant les nations (ou les non-Juifs, par opposition aux Israélites, cf. 10.45n  ; voir aussi Lc 1.16n) Rm 1.5 ; Ga 1.16 ; cf. Jr 1.10. –  les rois 25.13,23 ; 26.1 ; 27.24 ; Lc 21.12ss ; cf. Ap 10.11.'
  - type: text
    content: 'Mais le Seigneur lui dit : Va, car cet homme est l''instrument que j''ai choisi pour porter mon nom devant les nations et les rois, comme devant les Israélites ; '
  '16':
  - type: note
    content: Cf. 5.41+ ; 15.26 ; 21.13 ; Ph 1.29 ; voir aussi 2Co 11.23-28.
  - type: text
    content: 'je lui montrerai moi-même tout ce qu''il lui faudra souffrir pour mon nom. '
  '17':
  - type: note
    content: V. 12+. –  qui t'est apparu 13.31+. –  rempli d'Esprit saint 2.4+.
  - type: text
    content: 'Ananias partit ; lorsqu''il fut arrivé dans la maison, il posa les mains sur lui et dit : Saoul, mon frère, le Seigneur Jésus, qui t''est apparu sur le chemin par lequel tu venais, m''a envoyé pour que tu retrouves la vue et que tu sois rempli d''Esprit saint. '
  '18':
  - type: note
    content: 'Cf. Tobit 11.8 (description de la guérison d''un aveugle) : « Le remède fera se craqueler et s''écailler les leucomes de ses yeux ; alors ton père recouvrera la vue et verra la lumière. » – Voir baptême.'
  - type: text
    content: 'Au même instant, il tomba de ses yeux comme des écailles, et il retrouva la vue. Il se leva et reçut le baptême ; '
  '19':
  - type: note
    content: Cf. Ga 1.17.
  - type: text
    content: et, après avoir pris de la nourriture, il retrouva ses forces.
  - type: heading
    content: Saul se met à proclamer le Christ
  - type: text
    content: 'Il resta quelques jours avec les disciples qui étaient à Damas, '
  '2':
  - type: note
    content: 'des lettres… v. 14,21 ; 28.21 ; cf. un extrait de ce type de lettre en 1 Maccabées 15.21 : « Si donc des éléments pernicieux ont fui leur pays pour se rendre auprès de vous, livrez-les au grand prêtre Simon, pour qu''il les châtie selon leur loi. » –  la Voie ou le Chemin  ; même mot v. 17,27 ; 8.26,36,39 ; il peut désigner aussi une doctrine ; voir 19.9,23 ; 22.4 ; 24.14,22 ; cf. 2.28 ; 13.10 ; 16.17 ; 18.25s ; Es 30.21 ; Ps 27.11 ; Pr 15.10 ; Mt 21.32 ; 22.16 ; Règle de la Communauté (Qumrân) 9.17s : « Qu''il (l''instructeur) réserve la Connaissance véridique et le Droit juste à ceux qui ont choisi la Voie. » –  les arrêter et les amener  : litt. les amener liés, de même v. 21 ; cf. v. 14n.'
  - type: text
    content: et lui demanda des lettres pour les synagogues de Damas ; s'il y trouvait quelques-uns, hommes ou femmes, qui étaient de la Voie, il pourrait ainsi les arrêter et les amener à Jérusalem.
  '20':
  - type: note
    content: 'proclamer  : d''après certains témoins, le texte occidental précise avec une entière assurance (cf. 4.29). –  dans les synagogues 13.5+. –  le Fils de Dieu  : cf. 8.37n  ; 13.33 ; Mc 1.1+ ; Lc 1.35 ; 22.67-71 ; Ga 1.16 ; 2.20 ; 1Th 1.10.'
  - type: text
    content: 'et aussitôt il se mit à proclamer dans les synagogues que Jésus est le Fils de Dieu. '
  '21':
  - type: note
    content: 's''acharnait contre ou cherchait à détruire, à faire disparaître, cf. 8.3+ ; même verbe Ga 1.13,23. –  ceux qui invoquent ce nom v. 14+. –  devant les grands prêtres  : cf. v. 14 ; 4.23+.'
  - type: text
    content: 'Tous ceux qui l''entendaient, stupéfaits, disaient : N''est-ce pas lui qui, à Jérusalem, s''acharnait contre ceux qui invoquent ce nom ? N''est-il pas venu ici pour les arrêter et les amener devant les grands prêtres ? '
  '22':
  - type: note
    content: 'de plus en plus puissant Ep 6.10+. –  démontrant  : même verbe 16.10 (conclure) ; 19.33 (renseigner). –  que Jésus est le Christ 5.42+ ; cf. 17.3 ; 18.5,28 ; 1Jn 5.1 ; voir onction. D''après certains témoins, le texte occidental ajoute  : celui en qui Dieu a pris plaisir.'
  - type: text
    content: Cependant Saul était de plus en plus puissant et confondait les Juifs qui habitaient Damas, en démontrant que Jésus est le Christ.
  '23':
  - type: text
    content: ' '
  - type: note
    content: 'Après bien des jours  : cf. Ga 1.17. –  les Juifs résolurent (autre traduction se concertèrent  ; un terme apparenté est traduit par complot au v. 24 ; formule comparable en Mt 26.4) : cf. v. 16 ; 20.3,19 ; 23.12-30 ; 2Co 11.26.'
  - type: text
    content: 'Après bien des jours, les Juifs résolurent de le supprimer, '
  '24':
  - type: note
    content: Cf. 2Co 11.32s.
  - type: text
    content: 'et Saul eut connaissance de leur complot. Ils surveillaient même les portes de la ville jour et nuit, pour le supprimer. '
  '25':
  - type: note
    content: 'Cf. Jos 2.15. –  de nuit 17.10 ; 23.23,31. –  ses disciples  : certains mss portent les disciples  ; cf. 14.20n.'
  - type: text
    content: Mais, de nuit, ses disciples le prirent et le descendirent dans une corbeille le long de la muraille.
  - type: heading
    content: Saul à Jérusalem
  '26':
  - type: text
    content: ' '
  - type: note
    content: Cf. 22.17-21 ; Ga 1.17-24.
  - type: text
    content: 'Arrivé à Jérusalem, Saul tentait de se joindre aux disciples ; mais tous avaient peur de lui, ne croyant pas qu''il fût disciple. '
  '27':
  - type: note
    content: 'Barnabé 4.36+. –  aux apôtres  : cf. Ga 1.18ss. –  que celui-ci lui avait parlé  : autre traduction, moins probable  : et lui avait parlé  ; cf. 9.4s. –  à Damas… v. 19. –  exprimé… au nom de Jésus 4.18 ; 5.40 ; 16.18. –  avec assurance  : autre traduction ouvertement  ; v. 28 ; 2.29n.'
  - type: text
    content: 'Alors Barnabé le prit avec lui, l''amena aux apôtres et leur raconta comment, sur le chemin, Saul avait vu le Seigneur, que celui-ci lui avait parlé, et comment à Damas il s''était exprimé avec assurance au nom de Jésus. '
  '28':
  - type: note
    content: Cf. Ga 1.22.
  - type: text
    content: 'Il allait et venait avec eux à Jérusalem et s''exprimait avec assurance au nom du Seigneur. '
  '29':
  - type: note
    content: Cf. 6.1n,9 ; voir aussi 11.20n.
  - type: text
    content: 'Il parlait et débattait aussi avec les gens de langue grecque ; mais ceux-ci cherchaient à le supprimer. '
  '3':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 22.6 ; 1Co 9.1 ; 15.8 ; Ga 1.12-15 ; voir aussi Ez 1.28 ; 2 Maccabées 3.24ss (châtiment et conversion d''Héliodore, envoyé par Séleucos IV pour piller le temple de Jérusalem) : « Il était déjà, avec sa garde, près du Trésor, quand le Souverain des Esprits et de toute puissance fit une grande apparition, de sorte que tous ceux qui avaient osé venir là furent frappés par la force de Dieu et en perdirent vigueur et courage… Héliodore tomba tout d''un coup à terre et fut enveloppé d''épaisses ténèbres. On le ramassa pour le mettre dans une litière, et cet homme, qui venait d''entrer dans le trésor susdit avec une nombreuse suite et toute sa garde, fut emporté, désormais incapable de s''aider lui-même… Cet homme gisait donc sans voix, privé de tout espoir et de tout secours. Quant aux autres, ils bénissaient le Seigneur qui avait miraculeusement glorifié son saint lieu, et le sanctuaire qui, peu de temps avant, était rempli de frayeur et de trouble, débordait de joie et d''allégresse. » Au cours d''une seconde vision lui annonçant son rétablissement, Héliodore recevra le message suivant (3.34) : « Toi, fustigé du Ciel, va annoncer à tous la grande force de Dieu. »'
  - type: text
    content: 'Il était en chemin et approchait de Damas quand, soudain, une lumière venant du ciel resplendit tout autour de lui. '
  '30':
  - type: note
    content: 'à Césarée 8.40+. –  pour Tarse  : voir v. 11n  ; cf. 11.25 ; Ga 1.21.'
  - type: text
    content: Les frères en eurent connaissance ; ils le firent descendre à Césarée et le firent partir pour Tarse.
  '31':
  - type: text
    content: ' '
  - type: note
    content: 'Cf. 2.42+,47. –  L''Eglise  : quelques mss portent les Eglises  ; 5.11n  ; cf. 20.28. –  Judée / Samarie 8.1+. –  Galilée 10.37. –  se construisait ou s''édifiait  ; cf. 20.32n. –  vivait  : litt. allait . – Voir crainte . –  se multipliait 6.1,7 ; 7.17 ; autre traduction progressait (12.24) ; on pourrait aussi comprendre et elle était comblée par l''encouragement (ou la consolation, l''exhortation , 2.40n  ; 4.36 ; un terme apparenté est traduit par défenseur en Jn 14.16n) de l''Esprit saint , cf. 1Co 14.3.'
  - type: text
    content: L'Eglise, dans toute la Judée, la Galilée et la Samarie, était donc en paix ; elle se construisait, vivait dans la crainte du Seigneur et se multipliait par l'encouragement de l'Esprit saint.
  - type: heading
    content: ET JUSQU'AUX EXTRÉMITÉS DE LA TERRE
  - type: heading
    content: 'Pierre à Lydda : la guérison d''Enée'
  '32':
  - type: text
    content: ' '
  - type: note
    content: 'Pierre  : cf. 8.14-25. –  qui passait…  : autre traduction qui passait chez tous  ; cf. 8.4,40. –  les saints v. 13+. –  Lydda  : sur la route de Jérusalem à Joppé (v. 36).'
  - type: text
    content: 'Pierre, qui passait dans toutes ces régions, descendit aussi chez les saints qui habitaient Lydda. '
  '33':
  - type: note
    content: 8.7+. –  un grabat 5.15+.
  - type: text
    content: 'Il trouva là un nommé Enée, paralysé, qui était couché sur un grabat depuis huit ans. '
  '34':
  - type: note
    content: 'Jésus-Christ te guérit  : cf. 3.6,12,16. –  lève-toi  : cf. 14.10. –  arrange toi-même ton grabat  : traduction incertaine ; autre possibilité range toi-même ton grabat  ; certains ont compris dresse la table, mais ce sens est peu probable ; cf. Mc 2.11/ /.'
  - type: text
    content: 'Pierre lui dit : Enée, Jésus-Christ te guérit ; lève-toi et arrange toi-même ton grabat ! Aussitôt il se leva. '
  '35':
  - type: note
    content: 'Tous les habitants  : cf. 8.14. –  Sarôn ou Sharôn, Es 33.9n  : nom de la plaine qui s''étend le long de la Méditerranée depuis Joppé jusqu''au pied du mont Carmel. –  se tournèrent vers le Seigneur ou se convertirent au Seigneur  ; de même en 11.21 ; cf. 3.19n  ; 14.15n  ; 15.19 ; 26.20 ; 2Co 3.16 ; 1Th 1.9.'
  - type: text
    content: Tous les habitants de Lydda et du Sarôn le virent et se tournèrent vers le Seigneur.
  - type: heading
    content: 'Pierre à Joppé : Tabitha ramenée à la vie'
  '36':
  - type: text
    content: ' '
  - type: note
    content: 'Joppé ou Jaffa (cf. Jon 1.3) : port sur la Méditerranée, à une cinquantaine de kilomètres au sud de Césarée. –  une femme, disciple  : litt. une disciple  ; cette forme féminine du terme n''apparaît qu''ici dans le N.T. –  Tabitha (en araméen) et Dorcas (en grec) signifient gazelle (le nom hébreu correspondant serait Tsibia, comme en 2R 12.2 ; 1Ch 8.9 ; 2Ch 24.1). –  Elle faisait beaucoup…  : litt. elle était pleine (ou remplie ) des œuvres… qu''elle faisait , cf. 2.4+ ; 6.3. –  actes de compassion  : cf. 2.44s ; 3.2n  ; 10.2 ; Mt 6.2n  ; Lc 11.41 ; Tobit 12.9 : « L''aumône délivre de la mort et elle purifie de tout péché. Ceux qui font l''aumône seront rassasiés de vie. »'
  - type: text
    content: 'Il y avait à Joppé une femme, disciple, nommée Tabitha – ou, selon la traduction, Dorcas. Elle faisait beaucoup d''œuvres bonnes et d''actes de compassion. '
  '37':
  - type: note
    content: dans une chambre à l'étage 1.13n  ; cf. 1R 17.17-24.
  - type: text
    content: 'En ces jours-là, elle tomba malade et mourut. On la lava et on la mit dans une chambre à l''étage. '
  '38':
  - type: note
    content: 'près de Joppé  : à 20 km environ ; cf. v. 36. –  deux hommes  : cf. 10.7. –  Ne tarde pas…  : cf. Nb 22.16.'
  - type: text
    content: 'Les disciples ayant appris que Pierre se trouvait à Lydda, qui est près de Joppé, ils envoyèrent deux hommes le supplier : Ne tarde pas à passer chez nous. '
  '39':
  - type: note
    content: 'les veuves  : cf. 6.1+. –  les vêtements de dessus, par opposition aux tuniques  ; cf. Mt 5.40n.'
  - type: text
    content: 'Pierre se leva et partit avec eux. Lorsqu''il fut arrivé, on le fit monter dans la chambre à l''étage. Toutes les veuves vinrent le trouver en pleurant ; elles lui montraient les tuniques et les vêtements que Dorcas avait faits lorsqu''elle était avec elles. '
  '4':
  - type: note
    content: 'Saoul, Saoul  : le nom apparaît ici sous une forme plus proche de sa prononciation araméenne, de même au v. 17 ; cf. Gn 22.11 ; 31.11-13 ; 46.2s ; Ex 3.4-10 ; 1S 3.4.'
  - type: text
    content: 'Il tomba à terre et entendit une voix qui lui disait : Saoul, Saoul, pourquoi me persécutes-tu ? '
  '40':
  - type: note
    content: Cf. 2R 4.33-44 ; Mc 5.40s ; Lc 8.51-54.
  - type: text
    content: 'Pierre chassa tout le monde dehors, puis il s''agenouilla et pria ; après quoi il se tourna vers le corps et dit : Tabitha, lève-toi ! Alors elle ouvrit les yeux et, voyant Pierre, elle s''assit. '
  '41':
  - type: note
    content: Cf. Lc 7.15. –  les saints v. 13+,32.
  - type: text
    content: 'Il lui donna la main et la fit lever. Il appela ensuite les saints et les veuves, et il la leur présenta vivante. '
  '42':
  - type: note
    content: 'Cela fut connu…  : cf. 1.19+.'
  - type: text
    content: 'Cela fut connu de tout Joppé, et beaucoup se mirent à croire au Seigneur. '
  '43':
  - type: note
    content: 'Cf. 10.5s. –  tanneur ou corroyeur  : dans plusieurs textes du judaïsme postérieur, ce métier est considéré comme méprisable.'
  - type: text
    content: Il demeura bien des jours à Joppé, chez un certain Simon, qui était tanneur.
  '5':
  - type: note
    content: 'Moi, je suis…  : cf. Lc 21.8n  ; 22.70 ; 24.39 ; Jn 6.20,35. –  que, toi, tu persécutes  : cf. 5.14n  ; Lc 10.16. – D''après certains témoins, le texte occidental aurait ajouté à la fin du v.  : Il te serait dur de regimber contre les aiguillons. Tout tremblant et stupéfait, il dit : Seigneur, que veux-tu que je fasse ? Alors le Seigneur lui dit : (6) Lève-toi…  ; cf. 22.10 ; 26.14.'
  - type: text
    content: 'Il répondit : Qui es-tu, Seigneur ? – Moi, je suis Jésus, celui que, toi, tu persécutes. '
  '6':
  - type: note
    content: Cf. Ez 3.22.
  - type: text
    content: 'Mais lève-toi, entre dans la ville, et on te dira ce qu''il faut que tu fasses. '
  '7':
  - type: note
    content: 'Cf. 22.9 ; Dt 4.12 ; Dn 10.7 ; Jn 12.29s ; Sagesse 18.1 (au sujet du fléau des ténèbres en Egypte) : « Pour tes saints, au contraire, il y avait une très grande lumière, et les autres entendaient leur voix sans distinguer leur silhouette. »'
  - type: text
    content: 'Les hommes qui voyageaient avec lui s''étaient arrêtés, muets de stupeur ; ils entendaient la voix, mais ils ne voyaient personne. '
  '8':
  - type: note
    content: 'Cf. 13.11 ; 22.11. –  se releva 3.15n. Texte occidental probable  : Mais il leur dit : Relevez-moi de terre. Et comme ils le relevaient, bien qu''il eût…'
  - type: text
    content: 'Saul se releva de terre et, bien qu''il eût les yeux ouverts, il ne voyait rien ; on le prit par la main pour le conduire à Damas. '
  '9':
  - type: text
    content: Il resta trois jours sans voir, et sans rien manger ni boire.
