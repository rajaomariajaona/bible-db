  '1':
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Les artisans du sanctuaire
    marker-yv: yv-h
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '1'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '10':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '10'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.10 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'spéciaux '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou, peut-être, '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: brodés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; le terme hébreu correspondant n''apparaît que dans ce contexte (de même en 35.19 ; 39.1). Désigne-t-il un certain genre de tissu ou l''usage sacré des vêtements (cf. '
        - type: usfm
          marker: w
          children:
          - type: text
            text: LXX
        - type: text
          text: ' '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: liturgiques
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', c.-à-d. destinés au service du culte) ? Certains pensent qu''il s''agit ici des toiles de la Demeure (voir chap. 26 ; le terme traduit par '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'vêtements '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'est rendu par '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'drap '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'en Nb 4.6ss). –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacrés
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saint
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: sacerdotaux
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: pour exercer le sacerdoce
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; de même 35.19 ; 39.41 ; voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: prêtre
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'les vêtements spéciaux, les vêtements sacrés pour Aaron, le prêtre, les vêtements sacerdotaux de ses fils ; '
  '11':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '11'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.11 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 30.22ss.
      marker-yv: yv-n
    - type: text
      text: l'huile d'onction, et l'encens aromatique pour le sanctuaire. Ils feront exactement ce que je t'ai ordonné.
  - type: usfm
    marker: s1
    children:
    - type: text
      text: Le respect du sabbat
    marker-yv: yv-h
  '12':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '12'
    - type: text
      text: 'Le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' dit à Moïse : '
  '13':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '13'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.13 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: Surtout
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : certains traduisent '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'cependant '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(c.-à-d. malgré les nombreux travaux à effectuer pour la construction de la Demeure). –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbats
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.29+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'signe '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Ez 20.12. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'dans toutes vos '
        - type: usfm
          marker: w
          children:
          - type: text
            text: générations
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '12.14+. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: YHWH
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : voir '
        - type: usfm
          marker: w
          children:
          - type: text
            text: noms
        - type: text
          text: ' divins. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'qui vous rends '
        - type: usfm
          marker: w
          children:
          - type: text
            text: saints
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autre traduction '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: qui vous consacre.
      marker-yv: yv-n
    - type: text
      text: 'Toi, dis aux Israélites : Surtout, vous observerez mes sabbats : ce sera un signe entre moi et vous, dans toutes vos générations, afin qu''on sache que c''est moi, le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' (YHWH), qui vous rends saints. '
  '14':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '14'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.14 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'retranché… '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '30.33'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Vous observerez le sabbat, car il est sacré pour vous : celui qui le profanera sera mis à mort. Quiconque travaillera ce jour-là sera retranché du sein de son peuple. '
  '15':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '15'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.15 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'repos sabbatique '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.23'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Pendant six jours on travaillera ; mais le septième jour il y aura sabbat, repos sabbatique sacré pour le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: '. Quiconque travaillera le jour du sabbat sera mis à mort. '
  '16':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '16'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.16 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: ils célébreront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: ils feront
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: alliance
        - type: text
          text: ' perpétuelle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: Es 24.5.
      marker-yv: yv-n
    - type: text
      text: 'Les Israélites observeront le sabbat ; ils célébreront le sabbat, dans toutes leurs générations, comme une alliance perpétuelle. '
  '17':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '17'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.17 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Gn 1.31–2.3. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'un signe pour toujours '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'ou '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: un signe perpétuel
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il s'est reposé
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : autres traductions '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'il a cessé (de travailler) ; il a fait '
        - type: usfm
          marker: w
          children:
          - type: text
            text: sabbat
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  ; cf. Gn 2.2'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: il a repris haleine
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', comme en 23.12.'
      marker-yv: yv-n
    - type: text
      text: 'Ce sera entre moi et les Israélites un signe pour toujours ; car en six jours le '
    - type: usfm
      marker: nd
      children:
      - type: text
        text: Seigneur
    - type: text
      text: ' a fait le ciel et la terre, et le septième jour il s''est reposé et il a repris haleine.'
  '18':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '18'
    - type: text
      text: ' '
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.18 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Témoignage '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '16.34'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: écrites du doigt de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ' : cf. 24.12+.'
      marker-yv: yv-n
    - type: text
      text: Lorsqu'il eut achevé de parler à Moïse, au mont Sinaï, il lui donna les deux tablettes du Témoignage, les tablettes de pierre écrites du doigt de Dieu.
  '2':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '2'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.2 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Voir '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: nom
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'Betsaléel '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 1Ch 2.20. – Sur l'ensemble, voir 35.30–36.7 ; cf. 1R 7.13s.
      marker-yv: yv-n
    - type: text
      text: 'Regarde : j''ai appelé par son nom Betsaléel, fils d''Ouri, fils de Hour, de la tribu de Juda. '
  '3':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '3'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.3 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '35.31. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'souffle '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '(ou '
      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Esprit
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ') '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: de Dieu
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : cf. Gn 41.38+.'
      marker-yv: yv-n
    - type: text
      text: 'Je l''ai rempli du souffle de Dieu, de sagesse, d''intelligence et de connaissance pour toutes sortes de travaux, '
  '4':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '4'
    - type: text
      text: 'pour concevoir des ouvrages, pour travailler l''or, l''argent et le bronze, '
  '5':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '5'
    - type: text
      text: 'pour graver les pierres à enchâsser, pour tailler le bois et pour faire toutes sortes de travaux. '
  '6':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '6'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.6 '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: pour aide
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: avec lui
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: tous les gens habiles
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : litt. '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: 'tout sage de '
        - type: usfm
          marker: w
          children:
          - type: text
            text: cœur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 28.3'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'Je lui ai donné pour aide Oholiab, fils d''Ahisamak, de la tribu de Dan. J''ai mis de la sagesse dans le cœur de tous les gens habiles, pour qu''ils fassent tout ce que je t''ai ordonné : '
  '7':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '7'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.7 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Cf. 25.10-22 ; 26 ; 27.1-3. –  '
      - type: usfm
        marker: fq
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: l'expiatoire
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '25.17'
        - type: usfm
          marker: ord
          children:
          - type: text
            text: n
        - type: text
          text: .
      marker-yv: yv-n
    - type: text
      text: 'la tente de la Rencontre, le coffre du Témoignage, l''expiatoire qui est dessus, et tous les ustensiles de la tente ; '
  '8':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '8'
    - type: usfm
      marker: f
      children:
      - type: usfm
        marker: fr
        children:
        - type: text
          text: '31.8 '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: 'Sur le '
        - type: usfm
          marker: bdit
          children:
          - type: text
            text: mobilier
        - type: text
          text: ', cf. 25.23-40 ; 30.1-10. –  '
      - type: usfm
        marker: fq
        children:
        - type: text
          text: 'porte-lampes '
        - type: usfm
          marker: w
          children:
          - type: text
            text: pur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '  : on comprend généralement '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: porte-lampes d'or pur
      - type: usfm
        marker: ft
        children:
        - type: text
          text: ', cf. 25.31 ; même expression en 39.37.'
      marker-yv: yv-n
    - type: text
      text: 'la table et ses ustensiles, le porte-lampes pur et tous ses ustensiles, l''autel de l''encens, '
  '9':
  - type: usfm
    marker: p
    children:
    - type: usfm
      marker: vlbl
      children:
      - type: text
        text: '9'
    - type: text
      text: 'l''autel des holocaustes et tous ses ustensiles, la cuve et sa base ; '
