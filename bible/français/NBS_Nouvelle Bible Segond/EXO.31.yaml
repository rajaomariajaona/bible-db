document_id: EXO.31,104
type_code: fra
verses:
  '1':
  - type: heading
    content: Les artisans du sanctuaire
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '10':
  - type: note
    content: 'spéciaux ou, peut-être, brodés  ; le terme hébreu correspondant n''apparaît que dans ce contexte (de même en 35.19 ; 39.1). Désigne-t-il un certain genre de tissu ou l''usage sacré des vêtements (cf. LXX liturgiques, c.-à-d. destinés au service du culte) ? Certains pensent qu''il s''agit ici des toiles de la Demeure (voir chap. 26 ; le terme traduit par vêtements est rendu par drap en Nb 4.6ss). –  sacrés  : voir saint. –  sacerdotaux  : litt. pour exercer le sacerdoce  ; de même 35.19 ; 39.41 ; voir prêtre.'
  - type: text
    content: 'les vêtements spéciaux, les vêtements sacrés pour Aaron, le prêtre, les vêtements sacerdotaux de ses fils ; '
  '11':
  - type: note
    content: 30.22ss.
  - type: text
    content: l'huile d'onction, et l'encens aromatique pour le sanctuaire. Ils feront exactement ce que je t'ai ordonné.
  - type: heading
    content: Le respect du sabbat
  '12':
  - type: text
    content: 'Le '
  - type: text
    content: Seigneur
  - type: text
    content: ' dit à Moïse : '
  '13':
  - type: note
    content: 'Surtout  : certains traduisent cependant (c.-à-d. malgré les nombreux travaux à effectuer pour la construction de la Demeure). –  sabbats 16.29+. –  signe Ez 20.12. –  dans toutes vos générations 12.14+. –  YHWH  : voir noms divins. –  qui vous rends saints  : autre traduction qui vous consacre.'
  - type: text
    content: 'Toi, dis aux Israélites : Surtout, vous observerez mes sabbats : ce sera un signe entre moi et vous, dans toutes vos générations, afin qu''on sache que c''est moi, le '
  - type: text
    content: Seigneur
  - type: text
    content: ' (YHWH), qui vous rends saints. '
  '14':
  - type: note
    content: retranché… 30.33n.
  - type: text
    content: 'Vous observerez le sabbat, car il est sacré pour vous : celui qui le profanera sera mis à mort. Quiconque travaillera ce jour-là sera retranché du sein de son peuple. '
  '15':
  - type: note
    content: repos sabbatique 16.23n.
  - type: text
    content: 'Pendant six jours on travaillera ; mais le septième jour il y aura sabbat, repos sabbatique sacré pour le '
  - type: text
    content: Seigneur
  - type: text
    content: '. Quiconque travaillera le jour du sabbat sera mis à mort. '
  '16':
  - type: note
    content: 'ils célébreront  : litt. ils feront. –  alliance perpétuelle Es 24.5.'
  - type: text
    content: 'Les Israélites observeront le sabbat ; ils célébreront le sabbat, dans toutes leurs générations, comme une alliance perpétuelle. '
  '17':
  - type: note
    content: 'Gn 1.31–2.3. –  un signe pour toujours ou un signe perpétuel. –  il s''est reposé  : autres traductions il a cessé (de travailler) ; il a fait sabbat  ; cf. Gn 2.2n. –  il a repris haleine, comme en 23.12.'
  - type: text
    content: 'Ce sera entre moi et les Israélites un signe pour toujours ; car en six jours le '
  - type: text
    content: Seigneur
  - type: text
    content: ' a fait le ciel et la terre, et le septième jour il s''est reposé et il a repris haleine.'
  '18':
  - type: text
    content: ' '
  - type: note
    content: 'Témoignage 16.34n. –  écrites du doigt de Dieu  : cf. 24.12+.'
  - type: text
    content: Lorsqu'il eut achevé de parler à Moïse, au mont Sinaï, il lui donna les deux tablettes du Témoignage, les tablettes de pierre écrites du doigt de Dieu.
  '2':
  - type: note
    content: Voir nom. –  Betsaléel 1Ch 2.20. – Sur l'ensemble, voir 35.30–36.7 ; cf. 1R 7.13s.
  - type: text
    content: 'Regarde : j''ai appelé par son nom Betsaléel, fils d''Ouri, fils de Hour, de la tribu de Juda. '
  '3':
  - type: note
    content: '35.31. –  souffle (ou Esprit) de Dieu  : cf. Gn 41.38+.'
  - type: text
    content: 'Je l''ai rempli du souffle de Dieu, de sagesse, d''intelligence et de connaissance pour toutes sortes de travaux, '
  '4':
  - type: text
    content: 'pour concevoir des ouvrages, pour travailler l''or, l''argent et le bronze, '
  '5':
  - type: text
    content: 'pour graver les pierres à enchâsser, pour tailler le bois et pour faire toutes sortes de travaux. '
  '6':
  - type: note
    content: 'pour aide  : litt. avec lui. –  tous les gens habiles  : litt. tout sage de cœur, cf. 28.3n.'
  - type: text
    content: 'Je lui ai donné pour aide Oholiab, fils d''Ahisamak, de la tribu de Dan. J''ai mis de la sagesse dans le cœur de tous les gens habiles, pour qu''ils fassent tout ce que je t''ai ordonné : '
  '7':
  - type: note
    content: Cf. 25.10-22 ; 26 ; 27.1-3. –  l'expiatoire 25.17n.
  - type: text
    content: 'la tente de la Rencontre, le coffre du Témoignage, l''expiatoire qui est dessus, et tous les ustensiles de la tente ; '
  '8':
  - type: note
    content: 'Sur le mobilier, cf. 25.23-40 ; 30.1-10. –  porte-lampes pur  : on comprend généralement porte-lampes d''or pur, cf. 25.31 ; même expression en 39.37.'
  - type: text
    content: 'la table et ses ustensiles, le porte-lampes pur et tous ses ustensiles, l''autel de l''encens, '
  '9':
  - type: text
    content: 'l''autel des holocaustes et tous ses ustensiles, la cuve et sa base ; '
