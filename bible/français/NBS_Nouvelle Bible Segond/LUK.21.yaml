      - type: usfm
        marker: fqa
        children:
        - type: usfm
          marker: w
          children:
          - type: text
            text: Oracles
        - type: text
          text: ' sibyllins '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '3.796ss : « Je vais t''indiquer un signe tout à fait évident qui te permettra de connaître quand l''accomplissement de toutes ces choses doit se produire sur la terre. Lorsque, la nuit, dans le ciel rempli d''astres, des glaives apparaîtront vers l''Occident et vers l''Orient et que du haut du ciel une pluie de poussière tombera sur la terre ; lorsque la lumière du soleil disparaîtra complètement du ciel à midi et que les rayons de la lune apparaîtront et reviendront éclairer la terre ; lorsque se produira le signe du sang dont dégoutteront les rochers, lorsque dans la nue vous verrez une mêlée de gens de pied et de cavaliers, comme une chasse de bêtes sauvages pareille à des vapeurs de brume, c''est alors que le Dieu qui habite le ciel va mettre un terme à la guerre. » '
      - type: usfm
        marker: fqa
        children:
        - type: text
          text: '2 '
        - type: usfm
          marker: w
          children:
          - type: text
            text: Maccabées
        - type: text
          text: ' '
      - type: usfm
        marker: ft
        children:
        - type: text
          text: '5.2 : « Dans toute la ville, pendant près de quarante jours, apparurent, courant dans les airs, des cavaliers vêtus de manteaux brodés d''or, des troupes armées disposées en cohortes. »'
      marker-yv: yv-n
    - type: text
      text: il y aura de grands tremblements de terre et, dans divers lieux, des pestes et des famines ; il y aura des phénomènes terribles et de grands signes du ciel.
