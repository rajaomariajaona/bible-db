document_id: LUK.21,104
type_code: fra
verses:
  '1':
  - type: heading
    content: L'offrande de la veuve
  - type: heading
    content: Mc 12.41-44
  - type: text
    content: ' '
  - type: note
    content: 'mettaient  : litt. jetaient , peut-être au sens de versaient  ; de même dans la suite. –  dans le Trésor du temple  ; le terme peut désigner plus spécifiquement les caisses ou « troncs » destinés à recevoir les offrandes ; cf. 2R 12.9s ; Né 12.44 ; Mt 27.6 ; Jn 8.20.'
  - type: text
    content: 'Il leva les yeux et vit les riches qui mettaient leurs offrandes dans le Trésor. '
  '10':
  - type: text
    content: ' '
  - type: note
    content: Cf. Es 19.2 ; 2Ch 15.6.
  - type: text
    content: 'Alors il leur disait : Nation se dressera contre nation et royaume contre royaume, '
  '11':
  - type: note
    content: 'grands tremblements de terre Ez 38.19ss ; Ac 16.26. –  pestes / famines (les deux mots font assonance en grec) : cf. Jr 14.12 ; 15.2 ; 18.21 ; Ez 5.12 ; 6.11s ; Testament de Juda 23.3 : « Le Seigneur attirera sur vous la famine et la peste. » –  de grands signes du ciel  : cf. v. 25ss ; Mc 8.11 ; certains mss rattachent l''expression du ciel aux phénomènes terribles  ; cf. Es 19.16s ; Oracles sibyllins 3.796ss : « Je vais t''indiquer un signe tout à fait évident qui te permettra de connaître quand l''accomplissement de toutes ces choses doit se produire sur la terre. Lorsque, la nuit, dans le ciel rempli d''astres, des glaives apparaîtront vers l''Occident et vers l''Orient et que du haut du ciel une pluie de poussière tombera sur la terre ; lorsque la lumière du soleil disparaîtra complètement du ciel à midi et que les rayons de la lune apparaîtront et reviendront éclairer la terre ; lorsque se produira le signe du sang dont dégoutteront les rochers, lorsque dans la nue vous verrez une mêlée de gens de pied et de cavaliers, comme une chasse de bêtes sauvages pareille à des vapeurs de brume, c''est alors que le Dieu qui habite le ciel va mettre un terme à la guerre. » 2 Maccabées 5.2 : « Dans toute la ville, pendant près de quarante jours, apparurent, courant dans les airs, des cavaliers vêtus de manteaux brodés d''or, des troupes armées disposées en cohortes. »'
  - type: text
    content: il y aura de grands tremblements de terre et, dans divers lieux, des pestes et des famines ; il y aura des phénomènes terribles et de grands signes du ciel.
  - type: heading
    content: La persécution, signe par excellence
  - type: heading
    content: Mt 10.17-22  ; Mc 13.9-12
  '12':
  - type: text
    content: ' '
  - type: note
    content: 'avant tout cela  : cf. v. 9. –  on mettra la main sur vous 20.19+. –  persécutera  : cf. 11.49 ; Ac 7.52. –  synagogues… 12.11n. –  en prison  : cf. Ac 8.3 ; 12.4. –  devant des rois et des gouverneurs  : cf. Ac 12.1ss ; 23.24–26.32. –  à cause de mon nom  : cf. Mc 13.6,9,13 ; Ac 9.16.'
  - type: text
    content: 'Mais, avant tout cela, on mettra la main sur vous et on vous persécutera ; on vous livrera aux synagogues, on vous jettera en prison, on vous mènera devant des rois et des gouverneurs à cause de mon nom. '
  '13':
  - type: note
    content: 'Cela vous amènera…  : litt. cela aboutira pour vous à un témoignage, cf. 5.14 ; 9.5 ; 24.48 ; Ac 1.8+,22+.'
  - type: text
    content: 'Cela vous amènera à rendre témoignage. '
  '14':
  - type: note
    content: 'Cf. 12.11 ; Ep 6.19. –  Sachez bien  : litt. mettez donc dans vos cœurs  ; cf. 1.66n  ; 9.44n.'
  - type: text
    content: 'Sachez bien que vous n''avez pas à préparer votre défense, '
  '15':
  - type: note
    content: 'Cf. 12.12 ; Ac 2.33 ; 6.10 ; voir aussi Jn 14.18ss ; 15.26s ; 16.8ss. –  une parole ou un langage  ; litt. une bouche et une sagesse… –  s''opposer  : autre traduction résister.'
  - type: text
    content: 'car moi, je vous donnerai une parole, une sagesse, à laquelle tous vos adversaires ne pourront s''opposer, qu''ils ne pourront contredire. '
  '16':
  - type: note
    content: 'Cf. 12.51ss ; 18.29 ; Mi 7.6. –  on fera mettre à mort  : autre traduction ils feront mettre à mort  ; cf. 11.49 ; Ac 7.54ss ; 12.1s.'
  - type: text
    content: Vous serez livrés même par des parents, des frères, des proches et des amis, et on fera mettre à mort plusieurs d'entre vous.
  - type: heading
    content: Mt 24.9-13  ; Mc 13.13
  '17':
  - type: text
    content: ' '
  - type: note
    content: Mt 24.9 ; Mc 13.13 ; Jn 15.18ss ; 17.14.
  - type: text
    content: 'Vous serez détestés de tous à cause de mon nom. '
  '18':
  - type: note
    content: Cf. 12.7+.
  - type: text
    content: 'Mais pas un seul cheveu de votre tête ne sera perdu ; '
  '19':
  - type: note
    content: 'persévérance 8.15n. –  acquérez la vie  : autre traduction acquérez votre âme, cf. 1.46n  ; 9.24 ; 12.19n  ; certains mss ont l''indicatif futur  : vous acquerrez la vie (ou votre âme) ; cf. Hé 10.39n.'
  - type: text
    content: par votre persévérance, acquérez la vie !
  - type: heading
    content: La destruction de Jérusalem
  - type: heading
    content: Mt 24.15-22  ; Mc 13.14-20
  '2':
  - type: note
    content: 'deux leptes  : cf. 12.59n  ; Mc 12.42n  ; voir aussi mesures, poids et monnaies.'
  - type: text
    content: 'Il vit aussi une veuve misérable, qui y mettait deux leptes. '
  '20':
  - type: text
    content: ' '
  - type: note
    content: 'des armées  : autre traduction des armées qui campent  ; cf. 19.43 ; voir aussi 13.35. –  dévastation  : cf. Mc 13.14n. –  s''est approchée v. 8+.'
  - type: text
    content: 'Lorsque vous verrez Jérusalem investie par des armées, sachez alors que sa dévastation s''est approchée. '
  '21':
  - type: note
    content: 'Judée  : cf. 1.5n. –  fuient…  : cf. 17.31ss.'
  - type: text
    content: 'Alors, que ceux qui seront en Judée fuient dans les montagnes, que ceux qui seront au milieu de Jérusalem s''en retirent, et que ceux qui seront dans les campagnes n''entrent pas dans la ville. '
  '22':
  - type: note
    content: 'des jours…  : autre traduction des jours de vengeance  ; cf. 18.7s ; Os 9.7 ; voir aussi Dt 32.35,43 ; Jr 46.10. – Voir justice. –  soit accompli  : cf. 9.51n. –  ce qui est écrit 18.31 ; 20.17 ; cf. Jr 6.1ss ; 26.1ss ; Mi 3.12 ; Za 8.1ss.'
  - type: text
    content: 'Car ce seront des jours où justice sera faite, pour que soit accompli tout ce qui est écrit. '
  '23':
  - type: note
    content: 'Quel malheur 6.24+. –  les femmes…  : cf. 23.29. –  grand désarroi  : cf. Mc 13.19/ / ; voir aussi 1Co 7.26ss. –  dans le pays  : autre traduction sur la terre. –  de la colère 3.7+.'
  - type: text
    content: 'Quel malheur pour les femmes enceintes et pour celles qui allaiteront en ces jours-là ! Il y aura un grand désarroi dans le pays, et de la colère contre ce peuple. '
  '24':
  - type: note
    content: 'Ils tomberont…  : cf. Jr 21.7 ; sur l''expression, voir aussi Gn 34.26 ; Jos 8.24 ; 19.47 ; Jg 1.8 ; Hé 11.34 ; Siracide 28.18 : « Beaucoup sont tombés sous le tranchant de l''épée. » –  emmenés captifs… Dt 28.64 ; Ez 32.9 ; Esd 9.7. –  Jérusalem sera foulée aux pieds… Za 12.3 ; voir aussi Es 63.18 ; Ps 79.1 ; Dn 8.13 ; Ap 11.2 ; 1 Maccabées 3.45,51 : « Jérusalem était déserte, de ses fils, nul n''entrait ni ne sortait, le sanctuaire était piétiné, l''étranger occupait la Citadelle, le païen s''y est installé… Ton lieu saint a été piétiné et profané. » –  les temps des nations (ou des non-Juifs) : cf. 24.47 ; Ez 30.3 ; Dn 12.7 ; Mc 13.20/ / ; Rm 11.25ss ; voir aussi Jr 25.11 ; 29.10 ; Dn 2.44s ; 7.18,21ss ; 9.1ss ; 2Ch 36.21s ; Tobit 14.5 : « De nouveau Dieu les prendra en pitié et les fera revenir sur la terre d''Israël. De nouveau ils construiront sa Maison, mais pas comme la première, jusqu''au moment où s''accompliront les temps fixés. Après cela, ils reviendront tous de leur déportation et ils reconstruiront magnifiquement Jérusalem. »'
  - type: text
    content: Ils tomberont sous le tranchant de l'épée, ils seront emmenés captifs parmi toutes les nations, et Jérusalem sera foulée aux pieds par les nations, jusqu'à ce que les temps des nations soient accomplis.
  - type: heading
    content: La venue du Fils de l'homme
  - type: heading
    content: Mt 24.29-31  ; Mc 13.24-27
  '25':
  - type: text
    content: ' '
  - type: note
    content: 'signes…  : cf. v. 11 ; Jl 3.3s ; voir aussi Es 13.10s ; Ez 32.7. –  des nations ou des gens des nations, des non-Juifs (v. 24 ; cf. Mt 4.15n). –  qui ne sauront que faire…  : litt. dans la perplexité (cf. Es 24.19n) (au sujet) du bruit de la mer… Ps 46.4 ; 65.8s ; 89.10 ; cf. Jon 1.15 ; Sagesse 5.22 : « Les eaux de la mer se déchaîneront contre eux (les impies) et les fleuves les submergeront sans pitié. »'
  - type: text
    content: 'Il y aura des signes dans le soleil, la lune et les étoiles, et, sur la terre, une angoisse des nations qui ne sauront que faire au bruit de la mer et des flots ; '
  '26':
  - type: note
    content: 'rendront l''âme ou défailliront  ; le verbe peut évoquer la mort (ainsi en 4 Maccabées 15.18) ou l''évanouissement ; cf. v. 28. –  la terre habitée  : cf. 2.1n. –  les puissances des cieux… Es 34.4  ; Mc 13.25+.'
  - type: text
    content: 'les humains rendront l''âme de terreur dans l''attente de ce qui surviendra pour la terre habitée, car '
  - type: text
    content: les puissances des cieux
  - type: text
    content: ' seront ébranlées. '
  '27':
  - type: note
    content: le Fils de l'homme (5.24+ ; 12.8s) venant Dn 7.13s  ; Mt 10.23+ ; cf. Ac 1.11. – Voir gloire.
  - type: text
    content: 'Alors on verra '
  - type: text
    content: le Fils de l'homme venant sur une nuée
  - type: text
    content: ' avec beaucoup de puissance et de gloire. '
  '28':
  - type: note
    content: 'rédemption ou délivrance, 1.68n  ; cf. Ac 3.19ss ; même terme Rm 3.24 ; 8.23 ; 1Co 1.30 ; Ep 4.30 ; Col 1.14. –  approche  : cf. v. 8+ ; Rm 13.11.'
  - type: text
    content: Quand cela commencera d'arriver, redressez-vous et levez la tête, parce que votre rédemption approche.
  - type: heading
    content: L'approche du règne de Dieu
  - type: heading
    content: Mt 24.32-35  ; Mc 13.28-31
  '29':
  - type: text
    content: ' '
  - type: note
    content: 'parabole 5.36+. –  figuier  : cf. 13.6ss.'
  - type: text
    content: 'Il leur dit encore une parabole : Voyez le figuier et tous les arbres. '
  '3':
  - type: note
    content: En vérité 9.27n.
  - type: text
    content: 'Il dit alors : En vérité, je vous le dis, cette pauvre veuve a mis plus que tous ; '
  '30':
  - type: note
    content: 'de vous-mêmes  : cf. 1Th 5.1s ; voir aussi Jn 4.35.'
  - type: text
    content: 'Dès qu''ils bourgeonnent, vous savez de vous-mêmes, en regardant, que déjà l''été est proche. '
  '31':
  - type: note
    content: 'De même, vous aussi  : cf. 17.10. –  ces choses v. 11,25. –  le règne de Dieu est proche  : cf. v. 8+,28 ; 10.9,11 ; 19.11.'
  - type: text
    content: 'De même, vous aussi, quand vous verrez ces choses arriver, sachez que le règne de Dieu est proche. '
  '32':
  - type: note
    content: 'Amen 4.24+ ; cf. Mt 5.18n. –  cette génération (7.31+) ne passera pas (ou jamais, de même v. 33) …  : cf. 9.27+.'
  - type: text
    content: Amen,
  - type: text
    content: ' je vous le dis, cette génération ne passera pas que tout cela n''arrive. '
  '33':
  - type: note
    content: 'Cf. 16.17. –  mes paroles…  : cf. Es 40.8 ; 55.10s ; Ps 119.89.'
  - type: text
    content: Le ciel et la terre passeront, mais mes paroles ne passeront pas.
  - type: heading
    content: La nécessité de veiller
  '34':
  - type: text
    content: ' '
  - type: note
    content: 'Prenez garde… 12.1n. –  que votre cœur ne s''alourdisse  : cf. 9.32n  ; on pourrait aussi comprendre que vous ne deveniez obtus , cf. Ex 7.14n. –  dans les excès…  : cf. 12.22ss,45 ; 17.27 ; Mc 4.19. –  les ivresses  : autre traduction les beuveries  ; un verbe apparenté est traduit par s''enivrer en 12.45 ; même terme en Rm 13.13 ; Ga 5.21 ; voir aussi Es 5.11ss ; Ep 5.18 ; 1Th 5.7. –  ce jour 10.12 ; 17.22,24,26,30s. –  n''arrive sur vous à l''improviste  : cf. 2.9n  ; 1Th 5.2s.'
  - type: text
    content: 'Prenez garde à vous-mêmes, de peur que votre cœur ne s''alourdisse dans les excès, les ivresses et les inquiétudes de la vie, et que ce jour n''arrive sur vous à l''improviste, '
  '35':
  - type: note
    content: 'comme un filet ou un piège  : certains mss rattachent cette expression à ce qui suit  : car il viendra comme un filet, mais cette lecture est moins probable ; cf. Es 24.17s ; Jr 48.43. –  il viendra sur tous…  : cf. v. 26 ; 17.37 ; Jr 25.29.'
  - type: text
    content: 'comme un filet, car il viendra sur tous ceux qui habitent la surface de toute la terre. '
  '36':
  - type: note
    content: 'Restez… éveillés Mt 26.41 ; Mc 13.33 ; 1Th 5.6. –  priez en tout temps  : cf. 18.1+ss ; 1P 4.7. –  que vous ayez la force…  : certains mss portent que vous soyez jugés dignes d''échapper…  ; cf. 20.35 ; Ac 5.41. –  vous tenir debout  : autres traductions vous présenter ; comparaître  ; cf. Ap 6.17n. –  Fils de l''homme v. 27+.'
  - type: text
    content: Restez donc éveillés et priez en tout temps, afin que vous ayez la force d'échapper à tout ce qui va arriver et de vous tenir debout devant le Fils de l'homme.
  - type: heading
    content: Les derniers jours de Jésus
  '37':
  - type: text
    content: ' '
  - type: note
    content: il enseignait dans le temple cf. 19.47+. –  il sortait pour passer la nuit… Mt 21.17/ /. –  mont dit des Oliviers 19.29+ ; 22.39ss.
  - type: text
    content: 'Le jour, il enseignait dans le temple, et il sortait pour passer la nuit au mont dit des Oliviers. '
  '38':
  - type: note
    content: 'Cf. 19.48+. –  pour l''écouter  : autre traduction pour l''entendre. A la fin de ce chapitre certains mss insèrent l''épisode de Jn 7.53n–8.11.'
  - type: text
    content: Dès le matin, tout le peuple se rendait vers lui dans le temple pour l'écouter.
  '4':
  - type: note
    content: 'Cf. 12.21. –  abondance / manque  : cf. 2Co 8.12-14. –  ont mis…  : litt. ont mis dans les offrandes  ; certains mss précisent les offrandes de Dieu (c.-à-d. pour Dieu). –  tout ce qu''elle avait pour vivre ou toutes ses ressources  ; cf. 8.14n  ; 1Jn 2.16n. – A la fin du v. certains mss ajoutent  : Celui qui a des oreilles pour entendre, qu''il entende ! cf. 8.8.'
  - type: text
    content: car c'est de leur abondance que tous ceux-là ont mis des offrandes, mais elle, elle a mis, de son manque, tout ce qu'elle avait pour vivre.
  - type: heading
    content: Jésus annonce la destruction du temple
  - type: heading
    content: Mt 24.1-2  ; Mc 13.1-2
  '5':
  - type: text
    content: ' '
  - type: note
    content: 'temple  : cf. 4.9 ; Ac 3.1s,10s ; 5.12 ; voir Mc 13.1n  ; Jn 2.20n. –  offrandes ou ex-voto  ; c''est une autre forme et un autre sens du mot grec transcrit ailleurs par anathème (cf. Rm 9.3n) ; cf. 2 Maccabées 9.16 : « (Antiochos promettait) d''orner des plus belles offrandes le saint temple qu''il avait jadis pillé. »'
  - type: text
    content: 'Comme quelques-uns parlaient du temple en évoquant les belles pierres et les offrandes dont il était orné, il dit : '
  '6':
  - type: note
    content: Cf. Jr 7.1ss ; 22.5 ; 26.1ss ; Ez 8–11 ; Mi 3.12 ; Mt 26.61 ; 27.40/ / ; Ac 6.14. –  Les jours viendront… 5.35+. –  pas pierre sur pierre… 19.44.
  - type: text
    content: Les jours viendront où, de ce que vous voyez, il ne restera pas pierre sur pierre qui ne soit renversée.
  - type: heading
    content: Les signes annonciateurs de la crise
  - type: heading
    content: Mt 24.3-8  ; Mc 13.3-8
  '7':
  - type: text
    content: ' '
  - type: note
    content: 'Maître 3.12n. –  le signe…  : litt. le signe quand ces choses vont arriver (cf. Mc 13.4n).'
  - type: text
    content: 'Ils l''interrogèrent : Maître, quand donc cela arrivera-t-il ? Quel sera le signe annonçant ces événements ? '
  '8':
  - type: note
    content: 'ne pas vous laisser égarer  : cf. Jn 7.47 ; 1Co 6.9n. –  Beaucoup…  : cf. Ac 5.36s ; 21.38. –  en se servant de mon nom  : cf. 9.48. –  C''est moi  : cf. 24.39 ; voir aussi 12.35ss ; 17.23 ; Ac 1.11 ; sur l''expression, voir Mt 14.27n  ; Mc 6.50n  ; Jn 4.26n. –  Le temps s''est approché  : cf. v. 20,28,31 ; 10.9,11 ; 19.11 ; Dn 7.22 ; Mc 1.15n/ / ; Ap 1.3 ; 22.10. –  à leur suite  : litt. derrière eux (cf. 9.23n  ; Mc 1.7n).'
  - type: text
    content: 'Il répondit : Veillez à ne pas vous laisser égarer. Beaucoup, en effet, viendront en se servant de mon nom, en disant : « C''est moi ! », et : « Le temps s''est approché ! » N''allez pas à leur suite. '
  '9':
  - type: note
    content: 'Cf. Mt 24.4ss et les notes. –  désordres  : même terme 1Co 14.33. –  ne vous effrayez pas  : cf. Dt 31.6 ; Jr 1.17 ; Ez 3.9 ; 2Ch 32.7 (même verbe dans LXX). –  cela doit arriver…  : cf. Dn 2.28s,45. –  d''abord  : cf. 17.25 ; 2Th 2.3 ; voir aussi 1Co 15.24. –  tout de suite  : cf. 17.7.'
  - type: text
    content: Quand vous entendrez parler de guerres et de désordres, ne vous effrayez pas, car cela doit arriver d'abord. Mais la fin n'est pas pour tout de suite.
