        - type: text
          text: '  ; le terme peut désigner plus spécifiquement les caisses ou « troncs » destinés à recevoir les offrandes ; cf. 2R 12.9s ; Né 12.44 ; Mt 27.6 ; Jn 8.20.'
      marker-yv: yv-n
    - type: text
      text: 'Il leva les yeux et vit les riches qui mettaient leurs offrandes dans le Trésor. '
